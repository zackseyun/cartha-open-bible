translation:
  language: es
  text: Porque este ha sido considerado digno de más gloria que Moisés[a], en la medida en que el que construyó la casa[b] tiene mayor honor que ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mayor gloria que Moisés’.
    reason: lexical_alternative
  - marker: b
    text: ‘Casa’ aquí continúa la metáfora del pueblo de Dios desarrollada en el contexto circundante; ‘familia’ o ‘hogar’ son alternativas posibles, pero ‘casa’ preserva mejor en este versículo la comparación entre el constructor y la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: Se conserva la deixis explícita del griego sin sobrecargar el español. ‘Este’ mantiene la referencia inmediata a Jesús en el contexto y evita borrar el contraste con Moisés.
- source_word: πλείονος ... δόξης
  english_pob_choice: more glory
  chosen_spanish: más gloria
  alternatives_spanish:
  - mayor gloria
  lexicon: BDAG
  rationale: La comparación se expresa naturalmente en español con ‘más gloria’, manteniendo el valor honorífico y teológico de δόξα.
- source_word: παρὰ Μωϋσῆν
  english_pob_choice: than Moses
  chosen_spanish: que Moisés
  alternatives_spanish:
  - comparado con Moisés
  - más que Moisés
  lexicon: BDAG
  rationale: En una comparación, el español idiomático usa ‘que’ con el comparativo. Se conserva la relación directa de superioridad respecto de Moisés.
- source_word: ἠξίωται
  english_pob_choice: has been counted worthy
  chosen_spanish: ha sido considerado digno
  alternatives_spanish:
  - ha sido tenido por digno
  - ha sido estimado digno
  lexicon: BDAG
  rationale: La forma perfecta pasiva pide un resultado vigente; ‘ha sido considerado digno’ preserva la evaluación recibida sin introducir mérito intrínseco que el texto no explicita.
- source_word: καθ’ ὅσον
  english_pob_choice: insofar as
  chosen_spanish: en la medida en que
  alternatives_spanish:
  - así como
  - puesto que
  lexicon: BDAG
  rationale: La locución griega introduce una relación proporcional o de base para la comparación. ‘En la medida en que’ refleja con precisión esa función discursiva en español.
- source_word: πλείονα τιμὴν
  english_pob_choice: greater honor
  chosen_spanish: mayor honra
  alternatives_spanish:
  - más honor
  - mayor honor
  lexicon: BDAG
  rationale: ‘Honra’ comunica bien τιμή en registro bíblico y mantiene el matiz de reconocimiento/estima. Se prefiere aquí por su naturalidad en español eclesial.
- source_word: τοῦ οἴκου
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la casa espiritual
  - la familia
  lexicon: BDAG
  rationale: Se conserva la imagen de la casa para respetar la metáfora de construcción del versículo. No se expande a ‘familia’ porque el argumento inmediato contrasta constructor y casa.
- source_word: ὁ κατασκευάσας αὐτόν
  english_pob_choice: the one who built the house
  chosen_spanish: el que construyó la casa
  alternatives_spanish:
  - el que la edificó
  - el constructor de ella
  lexicon: BDAG
  rationale: κατασκευάζω admite construir/preparar; en el contexto de casa, ‘construyó’ es claro y natural. El pronombre final ‘ella’ retiene el referente femenino de ‘casa’ en español.
theological_decisions:
- issue: Superioridad de Jesús respecto de Moisés
  english_pob_reading: The verse states that Jesus is worthy of more glory than Moses by analogy to a builder having more honor than the house.
  chosen_spanish_reading: El versículo afirma que Jesús es digno de más gloria que Moisés mediante la analogía de que el constructor tiene mayor honra que la casa.
  alternative_spanish_readings:
  - La comparación podría leerse solo como funcional, no necesariamente como superioridad cristológica directa.
  rationale: La redacción española preserva la comparación explícita del griego sin suavizarla. Se mantiene la fuerza cristológica del pasaje sin añadir explicaciones ajenas al texto.
  doctrine_reference: Afirmaciones; preservar la tensión teológica sin resolverla más allá del versículo.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: καθ’ ὅσον se reflejó con una expresión proporcional (‘en la medida en que’) y el referente final se resolvió como ‘la casa’, no como una repetición innecesaria del sustantivo. Se evitó duplicar el par de notas del inglés porque en español la comparación y la metáfora pueden mantenerse sin introducir dos marcas distintas.'
  spanish_consistency_notes:
  - Se usa ‘Moisés’ y no una forma arcaizante.
  - Se mantiene ‘casa’ para conservar la metáfora estructural del pasaje.
  - Se eligió ‘honra’ por su adecuación al registro bíblico y a la comparación honorífica.
  - El anclaje de nota se colocó solo donde realmente hay alternativa lexical en español.
