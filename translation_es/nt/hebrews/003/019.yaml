revisions:
- from: Y vemos que no pudieron entrar[a] por falta de fe[b].
  to: Y vemos que no pudieron entrar por incredulidad[a].
  rationale: Se cambia 'falta de fe' por 'incredulidad' para seguir la decisión principal del POB ('unbelief') con un español más preciso y natural. Se elimina la nota innecesaria sobre 'entrar' y se conserva una sola nota léxica para reflejar el matiz alternativo de ἀπιστία, en paralelo con el rastro inglés.
  reviewer_model: gpt-5.4
