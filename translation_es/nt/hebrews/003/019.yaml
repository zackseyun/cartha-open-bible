review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: καὶ βλέπομεν ὅτι → ''Y vemos que'', οὐκ ἠδυνήθησαν εἰσελθεῖν → ''no pudieron entrar'', y δι’ ἀπιστίαν como causa. Sin embargo, el texto principal se aparta innecesariamente de la decisión auditada del POB en ἀπιστίαν: el inglés fijó ''unbelief'' como lectura principal y dejó ''faithlessness'' como alternativa en nota. En español, ''falta de fe'' es posible, pero es más difuso y menos directo que ''incredulidad'', que corresponde mejor al sentido principal documentado.'
  spanish_quality_summary: 'El español es claro y natural, pero contiene una nota [a] impropia: repite prácticamente el mismo texto del cuerpo y no preserva una alternativa real. La nota [b] está invertida respecto al rastro inglés: pone ''incredulidad'' como alternativa cuando debería ser la opción principal o, al menos, una nota sobre ''falta de fe/infidelidad'' como matiz alternativo. Una leve reparación produce un texto más fiel y limpio.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto salvo la elección de ἀπιστίαν. Dado el rastro léxico-teológico del POB, 'incredulidad' alinea mejor con 'unbelief', mientras que 'falta de fe' o 'infidelidad' pueden preservarse como alternativa en nota. No hay otros términos de glosario sensibles en este versículo.
  issues:
  - severity: medium
    issue: La traducción principal de ἀπιστίαν como 'falta de fe' no sigue la decisión principal auditada del POB ('unbelief').
    rationale: Aunque 'falta de fe' es comprensible, 'incredulidad' expresa con más precisión y naturalidad la negativa a creer/confiar destacada en Hebreos 3, y coincide mejor con el rastro inglés y su nota alternativa.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa significativa y duplica el texto principal.
    rationale: El inglés no tiene nota en 'to enter'/'were not able to enter'; la nota española actual no añade información útil y puede confundir al lector al presentar como variante una formulación idéntica.
  - severity: low
    issue: La distribución entre texto principal y nota léxica está invertida en torno a ἀπιστία.
    rationale: 'Si se conserva una nota, debería explicar el matiz alternativo (''falta de fe'' o ''infidelidad/actitud no fiel'') mientras el texto principal use la opción más directa documentada: ''incredulidad''.'
  revised_spanish_text: Y vemos que no pudieron entrar por incredulidad[a].
  revised_footnotes:
  - marker: a
    text: O "falta de fe" o "infidelidad". El griego ἀπιστία puede denotar no solo incredulidad, sino también una negativa no fiel a confiar.
    reason: lexical_alternative
