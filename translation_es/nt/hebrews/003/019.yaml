translation:
  language: es
  text: Y vemos que no pudieron entrar por incredulidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "falta de fe" o "infidelidad". El griego ἀπιστία puede denotar no solo incredulidad, sino también una negativa no fiel a confiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: La conjunción mantiene la continuidad discursiva con lo anterior sin introducir una inferencia más fuerte de la que tiene el griego.
- source_word: βλέπομεν
  english_pob_choice: we see
  chosen_spanish: vemos
  alternatives_spanish:
  - observamos
  - es evidente
  lexicon: BDAG
  rationale: 'El presente de primera persona plural conserva el tono argumentativo y directo del autor: no solo se concluye algo, sino que ''vemos'' el resultado del razonamiento.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Introduce de manera natural la cláusula de contenido en español y preserva la estructura sintáctica del original.
- source_word: οὐκ ἠδυνήθησαν
  english_pob_choice: they were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no tenían la capacidad de
  lexicon: BDAG
  rationale: '''Pudieron'' reproduce bien la idea de capacidad/in capacidad de δύναμαι en un español natural y más conciso que ''fueron capaces''.'
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - pasar
  lexicon: BDAG
  rationale: '''Entrar'' es la equivalencia más directa y sobria para el infinitivo de εἰσέρχομαι, adecuada al contexto de entrar en el reposo prometido.'
- source_word: δι’ ἀπιστίαν
  english_pob_choice: because of unbelief
  chosen_spanish: por falta de fe
  alternatives_spanish:
  - por incredulidad
  - a causa de incredulidad
  lexicon: BDAG
  rationale: La construcción causal se expresa con naturalidad en español. 'Falta de fe' mantiene el campo semántico de πίστις/ἀπιστία y deja abierta la tensión entre ausencia de fe y deslealtad incrédula.
theological_decisions:
- issue: Renderización de ἀπιστία frente a la tensión entre 'unbelief' y 'faithlessness'
  english_pob_reading: unbelief
  chosen_spanish_reading: falta de fe
  alternative_spanish_readings:
  - incredulidad
  - infidelidad
  rationale: '''Falta de fe'' conserva el sentido principal de no creer/ no confiar, pero también permite percibir la dimensión relacional y de rechazo al confiar en la palabra de Dios. En este contexto de Hebreos 3, esa amplitud es útil sin forzar una interpretación doctrinal cerrada.'
  doctrine_reference: 'DOCTRINE.md: términos en tensión para πίστις; nota lexical sobre ἀπιστία'
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y su decisión principal ('unbelief') con la nota alternativa ('faithlessness'). La versión española conserva la causalidad explícita, la incapacidad verbal y la tensión semántica de ἀπιστία sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - '''Fe'' se mantiene en un registro eclesial común y no se sustituye por un tecnicismo.'
  - La puntuación y el orden oracional siguen un español natural sin añadir elementos interpretativos ajenos al verso.
