  glossary_alignment: 'No hay conflicto con los términos globales principales. La decisión relevante es θεράπων: aquí no corresponde «esclavo»; «siervo» es la mejor opción contextual en español para preservar la distinción con δοῦλος y mantener el tono bíblico. «Casa» debe retenerse, conforme al proyecto y al contexto de Hebreos 3.'
