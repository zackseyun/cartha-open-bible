translation:
  language: es
  text: Y Moisés, en efecto, fue fiel en toda su casa como siervo[a], para testimonio de lo que se hablaría después[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «servidor». El griego θεράπων señala un servicio honorable, distinto de δοῦλος. La imagen de «casa» se mantiene en el texto.
    reason: lexical_alternative
  - marker: b
    text: O «de las cosas que habrían de ser dichas». La frase apunta hacia revelación divina posterior.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Además
  lexicon: BDAG
  rationale: Conserva la conexión discursiva inmediata con el contraste anterior y suena natural en español al iniciar una afirmación continuada.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moysés
  lexicon: BDAG
  rationale: Nombre propio normalizado en español bíblico y plenamente reconocible para el lector.
- source_word: μὲν
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - por una parte
  lexicon: BDAG
  rationale: Expresa el matiz anticipatorio de contraste sin sonar artificial; prepara la oposición que continúa en el verso siguiente.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - confiable
  lexicon: BDAG
  rationale: «Fiel» es la equivalencia natural y precisa para la idea de confiabilidad perseverante de Moisés en este contexto.
- source_word: ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  english_pob_choice: in all his house
  chosen_spanish: en toda su casa
  alternatives_spanish:
  - en toda su familia
  - en todo su hogar
  lexicon: BDAG
  rationale: Mantiene la imagen bíblica de «casa» como esfera/ámbito de pertenencia y servicio, no reducida a un hogar doméstico.
- source_word: ὡς θεράπων
  english_pob_choice: as a servant
  chosen_spanish: como servidor[a]
  alternatives_spanish:
  - como siervo
  - como asistente
  lexicon: BDAG
  rationale: «Servidor» preserva el sentido de servicio honorable de θεράπων sin introducir la connotación más fuerte de δοῦλος; se deja la alternativa en nota porque el término puede sentirse también como «siervo» o «asistente» según el registro.
- source_word: εἰς μαρτύριον
  english_pob_choice: for a testimony
  chosen_spanish: para testimonio
  alternatives_spanish:
  - como testimonio
  - en testimonio
  lexicon: BDAG
  rationale: Reproduce la finalidad/testimonio de manera directa y sobria, manteniendo la relación entre el servicio de Moisés y su función testimonial.
- source_word: τῶν λαληθησομένων
  english_pob_choice: of the things that would be spoken later
  chosen_spanish: de lo que se hablaría después
  alternatives_spanish:
  - de las cosas que habrían de ser habladas
  - de lo que iba a ser dicho más tarde
  lexicon: BDAG
  rationale: Conserva la referencia futura y el carácter pasivo del participio sin forzar una construcción demasiado literal en español; «se hablaría después» resulta natural y todavía auditable.
theological_decisions:
- issue: Valor de θεράπων frente a otros términos de servicio
  english_pob_reading: Moses is called a 'servant,' not a 'slave.'
  chosen_spanish_reading: Moisés es llamado «servidor», no «esclavo».
  alternative_spanish_readings:
  - siervo
  - asistente
  rationale: El griego usa θεράπων, que en este contexto designa un servidor de dignidad honorable. En español, «servidor» conserva esa valoración sin confundirlo con δοῦλος, que sí suele requerir «esclavo» cuando el texto lo exige. La nota mantiene abierta la alternativa traductológica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen de «casa» en la frase ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  english_pob_reading: '''his house'' is retained as the biblical metaphor for the sphere of God''s household in which Moses served, without resolving it into merely a literal domestic household.'
  chosen_spanish_reading: Se conserva «su casa» como metáfora bíblica del ámbito en que Moisés sirvió, no como simple vivienda o familia nuclear.
  alternative_spanish_readings:
  - su hogar
  - su familia
  rationale: Hebreos desarrolla la imagen de la casa en el contexto inmediato, de modo que conviene no deshacerla. «Casa» permite que el lector siga la argumentación del pasaje y la conexión con el trasfondo bíblico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se introdujeron cambios respecto al pase más reciente, y el acuerdo de control cruzado fue alto (1.0).'
  spanish_consistency_notes:
  - Se mantiene «Moisés» para el nombre propio y «casa» para οἶκος, respetando la metáfora bíblica.
  - Se usa «fiel» para πιστός y «servidor» para θεράπων, preservando la distinción semántica con posibles términos más fuertes como «esclavo».
  - La clausula final conserva la futuridad del participio pasivo con una sintaxis natural en español.
