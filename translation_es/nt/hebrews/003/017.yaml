translation:
  language: es
  text: ¿Y con quién estuvo airado durante cuarenta años? ¿No fue con los que pecaron, cuyos cuerpos[a] cayeron en el desierto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuyos cadáveres cayeron en el desierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσώχθισεν
  english_pob_choice: was he angry
  chosen_spanish: estuvo airado
  alternatives_spanish:
  - estuvo enojado
  - estuvo irritado
  - se indignó
  lexicon: BDAG
  rationale: El verbo expresa enojo/indignación hacia alguien. «Estuvo airado» conserva el tono de ira divina de forma natural en español y corresponde bien a la pregunta retórica. «Se indignó» es posible, pero puede sonar más interpretativo; «enojado» es más coloquial.
- source_word: τεσσεράκοντα ἔτη
  english_pob_choice: for forty years
  chosen_spanish: durante cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - por cuarenta años enteros
  lexicon: BDAG
  rationale: La expresión acusativa indica duración de tiempo. «Durante cuarenta años» suena natural en español y mantiene el valor durativo sin añadir énfasis no presente en el griego.
- source_word: ἁμαρτήσασιν
  english_pob_choice: those who sinned
  chosen_spanish: los que pecaron
  alternatives_spanish:
  - los que pecaron contra él
  - los que cometieron pecado
  - los que habían pecado
  lexicon: BDAG
  rationale: El participio aoristo describe al grupo caracterizado por su pecado en el contexto del desierto. «Los que pecaron» es directo, fiel y idiomático; conserva el paralelismo con la pregunta anterior.
- source_word: κῶλα
  english_pob_choice: bodies
  chosen_spanish: cuerpos
  alternatives_spanish:
  - cadáveres
  - cuerpos muertos
  - miembros
  lexicon: BDAG
  rationale: Aunque el término puede referirse literalmente a miembros del cuerpo, aquí funciona idiomáticamente para las víctimas del juicio en el desierto. «Cuerpos» comunica el sentido sin volverlo demasiado técnico. «Cadáveres» intensifica el matiz de muerte, pero es más duro y menos neutro.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron abatidos
  - murieron
  - quedaron tendidos
  lexicon: BDAG
  rationale: El verbo singular con sujeto neutro plural en griego expresa la caída de los cuerpos. «Cayeron» conserva la imagen verbal y deja implícito el juicio/muerte, como en el inglés POB.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto del éxodo
  - en el desierto
  - en la estepa
  lexicon: BDAG
  rationale: Aunque «wilderness» suele traducirse «desierto» en español, aquí el contexto bíblico del éxodo y la generación incrédula lo hace claro. «En el desierto» es natural y suficientemente amplio para este pasaje.
theological_decisions:
- issue: Sujeto implícito de «estuvo airado»
  english_pob_reading: he = God
  chosen_spanish_reading: él = Dios
  alternative_spanish_readings:
  - él = Yahvé
  - Dios estaba airado
  rationale: El griego deja implícito el sujeto, que el contexto identifica con Dios. En español, la pregunta se entiende naturalmente con el pronombre implícito y no necesita explicitarse; sin embargo, la lectura teológica sigue siendo que se trata de la ira de Dios.
  doctrine_reference: Contexto inmediato de Hebreos 3 y el relato de Números 14
- issue: Valor de κῶλα en el juicio del desierto
  english_pob_reading: bodies
  chosen_spanish_reading: cuerpos
  alternative_spanish_readings:
  - cadáveres
  - restos
  rationale: El texto alude a la generación juzgada en el desierto. «Cuerpos» mantiene el paralelismo y evita sobrecargar el verso con una palabra más interpretativa; la alternativa «cadáveres» queda disponible como matiz más crudo, tal como el inglés POB lo preserva en nota.
  doctrine_reference: Hebreos 3:17; Números 14; 1 Corintios 10:5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el audit trail en inglés POB: conserva la pregunta retórica, explicita el lapso temporal con una frase natural en español, traduce el participio como grupo caracterizado por el pecado, y mantiene el sentido de juicio del desierto sin forzar el léxico. Se preserva en nota la alternativa más cruda para κῶλα, como en la tradición auditada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar para el nombre divino en el proyecto, pero en este versículo el sujeto está implícito y no aparece una forma explícita del nombre.
  - Se prefirió «desierto» sobre «wilderness» por naturalidad bíblica en español y porque el contexto del éxodo evita ambigüedad.
  - «Cuerpos» mantiene la elección semántica del English POB frente a «cadáveres», que queda en nota como alternativa lexical.
  - El tono general es formal pero fluido, evitando arcaismos innecesarios.
