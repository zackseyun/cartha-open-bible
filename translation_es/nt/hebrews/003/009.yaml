translation:
  language: es
  text: donde sus padres me pusieron[a] a prueba por medio de una prueba[b] y vieron mis obras[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me probaron»; la idea de πειράζω aquí es la de poner a prueba, desafiar o probar, con tono adverso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en prueba», «por prueba» o «poniéndome a prueba»; la expresión ἐν δοκιμασίᾳ es difícil y puede indicar medio o modo.'
    reason: lexical_alternative
  - marker: c
    text: 'Algunas traducciones: «y, sin embargo, vieron mis obras» o «aunque vieron mis obras»; el griego tiene simplemente «y vieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: El adverbio relativo retoma el escenario del desierto/tiempo de la cita previa; en español, 'donde' conserva mejor el valor espacial implícito sin forzar una paráfrasis temporal.
- source_word: ἐπείρασαν
  english_pob_choice: tested
  chosen_spanish: pusieron a prueba
  alternatives_spanish:
  - probaron
  - tentaron
  lexicon: BDAG
  rationale: '''Pusieron a prueba'' comunica el acto de probar/desafiar con fuerza y evita la ambigüedad de ''tentaron'', que en español suele sonar demasiado a ''tempted''. Preserve el matiz negativo de la cita.'
- source_word: οἱ πατέρες ὑμῶν
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: BDAG
  rationale: La referencia es al grupo ancestral de la audiencia; 'sus padres' mantiene la relación posesiva y el registro bíblico. 'Antepasados' aclara, pero suaviza la forma lexical de la cita.
- source_word: ἐν δοκιμασίᾳ
  english_pob_choice: by trial
  chosen_spanish: a prueba
  alternatives_spanish:
  - en prueba
  - por prueba
  - en el acto de probar
  lexicon: BDAG
  rationale: La frase es difícil y puede expresar medio o modo. 'A prueba' refleja en español una relación instrumental/idiomática cercana a 'by trial' y conserva la tensión interpretativa sin resolverla de manera excesiva.
- source_word: καὶ εἶδον
  english_pob_choice: and saw
  chosen_spanish: y vieron
  alternatives_spanish:
  - aunque vieron
  - y aun vieron
  lexicon: BDAG
  rationale: La coordinación simple de καί se reproduce con 'y'. Se mantiene la lectura básica sin introducir una concesión explícita que el griego no formula de manera directa.
- source_word: τὰ ἔργα μου
  english_pob_choice: my works
  chosen_spanish: mis obras
  alternatives_spanish:
  - mis hechos
  - mis actos
  lexicon: BDAG
  rationale: '''Obras'' preserva el léxico bíblico y el paralelismo con el original. En este contexto se refiere a las acciones de Dios en el desierto, no a obras humanas meritorias.'
theological_decisions:
- issue: Objeto implícito de la prueba
  english_pob_reading: tested me
  chosen_spanish_reading: me pusieron a prueba
  alternative_spanish_readings:
  - pusieron a prueba
  - me probaron
  rationale: Aunque el objeto explícito no aparece en esta cláusula griega, el contexto de la cita y la lectura auditada del POB lo hacen implícito. En español se conserva 'me' para evitar ambigüedad y reflejar el referente divino del discurso.
  doctrine_reference: Primacía del texto original; mantener el referente teológico sin añadir contenido ajeno a la cita.
- issue: Relación de 'a prueba' con δοκιμασία
  english_pob_reading: by trial
  chosen_spanish_reading: a prueba
  alternative_spanish_readings:
  - en prueba
  - por prueba
  rationale: El griego admite una relación de medio o modo difícil de fijar. 'A prueba' en español naturaliza la construcción sin borrar la dificultad lexical, y deja abierta la posibilidad de entender el matiz como modo o medio.
  doctrine_reference: Evitar resolver indebidamente una ambigüedad léxica donde el texto fuente la mantiene.
translation_notes:
  revision_awareness: La redacción sigue la lectura auditada más reciente del inglés POB, que prefirió 'by trial' para ἐν δοκιμασίᾳ y mantuvo la coordinación simple de καί. En español se preserva esa ambigüedad con 'a prueba' y se evita introducir una concesión no marcada en el griego.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto cuando aparezca el tetragrámaton; aquí el sujeto está implícito en la cita y no requiere normalización adicional.
  - '''Obras'' conserva la terminología bíblica y la correspondencia con τὰ ἔργα μου.'
  - Se usa una construcción verbal natural en español ('me pusieron a prueba') para reflejar el objeto implícito sin perder la relación directa con el griego.
