  to: donde sus padres me pusieron[a] a prueba por medio de una prueba[b] y vieron mis obras[c],
  rationale: Se revisa para hacer visible en español la dificultad de ἐν δοκιμασίᾳ como elemento distinto de ἐπείρασαν y para alinear mejor los anclajes de notas con las unidades griegas. «Por medio de una prueba» no es la opción más elegante, pero preserva la tensión semántica documentada por el POB mejor que la locución compacta «me pusieron a prueba» sola.
