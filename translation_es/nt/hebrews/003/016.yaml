translation:
  language: es
  text: Porque ¿quiénes, cuando oyeron, se rebelaron?[a] ¿No fueron todos los que salieron de Egipto por medio de Moisés?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oyeron y provocaron» (o «amargaron»). El verbo griego puede traducirse más literalmente así, pero aquí se refiere a la rebelión de Israel contra Dios en el desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνες
  english_pob_choice: who
  chosen_spanish: ¿quiénes?
  alternatives_spanish:
  - ¿quién?
  - ¿cuáles?
  lexicon: BDAG
  rationale: El griego usa un interrogativo plural para identificar al grupo culpable. En español, «¿quiénes?» conserva mejor el plural y el tono retórico que una forma singular o más vaga.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: habiendo oído
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo funciona como circunstancia temporal previa a la acción principal. «Habiendo oído» mantiene esa relación sin forzar una subordinada demasiado explicativa.
- source_word: παρεπίκραναν
  english_pob_choice: rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - provocaron
  - amargaron
  - fueron rebeldes
  lexicon: BDAG
  rationale: En este contexto de Hebreos, el verbo alude a la desobediencia y oposición de Israel en el desierto. «Se rebelaron» comunica esa fuerza covenantal con naturalidad en español, sin perder la tensión con la posibilidad más literal de «provocaron».
- source_word: ἐξελθόντες
  english_pob_choice: those who came out
  chosen_spanish: los que salieron
  alternatives_spanish:
  - los que vinieron fuera
  - los que habían salido
  lexicon: BDAG
  rationale: El participio sustantivado describe al grupo del éxodo. «Los que salieron» es la equivalencia más natural en español y conserva la referencia narrativa.
- source_word: ἐξ Αἰγύπτου
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: BDAG
  rationale: Con «salieron», el genitivo de origen se expresa de forma idiomática en español como «de Egipto». Evita una redundancia poco natural sin alterar el sentido espacial.
- source_word: διὰ Μωϋσέως
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por Moisés
  - a través de Moisés
  lexicon: BDAG
  rationale: διά con genitivo señala mediación/instrumentalidad. «Por medio de Moisés» preserva explícitamente esa función mediadora y suena más natural y preciso que un calco rígido.
theological_decisions:
- issue: Relación entre el oír y la rebelión en la generación del desierto
  english_pob_reading: Render as a rhetorical question that ties hearing directly to rebellion, preserving the wilderness allusion.
  chosen_spanish_reading: Mantener la pregunta retórica con «habiendo oído» y «se rebelaron», para que el acto de oír quede inmediatamente vinculado con la desobediencia.
  alternative_spanish_readings:
  - ¿quiénes, cuando oyeron, se rebelaron?
  - ¿quiénes, después de oír, se rebelaron?
  rationale: La forma participial del griego no solo informa tiempo, sino que enmarca la culpa de Israel tras recibir la palabra. La solución española conserva esa secuencia y la fuerza acusatoria sin añadir explicación doctrinal.
  doctrine_reference: Hebreos 3:16; intertextualidad con la rebelión de Israel en el desierto (cf. Sal 95 en el argumento de Hebreos 3).
- issue: Sentido de παραπικραίνω en contexto de rebelión
  english_pob_reading: Use 'rebelled' and preserve the more literal provoked/embittered in a note.
  chosen_spanish_reading: Usar «se rebelaron» en el texto principal y conservar en nota la posibilidad más literal de «provocaron» o «amargaron».
  alternative_spanish_readings:
  - provocaron
  - amargaron
  - enfurecieron
  rationale: En español, «se rebelaron» comunica mejor el contenido narrativo-teológico que el lector necesita en Hebreos. Sin embargo, la nota preserva la tensión léxica del verbo griego para no borrar el matiz más literal documentado por la tradición de traducción.
  doctrine_reference: Principio POB de equivalencia óptima con trazabilidad léxica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión del audit trail que ajustó la primera cláusula para reflejar mejor el participio ἀκούσαντες como una acción previa («when they heard»). En español se resolvió con «habiendo oído», manteniendo la estructura retórica y la secuencia temporal. También se conservó la lectura estable de la segunda cláusula con mediación de Moisés.
  spanish_consistency_notes:
  - Se usa «Moisés» sin artículos ni perífrasis interpretativas, en paralelo al griego.
  - «Se rebelaron» mantiene el tono narrativo y acusatorio del contexto de Hebreos 3 sin suprimir la alternativa literal en nota.
  - «Por medio de» se emplea consistentemente para διά con genitivo cuando el foco es mediación o instrumento.
  - La puntuación conserva el carácter de pregunta retórica doble del original.
