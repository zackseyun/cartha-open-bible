review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura interrogativa retórica, el sentido temporal de ἀκούσαντες y la decisión contextual de traducir παρεπίκραναν como «se rebelaron». También conserva correctamente «todos los que salieron de Egipto por medio de Moisés». Sin embargo, «habiendo oído» suena algo calcado y menos natural en español bíblico moderno que «cuando oyeron», una alternativa ya documentada en el propio expediente y muy adecuada para el participio aoristo circunstancial.
  spanish_quality_summary: El texto es claro y fiel, pero puede mejorarse en naturalidad y fluidez. «Porque ¿quiénes, habiendo oído, se rebelaron?» es comprensible, aunque algo rígido. «Porque ¿quiénes, cuando oyeron, se rebelaron?» suena más idiomático y mantiene igual precisión. La nota al pie es útil, pero «amargaron» en español transitivo sin objeto puede sonar confuso; conviene explicitar que es una alternativa más literal del verbo griego, no una opción principal de lectura.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, δοῦλος ni otros términos sensibles del glosario. La decisión «se rebelaron» para παρεπίκραναν concuerda con la justificación teológica y léxica del POB, y la mediación de διά se conserva bien con «por medio de Moisés».
  issues:
  - severity: medium
    issue: «habiendo oído» suena poco natural en este contexto
    rationale: Aunque es gramatical y cercano al participio griego, en español moderno y eclesial amplio resulta más fluido «cuando oyeron», que además coincide con la revisión inglesa auditada y preserva la relación temporal sin rigidez.
  - severity: low
    issue: La nota con «amargaron» puede sonar ambigua en español
    rationale: Como alternativa literal trazable es defendible, pero en español sin complemento directo no comunica bien. Conviene enmarcarla claramente como traducción más literal posible del verbo, no como lectura contextual preferida.
  revised_spanish_text: Porque ¿quiénes, cuando oyeron, se rebelaron?[a] ¿No fueron todos los que salieron de Egipto por medio de Moisés?
