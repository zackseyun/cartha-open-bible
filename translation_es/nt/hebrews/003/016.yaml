revisions:
- from: Porque ¿quiénes, habiendo oído, se rebelaron?[a] ¿No fueron todos los que salieron de Egipto por medio de Moisés?
  to: Porque ¿quiénes, cuando oyeron, se rebelaron?[a] ¿No fueron todos los que salieron de Egipto por medio de Moisés?
  rationale: Se ajusta «habiendo oído» a «cuando oyeron» para lograr un español más natural sin perder la fuerza temporal del participio griego ni la estructura retórica del original. También se afina la nota para reflejar mejor la alternativa inglesa auditada («heard and provoked/embittered») y evitar que la opción literal quede demasiado suelta o ambigua en español.
