    text: O «oyeron y provocaron» (o «amargaron»). El verbo griego puede traducirse más literalmente así, pero aquí se refiere a la rebelión de Israel contra Dios en el desierto.
    reason: lexical_alternative
  revision_rationale: Se ajusta «habiendo oído» a «cuando oyeron» para lograr un español más natural sin perder la fuerza temporal del participio griego ni la estructura retórica del original. También se afina la nota para reflejar mejor la alternativa inglesa auditada («heard and provoked/embittered») y evitar que la opción literal quede demasiado suelta o ambigua en español.
