  source_alignment_summary: 'El borrador español transmite con fidelidad la pregunta retórica del griego: juró, no entrarían, su reposo, y los que desobedecieron. La única falla relevante está en la nota al pie: presenta como alternativa exactamente la misma frase que ya está en el texto principal, por lo que no preserva correctamente la intención del rastro auditado en inglés, que documenta una alternativa léxica distinta.'
  spanish_quality_summary: El español es claro, natural y digno. «¿Y a quiénes juró que no entrarían en su reposo, sino a los que desobedecieron?» suena bien y mantiene buena legibilidad bíblica. No requiere cambio en el texto base.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Reposo» para κατάπαυσις y «desobedecieron» para ἀπειθήσασιν están bien alineados con las decisiones léxicas y teológicas documentadas.
  issues:
  - severity: medium
    issue: La nota al pie repite la misma redacción del texto principal como si fuera alternativa.
    rationale: El texto principal ya dice «a los que desobedecieron», pero la nota comienza con «O «a los que desobedecieron»». Eso anula la función de la nota de alternativa léxica y no refleja bien el audit trail inglés, que contrasta matices como desobediencia caracterizada vs. acto de desobedecer.
  - severity: low
    issue: La nota al pie podría formular mejor el matiz del participio griego.
    rationale: Conviene que la alternativa exprese un matiz real, por ejemplo «a los que fueron desobedientes» o «a los desobedientes», mientras se explica que el participio puede enfatizar el acto de negarse a obedecer y su relación contextual con la incredulidad.
  revised_spanish_text: ¿Y a quiénes juró que no entrarían en su reposo[a], sino a los que desobedecieron?
  revised_footnotes:
  - marker: a
    text: O «a los que fueron desobedientes». El participio griego puede enfatizar el acto de negarse a obedecer; en el contexto, esta desobediencia está estrechamente relacionada con la incredulidad (cf. Heb 3:19).
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que ofrezca una alternativa léxica real y coherente con el expediente inglés, en vez de repetir la misma frase del cuerpo del texto.
