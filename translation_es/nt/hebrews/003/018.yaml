translation:
  language: es
  text: ¿Y a quiénes juró que no entrarían en su reposo[a], sino a los que desobedecieron?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que desobedecieron». El participio griego puede enfatizar el acto de negarse a obedecer; en el contexto, esta desobediencia está estrechamente relacionada con la incredulidad (cf. Heb 3:19).
    reason: lexical_alternative
lexical_decisions:
- source_word: τίσιν
  english_pob_choice: to whom
  chosen_spanish: ¿a quiénes?
  alternatives_spanish:
  - ¿a quién?
  - ¿a cuáles personas?
  lexicon: BDAG
  rationale: El dativo plural interrogativo se refiere a personas; en español, «¿a quiénes?» es la forma natural y conserva el valor retórico de la pregunta.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: δέ enlaza con la argumentación previa sin exigir una oposición fuerte; «Y» mantiene la continuidad discursiva de manera idiomática en español.
- source_word: ὤμοσεν
  english_pob_choice: did he swear
  chosen_spanish: juró
  alternatives_spanish:
  - hizo juramento
  - prestó juramento
  lexicon: BDAG
  rationale: El aoristo de ὀμνύω expresa jurar o prestar juramento. En español, «juró» es breve, solemne y adecuado al giro interrogativo.
- source_word: μὴ εἰσελεύσεσθαι
  english_pob_choice: that they would not enter
  chosen_spanish: que no entrarían
  alternatives_spanish:
  - que no entrarían a
  - que no habrían de entrar
  lexicon: BDAG
  rationale: Tras ὀμνύω, la infinitiva expresa el contenido del juramento. En español, el estilo indirecto «que no entrarían» comunica con claridad la promesa jurada de exclusión.
- source_word: εἰς τὴν κατάπαυσιν αὐτοῦ
  english_pob_choice: his rest
  chosen_spanish: en su reposo
  alternatives_spanish:
  - a su reposo
  - en su descanso
  - en su reposo eterno
  lexicon: BDAG
  rationale: κατάπαυσις en Hebreos tiene la carga temática del reposo de Dios. «Reposo» conserva ese eco bíblico en español; el verbo «entrar» ya expresa el movimiento, por lo que no hace falta añadir «a» o «en» en la frase inglesa, pero en español «en su reposo» suena natural tras «entrarían».
- source_word: εἰ μὴ
  english_pob_choice: if not
  chosen_spanish: sino a
  alternatives_spanish:
  - excepto a
  - a no ser a
  lexicon: BDAG
  rationale: En esta pregunta retórica, εἰ μὴ introduce la excepción esperada. En español, «sino a» reproduce bien la lógica de exclusión y el contraste implícito.
- source_word: τοῖς ἀπειθήσασιν
  english_pob_choice: to those who disobeyed
  chosen_spanish: a los que desobedecieron
  alternatives_spanish:
  - a los desobedientes
  - a los que fueron desobedientes
  - a los que no obedecieron
  lexicon: BDAG
  rationale: El aoristo participial de ἀπειθέω señala la acción concreta de desobedecer. «Desobedecieron» refleja mejor esa acción puntual y mantiene la distinción léxica con «incredulidad», que queda implícita por el contexto de Hebreos 3.
theological_decisions:
- issue: Relación entre desobediencia e incredulidad en Hebreos 3
  english_pob_reading: those who disobeyed
  chosen_spanish_reading: los que desobedecieron
  alternative_spanish_readings:
  - los que fueron desobedientes
  - los incrédulos
  rationale: El contexto inmediato une desobediencia e incredulidad, pero aquí el texto griego usa ἀπειθήσασιν y no ἀπιστέω. Mantener «desobedecieron» preserva la tensión léxica y evita borrar la distinción que el pasaje deja entre la acción y la raíz de la incredulidad.
  doctrine_reference: Hebreos 3:18–19; principios de distinción léxica en traducción bíblica
translation_notes:
  revision_awareness: El texto inglés del POB pasó de «were disobedient» a «disobeyed» en una revisión posterior para reflejar con mayor precisión el participio aoristo ἀπειθήσασιν y mantener la frase concisa y natural. La presente versión española sigue esa última decisión, usando un verbo en pasado simple para reproducir la acción concreta del participio.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto cuando corresponda, pero en este versículo no aparece el tetragrámaton.
  - «Reposo» se mantiene para κατάπαυσις, en coherencia con el lenguaje temático de Hebreos.
  - Se evita «SEÑOR» como sustituto del nombre divino, porque aquí el posesivo «su» depende del referente del contexto y no requiere máscara nominal.
  - La pregunta retórica conserva el orden y la fuerza del griego sin añadir interpretación doctrinal extra.
  - «Desobedecieron» preserva la dimensión verbal del participio aoristo y no la reduce a un adjetivo sustantivado.
