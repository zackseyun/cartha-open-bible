translation:
  language: es
  text: Porque toda casa es construida por alguien, pero Dios es quien construyó todas las cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - toda una
  lexicon: BDAG
  rationale: Con οἶκος singular, πᾶς tiene valor distributivo. En español, 'toda casa' comunica de forma natural la generalidad del enunciado sin sonar forzado ni introducir un plural inexistente.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación del argumento anterior. 'Porque' preserva bien esa relación causal/expositiva en español contemporáneo.
- source_word: οἶκος
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  lexicon: BDAG
  rationale: El contexto inmediato usa la imagen concreta de una casa para la analogía. 'Casa' mantiene esa imagen sin trasladarla prematuramente a 'familia' o 'hogar'.
- source_word: κατασκευάζεται
  english_pob_choice: is built
  chosen_spanish: es construida
  alternatives_spanish:
  - es edificada
  - se construye
  lexicon: BDAG
  rationale: El pasivo presente expresa que la casa recibe su construcción por un agente. 'Es construida' es claro, formal y conserva la metáfora arquitectónica.
- source_word: ὑπό τινος
  english_pob_choice: by someone
  chosen_spanish: por alguien
  alternatives_spanish:
  - por una persona
  - por alguno
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agencia. 'Por alguien' reproduce bien la indeterminación general de τις y evita una interpretación más específica de la necesaria.
- source_word: ὁ δὲ
  english_pob_choice: but the one who
  chosen_spanish: pero Dios es quien
  alternatives_spanish:
  - pero el que
  - pero quien
  lexicon: BDAG
  rationale: δέ introduce un contraste o avance argumental. En español, 'pero' funciona bien, y 'Dios es quien' hace explícita la identificación del sujeto sin perder naturalidad.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: BDAG
  rationale: πάντα abarca de modo amplio y total. 'Todas las cosas' conserva esa amplitud sin ampliar el sentido a una formulación más interpretativa como 'el universo entero'.
- source_word: κατασκευάσας
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - hizo
  lexicon: BDAG
  rationale: El aoristo participial señala al agente que llevó a cabo la acción completa. 'Construyó' mantiene continuidad léxica con 'es construida' y respeta el paralelismo del verso.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la Deidad
  lexicon: BDAG
  rationale: θεός es el referente directo de la afirmación final. 'Dios' es la traducción normal y exacta en español.
theological_decisions:
- issue: Identificación explícita de Dios como el constructor de todas las cosas
  english_pob_reading: God is the one who built all things.
  chosen_spanish_reading: Dios es quien construyó todas las cosas.
  alternative_spanish_readings:
  - Dios es quien edificó todas las cosas.
  - El que construyó todas las cosas es Dios.
  rationale: El griego final identifica a θεός como sujeto y afirma su relación con la construcción de 'todas las cosas'. La redacción elegida mantiene esa identificación de manera directa y natural en español, sin debilitar la afirmación teológica.
  doctrine_reference: Hebreos 3:4; afirmación de la soberanía creadora de Dios
- issue: Valor de 'πάντα' en la cláusula final
  english_pob_reading: all things
  chosen_spanish_reading: todas las cosas
  alternative_spanish_readings:
  - todo
  - todas
  rationale: '''Todas las cosas'' preserva el alcance universal de πάντα sin convertirlo en una paráfrasis cosmológica que exceda el texto. Se mantiene abierta la amplitud del enunciado.'
  doctrine_reference: Hebreos 3:4; alcance total de la acción divina
translation_notes:
  revision_awareness: El texto inglés fue revisado desde una formulación más literal ('the one who built all things is God') a una más natural en inglés formal ('God is the one who built all things') para hacer sujeto explícito a Dios. En español, la cláusula 'Dios es quien construyó todas las cosas' sigue esa misma decisión sintáctica y mantiene claro el sujeto teológico sin añadir contenido ajeno al griego.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo léxico entre 'es construida' y 'construyó' para reflejar κατασκευάζεται / κατασκευάσας.
  - Se eligió 'casa' para οἶκος siguiendo la imagen concreta del argumento, sin adelantar 'familia' o 'hogar'.
  - '''Por alguien'' conserva la indeterminación de τις, mientras que ''Dios'' queda explícito como sujeto de la cláusula final.'
  - '''Todas las cosas'' refleja el alcance total de πάντα y armoniza con el tono amplio del argumento en Hebreos 3:4.'
