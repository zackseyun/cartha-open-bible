    rationale: Aunque el participio puede comprimirse, en un versículo aislado español resulta más fiel y natural representar la predicación con «que fue fiel» o equivalente, como hizo el English POB.
  - severity: low
    issue: «Nombró» es algo más estrecho que el campo semántico contextual de ποιήσαντι
    rationale: «Designó» preserva mejor la idea de appoint/commission sin sonar solo a nombramiento formal de cargo y sin abrir la lectura de creación.
  - severity: low
