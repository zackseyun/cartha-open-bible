translation:
  language: es
  text: que fue fiel al que lo designó[a], tal como también Moisés en su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al que lo hizo». El verbo griego puede significar «hacer», pero aquí probablemente lleva el sentido de «designar» o «comisionar».'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «en toda su casa», en eco cercano de Números 12:7; otros leen simplemente «en su casa». La frase probablemente se refiere a la casa de Dios.
    reason: textual_variant
lexical_decisions:
- source_word: πιστὸν ὄντα
  english_pob_choice: who was faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - que fue fiel
  - siendo fiel
  lexicon: BDAG
  rationale: El participio acusativo modifica a Jesús desde el v. 1; en español, una estructura participial suelta suena menos natural que un adjetivo predicativo breve. «Fiel» conserva el valor de πιστός como confiable/leal, no como «creyente».
- source_word: τῷ ποιήσαντι αὐτὸν
  english_pob_choice: to the one who appointed him
  chosen_spanish: al que lo nombró
  alternatives_spanish:
  - al que lo hizo
  - al que lo designó
  - al que lo comisionó
  lexicon: BDAG
  rationale: ποιέω puede significar «hacer», pero en este contexto de encargo y comparación con Moisés el sentido funcional es de designación para una tarea o cargo. «Nombró» comunica bien esa comisión sin sugerir creación del Hijo.
- source_word: ὡς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: como también
  alternatives_spanish:
  - así como también
  - igual que también
  lexicon: BDAG
  rationale: La comparación con Moisés queda clara y natural en español con «como también», que reproduce la relación comparativa sin sobrecargar la frase.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio en español bíblico.
- source_word: ἐν τῷ οἴκῳ αὐτοῦ
  english_pob_choice: in all his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en toda su casa
  - en su hogar
  - en su casa de Dios
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «casa» para preservar la imagen bíblica que el pasaje desarrolla. No se añade «toda» en el texto principal porque el griego disponible en este testimonio dice simplemente «en su casa»; la amplitud intertextual se explica en nota.
theological_decisions:
- issue: Sentido de ποιήσαντι respecto del Hijo
  english_pob_reading: appointed
  chosen_spanish_reading: nombró
  alternative_spanish_readings:
  - hizo
  - creó
  - designó
  rationale: «Nombró» evita una lectura creativa/ontológica incorrecta y expresa la comisión o designación que el contexto sugiere. Así se conserva la tensión lexical de ποιέω sin imponer «creó».
  doctrine_reference: Credo niceno-constantinopolitano (381); primacía del contexto sobre una traducción mecánica de equivalencias posibles.
- issue: Alcance de «su casa» y su referente
  english_pob_reading: God's house, expressed as 'his house'
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - la casa de Dios
  - su casa, es decir, la casa de Dios
  rationale: El pronombre se deja sin explicitar para conservar la forma griega y la resonancia con Números 12:7. La referencia probable es la casa de Dios, pero el texto no la explicita de modo que deba resolverse en el cuerpo principal.
  doctrine_reference: Principio de preservar la tensión teológica y la intertextualidad sin sobreespecificar.
translation_notes:
  revision_awareness: 'El pasaje presenta un leve desajuste textual en la frase final: la tradición inglesa POB siguió una lectura más amplia («in all his house»), mientras que el griego SBLGNT aquí dado refleja la forma breve («en su casa»). La versión española mantiene la lectura del testimonio griego provisto en el texto principal y reserva la ampliación manuscrita para la nota textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se evita «siervo» para πιστός; «fiel» comunica mejor la cualidad de confiabilidad.
  - Se conserva «casa» y no «hogar» para mantener la imagen bíblica y su desarrollo en Hebreos.
  - «Nombró» se prefiere a «hizo» en el texto principal para evitar una lectura de creación del Hijo.
