  rationale: Se conserva el sentido del original y las decisiones teológicas del POB, pero se corrigen notas defectuosas y se mejora ligeramente la fluidez española. «Mantenemos» suena más natural que «retenemos» en esta construcción, mientras que las notas ahora presentan alternativas reales y útiles.
