    changes_summary: Revised 'sharers in' to 'partakers of' for a more natural and formal rendering of μέτοχοι ... τοῦ Χριστοῦ; changed 'assurance' to 'confidence' for ὑπόστασις in this context; adjusted word order to reflect the Greek more naturally while preserving all elements.
translation:
  language: es
  text: Porque hemos llegado a ser partícipes del Mesías[a], si en verdad mantenemos firme hasta el fin el comienzo de nuestra confianza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participantes del Mesías» o «copartícipes del Mesías».
    reason: lexical_alternative
  - marker: b
    text: O «seguridad». El término griego también puede significar «certeza» o, en algunos contextos, «sustancia» o «realidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: μέτοχοι
  english_pob_choice: partakers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - copartícipes
  - partícipes del Mesías
  lexicon: BDAG
  rationale: μέτοχοι expresa la idea de compartir algo en común. En español, «partícipes» comunica participación real sin el tono arcaico de «partícipes» como calco rígido de «partakers», y conserva el matiz relacional del término.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque el término funciona como título y no como nombre fijo. Esto sigue la pauta POB de traducir Χριστός cuando su valor titular es claro.
- source_word: γεγόναμεν
  english_pob_choice: have become
  chosen_spanish: hemos llegado a ser
  alternatives_spanish:
  - hemos venido a ser
  - somos
  lexicon: BDAG
  rationale: El perfecto griego señala un estado presente resultado de una acción pasada. «Hemos llegado a ser» preserva mejor ese valor resultativo que un simple «somos».
- source_word: ἐάνπερ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si realmente
  - si de veras
  - si en efecto
  lexicon: BDAG
  rationale: La partícula añade énfasis a la condición. «Si en verdad» reproduce esa fuerza con naturalidad en español.
- source_word: τὴν ἀρχὴν
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el inicio
  - la primera parte
  lexicon: BDAG
  rationale: Ἀρχή aquí apunta al estado o postura inicial. «El comienzo» es claro y evita sobreinterpretar el sustantivo.
- source_word: τῆς ὑποστάσεως
  english_pob_choice: confidence / assurance
  chosen_spanish: de nuestra confianza
  alternatives_spanish:
  - de nuestra seguridad
  - de nuestra certeza
  - de nuestra convicción
  lexicon: BDAG
  rationale: En este contexto ὑπόστασις se entiende mejor como confianza firme o seguridad confiada, no como «sustancia» metafísica. «Confianza» mantiene la ambigüedad auditable que el audit trail inglés preserva con nota.
- source_word: μέχρι τέλους
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: La expresión marca perseverancia a lo largo del trayecto completo. «Hasta el fin» es idiomático y sobrio en español bíblico moderno.
- source_word: βεβαίαν
  english_pob_choice: firm
  chosen_spanish: firme
  alternatives_spanish:
  - seguro
  - estable
  - firme y segura
  lexicon: BDAG
  rationale: El adjetivo describe estabilidad y solidez. «Firme» funciona naturalmente con «retener» y conserva el matiz de resistencia.
- source_word: κατάσχωμεν
  english_pob_choice: we hold
  chosen_spanish: retenemos
  alternatives_spanish:
  - mantenemos
  - sostenemos
  - guardamos
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula condicional expresa mantener/retener una postura o posesión. «Retener» refleja mejor ese valor perseverante que un simple «tener».
theological_decisions:
- issue: Cláusula condicional y perseverancia
  english_pob_reading: The verse is rendered with a real condition ('if indeed we hold firm...') without importing a specific doctrinal system about perseverance, apostasy, or evidential assurance.
  chosen_spanish_reading: 'La cláusula se traduce como condición real: «si en verdad retenemos firme...», sin resolver la cuestión doctrinal de si la perseverancia es evidencia o condición de la participación.'
  alternative_spanish_readings:
  - 'una lectura evidencial fuerte: la perseverancia prueba la participación previa'
  - 'una lectura de seguridad condicional: la participación se mantiene solo si continúa la perseverancia'
  rationale: El griego presenta una condición genuina, pero no obliga a cerrar debates teológicos posteriores. La traducción conserva la tensión sin decantarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto español sigue el último estado del audit trail inglés en los puntos clave: μέτοχοι se entiende como participación real; Χριστός se traduce como «Mesías» por su valor titular; ὑπόστασις se vierte como «confianza» en sentido contextual; y la cláusula condicional se mantiene abierta sin resolver la tensión doctrinal. Se evitó una traducción mecánica desde el inglés cuando la sintaxis española requería ordenar mejor los complementos.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» en lugar de «Cristo» conforme a la pauta POB para usos titulares.
  - Se usa «firme» con «retener» para conservar la relación entre βεβαίαν y κατάσχωμεν.
  - «Confianza» se eligió como solución principal, con nota para preservar las alternativas semánticas documentadas.
  - La puntuación y el orden reflejan español bíblico moderno, no calco del inglés.
