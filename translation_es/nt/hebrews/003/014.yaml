review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «hemos llegado a ser» conserva el perfecto γεγόναμεν; «si en verdad» representa adecuadamente ἐάνπερ; y «hasta el fin»/«firme»/«retenemos» reproducen de modo fiel la cláusula condicional. «del Mesías» sigue correctamente la política terminológica para Χριστός como título. El punto principal a corregir no es de sentido global sino de notas y pulido idiomático.'
  spanish_quality_summary: 'La redacción es clara y digna, pero hay dos problemas: la nota [b] es defectuosa porque ofrece «confianza» como alternativa cuando ya es la lectura del texto; y «retenemos firme hasta el fin el comienzo de nuestra confianza» suena algo rígido en español. Reordenar a «mantenemos firme... hasta el fin» mejora la legibilidad sin alejarse del griego.'
  glossary_alignment: 'La terminología clave está bien alineada: Χριστός -> «Mesías»; ὑπόστασις -> «confianza» con alternativas en nota; γεγόναμεν -> «hemos llegado a ser». Para μέτοχοι, «partícipes» es aceptable. Conviene ajustar la nota [a] para no repetir la misma opción del texto y dar una alternativa realmente distinta.'
  issues:
  - severity: medium
    issue: La nota [b] repite la lectura principal
    rationale: El texto ya dice «confianza», por lo que una nota que diga «O “confianza”» no preserva una alternativa real ni sigue la lógica del audit trail inglés, donde la alternativa era assurance frente a confidence.
  - severity: low
    issue: La nota [a] incluye una alternativa idéntica al texto base
    rationale: Decir «O “participantes del Mesías” o “partícipes del Mesías”» cuando el texto ya usa «partícipes del Mesías» vuelve redundante la nota. Debe dejarse solo una alternativa distinta o ampliar con otra formulación útil.
  - severity: low
    issue: El orden «retenemos firme hasta el fin el comienzo...» es algo forzado en español
    rationale: Aunque refleja el griego, en español suena más natural «mantenemos firme el comienzo... hasta el fin» o «retenemos hasta el fin...». Un leve ajuste mejora la legibilidad sin cambiar el sentido.
  revised_spanish_text: Porque hemos llegado a ser partícipes del Mesías[a], si en verdad mantenemos firme hasta el fin el comienzo de nuestra confianza[b].
  revised_footnotes:
