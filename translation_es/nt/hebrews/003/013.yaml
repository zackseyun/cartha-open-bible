base_translation:
  language: en
  yaml_path: translation/nt/hebrews/003/013.yaml
  text: But encourage one another every day[b][a], as long as it is called “Today,” so that none of you may be hardened by the deceitfulness of sin.
  footnotes:
  - marker: a
    text: “Today” echoes Psalm 95 and refers to the present time in which God’s call must be answered.
    reason: cross_reference
  - marker: b
    text: Or “exhort one another.” The Greek verb can mean encourage, exhort, urge, or comfort depending on context.
    reason: lexical_alternative
