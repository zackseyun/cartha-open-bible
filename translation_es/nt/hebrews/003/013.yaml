    rationale: Aunque posible, en Hebreos 3:13 el verbo tiene fuerte matiz de exhortación mutua para evitar el endurecimiento. "Anímense" puede sonar demasiado afectivo y menos admonitivo que el contexto requiere.
  - severity: low
