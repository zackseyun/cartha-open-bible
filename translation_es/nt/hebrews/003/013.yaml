  spanish_quality_summary: El español es claro y legible, con tono eclesial moderno adecuado. No obstante, "anímense" reduce el registro semántico, y "mientras se llama 'Hoy'" suena algo rígido. Un ajuste a "exhórtense unos a otros" y "mientras todavía se llama 'Hoy'" mejora fidelidad y naturalidad sin caer en calco.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto (Dios, Yahvé, Mesías, etc.). La decisión principal a corregir es léxica-contextual: para παρακαλεῖτε conviene priorizar "exhórtense" en el texto principal y dejar "anímense" como alternativa de nota, dada la función admonitiva del pasaje.'
  issues:
