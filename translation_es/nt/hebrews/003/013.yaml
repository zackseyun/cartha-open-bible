translation:
  language: es
  text: Pero exhórtense unos a otros[a][b] cada día, mientras todavía se llama “Hoy”, para que ninguno de ustedes sea endurecido por el engaño del pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Hoy” evoca el Salmo 95 y se refiere al tiempo presente en el que debe responderse al llamado de Dios.
    reason: cross_reference
  - marker: b
    text: O “anímense unos a otros”. El verbo griego puede significar exhortar, animar, urgir o consolar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce un contraste fuerte con la advertencia anterior; “Pero” es natural en español moderno y conserva la fuerza adversativa sin sonar arcaico.
- source_word: παρακαλεῖτε
  english_pob_choice: encourage
  chosen_spanish: anímense
  alternatives_spanish:
  - exhórtense
  - exhorten unos a otros
  - consuélense
  lexicon: BDAG
  rationale: El verbo puede abarcar exhortar, animar, urgir y consolar según el contexto. Aquí, en un llamado mutuo para perseverar, “anímense” comunica bien la función de fortalecerse unos a otros sin perder la dimensión exhortativa.
- source_word: ἑαυτοὺς
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - a ustedes mismos
  - entre ustedes
  lexicon: BDAG
  rationale: Aunque la forma es reflexiva, en un mandato plural tiene fuerza recíproca. “Unos a otros” expresa mejor esa reciprocidad en español natural.
- source_word: καθ’ ἑκάστην ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: BDAG
  rationale: La expresión indica repetición cotidiana. “Cada día” es claro, sobrio y fiel al sentido habitual.
- source_word: ἄχρις οὗ τὸ Σήμερον καλεῖται
  english_pob_choice: as long as it is called “Today”
  chosen_spanish: mientras se llama “Hoy”
  alternatives_spanish:
  - hasta que se llama “Hoy”
  - mientras se le llama “Hoy”
  lexicon: BDAG
  rationale: La frase marca el período vigente de respuesta. “Mientras se llama” conserva la idea durativa y deja visible la alusión escritural a Salmo 95; “Hoy” mantiene el valor teológico del término substantivado.
- source_word: τὸ Σήμερον
  english_pob_choice: “Today”
  chosen_spanish: “Hoy”
  alternatives_spanish:
  - “Hoy día”
  - “el Hoy”
  lexicon: BDAG
  rationale: El artículo con el adverbio funciona sustantivamente. En español, la cita “Hoy” preserva la carga intertextual sin forzar una perífrasis explicativa en el cuerpo del versículo.
- source_word: σκληρυνθῇ
  english_pob_choice: may be hardened
  chosen_spanish: sea endurecido
  alternatives_spanish:
  - se endurezca
  - sea endurecido en su corazón
  lexicon: BDAG
  rationale: El pasivo expresa una acción sufrida por la persona bajo la influencia del pecado. “Sea endurecido” es fiel y suficientemente natural en español bíblico contemporáneo.
- source_word: τις ἐξ ὑμῶν
  english_pob_choice: none of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - alguno de ustedes
  - nadie entre ustedes
  lexicon: BDAG
  rationale: Con μή en la cláusula final, el indefinido adquiere fuerza negativa distributiva. “Ninguno de ustedes” refleja bien el alcance del aviso en español idiomático.
- source_word: ἀπάτῃ τῆς ἁμαρτίας
  english_pob_choice: by the deceitfulness of sin
  chosen_spanish: por el engaño del pecado
  alternatives_spanish:
  - por la seducción del pecado
  - por la falsedad del pecado
  lexicon: BDAG
  rationale: 'El dativo es instrumental: la manera en que ocurre el endurecimiento. “Engaño” conserva la cualidad deceptiva del pecado; es más directo y natural que “deceitfulness” en español, y mantiene la tensión moral del texto.'
theological_decisions:
- issue: Reciprocidad comunitaria del mandato
  english_pob_reading: one another
  chosen_spanish_reading: unos a otros
  alternative_spanish_readings:
  - a ustedes mismos
  - entre ustedes
  rationale: El imperativo plural con pronombre reflexivo expresa acción mutua. Traducirlo como “unos a otros” evita una lectura individualista y conserva la responsabilidad comunitaria del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Sentido teológico de τὸ Σήμερον
  english_pob_reading: “Today” as a scriptural/theological time of present response
  chosen_spanish_reading: “Hoy” como tiempo presente de respuesta a la voz de Dios
  alternative_spanish_readings:
  - “Hoy” como simple referencia temporal
  - “hoy” sin eco intertextual
  rationale: Hebreos 3 hace eco explícito del Salmo 95. Mantener “Hoy” entre comillas preserva el peso canónico y la urgencia del momento de respuesta, sin cargar el texto principal con explicación excesiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 3
translation_notes:
  revision_awareness: El texto base y el análisis inglés coinciden estrechamente; no hubo revisiones aplicadas en el ciclo más reciente, y la lectura final mantiene el acuerdo alto del control cruzado. La redacción española sigue esa misma resolución, preservando el contraste adversativo, la reciprocidad del mandato, la alusión a Salmo 95 y la pasiva de endurecimiento.
  spanish_consistency_notes:
  - Se mantuvo “Hoy” con comillas para reflejar el valor substantivado y alusivo del griego.
  - Se evitó “SEÑOR” o una sustitución devocional no respaldada por el texto, porque aquí no aparece κύριος.
  - Se prefirió “pecado” en singular, conforme al genitivo singular del original y al sentido colectivo de la fuerza engañosa del pecado.
  - La cláusula final conserva voz pasiva en español (“sea endurecido”) para no diluir la idea de un efecto sufrido.
  - Se usó un registro bíblico contemporáneo, claro y digno, sin recurrir a arcaísmos innecesarios.
