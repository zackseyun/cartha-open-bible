review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido griego y la pauta del POB inglés: prohibición directa, «corazones», traducción descriptiva de παραπικρασμός como «rebelión», y nota con Meribá/Masá. Sin embargo, el segundo miembro no refleja la decisión auditada «as on the day...», porque «como en el día» fue racionalizado en las decisiones léxicas pero el texto principal quedó como «como en el día»? No: el borrador dice «como en el día de la prueba», que es aceptable pero menos natural; el problema principal es el anclaje de nota en «corazones», cuando la nota corresponde a «rebelión / día de la prueba». También conviene preferir «prueba» frente a «tentación» y mantener una formulación más natural y paralela.'
  spanish_quality_summary: El español es claro y digno, pero la nota está mal anclada y «como en el día de la prueba» suena algo rígido. Una leve mejora estilística y de ubicación de nota aumenta fidelidad y legibilidad sin cambiar el sentido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Rebelión» y «prueba» concuerdan con las decisiones del POB. «Desierto» es aceptable en español aunque «wilderness» tenga resonancia de «desierto/soledad»; no requiere cambio. No aparecen términos del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «corazones» en vez de en la alusión histórica.
    rationale: La nota explica la alternativa «Meribá / Masá», que corresponde a «la rebelión» y «el día de la prueba», no a «corazones». El anclaje actual induce a error editorial.
  - severity: low
    issue: La redacción del segundo miembro puede hacerse más natural en español.
    rationale: «Como en el día de la prueba» es comprensible, pero «como en el día de la prueba en el desierto» mantiene una repetición algo dura. «Como en el día de la prueba en el desierto» sigue siendo fiel; el ajuste clave es la nota. No hace falta reestructuración mayor.
  revised_spanish_text: No endurezcan sus corazones, como en la rebelión[a], como en el día de la prueba en el desierto.
  revised_footnotes:
  - marker: a
    text: 'O, siguiendo los topónimos hebreos detrás de Salmo 95:8: «como en Meribá, en el día de Masá en el desierto».'
    reason: alternative_reading
  revision_rationale: Se reubica la nota al segmento que realmente comenta, la alusión histórica a «la rebelión / el día de la prueba», sin alterar el contenido principal. El texto principal ya es básicamente fiel al griego y al POB auditado, por lo que solo se requiere esta reparación editorial menor.
