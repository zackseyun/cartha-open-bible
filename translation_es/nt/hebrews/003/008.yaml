translation:
  language: es
  text: No endurezcan sus corazones, como en la rebelión[a], como en el día de la prueba en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo los topónimos hebreos detrás de Salmo 95:8: «como en Meribá, en el día de Masá en el desierto».'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ σκληρύνητε
  english_pob_choice: do not harden
  chosen_spanish: No endurezcan
  alternatives_spanish:
  - No hagan duro
  - No se endurezcan
  lexicon: BDAG
  rationale: La forma prohibitiva se traduce de modo natural con un mandato negativo en segunda persona plural. «Endurezcan» conserva el matiz activo y culpable del verbo, sin volverlo pasivo o meramente descriptivo.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - corazones
  - interior
  lexicon: BDAG
  rationale: En el lenguaje bíblico, «corazones» es el equivalente natural para la sede de la voluntad, el pensamiento y la disposición interior. «Interior» explicaría más, pero perdería la formulación establecida.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: «Como» expresa bien la comparación con el ejemplo de Israel y suena más fluido en español bíblico contemporáneo.
- source_word: ἐν τῷ παραπικρασμῷ
  english_pob_choice: in the rebellion
  chosen_spanish: en la rebelión
  alternatives_spanish:
  - en la provocación
  - en Meribá
  lexicon: BDAG
  rationale: El sustantivo griego nombra el acto de provocar o rebelarse. «Rebelión» comunica el peso moral del pasaje y sigue la decisión inglesa de traducir descriptivamente el evento, no sustituirlo por el topónimo hebreo en el texto principal.
- source_word: κατὰ τὴν ἡμέραν
  english_pob_choice: as on the day
  chosen_spanish: como en el día
  alternatives_spanish:
  - como en el día
  - según el día
  lexicon: BDAG
  rationale: Aquí κατά con acusativo tiene valor comparativo/temporal en la cita. «Como en el día» preserva la paralela repetición de «como» y evita una construcción menos natural como «según el día».
- source_word: τοῦ πειρασμοῦ
  english_pob_choice: of testing
  chosen_spanish: de la prueba
  alternatives_spanish:
  - de la prueba
  - de la tentación
  - de la prueba/ensayo
  lexicon: BDAG
  rationale: En este contexto histórico de la travesía por el desierto, πειρασμός se refiere a la prueba o examen de la fidelidad, no principalmente a una tentación interior. «Prueba» mantiene esa amplitud y es idiomático en español.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en el desierto/ermo
  lexicon: BDAG
  rationale: Aunque «wilderness» suele rendirse por «desierto» o «desierto/soledad», aquí «desierto» comunica bien el trasfondo del éxodo y resulta natural en español. Se conserva la referencia al escenario bíblico de la prueba de Israel.
theological_decisions:
- issue: Allusión histórica de Salmo 95 en Hebreos 3:8
  english_pob_reading: Translate the Greek event nouns descriptively as 'the rebellion' and 'the day of testing' rather than replacing them with Hebrew place-names in the main text.
  chosen_spanish_reading: Traducir descriptivamente «la rebelión» y «el día de la prueba» en el texto principal, manteniendo la alusión histórica sin reemplazarla por nombres de lugar.
  alternative_spanish_readings:
  - como en Meribá, en el día de Masá en el desierto
  - como en la provocación
  rationale: Hebreos cita la forma griega del Salmo, y la traducción principal debe seguir el texto griego recibido. El trasfondo hebreo de Meribá y Masá sigue siendo importante, por eso se conserva como alternativa en nota, pero no sustituye la lectura principal.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del archivo inglés: se conserva el paralelismo de dos comparaciones con «como» y se refleja el valor de κατά con acusativo en «como en el día de la prueba». También se mantiene la decisión auditada de traducir el evento de Salmo 95 descriptivamente en el texto principal, dejando la opción de Meribá/Masá para nota.'
  spanish_consistency_notes:
  - Se usa «corazones» como término antropológico bíblico para καρδίας.
  - Se mantiene «desierto» para ἐρήμῳ por su resonancia bíblica en el éxodo.
  - No se emplea «SEÑOR» ni «Cristo» en este versículo.
  - La nota usa un solo marcador y aparece anclada en el texto principal en la frase correspondiente.
