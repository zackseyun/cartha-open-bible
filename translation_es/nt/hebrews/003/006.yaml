base_translation:
  language: en
  yaml_path: translation/nt/hebrews/003/006.yaml
  text: But the Messiah was faithful as a Son over his house[a], whose house we are[c][b], if we hold fast our boldness and the boast of our hope.
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah.' The Greek title Χριστός can function either as a title ('Messiah') or as a name-like designation ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'confidence' for 'boldness.' The Greek παρρησία can denote frankness, openness, or confident boldness.
    reason: lexical_alternative
  - marker: c
    text: Or 'the confidence of hope' or 'the exultation of hope.' The Greek καύχημα can mean 'boast,' 'ground of boasting,' or 'exultant confidence.'
    reason: lexical_alternative
