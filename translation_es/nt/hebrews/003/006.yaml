translation:
  language: es
  text: Pero el Mesías fue fiel como Hijo sobre su casa[a]; cuya casa somos nosotros, si retenemos con firmeza nuestra confianza[b] y el motivo de gloria de nuestra esperanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» para Χριστός. El título griego puede funcionar como designación titular («Mesías») o como forma casi nominal («Cristo»).
    reason: alternative_reading
  - marker: b
    text: O «audacia» para παρρησίαν. El término griego puede denotar franqueza, apertura o confianza valiente.
    reason: lexical_alternative
  - marker: c
    text: O «la exultación de nuestra esperanza» para τὸ καύχημα τῆς ἐλπίδος. Καύχημα puede significar aquello de que uno se gloría, su motivo de gloria, o la confianza exultante que nace de la esperanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto contrasta al Mesías con Moisés y favorece el valor titular de Χριστός. En español, «Mesías» conserva mejor ese valor de título que «Cristo», que suele funcionar más como nombre-forma.
- source_word: ὡς υἱός
  english_pob_choice: as a Son
  chosen_spanish: como Hijo
  alternatives_spanish:
  - como un Hijo
  lexicon: BDAG
  rationale: «Como Hijo» reproduce la comparación de ὡς y mantiene la referencia cristológica sin añadir artículo que el griego no exige. La mayúscula en español no es necesaria aquí para la fidelidad semántica.
- source_word: ἐπὶ τὸν οἶκον αὐτοῦ
  english_pob_choice: over his house
  chosen_spanish: sobre su casa
  alternatives_spanish:
  - sobre su hogar
  - sobre su casa y familia
  - sobre su casa/linaje
  lexicon: BDAG
  rationale: «ἐπί» con acusativo indica superintendencia o autoridad; «sobre» conserva bien esa fuerza. «Casa» mantiene la metáfora de οἶκος sin sustituirla por una explicación más amplia que el texto no da.
- source_word: ὃς οἶκός ἐσμεν ἡμεῖς
  english_pob_choice: whose house we are
  chosen_spanish: cuya casa somos nosotros
  alternatives_spanish:
  - y somos su casa
  - la cual casa somos nosotros
  lexicon: BDAG
  rationale: «Cuya casa somos nosotros» preserva la relación genitiva del relativo y suena natural en español. «Somos nosotros» conserva el énfasis del pronombre explícito ἡμεῖς.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: valentía
  alternatives_spanish:
  - confianza
  - franqueza
  - audacia
  lexicon: BDAG
  rationale: En Hebreos, παρρησία combina confianza y osadía ante Dios; «valentía» comunica bien el componente de firmeza y coraje sin sonar excesivamente técnico. La alternativa «confianza» sigue siendo válida, pero aquí se privilegia la fuerza exhortativa.
- source_word: καύχημα
  english_pob_choice: the boast
  chosen_spanish: la gloria
  alternatives_spanish:
  - el motivo de gloria
  - el motivo de orgullo
  - el jactarse
  lexicon: BDAG
  rationale: En contexto, καύχημα es aquello en que uno se gloría/boasta. «Gloria» intenta expresar en español la idea de regocijo u orgullo honorable sin introducir una jactancia vulgar; se reconoce que la imagen de «boast» queda atenuada, por lo que se documentan alternativas más literales.
- source_word: τῆς ἐλπίδος
  english_pob_choice: of our hope
  chosen_spanish: de nuestra esperanza
  alternatives_spanish:
  - de la esperanza
  lexicon: BDAG
  rationale: Aunque el posesivo no está explícito, el marco de primera persona plural lo hace implícito en español. «Esperanza» conserva el genitivo de relación y permite que la frase funcione de modo natural.
- source_word: κατάσχωμεν
  english_pob_choice: we hold fast
  chosen_spanish: retenemos con firmeza
  alternatives_spanish:
  - mantenemos firmemente
  - sostenemos firmemente
  - nos aferramos
  lexicon: BDAG
  rationale: El aoristo subjuntivo condicional expresa perseverancia en la retención. «Retener con firmeza» comunica ese sentido sin perder la idea de sujetar/guardar, y evita la aspereza de un calco demasiado literal.
theological_decisions:
- issue: Renderización de Χριστός como título o forma nominal cristiana
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El pasaje contrasta al Hijo con Moisés y sostiene una afirmación titular sobre la función y condición del referente. «Mesías» conserva mejor el matiz de título y evita fijar prematuramente una forma litúrgica tradicional cuando el griego permite una lectura titulativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: Fuerza de la condición introducida por ἐὰν ... κατάσχωμεν
  english_pob_reading: if we hold fast
  chosen_spanish_reading: si retenemos con firmeza
  alternative_spanish_readings:
  - si mantenemos firmemente
  - si nos aferramos
  rationale: La cláusula condicional expresa perseverancia real sin resolver de antemano la discusión teológica sobre seguridad o apostasía. «Si» mantiene esa tensión, y la frase verbal subraya la continuidad requerida por el texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Valor de καύχημα en el cierre exhortativo
  english_pob_reading: the boast of our hope
  chosen_spanish_reading: la gloria de nuestra esperanza
  alternative_spanish_readings:
  - el motivo de gloria de nuestra esperanza
  - el jactarse de nuestra esperanza
  - el motivo de orgullo de nuestra esperanza
  rationale: El término griego puede abarcar lo en que uno se gloria o se exulta. «Gloria» se eligió para un español más fluido y reverente, pero se reconoce que atenúa la imagen de jactancia/boast; por eso se deja constancia de alternativas más cercanas al matiz léxico.
  doctrine_reference: BDAG on καύχημα; preserve lexical tension where the Greek is broader than one single Spanish term
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios sustanciales; este borrador sigue de cerca el acuerdo principal del audit trail inglés y solo resuelve en español la tensión léxica de παρρησία/καύχημα con un estilo publicable.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al default del proyecto y al contexto titular.
  - «Casa» conserva οἶκος de manera consistente con la metáfora bíblica sin expandir a «hogar» o «familia».
  - Se evitó «SEÑOR» porque el verso no contiene κύριος ni una cita explícita del nombre divino.
  - La condición se traduce con «si» para no resolver la tensión teológica sobre perseverancia.
  - Las notas al pie registran alternativas donde el español obliga a elegir entre matices que el griego mantiene abiertos.
