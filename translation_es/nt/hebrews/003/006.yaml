revisions:
- from: Pero el Mesías fue fiel como Hijo sobre su casa[a]; cuya casa somos nosotros, si retenemos con firmeza nuestra valentía y la gloria de nuestra esperanza[b][c].
  to: Pero el Mesías fue fiel como Hijo sobre su casa[a]; cuya casa somos nosotros, si retenemos con firmeza nuestra confianza[b] y el motivo de gloria de nuestra esperanza[c].
  rationale: Se revisa el borrador para alinear mejor las decisiones léxicas con el griego y con el audit trail del POB inglés. «Confianza» representa mejor παρρησία que «valentía», porque conserva el componente de franqueza y seguridad osada. «El motivo de gloria de nuestra esperanza» refleja mejor καύχημα que «la gloria de nuestra esperanza», ya que expresa aquello en lo que se gloría la comunidad. Se mantienen «Mesías» y la metáfora de «casa» por fidelidad al proyecto y al contexto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del POB inglés en los puntos principales: contraste con Moisés, valor titular de Χριστός como «Mesías», metáfora de la «casa», y cláusula condicional real «si…». Sin embargo, dos elecciones léxicas debilitan el sentido fuente: «valentía» reduce παρρησία a coraje y deja en segundo plano la idea de confianza franca; y «la gloria de nuestra esperanza» no representa bien καύχημα, que aquí es más bien «gloria/jactancia/motivo de orgullo» o una exultación derivada de la esperanza, no «gloria» en abstracto.'
  spanish_quality_summary: 'El texto es legible y digno, pero «cuya casa somos nosotros» suena algo rígido en español bíblico actual; «de la cual casa somos nosotros» sería peor, así que puede mantenerse o suavizarse. La mejor mejora es léxica: «confianza»/«audacia» funciona mejor que «valentía» para παρρησία en Hebreos, y «el motivo de gloria de nuestra esperanza» preserva mejor καύχημα sin sonar vulgar. También conviene evitar «fue fiel», ya que el griego aquí no repite explícitamente «fiel»; el POB inglés sí lo incorpora por continuidad contextual, pero en español resulta más seguro seguir el texto dado con «como Hijo está sobre su casa» o mantener la continuidad si el proyecto lo permite. Dado que el borrador y el POB inglés ya han asumido esa continuidad, la corrección principal recae en los dos sustantivos exhortativos.'
  glossary_alignment: '«Mesías» está bien alineado con la política del proyecto para Χριστός. No hay conflicto con Yahvé ni otros términos clave. La desviación relevante es terminológica interna respecto al POB auditado: para παρρησία, «valentía» se aparta del núcleo semántico documentado («boldness/confidence»); para καύχημα, «gloria» se aparta demasiado del rationale documentado («boast», «ground of boasting», «exultant confidence»).'
  issues:
  - severity: medium
    issue: «valentía» para παρρησίαν
    rationale: παρρησία en Hebreos suele expresar confianza franca y osada, especialmente en acceso y confesión. «Valentía» comunica coraje, pero pierde el matiz de confianza abierta que el POB inglés preserva con «boldness» y nota alternativa «confidence».
  - severity: high
    issue: «la gloria de nuestra esperanza» para τὸ καύχημα τῆς ἐλπίδος
    rationale: καύχημα no significa simplemente «gloria»; se refiere a aquello en lo que uno se gloría, su motivo de jactancia o exultación. La formulación actual puede sugerir una cualidad de la esperanza en vez del acto/base de gloriarse en ella.
  - severity: low
    issue: Ligera rigidez en «cuya casa somos nosotros»
    rationale: Es fiel y comprensible, pero algo dura en español moderno. Aun así, no exige cambio si se prefiere máxima cercanía al audit trail inglés.
