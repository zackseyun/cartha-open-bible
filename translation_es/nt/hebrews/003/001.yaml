translation:
  language: es
  text: Por tanto[a], hermanos santos, participantes de un llamamiento celestial[b], consideren a Jesús, el apóstol y sumo sacerdote de nuestra confesión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se dirige a toda la comunidad creyente, incluidas las mujeres.
    reason: cultural_note
  - marker: b
    text: ‘O: «partícipes de un llamamiento celestial».’
    reason: lexical_alternative
  - marker: c
    text: ‘O: «consideren al que confesamos: Jesús, el apóstol y sumo sacerdote».’
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la fuerza inferencial de la conjunción, manteniendo la conexión lógica con el argumento previo sin añadir interpretación.
- source_word: ἀδελφοὶ ἅγιοι
  english_pob_choice: holy brothers
  chosen_spanish: hermanos santos
  alternatives_spanish:
  - hermanos y hermanas santos
  - hermanos consagrados
  lexicon: BDAG
  rationale: Conserva la forma masculina plural del griego como dirección a la comunidad creyente, y traduce ἅγιοι con 'santos' para retener el matiz de consagración/carácter apartado.
- source_word: κλήσεως ἐπουρανίου
  english_pob_choice: of a heavenly calling
  chosen_spanish: de un llamamiento celestial
  alternatives_spanish:
  - de una llamada celestial
  - de una vocación celestial
  lexicon: BDAG
  rationale: '''Llamamiento'' preserva el sentido de convocatoria divina; ''celestial'' comunica el origen y la cualidad ''de arriba'' del llamado. ''Vocación'' sería posible, pero en Hebreos puede sonar más técnico o eclesial.'
- source_word: μέτοχοι
  english_pob_choice: sharers
  chosen_spanish: participantes
  alternatives_spanish:
  - partícipes
  - compartícipes
  - socios
  lexicon: BDAG
  rationale: '''Participantes'' comunica claramente la idea de compartir una realidad común. ''Sharers'' en inglés se vierte mejor así en español que con un calco menos natural; se evita ''partícipes'' por posible dureza estilística.'
- source_word: κατανοήσατε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - presten atención a
  - mediten en
  - fíjense en
  lexicon: BDAG
  rationale: El imperativo aoristo pide atención reflexiva y concentrada. 'Consideren' es idiomático y suficientemente directo sin sobreexplicar el matiz.
- source_word: ἀπόστολον
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - enviado
  - mensajero
  lexicon: BDAG
  rationale: Se conserva el título teológico aplicado a Jesús. 'Apóstol' mantiene la fuerza intertextual y no diluye el término en una explicación perifrástica.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - jefe de los sacerdotes
  lexicon: BDAG
  rationale: '''Sumo sacerdote'' es la equivalencia estable y fiel en español para el oficio cultual judío, central en Hebreos.'
- source_word: τῆς ὁμολογίας ἡμῶν
  english_pob_choice: of our confession
  chosen_spanish: de nuestra confesión
  alternatives_spanish:
  - de nuestra profesión
  - de lo que confesamos
  - de la fe que profesamos
  lexicon: BDAG
  rationale: '''Confesión'' conserva el sustantivo del griego y puede referirse tanto al acto de confesar como al contenido confesado. Se evita resolver la ambigüedad del genitivo más de lo que permite el texto.'
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español, directo del griego Ἰησοῦς.
theological_decisions:
- issue: Sentido inclusivo de ἀδελφοὶ
  english_pob_reading: Render as 'brothers' in the main text, with inclusive force noted in a footnote.
  chosen_spanish_reading: Mantener 'hermanos' en el texto principal y explicar en nota que incluye a toda la comunidad creyente.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - hermanos y hermanas en la fe
  rationale: La forma gramatical del griego es masculina plural y puede abarcar a toda la asamblea. En español, la nota preserva la inclusión sin borrar la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Genitivo de τῆς ὁμολογίας ἡμῶν
  english_pob_reading: 'Or ''consider the one we confess: Jesus, the apostle and high priest.'''
  chosen_spanish_reading: Dejar 'de nuestra confesión' en el cuerpo y consignar la alternativa interpretativa en nota.
  alternative_spanish_readings:
  - al que confesamos
  - el que confesamos
  - de nuestra profesión
  rationale: El griego admite una relación del genitivo con los títulos de Jesús o con el acto/contenido de la confesión. El texto principal conserva la ambigüedad; la nota ofrece la lectura alternativa sin imponerla.
  doctrine_reference: Hebreos 3:1; nota de alternativa lexical en el POB inglés
- issue: Título 'ἀπόστολον' aplicado a Jesús
  english_pob_reading: Retain the title 'apostle' rather than paraphrasing it.
  chosen_spanish_reading: Retener 'apóstol' para Jesús
  alternative_spanish_readings:
  - enviado
  - mensajero
  rationale: La rareza teológica del uso se conserva mejor con el título mismo. Parafrasearlo reduciría su fuerza y su vínculo con la lógica de Hebreos.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El control de revisión más reciente informó que no se requerían cambios y que hubo alto acuerdo con la auditoría inglesa; esta versión sigue esa lectura sin introducir ajustes no motivados por el fuente griego.
  spanish_consistency_notes:
  - Se usa 'Jesús' para Ἰησοῦς y 'apóstol'/'sumo sacerdote' para los títulos, manteniendo la terminología estable del POB.
  - '''Llamamiento celestial'' conserva el matiz de κλήσεως ἐπουρανίου sin convertirlo en una paráfrasis explicativa.'
  - La ambigüedad de τῆς ὁμολογίας ἡμῶν se mantiene en el texto principal y se explicita solo en nota, como en el audit trail inglés.
