review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB inglés: Ὅθεν = «Por tanto», ἀδελφοὶ ἅγιοι = «hermanos santos», κλήσεως ἐπουρανίου μέτοχοι = «participantes de un llamamiento celestial», κατανοήσατε = «consideren», ἀπόστολον καὶ ἀρχιερέα = «el apóstol y sumo sacerdote», τῆς ὁμολογίας ἡμῶν = «de nuestra confesión», Ἰησοῦν = «Jesús». No hay pérdida doctrinal ni semántica importante. Sin embargo, la nota [b] no ofrece una verdadera alternativa, porque repite exactamente el texto principal en vez de preservar la alternativa del POB inglés («partícipes de/un la llamamiento celestial» o similar).'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «Hermanos santos» suena algo marcado pero sigue siendo fiel y comprensible. «Participantes de un llamamiento celestial» funciona bien en registro bíblico moderno. La puntuación y el tono son adecuados. La única reparación necesaria es la nota [b], que debe presentar una alternativa real y no duplicar la redacción principal.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Jesús», «apóstol», «sumo sacerdote» y «confesión» están bien alineados. No aparecen términos sensibles como Yahvé/Mesías/esclavo que requieran ajuste.
  issues:
  - severity: medium
    issue: La nota [b] repite la traducción principal en lugar de dar una alternativa léxica real.
    rationale: 'El POB inglés conserva una alternativa para μέτοχοι/κλήσεως ἐπουρανίου («participants in the heavenly calling»). En español, «O: ‘participantes de un llamamiento celestial’» no añade información porque es idéntico al texto principal; la nota debe reflejar una opción distinta, por ejemplo «partícipes de un llamamiento celestial» o «participantes en el llamamiento celestial».'
  revised_spanish_text: Por tanto[a], hermanos santos, participantes de un llamamiento celestial[b], consideren a Jesús, el apóstol y sumo sacerdote de nuestra confesión[c].
  revised_footnotes:
  - marker: a
    text: «Hermanos» aquí se dirige a toda la comunidad creyente, incluidas las mujeres.
    reason: cultural_note
  - marker: b
    text: 'O: «partícipes de un llamamiento celestial».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «consideren al que confesamos: Jesús, el apóstol y sumo sacerdote».'
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Solo hace falta corregir la nota [b] para que preserve una alternativa léxica auténtica en lugar de duplicar la redacción principal.
