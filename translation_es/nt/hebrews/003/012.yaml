translation:
  language: es
  text: Vigilen[a], hermanos[b], no sea que haya en alguno de ustedes un corazón malvado de incredulidad, al apartarse[c] del Dios viviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vigilen» traduce el imperativo plural βλέπετε y expresa una advertencia urgente.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» refleja el plural masculino ἀδελφοί, que puede dirigirse a un grupo mixto de creyentes.
    reason: lexical_alternative
  - marker: c
    text: O «al partir» / «al alejarse» del Dios viviente.
    reason: alternative_reading
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: Watch out
  chosen_spanish: ¡Vigilen!
  alternatives_spanish:
  - ¡Estén atentos!
  - ¡Cuiden!
  lexicon: BDAG
  rationale: El imperativo plural comunica advertencia y vigilancia. «Vigilen» conserva el tono de alerta y suena natural en español bíblico moderno.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: El vocativo plural masculino puede dirigirse a una comunidad mixta. «Hermanos» preserva la forma griega y la decisión auditada de no neutralizar el plural en el texto principal.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: BDAG
  rationale: Introduce una advertencia sobre un posible resultado indeseable. «No sea que» es la forma más natural y fiel en español.
- source_word: ἔσται ἔν τινι ὑμῶν
  english_pob_choice: there be in any of you
  chosen_spanish: haya en alguno de ustedes
  alternatives_spanish:
  - haya entre ustedes
  - exista en cualquiera de ustedes
  lexicon: BDAG
  rationale: La construcción expresa la posibilidad de que esa condición aparezca en cualquier miembro del grupo. «Haya en alguno de ustedes» mantiene esa amplitud sin sonar forzado.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - centro interior
  lexicon: BDAG
  rationale: En español bíblico, «corazón» comunica el centro de pensamientos, voluntad y afectos. Es el equivalente más claro y fiel.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - perverso
  - malvado
  lexicon: BDAG
  rationale: Para un sustantivo antropológico como «corazón», «malo» funciona de manera natural y directa en español. Se mantiene la fuerza moral sin volver la frase pesada.
- source_word: ἀπιστίας
  english_pob_choice: of unbelief
  chosen_spanish: de incredulidad
  alternatives_spanish:
  - de falta de fe
  - de infidelidad
  lexicon: BDAG
  rationale: «Incredulidad» es el sustantivo español que mejor refleja la relación con πίστις/creer en este contexto de Hebreos 3. Evita ambigüedad y conserva el foco en no creer.
- source_word: ἐν τῷ ἀποστῆναι
  english_pob_choice: in turning away
  chosen_spanish: al apartarse
  alternatives_spanish:
  - al desviarse
  - al alejarse
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa la circunstancia en la que se manifiesta el corazón descrito. «Al apartarse» es idiomático en español y preserva la amplitud semántica.
- source_word: ἀποστῆναι
  english_pob_choice: turning away
  chosen_spanish: apartarse
  alternatives_spanish:
  - alejarse
  - desertar
  - apostatar
  lexicon: BDAG
  rationale: El verbo puede significar retirarse, apartarse o separarse. «Apartarse» mantiene la advertencia sin imponer como texto principal el tecnicismo «apostatar».
- source_word: θεοῦ ζῶντος
  english_pob_choice: the living God
  chosen_spanish: el Dios viviente
  alternatives_spanish:
  - el Dios vivo
  - Dios viviente
  lexicon: BDAG
  rationale: La expresión bíblica estable en español es «el Dios viviente». Conserva la referencia al Dios verdadero y la resonancia intertextual.
theological_decisions:
- issue: Cómo traducir ἀπιστίας sin perder el matiz de fe/incredulidad en Hebreos 3
  english_pob_reading: unbelief
  chosen_spanish_reading: incredulidad
  alternative_spanish_readings:
  - falta de fe
  - infidelidad
  rationale: En el discurso de Hebreos 3, el problema es no creer la voz de Dios, en paralelo con el ejemplo de Israel. «Incredulidad» comunica ese sentido sin cerrar el campo semántico de la fe.
  doctrine_reference: 'Contested terms: πίστις default ''faith''; noun-related field here is rendered in that semantic domain.'
- issue: Si ἀποστῆναι debe sonar como tecnicismo de apostasía o como advertencia más amplia
  english_pob_reading: turning away
  chosen_spanish_reading: apartarse
  alternative_spanish_readings:
  - alejarse
  - caer en apostasía
  - desertar
  rationale: La lectura principal conserva la seriedad de la advertencia sin introducir un término técnico que exceda la transparencia lexical del griego. Se preserva la tensión doctrinal en lugar de resolverla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y coincide con la auditoría inglesa en sus decisiones principales: advertencia imperativa, vocativo masculino plural, genitivo de incredulidad y el infinitivo articular de apartarse. No se introdujeron revisiones adicionales respecto del paso más reciente; se mantuvo la lectura sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y la expresión fija «el Dios viviente» para θεοῦ ζῶντος.
  - Se conserva «hermanos» como vocativo representativo, no neutralizado en el texto principal.
  - Se evita «apostasía» en el cuerpo principal para no sobreespecificar ἀποστῆναι más allá de la evidencia inmediata.
  - La puntuación sigue el ritmo admonitorio del griego y del inglés auditado, con una oración principal de advertencia y una cláusula de posibilidad negativa.
