    rationale: El griego expresa urgencia por el imperativo, pero no requiere exclamación. En una línea exhortativa seguida del vocativo, «Vigilen[a], hermanos[b], ...» suena más natural y sobrio en español bíblico moderno.
  - severity: low
    issue: La nota a no refleja una alternativa sino una explicación
    rationale: No es un error grave, pero la nota a en inglés documenta más bien la elección léxica de «Watch out». En español puede mantenerse una explicación breve, aunque no aporta una alternativa de traducción.
  revised_spanish_text: Vigilen[a], hermanos[b], no sea que haya en alguno de ustedes un corazón malvado de incredulidad, al apartarse[c] del Dios viviente.
