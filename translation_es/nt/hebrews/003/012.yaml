  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro auditado en casi todos los puntos: βλέπετε = advertencia imperativa, ἀδελφοί = «hermanos», μήποτε = «no sea que», ἔν τινι ὑμῶν = «en alguno de ustedes», καρδία = «corazón», ἀπιστίας = «de incredulidad», ἀποστῆναι = «apartarse», ἀπὸ θεοῦ ζῶντος = «del Dios viviente». El problema principal es que «corazón malo» debilita πονηρά, que el inglés auditado y el griego presentan con fuerza moral más marcada como «evil».'
  spanish_quality_summary: 'El español es claro y legible, pero puede mejorarse ligeramente: «¡Vigilen!» funciona, aunque con el vocativo posterior suele sonar más natural sin signos de exclamación; y «corazón malo» es comprensible pero menos idiomático y menos fuerte que «corazón malvado» o «perverso». La sintaxis general es buena y digna.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» y «el Dios viviente» están bien. «Hermanos» respeta la decisión sobre ἀδελφοί. «Incredulidad» sigue correctamente la decisión teológica auditada para ἀπιστίας. «Apartarse» preserva bien la cautela frente a tecnicismos como «apostatar».
  issues:
  - severity: medium
    issue: «malo» debilita πονηρά
    rationale: πονηρά denota maldad moral, no solo cualidad negativa genérica. «Corazón malo» es posible en español, pero aquí pierde parte del peso de la advertencia. «Corazón malvado» o «perverso» refleja mejor el griego y el audit trail inglés («evil heart»).
  - severity: low
