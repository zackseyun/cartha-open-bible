revisions:
- from: Porque todo el que participa de la leche es inexperto en la palabra de justicia[a][b], pues es un niño pequeño.
  to: Porque todo el que participa de la leche es inexperto en la palabra de rectitud[a][b], pues es un infante.
  rationale: Se corrige δικαιοσύνης para alinear el texto principal con la decisión auditada equivalente a 'righteousness', usando 'rectitud' como la opción española más natural en este contexto, y se conserva 'justicia' como alternativa en nota. También se fortalece νήπιος con 'infante' para mantener la agudeza de la metáfora original.
