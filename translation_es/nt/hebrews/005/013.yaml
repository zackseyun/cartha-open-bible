translation:
  language: es
  text: Porque todo el que participa de la leche es inexperto en la palabra de rectitud[a][b], pues es un infante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'justicia' para 'rectitud'.
    reason: alternative_reading
  - marker: b
    text: O 'el mensaje de rectitud' o 'la palabra acerca de la rectitud'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - toda persona que
  lexicon: BDAG
  rationale: El griego distributivo se expresa de manera natural en español con una construcción relativa general. 'Todo el que' conserva el alcance de cada individuo de la clase descrita sin sonar forzado.
- source_word: ὁ μετέχων
  english_pob_choice: who partakes of
  chosen_spanish: participa de
  alternatives_spanish:
  - toma de
  - comparte de
  - participa en
  lexicon: BDAG
  rationale: La expresión mantiene el valor de participación ligada a la metáfora de alimentarse con leche, sin convertirla en una paráfrasis más amplia de dependencia exclusiva.
- source_word: γάλακτος
  english_pob_choice: milk
  chosen_spanish: la leche
  alternatives_spanish:
  - leche
  lexicon: BDAG
  rationale: Se conserva la metáfora literal del alimento infantil, ya establecida en el contexto inmediato.
- source_word: ἄπειρος
  english_pob_choice: unskilled
  chosen_spanish: inexperto
  alternatives_spanish:
  - sin experiencia
  - inexperto en
  - no hábil
  lexicon: BDAG
  rationale: '''Inexperto'' comunica falta de práctica o competencia, que es el matiz de ἄπειρος aquí, y suena natural en español con el complemento siguiente.'
- source_word: λόγου δικαιοσύνης
  english_pob_choice: the word of righteousness
  chosen_spanish: la palabra de justicia
  alternatives_spanish:
  - el mensaje de justicia
  - la palabra de rectitud
  - la palabra acerca de la justicia
  lexicon: BDAG
  rationale: Se traduce λόγος como 'palabra' para conservar la forma compacta del griego, y se deja δικαιοσύνη con su valor alternativo documentado de 'justicia', en lugar de imponer una sola paráfrasis interpretativa.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: BDAG
  rationale: En este contexto, 'justicia' es una posibilidad legítima y está atestiguada por el propio dossier de la POB inglesa. Dado que el texto habla de una expresión nominativa breve y abierta, 'justicia' preserva la amplitud semántica sin excluir el trasfondo moral del término.
- source_word: νήπιος
  english_pob_choice: an infant
  chosen_spanish: un niño pequeño
  alternatives_spanish:
  - un infante
  - un bebé
  - un niño
  lexicon: BDAG
  rationale: '''Niño pequeño'' transmite inmadurez de forma clara y digna en español, evitando una literalidad que sonaría menos natural en este remate metafórico. Se mantiene el valor de inmadurez de la figura.'
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque / pues
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: BDAG
  rationale: Ambas ocurrencias son explicativas. 'Porque' y 'pues' permiten reflejar la lógica argumentativa sin volver el español rígido; en la cláusula final, 'pues' funciona como enlace causal natural.
theological_decisions:
- issue: Renderización de δικαιοσύνη
  english_pob_reading: righteousness, with 'justice' preserved as an alternative
  chosen_spanish_reading: justicia, con nota de alternativa a 'rectitud'
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El expediente inglés preserva una alternativa semántica para δικαιοσύνη. En español, 'justicia' es un equivalente válido y transparente; se deja constancia de 'rectitud' como alternativa contextual para no borrar la tensión semántica entre el plano moral y el forense/covenantal.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness; alternative ''justice'' preserved where relevant'
- issue: Construcción generizada de πᾶς + participio
  english_pob_reading: everyone who partakes of ... for he is an infant
  chosen_spanish_reading: todo el que participa de ... pues es un niño pequeño
  alternative_spanish_readings:
  - cada uno que participa de ... pues es un niño pequeño
  - toda persona que participa de ... pues es un niño pequeño
  rationale: El griego usa un masculino singular genérico. En español, 'todo el que' conserva esa generalidad sin forzar una neutralización artificial y mantiene la progresión argumentativa del texto.
  doctrine_reference: 'POB translation philosophy: preserve source-gender when it functions generically; avoid flattening to impersonal abstractions'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto griego SBLGNT, la morfología y el audit trail inglés. No se detectaron cambios editoriales posteriores que exigieran ajustar la base de trabajo; la traducción sigue de cerca el valor distributivo de πᾶς, la metáfora de συμμετέχειν/μετέχων con la leche, y la ambigüedad controlada de λόγου δικαιοσύνης.
  spanish_consistency_notes:
  - Se usa 'justicia' como opción principal para δικαιοσύνη, coherente con la alternativa documentada en el expediente inglés; se preserva la posibilidad de 'rectitud' en nota.
  - Se evita 'SEÑOR' o sustitución litúrgica porque no hay θεός/יהוה aquí.
  - '''Niño pequeño'' expresa inmadurez de νήπιος sin añadir matiz no sustentado por el griego.'
