    rationale: La preposición ἀπό indica fuente/origen más que causa instrumental. «De lo que sufrió» reproduce mejor «from what he suffered» y el razonamiento léxico del POB inglés.
  - severity: low
    issue: «la obediencia» suena menos natural en español
    rationale: Aunque el artículo griego existe, el español idiomático con sustantivo abstracto tras «aprendió» suele preferir «aprendió obediencia». Esto además sigue más de cerca la decisión inglesa auditada de omitir el artículo por naturalidad.
  - severity: low
