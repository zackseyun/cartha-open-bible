translation:
  language: es
  text: Aunque era Hijo[a], aprendió obediencia[b] de lo que sufrió,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque era el Hijo». El griego dice simplemente «Hijo», sin artículo; en español puede expresarse de modo más explícito o más sobrio según el énfasis cristológico del contexto.'
    reason: alternative_reading
  - marker: b
    text: «Aprendió obediencia» describe aprendizaje real por medio del sufrimiento vivido, no corrección de una desobediencia previa.
    reason: theological_note
lexical_decisions:
- source_word: καίπερ
  english_pob_choice: Although
  chosen_spanish: Aunque
  alternatives_spanish:
  - si bien
  - a pesar de que
  lexicon: BDAG
  rationale: 'La partícula concesiva introduce contraste: pese a su condición de Hijo, aprendió obediencia. «Aunque» conserva bien ese valor concesivo en español natural y digno.'
- source_word: ὢν
  english_pob_choice: he was
  chosen_spanish: era
  alternatives_spanish:
  - siendo
  lexicon: BDAG
  rationale: El participio de εἰμί funciona aquí en una construcción concesiva; en español suena más natural un verbo finito («era») que un gerundio.
- source_word: υἱός
  english_pob_choice: a Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - un Hijo
  - el Hijo
  lexicon: BDAG
  rationale: El griego es anartro y el inglés audita la opción capitalizada por referencia cristológica. En español, «Hijo» sin artículo comunica la referencia a Jesús de forma sobria y fiel al valor predicativo.
- source_word: ἔμαθεν
  english_pob_choice: he learned
  chosen_spanish: aprendió
  alternatives_spanish:
  - llegó a aprender
  - aprendió por experiencia
  lexicon: BDAG
  rationale: El aoristo de μανθάνω debe mantenerse con un verbo directo. «Aprendió» conserva el peso del enunciado sin suavizar la afirmación de aprendizaje real.
- source_word: ἀφ’ ὧν
  english_pob_choice: from what
  chosen_spanish: por lo que
  alternatives_spanish:
  - de lo que
  - a partir de lo que
  lexicon: BDAG
  rationale: La preposición con relativo expresa fuente/basamento. En español, «por lo que padeció» comunica de manera natural que el sufrimiento fue el medio o contexto a través del cual aprendió obediencia.
- source_word: ἔπαθεν
  english_pob_choice: he suffered
  chosen_spanish: padeció
  alternatives_spanish:
  - sufrió
  - pasó
  lexicon: BDAG
  rationale: «Padeció» mantiene el peso del sufrimiento y suena natural en registro bíblico contemporáneo. Evita la posible redundancia de «sufrió» junto con «obediencia» en español, sin perder la idea de sufrimiento real.
- source_word: τὴν ὑπακοήν
  english_pob_choice: obedience
  chosen_spanish: la obediencia
  alternatives_spanish:
  - obediencia
  - la sumisión obediente
  lexicon: BDAG
  rationale: El artículo griego se conserva bien en español. «Obediencia» es la traducción normal y exacta de ὑπακοή, sin añadir explicación interpretativa.
theological_decisions:
- issue: Cómo expresar la filiación de Cristo sin diluir el contraste del versículo
  english_pob_reading: Although he was a Son
  chosen_spanish_reading: Aunque era Hijo
  alternative_spanish_readings:
  - Aunque era el Hijo
  - Aunque era un Hijo
  rationale: La frase debe retener la tensión entre la condición filial de Jesús y su aprendizaje mediante el sufrimiento. «Aunque era Hijo» preserva la referencia cristológica sin forzar un artículo que el griego no presenta.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Si 'aprendió la obediencia' podría insinuar desobediencia previa
  english_pob_reading: He learned obedience speaks of learning through lived suffering, not of correction from prior disobedience.
  chosen_spanish_reading: aprendió la obediencia
  alternative_spanish_readings:
  - aprendió obediencia en la experiencia
  - aprendió lo que cuesta obedecer
  rationale: Se mantiene la formulación directa del texto para no resolver la tensión teológica. El contexto muestra aprendizaje por sufrimiento, no corrección por pecado o falta moral previa.
  doctrine_reference: Principio POB de preservar la tensión teológica sin explicarla fuera del texto
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en el valor concesivo de καίπερ, el carácter anartro de υἱός, el aprendizaje real expresado por ἔμαθεν y la procedencia/medio expresada por ἀφ’ ὧν ἔπαθεν. No se detectan revisiones posteriores que alteren estas decisiones; se mantiene la lectura de alta concordancia del registro inglés.
  spanish_consistency_notes:
  - Se conserva «Hijo» con mayúscula para la referencia cristológica, consistente con el uso POB de distinguir el referente de Jesús sin introducir un artículo ajeno al griego.
  - «Aprendió la obediencia» mantiene una sintaxis transparente y bíblica en español, evitando tanto el calco rígido como la paráfrasis explicativa.
  - Se prefiere «padeció» por su registro reverente y por reflejar sufrimiento real sin añadir matices no requeridos por el texto.
