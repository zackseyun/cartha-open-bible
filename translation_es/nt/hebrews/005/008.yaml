  to: Aunque era Hijo[a], aprendió obediencia[b] de lo que sufrió,
  rationale: Se ajusta «por lo que padeció» a «de lo que sufrió» para reflejar mejor ἀφ’ ὧν y la auditoría inglesa («from what he suffered»). Se elimina el artículo en «obediencia» por naturalidad idiomática en español y mejor alineación con la decisión del POB. Se mantiene «Hijo» con nota por fidelidad al griego anartro y a la rationale cristológica documentada.
