translation:
  language: es
  text: quien, en los días de su carne, habiendo ofrecido con fuerte clamor y lágrimas tanto súplicas como ruegos al que podía salvarlo de la muerte[a], y habiendo sido escuchado por su reverencia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Salvarlo de la muerte» también puede entenderse como «salvarlo sacándolo de la muerte», es decir, librarlo por medio de la resurrección.
    reason: alternative_reading
  - marker: b
    text: 'O: «por su temor reverente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις τῆς σαρκὸς αὐτοῦ
  english_pob_choice: in the days of his flesh
  chosen_spanish: en los días de su carne
  alternatives_spanish:
  - durante su vida terrenal
  - en los días de su vida mortal
  lexicon: BDAG
  rationale: Se conserva σάρξ con el valor concreto de “carne”, como en la decisión inglesa, para no diluir el matiz encarnacional. En español, “en los días de su carne” suena natural en registro bíblico y mantiene la referencia a su vida humana encarnada.
- source_word: δεήσεις
  english_pob_choice: prayers
  chosen_spanish: súplicas
  alternatives_spanish:
  - oraciones
  - plegarias
  lexicon: BDAG
  rationale: En español, “súplica” transmite una petición intensa y reverente; además ayuda a distinguir este término de ἱκετηρίας, que pide un segundo matiz. “Oraciones” sería más general, pero menos preciso aquí.
- source_word: ἱκετηρίας
  english_pob_choice: petitions
  chosen_spanish: ruegos
  alternatives_spanish:
  - peticiones
  - súplicas
  lexicon: BDAG
  rationale: “Ruegos” comunica la urgencia personal y el tono de insistencia del término, sin caer en una forma excesivamente técnica. Se preserva la distinción semántica respecto de δεήσεις. “Peticiones” también es posible, pero en español puede sonar más administrativo que suplicante.
- source_word: πρὸς τὸν δυνάμενον σῴζειν αὐτὸν ἐκ θανάτου
  english_pob_choice: to the one able to save him from death
  chosen_spanish: al que podía salvarlo de la muerte
  alternatives_spanish:
  - al que era capaz de salvarlo de la muerte
  - al que podía rescatarlo de la muerte
  - al que podía salvarlo de la muerte, sacándolo de la muerte
  lexicon: BDAG
  rationale: “Al que podía” refleja adecuadamente el participio sustantivado. “Salvarlo de la muerte” conserva la ambigüedad de ἐκ θανάτου sin cerrar si se trata de preservación ante la muerte o de liberación por medio de la resurrección.
- source_word: μετὰ κραυγῆς ἰσχυρᾶς καὶ δακρύων
  english_pob_choice: with loud cries and tears
  chosen_spanish: con fuerte clamor y lágrimas
  alternatives_spanish:
  - con grandes voces y lágrimas
  - con gritos fuertes y lágrimas
  - con clamor intenso y lágrimas
  lexicon: BDAG
  rationale: “Fuerte clamor” reproduce la intensidad de κραυγῆς ἰσχυρᾶς con un español digno y natural. “Clamor” conserva el matiz de voz intensa, más cercano a la fuerza del grito que una simple “voz fuerte”.
- source_word: προσενέγκας
  english_pob_choice: having offered up
  chosen_spanish: habiendo ofrecido
  alternatives_spanish:
  - ofreciendo
  - después de haber ofrecido
  lexicon: BDAG
  rationale: El participio aoristo queda bien como acción anterior o concomitante en español con “habiendo ofrecido”. Se mantiene el posible eco sacrificial de προσφέρω, especialmente apropiado en el contexto de Hebreos, sin sobreinterpretarlo.
- source_word: εἰσακουσθεὶς
  english_pob_choice: having been heard
  chosen_spanish: habiendo sido escuchado
  alternatives_spanish:
  - habiendo sido oído
  - habiendo recibido respuesta
  lexicon: BDAG
  rationale: “Habiendo sido escuchado” expresa con precisión la pasiva sin añadir que la respuesta tomó una forma concreta. “Recibido respuesta” sería más interpretativo.
- source_word: ἀπὸ τῆς εὐλαβείας
  english_pob_choice: because of his reverence
  chosen_spanish: por su reverencia
  alternatives_spanish:
  - por su temor reverente
  - por su piedad reverente
  - a causa de su reverencia
  lexicon: BDAG
  rationale: “Reverencia” mantiene la ambigüedad lexical de εὐλάβεια y coincide con la revisión inglesa más cercana al término. En español, “por su reverencia” es claro y sobrio; “temor reverente” puede ser útil, pero agrega una expansión interpretativa.
theological_decisions:
- issue: Sentido de εὐλαβείας aplicado a Jesús
  english_pob_reading: because of his reverence
  chosen_spanish_reading: por su reverencia
  alternative_spanish_readings:
  - por su temor reverente
  - por su piedad reverente
  - por su reverente sumisión
  rationale: La traducción conserva la reverencia filial de Jesús hacia el Padre sin introducir una formulación que sugiera miedo impropio o una ampliación doctrinal no explícita. “Reverencia” es suficientemente abierta para preservar la tensión semántica del término griego.
  doctrine_reference: Hebreos 5:7; mantener la tensión lexical sin resolverla de más
translation_notes:
  revision_awareness: Se tomó como base el último estado revisado del audit trail inglés, que afinó εὐλαβείας de “reverent submission” a “reverence”. En español se siguió esa revisión con “reverencia”, y se mantuvo sin resolución la ambigüedad de ἐκ θανάτου. También se preservó la distinción entre δεήσεις e ἱκετηρίας con dos términos españoles diferenciados.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando aparezca el nombre divino explícito; este versículo no lo requiere.
  - Se mantuvo “carne” para σάρξ por consistencia con el criterio POB de conservar el valor literal cuando el contexto es encarnacional.
  - “Súplicas” y “ruegos” diferencian dos vocablos griegos cercanos sin volverlos idénticos en español.
  - La puntuación sigue una sintaxis fluida para una cláusula larga, pero sin desdibujar la estructura participial del griego.
