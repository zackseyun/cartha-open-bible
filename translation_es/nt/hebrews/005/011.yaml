translation:
  language: es
  text: Respecto a esto, tenemos mucho que decir[a], y es difícil de explicar[b], ya que ustedes se han vuelto tardos para oír[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de quien»; el pronombre relativo griego podría referirse personalmente a Melquisedec, aunque aquí probablemente apunta más ampliamente al tema en discusión.
    reason: alternative_reading
  - marker: b
    text: O «difícil de interpretar» o «difícil de exponer».
    reason: lexical_alternative
  - marker: c
    text: O «lentos para escuchar»; la expresión alude a ser lentos o poco receptivos para recibir instrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ οὗ
  english_pob_choice: About this
  chosen_spanish: Respecto a esto
  alternatives_spanish:
  - Acerca de esto
  - Sobre esto
  - Respecto de quien
  lexicon: BDAG
  rationale: El pronombre relativo griego puede remitir al asunto tratado, y también es gramaticalmente posible una referencia personal. En español, «Respecto a esto» conserva el referente amplio al tema de la exposición sin cerrar la tensión con Melquisedec.
- source_word: πολὺς ἡμῖν ὁ λόγος
  english_pob_choice: we have much to say
  chosen_spanish: tenemos mucho que decir
  alternatives_spanish:
  - hay mucho que decir
  - tenemos mucho discurso
  - la palabra es mucha para nosotros
  lexicon: BDAG
  rationale: La construcción griega es idiomática; en español, «tenemos mucho que decir» transmite de forma natural la abundancia de material por exponer, sin forzar un calco de λόγος como «palabra» o «discurso».
- source_word: δυσερμήνευτος
  english_pob_choice: hard to explain
  chosen_spanish: difícil de explicar
  alternatives_spanish:
  - difícil de interpretar
  - difícil de exponer
  lexicon: BDAG
  rationale: El adjetivo describe algo difícil de explicar o exponer. «Difícil de explicar» mantiene la fuerza comunicativa del pasaje en español actual y concuerda con el infinitivo siguiente.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la causa de la dificultad de explicar el tema. «Porque» es claro y mantiene el valor causal del griego.
- source_word: νωθροὶ
  english_pob_choice: dull
  chosen_spanish: lentos
  alternatives_spanish:
  - obtusos
  - perezosos
  - torpes
  lexicon: BDAG
  rationale: El término apunta a una lentitud o insensibilidad para responder. En español, «lentos» conserva esa idea sin añadir una connotación moral más fuerte de la que el contexto inmediato exige.
- source_word: γεγόνατε
  english_pob_choice: have become
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - han llegado a ser
  - han quedado
  - son
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante alcanzado con el tiempo. «Se han vuelto» preserva ese cambio de estado mejor que un simple presente.
- source_word: ταῖς ἀκοαῖς
  english_pob_choice: in hearing
  chosen_spanish: para oír
  alternatives_spanish:
  - en el oír
  - en la escucha
  - para escuchar
  lexicon: BDAG
  rationale: ἀκοή puede referirse al acto o facultad de oír, con sentido de receptividad a la instrucción. En español, «para oír» comunica esa receptividad de manera natural y mantiene la metáfora auditiva.
theological_decisions:
- issue: Referente de Περὶ οὗ
  english_pob_reading: The phrase refers primarily to the subject matter under discussion rather than directly to a person.
  chosen_spanish_reading: La frase apunta principalmente al tema en discusión, sin excluir una referencia personal implícita.
  alternative_spanish_readings:
  - 'Se refiere directamente a una persona: «acerca de quien»'
  - 'Se refiere solo al tema abstracto: «respecto a esto»'
  rationale: El contexto inmediato permite entender el pronombre como aludiendo a Melquisedec, pero la función discursiva de la frase introduce más naturalmente el asunto que se va a tratar. «Respecto a esto» preserva esa amplitud y no resuelve indebidamente la tensión.
  doctrine_reference: Preservar la tensión interpretativa documentada en el texto
- issue: Sentido de νωθροὶ ταῖς ἀκοαῖς
  english_pob_reading: sluggish in hearing, referring to being slow or unresponsive in receiving instruction.
  chosen_spanish_reading: lentos para oír, en el sentido de poca receptividad a la instrucción.
  alternative_spanish_readings:
  - dull in hearing
  - perezosos al oír
  - torpes para escuchar
  rationale: La frase no habla solo de audición física, sino de receptividad pedagógica. «Lentos para oír» conserva esa implicación sin sobretraducirla; la nota aclara la dimensión de respuesta a la enseñanza.
  doctrine_reference: Mantener la imagen pedagógica del pasaje sin domesticarla
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no se requieren cambios respecto al pasaje fuente ni al criterio de equivalencia óptima aplicado en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo una sintaxis natural en español sin perder la referencia discursiva ambigua de Περὶ οὗ.
  - Se evitó «Cristo» o terminología no presente en el versículo.
  - «Oír» se usó para conservar el campo semántico de ἀκοή, con aclaración en nota sobre la receptividad a la enseñanza.
  - Las notas siguen la secuencia de marcadores del expediente inglés y no introducen marcadores nuevos fuera de a, b, c.
