translation:
  language: es
  text: 'tal como también dice en otro lugar[a][b]: «Tú eres sacerdote para siempre, según el orden de Melquisedec»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en otro lugar'. El griego dice literalmente 'en otro', y se entiende 'lugar'.
    reason: lexical_alternative
  - marker: b
    text: O 'conforme al orden de Melquisedec'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς καὶ
  english_pob_choice: just as he also
  chosen_spanish: tal como también
  alternatives_spanish:
  - así como también
  - justamente como también
  lexicon: BDAG
  rationale: Conserva la fuerza comparativa de καθώς y el aditivo de καί, en español natural y sobrio. 'Tal como también' introduce la cita de modo paralelo a la anterior sin endurecer el ritmo.
- source_word: ἐν ἑτέρῳ
  english_pob_choice: in another place
  chosen_spanish: en otro lugar
  alternatives_spanish:
  - en otro
  - en otra parte
  lexicon: BDAG
  rationale: La construcción griega es elíptica y se refiere a otro pasaje de la Escritura. 'En otro lugar' hace explícito el complemento implícito de forma idiomática en español, siguiendo la decisión auditada del inglés.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - él dice
  - se dice
  lexicon: BDAG
  rationale: El presente mantiene el valor vivo de la cita bíblica. En español, la forma simple 'dice' suena natural y conserva la referencia personal implícita sin forzar el sujeto.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - un sacerdote
  - un sacerdote ministerial
  lexicon: BDAG
  rationale: '''Sacerdote'' corresponde al sentido léxico de ἱερεύς y es la forma más estable en español para este título. La omisión del artículo indefinido en una cita directa resulta natural y fiel al predicado nominal griego.'
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: BDAG
  rationale: '''Para siempre'' comunica con claridad la duración perpetua expresada por la frase griega. Mantiene el valor temporal sin introducir matices menos naturales en español.'
- source_word: κατὰ τὴν τάξιν
  english_pob_choice: according to the order of
  chosen_spanish: según el orden de
  alternatives_spanish:
  - de acuerdo con el orden de
  - tras el orden de
  lexicon: BDAG
  rationale: '''Orden'' preserva la fuerza categorial y tipológica de τάξις en el argumento de Hebreos. ''Según el orden de'' es transparente en español y conserva la relación establecida por la cita del Salmo.'
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melquisedec
  - Melquisedec
  lexicon: BDAG
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico. Esto mantiene la identificación tradicional sin sustituir el nombre por una paráfrasis.
theological_decisions:
- issue: Referencia del hablante en la fórmula de cita
  english_pob_reading: Rendered λέγει as 'he says,' leaving the subject implicitly God speaking in Scripture.
  chosen_spanish_reading: '''dice'' mantiene la cita como palabra viva de la Escritura, con sujeto implícito en el uso bíblico.'
  alternative_spanish_readings:
  - '''él dice'''
  - '''se dice'''
  rationale: Hebreos presenta la Escritura como voz presente. En español, 'dice' conserva esa fuerza sin añadir un sujeto explícito que no está en el griego.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de τάξις en la cita de Melquisedec
  english_pob_reading: '''order'' as a priestly order/category rather than merely ''manner'' or ''pattern.'''
  chosen_spanish_reading: '''orden'' como categoría sacerdotal, no solo como manera o patrón.'
  alternative_spanish_readings:
  - manera
  - patrón
  rationale: El argumento de Hebreos depende de un sacerdocio distinguible vinculado con Melquisedec. 'Orden' conserva mejor esa carga tipológica y eclesiológica que opciones más vagas.
  doctrine_reference: Affirmations; Translation philosophy §5
translation_notes:
  revision_awareness: El texto se ajusta al pasaje griego SBLGNT y al audit trail inglés sin cambios de última revisión; la concordancia general fue alta y no se documentaron revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantuvo 'Melquisedec' como transliteración española usual, en paralelo con la forma inglesa auditada.
  - '''Orden'' se usó de manera consistente para τάξις, preservando el matiz sacerdotal del contexto de Hebreos.'
  - La cita se presentó con comillas españolas y puntuación adecuada para lectura pública.
  - No se recurrió a 'SEÑOR' ni a sustituciones litúrgicas ajenas al texto base, porque aquí no aparece el Tetragrámaton ni κύριος como cita directa del nombre divino.
