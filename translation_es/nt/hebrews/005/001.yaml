review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés: mantiene el singular distributivo («todo sumo sacerdote»), la pasiva participial («tomado de entre los hombres»), la representación mediadora («...de los hombres»), el propósito con subjuntivo y la doble categoría cultual («ofrendas... sacrificios»). Sin embargo, «presente» para προσφέρῃ debilita el verbo cultual específico «ofrecer», y «a favor de los hombres» suena menos representativo que «en favor de los hombres» o «a favor».'
  spanish_quality_summary: El español es claro y digno, pero una pequeña mejora lo haría más natural y más preciso en registro bíblico-cultual. «Porque» es aceptable; «es constituido» también. La principal reparación es cambiar «para que presente» por «para que ofrezca», que corresponde mejor al léxico sacrificial y evita ambigüedad. También conviene preferir «en favor de los hombres» por fluidez y sentido mediador.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «sumo sacerdote» y el mantenimiento de «los hombres» con nota alternativa están alineados con el rationale documentado sobre lenguaje masculino representativo. La revisión propuesta refuerza la decisión léxica de προσφέρω con un equivalente español más exacto.
  issues:
  - severity: medium
    issue: «presente» para προσφέρῃ
    rationale: Aunque puede funcionar en contexto religioso, «presentar» no expresa con la misma precisión cultual el acto de ofrecer sacrificios. El griego προσφέρῃ y el inglés POB «offer» apuntan más directamente a «ofrezca».
  - severity: low
    issue: «a favor de los hombres» suena menos idiomático en este contexto
    rationale: Para ὑπὲρ ἀνθρώπων, «en favor de los hombres» comunica mejor en español la representación/beneficio sacerdotal. No es un error grave, pero sí una mejora de naturalidad y matiz.
  revised_spanish_text: Porque todo sumo sacerdote[a], tomado de entre los hombres, es constituido en favor de los hombres en lo que tiene que ver con Dios, para que ofrezca tanto ofrendas como sacrificios por los pecados,
  revised_footnotes:
  - marker: a
    text: O «de entre los seres humanos» y «en favor de las personas». El griego usa aquí lenguaje masculino representativo.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo sacrificial a «ofrezca» para reflejar mejor προσφέρῃ y la decisión léxica inglesa «offer». Se cambia «a favor de» por «en favor de» por mayor naturalidad y mejor matiz representativo en español. La nota se armoniza con esa mejora preposicional. No se requiere adjudicación adicional.
