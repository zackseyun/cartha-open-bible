- from: Porque todo sumo sacerdote[a], tomado de entre los hombres, es constituido a favor de los hombres en lo que tiene que ver con Dios, para que presente tanto ofrendas como sacrificios por los pecados,
  to: Porque todo sumo sacerdote[a], tomado de entre los hombres, es constituido en favor de los hombres en lo que tiene que ver con Dios, para que ofrezca tanto ofrendas como sacrificios por los pecados,
  rationale: Se ajusta el verbo sacrificial a «ofrezca» para reflejar mejor προσφέρῃ y la decisión léxica inglesa «offer». Se cambia «a favor de» por «en favor de» por mayor naturalidad y mejor matiz representativo en español. La nota se armoniza con esa mejora preposicional. No se requiere adjudicación adicional.
