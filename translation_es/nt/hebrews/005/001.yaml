translation:
  language: es
  text: Porque todo sumo sacerdote[a], tomado de entre los hombres, es constituido en favor de los hombres en lo que tiene que ver con Dios, para que ofrezca tanto ofrendas como sacrificios por los pecados,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre los seres humanos» y «en favor de las personas». El griego usa aquí lenguaje masculino representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo y cada
  lexicon: BDAG
  rationale: El griego usa un singular distributivo con ἀρχιερεύς. En español, «todo sumo sacerdote» transmite con naturalidad la generalidad de la afirmación sin volverla mecánica.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce una explicación del argumento anterior. «Porque» conserva bien la relación causal/explanatoria en español contemporáneo.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la forma bíblica y eclesiásticamente inteligible en español para el cargo cultual judío.
- source_word: ἐξ ἀνθρώπων λαμβανόμενος
  english_pob_choice: being taken from among men
  chosen_spanish: tomado de entre los hombres
  alternatives_spanish:
  - escogido de entre los hombres
  - tomado de entre seres humanos
  lexicon: BDAG
  rationale: La pasiva participial se refleja con «tomado». «De entre los hombres» conserva el lenguaje representativo y masculino del griego, como en el audit trail inglés.
- source_word: ὑπὲρ ἀνθρώπων
  english_pob_choice: on behalf of men
  chosen_spanish: a favor de los hombres
  alternatives_spanish:
  - en nombre de los hombres
  - por los hombres
  lexicon: BDAG
  rationale: En este contexto ὑπέρ expresa representación/beneficio. «A favor de» comunica bien ese matiz mediador en español sin perder la relación con el sustantivo repetido.
- source_word: καθίσταται
  english_pob_choice: is appointed
  chosen_spanish: es constituido
  alternatives_spanish:
  - es nombrado
  - es designado
  lexicon: BDAG
  rationale: En un contexto de instalación sacerdotal, «es constituido» mantiene la idea de ser puesto en un cargo; es un equivalente digno y preciso para este registro.
- source_word: τὰ πρὸς τὸν θεόν
  english_pob_choice: in the things pertaining to God
  chosen_spanish: en lo que tiene que ver con Dios
  alternatives_spanish:
  - en las cosas relativas a Dios
  - en los asuntos de Dios
  lexicon: BDAG
  rationale: La expresión es idiomática. «En lo que tiene que ver con Dios» comunica el ámbito de servicio sin sonar rígido ni oscurecer el sentido funcional del griego.
- source_word: ἵνα προσφέρῃ
  english_pob_choice: so that he may offer
  chosen_spanish: para que presente
  alternatives_spanish:
  - para que ofrezca
  - a fin de que presente
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. «Presente» funciona naturalmente en español cultual y preserva la idea de ofrecer delante de Dios; puede leerse como equivalente de «ofrezca» en contexto sacrificial.
- source_word: δῶρά τε καὶ θυσίας
  english_pob_choice: both gifts and sacrifices
  chosen_spanish: tanto ofrendas como sacrificios
  alternatives_spanish:
  - ofrendas y sacrificios
  - tanto dones como sacrificios
  lexicon: BDAG
  rationale: «Ofrendas» traduce bien δῶρα en un registro cultual comprensible. «Tanto... como...» refleja τε καὶ y mantiene la duplicidad de categorías.
- source_word: ὑπὲρ ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - por causa de los pecados
  - para expiación de los pecados
  lexicon: BDAG
  rationale: En contexto sacrificial, «por los pecados» expresa la referencia expiatoria de las ofrendas. Se evita estrechar el sentido a una sola explicación técnica.
theological_decisions:
- issue: Lenguaje masculino representativo en ἀνθρώπων
  english_pob_reading: Render both instances as 'men' in the main text
  chosen_spanish_reading: Mantener «los hombres» en el texto principal
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: El griego usa lenguaje masculino representativo y el oficio sacerdotal histórico es masculino. Se conserva esa marca en el texto principal, como hace la POB en inglés, sin ocultar el matiz inclusivo posible del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo con el audit trail inglés y no registra revisiones aplicadas; la redacción española sigue de cerca las decisiones léxicas ya consolidadas, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma POB para el tetragrámaton, pero aquí el texto dice θεός y se traduce «Dios».
  - Se mantuvo «sumo sacerdote» como término cultual estándar en español.
  - Se preservó la distinción entre la pasiva participial («tomado») y la finalidad («para que presente»).
  - Se evitó reemplazar el lenguaje representativo de ἀνθρώπων por una neutralización no atestiguada en el audit trail principal.
