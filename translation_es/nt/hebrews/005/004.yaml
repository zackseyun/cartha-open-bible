translation:
  language: es
  text: Y nadie toma para sí[a] este honor, sino que es llamado por Dios, así como también Aarón lo fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el honor». El griego dice simplemente «el honor», refiriéndose en contexto a la dignidad u oficio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: τις
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no uno
  lexicon: BDAG
  rationale: Con la negación οὐχ, el indefinido τις funciona como negación universal; en español, «nadie» expresa de forma natural ese valor sin calco mecánico.
- source_word: ἑαυτῷ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí mismo
  - por sí
  lexicon: BDAG
  rationale: El dativo reflexivo indica apropiación personal. «Para sí» comunica bien la idea de asumir el honor por iniciativa propia y suena más natural que una construcción más pesada.
- source_word: λαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - se toma
  lexicon: BDAG
  rationale: «Toma» conserva el contraste de auto-atribución que el contexto exige. «Recibe» suavizaría demasiado la oposición entre apropiarse del honor y ser llamado por Dios.
- source_word: τὴν τιμήν
  english_pob_choice: this honor
  chosen_spanish: este honor
  alternatives_spanish:
  - el honor
  - esta honra
  - esta dignidad
  lexicon: BDAG
  rationale: «Honor» es la equivalencia directa más transparente. El demostrativo «este» ayuda a recuperar el referente contextual del sacerdocio sin convertir el término en una explicación interpretativa.
- source_word: καλούμενος
  english_pob_choice: when called / being called
  chosen_spanish: es llamado
  alternatives_spanish:
  - siendo llamado
  - llamado
  lexicon: BDAG
  rationale: El participio pasivo expresa condición o modo bajo el que alguien recibe el honor. En español, la pasiva «es llamado» comunica claramente la acción divina sin añadir matices temporales ajenos al griego.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de Dios
  - por el Dios
  lexicon: BDAG
  rationale: La preposición de agente ὑπό se traduce naturalmente con «por»; «Dios» se mantiene sin artículo, como en el español bíblico estándar y conforme al referente divino.
- source_word: καθώσπερ καὶ Ἀαρών
  english_pob_choice: just as Aaron also was
  chosen_spanish: así como también Aarón
  alternatives_spanish:
  - tal como también Aarón
  - del mismo modo que Aarón también
  lexicon: BDAG
  rationale: El griego compara el caso del sujeto con Aarón; en español, la cláusula comparativa puede quedar elíptica porque el verbo se sobreentiende por el contexto. «También» conserva la fuerza de καὶ.
theological_decisions:
- issue: Naturaleza del 'honor' en contexto sacerdotal
  english_pob_reading: The verse states that priestly honor is not self-assumed but depends on divine calling, with Aaron as the paradigm.
  chosen_spanish_reading: El versículo afirma que este honor no puede apropiarse uno mismo, sino que depende del llamado de Dios, con Aarón como modelo.
  alternative_spanish_readings:
  - El versículo habla solo de honor en sentido general.
  - El versículo debe decir explícitamente 'oficio' o 'cargo'.
  rationale: El contexto inmediato de Hebreos 5:1–5 trata del sumo sacerdocio, por lo que «este honor» mantiene la referencia contextual sin sustituirla por una explicación más fuerte que el texto no da. Se preserva la tensión entre 'honor' y función sacerdotal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego con la revisión auditada del inglés POB: se evitó agregar una idea de condición temporal explícita que no está en el texto y se prefirió una pasiva directa para καλούμενος. También se conservó el referente contextual de τιμή como «este honor» sin convertirlo en «oficio».'
  spanish_consistency_notes:
  - Se usó «Dios» en lugar de una perífrasis con artículo, conforme al uso bíblico natural en español.
  - Se mantuvo «Aarón» como forma tradicional y clara del nombre propio.
  - La estructura «nadie toma para sí este honor» conserva la oposición semántica entre auto-atribución y llamado divino.
