translation:
  language: es
  text: pudiendo tratar con gentileza a los que ignoran y a los que se desvían[a], puesto que él mismo también está rodeado de debilidad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo extraviados». El participio griego puede entenderse con un matiz pasivo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «está rodeado de» o «está vestido de» debilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετριοπαθεῖν
  english_pob_choice: deal gently
  chosen_spanish: tratar con mansedumbre
  alternatives_spanish:
  - ser benigno con
  - tratar con suavidad
  - mostrar moderación
  lexicon: BDAG
  rationale: La forma griega expresa una respuesta medida y contenida, no dureza. «Tratar con mansedumbre» comunica bien en español esa actitud pastoral sin convertirla en una mera emoción interior.
- source_word: δυνάμενος
  english_pob_choice: being able
  chosen_spanish: pudiendo
  alternatives_spanish:
  - siendo capaz
  - capaz de
  - pudiendo ser
  lexicon: BDAG
  rationale: El participio presente se integra naturalmente en español como construcción participial. «Pudiendo» conserva la idea de capacidad continua que modifica la descripción del sumo sacerdote.
- source_word: τοῖς ἀγνοοῦσι
  english_pob_choice: with those who are ignorant
  chosen_spanish: a los ignorantes
  alternatives_spanish:
  - a los que ignoran
  - a los que están en ignorancia
  - con los ignorantes
  lexicon: BDAG
  rationale: El dativo funciona como complemento del trato. En español, «a los ignorantes» es conciso y natural, y conserva el referente de personas que actúan sin conocimiento.
- source_word: πλανωμένοις
  english_pob_choice: going astray
  chosen_spanish: a los que se desvían
  alternatives_spanish:
  - a los extraviados
  - a los que andan errantes
  - a los que son desviados
  lexicon: BDAG
  rationale: La forma participial puede expresar tanto el acto de extraviarse como una posible lectura pasiva. «Se desvían» mantiene el sentido moral de apartarse, sin cerrar la tensión entre voz activa y pasiva.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - porque
  - pues
  lexicon: BDAG
  rationale: La conjunción introduce la razón del trato compasivo. «Puesto que» es natural en español formal y mantiene el valor causal.
- source_word: καὶ αὐτὸς
  english_pob_choice: he himself also
  chosen_spanish: él mismo también
  alternatives_spanish:
  - él también
  - él mismo además
  - también él mismo
  lexicon: BDAG
  rationale: La combinación es enfática. «Él mismo también» conserva el énfasis personal y el vínculo con aquellos a quienes sirve.
- source_word: περίκειται ἀσθένειαν
  english_pob_choice: is beset with weakness
  chosen_spanish: está rodeado de debilidad
  alternatives_spanish:
  - está vestido de debilidad
  - está cercado por debilidad
  - está sujeto a debilidad
  lexicon: BDAG
  rationale: El giro literal apunta a estar envuelto o rodeado. «Está rodeado de debilidad» conserva esa imagen sin perder inteligibilidad en español; «debilidad» retiene la amplitud de ἀσθένεια sin restringirla a lo físico o lo moral.
theological_decisions:
- issue: Alcance de «los ignorantes y los que se desvían»
  english_pob_reading: The verse refers to those who sin in ignorance and by straying, without narrowing the statement to a technical sacrificial category only.
  chosen_spanish_reading: El texto se refiere a personas que pecan por ignorancia y por desviarse, sin reducir la frase a una categoría técnica sacrificial exclusivamente.
  alternative_spanish_readings:
  - Una referencia más estricta a pecados involuntarios en el sistema levítico
  - Una alusión técnica cerrada a las ofensas de ignorancia
  rationale: La expresión griega es amplia y puede evocar el trasfondo levítico, pero no obliga a una restricción técnica. La versión española conserva esa amplitud y deja la tensión interpretativa abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Sentido de ἀσθένεια respecto del sumo sacerdote
  english_pob_reading: human weakness/frailty
  chosen_spanish_reading: debilidad humana / fragilidad
  alternative_spanish_readings:
  - debilidad física
  - debilidad moral
  - enfermedad
  rationale: En Hebreos el término puede abarcar la fragilidad propia de la condición humana. «Debilidad» mantiene esa amplitud y evita limitar el texto a un solo aspecto.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no formula.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del último pase de revisión, que indicó alta concordancia y sin cambios sustanciales; se mantuvo la lectura semántica principal y se conservaron las alternativas pertinentes en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto para el nombre divino solo cuando corresponda; este versículo no lo contiene.
  - Se evitó «Cristo» porque el texto no lo requiere.
  - Se conservó «debilidad» para ἀσθένεια por su amplitud semántica, en lugar de estrecharlo a enfermedad o falta moral.
  - La construcción participial española sigue el orden y la relación causal del griego sin forzar una sintaxis calcada.
