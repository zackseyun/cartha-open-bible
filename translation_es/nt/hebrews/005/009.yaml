translation:
  language: es
  text: y[a], habiendo sido hecho perfecto, llegó a ser [b]la fuente de salvación eterna a todos los que le obedecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo sido perfeccionado» o «habiendo sido llevado a la perfección». El griego probablemente se refiere a haber sido llevado a la plena culminación de su función sacerdotal y redentora, no a una mejora moral.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el autor» o «la causa» de la salvación eterna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τελειωθεὶς
  english_pob_choice: having been made perfect
  chosen_spanish: habiendo sido hecho perfecto
  alternatives_spanish:
  - habiendo sido perfeccionado
  - habiendo sido llevado a la perfección
  - habiendo sido hecho completo
  lexicon: BDAG
  rationale: El aoristo pasivo participial de τελειόω expresa aquí la llegada a la plenitud o culminación prevista. En español, «hecho perfecto» conserva la fuerza lexical de la revisión inglesa más reciente y mantiene la idea teleológica sin sugerir mejora moral previa. «Hecho completo» sería posible, pero en este contexto suena menos natural que «perfecto».
- source_word: ἐγένετο
  english_pob_choice: he became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - se convirtió en
  - llegó a convertirse en
  lexicon: BDAG
  rationale: γίνομαι aquí señala un estado o función resultante. «Llegó a ser» comunica bien el cambio de estado/rol en español, con un tono natural y sin añadir matices no presentes en el griego.
- source_word: πᾶσιν τοῖς ὑπακούουσιν αὐτῷ
  english_pob_choice: to all who obey him
  chosen_spanish: para todos los que le obedecen
  alternatives_spanish:
  - a todos los que le obedecen
  - para todos los obedientes a él
  - a todos los que le escuchan obedientemente
  lexicon: BDAG
  rationale: 'El dativo indica los beneficiarios, por eso «para» funciona bien en español. ὑπακούω significa obedecer; no conviene diluirlo en «escuchar» sin justificación. El presente participial se conserva con una forma relativa habitual: «los que le obedecen».'
- source_word: αἴτιος
  english_pob_choice: the source
  chosen_spanish: la fuente
  alternatives_spanish:
  - el autor
  - la causa
  - el origen
  lexicon: BDAG
  rationale: αἴτιος designa al responsable o causante de algo. «La fuente» transmite causalidad de modo claro y natural en español moderno, y evita el posible tono literario de «autor» o la aspereza de «causa».
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: En Hebreos, σωτηρία conserva su sentido teológico fuerte de salvación. «Salvación» es la equivalencia normal y más fiel en este contexto.
- source_word: αἰωνίου
  english_pob_choice: eternal
  chosen_spanish: eterna
  alternatives_spanish:
  - perdurable
  - para siempre
  lexicon: BDAG
  rationale: αἰώνιος modifica «salvación» y en español se expresa de forma directa con «eterna». Mantiene el valor temporal sin sobreinterpretar el término.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - así que
  - entonces
  lexicon: BDAG
  rationale: La conjunción simple enlaza esta cláusula con el contexto anterior. «Y» preserva esa conexión sin imponer una relación discursiva adicional.
theological_decisions:
- issue: Sentido cristológico de τελειωθεὶς
  english_pob_reading: having been made perfect, expressing vocational/teleological completion rather than moral improvement.
  chosen_spanish_reading: habiendo sido hecho perfecto, expresando culminación vocacional/teleológica y no mejora moral.
  alternative_spanish_readings:
  - habiendo sido perfeccionado
  - habiendo sido llevado a la perfección
  rationale: La redacción evita sugerir que Jesús pasó de imperfección moral a perfección ética. En Hebreos, el verbo apunta a la culminación del papel sacerdotal y redentor. «Hecho perfecto» conserva ese sentido y respeta la tensión teológica del texto.
  doctrine_reference: Credo Niceno; Definición de Calcedonia
- issue: Alcance de 'a todos los que le obedecen'
  english_pob_reading: Kept the obedience language explicit without softening it to 'believe in him'.
  chosen_spanish_reading: Se mantiene explícita la obediencia, sin sustituirla por 'creer en él'.
  alternative_spanish_readings:
  - para todos los que le escuchan
  - para todos los que le siguen
  rationale: El griego dice de manera explícita «los que le obedecen». La traducción conserva esa condición sin reducirla a una formulación doctrinal posterior ni expandirla innecesariamente.
  doctrine_reference: Principio de preservar la tensión teológica del texto
- issue: Naturaleza de αἴτιος
  english_pob_reading: the source / the cause / the author of eternal salvation.
  chosen_spanish_reading: la fuente de salvación eterna.
  alternative_spanish_readings:
  - la causa de salvación eterna
  - el autor de salvación eterna
  rationale: «Fuente» comunica causalidad y origen en español de manera clara. También deja abierto el matiz de responsabilidad causal del término griego sin fijarlo en un solo registro idiomático.
  doctrine_reference: Soteriología bíblica en Hebreos
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail, que prefirió «made perfect» frente a «made complete» por mayor exactitud léxica para τελειωθεὶς, y he reflejado esa decisión con «hecho perfecto» en español. También he conservado la relación causal-resultativa de γίνομαι y la condición explícita de obediencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en el versículo; no aplica aquí.
  - «salvación» se conserva como término soteriológico técnico, coherente con Hebreos.
  - La estructura participial se ha expresado con una construcción española fluida sin perder el valor de culminación resultante.
