  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Salvación eterna» y «obedecen» son adecuados. «Hecho perfecto» sigue la revisión inglesa más reciente y es defendible, aunque la nota alternativa ayuda a evitar malentendidos cristológicos. «La fuente» para αἴτιος es aceptable con nota de alternativas.
