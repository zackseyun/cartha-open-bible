  to: Porque aunque ya deberían ser maestros a estas alturas, otra vez tienen necesidad de que alguien les enseñe los principios básicos[a] del comienzo de los oráculos[b] de Dios, y han llegado a tener necesidad de leche, no de alimento sólido.
