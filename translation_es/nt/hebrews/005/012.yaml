translation:
  language: es
  text: Porque aunque ya deberían ser maestros a estas alturas, otra vez tienen necesidad de que alguien les enseñe los principios básicos[a] del comienzo de los oráculos[b] de Dios, y han llegado a tener necesidad de leche, no de alimento sólido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los principios elementales del comienzo».
    reason: lexical_alternative
  - marker: b
    text: «Oráculos de Dios» se refiere a dichos o revelaciones divinas, no a habla oracular pagana.
    reason: cultural_note
lexical_decisions:
- source_word: ὀφείλοντες εἶναι
  english_pob_choice: ought to be
  chosen_spanish: deberían ser
  alternatives_spanish:
  - están obligados a ser
  - tendrían que ser
  lexicon: BDAG
  rationale: Expresa obligación/expectativa moral de manera natural en español sin volverlo excesivamente jurídico. El participio con infinitivo señala una condición que ya debían haber alcanzado.
- source_word: διδάσκαλοι
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - instructores
  - docentes
  lexicon: BDAG
  rationale: «Maestros» es natural en español eclesial y comunica la idea de personas capaces de enseñar a otros. Mantiene la fuerza funcional de la palabra sin sonar técnica.
- source_word: διὰ τὸν χρόνον
  english_pob_choice: by this time
  chosen_spanish: por el tiempo transcurrido
  alternatives_spanish:
  - para este tiempo
  - ya a estas alturas
  lexicon: BDAG
  rationale: Recoge el sentido de tiempo transcurrido que produce la expectativa de madurez. Evita la calca «por el tiempo» y preserva la relación temporal del griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: 'Marca la regresión o repetición: vuelven a necesitar instrucción elemental. «Otra vez» es claro y directo en español.'
- source_word: χρείαν ἔχετε
  english_pob_choice: you need
  chosen_spanish: tienen necesidad de
  alternatives_spanish:
  - necesitan
  - les hace falta
  lexicon: BDAG
  rationale: Conserva el matiz de necesidad expresado por χρεία, sin perder naturalidad en español. La construcción es común y comunica dependencia real.
- source_word: τοῦ διδάσκειν ὑμᾶς
  english_pob_choice: someone to teach you
  chosen_spanish: de que alguien les enseñe
  alternatives_spanish:
  - para que alguien les enseñe
  - de ser enseñados
  lexicon: BDAG
  rationale: El infinitivo articular con genitivo se vuelve idiomáticamente en español mediante una subordinada con «de que». «Alguien» hace explícito el sujeto implícito que el inglés POB también añadió por claridad.
- source_word: τινὰ τὰ στοιχεῖα
  english_pob_choice: the basic principles
  chosen_spanish: los principios básicos
  alternatives_spanish:
  - los elementos básicos
  - los rudimentos
  lexicon: BDAG
  rationale: «στοιχεῖα» puede expresar principios o elementos fundamentales. «Principios básicos» sigue la revisión inglesa y suena natural en español, manteniendo la idea de enseñanzas elementales.
- source_word: τῆς ἀρχῆς
  english_pob_choice: of the beginning
  chosen_spanish: del comienzo
  alternatives_spanish:
  - del principio
  - de la iniciación
  lexicon: BDAG
  rationale: «ἀρχή» aquí señala la etapa inicial. «Del comienzo» es claro y evita la ambigüedad de «principio» en español, aunque no se descarta como alternativa cercana.
- source_word: τῶν λογίων τοῦ θεοῦ
  english_pob_choice: of the oracles of God
  chosen_spanish: de los oráculos de Dios
  alternatives_spanish:
  - de las palabras de Dios
  - de las declaraciones de Dios
  lexicon: BDAG
  rationale: Se conserva «oráculos» porque es la equivalencia preferida en el auditorio inglés y porque λόγια designa dichos/utterances divinos de tono elevado. No se sustituye por «palabras» para no aplanar el registro.
- source_word: γεγόνατε
  english_pob_choice: you have come to
  chosen_spanish: han llegado a tener
  alternatives_spanish:
  - se han vuelto
  - han pasado a
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante alcanzado con el tiempo. «Han llegado a tener» conserva ese desarrollo hacia la condición presente.
- source_word: χρείαν ἔχοντες
  english_pob_choice: need
  chosen_spanish: tener necesidad de
  alternatives_spanish:
  - necesitar
  - estar necesitados de
  lexicon: BDAG
  rationale: Repite el sustantivo verbal de necesidad en una forma natural en español y mantiene el paralelo con la cláusula anterior.
- source_word: γάλακτος
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche espiritual
  lexicon: BDAG
  rationale: La metáfora alimentaria se preserva literalmente. «Leche» comunica inmadurez/etapa inicial sin añadir explicación doctrinal que el texto no da.
- source_word: οὐ στερεᾶς τροφῆς
  english_pob_choice: not solid food
  chosen_spanish: no de alimento sólido
  alternatives_spanish:
  - no de comida sólida
  - no de nutrición sólida
  lexicon: BDAG
  rationale: Mantiene el contraste metafórico entre leche y alimento sólido con una formulación natural en español. «Alimento sólido» preserva la imagen de madurez sin interpretarla.
theological_decisions:
- issue: Metáfora de leche y alimento sólido
  english_pob_reading: Retained as a metaphor for spiritual immaturity versus maturity in instruction, without specifying a denominational scheme of discipleship.
  chosen_spanish_reading: Se conserva como metáfora de inmadurez y madurez en la enseñanza, sin convertirla en un esquema doctrinal cerrado.
  alternative_spanish_readings:
  - 'más explícitamente: enseñanza elemental frente a enseñanza avanzada'
  - parafrasear como formación básica y formación madura
  rationale: El versículo usa una imagen alimentaria y no define un currículo técnico. Mantener la metáfora respeta la retórica del autor y evita resolver indebidamente la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en lugar de eliminarla.
- issue: «Oráculos de Dios» como expresión elevada de revelación divina
  english_pob_reading: ‘Oracles of God’ refers to divine utterances or revelations, not pagan oracular speech.
  chosen_spanish_reading: «Oráculos de Dios» se entiende como dichos o revelaciones divinas, no como oráculos paganos.
  alternative_spanish_readings:
  - «palabras de Dios»
  - «declaraciones de Dios»
  rationale: En español, «oráculos» puede sonar a adivinación pagana si no se orienta. Se mantiene la expresión por fidelidad lexical, pero el registro y la nota aclaran que se trata de revelación divina.
  doctrine_reference: Hebreos 5:12; uso bíblico de λόγια τοῦ θεοῦ.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «basic elements» por «basic principles» para hacer más natural στοιχεῖα. La redacción española sigue esa decisión con «principios básicos», y conserva el contraste metafórico final sin desarrollar una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se prefiere «leche / alimento sólido» para mantener el contraste metafórico del pasaje.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Oráculos» se conserva por fidelidad al léxico de λόγια, con aclaración interpretativa en nota.
