translation:
  language: es
  text: 'Así también el Mesías[a] no se glorificó[b] a sí mismo para llegar a ser sumo sacerdote, sino aquel que le dijo: «Tú eres mi Hijo; hoy te he engendrado»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». El título griego Χριστός se traduce aquí como «Mesías» porque funciona como título más que como nombre.
    reason: alternative_reading
  - marker: b
    text: O «se honró». El verbo griego puede llevar el sentido de honor o gloria.
    reason: lexical_alternative
  - marker: c
    text: Cita de Salmo 2:7.
    reason: cross_reference
lexical_decisions:
- source_word: Οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera también
  - Igualmente
  lexicon: BDAG
  rationale: Mantiene la relación comparativa con lo anterior y suena natural en español sin perder la fuerza inferencial.
- source_word: ὁ Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí λειτουργa como título en el argumento sobre el nombramiento sacerdotal; 'Mesías' preserva mejor ese valor titular que 'Cristo'.
- source_word: οὐχ ἑαυτὸν ἐδόξασεν
  english_pob_choice: did not glorify himself
  chosen_spanish: no se glorificó[a] a sí mismo
  alternatives_spanish:
  - no se honró a sí mismo
  - no se exaltó a sí mismo
  lexicon: BDAG
  rationale: '''Glorificó'' conserva el verbo δοξάζω y el paralelismo con la acción divina. En español, la nota permite reconocer la alternativa semántica de ''honrar'' sin borrar la tensión lexical.'
- source_word: γενηθῆναι ἀρχιερέα
  english_pob_choice: to become high priest
  chosen_spanish: para llegar a ser sumo sacerdote
  alternatives_spanish:
  - para ser hecho sumo sacerdote
  - para convertirse en sumo sacerdote
  lexicon: BDAG
  rationale: '''Llegar a ser'' expresa bien el cambio de estado indicado por el infinitivo de γίνομαι y ''sumo sacerdote'' es la equivalencia española estable para el oficio.'
- source_word: ἀλλ’ ὁ λαλήσας πρὸς αὐτόν
  english_pob_choice: but the one who spoke to him
  chosen_spanish: sino el que le habló
  alternatives_spanish:
  - sino el que le dijo
  - sino quien le habló
  lexicon: BDAG
  rationale: La cláusula contrastiva queda clara y natural; 'habló' preserva el participio verbal sin forzar una paráfrasis.
- source_word: Υἱός μου εἶ σύ
  english_pob_choice: You are my Son
  chosen_spanish: Tú eres mi Hijo
  alternatives_spanish:
  - Mi Hijo eres tú
  lexicon: BDAG
  rationale: La inversión griega se comunica con un español directo y reverente. 'Hijo' mantiene la cita bíblica sin añadir matices doctrinales extra.
- source_word: ἐγὼ σήμερον γεγέννηκά σε
  english_pob_choice: today I have begotten you
  chosen_spanish: yo te he engendrado hoy
  alternatives_spanish:
  - hoy te he engendrado
  - hoy te he dado vida
  lexicon: BDAG
  rationale: '''Engendrado'' preserva la intertextualidad con Salmo 2:7 y evita suavizar el verbo. Se mantiene la formulación de cita sin resolver su alcance teológico en el texto principal.'
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La secuencia argumenta sobre un oficio recibido, no sobre un nombre propio. 'Mesías' mantiene la función titular y el trasfondo judío del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; ''Christ'' where name-like'
- issue: Meaning of δοξάζω in the negative clause
  english_pob_reading: did not glorify himself
  chosen_spanish_reading: no se glorificó a sí mismo
  alternative_spanish_readings:
  - no se honró a sí mismo
  - no se exaltó a sí mismo
  rationale: Se conserva la tensión entre 'glorificar' y 'honrar' sin borrar el vínculo léxico. La nota permite al lector ver la alternativa semántica documentada.
  doctrine_reference: Preserve lexical tension; do not erase documented alternatives
- issue: Citation of Psalm 2:7
  english_pob_reading: today I have begotten you
  chosen_spanish_reading: yo te he engendrado hoy
  alternative_spanish_readings:
  - hoy te he engendrado
  - te he engendrado hoy
  rationale: La cita se traduce de forma directa y formal, sin expandirla para fijar debates posteriores sobre entronización, resurrección o generación eterna.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantiene sin cambios; no se registraron revisiones aplicadas. El borrador español sigue esa lectura estable y conserva las decisiones auditadas sobre Χριστός, δοξάζω y la cita de Salmo 2:7.
  spanish_consistency_notes:
  - Se usó 'Mesías' de manera consistente con la guía del proyecto para Χριστός como título.
  - '''Sumo sacerdote'' reproduce de forma idiomática ἀρχιερεύς sin perder el cargo específico.'
  - Se evitó 'Cristo' en el texto principal para no neutralizar el valor titular del término.
  - La cita bíblica se mantuvo formal y no interpretativa para respetar el tono del original.
