base_translation:
  language: en
  yaml_path: translation/nt/hebrews/005/005.yaml
  text: 'So also the Messiah did not glorify himself to become high priest[a], but the one who spoke to him: “You are my Son[c][b]; today I have begotten you.”'
  footnotes:
