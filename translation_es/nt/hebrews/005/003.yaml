translation:
  language: es
  text: Y por esta razón está obligado[a], así como por el pueblo, así también por sí, a ofrecer por los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por ello»; se refiere a la debilidad del sumo sacerdote mencionada en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ αὐτὴν
  english_pob_choice: because of this
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por ello
  - a causa de esto
  lexicon: BDAG
  rationale: El griego expresa causalidad con διά + acusativo y remite a la debilidad mencionada en el versículo anterior. «Por esta razón» suena natural en español y preserva el valor causal sin especificar de más el antecedente en el cuerpo del texto.
- source_word: ὀφείλει
  english_pob_choice: he is obligated
  chosen_spanish: está obligado
  alternatives_spanish:
  - debe
  - está en deuda
  lexicon: BDAG
  rationale: «Está obligado» comunica con claridad la idea de deber u obligación jurídica/funcional en el contexto sacerdotal. Evita suavizar el matiz con un simple «debe» y mantiene el tono formal del pasaje.
- source_word: καθὼς ... οὕτως καὶ
  english_pob_choice: just as ... so also
  chosen_spanish: así como ... así también
  alternatives_spanish:
  - tal como ... también
  - como ... así también
  lexicon: BDAG
  rationale: La correlación comparativa del griego se refleja de modo directo con «así como ... así también», fórmula natural y equilibrada en español.
- source_word: τοῦ λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: BDAG
  rationale: En contexto levítico, λαός se refiere al pueblo del pacto. «El pueblo» conserva esa referencia sin añadir una expansión interpretativa en el texto principal.
- source_word: περὶ αὑτοῦ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - en favor de sí mismo
  - por su propia persona
  lexicon: BDAG
  rationale: El reflexivo en español queda bien expresado con «por sí mismo», que mantiene el sentido de referencia propia y funciona naturalmente junto con la estructura sacerdotal del versículo.
- source_word: προσφέρειν
  english_pob_choice: to offer
  chosen_spanish: a ofrecer
  alternatives_spanish:
  - a presentar
  - a ofrecer sacrificio
  lexicon: BDAG
  rationale: El griego no explicita un objeto en este versículo; por eso se mantiene el verbo simple «ofrecer» sin añadir «sacrificios» en el texto principal. El contexto cultual ya hace evidente el acto sacerdotal.
- source_word: περὶ ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - por causa de los pecados
  - en relación con los pecados
  - como ofrenda por el pecado
  lexicon: BDAG
  rationale: La construcción περί + genitivo en este contexto sacrificial se expresa de forma sobria con «por los pecados». «Como ofrenda por el pecado» sería más interpretativo y especificaría una equivalencia que el griego aquí no formula explícitamente.
theological_decisions:
- issue: Antecedente de la expresión causal
  english_pob_reading: The phrase refers to the high priest's weakness mentioned in the previous verse.
  chosen_spanish_reading: La frase se entiende como referencia a la debilidad del sumo sacerdote mencionada en el versículo anterior.
  alternative_spanish_readings:
  - Puede tomarse de manera más general como referencia a su oficio o situación.
  - Puede leerse como una referencia vaga a la condición sacerdotal en general.
  rationale: La referencia inmediata y más coherente es la debilidad descrita en Hebreos 5:2. Mantener la ambigüedad controlada en la traducción evita resolver innecesariamente una relación ya bien fundamentada por el contexto.
  doctrine_reference: Primacía del texto original y conservación de la tensión contextual sin sobreexplicación.
- issue: Objeto implícito de «ofrecer»
  english_pob_reading: The English text includes 'sacrifices' to make the cultic action explicit.
  chosen_spanish_reading: Se conserva «a ofrecer» sin añadir un objeto explícito, porque el griego no lo expresa en este versículo.
  alternative_spanish_readings:
  - Añadir «a ofrecer sacrificios» para hacer explícito el contexto cultual.
  - Dejar solo «a ofrecer» sin más expansión.
  rationale: Aunque el contexto sacerdotal es claramente sacrificial, el griego de este versículo usa un infinitivo simple. En español, mantener la sobriedad evita introducir una precisión no formulada aquí, respetando la revisión del POB en inglés.
  doctrine_reference: Equivalencia óptima con control del grado de explicitación; fidelidad a la forma textual.
translation_notes:
  revision_awareness: La revisión inglesa eliminó la expansión «sacrifices» porque el griego solo dice «ofrecer» sin objeto expreso. Este borrador español sigue esa revisión y conserva la estructura correlativa del versículo, con la causalidad referida al versículo previo. No se introducen términos cultuales adicionales en el texto principal.
  spanish_consistency_notes:
  - Se usa «pueblo» para λαός, en línea con el contexto levítico y el estilo eclesial amplio.
  - Se evita «Cristo» porque este versículo no contiene Χριστός; tampoco se introduce «SEÑOR» o una máscara equivalente.
  - «Pecados» se conserva en plural para reflejar ἁμαρτιῶν y el marco sacrificial general.
  - La nota al pie marca solo la alternativa causal documentada sin desplazar el sentido principal del texto.
