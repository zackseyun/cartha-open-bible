translation:
  language: es
  text: habiendo sido designado por Dios como sumo sacerdote[a] según el orden de Melquisedec[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo sido llamado por Dios sumo sacerdote» o «habiendo sido designado por Dios sumo sacerdote».
    reason: lexical_alternative
  - marker: b
    text: Esto hace eco del Salmo 110:4, donde el sacerdocio se describe como «según el orden de Melquisedec».
    reason: cross_reference
lexical_decisions:
- source_word: προσαγορευθεὶς
  english_pob_choice: having been designated
  chosen_spanish: habiendo sido designado
  alternatives_spanish:
  - habiendo sido llamado
  - habiendo sido nombrado
  - habiendo sido nombrado
  lexicon: BDAG
  rationale: El participio aoristo pasivo introduce una acción divina de designación o proclamación pública. «Designado» conserva ese sentido formal sin forzar una idea más fuerte de investidura institucional que el verbo por sí solo no exige.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios el Padre
  lexicon: BDAG
  rationale: La preposición ὑπό con genitivo expresa agencia personal en pasiva. El griego dice simplemente «por Dios»; añadir «el Padre» iría más allá del texto.
- source_word: ἀρχιερεὺς
  english_pob_choice: a high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - sacerdote principal
  lexicon: BDAG
  rationale: En español, «sumo sacerdote» es la expresión estable y fiel para ἀρχιερεύς. El griego funciona como predicado nominativo; el español permite omitir artículo para una formulación natural sin perder el valor descriptivo.
- source_word: κατὰ τὴν τάξιν
  english_pob_choice: according to the order
  chosen_spanish: según el orden
  alternatives_spanish:
  - de acuerdo con el orden
  - conforme al orden
  - según la clase
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad o correspondencia. «Según el orden» mantiene la conexión conceptual con Salmo 110:4 y con el argumento de Hebreos.
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melquisedeq
  - Melchisedec
  lexicon: BDAG
  rationale: Se translitera el nombre propio con la forma hispana más reconocible y estable en contexto bíblico.
theological_decisions:
- issue: Cómo reflejar el participio sin insinuar un cambio ontológico del Hijo
  english_pob_reading: having been designated by God as a high priest
  chosen_spanish_reading: habiendo sido designado por Dios como sumo sacerdote
  alternative_spanish_readings:
  - habiendo sido nombrado por Dios como sumo sacerdote
  - siendo llamado por Dios sumo sacerdote
  rationale: La frase debe expresar la declaración o designación divina de su sacerdocio, no un cambio de naturaleza. «Habiendo sido designado» conserva la tensión teológica del pasaje y se alinea con la lectura auditada del POB.
  doctrine_reference: Hebreos 5; Salmo 110:4; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene alta concordancia y no presenta revisiones pendientes; esta propuesta sigue esa lectura sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» sin añadir «el Padre», conforme al griego.
  - Se conserva «sumo sacerdote» por su valor técnico y su naturalidad en español bíblico.
  - «Orden» traduce τάξις con el sentido de patrón o categoría sacerdotal, no mera secuencia temporal.
  - El nombre propio se adapta a la forma española habitual «Melquisedec» para lectura eclesial amplia.
