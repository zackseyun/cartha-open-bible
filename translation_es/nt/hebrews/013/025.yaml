lexical_decisions:
- source_word: ἡ χάρις
  english_pob_choice: Grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - Gracia
  lexicon: BDAG
  rationale: χάρις aquí funciona como la bendición epistolar convencional; en español, el sustantivo necesita artículo para sonar natural y fiel al giro salutatorio, sin añadir contenido doctrinal.
- source_word: μετὰ
  english_pob_choice: be with
  chosen_spanish: sea con
  alternatives_spanish:
  - esté con
  lexicon: BDAG
  rationale: 'μετά con genitivo significa ''con''. En español, la fórmula benedictoria se expresa de manera natural con un verbo elíptico/optativo: ''sea con'', que reproduce bien el sentido de despedida del original.'
- source_word: πάντων ὑμῶν
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - todos vosotros
  lexicon: BDAG
  rationale: πάντων ὑμῶν abarca a toda la audiencia sin excepción. 'Todos ustedes' conserva ese alcance distributivo de modo idiomático en español latinoamericano.
theological_decisions:
- issue: Fórmula final de bendición sin sujeto explícito en griego
  english_pob_reading: Grace be with all of you.
  chosen_spanish_reading: La gracia sea con todos ustedes.
  alternative_spanish_readings:
  - Que la gracia esté con todos ustedes.
  - La gracia esté con todos ustedes.
  rationale: 'El griego presenta una bendición final muy breve y elíptica. En español conviene suplir la forma verbal de manera natural, sin alterar el contenido: es una despedida benedictoria, no una afirmación doctrinal adicional.'
  doctrine_reference: Bendición apostólica / fórmula epistolar final
translation_notes:
  revision_awareness: El texto griego y la solución inglesa están en alto acuerdo y no presentan variantes textuales relevantes en el expediente; por eso no se introducen notas críticas ni alternativas textuales.
  spanish_consistency_notes:
  - Se usa 'gracia' para χάρις, conforme al valor benedictorio documentado.
  - Se traduce la inclusión total de πάντων ὑμῶν con 'todos ustedes' para evitar una genericidad menos precisa.
  - Se mantiene un español moderno y digno, adecuado para lectura eclesial general.
