translation:
  language: es
  text: Que el amor fraternal[a] permanezca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amor entre los creyentes»; el término griego refiere al afecto familiar dentro de la comunidad cristiana, no solo a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλαδελφία
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - amor de hermanos
  - amor entre los creyentes
  lexicon: BDAG
  rationale: El término griego expresa amor/afecto entre hermanos o miembros de una misma familia, y por extensión en la comunidad cristiana. En español, «amor fraternal» conserva esa metáfora familiar de manera natural y fiel, sin reducirla a una formulación más abstracta.
- source_word: μενέτω
  english_pob_choice: let ... continue
  chosen_spanish: permanezca
  alternatives_spanish:
  - continúe
  - permanezca firme
  - siga
  lexicon: BDAG
  rationale: El imperativo presente de μένω pide una acción continua o un estado duradero. «Permanezca» comunica bien la idea de mantenerse en curso, con un tono exhortativo natural en español.
- source_word: Ἡ
  english_pob_choice: the
  chosen_spanish: el / la (implícito en español)
  alternatives_spanish:
  - la
  lexicon: Greek grammar
  rationale: El artículo griego señala un rasgo definido o reconocible; en español no es necesario reproducirlo explícitamente como si fuera una palabra aparte. La formulación idiomática ya mantiene el valor exhortativo del sintagma.
theological_decisions:
- issue: Alcance de φιλαδελφία y metáfora familiar
  english_pob_reading: Render as 'brotherly love' in the main text, preserving the familial metaphor rather than neutralizing it.
  chosen_spanish_reading: «amor fraternal» mantiene el lenguaje familiar sin limitarlo a varones ni diluirlo en una abstracción genérica.
  alternative_spanish_readings:
  - amor entre creyentes
  - amor de hermanos
  - amor mutuo
  rationale: La base griega remite a afecto familiar dentro de la comunidad cristiana. En español, «fraternal» conserva la imagen de familia espiritual y evita que se pierda la fuerza metafórica del original; a la vez, no restringe indebidamente el sentido a hombres solamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El control de revisión indica alta concordancia con el texto y la decisión inglesa: no hubo cambios aplicados en la última pasada, y la traducción propuesta conserva la misma fuerza exhortativa y el mismo campo semántico familiar de φιλαδελφία y del imperativo durativo de μενέτω.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones innecesarias porque el versículo no contiene el nombre divino.
  - «Amor fraternal» es una opción estable y publicable en español que preserva la metáfora de parentesco del griego.
  - La nota al pie mantiene explícita la amplitud comunitaria del término, tal como lo hace el audit trail inglés.
