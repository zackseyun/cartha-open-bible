translation:
  language: es
  text: Oren por nosotros[a], porque estamos persuadidos[b] de que tenemos una buena conciencia[c], deseando conducirnos bien en todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Sigan orando por nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «convencidos» o «confiados».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «una conciencia clara».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσεύχεσθε
  english_pob_choice: Pray
  chosen_spanish: Oren
  alternatives_spanish:
  - Rueguen
  - Sigan orando
  lexicon: BDAG
  rationale: El imperativo presente plural pide una acción dirigida a la comunidad; en español, «Oren» es natural, digno y suficientemente breve. «Sigan orando» explicitaría el aspecto durativo, pero añade más de lo que el griego exige en el texto principal.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - acerca de nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: En lenguaje de oración, περί + genitivo se expresa de forma idiomática como «por». «Por nosotros» conserva la relación intercesora sin sonar forzado.
- source_word: πειθόμεθα
  english_pob_choice: we are persuaded
  chosen_spanish: estamos persuadidos
  alternatives_spanish:
  - estamos convencidos
  - tenemos la convicción
  lexicon: BDAG
  rationale: El matiz cognitivo de πείθω se conserva bien con «estamos persuadidos». Esta opción mantiene la fuerza de una certeza adquirida sin convertirla en presunción moral.
- source_word: καλὴν συνείδησιν
  english_pob_choice: a good conscience
  chosen_spanish: una buena conciencia
  alternatives_spanish:
  - una conciencia limpia
  - una conciencia clara
  lexicon: BDAG
  rationale: «Buena conciencia» reproduce de cerca la combinación adjetivo + sustantivo y evita interpretar más de la cuenta a καλὴν. Las alternativas idiomáticas intensifican la idea hacia claridad o limpieza.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: Verbo simple y directo; no requiere perífrasis.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todos los aspectos
  lexicon: BDAG
  rationale: La construcción adverbial abarca de modo comprehensivo la conducta. «En todas las cosas» preserva esa amplitud sin estrechar el sentido a un solo ámbito moral.
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - honradamente
  - rectamente
  lexicon: BDAG
  rationale: Como adverbio que modifica ἀναστρέφεσθαι, «bien» es la forma más natural en español. «Honradamente» o «rectamente» serían más interpretativas y restringirían el alcance.
- source_word: θέλοντες
  english_pob_choice: desiring
  chosen_spanish: deseando
  alternatives_spanish:
  - queriendo
  - anhelando
  lexicon: BDAG
  rationale: El participio presente expresa actitud o intención continua. «Deseando» permite mantener la relación participial con claridad y con un registro adecuado al tono epistolar.
- source_word: ἀναστρέφεσθαι
  english_pob_choice: to conduct ourselves
  chosen_spanish: comportarnos
  alternatives_spanish:
  - vivir
  - conducirnos
  lexicon: BDAG
  rationale: El verbo describe la manera de vivir o de conducirse. «Comportarnos» comunica el sentido ético de conducta cotidiana de manera clara en español; «conducirnos» sería más cercano al registro formal, pero menos natural para muchos lectores.
theological_decisions:
- issue: Relación lógica del participio final con la afirmación de una buena conciencia
  english_pob_reading: 'Rendered as explanatory/causal: ''desiring to conduct ourselves well in all things.'''
  chosen_spanish_reading: 'Se mantiene como participio explicativo: «deseando comportarnos bien en todas las cosas».'
  alternative_spanish_readings:
  - porque deseamos comportarnos bien en todas las cosas
  - al desear comportarnos bien en todas las cosas
  rationale: 'El griego θέλοντες puede funcionar como explicación de la afirmación anterior sin exigir una causalidad fuerte en español. Mantener el participio evita sobreformalizar la relación y conserva la tensión: la buena conciencia se vincula con un deseo real de conducta recta, no con perfección moral sin resto.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto griego y también la revisión final del POB inglés: πειθόμεθα se reflejó como una certeza personal («estamos persuadidos»), θέλοντες quedó como participio («deseando») y ἐν πᾶσιν se vertió de forma totalizante («en todas las cosas»). Se evitó introducir una inferencia más fuerte que la del griego, especialmente en la relación entre la buena conciencia y el deseo de conducta recta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - «Conciencia» se conserva como término moral estándar y no se amplía a otra categoría.
  - El verbo de conducta se traduce con un español natural y ético, sin volverlo más técnico de lo que el griego exige.
  - Las notas marcan alternativas reales de traducción sin duplicar marcadores ni mezclar sentidos distintos en una misma nota.
