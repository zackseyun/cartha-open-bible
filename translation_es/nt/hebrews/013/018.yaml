review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: imperativo de oración, afirmación de convicción sobre una buena conciencia y participio final de intención ética. Sin embargo, dos elementos requieren ajuste. Primero, «comportarnos» reduce ἀναστρέφεσθαι a conducta/porte y queda algo más estrecho que «conducirnos» o «vivir», cuando el griego apunta al modo de vida/conducta. Segundo, la nota [a] no preserva una alternativa léxica real del inglés ni del griego; explica indebidamente «por nosotros» en vez de reflejar la alternativa documentada sobre Προσεύχεσθε/πειθόμεθα.'
  spanish_quality_summary: El español es claro y digno, pero «en todas las cosas» suena algo rígido y menos natural que «en todo», sin pérdida de sentido. También conviene alinear las notas con los puntos realmente ambiguos del original y del rastro POB. El resto del registro es adecuado para una Biblia eclesial ampliamente legible.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Las decisiones principales son aceptables: «Oren», «por nosotros», «estamos persuadidos», «buena conciencia». La mejora principal es preferir «conducirnos bien» para ἀναστρέφεσθαι y ajustar las notas a las alternativas auditadas: [a] debe ir con «Oren» y recoger la alternativa de πειθόμεθα implícita en el inglés auditado; «conciencia clara» puede conservarse como alternativa de καλὴν συνείδησιν.'
  issues:
  - severity: medium
    issue: La nota [a] está mal orientada
    rationale: El inglés POB pone la nota [a] sobre «Pray for us» con la alternativa «we are persuaded / we are confident», que en realidad corresponde al verbo πειθόμεθα. La nota española actual sobre «por nosotros» no preserva una alternativa textual o léxica significativa del original.
  - severity: medium
    issue: «Comportarnos» estrecha ἀναστρέφεσθαι
    rationale: El verbo griego suele expresar la manera de vivir o conducirse. «Comportarnos» puede sonar más limitado a modales o conducta puntual; «conducirnos» mantiene mejor el matiz ético de modo de vida.
  - severity: low
    issue: «En todas las cosas» suena menos natural en español actual
    rationale: Aunque es fiel, «en todo» comunica la amplitud de ἐν πᾶσιν con mejor fluidez en español neutral y no reduce el sentido.
  revised_spanish_text: Oren por nosotros[a], porque estamos persuadidos[b] de que tenemos una buena conciencia[c], deseando conducirnos bien en todo.
