- from: Que el matrimonio[a] sea tenido en honor entre todos[b], y el lecho matrimonial sea sin mancha; porque Dios juzgará a los sexualmente inmorales y a los adúlteros.
  to: Que el matrimonio[a] sea honrado entre todos[b], y el lecho matrimonial sea sin mancha; porque Dios juzgará a los inmorales sexuales y a los adúlteros.
  rationale: Se hicieron ajustes menores de estilo para mejorar la naturalidad del español sin alterar el sentido ni las decisiones exegéticas del POB inglés. «Sea honrado» conserva el valor exhortativo de τίμιος con mejor fluidez que «sea tenido en honor». «Los inmorales sexuales» comunica mejor πόρνους en español natural y mantiene la distinción con «adúlteros». Se conservaron las dos notas porque la ambigüedad sintáctica inicial y la alternativa de ἐν πᾶσιν siguen siendo relevantes.
