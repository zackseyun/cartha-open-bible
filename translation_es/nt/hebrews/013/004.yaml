translation:
  language: es
  text: Que el matrimonio[a] sea honrado entre todos[b], y el lecho matrimonial sea sin mancha; porque Dios juzgará a los inmorales sexuales y a los adúlteros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El matrimonio es honorable entre todos». El griego no tiene verbo explícito en la primera cláusula, de modo que puede leerse como exhortación o como afirmación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «por todos» en vez de «entre todos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίμιος
  english_pob_choice: be held in honor
  chosen_spanish: sea tenido en honor
  alternatives_spanish:
  - es honorable
  - sea precioso
  - sea estimado
  lexicon: BDAG
  rationale: τίμιος expresa la idea de algo honrado, valioso o estimado. Siguiendo la lectura exhortativa del POB inglés, «sea tenido en honor» mantiene el matiz de exhortación y el valor semántico de honor/reconocimiento sin reducirlo a una simple afirmación descriptiva.
- source_word: γάμος
  english_pob_choice: marriage
  chosen_spanish: el matrimonio
  alternatives_spanish:
  - la unión matrimonial
  - las bodas
  lexicon: BDAG
  rationale: Aquí γάμος designa el estado o institución del matrimonio, no una ceremonia. «Matrimonio» es el equivalente más natural y preciso en español.
- source_word: ἐν πᾶσιν
  english_pob_choice: among all
  chosen_spanish: entre todos
  alternatives_spanish:
  - por todos
  - en todo sentido
  lexicon: BDAG
  rationale: 'La frase en dativo plural puede leerse con referencia a personas: que el matrimonio sea honrado entre todos. «Entre todos» conserva esa amplitud sin decidir innecesariamente entre «por todos» y «entre todos».'
- source_word: κοίτη
  english_pob_choice: the marriage bed
  chosen_spanish: el lecho matrimonial
  alternatives_spanish:
  - la cama matrimonial
  - el lecho
  - la unión sexual
  lexicon: BDAG
  rationale: κοίτη puede funcionar como metonimia de las relaciones sexuales. «El lecho matrimonial» comunica esa referencia de manera digna y clara en español, sin volverse excesivamente crudo ni evasivo.
- source_word: ἀμίαντος
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculado
  - sin contaminar
  - puro
  lexicon: BDAG
  rationale: ἀμίαντος significa no manchado, no contaminado, puro. «Sin mancha» preserva el tono moral y cultual del término y suena natural en español bíblico contemporáneo.
- source_word: πόρνους
  english_pob_choice: the sexually immoral
  chosen_spanish: a los sexualmente inmorales
  alternatives_spanish:
  - a los inmorales sexuales
  - a los fornicarios
  - a los impuros sexualmente
  lexicon: BDAG
  rationale: πόρνος abarca a la persona entregada a la inmoralidad sexual en general. «Sexualmente inmorales» mantiene la amplitud del término mejor que «fornicarios», que en español puede sonar más estrecho o arcaizante.
- source_word: μοιχοὺς
  english_pob_choice: adulterers
  chosen_spanish: a los adúlteros
  alternatives_spanish:
  - a los que cometen adulterio
  lexicon: BDAG
  rationale: μοιχός designa específicamente al adúltero. «Adúlteros» conserva la distinción frente a πόρνοι y es claro en español.
- source_word: κρινεῖ
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - condenará
  - hará juicio
  lexicon: BDAG
  rationale: El futuro de κρίνω apunta a juicio futuro. «Juzgará» reproduce el valor básico del verbo sin añadir explícitamente el resultado final, como hace el texto griego.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón de la exhortación o afirmación anterior. «Porque» comunica con claridad la relación causal en español.
theological_decisions:
- issue: ¿La primera cláusula es declarativa o exhortativa?
  english_pob_reading: 'Exhortational/imperative: ''Let marriage be held in honor among all'''
  chosen_spanish_reading: 'Exhortativa: «Que el matrimonio sea tenido en honor entre todos»'
  alternative_spanish_readings:
  - 'Declarativa: «El matrimonio es honorable entre todos»'
  rationale: El griego carece de verbo finito explícito, así que hay una ambigüedad real. En el contexto inmediato de exhortaciones éticas de Hebreos 13, la lectura exhortativa encaja mejor con el flujo discursivo y evita sugerir que todos de hecho honran el matrimonio. La alternativa declarativa sigue siendo viable y no debe ocultarse.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El contexto auditado del POB inglés mantiene la ambigüedad de la primera cláusula y conserva la nota sobre ἐν πᾶσιν. No hay revisiones posteriores que alteren la lectura, y el control cruzado reporta acuerdo alto, por lo que la versión española sigue de cerca esas decisiones sin resolver artificialmente la tensión gramatical.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre «sea tenido en honor» y «sea sin mancha» para mantener el tono exhortativo y solemne del pasaje.
  - Se evitó «SEÑOR» y se tradujo θεός como «Dios», conforme al estándar del proyecto.
  - Se distinguió «sexualment[e] inmorales» de «adúlteros» para respetar la diferencia léxica entre πόρνοι y μοιχοί.
  - «Lecho matrimonial» mantiene el valor de κοίτη como metonimia sexual sin volver el texto demasiado explícito.
