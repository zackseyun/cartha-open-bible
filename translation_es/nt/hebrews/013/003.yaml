translation:
  language: es
  text: Acuérdense de los presos[a], como si estuvieran presos con ellos; de los maltratados, ya que ustedes mismos también están en el cuerpo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si estuvieran atados con ellos». El griego evoca literalmente la idea de estar ligados o unidos con los presos.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «en el cuerpo» como referencia a pertenecer al cuerpo de Cristo; más probablemente se refiere a compartir la vulnerabilidad corporal humana común.
    reason: alternative_reading
lexical_decisions:
- source_word: μιμνῄσκεσθε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Manténganlos presentes
  lexicon: BDAG
  rationale: El imperativo exhortativo en segunda persona plural pide una memoria activa y continua. «Acuérdense» comunica esa fuerza exhortativa en español natural, con tono pastoral y continuo, sin volverlo mecánico.
- source_word: τῶν δεσμίων
  english_pob_choice: those in prison
  chosen_spanish: los presos
  alternatives_spanish:
  - los encarcelados
  - los que están en prisión
  - los prisioneros
  lexicon: BDAG
  rationale: δέσμιος puede referirse a una persona atada o presa; en este contexto la referencia natural es a personas encarceladas. «Los presos» es breve, claro y conserva el valor social concreto del término.
- source_word: ὡς συνδεδεμένοι
  english_pob_choice: as though imprisoned with them
  chosen_spanish: como si estuvieran presos con ellos
  alternatives_spanish:
  - como si estuvieran atados con ellos
  - como si fueran compañeros de prisión
  - como si estuvieran encadenados con ellos
  lexicon: BDAG
  rationale: El participio sugiere estar «unidos/bondados» con ellos, no solo recordarlos mentalmente. «Como si estuvieran presos con ellos» conserva la solidaridad concreta sin forzar una literalidad extraña; mantiene abierta la imagen de compartir su situación.
- source_word: τῶν κακουχουμένων
  english_pob_choice: those who are mistreated
  chosen_spanish: los maltratados
  alternatives_spanish:
  - los que padecen maltrato
  - los oprimidos
  - los que sufren malos tratos
  lexicon: BDAG
  rationale: κακουχέομαι denota ser tratado con dureza, sufrir abuso o maltrato. «Los maltratados» transmite bien la pasividad sufrida y la injusticia ejercida por otros, con lenguaje natural en español.
- source_word: ὡς καὶ αὐτοὶ ὄντες ἐν σώματι
  english_pob_choice: since you yourselves also are in the body
  chosen_spanish: ya que ustedes mismos también están en el cuerpo
  alternatives_spanish:
  - porque ustedes mismos también tienen cuerpo
  - ya que ustedes también están en un cuerpo
  - puesto que ustedes mismos también son corporales
  lexicon: BDAG
  rationale: Se conserva la frase literal «en el cuerpo» para no cerrar la tensión interpretativa. En español, «están en el cuerpo» mantiene la ambigüedad entre la condición humana encarnada y la posible resonancia eclesial, a la vez que hace clara la motivación para la compasión.
theological_decisions:
- issue: Sentido de «ἐν σώματι»
  english_pob_reading: shared embodied human condition
  chosen_spanish_reading: condición humana encarnada compartida
  alternative_spanish_readings:
  - pertenencia al cuerpo de Cristo
  - tener un cuerpo físico
  rationale: El contexto exhorta a la empatía hacia presos y maltratados; la razón más inmediata es que todos participan de la vulnerabilidad corporal. Se conserva «en el cuerpo» para no eliminar una posible resonancia comunitaria más amplia, pero el sentido principal queda en la común condición encarnada.
  doctrine_reference: Preservar la tensión exegética sin resolverla de forma exclusiva.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del texto base inglés: eliminé cualquier añadido innecesario equivalente a «ustedes» dentro de la comparación y conservé la frase breve y directa, con una formulación española natural que mantiene la solidaridad explícita y la ambigüedad de «en el cuerpo».'
  spanish_consistency_notes:
  - Se usa «presos» para δέσμιοι, en coherencia con el matiz de encarcelamiento del contexto.
  - «Acuérdense» conserva el imperativo durativo exhortativo sin sonar arcaico.
  - Se mantuvo «en el cuerpo» literalmente para respetar la tensión interpretativa documentada.
  - El registro es reverente pero moderno, apto para lectura eclesial general.
