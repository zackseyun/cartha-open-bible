    text: Or 'as being bound with them.' The Greek literally evokes being bound together with the prisoners.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'in the body' as a reference to belonging to the body of Christ; more likely it refers to sharing ordinary human bodily vulnerability.
    reason: alternative_reading
