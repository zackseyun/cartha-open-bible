translation:
  language: es
  text: Jesús Mesías es el mismo ayer y hoy y para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo es el mismo ayer y hoy y para siempre». Χριστός puede traducirse como «Mesías» o transliterarse como «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio personal; en español se conserva la forma estable y reconocible «Jesús».
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto presenta a Χριστός como título, no como mero apellido fijo; por eso se traduce como «Mesías», siguiendo la decisión documental de la POB en inglés de preservar el valor titulativo.
- source_word: ἐχθὲς
  english_pob_choice: yesterday
  chosen_spanish: ayer
  alternatives_spanish:
  - ayer
  lexicon: BDAG
  rationale: Adverbio temporal directo; «ayer» reproduce con naturalidad el primer miembro de la tríada temporal.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - hoy
  lexicon: BDAG
  rationale: Adverbio temporal directo; «hoy» mantiene el paralelismo con «ayer» y «por los siglos».
- source_word: ὁ αὐτός
  english_pob_choice: is the same
  chosen_spanish: es el mismo
  alternatives_spanish:
  - el mismo
  lexicon: BDAG
  rationale: La expresión predicativa griega significa «el mismo»; en español la cópula «es» es necesaria para una frase natural y fiel.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por la eternidad
  lexicon: BDAG
  rationale: La frase admite una traducción más literal en español que conserve el eco de «los siglos»; «por los siglos» mantiene la fuerza idiomática sin perder el sentido de duración perpetua.
theological_decisions:
- issue: La identidad constante de Jesús Mesías a través del tiempo
  english_pob_reading: Translate the verse straightforwardly as affirming Jesus Messiah's unchanging identity across time, without expanding it into a doctrinal paraphrase.
  chosen_spanish_reading: La frase afirma de manera directa que Jesús Mesías permanece el mismo en todo tiempo, sin añadir explicación doctrinal ajena al texto.
  alternative_spanish_readings:
  - Jesús Cristo es el mismo ayer, hoy y para siempre.
  - Jesús, el Mesías, no cambia jamás.
  rationale: El versículo es breve y sentencioso; conviene no sobreexplicarlo. La traducción conserva la afirmación de continuidad temporal y deja intacta la fuerza teológica del enunciado sin ampliarlo más allá de lo que dice el griego.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La tradición auditada en inglés osciló entre «Christ» y «Messiah» para Χριστός; el control final restauró «Messiah». La versión española sigue esa decisión y opta por «Mesías», dejando constancia de la alternativa «Cristo» en nota.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jesús» y el título «Mesías» para reflejar la separación entre nombre y función titulativa.
  - «Por los siglos» conserva el matiz semítico/idiomático de εἰς τοὺς αἰῶνας y evita una paráfrasis excesiva.
  - La construcción «es el mismo» expresa con naturalidad la predicación del griego ὁ αὐτός.
