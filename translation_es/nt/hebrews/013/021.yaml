translation:
  language: es
  text: Que él los capacite[a] en todo lo bueno, para que hagan su voluntad, obrando en nosotros lo que es agradable delante de él, por medio de Jesús el Mesías, a él[b] sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los equipe»; el griego puede expresar la idea de hacerlos aptos o proveerlos adecuadamente.'
    reason: alternative_reading
  - marker: b
    text: Lit. «a quien». El referente de la doxología puede entenderse específicamente como Jesús el Mesías, o bien como el Dios de paz, sujeto de la oración anterior; el texto no lo aclara de manera definitiva.
    reason: alternative_reading
lexical_decisions:
- source_word: καταρτίσαι
  english_pob_choice: equip
  chosen_spanish: capacite
  alternatives_spanish:
  - equíp(e)
  - prepare
  - perfeccione
  - restaure
  lexicon: BDAG
  rationale: El optativo aoristo expresa una petición benedictoria de que Dios haga aptos a los creyentes para obedecer. En español, «capacite» comunica mejor la idea funcional de hacer idóneo/proveer para una tarea que un calco como «equipar», y evita la ambigüedad doctrinal de «perfeccione» en un contexto de bendición.
- source_word: ἐν παντὶ ἀγαθῷ
  english_pob_choice: in every good thing
  chosen_spanish: en todo lo bueno
  alternatives_spanish:
  - en toda buena cosa
  - con todo bien
  - con toda clase de bienes
  lexicon: BDAG
  rationale: La preposición ἐν con este sintagma puede expresar esfera o medio/provisión. Siguiendo la lectura auditada del POB inglés, el sentido es que Dios los provea/capacite en relación con todo lo bueno; en español «en todo lo bueno» conserva la estructura y la amplitud sin volverlo forzado.
- source_word: εἰς τὸ ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: para que hagan
  alternatives_spanish:
  - para hacer
  - a fin de hacer
  - para que hagan
  lexicon: BDAG
  rationale: 'La construcción articular infinitiva expresa propósito. En español, una subordinada final con subjuntivo transmite con claridad la finalidad: que la capacitación de Dios los lleve a hacer su voluntad.'
- source_word: θέλημα αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - su propósito
  - la voluntad de él
  lexicon: BDAG
  rationale: «Su voluntad» es la correspondencia más natural y precisa para θέλημα en un contexto ético y devocional.
- source_word: ποιῶν
  english_pob_choice: working
  chosen_spanish: obrando
  alternatives_spanish:
  - trabajando
  - produciendo
  - realizando
  lexicon: BDAG
  rationale: El participio presente describe la acción continua de Dios. «Obrando» mantiene el valor dinámico y una resonancia bíblica natural en español sin desplazar el sentido a mera actividad humana.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - dentro de nosotros
  lexicon: BDAG
  rationale: La dative con ἐν señala aquí la esfera interna de la acción divina. «En nosotros» reproduce con naturalidad el sentido de obra interior que el contexto exige.
- source_word: τὸ εὐάρεστον
  english_pob_choice: what is pleasing
  chosen_spanish: lo que es agradable
  alternatives_spanish:
  - lo que agrada
  - lo aceptable
  - lo que le place
  lexicon: BDAG
  rationale: El adjetivo sustantivado se traduce idiomáticamente como una relativa sustantiva. «Agradable» conserva el matiz relacional ante Dios; «lo que es agradable» evita reducirlo a un mero adjetivo aislado.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  - a sus ojos
  lexicon: BDAG
  rationale: «Delante de él» es una formulación clara y reverente en español para la perspectiva evaluativa de Dios. Mantiene la imagen espacial sin volverse arcaica.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por medio de Jesús el Mesías
  - por Jesús Mesías
  - a través de Jesucristo
  lexicon: BDAG
  rationale: Aunque el proyecto suele preferir «Mesías» para Χριστός como título, aquí la forma fija «Jesucristo» preserva la clausura doxológica y la inteligibilidad eclesial del español. Se mantiene la mediación instrumental de διά con «por medio de».
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a él
  alternatives_spanish:
  - a quien
  - para quien
  - al cual
  lexicon: BDAG
  rationale: La relativa griega introduce la doxología, pero en español la formulación directa «A él sea la gloria» es más natural y mantiene la ambigüedad referencial sin forzar un antecedente explícito.
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - el honor
  - la honra
  lexicon: BDAG
  rationale: «La gloria» reproduce el sustantivo griego en fórmula doxológica estándar y conserva su peso teológico.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre
  - por siempre y para siempre
  - por los siglos
  lexicon: BDAG
  rationale: La expresión idiomática española «por los siglos de los siglos» es la equivalencia más natural y solemne de la duración indefinida del griego; refleja mejor la intensificación que un simple «para siempre».
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica habitual en español.
theological_decisions:
- issue: Referente del relativo doxológico ᾧ / forma de la doxología
  english_pob_reading: The doxology is left as 'to whom be the glory' without specifying whether the referent is Jesus Messiah or the God of peace.
  chosen_spanish_reading: A él sea la gloria
  alternative_spanish_readings:
  - A quien sea la gloria
  - Sea la gloria para él
  - A Dios sea la gloria
  rationale: La construcción española evita precisar el antecedente del relativo y conserva la tensión textual documentada en el POB inglés. Así no se resuelve más allá del griego si la referencia inmediata recae sobre Jesús el Mesías o sobre Dios, sujeto de la oración.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue la línea revisada del POB de mantener Χριστός como título mesianico documentado, pero en español se eligió la forma eclesial establecida «Jesucristo» para mayor naturalidad y reconocimiento litúrgico. También se conservó la ambigüedad doxológica del relativo final, como en el audit trail inglés, sin decidir el antecedente.
  spanish_consistency_notes:
  - Se usó un español neutral, bíblico y publicable, evitando calcos rígidos salvo donde la estructura griega lo requería.
  - Se mantuvo «Amén» con acento y la doxología en registro solemne.
  - No se introdujo «SEÑOR» como sustituto del nombre divino porque el versículo no contiene YHWH explícito.
  - Se preservó la relación entre capacitación divina y obediencia humana mediante una final con subjuntivo.
  - La fórmula «por medio de Jesucristo» conserva la mediación de διά sin añadir contenido teológico extra.
