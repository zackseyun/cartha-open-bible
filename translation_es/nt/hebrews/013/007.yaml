translation:
  language: es
  text: Acuérdense de sus líderes, quienes les hablaron la palabra de Dios. Al considerar[a] el desenlace de su manera de vivir, imiten su fe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desenlace» también puede entenderse como «final» o, en algunas interpretaciones, como la manera específica de su muerte.
    reason: lexical_alternative
  - marker: b
    text: 'O «su fidelidad». La palabra griega puede significar tanto fe como fidelidad; el texto principal sigue la opción habitual del proyecto: «fe».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μνημονεύετε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Mantengan presente
  lexicon: BDAG
  rationale: El imperativo presente pide una memoria continua; en español, «acuérdense» comunica bien esa acción sostenida sin sonar mecánico.
- source_word: τῶν ἡγουμένων ὑμῶν
  english_pob_choice: your leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - quienes los guían
  - sus dirigentes
  lexicon: BDAG
  rationale: ἡγούμενοι se refiere a personas reconocidas que conducen a la comunidad. «Líderes» es natural en español moderno y conserva el sentido de autoridad sin volverlo más político de lo necesario.
- source_word: ἐλάλησαν ὑμῖν τὸν λόγον τοῦ θεοῦ
  english_pob_choice: who spoke the word of God to you
  chosen_spanish: quienes les hablaron la palabra de Dios
  alternatives_spanish:
  - quienes les proclamaron la palabra de Dios
  - quienes les anunciaron la palabra de Dios
  lexicon: BDAG
  rationale: λαλέω significa simplemente «hablar». «La palabra de Dios» preserva el giro nominal del original y el uso bíblico habitual.
- source_word: ἀναθεωροῦντες
  english_pob_choice: As you consider
  chosen_spanish: Al considerar
  alternatives_spanish:
  - Al observar atentamente
  - Mientras consideran
  lexicon: BDAG
  rationale: El participio expresa observación reflexiva; «al considerar» mantiene la relación temporal/causal sin exagerar el matiz visual.
- source_word: τὴν ἔκβασιν
  english_pob_choice: the outcome
  chosen_spanish: el desenlace
  alternatives_spanish:
  - el resultado
  - el final
  lexicon: BDAG
  rationale: ἔκβασις puede significar resultado o desenlace. «Desenlace» es amplio y puede abarcar el resultado final de la vida de esas personas sin afirmar más de lo que el texto dice.
- source_word: τῆς ἀναστροφῆς
  english_pob_choice: of their way of life
  chosen_spanish: de su manera de vivir
  alternatives_spanish:
  - de su conducta
  - de su estilo de vida
  lexicon: BDAG
  rationale: ἀναστροφή se refiere a conducta o forma de vida. «Manera de vivir» es claro, natural y conserva el alcance moral y práctico.
- source_word: μιμεῖσθε
  english_pob_choice: imitate
  chosen_spanish: imiten
  alternatives_spanish:
  - sigan el ejemplo de
  - copien
  lexicon: BDAG
  rationale: El imperativo pide adoptar como modelo lo que se observa; «imiten» es la traducción directa y suficientemente clara.
- source_word: τὴν πίστιν
  english_pob_choice: their faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su fidelidad
  - su confianza
  lexicon: BDAG
  rationale: Según el uso del proyecto, πίστις se traduce normalmente «fe». En este contexto puede entenderse también como fidelidad; se preserva esa tensión en la nota.
theological_decisions:
- issue: Sentido de πίστις en un contexto de ejemplo humano
  english_pob_reading: faith, with a footnote preserving faithfulness
  chosen_spanish_reading: fe, con nota que preserva fidelidad como alternativa
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: El texto exhorta a imitar algo característico de estos líderes. πίστις puede significar tanto fe como fidelidad; se mantiene «fe» en el texto principal y se conserva «fidelidad» como posibilidad interpretativa, sin resolver la tensión.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Contested terms table for πίστις'
- issue: Alcance de ἔκβασις
  english_pob_reading: outcome, with note that it could refer to end or death
  chosen_spanish_reading: desenlace, con nota de que también puede entenderse como final o incluso muerte
  alternative_spanish_readings:
  - resultado
  - final
  rationale: ἔκβασις no obliga por sí mismo a una referencia específica a la muerte o martirio. «Desenlace» deja abierto el sentido y permite incluir la lectura más específica sin imponerla en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; esta propuesta sigue esa lectura estable y traslada las decisiones léxicas documentadas al español, preservando las tensiones semánticas de πίστις y ἔκβασις.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, sin sustituir por «Señor».
  - Se usa «líderes» para ἡγούμενοι, coherente con la decisión inglesa de evitar tanto «rulers» como una lectura excesivamente jerárquica.
  - «Palabra de Dios» conserva el giro bíblico y evita una paráfrasis más libre.
  - Se emplea un registro moderno y reverente, apto para lectura eclesial amplia.
