translation:
  language: es
  text: No descuiden la hospitalidad, porque por medio de ella algunos, sin saberlo, hospedaron ángeles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mensajeros». La palabra griega puede significar «ángeles» o «mensajeros», aunque aquí «ángeles» encaja mejor con la alusión más probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλοξενίας
  english_pob_choice: hospitality
  chosen_spanish: hospitalidad
  alternatives_spanish:
  - amor a los extranjeros
  - hospitalidad hacia los extraños
  lexicon: BDAG
  rationale: El sustantivo griego expresa amor o acogida hacia extraños; en español, «hospitalidad» es la forma natural y establecida que comunica la práctica sin perder el trasfondo de apertura al desconocido.
- source_word: μὴ ἐπιλανθάνεσθε
  english_pob_choice: Do not neglect
  chosen_spanish: No descuiden
  alternatives_spanish:
  - No olviden
  - No pasen por alto
  lexicon: BDAG
  rationale: 'El verbo puede significar olvidar o descuidar. En este mandato exhortativo, «no descuiden» transmite mejor la fuerza práctica: no dejar de ejercer la hospitalidad, no solo no recordarla mentalmente.'
- source_word: διὰ ταύτης
  english_pob_choice: through it
  chosen_spanish: por ella
  alternatives_spanish:
  - mediante ella
  - a través de ella
  lexicon: BDAG
  rationale: El pronombre femenino remite a «hospitalidad». «Por ella» conserva el valor instrumental de διά en un español natural y breve.
- source_word: ἔλαθόν
  english_pob_choice: have entertained ... without knowing it
  chosen_spanish: sin saberlo, hospedaron
  alternatives_spanish:
  - la hospedaron sin darse cuenta
  - sin advertirlo, alojaron
  lexicon: BDAG
  rationale: La construcción con λανθάνω + participio comunica que ocurrió algo sin que los sujetos lo supieran. En español conviene explicitar esa falta de conciencia con «sin saberlo» para no perder el sentido idiomático.
- source_word: ξενίσαντες
  english_pob_choice: have entertained
  chosen_spanish: hospedaron
  alternatives_spanish:
  - recibieron como huéspedes
  - dieron hospedaje a
  lexicon: BDAG
  rationale: El participio pertenece al campo de acoger extraños y huéspedes. «Hospedaron» conserva la idea de recibir con hospitalidad de modo natural en español, sin sugerir entretenimiento.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: Aunque ἄγγελος puede significar «mensajero», el contexto y la probable alusión a relatos de visitantes celestiales favorecen «ángeles». Se mantiene la alternativa léxica para no ocultar la ambigüedad léxica del griego.
theological_decisions:
- issue: Referencia de ἀγγέλους
  english_pob_reading: angels in the supernatural sense
  chosen_spanish_reading: ángeles en sentido sobrenatural
  alternative_spanish_readings:
  - mensajeros humanos
  - enviados
  rationale: La lectura más probable alude a la hospitalidad mostrada a visitantes celestiales en el trasfondo bíblico. La traducción conserva esa lectura principal sin borrar la ambigüedad léxica del término griego.
  doctrine_reference: Principio de primacía del original y preservación de tensiones léxicas donde el texto las permite.
translation_notes:
  revision_awareness: El pasaje coincide con el estado revisado más reciente sin cambios necesarios; se conserva la solución del contexto fuente y la nota léxica sobre ἄγγελοι.
  spanish_consistency_notes:
  - Se mantiene «hospitalidad» como término base para φιλοξενία, en línea con el audit trail inglés.
  - Se evita «olviden» como única opción porque en español no reproduce tan bien la fuerza exhortativa de descuidar una práctica.
  - Se usa «ángeles» en el texto principal y se preserva «mensajeros» solo como alternativa léxica.
  - La formulación «sin saberlo» refleja explícitamente la falta de conciencia implícita en λανθάνω.
