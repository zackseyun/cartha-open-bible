translation:
  language: es
  text: 'Que su manera de vivir esté libre del amor al dinero, contentándose con lo que tienen[a], porque él mismo ha dicho: «Nunca te dejaré[b], ni jamás te abandonaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «contentándose con las cosas presentes».
    reason: lexical_alternative
  - marker: b
    text: La cita remite especialmente a las promesas del Antiguo Testamento en Deuteronomio 31:6, 8 y Josué 1:5.
    reason: cross_reference
lexical_decisions:
- source_word: ἀφιλάργυρος
  english_pob_choice: free from the love of money
  chosen_spanish: libre del amor al dinero
  alternatives_spanish:
  - sin amor al dinero
  - no amante del dinero
  - libre de la avaricia
  lexicon: BDAG
  rationale: El adjetivo describe a una conducta no caracterizada por el amor al dinero. «Libre del amor al dinero» conserva ese rasgo específico y es natural en español. «Avaricia» es posible, pero amplía el campo semántico más allá del foco lexical del texto.
- source_word: ὁ τρόπος
  english_pob_choice: your way of life
  chosen_spanish: vuestra manera de vivir
  alternatives_spanish:
  - vuestra conducta
  - vuestra forma de vivir
  - vuestra manera de conducirse
  lexicon: BDAG
  rationale: Aquí τρόπος señala la manera de vivir o conducta. En español, «manera de vivir» comunica bien el sentido general sin forzar una expresión técnica. Se conserva el plural de segunda persona porque la exhortación va dirigida a la comunidad.
- source_word: ἀρκούμενοι
  english_pob_choice: being content
  chosen_spanish: contentándoos
  alternatives_spanish:
  - estando contentos
  - satisfaciéndoos
  - contentos
  lexicon: BDAG
  rationale: El participio tiene fuerza exhortativa y expresa una disposición continua. «Contentándoos» mantiene esa continuidad y une bien con la cláusula anterior en español. Se evita convertirlo en un simple adjetivo estático.
- source_word: τοῖς παροῦσιν
  english_pob_choice: with what you have
  chosen_spanish: con lo que tenéis
  alternatives_spanish:
  - con las cosas presentes
  - con lo presente
  - con lo que está presente
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «las cosas presentes / las cosas que están presentes», el propio audit trail inglés reconoce que «what you have» es una adaptación más natural y exacta al contexto. En español, «con lo que tenéis» transmite bien la referencia a las posesiones o recursos disponibles sin sonar rígido.
- source_word: αὐτὸς γὰρ εἴρηκεν
  english_pob_choice: for he himself has said
  chosen_spanish: porque él mismo ha dicho
  alternatives_spanish:
  - pues él mismo ha dicho
  - porque Dios mismo ha dicho
  - ya que él mismo ha dicho
  lexicon: BDAG
  rationale: Se mantiene el pronombre enfático «él mismo» sin introducir explícitamente «Dios» en el texto principal, porque el griego usa αὐτός y no θεός. El perfecto «ha dicho» conserva la fuerza permanente de la cita.
- source_word: Οὐ μή σε ἀνῶ
  english_pob_choice: I will never leave you
  chosen_spanish: Nunca te dejaré
  alternatives_spanish:
  - No te dejaré jamás
  - De ningún modo te dejaré
  - Nunca te soltaré
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con ἀνίημι expresa una promesa muy fuerte. En español, «Nunca te dejaré» comunica esa seguridad de forma idiomática y sobria. «Soltar» o «liberar» serían más literales en algunos contextos, pero aquí no encajan tan bien con la cadencia de la cita bíblica.
- source_word: οὐδ’ οὐ μή σε ἐγκαταλίπω
  english_pob_choice: nor will I ever forsake you
  chosen_spanish: ni jamás te abandonaré
  alternatives_spanish:
  - ni nunca te abandonaré
  - ni te desampararé jamás
  - ni jamás te desampararé
  lexicon: BDAG
  rationale: ἐγκαταλείπω puede significar abandonar, dejar atrás o desamparar. «Abandonar» es claro y fiel; mantiene el paralelismo con «dejaré» y evita un registro demasiado arcaico. «Desamparar» es bíblico-tradicional, pero en español actual resulta un poco más marcado y menos directo.
theological_decisions:
- issue: Identificación del hablante en la cita
  english_pob_reading: Retain the Greek pronoun as 'he himself' rather than explicitly inserting 'God' in the main text.
  chosen_spanish_reading: Mantener «él mismo» sin explicitar «Dios» en el cuerpo principal.
  alternative_spanish_readings:
  - porque Dios mismo ha dicho
  - pues el Señor mismo ha dicho
  rationale: El contexto remite con claridad a una promesa divina, pero el griego conserva αὐτός y no nombra al sujeto explícitamente. La redacción española preserva esa reserva textual, dejando la identificación implícita y documentándola en la nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Intensidad de las negaciones en la promesa
  english_pob_reading: 'Use strong English negatives: ''I will never leave you, nor will I ever forsake you.'''
  chosen_spanish_reading: 'Usar negaciones fuertes y naturales: «Nunca te dejaré, ni jamás te abandonaré».'
  alternative_spanish_readings:
  - No te dejaré jamás, ni jamás te abandonaré
  - Nunca, nunca te dejaré ni te abandonaré
  rationale: Las dobles negaciones οὐ μή y οὐδ’ οὐ μή expresan seguridad enfática. El español no necesita reproducir la estructura griega de manera mecánica; basta una formulación natural que mantenga la solemnidad y la certeza absoluta de la promesa.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió el sentido revisado del audit trail inglés para τοῖς παροῦσιν, prefiriendo la equivalencia contextual «con lo que tenéis» sobre una traducción más literal pero menos natural. También se conservó la decisión de no insertar explícitamente «Dios» en la cita principal, pese a que el referente se entiende por el contexto.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto, pero en este versículo no aparece el nombre divino explícito en el texto griego; la identificación queda implícita en la cita.
  - «Libre del amor al dinero» mantiene el foco lexical en el amor al dinero, no en la codicia en general.
  - 'Se preservó el paralelismo de la cita con dos verbos distintos: «dejaré» / «abandonaré».'
  - La segunda persona plural («vuestra», «os», «tenéis») sigue la dirección comunitaria del pasaje.
