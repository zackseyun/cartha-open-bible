translation:
  language: es
  text: Por tanto, Jesús también padeció fuera de la puerta[a], para santificar[b] al pueblo mediante su propia sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fuera de la puerta» probablemente alude al lugar fuera de Jerusalén donde Jesús padeció, en eco con la disposición, en el contexto anterior, de los restos sacrificiales fuera del campamento o de la puerta.
    reason: cross_reference
  - marker: b
    text: O «hacer santo» o «consagrar» para «santificar».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Por consiguiente
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del argumento anterior en español natural y digno, conservando el vínculo causal sin endurecer el tono.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: 'Mantiene la idea aditiva/comparativa: Jesús se suma al patrón sacrificial previamente expuesto.'
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la práctica del proyecto y el uso español estándar.
- source_word: ἵνα ἁγιάσῃ
  english_pob_choice: so that he might sanctify
  chosen_spanish: para santificar
  alternatives_spanish:
  - para hacer santo
  - para consagrar
  lexicon: BDAG
  rationale: En español, la construcción final con infinitivo expresa bien el propósito. 'Santificar' preserva el registro cultual y teológico de ἁγιάζω sin reducirlo a una explicación moralista.
- source_word: διὰ τοῦ ἰδίου αἵματος
  english_pob_choice: through his own blood
  chosen_spanish: mediante su propia sangre
  alternatives_spanish:
  - por medio de su propia sangre
  - a través de su propia sangre
  lexicon: BDAG
  rationale: '''Mediante'' comunica con claridad el valor instrumental de διά con genitivo. ''Su propia sangre'' conserva el énfasis de ἰδίου.'
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Dios
  lexicon: BDAG
  rationale: Se conserva el sustantivo definido del griego sin ampliar interpretativamente el referente en el texto principal.
- source_word: ἔξω τῆς πύλης
  english_pob_choice: outside the gate
  chosen_spanish: fuera de la puerta
  alternatives_spanish:
  - fuera de la puerta de la ciudad
  - fuera del portón
  lexicon: BDAG
  rationale: '''Puerta'' es un equivalente natural de πύλη en español y evita sonar demasiado técnico; el contexto ya sugiere el lugar de ejecución fuera de Jerusalén.'
- source_word: ἔπαθεν
  english_pob_choice: suffered
  chosen_spanish: padeció
  alternatives_spanish:
  - sufrió
  lexicon: BDAG
  rationale: '''Padeció'' mantiene un registro bíblico claro en español y traduce el aoristo de πάσχω de forma concisa, sin introducir matices ajenos.'
theological_decisions:
- issue: Renderizado de ἁγιάζω en contexto sacrificial
  english_pob_reading: sanctify
  chosen_spanish_reading: santificar
  alternative_spanish_readings:
  - hacer santo
  - consagrar
  rationale: En Hebreos, ἁγιάζω se integra en la lógica sacrificial y de pacto. 'Santificar' conserva esa amplitud teológica y evita cerrarlo a una sola tradición doctrinal o a una mera idea de perfeccionamiento moral.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de τὸν λαόν
  english_pob_reading: the people
  chosen_spanish_reading: al pueblo
  alternative_spanish_readings:
  - al pueblo de Dios
  rationale: El griego no añade una expansión explícita. La traducción mantiene la formulación textual y deja que el contexto de Hebreos determine la identidad del pueblo sin sobretraducción.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto sigue de cerca el estado más reciente del expediente inglés, que quedó sin cambios tras la última revisión y fue confirmado con alto acuerdo; no se requieren correcciones textuales adicionales.
  spanish_consistency_notes:
  - Se preserva la relación lógica explícita del versículo con 'Por tanto'.
  - '''Padeció'' se mantiene para πάσχω por su tono bíblico y su correspondencia breve con el aoristo.'
  - '''Santificar'' se usa como término culto-teológico consistente con Hebreos.'
  - No se añadió 'de Dios' a 'pueblo' para no exceder el griego.
  - '''Puerta'' se eligió como equivalente natural de πύλη en español, con nota explicativa sobre el eco sacrificial.'
