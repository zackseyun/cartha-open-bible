  rationale: Se mantiene el texto principal casi intacto porque es fiel al griego y suena bien en español. Se añade la nota léxica exigida por el audit trail inglés para ἁγιάζῃ y se mejora la redacción de la nota contextual sobre 'fuera de la puerta' para mayor claridad y naturalidad.
