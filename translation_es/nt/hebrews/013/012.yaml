review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: inferencia (διὸ), adición/comparación (καὶ), propósito (ἵνα ἁγιάσῃ), medio instrumental (διὰ τοῦ ἰδίου αἵματος), objeto definido (τὸν λαόν) y localización (ἔξω τῆς πύλης). Sin embargo, el orden español pone el propósito al final, mientras que el inglés POB destacó primero ''outside the gate'' con sus notas; esto no es un error, pero conviene una leve mejora de naturalidad y precisión en la nota. Además, falta la nota léxica correspondiente a ''santificar'' que el audit trail inglés preserva como alternativa significativa.'
  spanish_quality_summary: El español es claro y digno. 'Por tanto', 'también', 'para santificar' y 'mediante su propia sangre' funcionan bien. No obstante, 'fuera de la puerta' suena algo menos idiomático en este contexto que 'fuera de la puerta de la ciudad' o mantener la literalidad con una nota. Dado que el inglés evita añadir 'city', conviene conservar 'puerta' pero afinar la nota explicativa. 'Padeció' es aceptable, aunque 'sufrió' sería más natural; no es necesario cambiarlo.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. ''Jesús'', ''santificar'', ''pueblo'' y ''sangre'' se alinean bien con las decisiones inglesas y teológicas. La principal desviación es documental: el inglés conservó una alternativa léxica para ἁγιάζῃ (''make holy''/''consecrate''), y en español debe preservarse una nota equivalente para ''santificar''.'
