base_translation:
  language: en
  yaml_path: translation/nt/hebrews/013/012.yaml
  text: Therefore Jesus also suffered outside the gate[b][a], so that he might sanctify the people through his own blood.
  footnotes:
  - marker: a
    text: Or 'make holy' or 'consecrate' for 'sanctify.'
    reason: lexical_alternative
  - marker: b
    text: '''Outside the gate'' likely refers to the place outside Jerusalem where Jesus suffered, echoing the disposal of sacrificial remains outside the camp/gate in the preceding context.'
