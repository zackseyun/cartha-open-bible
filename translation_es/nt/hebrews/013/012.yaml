    rationale: La frase 'en eco con el contexto anterior sobre el residuo sacrificial llevado fuera del campamento o de la puerta' suena poco natural. Puede expresarse con más claridad sin alterar el contenido.
  revised_spanish_text: Por tanto, Jesús también padeció fuera de la puerta[a], para santificar[b] al pueblo mediante su propia sangre.
