  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: mantiene el ruego personal, el vocativo «hermanos», la idea de soportar/aguantar con paciencia «la palabra de exhortación», y la explicación final sobre haber escrito brevemente. Sin embargo, «porque también» sobrerrepresenta καὶ γάρ; el inglés auditado decidió idiomáticamente solo «for», y en español basta «porque» o «pues».'
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, «que soporten esta palabra de exhortación» suena un poco pesado; «soporten» es aceptable, pero conviene evitar añadir «también», que entorpece la fluidez y no mejora la fidelidad. El resto del registro es natural y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos» con nota inclusiva concuerda con la política documentada. «Palabra de exhortación» preserva la decisión POB. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «porque también» para καὶ γάρ añade un matiz innecesario
    rationale: La combinación καὶ γάρ aquí funciona explicativamente. El audit trail inglés la reduce con razón a «for». En español, «porque» comunica mejor la relación causal sin introducir un «también» que el texto no necesita semánticamente.
  - severity: low
    issue: La nota b añade una alternativa no preservada explícitamente en la nota inglesa
    rationale: La nota inglesa conserva «message of encouragement»; el borrador añade también «mensaje de exhortación». No es erróneo, pero no hace falta ampliar la nota más allá de las alternativas relevantes ya auditadas.
  revised_spanish_text: Ahora les ruego, hermanos[a], que soporten esta palabra de exhortación[b], porque les he escrito brevemente.
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», aunque puede dirigirse inclusivamente a toda la congregación.
    reason: lexical_alternative
  - marker: b
    text: «Palabra de exhortación» también puede traducirse «mensaje de ánimo».
    reason: lexical_alternative
  revision_rationale: 'Se hace una corrección menor para alinear mejor καὶ γάρ con el sentido explicativo documentado en el audit trail: «porque» en vez de «porque también». También se ajusta la nota b para reflejar de forma más precisa la alternativa léxica conservada por el POB inglés, sin expandir innecesariamente las opciones.'
