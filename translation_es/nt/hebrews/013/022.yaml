translation:
  language: es
  text: Ahora les ruego, hermanos[a], que soporten esta palabra de exhortación[b], porque les he escrito brevemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», aunque puede dirigirse inclusivamente a toda la congregación.
    reason: lexical_alternative
  - marker: b
    text: «Palabra de exhortación» también puede traducirse «mensaje de ánimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insto
  lexicon: BDAG
  rationale: παρακαλέω puede expresar ruego, exhortación o ruego apremiante. En español, «les ruego» comunica bien la petición personal y urgente del autor sin endurecer el tono ni volverlo excesivamente técnico.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pues
  - Entonces
  lexicon: BDAG
  rationale: La partícula marca transición discursiva suave; «Ahora» preserva el cambio hacia el cierre exhortativo de modo natural en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: El vocativo plural es literalmente masculino plural. Se conserva «hermanos» en el texto principal, con nota inclusiva para reflejar la posible referencia a toda la congregación sin borrar la forma del griego.
- source_word: ἀνέχεσθε
  english_pob_choice: bear with
  chosen_spanish: soporten
  alternatives_spanish:
  - aguanten
  - tengan paciencia con
  - toleren
  lexicon: BDAG
  rationale: ἀνέχομαι expresa aguantar, soportar o tener paciencia con algo. «Soporten» transmite la idea de recibir y sostener con paciencia esta palabra, sin la aspereza coloquial de «aguanten».
- source_word: τοῦ λόγου τῆς παρακλήσεως
  english_pob_choice: this word of exhortation
  chosen_spanish: esta palabra de exhortación
  alternatives_spanish:
  - este mensaje de exhortación
  - esta palabra de ánimo
  - este mensaje de ánimo
  lexicon: BDAG
  rationale: λόγος se refiere al mensaje comunicado, y παράκλησις aquí mantiene su fuerza de exhortación/animación. «Palabra de exhortación» conserva la construcción fuente y la tensión léxica documentada por la tradición POB.
- source_word: καὶ γὰρ
  english_pob_choice: for
  chosen_spanish: porque también
  alternatives_spanish:
  - pues también
  - porque en verdad
  - ya que también
  lexicon: BDAG
  rationale: La combinación introduce apoyo explicativo. «Porque también» refleja la conexión causal y el matiz añadido por καί sin sobrecargar el español.
- source_word: διὰ βραχέων
  english_pob_choice: briefly
  chosen_spanish: brevemente
  alternatives_spanish:
  - en pocas palabras
  - de manera breve
  - con brevedad
  lexicon: BDAG
  rationale: El giro idiomático significa «brevemente» o «en pocas palabras». «Brevemente» es la forma más natural y fiel en español.
- source_word: ἐπέστειλα
  english_pob_choice: I have written
  chosen_spanish: les he escrito
  alternatives_spanish:
  - escribí
  - les envié una carta
  lexicon: BDAG
  rationale: 'Aunque el aoristo es formalmente «escribí», el uso epistolar en español suena más natural con el presente perfecto: «les he escrito». Mantiene la referencia a la carta/sermón ya en manos de los destinatarios.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: 'El dativo de destinatario se expresa naturalmente en español con el pronombre átono duplicado por cortesía y fluidez: «les he escrito».'
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se conserva la forma masculina plural del griego en el cuerpo del texto, siguiendo la política de exactitud morfológica. La posible inclusión de toda la congregación se mantiene en nota, no en la línea principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión léxica en λόγος τῆς παρακλήσεως
  english_pob_reading: word of exhortation
  chosen_spanish_reading: palabra de exhortación
  alternative_spanish_readings:
  - mensaje de exhortación
  - palabra de ánimo
  - mensaje de ánimo
  rationale: En Hebreos, παράκλησις puede abarcar exhortación y ánimo. Se conserva «exhortación» como la opción más estable para el registro bíblico y porque evita diluir la fuerza apelativa del texto.
  doctrine_reference: BDAG; audit trail of Hebrews 13:22
- issue: Valor epistolar de ἐπέστειλα
  english_pob_reading: I have written
  chosen_spanish_reading: les he escrito
  alternative_spanish_readings:
  - les escribí
  - les envié una carta
  rationale: 'El perfecto compuesto comunica mejor en español la situación epistolar presente: la carta ya llegó a sus lectores. No se fuerza un pasado simple que suene menos natural en este contexto.'
  doctrine_reference: Epistolary convention in target language
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide con la decisión inglesa de preservar el vocativo masculino plural y la expresión fija «palabra de exhortación». No se registran revisiones previas que alteren el sentido; se mantiene la equivalencia óptima con naturalidad castellana.
  spanish_consistency_notes:
  - Se usa «hermanos» para ἀδελφοί en el texto principal, coherente con la política POB de conservar la forma gramatical y documentar la opción inclusiva en nota.
  - Se evita «SEÑOR» u այլ sustituciones no aplicables; no hay léxico divino en este versículo.
  - «Brevemente» refleja el adverbio διὰ βραχέων sin añadir matices innecesarios.
  - El dativo plural se expresa de manera idiomática con «les he escrito», manteniendo claridad y fluidez en español.
