translation:
  language: es
  text: Porque no tenemos aquí una ciudad permanente[a], sino que buscamos la que ha de venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la ciudad que viene» o «la ciudad venidera».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Ya que ... no
  lexicon: BDAG
  rationale: γάρ introduce la razón de la exhortación precedente; en español, «Porque» mantiene esa función explicativa de forma natural, y «no» conserva la negación directa de οὐ.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - contamos con
  lexicon: BDAG
  rationale: El presente indicativo se rinde con el verbo común «tener», que comunica con claridad la idea de posesión o pertenencia sin añadir matiz innecesario.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en la tierra
  lexicon: BDAG
  rationale: ὧδε es un adverbio deíctico de lugar; «aquí» conserva el valor espacial inmediato sin interpretar más de lo que el texto dice.
- source_word: μένουσαν
  english_pob_choice: lasting
  chosen_spanish: permanente
  alternatives_spanish:
  - duradera
  - que permanece
  lexicon: BDAG
  rationale: Como participio que modifica πόλιν, expresa una ciudad que permanece o no pasa; «permanente» es una forma natural en español que conserva el contraste con la ciudad futura.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - polis
  - ciudadanía
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto «ciudad», sin reemplazarlo por una paráfrasis interpretativa como «patria» o «hogar», porque el griego dice πόλις.
- source_word: τὴν μέλλουσαν
  english_pob_choice: the one that is to come
  chosen_spanish: la que ha de venir
  alternatives_spanish:
  - la ciudad venidera
  - la ciudad que viene
  lexicon: BDAG
  rationale: El participio femenino alude a πόλις; «la que ha de venir» preserva el referente implícito y el sentido de futuro de μέλλω, sin sobrecargar la frase.
- source_word: ἐπιζητοῦμεν
  english_pob_choice: we seek
  chosen_spanish: buscamos
  alternatives_spanish:
  - buscamos con afán
  - anhelamos
  lexicon: BDAG
  rationale: ἐπιζητέω intensifica ζητέω («buscar, procurar, desear con empeño»); «buscamos» es claro y natural, y el contexto ya comunica la orientación ferviente hacia esa ciudad.
theological_decisions:
- issue: Imagen de la ciudad futura
  english_pob_reading: Retain 'city' as the text's metaphor for the believers' future dwelling/order rather than specifying 'heaven' or 'the heavenly Jerusalem' in the main text.
  chosen_spanish_reading: Conservar «ciudad» y no explicitar «cielo» ni «Jerusalén celestial» en el texto principal.
  alternative_spanish_readings:
  - la ciudad celestial
  - el cielo
  - la Jerusalén celestial
  rationale: La frase griega habla de una ciudad presente que no permanece y de otra futura que se busca; el versículo no nombra explícitamente el cielo ni Jerusalén, así que la traducción debe preservar esa tensión y no adelantar una interpretación más desarrollada.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo «ciudad» para πόλις, en línea con el audit trail inglés y sin sustituirlo por un glosa interpretativa.
  - «Ha de venir» conserva el valor futuro de μέλλουσαν sin forzar una construcción demasiado literal.
  - «Buscamos» refleja el verbo de búsqueda intensiva sin añadir un adverbio inexistente en el griego.
