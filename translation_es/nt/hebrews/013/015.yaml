translation:
  language: es
  text: Por tanto[a], por medio de él ofrezcamos continuamente a Dios un sacrificio de alabanza—es decir[c][b], el fruto de labios que confiesan su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siempre» o «en todo tiempo».
    reason: lexical_alternative
  - marker: b
    text: O «el fruto de nuestros labios»; «nuestros» no está explícito en el griego.
    reason: lexical_alternative
  - marker: c
    text: O «reconociendo su nombre». El verbo griego puede denotar confesión abierta o reconocimiento público.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de él» conserva con naturalidad en español el sentido mediador del acceso y de la ofrenda, sin perder la referencia a Cristo implícita en el contexto.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca inferencia lógica a partir del argumento anterior. «Por tanto» suena natural y mantiene la conexión discursiva.
- source_word: ἀναφέρωμεν
  english_pob_choice: let us ... offer up
  chosen_spanish: ofrezcamos
  alternatives_spanish:
  - ofrezcamos en sacrificio
  - ofrezcamos alzando
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo plural. «Ofrezcamos» comunica la exhortación; el matiz sacrificial queda sostenido por el sustantivo siguiente y por la idea de ofrenda elevada presente en ἀναφέρω.
- source_word: θυσίαν αἰνέσεως
  english_pob_choice: a sacrifice of praise
  chosen_spanish: un sacrificio de alabanza
  alternatives_spanish:
  - un sacrificio de loor
  - un sacrificio alabador
  lexicon: BDAG
  rationale: La construcción genitiva se refleja de forma directa y bíblicamente reconocible en español, conservando la imagen sacrificial sin volverla extraña.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: Expresa duración constante. «Continuamente» es preciso y fluido en español.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo funciona como destinatario de la ofrenda. «A Dios» es la equivalencia más directa y idiomática en español.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: BDAG
  rationale: Introduce una aclaración explicativa del «sacrificio de alabanza». «Es decir» conserva la función glosadora con un registro digno.
- source_word: καρπὸν χειλέων
  english_pob_choice: the fruit of lips
  chosen_spanish: el fruto de labios
  alternatives_spanish:
  - el fruto de nuestros labios
  - fruto de los labios
  lexicon: BDAG
  rationale: Se mantiene la metáfora bíblica sin añadir «nuestros», porque no está explícito en el griego. La frase queda natural en español y conserva el eco escritural.
- source_word: ὁμολογούντων
  english_pob_choice: confessing
  chosen_spanish: que confiesan
  alternatives_spanish:
  - que reconocen
  - que proclaman
  lexicon: BDAG
  rationale: El participio expresa confesión pública o reconocimiento abierto. «Que confiesan» preserva ese vínculo verbal y deja visible la fuerza declarativa.
- source_word: τῷ ὀνόματι αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - a su nombre
  - el nombre de él
  lexicon: BDAG
  rationale: En español bíblico y natural, «confesar su nombre» comunica bien la idea de reconocimiento público de quien es Dios. Se evita añadir preposición que oscurezca la relación del participio con «labios».
theological_decisions:
- issue: Referencia de «él» en δι’ αὐτοῦ
  english_pob_reading: 'Christ is the referent, yielding a mediatorial sense: believers offer praise to God through Christ.'
  chosen_spanish_reading: '«Él» se conserva sin expansión, pero la frase mantiene el sentido mediador: se ofrece a Dios por medio de Cristo.'
  alternative_spanish_readings:
  - por medio de él, sin explicitación teológica adicional
  - por medio de Jesús
  rationale: El contexto inmediato de Hebreos presenta la mediación sacerdotal de Jesús. La traducción no reemplaza el pronombre por un nombre propio, pero «por medio de él» resguarda el valor teológico sin sobreexplicar.
  doctrine_reference: Hebreos 13:11-15; filosofía de traducción §1 y §3
- issue: Fuerza del lenguaje sacrificial
  english_pob_reading: Retain literal sacrificial imagery in 'offer up' and 'sacrifice of praise.'
  chosen_spanish_reading: Se conserva la imagen sacrificial en «ofrezcamos» y «un sacrificio de alabanza».
  alternative_spanish_readings:
  - simplemente «demos alabanza»
  - «ofrezcamos alabanza» sin sacrificialidad explícita
  rationale: El versículo formula la alabanza cristiana con lenguaje de sacrificio. Mantenerlo preserva la continuidad bíblica y evita aplanar el matiz del texto.
  doctrine_reference: Hebreos 13:15; filosofía de traducción §1 y §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y coincide sustancialmente con la solución auditada en inglés. Se conserva la estructura exhortativa, la metáfora sacrificial y la explicación apposicional del final, sin añadir contenido ajeno al original.
  spanish_consistency_notes:
  - Se usó «Dios» para θεῷ conforme al estándar del proyecto.
  - Se mantuvo «alabanza» para αἰνέσεως, en lugar de un término más devocional que debilitara la imagen del sacrificio.
  - Se evitó «SEÑOR» porque aquí no aparece el tetragrámaton ni una convención de máscara del nombre divino.
  - Se conservó el paralelismo «ofrezcamos... un sacrificio de alabanza» para reflejar el tono litúrgico del pasaje.
  - Las notas [a], [b] y [c] siguen el orden de las alternativas relevantes del audit trail en inglés y aclaran opciones que el español vuelve visibles.
