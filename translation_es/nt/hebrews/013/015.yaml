    text: Or 'always' or 'at all times.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fruit of our lips'; 'our' is supplied in some English renderings but is not explicit in the Greek.
    reason: lexical_alternative
  - marker: c
    text: Or 'acknowledging his name.' The Greek verb can denote open confession or acknowledgment.
    reason: lexical_alternative
