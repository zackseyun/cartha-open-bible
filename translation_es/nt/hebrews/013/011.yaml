translation:
  language: es
  text: Porque los cuerpos de aquellos animales cuya sangre por el pecado es llevada a los lugares santos por el sumo sacerdote son quemados fuera del campamento[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al santuario». El griego dice «a los lugares santos», una expresión cultual para el ámbito sagrado del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «son completamente quemados». El verbo puede enfatizar una quema exhaustiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν ... ζῴων
  english_pob_choice: those animals
  chosen_spanish: aquellos animales
  alternatives_spanish:
  - esos animales
  - tales animales
  - aquellas criaturas vivientes
  lexicon: BDAG
  rationale: El relativo genitivo apunta a los animales sacrificados ya mencionados. "Aquellos animales" conserva la referencia anafórica y el registro sacrificial sin sobrecargar el texto con una glosa interpretativa.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  - Ciertamente
  lexicon: BDAG
  rationale: γάρ introduce una explicación del argumento anterior. "Porque" conserva la relación lógica de fundamento de manera natural en español.
- source_word: εἰσφέρεται
  english_pob_choice: is brought into
  chosen_spanish: es llevada
  alternatives_spanish:
  - es traída
  - es introducida
  - es conducida
  lexicon: BDAG
  rationale: La voz pasiva expresa que la sangre es introducida en el recinto sagrado; "es llevada" comunica la acción sin sonar forzado en español y mantiene el enfoque en la sangre.
- source_word: τὸ αἷμα
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre sacrificial
  lexicon: BDAG
  rationale: Es el sentido literal y ritual del término; no requiere paráfrasis.
- source_word: περὶ ἁμαρτίας
  english_pob_choice: for sin
  chosen_spanish: por el pecado
  alternatives_spanish:
  - para el pecado
  - en favor del pecado
  - como ofrenda por el pecado
  lexicon: BDAG
  rationale: La construcción es cultual y puede referirse a la relación sacrificial con el pecado. "Por el pecado" preserva la brevedad del griego y evita fijar demasiado pronto la frase técnica "ofrenda por el pecado", que el texto aquí no explicita de forma completa.
- source_word: εἰς τὰ ἅγια
  english_pob_choice: into the holy places
  chosen_spanish: a los lugares santos
  alternatives_spanish:
  - al santuario
  - a los lugares santos del santuario
  - al Lugar Santísimo
  lexicon: BDAG
  rationale: Se conserva el plural del griego con una expresión española que mantiene el registro cultual. "Lugares santos" refleja mejor τὰ ἅγια que una singularización automática como "santuario", aunque esta sigue siendo una alternativa válida en nota.
- source_word: διὰ τοῦ ἀρχιερέως
  english_pob_choice: by the high priest
  chosen_spanish: por el sumo sacerdote
  alternatives_spanish:
  - mediante el sumo sacerdote
  - a través del sumo sacerdote
  lexicon: BDAG
  rationale: διά con genitivo marca agencia; "por" expresa naturalmente esa agencia en español. "Sumo sacerdote" es la equivalencia estable para ἀρχιερεύς.
- source_word: τούτων τὰ σώματα
  english_pob_choice: the bodies of those animals
  chosen_spanish: los cuerpos de aquellos animales
  alternatives_spanish:
  - sus cuerpos
  - los cuerpos de esos animales
  lexicon: BDAG
  rationale: El demostrativo retoma a los animales sacrificados. La expansión a "los cuerpos de aquellos animales" hace visible la relación anafórica que en español podría quedar menos clara con un simple pronombre.
- source_word: κατακαίεται
  english_pob_choice: are burned
  chosen_spanish: son quemados
  alternatives_spanish:
  - son consumidos por el fuego
  - son completamente quemados
  - son quemados por completo
  lexicon: BDAG
  rationale: El verbo intensifica la idea de quemar hasta el consumirse; "son quemados" es la base natural y deja abierta la fuerza totalizadora del verbo, que se puede explicar en nota si hace falta.
- source_word: ἔξω τῆς παρεμβολῆς
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - fuera del encampamento
  - afuera del campamento
  lexicon: BDAG
  rationale: Es la forma estable y clara en español para el campamento de Israel en el trasfondo cultual del Éxodo y Hebreos.
theological_decisions:
- issue: Alcance de εἰς τὰ ἅγια en contexto cultual
  english_pob_reading: Rendered as 'into the holy places' rather than specifying 'Most Holy Place.'
  chosen_spanish_reading: '"a los lugares santos" en vez de especificar "al Lugar Santísimo"'
  alternative_spanish_readings:
  - al santuario
  - al Lugar Santísimo
  rationale: El plural τὰ ἅγια conserva un ámbito sagrado amplio. Aunque el trasfondo evoca el día de la expiación, el griego aquí no obliga a estrechar la referencia al Lugar Santísimo. Mantener "lugares santos" preserva la flexibilidad cultual sin añadir precisión no explicitada por el texto.
  doctrine_reference: Hebreos 9–10; traducción con cautela cultual según el texto griego
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado de revisión más reciente, que no indicó cambios necesarios; se mantienen las decisiones léxicas principales del audit trail inglés y se ajustan al español con conservación del registro cultual y de la ambigüedad productiva de τὰ ἅγια y κατακαίεται.
  spanish_consistency_notes:
  - Se mantiene "sumo sacerdote" para ἀρχιερεύς, consistente con el uso bíblico en español y con el valor funcional de agencia en διὰ + genitivo.
  - Se conserva el plural "lugares santos" para τὰ ἅγια, evitando reducirlo sin fundamento a "Lugar Santísimo".
  - '"Fuera del campamento" se mantiene como fórmula bíblica estable para ἔξω τῆς παρεμβολῆς.'
  - '"Por el pecado" refleja la relación cultual de περὶ ἁμαρτίας sin convertirla automáticamente en una glosa más específica.'
