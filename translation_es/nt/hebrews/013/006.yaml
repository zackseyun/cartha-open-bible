translation:
  language: es
  text: 'de modo que con confianza decimos: «Yahvé es mi ayudante; no temeré. ¿Qué puede hacerme el hombre[b]?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Qué me hará el hombre?»'
    reason: lexical_alternative
  - marker: b
    text: «El hombre» traduce aquí el griego ἄνθρωπος, un término singular genérico que se refiere a un ser humano en sentido representativo.
    reason: cultural_note
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - por tanto
  lexicon: BDAG
  rationale: ὥστε introduce resultado/consecuencia; «de modo que» conserva esa fuerza resultativa en español sin sonar rígido.
- source_word: θαρροῦντας ἡμᾶς λέγειν
  english_pob_choice: we confidently say
  chosen_spanish: con confianza decimos
  alternatives_spanish:
  - decimos con confianza
  - podemos decir con confianza
  lexicon: BDAG
  rationale: La combinación participial expresa la acción de decir con ánimo/confianza; «con confianza decimos» refleja bien el valor adverbial de θαρροῦντας sin añadir una modalización no explícita.
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG
  rationale: Aquí Κύριος cita lenguaje veterotestamentario aplicado al nombre divino; por la convención del proyecto se usa «Yahvé» en el texto principal en vez de la máscara «SEÑOR», preservando la referencia al nombre divino cuando el contexto es citacional.
- source_word: ἐμοὶ
  english_pob_choice: my / for me
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - de mi parte
  lexicon: BDAG
  rationale: Con βοηθός, el dativo expresa ayuda en favor de la persona; en español, el posesivo «mi» reproduce de manera natural la relación predicativa («mi ayudador»).
- source_word: βοηθός
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - ayuda
  - auxiliador
  - el que me ayuda
  lexicon: BDAG
  rationale: «Ayudador» conserva el sustantivo personal de βοηθός, en paralelo con el valor de apoyo personal del texto griego. «Ayuda» sería demasiado abstracto y «el que me ayuda» más perifrástico.
- source_word: οὐ φοβηθήσομαι
  english_pob_choice: I will not be afraid
  chosen_spanish: no temeré
  alternatives_spanish:
  - no tendré miedo
  - no me asustaré
  lexicon: BDAG
  rationale: El futuro de φοβέομαι en esta cita funciona como negativa de temor; «no temeré» es la forma más sobria y bíblicamente transparente en español, sin perder el valor prospectivo.
- source_word: τί ποιήσει μοι ἄνθρωπος
  english_pob_choice: What can man do to me?
  chosen_spanish: ¿Qué puede hacerme el hombre?
  alternatives_spanish:
  - ¿Qué me hará el hombre?
  - ¿Qué puede hacer contra mí el hombre?
  lexicon: BDAG
  rationale: Se mantiene ἄνθρωπος como singular genérico con «el hombre», siguiendo la política de género-precisa del proyecto; «puede hacerme» expresa en español la fuerza retórica del futuro ποιήσει como limitación de poder, sin volverlo meramente predictivo.
theological_decisions:
- issue: Nombre divino en una cita de κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: En este versículo, la frase reproduce una confesión bíblica de ayuda divina. Dado que el proyecto español no oculta el nombre divino y el contexto es una cita con resonancia veterotestamentaria, «Yahvé» es la opción más fiel al trasfondo del texto fuente.
  doctrine_reference: Project default on יהוה / YHWH
- issue: Traducción del genérico singular ἄνθρωπος
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - una persona
  - un ser humano
  rationale: ἄνθρωπος aparece en singular con valor genérico, no como referencia específica a varón individual. «El hombre» conserva la forma representativa y la tensión del original; una nota puede aclarar el alcance inclusivo para lectores modernos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor retórico de la futura ποιήσει
  english_pob_reading: What can man do to me?
  chosen_spanish_reading: ¿Qué puede hacerme el hombre?
  alternative_spanish_readings:
  - ¿Qué me hará el hombre?
  rationale: Aunque el verbo es futuro, la pregunta funciona retóricamente para afirmar la impotencia última del ser humano frente a la protección divina. «Puede hacerme» comunica esa fuerza en español sin añadir contenido doctrinal.
  doctrine_reference: DOCTRINE.md §Translation philosophy (optimal equivalence)
translation_notes:
  revision_awareness: La redacción sigue el alto acuerdo del contexto auditado y refleja la revisión que favoreció una formulación más directa del participio de resultado en inglés. En español se mantuvo esa relación resultativa con «de modo que» y una cláusula principal natural. No se introdujeron cambios textuales innecesarios respecto al griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para יהוה, dado el carácter de cita bíblica con Κύριος.
  - «Ayudador» conserva la fuerza nominal de βοηθός y evita reducirlo a una frase verbal.
  - «No temeré» respeta el valor futuro del griego con una fórmula idiomática y solemne en español.
  - Se mantuvo «el hombre» para ἄνθρωπος, con nota explicativa para el lector moderno.
  - 'La puntuación reproduce la estructura citacional: introducción resultativa, cita breve y pregunta retórica final.'
