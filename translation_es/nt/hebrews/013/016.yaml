  - severity: low
    issue: «Se agrada Dios» es menos natural en español actual culto.
    rationale: La colocación y el verbo suenan algo forzados. «Dios se complace» o «Dios se agrada» con sujeto explícito al inicio es más natural y mantiene dignidad.
  revised_spanish_text: Y no descuiden[a] hacer el bien y compartir[b], porque de tales sacrificios Dios se complace.
