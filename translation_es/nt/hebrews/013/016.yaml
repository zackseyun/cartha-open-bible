translation:
  language: es
  text: Y no descuiden[a] hacer el bien y compartir[b], porque de tales sacrificios Dios se complace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no olviden». El verbo griego puede traducirse más literalmente así, aunque aquí lleva el sentido práctico de dejar de realizar estas acciones.
    reason: lexical_alternative
  - marker: b
    text: «Compartir» también puede rendirse como «comunión» o «generosidad»; en este contexto probablemente se refiere al compartir práctico de recursos con otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐποιΐας
  english_pob_choice: doing good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - practicar la bondad
  - beneficencia
  lexicon: BDAG
  rationale: El sustantivo griego expresa beneficencia activa o la acción de hacer el bien. En español, la expresión natural y fiel al valor verbal es «hacer el bien», que conserva el impulso práctico del mandato sin volverlo abstracto o técnico.
- source_word: κοινωνίας
  english_pob_choice: sharing
  chosen_spanish: compartir
  alternatives_spanish:
  - comunión
  - fellowship
  - generosidad
  - contribución
  lexicon: BDAG
  rationale: Aquí κοινωνία se entiende en sentido práctico, ligado al compartir recursos y bienes con otros. «Compartir» es la opción más amplia y natural en español; evita reducir indebidamente el término a mera comunión relacional o a una sola forma de ayuda material.
- source_word: μὴ ἐπιλανθάνεσθε
  english_pob_choice: do not neglect
  chosen_spanish: no olviden
  alternatives_spanish:
  - no descuiden
  - no dejen de
  - no se olviden
  lexicon: BDAG
  rationale: El verbo puede significar literalmente «olvidar», y en este contexto exhortativo el inglés POB escogió «do not neglect» para capturar la fuerza práctica. En español, «no olviden» mantiene el vínculo con el verbo griego y, por el contexto, implica no dejar de realizar estas acciones; por eso se añade una nota para explicitar la alternativa más literal.
- source_word: τοιαύταις ... θυσίαις
  english_pob_choice: such sacrifices
  chosen_spanish: de tales sacrificios
  alternatives_spanish:
  - de esos sacrificios
  - de ese tipo de sacrificios
  lexicon: BDAG
  rationale: La frase conserva el lenguaje cultual del texto. «De tales sacrificios» reproduce con dignidad el comparativo y mantiene la metáfora sacrificial aplicada a actos éticos, sin diluirla en moralismo general.
- source_word: εὐαρεστεῖται
  english_pob_choice: is pleased
  chosen_spanish: se agrada
  alternatives_spanish:
  - está complacido
  - le complace
  - está pleased
  lexicon: BDAG
  rationale: El pasivo significa que Dios halla agrado o placer. «Se agrada» es una forma natural y reverente en español que conserva el sentido de aceptación divina sin necesidad de expandir el sujeto u objeto implícitos.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El nominativo sujeto se traduce con el término estándar «Dios»; no hay indicio contextual para variar el referente.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula enlaza la exhortación con lo anterior sin contraste fuerte. «Y» expresa con naturalidad esa continuidad discursiva en español.
theological_decisions:
- issue: El carácter sacrificial de las acciones éticas
  english_pob_reading: Metaphorical reference to acts of doing good and sharing as sacrifices pleasing to God
  chosen_spanish_reading: Referencia metafórica a hacer el bien y compartir como sacrificios que agradan a Dios
  alternative_spanish_readings:
  - Alusión principal a la limosna como equivalente cultual
  - Conducta ética general sin matiz sacrificial
  rationale: El griego usa explícitamente θυσίαις. La traducción española preserva la metáfora sacrificial sin reducirla solo a dar limosna ni borrar su peso cultual. Así se mantiene la tensión entre ética cotidiana y lenguaje del culto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Alineado con la última revisión sin cambios: el texto español mantiene la lectura de alta concordancia y conserva el matiz práctico y sacrificial del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» como sujeto divino estándar.
  - Se conserva el lenguaje sacrificial («sacrificios») para no aplanar la metáfora.
  - «Compartir» se usa en sentido práctico, no como mero compañerismo.
  - La partícula inicial se vierte con «Y» para continuidad suave con el contexto inmediato.
