  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego y del rastro de auditoría en inglés: conserva la advertencia contra enseñanzas diversas y extrañas, mantiene «corazón» y «gracia», y traduce βρώμασιν de forma literal. Sin embargo, dos giros del español debilitan la fidelidad idiomática al sentido documentado: «afirmado por gracia» suena menos natural que «fortalecido por la gracia» o «afirmado por la gracia», y «se ocupaban en ellos» / «no fueron beneficiados» resulta torpe en español y no expresa con claridad el sentido de obtener provecho.'
  spanish_quality_summary: El texto es comprensible, pero tiene cierta rigidez de calco. «Afirmado por gracia» carece de artículo y suena menos natural en registro bíblico claro; «se ocupaban en ellos» no es el giro español más idiomático; y «no fueron beneficiados» es gramatical pero poco natural. Una leve revisión mejora legibilidad sin perder transparencia léxica.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Gracia», «corazón» y el tratamiento literal de «alimentos» están bien alineados. La revisión propuesta mantiene esa alineación y solo mejora naturalidad y precisión idiomática.
  issues:
  - severity: medium
    issue: «que el corazón sea afirmado por gracia» suena poco natural en español
    rationale: βέβαιοῦσθαι admite «afirmado/establecido/fortalecido», pero en español bíblico natural «fortalecido por la gracia» o «afirmado por la gracia» fluye mejor. La ausencia de artículo en «por gracia» además suena menos idiomática aquí.
  - severity: medium
    issue: «los que se ocupaban en ellos» es un giro poco idiomático
    rationale: La auditoría inglesa ya optó por el sentido idiomático de περιπατοῦντες. En español, «ocuparse en» con antecedente «alimentos» suena forzado; «se ocupaban de ellos» comunica mejor el sentido documentado.
  - severity: medium
    issue: «no fueron beneficiados» es demasiado literal y poco natural
    rationale: Aunque refleja la voz pasiva, en español «no recibieron beneficio» o «no obtuvieron provecho» expresa mejor οὐκ ὠφελήθησαν sin perder el punto evaluativo del autor.
  revised_spanish_text: No se dejen llevar por enseñanzas diversas y extrañas[a]; porque es bueno que el corazón sea fortalecido por la gracia, no por alimentos[b], por los cuales los que se ocupaban de ellos no recibieron beneficio[c].
