translation:
  language: es
  text: No se dejen llevar por enseñanzas diversas y extrañas[a]; porque es bueno que el corazón sea fortalecido por la gracia, no por alimentos[b], por los cuales los que se ocupaban de ellos no recibieron beneficio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doctrinas diversas y extrañas». El griego usa un plural que puede referirse a enseñanzas o doctrinas; el matiz principal es el de contenido ajeno al mensaje apostólico.
    reason: lexical_alternative
  - marker: b
    text: «Alimentos» probablemente alude a prácticas alimentarias u observancias relacionadas con la comida; el griego dice simplemente «alimentos».
    reason: cultural_note
  - marker: c
    text: O «los que vivían conforme a ellos» o «los que se ocupaban de ellos». El griego literalmente dice «los que caminaban en ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διδαχαῖς
  english_pob_choice: teachings
  chosen_spanish: enseñanzas
  alternatives_spanish:
  - doctrinas
  - instrucciones
  lexicon: BDAG
  rationale: El dativo plural tras παραφέρεσθε indica el ámbito o medio por el cual uno puede ser arrastrado. «Enseñanzas» es natural en español actual y conserva el sentido de contenido transmitido sin volverlo demasiado técnico como «doctrinas».
- source_word: ποικίλαις καὶ ξέναις
  english_pob_choice: various and strange
  chosen_spanish: diversas y extrañas
  alternatives_spanish:
  - variadas y ajenas
  - múltiples y forasteras
  lexicon: BDAG
  rationale: ποικίλαις expresa variedad; ξέναις sugiere algo ajeno o no perteneciente al mensaje apostólico. «Extrañas» mantiene el tono de advertencia en español y es idiomático sin especificar indebidamente origen étnico o cultural.
- source_word: μὴ παραφέρεσθε
  english_pob_choice: Do not be carried away
  chosen_spanish: No se dejen llevar
  alternatives_spanish:
  - No sean arrastrados
  - No se desvíen
  lexicon: BDAG
  rationale: La prohibición en voz pasiva/media debe reflejar una acción continua de ser arrastrados fuera del camino. «No se dejen llevar» conserva la metáfora y funciona con naturalidad en español.
- source_word: χάριτι
  english_pob_choice: by grace
  chosen_spanish: por gracia
  alternatives_spanish:
  - con gracia
  lexicon: BDAG
  rationale: 'El dativo se entiende instrumentalmente: el corazón es afirmado mediante la gracia. «Por gracia» preserva la transparencia teológica y la relación causal/instrumental.'
- source_word: βεβαιοῦσθαι τὴν καρδίαν
  english_pob_choice: for the heart to be strengthened
  chosen_spanish: que el corazón sea afirmado
  alternatives_spanish:
  - que el corazón sea fortalecido
  - que el corazón sea establecido
  lexicon: BDAG
  rationale: βεβαιοῦσθαι puede significar confirmar, establecer o hacer firme. «Afirmado» comunica estabilidad interior sin perder la idea de hacerse firme; «corazón» se conserva literalmente como centro de la vida interior.
- source_word: οὐ βρώμασιν
  english_pob_choice: not by foods
  chosen_spanish: no por alimentos
  alternatives_spanish:
  - no por comidas
  - no por comidas rituales
  lexicon: BDAG
  rationale: βρώμασιν significa literalmente «alimentos». Se mantiene el término directo sin expandirlo en el texto principal a prácticas o regulaciones, aunque el contexto puede implicar observancias alimentarias.
- source_word: ἐν οἷς
  english_pob_choice: by which
  chosen_spanish: por los cuales
  alternatives_spanish:
  - en los cuales
  - mediante los cuales
  lexicon: BDAG
  rationale: Aunque literalmente es «en los cuales», el sentido en español requiere un vínculo causal o instrumental con lo anterior. «Por los cuales» es una solución idiomática que conserva la referencia a los alimentos/prácticas alimentarias.
- source_word: οἱ περιπατοῦντες
  english_pob_choice: those who occupied themselves with them
  chosen_spanish: los que se ocupaban en ellos
  alternatives_spanish:
  - los que caminaban en ellos
  - los que vivían conforme a ellos
  lexicon: BDAG
  rationale: περιπατέω es literalmente «caminar», pero aquí el contexto con neutro plural hace más natural el sentido idiomático de ocuparse de algo o orientar la vida en torno a ello. «Se ocupaban en ellos» refleja bien ese matiz y la revisión auditada del inglés.
- source_word: οὐκ ὠφελήθησαν
  english_pob_choice: were not benefited
  chosen_spanish: no fueron beneficiados
  alternatives_spanish:
  - no fueron ayudados
  - no obtuvieron provecho
  lexicon: BDAG
  rationale: La forma pasiva se conserva en español con «fueron beneficiados», manteniendo la evaluación del autor sobre la inutilidad de esas prácticas. Es una solución formal y fiel al valor verbal.
theological_decisions:
- issue: Contraste entre gracia y alimentos
  english_pob_reading: The verse contrasts divine grace with reliance on dietary practices or food-related observances as a means of inner establishment.
  chosen_spanish_reading: El versículo contrasta la gracia de Dios con la dependencia de alimentos u observancias relacionadas con la comida como medio para afirmar el corazón.
  alternative_spanish_readings:
  - El versículo contrasta la gracia con leyes alimentarias judías
  - El versículo contrasta la gracia con comidas rituales
  rationale: El texto griego dice simplemente «alimentos». La traducción principal evita resolver más de lo que el verso expresa, aunque el contexto de Hebreos hace plausible una referencia cultual o a prácticas alimentarias.
  doctrine_reference: Philosophical items on source restraint and lexical transparency
- issue: Fuerza metafórica de «corazón»
  english_pob_reading: ‘Heart’ is retained as the center of the inner person rather than paraphrased as ‘mind’ or ‘inner life.’
  chosen_spanish_reading: «Corazón» se conserva como centro de la persona interior, no como una paráfrasis de «mente» o «interioridad».
  alternative_spanish_readings:
  - mente
  - ser interior
  rationale: καρδία tiene peso antropológico y teológico. Mantener «corazón» preserva el idioma bíblico y evita aplanar la imagen.
  doctrine_reference: Philosophical items on literal retention where the source carries theological weight
- issue: Sentido de παραφέρεσθε
  english_pob_reading: Do not be carried away
  chosen_spanish_reading: No se dejen llevar
  alternative_spanish_readings:
  - No sean arrastrados
  - No se desvíen
  rationale: La imagen de ser llevado fuera de curso es central en la advertencia. «No se dejen llevar» mantiene el matiz de advertencia continua sin endurecerlo innecesariamente.
  doctrine_reference: Philosophical items on preserving metaphor with idiomatic Spanish
translation_notes:
  revision_awareness: La redacción española sigue la última revisión auditada del inglés en el cierre del versículo, prefiriendo el sentido idiomático de περιπατοῦντες como «los que se ocupaban en ellos» en lugar de una traducción literal de «caminar en ellos». También conserva la tensión entre la literalidad de βρώμασιν («alimentos») y su probable alcance cultural sin resolverlo de forma excesiva.
  spanish_consistency_notes:
  - Se conserva «gracia» para χάρις y «corazón» para καρδία, en línea con la terminología bíblica del proyecto.
  - Se traduce YHWH como «Yahvé» solo cuando aparezca en el texto; este versículo no lo contiene.
  - Se mantiene un español neutro y digno, evitando formulaciones eclesiásticas más tradicionales cuando no son necesarias para la fidelidad al griego.
  - La nota a pie de página marca la ambigüedad de διδαχαῖς y la posibilidad de leerlo como «doctrinas» sin cambiar el texto principal.
