  text: διδαχαῖς ποικίλαις καὶ ξέναις μὴ παραφέρεσθε· καλὸν γὰρ χάριτι βεβαιοῦσθαι τὴν καρδίαν, οὐ βρώμασιν, ἐν οἷς οὐκ ὠφελήθησαν οἱ ⸀περιπατοῦντες.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/013/009.yaml
  text: Do not be carried away by various and strange teachings[a], for it is good for the heart to be strengthened by grace, not by foods[c][b], by which those who occupied themselves with them were not benefited.
  footnotes:
  - marker: a
    text: Or 'established by grace.' The Greek verb can mean 'to strengthen,' 'to establish,' or 'to make firm.'
    reason: lexical_alternative
  - marker: b
    text: '''Foods'' likely refers to dietary practices or food-related observances; the Greek says simply ''foods.'''
    reason: cultural_note
  - marker: c
    text: Or 'those who lived by them' or 'those who occupied themselves with them.' The Greek literally says 'those walking in them.'
    reason: lexical_alternative
