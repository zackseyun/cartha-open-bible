translation:
  language: es
  text: Sepan que nuestro hermano Timoteo ha sido[a] liberado; con quien, si llega pronto, los veré a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Liberado» deja abierta la alternativa de «puesto en libertad» o, según el contexto, «enviado»/«despedido»; el valor más probable aquí es la liberación de una situación de custodia.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  english_pob_choice: Know
  chosen_spanish: Sepan
  alternatives_spanish:
  - Saben
  - Tengan presente
  lexicon: BDAG
  rationale: El imperativo plural epistolar pide informar a los destinatarios. «Sepan» comunica con naturalidad ese valor exhortativo/informativo y conserva la fuerza del mandato sin añadir interpretación.
- source_word: τὸν ἀδελφὸν ἡμῶν
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro hermano en la fe
  - nuestro compañero hermano
  lexicon: BDAG
  rationale: La relación fraternal cristiana se expresa de forma directa y natural en español con «nuestro hermano». «En la fe» sería una aclaración añadida; «compañero hermano» resulta poco idiomático.
- source_word: Τιμόθεον
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: N/A (nombre propio)
  rationale: Se translitera al nombre usual en español bíblico, preservando la identificación personal sin explicación adicional.
- source_word: ἀπολελυμένον
  english_pob_choice: has been released
  chosen_spanish: ha sido liberado
  alternatives_spanish:
  - ha sido puesto en libertad
  - ha sido despedido
  - ha sido enviado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἀπολύω conserva el sentido de una acción completada con efecto presente. «Liberado» es la forma más general y fiel en español; mantiene abierta la tensión lexical que en el contexto puede referirse a liberación de custodia, sin reducirla innecesariamente.
- source_word: μεθ’ οὗ
  english_pob_choice: with whom
  chosen_spanish: con él
  alternatives_spanish:
  - con quien
  lexicon: BDAG
  rationale: Aunque la estructura relativa puede verterse literalmente como «con quien», «con él» suena más natural en español y mantiene la referencia a Timoteo sin pérdida de sentido.
- source_word: ἐὰν τάχιον ἔρχηται
  english_pob_choice: if he comes soon
  chosen_spanish: si llega pronto
  alternatives_spanish:
  - si viene pronto
  - si llega más pronto
  lexicon: BDAG
  rationale: «τάχιον» expresa prontitud/antes; en español «pronto» comunica bien el matiz sin recargar la frase. «Llega» evita la repetición de «venir» y sigue siendo fiel al movimiento implícito del verbo.
- source_word: ὄψομαι ὑμᾶς
  english_pob_choice: I will see you
  chosen_spanish: los veré a ustedes
  alternatives_spanish:
  - los veré
  - los visitaré
  lexicon: BDAG
  rationale: El futuro medio de ὁράω se vierte de manera directa con «veré». Se explicita «a ustedes» para claridad en español y se evita «visitaré», que interpretaría más de lo que el griego dice.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y el audit trail inglés, manteniendo la ambigüedad lexical de ἀπολελυμένον y la estructura condicional de la cláusula final sin ampliar el contenido.
  spanish_consistency_notes:
  - Se usó «Timoteo» como forma española estándar del nombre propio.
  - Se prefirió un registro reverente pero moderno, evitando calcos rígidos.
  - La nota de pie de página marca la alternativa lexical relevante sin introducir una interpretación doctrinal.
