  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «Timoteo» es adecuada; «liberado» respeta el criterio auditado para ἀπολελυμένον y la nota conserva las alternativas léxicas pertinentes.
