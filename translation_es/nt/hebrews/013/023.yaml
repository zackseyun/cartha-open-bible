  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca el rastro del POB en casi todos los elementos: γινώσκετε = «Sepan», ἀδελφὸν ἡμῶν = «nuestro hermano», Τιμόθεον = «Timoteo», ἀπολελυμένον = «ha sido liberado[a]», ἐὰν τάχιον ἔρχηται = «si llega pronto», ὄψομαι ὑμᾶς = «los veré». La nota lexical sobre ἀπολελυμένον preserva adecuadamente las alternativas documentadas. Sin embargo, μεθ’ οὗ es una construcción relativa («con quien» / «con el cual»), no meramente pronominal («con él»). Aunque «con él» no altera gravemente el referente, sí suaviza una elección formal significativa del original y del POB inglés.'
