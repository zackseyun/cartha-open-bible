revisions:
- from: Sean persuadidos por sus líderes[a] y cédanles, porque ellos velan por sus almas como quienes han de dar cuenta, para que lo hagan con alegría y no con gemidos, porque esto no les sería provechoso.
  to: Déjense persuadir por sus líderes[a] y cédanles, porque ellos velan por sus almas como quienes han de dar cuenta, para que lo hagan con alegría y no con gemidos, porque esto no les sería provechoso.
  rationale: Se ajusta Πείθεσθε a una formulación española natural que preserva la decisión léxica del POB (‘be persuaded by’) sin introducir una obediencia autoritaria como texto principal. También se pule la nota para mayor naturalidad y precisión.
