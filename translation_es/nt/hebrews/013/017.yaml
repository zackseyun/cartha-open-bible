translation:
  language: es
  text: Déjense persuadir por sus líderes[a] y cédanles, porque ellos velan por sus almas como quienes han de dar cuenta, para que lo hagan con alegría y no con gemidos, porque esto no les sería provechoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Obedezcan a sus líderes”. El griego Πείθεσθε puede llevar el sentido de obedecer, pero más literalmente sugiere dejarse persuadir o ser ganados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πείθεσθε
  english_pob_choice: Be persuaded by
  chosen_spanish: Sean persuadidos por
  alternatives_spanish:
  - Obedezcan a
  - Pórtense de manera persuadida por
  lexicon: BDAG
  rationale: El imperativo medio/pasivo de πείθω puede expresar tanto ‘ser persuadido’ como ‘obedecer’. En español, ‘sean persuadidos por’ conserva la relación de respuesta y la nota de adhesión receptiva que el audit trail inglés quiso preservar, sin ocultar la alternativa más fuerte de obediencia.
- source_word: ἡγουμένοις
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - los que los guían
  - los que presiden
  lexicon: BDAG
  rationale: El participio se refiere a dirigentes reconocidos de la comunidad. ‘Líderes’ es natural y claro en español moderno, y evita introducir un matiz autoritario más fuerte que el del término griego.
- source_word: ὑπείκετε
  english_pob_choice: yield to
  chosen_spanish: cédanles
  alternatives_spanish:
  - sométanse a ellos
  - déjense llevar por ellos
  lexicon: BDAG
  rationale: ὑπείκω expresa ceder, dar paso o deferir. ‘Cédanles’ mantiene esa idea de concesión y se distingue de Πείθεσθε, como hace el inglés con ‘yield to’.
- source_word: ἀγρυπνοῦσιν
  english_pob_choice: are keeping watch
  chosen_spanish: velan
  alternatives_spanish:
  - están vigilando
  - permanecen despiertos
  lexicon: BDAG
  rationale: El verbo evoca vigilancia sin sueño; ‘velan’ reproduce bien en español la imagen pastoral y sugiere cuidado atento y continuo.
- source_word: ψυχῶν
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: BDAG
  rationale: ψυχή puede significar alma, vida o persona. En este contexto pastoral y moral, ‘almas’ conserva el peso espiritual de la expresión sin negar la referencia integral a la persona.
- source_word: ὡς λόγον ἀποδώσοντες
  english_pob_choice: as those who will give an account
  chosen_spanish: como quienes han de dar cuenta
  alternatives_spanish:
  - como quienes rendirán cuentas
  - ya que habrán de responder
  lexicon: BDAG
  rationale: La frase participial explica la responsabilidad de los líderes ante Dios. ‘Han de dar cuenta’ conserva el valor prospectivo y resulta idiomático en español bíblico actual.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - alegremente
  - con gozo
  lexicon: BDAG
  rationale: Μετὰ χαρᾶς se vierte con una preposición y sustantivo similares en español. ‘Alegría’ es claro, natural y mantiene la estructura del griego.
- source_word: στενάζοντες
  english_pob_choice: with groaning
  chosen_spanish: con gemidos
  alternatives_spanish:
  - gimiendo
  - con suspiros
  lexicon: BDAG
  rationale: στενάζω denota gemir, suspirar o lamentarse. ‘Con gemidos’ conserva la concreción del verbo y refleja la imagen de un servicio pesado o penoso.
- source_word: ἀλυσιτελὲς
  english_pob_choice: unprofitable
  chosen_spanish: no les sería provechoso
  alternatives_spanish:
  - sería inútil para ustedes
  - no les aprovecharía
  lexicon: BDAG
  rationale: El adjetivo significa no beneficioso o no ventajoso. ‘No les sería provechoso’ comunica bien la idea y evita endurecer el sentido hacia ‘dañino’.
theological_decisions:
- issue: Naturaleza de la exhortación respecto de los líderes de la iglesia
  english_pob_reading: The verse calls for responsive trust and yielding toward recognized leaders, not an unqualified endorsement of authoritarian obedience.
  chosen_spanish_reading: El versículo llama a una respuesta de confianza y de ceder ante los líderes reconocidos, no a una obediencia autoritaria sin matices.
  alternative_spanish_readings:
  - Obediencia absoluta a los líderes
  - Sumisión rígida a los líderes
  rationale: Los dos verbos, Πείθεσθε y ὑπείκετε, apuntan a una actitud de recepción confiada y de deferencia. La razón dada —que ellos velan y rendirán cuenta— limita cualquier lectura de autoridad sin responsabilidad.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una tensión lexical deliberada en Πείθεσθε entre ‘be persuaded by’ y ‘obey’; el español conserva esa tensión con ‘Sean persuadidos por’ y una nota alternativa. También conserva la distinción entre ‘leaders’ y ‘yield to’ con dos soluciones diferentes: ‘líderes’ y ‘cédanles’. No se documentaron revisiones posteriores que alteraran esta lectura.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se conserva ‘almas’ para ψυχῶν por la carga pastoral y espiritual del contexto.
  - ‘Con alegría’ y ‘con gemidos’ siguen la estructura preposicional del griego y la opción del audit trail inglés.
  - No se emplea ‘obedezcan’ en el texto principal para no borrar la alternativa lexical documentada en el POB inglés.
