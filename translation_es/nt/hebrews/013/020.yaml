review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «el Dios de paz», la acción de sacar/traer desde los muertos, «el gran pastor de las ovejas», y la frase instrumental/asociativa «por la sangre de un pacto eterno» con nota de ambigüedad. Sin embargo, «Y el Dios de paz» no transmite tan bien como «Ahora»/«Y ahora» el valor transicional de Ὁ δὲ en esta bendición, y «sacó» suena algo brusco para ἀναγαγών en contexto de resurrección.'
  spanish_quality_summary: El español es claro y eclesialmente legible. La frase fluye bien, pero mejora con un inicio más natural de bendición («Y ahora, que...») y con «hizo subir» o «levantó» para preservar mejor la imaginería de ἀνάγω sin la aspereza de «sacó». También conviene evitar la mayúscula en «pastor», ya que no hay razón ortográfica necesaria en español para capitalizar el título aquí.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός -> «Dios», κύριον ἡμῶν Ἰησοῦν -> «nuestro Señor Jesús». «Pacto» para διαθήκη es defendible en Hebreos. No aparece ningún caso de Yahvé/Mesías/esclavo/etc. Sí conviene ajustar la nota para reflejar mejor la alternativa documentada en inglés, incluyendo «hizo subir/levantó» y la posible lectura «por medio de la sangre».'
  issues:
  - severity: medium
    issue: Renderizado de Ὁ δὲ como «Y»
    rationale: δέ aquí marca transición a una bendición. «Y» solo suena más aditivo que transicional; «Y ahora» o «Ahora» representa mejor el giro discursivo documentado por el POB inglés.
  - severity: medium
    issue: «que sacó de entre los muertos» para ὁ ἀναγαγὼν
    rationale: Aunque defendible, «sacó» en español puede sonar demasiado físico o coloquial. «Hizo subir de entre los muertos» preserva mejor la imagen de ἀνάγω y se acerca más al razonamiento léxico del inglés («brought up»).
  - severity: low
    issue: Mayúscula en «Pastor»
    rationale: La capitalización no está motivada por el griego y en español bíblico moderno «el gran pastor de las ovejas» es más natural y consistente.
  - severity: low
    issue: Nota al pie mejorable
    rationale: La nota actual comunica la ambigüedad, pero puede alinearse más de cerca con el inglés al mencionar «hizo subir/levantó» y «por medio de la sangre del pacto eterno» como alternativa de construal.
  revised_spanish_text: Y ahora, que el Dios de paz[a], que hizo subir de entre los muertos a nuestro Señor Jesús, el gran pastor de las ovejas, por la sangre de un pacto eterno,
