revisions:
- from: Y el Dios de paz[a], que sacó de entre los muertos a nuestro Señor Jesús, el gran Pastor de las ovejas, por la sangre de un pacto eterno,
  to: Y ahora, que el Dios de paz[a], que hizo subir de entre los muertos a nuestro Señor Jesús, el gran pastor de las ovejas, por la sangre de un pacto eterno,
  rationale: Se ajusta el inicio para reflejar mejor el valor transicional de δέ en una bendición («Y ahora»), se reemplaza «sacó» por «hizo subir» para conservar mejor la imagen de ἀνάγω en contexto de resurrección, se normaliza «pastor» en minúscula para un español más natural, y se afina la nota al pie para alinearla más estrechamente con la alternativa documentada en el POB inglés sin perder la ambigüedad exegética.
