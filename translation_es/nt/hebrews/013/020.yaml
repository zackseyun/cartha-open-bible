translation:
  language: es
  text: Y ahora, que el Dios de paz[a], que hizo subir de entre los muertos a nuestro Señor Jesús, el gran pastor de las ovejas, por la sangre de un pacto eterno,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que levantó de entre los muertos a nuestro Señor Jesús ... por medio de la sangre del pacto eterno». El griego permite una ligera diferencia en la manera de relacionar la frase «en/por la sangre de un pacto eterno».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ δὲ / θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de paz
  alternatives_spanish:
  - el Dios de la paz
  - el Dios pacífico
  lexicon: BDAG
  rationale: Conservo la construcción nominal breve y natural en español. «Dios de paz» reproduce el genitivo de relación/caracterización sin introducir una paráfrasis adjetival menos precisa.
- source_word: ὁ ἀναγαγὼν
  english_pob_choice: who brought up
  chosen_spanish: que sacó
  alternatives_spanish:
  - que levantó
  - que hizo subir
  lexicon: BDAG
  rationale: «ἀνάγω» en contexto de resurrección admite la idea de “sacar/traer arriba”. «Sacó de entre los muertos» mantiene el movimiento implícito del verbo y funciona bien en español sin forzar un calco.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - desde entre los muertos
  lexicon: BDAG
  rationale: La expresión española «de entre los muertos» conserva mejor el valor idiomático y la imagen de salida desde el ámbito de los muertos.
- source_word: τὸν ποιμένα τῶν προβάτων τὸν μέγαν
  english_pob_choice: the great shepherd of the sheep
  chosen_spanish: el gran Pastor de las ovejas
  alternatives_spanish:
  - el gran pastor de las ovejas
  - el Pastor grande de las ovejas
  lexicon: BDAG
  rationale: Mantengo «Pastor» con mayúscula por tratarse de un título cristológico en este contexto, y «de las ovejas» para respetar πρόβατα de forma literal. «Gran» conserva el orden más natural del español.
- source_word: ἐν αἵματι
  english_pob_choice: by the blood
  chosen_spanish: por la sangre
  alternatives_spanish:
  - en la sangre
  - mediante la sangre
  lexicon: BDAG
  rationale: La preposición griega permite una relación instrumental. En español, «por la sangre» es la opción más natural y suficientemente abierta para no cerrar la ambigüedad del texto griego.
- source_word: διαθήκης αἰωνίου
  english_pob_choice: of an eternal covenant
  chosen_spanish: de un pacto eterno
  alternatives_spanish:
  - de una alianza eterna
  - de un pacto perpetuo
  lexicon: BDAG
  rationale: «διαθήκη» en Hebreos suele requerir «pacto» o «alianza». Elijo «pacto» por ser transparente y ampliamente entendible, manteniendo «eterno» para αἰωνίου.
- source_word: τὸν κύριον ἡμῶν Ἰησοῦν
  english_pob_choice: our Lord Jesus
  chosen_spanish: a nuestro Señor Jesús
  alternatives_spanish:
  - nuestro Señor Jesús
  - a Jesús, nuestro Señor
  lexicon: BDAG
  rationale: Conservo el acusativo como complemento de la oración relativa en español con «a nuestro Señor Jesús». «Señor» corresponde a κύριος y mantiene la fórmula cristológica establecida.
theological_decisions:
- issue: Relación de ἐν αἵματι διαθήκης αἰωνίου con la cláusula anterior
  english_pob_reading: Attached to God's act of bringing Jesus up, rendered instrumentally as 'by the blood of an eternal covenant'
  chosen_spanish_reading: 'Lo dejo unido a la acción de Dios: «por la sangre de un pacto eterno»'
  alternative_spanish_readings:
  - «en la sangre de un pacto eterno»
  - «mediante la sangre de un pacto eterno»
  - unirlo principalmente a «el gran Pastor de las ovejas»
  rationale: La posición griega admite más de una relación sintáctica. En español, «por la sangre de un pacto eterno» conserva la ambigüedad razonable y no resuelve de manera indebida si modifica principalmente la resurrección o al Pastor.
  doctrine_reference: Preservar la tensión exegética sin sobreinterpretar el mecanismo de la expiación.
- issue: Traducción de θεὸς τῆς εἰρήνης
  english_pob_reading: the God of peace
  chosen_spanish_reading: el Dios de paz
  alternative_spanish_readings:
  - el Dios de la paz
  - el Dios pacífico
  rationale: Evito una adjetivación que podría sonar interpretativa. La forma nominal es bíblica, clara y fiel al genitivo griego.
  doctrine_reference: Genitivo de relación/caracterización en fórmulas bíblicas.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el borrador sigue el estado más reciente indicado como sin cambios, y toma en cuenta el alto nivel de acuerdo del control cruzado.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Mantengo «Señor» para κύριος en la fórmula cristológica.
  - Conservo una redacción de benedición en estilo claro y publicación-readable, sin cerrar la ambigüedad sintáctica del segmento preposicional.
