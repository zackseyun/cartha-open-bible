translation:
  language: es
  text: Tenemos un altar, del cual no tienen derecho a comer los que sirven en el tabernáculo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «los que ministran en la tienda/tabernáculo». La frase se refiere a quienes participan en el servicio del santuario del antiguo pacto.
    reason: lexical_alternative
  - marker: b
    text: 'El «altar» se interpreta de varias maneras: como Cristo mismo, la cruz, el altar celestial o los beneficios sacrificiales de la ofrenda de Cristo. El griego deja la imagen sin especificarla aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔχομεν
  english_pob_choice: We have
  chosen_spanish: Tenemos
  alternatives_spanish:
  - Tenemos nosotros
  - Poseemos
  lexicon: BDAG
  rationale: El presente indicativo se conserva como posesión/acceso actual compartido por el autor y sus lectores. «Tenemos» es natural en español y mantiene la inclusión del hablante.
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: BDAG
  rationale: En Hebreos, el sustantivo conserva su imagen cultual concreta. «Altar» es la traducción directa y no resuelve en el texto principal su posible alcance tipológico o cristológico.
- source_word: ἐξ οὗ
  english_pob_choice: from which
  chosen_spanish: del cual
  alternatives_spanish:
  - de donde
  - del que
  lexicon: BDAG
  rationale: La relación de origen/partitividad se expresa de forma natural en español con «del cual». Mantiene la imagen de comer “desde” un altar sin volverla interpretativa.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: BDAG
  rationale: El infinitivo aoristo se expresa con el infinitivo español simple. En esta estructura, «comer» es suficiente y idiomático.
- source_word: οὐκ ἔχουσιν ἐξουσίαν
  english_pob_choice: have no right
  chosen_spanish: no tienen derecho
  alternatives_spanish:
  - no tienen autoridad
  - no les está permitido
  lexicon: BDAG
  rationale: Aquí ἐξουσίαν comunica privilegio/autorización para participar, no autoridad gobernante. «No tienen derecho» reproduce bien esa falta de permiso autorizado.
- source_word: οἱ τῇ σκηνῇ λατρεύοντες
  english_pob_choice: those who serve at the tabernacle
  chosen_spanish: los que sirven en el tabernáculo
  alternatives_spanish:
  - los que ministran en el tabernáculo
  - los que sirven en la tienda
  lexicon: BDAG
  rationale: λατρεύω tiene un matiz cultual de servicio sagrado; «sirven» funciona en español sin perder el ámbito ritual. «Tabernáculo» preserva el referente establecido por Hebreos para σκηνή.
theological_decisions:
- issue: Referente de «altar»
  english_pob_reading: Retain the concrete term 'altar' without specifying its referent in the main text.
  chosen_spanish_reading: Conservar «altar» sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - Cristo mismo
  - la cruz
  - el altar celestial
  - los beneficios sacrificiales de la ofrenda de Cristo
  rationale: El versículo mantiene una imagen cultual abierta; distintas lecturas interpretan el altar de modo diverso. La traducción española conserva esa tensión teológica y evita cerrar prematuramente el sentido.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador inglés quedó confirmado como de alta concordancia y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción cultual de Hebreos entre «altar» y «tabernáculo», sin sustituirla por lenguaje eclesiástico más interpretativo.
  - «Sirven» se usa aquí por la naturalidad del español; la nota preserva el matiz ministerial/cultual de λατρεύοντες.
