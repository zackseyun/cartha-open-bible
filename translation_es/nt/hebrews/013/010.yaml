  yaml_path: translation/nt/hebrews/013/010.yaml
  text: We have an altar from which those who serve at the tabernacle have no right to eat[a][b].
  footnotes:
  - marker: a
    text: Or, more specifically, 'those who minister in the tent/tabernacle.' The phrase refers to those engaged in the old covenant sanctuary service.
    reason: lexical_alternative
  - marker: b
    text: The 'altar' is interpreted variously as Christ himself, the cross, the heavenly altar, or the sacrificial benefits of Christ's offering. The Greek leaves the image stated without further specification here.
