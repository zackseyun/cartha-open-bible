revisions:
- from: Saluden a todos sus líderes y a todos los santos[a]. Los de Italia les saludan.
  to: Saluden a todos sus líderes y a todos los santos[a]. Los que son de Italia les saludan.
  rationale: Se mantiene el contenido del borrador, pero se ajusta «Los de Italia» a «Los que son de Italia» para reflejar con más claridad la procedencia que ἀπό suele indicar y para sostener un registro más digno y menos coloquial. También se corrige y pule la nota al pie para adecuarla al estilo editorial del proyecto.
