translation:
  language: es
  text: Saluden a todos sus líderes y a todos los santos[a]. Los que son de Italia les saludan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los que están en Italia les saludan». La frase griega puede referirse tanto a personas originarias de Italia como a personas que están allí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a ustedes
  lexicon: BDAG
  rationale: El imperativo aoristo medio de ἀσπάζομαι se usa en contexto epistolar para expresar saludo. En español, «saluden» comunica de forma natural la fuerza imperativa sin añadir matices que el griego no exige.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todos y cada uno de
  lexicon: BDAG
  rationale: El acusativo plural con artículo abarca el grupo completo; «todos» es la correspondencia más directa y natural en español.
- source_word: τοὺς ἡγουμένους ὑμῶν
  english_pob_choice: your leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - los que los guían
  - sus dirigentes
  lexicon: BDAG
  rationale: ἡγούμενοι significa literalmente «los que guían / dirigen». En Hebreos 13 se refiere a líderes reconocidos de la comunidad. «Líderes» conserva la claridad y evita cargar el texto con un término político o eclesiástico más técnico de lo que el griego exige.
- source_word: τοὺς ἁγίους
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: BDAG
  rationale: ἅγιοι es el designativo usual del NT para los creyentes. «Los santos» conserva el valor lexical y teológico del término; es además una forma asentada y comprensible en español.
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: les saludan
  alternatives_spanish:
  - envían saludos a
  - les mandan saludos
  lexicon: BDAG
  rationale: En la fórmula epistolar, ἀσπάζονται se traduce naturalmente con un verbo de saludo. «Les saludan» reproduce bien la reciprocidad del saludo en español y mantiene la concisión del griego.
- source_word: οἱ ἀπὸ τῆς Ἰταλίας
  english_pob_choice: Those from Italy
  chosen_spanish: Los de Italia
  alternatives_spanish:
  - Los que están en Italia
  - Los provenientes de Italia
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo normalmente señala procedencia u origen, por eso la lectura principal es «de Italia / desde Italia». «Los de Italia» conserva esa ambigüedad referencial de manera idiomática en español y no fuerza una interpretación más específica de la que el texto sostiene.
theological_decisions:
- issue: Referente de οἱ ἀπὸ τῆς Ἰταλίας
  english_pob_reading: Those from Italy
  chosen_spanish_reading: Los de Italia
  alternative_spanish_readings:
  - Los que están en Italia
  rationale: No se trata de una cuestión doctrinal, sino de una ambigüedad interpretativa relevante para el trasfondo de la carta. Como ἀπό normalmente indica procedencia, la redacción principal mantiene esa orientación. Se conserva la posibilidad de leer una salutación procedente de creyentes asociados con Italia, sin cerrar la otra opción de un grupo situado allí.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas cuando el griego no las resuelve'
translation_notes:
  revision_awareness: El contexto de revisión indica acuerdo alto y ningún cambio pendiente; la propuesta sigue de cerca el audit trail inglés y mantiene la ambigüedad de οἱ ἀπὸ τῆς Ἰταλίας mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o un equivalente directo lo requiera; este versículo no lo contiene.
  - «Santos» se mantiene como término técnico bíblico, no como simple adjetivo moral.
  - Se evita introducir terminología eclesiástica más específica que «líderes», dado que ἡγούμενοι en Hebreos 13 tiene ese sentido amplio de conducción comunitaria.
