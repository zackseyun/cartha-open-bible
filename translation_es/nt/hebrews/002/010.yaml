translation:
  language: es
  text: Porque le convenía[a], para quien existen todas las cosas y por quien existen todas las cosas, al llevar a muchos hijos[d] a la gloria, perfeccionar[b] al pionero[c] de su salvación mediante padecimientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Le convenía» expresa la idea de idoneidad o conveniencia del plan divino, no simple cortesía.
    reason: lexical_alternative
  - marker: b
    text: «Perfeccionar» aquí significa llevar a la meta o consumación prevista; no implica que el Hijo fuera moralmente defectuoso.
    reason: theological_note
  - marker: c
    text: '«Pionero» conserva la fuerza de ἀρχηγός: quien inicia y abre el camino. Otras posibilidades: «fundador», «líder» o «autor».'
    reason: lexical_alternative
  - marker: d
    text: «Muchos hijos» preserva la imagen de filiación e herencia del griego. En español, «hijos» puede abarcar a toda la comunidad filial sin limitarse a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔπρεπεν
  english_pob_choice: it was fitting
  chosen_spanish: le convenía
  alternatives_spanish:
  - era fitting
  - era apropiado
  - era propio
  lexicon: BDAG
  rationale: El verbo expresa conveniencia adecuada al propósito de Dios. «Le convenía» conserva la idea de ajuste/aptitud sin sonar artificial en español y mantiene el tono teológico de idoneidad, no de mera cortesía.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: BDAG
  rationale: El dativo pronominal queda natural como complemento indirecto en español. «Le» preserva el referente personal que el contexto identifica como Dios.
- source_word: δι’ ὃν τὰ πάντα καὶ δι’ οὗ τὰ πάντα
  english_pob_choice: for whom are all things and through whom are all things
  chosen_spanish: para quien son todas las cosas y por quien son todas las cosas
  alternatives_spanish:
  - porque son todas las cosas y por quien son todas las cosas
  - para quien existen todas las cosas y por quien existen todas las cosas
  lexicon: BDAG
  rationale: 'Se distinguen los dos valores de διά: fin/propósito («para quien») y agencia/medio («por quien»). «Son todas las cosas» evita una glosa excesiva y conserva la concisión creedal del griego.'
- source_word: πολλοὺς υἱοὺς
  english_pob_choice: many sons
  chosen_spanish: muchos hijos
  alternatives_spanish:
  - muchos hijos e hijas
  - muchos hijos varones
  - muchos hijos de Dios
  lexicon: BDAG
  rationale: En español, «hijos» puede abarcar filiación e herencia sin marcar sexo biológico en este contexto. Dado que el audit trail inglés preserva la forma masculina por precisión léxica, aquí «hijos» comunica mejor el alcance representativo en español sin borrar la filiación.
- source_word: εἰς δόξαν
  english_pob_choice: to glory
  chosen_spanish: a la gloria
  alternatives_spanish:
  - hacia la gloria
  - para gloria
  lexicon: BDAG
  rationale: La preposición εἰς expresa dirección/resultado. «A la gloria» es idiomático y mantiene el movimiento hacia ese estado.
- source_word: ἀγαγόντα
  english_pob_choice: in bringing
  chosen_spanish: al llevar
  alternatives_spanish:
  - cuando llevaba
  - en llevar
  - después de llevar
  lexicon: BDAG
  rationale: 'El participio aoristo se integra de manera natural como circunstancia concomitante: «al llevar». Esto evita la rigidez de un calco y conserva la relación con el infinitivo principal.'
- source_word: τὸν ἀρχηγὸν
  english_pob_choice: the pioneer
  chosen_spanish: al pionero
  alternatives_spanish:
  - al fundador
  - al líder
  - al autor
  lexicon: BDAG
  rationale: «Pionero» refleja bien el sentido de ἀρχηγός como quien abre camino e inicia. Aunque no es el término eclesiástico tradicional, conserva el énfasis de Hebreos mejor que «autor» o «capitán».
- source_word: τῆς σωτηρίας αὐτῶν
  english_pob_choice: of their salvation
  chosen_spanish: de su salvación
  alternatives_spanish:
  - de la salvación de ellos
  - de la salvación de los hijos
  lexicon: BDAG
  rationale: El posesivo «su» es la forma más natural en español y mantiene la referencia plural al grupo de los hijos.
- source_word: διὰ παθημάτων
  english_pob_choice: through sufferings
  chosen_spanish: mediante padecimientos
  alternatives_spanish:
  - por medio de sufrimientos
  - a través de sufrimientos
  lexicon: BDAG
  rationale: «Padecimientos» conserva el plural concreto del griego y suena más sobrio que una abstracción singular. «Mediante» expresa el medio con claridad y evita ambigüedad sobre mera concomitancia.
- source_word: τελειῶσαι
  english_pob_choice: to perfect
  chosen_spanish: perfeccionar
  alternatives_spanish:
  - llevar a su meta
  - llevar a la perfección
  - completar
  lexicon: BDAG
  rationale: En Hebreos, τελειόω suele significar llevar a la meta o consumación prevista. «Perfeccionar» conserva la conexión léxica tradicional y, en contexto cristológico, no implica corrección moral sino culminación de la misión/consagración.
theological_decisions:
- issue: Sentido de τελειῶσαι aplicado al Hijo
  english_pob_reading: to perfect
  chosen_spanish_reading: perfeccionar
  alternative_spanish_readings:
  - llevar a la meta
  - llevar a la perfección
  - completar
  rationale: Se mantiene el verbo tradicional porque corresponde al campo léxico del pasaje y enlaza con el uso de Hebreos. En español debe leerse como culminar o llevar al fin previsto, no como mejorar moralmente a alguien defectuoso.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Alcance de πολλοὺς υἱοὺς
  english_pob_reading: many sons
  chosen_spanish_reading: muchos hijos
  alternative_spanish_readings:
  - muchos hijos e hijas
  - muchos descendientes
  - muchos hijos de Dios
  rationale: Aunque el griego es masculino plural, el español «hijos» puede funcionar de modo representativo para toda la comunidad filial sin perder la alusión a la herencia. No se neutraliza a «hijos e hijas» para no añadir una expansión que el texto no formula.
  doctrine_reference: Principio de precisión léxica y representación filial en Hebreos
- issue: Función de las dos frases con διά
  english_pob_reading: for whom are all things and through whom are all things
  chosen_spanish_reading: para quien son todas las cosas y por quien son todas las cosas
  alternative_spanish_readings:
  - porque son todas las cosas y por quien son todas las cosas
  - de quien son todas las cosas y por quien son todas las cosas
  rationale: La primera frase expresa finalidad o referencia última; la segunda, agencia instrumental. Mantener dos preposiciones distintas en español ayuda a no borrar la tensión conceptual del griego.
  doctrine_reference: Providencia y creación de Dios en la lectura de Hebreos
- issue: Relación sintáctica de la cláusula participial
  english_pob_reading: in bringing many sons to glory
  chosen_spanish_reading: al llevar a muchos hijos a la gloria
  alternative_spanish_readings:
  - mientras llevaba a muchos hijos a la gloria
  - en llevar a muchos hijos a la gloria
  rationale: Se refleja que la acción de llevar a muchos hijos a la gloria está vinculada al acto de perfeccionar al pionero, no como finalidad separada, sino como marco de esa obra divina.
  doctrine_reference: Cristología y economía de la salvación en Hebreos
translation_notes:
  revision_awareness: El texto griego coloca la cláusula participial ἀγαγόντα antes del infinitivo τελειῶσαι; por eso el español mantiene el vínculo lógico sin convertirlo en una finalidad independiente. También se conserva la distinción entre las dos frases con διά y el valor cristológico fuerte de ἀρχηγός/τελειόω según la revisión más reciente del audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene el registro bíblico moderno y sobrio, evitando fórmulas tradicionales que oculten la precisión léxica.
  - «Pionero» se usa de forma consistente para ἀρχηγός en este pasaje, con nota de alternativas para lectores que esperen «fundador» o «autor».
  - Se conserva la pluralidad de «padecimientos» para reflejar el plural griego παθημάτων.
