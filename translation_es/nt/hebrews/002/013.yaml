translation:
  language: es
  text: 'Y de nuevo[a]: «Yo confiaré en él». Y de nuevo: «He aquí[b][c][d], yo y los niños que Dios me ha dado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Yo estaré confiando en él» o «Tendré confianza en él».'
    reason: lexical_alternative
  - marker: b
    text: El hablante no se nombra en el griego de este versículo; en el contexto, Hebreos aplica estas citas al Hijo.
    reason: cross_reference
  - marker: c
    text: 'El griego usa un relativo neutro con «los niños»: «los niños … que/los cuales», mientras que el español naturaliza el referente personal con «que».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «a quienes Dios me dio».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y de nuevo
  alternatives_spanish:
  - Y otra vez
  - Y de nuevo él dice
  lexicon: BDAG
  rationale: La fórmula introduce otra cita; el griego solo dice 'y de nuevo', sin añadir un verbo explícito de habla, por lo que se mantiene la concisión en español sin insertar 'dice' en el texto principal.
- source_word: Ἐγὼ ἔσομαι πεποιθὼς ἐπ’ αὐτῷ
  english_pob_choice: I will put my trust in him
  chosen_spanish: Yo confiaré en él
  alternatives_spanish:
  - Yo pondré mi confianza en él
  - Yo estaré confiando en él
  - Yo tendré confianza en él
  lexicon: BDAG
  rationale: La perífrasis futura con participio perfecto expresa una postura futura firme de confianza/seguridad. 'Confiaré' comunica de forma natural esa confianza futura en español sin perder el valor de decisión o resolución presente-futura.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  lexicon: BDAG
  rationale: 'Con verbos de confianza, el español idiomático usa ''en'' para reflejar la relación de confianza, aunque el griego sea literalmente ''sobre/ en''. '
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira,
  lexicon: BDAG
  rationale: El deíctico introduce con fuerza la cita. En español contemporáneo 'Mira' conserva el tono exhortativo y la vividez de la fórmula sin caer en un arcaísmo excesivo; 'He aquí' es posible, pero menos natural para lectura pública moderna.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los pequeños
  lexicon: BDAG
  rationale: En este contexto relacional y de filiación, 'hijos' refleja mejor la pertenencia y la relación con el hablante que 'niños'. Aunque παιδία puede ser 'niños', el inglés POB optó por 'children'; en español, 'hijos' comunica con más claridad la relación filial.
- source_word: ἅ μοι ἔδωκεν ὁ θεός
  english_pob_choice: whom God has given me
  chosen_spanish: que Dios me ha dado
  alternatives_spanish:
  - a quienes Dios me ha dado
  - que Dios me dio
  lexicon: BDAG
  rationale: El relativo neutro griego concuerda gramaticalmente con παιδία, pero en español una cláusula con 'que' es natural y mantiene el sentido personal de los hijos. El perfecto 'ha dado' expresa la relevancia presente del don divino, siguiendo el matiz del inglés POB.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Traducción estándar y directa de θεός. El artículo griego no requiere reflejo especial en español.
theological_decisions:
- issue: Voz del hablante en la cita
  english_pob_reading: Render the OT citations straightforwardly as first-person speech without adding interpretive identifiers in the main text.
  chosen_spanish_reading: Presentar la cita como habla en primera persona sin identificar al hablante dentro del texto principal.
  alternative_spanish_readings:
  - '''el Mesías dice'''
  - '''él dice'''
  rationale: Hebreos aplica estas citas al Hijo en el contexto inmediato, pero el versículo griego introduce la cita sin nombrar al hablante. Mantener la voz directa preserva la tensión interpretativa y evita importar una aclaración que el texto de la cita no explicita.
  doctrine_reference: Preservar la tensión cristológica del contexto sin resolverla dentro del enunciado citado.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del pasaje: no se requirieron cambios adicionales respecto del audit trail inglés; se mantuvo la fórmula de cita concisa, la voz implícita del hablante y la alternativa de traducción para el verbo de confianza.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando el texto fuente lo exige; aquí aparece θεός, por lo que se traduce 'Dios'.
  - Se evitó 'Cristo' en el texto principal porque el versículo no lo nombra y el contexto argumentativo de Hebreos ya provee la identificación sin introducirla en la cita.
  - Se escogió 'hijos' en lugar de 'niños' por el matiz relacional y filial del pasaje, coherente con el uso de 'children' en el audit trail inglés.
  - Se conservó la alternancia estilística de la cita bíblica con dos fórmulas 'Y de nuevo' para reflejar el paralelo del griego.
