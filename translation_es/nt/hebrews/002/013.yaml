- from: 'Y de nuevo[a]: “Yo confiaré en él.” Y de nuevo, “Mira[b][c][d], yo y los hijos que Dios me ha dado.”'
  to: 'Y de nuevo[a]: «Yo confiaré en él». Y de nuevo: «He aquí[b][c][d], yo y los niños que Dios me ha dado».'
  rationale: Se corrige el registro de Ἰδοὺ de «Mira» a «He aquí» para mantener un tono bíblico digno y más cercano al «Behold» auditado. También se ajusta τὰ παιδία a «los niños» para reflejar mejor «children» sin introducir el matiz más estrecho de «hijos». Se conserva el resto de la estructura, incluidas las notas sobre la voz del hablante y las alternativas léxicas.
