  text: καὶ πάλιν· Ἐγὼ ἔσομαι πεποιθὼς ἐπ’ αὐτῷ· καὶ πάλιν· Ἰδοὺ ἐγὼ καὶ τὰ παιδία ἅ μοι ἔδωκεν ὁ θεός.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/013.yaml
  text: And again[a], “I will put my trust in him.” And again, “Behold[d][c][b], I and the children whom God has given me.”
  footnotes:
  - marker: a
    text: Or, more literally, “I will be trusting in him” or “I will have confidence in him.”
    reason: lexical_alternative
  - marker: b
    text: The speaker is not named in the Greek of this verse; in context Hebrews applies these quotations to the Son.
    reason: cross_reference
  - marker: c
    text: Greek has neuter “the children … which/that,” matching the grammatical gender of “children”; English uses “whom” for persons.
    reason: lexical_alternative
  - marker: d
    text: Or “whom God gave me.”
    reason: alternative_reading
