translation:
  language: es
  text: Porque no sometió el mundo venidero[a] a los ángeles, del cual estamos hablando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mundo habitado que ha de venir'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque no
  alternatives_spanish:
  - Pues no
  - Porque ... no
  lexicon: BDAG
  rationale: γάρ introduce una explicación o continuación argumental; en español, 'Porque' expresa bien esa conexión. La negación simple con 'no' conserva el alcance de Οὐ sin añadir énfasis innecesario.
- source_word: ἀγγέλοις
  english_pob_choice: to angels
  chosen_spanish: a los ángeles
  alternatives_spanish:
  - a mensajeros
  lexicon: BDAG
  rationale: En Hebreos el contraste es con seres celestiales, no con mensajeros humanos. 'Ángeles' es la lectura contextual adecuada y la forma más natural en español.
- source_word: ὑπέταξεν
  english_pob_choice: did not subject
  chosen_spanish: sometió
  alternatives_spanish:
  - puso bajo dominio
  - subordinó
  lexicon: BDAG
  rationale: ὑποτάσσω expresa poner bajo autoridad o dominio. 'Sometió' mantiene esa fuerza relacional y jerárquica sin recurrir a una paráfrasis más larga.
- source_word: τὴν οἰκουμένην
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - el mundo habitado
  lexicon: BDAG
  rationale: POB opta por 'the world' como equivalente más fluido. En español, 'el mundo' comunica naturalmente el ámbito creado y ordenado al que se refiere οἰκουμένη, sin perder la referencia amplia.
- source_word: τὴν μέλλουσαν
  english_pob_choice: the coming
  chosen_spanish: venidero
  alternatives_spanish:
  - futuro
  - que ha de venir
  lexicon: BDAG
  rationale: El participio μέλλω marca futuridad. 'Venidero' reproduce esa idea en un adjetivo natural en español y conserva el matiz escatológico de 'el mundo por venir'.
- source_word: περὶ ἧς λαλοῦμεν
  english_pob_choice: about which we are speaking
  chosen_spanish: acerca del cual estamos hablando
  alternatives_spanish:
  - sobre el cual hablamos
  - de lo cual hablamos
  lexicon: BDAG
  rationale: El presente λαλοῦμεν indica discurso en curso. 'Estamos hablando' conserva esa continuidad; 'acerca del cual' mantiene la referencia al sustantivo anterior con español claro y sobrio.
theological_decisions:
- issue: Alcance de 'el mundo venidero'
  english_pob_reading: An eschatological world/order to come, not merely the present inhabited earth.
  chosen_spanish_reading: Un orden/mundo escatológico por venir, no simplemente la tierra habitada presente.
  alternative_spanish_readings:
  - la tierra habitada en general
  - la era del evangelio específicamente
  rationale: '''Mundo venidero'' preserva la tensión escatológica sin cerrarla prematuramente. La frase sigue abierta a la relación entre creación, gobierno y consumación que desarrolla Hebreos 2.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al término 'mundo venidero' dentro del texto principal. La redacción española sigue de cerca el griego y la decisión auditada de POB sin calcar el inglés.
  spanish_consistency_notes:
  - '''Mundo venidero'' mantiene la idiomaticidad española y el contenido de οἰκουμένη τὴν μέλλουσαν.'
  - '''Ángeles'' se conserva por el contexto cristológico de Hebreos.'
  - '''Sometió'' preserva la fuerza de autoridad de ὑποτάσσω.'
  - El orden de la cláusula final respeta el flujo natural del español y la referencia anafórica de περὶ ἧς.
