- from: Porque no sometió el mundo venidero a los ángeles[a], acerca del cual estamos hablando.
  to: Porque no sometió el mundo venidero[a] a los ángeles, del cual estamos hablando.
  rationale: Se mueve la nota al sintagma que realmente comenta, 'mundo venidero', y se simplifica el cierre a 'del cual estamos hablando' para un español más natural y fiel al referente de περὶ ἧς λαλοῦμεν. No se requieren cambios teológicos ni léxicos mayores.
