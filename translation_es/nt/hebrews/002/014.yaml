translation:
  language: es
  text: Por tanto, puesto que los hijos comparten carne y sangre[a], él mismo de manera semejante participó de las mismas cosas, para que por medio de la muerte anulase al que tiene el poder de la muerte, es decir, al diablo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «sangre y carne».
    reason: lexical_alternative
  - marker: b
    text: 'O: «destruyera»; el verbo también puede significar «dejar sin poder», «anular» o «abolir», más que implicar aniquilación.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπεὶ οὖν
  english_pob_choice: Therefore, since
  chosen_spanish: Por tanto, puesto que
  alternatives_spanish:
  - Pues, ya que
  - Así que, puesto que
  lexicon: BDAG
  rationale: Ἐπεὶ οὖν expresa una conexión inferencial y causal. En español, «Por tanto» conserva la conclusión del argumento, y «puesto que» refleja la causa sin sonar mecánico.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los hijos de Dios
  lexicon: BDAG
  rationale: En este contexto la referencia es a los hijos dados al Hijo en el argumento inmediato. «Hijos» comunica la relación filial del pasaje; «niños» podría sonar más literal pero menos preciso en español.
- source_word: κεκοινώνηκεν
  english_pob_choice: share in
  chosen_spanish: comparten
  alternatives_spanish:
  - tienen parte en
  - participan en
  lexicon: BDAG
  rationale: El perfecto de κοινωνέω indica una participación ya establecida. «Comparten» transmite esa condición de participación continua de forma natural en español.
- source_word: αἵματος καὶ σαρκός
  english_pob_choice: flesh and blood
  chosen_spanish: carne y sangre
  alternatives_spanish:
  - sangre y carne
  - naturaleza humana
  lexicon: BDAG
  rationale: Se conserva la locución antropológica con el orden español más natural. «Carne y sangre» evita una lectura metafórica no atestiguada aquí; σάρξ se vierte como «carne» por su sentido literal en este verso.
- source_word: παραπλησίως
  english_pob_choice: likewise
  chosen_spanish: también
  alternatives_spanish:
  - de manera semejante
  - asimismo
  lexicon: BDAG
  rationale: El adverbio marca semejanza estrecha. «También» en combinación con «participó de lo mismo» comunica la correspondencia sin sobrecargar el español.
- source_word: μετέσχεν τῶν αὐτῶν
  english_pob_choice: partook of the same things
  chosen_spanish: participó de lo mismo
  alternatives_spanish:
  - tomó parte de lo mismo
  - compartió lo mismo
  lexicon: BDAG
  rationale: μετέχω expresa participación. «Participó de lo mismo» mantiene el paralelismo con la primera cláusula y distingue este verbo de κοινωνέω.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce una finalidad. «Para que» es la forma más clara y directa en español contemporáneo.
- source_word: διὰ τοῦ θανάτου
  english_pob_choice: through death
  chosen_spanish: por medio de la muerte
  alternatives_spanish:
  - mediante la muerte
  - a través de la muerte
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. «Por medio de la muerte» es preciso y natural; conserva la idea instrumental sin ambigüedad.
- source_word: καταργήσῃ
  english_pob_choice: might nullify
  chosen_spanish: anulase
  alternatives_spanish:
  - destruyera
  - dejara sin poder
  lexicon: BDAG
  rationale: καταργέω suele significar hacer ineficaz, abolir o dejar sin efecto. «Anulase» mantiene la fuerza de nulificación sin sugerir aniquilación del diablo.
- source_word: τὸ κράτος ἔχοντα τοῦ θανάτου
  english_pob_choice: the one who has the power of death
  chosen_spanish: al que tiene el poder de la muerte
  alternatives_spanish:
  - al que ejerce el dominio de la muerte
  - al que posee el poder de la muerte
  lexicon: BDAG
  rationale: κράτος apunta a poder, dominio o fuerza. «El poder de la muerte» reproduce bien el sentido y la construcción personal del participio.
- source_word: τοῦτ’ ἔστι
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: BDAG
  rationale: Introduce una aclaración appositiva. «Es decir» es natural y formal en español.
- source_word: τὸν διάβολον
  english_pob_choice: the devil
  chosen_spanish: al diablo
  alternatives_spanish:
  - al Diablo
  - al adversario
  lexicon: BDAG
  rationale: διάβολος funciona aquí como designación personal conocida. «Diablo» es la equivalencia directa y clara en español.
theological_decisions:
- issue: Participación real de Cristo en la humanidad
  english_pob_reading: he himself likewise partook of the same things
  chosen_spanish_reading: él mismo también participó de lo mismo
  alternative_spanish_readings:
  - él mismo compartió nuestra humanidad
  - él mismo se hizo carne y sangre como ellos
  rationale: La redacción mantiene la participación real y semejante, sin borrar la distinción entre Cristo y los hijos. Evita explicitar más de lo que el verso afirma, pero conserva la fuerza cristológica del paralelo.
  doctrine_reference: Nicene Creed; Definition of Chalcedon
- issue: Sentido de καταργήσῃ respecto del diablo
  english_pob_reading: might nullify
  chosen_spanish_reading: anulase
  alternative_spanish_readings:
  - destruyera
  - dejara sin poder
  rationale: «Anular» preserva la idea de desactivar o dejar sin efecto, sin implicar que el diablo deje de existir. Se conserva así la tensión semántica del verbo griego y la cautela doctrinal del POB.
  doctrine_reference: Translation philosophy §3
- issue: Orden de la locución antropológica
  english_pob_reading: flesh and blood
  chosen_spanish_reading: carne y sangre
  alternative_spanish_readings:
  - sangre y carne
  - cuerpo y sangre
  rationale: Se mantiene la expresión semítica tradicional con el orden más natural en español. No se espiritualiza ni se convierte en mera metáfora de debilidad humana.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego conservado en el paquete fuente coincide con la línea auditada inglesa, pero el inglés revisado reordenó la locución a «flesh and blood» por naturalidad. En español se optó por la forma idiomática «carne y sangre», manteniendo la transparencia mediante nota sobre la opción literal del griego.
  spanish_consistency_notes:
  - Se conserva la distinción verbal entre κοινωνέω («comparten») y μετέχω («participó de lo mismo»).
  - «Carne» se usa aquí en sentido literal, no como equivalente de «naturaleza humana».
  - «Anulase» mantiene la lectura no annihilacionista de καταργέω.
  - Se evita «SEÑOR» o una glosa litúrgica porque el verso no contiene κύριος como designación divina.
