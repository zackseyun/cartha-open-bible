source:
  edition: SBLGNT
  text: Ἐπεὶ οὖν τὰ παιδία κεκοινώνηκεν ⸂αἵματος καὶ σαρκός⸃, καὶ αὐτὸς παραπλησίως μετέσχεν τῶν αὐτῶν, ἵνα διὰ τοῦ θανάτου καταργήσῃ τὸν τὸ κράτος ἔχοντα τοῦ θανάτου, τοῦτ’ ἔστι τὸν διάβολον,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/014.yaml
  text: Therefore[a], since the children share in flesh and blood, he himself likewise partook of the same things, so that through death he might nullify the one who has the power of death—that is, the devil[b],
  footnotes:
