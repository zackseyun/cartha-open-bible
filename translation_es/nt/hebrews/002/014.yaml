    text: 'Or ''flesh and blood.'' Greek: ''blood and flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'might destroy'; the verb can mean 'render powerless,' 'nullify,' or 'abolish' rather than imply annihilation.
    reason: alternative_reading
