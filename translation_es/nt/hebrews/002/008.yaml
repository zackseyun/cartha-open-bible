revisions:
- from: Tú sometiste todas las cosas bajo sus pies[a]. Porque, al someter todas las cosas a él[b], no dejó nada que no le esté sometido. Pero ahora todavía no vemos que todas las cosas le estén sometidas.
  to: Tú sometiste todas las cosas bajo sus pies[a]. Porque, al someter todas las cosas a él[b], no dejó nada sin someter a él. Pero ahora todavía no vemos todas las cosas sometidas a él.
  rationale: 'La revisión corrige dos giros que, aunque comprensibles, se alejaban innecesariamente del griego: sustituye el subjuntivo relativo por una formulación más directa (''nada sin someter a él'') y reemplaza la subordinada con ''que'' por una construcción más cercana al objeto + participio del original (''no vemos todas las cosas sometidas a él''). También se normaliza la redacción de la nota b.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del griego: mantiene la cita del Salmo 8, la explicación con γὰρ, la totalidad de πάντα, y la tensión pronominal sin resolver el referente. También conserva la alternativa del infinitivo articular ἐν τῷ ὑποτάξαι en nota. Sin embargo, en las dos cláusulas finales introduce subjuntivo presente (''esté/estén sometido(s)''), lo que desplaza levemente el valor resultativo/estativo del griego y suena menos natural que una formulación con participio/adjetivo o infinitivo objetivo.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero hay dos puntos mejorables: 1) ''no dejó nada que no le esté sometido'' es gramatical pero menos directo y algo forzado frente a ''nada sin someter a él''; 2) ''no vemos que todas las cosas le estén sometidas'' reinterpreta la construcción como subordinada con ''que'', cuando el griego dice más literalmente ''no vemos todas las cosas sometidas a él''. La revisión propuesta mejora naturalidad y cercanía sintáctica al original.'
  glossary_alignment: 'La terminología principal está alineada: πάντα = ''todas las cosas'', ὑποτάσσω = ''someter'', pronombres sin explicitación cristológica, y sin conflictos con los términos globales del proyecto. No hay temas de Yahvé/Mesías/etc. en este versículo.'
  issues:
  - severity: medium
    issue: Uso de subjuntivo en 'no dejó nada que no le esté sometido'
    rationale: ἀνυπότακτον funciona como predicado de estado ('no sometido'), no como una relativa con matiz potencial. La frase actual comunica el sentido básico, pero suaviza la contundencia y repetición léxica del grupo ὑποτάσσω.
  - severity: medium
    issue: Reformulación de 'οὔπω ὁρῶμεν αὐτῷ τὰ πάντα ὑποτεταγμένα' como 'no vemos que...'
    rationale: El griego presenta objeto + participio/resultativo, no una subordinada introducida por 'que'. 'No vemos todavía todas las cosas sometidas a él' preserva mejor la estructura y el énfasis observacional.
  - severity: low
    issue: Puntuación y formulación de la nota b
    rationale: 'La nota es comprensible, pero la cita interna está torpe (''O: ''''Porque cuando...''''''). Conviene normalizarla y, ya que se revisa el texto, adecuar el orden español a una alternativa más natural: ''Porque cuando sometió todas las cosas a él''.'
  revised_spanish_text: Tú sometiste todas las cosas bajo sus pies[a]. Porque, al someter todas las cosas a él[b], no dejó nada sin someter a él. Pero ahora todavía no vemos todas las cosas sometidas a él.
  revised_footnotes:
