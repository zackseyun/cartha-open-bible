base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/008.yaml
  text: You subjected all things under his feet.” For in subjecting all things to him[a], he left nothing not subjected to him[b]. But now we do not yet see all things subjected to him.
  footnotes:
  - marker: a
    text: The pronouns 'his' and 'him' echo Psalm 8. In context they can point to humanity in the psalm's original sense and to Jesus in Hebrews' application.
    reason: cross_reference
  - marker: b
    text: Or 'For when he subjected all things to him.' The Greek construction can be rendered more temporally.
    reason: lexical_alternative
