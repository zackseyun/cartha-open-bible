translation:
  language: es
  text: Tú sometiste todas las cosas bajo sus pies[a]. Porque, al someter todas las cosas a él[b], no dejó nada sin someter a él. Pero ahora todavía no vemos todas las cosas sometidas a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los pronombres 'sus' y 'él' reflejan el eco del Salmo 8. En su contexto pueden señalar a la humanidad en el sentido original del salmo y, en Hebreos, a Jesús en la aplicación cristológica.
    reason: cross_reference
  - marker: b
    text: 'O: ''Porque cuando sometió todas las cosas a él''. La construcción griega también puede expresarse de manera más temporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: BDAG
  rationale: El plural neutro abarca de modo comprehensivo la totalidad del dominio creado o considerado; 'todas las cosas' es natural en español y conserva ese alcance universal.
- source_word: ὑπέταξας
  english_pob_choice: you subjected
  chosen_spanish: sometiste
  alternatives_spanish:
  - pusiste en sujeción
  - colocaste bajo sujeción
  lexicon: BDAG
  rationale: El aoristo activo indica una acción de sometimiento; 'sometiste' conserva la fuerza semántica de subordinación mejor que una versión más débil o perifrástica.
- source_word: ὑποκάτω τῶν ποδῶν αὐτοῦ
  english_pob_choice: under his feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo los pies de él
  lexicon: BDAG
  rationale: La expresión es un modismo de dominio y sujeción. 'Bajo sus pies' es idiomático en español y mantiene la alusión bíblica sin forzar la sintaxis.
- source_word: ἐν τῷ ... ὑποτάξαι
  english_pob_choice: For in subjecting
  chosen_spanish: Porque, al someter
  alternatives_spanish:
  - Porque cuando sometió
  - Porque al haber sometido
  lexicon: BDAG
  rationale: La construcción con infinitivo articular puede leerse de manera temporal o conceptual. 'Al someter' conserva la relación explicativa del pasaje y suena natural en español, sin perder la tensión del giro griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca la explicación de la afirmación previa. 'Porque' mantiene el flujo argumentativo de forma clara en español.
- source_word: οὐδὲν ἀφῆκεν
  english_pob_choice: he left nothing
  chosen_spanish: no dejó nada
  alternatives_spanish:
  - no omitió nada
  - no dejó fuera nada
  lexicon: BDAG
  rationale: Expresa de manera idiomática la totalidad negativa del enunciado, conservando que nada quedó excluido de la sujeción.
- source_word: ἀνυπότακτον
  english_pob_choice: not subjected
  chosen_spanish: que no le esté sometido
  alternatives_spanish:
  - no sometido
  - insubordinado
  lexicon: BDAG
  rationale: El adjetivo predicativo significa 'no sujeto'. En español, la forma relativa evita una frase dura o poco natural y preserva el paralelo con el verbo ὑποτάσσω.
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Sin embargo, ahora
  lexicon: BDAG
  rationale: Señala el contraste entre la afirmación de la Escritura y la observación presente. 'Pero ahora' es breve y fiel al tono argumentativo.
- source_word: οὔπω ὁρῶμεν
  english_pob_choice: we do not yet see
  chosen_spanish: todavía no vemos
  alternatives_spanish:
  - aún no vemos
  - no vemos todavía
  lexicon: BDAG
  rationale: El presente con οὔπω expresa una condición presente no realizada. 'Todavía no vemos' es claro, natural y fiel a la fuerza temporal del griego.
- source_word: ὑποτεταγμένα
  english_pob_choice: subjected
  chosen_spanish: estén sometidas
  alternatives_spanish:
  - estén sujetas
  - estén en sujeción
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. En español, 'estén sometidas' comunica adecuadamente ese estado sin sonar técnico o forzado.
theological_decisions:
- issue: Referencia de los pronombres αὐτοῦ / αὐτῷ
  english_pob_reading: Rendered simply as 'his/him' without specifying the referent in the translation text.
  chosen_spanish_reading: Renderizado simplemente como 'sus / él / le' sin especificar el referente en el texto.
  alternative_spanish_readings:
  - su humanidad / al ser humano
  - a Jesús / al Hijo
  rationale: Hebreos cita Salmo 8, donde el referente inmediato se relaciona con la humanidad; en el argumento de Hebreos, la aplicación culmina en Jesús. La traducción preserva esa tensión teológica sin resolverla interpretativamente en el cuerpo del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fue confirmado como adecuado tras un control de alta concordancia (0,95) y quedó sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene 'someter/sometidas' para conservar la red léxica de ὑποτάσσω a lo largo del versículo.
  - Se evitó 'SEÑOR' porque el pasaje no usa aquí el tetragrámaton ni requiere máscara reverencial en esta unidad.
  - Se conservó la ambigüedad referencial de los pronombres, siguiendo el audit trail inglés y el movimiento de Salmo 8 a Hebreos.
  - '''Todas las cosas'' traduce de forma uniforme τα πάντα en sus tres ocurrencias, preservando el alcance total del argumento.'
