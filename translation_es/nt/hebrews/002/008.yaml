    text: Los pronombres 'sus' y 'él' reflejan el eco del Salmo 8. En su contexto pueden señalar a la humanidad en el sentido original del salmo y, en Hebreos, a Jesús en la aplicación cristológica.
    reason: cross_reference
  - marker: b
    text: 'O: ''Porque cuando sometió todas las cosas a él''. La construcción griega también puede expresarse de manera más temporal.'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos giros que, aunque comprensibles, se alejaban innecesariamente del griego: sustituye el subjuntivo relativo por una formulación más directa (''nada sin someter a él'') y reemplaza la subordinada con ''que'' por una construcción más cercana al objeto + participio del original (''no vemos todas las cosas sometidas a él''). También se normaliza la redacción de la nota b.'
