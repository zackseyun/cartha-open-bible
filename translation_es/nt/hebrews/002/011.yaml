translation:
  language: es
  text: Porque tanto el que santifica como los que están siendo santificados son todos de uno[a]; por esta razón no se avergüenza de llamarlos hermanos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un Padre», «de una sola fuente» o «de un antepasado». El griego no especifica el referente de «uno».
    reason: alternative_reading
  - marker: b
    text: «Hermanos» traduce el masculino plural ἀδελφοὺς; en contexto puede referirse a la familia más amplia de creyentes, incluidas las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἁγιάζων
  english_pob_choice: the one who sanctifies
  chosen_spanish: el que santifica
  alternatives_spanish:
  - el santificador
  - el que hace santo
  lexicon: BDAG
  rationale: El participio presente activo se vuelve naturalmente una construcción sustantivada en español. «El que santifica» conserva el valor verbal y el término bíblico «santifica», evitando una abstracción menos transparente.
- source_word: οἱ ἁγιαζόμενοι
  english_pob_choice: those who are being sanctified
  chosen_spanish: los que son santificados
  alternatives_spanish:
  - los que están siendo santificados
  - los santificados
  lexicon: BDAG
  rationale: El griego expresa una acción/pasividad presente. En español, «los que son santificados» preserva la relación verbal sin forzar una perífrasis más pesada; mantiene también la correspondencia léxica con ἁγιάζω.
- source_word: ἐξ ἑνὸς
  english_pob_choice: from one
  chosen_spanish: de uno
  alternatives_spanish:
  - de un Padre
  - de una misma fuente
  - de un antepasado
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del griego. «De uno» es breve y no especifica si el referente es Padre, origen, antepasado u otro; así no se resuelve indebidamente la tensión textual.
- source_word: πάντες
  english_pob_choice: are all
  chosen_spanish: todos
  alternatives_spanish:
  - son todos
  - todos proceden
  lexicon: BDAG
  rationale: En español el predicado puede quedar implícito por el contexto y la coordinación. «Todos» mantiene el énfasis inclusivo sin añadir demasiado.
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: for this reason
  chosen_spanish: por esa razón
  alternatives_spanish:
  - por lo cual
  - por este motivo
  lexicon: BDAG
  rationale: Equivale naturalmente al giro causal-consecutivo del griego y suena claro en español moderno.
- source_word: οὐκ ἐπαισχύνεται
  english_pob_choice: he is not ashamed
  chosen_spanish: no se avergüenza
  alternatives_spanish:
  - no siente vergüenza de
  - no rehúye
  lexicon: BDAG
  rationale: La forma media/pasiva expresa la noción de vergüenza/honor. «No se avergüenza» es la equivalencia más directa y mantiene el matiz honorífico.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - familia
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego. En contexto puede incluir a toda la comunidad creyente; en español «hermanos» es fiel al término fuente y suficientemente amplio en uso eclesial.
- source_word: καλεῖν
  english_pob_choice: to call
  chosen_spanish: llamarlos
  alternatives_spanish:
  - llamarlos así
  - darles el nombre de
  lexicon: BDAG
  rationale: Después de «no se avergüenza de» el infinitivo se expresa con naturalidad como «llamarlos». Conserva el acto nominativo de καλέω sin añadir paráfrasis.
theological_decisions:
- issue: Referente de «de uno»
  english_pob_reading: 'The main text leaves both as in the Greek: ''he'' refers contextually to the sanctifying Son, while ''from one'' remains unspecified.'
  chosen_spanish_reading: El texto deja «de uno» sin precisar su referente, y el sujeto implícito se entiende por el contexto como el Hijo que santifica.
  alternative_spanish_readings:
  - de un Padre
  - de un solo origen
  - de un antepasado
  rationale: La frase griega no aclara el referente de ἑνός. La versión española mantiene esa apertura para no resolver prematuramente la relación teológica que el autor deja deliberadamente amplia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance inclusivo de «hermanos»
  english_pob_reading: '''Brothers'' translates the masculine plural ἀδελφοὺς; in context it may refer to the wider family of believers, including women.'
  chosen_spanish_reading: «Hermanos» conserva el masculino plural del original y puede abarcar a toda la familia de creyentes en el contexto.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - la familia creyente
  rationale: El término fuente es masculino plural y el contexto epistolar apunta a la comunidad de fe. En español, «hermanos» mantiene la forma documental y puede leerse inclusivamente sin alterar el léxico base.
  doctrine_reference: Gendered-language note consistent with lexical fidelity and contextual inclusiveness.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y el auditorio POB en inglés: mantiene la ambigüedad de ἐξ ἑνὸς, conserva el lenguaje verbal de santificación y reproduce el término de parentesco en masculino plural sin normalizarlo a una forma explicativa.'
  spanish_consistency_notes:
  - Se mantiene «santifica/santificados» para conservar la familia léxica de ἁγιάζω.
  - Se evita sustituir «de uno» por un referente teológico explícito que el griego no nombra.
  - «Hermanos» se conserva por fidelidad al masculino plural y por coherencia con el estilo eclesial amplio del español.
  - La puntuación reproduce una sola cláusula continua, acorde con la estructura del original.
