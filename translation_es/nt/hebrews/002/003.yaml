translation:
  language: es
  text: ¿Cómo escaparemos nosotros si descuidamos una salvación tan grande? Esta salvación[a], habiendo sido al principio comunicada por medio del Señor, nos fue confirmada por los que lo oyeron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cual, habiendo sido al principio comunicada por medio del Señor, nos fue confirmada por los que lo oyeron».'
    reason: alternative_reading
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo podremos
  lexicon: BDAG
  rationale: Preserva el valor interrogativo retórico sin volverlo una afirmación. En español, «¿Cómo...?» mantiene la fuerza de advertencia y suena natural.
- source_word: ἐκφευξόμεθα
  english_pob_choice: will we escape
  chosen_spanish: escaparemos nosotros
  alternatives_spanish:
  - podremos escapar
  - escaparemos
  lexicon: BDAG
  rationale: El futuro mantiene la forma verbal del griego y la pregunta retórica. Se añadió «nosotros» para conservar el sujeto explícito del griego ἡμεῖς sin sobrecargar la frase.
- source_word: τηλικαύτης
  english_pob_choice: so great a
  chosen_spanish: tan grande
  alternatives_spanish:
  - de tan gran magnitud
  - tan inmensa
  lexicon: BDAG
  rationale: «Tan grande» reproduce el énfasis idiomático de magnitud sin sonar forzado en español. Evita intensificar más de lo que el texto exige.
- source_word: ἀμελήσαντες
  english_pob_choice: if we neglect
  chosen_spanish: si descuidamos
  alternatives_spanish:
  - si despreciamos
  - si hacemos caso omiso de
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí con sentido condicional de advertencia. «Descuidamos» conserva la idea de negligencia sin endurecerla indebidamente; en español, el matiz de omisión peligrosa queda claro.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: «Salvación» es el equivalente estándar y más fiel en Hebreos para el peso redentor y escatológico del término.
- source_word: ἥτις
  english_pob_choice: This salvation
  chosen_spanish: Esta salvación
  alternatives_spanish:
  - la cual
  - la misma salvación
  lexicon: BDAG
  rationale: La repetición explícita del antecedente en español aclara el referente y conserva el valor explicativo del relativo griego.
- source_word: ἀρχὴν λαβοῦσα
  english_pob_choice: having at first been spoken
  chosen_spanish: habiendo sido al principio anunciada
  alternatives_spanish:
  - habiendo sido hablada al principio
  - después de haber recibido un comienzo
  lexicon: BDAG
  rationale: La expresión literal «habiendo tomado un comienzo» se vierte de manera natural como «habiendo sido al principio anunciada». «Anunciada» comunica el inicio público del mensaje y evita un calco duro de «hablada».
- source_word: λαλεῖσθαι
  english_pob_choice: to be spoken
  chosen_spanish: anunciada
  alternatives_spanish:
  - hablada
  - proclamada
  lexicon: BDAG
  rationale: Aunque el griego usa un infinitivo pasivo de «hablar», en este contexto la idea es la comunicación inicial del mensaje. «Anunciada» expresa bien el acto de transmisión sin perder la pasividad.
- source_word: διὰ τοῦ κυρίου
  english_pob_choice: through the Lord
  chosen_spanish: por medio del Señor
  alternatives_spanish:
  - a través del Señor
  - por el Señor
  lexicon: BDAG
  rationale: «Por medio de» conserva el valor mediador de διά con genitivo. Se mantiene «Señor» para κύριος conforme al uso cristológico del pasaje.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En Hebreos 2:3 el referente es Jesús. «Señor» preserva el título cristológico usual y evita introducir una alternativa menos natural para el lector español.
- source_word: ὑπὸ τῶν ἀκουσάντων
  english_pob_choice: by those who heard him
  chosen_spanish: por los que la oyeron
  alternatives_spanish:
  - por los que escucharon
  - por los oyentes
  lexicon: BDAG
  rationale: El participio identifica a quienes oyeron el mensaje directamente. En español, el pronombre objeto «la» retoma «salvación»/«esta salvación» de modo claro y fluido; el griego permite ese enlace por contexto.
- source_word: εἰς ἡμᾶς
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: «Nos fue confirmada» expresa la dirección hacia los receptores con naturalidad en español y conserva la idea de transmisión hacia la comunidad receptora.
- source_word: ἐβεβαιώθη
  english_pob_choice: was confirmed
  chosen_spanish: fue confirmada
  alternatives_spanish:
  - fue ratificada
  - fue establecida
  lexicon: BDAG
  rationale: «Confirmada» corresponde bien al pasivo de βεβαιόω y mantiene la idea de validación testifical sin añadir matices jurídicos excesivos.
theological_decisions:
- issue: Referencia de «el Señor» (τοῦ κυρίου)
  english_pob_reading: A reference to Jesus as the Lord through whom the message of salvation was first spoken.
  chosen_spanish_reading: Referencia a Jesús como el Señor por medio de quien fue anunciada inicialmente la salvación.
  alternative_spanish_readings:
  - Referencia genérica a Dios como Señor
  - Referencia a una autoridad indefinida
  rationale: El contexto inmediato conecta la proclamación inicial con la recepción por testigos oculares, lo que apunta a Jesús y preserva la fuerza cristológica del texto. Traducir simplemente «el Señor» mantiene esa lectura sin sobreexplicarla.
  doctrine_reference: 'Credo niceno; Contested terms: κύριος → Señor'
- issue: Fuerza de la pregunta de advertencia
  english_pob_reading: The verse is rendered as a rhetorical warning question without converting it into an explicit statement of condemnation.
  chosen_spanish_reading: Se conserva como pregunta retórica de advertencia, sin convertirla en una afirmación dogmática o condenatoria.
  alternative_spanish_readings:
  - No escaparemos si descuidamos...
  - Ciertamente no escaparemos si descuidamos...
  rationale: El griego formula una pregunta retórica. Mantenerla como pregunta preserva la tensión exhortativa y evita resolver prematuramente el efecto retórico del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el último estado del audit trail inglés: conserva la pregunta retórica, respeta el giro temporal de ἀρχὴν λαβοῦσα con una formulación española natural, y mantiene el valor mediador de διὰ τοῦ κυρίου. Se evitó un calco de «hablada» donde «anunciada» comunica mejor el acto inicial de proclamación, y se preservó la referencia cristológica de «el Señor».'
  spanish_consistency_notes:
  - Se usa «salvación» para σωτηρία, conforme al uso establecido en Hebreos.
  - Se usa «Señor» para κύριος, según el criterio doctrinal del proyecto.
  - Se mantiene el sujeto explícito «nosotros» para reflejar ἡμεῖς sin perder naturalidad.
  - El pronombre «la» en «la oyeron» retoma el antecedente inmediato («esta salvación») y evita repetición pesada.
  - No se introduce «Cristo» porque el griego aquí usa κύριος y el audit trail inglés mantiene «the Lord».
