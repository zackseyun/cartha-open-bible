review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura general del griego: pregunta retórica, futuro de advertencia, magnitud de la salvación y confirmación posterior por testigos. Sin embargo, en ὑπὸ τῶν ἀκουσάντων el griego/POB inglés apunta a quienes oyeron al Señor, no a quienes oyeron la salvación. El español «los que la oyeron» desplaza el referente y debilita la lógica del pasaje. También «anunciada» para λαλεῖσθαι es aceptable, pero «hablada»/«proclamada» estaría más cerca; no es un error grave.'
  spanish_quality_summary: El español es claro, natural y digno. «¿Cómo escaparemos nosotros...?» suena bien, aunque «nosotros» es algo enfático pero defendible. La frase participial «habiendo sido al principio anunciada» es comprensible, pero algo pesada; puede suavizarse sin perder fidelidad. La corrección principal es aclarar el referente de «oyeron».
  glossary_alignment: 'La terminología clave está mayormente alineada: «salvación», «el Señor», «confirmada». No hay conflicto con los términos doctrinales por defecto. La excepción importante es pronominal: debe reflejar que los testigos oyeron al Señor («lo oyeron»), conforme al análisis del POB inglés.'
  issues:
  - severity: medium
    issue: Referente incorrecto en «por los que la oyeron»
    rationale: El griego ὑπὸ τῶν ἀκουσάντων, en contexto, significa «por los que lo oyeron»/«por quienes oyeron al Señor», como documenta el POB inglés. «La» hace que el objeto sea «salvación», cambiando el sentido.
  - severity: low
    issue: «Anunciada» se aleja ligeramente de λαλεῖσθαι
    rationale: No es una mala traducción, pero el verbo griego es «ser hablada». «Anunciada» interpreta el acto comunicativo. Puede mantenerse o ajustarse a una forma más cercana sin sacrificar naturalidad.
  revised_spanish_text: ¿Cómo escaparemos nosotros si descuidamos una salvación tan grande? Esta salvación[a], habiendo sido al principio comunicada por medio del Señor, nos fue confirmada por los que lo oyeron,
  revised_footnotes:
  - marker: a
    text: 'O: «la cual, habiendo sido al principio comunicada por medio del Señor, nos fue confirmada por los que lo oyeron».'
    reason: alternative_reading
  revision_rationale: Se corrigió el pronombre de objeto en la cláusula final para reflejar el sentido contextual de «quienes oyeron al Señor», en línea con el griego y el POB inglés. También se ajustó «anunciada» a «comunicada» para mantener un registro natural sin alejarse tanto de λαλεῖσθαι.
