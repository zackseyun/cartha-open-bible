translation:
  language: es
  text: 'diciendo[a]: «Anunciaré tu nombre a mis hermanos[b]; en medio de la asamblea[c] te cantaré alabanzas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al decir». El participio griego introduce la cita de forma directa.
    reason: lexical_alternative
  - marker: b
    text: O «a mis hermanos y hermanas». El griego dice «hermanos», pero en el contexto la familia de fe puede incluir a todos los creyentes.
    reason: lexical_alternative
  - marker: c
    text: O «congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - como dice
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce la cita; «diciendo» mantiene la relación directa con la cita y su tono bíblico sin añadir interpretación.
- source_word: Ἀπαγγελῶ
  english_pob_choice: I will proclaim
  chosen_spanish: Anunciaré
  alternatives_spanish:
  - Proclamaré
  - Declararé
  lexicon: BDAG
  rationale: El futuro expresa una declaración pública. En español, «anunciaré» conserva bien la fuerza declarativa y suena natural; «proclamaré» también sería posible, pero tiende a ser más solemne y menos directo.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre y tu reputación
  - tu nombre, es decir, tu identidad
  lexicon: BDAG
  rationale: Se mantiene literalmente «nombre» porque el griego usa ese término; en contexto bíblico puede implicar identidad o carácter, pero no conviene expandirlo en el texto principal.
- source_word: τοῖς ἀδελφοῖς μου
  english_pob_choice: to my brothers
  chosen_spanish: a mis hermanos
  alternatives_spanish:
  - a mis hermanos y hermanas
  - a mis hermanos, es decir, a mi familia
  lexicon: BDAG
  rationale: Se conserva el plural masculino del griego. En español, «hermanos» mantiene la forma del original y puede abarcar al conjunto de creyentes; la posible inclusión de hermanas se deja como nota, no en el texto principal.
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - entre
  lexicon: BDAG
  rationale: «En medio de» reproduce de forma fiel e idiomática el giro griego y conserva el tono elevado de la cita.
- source_word: ἐκκλησίας
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la iglesia
  lexicon: BDAG
  rationale: Aquí ἐκκλησία designa al pueblo reunido, no una institución eclesiástica posterior. «Asamblea» preserva ese sentido y evita cargar la cita con una lectura anacrónica.
- source_word: ὑμνήσω
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - te cantaré alabanzas
  - te alabaré en canto
  - himnaré
  lexicon: BDAG
  rationale: El verbo indica alabanza expresada en canto. «Cantaré alabanzas» comunica esa fuerza musical de manera natural en español; se evita «alabaré» solo, porque perdería el matiz de canto.
- source_word: σε
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - te
  - para ti
  lexicon: BDAG
  rationale: Después de «cantar alabanzas», el complemento «a ti» resulta natural en español y mantiene el objeto directo de la alabanza sin forzar la sintaxis.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοῖς
  english_pob_reading: brothers; in context the family reference may include all fellow believers
  chosen_spanish_reading: a mis hermanos
  alternative_spanish_readings:
  - a mis hermanos y hermanas
  - a mis hermanos/as
  rationale: Se conserva la forma masculina plural porque esa es la forma del griego y evita neutralizar la referencia. La posible inclusión de mujeres se reconoce como implicación contextual, no como sustitución del término base en el texto principal.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sentido de ἐκκλησία en una cita del AT dentro de Hebreos
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: La cita evoca al pueblo reunido para alabanza. «Asamblea» conserva el sentido lexical y evita introducir un sentido institucional que el contexto no exige.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
translation_notes:
  revision_awareness: Se siguió el acuerdo de alta concordancia del registro inglés y no se detectaron revisiones aplicadas en el pasaje fuente. La redacción española se alineó con la decisión ya auditada de mantener «brothers / assembly» en sentido lexical estricto, ajustándolo a español natural.
  spanish_consistency_notes:
  - Se mantiene «asamblea» para ἐκκλησία en esta cita, en coherencia con el uso no institucional del término en el contexto de Hebreos 2:12.
  - Se conserva «hermanos» en el texto principal y se aclara la posible inclusión de hermanas solo en nota.
  - Se usa «cantaré alabanzas» para retener el matiz de alabanza en canto de ὑμνήσω.
  - La puntuación refleja una cita directa introducida por participio, con comillas españolas y dos puntos conforme al uso editorial en español.
