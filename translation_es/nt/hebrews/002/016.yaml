translation:
  language: es
  text: Porque ciertamente no es a los ángeles a quienes ayuda[a], sino a la descendencia de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toma» o «asir»; el verbo griego también puede significar «agarrar» literalmente, pero aquí probablemente lleva el sentido de «ayudar» o «venir en auxilio de».
    reason: lexical_alternative
lexical_decisions:
- source_word: δήπου
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - sin duda
  - seguramente
  lexicon: BDAG
  rationale: δήπου añade un matiz enfático e inferencial. «Ciertamente» conserva bien esa fuerza en español sin sonar tan coloquial como «seguramente» ni tan conclusivo como una simple afirmación directa.
- source_word: ἀγγέλων
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El genitivo plural contrasta con «el linaje de Abraham» y la equivalencia léxica directa en español es «ángeles». «Mensajeros» sería demasiado interpretativo aquí.
- source_word: ἐπιλαμβάνεται
  english_pob_choice: helps
  chosen_spanish: ayuda
  alternatives_spanish:
  - toma de la mano
  - se apodera de
  - toma a cargo de
  lexicon: BDAG
  rationale: En este contexto el verbo puede funcionar de manera idiomática con sentido de ayudar o venir en auxilio. «Ayuda» expresa bien el valor contextual que adoptó la POB inglesa, mientras que la nota preserva la alternativa más literal de «tomar / asir».
- source_word: σπέρματος Ἀβραὰμ
  english_pob_choice: the offspring of Abraham
  chosen_spanish: el linaje de Abraham
  alternatives_spanish:
  - la descendencia de Abraham
  - la simiente de Abraham
  lexicon: BDAG
  rationale: σπέρμα puede significar semilla, descendencia u offspring. «Linaje» conserva el singular colectivo y suena natural en español bíblico contemporáneo. «Descendencia» es viable, pero «linaje» mantiene mejor la idea de un grupo colectivo visto como unidad.
- source_word: οὐ γὰρ ... ἀλλὰ
  english_pob_choice: For surely it is not ... but ...
  chosen_spanish: Porque, ciertamente, no es ... sino ...
  alternatives_spanish:
  - Pues, sin duda, no es ... sino ...
  - Porque no es ... sino ...
  lexicon: BDAG
  rationale: La correlación negativa/contrastiva se reproduce con una estructura enfática en español. «Porque, ciertamente» refleja el valor inferencial de γάρ junto con δήπου, y «no es ... sino ...» preserva el contraste fuerte del griego.
theological_decisions:
- issue: Sentido de ἐπιλαμβάνεται en relación con la obra salvadora del Hijo
  english_pob_reading: The verse states that the Son helps or comes to the aid of Abraham's offspring rather than angels.
  chosen_spanish_reading: El versículo afirma que el Hijo ayuda al linaje de Abraham, no a los ángeles.
  alternative_spanish_readings:
  - El versículo afirma que el Hijo toma de la mano al linaje de Abraham.
  - El versículo afirma que el Hijo se apodera del linaje de Abraham.
  rationale: La lectura idiomática «ayuda» encaja con el argumento inmediato sobre la solidaridad y la acción salvífica del Hijo. Sin embargo, la alternativa más literal «tomar de la mano / tomar / asir» se conserva en la nota porque el verbo admite ese valor y ha tenido importancia en la historia de la traducción y la interpretación.
  doctrine_reference: Conservar la tensión lexical sin resolverla artificialmente; la nota preserva la posibilidad incarnacional asociada al verbo.
translation_notes:
  revision_awareness: El contexto auditado muestra consenso alto y sin revisiones pendientes; se mantiene la decisión inglesa principal de leer ἐπιλαμβάνεται idiomáticamente como «ayuda», pero en español se explicita también la alternativa literal para no perder la tensión lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo exige; aquí no aparece.
  - Se evita «Cristo» porque el versículo habla del Hijo de modo indirecto y el griego no usa Χριστός.
  - «Ángeles» y «linaje de Abraham» mantienen el contraste colectivo del griego.
  - La puntuación busca reflejar el énfasis inferencial de δήπου y la contraposición de ἀλλὰ.
