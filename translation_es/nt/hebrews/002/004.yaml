translation:
  language: es
  text: mientras Dios también dio testimonio por medio de señales y prodigios y diversos milagros[a] y repartos[b] del Espíritu Santo, conforme a su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diversos poderes» o «diversas obras poderosas». El término griego puede denotar manifestaciones de poder y, en este contexto, obras milagrosas.
    reason: lexical_alternative
  - marker: b
    text: O «distribuciones» o «porciones del Espíritu Santo». El texto no añade explícitamente «dones».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπιμαρτυροῦντος
  english_pob_choice: while God also bore witness
  chosen_spanish: mientras Dios también dio testimonio
  alternatives_spanish:
  - Dios también daba testimonio
  - mientras Dios también testificaba
  lexicon: BDAG
  rationale: El participio genitivo expresa acción concomitante respecto del contexto inmediato; en español, «mientras» conserva esa relación sin forzar una estructura más pesada. «Dio testimonio» es idiomático y mantiene el valor evidencial de μαρτυρέω; «también» refleja con naturalidad el prefijo συν-.
- source_word: σημείοις
  english_pob_choice: by signs
  chosen_spanish: por medio de señales
  alternatives_spanish:
  - con señales
  - mediante señales
  lexicon: BDAG
  rationale: 'El dativo es instrumental: no se trata de compañía sino de medio. «Por medio de» explicita el instrumento en español y conserva la función probatoria de σημεῖα.'
- source_word: τέρασιν
  english_pob_choice: and wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y maravillas
  - y portentos
  lexicon: BDAG
  rationale: Forma pareja fija con σημεῖα. «Prodigios» comunica bien el carácter asombroso del término griego y mantiene un registro bíblico claro en español.
- source_word: ποικίλαις δυνάμεσιν
  english_pob_choice: and various miracles
  chosen_spanish: y diversos milagros
  alternatives_spanish:
  - y diversos poderes
  - y diversas obras poderosas
  lexicon: BDAG
  rationale: En contextos de milagro, δύναμις puede referirse a manifestaciones de poder divino. El contexto favorece «milagros» frente a «poderes», y «diversos» refleja ποικίλαις. Se conserva así la lectura contextual sin añadir más de lo que el texto dice.
- source_word: πνεύματος ἁγίου
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu de santidad
  - del Espíritu Santo mismo
  lexicon: BDAG
  rationale: La expresión designa al Espíritu Santo como título personal reconocido; «Espíritu Santo» es la forma española estable y fiel al griego, sin introducir explicaciones doctrinales ajenas al pasaje.
- source_word: μερισμοῖς
  english_pob_choice: distributions
  chosen_spanish: distribuciones
  alternatives_spanish:
  - repartos
  - apportionments
  lexicon: BDAG
  rationale: El sustantivo denota repartos o distribuciones. Se evita añadir «dones» porque el texto griego no lo dice explícitamente. «Distribuciones» preserva la ambigüedad útil del original y sigue la decisión del POB inglés.
- source_word: κατὰ τὴν αὐτοῦ θέλησιν
  english_pob_choice: according to his will
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - según su voluntad
  - de acuerdo con su voluntad
  lexicon: BDAG
  rationale: «Conforme a» traduce con naturalidad κατά + acusativo de conformidad. «Su» se entiende primariamente de Dios en el contexto inmediato, sin cerrar innecesariamente la tensión referencial que el griego permite.
theological_decisions:
- issue: Referente de «su» en «su voluntad»
  english_pob_reading: The pronoun refers to God the subject of the participle.
  chosen_spanish_reading: El pronombre se entiende primariamente de Dios, sujeto del participio.
  alternative_spanish_readings:
  - Podría entenderse de manera más remota del Espíritu Santo, aunque es menos probable sintácticamente.
  rationale: El sujeto regente es Dios, quien da testimonio mediante esas obras; por eso la voluntad se atribuye de forma natural a Dios. La redacción española conserva esa lectura principal sin eliminar por completo la posibilidad secundaria que el contexto deja abierta.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Traducción de πνεύματος ἁγίου
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - Espíritu de santidad
  rationale: La forma tradicional y exacta en español es «Espíritu Santo». Mantiene el referente personal divino sin sobreexplicar la frase ni debilitar la conexión con la obra de Dios en el versículo.
  doctrine_reference: Affirmations (Nicene Creed 381 AD)
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB inglés, que prefirió «by» sobre «with» para expresar mejor el valor instrumental del griego. Por eso se emplea «por medio de» en español. También se conserva la decisión de no añadir «dones» a μερισμοῖς, manteniendo la ambigüedad lexical del original y la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Espíritu Santo» para πνεύματος ἁγίου, en línea con la terminología base del proyecto.
  - Se evita «SEÑOR» porque el texto griego aquí usa θεός, no κύριος.
  - «Milagros» se reserva para δύναμις en este contexto, siguiendo el sentido contextual de actos poderosos sobrenaturales.
  - Las notas usan marcadores únicos y aparecen ancladas solo en los términos donde surge una alternativa lexical real.
