translation:
  language: es
  text: Pero vemos a Jesús, que fue hecho menor que los ángeles por un breve tiempo, coronado de gloria y honor a causa del sufrimiento de la muerte, para que por la gracia de Dios[a] probara la muerte por todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «aparte de Dios» en lugar de «por la gracia de Dios».
    reason: textual_variant
lexical_decisions:
- source_word: βραχύ τι
  english_pob_choice: for a little while
  chosen_spanish: por un breve tiempo
  alternatives_spanish:
  - por un poco de tiempo
  - por un tiempo breve
  lexicon: BDAG
  rationale: En este contexto la expresión es temporal, no de grado. «Por un breve tiempo» conserva la idea de duración limitada y suena natural en español.
- source_word: παρ’ ἀγγέλους
  english_pob_choice: than the angels
  chosen_spanish: que los ángeles
  alternatives_spanish:
  - en comparación con los ángeles
  - más bajo que los ángeles
  lexicon: BDAG
  rationale: La preposición con acusativo tiene fuerza comparativa. En español, «menor que los ángeles» expresa con claridad la comparación sin perder naturalidad.
- source_word: ἠλαττωμένον
  english_pob_choice: was made lower
  chosen_spanish: fue hecho un poco menor
  alternatives_spanish:
  - había sido hecho menor
  - fue humillado debajo
  lexicon: BDAG
  rationale: La forma pasiva perfecta se vierte de modo idiomático con un pasivo finito. «Menor» mantiene la comparación y evita cargar el verbo con una interpretación puramente emocional.
- source_word: διὰ τὸ πάθημα τοῦ θανάτου
  english_pob_choice: because of the suffering of death
  chosen_spanish: a causa del sufrimiento de la muerte
  alternatives_spanish:
  - por el sufrimiento de la muerte
  - mediante el sufrimiento de la muerte
  lexicon: BDAG
  rationale: «διά» con acusativo expresa aquí causa o motivo. «Sufrimiento de la muerte» conserva la construcción del genitivo sin reescribir el sentido.
- source_word: δόξῃ καὶ τιμῇ ἐστεφανωμένον
  english_pob_choice: crowned with glory and honor
  chosen_spanish: coronado de gloria y honor
  alternatives_spanish:
  - coronado con gloria y honor
  - ceñido de gloria y honor
  lexicon: BDAG
  rationale: «Coronado» comunica bien στεφανόω en español. La construcción «de gloria y honor» es natural y conserva el paralelismo del original.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma más directa y clara en español.
- source_word: χωρὶς θεοῦ
  english_pob_choice: by the grace of God
  chosen_spanish: apartado de Dios[b]
  alternatives_spanish:
  - sin Dios
  - aparte de Dios
  lexicon: NA28 textual tradition / BDAG
  rationale: El texto griego suministrado lee χωρὶς θεοῦ, no χάριτι θεοῦ. Para respetar la evidencia fuente, la redacción principal debe reflejar el sentido de «aparte de / sin Dios». Dado que existe la variante conocida «por la gracia de Dios», se preserva en una nota textual. Se evita adoptar silenciosamente la lectura variante como texto principal.
- source_word: ὑπὲρ παντὸς
  english_pob_choice: for everyone
  chosen_spanish: por todos
  alternatives_spanish:
  - para todos
  - en favor de todos
  lexicon: BDAG
  rationale: En este contexto el sentido es distributivo y personal. «Por todos» es breve, idiomático y mantiene la referencia universal.
- source_word: γεύσηται θανάτου
  english_pob_choice: might taste death
  chosen_spanish: gustase la muerte
  alternatives_spanish:
  - pruebe la muerte
  - experimente la muerte
  lexicon: BDAG
  rationale: La imagen idiomática de γεύομαι se conserva con «gustar la muerte». Se usa subjuntivo de finalidad para reflejar ὅπως.
theological_decisions:
- issue: 'Variant reading in the purpose clause: χωρὶς θεοῦ vs. χάριτι θεοῦ'
  english_pob_reading: by the grace of God
  chosen_spanish_reading: apartado de Dios[b]
  alternative_spanish_readings:
  - por la gracia de Dios
  - aparte de Dios
  rationale: El aparato fuente proporcionado lee χωρὶς θεοῦ. La tradición textual también conoce χάριτι θεοῦ, que cambia de forma importante el matiz teológico. Para no borrar esa tensión, la lectura principal sigue el texto fuente y la alternativa se preserva explícitamente en nota.
  doctrine_reference: Preserve textual and theological tension rather than resolving it silently; significant variants should remain auditable.
translation_notes:
  revision_awareness: Se siguió el texto griego suministrado (SBLGNT) como base primaria y se preservó la variante conocida en la cláusula final mediante nota textual. La redacción española busca ser publicable y transparente, sin sustituir silenciosamente la lectura atestiguada.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio.
  - Se usa «ángeles» en minúscula por referencia común, no como nombre propio.
  - «Gloria y honor» sigue la fórmula nominal del griego.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - La nota textual distingue claramente la lectura del texto fuente y la variante conocida.
