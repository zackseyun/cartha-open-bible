revisions:
- from: Pero vemos a Jesús[a], que fue hecho un poco menor que los ángeles por un breve tiempo, coronado de gloria y honor a causa del sufrimiento de la muerte, para que, [b]gustase la muerte por todos.
  to: Pero vemos a Jesús, que fue hecho menor que los ángeles por un breve tiempo, coronado de gloria y honor a causa del sufrimiento de la muerte, para que por la gracia de Dios[a] probara la muerte por todos.
  rationale: 'Se corrige el versículo para alinearlo con la decisión textual documentada en el POB inglés: el texto principal lleva «por la gracia de Dios» y la variante «aparte de Dios» queda en nota. Se elimina la nota duplicada y mal anclada, y se reemplaza «gustase» por «probara» para mejorar la legibilidad sin perder la metáfora de γεύσηται θανάτου. También se ajusta la primera cláusula para expresar con más naturalidad que la disminución fue temporal, no de grado.'
  reviewer_model: gpt-5.4
