translation:
  language: es
  text: Por esta razón, debemos prestar mucha más atención a lo que hemos oído, no sea que nos alejemos a la deriva.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sea que pasemos de largo» o «no sea que dejemos que estas cosas se nos escapen». El verbo griego παραρυῶμεν evoca la imagen de derivar o pasar de largo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación inferencial-causal del griego sin debilitar el vínculo lógico con lo anterior.
- source_word: δεῖ
  english_pob_choice: we must
  chosen_spanish: debemos
  alternatives_spanish:
  - es necesario que
  - tenemos que
  lexicon: BDAG
  rationale: Conserva la fuerza de necesidad y funciona de modo idiomático en exhortación directa en español.
- source_word: περισσοτέρως
  english_pob_choice: much closer
  chosen_spanish: mucha más
  alternatives_spanish:
  - con mucho mayor
  - más intensamente
  lexicon: BDAG
  rationale: En español, con 'prestar atención' la intensificación natural se expresa como 'mucha más', preservando el comparativo enfático del original.
- source_word: προσέχειν ἡμᾶς
  english_pob_choice: we must pay ... attention
  chosen_spanish: prestar atención
  alternatives_spanish:
  - poner atención
  - dar atención
  lexicon: BDAG
  rationale: '''Prestar atención'' reproduce bien el sentido de dirigir la mente hacia algo y es claro en español contemporáneo.'
- source_word: τοῖς ἀκουσθεῖσιν
  english_pob_choice: to what we have heard
  chosen_spanish: a lo que hemos oído
  alternatives_spanish:
  - a las cosas que hemos oído
  - al mensaje que hemos oído
  lexicon: BDAG
  rationale: Mantiene el valor plural/sustantivado de lo oído sin forzar una abstracción extra; 'oído' preserva la pasiva perfecta en forma natural.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: BDAG
  rationale: En español, 'para que no' introduce con naturalidad la advertencia negativa y conserva el matiz preventivo del griego.
- source_word: παραρυῶμεν
  english_pob_choice: we drift away
  chosen_spanish: nos deslicemos
  alternatives_spanish:
  - nos desviemos
  - nos alejemos
  lexicon: BDAG
  rationale: El verbo griego evoca el peligro de deslizarse, fluir past the point, o dejarse llevar; 'deslicemos' preserva la imagen de pérdida gradual sin resolverla en una sola interpretación.
theological_decisions:
- issue: Naturaleza de la advertencia en παραρυῶμεν
  english_pob_reading: Render as a warning that 'we drift away' from the heard message rather than that the message 'slips from us.'
  chosen_spanish_reading: Traducir como una advertencia de que nosotros nos deslizamos, manteniendo el sujeto implícito de la acción peligrosa.
  alternative_spanish_readings:
  - para que no se nos deslicen
  - para que no dejemos que se nos escapen
  rationale: 'La construcción española mantiene la tensión pastoral del texto: el peligro recae sobre los oyentes y su posible alejamiento progresivo, sin cerrar la ambigüedad del verbo griego ni fijar una lectura doctrinal excesiva.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera artificial
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y el audit trail en inglés, manteniendo la relación causal de Διὰ τοῦτο, la necesidad de δεῖ, la intensificación de περισσοτέρως y la metáfora advertidora de παραρυῶμεν sin suavizarla en exceso. No se incorporan lecturas ajenas al expediente.
  spanish_consistency_notes:
  - Se usa 'Dios/Yahvé' no aplica en este versículo.
  - Se mantiene un registro moderno y eclesialmente sobrio, evitando calcos como 'darle oído' o 'tener cuidado a'.
  - La nota conserva la alternativa semántica principal del verbo griego, siguiendo el patrón auditado de la POB inglesa.
