translation:
  language: es
  text: Porque si el mensaje hablado[a] por medio de ángeles llegó a ser firme, y toda transgresión y desobediencia recibió una justa retribución[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente el mensaje de la ley entendido en la tradición judía como mediado por ángeles; compárese Hechos 7:53 y Gálatas 3:19.
    reason: cross_reference
  - marker: b
    text: O “una justa retribución”, o “una retribución merecida”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δι’ ἀγγέλων λαληθεὶς λόγος
  english_pob_choice: the message spoken through angels
  chosen_spanish: la palabra dicha por medio de ángeles
  alternatives_spanish:
  - el mensaje hablado por medio de ángeles
  - la palabra hablada por ángeles
  lexicon: BDAG
  rationale: λόγος aquí apunta a una comunicación pronunciada, no a “palabra” en sentido aislado. En español, “palabra” conserva la referencia verbal y también deja abierta la alusión al contenido revelado. “Por medio de” refleja διά con genitivo como mediación/instrumento sin convertir a los ángeles en autores últimos.
- source_word: ἀγγέλων
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En Hebreos 2 el contexto favorece seres celestiales, en línea con la tradición judía de la mediación angélica de la ley. “Ángeles” es el equivalente natural y más claro en español.
- source_word: ἐγένετο βέβαιος
  english_pob_choice: proved firm
  chosen_spanish: llegó a ser firme
  alternatives_spanish:
  - se confirmó
  - quedó firme
  - resultó firme
  lexicon: BDAG
  rationale: La expresión comunica que el mensaje quedó establecido como válido y vinculante. “Llegó a ser firme” preserva el valor resultativo de γίνομαι sin reducirlo a mera confirmación intelectual.
- source_word: πᾶσα παράβασις
  english_pob_choice: every transgression
  chosen_spanish: toda transgresión
  alternatives_spanish:
  - toda violación
  - todo quebrantamiento
  lexicon: BDAG
  rationale: παράβασις tiene el sentido de cruzar un límite o infringir un mandato. “Transgresión” mantiene el peso jurídico-moral del término.
- source_word: παρακοὴ
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - falta de atención
  - negativa a escuchar
  lexicon: BDAG
  rationale: παρακοή literalmente implica oír mal o no atender debidamente, de donde “desobediencia”. En español, el término conserva tanto la dimensión auditiva como la moral.
- source_word: ἔλαβεν
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - incurrió en
  - obtuvo
  lexicon: BDAG
  rationale: “Recibió” reproduce con sencillez el verbo de recibir/obtener en el lenguaje de retribución judicial, sin cargar el texto con una interpretación adicional.
- source_word: ἔνδικον μισθαποδοσίαν
  english_pob_choice: a just penalty
  chosen_spanish: una justa retribución
  alternatives_spanish:
  - un justo castigo
  - una justa paga
  - una retribución merecida
  lexicon: BDAG
  rationale: μισθαποδοσία denota retribución o pago de vuelta, y ἔνδικος añade la idea de lo justo/debido. “Justa retribución” conserva mejor la imagen de retribución que “penalidad”, y deja visible la posibilidad de “repayment” o “recompensa” que el inglés anotó.
theological_decisions:
- issue: Alusión a la ley mediada por ángeles sin introducir 'ley' en el texto principal
  english_pob_reading: An allusion to the law mediated through angels, expressed without making the identification explicit in the translation.
  chosen_spanish_reading: Se conserva la referencia genérica a “la palabra dicha por medio de ángeles”, dejando que la alusión al Sinaí y a la ley mediada por ángeles emerja del contexto.
  alternative_spanish_readings:
  - la ley dicha por medio de ángeles
  - el mensaje dado por ángeles
  rationale: El griego dice literalmente “la palabra hablada por medio de ángeles”; añadir “ley” en el cuerpo del versículo iría más allá del texto. La formulación española mantiene la tensión interpretativa documentada por el POB inglés y permite la lectura contextual sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión exegética y la primacía del texto original frente a la explicitación interpretativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y las decisiones del audit trail inglés, sin introducir 'ley' en el texto principal. Se mantiene la fuerza judicial de ἔνδικον μισθαποδοσίαν con una alternativa anotada, y se preserva la mediación angélica como alusión contextual.
  spanish_consistency_notes:
  - Se usó “ángeles” de forma consistente con el contexto de Hebreos 2 y la lectura tradicional de mediación angélica.
  - “Transgresión” y “desobediencia” preservan el paralelismo semántico del griego.
  - Se evitó “SEÑOR” u otras sustituciones no presentes en el versículo.
  - La puntuación reproduce la estructura condicional y la coordinación final del griego.
