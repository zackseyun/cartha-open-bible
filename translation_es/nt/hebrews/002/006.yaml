base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/006.yaml
  text: But someone has testified somewhere[a], saying, “What is man, that you remember him, or the son of man[c][b], that you care for him?”
  footnotes:
  - marker: a
    text: Or, more traditionally, “mindful of him.”
    reason: lexical_alternative
  - marker: b
    text: “The son of man” here echoes Psalm 8:4, where it functions as a poetic expression for humanity; in Hebrews, the wider context also contributes to the passage’s significance for Jesus.
    reason: cross_reference
  - marker: c
    text: Or “visit him” or “look after him.” The Greek verb can denote attentive concern expressed in visitation or care.
    reason: lexical_alternative
