review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego: necesidad real (ὤφειλεν), semejanza integral con sus hermanos, propósito de llegar a ser sumo sacerdote misericordioso y fiel, esfera sacerdotal ante Dios, y acción respecto a los pecados del pueblo. Sin embargo, no preserva del todo la decisión auditada del POB para ἱλάσκεσθαι, donde el inglés opta por una formulación más amplia y accesible (''make atonement'') y reserva ''propitiate/expiate'' para nota. El español principal usa ''hacer expiación'', que estrecha el campo semántico más de lo documentado.'
  spanish_quality_summary: El español es claro, natural y digno. 'Por eso', 'tenía que', 'sus hermanos', y 'sumo sacerdote misericordioso y fiel' funcionan bien. 'En lo que se relaciona con Dios' es comprensible, aunque algo menos formal que el inglés auditado; aun así es aceptable. El único ajuste necesario es en la cláusula final y su nota, para reflejar mejor la racionalidad léxica y teológica documentada.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Dios'' y ''sumo sacerdote'' están bien. ''Sus hermanos'' concuerda con la política de género-preciso con nota aclaratoria. El problema principal es teológico-lexical: ἱλάσκεσθαι debería representarse en el texto principal con ''hacer expiación'' o mejor ''hacer expiación/atonement'' según la auditoría; en español, la opción más fiel a la decisión del POB es ''hacer expiación por'', pero deben preservarse explícitamente en nota las alternativas ''propiciar'' y ''expiar'', no alternativas de τὰ πρὸς τὸν θεόν. La nota actual b está anclada al lugar equivocado y omite la tensión documentada.'
  issues:
  - severity: medium
    issue: La nota [b] está aplicada a τὰ πρὸς τὸν θεόν en vez de a εἰς τὸ ἱλάσκεσθαι.
    rationale: La auditoría inglesa preserva en nota las alternativas teológicas de ἱλάσκεσθαι ('propitiate/expiate'). El borrador español desplaza la nota a otra frase y pierde esa información clave.
  - severity: medium
    issue: La nota [b] omite las alternativas teológicas documentadas para ἱλάσκεσθαι.
    rationale: El proyecto pide conservar alternativas significativas cuando el inglés POB las preservó. Aquí deben aparecer opciones como 'hacer propiciación por' o 'expiar'.
  - severity: low
    issue: La expresión 'en lo que se relaciona con Dios' es válida, pero algo menos cercana al matiz formal sacerdotal del original y del inglés auditado.
    rationale: No requiere cambio obligatorio, pero 'en las cosas que tienen que ver con Dios' o 'en las cosas pertenecientes a Dios' podrían sonar más directamente cultuales. Aun así, la redacción actual es aceptable y legible.
  revised_spanish_text: Por eso tenía que hacerse semejante a sus hermanos en todo[a], para que llegara a ser un sumo sacerdote misericordioso y fiel en lo que se relaciona con Dios, para hacer expiación[b] por los pecados del pueblo.
  revised_footnotes:
