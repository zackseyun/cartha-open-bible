base_translation:
  language: en
  yaml_path: translation/nt/hebrews/002/017.yaml
  text: Therefore he had to become like his brothers in every respect[a], so that he might become a merciful and faithful high priest in the things pertaining to God[b], to make atonement for the sins of the people.
  footnotes:
