    text: Or 'his brothers and sisters'; the Greek says 'brothers,' using a masculine plural familial term that can include the wider family of believers in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to propitiate' or 'to expiate' the sins of the people.
    reason: alternative_reading
