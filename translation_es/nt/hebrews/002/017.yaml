revisions:
- from: Por eso tenía que hacerse semejante a sus hermanos en todo[a], para que llegara a ser un sumo sacerdote misericordioso y fiel en lo que se relaciona con Dios[b], para hacer expiación por los pecados del pueblo.
  to: Por eso tenía que hacerse semejante a sus hermanos en todo[a], para que llegara a ser un sumo sacerdote misericordioso y fiel en lo que se relaciona con Dios, para hacer expiación[b] por los pecados del pueblo.
  rationale: Se conserva la redacción española general porque es fiel y natural, pero se corrige la ubicación y el contenido de la nota teológica para alinearla con la decisión auditada sobre ἱλάσκεσθαι. El texto principal puede mantenerse con 'hacer expiación' como formulación accesible; las alternativas más técnicas deben quedar en nota anclada a esa expresión, no a la frase sobre las cosas relativas a Dios.
  reviewer_model: gpt-5.4
