    reason: lexical_alternative
  - marker: b
    text: O 'hacer propiciación por' o 'expiar' los pecados del pueblo.
    reason: alternative_reading
  revision_rationale: Se conserva la redacción española general porque es fiel y natural, pero se corrige la ubicación y el contenido de la nota teológica para alinearla con la decisión auditada sobre ἱλάσκεσθαι. El texto principal puede mantenerse con 'hacer expiación' como formulación accesible; las alternativas más técnicas deben quedar en nota anclada a esa expresión, no a la frase sobre las cosas relativas a Dios.
