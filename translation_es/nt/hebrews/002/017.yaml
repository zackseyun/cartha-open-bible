translation:
  language: es
  text: Por eso tenía que hacerse semejante a sus hermanos en todo[a], para que llegara a ser un sumo sacerdote misericordioso y fiel en lo que se relaciona con Dios, para hacer expiación[b] por los pecados del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hermanos y hermanas'; el griego dice 'hermanos', usando un término familiar masculino plural que, según el contexto, puede incluir a la familia más amplia de creyentes.
    reason: lexical_alternative
  - marker: b
    text: O 'hacer propiciación por' o 'expiar' los pecados del pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica a partir del argumento precedente con un conector natural en español, sin perder el valor conclusivo del original.
- source_word: ὤφειλεν
  english_pob_choice: he had to
  chosen_spanish: tenía que
  alternatives_spanish:
  - debía
  - le era necesario
  lexicon: BDAG
  rationale: Expresa necesidad u obligación real en un español actual y claro, manteniendo la fuerza de necesidad del verbo griego sin volverlo artificial.
- source_word: κατὰ πάντα
  english_pob_choice: in every respect
  chosen_spanish: en todo
  alternatives_spanish:
  - en todos los aspectos
  - en cada aspecto
  lexicon: BDAG
  rationale: Resume de manera natural la amplitud total de la semejanza; en español, 'en todo' comunica bien la cobertura completa del sintagma.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - los hermanos
  lexicon: BDAG
  rationale: Conserva el término masculino plural del griego y el lenguaje familiar del contexto. En una nota puede aclararse el posible alcance inclusivo en la comunidad creyente.
- source_word: ὁμοιωθῆναι
  english_pob_choice: to become like
  chosen_spanish: hacerse semejante
  alternatives_spanish:
  - llegar a ser como
  - ser hecho semejante
  lexicon: BDAG
  rationale: '''Hacerse semejante'' expresa bien el proceso de identificación/incarnación en un español digno y no mecánico, manteniendo la dirección del infinitivo pasivo.'
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - lleno de misericordia
  lexicon: BDAG
  rationale: Misericordioso es la forma más estable y eclesialmente inteligible en español para describir la cualidad sacerdotal de mostrar misericordia.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: '''Fiel'' preserva la cualidad de confiabilidad y constancia exigida del sumo sacerdote ante Dios, en paralelo con ''misericordioso''.'
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  lexicon: BDAG
  rationale: Es la equivalencia cultual estándar y más fiel al título bíblico, evitando terminología eclesiástica ajena al registro del texto.
- source_word: τὰ πρὸς τὸν θεόν
  english_pob_choice: in the things pertaining to God
  chosen_spanish: en lo que se relaciona con Dios
  alternatives_spanish:
  - en las cosas referentes a Dios
  - en asuntos relacionados con Dios
  lexicon: BDAG
  rationale: Mantiene el matiz formal de la expresión sacerdotal sin volverla rígida en español. 'Lo que se relaciona con Dios' preserva la esfera de servicio cultual.
- source_word: εἰς τὸ ἱλάσκεσθαι
  english_pob_choice: to make atonement for
  chosen_spanish: para hacer expiación por
  alternatives_spanish:
  - para hacer propiciación por
  - para expiar
  lexicon: BDAG
  rationale: '''Expiación'' comunica de forma precisa y sobria el tratamiento de los pecados en contexto sacerdotal. Se preserva así la tensión teológica del verbo ἱλάσκεσθαι sin reducirlo a un solo matiz técnico en el texto principal.'
- source_word: τὰς ἁμαρτίας
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las faltas
  - los delitos
  lexicon: BDAG
  rationale: Es la correspondencia natural y exacta para ἁμαρτίας en este contexto de expiación sacerdotal.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de su pueblo
  - del pueblo de Dios
  lexicon: BDAG
  rationale: Respeta el sustantivo definido del griego sin introducir un posesivo que no aparece en el texto base.
theological_decisions:
- issue: Traducir ἱλάσκεσθαι en un pasaje con carga atonamental discutida
  english_pob_reading: to make atonement for
  chosen_spanish_reading: para hacer expiación por
  alternative_spanish_readings:
  - para hacer propiciación por
  - para expiar
  rationale: Se opta por un término comprensible y doctrinalmente sobrio en español. 'Expiación' conserva el foco en el trato con el pecado en el marco sacerdotal. Las alternativas más técnicas se preservan por la tensión semántica del verbo griego y la discusión teológica que lo rodea.
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica y usar lenguaje moderno legible, sin borrar alternativas relevantes.'
- issue: Alcance de τοῖς ἀδελφοῖς
  english_pob_reading: his brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - los hermanos
  rationale: Se mantiene el género masculino plural del griego en el texto principal, conforme a una política de precisión lingüística. El posible alcance inclusivo puede aclararse en nota sin diluir la forma original.
  doctrine_reference: 'DOCTRINE.md: género-preciso antes que neutralización automática.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura final auditada del inglés POB y no requiere cambios respecto del último pase revisado; se conserva la estructura argumentativa, la terminología sacerdotal y la nota sobre el posible alcance inclusivo de 'hermanos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que obligue a su uso.
  - '''Sumo sacerdote'' se conserva como término cultual estable y fiel al título griego.'
  - '''Expiación'' se usa como equivalente principal de ἱλάσκεσθαι, con alternativas teológicas preservadas en la nota.'
  - La puntuación y el orden de cláusulas buscan legibilidad natural en español sin alterar las relaciones de causa, propósito y resultado del original.
