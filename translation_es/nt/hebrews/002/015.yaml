translation:
  language: es
  text: y librar[a] a los que, por temor a la muerte, estaban sometidos a esclavitud durante toda su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban retenidos en esclavitud» o «estaban en esclavitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: Conecta la cláusula con la finalidad/resultados del contexto anterior; «y» es la forma más natural y directa en español.
- source_word: ἀπαλλάξῃ
  english_pob_choice: free
  chosen_spanish: librar
  alternatives_spanish:
  - liberar
  - poner en libertad
  - rescatar
  lexicon: BDAG
  rationale: El verbo expresa quitar a alguien de una condición. «Librar» comunica bien la idea de sacar de una situación de sujeción sin imponer un matiz más técnico que el griego inmediato.
- source_word: τούτους
  english_pob_choice: those
  chosen_spanish: a los que
  alternatives_spanish:
  - a esos
  - a estos
  lexicon: BDAG
  rationale: En español, la combinación con la relativa siguiente pide una formulación natural; «a los que» mantiene el referente demostrativo con fluidez.
- source_word: ὅσοι
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - todos los que
  - cuantos
  lexicon: BDAG
  rationale: La forma griega es inclusiva de una clase caracterizada por la condición siguiente. «Los que» conserva esa referencia de grupo de manera idiomática.
- source_word: φόβῳ θανάτου
  english_pob_choice: through fear of death
  chosen_spanish: por temor a la muerte
  alternatives_spanish:
  - a causa del temor a la muerte
  - mediante el temor a la muerte
  lexicon: BDAG
  rationale: El dativo con genitivo expresa circunstancia causal o instrumental; «por temor a la muerte» es natural en español y conserva esa relación sin sobreexplicar.
- source_word: διὰ παντὸς τοῦ ζῆν
  english_pob_choice: all their lives
  chosen_spanish: durante toda su vida
  alternatives_spanish:
  - a lo largo de toda su vida
  - por toda su vida
  - durante toda la vida
  lexicon: BDAG
  rationale: El giro idiomático señala duración a lo largo de la existencia. «Durante toda su vida» transmite la extensión temporal de forma clara y solemne.
- source_word: ἔνοχοι ἦσαν
  english_pob_choice: were subject to
  chosen_spanish: estuvieron sometidos a
  alternatives_spanish:
  - eran sujetos a
  - estaban bajo
  lexicon: BDAG
  rationale: ἔνοχος aquí indica estar bajo una condición de sujeción real. «Estuvieron sometidos a» preserva la fuerza de dominio/estado sin debilitarlo a mera responsabilidad legal.
- source_word: δουλείας
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  - cautiverio
  - bondad
  lexicon: BDAG
  rationale: El sustantivo denota esclavitud o servidumbre. «Esclavitud» preserva mejor la fuerza léxica que opciones más atenuadas como «servidumbre».
theological_decisions:
- issue: Naturaleza de la condición expresada por δουλείας
  english_pob_reading: The verse speaks of real bondage/slavery associated with the fear of death, without specifying a narrower doctrinal mechanism in the translation.
  chosen_spanish_reading: El versículo habla de una esclavitud real vinculada con el temor a la muerte, sin precisar en la traducción un mecanismo doctrinal más estrecho.
  alternative_spanish_readings:
  - esclavitud al diablo
  - esclavitud al pecado
  - angustia existencial bajo la mortalidad
  rationale: El contexto inmediato menciona el poder de la muerte en el versículo anterior, pero este versículo formula la condición de manera general. La traducción conserva esa amplitud y no resuelve la tensión teológica con una explicación más específica de la que el texto da.
  doctrine_reference: Preservar la tensión teológica del texto sin introducir una explicación no explicitada.
