review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: liberación de personas que, por temor a la muerte, vivían bajo una condición de esclavitud. Sin embargo, «estuvieron sometidos» suena aspectualmente menos natural para un estado continuo de toda la vida; «estaban sometidos» o una formulación equivalente representa mejor ἦσαν con el complemento durativo. Además, la nota alternativa no refleja con precisión la alternativa inglesa «were held in slavery».'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero puede mejorarse en naturalidad y precisión con «estaban sometidos a esclavitud» en lugar de «estuvieron sometidos a esclavitud». También conviene ajustar la nota para evitar una alternativa más débil o menos exacta como «servidumbre» cuando el proyecto prioriza «esclavitud».
  glossary_alignment: 'La elección principal «esclavitud» alinea bien con la guía del proyecto para δουλεία. «Librar» es aceptable para ἀπαλλάξῃ, aunque «liberar» también sería posible; no requiere cambio. No hay conflicto con terminología teológica mayor. Sí conviene corregir la nota alternativa para mantener la fuerza léxica documentada: «retenidos en esclavitud» o «en esclavitud».'
  issues:
  - severity: medium
    issue: Aspecto verbal de «estuvieron sometidos»
    rationale: El griego ἦσαν describe un estado continuo en el pasado, reforzado por «durante toda su vida». En español, «estuvieron sometidos» puede sonar más puntual o delimitado; «estaban sometidos» expresa mejor la condición durativa.
  - severity: medium
    issue: Nota al pie no reproduce bien las alternativas auditadas
    rationale: La nota inglesa ofrece «were held in slavery» o «were in bondage». La propuesta «estuvieron en servidumbre» atenúa o desplaza el matiz de δουλείας, mientras que «retenidos en esclavitud» o «estaban en esclavitud» conserva mejor el campo semántico.
  - severity: low
    issue: Leve redundancia estructural en «a los que ... estuvieron»
    rationale: No es incorrecto, pero con el ajuste a «estaban» la frase fluye mejor y mantiene la referencia de clase sin rigidez.
  revised_spanish_text: y librar[a] a los que, por temor a la muerte, estaban sometidos a esclavitud durante toda su vida.
  revised_footnotes:
  - marker: a
    text: O «estaban retenidos en esclavitud» o «estaban en esclavitud».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo a un imperfecto («estaban sometidos») para reflejar mejor el estado continuo expresado por ἦσαν junto con la duración de «durante toda su vida». También se corrige la nota para alinearla más estrechamente con las alternativas inglesas auditadas y con la preferencia del proyecto por mantener la fuerza de «esclavitud».
