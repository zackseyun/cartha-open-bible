revisions:
- from: y librar[a] a los que, por temor a la muerte, estuvieron sometidos a esclavitud durante toda su vida.
  to: y librar[a] a los que, por temor a la muerte, estaban sometidos a esclavitud durante toda su vida.
  rationale: Se ajusta el verbo a un imperfecto («estaban sometidos») para reflejar mejor el estado continuo expresado por ἦσαν junto con la duración de «durante toda su vida». También se corrige la nota para alinearla más estrechamente con las alternativas inglesas auditadas y con la preferencia del proyecto por mantener la fuerza de «esclavitud».
