translation:
  language: es
  text: Lo hiciste menor que los ángeles por un poco de tiempo[a]; lo coronaste con gloria y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo hiciste un poco menor que los ángeles». La frase griega puede expresar grado más que duración.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἠλάττωσας
  english_pob_choice: you made ... lower
  chosen_spanish: lo hiciste ... menor
  alternatives_spanish:
  - lo hiciste un poco menor
  - lo rebajaste
  lexicon: BDAG
  rationale: El verbo en aoristo causativo expresa la acción de hacer a alguien inferior en rango. En español, «hacer menor» comunica bien la relación comparativa sin introducir un verbo más fuerte como «rebajar», que puede sonar más interpretativo.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al hombre
  lexicon: BDAG
  rationale: El pronombre directo se refiere a la figura humana del salmo citado. El clítico «lo» mantiene la referencia masculina singular y permite un estilo más fluido en español.
- source_word: βραχύ τι
  english_pob_choice: for a little while
  chosen_spanish: un poco
  alternatives_spanish:
  - por un poco de tiempo
  - por un breve tiempo
  - un poco
  lexicon: BDAG
  rationale: La frase griega admite tanto una lectura temporal como de grado. Aquí se opta por una expresión española que conserva la ambigüedad sin fijarla de manera exclusiva a duración o a medida.
- source_word: παρ’ ἀγγέλους
  english_pob_choice: than the angels
  chosen_spanish: que los ángeles
  alternatives_spanish:
  - más bajo que los ángeles
  - que ángeles
  lexicon: BDAG
  rationale: La construcción comparativa con παρά + acusativo se expresa naturalmente con «que» en español. Se evita añadir un artículo donde el griego carece de él de forma explícita, aunque «los ángeles» es idiomático en español.
- source_word: δόξῃ
  english_pob_choice: with glory
  chosen_spanish: con gloria
  alternatives_spanish:
  - en gloria
  lexicon: BDAG
  rationale: El dativo instrumentally asociado a στεφανόω se vierte de manera natural con «con». «Gloria» conserva el término bíblico normal y la fuerza de honor resplandeciente.
- source_word: τιμῇ
  english_pob_choice: and honor
  chosen_spanish: y honor
  alternatives_spanish:
  - y dignidad
  lexicon: BDAG
  rationale: «Honor» reproduce el valor semántico principal de τιμή en este contexto de exaltación. Se conserva la pareja tradicional «gloria y honor» porque refleja bien el paralelo del texto griego.
- source_word: ἐστεφάνωσας
  english_pob_choice: you crowned
  chosen_spanish: lo coronaste
  alternatives_spanish:
  - lo has coronado
  - lo ceñiste de corona
  lexicon: BDAG
  rationale: El aoristo narrativo/citacional se traduce con pasado simple. «Coronar» comunica la imagen de investidura y exaltación propia del verbo στεφανόω.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: La repetición del objeto en la segunda cláusula se conserva en español para reflejar la estructura del griego y mantener la claridad referencial.
theological_decisions:
- issue: Sentido de βραχύ τι en la cita de Salmo 8 aplicada en Hebreos
  english_pob_reading: 'Temporal: ''for a little while'' (with a footnote preserving the degree reading: ''a little lower'')'
  chosen_spanish_reading: 'Lectura abierta en español: ''un poco'' en el texto, con nota que preserva la alternativa de grado o duración'
  alternative_spanish_readings:
  - por un poco de tiempo
  - un poco más bajo
  - un poco inferior
  rationale: El griego permite una tensión real entre duración y grado. En Hebreos, la lectura temporal resulta muy plausible, pero la del grado también es legítima en el salmo citado. Por eso el texto español usa una formulación neutra que no borra la ambigüedad, y la nota explicativa la explicita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la comparación con los ángeles, el paralelo ''gloria y honor'', y conserva la ambigüedad de βραχύ τι mediante una redacción española no resolutiva. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «ángeles» en minúscula, conforme al uso común en español para seres celestiales.
  - Se eligió «gloria y honor» como pareja estable y bíblicamente transparente.
  - La nota al pie conserva la alternativa de grado sin forzar una sola interpretación.
  - El registro es sobrio y publicable, con sintaxis natural en español latinoamericano.
