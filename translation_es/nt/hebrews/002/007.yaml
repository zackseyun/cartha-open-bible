- from: Lo hiciste un poco menor que los ángeles[a]; lo coronaste con gloria y honor.
  to: Lo hiciste menor que los ángeles por un poco de tiempo[a]; lo coronaste con gloria y honor.
  rationale: Se ajusta βραχύ τι a la lectura temporal principal documentada por el POB inglés («por un poco de tiempo») y se traslada la lectura alternativa de grado («un poco menor») a la nota, preservando así tanto la fidelidad al expediente como la tensión interpretativa del griego. El resto del versículo puede mantenerse sin cambios.
