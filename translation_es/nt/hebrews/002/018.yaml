- from: Porque él mismo sufrió cuando fue tentado[a], puede ayudar a los que están siendo tentados.
  to: Porque él mismo sufrió cuando fue tentado[a], puede ayudar a los que son tentados.
  rationale: Se conserva la estructura y la decisión léxica principal del borrador, pero se mejora la naturalidad del español reemplazando «están siendo tentados» por «son tentados». Aunque se pierde algo de explicitud aspectual, el presente español sigue comunicando una realidad vigente y evita un calco poco idiomático. No es necesario añadir una segunda partícula conectiva al inicio, porque «Porque» basta en español para expresar la relación explicativa sin rigidez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico de Hebreos 2:18: la experiencia sufrida por Jesús al ser tentado/probado fundamenta su capacidad para ayudar a quienes atraviesan esa misma realidad. Conserva bien πέπονθεν = «sufrió», αὐτὸς = «él mismo», y la alternancia léxica de πειράζω mediante nota. Sin embargo, omite el matiz conectivo-explicativo doble de ἐν ᾧ γὰρ reflejado en el inglés auditado como «For because». En español no hace falta reproducirlo de forma pesada, pero «Porque» solo puede sonar algo reducido frente al flujo argumentativo; «Pues, porque» sería demasiado rígido. También conviene afinar la naturalidad de «están siendo tentados», que es fiel pero algo calcado.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. La frase principal funciona bien. La mejora más importante es estilística y de fidelidad discursiva: hacer más explícita la relación explicativa con la frase anterior sin volverla torpe, y sustituir el progresivo pasivo «están siendo tentados» por una formulación más natural en español que todavía conserve el aspecto en curso. «Los que son tentados» es demasiado gnómico; «los que están siendo tentados» suena traducido. «Los que están siendo puestos a prueba» tampoco encaja si el texto principal mantiene «tentados».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «tentado» concuerda con la decisión inglesa auditada, y la nota con «probado» preserva la alternativa léxica pertinente. No aparecen términos sensibles del glosario general como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: El conector inicial «Porque» no refleja del todo la fuerza explicativa/discursiva de ἐν ᾧ γὰρ.
    rationale: El griego combina una locución causal con γὰρ. Aunque en español no debe forzarse un doble conector literal, una formulación como «Pues, puesto que» sería artificiosa; mejor reestructurar la frase para preservar la explicación con naturalidad.
  - severity: medium
    issue: «A los que están siendo tentados» es fiel pero poco natural en español.
    rationale: El participio presente pide algún valor de proceso o situación actual, pero el progresivo pasivo con «estar siendo» suena calcado. Una solución más idiomática es «a los que son tentados», aceptando una leve pérdida del progresivo explícito, o reestructurar con «a los que enfrentan la tentación», aunque esto último se aleja del verbo fuente.
  revised_spanish_text: Porque él mismo sufrió cuando fue tentado[a], puede ayudar a los que son tentados.
  revised_footnotes:
  - marker: a
    text: 'O «probado» en ambos lugares: «porque él mismo sufrió cuando fue probado, puede ayudar a los que son probados». El verbo griego puede significar «tentar» o «probar», según el contexto.'
    reason: lexical_alternative
