translation:
  language: es
  text: Porque él mismo sufrió cuando fue tentado[a], puede ayudar a los que son tentados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «probado» en ambos lugares: «porque él mismo sufrió cuando fue probado, puede ayudar a los que son probados». El verbo griego puede significar «tentar» o «probar», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ γὰρ
  english_pob_choice: For because / because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en ello
  lexicon: BDAG
  rationale: La combinación introduce la base explicativa de la afirmación anterior. En español, «Porque» comunica con naturalidad la relación causal y la función conectiva sin sobrecargar la frase.
- source_word: πέπονθεν
  english_pob_choice: suffered
  chosen_spanish: sufrió
  alternatives_spanish:
  - ha sufrido
  lexicon: BDAG
  rationale: El perfecto griego expresa una experiencia sufrida con relevancia vigente. «Sufrió» es más natural en español y conserva el hecho consumado; el valor actual queda implícito en la argumentación.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático. «Él mismo» mantiene el énfasis sobre la participación personal del Hijo en la experiencia descrita.
- source_word: πειρασθείς
  english_pob_choice: when he was tempted
  chosen_spanish: cuando fue tentado
  alternatives_spanish:
  - cuando fue probado
  - habiendo sido tentado
  lexicon: BDAG
  rationale: πειράζω puede significar «tentar» o «probar». Aquí se conserva «tentado» como la lectura principal, mientras que «probado» permanece como alternativa válida por la amplitud semántica del verbo.
- source_word: δύναται
  english_pob_choice: he is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: «Puede» expresa la capacidad con claridad y naturalidad en español. Aunque «es capaz de» también sería correcto, suena más pesado en este contexto.
- source_word: τοῖς πειραζομένοις
  english_pob_choice: those who are being tempted
  chosen_spanish: a los que están siendo tentados
  alternatives_spanish:
  - a los que están siendo probados
  - a los tentados
  lexicon: BDAG
  rationale: El participio presente indica acción en curso. «Están siendo tentados» preserva ese aspecto progresivo y mantiene la misma tensión léxica de πειράζω entre «tentar» y «probar».
- source_word: βοηθῆσαι
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - socorrer
  - acudir en ayuda de
  lexicon: BDAG
  rationale: βοηθέω significa ayudar o acudir en auxilio. «Ayudar» es suficiente, claro y fiel; «socorrer» intensifica el matiz de auxilio, pero no es necesario aquí.
theological_decisions:
- issue: Alcance de πειράζω aplicado a Jesús y a los creyentes
  english_pob_reading: tempted, with textual footnote preserving tested
  chosen_spanish_reading: tentado, con nota que preserva «probado»
  alternative_spanish_readings:
  - probado
  - tentado/probado
  rationale: Se mantiene «tentado» en el texto principal porque coincide con la línea inglesa auditada y con el paralelismo habitual en Hebreos. La nota conserva «probado» para no resolver artificialmente la tensión semántica del verbo griego.
  doctrine_reference: Preservar la tensión lexical sin diluir la solidaridad de Cristo con el sufrimiento humano ni insinuar pecado en él.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se conserva la causalidad, el énfasis de «él mismo», el aspecto progresivo de «están siendo tentados» y la alternativa léxica «probado» en nota, sin cambios de sentido.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no contiene esas formas.
  - Se mantuvo el paralelismo verbal entre la prueba sufrida por Jesús y la situación actual de los creyentes.
  - La preposición «a» en «a los que» sigue la selección verbal española con ayudar.
  - Se prefirió una sintaxis directa y publicable sin introducir glosas interpretativas.
