revisions:
- from: Consideren ahora cuán grande era este hombre[a], a quien Abraham, el patriarca, dio un décimo[b] de los despojos.
  to: Consideren ahora cuán grande era este hombre, a quien Abraham el patriarca dio la décima parte[a] de los despojos[b].
  rationale: La revisión conserva el sentido del original y del POB inglés, pero mejora la naturalidad del español y alinea las notas con las decisiones léxicas realmente documentadas. Se elimina una nota no necesaria, se sustituye «un décimo» por «la décima parte», y se añade la nota sobre «despojos» que el expediente inglés sí preserva.
