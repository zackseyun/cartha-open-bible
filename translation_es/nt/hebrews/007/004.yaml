translation:
  language: es
  text: Consideren ahora cuán grande era este hombre, a quien Abraham el patriarca dio la décima parte[a] de los despojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un diezmo». El griego dice literalmente «la décima parte» o «un décimo».'
    reason: lexical_alternative
  - marker: b
    text: El término griego puede referirse a despojos de guerra, posiblemente a la porción más selecta del botín.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θεωρεῖτε
  english_pob_choice: consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Vean
  - Observen
  - Consideren
  lexicon: BDAG
  rationale: El imperativo plural llama a una reflexión atenta. «Consideren» conserva el tono exhortativo y es natural en español moderno, sin perder la fuerza de atención del verbo griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: ahora
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como transición suave del discurso. «Ahora» comunica bien ese paso sin imponer contraste fuerte.
- source_word: πηλίκος
  english_pob_choice: how great
  chosen_spanish: cuán grande
  alternatives_spanish:
  - qué grande
  - cuán grande
  - qué importante
  lexicon: BDAG
  rationale: El término expresa magnitud o grandeza. «Cuán grande» suena natural en español y refleja adecuadamente la pregunta/exclamación retórica del texto.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - esta persona
  - este hombre
  lexicon: BDAG
  rationale: El referente es Melquisedec en el contexto inmediato. «Este hombre» hace explícita la referencia masculina como en el inglés POB, sin añadir más identificación de la que el versículo da.
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a quien
  - al que
  lexicon: BDAG
  rationale: La relativa en dativo introduce el destinatario de la acción de dar. «A quien» es la equivalencia directa y fluida en español.
- source_word: δεκάτην
  english_pob_choice: a tenth
  chosen_spanish: un décimo
  alternatives_spanish:
  - una décima parte
  - un décimo
  - un diezmo
  lexicon: BDAG
  rationale: El griego dice literalmente «un décimo». «Un décimo» conserva esa precisión. Se evita «diezmo» en el texto principal porque puede sugerir una categoría eclesial posterior que no es necesaria aquí.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abraham
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - dio
  - ofreció
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se expresa de forma simple y directa con «dio».
- source_word: ἐκ τῶν ἀκροθινίων
  english_pob_choice: of the spoils
  chosen_spanish: de los despojos
  alternatives_spanish:
  - de los despojos
  - del botín
  - de la presa
  lexicon: BDAG
  rationale: ἀκροθίνια puede referirse al botín o a la porción selecta del saqueo. «De los despojos» mantiene una traducción amplia y respeta la posible referencia a los bienes obtenidos en guerra sin cerrar indebidamente la matización semántica.
- source_word: ὁ πατριάρχης
  english_pob_choice: the patriarch
  chosen_spanish: el patriarca
  alternatives_spanish:
  - el patriarca
  - el antepasado
  lexicon: BDAG
  rationale: «El patriarca» es el equivalente directo y establecido para Abraham como cabeza ancestral del pueblo.
theological_decisions:
- issue: Magnitud de Melquisedec y función del versículo
  english_pob_reading: The verse emphasizes Melchizedek's greatness by noting that even Abraham, identified as the patriarch, gave him a tenth.
  chosen_spanish_reading: El versículo destaca la grandeza de Melquisedec al señalar que incluso Abraham, llamado el patriarca, le dio un décimo.
  alternative_spanish_readings:
  - El versículo puede leerse con un énfasis más fuerte en la superioridad implícita de Melquisedec por recibir un décimo de Abraham.
  rationale: 'La redacción española deja que el argumento de Hebreos avance sin sobreexplicar la conclusión teológica. Conserva la tensión retórica: la grandeza se infiere por el acto de Abraham, pero el versículo mismo no la desarrolla plenamente.'
  doctrine_reference: Preservar la tensión teológica del argumento de Hebreos sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue el consenso alto entre el texto griego y el auditorio inglés, pero ajusta el orden y la naturalidad al español. Se mantiene «un décimo» en el texto principal para respetar la literalidad señalada en la auditoría inglesa, mientras que la nota ofrece «diezmo» como alternativa posible. También se conserva la referencia a «los despojos» por su amplitud semántica, evitando precisar más de lo que el griego garantiza.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «patriarca» para Abraham de manera consistente con el audit trail inglés.
  - «Un décimo» mantiene la transparencia con el griego y evita introducir terminología eclesial posterior en el texto principal.
  - «Despojos» refleja el campo semántico del término griego sin forzar una especificación sobre la clase exacta de botín.
