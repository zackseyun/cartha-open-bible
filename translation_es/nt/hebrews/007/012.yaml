translation:
  language: es
  text: Porque, al cambiarse el sacerdocio, necesariamente también hay un cambio de ley[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hay también un cambio de la ley», con referencia explícita a la Ley mosaica que estableció el sacerdocio levítico.'
    reason: alternative_reading
lexical_decisions:
- source_word: μετατιθεμένης
  english_pob_choice: is changed
  chosen_spanish: al cambiarse
  alternatives_spanish:
  - al trasladarse
  - al modificarse
  - al cambiar
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa un cambio de estado que funciona como base de la conclusión. «Al cambiarse» mantiene la relación causal-temporal y suena natural en español, sin introducir la imagen espacial de «trasladarse».
- source_word: ἱερωσύνης
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - oficio sacerdotal
  - función sacerdotal
  lexicon: BDAG
  rationale: El sustantivo nombra la institución u orden sacerdotal, no solo a un sacerdote individual. «Sacerdocio» es el equivalente normal y preciso en español para el argumento de Hebreos sobre el orden levítico y el de Melquisedec.
- source_word: ἐξ ἀνάγκης
  english_pob_choice: of necessity
  chosen_spanish: necesariamente
  alternatives_spanish:
  - por necesidad
  - de necesidad
  - forzosamente
  lexicon: BDAG
  rationale: La expresión marca necesidad lógica. «Necesariamente» transmite con claridad el carácter inevitable de la consecuencia en un español fluido y formal.
- source_word: νόμου
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la ley
  - norma
  lexicon: BDAG
  rationale: En contexto se trata del marco legal que regula el sacerdocio, especialmente la Ley mosaica. «Ley» funciona de manera natural en español y conserva el sentido general sin forzar una especificación que el griego anartro no exige en el cuerpo principal.
- source_word: μετάθεσις
  english_pob_choice: a change
  chosen_spanish: un cambio
  alternatives_spanish:
  - una transferencia
  - una remoción
  lexicon: BDAG
  rationale: El sustantivo corresponde al verbo precedente y expresa la alteración resultante. «Un cambio» mantiene la simetría conceptual con el participio y evita cargar el texto con matices de «transferencia» o «remoción» que podrían ser demasiado específicos.
- source_word: γίνεται
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - se produce
  - ocurre
  - tiene lugar
  lexicon: BDAG
  rationale: 'En una construcción existencial, «hay» es la forma más natural y sobria en español. Conserva el valor de resultado: el cambio de ley existe como consecuencia necesaria del cambio de sacerdocio.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conecta la frase como explicación de lo anterior. «Porque» mantiene la relación argumentativa de manera clara y directa en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - asimismo
  lexicon: BDAG
  rationale: La partícula suma la consecuencia legal al cambio de sacerdocio. «También» reproduce la fuerza aditiva con naturalidad.
theological_decisions:
- issue: Alcance de νόμου en relación con el sacerdocio
  english_pob_reading: '''law'' in the main text, with a footnote allowing an explicit reference to the Mosaic Law that established the Levitical priesthood.'
  chosen_spanish_reading: «ley» en el texto principal, con nota que explicita la Ley mosaica como referencia contextual.
  alternative_spanish_readings:
  - «la ley» en el texto principal
  - «la Ley mosaica» en el texto principal
  rationale: El contexto de Hebreos remite claramente al sistema legal que sustentaba el sacerdocio levítico, pero el griego no obliga a fijarlo de modo más explícito en el versículo. Mantener «ley» deja abierta la referencia contextual sin sobretraducir.
  doctrine_reference: 'Hebreos 7:11–14; traducción POB: filosofía de equivalencia óptima'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido y la relación lógica del griego SBLGNT, y coincide con el hilo auditado de la POB inglesa: cambio de sacerdocio → consecuencia necesaria de un cambio de ley. No se detectaron revisiones posteriores que obliguen a ajustar el verso.'
  spanish_consistency_notes:
  - Se usa «sacerdocio» para ἱερωσύνη en coherencia con el uso técnico bíblico.
  - Se evita «SEÑOR» o perífrasis equivalentes porque no intervienen nombres divinos en este versículo.
  - «Ley» mantiene la posibilidad de entender el trasfondo mosaico sin añadir más de lo que dice el griego.
  - La nota al pie preserva la alternativa documentada sobre el alcance específico de νόμου.
