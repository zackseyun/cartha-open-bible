translation:
  language: es
  text: Porque este Melquisedec[a], rey de Salem, sacerdote de Dios Altísimo, se encontró con Abraham cuando volvía de la matanza de los reyes[b], y lo bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sacerdote del Dios Altísimo».
    reason: lexical_alternative
  - marker: b
    text: O, «después de derrotar a los reyes». El griego dice más literalmente «de la matanza de los reyes».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτος γὰρ
  english_pob_choice: For this
  chosen_spanish: Porque este
  alternatives_spanish:
  - Porque éste
  - Pues este
  lexicon: BDAG
  rationale: γάρ introduce una explicación o conexión argumental, por lo que «Porque» conserva la relación lógica. Οὗτος con el nombre propio se expresa naturalmente con «este» para mantener el énfasis demostrativo sin volver la frase forzada.
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melquisedec
  - Melquisedec
  lexicon: Convención transliterativa española
  rationale: Nombre propio tradicionalmente transliterado al español como «Melquisedec», forma clara y reconocible para lectores bíblicos.
- source_word: βασιλεὺς Σαλήμ
  english_pob_choice: king of Salem
  chosen_spanish: rey de Salem
  alternatives_spanish:
  - rey de Shalem
  lexicon: BDAG
  rationale: βασιλεύς se traduce de manera directa como «rey». «Salem» se conserva por transliteración estándar y por su conexión bíblica reconocible.
- source_word: ἱερεὺς τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: priest of God Most High
  chosen_spanish: sacerdote de Dios Altísimo
  alternatives_spanish:
  - sacerdote del Dios Altísimo
  - sacerdote del Altísimo Dios
  lexicon: BDAG
  rationale: «Sacerdote» es el equivalente natural y preciso de ἱερεύς. «Dios Altísimo» sigue el sentido del título divino y suena natural en español, preservando la dignidad del apelativo sin invertirlo innecesariamente.
- source_word: συναντήσας
  english_pob_choice: met
  chosen_spanish: salió al encuentro de
  alternatives_spanish:
  - se encontró con
  - encontró
  lexicon: BDAG
  rationale: El participio aoristo describe la acción de Melquisedec hacia Abraham. «Salió al encuentro de» comunica mejor la iniciativa del encuentro que un simple «se encontró con».
- source_word: ὑποστρέφοντι
  english_pob_choice: as he was returning
  chosen_spanish: cuando volvía
  alternatives_spanish:
  - mientras regresaba
  - al regresar
  lexicon: BDAG
  rationale: El participio presente en dativo expresa acción en curso simultánea al encuentro. «Cuando volvía» comunica naturalmente esa simultaneidad en español.
- source_word: ἀπὸ τῆς κοπῆς τῶν βασιλέων
  english_pob_choice: from the slaughter of the kings
  chosen_spanish: de la matanza de los reyes
  alternatives_spanish:
  - del derribo de los reyes
  - de la derrota de los reyes
  lexicon: BDAG
  rationale: κοπή literalmente sugiere corte o matanza; «matanza» conserva la fuerza del término mejor que una versión suavizada como «derrota».
- source_word: εὐλογήσας αὐτόν
  english_pob_choice: and blessed him
  chosen_spanish: y lo bendijo
  alternatives_spanish:
  - y le bendijo
  lexicon: BDAG
  rationale: La acción final se vierte de forma verbal y natural en español. «Lo bendijo» mantiene el objeto directo y la concisión del participio coordinado.
theological_decisions:
- issue: Título divino τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_reading: priest of God Most High
  chosen_spanish_reading: sacerdote de Dios Altísimo
  alternative_spanish_readings:
  - sacerdote del Dios Altísimo
  - sacerdote del Altísimo Dios
  rationale: 'La decisión es estilística y de naturalidad, no doctrinal: «Dios Altísimo» preserva el título divino sin convertirlo en una perífrasis menos fluida. Se mantiene la referencia al Dios supremo, sin necesidad de introducir otra formulación.'
  doctrine_reference: Hebreos 7:1; título divino en continuidad con Génesis 14.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el criterio auditado de la POB en inglés. Se mantuvo la estructura explicativa de γάρ, el participio de encuentro como acción principal en español y el matiz literal de κοπή con una nota alternativa, sin suavizar la violencia del término.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ y «Altísimo» para ὑψίστου, siguiendo la convención POB y el orden natural del español.
  - Se conservó «Melquisedec» como transliteración española estándar del nombre propio.
  - Se prefirió «sacerdote» sobre «sacerdote»/«siervo» porque ἱερεύς tiene valor técnico cultual.
  - Se evitó «SEÑOR» porque el texto griego no usa κύριος aquí; el título es θεός con el calificativo ὕψιστος.
  - Se mantuvo una traducción verbal sencilla para εὐλογήσας, sin añadir solemnidad no requerida por el contexto.
