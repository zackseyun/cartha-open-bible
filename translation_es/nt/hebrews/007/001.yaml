    reason: lexical_alternative
  - marker: b
    text: O, «después de derrotar a los reyes». El griego dice más literalmente «de la matanza de los reyes».
    reason: lexical_alternative
  revision_rationale: Se ajusta συναντήσας a una expresión española más neutra y estrictamente fiel («se encontró con») y se corrige la nota [b] para reflejar la alternativa documentada en la auditoría inglesa sin repetir torpemente el texto principal. El resto del versículo puede mantenerse.
