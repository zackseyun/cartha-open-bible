  text: ὃς οὐκ ἔχει καθ’ ἡμέραν ἀνάγκην, ὥσπερ οἱ ἀρχιερεῖς, πρότερον ὑπὲρ τῶν ἰδίων ἁμαρτιῶν θυσίας ἀναφέρειν, ἔπειτα τῶν τοῦ λαοῦ (τοῦτο γὰρ ἐποίησεν ἐφάπαξ ἑαυτὸν ἀνενέγκας)·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/027.yaml
  text: who has no need[a], day after day, like the high priests, to offer up sacrifices first for his own sins and then for those of the people[d][c][b], for this he did once for all when he offered up himself.
