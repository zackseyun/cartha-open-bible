translation:
  language: es
  text: que no tiene necesidad[a], día tras día, como los sumos sacerdotes, de ofrecer primero sacrificios por sus propios pecados y luego por los del pueblo[b][c][d], pues esto lo hizo una vez para siempre, al ofrecerse a sí mismo en sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diariamente». El modismo griego significa «día tras día».
    reason: lexical_alternative
  - marker: b
    text: 'O «los pecados del pueblo». El griego es elíptico: literalmente «luego los del pueblo», con «pecados» sobreentendido de la frase anterior.'
    reason: lexical_alternative
  - marker: c
    text: O «una vez y para siempre».
    reason: lexical_alternative
  - marker: d
    text: O «habiéndose ofrecido a sí mismo» o «al ofrecerse a sí mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - diariamente
  - cada día
  lexicon: BDAG
  rationale: El giro griego expresa repetición continua, no solo frecuencia. «Día tras día» preserva bien el valor iterativo y suena natural en español.
- source_word: ἀνάγκην
  english_pob_choice: need
  chosen_spanish: necesidad
  alternatives_spanish:
  - obligación
  - necesidad apremiante
  lexicon: BDAG
  rationale: En la construcción ἔχει ἀνάγκην, «tener necesidad» es el equivalente más directo y claro. «Obligación» desviaría el sentido hacia deber jurídico.
- source_word: ὥσπερ οἱ ἀρχιερεῖς
  english_pob_choice: like the high priests
  chosen_spanish: como los sumos sacerdotes
  alternatives_spanish:
  - igual que los sumos sacerdotes
  - como los altos sacerdotes
  lexicon: BDAG
  rationale: «Sumos sacerdotes» es el equivalente natural y tradicional para ἀρχιερεῖς en español bíblico, y mantiene el contraste comparativo del texto.
- source_word: πρότερον ... ἔπειτα
  english_pob_choice: first ... and then
  chosen_spanish: primero ... y luego
  alternatives_spanish:
  - primero ... después
  - antes ... luego
  lexicon: BDAG
  rationale: La secuencia sacrificial del verso exige una expresión clara de orden temporal. «Primero ... y luego» es idiomático y fiel.
- source_word: ὑπὲρ τῶν ἰδίων ἁμαρτιῶν
  english_pob_choice: for his own sins
  chosen_spanish: por sus propios pecados
  alternatives_spanish:
  - a favor de sus propios pecados
  - en favor de sus propios pecados
  lexicon: BDAG
  rationale: En contexto sacrificial, ὑπέρ se vierte naturalmente con «por». «Sus propios pecados» conserva el énfasis del posesivo griego.
- source_word: θυσίας ἀναφέρειν
  english_pob_choice: to offer up sacrifices
  chosen_spanish: ofrecer sacrificios
  alternatives_spanish:
  - ofrecer en sacrificio
  - presentar sacrificios
  lexicon: BDAG
  rationale: En español, «ofrecer sacrificios» comunica bien el acto cultual sin sonar forzado. El matiz de ἀναφέρω queda sostenido por el contexto sacerdotal y por la cláusula final de autoofrenda.
- source_word: τῶν τοῦ λαοῦ
  english_pob_choice: those of the people
  chosen_spanish: por los del pueblo
  alternatives_spanish:
  - por los pecados del pueblo
  - por los pertenecientes al pueblo
  lexicon: BDAG
  rationale: 'El griego es elíptico: se sobreentienden los «pecados» del tramo anterior. En español, «los del pueblo» preserva la elipsis y suena natural; la aclaración se explica en nota.'
- source_word: τοῦτο γὰρ ἐποίησεν
  english_pob_choice: for this he did
  chosen_spanish: pues esto lo hizo
  alternatives_spanish:
  - pues él hizo esto
  - porque esto lo hizo
  lexicon: BDAG
  rationale: «Esto» remite al conjunto de la acción sacerdotal anterior. El orden «esto lo hizo» mantiene la referencia anafórica sin perder fluidez en español.
- source_word: ἐφάπαξ
  english_pob_choice: once for all
  chosen_spanish: una vez para siempre
  alternatives_spanish:
  - de una vez y para siempre
  - una sola vez
  lexicon: BDAG
  rationale: «Una vez para siempre» transmite la definitividad de ἐφάπαξ con naturalidad en español bíblico contemporáneo.
- source_word: ἑαυτὸν ἀνενέγκας
  english_pob_choice: when he offered up himself
  chosen_spanish: al ofrecerse a sí mismo
  alternatives_spanish:
  - habiéndose ofrecido a sí mismo
  - ofreciéndose a sí mismo
  lexicon: BDAG
  rationale: El participio aoristo admite valor circunstancial/medio. «Al ofrecerse a sí mismo» conserva el sentido sacrificial y evita una formulación demasiado literal o pesada.
theological_decisions:
- issue: Ellipsis en 'τῶν τοῦ λαοῦ'
  english_pob_reading: 'Or ''the sins of the people.'' The Greek is elliptical: literally ''then those of the people,'' with ''sins'' understood from the previous phrase.'
  chosen_spanish_reading: «los del pueblo» conserva la elipsis; el sentido completo es «los pecados del pueblo».
  alternative_spanish_readings:
  - «los pecados del pueblo»
  - «los pertenecientes al pueblo»
  rationale: El griego deja implícito el sustantivo ya mencionado. Mantener la elipsis en el texto principal respeta la forma original y deja visible la dependencia del contexto; la nota aclara el sentido.
  doctrine_reference: Hebreos 7:27; principio de transparencia textual y preservación de la elipsis griega
- issue: Alcance de 'esto' en la cláusula parentética
  english_pob_reading: The main text renders τοῦτο as referring to the decisive sacrificial act just described, namely Christ's dealing with sins through self-offering, without implying that he offered for his own sins.
  chosen_spanish_reading: «pues esto lo hizo» se refiere al acto sacerdotal decisivo descrito antes, no a pecados propios de Jesús.
  alternative_spanish_readings:
  - «pues por esto lo hizo»
  - «porque esto fue lo que hizo»
  rationale: La redacción española debe conservar la referencia anafórica sin sugerir que Cristo tuviera pecados propios. El contexto contrasta a Jesús con los sumos sacerdotes humanos.
  doctrine_reference: Cristología y sin pecado de Cristo; Hebreos 4:15; 7:26-27
- issue: Valor de ἐφάπαξ
  english_pob_reading: once for all
  chosen_spanish_reading: una vez para siempre
  alternative_spanish_readings:
  - una sola vez
  - de una vez y para siempre
  rationale: La frase expresa la unicidad y suficiencia definitiva del sacrificio de Cristo. «Una vez para siempre» preserva ese peso teológico sin diluirlo en una simple indicación temporal.
  doctrine_reference: Doctrina de la suficiencia y definitividad del sacrificio de Cristo; Hebreos 9:12; 10:10-14
- issue: Autoofrenda sacrificial de Cristo
  english_pob_reading: The translation uses 'offered up himself' to preserve the sacrificial and priestly force of the Greek.
  chosen_spanish_reading: «al ofrecerse a sí mismo» mantiene el carácter cultual y la autoentrega sacrificial.
  alternative_spanish_readings:
  - «ofreciéndose a sí mismo»
  - «habiéndose ofrecido a sí mismo»
  rationale: Hebreos presenta a Jesús como sacerdote y ofrenda. La forma española elegida conserva ese registro sacrificial sin sonar arcaica ni oscurecer la agencia de Cristo.
  doctrine_reference: Cristología sacrificial en Hebreos; Hebreos 7:27; 9:14
translation_notes:
  revision_awareness: 'Se siguió el cierre revisado del POB inglés: se conservó la lógica de ἀναφέρειν/ἀνενέγκας con una formulación sacrificial clara en español, y se reflejó la fuerza anafórica de τοῦτο con «esto lo hizo». También se mantuvo la lectura de ἐφάπαξ como definitividad única del acto de Cristo.'
  spanish_consistency_notes:
  - Se usa «sumos sacerdotes» para ἀρχιερεῖς, conforme al registro bíblico común en español.
  - Se usa «pecados» para ἁμαρτίαι y no un eufemismo más abstracto, para conservar la concreción ética del contexto.
  - Se mantiene la autoofrenda de Cristo en forma verbal reflexiva («al ofrecerse a sí mismo») para preservar su agencia y el paralelismo sacrificial.
  - Se evita traducir la cláusula elíptica como una mera repetición explícita en el texto principal, reservando la aclaración para la nota.
  - La expresión «una vez para siempre» se usa como equivalente establecido de ἐφάπαξ en contextos teológicos de suficiencia definitiva.
