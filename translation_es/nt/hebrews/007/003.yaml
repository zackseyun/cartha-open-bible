    text: Or 'without recorded genealogy.' The point is that Genesis gives no genealogical record for Melchizedek, which Hebrews uses typologically.
    reason: lexical_alternative
  - marker: b
    text: Or 'for all time' or 'forever.' The phrase emphasizes the enduring character of his priesthood in the scriptural presentation.
