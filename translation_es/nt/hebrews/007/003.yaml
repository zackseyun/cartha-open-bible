base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/003.yaml
  text: without father[a], without mother, without genealogy, having neither beginning of days nor end of life, but being made like the Son of God[b], he remains a priest perpetually.
  footnotes:
