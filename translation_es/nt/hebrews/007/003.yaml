translation:
  language: es
  text: sin padre[a], sin madre, sin genealogía, sin tener ni comienzo de días ni fin de vida, pero hecho semejante al Hijo de Dios, permanece sacerdote para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin genealogía registrada». El punto es que Génesis no da registro genealógico de Melquisedec, y Hebreos usa ese silencio de modo tipológico.
    reason: lexical_alternative
  - marker: b
    text: O «por siempre» o «perpetuamente». La expresión subraya el carácter duradero de su sacerdocio en la presentación bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάτωρ
  english_pob_choice: without father
  chosen_spanish: sin padre
  alternatives_spanish:
  - padreless
  lexicon: BDAG
  rationale: La expresión griega es un adjetivo privativo que indica ausencia de padre. En español, «sin padre» reproduce la brevedad y la fuerza descriptiva sin añadir la carga emocional de «huérfano» o una formulación más interpretativa.
- source_word: ἀμήτωρ
  english_pob_choice: without mother
  chosen_spanish: sin madre
  alternatives_spanish:
  - madreless
  lexicon: BDAG
  rationale: Se mantiene el paralelismo formal con «sin padre» y con el triángulo privativo del griego. «Sin madre» conserva la referencia a ausencia en el registro genealógico sin introducir matices afectivos no presentes en el texto.
- source_word: ἀγενεαλόγητος
  english_pob_choice: without genealogy
  chosen_spanish: sin genealogía
  alternatives_spanish:
  - sin genealogía registrada
  - sin registro genealógico
  lexicon: BDAG
  rationale: El término señala la carencia de genealogía o de registro genealógico. «Sin genealogía» es breve, fiel y naturalmente entendible en español; el contexto de Hebreos apunta a la ausencia de registro en Génesis, no a negar metafísicamente ascendencia real.
- source_word: μήτε ἀρχὴν ἡμερῶν μήτε ζωῆς τέλος ἔχων
  english_pob_choice: having neither beginning of days nor end of life
  chosen_spanish: sin tener ni comienzo de días ni fin de vida
  alternatives_spanish:
  - no teniendo ni comienzo de días ni fin de vida
  - sin poseer ni comienzo de días ni fin de vida
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo bastante literal para conservar el tono elevado y la negación correlativa. «Sin tener» suena natural en español y mantiene la relación de negación sin añadir una afirmación ontológica más fuerte que la que exige el pasaje.
- source_word: ἀφωμοιωμένος
  english_pob_choice: being made like
  chosen_spanish: hecho semejante
  alternatives_spanish:
  - hecho parecido
  - asimilado
  lexicon: BDAG
  rationale: El participio pasivo perfecto expresa una comparación recibida. «Hecho semejante» conserva la pasividad y evita confundir semejanza con identidad. «Parecido» sería más débil; «asimilado» suena más técnico y menos natural en este contexto.
- source_word: τῷ υἱῷ τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico estándar con artículo definido, tal como la sintaxis española lo pide de forma natural. «Hijo de Dios» mantiene la referencia teológica sin sustituir el título por una perífrasis.
- source_word: μένει
  english_pob_choice: he remains
  chosen_spanish: permanece
  alternatives_spanish:
  - sigue siendo
  - continúa
  lexicon: BDAG
  rationale: El presente de μένω expresa continuidad. «Permanece» es la opción más directa y solemne en español para la permanencia de su sacerdocio en la argumentación de Hebreos.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - un sacerdote
  lexicon: BDAG
  rationale: 'Aunque el griego es anartro, en español el sustantivo predicativo fluye mejor sin artículo: «permanece sacerdote». La omisión del artículo evita una redundancia poco natural y conserva el énfasis de función/estado.'
- source_word: εἰς τὸ διηνεκές
  english_pob_choice: perpetually
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - continuamente
  - por siempre
  lexicon: BDAG
  rationale: La frase denota continuidad permanente. En español, «para siempre» es la forma más natural y fiel al valor durativo del griego; «perpetuamente» suena más técnico y menos idiomático.
theological_decisions:
- issue: Si los descriptores de Melquisedec deben entenderse como rasgos literales o como silencio tipológico del relato bíblico
  english_pob_reading: The wording is translated so that the descriptors are preserved, while 'being made like the Son of God' signals the author's typological argument based on scriptural portrayal rather than asserting that Melchizedek is ontologically identical with or prior to the Son.
  chosen_spanish_reading: La traducción conserva los descriptores y, al decir «hecho semejante al Hijo de Dios», deja claro que el autor argumenta tipológicamente a partir de la presentación bíblica, no que Melquisedec sea ontológicamente idéntico al Hijo ni que se esté resolviendo su naturaleza literal.
  alternative_spanish_readings:
  - Melquisedec es literalmente eterno y sin padres
  - Melquisedec es una manifestación preencarnada del Hijo
  rationale: Hebreos apoya su argumento en la ausencia de datos genealógicos y en el modo en que Génesis presenta a Melquisedec. El participio pasivo indica semejanza, no identidad. La versión española preserva esa tensión teológica sin imponer una conclusión doctrinal más fuerte que el texto griego.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada revisada: no se registraron cambios aplicados y el criterio de alta concordancia se mantiene. La redacción española sigue de cerca el griego y el rastro auditado en inglés, preservando tanto la simetría negativa como la tensión tipológica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí el texto usa «Dios», por lo que se conserva la referencia cristológica «Hijo de Dios».
  - Se evita «Cristo» porque el griego dice υἱὸς τοῦ θεοῦ, y el audit trail inglés fija «Son of God».
  - Se conserva la distinción entre ausencia de genealogía y negación ontológica de parentesco; el contexto tipológico queda reflejado en la nota a.
  - La frase final «para siempre» comunica continuidad permanente en un español natural, sin forzar un matiz metafísico mayor que el requerido por el argumento de Hebreos.
