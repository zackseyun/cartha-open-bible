translation:
  language: es
  text: Pero él[a], porque permanece para siempre, mantiene el sacerdocio permanentemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantiene el sacerdocio inalterablemente» o «tiene un sacerdocio no transferible». El adjetivo griego puede incluir cualquiera de estos matices; en contexto, la idea es que, como él vive para siempre, su sacerdocio no pasa a otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Pero este
  - Pero él mismo
  lexicon: BDAG
  rationale: El artículo con valor sustantivo retoma a Jesús en contraste con los sacerdotes anteriores. En español, «Pero él» conserva la oposición de δέ y resulta natural sin añadir énfasis no presente en el griego.
- source_word: διὰ τὸ μένειν αὐτὸν
  english_pob_choice: because he remains
  chosen_spanish: porque permanece
  alternatives_spanish:
  - porque sigue permaneciendo
  - a causa de su permanecer
  lexicon: BDAG
  rationale: διά con infinitivo articular expresa causa. «Porque permanece» comunica la relación causal y el aspecto durativo de μένειν sin sonar forzado en español.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática indica duración sin fin. «Para siempre» es la forma natural y fiel en español, equivalente al valor temporal de la frase griega.
- source_word: ἀπαράβατον
  english_pob_choice: permanently
  chosen_spanish: permanentemente
  alternatives_spanish:
  - inalterablemente
  - no transferible
  - inviolable
  lexicon: BDAG
  rationale: El adjetivo puede sugerir que el sacerdocio no pasa a otro o que no cambia. «Permanentemente» preserva esa tensión léxica en una forma clara, sin cerrar indebidamente el matiz hacia una sola opción técnica.
- source_word: ἔχει τὴν ἱερωσύνην
  english_pob_choice: holds the priesthood
  chosen_spanish: posee el sacerdocio
  alternatives_spanish:
  - tiene el sacerdocio
  - retiene el sacerdocio
  lexicon: BDAG
  rationale: ἔχω con ἱερωσύνην expresa posesión/tenencia de un oficio. «Posee el sacerdocio» conserva el sentido de detentar el cargo y suena más natural que una calca directa en español.
- source_word: ἱερωσύνην
  english_pob_choice: priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  lexicon: BDAG
  rationale: El sustantivo denota el oficio o estado sacerdotal. «El sacerdocio» es la equivalencia clara y estándar en español para este contexto.
theological_decisions:
- issue: Sentido de ἀπαράβατον respecto del sacerdocio de Cristo
  english_pob_reading: Rendered contextually as 'permanently' to emphasize that Jesus' priesthood does not pass away or transfer because he lives forever.
  chosen_spanish_reading: Se vierte contextualmente como «permanentemente» para subrayar que el sacerdocio de Jesús no cesa ni pasa a otro porque él vive para siempre.
  alternative_spanish_readings:
  - inalterablemente
  - no transferible
  rationale: 'El contexto contrasta el sacerdocio mortal y sucesivo con el de Jesús. La traducción mantiene abierta la ambigüedad real del término griego: permanencia, intransferibilidad o inmutabilidad parcial. Así se conserva la fuerza argumentativa del texto sin fijar un tecnicismo doctrinal ajeno a la frase.'
  doctrine_reference: Preservar la tensión lexical y teológica; equivalencia óptima.
translation_notes:
  revision_awareness: 'El texto concuerda con el pasaje griego y con la auditoría inglesa: mantiene la causalidad de διὰ τὸ μένειν αὐτὸν, la duración de εἰς τὸν αἰῶνα y la ambigüedad de ἀπαράβατον sin resolverla en exceso. No hay revisiones previas que incorporar.'
  spanish_consistency_notes:
  - Se usa «Jesús» implícitamente por el antecedente del contexto inmediato, como en el inglés auditado.
  - «Sacerdocio» se mantiene como término técnico estable para ἱερωσύνην.
  - La nota [a] se ancla en «permanentemente» para preservar la alternativa semántica documentada.
