translation:
  language: es
  text: Pues todavía estaba en los lomos de su padre cuando Melquisedec se encontró con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: "todavía estaba en el cuerpo de su antepasado". El griego dice literalmente "en los lomos de su padre", un modismo de descendencia ancestral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  lexicon: BDAG
  rationale: Expresa la continuidad de un estado previo en un español natural y digno; mantiene el sentido de permanencia temporal sin volverlo más pesado que el griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del argumento anterior con un conector discursivo natural en español; 'pues' conserva la fuerza explicativa sin sonar excesivamente causal.
- source_word: ἐν τῇ ὀσφύϊ
  english_pob_choice: in the loins
  chosen_spanish: en los lomos
  alternatives_spanish:
  - en la cintura
  - en el cuerpo
  lexicon: BDAG
  rationale: '''Lomos'' preserva la metáfora concreta del griego y el valor idiomático de descendencia/semilla ancestral, evitando una paráfrasis que borre la imagen.'
- source_word: τοῦ πατρὸς
  english_pob_choice: of his father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su antepasado
  lexicon: BDAG
  rationale: Mantiene la estructura posesiva del original y deja que el contexto identifique al referente; no añade 'Abraham' al texto principal.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  lexicon: BDAG
  rationale: El imperfecto en español expresa mejor un estado continuo en el momento indicado por 'cuando'.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  lexicon: BDAG
  rationale: Conjunción temporal directa y plenamente natural en español.
- source_word: συνήντησεν
  english_pob_choice: met
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  lexicon: BDAG
  rationale: El verbo griego implica encuentro; en español, 'le salió al encuentro' comunica bien la acción del sujeto (Melquisedec) sin perder la referencia relacional del pasaje.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre dativo átono natural en español; conserva la referencia pronominal del griego sin explicitar el nombre en el texto principal.
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melchisedec
  lexicon: convención de transliteración bíblica
  rationale: Forma transliterada usual en español bíblico, reconocible para el lector y consistente con el nombre propio del original.
theological_decisions:
- issue: Idiom of ancestral/procreative descent
  english_pob_reading: Retain the concrete idiom 'in the loins of his father' in the main text
  chosen_spanish_reading: Retener la imagen concreta 'en los lomos de su padre'
  alternative_spanish_readings:
  - '''en el cuerpo de su antepasado'''
  - '''en la descendencia de su padre'''
  rationale: La frase griega es idiomática y sirve al argumento representacional del autor. La traducción principal conserva la metáfora para no borrar la tensión entre imagen corporal y sentido genealógico; la nota da la alternativa interpretativa sin sustituir el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Identification of the father in context
  english_pob_reading: Translate as 'his father' rather than explicitly 'Abraham'
  chosen_spanish_reading: Traducir como 'su padre' sin añadir 'Abraham' al texto principal
  alternative_spanish_readings:
  - '''su antepasado Abraham'''
  rationale: El griego nombra al padre de forma pronominal y el contexto ya identifica a Abraham. Mantener la referencia pronominal evita introducir una precisión que el versículo no expresa de manera directa.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y el audit trail inglés: conserva la conjunción explicativa, el imperfecto de estado continuo y el modismo ''en los lomos'' para no neutralizar la imagen genealógica. No se incorporaron revisiones posteriores porque el registro indica acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando el nombre divino aparezca en el texto; aquí no aplica.
  - '''Melquisedec'' se mantiene como nombre propio transliterado estándar en español.'
  - La nota al pie preserva la tensión entre traducción literal y lectura interpretativa sin desplazarla al cuerpo principal.
