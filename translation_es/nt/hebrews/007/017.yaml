translation:
  language: es
  text: 'Porque se da este testimonio: «Tú eres sacerdote para siempre, según el orden de Melquisedec»[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «conforme al orden de Melquisedec».
    reason: lexical_alternative
  - marker: b
    text: Cita de Salmo 110:4.
    reason: cross_reference
lexical_decisions:
- source_word: μαρτυρεῖται
  english_pob_choice: it is testified
  chosen_spanish: se da testimonio
  alternatives_spanish:
  - se testimonia
  - es testificado
  - se atestigua
  lexicon: BDAG
  rationale: El pasivo impersonal expresa que el testimonio está siendo dado sin destacar un sujeto humano explícito. «Se da testimonio» conserva ese valor y suena natural en español bíblico contemporáneo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: Introduce la razón o apoyo de lo dicho antes. «Porque» comunica bien la conexión causal/discursiva en español sin cargar el verso.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: que
  alternatives_spanish:
  - —
  - ':'
  lexicon: BDAG
  rationale: En español resulta más natural mantener la subordinación con «que» dentro de la frase de testimonio, aunque el discurso citado se cierra tipográficamente con comillas. No se fuerza un giro más interpretativo.
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Tú eres
  lexicon: BDAG
  rationale: La segunda persona singular es enfática en la cita. «Tú» conserva la dirección directa y el énfasis sin añadir palabras innecesarias.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdocio
  - sacerdote ministerial
  lexicon: BDAG
  rationale: El griego dice «sacerdote», no «sumo sacerdote». En español, el sustantivo simple mantiene la fuerza lexical y evita expandir el título más allá del texto.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática equivale a permanencia indefinida/perpetua. «Para siempre» es la forma más clara y fiel en español.
- source_word: κατὰ τὴν τάξιν
  english_pob_choice: according to the order of
  chosen_spanish: según el orden de
  alternatives_spanish:
  - de acuerdo con el orden de
  - conforme al orden de
  - tras el orden de
  lexicon: BDAG
  rationale: «Según el orden de» comunica correspondencia con un patrón o arreglo establecido. Es más natural que calcar «después de» y mantiene el sentido de orden/estructura.
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melchizedec
  lexicon: BDAG
  rationale: Nombre propio tradicionalmente transliterado en español bíblico. «Melquisedec» es la forma más reconocible y estándar para lectores hispanohablantes.
theological_decisions:
- issue: No ampliar el título a 'sumo sacerdote'
  english_pob_reading: Retain the direct statement 'You are a priest forever according to the order of Melchizedek' as a citation of scriptural testimony.
  chosen_spanish_reading: Conservar «Tú eres sacerdote para siempre, según el orden de Melquisedec» como cita de testimonio bíblico.
  alternative_spanish_readings:
  - «Tú eres sumo sacerdote para siempre...»
  - «Tú eres sacerdote eterno...»
  rationale: El texto griego dice ἱερεύς, no ἀρχιερεύς. Mantener «sacerdote» preserva la tensión exegética y evita resolverla por expansión doctrinal anticipada.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la única nota con el marcador [a] dentro del texto traducido. No se incluyen notas sin anclaje. La redacción sigue el testimonio griego directo y conserva la equivalencia óptima del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - «Sacerdote» se usa por fidelidad a ἱερεύς y para no importar «sumo sacerdote».
  - «Para siempre» refleja el valor idiomático de εἰς τὸν αἰῶνα.
  - La transliteración española normal es «Melquisedec», no una forma híbrida.
