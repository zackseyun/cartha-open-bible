revisions:
- from: 'Porque se da testimonio de que: «Tú eres sacerdote para siempre, según el orden de Melquisedec»[a].'
  to: 'Porque se da este testimonio: «Tú eres sacerdote para siempre, según el orden de Melquisedec»[a][b].'
  rationale: Se ajusta la introducción de la cita para que suene natural en español y siga reflejando el testimonio impersonal del griego; se corrige la nota léxica para que preserve una alternativa tradicional real; y se añade la nota de referencia bíblica presente en el expediente inglés. No hay necesidad de adjudicación adicional.
