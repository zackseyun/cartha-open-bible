translation:
  language: es
  text: 'pero este, con juramento, por medio del que le dijo[a]: «Yahvé ha jurado[b] y no cambiará de parecer: “Tú eres sacerdote para siempre”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «por medio de quien le dijo».
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «Yahvé juró». El aoristo griego Ὤμοσεν puede traducirse como «juró» o «ha jurado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: but this one
  chosen_spanish: pero este
  alternatives_spanish:
  - pero él
  - pero aquel
  lexicon: BDAG
  rationale: El contraste con los sacerdotes anteriores se mantiene mejor con un demostrativo enfático en español. «Este» conserva la elipsis y la oposición del griego sin volverlo innecesariamente explícito.
- source_word: μετὰ ὁρκωμοσίας
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - mediante juramento
  - por un juramento
  lexicon: BDAG
  rationale: «Con juramento» reproduce de forma natural el valor circunstancial del dativo/ preposición en el contexto de Hebreos 7:20–21, donde se contrasta esta designación con la de los sacerdotes levíticos sin juramento.
- source_word: διὰ τοῦ λέγοντος πρὸς αὐτόν
  english_pob_choice: through the one who said to him
  chosen_spanish: mediante el que le dijo
  alternatives_spanish:
  - por medio del que le dijo
  - mediante el que habló a él
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa agencia o mediación. En español, «mediante el que le dijo» preserva la mediación del hablante citado sin sobrecargar la frase; el pronombre relativo evita repetir «Dios» que el griego no nombra aquí de forma explícita.
- source_word: Ὤμοσεν κύριος
  english_pob_choice: The Lord has sworn
  chosen_spanish: Yahvé ha jurado
  alternatives_spanish:
  - El Señor ha jurado
  - Yahvé juró
  lexicon: BDAG
  rationale: Aunque el griego cita κύριος, el contexto es la cita de Salmo 110:4, donde el referente es el nombre divino. Según el marco POB, se usa «Yahvé» para el nombre divino en el texto principal; el perfecto español «ha jurado» conserva la fuerza perdurable del juramento, como en la opción inglesa principal.
- source_word: οὐ μεταμεληθήσεται
  english_pob_choice: will not change his mind
  chosen_spanish: no se arrepentirá
  alternatives_spanish:
  - no cambiará de parecer
  - no cambiará su mente
  lexicon: BDAG
  rationale: μεταμέλομαι en este contexto expresa revocación o cambio respecto de una declaración previa, no necesariamente arrepentimiento moral. Sin embargo, en español «no se arrepentirá» es una forma tradicional y comprensible que, en el contexto solemne del juramento, comunica la irreversibilidad de la palabra dada; las alternativas más literales quedan registradas.
- source_word: Σὺ ἱερεὺς
  english_pob_choice: You are a priest
  chosen_spanish: Tú eres sacerdote
  alternatives_spanish:
  - Tú eres un sacerdote
  - Eres sacerdote
  lexicon: BDAG
  rationale: El griego carece de verbo copulativo, pero en español debe suplirse. Se mantiene el predicado nominal simple para conservar el carácter declarativo de la cita.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: «Para siempre» es la equivalencia más natural y fiel del idiomático εἰς τὸν αἰῶνα en este contexto de permanencia indefinida del sacerdocio.
theological_decisions:
- issue: Identidad del sujeto del juramento en la cita de Salmo 110:4
  english_pob_reading: The Lord has sworn
  chosen_spanish_reading: Yahvé ha jurado
  alternative_spanish_readings:
  - El Señor ha jurado
  rationale: La cita de Hebreos procede del Salmo 110:4, donde el nombre divino está en juego. Siguiendo la terminología POB para יהוה, se traslada a «Yahvé» en vez de mantener el velo de «Señor». Esto conserva la transparencia hacia el nombre divino subyacente en el texto bíblico hebreo citado por el griego.
  doctrine_reference: 'Terminología POB: יהוה → Yahvé; κύριος en cita de Sal 110:4 con referencia al nombre divino'
- issue: Sentido de μεταμεληθήσεται en un juramento divino
  english_pob_reading: will not change his mind
  chosen_spanish_reading: no se arrepentirá
  alternative_spanish_readings:
  - no cambiará de parecer
  - no revocará su decisión
  rationale: La forma griega apunta a la irrevocabilidad del decreto jurado. En español, «no se arrepentirá» comunica esa firmeza en un registro bíblico sobrio. No se pretende sugerir arrepentimiento moral en Dios, sino la no revocación de su juramento.
  doctrine_reference: Hebreos 6–7; Salmo 110:4; doctrina de la inmutabilidad divina en el marco del juramento
- issue: Contraste teológico entre sacerdocio levítico y sacerdocio del Hijo
  english_pob_reading: established by God's oath and is permanent
  chosen_spanish_reading: con juramento ... para siempre
  alternative_spanish_readings:
  - mediante juramento ... por siempre
  rationale: 'La construcción española conserva el contraste del contexto inmediato: los otros sacerdotes fueron hechos sin juramento, pero este con juramento divino, y además con duración permanente. No se añade lenguaje doctrinal externo al argumento de Hebreos.'
  doctrine_reference: Hebreos 7:20-21; argumento de superioridad del sacerdocio del Hijo
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. El versículo ahora se presenta sin marcadores de nota, manteniendo la traducción principal dentro de los límites del fuente griego y la terminología POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, en continuidad con la política terminológica del proyecto.
  - Se mantiene «para siempre» como equivalente idiomático de εἰς τὸν αἰῶνα.
  - La frase «no se arrepentirá» se conserva por claridad bíblica en español, aunque la nota lexical documenta la alternativa más literal de cambio de parecer.
  - La traducción evita añadir sujeto explícito en la cláusula mediadora, preservando la forma relativa del griego.
