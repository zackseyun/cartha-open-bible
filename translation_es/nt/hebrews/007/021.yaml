revisions:
- from: 'pero este fue hecho sacerdote con juramento mediante el que le dijo: «Yahvé ha jurado y no se arrepentirá: “Tú eres sacerdote para siempre”»'
  to: 'pero este, con juramento, por medio del que le dijo[a]: «Yahvé ha jurado[b] y no cambiará de parecer: “Tú eres sacerdote para siempre”»'
  rationale: Se ajusta μεταμεληθήσεται a «no cambiará de parecer» para reflejar mejor la irrevocabilidad del juramento divino; se evita añadir «fue hecho sacerdote», que no está explícito en el griego de este versículo; se mejora la naturalidad de la mediación con «por medio del que le dijo»; y se recupera la nota de alternativa para Ὤμοσεν, en línea con el rastro de auditoría inglés.
