review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: contraste con los sacerdotes previos («pero este»), designación «con juramento», mediación del que habló, y la cita del Salmo sobre un sacerdocio permanente. Sin embargo, «no se arrepentirá» no refleja con suficiente precisión aquí el sentido de οὐ μεταμεληθήσεται, que en este contexto de juramento divino apunta a no cambiar de parecer o no revocar la decisión. Además, «fue hecho sacerdote» no está presente en el texto griego de este versículo y depende del v. 20; el español puede conservar mejor la elipsis del original sin importar demasiado material del versículo anterior.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «mediante el que le dijo» suena algo forzado, y «no se arrepentirá» introduce una posible lectura teológica equívoca en español moderno. Una redacción más natural y precisa mejora la legibilidad y la fidelidad semántica.
  glossary_alignment: Buen uso de «Yahvé» en la cita, dado el lineamiento del proyecto para referencias al nombre divino en este contexto del Salmo 110:4. «Sacerdote» y «para siempre» están bien. El principal desajuste terminológico/semántico está en μεταμεληθήσεται, que debe evitar «arrepentirse» aquí.
  issues:
  - severity: medium
    issue: «no se arrepentirá» para οὐ μεταμεληθήσεται
    rationale: En Hebreos 7:21 el verbo expresa no cambiar de parecer / no revocar la decisión jurada, no arrepentimiento moral. En español moderno, «arrepentirse» puede inducir una inferencia teológica impropia o menos precisa.
  - severity: medium
    issue: «fue hecho sacerdote» añade contenido no explícito en este versículo
    rationale: El griego aquí dice simplemente «pero este [con juramento...]», continuando el contraste del versículo previo. «Fue hecho sacerdote» viene de la cláusula anterior del contexto y puede aceptarse interpretativamente, pero para una revisión estricta conviene no introducir más de lo que el versículo actual expresa.
  - severity: low
    issue: «mediante el que le dijo» es poco natural
    rationale: Aunque intenta reflejar διά + participio articular, en español suena rígido. «Por medio del que le dijo» o una leve reestructuración mantiene la mediación de forma más idiomática.
  - severity: low
    issue: Falta la nota léxica sobre Ὤμοσεν
    rationale: El English POB conserva la alternativa «swore / has sworn». El español debería preservar esa alternativa con una nota, ya que «ha jurado» es una elección interpretativa paralela.
  revised_spanish_text: 'pero este, con juramento, por medio del que le dijo[a]: «Yahvé ha jurado[b] y no cambiará de parecer: “Tú eres sacerdote para siempre”»'
