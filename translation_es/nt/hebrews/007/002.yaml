translation:
  language: es
  text: a quien Abraham también apartó una décima parte[a] de todo. Primero, su nombre se traduce como Rey de Rectitud[b], y luego también Rey de Salem, es decir, Rey de Paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el diezmo». El griego dice literalmente «una décima parte».
    reason: lexical_alternative
  - marker: b
    text: O «Rey de Justicia». El término griego puede significar «rectitud» o «justicia»; aquí el texto principal sigue una equivalencia que refleja mejor la decisión auditada de conservar el sentido de δικαιοσύνη como 'righteousness' en este título.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a quien se
  - para quien
  lexicon: BDAG
  rationale: El dativo relativo se refiere a Melquisedec; en español, «a quien» expresa con naturalidad el destinatario de la acción de Abraham.
- source_word: δεκάτην
  english_pob_choice: a tenth
  chosen_spanish: el diezmo
  alternatives_spanish:
  - una décima parte
  - un diezmo
  lexicon: BDAG
  rationale: La forma griega dice literalmente «una décima parte», pero en español bíblico «el diezmo» comunica bien el sentido y es comprensible; se mantiene la nota para conservar la literalidad del griego.
- source_word: ἀπὸ πάντων
  english_pob_choice: of everything
  chosen_spanish: de todo
  alternatives_spanish:
  - de todas las cosas
  - de todo cuanto tenía
  lexicon: BDAG
  rationale: La frase expresa el total de lo que Abraham poseía o había obtenido; «de todo» es conciso y fiel sin añadir precisión no explícita en el texto.
- source_word: ἐμέρισεν
  english_pob_choice: apportioned
  chosen_spanish: dio
  alternatives_spanish:
  - apartó
  - distribuyó
  - asignó
  lexicon: BDAG
  rationale: Aunque el verbo implica repartir o asignar, en esta construcción española el sentido básico es que Abraham entregó el diezmo a Melquisedec. «Dio» evita una rigidez innecesaria y sigue siendo fiel al acto descrito.
- source_word: πρῶτον μὲν
  english_pob_choice: First
  chosen_spanish: Primero
  alternatives_spanish:
  - En primer lugar
  - Ante todo
  lexicon: BDAG
  rationale: Marca la primera parte de una explicación en dos pasos; «Primero» es natural y conserva la secuencia del griego.
- source_word: ἑρμηνευόμενος
  english_pob_choice: his name is translated
  chosen_spanish: su nombre se interpreta
  alternatives_spanish:
  - se traduce
  - su nombre significa
  lexicon: BDAG
  rationale: El participio introduce una explicación del valor del nombre/título. «Se interpreta» preserva el matiz explicativo sin forzar una equivalencia demasiado cerrada; «significa» sería posible, pero menos cercano al marco del texto.
- source_word: βασιλεὺς δικαιοσύνης
  english_pob_choice: King of Righteousness
  chosen_spanish: Rey de Justicia
  alternatives_spanish:
  - Rey de Rectitud
  - Rey de Righteousness
  lexicon: BDAG
  rationale: El término δικαιοσύνη admite «justicia» o «rectitud». En español, el giro titular «Rey de Justicia» es claro, natural y conserva la ambigüedad legal/covenantal sin sacrificar inteligibilidad. Se documenta la alternativa por la tensión léxica del término.
- source_word: ἔπειτα δὲ καὶ
  english_pob_choice: and then also
  chosen_spanish: y luego también
  alternatives_spanish:
  - después también
  - y después además
  lexicon: BDAG
  rationale: Mantiene la progresión explicativa y el segundo paso de la enumeración, con una coordinación natural en español.
- source_word: βασιλεὺς Σαλήμ
  english_pob_choice: King of Salem
  chosen_spanish: Rey de Salem
  alternatives_spanish:
  - rey de Salem
  lexicon: BDAG
  rationale: Σαλήμ se translitera como nombre propio del lugar; se conserva el título con capitalización idiomática en español.
- source_word: ὅ ἐστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: BDAG
  rationale: Introduce una glosa explicativa equivalente a la inglesa «that is»; «es decir» es la fórmula española más natural y formal.
- source_word: βασιλεὺς εἰρήνης
  english_pob_choice: King of Peace
  chosen_spanish: Rey de Paz
  alternatives_spanish:
  - rey de paz
  lexicon: BDAG
  rationale: Mantiene el título explicativo en paralelo con las frases anteriores. «Paz» conserva el sustantivo abstracto y la fuerza titular del texto.
theological_decisions:
- issue: δικαιοσύνη en un título explicativo
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La pauta doctrinal del proyecto favorece «justicia» como equivalente principal de δικαιοσύνη en español, mientras que «rectitud» queda como posibilidad contextual. En este versículo, al tratarse de una explicación del nombre/título, «Rey de Justicia» transmite bien la carga semántica sin necesidad de importar una formulación más doctrinalizada.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → justicia / rectitud, con atención al contexto'
- issue: δεκάτην y la relación entre literalidad y uso eclesial
  english_pob_reading: a tenth
  chosen_spanish_reading: el diezmo
  alternative_spanish_readings:
  - una décima parte
  rationale: La forma griega es literalmente «una décima parte». En español, «el diezmo» es un término bíblico transparente y equivalente en uso; la nota preserva la precisión literal para no borrar la auditable source trail.
  doctrine_reference: POB lexical practice on transparent but intelligible renderings; lexical alternative preserved in footnote
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente del texto fuente inglés, que no requirió cambios adicionales. Se mantuvo la estructura explicativa en dos pasos y se conservaron las dos tensiones léxicas relevantes: δεκάτην como «diezmo» con nota literal, y δικαιοσύνη como «justicia» con alternativa documentada.'
  spanish_consistency_notes:
  - Se conserva el patrón titular con mayúscula inicial en «Rey de…» para reflejar la función nominal del griego y la práctica del proyecto.
  - Se evita sustituir «Yahvé» o «Cristo» porque no aparecen en este versículo.
  - «Salem» se mantiene como transliteración del nombre propio, sin intentar explicarlo dentro del cuerpo del texto.
  - La puntuación reproduce la secuencia explicativa del original con coma y dos pausas internas para facilitar la lectura pública.
