translation:
  language: es
  text: Porque la ley no perfeccionó[a] nada, pero sí la introducción[b] de una esperanza mejor, mediante la cual nos acercamos a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hizo nada perfecto». El verbo griego también puede significar «llevar a la perfección» o «llevar a cumplimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el traer una esperanza mejor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: BDAG
  rationale: El acusativo neutro funciona como objeto de ἐτελείωσεν; en español, 'nada' conserva la negación absoluta de manera natural y directa.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación anterior; 'Porque' expresa bien la función explicativa y suena natural en español bíblico actual.
- source_word: ἐτελείωσεν
  english_pob_choice: perfected
  chosen_spanish: perfeccionó
  alternatives_spanish:
  - hizo perfecto
  - llevó a la perfección
  - completó
  lexicon: BDAG
  rationale: τελειόω en Hebreos tiene fuerza de llevar a la meta o perfección, con peso cultual y teológico. 'Perfeccionó' conserva esa relación léxica sin diluirla en una paráfrasis más amplia.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: Aquí se refiere a la ley mosaica en su marco covenantal. 'La ley' es claro y evita imponer una mayúscula no presente en el griego.
- source_word: ἐπεισαγωγὴ
  english_pob_choice: the introduction
  chosen_spanish: la introducción
  alternatives_spanish:
  - el introducir
  - la incorporación
  - la entrada
  lexicon: BDAG
  rationale: El sustantivo raro expresa una introducción o incorporación en contraste con la insuficiencia de la ley. 'La introducción' mantiene el sustantivo como en el griego y sigue de cerca la lectura de la POB inglesa.
- source_word: κρείττονος ἐλπίδος
  english_pob_choice: of a better hope
  chosen_spanish: de una esperanza mejor
  alternatives_spanish:
  - de la esperanza mejor
  - de una esperanza superior
  lexicon: BDAG
  rationale: κρείττων es un comparativo clave en Hebreos; 'mejor' preserva ese patrón léxico. El sustantivo anarthro en español se expresa naturalmente con artículo indefinido.
- source_word: δι’ ἧς
  english_pob_choice: through which
  chosen_spanish: mediante la cual
  alternatives_spanish:
  - por la cual
  - a través de la cual
  lexicon: BDAG
  rationale: El relativo femenino remite a 'esperanza'. 'Mediante la cual' expresa instrumento o medio con registro sobrio y claro; evita una repetición demasiado literal de 'por'.
- source_word: ἐγγίζομεν
  english_pob_choice: we draw near
  chosen_spanish: nos acercamos
  alternatives_spanish:
  - nos aproximamos
  - nos llegamos
  lexicon: BDAG
  rationale: En Hebreos el verbo conserva resonancia de acceso cultual a Dios. 'Nos acercamos' comunica ese movimiento de acceso con naturalidad en español y mantiene la imagen.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo con ἐγγίζομεν se vierte de manera idiomática como 'a Dios'. Conserva la orientación de acercamiento personal y relacional.
theological_decisions:
- issue: Sentido de τελειόω respecto de la ley
  english_pob_reading: The law perfected nothing.
  chosen_spanish_reading: La ley no perfeccionó nada.
  alternative_spanish_readings:
  - La ley no hizo perfecto nada.
  - La ley no llevó a la perfección nada.
  rationale: 'Hebreos usa τελειόω con peso teológico: llevar al estado de meta, plenitud o acceso válido ante Dios. ''Perfeccionó'' mantiene la tensión sin reducir el verso a ''no sirvió para nada''.'
  doctrine_reference: Hebreos 7:19; Hebreos 9:9; Hebreos 10:1
- issue: Estructura elíptica entre la negación y la esperanza mejor
  english_pob_reading: but there is the introduction of a better hope
  chosen_spanish_reading: sino que hay la introducción de una esperanza mejor
  alternative_spanish_readings:
  - sino que está la introducción de una esperanza mejor
  - sino que existe la introducción de una esperanza mejor
  rationale: El griego es nominal y el inglés POB conserva esa estructura. En español, 'hay la introducción' reproduce la elipsis de manera comprensible sin añadir un verbo interpretativo más fuerte como 'es introducida'.
  doctrine_reference: Hebreos 7:19; filosofía de traducción optimal-equivalence
- issue: Acceso a Dios como resultado de la esperanza mejor
  english_pob_reading: through which we draw near to God
  chosen_spanish_reading: mediante la cual nos acercamos a Dios
  alternative_spanish_readings:
  - por la cual nos acercamos a Dios
  - a través de la cual nos acercamos a Dios
  rationale: La frase conserva el lenguaje cultual de acceso presente en Hebreos. 'Nos acercamos a Dios' preserva la relación de aproximación reverente sin añadir explicaciones doctrinales ajenas al texto.
  doctrine_reference: Hebreos 4:16; Hebreos 10:19-22
translation_notes:
  revision_awareness: La POB inglesa mantiene una estructura nominal en la segunda mitad y una nota léxica para ἐτελείωσεν. En español se preserva la negación absoluta con 'nada', el valor aspectual/teológico de τελειόω con 'perfeccionó', y la elipsis con 'hay la introducción'. No se introdujeron cambios de sentido ni se suavizó la tensión entre ley y esperanza mejor.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεῷ, conforme al estándar del proyecto.
  - Se eligió 'ley' en minúscula por referirse al sistema mosaico en contexto, no a un título tipográfico.
  - '''Esperanza mejor'' conserva el comparativo κρείττων, alineado con el vocabulario recurrente de Hebreos.'
  - '''Nos acercamos'' mantiene la resonancia cultual de ἐγγίζομεν sin forzar una terminología técnica.'
  - Las notas al pie se anclan solo en los puntos donde hay alternativa léxica real en español.
