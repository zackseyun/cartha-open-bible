  to: Y muchos han llegado a ser sacerdotes[a], porque la muerte les impide permanecer en el cargo[b].
  rationale: La revisión elimina un matiz añadido en el conector inicial, mejora la naturalidad del español al expresar la causa con «la muerte les impide», y pule la nota alternativa para que coincida mejor con el estilo y la documentación del English POB, sin cambiar el sentido ni la estructura argumentativa del versículo.
