translation:
  language: es
  text: Y muchos han llegado a ser sacerdotes[a], porque la muerte les impide permanecer en el cargo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han sido muchos sacerdotes».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «de permanecer»; el sentido en contexto es permanecer en el oficio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y también
  alternatives_spanish:
  - Y
  - Además
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva el enlace discursivo simple del griego. «También» ayuda a reflejar la función continuativa y el matiz de transición que en inglés se expresó con «indeed» para anticipar el contraste del v. 24, sin introducir interpretación extra.
- source_word: οἱ μὲν πλείονές εἰσιν γεγονότες ἱερεῖς
  english_pob_choice: they indeed have become many priests
  chosen_spanish: muchos han llegado a ser sacerdotes
  alternatives_spanish:
  - han sido muchos sacerdotes
  - ha habido muchos sacerdotes
  - los sacerdotes anteriores han sido muchos
  lexicon: BDAG
  rationale: «Han llegado a ser» preserva el valor resultativo del participio perfecto γεγονότες. «Muchos sacerdotes» mantiene la pluralidad enfática sin forzar una reconstrucción más explícita que el griego no da. Se evita «levitas» o «sacerdocio levítico» porque no aparecen en el texto inmediato.
- source_word: διὰ τὸ θανάτῳ κωλύεσθαι
  english_pob_choice: because they are prevented by death
  chosen_spanish: porque por la muerte se les impide
  alternatives_spanish:
  - porque la muerte les impide
  - porque fueron impedidos por la muerte
  - porque la muerte los detiene
  lexicon: BDAG
  rationale: La construcción causal de διά + infinitivo articula la razón. «Se les impide» representa bien el pasivo κωλύεσθαι con naturalidad en español; «por la muerte» conserva el valor instrumental/causal de θανάτῳ.
- source_word: παραμένειν
  english_pob_choice: from remaining in office
  chosen_spanish: permanecer en el cargo
  alternatives_spanish:
  - seguir
  - continuar
  - permanecer
  lexicon: BDAG
  rationale: En contexto sacerdotal, παραμένειν no es mera permanencia física sino continuidad en la función. «En el cargo» comunica ese sentido sin añadir una glosa demasiado extensa, equivalente funcional de la nota inglesa que explicita «in office».
theological_decisions:
- issue: Alcance del contraste sacerdotal
  english_pob_reading: The verse stresses the many former priests because mortality prevented them from continuing, preparing the contrast with Jesus' enduring priesthood in the next verse.
  chosen_spanish_reading: El versículo subraya la multiplicidad de sacerdotes anteriores, causada por la mortalidad, y deja preparado el contraste con el sacerdocio permanente de Jesús en el versículo siguiente.
  alternative_spanish_readings:
  - Mencionar explícitamente el sacerdocio levítico en el texto principal
  - Traducir de manera más interpretativa para decir que la ley producía sucesiones sacerdotales
  rationale: El griego no nombra aquí «levítico»; la traducción mantiene la argumentación textual sin añadir una especificación doctrinal o histórica que pertenece al contexto inmediato y no a la frase misma. Así se preserva la tensión retórica entre la multitud de sacerdotes y la permanencia del sacerdocio de Cristo/Jesús en el v. 24.
  doctrine_reference: Prioridad del texto original; mantener la tensión argumental sin sobreexplicar en la línea principal.
translation_notes:
  revision_awareness: Coincido con el último pase de revisión en que no hacía falta cambiar el sentido principal. La traducción española sigue la misma línea de equivalencia óptima, conservando el énfasis en la multiplicidad de sacerdotes y en la imposibilidad de continuar por causa de la muerte, sin ampliar indebidamente el texto.
  spanish_consistency_notes:
  - Se mantiene «sacerdotes» para ἱερεῖς, conforme al contexto del pasaje.
  - «Por la muerte» conserva la causalidad/instrumentalidad de θανάτῳ sin convertirla en una explicación doctrinal.
  - «En el cargo» explicita el valor contextual de παραμένειν, paralelo a la nota auditada en inglés.
  - Se evita «SEÑOR» u otros términos no pertinentes porque el versículo no contiene el nombre divino ni κύριος.
