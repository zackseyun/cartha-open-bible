source:
  edition: SBLGNT
  text: καὶ οἱ μὲν ἐκ τῶν υἱῶν Λευὶ τὴν ἱερατείαν λαμβάνοντες ἐντολὴν ἔχουσιν ἀποδεκατοῦν τὸν λαὸν κατὰ τὸν νόμον, τοῦτ’ ἔστιν τοὺς ἀδελφοὺς αὐτῶν, καίπερ ἐξεληλυθότας ἐκ τῆς ὀσφύος Ἀβραάμ·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/005.yaml
  text: And those from the sons of Levi who receive the priesthood have a command according to the law to collect a tenth from the people—that is[b][a], from their brothers—though they also have come from Abraham’s loins.
  footnotes:
  - marker: a
    text: Or “their fellow Israelites.” The Greek says “their brothers,” using masculine kinship language for fellow members of the people.
    reason: lexical_alternative
  - marker: b
    text: Or “are descended from Abraham.” Literally, “have come out from Abraham’s loins.”
    reason: lexical_alternative
