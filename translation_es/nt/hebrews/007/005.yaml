translation:
  language: es
  text: Y los que provienen de los hijos de Leví, los que reciben el sacerdocio, tienen el mandato, según la ley, de cobrar los diezmos del pueblo, es decir, de sus hermanos[a], aunque ellos también han salido de los lomos de Abraham[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus compatriotas israelitas”. El griego dice “sus hermanos”, usando lenguaje de parentesco masculino para los miembros del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O “descienden de Abraham”. Literalmente, “han salido de los lomos de Abraham”.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν ἐκ τῶν υἱῶν Λευὶ
  english_pob_choice: those from the sons of Levi
  chosen_spanish: los que de los hijos de Leví
  alternatives_spanish:
  - los de los hijos de Leví
  - los descendientes de Leví
  lexicon: BDAG
  rationale: Conserva el matiz partitivo de ἐκ y la referencia familiar de υἱῶν sin reducirlo a un término técnico como “levitas”, para mantener el foco en quienes proceden de la línea de Leví.
- source_word: τὴν ἱερατείαν λαμβάνοντες
  english_pob_choice: who receive the priesthood
  chosen_spanish: reciben el sacerdocio
  alternatives_spanish:
  - reciben el oficio sacerdotal
  - toman el sacerdocio
  lexicon: BDAG
  rationale: “Reciben” expresa bien la idea de recibir una investidura o asignación; “sacerdocio” es un equivalente natural y formal para ἱερατεία.
- source_word: ἐντολὴν ἔχουσιν
  english_pob_choice: have a command
  chosen_spanish: tienen un mandamiento
  alternatives_spanish:
  - tienen una orden
  - están mandados
  lexicon: BDAG
  rationale: Mantiene la construcción nominal del griego y el peso normativo-covenantal de ἐντολή. “Mandamiento” es más exacto que reducirlo a una simple orden.
- source_word: ἀποδεκατοῦν
  english_pob_choice: to collect a tenth
  chosen_spanish: tomar el diezmo
  alternatives_spanish:
  - cobrar el diezmo
  - recibir el diezmo
  lexicon: BDAG
  rationale: El verbo indica recibir un décimo de otros, no darlo. “Tomar el diezmo” conserva la acción sin forzar una paráfrasis que pudiera oscurecer el sentido.
- source_word: τὸν λαὸν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo de Israel
  - la nación
  lexicon: BDAG
  rationale: Es la traducción directa y suficientemente clara; el contexto inmediato ya aclara que se trata de sus propios hermanos dentro de Israel.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: según la ley
  alternatives_spanish:
  - conforme a la ley
  - bajo la ley
  lexicon: BDAG
  rationale: “Según la ley” reproduce de modo natural el valor normativo de κατά con acusativo y mantiene explícito el contexto mosaico.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - a saber
  lexicon: BDAG
  rationale: Equivalente explicativo natural en español para introducir la apposición aclaratoria.
- source_word: τοὺς ἀδελφοὺς αὐτῶν
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos[a]
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus compatriotas israelitas
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego y el lenguaje de parentesco/covenio. La nota aclara que el alcance funcional puede ser más amplio, pero el texto mantiene “hermanos” por fidelidad léxica.
- source_word: καίπερ
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: BDAG
  rationale: “Aunque” expresa de manera clara la concesión que introduce καίπερ en español contemporáneo.
- source_word: ἐξεληλυθότας ἐκ τῆς ὀσφύος Ἀβραάμ
  english_pob_choice: though they also have come from Abraham’s loins
  chosen_spanish: aunque ellos también han salido de los lomos de Abraham[b]
  alternatives_spanish:
  - aunque ellos también proceden de Abraham
  - aunque también descienden de Abraham
  lexicon: BDAG
  rationale: Se preserva la imagen corporal y genealógica de ὀσφύς con “lomos”, porque la argumentación de Hebreos 7 depende de esa descendencia física compartida. “Han salido” refleja bien el perfecto de ἐξεληλυθότας.
theological_decisions:
- issue: Lenguaje de parentesco masculino en contexto israelita representativo
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus compatriotas israelitas
  - sus hermanos y hermanas
  rationale: La forma griega es masculina y el contexto es de parentesco dentro del pueblo. Se conserva “hermanos” en el texto principal y se deja abierta en nota la amplitud referencial sin neutralizarla en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Retención del idiomático corporal de descendencia
  english_pob_reading: have come from Abraham’s loins
  chosen_spanish_reading: han salido de los lomos de Abraham
  alternative_spanish_readings:
  - proceden de Abraham
  - descienden de Abraham
  rationale: La comparación argumentativa en Hebreos 7 depende de una descendencia física común. Mantener la imagen corporal conserva la fuerza retórica y el énfasis genealógico del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se mantuvo “mandamiento” para ἐντολή en un registro formal, y se reflejó καίπερ con una concesión natural (“aunque”) sin intensificar indebidamente el matiz.'
  spanish_consistency_notes:
  - Se usa “Leví” con acento gráfico según la ortografía castellana habitual.
  - Se mantiene “lomos” para ὀσφύος por coherencia con el sentido corporal y genealógico del pasaje.
  - El texto principal conserva la referencia masculina plural “hermanos”, con aclaración en nota para el alcance inclusivo posible del grupo.
  - La puntuación con guiones largos reproduce la apposición explicativa del original y del inglés auditado.
