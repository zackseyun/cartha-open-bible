translation:
  language: es
  text: Porque aquel de quien se dicen estas cosas pertenece a otra tribu[a], de la cual nadie ha atendido al altar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha tenido parte en otra tribu» o «ha venido de otra tribu». El verbo griego puede denotar participación o asociación; aquí se refiere a la pertenencia tribal.
    reason: lexical_alternative
  - marker: b
    text: O «ha servido en el altar». La expresión se refiere a la asistencia o al servicio sacerdotal relacionado con el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφ’ ὃν
  english_pob_choice: about whom
  chosen_spanish: el que es objeto de estas cosas
  alternatives_spanish:
  - el que es motivo de estas cosas
  - el respecto de quien se dicen estas cosas
  lexicon: BDAG
  rationale: La construcción griega expresa referencia o relación con la persona de quien se habla. En español, «el que es objeto de estas cosas» conserva esa referencia sin forzar una preposición poco natural y mantiene el enfoque del argumento.
- source_word: λέγεται ταῦτα
  english_pob_choice: these things are said
  chosen_spanish: estas cosas
  alternatives_spanish:
  - se dicen estas cosas
  - se hablan estas cosas
  lexicon: BDAG
  rationale: El pasivo presente con plural neutro se refleja de forma natural con «estas cosas» dentro de la perífrasis «es objeto de estas cosas», evitando una calca rígida y preservando la pasividad implícita.
- source_word: φυλῆς ἑτέρας
  english_pob_choice: another tribe
  chosen_spanish: otra tribu
  alternatives_spanish:
  - una tribu diferente
  - una tribu distinta
  lexicon: BDAG
  rationale: «Tribu» es el término adecuado en el contexto israelita. «Otra» comunica bien la distinción respecto de la tribu sacerdotal en discusión sin añadir matices no presentes en el griego.
- source_word: μετέσχηκεν
  english_pob_choice: belongs to
  chosen_spanish: pertenece
  alternatives_spanish:
  - ha pertenecido
  - tiene parte en
  - ha compartido en
  lexicon: BDAG
  rationale: El perfecto expresa una asociación estable y vigente para el razonamiento del pasaje. «Pertenece» comunica mejor esa relevancia presente que una traducción meramente retrospectiva. Se evita «ha compartido» porque en español suena más general y menos tribal.
- source_word: ἀφ’ ἧς
  english_pob_choice: from which
  chosen_spanish: de la cual
  alternatives_spanish:
  - de quien
  - desde la cual
  lexicon: BDAG
  rationale: El antecedente es «tribu», por lo que el femenino singular «la cual» resulta correcto y claro en español.
- source_word: προσέσχηκεν τῷ θυσιαστηρίῳ
  english_pob_choice: has served at the altar
  chosen_spanish: ha servido en el altar
  alternatives_spanish:
  - ha atendido al altar
  - ha oficiado en el altar
  - ha estado al servicio del altar
  lexicon: BDAG
  rationale: El verbo sugiere adherirse o prestar atención/servicio en contexto cultual. En español, «ha servido en el altar» expresa con naturalidad la función sacerdotal sin perder el sentido de servicio conectado con el altar. Se prefiere «en» para el ámbito de servicio, conforme al uso natural del español litúrgico-bíblico.
- source_word: θυσιαστηρίῳ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - lugar de sacrificio
  lexicon: BDAG
  rationale: «Altar» es la forma estándar y clara en contexto sacrificial.
theological_decisions:
- issue: Relación tribal de la persona de quien se habla con el argumento sacerdotal
  english_pob_reading: Render the verse in a way that highlights tribal affiliation without importing later doctrinal explanation.
  chosen_spanish_reading: El versículo destaca la pertenencia a otra tribu y el servicio sacerdotal ligado al altar, sin añadir explicaciones doctrinales que no están explícitas en la frase.
  alternative_spanish_readings:
  - El que es descendiente de otra tribu
  - El que procede de otra tribu
  rationale: El griego habla de pertenencia/participación en otra tribu, no dice explícitamente «descendiente» o «procedente». La redacción española conserva la tensión textual y no amplía el contenido más allá del argumento inmediato.
  doctrine_reference: Hebreos 7:13; traslado del énfasis argumentativo del texto
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al preferir un presente de relevancia («pertenece») y una formulación de servicio sacerdotal más natural en el contexto cultual («ha servido en el altar»). También evita sobreinterpretar μετέσχηκεν como descendencia explícita, manteniendo la asociación tribal que el griego sí expresa.
  spanish_consistency_notes:
  - Se mantiene «tribu» para φυλή en sentido israelita.
  - Se usa «altar» de forma consistente para θυσιαστήριον.
  - Se preserva el sentido relacional de ἐφ’ ὃν con una construcción española natural.
  - No se introduce «Cristo» ni «Mesías» porque el versículo no los contiene explícitamente.
