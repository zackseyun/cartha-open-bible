translation:
  language: es
  text: Y es aún más evidente, si surge otro sacerdote[a] conforme a la semejanza de Melquisedec[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sacerdote diferente», para resaltar que ἕτερος puede señalar distinción, no solo adición numérica.
    reason: lexical_alternative
  - marker: b
    text: La expresión «conforme a la semejanza de Melquisedec» retoma el lenguaje de Salmo 110:4 y el argumento desarrollado en este capítulo.
    reason: cross_reference
lexical_decisions:
- source_word: περισσότερον ἔτι
  english_pob_choice: even more
  chosen_spanish: aún más
  alternatives_spanish:
  - todavía más
  - mucho más
  lexicon: BDAG
  rationale: La expresión intensifica el argumento; «aún más» conserva el escalamiento de manera natural en español sin añadir fuerza excesiva.
- source_word: κατάδηλόν
  english_pob_choice: evident
  chosen_spanish: evidente
  alternatives_spanish:
  - claro
  - manifiesto
  - muy claro
  lexicon: BDAG
  rationale: «Evidente» reproduce bien el valor de manifiesto/visible del adjetivo y mantiene un registro digno y claro.
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - puesto que
  - cuando
  lexicon: BDAG
  rationale: Se conserva la forma condicional explícita del griego; el matiz inferencial queda para el contexto argumentativo.
- source_word: κατὰ τὴν ὁμοιότητα
  english_pob_choice: according to the likeness of
  chosen_spanish: conforme a la semejanza de
  alternatives_spanish:
  - según la semejanza de
  - a la semejanza de
  - con arreglo a la semejanza de
  lexicon: BDAG
  rationale: «Conforme a» comunica bien la relación normativa o correspondiente del griego κατὰ en este contexto y mantiene la alusión a Salmo 110:4 sin sonar forzado en español.
- source_word: Μελχισέδεκ
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Melchisedec
  lexicon: convención transliterada
  rationale: Se usa la transliteración estándar en español bíblico; «Melquisedec» es la forma más reconocible y natural para lectores en español.
- source_word: ἀνίσταται
  english_pob_choice: arises
  chosen_spanish: surge
  alternatives_spanish:
  - se levanta
  - aparece
  - es levantado
  lexicon: BDAG
  rationale: «Surge» expresa la aparición o entrada de un nuevo sacerdote sin cargar innecesariamente con connotaciones de resurrección; refleja bien el movimiento de la imagen.
- source_word: ἱερεὺς ἕτερος
  english_pob_choice: another priest
  chosen_spanish: otro sacerdote
  alternatives_spanish:
  - un sacerdote diferente
  - otro sacerdote distinto
  lexicon: BDAG
  rationale: «Otro sacerdote» es la formulación natural y fiel. En español, el matiz de ἕτερος como «diferente» queda disponible en la nota para no perder la tensión léxica.
theological_decisions:
- issue: Matiz de ἕτερος en la comparación sacerdotal
  english_pob_reading: 'another priest; alternative note: a different priest, highlighting that ἕτερος can emphasize distinctness, not merely numerical addition.'
  chosen_spanish_reading: otro sacerdote
  alternative_spanish_readings:
  - un sacerdote diferente
  - otro sacerdote distinto
  rationale: La frase principal debe sonar natural y suficientemente precisa; el contraste de distinta clase o identidad se preserva mediante la comparación con Melquisedec y en la nota, sin sobrerresolver el matiz.
  doctrine_reference: Preservar tensión léxica y teológica; no neutralizar diferencias de orden sacerdotal.
- issue: Valor inferencial de la oración condicional
  english_pob_reading: if another priest arises according to the likeness of Melchizedek
  chosen_spanish_reading: si surge otro sacerdote conforme a la semejanza de Melquisedec
  alternative_spanish_readings:
  - si se levanta otro sacerdote conforme a la semejanza de Melquisedec
  - si aparece otro sacerdote conforme a la semejanza de Melquisedec
  rationale: La formulación mantiene la estructura del griego y la lógica del argumento de Hebreos, dejando que el flujo discursivo produzca el énfasis sin convertir la oración en paráfrasis causal.
  doctrine_reference: Respeto a la sintaxis inspirada y a la progresión argumentativa del pasaje.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego SBLGNT y el audit trail inglés de la POB, especialmente la decisión revisada de reflejar directamente ἐστιν con una forma de «ser» implícita en español mediante la construcción copulativa («es… evidente»). Se evitó depender mecánicamente del inglés: se ajustó κατὰ τὴν ὁμοιότητα a una preposición española más idiomática («conforme a») y ἀνίσταται a «surge» para conservar la imagen contextual sin sobrerinterpretar.'
  spanish_consistency_notes:
  - Se mantiene «Melquisedec» como transliteración estándar en español.
  - Se conserva «sacerdote» como término técnico coherente con Hebreos.
  - «Evidente» y «aún más» reflejan la intensificación del original sin añadir contenido.
  - No se usa «Cristo» ni terminología eclesiástica añadida, porque el versículo no la requiere.
  - La puntuación y el orden buscan legibilidad pública en español, manteniendo la estructura argumentativa del griego.
