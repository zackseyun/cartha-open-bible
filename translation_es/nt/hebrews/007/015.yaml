  text: Καὶ περισσότερον ἔτι κατάδηλόν ἐστιν, εἰ κατὰ τὴν ὁμοιότητα Μελχισέδεκ ἀνίσταται ἱερεὺς ἕτερος,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/015.yaml
  text: And it is even more evident[a], if another priest arises according to the likeness of Melchizedek[b],
