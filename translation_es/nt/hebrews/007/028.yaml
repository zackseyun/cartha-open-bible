translation:
  language: es
  text: Porque la ley establece como sumos sacerdotes a hombres que tienen debilidad, pero la palabra del juramento, posterior a la ley, establece a un Hijo[a] que ha sido perfeccionado[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Hijo». El griego tiene «un Hijo» sin artículo, subrayando el contraste con «hombres», aunque el contexto se refiere a Jesús.
    reason: alternative_reading
  - marker: b
    text: O, «hecho perfecto para siempre»; el verbo también puede transmitir «llevado a su plenitud» o, en contexto sacerdotal, «consagrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  lexicon: BDAG
  rationale: En Hebreos se refiere al orden legal/cultual mosaico. En español, «la ley» es natural y conserva la referencia al sistema sacerdotal sin forzar una paráfrasis.
- source_word: καθίστησιν
  english_pob_choice: appoints
  chosen_spanish: establece
  alternatives_spanish:
  - designa
  - nombra
  - constituye
  lexicon: BDAG
  rationale: En un contexto de oficio sacerdotal, el verbo expresa la acción de instituir formalmente. «Establece» comunica esa función con fluidez en español y evita un calco pesado.
- source_word: ἀνθρώπους
  english_pob_choice: men
  chosen_spanish: a hombres
  alternatives_spanish:
  - a seres humanos
  - a personas
  lexicon: BDAG
  rationale: El referente histórico del sumo sacerdocio levítico es masculino; por eso «hombres» preserva el valor concreto del griego y el contraste con «un Hijo».
- source_word: ἀρχιερεῖς
  english_pob_choice: high priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - pontífices
  - sacerdotes principales
  lexicon: BDAG
  rationale: «Sumos sacerdotes» es la manera más clara y eclesialmente inteligible de expresar el cargo singular representado por sucesivos titulares.
- source_word: ἔχοντας ἀσθένειαν
  english_pob_choice: who have weakness
  chosen_spanish: que tienen debilidad
  alternatives_spanish:
  - que son débiles
  - sujetos a debilidad
  lexicon: BDAG
  rationale: Se conserva el sustantivo ἀσθένεια con «debilidad» para mantener la fuerza léxica y la amplitud semántica de fragilidad humana, no solo enfermedad física.
- source_word: λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la declaración
  - la palabra dada
  lexicon: BDAG
  rationale: Aquí λόγος funciona como la declaración pronunciada en el juramento de Dios. «La palabra» conserva el registro bíblico y la relación con el anuncio juramentado.
- source_word: ὁρκωμοσίας
  english_pob_choice: the oath
  chosen_spanish: del juramento
  alternatives_spanish:
  - del voto
  - del solemne juramento
  lexicon: BDAG
  rationale: El genitivo se expresa naturalmente con «del juramento»; así se mantiene la conexión con el pronunciamiento divino sin añadir explicaciones ajenas al texto.
- source_word: τῆς μετὰ τὸν νόμον
  english_pob_choice: which came after the law
  chosen_spanish: posterior a la ley
  alternatives_spanish:
  - que vino después de la ley
  - después de la ley
  lexicon: BDAG
  rationale: La versión española deja explícita la prioridad temporal del juramento respecto de la ley, con una formulación breve y fiel al argumento de Hebreos.
- source_word: υἱόν
  english_pob_choice: a Son
  chosen_spanish: un Hijo
  alternatives_spanish:
  - el Hijo
  - un hijo
  lexicon: BDAG
  rationale: Se preserva el artículo indefinido del griego, que marca contraste con «hombres». «Hijo» con mayúscula en contexto cristológico mantiene la referencia a Jesús sin borrar la forma anártrica del original.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: BDAG
  rationale: «Para siempre» es la equivalencia idiomática más natural en español y transmite la idea de duración indefinida/endurecimiento permanente del estado sacerdotal.
- source_word: τετελειωμένον
  english_pob_choice: perfected
  chosen_spanish: ha sido perfeccionado
  alternatives_spanish:
  - ha sido hecho perfecto
  - ha sido llevado a su plenitud
  - ha sido consagrado
  lexicon: BDAG
  rationale: Se mantiene la pasiva perfecta para reflejar el estado resultante del participio. «Perfeccionado» conserva la terminología de Hebreos sobre llevar a plenitud/completud; «consagrado» queda como matiz posible, no como sustituto principal.
theological_decisions:
- issue: Contraste entre sacerdotes humanos y el Hijo del juramento
  english_pob_reading: appoints men as high priests ... but the word of the oath ... appoints a Son
  chosen_spanish_reading: establece a hombres como sumos sacerdotes ... pero la palabra del juramento ... establece a un Hijo
  alternative_spanish_readings:
  - nombra a hombres como sumos sacerdotes ... pero ... nombra al Hijo
  - constituye ...
  rationale: 'La traducción conserva el contraste estructural y teológico del versículo: el sistema de la ley produce sacerdotes humanos con debilidad, mientras que el juramento divino establece al Hijo. No se diluye la tensión entre ambos sujetos ni se sustituye el carácter del juramento por una formulación más doctrinalmente cerrada.'
  doctrine_reference: Hebreos 7:28; doctrina de Cristo sumo sacerdote
- issue: Sentido de τετελειωμένον en la teología sacerdotal de Hebreos
  english_pob_reading: has been perfected forever
  chosen_spanish_reading: ha sido perfeccionado para siempre
  alternative_spanish_readings:
  - ha sido hecho perfecto para siempre
  - ha sido consagrado para siempre
  - ha sido llevado a su plenitud para siempre
  rationale: Se conserva el lenguaje de «perfección» propio de Hebreos para no neutralizar el desarrollo temático del libro. La forma pasiva y el alcance permanente se mantienen, sin resolver prematuramente si el énfasis es completitud, aptitud sacerdotal o consagración.
  doctrine_reference: Hebreos 2:10; 5:9; 7:28
- issue: Valor de ἀνθρώπους frente a υἱόν
  english_pob_reading: men ... a Son
  chosen_spanish_reading: hombres ... un Hijo
  alternative_spanish_readings:
  - personas ... un Hijo
  - seres humanos ... el Hijo
  rationale: La elección mantiene la asimetría del griego y el contraste retórico entre lo humano y el Hijo. En español, «hombres» evita que el texto pierda el matiz histórico del sacerdocio levítico y preserva la fuerza del paralelismo.
  doctrine_reference: Hebreos 7:28; cristología de Hebreos
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail en cuanto a reflejar explícitamente el participio perfecto pasivo con «ha sido perfeccionado». También conserva el matiz de la anartrosis de υἱόν mediante «un Hijo», como en la lectura inglesa auditada. Se evitó una traducción que diluyera el contraste legal/sacerdotal o que sustituyera la terminología de Hebreos por una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se mantiene «la ley» en minúscula, siguiendo el valor contextual mosaico y la convención española natural.
  - «Sumos sacerdotes» se usa para ἀρχιερεῖς, evitando «principales sacerdotes», que en español podría sonar a otro cargo.
  - «Debilidad» conserva la amplitud de ἀσθένεια y no se reduce a enfermedad corporal.
  - «Un Hijo» respeta la ausencia del artículo en el griego; la mayúscula indica el referente cristológico sin borrar la forma gramatical.
  - «Ha sido perfeccionado» mantiene la pasiva perfecta y el léxico propio de Hebreos, sin cerrar indebidamente el sentido entre perfección, plenitud y consagración.
