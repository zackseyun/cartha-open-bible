  text: ὁ νόμος γὰρ ἀνθρώπους καθίστησιν ἀρχιερεῖς ἔχοντας ἀσθένειαν, ὁ λόγος δὲ τῆς ὁρκωμοσίας τῆς μετὰ τὸν νόμον υἱόν, εἰς τὸν αἰῶνα τετελειωμένον.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/028.yaml
  text: For the law appoints men as high priests who have weakness[a], but the word of the oath, which came after the law[b], appoints a Son who has been perfected forever.
  footnotes:
  - marker: a
    text: Or, 'the Son.' Greek has 'a Son' without the article, emphasizing the contrast with 'men' while still referring to Jesus in context.
    reason: alternative_reading
  - marker: b
    text: Or, 'made perfect forever'; the verb can also carry the sense 'brought to completion' or, in priestly context, 'consecrated.'
    reason: lexical_alternative
