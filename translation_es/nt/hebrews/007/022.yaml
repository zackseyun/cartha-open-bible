translation:
  language: es
  text: En esa misma medida,[a] Jesús ha llegado a ser el garante de un mejor pacto.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hasta tal punto» o «En esa medida». La expresión griega indica grado o medida en relación con lo dicho antes.
    reason: alternative_reading
  - marker: b
    text: O «testamento». La palabra griega puede significar «pacto» o, en ciertos contextos, «testamento»; aquí «pacto» encaja mejor con el argumento sobre el sacerdocio y el juramento.
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ τοσοῦτο
  english_pob_choice: By so much
  chosen_spanish: De tanto
  alternatives_spanish:
  - Hasta tal punto
  - En esa medida
  - Por tanto
  lexicon: BDAG
  rationale: La expresión griega indica medida o extensión, y la versión española debe conservar la relación comparativa con el argumento anterior. «De tanto» comunica esa idea de grado de manera breve y natural en español, sin perder el valor correlativo de la construcción.
- source_word: κρείττονος
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - superior
  - más excelente
  lexicon: BDAG
  rationale: En Hebreos, κρείττων forma parte del contraste recurrente entre realidades antiguas y nuevas. «Mejor» es la equivalencia más directa y natural en español, y mantiene el paralelismo retórico del libro mejor que «superior».
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «covenant», en español «pacto» expresa bien el sentido relacional y jurídico de διαθήκη en este contexto sacerdotal y juramentado. «Testamento» es posible en ciertos contextos, pero aquí introduciría una ambigüedad innecesaria; «alianza» es viable, pero «pacto» resulta más directo y ampliamente inteligible.
- source_word: γέγονεν
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha hecho
  - ha devenido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι presenta un resultado presente de una acción ya cumplida. «Ha llegado a ser» conserva ese valor aspectual de estado resultante y suena natural en español; evita la rigidez de «ha sido hecho» y mantiene la idea de cambio efectivo.
- source_word: ἔγγυος
  english_pob_choice: guarantor
  chosen_spanish: garante
  alternatives_spanish:
  - fiador
  - fiador/garante
  - seguro
  lexicon: BDAG
  rationale: ἔγγυος designa a quien responde por una obligación. «Garante» transmite con precisión la función personal del término en español moderno. «Fiador» también es posible, pero puede sonar más técnico o jurídico según la región; «garante» es más transparente y evita reducir la figura a un matiz exclusivamente financiero.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: Nombre propio estándar
  rationale: Se conserva la transliteración habitual del nombre propio griego al español.
theological_decisions:
- issue: Sentido de διαθήκη en Hebreos 7:22
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  rationale: El contexto inmediato trata del sacerdocio y del juramento que establece un orden mejor, por lo que el sentido relacional-jurídico es el dominante. «Pacto» mantiene esa carga teológica sin introducir prematuramente la acepción de «testamento»; esta última queda como posibilidad semántica real, pero secundaria aquí.
  doctrine_reference: Translation philosophy §1, §3; el valor contextual de διαθήκη en Hebreos
- issue: Matiz de κατὰ τοσοῦτο al inicio de la frase
  english_pob_reading: By so much
  chosen_spanish_reading: De tanto
  alternative_spanish_readings:
  - Hasta tal punto
  - En esa medida
  rationale: La frase abre una relación de grado con el argumento precedente. «De tanto» conserva esa dependencia discursiva y evita convertir la idea en una simple inferencia lógica («por tanto»), que debilitaría el matiz de medida.
  doctrine_reference: Coherencia discursiva y comparativa del pasaje
- issue: Valor de ἔγγυος aplicado a Jesús
  english_pob_reading: guarantor
  chosen_spanish_reading: garante
  alternative_spanish_readings:
  - fiador
  rationale: El texto presenta a Jesús como la persona que asegura la validez y eficacia del mejor pacto. «Garante» expresa bien esa función sin desplazar el foco hacia una connotación meramente monetaria o procesal.
  doctrine_reference: Cristología mediadora en Hebreos 7
translation_notes:
  revision_awareness: 'Se siguió el último pase sin cambios del auditor inglés (latest_revision_pass: unchanged = true; cross_check status: high_agreement, verdict: minor-issues). No hubo revisiones aplicadas, así que el español se construyó directamente desde el griego con el audit trail inglés como control contextual, no como base mecánica.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Jesús» y no se sustituyó por un título.
  - Se eligió «pacto» para διαθήκη, reservando «testamento» solo como alternativa anotada, conforme al contexto de Hebreos.
  - Se conservó el valor comparativo de la apertura con una expresión de medida, no con una conclusión lógica.
  - Se evitó «SEÑOR» porque en este versículo el texto griego nombra explícitamente a Jesús.
