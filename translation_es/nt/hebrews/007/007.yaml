translation:
  language: es
  text: Y, más allá de toda disputa[a], el menor recibe bendición del mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin ninguna disputa» o «sin contradicción».
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς δὲ πάσης ἀντιλογίας
  english_pob_choice: Now beyond all dispute
  chosen_spanish: Ahora, más allá de toda disputa
  alternatives_spanish:
  - Y sin ninguna disputa
  - Pero aparte de toda contradicción
  - Sin duda
  lexicon: BDAG
  rationale: La frase griega introduce una afirmación presentada como evidente. «Más allá de toda disputa» conserva el sentido idiomático de χωρὶς + genitivo y reproduce con naturalidad en español la fuerza de «beyond all dispute». «Ahora» marca la transición discursiva suave de δέ sin cargar contraste excesivo.
- source_word: τὸ ἔλαττον
  english_pob_choice: the lesser
  chosen_spanish: el menor
  alternatives_spanish:
  - el inferior
  - el más pequeño
  - el menor de menor rango
  lexicon: BDAG
  rationale: 'El neutro sustantivado funciona de modo comparativo y genérico: «el menor/la parte menor». En este contexto de rango y bendición, «el menor» expresa bien la relación de inferioridad relativa sin sugerir inferioridad moral.'
- source_word: ὑπὸ τοῦ κρείττονος
  english_pob_choice: by the greater
  chosen_spanish: por el mayor
  alternatives_spanish:
  - por el superior
  - por el mejor
  - por el más grande
  lexicon: BDAG
  rationale: Con ὑπό + genitivo, la construcción marca agente en la pasiva. «El mayor» comunica de manera directa la superioridad jerárquica que el argumento de Hebreos desarrolla.
- source_word: εὐλογεῖται
  english_pob_choice: is blessed
  chosen_spanish: es bendecido
  alternatives_spanish:
  - recibe bendición
  - es bendecido con una bendición
  - recibe la bendición
  lexicon: BDAG
  rationale: El pasivo presente expresa que el sujeto recibe bendición. «Es bendecido» es la opción más directa y conserva el sentido sacerdotal/covenantal del verbo, mejor que un giro más débil como «se habla bien de él».
theological_decisions:
- issue: Relación entre el menor y el mayor
  english_pob_reading: 'A general principle of rank is stated: the one of lower status is blessed by the one of higher status.'
  chosen_spanish_reading: 'Se enuncia un principio general de rango: quien tiene menor estatus es bendecido por quien tiene mayor estatus.'
  alternative_spanish_readings:
  - Es solo una convención social sin peso teológico
  - Es una comparación meramente retórica
  rationale: La traducción mantiene la comparación de estatus sin ampliar ni resolver la tensión argumentativa. En Hebreos 7, la afirmación sirve al argumento de la superioridad de Melquisedec sobre Abraham; por eso no conviene suavizarla ni moralizarla.
  doctrine_reference: 'Principio POB 3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión: no hubo cambios sustantivos en el control de calidad más reciente, y el texto griego/apoyo inglés muestran acuerdo alto. La redacción española sigue ese resultado sin introducir variaciones interpretativas nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva un estilo sobrio y publicable, con vocabulario transparente para lectores eclesiales amplios.
  - La nota a pie de página preserva la alternativa léxica documentada por el POB inglés para ἀντιλογία.
