revisions:
- from: quien no llegó a serlo conforme a una ley de mandamiento carnal[a], sino conforme al poder de una vida indestructible[b].
  to: quien no ha llegado a serlo conforme a una ley de mandamiento carnal[a], sino conforme al poder de una vida indestructible[c][b].
  rationale: Se ajusta el verbo a ‘no ha llegado a serlo’ para reflejar mejor el perfecto griego γέγονεν, manteniendo la elipsis contextual del sacerdocio. También se repone la tercera nota del expediente inglés para conservar el rastro de alternativas estructurales/documentales. El resto del texto es fiel al griego y a las decisiones léxicas del POB.
