translation:
  language: es
  text: quien no ha llegado a serlo conforme a una ley de mandamiento carnal[a], sino conforme al poder de una vida indestructible[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de un requerimiento físico’ o ‘de un mandamiento corporal’.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, ‘de una vida interminable’.
    reason: lexical_alternative
  - marker: c
    text: O ‘una ley de mandamiento carnal’.
    reason: previous_rendering
lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - el cual
  - él, que
  lexicon: BDAG
  rationale: El relativo retoma al sujeto del contexto previo y en español ‘quien’ mantiene la referencia personal con fluidez natural.
- source_word: κατὰ νόμον
  english_pob_choice: according to a law
  chosen_spanish: conforme a una ley
  alternatives_spanish:
  - según una ley
  - de acuerdo con una ley
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o base; ‘conforme a’ preserva esa relación sin sonar forzado en español.
- source_word: ἐντολῆς σαρκίνης
  english_pob_choice: of a fleshly commandment
  chosen_spanish: de mandamiento carnal
  alternatives_spanish:
  - de un mandamiento físico
  - de un mandamiento corporal
  - de un requerimiento corporal
  lexicon: BDAG
  rationale: Se conserva la conexión con σάρξ mediante ‘carnal’, pero aquí en sentido de lo corporal/mortal, no moralizado. ‘Mandamiento’ sigue de cerca ἐντολή, y el genitivo se deja en una construcción natural en español.
- source_word: σαρκίνης
  english_pob_choice: fleshly
  chosen_spanish: carnal
  alternatives_spanish:
  - físico
  - corporal
  - terrenal
  lexicon: BDAG
  rationale: ‘Carnal’ conserva el campo semántico de σάρκινος sin convertirlo en ‘pecaminoso’. En este contraste con ‘vida indestructible’, apunta a una cualificación ligada a la carne, la genealogía y lo mortal.
- source_word: γέγονεν
  english_pob_choice: has become such
  chosen_spanish: no llegó a serlo
  alternatives_spanish:
  - ha llegado a serlo
  - se hizo así
  - ha sido hecho
  lexicon: BDAG
  rationale: El perfecto requiere expresar un estado resultante. En español, ‘no llegó a serlo’ funciona bien con el referente implícito del sacerdocio en el contexto, sin añadir palabras ajenas al verso.
- source_word: ἀλλὰ κατὰ δύναμιν
  english_pob_choice: but according to the power
  chosen_spanish: sino conforme al poder
  alternatives_spanish:
  - sino según el poder
  - sino de acuerdo con el poder
  lexicon: BDAG
  rationale: Se conserva el paralelismo con el primer κατὰ. ‘Poder’ traduce δύναμις de manera directa y clara.
- source_word: ζωῆς ἀκαταλύτου
  english_pob_choice: of an indestructible life
  chosen_spanish: de una vida indestructible
  alternatives_spanish:
  - de una vida interminable
  - de una vida imperecedera
  lexicon: BDAG
  rationale: ‘Indestructible’ es la opción más transparente para ἀκατάλυτος y conserva el contraste con lo carnal/mortal. ‘Vida’ se mantiene explícita para que el complemento sea natural en español.
theological_decisions:
- issue: Sentido de σαρκίνης en contraste con ἀκαταλύτου
  english_pob_reading: Rendered as 'fleshly' to denote bodily/genealogical, mortal qualification rather than moral sinfulness.
  chosen_spanish_reading: ‘Carnal’ en sentido corporal/genealógico, no moral.
  alternative_spanish_readings:
  - físico
  - corporal
  - terrenal
  rationale: El verso contrasta una base de legitimación ligada a la carne con una vida que no puede ser destruida. La traducción evita insinuar ‘pecaminoso’, porque el texto no hace esa afirmación.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión lexical sin moralizarla.
- issue: Valor de ἀκαταλύτου
  english_pob_reading: Rendered 'indestructible' in the main text.
  chosen_spanish_reading: ‘Indestructible’ en el texto principal.
  alternative_spanish_readings:
  - interminable
  - imperecedera
  rationale: ‘Indestructible’ preserva la idea de algo que no puede ser deshecho o terminado. ‘Interminable’ solo expresa duración; por eso queda como alternativa interpretativa, no como principal.
  doctrine_reference: Equivalencia óptima; prioridad al matiz léxico sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el paralelismo de dos frases con κατά, evita interpretar moralmente σαρκίνης, y prefiere ‘indestructible’ para ἀκαταλύτου. Se evitó una expansión explicativa como ‘definida por’ porque el último pase revisado del inglés la retiró para acercarse más al griego.'
  spanish_consistency_notes:
  - Se mantiene ‘carnal’ para la familia léxica de σάρξ, sin usar ‘pecaminoso’.
  - ‘Conforme a’ reproduce el valor normativo de κατά en ambas cláusulas.
  - El relativo ‘quien’ conserva la referencia personal sin añadir sujeto explícito.
  - La nota tradicional sobre ‘interminable’ se conserva solo como alternativa, no como lectura principal.
