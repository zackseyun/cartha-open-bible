translation:
  language: es
  text: Y[a], por así decirlo, por medio de Abraham aun Leví, el que recibe los diezmos, ha pagado diezmos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como uno podría decir» / «por decirlo así».
    reason: lexical_alternative
  - marker: b
    text: O «ha sido diezmado». El griego está en voz pasiva, expresando que Leví es considerado como uno que pagó diezmos por medio de Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἔπος εἰπεῖν
  english_pob_choice: so to speak
  chosen_spanish: por así decirlo
  alternatives_spanish:
  - como quien dice
  - por decirlo así
  - por así hablar
  lexicon: BDAG
  rationale: La expresión griega introduce una formulación atenuada o aproximada. «Por así decirlo» conserva ese matiz idiomático en un español natural y digno, sin volverla más arcaica de lo necesario.
- source_word: δι’ Ἀβραὰμ
  english_pob_choice: through Abraham
  chosen_spanish: por medio de Abraham
  alternatives_spanish:
  - a través de Abraham
  - por Abraham
  lexicon: BDAG
  rationale: La preposición διά con genitivo comunica mediación/instrumentalidad. «Por medio de Abraham» expresa bien la participación mediada de Leví en la argumentación sin borrar la relación representativa.
- source_word: καὶ Λευὶ
  english_pob_choice: even Levi
  chosen_spanish: aun Leví
  alternatives_spanish:
  - Leví también
  - incluso Leví
  lexicon: BDAG
  rationale: 'Aquí καί tiene fuerza enfática: el alcance inesperado del argumento llega hasta Leví. «Aun Leví» conserva mejor esa sorpresa retórica que un simple «también».'
- source_word: ὁ δεκάτας λαμβάνων
  english_pob_choice: who receives tithes
  chosen_spanish: el que recibe los diezmos
  alternatives_spanish:
  - el que recibe los diezmos
  - el que cobra los diezmos
  - el que recoge los diezmos
  lexicon: BDAG
  rationale: El participio sustantivado describe a Leví en su función sacerdotal. «Recibe los diezmos» es claro y fiel; «diezmos» mantiene el término cultual establecido en español.
- source_word: δεκάτας
  english_pob_choice: tithes
  chosen_spanish: los diezmos
  alternatives_spanish:
  - los diezmos
  - las décimas partes
  lexicon: BDAG
  rationale: En español bíblico y eclesial, «diezmos» es la equivalencia natural y precisa para la ofrenda del diez por ciento, sin necesidad de glosa matemática.
- source_word: δεδεκάτωται
  english_pob_choice: has paid tithes
  chosen_spanish: ha sido diezmado
  alternatives_spanish:
  - ha pagado diezmos
  - ha dado diezmos
  - ha sido objeto de diezmo
  lexicon: BDAG
  rationale: El perfecto pasivo griego expresa que Leví queda contado como uno que ha sido diezmado en Abraham. «Ha sido diezmado» conserva la voz pasiva y la tensión retórica mejor que una forma activa, y evita resolver de más el mecanismo representativo.
theological_decisions:
- issue: Participación representativa de Leví en la acción de Abraham
  english_pob_reading: Levi is regarded as having paid tithes through Abraham, preserving the author's argument without overexplaining the mechanism.
  chosen_spanish_reading: Leví es considerado como diezmado por medio de Abraham, preservando la lógica del argumento sin explicarla en exceso.
  alternative_spanish_readings:
  - Leví pagó los diezmos en sentido figurado por medio de Abraham
  - Leví aparece corporativamente incluido en Abraham
  rationale: La frase griega y la lectura POB mantienen una tensión entre representación real y formulación retórica. «Ha sido diezmado» deja intacta esa tensión y sigue el razonamiento del autor sobre la superioridad de Melquisedec sin imponer una explicación doctrinal posterior.
  doctrine_reference: Preservar la tensión interpretativa del texto; no resolverla más allá de la evidencia.
translation_notes:
  revision_awareness: La decisión crítica principal es mantener el valor pasivo del perfecto δεδεκάτωται. Aunque la revisión inglesa reciente optó por una forma activa («has paid tithes»), el paquete de auditoría conserva la observación de que el griego es pasivo y que la idea subyacente es representativa; por eso el español refleja ese pasivo con «ha sido diezmado», en línea con la tensión documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - «diezmos» se mantiene como término técnico uniforme para δεκάτας en contextos cultuales.
  - «por medio de» se emplea para διά con genitivo cuando el contexto es mediación o representación.
  - La puntuación reproduce una pausa inicial equivalente al inglés, con coma tras la frase idiomática.
