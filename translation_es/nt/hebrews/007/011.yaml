translation:
  language: es
  text: Ahora bien, si la perfección hubiera sido por medio del sacerdocio levítico —porque sobre esa base el pueblo había recibido la ley—, ¿qué más necesidad había de que surgiera[a] otro sacerdote según el orden de Melquisedec y no fuera llamado[b] según el orden de Aarón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se levantara». El griego ἀνίστασθαι puede expresar la aparición o constitución de un sacerdote; aquí no exige una idea de resurrección.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no fuera designado según el orden de Aarón». λέγεσθαι puede referirse a la manera en que alguien es llamado o clasificado.'
    reason: alternative_reading
lexical_decisions:
- source_word: τελείωσις
  english_pob_choice: perfection
  chosen_spanish: perfección
  alternatives_spanish:
  - acabamiento
  - consumación
  lexicon: BDAG
  rationale: En Hebreos, el término tiene peso cultual y salvífico, no solo la idea de terminar algo. «Perfección» conserva esa fuerza teológica en español sin reducirla a moralismo o simple finalización.
- source_word: διὰ τῆς Λευιτικῆς ἱερωσύνης
  english_pob_choice: through the Levitical priesthood
  chosen_spanish: por medio del sacerdocio levítico
  alternatives_spanish:
  - a través del sacerdocio levítico
  - mediante el sacerdocio levítico
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por medio de» comunica bien esa relación causal/instrumental en español y mantiene el argumento de la carta.
- source_word: ἐπ’ αὐτῆς
  english_pob_choice: on its basis
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre su base
  - apoyado en él
  lexicon: BDAG
  rationale: El antecedente más natural es el sacerdocio levítico, de género femenino en griego. En español, «sobre él» mantiene la referencia al sistema sacerdotal y el sentido de fundamento que el contexto exige.
- source_word: νενομοθέτηται
  english_pob_choice: had received the law
  chosen_spanish: había recibido la ley
  alternatives_spanish:
  - había sido legislado
  - estaba bajo una disposición legal
  lexicon: BDAG
  rationale: El verbo expresa que el pueblo quedó colocado bajo una disposición legal dada. «Había recibido la ley» es natural en español y refleja el estado resultante de esa legislación.
- source_word: τίς ἔτι χρεία
  english_pob_choice: what further need was there
  chosen_spanish: ¿qué más necesidad había?
  alternatives_spanish:
  - ¿qué necesidad quedaba todavía?
  - ¿por qué seguía siendo necesario?
  lexicon: BDAG
  rationale: Es una pregunta retórica sobre necesidad. «¿Qué más necesidad había?» suena natural en español y conserva el énfasis inferencial del texto.
- source_word: κατὰ τὴν τάξιν Μελχισέδεκ
  english_pob_choice: according to the order of Melchizedek
  chosen_spanish: según el orden de Melquisedec
  alternatives_spanish:
  - conforme al orden de Melquisedec
  - en el orden de Melquisedec
  lexicon: BDAG
  rationale: La expresión establece patrón o categoría. «Según el orden de» es la formulación más clara y fiel en español para este uso técnico.
- source_word: ἕτερον ... ἱερέα
  english_pob_choice: another priest
  chosen_spanish: otro sacerdote
  alternatives_spanish:
  - un sacerdote diferente
  - un sacerdote de otro tipo
  lexicon: BDAG
  rationale: ἕτερον puede señalar otro de distinta clase. «Otro sacerdote» es natural; el contraste con Aarón y su orden preserva la diferencia implícita.
- source_word: ἀνίστασθαι
  english_pob_choice: to arise
  chosen_spanish: surgiera
  alternatives_spanish:
  - se levantara
  - apareciera
  lexicon: BDAG
  rationale: En este contexto el verbo describe la aparición o constitución de un sacerdote. «Surgiera» preserva el registro bíblico y evita una lectura resurreccional.
- source_word: καὶ οὐ κατὰ τὴν τάξιν Ἀαρὼν λέγεσθαι
  english_pob_choice: and not be called according to the order of Aaron
  chosen_spanish: y no fuera llamado según el orden de Aarón
  alternatives_spanish:
  - y no fuera designado según el orden de Aarón
  - y no se lo llamara según el orden de Aarón
  lexicon: BDAG
  rationale: λέγεσθαι aquí se refiere a la designación o clasificación del sacerdote. «Fuera llamado» es directo, natural y mantiene el contraste formal entre los dos órdenes.
- source_word: Μελχισέδεκ / Ἀαρών
  english_pob_choice: Melchizedek / Aaron
  chosen_spanish: Melquisedec / Aarón
  alternatives_spanish:
  - Melquisedec / Aaron
  lexicon: standard Spanish biblical names
  rationale: Se usan las formas bíblicas estándar en español para nombres propios, sin alterar la identificación tradicional de los personajes.
theological_decisions:
- issue: Sentido de τελείωσις en el argumento sacerdotal
  english_pob_reading: Rendered as 'perfection' with its cultic-theological force left intact rather than reduced to mere moral improvement or simple completion.
  chosen_spanish_reading: «Perfección» se mantiene con su fuerza cultual y teológica, no como mera mejora moral ni simple culminación.
  alternative_spanish_readings:
  - acabamiento
  - consumación
  - plena eficacia
  rationale: El versículo argumenta que, si el sacerdocio levítico pudiera producir el objetivo buscado, no haría falta otro sacerdote. «Perfección» conserva esa tensión y deja que el contexto determine su alcance.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referencia de αὐτῆς en ἐπ’ αὐτῆς νενομοθέτηται
  english_pob_reading: The pronoun refers to the Levitical priesthood.
  chosen_spanish_reading: El pronombre se entiende como referencia al sacerdocio levítico.
  alternative_spanish_readings:
  - a la ley
  - al arreglo pactual en general
  rationale: La antecedente más cercano y sintácticamente adecuado es «sacerdocio». Esa lectura encaja con la explicación parentética de que el pueblo recibió la ley sobre ese fundamento.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se incorporó la corrección del estado de revisión más reciente: en lugar de una paráfrasis más amplia para λέγεσθαι, se usa «fuera llamado», que es más directo y natural en español sin perder el sentido formal del griego. También se mantuvo la lectura de «perfección» y la referencia de «sobre él» al sacerdocio levítico conforme al expediente auditado.'
  spanish_consistency_notes:
  - Se conserva «sacerdocio levítico» como término técnico coherente con la teología de Hebreos.
  - Se prefiere «Melquisedec» y «Aarón» con ortografía bíblica estándar en español.
  - Se mantiene «ley» para νόμος en armonía con el expediente inglés y el flujo argumental de la frase.
  - Las notas a y b están ancladas en palabras visibles del texto español para cumplir la disciplina de marcadores.
