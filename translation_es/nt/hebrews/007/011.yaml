source:
  edition: SBLGNT
  text: Εἰ μὲν οὖν τελείωσις διὰ τῆς Λευιτικῆς ἱερωσύνης ἦν, ὁ λαὸς γὰρ ἐπ’ ⸀αὐτῆς ⸀νενομοθέτηται, τίς ἔτι χρεία κατὰ τὴν τάξιν Μελχισέδεκ ἕτερον ἀνίστασθαι ἱερέα καὶ οὐ κατὰ τὴν τάξιν Ἀαρὼν λέγεσθαι;
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/011.yaml
  text: Now if perfection had been through the Levitical priesthood—for on its basis the people had received the law—what further need was there for another priest to arise according to the order of Melchizedek and not be called according to the order of Aaron?[a][b]
  footnotes:
  - marker: a
    text: Or 'for under it the people had been given the law.' The Greek phrase may be rendered more formally, but the sense is that Israel's legal arrangement was founded on the Levitical priesthood.
    reason: lexical_alternative
  - marker: b
    text: Or 'another priest to arise in the order of Melchizedek and not be called in the order of Aaron.'
    reason: alternative_reading
