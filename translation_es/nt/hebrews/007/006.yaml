base_translation:
  language: en
  yaml_path: translation/nt/hebrews/007/006.yaml
  text: But the one not traced by genealogy from them has taken a tenth from Abraham and has blessed the one who has the promises[a][b].
  footnotes:
  - marker: a
    text: Or 'has received tithes from Abraham.' The Greek verb refers to taking or receiving a tenth.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who has the promises.' Greek has a present participle, but English may use past tense here for smoother narrative reference to Abraham.
    reason: lexical_alternative
