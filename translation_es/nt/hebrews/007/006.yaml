translation:
  language: es
  text: Pero el que no es contado por genealogía de ellos ha recibido un diezmo[a] de Abraham, y ha bendecido al que tiene las promesas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha tomado una décima parte de Abraham». El verbo griego se refiere a tomar o recibir la décima parte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ μὴ γενεαλογούμενος
  english_pob_choice: the one not traced by genealogy
  chosen_spanish: el que no ha sido registrado por genealogía
  alternatives_spanish:
  - el que no está trazado por genealogía
  - el que no figura en la genealogía
  - el que no procede de esa genealogía
  lexicon: BDAG
  rationale: Conserva el valor participial sustantivado y la idea de inscripción/descentencia genealógica, que en Hebreos funciona como argumento legal-sacerdotal más que biológico. 'Registrado por genealogía' suena natural en español y mantiene la noción de pertenencia a un linaje documentado.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - de entre ellos
  - de su linaje
  - de ellos
  lexicon: BDAG
  rationale: El contexto inmediato remite a la línea levítica. 'Entre ellos' preserva la referencia relacional sin añadir una precisión genealógica que el griego no explicita aquí.
- source_word: δεδεκάτωκεν
  english_pob_choice: has taken a tenth from
  chosen_spanish: ha tomado un diezmo
  alternatives_spanish:
  - ha recibido diezmos de
  - ha cobrado un diezmo de
  - ha diezmado a
  lexicon: BDAG
  rationale: El verbo en perfecto expresa una acción completada con relevancia presente en el argumento. En español, 'tomado un diezmo' comunica con transparencia la acción de recibir/obtener la décima parte sin imponer el tecnicismo eclesiástico 'diezmar', que podría oscurecer que Abraham es el dador.
- source_word: Ἀβραάμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: nombre propio estándar
  rationale: Se conserva la transliteración bíblica habitual y ampliamente reconocible en español.
- source_word: τὸν ἔχοντα τὰς ἐπαγγελίας
  english_pob_choice: the one who has the promises
  chosen_spanish: al que tiene las promesas
  alternatives_spanish:
  - al que posee las promesas
  - al que tenía las promesas
  - al que tiene las promesas dadas
  lexicon: BDAG
  rationale: Se respeta el participio presente griego con presente en español, como indica la revisión inglesa. 'Las promesas' preserva el plural y el contenido pactal de ἐπαγγελίας.
- source_word: εὐλόγηκεν
  english_pob_choice: has blessed
  chosen_spanish: ha bendecido
  alternatives_spanish:
  - bendijo
  - ha dado su bendición a
  lexicon: BDAG
  rationale: El perfecto se conserva con 'ha bendecido' para reflejar la relevancia continua de la acción en la argumentación. 'Bendecido' es el equivalente normal de εὐλογέω en este contexto.
theological_decisions:
- issue: Relación de Melquisedec con la genealogía levítica
  english_pob_reading: The verse contrasts Melchizedek as one not genealogically derived from the Levitical line with Abraham, without making speculative claims about Melchizedek's ontology or origin.
  chosen_spanish_reading: El versículo contrasta a Melquisedec como uno que no depende de un registro genealógico levítico con Abraham, sin afirmar nada especulativo sobre el origen ontológico de Melquisedec.
  alternative_spanish_readings:
  - Melquisedec no pertenece a la genealogía levítica.
  - Melquisedec no desciende de ellos por genealogía.
  rationale: 'La traducción debe preservar la tensión argumentativa de Hebreos: la legitimidad sacerdotal de Melquisedec se presenta fuera de la línea genealógica levítica, sin convertir el texto en una afirmación metafísica sobre su naturaleza. ''Registrado por genealogía'' deja visible esa dimensión documental/legal.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se integró la revisión inglesa más reciente: el participio se mantuvo en una forma natural sin añadir pasiva innecesaria, y se conservó el presente de «tiene las promesas» en lugar de un pasado.'
  spanish_consistency_notes:
  - Se mantuvo Abraham como forma estándar del nombre propio.
  - Se prefirió 'ha bendecido' para preservar el perfecto del griego.
  - Se evitó 'Cristo' o terminología litúrgica no presente en el texto.
  - '''Diezmo'' se usa junto con la nota para reflejar la equivalencia semántica de δεδεκάτωκεν sin ocultar la acción de tomar/recibir una décima parte.'
