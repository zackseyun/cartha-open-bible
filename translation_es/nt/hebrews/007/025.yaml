translation:
  language: es
  text: Por eso también puede salvar completamente[a] a los que se acercan a Dios por medio de él, ya que vive siempre para interceder por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para siempre’; tradicionalmente, ‘hasta el extremo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación inferencial con el contexto anterior sobre el sacerdocio permanente de Jesús.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: 'Conserva el matiz aditivo: no solo tiene sacerdocio permanente, sino que además puede salvar.'
- source_word: σῴζειν
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - liberar
  lexicon: BDAG
  rationale: En contexto soteriológico, ‘salvar’ mantiene el peso teológico y la continuidad léxica.
- source_word: εἰς τὸ παντελές
  english_pob_choice: completely
  chosen_spanish: completamente
  alternatives_spanish:
  - totalmente
  - para siempre
  - hasta el extremo
  lexicon: BDAG
  rationale: ‘Completamente’ refleja la idea de plenitud o totalidad sin fijar de manera exclusiva la posible lectura temporal; la nota conserva la alternativa tradicional y la posible extensión temporal.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: ‘Puede’ es la forma más natural en español y conserva la idea de capacidad basada en su sacerdocio permanente.
- source_word: τοὺς προσερχομένους
  english_pob_choice: those who draw near
  chosen_spanish: a los que se acercan
  alternatives_spanish:
  - a los que se aproximan
  - a los que vienen
  lexicon: BDAG
  rationale: ‘Se acercan’ reproduce el verbo de aproximación con el matiz cultual y relacional propio de Hebreos.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - mediante él
  lexicon: BDAG
  rationale: ‘Por medio de él’ expresa con claridad la mediación sacerdotal de Jesús en el acceso a Dios.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - hacia Dios
  lexicon: BDAG
  rationale: La construcción española natural con ‘acercarse’ es ‘a Dios’; mantiene la direccionalidad del dativo.
- source_word: πάντοτε ζῶν
  english_pob_choice: since he always lives
  chosen_spanish: ya que vive siempre
  alternatives_spanish:
  - puesto que vive siempre
  - pues siempre vive
  lexicon: BDAG
  rationale: La cláusula participial se vierte con causalidad explícita y conserva la duración continua de la vida del sacerdote.
- source_word: εἰς τὸ ἐντυγχάνειν
  english_pob_choice: to intercede
  chosen_spanish: para interceder
  alternatives_spanish:
  - para hacer intercesión
  - para abogar
  lexicon: BDAG
  rationale: ‘Interceder’ es la equivalencia más clara y fiel en español; mantiene el sentido de mediación a favor de otros.
- source_word: ὑπὲρ αὐτῶν
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - a favor de ellos
  lexicon: BDAG
  rationale: ‘Por ellos’ comunica de manera idiomática el sentido representativo/benefactor de ὑπέρ.
theological_decisions:
- issue: Alcance de εἰς τὸ παντελές
  english_pob_reading: Rendered as 'completely' in the main text, with a footnote allowing 'save forever' / 'to the uttermost'.
  chosen_spanish_reading: ‘Completamente’ en el texto principal, con nota sobre ‘para siempre’ y la fórmula tradicional ‘hasta lo sumo’ / ‘hasta el extremo’.
  alternative_spanish_readings:
  - para siempre
  - hasta el extremo
  - hasta lo sumo
  rationale: El griego admite tanto plenitud total como matiz temporal. ‘Completamente’ evita resolver de más la tensión y la nota preserva las lecturas alternativas que el contexto permite.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada de revisión: el estado es de alta concordancia y no hubo cambios pendientes. La redacción española sigue la decisión auditada de mantener εἰς τὸ παντελές en tensión entre totalidad y duración, sin forzar una sola interpretación.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός, conforme al estándar del proyecto.
  - Se usa ‘salvar’ y ‘interceder’ por su equivalencia léxica y teológica directa.
  - ‘Por medio de él’ preserva la mediación sacerdotal sin introducir terminología eclesiástica ajena al griego.
  - La nota al pie se ancla en ‘completamente’ porque allí reside la ambigüedad lexical principal.
