translation:
  language: es
  text: Y en la medida en que esto no fue sin un juramento[a] (porque ellos, en efecto, han llegado a ser sacerdotes sin juramento,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no aparte de un juramento».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Y también
  lexicon: BDAG
  rationale: Conserva la conexión discursiva con el argumento previo sin recargar el español. En una frase subordinada larga, 'Y' mantiene la continuidad formal que el griego expresa con la conjunción simple.
- source_word: καθ’ ὅσον
  english_pob_choice: inasmuch as
  chosen_spanish: en la medida en que
  alternatives_spanish:
  - puesto que
  - ya que
  - en cuanto
  lexicon: BDAG
  rationale: La expresión introduce la base o alcance de la afirmación. 'En la medida en que' preserva el matiz de correspondencia argumentativa del griego y su tono formal, sin convertirlo en una causal demasiado cerrada.
- source_word: οὐ χωρὶς ὁρκωμοσίας
  english_pob_choice: not without an oath
  chosen_spanish: no fue sin juramento
  alternatives_spanish:
  - no fue aparte de un juramento
  - no fue sin un juramento
  lexicon: BDAG
  rationale: Se conserva la negación enfática de χωρίς con genitivo. En español, la doble negación 'no fue sin' refleja la construcción griega y mantiene la relación con el sujeto implícito de la cláusula anterior, sin suavizar la fuerza retórica.
- source_word: ὁρκωμοσίας
  english_pob_choice: an oath
  chosen_spanish: juramento
  alternatives_spanish:
  - un juramento
  - juramentación
  - acto de juramento
  lexicon: BDAG
  rationale: '''Juramento'' es el equivalente natural y preciso en español para la confirmación solemne requerida por el contexto. Se evita añadir ''un'' donde el español puede funcionar de forma más compacta, aunque la idea sigue siendo singular e indefinida.'
- source_word: οἱ μὲν γὰρ
  english_pob_choice: for they indeed
  chosen_spanish: porque ellos, en efecto,
  alternatives_spanish:
  - pues ellos, en verdad,
  - porque en efecto ellos,
  lexicon: BDAG
  rationale: La combinación μέν...γάρ prepara el contraste que continuará en la siguiente cláusula. 'Porque ellos, en efecto,' preserva el carácter explicativo y anticipatorio, y en español resulta más fluido que intentar reproducir mecánicamente la partícula μέν.
- source_word: χωρὶς ὁρκωμοσίας
  english_pob_choice: without an oath
  chosen_spanish: sin juramento
  alternatives_spanish:
  - aparte de un juramento
  - sin un juramento
  lexicon: BDAG
  rationale: Se mantiene la misma equivalencia de χωρίς con genitivo usada antes, para conservar la repetición enfática del texto griego y su contraste con la cláusula anterior.
- source_word: εἰσὶν ἱερεῖς γεγονότες
  english_pob_choice: have become priests
  chosen_spanish: se han hecho sacerdotes
  alternatives_spanish:
  - han llegado a ser sacerdotes
  - fueron constituidos sacerdotes
  lexicon: BDAG
  rationale: La construcción perifrástica expresa resultado de una acción completada. 'Se han hecho sacerdotes' reproduce bien el aspecto de estado resultante y preserva la referencia institucional a sacerdotes; se prefiere 'sacerdotes' por ser el término estándar en español para ἱερεῖς.
theological_decisions:
- issue: Alcance del contraste entre el sacerdocio previo y el sacerdocio de Jesús implícito por el juramento
  english_pob_reading: The verse contrasts Levitical priests, who became priests without an oath, with Jesus' priesthood, established with an oath, without importing further doctrinal conclusions into this verse alone.
  chosen_spanish_reading: El versículo contrasta a los sacerdotes levíticos, que llegaron a ser sacerdotes sin juramento, con el sacerdocio de Jesús establecido con juramento, sin añadir conclusiones doctrinales que el versículo mismo no formula.
  alternative_spanish_readings:
  - Un contraste más amplio entre todo el sacerdocio del antiguo pacto y el sacerdocio eterno del Mesías.
  - Una afirmación doctrinal completa sobre la superioridad absoluta del sacerdocio de Jesús.
  rationale: La frase griega solo enuncia la ausencia/presencia de juramento dentro del argumento de Hebreos. La traducción debe preservar esa tensión y dejar que el desarrollo contextual posterior explicite la implicación cristológica, sin ampliarla artificialmente en este renglón.
  doctrine_reference: Hebreos 7:20-22; mantener la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el auditorial inglés POB. No hubo revisiones aplicadas en el último pase; esta versión mantiene la equivalencia óptima ya aceptada y adapta las decisiones léxicas al español sin perder la negación enfática ni el valor anticipatorio de μέν...γάρ.
  spanish_consistency_notes:
  - Se mantiene 'juramento' de forma consistente para ὁρκωμοσία en ambas apariciones.
  - Se usa 'sacerdotes' para ἱερεῖς, en línea con el valor técnico del pasaje.
  - Se conserva la apertura coordinante 'Y' para reflejar la conexión con el argumento anterior.
  - La puntuación reproduce la cláusula parentética y su apertura al versículo siguiente, como en el griego.
