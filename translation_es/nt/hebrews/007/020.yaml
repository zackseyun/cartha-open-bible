  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Juramento' para ὁρκωμοσία y 'sacerdotes' para ἱερεῖς están bien alineados. No hay términos teológicos sensibles del glosario principal aquí que requieran ajuste.
