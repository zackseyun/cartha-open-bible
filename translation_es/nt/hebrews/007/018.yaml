translation:
  language: es
  text: Porque en verdad hay una abrogación del mandamiento anterior[a], a causa de su debilidad e inutilidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mandamiento precedente» o «el mandamiento que iba antes».
    reason: lexical_alternative
  - marker: b
    text: Es decir, ineficaz para llevar a la perfección discutida en el contexto cercano (véase Heb 7:19), no una afirmación de que la revelación previa de Dios fuese mala en sí misma.
    reason: cross_reference
lexical_decisions:
- source_word: ἀθέτησις
  english_pob_choice: setting aside
  chosen_spanish: abrogación
  alternatives_spanish:
  - anulación
  - suspensión
  - puesta a un lado
  lexicon: BDAG
  rationale: El sustantivo indica anulación, cancelación o invalidez de algo previamente vigente. «Abrogación» conserva el peso jurídico del término y encaja bien con el argumento de que la disposición anterior deja de estar en vigor.
- source_word: μὲν γὰρ
  english_pob_choice: For there is indeed
  chosen_spanish: Porque en verdad hay
  alternatives_spanish:
  - Porque hay en efecto
  - Pues ciertamente hay
  lexicon: BDAG
  rationale: La partícula introduce una explicación con matiz de contraste hacia el versículo siguiente. «Porque en verdad hay» conserva el valor discursivo de explicación e intensidad sin forzar una estructura artificial en español.
- source_word: γίνεται
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - llega a haber
  - se produce
  - ocurre
  lexicon: BDAG
  rationale: En esta construcción impersonal, γίνομαι expresa la existencia o la ocurrencia de un hecho. «Hay» es la forma más natural en español para ese valor existencial.
- source_word: προαγούσης ἐντολῆς
  english_pob_choice: the former commandment
  chosen_spanish: la ley anterior
  alternatives_spanish:
  - el mandamiento anterior
  - el precepto precedente
  - el mandamiento que iba antes
  lexicon: BDAG
  rationale: 'Aunque el griego dice literalmente «mandamiento que va delante / precedente», el contexto inmediato de Hebreos 7 habla de la disposición normativa previa ligada al sacerdocio levítico. «Ley anterior» comunica con naturalidad el referente funcional en español, sin perder la prioridad temporal. La nota mantiene la alternativa más literal de «mandamiento». '
- source_word: διὰ τὸ αὐτῆς ἀσθενὲς καὶ ἀνωφελές
  english_pob_choice: because of its weakness and uselessness
  chosen_spanish: a causa de su debilidad e inutilidad
  alternatives_spanish:
  - por su debilidad e inutilidad
  - a causa de que era débil e inútil
  - por su falta de eficacia y utilidad
  lexicon: BDAG
  rationale: La construcción articular con adjetivos sustantivados pide sustantivos en español. «Debilidad e inutilidad» reproduce el paralelo del griego y mantiene la fuerza crítica del texto, entendida en el marco de su incapacidad para alcanzar el propósito discutido en el contexto.
- source_word: ἀσθενές
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - debilidad
  - falta de fuerza
  - impotencia
  - ineficacia
  lexicon: BDAG
  rationale: El término señala falta de fuerza o capacidad efectiva. «Debilidad» es la correspondencia nominal más natural y mantiene el contraste con el propósito sacerdotal/perfeccionador del contexto.
- source_word: ἀνωφελές
  english_pob_choice: uselessness
  chosen_spanish: inutilidad
  alternatives_spanish:
  - inutilidad
  - falta de provecho
  - ineficacia
  - no utilidad
  lexicon: BDAG
  rationale: El adjetivo significa no provechoso o no útil. «Inutilidad» preserva el sustantivo abstracto y evita suavizar la valoración del autor, aunque en contexto se refiere a la incapacidad para lograr la perfección discutida en la sección.
theological_decisions:
- issue: Alcance de la crítica a la disposición anterior
  english_pob_reading: The verse states that the former commandment is set aside because of its weakness and uselessness in accomplishing the argument's priestly/perfection-related purpose, without implying that God's law was evil or mistaken.
  chosen_spanish_reading: El versículo afirma que la disposición anterior queda abrogada por su debilidad e inutilidad para cumplir el propósito sacerdotal/perfeccionador del argumento, sin implicar que la revelación previa de Dios fuese mala o errónea en sí misma.
  alternative_spanish_readings:
  - La ley de Moisés como tal carece totalmente de valor
  - La redacción evita toda evaluación negativa real
  rationale: El contexto inmediato de Hebreos 7:11 y 7:19 limita la crítica a la insuficiencia del orden anterior para llevar a la perfección. La traducción conserva el lenguaje fuerte («debilidad e inutilidad») y, a la vez, evita extender indebidamente el juicio a toda la revelación previa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el presente borrador sigue el estado de alta concordancia del paquete auditado y mantiene las decisiones léxicas y teológicas ya validadas.
  spanish_consistency_notes:
  - Se mantiene «abrogación» para preservar el matiz jurídico de ἀθέτησις.
  - Se usa «ley anterior» en el texto principal, con nota que conserva la alternativa más literal «mandamiento precedente».
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del Tetragrama.
  - «Debilidad e inutilidad» reproduce el paralelismo nominal del griego y la fuerza evaluativa del contexto.
  - La puntuación y el orden siguen una sintaxis natural del español sin suavizar la afirmación del texto.
