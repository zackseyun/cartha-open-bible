translation:
  language: es
  text: 'Porque tal sumo sacerdote ciertamente nos convenía: santo, inocente, sin mancha, separado de los pecadores[a] y habiendo llegado a ser más alto que los cielos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apartado de los pecadores». La frase destaca su pureza moral y su condición exaltada como sumo sacerdote.
    reason: lexical_alternative
  - marker: b
    text: O «exaltado sobre los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοιοῦτος
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - semejante
  - de tal clase
  lexicon: BDAG
  rationale: En español, «tal» conserva la fuerza anafórica de apuntar al tipo de sumo sacerdote ya descrito, con una formulación natural y sobria.
- source_word: ἔπρεπεν
  english_pob_choice: was indeed fitting
  chosen_spanish: nos convenía
  alternatives_spanish:
  - era apropiado para nosotros
  - nos era conveniente
  lexicon: BDAG
  rationale: El imperfecto expresa conveniencia/suitability; «nos convenía» transmite la idea de adecuación en relación con nosotros sin sobrecargar el texto.
- source_word: ἀρχιερεύς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia española más clara y fiel para el cargo cultual de Hebreos.
- source_word: ὅσιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - piadoso
  - devoto
  lexicon: BDAG
  rationale: Aquí el término describe la pureza moral y cultual del sacerdote; «santo» es la opción más natural y robusta en español para ese valor.
- source_word: ἄκακος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin malicia
  - sin engaño
  - inculpable
  lexicon: BDAG
  rationale: «Inocente» comunica ausencia de malicia o culpa moral y corresponde bien al perfil sacerdotal del pasaje.
- source_word: ἀμίαντος
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculado
  - sin contaminación
  - sin tacha
  lexicon: BDAG
  rationale: La imagen de pureza se expresa con claridad en español mediante «sin mancha», manteniendo el matiz cultual y moral de la palabra griega.
- source_word: κεχωρισμένος ἀπὸ τῶν ἁμαρτωλῶν
  english_pob_choice: separated from sinners
  chosen_spanish: separado de los pecadores
  alternatives_spanish:
  - apartado de los pecadores
  - puesto aparte de los pecadores
  lexicon: BDAG
  rationale: 'La traducción directa preserva la tensión del participio perfecto: una condición estable de separación/distinción. En esta oración, «pecadores» refleja el contraste moral del contexto.'
- source_word: ὑψηλότερος τῶν οὐρανῶν
  english_pob_choice: higher than the heavens
  chosen_spanish: más alto que los cielos
  alternatives_spanish:
  - exaltado sobre los cielos
  - por encima de los cielos
  lexicon: BDAG
  rationale: Se mantiene el comparativo literal con una expresión natural en español. «Cielos» reproduce el plural del original y evita suavizar el grado de elevación.
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_spanish: hecho
  alternatives_spanish:
  - habiendo llegado a ser
  - llegado a ser
  lexicon: BDAG
  rationale: En español, «hecho» funciona bien como participio resultativo y preserva la idea de un estado alcanzado sin forzar una perífrasis pesada.
theological_decisions:
- issue: «separado de los pecadores» y la relación de Jesús con los pecadores
  english_pob_reading: The phrase denotes Jesus' moral purity and exalted status, not a denial that he associated with sinners during his earthly ministry.
  chosen_spanish_reading: La frase expresa su pureza moral y su distinción/exaltación sacerdotal, no niega que Jesús tratara con pecadores durante su ministerio terrenal.
  alternative_spanish_readings:
  - una separación meramente espacial de personas malas
  - una separación solo posterior a la ascensión
  rationale: La secuencia de predicados del versículo describe idoneidad sacerdotal, pureza y exaltación. La traducción debe dejar abierta la tensión bíblica con los Evangelios sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: «hecho más alto que los cielos» y la exaltación de Cristo
  english_pob_reading: Rendered as 'having become higher than the heavens' to reflect exaltation language without implying a change in divine nature.
  chosen_spanish_reading: «hecho más alto que los cielos» expresa exaltación histórica/resultativa sin sugerir un cambio en la naturaleza divina de Cristo.
  alternative_spanish_readings:
  - «siendo más alto que los cielos» como descripción estática
  - «exaltado sobre los cielos» con pasiva explícita
  rationale: El participio señala un estado alcanzado en la historia de la salvación. En español conviene mantener esa idea sin introducir adopcionismo ni alterar la cristología nicena.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon (451 AD)'
translation_notes:
  revision_awareness: The latest English revision pass indicates no changes were needed; cross-check status is high agreement (1.0). The Spanish draft follows that stable reading and preserves the key lexical/theological tensions documented in the audit trail.
  spanish_consistency_notes:
  - Se conserva «sumo sacerdote» como término técnico cultual, en línea con Hebreos.
  - Se usa «cielos» en plural para reflejar el genitivo plural griego τῶν οὐρανῶν.
  - La secuencia de adjetivos («santo, inocente, sin mancha») mantiene el paralelismo del original.
  - «Hecho» se eligió para ὑψηλότερος ... γενόμενος por su naturalidad en español y su valor resultativo.
  - Las notas al pie distinguen entre la lectura moral y la lectura de exaltación, sin borrar ninguna de las dos.
