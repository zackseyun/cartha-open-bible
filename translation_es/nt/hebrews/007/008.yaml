translation:
  language: es
  text: Y aquí los hombres mortales reciben los diezmos[a], pero allí uno los recibe, de quien se da testimonio de que vive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "allí se da testimonio de él de que vive". El griego mantiene la afirmación en forma de testimonio escriturario más que como una declaración directa de la inmortalidad literal de Melquisedec.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - aquí mismo
  lexicon: BDAG
  rationale: Conserva el contraste deíctico con ἐκεῖ ('allí') de manera natural en español y mantiene la oposición retórica entre el marco presente y el testimonio escriturario.
- source_word: δεκάτας
  english_pob_choice: tithes
  chosen_spanish: los diezmos
  alternatives_spanish:
  - diezmos
  - las décimas
  lexicon: BDAG
  rationale: '''Diezmos'' es el equivalente cultual y jurídico natural en español para el contexto levítico; ''décimas'' es más etimológico pero menos idiomático.'
- source_word: ἀποθνῄσκοντες ἄνθρωποι
  english_pob_choice: mortal men
  chosen_spanish: los hombres mortales
  alternatives_spanish:
  - los hombres que mueren
  - los seres humanos mortales
  lexicon: BDAG
  rationale: El participio presente destaca su condición mortal. 'Hombres mortales' conserva la fuerza contrastiva y suena más natural que una construcción más literal y pesada.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: En este contexto sacerdotal el referente es masculino; por eso se conserva 'hombres' en vez de una generalización neutral.
- source_word: λαμβάνουσιν
  english_pob_choice: receive
  chosen_spanish: reciben
  alternatives_spanish:
  - cobran
  - recogen
  lexicon: BDAG
  rationale: Verbo directo y fiel al acto de recibir los diezmos sin añadir matices interpretativos.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - allá
  lexicon: BDAG
  rationale: Mantiene el paralelismo con 'aquí' y el contraste espacial/scriptural del argumento.
- source_word: μαρτυρούμενος
  english_pob_choice: it is testified of him / he is testified to
  chosen_spanish: se da testimonio de
  alternatives_spanish:
  - se testimonia de
  - es testificado
  lexicon: BDAG
  rationale: El pasivo griego con sujeto implícito se vierte en español con una impersonal natural. 'Se da testimonio de' conserva el énfasis evidencial sin forzar una forma poco idiomática.
- source_word: ὅτι ζῇ
  english_pob_choice: that he lives
  chosen_spanish: de que vive
  alternatives_spanish:
  - que vive
  - de que está vivo
  lexicon: BDAG
  rationale: '''Vive'' preserva el presente y el valor del testimonio bíblico. La preposición ''de'' se ajusta al régimen de ''dar testimonio de'' en español.'
theological_decisions:
- issue: Cómo traducir el testimonio sobre Melquisedec sin resolver la tensión teológica
  english_pob_reading: The verse contrasts mortal Levitical priests with Melchizedek as one whom Scripture testifies as living, without requiring a claim that Melchizedek is literally immortal in himself.
  chosen_spanish_reading: El versículo contrasta a los sacerdotes levíticos, que mueren, con Melquisedec como aquel de quien la Escritura da testimonio de que vive, sin afirmar más allá de ese testimonio.
  alternative_spanish_readings:
  - allí se afirma que vive
  - allí se dice que vive literalmente
  rationale: La formulación mantiene el carácter de testimonio escriturario y evita convertir la frase en una afirmación ontológica directa. Así se preserva la tensión documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica y el marco de testimonio bíblico, no resolverla en el texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente hizo más completa la segunda cláusula al suplir el verbo implícito y al traducir ὅτι ζῇ como 'that he lives' en vez de una expresión más abstracta. La versión española sigue esa decisión, pero conserva la pasiva impersonal 'se da testimonio de' para reflejar con naturalidad el griego y mantener la tensión interpretativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - '''Diezmos'' se mantiene como término cultual fijo en lugar de ''décimas''.'
  - La pasiva griega se expresó de forma impersonal en español para evitar un sujeto artificial y preservar el peso del testimonio.
  - Se mantuvo el contraste deíctico 'aquí/allí' como recurso retórico central del versículo.
