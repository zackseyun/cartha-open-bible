translation:
  language: es
  text: Porque es evidente que nuestro Señor ha surgido de Judá[a], una tribu de la cual Moisés no dijo nada acerca de sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha brotado de Judá». El verbo griego evoca la imagen de surgir o brotar; aquí se refiere al origen en la tribu de Judá, no principalmente a la resurrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόδηλον
  english_pob_choice: it is evident
  chosen_spanish: es evidente
  alternatives_spanish:
  - es claro
  - es obvio
  - es manifiesto
  lexicon: BDAG
  rationale: La frase griega presenta un juicio impersonal de obviedad. «Es evidente» conserva el valor argumentativo sin sonar forzado ni excesivamente coloquial en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Aquí introduce la explicación de la afirmación anterior. «Porque» mantiene esa relación causal/explanatoria de modo natural en español.
- source_word: ἐξ Ἰούδα
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - desde Judá
  - procedente de Judá
  - de la tribu de Judá
  lexicon: BDAG
  rationale: La preposición señala origen o procedencia. «De Judá» es conciso y fiel; el contexto inmediato ya menciona la tribu, así que no hace falta añadirla aquí.
- source_word: ἀνατέταλκεν
  english_pob_choice: has arisen
  chosen_spanish: ha surgido
  alternatives_spanish:
  - ha brotado
  - ha salido
  - ha despuntado
  lexicon: BDAG
  rationale: El verbo evoca la imagen de surgir/levantar como una planta o astro, pero en este contexto apunta al origen tribal de nuestro Señor. «Ha surgido» preserva la metáfora sin sugerir principalmente resurrección.
- source_word: ὁ κύριος ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - el Señor nuestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico como «Señor», conforme al valor doctrinal de κύριος, con el posesivo en el orden natural del español.
- source_word: εἰς ἣν φυλὴν
  english_pob_choice: a tribe about which
  chosen_spanish: una tribu acerca de la cual
  alternatives_spanish:
  - una tribu sobre la cual
  - la cual tribu
  lexicon: BDAG
  rationale: La relativa introduce la tribu ya mencionada y prepara la cláusula sobre el silencio de Moisés. «Acerca de la cual» reproduce bien la relación sin volverla demasiado rígida.
- source_word: περὶ ἱερέων οὐδὲν
  english_pob_choice: nothing concerning priests
  chosen_spanish: nada respecto de los sacerdotes
  alternatives_spanish:
  - nada acerca de los sacerdotes
  - nada sobre los sacerdotes
  - nada concerniente a los sacerdotes
  lexicon: BDAG
  rationale: El griego habla específicamente de «sacerdotes», no de la institución abstracta del sacerdocio. «Respecto de los sacerdotes» conserva esa precisión y suena natural en español.
- source_word: Μωϋσῆς ἐλάλησεν
  english_pob_choice: Moses said
  chosen_spanish: Moisés dijo
  alternatives_spanish:
  - Moisés habló
  - Moisés declaró
  lexicon: BDAG
  rationale: λαλέω puede significar hablar/decir. «Dijo» es la equivalencia más natural aquí y refleja el contenido de la cita implícita sin perder sobriedad.
theological_decisions:
- issue: Identidad de «nuestro Señor»
  english_pob_reading: The phrase refers to Jesus, whose tribal descent is from Judah and whose priesthood therefore does not derive from Levi.
  chosen_spanish_reading: La expresión se entiende de Jesús, cuyo linaje tribal es de Judá y cuyo sacerdocio no procede de Leví.
  alternative_spanish_readings:
  - La expresión podría dejarse sin identificar explícitamente a Jesús.
  - La frase podría leerse como un título genérico de autoridad.
  rationale: En Hebreos 7 el argumento sobre Judá frente a Leví apunta a Jesús como sujeto implícito. La traducción conserva «nuestro Señor» sin añadir el nombre, pero la nota doctrinal reconoce la referencia contextual.
  doctrine_reference: Credo Niceno; principio de primacía del texto original y de preservación del contexto cristológico de Hebreos
- issue: Fuerza de ἀνατέταλκεν
  english_pob_reading: A metaphor of arising/springing up from Judah, referring to lineage/origin rather than resurrection.
  chosen_spanish_reading: La expresión mantiene la metáfora de surgir desde Judá como indicación de origen o linaje, no como referencia principal a la resurrección.
  alternative_spanish_readings:
  - ha resucitado
  - ha renacido
  rationale: En el contexto inmediato se discute la procedencia tribal y la aptitud sacerdotal. «Ha surgido» preserva la imagen ascendente del verbo sin importar una lectura pascual que aquí no es la principal.
  doctrine_reference: Principio POB de primacía del original y de no importar al texto una afirmación que el contexto no exige
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el criterio ya auditado en inglés; no hubo revisiones aplicadas en la última pasada, y la concordancia del revisor fue alta, por lo que la redacción española conserva la misma decisión principal sobre ἀνατέταλκεν y la relación explicativa del versículo.
  spanish_consistency_notes:
  - Se usa «nuestro Señor» para κύριος, manteniendo el título cristológico sin añadir el nombre propio.
  - Se traduce ἀνατέταλκεν con un verbo de surgimiento para conservar la imagen y evitar una lectura primariamente resurreccional.
  - Se mantiene «Judá» sin expandir a «tribu de Judá» en la primera mención, siguiendo la economía del original y la pauta auditada en inglés.
  - «Sacerdotes» traduce ἱερέων de forma concreta, evitando generalizar a «sacerdocio» sin apoyo explícito del texto.
