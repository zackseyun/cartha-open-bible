    issue: «Las mismas ofrendas» para τὰς αὐτὰς ... θυσίας
    rationale: θυσία denota específicamente sacrificios. «Ofrendas» es más amplio y puede diluir el énfasis del argumento sobre los sacrificios repetidos del sistema levítico. El English POB también documenta «the same sacrifices».
  - severity: low
    issue: La nota «remover los pecados» es aceptable pero menos idiomática que «quitar»
    rationale: No requiere cambio obligatorio; funciona como alternativa léxica para περιελεῖν. Puede mantenerse como está.
  revised_spanish_text: Y todo sacerdote está de pie día tras día ministrando y ofreciendo los mismos sacrificios una y otra vez[a], que nunca pueden quitar los pecados.
  revised_footnotes:
