translation:
  language: es
  text: Y todo sacerdote está de pie día tras día ministrando y ofreciendo los mismos sacrificios una y otra vez[a], que nunca pueden quitar los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «remover los pecados».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ... ἱερεὺς
  english_pob_choice: every priest
  chosen_spanish: todo sacerdote
  alternatives_spanish:
  - cada sacerdote
  - todo sacerdote de manera distributiva
  lexicon: BDAG
  rationale: πᾶς con sustantivo singular tiene fuerza distributiva. En español, «todo sacerdote» comunica bien esa distribución sin sonar forzado; «cada sacerdote» también sería posible, pero aquí «todo» mantiene mejor el tono general de la frase.
- source_word: ἕστηκεν
  english_pob_choice: stands
  chosen_spanish: está de pie
  alternatives_spanish:
  - permanece en pie
  - está parado
  lexicon: BDAG
  rationale: El perfecto de ἵστημι expresa una postura/estado de estar de pie. «Está de pie» conserva esa imagen sin sobreinterpretar el aspecto; además mantiene el contraste implícito con la postura de Cristo en el contexto inmediato.
- source_word: καθ’ ἡμέραν
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: BDAG
  rationale: La frase expresa repetición continua. «Día tras día» reproduce mejor en español la insistencia repetitiva que un simple «diariamente».
- source_word: λειτουργῶν
  english_pob_choice: ministering
  chosen_spanish: ministrando
  alternatives_spanish:
  - prestando servicio
  - realizando servicio sacerdotal
  lexicon: BDAG
  rationale: En contexto cultual, λειτουργέω se refiere a servicio sacerdotal. «Ministrando» es una solución breve y sobria que conserva el matiz de servicio sagrado mejor que el genérico «sirviendo».
- source_word: τὰς αὐτὰς ... θυσίας
  english_pob_choice: the same sacrifices
  chosen_spanish: las mismas ofrendas
  alternatives_spanish:
  - los mismos sacrificios
  - esas mismas ofrendas
  lexicon: BDAG
  rationale: αὐτάς enfatiza repetición de ofrendas idénticas. Aunque «sacrificios» es literal, «ofrendas» puede sonar más natural en español aquí y sigue la realidad cultual del término θυσία; el artículo y «mismas» conservan la repetición.
- source_word: πολλάκις
  english_pob_choice: again and again
  chosen_spanish: una y otra vez
  alternatives_spanish:
  - repetidamente
  - muchas veces
  lexicon: BDAG
  rationale: La adverbialidad subraya recurrencia insistente. «Una y otra vez» es idiomática y reproduce bien el énfasis retórico del texto.
- source_word: προσφέρων
  english_pob_choice: offering
  chosen_spanish: ofreciendo
  alternatives_spanish:
  - presentando
  lexicon: BDAG
  rationale: En contexto sacrificial, προσφέρω significa ofrecer. «Ofreciendo» es la correspondencia natural en español y conserva el sentido cultual.
- source_word: αἵτινες
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  - las que
  lexicon: BDAG
  rationale: La relativa explicativa en español puede resolverse con «que». Aquí no se requiere un pronombre más marcado; el sentido cualitativo queda claro por la cláusula siguiente.
- source_word: οὐδέποτε δύνανται
  english_pob_choice: can never
  chosen_spanish: nunca pueden
  alternatives_spanish:
  - jamás pueden
  - no pueden nunca
  lexicon: BDAG
  rationale: La combinación expresa incapacidad absoluta. «Nunca pueden» preserva esa fuerza en español de manera natural y directa.
- source_word: περιελεῖν ἁμαρτίας
  english_pob_choice: take away sins
  chosen_spanish: quitar los pecados
  alternatives_spanish:
  - remover los pecados
  - llevarse los pecados
  lexicon: BDAG
  rationale: περιαιρέω aquí significa quitar o remover. «Quitar los pecados» es una formulación clara y bíblicamente inteligible en español; conserva el valor de remoción sin introducir un tecnicismo innecesario.
theological_decisions:
- issue: Contraste entre el sacerdocio levítico y la obra culminante de Cristo
  english_pob_reading: Rendered ἕστηκεν as 'stands' to preserve the contrast between the ongoing standing ministry of Levitical priests and the seated finality of Messiah's work in the next verse.
  chosen_spanish_reading: «Está de pie» mantiene la imagen de una postura continua, útil para el contraste con la obra consumada de Cristo en el contexto inmediato.
  alternative_spanish_readings:
  - permanece en pie
  - está parado
  rationale: La frase participa del argumento literario de Hebreos 10. Mantener la imagen corporal no añade interpretación, pero sí deja visible la tensión retórica del pasaje.
  doctrine_reference: Hebreos 10:11-12; Translation philosophy §1, §3
- issue: Imposibilidad absoluta de los sacrificios para resolver el problema del pecado
  english_pob_reading: The repeated sacrifices 'can never take away sins' refers to their inability to effect final removal of sins in the argument of Hebrews.
  chosen_spanish_reading: «Nunca pueden quitar los pecados» conserva la negación absoluta de la eficacia final de esos sacrificios.
  alternative_spanish_readings:
  - no pueden quitar completamente los pecados
  - no pueden resolver el problema del pecado
  rationale: El griego afirma una incapacidad total dentro del argumento de Hebreos. La traducción no debe atenuar esa afirmación con una formulación más débil.
  doctrine_reference: Hebreos 10:1-14
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, sin revisiones aplicadas y con alto grado de acuerdo en la evaluación cruzada. No se detectaron cambios necesarios respecto de la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo «pecados» en plural para reflejar ἁμαρτίας.
  - Se prefirió un registro digno y moderno, evitando calcos excesivamente literales donde el español requería naturalidad.
  - Se conservó la fuerza repetitiva de καθ’ ἡμέραν y πολλάκις con expresiones idiomáticas equivalentes.
  - El término cultual λειτουργῶν se vertió con lenguaje de servicio sagrado, no como servicio general.
  - La nota [a] ofrece la alternativa léxica documentada sin debilitar la afirmación principal del texto.
