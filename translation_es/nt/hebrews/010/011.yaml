  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego: distributivo («todo sacerdote»), postura continua («está de pie»), repetición diaria («día tras día»), incapacidad absoluta («nunca pueden») y el contraste contextual con el v. 12. Sin embargo, se aparta innecesariamente de θυσίας / English POB «sacrifices» al usar «ofrendas», lo cual debilita el campo sacrificial explícito del pasaje.'
  spanish_quality_summary: El español es claro y natural. «Está de pie día tras día ministrando y ofreciendo…» fluye bien en registro bíblico moderno. La única reparación importante es sustituir «ofrendas» por «sacrificios» para mayor precisión y coherencia argumentativa. También conviene mantener la nota léxica como alternativa a «quitar».
  glossary_alignment: Sin conflictos con la terminología base del proyecto en este versículo. La principal cuestión léxica es θυσία, que aquí debe representarse como «sacrificio(s)» más que «ofrenda(s)» por fidelidad al griego y al razonamiento de Hebreos 10 sobre el sistema sacrificial.
  issues:
