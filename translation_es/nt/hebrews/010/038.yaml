base_translation:
  language: en
  yaml_path: translation/nt/hebrews/010/038.yaml
  text: But my righteous one will live by faith[a], and if he shrinks back[c][b], my soul takes no pleasure in him.
  footnotes:
  - marker: a
    text: Or 'by faithfulness' or 'by trust.' The Greek word pistis can carry these senses, though the main text follows the project's default rendering 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read simply 'the righteous one' instead of 'my righteous one.'
    reason: textual_variant
  - marker: c
    text: The singular masculine ('he,' 'him') reflects the Greek wording and functions representatively, not necessarily exclusively of males.
    reason: cultural_note
