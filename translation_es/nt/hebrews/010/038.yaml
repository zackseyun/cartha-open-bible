translation:
  language: es
  text: Pero mi justo[b] vivirá por la fe[a], y si retrocede[c], mi alma no se agrada de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por fidelidad» o «por confianza». El griego pistis puede abarcar esos sentidos, aunque el texto principal conserva «fe».
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos dicen simplemente «el justo» en lugar de «mi justo».
    reason: textual_variant
  - marker: c
    text: La forma singular masculina refleja el griego y funciona de manera representativa, no necesariamente exclusiva de varones.
    reason: cultural_note
lexical_decisions:
- source_word: δίκαιός μου
  english_pob_choice: my righteous one
  chosen_spanish: mi justo
  alternatives_spanish:
  - mi justo hombre
  - mi persona justa
  - el justo mío
  lexicon: BDAG
  rationale: El adjetivo sustantivado δίκαιός, con artículo y pronombre posesivo, se refiere a una persona caracterizada por la justicia. En español, «mi justo» conserva esa sustantivación y la relación posesiva del texto griego sin añadir un sustantivo innecesario ni sobreexplicar el género.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - por fidelidad
  - desde la fe
  - por confianza
  lexicon: BDAG
  rationale: La preposición ἐκ expresa base o fuente; en español, «por la fe» comunica bien esa base causal/instrumental. Se mantiene «fe» como valor principal de πίστις, dejando abiertas las alternativas semánticas documentadas.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá ciertamente
  - vivirá para siempre
  lexicon: BDAG
  rationale: El futuro de ζάω se expresa de manera directa y natural con «vivirá», sin añadir matices temporales no explicitados por el texto.
- source_word: ὑποστείληται
  english_pob_choice: shrinks back
  chosen_spanish: retrocede
  alternatives_spanish:
  - se echa atrás
  - se repliega
  - retrocede ante la presión
  lexicon: BDAG
  rationale: En este contexto la idea es retirarse o replegarse frente a la presión. «Retrocede» es idiomático en español y suficientemente cercano al sentido de retirada del verbo griego.
- source_word: οὐκ εὐδοκεῖ
  english_pob_choice: takes no pleasure
  chosen_spanish: no se complacerá
  alternatives_spanish:
  - no se agradará
  - no hallará deleite
  - no tendrá placer
  lexicon: BDAG
  rationale: εὐδοκέω expresa complacerse, agradarse o tomar placer en algo. «No se complacerá» mantiene esa fuerza personal y evita reducir la frase a una mera evaluación impersonal.
- source_word: ἡ ψυχή μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi ser
  - mi propia persona
  lexicon: BDAG
  rationale: El griego dice literalmente «mi alma»; se conserva la expresión antropológica en español para no aplanar el texto a un simple «yo».
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - con él
  - en esa persona
  lexicon: BDAG
  rationale: La construcción preposicional se vierte de forma directa como «en él», manteniendo la relación verbal y el referente singular masculino del griego.
theological_decisions:
- issue: Sentido de πίστις en ἐκ πίστεως
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva el valor principal «fe» en el cuerpo del texto, porque es el default doctrinal del proyecto y el más natural en español. Las alternativas se mantienen implícitas como trasfondo semántico sin resolver la discusión más amplia de Habacuc/Hebreos.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe; alternativas documentadas sin imponerse en el texto principal'
- issue: Referencia singular masculina en la advertencia
  english_pob_reading: the same singular person introduced as 'my righteous one'
  chosen_spanish_reading: el mismo singular masculino introducido como «mi justo»
  alternative_spanish_readings:
  - una persona indefinida distinta de «mi justo»
  - un sujeto impersonal
  rationale: El griego mantiene el singular masculino a lo largo de la cláusula. La traducción conserva esa continuidad gramatical y representativa, sin neutralizarla para suavizar la advertencia.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la forma gramatical del original'
- issue: Uso de lenguaje masculino singular representativo
  english_pob_reading: retain singular masculine pronouns
  chosen_spanish_reading: conservar el singular masculino «él»
  alternative_spanish_readings:
  - retrocede si la persona se aparta
  - retrocede si alguien se aparta
  rationale: El texto griego es singular masculino; en español se mantiene «él» para seguir de cerca la forma original y respetar la fuerza representativa del enunciado.
  doctrine_reference: 'DOCTRINE.md: precisión gramatical sobre suavización inclusiva'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente SBLGNT y el audit trail en inglés; no hubo revisiones posteriores aplicadas en el contexto proporcionado, y la concordancia final fue de alta coincidencia sin objeciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto fuente lo requiera; este versículo no la contiene.
  - Se conserva «fe» como término principal para πίστις, con alternativas documentadas en nota.
  - Se tradujo el posesivo y la referencia singular de forma coherente a lo largo del versículo.
  - Se evitó introducir «Cristo», «SEÑOR» o paráfrasis interpretativas que no están en el texto griego.
