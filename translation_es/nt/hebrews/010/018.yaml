translation:
  language: es
  text: Ahora bien, donde hay perdón[a] de estas, ya no hay ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'remisión de estas'; el referente de 'estas' son los pecados y las obras inicuas mencionados en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - allí donde
  lexicon: BDAG
  rationale: ὅπου introduce el ámbito o condición en que se cumple la afirmación. En español, 'donde' es la opción más natural y directa, manteniendo el valor relacional sin sobreexplicar.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - pero
  - y
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ marca transición inferencial, no contraste fuerte. 'Ahora bien' conserva ese avance discursivo con tono sobrio y lectoral, equivalente funcional a 'Now' en el inglés auditado.
- source_word: ἄφεσις
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - remisión
  - perdón
  - liberación
  lexicon: BDAG
  rationale: En este contexto sacrificial, ἄφεσις puede ser 'perdón' o 'remisión'. Se eligió 'perdón' por ser claro y natural en español actual, sin perder el peso teológico del término. 'Remisión' queda como alternativa viable, pero es menos transparente para muchos lectores.
- source_word: τούτων
  english_pob_choice: of these
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de estas
  - de estos pecados
  lexicon: BDAG
  rationale: El demostrativo retoma las 'transgresiones e iniquidades' del versículo anterior. Se traduce de forma cercana al griego como 'de estas cosas', dejando que el contexto inmediato determine el referente, tal como hace el texto fuente y la nota inglesa.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no hay más
  alternatives_spanish:
  - ya no
  - no hay más
  - ya no existe
  lexicon: BDAG
  rationale: οὐκέτι expresa cese definitivo. 'Ya no hay más' comunica con naturalidad la idea de que cesa la necesidad o existencia de la ofrenda, sin endurecer el matiz.
- source_word: προσφορὰ
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda
  - ofrecimiento
  - sacrificio
  lexicon: BDAG
  rationale: προσφορά es un término general de ofrenda cultual. 'Ofrenda' preserva esa amplitud y evita restringir indebidamente el sentido a 'sacrificio', que sería más estrecho.
- source_word: περὶ ἁμαρτίας
  english_pob_choice: for sin
  chosen_spanish: por el pecado
  alternatives_spanish:
  - por el pecado
  - para el pecado
  - como ofrenda por el pecado
  lexicon: BDAG
  rationale: La construcción tiene sentido sacrificial y puede equivaler a 'ofrenda por el pecado'. En español, 'por el pecado' es breve y fiel; sin embargo, para evitar ambigüedad se integra con 'ofrenda', produciendo 'ofrenda por el pecado', que reproduce el valor cultual del sintagma.
theological_decisions:
- issue: Finalidad de la obra sacrificial y cese de la ofrenda por el pecado
  english_pob_reading: The verse states that once forgiveness has been granted, no further sin-offering remains necessary.
  chosen_spanish_reading: El versículo afirma que, cuando hay perdón de estos pecados, ya no subsiste ninguna ofrenda por el pecado.
  alternative_spanish_readings:
  - El versículo elimina toda clase de ofrenda en cualquier sentido
  - El versículo se refiere solo a las ofrendas levíticas repetidas en un sentido ceremonial limitado
  rationale: 'La frase conserva la conclusión del argumento de Hebreos sin ampliar indebidamente el alcance. No se resuelve la tensión teológica más allá de lo que el versículo dice: donde hay perdón, cesa la ofrenda por el pecado.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y el audit trail inglés: δέ como transición, ἄφεσις con una opción natural en español, τούτων sin explicitar el referente en el cuerpo del versículo, y προσφορά/ἁμαρτίας con sentido cultual preservado. El inglés no requirió cambios revisionales; se mantiene la misma lectura textual.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención del proyecto solo cuando el texto lo exige; aquí no aparece.
  - Se evita 'sacrificio' como equivalente principal de προσφορά para no estrechar el término más allá del griego.
  - Se conserva la ambigüedad de 'estas cosas' mediante nota, en línea con el texto inglés auditado.
  - '''Ahora bien'' refleja la función discursiva de δέ sin introducir contraste fuerte.'
  - '''Por el pecado'' se integra en la locución fija ''ofrenda por el pecado'' para claridad litúrgica y fidelidad cultual.'
