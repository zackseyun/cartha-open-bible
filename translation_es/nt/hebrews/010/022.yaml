translation:
  language: es
  text: acerquémonos con un corazón verdadero, en plena certeza de fe, con nuestros corazones rociados[a] limpios de una conciencia mala[b] y nuestros cuerpos lavados con agua limpia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «asperjados» o «aspersos».
    reason: lexical_alternative
  - marker: b
    text: O «de una conciencia culpable»; el griego dice literalmente «mala» y no especifica culpa en sentido estrecho.
    reason: lexical_alternative
  - marker: c
    text: La imagen puede evocar lenguaje de purificación ritual y también puede resonar para algunos lectores como una alusión al bautismo, pero el versículo no identifica explícitamente ese lavado.
    reason: theological_note
lexical_decisions:
- source_word: προσερχώμεθα
  english_pob_choice: let us draw near
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - acerquémonos a Dios
  - aproximémonos
  - acerquémonos
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo de primera persona plural. «Acerquémonos» conserva el impulso inclusivo y la idea de acceso reverente mejor que una opción más técnica como «aproximémonos».
- source_word: ἀληθινῆς καρδίας
  english_pob_choice: a true heart
  chosen_spanish: un corazón verdadero
  alternatives_spanish:
  - un corazón sincero
  - un corazón genuino
  lexicon: BDAG
  rationale: «Verdadero» mantiene la compactación y el alcance de ἀληθινός sin reducirlo solo a sinceridad subjetiva. «Sincero» es posible, pero estrecha un poco más el sentido.
- source_word: ἐν πληροφορίᾳ πίστεως
  english_pob_choice: in full assurance of faith
  chosen_spanish: en plena certeza de fe
  alternatives_spanish:
  - con plena seguridad de fe
  - en plena seguridad de la fe
  lexicon: BDAG
  rationale: πληροφορία expresa certeza plena o convicción completa. «Plena certeza» conserva esa fuerza con buena naturalidad en español y mantiene el valor de ἐν como esfera o condición.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se sigue el valor habitual de πίστις como fe creyente. Aquí no hay indicio de una construcción de «fidelidad de Cristo».
- source_word: ῥεραντισμένοι
  english_pob_choice: with our hearts sprinkled clean
  chosen_spanish: con los corazones rociados[a]
  alternatives_spanish:
  - con los corazones aspersos
  - con los corazones asperjados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado logrado por rociamiento ritual. En español, «rociados» conserva la imagen sacrificial/purificadora. El resultado de limpieza queda insinuado por el contexto y por la nota, sin sobrecargar el texto principal.
- source_word: τὰς καρδίας
  english_pob_choice: our hearts
  chosen_spanish: los corazones
  alternatives_spanish:
  - nuestros corazones
  lexicon: BDAG
  rationale: El griego usa artículo con un sustantivo corporal dentro de una exhortación en primera persona plural. En español, «los corazones» suena más natural dentro de la construcción con participio; el referente inclusivo queda por el contexto exhortativo. También es posible «nuestros corazones».
- source_word: ἀπὸ συνειδήσεως πονηρᾶς
  english_pob_choice: from an evil conscience
  chosen_spanish: desde una conciencia mala[b]
  alternatives_spanish:
  - desde una conciencia malvada
  - desde una conciencia culpable
  lexicon: BDAG
  rationale: Se preserva πονηρός con un término directo como «mala», evitando pasar prematuramente a «culpable», que interpreta más de lo que dice el texto. «Mala» es menos solemne que «malvada», pero comunica la amplitud moral del griego.
- source_word: λελουσμένοι
  english_pob_choice: and our bodies washed
  chosen_spanish: y con el cuerpo lavado
  alternatives_spanish:
  - y nuestros cuerpos lavados
  - y el cuerpo lavado
  lexicon: BDAG
  rationale: El participio perfecto pasivo paralelo a ῥεραντισμένοι denota un estado resultante de lavado. «Con el cuerpo lavado» sigue de cerca la estructura y deja el valor corporativo sin forzar un plural que el griego no tiene aquí.
- source_word: τὸ σῶμα
  english_pob_choice: our bodies
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - nuestro cuerpo
  - los cuerpos
  lexicon: BDAG
  rationale: Aunque el griego es singular, funciona de modo distributivo y se integra bien en español con un singular colectivo («el cuerpo»). Eso evita introducir un plural no presente en la forma griega.
- source_word: ὕδατι καθαρῷ
  english_pob_choice: with pure water
  chosen_spanish: con agua limpia
  alternatives_spanish:
  - con agua pura
  - con agua limpia
  lexicon: BDAG
  rationale: καθαρός puede ser «limpio» o «puro». «Agua limpia» es claro y natural en español, y conserva el matiz de purificación ritual sin decidir innecesariamente entre limpieza física y pureza cultual.
theological_decisions:
- issue: Si el lenguaje de lavado debe identificarse explícitamente con el bautismo
  english_pob_reading: Retain the text's cleansing imagery without specifying baptism in the main text
  chosen_spanish_reading: Mantener la imaginería de purificación sin nombrar el bautismo en el texto principal
  alternative_spanish_readings:
  - expresarlo como lavado bautismal
  - tratarlo solo como purificación interior
  rationale: Hebreos 10:22 combina imaginería sacrificial y de purificación que puede evocar el bautismo o abluciones levíticas, pero el versículo no lo identifica de forma inequívoca. Por eso la traducción conserva la ambigüedad respetando la tensión del pasaje.
  doctrine_reference: Philosophy §3; afirmaciones no sectarias dentro de la ortodoxia ecuménica
- issue: Si πονηρᾶς debe suavizarse a «culpable»
  english_pob_reading: Translate πονηρᾶς formally as 'evil'
  chosen_spanish_reading: Traducirla formalmente como «mala»
  alternative_spanish_readings:
  - culpable
  - malvada
  rationale: El griego dice «mala/evil», no específicamente «culpable». «Mala» evita cerrar el sentido en una sola lectura psicológica y conserva el alcance moral y ritual de la expresión.
  doctrine_reference: Philosophy §1
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés auditado: aunque hubo un ajuste para hacer más natural «sprinkled clean from», el núcleo semántico sigue siendo un rociamiento purificador unido a ἀπό. En español se preservó la imagen sin añadir explicaciones interpretativas al cuerpo del versículo, dejando las precisiones en notas.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo como terminología predeterminada del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se eligió un registro sobrio y eclesial, con sintaxis natural para español bíblico contemporáneo.
  - Se preservó la tensión entre purificación ritual e implicación bautismal sin resolverla en la línea principal.
  - Se evitó «siervo» porque no corresponde a δοῦλος en este versículo.
  - Se evitó «Cristo/Mesías» porque el pasaje no contiene Χριστός.
