review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura del griego y conserva bien la exhortación, la imaginería de purificación y la decisión de no identificar explícitamente el lavado con el bautismo. Sin embargo, dos elecciones principales no representan bien el sentido ni el español natural: «desde una conciencia mala» no es una forma idiomática para ἀπὸ συνειδήσεως πονηρᾶς y debilita la idea de separación/limpieza; y «con el cuerpo lavado» suena menos natural y menos claro que el distributivo plural español implícito en el contexto exhortativo. Además, «los corazones» sin posesivo es posible, pero aquí «nuestros corazones» mejora la naturalidad y el paralelismo con el sujeto exhortativo.'
  spanish_quality_summary: 'El texto es legible, pero contiene giros algo calcados o poco naturales en español bíblico contemporáneo: «desde una conciencia mala» es especialmente problemático; «con los corazones rociados» y «con el cuerpo lavado» también suenan algo rígidos. Una leve revisión produce un español más claro y digno sin apartarse del griego ni de las decisiones documentadas.'
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. «Fe», «Dios» implícito, y la reserva sobre bautismo están bien manejadas. La cuestión clave es léxica y estilística: para πονηρᾶς conviene una formulación española que preserve «evil» sin reducirlo a «culpable», y para el distributivo corporal conviene español idiomático («nuestros corazones», «nuestros cuerpos»).'
  issues:
  - severity: high
    issue: «desde una conciencia mala» no representa bien ἀπὸ συνειδήσεως πονηρᾶς en español natural
    rationale: ἀπό aquí expresa separación/origen de limpieza tras el rociamiento. En español, «desde una conciencia mala» suena espacial y poco idiomático. «De una mala conciencia» o mejor «de una conciencia malvada»/«de una conciencia mala» preserva el valor formal; si se añade «limpios» se refleja el sentido contextual de purificación ya presente en el inglés auditado.
  - severity: medium
    issue: «con el cuerpo lavado» es menos natural que el plural distributivo en español
    rationale: Aunque el griego tiene singular distributivo, el español idiomático en una exhortación plural favorece «nuestros cuerpos lavados». Mantiene el sentido original sin forzar un singular colectivo algo duro.
  - severity: medium
    issue: «los corazones» sin posesivo suena rígido en este contexto
    rationale: 'Con partes del cuerpo en una exhortación de primera persona plural, el español natural normalmente explicita el posesivo: «nuestros corazones». Esto también empareja bien con «nuestros cuerpos».'
  - severity: low
    issue: La nota sobre «rociados» mezcla alternativa léxica y explicación interpretativa
    rationale: Conviene que la nota lexical alternativa priorice equivalentes como «asperjados/aspersos»; la connotación ritual puede mantenerse, pero de forma más limpia y directa.
