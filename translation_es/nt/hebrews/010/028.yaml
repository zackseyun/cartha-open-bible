translation:
  language: es
  text: Cualquiera que haya dejado de lado la ley de Moisés muere sin misericordia por el testimonio de dos o tres testigos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «es ejecutado». El griego dice literalmente «muere», pero el contexto es la ejecución judicial bajo la ley de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετήσας
  english_pob_choice: has set aside
  chosen_spanish: haya dejado de lado
  alternatives_spanish:
  - haya rechazado
  - haya violado
  - haya desechado
  lexicon: BDAG
  rationale: El participio aoristo de ἀθετέω expresa rechazar, anular o dejar sin efecto una autoridad. «Haya dejado de lado» conserva la idea de apartarse de la ley como norma válida, sin restringirlo a una sola forma de transgresión.
- source_word: τις
  english_pob_choice: Anyone
  chosen_spanish: Cualquiera
  alternatives_spanish:
  - Alguien
  - Quienquiera
  lexicon: BDAG
  rationale: El indefinido es genérico y representativo. «Cualquiera» suena natural en español y mantiene el alcance general del enunciado.
- source_word: νόμον Μωϋσέως
  english_pob_choice: the law of Moses
  chosen_spanish: la ley de Moisés
  alternatives_spanish:
  - la ley mosaica
  - la ley de Moisés
  lexicon: BDAG
  rationale: La construcción genitiva se expresa de forma directa y clara en español. Se conserva el nombre propio de Moisés porque es la forma más transparente y cercana al griego.
- source_word: χωρὶς οἰκτιρμῶν
  english_pob_choice: without mercy
  chosen_spanish: sin misericordia
  alternatives_spanish:
  - sin compasión
  - sin piedad
  lexicon: BDAG
  rationale: El plural griego οἰκτιρμῶν se vierte idiomáticamente con el sustantivo abstracto singular «misericordia». En este contexto jurídico, esa opción comunica mejor la ausencia de clemencia.
- source_word: ἐπὶ δυσὶν ἢ τρισὶν μάρτυσιν
  english_pob_choice: on the testimony of two or three witnesses
  chosen_spanish: por el testimonio de dos o tres testigos
  alternatives_spanish:
  - sobre el testimonio de dos o tres testigos
  - con el testimonio de dos o tres testigos
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo marca la base del juicio. En español, «por el testimonio de» transmite bien el fundamento probatorio y suena natural en un contexto legal.
- source_word: ἀποθνῄσκει
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - es muerto
  - es ejecutado
  - debe morir
  lexicon: BDAG
  rationale: El verbo griego dice literalmente «muere». Se mantiene esa forma en el texto principal para respetar la sobriedad del original y dejar que el contexto judicial sugiera la ejecución capital.
theological_decisions:
- issue: Si explicitar o no la pena capital implícita en ἀποθνῄσκει
  english_pob_reading: Retain the more literal 'dies' in the main text while allowing the legal context to imply capital punishment.
  chosen_spanish_reading: Conservar «muere» en el texto principal, dejando que el contexto legal implique la pena capital.
  alternative_spanish_readings:
  - es ejecutado
  - debe morir
  rationale: El griego usa ἀποθνῄσκει y no una construcción causativa explícita. Mantener «muere» preserva la restricción del texto fuente, aunque el trasfondo legal deuteronómico deja claro que se trata de ejecución judicial.
  doctrine_reference: Primacía del texto original; no añadir más fuerza legal de la que el griego expresa de manera explícita.
translation_notes:
  revision_awareness: 'Coincide con el último repaso del texto inglés: no hubo cambios aplicados y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se mantiene «ley de Moisés» y no «ley mosaica» para conservar la cercanía al griego y la transparencia lectora.
  - «Misericordia» se conserva en singular abstracto por ser la manera más natural de reflejar οἰκτιρμῶν en este marco jurídico.
  - El orden de la cláusula final sigue el flujo del griego y del audit trail inglés, sin añadir formulaciones interpretativas innecesarias.
