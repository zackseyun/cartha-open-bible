    issue: Coma innecesaria antes de «por el testimonio de dos o tres testigos»
    rationale: En español, ese complemento expresa la base judicial de «muere» y no requiere separación con coma. Quitarla mejora la fluidez y representa mejor la relación sintáctica del griego.
  - severity: low
    issue: La nota al pie usa «es muerto», formulación poco natural
    rationale: Aunque transmite la idea de ejecución, en español moderno y digno suena forzada. «es ejecutado» o «se le da muerte» sería más idiomático, manteniendo la alternativa explicativa del POB.
