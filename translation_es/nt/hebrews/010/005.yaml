translation:
  language: es
  text: 'Por eso, cuando entra en el mundo, dice: «Sacrificio y ofrenda no quisiste, pero un cuerpo me preparaste[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreos sigue aquí el texto griego de Salmo 40:6: «un cuerpo me preparaste». El texto hebreo de Salmo 40:6 dice: «oídos me abriste».'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación inferencial con lo anterior. 'Por eso' conserva la fuerza lógica sin sonar forzado en español contemporáneo.
- source_word: εἰσερχόμενος εἰς τὸν κόσμον
  english_pob_choice: when he comes into the world
  chosen_spanish: cuando entra en el mundo
  alternatives_spanish:
  - cuando viene al mundo
  - al entrar en el mundo
  lexicon: BDAG
  rationale: El participio presente introduce una cita escritural con valor vivencial; 'cuando entra en el mundo' mantiene ese valor y preserva la imagen de ingreso al orden humano, sin añadir un tiempo pasado explícito.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice ahora
  - afirma
  lexicon: BDAG
  rationale: El presente de introducción de cita bíblica se conserva de forma natural con 'dice'.
- source_word: Θυσίαν
  english_pob_choice: Sacrifice
  chosen_spanish: Sacrificio
  alternatives_spanish:
  - Un sacrificio
  lexicon: BDAG
  rationale: Término cultual básico; el singular sin artículo en español funciona bien como categoría general.
- source_word: καὶ προσφορὰν
  english_pob_choice: and offering
  chosen_spanish: y ofrenda
  alternatives_spanish:
  - y oblación
  - y ofrecimiento
  lexicon: BDAG
  rationale: '''Ofrenda'' distingue bien el segundo término cultual y es claro en español bíblico moderno. Se evita fusionarlo con ''sacrificio'' para mantener el paralelismo del griego.'
- source_word: οὐκ ἠθέλησας
  english_pob_choice: you did not desire
  chosen_spanish: no quisiste
  alternatives_spanish:
  - no deseaste
  - no quisiste aceptar
  lexicon: BDAG
  rationale: En español, 'querer' expresa adecuadamente voluntad/deseo en este contexto sacrificial. 'No quisiste' mantiene concisión y fuerza; 'deseaste' sería más literal pero menos idiomático aquí.
- source_word: σῶμα
  english_pob_choice: a body
  chosen_spanish: un cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: '''Cuerpo'' es el equivalente natural de σῶμα. Se conserva el artículo indefinido implícito del sentido español para que la frase suene idiomática y siga la lectura de Hebreos.'
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - y
  lexicon: BDAG
  rationale: Marca contraste directo entre lo que no se quiso y lo que sí fue provisto. 'Pero' refleja bien la fuerza adversativa.
- source_word: κατηρτίσω
  english_pob_choice: you prepared
  chosen_spanish: me preparaste
  alternatives_spanish:
  - me dispusiste
  - me formaste
  - me dejaste listo
  lexicon: BDAG
  rationale: '''Preparaste'' reproduce el sentido de preparar/hacer apto en un español claro y sobrio. Se mantiene la relación personal del dativo con ''me''.'
- source_word: μοι
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: BDAG
  rationale: 'En español, la dativa de interés se expresa de forma natural con clítico: ''me preparaste''. Esto preserva el destinatario implícito sin añadir pesadez.'
theological_decisions:
- issue: Hebreos cita la forma griega del Salmo 40:6, que difiere del texto hebreo masorético.
  english_pob_reading: 'Translate the Greek text of Hebrews as given: ''a body you prepared for me.'' The alternative underlying Psalm wording is preserved in a footnote.'
  chosen_spanish_reading: 'Traducir el texto griego de Hebreos tal como está: ''un cuerpo me preparaste'', con nota sobre la variante del Salmo.'
  alternative_spanish_readings:
  - '''unos oídos me abriste'' (reflejando el hebreo del Salmo 40:6)'
  - '''un cuerpo me formaste'''
  rationale: La primacía de la fuente aquí es el griego de Hebreos, no una armonización con el Salmo hebreo. La nota debe preservar la tensión textual y la relevancia interpretativa de la diferencia.
  doctrine_reference: Principio de primacía de la lengua original; preservar variantes textuales y teológicas relevantes en lugar de resolverlas artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente en cuanto al matiz del participio εἰσερχόμενος ('cuando entra en el mundo'), evitando el giro más pesado 'as he comes'. También conserva la decisión auditada de traducir el contraste y la preparación corporal de forma directa, sin armonizar con el texto hebreo del Salmo citado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se ha preferido 'cuerpo' para σῶμα y 'preparaste' para κατηρτίσω, evitando términos teológicos más interpretativos que no exige el griego.
  - La cita se ha puntuado con comillas angulares por norma tipográfica española; el marcador [a] aparece en el lugar correspondiente.
