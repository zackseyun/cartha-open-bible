translation:
  language: es
  text: no descuidando nuestra reunión[a], como es costumbre de algunos, sino animándonos unos a otros; y tanto más cuanto ven que el Día[b] se acerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'abandonando' o 'desertando' nuestra reunión.
    reason: lexical_alternative
  - marker: b
    text: '''El Día'' probablemente se refiere al día venidero del Señor o al juicio final.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγκαταλείποντες
  english_pob_choice: neglecting
  chosen_spanish: no dejando de
  alternatives_spanish:
  - no abandonando
  - no desatendiendo
  - no forsaking
  lexicon: BDAG
  rationale: El participio con μή mantiene la exhortación y expresa la idea de no desertar ni descuidar la práctica comunitaria. En español, 'no dejando de' preserva bien el carácter exhortativo y evita una intensificación excesiva como 'abandonando', mientras 'desatendiendo' sería posible pero algo más interpretativo.
- source_word: τὴν ἐπισυναγωγὴν
  english_pob_choice: gathering together
  chosen_spanish: congregarnos
  alternatives_spanish:
  - nuestra congregación
  - nuestro reunirse
  - nuestra reunión
  lexicon: BDAG
  rationale: El sustantivo se refiere al reunirse de los creyentes. 'Congregarnos' conserva la idea de reunión de la comunidad y resulta natural en español eclesial sin imponer una noción institucional más fuerte que la del griego.
- source_word: ἑαυτῶν
  english_pob_choice: our own
  chosen_spanish: nos
  alternatives_spanish:
  - de nosotros mismos
  - propia
  lexicon: BDAG
  rationale: El reflexivo indica que la reunión pertenece al grupo destinatario. En español se integra de manera natural en el verbo pronominal 'congregarnos', que ya lleva la referencia comunitaria implícita.
- source_word: καθὼς ἔθος τισίν
  english_pob_choice: as is the habit of some
  chosen_spanish: como algunos tienen por costumbre
  alternatives_spanish:
  - como es costumbre de algunos
  - como algunos están acostumbrados
  lexicon: BDAG
  rationale: ἔθος significa costumbre o hábito. La versión elegida reproduce con claridad la observación crítica pero moderada del autor, sin endurecerla innecesariamente.
- source_word: παρακαλοῦντες
  english_pob_choice: encouraging one another
  chosen_spanish: exhortándonos
  alternatives_spanish:
  - animándonos unos a otros
  - alentándonos mutuamente
  - consolándonos
  lexicon: BDAG
  rationale: παρακαλέω puede significar exhortar, animar o consolar. Aquí, por el contexto de perseverancia y contraste con abandonar la reunión, 'exhortándonos' conserva la fuerza moral del llamado; la referencia mutua queda respaldada por el contexto comunitario aunque el pronombre no esté explícito en la forma verbal.
- source_word: τοσούτῳ μᾶλλον ὅσῳ
  english_pob_choice: all the more as
  chosen_spanish: y tanto más, cuanto
  alternatives_spanish:
  - y con mayor razón, cuando
  - tanto más cuanto
  lexicon: BDAG
  rationale: La construcción correlativa intensifica la exhortación en proporción a lo que sigue. 'Y tanto más, cuanto' es una fórmula española natural que conserva la relación comparativa.
- source_word: βλέπετε
  english_pob_choice: you see
  chosen_spanish: veis
  alternatives_spanish:
  - percibís
  - observáis
  lexicon: BDAG
  rationale: El presente indicativo plural se vierte de forma directa. 'Veis' mantiene el valor visual/perceptivo amplio del verbo y suena natural en español bíblico contemporáneo.
- source_word: ἐγγίζουσαν
  english_pob_choice: drawing near
  chosen_spanish: se acerca
  alternatives_spanish:
  - que se aproxima
  - que va acercándose
  - acercándose
  lexicon: BDAG
  rationale: El participio presenta al Día como próximo. En español, 'se acerca' comunica esa cercanía de manera viva y clara, sin perder el aspecto progresivo.
- source_word: τὴν ἡμέραν
  english_pob_choice: the Day
  chosen_spanish: el Día
  alternatives_spanish:
  - el día
  - el Día del Señor
  - el día del juicio
  lexicon: BDAG
  rationale: El artículo y el contexto apuntan a un día escatológico reconocido. La mayúscula en 'Día' señala esa referencia sin ampliar el texto más allá de lo explícito en el griego.
theological_decisions:
- issue: Referencia escatológica de 'el Día'
  english_pob_reading: '''The Day'' likely refers to the coming day of the Lord or final judgment.'
  chosen_spanish_reading: '''el Día'' se mantiene con mayúscula, sugiriendo el día escatológico esperado sin especificarlo más.'
  alternative_spanish_readings:
  - el día
  - el Día del Señor
  - el día del juicio
  rationale: El contexto de perseverancia y cercanía del fin justifica entender una referencia escatológica. Sin embargo, el griego no desarrolla el referente, así que se conserva la expresión breve con mayúscula para respetar la ambigüedad controlada.
  doctrine_reference: Escatología bíblica; principio de no expansión interpretativa
- issue: Objeto recíproco de παρακαλοῦντες
  english_pob_reading: encouraging one another
  chosen_spanish_reading: exhortándonos, con reciprocidad implícita por el contexto comunitario
  alternative_spanish_readings:
  - animándonos unos a otros
  - exhortándonos unos a otros
  - alentándonos mutuamente
  rationale: Aunque el griego no añade un pronombre recíproco explícito en esta forma, el contexto de la congregación comunitaria hace evidente la acción mutua. En español se conserva la forma verbal breve y se deja la reciprocidad implícita, evitando una expansión innecesaria.
  doctrine_reference: Exégesis contextual; equivalencia óptima
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios y existe alta concordancia con el control cruzado. Se preserva la lectura escatológica de ''el Día'' y la fuerza exhortativa de παρακαλοῦντες sin sobreexplicar el objeto recíproco.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se mantiene 'Día' con mayúscula para la referencia escatológica, en línea con la auditoría inglesa.
  - '''Congregarnos'' evita una terminología eclesiástica más institucional que ''asamblea'' o ''servicio''.'
  - '''Exhortándonos'' refleja mejor la fuerza de παρακαλοῦντες que ''consolándonos'' en este contexto.'
  - La puntuación con punto y coma reproduce el contraste entre las dos exhortaciones principales.
