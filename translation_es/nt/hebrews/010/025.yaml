revisions:
- from: no dejando de congregarnos[a], como algunos tienen por costumbre[b], sino exhortándonos; y tanto más, cuanto veis que el Día se acerca.
  to: no descuidando nuestra reunión[a], como es costumbre de algunos, sino animándonos unos a otros; y tanto más cuanto ven que el Día[b] se acerca.
  rationale: Se ajusta ἐγκαταλείποντες a 'no descuidando' para seguir la decisión principal del POB ('neglecting') sin exagerar hacia apostasía o abandono total; se vierte ἐπισυναγωγή como 'nuestra reunión' para preservar el sustantivo comunitario sin institucionalizarlo; se cambia παρακαλοῦντες a 'animándonos unos a otros' para reflejar el sentido mutual de aliento documentado; se usa 'ven' por español neutro latinoamericano; y se reubica la nota escatológica sobre 'el Día' en su lugar exacto.
