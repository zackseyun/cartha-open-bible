review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa general del griego: no abandonar la reunión comunitaria, sino fortalecer mutuamente, y hacerlo más al acercarse el Día. Sin embargo, dos decisiones no siguen de cerca el rastro auditado del POB: ἐγκαταλείποντες se acercó mejor a ''descuidar/no descuidando'' que a ''no dejando de'', y παρακαλοῦντες en este contexto está mejor como ''animando/alentando'' que ''exhortando'', para preservar el matiz de encouragement documentado por el POB.'
  spanish_quality_summary: El español es legible y digno, pero 'no dejando de congregarnos' suena algo perifrástico y menos natural que 'no descuidando nuestra reunión' o similar. 'Exhortándonos' endurece el tono frente al sentido mutuo de ánimo. Además, 'veis' introduce voseo peninsular; para español neutro latinoamericano conviene 'ven'. La puntuación también puede fluir mejor sin punto y coma.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'El Día' con mayúscula está bien preservado. La nota a sobre ἐγκαταλείποντες debe alinearse mejor con las alternativas auditadas ('abandonando' / 'desertando' es aceptable como alternativas), pero el texto principal debería reflejar mejor 'neglecting' mediante 'descuidando' o 'desatendiendo'.
  issues:
  - severity: medium
    issue: '''no dejando de congregarnos'' no representa con suficiente precisión ἐγκαταλείποντες'
    rationale: El POB documenta 'neglecting' como elección principal para evitar sobrecargar el verbo con abandono total. 'No dejando de congregarnos' en español tiende a expresar mera cesación de asistir, pero pierde el matiz léxico de descuido/desatención presente en la decisión auditada.
  - severity: medium
    issue: '''exhortándonos'' no sigue la decisión léxica principal para παρακαλοῦντες'
    rationale: El rastro inglés eligió 'encouraging one another' por el sentido de fortalecimiento mutuo. 'Exhortándonos' es posible, pero suena más duro y directivo que el matiz preferido en este contexto.
  - severity: medium
    issue: Uso de 'veis' en lugar de forma más neutra latinoamericana
    rationale: La guía pide español neutral latinoamericano / ampliamente legible en la iglesia. 'Ven' mantiene el plural ustedes y evita registro peninsular.
  - severity: low
    issue: La nota b está anclada en 'costumbre' pero explica 'el Día'
    rationale: Aunque técnicamente puede entenderse por proximidad del texto, la nota debe anclarse en la palabra o frase relevante para claridad editorial y consistencia.
  revised_spanish_text: no descuidando nuestra reunión[a], como es costumbre de algunos, sino animándonos unos a otros; y tanto más cuanto ven que el Día[b] se acerca.
