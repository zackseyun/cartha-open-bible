translation:
  language: es
  text: Pero en estos sacrificios hay un recordatorio de los pecados[a] año tras año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada año».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: La conjunción adversativa introduce contraste con el argumento anterior. «Pero» es natural, breve y conserva el giro adversativo sin añadir énfasis no explicitado por el griego.
- source_word: ἐν αὐταῖς
  english_pob_choice: in these sacrifices
  chosen_spanish: en estos sacrificios
  alternatives_spanish:
  - en ellos
  - en estas ofrendas
  - en tales sacrificios
  lexicon: BDAG
  rationale: El pronombre femenino plural remite a los sacrificios del contexto inmediato. En español conviene hacer explícito el referente, como en la POB inglesa, para que la frase no quede oscura.
- source_word: ἀνάμνησις
  english_pob_choice: a reminder
  chosen_spanish: un recordatorio
  alternatives_spanish:
  - un recuerdo
  - una rememoración
  - un memorial
  lexicon: BDAG
  rationale: 'El sustantivo denota traer algo a la memoria o hacer recordar. «Recordatorio» transmite esa función de manera natural en español y preserva el sentido argumentativo de Hebreos: los sacrificios repetidos no quitan el pecado, sino que lo ponen de nuevo ante la conciencia.'
- source_word: ἁμαρτιῶν
  english_pob_choice: of sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de pecados
  - acerca de los pecados
  lexicon: BDAG
  rationale: El genitivo depende de ἀνάμνησις; «de los pecados» comunica de manera directa que lo recordado son los pecados. El artículo definido es idiomático en español y no altera el sentido.
- source_word: κατ’ ἐνιαυτόν
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  - año por año
  lexicon: BDAG
  rationale: La expresión de recurrencia temporal se rinde bien con «año tras año», que en español suena natural y conserva la idea de repetición continua destacada por la POB inglesa.
theological_decisions:
- issue: Relación entre los sacrificios y el recuerdo de los pecados
  english_pob_reading: The repeated sacrifices do not remove sin; they function as a reminder of sins year after year.
  chosen_spanish_reading: Los sacrificios repetidos funcionan como recordatorio de los pecados año tras año.
  alternative_spanish_readings:
  - En estos sacrificios hay un recuerdo de los pecados cada año.
  - En ellos hay un memorial de los pecados año tras año.
  rationale: 'La redacción española conserva la tensión del argumento de Hebreos: la repetición cultual señala persistentemente el problema del pecado en vez de resolverlo. No se suaviza el valor retórico de la frase ni se transforma en una explicación más teológica de lo que el texto dice.'
  doctrine_reference: Hebreos 10:1-4; doctrina de la insuficiencia de los sacrificios levíticos en contraste con la obra de Cristo
- issue: Fuerza de la repetición temporal
  english_pob_reading: year after year
  chosen_spanish_reading: año tras año
  alternative_spanish_readings:
  - cada año
  - anualmente
  rationale: «Año tras año» mantiene el matiz de repetición continua y acumulativa que subraya el argumento de la epístola. «Cada año» sería correcto, pero menos expresivo para la reiteración retórica.
  doctrine_reference: Hebreos 9:25-26; 10:1-4
translation_notes:
  revision_awareness: 'El contexto griego y el audit trail inglés coinciden plenamente: ἀλλ’ marca contraste, αὐταῖς remite a los sacrificios del contexto previo, ἀνάμνησις exige un término de memoria/recordatorio y κατ’ ἐνιαυτόν expresa repetición anual. No se registran revisiones textuales o cambios recientes en la base inglesa; la versión española sigue ese consenso sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «sacrificios» para hacer explícito el referente de αὐταῖς, en paralelo con la solución auditada en inglés.
  - Se usa «recordatorio» en lugar de «memorial» para evitar una tonalidad litúrgica más fuerte que la exigida por el griego en este contexto.
  - No se sustituye «pecados» por una abstracción como «culpa», porque el genitivo griego apunta directamente a ἁμαρτιῶν.
  - 'La nota textual en español conserva la misma alternativa semántica que la POB inglesa: «año tras año» / «cada año».'
