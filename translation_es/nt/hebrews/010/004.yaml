  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imposibilidad absoluta, sangre de toros y machos cabríos, y plural «pecados». También preserva la nota léxica sobre ἀφαιρεῖν. Sin embargo, la sintaxis española actual «la sangre... es imposible que quite» es poco natural y desajusta la construcción impersonal de ἀδύνατον con infinitivo, que se expresa mejor como «es imposible que la sangre... quite» o «es imposible... quitar».'
