translation:
  language: es
  text: Porque es imposible que la sangre de toros y de machos cabríos quite los pecados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «remueva los pecados». El verbo griego puede significar quitar o remover.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδύνατον
  english_pob_choice: it is impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - imposible
  - no puede ser
  lexicon: BDAG
  rationale: Como en el inglés POB, ἀδύνατον funciona impersonalmente con el infinitivo; en español natural y fiel, «es imposible» expresa esa fuerza absoluta sin perder fluidez.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento. «Porque» es natural al inicio de una oración en español y conserva la relación lógica con el contexto anterior.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre
  lexicon: BDAG
  rationale: Se mantiene el lenguaje sacrificial concreto de «sangre», como en el POB inglés, porque el texto nombra la sangre explícitamente y no una paráfrasis como «sacrificio».
- source_word: ταύρων
  english_pob_choice: of bulls
  chosen_spanish: de toros
  alternatives_spanish:
  - de bueyes
  - de toros
  lexicon: BDAG
  rationale: ταῦρος designa un toro; «toros» reproduce bien el referente zoológico y encaja en español bíblico actual. «Bueyes» sería más interpretativo en este contexto sacrificial.
- source_word: τράγων
  english_pob_choice: and goats
  chosen_spanish: y de machos cabríos
  alternatives_spanish:
  - y de cabras
  - y de machos cabríos
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «goats» por idiomática, en español «machos cabríos» conserva con mayor precisión la especificidad de τράγος, que nombra un macho cabrío, y evita perder el matiz masculino del griego.
- source_word: ἀφαιρεῖν
  english_pob_choice: to take away
  chosen_spanish: quite
  alternatives_spanish:
  - remueva
  - quite
  - elimine
  lexicon: BDAG
  rationale: «Quitar» comunica de forma idiomática la acción de remover o apartar, y preserva la fuerza concreta del verbo sin volverlo abstracto. El POB inglés reconoce también la alternativa «remove».
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - pecados
  - el pecado
  lexicon: BDAG
  rationale: El plural griego se conserva como plural en español, «los pecados», para no neutralizar la referencia explícita a actos o culpas concretas.
theological_decisions:
- issue: Eficacia de la sangre animal en el argumento de Hebreos
  english_pob_reading: The verse states that animal blood cannot take away sins in the ultimate sense intended by the argument.
  chosen_spanish_reading: El versículo afirma que la sangre de animales no puede quitar los pecados en el sentido definitivo que desarrolla el argumento.
  alternative_spanish_readings:
  - La sangre animal cubría temporalmente los pecados
  - Los sacrificios animales ofrecían purificación ritual, pero no la remoción final del pecado
  rationale: La traducción debe permanecer cercana al texto y no resolver por adelantado la tensión teológica que Hebreos desarrolla después. «Quitar los pecados» mantiene abierta la distinción entre eliminación definitiva y posible función ritual limitada.
  doctrine_reference: Preservar la tensión teológica sin explicitar más de lo que el verso dice.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del POB inglés y no requiere cambios de revisión respecto del pasaje auditado; se mantiene la formulación breve y argumentativa del griego.
  spanish_consistency_notes:
  - Se mantiene «sangre» y no se suaviza a «sacrificio», en continuidad con la terminología preferida del proyecto.
  - Se conservan los plurales «toros», «machos cabríos» y «pecados» para reflejar los plurales del griego.
  - La elección de «es imposible» sigue el patrón del inglés POB para ἀδύνατον con infinitivo impersonal.
