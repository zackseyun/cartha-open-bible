  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Quitar los pecados» concuerda con la decisión léxica del POB; la nota con «remover» preserva la alternativa documentada.
