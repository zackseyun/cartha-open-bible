    issue: Construcción impersonal española poco natural
    rationale: «La sangre de toros y de machos cabríos es imposible que quite...» no es español idiomático. El griego ἀδύνατον funciona impersonalmente; en español debe formularse como «es imposible que la sangre...» para mantener fidelidad y claridad.
  revised_spanish_text: Porque es imposible que la sangre de toros y de machos cabríos quite los pecados[a].
