translation:
  language: es
  text: y un gran sacerdote sobre la casa de Dios[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sumo sacerdote». Hebreos presenta frecuentemente a Jesús como sumo sacerdote, pero este versículo dice literalmente «un gran sacerdote».'
    reason: alternative_reading
  - marker: b
    text: «Casa de Dios» puede llevar también la idea de la casa como su familia o pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conecta esta frase con la construcción anterior en Hebreos 10:19–20; en español, la conjunción simple «y» es la correspondencia natural y más clara.
- source_word: ἱερέα
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdote principal
  - sumo sacerdote
  lexicon: BDAG
  rationale: El griego usa ἱερεύς, no ἀρχιερεύς. Para no importar el título técnico «sumo sacerdote» donde el texto no lo emplea, se mantiene un término sacerdotal general. «Sacerdote» reproduce mejor la fuerza léxica y permite que el contexto más amplio de Hebreos señale la función exaltada de Jesús.
- source_word: μέγαν
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - excelso
  - eminente
  lexicon: BDAG
  rationale: μέγας califica a ἱερέα y expresa grandeza o eminencia. En español, «gran»/«grande» conserva esa cualidad sin convertirla en un título técnico distinto.
- source_word: ἐπὶ
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - al frente de
  lexicon: BDAG
  rationale: Con acusativo, ἐπί puede indicar autoridad o supervisión. «Sobre» es la equivalencia breve y natural en español, y permite oír la idea de autoridad sobre la casa.
- source_word: τὸν οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la casa de Dios
  - la familia
  lexicon: BDAG
  rationale: οἶκος puede referirse a una casa física o a una casa como comunidad. Se traduce «la casa» para preservar la metáfora bíblica; el complemento «de Dios» ya ancla el sentido. La nota conserva la posible resonancia comunitaria.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: El genitivo identifica la casa como perteneciente a Dios. Aunque el POB suele usar «Yahvé» para el nombre divino en el hebreo, aquí el texto griego dice θεοῦ; por fidelidad al griego y al contexto de Hebreos, se mantiene «Dios».
theological_decisions:
- issue: Si ἱερέα μέγαν debe verterse como un título técnico equivalente a «sumo sacerdote»
  english_pob_reading: great priest
  chosen_spanish_reading: gran sacerdote
  alternative_spanish_readings:
  - sumo sacerdote
  - sacerdote principal
  rationale: La teología de Hebreos identifica a Jesús con el sacerdocio supremo, pero esta cláusula no usa ἀρχιερεύς. Para no sobretraducir ni borrar la tensión lexical entre el término empleado y el concepto teológico más amplio, se conserva «gran sacerdote» y se deja que el lector lo relacione con el argumento del libro.
  doctrine_reference: Hebreos 4:14–16; 7:23–28; principios de primacía del texto original
translation_notes:
  revision_awareness: Coincide con el último control de revisión en inglés, que mantiene la lectura literal «great priest» en vez de importar el título técnico «high priest». No se registraron revisiones posteriores que afecten la segmentación o el sentido de este versículo.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre ἱερεύς y ἀρχιερεύς con el fin de respetar la terminología del griego.
  - Se evitó «SEÑOR» porque el texto fuente griego dice θεοῦ y no κύριος.
  - «Casa de Dios» conserva la metáfora bíblica y, con la nota, permite la posible lectura comunitaria sin imponerla.
  - La puntuación final con coma refleja la continuidad sintáctica del segmento griego.
