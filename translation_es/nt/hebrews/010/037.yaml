translation:
  language: es
  text: Porque dentro de muy poco tiempo[a], el que viene[b] vendrá y no tardará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «un poco cuanto cuanto»; un modismo que significa «dentro de muy poco tiempo».
    reason: lexical_alternative
  - marker: b
    text: O, «el Venidero». La frase griega puede leerse de manera más general, pero también puede conservar una posible fuerza titulativa o mesiánica en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτι γὰρ
  english_pob_choice: For yet
  chosen_spanish: Porque aún
  alternatives_spanish:
  - Porque todavía
  - Pues aún
  - Porque todavía falta
  lexicon: BDAG
  rationale: γάρ introduce explicación, por eso se conserva con «Porque». ἔτι añade continuidad temporal, que en español se expresa naturalmente con «aún». Evito calcar «for yet» y mantengo la relación discursiva con la oración anterior.
- source_word: μικρὸν ὅσον ὅσον
  english_pob_choice: a very little while
  chosen_spanish: un muy poco tiempo
  alternatives_spanish:
  - un brevísimo tiempo
  - muy poco tiempo
  - un poquito más
  lexicon: BDAG
  rationale: La repetición enfática griega indica brevísima duración. «Un muy poco tiempo» transmite esa intensidad de modo natural en español sin perder el valor idiomático ni volverlo demasiado interpretativo.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who is coming
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que está viniendo
  - el Venidero
  - el que ha de venir
  lexicon: BDAG
  rationale: La forma participial sustantivada puede leerse de manera directa y también con posible fuerza titulativa. En español, «el que viene» conserva la referencia personal sin forzar un título técnico; el contexto mesiánico queda disponible sin sobretraducirlo.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá de nuevo
  - llegará
  lexicon: BDAG
  rationale: El futuro verbal se expresa de manera simple y directa con «vendrá». Mantiene el eco con «el que viene» y evita una redundancia innecesaria en español.
- source_word: οὐ χρονίσει
  english_pob_choice: will not delay
  chosen_spanish: no tardará
  alternatives_spanish:
  - no se retrasará
  - no demorará
  - no se detendrá
  lexicon: BDAG
  rationale: χρονίζω aquí significa demorarse o tardar. «No tardará» es la opción más natural y clara en español actual, conservando la fuerza temporal sin arcaísmo.
theological_decisions:
- issue: Si ὁ ἐρχόμενος debe reflejarse como designación mesiánica o como participio sustantivado más general
  english_pob_reading: the one who is coming
  chosen_spanish_reading: el que viene
  alternative_spanish_readings:
  - el Venidero
  - el que ha de venir
  - el que viene como Mesías
  rationale: El contexto de la cita en Hebreos favorece una resonancia mesiánica, pero el texto griego en sí permite una lectura participial directa. «El que viene» preserva esa ambigüedad significativa sin imponer una formulación doctrinal no explicitada por el verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «the Coming One» a «the one who is coming» para una traducción más directa del participio sustantivado. La redacción española sigue esa revisión con «el que viene», evitando un título más marcado y conservando la apertura contextual del original.
  spanish_consistency_notes:
  - He mantenido «el que viene» en lugar de «el Venidero» para no introducir una mayúscula titulativa que el español no exige y que podría endurecer la lectura.
  - «Tardará» reproduce el valor de χρονίσει de manera más natural que «demorará» en español bíblico moderno.
  - La cadencia breve de la frase busca reflejar la densidad retórica del griego sin añadir elementos ausentes en el texto fuente.
