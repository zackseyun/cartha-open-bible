translation:
  language: es
  text: 'que él inauguró para nosotros: un camino nuevo y vivo, a través del velo[a] —es decir, su carne[b]—.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortina».
    reason: lexical_alternative
  - marker: b
    text: La frase «es decir, su carne» explica la metáfora del velo al identificarlo con la carne de Jesús.
    reason: theological_note
lexical_decisions:
- source_word: ἐνεκαίνισεν
  english_pob_choice: inaugurated
  chosen_spanish: inauguró
  alternatives_spanish:
  - consagró
  - dedicó
  - abrió
  lexicon: BDAG
  rationale: ἐγκαινίζω tiene el sentido de poner algo en uso nuevo o dedicarlo solemnemente. «Inauguró» conserva mejor esa fuerza cultual y de acceso que «abrió», y suena natural en español bíblico contemporáneo.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de beneficio se expresa con naturalidad como «para nosotros», destacando el beneficio del acceso otorgado.
- source_word: ὁδὸν
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  lexicon: BDAG
  rationale: «Camino» comunica bien la imagen metafórica de acceso y es idiomático en español; mantiene la amplitud semántica de ὁδός.
- source_word: πρόσφατον
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - reciente
  - fresco
  lexicon: BDAG
  rationale: Aunque el matiz literal puede ser «reciente» o «fresco», en este contexto la idea es un camino recién establecido. «Nuevo» expresa esa función con claridad y sin torpeza.
- source_word: ζῶσαν
  english_pob_choice: living
  chosen_spanish: vivo
  alternatives_spanish:
  - viviente
  - que vive
  - vivificador
  lexicon: BDAG
  rationale: El participio adjetival ζῶσαν se conserva con el adjetivo «vivo», que es natural en español y mantiene el contraste con el sistema antiguo de sacrificios.
- source_word: διὰ τοῦ καταπετάσματος
  english_pob_choice: through the curtain
  chosen_spanish: a través del velo
  alternatives_spanish:
  - a través de la cortina
  - por el velo
  lexicon: BDAG
  rationale: καταπέτασμα designa la cortina/velo del tabernáculo o templo. Se elige «velo» para mantener la resonancia bíblica y litúrgica tradicional, sin perder el referente cultual; el inglés POB marcó «curtain» con nota de alternativa por la misma razón.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: BDAG
  rationale: La fórmula explicativa se vierte naturalmente como «es decir», que conserva la función aclaratoria del griego sin añadir contenido.
- source_word: τῆς σαρκὸς αὐτοῦ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su humanidad
  lexicon: BDAG
  rationale: σάρξ se traduce normalmente como «carne» cuando el texto habla de la realidad encarnada de Jesús. «Carne» preserva la tensión teológica y la metáfora sacrificial; «cuerpo» suavizaría demasiado el término.
theological_decisions:
- issue: Identificación metafórica del velo con la carne de Jesús
  english_pob_reading: The curtain metaphor is explained by identifying it with Jesus's flesh.
  chosen_spanish_reading: El velo se explica como su carne.
  alternative_spanish_readings:
  - el velo, es decir, su carne
  - a través del velo, esto es, su carne
  - el velo, es decir, a través de su carne
  rationale: 'El griego usa una apposición explicativa: «esto es, de su carne». La redacción española conserva la relación metafórica sin sobreexplicarla. No se añade un segundo «a través de» para no forzar la sintaxis y para respetar el ajuste de la revisión inglesa que eliminó una repetición innecesaria.'
  doctrine_reference: 'DOCTRINE.md: preservar la metáfora y la tensión teológica sin resolverla de forma interpretativa excesiva'
- issue: Renderización de σάρξ
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza humana
  rationale: El término σάρξ aquí es literal y cristológico, referido a la encarnación y al sacrificio de Jesús. «Carne» reproduce mejor la literalidad doctrinal que «cuerpo», y evita interpretar el pasaje como si hablara solo de la corporeidad física sin matiz teológico.
  doctrine_reference: 'DOCTRINE.md contested terms table: σάρξ → carne (literal) / naturaleza humana (metafórica)'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó una segunda aparición de «through» antes de «his flesh» para ajustarse mejor al griego. Por eso la versión española evita repetir una preposición equivalente antes de «su carne» y mantiene la cláusula como una apposición explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto lo requiera, pero aquí no aparece el nombre divino.
  - Se mantiene «carne» para σάρξ conforme al criterio doctrinal del proyecto en usos literales.
  - Se eligió «velo» en el texto principal por resonancia cultual, con nota alternativa «cortina» implícita en la tradición lexicográfica del pasaje.
  - La puntuación con raya introduce la explicación, siguiendo la función aclaratoria del griego τοῦτ’ ἔστιν.
