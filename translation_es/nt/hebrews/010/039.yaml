review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura contrastiva del griego: ἡμεῖς δὲ / οὐκ ἐσμὲν ... ἀλλὰ ..., conserva el pronombre enfático, mantiene ''fe'' para πίστις y ''alma'' para ψυχή conforme al rastro auditado, y no sobredetermina ὑποστολή como apostasía. Sin embargo, hay dos puntos que requieren ajuste: ''de retroceder'' suena menos idiomático en esta construcción categorial que una formulación nominal como ''de los que retroceden'', y la nota d no corresponde al audit trail inglés, que preservaba una formulación previa sobre περιποίησις (''to the preserving of the soul''), no una alternativa para ψυχῆς.'
  spanish_quality_summary: 'El español es comprensible y digno, pero algo rígido. ''No somos de retroceder'' es entendible, aunque en español bíblico-natural resulta más fluido ''no somos de los que retroceden''. ''Para preservación del alma'' es fiel, pero conviene añadir el artículo: ''para la preservación del alma'' para mayor naturalidad y paralelismo nominal. La puntuación y el registro general son adecuados.'
  glossary_alignment: 'Alineado en términos clave: πίστις -> ''fe'' con nota sobre ''fidelidad''; ψυχή -> ''alma'' con nota que aclara el campo semántico; no hay términos del glosario mayor en conflicto. La principal desviación no es terminológica sino de idiomaticidad y de fidelidad de la nota d al historial POB.'
  issues:
