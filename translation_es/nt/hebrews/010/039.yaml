translation:
  language: es
  text: Pero nosotros no somos de los que retroceden para perdición[a], sino de fe[b] para la preservación[c] del alma[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echarse atrás». El término griego puede denotar retirada o repliegue; algunos intérpretes lo entienden aquí con el sentido más fuerte de apostasía.
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad». El griego pistis puede abarcar la idea de perseverancia fiel, además de fe.
    reason: alternative_reading
  - marker: c
    text: O «para la preservación», «para la obtención» o «para la posesión» del alma/vida. La frase griega puede referirse a preservar la vida o el ser de la persona, no solo al «alma» en un sentido moderno estrecho.
    reason: lexical_alternative
  - marker: d
    text: O «para el preservar del alma».
    reason: previous_rendering
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros
  lexicon: ἐγώ
  rationale: Se conserva el pronombre explícito de primera persona plural para mantener el contraste enfático con la advertencia anterior. En español, 'nosotros' comunica con naturalidad ese énfasis.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: δέ
  rationale: El valor adversativo se expresa mejor con 'Pero' al inicio de la cláusula, en un español natural y claro.
- source_word: οὐκ ἐσμὲν
  english_pob_choice: are not
  chosen_spanish: no somos
  alternatives_spanish:
  - no estamos
  - no pertenecemos a
  lexicon: εἰμί
  rationale: La cópula negativa se vierte de manera directa como 'no somos'. Esto preserva la concisión del griego sin introducir un verbo de pertenencia que el texto no explicita.
- source_word: ὑποστολῆς
  english_pob_choice: shrinking back
  chosen_spanish: de retroceder
  alternatives_spanish:
  - de echarse atrás
  - de retirarse
  - de volver atrás
  lexicon: ὑποστολή
  rationale: '''Retroceder'' comunica con claridad la idea de retirada o repliegue sin cargar de antemano la frase con la interpretación más fuerte de apostasía. En español fluye mejor que un calco como ''encogimiento'' o ''retraimiento''.'
- source_word: εἰς ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: para perdición
  alternatives_spanish:
  - para destrucción
  - hacia destrucción
  - para ruina
  lexicon: ἀπώλεια
  rationale: '''Perdición'' mantiene la gravedad del resultado y corresponde bien al uso soteriológico tradicional sin suavizar la oposición con la segunda mitad del versículo. Se evita ''destrucción'' porque en español puede sonar demasiado físico y menos idiomático en este contexto.'
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: de fe
  alternatives_spanish:
  - de fidelidad
  - de confianza
  lexicon: πίστις
  rationale: Se conserva 'fe' como término principal. La posible idea de perseverancia fiel queda abierta sin resolverse en la traducción principal, en línea con el audit trail inglés.
- source_word: εἰς περιποίησιν
  english_pob_choice: to the preservation
  chosen_spanish: para preservación
  alternatives_spanish:
  - para la preservación
  - para adquisición
  - para obtención
  lexicon: περιποίησις
  rationale: '''Preservación'' reproduce el valor de resultado/fin y mantiene el paralelismo con ''perdición''. La preposición ''para'' expresa finalidad sin forzar una lectura de adquisición o posesión.'
- source_word: ψυχῆς
  english_pob_choice: of the soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de la vida
  - de la persona
  - de sí mismo
  lexicon: ψυχή
  rationale: '''Alma'' conserva el peso teológico tradicional y refleja la decisión auditada de mantener el término, sin cerrar la posibilidad de que el griego abarque ''vida'' o ''sí mismo'' en sentido más amplio.'
theological_decisions:
- issue: Sentido de πίστις frente a ὑποστολή
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza perseverante
  rationale: La oposición del versículo contrapone retroceso y fe. Mantener 'fe' preserva el valor principal del término sin resolver por adelantado su matiz de perseverancia o fidelidad, que queda implícito pero no explicitado en la traducción principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Alcance de περιποίησις ψυχῆς
  english_pob_reading: the preservation of the soul
  chosen_spanish_reading: preservación del alma
  alternative_spanish_readings:
  - obtención del alma
  - preservación de la vida
  - salvación del alma
  rationale: El contraste inmediato con 'perdición' favorece un sentido de preservación. Se evita convertir la frase en una formulación más doctrinalmente cerrada o en una idea de adquisición, conservando la tensión semántica del griego.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Valor de ὑποστολή
  english_pob_reading: shrinking back
  chosen_spanish_reading: retroceder
  alternative_spanish_readings:
  - echarse atrás
  - retirarse
  - apostasía
  rationale: '''Retroceder'' es suficientemente amplio para abarcar retirada, repliegue o abandono, sin imponer que el término signifique automáticamente apostasía plena. Esa ambigüedad está documentada y se preserva.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — ὑποστολή'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés más reciente, que mantuvo sin cambios la lectura principal del versículo y reforzó la preferencia por el sustantivo 'preservación' en la cláusula final. La redacción española refleja esa estructura paralela entre 'perdición' y 'preservación', y conserva las alternativas semánticas documentadas sin resolver la tensión teológica de πίστις, ὑποστολή y ψυχή.
  spanish_consistency_notes:
  - Se usa 'Pero' para el contraste adversativo, coherente con el valor de δέ en el contexto.
  - Se mantiene 'fe' como término principal para πίστις, con nota alternativa sobre 'fidelidad'.
  - '''Perdición'' y ''preservación'' forman un paralelismo claro y natural en español, correspondiente al par resultativo del griego.'
  - '''Alma'' se conserva por peso teológico y por continuidad terminológica, sin negar el sentido más amplio de ''vida'' o ''persona''.'
  - No se introduce 'SEÑOR' ni otros reemplazos de término que no corresponden a este versículo.
