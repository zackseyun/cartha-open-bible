revisions:
- from: Pero nosotros no somos de retroceder para perdición[a], sino de fe[b] para preservación[c] del alma[d].
  to: Pero nosotros no somos de los que retroceden para perdición[a], sino de fe[b] para la preservación[c] del alma[d].
  rationale: Se ajusta la sintaxis para un español más natural sin perder la fuerza categorial del griego ('de los que retroceden'), se añade el artículo en 'la preservación' para mejor fluidez, y se corrige la nota d para que refleje fielmente la formulación previa documentada en el audit trail inglés en lugar de introducir una alternativa no respaldada.
  reviewer_model: gpt-5.4
