    issue: Construcción 'no somos de retroceder' poco idiomática en español
    rationale: Aunque intenta preservar la concisión del griego con genitivo de cualidad/categoría, en español suena forzado. 'No somos de los que retroceden' expresa mejor la pertenencia categorial implícita sin añadir una interpretación ajena.
  - severity: low
    issue: Falta de artículo en 'para preservación del alma'
    rationale: '''Para la preservación del alma'' suena más natural y refleja mejor el sustantivo griego περιποίησιν en paralelo con ἀπώλειαν.'
  - severity: high
    issue: La nota d no refleja la nota inglesa auditada
    rationale: 'El inglés marca como nota d una formulación previa: ''Or "to the preserving of the soul"''. La nota española actual ''O «del alma que se preserva»'' introduce una alternativa distinta y menos fiel al historial documentado.'
