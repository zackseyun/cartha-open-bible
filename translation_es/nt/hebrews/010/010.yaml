translation:
  language: es
  text: Por esa voluntad hemos sido santificados mediante la ofrenda del cuerpo de Jesús el Mesías una vez para siempre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en esa voluntad». El sentido es que los creyentes son santificados por la voluntad de Dios recién mencionada en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Jesús Cristo». Aquí Χριστός se ha vertido como «Mesías» para preservar su valor de título.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ θελήματι
  english_pob_choice: By that will
  chosen_spanish: En esa voluntad
  alternatives_spanish:
  - Por esa voluntad
  - Mediante esa voluntad
  - En aquella voluntad
  lexicon: BDAG
  rationale: La frase retoma la voluntad de Dios mencionada en el contexto inmediato. En español, «En esa voluntad» conserva la referencia anafórica y el matiz de esfera/medio sin sonar tan pesado como una calca literal.
- source_word: ἡγιασμένοι ἐσμὲν
  english_pob_choice: we have been sanctified
  chosen_spanish: hemos sido santificados
  alternatives_spanish:
  - somos santificados
  - hemos sido hechos santos
  lexicon: BDAG
  rationale: El participio perfecto perifrástico con εἰμί expresa una acción completada con resultado vigente. «Hemos sido santificados» preserva ese valor aspectual y el registro teológico de ἁγιάζω mejor que un presente simple.
- source_word: διὰ τῆς προσφορᾶς
  english_pob_choice: through the offering
  chosen_spanish: mediante la ofrenda
  alternatives_spanish:
  - por medio de la ofrenda
  - a través de la ofrenda
  - por la ofrenda
  lexicon: BDAG
  rationale: διά con genitivo marca medio o instrumento. «Mediante» es natural en español y mantiene con claridad que la santificación ocurre por el medio de la ofrenda.
- source_word: προσφορᾶς
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - sacrificio
  - presentación
  lexicon: BDAG
  rationale: προσφορά designa una ofrenda, con contexto sacrificial implícito. «Ofrenda» es la correspondencia más directa y deja que el contexto haga explícito el valor sacrificial.
- source_word: τοῦ σώματος
  english_pob_choice: the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - de su cuerpo
  - del cuerpo suyo
  lexicon: BDAG
  rationale: El griego presenta el sustantivo explícito «cuerpo»; mantenerlo conserva la concreción de la autoofrenda corporal de Jesús. El posesivo se sobreentiende por los genitivos siguientes.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como nombre fijo; por eso se traduce «Mesías» según el criterio POB. «Jesús Mesías» preserva el valor titular sin introducir una formulación más eclesiástica o fusionada.
- source_word: ἐφάπαξ
  english_pob_choice: once for all
  chosen_spanish: una vez para siempre
  alternatives_spanish:
  - una vez por todas
  - de una vez y para siempre
  - una sola vez
  lexicon: BDAG
  rationale: El adverbio subraya el carácter definitivo e irrepetible de la ofrenda. «Una vez para siempre» reproduce bien ese énfasis en español y suena natural y solemne.
theological_decisions:
- issue: Aspecto de la santificación
  english_pob_reading: we have been sanctified
  chosen_spanish_reading: hemos sido santificados
  alternative_spanish_readings:
  - somos santificados
  - estamos santificados
  rationale: La forma griega es un perfecto perifrástico, no un presente progresivo. «Hemos sido santificados» mantiene la acción completada con resultado duradero, sin resolver de antemano la tensión entre estado y proceso.
  doctrine_reference: Mantener la tensión gramatical del perfecto; evitar sobreinterpretación doctrinal
- issue: Título cristológico Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Cristo Jesús
  rationale: La política del proyecto favorece «Mesías» cuando Χριστός funciona como título. Esto conserva su sentido y evita convertirlo sin necesidad en una forma nominalizada tradicional.
  doctrine_reference: Χριστός → Mesías cuando actúa como título
translation_notes:
  revision_awareness: 'El texto español sigue el consenso estable del audit trail: mantiene el valor aspectual del perfecto perifrástico, conserva el medio instrumental de διά y restaura Χριστός como «Mesías» conforme a la política doctrinal del proyecto. Se evita la revisión regresiva que habría naturalizado Χριστός como «Cristo» en este contexto titular.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparezca explícitamente; aquí el referente se expresa como «voluntad» sin necesidad de nombrarlo.
  - Se mantuvo el registro teológico con «santificados» y «ofrenda», evitando sustituciones como «hechos santos» o «sacrificio» que estrecharían el matiz del griego.
  - «Una vez para siempre» comunica la definitividad del ἐφάπαξ sin expandir el sentido más allá del texto.
