- from: En esa voluntad hemos sido santificados mediante la ofrenda del cuerpo de Jesús Mesías una vez para siempre[a][b].
  to: Por esa voluntad hemos sido santificados mediante la ofrenda del cuerpo de Jesús el Mesías una vez para siempre[a][b].
  rationale: Se corrige ἐν ᾧ θελήματι a «Por esa voluntad» para reflejar mejor el sentido instrumental documentado en el expediente del POB y se ajusta «Jesús Mesías» a «Jesús el Mesías» para lograr un español más natural sin perder el valor titular de Χριστός. Se mantiene el resto porque es fiel al griego y al razonamiento léxico-teológico auditado.
