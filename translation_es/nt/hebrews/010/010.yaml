review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: la santificación ocurre por la voluntad de Dios mencionada en el contexto, mediante la ofrenda del cuerpo de Jesús, con efecto definitivo. También preserva correctamente el perfecto perifrástico ἡγιασμένοι ἐσμὲν con «hemos sido santificados» y el valor instrumental de διὰ con «mediante». Sin embargo, «En esa voluntad» no representa tan bien la decisión auditada del POB («By that will») ni su nota explicativa, porque en español suena más locativo/esférico que instrumental. «Por esa voluntad» expresa mejor el sentido anafórico e instrumental documentado.'
  spanish_quality_summary: 'El español es claro y digno, pero «Jesús Mesías» resulta menos natural en español eclesial general que «Jesús el Mesías» cuando Χριστός se entiende como título. Además, la nota a actualmente dice «en esa voluntad», lo que conviene ajustar si se corrige el texto principal. El resto del verso fluye bien: «mediante la ofrenda del cuerpo... una vez para siempre» es natural y fiel.'
  glossary_alignment: 'Se alinea bien con la política del proyecto en «Mesías» frente a «Cristo» y en mantener «santificados». La única desalineación relevante es que la decisión inglesa para ἐν ᾧ θελήματι favorece un sentido instrumental («By that will»), por lo que el español debería reflejarlo con «Por esa voluntad» o equivalente. También conviene dar forma titulada natural en español: «Jesús el Mesías».'
  issues:
  - severity: medium
    issue: «En esa voluntad» comunica peor el matiz instrumental de ἐν ᾧ θελήματι
    rationale: Aunque ἐν puede traducirse literalmente con «en», el expediente del POB documenta que aquí la frase idiomática apunta a «por esa voluntad». En español, «en esa voluntad» suena más locativo o de esfera y menos como medio/causa instrumental.
  - severity: medium
    issue: «Jesús Mesías» suena poco natural en español como título explícito
    rationale: El proyecto pide preservar el valor de título de Χριστός como «Mesías», pero en español la formulación más natural y clara es «Jesús el Mesías». Esto mantiene la semántica titular sin fusionarlo en nombre propio ni producir una secuencia extraña.
  - severity: low
    issue: La nota [a] debe ajustarse al cambio en el texto principal
    rationale: Si el texto principal pasa a «Por esa voluntad», la nota alternativa debe indicar la opción más literal «en esa voluntad» para seguir siendo exacta y útil.
  revised_spanish_text: Por esa voluntad hemos sido santificados mediante la ofrenda del cuerpo de Jesús el Mesías una vez para siempre[a][b].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «en esa voluntad». El sentido es que los creyentes son santificados por la voluntad de Dios recién mencionada en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Jesús Cristo». Aquí Χριστός se ha vertido como «Mesías» para preservar su valor de título.
    reason: alternative_reading
  revision_rationale: Se corrige ἐν ᾧ θελήματι a «Por esa voluntad» para reflejar mejor el sentido instrumental documentado en el expediente del POB y se ajusta «Jesús Mesías» a «Jesús el Mesías» para lograr un español más natural sin perder el valor titular de Χριστός. Se mantiene el resto porque es fiel al griego y al razonamiento léxico-teológico auditado.
