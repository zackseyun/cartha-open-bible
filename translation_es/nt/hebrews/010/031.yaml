lexical_decisions:
- source_word: φοβερὸν
  english_pob_choice: a fearful thing
  chosen_spanish: Terrible cosa
  alternatives_spanish:
  - Algo temible
  - Una cosa temible
  - Cosa espantosa
  lexicon: BDAG
  rationale: φοβερός expresa lo que causa temor, pavor o terror. En español, «Terrible cosa es...» conserva el carácter solemne e idiomático del predicado sin volverlo artificial. «Temible» también sería posible, pero «terrible» comunica mejor la gravedad retórica en una formulación breve y bíblica.
- source_word: τὸ ἐμπεσεῖν
  english_pob_choice: to fall
  chosen_spanish: caer
  alternatives_spanish:
  - caer en
  - precipitarse en
  - venir a caer
  lexicon: BDAG
  rationale: El infinitivo articular funciona de modo sustantivado; en español la idea se expresa de forma natural con «caer». El verbo conserva el sentido de una entrada súbita y peligrosa sin introducir explicaciones ajenas al griego.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands
  chosen_spanish: en las manos
  alternatives_spanish:
  - en el poder
  - en el dominio
  - en el puño
  lexicon: BDAG
  rationale: La imagen de «manos» se mantiene para conservar el idiomatismo bíblico y la resonancia judicial. En español, «caer en las manos» reproduce bien la metáfora de quedar bajo el poder de otro.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - de Dios
  lexicon: BDAG
  rationale: El genitivo depende de «manos» y se traduce con el sustantivo simple «Dios». No hay motivo contextual para añadir una glosa o una cualificación en el cuerpo del texto.
- source_word: ζῶντος
  english_pob_choice: living
  chosen_spanish: vivo
  alternatives_spanish:
  - viviente
  - que vive
  lexicon: BDAG
  rationale: El participio presente funciona atributivamente con θεοῦ. «Vivo» es la forma más natural y bíblica en español para «el Dios vivo», conservando la fuerza de presencia activa y real. «Viviente» sería posible, pero menos directo.
theological_decisions:
- issue: Fuerza de la advertencia
  english_pob_reading: A general, solemn declaration about the terror of coming under the judgment of the living God
  chosen_spanish_reading: Una declaración solemne y general sobre lo terrible que es caer bajo la acción juzgadora del Dios vivo
  alternative_spanish_readings:
  - Una referencia más estrecha solo a disciplina temporal
  - Una afirmación existencial sin connotación judicial
  rationale: El contexto inmediato cierra una advertencia. La expresión idiomática «caer en las manos de» sugiere poder y juicio sin necesidad de añadir la palabra «juicio» al texto principal. La redacción española preserva esa gravedad y deja la tensión teológica en el propio enunciado.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión posterior fue alto y confirmó la lectura estable del versículo. La redacción española sigue de cerca la estructura breve y enfática del griego, manteniendo la imagen de «las manos» y la formulación tradicional «el Dios vivo» sin atenuar la advertencia.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo añadido en el texto principal, conforme al genitivo simple del griego.
  - Se eligió «vivo» y no «viviente» para conservar la expresión bíblica más natural en español.
  - La nota al pie ofrece la alternativa semántica más fuerte («aterrador») sin reemplazar la traducción principal.
  - No se explicita «juicio» en el texto, para no cerrar la ambigüedad del idiomático «caer en las manos».
