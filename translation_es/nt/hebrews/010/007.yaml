translation:
  language: es
  text: 'Entonces dije[a]: «Mira, he venido; en el rollo del libro está escrito acerca de mí, para hacer tu voluntad, oh Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el rollo del escrito». La expresión se refiere a un rollo, no a un libro moderno encuadernado.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal de enlace narrativo; «Entonces» conserva la función introductoria y suena natural en español bíblico contemporáneo.
- source_word: εἶπον
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - dije yo
  - hablé
  lexicon: BDAG
  rationale: Aoristo de λέγω en fórmula de cita; «dije» es la equivalencia directa y natural en primera persona.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira aquí
  lexicon: BDAG
  rationale: La partícula conserva un tono deíctico y solemne. «Mira» transmite la llamada atencional en español moderno; se evita una calca rígida, aunque «He aquí» sigue siendo una alternativa posible con registro más tradicional.
- source_word: ἥκω
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - he llegado
  - vengo
  lexicon: BDAG
  rationale: Aunque formalmente presente, el verbo expresa llegada con relevancia presente; «he venido» comunica bien ese valor perfectivo en español y mantiene la fuerza declarativa.
- source_word: ἐν κεφαλίδι βιβλίου
  english_pob_choice: in the scroll of the book
  chosen_spanish: en el rollo del libro
  alternatives_spanish:
  - en el pergamino del libro
  - en el rollo del libro
  lexicon: BDAG
  rationale: κεφαλίς en este modismo se refiere a un rollo o pergamino, no a un capítulo o encabezado. «Rollo del libro» preserva la imagen material del escrito; se mantiene la nota explicativa para evitar la lectura moderna de «libro» encuadernado.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se encuentra escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva enfatiza el estado vigente de lo escrito; «está escrito» es la fórmula española natural y conserva la autoridad duradera del texto citado.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: «Acerca de mí» reproduce de forma idiomática la relación de περί con genitivo sin perder el sentido de referencia temática.
- source_word: τοῦ ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para cumplir
  - para realizar
  lexicon: BDAG
  rationale: 'El infinitivo articular expresa propósito en apposición al venir: venir para hacer la voluntad de Dios. «Hacer» es la correspondencia más directa de ποιέω aquí.'
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh Dios!
  lexicon: BDAG
  rationale: La forma nominativa funciona como vocativo de dirección en esta cita; en español se marca explícitamente el llamado con «oh Dios».
- source_word: τὸ θέλημά σου
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu querer
  - lo que tú quieres
  lexicon: BDAG
  rationale: θέλημα mantiene su valor teológico central de voluntad; «tu voluntad» es la equivalencia estándar y más precisa en este contexto.
theological_decisions:
- issue: Aplicación mesiánica de la cita sin introducir expansión interpretativa en la línea misma
  english_pob_reading: Translate straightforwardly as first-person speech without importing explicit christological expansion into the verse itself.
  chosen_spanish_reading: Traducir como discurso en primera persona sin añadir en el texto principal una identificación explícita del hablante como el Mesías.
  alternative_spanish_readings:
  - «Entonces dijo el Mesías…»
  - «Entonces dijo Cristo…»
  rationale: Hebreos aplica la cita al Hijo en el contexto inmediato, pero la frase citada en sí mantiene la forma de declaración en primera persona. La traducción conserva esa tensión y deja que el contexto haga la identificación teológica.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa; cristología contextual en Hebreos 10.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requirieron cambios respecto al consenso de alta concordancia del audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el texto griego cita ὁ θεός en vocativo y el contexto inmediato del salmo citado en Hebreos conserva el llamado directo «oh Dios»; no hay base para introducir el nombre divino en el versículo mismo.
  - Se preserva el tono solemne de la cita mediante «Mira» y «oh Dios», evitando una modernización excesivamente coloquial.
  - «Rollo» se usa para κεφαλίδι βιβλίου conforme al valor material del término; la nota evita que el lector entienda «libro» en sentido encuadernado moderno.
