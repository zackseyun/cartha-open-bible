translation:
  language: es
  text: En ofrendas quemadas por completo y en ofrendas por el pecado no te complaciste[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas quemadas enteramente» y «ofrendas por el pecado». La expresión griega περὶ ἁμαρτίας es una frase sacrificial idiomática que significa una ofrenda hecha por el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente consumidas
  - ofrendas quemadas enteramente
  lexicon: BDAG
  rationale: El griego designa sacrificios completamente consumidos por el fuego. En español, «holocaustos» conserva el valor cultual técnico y corresponde a la categoría sacrificial, aunque en uso moderno puede asociarse a otra realidad histórica; por eso se mantiene solo por su fuerza lexical en este contexto bíblico.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple entre dos clases de sacrificios.
- source_word: περὶ ἁμαρτίας
  english_pob_choice: sin offerings
  chosen_spanish: ofrendas por el pecado
  alternatives_spanish:
  - ofrendas por el pecado
  - ofrendas para el pecado
  lexicon: BDAG
  rationale: La frase funciona idiomáticamente como categoría sacrificial ofrecida en relación con el pecado. «Ofrendas por el pecado» preserva el sentido cultual y evita reducirlo a una explicación abstracta.
- source_word: οὐκ
  english_pob_choice: 'no'
  chosen_spanish: 'no'
  alternatives_spanish:
  - no ...
  lexicon: BDAG
  rationale: La negación se expresa directamente en español y se integra con el verbo para reproducir el juicio negativo del texto.
- source_word: εὐδόκησας
  english_pob_choice: you took no pleasure
  chosen_spanish: te complaciste
  alternatives_spanish:
  - te agradaste
  - te deleitaste
  lexicon: BDAG
  rationale: El verbo expresa aprobación/agrado divino. En español, «te complaciste» mantiene esa evaluación volitiva sin forzar un matiz emocional demasiado fuerte.
theological_decisions:
- issue: Terminología sacrificial específica en una cita de Salmo 40:6 LXX dentro de Hebreos 10
  english_pob_reading: Use explicit cultic terms 'whole burnt offerings' and 'sin offerings' without softening them into generic 'sacrifices.'
  chosen_spanish_reading: 'Usar términos cultuales explícitos: «holocaustos» y «ofrendas por el pecado», sin volverlos genéricos.'
  alternative_spanish_readings:
  - sacrificios
  - ofrendas
  rationale: Hebreos desarrolla un contraste entre categorías concretas del culto mosaico y la obediencia de Cristo. Mantener la especificidad sacrificial ayuda a seguir el argumento y conserva la tensión teológica del pasaje.
  doctrine_reference: Principio de primacía del texto original; preservación de la especificidad cultual del argumento de Hebreos.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios necesarios en el texto inglés auditado, y la versión española mantiene la misma lectura cultual específica sin resolver la tensión del argumento de Hebreos.'
  spanish_consistency_notes:
  - Se conservó un registro cultual directo y sobrio.
  - «Te complaciste» traduce la evaluación divina de εὐδόκησας sin añadir un matiz psicológico innecesario.
  - La nota a pie mantiene la alternativa idiomática de περὶ ἁμαρτίας para auditar la decisión léxica.
