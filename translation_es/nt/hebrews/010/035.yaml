revisions:
- from: Por tanto[a], no abandonen su denuedo, que tiene una gran recompensa.
  to: Por tanto[a], no desechen su confianza, que tiene una gran recompensa.
  rationale: Se ajusta ἀποβάλητε a 'no desechen' para reflejar mejor la fuerza del griego, y se cambia 'denuedo' por 'confianza' para una lectura más natural y ampliamente clara en español. La nota conserva el matiz de audacia/franqueza propio de παρρησία.
