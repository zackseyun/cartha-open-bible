review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: prohibición inferencial (''Por tanto''), mandato de no desechar la παρρησία, y cláusula explicativa sobre su gran recompensa. Sin embargo, ''abandonen'' atenúa el matiz más deliberado y enérgico de ἀποβάλητε (''echar fuera/desechar/arrojar''), y ''denuedo'' suena menos natural y menos claro para un español eclesial amplio que una opción como ''confianza'', especialmente dado que la nota ya preserva ''denuedo'' como alternativa de fuerza.'
  spanish_quality_summary: El español es correcto y digno, pero 'denuedo' resulta algo literario y menos transparente para lectores contemporáneos. 'No desechen su confianza' suena más natural, conserva la exhortación y encaja bien con Hebreos, mientras la nota puede retener el matiz de libertad confiada y valentía. La frase revisada mejora legibilidad sin perder precisión.
  glossary_alignment: No hay términos de glosario mayor en juego salvo la decisión contextual sobre παρρησία. Dado el expediente inglés, es aceptable apartarse de un equivalente demasiado raro en español si se explica en nota. 'Confianza' en el texto con nota sobre 'denuedo/libertad confiada' preserva mejor la función semántica en español. 'Recompensa' alinea bien con μισθαποδοσίαν.
  issues:
  - severity: medium
    issue: μὴ ἀποβάλητε se vierte como 'no abandonen'
    rationale: El verbo griego expresa desechar o arrojar fuera con cierta fuerza volitiva. 'Abandonen' puede sonar más difuso o gradual; 'no desechen' conserva mejor la idea de no deshacerse deliberadamente de esa confianza.
  - severity: medium
    issue: παρρησίαν se vierte como 'denuedo' en el texto principal
    rationale: Aunque semánticamente defendible, 'denuedo' es menos natural y menos ampliamente inteligible en español contemporáneo. En Hebreos, la idea incluye confianza valiente ante Dios; 'confianza' en texto principal con nota explicativa comunica mejor al lector general sin borrar el matiz.
  revised_spanish_text: Por tanto[a], no desechen su confianza, que tiene una gran recompensa.
