translation:
  language: es
  text: Por tanto[a], no desechen su confianza, que tiene una gran recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «denuedo». El término griego puede denotar libertad confiada, franqueza o valentía, especialmente al acercarse a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀποβάλητε
  english_pob_choice: do not throw away
  chosen_spanish: no abandonen
  alternatives_spanish:
  - no desechen
  - no tiren
  - no echen fuera
  lexicon: BDAG
  rationale: El griego expresa una prohibición de rechazar o dejar a un lado con decisión. En español, «abandonen» conserva la fuerza voluntaria de renunciar a algo valioso y suena natural en un registro bíblico moderno; «desechen» también sería posible, pero puede sonar más frío o técnico.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica a partir del contexto inmediato. «Por tanto» preserva mejor el tono formal y la conexión argumentativa que «Así que» o «Entonces».
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: denuedo
  alternatives_spanish:
  - confianza
  - valentía
  - franqueza
  lexicon: BDAG
  rationale: En Hebreos, παρρησία remite a una libertad/confianza valiente para acercarse a Dios y perseverar en la fe. «Denuedo» conserva el matiz de audacia y firmeza mejor que «confianza», que sería más plano, y evita reducir el término solo a una actitud interna.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - guarda
  - conlleva
  lexicon: BDAG
  rationale: El verbo es simple y directo; «tiene» mantiene la relación semántica sin añadir matices interpretativos.
- source_word: μισθαποδοσίαν
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - retribución
  - pago
  lexicon: BDAG
  rationale: El sustantivo indica recompensa o retribución. «Recompensa» es claro y natural en español; «galardón» sería más solemne, pero menos transparente para lectores amplios.
theological_decisions:
- issue: Valor de παρρησία en Hebreos 10:35
  english_pob_reading: The term refers to the believers' confident boldness before God and in persevering faith, rendered 'boldness.'
  chosen_spanish_reading: El término se entiende como el denuedo confiado de los creyentes ante Dios y en su perseverancia, rendido como «denuedo».
  alternative_spanish_readings:
  - confianza
  - valentía
  - franqueza
  rationale: «Denuedo» conserva la tensión entre confianza y audacia que el contexto exige, sin reducir el sentido a mera seguridad interior. En Hebreos, la exhortación apunta a perseverar en el acceso confiado a Dios.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'This draft aligns with the English POB audit trail: it preserves the inferential force of οὖν, the prohibition of μὴ ἀποβάλητε, and the lexical tension in παρρησία with a Spanish equivalent that keeps the courageous nuance while remaining readable. No later revision changes were applied in the source packet.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, con sintaxis natural para el español.
  - «Por tanto» conserva la relación lógica del versículo con el contexto previo.
  - La nota de pie distingue la alternativa «confianza» sin borrar el matiz de audacia inherente a παρρησία.
  - «Recompensa» sigue de cerca el valor de μισθαποδοσίαν sin introducir una tecnicidad innecesaria.
