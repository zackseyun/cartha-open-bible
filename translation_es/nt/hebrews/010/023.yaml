translation:
  language: es
  text: Mantengamos firme la confesión de nuestra esperanza sin vacilar[a], porque fiel es el que prometió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la confesión de la esperanza». El griego no incluye explícitamente «nuestra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέχωμεν
  english_pob_choice: Let us hold fast
  chosen_spanish: Mantengamos firme
  alternatives_spanish:
  - mantengamos firmemente
  - aferrémonos a
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural pide una exhortación inclusiva. «Mantengamos firme» conserva la fuerza de perseverancia y suena natural en español bíblico actual.
- source_word: ὁμολογίαν
  english_pob_choice: the confession
  chosen_spanish: la confesión
  alternatives_spanish:
  - la profesión
  - el testimonio público
  lexicon: BDAG
  rationale: «Confesión» comunica mejor la declaración pública de fe o lealtad que aparece en Hebreos, y coincide con la elección inglesa del POB.
- source_word: τῆς ἐλπίδος
  english_pob_choice: of our hope
  chosen_spanish: de nuestra esperanza
  alternatives_spanish:
  - de la esperanza
  lexicon: BDAG
  rationale: Aunque el griego no expresa el posesivo, en español la relación comunitaria queda naturalmente clara con «nuestra». La inclusión sigue la decisión inglesa y no añade una idea nueva.
- source_word: ἀκλινῆ
  english_pob_choice: without wavering
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin desviarse
  - sin flaquear
  lexicon: BDAG
  rationale: El adjetivo predicativo se vierte de modo adverbial en español para sonar natural. «Sin vacilar» conserva la idea de firmeza y ausencia de inestabilidad.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: «Fiel» es la equivalencia más estable en español para el valor covenantal y teológico de πιστός, y mantiene la resonancia bíblica.
- source_word: ὁ ἐπαγγειλάμενος
  english_pob_choice: the one who promised
  chosen_spanish: el que prometió
  alternatives_spanish:
  - el que ha prometido
  - el prometedor
  lexicon: BDAG
  rationale: El participio articular se traduce de forma sustantiva y sobria. «El que prometió» mantiene el referente implícito sin explicitarlo innecesariamente.
theological_decisions:
- issue: Referente implícito de «el que prometió»
  english_pob_reading: Understood as God, left implicit in the translation as in the Greek.
  chosen_spanish_reading: Se deja implícito el referente, sin añadir «Dios» en el texto principal.
  alternative_spanish_readings:
  - porque Dios es fiel, el que prometió
  - porque fiel es Dios, que prometió
  rationale: El contexto apunta claramente a Dios, pero el griego lo deja implícito. Mantener la forma implícita respeta la fuente y evita una expansión interpretativa innecesaria.
  doctrine_reference: Principios de transparencia y de economía textual del POB
- issue: Posesivo con «esperanza»
  english_pob_reading: 'Included ''our'' for natural English: ''the confession of our hope.'''
  chosen_spanish_reading: Se incluye «nuestra» por naturalidad idiomática y sentido comunitario.
  alternative_spanish_readings:
  - la confesión de la esperanza
  rationale: En español, la presencia del posesivo ayuda a que la frase suene idiomática y preserve el matiz comunitario de la exhortación, sin contradecir el griego.
  doctrine_reference: Principios de equivalencia óptima y claridad lectora
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto griego y con la auditoría inglesa: exhortación hortatoria, confesión pública, esperanza comunitaria implícita y referencia tácita al que prometió. No se observaron revisiones posteriores que alteren la decisión.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero aquí no aparece el nombre divino en forma explícita.
  - «Mantengamos firme» evita el calco mecánico y sigue siendo fiel al valor exhortativo de κατέχωμεν.
  - La nota al pie mantiene la alternativa de no explicitar el posesivo, igual que el inglés del POB.
  - No se introduce «Cristo» ni «SEÑOR» porque el versículo no los contiene ni los exige.
