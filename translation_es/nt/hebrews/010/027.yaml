translation:
  language: es
  text: pero una temible expectativa de juicio[a], y un furor de fuego a punto de consumir a los adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «una expectativa aterradora de juicio y un furor ardiente a punto de consumir a los adversarios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβερὰ
  english_pob_choice: fearful
  chosen_spanish: temible
  alternatives_spanish:
  - terrible
  - aterradora
  lexicon: BDAG
  rationale: φοβερὰ funciona como adjetivo predicativo que modifica ἐκδοχὴ. 'Temible' conserva el matiz de algo que inspira temor sin volver la frase excesivamente interpretativa.
- source_word: ἐκδοχὴ
  english_pob_choice: expectation
  chosen_spanish: espera
  alternatives_spanish:
  - expectativa
  - expectación
  lexicon: BDAG
  rationale: El sustantivo expresa la idea de aguardar con expectativa. 'Espera' suena natural en español y mantiene el sentido de una espera real y cargada de juicio.
- source_word: κρίσεως
  english_pob_choice: of judgment
  chosen_spanish: de juicio
  alternatives_spanish:
  - de condena
  - de sentencia
  lexicon: BDAG
  rationale: κρίσις aquí señala juicio judicial venidero. 'Juicio' preserva la amplitud y la gravedad del término sin cerrar de más su alcance.
- source_word: πυρὸς ζῆλος
  english_pob_choice: a fury of fire
  chosen_spanish: un furor de fuego
  alternatives_spanish:
  - un fuego furioso
  - un ardor de fuego
  lexicon: BDAG
  rationale: La expresión griega es comprimida y vigorosa. 'Furor de fuego' mantiene el impacto imagístico y la fuerza personificada del original mejor que una paráfrasis explicativa.
- source_word: ἐσθίειν
  english_pob_choice: to consume
  chosen_spanish: consumir
  alternatives_spanish:
  - devorar
  - devorando
  lexicon: BDAG
  rationale: En contextos de juicio, 'consumir' comunica destrucción con un registro digno y bíblico, sin perder el valor activo del infinitivo.
- source_word: μέλλοντος
  english_pob_choice: about to
  chosen_spanish: a punto de
  alternatives_spanish:
  - pronto a
  - por consumar
  lexicon: BDAG
  rationale: El participio expresa inminencia. 'A punto de' transmite con naturalidad la cercanía del acto futuro.
- source_word: τοὺς ὑπεναντίους
  english_pob_choice: the adversaries
  chosen_spanish: a los adversarios
  alternatives_spanish:
  - a los enemigos
  - a los opositores
  lexicon: BDAG
  rationale: '''Adversarios'' conserva el tono formal y judicial del contexto, y reproduce con fidelidad la idea de quienes se oponen.'
theological_decisions:
- issue: Imagen de juicio y fuego
  english_pob_reading: Retain the vivid language of consuming fire without softening it into merely metaphorical or explicitly eternal categories.
  chosen_spanish_reading: Mantener el lenguaje vívido de juicio y fuego consumidor sin reducirlo a una metáfora suave ni especificarlo más allá del texto.
  alternative_spanish_readings:
  - fuego de castigo eterno
  - furia ardiente de condenación
  rationale: El versículo presenta una advertencia severa, pero no define por sí mismo todos los detalles doctrinales del juicio. La traducción conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del texto; no añadir precisiones doctrinales no expresadas.
translation_notes:
  revision_awareness: 'La formulación española sigue la revisión más reciente del POB en inglés: evita añadir un equivalente innecesario de ''a certain'' y opta por una solución natural para πυρὸς ζῆλος, aquí llevada a ''furor de fuego'' para conservar la imagen y el peso retórico del griego.'
  spanish_consistency_notes:
  - Se usa 'juicio' para κρίσις, en línea con el valor judicial del contexto.
  - Se evita 'SEÑOR' porque no hay aquí referencia al nombre divino.
  - '''Adversarios'' mantiene el registro formal preferido por el POB para ὑπεναντίους.'
  - La nota alternativa en la nota al pie recoge la posibilidad más idiomática sin reemplazar la traducción principal.
