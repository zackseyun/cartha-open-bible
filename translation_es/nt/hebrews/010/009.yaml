translation:
  language: es
  text: 'Entonces dijo: «He aquí, he venido para hacer tu voluntad». Quita lo primero para establecer lo segundo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él quita lo primero a fin de establecer lo segundo». Aquí «lo primero» y «lo segundo» probablemente se refieren al primer arreglo sacrificial y a la segunda realidad de la voluntad de Dios cumplida en la ofrenda del Mesías.'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: BDAG
  rationale: Adverbio temporal/secuencial que enlaza con la cita anterior. «Entonces» conserva el flujo discursivo de manera natural en español.
- source_word: εἴρηκεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - ha dicho
  - decía
  lexicon: BDAG
  rationale: Aunque el perfecto griego puede tener relevancia presente, en español «dijo» suena más natural y coincide con la revisión inglesa que prefirió el pasado simple.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira esto
  lexicon: BDAG
  rationale: Interjección deíctica marcada. «Mira» mantiene el carácter exhortativo y resulta más natural para el lector moderno; «He aquí» sería más tradicional pero más rígido.
- source_word: ἥκω
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - vengo
  - estoy aquí
  lexicon: BDAG
  rationale: ἥκω expresa llegada con presencia continuada. «He venido» conserva la idea de llegada lograda sin perder naturalidad en español.
- source_word: τοῦ ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para cumplir
  - a fin de hacer
  lexicon: BDAG
  rationale: Infinitivo articular de propósito. «Para hacer» expresa bien la finalidad y evita una paráfrasis más explicativa que el texto no exige.
- source_word: τὸ θέλημά σου
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu querer
  - lo que quieres
  lexicon: BDAG
  rationale: Término teológico clave para el propósito de Dios. «Voluntad» es la equivalencia estándar y más precisa en este contexto.
- source_word: ἀναιρεῖ
  english_pob_choice: takes away
  chosen_spanish: quita
  alternatives_spanish:
  - retira
  - elimina
  - abole
  lexicon: BDAG
  rationale: Verbo de remoción/supresión. «Quita» es breve, fiel y suficientemente abierto para no fijar más de lo que el contexto inmediato garantiza.
- source_word: τὸ πρῶτον
  english_pob_choice: the first
  chosen_spanish: lo primero
  alternatives_spanish:
  - el primero
  - la primera cosa
  - la primera व्यवस्था
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Lo primero» suena natural en español y preserva la concisión del griego; el referente queda para el contexto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: La relación es de finalidad. En español, «para» con infinitivo es natural y suficiente para reflejar el sentido telógico del griego.
- source_word: τὸ δεύτερον
  english_pob_choice: the second
  chosen_spanish: lo segundo
  alternatives_spanish:
  - el segundo
  - la segunda cosa
  lexicon: BDAG
  rationale: Paralelo a «lo primero». Mantener la forma sustantivada preserva el contraste retórico y la brevedad del original.
- source_word: στήσῃ
  english_pob_choice: he may establish
  chosen_spanish: establecer
  alternatives_spanish:
  - poner en vigor
  - instaurar
  - confirmar
  lexicon: BDAG
  rationale: Aoristo subjuntivo de ἵστημι con sentido de establecer/poner en pie. En español, el infinitivo tras «para» comunica la finalidad sin sobrecargar el verso.
theological_decisions:
- issue: Referente de «lo primero» y «lo segundo»
  english_pob_reading: The verse speaks of God, through the obedient coming of the Son, removing the first sacrificial arrangement/order in order to establish the second, namely the will of God fulfilled in Christ's self-offering.
  chosen_spanish_reading: El verso habla de que se quita el primer orden/arreglo sacrificial para establecer el segundo, es decir, la voluntad de Dios cumplida en la ofrenda obediente del Hijo.
  alternative_spanish_readings:
  - Las expresiones podrían referirse más estrechamente a las dos cláusulas de la cita.
  - También podrían entenderse de manera más amplia como antiguo pacto y nuevo pacto.
  rationale: La traducción conserva la tersura del griego («lo primero»/«lo segundo») sin expandir en el texto principal una interpretación que el contexto desarrolla. Así se preserva la tensión exegética documentada por la POB inglesa y se deja que Hebreos 10:8–10 precise el referente.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el ajuste inglés reciente que prefirió el pasado simple en la cita introductoria. Se mantuvo la concisión de los sustantivos articularizados («lo primero», «lo segundo») para no resolver interpretativamente el referente en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal cuando el texto lo requiera; aquí no aparece el tetragrámaton explícito.
  - «Voluntad» mantiene la terminología teológica estándar para θέλημα.
  - Se evitó «Cristo» porque el verso no lo nombra; la nota puede aclarar el referente mesiánico en contexto.
  - «Mira» se eligió por naturalidad, pero la nota registra la alternativa más tradicional «He aquí» implícita en el valor de Ἰδοὺ.
