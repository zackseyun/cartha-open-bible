review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: δὲ como conector suave, καὶ como aditivo, τὸ πνεῦμα τὸ ἅγιον como título definido, y μετὰ γὰρ τὸ εἰρηκέναι como secuencia temporal que introduce la cita siguiente. Sin embargo, «a nosotros» después de «da testimonio» suena poco natural en español bíblico corriente; el sentido dativo de ἡμῖν se preserva mejor con «nos».'
  spanish_quality_summary: 'La redacción es comprensible, pero «da testimonio a nosotros» y la nota «testifica a nosotros» resultan torpes en español natural. «Nos da testimonio» / «nos testifica» siguen siendo algo marcadas; la opción más idiomática y fiel es «nos da testimonio» con nota alternativa «O “testifica a nosotros”» no ideal. Mejor aún, usar «testifica a nosotros» en nota no ayuda a la legibilidad. Conviene reemplazar la nota por una alternativa española natural: «O “nos atestigua”» o «O “da testimonio de ello a nosotros”», pero la más clara y cercana al matiz léxico es «O “nos atestigua”».'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Espíritu Santo» está bien. No intervienen Yahvé, Mesías/Cristo, etc. La decisión para πνεῦμα como título personal está correctamente preservada.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «da testimonio a nosotros»'
    rationale: Aunque refleja el dativo ἡμῖν, en español estándar suena forzado. «Nos da testimonio» preserva el destinatario del testimonio con mejor legibilidad.
  - severity: medium
    issue: 'Nota al pie poco idiomática: «testifica a nosotros»'
    rationale: Como alternativa léxica española suena antinatural y no mejora la comprensión. Debe sustituirse por una alternativa española viable como «nos atestigua».
  - severity: low
    issue: «Porque» puede sonar más causal que explicativo
    rationale: γάρ aquí introduce explicación/continuación. «Pues» puede sonar más natural, aunque «porque» no es incorrecto. No es necesario forzar cambio si se mantiene buena fluidez.
