translation:
  language: es
  text: Y el Espíritu Santo también nos da testimonio[a]; pues, después de haber dicho,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos atestigua».
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρεῖ
  english_pob_choice: testifies
  chosen_spanish: da testimonio
  alternatives_spanish:
  - testifica
  - atestigua
  lexicon: BDAG
  rationale: μαρτυρέω conserva aquí el sentido jurídico/de testimonio. En español, «da testimonio» comunica con naturalidad ese valor sin perder el matiz de testimonio formal; «testifica» también es posible, pero suena un poco más técnico.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona como un conector leve que avanza la argumentación. «Y» reproduce bien esa continuidad sin introducir contraste fuerte.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: Con μαρτυρέω, el dativo indica destinatarios del testimonio. «A nosotros» conserva ese movimiento relacional de forma natural en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: καί añade al Espíritu Santo como otro testigo en el argumento. «También» expresa con claridad ese valor aditivo.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo mismo
  - el Espíritu sagrado
  lexicon: BDAG
  rationale: La construcción articular identifica a la persona divina específica, no a un espíritu santo indeterminado. «Espíritu Santo» es la forma normal y fiel en español para este título.
- source_word: μετὰ γὰρ τὸ εἰρηκέναι
  english_pob_choice: for after saying
  chosen_spanish: porque después de haber dicho
  alternatives_spanish:
  - pues, después de decir
  - porque, después de decir
  lexicon: BDAG
  rationale: El articular infinitivo con μετά expresa secuencia temporal. En español, «después de haber dicho» mantiene la compactación del griego e introduce con fluidez la cita que sigue, con sujeto implícito como en el original.
theological_decisions:
- issue: Agency personal del Espíritu Santo en el testimonio
  english_pob_reading: the Holy Spirit also testifies to us
  chosen_spanish_reading: el Espíritu Santo también da testimonio a nosotros
  alternative_spanish_readings:
  - el Espíritu Santo también testifica a nosotros
  - el Espíritu Santo también da testimonio para nosotros
  rationale: La frase presenta al Espíritu Santo como testigo activo y personal. «Da testimonio» conserva esa agencia sin reducirlo a una fuerza impersonal, en línea con la sintaxis griega y la lectura trinitaria clásica.
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d.C.)
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y coincide sustancialmente con la solución auditada en inglés. Se mantuvo la estructura breve del enunciado y la apertura temporal de la cláusula final para preparar la cita posterior, sin añadir sujeto explícito en la segunda mitad.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» como título fijo y no «Espíritu Sagrado», por ser la forma idiomática y fiel en español.
  - Se eligió «da testimonio» como equivalente natural de μαρτυρεῖ, preservando el matiz jurídico sin sobredeterminación.
  - Se mantuvo «a nosotros» para reflejar el dativo beneficiario/destinatario de μαρτυρεῖ con ἡμῖν.
