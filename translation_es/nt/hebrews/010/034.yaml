  text: καὶ γὰρ τοῖς ⸀δεσμίοις συνεπαθήσατε, καὶ τὴν ἁρπαγὴν τῶν ὑπαρχόντων ὑμῶν μετὰ χαρᾶς προσεδέξασθε, γινώσκοντες ἔχειν ⸀ἑαυτοὺς κρείττονα ⸀ὕπαρξιν καὶ μένουσαν.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/010/034.yaml
  text: For you also suffered together with the prisoners[a], and you accepted with joy the plundering of your possessions[b], knowing that you yourselves have a better and lasting possession.
  footnotes:
  - marker: a
    text: Some manuscripts read 'knowing that you have for yourselves a better possession in heaven, and one that lasts.'
    reason: textual_variant
  - marker: b
    text: Or 'had compassion on the prisoners.' The Greek verb can denote sympathy, but here likely includes sharing in their suffering.
    reason: lexical_alternative
