translation:
  language: es
  text: Porque también ustedes sufrieron con los presos[b], y aceptaron con gozo el saqueo de sus bienes, sabiendo que ustedes mismos tienen una posesión mejor y permanente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «sabiendo que ustedes tienen para sí mismos una posesión mejor en el cielo, y una que permanece».'
    reason: textual_variant
  - marker: b
    text: 'O: «tuvieron compasión de los presos». El verbo griego puede denotar simpatía, pero aquí probablemente incluye compartir su sufrimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμίοις
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los prisioneros
  - los encarcelados
  lexicon: BDAG
  rationale: δέσμιος designa a quien está atado o encarcelado. En español, «los presos» es natural y claro; mantiene la referencia a personas privadas de libertad sin sobrecargar el texto. «Prisioneros» también es posible, pero «presos» suena más directo en este contexto.
- source_word: συνεπαθήσατε
  english_pob_choice: suffered together with
  chosen_spanish: sufrieron con
  alternatives_spanish:
  - tuvieron compasión de
  - simpatizaron con
  lexicon: BDAG
  rationale: El verbo puede implicar simpatía, pero aquí el prefijo σύν- y el contexto de persecución favorecen la idea de compartir el sufrimiento. «Sufrieron con» conserva esa solidaridad activa mejor que una lectura reducida a sentimiento interior.
- source_word: ἁρπαγὴν
  english_pob_choice: the plundering
  chosen_spanish: el saqueo
  alternatives_spanish:
  - el despojo
  - la confiscación
  lexicon: BDAG
  rationale: ἁρπαγή expresa una toma violenta y abusiva. «Saqueo» comunica bien la fuerza injusta del acto en español actual. «Despojo» también sería posible, pero «saqueo» preserva mejor la violencia del término.
- source_word: τῶν ὑπαρχόντων ὑμῶν
  english_pob_choice: of your possessions
  chosen_spanish: de sus bienes
  alternatives_spanish:
  - de sus posesiones
  - de lo que les pertenecía
  lexicon: BDAG
  rationale: El participio sustantivado ὑπαρχόντων se refiere a las pertenencias. En español, «bienes» es idiomático y suficientemente amplio. Se eligió «sus» por concordancia natural con el destinatario plural en español, sin alterar el sentido posesivo del griego.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: BDAG
  rationale: La preposición μετὰ con genitivo se refleja naturalmente como «con». «Gozo» mantiene un tono más bíblico y solemne que «alegría», sin perder claridad.
- source_word: προσεδέξασθε
  english_pob_choice: you accepted
  chosen_spanish: aceptaron
  alternatives_spanish:
  - recibieron
  - acogieron
  lexicon: BDAG
  rationale: προσδέχομαι puede ser recibir, acoger o aceptar. En el contexto de la pérdida sufrida, «aceptaron» comunica la disposición a afrontar la situación sin sugerir aprobación de la injusticia.
- source_word: γινώσκοντες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabían
  - ya que sabían
  lexicon: BDAG
  rationale: El participio se vierte de manera contemporánea como «sabiendo», conservando la relación de base con la oración principal sin imponer una causalidad más fuerte que la del griego.
- source_word: ἑαυτοὺς ἔχειν
  english_pob_choice: you yourselves have
  chosen_spanish: ustedes mismos tienen
  alternatives_spanish:
  - tienen para sí mismos
  - ustedes poseen
  lexicon: BDAG
  rationale: El reflexivo añade énfasis. «Ustedes mismos tienen» reproduce esa fuerza enfática de manera natural en español.
- source_word: κρείττονα
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - superior
  lexicon: BDAG
  rationale: «Mejor» es la equivalencia más habitual en Hebreos para κρείττων, y conserva la línea comparativa del libro sin endurecer el registro.
- source_word: ὕπαρξιν
  english_pob_choice: possession
  chosen_spanish: posesión
  alternatives_spanish:
  - bienes
  - patrimonio
  lexicon: BDAG
  rationale: ὕπαρξις puede referirse a posesión o propiedad. «Posesión» conserva el enlace léxico con τα ὑπάρχοντα / ὑπαρχόντων y funciona bien en español como sustantivo colectivo.
- source_word: μένουσαν
  english_pob_choice: lasting
  chosen_spanish: permanente
  alternatives_spanish:
  - duradera
  - que permanece
  lexicon: BDAG
  rationale: El participio femenino concuerda con ὕπαρξιν y subraya permanencia. «Permanente» es natural y fiel, y transmite la idea de algo que no deja de existir.
theological_decisions:
- issue: Solidaridad con creyentes encarcelados
  english_pob_reading: The verse speaks of sharing in the suffering of imprisoned believers, not merely feeling sympathy for them.
  chosen_spanish_reading: El versículo dice que compartieron el sufrimiento de los presos, no solo que sintieron compasión por ellos.
  alternative_spanish_readings:
  - Tuvieron compasión de los presos.
  - Sintieron simpatía por los presos.
  rationale: La forma con σύν y el dativo favorece una participación real en el sufrimiento. Por eso se eligió una formulación que mantiene la dimensión costosa de la solidaridad cristiana en el contexto de persecución.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza de la «posesión mejor y permanente»
  english_pob_reading: Rendered generally as a superior enduring possession without specifying heaven, salvation, or reward beyond what the text states.
  chosen_spanish_reading: Se mantiene una posesión mejor y permanente, sin añadir «en el cielo» ni otra especificación no presente en el texto base.
  alternative_spanish_readings:
  - una posesión mejor en el cielo
  - una herencia mejor
  rationale: El texto griego aquí no incluye la variante explícita de «en el cielo», así que la traducción conserva la formulación amplia y no introduce una precisión doctrinal que el testimonio base no exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue el texto griego de SBLGNT y el audit trail en inglés sin depender mecánicamente de la redacción inglesa. Se preserva la tensión lexical de συνεπαθήσατε como solidaridad sufriente, y se mantiene la formulación amplia de ὕπαρξιν sin importar la variante manuscrita de «en el cielo» al texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «posesión» para ὕπαρξις, en continuidad con el campo léxico de ὑπάρχοντα / ὑπαρχόντων.
  - 'Se optó por un registro bíblico sobrio: «gozo» y «permanente» conservan dignidad sin arcaísmo excesivo.'
  - Los posesivos se adaptan al español («sus») para fluidez natural, sin alterar la referencia plural del griego.
