    text: 'O: "después de haber ofrecido un solo sacrificio por los pecados por siempre". La expresión griega puede leerse muy de cerca con la ofrenda, destacando la eficacia permanente del sacrificio.'
    reason: alternative_reading
  - marker: b
    text: '"A la derecha de Dios" alude al Salmo 110:1, un texto clave en Hebreos para la exaltación del Mesías.'
    reason: cross_reference
  revision_rationale: Se corrige el error formal del marcador [aa] y se reubica la nota alternativa al segmento pertinente ('para siempre'), que es donde realmente recae la variación interpretativa de εἰς τὸ διηνεκές. También se adopta 'para siempre' en el texto principal por ser la forma más natural en esta colocación española, manteniendo en la nota la alternativa 'por siempre'. No se requiere cambio adicional de contenido.
