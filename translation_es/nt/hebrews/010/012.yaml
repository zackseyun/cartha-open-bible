revisions:
- from: Pero este[a], después de haber ofrecido un solo sacrificio por los pecados por[aa] siempre, se sentó a la derecha de Dios[b].
  to: Pero este, después de haber ofrecido un solo sacrificio por los pecados para siempre[a], se sentó a la derecha de Dios[b].
  rationale: Se corrige el error formal del marcador [aa] y se reubica la nota alternativa al segmento pertinente ('para siempre'), que es donde realmente recae la variación interpretativa de εἰς τὸ διηνεκές. También se adopta 'para siempre' en el texto principal por ser la forma más natural en esta colocación española, manteniendo en la nota la alternativa 'por siempre'. No se requiere cambio adicional de contenido.
