review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y la línea del POB en casi todos los elementos clave: contraste de οὗτος δὲ, singularidad de μίαν ... θυσίαν, sentido sacrificial de ὑπὲρ ἁμαρτιῶν, secuencia temporal de προσενέγκας, y fórmula de exaltación ἐν δεξιᾷ τοῦ θεοῦ. También preserva correctamente la nota de lectura alternativa sobre εἰς τὸ διηνεκές. Sin embargo, el texto contiene un problema formal importante: aparece un marcador [aa] en el cuerpo del texto sin nota correspondiente, y además rompe la exigencia de marcadores únicos secuenciales. Eso requiere corrección editorial.'
  spanish_quality_summary: El español es claro, natural y digno. 'Pero este' funciona, aunque suena algo abrupto; aun así es aceptable como conservación del demostrativo contrastivo. 'Un solo sacrificio por los pecados' y 'se sentó a la derecha de Dios' son lecturas idiomáticas y fieles. La principal deficiencia no es de estilo sino de formato y consistencia de notas. Conviene además simplificar la ubicación de la nota alternativa para que el anclaje sea limpio y no sugiera una segunda nota inexistente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. θεοῦ está bien como 'Dios'. No hay ocurrencias de Yahvé, Mesías/Cristo, Espíritu, δοῦλος u otros términos de control especial que exijan ajuste. La decisión 'a la derecha de Dios' es compatible con la nota sobre Salmo 110:1.
  issues:
  - severity: high
    issue: Marcador de nota inválido [aa] en el texto
    rationale: El texto español usa '[aa]' en 'por[aa] siempre', pero no existe una nota con ese marcador. Las instrucciones exigen marcadores únicos en orden y que toda nota tenga su anclaje exacto en el texto; aquí hay un anclaje huérfano.
  - severity: medium
    issue: Anclaje de la nota alternativa mal resuelto
    rationale: La nota a explica una lectura alternativa de toda la frase con εἰς τὸ διηνεκές, no de 'este'. Anclar [a] tras 'este' es menos claro que anclarlo en la frase relevante del sacrificio/permanencia.
  revised_spanish_text: Pero este, después de haber ofrecido un solo sacrificio por los pecados para siempre[a], se sentó a la derecha de Dios[b].
