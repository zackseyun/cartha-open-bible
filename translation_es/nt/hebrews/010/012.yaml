translation:
  language: es
  text: Pero este, después de haber ofrecido un solo sacrificio por los pecados para siempre[a], se sentó a la derecha de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "después de haber ofrecido un solo sacrificio por los pecados por siempre". La expresión griega puede leerse muy de cerca con la ofrenda, destacando la eficacia permanente del sacrificio.'
    reason: alternative_reading
  - marker: b
    text: '"A la derecha de Dios" alude al Salmo 110:1, un texto clave en Hebreos para la exaltación del Mesías.'
    reason: cross_reference
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - él
  - este hombre
  lexicon: BDAG
  rationale: Se conserva el valor demostrativo de οὗτος para mantener el contraste discursivo con los sacerdotes anteriores. En español, "este" es más natural que un pronombre simple y reproduce la fuerza anafórica de "this one".
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca contraste con el verso previo sobre los sacerdotes que están de pie ofreciendo sacrificios repetidos.
- source_word: μίαν ... θυσίαν
  english_pob_choice: one sacrifice
  chosen_spanish: un solo sacrificio
  alternatives_spanish:
  - un sacrificio único
  - un sacrificio
  lexicon: BDAG
  rationale: '"Un solo sacrificio" expresa con claridad en español la singularidad enfática del sacrificio, manteniendo el contraste con las ofrendas repetidas.'
- source_word: ὑπὲρ ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - a favor de los pecados
  - por el pecado
  lexicon: BDAG
  rationale: '"Por los pecados" es la manera natural y cultual en español para el valor sacrificial de propósito/beneficio, respetando el plural griego.'
- source_word: προσενέγκας
  english_pob_choice: after offering
  chosen_spanish: después de haber ofrecido
  alternatives_spanish:
  - habiendo ofrecido
  - cuando hubo ofrecido
  lexicon: BDAG
  rationale: El aoristo participial antecedente se vierte con una construcción temporal natural en español que preserva la secuencia de la acción antes del verbo principal.
- source_word: εἰς τὸ διηνεκές
  english_pob_choice: for all time
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - para todo tiempo
  - en perpetuidad
  lexicon: BDAG
  rationale: La frase subraya la permanencia del valor del sacrificio. "Por siempre" comunica bien esa duración en español y deja abierta la cuestión de si la expresión se vincula más estrechamente con la ofrenda o con su eficacia continua.
- source_word: ἐκάθισεν
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - quedó sentado
  lexicon: BDAG
  rationale: Se mantiene la acción perfecta y su sentido de obra sacerdotal concluida. "Se sentó" es la equivalencia más directa y pública en español.
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la derecha de Dios
  alternatives_spanish:
  - a la diestra de Dios
  - junto al lado derecho de Dios
  lexicon: BDAG
  rationale: Se preserva la fórmula de exaltación de modo claro y comprensible en español. "A la derecha de Dios" es natural y transparente, sin perder la alusión al Salmo 110:1.
theological_decisions:
- issue: Alcance de εἰς τὸ διηνεκές
  english_pob_reading: The phrase can be taken closely with the offering, emphasizing the permanent efficacy of the sacrifice.
  chosen_spanish_reading: La frase se coloca con naturalidad tras "por los pecados" y antes del verbo principal, de modo que puede entenderse como ligada al sacrificio y a su eficacia permanente.
  alternative_spanish_readings:
  - '"después de haber ofrecido un solo sacrificio por los pecados para siempre, se sentó..."'
  - '"después de haber ofrecido un solo sacrificio por los pecados, se sentó para siempre..."'
  rationale: La estructura española permite conservar la tensión interpretativa sin cerrarla indebidamente. Así se mantiene el énfasis de Hebreos en la eficacia duradera del sacrificio único, sin convertir la ubicación sintáctica en una decisión más fuerte de lo que exige el griego.
  doctrine_reference: Translation philosophy §3; mantener la tensión teológica cuando el texto lo permite, sin resolverla más allá de la evidencia.
- issue: Alusión entronizadora a Salmo 110:1
  english_pob_reading: '"At the right hand of God" echoes Psalm 110:1, a key text in Hebrews for the Messiah''s exaltation.'
  chosen_spanish_reading: '"A la derecha de Dios" conserva la fórmula de exaltación y su eco bíblico.'
  alternative_spanish_readings:
  - '"a la diestra de Dios"'
  - '"sentado junto a Dios a su derecha"'
  rationale: La expresión española mantiene el carácter tradicional y teológicamente cargado de la imagen de entronización, sin añadir elementos ajenos al griego.
  doctrine_reference: Hebreos 1:3; Salmo 110:1; cristología de exaltación
- issue: Lexema divino θεοῦ
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: El genitivo griego se traduce de forma normal como "Dios" en español. No se requiere peripasis, y la referencia es inequívoca en el contexto de Hebreos.
  doctrine_reference: Teología bíblica básica del Nuevo Testamento
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se registraron cambios aplicados en el paso auditado; la presente propuesta mantiene el mismo sentido general, ajustando el español para una lectura pública natural y preservando la ambigüedad controlada de εἰς τὸ διηνεκές.'
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεοῦ según el estándar del proyecto.
  - Se evita "SEÑOR" como máscara del nombre divino porque el versículo no contiene el Tetragrámaton.
  - Se usa "se sentó" para ἐκάθισεν y no una paráfrasis más interpretativa.
  - La nota de pie preserva la lectura alternativa sobre la ubicación de εἰς τὸ διηνεκές.
  - La formulación "a la derecha de Dios" es más transparente que "a la diestra" para español latinoamericano, aunque se reconoce la variante tradicional en las alternativas.
