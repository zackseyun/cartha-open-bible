  spanish_quality_summary: 'La base es legible y cultualmente precisa, pero hay problemas formales importantes: las notas a, c y d están asociadas a palabras equivocadas; «después de decir arriba» es torpe; y la cita queda mejor con raya parentética que con coma tras las comillas. «Holocaustos» y «ofrendas por el pecado» son buenas opciones en español bíblico.'
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. Las categorías sacrificiales están bien preservadas con «sacrificios», «ofrendas», «holocaustos» y «ofrendas por el pecado».
  issues:
