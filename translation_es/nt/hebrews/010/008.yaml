    rationale: Aunque intenta seguir el inglés, en español natural y digno es mejor «Después de decir antes» o «Habiendo dicho antes». Esto conserva la referencia al argumento previo sin calco extraño.
  - severity: low
    issue: La puntuación del inciso final puede reflejar mejor el griego.
    rationale: 'El original y el POB inglés marcan «which are offered according to the law» como inciso parentético. En español queda más claro con rayas: —las cuales se ofrecen conforme a la ley—.'
