    rationale: La nota [a] habla de ἀνώτερον pero está anclada tras «arriba»; [c] explica «holocaustos» pero está anclada a «ofrendas por el pecado»; [d] explica «ofrendas para el pecado» pero está anclada a «ellos». Esto compromete la auditabilidad.
  - severity: medium
    issue: Se añadió «en ellos» en la cita.
    rationale: 'La auditoría inglesa revisada eliminó el equivalente de «them» por no estar explícito en el griego. En español también puede omitirse sin pérdida: «ni te complaciste». Si se retiene, añade contenido no expreso.'
  - severity: medium
