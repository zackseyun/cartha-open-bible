translation:
  language: es
  text: 'Después de decir antes[a]: «Sacrificios y ofrendas y holocaustos[c] y ofrendas por el pecado[d] no quisiste ni te complaciste» —las cuales se ofrecen conforme a la ley[e]—.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haber dicho arriba». La frase mira hacia una cita ya mencionada en el argumento.
    reason: lexical_alternative
  - marker: c
    text: O «ofrendas completamente consumidas por el fuego». Término técnico para ofrendas totalmente consumidas en el altar.
    reason: lexical_alternative
  - marker: d
    text: O «ofrendas para el pecado». La expresión es un término sacrificial técnico.
    reason: lexical_alternative
  - marker: e
    text: Es decir, conforme a la ley mosaica.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνώτερον λέγων
  english_pob_choice: After saying above
  chosen_spanish: Después de decir arriba
  alternatives_spanish:
  - Habiendo dicho antes
  - Al decir arriba
  lexicon: BDAG
  rationale: La frase mira hacia una cita ya mencionada en el argumento. En español, «después de decir arriba» conserva esa referencia retrospectiva sin sonar demasiado literal o forzada.
- source_word: Θυσίας
  english_pob_choice: Sacrifices
  chosen_spanish: Sacrificios
  alternatives_spanish:
  - Sacrificios rituales
  - Sacrificios ofrecidos
  lexicon: BDAG
  rationale: En contexto cultual, θυσία corresponde de manera directa a «sacrificios». Mantiene la categoría sacrificial sin añadir explicaciones que el texto no da.
- source_word: προσφορὰς
  english_pob_choice: offerings
  chosen_spanish: ofrendas
  alternatives_spanish:
  - presentaciones
  - ofrecimientos
  lexicon: BDAG
  rationale: En el registro bíblico y cultual, «ofrendas» es el equivalente natural y claro de προσφορά. Evita un giro más abstracto como «presentaciones».
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas completamente quemadas
  - holocaustos enteros
  lexicon: BDAG
  rationale: «Holocaustos» es el término español establecido para este tipo de ofrenda completamente consumida por fuego. Aunque «ofrendas completamente quemadas» explicaría más, sería más pesado y menos fiel al registro tradicional del término técnico.
- source_word: περὶ ἁμαρτίας
  english_pob_choice: sin offerings
  chosen_spanish: ofrendas por el pecado
  alternatives_spanish:
  - sacrificios por el pecado
  - ofrendas para el pecado
  lexicon: BDAG
  rationale: La frase funciona aquí como término técnico sacrificial. «Ofrendas por el pecado» conserva esa función y evita reducirla a una referencia general al pecado.
- source_word: οὐκ ἠθέλησας
  english_pob_choice: you did not desire
  chosen_spanish: no quisiste
  alternatives_spanish:
  - no deseaste
  - no quisiste aceptarlas
  lexicon: BDAG
  rationale: En un contexto de cita poética, «quisiste» reproduce con naturalidad la negativa de θέλω. «Deseaste» es posible, pero suena más abstracto en español aquí.
- source_word: οὐδὲ εὐδόκησας
  english_pob_choice: nor did you delight in
  chosen_spanish: ni te complaciste en
  alternatives_spanish:
  - ni te agradaron
  - ni las aprobaste
  lexicon: BDAG
  rationale: εὐδοκέω expresa complacencia o beneplácito. «Te complaciste en» conserva esa fuerza sin convertirlo en mera aprobación jurídica. El pronombre objeto se recupera del conjunto de ofrendas enumeradas.
- source_word: αἵτινες
  english_pob_choice: which
  chosen_spanish: las cuales
  alternatives_spanish:
  - que
  - las que
  lexicon: BDAG
  rationale: El relativo femenino plural retoma las ofrendas enumeradas. «Las cuales» mantiene un tono claro y formal, adecuado al estilo de la epístola.
- source_word: κατὰ νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - de acuerdo con la ley
  lexicon: BDAG
  rationale: «Conforme a la ley» comunica con precisión la idea de conformidad normativa. En este contexto, la ley es la ley mosaica, pero en el texto español no hace falta explicitarlo dentro del versículo.
- source_word: προσφέρονται
  english_pob_choice: are offered
  chosen_spanish: se ofrecen
  alternatives_spanish:
  - son ofrecidas
  - son presentadas
  lexicon: BDAG
  rationale: La pasiva presente se expresa de forma natural en español con «se ofrecen». Conserva el valor general y habitual de la acción sin recargar la sintaxis.
theological_decisions:
- issue: Cómo nombrar las categorías sacrificiales sin suavizarlas ni mezclarlas con lenguaje devocional general
  english_pob_reading: 'Use explicit sacrificial terms: ''Sacrifices and offerings and whole burnt offerings and sin offerings'''
  chosen_spanish_reading: 'Usar términos sacrificiales explícitos: «sacrificios y ofrendas y holocaustos y ofrendas por el pecado»'
  alternative_spanish_readings:
  - «sacrificios y ofrendas, holocaustos y ofrendas por el pecado»
  - «sacrificios, ofrendas y holocaustos y ofrendas por el pecado»
  rationale: El pasaje enumera tipos cultuales concretos. La traducción conserva esa especificidad para no diluir el trasfondo levítico del argumento.
  doctrine_reference: Philosophy §§1, 5, 6
- issue: Cómo expresar la negativa divina sin implicar que la ley misma fuera mala o inválida
  english_pob_reading: you did not desire, nor did you delight in them
  chosen_spanish_reading: no quisiste ni te complaciste en ellos
  alternative_spanish_readings:
  - no deseaste ni te agradaron
  - no quisiste ni los aprobaste
  rationale: La negativa se dirige a la suficiencia o agrado divino respecto de esos sacrificios, no a una condena simple de la ley. La cláusula final, «conforme a la ley», preserva ese equilibrio.
  doctrine_reference: Philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditor: mantiene la lista sacrificial y la cláusula final, y ajusta la formulación para no añadir elementos no explícitos en el griego. En español, se prefirió una sintaxis natural que conserve la relación de dependencia con la cita anterior y la pasiva general de προσφέρονται.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantuvo «ley» sin mayúscula, ya que el referente es normativo y el contexto ya lo identifica como la ley mosaica.
  - Se eligió «holocaustos» como término técnico, aunque en español moderno puede tener otras asociaciones; aquí el contexto sacrificial lo determina.
  - Se usó «ofrendas por el pecado» para preservar el valor técnico de περὶ ἁμαρτίας sin introducir una paráfrasis doctrinal.
