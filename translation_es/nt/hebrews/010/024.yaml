translation:
  language: es
  text: y consideremos cómo estimularnos unos a otros[a] al amor y a las buenas obras,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «provocarnos» o «espolearnos» al amor y a las buenas obras. El sustantivo griego παροξυσμός puede denotar un fuerte impulso o provocación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοῶμεν
  english_pob_choice: let us consider
  chosen_spanish: considerémonos
  alternatives_spanish:
  - prestemos atención unos a otros
  - miremos con atención a los demás
  - tomemos nota unos de otros
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pide una forma inclusiva en primera persona del plural. «Considerémonos» conserva la idea de atención reflexiva y recíproca sin volverla más débil que el griego.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre nosotros
  lexicon: BDAG
  rationale: Es una reciprocidad natural en español y mantiene el carácter comunitario de la exhortación.
- source_word: παροξυσμὸν
  english_pob_choice: stir up
  chosen_spanish: estimularnos
  alternatives_spanish:
  - provocarnos
  - incitarnos
  - espolearnos
  lexicon: BDAG
  rationale: El sustantivo expresa un impulso fuerte o una provocación; en español «estimularnos» conserva la fuerza activadora sin introducir una connotación negativa innecesaria en el cuerpo principal.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  - caridad
  lexicon: BDAG
  rationale: «Amor» es la equivalencia normal de ἀγάπη en este contexto y evita una terminología eclesiástica más estrecha que el texto no exige.
- source_word: καλῶν ἔργων
  english_pob_choice: good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - buenas acciones
  - obras buenas
  lexicon: BDAG
  rationale: «Buenas obras» reproduce con naturalidad el sintagma y conserva el enlace léxico con ἔργα, además de resonar con el uso neotestamentario sin cargarlo doctrinalmente.
theological_decisions:
- issue: Tono de παροξυσμός en una exhortación positiva
  english_pob_reading: Render the exhortation positively as 'stir up love and good works' rather than a more jarring 'provoke' in the main text.
  chosen_spanish_reading: Expresar la exhortación con un verbo positivo («estimularnos») y dejar en nota la posibilidad de un matiz más intenso.
  alternative_spanish_readings:
  - provocarnos al amor y a las buenas obras
  - espolearnos al amor y a las buenas obras
  rationale: El término griego puede sugerir provocación o fuerte incitación; dado que el objeto es positivo, la redacción principal debe ser clara y edificante sin perder la energía del mandato. La nota preserva la tensión léxica documentada.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without unnecessary paraphrase.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Hebreos 10:24 y el audit trail inglés: conserva el exhortativo inclusivo, la reciprocidad, y la fuerza de παροξυσμός mediante un verbo español natural, dejando la alternativa más áspera en nota.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología POB habitual: ἀγάπη -> «amor», ἔργα -> «obras», y el plural recíproco -> «unos a otros».'
  - La puntuación refleja una sola cláusula exhortativa con complemento final de propósito.
  - La nota al pie usa un solo marcador y se ancla en la expresión que lleva la decisión léxica principal.
