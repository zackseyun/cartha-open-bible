translation:
  language: es
  text: desde entonces, aguardando[a] hasta que sus enemigos sean hechos un estrado[b] para sus pies,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El participio griego también puede sugerir «esperando con expectativa» o «aguardando».
    reason: lexical_alternative
  - marker: b
    text: 'La imagen remite a Salmo 110:1: «Siéntate a mi derecha, hasta que ponga a tus enemigos por estrado de tus pies».'
    reason: cross_reference
lexical_decisions:
- source_word: τὸ λοιπὸν
  english_pob_choice: from then on
  chosen_spanish: desde entonces
  alternatives_spanish:
  - a partir de entonces
  - de ahí en adelante
  - desde ahora
  lexicon: BDAG
  rationale: La frase articular neutra funciona adverbialmente y marca el inicio de una nueva fase tras la acción previa. «Desde entonces» es natural en español y conserva el valor temporal sin añadir matices no presentes en el griego.
- source_word: ἐκδεχόμενος
  english_pob_choice: waiting
  chosen_spanish: aguardando
  alternatives_spanish:
  - esperando
  - expectando
  - aguardando con expectativa
  lexicon: BDAG
  rationale: El participio expresa una espera continua con orientación al cumplimiento. «Aguardando» conserva ese sentido y suena más solemne que «esperando»; la opción de expectativa queda marcada en nota porque el participio puede sugerir espera expectante.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras no
  - hasta el momento en que
  lexicon: BDAG
  rationale: Introduce el límite temporal de la espera. «Hasta que» es la construcción más natural en español para una subordinada con verbo finito.
- source_word: τεθῶσιν
  english_pob_choice: are made
  chosen_spanish: sean puestos
  alternatives_spanish:
  - sean colocados
  - sean puestos como
  - sean hechos
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo de τίθημι pide un pasivo en español. «Sean puestos» conserva la pasividad y la imagen concreta sin debilitarla con una paráfrasis como «derrotados».
- source_word: οἱ ἐχθροὶ αὐτοῦ
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de él
  - sus adversarios
  lexicon: BDAG
  rationale: La posesión es directa; «sus enemigos» es idiomático y preciso. «Adversarios» sería más débil y menos exacto para ἐχθροί.
- source_word: ὑποπόδιον τῶν ποδῶν αὐτοῦ
  english_pob_choice: a footstool for his feet
  chosen_spanish: estrado de sus pies
  alternatives_spanish:
  - escabel de sus pies
  - banquillo de sus pies
  - apoyo para sus pies
  lexicon: BDAG
  rationale: La expresión conserva la imagen de Salmo 110:1. «Estrado» es un equivalente digno y bíblico en español; evita resolver la metáfora como mera derrota y mantiene la tensión intertextual.
theological_decisions:
- issue: Imaginería mesiánica de entronización desde Salmo 110:1
  english_pob_reading: Retain the concrete image of enemies being made 'a footstool for his feet' without paraphrasing it as mere defeat or subjugation.
  chosen_spanish_reading: Mantener la imagen concreta de que los enemigos sean puestos por estrado de sus pies, sin convertirla en una paráfrasis de simple derrota.
  alternative_spanish_readings:
  - hasta que sus enemigos sean derrotados
  - hasta que sus enemigos sean puestos bajo sus pies
  rationale: Hebreos cita y reutiliza el lenguaje de Salmo 110:1 como texto de entronización mesiánica. Conservar la imagen del estrado preserva la fuerza intertextual y no aplana la metáfora en una explicación abstracta.
  doctrine_reference: 'Principio de traducción: primacía del texto original y preservación de la tensión teológica e intertextual.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió un presente directo en la cláusula temporal («are made») en lugar de una perífrasis modal. En español se reflejó con «sean puestos», manteniendo la pasiva y el tono formal sin introducir deber o posibilidad. También se preservó la tensión del eco de Salmo 110:1 mediante la metáfora de «estrado».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se evitó «Cristo» porque el versículo no lo contiene explícitamente y aquí el enfoque es la cita/eco del Salmo.
  - «Aguardando» se eligió para no perder el matiz de expectativa contenido en ἐκδεχόμενος, pero la nota conserva la alternativa semántica.
  - «Estrado» conserva mejor el paralelismo bíblico que «escabel» en un registro de lectura pública y eclesial.
