translation:
  language: es
  text: Pero recuerden los días anteriores, cuando, después de haber sido iluminados[a], soportaron una gran lucha de sufrimientos[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando fueron iluminados». El participio griego puede expresarse en español con acción simultánea o anterior respecto al verbo principal.
    reason: lexical_alternative
  - marker: b
    text: «Iluminados» puede referirse ampliamente a recibir iluminación espiritual; los intérpretes lo relacionan de diversas maneras con la conversión, el bautismo o la instrucción en la fe.
    reason: alternative_reading
  - marker: c
    text: O «un duro combate de sufrimientos». El sustantivo conserva el sentido de contienda o lucha intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναμιμνῄσκεσθε
  english_pob_choice: remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - traigan a la memoria
  - sigan recordando
  lexicon: BDAG
  rationale: El imperativo presente exhortativo se expresa de forma natural en español con «recuerden». Conserva el tono directo y la fuerza de la orden sin volverlo rígido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca un giro exhortativo suave; «Pero» refleja mejor ese enlace con la advertencia anterior que un simple «Y».
- source_word: τὰς πρότερον ἡμέρας
  english_pob_choice: the former days
  chosen_spanish: los días anteriores
  alternatives_spanish:
  - los días pasados
  - los días de antes
  lexicon: BDAG
  rationale: «Días anteriores» conserva el contraste temporal de πρότερον y suena natural en español. Mantiene la referencia a un periodo previo sin añadir matices no presentes en el griego.
- source_word: ἐν αἷς
  english_pob_choice: when
  chosen_spanish: en los cuales
  alternatives_spanish:
  - cuando
  - durante los cuales
  lexicon: BDAG
  rationale: Aunque en contexto la relación es temporal, en español «en los cuales» permite reproducir más de cerca la estructura relacional del griego sin perder inteligibilidad. Se conserva así la conexión con «días».
- source_word: φωτισθέντες
  english_pob_choice: after you were enlightened
  chosen_spanish: después de haber sido iluminados
  alternatives_spanish:
  - cuando fueron iluminados
  - después de ser iluminados
  - después de haber recibido luz
  lexicon: BDAG
  rationale: «Iluminados» mantiene el lenguaje metafórico y teológico del griego y del audit trail inglés. La frase «después de haber sido» hace claro que la iluminación antecede al endurecimiento o sufrimiento descrito por el verbo principal, sin especificar si se trata de conversión, bautismo o instrucción.
- source_word: πολλὴν ἄθλησιν
  english_pob_choice: a great struggle
  chosen_spanish: un gran combate
  alternatives_spanish:
  - una gran lucha
  - un duro combate
  - un gran conflicto
  lexicon: BDAG
  rationale: ἄθλησις conserva el matiz de contienda/competencia ardua. «Combate» recoge bien la idea de una lucha intensa y conserva cierto eco de contienda, mientras que el adjetivo «gran» refleja πολλὴν.
- source_word: παθημάτων
  english_pob_choice: of sufferings
  chosen_spanish: de padecimientos
  alternatives_spanish:
  - de sufrimientos
  - de aflicciones
  - de dolores
  lexicon: BDAG
  rationale: «Padecimientos» expresa con dignidad la gama de experiencias dolorosas del genitivo plural y funciona bien con «combate». Se evita estrechar el sentido a un solo tipo de sufrimiento.
theological_decisions:
- issue: Sentido de φωτισθέντες en un contexto exhortativo
  english_pob_reading: Retain the metaphorical term 'enlightened' without narrowing it to a specific doctrinal event such as conversion, baptism, or catechetical instruction.
  chosen_spanish_reading: Mantener «iluminados» sin identificarlo con un acto doctrinal concreto.
  alternative_spanish_readings:
  - convertidos
  - bautizados
  - que recibieron la luz del evangelio
  rationale: El texto afirma una iluminación recibida previamente, pero no especifica su correlato eclesial. La versión española conserva esa tensión teológica y evita imponer una interpretación sectaria o excesivamente definida.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y coincide con la decisión inglesa de mantener «enlightened/iluminados» sin concretar doctrinalmente el referente. Se adoptó una sintaxis española fluida que conserva la relación temporal de ἐν αἷς y la intensidad de πολλὴν ἄθλησιν.
  spanish_consistency_notes:
  - Se usa «iluminados» para φωτισθέντες, en coherencia con el vocabulario POB y con la preservación de la ambigüedad teológica.
  - Se evita «Señor» o términos ajenos al pasaje; no aparece léxico de κύριος/YHWH.
  - «Padecimientos» mantiene el plural genitivo y la amplitud semántica de παθημάτων.
  - Los corchetes de nota se insertan solo donde hay una alternativa textual o una aclaración necesaria.
