translation:
  language: es
  text: ¿Cuánto peor castigo piensan que merecerá el que ha pisoteado al Hijo de Dios, y ha considerado común[a] la sangre del pacto, por la cual fue santificado[b], y ha insultado[c] al Espíritu de gracia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «impura» o «profana».
    reason: lexical_alternative
  - marker: b
    text: La frase «por la cual fue santificado» queda vinculada sintácticamente al ofensor en el griego; algunos intérpretes entienden de otro modo el referente. La traducción preserva la ambigüedad en vez de resolver la disputa teológica.
    reason: alternative_reading
  - marker: c
    text: O «ha ultrajado».
    reason: lexical_alternative
lexical_decisions:
- source_word: πόσῳ
  english_pob_choice: How much worse
  chosen_spanish: ¿Cuánto más grave
  alternatives_spanish:
  - ¿Cuánto peor
  - ¿Por cuánto más
  lexicon: BDAG
  rationale: Con la construcción comparativa χείρονος, español natural y fiel es una pregunta retórica con «cuánto más grave», preservando el tono de advertencia sin sonar forzado.
- source_word: χείρονος
  english_pob_choice: worse
  chosen_spanish: más grave
  alternatives_spanish:
  - peor
  - más severo
  lexicon: BDAG
  rationale: En español, «grave» comunica bien la severidad de un castigo judicial; «peor» puede sonar menos preciso con «castigo». El comparativo mantiene la fuerza del griego.
- source_word: ἀξιωθήσεται
  english_pob_choice: will be deserved
  chosen_spanish: merecerá
  alternatives_spanish:
  - será considerado digno de
  - recibirá como debido
  lexicon: BDAG
  rationale: El pasivo griego expresa valoración judicial; «merecerá» conserva la idea de que el castigo le corresponde justamente, con fluidez en español.
- source_word: τιμωρίας
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - pena de castigo
  - retribución
  lexicon: BDAG
  rationale: «Castigo» es claro y natural en español bíblico contemporáneo, y conserva el sentido judicial sin añadir matices ajenos.
- source_word: καταπατήσας
  english_pob_choice: has trampled underfoot
  chosen_spanish: ha pisoteado
  alternatives_spanish:
  - ha hollado
  - ha pisado con desprecio
  lexicon: BDAG
  rationale: «Pisoteado» reproduce la imagen vívida de desprecio físico y moral que el griego expresa. Mantiene la fuerza metafórica de la acción.
- source_word: υἱὸν τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: al Hijo de Dios
  alternatives_spanish:
  - al Hijo de Dios
  - al Hijo de Dios[a]
  lexicon: BDAG
  rationale: Se conserva el título cristológico estándar y preciso, sin suavizar su fuerza doctrinal.
- source_word: κοινὸν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - impuro
  - profano
  lexicon: BDAG
  rationale: «Común» preserva el contraste lexical con lo consagrado/ santo. En el contexto, su fuerza despectiva se entiende sin reemplazarla por una interpretación más explícita.
- source_word: ἡγησάμενος
  english_pob_choice: has regarded
  chosen_spanish: ha considerado
  alternatives_spanish:
  - ha estimado
  - ha juzgado
  lexicon: BDAG
  rationale: Verbo mental natural en español para expresar la evaluación deliberada del sujeto.
- source_word: αἷμα τῆς διαθήκης
  english_pob_choice: the blood of the covenant
  chosen_spanish: la sangre del pacto
  alternatives_spanish:
  - la sangre del convenio
  - la sangre del nuevo pacto
  lexicon: BDAG
  rationale: «Pacto» mantiene la formulación bíblica y el peso covenantal del griego, sin interpretar innecesariamente el tipo de pacto.
- source_word: ἐν ᾧ
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - por cuyo medio
  - mediante la cual
  - en la cual
  lexicon: BDAG
  rationale: La POB inglesa toma la relación instrumental; en español, «por la cual» comunica que la santificación ocurrió por medio de esa sangre, sin resolver de más la referencia del pronombre.
- source_word: ἡγιάσθη
  english_pob_choice: he was sanctified
  chosen_spanish: fue santificado
  alternatives_spanish:
  - fue hecho santo
  - fue consagrado
  lexicon: BDAG
  rationale: «Santificado» conserva el término teológico de Hebreos y el pasivo del griego. No se sustituye por una explicación que diluya el vocabulario del autor.
- source_word: ἐνυβρίσας
  english_pob_choice: has insulted
  chosen_spanish: ha insultado
  alternatives_spanish:
  - ha ultrajado
  - ha agraviado
  lexicon: BDAG
  rationale: «Insultado» transmite abuso y desprecio de modo claro y directo. La alternativa «ultrajado» también es posible, pero menos inmediata para lectores amplios.
- source_word: τὸ πνεῦμα τῆς χάριτος
  english_pob_choice: the Spirit of grace
  chosen_spanish: el Espíritu de gracia
  alternatives_spanish:
  - el espíritu de gracia
  - el Espíritu gracioso
  lexicon: BDAG
  rationale: Se conserva la mayúscula por tratarse probablemente de una designación personal/titular, coherente con el contexto y con la lectura inglesa auditada.
theological_decisions:
- issue: Referente y ambigüedad de «por la cual fue santificado» (ἐν ᾧ ἡγιάσθη)
  english_pob_reading: The clause is left attached to the offender in the Greek syntax, without resolving whether another referent is intended.
  chosen_spanish_reading: 'Se mantiene ligado al ofensor: «la sangre del pacto por la cual fue santificado».'
  alternative_spanish_readings:
  - «por la cual fue santificado» entendido de otra persona o realidad
  - «en la cual fue santificado» con referentismo distinto
  rationale: La sintaxis griega coloca el pronombre en una relación que, leída de modo directo, apunta al sujeto descrito por los participios. Dado que la cuestión es debatida, la traducción preserva la tensión en vez de armonizarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el registro auditado en inglés de la POB, manteniendo la tensión sintáctico-teológica de Hebreos 10:29. Se corrigió la anclaje de notas para que cada marcador aparezca explícitamente en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se usa «Espíritu» con mayúscula por el carácter titular de τὸ πνεῦμα τῆς χάριτος en este contexto.
  - «Común» conserva el contraste con lo santo; las notas ofrecen «impura/profana» como alternativas sin reemplazar el término principal.
  - «Pacto» se prefirió sobre «convenio» para conservar la fraseología bíblica y el paralelismo con la sangre del pacto.
