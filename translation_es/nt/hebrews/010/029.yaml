source:
  edition: SBLGNT
  text: πόσῳ δοκεῖτε χείρονος ἀξιωθήσεται τιμωρίας ὁ τὸν υἱὸν τοῦ θεοῦ καταπατήσας, καὶ τὸ αἷμα τῆς διαθήκης κοινὸν ἡγησάμενος ἐν ᾧ ἡγιάσθη, καὶ τὸ πνεῦμα τῆς χάριτος ἐνυβρίσας.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/010/029.yaml
  text: How much worse punishment do you think will be deserved by the one who has trampled underfoot the Son of God[a], and has regarded the blood of the covenant by which he was sanctified as common[c][b], and has insulted the Spirit of grace?
  footnotes:
  - marker: a
    text: Or 'has regarded the blood of the covenant as unclean' or 'as profane.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'by which he was sanctified' is syntactically linked to the offender in Greek; some interpreters understand the referent differently. The translation preserves the ambiguity rather than resolving the theological debate.
    reason: alternative_reading
  - marker: c
    text: Or 'has outraged the Spirit of grace.'
    reason: lexical_alternative
