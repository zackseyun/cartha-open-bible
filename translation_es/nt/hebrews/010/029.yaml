revisions:
- from: ¿Cuánto más grave castigo piensan que merecerá el que ha pisoteado al Hijo de Dios, y ha considerado común[a][b] la sangre del pacto por la cual fue santificado, y ha insultado al Espíritu de gracia[c]?
  to: ¿Cuánto peor castigo piensan que merecerá el que ha pisoteado al Hijo de Dios, y ha considerado común[a] la sangre del pacto, por la cual fue santificado[b], y ha insultado[c] al Espíritu de gracia?
  rationale: Se ajusta el español para una formulación comparativa más idiomática y, sobre todo, se corrige la colocación de las notas para que cada marcador corresponda exactamente al elemento explicado por su nota, conforme a la disciplina del proyecto. También se simplifica la nota c para que refleje con precisión la alternativa lexical del verbo ἐνυβρίσας, sin dar a entender erróneamente que la variante afecta a «Espíritu de gracia».
