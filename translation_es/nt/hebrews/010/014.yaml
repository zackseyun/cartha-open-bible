translation:
  language: es
  text: Pues con una sola ofrenda ha perfeccionado para siempre a los que están siendo santificados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están siendo hechos santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μιᾷ
  english_pob_choice: one
  chosen_spanish: una sola
  alternatives_spanish:
  - una
  - única
  lexicon: BDAG
  rationale: El dativo femenino singular modifica a προσφορᾷ y subraya la unicidad de la ofrenda. En español, «una sola» comunica mejor la fuerza enfática de una sola ofrenda que «una» a secas, sin añadir interpretación indebida.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o base del argumento anterior. «Porque» mantiene la función explicativa de forma natural en español y conserva el enlace discursivo.
- source_word: προσφορᾷ
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - sacrificio
  - oblación
  lexicon: BDAG
  rationale: El término puede referirse a una ofrenda presentada a Dios; «ofrenda» es amplio y fiel al sustantivo griego, sin forzarlo a «sacrificio», que sería algo más interpretativo.
- source_word: τετελείωκεν
  english_pob_choice: has perfected
  chosen_spanish: ha perfeccionado
  alternatives_spanish:
  - ha hecho perfecto
  - ha llevado a la perfección
  lexicon: BDAG
  rationale: El perfecto activo indica una acción completada con resultado vigente. «Ha perfeccionado» conserva esa fuerza y permite reflejar el contraste con el proceso continuo expresado por el participio siguiente.
- source_word: εἰς τὸ διηνεκές
  english_pob_choice: for all time
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - de manera permanente
  lexicon: BDAG
  rationale: La expresión denota validez duradera y continua. «Para siempre» es idiomático en español y transmite bien el efecto permanente de la única ofrenda.
- source_word: τοὺς ἁγιαζομένους
  english_pob_choice: those who are being sanctified
  chosen_spanish: a los que están siendo santificados
  alternatives_spanish:
  - a los que están siendo hechos santos
  - a los santificados
  lexicon: BDAG
  rationale: El participio presente pasivo señala un proceso en curso. «Están siendo santificados» preserva ese aspecto progresivo; «a los santificados» aplastaría el matiz verbal, y «hechos santos» explicaría la idea pero cambiaría el giro principal.
theological_decisions:
- issue: Tensión entre perfección consumada y santificación en proceso
  english_pob_reading: 'Retain both dimensions in translation: ''has perfected'' alongside ''are being sanctified.'''
  chosen_spanish_reading: 'Mantener ambas dimensiones: «ha perfeccionado» junto con «están siendo santificados».'
  alternative_spanish_readings:
  - «ha hecho santos» junto con una expresión más estática
  - «están siendo hechos santos» con un giro más explicativo
  rationale: El griego conserva intencionalmente una obra completa y duradera, y a la vez un proceso real en curso. La traducción española debe dejar visible esa tensión sin resolverla hacia una lectura meramente posicional o puramente progresiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Sin cambios respecto al último pase revisado; el análisis de control cruzado reporta alta concordancia y no propone revisiones.
  spanish_consistency_notes:
  - 'Se mantuvo un registro verbal coherente: perfecto compuesto para τετελείωκεν y perifrástico progresivo para ἁγιαζομένους.'
  - Se prefirió «ofrenda» sobre «sacrificio» para no sobreinterpretar el lexema griego.
  - «Para siempre» comunica el sentido idiomático de εἰς τὸ διηνεκές en español natural.
  - La nota textual conserva la alternativa semántica relevante entre «santificados» y «hechos santos».
