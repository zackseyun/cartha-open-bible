translation:
  language: es
  text: Porque si seguimos pecando deliberadamente[a] después de haber recibido el conocimiento de la verdad[b], ya no queda sacrificio por los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sabiendas». El adverbio puede expresar también una acción hecha con conocimiento y voluntad.
    reason: lexical_alternative
  - marker: b
    text: O «pleno conocimiento de la verdad». El griego ἐπίγνωσις puede sugerir un conocimiento más completo o decisivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑκουσίως
  english_pob_choice: deliberately
  chosen_spanish: deliberadamente
  alternatives_spanish:
  - a sabiendas
  - voluntariamente
  lexicon: BDAG
  rationale: El adverbio modifica el pecado continuo y expresa intención consciente. «Deliberadamente» es natural en español moderno y conserva la fuerza de intencionalidad sin volver el registro jurídico o arcaizante.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación o fundamento del argumento previo. «Porque» suena natural al inicio de una frase en español y conserva la relación discursiva.
- source_word: ἁμαρτανόντων ἡμῶν
  english_pob_choice: if we go on sinning
  chosen_spanish: si seguimos pecando
  alternatives_spanish:
  - si pecamos
  - si estamos pecando
  - si continuamos pecando
  lexicon: BDAG
  rationale: El participio presente con genitivo absoluto comunica acción continua o persistente. «Seguimos pecando» preserva esa duratividad con un español idiomático.
- source_word: μετὰ τὸ λαβεῖν
  english_pob_choice: after receiving
  chosen_spanish: después de haber recibido
  alternatives_spanish:
  - después de recibir
  - tras recibir
  lexicon: BDAG
  rationale: La construcción temporal indica anterioridad respecto del pecado mencionado. «Después de haber recibido» resalta con claridad la acción completada previa.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - pleno conocimiento
  - conocimiento pleno
  - plena comprensión
  lexicon: BDAG
  rationale: «Conocimiento» mantiene la traducción básica sin forzar en el texto principal la posible intensidad de ἐπίγνωσις. La nota conserva la alternativa de mayor fuerza semántica.
- source_word: τῆς ἀληθείας
  english_pob_choice: of the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - de la verdad del evangelio
  lexicon: BDAG
  rationale: La expresión es directa y estándar. En contexto, puede aludir a la verdad del evangelio, pero el griego no la explicita aquí.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no queda ya
  - no permanece ya
  lexicon: BDAG
  rationale: «Ya no» expresa con claridad la cesación de algo a partir de ese punto, y suena natural al inicio de la cláusula final.
- source_word: περὶ ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - por el pecado
  - en favor de los pecados
  lexicon: BDAG
  rationale: En lenguaje sacrificial, περί + genitivo se entiende como referencia a una ofrenda «por» los pecados. El plural sigue de cerca el griego y el uso cultual.
- source_word: ἀπολείπεται
  english_pob_choice: there remains
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - queda aún
  lexicon: BDAG
  rationale: El giro impersonal «queda» reproduce bien el sentido de «there remains» en español sin sobrecargar la frase.
- source_word: θυσία
  english_pob_choice: a sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - una ofrenda
  - un sacrificio
  lexicon: BDAG
  rationale: «Sacrificio» es el equivalente cultual directo y mantiene la categoría teológica del argumento de Hebreos.
theological_decisions:
- issue: Fuerza aspectual de ἁμαρτανόντων
  english_pob_reading: 'Rendered as ongoing action: ''if we go on sinning deliberately'' rather than a single deliberate sin.'
  chosen_spanish_reading: «si seguimos pecando deliberadamente» mantiene la idea de acción continua o persistente, no de un acto aislado.
  alternative_spanish_readings:
  - si pecamos deliberadamente
  - si deliberadamente pecamos
  rationale: El participio presente sugiere continuidad. La redacción evita convertir el texto en una condena de un solo pecado puntual y preserva la tensión exhortativa del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Alcance de ἐπίγνωσις en contexto de advertencia
  english_pob_reading: Main text uses 'knowledge of the truth' without specifying whether this implies saving regeneration.
  chosen_spanish_reading: «conocimiento de la verdad» mantiene la formulación lexical sin definir su alcance salvífico o experiencial.
  alternative_spanish_readings:
  - pleno conocimiento de la verdad
  - conocimiento pleno de la verdad
  rationale: El texto no define por sí mismo si se trata de conocimiento regenerador, confesional o comunitario. La traducción conserva esa ambigüedad y no fuerza una lectura doctrinal particular.
  doctrine_reference: No resolver la discusión eclesial más allá de lo que el griego dice explícitamente.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el estado revisado más reciente del texto inglés, sin cambios reportados en la auditoría. Se mantuvo la equivalencia óptima: conservar el valor aspectual de ἁμαρτανόντων, la secuencia temporal de μετὰ τὸ λαβεῖν y la ambigüedad doctrinal de ἐπίγνωσις, mientras se adapta el orden a un español natural y publicable.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar POB solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «pecando» y no una forma puntual para reflejar la continuidad del participio presente.
  - «Sacrificio» se mantuvo por su fuerza cultual y porque el contexto de Hebreos la exige.
  - Las notas al pie conservan una alternativa léxica real sin convertirla en interpretación doctrinal cerrada.
