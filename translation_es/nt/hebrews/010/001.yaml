translation:
  language: es
  text: Porque la ley tiene una sombra de los bienes venideros, no la misma imagen[a] de las realidades, nunca puede, por los mismos sacrificios que se ofrecen continuamente año tras año, perfeccionar[b] a los que se acercan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la imagen misma de las realidades'.
    reason: lexical_alternative
  - marker: b
    text: O 'hacer perfectos' o 'llevar a la perfección'.
    reason: lexical_alternative
  - marker: c
    text: '''Los que se acercan'' conserva el sentido cultual de acercarse a Dios en adoración.'
    reason: cultural_note
lexical_decisions:
- source_word: Σκιὰν
  english_pob_choice: a shadow
  chosen_spanish: una sombra
  alternatives_spanish:
  - un anticipo
  - una prefiguración
  lexicon: BDAG
  rationale: σκιά conserva el contraste metafórico con εἰκών; 'sombra' mantiene en español la idea de algo real pero incompleto, sin suavizar el valor anticipatorio del término.
- source_word: τῶν μελλόντων ἀγαθῶν
  english_pob_choice: of the good things to come
  chosen_spanish: de los bienes venideros
  alternatives_spanish:
  - de los bienes que han de venir
  - de las cosas buenas por venir
  lexicon: BDAG
  rationale: μέλλω con participio expresa lo futuro o inminente; 'bienes venideros' preserva el carácter prospectivo y es natural en español bíblico actual.
- source_word: οὐκ αὐτὴν τὴν εἰκόνα
  english_pob_choice: not the very form
  chosen_spanish: no la misma imagen
  alternatives_spanish:
  - no la imagen misma
  - no la verdadera representación
  lexicon: BDAG
  rationale: εἰκών puede ser 'imagen', 'forma' o 'representación'; en español 'la misma imagen' comunica la fuerza enfática de αὐτήν sin perder la oposición con 'sombra'.
- source_word: τῶν πραγμάτων
  english_pob_choice: of the realities
  chosen_spanish: de las realidades
  alternatives_spanish:
  - de las cosas
  - de los hechos
  lexicon: BDAG
  rationale: πράγματα apunta aquí a las realidades efectivas que corresponden a la sombra; 'realidades' expresa bien el contraste conceptual en español.
- source_word: κατ’ ἐνιαυτὸν
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - año por año
  lexicon: BDAG
  rationale: El giro idiomático indica repetición anual continua; 'año tras año' es el equivalente más natural y conserva el énfasis en la reiteración.
- source_word: ταῖς αὐταῖς θυσίαις
  english_pob_choice: by the same sacrifices
  chosen_spanish: por los mismos sacrificios
  alternatives_spanish:
  - con los mismos sacrificios
  - mediante los mismos sacrificios
  lexicon: BDAG
  rationale: El dativo es instrumental; 'por los mismos sacrificios' expresa el medio y mantiene la insistencia en que son sacrificios idénticos y repetidos.
- source_word: ἃς προσφέρουσιν
  english_pob_choice: that they continually offer
  chosen_spanish: que se ofrecen
  alternatives_spanish:
  - que ellos ofrecen
  - que presentan
  lexicon: BDAG
  rationale: El presente puede indicar acción habitual; en español pasivo refleja bien el uso cultual implícito sin forzar un sujeto explícito.
- source_word: εἰς τὸ διηνεκές
  english_pob_choice: continually
  chosen_spanish: sin cesar
  alternatives_spanish:
  - continuamente
  - de manera perpetua
  lexicon: BDAG
  rationale: La frase denota continuidad/perpetuidad; 'sin cesar' integra naturalmente la idea con el flujo de la oración española.
- source_word: οὐδέποτε δύναται
  english_pob_choice: can never
  chosen_spanish: nunca puede
  alternatives_spanish:
  - de ningún modo puede
  - jamás puede
  lexicon: BDAG
  rationale: La negación absoluta de οὐδέποτε y el verbo modal se conservan con una formulación breve y directa en español.
- source_word: τοὺς προσερχομένους
  english_pob_choice: those who draw near
  chosen_spanish: a los que se acercan
  alternatives_spanish:
  - a los que se acercan para adorar
  - a los que se allegan
  lexicon: BDAG
  rationale: προσέρχομαι tiene en Hebreos un matiz cultual de acercarse a Dios; 'se acercan' mantiene el sentido y es idiomático en español. Se deja la referencia cultual implícita en el contexto.
- source_word: τελειῶσαι
  english_pob_choice: perfect
  chosen_spanish: perfeccionar
  alternatives_spanish:
  - hacer perfectos
  - llevar a la perfección
  lexicon: BDAG
  rationale: τελειόω en Hebreos implica llevar al objetivo pleno; 'perfeccionar' preserva el verbo y la fuerza técnica del término en un registro bíblico claro.
theological_decisions:
- issue: Contraste sombra/realidad en la ley
  english_pob_reading: The law has only a shadow of the good things to come, not the very form of the realities.
  chosen_spanish_reading: La ley tiene una sombra de los bienes venideros, no la misma imagen de las realidades.
  alternative_spanish_readings:
  - La ley tiene solo una sombra de los bienes venideros, no la imagen misma de las realidades.
  - La ley posee una sombra anticipada de los bienes venideros, no la plena realidad.
  rationale: La redacción conserva la tensión de σκιά frente a εἰκών y luego frente a τῶν πραγμάτων. No convierte la ley en la realidad final ni borra su valor anticipatorio.
  doctrine_reference: Hebreos 10:1; Translation philosophy §3
- issue: Sentido de τελειῶσαι en el contexto sacrificial
  english_pob_reading: it can never ... perfect those who draw near
  chosen_spanish_reading: nunca puede ... perfeccionar a los que se acercan
  alternative_spanish_readings:
  - nunca puede ... hacer perfectos a los que se acercan
  - nunca puede ... llevar a la perfección a los que se acercan
  rationale: En Hebreos, τελειόω se vincula con el acceso pleno a Dios y la insuficiencia de los sacrificios repetidos. 'Perfeccionar' preserva el término técnico sin reducirlo a impecabilidad moral.
  doctrine_reference: Hebreos 10:1; Translation philosophy §5
- issue: Matiz cultual de 'los que se acercan'
  english_pob_reading: Those who draw near carries the sense of approaching God in worship.
  chosen_spanish_reading: a los que se acercan
  alternative_spanish_readings:
  - a los que se acercan para adorar
  - a los adoradores que se acercan
  rationale: El español 'acercarse' mantiene el verbo de proximidad y permite que el contexto de Hebreos aporte el matiz litúrgico sin sobreexplicación dentro del texto principal.
  doctrine_reference: Hebreos 10:1; nota cultural
- issue: Repetición sacrificial anual
  english_pob_reading: by the same sacrifices that they continually offer year after year
  chosen_spanish_reading: por los mismos sacrificios ... año tras año
  alternative_spanish_readings:
  - con los mismos sacrificios ... cada año
  - mediante los mismos sacrificios ... de año en año
  rationale: 'La acumulación de repetición es parte del argumento: el sacrificio reiterado no logra el efecto definitivo. ''Año tras año'' comunica bien la insistencia del griego.'
  doctrine_reference: Hebreos 10:1; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el acuerdo alto del audit trail inglés y no introduce cambios sustantivos respecto a la lectura aprobada: mantiene la oposición σκιά/εἰκών, el carácter repetido de los sacrificios y el sentido técnico de τελειόω. Se ajustó la sintaxis al español natural (''año tras año'', ''por los mismos sacrificios'', ''a los que se acercan'') sin desplazar el contenido source-grounded.'
  spanish_consistency_notes:
  - Se mantiene 'ley' para ὁ νόμος y 'Yahvé' no aparece en este versículo, por lo que no hay ajuste del nombre divino.
  - '''Mesías/Cristo'' no aplica aquí.'
  - '''Realidades'' se usa para τῶν πραγμάτων siguiendo el contraste conceptual del texto.'
  - '''Perfeccionar'' se usa como verbo técnico coherente con Hebreos y con la tradición POB de τελειόω.'
  - La pasiva 'se ofrecen' evita añadir un sujeto explícito que el griego no expresa de forma necesaria.
