revisions:
- from: 'Porque sabemos del que dijo[a]: «Mía es la venganza; yo pagaré», y otra vez[b]: «El Señor juzgará a su pueblo».'
  to: 'Porque conocemos al que dijo[a]: «Mía es la venganza; yo retribuiré», y otra vez[b]: «El Señor juzgará a su pueblo».'
  rationale: Se corrige «sabemos del que dijo» a «conocemos al que dijo» para reflejar con más fidelidad y naturalidad el participio sustantivado griego como objeto directo personal. Se cambia «yo pagaré» por «yo retribuiré» para preservar mejor la fuerza de ἀνταποδώσω en un contexto de venganza y juicio divino. Se mantienen las notas existentes porque siguen siendo pertinentes y sus anclajes permanecen en el texto revisado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: «sabemos», la doble cita y la fuerza judicial de «juzgará a su pueblo». También conserva adecuadamente la nota sobre el rango de κρίνω. Sin embargo, «sabemos del que dijo» no corresponde con naturalidad ni precisión a τὸν εἰπόντα, que aquí pide un objeto directo personal («al que dijo / a aquel que dijo») o, más naturalmente, una reformulación como «conocemos al que dijo». Además, «yo pagaré» para ἀνταποδώσω suena demasiado económico en español y debilita la idea de retribución/repago divina presente en el contexto de juicio.'
  spanish_quality_summary: 'La frase principal necesita una reparación de naturalidad y fidelidad: «Porque sabemos del que dijo» es poco idiomático en español bíblico actual. «Porque conocemos al que dijo» suena mejor, aunque «sabemos quién dijo» sería más natural todavía; no obstante, para preservar la estructura del original, «conocemos al que dijo» funciona bien. En la cita, «yo daré el pago» sería torpe, pero «yo pagaré» no comunica bien retribución judicial; «yo daré el pago» no es opción. La mejor solución breve y digna es «yo daré la paga» tampoco. Por tanto, «yo retribuiré» preserva mejor el registro y sentido. El resto del versículo es claro y legible.'
  glossary_alignment: 'Hay un desajuste menor con la política del proyecto sobre κύριος/YHWH: aunque el borrador justifica «El Señor» por tratarse de una cita griega, la política pide explicar decisiones cuando κύριος cita o alude al nombre divino. Dado que el texto fuente inmediato es griego κύριος y la cita está fijada en Hebreos, «el Señor» es defendible aquí, pero conviene señalar que es una excepción contextual a la preferencia general por «Yahvé» cuando se trata del nombre divino. No requiere cambiar el texto principal en este caso. No hay otros conflictos terminológicos relevantes.'
  issues:
  - severity: medium
    issue: «sabemos del que dijo» es poco fiel y poco idiomático para τὸν εἰπόντα
    rationale: El griego tiene artículo + participio sustantivado como objeto directo de «conocemos/sabemos», no una construcción partitiva o preposicional «de». En español, «sabemos del que dijo» suena indirecto y extraño.
  - severity: medium
    issue: «yo pagaré» debilita la fuerza retributiva de ἀνταποδώσω
    rationale: En español general, «pagar» suele asociarse primero con dinero o deuda. Aquí el contexto es de venganza y juicio divino; «retribuiré» comunica mejor repago judicial sin paráfrasis excesiva.
  - severity: low
    issue: La decisión «El Señor» frente a la preferencia del proyecto por «Yahvé» necesita mejor explicitación contextual
    rationale: No necesariamente exige cambio en el texto de Hebreos, porque el fuente inmediato es κύριος en una cita, pero sí conviene reconocerlo como excepción contextual y no como simple preferencia tradicional.
  revised_spanish_text: 'Porque conocemos al que dijo[a]: «Mía es la venganza; yo retribuiré», y otra vez[b]: «El Señor juzgará a su pueblo».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Mía es la venganza».'
    reason: lexical_alternative
  - marker: b
    text: La cita alude a Deuteronomio 32:35–36. En su contexto original, «juzgar» puede incluir tanto castigo como vindicación; aquí el contexto de advertencia resalta el juicio divino.
    reason: cross_reference
