translation:
  language: es
  text: 'Porque conocemos al que dijo[a]: «Mía es la venganza; yo retribuiré», y otra vez[b]: «El Señor juzgará a su pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Mía es la venganza».'
    reason: lexical_alternative
  - marker: b
    text: La cita alude a Deuteronomio 32:35–36. En su contexto original, «juzgar» puede incluir tanto castigo como vindicación; aquí el contexto de advertencia resalta el juicio divino.
    reason: cross_reference
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos sabido
  lexicon: BDAG
  rationale: οἶδα en perfecto con sentido presente expresa conocimiento ya poseído; «sabemos» es el equivalente natural y mantiene el tono exhortativo del contexto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Conserva la conexión explicativa con el versículo anterior sin endurecer el flujo en español.
- source_word: τὸν εἰπόντα
  english_pob_choice: the one who said
  chosen_spanish: del que dijo
  alternatives_spanish:
  - del que habló
  - del que ha dicho
  lexicon: BDAG
  rationale: El participio sustantivado apunta a Dios como hablante de la Escritura citada; «del que dijo» es idiomático y preserva la referencia personal.
- source_word: Ἐμοὶ ἐκδίκησις
  english_pob_choice: Vengeance is mine
  chosen_spanish: Mía es la venganza
  alternatives_spanish:
  - La venganza es mía
  - La venganza me pertenece
  - Mía es la venganza
  lexicon: BDAG
  rationale: El griego es elíptico y enfático, con dativo posesivo. «Mía es la venganza» conserva la forma solemne y refleja bien la fuerza posesiva del original.
- source_word: ἀνταποδώσω
  english_pob_choice: I will repay
  chosen_spanish: yo pagaré
  alternatives_spanish:
  - yo recompensaré
  - yo retribuiré
  - yo daré pago
  lexicon: BDAG
  rationale: El verbo expresa retribución/repago. «Pagaré» comunica con claridad la idea de devolver o retribuir, aunque se reconoce la alternativa más literal «recompensaré».
- source_word: καὶ πάλιν
  english_pob_choice: and again
  chosen_spanish: y otra vez
  alternatives_spanish:
  - y de nuevo
  - y además
  lexicon: BDAG
  rationale: Fórmula normal de introducción a una segunda cita; «y otra vez» mantiene la brevedad del texto griego.
- source_word: Κρινεῖ κύριος
  english_pob_choice: The Lord will judge
  chosen_spanish: El Señor juzgará
  alternatives_spanish:
  - El Señor hará justicia
  - El Señor condenará/juzgará
  lexicon: BDAG
  rationale: κρίνω conserva fuerza judicial amplia, con posible matiz de vindicación o condena según contexto. «Juzgará» preserva esa tensión sin suavizarla.
- source_word: κύριος
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: Aquí se cita la forma griega κύριος de la LXX/Deuteronomio. En español, la fórmula citada tradicionalmente y más transparente es «El Señor» dentro de la cita, en lugar de sustituir de forma interpretativa por «Yahvé».
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su pueblo propio
  lexicon: BDAG
  rationale: La construcción acusa un objeto directo personal/covenantal; «a su pueblo» transmite la relación de pertenencia sin forzar literalismos.
theological_decisions:
- issue: Alcance de κρίνω en la cita de Deuteronomio
  english_pob_reading: '''The Lord will judge his people'' is kept with judicial force in a warning context, while leaving room for the source passage''s broader sense of vindication or punishment.'
  chosen_spanish_reading: «El Señor juzgará a su pueblo» mantiene el peso judicial de la cita sin reducirla a mera condena ni convertirla en solo vindicación.
  alternative_spanish_readings:
  - El Señor vindicará a su pueblo
  - El Señor hará justicia a su pueblo
  - El Señor juzgará y vindicará a su pueblo
  rationale: Hebreos usa la cita como advertencia seria. «Juzgará» preserva la tensión teológica del pasaje y no borra ni la posible vindicación del contexto original ni la severidad del contexto inmediato.
  doctrine_reference: Hebreos 10:30; Deuteronomio 32:35–36
- issue: Forma de la cita sobre la venganza divina
  english_pob_reading: '''Vengeance is mine; I will repay'' retains direct possessive force and solemn retribution.'
  chosen_spanish_reading: «Mía es la venganza; yo pagaré» reproduce la posesión enfática y la retribución divina con registro solemne.
  alternative_spanish_readings:
  - La venganza es mía; yo recompensaré
  - A mí pertenece la venganza; yo pagaré
  rationale: El dativo posesivo griego se refleja mejor con una construcción enfática en español. «Yo pagaré» evita un giro demasiado técnico y conserva la fuerza retributiva.
  doctrine_reference: Romanos 12:19; Deuteronomio 32:35
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés, que prefirió una formulación más directa y idiomática para la primera cita (“Vengeance is mine”) sin suavizar el marco judicial. La versión española refleja esa misma decisión: conserva la posesión enfática («Mía es la venganza») y mantiene «juzgará» en la segunda cita para no diluir la advertencia.'
  spanish_consistency_notes:
  - Se usa «Señor» en la cita bíblica para respetar la forma griega κύριος dentro del pasaje citado; no se introduce «Yahvé» en la cita porque aquí la frase funciona como formulación textual de Deuteronomio/LXX.
  - «Pueblo» se mantiene con valor covenantal, coherente con el griego λαός y con el uso bíblico del pasaje.
  - La puntuación reproduce dos citas separadas por «y otra vez», siguiendo el patrón retórico del original.
