revisions:
- from: a veces siendo públicamente expuestos a insultos y aflicciones[a], y otras veces haciéndose partícipes de los que eran tratados de ese modo[b].
  to: a veces siendo exhibidos públicamente a insultos y aflicciones[a], y otras veces haciéndose compañeros de los que eran tratados de ese modo[b].
  rationale: La revisión conserva todas las decisiones exegéticas del POB inglés, pero elimina calcos poco naturales. «Siendo exhibidos públicamente» refleja mejor θεατριζόμενοι en español, y «haciéndose compañeros de los que...» expresa con más claridad la solidaridad de κοινωνοὶ τῶν... sin perder fuerza. También se corrige la nota léxica para que sea gramatical y natural.
