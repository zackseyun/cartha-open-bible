translation:
  language: es
  text: a veces siendo exhibidos públicamente a insultos y aflicciones[a], y otras veces haciéndose compañeros de los que eran tratados de ese modo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más vívidamente, «siendo convertidos en espectáculo público».
    reason: lexical_alternative
  - marker: b
    text: O posiblemente, «de los que vivían / se conducían de ese modo»; el participio griego puede, en algunos contextos, referirse al modo de vida, aunque aquí el contexto de persecución favorece «de los que eran tratados de ese modo».
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο μὲν ... τοῦτο δὲ
  english_pob_choice: sometimes ... and at other times
  chosen_spanish: a veces ... y otras veces
  alternatives_spanish:
  - por una parte ... y por otra parte
  - unas veces ... y otras veces
  lexicon: BDAG
  rationale: La correlación del griego expresa dos aspectos alternantes de su experiencia. En español, «a veces ... y otras veces» reproduce esa alternancia de manera natural y fiel, sin endurecer la frase con un calco innecesario.
- source_word: ὀνειδισμοῖς
  english_pob_choice: insults
  chosen_spanish: insultos
  alternatives_spanish:
  - reproches
  - afrentas
  - oprobios
  lexicon: BDAG
  rationale: El término apunta a palabra ofensiva, vituperio o deshonra verbal. «Insultos» comunica bien el abuso verbal hostil en español actual y conserva el peso vergonzante del contexto.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - sufrimientos
  - angustias
  lexicon: BDAG
  rationale: La palabra designa presiones, penurias o sufrimientos causados por la persecución. «Aflicciones» mantiene la gravedad del término sin restringirlo demasiado.
- source_word: θεατριζόμενοι
  english_pob_choice: being publicly exposed
  chosen_spanish: siendo públicamente expuestos
  alternatives_spanish:
  - siendo exhibidos como espectáculo público
  - siendo hechos un espectáculo público
  - siendo públicamente humillados
  lexicon: BDAG
  rationale: El verbo evoca la imagen de ser mostrado ante otros como objeto de escarnio. «Siendo públicamente expuestos» conserva esa dimensión pública y degradante en un español claro; la imagen más vívida queda reflejada en la nota.
- source_word: κοινωνοὶ
  english_pob_choice: partners
  chosen_spanish: partícipes
  alternatives_spanish:
  - compañeros
  - socios
  - compañeros de sufrimiento
  lexicon: BDAG
  rationale: La palabra expresa participación o solidaridad real con la experiencia de otros. «Partícipes» comunica mejor esa participación compartida que «compañeros», que podría sonar meramente relacional.
- source_word: τῶν οὕτως ἀναστρεφομένων
  english_pob_choice: with those who were treated that way
  chosen_spanish: de los que eran tratados de ese modo
  alternatives_spanish:
  - de los que vivían de ese modo
  - de los que se conducían de ese modo
  lexicon: BDAG
  rationale: Aunque ἀναστρέφω suele significar «conducirse», en este contexto de persecución la lectura pasiva/relacional («eran tratados de ese modo») encaja mejor con los insultos y aflicciones mencionados. Se conserva la alternativa de conducta en la nota para no ocultar la ambigüedad léxica.
- source_word: γενηθέντες
  english_pob_choice: becoming
  chosen_spanish: haciéndose
  alternatives_spanish:
  - llegando a ser
  - habiéndose hecho
  lexicon: BDAG
  rationale: El participio aoristo expresa incorporación a una solidaridad. «Haciéndose» suena natural en la estructura coordinada del versículo y mantiene el sentido de entrada en una condición compartida.
theological_decisions:
- issue: Sentido de ἀναστρεφομένων en el contexto de persecución
  english_pob_reading: understood as referring to those being treated in the same persecuted manner
  chosen_spanish_reading: entendido como referencia a los que eran tratados de la misma manera en la persecución
  alternative_spanish_readings:
  - referencia a los que se conducían de ese modo
  - referencia a los que vivían de ese modo
  rationale: El contexto inmediato habla de insultos, aflicciones y exposición pública. Por eso, la traducción española preserva el énfasis en la solidaridad con perseguidos, no en una descripción moral de conducta. La alternativa de conducta se conserva porque el griego permite esa posibilidad, aunque aquí parece menos probable.
  doctrine_reference: Conservar la tensión exegética sin resolverla artificialmente
- issue: Valor de la estructura correlativa τοῦτο μὲν ... τοῦτο δὲ
  english_pob_reading: sometimes ... and at other times
  chosen_spanish_reading: a veces ... y otras veces
  alternative_spanish_readings:
  - por una parte ... y por otra parte
  - unas veces ... y otras veces
  rationale: No hay una cuestión doctrinal, pero sí una decisión de tono y énfasis. La versión española mantiene la alternancia experiencial sin volverla una fórmula demasiado abstracta o solemne.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el pasaje base con alta concordancia respecto de la revisión más reciente: no se introdujeron cambios sustantivos al sentido, y se mantuvo la ambigüedad documentada de ἀναστρεφομένων mediante nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto; este versículo no contiene el nombre divino.
  - Se prefirió «partícipes» sobre «socios» o «compañeros» por el valor de participación solidaria que exige κοινωνοὶ.
  - Se usó «siendo públicamente expuestos» para conservar el matiz de exhibición pública sin sobrecargar el texto principal.
  - La estructura «a veces ... y otras veces» refleja bien la correlación griega y suena natural en español bíblico contemporáneo.
