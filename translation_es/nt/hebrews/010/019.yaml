revisions:
- from: Por tanto, hermanos, teniendo confianza para entrar en el Lugar Santo[a], por la sangre de Jesús,
  to: Por tanto, hermanos[a], puesto que tenemos confianza para entrar en los lugares santos[b] por la sangre de Jesús,
  rationale: Se reubica la nota de inclusividad al término correcto («hermanos»). Se cambia «teniendo» por «puesto que tenemos» para un español más natural que preserve la fuerza lógica del participio. Se reemplaza «el Lugar Santo» por «los lugares santos» para reflejar mejor τῶν ἁγίων según la auditoría y evitar una especificación excesiva; se añade una nota con la alternativa contextual «el santuario».
