review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura básica del versículo, pero no preserva con suficiente precisión dos decisiones auditadas clave: τῶν ἁγίων se redujo a singular específico («el Lugar Santo») en vez de mantener el sentido más amplio cultual de «los lugares santos»/«el santuario», y la nota al pie [a] está anclada al sintagma equivocado, pues corresponde a ἀδελφοί, no a «Lugar Santo». Además, «teniendo confianza» suena menos natural en español que una subordinada causal y no refleja tan bien el valor exhortacional de Ἔχοντες en contexto.'
  spanish_quality_summary: El español es comprensible, pero «Por tanto, hermanos, teniendo confianza...» resulta algo trabado. «Lugar Santo» introduce una especificidad cultual que el griego no exige y puede evocar la primera estancia del tabernáculo, no simplemente el acceso a la presencia santa de Dios. Reubicar la nota de inclusividad y usar una formulación más fluida mejora fidelidad y legibilidad.
  glossary_alignment: Se mantiene correctamente «Jesús» y «hermanos». No hay conflicto con terminología mayor del proyecto. Sin embargo, la decisión sobre τῶν ἁγίων no sigue bien la auditoría inglesa, que prefirió «the holy places» con nota alternativa «the sanctuary»; en español conviene reflejar eso con «los lugares santos[a]» o «el santuario» en nota, no con «el Lugar Santo».
  issues:
  - severity: high
    issue: τῶν ἁγίων está traducido como «el Lugar Santo».
    rationale: El griego es plural y en Hebreos alude a la esfera cultual de la presencia de Dios. «El Lugar Santo» estrecha indebidamente el sentido y puede sugerir una sección concreta del tabernáculo. La auditoría inglesa prefirió «the holy places», con «the sanctuary» como alternativa.
  - severity: high
    issue: La nota [a] está anclada a «Lugar Santo» pero su contenido explica «hermanos».
    rationale: Esto produce una correspondencia incorrecta entre texto y nota. Según la evidencia y la auditoría, la nota debe ir con «hermanos».
  - severity: medium
    issue: «Por tanto, hermanos, teniendo confianza...» suena poco natural en español.
    rationale: Aunque formalmente refleja el participio, en contexto exhortacional español fluye mejor «puesto que tenemos» o similar, preservando el valor de base para la exhortación siguiente.
  - severity: medium
    issue: «confianza» atenúa un poco la fuerza de παρρησίαν.
    rationale: No es erróneo, pero «confianza» puede sonar más débil que la libertad valerosa del término. «Confianza» sigue siendo aceptable si el resto del verso mantiene claridad; «plena confianza» sería otra opción, pero no es necesario introducirla aquí.
  - severity: low
    issue: «para entrar» no refleja tan de cerca la revisión auditada «for entry into».
    rationale: No es una falla grave, pero «para entrar» convierte el sustantivo en infinitivo. «Para la entrada en» es más cercano aunque menos idiomático; «para entrar en» puede mantenerse si se corrige el resto del sintagma.
  revised_spanish_text: Por tanto, hermanos[a], puesto que tenemos confianza para entrar en los lugares santos[b] por la sangre de Jesús,
