    reason: lexical_alternative
  revision_rationale: Se reubica la nota de inclusividad al término correcto («hermanos»). Se cambia «teniendo» por «puesto que tenemos» para un español más natural que preserve la fuerza lógica del participio. Se reemplaza «el Lugar Santo» por «los lugares santos» para reflejar mejor τῶν ἁγίων según la auditoría y evitar una especificación excesiva; se añade una nota con la alternativa contextual «el santuario».
