translation:
  language: es
  text: Por tanto, hermanos[a], puesto que tenemos confianza para entrar en los lugares santos[b] por la sangre de Jesús,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse a toda la congregación de manera representativa.
    reason: lexical_alternative
  - marker: b
    text: O «el santuario»; la frase se refiere a los lugares santos de la presencia de Dios en el contexto de la imaginería del tabernáculo en Hebreos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες οὖν
  english_pob_choice: Therefore / since we have
  chosen_spanish: Por tanto, teniendo
  alternatives_spanish:
  - Así que, como tenemos
  - Por eso, puesto que tenemos
  lexicon: BDAG
  rationale: El participio con οὖν funciona como base e inferencia para la exhortación siguiente. En español, «Por tanto, teniendo» conserva la conexión lógica y el valor de fundamento sin forzar una subordinada causal demasiado explícita.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del vocativo griego. En español, «hermanos» es la correspondencia natural y conserva la posibilidad representativa de toda la congregación; «hermanos y hermanas» explicita inclusividad pero suaviza la forma del texto.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - denuedo
  lexicon: BDAG
  rationale: En Hebreos el término expresa libertad confiada ante Dios. «Confianza» comunica bien la idea en español moderno y evita una dureza innecesaria; «denuedo» sería más tradicional, pero menos natural aquí.
- source_word: εἰς τὴν εἴσοδον
  english_pob_choice: for entry into
  chosen_spanish: para entrar
  alternatives_spanish:
  - para la entrada en
  - para el acceso a
  lexicon: BDAG
  rationale: El griego presenta una construcción con εἰς + sustantivo de entrada/acceso. En español, «para entrar» reproduce la finalidad o habilitación del acceso con naturalidad; la frase «para la entrada en» sería más literal pero menos idiomática.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy places
  chosen_spanish: el Lugar Santo
  alternatives_spanish:
  - los lugares santos
  - el santuario
  lexicon: BDAG
  rationale: En Hebreos la expresión pertenece a la imaginería del tabernáculo y del acceso cultual a la presencia de Dios. «El Lugar Santo» conserva la referencia espacial/cultual sin leer «santos» como personas; «los lugares santos» sería más literal, pero en español puede sonar más genérico que el valor contextual del pasaje.
- source_word: ἐν τῷ αἵματι Ἰησοῦ
  english_pob_choice: by the blood of Jesus
  chosen_spanish: por la sangre de Jesús
  alternatives_spanish:
  - mediante la sangre de Jesús
  - a través de la sangre de Jesús
  lexicon: BDAG
  rationale: La preposición ἐν expresa medio o base de acceso. «Por la sangre de Jesús» es la formulación española más natural y mantiene la fuerza sacrificial y teológica del texto.
theological_decisions:
- issue: Alcance de τῶν ἁγίων
  english_pob_reading: cultic/spatial reference to the holy places of God's presence, not 'the saints'
  chosen_spanish_reading: referencia cultual/espacial al Lugar Santo, no a ‘los santos’
  alternative_spanish_readings:
  - el santuario
  - los santos
  - el Lugar Santísimo
  rationale: En el contexto de Hebreos, la frase alude al acceso a la esfera santa de la presencia de Dios dentro de la imaginería del tabernáculo. «Lugar Santo» evita la lectura de personas santas y no estrecha el término a un grado de especificidad que el griego no exige.
  doctrine_reference: Hebreos 9–10; filosofía de traducción §§1, 3, 5
- issue: Representación de ἀδελφοί
  english_pob_reading: retain 'brothers' in the main text with inclusivity noted in a footnote
  chosen_spanish_reading: retener la forma masculina plural ‘hermanos’ en el texto principal
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El griego usa el vocativo masculino plural y puede dirigirse representativamente a toda la congregación. El texto principal conserva esa forma, mientras que la nota puede aclarar su alcance inclusivo sin borrar la huella del original.
  doctrine_reference: Filosofía de traducción §4
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado en el audit trail inglés: la construcción de εἰς τὴν εἴσοδον se refleja mejor con «para entrar» que con una infinitiva pesada o una simple equivalencia nominal. También conserva el valor cultual de τῶν ἁγίων y la base sacrificial de ἐν τῷ αἵματι Ἰησοῦ.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se evita «SEÑOR» o sustituciones de máscara, ya que el versículo nombra explícitamente a Jesús y no usa κύριος.
  - «Lugar Santo» se usa como equivalente culto y espacial; no se traduce como «santos» para no confundir personas con lugar.
  - «Confianza» se eligió por claridad y dignidad en español contemporáneo, preservando la idea de παρρησία sin perder la reverencia del contexto.
