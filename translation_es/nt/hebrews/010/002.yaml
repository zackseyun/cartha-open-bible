    issue: 'Expresión poco natural: «ya no tendrían más conciencia de pecados»'
    rationale: En español estándar, «ya no» ya expresa el cese; añadir «más» produce redundancia innecesaria y fraseo menos elegante. «Ya no tendrían conciencia de pecados» comunica mejor el valor de ἔτι.
