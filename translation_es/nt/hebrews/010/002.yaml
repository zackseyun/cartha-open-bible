translation:
  language: es
  text: De otro modo[a], ¿no habrían dejado de ofrecerse, ya que los adoradores, una vez purificados[b], ya no tendrían conciencia de pecados?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no fuera así». La expresión griega introduce una inferencia contraria a los hechos desde el argumento anterior.
    reason: alternative_reading
  - marker: b
    text: O «una vez para siempre purificados». El adverbio ἅπαξ puede implicar una purificación definitiva e irrepetible en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: Otherwise
  chosen_spanish: De otro modo
  alternatives_spanish:
  - Entonces
  - De lo contrario
  lexicon: BDAG
  rationale: En este contexto inferencial y contrafactual, ἐπεὶ introduce una consecuencia lógica desde el argumento anterior. «De otro modo» conserva esa relación sin sonar demasiado rígido en español.
- source_word: οὐκ ἂν ἐπαύσαντο
  english_pob_choice: would they not have ceased to be offered
  chosen_spanish: ¿no habrían dejado de ofrecerse?
  alternatives_spanish:
  - ¿no habrían cesado de ofrecerse?
  - ¿no se habrían detenido las ofrendas?
  lexicon: BDAG
  rationale: La combinación contrafactual con ἄν y el aoristo medio pide una pregunta retórica en pasado hipotético. «Habrían dejado de ofrecerse» preserva el valor verbal y suena natural en español.
- source_word: προσφερόμεναι
  english_pob_choice: being offered
  chosen_spanish: ofrecerse
  alternatives_spanish:
  - ser ofrecidas
  - ser presentadas como ofrendas
  lexicon: BDAG
  rationale: El participio presente pasivo se refiere a las ofrendas sacrificiales del contexto. El reflexivo impersonal «ofrecerse» comunica bien la acción cultual sin sobrecargar la frase.
- source_word: μηδεμίαν ἔχειν ἔτι
  english_pob_choice: would no longer have any
  chosen_spanish: ya no tendrían más
  alternatives_spanish:
  - no seguirían teniendo
  - ya no tendrían ninguna
  lexicon: BDAG
  rationale: «ἔτι» expresa continuación que cesa; por eso «ya no» transmite mejor la idea de una condición permanente que termina.
- source_word: συνείδησιν ἁμαρτιῶν
  english_pob_choice: consciousness of sins
  chosen_spanish: conciencia de pecados
  alternatives_spanish:
  - conciencia de pecado
  - consciencia de pecados
  - conocimiento de pecados
  lexicon: BDAG
  rationale: La expresión puede referir conciencia moral, conciencia culpable o consciencia de pecado. «Conciencia de pecados» mantiene el plural del genitivo y deja visible la tensión semántica que el contexto de Hebreos resuelve hacia una conciencia de culpa ante Dios.
- source_word: τοὺς λατρεύοντας
  english_pob_choice: the worshipers
  chosen_spanish: los que adoran
  alternatives_spanish:
  - los adoradores
  - los que sirven en culto
  lexicon: BDAG
  rationale: El participio sustantivado designa a quienes realizan el culto. «Los que adoran» conserva el sentido verbal y evita una terminología más eclesiástica que el griego no exige.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una vez para siempre
  - una vez y para siempre
  lexicon: BDAG
  rationale: El adverbio indica un acto único. En español, «una vez» es suficiente en el texto principal; la posible fuerza de definitividad queda sugerida por el contexto y por la nota.
- source_word: κεκαθαρισμένους
  english_pob_choice: having once been cleansed
  chosen_spanish: una vez purificados
  alternatives_spanish:
  - habiendo sido purificados una vez
  - una vez limpiados
  - purificados una vez para siempre
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una purificación completada con efecto vigente. «Una vez purificados» conserva la forma compacta y deja abierta la fuerza perfectiva, que se aclara en la nota.
theological_decisions:
- issue: Cómo rendir συνείδησιν ἁμαρτιῶν sin borrar la idea de culpa continua
  english_pob_reading: ‘consciousness of sins’ refers to the continuing sense of guilt before God.
  chosen_spanish_reading: «conciencia de pecados» sugiere una conciencia culpable o de pecado persistente ante Dios, no una ausencia de sensibilidad moral.
  alternative_spanish_readings:
  - conciencia del pecado
  - consciencia de pecados
  - sentido de culpa por los pecados
  rationale: Hebreos 10:2 argumenta que un sacrificio eficaz habría terminado la necesidad repetida de ofrendas porque los adoradores ya no permanecerían bajo conciencia de pecado. La formulación española conserva la ambigüedad léxica suficiente para no borrar el matiz teológico de culpa ante Dios.
  doctrine_reference: Hebreos 10:2; Translation philosophy §3, §6
- issue: Valor de ἅπαξ junto con el perfecto pasivo κεκαθαρισμένους
  english_pob_reading: ‘once’ may carry a definitive, unrepeatable sense in this context.
  chosen_spanish_reading: «una vez purificados» preserva la acción única; la lectura definitiva se entiende por el contexto sacrificial.
  alternative_spanish_readings:
  - purificados una vez para siempre
  - purificados de una vez
  - purificados una sola vez
  rationale: El griego combina un adverbio de unicidad con un participio perfecto, lo cual sugiere una purificación completada con efectos permanentes. El español principal no fuerza la expansión «para siempre», pero la reconoce como posibilidad contextual.
  doctrine_reference: Hebreos 10:2; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del audit trail inglés: se prefirió una formulación formal y natural para el valor contrafactual de οὐκ ἂν ἐπαύσαντο, se mantuvo la lógica inferencial de ἐπεὶ, y se conservó la ambigüedad productiva de συνείδησις ἁμαρτιῶν sin resolverla prematuramente. También se respetó la tensión entre ἅπαξ y el perfecto pasivo κεκαθαρισμένους mediante una traducción principal breve más una nota que explicita la posible fuerza definitiva.'
  spanish_consistency_notes:
  - Se mantuvo «conciencia» en lugar de «consciencia» por uniformidad terminológica y por ser la forma más común en registros bíblicos modernos.
  - «Los que adoran» conserva el sentido participial sin imponer una categoría cultual más técnica que el griego no exige.
  - La construcción «una vez purificados» deja el efecto perfectivo al contexto, coherente con el estilo POB de no sobreexplicar en el texto principal.
