  spanish_quality_summary: El texto es claro y mayormente fiel, pero requiere un ajuste menor para mayor naturalidad y dignidad en español bíblico contemporáneo. «De otro modo» funciona, y «dejado de ofrecerse» es aceptable, aunque «cesado de ofrecerse» también sería posible. La mejora principal es cambiar «los que adoran» por «los adoradores» o «los que rinden culto», y simplificar «ya no tendrían más» a «ya no tendrían».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Purificados» para κεκαθαρισμένους es adecuado en contexto cultual. «Conciencia de pecados» sigue la decisión inglesa y conserva el matiz teológico. La única observación es estilística-contextual: τοὺς λατρεύοντας en Hebreos se refiere a los participantes del culto; «los adoradores» expresa mejor ese valor sustantivado que «los que adoran».'
  issues:
