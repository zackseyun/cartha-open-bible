    text: Or 'conscience of sins.' The Greek expression can denote conscience, awareness, or consciousness of sins; here it refers to the continuing sense of guilt before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'once for all been cleansed.' The adverb 'once' may carry a definitive, unrepeatable sense in this context.
    reason: lexical_alternative
