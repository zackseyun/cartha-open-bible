translation:
  language: es
  text: Porque tienen necesidad de perseverancia, para que, después de haber hecho la voluntad de Dios, reciban la promesa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, "lo prometido".
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπομονῆς
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - resistencia
  - paciencia perseverante
  lexicon: BDAG
  rationale: ὑπομονή expresa permanecer firme bajo presión. En español, 'perseverancia' comunica bien la idea de constancia sostenida en la prueba sin sonar forzado; 'endurance' como calco no sería natural.
- source_word: χρείαν ἔχετε
  english_pob_choice: you have need of
  chosen_spanish: tienen necesidad de
  alternatives_spanish:
  - necesitan
  - les hace falta
  lexicon: BDAG
  rationale: La construcción idiomática griega χρείαν ἔχειν pide una equivalencia natural. 'Tienen necesidad de' conserva el matiz formal de necesidad expresada en el texto fuente.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: ἵνα introduce propósito. 'Para que' es la forma más clara y natural en español para expresar el resultado deseado.
- source_word: τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: the will of God
  chosen_spanish: la voluntad de Dios
  alternatives_spanish:
  - el querer de Dios
  lexicon: BDAG
  rationale: '''La voluntad de Dios'' es la equivalencia directa y transparente de la construcción genitiva, y mantiene el registro bíblico sin archaismos innecesarios.'
- source_word: ποιήσαντες
  english_pob_choice: after doing
  chosen_spanish: después de haber hecho
  alternatives_spanish:
  - habiendo hecho
  - tras hacer
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. 'Después de haber hecho' preserva con claridad la anterioridad temporal sin perder naturalidad en español.
- source_word: κομίσησθε
  english_pob_choice: you may receive
  chosen_spanish: obtengan
  alternatives_spanish:
  - reciban
  - consigan
  lexicon: BDAG
  rationale: κομίζω aquí significa recibir u obtener lo prometido. 'Obtengan' refleja el logro de aquello que se espera y mantiene el sentido de recibir como resultado.
- source_word: τὴν ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  - la cosa prometida
  lexicon: BDAG
  rationale: '''La promesa'' preserva la formulación del griego y deja abierta la tensión interpretativa documentada por el POB entre la promesa misma y lo prometido.'
theological_decisions:
- issue: Si ἐπαγγελίαν debe entenderse como la promesa misma o como lo prometido / su cumplimiento
  english_pob_reading: the promise
  chosen_spanish_reading: la promesa
  alternative_spanish_readings:
  - lo prometido
  - el cumplimiento prometido
  rationale: El griego permite ambas lecturas en contexto. La redacción principal mantiene 'la promesa' para no resolver indebidamente la tensión; así se conserva el potencial de referirse tanto a la promesa como a su contenido prometido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto español junto a la expresión correspondiente, de modo que la nota quede anclada correctamente.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de θεός como 'Dios'.
  - Se tradujo ὑπομονή con 'perseverancia' para un español natural y fiel al matiz de constancia bajo presión.
  - Se preservó la tensión semántica de ἐπαγγελία con 'la promesa' en el texto principal, dejando la alternativa en nota.
  - El orden y la relación causal-final se reflejan con 'Porque... para que...' sin añadir contenido no sustentado por el griego.
