revisions:
- from: Porque tienen necesidad de perseverancia[a], para que, después de haber hecho la voluntad de Dios, obtengan la promesa.
  to: Porque tienen necesidad de perseverancia, para que, después de haber hecho la voluntad de Dios, reciban la promesa[a].
  rationale: Se cambia 'obtengan' por 'reciban' para alinearse mejor con κομίσησθε y con la decisión léxica del POB en inglés, preservando mejor la idea de recibir más que conseguir. Se mantiene 'perseverancia' y la estructura general, que ya eran fieles y naturales. La nota se conserva, pero con formato español más claro, y se ancla directamente en 'la promesa' por ser el término al que ofrece alternativa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: ὑπομονῆς γὰρ ἔχετε χρείαν = ''tienen necesidad de perseverancia''; ἵνα introduce propósito; ποιήσαντες se expresa correctamente con anterioridad temporal; τὴν ἐπαγγελίαν se mantiene como ''la promesa'' con nota alternativa apropiada. La única debilidad relevante es que ''obtengan'' para κομίσησθε se aleja un poco del matiz más directo de ''recibir''.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. Sin embargo, 'reciban' suena más fiel y más idiomático en este contexto que 'obtengan'. También conviene ajustar el formato de la nota al estilo normal de español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' está correcto; no aparecen términos sensibles como Yahvé/Mesías/esclavo. 'Perseverancia' es una opción válida para ὑπομονή, aunque 'constancia' o 'resistencia' también serían posibles; no requiere cambio.
  issues:
  - severity: medium
    issue: '''obtengan'' para κομίσησθε'
    rationale: El inglés auditado eligió 'receive' y la razón léxica destaca 'recibir' como la opción más clara. 'Obtener' puede sugerir logro o consecución más que recepción, mientras que el contexto enfatiza recibir la promesa tras hacer la voluntad de Dios.
  - severity: low
    issue: Formato de la nota al pie
    rationale: 'La nota ''O: ''''lo prometido''''.'' comunica bien la alternativa, pero su puntuación/comillas es torpe. Una forma como ''O, “lo prometido”.'' es más limpia y legible en español.'
  revised_spanish_text: Porque tienen necesidad de perseverancia, para que, después de haber hecho la voluntad de Dios, reciban la promesa[a].
