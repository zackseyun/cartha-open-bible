review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue la decisión inglesa de conservar la sintaxis participial: «Esta es la alianza… dice el Señor: poniendo… y… escribiré». También preserva correctamente διαθήκη como «alianza», πρὸς αὐτούς como «con ellos», y νόμους en plural. Sin embargo, la frase final no representa bien αὐτούς, porque en griego el pronombre retoma «mis leyes» y el español debe mantener ese referente explícito o anafórico sin romper la gramática. «sobre sus mentes las escribiré» suena marcado y algo torpe; además, la nota alternativa cambia indebidamente el participio a presente indicativo («pongo»), cuando la alternativa inglesa suaviza a futuro («I will put … and I will write …»).'
  spanish_quality_summary: La redacción es generalmente digna y comprensible, pero presenta una torpeza sintáctica en «sobre sus mentes[a] las escribiré». En español natural y claro, es mejor «y las escribiré sobre sus mentes» o, más fluidamente, «pondré… y las escribiré…» en nota. También conviene ajustar la nota para que realmente sea una alternativa más fluida en español sin alterar el tiempo verbal de manera injustificada. El resto del verso es legible y de registro bíblico adecuado.
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: «alianza» para διαθήκη es defendible y bien justificada; «el Señor» para κύριος aquí es aceptable dado que el texto inmediato es griego κύριος y la justificación lo explica. «Leyes», «corazones» y «mentes» siguen el audit trail. No hay conflicto serio con los defaults del glosario, pero sí una mejora idiomática necesaria en la colocación del clítico y en la nota alternativa.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en «sobre sus mentes las escribiré»
    rationale: 'Aunque no es imposible, en español contemporáneo suena forzado y distrae. El griego permite una estructura marcada, pero el español puede preservar el sentido y la relación anafórica con una formulación más natural: «y las escribiré sobre sus mentes».'
  - severity: medium
    issue: La nota al pie no corresponde bien a la alternativa inglesa auditada
    rationale: La nota dice «pongo mis leyes…», cambiando a presente, mientras la alternativa inglesa suaviza la construcción participial a dos futuros. Eso altera el valor verbal documentado y debe corregirse a «pondré… y las escribiré…».
  revised_spanish_text: 'Esta es la alianza que haré con ellos después de aquellos días, dice el Señor: poniendo mis leyes sobre sus corazones, y las escribiré sobre sus mentes[a].'
  revised_footnotes:
  - marker: a
    text: 'O, de manera más fluida en español: «pondré mis leyes sobre sus corazones, y las escribiré sobre sus mentes».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden de palabras para un español más natural sin perder la estructura participio + futuro del griego ni la anáfora a «mis leyes». También se corrige la nota alternativa para que suavice la sintaxis en español de manera fiel al audit trail inglés, manteniendo ambos verbos en futuro.
