translation:
  language: es
  text: 'Esta es la alianza que haré con ellos después de aquellos días, dice el Señor: poniendo mis leyes sobre sus corazones, y las escribiré sobre sus mentes[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más fluida en español: «pondré mis leyes sobre sus corazones, y las escribiré sobre sus mentes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: alianza
  alternatives_spanish:
  - pacto
  - testamento
  lexicon: BDAG
  rationale: En Hebreos, διαθήκη cita el marco de Jeremías y tiene sentido de acuerdo pactal. En español, "alianza" comunica bien esa relación establecida por Dios y evita el sentido funerario de "testamento". "Pacto" sería posible, pero "alianza" conserva mejor el carácter relacional del término sin sonar arcaico.
- source_word: διαθήσομαι
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - estableceré
  - concertaré
  lexicon: BDAG
  rationale: El futuro medio de διατίθεμαι en contexto de alianza expresa la acción de pactar o establecer. "Haré" sigue de cerca el valor verbal sin sonar forzado en español y encaja naturalmente con "alianza".
- source_word: πρὸς αὐτούς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para con ellos
  - hacia ellos
  lexicon: BDAG
  rationale: En un contexto de alianza, πρός con personas se entiende como relación bilateral. "Con ellos" es la equivalencia más natural en español y conserva la idea de trato pactal.
- source_word: μετὰ τὰς ἡμέρας ἐκείνας
  english_pob_choice: after those days
  chosen_spanish: después de aquellos días
  alternatives_spanish:
  - tras aquellos días
  - después de esos días
  lexicon: BDAG
  rationale: La frase temporal se mantiene de forma directa y natural. "Aquellos días" preserva la distancia temporal y el eco profético de la cita de Jeremías.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - el Dueño
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere Yahvé para יהוה, aquí el texto griego cita κύριος. En español, "el Señor" reproduce con fidelidad la forma citada y mantiene el tono bíblico de la fórmula introductoria.
- source_word: διδοὺς
  english_pob_choice: putting
  chosen_spanish: poniendo
  alternatives_spanish:
  - dando
  - colocando
  lexicon: BDAG
  rationale: El participio introduce la acción concomitante del pacto. "Poniendo" conserva el matiz de colocar leyes sobre el corazón y evita una traducción demasiado abstracta.
- source_word: νόμους
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - normas
  - mandamientos
  lexicon: BDAG
  rationale: El plural debe preservarse. "Leyes" mantiene el vínculo léxico con νόμος y con la cita de Jeremías, sin suavizar la fuerza jurídica del término.
- source_word: ἐπὶ καρδίας αὐτῶν
  english_pob_choice: upon their hearts
  chosen_spanish: sobre sus corazones
  alternatives_spanish:
  - en sus corazones
  - en lo íntimo de sus corazones
  lexicon: BDAG
  rationale: ἐπί con acusativo conserva una imagen espacial/metafórica de colocación. "Sobre sus corazones" mantiene esa imagen y queda natural en español.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mentes
  alternatives_spanish:
  - entendimiento
  - mente
  lexicon: BDAG
  rationale: διάνοια apunta a la facultad de pensamiento/entendimiento. En español, el plural "mentes" respeta el plural implícito en αὐτῶν y corresponde a la revisión observada en el audit trail inglés.
- source_word: ἐπιγράψω
  english_pob_choice: I will write
  chosen_spanish: escribiré
  alternatives_spanish:
  - inscribiré
  - grabaré
  lexicon: BDAG
  rationale: El verbo futuro significa escribir o inscribir sobre una superficie. "Escribiré" es claro y fiel; el contexto ya expresa la superficie mediante la preposición sobre.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - ellas
  - los
  lexicon: BDAG
  rationale: El pronombre retomado por el verbo se refiere a "mis leyes" (νόμους). En español, el objeto directo femenino plural debe concordar con "leyes"; por eso se explicita con "las" para preservar la anáfora de forma idiomática.
theological_decisions:
- issue: Forma de la cita profética y relación entre corazón y mente
  english_pob_reading: Retain the participial construction ('putting my laws upon their hearts') followed by the finite future ('I will write them on their minds')
  chosen_spanish_reading: Mantener el participio "poniendo" seguido del futuro "escribiré", con "sobre sus corazones" y "sobre sus mentes"
  alternative_spanish_readings:
  - '"Pondré mis leyes en sus corazones, y las escribiré en sus mentes"'
  - '"pondré mis leyes sobre sus corazones, y escribiré esas leyes en sus mentes"'
  rationale: El griego de Hebreos presenta una construcción participial que conviene preservar para no armonizarla prematuramente con una forma más lisa. Además, la pluralidad de "mentes" respeta el plural del pronombre griego y evita borrar un matiz textual documentado en la revisión inglesa.
  doctrine_reference: 'Principio POB: primacía del texto original y conservación de tensiones y matices cuando el griego los muestra, en lugar de suavizarlos por tradición de lectura.'
translation_notes:
  revision_awareness: El texto inglés pasó de "their mind" a "their minds" para concordar con el plural griego αὐτῶν. En español, eso se refleja explícitamente con "sus mentes" y con la concordancia femenina plural "las" para νόμους. También se conservó la estructura participial de la frase profética, sin armonizarla a una forma más uniforme.
  spanish_consistency_notes:
  - Se emplea "alianza" para διαθήκη, consistente con el sentido pactal en Hebreos.
  - Se traduce κύριος como "el Señor" porque el texto griego cita esa forma; no se sustituye por Yahvé en esta cita explícita.
  - Se mantiene el plural de "leyes" y de "mentes" para no borrar el número griego y para seguir la revisión auditada.
  - La nota al pie ofrece una alternativa más fluida sin cambiar el sentido básico.
