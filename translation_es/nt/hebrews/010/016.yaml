  to: 'Esta es la alianza que haré con ellos después de aquellos días, dice el Señor: poniendo mis leyes sobre sus corazones, y las escribiré sobre sus mentes[a].'
  rationale: Se ajusta el orden de palabras para un español más natural sin perder la estructura participio + futuro del griego ni la anáfora a «mis leyes». También se corrige la nota alternativa para que suavice la sintaxis en español de manera fiel al audit trail inglés, manteniendo ambos verbos en futuro.
