translation:
  language: es
  text: y de sus pecados y de sus actos inicuos[b] no me acordaré más[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «ciertamente no me acordaré más de sus pecados y de sus actos inicuos».'
    reason: lexical_alternative
  - marker: b
    text: «Actos inicuos» traduce ἀνομίαι; también puede expresarse como «actos sin ley» o, tradicionalmente, «iniquidades».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conserva la coordinación simple del texto griego y del inglés de referencia. En español, 'y' es la forma natural aquí; 'e' no es necesario porque la siguiente palabra no lo exige por fonética.
- source_word: τῶν ἁμαρτιῶν αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus errores
  - sus faltas
  lexicon: BDAG
  rationale: ἁμαρτίαι se rinde de manera directa como 'pecados', que es fiel y claramente comprensible en español bíblico contemporáneo. 'Faltas' o 'errores' atenúan el peso moral del término.
- source_word: καὶ τῶν ἀνομιῶν αὐτῶν
  english_pob_choice: and their lawless deeds
  chosen_spanish: y de sus iniquidades
  alternatives_spanish:
  - y de sus actos sin ley
  - y de sus obras de maldad
  lexicon: BDAG
  rationale: ἀνομίαι nombra actos caracterizados por la falta de ley o por el quebrantamiento de la ley; en español, 'iniquidades' mantiene una equivalencia tradicional y sobria que preserva la gravedad del término. Se evita 'actos sin ley' por sonar poco natural; 'obras de maldad' desplaza el matiz legal.
- source_word: οὐ μὴ μνησθήσομαι ἔτι
  english_pob_choice: I will no longer remember
  chosen_spanish: no me acordaré más
  alternatives_spanish:
  - no recordaré nunca más
  - ya no recordaré
  lexicon: BDAG
  rationale: La negación enfática con futuro expresa una decisión firme de no recordar en sentido pactual. 'No me acordaré más' comunica bien el valor idiomático en español y conserva la idea de 'no recordar' sin sugerir amnesia literal. 'Ya no recordaré' sería posible, pero menos idiomático aquí.
theological_decisions:
- issue: No-remembranza divina en sentido pactual
  english_pob_reading: 'God''s covenantal refusal to hold sins against his people: ''I will no longer remember their sins and their lawless deeds.'''
  chosen_spanish_reading: La frase se vierte como una promesa de no traerlos de nuevo a la cuenta, manteniendo el verbo 'acordarse' sin convertirlo en un mero olvido psicológico.
  alternative_spanish_readings:
  - no me acordaré más de sus pecados y de sus iniquidades
  - no los volveré a recordar
  rationale: Hebreos cita la promesa divina de perdón con el lenguaje bíblico de recordar/no recordar. En español conviene conservar 'acordarse' para no borrar el trasfondo pactual del original. La expresión no pretende enseñar pérdida de omnisciencia, sino una decisión divina de no volver a tratar esos pecados como vigentes.
  doctrine_reference: Jeremías 31:34; Hebreos 8:12; preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alto acuerdo: el sentido central es una promesa divina de no recordar ya los pecados y las acciones de iniquidad. La redacción española mantiene la negación enfática, conserva el paralelismo de dos grupos de culpa y evita suavizar ἀνομίαι a un término menos jurídico-moral.'
  spanish_consistency_notes:
  - Se mantiene 'pecados' para ἁμαρτίαι y 'iniquidades' para ἀνομίαι, diferenciando ambos términos como en el original.
  - 'Se preserva el orden coordinado del griego y del inglés: primero ''pecados'', luego ''iniquidades''.'
  - '''No me acordaré más'' refleja el valor de οὐ μὴ ... ἔτι con naturalidad española, sin perder la fuerza de la negación.'
  - La mayúscula inicial no se usa porque el fragmento depende del contexto previo de la cita en la sección.
