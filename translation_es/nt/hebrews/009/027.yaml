translation:
  language: es
  text: Así como a las personas les está establecido morir una sola vez[a], y después de esto, el juicio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a los hombres' o 'a los seres humanos'; el griego usa un plural masculino con fuerza genérica para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ὅσον
  english_pob_choice: just as
  chosen_spanish: y así como
  alternatives_spanish:
  - puesto que
  - en la medida en que
  - tal como
  lexicon: BDAG
  rationale: La frase introduce una comparación con lo que sigue en el versículo inmediato, por lo que 'y así como' conserva la función comparativa sin sonar forzado en español.
- source_word: ἀπόκειται
  english_pob_choice: it is appointed
  chosen_spanish: les está establecido
  alternatives_spanish:
  - les está reservado
  - les está dispuesto
  - está decretado
  lexicon: BDAG
  rationale: '''Establecido'' comunica una realidad fijada o determinada sin cargar innecesariamente el verso con un matiz más técnico o fatalista que el contexto no exige.'
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: for men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: El griego usa un plural masculino con fuerza genérica para la humanidad. Se mantiene 'a los hombres' como forma representativa y de cadencia natural; la nota preserva la alternativa inclusiva.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una sola vez
  alternatives_spanish:
  - una vez
  - solo una vez
  - por única vez
  lexicon: BDAG
  rationale: '''Una sola vez'' explicita el valor de singularidad de la muerte humana en este contexto sin añadir la idea de ''una vez para siempre'', que sería demasiado fuerte aquí.'
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - fallecer
  - morir una vez
  lexicon: BDAG
  rationale: El infinitivo simple se expresa de manera directa con 'morir', que es claro y fiel al sentido básico del verbo.
- source_word: μετὰ δὲ τοῦτο
  english_pob_choice: and after this
  chosen_spanish: y después de esto
  alternatives_spanish:
  - y luego de esto
  - y tras esto
  - después de esto
  lexicon: BDAG
  rationale: La secuencia temporal queda natural y precisa en español con 'y después de esto'.
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - el juicio divino
  - la sentencia
  - la evaluación
  lexicon: BDAG
  rationale: '''Juicio'' preserva el sentido judicial amplio de κρiσις sin restringirlo a ''condenación'' ni explicitar más de lo que el texto dice.'
theological_decisions:
- issue: Referencia genérica de ἀνθρώποις
  english_pob_reading: Rendered as 'men' with generic force referring to humanity
  chosen_spanish_reading: Se mantiene 'a los hombres' con sentido genérico para la humanidad
  alternative_spanish_readings:
  - a las personas
  - a los seres humanos
  rationale: El griego es masculino plural con valor genérico; la traducción conserva la forma del original y la nota deja visible la alternativa inclusiva para evitar una lectura exclusivamente masculina.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Alcance de κρίσις después de la muerte
  english_pob_reading: Rendered simply as 'judgment' without specifying condemnation or a particular eschatological scheme
  chosen_spanish_reading: Se traduce como 'el juicio' sin precisar condenación o un esquema escatológico particular
  alternative_spanish_readings:
  - la condenación
  - el juicio final
  rationale: El verso afirma un juicio posterior a la muerte, pero no define aquí su desenlace ni su desarrollo doctrinal completo; la traducción conserva esa tensión.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no eran necesarios cambios; esta versión conserva esa lectura y ajusta el español para mayor naturalidad sin alterar el contenido del griego ni la auditabilidad del razonamiento.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se evitó 'Cristo' porque no hay Χριστός en el versículo.
  - '''Juicio'' mantiene el valor judicial general de κρίσις y no se especifica condenación.'
  - La nota [a] preserva la alternativa inclusiva correspondiente al plural genérico griego.
