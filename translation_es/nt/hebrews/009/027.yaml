revisions:
- from: Y así como a los hombres les está establecido morir una sola vez[a], y después de esto, el juicio,
  to: Así como a las personas les está establecido morir una sola vez[a], y después de esto, el juicio,
  rationale: 'Se hacen dos ajustes menores para mejorar la naturalidad y la legibilidad en español sin apartarse del sentido del griego ni del análisis del POB inglés: se elimina la conjunción inicial innecesaria (''Así como''), y se usa ''a las personas'' como equivalente genérico más claro de τοῖς ἀνθρώποις en español contemporáneo, conservando en nota la alternativa más formal ''a los hombres''. No se altera ninguna decisión teológica ni lexical sustantiva.'
