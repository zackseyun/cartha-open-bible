    text: Or 'at the end of the ages.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the removal of sin' or 'for the annulment of sin.'
    reason: lexical_alternative
  - marker: c
    text: Or 'through his sacrifice.' The Greek more literally reads 'through the sacrifice of himself.'
    reason: lexical_alternative
