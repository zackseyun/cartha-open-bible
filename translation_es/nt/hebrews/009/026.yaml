revisions:
- from: De otro modo[a], le habría sido necesario padecer muchas veces desde la fundación del mundo. Pero, en realidad[c][b], una sola vez, en la consumación de los siglos, se ha manifestado para quitar el pecado mediante el sacrificio de sí mismo.
  to: De otro modo, le habría sido necesario padecer muchas veces desde la fundación del mundo. Pero ahora, una vez para siempre, en la consumación de los siglos[a], se ha manifestado para quitar el pecado[b] mediante el sacrificio de sí mismo[c].
  rationale: 'Se fortaleció ἅπαξ a «una vez para siempre» para reflejar mejor la fuerza definitiva del sacrificio en Hebreos. Se cambió «Pero, en realidad» a «Pero ahora» para una transición más directa y natural de νυνὶ δὲ. Sobre todo, se recolocaron las notas al lugar exacto al que corresponden según el griego y el audit trail: [a] en «consumación de los siglos», [b] en «quitar el pecado» y [c] en «sacrificio de sí mismo».'
  reviewer_model: gpt-5.4
