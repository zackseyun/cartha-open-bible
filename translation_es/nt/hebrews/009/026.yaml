translation:
  language: es
  text: De otro modo, le habría sido necesario padecer muchas veces desde la fundación del mundo. Pero ahora, una vez para siempre, en la consumación de los siglos[a], se ha manifestado para quitar el pecado[b] mediante el sacrificio de sí mismo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al final de los siglos».
    reason: lexical_alternative
  - marker: b
    text: O «para la remoción del pecado» o «para la anulación del pecado».
    reason: lexical_alternative
  - marker: c
    text: 'O «mediante su sacrificio». El griego dice más literalmente: «mediante el sacrificio de sí mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: Otherwise
  chosen_spanish: De otro modo
  alternatives_spanish:
  - De lo contrario
  - Si no fuera así
  lexicon: BDAG
  rationale: En el argumento contrafactual, la frase introduce la consecuencia de un escenario hipotético; «De otro modo» conserva esa fuerza inferencial sin sonar mecánico en español.
- source_word: ἔδει
  english_pob_choice: would have had to
  chosen_spanish: le habría sido necesario
  alternatives_spanish:
  - habría tenido que
  - habría debido
  lexicon: BDAG
  rationale: El imperfecto de δεῖ expresa necesidad hipotética en un marco pasado; «le habría sido necesario» reproduce con claridad esa idea de necesidad condicionada.
- source_word: πολλάκις
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - repetidamente
  lexicon: BDAG
  rationale: Mantiene el contraste numérico y repetitivo con ἅπαξ más adelante.
- source_word: παθεῖν
  english_pob_choice: to suffer
  chosen_spanish: padecer
  alternatives_spanish:
  - sufrir
  - experimentar sufrimiento
  lexicon: BDAG
  rationale: «Padecer» conserva el peso de πάσχω en un contexto de pasión/sacrificio y suena natural en español bíblico contemporáneo.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: since the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde la creación del mundo
  - a partir de la fundación del mundo
  lexicon: BDAG
  rationale: La locución idiomática se conserva de forma directa y transparente, con el valor temporal continuo del griego.
- source_word: νυνὶ δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero, en realidad
  alternatives_spanish:
  - pero ahora
  - pero de hecho
  lexicon: BDAG
  rationale: La expresión marca el contraste entre el escenario hipotético y la situación real; «en realidad» hace explícita la fuerza argumentativa del contraste sin añadir contenido.
- source_word: ἅπαξ
  english_pob_choice: once for all
  chosen_spanish: una sola vez
  alternatives_spanish:
  - una vez para siempre
  - de una vez y para siempre
  lexicon: BDAG
  rationale: «Una sola vez» conserva la singularidad enfática del adverbio; el contexto sacrificial y el contraste con «muchas veces» permiten entender su carácter definitivo sin sobrecargar el estilo.
- source_word: ἐπὶ συντελείᾳ τῶν αἰώνων
  english_pob_choice: at the consummation of the ages
  chosen_spanish: en la consumación de los siglos
  alternatives_spanish:
  - al final de los siglos
  - en el fin de las edades
  lexicon: BDAG
  rationale: Se mantiene la densidad escatológica de συντέλεια y el plural de αἰώνων; «siglos» refleja la expresión tradicional en español sin perder el sentido de culminación.
- source_word: εἰς ἀθέτησιν ἁμαρτίας
  english_pob_choice: to put away sin
  chosen_spanish: para quitar el pecado
  alternatives_spanish:
  - para la remoción del pecado
  - para anular el pecado
  lexicon: BDAG
  rationale: ἀθέτησις puede implicar quitar, anular o abolir; «quitar el pecado» comunica de manera idiomática y fiel el efecto decisivo de la obra de Cristo. Se preserva el singular «pecado» como realidad colectiva/abstracta.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecados
  lexicon: BDAG
  rationale: El singular griego se conserva como abstracto colectivo, no como plural de actos individuales, para no estrechar el alcance teológico del texto.
- source_word: διὰ τῆς θυσίας αὐτοῦ
  english_pob_choice: through the sacrifice of himself
  chosen_spanish: mediante el sacrificio de sí mismo
  alternatives_spanish:
  - por medio de su sacrificio
  - mediante su propio sacrificio
  lexicon: BDAG
  rationale: 'Se mantiene la referencia reflexiva y fuerte del genitivo: el sacrificio consiste en él mismo. «Mediante» conserva el valor instrumental de διά.'
- source_word: πεφανέρωται
  english_pob_choice: he has appeared
  chosen_spanish: se ha manifestado
  alternatives_spanish:
  - ha aparecido
  - ha sido manifestado
  lexicon: BDAG
  rationale: El perfecto indica una manifestación ya realizada con efecto vigente; «se ha manifestado» es natural en español y preserva la idea de revelación/manifestación más que una mera aparición física.
theological_decisions:
- issue: Fuerza de ἅπαξ en la obra sacrificial de Cristo
  english_pob_reading: once for all to express the definitive, non-repeatable character of Christ's offering.
  chosen_spanish_reading: una sola vez
  alternative_spanish_readings:
  - una vez para siempre
  - de una vez y para siempre
  rationale: El contexto inmediato contrapone ἅπαξ con πολλάκις, de modo que la singularidad no repetible ya queda firmemente marcada. «Una sola vez» evita añadir formulación interpretativa más allá de lo que el español necesita para ser claro, sin perder la definitividad del acto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Alcance de ἁμαρτίας como singular
  english_pob_reading: Rendered as singular 'sin' rather than plural 'sins.'
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - pecados
  rationale: El singular preserva el valor abstracto/colectivo probable del griego y no reduce el pasaje a una suma de faltas aisladas. La expresión sigue incluyendo la expiación de pecados concretos, pero mantiene la amplitud conceptual del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje sigue el mismo sentido del borrador inglés auditado, sin revisiones pendientes en el contexto fuente. Se conservan las tres tensiones léxicas principales: contraste hipotético/real de ἐπεὶ–νυνὶ δὲ, la fuerza no repetitiva de ἅπαξ y el matiz reflexivo de διὰ τῆς θυσίας αὐτοῦ.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo y reverente, sin calcos innecesarios.
  - Se eligió un español neutro y broadly church-readable, evitando términos eclesiásticos tradicionales donde no eran exigidos por el griego.
  - Los corchetes de notas se anclan en el texto exactamente donde aparecen las alternativas relevantes.
  - «Pecado» se mantuvo en singular por coherencia con el griego y con la lectura teológica del contexto de Hebreos.
