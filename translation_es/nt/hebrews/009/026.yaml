  text: ἐπεὶ ἔδει αὐτὸν πολλάκις παθεῖν ἀπὸ καταβολῆς κόσμου· ⸀νυνὶ δὲ ἅπαξ ἐπὶ συντελείᾳ τῶν αἰώνων εἰς ἀθέτησιν ⸀ἁμαρτίας διὰ τῆς θυσίας αὐτοῦ πεφανέρωται.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/009/026.yaml
  text: Otherwise[a], he would have had to suffer many times since the foundation of the world. But as it is[c][b], he has appeared once for all at the consummation of the ages to put away sin through the sacrifice of himself.
  footnotes:
