  source_alignment_summary: 'El borrador español refleja bien la estructura argumentativa del griego: consecuencia hipotética, contraste con la situación real, unicidad del sacrificio, marco escatológico y propósito de eliminar el pecado mediante el autosacrificio de Cristo. Sin embargo, la colocación de las notas [b][c] no corresponde bien a sus anclajes semánticos, y «una sola vez» queda algo más débil que el inglés auditado «once for all» en este contexto de Hebreos.'
  spanish_quality_summary: El español es claro, natural y digno. «De otro modo», «desde la fundación del mundo», «consumación de los siglos» y «mediante el sacrificio de sí mismo» funcionan bien. Conviene fortalecer ἅπαξ a «una vez para siempre» para reflejar mejor la finalidad no repetible, y reubicar las notas al segmento pertinente para evitar confusión de lectura.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «pecado» en singular preserva bien ἁμαρτίας. «se ha manifestado» es aceptable para πεφανέρωται. No aparecen términos sensibles del glosario principal que requieran ajuste.
  issues:
  - severity: medium
    issue: La traducción de ἅπαξ como «una sola vez» atenúa la fuerza de definitividad sacrificial destacada por el English POB.
    rationale: Aunque el contexto aporta contraste con «muchas veces», en Hebreos ἅπαξ en este marco suele expresar no solo singularidad sino carácter definitivo y no repetible. «Una vez para siempre» lo comunica mejor en español sin sobreinterpretar.
  - severity: medium
    issue: Las notas [b] y [c] están ancladas en «en realidad», pero su contenido corresponde a otras frases.
    rationale: La nota b trata εἰς ἀθέτησιν ἁμαρτίας («para quitar el pecado»), y la nota c trata διὰ τῆς θυσίας αὐτοῦ («mediante el sacrificio...»). Su ubicación actual dificulta la correspondencia exacta entre texto y nota, contraviniendo la disciplina de anclaje.
  - severity: low
    issue: La nota a está anclada a «De otro modo», pero su contenido se refiere a «consumación de los siglos».
    rationale: El texto de la nota a ofrece la alternativa de ἐπὶ συντελείᾳ τῶν αἰώνων, por lo que debe marcar esa frase, no la apertura del versículo.
