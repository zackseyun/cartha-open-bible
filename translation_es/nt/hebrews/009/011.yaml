revisions:
- from: Pero el Mesías vino como sumo sacerdote de los bienes que han llegado[a], por medio del tabernáculo más grande y más perfecto, no hecho por manos humanas—es decir[b], no de esta creación—
  to: Pero el Mesías vino como sumo sacerdote de los bienes que han llegado[a]—por medio del tabernáculo más grande y más perfecto, no hecho por manos humanas, es decir[b], no de esta creación—
