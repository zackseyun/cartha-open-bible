  - severity: low
    issue: La nota b conserva una alternativa inglesa anterior ya cuestionada por ambigüedad
    rationale: La nota de alternativa «cuando el Mesías apareció ... por medio del tabernáculo» reproduce precisamente la estructura que puede confundir al lector. Es mejor reformular la nota alternativa para que siga documentando la opción previa sin mantener la ambigüedad.
