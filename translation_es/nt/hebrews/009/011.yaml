translation:
  language: es
  text: Pero el Mesías vino como sumo sacerdote de los bienes que han llegado[a]—por medio del tabernáculo más grande y más perfecto, no hecho por manos humanas, es decir[b], no de esta creación—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos dicen: «de los bienes que están por venir».'
    reason: textual_variant
  - marker: b
    text: 'O: «Pero cuando el Mesías apareció como sumo sacerdote de los bienes que han llegado—por medio del tabernáculo más grande y más perfecto, no hecho por manos humanas, es decir, no de esta creación—».'
    reason: previous_rendering
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: En este contexto λειτουργa como título y no como nombre propio; por eso se conserva el sentido mesiánico explícito en español con “Mesías”. Se evita “Cristo” como forma litúrgica fija salvo necesidad idiomática.
- source_word: παραγενόμενος
  english_pob_choice: appeared
  chosen_spanish: vino
  alternatives_spanish:
  - apareció
  - habiendo venido
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo de llegada/presencia se vierte de manera natural como “vino”, manteniendo el movimiento salvífico sin sobrecargar la frase con una construcción participial pesada.
- source_word: ἀρχιερεύς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  lexicon: BDAG
  rationale: Es el equivalente cultual preciso y establecido en español para el oficio sacerdotal de Hebreos.
- source_word: τῶν γενομένων ἀγαθῶν
  english_pob_choice: of the good things that have come
  chosen_spanish: de los bienes que han llegado
  alternatives_spanish:
  - de los bienes que han venido
  - de las cosas buenas que han llegado
  lexicon: BDAG
  rationale: Se conserva el valor de γενομένων como realidad ya acontecida/presente. “Bienes” comunica mejor el tono de beneficios salvíficos que una traducción demasiado general como “cosas buenas”, y “han llegado” mantiene la idea de realización sin expandirla más allá del griego.
- source_word: διὰ τῆς μείζονος καὶ τελειοτέρας σκηνῆς
  english_pob_choice: through the greater and more perfect tabernacle
  chosen_spanish: por medio del tabernáculo más grande y más perfecto
  alternatives_spanish:
  - a través del tabernáculo más grande y más perfecto
  - por medio de la tienda más grande y más perfecta
  lexicon: BDAG
  rationale: “Tabernáculo” conserva la resonancia cultual hebrea que Hebreos explota. “Por medio de” expresa bien διὰ con valor instrumental. Se traduce μείζονος y τελειοτέρας como cualitativos (“más grande”, “más perfecto”) siguiendo la línea de superioridad teológica.
- source_word: οὐ χειροποιήτου
  english_pob_choice: not made by hands
  chosen_spanish: no hecho por manos humanas
  alternatives_spanish:
  - no hecho por manos
  - no fabricado por seres humanos
  lexicon: BDAG
  rationale: Se preserva el modismo bíblico, pero se explicita “humanas” para que el contraste con la esfera creada sea claro en español contemporáneo.
- source_word: ταύτης τῆς κτίσεως
  english_pob_choice: of this creation
  chosen_spanish: de esta creación
  alternatives_spanish:
  - de este orden creado
  - de esta creación misma
  lexicon: BDAG
  rationale: κτίσις se vierte como “creación” para mantener el contraste con lo no creado/ no perteneciente al orden presente. La frase queda breve y fiel al cierre explicativo del versículo.
theological_decisions:
- issue: Lectura de τῶν γενομένων ἀγαθῶν frente a la variante tradicional 'to come'
  english_pob_reading: of the good things that have come
  chosen_spanish_reading: de los bienes que han llegado
  alternative_spanish_readings:
  - de los bienes que están por venir
  - de los bienes venideros
  rationale: Se sigue el testimonio griego presentado (γενομένων) y la decisión inglesa de reflejar bienes ya realizados. En español se conserva esa tensión frente a la lectura tradicional futura, que no se borra sino que se documenta en nota textual.
  doctrine_reference: Transparencia textual y primacía de la fuente original
- issue: Relación sintáctica entre 'through the ... tabernacle' y la cláusula principal
  english_pob_reading: through the greater and more perfect tabernacle not made by hands—that is, not of this creation—
  chosen_spanish_reading: por medio del tabernáculo más grande y más perfecto, no hecho por manos humanas—es decir, no de esta creación—
  alternative_spanish_readings:
  - por medio del tabernáculo ...
  - a través del tabernáculo ...
  rationale: Se evita sugerir que el tabernáculo es el medio de la 'aparición' en este mismo versículo de un modo que oscurezca la secuencia retórica. La frase se deja unida de forma natural al flujo del argumento, manteniendo la aclaración explicativa final.
  doctrine_reference: Coherencia sintáctica del argumento de Hebreos 9
translation_notes:
  revision_awareness: Se ha revisado el orden sintáctico para que el español no reproduzca de forma confusa la ambigüedad detectada en la auditoría inglesa. La versión española sigue la lectura griega de γενομένων (“que han llegado”) y conserva la alternativa manuscrita tradicional en nota. También se preserva la aclaración final de que el tabernáculo no pertenece a esta creación.
  spanish_consistency_notes:
  - Se usa consistentemente “Mesías” para Χριστός como título.
  - Se usa “sumo sacerdote” para ἀρχιερεύς, término técnico estable en Hebreos.
  - Se mantiene “tabernáculo” para σκηνή por su carga cultual.
  - Se traduce κτίσις como “creación” y no como “orden creado” en el texto principal para conservar concisión.
  - Se conserva la distinción entre la lectura principal y la variante manuscrita mediante nota textual.
  - La puntuación con guiones largos reproduce la función explicativa de τοῦτ’ ἔστιν.
