translation:
  language: es
  text: Y encima de ella estaban los querubines de gloria, que hacían sombra sobre el propiciatorio[a]; acerca de estas cosas no es posible hablar ahora en detalle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la cubierta del arca'; alternativamente, 'propiciación'.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπεράνω
  english_pob_choice: above
  chosen_spanish: encima de
  alternatives_spanish:
  - sobre
  - arriba de
  lexicon: BDAG
  rationale: Expresa posición espacial superior de manera natural en español y conserva la relación visual con el arca/cubierta.
- source_word: Χερουβὶν
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines de gloria
  - cherubines
  lexicon: BDAG
  rationale: En español bíblico, 'querubines' es la forma más reconocible y fiel para Χερουβὶν; mantiene el registro sacro mejor que una forma explicativa.
- source_word: δόξης
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - gloriosos
  - gloria
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de forma compacta en español; no se fuerza una adjetivación que alteraría el vínculo entre los querubines y la gloria divina.
- source_word: κατασκιάζοντα
  english_pob_choice: overshadowing
  chosen_spanish: que cubrían
  alternatives_spanish:
  - que daban sombra
  - que estaban cubriendo
  lexicon: BDAG
  rationale: En este contexto tabernacular, 'cubrir' comunica la función espacial del participio sin sonar artificial en español. 'Cubrir' mantiene la idea de estar extendidos sobre el propiciatorio; se evita sobredeterminar la metáfora.
- source_word: τὸ ἱλαστήριον
  english_pob_choice: mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta del arca
  - el lugar de expiación
  lexicon: BDAG
  rationale: Aunque el audit trail inglés terminó privilegiando 'mercy seat' por el contexto del tabernáculo, en español la equivalencia tradicional y más precisa para este objeto cultual es 'propiciatorio'. Preserva la tensión lexical entre el mueble concreto y las posibles resonancias expiatorias sin forzar una paráfrasis.
- source_word: περὶ ὧν
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre las cuales
  - en cuanto a estas
  lexicon: BDAG
  rationale: Reproduce el referente inmediato de los objetos del santuario con una formulación natural y clara.
- source_word: οὐκ ἔστιν νῦν
  english_pob_choice: it is not now possible
  chosen_spanish: no es posible ahora
  alternatives_spanish:
  - no es ahora el momento
  - no se puede ahora
  lexicon: BDAG
  rationale: Mantiene el matiz de imposibilidad o inadecuación presente sin añadir la idea de tiempo de manera más fuerte que el griego.
- source_word: λέγειν κατὰ μέρος
  english_pob_choice: to speak in detail
  chosen_spanish: hablar en detalle
  alternatives_spanish:
  - hablar parte por parte
  - tratar minuciosamente
  lexicon: BDAG
  rationale: '''Hablar en detalle'' transmite bien la idea de exposición item por item y es idiomático en español contemporáneo.'
theological_decisions:
- issue: Rendering of ἱλαστήριον in a tabernacle context
  english_pob_reading: The English audit trail ultimately revised the main text from 'atoning sacrifice' to 'mercy seat' because the referent is the ark's cover in this sanctuary context, while still preserving the broader interpretive tension in notes.
  chosen_spanish_reading: Se adopta 'propiciatorio' en el texto principal como término culto y auditable para el objeto del arca, con la posibilidad de leerlo como la cubierta del arca o, por extensión teológica, el lugar vinculado a la expiación.
  alternative_spanish_readings:
  - la cubierta del arca
  - lugar de expiación
  - mercy seat
  rationale: '''Propiciatorio'' es la equivalencia española establecida para ἱλαστήριον en su sentido de pieza del arca, y conserva la ambigüedad histórica entre el mueble y su valor expiatorio. No se sustituye por ''trono de misericordia'' ni por una paráfrasis doctrinal, porque el contexto exige un referente cultual concreto.'
  doctrine_reference: 'DOCTRINE.md Contested terms: ἱλαστήριον; sanctuary context and lexical tension'
- issue: Relation of the cherubim to the cover
  english_pob_reading: '''overshadowing the mercy seat'' describes the cherubim positioned over the ark cover.'
  chosen_spanish_reading: '''que cubrían el propiciatorio'' preserves the spatial relation without overexplaining the image.'
  alternative_spanish_readings:
  - que daban sombra al propiciatorio
  - que lo cubrían
  rationale: El participio describe una posición y función espacial. 'Cubrir' comunica la imagen con claridad en español y permite leer la escena cultual sin introducir términos técnicos innecesarios.
  doctrine_reference: Hebreos 9:5 sanctuary imagery
translation_notes:
  revision_awareness: The English audit trail initially used 'atoning sacrifice' for ἱλαστήριον, then revised it to 'mercy seat' after reviewer feedback, reflecting the sanctuary context. This Spanish draft follows that revision-aware judgment by rendering the term with the cultic object 'propiciatorio' and preserving the alternative readings in a footnote rather than flattening the tension.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico y culto, evitando calcos del inglés cuando el español dispone de un término técnico tradicional ('propiciatorio').
  - '''Querubines'' se usa en plural invariable según el uso bíblico habitual en español.'
  - '''No es posible ahora hablar en detalle'' conserva la restricción retórica del autor sin añadir contenido no presente en el griego.'
