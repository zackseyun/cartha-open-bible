    rationale: El participio indica específicamente que los querubines estaban proyectando sombra o cerniéndose sobre el propiciatorio, no meramente cubriéndolo. 'Que hacían sombra sobre' o 'que cubrían con su sombra' preserva mejor la imagen espacial del original y del POB inglés ('overshadowing').
  - severity: medium
    issue: La nota de ἱλαστήριον necesita mejor alineación con el audit trail
    rationale: El inglés final adoptó 'mercy seat' por el contexto del santuario y dejó alternativas en nota. En español, 'propiciatorio' puede mantenerse como término principal, pero la nota debe dejar más claramente la equivalencia contextual 'la cubierta del arca' y la alternativa más abstracta 'propiciación'.
  revised_spanish_text: Y encima de ella estaban los querubines de gloria, que hacían sombra sobre el propiciatorio[a]; acerca de estas cosas no es posible hablar ahora en detalle.
  revised_footnotes:
  - marker: a
    text: O 'la cubierta del arca'; alternativamente, 'propiciación'.
    reason: alternative_reading
  revision_rationale: Se conserva 'propiciatorio' porque en español bíblico es la equivalencia cultual más estable y comprensible para ἱλαστήριον en este contexto, pero se mejora la fidelidad de κατασκιάζοντα con 'que hacían sombra sobre'. También se mantiene y afina la nota para reflejar la alternativa contextual concreta y la lectura teológica más amplia.
