translation:
  language: es
  text: Porque un pacto[a] es válido en caso de muerte[b], ya que nunca está en vigor mientras vive el que lo hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testamento»; el término griego puede significar tanto «pacto» como «testamento/voluntad».
    reason: alternative_reading
  - marker: b
    text: La expresión griega es condensada y puede referirse ya sea a personas muertas en sentido testamentario, ya sea a la muerte implicada en la ratificación del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En hebreos 9 el contexto inmediato es fuertemente pactual; por eso, como en la POB inglesa, la lectura principal conserva el marco de pacto. En español, «pacto» comunica con naturalidad ese campo semántico sin cerrar por completo la tensión con el sentido testamentario que también admite διαθήκη.
- source_word: ἐπὶ νεκροῖς
  english_pob_choice: over dead ones
  chosen_spanish: sobre muertos
  alternatives_spanish:
  - en el caso de muertos
  - después de muertos
  - sobre personas muertas
  lexicon: BDAG
  rationale: La frase es comprimida en griego y queda deliberadamente abierta. «Sobre muertos» conserva la concisión y la ambigüedad del original, sin resolver en exceso si se trata de muertos en sentido testamentario o de muerte en la ratificación del pacto.
- source_word: βεβαία
  english_pob_choice: valid
  chosen_spanish: válido
  alternatives_spanish:
  - firme
  - confirmado
  - con fuerza
  lexicon: BDAG
  rationale: Aquí el adjetivo expresa vigencia o fuerza jurídica/operativa, no solo certeza abstracta. «Válido» es el equivalente más natural en español para ese valor legal.
- source_word: μήποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún momento
  lexicon: BDAG
  rationale: En esta construcción, μήποτε funciona idiomáticamente con ἰσχύει para negar toda vigencia. «Nunca» preserva bien ese valor absoluto en español.
- source_word: ἰσχύει
  english_pob_choice: is in force
  chosen_spanish: tiene fuerza
  alternatives_spanish:
  - está en vigor
  - rige
  - es efectivo
  lexicon: BDAG
  rationale: El verbo aquí apunta a eficacia u ოპeración jurídica. «Tiene fuerza» es natural en español y comunica la idea de vigencia operativa, en línea con la POB inglesa.
- source_word: ὅτε ζῇ
  english_pob_choice: while ... is living
  chosen_spanish: mientras vive
  alternatives_spanish:
  - cuando vive
  - mientras está vivo
  lexicon: BDAG
  rationale: La cláusula temporal contrasta la vida del que hizo el pacto con la validez de ese pacto. «Mientras vive» es claro, idiomático y mantiene la relación temporal estricta del griego.
- source_word: ὁ διαθέμενος
  english_pob_choice: the one who made it
  chosen_spanish: el que lo hizo
  alternatives_spanish:
  - el que lo estableció
  - el que lo dispuso
  - el que hizo el pacto
  lexicon: BDAG
  rationale: El participio puede referirse al hacedor del pacto o al testador. «El que lo hizo» preserva la ambigüedad del inglés POB y no fuerza de antemano la lectura testamentaria.
theological_decisions:
- issue: 'Cómo traducir διαθήκη: ¿pacto o testamento?'
  english_pob_reading: Main text uses 'covenant' with a footnoted alternative 'will/testament'.
  chosen_spanish_reading: Texto principal con «pacto», con nota que preserve la alternativa testamentaria.
  alternative_spanish_readings:
  - testamento
  - voluntad
  rationale: El contexto de Hebreos 8–10 es predominantemente pactual, pero 9:16–17 admite una lectura testamentaria debatida. Mantener «pacto» en el texto principal sigue el marco dominante y la nota preserva la tensión interpretativa que el POB inglés documenta.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; §5
- issue: Cómo reflejar la ambigüedad de ἐπὶ νεκροῖς.
  english_pob_reading: Retains 'over dead ones' to preserve ambiguity.
  chosen_spanish_reading: 'Conservar una forma breve y abierta: «sobre muertos».'
  alternative_spanish_readings:
  - después de muertos
  - en el caso de muertos
  - sobre muertos en sacrificio
  rationale: La expresión griega es compacta y discutida. La traducción no debe imponer una sola reconstrucción interpretativa; por eso se mantiene una formulación que deje espacio a las dos líneas de lectura reconocidas por el POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'No se requirieron revisiones respecto del último pase en inglés: el texto de referencia quedó estable y la revisión cruzada señaló solo observaciones menores. La versión española conserva esa estabilidad y mantiene las mismas decisiones interpretativas centrales.'
  spanish_consistency_notes:
  - Se usa «pacto» como término principal para διαθήκη, en coherencia con la terminología pactual de Hebreos.
  - Se evita «SEÑOR» o equivalentes de enmascaramiento, porque aquí no aparece el nombre divino ni κύριος como cita directa.
  - Se mantiene el contraste legal/operativo con «válido» y «tiene fuerza» para reflejar el campo semántico jurídico del pasaje.
  - La puntuación y el orden siguen un español claro y eclesialmente readable sin sobreexplicar la ambigüedad del original.
