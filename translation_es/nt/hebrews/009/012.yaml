translation:
  language: es
  text: y no por la sangre de machos cabríos y becerros, sino por su propia sangre, entró una vez para siempre en los lugares santos[a], habiendo obtenido redención eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el santuario'. El griego dice 'los lugares santos'; algunas traducciones lo precisan como 'el Lugar Santísimo', pero eso es más interpretativo de lo que exige la frase misma.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: and not
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y tampoco
  lexicon: BDAG
  rationale: En español, para mantener la continuidad contrastiva con el versículo anterior, 'y no' conserva la negación unida al enlace lógico sin sonar forzado. 'Ni' podría sugerir una coordinación más compacta, pero aquí el paralelismo con la contraposición posterior favorece 'y no'.
- source_word: δι’ αἵματος τράγων καὶ μόσχων
  english_pob_choice: through the blood of goats and calves
  chosen_spanish: por sangre de machos cabríos y becerros
  alternatives_spanish:
  - mediante la sangre de machos cabríos y becerros
  - por la sangre de cabritos y terneros
  lexicon: BDAG
  rationale: '''Por'' comunica bien el medio/instrumento de διά con genitivo en español. ''Machos cabríos'' refleja con precisión τράγων; ''becerros'' es un término natural y digno para μόσχων, conservando la fuerza sacrificial sin forzar una equivalencia demasiado moderna o demasiado técnica.'
- source_word: διὰ δὲ τοῦ ἰδίου αἵματος
  english_pob_choice: but through his own blood
  chosen_spanish: sino por su propia sangre
  alternatives_spanish:
  - pero por su propia sangre
  - sino mediante su propia sangre
  lexicon: BDAG
  rationale: La contraposición exige en español 'sino' más que un simple 'pero'. 'Por su propia sangre' mantiene el valor instrumental de διά, y 'propia' reproduce el énfasis posesivo de ἰδίου. No se añadió una glosa explicativa sobre el modo de presentación de la sangre, porque el griego no la especifica.
- source_word: εἰσῆλθεν
  english_pob_choice: he entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró adentro
  lexicon: BDAG
  rationale: '''Entró'' es la forma más natural y fiel en español, y preserva el aoristo como acto completo. ''Ingresó'' sería posible, pero aquí resulta más formalizado sin aportar claridad adicional.'
- source_word: ἐφάπαξ
  english_pob_choice: once for all
  chosen_spanish: una vez para siempre
  alternatives_spanish:
  - una vez y para siempre
  - de una vez para siempre
  lexicon: BDAG
  rationale: '''Una vez para siempre'' expresa en español la idea de un acto único, decisivo e irrepetible. Conserva la fuerza teológica de ἐφάπαξ sin sonar excesivamente literal o arcaizante.'
- source_word: εἰς τὰ ἅγια
  english_pob_choice: into the holy places
  chosen_spanish: en los lugares santos
  alternatives_spanish:
  - en el santuario
  - en el Lugar Santísimo
  lexicon: BDAG
  rationale: Se mantiene el plural y la forma cultual del griego. 'Lugares santos' sigue de cerca τὰ ἅγια y evita especificar 'Lugar Santísimo', que resolvería interpretivamente una ambigüedad que el texto griego no resuelve de manera explícita.
- source_word: αἰωνίαν λύτρωσιν
  english_pob_choice: eternal redemption
  chosen_spanish: redención eterna
  alternatives_spanish:
  - redención perpetua
  - redención para siempre
  lexicon: BDAG
  rationale: '''Redención eterna'' es la equivalencia más directa y natural para αἰωνίαν λύτρωσιν. En español, ''redención eterna'' comunica duración permanente y valor definitivo sin perder la densidad soteriológica del término.'
- source_word: εὑράμενος
  english_pob_choice: having obtained
  chosen_spanish: habiendo obtenido
  alternatives_spanish:
  - habiendo conseguido
  - después de obtener
  lexicon: BDAG
  rationale: El participio aoristo se refleja bien con 'habiendo obtenido', que conserva la relación circunstancial con el verbo principal. 'Obtenido' evita la literalidad engañosa de 'habiendo encontrado', que en este contexto podría desviar el sentido hacia el hallazgo en vez del logro/obtención.
theological_decisions:
- issue: Naturaleza del contraste sacrificial y del medio de entrada
  english_pob_reading: The verse states that Messiah entered through his own blood in contrast to animal blood, without importing a more detailed sacrificial mechanism than the Greek states.
  chosen_spanish_reading: El texto dice que entró por su propia sangre, en contraste con la sangre de animales, sin añadir un mecanismo sacrificial más específico que el que expresa el griego.
  alternative_spanish_readings:
  - entró llevando o presentando su sangre de manera literal y espacial
  - entró solo después de derramar su sangre, tomando 'por' en un sentido débil
  rationale: La preposición repetida διά con genitivo se ha mantenido como medio en español ('por') para sostener el contraste tipológico. No se añade una explicación de la escena celestial porque el texto no la precisa y una ampliación sería interpretativa más allá del alcance del versículo.
  doctrine_reference: Hebreos 9:12; traducción por equivalencia óptima y cautela exegética
- issue: Alcance de τὰ ἅγια
  english_pob_reading: Rendered 'the holy places' rather than 'the Most Holy Place.'
  chosen_spanish_reading: Se traduce 'los lugares santos' y no 'el Lugar Santísimo' para conservar el plural y la ambigüedad cultual del griego.
  alternative_spanish_readings:
  - el santuario
  - el Lugar Santísimo
  rationale: '''Lugares santos'' preserva la forma plural τὰ ἅγια y evita resolver de antemano una cuestión de referencia que el texto deja abierta. ''Lugar Santísimo'' sería más interpretativo; ''santuario'' es posible, pero pierde el eco plural más visible del griego.'
  doctrine_reference: Hebreos 9:12; decisión de alcance cultual
- issue: Valor de 'redención eterna'
  english_pob_reading: eternal redemption
  chosen_spanish_reading: redención eterna
  alternative_spanish_readings:
  - redención perpetua
  - redención para siempre
  rationale: La expresión subraya la eficacia definitiva y permanente de la obra de Cristo/Mesías. 'Redención eterna' es la formulación más estable y transparente en español para mantener la fuerza doctrinal del adjetivo αἰωνίαν.
  doctrine_reference: Hebreos 9:12; soteriología del texto
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de alta concordancia confirma que no se requieren ajustes sustanciales respecto del texto base y la solución elegida mantiene la decisión de no sobre-interpretar τὰ ἅγια.
  spanish_consistency_notes:
  - Se mantiene 'por' para διά con genitivo de forma consistente en ambos miembros del contraste.
  - Se conserva el plural 'los lugares santos' para reflejar τὰ ἅγια y evitar una precisión excesiva.
  - '''Sangre'' se traduce literalmente en ambos casos para preservar la oposición entre sangre animal y sangre propia.'
  - La secuencia verbal 'entró... habiendo obtenido' reproduce el valor participial del griego sin forzar una subordinación innecesaria.
  - El tono es bíblico y publicable, pero no recurre a fórmulas eclesiásticas tradicionales cuando el griego pide una presentación más directa.
