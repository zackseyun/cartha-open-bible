revisions:
- from: Así también el Mesías[a], habiendo sido ofrecido una vez para llevar los pecados de muchos, aparecerá por segunda vez, apartado del pecado, a los que lo esperan con anhelo, para salvación.
  to: Así también el Mesías[a], habiendo sido ofrecido una vez para llevar los pecados de muchos, aparecerá por segunda vez, sin relación con el pecado, a los que lo esperan con anhelo, para salvación.
  rationale: Se revisa únicamente χωρὶς ἁμαρτίας. «Sin relación con el pecado» comunica mejor en español la fuerza contextual de «apart from sin» sin introducir la implicación equívoca de «apartado del pecado». Se conserva la tensión teológica en el texto principal y la alternativa explicativa en la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:02:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: comparación con v. 27, ofrenda única, carga de los pecados de muchos, segunda aparición y meta de salvación para quienes lo esperan. También preserva correctamente el valor titular de Χριστός como «Mesías». Sin embargo, «apartado del pecado» no representa bien χωρὶς ἁμαρτίας en este contexto; en español sugiere separación moral o distancia del pecado, mientras que el griego aquí significa más bien «aparte del asunto del pecado / sin referencia al pecado» en contraste con su primera ofrenda para llevar pecados.'
  spanish_quality_summary: El español es claro y digno, pero «apartado del pecado» suena algo extraño y potencialmente equívoco. «Sin relación con el pecado» o «aparte del pecado» serían mejores opciones; dado el pie de nota ya existente, conviene una formulación principal más cercana y natural. El resto del verso es fluido y church-readable.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Mesías» para Χριστός, «salvación», y una formulación adecuada para la espera expectante. No hay conflictos con los glosarios principales. La única desalineación relevante es lexical/teológica en χωρὶς ἁμαρτίας.'
  issues:
  - severity: high
    issue: «apartado del pecado» para χωρὶς ἁμαρτίας
    rationale: χωρίς + genitivo aquí significa «aparte de / sin relación con», no «apartado de» en el sentido de separado o alejado. En español, «apartado del pecado» puede implicar santidad moral o distancia ética, y no el contraste contextual de que su segunda aparición ya no será para llevar pecado.
  - severity: low
    issue: Matiz del pie de nota «cargar con el pecado»
    rationale: Es comprensible y fiel al sentido explicativo del inglés, aunque «llevar el pecado» armoniza mejor con el texto principal. No es necesario cambiarlo, pero conviene mantener coherencia conceptual con «llevar los pecados de muchos».
  revised_spanish_text: Así también el Mesías[a], habiendo sido ofrecido una vez para llevar los pecados de muchos, aparecerá por segunda vez, sin relación con el pecado, a los que lo esperan con anhelo, para salvación.
  revised_footnotes:
  - marker: a
    text: O «sin referencia al pecado», es decir, no para cargar con el pecado como en su primera ofrenda.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente χωρὶς ἁμαρτίας. «Sin relación con el pecado» comunica mejor en español la fuerza contextual de «apart from sin» sin introducir la implicación equívoca de «apartado del pecado». Se conserva la tensión teológica en el texto principal y la alternativa explicativa en la nota.
