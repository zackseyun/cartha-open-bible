translation:
  language: es
  text: Así también el Mesías[a], habiendo sido ofrecido una vez para llevar los pecados de muchos, aparecerá por segunda vez, sin relación con el pecado, a los que lo esperan con anhelo, para salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin referencia al pecado», es decir, no para cargar con el pecado como en su primera ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: Así también
  alternatives_spanish:
  - de la misma manera también
  - también así
  lexicon: BDAG
  rationale: Conserva la relación comparativa con el contexto previo y suena natural en español sin perder la conexión inferencial.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: La POB inglesa trata Χριστός aquí como título; en español, 'Mesías' mantiene ese valor titular y evita convertirlo en simple nombre propio.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una sola vez
  - una vez para siempre
  lexicon: BDAG
  rationale: '''Una vez'' reproduce directamente la idea temporal del adverbio sin añadir el matiz ''para siempre'', que no está explícito en la forma griega.'
- source_word: προσενεχθεὶς
  english_pob_choice: having been offered
  chosen_spanish: habiendo sido ofrecido
  alternatives_spanish:
  - siendo ofrecido
  - habiendo ofrecido
  lexicon: BDAG
  rationale: El participio aoristo pasivo se refleja bien con una construcción pasiva en español que preserve la relación temporal con el verbo principal.
- source_word: εἰς τὸ πολλῶν ἀνενεγκεῖν ἁμαρτίας
  english_pob_choice: to bear the sins of many
  chosen_spanish: para llevar los pecados de muchos
  alternatives_spanish:
  - para cargar con los pecados de muchos
  - para portar los pecados de muchos
  lexicon: BDAG
  rationale: '''Llevar los pecados'' comunica de forma natural el sentido sacrificial de ἀναφέρω en este contexto y mantiene la resonancia de Isaías sin sobreexplicar.'
- source_word: πολλῶν
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  lexicon: BDAG
  rationale: '''Muchos'' sigue de cerca el genitivo plural y conserva el eco bíblico del texto fuente.'
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: BDAG
  rationale: Es una expresión idiomática natural en español y preserva el contraste con la primera aparición.
- source_word: χωρὶς ἁμαρτίας
  english_pob_choice: apart from sin
  chosen_spanish: apartado del pecado
  alternatives_spanish:
  - sin referencia al pecado
  - sin relación con el pecado
  lexicon: BDAG
  rationale: '''Apartado del pecado'' comunica con claridad la separación expresada por χωρίς y mantiene la tensión interpretativa sin resolverla del todo en el cuerpo del texto.'
- source_word: ὀφθήσεται
  english_pob_choice: will appear
  chosen_spanish: aparecerá
  alternatives_spanish:
  - será visto
  - se manifestará
  lexicon: BDAG
  rationale: El futuro de ὁράω aquí funciona como lenguaje de aparición; 'aparecerá' es idiomático y fiel al valor escatológico.
- source_word: τοῖς αὐτὸν ἀπεκδεχομένοις
  english_pob_choice: to those who eagerly await him
  chosen_spanish: a los que lo esperan con anhelo
  alternatives_spanish:
  - a los que lo esperan con expectativa
  - a los que aguardan su venida
  lexicon: BDAG
  rationale: '''Con anhelo'' intenta reproducir la fuerza intensiva de ἀπεκδέχομαι sin volverlo demasiado explicativo; ''esperan'' evita una perífrasis rígida.'
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - hacia salvación
  - con miras a salvación
  lexicon: BDAG
  rationale: La preposición εἰς con acusativo expresa finalidad; 'para salvación' es directo, claro y conserva la brevedad del original.
theological_decisions:
- issue: Sentido de χωρὶς ἁμαρτίας en la segunda aparición
  english_pob_reading: Rendered literally as 'apart from sin' in the main text, referring to Christ's second appearance as no longer related to sin-bearing in the way his first offering was.
  chosen_spanish_reading: Traducido literalmente como 'apartado del pecado' en el texto principal, sugiriendo que su segunda aparición no será para tratar el pecado como en su primera ofrenda.
  alternative_spanish_readings:
  - sin referencia al pecado
  - sin relación con el pecado
  - sin cargar con el pecado
  rationale: La redacción principal conserva la brevedad y la tensión del griego sin cerrar la interpretación; las alternativas explicitan el sentido posible sin desplazarlo del texto base.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó aprobado sin ajustes, con alta concordancia entre revisores y sin incidencias de contenido.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός como título, en coherencia con la guía terminológica del proyecto y con la decisión inglesa auditada.
  - Se mantiene 'pecado' en singular en la frase preposicional 'apartado del pecado' para reflejar el sustantivo singular de χωρίς ἁμαρτίας, y 'pecados' en plural para ἁμαρτίας del sintagma anterior.
  - '''Para salvación'' conserva la finalidad de εἰς σωτηρίαν sin convertirla en una explicación doctrinal adicional.'
  - La nota al pie preserva la alternativa interpretativa documentada por la POB inglesa y la adapta al español sin perder la tensión semántica del original.
