translation:
  language: es
  text: Por esto el Espíritu Santo indica que el camino al santuario[a] aún no ha sido revelado, mientras el primer tabernáculo[b] todavía está en pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el camino a los lugares santos”. La expresión griega puede denotar de manera general los recintos sagrados; algunos la entienden más específicamente como “el camino al Lugar Santísimo”.
    reason: alternative_reading
  - marker: b
    text: O “mientras el primer tabernáculo todavía tiene vigencia”. La frase griega también puede expresar que seguía teniendo subsistencia o validez en ese momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δηλοῦντος
  english_pob_choice: By this ... indicates
  chosen_spanish: Por esto ... indica
  alternatives_spanish:
  - Con esto ... da a entender
  - Mediante esto ... señala
  lexicon: BDAG
  rationale: El participio genitivo expresa una relación explicativa continua; en español, 'indica' conserva la fuerza declarativa sin sonar forzado. 'Por esto' reproduce el valor inferencial de τοῦτο en el contexto argumentativo.
- source_word: τοῦ πνεύματος τοῦ ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  lexicon: BDAG
  rationale: La referencia es al referente neotestamentario estándar; en español, 'Espíritu Santo' es la forma natural y precisa. Se mantiene la mayúscula por tratarse de una designación personal divina.
- source_word: μήπω πεφανερῶσθαι
  english_pob_choice: has not yet been revealed
  chosen_spanish: aún no había sido manifestado
  alternatives_spanish:
  - todavía no se había revelado
  - aún no había sido dado a conocer
  lexicon: BDAG
  rationale: El infinitivo perfecto pasivo expresa un estado resultante de no haber sido dado a conocer; 'había sido manifestado' preserva ese valor de resultado pasado con continuidad hasta el momento de referencia.
- source_word: τὴν τῶν ἁγίων ὁδὸν
  english_pob_choice: the way into the holy places
  chosen_spanish: el camino a los lugares santos
  alternatives_spanish:
  - el camino al santuario
  - el camino al Lugar Santo
  lexicon: BDAG
  rationale: La expresión griega es cultual y espacial. 'Lugares santos' conserva el plural y evita estrechar indebidamente el sentido a una sola cámara del tabernáculo. 'Camino a' expresa la idea de acceso implícita en el contexto.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy places
  chosen_spanish: los lugares santos
  alternatives_spanish:
  - el santuario
  - el Lugar Santísimo
  lexicon: BDAG
  rationale: Se mantiene el plural sustantivado para no perder la amplitud del griego. 'Santuario' sería posible, pero borra la pluralidad; 'Lugar Santísimo' sería más específico de lo que la forma griega exige por sí sola.
- source_word: πρώτης σκηνῆς
  english_pob_choice: the first tabernacle
  chosen_spanish: la primera tienda
  alternatives_spanish:
  - el primer tabernáculo
  - la primera carpa
  lexicon: BDAG
  rationale: σκηνή significa literalmente 'tienda', y el contexto de Hebreos contrasta la primera estructura con el acceso posterior. 'Tienda' respeta la metáfora básica del griego; 'tabernáculo' es interpretativo y tradicional, pero menos directo.
- source_word: ἐχούσης στάσιν
  english_pob_choice: still has standing
  chosen_spanish: todavía tenía vigencia
  alternatives_spanish:
  - todavía permanecía en pie
  - todavía seguía en pie
  lexicon: BDAG
  rationale: στάσις aquí denota permanencia/estatus vigente más que simple posición física. 'Tenía vigencia' comunica mejor la idea de validez o subsistencia funcional en el argumento; se evita reducirlo solo a una imagen arquitectónica.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  lexicon: BDAG
  rationale: Marca duración continua. 'Todavía' encaja naturalmente con el imperfecto y con la relación temporal del participio genitivo.
theological_decisions:
- issue: Alcance de τῶν ἁγίων
  english_pob_reading: cultic sanctuary access rather than access to holy people
  chosen_spanish_reading: acceso a los lugares santos del recinto sagrado, no a personas santas
  alternative_spanish_readings:
  - acceso al santuario
  - acceso al Lugar Santísimo
  - camino de los santos
  rationale: El contexto inmediato trata de la disposición del tabernáculo y del acceso sacerdotal. Por eso se evita una lectura eclesial ('de los santos' como personas) y se conserva el valor cultual/espacial del texto.
  doctrine_reference: Hebreos 9:1-10; Translation philosophy §1, §3
- issue: Grado de especificidad del lugar sagrado
  english_pob_reading: holy places / sanctuary generally
  chosen_spanish_reading: lugares santos, con apertura a una referencia general al santuario
  alternative_spanish_readings:
  - Lugar Santísimo
  - santuario
  rationale: El plural griego permite una referencia más amplia que una sola cámara interna. La traducción mantiene esa amplitud para no resolver prematuramente una ambigüedad que el texto deja abierta.
  doctrine_reference: Translation philosophy §3
- issue: Valor de στάσις en la cláusula final
  english_pob_reading: while the first tabernacle still has standing
  chosen_spanish_reading: mientras la primera tienda todavía tenía vigencia
  alternative_spanish_readings:
  - mientras la primera tienda todavía permanecía en pie
  - mientras la primera tienda seguía en pie
  rationale: La frase puede sonar arquitectónica o jurídica/funcional. 'Vigencia' conserva la idea de subsistencia actual en el argumento de Hebreos sin perder el trasfondo del sistema antiguo.
  doctrine_reference: Hebreos 9:6-9; Translation philosophy §2
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del POB en inglés, que ajustó 'is indicating' a 'indicates'. Se mantuvo esa lectura verbal en español con 'indica' y se procuró conservar la ambigüedad cultual de τῶν ἁγίων sin estrecharla indebidamente. También se atendió al contraste entre la referencia espacial del culto y la expresión final de permanencia/validez de la primera σκηνή.
  spanish_consistency_notes:
  - Se usa 'Espíritu Santo' para πνεῦμα ἅγιον, conforme al referente personal divino.
  - Se prefiere 'lugares santos' para τὰ ἅγια/τῶν ἁγίων para conservar el plural cultual.
  - Se traduce σκηνή como 'tienda' para mantener la imagen literal del griego; se explica en nota la alternativa más tradicional 'tabernáculo'.
  - Se evita 'santos' como personas, porque el contexto es arquitectónico-cultual.
  - Se usa 'todavía' en la cláusula final para reproducir ἔτι con naturalidad en español.
