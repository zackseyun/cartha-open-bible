    reason: alternative_reading
  - marker: b
    text: O “mientras el primer tabernáculo todavía tiene vigencia”. La frase griega también puede expresar que seguía teniendo subsistencia o validez en ese momento.
    reason: lexical_alternative
  revision_rationale: Se ajustó el tiempo verbal para reflejar mejor el perfecto pasivo griego y la decisión del POB inglés ('aún no ha sido revelado'). Se sustituyó 'tienda' por 'tabernáculo' por fidelidad al contexto cultual de Hebreos 9. Se movió 'santuario' al texto principal por mayor naturalidad en español, preservando 'lugares santos' en nota para mantener la amplitud del griego. También se reemplazó 'tenía vigencia' por 'está en pie' como lectura principal, dejando la matización de vigencia/subsistencia en la nota.
