translation:
  language: es
  text: Por tanto, fue necesario que las [a]copias de las cosas en los cielos fueran [b]purificadas con estas, pero las cosas celestiales mismas con mejores sacrificios[c] que estas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'patrones' o 'representaciones' por 'copias'.
    reason: lexical_alternative
  - marker: b
    text: O 'ser limpiadas'. El verbo es lenguaje ritual de limpieza o purificación.
    reason: lexical_alternative
  - marker: c
    text: El griego dice 'mejores sacrificios' en plural, aunque el contexto de Hebreos se centra en la ofrenda única y definitiva del Mesías.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνάγκη
  english_pob_choice: it was necessary
  chosen_spanish: fue necesario
  alternatives_spanish:
  - era necesario
  - era imprescindible
  lexicon: BDAG
  rationale: La construcción impersonal griega se expresa de modo natural en español con 'fue necesario'. Mantiene el matiz de necesidad lógica del argumento sin volverlo más fuerte de lo que el texto dice.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: '''Por tanto'' conserva claramente la inferencia lógica y suena sobrio y lector-friendly en español bíblico moderno.'
- source_word: ὑποδείγματα
  english_pob_choice: copies
  chosen_spanish: copias
  alternatives_spanish:
  - modelos
  - patrones
  - representaciones
  lexicon: BDAG
  rationale: '''Copias'' reproduce la relación de correspondencia que el contexto establece entre las realidades terrenales y las celestiales, sin borrar la tensión semántica de ὑπόδειγμα.'
- source_word: τῶν ἐν τοῖς οὐρανοῖς τούτοις
  english_pob_choice: of the things in the heavens
  chosen_spanish: de las cosas en los cielos
  alternatives_spanish:
  - de las cosas celestiales
  - de las cosas en el cielo
  lexicon: BDAG
  rationale: Conservo 'en los cielos' para reflejar el plural de οὐρανοῖς y la formulación espacial del griego. 'Cielos' evita reducir el plural a un singular abstracto.
- source_word: καθαρίζεσθαι
  english_pob_choice: to be cleansed
  chosen_spanish: fueran purificadas
  alternatives_spanish:
  - fueran limpiadas
  - fueran limpiadas ritualmente
  lexicon: BDAG
  rationale: '''Purificadas'' deja ver el lenguaje ritual de καθαρίζω y encaja bien con el pasivo en español. ''Limpiadas'' sería posible, pero suena menos técnico en este contexto cultual.'
- source_word: αὐτὰ δὲ τὰ ἐπουράνια
  english_pob_choice: but the heavenly things themselves
  chosen_spanish: pero las cosas celestiales mismas
  alternatives_spanish:
  - pero las realidades celestiales mismas
  - pero las cosas en el cielo mismas
  lexicon: BDAG
  rationale: '''Las cosas celestiales mismas'' conserva el contraste con ''copias'' y mantiene el énfasis de αὐτά (''mismas''). No se paraphrasea a ''realidades'' para no interpretar de antemano.'
- source_word: κρείττοσι θυσίαις
  english_pob_choice: with better sacrifices
  chosen_spanish: con mejores sacrificios
  alternatives_spanish:
  - con sacrificios superiores
  lexicon: BDAG
  rationale: '''Mejores'' sigue el término técnico recurrente de Hebreos para κρείττων. Se preserva el plural ''sacrificios'' porque el griego lo usa y no conviene armonizarlo con otros pasajes.'
- source_word: παρὰ ταύτας
  english_pob_choice: than these
  chosen_spanish: que estas
  alternatives_spanish:
  - que aquellas
  - más que estas
  lexicon: BDAG
  rationale: En español, el comparativo con 'mejores' se expresa de forma más natural con 'que estas'. Mantiene la comparación sin añadir matices interpretativos.
theological_decisions:
- issue: ¿Cómo traducir el lenguaje de 'las cosas celestiales' que deben ser purificadas?
  english_pob_reading: 'Retain the text''s cultic language without explaining away the metaphor: ''the heavenly things themselves'' are said to be cleansed with better sacrifices.'
  chosen_spanish_reading: 'Conservar el lenguaje cultual sin suavizarlo: ''las cosas celestiales mismas'' son presentadas como purificadas con mejores sacrificios.'
  alternative_spanish_readings:
  - '''el santuario celestial'''
  - '''las realidades celestiales'''
  - parafrasear para evitar la idea de purificación celestial
  rationale: El griego contrapone abiertamente copias terrenales y cosas celestiales, usando lenguaje de purificación en ambos casos. La traducción española debe conservar esa tensión teológica en vez de resolverla por interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Plural de 'sacrificios'
  english_pob_reading: Keep the plural 'sacrifices' in the main text.
  chosen_spanish_reading: Mantener el plural 'sacrificios' en el texto principal.
  alternative_spanish_readings:
  - '''sacrificio'' en singular'
  - '''ofrenda'''
  rationale: La forma griega θυσίαις es plural. Respetar el plural preserva la primacía del original y evita armonizar el versículo con la teología de la ofrenda única de Cristo expresada en otros lugares.
  doctrine_reference: Translation philosophy §1 and §5.
translation_notes:
  revision_awareness: 'La revisión más reciente no cambió el contenido: el texto se mantiene en alto acuerdo con el original y con el auditoría inglesa, sin ajustes pendientes.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el plural 'cielos' para reflejar οὐρανοῖς.
  - '''Purificadas'' se usa como término cultual, no meramente higiénico.'
  - '''Mejores'' traduce κρείττοσι según el uso técnico de Hebreos.'
