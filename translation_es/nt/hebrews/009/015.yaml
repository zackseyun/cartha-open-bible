  text: Καὶ διὰ τοῦτο διαθήκης καινῆς μεσίτης ἐστίν, ὅπως θανάτου γενομένου εἰς ἀπολύτρωσιν τῶν ἐπὶ τῇ πρώτῃ διαθήκῃ παραβάσεων τὴν ἐπαγγελίαν λάβωσιν οἱ κεκλημένοι τῆς αἰωνίου κληρονομίας.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/009/015.yaml
  text: And for this reason he is the mediator of a new covenant[a], so that, since a death has occurred for the redemption of the transgressions committed under the first covenant, those who have been called may receive the promise of the eternal inheritance.
  footnotes:
  - marker: a
    text: Or 'testament' for 'covenant'; the Greek word διαθήκη can bear both senses, and Hebrews 9:16–17 develops that overlap, though 'covenant' best fits the contrast with the first covenant in this verse.
