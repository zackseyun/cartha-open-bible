translation:
  language: es
  text: Y por esta razón es mediador de un nuevo pacto[a], para que, ya que ocurrió una muerte para la redención de las transgresiones cometidas bajo el primer pacto, los que han sido llamados reciban la promesa de la herencia eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testamento» para διαθήκη; el término griego puede abarcar ambos sentidos, y Hebreos 9:16–17 desarrolla ese cruce semántico, aunque «pacto» encaja mejor con el contraste con el primer pacto en este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por eso
  - por tanto
  lexicon: BDAG
  rationale: Expresa de modo natural en español la relación causal y argumentativa con el contexto anterior, sin volverlo una mera conclusión lógica impersonal.
- source_word: διαθήκης καινῆς
  english_pob_choice: of a new covenant
  chosen_spanish: de un nuevo pacto
  alternatives_spanish:
  - de un nuevo testamento
  lexicon: BDAG
  rationale: «Pacto» mantiene el contraste del pasaje con el «primer pacto» y conserva la tensión semántica de διαθήκη sin anticipar indebidamente el juego de 9:16–17.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - árbitro
  lexicon: BDAG
  rationale: Es el equivalente más preciso y transparente para la función de uno que actúa entre dos partes en el marco del pacto.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce con claridad la finalidad o resultado del enunciado previo, con una construcción natural en español.
- source_word: θανάτου γενομένου
  english_pob_choice: since a death has occurred
  chosen_spanish: habiendo ocurrido una muerte
  alternatives_spanish:
  - puesto que ha ocurrido una muerte
  - después de haberse producido una muerte
  lexicon: BDAG
  rationale: La construcción participial se refleja de manera fiel y fluida; evita introducir una causalidad más fuerte que la que el griego exige.
- source_word: ἀπολύτρωσιν
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» conserva el peso sacrificial y soteriológico del contexto de Hebreos mejor que opciones más generales.
- source_word: τῶν ἐπὶ τῇ πρώτῃ διαθήκῃ παραβάσεων
  english_pob_choice: of the transgressions committed under the first covenant
  chosen_spanish: de las transgresiones cometidas bajo el primer pacto
  alternatives_spanish:
  - de las transgresiones bajo el primer pacto
  - de las violaciones asociadas con el primer pacto
  lexicon: BDAG
  rationale: «Bajo» comunica bien la esfera del pacto. «Cometidas» explicita en español la relación de las transgresiones con esa esfera, como hace la versión inglesa auditada.
- source_word: τὴν ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  lexicon: BDAG
  rationale: El singular se mantiene; en el contexto se refiere a la promesa ligada a la herencia, no a una pluralidad de promesas.
- source_word: λάβωσιν
  english_pob_choice: may receive
  chosen_spanish: reciban
  alternatives_spanish:
  - puedan recibir
  - obtengan
  lexicon: BDAG
  rationale: Después de «para que», el subjuntivo presente en español expresa adecuadamente el resultado deseado o previsto.
- source_word: οἱ κεκλημένοι
  english_pob_choice: those who have been called
  chosen_spanish: los que han sido llamados
  alternatives_spanish:
  - los llamados
  - los que son llamados
  lexicon: BDAG
  rationale: 'Conserva el valor de perfecto pasivo: personas en el estado de haber sido llamadas, sin volver la frase demasiado técnica.'
- source_word: τῆς αἰωνίου κληρονομίας
  english_pob_choice: of the eternal inheritance
  chosen_spanish: de la herencia eterna
  alternatives_spanish:
  - de la herencia perpetua
  - de la herencia de siempre
  lexicon: BDAG
  rationale: «Herencia eterna» reproduce con naturalidad la fuerza durativa y escatológica del genitivo.
theological_decisions:
- issue: Sentido de διαθήκη en este versículo
  english_pob_reading: Rendered as 'covenant' in the main text, with 'testament' footnoted as an alternative.
  chosen_spanish_reading: «Pacto» en el texto principal, con nota de alternativa semántica.
  alternative_spanish_readings:
  - «Testamento»
  rationale: En este versículo el contraste con el «primer pacto» domina; por eso «pacto» es la mejor opción principal. La posibilidad de «testamento» debe quedar visible por la ambigüedad reconocida del término y su desarrollo inmediato en Hebreos 9:16–17.
  doctrine_reference: Translation philosophy §3 (preserve theological tension)
- issue: Referencia del sujeto implícito en ἐστίν
  english_pob_reading: Rendered explicitly as 'he is' referring to Messiah/Jesus from the immediate context.
  chosen_spanish_reading: «es» con sujeto implícito claramente referido al Mesías/Jesús del contexto inmediato.
  alternative_spanish_readings:
  - «él es»
  rationale: El español permite omitir el pronombre personal sin pérdida de claridad. Así se evita añadir énfasis innecesario y se conserva la fluidez natural del texto.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish) and §1 (source-language primacy)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español en la palabra «pacto». La redacción principal mantiene la lectura source-grounded y la nota conserva la alternativa semántica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto para el nombre divino cuando aparezca; no aplica en este versículo.
  - Se mantiene «pacto» para διαθήκη en el texto principal, coherente con el contraste interno de Hebreos 9.
  - «Redención», «mediador», «herencia eterna» y «los que han sido llamados» siguen el registro doctrinal y léxico del POB en español.
  - El orden sintáctico busca ser natural en español sin introducir interpretaciones adicionales.
