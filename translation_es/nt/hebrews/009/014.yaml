    rationale: πόσῳ μᾶλλον es una fórmula comparativa de argumento a fortiori, no una exclamación independiente. En español, «cuánto más» o «cuánto más ...» sin signos de exclamación suena más fiel al flujo sintáctico con el versículo anterior.
  - severity: medium
    issue: La nota al pie está anclada en «limpiará[a]» en lugar de la frase ambigua «por el Espíritu eterno».
    rationale: La alternativa «por un espíritu eterno» corresponde léxica y teológicamente a διὰ πνεύματος αἰωνίου, no al verbo καθαριεῖ. El anclaje actual puede confundir al lector sobre qué elemento del texto tiene la variante.
  revised_spanish_text: cuánto más la sangre del Mesías, quien por el Espíritu eterno[a] se ofreció a sí mismo sin mancha a Dios, limpiará nuestra conciencia de obras muertas para servir al Dios vivo.
