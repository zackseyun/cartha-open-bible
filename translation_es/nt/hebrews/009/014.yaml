source:
  edition: SBLGNT
  text: πόσῳ μᾶλλον τὸ αἷμα τοῦ Χριστοῦ, ὃς διὰ πνεύματος αἰωνίου ἑαυτὸν προσήνεγκεν ἄμωμον τῷ θεῷ, καθαριεῖ τὴν συνείδησιν ⸀ἡμῶν ἀπὸ νεκρῶν ἔργων εἰς τὸ λατρεύειν θεῷ ζῶντι.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/009/014.yaml
  text: how much more will the blood of Messiah—who through the eternal Spirit offered himself without blemish to God—cleanse our conscience from dead works to serve the living God[a].
  footnotes:
  - marker: a
    text: Or 'through an eternal spirit.' The Greek phrase may be read more generally, though 'the eternal Spirit' is taken here as a reference to the Holy Spirit.
    reason: alternative_reading
