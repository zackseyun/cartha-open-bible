    changes_summary: 'Changed ''Messiah'' to ''Christ'' for more natural English and consistency with standard rendering of Χριστοῦ in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: cuánto más la sangre del Mesías, quien por el Espíritu eterno[a] se ofreció a sí mismo sin mancha a Dios, limpiará nuestra conciencia de obras muertas para servir al Dios vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un espíritu eterno». La frase griega puede entenderse de manera más general; aquí se toma como referencia al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¡Cuánto más
  alternatives_spanish:
  - ¡Cuánto más aún
  - Mucho más
  lexicon: BDAG
  rationale: Es la fórmula comparativa de argumento a fortiori; en español, «¡Cuánto más» conserva la fuerza retórica natural sin volverla mecánica.
- source_word: τὸ αἷμα
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - su sangre
  lexicon: BDAG
  rationale: «Sangre» mantiene el sentido literal y sacrificial del término en Hebreos; no conviene suavizarlo.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se conserva el título mesiánico según la política terminológica del proyecto. En este contexto Χριστός funciona como título, no como mero nombre propio.
- source_word: διὰ πνεύματος αἰωνίου
  english_pob_choice: through the eternal Spirit
  chosen_spanish: por el Espíritu eterno
  alternatives_spanish:
  - por un espíritu eterno
  - mediante el Espíritu eterno
  lexicon: BDAG
  rationale: «Espíritu» con mayúscula refleja la lectura personal/divina adoptada en el POB inglés, mientras que la preposición «por» comunica bien la mediación del acto sacrificial en español.
- source_word: ἑαυτὸν προσήνεγκεν
  english_pob_choice: offered himself
  chosen_spanish: se ofreció a sí mismo
  alternatives_spanish:
  - se presentó a sí mismo
  - ofreció a sí mismo
  lexicon: BDAG
  rationale: El contexto cultual pide «ofrecer»; el reflexivo español expresa con claridad la iniciativa y el objeto de la ofrenda.
- source_word: ἄμωμον
  english_pob_choice: without blemish
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - inmaculado
  lexicon: BDAG
  rationale: «Sin mancha» es idiomático y apto para el lenguaje sacrificial; evita una paráfrasis más interpretativa.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: La dativa de destinatario se rinde de forma directa como «a Dios».
- source_word: καθαριεῖ
  english_pob_choice: will cleanse
  chosen_spanish: limpiará
  alternatives_spanish:
  - purificará
  - limpiará completamente
  lexicon: BDAG
  rationale: El futuro verbal se preserva explícitamente. «Limpiar» comunica bien la imagen de purificación de conciencia sin introducir tecnicismos innecesarios.
- source_word: συνείδησιν
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  - interior moral
  lexicon: BDAG
  rationale: «Conciencia» es el equivalente estándar y preciso en español bíblico para el ámbito moral interior.
- source_word: νεκρῶν ἔργων
  english_pob_choice: dead works
  chosen_spanish: obras muertas
  alternatives_spanish:
  - obras de muerte
  - obras muertas espiritualmente
  lexicon: BDAG
  rationale: La traducción literal preserva la densidad teológica y la conexión con Hebreos 6:1 y 9:14.
- source_word: εἰς τὸ λατρεύειν
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para adorar
  - para ejercer servicio
  lexicon: BDAG
  rationale: «Para servir» funciona bien como infinitivo de propósito y conserva la amplitud cultual de λατρεύω sin estrecharlo indebidamente a «adorar».
- source_word: θεῷ ζῶντι
  english_pob_choice: the living God
  chosen_spanish: al Dios vivo
  alternatives_spanish:
  - al Dios que vive
  - al Dios viviente
  lexicon: BDAG
  rationale: «Dios vivo» es la expresión bíblica natural en español; el artículo contraído respeta el sintagma definido.
theological_decisions:
- issue: Referente de πνεύματος αἰωνίου
  english_pob_reading: the Holy Spirit is intended, rendered 'the eternal Spirit'
  chosen_spanish_reading: «el Espíritu eterno» sugiere el Espíritu Santo, sin cerrar por completo la ambigüedad gramatical
  alternative_spanish_readings:
  - «un espíritu eterno»
  - «un espíritu imperecedero»
  rationale: La frase griega admite una lectura más general, pero el contexto sacrificial y la tradición cristiana favorecen la referencia al Espíritu Santo. Se conserva la lectura fuerte sin ocultar que existe una alternativa real.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Renderización de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue el criterio del proyecto de traducir Χριστός como título cuando corresponde. Aquí el genitivo es titular y «Mesías» evita la mera transliteración eclesiástica.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El paquete inglés muestra una corrección entre «Christ» y «Messiah» en la revisión, con restauración final de «Messiah». En español se adopta coherentemente «Mesías» para Χριστοῦ, de acuerdo con la política terminológica y sin depender de la fluctuación inglesa. También se conserva la ambigüedad de πνεύματος αἰωνίου mediante nota alternativa.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός como título; no se emplea «Cristo» en el texto principal.
  - Se mantiene la distinción entre «Espíritu» y «espíritu» en la nota, porque el griego permite ambas lecturas.
  - «Obras muertas» reproduce el sintagma literal y debe leerse a la luz del uso de Hebreos, no como simple moralismo.
  - «Al Dios vivo» conserva la formulación bíblica natural en español y la definitud contextual de θεῷ ζῶντι.
