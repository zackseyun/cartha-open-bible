translation:
  language: es
  text: Pero en la segunda parte[a], solo el sumo sacerdote entra una vez al año, y no sin sangre[b], la cual ofrece por sí mismo y por los pecados del pueblo cometidos por ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la segunda tienda' o 'la segunda sección', en referencia a la parte interior del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O 'los pecados no intencionales del pueblo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς δὲ τὴν δευτέραν
  english_pob_choice: But into the second room
  chosen_spanish: Pero en la segunda parte
  alternatives_spanish:
  - Pero en la segunda habitación
  - Pero en el segundo compartimiento
  - Pero en la segunda tienda
  lexicon: BDAG
  rationale: El griego alude a la segunda sección del tabernáculo en el contraste inmediato del contexto. En español, 'segunda parte' conserva la oposición espacial sin forzar un sustantivo no explícito en el texto base. 'Habitación' o 'compartimiento' serían posibles, pero 'parte' fluye mejor en español y sigue siendo fiel al contraste del pasaje.
- source_word: ἅπαξ τοῦ ἐνιαυτοῦ
  english_pob_choice: once a year
  chosen_spanish: una vez al año
  alternatives_spanish:
  - una vez por año
  - una vez cada año
  - anualmente
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural del genitivo de tiempo. Mantiene la frecuencia anual sin calco rígido.
- source_word: μόνος ὁ ἀρχιερεύς
  english_pob_choice: only the high priest
  chosen_spanish: solo el sumo sacerdote
  alternatives_spanish:
  - el sumo sacerdote solamente
  - el sumo sacerdote solo
  lexicon: BDAG
  rationale: '''Solo'' reproduce la exclusividad de μόνος de manera clara y natural. ''Sumo sacerdote'' es la forma española estable para ἀρχιερεύς en contexto cultual judío.'
- source_word: οὐ χωρὶς αἵματος
  english_pob_choice: and not without blood
  chosen_spanish: y no sin sangre
  alternatives_spanish:
  - y no sin derramamiento de sangre
  - y nunca sin sangre
  lexicon: BDAG
  rationale: La litotes se conserva de forma directa. 'Sangre' se mantiene por su fuerza sacrificial; añadir 'derramamiento' explicitaría más de lo que el griego dice aquí.
- source_word: ὃ προσφέρει
  english_pob_choice: which he offers
  chosen_spanish: la cual ofrece
  alternatives_spanish:
  - que ofrece
  - que presenta como ofrenda
  lexicon: BDAG
  rationale: El referente implícito es la sangre, y en español 'la cual ofrece' mantiene el vínculo gramatical con el antecedente sin ambigüedad. 'Ofrece' conserva el sentido sacrificial de προσφέρει.
- source_word: ὑπὲρ ἑαυτοῦ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - por él mismo
  - en favor de sí mismo
  lexicon: BDAG
  rationale: En español, 'por sí mismo' comunica bien el beneficio/representación del contexto sacrificial. 'Por sí mismo' también conserva la reflexividad del griego sin sonar forzado.
- source_word: τῶν τοῦ λαοῦ ἀγνοημάτων
  english_pob_choice: the people's sins committed in ignorance
  chosen_spanish: las faltas de ignorancia del pueblo
  alternatives_spanish:
  - los pecados del pueblo cometidos por ignorancia
  - las faltas involuntarias del pueblo
  lexicon: BDAG
  rationale: ἀγνοήματα puede referirse a faltas o pecados cometidos por ignorancia. 'Faltas de ignorancia' conserva la tensión entre el aspecto moral y el matiz de no haber conocido plenamente. Se evita resolver demasiado rápido la frase como si fuera solo 'errores' sin carga ética.
theological_decisions:
- issue: Alcance de ἀγνοήματα en contexto sacrificial
  english_pob_reading: Rendered as 'sins committed in ignorance'
  chosen_spanish_reading: '''faltas de ignorancia'''
  alternative_spanish_readings:
  - '''pecados cometidos por ignorancia'''
  - '''faltas involuntarias'''
  rationale: El término no describe mera falta de información neutral, sino ofensas con peso moral vinculadas al sistema sacrificial. 'Faltas de ignorancia' preserva esa tensión sin introducir una distinción doctrinal posterior que el versículo no explicita.
  doctrine_reference: Hebreos 9:7; Levítico 4 y 16 como trasfondo sacrificial
- issue: Referencia espacial de 'la segunda'
  english_pob_reading: '''the second room'' with note: ''Or the second tent'' or ''the second section'''
  chosen_spanish_reading: '''la segunda parte'' con nota alternativa'
  alternative_spanish_readings:
  - '''la segunda tienda'''
  - '''la segunda sección'''
  - '''la segunda habitación'''
  rationale: El contexto de Hebreos 9:2–3 muestra que la expresión remite a la segunda división del tabernáculo. 'Parte' es suficientemente amplio para no decidir más de lo que el griego dice, y la nota conserva las alternativas relevantes donde el español podría inclinarse de otro modo.
  doctrine_reference: Hebreos 9:2–3; estructura del tabernáculo
- issue: Valor de 'sin sangre'
  english_pob_reading: '''not without blood'''
  chosen_spanish_reading: '''y no sin sangre'''
  alternative_spanish_readings:
  - '''sin derramamiento de sangre'''
  - '''nunca sin sangre'''
  rationale: La doble negación del griego debe conservarse porque refuerza el carácter sacrificial del acceso del sumo sacerdote. Traducirla como una simple afirmación positiva suavizaría demasiado la forma retórica del texto.
  doctrine_reference: Hebreos 9:7; teología sacrificial
translation_notes:
  revision_awareness: Se revisó el lenguaje para mantener la referencia espacial del tabernáculo sin imponer un término más específico que el griego no exige. También se preservó la litotes 'no sin sangre' y la ambigüedad controlada de ἀγνοήματα, siguiendo el audit trail inglés y evitando una paráfrasis doctrinalmente cerrada.
  spanish_consistency_notes:
  - Se mantuvo 'sumo sacerdote' para ἀρχιερεύς, coherente con terminología bíblica española estable en contexto judío.
  - Se usó 'sangre' de manera directa, como en el griego y en la traducción inglesa auditada, sin añadir 'derramamiento' en el texto principal.
  - '''Faltas de ignorancia'' conserva la tensión semántica entre pecado y desconocimiento, evitando reducir ἀγνοήματα a simples errores.'
  - Las notas a pie de página reproducen las alternativas lexicais documentadas por el POB en inglés, adaptadas a opciones naturales en español.
