    rationale: Aunque intenta conservar la tensión semántica, en español resulta poco natural y no expresa tan claramente ofensas moralmente culpables cometidas en ignorancia. La evidencia fuente y el audit trail favorecen 'pecados ... cometidos por ignorancia' o 'pecados no intencionales'.
  - severity: low
