revisions:
- from: Pues cuando se hubo dicho toda la ordenanza conforme a la ley por medio de Moisés a todo el pueblo, tomó la sangre de los becerros[a], con agua, lana escarlata e hisopo, y roció tanto el mismo libro como a todo el pueblo.
  to: Pues cuando todo mandamiento conforme a la ley había sido proclamado por Moisés a todo el pueblo, tomó la sangre de los becerros[a] con agua y lana escarlata e hisopo, y roció tanto el rollo mismo como a todo el pueblo.
  rationale: 'Se ajusta el texto para reflejar con mayor fidelidad el griego y las decisiones auditadas del POB: se restituye el valor distributivo de ἐντολή con “todo mandamiento”, el agente simple de ὑπό con “por Moisés”, y la forma material de βιβλίον con “rollo”. También se suaviza la sintaxis para una lectura española más natural y se conserva la nota léxica sobre μόσχων.'
  reviewer_model: gpt-5.4
