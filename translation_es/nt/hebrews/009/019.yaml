translation:
  language: es
  text: Pues cuando todo mandamiento conforme a la ley había sido proclamado por Moisés a todo el pueblo, tomó la sangre de los becerros[a] con agua y lana escarlata e hisopo, y roció tanto el rollo mismo como a todo el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “toros jóvenes”. El griego μόσχων puede referirse a becerros o a toros jóvenes en contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαληθείσης ... πάσης ἐντολῆς
  english_pob_choice: when every commandment ... had been spoken
  chosen_spanish: cuando se hubo dicho toda la ordenanza
  alternatives_spanish:
  - cuando se hubieron dicho todos los mandamientos
  - después de haber sido dicha toda la ordenanza
  lexicon: BDAG
  rationale: El genitivo absoluto se expresa naturalmente en español con una cláusula temporal pasada. ἐντολή aquí puede ser “mandamiento” u “ordenanza”; dado el contexto cultual y la referencia a la ley, “ordenanza” comunica bien el conjunto de instrucciones sin perder el sentido normativo distributivo de πάσης.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - de acuerdo con la ley
  - según la ley
  lexicon: BDAG
  rationale: κατά con acusativo indica conformidad. “Conforme a la ley” es idiomático en español y conserva la relación normativa sin sonar forzado.
- source_word: ὑπὸ Μωϋσέως
  english_pob_choice: by Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por Moisés
  - por mano de Moisés
  lexicon: BDAG
  rationale: Aunque ὑπό con genitivo marca agente, en español “por medio de Moisés” conserva la mediación histórica del acto proclamado y funciona con mayor naturalidad en este contexto narrativo.
- source_word: παντὶ τῷ λαῷ
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a todo el pueblo reunido
  - al conjunto del pueblo
  lexicon: BDAG
  rationale: La dative con πᾶς expresa totalidad de destinatarios. “Pueblo” traduce bien λαός en un contexto corporativo e histórico.
- source_word: τὸ αἷμα τῶν μόσχων
  english_pob_choice: the blood of the calves
  chosen_spanish: la sangre de los becerros
  alternatives_spanish:
  - la sangre de los terneros
  - la sangre de los toros jóvenes
  lexicon: BDAG
  rationale: μόσχος admite “ternero/becerro” o “toro joven” según contexto sacrificial. “Becerros” es una opción bíblica clara y natural en español, y mantiene el carácter sacrificial sin sobreespecificar.
- source_word: μετὰ ὕδατος καὶ ἐρίου κοκκίνου καὶ ὑσσώπου
  english_pob_choice: with water and scarlet wool and hyssop
  chosen_spanish: con agua, lana escarlata e hisopo
  alternatives_spanish:
  - con agua y lana escarlata e hisopo
  - con agua y lana carmesí e hisopo
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento/instrumento. ἔριον es “lana”; κοκκίνου se rinde como “escarlata” para conservar el color ritual. La coordinación en español fluye mejor con una enumeración simple.
- source_word: αὐτό τε τὸ βιβλίον
  english_pob_choice: both the scroll itself
  chosen_spanish: el mismo libro
  alternatives_spanish:
  - el rollo mismo
  - el libro mismo
  lexicon: BDAG
  rationale: βιβλίον en este contexto alude al documento escrito del pacto. Aunque “rollo” refleja mejor la forma material antigua, la tradición castellana entiende bien “libro”; el énfasis de αὐτό se conserva con “el mismo”.
- source_word: καὶ πάντα τὸν λαὸν
  english_pob_choice: and all the people
  chosen_spanish: y a todo el pueblo
  alternatives_spanish:
  - y al pueblo entero
  - y a todo el pueblo allí reunido
  lexicon: BDAG
  rationale: El acusativo objeto de ἐράντισεν se mantiene con la preposición “a”. “Todo el pueblo” preserva la amplitud del gesto ritual.
- source_word: ἐράντισεν
  english_pob_choice: sprinkled
  chosen_spanish: roció
  alternatives_spanish:
  - asperjó
  - esparció
  lexicon: BDAG
  rationale: ῥαντίζω es un verbo ritual de aspersión/salpicadura. “Roció” es comprensible en español moderno; “asperjó” sería más técnico, pero menos natural para lectura pública.
theological_decisions:
- issue: La designación de μόσχων en un contexto sacrificial
  english_pob_reading: Translate the Greek as written without harmonizing to the OT source beyond what the text states.
  chosen_spanish_reading: Traducir el griego tal como está, sin armonizarlo con el relato del Antiguo Testamento más allá de lo que el texto dice.
  alternative_spanish_readings:
  - traducir como “toros jóvenes” para ajustar el lenguaje sacrificial
  - explicar en el texto el trasfondo de Éxodo 24
  rationale: Hebreos presenta una recapitulación condensada; la traducción no debe sustituir el término griego por una reconstrucción del pasaje de fondo. Se conserva una nota alternativa para no ocultar la ambigüedad léxica.
  doctrine_reference: 'Principios de la traducción POB: transparencia textual, equivalencia óptima, no armonización indebida'
- issue: El valor de αὐτό τε τὸ βιβλίον
  english_pob_reading: both the scroll itself
  chosen_spanish_reading: el mismo libro
  alternative_spanish_readings:
  - el rollo mismo
  - el libro mismo también
  rationale: El texto subraya el objeto ritual por su identidad (“el mismo”). En español, “el mismo libro” conserva esa fuerza sin introducir un término demasiado técnico que podría dificultar la lectura pública.
  doctrine_reference: 'Principios de la traducción POB: claridad sin perder precisión histórica'
translation_notes:
  revision_awareness: 'Se revisó el borrador a la luz del texto griego SBLGNT y del audit trail inglés. No se detectaron cambios revisionales relevantes en la fuente inglesa reciente; la decisión principal se mantuvo estable: conservar la ambigüedad de μόσχων con una nota léxica y traducir el resto de manera directa pero idiomática en español.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma proyectual, pero este versículo no la exige explícitamente.
  - Se evitó “SEÑOR” porque no aparece el tetragrámaton ni κύριος en este verso.
  - “Pueblo” se usó consistentemente para λαός.
  - La puntuación y la sintaxis se adaptaron a lectura pública en español sin alterar la secuencia narrativa del griego.
