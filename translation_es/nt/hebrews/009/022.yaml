translation:
  language: es
  text: Y según la ley, casi todo es purificado con sangre, y sin derramamiento de sangre no hay perdón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «remisión»: el término griego puede denotar liberación o perdón; aquí se refiere al perdón de los pecados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σχεδόν
  english_pob_choice: almost
  chosen_spanish: casi
  alternatives_spanish:
  - casi que
  - casi todo
  lexicon: BDAG
  rationale: El adverbio atenúa la generalización; «casi» es la equivalencia natural en español y conserva que la afirmación no es absoluta.
- source_word: ἐν αἵματι
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - en sangre
  - por sangre
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», el sentido instrumental es el que mejor comunica el medio ritual en español. «Con sangre» evita un calco forzado y mantiene la fuerza cultual.
- source_word: πάντα
  english_pob_choice: almost everything
  chosen_spanish: casi todo
  alternatives_spanish:
  - casi todas las cosas
  - casi todo lo demás
  lexicon: BDAG
  rationale: El plural neutro tiene valor generalizador. «Casi todo» reproduce bien el alcance amplio de la frase sin volverla pesada en español.
- source_word: καθαρίζεται
  english_pob_choice: is cleansed
  chosen_spanish: es purificado
  alternatives_spanish:
  - es limpiado
  - es очищado
  lexicon: BDAG
  rationale: En el contexto levítico-cultual, «purificado» comunica mejor la dimensión ritual que «limpiado», y en español suena natural y reverente.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: según la ley
  alternatives_spanish:
  - de acuerdo con la ley
  - conforme a la ley
  lexicon: BDAG
  rationale: «Según la ley» expresa adecuación normativa de modo claro y idiomático. Conserva la referencia al sistema legal mosaico sin sobreinterpretarlo.
- source_word: χωρὶς
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - aparte de
  lexicon: BDAG
  rationale: «Sin» es la privación directa y natural en español para una formulación sentenciosa.
- source_word: αἱματεκχυσίας
  english_pob_choice: the shedding of blood
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - efusión de sangre
  - sangre derramada
  lexicon: BDAG
  rationale: El sustantivo compuesto remite al acto de derramar sangre, especialmente en contexto sacrificial. «Derramamiento de sangre» es la expresión española establecida y exacta.
- source_word: οὐ γίνεται
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no ocurre
  - no se produce
  lexicon: BDAG
  rationale: Con el sustantivo abstracto ἄφεσις, el griego expresa una afirmación existencial/resultativa. «No hay» reproduce bien ese valor en español.
- source_word: ἄφεσις
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - remisión
  - liberación
  lexicon: BDAG
  rationale: En este contexto sacrificial, ἄφεσις apunta al perdón/remisión de los pecados. «Perdón» es claro y bíblico en español; «remisión» queda como alternativa lexical válida pero menos transparente para lectores generales.
theological_decisions:
- issue: Valor de ἄφεσις en el argumento de Hebreos
  english_pob_reading: forgiveness
  chosen_spanish_reading: perdón
  alternative_spanish_readings:
  - remisión
  rationale: El pasaje formula un principio teológico dentro del argumento sacerdotal y sacrificial de Hebreos. «Perdón» comunica con claridad la idea de absolución/indulto de la culpa sin imponer jerga eclesiástica. Se conserva «remisión» como alternativa léxica, pero no como lectura principal por claridad para el lector moderno.
  doctrine_reference: Translation philosophy §6 (Spanish readable modern but dignified, no liturgical masking)
translation_notes:
  revision_awareness: La revisión más reciente del testigo inglés no introdujo cambios; el acuerdo de revisión se reporta como alto. La redacción española sigue de cerca el texto griego y el análisis auditado en inglés, sin necesidad de correcciones adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto cuando corresponda al nombre divino, pero aquí el griego emplea νόμος y no requiere ese término.
  - Se evitó «Cristo» porque no aparece en el versículo.
  - Se mantuvo el registro cultual con «purificado» y «derramamiento de sangre» para conservar la resonancia sacrificial del contexto de Hebreos.
  - La nota al pie solo marca la ambigüedad de ἄφεσις, que el inglés POB también documenta como alternativa léxica.
