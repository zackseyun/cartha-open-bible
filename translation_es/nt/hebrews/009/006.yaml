  text: Τούτων δὲ οὕτως κατεσκευασμένων, εἰς μὲν τὴν πρώτην σκηνὴν διὰ παντὸς εἰσίασιν οἱ ἱερεῖς τὰς λατρείας ἐπιτελοῦντες,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/009/006.yaml
  text: Now with these things prepared in this way[a], the priests continually enter the first tabernacle, performing the services[b],
