translation:
  language: es
  text: Ahora bien, con estas cosas preparadas de esta manera, los sacerdotes entran continuamente en el primer tabernáculo[a], realizando los servicios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la primera tienda» o «la primera habitación». El griego σκηνή puede denotar el tabernáculo mismo o, en este contexto, su primera sección.
    reason: lexical_alternative
  - marker: b
    text: O «realizando los actos de adoración» o «cumpliendo las labores rituales».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτων δὲ οὕτως κατεσκευασμένων
  english_pob_choice: Now with these things prepared in this way
  chosen_spanish: Ahora bien, con estas cosas preparadas de esta manera
  alternatives_spanish:
  - Ahora, con estas cosas así preparadas
  - Pues, una vez preparadas estas cosas de este modo
  lexicon: BDAG; valor de genitivo absoluto y δέ como transición suave
  rationale: El genitivo absoluto introduce la circunstancia previa. «Preparadas» conserva el sentido de κατεσκευασμένων sin volverlo más técnico que el contexto. «Ahora bien» mantiene el matiz transicional de δὲ con fluidez en español.
- source_word: τὴν πρώτην σκηνὴν
  english_pob_choice: the first tabernacle
  chosen_spanish: la primera tienda
  alternatives_spanish:
  - el primer tabernáculo
  - la primera sección
  - la primera habitación
  lexicon: BDAG; σκηνή en Hebreos 9
  rationale: En este contexto σκηνή puede referirse al tabernáculo o a su primera división. Se eligió «tienda» porque refleja el valor básico de σκηνή y permite conservar la ambigüedad contextual que el inglés POB anotó; en nota se preservan las opciones interpretativas. «Tabernáculo» sería posible, pero estrecha la imagen hacia un término más técnico.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de manera constante
  - sin cesar
  lexicon: BDAG; expresión idiomática de continuidad habitual
  rationale: «Continuamente» reproduce la idea de práctica regular y repetida, no de presencia ininterrumpida. En español suena natural y mantiene el contraste con el acceso limitado del sumo sacerdote en el versículo siguiente.
- source_word: εἰσίασιν
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - entran en
  - ingresan
  - van entrando
  lexicon: BDAG; presente histórico/habitual
  rationale: El presente indicativo expresa acción habitual. «Entran» es natural en español y suficiente sin añadir perífrasis innecesarias.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los ministros
  lexicon: BDAG; contraste con el sumo sacerdote en el contexto inmediato
  rationale: «Sacerdotes» conserva el contraste cultual con el sumo sacerdote de la sección siguiente. «Presbíteros» o «ministros» introducirían un vocabulario eclesial ajeno al contexto levítico.
- source_word: τὰς λατρείας
  english_pob_choice: the services
  chosen_spanish: los servicios
  alternatives_spanish:
  - los actos de adoración
  - las labores rituales
  - las ministraciones
  lexicon: BDAG; λατρεία como servicio cultual
  rationale: «Servicios» es la opción más sobria y auditiva en español para las funciones cultuales regulares. Se evita «adoración» porque puede reducir indebidamente el aspecto ministerial; «ministraciones» es más técnico y menos transparente.
- source_word: ἐπιτελοῦντες
  english_pob_choice: performing
  chosen_spanish: realizando
  alternatives_spanish:
  - cumpliendo
  - efectuando
  - desempeñando
  lexicon: BDAG; participio modal que modifica a «los sacerdotes»
  rationale: «Realizando» comunica la ejecución efectiva de las funciones prescritas. Se mantiene una relación directa con «servicios» sin sonar forzado; «cumpliendo» podría funcionar, pero añade un matiz normativo más fuerte que el del griego en sí.
theological_decisions:
- issue: Cómo traducir σκηνή en Hebreos 9:6
  english_pob_reading: the first tabernacle; lexical note allows 'the first tent' or 'the first room'
  chosen_spanish_reading: la primera tienda
  alternative_spanish_readings:
  - el primer tabernáculo
  - la primera sección
  - la primera habitación
  rationale: Hebreos 9 desarrolla el santuario mosaico y sus compartimentos. La expresión española debe dejar abierto si se trata del tabernáculo como conjunto o de su primera división. «Tienda» preserva el valor básico de la palabra y mantiene viva la ambigüedad documentada por el POB inglés.
  doctrine_reference: Fil 2; Hb 9:2-7; principio de fidelidad al contexto cultual
- issue: La continuidad de διὰ παντός
  english_pob_reading: continually
  chosen_spanish_reading: continuamente
  alternative_spanish_readings:
  - siempre
  - regularmente
  rationale: El pasaje contrasta el acceso constante de los sacerdotes ordinarios con el acceso restringido del sumo sacerdote. «Continuamente» expresa una práctica habitual y repetida sin sugerir presencia física ininterrumpida dentro del santuario.
  doctrine_reference: Hebreos 9:6-7; contraste tipológico del ministerio levítico
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés que prefirió ‘performing the services’ frente a ‘carrying out the services’. En español se optó por «realizando los servicios» como equivalente natural y formal, manteniendo la misma decisión de fondo: τὰς λατρείας se refiere a funciones cultuales regulares, no a ‘adoración’ en sentido genérico. También se conservó la apertura semántica de σκηνή documentada en la nota inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se preservó el contraste cultual propio de Hebreos entre sacerdotes ordinarios y sumo sacerdote mediante «sacerdotes» y «servicios», sin introducir vocabulario eclesiástico posterior.
  - La traducción evita sobreinterpretar σκηνή como ‘tabernáculo’ cerrado y deja señalada la alternativa en nota, siguiendo el audit trail inglés.
