review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: el genitivo absoluto («con estas cosas preparadas de esta manera»), la idea habitual de εἰσίασιν con διὰ παντός («entran continuamente»), y el participio ἐπιτελοῦντες («realizando»). Sin embargo, la elección principal «la primera tienda» no preserva adecuadamente la decisión léxica y teológica auditada por el POB inglés, que prefirió «the first tabernacle» en el texto principal y dejó «tent/room» como alternativas en nota. En Hebreos 9, σκηνή está cargada de especificidad cultual; «tienda» en el texto principal debilita ese marco.'
  spanish_quality_summary: El español es claro y natural. «Ahora bien» funciona bien, y el conjunto suena digno y legible. No obstante, «los servicios» resulta algo menos idiomático en español bíblico contemporáneo que «los ritos» o «el servicio sagrado», pero sigue siendo aceptable porque la nota aclara el alcance. El ajuste necesario es principalmente terminológico en «tabernáculo».
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto (Yahvé, Mesías, etc.). Sí hay una desviación frente a la decisión contextual documentada para σκηνή: en este pasaje el POB inglés establece «tabernacle» como lectura principal por su especificidad cultual. La nota española puede conservar «tienda» y «habitación» como alternativas, pero el texto principal debería usar «tabernáculo».'
  issues:
  - severity: medium
    issue: «la primera tienda» en el texto principal para τὴν πρώτην σκηνήν
    rationale: Aunque σκηνή puede significar «tienda», el expediente auditado del POB eligió «the first tabernacle» como lectura principal por el contexto cultual de Hebreos 9. En español, «tienda» suena más genérico y no conserva tan bien la especificidad del santuario mosaico.
