    text: O «realizando los actos de adoración» o «cumpliendo las labores rituales».
    reason: lexical_alternative
  revision_rationale: Se cambia «la primera tienda» por «el primer tabernáculo» para alinear el español con la decisión léxica y teológica documentada en el POB inglés, preservando a la vez las alternativas legítimas en nota. El resto del versículo puede mantenerse, pues refleja bien el griego y suena natural en español.
