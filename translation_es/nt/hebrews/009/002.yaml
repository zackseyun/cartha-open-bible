translation:
  language: es
  text: Porque se preparó un primer tabernáculo, en el cual estaban el candelabro, la mesa y el pan de la Presencia[a], el cual se llama el Lugar Santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan presentado»; tradicionalmente, «el pan de la proposición».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Lugares Santos»; aquí se refiere al primer recinto del tabernáculo, es decir, el Lugar Santo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκηνὴ
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - santuario
  lexicon: BDAG
  rationale: En Hebreos 9 el término alude a la estructura sagrada mosaica y a sus compartimientos. «Tabernáculo» conserva mejor esa referencia cultual e intertextual que «tienda», y en español es claro y natural en este contexto.
- source_word: κατεσκευάσθη
  english_pob_choice: was prepared
  chosen_spanish: se preparó
  alternatives_spanish:
  - fue construido
  - fue dispuesto
  - fue montado
  lexicon: BDAG
  rationale: El pasivo describe que el primer recinto llegó a existir como espacio preparado. «Se preparó» sigue bien el sentido de arreglo/adecuación del lugar sagrado y evita reducirlo solo a la idea arquitectónica de construcción.
- source_word: ἡ πρώτη
  english_pob_choice: a first
  chosen_spanish: el primer
  alternatives_spanish:
  - la primera
  - el primer recinto
  lexicon: BDAG
  rationale: En español, «el primer tabernáculo» suena más natural y mantiene la función introductoria del contraste con la segunda sección del versículo siguiente. Aunque el griego es literalmente «la primera», el referente aquí es el tabernáculo/compartimiento en su primera sección.
- source_word: λυχνία
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lámpara
  - portacandelero
  lexicon: BDAG
  rationale: La pieza cultual del tabernáculo se entiende mejor en español como «candelabro». «Lámpara» sería demasiado genérico y «candelero» menos natural; el término conserva la imagen del mobiliario sagrado sin perder claridad.
- source_word: τράπεζα
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - tabla
  - altar de mesa
  lexicon: BDAG
  rationale: «Mesa» es la traducción directa y natural para el mueble sagrado mencionado junto al candelabro.
- source_word: ἡ πρόθεσις τῶν ἄρτων
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la proposición
  - el pan presentado
  - el pan de la presencia
  lexicon: BDAG
  rationale: Aunque el griego literalmente expresa la «colocación/presentación de los panes», la revisión inglesa preferida concluye que la equivalencia más exacta y natural es «bread of the Presence». En español, «pan de la Presencia» transmite la misma identificación tradicional y evita la perífrasis menos idiomática.
- source_word: ἥτις λέγεται
  english_pob_choice: which is called
  chosen_spanish: el cual se llama
  alternatives_spanish:
  - que se llama
  - que es llamado
  lexicon: BDAG
  rationale: La cláusula identificadora se vierte de manera estándar y fluida. «El cual se llama» mantiene la referencia al recinto sin recargar el estilo.
- source_word: Ἅγια
  english_pob_choice: the Holy Place
  chosen_spanish: el Lugar Santo
  alternatives_spanish:
  - el Lugar Santísimo
  - el Santo Lugar
  - los Lugares Santos
  lexicon: BDAG
  rationale: Aunque la forma griega es plural, el contexto inmediato señala el primer compartimiento del tabernáculo, en contraste con el espacio interior del versículo siguiente. «Lugar Santo» comunica claramente esa habitación específica en español y conserva la distinción espacial.
theological_decisions:
- issue: Cómo verter Ἅγια en relación con los compartimientos del tabernáculo
  english_pob_reading: the Holy Place
  chosen_spanish_reading: el Lugar Santo
  alternative_spanish_readings:
  - los Lugares Santos
  - el santuario
  rationale: Se conserva el contraste espacial del autor entre la primera habitación y la interior. Aunque una traducción más literal podría decir «los Lugares Santos», eso suena menos natural en español y puede oscurecer que aquí se trata del primer recinto del tabernáculo.
  doctrine_reference: Hebreos 9:2–3; principio de correspondencia espacial del santuario
- issue: Identificación de ἡ πρόθεσις τῶν ἄρτων
  english_pob_reading: the bread of the Presence
  chosen_spanish_reading: el pan de la Presencia
  alternative_spanish_readings:
  - el pan presentado
  - el pan de la proposición
  rationale: La decisión evita una explicación demasiado técnica en el cuerpo del texto y conserva la denominación cultual tradicional, que resulta transparente para lectores hispanos. No se introduce una glosa interpretativa adicional en el versículo porque el contexto ya enumera los objetos del Lugar Santo.
  doctrine_reference: Éxodo 25:30; Levítico 24:5–9; Hebreos 9:2
translation_notes:
  revision_awareness: 'El audio-trazado inglés muestra una revisión importante en ἡ πρόθεσις τῶν ἄρτων: la primera redacción «the presentation of the bread» fue corregida a «the bread of the Presence». La versión española sigue esa decisión revisada y evita la perífrasis inicial. También se mantiene la resolución contextual de Ἅγια como un nombre del primer compartimiento, no una pluralidad abstracta.'
  spanish_consistency_notes:
  - Se usa «tabernáculo» para σκηνή conforme al uso cultual en Hebreos.
  - Se conserva «Presencia» con mayúscula en la expresión fija «pan de la Presencia», siguiendo el valor nominal culto del sintagma.
  - «Lugar Santo» se elige para Ἅγια por claridad contextual; no se traduce de forma mecánica como plural.
  - La sintaxis española mantiene la lista de objetos sagrados en paralelo claro y legible.
