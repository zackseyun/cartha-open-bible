  to: lo cual es una parábola para el tiempo presente[a], según la cual se ofrecen tanto dones como sacrificios que no pueden perfeccionar, en cuanto a la conciencia, al que rinde culto.
  rationale: Se conserva la solución principal del borrador y del POB inglés, pero se corrige la expresión no idiomática «al que cultiva el culto» por «al que rinde culto», que refleja mejor τὸν λατρεύοντα en un contexto cultual. También se explicita τε καὶ con «tanto ... como» para acercarse más al griego sin perder naturalidad. La nota sobre «parábola» se mantiene intacta.
