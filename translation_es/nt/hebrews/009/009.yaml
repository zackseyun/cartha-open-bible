translation:
  language: es
  text: lo cual es una parábola para el tiempo presente[a], según la cual se ofrecen tanto dones como sacrificios que no pueden perfeccionar, en cuanto a la conciencia, al que rinde culto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «símbolo» o «figura» para el tiempo presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - la cual
  - lo que
  lexicon: BDAG
  rationale: El relativo se refiere al arreglo cultual mencionado antes; «lo cual» mantiene la conexión explicativa sin forzar género personal en español.
- source_word: παραβολὴ
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - símbolo
  - figura
  - ilustración
  lexicon: BDAG
  rationale: «Parábola» conserva la transparencia léxica y el valor de correspondencia figurativa. En español, «símbolo» y «figura» siguen siendo alternativas válidas, pero «parábola» mantiene mejor la fuerza formal del término griego.
- source_word: εἰς τὸν καιρὸν τὸν ἐνεστηκότα
  english_pob_choice: for the present time
  chosen_spanish: para el tiempo presente
  alternatives_spanish:
  - para el tiempo ahora presente
  - para la época actual
  lexicon: BDAG
  rationale: La frase apunta al tiempo vigente dentro del argumento. «Para el tiempo presente» es natural en español y conserva la referencia temporal actual sin añadir interpretación.
- source_word: καθ’ ἣν
  english_pob_choice: according to which
  chosen_spanish: según la cual
  alternatives_spanish:
  - conforme a la cual
  - bajo la cual
  lexicon: BDAG
  rationale: Expresa de forma idiomática en español la relación de norma o correspondencia entre la parábola/el arreglo y lo que se describe después.
- source_word: δῶρά τε καὶ θυσίαι
  english_pob_choice: both gifts and sacrifices
  chosen_spanish: dones y sacrificios
  alternatives_spanish:
  - ofrendas y sacrificios
  - regalos y sacrificios
  lexicon: BDAG
  rationale: «Dones» reproduce el término cultual amplio de δῶρα y permite mantener la pareja con «sacrificios». Se evita «regalos», que suena demasiado cotidiano.
- source_word: προσφέρονται
  english_pob_choice: are offered
  chosen_spanish: se ofrecen
  alternatives_spanish:
  - son ofrecidos
  - están siendo ofrecidos
  lexicon: BDAG
  rationale: El presente pasivo de culto se vierte con una pasiva refleja natural en español, conservando el carácter ritual continuo.
- source_word: μὴ δυνάμεναι
  english_pob_choice: cannot
  chosen_spanish: que no pueden
  alternatives_spanish:
  - que no son capaces
  - que no tienen poder para
  lexicon: BDAG
  rationale: Mantiene la incapacidad de los dones y sacrificios con una formulación fluida y directa, equivalente al valor negativo del participio.
- source_word: κατὰ συνείδησιν
  english_pob_choice: with respect to conscience
  chosen_spanish: en cuanto a la conciencia
  alternatives_spanish:
  - respecto de la conciencia
  - según la conciencia
  lexicon: BDAG
  rationale: La preposición «κατά» señala la esfera en la que falta la perfección; «en cuanto a» preserva esa limitación sin reducirla a mera subjetividad.
- source_word: τελειῶσαι
  english_pob_choice: to perfect
  chosen_spanish: perfeccionar
  alternatives_spanish:
  - hacer perfectos
  - llevar a la perfección
  lexicon: BDAG
  rationale: '«Perfeccionar» conserva la carga técnica de τελειόω en Hebreos: llevar a la condición debida delante de Dios. Es más conciso que «llevar a la perfección» y menos ambiguo que «hacer perfectos».'
- source_word: τὸν λατρεύοντα
  english_pob_choice: the worshiper
  chosen_spanish: al que cultiva el culto
  alternatives_spanish:
  - al adorador
  - al que rinde culto
  lexicon: BDAG
  rationale: Se evita «adorador» por su posible reducción subjetiva; «cultivar el culto» intenta reflejar el matiz de λατρεύω como servicio/culto cultual continuo. Aunque es menos literal, preserva el sentido religioso-ritual del participio.
theological_decisions:
- issue: Cómo traducir παραβολή en contexto tipológico-cultual
  english_pob_reading: parable, with footnoted alternatives symbol/figure
  chosen_spanish_reading: parábola, con nota alternativa «símbolo» o «figura»
  alternative_spanish_readings:
  - símbolo
  - figura
  - ilustración
  rationale: Hebreos presenta el arreglo del santuario como una correspondencia figurativa con el presente. «Parábola» conserva el vínculo con la forma léxica griega y deja abierta la tensión entre relato figurado y símbolo cultual, sin aplanarla.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Alcance de τελειῶσαι respecto de la conciencia
  english_pob_reading: cannot perfect the worshiper with respect to conscience
  chosen_spanish_reading: no pueden perfeccionar, en cuanto a la conciencia, al que cultiva el culto
  alternative_spanish_readings:
  - no pueden llevar a la perfección, en cuanto a la conciencia, al adorador
  - no pueden hacer perfecto, respecto de la conciencia, al que rinde culto
  rationale: Se preserva la idea de incapacidad real de los sacrificios para alcanzar la meta cultual prevista. «En cuanto a la conciencia» mantiene la esfera específica indicada por κατὰ συνείδησιν, sin convertirla en mera sinceridad psicológica.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «cannot perfect» por ser más natural que «are not able to perfect». En español se reflejó esa misma naturalidad con «no pueden perfeccionar», manteniendo el valor negativo y el carácter cultual del pasaje. También se tomó en cuenta la observación de desacuerdo moderado del control cruzado, por lo que se evitó simplificar παραβολή a un solo equivalente no marcado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el texto lo requiera; aquí no aparece.
  - Se usó «dones» para δῶρα y no «ofrendas» para conservar la amplitud cultual del término.
  - Se conservó el matiz ritual de λατρεύω sin sustituirlo por una voz devocional más general.
  - La puntuación y el orden siguen la sintaxis del griego tanto como permite un español fluido.
