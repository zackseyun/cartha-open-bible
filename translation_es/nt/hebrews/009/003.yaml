translation:
  language: es
  text: Y detrás del segundo velo había un tabernáculo llamado el Lugar Santísimo[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el Santo de los Santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ... τὸ δεύτερον καταπέτασμα
  english_pob_choice: behind the second curtain
  chosen_spanish: detrás del segundo velo
  alternatives_spanish:
  - después del segundo velo
  - más allá del segundo velo
  lexicon: BDAG
  rationale: μετά con acusativo expresa aquí relación espacial; en español, «detrás de» comunica naturalmente la ubicación en el santuario. «Velo» conserva el sentido cultual de καταπέτασμα y mantiene la referencia al separador interior, aunque «cortina» también sería posible.
- source_word: σκηνὴ
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - santuario
  lexicon: BDAG
  rationale: En Hebreos 9, σκηνή designa la estructura/tabernáculo en su marco cultual. «Tabernáculo» preserva mejor ese valor técnico que «tienda»; «santuario» sería más interpretativo.
- source_word: ἡ λεγομένη
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - que es llamado
  - denominado
  lexicon: BDAG
  rationale: La construcción participial atributiva se vierte de forma natural en español con «llamado», manteniendo el carácter descriptivo sin añadir matices innecesarios.
- source_word: Ἅγια Ἁγίων
  english_pob_choice: the Most Holy Place
  chosen_spanish: el Lugar Santísimo
  alternatives_spanish:
  - el Santo de los Santos
  - el Lugar Santísimo
  lexicon: BDAG
  rationale: El giro genitivo superlativo significa literalmente «Santo de santos». En español, «Lugar Santísimo» comunica con claridad el referente del recinto interior; se evita una calca menos natural como «Santo de los Santos» en el texto principal, aunque esta forma tradicional se conserva como alternativa.
theological_decisions:
- issue: Traducción del término cultual Ἅγια Ἁγίων
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: el Lugar Santísimo
  alternative_spanish_readings:
  - el Santo de los Santos
  rationale: No hay una disputa doctrinal, sino una decisión de transparencia y legibilidad. «Lugar Santísimo» comunica al lector español el espacio sagrado más interior sin perder el referente del hebraísmo original; la forma tradicional se mantiene en nota para continuidad bíblica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto inglés no requirió cambios de revisión; se conserva la solución óptima-equivalente ya acordada para el espacio cultual y la referencia espacial del verso.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para σκηνή en coherencia con Hebreos 9.
  - Se usa «velo» para καταπέτασμα por su uso cultual más establecido en español, aunque «cortina» sería un equivalente contextual posible.
  - La nota traduce la alternativa tradicional inglesa con una fórmula natural en español y sin duplicar el sentido del texto principal.
