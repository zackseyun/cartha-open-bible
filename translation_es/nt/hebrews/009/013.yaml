translation:
  language: es
  text: Porque si la sangre de machos cabríos y de toros, y las cenizas de una novilla, rociando a los que se han vuelto impuros[a], santifican[b] para la purificación de la carne[c][d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que han sido contaminados». El griego se refiere a impureza ritual.'
    reason: lexical_alternative
  - marker: b
    text: Santificar aquí es una referencia ritual/cultual, no a una santificación moral interior.
    reason: theological_note
  - marker: c
    text: Alusión al rito de purificación con las cenizas de una novilla en Números 19.
    reason: cross_reference
  - marker: d
    text: Es decir, una purificación externa o corporal en el marco de los ritos del antiguo pacto.
    reason: cultural_note
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque si en verdad
  lexicon: BDAG
  rationale: Conserva el valor inferencial y condicional de la frase, enlazando con el argumento que continúa en el versículo siguiente. ‘Porque si’ suena natural en español y mantiene la relación lógica del texto griego.
- source_word: τὸ αἷμα ⸂τράγων καὶ ταύρων⸃
  english_pob_choice: the blood of goats and bulls
  chosen_spanish: la sangre de machos cabríos y de toros
  alternatives_spanish:
  - la sangre de cabritos y de toros
  - la sangre de machos cabríos y toros
  lexicon: BDAG
  rationale: ‘Machos cabríos’ y ‘toros’ expresan con precisión el valor sacrificial de los genitivos. Se evita una traducción más general o más idiomática que diluya la referencia cultual concreta.
- source_word: σποδὸς δαμάλεως
  english_pob_choice: the ashes of a heifer
  chosen_spanish: las cenizas de una novilla
  alternatives_spanish:
  - las cenizas de una vaquilla
  - las cenizas de una res joven
  lexicon: BDAG
  rationale: ‘Novilla’ reproduce bien el referente cultual de la heifer y preserva la conexión con Números 19. ‘Vaquilla’ es posible, pero ‘novilla’ es más estable en registro bíblico y evita una imagen demasiado doméstica.
- source_word: ῥαντίζουσα
  english_pob_choice: sprinkling
  chosen_spanish: que rocía
  alternatives_spanish:
  - que asperja
  - rociando
  lexicon: BDAG
  rationale: El participio modifica a ‘las cenizas de una novilla’ y describe la acción ritual de asperjar/rociar. ‘Que rocía’ evita la ambigüedad sintáctica y conserva la fuerza activa del participio; ‘asperja’ sería más técnico, pero menos natural para un público amplio.
- source_word: τοὺς κεκοινωμένους
  english_pob_choice: those who have been defiled
  chosen_spanish: a los que han sido contaminados
  alternatives_spanish:
  - a los que han sido contaminados ritualmente
  - a los que se han vuelto impuros
  lexicon: BDAG
  rationale: El contexto es de impureza ritual, pero en español ‘contaminados’ comunica bien la idea de haber quedado afectados por una impureza cultual. Se conserva el perfectivo con ‘han sido’ para reflejar el estado resultante.
- source_word: ἁγιάζει
  english_pob_choice: sanctify
  chosen_spanish: santifican
  alternatives_spanish:
  - consagran
  - hacen santo
  lexicon: BDAG
  rationale: Se mantiene el lenguaje cultual de ‘santificar’, que aquí no indica transformación moral interior sino eficacia ritual. El plural concuerda con el sujeto compuesto (‘la sangre... y las cenizas...’).
- source_word: πρὸς τὴν τῆς σαρκὸς καθαρότητα
  english_pob_choice: for the purification of the flesh
  chosen_spanish: para la purificación de la carne
  alternatives_spanish:
  - para la purificación del cuerpo
  - para la limpieza exterior de la carne
  lexicon: BDAG
  rationale: Se conserva ‘carne’ para respetar el vínculo léxico con σάρξ y la tensión teológica del pasaje, donde la purificación es externa/cultual y contrasta con la conciencia en el versículo siguiente. ‘Cuerpo’ o ‘limpieza exterior’ explicitan, pero suavizan la terminología del texto.
theological_decisions:
- issue: Valor de ἁγιάζει en un contexto levítico
  english_pob_reading: Refers to ritual/cultic sanctification, not inward moral transformation
  chosen_spanish_reading: Se refiere a una santificación ritual/cultual, no a una transformación moral interior
  alternative_spanish_readings:
  - Se refiere a hacer santo en sentido espiritual general
  - Se refiere a consagración moral
  rationale: El contraste inmediato con la purificación de la conciencia en el versículo siguiente exige mantener el sentido ceremonial. Por eso ‘santifican’ se entiende aquí dentro del marco del rito, no como santificación interior plena.
  doctrine_reference: 'Hebreos 9:13–14; Contested terms: ἁγιάζω'
- issue: Sentido de σάρξ
  english_pob_reading: Literal/external 'flesh' referring to bodily or outward ritual purity
  chosen_spanish_reading: ‘Carne’ se entiende literalmente como esfera externa/corporal de pureza ritual
  alternative_spanish_readings:
  - ‘Naturaleza humana’
  - ‘Cuerpo’ como aclaración interpretativa
  rationale: El texto contrasta la purificación externa con la obra de Cristo sobre la conciencia. Traducir σάρξ como ‘carne’ preserva el nexo léxico y evita introducir el sentido moral de ‘naturaleza pecaminosa’ que no es el punto aquí.
  doctrine_reference: 'Hebreos 9:13–14; Contested terms: σάρξ'
- issue: Uso de ‘contaminados’ para κεκοινωμένους
  english_pob_reading: Those who have been defiled; ritual defilement is in view
  chosen_spanish_reading: ‘Contaminados’ se entiende como impureza ritual/cultual
  alternative_spanish_readings:
  - ‘Hechos impuros’
  - ‘Ritualmente impuros’
  rationale: En español, ‘contaminados’ comunica el estado resultante de quedar ritualmente afectados. Aunque ‘ritualmente impuros’ es más explícito, la formulación elegida conserva fluidez sin perder el sentido ceremonial.
  doctrine_reference: Números 19; Levítico 11–15; Hebreos 9:13
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB en inglés al mantener el participio activo como acción que modifica a ‘las cenizas de una novilla’, pero lo hace en español con una relativa (‘que rocía’) para evitar ambigüedad sintáctica. También conserva la tensión entre purificación ritual externa y la purificación interior del contexto inmediato (Heb 9:14).
  spanish_consistency_notes:
  - Se mantiene ‘carne’ para σάρξ, coherente con el uso doctrinal del proyecto cuando el sentido es literal/external.
  - Se evita ‘SEÑOR’ y no hay tetragrama en este versículo; no aplica terminología divina específica.
  - ‘Santifican’ se usa en sentido cultual, no como sinónimo de ‘hacer moralmente santo’.
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
