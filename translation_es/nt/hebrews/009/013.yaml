    rationale: El audit trail inglés subraya que el término se refiere a defilement ritual. En español, «contaminados» puede evocar contaminación física o ambiental; «los que se han vuelto impuros» o similar preserva mejor el sentido cultual.
  - severity: medium
    issue: Falta la nota léxica alternativa correspondiente a κεκοινωμένους
    rationale: El POB inglés conserva la alternativa «those who have become unclean». La revisión española debe preservar esa alternativa significativa en nota, ya que además ayuda a desambiguar el sentido ritual.
  - severity: medium
    issue: Falta la nota de alusión a Números 19 sobre las cenizas de la novilla
    rationale: La nota de referencia cruzada forma parte del audit trail inglés y es importante para la conexión cultual del pasaje.
  - severity: low
