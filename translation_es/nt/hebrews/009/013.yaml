  rationale: Se ajusta κεκοινωμένους a una expresión española que comunica mejor la impureza ritual, se restaura la nota léxica alternativa y la referencia cruzada presente en el POB inglés, y se acerca ῥαντίζουσα al participio griego con «rociando». Los demás elementos del borrador se conservan porque son fieles al griego y al razonamiento teológico documentado.
