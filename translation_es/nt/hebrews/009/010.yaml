revisions:
- from: solo con alimentos y bebidas y diversos lavamientos[a], regulaciones para la carne impuestas hasta el tiempo de la rectificación[b].
  to: solo respecto de alimentos y bebidas y diversos lavamientos[a], regulaciones para el cuerpo impuestas hasta el tiempo de la rectificación[b].
  rationale: Se ajusta la sintaxis para representar con claridad la función de ἐπὶ ('respecto de') y se reemplaza 'carne' por 'cuerpo' para comunicar fielmente el valor contextual de σάρξ como esfera corporal/exterior, no moral. Se conservan 'lavamientos' y 'rectificación' con sus notas porque siguen bien la auditoría inglesa y el sentido del pasaje.
