review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego y sigue de cerca la auditoría inglesa: limita el alcance con ''solo'', mantiene ''alimentos y bebidas'', distingue βαπτισμοῖς como lavamientos rituales con nota para ''bautismos'', y conserva la idea de imposición temporal hasta un tiempo de διορθώσεως. Sin embargo, la construcción inicial ''solo con alimentos y bebidas...'' queda elíptica y poco natural en español para expresar ἐπὶ como esfera de referencia. Además, ''regulaciones para la carne'' es demasiado literal y en español suena ambiguo o teológicamente desviado, pudiendo sugerir carne en sentido moral o material en vez de reglamentos relativos a lo externo/corporal.'
  spanish_quality_summary: 'La redacción es comprensible, pero no suena plenamente idiomática ni digna en español bíblico moderno. ''Solo con...'' queda sintácticamente incompleta; ''diversos lavamientos'' funciona, aunque ''diversas abluciones'' sería posible, pero no necesaria. El mayor problema de legibilidad es ''regulaciones para la carne'', que resulta extraña en español general. ''Prescripciones externas'' mejoraría la naturalidad, pero perdería el vínculo léxico con σάρξ; por eso conviene una solución intermedia que conserve el sentido contextual: ''regulaciones para el cuerpo''.'
  glossary_alignment: No hay conflicto con los términos base del proyecto como Yahvé, Mesías, Jesús, Dios, Espíritu, etc. En términos contextuales, la elección de 'lavamientos' para βαπτισμοῖς es correcta según la auditoría. Para σάρξ, el borrador intentó conservar 'carne', pero en este contexto español conviene apartarse del calco para evitar una lectura errónea; 'cuerpo' transmite mejor la esfera corporal/exterior documentada por la decisión teológica inglesa.
  issues:
  - severity: medium
    issue: Construcción elíptica poco natural en 'solo con alimentos y bebidas y diversos lavamientos'
    rationale: El griego usa ἐπὶ con dativo en una construcción abreviada; el inglés la resolvió con 'concerned only with'. En español, 'solo con' no expresa bien 'en cuanto a / respecto de' y deja la frase coja.
  - severity: high
    issue: '''Regulaciones para la carne'' suena poco idiomático y puede inducir una lectura equivocada de σάρξ'
    rationale: Aunque intenta seguir la revisión inglesa 'for the flesh', en español 'carne' aquí no comunica con claridad la idea de reglamentos relativos a la esfera corporal/exterior. Dado el contexto de comidas, bebidas y lavamientos, 'cuerpo' expresa mejor el sentido sin arrastrar asociaciones con la naturaleza pecaminosa.
  - severity: low
    issue: '''Rectificación'' es defendible pero menos natural que ''reforma'' o una paráfrasis aclaratoria'
    rationale: No es un error; preserva bien διορθώσεως. Se puede mantener si se acompaña de la nota existente, que ya aclara la alternativa 'poner las cosas en orden'.
  revised_spanish_text: solo respecto de alimentos y bebidas y diversos lavamientos[a], regulaciones para el cuerpo impuestas hasta el tiempo de la rectificación[b].
  revised_footnotes:
  - marker: a
    text: O 'diversos bautismos'; el término griego puede traducirse más literalmente así, pero aquí se refiere a lavamientos rituales en el sistema del antiguo pacto.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta el tiempo de poner las cosas en orden'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para representar con claridad la función de ἐπὶ ('respecto de') y se reemplaza 'carne' por 'cuerpo' para comunicar fielmente el valor contextual de σάρξ como esfera corporal/exterior, no moral. Se conservan 'lavamientos' y 'rectificación' con sus notas porque siguen bien la auditoría inglesa y el sentido del pasaje.
