translation:
  language: es
  text: solo respecto de alimentos y bebidas y diversos lavamientos[a], regulaciones para el cuerpo impuestas hasta el tiempo de la rectificación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'diversos bautismos'; el término griego puede traducirse más literalmente así, pero aquí se refiere a lavamientos rituales en el sistema del antiguo pacto.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta el tiempo de poner las cosas en orden'.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: BDAG
  rationale: Limita el alcance de las disposiciones rituales anteriores; 'solo' es natural en español y conserva el valor restrictivo.
- source_word: ἐπὶ βρώμασιν καὶ πόμασιν
  english_pob_choice: concerned with foods and drinks
  chosen_spanish: con alimentos y bebidas
  alternatives_spanish:
  - respecto de alimentos y bebidas
  - acerca de alimentos y bebidas
  lexicon: BDAG
  rationale: La construcción exige en español una relación de ámbito o referencia. 'Con' comunica de forma fluida que estas regulaciones se aplicaban a comida y bebida sin añadir matices no presentes en el griego.
- source_word: διαφόροις βαπτισμοῖς
  english_pob_choice: various washings
  chosen_spanish: diversos lavamientos
  alternatives_spanish:
  - diversos lavados rituales
  - diversos bautismos
  lexicon: BDAG
  rationale: '''Lavamientos'' preserva el carácter ritual/cultual y evita identificar el término con el bautismo cristiano. En una nota se conserva la alternativa más literal ''bautismos''.'
- source_word: δικαιώματα
  english_pob_choice: regulations
  chosen_spanish: regulaciones
  alternatives_spanish:
  - ordenanzas
  - prescripciones
  lexicon: BDAG
  rationale: En este contexto se trata de mandatos rituales o legales; 'regulaciones' es claro y mantiene el sentido normativo sin forzar un término eclesiástico tradicional.
- source_word: σαρκὸς
  english_pob_choice: for the flesh
  chosen_spanish: para la carne
  alternatives_spanish:
  - de la carne
  - corporales
  - externas
  lexicon: BDAG
  rationale: Mantiene la referencia lexicográfica a σάρξ y la tensión entre lo externo/ritual y lo interior. Aquí no se entiende como 'naturaleza pecaminosa', sino como esfera corporal/exterior.
- source_word: μέχρι καιροῦ διορθώσεως
  english_pob_choice: until the time of reformation
  chosen_spanish: hasta el tiempo de la rectificación
  alternatives_spanish:
  - hasta el tiempo de la reforma
  - hasta el tiempo de poner las cosas en orden
  lexicon: BDAG
  rationale: '''Rectificación'' rinde la idea de διόρθωσις como poner derecho, corregir o enderezar. ''Reforma'' es posible, pero ''rectificación'' evita cargar el término con asociaciones históricas posteriores y conserva la tensión redentivo-histórica.'
- source_word: ἐπικείμενα
  english_pob_choice: imposed
  chosen_spanish: impuestas
  alternatives_spanish:
  - puestas sobre
  - gravadas sobre
  lexicon: BDAG
  rationale: El participio expresa que estas regulaciones recaían sobre los destinatarios; 'impuestas' comunica bien el sentido de obligación externa y peso normativo.
theological_decisions:
- issue: Sentido de σάρξ en σαρκὸς
  english_pob_reading: refers to outward/bodily matters, not the sinful nature
  chosen_spanish_reading: se refiere a la esfera corporal/exterior, no a la naturaleza pecaminosa
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - carnalidad
  rationale: El contexto enumera comidas, bebidas y lavamientos rituales; por eso σάρξ aquí alude a lo externo y corporal. Traducirlo como 'naturaleza pecaminosa' oscurecería el contraste del autor entre ritos externos y la obra interior y definitiva de Cristo.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Valor de διορθώσεως
  english_pob_reading: a historical-redemptive 'reformation' or setting-right associated with the new covenant order
  chosen_spanish_reading: una rectificación histórico-redentora asociada al orden del nuevo pacto
  alternative_spanish_readings:
  - una reforma
  - un poner las cosas en orden
  rationale: Hebreos contrasta el sistema antiguo con la obra superior de Cristo; 'rectificación' preserva la idea de poner derecho sin imponer un sentido técnico ajeno. Se mantiene la tensión teológica del texto entre lo provisional y lo definitivo.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'fleshly regulations' a 'regulations for the flesh' para reflejar más directamente δικαιώματα σαρκὸς. Por eso el español evita un adjetivo como 'carnales' y mantiene la construcción nominal 'regulaciones para la carne', que es más fiel al vínculo genitivo y conserva la distinción entre lo externo/ritual y lo interior.
  spanish_consistency_notes:
  - Se mantuvo 'carne' para σάρξ en coherencia con el criterio POB de conservar el vínculo léxico cuando el contexto es corporal/exterior.
  - Se prefirió 'rectificación' para διορθώσεως por claridad moderna y para evitar resolver excesivamente el alcance histórico-teológico del término.
  - Se usó 'lavamientos' para διαφόροις βαπτισμοῖς porque en español comunica bien el carácter ritual sin introducir automáticamente la noción bautismal cristiana.
