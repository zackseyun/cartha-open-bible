review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente la estructura del griego y conserva la decisión principal de traducir διαθήκη en sentido pactual con nota alternativa para «testamento». Sin embargo, «sea traída delante» suena poco natural en español y «del que lo estableció» introduce un matiz más fuerte que el griego/POB, que prefiere «el que lo hizo». Además, la nota b sobre «muerte» no preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva en español.
  spanish_quality_summary: El texto es comprensible, pero «traída delante» resulta forzado y poco idiomático. «Pacto» es posible, aunque en Hebreos «alianza» suele sonar más natural en registro bíblico; no obstante, dado el expediente auditado, «pacto» puede mantenerse. Conviene simplificar la redacción para lograr español digno y natural sin perder la cercanía al griego.
  glossary_alignment: No hay conflicto con los glosarios mayores del proyecto. La decisión sobre διαθήκη como «pacto» es aceptable por el historial POB, aunque «alianza» sería también una opción fuerte. Debe mantenerse la nota con «testamento». Para τοῦ διαθεμένου, es mejor «del que lo hizo» que «del que lo estableció», en línea con la racionalidad documentada.
  issues:
  - severity: medium
    issue: «sea traída delante» es una expresión poco natural en español
    rationale: Aunque intenta reflejar φέρεσθαι literalmente, produce un calco extraño. «sea presentada» conserva mejor la idea de ser traída a consideración o puesta en vista.
  - severity: medium
    issue: «del que lo estableció» sobreinterpreta τοῦ διαθεμένου
    rationale: El expediente inglés prefirió «the one who made it» precisamente para evitar un término más técnico o fuerte. En español, «del que lo hizo» preserva mejor esa cautela.
  - severity: low
    issue: La nota b sobre «muerte» no es necesaria
    rationale: El inglés no conserva aquí una nota léxica sobre θάνατον, y el español no crea una ambigüedad nueva que exija aclaración. Mantenerla recarga el versículo sin beneficio claro.
  - severity: low
    issue: La nota a puede sonar más natural en español
    rationale: Conviene pulir «establecer la muerte» a «presentar la muerte» para alinearla con la revisión inglesa «brought forward» y evitar un giro menos claro.
  revised_spanish_text: Porque donde hay un pacto[a], es necesario que la muerte del que lo hizo sea presentada.
