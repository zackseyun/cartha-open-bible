translation:
  language: es
  text: Porque donde hay un pacto[a], es necesario que la muerte del que lo hizo sea presentada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque donde hay un testamento, es necesario presentar la muerte del que lo hizo». El griego diathēkē puede significar tanto «pacto» como «testamento», y muchos entienden los vv. 16–17 en sentido legal.'
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En Hebreos, διαθήκη se integra al argumento de la alianza de Dios con su pueblo; en español, «pacto» conserva ese campo semántico sin forzar de entrada el sentido jurídico de «testamento». Se mantiene la tensión con la lectura legal alternativa en nota.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - la muerte física
  lexicon: BDAG
  rationale: Es el valor normal de θάνατος; aquí el contexto exige muerte real, no una noción metafórica.
- source_word: ἀνάγκη
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - hay necesidad de
  - necesariamente
  lexicon: BDAG
  rationale: La construcción idiomática en español naturaliza la fuerza predicativa de ἀνάγκη sin debilitar la obligatoriedad.
- source_word: φέρεσθαι
  english_pob_choice: to be brought forward
  chosen_spanish: sea traída delante
  alternatives_spanish:
  - sea presentada
  - sea puesta de manifiesto
  - sea traída
  lexicon: BDAG
  rationale: «Traída delante» refleja el valor básico de φέρω como traer/llevar y conserva la idea de poner la muerte en vista o delante del argumento, evitando introducir un sentido jurídico demasiado fuerte como «establecida».
- source_word: τοῦ διαθεμένου
  english_pob_choice: the one who made it
  chosen_spanish: del que lo estableció
  alternatives_spanish:
  - del que lo hizo
  - del que la hizo
  - del autor de él
  lexicon: BDAG
  rationale: El participio de διατίθεμαι señala al que dispuso/estableció el pacto; «estableció» es natural en español y mantiene la relación verbal con el pacto sin imponer «testador» en el texto principal.
- source_word: ὅπου γὰρ
  english_pob_choice: For where
  chosen_spanish: Porque donde
  alternatives_spanish:
  - Pues donde
  - Porque en donde
  lexicon: BDAG
  rationale: «Porque» reproduce la fuerza explicativa de γάρ; «donde» expresa la cláusula locativa de manera idiomática en español.
theological_decisions:
- issue: 'Sentido de διαθήκη: pacto/alianza frente a testamento'
  english_pob_reading: covenant in the main text, with 'will/testament' preserved in a footnote
  chosen_spanish_reading: pacto en el texto principal, con «testamento» como alternativa en nota
  alternative_spanish_readings:
  - alianza
  - testamento
  - voluntad
  rationale: Hebreos 8–10 desarrolla el tema de la alianza de Dios; por eso el texto principal conserva el sentido pactual. Sin embargo, los vv. 16–17 admiten la lectura jurídica de «testamento», y esa tensión se preserva explícitamente en nota para no resolverla prematuramente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la redacción inglesa para acercarla más a φέρεσθαι («ser traída / ser llevada / ser presentada»). Por eso el español evita «establecida» para φέρεσθαι y usa una formulación que conserva el movimiento de traer delante. También se mantiene la tensión interpretativa entre el sentido pactual y el legal de διαθήκη, como pide el expediente.
  spanish_consistency_notes:
  - Se preserva el término pactual principal como «pacto», coherente con el uso teológico de Hebreos en español y con la decisión inglesa de mantener «covenant».
  - Se evita el tradicional «SEÑOR» u otras sustituciones irrelevantes, porque el versículo no contiene el nombre divino.
  - La sintaxis intenta ser publicable y natural en español, sin perder la estructura causal y subordinada del griego.
  - Se mantiene la alternativa legal en nota para respetar la ambigüedad documentada del término διαθήκη.
