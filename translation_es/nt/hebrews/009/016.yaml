revisions:
- from: Porque donde hay un pacto[a], es necesario que la muerte[b] del que lo estableció sea traída delante.
  to: Porque donde hay un pacto[a], es necesario que la muerte del que lo hizo sea presentada.
  rationale: 'Se ajusta el texto para lograr un español más natural y fiel al expediente auditado: «sea presentada» comunica mejor φέρεσθαι que el calco «sea traída delante», y «del que lo hizo» respeta la cautela léxica documentada para τοῦ διαθεμένου. Se elimina la nota innecesaria sobre «muerte» y se conserva la alternativa «testamento» en la nota principal.'
