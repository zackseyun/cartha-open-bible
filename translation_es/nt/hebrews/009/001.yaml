translation:
  language: es
  text: Ahora bien, el primer pacto[a] tenía regulaciones para el culto y un santuario terrenal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el primero»; algunos entienden la expresión más generalmente como «el primer arreglo».
    reason: alternative_reading
  - marker: b
    text: O «un santuario mundano»; aquí probablemente el sentido es «terrenal», en contraste con las realidades celestiales que se desarrollan más adelante en el capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶχε
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - había
  - poseía
  lexicon: BDAG
  rationale: El imperfecto presenta la descripción del arreglo anterior; en español, «tenía» conserva ese sentido simple y natural sin sobrecargar la frase.
- source_word: μὲν οὖν
  english_pob_choice: Now even
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora incluso
  - Ahora pues
  lexicon: BDAG
  rationale: La combinación marca transición discursiva con matiz leve de continuación y énfasis. «Ahora bien» suena natural en español y refleja ese giro argumental sin ser literalista.
- source_word: ἡ πρώτη
  english_pob_choice: the first covenant
  chosen_spanish: el primer[a]
  alternatives_spanish:
  - el primero
  - la primera alianza
  lexicon: BDAG
  rationale: El contexto inmediato de Hebreos 8 habla del primer pacto/alianza; en español, el sustantivo elidido puede recuperarse como «pacto» o «alianza». Para mantener la cercanía al antecedente y evitar introducir más de lo necesario, se deja implícito en el texto y se aclara en la nota.
- source_word: δικαιώματα
  english_pob_choice: regulations
  chosen_spanish: regulaciones
  alternatives_spanish:
  - ordenanzas
  - prescripciones
  - requisitos
  lexicon: BDAG
  rationale: En este marco cultual, el término se refiere a disposiciones prescritas para el culto. «Regulaciones» comunica bien ese sentido jurídico-cultual en español moderno.
- source_word: λατρείας
  english_pob_choice: for worship
  chosen_spanish: para el culto
  alternatives_spanish:
  - del culto
  - para el servicio
  lexicon: BDAG
  rationale: La genitiva especifica la esfera o finalidad de las regulaciones. «Culto» transmite mejor el sentido ritual de λατρεία en español bíblico que una mera referencia general a «servicio».
- source_word: τό τε ἅγιον
  english_pob_choice: sanctuary
  chosen_spanish: un santuario
  alternatives_spanish:
  - un lugar santo
  - el santuario
  lexicon: BDAG
  rationale: El sintagma designa el espacio sagrado asociado con el arreglo anterior. «Santuario» es idiomático en español y suficientemente amplio para el desarrollo posterior del pasaje.
- source_word: κοσμικόν
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - mundano
  - de este mundo
  lexicon: BDAG
  rationale: El contraste del capítulo es entre lo terrenal y lo celestial, no entre lo moralmente corrupto y lo espiritual. «Terrenal» preserva esa oposición sin la carga negativa que suele tener «mundano».
theological_decisions:
- issue: Sustantivo implícito detrás de ἡ πρώτη
  english_pob_reading: the first covenant
  chosen_spanish_reading: el primer [pacto/alianza] implícito
  alternative_spanish_readings:
  - la primera alianza
  - el primer arreglo
  rationale: Hebreos 8 antecede inmediatamente con la discusión del pacto anterior y el nuevo. En español, se conserva la elipsis en la línea principal para no forzar un término que el griego no repite, y se deja la recuperación del antecedente en la nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de κοσμικόν
  english_pob_reading: earthly
  chosen_spanish_reading: terrenal
  alternative_spanish_readings:
  - mundano
  - de este mundo
  rationale: El contraste teológico del capítulo es con las realidades celestiales posteriores; «terrenal» refleja mejor esa oposición que «mundano», que en español sugiere corrupción ética.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el audit trail inglés: mantiene la transición discursiva de μὲν οὖν, preserva la elipsis de ἡ πρώτη con nota explicativa y traduce κοσμικόν como «terrenal» para conservar el contraste con lo celestial. No se aprecian cambios textuales relevantes respecto del pasaje base.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece.
  - «Culto» se usa para λατρεία en un sentido ritual, coherente con el registro del pasaje.
  - «Terrenal» se eligió para κοσμικόν por contraste teológico, evitando «mundano» por su matiz moral en español.
  - La nota a recupera el antecedente implícito sin añadirlo innecesariamente al cuerpo del texto.
