translation:
  language: es
  text: 'diciendo[a]: «Esto es la sangre del pacto que Dios les ordenó»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Esto [es] la sangre del pacto que Dios ordenó para ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce la cita y mantiene la relación con la cláusula anterior. «Diciendo» conserva ese enlace sin convertirlo innecesariamente en una forma finita.
- source_word: Τοῦτο
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  - Esto es
  lexicon: BDAG
  rationale: El griego carece de copulativo explícito; en español, para una predicación clara y natural, conviene suplir «es». «Esta es» mantiene la economía del original y su valor deíctico.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre sacrificial
  - la sangre
  lexicon: BDAG
  rationale: La equivalencia directa es «sangre». El contexto de ratificación sacrificial queda en el término mismo, sin necesidad de paraphrasear.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En este eco de Éxodo 24:8, el sentido es de pacto ratificado por sangre, no de «testamento». «Pacto» es natural en español bíblico y conserva la fuerza covenantal.
- source_word: ἧς
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - del cual
  - de la cual
  lexicon: BDAG
  rationale: 'La relativa femenina retoma «pacto». En español, «que» produce una frase fluida y fiel: «el pacto que Dios mandó para ustedes».'
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó dar
  lexicon: BDAG
  rationale: El verbo expresa mandar/ordenar. «Mandó» es el equivalente más directo y natural en español, sin elevar el registro más de lo que el griego requiere.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - con respecto a ustedes
  lexicon: BDAG
  rationale: Aunque πρός con acusativo puede ser «a», en este contexto de mandato relacionado con el pueblo, «para ustedes» comunica bien la orientación del acto y sigue el matiz contextual del audit trail inglés.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: «Dios» es la forma estándar y suficiente para θεός aquí; el artículo griego no exige una expansión en español.
theological_decisions:
- issue: διαθήκη en un contexto de ratificación mosaica por sangre
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  rationale: El trasfondo inmediato es Éxodo 24:8 y la inauguración del pacto por sangre. «Pacto» evita importar el sentido jurídico de «testamento» y conserva la lectura covenantal documentada.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; consistency of key terms'
- issue: Copulativo implícito con Τοῦτο
  english_pob_reading: This is the blood of the covenant
  chosen_spanish_reading: Esta es la sangre del pacto
  alternative_spanish_readings:
  - Esta, la sangre del pacto
  rationale: El español requiere verbo expreso para una cita transparente. Añadir «es» no añade contenido doctrinal; solo hace gramatical la predicación implícita del griego.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence'
translation_notes:
  revision_awareness: 'El inglés POB conserva el participio presente «saying» y ofrece como alternativa menos natural una formulación más literal con la copulativa implícita. La presente redacción sigue ese mismo equilibrio: mantiene el participio con «diciendo», hace explícito el copulativo por exigencia del español y preserva «pacto» frente a «testamento» según el trasfondo de Éxodo 24:8. No se detectaron cambios de revisión posteriores que afecten este verso.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB «pacto» para διαθήκη en este contexto.
  - «Dios» traduce θεός sin añadir títulos devocionales no presentes en el griego.
  - Se conserva el tono bíblico formal pero con sintaxis española natural.
  - La nota al pie reproduce la alternativa literal relevante sin duplicar marcador.
