translation:
  language: es
  text: que tenía un incensario[a] de oro y el arca del pacto, cubierta por todas partes de oro, en la cual había un jarro de oro que contenía el maná, la vara de Aarón que brotó, y las tablas del pacto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «altar del incienso». El término griego θυμιατήριον puede referirse a un implemento para quemar incienso, y su sentido exacto en este pasaje sigue siendo discutido.
    reason: alternative_reading
lexical_decisions:
- source_word: θυμιατήριον
  english_pob_choice: golden censer
  chosen_spanish: incensario
  alternatives_spanish:
  - altar del incienso
  - brasero de incienso
  lexicon: BDAG
  rationale: El griego puede referirse a un implemento para el incienso y en este versículo sigue siendo debatido. Dado el ajuste del POB inglés hacia «golden censer» por precisión léxica, «incensario» conserva esa opción sin forzar el sentido a «altar del incienso».
- source_word: χρυσοῦν
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorado
  - hecho de oro
  lexicon: BDAG
  rationale: El adjetivo expresa materialidad o cualidad metálica. En español bíblico, «de oro» es claro, natural y fiel al valor semántico.
- source_word: κιβωτὸν τῆς διαθήκης
  english_pob_choice: ark of the covenant
  chosen_spanish: arca del pacto
  alternatives_spanish:
  - arca del convenio
  - arca del testimonio
  lexicon: BDAG
  rationale: «Arca» es el equivalente normal de κιβωτός en este contexto. Para διαθήκη, el POB inglés eligió «covenant»; en español, «pacto» reproduce ese campo semántico de forma transparente y reconocible.
- source_word: περικεκαλυμμένην πάντοθεν χρυσίῳ
  english_pob_choice: covered on all sides with gold
  chosen_spanish: cubierta por todas partes de oro
  alternatives_spanish:
  - revestida por completo de oro
  - cubierta totalmente de oro
  lexicon: BDAG
  rationale: La forma verbal y el adverbio enfatizan cobertura total. «Por todas partes» mantiene esa extensión sin sobreinterpretar el tipo de recubrimiento.
- source_word: ἐν ᾗ
  english_pob_choice: in which were
  chosen_spanish: en la cual había
  alternatives_spanish:
  - en la que había
  - donde había
  lexicon: BDAG
  rationale: Aunque el relativo es singular y remite al arca, la lista siguiente exige un giro idiomático en español. «Había» conserva la presentación de contenido sin endurecer la concordancia.
- source_word: στάμνος χρυσῆ ἔχουσα τὸ μάννα
  english_pob_choice: a golden jar holding the manna
  chosen_spanish: un jarro de oro que contenía el maná
  alternatives_spanish:
  - una vasija de oro con el maná
  - un cántaro de oro que tenía el maná
  lexicon: BDAG
  rationale: στάμνος designa un recipiente; «jarro» es natural en español y mantiene la imagen concreta. «Contenía» expresa ἔχουσα de modo fluido sin perder el matiz de posesión/contenido.
- source_word: μάννα
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - el manna
  lexicon: BDAG
  rationale: Se conserva el término tradicional y transparente para la provisión del desierto.
- source_word: ῥάβδος Ἀαρὼν ἡ βλαστήσασα
  english_pob_choice: Aaron’s staff that budded
  chosen_spanish: la vara de Aarón que reverdeció
  alternatives_spanish:
  - la vara de Aarón que brotó
  - la vara de Aarón que floreció
  lexicon: BDAG
  rationale: ῥάβδος puede ser «vara» o «bastón/vara». «Reverdeció» comunica el hecho del brotar milagroso sin obligar a una imagen única de floración, y encaja bien con el participio aoristo de resultado puntual.
- source_word: πλάκες τῆς διαθήκης
  english_pob_choice: the tablets of the covenant
  chosen_spanish: las tablas del pacto
  alternatives_spanish:
  - las tablas del convenio
  - las tablas del testimonio
  lexicon: BDAG
  rationale: πλάκες son «tablas». Con διαθήκη, «pacto» mantiene consistencia con el resto del versículo y con el valor elegido para el arca.
theological_decisions:
- issue: Valor de θυμιατήριον en la enumeración del mobiliario sagrado
  english_pob_reading: golden censer
  chosen_spanish_reading: incensario de oro
  alternative_spanish_readings:
  - altar del incienso de oro
  - brasero de incienso de oro
  rationale: La evidencia léxica y el ajuste revisado del POB apuntan a un implemento para el incienso más que a un altar fijo. La traducción española conserva la tensión interpretativa sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Traducción de διαθήκη en un contexto cultual y veterotestamentario
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  rationale: En este contexto, el sentido bíblico-teológico es pactal, no testamentario. «Pacto» mantiene la relación con la historia de Israel y con el lenguaje de Hebreos.
  doctrine_reference: BDAG / covenantal context in Hebrews
translation_notes:
  revision_awareness: La edición inglesa pasó de «altar of incense» a «censer» para acercarse más al valor léxico de θυμιατήριον. Esta versión española sigue esa revisión y evita introducir una solución más interpretativa que no esté claramente sustentada por el griego.
  spanish_consistency_notes:
  - Se mantiene «pacto» para διαθήκη en todo el versículo.
  - Se conserva «maná» como término fijo y reconocido.
  - «Vara» reproduce mejor ῥάβδος que «bastón» en este contexto cultual.
  - El relativo singular («en la cual») se adapta al español idiomático sin alterar la referencia al arca.
