translation:
  language: es
  text: Y tampoco fue para que se ofreciera a sí mismo muchas veces, como el sumo sacerdote entra en los lugares santos[a] año tras año con sangre ajena,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario». El griego dice «los lugares santos»; algunos entienden esto más específicamente como «el Lugar Santísimo» en este contexto cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδ’ ἵνα
  english_pob_choice: Nor was it so that
  chosen_spanish: Ni tampoco para que
  alternatives_spanish:
  - Ni para que
  - Y no para que
  lexicon: BDAG
  rationale: La construcción niega un propósito; en español, «ni tampoco para que» conserva la continuidad de la negación y la finalidad sin sonar forzado.
- source_word: πολλάκις
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - repetidas veces
  - a menudo
  lexicon: BDAG
  rationale: «Muchas veces» reproduce de forma directa la repetición que el contexto contrasta con la acción anual del sumo sacerdote.
- source_word: προσφέρῃ ἑαυτόν
  english_pob_choice: he might offer himself
  chosen_spanish: se ofrezca a sí mismo
  alternatives_spanish:
  - ofrezca a sí mismo
  - se sacrificara
  lexicon: BDAG
  rationale: «Ofrecerse a sí mismo» conserva el sentido sacrificial de προσφέρω y el valor reflexivo de ἑαυτόν; «se ofrezca» refleja el subjuntivo final de ἵνα en un español natural.
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - del mismo modo que
  lexicon: BDAG
  rationale: En español, «como» introduce con claridad la comparación; la relación comparativa ya queda reforzada por el contraste del contexto.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente natural y preciso del oficio cultual en contexto judío.
- source_word: εἰσέρχεται
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  - se introduce
  lexicon: BDAG
  rationale: «Entra» conserva la acción habitual y solemne del verbo sin introducir matices innecesarios.
- source_word: εἰς τὰ ἅγια
  english_pob_choice: the holy places
  chosen_spanish: los lugares santos
  alternatives_spanish:
  - el santuario
  - el Lugar Santísimo
  lexicon: BDAG
  rationale: El plural neutro griego es literalmente «los lugares santos». En español, esta opción preserva la forma cultual del texto sin especificar más de lo que el griego exige; «el santuario» o «el Lugar Santísimo» serían interpretaciones más estrechas.
- source_word: κατ’ ἐνιαυτὸν
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: BDAG
  rationale: «Año tras año» comunica la reiteración anual con naturalidad y mantiene la idea de repetición periódica.
- source_word: ἐν αἵματι ἀλλοτρίῳ
  english_pob_choice: with blood not his own
  chosen_spanish: con sangre ajena
  alternatives_spanish:
  - con sangre no suya
  - con sangre de otro
  lexicon: BDAG
  rationale: «Ajena» resume bien ἀλλότριος como algo perteneciente a otro. En español suena natural y evita la redundancia de «no suya»; la idea de contraste con Cristo queda preservada por el contexto.
theological_decisions:
- issue: Alcance de εἰς τὰ ἅγια
  english_pob_reading: The holy places; some understand this more specifically as the Most Holy Place in this cultic context.
  chosen_spanish_reading: los lugares santos
  alternative_spanish_readings:
  - el santuario
  - el Lugar Santísimo
  rationale: Se mantiene la forma plural del griego y la ambigüedad cultual del pasaje. No se fuerza una identificación más estrecha que el texto no exige; el contexto de Hebreos permite la lectura general de un ámbito santo/santuario.
  doctrine_reference: Hebreos 9:24-28; filosofía de traducción POB §§1, 3, 5
- issue: Contraste entre la ofrenda única de Cristo y el ministerio repetido del sumo sacerdote
  english_pob_reading: Christ's once-for-all self-offering contrasted with the high priest's repeated annual entrance using sacrificial blood from another.
  chosen_spanish_reading: Cristo no se ofrece repetidas veces; el sumo sacerdote entra cada año con sangre ajena.
  alternative_spanish_readings:
  - Cristo no se sacrifica muchas veces; el sumo sacerdote entra anualmente con sangre de otro.
  - Cristo no repite su ofrenda; el sumo sacerdote entra año tras año con sangre no suya.
  rationale: La redacción española conserva el contraste central del argumento sin añadir explicaciones doctrinales ajenas al versículo. «Sangre ajena» mantiene la tensión con la autoofrenda de Cristo y la repetición levítica.
  doctrine_reference: Hebreos 9:24-28; 10:10-14
translation_notes:
  revision_awareness: The English audit trail reports no applied revisions and high agreement on the current rendering. The Spanish draft follows the established English decisions closely while adapting them to natural, publication-ready Spanish and preserving the same lexical/theological boundaries.
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» para el oficio cultual, en coherencia con el uso bíblico estándar y con el contexto de Hebreos.
  - Se conserva la ambigüedad de εἰς τὰ ἅγια mediante «los lugares santos», evitando sobreinterpretar el alcance del recinto.
  - «Sangre ajena» traduce ἀλλοτρίῳ con brevedad y conserva el contraste de pertenencia implícito en el griego.
  - La construcción negativa-final «ni tampoco para que» refleja la lógica del propósito negado en la oración griega y su continuación desde el contexto inmediato.
