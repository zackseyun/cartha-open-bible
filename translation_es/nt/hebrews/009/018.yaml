    rationale: Aunque el griego usa el adjetivo sustantivado, en español dejar «el primer» oscurece el referente. El POB inglés ya documentó que explicitar «covenant» no añade contenido nuevo sino que aclara la anáfora.
  - severity: low
    issue: La nota alternativa necesita reorientarse
    rationale: Debe presentar como alternativa la traducción más literal («el primero» / «el primer»), no «el primer pacto», que debe ir en el texto principal.
