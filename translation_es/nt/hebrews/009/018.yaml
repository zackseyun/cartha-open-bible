  spanish_quality_summary: 'La frase suena mayormente natural salvo por «el primer[a]», que es gramaticalmente anómala e insuficientemente clara en español. La nota actual también invierte indebidamente la relación principal/alternativa: el texto debería decir «el primer pacto», y la nota puede preservar la alternativa literal «el primero» o «el primer».'
  glossary_alignment: «pacto» es la mejor alineación con la decisión teológica y contextual del POB en este versículo; «testamento» debe quedar solo como alternativa en nota. No hay conflicto con la terminología base del proyecto.
  issues:
  - severity: high
    issue: «el primer[a]» en el texto principal
    rationale: No es una forma española válida ni legible; además no refleja la decisión del POB de explicitar «covenant/pacto» por claridad contextual.
  - severity: medium
