translation:
  language: es
  text: Por tanto, ni siquiera el primer pacto[a] fue inaugurado sin sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el primero»; el griego dice literalmente «la primera/el primero», con el sustantivo entendido por el contexto. Algunas traducciones lo expresan más formalmente como «el primer testamento».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - De donde se sigue
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión; «Por tanto» conserva el valor lógico y suena natural en español bíblico contemporáneo sin perder la relación argumentativa con lo anterior.
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - ni
  - tampoco
  lexicon: BDAG
  rationale: La fuerza enfática de la negación se expresa bien con «ni siquiera», que reproduce el énfasis de exclusión y corresponde al matiz del inglés POB.
- source_word: ἡ πρώτη
  english_pob_choice: the first covenant
  chosen_spanish: el primer[a]
  alternatives_spanish:
  - el primero[a]
  - el primer pacto
  - el primer testamento
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado femenino que remite al antecedente inmediato («el primer» convenio/covenant). En español, para mantener la elipsis y no fijar de más un sustantivo que el griego omite, se deja «el primer» y se marca la nota para aclarar el referente contextual a «pacto/covenant».
- source_word: χωρὶς αἵματος
  english_pob_choice: without blood
  chosen_spanish: sin sangre
  alternatives_spanish:
  - aparte de sangre
  - sin derramamiento de sangre
  lexicon: BDAG
  rationale: «Sin sangre» reproduce la preposición y conserva la fuerza sacrificial/cultual. «Derramamiento de sangre» explicita más de lo que el griego dice; por eso se evita en el texto principal.
- source_word: ἐγκεκαίνισται
  english_pob_choice: was inaugurated
  chosen_spanish: fue inaugurado
  alternatives_spanish:
  - ha sido inaugurado
  - fue dedicado
  - fue ratificado
  - fue puesto en vigor
  lexicon: BDAG
  rationale: «Inaugurar» es el equivalente más cercano al verbo cultual de iniciar formalmente una realidad pactal. El pasivo español mantiene la voz pasiva del griego y el valor ceremonial del término.
theological_decisions:
- issue: Referente de «el primer»
  english_pob_reading: the first covenant
  chosen_spanish_reading: el primer pacto
  alternative_spanish_readings:
  - el primer testamento
  - la primera alianza
  - el primero
  rationale: El contexto inmediato de Hebreos 9 trata del pacto anterior y su inauguración mediante sangre; el masculino «pacto» resuelve la elipsis de forma natural en español. La nota preserva la tensión entre traducir el adjetivo sustantivado literalmente y explicitar el referente contextual.
  doctrine_reference: 'Hebreos 9:1, 15–17; Traducción POB: equivalencia óptima y claridad contextual'
translation_notes:
  revision_awareness: El inglés POB no cambió en la revisión más reciente; el acuerdo de revisión es alto y no se registraron cambios aplicados. La versión española sigue ese mismo estado textual y mantiene la decisión contextual sobre el referente elíptico.
  spanish_consistency_notes:
  - Se mantuvo el uso de «inaugurado» para ἐγκαινίζω, en línea con la decisión inglesa.
  - Se preservó la elipsis de ἡ πρώτη mediante una nota, en lugar de forzar un sustantivo en el cuerpo del texto.
  - «Sangre» se dejó sin expansión interpretativa para no introducir un matiz no explicitado por el griego.
