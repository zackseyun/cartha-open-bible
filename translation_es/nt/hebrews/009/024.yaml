  to: Porque el Mesías no entró en lugares santos[a] hechos por manos humanas, copias[b] de las cosas verdaderas, sino en el cielo mismo, ahora para presentarse en la presencia de Dios[c] en favor nuestro.
  rationale: 'Se revisa para alinearse mejor con el griego y con la auditoría del POB: se restaura el plural de ἅγια como ''lugares santos'', se añade una nota para la alternativa ''santuario'', se conserva en nota la literalidad de τῷ προσώπῳ τοῦ θεοῦ pero se usa un texto principal idiomático en español, y se refuerza la fuerza representativa de ὑπὲρ ἡμῶν con ''en favor nuestro''. También se mejora la naturalidad de χειροποίητα con ''hechos por manos humanas''.'
