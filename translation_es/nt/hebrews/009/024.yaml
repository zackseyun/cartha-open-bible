source:
  edition: SBLGNT
  text: οὐ γὰρ εἰς χειροποίητα ⸂εἰσῆλθεν ἅγια⸃ Χριστός, ἀντίτυπα τῶν ἀληθινῶν, ἀλλ’ εἰς αὐτὸν τὸν οὐρανόν, νῦν ἐμφανισθῆναι τῷ προσώπῳ τοῦ θεοῦ ὑπὲρ ἡμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/009/024.yaml
  text: For Messiah did not enter into holy places made by hands[a], copies of the true things, but into heaven itself[c][b], now to appear in the presence of God on our behalf.
  footnotes:
  - marker: a
    text: 'Or ''Christ'': Greek Χριστός. The main text uses ''Messiah'' because the title sense is active here.'
    reason: alternative_reading
  - marker: b
    text: Or 'representations' or 'counterparts' for 'copies.' The Greek term denotes things corresponding to the true heavenly realities.
    reason: lexical_alternative
  - marker: c
    text: Literally 'before the face of God.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
