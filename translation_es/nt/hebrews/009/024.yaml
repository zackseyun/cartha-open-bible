    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for more natural register and consistency with standard formal translation usage in this context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque el Mesías no entró en lugares santos[a] hechos por manos humanas, copias[b] de las cosas verdaderas, sino en el cielo mismo, ahora para presentarse en la presencia de Dios[c] en favor nuestro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "santuario": el griego usa un plural neutro con sentido cultual. Aquí se traduce "lugares santos" para conservar el plural del original.'
    reason: lexical_alternative
  - marker: b
    text: O "representaciones" o "correspondencias". El término griego denota cosas que corresponden a las realidades verdaderas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, "delante del rostro de Dios".
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto conserva el valor titular de Χριστός; por eso se traduce como 'el Mesías' y no como nombre eclesiástico fijo. Esto sigue la preferencia del POB por mantener el sentido del título en pasajes argumentativos y sacerdotales.
- source_word: χειροποίητα
  english_pob_choice: made by hands
  chosen_spanish: hecho por manos
  alternatives_spanish:
  - hecho por mano humana
  - hecho por manos humanas
  lexicon: BDAG
  rationale: La expresión española 'hecho por manos' preserva la resonancia bíblica de algo producido humanamente y mantiene el contraste con la realidad celestial. Se evita una explicación más libre que debilite la fórmula del original.
- source_word: ἅγια
  english_pob_choice: holy places
  chosen_spanish: un santuario
  alternatives_spanish:
  - lugares santos
  - el santuario
  - el lugar santo
  lexicon: BDAG
  rationale: Aunque el griego está en plural neutro, en español una solución natural y fiel es 'santuario' para el ámbito cultual de Hebreos. Se documenta la alternativa plural porque el original no nombra una sola cámara, sino el conjunto del espacio sagrado contrastado con el cielo.
- source_word: ἀντίτυπα τῶν ἀληθινῶν
  english_pob_choice: copies of the true things
  chosen_spanish: copias de las cosas verdaderas
  alternatives_spanish:
  - representaciones de las realidades verdaderas
  - correspondencias de las realidades verdaderas
  lexicon: BDAG
  rationale: '''Copias'' conserva el valor de correspondencia tipológica que el POB destaca en inglés. ''Las cosas verdaderas'' refleja el sustantivo plural del griego y mantiene la tensión entre lo terrenal y lo celestial sin reducirlo a una sola paráfrasis interpretativa.'
- source_word: αὐτὸν τὸν οὐρανόν
  english_pob_choice: heaven itself
  chosen_spanish: el cielo mismo
  alternatives_spanish:
  - el cielo en sí
  - el cielo mismo
  lexicon: BDAG
  rationale: '''El cielo mismo'' reproduce la fuerza enfática del griego y resulta natural en español. Se conserva la idea de acceso directo a la realidad celestial, no a su representación terrenal.'
- source_word: ἐμφανισθῆναι
  english_pob_choice: to appear
  chosen_spanish: para presentarse
  alternatives_spanish:
  - para aparecer
  - para manifestarse
  lexicon: BDAG
  rationale: En este contexto sacerdotal y de intercesión, 'presentarse' comunica bien la finalidad del infinitivo y su matiz de comparecer ante Dios. 'Aparecer' y 'manifestarse' son posibles, pero menos precisos para el registro cultual del pasaje.
- source_word: τῷ προσώπῳ τοῦ θεοῦ
  english_pob_choice: in the presence of God
  chosen_spanish: delante del rostro de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante el rostro de Dios
  lexicon: BDAG
  rationale: Se conserva la imagen literal del 'rostro' para no perder la concreción del griego. Aunque 'en la presencia de Dios' es idiomático, 'delante del rostro de Dios' mantiene mejor la fuerza personal e inmediata de acceso.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: on our behalf
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor de nosotros
  - a nuestro favor
  lexicon: BDAG
  rationale: '''Por nosotros'' es una forma breve y natural en español que puede llevar el sentido representativo e intercesor del contexto. Se evita una expansión innecesaria; el matiz de mediación queda apoyado por el marco sacerdotal de Hebreos.'
theological_decisions:
- issue: Título mesiánico Χριστός
  english_pob_reading: Rendered as 'the Messiah.'
  chosen_spanish_reading: '''el Mesías'''
  alternative_spanish_readings:
  - '''Cristo'''
  rationale: La tradición editorial del POB trata Χριστός como título cuando su valor titular está activo. En este versículo, el argumento sobre la entrada sacerdotal y la consumación del acceso a Dios favorece el título 'Mesías' sin alterar la cristología.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Naturaleza de ἅγια en el contexto de Hebreos
  english_pob_reading: '''holy places'' preserves the plural cultic imagery.'
  chosen_spanish_reading: '''un santuario'' con nota de plural implícito en el original'
  alternative_spanish_readings:
  - '''lugares santos'''
  - '''el santuario'''
  rationale: El griego usa un plural neutro con sentido cultual. En español, 'santuario' comunica con claridad el ámbito sagrado; la nota reconoce que el original no se limita necesariamente a una sola dependencia, preservando la tensión textual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of ὑπὲρ ἡμῶν
  english_pob_reading: '''on our behalf'' preserves representative/intercessory force.'
  chosen_spanish_reading: '''por nosotros'''
  alternative_spanish_readings:
  - '''en favor de nosotros'''
  - '''a nuestro favor'''
  rationale: La frase española mantiene la idea de beneficio y representación sin fijar una teoría más estrecha que la que el versículo expresa. El contexto sacerdotal de Hebreos sostiene la lectura intercesora.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Literalness of τῷ προσώπῳ τοῦ θεοῦ
  english_pob_reading: Literally 'before the face of God.'
  chosen_spanish_reading: '''delante del rostro de Dios'''
  alternative_spanish_readings:
  - '''ante el rostro de Dios'''
  - '''en la presencia de Dios'''
  rationale: Se retiene la metáfora del 'rostro' porque el POB documenta explícitamente esa literalidad. En español, la construcción sigue siendo comprensible y preserva la dimensión personal del acceso al Padre.
  doctrine_reference: Lexical note c in English audit trail
translation_notes:
  revision_awareness: El borrador sigue el paquete de fuente griega SBLGNT y el rastro auditado en inglés. Conserva las decisiones restauradas del POB sobre Χριστός = 'Mesías' y mantiene la tensión cultual de ἅγια sin mecanicismo. También refleja la nota inglesa sobre la literalidad de τῷ προσώπῳ τοῦ θεοῦ, aunque en español se eligió una formulación más directa para publicación.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός, conforme al criterio POB para el valor titular.
  - '''Santuario'' se emplea como solución natural en español, pero se documenta la alternativa plural del griego.'
  - '''El cielo mismo'' conserva la intensificación de αὐτὸν τὸν οὐρανόν.'
  - '''Por nosotros'' mantiene el matiz mediador de ὑπὲρ ἡμῶν sin sobrerinterpretación.'
  - Se evita 'SEÑOR' para θεός y se traduce consistentemente como 'Dios'.
