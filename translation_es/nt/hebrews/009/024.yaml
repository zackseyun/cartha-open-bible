    text: 'O "santuario": el griego usa un plural neutro con sentido cultual. Aquí se traduce "lugares santos" para conservar el plural del original.'
    reason: lexical_alternative
  - marker: b
    text: O "representaciones" o "correspondencias". El término griego denota cosas que corresponden a las realidades verdaderas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, "delante del rostro de Dios".
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinearse mejor con el griego y con la auditoría del POB: se restaura el plural de ἅγια como ''lugares santos'', se añade una nota para la alternativa ''santuario'', se conserva en nota la literalidad de τῷ προσώπῳ τοῦ θεοῦ pero se usa un texto principal idiomático en español, y se refuerza la fuerza representativa de ὑπὲρ ἡμῶν con ''en favor nuestro''. También se mejora la naturalidad de χειροποίητα con ''hechos por manos humanas''.'
