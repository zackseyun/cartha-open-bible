translation:
  language: es
  text: Y asimismo roció con la sangre tanto el tabernáculo[a] como todos los utensilios[b] del servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tienda». «Tabernáculo» conserva el sentido cultual del término griego, que en este contexto no significa simplemente «tienda».
    reason: lexical_alternative
  - marker: b
    text: O «todos los artículos del servicio». «Utensilios» traduce el conjunto de objetos usados en el servicio sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκηνή
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - tienda sagrada
  lexicon: BDAG
  rationale: En Hebreos, σκηνή alude al santuario mosaico, no a una tienda genérica. «Tabernáculo» conserva el sentido cultual y el uso bíblico recibido sin perder precisión.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasos
  - implementos
  - objetos
  lexicon: BDAG
  rationale: σ κεῦη designa objetos o equipo empleado en el servicio sagrado. «Utensilios» es natural en español y mantiene la referencia funcional sin sonar demasiado técnica.
- source_word: λειτουργία
  english_pob_choice: ministry
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - servicio litúrgico
  lexicon: BDAG
  rationale: Aquí λειτουργία apunta al servicio sacerdotal/cultual. «Servicio» comunica bien la función ritual; «ministerio» podría sonar más institucional en español y menos directamente ligado al acto.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: BDAG
  rationale: Referencia literal a la sangre sacrificial en contexto ritual; no hay motivo para suavizar o parafrasear.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - de igual manera
  - igualmente
  lexicon: BDAG
  rationale: Marca continuidad con la acción anterior. «Asimismo» es breve, natural y conserva la relación comparativa.
- source_word: ῥαντίζω
  english_pob_choice: sprinkled
  chosen_spanish: roció
  alternatives_spanish:
  - asperjó
  - esparció
  lexicon: BDAG
  rationale: En español bíblico, «rociar» comunica el gesto ritual de aplicar sangre con claridad y sin exceso de tecnicismo. «Asperjar» sería más técnico, pero menos idiomático para lectura pública.
- source_word: τὰ σκεύη τῆς λειτουργίας
  english_pob_choice: the vessels of the ministry
  chosen_spanish: los utensilios del servicio
  alternatives_spanish:
  - los utensilios del ministerio
  - los objetos del servicio
  lexicon: BDAG
  rationale: La frase completa preserva el vínculo entre los objetos y la función ritual. «Del servicio» mantiene la relación semántica de λειτουργία sin introducir una connotación eclesiástica ajena al contexto.
theological_decisions:
- issue: Rito mosaico y alcance de la enumeración
  english_pob_reading: Translate straightforwardly as a summary statement about Moses sprinkling the tabernacle and its cultic implements with blood, without harmonizing details beyond the text.
  chosen_spanish_reading: 'Traducirlo como una afirmación resumida del rito: se roció con sangre tanto el tabernáculo como todos los utensilios del servicio, sin añadir explicaciones externas ni armonizaciones.'
  alternative_spanish_readings:
  - Explicar en el texto principal el trasfondo de Éxodo
  - Suavizar la afirmación para resolver posibles diferencias con el relato del Éxodo
  rationale: El versículo presenta una síntesis ritual dentro del argumento de Hebreos. La traducción debe respetar esa síntesis y no introducir material explicativo que el griego no incluye.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste del audit trail inglés: anteponer «con la sangre» y usar una construcción correlativa con «tanto ... como ...» para reflejar el paralelo entre el tabernáculo y todos los utensilios. Se evitó traducir mecánicamente desde el inglés cuando el orden español más natural exigía reestructuración.'
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para σκηνή, coherente con el vocabulario cultual de Hebreos.
  - Se usa «sangre» de forma literal por el contexto sacrificial.
  - «Servicio» evita desplazar λειτουργία hacia un sentido eclesiástico moderno.
  - La puntuación y el orden reflejan un español público y natural, sin borrar la estructura doble del griego.
