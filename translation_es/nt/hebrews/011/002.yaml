translation:
  language: es
  text: Pues por ella recibieron aprobación[a][b] los antiguos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fueron elogiados' o 'recibieron testimonio favorable'. El verbo griego indica que recibieron un testimonio favorable.
    reason: lexical_alternative
  - marker: b
    text: Es decir, por la fe, como se describe en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O 'los ancianos' o 'la gente de tiempos pasados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταύτῃ
  english_pob_choice: by this
  chosen_spanish: por esto
  alternatives_spanish:
  - en esto
  - por ella
  - por la cual
  lexicon: BDAG
  rationale: La combinación ἐν + demostrativo femenino singular se refiere a la fe de 11:1 y expresa medio o base. En español, 'por esto' comunica de manera natural la relación instrumental causal sin ocultar el antecedente implícito. 'En esto' sería más literal, pero menos idiomático; 'por ella' haría más explícito el antecedente, aunque la referencia sigue siendo recuperable del contexto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es que
  lexicon: BDAG
  rationale: γάρ introduce la explicación del enunciado anterior. 'Porque' preserva la relación explicativa y suena natural al iniciar una oración en español.
- source_word: ἐμαρτυρήθησαν
  english_pob_choice: received approval
  chosen_spanish: recibieron aprobación
  alternatives_spanish:
  - recibieron testimonio favorable
  - fueron aprobados
  - fueron elogiados
  lexicon: BDAG
  rationale: El pasivo aoristo de μαρτυρέω aquí indica que recibieron un testimonio favorable. 'Recibieron aprobación' mantiene la idea de evaluación positiva y funciona con buena naturalidad en español. 'Recibieron testimonio favorable' es más literal pero más pesado; 'fueron aprobados' puede sonar demasiado técnico o abstracto.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los antiguos
  - los de antaño
  lexicon: BDAG
  rationale: πρεσβύτεροι puede designar literalmente a 'ancianos', pero en Hebreos 11 se refiere a las personas fieles de generaciones anteriores. 'Los ancianos' preserva la forma léxica y mantiene abierta la referencia histórica. 'Los antiguos' o 'los de antaño' interpretan más libremente y se reservan mejor para nota.
theological_decisions:
- issue: Referente de ταύτῃ
  english_pob_reading: The demonstrative refers to faith, linking verse 2 directly to the definition in 11:1.
  chosen_spanish_reading: El demostrativo apunta a la fe mencionada en 11:1, aunque la expresión conserva una referencia contextual amplia.
  alternative_spanish_readings:
  - El demostrativo se refiere más ampliamente a la realidad descrita en 11:1.
  - El demostrativo se refiere de manera implícita a la fe como medio de aprobación.
  rationale: En español, 'por esto' conserva la deixis del griego y deja que el antecedente se recupere del contexto inmediato. Esto mantiene la conexión con 11:1 sin resolverla de modo excesivamente explícito, respetando la tensión documentada en la auditoría inglesa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La auditoría inglesa indica estabilidad textual y revisiones recientes sin cambios, con observación menor de acuerdo. No se proponen modificaciones al contenido base; solo se ajusta la formulación española para naturalidad y transparencia lexical.
  spanish_consistency_notes:
  - Se mantiene 'Dios' solo cuando el contexto lo exija; aquí no aparece.
  - Se preserva 'ancianos' para reflejar πρεσβύτεροι, dejando la expansión histórica en nota.
  - '''Por esto'' conserva la referencia demostrativa sin añadir un antecedente explícito que cierre la ambigüedad del texto griego.'
  - Las notas reproducen las alternativas léxicas y la referencia a la fe del versículo anterior, siguiendo el patrón auditado del POB en inglés.
