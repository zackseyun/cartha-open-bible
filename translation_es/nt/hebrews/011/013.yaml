    changes_summary: Changed 'welcomed' to 'greeted' for closer lexical accuracy to ἀσπασάμενοι, and 'temporary residents' to 'exiles' for a more natural and standard rendering of παρεπίδημοι alongside 'strangers.'
translation:
  language: es
  text: Todos estos murieron en fe[a], sin haber recibido las promesas, sino habiéndolas visto de lejos y saludándolas, y confesando[c] que eran extranjeros y peregrinos[b] en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la fe'. La expresión griega puede entenderse también como 'según la fe' o 'en la esfera de la fe'.
    reason: lexical_alternative
  - marker: b
    text: O 'forasteros' o 'residentes temporales'. El término describe a personas que viven en un lugar sin pertenencia plena ni arraigo definitivo.
    reason: lexical_alternative
  - marker: c
    text: O 'habiendo confesado'. El participio griego puede expresarse también en español con una forma participial más explícita.
    reason: previous_rendering
lexical_decisions:
- source_word: Κατὰ πίστιν
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - por fe
  - según la fe
  lexicon: BDAG
  rationale: La construcción κατά + acusativo expresa aquí la esfera o el modo de su muerte. 'En fe' conserva la relación idiomática con πίστης y mantiene la idea de una disposición perseverante, sin convertirla en una explicación más larga.
- source_word: ἀπέθανον
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - fallecieron
  - murieron
  lexicon: BDAG
  rationale: El aoristo se traduce de forma directa y sobria. 'Murieron' es transparente y corresponde al valor básico del verbo sin eufemismo añadido.
- source_word: οὗτοι πάντες
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - estos todos
  - todos ellos
  lexicon: BDAG
  rationale: '''Todos estos'' conserva el énfasis demostrativo del griego y resulta natural en español.'
- source_word: μὴ λαβόντες
  english_pob_choice: not having received
  chosen_spanish: sin haber recibido
  alternatives_spanish:
  - no habiendo recibido
  - sin recibir
  lexicon: BDAG
  rationale: El participio con μή se expresa bien con una cláusula participial en español. 'Sin haber recibido' mantiene la relación temporal y lógica con 'murieron' de manera fluida.
- source_word: τὰς ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - lo prometido
  - aquello prometido
  lexicon: BDAG
  rationale: Se conserva el plural explícito del original. 'Las promesas' mantiene la correspondencia léxica directa con ἐπαγγελία.
- source_word: πόρρωθεν
  english_pob_choice: from afar
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - a lo lejos
  lexicon: BDAG
  rationale: '''De lejos'' es natural en español y conserva el sentido espacial de distancia de manera concisa.'
- source_word: ἰδόντες
  english_pob_choice: having seen
  chosen_spanish: viéndolas
  alternatives_spanish:
  - habiéndolas visto
  - al verlas
  lexicon: BDAG
  rationale: Aunque el aoristo participial puede representarse con 'habiendo visto', aquí 'viéndolas' preserva mejor la secuencia verbal del español sin perder el valor aspectual de percepción previa en el contexto.
- source_word: ἀσπασάμενοι
  english_pob_choice: greeted them
  chosen_spanish: saludándolas
  alternatives_spanish:
  - recibiéndolas con saludo
  - abrazándolas
  lexicon: BDAG
  rationale: ἀσπάζομαι puede significar saludar o dar la bienvenida. Como el objeto son las promesas, una traducción literal como 'saludándolas' conserva la figura sin sobreinterpretarla. 'Abrazándolas' sería más interpretativa; 'recibiéndolas con saludo' es más explicativa pero menos ágil.
- source_word: ὁμολογήσαντες
  english_pob_choice: having confessed
  chosen_spanish: confesando
  alternatives_spanish:
  - declarando
  - reconociendo
  lexicon: BDAG
  rationale: '''Confesando'' mantiene la fuerza formal de ὁμολογέω como reconocimiento público. En este contexto, el participio coordinado con los anteriores permite un español más fluido que ''habiendo confesado''.'
- source_word: ξένοι
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - extranjeros
  lexicon: BDAG
  rationale: '''Extraños'' comunica la idea de no pertenencia o de no ser de aquí, y encaja bien con el paralelismo del versículo. ''Extranjeros'' puede sonar demasiado nacional; ''forasteros'' es posible pero menos exacto en esta combinación.'
- source_word: παρεπίδημοί
  english_pob_choice: exiles
  chosen_spanish: exiliados
  alternatives_spanish:
  - peregrinos
  - residentes temporales
  lexicon: BDAG
  rationale: El término describe a quienes viven sin arraigo pleno en un lugar. 'Exiliados' mantiene la fuerza de separación y la tensión de residencia provisional que el POB inglés captó con 'exiles', aunque el matiz no sea idéntico a un exilio político formal.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: BDAG
  rationale: '''En la tierra'' sigue de cerca el griego y conserva el contraste entre su condición y la esfera terrenal en que viven.'
theological_decisions:
- issue: Renderización de πίστις en la frase inicial
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: No hay aquí una construcción polémica del tipo pistis Christou. La referencia es a la postura perseverante de los creyentes al morir. 'Fe' es la opción principal más fiel y reconocible en español; otras posibilidades pueden sugerir matices, pero no se imponen por el contexto.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe'
- issue: Sentido figurado de ἀσπασάμενοι con objeto inanimado
  english_pob_reading: greeted them
  chosen_spanish_reading: saludándolas
  alternative_spanish_readings:
  - recibiéndolas
  - dándoles la bienvenida
  rationale: El griego usa un verbo de saludo/recepción con 'las promesas' como objeto figurado. 'Saludándolas' mantiene la imagen de acercamiento y acogida sin convertirla en una paráfrasis doctrinalmente más amplia.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: παρεπίδημοί como condición de residencia no plena
  english_pob_reading: exiles
  chosen_spanish_reading: exiliados
  alternative_spanish_readings:
  - peregrinos
  - forasteros residentes
  rationale: En español, 'exiliados' comunica con fuerza la idea de vivir fuera del hogar definitivo y en condición no asentada. Aunque puede sonar más fuerte que el griego en algunos contextos, aquí acompaña bien a 'extraños' y preserva la tensión de pertenencia parcial.
  doctrine_reference: 'Translation philosophy: readable modern Spanish'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que prefirió 'greeted' para ἀσπασάμενοι y 'exiles' para παρεπίδημοι. En español, se optó por 'saludándolas' y 'exiliados' para conservar esa misma cercanía léxica sin perder naturalidad. También se mantuvo la secuencia participial del griego con formas breves y coordinadas.
  spanish_consistency_notes:
  - Se usa 'fe' para πίστις conforme al criterio del proyecto.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - '''Las promesas'' conserva el plural explícito del griego.'
  - '''En la tierra'' refleja ἐπὶ τῆς γῆς de manera consistente con el registro bíblico del pasaje.'
  - Las notas b y c reproducen alternativas presentes en el audit trail inglés y las adaptan al español.
