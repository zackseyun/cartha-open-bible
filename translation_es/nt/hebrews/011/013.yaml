review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: ''Todos estos murieron... sin haber recibido las promesas... de lejos... y confesando...''. Sin embargo, varias elecciones no preservan con suficiente fidelidad el matiz fuente ni el razonamiento léxico documentado. ''Viéndolas'' debilita la secuencia de participios aoristos mejor reflejada en español por ''habiéndolas visto''. ''Extraños'' para ξένοι suena menos natural y menos preciso aquí que ''extranjeros'' o ''forasteros''. Más importante, ''exiliados'' para παρεπίδημοι sobretraduce el término, que apunta a residentes de paso / no plenamente pertenecientes, no necesariamente a exilio forzado.'
  spanish_quality_summary: El texto es legible, pero 'saludándolas' con 'promesas' resulta algo rígido en español; aun así puede mantenerse por cercanía léxica si se aclara en nota. La pareja 'extraños y exiliados' no suena idiomática ni bien calibrada para un registro bíblico claro. 'Extranjeros y peregrinos' es mucho más natural y ampliamente comprensible en español eclesial, aunque la nota debe aclarar que 'peregrinos' también puede expresarse como 'residentes temporales' o 'forasteros residentes'.
  glossary_alignment: 'No hay conflicto con terminología base del proyecto. La cuestión principal es léxica: ξένοι/παρεπίδημοι debe distinguir dos términos relacionados pero no idénticos. La solución propuesta ''extranjeros y peregrinos'' conserva el paralelismo y evita cargar παρεπίδημοι con el matiz excesivo de ''exiliados''.'
  issues:
  - severity: medium
    issue: '''viéndolas'' para ἰδόντες'
    rationale: El griego usa participio aoristo en serie con otros participios aoristos. 'Viéndolas' en español introduce un matiz más imperfectivo/simultáneo; 'habiéndolas visto' refleja mejor la secuencia previa a 'saludándolas' y 'confesando'.
  - severity: medium
    issue: '''extraños'' para ξένοι'
    rationale: En español actual, 'extraños' suele sugerir rareza más que extranjería o no pertenencia. En este contexto social-identitario, 'extranjeros' comunica mejor el sentido.
  - severity: high
    issue: '''exiliados'' para παρεπίδημοι'
    rationale: Sobrecarga el término con una idea de expulsión o destierro no exigida por el griego. El propio rastro inglés reconoce sentidos como 'sojourners' o 'resident foreigners'. En español, 'peregrinos' o una nota explicativa preservan mejor el concepto de residencia transitoria sin pertenencia plena.
  - severity: low
    issue: Nota c sobre 'habiendo confesado'
    rationale: La explicación menciona impropiamente 'perfecto participial en español'. Lo relevante es una forma participial más explícita para reflejar el aoristo griego, no un 'perfecto participial' como categoría normativa.
