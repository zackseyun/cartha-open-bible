  to: Todos estos murieron en fe[a], sin haber recibido las promesas, sino habiéndolas visto de lejos y saludándolas, y confesando[c] que eran extranjeros y peregrinos[b] en la tierra.
  rationale: Se ajusta el texto para reflejar mejor los participios aoristos griegos ('habiéndolas visto'), mejorar la naturalidad y precisión semántica de ξένοι ('extranjeros') y evitar la sobretraducción de παρεπίδημοι ('peregrinos' con nota explicativa). Se mantiene 'saludándolas' por cercanía a ἀσπασάμενοι, aunque la nota de alternativas sigue cubriendo posibles matices como 'recibir' o 'dar la bienvenida'.
