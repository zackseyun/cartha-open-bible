source:
  edition: SBLGNT
  text: Κατὰ πίστιν ἀπέθανον οὗτοι πάντες, μὴ ⸀λαβόντες τὰς ἐπαγγελίας, ἀλλὰ πόρρωθεν αὐτὰς ἰδόντες καὶ ἀσπασάμενοι, καὶ ὁμολογήσαντες ὅτι ξένοι καὶ παρεπίδημοί εἰσιν ἐπὶ τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/013.yaml
  text: All these died in faith[a], not having received the promises, but having seen them from afar and greeted them[c][b], and having confessed that they are strangers and exiles on the earth.
  footnotes:
  - marker: a
    text: Or 'having greeted them' or 'having embraced them.' The Greek verb can carry the sense of greeting or welcoming, here used figuratively of the promises seen from afar.
    reason: lexical_alternative
  - marker: b
    text: Or 'sojourners' or 'resident foreigners.' The Greek describes people living in a place without full settled belonging.
    reason: lexical_alternative
  - marker: c
    text: Or 'and having confessed'.
    reason: previous_rendering
  ai_draft:
