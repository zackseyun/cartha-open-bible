revisions:
- from: Por la fe, Rahab, la prostituta, no pereció con los desobedientes[a], porque recibió a los espías en paz[b].
  to: Por fe, Rahab, la prostituta, no pereció con los que desobedecieron[a], por haber recibido a los espías en paz[b].
  rationale: 'La revisión afina tres puntos sin alterar el sentido: (1) «Por fe» suena más natural en la fórmula repetida de Hebreos 11; (2) «con los que desobedecieron» representa mejor el participio aoristo ἀπειθήσασιν, dejando «con los desobedientes» como alternativa válida en nota; y (3) «por haber recibido» expresa de manera más fiel y natural en español la relación del participio δεξαμένη con la cláusula principal, manteniendo la alternativa más literal «habiendo recibido» en nota.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:09:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: πίστει = «Por la fe», ἡ πόρνη = «la prostituta», οὐ συναπώλετο… τοῖς ἀπειθήσασιν = «no pereció con los que desobedecieron / los desobedientes», y τοὺς κατασκόπους μετ’ εἰρήνης = «a los espías en paz». Sin embargo, la cláusula participial δεξαμένη está mejor representada como circunstancia previa/causal más explícita («por haber recibido» o «habiendo recibido») que como simple «porque recibió», y el complemento «con los desobedientes» es menos preciso que «con los que desobedecieron», que conserva mejor el valor verbal del participio aoristo ἀπειθήσασιν y además armoniza con la nota alternativa inglesa.'
  spanish_quality_summary: El español es claro y legible, pero «Por la fe» suena menos natural y formulaico en Hebreos 11 que «Por fe». Además, «con los desobedientes» es comprensible, pero en este contexto narrativo-histórico «con los que desobedecieron» suena más natural y específico. «Porque recibió» no es incorrecto, aunque «por haber recibido» fluye mejor en español digno y representa con más precisión la relación del participio.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. «La prostituta» coincide con la decisión documentada para πόρνη. «Fe» para πίστις y «espías» para κατάσκοπους están bien alineados.
  issues:
  - severity: medium
    issue: 'Fórmula de Hebreos 11: «Por la fe»'
    rationale: Aunque fiel, «Por fe» es la formulación más natural y estable en español bíblico para πίστει en la cadena ejemplar de Hebreos 11. «Por la fe» introduce un artículo innecesario en español.
  - severity: medium
    issue: τοῖς ἀπειθήσασιν traducido como «los desobedientes»
    rationale: El participio aoristo tiene fuerza verbal y contextualiza a los habitantes de Jericó como los que desobedecieron. «Los desobedientes» no es falso, pero es más estático y ligeramente menos preciso que «los que desobedecieron».
  - severity: low
    issue: δεξαμένη como «porque recibió»
    rationale: La causalidad está permitida por contexto, pero «por haber recibido» o «habiendo recibido» refleja mejor la relación participial y evita sonar demasiado explicativo frente al griego más compacto.
  revised_spanish_text: Por fe, Rahab, la prostituta, no pereció con los que desobedecieron[a], por haber recibido a los espías en paz[b].
  revised_footnotes:
  - marker: a
    text: 'O: «con los desobedientes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo recibido a los espías en paz».'
    reason: lexical_alternative
  revision_rationale: 'La revisión afina tres puntos sin alterar el sentido: (1) «Por fe» suena más natural en la fórmula repetida de Hebreos 11; (2) «con los que desobedecieron» representa mejor el participio aoristo ἀπειθήσασιν, dejando «con los desobedientes» como alternativa válida en nota; y (3) «por haber recibido» expresa de manera más fiel y natural en español la relación del participio δεξαμένη con la cláusula principal, manteniendo la alternativa más literal «habiendo recibido» en nota.'
