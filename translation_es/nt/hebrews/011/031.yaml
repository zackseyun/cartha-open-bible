translation:
  language: es
  text: Por fe, Rahab, la prostituta, no pereció con los que desobedecieron[a], por haber recibido a los espías en paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los desobedientes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo recibido a los espías en paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Mediante la fe
  - Con fe
  lexicon: BDAG
  rationale: El dativo instrumental introduce el ejemplo de Rahab en Hebreos 11. "Por la fe" conserva el valor de medio/basis y suena natural en español bíblico sin caer en una paráfrasis.
- source_word: Ῥαὰβ
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio en transliteración, como exige la política de nombres.
- source_word: ἡ πόρνη
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  lexicon: BDAG
  rationale: πόρνη denota de manera directa una prostituta. "La prostituta" mantiene la fuerza social y moral del término con español actual; "ramera" es posible pero más arcaico y menos claro.
- source_word: οὐ συναπώλετο
  english_pob_choice: did not perish
  chosen_spanish: no pereció
  alternatives_spanish:
  - no fue destruida con
  - no pereció juntamente con
  lexicon: BDAG
  rationale: El verbo compuesto implica perecer junto con otros. En español, "no pereció con" comunica de forma natural la idea de co-perdición sin forzar la sintaxis.
- source_word: τοῖς ἀπειθήσασιν
  english_pob_choice: with those who were disobedient
  chosen_spanish: con los desobedientes
  alternatives_spanish:
  - con los que desobedecieron
  - con los incrédulos
  lexicon: BDAG
  rationale: ἀπειθέω aquí señala desobediencia; "desobedientes" preserva el rasgo moral-volitivo del grupo. Se evita "incrédulos" porque estrecha el sentido documentado por el griego y por el audit trail inglés.
- source_word: δεξαμένη
  english_pob_choice: because she had welcomed
  chosen_spanish: porque recibió
  alternatives_spanish:
  - porque había acogido
  - porque dio la bienvenida a
  lexicon: BDAG
  rationale: El participio aoristo medio de δέχομαι expresa la recepción de los espías. "Recibió" es breve y fiel; en español la relación causal queda suficientemente clara por el contexto, y evita añadir un matiz no explicitado como "bienvenida".
- source_word: τοὺς κατασκόπους
  english_pob_choice: the spies
  chosen_spanish: a los espías
  alternatives_spanish:
  - a los exploradores
  lexicon: BDAG
  rationale: κατάσκοπος se traduce con el término común "espías", que es el más transparente en el contexto de Josué.
- source_word: μετ’ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: BDAG
  rationale: La frase preposicional expresa la manera pacífica de la recepción. "En paz" conserva la idiomática bíblica y evita sobreexplicar.
theological_decisions:
- issue: Fórmula ejemplar de Hebreos 11 con πίστει
  english_pob_reading: By faith
  chosen_spanish_reading: Por la fe
  alternative_spanish_readings:
  - Con fe
  - Mediante la fe
  rationale: En Hebreos 11, πίστει introduce un caso ejemplar. "Por la fe" reproduce de modo fiel el valor instrumental y mantiene la fórmula teológica del capítulo sin desplazarla hacia "confianza" o "fidelidad".
  doctrine_reference: 'DOCTRINE.md: πίστις → fe; filosofía de traducción #3'
- issue: Identificación moral de los habitantes de Jericó
  english_pob_reading: those who were disobedient
  chosen_spanish_reading: los desobedientes
  alternative_spanish_readings:
  - los que desobedecieron
  - los incrédulos
  rationale: La base griega remite a desobediencia, no solo a incredulidad. "Los desobedientes" conserva esa tensión y evita una lectura doctrinalmente más estrecha que el texto no exige.
  doctrine_reference: BDAG sobre ἀπειθέω; contexto de Hebreos 11:31
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente ambos marcadores de nota en el texto español. La redacción principal se mantiene cercana al griego y al audit trail inglés, con ajuste natural de sintaxis española.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις en consonancia con Hebreos 11 y con la terminología doctrinal del proyecto.
  - Se usa «prostituta» para πόρνη por claridad moderna y fidelidad léxica.
  - Se preserva «desobedientes» para ἀπειθήσασιν, evitando sustituirlo por un equivalente teológicamente más estrecho.
  - «En paz» conserva la locución breve del original y permite la nota alternativa sobre el participio.
