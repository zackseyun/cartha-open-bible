translation:
  language: es
  text: Por la fe, José, cuando estaba muriendo[a], mencionó el éxodo[b] de los hijos de Israel y dio instrucciones acerca de sus huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al morir».
    reason: lexical_alternative
  - marker: b
    text: O «la partida» de los hijos de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Con fe
  - Por su fe
  lexicon: BDAG
  rationale: Conserva el valor instrumental y la fórmula repetida de Hebreos 11. «Por la fe» es natural en español bíblico y no atenúa el patrón retórico del capítulo.
- source_word: τελευτῶν
  english_pob_choice: when he was dying
  chosen_spanish: cuando estaba muriendo
  alternatives_spanish:
  - al morir
  - cuando agonizaba
  lexicon: BDAG
  rationale: Refleja de forma directa el participio contemporáneo y mantiene la referencia al final de la vida de José. «Cuando estaba muriendo» es fiel y claro en español, sin suavizar el sentido.
- source_word: τῆς ἐξόδου
  english_pob_choice: the exodus
  chosen_spanish: el éxodo
  alternatives_spanish:
  - la salida
  - la partida
  lexicon: BDAG
  rationale: «Éxodo» reproduce el sustantivo griego y conserva el referente histórico-salvífico reconocido en el contexto de Israel. «Salida» o «partida» serían más literales, pero menos precisas aquí.
- source_word: τῶν υἱῶν Ἰσραὴλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: BDAG
  rationale: Se preserva la imagen familiar del griego con una expresión idiomática y ampliamente comprensible en español. «Los israelitas» sería más interpretativo; «hijos varones» sería demasiado explícito para este contexto.
- source_word: ἐμνημόνευσεν
  english_pob_choice: mentioned
  chosen_spanish: mencionó
  alternatives_spanish:
  - hizo mención de
  - habló de
  lexicon: BDAG
  rationale: En esta construcción con περί, el verbo expresa hacer referencia o hablar acerca de algo. «Mencionó» es breve, natural y fiel al valor de referencia del verbo.
- source_word: ἐνετείλατο
  english_pob_choice: gave instructions
  chosen_spanish: dio instrucciones
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: BDAG
  rationale: El verbo expresa una orden o instrucción dada deliberadamente. «Dio instrucciones» comunica bien la intención sin cargar el español con un matiz excesivamente duro.
- source_word: περὶ τῶν ὀστέων αὐτοῦ
  english_pob_choice: concerning his bones
  chosen_spanish: acerca de sus huesos
  alternatives_spanish:
  - sobre sus huesos
  - respecto de sus huesos
  lexicon: BDAG
  rationale: Se conserva el término concreto «huesos», que el texto griego usa explícitamente. «Acerca de» mantiene el valor de περί en un español claro y publicable.
theological_decisions:
- issue: πίστις como fórmula de Hebreos 11
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La serie de Hebreos 11 usa πίστις como eje teológico y retórico, por lo que conviene mantener «fe» como término principal. «Fidelidad» o «confianza» serían posibles en otros contextos, pero aquí debilitarían la correspondencia con la refrán del capítulo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις)'
- issue: τέλος de la vida vs. muerte inminente en τελευτῶν
  english_pob_reading: when he was dying
  chosen_spanish_reading: cuando estaba muriendo
  alternative_spanish_readings:
  - al morir
  - en el momento de su muerte
  rationale: La redacción mantiene la tensión entre un proceso de muerte y la escena final de José. No se suaviza hacia una simple referencia biográfica, porque el participio señala el momento terminal de su testimonio.
  doctrine_reference: Hebreos 11:22; auditable lexical note on τελευτῶν
translation_notes:
  revision_awareness: El texto inglés auditado pasó de una paráfrasis más extensa (“as he was nearing the end of his life”) a la forma más directa “when he was dying”. La versión española sigue esa revisión, evitando ampliar el participio griego y conservando la concisión del versículo. También se mantuvo la coherencia con la decisión auditada de traducir ἔξοδος como «exodus/éxodo» y no como una generalización.
  spanish_consistency_notes:
  - Se usa «Por la fe» para mantener la cadencia de Hebreos 11.
  - «Hijos de Israel» conserva el paralelismo tradicional y la literalidad razonable del griego.
  - No se reemplazó «huesos» por «restos» o «despojos», porque el griego especifica ὀστέων.
  - 'La puntuación sigue el español moderno: coma tras el inciso inicial y coordinación simple con «y».'
