translation:
  language: es
  text: Por fe[a] cayeron los muros de Jericó, después de haber sido rodeados durante siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de la fe». El dativo griego πίστει puede expresar medio o manera; el texto principal conserva la fórmula familiar de Hebreos 11.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por medio de la fe
  - Mediante la fe
  lexicon: BDAG
  rationale: El dativo de πίστις funciona de manera instrumental o modal en esta fórmula repetida de Hebreos 11. «Por la fe» conserva el valor instrumental y el ritmo característico del capítulo sin volverlo explicativo de más.
- source_word: τὰ τείχη
  english_pob_choice: the walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  - las fortificaciones
  lexicon: BDAG
  rationale: τεῖχος suele referirse a un muro o estructura defensiva de una ciudad. En español, «muros» suena natural y precisa ese sentido; «murallas» sería posible, pero aquí «muros» mantiene mejor la sobriedad del texto.
- source_word: Ἰεριχὼ
  english_pob_choice: of Jericho
  chosen_spanish: de Jericó
  lexicon: BDAG
  rationale: El nombre propio se translitera como «Jericó». Aunque el griego presenta una construcción genitiva, en español la relación posesiva se expresa naturalmente con «de Jericó».
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - se derrumbaron
  - se desplomaron
  lexicon: BDAG
  rationale: El aoristo de πίπτω admite «cayeron» como equivalente directo y sobrio. «Se derrumbaron» sería más específico, pero introduce una imagen más interpretativa que el griego no exige.
- source_word: κυκλωθέντα
  english_pob_choice: after they had been encircled
  chosen_spanish: después de haber sido rodeados
  alternatives_spanish:
  - habiendo sido rodeados
  - tras ser rodeados
  lexicon: BDAG
  rationale: El participio pasivo de κυκλόω indica una acción previa de rodear/encerrar. «Después de haber sido rodeados» expresa bien la anterioridad respecto del verbo principal y evita añadir explícitamente el detalle narrativo de quién rodeó los muros.
- source_word: ἐπὶ ἑπτὰ ἡμέρας
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - a lo largo de siete días
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo temporal puede expresar duración. «Durante siete días» es natural en español y conserva el sentido de extensión temporal del pasaje.
theological_decisions:
- issue: Renderización de πίστις en Hebreos 11:30
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El contexto de Hebreos 11 y el patrón repetido del capítulo favorecen «fe» como traducción principal. «Confianza» o «fidelidad» podrían sugerir matices reales en otros contextos, pero aquí «fe» reproduce mejor la formulación del pasaje y el uso doctrinal estándar del término.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith, con alternativas solo cuando la ambigüedad lo requiera'
translation_notes:
  revision_awareness: El borrador sigue el paquete de fuente griego SBLGNT y el audit trail inglés; no se requieren revisiones previas adicionales, y la lectura concuerda plenamente con el resumen de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene el paralelismo natural con la fórmula de Hebreos 11 usando «Por la fe».
  - Se prefirió «muros» frente a «murallas» por sobriedad y naturalidad en español bíblico contemporáneo.
  - La nota textual conserva la alternativa de valor instrumental del dativo sin desplazar la traducción principal.
