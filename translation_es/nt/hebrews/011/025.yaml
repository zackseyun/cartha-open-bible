translation:
  language: es
  text: eligiendo más bien ser maltratado con el pueblo de Dios que tener el disfrute pasajero del pecado[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el placer pasajero del pecado".
    reason: lexical_alternative
lexical_decisions:
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - antes
  - en cambio
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la comparación preferencial del griego y preserva el contraste introducido por ἢ sin endurecer la sintaxis.
- source_word: ἑλόμενος
  english_pob_choice: choosing
  chosen_spanish: prefiriendo
  alternatives_spanish:
  - eligiendo
  - habiendo elegido
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una decisión deliberada. 'Prefiriendo' comunica bien la opción asumida y su relación con la cláusula anterior en un español más fluido que una construcción participial literal.
- source_word: συγκακουχεῖσθαι
  english_pob_choice: to be mistreated with
  chosen_spanish: ser maltratado con
  alternatives_spanish:
  - sufrir aflicción con
  - compartir el maltrato con
  lexicon: BDAG
  rationale: La forma compuesta conserva la idea de padecer juntamente con otros. 'Ser maltratado con' mantiene la pasiva y la solidaridad del prefijo συν- sin introducir una interpretación más fuerte que el verbo griego.
- source_word: τῷ λαῷ τοῦ θεοῦ
  english_pob_choice: the people of God
  chosen_spanish: el pueblo de Dios
  alternatives_spanish:
  - el pueblo de Dios perteneciente a Dios
  - el pueblo de Dios
  lexicon: BDAG
  rationale: La expresión es un sintagma covenantal estable. En español, 'el pueblo de Dios' es la forma más natural y fiel; conserva el genitivo relacional sin necesidad de explicitarlo más.
- source_word: πρόσκαιρον
  english_pob_choice: fleeting
  chosen_spanish: fugaz
  alternatives_spanish:
  - pasajero
  - por poco tiempo
  lexicon: BDAG
  rationale: El adjetivo indica algo de duración breve. 'Fugaz' transmite bien la brevedad y el carácter no permanente, y queda más idiomático que 'temporal' en este contexto.
- source_word: ἔχειν
  english_pob_choice: to have
  chosen_spanish: tener
  alternatives_spanish:
  - disfrutar de
  - poseer
  lexicon: BDAG
  rationale: Se conserva el verbo básico 'tener' para no añadir matiz de gozo donde el griego no lo expresa por sí mismo; el sustantivo siguiente aporta la idea de disfrute.
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - de pecado
  - pecaminoso
  lexicon: BDAG
  rationale: 'El genitivo se entiende de modo directo como pertenencia o asociación: un disfrute ligado al pecado. ''Del pecado'' es la manera más natural en español y mantiene la amplitud del referente.'
- source_word: ἀπόλαυσιν
  english_pob_choice: enjoyment
  chosen_spanish: disfrute
  alternatives_spanish:
  - placer
  - deleite
  lexicon: BDAG
  rationale: '''Disfrute'' recoge la idea de goce o aprovechamiento placentero sin cargar excesivamente el término hacia sensualidad, y combina bien con ''tener''.'
theological_decisions:
- issue: Alcance del 'disfrute del pecado'
  english_pob_reading: The phrase is rendered as a moral contrast between solidarity with God's people and the short-lived enjoyment associated with sin, without specifying the exact sinful acts in view.
  chosen_spanish_reading: La frase se traduce como un contraste moral entre la solidaridad con el pueblo de Dios y el disfrute breve ligado al pecado, sin concretar cuáles actos pecaminosos están en vista.
  alternative_spanish_readings:
  - el disfrute de las comodidades cortesanas de Egipto
  - los placeres concretos de la corte del faraón
  - todo deleite pecaminoso asociado con Egipto
  rationale: El griego no precisa el contenido del pecado más allá del contraste. Mantener esa amplitud evita resolver una tensión interpretativa que el texto no resuelve y conserva la fuerza moral del pasaje.
  doctrine_reference: Mantener la amplitud semántica y no especificar más allá del texto inspirado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'fleeting' sobre 'temporary' para πρόσκαιρον. En español, 'fugaz' reproduce mejor la brevedad y el matiz de transitoriedad que una opción más genérica como 'temporal'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y no 'Señor' porque el texto griego dice θεοῦ, no κύριος.
  - Se conserva 'pueblo de Dios' como fórmula estable y reverente, no 'gente de Dios'.
  - '''Fugaz'' se usa de modo consistente para πρόσκαιρον, preservando la idea de duración muy breve.'
  - '''Disfrute'' evita sobrerrepresentar ἀπόλαυσις como placer sensual; la nota alternativa conserva la otra posibilidad léxica.'
  - La puntuación reproduce el cierre de la construcción participial y la comparación del original.
