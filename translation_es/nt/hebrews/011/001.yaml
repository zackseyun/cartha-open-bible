translation:
  language: es
  text: Ahora bien, la fe es la certeza[a] de lo que se espera, la prueba[b] de lo que no se ve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sustancia» o «realidad» de lo que se espera.
    reason: lexical_alternative
  - marker: b
    text: O «evidencia» o «convicción» de lo que no se ve.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: El contexto de Hebreos 11:1 describe la disposición creyente respecto de las promesas de Dios; por eso «fe» es la opción natural y fiel al valor doctrinal del término. «Fidelidad» o «confianza» podrían sugerirse en algunos contextos, pero aquí «fe» conserva el sentido central que el POB documenta para πίστις.
- source_word: ἐλπιζομένων
  english_pob_choice: of things hoped for
  chosen_spanish: de lo que se espera
  alternatives_spanish:
  - de las cosas esperadas
  - de lo que es esperado
  lexicon: BDAG
  rationale: El participio en genitivo plural funciona de manera sustantiva y expresa el contenido de la esperanza. En español, «lo que se espera» evita la pesadez de «cosas esperadas» y mantiene el vínculo genitivo con el sustantivo siguiente sin perder claridad.
- source_word: ὑπόστασις
  english_pob_choice: assurance
  chosen_spanish: certeza
  alternatives_spanish:
  - sustancia
  - realidad
  - confianza
  lexicon: BDAG
  rationale: «Certeza» comunica bien el valor de seguridad/evidencia que el POB atribuye a ὑπόστασις en este versículo, sin cargar el texto con una lectura metafísica de «sustancia». Se conserva así la tensión lexical documentada, pero en español con una palabra idiomática y clara.
- source_word: πραγμάτων
  english_pob_choice: of things
  chosen_spanish: de lo
  alternatives_spanish:
  - de las cosas
  - de los asuntos
  - de las realidades
  lexicon: BDAG
  rationale: Dado que «cosas» ya aparece implícitamente en la primera cláusula y el español permite una expresión más fluida, «de lo» ayuda a abarcar el campo general de πρᾶγμα sin forzar un matiz demasiado concreto. Mantiene la paralela amplitud semántica del griego.
- source_word: ἔλεγχος
  english_pob_choice: proof
  chosen_spanish: convicción
  alternatives_spanish:
  - prueba
  - evidencia
  - certidumbre
  lexicon: BDAG
  rationale: Aunque el POB inglés opta por «proof» para preservar fuerza evidencial, en español «convicción» comunica de manera natural el efecto de esa evidencia en la persona creyente. Se mantiene la tensión entre valor objetivo y subjetivo sin fijar solo uno de los dos polos.
- source_word: οὐ βλεπομένων
  english_pob_choice: of things not seen
  chosen_spanish: de lo que no se ve
  alternatives_spanish:
  - de cosas que no se ven
  - de lo invisible
  lexicon: BDAG
  rationale: La construcción negativa con participio presente se vierte de forma directa y elegante. «De lo que no se ve» preserva el paralelismo con la primera cláusula y evita un sustantivo abstracto más interpretativo como «lo invisible».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: «Ahora bien» funciona como transición discursiva natural en español y reproduce el valor de arranque explicativo de δέ en este contexto sin exagerar la contraposición.
theological_decisions:
- issue: Sentido de ὑπόστασις en Hebreos 11:1
  english_pob_reading: Rendered as 'assurance' rather than 'substance'
  chosen_spanish_reading: «certeza» en lugar de «sustancia»
  alternative_spanish_readings:
  - sustancia
  - realidad
  - confianza
  rationale: La lectura del POB entiende ὑπόστασις en un sentido experiencial y evidencial dentro del argumento de Hebreos, no como una definición ontológica de la fe. «Certeza» comunica esa función en español sin arrastrar el peso histórico de «sustancia», que podría malinterpretarse en clave metafísica.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de ἔλεγχος en Hebreos 11:1
  english_pob_reading: Rendered as 'proof' rather than 'evidence' or 'conviction'
  chosen_spanish_reading: «convicción» con valor evidencial implícito
  alternative_spanish_readings:
  - prueba
  - evidencia
  - certidumbre
  rationale: El POB inglés preserva la fuerza objetiva del término, pero en español «convicción» resulta más idiomático y encaja con el efecto interior de la fe en quien cree. La nota lexical conserva la tensión con posibles valores de «prueba» o «evidencia», evitando borrar el matiz evidencial del griego.
  doctrine_reference: 'Contested terms table: ἔλεγχος'
translation_notes:
  revision_awareness: El pasaje no recibió revisiones aplicadas en el último pase; se mantiene la evaluación de alta concordancia y no hay cambios pendientes respecto del texto fuente ni del audit trail en inglés.
  spanish_consistency_notes:
  - Se conserva «fe» como traducción principal de πίστις, conforme al valor doctrinal documentado.
  - «Ahora bien» refleja el δέ de transición sin forzar contraste fuerte.
  - La elección de «certeza» y «convicción» mantiene las tensiones lexicográficas del original y del POB inglés, pero con español natural para lectura eclesial.
  - Los marcadores de nota [a] y [b] están anclados en las dos expresiones principales para preservar las alternativas documentadas.
