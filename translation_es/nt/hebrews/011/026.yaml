    changes_summary: 'Changed ''the Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ more directly and to preserve the conventional rendering in this verse; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Consideró mayor riqueza el oprobio de Mesías[a][b] que los tesoros de Egipto, porque tenía la mirada puesta en la recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo». Χριστοῦ puede traducirse como «Cristo», pero aquí se prefiere «Mesías» porque el término funciona como título.'
    reason: alternative_reading
  - marker: b
    text: La expresión «el oprobio de Mesías» puede referirse al oprobio soportado por causa del Mesías, compartido con el Ungido de Dios, o entendido por Hebreos como cumplido en el Mesías; se conserva la redacción griega sin estrecharla.
    reason: lexical_alternative
lexical_decisions:
- source_word: μείζονα πλοῦτον
  english_pob_choice: greater wealth
  chosen_spanish: mayor riqueza
  alternatives_spanish:
  - mayores riquezas
  - riqueza más valiosa
  lexicon: BDAG
  rationale: El comparativo con πλοῦτος pide una comparación de valor; «mayor riqueza» conserva el contraste con los tesoros de Egipto sin sonar pesado en español.
- source_word: ἡγησάμενος
  english_pob_choice: He considered
  chosen_spanish: Consideró
  alternatives_spanish:
  - habiendo considerado
  - estimó
  lexicon: BDAG
  rationale: El participio aoristo medio de ἡγέομαι expresa evaluación/estimación. En español, un verbo finito en pasado transmite con claridad esa valoración implícita.
- source_word: τῶν Αἰγύπτου θησαυρῶν
  english_pob_choice: the treasures of Egypt
  chosen_spanish: los tesoros de Egipto
  alternatives_spanish:
  - las riquezas de Egipto
  - los tesoros egipcios
  lexicon: BDAG
  rationale: La construcción genitiva es posesiva o de procedencia. «Los tesoros de Egipto» es idiomático y mantiene el contraste con la renuncia de Moisés.
- source_word: τὸν ὀνειδισμὸν
  english_pob_choice: the reproach
  chosen_spanish: el oprobio
  alternatives_spanish:
  - la afrenta
  - el reproche
  lexicon: BDAG
  rationale: ὀνειδισμός puede expresar reproche, insulto o afrenta. «Oprobio» comunica bien la carga pública de vergüenza y conserva la resonancia bíblica sin volverlo demasiado moderno.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» porque Χριστός funciona aquí como título. En español, esto preserva la decisión de POB de no ocultar el matiz titular con una forma más tradicionalizante.
- source_word: ἀπέβλεπεν
  english_pob_choice: he was looking to
  chosen_spanish: miraba a
  alternatives_spanish:
  - tenía la vista puesta en
  - miraba hacia
  lexicon: BDAG
  rationale: El imperfecto marca orientación continua. «Miraba a» comunica enfoque sostenido en un español natural y sobrio.
- source_word: μισθαποδοσίαν
  english_pob_choice: the reward
  chosen_spanish: la recompensa
  alternatives_spanish:
  - el galardón
  - la retribución
  lexicon: BDAG
  rationale: El sustantivo designa recompensa o retribución. «La recompensa» es claro para lectores contemporáneos y encaja con el contexto exhortativo de Hebreos 11.
theological_decisions:
- issue: Sentido del 'oprobio de Mesías' y su relación con Moisés
  english_pob_reading: Retain the genitival phrase straightforwardly as 'the reproach of the Messiah' without interpretive expansion.
  chosen_spanish_reading: 'Mantener la frase genitiva sin resolverla: «el oprobio de Mesías».'
  alternative_spanish_readings:
  - el oprobio por causa del Mesías
  - el oprobio asociado con el Mesías
  - el oprobio que anticipa al Mesías
  rationale: El griego dice literalmente «el oprobio del Cristo/Mesías». Como la relación teológica exacta es debatida, conviene conservar la tensión en lugar de explicarla dentro del texto. Esto deja visible la afirmación cristológica de Hebreos.
  doctrine_reference: Preservar la tensión teológica; Χριστός se traduce como título 'Mesías'.
translation_notes:
  revision_awareness: El antecedente inglés pasó de «Christ» a «Messiah» por una corrección de política de traducción; la presente redacción sigue la restauración de «Messiah» y mantiene la ambigüedad interpretativa señalada en la nota de aparato.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός según la política del proyecto, no «Cristo», salvo en nota alternativa.
  - «Oprobio» se escogió para ὀνειδισμός por su peso bíblico y su cercanía semántica a reproche/afrenta.
  - «Recompensa» se usa para μισθαποδοσίαν en vez de «galardón» para evitar una dicción excesivamente confesional o arcaizante.
  - La puntuación sigue el orden natural del español, pero conserva la relación causal marcada por γάρ con «porque».
