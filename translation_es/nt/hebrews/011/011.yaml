translation:
  language: es
  text: Por la fe, incluso Sara misma recibió poder[a] para concebir descendencia, aun más allá del tiempo normal de la vida, porque consideró fiel al que había prometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «recibió poder para la deposición de semilla». La expresión griega es inusual e idiomática; en contexto se refiere a la capacidad de concebir descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por confianza
  - Por fidelidad
  lexicon: BDAG
  rationale: La dative instrumental en Hebreos 11 funciona como fórmula recurrente; «por la fe» conserva el valor de medio/instrumento y la terminología doctrinal habitual sin mecanizar la sintaxis griega.
- source_word: καὶ αὐτῇ Σάρρᾳ
  english_pob_choice: even Sarah herself
  chosen_spanish: incluso Sara misma
  alternatives_spanish:
  - también Sara misma
  - Sara misma también
  lexicon: BDAG
  rationale: El καὶ con el pronombre intensivo αὐτῇ destaca a Sara como ejemplo inesperado; «incluso» preserva el matiz enfático mejor que un simple «también».
- source_word: δύναμιν ... ἔλαβεν
  english_pob_choice: received power
  chosen_spanish: recibió poder
  alternatives_spanish:
  - recibió capacidad
  - fue capacitada
  lexicon: BDAG
  rationale: «Poder» mantiene el vínculo léxico con δύναμις y suena natural en español; «capacidad» o «fue capacitada» suavizan demasiado la fuerza verbal del griego.
- source_word: εἰς καταβολὴν σπέρματος
  english_pob_choice: to conceive offspring
  chosen_spanish: para concebir descendencia
  alternatives_spanish:
  - para la deposición de semilla
  - para engendrar descendencia
  - para procrear
  lexicon: BDAG
  rationale: La expresión es idiomática y poco transparente; en contexto se refiere a la posibilidad de tener descendencia. «Concebir descendencia» transmite el sentido contextual sin perder del todo la referencia a la capacidad reproductiva.
- source_word: καὶ παρὰ καιρὸν ἡλικίας
  english_pob_choice: even beyond the proper time of life
  chosen_spanish: aun fuera del tiempo apropiado de la vida
  alternatives_spanish:
  - aun después de la edad adecuada
  - más allá del tiempo de la edad
  - aun pasada la edad de tener hijos
  lexicon: BDAG
  rationale: παρά con acusativo comunica ir más allá del límite normal; «tiempo apropiado de la vida» refleja καιρός + ἡλικία sin añadir explícitamente «de tener hijos», que no está dicho de manera directa en el griego.
- source_word: ἐπεὶ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la acción; «porque» es la conexión causal más clara y natural en español contemporáneo.
- source_word: πιστὸν
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - fidedigno
  lexicon: BDAG
  rationale: «Fiel» conserva la carga relacional y teológica aplicada al que promete, sin perder naturalidad en español bíblico actual.
- source_word: ἡγήσατο
  english_pob_choice: considered
  chosen_spanish: consideró
  alternatives_spanish:
  - estimó
  - tuvo por
  lexicon: BDAG
  rationale: El verbo denota un juicio evaluativo; «consideró» reproduce bien la acción mental sin arcaísmo.
- source_word: τὸν ἐπαγγειλάμενον
  english_pob_choice: the one who had promised
  chosen_spanish: al que había prometido
  alternatives_spanish:
  - al que prometió
  - al prometedor
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a Dios sin nombrarlo; «al que había prometido» mantiene la referencia reverente y la relación anterior al acto de fe, como en el audit trail inglés.
theological_decisions:
- issue: Sujetos y sentido de la cláusula difícil sobre Sarah
  english_pob_reading: 'Sarah is the subject: she received power to conceive offspring.'
  chosen_spanish_reading: 'Sara es el sujeto: recibió poder para concebir descendencia.'
  alternative_spanish_readings:
  - Sara recibió poder para el depósito de semilla
  - Sara recibió poder para engendrar una línea de descendencia
  rationale: El dativo intensivo ⸂αὐτῇ Σάρρᾳ⸃ identifica naturalmente a Sara como participante principal de ἔλαβεν. Aunque la frase griega es idiomática y podría sonar masculina si se vertiera literalmente, el contexto de Hebreos subraya la fe de Sara y la concepción milagrosa a pesar de la edad; por eso se conserva a Sara como sujeto explícito.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor teológico de πιστός aplicado al que prometió
  english_pob_reading: faithful
  chosen_spanish_reading: fiel
  alternative_spanish_readings:
  - confiable
  - verdadero
  rationale: La fe de Sara se fundamenta en el carácter confiable de Dios. «Fiel» preserva la resonancia pactal y no introduce contenido doctrinal adicional fuera del versículo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se revisó el resultado a la luz del último pase, que indicó alta concordancia y sin cambios necesarios; por ello la redacción mantiene la solución de equivalencia óptima y conserva la nota sobre la expresión idiomática griega.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito; la referencia es al que prometió.
  - Se usa «Sara» sin transliteración acentuada para la forma española estándar.
  - «Por la fe» conserva la fórmula recurrente de Hebreos 11 con naturalidad en español.
  - Se evita «SEÑOR» o «Cristo» porque no corresponden al texto de este versículo.
  - La nota [a] se ancla en «poder» para señalar la alternativa literal de la frase idiomática griega.
