  to: Las mujeres recibieron de vuelta a sus muertos por medio de la resurrección[a]; pero otros fueron torturados[b], sin aceptar la liberación, para obtener una mejor resurrección[c].
  rationale: 'La revisión corrige la principal desviación del rastro POB: restituye la nota sobre «mejor resurrección» y deja de desplazarla a «liberación». También mejora la naturalidad del español con «sin aceptar» y «una mejor resurrección», sin alterar el sentido del griego ni las decisiones léxicas centrales. Se mantiene «liberación» en el texto principal como equivalente contextual de ἀπολύτρωσιν, pero sin crear una nota adicional innecesaria en este registro.'
