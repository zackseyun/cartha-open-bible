translation:
  language: es
  text: Las mujeres recibieron de vuelta a sus muertos por medio de la resurrección[a]; pero otros fueron torturados[b], sin aceptar la liberación, para obtener una mejor resurrección[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Por medio de la resurrección» conserva la idea de fuente o medio del griego; también puede entenderse como «a causa de la resurrección».
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «fueron torturados» alude a un tormento corporal severo, posiblemente mediante golpes o en un instrumento de suplicio; el método exacto es incierto.
    reason: cultural_note
  - marker: c
    text: La «mejor resurrección» contrasta con la restauración anterior de los muertos a la vida mortal ordinaria; aquí se refiere a una esperanza de resurrección superior más allá de la muerte.
    reason: cross_reference
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: received back
  chosen_spanish: recibieron de vuelta
  alternatives_spanish:
  - recibieron
  - volvieron a recibir
  lexicon: BDAG
  rationale: Con τοὺς νεκροὺς αὐτῶν y ἐξ ἀναστάσεως, el sentido es restauración de los muertos a la vida, no solo recepción genérica. «Recibieron de vuelta» conserva esa idea de restitución.
- source_word: γυναῖκες
  english_pob_choice: Women
  chosen_spanish: Las mujeres
  alternatives_spanish:
  - Las esposas
  lexicon: BDAG
  rationale: El contexto alude a mujeres que recibieron a sus muertos; «mujeres» es el sentido natural y evita restringir indebidamente a «esposas».
- source_word: ἐξ ἀναστάσεως
  english_pob_choice: by resurrection
  chosen_spanish: por medio de la resurrección
  alternatives_spanish:
  - por resurrección
  - a causa de la resurrección
  lexicon: BDAG
  rationale: La preposición expresa fuente o medio. En español, «por medio de la resurrección» comunica bien que la restitución ocurrió mediante una resurrección, sin perder el matiz causal.
- source_word: τοὺς νεκροὺς αὐτῶν
  english_pob_choice: their dead
  chosen_spanish: a sus muertos
  alternatives_spanish:
  - a sus muertos seres queridos
  - a sus difuntos
  lexicon: BDAG
  rationale: La expresión substantiva se refiere a los fallecidos que les pertenecían relacionalmente. «A sus muertos» es breve y fiel; el movimiento con «recibieron de vuelta» hace natural el complemento.
- source_word: ἄλλοι δὲ
  english_pob_choice: but others
  chosen_spanish: pero otros
  alternatives_spanish:
  - y otros
  - otros, en cambio
  lexicon: BDAG
  rationale: «Pero» refleja el contraste marcado por δέ con los ejemplos previos de liberación.
- source_word: ἐτυμπανίσθησαν
  english_pob_choice: were tortured
  chosen_spanish: fueron torturados
  alternatives_spanish:
  - fueron atormentados
  - fueron martirizados
  lexicon: BDAG
  rationale: El verbo denota tortura severa; «fueron torturados» comunica el núcleo semántico sin forzar un instrumento concreto que el griego no precisa para el lector moderno.
- source_word: οὐ προσδεξάμενοι
  english_pob_choice: not accepting
  chosen_spanish: no aceptando
  alternatives_spanish:
  - no recibiendo
  - sin aceptar
  lexicon: BDAG
  rationale: El participio expresa rechazo de una oferta. «No aceptando» mantiene el sentido de negativa deliberada.
- source_word: τὴν ἀπολύτρωσιν
  english_pob_choice: release
  chosen_spanish: la liberación
  alternatives_spanish:
  - el rescate
  - la redención
  lexicon: BDAG
  rationale: En este contexto la palabra apunta a ser soltados/liberados del tormento o de la muerte, no a la redención salvífica. «La liberación» evita cargar el término con un sentido doctrinal no exigido por el pasaje.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito. «Para obtener» transmite el valor final de manera natural en español y evita una duplicación pesada con «para que».
- source_word: κρείττονος ἀναστάσεως
  english_pob_choice: a better resurrection
  chosen_spanish: una resurrección mejor
  alternatives_spanish:
  - una resurrección mayor
  - una mejor resurrección
  lexicon: BDAG
  rationale: κρείττων en Hebreos suele llevar el sentido de «mejor». El orden natural en español favorece «una resurrección mejor», manteniendo el contraste con la restauración temporal anterior.
- source_word: τύχωσιν
  english_pob_choice: they might obtain
  chosen_spanish: obtener
  alternatives_spanish:
  - alcanzar
  - recibir
  lexicon: BDAG
  rationale: τύγχανω aquí significa obtener o alcanzar. El infinitivo «obtener» funciona bien tras «para» y conserva la idea de meta buscada.
theological_decisions:
- issue: Sentido de τὴν ἀπολύτρωσιν
  english_pob_reading: temporal release from torture/death
  chosen_spanish_reading: liberación temporal del tormento o de la muerte
  alternative_spanish_readings:
  - redención en sentido salvífico
  - rescate espiritual
  rationale: El contexto inmediato trata de personas fieles que rechazan una salida ofrecida para permanecer leales. Traducirlo como «liberación» preserva el sentido narrativo y evita introducir una lectura soteriológica que el verso no exige.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión teológica
- issue: Contraste de «una resurrección mejor»
  english_pob_reading: eschatological resurrection superior to mere restoration to mortal life
  chosen_spanish_reading: resurrección escatológica superior a la simple restauración a la vida mortal
  alternative_spanish_readings:
  - una resurrección más favorable
  - una mejor vida después
  rationale: La primera cláusula habla de muertos devueltos a la vida ordinaria; la segunda contrasta con una esperanza superior que los mártires buscan. La traducción mantiene ese contraste sin definir en exceso el modo de la resurrección.
  doctrine_reference: Preservar la tensión textual y la distinción entre restauración temporal y esperanza final
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente griego y el auditor de la POB en inglés, sin cambios respecto del último pase revisado, que fue marcado como de alta concordancia y sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene «resurrección» para ἀνάστασις en ambas apariciones, preservando el contraste interno del versículo.
  - «Liberación» se usa aquí en sentido contextual temporal, no como término técnico de redención.
  - El orden y la puntuación buscan leer con naturalidad en español sin diluir la antítesis entre los dos grupos.
  - Se conserva la referencia a «sus muertos» para reflejar el posesivo griego sin especificar parentesco no explicitado.
