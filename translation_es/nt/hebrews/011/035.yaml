  text: ἔλαβον γυναῖκες ἐξ ἀναστάσεως τοὺς νεκροὺς αὐτῶν· ἄλλοι δὲ ἐτυμπανίσθησαν, οὐ προσδεξάμενοι τὴν ἀπολύτρωσιν, ἵνα κρείττονος ἀναστάσεως τύχωσιν·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/035.yaml
  text: Women received back their dead by resurrection[a]; but others were tortured, not accepting release[c][b], so that they might obtain a better resurrection.
  footnotes:
  - marker: a
    text: Or 'release' could be rendered 'deliverance'; the Greek term here refers to being freed from torture or death, not necessarily to redemption in the salvation sense.
    reason: lexical_alternative
  - marker: b
    text: '''Were tortured'' translates a verb associated with severe bodily torment, possibly by beating on a rack or drum-like frame; the exact method is uncertain.'
    reason: cultural_note
  - marker: c
    text: The 'better resurrection' contrasts with the earlier restoration of the dead to ordinary mortal life; here the sense is a superior resurrection hope beyond death.
    reason: cross_reference
