review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el contraste del griego: mujeres que recibieron de vuelta a sus muertos por resurrección, frente a otros que fueron torturados y rechazaron una salida ofrecida para alcanzar una resurrección mejor. También mantiene correctamente el sentido no salvífico de ἀπολύτρωσιν en este contexto. Sin embargo, hay dos ajustes importantes: (1) la nota [c] en inglés explica «better resurrection», pero en español [c] fue reasignada a «liberación», perdiendo una nota auditada significativa; y (2) «no aceptando» suena algo calcado, y «para obtener» atenúa el matiz de finalidad con sujeto explícito mejor expresado con «para obtener/alcanzar» sí, pero dentro de una cláusula más natural.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero puede sonar más natural y digno en español eclesial amplio. «Recibieron de vuelta» funciona, aunque «volvieron a recibir» sería más idiomático; aun así no es necesario forzarlo. El problema principal de calidad es la distribución de notas y, en menor grado, el participio «no aceptando», que se lee menos natural que «sin aceptar». Además, «una resurrección mejor» es comprensible, pero «una mejor resurrección» es más idiomático en español y preserva bien κρείττων.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión «liberación» para ἀπολύτρωσιν es aceptable en español y coherente con la justificación teológica, siempre que se preserve también la nota sobre la «mejor resurrección».
  issues:
  - severity: medium
    issue: La nota [c] auditada sobre «better resurrection» se perdió y fue sustituida por una nota sobre «liberación».
    rationale: El rastro de auditoría inglés preserva una nota interpretativa importante sobre el contraste entre restauración temporal y resurrección superior. En español debe mantenerse esa nota; si además se desea aclarar «liberación», puede hacerse en otra nota o integrar la idea en la decisión léxica, pero no a costa de eliminar la nota auditada.
  - severity: low
    issue: «No aceptando» suena calcado del participio griego.
    rationale: Aunque es inteligible, en español natural «sin aceptar» expresa mejor la negativa deliberada de οὐ προσδεξάμενοι sin sonar rígido.
  - severity: low
    issue: «Una resurrección mejor» es menos idiomático que «una mejor resurrección».
    rationale: Ambas opciones son fieles, pero la segunda suena más natural en español general y mantiene con claridad el valor comparativo de κρείττων.
