translation:
  language: es
  text: Por fe cruzaron el Mar Rojo[a] como por tierra seca; cuando los egipcios intentaron hacer lo mismo, fueron tragados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Mar de Juncos'. El texto griego aquí dice 'Mar Rojo' (Ἐρυθρὰν Θάλασσαν), aunque la discusión sobre el nombre subyacente del lugar en Éxodo a veces favorece 'Mar de Juncos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Con fe
  - Mediante la fe
  lexicon: BDAG
  rationale: El dativo instrumental se expresa de forma natural en español con 'por'. Se mantiene el término programático 'fe' en coherencia con Hebreos 11 y con la decisión inglesa de no sustituirlo por 'confianza' como texto principal.
- source_word: διέβησαν
  english_pob_choice: they crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: BDAG
  rationale: διαβαίνω indica pasar de un lado a otro; 'cruzaron' es el equivalente más idiomático y preciso en español para el acto narrado.
- source_word: Ἐρυθρὰν Θάλασσαν
  english_pob_choice: the Red Sea
  chosen_spanish: Mar Rojo
  alternatives_spanish:
  - Mar de Juncos
  - Mar de Cañas
  lexicon: BDAG
  rationale: El griego de esta cláusula nombra explícitamente el Mar Rojo, por lo que se conserva esa designación en el texto principal. Se mantiene abierta la alternativa tradicional-discursiva sobre el topónimo subyacente en nota.
- source_word: ὡς διὰ ξηρᾶς γῆς
  english_pob_choice: as through dry land
  chosen_spanish: como por tierra seca
  alternatives_spanish:
  - como por suelo seco
  - como por terreno seco
  lexicon: BDAG
  rationale: La comparación ὡς διὰ se reproduce con 'como por'. 'Tierra seca' comunica bien ξηρᾶς γῆς y conserva el eco narrativo de Éxodo sin sonar forzado.
- source_word: ἧς πεῖραν λαβόντες
  english_pob_choice: of which the Egyptians, when they attempted it
  chosen_spanish: del cual, al intentar hacerlo los egipcios
  alternatives_spanish:
  - del cual los egipcios, al probarlo
  - de lo cual, cuando los egipcios lo intentaron
  lexicon: BDAG
  rationale: La expresión idiomática πεῖραν λαμβάνειν se vierte como 'intentar hacerlo' para captar el sentido de 'hacer la prueba'. 'Del cual' mantiene la referencia al mismo cruce/paso, siguiendo la decisión inglesa de preservar la conexión sintáctica.
- source_word: οἱ Αἰγύπτιοι
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - los egipcios
  lexicon: BDAG
  rationale: Designación étnica directa y transparente. Se conserva en minúscula según norma española dentro de la oración.
- source_word: κατεπόθησαν
  english_pob_choice: they were swallowed up
  chosen_spanish: fueron tragados
  alternatives_spanish:
  - fueron engullidos
  - fueron sumergidos y destruidos
  - fueron devorados
  lexicon: BDAG
  rationale: καταπίνω literalmente significa 'tragar'. 'Fueron tragados' preserva la metáfora pasiva del griego mejor que 'se ahogaron', aunque la consecuencia histórica sea el ahogamiento. Se evita neutralizar la imagen verbal del original.
theological_decisions:
- issue: La relación entre la fe de Israel y el destino de los egipcios
  english_pob_reading: By faith they crossed ... of which the Egyptians, when they attempted it, were swallowed up.
  chosen_spanish_reading: Por la fe ... del cual, al intentar hacerlo los egipcios, fueron tragados.
  alternative_spanish_readings:
  - '... y los egipcios, al intentarlo, se ahogaron'
  - '... de lo cual, al probarlo los egipcios, fueron hundidos'
  rationale: El versículo contrasta la travesía lograda 'por la fe' con el juicio sobre quienes la intentan sin esa fe. Se conserva la imagen fuerte de 'ser tragados' para no atenuar el pasivo del griego ni suavizar la dimensión de juicio narrada en el Éxodo.
  doctrine_reference: Hebreos 11:29; Éxodo 14:21-31
- issue: Mar Rojo frente a 'Mar de Juncos'
  english_pob_reading: the Red Sea, with a footnote preserving 'Sea of Reeds' as a lexical alternative
  chosen_spanish_reading: Mar Rojo[a]
  alternative_spanish_readings:
  - Mar de Juncos
  - Mar de Cañas
  rationale: Se sigue el griego explícito Ἐρυθρὰν Θάλασσαν en el texto principal. Se documenta en nota la alternativa histórica/tradicional sobre el nombre subyacente del relato del Éxodo, sin desplazar la lectura del manuscrito griego.
  doctrine_reference: Lexical/tradition note on Exodus toponymy; no doctrinal conflict
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, especialmente en la segunda mitad del versículo: se preserva la relación relativa de ἧς πεῖραν λαβόντες con ''del cual, al intentar hacerlo los egipcios'', en lugar de una coordinación más libre. También se mantiene la metáfora fuerte de κατεπόθησαν y la opción explícita por ''Mar Rojo'' en el texto principal, con nota alternativa.'
  spanish_consistency_notes:
  - Se usa 'Por la fe' como fórmula recurrente para Πίστει en Hebreos 11.
  - '''Mar Rojo'' se conserva en el cuerpo del texto y la alternativa ''Mar de Juncos'' queda solo en nota.'
  - '''Tierra seca'' es más natural en español que ''tierra árida'' y mantiene el paralelismo narrativo.'
  - '''Fueron tragados'' retiene la imagen verbal del pasivo griego y evita una explicación excesiva como ''se ahogaron''.'
