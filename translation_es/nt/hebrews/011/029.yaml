revisions:
- from: Por la fe cruzaron el Mar Rojo[a] como por tierra seca, del cual, al intentar hacerlo los egipcios, fueron tragados.
  to: Por fe cruzaron el Mar Rojo[a] como por tierra seca; cuando los egipcios intentaron hacer lo mismo, fueron tragados.
  rationale: 'Se cambia ''Por la fe'' a ''Por fe'' por naturalidad y mejor correspondencia con la fórmula de Hebreos 11 en español. Se sustituye la construcción forzada ''del cual, al intentar hacerlo los egipcios'' por ''cuando los egipcios intentaron hacer lo mismo'', que expresa de manera clara e idiomática el sentido de ἧς πεῖραν λαβόντες: intentaron el mismo cruce. Se conserva ''fueron tragados'' para mantener la fuerza metafórica de κατεπόθησαν, y se mantiene la nota sobre ''Mar de Juncos''.'
