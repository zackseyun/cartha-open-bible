review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Πίστει = ''Por la fe'', διέβησαν = ''cruzaron'', Ἐρυθρὰν Θάλασσαν = ''Mar Rojo'' con nota alternativa, y κατεπόθησαν conserva la imagen de ser ''tragados''. Sin embargo, la cláusula relativa ἧς πεῖραν λαβόντες no está bien resuelta con ''del cual, al intentar hacerlo los egipcios'', porque en español ''del cual'' queda gramaticalmente rígido y ambiguo, y además el antecedente probable es el cruce/paso, no simplemente el mar como objeto masculino. Conviene reformular para preservar la conexión al mismo intento de cruce de manera natural.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'Por la fe' suena menos natural que 'Por fe' en este uso instrumental y formular de Hebreos 11. La secuencia 'del cual, al intentar hacerlo los egipcios' resulta forzada y poco idiomática. También 'fueron tragados' es comprensible, pero 'fueron tragados por las aguas' mejora la naturalidad sin perder la metáfora, aunque no es necesario añadir 'por las aguas' si se prefiere mayor cercanía formal. La mejor reparación es una reformulación más natural de toda la cola de la frase.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Mar Rojo' concuerda con la decisión fuente y la nota preserva 'Mar de Juncos'. No aparecen términos doctrinalmente sensibles fuera de 'fe', que debe mantenerse. La principal corrección es estilístico-sintáctica, no de glosario.
  issues:
  - severity: medium
    issue: '''Por la fe'' suena menos idiomático que ''Por fe'' en Hebreos 11.'
    rationale: Aunque es comprensible, la fórmula repetitiva Πίστει en español bíblico moderno suele sonar más natural y elegante como 'Por fe', manteniendo el mismo valor instrumental.
  - severity: high
    issue: La construcción 'del cual, al intentar hacerlo los egipcios' es gramaticalmente torpe y ambigüa.
    rationale: No reproduce con buen español la relación de ἧς πεῖραν λαβόντες. 'Del cual' deja incierto el antecedente y 'hacerlo' añade una referencia débil. El sentido es que los egipcios intentaron el mismo cruce y fueron tragados.
  - severity: low
    issue: '''Fueron tragados'' es fiel, pero suena algo desnudo en español.'
    rationale: No es incorrecto, pero la frase completa mejora si se integra en una reformulación más fluida del final del versículo.
  revised_spanish_text: Por fe cruzaron el Mar Rojo[a] como por tierra seca; cuando los egipcios intentaron hacer lo mismo, fueron tragados.
  revised_footnotes:
  - marker: a
    text: O 'Mar de Juncos'. El texto griego aquí dice 'Mar Rojo' (Ἐρυθρὰν Θάλασσαν), aunque la discusión sobre el nombre subyacente del lugar en Éxodo a veces favorece 'Mar de Juncos'.
    reason: lexical_alternative
  revision_rationale: 'Se cambia ''Por la fe'' a ''Por fe'' por naturalidad y mejor correspondencia con la fórmula de Hebreos 11 en español. Se sustituye la construcción forzada ''del cual, al intentar hacerlo los egipcios'' por ''cuando los egipcios intentaron hacer lo mismo'', que expresa de manera clara e idiomática el sentido de ἧς πεῖραν λαβόντες: intentaron el mismo cruce. Se conserva ''fueron tragados'' para mantener la fuerza metafórica de κατεπόθησαν, y se mantiene la nota sobre ''Mar de Juncos''.'
