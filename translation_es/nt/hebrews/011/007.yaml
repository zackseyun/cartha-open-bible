translation:
  language: es
  text: Por la fe, Noé[a], habiendo sido advertido sobre cosas que aún no se veían, movido por reverente temor[b], construyó un arca para la salvación de su familia;[c] por ella condenó al mundo y llegó a ser heredero de la justicia conforme a la fe[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo recibido una advertencia divina» o «habiendo sido instruido por Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con temor piadoso» o «movido por temor de Dios».'
    reason: lexical_alternative
  - marker: c
    text: La frase «por ella» se refiere de manera más natural al arca; algunos la toman más ampliamente como la fe de Noé o su obediencia.
    reason: alternative_reading
  - marker: d
    text: 'O: «rectitud» para «justicia», aunque aquí el contexto favorece el sentido relacional/covenantal unido a la fe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por medio de la fe
  - Con fe
  lexicon: BDAG
  rationale: El dativo inicial marca medio o esfera y en Hebreos 11 se repite como fórmula; en español, «Por la fe» conserva esa función retórica y doctrinal sin sonar mecánico.
- source_word: χρηματισθεὶς
  english_pob_choice: having been warned about things not yet seen
  chosen_spanish: habiendo recibido advertencia
  alternatives_spanish:
  - habiendo sido instruido
  - habiendo recibido una comunicación divina
  lexicon: BDAG
  rationale: El participio pasivo sugiere recepción de un aviso o comunicación; «recibió advertencia» preserva la idea sin añadir explícitamente «de Dios», ya que eso no está en la forma griega misma.
- source_word: περὶ τῶν μηδέπω βλεπομένων
  english_pob_choice: about things not yet seen
  chosen_spanish: sobre cosas que aún no se veían
  alternatives_spanish:
  - acerca de cosas que todavía no eran visibles
  - sobre lo que aún no había sido visto
  lexicon: BDAG
  rationale: La frase indica objetos aún no visibles/percibidos; «aún no se veían» mantiene la temporalidad de μηδέπω y su sentido natural en español.
- source_word: εὐλαβηθεὶς
  english_pob_choice: in reverent fear
  chosen_spanish: movido por reverente temor
  alternatives_spanish:
  - con reverencia
  - movido por temor piadoso
  - con santo temor
  lexicon: BDAG
  rationale: El participio expresa una reacción piadosa y cauta, no simple pánico. «Reverente temor» conserva la tensión entre temor y piedad que el contexto requiere.
- source_word: κατεσκεύασεν
  english_pob_choice: constructed
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - preparó
  lexicon: BDAG
  rationale: «Construyó» es natural y preciso para el arca; mantiene la acción deliberada sin sobretraducir.
- source_word: κιβωτὸν
  english_pob_choice: an ark
  chosen_spanish: un arca
  alternatives_spanish:
  - un cofrecillo
  - una nave
  lexicon: BDAG
  rationale: En el relato de Noé, el equivalente establecido es «arca»; es el término más claro y fiel en español eclesial.
- source_word: εἰς σωτηρίαν τοῦ οἴκου αὐτοῦ
  english_pob_choice: for the salvation of his household
  chosen_spanish: para la salvación de su casa
  alternatives_spanish:
  - para la salvación de su hogar
  - para la salvación de su familia
  lexicon: BDAG
  rationale: «Casa» reproduce οἶκος con su amplitud de casa/linaje/hogar doméstico; «salvación» conserva el peso teológico de σωτηρία mejor que un simple rescate.
- source_word: δι’ ἧς
  english_pob_choice: through which
  chosen_spanish: por ella
  alternatives_spanish:
  - por medio de la cual
  - por la cual
  lexicon: BDAG
  rationale: El antecedente más cercano es κιβωτός, femenino; «por ella» evita pesadez y mantiene que el arca es el medio instrumental más probable. La ambigüedad contextual sobre si se refiere al arca o al acto de fe se conserva implícita.
- source_word: κατέκρινεν τὸν κόσμον
  english_pob_choice: he condemned the world
  chosen_spanish: condenó al mundo
  alternatives_spanish:
  - juzgó al mundo
  - declaró culpable al mundo
  lexicon: BDAG
  rationale: La traducción directa conserva el testimonio condenatorio que la obediencia de Noé representa frente al mundo incrédulo.
- source_word: τῆς κατὰ πίστιν δικαιοσύνης
  english_pob_choice: the righteousness according to faith
  chosen_spanish: de la justicia conforme a la fe
  alternatives_spanish:
  - de la justicia por la fe
  - de la rectitud conforme a la fe
  lexicon: BDAG
  rationale: «Justicia» mantiene la opción POB de no fijar aquí «justicia» como mera ética social ni «rectitud» como simplificación; «conforme a la fe» conserva la estructura de κατά y la relación con πίστις sin convertirla en una paráfrasis doctrinal más libre.
- source_word: ἐγένετο κληρονόμος
  english_pob_choice: became heir
  chosen_spanish: llegó a ser heredero
  alternatives_spanish:
  - se hizo heredero
  - vino a ser heredero
  lexicon: BDAG
  rationale: La combinación de γίνομαι + predicado nominal expresa entrada en un estado/resultante; «llegó a ser» suena natural y resalta el carácter adquirido de la herencia.
theological_decisions:
- issue: Si χρηματισθεὶς debe explicitar a Dios como fuente de la advertencia
  english_pob_reading: having been warned about things not yet seen
  chosen_spanish_reading: habiendo recibido advertencia sobre cosas que aún no se veían
  alternative_spanish_readings:
  - habiendo sido advertido por Dios
  - habiendo recibido una advertencia divina
  rationale: El griego no nombra a Dios de forma explícita en este punto; la advertencia divina está presupuestada por el contexto, pero la versión española evita añadir un sujeto no expresado. Se preserva así la economía del original y la revisión auditada de la POB en inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo expresar εὐλαβηθεὶς sin reducirlo a miedo irracional
  english_pob_reading: in reverent fear
  chosen_spanish_reading: movido por reverente temor
  alternative_spanish_readings:
  - con reverencia
  - movido por temor piadoso
  rationale: El término combina cautela, piedad y disposición obediente. «Reverente temor» mantiene la tensión semántica entre miedo y devoción, evitando tanto el sentimentalismo como el terror puro.
  doctrine_reference: Translation philosophy §3, §6
- issue: A qué remite δι’ ἧς
  english_pob_reading: through which
  chosen_spanish_reading: por ella
  alternative_spanish_readings:
  - por medio de la cual
  - por la cual
  rationale: La referencia más cercana y gramatical es κιβωτός, que es femenina; sin embargo, la frase también puede entenderse a nivel más amplio como la obediente respuesta de Noé. «Por ella» deja la referencia al arca como la más probable sin cerrar de manera excesiva la amplitud del sentido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si δικαιοσύνη debe traducirse como justicia o rectitud
  english_pob_reading: the righteousness according to faith
  chosen_spanish_reading: la justicia conforme a la fe
  alternative_spanish_readings:
  - la rectitud conforme a la fe
  - la justicia por la fe
  rationale: En este contexto la expresión parece relacional/covenantal y ligada a la herencia, no a un contraste ético abstracto. «Justicia» conserva el término contestado con el que trabaja la POB; «conforme a la fe» reproduce mejor la estructura de κατά que una explicación más interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró «by God» porque no es explícito en el griego; la redacción española sigue esa decisión y no introduce un agente divino nombrado en el participio. También conserva la ambigüedad reconocida sobre el referente de «through which», pero con un giro natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB, pero este versículo no contiene el Tetragrámaton.
  - «Fe» se usa de manera consistente para πίστις, y «justicia» para δικαιοσύνη con nota de alternativa «rectitud».
  - «Arca» se conserva para κιβωτός, siguiendo el uso bíblico establecido en español.
  - La construcción participial se ha resuelto en una frase española fluida sin perder las relaciones causales y instrumentales del griego.
