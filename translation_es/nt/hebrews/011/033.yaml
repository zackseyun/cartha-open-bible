translation:
  language: es
  text: quienes por medio de la fe[b] conquistaron reinos, obraron rectitud[a], alcanzaron promesas, cerraron las bocas de los leones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El término griego puede significar «rectitud» o «justicia», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «por la fe». La frase también puede entenderse como acción realizada por medio de la confianza en Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - por medio de la fe
  - mediante la fe
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa medio o instrumento; en español, «por la fe» comunica de manera natural esa relación y mantiene el ritmo del catálogo de Hebreos 11. «Por medio de la fe» y «mediante la fe» son posibles, pero algo más pesadas.
- source_word: κατηγωνίσαντο
  english_pob_choice: conquered
  chosen_spanish: conquistaron
  alternatives_spanish:
  - vencieron
  - dominaron
  - subyugaron
  lexicon: BDAG
  rationale: El verbo sugiere prevalecer en conflicto o someter en lucha. «Conquistaron» transmite bien la idea de victoria activa sobre reinos y suena idiomático en español moderno.
- source_word: βασιλείας
  english_pob_choice: kingdoms
  chosen_spanish: reinos
  alternatives_spanish:
  - reinos/monarquías
  - kingdoms
  lexicon: BDAG
  rationale: En español, «reinos» es el equivalente más natural de βασιλείας en sentido político. Mantiene el plural concreto del griego y la fuerza histórica de la expresión.
- source_word: εἰργάσαντο
  english_pob_choice: worked
  chosen_spanish: practicaron
  alternatives_spanish:
  - obraron
  - hicieron
  - realizaron
  lexicon: BDAG
  rationale: Aunque el sentido básico es «trabajar/hacer/obrar», en combinación con δικαιοσύνην la expresión española más natural es «practicaron justicia». «Practicar» conserva el matiz de acción sostenida o realizada en la vida.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: 'Aquí se preserva la alternativa reconocida por la POB en nota inglesa: δικαιοσύνη puede significar «justicia» o «rectitud» según el contexto. En español, «practicaron justicia» es claro y no suena forzado; además conserva la tensión lexical sin imponer una sola noción moral.'
- source_word: ἐπέτυχον
  english_pob_choice: obtained
  chosen_spanish: alcanzaron
  alternatives_spanish:
  - obtuvieron
  - consiguieron
  - recibieron
  lexicon: BDAG
  rationale: El verbo indica lograr o obtener algo. «Alcanzaron» funciona bien en una enumeración de logros y evita implicar demasiado si las promesas fueron cumplidas plenamente o solo anticipadas.
- source_word: ἐπαγγελιῶν
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - lo prometido
  - las promesas
  lexicon: BDAG
  rationale: La traducción literal y normal es «promesas». En plural conserva el carácter general del catálogo y deja abierta la referencia concreta del cumplimiento divino.
- source_word: ἔφραξαν
  english_pob_choice: shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - taparon
  - sellaron
  - cerraron la boca
  lexicon: BDAG
  rationale: Con στόματα, «cerraron» es la forma más natural en español. La imagen es concreta y mantiene la fuerza del verbo griego sin volverse demasiado técnica.
- source_word: στόματα λεόντων
  english_pob_choice: the mouths of lions
  chosen_spanish: la boca de leones
  alternatives_spanish:
  - las bocas de los leones
  - la boca de los leones
  lexicon: BDAG
  rationale: La forma singular colectiva «la boca de leones» reproduce la imagen proverbial y suena más fluida en español. Aunque el griego usa plural de «bocas», el sentido idiomático en español se conserva con «la boca de leones».
theological_decisions:
- issue: Rendering of πίστις in Hebrews 11 catalog
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene «fe» como equivalente principal de πίστις, coherente con el capítulo y con la pauta doctrinal del proyecto. Otras opciones como «confianza» o «fidelidad» pueden ser legítimas en otros contextos, pero aquí no desplazan el valor principal de la fe como medio de acción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Rendering of δικαιοσύνη in a non-Pauline context
  english_pob_reading: righteousness / justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Se adopta «justicia» porque la propia POB inglesa preserva en nota la alternativa «justice» y el español puede expresar esa tensión con naturalidad. No se fuerza «rectitud» en el texto principal para evitar un giro menos idiomático en esta lista de acciones.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δικαιοσύνη'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales; por eso se conserva la estructura breve y la secuencia de acciones del original, con una única nota que preserva la alternativa contextual de πίστις.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se preserva «fe» para πίστις y «justicia» para δικαιοσύνη, siguiendo el auditable del POB inglés.
  - El orden verbal sigue de cerca la enumeración griega y la cadencia del catálogo de Hebreos 11.
  - La nota a se ancla en «por la fe» para reflejar la alternativa de medio/instrumento sin duplicar marcadores.
