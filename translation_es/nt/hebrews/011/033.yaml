review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego y la mayoría de los sentidos léxicos: «conquistaron reinos», «alcanzaron promesas» y «cerraron ... de leones» corresponden adecuadamente a κατηγωνίσαντο βασιλείας, ἐπέτυχον ἐπαγγελιῶν y ἔφραξαν στόματα λεόντων. Sin embargo, dos decisiones no preservan del todo la auditoría POB: (1) el inglés principal eligió «through faith», mientras el español puso «por la fe» y dejó como nota precisamente la alternativa menos preferida; en español conviene reflejar mejor el matiz instrumental con «por medio de la fe» o «mediante la fe» y reservar «por la fe» como alternativa breve; (2) la POB inglesa eligió «worked righteousness» con nota «justice», pero el borrador invirtió esa prioridad al poner «practicaron justicia» sin nota para «rectitud/justicia». Además, «la boca de leones» no preserva bien el plural στόματα y suena menos natural que «la boca de los leones» o mejor aún «las bocas de los leones».'
  spanish_quality_summary: El español es mayormente claro y legible, pero hay algunos giros mejorables para fidelidad y naturalidad bíblica. «Practicaron justicia» es idiomático, pero se aparta de la decisión auditada y reduce la amplitud de δικαιοσύνη. «La boca de leones» suena algo forzado y no refleja el plural del original; «las bocas de los leones» es más fiel y natural. El resto del verso mantiene buen ritmo catalogal y registro digno.
  glossary_alignment: 'Hay desalineación parcial con la terminología del proyecto para δικαιοσύνη: el valor por defecto es «justicia/rectitud» según contexto, pero aquí la auditoría inglesa fijó como texto principal «righteousness» con nota «justice». En español, «obraron rectitud[a]» o «obraron justicia[a]» podrían discutirse, pero para seguir la racionalidad documentada conviene un texto principal que preserve el campo semántico amplio; «obraron rectitud[a]» resulta más cercano a «worked righteousness», con nota para «justice». πίστις debe seguir «fe»; la preposición διά con genitivo se expresa mejor en el principal como «por medio de la fe[b]».'
  issues:
  - severity: medium
    issue: La nota al pie de «por la fe» está invertida respecto de la decisión inglesa auditada.
    rationale: El inglés principal usa «through faith» y la nota conserva «by faith» como alternativa. El español puso «por la fe» en el texto principal y la nota ofrece la misma opción, sin reflejar la preferencia por el matiz instrumental de διά con genitivo.
  - severity: high
    issue: «Practicaron justicia» no sigue la decisión principal de la POB para δικαιοσύνη.
    rationale: La auditoría inglesa escogió «worked righteousness» y dejó «justice» como alternativa. El borrador español adopta la alternativa como principal y elimina la nota requerida para preservar la otra posibilidad significativa.
  - severity: medium
    issue: «La boca de leones» no representa bien στόματα λεόντων y suena menos natural.
    rationale: El griego tiene plural «bocas». En español bíblico natural y fiel conviene «las bocas de los leones», que además mantiene la imaginería concreta.
  revised_spanish_text: quienes por medio de la fe[b] conquistaron reinos, obraron rectitud[a], alcanzaron promesas, cerraron las bocas de los leones,
  revised_footnotes:
  - marker: a
    text: O «justicia». El término griego puede significar «rectitud» o «justicia», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «por la fe». La frase también puede entenderse como acción realizada por medio de la confianza en Dios.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el verso para reflejar con más fidelidad el griego y la auditoría POB: «por medio de la fe» preserva mejor el valor instrumental de διά con genitivo; «obraron rectitud» mantiene en el texto principal la amplitud de δικαιοσύνη, dejando «justicia» como alternativa en nota, en línea con la decisión inglesa; y «las bocas de los leones» restaura el plural y mejora la naturalidad del español.'
