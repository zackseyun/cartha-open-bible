  to: quienes por medio de la fe[b] conquistaron reinos, obraron rectitud[a], alcanzaron promesas, cerraron las bocas de los leones,
  rationale: 'Se ajusta el verso para reflejar con más fidelidad el griego y la auditoría POB: «por medio de la fe» preserva mejor el valor instrumental de διά con genitivo; «obraron rectitud» mantiene en el texto principal la amplitud de δικαιοσύνη, dejando «justicia» como alternativa en nota, en línea con la decisión inglesa; y «las bocas de los leones» restaura el plural y mejora la naturalidad del español.'
