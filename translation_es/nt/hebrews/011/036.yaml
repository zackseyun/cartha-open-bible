  spanish_quality_summary: La redacción es clara y digna, pero «fueron probados por burlas y azotes» resulta algo rígida e idiomáticamente menos natural que «sufrieron» o «experimentaron». También «prisión» es entendible, pero «encarcelamiento» coordina mejor con un verbo de experiencia. Conviene pulir la nota para que el español alternativo no quede trabado con «además de cadenas y prisión».
  glossary_alignment: No hay términos del glosario mayor en juego. «Azotes» para μαστίγων y «cadenas» para δεσμῶν están bien. El ajuste principal es idiomático-lexical para πεῖραν ἔλαβον y la intensificación de ἔτι δὲ.
