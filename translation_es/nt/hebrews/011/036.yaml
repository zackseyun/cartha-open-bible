translation:
  language: es
  text: Otros, en cambio, sufrieron burlas y azotes[a], e incluso cadenas y encarcelamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «experimentaron una prueba de burlas y azotes, e incluso de cadenas y encarcelamiento». El griego dice más literalmente «recibieron una prueba de...»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  english_pob_choice: others
  chosen_spanish: Otros
  alternatives_spanish:
  - Algunos otros
  - Otros más
  lexicon: BDAG
  rationale: El adjetivo indefinido plural introduce otro grupo dentro del catálogo de sufrientes fieles. «Otros» conserva la contraposición y suena natural en español.
- source_word: ἐμπαιγμῶν
  english_pob_choice: mocking
  chosen_spanish: burlas
  alternatives_spanish:
  - escarnios
  - ridículo
  - mofas
  lexicon: BDAG
  rationale: El genitivo depende de πεῖραν ἔλαβον, por lo que conviene expresar que fueron sometidos a una prueba de estas afrentas. «Burlas» comunica la idea de escarnio público en español moderno sin perder la fuerza del término.
- source_word: μαστίγων
  english_pob_choice: flogging
  chosen_spanish: azotes
  alternatives_spanish:
  - latigazos
  - flagelaciones
  - azotamientos
  lexicon: BDAG
  rationale: El término se refiere a golpes dados con látigo. «Azotes» es claro, bíblico y suficientemente fuerte en español, manteniendo la referencia al castigo corporal.
- source_word: πεῖραν ἔλαβον
  english_pob_choice: experienced
  chosen_spanish: fueron probados
  alternatives_spanish:
  - experimentaron
  - pasaron por una prueba
  - sufrieron
  lexicon: BDAG
  rationale: La expresión literal significa «recibieron una prueba de». En español, «fueron probados» conserva el valor de prueba/experiencia sufrida y refleja mejor el matiz idiomático que un simple verbo de percepción.
- source_word: ἔτι δὲ
  english_pob_choice: and even
  chosen_spanish: y además
  alternatives_spanish:
  - y aun
  - e incluso
  - y hasta
  lexicon: BDAG
  rationale: 'La frase introduce una intensificación: después de burlas y azotes, algo más severo. «Y además» comunica la continuación con escalamiento sin sonar forzado.'
- source_word: δεσμῶν
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - grilletes
  - ligaduras
  - prisiones
  lexicon: BDAG
  rationale: Es el término concreto para ataduras. «Cadenas» es la equivalencia moderna más transparente y mantiene la imagen física del cautiverio.
- source_word: φυλακῆς
  english_pob_choice: imprisonment
  chosen_spanish: prisión
  alternatives_spanish:
  - encarcelamiento
  - cárcel
  - reclusión
  lexicon: BDAG
  rationale: En coordinación con «cadenas», el sustantivo nombra el estado o lugar de confinamiento. «Prisión» es breve, natural y suficientemente amplio para abarcar ambas ideas.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto principal y la nota queda anclada al segmento correspondiente.'
