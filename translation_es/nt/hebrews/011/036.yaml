  rationale: Se reemplaza «fueron probados por» por «sufrieron» para expresar de manera natural en español el idiomatismo πεῖραν ἔλαβον sin perder el sentido de padecimiento. Se ajusta «y además» a «e incluso» para conservar mejor la fuerza intensificadora de ἔτι δὲ. Se cambia «prisión» por «encarcelamiento» para coordinar más naturalmente con el verbo y con la alternativa literal de la nota. La nota se reescribe para que el español sea claro y fiel al valor más literal del griego.
