  - severity: low
    issue: «y además» debilita la escalada de ἔτι δὲ
    rationale: 'El griego marca intensificación: no solo burlas y azotes, sino incluso cadenas y encarcelamiento. «E incluso» refleja mejor esa progresión.'
  - severity: low
    issue: La nota al pie alternativa está algo trabada en español
    rationale: La frase «y además de cadenas y prisión» no fluye bien como alternativa literal. Conviene reformularla para claridad y paralelismo.
