translation:
  language: es
  text: Por la fe habitó como extranjero en la tierra de la promesa[a], como en tierra ajena, viviendo en tiendas con Isaac y Jacob, coherederos de la misma promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la fe sojournó en la tierra de la promesa como en tierra ajena».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por fe
  - Con fe
  lexicon: BDAG
  rationale: El dativo expresa medio o instrumento; en español bíblico natural, «por la fe» comunica con claridad que la fe es el medio de su conducta. Se evita una paráfrasis más abstracta como «por su confianza», que debilitaría el hilo temático de Hebreos 11.
- source_word: παρῴκησεν
  english_pob_choice: he lived as a foreigner
  chosen_spanish: habitó como extranjero
  alternatives_spanish:
  - sojournó
  - vivió como extranjero
  - residió como forastero
  lexicon: BDAG
  rationale: El verbo sugiere vivir en un lugar sin ser nativo ni poseerlo como propio. «Habitó como extranjero» conserva la idea de residencia real con condición de forastero, sin forzar un calco arcaico como «sojournó».
- source_word: εἰς γῆν τῆς ἐπαγγελίας
  english_pob_choice: in the land of promise
  chosen_spanish: en la tierra de la promesa
  alternatives_spanish:
  - en la tierra prometida
  - hacia la tierra de la promesa
  - en una tierra de promesa
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento, con verbos de residencia funciona locativamente. «Tierra de la promesa» conserva el nexo sustantivo con la promesa divina; se prefiere esta forma a «tierra prometida» para no diluir la estructura del genitivo.
- source_word: ὡς ἀλλοτρίαν
  english_pob_choice: as in a foreign land
  chosen_spanish: como en tierra ajena
  alternatives_spanish:
  - como si fuera ajena
  - como tierra extraña
  - como en tierra extranjera
  lexicon: BDAG
  rationale: ἀλλότριος expresa lo que pertenece a otro, lo ajeno o extranjero. «Como en tierra ajena» reproduce bien la comparación de ὡς y mantiene la tensión de que la tierra de la promesa, para él, se vivía sin apropiación plena.
- source_word: ἐν σκηναῖς κατοικήσας
  english_pob_choice: dwelling in tents
  chosen_spanish: viviendo en tiendas
  alternatives_spanish:
  - morando en tiendas
  - habitando en tiendas
  - viviendo en carpas
  lexicon: BDAG
  rationale: El participio aoristo describe la circunstancia de su modo de vida. «Tiendas» es el término bíblico y culto más natural en español para σκηναί; «carpas» suena más moderno pero menos tradicional y menos estable en registro bíblico.
- source_word: μετὰ Ἰσαὰκ καὶ Ἰακὼβ
  english_pob_choice: with Isaac and Jacob
  chosen_spanish: con Isaac y Jacob
  alternatives_spanish:
  - junto con Isaac y Jacob
  - en compañía de Isaac y Jacob
  lexicon: BDAG
  rationale: μετά con genitivo se rinde normalmente con «con». Se mantienen los nombres propios transliterados según la política del proyecto y el uso hispánico bíblico establecido.
- source_word: τῶν συγκληρονόμων
  english_pob_choice: fellow heirs
  chosen_spanish: coherederos
  alternatives_spanish:
  - copartícipes de la herencia
  - herederos juntamente
  - condueños de la herencia
  lexicon: BDAG
  rationale: El compuesto indica participación conjunta en una herencia. «Coherederos» es la forma española más precisa y directa; aunque «fellow heirs» en inglés evita tecnicismo, en español el compuesto es claro y fiel.
- source_word: τῆς ἐπαγγελίας τῆς αὐτῆς
  english_pob_choice: of the same promise
  chosen_spanish: de la misma promesa
  alternatives_spanish:
  - de la promesa misma
  - de esa misma promesa
  - de la misma promesa que él recibió
  lexicon: BDAG
  rationale: 'La repetición enfatiza identidad: Isaac y Jacob comparten la misma promesa dada a Abraham. «La misma promesa» preserva esa insistencia sin añadir explicaciones que no están en el texto.'
theological_decisions:
- issue: Sentido de la condición de Abraham en la tierra de la promesa
  english_pob_reading: He lived there as a foreigner, not as one who possessed it as his own.
  chosen_spanish_reading: Habitó allí como extranjero, no como dueño de la tierra.
  alternative_spanish_readings:
  - vivió allí como forastero
  - residió allí de manera temporal
  rationale: El texto subraya la paradoja teológica de que la tierra prometida aún no se experimenta como posesión plena. «Como extranjero» mantiene esa tensión sin resolverla en una propiedad ya consumada.
  doctrine_reference: Hebreos 11:9; Génesis 23:4; 1 Pedro 2:11
- issue: Relación entre Abraham, Isaac y Jacob respecto de la promesa
  english_pob_reading: Isaac and Jacob are fellow heirs of the same promise.
  chosen_spanish_reading: Isaac y Jacob son coherederos de la misma promesa.
  alternative_spanish_readings:
  - Isaac y Jacob participan de la misma promesa
  - Isaac y Jacob son herederos juntamente con él de la misma promesa
  rationale: 'La expresión afirma continuidad pactal: la promesa no se limita a Abraham, sino que se comparte con sus descendientes. «Coherederos» conserva la solidaridad hereditaria sin añadir precisiones doctrinales ajenas al versículo.'
  doctrine_reference: Gálatas 3:29; Romanos 4:13-16
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no hubo revisiones posteriores en el pasaje; la versión española conserva la misma arquitectura sintáctica y las mismas decisiones léxicas clave, adaptadas al español natural y al registro bíblico del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la terminología general del proyecto, aunque este versículo no contiene el nombre divino explícito.
  - Se usa «promesa» en singular para reflejar τῆς ἐπαγγελίας τῆς αὐτῆς sin expandirlo a una paráfrasis.
  - Se evita «Cristo» porque no aparece en el texto fuente ni en el contexto inmediato.
  - «Tiendas» se conserva por coherencia con el registro bíblico y con la imaginería de la vida patriarcal.
