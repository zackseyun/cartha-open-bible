review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: πίστει = «Por la fe», παρῴκησεν = residencia como extranjero, ὡς ἀλλοτρίαν = «como en tierra ajena», ἐν σκηναῖς κατοικήσας = vida en tiendas, y συγκληρονόμων τῆς ἐπαγγελίας τῆς αὐτῆς = participación conjunta en la misma promesa. La única corrección necesaria es en la nota léxica alternativa, donde «sojournó» no es español aceptable para el texto ni para una nota española.'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico digno. «Habitó como extranjero», «tierra de la promesa», «tierra ajena», «viviendo en tiendas» y «coherederos» son formulaciones fieles y legibles. La calidad baja solo en la nota, por usar un anglicismo crudo («sojournó»).
  glossary_alignment: No hay conflicto con las preferencias terminológicas del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Coherederos» está bien motivado para συγκληρονόμων, y «tierra de la promesa» preserva adecuadamente la estructura del original y del POB auditado.
  issues:
  - severity: medium
    issue: La nota al pie usa «sojournó», que no es español natural ni aceptable en este proyecto.
    rationale: El inglés POB registra «sojourned» como alternativa léxica, pero en español debe verterse con una opción española como «residió como extranjero» o «habitó como forastero». Mantener «sojournó» rompe la legibilidad y contradice la guía de estilo.
  revised_spanish_text: Por la fe habitó como extranjero en la tierra de la promesa[a], como en tierra ajena, viviendo en tiendas con Isaac y Jacob, coherederos de la misma promesa.
  revised_footnotes:
  - marker: a
    text: 'O: «Por la fe residió como extranjero en la tierra de la promesa, como en tierra ajena»'
    reason: lexical_alternative
  revision_rationale: Se aprueba el texto principal con una reparación menor en la nota al pie para sustituir el anglicismo «sojournó» por una alternativa española natural y fiel al matiz léxico de παρῴκησεν. No se requieren cambios en la traducción principal.
