translation:
  language: es
  text: Y si se hubieran acordado de aquella tierra[a] de la cual habían salido, habrían tenido oportunidad de regresar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aquel país» o «aquella patria». El griego se refiere al lugar terrenal que habían dejado atrás.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημονεύουσιν
  english_pob_choice: had been remembering
  chosen_spanish: se hubieran acordado
  alternatives_spanish:
  - hubieran estado recordando
  - hubieran seguido pensando en
  - recordaban
  lexicon: BDAG
  rationale: El presente indicativo griego en una condición contrafactual se vierte con valor de anterioridad hipotética en español. "Acordarse de" conserva el matiz mental/cognitivo sin reducirlo a simple nostalgia.
- source_word: ἐκείνης
  english_pob_choice: that land
  chosen_spanish: aquella tierra
  alternatives_spanish:
  - aquel país
  - aquel hogar
  - esa tierra
  lexicon: BDAG
  rationale: El demostrativo femenino remite al lugar terrenal mencionado antes. "Tierra" mantiene la imagen espacial y de peregrinación, y evita un tono político que "país" podría sugerir.
- source_word: ἀφ’ ἧς
  english_pob_choice: from which
  chosen_spanish: de donde
  alternatives_spanish:
  - de la cual
  - desde donde
  lexicon: BDAG
  rationale: La relación de procedencia se expresa naturalmente en español con "de donde", que conserva claridad y fluidez sin perder el vínculo de origen.
- source_word: ἐξέβησαν
  english_pob_choice: they had gone out
  chosen_spanish: salieron
  alternatives_spanish:
  - habían salido
  - se habían ido
  - habían partido
  lexicon: BDAG
  rationale: El aoristo de ἐκβαίνω indica una salida efectiva. "Salieron" es directo y fiel; el contexto contrafactual ya queda marcado por el tiempo verbal de la cláusula principal.
- source_word: εἶχον ἂν
  english_pob_choice: they would have had
  chosen_spanish: habrían tenido
  alternatives_spanish:
  - hubieran tenido
  - habrían poseído
  lexicon: BDAG
  rationale: La forma con ἄν expresa consecuencia hipotética. "Habrían tenido" es el equivalente natural en español.
- source_word: καιρὸν
  english_pob_choice: opportunity
  chosen_spanish: oportunidad
  alternatives_spanish:
  - tiempo
  - ocasión
  lexicon: BDAG
  rationale: Aquí καιρός no es tiempo cronológico sino ocasión favorable. "Oportunidad" comunica mejor esa posibilidad concreta de volver.
- source_word: ἀνακάμψαι
  english_pob_choice: to return
  chosen_spanish: regresar
  alternatives_spanish:
  - volver
  - dar la vuelta
  lexicon: BDAG
  rationale: El infinitivo expresa volver atrás. "Regresar" es claro y sobrio en español; "volver" también es viable, pero "regresar" evita ambigüedad coloquial.
- source_word: καὶ εἰ μὲν
  english_pob_choice: And if
  chosen_spanish: Y si en verdad
  alternatives_spanish:
  - Y si
  - Porque si en verdad
  - Y si ciertamente
  lexicon: BDAG
  rationale: La partícula μέν aquí es estructural y puede reforzarse con "en verdad" sin sobrecargar el texto. "Y si" mantiene la conexión con el versículo previo.
theological_decisions:
- issue: La tierra recordada como patria terrenal en contraste con la patria mejor del contexto
  english_pob_reading: An earthly homeland previously left behind, contrasted implicitly with the better/heavenly country in the surrounding context.
  chosen_spanish_reading: Una tierra terrenal dejada atrás, sin alegorizarla en el texto principal, en contraste con la patria mejor y celestial del contexto inmediato.
  alternative_spanish_readings:
  - Una forma de vida anterior más que un lugar literal
  - Una patria espiritualizada o simbólica
  rationale: Hebreos 11:13–16 mantiene el contraste espacial entre lo dejado atrás y lo esperado. La traducción conserva el referente concreto de "aquella tierra" y deja que el contexto haga la interpretación teológica.
  doctrine_reference: Hebreos 11:13–16; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece exactamente en el texto español junto al sintagma correspondiente, y la nota queda debidamente anclada.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico contemporáneo y sobrio.
  - '"Tierra" se eligió de forma consistente con el motivo de peregrinación del contexto.'
  - No se introdujo "Cristo" ni otras sustituciones no pertinentes al versículo.
  - La sintaxis española conserva la estructura condicional contrafactual del griego sin calco innecesario.
