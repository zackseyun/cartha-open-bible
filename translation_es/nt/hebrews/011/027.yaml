review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «Por la fe» para πίστει, «dejó Egipto» para κατέλιπεν Αἴγυπτον, la negación participial «sin temer», y la cláusula final con la paradoja de ver al Invisible. También preserva correctamente la ambigüedad histórica sobre cuál salida de Egipto está en vista. Sin embargo, las notas al pie están invertidas respecto del rastro de auditoría inglés: en el inglés, la nota [a] corresponde a «Egypt» y la [b] a «the king’s anger», mientras que en español [a] se ancla en «Egipto» pero contiene la alternativa de «el Invisible», y [b] se ancla en «rey» pero contiene la nota sobre el episodio de «dejó Egipto». Esto rompe la correspondencia semántica y la disciplina de anclaje de notas.'
  spanish_quality_summary: El español es claro, natural y digno. «Por la fe dejó Egipto, sin temer la ira del rey, porque perseveró como viendo al Invisible» es legible y fiel. «Ira» y «perseveró» son opciones aceptables y bien motivadas. El único problema de calidad editorial relevante es la colocación incorrecta de las notas, no la redacción principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «El Invisible» para τὸν ἀόρατον es defendible en español y está documentado; conviene mantener la nota lexical en ese lugar. «Ira» para θυμός intensifica un poco frente a «anger», pero sigue dentro del campo semántico y no contradice la evidencia fuente.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas al lugar equivocado en el texto español.
    rationale: La nota [a] aparece sobre «Egipto» pero su contenido explica «el Invisible»; la nota [b] aparece sobre «rey» pero su contenido explica la ambigüedad de «dejó Egipto». Según la disciplina del proyecto, cada marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: low
    issue: La nota lexical sobre ἀόρατον podría alinearse un poco mejor con el inglés POB.
    rationale: El inglés ofrece «the invisible One» / «the unseen One». El español actual («el Invisible» / «el que no se ve») es bueno; añadir «el invisible» o mantener la formulación actual ambas son válidas. No requiere adjudicación mayor.
  revised_spanish_text: Por la fe dejó Egipto[b], sin temer la ira del rey, porque perseveró como viendo al Invisible[a].
  revised_footnotes:
  - marker: a
    text: O «el Invisible»; también puede entenderse como «el que no se ve».
    reason: lexical_alternative
  - marker: b
    text: El versículo puede aludir tanto a la huida de Moisés en Éxodo 2 como a la salida del éxodo en Éxodo 12–14; el griego no especifica cuál episodio tiene en vista.
    reason: cross_reference
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la ubicación de los marcadores de nota para que cada nota quede anclada a la palabra o frase que realmente explica: [b] en «Egipto» por la ambigüedad del episodio, y [a] en «Invisible» por la alternativa léxica de ἀόρατον.'
