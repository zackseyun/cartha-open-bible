translation:
  language: es
  text: Por la fe dejó Egipto[b], sin temer la ira del rey, porque perseveró como viendo al Invisible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Invisible»; también puede entenderse como «el que no se ve».
    reason: lexical_alternative
  - marker: b
    text: El versículo puede aludir tanto a la huida de Moisés en Éxodo 2 como a la salida del éxodo en Éxodo 12–14; el griego no especifica cuál episodio tiene en vista.
    reason: cross_reference
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por confianza
  - Por fidelidad
  lexicon: BDAG
  rationale: El dativo aquí es instrumental/modal. «Por la fe» conserva el valor de medio o esfera de acción y encaja con la serie de Hebreos 11. «Por confianza» es posible, pero pierde la forma consagrada del pasaje; «por fidelidad» no es la opción preferida en este contexto narrativo.
- source_word: κατέλιπεν
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - partió de
  - abandonó
  lexicon: BDAG
  rationale: El aoristo de καταλείπω se entiende naturalmente como «dejó». «Partió de» es más formal; «abandonó» añade una fuerza que el contexto no exige.
- source_word: Αἴγυπτον
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español.
- source_word: μὴ φοβηθεὶς
  english_pob_choice: not fearing
  chosen_spanish: sin temer
  alternatives_spanish:
  - no temiendo
  - sin estar temeroso de
  lexicon: BDAG
  rationale: El participio aoristo con μή expresa circunstancia acompañante. «Sin temer» suena natural en español y conserva la relación con el verbo principal.
- source_word: τὸν θυμὸν
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - la ira ardiente
  - el enojo
  - la furia
  lexicon: BDAG
  rationale: θυμός puede indicar ira intensa. En español, «ira» comunica mejor esa intensidad que «enojo», sin exagerar como «furia». Aunque el inglés POB optó por «anger», aquí «ira» conserva mejor la fuerza léxica del griego.
- source_word: τοῦ βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del monarca
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva de forma natural en español.
- source_word: τὸν ἀόρατον
  english_pob_choice: the One who is invisible
  chosen_spanish: al Invisible
  alternatives_spanish:
  - al que es invisible
  - al Invisible Uno
  lexicon: BDAG
  rationale: El artículo con ἀόρατος funciona sustantivamente. «Al Invisible» conserva esa sustantivación y resulta más breve y reverente en español. «Al que es invisible» explicita el sentido, pero es menos fluido; «Invisible Uno» suena poco natural.
- source_word: ὡς ὁρῶν
  english_pob_choice: as seeing
  chosen_spanish: como viendo
  alternatives_spanish:
  - como si viera
  - como quien ve
  lexicon: BDAG
  rationale: La construcción comparativa con ὡς y el participio se refleja bien con «como viendo», que mantiene el paralelismo paradojal del texto. «Como si viera» añade un matiz hipotético que el griego no requiere.
- source_word: ἐκαρτέρησεν
  english_pob_choice: he endured
  chosen_spanish: perseveró
  alternatives_spanish:
  - se mantuvo firme
  - soportó
  lexicon: BDAG
  rationale: καρτερέω expresa resistencia persistente. «Perseveró» comunica bien la constancia en español bíblico contemporáneo; «se mantuvo firme» es viable, pero menos cercano al matiz de perseverancia activa.
theological_decisions:
- issue: Identidad y episodio histórico aludido por «dejó Egipto»
  english_pob_reading: The translation leaves the referent as Moses and does not resolve whether the author primarily alludes to Moses' flight in Exodus 2 or the exodus departure in Exodus 12–14.
  chosen_spanish_reading: La traducción deja abierto si se alude al retiro de Moisés en Éxodo 2 o a la salida del éxodo en Éxodo 12–14.
  alternative_spanish_readings:
  - La huida de Moisés después de matar al egipcio
  - La salida de Israel guiada por Moisés
  rationale: El griego solo dice que «dejó Egipto» y que no temió la ira del rey. Como el texto no precisa el episodio, conviene no resolver la tensión interpretativa en la traducción principal. Esto conserva la ambigüedad documentada por el proyecto.
  doctrine_reference: Translation philosophy §3
- issue: Alcance de «el Invisible»
  english_pob_reading: Or 'the invisible One.' The Greek could also be rendered 'the unseen One.'
  chosen_spanish_reading: «El Invisible» se entiende como una referencia personal a Dios, sin perder la posibilidad de «el que no se ve» / «el que es invisible».
  alternative_spanish_readings:
  - el que es invisible
  - el que no se ve
  - el Invisible Uno
  rationale: El participio sustantivado ἀόρατον puede leerse como una designación personal. En español, «el Invisible» preserva la fuerza sintáctica y la paradoja del verso. La nota mantiene la alternativa sin imponer una sola paráfrasis.
  doctrine_reference: Hebreos 11:27; BDAG ἀόρατος
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios sustantivos respecto del texto fuente y del contexto inglés. Se mantuvo la ambigüedad histórica y la sustantivación de ἀόρατος, con una opción española más natural para θυμός.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto no aplicable aquí, pues el versículo no contiene el nombre divino.
  - Se prefirió «la fe» y «perseveró» para armonizar con el registro de Hebreos 11 en español.
  - «Al Invisible» preserva la sustantivación del griego y evita introducir una glosa interpretativa en el cuerpo principal.
