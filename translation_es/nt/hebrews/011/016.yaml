translation:
  language: es
  text: Pero en realidad ansían una patria mejor[a], es decir, una celestial. Por eso Dios no se avergüenza de ser llamado su Dios, porque les ha preparado una ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un país mejor'. El adjetivo griego es femenino y probablemente remite a la idea implícita de patria/país en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Pero en realidad
  - Pero en este momento
  lexicon: BDAG
  rationale: Introduce el contraste con la situación anterior de manera natural en español; 'ahora' conserva el valor discursivo y temporal sin forzar una calca.
- source_word: κρείττονος
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - superior
  - más excelente
  lexicon: BDAG
  rationale: Comparativo común y claro en español, equivalente directo de la idea de 'better'.
- source_word: ὀρέγονται
  english_pob_choice: they long for
  chosen_spanish: ansían
  alternatives_spanish:
  - desean
  - anhelan
  - aspiran a
  lexicon: BDAG
  rationale: Expresa un deseo intenso y orientado hacia una meta; 'ansían' mantiene mejor la fuerza afectiva del verbo que un simple 'desean'.
- source_word: κρείττονος ... ἐπουρανίου
  english_pob_choice: a better country—that is, a heavenly one
  chosen_spanish: una patria mejor[a], es decir, una celestial
  alternatives_spanish:
  - una mejor patria[a], es decir, una celestial
  - un país mejor[a], es decir, uno celestial
  - una patria mejor[a], es decir, una patria celestial
  lexicon: BDAG
  rationale: '''Patria'' rinde bien el campo semántico de πατρίς/πατρίδα implícito en el contexto inmediato y suena natural en español bíblico contemporáneo. ''Celestial'' conserva el adjetivo ἐπουράνιος sin añadir más contenido que ''del cielo''.'
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia de forma fluida en español y conserva la conexión lógica con la cláusula anterior.
- source_word: οὐκ ἐπαισχύνεται
  english_pob_choice: is not ashamed
  chosen_spanish: no se avergüenza
  alternatives_spanish:
  - no siente vergüenza
  - no se avergüenza de
  - no le da vergüenza
  lexicon: BDAG
  rationale: Rinde el verbo con el valor normal de honra/vergüenza, manteniendo la fuerza relacional y pactal sin suavizarla.
- source_word: ἐπικαλεῖσθαι αὐτῶν
  english_pob_choice: to be called their God
  chosen_spanish: de ser llamado su Dios
  alternatives_spanish:
  - de ser invocado como su Dios
  - de ser nombrado su Dios
  lexicon: BDAG
  rationale: La construcción de infinitivo con genitivo apunta a designación/nombre; 'ser llamado su Dios' es idiomático y fiel al eco veterotestamentario.
- source_word: ἡτοίμασεν
  english_pob_choice: he has prepared
  chosen_spanish: les ha preparado
  alternatives_spanish:
  - preparó para ellos
  - les preparó
  lexicon: BDAG
  rationale: El perfecto castellano expresa bien la acción completada con relevancia presente. El dativo indirecto se vuelve natural con 'les'.
- source_word: πόλιν
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - la ciudad
  - una urbe
  lexicon: BDAG
  rationale: Mantiene la imagen concreta y escatológica sin añadir determinación no presente en el griego.
theological_decisions:
- issue: Sustantivo implícito con κρείττονος y ἐπουρανίου
  english_pob_reading: Supply 'country' from the immediate context (v. 14)
  chosen_spanish_reading: Supone 'patria' por el contexto inmediato (v. 14)
  alternative_spanish_readings:
  - Supone 'país'
  - 'Deja el sustantivo implícito: ''ansían algo mejor, es decir, una celestial'''
  rationale: El griego usa genitivos femeninos sin sustantivo explícito en este versículo, pero el antecedente conceptual del contexto inmediato es la patria/país de vv. 14–15. 'Patria' es una solución natural en español y conserva la elipsis sin sobreexplicarla.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fórmula de honor y pacto en 'no se avergüenza de ser llamado su Dios'
  english_pob_reading: Retain the relational formula without expanding it
  chosen_spanish_reading: Conservar la fórmula relacional sin expandirla
  alternative_spanish_readings:
  - Parafrasear como 'no se avergüenza de reconocerlos como su pueblo'
  rationale: El texto afirma específicamente que Dios no se avergüenza de ser llamado su Dios; ampliar a 'su pueblo' agregaría una inferencia contextual válida pero no explícita.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: Ajusté la traducción para anclar el marcador [a] directamente en 'patria mejor[a]' y así corregir la validación previa; no se añadieron notas sin anclaje en el texto. El resto mantiene la lectura ya acordada por el auditor con acuerdo alto.
  spanish_consistency_notes:
  - Conservo 'Dios' para ὁ θεός y 'su Dios' para la fórmula relacional.
  - Uso 'celestial' para ἐπουράνιος como equivalente natural y preciso en español bíblico.
  - Mantengo 'ciudad' como imagen concreta y escatológica, sin convertirla en un concepto abstracto.
