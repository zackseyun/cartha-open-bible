translation:
  language: es
  text: Por la fe[a], Moisés, cuando ya había crecido, rehusó ser llamado hijo de la hija de Faraón,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Por fidelidad' o 'Por confianza'; griego πίστει. Aquí el texto principal sigue la fórmula recurrente del capítulo 'Por la fe'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por fidelidad
  - Por confianza
  lexicon: BDAG
  rationale: La forma dativa instrumental se conserva con una construcción natural en español. En Hebreos 11 la fórmula repetida pide mantener 'fe' como término principal; 'por' expresa bien el medio o base de la acción.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: μέγας γενόμενος
  english_pob_choice: when he had grown up
  chosen_spanish: ya adulto
  alternatives_spanish:
  - cuando había crecido
  - cuando llegó a ser grande
  lexicon: BDAG
  rationale: La expresión participial indica madurez o llegada a la adultez, no grandeza de rango. 'Ya adulto' comunica la fuerza temporal y el sentido natural en español sin perder el matiz.
- source_word: ἠρνήσατο
  english_pob_choice: refused
  chosen_spanish: rehusó
  alternatives_spanish:
  - se negó
  - rechazó
  lexicon: BDAG
  rationale: El verbo expresa una negativa deliberada ante una identidad o designación. 'Rehusó' conserva esa decisión personal y encaja bien con el infinitivo que sigue.
- source_word: λέγεσθαι
  english_pob_choice: to be called
  chosen_spanish: ser llamado
  alternatives_spanish:
  - ser nombrado
  - ser conocido como
  lexicon: BDAG
  rationale: El infinitivo pasivo se vierte de manera directa y idiomática. 'Ser llamado' reproduce de forma precisa la construcción pasiva.
- source_word: υἱὸς θυγατρὸς Φαραώ
  english_pob_choice: the son of Pharaoh’s daughter
  chosen_spanish: hijo de la hija de Faraón
  alternatives_spanish:
  - hijo de la hija de Faraón
  - hijo de una hija de Faraón
  lexicon: BDAG
  rationale: Se mantiene la referencia específica a la identidad adoptiva de Moisés. El artículo español refleja mejor la referencia concreta del griego en este contexto narrativo.
theological_decisions:
- issue: Rendering of πίστις in Hebrews 11 formula
  english_pob_reading: By faith
  chosen_spanish_reading: Por la fe
  alternative_spanish_readings:
  - Por fidelidad
  - Por confianza
  rationale: La sección de Hebreos 11 repite la fórmula en torno a πίστις como principio de acción. 'Fe' es la opción principal en español, mientras que las alternativas quedan registradas como posibles pero no preferidas aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego SBLGNT y el criterio auditado de la POB en inglés. Se conservó la fórmula de Hebreos 11 para πίστις, se interpretó μέγας γενόμενος como madurez/adultez, y se mantuvo la identidad específica de Moisés como hijo adoptivo en la casa de Faraón.
  spanish_consistency_notes:
  - Se usó 'fe' como término principal para πίστις en coherencia con Hebreos 11.
  - '''Rehusó'' evita suavizar el matiz voluntario de ἠρνήσατο.'
  - '''Ya adulto'' expresa mejor la idea de haber alcanzado madurez que una traducción literal de ''grande''.'
  - Se mantuvo 'Faraón' como título propio sin adaptar a 'el faraón' para preservar la forma bíblica establecida.
