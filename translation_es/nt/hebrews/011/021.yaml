translation:
  language: es
  text: Por la fe, Jacob, al morir, bendijo a cada uno de los hijos de José, y adoró mientras se apoyaba sobre la punta de su bastón[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo el texto hebreo de Génesis 47:31: «y se inclinó en adoración sobre la cabecera de su cama». El texto griego aquí dice «bastón».'
    reason: textual_variant
  - marker: b
    text: O «adoró hacia la punta de su bastón». La frase probablemente describe la postura de Jacob, no el objeto de su adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - por confianza
  - por fidelidad
  lexicon: BDAG
  rationale: El dativo instrumental/modal de πίστει se expresa naturalmente en español con «Por la fe», conservando la fórmula recurrente de Hebreos 11 y el sentido de medio o esfera de acción.
- source_word: ἀποθνῄσκων
  english_pob_choice: as he was dying
  chosen_spanish: al morir
  alternatives_spanish:
  - mientras moría
  - cuando estaba muriendo
  lexicon: BDAG
  rationale: El participio presente contemporáneo indica simultaneidad con los verbos principales; «al morir» comunica ese valor temporal de forma natural y sobria en español.
- source_word: ἕκαστον τῶν υἱῶν Ἰωσὴφ
  english_pob_choice: each of the sons of Joseph
  chosen_spanish: a cada uno de los hijos de José
  alternatives_spanish:
  - a cada hijo de José
  - a cada uno de los hijos de José
  lexicon: BDAG
  rationale: La construcción distributiva con genitivo partitivo recalca que la bendición se dio individualmente a los dos hijos; «a cada uno de los hijos de José» preserva ese énfasis.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - dio su bendición a
  lexicon: BDAG
  rationale: «Bendijo» es la equivalencia directa y natural para εὐλόγησεν en este contexto patriarcal y de alianza, sin añadir explicaciones ajenas al texto.
- source_word: προσεκύνησεν
  english_pob_choice: worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró en adoración
  - se inclinó en adoración
  lexicon: BDAG
  rationale: En Hebreos, προσκυνέω expresa un acto religioso de adoración; «adoró» conserva ese sentido teológico mejor que una mera postura física.
- source_word: ἐπὶ τὸ ἄκρον τῆς ῥάβδου αὐτοῦ
  english_pob_choice: while leaning on the top of his staff
  chosen_spanish: mientras se apoyaba sobre la punta de su bastón
  alternatives_spanish:
  - sobre la punta de su bastón
  - hacia la punta de su bastón
  - apoyado en la punta de su bastón
  lexicon: BDAG
  rationale: La frase griega es difícil si se vierte de manera demasiado literal. «Se apoyaba sobre la punta de su bastón» comunica la postura probable y evita hacer del bastón el objeto de la adoración.
theological_decisions:
- issue: Relación entre la adoración de Jacob y el bastón en la cláusula final
  english_pob_reading: Jacob worshiped God while leaning on the top of his staff.
  chosen_spanish_reading: Jacob adoró a Dios mientras se apoyaba sobre la punta de su bastón.
  alternative_spanish_readings:
  - Jacob se postró en adoración sobre la cabecera de su cama (reflejando el hebreo de Gn 47:31)
  - Jacob adoró hacia la punta de su bastón
  rationale: La lectura griega de Hebreos dice «bastón», probablemente en línea con la Septuaginta de Génesis 47:31, mientras que el hebreo de Génesis puede leerse «cama». La traducción española conserva el dato griego y resuelve la postura adverbialmente para no sugerir que el bastón fuera el objeto de la adoración. La alternativa basada en el hebreo se mantiene como variante significativa.
  doctrine_reference: Preservar la tensión intertextual y textual sin armonizarla artificialmente; primacía de la fuente original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego de SBLGNT y conserva la tensión textual señalada por el aparato auditado de la POB en inglés: final en «bastón» frente a la posible lectura hebrea de Génesis 47:31 con «cama». No se introdujeron cambios respecto del pasaje fuente, solo una decisión de estilo y de claridad en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene «adoró» como término culto y teológicamente fuerte, coherente con el uso de προσκυνέω en Hebreos.
  - «Bastón» traduce ῥάβδος de manera natural en español y conserva la imagen corporal sin suavizarla.
  - La estructura «Por la fe...» sigue el patrón de Hebreos 11 para mantener consistencia intraepistolar.
