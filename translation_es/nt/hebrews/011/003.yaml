translation:
  language: es
  text: Por la fe entendemos que las edades[a] fueron formadas por la palabra de Dios, de modo que lo que se ve no llegó a existir a partir de cosas visibles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los siglos», «los mundos» o «el universo»; el griego dice «las edades», que puede denotar el orden del mundo a través del tiempo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Mediante la fe
  - Por medio de la fe
  lexicon: BDAG
  rationale: El dativo expresa medio o instrumento; «Por la fe» es natural en español, mantiene la fórmula repetida en Hebreos y conserva πίστις como «fe» según el criterio terminológico del proyecto.
- source_word: νοοῦμεν
  english_pob_choice: we understand
  chosen_spanish: entendemos
  alternatives_spanish:
  - comprendemos
  - percibimos
  lexicon: BDAG
  rationale: νοέω aquí apunta a captar con la mente. «Entendemos» es claro, idiomático y conserva el énfasis epistemológico del verso.
- source_word: κατηρτίσθαι
  english_pob_choice: were framed
  chosen_spanish: fueron formados
  alternatives_spanish:
  - fueron preparados
  - fueron puestos en orden
  - fueron constituidos
  lexicon: BDAG
  rationale: El infinitivo perfecto pasivo comunica que los siglos/edades han sido dispuestos o constituidos. «Fueron formados» transmite bien la idea de ordenación/constitución sin cargar innecesariamente el texto con un matiz técnico.
- source_word: τοὺς αἰῶνας
  english_pob_choice: the ages
  chosen_spanish: los siglos
  alternatives_spanish:
  - las edades
  - los mundos
  - el universo
  lexicon: BDAG
  rationale: Aunque αἰῶνες puede significar «edades», en español bíblico «siglos» conserva la referencia temporal y cósmica con un registro digno y comprensible. No se eligió «universo» porque estrecha y explica demasiado; tampoco «mundos» porque desplaza el foco temporal del griego.
- source_word: ῥήματι θεοῦ
  english_pob_choice: by the word of God
  chosen_spanish: por la palabra de Dios
  alternatives_spanish:
  - por el dicho de Dios
  - por la declaración de Dios
  lexicon: BDAG
  rationale: ῥῆμα enfatiza palabra pronunciada o declarada. «Palabra de Dios» es una equivalencia natural y transparente en español; el contexto instrumental queda claro con «por».
- source_word: εἰς τὸ μὴ ἐκ φαινομένων ... γεγονέναι
  english_pob_choice: so that ... did not come into being
  chosen_spanish: de modo que ... no llegó a existir
  alternatives_spanish:
  - para que ... no llegara a existir
  - de manera que ... no se produjo
  lexicon: BDAG
  rationale: La construcción expresa resultado o finalidad. «No llegó a existir» mantiene el valor de γίνομαι sin añadir una formulación doctrinal más amplia que la del griego; el complemento «de modo que» hace explícita la relación.
- source_word: ἐκ φαινομένων
  english_pob_choice: from things that are visible
  chosen_spanish: a partir de cosas visibles
  alternatives_spanish:
  - de cosas visibles
  - desde cosas visibles
  lexicon: BDAG
  rationale: El participio refiere a lo visible o aparente. «A partir de» refleja bien la relación de procedencia marcada por ἐκ y «cosas visibles» conserva la contrastación con lo que se ve.
- source_word: τὸ βλεπόμενον
  english_pob_choice: what is seen
  chosen_spanish: lo que se ve
  alternatives_spanish:
  - lo visible
  - lo que es visto
  lexicon: BDAG
  rationale: Participio sustantivado en singular colectivo; «lo que se ve» es idiomático en español y mantiene la referencia al orden visible.
theological_decisions:
- issue: Alcance de αἰῶνες en relación con la creación
  english_pob_reading: Rendered as 'the ages' rather than 'the universe' or 'the worlds.'
  chosen_spanish_reading: Se traduce como «los siglos», preservando el alcance temporal-cósmico sin reducirlo a una cosmología materialista.
  alternative_spanish_readings:
  - los mundos
  - el universo
  - las edades
  rationale: αἰῶνες puede abarcar el orden del mundo a través del tiempo. «Los siglos» es una solución fiel y entendible que no limita el término a la materia ni lo convierte en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: La procedencia de lo visible
  english_pob_reading: The verse is rendered without explicitly stating creatio ex nihilo in the main text.
  chosen_spanish_reading: La redacción no formula explícitamente la creación de la nada, pero sí afirma que lo visible no provino de cosas visibles.
  alternative_spanish_readings:
  - una redacción más directa que sugiera creación de la nada
  - una formulación doctrinalmente explícita sobre creatio ex nihilo
  rationale: El griego afirma una relación de no procedencia desde lo visible; la traducción debe conservar esa afirmación sin ampliar el texto más allá de lo que dice.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Sin cambios de revisión pendientes; se corrigió la anclaje de la nota al incluir [a] en el texto. La redacción se mantiene ajustada al griego y al expediente auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo la fórmula epistémica «Por la fe entendemos» para coherencia con Hebreos 11.
  - Se evitó «SEÑOR» y se usó «Dios» conforme al texto fuente.
  - Se preservó la distinción entre lo visible y lo que se ve, reflejando ambos participios griegos.
  - La nota al pie quedó anclada exactamente en «palabra de Dios[a]» para cumplir la validación.
