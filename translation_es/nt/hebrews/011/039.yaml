    rationale: Puede conservarse como opción léxica secundaria por fidelidad al audit trail, pero no conviene sobrecargar la presentación con una nota redundante para ello.
  revised_spanish_text: Y todos estos, aunque aprobados[a] por medio de la fe, no recibieron la promesa[b],
