translation:
  language: es
  text: Y todos estos, aunque aprobados[a] por medio de la fe, no recibieron la promesa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habiendo recibido aprobación' o 'habiendo sido atestiguados'. El participio griego subraya que estas personas recibieron testimonio favorable por medio de la fe.
    reason: lexical_alternative
  - marker: b
    text: O 'no obtuvieron la promesa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción enlaza esta síntesis con el contexto anterior sin añadir contraste inexistente; en español, 'Y' mantiene la continuidad natural del argumento.
- source_word: πάντες
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - todos
  - todos ellos
  lexicon: BDAG
  rationale: El pronombre anafórico remite a los testigos enumerados en el capítulo; 'todos estos' conserva esa referencia cercana de manera clara y natural.
- source_word: μαρτυρηθέντες
  english_pob_choice: though commended
  chosen_spanish: aunque aprobados
  alternatives_spanish:
  - habiendo recibido testimonio favorable
  - habiendo sido atestiguados
  - habiendo recibido aprobación
  lexicon: BDAG
  rationale: El participio pasivo aoristo indica haber recibido testimonio favorable; 'aprobados' comunica bien esa idea en español sin perder el matiz de evaluación favorable. El concesivo 'aunque' reproduce el valor contextual del miembro participial frente a 'no recibieron'.
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: La preposición con genitivo expresa medio o instrumento; 'por medio de la fe' es preciso y respetuoso del valor de διά, además de sonar más natural que un calco rígido.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: En Hebreos 11 el sentido dominante es la fe confiada de los creyentes; se conserva el término doctrinal estándar 'fe'.
- source_word: οὐκ ἐκομίσαντο
  english_pob_choice: did not receive
  chosen_spanish: no recibieron
  alternatives_spanish:
  - no obtuvieron
  - no llevaron consigo
  lexicon: BDAG
  rationale: κομίζω en voz media puede significar recibir u obtener; 'no recibieron' es la opción más clara y fiel, y preserva la tensión escatológica del pasaje.
- source_word: τὴν ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  - el cumplimiento de la promesa
  lexicon: BDAG
  rationale: El sustantivo singular con artículo se conserva como 'la promesa' para no resolver interpretativamente a qué plenitud se refiere; el contexto inmediato ampliará su alcance.
theological_decisions:
- issue: Sentido de μαρτυρηθέντες en Hebreos 11
  english_pob_reading: commended / having received approval / having been attested
  chosen_spanish_reading: aprobados
  alternative_spanish_readings:
  - habiendo recibido testimonio favorable
  - atestiguados
  - habiendo recibido aprobación
  rationale: Hebreos 11 usa repetidamente el lenguaje de testimonio favorable respecto a los fieles. 'Aprobados' transmite esa valoración positiva sin introducir una paráfrasis extensa, y el concesivo mantiene la relación con la cláusula siguiente.
  doctrine_reference: Hebreos 11 como capítulo del testimonio de la fe
- issue: Alcance de 'la promesa'
  english_pob_reading: Rendered as 'the promise' without expanding it in the main text.
  chosen_spanish_reading: la promesa
  alternative_spanish_readings:
  - lo prometido
  - el cumplimiento de la promesa
  - la herencia prometida
  rationale: Conviene preservar la formulación compacta del griego y de la POB inglesa para no resolver en traducción la identidad exacta del objeto prometido; el v. 40 aporta la aclaración contextual.
  doctrine_reference: Preservar la tensión teológica hasta el contexto inmediato
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés revisado con estado de alta concordancia; no se detectaron cambios aplicados en la última pasada, así que se mantiene la misma solución semántica y la tensión interpretativa de 'the promise'.
  spanish_consistency_notes:
  - Se conserva 'fe' como traducción estable de πίστις en Hebreos 11.
  - Se evita sustituir 'la promesa' por expansiones interpretativas en el texto principal.
  - El valor concesivo de 'though' se refleja con 'aunque' para mantener la lógica del verso.
  - Se usa 'por medio de' para expresar διά con genitivo como medio, sin perder naturalidad en español.
