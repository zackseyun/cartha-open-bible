translation:
  language: es
  text: habiendo considerado que Dios podía aun resucitar[a] de entre los muertos, de donde[b] también, en figura, lo recibió de vuelta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantar»; el contexto es lenguaje de resurrección, aunque el verbo griego básico es más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «desde donde»; el adverbio griego retoma la idea anterior y puede oírse como procedencia o relación de consecuencia.
    reason: alternative_reading
lexical_decisions:
- source_word: λογισάμενος
  english_pob_choice: having considered
  chosen_spanish: habiendo considerado
  alternatives_spanish:
  - habiendo razonado
  - habiendo concluido
  - habiendo calculado
  lexicon: BDAG
  rationale: El participio aoristo medio expresa el proceso mental deliberativo de Abraham. «Habiendo considerado» conserva ese carácter reflexivo y resulta natural en español, sin perder la idea de evaluación interna.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - desde los muertos
  lexicon: BDAG
  rationale: La expresión griega es lenguaje idiomático de resurrección. «De entre los muertos» mantiene el plural y la fuerza relacional del original en español bíblico claro.
- source_word: ἐγείρειν
  english_pob_choice: to raise
  chosen_spanish: levantar
  alternatives_spanish:
  - resucitar
  - despertar
  - levantar de nuevo
  lexicon: BDAG
  rationale: En este contexto la acción es de resurrección. «Levantar» permite conservar el verbo básico y su amplitud, mientras el complemento «de entre los muertos» fija el sentido resurreccional.
- source_word: δυνατὸς ὁ θεός
  english_pob_choice: God is able
  chosen_spanish: Dios es capaz
  alternatives_spanish:
  - Dios puede
  - Dios tiene poder
  lexicon: BDAG
  rationale: La construcción predicativa afirma capacidad. «Es capaz» reproduce bien el matiz de δυνατός sin sobredeterminarlo como simple potencia abstracta.
- source_word: ὅθεν
  english_pob_choice: from where
  chosen_spanish: de donde
  alternatives_spanish:
  - por lo cual
  - desde donde
  - de lo cual
  lexicon: BDAG
  rationale: El adverbio relativo retoma la idea anterior y enlaza con la consecuencia narrativa. «De donde» conserva la relación de procedencia y evita cerrar demasiado el enlace inferencial.
- source_word: ἐν παραβολῇ
  english_pob_choice: in a figure
  chosen_spanish: en figura
  alternatives_spanish:
  - figuradamente
  - como figura
  - en una figura
  lexicon: BDAG
  rationale: La frase indica un modo figurado, no una resurrección literal de Isaac. «En figura» es breve, formal y mantiene la tensión entre el hecho narrativo y su valor representativo.
- source_word: ἐκομίσατο
  english_pob_choice: he also received him back
  chosen_spanish: también lo recibió de vuelta
  alternatives_spanish:
  - también lo recibió
  - también lo recuperó
  - también lo volvió a recibir
  lexicon: BDAG
  rationale: El verbo medio sugiere recibir de nuevo tras haberlo perdido casi hasta la muerte. «Recibió de vuelta» comunica con claridad esa recuperación narrativa sin forzar una reinterpretación literal.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: En la primera ocurrencia, καὶ intensifica la posibilidad de resurrección. «Aun» expresa esa intensificación con naturalidad en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - aun
  - además
  lexicon: BDAG
  rationale: En la segunda ocurrencia, la partícula es aditiva y conecta con la recepción de Isaac. «También» preserva la relación narrativa y sintáctica.
theological_decisions:
- issue: Naturaleza del “recibir de vuelta” de Isaac
  english_pob_reading: Abraham received Isaac back figuratively/as a type, not through an actual resurrection.
  chosen_spanish_reading: Abraham recibió a Isaac de vuelta en figura, no mediante una resurrección literal.
  alternative_spanish_readings:
  - Abraham lo recibió simbólicamente de vuelta
  - Abraham lo recibió de vuelta como figura tipológica
  rationale: La frase griega ἐν παραβολῇ señala que el retorno de Isaac es analógico o figurado. La traducción conserva esa tensión sin resolverla en exceso ni convertirla en una afirmación de resurrección real.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió una expresión locativa más natural para ὅθεν («from where») en lugar de un literalismo ambiguo. En español, «de donde» conserva esa relación sin sonar forzado.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se introdujo «Señor», porque el texto no contiene κύριος.
  - Se evitó «Cristo», «SEÑOR» o formulaciones devocionales ajenas al griego de este versículo.
  - «En figura» se eligió para preservar el valor figurativo sin cerrar la interpretación tipológica.
  - La puntuación separa la cláusula principal de la explicación final para reflejar la estructura del griego.
