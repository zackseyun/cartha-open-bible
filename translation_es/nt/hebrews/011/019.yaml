review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Abraham razonó que Dios podía resucitar, y por eso recibió a Isaac de vuelta en sentido figurado. Sin embargo, dos elecciones requieren ajuste. Primero, «levantar de entre los muertos» suena menos natural en español que «resucitar de entre los muertos» o «levantar de entre los muertos» con nota; dado el proyecto y la claridad española, aquí conviene usar el verbo idiomático principal. Segundo, «de donde» puede sonar espacialmente torpe y algo ambiguo; en español bíblico claro, «de donde» es posible, pero la frase completa mejora con puntuación y formulación más natural.'
  spanish_quality_summary: El texto es comprensible, pero «Dios es capaz» y «lo recibió de vuelta» suenan algo calcados. «Dios podía» y «lo recibió de vuelta»/«lo recobró» son opciones, pero la actual es aceptable. El principal problema de legibilidad es la combinación «de donde también lo recibió de vuelta en figura», que resulta rígida. «De donde también, en figura, lo recibió de vuelta» mejora la lectura sin alterar el sentido.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» está bien. No aparecen términos sensibles como Yahvé/Mesías. La decisión sobre ἐγείρειν merece una excepción contextual: aunque «levantar» es posible, en español eclesial moderno «resucitar» expresa mejor el valor resurreccional ya fijado por «de entre los muertos».'
  issues:
  - severity: medium
    issue: «levantar[a] de entre los muertos» es menos idiomático que «resucitar» en este contexto.
    rationale: Aunque ἐγείρειν literalmente puede ser «levantar», el propio análisis del audit trail reconoce que el contexto es lenguaje de resurrección. En español, «resucitar de entre los muertos» comunica con más claridad y naturalidad la fuerza del original.
  - severity: medium
    issue: La secuencia «de donde[b] también lo recibió de vuelta en figura» suena rígida y algo ambigua.
    rationale: ὅθεν puede mantenerse como «de donde», pero en español esta colocación necesita mejor orden para no sonar forzada. Reubicar «en figura» entre comas preserva la tensión teológica y mejora la fluidez.
  revised_spanish_text: habiendo considerado que Dios podía aun resucitar[a] de entre los muertos, de donde[b] también, en figura, lo recibió de vuelta.
  revised_footnotes:
  - marker: a
    text: O «levantar»; el contexto es lenguaje de resurrección, aunque el verbo griego básico es más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «desde donde»; el adverbio griego retoma la idea anterior y puede oírse como procedencia o relación de consecuencia.
    reason: alternative_reading
  revision_rationale: Se ajusta el verbo principal a la expresión resurreccional idiomática del español («resucitar»), manteniendo en nota la alternativa más literal «levantar». También se mejora la sintaxis de la segunda cláusula para conservar ὅθεν y ἐν παραβολῇ con mejor naturalidad y claridad teológica.
