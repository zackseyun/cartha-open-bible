translation:
  language: es
  text: Porque esperaba la ciudad que tiene fundamentos[a], cuyo arquitecto y constructor[b] es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad que tiene cimientos». El plural puede enfatizar permanencia y estabilidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuyo diseñador y hacedor es Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδέχετο
  english_pob_choice: was waiting for
  chosen_spanish: esperaba
  alternatives_spanish:
  - estaba esperando
  - aguardaba
  - estaba aguardando
  lexicon: BDAG
  rationale: El imperfecto griego expresa una espera continua en el pasado. En español, "esperaba" preserva bien ese valor durativo sin sonar forzado, y conserva el matiz de expectativa paciente.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: La conjunción introduce explicación o razón respecto al contexto inmediato; "Porque" comunica naturalmente ese enlace causal/explanatorio en español.
- source_word: τοὺς θεμελίους ἔχουσαν πόλιν
  english_pob_choice: the city that has foundations
  chosen_spanish: la ciudad que tiene fundamentos
  alternatives_spanish:
  - la ciudad que posee fundamentos
  - la ciudad que tiene cimientos
  - la ciudad que tiene fundamentos permanentes
  lexicon: BDAG
  rationale: Se conserva la imagen de una ciudad con fundamentos en plural. "Fundamentos" reproduce el valor plural y la idea de estabilidad; "cimientos" sería posible, pero "fundamentos" sigue más de cerca la decisión de la POB inglesa.
- source_word: θεμελίους
  english_pob_choice: foundations
  chosen_spanish: fundamentos
  alternatives_spanish:
  - cimientos
  - bases
  lexicon: BDAG
  rationale: El plural es significativo y debe mantenerse. "Fundamentos" es una equivalencia natural en español y preserva el énfasis en permanencia y solidez.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - urbe
  lexicon: BDAG
  rationale: '"Ciudad" es el equivalente normal y claro en español, y mantiene el motivo teológico de la ciudad en Hebreos.'
- source_word: ἧς
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - de la cual
  lexicon: BDAG
  rationale: '"Cuyo" expresa de modo natural la relación posesiva entre la ciudad y los predicados siguientes.'
- source_word: τεχνίτης
  english_pob_choice: architect
  chosen_spanish: arquitecto
  alternatives_spanish:
  - diseñador
  - artífice
  - artesano
  lexicon: BDAG
  rationale: La POB inglesa eligió "architect" para captar el aspecto de diseño y planificación. "Arquitecto" conserva bien ese matiz en español y se coordina con el término siguiente.
- source_word: δημιουργός
  english_pob_choice: builder
  chosen_spanish: constructor
  alternatives_spanish:
  - edificador
  - creador
  - fabricante
  lexicon: BDAG
  rationale: En el contexto de una ciudad, "constructor" transmite la imagen concreta de edificación. Mantiene la relación complementaria con "arquitecto" y evita cargar demasiado hacia "creador".
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Es el sujeto de la cláusula; "Dios" es la traducción estándar y adecuada en español.
theological_decisions:
- issue: Identidad de la ciudad prometida
  english_pob_reading: Render as 'the city that has foundations' without specifying 'heavenly' or 'New Jerusalem' in the main text.
  chosen_spanish_reading: Traducir como "la ciudad que tiene fundamentos" sin añadir "celestial" ni identificarla explícitamente como la Nueva Jerusalén.
  alternative_spanish_readings:
  - la ciudad celestial
  - la ciudad con fundamentos permanentes
  - la Nueva Jerusalén
  rationale: El versículo identifica la ciudad por su estabilidad y por Dios como su arquitecto y constructor, pero no la nombra más específicamente. La traducción debe conservar esa tensión y no resolverla con una identificación más amplia que el texto inmediato no exige.
  doctrine_reference: Preservar la tensión teológica y no importar una identificación escatológica más específica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambas notas al texto principal mediante los marcadores [a] y [b] en la frase correspondiente. No se introdujeron cambios de sentido respecto al audit trail inglés; solo se ajustó la presentación para que cada nota tenga su ancla visible.
  spanish_consistency_notes:
  - Se mantuvo el plural implícito de θεμελίους con "fundamentos".
  - Se conservaron las dos imágenes complementarias de oficio mediante "arquitecto" y "constructor".
  - No se añadió una calificación como "celestial" para respetar el alcance del versículo.
  - El tono es sobrio y publicable en español latinoamericano, sin calco excesivo.
