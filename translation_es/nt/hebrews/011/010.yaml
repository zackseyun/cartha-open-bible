  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: el imperfecto ἐξεδέχετο se preserva naturalmente con «esperaba», la ciudad permanece definida y con plural en θεμελίους, y la pareja «arquitecto y constructor» comunica adecuadamente τεχνίτης καὶ δημιουργός. No añade identificaciones teológicas ajenas al versículo. Sin embargo, las notas al pie están mal alineadas con sus anclajes y contenidos: la nota sobre «designer and maker» está colocada en «fundamentos» en vez de en la frase «arquitecto y constructor», y la nota a sobre una alternativa idéntica al texto principal no ofrece una verdadera alternativa.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. «Porque esperaba la ciudad que tiene fundamentos, cuyo arquitecto y constructor es Dios» es legible y fiel. No obstante, para cumplir con la disciplina editorial, las notas deben corregirse: la nota lexical alternativa sobre «la ciudad teniendo fundamentos» debe formular una alternativa real, y la nota sobre «diseñador y hacedor» debe anclarse a «arquitecto y constructor».'
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto: θεός -> «Dios» está bien; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Fundamentos» preserva el plural como pidió el rastro inglés, aunque «cimientos» también sería posible; «arquitecto y constructor» sigue bien la decisión documentada.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «fundamentos» pero comenta «cuyo diseñador y hacedor es Dios».
    rationale: El marcador debe aparecer en la palabra o frase pertinente; de lo contrario, el lector asocia la nota con el término equivocado.
  - severity: medium
    issue: La nota [a] repite esencialmente el texto principal en lugar de dar la alternativa documentada «la ciudad que tiene/teniendo fundamentos».
    rationale: El inglés conserva una alternativa participial genuina («the city having foundations»). En español conviene reflejarla como alternativa real, p. ej. «la ciudad que tiene cimientos/fundamentos» o mejor «la ciudad provista de fundamentos», sin duplicar mecánicamente el texto base.
  - severity: low
    issue: La puntuación de las notas incluye comillas y prefijo «O:» de forma poco natural.
    rationale: Puede pulirse para una presentación más limpia y consistente con notas léxicas en español eclesial legible.
