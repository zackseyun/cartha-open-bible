translation:
  language: es
  text: Por la fe, Abraham, cuando era probado, ofreció a Isaac, y el que había recibido las promesas ofreció a su hijo único[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijo único» o «hijo único en su clase». El término griego enfatiza la singularidad; «unigénito» es una traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Con fe
  - Mediante la fe
  lexicon: BDAG
  rationale: 'El dativo instrumental expresa medio o esfera: en español, "Por la fe" mantiene la fórmula repetida de Hebreos 11 y suena natural y solemne. "Con fe" sería posible, pero menos idiomático aquí; "mediante la fe" es más explicativo de lo necesario.'
- source_word: προσενήνοχεν
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en sacrificio
  - presentó
  lexicon: BDAG
  rationale: El perfecto de προσφέρω en este resumen narrativo apunta a una acción realizada con fuerza sacrificial. En español, "ofreció" comunica bien la acción sin forzar un tiempo compuesto artificial. "Ofreció en sacrificio" sería más explícito, pero añade una glosa no exigida por el griego.
- source_word: πειραζόμενος
  english_pob_choice: when he was being tested
  chosen_spanish: cuando era probado
  alternatives_spanish:
  - cuando estaba siendo probado
  - siendo probado
  lexicon: BDAG
  rationale: 'El participio pasivo expresa circunstancia temporal: Abraham estaba en situación de prueba. "Probado" preserva la idea de prueba/refinamiento mejor que "tentado", que en español sugiere más bien incitación al pecado. La forma con "cuando" hace explícita la relación circunstancial.'
- source_word: μονογενῆ
  english_pob_choice: only son
  chosen_spanish: hijo único
  alternatives_spanish:
  - hijo único y especial
  - hijo único en su clase
  - hijo unigénito
  lexicon: BDAG
  rationale: μονογενής aquí resalta la singularidad de Isaac como heredero prometido, no una afirmación biológica absoluta sobre los hijos de Abraham. "Hijo único" es la equivalencia española más natural y fiel a esa singularidad. "Hijo unigénito" sería tradicional pero puede sonar doctrinalmente cargado y menos claro en este contexto.
- source_word: προσέφερεν
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - estaba ofreciendo
  - presentó
  lexicon: BDAG
  rationale: El imperfecto aporta trasfondo o acción en curso; en español, repetir "ofreció" mantiene la fuerza narrativa y evita un progresivo que suene pesado. La diferencia aspectual queda suficientemente reflejada por el contexto y por la estructura paralela del versículo.
- source_word: ὁ τὰς ἐπαγγελίας ἀναδεξάμενος
  english_pob_choice: the one who had received the promises
  chosen_spanish: el que había recibido las promesas
  alternatives_spanish:
  - el que había aceptado las promesas
  - el que había acogido las promesas
  lexicon: BDAG
  rationale: 'La perífrasis identifica a Abraham por su relación previa con las promesas divinas. "Había recibido" es la opción más natural y exacta para ἀναδέχομαι en este contexto, y preserva el contraste irónico del versículo: el receptor de las promesas es quien ofrece al heredero.'
- source_word: ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - la promesa
  - las declaraciones prometidas
  lexicon: BDAG
  rationale: El plural debe mantenerse porque el griego habla de un conjunto de promesas. En español, "las promesas" es claro y fiel, sin reducir el alcance a una sola promesa.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - además
  lexicon: BDAG
  rationale: La conjunción simple basta para unir las dos acciones y conservar el ritmo del versículo.
theological_decisions:
- issue: μονογενῆ aplicado a Isaac, que no era hijo biológico único de Abraham
  english_pob_reading: Rendered as 'only son' to express Isaac's unique covenantal status without implying Abraham had no other son at all.
  chosen_spanish_reading: '"Hijo único" comunica la singularidad pactal de Isaac sin sugerir erróneamente que Abraham no tuvo otros hijos.'
  alternative_spanish_readings:
  - hijo unigénito
  - hijo único y especial
  - hijo único en sentido de promesa
  rationale: 'El foco del pasaje es la singularidad de Isaac como heredero de la promesa, no una descripción biológica exhaustiva. La traducción evita cargar el texto con asociaciones cristológicas posteriores que no están en juego aquí, y conserva la tensión teológica del relato: Abraham ofrece precisamente al hijo en quien descansaban las promesas.'
  doctrine_reference: Génesis 21:12; Hebreos 11:17; notas terminológicas de μονογενής en la tradición de traducción del POB
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés: mantiene la acción principal en pasado simple, conserva el valor sacrificial de προσφέρω con "ofreció", y evita expandir innecesariamente μονογενῆ. La decisión española sigue ese mismo ajuste de sobriedad y claridad, sin introducir un progresivo artificial ni una fórmula tradicional que oscurezca la singularidad de Isaac.'
  spanish_consistency_notes:
  - Se mantiene "Por la fe" como fórmula recurrente de Hebreos 11 para consistencia intratextual.
  - '"Probado" se usa con valor de prueba/refinamiento, no de tentación moral.'
  - '"Las promesas" conserva el plural del griego.'
  - '"Hijo único" queda anclado con nota para preservar la alternativa lexical sin perder legibilidad en el texto principal.'
