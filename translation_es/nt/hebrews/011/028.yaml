translation:
  language: es
  text: Por la fe celebró la Pascua y la aspersión de la sangre[a], para que el destructor no tocara a los primogénitos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la aplicación de la sangre'. El término griego señala el acto ritual de colocar la sangre; 'aspersión' es una equivalencia cultual tradicional, mientras que 'aplicación' puede reflejar con más precisión el contexto de la Pascua.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por confianza
  - Mediante la fe
  lexicon: BDAG
  rationale: El dativo instrumental se conserva con una preposición natural en español. 'Por la fe' mantiene la fórmula recurrente de Hebreos 11 y la fuerza de medio/instrumento sin volverlo mecánico.
- source_word: πεποίηκεν
  english_pob_choice: he has kept
  chosen_spanish: celebró
  alternatives_spanish:
  - guardó
  - observó
  - ha celebrado
  lexicon: BDAG
  rationale: En el contexto de Pascua, el verbo griego apunta a la realización/observancia del rito. 'Celebró' comunica bien en español la ejecución de la Pascua como acto ritual, sin imponer un matiz de 'instituyó'. Se evita 'guardó' porque suena menos natural con una fiesta concreta en este contexto.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  - la Pascua de liberación
  lexicon: BDAG
  rationale: El sustantivo designa la fiesta/acto pascual. 'La Pascua' es la forma natural y fiel en español, suficientemente amplia para el evento litúrgico completo.
- source_word: τὴν πρόσχυσιν τοῦ αἵματος
  english_pob_choice: the sprinkling of the blood
  chosen_spanish: la aspersión de la sangre
  alternatives_spanish:
  - la aplicación de la sangre
  - el rociamiento de la sangre
  - el derramamiento de la sangre
  lexicon: BDAG
  rationale: El término griego refiere al acto ritual de aplicar la sangre; 'aspersión' es una equivalencia cultual tradicional y precisa en español bíblico. Se evita 'derramamiento' porque no expresa el rito en la puerta, y se preserva la alternativa semántica mediante nota.
- source_word: ὁ ὀλοθρεύων
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el que destruye
  - el exterminador
  lexicon: BDAG
  rationale: El participio sustantivado se rinde con un sustantivo en español. 'Destructor' es directo y conserva la referencia sin identificarlo interpretativamente como ángel.
- source_word: τὰ πρωτότοκα
  english_pob_choice: the firstborn
  chosen_spanish: a sus primogénitos
  alternatives_spanish:
  - a los primogénitos
  - a los primeros nacidos
  lexicon: BDAG
  rationale: El neutro plural sustantivado se traduce de forma natural como el grupo de 'primogénitos'. El posesivo 'sus' enlaza con el referente contextual de Israel/sus casas, implícito en el pronombre griego, sin añadir un sujeto explícito ajeno al texto.
- source_word: θίγῃ
  english_pob_choice: might not touch
  chosen_spanish: tocara
  alternatives_spanish:
  - tocase
  - hiriera
  - dañara
  lexicon: BDAG
  rationale: El verbo significa literalmente 'tocar'; en contexto el contacto implica daño, pero el griego conserva la formulación simple. 'Tocara' mantiene esa literalidad y la dependencia del propósito negativo.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: a sus
  alternatives_spanish:
  - a ellos
  - a su gente
  lexicon: BDAG
  rationale: El pronombre retoma al pueblo asociado con Moisés en el contexto narrativo. En español, 'a sus primogénitos' integra el referente sin forzar un duplicado explicativo.
theological_decisions:
- issue: Identificación del sujeto implícito
  english_pob_reading: Moses is the implied subject, continuing the pattern of Hebrews 11.
  chosen_spanish_reading: El sujeto implícito sigue siendo Moisés en el contexto inmediato.
  alternative_spanish_readings:
  - se celebró la Pascua
  - él celebró la Pascua
  rationale: La sección de Hebreos 11:23–29 trata de Moisés. Mantener el sujeto implícito respeta el griego y evita introducir el nombre innecesariamente, aunque el contexto lo hace claro.
  doctrine_reference: Contexto narrativo de Hebreos 11:23–29
- issue: Valor de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene el valor doctrinal y léxico estándar de πίστις como 'fe', coherente con Hebreos 11 y con la equivalencia adoptada en el proyecto.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe'
- issue: Término ritual para πρόσχυσις
  english_pob_reading: sprinkling of the blood
  chosen_spanish_reading: aspersión de la sangre
  alternative_spanish_readings:
  - aplicación de la sangre
  - rociamiento de la sangre
  rationale: El texto alude a un gesto ritual sobre las casas en Éxodo 12. 'Aspersión' conserva la lectura cultual sin desplazar el acto a un mero derramamiento o a una interpretación demasiado explícita.
  doctrine_reference: Éxodo 12; Hebreos 11:28
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes al texto griego o al audit trail inglés; el borrador sigue la lectura estable de la versión inglesa POB y conserva la única alternativa lexical documentada para πρόσχυσις en nota.
  spanish_consistency_notes:
  - Se mantuvo 'fe' para πίστις, conforme al criterio doctrinal del proyecto.
  - '''Pascua'' se usa como nombre litúrgico natural y no se amplía a ''fiesta de la Pascua'' porque el griego no lo exige.'
  - '''El destructor'' evita añadir la identificación interpretativa de ''ángel exterminador''.'
  - 'Se conservó la relación posesiva implícita del pronombre final con una solución española natural: ''a sus primogénitos''.'
