review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y conserva adecuadamente ''Por la fe'', ''la Pascua'', ''la aspersión de la sangre'' con nota alternativa, ''el destructor'' y ''tocara''. Sin embargo, altera de manera significativa αὐτῶν / ''them'' al convertirlo en posesivo: ''sus primogénitos''. El griego dice que el destructor no tocara ''a ellos'', mientras ''los primogénitos'' funciona como objeto directo de ''touch''; el español propuesto hace que ''primogénitos'' sea posesión de ''ellos'' y desplaza el referente.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. ''Celebró la Pascua'' suena natural, aunque el perfecto griego con matiz de observancia podría representarse mejor con ''celebró/observó''. La principal mejora necesaria es sintáctica: evitar ''a sus primogénitos'', que en español introduce una relación posesiva ausente del texto y puede confundir quiénes son ''ellos''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Fe', 'Pascua', 'sangre' y 'destructor' están alineados. La nota léxica sobre πρόσχυσις está bien preservada. La revisión propuesta mantiene el perfil cultual tradicional sin añadir interpretación.
  issues:
  - severity: high
    issue: αὐτῶν se tradujo como posesivo en 'a sus primogénitos'
    rationale: En el griego, αὐτῶν corresponde a 'them' y retoma al grupo protegido; τὰ πρωτότοκα es el complemento de 'touch'. La redacción española cambia la sintaxis y el sentido, como si el destructor no tocara 'a los primogénitos de ellos' en vez de no tocar 'a ellos, es decir, a los primogénitos'.
  - severity: medium
    issue: '''celebró'' atenúa el matiz de observancia/resultado de πεποίηκεν'
    rationale: No es una infidelidad grave, pero 'ha celebrado' u 'observó' reflejarían mejor el perfecto y la idea de guardar/observar la Pascua. Aun así, 'celebró' puede mantenerse si se corrige el problema mayor.
  revised_spanish_text: Por la fe celebró la Pascua y la aspersión de la sangre[a], para que el destructor no tocara a los primogénitos de ellos.
  revised_footnotes:
  - marker: a
    text: O 'la aplicación de la sangre'. El término griego señala el acto ritual de colocar la sangre; 'aspersión' es una equivalencia cultual tradicional, mientras que 'aplicación' puede reflejar con más precisión el contexto de la Pascua.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la relación entre τὰ πρωτότοκα y αὐτῶν para conservar la sintaxis y el sentido del griego: el destructor no debía tocar ''a los primogénitos de ellos'', no ''a sus primogénitos'' desde la voz del narrador. Se mantiene el resto de las decisiones, incluida la nota sobre ''aspersión/aplicación'', porque son fieles y naturales en español.'
