  - severity: low
    issue: La coma tras la raya incidental es innecesaria
    rationale: En español, '—de quienes el mundo no era digno— vagando...' fluye mejor sin la coma adicional y evita una puntuación recargada.
  revised_spanish_text: —de quienes el mundo no era digno— vagando en desiertos[a] y montes, y en cuevas y agujeros en la tierra[b].
