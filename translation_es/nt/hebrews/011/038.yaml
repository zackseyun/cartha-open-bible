translation:
  language: es
  text: —de quienes el mundo no era digno— vagando en desiertos[a] y montes, y en cuevas y agujeros en la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en lugares desolados".'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "agujeros de la tierra".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν
  english_pob_choice: of whom
  chosen_spanish: de quienes
  alternatives_spanish:
  - de los cuales
  lexicon: BDAG
  rationale: El genitivo relativo plural exige una construcción dependiente en español; "de quienes" conserva la referencia a los creyentes sufrientes del contexto anterior sin volverla pesada.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - valioso
  lexicon: BDAG
  rationale: '"Digno" reproduce bien la evaluación moral del texto; evita suavizar la afirmación fuerte de que el mundo no estaba a la altura de ellos.'
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la sociedad
  - el orden del mundo
  lexicon: BDAG
  rationale: En este contexto, κόσμος apunta al mundo humano en contraste con los fieles perseguidos; "el mundo" es la forma natural y mantiene la amplitud del juicio.
- source_word: ἐπὶ ἐρημίαις
  english_pob_choice: in deserts
  chosen_spanish: en desiertos
  alternatives_spanish:
  - en lugares desolados
  - por desiertos
  lexicon: BDAG
  rationale: La preposición con dativo es locativa aquí; "en desiertos" es directo, concreto y fiel al matiz de lugares áridos o desolados.
- source_word: πλανώμενοι
  english_pob_choice: wandering
  chosen_spanish: vagando
  alternatives_spanish:
  - andando errantes
  - errando
  lexicon: BDAG
  rationale: El participio describe movimiento sin hogar fijo ni seguridad; "vagando" conserva ese carácter de desplazamiento forzado y continuo.
- source_word: ὄρεσι
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - cerros
  lexicon: BDAG
  rationale: '"Montes" es una opción bíblica natural en español y encaja con el tono sobrio de la enumeración geográfica.'
- source_word: σπηλαίοις
  english_pob_choice: caves
  chosen_spanish: cuevas
  alternatives_spanish:
  - grutas
  lexicon: BDAG
  rationale: '"Cuevas" es el equivalente claro y común para σπηλαίοις; conserva el orden de los refugios descritos.'
- source_word: ὀπαῖς τῆς γῆς
  english_pob_choice: holes in the ground
  chosen_spanish: agujeros de la tierra
  alternatives_spanish:
  - hendiduras de la tierra
  - huecos en la tierra
  lexicon: BDAG
  rationale: La imagen es concreta y física; "agujeros de la tierra" sigue de cerca el sentido literal sin volverlo torpe, y deja visible la dureza del refugio.
theological_decisions:
- issue: Fuerza evaluativa de "the world was not worthy"
  english_pob_reading: The clause is retained as a moral indictment of the world/society in contrast to the worth of the faithful sufferers.
  chosen_spanish_reading: La cláusula se mantiene como una valoración moral negativa del mundo frente a la dignidad de los fieles.
  alternative_spanish_readings:
  - el mundo no los merecía
  - el mundo no estaba a su altura
  rationale: '"No era digno" conserva la tensión teológica del texto sin convertirla en una mera observación sociológica. Mantiene el juicio del autor sobre la incompatibilidad moral entre el mundo y estos creyentes.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión española se ajusta al texto griego y al audit trail inglés, manteniendo el juicio evaluativo fuerte y la enumeración de lugares de refugio sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se prefirió "de quienes" para el genitivo relativo plural, en continuidad con el referente del contexto inmediato.
  - '"Digno" fue elegido para ἄξιος por su naturalidad y por conservar el valor evaluativo del pasaje.'
  - Se optó por "agujeros de la tierra" como equivalente más directo de ὀπαῖς τῆς γῆς, evitando suavizar la imagen concreta.
  - No se introdujeron notas al pie porque la redacción final no requiere marcadores alternativos para quedar publicada de forma clara.
