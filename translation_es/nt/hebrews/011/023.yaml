translation:
  language: es
  text: Por la fe, Moisés, cuando nació, fue escondido por tres meses por sus padres, porque vieron que el niño era hermoso[a], y no temieron el decreto del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fino» o «excepcional» para «hermoso» (griego ἀστεῖον), en eco de Éxodo 2:2 y Hechos 7:20.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por medio de la fe
  - Con fe
  lexicon: BDAG
  rationale: El dativo introduce el motivo o medio recurrente en Hebreos 11. «Por la fe» conserva el valor instrumental sin sonar rígido en español y mantiene el paralelismo de la serie.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: BDAG
  rationale: Nombre propio tradicional en español; corresponde al transliterado estándar del personaje bíblico.
- source_word: γεννηθεὶς
  english_pob_choice: when he was born
  chosen_spanish: cuando nació
  alternatives_spanish:
  - habiendo nacido
  - después de nacer
  lexicon: BDAG
  rationale: El participio aoristo pasivo se vierte temporalmente de modo natural. «Cuando nació» expresa la relación temporal con el verbo principal sin volver la frase pesada.
- source_word: ἐκρύβη
  english_pob_choice: was hidden
  chosen_spanish: fue ocultado
  alternatives_spanish:
  - fue escondido
  - fue escondido/ocultado
  lexicon: BDAG
  rationale: El pasivo aoristo indica que alguien lo ocultó. «Fue ocultado» mantiene el pasivo y suena más formal que «fue escondido», aunque ambas opciones son válidas.
- source_word: τρίμηνον
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  lexicon: BDAG
  rationale: Acusativo de duración; en español actual «durante» comunica mejor la extensión temporal de la acción.
- source_word: ὑπὸ τῶν πατέρων αὐτοῦ
  english_pob_choice: by his parents
  chosen_spanish: por sus padres
  alternatives_spanish:
  - por su padre y su madre
  - por sus progenitores
  lexicon: BDAG
  rationale: Aunque πατέρων es literalmente «padres/fathers», en el contexto idiomático alude a sus padres en conjunto. «Por sus padres» es la opción más clara y fiel al sentido contextual, sin perder el matiz colectivo.
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la causa de la acción. «Porque» es el equivalente más directo y natural.
- source_word: εἶδον
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - percibieron
  - advirtieron
  lexicon: BDAG
  rationale: El aoristo simple expresa una observación concreta. «Vieron» conserva la concreción del verbo griego.
- source_word: ἀστεῖον
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - bonito
  - excepcional
  - apropiado
  lexicon: BDAG
  rationale: El adjetivo puede significar bello, fino o excepcional. «Hermoso» comunica bien la valoración positiva y deja abierta la gama semántica sin reducirla a una sola idea.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el niño pequeño
  - el bebé
  lexicon: BDAG
  rationale: En este contexto, «niño» es natural en español y encaja con el trasfondo de Éxodo 2:2 y Hechos 7:20. «Bebé» sería más interpretativo.
- source_word: οὐκ ἐφοβήθησαν
  english_pob_choice: they were not afraid
  chosen_spanish: no temieron
  alternatives_spanish:
  - no tuvieron miedo
  - no tuvieron temor
  lexicon: BDAG
  rationale: La negación del verbo de temor puede expresarse en español con «no temieron», que conserva la fuerza verbal breve y el contraste con la fe.
- source_word: τὸ διάταγμα τοῦ βασιλέως
  english_pob_choice: the king’s edict
  chosen_spanish: el decreto del rey
  alternatives_spanish:
  - el edicto del rey
  - la orden del rey
  lexicon: BDAG
  rationale: διάταγμα designa una orden oficial o decreto. «Decreto» es claro, solemne y suficientemente cercano; evita un término más técnico como «edicto» si la frase se quiere leer con naturalidad.
theological_decisions:
- issue: Motivación de los padres al ocultar a Moisés
  english_pob_reading: The verse presents their action as an act of faith expressed in refusing fear of the king's edict, while also noting their perception that the child was beautiful.
  chosen_spanish_reading: El versículo presenta su acción como un acto de fe expresado en no temer el decreto del rey, y al mismo tiempo añade que vieron que el niño era hermoso.
  alternative_spanish_readings:
  - Solo la hermosura del niño motivó la acción
  - La frase sugiere una señal divina especial en la apariencia del niño
  rationale: 'La sintaxis atribuye la acción al marco de «por la fe» y añade dos elementos: la percepción de que el niño era ἀστεῖον y la ausencia de temor ante el decreto real. La traducción conserva ambas cosas sin convertir la hermosura en un milagro implícito ni borrar la tensión entre observación humana y fe.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla más allá de lo que el griego afirma.
translation_notes:
  revision_awareness: El texto griego, la morfología y el audit trail en inglés muestran acuerdo alto y no requieren cambios sustantivos. La versión española mantiene la lectura optimal-equivalence del POB inglés, con ajuste natural de idiomática española en el temporal y en el pasivo.
  spanish_consistency_notes:
  - Se mantiene «Por la fe» como fórmula recurrente para Πίστει en Hebreos 11.
  - Se usa «Moisés» como nombre propio estándar, sin transliteración artificial.
  - «Fue ocultado» conserva la pasiva del griego y el agente humano implícito.
  - «Por sus padres» refleja el plural griego πατέρων en sentido colectivo, conforme al contexto narrativo de Éxodo.
  - «No temieron» reproduce el contraste entre fe y temor, igual que el inglés POB.
  - La nota textual/lexical de ἀστεῖον queda anclada en el texto para preservar la alternativa semántica documentada.
