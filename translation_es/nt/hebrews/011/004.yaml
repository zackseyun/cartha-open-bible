review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y mantiene la mayoría de las decisiones del POB inglés: «Por la fe», «un sacrificio mejor que el de Caín», «dando Dios testimonio acerca de sus dones» y «todavía habla». Sin embargo, falla en dos puntos de alineación con el griego y con la auditoría inglesa. Primero, δι’ ἧς es femenino singular y apunta de forma natural a θυσίαν; el borrador lo traduce «por medio de él», cambiando el género y creando una ambigüedad artificial no presente en esta cláusula. Segundo, «fue testificado como justo» es un calco poco natural en español; aunque intenta preservar el motivo de testimonio, no comunica con claridad el pasivo de μαρτυρέω. La cláusula final δι’ αὐτῆς sí admite ambigüedad entre fe y sacrificio, y conviene preservarla con una nota.'
  spanish_quality_summary: 'El español es generalmente claro, pero «por medio de él» tras un antecedente femenino suena incorrecto, y «fue testificado como justo» es duro e impropio del español culto natural. Una revisión mínima puede mejorar fidelidad y legibilidad: «por medio de la cual» para la primera referencia, «se dio testimonio de que era justo» para ἐμαρτυρήθη εἶναι δίκαιος, y mantener la ambigüedad final con «por medio de ella» apoyada por nota explicativa.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: θεῷ = «Dios», δίκαιος = «justo», πίστις = «fe». Se conserva adecuadamente el campo semántico de μαρτυρέω con «testimonio». No hay términos de las listas sensibles (Yahvé, Mesías, esclavo, etc.) en este versículo.'
  issues:
  - severity: high
    issue: δι’ ἧς fue traducido «por medio de él»
    rationale: El relativo griego es femenino singular y remite naturalmente a θυσίαν («sacrificio»). Cambiar a masculino rompe la concordancia y altera la referencia textual.
  - severity: high
    issue: «fue testificado como justo» es español deficiente
    rationale: Aunque intenta conservar el motivo de testimonio, el giro es un calco poco idiomático y oscurece el sentido. «Se dio testimonio de que era justo» conserva el campo léxico y suena natural.
  - severity: medium
    issue: La ambigüedad de δι’ αὐτῆς en la cláusula final no está bien manejada
    rationale: El borrador usa otra vez «por medio de él», pero el pronombre griego es femenino. En español puede usarse «por medio de ella» y añadir nota para indicar que podría referirse a la fe o al sacrificio.
  revised_spanish_text: Por la fe, Abel ofreció a Dios un sacrificio mejor que el de Caín[a]; por medio de la cual se dio testimonio de que era justo, dando Dios testimonio acerca de sus dones; y por medio de ella[b], aunque murió, todavía habla.
  revised_footnotes:
