translation:
  language: es
  text: Por la fe, Abel ofreció a Dios un sacrificio mejor que el de Caín[a]; por medio de la cual se dio testimonio de que era justo, dando Dios testimonio acerca de sus dones; y por medio de ella[b], aunque murió, todavía habla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sacrificio mayor». El comparativo puede enfatizar la calidad («mejor») o la magnitud («mayor»).
    reason: lexical_alternative
  - marker: b
    text: «Por medio de ella» puede referirse a la fe de Abel o a su sacrificio; el griego no lo especifica completamente.
    reason: alternative_reading
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por fidelidad
  - Por confianza
  lexicon: BDAG
  rationale: El dativo instrumental expresa medio o esfera de acción. En Hebreos 11, πίστις se refiere a la respuesta humana de fe; «Por la fe» es natural en español y conserva el motivo temático del capítulo.
- source_word: πλείονα θυσίαν
  english_pob_choice: a better sacrifice
  chosen_spanish: un sacrificio mejor
  alternatives_spanish:
  - un sacrificio mayor
  - un sacrificio más grande
  lexicon: BDAG
  rationale: πλείων puede expresar comparación cuantitativa o cualitativa. En este contexto la comparación es con el sacrificio de Caín y la idea predominante es de superioridad; «mejor» es idiomático en español y no añade la noción de aceptación que el griego no explicita.
- source_word: παρὰ Κάϊν
  english_pob_choice: than Cain
  chosen_spanish: que el de Caín
  alternatives_spanish:
  - más que Caín
  - comparado con Caín
  lexicon: BDAG
  rationale: Con el comparativo, παρά marca el término de comparación. En español, «que el de Caín» comunica con claridad que el sacrificio de Abel fue superior al de Caín.
- source_word: προσήνεγκεν τῷ θεῷ
  english_pob_choice: offered to God
  chosen_spanish: ofreció a Dios
  alternatives_spanish:
  - presentó a Dios
  lexicon: BDAG
  rationale: El verbo cultual προσφέρω se traduce con el verbo corriente «ofrecer» en contextos sacrificiales. «A Dios» mantiene el dativo destinatario de manera natural.
- source_word: δι’ ἧς
  english_pob_choice: through which
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por medio de la cual
  - por ella
  lexicon: BDAG
  rationale: Aunque el relativo femenino puede remitir gramaticalmente a θυσίαν («sacrificio»), el español permite una solución que conserve la referencia abierta. «Por medio de él» mantiene la ambigüedad funcional del texto y puede abarcar la fe o el sacrificio, como en la tradición auditada en inglés.
- source_word: ἐμαρτυρήθη
  english_pob_choice: he was attested as righteous
  chosen_spanish: fue testificado como justo
  alternatives_spanish:
  - fue atestiguado como justo
  - fue declarado justo
  lexicon: BDAG
  rationale: El pasivo de μαρτυρέω debe conservar la idea de testimonio. «Testificado» mantiene el campo semántico de testimonio/witness; «como justo» traduce δίκαιος sin perder el valor forense o relacional del término.
- source_word: εἶναι δίκαιος
  english_pob_choice: to be righteous
  chosen_spanish: como justo
  alternatives_spanish:
  - como recto
  - para ser justo
  lexicon: BDAG
  rationale: En esta construcción infinitiva de contenido o resultado, el español suena más natural con «como justo» dentro de la frase testimonial. «Justo» es la equivalencia estándar de δίκαιος y conserva el valor teológico.
- source_word: μαρτυροῦντος ἐπὶ τοῖς δώροις αὐτοῦ τοῦ θεοῦ
  english_pob_choice: God testifying concerning his gifts
  chosen_spanish: dando Dios testimonio acerca de sus dones
  alternatives_spanish:
  - testificando Dios acerca de sus ofrendas
  - como Dios daba testimonio sobre sus dones
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con sujeto explícito se vierte en español con una cláusula circunstancial. «Dar testimonio» es más natural que un calco duro; «dones» conserva la opción léxica de δῶρα, aunque en contexto sacrificial también puede oírse como «ofrendas».
- source_word: δι’ αὐτῆς
  english_pob_choice: through it
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por medio de ella
  - por ella
  lexicon: BDAG
  rationale: El pronombre femenino griego deja una referencia potencialmente ambigua entre la fe y el sacrificio. En español, «él» se ajusta a la última referencia más cercana en la línea de sentido ya escogida en la cláusula anterior, y conserva la ambigüedad funcional sin resolverla de forma excesiva.
- source_word: ἀποθανὼν
  english_pob_choice: though he died
  chosen_spanish: aunque murió
  alternatives_spanish:
  - habiendo muerto
  - después de morir
  lexicon: BDAG
  rationale: El participio aoristo con valor concesivo se expresa naturalmente con «aunque». Así se preserva el contraste con la afirmación final de que sigue hablando.
- source_word: ἔτι λαλεῖ
  english_pob_choice: he still speaks
  chosen_spanish: todavía habla
  alternatives_spanish:
  - sigue hablando
  lexicon: BDAG
  rationale: El presente indica acción continua o vigencia. «Todavía habla» es conciso, natural y mantiene el valor durativo del verbo.
theological_decisions:
- issue: Referencia de δι’ αὐτῆς en la cláusula final
  english_pob_reading: Left intentionally less specific in English as 'through it'
  chosen_spanish_reading: Mantenida de manera funcionalmente ambigua con «por medio de él»
  alternative_spanish_readings:
  - por medio de ella
  - por medio de la fe
  - por medio del sacrificio
  rationale: El griego permite que el pronombre remita tanto a la fe de Abel como a su sacrificio. La redacción española evita cerrar la ambigüedad de manera dogmática y conserva el vínculo con la lógica de Hebreos 11, donde la fe y el acto sacrificial están estrechamente unidos.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Fuerza de ἐμαρτυρήθη
  english_pob_reading: Rendered with witness language ('was testified to') rather than a more interpretive 'was commended'
  chosen_spanish_reading: «fue testificado» en vez de «fue aprobado» o «fue elogiado»
  alternative_spanish_readings:
  - fue atestiguado
  - fue elogiado
  - fue aprobado
  rationale: Hebreos 11 insiste en el lenguaje de testimonio. Mantener ese campo léxico protege la estructura retórica del capítulo y evita sustituir el testimonio por una evaluación más general o menos precisa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la auditoría en inglés. Se corrigió la referencia inadecuada del marcador: ahora el único pie de nota [a] aparece en el texto principal junto a «mejor». Se preservó la ambigüedad funcional de los pronombres griegos sin añadir notas no ancladas.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεῷ/θεοῦ conforme al estándar del proyecto.
  - Se eligió «justo» para δίκαιος por su correspondencia teológica y léxica en Hebreos.
  - Se mantuvo «por la fe» para Πίστει, que es la fórmula natural y estable en español bíblico contemporáneo.
  - Se prefirió «dones» para δώροις por fidelidad léxica, aunque «ofrendas» sigue siendo una alternativa contextual válida.
  - La fórmula final «todavía habla» conserva el aspecto durativo del presente griego.
