translation:
  language: es
  text: Por la fe, Isaac bendijo a Jacob y a Esaú con respecto al futuro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - En fe
  - Mediante la fe
  lexicon: BDAG
  rationale: El dativo de medio o manera en la fórmula recurrente de Hebreos 11 se expresa de forma natural en español con 'Por la fe'. Conserva el valor instrumental sin sonar forzado; 'En fe' es menos idiomático y 'Mediante la fe' resulta más explicativo de lo necesario.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - declaró una bendición sobre
  lexicon: BDAG
  rationale: El verbo εὐλογέω aquí significa impartir bendición. 'Bendijo' es la forma más directa y fiel en español; las alternativas expanden innecesariamente el verbo base.
- source_word: περὶ μελλόντων
  english_pob_choice: concerning things to come
  chosen_spanish: acerca de lo por venir
  alternatives_spanish:
  - sobre cosas futuras
  - acerca de eventos futuros
  lexicon: BDAG
  rationale: La preposición περί con genitivo expresa 'acerca de' o 'con respecto a', y el participio presente sustantivado μελλόντων apunta a lo futuro o por venir. 'Lo por venir' preserva la amplitud abierta de la expresión mejor que concretarla como 'eventos futuros'.
- source_word: Ἰσαὰκ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: transliteration
  rationale: Nombre propio bíblico estándar en español.
- source_word: Ἰακὼβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: transliteration
  rationale: Nombre propio bíblico estándar en español.
- source_word: Ἠσαῦ
  english_pob_choice: Esau
  chosen_spanish: Esaú
  lexicon: transliteration
  rationale: Nombre propio bíblico estándar en español, con acentuación normativa.
theological_decisions:
- issue: Sentido de πίστις en la fórmula de Hebreos 11
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: El contexto de Hebreos 11 presenta una serie de ejemplos de fe orientados a las promesas de Dios. 'La fe' mantiene la lectura doctrinal y literaria del capítulo; 'fidelidad' o 'confianza' son posibles en abstracto, pero no son la mejor opción en esta construcción.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternativas preservadas donde haya tensión real)'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión posterior del POB en inglés que eliminó 'even' por naturalidad estilística; por eso no se introduce ningún equivalente enfático en español. La frase resultante conserva el valor de καὶ περὶ μελλόντων sin sobretraducirlo.
  spanish_consistency_notes:
  - 'Se mantiene el orden de nombres del griego: Isaac, Jacob y Esaú.'
  - '''Por la fe'' sigue la fórmula estable de Hebreos 11 en español y evita un calco rígido.'
  - '''Lo por venir'' conserva la apertura semántica de μελλόντων sin restringirla a ''eventos''.'
