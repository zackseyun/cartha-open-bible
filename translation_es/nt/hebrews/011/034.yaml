revisions:
- from: apagaron el poder del fuego[a], escaparon de los fauces de la espada, fueron fortalecidos desde la debilidad, se hicieron fuertes en la guerra, pusieron en fuga campamentos[b] extranjeros.
  to: apagaron el poder del fuego, escaparon del filo[a] de la espada, fueron fortalecidos de la debilidad, llegaron a ser poderosos en batalla, pusieron en fuga ejércitos[b] extranjeros.
  rationale: 'La revisión corrige los dos problemas principales de fidelidad y legibilidad: mueve el idiomatismo de στόματα μαχαίρης a una nota y usa en el texto principal la equivalencia natural «filo de la espada», y restituye «ejércitos extranjeros» como traducción principal de παρεμβολὰς ἀλλοτρίων en contexto militar, dejando «campamentos» como alternativa documentada. También se corrige el anclaje de la nota [a] y se ajusta ligeramente el estilo para un español más natural y alineado con el POB inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del versículo sigue bien la cadena de acciones del griego: ἔσβεσαν = «apagaron», δύναμιν πυρός = «el poder del fuego», ἐδυναμώθησαν = «fueron fortalecidos», y la imaginería bélica concreta se conserva. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con el rastro de auditoría POB: (1) στόματα μαχαίρης no debe traducirse en el texto principal como «las fauces de la espada», porque el propio POB inglés decidió llevar el idiomatismo al sentido natural «the edge of the sword» y relegar lo literal a nota; en español lo fiel y natural es «el filo de la espada». (2) παρεμβολὰς ἔκλιναν ἀλλοτρίων en contexto militar se refiere a fuerzas militares enemigas, no principalmente a «campamentos»; el POB inglés eligió «armies» con nota alternativa «encampments». El borrador invierte indebidamente principal y alternativa.'
  spanish_quality_summary: El borrador es generalmente legible, pero «escaparon de los fauces de la espada» suena forzado y poco natural en español bíblico moderno, y «pusieron en fuga campamentos extranjeros» resulta semánticamente extraño, porque normalmente se pone en fuga a personas o tropas, no a campamentos. «Desde la debilidad» es comprensible, pero «de la debilidad» o «de su debilidad» fluye mejor para expresar origen/salida. También «en batalla» suena más inmediato y natural aquí que «en la guerra», en línea con el contexto enumerativo.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal global del proyecto. Las decisiones relevantes aquí son léxicas y estilísticas: conviene alinear el texto principal con el POB auditado usando «el filo de la espada» y «ejércitos extranjeros», dejando «campamentos/encampments» en nota. Se mantiene correctamente la imaginería histórica y militar sin espiritualizarla.'
  issues:
  - severity: high
    issue: El texto principal usa «las fauces de la espada» para στόματα μαχαίρης.
    rationale: El griego usa un idiomatismo semítico/literario equivalente a «el filo de la espada». El POB inglés ya documentó que la literalidad debe ir en nota, no en el texto principal. «Fauces» introduce una metáfora no idiomática en español y disminuye claridad y fidelidad funcional.
  - severity: high
    issue: El texto principal usa «campamentos extranjeros» para παρεμβολὰς, y la nota ofrece «ejércitos» como alternativa.
    rationale: En este contexto militar, y según la auditoría inglesa, el referente pretendido es las fuerzas militares enemigas; por eso el inglés eligió «armies» y dejó «encampments» como alternativa. En español, «poner en fuga campamentos» no es natural ni refleja bien ἔκλιναν en este contexto.
  - severity: medium
    issue: La nota [a] está anclada en «fuego» pero explica una expresión de «espada».
    rationale: La nota sobre «las bocas de la espada» debe ir donde aparece la cláusula de la espada, no sobre «fuego». Tal como está, el anclaje textual no corresponde al contenido de la nota.
  - severity: low
    issue: «Desde la debilidad» y «en la guerra» son aceptables, pero menos idiomáticos que alternativas más directas.
    rationale: Para ἀπὸ ἀσθενείας, «de la debilidad» comunica bien la idea de origen/salida. Para ἐν πολέμῳ, «en batalla» encaja mejor con la serie de acciones heroicas y con la decisión inglesa auditada.
  revised_spanish_text: apagaron el poder del fuego, escaparon del filo[a] de la espada, fueron fortalecidos de la debilidad, llegaron a ser poderosos en batalla, pusieron en fuga ejércitos[b] extranjeros.
  revised_footnotes:
  - marker: a
    text: Literalmente, «las bocas de la espada», un idiomatismo que significa «el filo de la espada».
    reason: lexical_alternative
  - marker: b
    text: O «campamentos» o «campamentos militares»; el término se refiere aquí a fuerzas militares, de ahí «ejércitos».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige los dos problemas principales de fidelidad y legibilidad: mueve el idiomatismo de στόματα μαχαίρης a una nota y usa en el texto principal la equivalencia natural «filo de la espada», y restituye «ejércitos extranjeros» como traducción principal de παρεμβολὰς ἀλλοτρίων en contexto militar, dejando «campamentos» como alternativa documentada. También se corrige el anclaje de la nota [a] y se ajusta ligeramente el estilo para un español más natural y alineado con el POB inglés.'
