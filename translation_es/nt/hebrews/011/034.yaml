translation:
  language: es
  text: apagaron el poder del fuego, escaparon del filo[a] de la espada, fueron fortalecidos de la debilidad, llegaron a ser poderosos en batalla, pusieron en fuga ejércitos[b] extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «las bocas de la espada», un idiomatismo que significa «el filo de la espada».
    reason: lexical_alternative
  - marker: b
    text: O «campamentos» o «campamentos militares»; el término se refiere aquí a fuerzas militares, de ahí «ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσβεσαν
  english_pob_choice: quenched
  chosen_spanish: apagaron
  alternatives_spanish:
  - extinguieron
  lexicon: BDAG
  rationale: El verbo griego σβέννυμι expresa apagar/extinguir. «Apagaron» conserva la imagen concreta y funciona con naturalidad en español sin perder la fuerza del acto.
- source_word: δύναμιν πυρός
  english_pob_choice: the power of fire
  chosen_spanish: el poder del fuego
  alternatives_spanish:
  - la fuerza del fuego
  - el fuego
  lexicon: BDAG
  rationale: La construcción genitiva no reduce el sentido a «fuego» a secas; habla del poder o la fuerza del fuego. «El poder del fuego» mantiene esa relación y sigue siendo idiomático en español.
- source_word: στόματα μαχαίρης
  english_pob_choice: the edge of the sword
  chosen_spanish: las fauces de la espada
  alternatives_spanish:
  - la boca de la espada
  - el filo de la espada
  lexicon: BDAG
  rationale: Literalmente es «bocas de espada», una expresión idiomática. En español, «fauces» conserva la metáfora de una abertura devoradora mejor que «boca» y evita perder del todo el sabor figurado; aun así, sigue remitiendo al filo cortante.
- source_word: ἐδυναμώθησαν
  english_pob_choice: were made strong
  chosen_spanish: fueron fortalecidos
  alternatives_spanish:
  - se fortalecieron
  - fueron hechos fuertes
  lexicon: BDAG
  rationale: El pasivo de δυναμόω indica fortaleza recibida. «Fueron fortalecidos» conserva mejor esa voz pasiva que una forma meramente intransitiva.
- source_word: ἀπὸ ἀσθενείας
  english_pob_choice: out of weakness
  chosen_spanish: desde la debilidad
  alternatives_spanish:
  - a partir de la debilidad
  - desde su debilidad
  lexicon: BDAG
  rationale: ἀπό con genitivo señala origen o punto de partida. «Desde la debilidad» comunica ese movimiento de salida y mantiene la progresión retórica del versículo.
- source_word: ἐγενήθησαν ἰσχυροὶ
  english_pob_choice: became mighty
  chosen_spanish: se hicieron fuertes
  alternatives_spanish:
  - se volvieron poderosos
  - llegaron a ser fuertes
  lexicon: BDAG
  rationale: γίνομαι + adjetivo marca cambio de estado. Dado que el español ya venía usando fortaleza, «se hicieron fuertes» conserva la idea de llegar a ese estado sin introducir un matiz más grandilocuente que el griego.
- source_word: ἐν πολέμῳ
  english_pob_choice: in battle
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en batalla
  - en combate
  lexicon: BDAG
  rationale: πόλεμος puede abarcar guerra como conflicto bélico más amplio. Aquí el español «en la guerra» reproduce bien el valor general del término y conserva el paralelismo con las demás imágenes bélicas.
- source_word: παρεμβολὰς
  english_pob_choice: armies
  chosen_spanish: campamentos
  alternatives_spanish:
  - ejércitos
  - huestes
  - campamentos militares
  lexicon: BDAG
  rationale: La palabra significa literalmente campamento o encampamento. Aunque en contexto militar puede referirse por metonimia a fuerzas armadas, el sentido básico «campamentos» preserva el término griego y deja abierta la referencia histórica.
- source_word: ἔκλιναν ἀλλοτρίων
  english_pob_choice: put foreign armies to flight
  chosen_spanish: de extranjeros
  alternatives_spanish:
  - ajenos
  - foráneos
  lexicon: BDAG
  rationale: El genitivo plural ἀλλοτρίων modifica a παρεμβολάς y puede leerse como pertenencia de otros/foráneos. En español, «de extranjeros» expresa esa relación posesiva/adjetival y señala que eran campamentos pertenecientes a otros pueblos.
theological_decisions:
- issue: Mantener la secuencia histórica y bélica sin espiritualizarla
  english_pob_reading: Retain concrete historical/military imagery without spiritualizing it
  chosen_spanish_reading: Conservar imágenes concretas de fuego, espada, debilidad, guerra y campamentos sin abstraerlas
  alternative_spanish_readings:
  - generalizar a victorias sobre peligros y enemigos
  - espiritualizar como triunfos interiores
  rationale: Hebreos 11 enumera hazañas históricas asociadas con la fidelidad de Dios y de sus siervos. El español conserva esa concreción para no borrar el peso narrativo y testimonial del pasaje.
  doctrine_reference: Philosophy §§1, 3, 6
- issue: Traducir παρεμβολὰς sin fijar prematuramente una sola equivalencia interpretativa
  english_pob_reading: Or 'encampments'; the term refers here to military forces, hence 'armies.'
  chosen_spanish_reading: Campamentos extranjeros, con nota sobre su posible referencia militar
  alternative_spanish_readings:
  - ejércitos extranjeros
  - huestes extranjeras
  - campamentos militares
  rationale: El texto griego admite una relación entre campamento y fuerza militar. El español conserva la literalidad básica y deja explícita en nota la alternativa interpretativa, evitando borrar la tensión lexical documentada.
  doctrine_reference: Lexical/theological caution on metonymy and military context
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y la auditoría inglesa de POB. Se preservó la secuencia de imágenes bélicas sin abstractizarlas; se mantuvo la pasiva en «fueron fortalecidos»; y se dejó abierta la ambigüedad de παρεμβολάς mediante una nota, conforme al rastro auditado.
  spanish_consistency_notes:
  - Se usó un registro bíblico actual, claro y digno, sin depender de formulaciones tradicionales que no exige el griego.
  - «Fuego», «espada», «debilidad», «guerra» y «campamentos» conservan la imaginería concreta del versículo.
  - Se evitó introducir «Cristo», «Señor» u otras terminologías no presentes en el texto.
  - La nota [a] acompaña una metáfora idiomática; la [b] aclara la alternativa semántica documentada para παρεμβολάς.
