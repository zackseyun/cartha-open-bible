    text: 'O simplemente: «murieron por la espada». El griego incluye más literalmente «matanza» (ἐν φόνῳ μαχαίρης), lo que intensifica la violencia de la frase.'
    reason: lexical_alternative
  revision_rationale: Se movió la nota al sintagma correcto («murieron por la espada») para alinearla con la evidencia griega y el audit trail inglés. Se corrigió la puntuación de la nota. Además, se cambió «necesitados» por «desamparados» para reflejar mejor la fuerza de ὑστερούμενοι en este catálogo de sufrimientos.
