translation:
  language: es
  text: Fueron apedreados, fueron aserrados en dos, murieron por la espada[a]; anduvieron de un lugar a otro en pieles de oveja, en pieles de cabra, desamparados, afligidos, maltratados—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «murieron por la espada». El griego incluye más literalmente «matanza» (ἐν φόνῳ μαχαίρης), lo que intensifica la violencia de la frase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλιθάσθησαν
  english_pob_choice: they were stoned
  chosen_spanish: fueron apedreados
  alternatives_spanish:
  - los apedrearon
  - fueron muertos a pedradas
  lexicon: BDAG
  rationale: El aoristo pasivo de λιθάζω expresa claramente que recibieron apedreamiento. 'Fueron apedreados' conserva la pasiva y resulta natural en español.
- source_word: ἐπρίσθησαν
  english_pob_choice: they were sawn in two
  chosen_spanish: fueron aserrados en dos
  alternatives_spanish:
  - fueron serrados en dos
  - fueron cortados en dos con una sierra
  lexicon: BDAG
  rationale: πρίζω significa 'serrar'. 'Aserrados en dos' mantiene la imagen violenta y la pasiva, con un verbo más idiomático en español que 'serrados'.
- source_word: ἐν φόνῳ μαχαίρης
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a espada
  - por la matanza de la espada
  - por el asesinato con espada
  lexicon: BDAG
  rationale: 'Aunque φόνῳ añade la idea de muerte violenta o matanza, la revisión inglesa decidió una formulación más natural y precisa: ''by the sword''. En español, ''por la espada'' conserva ese sentido directo y evita sobrecargar el texto.'
- source_word: ἀπέθανον
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - fallecieron
  - perecieron
  lexicon: BDAG
  rationale: ἀποθνῄσκω aquí es simplemente 'morir'. 'Murieron' es la correspondencia más directa y clara.
- source_word: περιῆλθον
  english_pob_choice: they went about
  chosen_spanish: anduvieron de un lugar a otro
  alternatives_spanish:
  - anduvieron errantes
  - fueron de aquí para allá
  lexicon: BDAG
  rationale: El verbo describe desplazamiento continuo. 'Anduvieron de un lugar a otro' expresa bien la idea de moverse sin asentarse, con naturalidad en español.
- source_word: ἐν μηλωταῖς
  english_pob_choice: in sheepskins
  chosen_spanish: en pieles de oveja
  alternatives_spanish:
  - con pieles de oveja
  - vistiendo pieles de oveja
  lexicon: BDAG
  rationale: μηλωτή designa una piel de oveja usada como prenda. 'En pieles de oveja' sigue de cerca la construcción griega y comunica el tipo de vestimenta.
- source_word: ἐν αἰγείοις δέρμασιν
  english_pob_choice: in goatskins
  chosen_spanish: en pieles de cabra
  alternatives_spanish:
  - con pieles de cabra
  - vistiendo pieles de cabra
  lexicon: BDAG
  rationale: αἴγειος + δέρμα significa piel de cabra. Se mantiene el paralelo con 'en pieles de oveja'.
- source_word: ὑστερούμενοι
  english_pob_choice: destitute
  chosen_spanish: necesitados
  alternatives_spanish:
  - carentes
  - en necesidad
  - desprovistos
  lexicon: BDAG
  rationale: El participio presente de ὑστερέω indica carencia o falta de lo necesario. 'Necesitados' comunica esa privación de forma clara y menos técnica que 'destituidos'.
- source_word: θλιβόμενοι
  english_pob_choice: afflicted
  chosen_spanish: afligidos
  alternatives_spanish:
  - oprimidos
  - atribulados
  - apretados
  lexicon: BDAG
  rationale: θλίβω en pasivo participial expresa presión o aflicción. 'Afligidos' es la equivalencia directa y sobria en español.
- source_word: κακουχούμενοι
  english_pob_choice: mistreated
  chosen_spanish: maltratados
  alternatives_spanish:
  - maltratados duramente
  - tratados con dureza
  - vejados
  lexicon: BDAG
  rationale: κακουχέομαι significa ser tratado mal o sufrir malos tratos. 'Maltratados' es claro y fiel sin intensificar innecesariamente.
theological_decisions:
- issue: Intensidad de la muerte violenta en ἐν φόνῳ μαχαίρης
  english_pob_reading: by the sword
  chosen_spanish_reading: por la espada
  alternative_spanish_readings:
  - por la matanza de la espada
  - por el asesinato con espada
  rationale: El griego incluye φόνῳ, que aporta violencia de muerte, pero la revisión inglesa prefirió la lectura más natural 'by the sword'. En español se conserva esa naturalidad y el sentido de muerte violenta sin introducir una formulación más interpretativa.
  doctrine_reference: Principios de precisión léxica y equivalencia óptima; no implica controversia doctrinal
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una traducción más literal de ἐν φόνῳ μαχαίρης ('by the slaughter of the sword') a la forma revisada y más natural 'by the sword'. La presente versión española sigue esa revisión, manteniendo el resto del versículo alineado con la auditoría y con el texto griego.
  spanish_consistency_notes:
  - Se mantuvo la serie de participios/sufrimientos con una sintaxis paralela y sobria.
  - Se prefirió 'pieles de oveja / pieles de cabra' para reflejar la construcción preposicional del griego y preservar el paralelismo.
  - Se evitó 'siervos' o lenguaje eclesiástico no presente en el texto; el verso enumera padecimientos físicos y sociales, no roles religiosos.
