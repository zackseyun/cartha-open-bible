review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido básico del griego: pasivos iniciales, muerte por espada, vida errante en pieles, y la cadena final de privación y maltrato. Sin embargo, hay un desajuste importante en la nota: el marcador [a] está anclado en «apedreados», pero la nota trata de ἐν φόνῳ μαχαίρης / «murieron por la espada». Eso no preserva correctamente el rastro de auditoría inglés ni la localización semántica de la variante. Además, «necesitados» suaviza un poco ὑστερούμενοι frente a «destitute»; «desamparados» o «desprovistos» reflejan mejor la severidad contextual.'
  spanish_quality_summary: La redacción es clara y natural en español amplio. «Anduvieron de un lugar a otro» funciona bien para περιῆλθον. «Fueron aserrados en dos» es comprensible, aunque «aserrados» suena algo mecánico; aun así es aceptable. La principal reparación necesaria es mover la nota al segmento de la espada y mejorar la redacción de la nota quitando la comilla inicial sobrante. También conviene fortalecer «necesitados» a un término más intenso y sobrio.
  glossary_alignment: No hay conflicto con los términos base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales son mayormente fieles. La excepción menor es ὑστερούμενοι, donde «necesitados» queda por debajo de la fuerza de «destitute» documentada en el inglés POB; «desamparados» mantiene mejor la gravedad sin sonar forzado.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica la frase griega ἐν φόνῳ μαχαίρης y la alternativa «murieron por la espada», pero en el texto español está colocada sobre «apedreados». Esto rompe la correspondencia entre nota y palabra/frase relevante.
  - severity: medium
    issue: La redacción de la nota española tiene una comilla inicial innecesaria.
    rationale: Empieza con «'O simplemente...» en vez de «O simplemente...», lo que produce puntuación incorrecta y menos legible.
  - severity: medium
    issue: «Necesitados» atenúa la fuerza de ὑστερούμενοι en este contexto.
    rationale: El inglés auditado eligió «destitute» por su severidad. En esta lista de sufrimientos extremos, «desamparados» o «desprovistos» preserva mejor la intensidad.
  revised_spanish_text: Fueron apedreados, fueron aserrados en dos, murieron por la espada[a]; anduvieron de un lugar a otro en pieles de oveja, en pieles de cabra, desamparados, afligidos, maltratados—
  revised_footnotes:
