translation:
  language: es
  text: Y sin fe es imposible agradarle[a], porque es necesario que el que se acerca a Dios crea[b] que él existe, y que es recompensador[c] de los que lo buscan con diligencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agradar a Dios». El objeto está implícito en el contexto inmediato; «agradarle» mantiene la fluidez del español.
    reason: lexical_alternative
  - marker: b
    text: O «que él es». El griego es breve y puede leerse de manera más literal así.
    reason: lexical_alternative
  - marker: c
    text: O «recompensa» o «es uno que recompensa». El griego usa γίνεται, literalmente «llega a ser», pero aquí expresa lo que Dios resulta ser para quienes lo buscan.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς δὲ
  english_pob_choice: And without
  chosen_spanish: Y sin
  alternatives_spanish:
  - Pero sin
  - Ahora bien, sin
  lexicon: BDAG
  rationale: 'χωρίς expresa separación: «sin». δέ funciona como conector suave; en español, «Y» mantiene el flujo argumental sin forzar contraste.'
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto πίστις se refiere a la respuesta humana de creer a Dios; «fe» es la equivalencia natural y doctrinalmente estándar. Se conservan alternativas porque el término puede abarcar confianza o fidelidad en otros contextos.
- source_word: ἀδύνατον εὐαρεστῆσαι
  english_pob_choice: it is impossible to please him
  chosen_spanish: es imposible agradarle
  alternatives_spanish:
  - es imposible agradar a Dios
  - es imposible serle agradable
  lexicon: BDAG
  rationale: La construcción impersonal con infinitivo se expresa de forma natural en español como «es imposible agradarle». El referente de «le» es Dios en el contexto inmediato, manteniendo la fluidez sin perder precisión.
- source_word: πιστεῦσαι γὰρ δεῖ
  english_pob_choice: for ... must believe
  chosen_spanish: porque es necesario que ... crea
  alternatives_spanish:
  - porque debe creer
  - porque hay que creer
  lexicon: BDAG
  rationale: δεῖ expresa necesidad; «es necesario que» conserva mejor la fuerza impersonal y el subjuntivo español requerido por la subordinada.
- source_word: τὸν προσερχόμενον τῷ θεῷ
  english_pob_choice: the one who comes to God
  chosen_spanish: el que se acerca a Dios
  alternatives_spanish:
  - el que viene a Dios
  - quien se acerca a Dios
  lexicon: BDAG
  rationale: El participio presente medio indica acercarse/draw near. «Se acerca» refleja bien el movimiento relacional hacia Dios, sin cargarlo innecesariamente de matiz litúrgico.
- source_word: ὅτι ἔστιν
  english_pob_choice: that he exists
  chosen_spanish: que él existe
  alternatives_spanish:
  - que él es
  - que él está
  lexicon: BDAG
  rationale: «Existe» explicita en español la afirmación de la realidad de Dios que el griego comunica de forma concisa. Se preserva la alternativa más literal «que él es» en nota.
- source_word: τοῖς ἐκζητοῦσιν αὐτὸν
  english_pob_choice: those who diligently seek him
  chosen_spanish: de los que lo buscan con diligencia
  alternatives_spanish:
  - de los que lo buscan
  - de los que lo buscan con fervor
  lexicon: BDAG
  rationale: ἐκζητέω intensifica el verbo de buscar; «con diligencia» refleja esa fuerza de manera sobria y natural en español, sin sobrecargar el texto.
- source_word: μισθαποδότης γίνεται
  english_pob_choice: he is a rewarder
  chosen_spanish: es remunerador
  alternatives_spanish:
  - es recompensador
  - es galardonador
  lexicon: BDAG
  rationale: μισθαποδότης significa alguien que recompensa o paga recompensa. «Remunerador» conserva la relación con recompensa/pago y suena más digno en español contemporáneo. Se evita «premiador» por registro y «galardonador» por ser más literario y menos general.
theological_decisions:
- issue: Renderización de πίστις en un contexto doctrinalmente sensible
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La tradición auditada de POB mantiene «faith» como equivalente principal de πίστις; en español «fe» es la opción más estable, inteligible y fiel al argumento del versículo, que explica la necesidad de creer a Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Sentido de γίνεται aplicado a Dios
  english_pob_reading: he is a rewarder
  chosen_spanish_reading: es remunerador
  alternative_spanish_readings:
  - se muestra como remunerador
  - llega a ser remunerador
  rationale: Aunque γίνεται es literalmente «llega a ser / se hace», en esta construcción predicativa el sentido contextual es el de ser reconocido como tal. «Es remunerador» conserva el valor proposicional sin sugerir cambio en la naturaleza divina.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
- issue: Referencia pronominal de «him / αὐτόν»
  english_pob_reading: him
  chosen_spanish_reading: le / lo
  alternative_spanish_readings:
  - a Dios
  - al que lo busca
  rationale: El pronombre retoma a Dios; en español la referencia se aclara por el contexto y por la concordancia verbal. Se usa «le» en «agradarle» y «lo» en «lo buscan» para mantener naturalidad y cohesión.
  doctrine_reference: Pronoun reference based on immediate context
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto griego SBLGNT y toma en cuenta el auditorio de revisión del POB: se mantuvo la fuerza de ανάγκη/δεῖ con una construcción impersonal española, se aclaró la referencia de Dios en el pronombre, y se evitó traducir γίνεται de manera demasiado mecánica como cambio real en Dios. También se consideró la revisión inglesa que prefirió una predicación más natural de γίνεται; en español se optó por «es remunerador» para conservar naturalidad y precisión contextual.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se usa «fe» para πίστις conforme al lema doctrinal del POB.
  - Se preserva el verbo intensivo «buscar con diligencia» para ἐκζητοῦσιν.
  - El texto evita «SEÑOR» y respeta el nombre divino según las pautas del proyecto, aunque aquí no aparece el tetragrámaton.
  - La puntuación sigue el español moderno con dos comas principales para dividir las cláusulas del versículo.
