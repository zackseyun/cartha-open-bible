source:
  edition: SBLGNT
  text: χωρὶς δὲ πίστεως ἀδύνατον εὐαρεστῆσαι, πιστεῦσαι γὰρ δεῖ τὸν προσερχόμενον τῷ θεῷ ὅτι ἔστιν καὶ τοῖς ἐκζητοῦσιν αὐτὸν μισθαποδότης γίνεται.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/006.yaml
  text: And without faith it is impossible to please him[c][b][a], for the one who comes to God must believe that he exists and that he is a rewarder of those who diligently seek him.
  footnotes:
  - marker: a
    text: Or 'trust'; πίστις can also carry the sense 'faithfulness' in some contexts, but here the immediate explanation centers on believing God.
    reason: lexical_alternative
  - marker: b
    text: Or 'that he is.' The Greek is concise and can be rendered more literally this way.
    reason: lexical_alternative
  - marker: c
    text: Or 'he is a rewarder' or 'he proves to be a rewarder.' The Greek says 'becomes,' which in context expresses what God is found to be for those who seek him.
    reason: lexical_alternative
