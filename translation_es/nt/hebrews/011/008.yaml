review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «Por la fe», «cuando fue llamado», el destino aún no especificado, la herencia futura y la salida sin saber adónde iba. Sin embargo, «obedeció para salir» no representa bien el infinitivo complementario ἐξελθεῖν en español; suena final («con el fin de salir») más que complementario de obediencia. El sentido es que Abraham obedeció al llamado saliendo / y salió.'
  spanish_quality_summary: El texto es claro y legible, con buen español general y buena correspondencia léxica. La principal dificultad es la naturalidad y precisión de «obedeció para salir», que en español resulta algo forzado y semánticamente impreciso. También la nota al pie actual repite esencialmente la misma formulación problemática y no añade una alternativa útil.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «fe», «herencia» y el resto del vocabulario son adecuados. No hay términos doctrinales sensibles mal resueltos. La revisión propuesta mantiene la repetición salir/salió, en línea con ἐξελθεῖν / ἐξῆλθεν.
  issues:
  - severity: medium
    issue: «obedeció para salir» expresa finalidad más que complemento verbal
    rationale: En griego, ἐξελθεῖν funciona como infinitivo complementario de ὑπήκουσεν. En español, «obedeció para salir» suena a propósito o meta, no a contenido de la obediencia. «obedeció y salió» o «obedeció al salir» comunican mejor el sentido.
  - severity: low
    issue: La nota al pie actual no aporta una alternativa útil
    rationale: 'La nota «O: “y obedeció para salir”» repite la misma solución cuestionable y no ayuda al lector. Si se conserva una nota, debe registrar una alternativa significativa como «obedeció al salir».'
  revised_spanish_text: Por la fe, Abraham[a], cuando fue llamado, obedeció y salió hacia un lugar que iba a recibir como herencia, y salió sin saber adónde iba.
  revised_footnotes:
  - marker: a
    text: 'O: «obedeció al salir».'
    reason: alternative_rendering_of_complementary_infinitive
  revision_rationale: Se reemplaza «obedeció para salir» por «obedeció y salió» porque esta formulación es más natural en español y comunica mejor la relación entre ὑπήκουσεν y ἐξελθεῖν sin introducir matiz de finalidad. Se mantiene «salió» más adelante para conservar la repetición del griego; aunque el español repite «salió», sigue siendo claro y fiel. Se ajusta la nota para ofrecer una alternativa realmente útil y cercana a la sintaxis griega.
