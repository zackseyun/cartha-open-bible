revisions:
- from: Por la fe, Abraham[a], cuando fue llamado, obedeció para salir a un lugar que iba a recibir como herencia, y salió sin saber adónde iba.
  to: Por la fe, Abraham[a], cuando fue llamado, obedeció y salió hacia un lugar que iba a recibir como herencia, y salió sin saber adónde iba.
  rationale: Se reemplaza «obedeció para salir» por «obedeció y salió» porque esta formulación es más natural en español y comunica mejor la relación entre ὑπήκουσεν y ἐξελθεῖν sin introducir matiz de finalidad. Se mantiene «salió» más adelante para conservar la repetición del griego; aunque el español repite «salió», sigue siendo claro y fiel. Se ajusta la nota para ofrecer una alternativa realmente útil y cercana a la sintaxis griega.
