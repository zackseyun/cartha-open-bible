translation:
  language: es
  text: Por la fe, Abraham[a], cuando fue llamado, obedeció y salió hacia un lugar que iba a recibir como herencia, y salió sin saber adónde iba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedeció al salir».'
    reason: alternative_rendering_of_complementary_infinitive
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por confianza
  - Por fidelidad
  lexicon: BDAG
  rationale: El dativo expresa medio o esfera. «Por la fe» conserva el valor instrumental y el uso doctrinal habitual de πίστις, sin reducirlo a mera confianza psicológica ni desplazarlo hacia fidelidad como sentido principal.
- source_word: καλούμενος
  english_pob_choice: when called
  chosen_spanish: cuando fue llamado
  alternatives_spanish:
  - siendo llamado
  - después de ser llamado
  lexicon: BDAG
  rationale: El participio pasivo presente tiene fuerza circunstancial-temporal. «Cuando fue llamado» suena natural en español y mantiene la relación temporal sin añadir matices innecesarios.
- source_word: ὑπήκουσεν
  english_pob_choice: obeyed
  chosen_spanish: obedeció
  alternatives_spanish:
  - escuchó y obedeció
  - respondió con obediencia
  lexicon: BDAG
  rationale: El verbo expresa obediencia/compliance. «Obedeció» es la forma más directa y fiel en español.
- source_word: ἐξελθεῖν
  english_pob_choice: to go out
  chosen_spanish: para salir
  alternatives_spanish:
  - para irse
  - para partir
  lexicon: BDAG
  rationale: El infinitivo complementa a «obedeció». «Salir» preserva la repetición verbal con ἐξῆλθεν y mantiene el movimiento narrativo del texto griego.
- source_word: τόπον
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - una región
  lexicon: BDAG
  rationale: El sustantivo sin artículo se traduce naturalmente como indefinido. «Un lugar» comunica bien la referencia aún no especificada.
- source_word: ἤμελλεν λαμβάνειν
  english_pob_choice: he was going to receive
  chosen_spanish: iba a recibir
  alternatives_spanish:
  - estaba por recibir
  - estaba destinado a recibir
  lexicon: BDAG
  rationale: La construcción con μέλλω + infinitivo expresa futuración o inminencia. «Iba a recibir» es idiomático en español y no fuerza una lectura más fuerte de predestinación.
- source_word: εἰς κληρονομίαν
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - para herencia
  - como su herencia
  lexicon: BDAG
  rationale: La frase indica el estado/resulta do de recibir el lugar. «Como herencia» es conciso y natural; se omite «su» porque no está explícito en el griego.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: El aoristo retoma el infinitivo anterior y narra el acto cumplido. «Salió» preserva la correspondencia con ἐξελθεῖν y es plenamente idiomático.
- source_word: μὴ ἐπιστάμενος
  english_pob_choice: not knowing
  chosen_spanish: sin saber
  alternatives_spanish:
  - no sabiendo
  - sin conocer
  lexicon: BDAG
  rationale: El participio negativo expresa circunstancia concomitante. «Sin saber» fluye bien en español y transmite la falta de conocimiento sin rigidizar la sintaxis.
- source_word: ποῦ ἔρχεται
  english_pob_choice: where he was going
  chosen_spanish: adónde iba
  alternatives_spanish:
  - dónde iba
  - a dónde se dirigía
  lexicon: BDAG
  rationale: Aunque ἔρχεται es formalmente presente, aquí el español necesita un imperfecto de dirección. «Adónde iba» expresa destino/movimiento de forma natural y mantiene la duda del texto.
theological_decisions:
- issue: Sentido de πίστις en el marco de la obediencia de Abraham
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: 'Se mantiene «fe» como término principal, en línea con el valor doctrinal y narrativo del pasaje: la respuesta obediente de Abraham nace de su fe en el llamado de Dios. «Confianza» y «fidelidad» quedan como alternativas semánticas, pero no desplazan el término básico del texto.'
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Relación entre obediencia y el infinitivo ἐξελθεῖν
  english_pob_reading: obeyed to go out
  chosen_spanish_reading: obedeció para salir
  alternative_spanish_readings:
  - obedeció al salir
  - obedeció y salió
  rationale: El griego vincula la obediencia con el acto de salir. «Obedeció para salir» conserva la conexión sintáctica sin volverla extraña en español. No se sugiere una obediencia meramente interior; la obediencia se expresa en el acto concreto de partir.
  doctrine_reference: 'SBLGNT syntax: complementary infinitive after ὑπακούω'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB sobre la construcción con el infinitivo: el audit trail confirma que la frase debe reflejar directamente ἐξελθεῖν sin introducir una paráfrasis más libre. Por eso el español usa «obedeció para salir», que conserva la relación verbal y evita una formulación menos natural como «obedeció a irse» o una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Fe» se usa de modo consistente para πίστις; no se sustituye por «confianza» en el texto principal.
  - «Salir/salió» conserva la repetición verbal de ἐξελθεῖν/ἐξῆλθεν, importante en el griego.
  - «Adónde iba» mantiene el valor direccional de ποῦ ἔρχεται en español natural.
