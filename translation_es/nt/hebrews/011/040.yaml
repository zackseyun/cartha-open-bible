    rationale: 'La nota empieza con «O: “sin nosotros”», que repite el texto en vez de aclarar la alternativa semántica principal de χωρίς como «aparte de nosotros»/«sin nosotros», y luego mezcla opciones de toda la cláusula. Debe reformularse.'
