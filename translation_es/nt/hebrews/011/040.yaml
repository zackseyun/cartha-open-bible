translation:
  language: es
  text: puesto que Dios había provisto algo mejor para nosotros[a], a fin de que ellos no fueran perfeccionados aparte de nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había previsto algo mejor para nosotros». El participio griego puede sugerir previsión previa o provisión previa; el contexto favorece la idea de provisión o designio de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no fueran perfeccionados sin nosotros» o «no alcanzaran la consumación aparte de nosotros».'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: 'El genitivo absoluto se vierte naturalmente como una cláusula causal en español: «puesto que Dios había provisto...». Mantiene la relación lógica del texto griego sin forzar una estructura ajena al español.'
- source_word: προβλεψαμένου
  english_pob_choice: had provided
  chosen_spanish: había provisto
  alternatives_spanish:
  - había previsto
  - había planeado de antemano
  lexicon: BDAG
  rationale: Sigo la decisión auditada de entender el participio en sentido de provisión/designio previo, no solo de previsión mental. «Había provisto» comunica bien esa acción previa de Dios en español.
- source_word: κρεῖττόν τι
  english_pob_choice: something better
  chosen_spanish: algo mejor
  alternatives_spanish:
  - algo mejor aún
  - una cosa mejor
  lexicon: BDAG
  rationale: «Algo mejor» preserva el indefinido τι y el comparativo κρείττων, que en Hebreos suele tener peso teológico. La forma es natural y mantiene la comparación central del libro.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - en favor de nosotros
  - con respecto a nosotros
  lexicon: BDAG
  rationale: Con προβλεψαμένου, περί expresa una orientación benéfica o relacional. «Para nosotros» es la forma más idiomática en español y conserva la idea de provisión dirigida a nuestro beneficio.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: a fin de que ... no
  alternatives_spanish:
  - para que ... no
  - de manera que ... no
  lexicon: BDAG
  rationale: La cláusula expresa propósito o resultado. «A fin de que» preserva con claridad el valor final sin perder la naturalidad del español bíblico contemporáneo.
- source_word: χωρὶς ἡμῶν
  english_pob_choice: apart from us
  chosen_spanish: sin nosotros
  alternatives_spanish:
  - aparte de nosotros
  - separados de nosotros
  lexicon: BDAG
  rationale: En español, «sin nosotros» comunica con claridad la exclusión relacional que quiere evitar el texto. Aunque «apart from us» puede sonar más literal, aquí «sin nosotros» reproduce la fuerza del contraste con mayor fluidez.
- source_word: τελειωθῶσιν
  english_pob_choice: be made perfect
  chosen_spanish: llegaran a ser perfeccionados
  alternatives_spanish:
  - fueran hechos perfectos
  - alcanzaran la perfección
  - fueran llevados a la perfección
  lexicon: BDAG
  rationale: Se conserva la tensión de τελειόω entre perfección y consumación. «Llegaran a ser perfeccionados» evita reducir el verbo solo a madurez moral o solo a culminación cronológica, y mantiene la fuerza teológica que Hebreos desarrolla.
theological_decisions:
- issue: Sentido de τελειωθῶσιν en el marco salvífico de Hebreos
  english_pob_reading: be made perfect
  chosen_spanish_reading: llegaran a ser perfeccionados
  alternative_spanish_readings:
  - fueran hechos perfectos
  - alcanzaran la perfección
  - fueran llevados a la perfección
  rationale: Hebreos usa τελειόω con un alcance teológico que incluye culminación, acceso y plenitud, no solo perfección moral. «Llegaran a ser perfeccionados» conserva esa tensión sin resolverla prematuramente en una sola dirección.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la redacción sigue de cerca el consenso auditado del inglés POB y la lectura del griego en SBLGNT, manteniendo la ambigüedad productiva de προβλεψαμένου y τελειωθῶσιν.
  spanish_consistency_notes:
  - Se usa «Dios» en lugar de una mayúscula reverencial para κύριος, porque aquí el griego dice θεοῦ.
  - Se evita «Cristo» y «SEÑOR» porque el versículo no los contiene.
  - «Algo mejor» y «perfeccionados» conservan la red teológica de Hebreos sobre lo mejor y la consumación final.
  - Se prefiere un español bíblico claro y contemporáneo, sin arcaísmos innecesarios.
