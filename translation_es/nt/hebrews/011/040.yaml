    issue: Redacción principal pesada en «no llegaran a ser perfeccionados»
    rationale: Aunque no es incorrecta, esta perífrasis resulta menos natural en español bíblico contemporáneo y añade una noción de proceso que el pasivo aoristo no exige. «No fueran perfeccionados» es más directo y fiel.
  - severity: medium
