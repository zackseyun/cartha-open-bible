translation:
  language: es
  text: Por la fe Enoc fue llevado[a] para no ver la muerte, y no era hallado porque Dios lo había llevado. Porque antes de ser llevado[b], había recibido testimonio de haber agradado a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «experimentar la muerte». La expresión «ver la muerte» es un modismo griego conservado en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «antes de su traslado». El griego usa aquí un sustantivo para la acción de ser llevado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  english_pob_choice: By faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - Por confianza
  - Mediante la fe
  lexicon: BDAG
  rationale: La forma dativa funciona de manera instrumental o asociativa en Hebreos 11. «Por la fe» conserva la función de medio o esfera de actuación y es la fórmula más natural en español bíblico actual sin perder la relación con la fe como principio rector.
- source_word: μετετέθη
  english_pob_choice: was taken away
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue trasladado
  - fue removido
  - fue arrebatado
  lexicon: BDAG
  rationale: El pasivo de μετατίθημι expresa aquí que Dios trasladó a Enoc fuera de la vida terrenal. «Fue llevado» mantiene la pasiva, es claro en español, y evita «trasladado», que puede sonar técnico o tradicionalmente marcado.
- source_word: τοῦ μὴ ἰδεῖν θάνατον
  english_pob_choice: so that he should not see death
  chosen_spanish: para no ver la muerte
  alternatives_spanish:
  - para no experimentar la muerte
  - de modo que no viera la muerte
  lexicon: BDAG
  rationale: Se preserva el giro idiomático «ver la muerte» sin explicitarlo en el texto principal. En español, «para no ver la muerte» suena natural y refleja bien la finalidad expresada por el infinitivo articular con μή.
- source_word: οὐχ ηὑρίσκετο
  english_pob_choice: he was not found
  chosen_spanish: no era hallado
  alternatives_spanish:
  - no se lo encontraba
  - no podía ser hallado
  lexicon: BDAG
  rationale: El imperfecto pasivo/medio de εὑρίσκω se rinde de manera simple y continua con «no era hallado», conservando el matiz de estado resultante y evitando introducir agentes que el griego no menciona.
- source_word: διότι μετέθηκεν αὐτὸν ὁ θεός
  english_pob_choice: because God had taken him away
  chosen_spanish: porque Dios lo había llevado
  alternatives_spanish:
  - porque Dios lo había trasladado
  - porque Dios lo había removido
  lexicon: BDAG
  rationale: El pluscuamperfecto español expresa con naturalidad la acción previa que explica por qué no era hallado. Se mantiene la relación verbal con μετετέθη mediante «llevado», aunque en español no se repite la misma raíz con la misma facilidad que en inglés.
- source_word: πρὸ γὰρ τῆς μεταθέσεως
  english_pob_choice: For before his being taken away
  chosen_spanish: Porque antes de su ser llevado
  alternatives_spanish:
  - Porque antes de su traslado
  - Porque antes de que fuera llevado
  lexicon: BDAG
  rationale: Se opta por una construcción nominal cercana al griego («antes de su ser llevado») para reflejar la referencia a la μεταθέσις como sustantivo. Aunque es algo más formal, conserva el vínculo léxico con el primer verbo.
- source_word: μεμαρτύρηται
  english_pob_choice: he had been commended
  chosen_spanish: había recibido testimonio
  alternatives_spanish:
  - había sido testificado
  - había sido aprobado
  lexicon: BDAG
  rationale: En Hebreos, μαρτυρέω suele implicar testimonio favorable sobre la persona. «Había recibido testimonio» mantiene el pasivo y evita imponer una equivalencia interpretativa demasiado fuerte como «aprobado».
- source_word: εὐαρεστηκέναι τῷ θεῷ
  english_pob_choice: as having pleased God
  chosen_spanish: de haber agradado a Dios
  alternatives_spanish:
  - de haber sido agradable a Dios
  - de haber complacido a Dios
  lexicon: BDAG
  rationale: El infinitivo perfecto expresa una acción/estado anterior ya reconocido por el testimonio. «De haber agradado a Dios» es natural en español y conserva la relación con el verbo de juicio favorable.
theological_decisions:
- issue: Sentido de μετατίθημι aplicado a Enoc
  english_pob_reading: Render as 'taken away' without importing a fuller doctrinal explanation beyond the text.
  chosen_spanish_reading: «Fue llevado» sin añadir una explicación doctrinal sobre el mecanismo del traslado.
  alternative_spanish_readings:
  - fue arrebatado
  - fue llevado al cielo
  - fue trasladado
  rationale: El versículo afirma que Dios intervino y que Enoc no vio la muerte, pero no detalla el modo del traslado. «Fue llevado» preserva esa sobriedad y deja el alcance teológico abierto dentro del propio texto.
  doctrine_reference: Hebreos 11:5; filosofía de traducción POB §§1, 3, 6
- issue: Fuerza del idiomismo «ver la muerte»
  english_pob_reading: Preserve the idiom 'see death' in the main text.
  chosen_spanish_reading: Conservar «ver la muerte» en el texto principal.
  alternative_spanish_readings:
  - experimentar la muerte
  - morir
  rationale: El giro es un hebraísmo/idioma griego reconocible y vale la pena preservarlo. «Para no ver la muerte» mantiene la textura bíblica y no elimina la imagen original.
  doctrine_reference: Hebreos 11:5; filosofía de traducción POB §§1, 6
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta el cierre revisado del inglés auditado: la expresión final se mantiene con una construcción nominal cercana al griego («antes de su ser llevado»), en lugar de una cláusula más libre. También respeta la decisión de conservar el modismo «ver la muerte» en el cuerpo principal y de no expandir el traslado de Enoc con detalles doctrinales ajenos al versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός / τῷ θεῷ de forma uniforme.
  - Se usa «llevar/llevado» de modo consistente para μετατίθημι/μετάθεσις, aunque el español no permita repetir exactamente la misma raíz con naturalidad en todas las posiciones.
  - «Por la fe» conserva el inicio instrumental de Hebreos 11 de manera uniforme con el estilo POB.
  - El registro es bíblico contemporáneo, evitando arcaísmos innecesarios como «trasladado» en el texto principal.
