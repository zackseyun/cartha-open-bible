revisions:
- from: Por la fe Enoc fue llevado[a] para no ver la muerte, y no era hallado porque Dios lo había llevado. Porque antes de su ser llevado[b], había recibido testimonio de haber agradado a Dios.
  to: Por la fe Enoc fue llevado[a] para no ver la muerte, y no era hallado porque Dios lo había llevado. Porque antes de ser llevado[b], había recibido testimonio de haber agradado a Dios.
  rationale: Se reemplaza «antes de su ser llevado» por «antes de ser llevado» para lograr un español más natural y ampliamente legible sin perder el sentido del sustantivo griego μεταθέσεως ni la relación léxica con «fue llevado». Se conserva la nota con la alternativa «traslado» para reflejar el matiz nominal y la tradición de traducción.
