  text: Πίστει Ἑνὼχ μετετέθη τοῦ μὴ ἰδεῖν θάνατον, καὶ οὐχ ηὑρίσκετο διότι μετέθηκεν αὐτὸν ὁ θεός· πρὸ γὰρ τῆς ⸀μεταθέσεως μεμαρτύρηται εὐαρεστηκέναι τῷ θεῷ,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/005.yaml
  text: By faith Enoch was taken away so that he should not see death[a], and he was not found because God had taken him away. For before his being taken away, he had been commended as having pleased God[c][b],
