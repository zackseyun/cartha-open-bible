translation:
  language: es
  text: Porque los que dicen tales cosas dejan claro que buscan una patria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su país propio» o «su tierra natal». El versículo siguiente aclara que la patria esperada es, en última instancia, celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la conexión explicativa con el versículo anterior. «Porque» es natural en español y mantiene el valor inferencial de la partícula.
- source_word: τοιαῦτα
  english_pob_choice: such things
  chosen_spanish: tales cosas
  alternatives_spanish:
  - cosas así
  - cosas de ese tipo
  lexicon: BDAG
  rationale: Refiere de forma neutra a lo dicho en el contexto inmediato. «Tales cosas» preserva la deixis sin sobreexplicar.
- source_word: λέγοντες
  english_pob_choice: who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - quienes dicen
  - los que hablan
  lexicon: BDAG
  rationale: El participio presente se vierte como una relativa natural en español, manteniendo la fuerza general y continua de la acción.
- source_word: ἐμφανίζουσιν
  english_pob_choice: make it clear
  chosen_spanish: dejan claro
  alternatives_spanish:
  - muestran claramente
  - hacen evidente
  - revelan
  lexicon: BDAG
  rationale: Expresa bien el sentido de hacer manifiesto o patente. «Dejan claro» suena natural y conserva la conclusión que se desprende de sus palabras.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce la cláusula de contenido de manera directa y estándar en español.
- source_word: πατρίδα
  english_pob_choice: a homeland
  chosen_spanish: una patria
  alternatives_spanish:
  - una tierra natal
  - un país natal
  - una patria propia
  lexicon: BDAG
  rationale: πατρίς puede referir la patria o tierra natal. «Patria» es un equivalente digno y claro en español; se evita «país» por ser demasiado moderno-político y «tierra natal» por sonar más descriptivo pero menos compacto.
- source_word: ἐπιζητοῦσιν
  english_pob_choice: are seeking
  chosen_spanish: buscan
  alternatives_spanish:
  - están buscando
  - andan buscando
  - procuran
  lexicon: BDAG
  rationale: El presente indica búsqueda activa y continua. «Buscan» es natural en español y comunica la acción persistente sin recargar la frase.
theological_decisions:
- issue: Naturaleza de la patria buscada
  english_pob_reading: Rendered generally as 'a homeland' without specifying earthly or heavenly in the main text.
  chosen_spanish_reading: «una patria» sin especificar si es terrenal o celestial en el texto principal.
  alternative_spanish_readings:
  - una patria celestial
  - una patria terrenal
  - su patria propia
  rationale: El versículo inmediato solo afirma que la buscan; la aclaración de que es una patria mejor y celestial pertenece al versículo siguiente. Se preserva así la tensión interpretativa sin anticiparla en el texto principal.
  doctrine_reference: Mantener la tensión bíblica y permitir que Hebreos 11:15 haga la aclaración.
translation_notes:
  revision_awareness: 'Concordamos con la revisión más reciente y el control cruzado de alta concordancia: no se detectaron cambios necesarios respecto del sentido base. Se mantuvo la equivalencia óptima del inglés POB, pero con léxico español natural y auditable desde el griego.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el versículo.
  - «Patria» conserva la amplitud de πατρίς sin resolver prematuramente su referente; la nota mantiene las alternativas léxicas documentadas.
  - «Buscan» traduce el presente activo de ἐπιζητοῦσιν con naturalidad, sin perder la idea de búsqueda continua.
  - La subordinación con «porque» conserva la relación explicativa con el contexto anterior.
