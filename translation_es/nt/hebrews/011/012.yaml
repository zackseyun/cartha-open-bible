revisions:
- from: Por eso, de uno solo[a] nacieron descendientes, y eso cuando estaba como muerto[b]; como las estrellas del cielo en multitud y como la arena innumerable junto a la orilla del mar.
  to: Por eso, de un solo hombre[a], y este ya casi muerto[b], nacieron descendientes tan numerosos como las estrellas del cielo y como la arena innumerable a la orilla del mar.
  rationale: La revisión sigue más de cerca las decisiones auditadas del POB inglés al explicitar el masculino de ἀφ’ ἑνὸς con «de un solo hombre» y al mejorar la naturalidad de καὶ ταῦτα νενεκρωμένου con una expresión idiomática clara en español. También se suaviza el calco de la comparación numérica para lograr un español más legible y digno sin perder contenido.
