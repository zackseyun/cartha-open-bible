review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: inferencia lógica, origen en Abraham, descendencia numerosa, y la condición de Abraham como más allá de la capacidad normal de procrear. Sin embargo, dos decisiones debilitan la alineación con el rastro POB: (1) «de uno solo» deja demasiado implícito el masculino singular que el POB inglés explicitó como «one man»; (2) «y eso cuando estaba como muerto» suena algo torpe y menos ajustado que una formulación más directa como «y este ya casi muerto» o equivalente. También conviene pulir el orden para que la frase suene más natural en español sin perder el paralelismo.'
  spanish_quality_summary: 'El español es comprensible, pero tiene cierta rigidez: «y eso cuando estaba como muerto» no fluye con naturalidad bíblica moderna, y «como las estrellas del cielo en multitud» suena calcado. La oración mejora con una sintaxis más natural y elevada: «Por eso, de un solo hombre[a], y este ya casi muerto[b], nacieron descendientes tan numerosos como las estrellas del cielo y como la arena innumerable a la orilla del mar.»'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, etc. Sí importa la política de precisión de género/referente: el POB inglés documentó la explicitación masculina de ἀφ’ ἑνὸς por el masculino griego y el contexto de Abraham. En español conviene seguir esa misma línea con «de un solo hombre» en lugar de «de uno solo».'
  issues:
  - severity: medium
    issue: «de uno solo» no explicita el referente masculino singular
    rationale: Aunque el griego puede traducirse literalmente «de uno», el rastro POB decidió explicitar «one man» por el masculino y el contexto. «De uno solo» en español suena más ambiguo y se aleja de esa decisión auditada.
  - severity: medium
    issue: «y eso cuando estaba como muerto» es poco natural y débilmente idiomático
    rationale: 'La frase intenta representar καὶ ταῦτα νενεκρωμένου, pero en español resulta pesada. El sentido es metafórico: Abraham estaba prácticamente muerto en cuanto a capacidad reproductiva. Una formulación más directa preserva mejor la fuerza y la legibilidad.'
  - severity: low
    issue: «como las estrellas del cielo en multitud» suena calcado
    rationale: Es fiel en contenido, pero menos natural que «tan numerosos como las estrellas del cielo». Se puede conservar el sentido de πλῆθος sin mantener una construcción poco idiomática.
  revised_spanish_text: Por eso, de un solo hombre[a], y este ya casi muerto[b], nacieron descendientes tan numerosos como las estrellas del cielo y como la arena innumerable a la orilla del mar.
  revised_footnotes:
