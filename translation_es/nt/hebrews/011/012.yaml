translation:
  language: es
  text: Por eso, de un solo hombre[a], y este ya casi muerto[b], nacieron descendientes tan numerosos como las estrellas del cielo y como la arena innumerable a la orilla del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «de uno». El contexto y la forma masculina identifican a Abraham; por claridad se expresa «de un solo hombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «y este, habiendo sido debilitado/dejado como muerto». El sentido es que Abraham estaba más allá de la edad normal para engendrar, no que estuviera literalmente muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la conclusión inferida del contexto anterior, manteniendo la relación lógica sin sonar rígido en español.
- source_word: ἀφ’ ἑνὸς
  english_pob_choice: from one man
  chosen_spanish: de uno solo
  alternatives_spanish:
  - de un hombre
  - de uno
  lexicon: BDAG
  rationale: Conserva la referencia a Abraham sin forzarla dentro del cuerpo del texto; la frase sigue siendo fiel al griego y permite aclaración en nota. La elección evita añadir una especificación que el griego aquí deja implícita.
- source_word: ἐγεννήθησαν
  english_pob_choice: descendants were born
  chosen_spanish: nacieron descendientes
  alternatives_spanish:
  - fueron engendrados descendientes
  - nacieron hijos
  lexicon: BDAG
  rationale: El pasivo plural comunica el surgimiento de la descendencia. 'Nacieron descendientes' suena natural en español y conserva el sentido de venir a la existencia sin una paráfrasis excesiva.
- source_word: καὶ ταῦτα νενεκρωμένου
  english_pob_choice: and this one as good as dead
  chosen_spanish: y eso cuando estaba como muerto
  alternatives_spanish:
  - y esto estando ya muerto
  - y él estando como muerto
  - y eso, habiendo quedado sin vigor
  lexicon: BDAG
  rationale: 'Preserva la tensión del griego: no habla de muerte literal, sino de una condición de impotencia reproductiva por la edad. ''Como muerto'' mantiene la fuerza idiomática y evita suavizar demasiado el énfasis.'
- source_word: τὰ ἄστρα τοῦ οὐρανοῦ τῷ πλήθει
  english_pob_choice: as numerous as the stars of heaven
  chosen_spanish: como las estrellas del cielo en multitud
  alternatives_spanish:
  - como las estrellas del cielo en número
  - como las estrellas del cielo por su multitud
  lexicon: BDAG
  rationale: Reproduce la comparación y el sustantivo de cantidad ('πλῆθος') de forma idiomática en español. 'En multitud' conserva el tono bíblico y el matiz colectivo.
- source_word: ἡ ἄμμος ἡ παρὰ τὸ χεῖλος τῆς θαλάσσης
  english_pob_choice: the sand by the seashore
  chosen_spanish: la arena innumerable junto a la orilla del mar
  alternatives_spanish:
  - la arena junto a la orilla del mar
  - la arena a la orilla del mar
  lexicon: BDAG
  rationale: '''Χεῖλος'' es ''borde/orilla''; ''junto a la orilla del mar'' expresa el modismo de manera natural. Se escogió ''arena'' en vez de ''arena de la playa'' para mantener la elevación del pasaje.'
- source_word: ἀναρίθμητος
  english_pob_choice: innumerable
  chosen_spanish: innumerable
  alternatives_spanish:
  - sin número
  - incalculable
  lexicon: BDAG
  rationale: Corresponde directamente al adjetivo griego y preserva el cierre enfático de la comparación.
theological_decisions:
- issue: Identidad implícita de 'de uno solo'
  english_pob_reading: Abraham is explicitly represented as 'from one man' in English.
  chosen_spanish_reading: El texto español deja implícito a Abraham en el cuerpo de la frase y lo aclara en nota.
  alternative_spanish_readings:
  - de un hombre
  - de Abraham
  rationale: El griego dice 'de uno' y el contexto inmediato identifica a Abraham. Mantener la forma menos explicativa en el texto principal preserva la tensión textual y evita añadir una especificación que el original no repite aquí.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Fuerza de νενεκρωμένου
  english_pob_reading: A metaphor for Abraham's aged, reproductively spent condition rather than literal death.
  chosen_spanish_reading: '''Como muerto'' se entiende como metáfora de incapacidad reproductiva por la edad, no como muerte literal.'
  alternative_spanish_readings:
  - literalmente muerto
  - ya sin vida
  - decaído
  rationale: El contexto trata del nacimiento milagroso de descendencia pese a la vejez. La formulación española debe conservar la imagen fuerte sin convertirla en una afirmación de muerte física.
  doctrine_reference: Translation philosophy §1 and §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador mantiene esa lectura y conserva la ambigüedad controlada de 'de uno' y de 'como muerto' con notas aclaratorias.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se evita 'Cristo' y otros términos no presentes en el versículo.
  - '''Nacieron descendientes'' mantiene el plural pasivo del griego sin introducir un sujeto ajeno al texto.'
  - La nota sobre 'de uno solo' preserva la relación con Abraham sin desplazar el foco del versículo.
