    text: 'Más literalmente: «de uno». El contexto y la forma masculina identifican a Abraham; por claridad se expresa «de un solo hombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «y este, habiendo sido debilitado/dejado como muerto». El sentido es que Abraham estaba más allá de la edad normal para engendrar, no que estuviera literalmente muerto.'
    reason: lexical_alternative
  revision_rationale: La revisión sigue más de cerca las decisiones auditadas del POB inglés al explicitar el masculino de ἀφ’ ἑνὸς con «de un solo hombre» y al mejorar la naturalidad de καὶ ταῦτα νενεκρωμένου con una expresión idiomática clara en español. También se suaviza el calco de la comparación numérica para lograr un español más legible y digno sin perder contenido.
