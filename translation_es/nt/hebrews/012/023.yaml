translation:
  language: es
  text: y a la asamblea de los primogénitos inscritos en los cielos[a], y a Dios, el juez de todos, y a los espíritus de los justos hechos perfectos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘inscritos en el cielo’. El griego usa el plural ‘en los cielos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - iglesia
  - congregación
  lexicon: BDAG
  rationale: ‘Asamblea’ reproduce el sentido básico de un pueblo reunido sin cargar el término con connotaciones eclesiásticas institucionales que ‘iglesia’ puede sugerir en español.
- source_word: πρωτοτόκων
  english_pob_choice: the firstborn
  chosen_spanish: los primogénitos
  alternatives_spanish:
  - los primeros nacidos
  - los primeros hijos
  lexicon: BDAG
  rationale: El plural sustantivado se vierte naturalmente como ‘los primogénitos’, conservando la fuerza de estatus e herencia del término sin introducir ‘hijos’ que no aparece explícitamente.
- source_word: ἀπογεγραμμένων
  english_pob_choice: enrolled
  chosen_spanish: inscritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: BDAG
  rationale: ‘Inscritos’ mantiene la imagen de un registro formal y resulta idiomático en español; además conserva el sentido de un acto completado con efecto vigente.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el cielo(s)
  lexicon: BDAG
  rationale: Se preserva el plural griego con ‘los cielos’, porque el texto fuente usa οὐρανοῖς y el proyecto prefiere no borrar esa forma cuando puede mantenerse con naturalidad.
- source_word: κριτῇ θεῷ πάντων
  english_pob_choice: God, the judge of all
  chosen_spanish: Dios, el juez de todos
  alternatives_spanish:
  - Dios, juez de todos
  - el juez de todos, Dios
  lexicon: BDAG
  rationale: La apposición se refleja de manera directa y clara en español; ‘el juez de todos’ conserva la función judicial atribuida a Dios sin alterar el orden del sentido.
- source_word: πνεύμασι
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - seres espirituales
  lexicon: BDAG
  rationale: ‘Espíritus’ es la correspondencia directa y preserva la referencia a personas en su estado espiritual, sin expandir el término a ‘seres espirituales’ que podría sugerir ángeles.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos e íntegros
  lexicon: BDAG
  rationale: ‘Justos’ conserva el sentido moral/covenantal del adjetivo y su forma sustantivada en español es natural en este contexto.
- source_word: τετελειωμένων
  english_pob_choice: made perfect
  chosen_spanish: hechos perfectos
  alternatives_spanish:
  - llevados a la perfección
  - perfeccionados
  lexicon: BDAG
  rationale: ‘Hechos perfectos’ sigue de cerca la pasiva perfecta y mantiene la conexión con el tema de perfección de Hebreos, sin suavizarlo a una mera ‘completitud’.
theological_decisions:
- issue: Sentido colectivo de los primogénitos
  english_pob_reading: A collective designation for God's people sharing firstborn status/inheritance, rather than a reference to Christ alone.
  chosen_spanish_reading: Una designación colectiva del pueblo de Dios con condición de primogénitos, no una referencia exclusiva a Cristo.
  alternative_spanish_readings:
  - Referencia a Cristo como el Primogénito, con la asamblea perteneciente a él
  - Los primeros nacidos como una categoría meramente honorífica
  rationale: El genitivo plural πρωτοτόκων favorece de manera fuerte un referente colectivo. La traducción mantiene esa lectura sin resolver tensiones teológicas que el texto no resuelve explícitamente.
  doctrine_reference: Mantener la tensión textual y evitar sobreinterpretación cristológica donde el griego es plural y colectivo.
- issue: Referente de ‘los espíritus de los justos hechos perfectos’
  english_pob_reading: Human righteous dead brought to their perfected state in God's presence.
  chosen_spanish_reading: Espíritus humanos de justos en estado perfeccionado ante Dios.
  alternative_spanish_readings:
  - Los justos en general, estén o no corporizados
  - Ángeles justos hechos perfectos
  rationale: La secuencia distingue este grupo de la asamblea viva y de Dios; ‘espíritus’ apunta naturalmente a personas humanas en su estado espiritual. No se añaden precisiones doctrinales sobre el estado intermedio que el texto no formula.
  doctrine_reference: No importar más doctrina de la que el pasaje afirma.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se prefirió una formulación idiomática para ἐν οὐρανοῖς sin perder el plural griego en la nota, y se mantuvo una redacción formal y directa para δικαίων y τετελειωμένων. La versión española conserva esas decisiones con ‘en los cielos’ y ‘de los justos hechos perfectos’.'
  spanish_consistency_notes:
  - Se usó ‘asamblea’ en lugar de ‘iglesia’ para evitar una connotación institucional no exigida por ἐκκλησία.
  - Se empleó ‘Yahvé’ no porque aparezca aquí, sino como norma del proyecto cuando el texto fuente lo requiera; este versículo no la contiene.
  - Se mantuvo ‘primogénitos’ como equivalente natural de πρωτοτόκων, sin añadir ‘hijos’ para no especificar más de lo que dice el griego.
  - ‘En los cielos’ conserva el plural de οὐρανοῖς; la nota ofrece la alternativa singular idiomática.
  - ‘Hechos perfectos’ mantiene la pasiva de τετελειωμένων y el tema de perfección característico de Hebreos.
