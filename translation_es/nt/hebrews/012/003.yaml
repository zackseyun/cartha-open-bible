translation:
  language: es
  text: Porque consideren al que soportó tal oposición de parte de los pecadores contra él mismo[a], para que no se cansen[b], desanimándose en sus almas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «contra él mismo»; el texto SBLGNT lee «contra sí mismos». El sentido en el contexto es la oposición dirigida contra Jesús.
    reason: textual_variant
  - marker: b
    text: O «desfalleciendo en sus almas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναλογίσασθε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - piensen cuidadosamente en
  - reflexionen sobre
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a una reflexión deliberada. «Consideren» es natural en español y conserva la fuerza exhortativa sin añadir contenido ajeno.
- source_word: τοιαύτην
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - tan grande
  - de tal clase
  lexicon: BDAG
  rationale: «Tal» transmite la cualidad/intensidad de la oposición sin precisar más de lo que el griego exige.
- source_word: ὑπομεμενηκότα
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - perseveró bajo
  - aguantó
  lexicon: BDAG
  rationale: El participio perfecto destaca una resistencia ya cumplida con efecto permanente. «Soportó» comunica la resistencia sufrida de manera natural en español y encaja con el contexto de padecimiento.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - malvados
  lexicon: BDAG
  rationale: «Pecadores» mantiene el contraste moral directo del texto y sigue de cerca el sentido substantivado del adjetivo griego.
- source_word: εἰς ἑαυτοὺς ἀντιλογίαν
  english_pob_choice: opposition from sinners against himself
  chosen_spanish: oposición de parte de los pecadores contra sí mismo
  alternatives_spanish:
  - oposición de parte de los pecadores contra él
  - contradicción de parte de los pecadores contra sí mismo
  lexicon: BDAG
  rationale: «ἀντιλογία» puede expresar oposición, hostilidad o contradicción. «Oposición» es la opción más amplia y clara en español. Se conserva «contra sí mismo» porque el contexto apunta a Jesús como el destinatario de esa oposición, aunque el testimonio manuscrito presenta una variante reflexiva en el pronombre.
- source_word: κάμητε
  english_pob_choice: grow weary
  chosen_spanish: se cansen
  alternatives_spanish:
  - se fatiguen
  - se fatiguen y pierdan ánimo
  lexicon: BDAG
  rationale: El verbo indica llegar a estar agotados o cansados. «Se cansen» es la expresión más natural en español y funciona bien con la advertencia del versículo.
- source_word: ταῖς ψυχαῖς ὑμῶν
  english_pob_choice: in your souls
  chosen_spanish: en sus almas
  alternatives_spanish:
  - en sus vidas
  - en su interior
  lexicon: BDAG
  rationale: «ψυχή» aquí alude a la vida interior o al ser interior. «Almas» conserva la imagen antropológica del griego sin reducirla a mera metáfora psicológica.
- source_word: ἐκλυόμενοι
  english_pob_choice: becoming discouraged
  chosen_spanish: desanimándose
  alternatives_spanish:
  - desfalleciendo
  - rindiéndose
  lexicon: BDAG
  rationale: El participio presente indica un proceso concomitante con el cansancio. «Desanimándose» expresa bien el sentido de desfallecimiento interior en un español claro y pastoral.
theological_decisions:
- issue: Identidad del referente de «al que»
  english_pob_reading: The phrase refers to Jesus without repeating the name in the verse.
  chosen_spanish_reading: «al que» mantiene el referente implícito a Jesús por el contexto inmediato de Hebreos 12:2–3.
  alternative_spanish_readings:
  - «a Jesús, que»
  - «al Señor, que»
  rationale: El texto griego no repite el nombre, y el contexto ya identifica a Jesús como el modelo a considerar. Mantener la referencia implícita respeta la forma del original y evita sobreexplicitar el verso.
  doctrine_reference: Contexto inmediato y economía textual del griego; Hebreos 12:2–3.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del audit trail inglés y conserva la tensión textual sobre el pronombre reflexivo mediante la nota a. No se detectaron revisiones sustantivas adicionales en el registro más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «pecadores» para conservar la fuerza moral del término griego.
  - «Almas» se conserva por consistencia con la antropología del pasaje y con el valor de ψυχή en el audit trail inglés.
  - La redacción evita calco excesivo y mantiene un tono bíblico contemporáneo y solemne.
