    issue: «contra sí mismo» en el texto principal es poco natural en español aquí
    rationale: Aunque comprensible, en español esta formulación reflexiva suena rígida y menos idiomática en esta sintaxis. «Contra él mismo» comunica mejor la oposición dirigida a Jesús, mientras la nota ya preserva el detalle textual de «contra sí mismos» en SBLGNT.
  revised_spanish_text: Porque consideren al que soportó tal oposición de parte de los pecadores contra él mismo[a], para que no se cansen[b], desanimándose en sus almas.
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «contra él mismo»; el texto SBLGNT lee «contra sí mismos». El sentido en el contexto es la oposición dirigida contra Jesús.
    reason: textual_variant
  - marker: b
    text: O «desfalleciendo en sus almas».
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión reflexiva a un español más natural y claro («contra él mismo») sin perder la información crítica textual, que permanece en la nota. No se requieren más cambios sustanciales.
