  text: Ἀναλογίσασθε γὰρ τὸν τοιαύτην ὑπομεμενηκότα ὑπὸ τῶν ἁμαρτωλῶν εἰς ⸀ἑαυτοὺς ἀντιλογίαν, ἵνα μὴ κάμητε ταῖς ψυχαῖς ὑμῶν ἐκλυόμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/003.yaml
  text: For consider the one who endured such opposition from sinners against himself[a], so that you may not grow weary[b], becoming discouraged in your souls.
  footnotes:
