review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: exhortación a considerar a Jesús, su resistencia frente a la oposición de pecadores, y el propósito de evitar el cansancio interior. También preserva correctamente la nota textual sobre ἑαυτούς/ἑαυτόν y la alternativa léxica para ἐκλυόμενοι. Sin embargo, «contra sí mismo» en el texto principal suena menos natural en español en esta construcción; dado que la nota ya documenta la variante, conviene usar «contra él mismo» en el texto para claridad y fidelidad idiomática, manteniendo la nota textual.'
  spanish_quality_summary: 'El español es claro y ampliamente legible, con tono digno. «Porque consideren» funciona, aunque algo literal; no requiere cambio. La principal mejora es idiomática: «oposición ... contra él mismo» suena más natural que «contra sí mismo» después de un referente en tercera persona singular explícito/implícito. El resto del verso lee bien. «En sus almas» preserva la antropología del texto y es aceptable en español eclesial.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones «pecadores», «almas» y el mantenimiento de la referencia implícita a Jesús concuerdan con el expediente inglés y con la filosofía POB.
  issues:
