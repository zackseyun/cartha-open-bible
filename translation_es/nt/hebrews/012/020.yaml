translation:
  language: es
  text: 'Porque no podían soportar lo que se les mandaba: «Si hasta un animal[a] toca el monte, será apedreado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «o atravesado con una flecha», en eco de Éxodo 19:12–13.'
    reason: textual_variant
lexical_decisions:
- source_word: οὐκ ἔφερον
  english_pob_choice: they could not endure
  chosen_spanish: no podían soportar
  alternatives_spanish:
  - no podían endurecer
  - no podían aguantar
  - no podían soportar
  lexicon: BDAG
  rationale: En este contexto, φέρω con negación expresa incapacidad para tolerar o sobrellevar una exigencia. «No podían soportar» conserva ese sentido idiomático en español sin volverse mecánico.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce explicación causal respecto del contexto inmediato. «Porque» es natural en español y mantiene la conexión explicativa.
- source_word: τὸ διαστελλόμενον
  english_pob_choice: what was being commanded
  chosen_spanish: lo que se les mandaba
  alternatives_spanish:
  - el mandato
  - lo que se ordenaba
  - la orden que se daba
  lexicon: BDAG
  rationale: El participio pasivo se refiere a una instrucción autoritativa. «Lo que se les mandaba» preserva la forma verbal y evita convertirla prematuramente en un sustantivo abstracto.
- source_word: Κἂν
  english_pob_choice: If even
  chosen_spanish: Si aun
  alternatives_spanish:
  - Y si aun
  - Aunque
  - Si incluso
  lexicon: BDAG
  rationale: La construcción introduce una condición con énfasis concesivo. «Si aun» comunica que ni siquiera un animal quedaba exento.
- source_word: θηρίον
  english_pob_choice: an animal
  chosen_spanish: un animal
  alternatives_spanish:
  - una bestia
  - un animal
  - un animal salvaje
  lexicon: BDAG
  rationale: Aunque θηρίον puede ser «bestia» o «animal», «animal» es más claro en español contemporáneo y coincide con la decisión inglesa auditada.
- source_word: θίγῃ
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - toque
  - tocara
  - toca
  lexicon: BDAG
  rationale: 'El subjuntivo aoristo en la condición se expresa de forma natural con presente en español: «toca».'
- source_word: τοῦ ὄρους
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  - el monte
  - el monte Sinaí
  lexicon: BDAG
  rationale: El contexto remite al Sinaí, y «monte» es una forma bíblica natural en español para ὄρος. Se evita añadir «Sinaí» porque el griego aquí dice simplemente «el monte».
- source_word: λιθοβοληθήσεται
  english_pob_choice: it will be stoned
  chosen_spanish: será apedreado
  alternatives_spanish:
  - será lapidado
  - será apedreado
  - será muerto a pedradas
  lexicon: BDAG
  rationale: El pasivo futuro expresa la pena de muerte por apedreamiento. «Será apedreado» es claro y fiel; «lapidado» es posible, pero «apedreado» suena más directo en español general.
theological_decisions:
- issue: Alcance de la cita del Sinaí y variante textual expandida
  english_pob_reading: The verse is rendered as a citation of the command associated with Sinai without importing wording not present in this Greek text.
  chosen_spanish_reading: La traducción sigue el texto griego dado y no añade la expansión tradicional «o atravesado con una flecha».
  alternative_spanish_readings:
  - «o atravesado con una flecha»
  - ampliar la cita con la tradición de Éxodo 19:12–13
  rationale: El testimonio textual proporcionado termina con «será apedreado», por lo que no se debe armonizar añadiendo material ausente. La decisión conserva la tensión textual documentada y respeta el texto base de SBLGNT.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT provisto y coincide con la solución auditada en inglés: explicación causal con γάρ, cláusula condicional enfática con κἄν, y ausencia de la expansión manuscrita «o atravesado con una flecha» porque no está en este testimonio.'
  spanish_consistency_notes:
  - Se conservó «monte» para ὄρος, en continuidad con el lenguaje bíblico en español y sin introducir «Sinaí» explícitamente.
  - Se usó «apedreado» para λιθοβοληθήσεται por claridad moderna; no se eligió «lapidado» por ser menos transparente para lectores generales.
  - Se mantuvo el sujeto impersonal/pasivo en español («será apedreado») para reflejar el pasivo futuro griego.
