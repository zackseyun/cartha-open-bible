revisions:
- from: 'Porque no podían soportar lo que se les mandaba: «Si aun un animal[a] toca el monte, será apedreado».'
  to: 'Porque no podían soportar lo que se les mandaba: «Si hasta un animal[a] toca el monte, será apedreado».'
  rationale: 'La revisión mantiene intacto el contenido semántico del griego y del POB inglés, pero mejora la naturalidad y precisión del español al sustituir «aun» por «hasta», que expresa mejor el énfasis de Κἂν en esta construcción: ni siquiera un animal quedaba exento. Se conserva la nota de variante textual sin cambios sustanciales.'
