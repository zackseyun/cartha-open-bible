review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y del rastro POB en casi todos los puntos: «Porque» para γάρ, «no podían soportar» para οὐκ ἔφερον, «lo que se les mandaba» para τὸ διαστελλόμενον, «un animal» para θηρίον, «el monte» para τοῦ ὄρους y «será apedreado» para λιθοβοληθήσεται. También conserva correctamente la nota sobre la variante textual y no armoniza con Éxodo añadiendo material ausente del SBLGNT. El ajuste necesario está en la cláusula condicional: para θίγῃ con Κἂν, «toca» suena menos natural y menos preciso en español bíblico-formal que «toque».'
  spanish_quality_summary: El texto es claro y digno, pero requiere una reparación menor de fluidez y modo verbal. «Si aun un animal toca el monte» suena algo áspero en español contemporáneo; «Si aun un animal toca» es comprensible, pero «Si aun un animal toque» sería incorrecto y «Si aun un animal toca» no expresa tan bien la condición eventual. La forma más natural y fiel es «Si aun un animal toca el monte» -> mejor «Si aun un animal toca el monte»? No; el mejor ajuste es «Si aun un animal toca el monte» frente al griego subjuntivo, pero en español la construcción condicional con «si» pide de modo más idiomático «si ... toca» en uso común o «si ... tocare» arcaico. Dado el registro buscado, la opción más equilibrada es cambiar el intensificador a «si hasta un animal toca el monte» o conservar «aun» y mejorar la naturalidad. La principal mejora recomendada es «Si hasta un animal toca el monte[a], será apedreado».
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Monte» para ὄρος es apropiado en contexto bíblico. La nota textual está bien ubicada en «animal[a]», aunque también podría anclarse al final de la cita; no es necesario cambiar eso.
  issues:
  - severity: medium
    issue: La cláusula «Si aun un animal toca el monte» suena poco natural en español y no refleja del todo bien el matiz condicional enfático de Κἂν + subjuntivo.
    rationale: Κἂν θηρίον θίγῃ introduce una condición eventual con matiz enfático/concesivo. En español amplio y eclesial, «si hasta un animal toca» comunica mejor la fuerza de «if even an animal touches» que «si aun un animal toca», que suena más rígido.
  - severity: low
    issue: 'La explicación léxica de θίγῃ afirma que el aoristo subjuntivo se expresa naturalmente con presente en español: «toca».'
    rationale: Aunque el presente puede funcionar en español tras «si», la formulación auditada en inglés subraya una condición simple; en español conviene revisar la justificación para no presentar como única opción una forma que aquí resulta menos elegante que una redacción ajustada con «hasta».
  revised_spanish_text: 'Porque no podían soportar lo que se les mandaba: «Si hasta un animal[a] toca el monte, será apedreado».'
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «o atravesado con una flecha», en eco de Éxodo 19:12–13.'
    reason: textual_variant
  revision_rationale: 'La revisión mantiene intacto el contenido semántico del griego y del POB inglés, pero mejora la naturalidad y precisión del español al sustituir «aun» por «hasta», que expresa mejor el énfasis de Κἂν en esta construcción: ni siquiera un animal quedaba exento. Se conserva la nota de variante textual sin cambios sustanciales.'
