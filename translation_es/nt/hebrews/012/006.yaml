translation:
  language: es
  text: Porque Yahvé disciplina al que ama, y azota[a] a todo hijo[b] que recibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flagela» o «castiga con azotes». El verbo griego es fuerte y describe una disciplina severa.
    reason: lexical_alternative
  - marker: b
    text: «Todo hijo» refleja la redacción griega; la expresión tiene fuerza representativa en el contexto, refiriéndose a los que Dios reconoce como sus hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: En este versículo la cita corresponde a lenguaje bíblico de autoridad divina; en español POB se mantiene la forma tradicional 'el Señor' cuando el texto griego usa κύριος en un dicho proverbial o escritural, sin que aquí haya una señal directa del nombre propio Yahvé en el propio verso. Se conserva la función titulativa y la naturalidad en español.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama profundamente
  - tiene amor por
  lexicon: BDAG
  rationale: '''Ama'' expresa de manera directa y natural ἀγαπάω. Mantiene el vínculo relacional sin sobreexplicar.'
- source_word: παιδεύει
  english_pob_choice: disciplines
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrige
  - educa
  - amonesta
  lexicon: BDAG
  rationale: '''Disciplina'' conserva el sentido formativo y correctivo de παιδεύω, evitando reducirlo a castigo. En español mantiene la tensión entre formación y corrección.'
- source_word: μαστιγοῖ
  english_pob_choice: scourges
  chosen_spanish: azota
  alternatives_spanish:
  - flagela
  - golpea con un látigo
  - castiga con azotes
  lexicon: BDAG
  rationale: μαστιγόω es fuerte; 'azota' transmite el golpe físico con claridad y sin suavizar el verbo. 'Flagela' sería más técnico; 'azota' es más idiomático y conserva la severidad.
- source_word: πάντα υἱὸν
  english_pob_choice: every son
  chosen_spanish: todo hijo
  alternatives_spanish:
  - cada hijo
  - todo varón hijo
  lexicon: BDAG
  rationale: Se preserva la fuerza representativa del singular masculino con 'todo hijo', siguiendo la elección del POB inglés de no neutralizar el término. En español, 'todo hijo' suena natural y conserva la imagen filial.
- source_word: παραδέχεται
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - acepta
  - da acogida a
  lexicon: BDAG
  rationale: '''Recibe'' es el equivalente más directo para παραδέχομαι en este contexto de aceptación relacional. Mantiene la concisión del original y la referencia a la acogida de hijos.'
theological_decisions:
- issue: Relación entre amor divino y disciplina severa
  english_pob_reading: The Lord disciplines the one he loves ... and he scourges every son whom he receives.
  chosen_spanish_reading: Porque el Señor disciplina al que ama, y azota a todo hijo que recibe.
  alternative_spanish_readings:
  - Porque el Señor corrige al que ama, y castiga a todo hijo que recibe.
  - Porque el Señor educa al que ama, y flagela a todo hijo que recibe.
  rationale: 'La traducción conserva la tensión teológica del texto: el amor divino no elimina la disciplina dolorosa. ''Disciplina'' y ''azota'' mantienen juntos el aspecto formativo y el severo, sin suavizar el impacto del griego.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 3 (Preserve theological tension rather than resolve it)
- issue: Renderizado de υἱός en un contexto de filiación
  english_pob_reading: every son (representative force referring to those whom God acknowledges as his children)
  chosen_spanish_reading: todo hijo
  alternative_spanish_readings:
  - todo niño
  - todo creyente
  rationale: Se preserva la filiación masculina del original y su fuerza representativa, sin convertirla en una formulación genérica que borre el término. La nota puede aclarar el alcance inclusivo en contexto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; se mantiene la solución óptima ya acordada entre el griego, la auditoría inglesa y el criterio POB. El punto más sensible sigue siendo μαστιγόω, que no debe suavizarse.
  spanish_consistency_notes:
  - Se mantiene 'Señor' como título en español, coherente con el uso reverente habitual cuando κύριος funciona como designación divina en un dicho escritural.
  - Se conserva la fuerza de 'azota' para μαστιγόω, evitando términos demasiado generales que borren la severidad del texto.
  - '''Todo hijo'' preserva el singular representativo y no sustituye innecesariamente la filiación masculina por un genérico que debilite la forma griega.'
