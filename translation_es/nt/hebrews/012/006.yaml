review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: γάρ = «Porque», παιδεύει = «disciplina», μαστιγοῖ = «azota», y mantiene «todo hijo» para πάντα υἱὸν con nota aclaratoria. Sin embargo, κύριος aquí proviene de una cita escritural de Proverbios 3:12 (LXX), donde «κύριος» representa el nombre divino; según la política del proyecto, en el texto principal en español debe preferirse «Yahvé», no «el Señor», salvo razón contextual fuerte en contrario. Además, la anclaje de notas está invertido respecto a sus contenidos: [a] está sobre «ama» pero explica «azota», y [b] está sobre «ama» aunque explica «todo hijo».'
  spanish_quality_summary: El español es claro, natural y digno. «Porque Yahvé disciplina al que ama, y azota a todo hijo que recibe» suena bien en registro bíblico moderno. La única reparación necesaria es terminológica y de colocación de notas. También conviene anclar la nota de «todo hijo» directamente sobre esa frase, no sobre «ama».
  glossary_alignment: Alineación parcial. «disciplina», «azota», «todo hijo» y «recibe» concuerdan con el rastro POB y con la filosofía léxica. Pero «el Señor» no sigue la preferencia del proyecto por «Yahvé» cuando κύριος representa el nombre divino en una cita del AT. No hay motivo suficiente aquí para apartarse de esa norma.
  issues:
  - severity: high
    issue: κύριος se tradujo «el Señor» en vez de «Yahvé».
    rationale: Hebreos 12:6 cita Proverbios 3:12; en la LXX aparece κύριος como representación del nombre divino. La política del proyecto pide «Yahvé» en el texto principal cuando el referente es el nombre divino, no la convención de enmascaramiento «SEÑOR/el Señor».
  - severity: medium
    issue: Las notas [a] y [b] están ancladas en el lugar incorrecto.
    rationale: La nota [a] explica μαστιγοῖ («azota/flagela»), no «ama»; la nota [b] explica «todo hijo», no «ama». Deben colocarse en las palabras o frases pertinentes para que el aparato sea fiel y usable.
  revised_spanish_text: Porque Yahvé disciplina al que ama, y azota[a] a todo hijo[b] que recibe.
  revised_footnotes:
  - marker: a
    text: O «flagela» o «castiga con azotes». El verbo griego es fuerte y describe una disciplina severa.
    reason: lexical_alternative
  - marker: b
    text: «Todo hijo» refleja la redacción griega; la expresión tiene fuerza representativa en el contexto, refiriéndose a los que Dios reconoce como sus hijos.
    reason: lexical_alternative
  revision_rationale: 'Se corrige «el Señor» a «Yahvé» para respetar la política terminológica del proyecto en una cita escritural donde κύριος representa el nombre divino. También se recolocan las notas en los términos que realmente comentan: [a] sobre «azota» y [b] sobre «todo hijo». No se requieren más cambios de fondo.'
