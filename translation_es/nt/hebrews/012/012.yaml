translation:
  language: es
  text: Por tanto[a], fortalezcan[b] las manos caídas y las rodillas debilitadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «levanten las manos caídas y las rodillas debilitadas». La expresión hace eco de Isaías 35:3 en la tradición griega y usa imaginería corporal para hablar de renovado ánimo y perseverancia.'
    reason: cross_reference
  - marker: b
    text: «Fortalezcan» recoge el valor exhortativo de ἀνορθώσατε; otras traducciones posibles conservan más literalmente la imagen de «levantar» o «enderezar» las manos y rodillas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - De modo que
  lexicon: BDAG
  rationale: La conjunción inferencial introduce una conclusión a partir del contexto inmediato. «Por tanto» conserva bien la relación lógica y suena natural en español bíblico sin volverse arcaizante.
- source_word: παρειμένας χεῖρας
  english_pob_choice: your drooping hands
  chosen_spanish: las manos caídas
  alternatives_spanish:
  - las manos colgantes
  - las manos flácidas
  - las manos abatidas
  lexicon: BDAG
  rationale: El participio expresa manos que están dejadas caer, laxas o decaídas. En español, «manos caídas» mantiene la imagen corporal con concisión. Se omite el posesivo explícito porque el imperativo ya dirige la exhortación al oyente y el español lo permite de forma natural.
- source_word: παραλελυμένα γόνατα
  english_pob_choice: your weakened knees
  chosen_spanish: las rodillas debilitadas
  alternatives_spanish:
  - las rodillas paralizadas
  - las rodillas desfallecidas
  - las rodillas enfermas
  lexicon: BDAG
  rationale: El participio perfecto comunica rodillas que han quedado sin fuerza. «Debilitadas» preserva la metáfora de agotamiento sin exagerar hacia una parálisis clínica que el contexto no exige.
- source_word: ἀνορθώσατε
  english_pob_choice: strengthen
  chosen_spanish: fortaleced
  alternatives_spanish:
  - levantad
  - enderezad
  - restaurad
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. En este contexto exhortativo, «fortaleced» expresa mejor el sentido de renovar vigor para perseverar, manteniendo la imagen corporal de la frase.
theological_decisions:
- issue: Imagen corporal como exhortación a perseverar
  english_pob_reading: Render the command as an exhortation to renewed strength and perseverance rather than as a literal instruction about physical posture alone.
  chosen_spanish_reading: La frase se entiende como una exhortación a renovar las fuerzas y perseverar, no solo como una instrucción literal sobre la postura física.
  alternative_spanish_readings:
  - Levantad simplemente las manos y las rodillas en sentido físico.
  - Interpretar el verso solo como corrección postural.
  rationale: El contexto de Hebreos 12 trata de resistencia, disciplina y perseverancia. La metáfora corporal comunica desaliento y cansancio espiritual; la traducción debe preservar esa función exhortativa sin diluir la imagen.
  doctrine_reference: Hebreos 12:1–13; traducción por equivalencia óptima, preservando la metáfora y su fuerza exhortativa.
translation_notes:
  revision_awareness: 'Coincide con el análisis revisado del original griego y con el audit trail inglés: el conector inferencial, la imaginería corporal y el matiz exhortativo se mantienen sin sobreinterpretar el texto. No se reportan revisiones pendientes.'
  spanish_consistency_notes:
  - Se usa «Por tanto» para la relación lógica y «fortaleced» para el imperativo exhortativo, manteniendo coherencia con un estilo bíblico moderno y digno.
  - Se conserva la metáfora corporal en español sin convertirla en una paráfrasis abstracta; la nota a aclara la alternativa más formal y el eco con Isaías 35:3.
  - Se evita «SEÑOR» y otros términos no presentes en el versículo; no hay necesidad de terminología cristológica o teológica adicional en este texto.
