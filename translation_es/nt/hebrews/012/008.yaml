base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/008.yaml
  text: But if you are without discipline[a], of which all have become partakers[b], then you are illegitimate children and not sons.
  footnotes:
  - marker: a
    text: Or 'participants' or 'partakers' in this discipline.
    reason: lexical_alternative
  - marker: b
    text: Greek 'sons'; the term reflects recognized filial status in the father's household.
    reason: cultural_note
