revisions:
- from: Pero si ustedes están sin disciplina[a], de la cual todos han llegado a ser partícipes[b], entonces son hijos ilegítimos y no hijos.
  to: Pero si ustedes están sin disciplina[a], de la cual todos han llegado a ser partícipes, entonces son hijos ilegítimos y no hijos legítimos[b].
  rationale: Se corrige únicamente la cláusula final para preservar mejor el contraste social-jurídico y teológico entre νόθοι y υἱοί sin producir una frase española torpe. 'Hijos legítimos' explicita en español el sentido de filiación reconocida que el inglés POB documentó con 'sons'. Se mantiene el resto del versículo, incluida la nota léxica sobre la participación en la disciplina.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura condicional, el sentido de παιδεία como disciplina formativa, la participación real en ella, y la inferencia final. Sin embargo, no preserva adecuadamente la decisión documentada sobre υἱοί: el griego contrasta νόθοι con υἱοί, y el rastro POB exige mantener específicamente ''sons'' por su fuerza de estatus filial reconocido en la casa del padre. En español, repetir ''hijos'' neutraliza ese contraste y hace que la cláusula final suene semánticamente plana (''hijos ilegítimos y no hijos'').'
  spanish_quality_summary: 'El español es generalmente claro y natural, pero la frase final queda poco lograda por la repetición de ''hijos''. ''Hijos ilegítimos y no hijos'' suena torpe y debilita el punto argumentativo. Una pequeña reparación mejora fidelidad y legibilidad: ''hijos ilegítimos y no hijos legítimos''.'
  glossary_alignment: No hay conflicto con los términos globales principales. 'Disciplina' para παιδεία y 'partícipes' para μέτοχοι están bien. La principal desviación es la neutralización de υἱοί, donde el expediente inglés pide conservar la noción específica de filiación reconocida; en español puede resolverse sin calco forzado mediante 'hijos legítimos'.
  issues:
  - severity: high
    issue: La cláusula final no preserva adecuadamente el contraste de υἱοί.
    rationale: El texto fuente contrasta descendencia ilegítima con filiación reconocida. 'Y no hijos' resulta redundante y semánticamente débil; además no refleja bien la justificación teológica/cultural documentada para mantener la fuerza del término filial específico.
  - severity: medium
    issue: La nota b ya no corresponde con precisión al mejor anclaje semántico en español.
    rationale: Si el texto se corrige para expresar el contraste como 'hijos legítimos', la nota debe explicar que el griego dice literalmente 'hijos/sons' y que la traducción española explicita el sentido de estatus reconocido para evitar una frase infeliz en español.
  revised_spanish_text: Pero si ustedes están sin disciplina[a], de la cual todos han llegado a ser partícipes, entonces son hijos ilegítimos y no hijos legítimos[b].
  revised_footnotes:
  - marker: a
    text: O 'participantes' o 'partícipes' en esta disciplina.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente 'hijos'; aquí se traduce 'hijos legítimos' para expresar con claridad el contraste con 'ilegítimos' y el estatus filial reconocido en la casa del padre.
    reason: cultural_note
  revision_rationale: Se corrige únicamente la cláusula final para preservar mejor el contraste social-jurídico y teológico entre νόθοι y υἱοί sin producir una frase española torpe. 'Hijos legítimos' explicita en español el sentido de filiación reconocida que el inglés POB documentó con 'sons'. Se mantiene el resto del versículo, incluida la nota léxica sobre la participación en la disciplina.
