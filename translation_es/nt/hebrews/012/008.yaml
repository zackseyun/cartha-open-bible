translation:
  language: es
  text: Pero si ustedes están sin disciplina[a], de la cual todos han llegado a ser partícipes, entonces son hijos ilegítimos y no hijos legítimos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'participantes' o 'partícipes' en esta disciplina.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente 'hijos'; aquí se traduce 'hijos legítimos' para expresar con claridad el contraste con 'ilegítimos' y el estatus filial reconocido en la casa del padre.
    reason: cultural_note
lexical_decisions:
- source_word: χωρίς
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin la
  lexicon: BDAG
  rationale: La preposición expresa ausencia o falta; en español, "sin" es la forma natural y directa en esta condición negativa.
- source_word: παιδείας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - formación
  - instrucción
  - corrección
  lexicon: BDAG
  rationale: En Hebreos 12 el término abarca formación paterna que puede incluir corrección. "Disciplina" conserva bien ese campo semántico y suena natural en español bíblico contemporáneo.
- source_word: μέτοχοι
  english_pob_choice: partakers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - partícipes
  lexicon: BDAG
  rationale: El término indica quienes comparten realmente algo. "Partícipes" comunica participación real y mantiene el tono formal de la construcción.
- source_word: γεγόνασι
  english_pob_choice: have become
  chosen_spanish: han llegado a ser
  alternatives_spanish:
  - han sido
  - han venido a ser
  lexicon: BDAG
  rationale: El perfecto señala un estado resultante; "han llegado a ser" refleja bien el proceso y el resultado presente, con naturalidad en español.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  lexicon: BDAG
  rationale: El adjetivo es inclusivo y plural. "Todos" es la equivalencia más directa y clara.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: La partícula introduce una inferencia lógica. "Entonces" funciona de manera idiomática en español y conserva esa fuerza inferencial.
- source_word: νόθοι
  english_pob_choice: illegitimate children
  chosen_spanish: hijos ilegítimos
  alternatives_spanish:
  - ilegítimos
  - bastardos
  lexicon: BDAG
  rationale: El término señala falta de estatus filial reconocido. "Hijos ilegítimos" preserva el sentido social-jurídico sin recurrir a un término más áspero o arcaico.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijos
  lexicon: BDAG
  rationale: Aunque el griego usa el término masculino filial, en español "hijos" puede expresar el estatus reconocido de descendencia/filicación de forma comprensible y menos redundante en contraste con "hijos ilegítimos".
theological_decisions:
- issue: Mantener el contraste filial entre legitimidad e ilegitimidad sin neutralizar la imagen paterna
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - hijos
  rationale: El argumento de Hebreos 12 depende de una metáfora de filiación y disciplina paterna. "Hijos" preserva la relación familiar y el contraste jurídico-social entre pertenencia y no pertenencia; en español resulta más natural que forzar una marcación masculina adicional en este contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El audit trail inglés mantuvo 'discipline' y revisó 'sharers' a 'partakers'. En español se preservó el sentido de participación real con 'partícipes'. También se atendió el contraste filial del griego νόθοι / υἱοί, pero se evitó una reproducción excesivamente masculina en la superficie española al usar 'hijos' de modo idiomático y claramente relacional.
  spanish_consistency_notes:
  - Se mantuvo 'disciplina' para παιδεία, en línea con el contexto de Hebreos 12.
  - '''Partícipes'' conserva el matiz de μέτοχοι como participación real, no meramente asociativa.'
  - '''Hijos ilegítimos'' comunica el estatus social-jurídico de νόθοι sin endurecer el registro.'
  - '''Hijos'' en español cubre la filicación reconocida del contraste con ''ilegítimos'' y evita una formulación torpe.'
  - Se usó puntuación y orden natural del español sin alterar la inferencia condicional del griego.
