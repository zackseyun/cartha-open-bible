translation:
  language: es
  text: Pero ustedes han llegado al monte Sión y a la ciudad del Dios vivo, la Jerusalén celestial, y a miríadas[a] de ángeles en asamblea festiva[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Miríadas'' puede significar ''diez millares'' o, en sentido más general, una multitud innumerable.'
    reason: lexical_alternative
  - marker: b
    text: O 'y a incontables ángeles, a una asamblea festiva'. La sintaxis griega permite entender πανηγύρει con 'ángeles' o como un elemento aparte en la serie.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  lexicon: BDAG
  rationale: Marca un contraste fuerte con el contexto anterior; en español, 'Pero' expresa bien la oposición discursiva sin sonar rígido.
- source_word: προσεληλύθατε
  english_pob_choice: you have come
  chosen_spanish: han llegado
  alternatives_spanish:
  - se han acercado
  - han venido
  lexicon: BDAG
  rationale: El perfecto expresa una condición presente resultante de una llegada ya realizada; 'han llegado' conserva ese valor y suena natural en español.
- source_word: Σιὼν ὄρει
  english_pob_choice: Mount Zion
  chosen_spanish: al monte Sion
  alternatives_spanish:
  - al monte de Sion
  - a Sion, el monte
  lexicon: BDAG
  rationale: La imagen es la de un monte propio; 'monte Sion' es la forma más clara y fiel en español.
- source_word: πόλει θεοῦ ζῶντος
  english_pob_choice: to the city of the living God
  chosen_spanish: a la ciudad del Dios vivo
  alternatives_spanish:
  - a la ciudad de Dios vivo
  - a la ciudad perteneciente al Dios vivo
  lexicon: BDAG
  rationale: La genitividad expresa posesión/pertenencia; 'Dios vivo' reproduce bien el valor teológico del participio adjetival ζῶντος sin sonar forzado.
- source_word: Ἰερουσαλὴμ ἐπουρανίῳ
  english_pob_choice: the heavenly Jerusalem
  chosen_spanish: la Jerusalén celestial
  alternatives_spanish:
  - la Jerusalén del cielo
  - la Jerusalén en los cielos
  lexicon: BDAG
  rationale: ἐπουράνιος aquí funciona como adjetivo descriptivo de Jerusalén; 'celestial' es natural, digna y mantiene la referencia al ámbito celestial.
- source_word: μυριάσιν ἀγγέλων
  english_pob_choice: to myriads of angels
  chosen_spanish: a miríadas de ángeles
  alternatives_spanish:
  - a incontables ángeles
  - a decenas de miles de ángeles
  lexicon: BDAG
  rationale: '''Miríadas'' preserva la fuerza léxica de μυριάς y deja abierta la magnitud exacta, como en el griego y en la POB inglesa.'
- source_word: πανηγύρει
  english_pob_choice: in festal gathering
  chosen_spanish: en fiesta
  alternatives_spanish:
  - en celebración festiva
  - en asamblea festiva
  lexicon: BDAG
  rationale: πανήγυρις denota una reunión festiva/celebración pública; 'en fiesta' es breve, natural y conserva el sentido celebratorio sin añadir demasiada explicación.
theological_decisions:
- issue: Relación sintáctica de πανηγύρει
  english_pob_reading: '''festal gathering'' modifies ''myriads of angels.'''
  chosen_spanish_reading: '''en fiesta'' modifica a ''miríadas de ángeles''.'
  alternative_spanish_readings:
  - '''en fiesta'' inicia un nuevo elemento: ''y a miríadas de ángeles, en fiesta'''
  - '''en asamblea festiva'' describe una realidad separada en la serie'
  rationale: La sintaxis permite más de una lectura. Se mantiene la opción de tomar πανηγύρει como complemento del grupo angélico inmediato, pero se deja constancia de la alternativa porque el griego no elimina la ambigüedad.
  doctrine_reference: Conservar la tensión sintáctica documentada sin resolverla de manera dogmática.
- issue: '''Yahvé'' no aparece explícitamente, pero θεοῦ ζῶντος presenta la identidad divina'
  english_pob_reading: the living God
  chosen_spanish_reading: el Dios vivo
  alternative_spanish_readings:
  - el Dios que vive
  rationale: El texto habla de θεοῦ, no del Tetragrámaton; por tanto corresponde 'Dios', manteniendo el epíteto 'vivo' por su peso bíblico y teológico.
  doctrine_reference: Hebreos 12:22; contraste implícito con las realidades terrenas y Sinaí en el contexto inmediato.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB, conservando la ambigüedad sintáctica de πανηγύρει y la amplitud léxica de μυριάς sin mecanizar el español.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ y no 'SEÑOR', porque el texto griego no presenta el Tetragrámaton ni κύριος en este punto.
  - Se mantiene 'miríadas' como equivalente de peso léxico para μυριάς, coherente con la POB inglesa.
  - '''Celestial'' comunica ἐπουράνιος de forma clara y digna en español bíblico contemporáneo.'
  - '''Han llegado'' refleja mejor el perfecto resultativo de προσεληλύθατε que un presente simple.'
