    reason: alternative_reading
  revision_rationale: La traducción es básicamente fiel, pero se corrigen los anclajes de notas para que cada marcador aparezca en la frase que la nota realmente comenta, y se ajusta levemente la puntuación para mayor naturalidad en español.
