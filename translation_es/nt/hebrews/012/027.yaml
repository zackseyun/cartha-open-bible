translation:
  language: es
  text: Ahora esta frase, «Aún una vez más», indica la remoción de las cosas que son sacudidas —es decir[a], cosas que han sido hechas— para que permanezcan las cosas que no son sacudidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como cosas creadas». El griego dice literalmente «como cosas que han sido hechas».
    reason: lexical_alternative
  - marker: b
    text: O «las cosas que no pueden ser sacudidas» / «lo que es inconmovible».
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ δὲ Ἔτι ἅπαξ
  english_pob_choice: Now this phrase, “Yet once more,”
  chosen_spanish: Ahora esta frase, «Aún una vez más»,
  alternatives_spanish:
  - Y esta frase, «Aún una vez más»,
  - Pero las palabras, «Aún una vez más»,
  - Ahora estas palabras, «Aún una vez más»,
  lexicon: BDAG
  rationale: 'El artículo neutro τὸ sustantiva la expresión citada; por eso conviene referirse a «esta frase». δέ introduce una transición explicativa suave, bien reflejada por «Ahora». «Ἔτι ἅπαξ» se conserva como cita: «Aún una vez más». La forma española mantiene el carácter interpretativo de la frase sin volverla más técnica de lo necesario.'
- source_word: δηλοῖ
  english_pob_choice: indicates
  chosen_spanish: indica
  alternatives_spanish:
  - significa
  - deja en claro
  - muestra
  lexicon: BDAG
  rationale: δηλόω introduce una inferencia a partir de la cita. «Indica» comunica esa función explicativa de manera natural y precisa en español.
- source_word: τῶν σαλευομένων
  english_pob_choice: of the things being shaken
  chosen_spanish: de las cosas que son sacudidas
  alternatives_spanish:
  - de las cosas que están siendo sacudidas
  - de lo que está siendo sacudido
  lexicon: BDAG
  rationale: El participio presente pasivo conserva una cualidad o estado actual de ser sacudidas. «Que son sacudidas» mantiene el paralelismo con la expresión opuesta y evita forzar una lectura exclusivamente pasada.
- source_word: μετάθεσιν
  english_pob_choice: the removal
  chosen_spanish: la remoción
  alternatives_spanish:
  - la eliminación
  - el traslado
  - el cambio
  lexicon: BDAG
  rationale: En contexto, μετάθεσις apunta a la retirada o remoción de realidades creadas y sacudibles, no simplemente a un cambio abstracto. «Remoción» preserva esa fuerza de quitar/retirar.
- source_word: ὡς πεποιημένων
  english_pob_choice: as things that have been made
  chosen_spanish: es decir, cosas que han sido hechas
  alternatives_spanish:
  - como cosas hechas
  - como cosas creadas
  lexicon: BDAG
  rationale: ὡς + participio perfecto pasivo de ποιέω explica la categoría de esas cosas como hechas. «Es decir» reproduce la función aclaratoria que el POB inglés desarrolla con esa glosa, y «cosas que han sido hechas» conserva el valor verbal del perfecto mejor que una nominalización más compacta.
- source_word: ἵνα μείνῃ
  english_pob_choice: so that ... may remain
  chosen_spanish: para que permanezcan
  alternatives_spanish:
  - a fin de que permanezcan
  - para que puedan permanecer
  lexicon: BDAG
  rationale: ἵνα expresa propósito o resultado. «Para que permanezcan» es natural en español y conserva el objetivo del enunciado.
- source_word: τὰ μὴ σαλευόμενα
  english_pob_choice: the things not being shaken
  chosen_spanish: las cosas que no son sacudidas
  alternatives_spanish:
  - las cosas que no están siendo sacudidas
  - lo no sacudible
  lexicon: BDAG
  rationale: Se conserva el contraste formal con «las cosas que son sacudidas». Aunque el inglés POB preserva el matiz participial más literal, en español «que no son sacudidas» expresa con claridad la oposición sin perder la tensión del texto, y evita adelantar la formulación más interpretativa de «no pueden ser sacudidas».
theological_decisions:
- issue: Cómo traducir τὰ μὴ σαλευόμενα sin resolver demasiado pronto la implicación teológica de permanencia
  english_pob_reading: the things not being shaken
  chosen_spanish_reading: las cosas que no son sacudidas
  alternative_spanish_readings:
  - las cosas que no pueden ser sacudidas
  - lo inconmovible
  rationale: 'El griego contrapone participios presentes: «las cosas que son sacudidas» frente a «las cosas que no son sacudidas». Mantener esa forma ayuda a no armonizar prematuramente con la idea explícita de lo inconmovible que aparece en el versículo siguiente. La tensión textual se preserva, y la implicación teológica de permanencia sigue intacta.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo reflejar el valor explicativo de ὡς πεποιημένων sin diluir el sentido de cosas creadas/hechas
  english_pob_reading: that is, things that have been made
  chosen_spanish_reading: es decir, cosas que han sido hechas
  alternative_spanish_readings:
  - como cosas que han sido hechas
  - es decir, cosas creadas
  rationale: 'La construcción griega explica qué clase de cosas son las sacudidas: cosas hechas. En español, «es decir» comunica con claridad esa glosa explicativa sin convertirla en una paráfrasis libre. Se evita reemplazar «hechas» por un término más doctrinalmente cargado que el texto no exige.'
  doctrine_reference: 'Translation philosophy §2: Preserve lexical force and documented tensions.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última lectura revisada del POB en inglés: mantiene «the things being shaken ... things that have been made ... the things not being shaken», y conserva la glosa explicativa de ὡς πεποιημένων con una construcción natural en español («es decir»). También preserva la tensión interpretativa de τὰ μὴ σαλευόμενα sin anticipar la formulación más explícita de Hebreos 12:28.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «cosas» para τὰ ... participiales, en coherencia con el paralelismo griego y con el audit trail en inglés.
  - Se evita «inconmovible» en el cuerpo principal para no resolver la lectura más literaria del participio negativo.
  - La puntuación con raya reproduce la explicación intercalada del original y del POB inglés, manteniendo fluidez en español.
