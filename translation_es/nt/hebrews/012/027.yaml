  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en la estructura principal: sustantiva correctamente la cita («esta frase»), mantiene el valor inferencial de δηλοῖ con «indica», conserva μετάθεσιν como «remoción» y respeta la tensión entre «las cosas ... sacudidas» y «las cosas ... no ... sacudidas». También refleja adecuadamente la glosa explicativa de ὡς πεποιημένων. Sin embargo, los marcadores de notas están invertidos respecto de sus anclajes semánticos: [a] está colocado tras «frase», pero su nota explica ὡς πεποιημένων; [b] está colocado tras «es decir», pero su nota trata τὰ μὴ σαλευόμενα. Eso incumple la disciplina de anclar cada nota en la palabra o frase pertinente.'
  spanish_quality_summary: El español es claro, digno y legible. «Remoción» suena algo técnico, pero es aceptable y fiel al razonamiento del pasaje. «Que son sacudidas / que no son sacudidas» preserva bien el paralelismo sin resolver de más la tensión teológica. Conviene reparar solo la ubicación de los marcadores de nota y suavizar ligeramente la puntuación con rayas para una lectura más natural en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de no usar «inconmovible» en el texto principal está alineada con la decisión inglesa de preservar el contraste participial, dejándolo como alternativa en nota.
  issues:
  - severity: medium
    issue: Los marcadores de notas al pie no están anclados a las frases correctas.
    rationale: La nota [a] explica «como cosas creadas / como cosas que han sido hechas», por lo que debe anclarse en la glosa de ὡς πεποιημένων, no en «frase». La nota [b] explica la alternativa «las cosas que no pueden ser sacudidas / lo que es inconmovible», por lo que debe anclarse en «las cosas que no son sacudidas». Reusar marcadores con anclajes incorrectos viola las instrucciones del proyecto.
  - severity: low
    issue: La puntuación con raya y coma puede pulirse.
    rationale: En español resulta más natural encerrar «es decir...» entre rayas sin coma adicional después de la segunda raya en esta oración.
