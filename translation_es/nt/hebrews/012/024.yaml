  glossary_alignment: 'La terminología clave está bien alineada: «Jesús», «mediador», «pacto» y «mejor». No hay conflicto con los defaults del proyecto. La única mejora recomendada es expresar αἵματι ῥαντισμοῦ de forma más natural en español sin perder la imagen sacrificial de la aspersión.'
