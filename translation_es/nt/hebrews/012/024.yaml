translation:
  language: es
  text: y a Jesús[a], mediador de un nuevo pacto, y a la sangre rociada por aspersión[b] que habla mejor que Abel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sangre de Abel». El griego dice simplemente «que Abel», probablemente aludiendo a la sangre de Abel que clamaba desde la tierra (Gn 4:10).
    reason: alternative_reading
  - marker: b
    text: La expresión se refiere a sangre sacrificial aplicada por aspersión, evocando la ratificación del pacto y la imagen de purificación.
    reason: cultural_note
lexical_decisions:
- source_word: διαθήκης νέας
  english_pob_choice: of a new covenant
  chosen_spanish: de un nuevo pacto
  alternatives_spanish:
  - de un nuevo convenio
  - del nuevo pacto
  lexicon: BDAG
  rationale: En Hebreos, διαθήκη lleva fuerza de pacto bíblico, no de «testamento». «Pacto» es el equivalente español más claro y fiel. El griego es anartro, por eso «un nuevo pacto» refleja bien la forma y evita imponer la identificación explícita que podría sugerir «el nuevo pacto» en el texto principal.
- source_word: μεσίτῃ
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - árbitro
  lexicon: BDAG
  rationale: «Mediador» conserva la fuerza jurídica y teológica de μεσίτης en Hebreos. «Intermediario» suena más débil o comercial; «árbitro» altera el sentido.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: convención onomástica
  rationale: Nombre propio estándar en español, sin necesidad de nota.
- source_word: αἵματι ῥαντισμοῦ
  english_pob_choice: the sprinkled blood
  chosen_spanish: la sangre de la aspersión
  alternatives_spanish:
  - la sangre rociada
  - la sangre para aspersión
  lexicon: BDAG
  rationale: La frase alude a sangre asociada con rociamiento ritual/cultual. «Aspersión» preserva el matiz sacrificial y litúrgico con un registro bíblico claro en español. «Sangre rociada» sería posible, pero «aspersión» refleja mejor el sustantivo ῥαντισμός.
- source_word: κρεῖττον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más excelente
  - superior
  lexicon: BDAG
  rationale: «Mejor» es la forma más natural y consistente para la cadena comparativa característica de Hebreos.
- source_word: λαλοῦντι
  english_pob_choice: that speaks
  chosen_spanish: que habla
  alternatives_spanish:
  - que está hablando
  - hablando
  lexicon: BDAG
  rationale: El participio presente modifica «sangre» y expresa acción continua. «Que habla» conserva la fluidez en español y el valor verbal durativo sin recargar la frase.
- source_word: παρὰ τὸν Ἅβελ
  english_pob_choice: than Abel
  chosen_spanish: que Abel
  alternatives_spanish:
  - que la sangre de Abel
  - que la sangre de Abel
  lexicon: BDAG
  rationale: El griego compara explícitamente con «Abel», no con «la sangre de Abel». Para respetar la concisión del original y no resolver del todo la alusión, se traduce «que Abel». La nota permite la lectura contextual que evoca la sangre de Abel clamando desde la tierra.
theological_decisions:
- issue: Referencia de la comparación con Abel
  english_pob_reading: The main text preserves the Greek's concise comparison, 'better than Abel,' without expanding it to 'than the blood of Abel.'
  chosen_spanish_reading: 'La traducción principal conserva la comparación breve: «mejor que Abel», sin expandirla a «que la sangre de Abel».'
  alternative_spanish_readings:
  - mejor que la sangre de Abel
  - mejor que la sangre de Abel clamando
  rationale: Aunque el contexto remite con fuerza a Génesis 4:10 y Hebreos 11:4, el texto griego nombra a Abel de forma directa. Mantener esa brevedad evita sobreinterpretar la sintaxis y preserva la tensión interpretativa, mientras una nota explica la alusión probable.
  doctrine_reference: Preservar la tensión exegética sin resolverla de más.
translation_notes:
  revision_awareness: El paquete de auditoría en inglés no mostró revisiones aplicadas y señala alto acuerdo; por eso la redacción española sigue de cerca la elección principal, conservando la brevedad de «Abel» en la comparación y el lenguaje cultual de la sangre rociada.
  spanish_consistency_notes:
  - Se usó «pacto» para διαθήκη, coherente con la terminología bíblica del proyecto.
  - Se evitó «Cristo» porque el texto griego nombra a Jesús directamente.
  - «Aspersión» mantiene el campo semántico ritual de ῥαντισμός sin caer en una paráfrasis amplia.
  - La nota sobre Abel conserva la alusión sin desplazarla del texto principal.
