translation:
  language: es
  text: Por tanto, nosotros también, teniendo a nuestro alrededor una nube tan grande de testigos, despojémonos de todo peso y del pecado que tan fácilmente nos enreda[a], y corramos con perseverancia la carrera puesta delante de nosotros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pecado que se nos pega tan de cerca' o 'el pecado que fácilmente nos atrapa'. El adjetivo griego es raro y puede destacar el enredo, la captura o el adherirse muy de cerca.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοιγαροῦν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por consiguiente
  lexicon: BDAG
  rationale: Conserva el valor inferencial conclusivo del conector, de manera natural en español y sin perder el enlace argumentativo con el capítulo anterior.
- source_word: τοσοῦτον ... νέφος μαρτύρων
  english_pob_choice: so great a cloud of witnesses
  chosen_spanish: una nube tan grande de testigos
  alternatives_spanish:
  - una nube tan grande de testigos
  - una nube tan grande de testimonios
  lexicon: BDAG
  rationale: Mantiene la imagen metafórica de 'nube' y el intensificador de τοσοῦτον. 'Testigos' sigue la decisión de la POB inglesa y permite conservar la tensión entre quienes dan testimonio con su vida y la imagen de una multitud circundante.
- source_word: περικείμενον ἡμῖν
  english_pob_choice: surrounding us
  chosen_spanish: teniendo en derredor nuestro
  alternatives_spanish:
  - rodeándonos
  - que nos rodea
  lexicon: BDAG
  rationale: Expresa la idea espacial de estar alrededor de nosotros. 'En derredor nuestro' suena más natural y preserva la metáfora sin volverla pesada.
- source_word: μάρτυρων
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - mártires
  - testificantes
  lexicon: BDAG
  rationale: '''Testigos'' reproduce el sentido amplio de los fieles de Hebreos 11 como quienes dan testimonio. Se evita ''mártires'' porque aquí no está exigido por el contexto inmediato ni por el uso léxico principal.'
- source_word: ὄγκον πάντα
  english_pob_choice: every weight
  chosen_spanish: todo peso
  alternatives_spanish:
  - toda carga
  - todo estorbo
  lexicon: BDAG
  rationale: '''Peso'' conserva la metáfora atlética de algo que estorba o ralentiza al corredor. ''Todo'' reproduce el alcance distributivo de πάντα.'
- source_word: ἀποθέμενοι
  english_pob_choice: laying aside
  chosen_spanish: despojémonos
  alternatives_spanish:
  - dejemos a un lado
  - quitémonos
  lexicon: BDAG
  rationale: El participio aoristo con valor previo/exhortativo pide un giro imperativo vigoroso. 'Despojémonos' comunica una renuncia decisiva y es idiomático en español bíblico contemporáneo.
- source_word: εὐπερίστατον
  english_pob_choice: that so easily entangles
  chosen_spanish: que tan fácilmente nos enreda
  alternatives_spanish:
  - que tan fácilmente nos atrapa
  - que se nos pega tan fácilmente
  - que fácilmente nos ensnara
  lexicon: BDAG
  rationale: La forma rara es semánticamente ambigua; en la metáfora de la carrera, 'nos enreda' comunica bien el obstáculo práctico. Se conserva 'tan fácilmente' para reflejar la fuerza del adverbio y la facilidad del enredo.
- source_word: ἁμαρτίαν
  english_pob_choice: the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  - este pecado
  lexicon: BDAG
  rationale: El artículo griego sugiere una referencia concreta o tipificada; 'el pecado' conserva esa particularización sin especificarlo más de lo que el texto permite.
- source_word: δι’ ὑπομονῆς
  english_pob_choice: with endurance
  chosen_spanish: con perseverancia
  alternatives_spanish:
  - con paciencia
  - con resistencia
  lexicon: BDAG
  rationale: '''ὑπομονή'' combina constancia y resistencia bajo presión. ''Perseverancia'' transmite bien la idea en español e ilumina el aspecto activo de mantenerse firmes en la carrera.'
- source_word: τρέχωμεν
  english_pob_choice: let us run
  chosen_spanish: corramos
  alternatives_spanish:
  - corramos adelante
  - sigamos corriendo
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se vuelve de forma natural a un imperativo inclusivo en español. 'Corramos' es conciso y fiel al tono exhortativo.
- source_word: τὸν προκείμενον ἡμῖν ἀγῶνα
  english_pob_choice: the race set before us
  chosen_spanish: la carrera puesta delante de nosotros
  alternatives_spanish:
  - la contienda puesta delante de nosotros
  - la lucha puesta delante de nosotros
  lexicon: BDAG
  rationale: Aunque ἀγών puede significar contienda o lucha, el contexto inmediato de 'correr' hace que 'carrera' sea la equivalencia más coherente. 'Puesta delante de nosotros' preserva la idea de algo asignado o colocado frente al creyente.
theological_decisions:
- issue: Sentido de 'testigos' en relación con Hebreos 11
  english_pob_reading: Those whose lives bear witness to faith, with the surrounding image contributing to the exhortation
  chosen_spanish_reading: Quienes dan testimonio por su vida de fe, con la imagen de la nube rodeando y exhortando a los creyentes
  alternative_spanish_readings:
  - Espectadores celestiales observando la carrera de los creyentes
  - Simplemente ejemplos del pasado sin valor de testimonio
  rationale: La carta remite a los héroes de Hebreos 11 como testimonio de fidelidad. La traducción conserva 'testigos' y la imagen envolvente sin convertirlos explícitamente en espectadores, preservando la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica e interpretativa en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: 'El texto sigue el consenso del audit trail inglés sin cambios sustantivos respecto de la lectura previa: se mantiene la metáfora de la nube, el valor conclusivo de Τοιγαροῦν, la ambigüedad de εὐπερίστατον y la carrera como imagen dominante para ἀγών. Se conservaron las decisiones ya validadas en los pases de revisión sin introducir armonizaciones doctrinales adicionales.'
  spanish_consistency_notes:
  - Se usó 'testigos' y no 'mártires' para respetar la amplitud del término y la lectura auditada.
  - '''Despojémonos'' mantiene el tono exhortativo colectivo del plural inclusivo.'
  - '''Perseverancia'' comunica mejor ὑπομονή en español bíblico moderno que un calco más literal.'
  - La nota [a] se ancla en 'enreda' para reflejar la ambigüedad léxica del adjetivo griego raro.
