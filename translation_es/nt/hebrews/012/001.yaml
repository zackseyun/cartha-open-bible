  text: Τοιγαροῦν καὶ ἡμεῖς, τοσοῦτον ἔχοντες περικείμενον ἡμῖν νέφος μαρτύρων, ὄγκον ἀποθέμενοι πάντα καὶ τὴν εὐπερίστατον ἁμαρτίαν, δι’ ὑπομονῆς τρέχωμεν τὸν προκείμενον ἡμῖν ἀγῶνα,
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/001.yaml
  text: Therefore[a], since we also have so great a cloud of witnesses surrounding us, laying aside every weight and the sin that so easily entangles, let us run with endurance the race set before us,
  footnotes:
