translation:
  language: es
  text: que no haya nadie sexualmente inmoral[a] ni profano[b], como Esaú, que por una sola comida vendió sus propios derechos de primogenitura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inmoral sexualmente». El griego designa a una persona caracterizada por inmoralidad sexual.
    reason: lexical_alternative
  - marker: b
    text: O «irreverente» o «impío». βέβηλος puede referirse a quien trata como común lo que es santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τις
  english_pob_choice: that no one be
  chosen_spanish: que no haya nadie
  alternatives_spanish:
  - que nadie sea
  - para que no haya nadie
  lexicon: SBLGNT; flujo exhortativo de Hebreos
  rationale: La construcción griega funciona como advertencia exhortativa; en español, 'que no haya nadie' conserva el valor preventivo sin sonar rígido.
- source_word: πόρνος
  english_pob_choice: sexually immoral
  chosen_spanish: inmoral sexualmente
  alternatives_spanish:
  - sexualmente inmoral
  - fornicario
  - impuro sexualmente
  lexicon: BDAG
  rationale: El término designa a una persona caracterizada por inmoralidad sexual. 'Inmoral sexualmente' es claro y amplio; evita restringir indebidamente el sentido a una sola práctica.
- source_word: βέβηλος
  english_pob_choice: profane
  chosen_spanish: profano
  alternatives_spanish:
  - impío
  - irreverente
  - común
  lexicon: BDAG
  rationale: '''Profano'' reproduce de cerca la oposición entre lo santo y lo tratado como común. En español, además, mantiene la tensión lexical sin reducirla a mera grosería o secularidad.'
- source_word: ὡς Ἠσαῦ
  english_pob_choice: like Esau
  chosen_spanish: como Esaú
  alternatives_spanish:
  - igual que Esaú
  - al estilo de Esaú
  lexicon: BDAG
  rationale: La comparación es directa y nominativa; 'como Esaú' es natural y fiel al griego.
- source_word: ἀντὶ βρώσεως μιᾶς
  english_pob_choice: for a single meal
  chosen_spanish: por una sola comida
  alternatives_spanish:
  - a cambio de una sola comida
  - por una sola comida
  lexicon: BDAG
  rationale: '''βρῶσις'' aquí apunta a comida en el contexto de la transacción; ''por una sola comida'' preserva la idea de intercambio y la trivialidad del costo.'
- source_word: ἀπέδετο
  english_pob_choice: sold
  chosen_spanish: vendió
  alternatives_spanish:
  - cedió
  - traspasó
  - entregó
  lexicon: BDAG
  rationale: El verbo expresa una cesión por intercambio. 'Vendió' es el equivalente español más claro y preciso en este contexto.
- source_word: τὰ πρωτοτόκια ἑαυτοῦ
  english_pob_choice: his own birthright
  chosen_spanish: sus propios derechos de primogenitura
  alternatives_spanish:
  - su primogenitura
  - el derecho de primogenitura que le pertenecía
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en español conviene explicitar el contenido jurídico-relacional con 'derechos de primogenitura'. 'Sus propios' refleja ἑαυτοῦ y subraya posesión previa.
theological_decisions:
- issue: Caracterización moral de Esaú por βέβηλος
  english_pob_reading: Rendered as 'profane' to stay closer to the lexical force of βέβηλος.
  chosen_spanish_reading: profano
  alternative_spanish_readings:
  - impío
  - irreverente
  - profanador
  rationale: La elección conserva el contraste bíblico entre lo santo y lo tratado como común. 'Profano' es suficientemente cercano al griego y no introduce una interpretación más estrecha que la del texto.
  doctrine_reference: Hebreos 12:16; conservación del contraste entre santidad y desprecio de lo sagrado.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la advertencia exhortativa y la lectura de βέβηλος como 'profane' tras una revisión desde 'godless' por mayor precisión léxica. En español se conserva esa precisión con 'profano', y se refleja la amplitud de πόρνος mediante una formulación clara y no reducida.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y no hay términos divinos en el versículo.
  - '''Primogenitura'' se mantiene como término técnico bíblico, con explicitación de ''derechos'' para claridad española.'
  - El tono es admonitorio y continuo con el contexto de Hebreos 12.
