translation:
  language: es
  text: Porque ellos nos disciplinaban por pocos días[a], según les parecía[b]; pero él lo hace para nuestro beneficio, para que participemos de su santidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un corto tiempo». La frase griega subraya la duración limitada de la disciplina humana, en contraste con el propósito perdurable de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «según les parecía correcto».
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς ὀλίγας ἡμέρας
  english_pob_choice: for a few days
  chosen_spanish: por pocos días
  alternatives_spanish:
  - por un corto tiempo
  - por unos pocos días
  lexicon: BDAG
  rationale: La expresión apunta a una duración limitada y contrastiva frente al propósito permanente de Dios. «Por pocos días» conserva la brevedad temporal con español natural y sin perder la fuerza idiomática.
- source_word: κατὰ τὸ δοκοῦν αὐτοῖς
  english_pob_choice: as seemed best to them
  chosen_spanish: según les parecía
  alternatives_spanish:
  - según lo que les parecía mejor
  - como les parecía correcto
  lexicon: BDAG
  rationale: δοκοῦν expresa valoración subjetiva o juicio aparente. «Según les parecía» mantiene esa perspectiva sin afirmar que el criterio humano fuera moralmente correcto.
- source_word: ἐπαίδευον
  english_pob_choice: disciplined
  chosen_spanish: disciplinaban
  alternatives_spanish:
  - corregían
  - educaban
  - formaban
  lexicon: BDAG
  rationale: En Hebreos 12, παιδεύω tiene el sentido de disciplina formativa/paterna, no solo castigo. «Disciplinaban» reproduce mejor ese campo semántico en español bíblico moderno.
- source_word: ὁ δὲ
  english_pob_choice: but he does so
  chosen_spanish: pero él lo hace
  alternatives_spanish:
  - pero él
  - pero Dios lo hace
  lexicon: BDAG
  rationale: El sujeto implícito es Dios por el contexto. «Lo hace» conserva la elipsis del griego y evita añadir el nombre divino donde el texto lo deja implícito.
- source_word: ἐπὶ τὸ συμφέρον
  english_pob_choice: for our benefit
  chosen_spanish: para nuestro beneficio
  alternatives_spanish:
  - para nuestro bien
  - para lo que nos conviene
  lexicon: BDAG
  rationale: La frase expresa finalidad orientada a ventaja o provecho. «Para nuestro beneficio» es claro y conserva el matiz teleológico del original.
- source_word: εἰς τὸ μεταλαβεῖν
  english_pob_choice: so that we may share in
  chosen_spanish: para que participemos de
  alternatives_spanish:
  - para que compartamos de
  - a fin de participar de
  lexicon: BDAG
  rationale: μεταλαμβάνω indica participar de, tener parte en algo. «Participemos de» es natural en español y mantiene el sentido de participación real, no meramente observación.
- source_word: τῆς ἁγιότητος
  english_pob_choice: holiness
  chosen_spanish: su santidad
  alternatives_spanish:
  - su santidad divina
  - su santidad
  lexicon: BDAG
  rationale: ἁγιότης denota la cualidad de santidad. «Santidad» es el equivalente normal y más claro en este contexto teológico.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Dios
  lexicon: BDAG
  rationale: El pronombre se refiere a Dios por el contexto inmediato. «Su» sigue de cerca el griego y preserva la referencia implícita sin sobreexplicarla.
theological_decisions:
- issue: Referencia del sujeto contrastivo implícito en ὁ δὲ
  english_pob_reading: The subject is God, rendered pronominally as 'he' rather than explicitly as 'God.'
  chosen_spanish_reading: El sujeto implícito se entiende como Dios, pero se mantiene con pronombre («él») en lugar de explicitar «Dios».
  alternative_spanish_readings:
  - pero Dios lo hace
  - pero él
  rationale: El contexto de Hebreos 12:5–11 contrasta a los padres terrenales con Dios como Padre. Mantener la implícita referencia respeta la sintaxis griega y la progresión retórica del pasaje.
  doctrine_reference: Hebreos 12:5–11; Translation philosophy §1, §6
- issue: Participación en «su santidad»
  english_pob_reading: Renderedin as believers sharing in God's holiness without specifying a denominational doctrine of sanctification.
  chosen_spanish_reading: La frase se traduce como participación real en la santidad de Dios, sin limitarla a una sola explicación doctrinal del proceso de santificación.
  alternative_spanish_readings:
  - santidad posicional
  - santificación progresiva
  rationale: El versículo afirma el propósito de la disciplina divina, pero no define mecánicamente cómo ocurre esa participación. La traducción conserva esa tensión teológica sin imponer un marco sectario.
  doctrine_reference: Hebreos 12:10–11; Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del POB en inglés, que quedó sin cambios tras la última revisión. Se conservaron las decisiones auditadas sobre duración limitada, juicio subjetivo, disciplina formativa, propósito benéfico y participación en la santidad divina.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto cuando corresponde, pero en este versículo el referente divino aparece por pronombre implícito y no requiere explicitación.
  - Se eligió «disciplinaban» para mantener el paralelismo con el contexto inmediato de Hebreos 12, donde la disciplina paterna es temática central.
  - «Participemos de su santidad» conserva el genitivo personal y la idea de compartir una cualidad divina, sin convertirla en una explicación doctrinal más estrecha de lo que el versículo dice.
  - Se mantuvo un registro bíblico moderno y sobrio, evitando calcos innecesarios pero sin suavizar la tensión entre disciplina humana temporal y propósito divino permanente.
