translation:
  language: es
  text: Cuídense de no rechazar al que habla. Porque si aquellos no escaparon cuando rechazaron al que les daba advertencia divina[a] en la tierra, mucho menos escaparemos nosotros si nos apartamos del que habla desde los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al que los advertía en la tierra». El verbo griego puede denotar instrucción o advertencia con autoridad divina.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mucho más nosotros, los que nos apartamos del que [habla] desde los cielos»; el griego deja implícito el verbo «escapar» de la cláusula anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: See to it
  chosen_spanish: Miren que
  alternatives_spanish:
  - Tengan cuidado de
  - Vean a ello
  lexicon: BDAG
  rationale: El imperativo plural funciona como advertencia/exhortación. «Miren que» conserva el tono de vigilancia y resulta natural en español, sin perder la fuerza pastoral de la exhortación.
- source_word: μὴ παραιτήσησθε
  english_pob_choice: that you do not refuse
  chosen_spanish: no rechacen
  alternatives_spanish:
  - no rehúsen
  - no se nieguen a escuchar
  - no declinen
  lexicon: BDAG
  rationale: παραιτέομαι puede significar rehusar, rechazar o declinar. «Rechacen» comunica bien la negativa a aceptar la palabra y mantiene la relación verbal con «rechazaron» en la cláusula siguiente.
- source_word: τὸν λαλοῦντα
  english_pob_choice: the one who is speaking
  chosen_spanish: al que habla
  alternatives_spanish:
  - al que está hablando
  - al hablante
  lexicon: BDAG
  rationale: El participio presente indica habla en curso. «Al que habla» conserva esa inmediatez y suena más natural que una formulación más rígida.
- source_word: ἐξέφυγον
  english_pob_choice: did not escape
  chosen_spanish: no escaparon
  alternatives_spanish:
  - no se libraron
  - no huyeron
  lexicon: BDAG
  rationale: El verbo expresa escapar o librarse de las consecuencias. «No escaparon» reproduce directamente la idea del texto y mantiene el vínculo lógico con la advertencia.
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la esfera terrenal
  lexicon: BDAG
  rationale: La frase contrasta con «desde los cielos». «En la tierra» conserva ese contraste espacial de manera clara en español sin especificar más de lo que dice el texto.
- source_word: παραιτησάμενοι
  english_pob_choice: when they refused
  chosen_spanish: cuando rechazaron
  alternatives_spanish:
  - al rechazar
  - después de rechazar
  lexicon: BDAG
  rationale: El aoristo medio participio comparte el campo semántico de negativa/rehuso con παραιτήσησθε. «Cuando rechazaron» expresa bien la circunstancia histórica y mantiene la repetición retórica del verbo.
- source_word: τὸν χρηματίζοντα
  english_pob_choice: the one who warned them
  chosen_spanish: al que los advertía
  alternatives_spanish:
  - al que les daba advertencia divina
  - al que les hablaba como oráculo
  - al que les dio advertencia
  lexicon: BDAG
  rationale: χρηματίζω puede denotar comunicación o advertencia de carácter divino. En este contexto de contraste con la voz celestial, «advertía» comunica la función admonitoria sin sobreespecificar en el texto principal.
- source_word: πολὺ μᾶλλον
  english_pob_choice: much less
  chosen_spanish: mucho menos
  alternatives_spanish:
  - con mucha más razón no
  - cuánto más
  lexicon: BDAG
  rationale: En una argumentación de menor a mayor con sentido negativo, «mucho menos» reproduce la lógica idiomática en español mejor que una construcción literal de «mucho más».
- source_word: ἡμεῖς οἱ ... ἀποστρεφόμενοι
  english_pob_choice: if we turn away
  chosen_spanish: nosotros, los que nos apartamos
  alternatives_spanish:
  - nosotros, los que nos volvemos atrás
  - si nos apartamos
  - nosotros, los que nos desviamos
  lexicon: BDAG
  rationale: El participio funciona de manera sustantiva y describe a un grupo caracterizado por apartarse. «Los que nos apartamos» mantiene ese valor y deja explícita la condición implícita de la advertencia.
- source_word: τὸν ἀπ’ οὐρανῶν
  english_pob_choice: from the one who warns from heaven
  chosen_spanish: del que viene de los cielos
  alternatives_spanish:
  - del que está en los cielos
  - del que habla desde los cielos
  - del celestial
  lexicon: BDAG
  rationale: La expresión contrasta con «en la tierra». «De los cielos» conserva el plural del griego y el contraste con la esfera terrenal; «viene» ayuda en español a enlazar naturalmente con el participio anterior sin afirmar más de lo que el griego dice.
theological_decisions:
- issue: Identidad del que habla/advierte
  english_pob_reading: Render generically as 'the one who is speaking' / 'the one who warned ... from heaven' without explicitly inserting 'God' or 'Christ' in the main text.
  chosen_spanish_reading: Se traduce de manera genérica como «al que habla» / «al que los advertía ... de los cielos», sin añadir explícitamente «Dios» o «Cristo» en el texto principal.
  alternative_spanish_readings:
  - Dios hablando desde el cielo
  - Cristo como el que habla desde los cielos
  rationale: El contexto apunta a una voz divina, pero el versículo usa descripciones participiales, no un nombre propio. Mantener la formulación genérica evita resolver prematuramente una identificación que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El pasaje fue revisado en la línea de la versión inglesa POB de filosofía optimal-equivalence, sin cambios recientes en el último pase; esta propuesta conserva el paralelismo de la advertencia, la repetición léxica de «rechazar», y la elipsis final que el español debe suavizar para ser legible.
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar οὐρανῶν y sostener el contraste con «tierra».
  - Se evita sustituir el lenguaje de advertencia por formulaciones eclesiásticas tradicionales que oculten el filo del verbo παραιτέομαι.
  - «Miren que» y «mucho menos» buscan un español natural sin perder la estructura exhortativa y argumentativa del griego.
  - Se conserva el matiz de proceso en «al que habla»; la nota ofrece la alternativa «al que está hablando» para quienes prefieran enfatizar más el presente continuo.
