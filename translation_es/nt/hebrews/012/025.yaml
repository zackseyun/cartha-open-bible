revisions:
- from: Miren que no rechacen al que habla[a]. Porque si aquellos no escaparon cuando rechazaron al que los advertía en la tierra[b], mucho menos nosotros, los que nos apartamos del que viene de los cielos.
  to: Cuídense de no rechazar al que habla. Porque si aquellos no escaparon cuando rechazaron al que les daba advertencia divina[a] en la tierra, mucho menos escaparemos nosotros si nos apartamos del que habla desde los cielos[b].
  rationale: Se corrige una adición semántica importante («viene») para reflejar correctamente la procedencia «desde los cielos», y se explicita en español el verbo elíptico «escaparemos» para conservar el sentido completo y la claridad del argumento. También se mejora el registro con «Cuídense de» y se reubican/ajustan las notas para que correspondan a los puntos léxicos realmente documentados por el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura exhortativa y gran parte del sentido del griego: Βλέπετε μὴ παραιτήσησθε se refleja adecuadamente, se conserva la repetición de «rechazar», y «mucho menos» transmite bien la lógica del argumento. Sin embargo, hay dos desalineaciones importantes con el texto fuente y con el rastro auditado en inglés: (1) τὸν ἀπ’ οὐρανῶν no significa «del que viene de los cielos», sino «del que [habla/advierte] desde el cielo/los cielos»; «viene» introduce una idea no presente. (2) La cláusula final en español queda demasiado nominal («nosotros, los que nos apartamos...») y omite la elipsis verbal que el inglés POB explicitó; en español conviene suplir «escaparemos» o equivalente para preservar el sentido completo. Además, la nota b está anclada en la frase equivocada y no explica la alternativa léxica de χρηματίζοντα que el inglés preserva en la nota a.'
  spanish_quality_summary: El español es claro y legible, pero «Miren que» suena algo coloquial/regional para un registro bíblico panhispánico; «Cuídense de» o «Asegúrense de que» encaja mejor con tono digno y natural. «Del que viene de los cielos» resulta poco idiomático en contexto y semánticamente incorrecto. La frase revisada con verbo explícito mejora fluidez y comprensión.
  glossary_alignment: No hay conflicto con términos teológicos del glosario principal. La decisión de mantener referencia genérica al hablante es correcta. Sí hay que alinear mejor el valor de τὸν ἀπ’ οὐρανῶν como procedencia/origen del discurso («desde los cielos»/«desde el cielo») y no como venida. También conviene mantener la alternativa documentada para χρηματίζοντα en nota.
  issues:
  - severity: high
    issue: «del que viene de los cielos» no corresponde a τὸν ἀπ’ οὐρανῶν
    rationale: ἀπό + genitivo aquí expresa procedencia/origen del hablar o advertir («desde el cielo/los cielos»), no movimiento de venir. «Viene» agrega contenido ajeno al griego y altera el contraste con «en la tierra».
  - severity: high
    issue: La cláusula final omite en español el sentido completo de la elipsis
    rationale: El griego deja implícito «escapar», pero el inglés POB lo suple para claridad. En español, «mucho menos nosotros, los que nos apartamos...» queda truncado y puede sonar a aposición sin desenlace. Debe decirse algo como «mucho menos escaparemos nosotros si nos apartamos...».
  - severity: medium
    issue: La nota b está anclada en la frase equivocada y no preserva la alternativa relevante del inglés sobre χρηματίζοντα
    rationale: La nota inglesa a ofrece la alternativa «the one who gave divine warning on earth». En español conviene una nota sobre «al que les daba advertencia divina en la tierra» o similar, mientras la nota sobre la elipsis debe anclarse en la cláusula final.
  - severity: low
    issue: «Miren que» puede sonar demasiado coloquial para el registro objetivo
    rationale: Aunque comprensible, en una Biblia de registro moderno y digno suena mejor «Cuídense de» o «Tengan cuidado de».
  revised_spanish_text: Cuídense de no rechazar al que habla. Porque si aquellos no escaparon cuando rechazaron al que les daba advertencia divina[a] en la tierra, mucho menos escaparemos nosotros si nos apartamos del que habla desde los cielos[b].
  revised_footnotes:
  - marker: a
    text: O «al que los advertía en la tierra». El verbo griego puede denotar instrucción o advertencia con autoridad divina.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mucho más nosotros, los que nos apartamos del que [habla] desde los cielos»; el griego deja implícito el verbo «escapar» de la cláusula anterior.
    reason: lexical_alternative
  revision_rationale: Se corrige una adición semántica importante («viene») para reflejar correctamente la procedencia «desde los cielos», y se explicita en español el verbo elíptico «escaparemos» para conservar el sentido completo y la claridad del argumento. También se mejora el registro con «Cuídense de» y se reubican/ajustan las notas para que correspondan a los puntos léxicos realmente documentados por el POB inglés.
