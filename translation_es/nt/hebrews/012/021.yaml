  rationale: Se ajusta τὸ φανταζόμενον a un español que exprese claramente el fenómeno visible del Sinaí, se preserva con mayor fidelidad la distinción entre ἔκφοβος y ἔντρομος, y se mejora la naturalidad sintáctica del español sin alterar el sentido.
