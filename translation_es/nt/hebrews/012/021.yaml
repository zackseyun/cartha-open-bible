translation:
  language: es
  text: 'Y tan terrible era lo que se veía[a] que Moisés dijo[b]: «Estoy lleno de temor y temblando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que aparecía» o «el espectáculo». La expresión griega se refiere a la manifestación visible en el Sinaí.
    reason: lexical_alternative
  - marker: b
    text: La redacción no es una cita verbal literal del Antiguo Testamento, sino que refleja la respuesta temerosa de Moisés asociada con el episodio del Sinaí; compárese Deuteronomio 9:19.
    reason: cross_reference
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y así
  lexicon: BDAG
  rationale: Se conserva la simple conexión narrativa del contexto anterior; en español, «Y» comunica mejor la continuidad que una fórmula más pesada.
- source_word: οὕτω
  english_pob_choice: so
  chosen_spanish: así de
  alternatives_spanish:
  - tan
  - de tal manera
  lexicon: BDAG
  rationale: El adverbio intensifica el predicado. «Así de» expresa grado de forma natural en español y evita un calco rígido.
- source_word: φοβερὸν
  english_pob_choice: terrifying
  chosen_spanish: terrible
  alternatives_spanish:
  - aterradora
  - espantosa
  - temible
  lexicon: BDAG
  rationale: El griego describe lo sobrecogedor y temible de la escena. «Terrible» mantiene la fuerza emotiva en español sin sonar artificial; el matiz se completa con el contexto y con «aterrado» en la respuesta de Moisés.
- source_word: τὸ φανταζόμενον
  english_pob_choice: the sight
  chosen_spanish: la visión
  alternatives_spanish:
  - lo que se veía
  - el espectáculo
  - lo aparecido
  lexicon: BDAG
  rationale: El participio alude a la manifestación visible en Sinaí. «La visión» es una solución natural y fiel al énfasis en lo visto, sin reducirlo a una mera abstracción.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: N/A
  rationale: Forma estable y estándar en español bíblico.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: BDAG
  rationale: Verbo narrativo directo y natural en español.
- source_word: Ἔκφοβός εἰμι
  english_pob_choice: I am fearful
  chosen_spanish: Estoy aterrado
  alternatives_spanish:
  - Estoy muy asustado
  - Estoy lleno de temor
  - Estoy temblando de miedo
  lexicon: BDAG
  rationale: ἔκφοβος expresa estar muy asustado/terrificado. «Aterrado» comunica con fuerza ese estado interior y suena idiomático en español.
- source_word: καὶ ἔντρομος
  english_pob_choice: and trembling
  chosen_spanish: y temblando
  alternatives_spanish:
  - y estremecido
  - y lleno de temblor
  lexicon: BDAG
  rationale: ἔντρομος añade la idea de temblor físico. «Temblando» preserva ese componente sin forzar una repetición innecesaria.
theological_decisions:
- issue: Relación de la cita con la narración del Sinaí
  english_pob_reading: The wording is not a verbatim quotation from the Old Testament but reflects Moses’ fearful response associated with the Sinai event; compare Deut 9:19.
  chosen_spanish_reading: La frase se presenta como la respuesta de Moisés ante la manifestación aterradora del Sinaí, sin intentar fijarla en la cita exacta del Antiguo Testamento en el cuerpo del texto.
  alternative_spanish_readings:
  - Tratarla como una cita literal de Deuteronomio 9:19
  - Explicarla como una paráfrasis libre de la tradición del Sinaí
  rationale: El texto griego y el audit trail en inglés preservan la tensión intertextual en vez de resolverla. La traducción principal debe reflejar esa relación de manera sencilla, dejando la precisión textual para una nota.
  doctrine_reference: Preservar la tensión intertextual sin armonización excesiva.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la respuesta de Moisés para reflejar por separado ἔκφοβός (''fearful/terrified'') y ἔντρομος (''trembling''). Por eso el español conserva dos elementos coordinados: ''aterrado'' y ''temblando''.'
  spanish_consistency_notes:
  - Se mantiene 'Moisés' como forma estándar del nombre propio.
  - Se traduce la manifestación visible como 'visión' para conservar el referente perceptible de τὸ φανταζόμενον.
  - Se evita resolver la relación con el texto del Antiguo Testamento dentro del versículo principal; esa aclaración queda en nota.
  - Se conserva una distinción semántica entre el estado interior de miedo ('aterrado') y la reacción física ('temblando').
