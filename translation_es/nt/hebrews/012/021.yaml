review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la escena del Sinaí era sumamente aterradora y Moisés expresó miedo y temblor. También conserva adecuadamente las dos notas del audit trail inglés. Sin embargo, «la visión» puede sugerir experiencia interna/visionaria más que manifestación visible, y «Estoy aterrado» intensifica un poco más de lo necesario frente a ἔκφοβός, donde el inglés auditado prefirió «fearful» para dejar distinguido el segundo adjetivo «trembling».'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y más ajustado al matiz griego con «lo que se veía» en lugar de «la visión», y con «Estoy lleno de temor y temblando» para mantener los dos adjetivos sin comprimir ni sobredramatizar el primero. La sintaxis también mejora ligeramente al omitir la coma antes de «que».
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Los nombres y el registro están bien. La principal cuestión es léxica: τὸ φανταζόμενον se representa mejor como fenómeno visible («lo que se veía») que como «visión», y ἔκφοβος conviene verterlo con una expresión de temor intenso que no absorba ἔντρομος.'
  issues:
  - severity: medium
    issue: «la visión» para τὸ φανταζόμενον
    rationale: El participio se refiere a lo visible/lo que aparecía en Sinaí. «La visión» en español puede entenderse como visión profética o experiencia mental, mientras que el audit trail enfatiza «the sight / what appeared». «Lo que se veía» preserva mejor ese valor visible.
  - severity: medium
    issue: «Estoy aterrado» sobrerrepresenta ἔκφοβός y reduce la distinción con ἔντρομος
    rationale: 'El inglés revisado corrigió precisamente para mantener dos componentes: «fearful» y «trembling». «Aterrado» es posible, pero en conjunto con «y temblando» puede sonar más interpretativo e intensificado. «Estoy lleno de temor y temblando» conserva mejor el desdoblamiento semántico.'
  - severity: low
    issue: Coma antes de «que»
    rationale: En español fluye mejor «Y tan terrible era ... que...» sin la coma, salvo pausa enfática especial no necesaria aquí.
  revised_spanish_text: 'Y tan terrible era lo que se veía[a] que Moisés dijo[b]: «Estoy lleno de temor y temblando».'
  revised_footnotes:
