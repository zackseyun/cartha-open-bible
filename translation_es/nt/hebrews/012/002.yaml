translation:
  language: es
  text: fijando nuestra mirada en Jesús[a], el pionero y consumador de la fe, quien, por el gozo puesto delante de él, soportó la cruz, despreciando la vergüenza[b] y se ha sentado a la diestra del trono de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pionero y consumador de la fidelidad», o «el pionero y consumador de nuestra fe». La expresión griega es compacta, y πίστις también puede entenderse como «fidelidad» o como referencia específica a la fe de los creyentes.
    reason: alternative_reading
  - marker: b
    text: O «desestimando la vergüenza». La idea es que trató la deshonra de la crucifixión como algo que no era determinante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφορῶντες
  english_pob_choice: fixing our eyes on
  chosen_spanish: fijando nuestra mirada en
  alternatives_spanish:
  - mirando a
  - manteniendo la mirada puesta en
  lexicon: BDAG
  rationale: El participio expresa atención sostenida y dirigida hacia un objeto. «Fijando nuestra mirada en» conserva la idea de enfoque continuo de manera natural en español, sin reducirlo a una simple mirada momentánea.
- source_word: ἀρχηγὸν
  english_pob_choice: pioneer
  chosen_spanish: pionero
  alternatives_spanish:
  - fundador
  - líder
  - autor
  - origen
  lexicon: BDAG
  rationale: ἀρχηγός puede referirse a quien inicia o abre el camino. «Pionero» comunica bien la idea de ir delante e inaugurar el recorrido, y encaja con el contexto exhortativo y de carrera de la carta.
- source_word: τελειωτὴν
  english_pob_choice: perfecter
  chosen_spanish: perfeccionador
  alternatives_spanish:
  - consumador
  - completador
  - finisher
  lexicon: BDAG
  rationale: El sustantivo apunta a quien lleva algo a su meta o plenitud. «Perfeccionador» conserva la relación con la culminación teleológica mejor que un simple «finalizador».
- source_word: τῆς πίστεως
  english_pob_choice: of faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de nuestra fe
  - de la fidelidad
  lexicon: BDAG
  rationale: La forma gramatical no exige «nuestra». Mantener «de la fe» respeta la concisión del griego y deja abierta la relación semántica entre la fe de los creyentes y la fidelidad perseverante, tal como lo preserva el POB en inglés.
- source_word: ἀντὶ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  - debido a
  lexicon: BDAG
  rationale: '«Por» expresa bien la motivación o propósito que el contexto desarrolla: Jesús soportó la cruz con el gozo puesto delante de él como perspectiva operante. «En lugar de» sería demasiado fuerte y sugeriría una oposición no exigida por el pasaje.'
- source_word: προκειμένης αὐτῷ χαρᾶς
  english_pob_choice: the joy set before him
  chosen_spanish: el gozo puesto delante de él
  alternatives_spanish:
  - el gozo que tenía delante
  - el gozo presentado ante él
  lexicon: BDAG
  rationale: La imagen es de algo colocado delante como motivo de perseverancia. «Puesto delante de él» preserva esa espacialidad metafórica con claridad en español.
- source_word: ὑπέμεινεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - perseveró bajo
  - sostuvo con paciencia
  lexicon: BDAG
  rationale: El verbo denota resistencia firme bajo sufrimiento. «Soportó» es breve, directo y fiel al matiz de aguante perseverante en este contexto.
- source_word: σταυρὸν
  english_pob_choice: the cross
  chosen_spanish: la cruz
  alternatives_spanish:
  - una cruz
  lexicon: BDAG
  rationale: 'Aunque el griego no lleva artículo, el referente es definido por el contexto: la crucifixión de Jesús. El español natural exige «la cruz».'
- source_word: αἰσχύνης καταφρονήσας
  english_pob_choice: despising the shame
  chosen_spanish: despreciando la vergüenza
  alternatives_spanish:
  - desestimando la vergüenza
  - desdeñando la vergüenza
  lexicon: BDAG
  rationale: καταφρονέω expresa considerar algo como de poco peso. «Despreciando la vergüenza» mantiene la fuerza del POB inglés y la dureza retórica del original, sin suavizar el escándalo de la crucifixión.
- source_word: ἐν δεξιᾷ ... τοῦ θρόνου τοῦ θεοῦ
  english_pob_choice: at the right hand of the throne of God
  chosen_spanish: a la diestra del trono de Dios
  alternatives_spanish:
  - a la derecha del trono de Dios
  - junto al trono de Dios, a su derecha
  lexicon: BDAG
  rationale: «A la diestra» conserva la idiomática bíblica de honor y autoridad, y reproduce con dignidad la imagen exaltada del texto.
- source_word: κεκάθικεν
  english_pob_choice: has sat down
  chosen_spanish: se ha sentado
  alternatives_spanish:
  - está sentado
  - se sentó
  lexicon: BDAG
  rationale: El perfecto subraya una acción completada con resultado permanente. «Se ha sentado» preserva ese valor aspectual de manera natural en español.
theological_decisions:
- issue: Sentido de τῆς πίστεως en la expresión «ἀρχηγὸν καὶ τελειωτὴν»
  english_pob_reading: Jesús es presentado como el pionero y perfeccionador de la fe, con πίστις vertido como «faith» y no como «faithfulness» o «our faith» en el texto principal.
  chosen_spanish_reading: Jesús es el pionero y perfeccionador de la fe.
  alternative_spanish_readings:
  - Jesús es el pionero y perfeccionador de la fidelidad.
  - Jesús es el pionero y perfeccionador de nuestra fe.
  rationale: El griego es compacto y permite más de una relación semántica. En el texto principal se mantiene «de la fe», siguiendo el valor doctrinal por defecto y sin añadir un posesivo no explícito. Las otras opciones se conservan como posibilidades reales, no resueltas dogmáticamente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for πίστις'
- issue: Fuerza de ἀντὶ τῆς προκειμένης αὐτῷ χαρᾶς
  english_pob_reading: Jesús soportó la cruz con el gozo puesto delante de él como perspectiva motivadora.
  chosen_spanish_reading: Jesús soportó la cruz por el gozo puesto delante de él.
  alternative_spanish_readings:
  - Jesús soportó la cruz en lugar del gozo puesto delante de él.
  - Jesús soportó la cruz a causa del gozo puesto delante de él.
  rationale: Aunque ἀντί puede significar «en lugar de», el contexto de perseverancia hacia una meta favorece una lectura de motivación o finalidad. «Por» en español comunica bien esa relación sin introducir una contraposición innecesaria.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; contextual syntax of ἀντί'
translation_notes:
  revision_awareness: La versión revisada más reciente fue marcada como sin cambios, con alto grado de acuerdo entre revisiones; por eso esta propuesta mantiene la lectura estable del POB inglés y conserva las alternativas donde el griego admite tensión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo contiene θεός y por eso se traduce «Dios».
  - Se conserva «Jesús» para Ἰησοῦν conforme al estándar del proyecto.
  - Se usa «fe» en el texto principal y se reserva «fidelidad» como alternativa, siguiendo la tensión auditada en el material inglés.
  - Se traduce σχήμη/αἰσχύνη como «vergüenza» y no se atenúa el lenguaje de la cruz.
  - La fórmula «a la diestra» se conserva por su valor bíblico de honor, autoridad y entronización.
