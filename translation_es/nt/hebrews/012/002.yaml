  text: ἀφορῶντες εἰς τὸν τῆς πίστεως ἀρχηγὸν καὶ τελειωτὴν Ἰησοῦν, ὃς ἀντὶ τῆς προκειμένης αὐτῷ χαρᾶς ὑπέμεινεν σταυρὸν αἰσχύνης καταφρονήσας, ἐν δεξιᾷ τε τοῦ θρόνου τοῦ θεοῦ κεκάθικεν.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/002.yaml
  text: fixing our eyes on Jesus[a], the pioneer and perfecter of faith, who for the joy set before him endured the cross, despising the shame[b], and has sat down at the right hand of the throne of God.
  footnotes:
  - marker: a
    text: Or 'the pioneer and perfecter of faithfulness,' or 'the pioneer and perfecter of our faith.' The Greek phrase is compact, and πίστις can also be understood as 'faithfulness' or as referring specifically to believers' faith.
    reason: alternative_reading
  - marker: b
    text: Or 'disregarding the shame.' The sense is that he treated the disgrace of crucifixion as something not decisive.
    reason: lexical_alternative
