translation:
  language: es
  text: Porque nuestro Dios es fuego consumidor[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eco de Deuteronomio 4:24, donde Dios es descrito como «fuego consumidor».
    reason: cross_reference
  - marker: b
    text: 'O: «un fuego que consume».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γάρ introduce una explicación o razón para la advertencia anterior; en español, «Porque» comunica de manera natural esa fuerza causal/explanatoria. El καί se absorbe, como en el inglés POB, para evitar una coordinación artificial.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - el Dios nuestro
  lexicon: BDAG
  rationale: La posesión comunitaria se conserva con la forma idiomática española «nuestro Dios», que refleja bien el sentido de pertenencia y alianza del griego.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: BDAG
  rationale: «Fuego» es la correspondencia directa y conserva la metáfora bíblica sin interpretarla ni suavizarla.
- source_word: καταναλίσκον
  english_pob_choice: consuming
  chosen_spanish: consumidor
  alternatives_spanish:
  - que consume
  - devorador
  - consumiente
  lexicon: BDAG
  rationale: El participio presente describe al fuego por su acción continua. «Consumidor» mantiene el valor adjetival y la fuerza de acción en una forma natural en español, preservando el eco de la fórmula bíblica tradicional sin perder el sentido verbal.
theological_decisions:
- issue: Metáfora de Dios como fuego
  english_pob_reading: 'Retain the metaphor directly: ''our God is a consuming fire'''
  chosen_spanish_reading: 'Retener la metáfora directamente: «nuestro Dios es fuego consumidor»'
  alternative_spanish_readings:
  - nuestro Dios es como fuego consumidor
  - nuestro Dios es un fuego que consume
  rationale: El griego presenta una cláusula equativa sin partícula comparativa; por eso conviene conservar la afirmación metafórica sin convertirla en símil. Esto mantiene el tono de advertencia y el eco de Deuteronomio 4:24.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La revisión final del inglés POB no introdujo cambios: se mantuvo la lectura directa y la equivalencia óptima del sintagma metafórico. La versión española sigue ese mismo enfoque, con ajuste idiomático natural en español.'
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene la metáfora sin añadir un comparativo explícito.
  - «Consumidor» se usa como adjetivo predicativo para reflejar el participio presente καταναλίσκον y su eco intertextual con la formulación bíblica conocida.
