translation:
  language: es
  text: Busquen la paz con todos, y la santidad[a], sin la cual nadie verá al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificación». El término griego puede referirse tanto a la santidad como cualidad de vida como a la santificación como estado o proceso de ser hecho santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz mutua
  - reconciliación
  lexicon: BDAG
  rationale: εἰρήνη en este marco exhortativo y comunitario apunta a la paz relacional con otras personas. «Paz» es el equivalente natural y fiel en español; «reconciliación» explicita demasiado el proceso, y «paz mutua» añade una precisión que el griego no dice.
- source_word: διώκετε
  english_pob_choice: Pursue
  chosen_spanish: Perseveren en
  alternatives_spanish:
  - Busquen
  - Procuren
  lexicon: BDAG
  rationale: διώκω conserva la idea de buscar con empeño. En español, «perseguir la paz» puede sonar ambiguo o agresivo; «perseveren en» comunica el esfuerzo continuo requerido por el mandato, aunque desplaza la metáfora. Se mantiene la fuerza exhortativa sin perder naturalidad.
- source_word: μετὰ πάντων
  english_pob_choice: with everyone
  chosen_spanish: con todos
  alternatives_spanish:
  - con todos los hombres
  - con todos las personas
  lexicon: BDAG
  rationale: La expresión abarca a todas las personas. «Con todos» es idiomático en español y conserva el alcance universal sin sobreespecificar género o introducir pesadez estilística.
- source_word: τὸν ἁγιασμόν
  english_pob_choice: the holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la santificación
  lexicon: BDAG
  rationale: ἁγιασμός puede referirse a santificación o a santidad como estado/calidad de vida. En este contexto exhortativo, «la santidad» comunica de forma clara y natural la cualidad ética y consagrada en vista. Se preserva la referencia específica con el artículo «la».
- source_word: οὗ χωρὶς
  english_pob_choice: without which
  chosen_spanish: sin la cual
  alternatives_spanish:
  - sin la que
  - aparte de la cual
  lexicon: BDAG
  rationale: El relativo singular femenino concuerda naturalmente con «la santidad». «Sin la cual» reproduce con claridad la dependencia absoluta expresada por χωρὶς y es plenamente idiomático en español.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: οὐδείς expresa negación absoluta de personas. «Nadie» es la correspondencia natural y directa en español.
- source_word: ὄψεται
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - contemplará
  - podrá ver
  lexicon: BDAG
  rationale: El futuro de ὁράω aquí significa ver. «Verá» es la opción más simple y fiel; «contemplará» eleva el registro innecesariamente y «podrá ver» añade una posibilidad que no está en el texto.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor Jesús
  lexicon: BDAG
  rationale: κύριος se conserva como título divino/Señor sin resolver más allá de lo que el texto dice. En español, el acusativo con artículo definido se rinde naturalmente como «al Señor». Se mantiene la ambigüedad reverente del pasaje, sin especificar entre Dios Padre o Jesucristo.
theological_decisions:
- issue: Sentido de ἁγιασμός en un mandato exhortativo
  english_pob_reading: Rendered as 'holiness' rather than 'sanctification.'
  chosen_spanish_reading: «la santidad» en vez de «la santificación»
  alternative_spanish_readings:
  - la santificación
  rationale: En este contexto la exhortación apunta a una vida marcada por la consagración y la pureza moral. «Santidad» comunica mejor el resultado/estado ético en español contemporáneo; «santificación» es teológicamente válido, pero puede sonar más técnico o procesual de lo que aquí exige el versículo.
  doctrine_reference: Translation philosophy §§5–6
- issue: Referente de «el Señor»
  english_pob_reading: Left as 'the Lord' without specifying God the Father or the Lord Jesus.
  chosen_spanish_reading: «el Señor» sin precisar más
  alternative_spanish_readings:
  - Dios
  - el Señor Jesús
  rationale: El texto griego sólo dice κύριον. La traducción conserva la indeterminación del original y evita resolver una identificación que el versículo no explicita.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés; no hubo revisiones aplicadas en la versión base. La decisión principal fue adaptar «Pursue» a un español natural sin perder el impulso exhortativo, y reflejar la ambigüedad de ἁγιασμός con una nota breve.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» sólo cuando el texto fuente lo exigiera; aquí aparece κύριος y se tradujo como «el Señor» según el audit trail inglés y la práctica establecida para este término en este contexto.
  - Se preservó el registro bíblico contemporáneo y digno, evitando calcos innecesarios como «persigan» en sentido literal que podrían sonar extraños en español.
  - La nota al pie se ancla en «paz» porque el inglés POB colocó la nota alternativa de ἁγιασμός en el segundo sustantivo; en español se mantiene la misma estrategia de anclaje textual en la frase correspondiente.
