translation:
  language: es
  text: Porque no os habéis acercado[a] a lo que puede tocarse, y a un fuego ardiente, y a la oscuridad y a la lobreguez y a la tormenta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a un monte que puede tocarse». Sinaí es el referente implícito por el contexto circundante, pero «monte» no se dice explícitamente en el griego de este versículo.
    reason: alternative_reading
  - marker: b
    text: 'O: «a lo que puede tocarse, a un fuego ardiente, y a la oscuridad y a la lobreguez y a la tormenta».'
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque no
  alternatives_spanish:
  - Pues no
  - Porque ... no
  lexicon: BDAG
  rationale: γάρ conserva fuerza explicativa; en español, «Porque» comunica bien la relación con el contexto previo. La negación se coloca antes del verbo para un orden natural en español sin perder el alcance de Οὐ.
- source_word: προσεληλύθατε
  english_pob_choice: you have not come
  chosen_spanish: os habéis acercado
  alternatives_spanish:
  - habéis llegado
  - os habéis aproximado
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante; «os habéis acercado» conserva esa idea relacional de acceso/proximidad mejor que un simple pasado puntual. «Acercarse» también suena más natural en español bíblico contemporáneo que «venir» en este contexto.
- source_word: ψηλαφωμένῳ
  english_pob_choice: what can be touched
  chosen_spanish: lo que puede tocarse
  alternatives_spanish:
  - lo tangible
  - algo que puede tocarse
  lexicon: BDAG
  rationale: El participio neutro no introduce explícitamente «monte» en el verso griego. «Lo que puede tocarse» mantiene la indeterminación del sustantivo implícito y el valor de «tangible/tocable» sin sobreespecificar.
- source_word: κεκαυμένῳ πυρὶ
  english_pob_choice: a blazing fire
  chosen_spanish: un fuego ardiente
  alternatives_spanish:
  - un fuego abrasador
  - un fuego encendido
  lexicon: BDAG
  rationale: La combinación participial con πῦρ describe fuego en estado de arder. «Fuego ardiente» preserva la imagen y suena natural en español, manteniendo el tono acumulativo del listado.
- source_word: γνόφῳ
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad espesa
  lexicon: BDAG
  rationale: γνόφος suele denotar oscuridad densa o sombría. «Oscuridad» es la opción base más clara en español y deja espacio para distinguir el término siguiente sin forzar una interpretación más precisa de la que el griego exige aquí.
- source_word: ζόφῳ
  english_pob_choice: gloom
  chosen_spanish: la penumbra
  alternatives_spanish:
  - la sombra
  - las tinieblas
  lexicon: BDAG
  rationale: ζόφος expresa una oscuridad sombría, opaca. «Penumbra» permite diferenciarlo de γνόφος en español y conserva la progresión retórica de densidad oscura sin añadir un significado no atestiguado.
- source_word: θυέλλῃ
  english_pob_choice: storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el temporal
  - la tempestad
  lexicon: BDAG
  rationale: θύελλα designa una tormenta violenta o tempestad. «Tormenta» es clara y ampliamente entendible en español contemporáneo, y mantiene la culminación de la serie climática/teofánica.
theological_decisions:
- issue: Si debe suplirse «monte» como referente implícito de la imagen de Sinaí
  english_pob_reading: Do not supply 'mountain' in the main text; render the Greek as an unspecified tangible reality.
  chosen_spanish_reading: No suplir «monte» en el texto principal; dejar la referencia implícita en «lo que puede tocarse».
  alternative_spanish_readings:
  - a un monte que puede tocarse
  - al monte que puede tocarse
  rationale: Aunque el contexto inmediato identifica claramente a Sinaí, el griego de este versículo no dice ὄρει. La redacción principal mantiene la primacía del texto original y evita introducir un sustantivo ausente; la referencia contextual puede quedar en nota.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve contextual tension rather than resolving it in the main text.'
translation_notes:
  revision_awareness: 'El inglés POB revisó la estructura repetida de la lista para reflejar mejor la serie griega con καί, manteniendo la negación inicial y evitando introducir un «monte» no explícito. La versión española sigue esa decisión: conserva la enumeración acumulativa con paralelismo simple y no añade sustantivos ausentes del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece aquí; no hay decisión terminológica correspondiente.
  - Se mantiene un registro sobrio y bíblico moderno, evitando calcos excesivamente rígidos.
  - La serie de sustantivos conserva el efecto retórico de acumulación sin explicar la imagen más allá de lo que el griego ofrece.
