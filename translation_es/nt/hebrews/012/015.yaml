review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: vigilancia comunitaria, advertencia de que nadie quede sin alcanzar/participe insuficientemente de la gracia de Dios, la imagen de la raíz de amargura que brota y causa perturbación, y el resultado de contaminación/impureza en muchos. Sin embargo, varias elecciones españolas no preservan con suficiente naturalidad o precisión el matiz del original y del rastro POB en inglés.'
  spanish_quality_summary: 'El español es entendible, pero contiene giros poco naturales o débiles para registro bíblico: «se quede corto de» suena calcado; «brotando hacia arriba» es torpe; «cause molestia» rebaja demasiado ἐνοχλῇ; y «contaminados» pierde parte del registro bíblico-moral de μιανθῶσιν frente a «sean contaminados»/«queden contaminados» o mejor «sean manchados/contaminados», aunque aquí conviene mantener una formulación más bíblica. También la nota [a] dice «llegue a la gracia», que no refleja bien la alternativa inglesa ‘fail to obtain’.'
  glossary_alignment: Se mantiene bien «gracia» para χάρις y «Dios» para θεοῦ. No hay conflictos con Yahvé/Mesías. La decisión para μιαίνω debería alinearse mejor con el rationale teológico POB que prefiere lenguaje de ‘defiled’; en español, «sean contaminados» es aceptable pero menos bíblico que «sean manchados» o «queden contaminados». La mejor mejora principal es ajustar otras frases de naturalidad sin apartarse del glosario.
  issues:
  - severity: medium
    issue: «para que nadie se quede corto de la gracia de Dios» es poco natural en español
    rationale: Aunque intenta reflejar ‘fall short of’, en español suena calcado. «No deje de alcanzar la gracia de Dios» o «no alcance la gracia de Dios» transmite mejor el valor de ὑστερῶν ἀπό sin forzar el idioma.
  - severity: medium
    issue: La nota [a] dice «que nadie llegue a la gracia de Dios»
    rationale: «Llegue a» no refleja con precisión la alternativa inglesa ‘fail to obtain’; además omite la idea de obtener/alcanzar algo ofrecido. Debe corregirse a «no alcance» o «no llegue a obtener».
  - severity: low
    issue: «brotando hacia arriba» suena rígido y redundante
    rationale: ἄνω φύουσα describe surgir o brotar; «que brota» o «al brotar» expresa la imagen con naturalidad en español sin perder el sentido.
  - severity: medium
    issue: «cause molestia» debilita ἐνοχλῇ
    rationale: El verbo implica perturbar/causar problemas, no mera incomodidad ligera. «Cause problemas» o «cause perturbación» conserva mejor la fuerza comunitaria.
  - severity: low
    issue: «muchos sean contaminados» es comprensible pero no ideal para registro bíblico
    rationale: μίαίνω tiene matiz moral/cultual. «Muchos sean contaminados» es válido, pero con las demás mejoras conviene una formulación más natural y seria; se mantiene aquí por claridad, aunque también podría considerarse «muchos queden contaminados».
  revised_spanish_text: vigilando cuidadosamente, para que nadie deje de alcanzar la gracia de Dios[a], para que ninguna raíz de amargura[b], al brotar, cause problemas y, por medio de ella, muchos sean contaminados.
  revised_footnotes:
