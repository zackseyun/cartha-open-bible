translation:
  language: es
  text: vigilando cuidadosamente, para que nadie deje de alcanzar la gracia de Dios[a], para que ninguna raíz de amargura[b], al brotar, cause problemas y, por medio de ella, muchos sean contaminados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que nadie se quede corto de la gracia de Dios». La expresión griega puede denotar tanto no alcanzar lo ofrecido como quedarse corto de ello.'
    reason: lexical_alternative
  - marker: b
    text: «Raíz de amargura» probablemente alude a Deuteronomio 29:18, donde una raíz venenosa simboliza la infidelidad del pacto que se extiende dentro de la comunidad.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισκοποῦντες
  english_pob_choice: watching carefully
  chosen_spanish: vigilando cuidadosamente
  alternatives_spanish:
  - velando atentamente
  - observando cuidadosamente
  - cuidando con vigilancia
  lexicon: BDAG
  rationale: El participio expresa una vigilancia activa de supervisión. «Vigilando cuidadosamente» conserva ese sentido de atención continua sin volverlo institucional o rígido en español.
- source_word: μή τις ὑστερῶν ἀπὸ τῆς χάριτος τοῦ θεοῦ
  english_pob_choice: lest anyone fall short of the grace of God
  chosen_spanish: para que nadie se quede corto de la gracia de Dios
  alternatives_spanish:
  - para que nadie falte a la gracia de Dios
  - para que nadie no alcance la gracia de Dios
  - para que nadie quede sin la gracia de Dios
  lexicon: BDAG
  rationale: ὑστερέω con ἀπό permite la idea de no alcanzar o quedarse corto de lo ofrecido. «Se quede corto» mantiene la advertencia sin resolver el debate doctrinal sobre pérdida, rechazo o no obtención de la gracia.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: Aquí el uso es claramente teológico y relacional; «gracia» preserva mejor el peso bíblico y eclesial del término que «favor».
- source_word: ῥίζα πικρίας
  english_pob_choice: root of bitterness
  chosen_spanish: raíz de amargura
  alternatives_spanish:
  - raíz amarga
  - raíz de resentimiento
  lexicon: BDAG
  rationale: La construcción genitiva se traduce de manera natural como «raíz de amargura», manteniendo el eco bíblico y la imagen vegetal del texto.
- source_word: ἄνω φύουσα
  english_pob_choice: springing up
  chosen_spanish: brotando hacia arriba
  alternatives_spanish:
  - surgiendo
  - brotando
  - creciendo hacia arriba
  lexicon: BDAG
  rationale: El participio describe un brotar/emergir con dirección ascendente. «Brotando hacia arriba» conserva la imagen verbal y evita suavizar el cuadro metafórico.
- source_word: ἐνοχλῇ
  english_pob_choice: cause trouble
  chosen_spanish: cause molestia
  alternatives_spanish:
  - cause problema
  - perturbe
  - incomode
  lexicon: BDAG
  rationale: El verbo indica causar trastorno o inquietud. «Molestia» comunica el efecto comunitario de forma natural en español, sin perder la idea de perturbación real.
- source_word: δι’ αὐτῆς
  english_pob_choice: through it
  chosen_spanish: por medio de ella
  alternatives_spanish:
  - a través de ella
  - mediante ella
  - por ella
  lexicon: BDAG
  rationale: El pronombre femenino remite a la «raíz». «Por medio de ella» expresa con claridad la mediación instrumental de διά y evita ambigüedad de referencia en español.
- source_word: μιανθῶσιν πολλοί
  english_pob_choice: many be defiled
  chosen_spanish: muchos sean contaminados
  alternatives_spanish:
  - muchos sean defilados
  - muchos sean manchados
  - muchos queden contaminados
  lexicon: BDAG
  rationale: μιαίνω puede tener fuerza moral o cultual. En español, «contaminados» comunica una contaminación real y comunitaria; se mantiene la gravedad del verbo sin forzar un tecnicismo poco natural.
theological_decisions:
- issue: Cómo renderizar la advertencia sobre «quedarse corto» de la gracia de Dios sin cerrar la tensión doctrinal
  english_pob_reading: Renderized neutrally as 'fall short of the grace of God'
  chosen_spanish_reading: «que nadie se quede corto de la gracia de Dios»
  alternative_spanish_readings:
  - «que nadie falte a la gracia de Dios»
  - «que nadie no alcance la gracia de Dios»
  - «que nadie quede sin la gracia de Dios»
  rationale: La frase española preserva la advertencia del griego y la lectura POB sin imponer una conclusión sobre perseverancia, apostasía o mera falta de acceso inicial. Mantiene la tensión textual documentada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Si el resultado de la raíz de amargura debe expresarse como simple molestia social o como contaminación moral/cultual
  english_pob_reading: Retained 'defiled'
  chosen_spanish_reading: «muchos sean contaminados»
  alternative_spanish_readings:
  - «muchos sean corrompidos»
  - «muchos sean manchados»
  - «muchos queden impuros»
  rationale: El griego μιαίνω tiene fuerza moral/cultual, no solo social. «Contaminados» mantiene el peso de una afectación seria y comunitaria, acorde con la advertencia del texto.
  doctrine_reference: Mantener la seriedad moral y comunitaria de la defilement language.
translation_notes:
  revision_awareness: La redacción sigue el pasaje fuente SBLGNT y el rastro auditado de la POB en inglés, manteniendo sin resolver la tensión semántica de ὑστερῶν ἀπό y conservando la imagen fuerte de una raíz que contamina a muchos. No se aplicaron revisiones adicionales respecto del último pase documentado.
  spanish_consistency_notes:
  - Se usa «gracia de Dios» de manera uniforme para χάρις τοῦ θεοῦ.
  - Se mantiene «raíz de amargura» como expresión fija para ῥίζα πικρίας.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino.
  - «Contaminados» se escogió para conservar la fuerza de μιαίνω sin recurrir a un tecnicismo poco natural en español.
  - Las notas al pie marcan solo alternativas y referencias documentadas, sin introducir lecturas no atestiguadas.
