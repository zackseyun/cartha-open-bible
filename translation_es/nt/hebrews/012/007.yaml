translation:
  language: es
  text: Perseveren para su disciplina[a]; Dios los trata como a hijos[b]. Porque, ¿qué hijo hay al que un padre no discipline?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Perseveren considerándolo disciplina». El griego puede entenderse como un llamado a perseverar con miras a la disciplina, o a considerar lo que se soporta como disciplina.'
    reason: alternative_reading
  - marker: b
    text: El griego dice «hijos». La imagen paterna del argumento conserva esa forma masculina, aunque la aplicación no se limita a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς παιδείαν
  english_pob_choice: for discipline
  chosen_spanish: bajo la disciplina
  alternatives_spanish:
  - para disciplina
  - como disciplina
  - para que sean disciplinados
  lexicon: BDAG
  rationale: La preposición εἰς con παιδείαν admite un matiz final o resultativo. En español, «bajo la disciplina» comunica con naturalidad que el endurecimiento debe ser asumido dentro del ámbito disciplinario de Dios, sin forzar una paráfrasis excesiva. «Para disciplina» suena menos idiomático; «como disciplina» podría sugerir más directamente la lectura interpretativa, pero deja menos claro el sentido relacional del contexto.
- source_word: ὑπομένετε
  english_pob_choice: Endure
  chosen_spanish: Permanezcan
  alternatives_spanish:
  - Sopórtenlo
  - Enduren
  - Permanezcan firmes
  lexicon: BDAG
  rationale: El verbo puede funcionar aquí como exhortación. «Permanezcan» conserva la idea de resistencia perseverante sin añadir un objeto explícito que el griego no expresa. «Sopórtenlo» introduce un objeto; «Enduren» es posible, pero en español puede sonar más abstracto. «Permanezcan firmes» añade una aclaración interpretativa.
- source_word: ὡς υἱοῖς
  english_pob_choice: as with sons
  chosen_spanish: como a hijos
  alternatives_spanish:
  - como hijos
  - como a hijos varones
  - como a sus hijos
  lexicon: BDAG
  rationale: 'La comparación es relacional: Dios los trata en el modo en que un padre trata a sus hijos. «Como a hijos» mantiene la analogía paternal y suena natural en español. «Como hijos» también es posible, pero «como a hijos» evita ambigüedad sintáctica. «Como a sus hijos» añade un posesivo que no está explícito en el griego.'
- source_word: υἱοῖς
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos/descendientes
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva «sons» para reflejar la imagen padre-hijo, en español «hijos» transmite de manera idiomática el mismo marco familiar sin requerir un masculino marcado que puede sonar forzado en el argumento. La tensión de género se conserva por la pareja padre-hijo del contexto, y la nota explica que la imagen no limita la aplicación a varones.
- source_word: προσφέρεται
  english_pob_choice: is dealing with
  chosen_spanish: los trata
  alternatives_spanish:
  - está obrando con ustedes
  - los está tratando
  - se conduce con ustedes
  lexicon: BDAG
  rationale: 'En esta forma medio/pasiva, el sentido es relacional y idiomático: Dios actúa hacia ellos de una cierta manera. «Los trata» es natural en español y mantiene el valor de trato/relación. «Se conduce con ustedes» es más literal pero menos fluido. Se evita «presenta» porque sería engañoso.'
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Es el sujeto nominativo normal; no requiere tratamiento especial. «Dios» es el equivalente estándar y claro en español.
- source_word: τίς γὰρ υἱὸς
  english_pob_choice: For what son is there
  chosen_spanish: ¿qué hijo hay
  alternatives_spanish:
  - ¿qué hijo existe
  - ¿qué hijo es el que
  lexicon: BDAG
  rationale: La pregunta retórica se vuelve natural en español con «¿qué hijo hay…?». Preserva el carácter argumentativo de la frase sin introducir una construcción demasiado rígida.
- source_word: ὃν οὐ παιδεύει πατήρ
  english_pob_choice: whom a father does not discipline
  chosen_spanish: al que su padre no discipline
  alternatives_spanish:
  - al que un padre no disciplina
  - al que su padre no disciplina ni corrige
  - a quien el padre no disciplina
  lexicon: BDAG
  rationale: Se mantiene el vínculo léxico con παιδεία mediante «disciplina». El artículo posesivo «su» hace natural la relación filial en español, aunque el griego no lo exprese de forma explícita; funciona aquí como referencia genérica al padre de ese hijo. Se evita «corrige» como base principal porque debilita la correspondencia con παιδεία/παιδεύει.
theological_decisions:
- issue: Imagen padre-hijo y lenguaje de género
  english_pob_reading: Retain 'sons' in the main text; the application is not limited to males.
  chosen_spanish_reading: Usar «hijos» en el texto principal y aclarar que la aplicación no se limita a varones.
  alternative_spanish_readings:
  - conservar «hijos varones»
  - neutralizar a «niños» o «descendientes»
  rationale: En español, «hijos» comunica de manera más natural la relación familiar y conserva la imagen de filiación sin sonar artificial. La nota puede explicar que la aplicación del pasaje alcanza a toda la comunidad creyente, mientras la metáfora padre-hijo permanece intacta.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Matiz de παιδεία / παιδεύω
  english_pob_reading: discipline
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - formación
  - instrucción
  - corrección
  rationale: El campo semántico abarca formación correctiva y educativa. «Disciplina» es la opción más apta para mantener el enlace léxico dentro del versículo y la fuerza disciplinaria del contexto de Hebreos 12. «Formación» o «instrucción» suavizan demasiado la dimensión correctiva; «corrección» estrecha el alcance.
  doctrine_reference: BDAG / coherencia léxica contextual
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y no se detectaron revisiones posteriores que exigieran cambio; la formulación española conserva el vínculo léxico entre παιδεία / παιδεύω y mantiene la pregunta retórica del original.
  spanish_consistency_notes:
  - Se usa «disciplina» de forma consistente para παιδεία / παιδεύω.
  - «Dios» se mantiene como sujeto sin sustituciones devocionales.
  - La imagen padre-hijo se conserva sin neutralizar el género del texto fuente, pero la nota aclara la amplitud de aplicación.
  - El estilo es publicable y natural en español, sin depender mecánicamente del orden del inglés.
