review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura general del versículo y mantiene la relación léxica entre παιδεία / παιδεύει con «disciplina/discipline». Sin embargo, «Permanezcan bajo la disciplina» no representa con suficiente precisión ὑπομένετε ni el valor de εἰς παιδείαν; desplaza la idea de soportar/perseverar hacia simplemente permanecer. Además, «su padre» añade un posesivo no explícito donde el inglés auditado prefirió correctamente «a father».
  spanish_quality_summary: El español es legible, pero «Permanezcan bajo la disciplina» suena algo forzado y menos idiomático que una exhortación directa como «Perseveren para su disciplina» o similar. La nota [a] también necesita ajustarse para reflejar mejor la alternativa inglesa «Endure this as discipline». El resto del verso fluye bien y la nota sobre «hijos» es adecuada.
  glossary_alignment: Hay buena alineación con el glosario en «Dios», «hijos» y «disciplina». No obstante, la decisión de traducir ὑπομένετε como «Permanezcan» debilita el campo semántico de soportar/perseverar. También conviene evitar «su padre» para no sobretraducir frente a πατήρ sin posesivo.
  issues:
  - severity: high
    issue: «Permanezcan» no refleja bien ὑπομένετε
    rationale: ὑπομένετε en este contexto exhorta a soportar/perseverar bajo pruebas. «Permanezcan» puede sugerir mera permanencia o estabilidad, no el acto de soportar con aguante.
  - severity: high
    issue: «bajo la disciplina» no corresponde bien a εἰς παιδείαν
    rationale: La auditoría inglesa justifica un sentido «para disciplina» con alternativa «como disciplina». «Bajo la disciplina» introduce una imagen espacial/estativa que no reproduce bien el matiz final/resultativo de εἰς.
  - severity: medium
    issue: La nota [a] formula de manera imprecisa la alternativa
    rationale: «Permanezcan como bajo disciplina» no representa naturalmente la lectura alternativa; es mejor algo como «Perseveren considerándolo disciplina» o «Perseveren en esto como disciplina».
  - severity: medium
    issue: «su padre» añade información no explícita
    rationale: El griego dice simplemente πατήρ, y la auditoría inglesa prefirió «a father» precisamente para evitar especificar un posesivo ausente.
  revised_spanish_text: Perseveren para su disciplina[a]; Dios los trata como a hijos[b]. Porque, ¿qué hijo hay al que un padre no discipline?
