revisions:
- from: Permanezcan bajo la disciplina[a]; Dios los trata como a hijos[b]. Porque, ¿qué hijo hay al que su padre no discipline?
  to: Perseveren para su disciplina[a]; Dios los trata como a hijos[b]. Porque, ¿qué hijo hay al que un padre no discipline?
  rationale: Se revisa la primera cláusula para reflejar mejor tanto ὑπομένετε («perseveren») como εἰς παιδείαν («para su disciplina»), manteniendo la alternativa en nota. También se cambia «su padre» por «un padre» para ajustarse más de cerca al griego y al razonamiento léxico auditado. Se conserva «hijos» con nota, porque la analogía padre-hijo debe permanecer visible en español.
