    reason: alternative_reading
  - marker: b
    text: El griego dice «hijos». La imagen paterna del argumento conserva esa forma masculina, aunque la aplicación no se limita a varones.
    reason: lexical_alternative
  revision_rationale: Se revisa la primera cláusula para reflejar mejor tanto ὑπομένετε («perseveren») como εἰς παιδείαν («para su disciplina»), manteniendo la alternativa en nota. También se cambia «su padre» por «un padre» para ajustarse más de cerca al griego y al razonamiento léxico auditado. Se conserva «hijos» con nota, porque la analogía padre-hijo debe permanecer visible en español.
