    text: Cita o alusión a Proverbios 3:11.
    reason: cross_reference
  revision_rationale: Se reubicó la nota [a] para que corresponda al plural ὡς υἱοῖς, se mejoró la naturalidad de ἥτις ... διαλέγεται con 'se dirige a vosotros', y se ajustó la nota alternativa para evitar la imprecisión de 'niños', conservando a la vez la explicación de la filiación representativa. El resto del versículo es sólido y puede mantenerse.
