translation:
  language: es
  text: 'Y habéis olvidado la exhortación que se dirige a vosotros como a hijos[a]: «Hijo mío, no tengas en poco la disciplina[c][b] del Señor, ni desmayes cuando eres reprendido por él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como a hijos e hijas». El griego dice «como a hijos», retomando el lenguaje de Proverbios y la filiación representativa del pasaje.
    reason: lexical_alternative
  - marker: b
    text: «Disciplina» también puede entenderse como «formación» o «instrucción», no solo como castigo.
    reason: lexical_alternative
  - marker: c
    text: Cita o alusión a Proverbios 3:11.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκλέλησθε
  english_pob_choice: you have forgotten
  chosen_spanish: habéis olvidado
  alternatives_spanish:
  - os habéis olvidado
  - habéis descuidado
  lexicon: BDAG
  rationale: El perfecto expresa un estado presente resultado de haber olvidado; en español, «habéis olvidado» comunica bien la recriminación inmediata y mantiene la fuerza del reproche.
- source_word: παρακλήσεως
  english_pob_choice: the exhortation
  chosen_spanish: la exhortación
  alternatives_spanish:
  - el consuelo
  - el ánimo
  lexicon: BDAG
  rationale: En este contexto la palabra introduce una cita exhortativa y no solo un consuelo. «Exhortación» conserva ese matiz admonitorio sin excluir el sentido de ánimo.
- source_word: ἥτις ... διαλέγεται
  english_pob_choice: that addresses
  chosen_spanish: que os habla
  alternatives_spanish:
  - que os exhorta
  - que razona con vosotros
  - que se dirige a vosotros
  lexicon: BDAG
  rationale: διαλέγομαι implica hablar o dirigirse personalmente; «os habla» es natural en español y refleja el discurso directo de la Escritura a los destinatarios.
- source_word: ὡς υἱοῖς
  english_pob_choice: as sons
  chosen_spanish: como a hijos
  alternatives_spanish:
  - como hijos
  - como a hijos varones
  lexicon: BDAG
  rationale: El griego usa el plural masculino y el contexto cita Proverbios con lenguaje filial representativo. En español, «como a hijos» conserva la referencia de manera natural y evita una formulación forzada, mientras sigue siendo género-precisa por el vocativo siguiente.
- source_word: Υἱέ μου
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío,
  - Hijo, mío
  lexicon: BDAG
  rationale: El vocativo singular reproduce la cita de Proverbios 3:11. «Hijo mío» mantiene la correspondencia intertextual y el tono afectivo-admonitorio.
- source_word: ὀλιγώρει
  english_pob_choice: do not regard lightly
  chosen_spanish: no tengas en poco
  alternatives_spanish:
  - no desprecies
  - no consideres insignificante
  lexicon: BDAG
  rationale: El verbo significa tratar algo como de poco valor. «No tengas en poco» expresa bien esa actitud sin cargar el mandato con una dureza mayor que la del original.
- source_word: παιδείας
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la formación
  - la instrucción
  - la corrección
  lexicon: BDAG
  rationale: παιδεία incluye formación, corrección y disciplina formativa. «Disciplina» preserva esa tensión semántica y encaja con el contexto de reprensión y maduración.
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: BDAG
  rationale: En la cita de Proverbios, κύριος corresponde al término usado por la tradición griega para el Nombre divino; en este contexto la referencia es a Dios, y «el Señor» preserva la lectura intertextual ya establecida por la cita.
- source_word: ἐκλύου
  english_pob_choice: lose heart
  chosen_spanish: desmayes
  alternatives_spanish:
  - te desalientes
  - pierdas el ánimo
  - te canses
  lexicon: BDAG
  rationale: El imperativo advierte contra el derrumbe interior ante la corrección. «Desmayes» es una forma española digna y breve que comunica bien la pérdida de ánimo/entereza.
- source_word: ἐλεγχόμενος
  english_pob_choice: when you are reproved
  chosen_spanish: cuando eres reprendido
  alternatives_spanish:
  - cuando eres corregido
  - cuando eres reprobado
  - al ser reprochado
  lexicon: BDAG
  rationale: ἐλέγχω puede significar reprender, reprobar o corregir. «Reprendido» conserva el carácter disciplinario-personal del pasaje sin volverlo más severo de lo necesario.
theological_decisions:
- issue: Lenguaje filial masculino en la exhortación
  english_pob_reading: Render υἱοῖς / Υἱέ as 'sons' / 'My son' in the main text
  chosen_spanish_reading: Mantener «como a hijos» y «Hijo mío» en el texto principal
  alternative_spanish_readings:
  - como a niños / como a criaturas
  - Hija mía / hijas
  rationale: El pasaje usa conscientemente lenguaje filial masculino, citando Proverbios y participando del argumento de Hebreos sobre filiación. La versión española conserva esa referencia sin neutralizarla, y «como a hijos» resulta idiomático y suficientemente preciso.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Sentido de παιδεία en relación con la acción de Dios
  english_pob_reading: Render παιδεία as 'discipline'
  chosen_spanish_reading: Traducir παιδεία como «disciplina»
  alternative_spanish_readings:
  - formación
  - instrucción
  - corrección
  rationale: El término abarca formación pedagógica y corrección. «Disciplina» preserva la tensión teológica entre adiestramiento y reprensión, en lugar de reducirla a castigo o a simple instrucción.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Referencia a κύριος en la cita de Proverbios
  english_pob_reading: '''the Lord’s discipline'''
  chosen_spanish_reading: «la disciplina del Señor»
  alternative_spanish_readings:
  - la disciplina de Yahvé
  - la disciplina del Maestro
  rationale: Aunque el trasfondo apunta al Nombre divino, la cita en Hebreos sigue la formulación reconocible de Proverbios en la tradición griega. En español, «Señor» mantiene la intertextualidad y evita una ruptura innecesaria con la cita incorporada.
  doctrine_reference: Project terminology default for κύριος / divine-name allusions
translation_notes:
  revision_awareness: El texto sigue de cerca el control cruzado del original griego y coincide con la lectura auditada en inglés. No se registraron revisiones aplicadas en el último pase; la redacción española mantiene la tensión semántica de παιδεία, la fuerza exhortativa de παρακλήσεως y la filiación masculina explícita de υἱοῖς/Υἱέ.
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριος en la cita sapiencial, coherente con el trasfondo de Proverbios en la tradición griega y con la convención del pasaje en español.
  - Se evitó «Cristo» porque el versículo no contiene Χριστός; la referencia es a κύριος en la cita.
  - 'Se mantuvo la secuencia de dos imperativos negativos en paralelo: «no tengas en poco» / «ni desmayes».'
  - La puntuación respeta la cita directa interna y el flujo retórico del griego.
