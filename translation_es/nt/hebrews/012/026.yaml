translation:
  language: es
  text: 'Aquel cuya voz sacudió la tierra entonces[a], pero ahora ha prometido, diciendo[b]: «Aún una vez más yo sacudiré no solamente la tierra, sino también el cielo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo». El griego tiene el singular con artículo, literalmente «el cielo».
    reason: lexical_alternative
  - marker: b
    text: Cita de Hageo 2:6.
    reason: cross_reference
lexical_decisions:
- source_word: οὗ
  english_pob_choice: whose
  chosen_spanish: de quien
  alternatives_spanish:
  - cuyo
  lexicon: BDAG
  rationale: El genitivo relativo remite al sujeto implícito del contexto previo; en español, «de quien» mantiene la referencia personal con naturalidad. «Cuyo» también es posible, pero puede sonar más literario y menos transparente en esta construcción.
- source_word: φωνὴ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: «Voz» conserva mejor el eco personal y teológico del hablante divino que «sonido», que sería más impersonal.
- source_word: ἐσάλευσεν
  english_pob_choice: shook
  chosen_spanish: sacudió
  alternatives_spanish:
  - hizo temblar
  - movió
  lexicon: BDAG
  rationale: En este contexto de agitación cósmica, «sacudió» transmite con claridad el verbo sin hacerlo demasiado técnico ni débil.
- source_word: γῆν
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  lexicon: BDAG
  rationale: «La tierra» preserva el contraste cósmico con «el cielo» y refleja bien el alcance del pasaje. «El mundo» sería más interpretativo; «el suelo» es demasiado restringido.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  lexicon: BDAG
  rationale: «Entonces» es la correspondencia más natural en español para el contraste temporal con «ahora» implícito en νῦν.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - mas ahora
  lexicon: BDAG
  rationale: «Pero ahora» conserva el contraste fuerte marcado por δέ. «Y ahora» atenúa la oposición; «mas ahora» suena más arcaico.
- source_word: ἐπήγγελται
  english_pob_choice: he has promised
  chosen_spanish: ha prometido
  alternatives_spanish:
  - ha declarado
  - ha anunciado
  lexicon: BDAG
  rationale: El perfecto de ἐπαγγέλλομαι comunica una promesa vigente; «ha prometido» lo expresa de forma directa y natural.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dice
  lexicon: BDAG
  rationale: «Diciendo» reproduce la introducción de la cita de manera simple y fiel al participio.
- source_word: Ἔτι ἅπαξ
  english_pob_choice: Yet once more
  chosen_spanish: Aún una vez más
  alternatives_spanish:
  - Una vez más
  - Todavía una vez
  lexicon: BDAG
  rationale: La combinación busca reflejar tanto ἔτι como ἅπαξ. «Aún una vez más» conserva el énfasis repetitivo del griego y el carácter citacional de Hageo 2:6.
- source_word: σείσω
  english_pob_choice: I will shake
  chosen_spanish: sacudiré
  alternatives_spanish:
  - haré temblar
  - agitaré
  lexicon: BDAG
  rationale: «Sacudiré» es la correspondencia más natural y fuerte para el futuro de σείω en este anuncio profético.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solamente ... sino también
  alternatives_spanish:
  - no solo ... sino también
  - no solamente ... sino además
  lexicon: BDAG
  rationale: La correlación se expresa con una fórmula idiomática y clara en español. «Sino también» preserva bien la oposición retórica.
- source_word: οὐρανόν
  english_pob_choice: the heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - el firmamento
  lexicon: BDAG
  rationale: Aunque el inglés POB preservó «the heaven» para reflejar el singular griego, en español «el cielo» es la forma más natural y comprensible. La pareja «tierra/cielo» mantiene el paralelismo cósmico del texto sin sonar forzada.
theological_decisions:
- issue: Referente del sujeto implícito y del posesivo relativo
  english_pob_reading: The verse refers to God as the one whose voice shook the earth and who now promises a future shaking.
  chosen_spanish_reading: El versículo presenta a Dios como quien sacudió la tierra entonces y como quien ahora ha prometido una nueva sacudida.
  alternative_spanish_readings:
  - Una traducción menos explícita sobre el referente divino
  - Una formulación impersonal que ocultara el sujeto
  rationale: El contexto inmediato y la cita de Hageo muestran que el referente es Dios. En español se mantiene la referencia personal con «de quien» y el verbo en tercera persona, sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Alcance del lenguaje cósmico
  english_pob_reading: Render γῆ / οὐρανός as 'earth' and 'the heaven' in their broad cosmic sense.
  chosen_spanish_reading: Renderizar γῆ / οὐρανός como «la tierra» y «el cielo» en sentido cósmico amplio.
  alternative_spanish_readings:
  - «la tierra» y «el firmamento»
  - «la tierra» y «el cielo» con lectura meramente meteorológica
  rationale: El contraste apunta al orden creado en su totalidad. «La tierra» / «el cielo» conserva la amplitud escatológica y la fuerza de la cita sin restringirla indebidamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de mantener el referente personal explícito y de preservar el paralelismo cósmico. La principal adaptación al español es usar «el cielo» en lugar de «el heaven»/«el cielo» literal con artículo sustantivado, porque en español la forma natural y eclesialmente transparente no requiere conservar el singular artículo de manera artificial. No se detectaron revisiones aplicadas en el contexto inglés más allá de una confirmación de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto, sin introducir «Yahvé» porque el griego aquí cita una promesa escrituraria sin el tetragrámaton explícito en la forma del versículo.
  - «Tierra/cielo» conserva el paralelismo cósmico y evita el deslizamiento hacia «mundo/firmamento».
  - Se usa puntuación de cita en estilo español, con dos puntos antes de la cita directa.
