review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: la voz de Dios sacudió la tierra en el pasado y ahora él promete una futura sacudida de tierra y cielo. Sin embargo, la estructura inicial en español no preserva fielmente la sintaxis ni la claridad del relativo griego οὗ. «La voz de quien sacudió la tierra» cambia el referente: en griego, la voz es la que sacudió la tierra, no la persona introducida por el relativo como sujeto explícito de «sacudió».'
  spanish_quality_summary: El español es mayormente natural y digno, pero la apertura «La voz de quien sacudió la tierra» suena trabada y ambigua. «Cuya voz» es más idiomático, claro y fiel. El resto del versículo lee bien; «el cielo» es una buena solución española para el singular griego con artículo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» no aparece explícitamente, pero el referente implícito se conserva. «La tierra» / «el cielo» reflejan adecuadamente γῆ / οὐρανός en sentido cósmico. «Sacudió / sacudiré» representa bien σαλεύω / σείω.
  issues:
  - severity: high
    issue: 'Construcción inicial infiel y ambigua: «La voz de quien sacudió la tierra»'
    rationale: El relativo genitivo οὗ modifica «voz» y corresponde a «cuya voz». La redacción actual puede entenderse como si «quien» fuera el sujeto de «sacudió», desplazando la función sintáctica de «voz» y debilitando la relación posesiva del original.
  - severity: medium
    issue: La nota al pie a ya no ayuda y refleja la elección problemática
    rationale: La nota «O “voz de quien”» no preserva una alternativa útil y además respalda una construcción menos fiel. Si se revisa a «cuya voz», no hace falta nota léxica aquí.
  revised_spanish_text: 'Aquel cuya voz sacudió la tierra entonces[a], pero ahora ha prometido, diciendo[b]: «Aún una vez más yo sacudiré no solamente la tierra, sino también el cielo»'
  revised_footnotes:
  - marker: a
    text: O «el cielo». El griego tiene el singular con artículo, literalmente «el cielo».
    reason: lexical_alternative
  - marker: b
    text: Cita de Hageo 2:6.
    reason: cross_reference
  revision_rationale: 'Se reemplaza la apertura por «Aquel cuya voz» para reflejar con claridad el genitivo relativo οὗ y mantener a «voz» como sujeto de «sacudió». Se elimina la nota léxica previa porque ya no es necesaria. Se conservan el contraste temporal, la promesa vigente y la cita profética. También se reubican las notas para que correspondan a las razones documentadas en el rastro inglés: alternativa léxica sobre «cielo» y referencia a Hageo 2:6.'
