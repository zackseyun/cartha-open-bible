    reason: alternative_reading
  - marker: b
    text: Véanse Éxodo 20:18–19 y Deuteronomio 5:23–27, donde Israel pide no oír directamente la voz de Dios por más tiempo.
    reason: cross_reference
  revision_rationale: 'Se corrige un problema de fidelidad gramatical y semántica: οἱ ἀκούσαντες / παρῃτήσαντο exige un sujeto plural personal (''oyentes'') y verbo plural (''rogaron''), no ''la audiencia rogó''. Se mantiene ''voz de palabras'' por su valor deliberadamente extraño y cercano al griego, y se conserva la nota sobre la posible referencia más amplia del relativo.'
