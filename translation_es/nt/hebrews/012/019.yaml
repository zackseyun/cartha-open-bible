translation:
  language: es
  text: y al sonido de una trompeta y a una voz de palabras[b][a], cuyos oyentes rogaron que no se les siguiera dirigiendo palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la cual los que oyeron rogaron que no se les siguiera dirigiendo palabra», si el relativo se entiende más ampliamente como referencia a toda la manifestación del Sinaí y no solo a «una voz de palabras».'
    reason: alternative_reading
  - marker: b
    text: Véanse Éxodo 20:18–19 y Deuteronomio 5:23–27, donde Israel pide no oír directamente la voz de Dios por más tiempo.
    reason: cross_reference
lexical_decisions:
- source_word: σάλπιγγος ἤχῳ
  english_pob_choice: the sound of a trumpet
  chosen_spanish: al sonido de una trompeta
  alternatives_spanish:
  - al toque de una trompeta
  - al estruendo de una trompeta
  lexicon: BDAG
  rationale: ἦχος designa el sonido o resonancia audible; por eso «sonido» preserva el valor acústico sin intensificar indebidamente la imagen. «Trompeta» mantiene el objeto concreto asociado al Sinaí.
- source_word: φωνῇ ῥημάτων
  english_pob_choice: a voice of words
  chosen_spanish: una voz de palabras
  alternatives_spanish:
  - una voz que pronunciaba palabras
  - una voz de discurso
  lexicon: BDAG
  rationale: La construcción es extraña y deliberada en griego; «voz de palabras» conserva la yuxtaposición y el carácter articulado del habla sin suavizarla demasiado. Se evita expandirla a una paráfrasis más interpretativa.
- source_word: ἧς
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - que
  - la cual
  lexicon: BDAG
  rationale: El relativo femenino singular puede referirse más directamente a «voz», pero el contexto puede ampliar el referente a toda la manifestación del Sinaí. «Cuya» permite mantener esa tensión gramatical y contextual en español.
- source_word: οἱ ἀκούσαντες
  english_pob_choice: hearers
  chosen_spanish: la audiencia
  alternatives_spanish:
  - los que oyeron
  - los oyentes
  lexicon: BDAG
  rationale: El participio sustantivado alude a los israelitas que oyeron. «La audiencia» es una forma natural en español para el grupo que recibió la voz, aunque «los oyentes» también sería viable.
- source_word: παρῃτήσαντο
  english_pob_choice: begged
  chosen_spanish: rogó
  alternatives_spanish:
  - suplicó
  - pidió con insistencia
  - se excusó
  lexicon: BDAG
  rationale: El verbo medio expresa una petición insistente para ser eximidos de seguir oyendo. «Rogó» comunica bien la urgencia y el tono del ruego; se evita «se negó» o «rehusó» porque debilitarían el matiz de súplica.
- source_word: μὴ προστεθῆναι αὐτοῖς λόγον
  english_pob_choice: that no further word be spoken to them
  chosen_spanish: que no se les siguiera dirigiendo palabra
  alternatives_spanish:
  - que no se les añadiera más palabra
  - que no se les hablara más
  lexicon: BDAG
  rationale: La infinitiva con μή expresa el contenido del ruego. «Seguir dirigiendo palabra» reproduce en español la idea de προστίθημι como ‘añadir’ en contexto de discurso, manteniendo el sentido pasivo y solemne de λόγος sin sonar forzado.
theological_decisions:
- issue: Referente de ἧς (la voz o toda la manifestación del Sinaí)
  english_pob_reading: The main text follows the nearest antecedent, 'a voice of words,' while the note preserves the broader Sinai event as a possible referent.
  chosen_spanish_reading: El texto principal mantiene la referencia inmediata a «una voz de palabras», sin cerrar la posibilidad de que abarque toda la escena del Sinaí.
  alternative_spanish_readings:
  - «cuya audiencia rogó que no se les siguiera dirigiendo palabra», refiriendo la cláusula a todo el conjunto previo
  - «de la cual los oyentes rogaron...» refiriéndolo estrictamente a la voz
  rationale: El griego favorece el antecedente inmediato femenino singular, pero el contexto de Éxodo/Deuteronomio sugiere que la reacción fue ante toda la teofanía temible. La traducción conserva esa tensión en vez de resolverla en exceso.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica y exegética en lugar de resolverla prematuramente.'
translation_notes:
  revision_awareness: Se siguió el pass más reciente, que reporta alta concordancia y sin cambios necesarios; no se introdujeron revisiones sustantivas frente al audit trail en inglés.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo de dos dativos audibles: «al sonido de una trompeta» y «a una voz de palabras».'
  - Se mantuvo el registro solemne sin caer en un calco rígido, pero conservando la extrañeza intencional de «voz de palabras».
  - Se usó «palabra» en singular dentro de la nota explicativa para reflejar λόγος sin sustituirlo por «mensaje», que sería más interpretativo.
