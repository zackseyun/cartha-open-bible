translation:
  language: es
  text: y hagan senderos rectos[a] para sus pies, para que lo cojo no se desvíe[b], sino que más bien sea sanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación hace eco de Proverbios 4:26 y continúa la imagen de una caminata disciplinada.
    reason: cross_reference
  - marker: b
    text: O 'no se disloque' o 'no quede fuera de lugar'; el verbo griego puede tener un matiz más médico dentro de la metáfora corporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: τροχιὰς
  english_pob_choice: paths
  chosen_spanish: senderos
  alternatives_spanish:
  - caminos
  - sendas
  - huellas
  lexicon: BDAG
  rationale: τροχιά alude a una huella, pista o trayecto de paso; en español, "senderos" comunica bien la imagen de una ruta trazada para caminar, sin volver técnico el símil.
- source_word: ὀρθὰς
  english_pob_choice: straight
  chosen_spanish: rectos
  alternatives_spanish:
  - derechos
  - enderezados
  - correctos
  lexicon: BDAG
  rationale: ὀρθός expresa la idea de algo alineado o directo. "Rectos" es el equivalente natural y mantiene el eco de Proverbios 4:26 sin sonar artificial.
- source_word: ποιεῖτε
  english_pob_choice: make
  chosen_spanish: hagan
  alternatives_spanish:
  - haced
  - preparen
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua. En español, "hagan" conserva el valor exhortativo y fluye mejor que una traducción más literal como "haced".
- source_word: τοῖς ποσὶν ὑμῶν
  english_pob_choice: for your feet
  chosen_spanish: para sus pies
  alternatives_spanish:
  - con sus pies
  - para sus pasos
  lexicon: BDAG
  rationale: 'El dativo favorece la idea de dirección o beneficio: los senderos se hacen para los pies. "Sus" corresponde al plural y preserva la imagen corporal.'
- source_word: τὸ χωλὸν
  english_pob_choice: the lame
  chosen_spanish: lo cojo
  alternatives_spanish:
  - el cojo
  - la persona coja
  - lo lisiado
  lexicon: BDAG
  rationale: El adjetivo neutro funciona sustantivado. "Lo cojo" preserva esa fuerza impersonal/colectiva mejor que una frase más interpretativa, y mantiene la metáfora corporal.
- source_word: ἐκτραπῇ
  english_pob_choice: be turned aside
  chosen_spanish: se desvíe
  alternatives_spanish:
  - se aparte
  - sea torcido
  - se disloque
  lexicon: BDAG
  rationale: El verbo puede significar desviarse o, en un matiz más físico, quedar fuera de lugar. "Se desvíe" es claro en español y deja abierta la tensión entre la imagen ética y la corporal.
- source_word: ἰαθῇ
  english_pob_choice: be healed
  chosen_spanish: sea sanado
  alternatives_spanish:
  - sea curado
  - sea restaurado
  lexicon: BDAG
  rationale: ἰάομαι normalmente significa sanar. "Sea sanado" conserva el paralelismo corporal del versículo y resulta natural en registro bíblico contemporáneo.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - antes bien
  - en cambio
  lexicon: BDAG
  rationale: '"Más bien" reproduce bien el contraste correctivo del griego: no el desvío, sino la sanidad.'
theological_decisions:
- issue: Imágenes corporales y posible sentido espiritual de la exhortación
  english_pob_reading: Retain the bodily language in the main text without explicitly resolving whether it refers to literal physical weakness or metaphorical spiritual weakness.
  chosen_spanish_reading: Conservar el lenguaje corporal sin decidir en el texto si apunta a debilidad física literal o a fragilidad espiritual metafórica.
  alternative_spanish_readings:
  - Interpretar 'lo cojo' como creyentes espiritualmente débiles
  - Reformular el verso de modo más abstracto y moral
  rationale: El griego presenta una imagen encarnada de caminar y sanar. En español conviene mantener la tensión sin cerrarla, para no imponer una lectura más estrecha que la del texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla de forma interpretativa.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y la auditoría inglesa: conserva el imperativo continuo, la metáfora de los caminos/pies y la tensión entre desviarse y sanar. No hay revisiones aplicadas en el registro fuente más reciente.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en este versículo.
  - Se prefirió 'sanado' y no una paráfrasis como 'restaurado' en el texto principal para mantener el paralelo corporal.
  - '''Lo cojo'' conserva el valor sustantivado del griego, aunque pueda sonar marcado; la nota permite la alternativa médica sin perder el sentido principal.'
  - Se usó 'senderos rectos' para mantener un español natural y a la vez la relación con Proverbios 4:26.
