    issue: «nuestros padres según la carne» en el texto principal
    rationale: Aunque es literalmente defendible, en español actual suena demasiado calcado y menos natural que «nuestros padres terrenales». Dado que el POB inglés eligió una equivalencia idiomática, la traducción principal en español debería reflejar esa misma claridad, reservando la formulación literal para nota.
  - severity: medium
    issue: «disciplinadores» es poco idiomático
    rationale: El sustantivo existe pero suena técnico y poco natural en español bíblico legible. «quienes nos disciplinaban» o «como quienes nos disciplinaban» comunica con mayor fluidez el sentido de παιδευτάς y encaja con el contexto inmediato de παιδεία.
  - severity: low
    issue: El anclaje de notas b/c del inglés no se refleja con la misma precisión funcional
    rationale: La nota sobre «quienes nos disciplinaban» queda como nota separada, pero al mejorar el texto principal puede simplificarse el aparato y mantener solo las notas realmente necesarias para alternativas o amplitud semántica.
