translation:
  language: es
  text: Además, teníamos a nuestros padres terrenales[a] como quienes nos disciplinaban, y los respetábamos. ¿No nos someteremos mucho más al Padre de los espíritus[b] y viviremos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestros padres según la carne».'
    reason: lexical_alternative
  - marker: b
    text: «El Padre de los espíritus» puede significar específicamente «el Padre de nuestros espíritus», en contraste con nuestros padres terrenales; el griego deja la expresión más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Furthermore
  chosen_spanish: Además
  alternatives_spanish:
  - Entonces
  - Asimismo
  - Además de eso
  lexicon: BDAG
  rationale: Introduce el siguiente paso del argumento a fortiori. «Además» funciona de manera natural en español y mantiene la adición discursiva sin forzar una secuencia temporal.
- source_word: τῆς σαρκὸς ἡμῶν πατέρας
  english_pob_choice: our earthly fathers
  chosen_spanish: nuestros padres según la carne
  alternatives_spanish:
  - nuestros padres terrenales
  - nuestros padres humanos
  - nuestros padres según la carne
  lexicon: BDAG
  rationale: La expresión griega literalmente dice «padres de nuestra carne». «Según la carne» conserva el giro relacional y el contraste con «el Padre de los espíritus» sin introducir el matiz paulino de «naturaleza pecaminosa».
- source_word: σάρξ
  english_pob_choice: earthly
  chosen_spanish: carne
  alternatives_spanish:
  - humana
  - terrenal
  lexicon: BDAG
  rationale: Aquí σάρξ señala parentesco corporal/descentencia humana. En español, «carne» es la forma más fiel y mantiene el contraste léxico con «espíritus»; la locución «según la carne» evita una traducción explicativa excesiva.
- source_word: παιδευτὰς
  english_pob_choice: disciplinarians
  chosen_spanish: disciplinadores
  alternatives_spanish:
  - correctores
  - educadores
  - quienes nos disciplinaban
  lexicon: BDAG
  rationale: El sustantivo designa a quienes ejercen disciplina/formación. «Disciplinadores» conserva la fuerza lexical y corresponde al campo de παιδεία en Hebreos 12.
- source_word: ἐνετρεπόμεθα
  english_pob_choice: we respected them
  chosen_spanish: los respetábamos
  alternatives_spanish:
  - les teníamos respeto
  - los reverenciábamos
  - sentíamos respeto por ellos
  lexicon: BDAG
  rationale: El verbo aquí expresa una actitud de deferencia o respeto ante su disciplina. «Los respetábamos» es claro y idiomático en español, y mantiene el sentido relacional sin exagerar la emoción.
- source_word: οὐ πολὺ μᾶλλον
  english_pob_choice: Shall we not much more
  chosen_spanish: ¿No nos someteremos mucho más
  alternatives_spanish:
  - ¿No deberíamos mucho más
  - ¿No nos sujetaremos mucho más
  - ¿No estaremos mucho más dispuestos a someternos
  lexicon: BDAG
  rationale: Conserva la fuerza retórica de la pregunta y el argumento de mayor razón. «Nos someteremos» refleja bien el futuro con valor exhortativo/retórico del griego.
- source_word: ὑποταγησόμεθα
  english_pob_choice: submit
  chosen_spanish: nos someteremos
  alternatives_spanish:
  - nos sujetaremos
  - nos pondremos bajo su autoridad
  - nos subordinaremos
  lexicon: BDAG
  rationale: «Someterse» reproduce el sentido de ὑποτάσσω en este contexto de obediencia reverente. Es más natural que «ser sometidos» y mantiene la idea de subordinación voluntaria o debida.
- source_word: τῷ πατρὶ τῶν πνευμάτων
  english_pob_choice: the Father of spirits
  chosen_spanish: el Padre de los espíritus
  alternatives_spanish:
  - el Padre de nuestro espíritu
  - el Padre espiritual
  - el Padre de espíritus
  lexicon: BDAG
  rationale: La construcción se mantiene amplia, con el plural explícito del griego. «De los espíritus» preserva la amplitud semántica sin cerrarla a «nuestros espíritus», que sería una interpretación más específica que el texto no dice.
- source_word: πνευμάτων
  english_pob_choice: spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - nuestros espíritus
  - seres espirituales
  lexicon: BDAG
  rationale: Se conserva el plural del original para no reducir el alcance de la expresión. En español, el plural deja abierta la relación exacta entre Dios y los espíritus, como ocurre en el griego.
- source_word: ζήσομεν
  english_pob_choice: and live
  chosen_spanish: y viviremos
  alternatives_spanish:
  - y viviremos de verdad
  - y tendremos vida
  - y viviremos para siempre
  lexicon: BDAG
  rationale: Retiene el futuro con valor resultativo y suena natural en la pregunta retórica. «Viviremos» basta para expresar el resultado prometido sin añadir matices no explícitos.
theological_decisions:
- issue: Sentido de «el Padre de los espíritus»
  english_pob_reading: A title for God contrasting human fathers with God as the one who is related to and sovereign over spirits.
  chosen_spanish_reading: Un título para Dios que contrasta a los padres humanos con Dios como Padre relacionado con los espíritus, sin precisar más el genitivo.
  alternative_spanish_readings:
  - el Padre de nuestros espíritus
  - el Padre de seres espirituales
  - el Padre espiritual
  rationale: El griego permite una amplitud que no conviene cerrar en el texto principal. La redacción española conserva la tensión teológica y evita decidir entre una referencia específicamente a nuestros espíritus o a los espíritus en general.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo pleno y sin cambios necesarios; se mantuvo la misma lectura de fondo, con adaptación natural al español y preservación de las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ por coherencia con el valor literal/relacional del pasaje y para no introducir el sentido de «naturaleza pecaminosa».
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se conservó el plural «espíritus» para respetar la forma explícita del griego y la amplitud teológica del genitivo.
  - «Disciplinadores» se eligió para mantener la conexión con el tema de la disciplina en Hebreos 12.
