revisions:
- from: Además[a], teníamos a nuestros padres según la carne como disciplinadores, y los respetábamos[b]. ¿No nos someteremos mucho más al Padre de los espíritus[c] y viviremos?
  to: Además, teníamos a nuestros padres terrenales[a] como quienes nos disciplinaban, y los respetábamos. ¿No nos someteremos mucho más al Padre de los espíritus[b] y viviremos?
  rationale: 'Se ajusta el español principal para que sea más natural y fiel al enfoque idiomático del POB: «padres terrenales» comunica mejor τῆς σαρκὸς ἡμῶν en este contexto, mientras la alternativa más literal se conserva en nota. «Como quienes nos disciplinaban» reemplaza el poco idiomático «disciplinadores» sin perder el vínculo semántico con παιδεία. Se mantiene «el Padre de los espíritus» en el texto principal para preservar la amplitud teológica del griego.'
