translation:
  language: es
  text: Porque ustedes saben que después, cuando quiso heredar la bendición, fue rechazado, pues no halló oportunidad para el arrepentimiento[a], aunque la buscó con lágrimas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no halló lugar para el arrepentimiento»; esto puede significar que no encontró oportunidad para revertir el resultado, o que no pudo obtener un cambio de mente por parte de Isaac.'
    reason: alternative_reading
  - marker: b
    text: El pronombre puede referirse a «la bendición» o, menos probablemente, a «el arrepentimiento / la oportunidad»; el griego deja ambiguo el antecedente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴστε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - saben
  - ustedes conocen
  lexicon: BDAG
  rationale: El perfecto con sentido presente de οἶδα expresa conocimiento compartido por los lectores; «ustedes saben» comunica esa apelación directa de forma natural en español.
- source_word: μετέπειτα
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - después de eso
  - luego
  lexicon: BDAG
  rationale: Indica posterioridad temporal. «Después» es breve, idiomático y mantiene el orden lógico de la advertencia.
- source_word: θέλων
  english_pob_choice: when he wanted
  chosen_spanish: cuando quiso
  alternatives_spanish:
  - queriendo
  - al querer
  lexicon: BDAG
  rationale: El participio se vierte temporalmente en español. «Quiso» conserva la voluntad sin exagerar la intensidad del verbo.
- source_word: κληρονομῆσαι
  english_pob_choice: to inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir en herencia
  - recibir como herencia
  lexicon: BDAG
  rationale: «Heredar» es el equivalente directo, idiomático y fiel al sentido legal/familiar del verbo.
- source_word: τὴν εὐλογίαν
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la bendición de la herencia
  - la bendición paterna
  lexicon: BDAG
  rationale: La referencia específica alude a la bendición patriarcal del relato de Esaú; «bendición» mantiene la alusión sin expandir el texto.
- source_word: ἀπεδοκιμάσθη
  english_pob_choice: he was rejected
  chosen_spanish: fue rechazado
  alternatives_spanish:
  - fue desechado
  - fue descalificado
  lexicon: BDAG
  rationale: El pasivo de ἀποδοκιμάζω expresa rechazo tras evaluación. «Fue rechazado» es claro en español y no introduce un sentido técnico ajeno.
- source_word: μετανοίας ... τόπον
  english_pob_choice: opportunity for repentance
  chosen_spanish: lugar para el arrepentimiento
  alternatives_spanish:
  - oportunidad para arrepentirse
  - espacio para el arrepentimiento
  - lugar para cambiar de mente
  lexicon: BDAG
  rationale: La expresión idiomática literalmente habla de «lugar/espacio»; en español conviene conservar esa imagen porque el griego es ambiguo entre oportunidad, espacio o posibilidad. «Arrepentimiento» mantiene el valor semántico básico de μετάνοια.
- source_word: μετανοίας
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - cambio de pensamiento
  lexicon: BDAG
  rationale: El sentido normal del término en el NT es arrepentimiento. Aunque existe debate sobre si se refiere al cambio de Isaac, la traducción principal conserva el valor léxico estándar y deja la ambigüedad a la nota.
- source_word: καίπερ
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: BDAG
  rationale: Concesiva directa y natural en español.
- source_word: μετὰ δακρύων
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - entre lágrimas
  - llorando
  lexicon: BDAG
  rationale: La preposición expresa acompañamiento o modo; «con lágrimas» es fiel y sobrio.
- source_word: ἐκζητήσας
  english_pob_choice: he sought
  chosen_spanish: la buscó
  alternatives_spanish:
  - la buscó con empeño
  - la buscó intensamente
  - la procuró
  lexicon: BDAG
  rationale: ἐκζητέω intensifica la búsqueda. Aquí el contexto ya lo muestra mediante las lágrimas; por eso «la buscó» evita sobrecargar la frase y encaja con el referente femenino.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la bendición
  - esa oportunidad
  - eso
  lexicon: BDAG
  rationale: El pronombre femenino puede remitir a «la bendición» o, menos probablemente, a «el arrepentimiento/la oportunidad». En español, «la» preserva la ambigüedad referencial sin resolverla interpretativamente.
theological_decisions:
- issue: 'Ambigüedad de αὐτήν: ¿la bendición o el arrepentimiento/oportunidad?'
  english_pob_reading: 'Main text preserves ambiguity: Esau found no opportunity for repentance, though he sought ''it'' with tears.'
  chosen_spanish_reading: 'El texto principal conserva la ambigüedad: «no halló lugar para el arrepentimiento, aunque la buscó con lágrimas».'
  alternative_spanish_readings:
  - «no halló lugar para el arrepentimiento, aunque buscó la bendición con lágrimas»
  - «no pudo obtener un cambio de mente, aunque lo buscó con lágrimas»
  rationale: El griego permite más de una referencia para el pronombre femenino. Mantener «la» evita decidir entre la bendición y el cambio de ánimo de Isaac, preservando la tensión documental del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: 'Sentido de μετανοίας τόπον: oportunidad externa o cambio interno'
  english_pob_reading: no opportunity for repentance; this may mean he found no opportunity to reverse the outcome, or that he could not obtain a change of mind from Isaac.
  chosen_spanish_reading: «no halló lugar para el arrepentimiento» connota tanto ausencia de oportunidad como falta de espacio para revertir el resultado.
  alternative_spanish_readings:
  - «no halló oportunidad para arrepentirse»
  - «no halló ocasión para cambiar de mente»
  rationale: La frase idiomática puede referirse a la imposibilidad de revertir el desenlace o al cambio de mente de Isaac. El español conserva la imagen de «lugar» para no cerrar el debate exegético.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La traducción sigue la revisión reciente del inglés: se suprimió un «also» incómodo y se afinó la puntuación para fluidez. En español se refleja esa misma economía, con una sola cadena causal y una concesiva final sin añadidos.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando el texto lo exige; en este versículo no aparece el Tetragrámaton.
  - «Arrepentimiento» se mantuvo para μετάνοια, evitando una paráfrasis que borraría la tensión exegética del pasaje.
  - «Bendición» preserva la alusión narrativa específica sin convertirla en una glosa interpretativa.
  - 'La puntuación sigue el orden lógico del griego: causa, deseo, rechazo, explicación y concesión final.'
