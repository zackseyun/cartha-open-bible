translation:
  language: es
  text: Por tanto, ya que estamos recibiendo un reino inconmovible, tengamos gracia[a], por la cual podamos servir a Dios aceptablemente, con reverencia y asombro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seamos agradecidos». La frase griega ἔχωμεν χάριν puede entenderse como «tengamos gracia» o, idiomáticamente, como «tengamos gratitud» o «seamos agradecidos».'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa la conclusión inferencial del argumento anterior con una fórmula natural y digna en español, manteniendo el sentido lógico de cierre.
- source_word: βασιλείαν ἀσάλευτον
  english_pob_choice: an unshakable kingdom
  chosen_spanish: un reino inconmovible
  alternatives_spanish:
  - un reino que no puede ser sacudido
  - un reino inamovible
  lexicon: BDAG
  rationale: βασιλείαν se vierte como «reino»; ἀσάλευτον comunica la idea de algo no sacudido o no movido. «Inconmovible» es idiomático en español y conserva el contraste con lo que puede ser removido en el contexto.
- source_word: παραλαμβάνοντες
  english_pob_choice: since we are receiving
  chosen_spanish: ya que estamos recibiendo
  alternatives_spanish:
  - recibiendo
  - puesto que recibimos
  - habiendo recibido
  lexicon: BDAG
  rationale: El participio presente expresa una circunstancia concurrente; «ya que estamos recibiendo» preserva ese valor y su fuerza exhortativa sin forzar un pasado consumado.
- source_word: ἔχωμεν χάριν
  english_pob_choice: let us have grace
  chosen_spanish: tengamos gracia
  alternatives_spanish:
  - seamos agradecidos
  - tengamos gratitud
  - retengamos la gracia
  lexicon: BDAG
  rationale: Se mantiene el sentido lexical de χάρις como «gracia», siguiendo la lectura que permite que la relativa siguiente remita naturalmente a esa gracia como medio de servicio aceptable. «Tengamos gracia» suena breve y fiel; la alternativa de gratitud queda preservada en nota.
- source_word: δι’ ἧς
  english_pob_choice: through which
  chosen_spanish: por la cual
  alternatives_spanish:
  - por medio de la cual
  - mediante la cual
  lexicon: BDAG
  rationale: La relativa femenina se refiere a χάριν; «por la cual» conserva la relación instrumental/mediadora de διά con genitivo y fluye bien en español.
- source_word: λατρεύωμεν
  english_pob_choice: we may serve
  chosen_spanish: podamos servir
  alternatives_spanish:
  - sirvamos
  - podamos rendir servicio
  lexicon: BDAG
  rationale: «Servir» mantiene el valor básico de λατρεύω en contexto cultual; el subjuntivo «podamos» comunica adecuadamente la modalidad exhortativa/potencial de la construcción.
- source_word: εὐαρέστως
  english_pob_choice: acceptably
  chosen_spanish: aceptablemente
  alternatives_spanish:
  - de manera agradable
  - de forma que le sea agradable
  lexicon: BDAG
  rationale: Adverbio que expresa conformidad con lo que agrada a Dios; «aceptablemente» conserva la evaluación divina sin añadir más contenido del necesario.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: BDAG
  rationale: En español, con «servir» la dative se expresa naturalmente con «a Dios», manteniendo el objeto del servicio sin calco innecesario.
- source_word: μετὰ εὐλαβείας καὶ δέους
  english_pob_choice: with reverence and awe
  chosen_spanish: con reverencia y temor
  alternatives_spanish:
  - con reverencia y asombro
  - con respeto y temor reverente
  lexicon: BDAG
  rationale: εὐλάβεια comunica reverencia y actitud cuidadosa; δέος puede ser «awe» o temor ante lo sobrecogedor. «Reverencia y temor» conserva ambas ideas con naturalidad; «awe» no tiene un equivalente único igualmente conciso en español.
theological_decisions:
- issue: Sentido de χάριν en ἔχωμεν χάριν
  english_pob_reading: let us have grace, with the alternative 'let us be thankful.'
  chosen_spanish_reading: tengamos gracia
  alternative_spanish_readings:
  - seamos agradecidos
  - tengamos gratitud
  rationale: La sintaxis inmediata favorece entender χάριν como «gracia», porque la relativa δι’ ἧς apunta de modo natural a la gracia como medio del servicio aceptable. Se conserva la lectura alternativa de gratitud en nota para no borrar la tensión interpretativa documentada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con el audit trail inglés y no requiere ajustes respecto de la versión revisada más reciente. Se mantuvo la decisión de traducir χάριν como «gracia» en el texto principal, dejando la alternativa de gratitud en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por una fórmula litúrgica más extensa.
  - «Reino inconmovible» conserva la fuerza negativa de ἀσάλευτον sin suavizarla.
  - La relación de la relativa con «gracia» queda explícita mediante «por la cual».
  - 'Se usa un subjuntivo exhortativo natural en español: «tengamos», «podamos servir».'
