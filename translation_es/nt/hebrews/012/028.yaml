revisions:
- from: Por tanto[a], ya que estamos recibiendo un reino inconmovible, tengamos gracia, por la cual podamos servir a Dios aceptablemente, con reverencia y temor.
  to: Por tanto, ya que estamos recibiendo un reino inconmovible, tengamos gracia[a], por la cual podamos servir a Dios aceptablemente, con reverencia y asombro.
  rationale: Se reubica la nota en «gracia» para que corresponda a la ambigüedad real de ἔχωμεν χάριν, se pule la redacción de la nota y se ajusta δέος a «asombro» para reflejar mejor la rationale del POB («awe») y evitar que «temor» sugiera miedo indebido. El resto del versículo puede mantenerse.
