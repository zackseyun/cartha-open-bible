- from: Todavía no habéis resistido hasta la sangre, al luchar contra el pecado.[a]
  to: Todavía no han resistido hasta derramar sangre, en su lucha contra el pecado.[a]
  rationale: Se ajusta el registro al español neutral latinoamericano, se expresa el modismo griego con una formulación más natural y clara en español («hasta derramar sangre»), y se pule la nota al pie para que conserve la alternativa más literal sin sonar forzada. La revisión no altera la tensión teológica ni el sentido básico del original.
