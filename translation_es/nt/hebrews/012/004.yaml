review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: οὔπω = «todavía no», ἀντικατέστητε = «habéis resistido», πρὸς τὴν ἁμαρτίαν = «contra el pecado», y mantiene la amplitud teológica de «pecado». Sin embargo, «hasta la sangre» suena menos natural en español actual que la explicitación idiomática documentada en el POB inglés, y «habéis resistido» introduce voseo peninsular no acorde con el estilo neutral latinoamericano solicitado.'
  spanish_quality_summary: 'La frase es comprensible y bastante fiel, pero conviene mejorar dos puntos de legibilidad y estilo: 1) sustituir «habéis resistido» por «han resistido» o «ustedes no han resistido» para evitar registro peninsular; 2) preferir «hasta derramar sangre» o «hasta el punto de derramar sangre» frente a «hasta la sangre», que en español resulta más calcado y menos claro. «Al luchar contra el pecado» es aceptable, aunque «en su lucha contra el pecado» refleja mejor el participio contextual y el audit trail inglés.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «pecado» y «resistir» están bien. La principal corrección es estilística y de naturalidad en español eclesial general, no terminológica.
  issues:
  - severity: medium
    issue: 'Registro pronominal/verbal no neutral: «habéis resistido»'
    rationale: El objetivo pide español neutral latinoamericano / ampliamente legible en iglesia. «Habéis» es marcadamente peninsular. «No han resistido» o «ustedes no han resistido» encaja mejor.
  - severity: medium
    issue: «Hasta la sangre» es un calco demasiado rígido en español
    rationale: Aunque el griego admite una forma literal, el POB inglés ya documentó que el sentido idiomático es «to the point of shedding blood». En español, «hasta derramar sangre» comunica con más claridad y naturalidad ese mismo valor sin sobreinterpretar.
  - severity: low
    issue: La nota al pie conserva comillas y redacción algo torpes
    rationale: La nota comienza con una comilla innecesaria y puede redactarse con mayor naturalidad en español, manteniendo la alternativa literal y la explicación idiomática.
