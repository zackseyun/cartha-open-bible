translation:
  language: es
  text: Todavía no han resistido hasta derramar sangre, en su lucha contra el pecado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todavía no han resistido hasta sangre». El griego es más literalmente «todavía no hasta sangre resistieron», una expresión idiomática que significa resistir hasta el punto de derramar sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: Todavía no
  alternatives_spanish:
  - Aún no
  - No todavía
  lexicon: BDAG
  rationale: El adverbio temporal indica que el límite descrito aún no se ha alcanzado. «Todavía no» es natural en español y conserva con claridad la idea de una resistencia que sigue estando pendiente de llegar a ese extremo.
- source_word: μέχρις αἵματος
  english_pob_choice: to the point of shedding blood
  chosen_spanish: hasta la sangre
  alternatives_spanish:
  - hasta el derramamiento de sangre
  - hasta derramar sangre
  - hasta el punto de derramar sangre
  lexicon: BDAG
  rationale: La expresión griega es idiomática y señala llegar al extremo de sangre/violencia. En español, «hasta la sangre» conserva la fuerza breve e imagística del original sin explicar más de lo que el texto afirma.
- source_word: ἀντικατέστητε
  english_pob_choice: you have ... resisted
  chosen_spanish: habéis resistido
  alternatives_spanish:
  - habéis hecho frente
  - habéis estado en contra
  - habéis opuesto resistencia
  lexicon: BDAG
  rationale: El aoristo en segunda plural presenta su oposición como un hecho ya ocurrido. «Resistido» mantiene el matiz de confrontación y encaja bien con el campo semántico de conflicto del versículo.
- source_word: πρὸς τὴν ἁμαρτίαν
  english_pob_choice: against sin
  chosen_spanish: contra el pecado
  alternatives_spanish:
  - frente al pecado
  - en oposición al pecado
  - contra el pecado, en general
  lexicon: BDAG
  rationale: La preposición πρός con acusativo expresa oposición. El artículo griego no requiere reproducción literal en español; «contra el pecado» preserva el objeto moral de la lucha con naturalidad.
- source_word: ἀνταγωνιζόμενοι
  english_pob_choice: in your struggle
  chosen_spanish: al luchar
  alternatives_spanish:
  - mientras lucháis
  - en vuestra lucha
  - contendiendo
  lexicon: BDAG
  rationale: El participio presente medio describe el modo o contexto de la resistencia. «Al luchar» comunica la acción en curso sin sobrecargar la frase con un sustantivo abstracto, aunque «en vuestra lucha» también sería viable.
theological_decisions:
- issue: Alcance de «pecado» en el contexto
  english_pob_reading: Render generically as 'sin' without specifying whether it refers to personal sin, hostile sinful opposition, or apostasy.
  chosen_spanish_reading: Mantener «el pecado» de modo genérico, sin precisar si se trata de pecado personal, oposición pecaminosa de otros o la tentación de apostatar.
  alternative_spanish_readings:
  - el pecado en general
  - la oposición pecaminosa de los perseguidores
  - la tentación de abandonar la fe
  rationale: El contexto inmediato de Hebreos 12 habla de perseverancia bajo sufrimiento, pero el versículo no delimita de forma estrecha el referente. Conservar la amplitud de «el pecado» respeta la tensión interpretativa del texto en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla más allá de lo que dice el griego.
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia: no se identificaron revisiones necesarias respecto del texto griego ni del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «pecado» como sustantivo genérico, acorde con la decisión teológica documentada.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el versículo.
  - Se usa un registro bíblico natural pero contemporáneo, sin calco rígido de la sintaxis griega.
