translation:
  language: es
  text: Ahora bien, toda disciplina, por el momento, no parece ser de alegría, sino de tristeza; pero después da el fruto pacífico de rectitud[a] a los que han sido ejercitados por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El griego δικαιοσύνη puede denotar justicia o rectitud; aquí probablemente se refiere a la vida moral recta producida por la disciplina de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - formación
  - corrección
  - instrucción
  lexicon: BDAG
  rationale: En Hebreos 12 el término abarca una disciplina formativa de Dios, no solo castigo ni solo enseñanza. «Disciplina» conserva esa amplitud y suena natural en español bíblico contemporáneo.
- source_word: πρὸς μὲν τὸ παρὸν
  english_pob_choice: for the present
  chosen_spanish: por el momento
  alternatives_spanish:
  - para el presente
  - en el presente
  - por ahora
  lexicon: BDAG
  rationale: La locución marca una perspectiva temporal provisional, en contraste con ὕστερον. «Por el momento» comunica bien ese matiz en español sin sonar rígido.
- source_word: οὐ δοκεῖ
  english_pob_choice: seems
  chosen_spanish: no parece
  alternatives_spanish:
  - no parece ser
  - se considera que no es
  - no resulta
  lexicon: BDAG
  rationale: El verbo expresa percepción humana, no una negación absoluta. «No parece» preserva esa apariencia subjetiva.
- source_word: χαρᾶς ... ἀλλὰ λύπης
  english_pob_choice: not joy but sorrow
  chosen_spanish: de alegría ... sino de tristeza
  alternatives_spanish:
  - de gozo ... sino de dolor
  - de gozo ... sino de pesar
  - de alegría ... sino de dolor
  lexicon: BDAG
  rationale: Los sustantivos griegos contrastan alegría con tristeza. En español, «alegría/tristeza» reproduce el paralelismo con claridad y sin intensificar indebidamente λύπη.
- source_word: ὕστερον
  english_pob_choice: later
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  - posteriormente
  lexicon: BDAG
  rationale: Indica el resultado posterior de la disciplina. «Después» es breve, natural y mantiene la oposición temporal con «por el momento».
- source_word: καρπὸν εἰρηνικὸν
  english_pob_choice: the peaceful fruit
  chosen_spanish: el fruto apacible
  alternatives_spanish:
  - fruto pacífico
  - fruto de paz
  - el fruto pacífico
  lexicon: BDAG
  rationale: El adjetivo εἰρηνικός modifica directamente a καρπός. «Apacible» preserva la cualidad de paz de manera natural en español, sin reducirla solo a un efecto subjetivo.
- source_word: γεγυμνασμένοις
  english_pob_choice: have been trained
  chosen_spanish: han sido ejercitados
  alternatives_spanish:
  - han sido entrenados
  - han sido adiestrados
  - han sido disciplinados
  lexicon: BDAG
  rationale: El participio perfecto pasivo conserva la idea de personas moldeadas por ejercicio repetido. «Ejercitados» deja ver el trasfondo de entrenamiento y práctica, sin perder la metáfora.
- source_word: ἀποδίδωσιν
  english_pob_choice: yields
  chosen_spanish: da
  alternatives_spanish:
  - produce
  - rinde
  - entrega
  lexicon: BDAG
  rationale: En contexto el sujeto produce un resultado. «Da» funciona bien con «fruto» y mantiene la relación causal de manera directa.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «righteousness», en español «justicia» conserva la amplitud moral y relacional del término. El contexto de fruto producido por la disciplina de Dios permite esta equivalencia, y la nota preserva la alternativa «rectitud» si se quisiera destacar el aspecto de integridad.
theological_decisions:
- issue: Sentido de παιδεία en la acción de Dios sobre los creyentes
  english_pob_reading: formative discipline, including correction and training
  chosen_spanish_reading: disciplina formativa, que incluye corrección y entrenamiento
  alternative_spanish_readings:
  - castigo
  - instrucción solamente
  rationale: El contexto de Hebreos 12:5–10 presenta la παιδεία de Dios en términos filiales y orientados a la santidad. «Disciplina» mantiene la tensión entre corrección amorosa y formación, sin reducirla a mera retribución o a enseñanza abstracta.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: δικαιοσύνη como fruto de la disciplina
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La opción principal del POB en inglés fue «righteousness», pero en español «justicia» es la forma más natural para sostener el campo semántico del término. En este versículo el resultado es un fruto moral producido por la disciplina divina; la nota conserva la alternativa «rectitud» para no perder la dimensión de integridad.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene la lectura aprobada en el audit trail y conserva la tensión lexical principal entre disciplina formativa y el fruto de δικαιοσύνη.
  spanish_consistency_notes:
  - Se mantiene «disciplina» para παιδεία, conforme al valor formativo del contexto de Hebreos 12.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - Se usa «justicia» como término principal para δικαιοσύνη, con nota alternativa «rectitud» para preservar la amplitud semántica.
  - El orden temporal «por el momento ... después» reproduce la antítesis del griego y del inglés auditado.
  - La puntuación con punto y coma refleja la fuerte oposición entre el estado presente y el resultado posterior.
