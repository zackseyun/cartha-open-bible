revisions:
- from: Ahora bien, toda disciplina, por el momento, no parece ser de alegría[a], sino de tristeza; pero después da el fruto apacible de justicia[b] a los que han sido ejercitados por ella.
  to: Ahora bien, toda disciplina, por el momento, no parece ser de alegría, sino de tristeza; pero después da el fruto pacífico de rectitud[a] a los que han sido ejercitados por ella.
  rationale: Se corrige «apacible» a «pacífico» para reflejar mejor εἰρηνικός, y «justicia» a «rectitud» en el texto principal para alinearse mejor con el audit trail del POB y con el sentido contextual de δικαιοσύνη como fruto moral de la disciplina. Se elimina la nota sobre «alegría/gozo» por no ser necesaria.
