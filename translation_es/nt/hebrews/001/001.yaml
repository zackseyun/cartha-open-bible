translation:
  language: es
  text: Hace mucho tiempo, Dios habló en muchas partes[a] y de muchas maneras a los padres[c] por medio de los profetas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en muchas porciones»; el griego distingue esto de «de muchas maneras», resaltando tanto el carácter fragmentario como la diversidad del modo de la revelación anterior.
    reason: lexical_alternative
  - marker: b
    text: O «por los profetas»; literalmente, «en los profetas».
    reason: lexical_alternative
  - marker: c
    text: O «a los antepasados»; griego «a los padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολυμερῶς
  english_pob_choice: in many parts
  chosen_spanish: de muchas partes
  alternatives_spanish:
  - en muchas partes
  - en muchas porciones
  - de muchos fragmentos
  lexicon: BDAG
  rationale: La adverbio griego distingue la revelación anterior por su carácter fragmentario o distribuido en partes. «De muchas partes» conserva esa idea sin confundirla con el otro adverbio de modo, πολυτρόπως. «En muchas partes» también sería posible, pero suena menos natural en español para esta relación adverbial.
- source_word: πολυτρόπως
  english_pob_choice: in many ways
  chosen_spanish: de muchas maneras
  alternatives_spanish:
  - en muchas maneras
  - de diversos modos
  - variadamente
  lexicon: BDAG
  rationale: El término señala diversidad de modos o maneras. «De muchas maneras» es natural en español moderno y mantiene el contraste con «de muchas partes».},{
theological_decisions:
- issue: Relación entre el participio aoristo y el contraste con Hebreos 1:2
  english_pob_reading: Use a finite English verb in v.1 ('God spoke') while preserving the temporal contrast with v.2.
  chosen_spanish_reading: Usar un verbo finito en español («Dios habló») sin hacer explícita la forma participial, dejando intacto el contraste temporal y revelacional con 1:2.
  alternative_spanish_readings:
  - «Dios, habiendo hablado…»
  - «Dios habló anteriormente…»
  rationale: El participio λαλήσας queda completado por el verbo principal de 1:2; en una versión de versículo aislado, un giro como «habiendo hablado» suena demasiado suspendido. «Dios habló» comunica la acción y conserva la tensión histórica entre la revelación anterior y la revelación final en el Hijo sin resolverla de antemano.
  doctrine_reference: Hebreos 1:1–2; filosofía de equivalencia óptima; mantener la tensión teológica de la progresión revelacional
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión más reciente y no requiere cambios sustanciales; la redacción española conserva la distinción entre Πολυμερῶς y πολυτρόπως, así como la referencia histórica a «los padres» y la mediación profética.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός sin artículo explícito en español.
  - Se conserva «los padres» para τοῖς πατράσιν, en vez de expandir interpretativamente a «antepasados».
  - Se usa «por medio de los profetas» para ἐν τοῖς προφήταις como solución idiomática que preserva la mediación profética.
  - La traducción evita fusionar las dos adverbiales griegas en una sola idea, respetando su tensión semántica.
