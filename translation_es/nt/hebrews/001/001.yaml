    reason: lexical_alternative
  - marker: c
    text: O «a los antepasados»; griego «a los padres».
    reason: lexical_alternative
  revision_rationale: Se revisa el texto para reflejar mejor la distinción léxica documentada entre Πολυμερῶς («en muchas partes/porciones») y πολυτρόπως («de muchas maneras»), mejorar la naturalidad del español y corregir la colocación y el contenido de las notas al pie. Se mantiene «Hace mucho tiempo» y el verbo finito «habló», que son fieles y legibles.
