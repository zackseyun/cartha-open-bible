revisions:
- from: 'Y cuando otra vez introduce al Primogénito en el mundo[a], dice[b]: «Y adórenlo todos los ángeles de Dios».'
  to: 'Y cuando otra vez introduce al Primogénito en el mundo[a], dice: «Y adórenlo todos los ángeles de Dios[b]».'
  rationale: El texto principal es sustancialmente fiel, pero requiere corrección editorial para que la nota b quede anclada en la frase correcta y no en «dice». Dado que la alternativa inglesa sobre el genitivo no produce una diferencia clara y natural en español, la nota se reformula como explicación mínima del griego en vez de una falsa alternativa indistinguible. Se mantiene el resto del verso, incluida la ambigüedad de «otra vez» en la nota a.
  reviewer_model: gpt-5.4
