translation:
  language: es
  text: 'Y cuando otra vez introduce al Primogénito en el mundo[a], dice: «Y adórenlo todos los ángeles de Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y otra vez, cuando introduce al Primogénito en el mundo, dice: “Y adórenlo todos los ángeles de Dios”.» El adverbio griego «otra vez» puede modificar tanto a «introduce» como a «dice».'
    reason: alternative_reading
  - marker: b
    text: Gr. «todos los ángeles de Dios». También puede expresarse como «todos los ángeles de Dios», con el mismo sentido posesivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal; «cuando» es natural en español y conserva el valor temporal específico del pasaje.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Es un conector suave de avance discursivo. «Y» mantiene la continuidad sin forzar contraste.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - además
  lexicon: BDAG
  rationale: Se deja unido a «introduce» en el texto principal, porque en griego puede modificar ese verbo. «Otra vez» conserva la ambigüedad real; la nota preserva la alternativa de que modifique «dice».
- source_word: εἰσαγάγῃ
  english_pob_choice: brings
  chosen_spanish: introduce
  alternatives_spanish:
  - trae
  - conduce
  lexicon: BDAG
  rationale: La idea es la de traer dentro o introducir. En español, «introduce» comunica bien la acción sin perder el matiz de entrada en una esfera.
- source_word: τὸν πρωτότοκον
  english_pob_choice: the Firstborn
  chosen_spanish: al Primogénito
  alternatives_spanish:
  - al Primogénito primero
  - al primero engendrado
  lexicon: BDAG
  rationale: Se trata de un título cristológico. «Primogénito» preserva la resonancia de prioridad, filiación y dignidad; se capitaliza por su valor titular en el contexto.
- source_word: εἰς τὴν οἰκουμένην
  english_pob_choice: into the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - a la tierra habitada
  - al mundo habitado
  lexicon: BDAG
  rationale: οἰκουμένη puede referirse al mundo habitado. «En el mundo» es fluido en español y mantiene el alcance amplio sin sobreexplicar.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice en la Escritura
  - afirma
  lexicon: BDAG
  rationale: Se conserva la simpleza del verbo griego y se evita añadir una glosa interpretativa.
- source_word: προσκυνησάτωσαν
  english_pob_choice: let ... worship
  chosen_spanish: adórenlo
  alternatives_spanish:
  - ríndanle homenaje
  - prostréntense ante él
  lexicon: BDAG
  rationale: En este contexto, el verbo exige un acto de culto y no solo cortesía. «Adórenlo» expresa con naturalidad la fuerza imperativa/jusiva del griego y preserva el peso teológico del pasaje.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - ante él
  - a él
  lexicon: BDAG
  rationale: El clítico directo español se integra mejor con «adórenlo» y mantiene la referencia personal al Hijo.
- source_word: πάντες ἄγγελοι θεοῦ
  english_pob_choice: all God’s angels
  chosen_spanish: todos los ángeles de Dios
  alternatives_spanish:
  - todos los ángeles de Yahvé
  - todos los mensajeros de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se rinde de forma natural como «de Dios». Se evita «mensajeros» porque aquí el término alude específicamente a seres angelicales, no a mensajeros humanos.
theological_decisions:
- issue: Ámbito de πάλιν
  english_pob_reading: '''again'' modifies ''brings'' (''when he again brings the Firstborn into the world'')'
  chosen_spanish_reading: «otra vez» modifica a «introduce» en el texto principal
  alternative_spanish_readings:
  - «Y otra vez, cuando introduce al Primogénito en el mundo, dice…»
  - «Y cuando introduce otra vez al Primogénito en el mundo, dice…»
  rationale: El griego permite ambas posibilidades. Se mantiene en el texto principal la lectura que sigue más de cerca el orden de las palabras, y la nota preserva la lectura alternativa para no ocultar la ambigüedad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza de προσκυνέω dirigido al Hijo
  english_pob_reading: '''worship'''
  chosen_spanish_reading: «adórenlo»
  alternative_spanish_readings:
  - «ríndanle homenaje»
  - «postrénse ante él»
  rationale: En Hebreos 1, el mandato dado a todos los ángeles de Dios frente al Hijo requiere un verbo de culto. «Adorar» refleja mejor esa fuerza que una mera reverencia social o cortesía.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), within source-text bounds.'
translation_notes:
  revision_awareness: Sin revisiones aplicadas en la fuente auditada; el texto sigue la lectura estable del paquete fuente y conserva la ambigüedad sintáctica documentada en πάλιν mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Primogénito» como título cristológico con mayúscula.
  - Se usa «Dios» para θεοῦ en la construcción genitiva, conforme al estándar del proyecto.
  - Se traduce προσκυνέω aquí como «adorar», no como «rendir homenaje», por la fuerza cultual del contexto.
  - Se conserva el paralelismo conciso de la cita con puntuación de discurso directo clara y publicable.
