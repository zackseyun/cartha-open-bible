translation:
  language: es
  text: habiendo llegado a ser tan superior a los ángeles como más excelente es el nombre que ha heredado que el suyo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mejor que los ángeles ... más distinguido que el suyo».
    reason: lexical_alternative
  - marker: b
    text: El «nombre» se aclara en el contexto siguiente como el título o estatus filial del Hijo.
    reason: cross_reference
lexical_decisions:
- source_word: τοσούτῳ ... ὅσῳ
  english_pob_choice: as much ... as
  chosen_spanish: tanto ... cuanto
  alternatives_spanish:
  - así como ... así también
  - tan ... como
  lexicon: BDAG
  rationale: La construcción correlativa griega expresa una comparación proporcional. En español, «tanto ... cuanto» comunica bien esa relación medida sin forzar el orden natural de la frase.
- source_word: κρείττων
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - superior
  - más excelente
  lexicon: BDAG
  rationale: La revisión inglesa optó por «better» para reflejar con más directa el comparativo κρείττων. En español, «mejor» es el equivalente más natural y conserva el valor comparativo de rango en este contexto.
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_spanish: llegando a ser
  alternatives_spanish:
  - habiendo llegado a ser
  - habiendo sido hecho
  lexicon: BDAG
  rationale: El participio aoristo se refiere a un estado resultante. «Llegando a ser» preserva ese sentido de transición/resultante sin sugerir innecesariamente creación o fabricación.
- source_word: τῶν ἀγγέλων
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - ángeles
  lexicon: BDAG
  rationale: El genitivo comparativo se entiende naturalmente en español con «que los ángeles». Mantengo el sustantivo con artículo porque el referente es definido en el argumento de la carta.
- source_word: διαφορώτερον
  english_pob_choice: more excellent
  chosen_spanish: más excelente
  alternatives_spanish:
  - más distinguido
  - más sobresaliente
  lexicon: BDAG
  rationale: El adverbio comparativo comunica excelencia o distinción superior. «Más excelente» conserva el tono elevado de Hebreos y la fuerza de superioridad del término.
- source_word: παρ’ αὐτοὺς
  english_pob_choice: than theirs
  chosen_spanish: que el de ellos
  alternatives_spanish:
  - que el suyo
  - que el de los ángeles
  lexicon: BDAG
  rationale: Dado que ὄνομα es el punto de comparación, el español necesita explicitar la relación posesiva. «Que el de ellos» mantiene la concisión y evita sobreinterpretar el referente.
- source_word: κεκληρονόμηκεν
  english_pob_choice: he has inherited
  chosen_spanish: ha heredado
  alternatives_spanish:
  - ha recibido en herencia
  - ha obtenido por herencia
  lexicon: BDAG
  rationale: El perfecto expresa una posesión presente derivada de una herencia recibida. «Ha heredado» es la forma más natural en español y conserva ese valor resultante.
- source_word: ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - un nombre
  - el título
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, el contexto hace definido el sustantivo. «El nombre» respeta la fluidez española y deja que el contexto inmediato precise su contenido.
theological_decisions:
- issue: Relación del Hijo con los ángeles y posible lectura ontológica de γενόμενος
  english_pob_reading: Render the participle straightforwardly as 'having become' while understanding the verse in context as referring to the Son's exalted status and inherited name, not to an ontological change from non-divinity to divinity.
  chosen_spanish_reading: Traducir el participio de manera directa como una llegada a la condición superior respecto de los ángeles, entendiendo el contexto como exaltación y reconocimiento de su nombre heredado, no como un cambio ontológico de divinidad.
  alternative_spanish_readings:
  - habiendo sido hecho mejor que los ángeles
  - habiendo pasado a ser mejor que los ángeles
  rationale: Hebreos presenta una comparación de rango y estatus dentro de la secuencia de exaltación del Hijo. La traducción debe conservar el valor verbal sin insinuar creación ni negar la plena identidad del Hijo que el contexto más amplio presupone.
  doctrine_reference: Credo de Nicea-Constantinopla (381); Definición de Calcedonia (451)
- issue: Sentido de 'nombre' en el contexto inmediato
  english_pob_reading: Translate literally as 'the name' while allowing the context to identify it as the filial title/status of Son.
  chosen_spanish_reading: Traducir literalmente «el nombre», dejando que el contexto siguiente lo identifique como el título/estatus filial del Hijo.
  alternative_spanish_readings:
  - el título de Hijo
  - la dignidad que ha recibido
  rationale: El versículo por sí solo dice «nombre», y la explicación viene en el desarrollo siguiente. Mantenerlo evita una paráfrasis prematura y preserva la progresión literaria de Hebreos.
  doctrine_reference: Hebreos 1:5-6 como aclaración contextual del nombre filial
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «superior» a «better» para κρείττων; la versión española sigue esa última decisión con «mejor» y conserva la comparación proporcional y el valor de exaltación. También se mantuvo la lectura literal de «nombre», sin anticipar la aclaración contextual.
  spanish_consistency_notes:
  - Se usa «ángeles» y no una perífrasis más interpretativa, en continuidad con el griego.
  - «Ha heredado» refleja el perfecto y su estado presente resultante.
  - Se evita «Cristo» porque el versículo habla del Hijo en relación con el nombre heredado, no introduce aquí el título mesiánico.
  - «Más excelente» se reserva como alternativa anotada; en el texto principal se prefirió la naturalidad de «mejor» para κρείττων.
