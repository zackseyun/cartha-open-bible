  to: Él, siendo el resplandor de su gloria y la impronta exacta[a] de su ser, y sosteniendo todas las cosas por la palabra de su poder, después de hacer purificación por los pecados por medio de sí mismo[b], se sentó a la derecha de la Majestad en las alturas[c].
  rationale: Se reordenaron los marcadores para que cada nota quede anclada a la palabra o frase correspondiente, conforme a las reglas editoriales. Se cambió «mediante sí mismo» por «por medio de sí mismo» para mejorar la naturalidad del español sin perder la fuerza de δι’ αὑτοῦ. El resto del verso se mantiene porque refleja bien el griego y las decisiones léxicas/theológicas del POB.
