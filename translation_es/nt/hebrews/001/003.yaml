translation:
  language: es
  text: Él, siendo el resplandor de su gloria y la impronta exacta[a] de su ser, y sosteniendo todas las cosas por la palabra de su poder, después de hacer purificación por los pecados por medio de sí mismo[b], se sentó a la derecha de la Majestad en las alturas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la impronta exacta de su naturaleza/sustancia».'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten «por medio de sí mismo»; la frase se incluye aquí siguiendo la lectura del SBLGNT. Las versiones tradicionales en inglés a menudo reflejan una forma textual distinta, a veces traducida «by himself».
    reason: textual_variant
  - marker: c
    text: 'O: «en lo alto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαύγασμα
  english_pob_choice: radiance
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - fulgor
  - radiancia
  lexicon: BDAG
  rationale: «Resplandor» comunica el brillo que procede de una fuente, conservando la imagen de irradiación sin sonar artificial en español. Evita «reflexión», que debilitaría la fuerza cristológica del pasaje.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente normal y más apto para mantener el peso teológico de la expresión.
- source_word: χαρακτήρ
  english_pob_choice: exact imprint
  chosen_spanish: impronta exacta
  alternatives_spanish:
  - representación exacta
  - huella exacta
  - sello exacto
  lexicon: BDAG
  rationale: «Impronta» conserva la imagen concreta de una marca estampada; añadir «exacta» transmite la correspondencia precisa que el inglés POB quiso preservar con «exact imprint».
- source_word: ὑπόστασις
  english_pob_choice: being
  chosen_spanish: ser
  alternatives_spanish:
  - naturaleza
  - sustancia
  - esencia
  lexicon: BDAG
  rationale: «Ser» expresa la realidad subyacente sin imponer una terminología metafísica posterior. En español resulta más natural que «sustancia» o «esencia», aunque esas alternativas siguen siendo posibles.
- source_word: φέρων
  english_pob_choice: sustaining
  chosen_spanish: sosteniendo
  alternatives_spanish:
  - sustentando
  - sosteniendo continuamente
  - manteniendo
  lexicon: BDAG
  rationale: El participio presente indica acción continua. «Sosteniendo» comunica bien la conservación activa de todas las cosas y evita una paráfrasis excesiva.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo
  - todo cuanto existe
  lexicon: BDAG
  rationale: «Todas las cosas» preserva la amplitud total del griego sin restringir indebidamente el sentido a la creación material.
- source_word: ῥῆμα
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - orden
  - mandato
  - dicho
  lexicon: BDAG
  rationale: «Palabra» es la traducción más natural y mantiene el sentido de la expresión instrumental «la palabra de su poder».
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: «Poder» es la forma estándar y clara en esta construcción.
- source_word: δι’ αὑτοῦ
  english_pob_choice: through himself
  chosen_spanish: mediante sí mismo
  alternatives_spanish:
  - por sí mismo
  - a través de sí mismo
  - por medio de sí mismo
  lexicon: BDAG
  rationale: El griego de SBLGNT incluye esta frase, y «mediante sí mismo» conserva la fuerza preposicional sin sonar forzado en español. «Por sí mismo» también sería posible, pero puede sonar más como lectura tradicional que como reflejo del griego específico.
- source_word: καθαρισμὸν
  english_pob_choice: purification
  chosen_spanish: purificación
  alternatives_spanish:
  - limpieza
  - limpiezade
  - purga
  lexicon: BDAG
  rationale: «Purificación» preserva el matiz cultual y sacrificial mejor que «limpieza».
- source_word: τῶν ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - de los pecados
  - a causa de los pecados
  lexicon: BDAG
  rationale: En español, «purificación por los pecados» comunica bien la relación de beneficio/relación del acto purificador con el problema del pecado, y evita un giro demasiado técnico o duro como «purificación de los pecados».
- source_word: ποιησάμενος
  english_pob_choice: after making
  chosen_spanish: después de hacer
  alternatives_spanish:
  - habiendo hecho
  - tras hacer
  - cuando hizo
  lexicon: BDAG
  rationale: La forma aorista antecede a la acción principal; «después de hacer» marca claramente la secuencia antes de «se sentó».
- source_word: ἐκάθισεν
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se sentó a reinar
  lexicon: BDAG
  rationale: «Se sentó» conserva la imagen simple y la carga de entronización/completitud que tiene el griego y el inglés POB.
- source_word: ἐν δεξιᾷ
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la diestra
  - al lado derecho
  lexicon: BDAG
  rationale: «A la derecha» es claro y natural en español moderno. «A la diestra» es más tradicional, pero menos transparente para lectores actuales.
- source_word: μεγαλωσύνη
  english_pob_choice: the Majesty
  chosen_spanish: la Majestad
  alternatives_spanish:
  - la Grandeza
  - Majestad
  lexicon: BDAG
  rationale: La mayúscula y el artículo preservan el uso reverencial del término como designación divina.
- source_word: ἐν ὑψηλοῖς
  english_pob_choice: on high
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo alto
  - en las alturas celestiales
  lexicon: BDAG
  rationale: «En las alturas» refleja con naturalidad el plural griego y conserva el sentido elevado del cierre.
theological_decisions:
- issue: Traducción de ὑπόστασις en un texto clave para la cristología y la doctrina trinitaria
  english_pob_reading: being
  chosen_spanish_reading: ser
  alternative_spanish_readings:
  - naturaleza
  - sustancia
  - esencia
  rationale: «Ser» mantiene la referencia a la realidad profunda del Hijo sin cargar el verso con tecnicismos posteriores. El texto sí es doctrinalmente denso, pero la traducción debe permanecer cercana al griego y no resolver de antemano la terminología conciliar.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Fuerza cristológica de ἀπαύγασμα y χαρακτήρ
  english_pob_reading: radiance / exact imprint
  chosen_spanish_reading: resplandor / impronta exacta
  alternative_spanish_readings:
  - brillo / representación exacta
  - radiancia / sello exacto
  rationale: 'La formulación española conserva la intensidad ontológica y representacional del pasaje: el Hijo no es una mera copia ni una simple apariencia, sino la manifestación resplandeciente y la correspondencia precisa de la realidad divina.'
  doctrine_reference: Cristología nicena; afirmaciones clásicas sobre la plena deidad del Hijo
- issue: Lectura textual de δι’ αὑτοῦ
  english_pob_reading: through himself
  chosen_spanish_reading: mediante sí mismo
  alternative_spanish_readings:
  - por sí mismo
  - por medio de sí mismo
  - omitir la frase
  rationale: La lectura del SBLGNT se conserva explícitamente en el texto principal. La elección española mantiene la relación instrumental que el griego sugiere y evita borrar una variante documentada.
  doctrine_reference: Crítica textual del Nuevo Testamento; transparencia textual del POB
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del contexto inglés, que mantuvo «through himself» en el texto principal y ajustó la clausula final a «on high». En español se preservó la lectura textual de δι’ αὑτοῦ con una formulación natural («mediante sí mismo») y se optó por «en las alturas» para reflejar ἐν ὑψηλοῖς con transparencia formal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se tradujo ὑπόστασις con «ser» en el cuerpo principal para evitar una lectura demasiado técnica; se documenta la alternativa «naturaleza/sustancia» en nota.
  - 'Se conservó la secuencia verbal del griego: descripción del Hijo, acción de sostener, acción purificadora previa y entronización posterior.'
  - «La Majestad» se capitalizó para mantener el valor reverencial del circunloquio divino.
  - No se añadió ninguna glosa doctrinal al texto principal; las precisiones se reservaron para notas y decisiones léxicas.
