translation:
  language: es
  text: 'Y acerca de los ángeles dice[a]: «Él hace a sus ángeles vientos, y a sus ministros llama de fuego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «espíritus»: la palabra griega puede significar tanto «vientos» como «espíritus».'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς μὲν τοὺς ἀγγέλους
  english_pob_choice: about the angels
  chosen_spanish: acerca de los ángeles
  alternatives_spanish:
  - sobre los ángeles
  - con respecto a los ángeles
  lexicon: BDAG
  rationale: En Hebreos 1 el contraste es temático, no de destinatario directo. «Acerca de» comunica bien el valor tópico de πρός con λέγει, sin sugerir que el discurso se dirige a los ángeles.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice de
  - dice acerca de
  lexicon: BDAG
  rationale: El presente histórico de la fórmula cita la Escritura con naturalidad en español. «Dice» preserva la vividez del texto y evita una construcción más pesada.
- source_word: Ὁ ποιῶν
  english_pob_choice: He makes
  chosen_spanish: El que hace
  alternatives_spanish:
  - El que hace de
  - Aquel que hace
  lexicon: BDAG
  rationale: El participio articular griego funciona como relativo. En español, «El que hace» reproduce bien la relación verbal y el sujeto implícito sin endurecer el sintagma.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto inmediato de Hebreos 1 contrasta claramente a los ángeles celestiales con el Hijo; por eso «ángeles» es la opción correcta y más precisa.
- source_word: πνεύματα
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - espíritus
  lexicon: BDAG
  rationale: Sigo la lectura más probable en el trasfondo poético de Salmo 104:4, donde la imagen de «vientos» encaja con «llama de fuego». Mantengo la alternativa «espíritus» en nota porque la forma griega es genuinamente ambigua.
- source_word: λειτουργοὺς
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: «Ministros» conserva el registro elevado y la posible resonancia cultual de λειτουργός mejor que «siervos», sin imponer una terminología eclesiástica ajena al texto.
- source_word: πυρὸς φλόγα
  english_pob_choice: a flame of fire
  chosen_spanish: llama de fuego
  alternatives_spanish:
  - una llama de fuego
  - llamas de fuego
  - llama ígnea
  lexicon: BDAG
  rationale: La frase griega es una construcción poética; en español, «llama de fuego» suena natural y mantiene el paralelismo imagístico. La omisión del artículo indefinido en español es idiomática y no altera el sentido.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo plural de tercera persona en español transmite con claridad la referencia a Dios implícita en el contexto de la cita.
theological_decisions:
- issue: Sentido de πνεύματα en la cita de Salmo 104:4
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  rationale: 'La traducción principal sigue la probabilidad contextual y poética del pasaje: «vientos» se ajusta al trasfondo del Salmo y al paralelismo con «llama de fuego». Sin embargo, no se elimina la ambigüedad léxica del griego, que también puede significar «espíritus».'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: πρός + λέγει se entiende de modo temático («acerca de»), πνεύματα se traduce en el texto principal como «vientos» por el trasfondo de Salmo 104:4, y se conserva la alternativa «espíritus» en nota por la ambigüedad real del término. No hubo revisiones aplicadas en el paso más reciente.'
  spanish_consistency_notes:
  - Se mantiene «ángeles» para ἀγγέλους por el contraste explícito de Hebreos 1.
  - «Ministros» conserva el registro elevado de λειτουργοί sin convertirlo en un título eclesiástico.
  - «Yahvé» no aparece en este versículo; la referencia implícita al hablante divino se deja en el contexto de la cita sin explicitar un nombre en el texto español.
