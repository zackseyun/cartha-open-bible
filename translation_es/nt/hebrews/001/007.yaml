- from: 'Y acerca de los ángeles dice[a]: «El que hace de sus ángeles vientos, y de sus ministros, llama de fuego».'
  to: 'Y acerca de los ángeles dice[a]: «Él hace a sus ángeles vientos, y a sus ministros llama de fuego».'
  rationale: Se ajusta la redacción para que el español suene más natural y refleje mejor la fuerza verbal de Ὁ ποιῶν / «He makes». También se elimina una coma innecesaria para preservar el paralelismo poético. Se mantiene intacta la decisión léxica clave «vientos» con nota alternativa «espíritus».
