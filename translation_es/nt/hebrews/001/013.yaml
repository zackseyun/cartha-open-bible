translation:
  language: es
  text: 'Pero, ¿a cuál de los ángeles le dijo alguna vez[a]: «Siéntate a mi derecha hasta que ponga a tus enemigos como estrado para tus pies»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que ponga a tus enemigos bajo tus pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς τίνα δὲ τῶν ἀγγέλων
  english_pob_choice: But to which of the angels
  chosen_spanish: Pero, ¿a cuál de los ángeles
  alternatives_spanish:
  - Y, ¿a cuál de los ángeles
  - Ahora bien, ¿a cuál de los ángeles
  lexicon: BDAG
  rationale: πρός con un interrogativo en este marco retórico introduce la pregunta indirecta de destinatario; en español, «a cuál de los ángeles» conserva la referencia de dirección/destino. δέ se expresa naturalmente con «Pero» para mantener el contraste argumentativo con el contexto inmediato.
- source_word: εἴρηκέν ποτε
  english_pob_choice: has he ever said
  chosen_spanish: le dijo alguna vez
  alternatives_spanish:
  - le ha dicho alguna vez
  - le dijo jamás
  lexicon: BDAG
  rationale: El perfecto griego enfatiza la vigencia del dicho, pero en español la pregunta retórica suena más natural en pretérito con «alguna vez». Se mantiene el sentido de ‘nunca en ningún momento’ implícito en ποτέ sin forzar una perífrasis más pesada.
- source_word: Κάθου
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Siéntate y permanece
  - Toma asiento
  lexicon: BDAG
  rationale: El imperativo dirigido al Hijo requiere un imperativo directo en español. «Siéntate» es más natural que «sentaos» o una fórmula pasiva; conserva el tono entronizatorio de la cita.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi mano derecha
  - junto a mi derecha
  lexicon: BDAG
  rationale: La expresión es una fórmula estable de entronización. En español, «a mi derecha» transmite mejor la locución fija que una traducción literal con «desde». Se evita «mano» para no añadir un elemento innecesario.
- source_word: ἕως ἂν θῶ
  english_pob_choice: until I make
  chosen_spanish: hasta que ponga
  alternatives_spanish:
  - hasta que haga
  - hasta que coloque
  lexicon: BDAG
  rationale: θῶ, de τίθημι, se vierte con «ponga», que conserva el valor de ‘colocar/poner’ y permite la construcción natural de la imagen sin explotar el verbo inglés «make». «Hasta que» expresa la cláusula de temporalidad futura.
- source_word: τοὺς ἐχθρούς σου
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - tus enemigos
  - a los enemigos tuyos
  lexicon: BDAG
  rationale: El acusativo objeto se refleja en español con la preposición personal «a» por tratarse de personas. Se mantiene el plural simple y la segunda persona posesiva.
- source_word: ὑποπόδιον τῶν ποδῶν σου
  english_pob_choice: a footstool for your feet
  chosen_spanish: por estrado de tus pies
  alternatives_spanish:
  - como estrado de tus pies
  - por banquillo de tus pies
  lexicon: BDAG
  rationale: El griego presenta la imagen de subordinación mediante ὑποπόδιον. «Estrado de tus pies» preserva el valor metafórico tradicional y es más idiomático en español bíblico que «reposapiés». La preposición «por» comunica el resultado/función en la frase española; la forma «por estrado» evita una calca pesada de «para tus pies» y conserva la imagen de sujeción.
theological_decisions:
- issue: Cita de Salmo 110:1 como oráculo de entronización aplicada al Hijo
  english_pob_reading: 'Retain the direct quotation as an enthronement oracle addressed uniquely to the Son: ''Sit at my right hand until I make your enemies a footstool for your feet.'''
  chosen_spanish_reading: 'Conservar la cita directa como oráculo de entronización dirigido de modo exclusivo al Hijo: «Siéntate a mi derecha, hasta que ponga a tus enemigos por estrado de tus pies».'
  alternative_spanish_readings:
  - «Siéntate a mi derecha, hasta que derrote completamente a tus enemigos»
  - «Siéntate a mi derecha, hasta que someta a tus enemigos»
  rationale: Hebreos argumenta a partir de la forma exacta de la cita y de la oposición entre el Hijo y los ángeles. La traducción conserva la metáfora real y la sujeción de los enemigos sin explicitar más de lo que el texto dice.
  doctrine_reference: Salmo 110:1; Hebreos 1:13
- issue: Valor de ποτέ en la pregunta retórica
  english_pob_reading: has he ever said
  chosen_spanish_reading: le dijo alguna vez
  alternative_spanish_readings:
  - le ha dicho alguna vez
  - le dijo en alguna ocasión
  rationale: La pregunta no busca una fecha concreta sino subrayar la ausencia total de un dicho semejante respecto a los ángeles. «Alguna vez» preserva esa fuerza sin añadir una negación explícita que no está en la forma griega.
  doctrine_reference: Retórica bíblica; Hebreos 1:13
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado revisado del inglés POB, sin cambios sustantivos en la lectura de la cita. Se conservó la estructura interrogativa retórica, el paralelismo de entronización y la imagen de subyugación de ὑποπόδιον. La nota alternativa en la cita refleja la tensión léxica entre una formulación más literal («bajo tus pies») y la fórmula idiomática y tradicional de «estrado de tus pies» en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando el texto lo requiera; aquí no aparece el Tetragrámaton explícitamente.
  - «Ángeles» se mantiene como traducción directa de ἀγγέλων sin matiz técnico adicional.
  - La cita se presenta con puntuación española y comillas angulares para lectura pública.
  - Se evita «Cristo» porque el versículo cita Salmo 110:1 y el foco inmediato es el Hijo en el argumento de Hebreos.
