  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura retórica del griego, el contraste con los ángeles, la cita directa de Salmo 110:1 y la imagen de subyugación. Sin embargo, «por estrado de tus pies» no representa con suficiente naturalidad ni precisión ὑποπόδιον τῶν ποδῶν σου en español moderno; la construcción más fiel y clara es «estrado para tus pies» o la alternativa anotada «bajo tus pies».
  spanish_quality_summary: El texto es generalmente claro y digno, pero «por estrado de tus pies» suena forzado y poco idiomático en español actual. También mejora la fluidez quitar la coma antes de «hasta que». El resto del versículo es natural y adecuado para lectura eclesial amplia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé ni Mesías/Cristo en este versículo. La cita se mantiene con lenguaje bíblico comprensible. La nota alternativa «bajo tus pies» es apropiada y útil.
  issues:
  - severity: medium
    issue: «por estrado de tus pies» es una formulación poco natural
    rationale: ὑποπόδιον significa ‘estrado/reposapiés/banquillo para los pies’. En español, «por estrado» no expresa bien la función predicativa del complemento y puede sonar gramaticalmente extraña o arcaizante de manera innecesaria.
  - severity: low
    issue: La coma antes de «hasta que» entorpece ligeramente la cita
    rationale: 'La cita fluye mejor en español sin esa pausa: «Siéntate a mi derecha hasta que...». No afecta el sentido, pero mejora la legibilidad.'
