  text: Τίνι γὰρ εἶπέν ποτε τῶν ἀγγέλων· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε, καὶ πάλιν· Ἐγὼ ἔσομαι αὐτῷ εἰς πατέρα, καὶ αὐτὸς ἔσται μοι εἰς υἱόν;
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/001/005.yaml
  text: For to which of the angels did he ever say[a], “You are my Son; today I have begotten you”? And again, “I will be to him a father[c][b], and he will be to me a son”?
  footnotes:
  - marker: a
    text: Or, more literally, “said at any time.”
    reason: lexical_alternative
  - marker: b
    text: “I have begotten you” echoes Psalm 2:7. The phrase has been understood in relation to royal enthronement, resurrection, or the Son’s eternal relation to the Father; the translation preserves the wording without deciding among these interpretations.
    reason: cross_reference
  - marker: c
    text: Quotation from 2 Samuel 7:14. Or more idiomatically, “I will be his father, and he will be my son.”
    reason: alternative_reading
