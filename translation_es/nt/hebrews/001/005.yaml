translation:
  language: es
  text: 'Porque, ¿a cuál de los ángeles dijo alguna vez[a]: «Tú eres mi Hijo; hoy te he engendrado[b]»? Y otra vez: «Yo le seré un padre[c], y él me será un hijo»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «dijo en algún momento».
    reason: lexical_alternative
  - marker: b
    text: «Te he engendrado» evoca el Salmo 2:7. Esta frase se ha entendido en relación con la entronización real, la resurrección o la relación eterna del Hijo con el Padre; la traducción preserva la redacción sin decidir entre estas interpretaciones.
    reason: cross_reference
  - marker: c
    text: 'Cita de 2 Samuel 7:14. O de manera más idiomática: «Yo seré su padre, y él será mi hijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τίνι
  english_pob_choice: to which
  chosen_spanish: ¿a cuál de los ángeles
  alternatives_spanish:
  - ¿a quién de los ángeles
  - ¿a cuál ángel
  lexicon: BDAG
  rationale: El dativo interrogativo con genitivo partitivo se expresa mejor en español con «a cuál de los ángeles», preservando la comparación dentro del grupo de ángeles y la fuerza retórica de la pregunta.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - De hecho
  lexicon: BDAG
  rationale: «Pues» mantiene la conexión explicativa con el argumento previo y suena natural en español al inicio de una pregunta retórica.
- source_word: εἶπέν ποτε
  english_pob_choice: did he ever say
  chosen_spanish: dijo alguna vez
  alternatives_spanish:
  - ha dicho alguna vez
  - dijo en algún tiempo
  lexicon: BDAG
  rationale: La combinación de aoristo con ποτέ pide una referencia a cualquier ocasión. «Dijo alguna vez» conserva esa fuerza sin sobrecargar el estilo.
- source_word: ἀγγέλων
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En Hebreos 1 el referente son seres celestiales, no mensajeros humanos, por lo que «ángeles» es la opción correcta por contexto.
- source_word: Υἱός μου εἶ σύ
  english_pob_choice: You are my Son
  chosen_spanish: Tú eres mi Hijo
  alternatives_spanish:
  - Eres tú mi Hijo
  - Mi Hijo eres tú
  lexicon: BDAG
  rationale: Mantiene el orden natural del español sin perder el énfasis del predicado. Se conserva «Hijo» con mayúscula por la identificación cristológica del citado salmo en este contexto.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - hoy mismo
  lexicon: BDAG
  rationale: Adverbio temporal directo y suficientemente claro en español.
- source_word: γεγέννηκά
  english_pob_choice: I have begotten
  chosen_spanish: te he engendrado
  alternatives_spanish:
  - te he dado a luz
  - te he hecho mi hijo
  lexicon: BDAG
  rationale: «Engendrado» reproduce el verbo de la cita de Salmo 2:7 con fidelidad léxica y sin reducirlo a una paráfrasis biológica. El objeto directo se expresa naturalmente en español con «te».
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y además
  lexicon: BDAG
  rationale: Fórmula habitual en Hebreos para introducir otra cita bíblica. «Y otra vez» conserva el valor discursivo de repetición e introducción.
- source_word: Ἐγὼ ἔσομαι αὐτῷ εἰς πατέρα
  english_pob_choice: I will be to him a father
  chosen_spanish: Yo le seré padre
  alternatives_spanish:
  - Yo seré para él un padre
  - Yo le seré un padre
  lexicon: BDAG
  rationale: Aunque la estructura griega puede reproducirse más literalmente, en español «le seré padre» transmite con naturalidad la relación covenantal de la cita de 2 Samuel 7:14 sin perder el sentido. Se evita una formulación forzada como «seré a él un padre».
- source_word: καὶ αὐτὸς ἔσται μοι εἰς υἱόν
  english_pob_choice: and he will be to me a son
  chosen_spanish: y él me será hijo
  alternatives_spanish:
  - y él será para mí hijo
  - y él me será un hijo
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera mitad y la relación recíproca de la cita. «Me será hijo» es una forma idiomática y fiel del griego.
theological_decisions:
- issue: Forma de la filiación en las dos citas del pasaje
  english_pob_reading: Retain 'Son' in the first citation and 'son' in the second, preserving the wording and literary distinction of the quotations.
  chosen_spanish_reading: Mantener «Hijo» en la primera cita y «hijo» en la segunda, preservando la distinción literaria de las citas.
  alternative_spanish_readings:
  - Capitalizar ambas como «Hijo»
  - Poner ambas en minúscula como «hijo»
  rationale: En el argumento de Hebreos ambas citas se aplican al Hijo, pero la primera funciona como título directo y la segunda reproduce la fórmula pactal de 2 Samuel 7:14. La distinción de mayúsculas conserva esa tensión sin nivelarla artificialmente.
  doctrine_reference: Affirmations; Translation philosophy 1, 3, 6
- issue: Sentido de «te he engendrado»
  english_pob_reading: Preserve the wording 'have begotten' without specifying eternal generation, incarnation, resurrection, or enthronement in the translation itself.
  chosen_spanish_reading: Preservar «te he engendrado» sin decidir en la traducción entre generación eterna, entronización o resurrección.
  alternative_spanish_readings:
  - Entenderlo como lenguaje de entronización
  - Entenderlo como declaración de resurrección
  - Entenderlo como generación eterna
  rationale: La cita de Salmo 2:7 entra en una argumentación cristológica, pero la traducción no debe resolver interpretaciones doctrinales que el texto mismo deja abiertas. «Engendrado» mantiene la densidad teológica y la ambigüedad controlada del original.
  doctrine_reference: Affirmations; Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa auditada muestra acuerdo alto y no registra revisiones aplicadas; el borrador español sigue esa lectura estable, conservando el tono retórico y las dos citas del AT sin resolver interpretaciones doctrinales implícitas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se conserva «Hijo» en la primera cita por su valor cristológico directo y «hijo» en la segunda por el paralelismo pactal de la cita veterotestamentaria.
  - «Pues» traduce el valor explicativo de γάρ sin introducir una inferencia causal más fuerte de la que exige el contexto.
  - El texto evita calcos innecesarios como «seré a él» y prioriza una sintaxis española natural sin perder la relación semántica del griego.
