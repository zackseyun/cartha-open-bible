translation:
  language: es
  text: en estos últimos días nos ha hablado en un Hijo[a], a quien constituyó heredero de todo, y por medio de quien también hizo los siglos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por un Hijo'. El griego dice literalmente 'en Hijo', sin artículo antes de 'Hijo', lo que destaca el modo y el carácter culminante del hablar de Dios.
    reason: lexical_alternative
  - marker: b
    text: O 'el universo' o 'los mundos'. El griego 'los siglos' puede referirse a las eras mismas y, por extensión, al orden creado entero.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπ’ ἐσχάτου τῶν ἡμερῶν τούτων
  english_pob_choice: in these last days
  chosen_spanish: en estos últimos días
  alternatives_spanish:
  - al final de estos días
  - en el último de estos días
  lexicon: BDAG
  rationale: La expresión griega es temporal e idiomática. En español, 'en estos últimos días' comunica con naturalidad el valor escatológico sin volver la frase artificial ni perder el sentido de época final.
- source_word: ἐλάλησεν
  english_pob_choice: has spoken
  chosen_spanish: nos ha hablado
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo apunta a una acción cumplida con relevancia actual. 'Nos ha hablado' conserva bien esa fuerza en español y encaja con el contraste implícito con la revelación anterior.
- source_word: ἐν υἱῷ
  english_pob_choice: in a Son
  chosen_spanish: por un Hijo
  alternatives_spanish:
  - en un Hijo
  - por medio de un Hijo
  - en el Hijo
  lexicon: BDAG
  rationale: La construcción griega sin artículo es significativa. En español, 'por un Hijo' mantiene el valor instrumental/medial de ἐν en este contexto y conserva la nota de forma no posesiva ni plenamente explicativa ('su Hijo'), sin borrar la rareza retórica del original. Se evita 'en el Hijo' porque sobreespecifica el griego.
- source_word: ὃν ἔθηκεν
  english_pob_choice: whom he appointed
  chosen_spanish: a quien constituyó
  alternatives_spanish:
  - a quien nombró
  - a quien estableció
  lexicon: BDAG
  rationale: τίθημι aquí expresa establecer en una función o posición. 'Constituyó' es una forma natural en español para una designación formal y encaja con 'heredero de todo'.
- source_word: κληρονόμον πάντων
  english_pob_choice: heir of all things
  chosen_spanish: heredero de todo
  alternatives_spanish:
  - heredero de todas las cosas
  - heredero de todo cuanto existe
  lexicon: BDAG
  rationale: '''Heredero de todo'' conserva la amplitud de πάντων y suena más natural en español que una repetición más pesada de ''todas las cosas'', sin restringir el alcance universal.'
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por quien
  - mediante quien
  lexicon: BDAG
  rationale: διά con genitivo expresa intermediación o agencia. 'Por medio de quien' es claro en español y mantiene la relación causal/instrumental del griego.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: BDAG
  rationale: ποιέω es más amplio que 'crear'. 'Hizo' preserva la amplitud del verbo griego y permite que el complemento 'los siglos' conserve su doble valor temporal y cósmico.
- source_word: τοὺς αἰῶνας
  english_pob_choice: the ages
  chosen_spanish: los siglos
  alternatives_spanish:
  - las edades
  - el universo
  - los mundos
  lexicon: BDAG
  rationale: Aunque la POB inglesa retiene 'the ages', en español 'los siglos' comunica de forma más idiomática la extensión temporal-ordenada de αἰῶνες. Aquí se preserva la tensión entre época/era y orden creado; no se reduce a un simple 'universo' en el texto principal.
theological_decisions:
- issue: Cristología y la expresión anarthrous ἐν υἱῷ
  english_pob_reading: Rendered 'in a Son' to preserve the anarthrous expression while still affirming that God's climactic revelation is in the Son.
  chosen_spanish_reading: por un Hijo
  alternative_spanish_readings:
  - en un Hijo
  - en el Hijo
  - por su Hijo
  rationale: 'La forma española elegida conserva la ausencia de artículo definido y expresa la mediación de la revelación sin convertirla en una paráfrasis posesiva. Se mantiene la fuerza cristológica del pasaje: Dios habla de modo culminante en el Hijo.'
  doctrine_reference: Translation philosophy §§1, 3, 5; Credo niceno; Calcedonia
- issue: Alcance de τοὺς αἰῶνας en la obra del Hijo
  english_pob_reading: Rendered 'the ages' in the main text, with a footnote preserving 'the universe/worlds.'
  chosen_spanish_reading: los siglos
  alternative_spanish_readings:
  - el universo
  - los mundos
  - las edades
  rationale: '''Los siglos'' conserva el campo semántico de αἰῶνες como épocas/eras y, por extensión, el orden entero de la creación. La nota permite recordar la lectura cosmológica sin perder la nitidez temporal del término griego.'
  doctrine_reference: Translation philosophy §§1, 3, 5; Credo niceno
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado como estable, pero adapta el inglés auditado al español con una solución idiomática que preserve la rareza del griego en ἐν υἱῷ y la amplitud semántica de τοὺς αἰῶνας.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y no 'Señor', en coherencia con la convención del proyecto para θεός cuando no se trata del Tetragrámaton.
  - Se usa 'Hijo' con mayúscula por referencia cristológica contextual, aunque el griego carece de artículo; la falta de artículo se compensa en la nota.
  - '''Siglos'' se adopta como equivalente español principal de αἰῶνες para evitar un calco extraño y conservar el matiz de eras/orden creado.'
