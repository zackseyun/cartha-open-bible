translation:
  language: es
  text: Ellos perecerán, pero tú permaneces; y todos ellos se gastarán[a] como una vestidura,[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envejecerán como una vestidura». El griego expresa hacerse viejo o gastarse, y la imagen sigue la metáfora de la ropa.
    reason: lexical_alternative
  - marker: b
    text: La imagen retoma Salmo 102:25–27 y contrasta la transitoriedad de la creación con la permanencia de aquel a quien se dirige.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre griego retoma a los cielos y la tierra del contexto anterior. En español, «ellos» conserva la referencia colectiva sin añadir una glosa explicativa innecesaria; la fuerza enfática queda sostenida por el contraste con «tú».
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - pasarán
  - desaparecerán
  - serán destruidos
  lexicon: BDAG
  rationale: El futuro de ἀπόλλυμι expresa llegar a su fin, perecer. «Perecerán» mantiene la intensidad del verbo sin especificar un agente externo ni suavizar el matiz.
- source_word: σὺ δὲ
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  - mas tú
  lexicon: BDAG
  rationale: «Pero» reproduce bien el contraste fuerte del δέ adversativo. El pronombre explícito «tú» conserva la dirección directa al Hijo.
- source_word: διαμένεις
  english_pob_choice: remain
  chosen_spanish: permaneces
  alternatives_spanish:
  - perseveras
  - continúas
  - permaneces para siempre
  lexicon: BDAG
  rationale: διαμένω significa permanecer, continuar en estado estable. «Permaneces» es natural en español y preserva el contraste con el perecer de la creación; no se añadió «para siempre» porque el texto ya expresa permanencia por contraste y el contexto lo desarrolla.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos los demás
  lexicon: BDAG
  rationale: El plural abarca colectivamente lo mencionado antes. «Todos ellos» deja claro el referente y mantiene el valor distributivo.
- source_word: ὡς ἱμάτιον
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como un manto
  - como una prenda
  - como un ropaje
  lexicon: BDAG
  rationale: ἱμάτιον es una prenda de vestir, sin precisar tipo exacto. «Vestido» funciona como término amplio y natural en español; «manto» sería demasiado específico y «ropa/prenda» menos imagético.
- source_word: παλαιωθήσονται
  english_pob_choice: will wear out
  chosen_spanish: se gastarán
  alternatives_spanish:
  - envejecerán
  - se volverán viejos
  - se desgastarán
  lexicon: BDAG
  rationale: El verbo puede significar volverse viejo o gastarse con el uso/tiempo. «Se gastarán» conserva la imagen de deterioro de un vestido y es idiomático en español; la alternativa «envejecerán» desplaza el énfasis hacia la edad más que hacia el desgaste.
theological_decisions:
- issue: Contraste entre la transitoriedad de la creación y la permanencia del Hijo
  english_pob_reading: The verse is rendered as direct address to the Son ('you remain'), preserving the author's application of Psalm 102 language to the Son in context.
  chosen_spanish_reading: 'El verso se traduce como una dirección directa al Hijo: «pero tú permaneces», manteniendo el contraste entre lo creado que perece y aquel que permanece.'
  alternative_spanish_readings:
  - pero tú continúas
  - pero tú eres permanente
  rationale: Hebreos aplica esta cita al Hijo, y la traducción debe conservar la segunda persona y el contraste sin añadir formulaciones doctrinales externas al texto. «Permaneces» es la opción más sobria y fiel al paralelismo del pasaje.
  doctrine_reference: Hebreos 1:10–12; Salmo 102:25–27; credos niceno-constantinopolitano y de Calcedonia como trasfondo cristológico general
translation_notes:
  revision_awareness: El texto inglés POB está en alta concordancia con el griego y no requiere revisión sustancial; se ha mantenido el contraste directo y la metáfora del vestido, ajustando solo la naturalidad del español sin perder fuerza lexical ni el eco del Salmo 102.
  spanish_consistency_notes:
  - Se conservó «tú» en segunda persona para mantener la aplicación directa al Hijo.
  - Se eligieron verbos de permanencia y deterioro que respetan el paralelismo del griego.
  - Se evitó «SEÑOR» porque aquí el texto no está ocultando el nombre divino, sino citando/aplicando lenguaje del Salmo al Hijo dentro de Hebreos.
