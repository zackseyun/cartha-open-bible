    reason: lexical_alternative
  revision_rationale: 'La revisión corrige la alineación con el expediente POB en dos puntos clave: pone como principal una traducción de δικαιοσύνη coherente con ''righteousness'' y reemplaza ''maldad'' por ''iniquidad'' para conservar el sentido más específico de ἀνομία. También mejora ligeramente la naturalidad de la expresión de unción en español y reordena la nota léxica para reflejar la prioridad documentada en inglés.'
