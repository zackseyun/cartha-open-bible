translation:
  language: es
  text: Has amado la rectitud[a] y aborrecido la iniquidad; por eso Dios, tu Dios, te ha ungido con aceite de alegría[b] más que a tus compañeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'justicia'. El término griego puede denotar rectitud o justicia; aquí el texto principal sigue 'rectitud' para expresar la cualidad moral destacada en el pasaje.
    reason: lexical_alternative
  - marker: b
    text: O 'gozo'. La expresión griega también puede entenderse como 'aceite de gozo' o 'aceite de exultación'; 'alegría' mantiene una formulación clara y bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάπησας
  english_pob_choice: have loved
  chosen_spanish: has amado
  alternatives_spanish:
  - amaste
  - has amado
  lexicon: BDAG
  rationale: El aoristo en esta cita puede verterse en pasado simple, pero el presente perfecto en español conserva bien la acción completa con relevancia actual y suena natural en un contexto elevado y citacional.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la justicia
  - la rectitud
  lexicon: BDAG
  rationale: En español, 'justicia' es el equivalente más natural y abarca la fuerza moral y relacional del término. Se preserva la alternativa 'rectitud' como posibilidad semántica, dado que el término griego admite el campo de justicia/rectitud y la tradición POB documenta la tensión léxica.
- source_word: ἐμίσησας
  english_pob_choice: hated
  chosen_spanish: aborrecido
  alternatives_spanish:
  - odiado
  - aborrecido
  lexicon: BDAG
  rationale: '''Aborrecido'' expresa con más solemnidad y fuerza moral el contraste con ''amado'' que un simple ''odiado'', sin perder el sentido de rechazo intenso del verbo griego.'
- source_word: ἀνομίαν
  english_pob_choice: lawlessness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la iniquidad
  - la anarquía moral
  - la falta de ley
  lexicon: BDAG
  rationale: Aunque el valor literal es 'falta de ley', en español 'maldad' comunica de forma clara y bíblica el opuesto moral que la cita pretende contrastar con 'justicia'. Se evita 'iniquidad' por ser más tradicional que transparente; 'falta de ley' suena demasiado técnico.
- source_word: ἔχρισέν
  english_pob_choice: has anointed
  chosen_spanish: te ha ungido
  alternatives_spanish:
  - te ungió
  - te ha ungido
  lexicon: BDAG
  rationale: '''Ungido'' reproduce el campo semántico de χρίω y mantiene la resonancia mesiánica/real. El presente perfecto conserva la completitud de la acción con su vigencia.'
- source_word: ὁ θεός, ὁ θεός σου
  english_pob_choice: God, your God
  chosen_spanish: Dios, tu Dios
  alternatives_spanish:
  - Dios, tu Dios
  - Dios, incluso tu Dios
  lexicon: BDAG
  rationale: 'Se conserva la repetición y la relación asimétrica del original sin añadir aclaraciones. ''Tu Dios'' mantiene la tensión teológica del pasaje: el Hijo es ungido por Dios y, a la vez, tiene a Dios como su Dios.'
- source_word: ἔλαιον ἀγαλλιάσεως
  english_pob_choice: the oil of gladness
  chosen_spanish: el óleo de alegría
  alternatives_spanish:
  - el aceite de alegría
  - el óleo de gozo
  lexicon: BDAG
  rationale: '''Óleo'' mantiene un registro bíblico y litúrgico adecuado para la imaginería de unción, mientras que ''alegría'' comunica bien ἀγαλλίασις como gozo/exultación sin volver la frase pesada.'
- source_word: παρὰ
  english_pob_choice: beyond
  chosen_spanish: más que
  alternatives_spanish:
  - más allá de
  - por encima de
  lexicon: BDAG
  rationale: En este comparativo, 'más que' es la manera más natural en español de expresar superioridad de grado sin cargar la frase.
- source_word: μετόχους
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - compañeros
  - partícipes
  - socios
  lexicon: BDAG
  rationale: '''Compañeros'' es transparente y conserva la idea relacional de los asociados/compañeros del texto. ''Partícipes'' sería más técnico y ''socios'' introduciría un matiz inapropiado.'
theological_decisions:
- issue: δικαιοσύνη como término con posible bifurcación entre justicia y rectitud
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La lectura principal de la POB en inglés es 'righteousness', pero en español 'justicia' es la opción más idiomática y doctrinalmente adecuada. Se preserva la alternativa 'rectitud' para no borrar la tensión léxica del término griego, que puede abarcar ambos valores.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: La fórmula 'Dios, tu Dios' aplicada al Hijo mantiene la tensión cristológica del pasaje
  english_pob_reading: Retain the wording without doctrinal expansion
  chosen_spanish_reading: Conservar la formulación sin expansión explicativa
  alternative_spanish_readings:
  - Parafrasear para aclarar la relación trinitaria
  - Suavizar la repetición
  rationale: 'La traducción debe preservar la forma del texto y su tensión teológica: el Hijo es el ungido y, al mismo tiempo, se habla de ''tu Dios''. Expandir o suavizar el texto resolvería indebidamente una tensión que el pasaje mantiene.'
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el expediente. El último pase de revisión indicó ''unchanged: true'' y acuerdo alto; esta versión española sigue de cerca el texto griego y el audit trail inglés sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como terminología de proyecto cuando aparezca el nombre divino; en este versículo el griego usa θεός, por lo que corresponde 'Dios'.
  - Se mantiene el paralelismo 'amado / aborrecido' para reflejar el contraste ético del original.
  - '''Companions'' se vierte como ''compañeros'' para una lectura natural en español, sin perder la idea de asociados cercanos.'
  - La comparación final se expresa con 'más que', que transmite bien el valor de superioridad de παρὰ con acusativo en este contexto.
