revisions:
- from: 'Pero del Hijo dice[a]: «Tu trono, oh Dios, es por los siglos de los siglos[b], y el cetro de la rectitud es el cetro de tu reino».'
  to: 'Pero del Hijo dice[a]: «Tu trono, oh Dios, es por siempre y para siempre,[b] y el cetro de la rectitud es el cetro de tu reino».'
