base_translation:
  language: en
  yaml_path: translation/nt/hebrews/001/008.yaml
  text: But of the Son he says[a], “Your throne, O God, is forever and ever[b], and the scepter of uprightness is the scepter of your kingdom.”
  footnotes:
  - marker: a
    text: 'Or, less likely: “God is your throne forever and ever.” The Greek syntax has been debated, but the direct address “Your throne, O God” best fits the context and the quotation’s force.'
    reason: alternative_reading
  - marker: b
    text: Or “the scepter of righteousness.” The Greek word can denote uprightness or rectitude.
    reason: lexical_alternative
