translation:
  language: es
  text: 'Pero del Hijo dice[a]: «Tu trono, oh Dios, es por siempre y para siempre,[b] y el cetro de la rectitud es el cetro de tu reino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «Dios es tu trono por siempre y para siempre». La sintaxis griega ha sido debatida, pero el vocativo directo «Tu trono, oh Dios» encaja mejor con el contexto y con la fuerza de la cita.'
    reason: alternative_reading
  - marker: b
    text: O «el cetro de la justicia». La palabra griega puede denotar rectitud o justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς δὲ τὸν υἱόν
  english_pob_choice: But of the Son he says
  chosen_spanish: Pero del Hijo dice
  alternatives_spanish:
  - Pero al Hijo dice
  - Pero con respecto al Hijo dice
  lexicon: BDAG
  rationale: πρός con acusativo tras un verbo de decir implícito expresa referencia o destinatario del discurso. En español, «del Hijo dice» mantiene la función referencial y la concisión del encadenamiento de citas en Hebreos, sin añadir explicación ajena al texto.
- source_word: υἱόν
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - su Hijo
  lexicon: BDAG
  rationale: El artículo en griego marca un uso titular y definido. «El Hijo» conserva el título cristológico y el contraste con las citas anteriores del pasaje.
- source_word: Ὁ θρόνος σου ὁ θεὸς
  english_pob_choice: Your throne, O God
  chosen_spanish: Tu trono, oh Dios
  alternatives_spanish:
  - Dios es tu trono
  - Tu trono es Dios
  lexicon: BDAG
  rationale: Se conserva la lectura vocativa que el POB inglés prefirió por contexto y sintaxis. En español, «oh Dios» expresa el mismo vocativo de manera natural y mantiene la tensión textual documentada por la alternativa debatida.
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por la era de la era
  lexicon: BDAG
  rationale: El giro griego expresa duración interminable. «Por los siglos de los siglos» es una equivalencia idiomática natural en español bíblico y comunica bien la fuerza superlativa del hebraísmo/idiomatismo.
- source_word: ῥάβδος
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  lexicon: BDAG
  rationale: En contexto real y regio, ῥάβδος alude al emblema de autoridad del rey. «Cetro» conserva esa función simbólica mejor que «vara» o «bastón».
- source_word: τῆς εὐθύτητος
  english_pob_choice: of uprightness
  chosen_spanish: de la rectitud
  alternatives_spanish:
  - de la uprightness
  - de la justicia
  - de la rectitud moral
  lexicon: BDAG
  rationale: εὐθύτης denota rectitud, uprightness o straightness. «Rectitud» es un equivalente natural en español y permite mantener abierta la cercanía semántica con «justicia» sin sustituirla por un término doctrinalmente más cargado.
- source_word: ῥάβδος τῆς βασιλείας σου
  english_pob_choice: the scepter of your kingdom
  chosen_spanish: el cetro de tu reino
  alternatives_spanish:
  - el cetro de tu realeza
  - el cetro de tu reinado
  lexicon: BDAG
  rationale: βασιλεία puede ser reino, realeza o reinado. «Reino» es la opción más directa y reconocible en español, y conserva la imagen de autoridad real del texto.
theological_decisions:
- issue: 'La lectura de ὁ θεός: vocativo directo al Hijo o predicativo (''Dios es tu trono'').'
  english_pob_reading: 'Direct address: ''Your throne, O God.'''
  chosen_spanish_reading: 'Vocativo directo: «Tu trono, oh Dios».'
  alternative_spanish_readings:
  - «Dios es tu trono por los siglos de los siglos»
  rationale: Se mantiene la decisión del POB inglés de preservar el vocativo porque encaja con la cita y con el argumento de Hebreos 1 acerca de la superioridad del Hijo. La traducción española conserva también la tensión reconocida por la alternativa sintáctica debatida, sin resolverla artificialmente.
  doctrine_reference: Credo Niceno (381); Definición de Calcedonia (451)
- issue: Cómo reflejar el sentido temporal intensivo de εἰς τὸν αἰῶνα τοῦ αἰῶνος sin suavizarlo.
  english_pob_reading: forever and ever
  chosen_spanish_reading: por los siglos de los siglos
  alternative_spanish_readings:
  - para siempre y para siempre
  rationale: La fórmula española tradicional comunica bien la duración sin fin y mantiene la solemnidad del oráculo citado. No se introduce ninguna limitación temporal ni paráfrasis interpretativa.
  doctrine_reference: Uso idiomático bíblico en español; coherente con la eternidad del reinado del Hijo en el argumento de Hebreos
translation_notes:
  revision_awareness: No se observaron revisiones aplicadas en el expediente más reciente; el estado indicado es de alta concordancia y sin cambios respecto de la versión previa. La redacción española sigue la decisión de lectura vocativa y conserva la alternativa debatida en nota.
  spanish_consistency_notes:
  - Se usa «Hijo» con mayúscula por tratarse del título cristológico del contexto.
  - Se evita «SEÑOR» para el nombre divino, porque aquí el texto cita θεός directamente y la cuestión textual se concentra en la sintaxis del vocativo.
  - «Rectitud» se eligió como núcleo semántico de εὐθύτης, dejando «justicia» como alternativa anotada para no borrar la tensión léxica.
  - La puntuación y comillas siguen el uso español estándar y mantienen el tono solemne de una cita bíblica.
