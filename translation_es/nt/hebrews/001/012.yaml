    reason: lexical_alternative
  - marker: b
    text: 'O: «tus años nunca terminarán» / «tus años no acabarán».'
    reason: lexical_alternative
  revision_rationale: 'Se reubicaron y reescribieron las notas para que coincidan con el expediente auditado: [a] ahora documenta la alternativa de ὡς ἱμάτιον ... ἀλλαγήσονται, y [b] se ancla correctamente en la cláusula final sobre ἐκλείψουσιν. Además, se ajustó ''no acabarán'' a ''no cesarán'' para reflejar mejor el matiz léxico y el registro poético del original.'
