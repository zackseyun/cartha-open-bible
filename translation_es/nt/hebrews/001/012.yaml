translation:
  language: es
  text: y como un manto los enrollarás; como una vestidura[a] serán cambiados. Pero tú eres el mismo, y tus años no cesarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como ropa serán cambiados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus años nunca terminarán» / «tus años no acabarán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσεὶ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: Introduce una comparación directa; en español, "como" es natural y mantiene el valor comparativo sin añadir interpretación.
- source_word: περιβόλαιον
  english_pob_choice: cloak
  chosen_spanish: un manto
  alternatives_spanish:
  - un capa
  - un cobertor
  - un abrigo
  lexicon: BDAG
  rationale: El término apunta a algo que se envuelve alrededor del cuerpo; "manto" conserva la imagen de prenda envolvente en un registro digno y claro.
- source_word: ἑλίξεις
  english_pob_choice: you will roll ... up
  chosen_spanish: los enrollarás
  alternatives_spanish:
  - los plegarás
  - los envolverás
  - los arrollarás
  lexicon: BDAG
  rationale: El futuro activo comunica la acción de enrollar o arrollar; "enrollarás" es idiomático en español y conserva la imagen de doblar o recoger como una prenda.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre retoma los cielos/la creación mencionados en el contexto anterior; en español el complemento directo masculino plural queda natural como "los".
- source_word: ὡς ἱμάτιον
  english_pob_choice: like a garment
  chosen_spanish: como una vestidura
  alternatives_spanish:
  - como una ropa
  - como una prenda
  - como un vestido
  lexicon: BDAG
  rationale: Se conserva el segundo símil textil. "Vestidura" mantiene el tono poético y evita la reducción coloquial de "ropa".
- source_word: ἀλλαγήσονται
  english_pob_choice: they will be changed
  chosen_spanish: serán cambiados
  alternatives_spanish:
  - serán transformados
  - cambiarán
  - serán alterados
  lexicon: BDAG
  rationale: El futuro pasivo expresa que reciben un cambio. "Serán cambiados" sigue de cerca la voz pasiva y conserva la ambigüedad del alcance exacto del cambio.
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Mas tú
  - Y tú
  lexicon: BDAG
  rationale: Marca el contraste fuerte entre la creación mutable y la permanencia del Hijo; "Pero tú" es directo y natural en español.
- source_word: ὁ αὐτός
  english_pob_choice: the same
  chosen_spanish: eres el mismo
  alternatives_spanish:
  - permaneces el mismo
  - eres el mismo y no cambias
  lexicon: BDAG
  rationale: La expresión subraya identidad constante. "Eres el mismo" reproduce la fuerza del griego sin introducir formulaciones técnicas ajenas al texto.
- source_word: τὰ ἔτη σου
  english_pob_choice: your years
  chosen_spanish: tus años
  alternatives_spanish:
  - los años tuyos
  lexicon: BDAG
  rationale: Se mantiene el lenguaje temporal literal para preservar la metáfora de duración continua.
- source_word: οὐκ ἐκλείψουσιν
  english_pob_choice: will not fail
  chosen_spanish: no acabarán
  alternatives_spanish:
  - no cesarán
  - no se extinguirán
  - no llegarán a su fin
  lexicon: BDAG
  rationale: ἐκλείπω puede expresar faltar, cesar o terminar. "No acabarán" comunica continuidad duradera de manera clara y natural en español, conservando el valor poético del original.
theological_decisions:
- issue: Contraste entre la mutabilidad de la creación y la constancia del Hijo en una cita cristológica
  english_pob_reading: But you are the same
  chosen_spanish_reading: Pero tú eres el mismo
  alternative_spanish_readings:
  - Pero tú permaneces el mismo
  - Pero tú eres inmutable
  rationale: La formulación sigue de cerca ὁ αὐτός y preserva la afirmación de constancia sin añadir terminología doctrinal que no está explícita en el verso.
  doctrine_reference: Hebreos 1:12; afirmación de la constancia divina del Hijo en contexto
- issue: Alcance de ἀλλαγήσονται respecto de los cielos/creación citados previamente
  english_pob_reading: like a garment they will be changed
  chosen_spanish_reading: como una vestidura serán cambiados
  alternative_spanish_readings:
  - como una vestidura cambiarán
  - como una vestidura serán transformados
  rationale: La pasiva del griego deja claro que el sujeto recibe un cambio. La traducción conserva esa pasividad y evita especificar más de lo que el texto dice.
  doctrine_reference: Salmo 102:25-27; cita en Hebreos 1:12
translation_notes:
  revision_awareness: 'Se revisó la alineación de los marcadores de nota con el texto español: [a] y [b] aparecen exactamente en los puntos correspondientes. La redacción conserva el paralelo de dos símiles textiles y la clausula final de permanencia sin introducir glosas no sustentadas.'
  spanish_consistency_notes:
  - Se usa "manto" y "vestidura" para mantener dos imágenes textiles distintas, coherentes con el doble símil del griego.
  - Se conserva "Pero tú eres el mismo" para reflejar la constancia del sujeto sin sustituirla por un tecnicismo doctrinal.
  - '"No acabarán" mantiene la ambigüedad de ἐκλείψουσιν entre cesar y terminar, compatible con el contexto poético.'
