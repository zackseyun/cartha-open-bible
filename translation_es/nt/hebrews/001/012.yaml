review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y el contraste principal entre la creación cambiante y la constancia del Hijo. Sin embargo, las notas al pie están desalineadas con el rastro de auditoría inglés: la nota [a] introduce alternativas no documentadas y altera el alcance de la variante, mientras que la nota [b] está anclada en la frase equivocada del texto español. El texto base también puede ajustarse levemente para reflejar mejor el matiz de ἐκλείψουσιν.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'manto', 'enrollarás', 'vestidura' y 'eres el mismo' funcionan bien. La única mejora estilística importante es preferir 'no cesarán' para reproducir con mayor cercanía el campo semántico de 'will not fail / will not cease' y para armonizar mejor con la nota alternativa.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. La elección 'eres el mismo' sigue adecuadamente ὁ αὐτός. No aparecen términos sensibles del glosario principal que requieran corrección. La cuestión principal es la fidelidad de las notas léxicas al expediente POB inglés.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde al contenido de la nota inglesa auditada.
    rationale: La nota inglesa [a] trata la alternativa de la segunda comparación ('like a garment they will be changed' / 'like clothing they will be changed'), no una reformulación de 'los enrollarás' ni alternativas verbales como 'arrollarás' o 'envolverás'.
  - severity: high
    issue: La nota [b] está anclada en 'serán cambiados' pero su contenido explica 'tus años no acabarán'.
    rationale: Según el expediente POB, la nota [b] pertenece a la cláusula final sobre ἐκλείψουσιν, no a ἀλλαγήσονται. En el formato requerido, el marcador debe aparecer exactamente en la frase relevante del texto español.
  - severity: low
    issue: '''no acabarán'' es aceptable, pero ''no cesarán'' refleja mejor el abanico léxico documentado y el tono poético.'
    rationale: ἐκλείπω puede significar cesar, faltar o llegar al fin. 'No cesarán' conserva la continuidad duradera sin sonar forzado y armoniza con las alternativas documentadas en inglés.
  - severity: low
    issue: La alternativa 'un capa' en las decisiones léxicas sería gramaticalmente incorrecta en español.
    rationale: Aunque no forma parte del texto publicado, muestra una falta menor de pulido; la forma correcta sería 'una capa'.
  revised_spanish_text: y como un manto los enrollarás; como una vestidura[a] serán cambiados. Pero tú eres el mismo, y tus años no cesarán[b].
  revised_footnotes:
