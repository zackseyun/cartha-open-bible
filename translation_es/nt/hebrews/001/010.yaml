    issue: ἐθεμελίωσας se tradujo como 'fundaste'
    rationale: Aunque es aceptable, la decisión inglesa documentada preserva la metáfora arquitectónica de 'lay the foundation of'. En español, 'pusiste los cimientos de' o 'echaste los cimientos de' mantiene mejor ese matiz.
  - severity: medium
    issue: ἔργα se tradujo como singular colectivo 'obra'
    rationale: El griego tiene plural neutro 'works', y el inglés auditado también. En español, 'las obras de tus manos' es natural y mantiene el número del original.
  - severity: low
    issue: Uso de comillas tipográficas inglesas
    rationale: Para legibilidad y convención editorial en español, conviene usar comillas españolas o simplemente puntuación corrida según la política de estilo.
