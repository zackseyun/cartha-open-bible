translation:
  language: es
  text: 'Y[a]: «Tú, Señor, en el principio pusiste los cimientos de la tierra, y los cielos son las obras de tus manos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al principio».
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y además
  lexicon: BDAG
  rationale: La conjunción inicial introduce otra cita en la cadena argumental. En español, 'Y' conserva la simpleza y el valor coordinante sin añadir matiz.
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: BDAG
  rationale: El pronombre explícito mantiene el énfasis del griego en el habla directa. 'Tú' reproduce esa dirección inmediata en español natural.
- source_word: κατ’ ἀρχάς
  english_pob_choice: in the beginning
  chosen_spanish: en el principio
  alternatives_spanish:
  - al comienzo
  - desde el principio
  lexicon: BDAG
  rationale: La expresión temporal es idiomática y de contexto creador. 'En el principio' es la forma más estable y transparente en español bíblico para este arranque temporal.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo de κύριος se traduce con 'Señor' según el uso bíblico y la pauta del proyecto para κύριος, manteniendo el tono de cita reverente.
- source_word: τὴν γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  lexicon: BDAG
  rationale: En un paralelo de creación con 'los cielos', γῆ designa la tierra como ámbito cósmico, no una 'tierra' local o territorial.
- source_word: ἐθεμελίωσας
  english_pob_choice: laid the foundation of
  chosen_spanish: fundaste
  alternatives_spanish:
  - pusiste los cimientos de
  - estableciste
  lexicon: BDAG
  rationale: Aunque el verbo conserva la imagen de poner fundamento, en español 'fundaste' comunica con naturalidad la metáfora de cimentación sin perder el contenido de creación/establecimiento.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obra
  alternatives_spanish:
  - trabajos
  - hechura
  lexicon: BDAG
  rationale: En la expresión fija 'obra de tus manos', el singular colectivo 'obra' funciona bien en español y preserva el sentido de producción/manufactura del texto.
- source_word: τῶν χειρῶν σού
  english_pob_choice: of your hands
  chosen_spanish: de tus manos
  alternatives_spanish:
  - hecho por tus manos
  - de tu mano
  lexicon: BDAG
  rationale: La construcción posesiva literal mantiene la imagen antropomórfica del texto y la transparencia de la cita poética.
- source_word: οἱ οὐρανοί
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos celestiales
  - el cielo
  lexicon: BDAG
  rationale: El plural griego se conserva mejor con 'los cielos', que además armoniza con el paralelo 'la tierra' y con el lenguaje de creación bíblica.
theological_decisions:
- issue: Aplicación de la cita del Salmo al Hijo en Hebreos 1
  english_pob_reading: Retain the direct address 'You, Lord' in the main text without weakening it.
  chosen_spanish_reading: Mantener la dirección directa 'Tú, Señor' sin suavizarla.
  alternative_spanish_readings:
  - Suprimir el vocativo con una reformulación impersonal
  - Atenuar la dirección con un giro indirecto
  rationale: El griego conserva el vocativo κύριε dentro de la cita. La traducción debe mantener esa dirección, ya que forma parte del uso argumentativo de Hebreos al aplicar el texto al Hijo, sin introducir explicación doctrinal adicional en el versículo.
  doctrine_reference: Affirmations; Contested terms table for κύριος
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail inglés; no se registran revisiones pendientes ni cambios de última pasada.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος conforme al estándar del proyecto.
  - Se prefirió 'los cielos' en plural para οὐρανοί, en paralelo con 'la tierra'.
  - Se conservó una estructura de cita directa con comillas para reflejar el discurso citado en Hebreos.
  - La nota [a] conserva la alternativa temporal documentada en el audit trail inglés sin ampliar el sentido.
