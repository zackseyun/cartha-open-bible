revisions:
- from: ¿No son todos espíritus de servicio[a], enviados para servicio en favor de los que están por heredar salvación?[b]
  to: ¿No son todos espíritus ministradores[a], enviados para servicio en favor de los que están por heredar la salvación?[b]
  rationale: Se sustituyó 'espíritus de servicio' por 'espíritus ministradores' para evitar la repetición inmediata con 'para servicio' y reflejar mejor el valor de λειτουργικὰ πνεύματα en un español digno y natural. Se añadió el artículo en 'la salvación' por idiomaticidad. Se conservaron el sentido benefactivo de διά y el matiz prospectivo de μέλλοντας.
