translation:
  language: es
  text: ¿No son todos espíritus ministradores[a], enviados para servicio en favor de los que están por heredar la salvación?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritus de servicio». El griego λειτουργικά πνεύματα puede expresar servicio con matiz sagrado u oficial.
    reason: lexical_alternative
  - marker: b
    text: O «los que van a heredar la salvación». La expresión griega tiene un sentido orientado al futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Are they not
  chosen_spanish: ¿No son...
  alternatives_spanish:
  - ¿Acaso no son...
  - ¿No es verdad que son...
  lexicon: BDAG
  rationale: 'La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, la forma natural y fiel es anteponer la negación interrogativa: «¿No son...?».'
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos ellos
  lexicon: BDAG
  rationale: Conserva el alcance total del plural sin añadir énfasis ajeno al texto.
- source_word: λειτουργικὰ πνεύματα
  english_pob_choice: ministering spirits
  chosen_spanish: espíritus de servicio
  alternatives_spanish:
  - espíritus ministradores
  - espíritus en servicio sagrado
  - espíritus de ministerio
  lexicon: BDAG
  rationale: λειτουργικός expresa servicio con matiz oficial o sagrado. «De servicio» preserva el valor funcional sin importar el término eclesiástico moderno «ministerio». Se evita «ministradores» por sonar menos natural en español, aunque refleja el sentido.
- source_word: εἰς διακονίαν
  english_pob_choice: for service
  chosen_spanish: para servicio
  alternatives_spanish:
  - para ministerio
  - para ministrar
  - para servir
  lexicon: BDAG
  rationale: La preposición marca finalidad. «Para servicio» conserva el sustantivo διακονία y evita cargar el versículo con un sentido institucional que «ministerio» podría sugerir.
- source_word: ἀποστελλόμενα
  english_pob_choice: sent out
  chosen_spanish: enviados
  alternatives_spanish:
  - siendo enviados
  - mandados
  - despachados
  lexicon: BDAG
  rationale: El participio presente pasivo describe a los espíritus como aquellos que son enviados. En español, «enviados» es natural y conserva la pasividad y la relación descriptiva sin forzar una perífrasis pesada.
- source_word: διὰ
  english_pob_choice: for the sake of
  chosen_spanish: en favor de
  alternatives_spanish:
  - por causa de
  - para beneficio de
  - a favor de
  lexicon: BDAG
  rationale: Con acusativo, διά puede expresar beneficio o relación final. «En favor de» comunica claramente el sentido benefactivo que encaja con el contexto, sin sobreinterpretar.
- source_word: τοὺς μέλλοντας
  english_pob_choice: those who are about to
  chosen_spanish: los que están por
  alternatives_spanish:
  - los que van a
  - los que han de
  - los que están a punto de
  lexicon: BDAG
  rationale: μέλλω con infinitivo aporta orientación futura e inminente/prospectiva. «Están por» reproduce bien esa cercanía temporal sin convertirlo en un futuro plano.
- source_word: κληρονομεῖν
  english_pob_choice: inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir en herencia
  - obtener como herencia
  - tomar posesión de
  lexicon: BDAG
  rationale: «Heredar» es la forma natural y breve en español para mantener la imagen de herencia, muy importante en Hebreos.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Salvación» es el equivalente estable y adecuado en Hebreos, conservando el alcance presente y escatológico del término.
theological_decisions:
- issue: Alcance prospectivo de μέλλοντας κληρονομεῖν σωτηρίαν
  english_pob_reading: those who are about to inherit salvation
  chosen_spanish_reading: los que están por heredar salvación
  alternative_spanish_readings:
  - los que heredarán salvación
  - los destinados a heredar salvación
  rationale: Se mantiene el valor prospectivo de μέλλω sin resolver la cuestión hacia una formulación doctrinal sobre seguridad, predestinación o certeza absoluta. «Están por heredar» conserva la tensión temporal del griego.
  doctrine_reference: Hebreos 1:14; preservar la tensión teológica sin imponer una lectura denominacional.
translation_notes:
  revision_awareness: El audit trail inglés favorece una redacción más natural al eliminar perífrasis innecesarias alrededor de «sent out». En español se siguió un principio similar, evitando una construcción pesada y manteniendo el participio pasivo mediante «enviados». También se conservó el matiz prospectivo de μέλλω con «están por», en paralelo al inglés «about to».
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; este versículo no contiene el nombre divino.
  - Se evita «ministerio» como equivalencia automática de διακονία para no introducir una carga eclesiástica no requerida por el contexto.
  - «Espíritus» se entiende aquí en sentido personal/angélico, conforme al contexto de Hebreos 1.
