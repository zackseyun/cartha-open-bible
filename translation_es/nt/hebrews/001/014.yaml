    issue: Repetición poco natural entre 'espíritus de servicio' y 'para servicio'
    rationale: 'El griego usa dos expresiones relacionadas pero no idénticas: λειτουργικὰ πνεύματα y εἰς διακονίαν. En español, repetir ''servicio'' en ambas posiciones suena rígido y reduce la legibilidad.'
  - severity: low
    issue: Ausencia del artículo en 'heredar salvación'
    rationale: Aunque no es incorrecto, en español general 'heredar la salvación' suena más natural y completo, especialmente en registro bíblico contemporáneo.
