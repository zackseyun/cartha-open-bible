translation:
  language: es
  text: Porque todo sumo sacerdote es constituido para ofrecer tanto dones como sacrificios; por tanto, es necesario que este también tenga algo[a] que ofrecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que este también tenga algo que ofrecer». El griego deja implícito el referente; en contexto, se trata de Jesús como sumo sacerdote.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς γὰρ ἀρχιερεὺς
  english_pob_choice: For every high priest
  chosen_spanish: Porque todo sumo sacerdote
  alternatives_spanish:
  - Porque cada sumo sacerdote
  - Pues todo sumo sacerdote
  lexicon: BDAG
  rationale: πᾶς con sustantivo singular tiene valor distributivo; en español, «todo sumo sacerdote» comunica naturalmente esa generalidad. «Porque» reproduce γάρ como conexión explicativa con el versículo anterior, y «sumo sacerdote» es el equivalente técnico adecuado de ἀρχιερεύς en Hebreos.
- source_word: εἰς τὸ προσφέρειν
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - con el fin de ofrecer
  - para el acto de ofrecer
  lexicon: BDAG
  rationale: La construcción con εἰς y el infinitivo articular expresa propósito. «Para ofrecer» conserva esa finalidad en español sin volver la frase forzada.
- source_word: δῶρά τε καὶ θυσίας
  english_pob_choice: both gifts and sacrifices
  chosen_spanish: dones y sacrificios
  alternatives_spanish:
  - ofrendas y sacrificios
  - dones y ofrendas sacrificiales
  lexicon: BDAG
  rationale: «Dones» traduce δῶρα y «sacrificios» traduce θυσίας, manteniendo dos categorías cultuales distintas. En español, la correlación τε καὶ puede quedar implícita en la coordinación simple; el sentido de pareja queda preservado por el contexto.
- source_word: καθίσταται
  english_pob_choice: is appointed
  chosen_spanish: es constituido
  alternatives_spanish:
  - es nombrado
  - es designado
  lexicon: BDAG
  rationale: En contexto sacerdotal, καθίστημι pasivo puede expresar instalación en un cargo. «Es constituido» mantiene el matiz formal de establecimiento en función, y suena natural en registro bíblico español.
- source_word: ὅθεν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: BDAG
  rationale: ὅθεν introduce una inferencia lógica. «Por tanto» es una equivalencia clara y sobria en español.
- source_word: ἀναγκαῖον ἔχειν
  english_pob_choice: it is necessary ... to have
  chosen_spanish: es necesario que ... tenga
  alternatives_spanish:
  - es necesario ... tener
  - es preciso que ... tenga
  lexicon: BDAG
  rationale: El griego expresa necesidad impersonal. En español, «es necesario que este también tenga» reproduce bien la fuerza de obligación sin alargar innecesariamente la construcción.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - alguna cosa
  - algo que
  lexicon: BDAG
  rationale: τι es un indefinido no especificado; «algo» conserva esa vaguedad deliberada.
- source_word: καὶ τοῦτον
  english_pob_choice: for this one also
  chosen_spanish: que este también
  alternatives_spanish:
  - que este asimismo
  - que él también
  lexicon: BDAG
  rationale: τοῦτον apunta al sujeto del discurso, mantenido implícito en el texto español mediante «este». Así se conserva la deixis del griego sin forzar una identificación explícita en el cuerpo del versículo.
- source_word: ὃ προσενέγκῃ
  english_pob_choice: that he may offer
  chosen_spanish: que ofrecer
  alternatives_spanish:
  - que pueda ofrecer
  - para ofrecer
  lexicon: BDAG
  rationale: El relativo con subjuntivo aoristo expresa algo disponible para ser presentado u ofrecido. En español, «que ofrecer» es una formulación breve y fiel al valor de finalidad/potencialidad; conserva la indefinición del objeto sin explicitarlo.
theological_decisions:
- issue: Referente implícito de «este» (τοῦτον)
  english_pob_reading: The phrase refers to Jesus as the high priest discussed in context, but the translation leaves the referent implicit in the main text.
  chosen_spanish_reading: 'La frase se mantiene implícita en el texto principal: «este»; el contexto identifica al sumo sacerdote aludido.'
  alternative_spanish_readings:
  - Jesús también debe tener algo que ofrecer
  - el Mesías también debe tener algo que ofrecer
  rationale: El griego no nombra explícitamente al referente, aunque el contexto de Hebreos lo identifica. Mantener «este» respeta la forma del original y evita añadir una identificación que el versículo no enuncia directamente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Terminología cultual de «dones y sacrificios»
  english_pob_reading: Retain 'gifts and sacrifices' as distinct priestly categories without theological paraphrase.
  chosen_spanish_reading: 'Conservar dos categorías cultuales distintas: «dones» y «sacrificios».'
  alternative_spanish_readings:
  - ofrendas y sacrificios
  - presentes y sacrificios
  rationale: Hebreos usa vocabulario sacerdotal preciso. Traducirlo como dos términos distintos evita fusionarlos o explicarlos en exceso, y mantiene la tensión cultual del argumento.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje se revisó a la luz del texto griego SBLGNT y del audit trail en inglés; no se documentaron correcciones sustanciales en la revisión más reciente, y la solución española mantiene el mismo alcance semántico y la misma restricción interpretativa del original.
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» para ἀρχιερεύς por consistencia terminológica en Hebreos.
  - Se preserva la distinción entre «dones» y «sacrificios» sin expandir el contenido cultual.
  - «Este» conserva el referente implícito del griego sin introducir un nombre propio en el texto principal.
  - El tono es formal y bíblico, pero con sintaxis natural para lectura pública en español.
