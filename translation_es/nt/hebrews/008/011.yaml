translation:
  language: es
  text: 'Y no enseñarán[a], cada uno a su conciudadano y cada uno a su hermano, diciendo: «Conoce a Yahvé», porque todos me conocerán, desde el menor de ellos hasta el mayor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vecino». El texto griego de Hebreos dice «conciudadano», mientras que el pasaje subyacente de Jeremías suele traducirse «vecino».
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ μὴ διδάξωσιν
  english_pob_choice: they will certainly not teach
  chosen_spanish: no enseñarán
  alternatives_spanish:
  - no enseñarán de ninguna manera
  - ciertamente no enseñarán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo expresa una prohibición/negación muy fuerte. En español, «no enseñarán» comunica con naturalidad la certeza negativa; la fuerza enfática queda reforzada por el contexto y no exige una perífrasis pesada.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - uno por uno
  lexicon: BDAG
  rationale: «Cada uno» conserva la fuerza distributiva del griego y suena natural en español. Mantiene la idea de acciones individuales dentro de la comunidad del pacto.
- source_word: πολίτην
  english_pob_choice: fellow citizen
  chosen_spanish: conciudadano
  alternatives_spanish:
  - vecino
  - compatriota
  - fellow citizen
  lexicon: BDAG
  rationale: El griego dice literalmente «ciudadano» y Hebreos conserva esa forma, aunque la cita de Jeremías suele decir «vecino». «Conciudadano» refleja con fidelidad el matiz cívico del término y evita sustituirlo por la forma tradicional del pasaje fuente en Jeremías sin base textual inmediata.
- source_word: ἀδελφόν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - correligionario
  lexicon: BDAG
  rationale: El singular masculino del griego se preserva con «hermano». Es la equivalencia directa y mantiene el lenguaje de familia del pacto sin neutralizar la forma del texto.
- source_word: Γνῶθι
  english_pob_choice: Know
  chosen_spanish: Conoce
  alternatives_spanish:
  - Conoce bien
  - Llega a conocer
  lexicon: BDAG
  rationale: 'El imperativo aoristo funciona como mandato directo. «Conoce» es la forma más natural e imperativa en español para citar la exhortación: «Conoce al Señor».'
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aunque la política general usa «Yahvé» para el nombre divino, aquí Hebreos cita la forma griega κύριον dentro de la frase exhortativa «Conoce al Señor». En español, «Señor» preserva la cita bíblica y el eco de Jeremías/Hebreos sin forzar una reconstrucción del nombre en una cláusula imperativa citada.
- source_word: εἰδήσουσίν με
  english_pob_choice: they will all know me
  chosen_spanish: todos me conocerán
  alternatives_spanish:
  - todos llegarán a conocerme
  - todos sabrán quién soy
  lexicon: BDAG
  rationale: El futuro de οἶδα expresa conocimiento; «conocerán» comunica bien ese sentido en español. Se mantiene el objeto explícito «me» y se antepone «todos» para reflejar πάντες con naturalidad.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου αὐτῶν
  english_pob_choice: from the least of them to the greatest
  chosen_spanish: desde el más pequeño de ellos hasta el más grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  - de los más pequeños a los más grandes
  lexicon: BDAG
  rationale: La expresión idiomática indica totalidad de rango, no solo tamaño físico. «Desde el más pequeño de ellos hasta el más grande» conserva el alcance completo y es idiomática en español.
theological_decisions:
- issue: Cómo reflejar πολίτην en una cita de Jeremías dentro de Hebreos
  english_pob_reading: fellow citizen
  chosen_spanish_reading: conciudadano
  alternative_spanish_readings:
  - vecino
  - compatriota
  rationale: El texto griego de Hebreos usa πολίτην, y la traducción debe seguir la forma preservada por el autor de Hebreos. «Conciudadano» mantiene el matiz cívico explícito, mientras que «vecino» reflejaría mejor el trasfondo de Jeremías pero no el wording griego inmediato.
  doctrine_reference: Translation philosophy §1 (primacía del original)
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Hebreos 8:11 y el rastro auditado en inglés. Se mantiene la diferencia textual relevante entre πολίτην en Hebreos y la formulación habitual de Jeremías, preservándola con nota. No se registran revisiones aplicadas en el historial; el texto resultante coincide con la lectura de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Señor» en la cita imperativa por fidelidad a κύριον y al eco bíblico inmediato, sin sustituirlo por «Yahvé» en esta cláusula citada.
  - Se usa «conciudadano» para reflejar el término cívico del griego, evitando suavizarlo a «vecino» en el texto principal.
  - La estructura distributiva «cada uno ... y cada uno ...» reproduce el énfasis del griego y conserva el paralelismo.
  - «Todos me conocerán» conserva πάντες y el objeto explícito με sin introducir una paráfrasis explicativa.
