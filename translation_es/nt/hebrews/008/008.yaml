translation:
  language: es
  text: 'Porque, al encontrar falta en ellos[a], dice: «He aquí, vienen días, dice Yahvé, en que estableceré[b] un nuevo pacto con la casa de Israel y con la casa de Judá»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al reprocharles». El participio griego puede expresar hallar falta o censurar a ellos.
    reason: lexical_alternative
  - marker: b
    text: O «haré un nuevo pacto». El verbo puede significar llevar a cumplimiento, concluir o establecer formalmente un pacto; aquí se escogió «estableceré» para expresar su entrada en vigor.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμφόμενος
  english_pob_choice: in finding fault
  chosen_spanish: reprender[a]
  alternatives_spanish:
  - hallar दोष?
  - encontrar falta en
  - reprendiendo
  lexicon: μέμφομαι (BDAG)
  rationale: El participio expresa reproche o censura dirigida a personas. En español, «reprender» comunica ese juicio desfavorable con naturalidad y conserva el valor participial dentro de la explicación causal de la cita.
- source_word: αὐτοὺς
  english_pob_choice: with them
  chosen_spanish: a ellos
  alternatives_spanish:
  - con ellos
  - contra ellos
  lexicon: αὐτός (BDAG)
  rationale: El pronombre plural masculino se refiere al pueblo, no al pacto. «A ellos» mantiene el referente personal sin forzar una locución fija en español.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: ἰδού (BDAG)
  rationale: Es una partícula de llamado de atención. «Mira» es más natural en español moderno; el sentido solemne se conserva por el contexto profético y la cita bíblica.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος (contexto de cita de Jeremías)
  rationale: En esta cita veterotestamentaria, κύριος reproduce el nombre divino. Conforme al criterio del proyecto, se vierte como «Yahvé» en lugar de ocultarlo con «el Señor».
- source_word: συντελέσω
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - concluiré
  - llevaré a cabo
  - haré
  lexicon: συντελέω (BDAG)
  rationale: En contexto de pacto, el verbo puede implicar llevar a efecto o establecer formalmente. «Estableceré» sigue la decisión auditada en inglés y expresa bien la instauración del nuevo pacto.
- source_word: ἐπὶ τὸν οἶκον Ἰσραὴλ ... ἐπὶ τὸν οἶκον Ἰούδα
  english_pob_choice: with the house of Israel and with the house of Judah
  chosen_spanish: con la casa de Israel y con la casa de Judá
  alternatives_spanish:
  - sobre la casa de Israel y sobre la casa de Judá
  - para la casa de Israel y la casa de Judá
  lexicon: ἐπί + acusativo / οἶκος (BDAG)
  rationale: En lenguaje pactal, el sentido es relacional y de compromiso. «Con» reproduce la fuerza idiomática del inglés auditado y evita una imagen espacial extraña en español, manteniendo «casa de Israel» y «casa de Judá» como identidades corporativas.
- source_word: διαθήκην καινήν
  english_pob_choice: a new covenant
  chosen_spanish: un nuevo pacto
  alternatives_spanish:
  - un pacto nuevo
  - una nueva alianza
  lexicon: διαθήκη / καινός (BDAG)
  rationale: En Hebreos, διαθήκη es el gran término teológico de pacto; «pacto» es la forma más clara y directamente bíblica en español. «Nuevo» conserva el contraste cualitativo de καινός y la intertextualidad con Jeremías 31.
theological_decisions:
- issue: Referente de αὐτούς en la frase de reprensión
  english_pob_reading: The fault is found with the people, not with the covenant itself.
  chosen_spanish_reading: La reprensión recae sobre las personas, no sobre el pacto.
  alternative_spanish_readings:
  - La culpa recae sobre el primer pacto.
  - La reprensión se dirige al pacto anterior.
  rationale: El plural masculino apunta naturalmente a Israel y Judá. En Hebreos, la crítica se dirige a la infidelidad del pueblo dentro del pacto, sin convertir el pacto mismo en el objeto de la censura.
  doctrine_reference: Hebreos 8:7-9; Jeremías 31:31-34
- issue: Traducción de κύριος en la cita profética
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La cita procede del trasfondo de Jeremías y del nombre divino del pacto. Mantener «Yahvé» preserva la transparencia del texto fuente y evita la convención de sustitución reverencial.
  doctrine_reference: Éxodo 3:15; Jeremías 31:31
translation_notes:
  revision_awareness: Se incorporó la decisión revisada de tono formal para Ἰδοὺ mediante «Mira», que conserva la función de llamada de atención sin perder naturalidad en español. También se mantuvo la interpretación del plural como referido a las personas y no al pacto, y se ajustó la fórmula divina a «Yahvé» conforme al criterio del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «casa de Israel» y «casa de Judá» como expresiones corporativas estables.
  - Se tradujo διαθήκη como «pacto» para coherencia con Hebreos y Jeremías.
  - Se usó el presente de introducción de cita («dice») para reflejar el valor discursivo del griego.
  - Las notas a y b están ancladas explícitamente en el texto con sus marcadores respectivos.
