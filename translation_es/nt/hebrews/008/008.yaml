    rationale: μέμφομαι denota encontrar falta, censurar o reprochar. «Reprender» puede implicar una amonestación más directa y verbal. En español bíblico natural, «al encontrar falta en ellos» preserva mejor el matiz y el referente personal.
  - severity: low
