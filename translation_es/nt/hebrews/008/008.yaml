    text: Or 'in blaming them he says.' The Greek participle can carry the sense of expressing fault or reproach.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will make a new covenant.' The verb can mean to bring to completion or conclude; 'establish' was chosen to convey covenant enactment in context.
    reason: lexical_alternative
