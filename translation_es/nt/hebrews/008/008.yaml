base_translation:
  language: en
  yaml_path: translation/nt/hebrews/008/008.yaml
  text: For in finding fault with them he says[a], “Behold, days are coming, says the Lord[b], when I will establish a new covenant with the house of Israel and with the house of Judah,”
  footnotes:
