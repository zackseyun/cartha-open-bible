revisions:
- from: 'Ahora bien, el punto principal[a] de lo que se está diciendo es este: tenemos un sumo sacerdote[b] tal, que se sentó a la derecha del trono de la Majestad en los cielos[c],'
  to: 'Ahora bien, el punto principal[a] de lo que se está diciendo es este: tenemos tal sumo sacerdote, que se sentó a la derecha del trono de la Majestad en los cielos[b],'
  rationale: Se ajusta el orden de ‘tal’ para lograr un español más natural y fiel al valor anafórico de τοιοῦτον, y se elimina una nota léxica no sustentada por el expediente (‘gran sacerdote’). También se armoniza la nota de κεφάλαιον con el marco presente del original auditado.
