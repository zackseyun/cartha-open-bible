    issue: Orden poco natural de ‘tal’ en ‘tenemos un sumo sacerdote tal’
    rationale: Aunque semánticamente comprensible, esta colocación suena forzada en español moderno y no refleja de la manera más idiomática el valor anafórico de τοιοῦτον. ‘Tenemos tal sumo sacerdote’ preserva mejor el énfasis y la naturalidad.
  - severity: medium
    issue: Nota [b] introduce ‘gran sacerdote’ como alternativa
    rationale: El expediente inglés no preserva ninguna nota para ἀρχιερέα, y ‘gran sacerdote’ no es la opción cultual estándar en español para Hebreos. La nota añade ruido léxico en vez de aclarar el texto.
  - severity: low
    issue: La nota [a] usa ‘de lo que se ha dicho’ mientras el texto principal refleja presente progresivo
    rationale: No es un error grave, pero el inglés auditado dice ‘in what is being said’. Conviene armonizar la alternativa con el mismo marco aspectual o con una formulación idiomática equivalente sin cambiar innecesariamente a pasado.
  revised_spanish_text: 'Ahora bien, el punto principal[a] de lo que se está diciendo es este: tenemos tal sumo sacerdote, que se sentó a la derecha del trono de la Majestad en los cielos[b],'
