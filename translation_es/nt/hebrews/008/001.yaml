translation:
  language: es
  text: 'Ahora bien, el punto principal[a] de lo que se está diciendo es este: tenemos tal sumo sacerdote, que se sentó a la derecha del trono de la Majestad en los cielos[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la suma’ o ‘el punto capital’ de lo que se está diciendo.
    reason: lexical_alternative
  - marker: b
    text: O ‘en el cielo’; griego ‘en los cielos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κεφάλαιον
  english_pob_choice: the main point
  chosen_spanish: el punto principal
  alternatives_spanish:
  - el resumen
  - la suma
  - el punto principal de todo lo dicho
  lexicon: BDAG
  rationale: En este contexto discursivo, κεφάλαιον funciona como marcador de transición y síntesis de la argumentación, no como referencia literal a un capítulo. ‘El punto principal’ conserva la idea de resumen o clímax argumental en español natural y fiel al valor idiomático del griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ introduce una transición suave. ‘Ahora bien’ suena natural en español y comunica el cambio discursivo sin forzar contraste ni añadir énfasis innecesario.
- source_word: ἐπὶ τοῖς λεγομένοις
  english_pob_choice: in what is being said
  chosen_spanish: de lo que se está diciendo
  alternatives_spanish:
  - en lo que se está diciendo
  - acerca de lo que se dice
  - en relación con lo dicho
  lexicon: BDAG
  rationale: La frase apunta a los asuntos tratados en el argumento. ‘De lo que se está diciendo’ mantiene el sentido presente y pasivo del participio, con una construcción española fluida.
- source_word: τοιοῦτον
  english_pob_choice: such a
  chosen_spanish: tal
  alternatives_spanish:
  - de tal clase
  - un sacerdote así
  - semejante
  lexicon: BDAG
  rationale: En español, ‘tal’ reproduce bien la referencia retrospectiva a la clase de sumo sacerdote ya descrita, sin sobreexplicar.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - alto sacerdote
  lexicon: BDAG
  rationale: ‘Sumo sacerdote’ es el equivalente cultual y bíblico asentado en español para ἀρχιερεύς, y conserva con precisión el oficio sacerdotal de Hebreos.
- source_word: ἐκάθισεν
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - fue sentado
  lexicon: BDAG
  rationale: El aoristo indica una acción completada. ‘Se sentó’ preserva la fuerza verbal sin añadir explicaciones interpretativas sobre triunfo o consumación que el verso no expresa explícitamente.
- source_word: ἐν δεξιᾷ
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la diestra
  - al lado derecho
  lexicon: BDAG
  rationale: La expresión es idiomática y señala honor y autoridad. ‘A la derecha’ es claro en español moderno; se puede considerar ‘a la diestra’ como alternativa más tradicional, pero ‘a la derecha’ evita un arcaísmo innecesario.
- source_word: τοῦ θρόνου
  english_pob_choice: of the throne
  chosen_spanish: del trono
  alternatives_spanish:
  - del trono
  - de su trono
  lexicon: BDAG
  rationale: La forma genitiva simple se vierte naturalmente con ‘del trono’, conservando la imagen real sin explicitar un posesivo ausente en el griego.
- source_word: τῆς μεγαλωσύνης
  english_pob_choice: the Majesty
  chosen_spanish: de la Majestad
  alternatives_spanish:
  - de la Majestad
  - de la Grandeza
  - del Majestuoso
  lexicon: BDAG
  rationale: El griego usa una circunlocución reverencial. ‘La Majestad’ preserva ese registro elevado en español y mantiene la referencia indirecta sin sustituirla por ‘Dios’, como hace la POB inglesa.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos celestiales
  - en el ámbito celestial
  lexicon: BDAG
  rationale: El plural griego se refleja mejor con ‘en los cielos’ que con el singular ‘en el cielo’. Esta opción conserva la forma del original y sigue la decisión inglesa de no nivelar el plural.
theological_decisions:
- issue: Cómo traducir la circunlocución reverencial τῆς μεγαλωσύνης
  english_pob_reading: Retain the reverential circumlocution 'the Majesty' without substituting 'God.'
  chosen_spanish_reading: Conservar ‘la Majestad’ sin explicitar ‘Dios’.
  alternative_spanish_readings:
  - el trono de Dios
  - la Majestad en lo alto
  - el Majestuoso
  rationale: El griego no usa θεός aquí, sino una designación indirecta y elevada. Mantener ‘la Majestad’ respeta el registro retórico y deja la referencia implícita, como hace la traducción inglesa auditada.
  doctrine_reference: Preservar la tensión teológica del texto; no resolverla más allá de la forma original.
- issue: Si ἐκάθισεν debe ampliarse para enfatizar la obra sacerdotal consumada
  english_pob_reading: Translate as 'sat down' rather than an interpretive expansion such as 'took his seat in completed triumph.'
  chosen_spanish_reading: Traducir simplemente ‘se sentó’.
  alternative_spanish_readings:
  - tomó asiento
  - fue sentado
  - tomó su asiento en triunfo consumado
  rationale: Hebreos conecta la sesión del Hijo con su obra sacerdotal consumada, pero ese desarrollo pertenece al contexto amplio. El versículo mismo sólo afirma la acción, por lo que la traducción no debe sobredeterminarla.
  doctrine_reference: No importar conclusiones doctrinales no explicitadas en el enunciado inmediato; equivalencia óptima.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente, con acuerdo alto entre revisores y sin observaciones de corrección; por eso el borrador español sigue de cerca sus decisiones léxicas y teológicas sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantiene ‘sumo sacerdote’ para ἀρχιερεύς en coherencia con Hebreos.
  - Se conserva ‘la Majestad’ como circunlocución reverencial, evitando sustituirla por ‘Dios’.
  - Se refleja el plural de οὐρανοῖς con ‘los cielos’, en línea con la decisión inglesa de preservar el plural griego.
  - ‘Ahora bien’ funciona como transición discursiva equivalente al δέ suave del original.
