translation:
  language: es
  text: ministro[a] de los lugares santos y del tabernáculo verdadero[b], que el Señor levantó, no el hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario»; el griego puede referirse a los lugares santos del santuario más que a personas santas.
    reason: lexical_alternative
  - marker: b
    text: O «que el Señor plantó» o «que el Señor puso»; el verbo griego puede evocar la acción de montar una tienda o tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ἁγίων
  english_pob_choice: the holy places
  chosen_spanish: los lugares santos
  alternatives_spanish:
  - el santuario
  - las cosas santas
  - los santos
  lexicon: BDAG
  rationale: En Hebreos el genitivo plural funciona de manera sustantivada en un marco cultual. «Los lugares santos» conserva el plural y el sentido de santuario/área sagrada, sin desplazarlo hacia personas santas ('los santos') ni reducirlo a una abstracción menos visible en español.
- source_word: λειτουργὸς
  english_pob_choice: minister
  chosen_spanish: ministro
  alternatives_spanish:
  - servidor
  - liturgista
  lexicon: BDAG
  rationale: El término apunta a un servidor de función pública o cultual. «Ministro» comunica esa función en español bíblico actual con dignidad y sin la tecnicidad innecesaria de «liturgista».
- source_word: σκηνῆς
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - morada
  lexicon: BDAG
  rationale: En Hebreos evoca el tabernáculo mosaico y su contraparte celestial. «Tabernáculo» mantiene esa resonancia cultual mejor que «tienda», que en español suena más genérico.
- source_word: ἀληθινῆς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - real
  - genuino
  lexicon: BDAG
  rationale: «Verdadero» es la forma breve y natural en español para el contraste teológico entre el modelo terrenal y la realidad plena/correspondiente. Conserva la ambivalencia de ἀληθινός sin explicitarla en exceso.
- source_word: ἔπηξεν
  english_pob_choice: set up
  chosen_spanish: erigió
  alternatives_spanish:
  - levantó
  - plantó
  - estableció
  lexicon: BDAG
  rationale: El verbo sugiere fijar o montar, con imagen de tabernáculo. «Erigió» es formal, idiomático en español bíblico y mantiene la idea de construcción/establecimiento; «levantó» o «plantó» sonarían más coloquiales o demasiado metafóricos.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Aunque el griego dice κύριος, aquí el contexto cita la acción divina correspondiente al nombre divino. Conforme a la terminología del proyecto, se usa «Yahvé» en el texto principal para no ocultar el nombre donde el sentido remite al Dios de Israel.
- source_word: οὐκ ἄνθρωπος
  english_pob_choice: not man
  chosen_spanish: no el hombre
  alternatives_spanish:
  - no un hombre
  - no ser humano
  lexicon: BDAG
  rationale: La frase expresa contraste genérico entre acción divina y humana. «No el hombre» preserva la tersa oposición del griego y la fuerza representativa de ἄνθρωπος; «no un hombre» o «no ser humano» suavizan o explicitan más de lo necesario.
theological_decisions:
- issue: Referente de τῶν ἁγίων en el marco de Hebreos 8
  english_pob_reading: Cultic/heavenly sanctuary language rather than a reference to holy people
  chosen_spanish_reading: Lenguaje cultual del santuario celestial, no una referencia a personas santas
  alternative_spanish_readings:
  - los santos
  - las cosas santas
  rationale: Hebreos 8:1-5 desarrolla la función sacerdotal del Mesías en relación con el santuario celestial. Por eso «los lugares santos» conserva el marco tabernáculo-templo y evita desplazar el pasaje hacia una lectura de ministerio entre personas.
  doctrine_reference: Hebreos 8:1-5; traducción con primacía del texto original y retención de la tensión terminológica
- issue: Contraste entre la obra de Yahvé y la obra humana en οὐκ ἄνθρωπος
  english_pob_reading: generic 'man' in contrast with the Lord
  chosen_spanish_reading: Contraste genérico entre lo divino y lo humano
  alternative_spanish_readings:
  - no un hombre
  - no ser humano
  rationale: La frase final subraya que el tabernáculo verdadero fue levantado por Yahvé, no por acción humana. «No el hombre» conserva ese contraste breve y retórico sin neutralizar la referencia genérica de ἄνθρωπος.
  doctrine_reference: Hebreos 8:2; política de precisión semántica y fidelidad al contraste retórico
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el expediente inglés POB con acuerdo alto; no se incorporaron revisiones posteriores, porque el último pase se mantuvo sin cambios. Se conservó la tensión léxica de τῶν ἁγίων y el matiz tabernacular de ἔπηξεν, pero se adaptó a un español publicable y culto.
  spanish_consistency_notes:
  - Se usa «Yahvé» donde el contexto de κύριος remite al nombre divino, conforme al estándar del proyecto.
  - Se mantiene «tabernáculo» para el imaginario cultual de Hebreos.
  - «Ministro» y no «siervo» preserva la función cultual pública de λειτουργός.
  - La expresión final «no el hombre» conserva el contraste genérico y la brevedad del griego.
