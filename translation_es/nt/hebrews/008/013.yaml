    reason: cross_reference
  - marker: c
    text: O «está cerca de desvanecerse».
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar mejor πεπαλαίωκεν («ha hecho obsoleta» en vez de «ha declarado obsoleta») y se reubica la nota [c] en la cláusula final, donde corresponde según ἀφανισμοῦ y la auditoría inglesa. También se suaviza la nota [a] para que la alternativa sea natural en español.
