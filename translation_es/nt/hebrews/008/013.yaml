translation:
  language: es
  text: Al decir[a] «nuevo», ha hecho obsoleta la primera[b]. Y lo que se va volviendo obsoleto y envejece está cerca de desaparecer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cuando dice».
    reason: lexical_alternative
  - marker: b
    text: El griego cita solo «nuevo», eco de la expresión «nuevo pacto» del pasaje anterior en Jeremías 31:31.
    reason: cross_reference
  - marker: c
    text: O «está cerca de desvanecerse».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λέγειν
  english_pob_choice: By saying
  chosen_spanish: Al decir
  alternatives_spanish:
  - Cuando dice
  - Por decir
  lexicon: BDAG
  rationale: La construcción con infinitivo articular en ἐν τῷ λέγειν expresa circunstancia o medio. «Al decir» conserva esa relación causal/circunstancial y suena natural en español, sin añadir un sujeto explícito que el griego no nombra.
- source_word: Καινὴν
  english_pob_choice: “new”
  chosen_spanish: «nuevo»
  alternatives_spanish:
  - «una nueva alianza»
  - «nuevo»
  lexicon: BDAG
  rationale: El adjetivo aparece citado de manera elíptica, como en el texto griego y en la elección inglesa. «Nuevo» mantiene la brevedad de la cita y no introduce en el cuerpo del versículo el sustantivo «alianza», que viene por el contexto inmediato.
- source_word: πεπαλαίωκεν
  english_pob_choice: has made ... obsolete
  chosen_spanish: ha declarado obsoleta
  alternatives_spanish:
  - ha hecho vieja
  - ha hecho obsoleta
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con efecto presente. «Ha declarado obsoleta» comunica bien el valor de superación/desplazamiento covenantal que la POB inglesa recoge con «obsolete», evitando el más débil «ha hecho vieja».
- source_word: τὴν πρώτην
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la primera alianza
  - la primera
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente y remite por contexto a la alianza anterior. «La primera» preserva la economía del griego y deja que el referente lo aporte el contexto de Hebreos 8.
- source_word: τὸ ... παλαιούμενον
  english_pob_choice: what is becoming obsolete
  chosen_spanish: lo que se va volviendo obsoleto
  alternatives_spanish:
  - lo que se está volviendo obsoleto
  - la cosa que se vuelve obsoleta
  lexicon: BDAG
  rationale: El participio presente indica proceso en curso. «Se va volviendo obsoleto» mantiene ese carácter progresivo y suena idiomático en español, sin perder la fuerza aspectual.
- source_word: γηράσκον
  english_pob_choice: growing old
  chosen_spanish: envejece
  alternatives_spanish:
  - va envejeciendo
  - se hace viejo
  lexicon: BDAG
  rationale: El participio complementa a παλαιούμενον con la imagen de envejecimiento. «Envejece» es breve, claro y conserva la metáfora temporal sin forzar una perífrasis pesada.
- source_word: ἐγγὺς
  english_pob_choice: is near to
  chosen_spanish: está cerca de
  alternatives_spanish:
  - está a punto de
  - está próximo a
  lexicon: BDAG
  rationale: ἐγγύς con genitivo comunica proximidad. «Está cerca de» reproduce de forma directa esa cercanía temporal y mantiene el tono sobrio del versículo.
- source_word: ἀφανισμοῦ
  english_pob_choice: disappearing
  chosen_spanish: desaparecer
  alternatives_spanish:
  - desvanecerse
  - ser abolido
  - aniquilación
  lexicon: BDAG
  rationale: El sustantivo puede referirse a desaparición o supresión. «Desaparecer» capta bien el sentido accesible y no introduce la carga más fuerte de «destrucción» o «aniquilación». El verbo en infinitivo funciona naturalmente en español después de «está cerca de».
theological_decisions:
- issue: Sujeto implícito en «Al decir…»
  english_pob_reading: Rendered as 'he' without specifying God or Scripture in the main text.
  chosen_spanish_reading: Se conserva el sujeto implícito; la traducción no lo explicita.
  alternative_spanish_readings:
  - Al decir Dios
  - Cuando dice la Escritura
  rationale: El griego no nombra el sujeto y depende del contexto de la cita de Jeremías. Mantener la impersonalidad respeta la economía del texto y evita resolver una referencia que el versículo mismo deja implícita.
  doctrine_reference: Preservar la tensión textual sin sobreespecificar el referente.
- issue: Estado de la primera alianza
  english_pob_reading: '''has made the first obsolete'''
  chosen_spanish_reading: «ha declarado obsoleta la primera»
  alternative_spanish_readings:
  - ha hecho vieja la primera
  - ha dejado obsoleta la primera
  rationale: La línea argumental de Hebreos contrasta la antigua alianza con la nueva prometida. «Obsoleta» expresa mejor la idea de superación/cese de vigencia que «vieja», sin añadir una afirmación doctrinal más amplia sobre la Torá fuera del argumento inmediato.
  doctrine_reference: Hebreos 8:13 dentro del contraste de alianzas en Hebreos 8.
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantuvo sin cambios tras la revisión; el borrador español sigue de cerca esa lectura estable y conserva las mismas decisiones léxicas y de nota, adaptadas al español.
  spanish_consistency_notes:
  - Se mantiene «obsoleta/obsoleto» para reproducir la fuerza covenantal de πεπαλαίωκεν y παλαιούμενον.
  - Se conserva «la primera» como referente sustantivado, sin añadir «alianza» en el cuerpo del versículo.
  - 'El cierre usa una progresión aspectual natural en español: «se va volviendo obsoleto y envejece».'
