revisions:
- from: Al decir[a] «nuevo», ha declarado obsoleta[c] la primera[b]. Y lo que se va volviendo obsoleto y envejece está cerca de desaparecer.
  to: Al decir[a] «nuevo», ha hecho obsoleta la primera[b]. Y lo que se va volviendo obsoleto y envejece está cerca de desaparecer[c].
  rationale: Se corrige el verbo principal para reflejar mejor πεπαλαίωκεν («ha hecho obsoleta» en vez de «ha declarado obsoleta») y se reubica la nota [c] en la cláusula final, donde corresponde según ἀφανισμοῦ y la auditoría inglesa. También se suaviza la nota [a] para que la alternativa sea natural en español.
  reviewer_model: gpt-5.4
