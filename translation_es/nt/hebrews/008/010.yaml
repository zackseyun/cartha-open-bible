  rationale: 'Se corrige el plural exigido por αὐτῶν y por la auditoría inglesa («sus mentes»). Además, se normaliza la fórmula del pacto a un español más fiel al sentido e intertexto bíblico reconocido: «seré su Dios, y ellos serán mi pueblo». Esto mejora legibilidad y preserva mejor la fuerza teológica sin apartarse del griego.'
