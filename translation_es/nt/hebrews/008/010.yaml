translation:
  language: es
  text: 'Porque este es el pacto que haré con la casa de Israel después de aquellos días, dice el Señor: poniendo mis leyes en sus mentes[a], y sobre sus corazones las escribiré; y seré su Dios, y ellos serán mi pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más llanamente: «pondré mis leyes en sus mentes, y las escribiré sobre sus corazones». El griego tiene un participio («poniendo/dando») seguido de un verbo en futuro («escribiré»).'
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En Hebreos, el contexto es el pacto prometido en Jeremías 31, no un testamento. En español, 'pacto' comunica con claridad la relación formal y contractual sin introducir un término eclesiástico más técnico que la fuente no exige.
- source_word: διαθήσομαι
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - estableceré
  - concertaré
  lexicon: BDAG
  rationale: El futuro de διατίθεμαι en contexto de pacto se expresa naturalmente como 'haré' en español, manteniendo la idea de iniciar o formalizar el pacto sin sobrecargar la frase.
- source_word: τῷ οἴκῳ Ἰσραὴλ
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la familia de Israel
  lexicon: BDAG
  rationale: La fórmula profética se conserva mejor con la expresión completa 'la casa de Israel', que mantiene el eco veterotestamentario y el sentido corporativo.
- source_word: μετὰ τὰς ἡμέρας ἐκείνας
  english_pob_choice: after those days
  chosen_spanish: después de aquellos días
  alternatives_spanish:
  - después de ese tiempo
  - tras aquellos días
  lexicon: BDAG
  rationale: Es una rendición temporal directa y fiel al modismo profético griego.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: BDAG
  rationale: Aunque la cita remite a Yahvé en Jeremías, el texto griego tiene κύριος. En este pasaje, 'Señor' conserva la forma de la cita y es idiomático en español bíblico; no se introduce 'Yahvé' aquí para no alterar la fórmula de cita explícita.
- source_word: διδοὺς
  english_pob_choice: putting
  chosen_spanish: poniendo
  alternatives_spanish:
  - dando
  - colocando
  lexicon: BDAG
  rationale: El participio introduce el contenido/método de la promesa, y 'poniendo' mantiene esa función de manera natural en español, sin forzar una segunda forma finita.
- source_word: νόμους
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - ley
  - mandamientos
  lexicon: BDAG
  rationale: El plural griego debe conservarse. 'Leyes' refleja esa pluralidad mejor que 'ley' singular, y evita la simplificación que oscurecería la forma del texto.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: BDAG
  rationale: Διάνοια alude a la facultad interior de pensar/comprender. 'Mente' es la opción española más natural y mantiene el contraste con 'corazones'.
- source_word: ἐπὶ καρδίας αὐτῶν
  english_pob_choice: on their hearts
  chosen_spanish: sobre sus corazones
  alternatives_spanish:
  - en sus corazones
  - en lo íntimo de su corazón
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo encaja bien con 'sobre' y preserva la metáfora de inscripción. 'Corazones' mantiene el plural como en el griego y como en la revisión auditada del inglés.
- source_word: ἐπιγράψω
  english_pob_choice: I will write
  chosen_spanish: escribiré
  alternatives_spanish:
  - inscribiré
  - anotaré
  lexicon: BDAG
  rationale: '''Escribiré'' es claro, idiomático y suficientemente fiel a la imagen de inscripción; ''inscribiré'' es más literal pero menos natural en español contemporáneo.'
- source_word: ἔσομαι αὐτοῖς εἰς θεόν
  english_pob_choice: I will be their God
  chosen_spanish: seré para ellos Dios
  alternatives_spanish:
  - seré su Dios
  - seré Dios para ellos
  lexicon: BDAG
  rationale: La fórmula de pacto se conserva, pero el español permite 'seré para ellos Dios' para mantener la relación marcada por εἰς y evitar añadir posesivos que el griego no expresa aquí de modo directo.
- source_word: αὐτοὶ ἔσονταί μοι εἰς λαόν
  english_pob_choice: they will be my people
  chosen_spanish: ellos serán para mí un pueblo
  alternatives_spanish:
  - serán mi pueblo
  - serán para mí pueblo
  lexicon: BDAG
  rationale: '''Un pueblo'' refleja λαός con valor colectivo y mantiene la reciprocidad del pacto. Se preserva ''para mí'' para reproducir la dirección relacional del griego.'
theological_decisions:
- issue: Cita de Jeremías 31 y fórmula de pacto
  english_pob_reading: Preserve OT covenantal phrasing such as 'house of Israel,' 'my laws,' 'their hearts,' 'I will be their God,' and 'they will be my people.'
  chosen_spanish_reading: Conservar 'la casa de Israel', 'mis leyes', 'sus corazones', 'seré para ellos Dios' y 'ellos serán para mí un pueblo'.
  alternative_spanish_readings:
  - parafrasear la cita en español más fluido
  - reducir la fórmula a expresiones más generales
  rationale: El valor teológico del versículo depende de su continuidad reconocible con Jeremías 31. Mantener la fórmula de pacto en español preserva la intertextualidad y la fuerza del anuncio del nuevo pacto.
  doctrine_reference: Intertextualidad bíblica; fidelidad a la forma del pacto; primacía del texto fuente.
- issue: Participio + futuro en la construcción de la promesa
  english_pob_reading: Retain the participial sense with 'putting ... and I will write' rather than fully smoothing to 'I will put ... and write.'
  chosen_spanish_reading: Mantener 'poniendo ... y escribiré' en lugar de uniformar todo a futuros coordinados.
  alternative_spanish_readings:
  - pondré mis leyes en su mente, y escribiré
  - poniendo mis leyes en su mente, escribiré
  rationale: El griego combina un participio con un futuro; la traducción española conserva esa tensión sintáctica de forma inteligible. La redacción alternativa más lisa sería válida, pero perdería una señal visible de la estructura original.
  doctrine_reference: Prioridad del original; preservación de rasgos sintácticos significativos.
- issue: Uso de 'Señor' frente a 'Yahvé' en una cita de Jeremías
  english_pob_reading: Render κύριος as 'Lord' though the quotation reflects YHWH in Jeremiah.
  chosen_spanish_reading: Usar 'Señor' en la cita explícita, sin sustituirlo por 'Yahvé'.
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aquí κύριος funciona como forma de cita en el NT. Aunque el trasfondo es el nombre divino, en español 'Señor' preserva la cita griega y evita introducir una normalización que la fuente inmediata no exige.
  doctrine_reference: Convenciones de cita neotestamentaria; distinción entre fuente hebrea y redacción griega.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para cambiar 'mind' por 'minds' según el plural del pronombre y el sentido griego. En español se eligió 'mente' como sustantivo colectivo natural, pero se mantuvo el plural en 'sus corazones' y la nota conserva la tensión entre el participio y el futuro. También se tuvo en cuenta que el inglés fijó 'house of Israel' y la fórmula de pacto completa, que aquí se reflejan de manera directa.
  spanish_consistency_notes:
  - Se usa 'pacto' para διαθήκη en coherencia con el contexto de Hebreos y Jeremías, no 'testamento'.
  - Se conserva la fórmula relacional 'seré para ellos Dios, y ellos serán para mí un pueblo' sin suavizarla.
  - La nota al pie marca la alternativa más fluida y explica la construcción participial griega.
  - No se introdujo 'Yahvé' porque el versículo cita κύριος en griego; se mantiene 'Señor' por consistencia con la cita neotestamentaria.
