review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro de auditoría inglés en los puntos principales: διαθήκη como «pacto», «la casa de Israel», «después de aquellos días», el participio «poniendo», «mis leyes», «sobre sus corazones», y la fórmula pactual final. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría: (1) αὐτῶν es plural, por lo que «en su mente» debe ser «en sus mentes» o equivalente plural; el inglés auditado ya corrigió esto. (2) La fórmula final en español quedó demasiado literal en «seré para ellos Dios... serán para mí un pueblo», lo que preserva la sintaxis pero debilita la formulación pactual establecida que el propio POB inglés decidió mantener como «I will be their God, and they will be my people».'
  spanish_quality_summary: El texto es generalmente legible, pero «en su mente» introduce un error de número y «seré para ellos Dios, y ellos serán para mí un pueblo» suena forzado y menos natural en español bíblico actual. Una revisión menor mejora la fidelidad y la dignidad del español sin perder el vínculo intertextual. También conviene ajustar la nota al plural «sus mentes».
  glossary_alignment: La terminología global está mayormente alineada. «Señor» para κύριος es defendible aquí por tratarse de la forma griega de una cita, aunque el proyecto normalmente use «Yahvé» para el nombre divino; no requiere cambio en este versículo dado el razonamiento documentado. «Pacto» es aceptable para διαθήκη. No hay términos del glosario mayor incumplidos salvo la necesidad de reflejar correctamente el plural de διάνοιαν αὐτῶν en español.
  issues:
  - severity: high
    issue: Número incorrecto en «en su mente»
    rationale: El griego tiene αὐτῶν plural y la auditoría inglesa ya corrigió «mind» a «minds». En español debe reflejarse como «sus mentes» o una solución plural equivalente.
  - severity: medium
    issue: Fórmula pactual final demasiado literal y poco idiomática
    rationale: «Seré para ellos Dios, y ellos serán para mí un pueblo» intenta reproducir εἰς, pero en español resulta rígido y atenúa la fórmula reconocible de Jeremías/Hebreos. «Seré su Dios, y ellos serán mi pueblo» preserva mejor el sentido relacional y la intertextualidad que la auditoría inglesa quiso conservar.
  - severity: low
    issue: La nota al pie repite el singular «su mente»
    rationale: Si se corrige el texto principal al plural, la nota debe armonizarse exactamente con el anclaje y la redacción revisada.
  revised_spanish_text: 'Porque este es el pacto que haré con la casa de Israel después de aquellos días, dice el Señor: poniendo mis leyes en sus mentes[a], y sobre sus corazones las escribiré; y seré su Dios, y ellos serán mi pueblo.'
  revised_footnotes:
  - marker: a
    text: 'O, más llanamente: «pondré mis leyes en sus mentes, y las escribiré sobre sus corazones». El griego tiene un participio («poniendo/dando») seguido de un verbo en futuro («escribiré»).'
    reason: alternative_reading
  revision_rationale: 'Se corrige el plural exigido por αὐτῶν y por la auditoría inglesa («sus mentes»). Además, se normaliza la fórmula del pacto a un español más fiel al sentido e intertexto bíblico reconocido: «seré su Dios, y ellos serán mi pueblo». Esto mejora legibilidad y preserva mejor la fuerza teológica sin apartarse del griego.'
