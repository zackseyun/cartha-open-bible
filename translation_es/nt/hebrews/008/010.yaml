revisions:
- from: 'Porque este es el pacto que haré con la casa de Israel después de aquellos días, dice el Señor: poniendo mis leyes en su mente[a], y sobre sus corazones las escribiré; y seré para ellos Dios, y ellos serán para mí un pueblo.'
