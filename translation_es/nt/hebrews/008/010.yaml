  language: en
  yaml_path: translation/nt/hebrews/008/010.yaml
  text: 'For this is the covenant that I will make with the house of Israel after those days[a], says the Lord: putting my laws into their minds, and I will write them on their hearts; and I will be their God, and they will be my people.'
  footnotes:
