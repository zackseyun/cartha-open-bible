translation:
  language: es
  text: no como el pacto que hice con sus padres el día en que los tomé de la mano[a] para sacarlos de la tierra de Egipto, porque ellos no permanecieron en mi pacto, y yo los desatendí[b], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando tomé su mano».'
    reason: lexical_alternative
  - marker: b
    text: 'La cita sigue el texto griego de Hebreos: «yo los desatendí». Jeremías 31:32 en el texto hebreo tiene un sentido distinto, a menudo traducido «aunque yo era su esposo» o «aunque yo era su amo»/«su señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκην
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En Hebreos, διαθήκη designa el arreglo pactal de Dios con su pueblo. En español, 'pacto' comunica bien la relación vinculante y suena natural; 'testamento' sería equívoco y 'alianza' es posible, pero menos estable para este pasaje dentro de la tradición POB.
- source_word: ἐποίησα
  english_pob_choice: made
  chosen_spanish: hice
  alternatives_spanish:
  - establecí
  - concerté
  lexicon: BDAG
  rationale: Con διαθήκη, ποιέω conserva el verbo simple de hacer. 'Hice' refleja directamente el griego sin sobrecargar el sentido jurídico.
- source_word: τοῖς πατράσιν αὐτῶν
  english_pob_choice: with their fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: BDAG
  rationale: El griego usa un masculino plural explícito. 'Padres' conserva esa forma y reproduce mejor el paralelismo bíblico que 'antepasados', que neutraliza el género y pierde parte del eco textual.
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: BDAG
  rationale: La expresión temporal se vuelve natural en español como 'el día en que', manteniendo el valor histórico concreto del éxodo.
- source_word: ἐπιλαβομένου μου τῆς χειρὸς αὐτῶν
  english_pob_choice: when I took hold of their hand
  chosen_spanish: tomé su mano
  alternatives_spanish:
  - tomé de la mano
  - los tomé de la mano
  lexicon: BDAG
  rationale: La imagen griega es singular ('la mano') y expresa cercanía y guía. 'Tomé su mano' preserva esa imagen de modo más directo en español que la idiomática plural 'los tomé de la mano'.
- source_word: ἐξαγαγεῖν αὐτοὺς
  english_pob_choice: to bring them out
  chosen_spanish: para sacarlos
  alternatives_spanish:
  - para traerlos fuera
  - para sacarlos de
  lexicon: BDAG
  rationale: ἐξάγω en contexto de éxodo se traduce de manera natural por 'sacar'. El infinitivo final queda bien expresado con 'para sacarlos', que evita un calco poco fluido.
- source_word: γῆς Αἰγύπτου
  english_pob_choice: the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - de Egipto
  lexicon: BDAG
  rationale: La mención explícita de γῆς se conserva con 'tierra', siguiendo el valor más completo del texto griego y el tono bíblico de la expresión.
- source_word: ἐνέμειναν
  english_pob_choice: did not continue in
  chosen_spanish: no permanecieron en
  alternatives_spanish:
  - no continuaron en
  - no se mantuvieron en
  lexicon: BDAG
  rationale: '''Permanecieron en'' transmite bien la idea de ἐμμένω: mantenerse fielmente en una relación o compromiso. Es más natural en español que un calco como ''continuaron en''.'
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - entonces yo
  - por mi parte yo
  lexicon: BDAG
  rationale: La crasis se vierte simplemente como 'y yo'; no se introduce un matiz inferencial mayor que el del griego.
- source_word: ἠμέλησα αὐτῶν
  english_pob_choice: I disregarded them
  chosen_spanish: me despreocupé de ellos
  alternatives_spanish:
  - los disregardé
  - los desatendí
  - no me cuidé de ellos
  lexicon: BDAG
  rationale: ἀμελέω expresa desatención o falta de consideración. 'Me despreocupé de ellos' comunica esa falta de cuidado relacional sin forzar una frase demasiado técnica en español. Se conserva la tensión textual del griego de Hebreos frente al hebreo de Jeremías.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - declara el Señor
  lexicon: BDAG
  rationale: La fórmula de cita queda naturalmente como 'dice el Señor'. 'Señor' mantiene la convención española para κύριος en la fórmula profética/citacional.
theological_decisions:
- issue: Diferencia intertextual entre el texto de Hebreos y Jeremías 31:32 en hebreo respecto a la cláusula final
  english_pob_reading: I disregarded them
  chosen_spanish_reading: me despreocupé de ellos
  alternative_spanish_readings:
  - los desatendí
  - los disregardé
  - aunque yo era su esposo/amo
  rationale: Hebreos cita la forma griega que dice que Dios 'desatendió/despreocupó' de ellos, no la lectura del hebreo de Jeremías que habla de 'esposo' o 'amo'. La traducción sigue el griego de Hebreos y mantiene la alternativa del AT en nota para no borrar la tensión textual.
  doctrine_reference: Primacía del texto fuente; conservación de tensiones intertextuales en la traducción bíblica.
- issue: Término divino κύριος en la fórmula de cierre
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - declara el Señor
  rationale: Aunque el proyecto usa 'Yahvé' como forma principal para יהוה, en esta cita de Hebreos la fórmula griega κύριος está integrada como cita bíblica tradicional y puede verterse como 'Señor' para respetar el registro de la cita y evitar forzar una identificación editorial que el contexto citacional ya marca.
  doctrine_reference: Principio de cita y alusión en el NT; distinción entre nombre divino subyacente y fórmula citacional griega.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Hebreos 8:9 y el rastro auditado en inglés POB. Se mantuvo la imagen de la mano y el giro final de desatención/disregardo, evitando armonizarlo con la lectura del hebreo de Jeremías. Se ajustó el verbo de salida a un español natural ('sacarlos') y se preservó la mención completa de 'la tierra de Egipto'.
  spanish_consistency_notes:
  - Se conserva el término pactal 'pacto' de manera consistente con Hebreos.
  - Se evitó traducir δοῦλος o términos afines aquí, sin impacto en este versículo.
  - La fórmula de cierre usa 'Señor' por ser parte de la cita, aunque el proyecto normalmente reserva 'Yahvé' para el nombre divino subyacente.
