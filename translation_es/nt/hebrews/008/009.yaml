source:
  edition: SBLGNT
  text: οὐ κατὰ τὴν διαθήκην ἣν ἐποίησα τοῖς πατράσιν αὐτῶν ἐν ἡμέρᾳ ἐπιλαβομένου μου τῆς χειρὸς αὐτῶν ἐξαγαγεῖν αὐτοὺς ἐκ γῆς Αἰγύπτου, ὅτι αὐτοὶ οὐκ ἐνέμειναν ἐν τῇ διαθήκῃ μου, κἀγὼ ἠμέλησα αὐτῶν, λέγει κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/008/009.yaml
  text: not like the covenant that I made with their fathers on the day when I took hold of their hand to bring them out of the land of Egypt[a], because they did not continue in my covenant, and I disregarded them[b], says the Lord.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'when I took them by the hand.'
    reason: lexical_alternative
  - marker: b
    text: 'The quotation follows the Greek wording reflected in Hebrews: ''I disregarded them.'' Jeremiah 31:32 in the Hebrew text has a different sense, often rendered ''though I was their husband'' or ''though I was their master.'''
    reason: alternative_reading
