translation:
  language: es
  text: Porque seré misericordioso[a] con respecto a sus injusticias, y de sus pecados no me acordaré más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «benigno». ἵλεως puede expresar misericordia, favor benigno o clemencia; se eligió «misericordioso» porque comunica con mayor claridad en español el sentido de clemencia y perdón en este contexto pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la promesa citada; en español, «Porque» conserva bien el valor explicativo y suena natural al inicio de la cláusula.
- source_word: ἵλεως
  english_pob_choice: merciful
  chosen_spanish: benigno
  alternatives_spanish:
  - misericordioso
  - favorable
  - propicio
  lexicon: BDAG
  rationale: ἵλεως expresa una disposición favorable de clemencia. «Benigno» comunica esa actitud de favor y gracia sin introducir una formulación demasiado técnica; «misericordioso» también es posible, pero «benigno» evita convertir el adjetivo en una mera repetición de «misericordia» y mantiene el matiz de benevolencia judicial/covenantal.
- source_word: ταῖς ἀδικίαις αὐτῶν
  english_pob_choice: toward their unrighteousness
  chosen_spanish: para con sus injusticias
  alternatives_spanish:
  - hacia sus injusticias
  - respecto de sus injusticias
  - para con sus maldades
  lexicon: BDAG
  rationale: La construcción dativa con ἵλεως se expresa de forma natural en español con «para con». ἀδικίαις puede significar injusticias, maldades o actos de injusticia; «injusticias» preserva el plural y el peso moral sin añadir «obras» o «deeds» que no aparecen explícitamente en el griego.
- source_word: τῶν ἁμαρτιῶν αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: de sus pecados
  alternatives_spanish:
  - de sus faltas
  - de sus delitos
  lexicon: BDAG
  rationale: ἁμαρτιῶν se traduce de forma directa por «pecados», el equivalente más claro y estándar en español bíblico contemporáneo.
- source_word: οὐ μὴ μνησθῶ ἔτι
  english_pob_choice: I will remember ... no more
  chosen_spanish: no me acordaré más
  alternatives_spanish:
  - no recordaré más
  - no volveré a acordarme
  - jamás me acordaré
  lexicon: BDAG
  rationale: La combinación enfática οὐ μὴ + subjuntivo expresa una negación fuerte y definitiva. «No me acordaré más» mantiene la idiomaticidad del español y comunica bien la idea de no volver a tenerlos presentes en el sentido del pacto, sin volverla mecánica.
theological_decisions:
- issue: No-remembrance of sins as covenantal forgiveness
  english_pob_reading: Covenantal forgiveness expressed as God no longer holding sins against his people
  chosen_spanish_reading: Perdón pactual expresado como que Dios ya no toma en cuenta los pecados de su pueblo
  alternative_spanish_readings:
  - Olvido literal por parte de Dios
  - Suspensión del conocimiento divino
  rationale: La expresión no implica que Dios pierda conocimiento, sino que deja de recordarlos contra su pueblo en sentido pactual y judicial. La redacción española conserva la fuerza bíblica de la fórmula sin neutralizar la tensión teológica.
  doctrine_reference: Hebreos 8:12; Jeremías 31:34; perdón pactual y no imputación
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés. Se evitó añadir elementos no explícitos (como «obras» o «deeds») y se mantuvo la negación enfática de οὐ μὴ μνησθῶ ἔτι con una forma idiomática española que preserve su fuerza. También se respetó la tensión teológica de «recordar no más» como no imputación pactual, no como olvido literal.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología general del proyecto solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se prefirió «pecados» para ἁμαρτιῶν por claridad y consistencia con el registro bíblico español.
  - Se eligió «benigno» para ἵλεως para evitar una traducción demasiado abstracta o eclesiástica, manteniendo un tono sobrio y público.
  - La preposición «para con» refleja bien la orientación relacional de la cláusula con ἵλεως en español contemporáneo.
