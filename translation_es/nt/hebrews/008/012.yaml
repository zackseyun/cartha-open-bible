  text: ὅτι ἵλεως ἔσομαι ταῖς ἀδικίαις αὐτῶν, καὶ τῶν ἁμαρτιῶν ⸀αὐτῶν οὐ μὴ μνησθῶ ἔτι.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/008/012.yaml
  text: For I will be merciful toward their unrighteousness[b][a], and I will remember their sins no more.
  footnotes:
  - marker: a
    text: Or 'For I will be favorable to their injustices.' The Greek ἀδικίαις can denote acts of wrongdoing or injustice; 'unrighteous deeds' was chosen to preserve the moral sense in context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I will certainly not remember their sins any longer.' This is a covenantal idiom for full forgiveness, not a claim that God ceases to know them.
    reason: lexical_alternative
