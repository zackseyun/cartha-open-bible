translation:
  language: es
  text: Ahora bien, si él estuviera en la tierra[a], ni siquiera sería sacerdote, pues hay quienes ofrecen los dones conforme a la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ofrendas». El griego dice «los dones», un término sacrificial común en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὲν οὖν
  english_pob_choice: Now if
  chosen_spanish: Ahora bien, si
  alternatives_spanish:
  - Si entonces
  - Ahora, si
  lexicon: BDAG
  rationale: La combinación marca transición discursiva y una condición. «Ahora bien, si» comunica el giro argumentativo de forma natural en español sin acumular partículas innecesarias.
- source_word: ἦν
  english_pob_choice: he were
  chosen_spanish: estuviera
  alternatives_spanish:
  - estaba
  - fuera
  lexicon: BDAG
  rationale: La construcción condicional contrafactual en español se expresa con imperfecto de subjuntivo. «Estuviera» preserva mejor la fuerza hipotética que un indicativo.
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: En este contexto contrasta la esfera terrenal con la celestial; «en la tierra» es natural en español y mantiene el contraste espacial-teológico.
- source_word: οὐδ’ ἂν ἦν
  english_pob_choice: he would not even be
  chosen_spanish: ni siquiera sería
  alternatives_spanish:
  - no sería en absoluto
  - ni sería
  lexicon: BDAG
  rationale: La negación intensiva se conserva con «ni siquiera sería», que reproduce el énfasis del griego sin sonar forzado.
- source_word: ἱερεύς
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - un sacerdote
  - sacerdote
  lexicon: BDAG
  rationale: «Sacerdote» es el equivalente culto estándar para el oficio sacerdotal. En español no es necesario mantener el artículo indefinido en todos los casos.
- source_word: ὄντων τῶν προσφερόντων
  english_pob_choice: since there are those who offer
  chosen_spanish: pues ya hay quienes presentan
  alternatives_spanish:
  - ya que existen quienes ofrecen
  - puesto que hay quienes presentan
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia o razón. «Pues ya hay quienes presentan» comunica causalidad y evita la repetición de «ofrecer» junto con «dones».
- source_word: προσφερόντων
  english_pob_choice: who offer
  chosen_spanish: presentan
  alternatives_spanish:
  - ofrecen
  - presentan
  lexicon: BDAG
  rationale: Se evita el choque semántico entre el verbo y el sustantivo siguiente. «Presentar» funciona bien en registro culto para el acto sacrificial y permite reservar «ofrecer» para el contexto general implícito.
- source_word: κατὰ νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - de acuerdo con la ley
  lexicon: BDAG
  rationale: La frase alude al orden legal mosaico que regula las ofrendas. «Conforme a la ley» preserva el matiz normativo de manera clara y formal.
- source_word: τὰ δῶρα
  english_pob_choice: the gifts
  chosen_spanish: los dones
  alternatives_spanish:
  - las ofrendas
  - los regalos
  lexicon: BDAG
  rationale: Se conserva la equivalencia léxica de δῶρα como «dones», que mantiene la distinción respecto del verbo y es fiel al término griego en contexto sacrificial.
theological_decisions:
- issue: Sujeto implícito de la condición
  english_pob_reading: Render the subject as 'he,' referring to Jesus/the Messiah from the immediate context.
  chosen_spanish_reading: Se expresa el sujeto implícito como «él», referido a Jesús/el Mesías por el contexto inmediato.
  alternative_spanish_readings:
  - dejar el sujeto implícito
  - usar solo la referencia contextual sin pronombre
  rationale: El español exige un sujeto explícito en esta construcción para que la frase sea natural. «Él» no añade doctrina; simplemente hace inteligible la elipsis del griego a la luz del contexto anterior.
  doctrine_reference: Principio de equivalencia óptima; mantener la referencia discursiva sin introducir contenido extra.
- issue: Fuerza de la condición contrafactual
  english_pob_reading: 'Translate as a contrary-to-fact condition: ''if he were on earth, he would not even be a priest.'''
  chosen_spanish_reading: 'Se traduce como condición contrafactual: «si él estuviera en la tierra, ni siquiera sería sacerdote».'
  alternative_spanish_readings:
  - si él estaba en la tierra, no sería sacerdote
  - si él fuera en la tierra, no sería sacerdote
  rationale: El griego expresa una condición contraria a la realidad. El imperfecto de subjuntivo en español transmite bien esa idea y conserva el razonamiento del autor sobre el sacerdocio celestial del Mesías.
  doctrine_reference: Preservar el sentido llano del texto fuente, sin atenuar ni exagerar la lógica argumentativa.
translation_notes:
  revision_awareness: 'El pasaje se mantiene alineado con la lectura inglesa aprobada: condición contrafactual, sujeto contextual referido a Jesús/el Mesías, y δῶρα conservado con una alternativa léxica válida en nota. No se introdujeron cambios de sentido respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva la distinción entre el verbo de acción («presentan») y el sustantivo sacrificial («dones»).
  - «Ley» traduce νόμος en su sentido normativo/cultual, no una ley civil genérica.
  - El tono es formal y publicable, evitando calcos excesivos y sin perder la estructura argumentativa del griego.
