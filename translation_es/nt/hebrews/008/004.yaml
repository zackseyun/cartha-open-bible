revisions:
- from: Ahora bien, si él estuviera en la tierra[a], ni siquiera sería sacerdote, pues ya hay quienes presentan los dones conforme a la ley.
  to: Ahora bien, si él estuviera en la tierra[a], ni siquiera sería sacerdote, pues hay quienes ofrecen los dones conforme a la ley.
  rationale: Se elimina «ya» para evitar un matiz temporal añadido y se ajusta «presentan» a «ofrecen» para reflejar más directamente προσφερόντων sin perder naturalidad en español. Se conserva la nota sobre «dones/ofrendas», que está bien motivada por el griego y por el historial de decisiones léxicas.
