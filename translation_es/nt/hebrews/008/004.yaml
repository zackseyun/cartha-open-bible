    issue: La expresión «pues ya hay quienes» añade un matiz temporal no presente en el griego.
    rationale: El genitivo absoluto ὄντων τῶν προσφερόντων comunica la razón o circunstancia (‘puesto que hay quienes ofrecen’), pero «ya» sugiere una inmediatez o estado actual enfatizado que el texto fuente no requiere.
  - severity: low
    issue: «presentan los dones» es aceptable, pero «ofrecen los dones» refleja de manera más directa προσφερόντων en contexto sacrificial.
    rationale: Aunque «presentan» es defendible para evitar eco léxico, en español bíblico y litúrgico «ofrecer dones» es natural y mantiene mejor el vínculo con el acto cultual del griego.
  revised_spanish_text: Ahora bien, si él estuviera en la tierra[a], ni siquiera sería sacerdote, pues hay quienes ofrecen los dones conforme a la ley.
