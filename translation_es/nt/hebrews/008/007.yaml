translation:
  language: es
  text: Porque si aquel primer pacto[a] hubiera sido sin defecto, no se habría buscado lugar[b] para un segundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «aquel primero»; «pacto» se suplió por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «oportunidad» o «ocasión».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: γάρ enlaza esta frase como explicación del argumento anterior, y en español «Porque si» comunica bien tanto la conexión causal/explicativa como la condición contraria a los hechos.
- source_word: ἡ πρώτη ἐκείνη
  english_pob_choice: that first covenant
  chosen_spanish: aquel primer pacto
  alternatives_spanish:
  - ese primer pacto
  - aquel primero
  lexicon: BDAG
  rationale: El griego usa adjetivos femeninos que remiten al pacto ya mencionado por el contexto. En español, «pacto» hace explícito el referente sin cambiar el sentido, y «aquel» conserva la distancia referencial de ἐκείνη.
- source_word: ἦν ἄμεμπτος
  english_pob_choice: had been faultless
  chosen_spanish: hubiera sido sin defecto
  alternatives_spanish:
  - hubiera sido intachable
  - hubiera sido sin culpa
  lexicon: BDAG
  rationale: ἄμεμπτος expresa ausencia de base para reproche o culpa. «Sin defecto» es una forma natural en español bíblico y mantiene la idea de falta objetiva, sin precisar más de lo que el verso dice.
- source_word: οὐκ ἂν δευτέρας
  english_pob_choice: no ... would have been sought for a second
  chosen_spanish: no se habría buscado lugar para uno segundo
  alternatives_spanish:
  - no se habría buscado ocasión para uno segundo
  - no se habría buscado espacio para uno segundo
  lexicon: BDAG
  rationale: El giro idiomático με τόπος y la negación contrafactual se conservan con una construcción natural en español. «Lugar» reproduce τόπος de forma bastante directa, y «uno segundo» mantiene la referencia elíptica del griego.
- source_word: ἐζητεῖτο τόπος
  english_pob_choice: place would have been sought
  chosen_spanish: se habría buscado lugar
  alternatives_spanish:
  - se habría buscado ocasión
  - se habría buscado espacio
  lexicon: BDAG
  rationale: El pasivo de ζητέω con τόπος puede expresar tanto «lugar» como «oportunidad/ocasión». El texto principal mantiene la imagen literal y la nota preserva la alternativa idiomática reconocida en el audit trail.
theological_decisions:
- issue: Cómo hacer explícito el referente implícito de «la primera»
  english_pob_reading: Explicitly supplied 'covenant' with 'that first covenant'
  chosen_spanish_reading: «aquel primer pacto»
  alternative_spanish_readings:
  - «aquel primero»
  - «el primer pacto»
  rationale: El contexto inmediato contrasta el primer y el segundo pacto, de modo que añadir «pacto» en español aclara el referente implícito sin introducir una interpretación extra. Esto sigue la misma decisión auditada en inglés.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo traducir ἄμεμπτος sin explicar todavía dónde está el problema
  english_pob_reading: Rendered ἄμεμπτος as 'faultless' without expanding the nature of the fault
  chosen_spanish_reading: «sin defecto»
  alternative_spanish_readings:
  - «intachable»
  - «sin culpa»
  rationale: 'El verso plantea una condición contrafactual y no especifica aquí el tipo exacto de falla. «Sin defecto» conserva la tensión: el problema no se define en este versículo, sino que se desarrolla en el siguiente.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y coincide con el audit trail inglés en la resolución de la elipsis, la condición contrafactual y el valor de τόπος. No hubo cambios revisados en la última pasada, y la traducción española conserva esa misma lectura.
  spanish_consistency_notes:
  - Se usó «pacto» para mantener la coherencia con el contexto inmediato de Hebreos 8 y la decisión inglesa de suplir covenant.
  - Se prefirió «sin defecto» como equivalente natural de ἄμεμπτος, evitando expandir el tipo de defecto.
  - «Lugar» conserva la imagen de τόπος, mientras que la nota registra la alternativa semántica «ocasión»/«oportunidad» sin incorporarla al texto principal.
  - La contrafactualidad se expresó con «hubiera sido» y «se habría buscado» para reflejar οὐκ ἂν + imperfecto pasivo.
