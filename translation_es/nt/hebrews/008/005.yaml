translation:
  language: es
  text: 'los cuales ofrecen servicio a lo que es copia y sombra de las cosas celestiales, así como Moisés fue divinamente instruido[a] cuando estaba por erigir el tabernáculo; pues dice: «Mira, haz todo conforme al modelo que se te mostró en el monte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue advertido»; el verbo griego puede enfatizar una advertencia o amonestación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los cuales
  alternatives_spanish:
  - que
  - quienes
  lexicon: BDAG
  rationale: Mantiene el valor relativo de referencia sin perder el matiz cualitativo del griego; en español, «los cuales» suena natural en un registro bíblico claro y preciso.
- source_word: ὑποδείγματι
  english_pob_choice: a copy
  chosen_spanish: copia
  alternatives_spanish:
  - modelo
  - ejemplo
  - esquema
  lexicon: BDAG
  rationale: En este contexto cultual, «copia» expresa bien la relación de correspondencia con una realidad superior sin diluir la tensión tipológica del pasaje.
- source_word: σκιᾷ
  english_pob_choice: shadow
  chosen_spanish: sombra
  alternatives_spanish:
  - sombra figurada
  - prefiguración
  lexicon: BDAG
  rationale: «Sombra» conserva la metáfora establecida en Hebreos y la inferioridad relativa frente a la realidad celestial, sin convertirla en una explicación meramente conceptual.
- source_word: λατρεύουσιν
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - rinden culto
  - prestan servicio sagrado
  lexicon: BDAG
  rationale: El verbo puede abarcar servicio cultual; «sirven» es el equivalente natural en español y deja que el contexto sacerdotal precise el sentido religioso.
- source_word: τῶν ἐπουρανίων
  english_pob_choice: of the heavenly things
  chosen_spanish: de las cosas celestiales
  alternatives_spanish:
  - de las realidades celestiales
  - de lo celestial
  lexicon: BDAG
  rationale: «Cosas celestiales» preserva el alcance amplio del genitivo sin reducirlo solo a ubicación espacial ni forzarlo a una abstracción técnica.
- source_word: κεχρημάτισται
  english_pob_choice: was divinely instructed
  chosen_spanish: se le dio instrucción divina
  alternatives_spanish:
  - se le advirtió divinamente
  - recibió una advertencia divina
  - fue instruido por Dios
  lexicon: BDAG
  rationale: La pasiva comunica una revelación/instrucción proveniente de Dios. La forma impersonal española conserva ese origen divino sin escoger solo el matiz de «advertencia».
- source_word: μέλλων
  english_pob_choice: was about to
  chosen_spanish: iba a
  alternatives_spanish:
  - estaba por
  - estando por
  lexicon: BDAG
  rationale: Expresa la fuerza prospectiva de manera idiomática en español y funciona bien dentro de la oración subordinada.
- source_word: ἐπιτελεῖν
  english_pob_choice: complete
  chosen_spanish: completar
  alternatives_spanish:
  - construir
  - erigir
  - terminar
  lexicon: BDAG
  rationale: En este pasaje, el verbo se refiere al trabajo de hacer la tienda/tabernáculo conforme al patrón; «completar» mantiene la amplitud semántica sin decidirse demasiado pronto por un solo aspecto constructivo.
- source_word: σκηνήν
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda
  - la morada
  lexicon: BDAG
  rationale: Es el término consagrado y más preciso para el santuario mosaico en este contexto.
- source_word: Ὅρα
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Fíjate
  - Ten cuidado
  lexicon: BDAG
  rationale: «Mira» reproduce la fuerza imperativa directa y resulta natural en la cita bíblica en español.
- source_word: ποιήσεις πάντα
  english_pob_choice: you make everything
  chosen_spanish: hagas todo
  alternatives_spanish:
  - harás todo
  - hagas todas las cosas
  lexicon: BDAG
  rationale: En la cita del mandato, el subjuntivo exhortativo español suena más natural que un futuro literal; conserva el valor imperativo del griego citado.
- source_word: κατὰ τὸν τύπον
  english_pob_choice: according to the pattern
  chosen_spanish: conforme al modelo
  alternatives_spanish:
  - según el patrón
  - de acuerdo con el modelo
  lexicon: BDAG
  rationale: «Conforme al modelo» comunica adecuadamente la idea de un diseño normativo mostrado a Moisés; «modelo» evita una calcomanía terminológica demasiado técnica.
- source_word: τὸν δειχθέντα σοι
  english_pob_choice: shown to you
  chosen_spanish: que se te mostró
  alternatives_spanish:
  - mostrado a ti
  - revelado a ti
  lexicon: BDAG
  rationale: La voz pasiva se mantiene de forma natural y el relativo integra bien la cláusula en español.
- source_word: ἐν τῷ ὄρει
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: BDAG
  rationale: «En el monte» es la forma bíblica y natural en español para la localización del Sinaí.
theological_decisions:
- issue: Relación entre el culto terrenal y la realidad celestial
  english_pob_reading: Rendered ὑποδείγματι καὶ σκιᾷ as 'a copy and shadow of the heavenly things'
  chosen_spanish_reading: «en copia y sombra de las cosas celestiales»
  alternative_spanish_readings:
  - «como copia y sombra de las cosas celestiales»
  - «como una copia y sombra de las cosas celestiales»
  - «como modelo y sombra de las cosas celestiales»
  rationale: La formulación mantiene la correspondencia tipológica sin resolverla en alegoría ni diluirla en mera semejanza. «Copia» y «sombra» conservan la inferioridad del culto terrestre frente a la realidad celestial.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Sentido de κεχρημάτισται
  english_pob_reading: Translated as 'was divinely instructed'
  chosen_spanish_reading: «se le dio instrucción divina»
  alternative_spanish_readings:
  - «se le advirtió divinamente»
  - «fue advertido por Dios»
  - «recibió una advertencia divina»
  rationale: La construcción española deja abierta la doble posibilidad de instrucción y admonición, que el griego puede implicar, sin restringir el pasaje a solo una de ellas.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el último pase de revisión inglés: conserva la relación tipológica de «copia y sombra», refleja la instrucción divina a Moisés con una construcción natural en español, y evita introducir un futuro en la cita directa de Exodo, manteniendo el tono imperativo del mandato.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el nombre divino explícito; aquí no ocurre.
  - Se prefirió «tabernáculo» para σκηνή en coherencia con el registro bíblico y la terminología estable del pasaje.
  - «Cosas celestiales» conserva el plural del genitivo y evita reducir la referencia a una sola entidad abstracta.
  - La cita directa mantiene un tono bíblico claro pero en español moderno, sin depender de formulaciones tradicionales fijas que suavicen la tensión del original.
