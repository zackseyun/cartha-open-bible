revisions:
- from: 'los cuales sirven [a] en copia y sombra de las cosas celestiales, así como a Moisés se le dio instrucción divina, cuando iba a completar el tabernáculo; porque dice: «Mira que hagas todo conforme al modelo que se te mostró en el monte».'
  to: 'los cuales ofrecen servicio a lo que es copia y sombra de las cosas celestiales, así como Moisés fue divinamente instruido[a] cuando estaba por erigir el tabernáculo; pues dice: «Mira, haz todo conforme al modelo que se te mostró en el monte».'
  rationale: Se reubicó la nota al verbo correspondiente (κεχρημάτισται), se corrigió la construcción inicial para que suene natural y refleje mejor la relación cultual con «copia y sombra», y se cambió «completar» por «erigir» para ajustarse mejor al contexto de la construcción del tabernáculo y al rastro de revisión POB. También se suavizó la cita para un español más claro y digno sin perder el sentido fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta en general el sentido del griego y del rastro POB en cuanto a la relación entre el culto terrenal y las realidades celestiales, la instrucción divina dada a Moisés y la cita de Éxodo. Sin embargo, hay desajustes importantes: «sirven [a] en copia y sombra» coloca mal el anclaje de nota y suena poco natural para ὑποδείγματι καὶ σκιᾷ λατρεύουσιν τῶν ἐπουρανίων; además, la nota [a] está anclada en un lugar incorrecto, pues corresponde a κεχρημάτισται, no a «sirven». También conviene ajustar ἐπιτελεῖν desde «completar» a una forma constructiva más precisa en este contexto, en línea con la revisión inglesa.'
  spanish_quality_summary: 'La redacción es bastante legible, pero contiene giros poco idiomáticos o ambiguos: «sirven en copia y sombra» no suena natural en español bíblico actual, y «porque dice» puede resultar algo áspero donde el griego φησίν introduce la cita de modo parentético. El conjunto mejora claramente con una formulación como «ofrecen servicio a lo que es copia y sombra...» o «sirven a una copia y sombra...». También hace falta reubicar la nota al segmento correcto.'
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. «tabernáculo», «Dios» implícito en la instrucción divina, y el resto del vocabulario están alineados. El ajuste principal es de fidelidad sintáctica y naturalidad española, no de glosario maestro.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «sirven» pero explica κεχρημάτισται.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí la explicación léxica trata de «se le dio instrucción divina / fue advertido», no de λατρεύουσιν.
  - severity: high
    issue: «sirven en copia y sombra de las cosas celestiales» es una construcción poco natural y semánticamente confusa.
    rationale: El dativo ὑποδείγματι καὶ σκιᾷ con λατρεύουσιν expresa que su servicio se relaciona con una copia y sombra de las realidades celestiales. En español, «servir en copia y sombra» suena defectuoso; conviene explicitar mejor la relación sin apartarse del original.
  - severity: medium
    issue: «completar el tabernáculo» queda menos preciso que una opción constructiva como «erigir» o «construir».
    rationale: Aunque ἐπιτελεῖν puede significar completar, en este contexto de fabricación/levantamiento del tabernáculo la revisión inglesa ya documentó una mejora hacia «erect». En español, «erigir» o «construir» refleja mejor el contexto.
  - severity: low
    issue: «porque dice» puede mejorarse levemente en fluidez contextual.
    rationale: El φησίν parentético puede mantenerse como «pues dice» o integrarse mejor en la cita. No es un error grave, pero admite pulido estilístico.
  revised_spanish_text: 'los cuales ofrecen servicio a lo que es copia y sombra de las cosas celestiales, así como Moisés fue divinamente instruido[a] cuando estaba por erigir el tabernáculo; pues dice: «Mira, haz todo conforme al modelo que se te mostró en el monte».'
  revised_footnotes:
  - marker: a
    text: O «fue advertido»; el verbo griego puede enfatizar una advertencia o amonestación divina.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al verbo correspondiente (κεχρημάτισται), se corrigió la construcción inicial para que suene natural y refleje mejor la relación cultual con «copia y sombra», y se cambió «completar» por «erigir» para ajustarse mejor al contexto de la construcción del tabernáculo y al rastro de revisión POB. También se suavizó la cita para un español más claro y digno sin perder el sentido fuente.
