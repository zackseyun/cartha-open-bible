    reason: alternative_reading
  revision_rationale: Se corrige la expresión inicial para reflejar νυνὶ δὲ con español natural y fiel («Pero ahora»). Se reubica la nota [a] al lugar correcto, ya que el alternativo «superior» modifica «ministerio más excelente», no la frase inicial. Se conservan las demás decisiones léxicas y teológicas, que son sustancialmente fieles al griego y al audit trail inglés.
