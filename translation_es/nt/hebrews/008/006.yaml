translation:
  language: es
  text: Pero ahora ha obtenido un ministerio más excelente[a], en la medida en que también es mediador de un mejor pacto[c], el cual ha sido instituido sobre mejores promesas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un ministerio superior».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha sido establecido sobre mejores promesas».'
    reason: lexical_alternative
  - marker: c
    text: «Pacto» refleja mejor aquí el contexto de la promesa del nuevo pacto citada en los versículos siguientes; «testamento» también es posible en algunos contextos, pero aquí sería menos claro.
    reason: alternative_reading
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero, así como está
  alternatives_spanish:
  - Pero ahora
  - Pero, en la situación presente
  lexicon: BDAG
  rationale: La expresión introduce un contraste temporal y lógico con lo dicho antes. «Así como está» mantiene el valor idiomático y actual sin volverlo un calco rígido de «ahora».
- source_word: διαφορωτέρας
  english_pob_choice: more excellent
  chosen_spanish: más excelente
  alternatives_spanish:
  - más distinguido
  - superior
  lexicon: BDAG
  rationale: El comparativo expresa superioridad cualitativa. «Más excelente» conserva el tono elevado de Hebreos y la fuerza comparativa del griego.
- source_word: τέτυχεν
  english_pob_choice: has obtained
  chosen_spanish: ha obtenido
  alternatives_spanish:
  - ha recibido
  - ha alcanzado
  lexicon: BDAG
  rationale: El perfecto comunica una posesión presente derivada de una acción cumplida. «Ha obtenido» refleja esa idea de adquisición ya vigente.
- source_word: λειτουργίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - servicio sacerdotal
  lexicon: BDAG
  rationale: En este contexto se trata del ministerio sacerdotal de Cristo. «Ministerio» suena natural en español y conserva la amplitud del término sin forzar una explicación innecesaria.
- source_word: ὅσῳ καὶ
  english_pob_choice: by as much as he is also
  chosen_spanish: en la medida en que también
  alternatives_spanish:
  - cuanto también
  - puesto que también
  lexicon: BDAG
  rationale: La construcción comparativa-correlativa vincula la superioridad del ministerio con la del pacto mediado. «En la medida en que también» preserva esa relación proporcional en español claro.
- source_word: κρείττονός ... διαθήκης
  english_pob_choice: of a better covenant
  chosen_spanish: de un mejor pacto
  alternatives_spanish:
  - de un pacto superior
  - de un mejor convenio
  lexicon: BDAG
  rationale: Se elige «pacto» porque en Hebreos el término se relaciona con la promesa de nuevo pacto de Jeremías. «Mejor» reproduce el comparativo clave del pasaje.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - gozne
  lexicon: BDAG
  rationale: «Mediador» es el equivalente exacto y doctrinalmente preciso para la función de Cristo entre Dios y el pueblo.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - la cual
  - que
  lexicon: BDAG
  rationale: El relativo retoma «pacto» con concordancia natural en español y mantiene el tono descriptivo del griego.
- source_word: ἐπὶ κρείττοσιν ἐπαγγελίαις
  english_pob_choice: on better promises
  chosen_spanish: sobre mejores promesas
  alternatives_spanish:
  - fundado en mejores promesas
  - basado en mejores promesas
  lexicon: BDAG
  rationale: La preposición con dativo expresa base o fundamento. «Sobre mejores promesas» conserva la imagen de sostén/estructura del pacto, mientras que las alternativas explicitan la idea interpretativa.
- source_word: νενομοθέτηται
  english_pob_choice: has been enacted
  chosen_spanish: ha sido instituido
  alternatives_spanish:
  - ha sido establecido
  - ha sido legislado
  lexicon: BDAG
  rationale: El perfecto pasivo de νομοθετέομαι sugiere que algo ha sido formalmente promulgado o instituido con vigencia continua. «Ha sido instituido» comunica bien el sentido jurídico-covenantal en español.
theological_decisions:
- issue: Renderización de διαθήκη en Hebreos 8:6
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - testamento
  - alianza
  rationale: En Hebreos 8 el argumento remite explícitamente a la promesa del nuevo pacto de Jeremías y a la mediación sacerdotal. «Pacto» es la opción más fiel y clara en este contexto; «testamento» podría oscurecer el trasfondo profético-covenantal.
  doctrine_reference: Primacía del sentido del original sobre la tradición eclesial; mantener la referencia al nuevo pacto anunciado en la Escritura.
- issue: Valor de νενομοθέτηται al final del versículo
  english_pob_reading: has been enacted
  chosen_spanish_reading: ha sido instituido
  alternative_spanish_readings:
  - ha sido establecido
  - ha sido promulgado
  rationale: La forma pasiva perfecta sugiere una institución formal con validez actual. «Ha sido instituido» preserva la fuerza jurídica sin introducir una formulación excesivamente técnica.
  doctrine_reference: Lenguaje legal-covenantal del texto; evitar reducirlo a una simple afirmación abstracta de existencia.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura editorial inglesa sin cambios sustanciales: contraste temporal («But as it is»), superioridad comparativa («more excellent»), y cláusula final legal-covenantal («has been enacted»). La redacción española ajusta el orden para fluidez natural y conserva las tensiones léxicas clave de Hebreos.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Mesías» no aparece en este versículo; se mantiene la terminología de Hebreos con «mediador» y «pacto».
  - 'Se evita suavizar el comparativo κρείττων: aparece como «mejor» / «más excelente» para mantener el hilo argumental del pasaje.'
  - Se mantiene la distinción entre «pacto» y «testamento» como tensión documentada en la tradición de traducción, resuelta aquí a favor de «pacto» por el contexto inmediato.
