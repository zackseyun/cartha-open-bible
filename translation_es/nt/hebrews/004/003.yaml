  glossary_alignment: 'Alineación buena con la terminología del proyecto: no hay términos de glosario mayor en conflicto. «Reposo» para κατάπαυσις es apropiado; «ira» para ὀργή mantiene el tono solemne. No aparecen decisiones sobre Yahvé/Mesías/etc. en este versículo.'
