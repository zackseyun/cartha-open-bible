translation:
  language: es
  text: 'Porque nosotros, los que hemos creído, entramos en el reposo, tal como él ha dicho: «Como juré en mi ira[b]: “Si han de entrar en mi reposo[a]”», aunque sus obras ya habían sido terminadas desde la fundación del mundo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «Si han de entrar en mi reposo», una fórmula de juramento que en el contexto expresa exclusión cierta; el texto mantiene aquí la forma literal para no borrar la tensión semítica del dicho.'
    reason: alternative_reading
  - marker: b
    text: O «furor»; el griego ὀργή puede tener un matiz judicial solemne. «Ira» conserva bien el tono del pasaje en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχόμεθα
  english_pob_choice: enter
  chosen_spanish: entramos
  alternatives_spanish:
  - estamos entrando
  - entramos en
  lexicon: BDAG
  rationale: El presente griego comunica una acción actual con fuerza generalizada en el argumento; en español, el presente simple «entramos» expresa bien esa vigencia sin forzar un progresivo poco natural.
- source_word: κατάπαυσιν
  english_pob_choice: the rest
  chosen_spanish: el reposo
  alternatives_spanish:
  - el descanso
  - el reposo
  lexicon: BDAG
  rationale: «Reposo» conserva mejor el matiz bíblico-teológico del estado de descanso de Dios que está en discusión. «Descanso» es posible, pero «reposo» suena más acorde al registro de Hebreos.
- source_word: οἱ πιστεύσαντες
  english_pob_choice: we who have believed
  chosen_spanish: nosotros, los que hemos creído
  alternatives_spanish:
  - nosotros los creyentes
  - nosotros, los que creemos
  lexicon: BDAG
  rationale: El participio aoristo con primera persona plural se vierte con una apposición inclusiva. «Hemos creído» conserva el valor aspectual de una fe ya asumida y mantiene la autoidentificación del autor con sus oyentes.
- source_word: καθὼς εἴρηκεν
  english_pob_choice: just as he has said
  chosen_spanish: tal como él ha dicho
  alternatives_spanish:
  - como él ha dicho
  - justo como él ha dicho
  lexicon: BDAG
  rationale: El perfecto griego indica palabra con vigencia actual; «ha dicho» preserva ese valor. «Tal como» da una relación de correspondencia clara y natural en español.
- source_word: ὀργῇ
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi cólera
  lexicon: BDAG
  rationale: Aunque «ira» puede sonar más débil que «wrath» en inglés, es el equivalente español más directo y natural para ὀργή en contexto judicial/solemne. Se mantiene la fuerza sin introducir un término más cargado que el español usualmente reserva a registros muy literarios.
- source_word: Εἰ εἰσελεύσονται εἰς τὴν κατάπαυσίν μου
  english_pob_choice: If they shall enter my rest
  chosen_spanish: “Si entrarán en mi reposo”
  alternatives_spanish:
  - “Si entran en mi reposo”
  - “Si han de entrar en mi reposo”
  lexicon: BDAG
  rationale: Se conserva la forma literal de la fórmula de juramento condicional del griego, como hace la revisión inglesa más reciente, para no borrar la tensión semítica del texto. En español, «Si entrarán» reproduce esa estructura aun cuando suena marcada, y por eso se mantiene entre comillas como cita.
- source_word: καίτοι
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: BDAG
  rationale: '«Aunque» expresa bien la concesión: pese al juramento y la exclusión citada, las obras de Dios ya estaban terminadas.'
- source_word: τῶν ἔργων ... γενηθέντων
  english_pob_choice: his works were finished
  chosen_spanish: sus obras habían sido terminadas
  alternatives_spanish:
  - sus obras fueron terminadas
  - sus obras habían sido acabadas
  lexicon: BDAG
  rationale: El genitivo absoluto presenta las obras como ya realizadas. «Habían sido terminadas» conserva el pluscuamperfecto implícito en la relación temporal y suena natural en español. Se mantiene «sus» por el contexto divino.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: from the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde el fundamento del mundo
  - desde que el mundo fue fundado
  lexicon: BDAG
  rationale: Es el modismo bíblico estándar para el origen del mundo. «Desde la fundación del mundo» es claro, reverente y transparente en español.
theological_decisions:
- issue: Fórmula de juramento de Salmo 95 citada en Hebreos
  english_pob_reading: 'The English audit trail preserved the literal conditional oath form: “If they shall enter my rest,” rather than importing the negation into the quotation.'
  chosen_spanish_reading: «Si entrarán en mi reposo»
  alternative_spanish_readings:
  - «No entrarán en mi reposo»
  - «Jamás entrarán en mi reposo»
  rationale: Se evita convertir la cita en una paráfrasis explicativa. La tensión semítica del juramento condicional queda visible en español, tal como en la revisión inglesa más reciente, para que el lector perciba el mecanismo retórico sin perder fidelidad al griego.
  doctrine_reference: Hebreos 4:3; Salmo 95:11
- issue: Tiempo verbal de «los que han creído» y el presente de «entran»
  english_pob_reading: The English audit trail chose present “enter” for believers’ current participation in rest, while retaining the aorist participle as “we who have believed.”
  chosen_spanish_reading: «nosotros, los que hemos creído, entramos»
  alternative_spanish_readings:
  - «nosotros, los que creemos, entramos»
  - «nosotros, los que hemos creído, entraremos»
  rationale: 'Se conserva la tensión ya/ todavía no: la fe es presentada como un hecho ya ocurrido, y el entrar al reposo como una realidad presente en el argumento de Hebreos. En español, el presente «entramos» comunica esa participación actual sin cancelar la consumación futura implícita en el contexto.'
  doctrine_reference: Hebreos 4:1-11
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje griego SBLGNT y toma en cuenta la revisión inglesa más reciente, que optó por preservar más literalmente la fórmula de juramento condicional. Se mantuvo esa literalidad en la cita, pero se ajustó a un español natural en el resto del versículo. También se respetó el valor temporal del perfecto y del participio aoristo, evitando traducir todo como futuro o como mera descripción general.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; aquí el sujeto de «ha dicho» y «juré» es implícito y no requiere nombrarlo.
  - Se prefirió «reposo» por coherencia con el discurso de Hebreos, donde el término funciona como concepto teológico específico.
  - Se evitó «Cristo» porque este versículo no lo contiene.
  - Se mantuvo un registro bíblico claro pero contemporáneo, sin volver la cita una paráfrasis interpretativa.
