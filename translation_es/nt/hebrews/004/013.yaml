translation:
  language: es
  text: Y ninguna criatura queda oculta ante él[a], sino que todas las cosas están desnudas y expuestas a sus ojos[b], a quien tenemos que rendir cuentas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «con quien tenemos que tratar»; el griego también puede entenderse como «a quien se dirige nuestro asunto/palabra».
    reason: alternative_reading
  - marker: b
    text: El verbo traducido «expuestas» procede de uno raro que puede evocar el cuello echado hacia atrás o dejado al descubierto, reforzando la idea de total desnudamiento ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτίσις
  english_pob_choice: creature
  chosen_spanish: criatura
  alternatives_spanish:
  - creación
  - ser creado
  lexicon: BDAG
  rationale: El griego usa un sustantivo singular genérico para cualquier ser o cosa creada. «Criatura» conserva la referencia a lo creado y suena natural en español bíblico sin volverlo demasiado abstracto como «creación».
- source_word: ἀφανὴς
  english_pob_choice: hidden
  chosen_spanish: oculta
  alternatives_spanish:
  - invisible
  - escondida
  - encubierta
  lexicon: BDAG
  rationale: El contexto habla de ser visto y expuesto ante Dios, no de invisibilidad metafísica. «Oculta» expresa mejor la idea de estar fuera de la vista divina.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: from his sight
  chosen_spanish: ante él
  alternatives_spanish:
  - delante de él
  - en su presencia
  - a su vista
  lexicon: BDAG
  rationale: En español, «ante él» conserva la fuerza espacial/jurídica de «delante de él» y funciona bien con la imagen de escrutinio que sigue en el versículo. La cláusula posterior ya explicita la metáfora de la vista con «a sus ojos».
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: El neutro plural abarca la totalidad sin restringirse a personas. «Todas las cosas» mantiene el alcance comprehensivo con registro claro y formal.
- source_word: γυμνὰ
  english_pob_choice: naked
  chosen_spanish: desnudas
  alternatives_spanish:
  - nudas
  - descubiertas
  - sin cobertura
  lexicon: BDAG
  rationale: La metáfora de desnudez es directa y debe conservarse. «Desnudas» es la equivalencia natural y transparente en español.
- source_word: τετραχηλισμένα
  english_pob_choice: laid bare
  chosen_spanish: expuestas
  alternatives_spanish:
  - descubiertas
  - desplegadas
  - puestas al descubierto
  lexicon: BDAG
  rationale: El verbo raro sugiere exposición completa, quizá con la imagen de echar el cuello hacia atrás o dejarlo al descubierto. «Expuestas» comunica el resultado sin forzar la imagen debatida en el texto principal.
- source_word: τοῖς ὀφθαλμοῖς αὐτοῦ
  english_pob_choice: to his eyes
  chosen_spanish: a sus ojos
  alternatives_spanish:
  - ante sus ojos
  - delante de sus ojos
  - para sus ojos
  lexicon: BDAG
  rationale: La frase dativa expresa relación con la visión divina. «A sus ojos» reproduce bien la imagen y armoniza con «desnudas y expuestas».
- source_word: πρὸς ὃν ἡμῖν ὁ λόγος
  english_pob_choice: to whom we must give account
  chosen_spanish: ante quien tenemos que rendir cuenta
  alternatives_spanish:
  - con quien tenemos que vernos
  - a quien debemos dar cuenta
  - con quien tenemos que tratar
  lexicon: BDAG
  rationale: La construcción idiomática apunta a responsabilidad delante de Dios en el contexto inmediato de escrutinio y juicio. «Rendir cuenta» conserva la fuerza de accountability sin perder naturalidad en español. Se evita resolver la frase en un mero «tener que ver con», porque eso atenúa el matiz judicial y responsivo que el contexto favorece.
theological_decisions:
- issue: Sentido de πρὸς ὃν ἡμῖν ὁ λόγος
  english_pob_reading: 'The clause expresses human accountability before God: ''to him we must give account.'''
  chosen_spanish_reading: 'La cláusula expresa responsabilidad humana delante de Dios: «ante quien tenemos que rendir cuenta».'
  alternative_spanish_readings:
  - con quien tenemos que tratar
  - a quien debemos dar cuenta
  - con quien tenemos que vernos
  rationale: El contexto inmediato subraya el conocimiento penetrante de Dios y prepara la advertencia de juicio. La traducción elegida mantiene esa tensión de responsabilidad sin volver la frase oscura ni reducirla a una simple relación general.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla prematuramente)
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del POB en inglés para el último sintagma, prefiriendo una formulación formal y directa de πρὸς ὃν ἡμῖν ὁ λόγος. También conserva la decisión revisada de no forzar la imagen rara de τετραχηλισμένα en el texto principal, reservando la explicación en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» en términos generales del proyecto, pero este versículo habla de Dios mediante pronombre y no requiere un nombre divino explícito.
  - Se preservó la cadena imagística «desnudas y expuestas a sus ojos» para mantener el paralelismo con el griego.
  - «Rendir cuenta» se eligió como equivalente idiomático y judicial de accountability, coherente con el contexto de Hebreos 4:12–13.
