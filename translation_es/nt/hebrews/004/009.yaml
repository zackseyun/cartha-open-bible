translation:
  language: es
  text: Así que[a] queda todavía un descanso sabático para el pueblo de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «observancia sabática». El término griego σαββατισμός es raro y alude de manera explícita al lenguaje del sábado; aquí probablemente designa un descanso de tipo sabático que permanece para el pueblo de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Entonces
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión. «Así que» conserva el valor lógico de cierre argumentativo en español natural, sin sonar excesivamente solemne.
- source_word: ἀπολείπεται
  english_pob_choice: remains
  chosen_spanish: queda todavía
  alternatives_spanish:
  - permanece
  - queda
  - sigue existiendo
  lexicon: BDAG
  rationale: El verbo expresa que algo continúa disponible o vigente. «Queda todavía» comunica bien la continuidad y la persistencia del descanso en el argumento de Hebreos.
- source_word: σαββατισμός
  english_pob_choice: Sabbath rest
  chosen_spanish: descanso sabático
  alternatives_spanish:
  - observancia sabática
  - reposo sabático
  - sabatismo
  lexicon: BDAG
  rationale: «Descanso sabático» preserva la conexión léxica con el sábado y el sentido contextual de un descanso con resonancia sabática. «Observancia sabática» estrecha demasiado el término hacia práctica ritual; «sabatismo» no es idiomático en español.
- source_word: τῷ λαῷ
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - al pueblo
  - a favor del pueblo
  lexicon: BDAG
  rationale: 'El dativo se expresa naturalmente como beneficio o destino: «para el pueblo». Es la opción más clara y fiel al sentido de disponibilidad para ellos.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  lexicon: BDAG
  rationale: Genitivo simple de posesión/relación. «De Dios» es directo y mantiene la identidad pactual del pueblo en el contexto.
theological_decisions:
- issue: Sentido de σαββατισμός en Hebreos 4:9
  english_pob_reading: An ongoing Sabbath-like rest that remains available for God's people, expressed as 'Sabbath rest.'
  chosen_spanish_reading: Un descanso de resonancia sabática que permanece para el pueblo de Dios, expresado como «descanso sabático».
  alternative_spanish_readings:
  - una observancia literal del sábado
  - un descanso espiritual sin referencia al sábado
  rationale: La palabra griega evoca explícitamente el sábado y el contexto de Hebreos 3–4 une el reposo de Dios, el séptimo día y el reposo prometido al creyente. «Descanso sabático» conserva esa tensión sin resolverla en una mera práctica ritual ni en una abstracción des-sabatizada.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audio de la POB en inglés y el texto griego: mantiene la inferencia de ἄρα, el valor de continuidad de ἀπολείπεται y la tensión semántica de σαββατισμός. No se adoptó «Cristo» ni terminología eclesial tradicional ajena al dato léxico; tampoco se suavizó el matiz sabático del sustantivo.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ de forma consistente con el proyecto.
  - «Descanso sabático» mantiene la misma tensión semántica que la nota inglesa, sin convertir el término en una mera ordenanza ni en un reposo genérico.
  - La puntuación y mayúsculas siguen el español estándar; el marcador de nota [a] está anclado donde corresponde.
