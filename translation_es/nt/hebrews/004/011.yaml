review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura global del griego: exhortación inferencial, entrada en el reposo, y advertencia para que nadie caiga. Sin embargo, «en el mismo ejemplo» no preserva tan bien como debería el matiz de ἐν τῷ αὐτῷ ὑποδείγματι, que en el contexto apunta al mismo patrón/precedente de desobediencia de Israel, no simplemente a un ejemplo cualquiera. El texto español actual además usa «ese reposo», mientras que «aquel reposo» o «ese reposo» ambos son posibles; no es un error grave, pero «aquel» refleja un poco mejor ἐκείνην.'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Esforcémonos» y «Por tanto» suenan naturales. La principal debilidad estilística y semántica es «caiga en el mismo ejemplo de desobediencia», que resulta algo extraño en español y puede sugerir imitación de un ejemplo más que incurrir en el mismo patrón o precedente. Una leve revisión mejora fidelidad y naturalidad.
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. «Reposo» para κατάπαυσις y «desobediencia» para ἀπείθεια están bien alineados con la justificación auditada. La nota que preserva «incredulidad» como alternativa contextual también está bien. La única desalineación relevante es con la decisión léxica inglesa documentada para ὑπόδειγμα como «pattern», que conviene reflejar en español como «patrón» o una formulación equivalente.
  issues:
  - severity: medium
    issue: «en el mismo ejemplo» traduce de forma débil ἐν τῷ αὐτῷ ὑποδείγματι
    rationale: Aunque ὑπόδειγμα puede significar «ejemplo», en este contexto la idea documentada por la auditoría es la de patrón/precedente de la desobediencia de Israel. En español, «caer en el mismo ejemplo» suena poco idiomático y semánticamente borroso.
  - severity: low
    issue: El demostrativo «ese» podría afinarse a «aquel»
    rationale: No es incorrecto, pero ἐκείνην señala algo más distal o ya tematizado. «Aquel reposo» reproduce mejor el énfasis del griego sin perder naturalidad.
  revised_spanish_text: Por tanto[a], esforcémonos por entrar en aquel reposo, para que nadie caiga siguiendo el mismo patrón de desobediencia.
  revised_footnotes:
  - marker: a
    text: O «el mismo ejemplo de incredulidad». El sustantivo puede entenderse a la luz de la negativa de la generación del desierto a confiar en Dios, aunque el término griego significa más directamente «desobediencia».
    reason: lexical_alternative
  revision_rationale: Se revisa «en el mismo ejemplo» a «siguiendo el mismo patrón» para reflejar mejor el valor contextual de ὑπόδειγμα y producir un español más natural. También se ajusta «ese reposo» a «aquel reposo» para representar con más precisión el demostrativo ἐκείνην. Se conserva la nota lexical sobre «incredulidad», ya que está bien justificada por la auditoría inglesa.
