revisions:
- from: Por tanto[a], esforcémonos por entrar en ese reposo, para que nadie caiga en el mismo ejemplo de desobediencia.
  to: Por tanto[a], esforcémonos por entrar en aquel reposo, para que nadie caiga siguiendo el mismo patrón de desobediencia.
  rationale: Se revisa «en el mismo ejemplo» a «siguiendo el mismo patrón» para reflejar mejor el valor contextual de ὑπόδειγμα y producir un español más natural. También se ajusta «ese reposo» a «aquel reposo» para representar con más precisión el demostrativo ἐκείνην. Se conserva la nota lexical sobre «incredulidad», ya que está bien justificada por la auditoría inglesa.
