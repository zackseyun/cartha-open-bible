translation:
  language: es
  text: Por tanto[a], esforcémonos por entrar en aquel reposo, para que nadie caiga siguiendo el mismo patrón de desobediencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mismo ejemplo de incredulidad». El sustantivo puede entenderse a la luz de la negativa de la generación del desierto a confiar en Dios, aunque el término griego significa más directamente «desobediencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπουδάσωμεν
  english_pob_choice: let us make every effort
  chosen_spanish: esforcémonos
  alternatives_spanish:
  - hagamos todo esfuerzo
  - seamos diligentes
  - esforcémonos con empeño
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pide una invitación colectiva urgente. «Esforcémonos» conserva la idea de diligencia activa, suena natural en español y evita una perífrasis demasiado explicativa.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  - Por ello
  lexicon: BDAG
  rationale: Marca una inferencia lógica a partir del argumento previo sobre el reposo de Dios. «Por tanto» es claro, formal y mantiene la conexión argumentativa.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - acceder
  lexicon: BDAG
  rationale: El infinitivo expresa el objetivo de la exhortación. «Entrar» es la equivalencia directa y más natural en español.
- source_word: ἐκείνην τὴν κατάπαυσιν
  english_pob_choice: that rest
  chosen_spanish: ese reposo
  alternatives_spanish:
  - aquel reposo
  - ese descanso
  - aquella quietud
  lexicon: BDAG
  rationale: κατάπαυσις en Hebreos apunta al reposo prometido por Dios; «reposo» conserva ese matiz bíblico mejor que «descanso». «Ese» refleja el demostrativo sin sonar forzado en español.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... no one may
  chosen_spanish: para que nadie
  alternatives_spanish:
  - a fin de que nadie
  - para que no
  - de modo que nadie
  lexicon: BDAG
  rationale: Expresa finalidad negativa de manera idiomática en español. «Para que nadie» mantiene el tono de advertencia sin sobrerrecrear la sintaxis griega.
- source_word: ἐν τῷ αὐτῷ ... ὑποδείγματι
  english_pob_choice: by the same pattern
  chosen_spanish: en el mismo ejemplo
  alternatives_spanish:
  - según el mismo patrón
  - en el mismo modelo
  - por el mismo ejemplo
  lexicon: BDAG
  rationale: El griego admite la idea de ejemplo, modelo o patrón. En español, «ejemplo» conserva la referencia al precedente de Israel y deja espacio para la nota que explica la tensión con «patrón». La preposición «en» sigue de cerca la construcción ἐν sin sonar demasiado técnica.
- source_word: πέσῃ
  english_pob_choice: may fall
  chosen_spanish: caiga
  alternatives_spanish:
  - pueda caer
  - llegue a caer
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἵνα μή expresa una posibilidad advertida. «Caiga» es conciso y mantiene el tono de advertencia solemne.
- source_word: τῆς ἀπειθείας
  english_pob_choice: of disobedience
  chosen_spanish: de desobediencia
  alternatives_spanish:
  - de incredulidad
  - de incredulidad y desobediencia
  - de falta de fe
  lexicon: BDAG
  rationale: ἀπείθεια tiene sentido primario de desobediencia. En Hebreos está vinculada teológicamente con la incredulidad, pero el valor léxico inmediato es «desobediencia»; por eso se conserva en el texto principal y se documenta la alternativa contextual.
theological_decisions:
- issue: Relación entre ἀπείθεια e incredulidad en Hebreos
  english_pob_reading: Render ἀπείθεια as 'disobedience' in the main text while acknowledging 'unbelief' as a contextual alternative.
  chosen_spanish_reading: Mantener «desobediencia» en el texto principal, con «incredulidad» como alternativa contextual documentada.
  alternative_spanish_readings:
  - incredulidad
  - falta de fe
  rationale: Hebreos relaciona estrechamente la incredulidad con la desobediencia en la exposición del Salmo 95, pero el término griego aquí nombra más directamente la desobediencia. La redacción española conserva esa tensión sin resolverla en una sola glosa interpretativa.
  doctrine_reference: 'Principio de la POB: preservar la tensión léxica y teológica documentada; excepciones solo con justificación basada en la fuente.'
translation_notes:
  revision_awareness: El paquete de fuente y la auditoría inglesa muestran alta concordancia y no registran revisiones aplicadas; la redacción española sigue esa lectura estable, conservando la nota alternativa sobre ὑπόδειγμα/ἀπείθεια sin introducir cambios especulativos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí; no aparece el Tetragrámaton en este versículo.
  - «Reposo» se usa como término técnico coherente con Hebreos, en lugar de «descanso», por su mayor continuidad conceptual en la sección.
  - «Desobediencia» se conserva como sentido principal de ἀπείθεια para respetar la decisión léxica auditada; «incredulidad» queda reservada a la nota.
  - La construcción exhortativa colectiva se vuelve natural en español con el imperativo inclusivo «esforcémonos».
