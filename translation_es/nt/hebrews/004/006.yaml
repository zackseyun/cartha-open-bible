translation:
  language: es
  text: Por tanto, puesto que todavía queda para algunos entrar en ella, y aquellos a quienes antes se les anunció la buena noticia no entraron por desobediencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por incredulidad». El término griego puede expresar la negativa a creer tal como se manifiesta en la desobediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ οὖν
  english_pob_choice: Therefore, since
  chosen_spanish: Por tanto, puesto que
  alternatives_spanish:
  - Pues, puesto que
  - Así que, ya que
  lexicon: BDAG
  rationale: La combinación es inferencial y explicativa. «Por tanto» conserva la conclusión lógica de οὖν, y «puesto que» expresa el fundamento causal de ἐπεί en un español natural y digno.
- source_word: ἀπολείπεται
  english_pob_choice: it remains
  chosen_spanish: todavía queda
  alternatives_spanish:
  - permanece
  - sigue quedando
  lexicon: BDAG
  rationale: El presente comunica una disponibilidad continua. «Todavía queda» comunica bien la idea de que la entrada sigue abierta sin forzar una paráfrasis excesiva.
- source_word: τινὰς
  english_pob_choice: for some
  chosen_spanish: algunos
  alternatives_spanish:
  - para algunos
  - ciertos
  lexicon: BDAG
  rationale: Con el infinitivo, el sentido es que la entrada sigue abierta para algunas personas. En español, «algunos» resulta más natural; el matiz de referencia indefinida queda preservado por el contexto.
- source_word: εἰσελθεῖν εἰς αὐτήν
  english_pob_choice: to enter it
  chosen_spanish: entren en ella
  alternatives_spanish:
  - entren en eso
  - entren allí
  lexicon: BDAG
  rationale: El pronombre retoma anafóricamente el reposo mencionado antes. «Entren en ella» mantiene la referencia y evita añadir «reposo» en el texto principal más allá del griego inmediato.
- source_word: οἱ πρότερον εὐαγγελισθέντες
  english_pob_choice: those who formerly had the good news proclaimed to them
  chosen_spanish: aquellos a quienes antes se anunció la buena noticia
  alternatives_spanish:
  - los que antes recibieron la buena noticia
  - los que antes fueron evangelizados
  lexicon: BDAG
  rationale: El participio pasivo de εὐαγγελίζω expresa que la buena noticia les fue anunciada. «Se anunció la buena noticia» conserva la pasiva y evita el tecnicismo eclesiástico «evangelizados».
- source_word: οὐκ εἰσῆλθον
  english_pob_choice: did not enter
  chosen_spanish: no entraron
  alternatives_spanish:
  - no llegaron a entrar
  - no lograron entrar
  lexicon: BDAG
  rationale: El aoristo negativo es directo. «No entraron» es transparente y formalmente fiel; evita añadir un matiz de fracaso que no está explícito en el verbo.
- source_word: δι’ ἀπείθειαν
  english_pob_choice: because of disobedience
  chosen_spanish: por desobediencia
  alternatives_spanish:
  - a causa de desobediencia
  - por incredulidad
  lexicon: BDAG
  rationale: «Desobediencia» preserva el sentido léxico principal de ἀπείθεια. La alternativa «incredulidad» se conserva solo como posibilidad contextual, pero no desplaza el valor lexical básico en el texto principal.
theological_decisions:
- issue: Tensión semántica de ἀπείθεια en un contexto de advertencia y fe
  english_pob_reading: because of disobedience, with footnoted alternative 'because of unbelief'
  chosen_spanish_reading: por desobediencia, con nota que permite 'por incredulidad'
  alternative_spanish_readings:
  - por incredulidad
  - por falta de fe
  rationale: El término puede rozar la incredulidad cuando se trata de rechazar la palabra oída, pero su sentido nuclear es desobediencia. Mantener «desobediencia» evita aplanar la tensión entre oír, creer y obedecer que el contexto de Hebreos desarrolla.
  doctrine_reference: Principio POB de preservar tensiones léxicas reales; Hebreos 3–4 sobre la respuesta obediente a la palabra oída
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y no se señalaron problemas. La redacción española mantiene la misma decisión léxica principal del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «buena noticia» para εὐαγγελίζω, en vez de «evangelio» o «evangelizados», para conservar la voz pasiva del original.
  - Se evita usar «SEÑOR» o terminología eclesiástica no presente en el versículo.
  - La nota de alternativa preserva la tensión entre incredulidad y desobediencia sin sustituir el sentido principal.
