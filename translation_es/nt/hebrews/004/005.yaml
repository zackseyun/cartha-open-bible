translation:
  language: es
  text: 'Y en este lugar otra vez: «Ciertamente no entrarán en mi descanso»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «Si entrarán en mi descanso», una fórmula de juramento que significa «ciertamente no entrarán en mi descanso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en esto
  - en este pasaje
  lexicon: BDAG
  rationale: El dativo con ἐν remite al lugar de la cita bíblica. «En este lugar» conserva la referencia a un pasaje o ubicación textual y suena natural en español en un contexto de catena de citas.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Marca la reanudación de la cita. «Otra vez» es breve, idiomático y mantiene el valor de repetición.
- source_word: κατάπαυσίν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - resto
  lexicon: BDAG
  rationale: En Hebreos 3–4, κατάπαυσις es el término clave para la realidad de la entrada al reposo de Dios. «Descanso» comunica con claridad el sentido teológico en español actual y evita una formulación demasiado arcaica; «reposo» queda como alternativa legítima.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  lexicon: BDAG
  rationale: Se conserva el posesivo directo para mantener la voz divina de la cita y reflejar que el reposo pertenece a Dios.
theological_decisions:
- issue: La fórmula condicional juratoria εἰ εἰσελεύσονται
  english_pob_reading: They shall certainly not enter my rest
  chosen_spanish_reading: No entrarán en mi descanso
  alternative_spanish_readings:
  - Si entrarán en mi descanso
  - Entrarán en mi descanso
  rationale: Aunque la forma griega es literalmente condicional, en esta cita funciona como una fórmula semítica de juramento con valor enfático negativo. En español, traducirla como negación expresa preserva el sentido reconocido por el POB inglés y evita una lectura literal engañosa.
  doctrine_reference: Salmo 95:11; Hebreos 3:11; Hebreos 4:5; principios de equivalencia óptima
translation_notes:
  revision_awareness: No se requieren revisiones previas en este registro; la redacción sigue el acuerdo alto del audit trail inglés y preserva la cita como una negación enfática de fórmula juratoria.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal para el nombre divino cuando aparece explícitamente; aquí no aparece el nombre, sino un posesivo de primera persona en la cita, por lo que se mantiene «mi».
  - Se evitó «SEÑOR» porque el verso no contiene κύριος ni un equivalente directo en esta cláusula citada.
  - «Descanso» se escogió por claridad contextual en español contemporáneo; si el contexto inmediato exigiera una terminología más técnica, «reposo» sería la alternativa principal.
