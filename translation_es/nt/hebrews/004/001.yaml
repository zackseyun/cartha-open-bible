source:
  edition: SBLGNT
  text: Φοβηθῶμεν οὖν μήποτε καταλειπομένης ἐπαγγελίας εἰσελθεῖν εἰς τὴν κατάπαυσιν αὐτοῦ δοκῇ τις ἐξ ὑμῶν ὑστερηκέναι·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/004/001.yaml
  text: Therefore[a], let us fear lest, while the promise of entering his rest still remains[c][b], any one of you should seem to have fallen short.
  footnotes:
  - marker: a
    text: Or 'let us be afraid.' The Greek verb is stronger than a mere 'be careful' and preserves the seriousness of the warning.
    reason: lexical_alternative
  - marker: b
    text: Or 'while a promise remains of entering his rest.' The Greek construction is compact and may be rendered more formally this way.
    reason: alternative_reading
  - marker: c
    text: Or 'might appear to have failed to reach it.'
    reason: lexical_alternative
