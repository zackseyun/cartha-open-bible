translation:
  language: es
  text: Por tanto, temamos[a], no sea que, mientras aún permanece[b] la promesa de entrar en su reposo, alguno de ustedes parezca no haberlo alcanzado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tengamos miedo». El verbo griego es más fuerte que una simple advertencia de precaución y conserva la seriedad de la advertencia.
    reason: lexical_alternative
  - marker: b
    text: O «mientras permanece la promesa de entrar en su reposo». La construcción griega es compacta y puede traducirse más formalmente de esta manera.
    reason: alternative_reading
  - marker: c
    text: O «parezca haber fallado en alcanzarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Φοβηθῶμεν
  english_pob_choice: let us fear
  chosen_spanish: temamos
  alternatives_spanish:
  - tengamos miedo
  - temamos con temor serio
  lexicon: BDAG
  rationale: El griego expresa una exhortación fuerte; «temamos» conserva la seriedad del aviso sin suavizarlo a una simple precaución.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca la conclusión lógica del argumento previo; «Por tanto» funciona de manera natural y formal en español.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por temor a que
  lexicon: BDAG
  rationale: Introduce una advertencia con valor preventivo; «no sea que» reproduce bien la fuerza de prevención del griego en español.
- source_word: καταλειπομένης ἐπαγγελίας
  english_pob_choice: while the promise of entering his rest still remains
  chosen_spanish: mientras aún permanece la promesa de entrar en su reposo
  alternatives_spanish:
  - mientras queda la promesa de entrar en su reposo
  - mientras permanece la promesa de entrar en su reposo
  lexicon: BDAG
  rationale: La construcción genitiva absoluta comunica una circunstancia concurrente; «mientras aún permanece» conserva la idea de que la promesa sigue en pie.
- source_word: ἐπαγγελίας
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa hecha
  - promesa divina
  lexicon: BDAG
  rationale: «Promesa» es el equivalente directo y contextual; el contexto de Hebreos 3–4 deja claro de qué promesa se trata sin necesidad de añadir más.
- source_word: εἰσελθεῖν
  english_pob_choice: of entering
  chosen_spanish: de entrar
  alternatives_spanish:
  - para entrar
  - de ingresar
  lexicon: BDAG
  rationale: 'En español, la relación con «promesa» se expresa con una construcción nominal natural: «la promesa de entrar».'
- source_word: κατάπαυσιν
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - descanso/reposo
  lexicon: BDAG
  rationale: En Hebreos 3–4, «reposo» es una opción clara y reverente para el sentido teológico de κατάπαυσις; evita reducirlo a mera relajación física.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Dios
  lexicon: BDAG
  rationale: El pronombre se conserva como posesivo, como en el griego; el antecedente es evidente por el contexto inmediato.
- source_word: δοκῇ
  english_pob_choice: should seem
  chosen_spanish: parezca
  alternatives_spanish:
  - parezca haber
  - se considere
  lexicon: BDAG
  rationale: «Parezca» transmite la idea de apariencia o juicio percibido sin decidir más de lo que dice el texto.
- source_word: τις ἐξ ὑμῶν
  english_pob_choice: any one of you
  chosen_spanish: alguno de ustedes
  alternatives_spanish:
  - cualquiera de ustedes
  - algún miembro de ustedes
  lexicon: BDAG
  rationale: La combinación singular-indefinida del griego se vierte de forma natural en español con un singular colectivo inclusivo; conserva el alcance individual dentro del grupo.
- source_word: ὑστερηκέναι
  english_pob_choice: to have fallen short
  chosen_spanish: haber quedado corto
  alternatives_spanish:
  - haber fallado en alcanzar
  - haber fracasado en llegar
  lexicon: BDAG
  rationale: La imagen de ὑστερέω apunta a no alcanzar la meta; «haber quedado corto» es idiomático en español y mantiene el matiz de insuficiencia o falta de alcance.
theological_decisions:
- issue: 'La intensidad de la exhortación: temor real o simple cautela'
  english_pob_reading: Retain the strong exhortation 'let us fear'
  chosen_spanish_reading: «temamos» mantiene una advertencia real y seria
  alternative_spanish_readings:
  - «tengamos cuidado»
  - «estemos atentos»
  rationale: El verbo griego φοβηθῶμεν es fuerte; la traducción no debe rebajarlo a mera prudencia. «Temamos» conserva la gravedad del llamado sin resolver el debate teológico sobre perseverancia/apostasía.
  doctrine_reference: Hebreos 4:1; POB translation philosophy §§1, 3, 6
- issue: El referente de «su reposo»
  english_pob_reading: Translate simply as 'his rest'
  chosen_spanish_reading: «su reposo» conserva el pronombre del texto sin explicitar más
  alternative_spanish_readings:
  - «el reposo de Dios»
  - «su reposo sabático»
  rationale: El contexto identifica el referente, pero el verso mismo usa un pronombre. Mantener «su reposo» evita añadir una explicación interpretativa que el griego no formula explícitamente.
  doctrine_reference: Hebreos 3–4; POB translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios; este borrador sigue de cerca el texto griego y el análisis auditado en inglés, sin introducir suavizaciones ni ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «reposo» para κατάπαυσις en coherencia con Hebreos 3–4, aunque «descanso» sería posible en otros contextos.
  - Se conservó el pronombre posesivo «su» para αὐτοῦ, sin reemplazarlo por «de Dios», porque el texto griego es explícitamente pronominal.
  - «Alguno de ustedes» refleja el singular indefinido τις con valor distributivo dentro del grupo.
  - 'La puntuación reproduce el encadenamiento del griego: conclusión, advertencia y circunstancia concurrente.'
