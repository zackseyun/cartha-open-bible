  glossary_alignment: 'Alineado con la terminología del proyecto: «Josué» para Ἰησοῦς según el referente contextual, «reposo» para el campo semántico de καταπαύω/rest, y nota transparente sobre la forma griega «Jesús». No hay conflicto con las directrices principales.'
