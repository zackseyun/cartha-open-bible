translation:
  language: es
  text: Porque si Josué les hubiera dado reposo, no habría hablado más tarde de otro día.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Jesús». La forma Ἰησοῦς puede referirse tanto a Jesús como a Josué; aquí el contexto apunta claramente a Josué hijo de Nun.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: El contexto inmediato trata de la entrada en Canaán y del reposo vinculado con Josué hijo de Nun; por eso el nombre se traduce como Josué. Se conserva la alternativa «Jesús» en nota porque la forma griega es idéntica, pero aquí sería engañosa para el lector.
- source_word: κατέπαυσεν
  english_pob_choice: had given them rest
  chosen_spanish: les hubiera dado reposo
  alternatives_spanish:
  - les hubiera causado reposo
  - los hubiera hecho reposar
  lexicon: BDAG
  rationale: καταπαύω expresa causar reposo o hacer cesar. En español, «dar reposo» transmite bien el sentido causativo y resulta natural en el argumento de Hebreos.
- source_word: οὐκ ἂν ... ἐλάλει
  english_pob_choice: would not have spoken
  chosen_spanish: no habría hablado
  alternatives_spanish:
  - no estaría hablando
  - no habría dicho
  lexicon: BDAG
  rationale: La construcción con οὐκ ἂν y el imperfecto expresa una consecuencia contrafactual en el pasado. «No habría hablado» conserva ese valor condicional pasado sin añadir sujeto explícito.
- source_word: περὶ ἄλλης ... ἡμέρας
  english_pob_choice: about another day
  chosen_spanish: de otro día
  alternatives_spanish:
  - acerca de otro día
  - sobre otro día
  lexicon: BDAG
  rationale: La frase alude a un día posterior de reposo aún prometido. En español, «de otro día» es la forma más breve y natural dentro de la sintaxis de «hablar de».
- source_word: μετὰ ταῦτα
  english_pob_choice: later
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  lexicon: BDAG
  rationale: La expresión marca secuencia temporal. «Después» refleja de forma directa que la mención ocurrió en un momento posterior al de Josué.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón que sostiene la afirmación anterior. «Porque» mantiene claramente la relación explicativa en español.
theological_decisions:
- issue: Referente de Ἰησοῦς en Hebreos 4:8
  english_pob_reading: Joshua, son of Nun
  chosen_spanish_reading: Josué, hijo de Nun
  alternative_spanish_readings:
  - Jesús
  rationale: La argumentación se refiere al ingreso de Israel en la tierra bajo Josué, no a Jesús de Nazaret. Traducir aquí «Jesús» oscurecería el punto histórico-argumentativo del autor. La nota conserva la tensión textual porque el griego usa la misma forma nominal.
  doctrine_reference: Primacía del texto original; traducción de nombres según el referente histórico; preservar tensiones textuales en nota
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés, que eliminó un sujeto explícito añadido y mantuvo el sentido contrafactual: el griego no dice «Dios», sino simplemente «él». Por eso la versión española conserva una construcción impersonal/implícita: «no habría hablado».'
  spanish_consistency_notes:
  - Se usa «Josué» en lugar de «Jesús» para mantener la referencia histórica del pasaje.
  - «Reposo» traduce el concepto de descanso/resto sabático del argumento de Hebreos, sin suavizarlo a una idea meramente emocional.
  - No se añade sujeto explícito en la segunda cláusula, para respetar el griego y la revisión inglesa auditada.
  - La puntuación y el orden de la cláusula buscan una lectura natural en español sin perder la estructura condicional del original.
