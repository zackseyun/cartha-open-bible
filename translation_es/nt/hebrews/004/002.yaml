translation:
  language: es
  text: Porque en verdad también nosotros hemos recibido buenas nuevas, lo mismo que ellos; pero el mensaje que oyeron no les aprovechó, porque no fue unido por la fe[b] con los que oyeron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una variante textual y la traducción tradicional: «porque no fue mezclado con fe en los que oyeron».'
    reason: textual_variant
  - marker: b
    text: 'Griego: «fe»; alternativamente, «confianza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐηγγελισμένοι
  english_pob_choice: have had good news proclaimed to us
  chosen_spanish: hemos recibido buenas nuevas
  alternatives_spanish:
  - se nos ha proclamado el evangelio
  - hemos sido evangelizados
  - hemos recibido el evangelio
  lexicon: BDAG
  rationale: El perfecto pasivo perifrástico expresa una proclamación ya recibida con efecto vigente. 'Hemos recibido buenas nuevas' conserva la idea verbal y evita imponer demasiado pronto el tecnicismo 'evangelio' en esta comparación con la generación del desierto.
- source_word: καθάπερ κἀκεῖνοι
  english_pob_choice: just as they did
  chosen_spanish: lo mismo que ellos
  alternatives_spanish:
  - tal como ellos también
  - así como ellos
  lexicon: BDAG
  rationale: La comparación apunta a una equivalencia entre la audiencia presente y la generación anterior en cuanto a haber recibido un mensaje de Dios. 'Lo mismo que ellos' es natural y mantiene la simetría sin sobrecargar la frase.
- source_word: ὁ λόγος τῆς ἀκοῆς
  english_pob_choice: the message they heard
  chosen_spanish: la palabra oída
  alternatives_spanish:
  - el mensaje que oyeron
  - la palabra del oír
  - la palabra escuchada
  lexicon: BDAG
  rationale: Se preserva λόγος como 'palabra' y ἀκοή como algo oído/escuchado. 'La palabra oída' es breve y cercana al griego; en nota se puede entender también como 'mensaje' si se busca explicitar el sentido.
- source_word: ὠφέλησεν
  english_pob_choice: did not benefit
  chosen_spanish: no les aprovechó
  alternatives_spanish:
  - no les fue de provecho
  - no les benefició
  lexicon: BDAG
  rationale: '''Aprovechar'' comunica con naturalidad el valor práctico o salvífico del mensaje, sin perder la idea de no producir beneficio espiritual.'
- source_word: συγκεκερασμένους
  english_pob_choice: united
  chosen_spanish: unida
  alternatives_spanish:
  - mezclada
  - combinada
  - unida en
  lexicon: BDAG
  rationale: El participio evoca literalmente una mezcla o combinación, pero en el contexto la relación es de integración/adhesión. 'Unida' mantiene la tensión entre la imagen de mezcla y el sentido relacional que el inglés POB documenta.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: Se mantiene el valor doctrinal y léxico por defecto de πίστις como 'fe'. En este contexto contrasta con oír sin respuesta creyente.
- source_word: τοῖς ἀκούσασιν
  english_pob_choice: with those who listened
  chosen_spanish: con los que oyeron
  alternatives_spanish:
  - con los oyentes
  - con quienes escucharon
  lexicon: BDAG
  rationale: El aoristo participial señala a los que oyeron el mensaje. 'Oyeron' es fiel y sobrio; 'escucharon' podría sugerir receptividad que el griego no explicita aquí.
- source_word: μὴ ⸀συγκεκερασμένους τῇ πίστει τοῖς ἀκούσασιν
  english_pob_choice: because it was not united by faith with those who heard
  chosen_spanish: porque no fue unida por la fe con los que oyeron
  alternatives_spanish:
  - porque no estaba mezclada con fe en los que oyeron
  - porque no fue mezclada con la fe de los que oyeron
  - porque no se unió por la fe con los que oyeron
  lexicon: BDAG
  rationale: El texto griego dado y la lectura revisada del POB sugieren que la referencia principal del participio recae sobre 'la palabra' (implícita) o el mensaje, no sobre 'ellos'. Por eso se mantiene una construcción impersonal en español. 'Por la fe' conserva el valor instrumental o de esfera, dejando abierta la tensión textual sin borrarla.
theological_decisions:
- issue: Tratamiento de πίστις en Hebreos 4:2
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la confianza
  - la fidelidad
  rationale: Se conserva el término estándar 'fe' porque el contraste del versículo es entre haber oído y responder con fe. 'Confianza' es posible, pero menos consistente con el proyecto; 'fidelidad' no parece primaria aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Cláusula final y variante textual
  english_pob_reading: the message they heard did not benefit them, because it was not united by faith with those who heard
  chosen_spanish_reading: la palabra oída no les aprovechó, porque no fue unida por la fe con los que oyeron
  alternative_spanish_readings:
  - la palabra oída no les aprovechó, porque no estaba mezclada con fe en los que oyeron
  - la palabra oída no les aprovechó, porque no fue mezclada con la fe de los que oyeron
  rationale: Se sigue la lectura del SBLGNT dada en el paquete fuente, que permite entender la falta de unión del mensaje con la fe de quienes lo oyeron. La alternativa tradicional se deja implícitamente abierta por la formulación 'no fue unida...'.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura revisada del POB que entiende la última cláusula como referida principalmente a la palabra o mensaje: no fue unida por la fe con los que oyeron. A la vez, la nota de variante mantiene visible la lectura tradicional de ''mezclada con fe''.'
  spanish_consistency_notes:
  - Se usa 'buenas nuevas' para εὐαγγελίζω/εὐηγγελισμένοι en coherencia con el marco POB.
  - Se mantiene 'fe' para πίστις como término doctrinal por defecto.
  - Se evita 'SEÑOR' porque no hay aquí un reemplazo del nombre divino.
  - '''Oyeron'' se usa de modo consistente con el verbo ἀκούω y con la audiencia implícita del versículo.'
