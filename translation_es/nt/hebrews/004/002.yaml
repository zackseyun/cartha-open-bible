review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: la proclamación previa de buenas noticias, la comparación con la generación anterior, y la falta de provecho del mensaje. Sin embargo, hay dos desajustes importantes con el paquete fuente y el rastro POB en inglés. Primero, la nota [a] está anclada a «en verdad», pero su contenido trata de la variante textual de la cláusula final; el anclaje debe ir en la cláusula afectada, no al inicio. Segundo, la nota [b] está anclada a «aprovechó», pero habla de πίστις; debe anclarse a «fe». Además, «la palabra oída» es posible, pero «el mensaje que oyeron» comunica mejor ὁ λόγος τῆς ἀκοῆς en español natural y sigue más de cerca la decisión auditada del POB inglés.'
  spanish_quality_summary: El español es generalmente claro, pero los anclajes de notas son incorrectos y generan confusión. «Porque en verdad» suena algo pesado; «Porque de hecho» o «Porque en verdad» pueden funcionar, pero el problema principal no es estilístico sino de colocación de notas. «No fue unida por la fe» es entendible, aunque algo rígido; con «el mensaje que oyeron» la frase completa fluye mejor. La revisión propuesta mejora naturalidad sin apartarse del griego ni del razonamiento documentado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Fe» para πίστις es correcto y debe mantenerse en el texto principal. No intervienen términos como Yahvé/Mesías/esclavo. La revisión respeta el criterio de no imponer «evangelio» como tecnicismo donde el inglés auditado prefirió «good news proclaimed».
  issues:
  - severity: high
    issue: La nota [a] está anclada al segmento equivocado.
    rationale: La nota textual sobre la variante «mezclada con fe en los que oyeron» corresponde a la cláusula final, no a «Porque en verdad». Tal como está, el lector recibe una nota irrelevante en ese punto.
  - severity: high
    issue: La nota [b] está anclada a «aprovechó», pero su contenido trata de πίστις.
    rationale: 'El comentario «Griego: ''fe''; alternativamente, ''confianza''» debe ir en el término «fe», no en el verbo «aprovechó». Esto incumple la disciplina de anclar cada nota al lugar relevante del texto.'
  - severity: medium
    issue: «La palabra oída» suena más calcada que natural en español.
    rationale: Aunque es defendible, el POB inglés auditado escogió una expresión más idiomática equivalente a «el mensaje que oyeron». En español, esa opción comunica mejor λόγος τῆς ἀκοῆς sin perder precisión.
  revised_spanish_text: Porque en verdad también nosotros hemos recibido buenas nuevas, lo mismo que ellos; pero el mensaje que oyeron no les aprovechó, porque no fue unido por la fe[b] con los que oyeron[a].
  revised_footnotes:
  - marker: a
    text: 'O, siguiendo una variante textual y la traducción tradicional: «porque no fue mezclado con fe en los que oyeron».'
    reason: textual_variant
  - marker: b
    text: 'Griego: «fe»; alternativamente, «confianza».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron los anclajes de las notas para que correspondan a los elementos pertinentes del texto: la variante textual se ubicó en la cláusula final y la nota léxica de πίστις en «fe». También se reemplazó «la palabra oída» por «el mensaje que oyeron» para reflejar mejor la decisión auditada del POB inglés y lograr un español más natural. Se mantuvo la lectura principal del SBLGNT tal como la presenta el expediente.'
