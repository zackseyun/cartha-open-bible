review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: «el que ha entrado» refleja ὁ ... εἰσελθών; «descanso» / «ha descansado» preservan la familia léxica κατάπαυσις / κατέπαυσεν; «de sus obras» y la comparación con Dios también están bien representadas. La nota sobre «su descanso» conserva correctamente la referencia contextual probable al descanso de Dios sin resolverla en el texto principal.'
  spanish_quality_summary: 'El español es claro y natural en general, pero la nota b necesita reparación: «dejó de trabajar» cambia el referente de ἔργα a una acción verbal más estrecha, y «cesó de sus obras» suena poco idiomático. Conviene alinear mejor la alternativa con el inglés auditado y con el valor léxico griego.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para θεός. La elección «descanso» es defendible y coherente con la decisión auditada de mantener visible el lenguaje de descanso.
  issues:
  - severity: medium
    issue: La nota b introduce alternativas españolas inexactas o poco naturales.
    rationale: El inglés auditado ofrece «ceased from his works» como alternativa léxica, no «dejó de trabajar». Esa formulación estrecha ἔργα a trabajo laboral. Además, «cesó de sus obras» no es español natural; «cesó de sus obras» resulta torpe, y en español sería mejor «cesó de hacer sus obras» o, más literalmente pero natural, «dejó sus obras». La nota debe explicar la alternativa sin deteriorar fidelidad ni legibilidad.
  revised_spanish_text: Porque el que ha entrado en su descanso[a] también ha descansado de sus obras[b], así como Dios de las suyas.
  revised_footnotes:
  - marker: a
    text: O «el que ha entrado en el descanso de Dios». El pronombre «su» probablemente se refiere a Dios en el contexto de Hebreos 3–4.
    reason: alternative_reading
  - marker: b
    text: O «ha cesado de sus obras». El verbo griego es afín a «descanso» en este pasaje, por lo que la traducción conserva el lenguaje repetido del descanso.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal, que es fiel y natural. Solo se corrige la nota b para ajustarla mejor al audit trail inglés y evitar una alternativa española menos fiel o menos idiomática.
