translation:
  language: es
  text: Porque el que ha entrado en su descanso[a] también ha descansado de sus obras[b], así como Dios de las suyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que ha entrado en el descanso de Dios». El pronombre «su» probablemente se refiere a Dios en el contexto de Hebreos 3–4.
    reason: alternative_reading
  - marker: b
    text: O «dejó de trabajar» / «cesó de sus obras». El verbo griego es afín a «descanso» en este pasaje, por lo que la traducción conserva el lenguaje repetido del descanso.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento de lo dicho antes; «Porque» comunica bien esa relación causal-explicativa en español sin sonar forzado.
- source_word: ὁ ... εἰσελθὼν
  english_pob_choice: the one who has entered
  chosen_spanish: el que ha entrado
  alternatives_spanish:
  - quien ha entrado
  - el que entra
  lexicon: BDAG
  rationale: El participio aoristo con artículo funciona de manera sustantivada. «El que ha entrado» conserva el valor de acción completada y el sujeto genérico singular.
- source_word: κατάπαυσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - descanso/cesación
  lexicon: BDAG
  rationale: En Hebreos 3–4 el término es teológico y temático. «Descanso» mantiene la conexión con el lenguaje repetido de reposo/descanso en el contexto y suena natural en español; «reposo» sería posible, pero «descanso» resulta más transparente para lectores amplios.
- source_word: αὐτοῦ (after κατάπαυσιν)
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de Dios
  - su de él
  lexicon: BDAG
  rationale: El pronombre es ambiguo en aislamiento, pero la redacción conserva esa ambigüedad contextual. «Su descanso» deja abierta la referencia que el contexto de Hebreos 3–4 sugiere como el descanso de Dios.
- source_word: καὶ αὐτὸς
  english_pob_choice: has himself also
  chosen_spanish: también ha
  alternatives_spanish:
  - él también ha
  - también él ha
  lexicon: BDAG
  rationale: En español, el énfasis de αὐτός se expresa de forma más natural con el adverbio «también» y el contexto, sin recargar la frase. La versión mantiene la comparación implícita sin sonar artificial.
- source_word: κατέπαυσεν
  english_pob_choice: rested
  chosen_spanish: ha descansado
  alternatives_spanish:
  - ha reposado
  - ha cesado
  lexicon: BDAG
  rationale: El verbo emparentado con κατάπαυσις pide conservar la familia léxica del descanso. «Ha descansado» mantiene el juego verbal mejor que «ha cesado», aunque este último es posible desde ἀπό.
- source_word: ἀπὸ τῶν ἔργων αὐτοῦ
  english_pob_choice: from his works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus trabajos
  - de sus acciones
  lexicon: BDAG
  rationale: ἔργα se traduce directamente como «obras». «De sus obras» preserva la correspondencia con el texto griego y evita restringir indebidamente el sentido a labores meramente físicas o a méritos.
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: BDAG
  rationale: ὥσπερ marca una comparación clara. «Así como» es natural en español y refleja bien el paralelismo con la acción de Dios.
- source_word: τῶν ἰδίων
  english_pob_choice: his own
  chosen_spanish: las suyas
  alternatives_spanish:
  - sus propias obras
  - lo suyo
  lexicon: BDAG
  rationale: El griego deja el sustantivo implícito. En español, «las suyas» conserva la elipsis y la referencia al antecedente implícito de las obras de Dios, sin sobreexplicar en el texto principal.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: Traducción estándar de θεός. Se mantiene el sujeto explícito al final del paralelismo, como en el griego.
theological_decisions:
- issue: Referent of 'his rest' (αὐτοῦ)
  english_pob_reading: '''his rest'' refers to God''s rest, into which the believer enters.'
  chosen_spanish_reading: «su descanso» se deja contextual y normalmente se entiende como el descanso de Dios al que entra el creyente.
  alternative_spanish_readings:
  - «el descanso de Dios»
  - «su propio descanso»
  rationale: En Hebreos 3–4, el contexto favorece leer el descanso como el de Dios, sin eliminar la ambigüedad gramatical del pronombre en la frase principal. La traducción conserva esa tensión al no sustituir «su» por una explicitación interpretativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Lexical force of rest-language (κατάπαυσις / κατέπαυσεν)
  english_pob_reading: keep repeated rest-language visible; 'rested' rather than 'ceased'
  chosen_spanish_reading: «descanso» / «ha descansado» conservan la repetición léxica del pasaje.
  alternative_spanish_readings:
  - «reposo» / «ha reposado»
  - «cesación» / «ha cesado»
  rationale: El juego verbal entre el sustantivo y el verbo es importante en Hebreos 4:10. Mantener una misma familia de descanso en español preserva el vínculo temático y el eco intertextual con Génesis 2.
  doctrine_reference: Translation philosophy §2 (lexical transparency and intertextual coherence)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios tras la comprobación cruzada; la redacción mantiene la ambigüedad del pronombre y la repetición léxica de descanso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando aparezca el nombre divino; aquí el texto solo contiene θεός, por lo que corresponde «Dios».
  - Se mantiene una traducción directa y transparente de κατάπαυσις / κατέπαυσεν con «descanso» / «ha descansado» para preservar el juego léxico del pasaje.
  - Se evita introducir «Cristo» o terminología eclesial ajena al texto, ya que este versículo no la requiere.
  - La puntuación refleja el paralelismo del griego y la comparación final con Dios de forma natural en español.
