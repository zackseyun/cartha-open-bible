translation:
  language: es
  text: Porque la palabra de Dios es viva y eficaz, y más cortante que cualquier espada de dos filos; penetra[a] hasta la división del alma y del espíritu[b], de las coyunturas y de los tuétanos, y es capaz de juzgar[c] los pensamientos y las intenciones del corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «penetrante»; el participio griego expresa la capacidad de pasar a través o de alcanzar profundamente.
    reason: lexical_alternative
  - marker: b
    text: La frase «alma y espíritu» no debe tomarse aquí como si exigiera una doctrina particular sobre la composición del ser humano; el énfasis recae en el alcance penetrante de la palabra de Dios hasta lo más íntimo.
    reason: alternative_reading
  - marker: c
    text: O «discerniendo los pensamientos y las intenciones del corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ζῶν
  english_pob_choice: living
  chosen_spanish: viva
  alternatives_spanish:
  - viviente
  - viva y activa
  lexicon: BDAG
  rationale: El participio/adjetivo verbal describe a la palabra como dotada de vida continua. En español, «viva» comunica mejor esa cualidad dinámica que una calca como «viviente», y conserva la fuerza de la imagen sin sobrecargarla.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de la exhortación previa. «Porque» mantiene claramente la relación explicativa causal del griego sin forzarla a un mero conector estilístico.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la Palabra de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: '«Palabra» es el equivalente natural y transparente de λόγος en este contexto, y preserva la amplitud semántica: dicho divino, mensaje o comunicación de Dios, sin reducirlo a una referencia específica no exigida por el texto.'
- source_word: ἐνεργὴς
  english_pob_choice: active
  chosen_spanish: eficaz
  alternatives_spanish:
  - activa
  - poderosa
  - obrante
  lexicon: BDAG
  rationale: En español, «eficaz» expresa bien la idea de una palabra que realmente produce efecto. Aunque «activa» es posible, puede sonar menos precisa o más redundante junto con «viva»; «eficaz» mantiene la tensión semántica de eficacia operativa sin añadir fuerza no explícita.
- source_word: τομώτερος ὑπὲρ πᾶσαν μάχαιραν δίστομον
  english_pob_choice: sharper than any double-edged sword
  chosen_spanish: más cortante que cualquier espada de dos filos
  alternatives_spanish:
  - más afilada que cualquier espada de dos filos
  - más cortante que toda espada de dos filos
  - más cortante que cualquier espada de doble filo
  lexicon: BDAG
  rationale: 'La comparación con μάχαιρα δίστομος se traduce con una imagen natural en español: «espada de dos filos». «Más cortante» conserva el comparativo y la cualidad de penetración mejor que «más afilada», que suena más estática.'
- source_word: διϊκνούμενος
  english_pob_choice: piercing
  chosen_spanish: penetra
  alternatives_spanish:
  - atraviesa
  - perfora
  - llega hasta
  lexicon: BDAG
  rationale: El participio expresa movimiento que alcanza profundamente. «Penetra» recoge esa idea de pasar a través y llegar al interior, y además permite mantener la fluidez del período en español.
- source_word: ἄχρι μερισμοῦ
  english_pob_choice: to the division
  chosen_spanish: hasta la división
  alternatives_spanish:
  - hasta separar
  - hasta el punto de dividir
  - hasta la partición
  lexicon: BDAG
  rationale: «Ἄχρι» indica alcance/extensión. «Hasta la división» preserva la metáfora y evita convertir la frase en una explicación más interpretativa que el griego.
- source_word: ψυχῆς καὶ πνεύματος
  english_pob_choice: of soul and spirit
  chosen_spanish: del alma y del espíritu
  alternatives_spanish:
  - de la vida y del espíritu
  - del alma y del aliento
  lexicon: BDAG
  rationale: La pareja se mantiene de forma tradicional y transparente. «Alma» y «espíritu» conservan la tensión antropológica sin imponer una doctrina técnica sobre la composición humana.
- source_word: ἁρμῶν τε καὶ μυελῶν
  english_pob_choice: of joints and marrow
  chosen_spanish: de las coyunturas y de los tuétanos
  alternatives_spanish:
  - de las articulaciones y de la médula
  - de los huesos y de la médula
  lexicon: BDAG
  rationale: «Coyunturas» y «tuétanos» son términos idiomáticos en español bíblico para reproducir la imagen corporal de profundísima penetración. «Tuétanos» mantiene mejor el paralelismo corporal que «médula», que puede sonar más técnico.
- source_word: κριτικὸς
  english_pob_choice: able to judge
  chosen_spanish: discierne
  alternatives_spanish:
  - juzga
  - es capaz de juzgar
  - evalúa
  lexicon: BDAG
  rationale: 'Aunque el inglés POB explicita la capacidad de juzgar, en español el predicado se expresa con naturalidad mediante un verbo: «discierne». Este verbo conserva tanto la idea de evaluar/juzgar como la de penetrar y distinguir lo oculto, sin sonar excesivamente judicial.'
- source_word: ἐνθυμήσεων
  english_pob_choice: thoughts
  chosen_spanish: los pensamientos
  alternatives_spanish:
  - las reflexiones
  - las deliberaciones
  lexicon: BDAG
  rationale: El término apunta a pensamientos o razonamientos internos. «Pensamientos» es la opción más directa y amplia, y se alinea bien con el paralelo siguiente.
- source_word: ἐννοιῶν
  english_pob_choice: intentions
  chosen_spanish: las intenciones
  alternatives_spanish:
  - los propósitos
  - las inclinaciones
  - los designios
  lexicon: BDAG
  rationale: Para distinguir este término del anterior, «intenciones» comunica la orientación o propósito interno de manera clara en español. Preserva la diferencia entre el contenido mental y la dirección de la voluntad.
- source_word: καρδίας
  english_pob_choice: of the heart
  chosen_spanish: del corazón
  alternatives_spanish:
  - del interior
  - de lo más íntimo
  lexicon: BDAG
  rationale: Se conserva «corazón» como centro bíblico de la vida interior, en lugar de sustituirlo por una paráfrasis abstracta. Así se mantiene la imaginería antropológica del texto.
theological_decisions:
- issue: Alcance de «la palabra de Dios»
  english_pob_reading: Rendered generically as 'the word of God' without specifying Scripture, preached message, divine utterance, or the personal Word.
  chosen_spanish_reading: Se traduce de forma amplia como «la palabra de Dios», sin especificar si se trata de Escritura, proclamación, promesa o del Logos personal.
  alternative_spanish_readings:
  - la Escritura de Dios
  - el mensaje de Dios
  - el Verbo de Dios
  rationale: El contexto de Hebreos enfatiza la eficacia del hablar de Dios, pero el griego no obliga a cerrar el referente. La traducción conserva esa amplitud y evita resolver dogmáticamente una tensión que el texto deja abierta.
  doctrine_reference: Preservar la amplitud referencial sin sobreinterpretación doctrinal.
- issue: Implicación antropológica de «alma y espíritu»
  english_pob_reading: Kept as 'soul and spirit' without implying a fixed dichotomous or trichotomous anthropology.
  chosen_spanish_reading: Se mantiene «alma y espíritu» sin convertir la frase en una afirmación técnica sobre la constitución humana.
  alternative_spanish_readings:
  - vida y espíritu
  - alma y aliento
  - facultades interiores
  rationale: La frase funciona dentro de una metáfora de penetración y discernimiento. Traducirla literalmente preserva el texto y evita imponer una antropología doctrinal que el pasaje no formula de manera explícita.
  doctrine_reference: No introducir una doctrina de la constitución humana que exceda el texto.
translation_notes:
  revision_awareness: El auditable en inglés muestra acuerdo alto y sin revisiones aplicadas en el último pase; por eso la versión española sigue de cerca la decisión léxica estable y solo ajusta al español natural donde la sintaxis lo requiere.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino en otros contextos; aquí el pasaje usa θεοῦ, por lo que corresponde «Dios».
  - Se preserva «espada de dos filos» como equivalente bíblico natural de δίστομος.
  - Se usa «alma» y «espíritu» de manera literal y no doctrinalmente cerrada.
  - Se evita «señor» o «Verbo» porque el griego aquí no lo exige y el audit trail inglés tampoco los especifica.
  - La nota [a] se ancla en «viva» para reflejar la alternativa «penetrante» documentada en el audit trail inglés.
  - La nota [c] se ancla en «discierne» porque el griego κριτικός admite la lectura de juzgar/discernir y el inglés documenta esa alternativa.
