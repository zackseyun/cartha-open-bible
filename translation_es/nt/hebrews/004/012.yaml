  text: Ζῶν γὰρ ὁ λόγος τοῦ θεοῦ καὶ ἐνεργὴς καὶ τομώτερος ὑπὲρ πᾶσαν μάχαιραν δίστομον καὶ διϊκνούμενος ἄχρι μερισμοῦ ψυχῆς ⸀καὶ πνεύματος, ἁρμῶν τε καὶ μυελῶν, καὶ κριτικὸς ἐνθυμήσεων καὶ ἐννοιῶν καρδίας·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/004/012.yaml
  text: For the word of God is living and active[a], and sharper than any double-edged sword, piercing to the division of soul and spirit, of joints and marrow[c][b], and able to judge the thoughts and intentions of the heart.
