translation:
  language: es
  text: Porque no tenemos un sumo sacerdote que no pueda compadecerse de nuestras debilidades, sino uno que ha sido probado[a] en todo, de la misma manera que nosotros[b], pero sin pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha sido tentado en todo».'
    reason: alternative_reading
  - marker: b
    text: 'Lit., «según semejanza»; muchas traducciones expresan la comparación de forma explícita: «de la misma manera que nosotros» o «como nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - alto sacerdote
  lexicon: BDAG
  rationale: En español, «sumo sacerdote» es la designación cultual y teológica natural para ἀρχιερεύς, especialmente en Hebreos. «Alto sacerdote» sería poco idiomático; «gran sacerdote» no es terminología estable.
- source_word: μὴ δυνάμενον συμπαθῆσαι
  english_pob_choice: unable to sympathize
  chosen_spanish: que no pueda compadecerse
  alternatives_spanish:
  - que no pueda simpatizar con
  - que no pueda sentir con
  lexicon: BDAG
  rationale: '«Compadecerse» comunica la participación empática en el sufrimiento ajeno sin volver la frase mecánica. Conserva la litotes griega: no tenemos un sumo sacerdote «que no pueda» hacerlo, es decir, sí puede.'
- source_word: ταῖς ἀσθενείαις ἡμῶν
  english_pob_choice: with our weaknesses
  chosen_spanish: de nuestras debilidades
  alternatives_spanish:
  - de nuestras flaquezas
  - de nuestras enfermedades
  lexicon: BDAG
  rationale: «Debilidades» expresa el sentido amplio de ἀσθένεια como fragilidad humana, no solo enfermedad física. En español suena natural y mantiene el alcance de la tentación/prueba del contexto.
- source_word: πεπειρασμένον
  english_pob_choice: has been tested
  chosen_spanish: ha sido probado
  alternatives_spanish:
  - ha sido tentado
  - ha sido puesto a prueba
  lexicon: BDAG
  rationale: «Probado» conserva el sentido de πειράζω como prueba real y evita implicar inclinación pecaminosa. En español también permite la tensión con la lectura alternativa «tentado», que se mantiene en la nota.
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo aspecto
  - en todos los sentidos
  lexicon: BDAG
  rationale: «En todo» es breve y natural en español, y en este contexto expresa la totalidad de la experiencia de prueba. Aunque algo más conciso que el inglés, no reduce el alcance.
- source_word: καθ’ ὁμοιότητα
  english_pob_choice: as we are
  chosen_spanish: de la misma manera que nosotros
  alternatives_spanish:
  - como nosotros
  - según semejanza
  lexicon: BDAG
  rationale: La frase griega es sintácticamente compacta y el inglés POB la aclaró como «as we are». En español, «de la misma manera que nosotros» comunica esa comparación explícita sin perder la base de ὁμοιότης. La alternativa más literal «como nosotros» es viable, pero menos precisa aquí.
- source_word: χωρὶς ἁμαρτίας
  english_pob_choice: yet without sin
  chosen_spanish: pero sin pecado
  alternatives_spanish:
  - y sin pecado
  - aparte de pecado
  lexicon: BDAG
  rationale: «Pero sin pecado» conserva el contraste y la excepción decisiva del texto. «Sin pecado» es la formulación idiomática más clara en español y mantiene la afirmación cristológica.
theological_decisions:
- issue: Relación entre la prueba de Cristo y su impecabilidad
  english_pob_reading: has been tested; yet without sin
  chosen_spanish_reading: ha sido probado en todo ... pero sin pecado
  alternative_spanish_readings:
  - ha sido tentado en todo ... pero sin pecado
  rationale: 'Se preserva la tensión teológica: Cristo atravesó una prueba real y completa, pero no pecó. «Probado» evita sugerir culpa o deseo malo, mientras que la alternativa «tentado» queda disponible como lectura legítima del verbo πειράζω.'
  doctrine_reference: Hebreos 4:15; afirmaciones cristológicas de Nicea y Calcedonia; principio POB de conservar tensiones teológicas sin resolverlas prematuramente.
- issue: Cómo explicitar la comparación de καθ’ ὁμοιότητα
  english_pob_reading: as we are
  chosen_spanish_reading: de la misma manera que nosotros
  alternative_spanish_readings:
  - como nosotros
  - en semejanza
  rationale: La forma griega no dice de modo tosco «como nosotros», pero sí establece una similitud real. El español elegido explicita la relación sin introducir contenido ajeno al texto, en línea con la revisión inglesa más reciente.
  doctrine_reference: Prioridad del original y equivalencia óptima; revisión auditada que favorece una comparación explícita y natural.
translation_notes:
  revision_awareness: El inglés auditado pasó de una expresión más literal («according to likeness») a una comparación explícita («as we are»). En español se siguió esa revisión, optando por una formulación natural que conserva el valor de ὁμοιότης y manteniendo la tensión entre «probado» y la alternativa tradicional «tentado».
  spanish_consistency_notes:
  - Se mantuvo «sumo sacerdote» como término cultual estable para ἀρχιερεύς.
  - Se eligió «compadecerse» para συμπαθῆσαι por su cercanía semántica y su naturalidad en español eclesial.
  - «Probado» traduce πεπειρασμένον para resguardar la santidad de Cristo; la alternativa «tentado» se documenta en nota.
  - La comparación de καθ’ ὁμοιότητα se hizo explícita en español, coherente con la revisión inglesa más reciente.
  - Se preservó «sin pecado» como fórmula breve y doctrinalmente clara para χωρὶς ἁμαρτίας.
