- from: 'Pues ha hablado en algún lugar acerca del séptimo día de esta manera: «Y Dios descansó el séptimo día de todas sus obras».[a][b]'
  to: 'Pues ha hablado en algún lugar acerca del séptimo día de esta manera: «Y Dios descansó en el séptimo día de todas sus obras».[a][b]'
  rationale: Se propone una reparación menor para representar explícitamente ἐν en la frase temporal y acercarse más a la forma del original y de la auditoría inglesa, sin alterar el sentido general ni las notas ya bien justificadas.
