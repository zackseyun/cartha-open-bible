base_translation:
  language: en
  yaml_path: translation/nt/hebrews/004/004.yaml
  text: 'For he has spoken somewhere about the seventh day in this way: “And God rested on the seventh day from all his works,”[a][b]'
  footnotes:
  - marker: a
    text: Or “in a certain place.” The Greek says “somewhere,” reflecting a non-specific introduction to the Scripture citation rather than uncertainty about its authority.
    reason: lexical_alternative
  - marker: b
    text: Or “ceased.” The verb can emphasize stopping from work; here “rested” is used to preserve the connection with Genesis 2:2 and the argument about God’s rest in Hebrews 3–4.
    reason: lexical_alternative
