translation:
  language: es
  text: 'Pues ha hablado en algún lugar acerca del séptimo día de esta manera: «Y Dios descansó en el séptimo día de todas sus obras».[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cierto lugar». El griego dice «en algún lugar», reflejando una introducción no específica de la cita bíblica, no una duda sobre su autoridad.
    reason: lexical_alternative
  - marker: b
    text: O «cesó». El verbo puede enfatizar el dejar de trabajar; aquí se usa «descansó» para preservar la conexión con Génesis 2:2 y con el argumento sobre el reposo de Dios en Hebreos 3–4.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴρηκεν
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - dijo
  lexicon: BDAG
  rationale: El perfecto griego mantiene una referencia pasada con relevancia presente. En español, «ha hablado» conserva mejor esa fuerza que un pretérito simple.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - En efecto
  lexicon: BDAG
  rationale: Introduce una explicación o apoyo al argumento anterior. «Pues» es natural en español bíblico contemporáneo y mantiene el valor explicativo.
- source_word: που
  english_pob_choice: somewhere
  chosen_spanish: en algún lugar
  alternatives_spanish:
  - en cierto lugar
  - alguna parte
  lexicon: BDAG
  rationale: La partícula indica una cita sin localización precisa. «En algún lugar» conserva la indefinición sin sugerir ignorancia de la autoridad del texto.
- source_word: περὶ τῆς ἑβδόμης
  english_pob_choice: about the seventh day
  chosen_spanish: acerca del séptimo día
  alternatives_spanish:
  - sobre el séptimo día
  - concerniente al séptimo día
  lexicon: BDAG
  rationale: La construcción griega es elíptica y en contexto equivale a «día». «Acerca del séptimo día» reproduce bien la referencia temática sin sobreexplicar.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: Presenta la formulación de la cita. «De esta manera» preserva la fuerza demostrativa con un español fluido.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: Forma parte de la cita de Génesis y debe mantenerse como conector simple dentro de la comilla.
- source_word: κατέπαυσεν
  english_pob_choice: rested
  chosen_spanish: descansó
  alternatives_spanish:
  - cesó
  - reposó
  lexicon: BDAG
  rationale: En el contexto de Génesis 2:2 y Hebreos 3–4, «descansó» preserva la conexión canónica con el relato de la creación y con la idea de reposo divina. «Cesó» refleja el matiz de detenerse, pero suena menos natural en esta cita.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Nombre común teológico directo; el artículo no se traduce en español porque no aporta naturalidad aquí.
- source_word: ἐν τῇ ἡμέρᾳ τῇ ἑβδόμῃ
  english_pob_choice: on the seventh day
  chosen_spanish: el séptimo día
  alternatives_spanish:
  - en el séptimo día
  - en el día séptimo
  lexicon: BDAG
  rationale: En español la preposición con días puede omitirse dentro de la cita sin perder claridad, y «el séptimo día» expresa de forma natural la referencia temporal de Génesis.
- source_word: ἀπὸ πάντων τῶν ἔργων αὐτοῦ
  english_pob_choice: from all his works
  chosen_spanish: de todas sus obras
  alternatives_spanish:
  - de todas sus labores
  - de todas sus acciones
  lexicon: BDAG
  rationale: El plural ἔργων se vierte como «obras» para conservar el número y el campo semántico de acciones hechas. «De» transmite de manera idiomática la separación/cesación implícita en ἀπό.
theological_decisions:
- issue: Cómo traducir la cesación/reposo de Dios en la cita de Génesis dentro del argumento de Hebreos
  english_pob_reading: rested
  chosen_spanish_reading: descansó
  alternative_spanish_readings:
  - cesó
  - reposó
  rationale: «Descansó» mantiene la relación intertextual con Génesis 2:2 y con la temática del reposo en Hebreos 3–4. No sugiere fatiga divina, pero sí la conclusión de la obra creativa. «Cesó» es posible lexicalmente, aunque menos transparente para lectores de español.
  doctrine_reference: Génesis 2:2; Hebreos 3:11–4:11
- issue: Referencia no específica de la cita bíblica
  english_pob_reading: somewhere
  chosen_spanish_reading: en algún lugar
  alternative_spanish_readings:
  - en cierto lugar
  - alguna parte
  rationale: La forma griega introduce la cita sin precisar su ubicación. En español, «en algún lugar» conserva la no especificidad sin insinuar duda acerca de la Escritura citada.
  doctrine_reference: Hermenéutica de Hebreos 4:4 y uso retórico de citas implícitas
- issue: Tratamiento del día séptimo como cita de Génesis
  english_pob_reading: the seventh day
  chosen_spanish_reading: el séptimo día
  alternative_spanish_readings:
  - el día séptimo
  - en el séptimo día
  rationale: La forma elegida es la más natural y clara en español, y mantiene la conexión litúrgico-creacional del pasaje sin alterar el argumento.
  doctrine_reference: Génesis 2:2; Éxodo 20:11
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés con acuerdo alto y sin revisiones aplicadas en el último pase. La versión española conserva las dos tensiones léxicas documentadas: la no especificidad de που y el matiz de κατέπαυσεν entre cesar y descansar.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «descansó» para la cita de Génesis, por coherencia con Hebreos 3–4.
  - La indefinición de που se preservó con una nota, sin convertirla en precisión artificial.
  - La puntuación de la cita sigue el uso español con comillas angulares y nota al pie al final de la cita.
