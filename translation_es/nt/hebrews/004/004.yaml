  - marker: a
    text: O «en cierto lugar». El griego dice «en algún lugar», reflejando una introducción no específica de la cita bíblica, no una duda sobre su autoridad.
    reason: lexical_alternative
  - marker: b
    text: O «cesó». El verbo puede enfatizar el dejar de trabajar; aquí se usa «descansó» para preservar la conexión con Génesis 2:2 y con el argumento sobre el reposo de Dios en Hebreos 3–4.
    reason: lexical_alternative
  revision_rationale: Se propone una reparación menor para representar explícitamente ἐν en la frase temporal y acercarse más a la forma del original y de la auditoría inglesa, sin alterar el sentido general ni las notas ya bien justificadas.
