translation:
  language: es
  text: 'Una vez más designa cierto día[a], «Hoy», diciendo por medio de David, después de tanto tiempo, como ya se había dicho antes: «Hoy, si oyen su voz, no endurezcan sus corazones.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en David», es decir, en el salmo davídico.
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Una vez más
  alternatives_spanish:
  - Otra vez
  - De nuevo
  lexicon: BDAG
  rationale: Expresa la repetición o reanudación del argumento con naturalidad en español, sin perder el valor discursivo de la partícula.
- source_word: τινὰ ἡμέραν
  english_pob_choice: a certain day
  chosen_spanish: un día determinado
  alternatives_spanish:
  - un cierto día
  - un día particular
  lexicon: BDAG
  rationale: Conserva la idea de un día específico pero no nombrado; 'determinado' mantiene el matiz de fijación sin sonar artificial.
- source_word: ὁρίζει
  english_pob_choice: appoints
  chosen_spanish: establece
  alternatives_spanish:
  - designa
  - señala
  - fija
  lexicon: BDAG
  rationale: En este contexto Dios fija o designa un día para la respuesta; 'establece' suena natural en español y conserva la fuerza autoritativa.
- source_word: Σήμερον
  english_pob_choice: Today
  chosen_spanish: “Hoy”
  alternatives_spanish:
  - “Hoy”
  lexicon: BDAG
  rationale: Se mantiene como la designación citada del salmo, con mayúscula y entre comillas para reflejar su fuerza retórica.
- source_word: ἐν Δαυὶδ λέγων
  english_pob_choice: saying through David
  chosen_spanish: diciendo por medio de David
  alternatives_spanish:
  - hablando por David
  - diciendo en David
  lexicon: BDAG
  rationale: '''Por medio de David'' expresa bien la mediación del habla divina a través del salmo davídico, sin cargar el texto con una explicación mayor que la que permite la frase.'
- source_word: μετὰ τοσοῦτον χρόνον
  english_pob_choice: after so long a time
  chosen_spanish: después de tanto tiempo
  alternatives_spanish:
  - después de un tiempo tan largo
  - tras tanto tiempo
  lexicon: BDAG
  rationale: Reproduce el énfasis temporal del original de manera fluida y idiomática.
- source_word: καθὼς προείρηται
  english_pob_choice: just as has been said before
  chosen_spanish: como ya se había dicho antes
  alternatives_spanish:
  - tal como se había dicho antes
  - como antes se había dicho
  lexicon: BDAG
  rationale: Mantiene la referencia a una declaración previa con vigencia presente, sin volverla más específica de lo que el griego exige.
- source_word: ἐὰν τῆς φωνῆς αὐτοῦ ἀκούσητε
  english_pob_choice: if you hear his voice
  chosen_spanish: si oyen su voz
  alternatives_spanish:
  - si escuchan su voz
  - si llegan a oír su voz
  lexicon: BDAG
  rationale: '''Oír'' conserva el eco bíblico del llamado receptivo; en este contexto no hace falta convertirlo en ''obedecer''.'
- source_word: μὴ σκληρύνητε
  english_pob_choice: do not harden
  chosen_spanish: no endurezcan
  alternatives_spanish:
  - no hagan duro
  - no se endurezcan
  lexicon: BDAG
  rationale: Expresión directa del mandato negativo con un verbo natural en español que preserva la imagen moral y volitiva.
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus corazones
  lexicon: BDAG
  rationale: Mantiene la antropología bíblica del 'corazón' como centro interior; el posesivo plural de segunda persona se adapta al español corriente en forma de tratamiento plural.
theological_decisions:
- issue: Sentido de 'Hoy' como oportunidad presente
  english_pob_reading: Render 'Today' as the divinely appointed present opportunity for response, without narrowing it to a mere calendar date.
  chosen_spanish_reading: '''Hoy'' se conserva como el tiempo presente señalado por Dios para responder, sin reducirlo a una simple fecha histórica.'
  alternative_spanish_readings:
  - '''Hoy'' como solo el día histórico del salmista'
  - '''Hoy'' como un día exclusivamente escatológico'
  rationale: El argumento de Hebreos extiende la vigencia del llamado del salmo al presente; la traducción mantiene esa tensión sin resolverla de forma sistemática.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de ἐν Δαυὶδ
  english_pob_reading: Translate as 'through David'
  chosen_spanish_reading: '''por medio de David'''
  alternative_spanish_readings:
  - '''en David'''
  - '''en el salmo de David'''
  - '''a través de David'''
  rationale: La frase apunta a la mediación del habla en el salmo davídico. 'Por medio de David' evita una traducción demasiado literal que en español sería oscura, sin afirmar más de lo que el texto indica.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el control cruzado mostró alto acuerdo, así que este borrador conserva la decisión central del texto fuente y solo la expresa en español con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene 'Hoy' con comillas porque funciona como cita programática del salmo y coincide con la fuerza retórica del original.
  - Se evitó 'SEÑOR' para no enmascarar el referente del texto citado; aquí el versículo alude al habla divina mediante David, no a una convención de sustitución textual.
  - '''Corazones'' se conserva sin paráfrasis para respetar la antropología bíblica del pasaje.'
