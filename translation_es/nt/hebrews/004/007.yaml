revisions:
- from: 'Una vez más establece un día determinado[a], “Hoy”, diciendo por medio de David, después de tanto tiempo, como ya se había dicho antes: “Hoy, si oyen su voz, no endurezcan sus corazones.”'
  to: 'Una vez más designa cierto día[a], «Hoy», diciendo por medio de David, después de tanto tiempo, como ya se había dicho antes: «Hoy, si oyen su voz, no endurezcan sus corazones.»'
  rationale: 'Se revisa la frase inicial para reflejar con más precisión la combinación de τινὰ ἡμέραν y ὁρίζει: «designa cierto día» conserva tanto la idea de designación autoritativa como la de un día específico pero no identificado. El resto del versículo está fiel al griego, al rastro de auditoría en inglés y a un español natural y eclesialmente legible.'
