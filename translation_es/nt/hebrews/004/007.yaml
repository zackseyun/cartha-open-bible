review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: Dios vuelve a designar un día llamado «Hoy», habla por medio de David después de mucho tiempo y repite la exhortación de no endurecer el corazón. También preserva correctamente la nota alternativa sobre ἐν Δαυὶδ. Sin embargo, hay un ajuste importante de matiz: «un día determinado» inclina ὁρίζει hacia el resultado de fijación y debilita el valor indefinido-específico de τινὰ ἡμέραν («un cierto día» / «cierto día»).'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis fluye bien y la cita está bien puntuadas. No obstante, «establece un día determinado» suena algo redundante y menos idiomático que «designa cierto día» o «fija cierto día». Además, «oyen» en vez de «oyen/oyeren» es plenamente moderno y adecuado; no requiere cambio.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Por medio de David» concuerda con la decisión auditada para ἐν Δαυὶδ λέγων. «Hoy» preserva bien la fuerza teológica. El uso de «sus corazones» para segunda persona plural es aceptable en español neutro eclesial.
  issues:
  - severity: medium
    issue: «un día determinado» para τινὰ ἡμέραν
    rationale: 'El griego combina indefinición con especificidad no identificada. «Determinado» en español suele sonar a ''definido/fijado'', lo cual duplica o desplaza la fuerza de ὁρίζει y atenúa el matiz de «cierto». Conviene separar las funciones: ὁρίζει = «designa»/«fija» y τινὰ ἡμέραν = «cierto día».'
  - severity: low
    issue: Ligera redundancia en «establece un día determinado»
    rationale: La combinación resulta menos elegante y menos precisa que una formulación donde el verbo lleve la idea de designación y el complemento la de especificidad no nombrada.
  revised_spanish_text: 'Una vez más designa cierto día[a], «Hoy», diciendo por medio de David, después de tanto tiempo, como ya se había dicho antes: «Hoy, si oyen su voz, no endurezcan sus corazones.»'
  revised_footnotes:
  - marker: a
    text: O, «en David», es decir, en el salmo davídico.
    reason: alternative_reading
  revision_rationale: 'Se revisa la frase inicial para reflejar con más precisión la combinación de τινὰ ἡμέραν y ὁρίζει: «designa cierto día» conserva tanto la idea de designación autoritativa como la de un día específico pero no identificado. El resto del versículo está fiel al griego, al rastro de auditoría en inglés y a un español natural y eclesialmente legible.'
