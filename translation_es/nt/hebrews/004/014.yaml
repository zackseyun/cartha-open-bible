translation:
  language: es
  text: Por tanto, puesto que tenemos un gran sumo sacerdote que ha atravesado los cielos[a] —Jesús, el Hijo de Dios—, mantengamos firmemente nuestra confesión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que ha pasado por los cielos'. El griego usa el plural 'cielos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες
  english_pob_choice: since we have
  chosen_spanish: teniendo
  alternatives_spanish:
  - puesto que tenemos
  - ya que tenemos
  lexicon: BDAG
  rationale: El participio presenta la base de la exhortación. En español, 'teniendo' conserva la relación causal/inferencial sin forzar una estructura más explicativa de lo que el griego exige.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Expresa bien la inferencia lógica del argumento anterior y suena natural en un registro bíblico moderno.
- source_word: ἀρχιερέα μέγαν
  english_pob_choice: a great high priest
  chosen_spanish: un gran sumo sacerdote
  alternatives_spanish:
  - un sumo sacerdote grande
  - el gran sumo sacerdote
  lexicon: BDAG
  rationale: '''Sumo sacerdote'' es la forma natural y establecida para ἀρχιερεύς. ''Gran'' conserva la fuerza cualitativa de μέγαν sin volverlo innecesariamente solemne.'
- source_word: διεληλυθότα τοὺς οὐρανούς
  english_pob_choice: who has passed through the heavens
  chosen_spanish: que ha atravesado los cielos
  alternatives_spanish:
  - que ha pasado por los cielos
  - que ha pasado a través de los cielos
  lexicon: BDAG
  rationale: '''Atravesado'' refleja el movimiento completo del participio perfecto de διέρχομαι y preserva la imagen espacial. ''Cielos'' mantiene el plural del griego.'
- source_word: τοὺς οὐρανούς
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos celestiales
  - el cielo
  lexicon: BDAG
  rationale: El plural griego se conserva con 'los cielos'. 'Cielo' singular suaviza demasiado la imagen y pierde el matiz plural documentado por el texto.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: τὸν υἱὸν τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios Padre
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico formal. En español, 'Hijo de Dios' es la traducción directa y clara de la confesión del texto.
- source_word: κρατῶμεν
  english_pob_choice: let us hold fast
  chosen_spanish: retengamos
  alternatives_spanish:
  - mantengamos firmemente
  - sostengamos con firmeza
  - aferrémonos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pide un verbo imperativo comunitario en español. 'Retengamos' comunica perseverancia y firmeza sin añadir un matiz demasiado coloquial.
- source_word: τῆς ὁμολογίας
  english_pob_choice: to our confession
  chosen_spanish: nuestra confesión
  alternatives_spanish:
  - la confesión
  - nuestra profesión
  lexicon: BDAG
  rationale: '''Confesión'' reproduce ὁμολογία como el reconocimiento público de la fe. El posesivo ''nuestra'' es una explicitación contextual natural en español, coherente con la exhortación a la comunidad.'
theological_decisions:
- issue: Título cristológico υἱὸς τοῦ θεοῦ
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  rationale: Se mantiene el título completo para preservar la densidad cristológica y confesional del versículo sin reducirlo a una paráfrasis.
  doctrine_reference: Cristología; confesión apostólica
- issue: Pluralidad de οὐρανούς
  english_pob_reading: the heavens
  chosen_spanish_reading: los cielos
  alternative_spanish_readings:
  - el cielo
  rationale: Se preserva el plural del griego para no disolver la imaginería de la elevación de Jesús en una forma singular más general.
  doctrine_reference: Cristología exaltada; imaginería celestial
- issue: Valor exhortativo de κρατῶμεν τῆς ὁμολογίας
  english_pob_reading: let us hold fast to our confession
  chosen_spanish_reading: retengamos nuestra confesión
  alternative_spanish_readings:
  - mantengamos firmemente nuestra confesión
  - aferrémonos a nuestra confesión
  rationale: La exhortación comunitaria se expresa con un subjuntivo exhortativo natural en español, manteniendo la idea de perseverar en la confesión de fe.
  doctrine_reference: Perseverancia; confesión de fe
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés existente. La redacción española conserva la inferencia de οὖν, el participio causal de ἔχοντες, el plural de οὐρανούς y el título cristológico completo, sin necesidad de cambios respecto del sentido documentado en el inglés POB.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; no se requiere decisión sobre el nombre divino.'
  - '''Cristo'' no aparece en el texto fuente; se mantiene ''Jesús'' y ''Hijo de Dios'' conforme al griego.'
  - '''Confesión'' se usa para ὁμολογία siguiendo el valor confesional del contexto.'
  - Se preserva el plural 'cielos' para reflejar el griego οὐρανούς.
