review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: inferencia (οὖν), posesión de un gran sumo sacerdote, su paso por los cielos, identificación como Jesús el Hijo de Dios, y exhortación final. Sin embargo, Ἔχοντες en este contexto funciona mejor causalmente que como un simple participio adverbial literal; en español bíblico natural, ''puesto que tenemos'' o ''ya que tenemos'' preserva mejor la relación lógica documentada por el POB que ''teniendo''. Además, κρατῶμεν τῆς ὁμολογίας se expresa más naturalmente con complemento preposicional en español (''mantengamos firmemente nuestra confesión'' o ''aferrémonos a nuestra confesión'') que con ''retengamos nuestra confesión'', que suena menos idiomático para ὁμολογία.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero 'teniendo' suena algo calcado y deja débil la base causal de la exhortación. 'Retengamos nuestra confesión' es comprensible, pero no es la formulación más natural ni más precisa en español eclesial actual para la idea de perseverar firmemente en la confesión de fe. La puntuación con rayas es adecuada, y 'los cielos' y 'el Hijo de Dios' están bien logrados.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ''Jesús'', ''Dios'', ''el Hijo de Dios'', y preservación del plural ''los cielos''. No hay conflictos con términos sensibles del glosario. La principal mejora es estilístico-semántica: reproducir mejor el valor causal de Ἔχοντες y la fuerza exhortativa de κρατῶμεν.'
  issues:
  - severity: medium
    issue: '''teniendo'' para Ἔχοντες suena demasiado literal'
    rationale: El participio introduce la base de la exhortación; el propio expediente inglés escogió 'since we have'. En español, 'teniendo' es posible pero menos natural y menos claro que 'puesto que tenemos' o 'ya que tenemos'.
  - severity: medium
    issue: '''retengamos nuestra confesión'' es poco idiomático para κρατῶμεν τῆς ὁμολογίας'
    rationale: Aunque comunica cierta idea de mantener, en español suena menos natural que una formulación con firmeza o con 'aferrarnos a'. El contexto de Hebreos pide perseverancia en la confesión de fe, no simplemente 'retener' algo.
  - severity: low
    issue: La nota [a] sobre 'Por tanto' no es necesaria aquí
    rationale: El expediente inglés no exigía nota para 'Therefore'; la alternativa española aporta poco valor exegético y recarga innecesariamente el versículo.
  revised_spanish_text: Por tanto, puesto que tenemos un gran sumo sacerdote que ha atravesado los cielos[a] —Jesús, el Hijo de Dios—, mantengamos firmemente nuestra confesión.
  revised_footnotes:
  - marker: a
    text: O 'que ha pasado por los cielos'. El griego usa el plural 'cielos'.
    reason: lexical_alternative
  revision_rationale: Se ajusta Ἔχοντες a una expresión causal más natural en español ('puesto que tenemos'), en línea con la función argumentativa del participio. Se reemplaza 'retengamos nuestra confesión' por 'mantengamos firmemente nuestra confesión' para reflejar mejor el sentido exhortativo de κρατῶμεν y producir un español eclesial más idiomático. Se elimina la nota sobre 'Por tanto' por ser innecesaria, y se conserva la nota útil sobre el plural 'cielos'.
