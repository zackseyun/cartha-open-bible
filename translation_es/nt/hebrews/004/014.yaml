revisions:
- from: Por tanto[a], teniendo un gran sumo sacerdote que ha atravesado los cielos[b] —Jesús, el Hijo de Dios—, retengamos nuestra confesión.
  to: Por tanto, puesto que tenemos un gran sumo sacerdote que ha atravesado los cielos[a] —Jesús, el Hijo de Dios—, mantengamos firmemente nuestra confesión.
  rationale: Se ajusta Ἔχοντες a una expresión causal más natural en español ('puesto que tenemos'), en línea con la función argumentativa del participio. Se reemplaza 'retengamos nuestra confesión' por 'mantengamos firmemente nuestra confesión' para reflejar mejor el sentido exhortativo de κρατῶμεν y producir un español eclesial más idiomático. Se elimina la nota sobre 'Por tanto' por ser innecesaria, y se conserva la nota útil sobre el plural 'cielos'.
