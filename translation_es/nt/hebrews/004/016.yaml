translation:
  language: es
  text: Por tanto, acerquémonos al trono de la gracia con confianza[a], para que recibamos misericordia y hallemos gracia[b] para ayuda oportuna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con valentía». El término griego puede comunicar tanto confianza como valentía en el hablar o el acercarse.
    reason: lexical_alternative
  - marker: b
    text: O «para ayuda en el momento de necesidad». La expresión griega apunta más literalmente a ayuda que llega en el momento adecuado.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσερχώμεθα
  english_pob_choice: let us approach
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - acerquémonos
  - vayamos acercándonos
  - arrimémonos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo del griego pide un imperativo exhortativo inclusivo en español. «Acerquémonos» conserva la invitación colectiva y suena natural y digno; «vayamos acercándonos» es más analítico, pero menos directo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Introduce la conclusión lógica del argumento anterior. «Por tanto» preserva claramente la inferencia y funciona bien en registro bíblico moderno.
- source_word: μετὰ παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con valentía
  alternatives_spanish:
  - con confianza
  - con denuedo
  lexicon: BDAG
  rationale: παρρησία puede expresar confianza, franqueza y audacia. «Con valentía» conserva la fuerza de acceso libre y decidido sin reducirla solo a un estado interior. «Con confianza» es posible, pero atenúa el matiz enérgico del término.
- source_word: τῷ θρόνῳ τῆς χάριτος
  english_pob_choice: the throne of grace
  chosen_spanish: al trono de la gracia
  alternatives_spanish:
  - al trono de gracia
  - al trono gracioso
  lexicon: BDAG
  rationale: La construcción se mantiene como metáfora directa. En español, el artículo explícito en «de la gracia» hace más natural la frase y conserva el valor genitivo sin desdibujar la imagen.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Expresa propósito de manera clara y natural en español, conservando la función final del griego.
- source_word: λάβωμεν ἔλεος
  english_pob_choice: we may receive mercy
  chosen_spanish: recibamos misericordia
  alternatives_spanish:
  - obtengamos misericordia
  - alcancemos misericordia
  lexicon: BDAG
  rationale: λαμβάνω se traduce de manera directa como «recibir». «Misericordia» es la equivalencia estable para ἔλεος y preserva el paralelismo verbal con la siguiente cláusula.
- source_word: χάριν εὕρωμεν
  english_pob_choice: find grace
  chosen_spanish: hallemos gracia
  alternatives_spanish:
  - encontremos gracia
  - obtengamos favor
  lexicon: BDAG
  rationale: 'Se conserva la distinción del griego: la primera cláusula dice «recibir misericordia», y la segunda «hallar gracia». «Gracia» mantiene la resonancia teológica del término; «favor» es posible, pero debilita la consistencia léxica.'
- source_word: εἰς εὔκαιρον βοήθειαν
  english_pob_choice: for timely help
  chosen_spanish: para ayuda oportuna
  alternatives_spanish:
  - para ayuda en el momento justo
  - para ayuda en tiempo de necesidad
  - para socorro oportuno
  lexicon: BDAG
  rationale: εὔκαιρος comunica algo que llega en el momento adecuado. «Ayuda oportuna» reproduce bien esa idea en español sin trasladarla a una interpretación más amplia de necesidad humana.
theological_decisions:
- issue: Acceso confiado al trono divino mediante la obra sacerdotal de Jesús
  english_pob_reading: with boldness
  chosen_spanish_reading: con valentía
  alternative_spanish_readings:
  - con confianza
  - con denuedo
  rationale: La frase subraya acceso libre, no presuntuoso, al trono divino. «Con valentía» conserva el impulso exhortativo y la fuerza retórica de παρρησία sin diluirla en una mera disposición interna.
  doctrine_reference: Hebreos 4:14-16; la confianza para acercarse a Dios en virtud del sumo sacerdocio de Cristo.
- issue: Distinción entre «misericordia» y «gracia»
  english_pob_reading: we may receive mercy and find grace
  chosen_spanish_reading: recibamos misericordia y hallemos gracia
  alternative_spanish_readings:
  - obtengamos misericordia y encontremos favor
  - recibamos misericordia y encontremos favor
  rationale: 'Se conserva la diferenciación intencional del texto: misericordia se recibe; gracia se halla. Mantener «gracia» en ambos lugares preserva la textura teológica de Hebreos y evita neutralizar el segundo término en «favor».'
  doctrine_reference: Hebreos 4:16; consistencia terminológica de χάρις y ἔλεος en contexto de acceso a Dios.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto español. La redacción mantiene la inferencia de οὖν, la exhortación inclusiva de προσερχώμεθα, la metáfora de «trono de la gracia» y la distinción entre «misericordia» y «gracia», con una nota alternativa para παρρησία y otra para εὔκαιρον βοήθειαν.
  spanish_consistency_notes:
  - Se mantuvo «gracia» para χάρις en ambas apariciones para conservar consistencia léxica.
  - Se eligió «misericordia» para ἔλεος y no un equivalente más abstracto.
  - «Acerquémonos» refleja mejor la exhortación inclusiva que un infinitivo o perífrasis menos directa.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, tal como exige la validación.
