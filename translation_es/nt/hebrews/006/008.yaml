translation:
  language: es
  text: Pero si produce espinos y abrojos[a], es inútil[b] y está cerca de ser maldita, y su fin es para ser quemada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cardos» para τριβόλους.
    reason: lexical_alternative
  - marker: b
    text: O «rechazada» para «inútil» (ἀδόκιμος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκφέρουσα
  english_pob_choice: bears
  chosen_spanish: produce
  alternatives_spanish:
  - da fruto
  - lleva
  lexicon: BDAG
  rationale: El participio femenino singular continúa la imagen del terreno implícito desde el versículo anterior. En español, «produce» mantiene bien la imagen agrícola y el valor durativo/resultativo sin forzar una repetición artificial del sustantivo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la tierra útil y fructífera del v. 7. «Pero» transmite de forma natural el matiz adversativo.
- source_word: ἀκάνθας
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - cardos
  - zarzas
  lexicon: BDAG
  rationale: «Espinos» es un equivalente claro y bíblicamente reconocible para el primer elemento de la pareja agrícola.
- source_word: τριβόλους
  english_pob_choice: thistles
  chosen_spanish: abrojos
  alternatives_spanish:
  - cardos
  - zarzas
  lexicon: BDAG
  rationale: «Abrojos» conserva la idea de una maleza espinosa y mantiene la diferencia de término respecto de ἀκάνθας, sin volver la frase redundante en español.
- source_word: ἀδόκιμος
  english_pob_choice: worthless
  chosen_spanish: inútil
  alternatives_spanish:
  - rechazada
  - desaprobada
  - sin valor
  lexicon: BDAG
  rationale: En el marco agrícola inmediato, la idea principal es que la tierra no sirve para el uso esperado. «Inútil» comunica esa falta de provecho con naturalidad en español; «rechazada» queda como alternativa con posible carga más técnica o teológica.
- source_word: κατάρας ἐγγύς
  english_pob_choice: near to being cursed
  chosen_spanish: está cerca de ser maldita
  alternatives_spanish:
  - está próxima a una maldición
  - está cerca de ser maldecida
  lexicon: BDAG
  rationale: La construcción con ἐγγύς y genitivo se vierte de manera natural como proximidad a recibir maldición. «Ser maldita» conserva la idea pasiva sin convertirla prematuramente en una sentencia más específica de la que el griego expresa.
- source_word: ἧς τὸ τέλος
  english_pob_choice: its end
  chosen_spanish: su fin
  alternatives_spanish:
  - su resultado
  - su destino
  lexicon: BDAG
  rationale: «Fin» es conciso y reproduce bien el valor teleológico de τέλος; «su» mantiene la referencia al sujeto implícito de la metáfora agrícola.
- source_word: εἰς καῦσιν
  english_pob_choice: for burning
  chosen_spanish: para quemarse
  alternatives_spanish:
  - para ser quemada
  - para fuego
  lexicon: BDAG
  rationale: Se conserva la imagen del resultado/final de la metáfora sin explicitar más de lo que el griego dice. «Para quemarse» suena natural en español y mantiene la ambigüedad controlada del texto.
theological_decisions:
- issue: Cómo traducir ἀδόκιμος sin imponer una decisión doctrinal más fuerte que el contexto agrícola inmediato
  english_pob_reading: worthless; rejected in footnote
  chosen_spanish_reading: inútil
  alternative_spanish_readings:
  - rechazada
  - desaprobada
  - sin valor
  rationale: El contexto inmediato habla de tierra que no produce lo esperado, por lo que «inútil» conserva la evaluación negativa sin cargar el texto con un matiz judicial más fuerte. La posibilidad de «rechazada» queda implícita como alternativa semántica, pero no se impone en el cuerpo principal.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cómo manejar κατάρας ἐγγύς sin convertir la metáfora en una afirmación más explícita de condenación final
  english_pob_reading: near to being cursed
  chosen_spanish_reading: está cerca de ser maldita
  alternative_spanish_readings:
  - está próxima a una maldición
  - está cerca de ser maldecida
  rationale: La frase mantiene la cercanía a la maldición en forma pasiva y conserva la tensión del texto. No se explicita «condenación eterna» ni otro desarrollo doctrinal que el versículo no menciona.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Cómo preservar εἰς καῦσιν como imagen sin sobre-interpretarla
  english_pob_reading: for burning
  chosen_spanish_reading: para quemarse
  alternative_spanish_readings:
  - para ser quemada
  - para fuego
  rationale: La traducción mantiene el lenguaje imagético y evita identificar de manera explícita el fuego con un juicio escatológico específico. Así se respeta el alcance inmediato del texto.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «near to being cursed» sobre «near to a curse» por mayor naturalidad y precisión. Por eso el español adopta una formulación pasiva equivalente («está cerca de ser maldita») y conserva el resto de la estructura y el tono agrícola del pasaje.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y publication-readable del POB español.
  - Se preserva la metáfora agrícola sin introducir un sustantivo explícito como «tierra» en el cuerpo del versículo.
  - «Espinos y abrojos» refleja la pareja léxica del griego y evita fusionar los dos términos en un solo equivalente.
  - La nota al pie conserva una alternativa válida para τριβόλους sin duplicar otros sentidos no atestiguados.
