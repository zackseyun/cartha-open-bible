    reason: lexical_alternative
  revision_rationale: Se revisa «para quemarse» a «para ser quemada» para reflejar mejor εἰς καῦσιν en español natural y fiel. Además, se añade una nota para ἀδόκιμος con la alternativa «rechazada», en continuidad con la documentación léxica y teológica del POB inglés. Se conserva «abrojos» con su nota alternativa «cardos», ya que distingue bien τριβόλους de ἀκάνθας y sigue siendo legible en español bíblico general.
