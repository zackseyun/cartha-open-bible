translation:
  language: es
  text: Porque la gente[a] jura por uno mayor que ellos, y para ellos, un juramento es el fin de toda disputa[b] como confirmación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las personas juran por uno mayor». El griego ἄνθρωποι es genérico para los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: O «toda objeción» o «toda controversia» para «toda disputa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: seres humanos
  alternatives_spanish:
  - personas
  - gente
  - hombres
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico y no masculino-específico; "seres humanos" preserva el valor universal sin introducir varón como sentido principal. Se mantiene el contraste con el superior implícito en el contexto.
- source_word: κατὰ τοῦ μείζονος
  english_pob_choice: by one greater than themselves
  chosen_spanish: por uno mayor que ellos
  alternatives_spanish:
  - por el mayor
  - por alguien mayor que ellos
  lexicon: BDAG
  rationale: En fórmulas de juramento, κατά con genitivo expresa la autoridad invocada; "por uno mayor que ellos" reproduce la comparación y la función idiomática del giro griego sin precisar un referente inexistente en el texto.
- source_word: ὀμνύουσιν
  english_pob_choice: swear
  chosen_spanish: juran
  alternatives_spanish:
  - hacen juramento
  - juran un juramento
  lexicon: BDAG
  rationale: '"Juran" es el equivalente natural y directo en español para el acto verbal. Evita redundancia y conserva el tono proverbial del enunciado.'
- source_word: πάσης ... ἀντιλογίας
  english_pob_choice: every dispute
  chosen_spanish: toda disputa
  alternatives_spanish:
  - toda controversia
  - toda objeción
  - toda contradicción
  lexicon: BDAG
  rationale: ἀντιλογία aquí tiene matiz de contienda o discusión legal/social; "disputa" expresa bien ese campo semántico y mantiene la amplitud de πάσης.
- source_word: πέρας
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - la conclusión
  - el cierre
  lexicon: BDAG
  rationale: πέρας significa fin o terminación. "El fin" conserva la imagen de clausura y suena natural en español.
- source_word: εἰς βεβαίωσιν
  english_pob_choice: for confirmation
  chosen_spanish: para confirmación
  alternatives_spanish:
  - para asegurar
  - como confirmación
  - para ratificación
  lexicon: BDAG
  rationale: βεβαίωσις denota confirmación o validación; "para confirmación" refleja el valor final/intencional de εἰς + acusativo.
- source_word: ὁ ὅρκος
  english_pob_choice: an oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - un juramento
  - el voto
  lexicon: BDAG
  rationale: En español, "juramento" es el término normal para ὅρκος y encaja con el artículo griego y la formulación general del proverbio. Se evita "voto", que sugiere otro campo semántico.
theological_decisions:
- issue: Referencia genérica a la humanidad en una máxima
  english_pob_reading: people
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - personas
  - hombres
  rationale: La frase presenta una práctica humana general, no masculina en particular. "Seres humanos" evita sesgo de género y mantiene la fuerza universal del dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores de nota en el texto español. La redacción mantiene la lectura de alta concordancia del audit trail inglés y conserva el alcance genérico de ἄνθρωποι, la comparación implícita de μείζονος, y el valor forense de ἀντιλογία.
  spanish_consistency_notes:
  - Se prefirió «seres humanos» sobre «hombres» para evitar ambigüedad de género.
  - Se eligió «juramento» para ὅρκος por ser el término español más preciso y natural en este contexto.
  - Se mantuvo «confirmación» para βεβαίωσις siguiendo la relación final/resultativa de εἰς + acusativo.
  - La estructura general sigue el tono proverbial y legal del griego sin añadir interpretaciones teológicas no presentes en el verso.
