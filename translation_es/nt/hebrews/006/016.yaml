revisions:
- from: Porque los seres humanos juran por uno mayor que ellos[a], y para ellos el juramento[b] es el fin de toda disputa para confirmación.
  to: Porque la gente[a] jura por uno mayor que ellos, y para ellos, un juramento es el fin de toda disputa[b] como confirmación.
  rationale: Se reemplaza «los seres humanos» por «la gente» para una máxima más natural en español sin perder el valor genérico de ἄνθρωποι. Se cambia a «un juramento» por mejor idiomaticidad en una afirmación general. Se ajusta el cierre a «como confirmación» para expresar εἰς βεβαίωσιν de manera más fluida. Se mueve la nota [b] a «toda disputa», que es el elemento al que realmente corresponde.
