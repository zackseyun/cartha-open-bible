translation:
  language: es
  text: Así que, cuando Dios quiso mostrar con mayor claridad a los herederos de la promesa la inmutabilidad de su propósito[a], lo garantizó con un juramento[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la inmutabilidad de su consejo».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «intervino con un juramento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - En lo cual
  - Por tanto, cuando
  lexicon: BDAG
  rationale: La expresión retoma el contexto anterior y une consecuencia con referencia temporal/lógica. En español, «Así que, cuando» conserva ese enlace sin el calco duro de «en lo cual».
- source_word: περισσότερον
  english_pob_choice: more clearly
  chosen_spanish: con mayor claridad
  alternatives_spanish:
  - más abundantemente
  - más plenamente
  - todavía más
  lexicon: BDAG
  rationale: El comparativo intensifica el acto de mostrar. «Con mayor claridad» expresa bien la fuerza demostrativa del verbo siguiente en un español natural.
- source_word: βουλόμενος
  english_pob_choice: desired
  chosen_spanish: quiso
  alternatives_spanish:
  - deseó
  - queriendo
  - teniendo la intención de
  lexicon: BDAG
  rationale: Aquí el participio expresa la intención deliberada de Dios. «Quiso» comunica voluntad e intención sin reducirlo a un mero deseo pasajero.
- source_word: τοῖς κληρονόμοις τῆς ἐπαγγελίας
  english_pob_choice: the heirs of the promise
  chosen_spanish: a los herederos de la promesa
  alternatives_spanish:
  - a los herederos de la promesa hecha
  - a quienes heredan la promesa
  lexicon: BDAG
  rationale: «Herederos» es el equivalente directo de κληρονόμοις y conserva el lenguaje de herencia pactal. Se mantiene «de la promesa» sin ampliar innecesariamente el referente.
- source_word: τὸ ἀμετάθετον
  english_pob_choice: the unchangeable character
  chosen_spanish: la inmutabilidad
  alternatives_spanish:
  - el carácter inmutable
  - lo inmutable
  lexicon: BDAG
  rationale: El sustantivo adjetival expresa la cualidad de no cambiar. En español, «la inmutabilidad» transmite con precisión ese valor abstracto y permite una formulación sobria.
- source_word: τῆς βουλῆς αὐτοῦ
  english_pob_choice: of his purpose
  chosen_spanish: de su propósito
  alternatives_spanish:
  - de su consejo
  - de su plan
  - de su determinación
  lexicon: BDAG
  rationale: βουλή se refiere aquí a la resolución deliberada de Dios. «Propósito» es claro, digno y fiel al sentido; «consejo» se reserva como alternativa más tradicional pero menos transparente.
- source_word: ἐμεσίτευσεν
  english_pob_choice: he guaranteed it
  chosen_spanish: lo garantizó
  alternatives_spanish:
  - lo confirmó
  - intervino con un juramento
  - lo ratificó
  lexicon: BDAG
  rationale: El verbo indica la acción por la que Dios añadió seguridad mediante juramento. «Lo garantizó» comunica bien la función del acto en contexto, con el objeto implícito retomado por el español.
- source_word: ὅρκῳ
  english_pob_choice: with an oath
  chosen_spanish: con un juramento
  alternatives_spanish:
  - mediante un juramento
  - por juramento
  lexicon: BDAG
  rationale: La dative instrumental se vierte naturalmente como medio. «Juramento» es el término español claro y solemne para ὅρκος.
theological_decisions:
- issue: Cómo expresar la idea de ἀμετάθετον sin perder la tensión entre cualidad y abstracción
  english_pob_reading: the unchangeable character of his purpose
  chosen_spanish_reading: la inmutabilidad de su propósito
  alternative_spanish_readings:
  - el carácter inmutable de su propósito
  - lo inmutable de su propósito
  rationale: El griego sustantiva la cualidad de ser inalterable. «Inmutabilidad» preserva esa abstracción y mantiene la afirmación fuerte sobre la firmeza del propósito divino sin introducir categorías ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo representar ἐμεσίτευσεν en relación con el juramento de Dios
  english_pob_reading: he guaranteed it with an oath
  chosen_spanish_reading: lo garantizó con un juramento
  alternative_spanish_readings:
  - lo confirmó con un juramento
  - intervino con un juramento
  rationale: El contexto muestra que el juramento sirve para asegurar la promesa a los herederos. «Lo garantizó» refleja la fuerza funcional del verbo sin oscurecer que el medio es el juramento.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el control más reciente del POB inglés (estado: sin cambios). Se ha conservado la equivalencia óptima del giro idiomático inicial y la fuerza de las dos opciones léxicas destacadas en las notas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «propósito» para βουλή, en coherencia con el estándar del proyecto.
  - Se usa «juramento» para ὅρκος, no «voto» ni una paráfrasis devocional, porque el contexto jurídico-covenantal exige precisión.
  - La secuencia «a los herederos de la promesa» conserva el dativo de destinatario sin sobreexplicar el referente.
  - «Inmutabilidad» preserva el tono teológico formal del sustantivo griego y evita perder la cualidad abstracta que el texto enfatiza.
