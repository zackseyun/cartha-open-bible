review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego y sigue de cerca las decisiones del POB en inglés: Dios quiso mostrar más claramente a los herederos de la promesa el carácter inalterable de su propósito y lo aseguró mediante juramento. Sin embargo, las notas al pie están invertidas respecto de las decisiones documentadas en inglés: la nota anclada en «propósito» debería dar la alternativa «su consejo», mientras que la anclada en «juramento» debería dar la alternativa literal de ἐμεσίτευσεν, «intervino con un juramento».'
  spanish_quality_summary: El español es claro, natural y digno. «Así que, cuando», «con mayor claridad», «los herederos de la promesa» y «lo garantizó con un juramento» son lecturas fluidas. «La inmutabilidad de su propósito» es aceptable, aunque algo más técnica que «el carácter inmutable de su propósito»; no obstante, sigue siendo fiel y legible en registro bíblico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «herederos», «propósito» y «juramento» están bien. La principal corrección necesaria no es terminológica sino de correspondencia entre notas y anclajes.
  issues:
  - severity: medium
    issue: Las notas al pie a y b están intercambiadas
    rationale: 'En la auditoría inglesa, la nota sobre «his purpose» ofrece la alternativa «his counsel», mientras que la nota sobre «with an oath» ofrece la alternativa literal «he interposed with an oath». El español colocó «la inmutabilidad de su consejo» en [a] y «intervino con un juramento» en [b], pero los anclajes en el texto exigen lo contrario: [a] está sobre «propósito» y [b] sobre «juramento».'
  revised_spanish_text: Así que, cuando Dios quiso mostrar con mayor claridad a los herederos de la promesa la inmutabilidad de su propósito[a], lo garantizó con un juramento[b],
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «de su consejo».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «intervino con un juramento».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel, claro y natural. Solo se corrigen las notas para que correspondan correctamente a los anclajes y a la auditoría inglesa: [a] explica la alternativa de βουλῆς como «consejo», y [b] da la alternativa más literal de ἐμεσίτευσεν como «intervino con un juramento».'
