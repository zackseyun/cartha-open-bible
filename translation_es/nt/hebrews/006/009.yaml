translation:
  language: es
  text: Pero estamos convencidos, respecto a ustedes[a], amados, de cosas mejores—cosas que pertenecen a la salvación—aunque hablamos de esta manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cosas que acompañan a la salvación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πεπείσμεθα
  english_pob_choice: we are convinced
  chosen_spanish: estamos convencidos
  alternatives_spanish:
  - estamos persuadidos
  - tenemos la certeza
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado ya establecido; «estamos convencidos» comunica bien esa certeza asentada en español sin volverlo rígido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la severidad del pasaje anterior; «Pero» reproduce mejor el giro retórico.
- source_word: περὶ ὑμῶν
  english_pob_choice: concerning you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - respecto de ustedes
  lexicon: BDAG
  rationale: «Acerca de» expresa de forma natural la relación con el genitivo sin perder el matiz formal del texto.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: BDAG
  rationale: El vocativo de afecto puede ser «amados» en español eclesial; «beloved» no obliga a una traducción más solemne como «amados» preserva la cercanía sin añadir «hermanos».
- source_word: τὰ κρείσσονα
  english_pob_choice: better things
  chosen_spanish: cosas mejores
  alternatives_spanish:
  - cosas mejores que estas
  - lo mejor
  lexicon: BDAG
  rationale: El neutro plural sustantivado pide una expresión plural genérica; «cosas mejores» conserva el comparativo y la amplitud del referente.
- source_word: ἐχόμενα σωτηρίας
  english_pob_choice: things that belong to salvation
  chosen_spanish: cosas que pertenecen a la salvación
  alternatives_spanish:
  - cosas acompañantes de la salvación
  - cosas vinculadas con la salvación
  - cosas que acompañan a la salvación
  lexicon: BDAG
  rationale: La relación de ἐχόμενα con σωτηρίας es deliberadamente no especificada de forma más estrecha por la POB inglesa; «pertenecen a la salvación» conserva esa amplitud y evita resolver la tensión teológica.
- source_word: εἰ καὶ
  english_pob_choice: even though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: BDAG
  rationale: Introduce una concesión clara y natural en español.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de tal modo
  lexicon: BDAG
  rationale: Retoma la forma severa del discurso precedente; «de esta manera» es idiomático y transparente.
- source_word: λαλοῦμεν
  english_pob_choice: we speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - decimos
  - estamos hablando
  lexicon: BDAG
  rationale: El verbo de habla se expresa naturalmente con «hablamos»; mantiene el presente general del griego.
theological_decisions:
- issue: Relación entre ἐχόμενα y σωτηρίας en un contexto de advertencia
  english_pob_reading: things that belong to salvation
  chosen_spanish_reading: cosas que pertenecen a la salvación
  alternative_spanish_readings:
  - cosas que acompañan a la salvación
  - cosas vinculadas con la salvación
  rationale: La frase no obliga a definir si son evidencias, acompañantes o efectos de la salvación. La traducción conserva esa tensión y evita una afirmación doctrinal más estrecha que el griego no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto coincide con el pasaje base y con la auditoría inglesa; no se requieren revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el genitivo de segunda persona plural, en registro neutro latinoamericano.
  - Se usa «amados» como vocativo eclesial breve y fiel.
  - Se evita «SEÑOR» u otra sustitución no motivada, porque el verso no contiene el nombre divino.
  - La nota alternativa preserva la ambigüedad lexical reconocida en la auditoría inglesa.
