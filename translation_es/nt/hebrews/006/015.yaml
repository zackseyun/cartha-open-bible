translation:
  language: es
  text: Y así,[a] después de esperar con paciencia, obtuvo la promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recibió lo prometido». El griego dice más literalmente «obtuvo la promesa».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y así
  - Y entonces
  lexicon: BDAG
  rationale: Conector simple que enlaza con la oración anterior; en español, iniciar con «Y» reproduce la continuidad narrativa sin añadir énfasis innecesario.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - entonces
  lexicon: BDAG
  rationale: «Así» conserva el valor adverbial de modo y resultado. Unido a la coma, funciona naturalmente en español al introducir la consecuencia de lo anterior.
- source_word: μακροθυμήσας
  english_pob_choice: after waiting patiently
  chosen_spanish: después de esperar con paciencia
  alternatives_spanish:
  - habiendo esperado con paciencia
  - después de ser paciente
  - después de perseverar con paciencia
  lexicon: BDAG
  rationale: El participio aoristo se vierte con sentido temporal para indicar una espera prolongada y paciente. «Esperar con paciencia» expresa bien la perseverancia implícita sin perder la idea de duración.
- source_word: ἐπέτυχεν
  english_pob_choice: obtained
  chosen_spanish: obtuvo
  alternatives_spanish:
  - recibió
  - alcanzó
  - logró
  lexicon: BDAG
  rationale: «Obtuvo» comunica el logro efectivo del verbo griego sin precisar más de lo que el texto dice. Mantiene el matiz de adquisición/alcance conseguido tras la espera.
- source_word: τῆς ἐπαγγελίας
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  - la cosa prometida
  lexicon: BDAG
  rationale: Se conserva el sustantivo singular con artículo para mantener el enlace léxico con el contexto inmediato. «La promesa» deja abierta la tensión del griego entre la promesa en sí y su cumplimiento sin forzar una paráfrasis.
theological_decisions:
- issue: 'Cómo entender τῆς ἐπαγγελίας: ¿la promesa misma o lo prometido/cumplido?'
  english_pob_reading: '''obtained the promise'' without specifying full fulfillment.'
  chosen_spanish_reading: «obtuvo la promesa» sin explicitar que recibió su cumplimiento total.
  alternative_spanish_readings:
  - recibió lo prometido
  - obtuvo lo prometido
  rationale: El griego dice literalmente que obtuvo «la promesa», y el contexto permite tanto la promesa como su contenido realizado. En español conviene preservar esa ambigüedad teológica y lexical en lugar de resolverla con una expansión interpretativa.
  doctrine_reference: Preservar la tensión textual y no sobreespecificar el cumplimiento.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada en inglés: mantiene el enlace narrativo de καὶ οὕτως, reproduce el participio con valor temporal y conserva la formulación ambigua de ἐπαγγελίας sin explicitar cumplimiento total. No se detectan revisiones previas que requieran ajuste.'
  spanish_consistency_notes:
  - Se usa «promesa» de forma consistente para τῆς ἐπαγγελίας, evitando alternar con «lo prometido» en el texto principal.
  - Se evita el calco rígido de «después de haber sido paciente» en favor de una construcción natural en español que conserva el sentido aspectual.
  - La puntuación refleja el encabalgamiento breve del griego y la cadencia de una sola cláusula narrativa.
