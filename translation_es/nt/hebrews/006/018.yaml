translation:
  language: es
  text: para que, mediante dos cosas inmutables, en las cuales es imposible que Dios mienta, nosotros, los que hemos huido en busca de refugio[a], tengamos un fuerte aliento para aferrarnos[b] a la esperanza puesta delante de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hemos huido en busca de refugio'' probablemente evoca la imagen de buscar asilo o seguridad, con posible eco de las ciudades de refugio del Antiguo Testamento.'
    reason: cross_reference
  - marker: b
    text: O 'asir la esperanza puesta delante de nosotros'. El verbo griego puede significar 'asir', 'agarrar firmemente' o 'mantenerse aferrado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ δύο πραγμάτων ἀμεταθέτων
  english_pob_choice: through two unchangeable things
  chosen_spanish: mediante dos cosas inmutables
  alternatives_spanish:
  - a través de dos cosas inmutables
  - por medio de dos cosas inmutables
  - mediante dos asuntos inmutables
  lexicon: BDAG
  rationale: πράγματα es amplio y aquí puede referirse a elementos concretos del juramento y la promesa divinos; 'cosas' conserva esa amplitud sin forzar una precisión inexistente. ἀμετάθετος expresa aquello que no cambia ni se altera; 'inmutables' es natural en español y mantiene el sentido de permanencia.
- source_word: ἰσχυρὰν παράκλησιν
  english_pob_choice: strong encouragement
  chosen_spanish: un fuerte ánimo
  alternatives_spanish:
  - un fuerte consuelo
  - un fuerte aliento
  - una fuerte consolación
  lexicon: BDAG
  rationale: παράκλησις puede abarcar consuelo, exhortación o ánimo. En este contexto de seguridad fundada en Dios, 'ánimo' comunica el efecto fortalecedor de manera breve y clara; el adjetivo 'fuerte' conserva la intensificación de ἰσχυράν.
- source_word: οἱ καταφυγόντες
  english_pob_choice: we who have fled for refuge
  chosen_spanish: nosotros, los que hemos huido para refugio
  alternatives_spanish:
  - nosotros, los que hemos buscado refugio
  - nosotros, los que hemos huido en busca de refugio
  - nosotros, los que hemos tomado refugio
  lexicon: BDAG
  rationale: El participio evoca movimiento hacia un lugar de seguridad. 'Hemos huido para refugio' conserva la imagen de huida y destino, más concreta que 'buscar refugio' o 'tomar refugio'.
- source_word: κρατῆσαι
  english_pob_choice: to take hold of
  chosen_spanish: tomar posesión de
  alternatives_spanish:
  - aferrarnos a
  - asirnos de
  - tomar firme posesión de
  lexicon: BDAG
  rationale: κρατέω puede significar agarrar, sujetar firmemente o tomar posesión. En este contexto, después de la imagen de refugio, 'tomar posesión de' expresa apropiación activa y suena natural en español; mantiene la fuerza del verbo sin volverlo técnico ni excesivamente interpretativo.
- source_word: τῆς προκειμένης ἐλπίδος
  english_pob_choice: the hope set before us
  chosen_spanish: la esperanza puesta delante de nosotros
  alternatives_spanish:
  - la esperanza colocada delante de nosotros
  - la esperanza presentada ante nosotros
  - la esperanza que está delante de nosotros
  lexicon: BDAG
  rationale: πρόκειμαι indica lo que está puesto delante, disponible o expuesto ante alguien. 'Puesta delante de nosotros' conserva la imagen espacial y el carácter objetivo de la esperanza ofrecida.
- source_word: ἀδύνατον ψεύσασθαι θεόν
  english_pob_choice: it is impossible for God to lie
  chosen_spanish: es imposible que Dios mienta
  alternatives_spanish:
  - Dios no puede mentir
  - es imposible mentir a Dios
  lexicon: BDAG
  rationale: 'La construcción impersonal puede expresarse naturalmente en español con ''es imposible que...''. Se conserva el contenido teológico exacto: la imposibilidad de la mentira en Dios, sin convertirlo en una formulación filosófica más amplia que el texto.'
theological_decisions:
- issue: Metáfora de refugio y apropiación de la esperanza
  english_pob_reading: Retained the concrete imagery 'fled for refuge' and 'take hold of the hope set before us' rather than smoothing into abstract assurance language.
  chosen_spanish_reading: Se conservó la imagen concreta de huir para refugio y de tomar posesión de la esperanza puesta delante de nosotros, sin abstraerla a un mero consuelo interior.
  alternative_spanish_readings:
  - tomar holdfast de la esperanza
  - aferrarnos a la esperanza que se nos ofrece
  - buscar seguridad en la esperanza
  rationale: El versículo combina imagen de asilo con acción deliberada sobre la esperanza. Mantener esa tensión evita diluir la fuerza retórica y la imaginería del texto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Imposibilidad de la mentira en Dios
  english_pob_reading: Rendered as 'it is impossible for God to lie' without expanding into philosophical claims about divine nature beyond the text.
  chosen_spanish_reading: Se tradujo como 'es imposible que Dios mienta', preservando la afirmación sin expandirla en categorías teológicas ajenas al enunciado.
  alternative_spanish_readings:
  - Dios no puede mentir
  - es imposible mentir para Dios
  rationale: La frase sostiene la confianza del creyente sobre la veracidad divina. La traducción mantiene el énfasis en la imposibilidad, no solo en una falta ocasional de veracidad.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que cambió 'seize' por 'take hold of' para κρατῆσαι por considerarlo más natural y preciso. La versión española evita un verbo demasiado brusco y opta por 'tomar posesión de', que conserva la apropiación activa y se alinea con la revisión aprobada, sin perder la fuerza del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεόν, conforme al criterio del proyecto.
  - Se eligió 'esperanza' para ἐλπίς, evitando 'confianza' porque el texto habla del objeto esperado puesto delante de los creyentes.
  - Se optó por un registro digno y contemporáneo, sin recurrir a fórmulas litúrgicas que oculten la imaginería del versículo.
  - La nota sobre la esperanza recoge la alternativa verbal del inglés POB y la vuelve visible en español sin duplicar el sentido principal.
