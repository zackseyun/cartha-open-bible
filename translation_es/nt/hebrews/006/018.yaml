review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido global del griego: propósito (''para que''), los ''dos cosas inmutables'', la imposibilidad de que Dios mienta, la imagen de huir para refugio, y la esperanza ''puesta delante''. Sin embargo, hay dos fallas relevantes de alineación con la auditoría POB: el anclaje de la nota [a] está colocado sobre ''inmutables'' aunque su contenido trata del verbo κρατῆσαι, y ''tomar posesión de'' sobretraduce la idea de ''take hold of/κρατῆσαι'' hacia apropiación posesiva más fuerte que el griego y que la revisión inglesa final.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'un fuerte ánimo' suena menos natural que 'un fuerte aliento' o 'un gran consuelo/ánimo' en este contexto; y 'hemos huido para refugio' resulta algo rígido. 'Hemos huido en busca de refugio' conserva mejor la imagen y lee más naturalmente. 'Tomar posesión de la esperanza' no es la mejor opción idiomática ni semántica aquí; 'asirnos de' es poco natural, mientras que 'aferrarnos a' o 'asir la esperanza' comunican mejor la fuerza del verbo.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Dios'' está bien para θεόν. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión léxica es κρατέω: el proyecto auditó ''take hold of'' como revisión preferida, y el español debe reflejar esa moderación activa mejor que ''tomar posesión de''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'inmutables' pero su contenido explica κρατῆσαι ('tomar/aferrar/mantener firmemente').
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente. Tal como está, la nota induce a pensar que comenta 'dos cosas inmutables', no el verbo final.
  - severity: medium
    issue: '''Tomar posesión de la esperanza'' sobreinterpreta κρατῆσαι.'
    rationale: κρατέω aquí expresa asir, aferrarse, tomar con firmeza. 'Tomar posesión' añade matiz de propiedad/posesión legal o completa apropiación que no está explicitado en el griego ni en la revisión inglesa final ('take hold of').
  - severity: medium
    issue: '''Un fuerte ánimo'' es menos natural en español bíblico contemporáneo que alternativas como ''un fuerte aliento''.'
    rationale: Aunque comprensible, 'tener un fuerte ánimo' suena algo extraño; παράκλησις aquí apunta a aliento/consuelo fortalecedor más que al estado interno de ánimo en sí.
  - severity: low
    issue: '''Hemos huido para refugio'' suena rígido.'
    rationale: '''Hemos huido en busca de refugio'' conserva la imaginería de asilo y mejora la fluidez del español sin perder precisión.'
