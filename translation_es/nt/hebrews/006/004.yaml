translation:
  language: es
  text: Porque es imposible, en cuanto a los que fueron una vez iluminados[c], que gustaron[a] del don celestial y llegaron a ser partícipes[b] del Espíritu Santo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «experimentaron» el don celestial; el verbo literalmente significa «gustar» y puede denotar una experiencia real, no solo una muestra.
    reason: lexical_alternative
  - marker: b
    text: O «participantes» o «los que comparten en el Espíritu Santo».
    reason: lexical_alternative
  - marker: c
    text: «Iluminados» puede referirse en sentido amplio a recibir luz o instrucción espiritual; algunos lo interpretan más específicamente como conversión o iluminación bautismal.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀδύνατον
  english_pob_choice: it is impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - imposible
  lexicon: BDAG
  rationale: El adjetivo predicativo se expresa en español con una construcción copulativa natural. «Es imposible» mantiene la fuerza enfática sin añadir contenido que el griego no tiene.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: BDAG
  rationale: En este contexto explicativo, «porque» comunica bien la conexión causal/discursiva con lo anterior en español bíblico actual, sin perder la función de explicación.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una vez para siempre
  - una sola vez
  lexicon: BDAG
  rationale: «Una vez» reproduce la referencia a una ocasión pasada y definida. No se amplía a «una vez para siempre» porque el griego aquí no exige esa explicitación.
- source_word: φωτισθέντας
  english_pob_choice: were once enlightened
  chosen_spanish: fueron una vez iluminados
  alternatives_spanish:
  - fueron una vez alumbrados
  - recibieron luz
  lexicon: BDAG
  rationale: «Iluminados» conserva la metáfora espiritual/cognitiva. Se evita concretarla como conversión o bautismo, siguiendo el POB inglés y preservando la tensión interpretativa.
- source_word: γευσαμένους
  english_pob_choice: tasted
  chosen_spanish: gustaron
  alternatives_spanish:
  - probaron
  - experimentaron
  lexicon: BDAG
  rationale: «Gustaron» conserva el sentido literal de «taste» y puede abarcar experiencia real. Se evita «experimentaron» en el texto principal para no diluir la imagen verbal.
- source_word: δωρεᾶς τῆς ἐπουρανίου
  english_pob_choice: the heavenly gift
  chosen_spanish: el don celestial
  alternatives_spanish:
  - el regalo celestial
  - el don del cielo
  lexicon: BDAG
  rationale: «Don» es el equivalente más natural y teológicamente sobrio para δωρεά. «Celestial» conserva ἐπουρανίου sin especificar cuál es exactamente el don.
- source_word: τε ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  lexicon: BDAG
  rationale: La coordinación acumulativa se refleja con repetición de «y», manteniendo la estructura participial del griego en un español fluido.
- source_word: μετόχους
  english_pob_choice: partakers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - compañeros
  lexicon: BDAG
  rationale: «Partícipes» conserva la idea de compartir en algo y es un término bíblico claro en español. Mantiene la fuerza de la relación sin estrecharla doctrinalmente.
- source_word: γενηθέντας
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - fueron hechos
  lexicon: BDAG
  rationale: La forma verbal indica entrada en un estado. «Llegaron a ser» resulta idiomático en español y refleja el cambio de condición sin forzar pasividad.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo de Dios
  - del Espíritu Santo
  lexicon: BDAG
  rationale: Se capitaliza por el referente personal divino. «Espíritu Santo» es la forma establecida en español cristiano y comunica con claridad el referente del texto.
theological_decisions:
- issue: Cómo traducir φωτισθέντας sin resolver el debate sobre conversión o bautismo
  english_pob_reading: Retain the broader term 'enlightened' without specifying conversion or baptism
  chosen_spanish_reading: Mantener «iluminados» sin precisar conversión ni bautismo
  alternative_spanish_readings:
  - convertidos
  - bautizados
  - iluminados por el bautismo
  rationale: El griego usa una metáfora de iluminación y no identifica de manera explícita el evento. La traducción conserva esa amplitud para no imponer una lectura denominacional.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo traducir γευσαμένους sin decidir si implica mera muestra o experiencia plena
  english_pob_reading: Render literally as 'tasted' and leave the depth of the experience unresolved in the main text
  chosen_spanish_reading: Traducir literalmente con «gustaron»
  alternative_spanish_readings:
  - experimentaron plenamente
  - probaron solo
  rationale: «Gustaron» mantiene la imagen concreta y deja sin decidir la extensión de la experiencia, tal como hace el POB inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo expresar μετόχους γενηθέντας πνεύματος ἁγίου sin estrechar su alcance salvador
  english_pob_reading: Use 'became partakers of the Holy Spirit'
  chosen_spanish_reading: Usar «llegaron a ser partícipes del Espíritu Santo»
  alternative_spanish_readings:
  - compartieron el Espíritu Santo
  - se hicieron participantes del Espíritu Santo
  rationale: «Partícipes» reproduce la idea de participación y evita encerrar el texto en una formulación doctrinal más específica de lo que el griego exige.
  doctrine_reference: La traducción no debe imponer una conclusión sistemática donde el texto no la explicita.
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés (gpt-5.4, 2026-04-23T09:43:56Z) indicó que no se requerían cambios y que el acuerdo con la revisión era alto. Esta versión española sigue esa línea sin introducir decisiones nuevas que resuelvan la ambigüedad teológica del pasaje.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y auditable del POB, evitando paráfrasis expansivas.
  - Se conserva la imagen verbal de «gustaron» y la amplitud interpretativa de «iluminados».
  - Se usa «Espíritu Santo» con mayúsculas por el referente personal divino, consistente con la terminología cristiana estándar en español.
  - Los marcadores de nota se colocan solo donde corresponde en el texto principal y no se reutilizan con otros sentidos.
