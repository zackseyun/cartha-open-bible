    rationale: El inglés POB conserva una nota léxica para ἄχρι τέλους («until the end» / «to the end») por su matiz de perseverancia hasta la consumación. El español debe preservar esa alternativa significativa o explicar por qué no es necesaria; aquí sí conviene mantenerla.
  - severity: low
