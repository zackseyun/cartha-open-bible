translation:
  language: es
  text: Y deseamos que cada uno de ustedes muestre el mismo empeño[a] para la plena seguridad[b] de la esperanza hasta el fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diligencia». El término griego puede expresar empeño serio, diligencia o celo sostenido.
    reason: lexical_alternative
  - marker: b
    text: O «plena certeza» o «completa confianza». El término griego puede denotar plenitud de seguridad o certidumbre.
    reason: lexical_alternative
  - marker: c
    text: O «hasta el final». La frase enfatiza la perseverancia hasta la consumación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμοῦμεν
  english_pob_choice: we desire
  chosen_spanish: deseamos
  alternatives_spanish:
  - queremos
  - anhelamos
  lexicon: BDAG
  rationale: En este contexto exhortativo, el verbo expresa un deseo pastoral intenso pero no una simple voluntad fría. «Deseamos» conserva esa fuerza sin sonar coloquial ni afectivo en exceso.
- source_word: ἕκαστον ὑμῶν
  english_pob_choice: each one of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno de vosotros
  - cada uno de ustedes
  lexicon: BDAG
  rationale: La construcción distributiva se mantiene con claridad. Se prefiere «ustedes» por neutralidad y lectura amplia en español contemporáneo.
- source_word: τὴν αὐτὴν
  english_pob_choice: the same
  chosen_spanish: el mismo
  alternatives_spanish:
  - la misma
  - ese mismo
  lexicon: BDAG
  rationale: El referente es «empeño» (sustantivo masculino), así que en español debe concordar en género. La idea de continuidad con la diligencia ya mencionada se conserva.
- source_word: ἐνδείκνυσθαι
  english_pob_choice: to show
  chosen_spanish: muestre
  alternatives_spanish:
  - demuestre
  - manifieste
  lexicon: BDAG
  rationale: El infinitivo medio expresa exhibir o mostrar una cualidad. En español, dentro de la exhortación, «muestre» es natural y fiel.
- source_word: σπουδὴν
  english_pob_choice: diligence
  chosen_spanish: empeño
  alternatives_spanish:
  - diligencia
  - entrega
  - celo
  lexicon: BDAG
  rationale: «Diligencia» es posible, pero en español puede sonar más técnica o arcaizante. «Empeño» comunica bien la seriedad sostenida y la implicación activa del término, sin perder el valor exhortativo.
- source_word: πρὸς τὴν πληροφορίαν τῆς ἐλπίδος
  english_pob_choice: for the full assurance of hope
  chosen_spanish: para la plena seguridad de la esperanza
  alternatives_spanish:
  - para la plena certeza de la esperanza
  - para el completo convencimiento de la esperanza
  lexicon: BDAG
  rationale: La frase griega puede referirse tanto a certeza interior como a seguridad plena. «Plena seguridad» mantiene esa amplitud y evita reducir el alcance semántico a una sola formulación doctrinal.
- source_word: ἄχρι τέλους
  english_pob_choice: until the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el fin
  lexicon: BDAG
  rationale: La expresión marca perseverancia continuada hasta la consumación. «Hasta el fin» es idiomático y mantiene la posibilidad de leer el énfasis de perseverancia resaltado en la nota inglesa.
theological_decisions:
- issue: 'ἡ πληροφορία τῆς ἐλπίδος: certeza/seguridad de la esperanza'
  english_pob_reading: The phrase is rendered without importing a later doctrinal system; it expresses the readers' hope reaching full certainty and continuing to the end.
  chosen_spanish_reading: La frase se vierte como «plena seguridad de la esperanza», manteniendo la idea de certeza plena sin cerrar el sentido a una sola formulación confesional.
  alternative_spanish_readings:
  - plena certeza de la esperanza
  - completa confianza de la esperanza
  rationale: El griego permite un campo semántico que incluye seguridad, certeza y confianza plena. La traducción conserva esa tensión teológica en vez de resolverla de forma estrecha.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y el trazado auditado en inglés, conservando la exhortación distributiva, el matiz de empeño/diligencia y la ambigüedad controlada de πληροφορία como seguridad/certeza plena. No se registran revisiones previas que alteren el sentido.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según las normas del proyecto, aunque este versículo no contiene esos términos.
  - Se evitó «señor»/«Cristo» porque no aparecen en el segmento.
  - Se prefirió una sintaxis natural en español sin perder la estructura exhortativa del griego.
  - El marcador [a] se colocó sobre «empeño» y [b] sobre «seguridad» para anclar las alternativas léxicas documentadas.
