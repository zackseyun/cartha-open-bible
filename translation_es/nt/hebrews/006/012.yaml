    text: O «tardos». El griego νωθροὶ puede abarcar la idea de ser lentos, torpes o faltos de diligencia.
    reason: lexical_alternative
  revision_rationale: Se recomienda una reparación menor para mejorar la naturalidad del español y alinear mejor la decisión léxica con la evidencia y el rastro de auditoría inglés. «Perezosos» expresa con más claridad la advertencia exhortativa de νωθροὶ en contexto, mientras que la nota conserva la alternativa «tardos». También se aligera la expresión instrumental a «por la fe y la paciencia», sin alterar el sentido del griego.
