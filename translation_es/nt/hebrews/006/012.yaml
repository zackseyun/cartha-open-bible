translation:
  language: es
  text: para que no lleguen a ser perezosos[a], sino imitadores de los que, por la fe y la paciencia, heredan las promesas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tardos». El griego νωθροὶ puede abarcar la idea de ser lentos, torpes o faltos de diligencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: νωθροὶ
  english_pob_choice: sluggish
  chosen_spanish: tardos
  alternatives_spanish:
  - perezosos
  - lentos
  - dormidos
  lexicon: BDAG
  rationale: νωθρός expresa lentitud, torpeza o falta de prontitud. En español, «tardos» conserva la idea de falta de diligencia sin volver el tono demasiado moralizante o demasiado técnico. «Perezosos» puede sonar más acusatorio; «lentos» pierde la dimensión exhortativa; «dormidos» sería demasiado fuerte y no corresponde bien al término.
- source_word: γένησθε
  english_pob_choice: become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - sean
  - se conviertan en
  - pasen a ser
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo de γίνομαι aquí tiene fuerza ingresiva: no solo «ser», sino entrar en ese estado. «Lleguen a ser» preserva esa transición mejor que un simple «sean».'
- source_word: μιμηταὶ
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  - modelos
  lexicon: BDAG
  rationale: μιμητής significa literalmente «imitador». «Imitadores» mantiene la correspondencia directa y el llamado explícito a tomar por modelo a otros.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por fe
  - mediante la fe
  - a través de la fe
  lexicon: BDAG
  rationale: El griego marca medio o modo con διά + genitivo. «Por medio de la fe» comunica bien el valor instrumental y mantiene la lectura doctrinal estándar de πίστις como «fe».
- source_word: μακροθυμίας
  english_pob_choice: patience
  chosen_spanish: de la paciencia
  alternatives_spanish:
  - de la longanimidad
  - de la perseverancia paciente
  - de la paciencia constante
  lexicon: BDAG
  rationale: μακροθυμία denota paciencia, constancia paciente o longanimidad. «Paciencia» es claro y natural en español contemporáneo; «longanimidad» sería más literal pero menos accesible.
- source_word: κληρονομούντων
  english_pob_choice: inherit
  chosen_spanish: heredan
  alternatives_spanish:
  - están heredando
  - reciben en herencia
  - obtienen por herencia
  lexicon: BDAG
  rationale: El participio presente describe a los que están caracterizados por heredar. «Heredan» reproduce de forma natural esa cualidad habitual y evita una perífrasis pesada.
- source_word: τὰς ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - lo prometido
  - las promesas de Dios
  lexicon: BDAG
  rationale: El plural griego debe conservarse. «Las promesas» es la traducción directa y encaja con el lenguaje de Hebreos sobre las promesas de Dios.
- source_word: ἵνα μὴ
  english_pob_choice: so that you may not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: ἵνα con μή introduce finalidad o resultado. «Para que no» es la forma más natural en español y mantiene la conexión con la exhortación previa.
theological_decisions:
- issue: Valor de πίστις en el contexto exhortativo
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La pauta doctrinal de POB favorece «fe» como equivalente principal de πίστις. Aunque el contexto admite matices de confianza activa e incluso fidelidad, «fe» preserva mejor la amplitud semántica y la coherencia terminológica de Hebreos.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith; alternativas reservadas cuando la nota o el contexto las requieran'
- issue: Relación entre el mandato negativo y el ejemplo positivo
  english_pob_reading: so that you may not become sluggish, but imitators of those who through faith and patience inherit the promises
  chosen_spanish_reading: para que no lleguen a ser tardos, sino imitadores de los que, por medio de la fe y de la paciencia, heredan las promesas
  alternative_spanish_readings:
  - para que no se vuelvan perezosos, sino imitadores de los que por fe y paciencia heredan las promesas
  - para que no sean lentos, sino seguidores de los que mediante fe y paciencia reciben las promesas
  rationale: 'La estructura adversativa debe conservarse con claridad: una advertencia negativa seguida de un llamado positivo. «Imitadores» mantiene la relación explícita del griego con los creyentes ejemplares, y «heredan las promesas» preserva la dimensión de herencia covenantal sin reemplazarla por una expresión más general.'
  doctrine_reference: Hebreos 6:12 en el marco de la exhortación a perseverar en la fe y la paciencia
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el audit trail más reciente; el consenso de revisión indica alta concordancia y sin cambios necesarios. La redacción española se ajusta al texto griego y a las decisiones auditadas en inglés, preservando la advertencia de νωθροί, el valor instrumental de διὰ πίστεως καὶ μακροθυμίας y el plural de τὰς ἐπαγγελίας.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al Tetragrámaton; en este versículo no aparece.
  - Se mantuvo «fe» para πίστις conforme al estándar doctrinal POB, sin forzar «fidelidad» en el texto principal.
  - Se preservó la estructura contrastiva del griego con «sino» para reflejar el contraste entre la advertencia y el modelo a imitar.
  - «Heredan las promesas» conserva el plural explícito de ἐπαγγελίας y el matiz de herencia presente en el participio.
