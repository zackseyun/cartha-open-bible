review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: ἵνα μὴ ... γένησθε se refleja adecuadamente como finalidad negativa con matiz ingresivo; μιμηταὶ se preserva correctamente como «imitadores»; κληρονομούντων τὰς ἐπαγγελίας se mantiene bien como «heredan las promesas». La principal debilidad está en «tardos» para νωθροὶ: aunque semánticamente posible, en español actual suena poco natural y puede sugerir lentitud intelectual más que falta de diligencia/exhortación espiritual. Además, la nota española se desvía de la alternativa principal documentada en inglés: el inglés conserva «sluggish» en texto y nota «lazy», mientras que el español pone «tardos» y nota «perezosos», lo que reduce la correspondencia con la decisión léxica auditada.'
  spanish_quality_summary: El verso es legible y digno, pero «tardos» resulta algo rígido y menos idiomático en español eclesial contemporáneo. «Perezosos» comunica mejor la advertencia exhortativa de Hebreos 5:11–6:12 y suena más natural. También conviene simplificar «por medio de la fe y de la paciencia» a «por la fe y la paciencia», que sigue siendo fiel al valor instrumental de διά + genitivo y mejora la fluidez sin pérdida de sentido.
  glossary_alignment: No hay problemas con la terminología principal del proyecto. «Fe» para πίστις y «promesas» para ἐπαγγελίας están bien alineados. No intervienen términos sensibles como Yahvé/Mesías/siervo-esclavo. La nota sobre πίστις del inglés no estaba en el texto base inglés como nota obligatoria separada del verso español; por tanto no es necesario añadirla aquí, aunque la decisión léxica de «fe» es correcta.
  issues:
  - severity: medium
    issue: «tardos» para νωθροὶ suena poco natural y menos preciso en español actual
    rationale: Aunque puede cubrir idea de lentitud, en este contexto exhortativo νωθροὶ apunta a flojedad o falta de diligencia. «Perezosos» o «indolentes» comunican mejor la fuerza práctica del texto; «perezosos» además coincide con la alternativa auditada en inglés.
  - severity: low
    issue: La frase «por medio de la fe y de la paciencia» es algo pesada
    rationale: El instrumental de διά + genitivo puede expresarse idiomáticamente en español como «por la fe y la paciencia», manteniendo fidelidad y mejorando naturalidad.
  revised_spanish_text: para que no lleguen a ser perezosos[a], sino imitadores de los que, por la fe y la paciencia, heredan las promesas.
