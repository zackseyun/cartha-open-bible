translation:
  language: es
  text: Tenemos esto como un ancla del alma, tanto segura como firme, y que entra al lugar interior detrás del velo[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «detrás de la cortina» o «en el lugar interior dentro del velo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - la cual
  - que
  lexicon: BDAG
  rationale: El relativo femenino remite a la esperanza del versículo anterior. En español, un demostrativo neutro como «esto» expresa mejor el enlace anafórico al inicio de la oración sin volverla rígida o demasiado dependiente de un relativo.
- source_word: ὡς ἄγκυραν
  english_pob_choice: as an anchor
  chosen_spanish: como ancla
  alternatives_spanish:
  - como un ancla
  - cual ancla
  lexicon: BDAG
  rationale: «Como ancla» conserva la metáfora directamente y suena natural en español. Se omite el artículo por estilo bíblico fluido; el sentido no cambia.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - contamos con
  lexicon: BDAG
  rationale: El presente indicativo se rinde de forma simple y natural con «tenemos». «Poseemos» sería más marcado e innecesariamente formal.
- source_word: τῆς ψυχῆς
  english_pob_choice: of the soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de la vida
  - para el alma
  lexicon: BDAG
  rationale: «Ψυχή» se traduce aquí como «alma» para conservar el valor léxico de la palabra y la metáfora establecida. «Del alma» mantiene la relación genitiva sin convertirla en una paráfrasis de «vida».
- source_word: ἀσφαλῆ
  english_pob_choice: secure
  chosen_spanish: segura
  alternatives_spanish:
  - seguro
  - confiable
  lexicon: BDAG
  rationale: En el contexto de una ancla, ἀσφαλής comunica seguridad y firmeza fiable. «Segura» funciona bien en español y conserva el tono práctico de la imagen náutica.
- source_word: τε καὶ
  english_pob_choice: both ... and
  chosen_spanish: y
  alternatives_spanish:
  - tanto ... como
  - a la vez ... y
  lexicon: BDAG
  rationale: Aunque el griego marca correlación, en español la coordinación simple con «y» resulta más natural y no pierde el doble rasgo descrito por los dos adjetivos. La duplicación se conserva en la serie adjetival.
- source_word: βεβαίαν
  english_pob_choice: firm
  chosen_spanish: firme
  alternatives_spanish:
  - segura
  - estable
  lexicon: BDAG
  rationale: «Firme» preserva la idea de solidez, fiabilidad y permanencia, distinguiéndose de «segura» sin crear una repetición vacía. La pareja «segura y firme» reproduce bien la doble descripción.
- source_word: εἰσερχομένην
  english_pob_choice: entering
  chosen_spanish: que entra
  alternatives_spanish:
  - entrando
  - que se adentra
  lexicon: BDAG
  rationale: El participio se expresa con una proposición relativa en español para mantener claridad sintáctica. «Que entra» preserva el movimiento continuo de la imagen sin añadir interpretación.
- source_word: εἰς τὸ ἐσώτερον
  english_pob_choice: into the inner place
  chosen_spanish: en el lugar interior
  alternatives_spanish:
  - al lugar interior
  - en el lugar más interior
  lexicon: BDAG
  rationale: «Lugar interior» conserva la idea espacial sin sobreespecificar más de lo que el griego dice. La preposición «en» puede sonar más natural con «entra» en español, aunque el movimiento implícito permanece.
- source_word: τοῦ καταπετάσματος
  english_pob_choice: behind the curtain
  chosen_spanish: detrás del velo
  alternatives_spanish:
  - detrás de la cortina
  - dentro del velo
  - tras el velo
  lexicon: BDAG
  rationale: Se opta por «velo» porque en Hebreos el término cultual tradicional en español comunica mejor el referente del tabernáculo/santuario. Esto sigue la nota inglesa que preserva la alternativa «veil»; «detrás del velo» mantiene la espacialidad del original.
theological_decisions:
- issue: Imagen cultual del santuario y acceso al lugar interior
  english_pob_reading: Render καταπέτασμα as 'curtain' and make the spatial sense explicit with 'behind the curtain' without over-interpreting the referent.
  chosen_spanish_reading: Usar «velo» y explicitar la relación espacial con «detrás del velo», sin identificar de modo más estrecho el objeto.
  alternative_spanish_readings:
  - detrás de la cortina
  - dentro del velo
  rationale: El texto griego alude a la barrera cultual del santuario, y el contexto de Hebreos desarrolla esa imagen. En español, «velo» es el término más asentado para ese marco cultual; «detrás del velo» conserva la imagen sin forzar una explicación doctrinal adicional.
  doctrine_reference: Hebreos 6:19; traducción de imagen cultual y acceso al santuario
translation_notes:
  revision_awareness: El auditorio inglés revisó la opción cultual entre 'curtain' y 'veil' y mantuvo una nota alternativa. La versión española adopta la lectura más natural y tradicional para Hebreos en español («velo»), conservando la misma tensión léxica y el sentido espacial explícito, sin introducir cambios doctrinales adicionales.
  spanish_consistency_notes:
  - He mantenido «alma» para ψυχή, conforme al valor léxico del original y a la metáfora de Hebreos.
  - He usado «velo» en el marco cultual para coherencia con el campo semántico de Hebreos, aunque el inglés POB prefirió 'curtain' por accesibilidad; la nota preserva la alternativa.
  - He conservado la doble cualidad de la ancla con «segura y firme», evitando colapsar ambos adjetivos en un solo sinónimo.
  - He traducido el participio con una relativa («que entra») para claridad en español sin perder el movimiento verbal continuo.
