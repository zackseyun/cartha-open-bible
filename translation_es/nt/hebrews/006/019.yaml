  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: referencia anafórica a la esperanza previa, metáfora del ancla, doble cualidad y movimiento hacia el interior del santuario. Sin embargo, pierde dos matices del audit trail inglés y del griego: (1) el valor correlativo de τε καὶ queda demasiado atenuado al omitir un equivalente de «both ... and»; (2) «en el lugar interior» debilita el movimiento de εἰς. Además, la nota al pie está anclada en «Tenemos», pero la alternativa léxica corresponde a la frase final sobre el velo/cortina.'
  spanish_quality_summary: El español es claro y legible, pero hay pequeños ajustes para mayor naturalidad y fidelidad. «Tenemos esto» suena mejor sin nota en el verbo; «como un ancla» es más idiomático que «como ancla» en prosa corriente; «tanto segura como firme» expresa mejor la correlación sin sonar forzado; «que entra al lugar interior» conserva mejor la dirección. «Detrás del velo» es aceptable en español eclesial, aunque se debe conservar la alternativa «cortina» en nota por alineación con el POB inglés.
  glossary_alignment: No hay conflictos con los términos de proyecto principales. «Alma» para ψυχή está bien. «Velo» es una excepción contextual defendible frente al inglés «curtain», pero debe explicarse en la nota como alternativa tradicional/moderna. La decisión no afecta nombres divinos ni otros términos doctrinales sensibles.
