    issue: Omisión de ῥῆμα en el texto principal
    rationale: El griego expresa claramente «la buena palabra de Dios». El borrador deja «del buen [a] de Dios», que no es español válido y no transmite el contenido léxico central.
  - severity: medium
    issue: Notas al pie desalineadas con las alternativas preservadas por la auditoría inglesa
    rationale: La POB inglesa conserva una nota para «powers» = «miracles/mighty works» y otra para «the coming age» = «the age to come». El borrador español pone [a] sobre la palabra omitida y [b] solo sobre «siglo venidero», perdiendo la alternativa de δυνάμεις.
  - severity: low
    issue: «Siglo venidero» es menos natural que «era venidera» en español actual
    rationale: Aunque no es incorrecto, «era venidera» comunica mejor el sentido escatológico de αἰών a lectores contemporáneos. Puede mantenerse «siglo» si hay preferencia estilística, pero la alternativa más legible es «era venidera».
