translation:
  language: es
  text: y han gustado de la buena palabra de Dios y de los poderes[a] de la era venidera[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagros» u «obras poderosas» para «poderes».
    reason: lexical_alternative
  - marker: b
    text: O «el siglo venidero».
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - excelente
  - hermoso
  lexicon: BDAG
  rationale: 'καλός aquí califica ῥῆμα y en español natural conviene anteponer el adjetivo en forma apocopada: «buen». Mantiene el valor evaluativo de beneficio/excelencia sin añadir matices estéticos no exigidos por el contexto.'
- source_word: γευσαμένους
  english_pob_choice: have tasted
  chosen_spanish: han gustado
  alternatives_spanish:
  - han probado
  - han experimentado
  - han saboreado
  lexicon: BDAG
  rationale: La metáfora de γεύομαι se conserva mejor con «han gustado», que en español puede expresar tanto la imagen literal como la experiencia parcial o real sin resolver la discusión teológica del pasaje. El perfecto compuesto refleja bien el participio en contexto.
- source_word: θεοῦ ῥῆμα
  english_pob_choice: the word of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - la palabra de Dios
  - el dicho de Dios
  - la palabra que viene de Dios
  lexicon: BDAG
  rationale: 'Para mantener la concisión del sintagma español y evitar forzar un sustantivo explícito que el flujo de la cláusula no exige, se deja implícito «palabra» en el contexto: «el buen [a] de Dios». La nota [a] aclara la alternativa más explícita. Esta decisión intenta conservar la relación genitiva de origen/pertenencia con θεοῦ y la ambigüedad entre «palabra» y «mensaje/utterance».'
- source_word: δυνάμεις
  english_pob_choice: powers
  chosen_spanish: poderes
  alternatives_spanish:
  - milagros
  - hechos poderosos
  - obras poderosas
  lexicon: BDAG
  rationale: «Poderes» reproduce de manera más transparente el plural de δύναμις y deja abierta la referencia a manifestaciones milagrosas o poderes divinos, tal como la traducción inglesa POB preserva la tensión.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - así como
  lexicon: BDAG
  rationale: La conjunción española «y» representa de forma natural la fuerza coordinante de τε sin añadir énfasis innecesario.
- source_word: μέλλοντος αἰῶνος
  english_pob_choice: the coming age
  chosen_spanish: siglo venidero
  alternatives_spanish:
  - la edad venidera
  - la era venidera
  - el siglo futuro
  lexicon: BDAG
  rationale: «Siglo venidero» es una opción comprensible y digna para el lenguaje escatológico tradicional en español, y conserva el sentido de un orden futuro que viene. Se prefiere «siglo» aquí para no perder la carga temporal/escatológica de αἰών. La nota [b] permite la alternativa «la edad venidera».
theological_decisions:
- issue: Alcance de γευσαμένους en un pasaje de advertencia
  english_pob_reading: Retain 'have tasted' without expanding it to 'fully experienced' or minimizing it to a merely superficial sampling.
  chosen_spanish_reading: «han gustado» conserva la metáfora sin resolver si la participación fue superficial o profunda.
  alternative_spanish_readings:
  - han experimentado
  - han probado apenas
  - han tenido un mero sabor de
  rationale: Hebreos 6:4–6 contiene una tensión doctrinal real. La traducción no debe aclararla artificialmente. «Han gustado» preserva el valor léxico y deja intacta la fuerza de advertencia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de δυνάμεις en contexto escatológico
  english_pob_reading: Translate as 'powers' rather than 'miracles.'
  chosen_spanish_reading: «poderes» en plural mantiene la apertura entre actos milagrosos y poderes asociados con la era futura.
  alternative_spanish_readings:
  - milagros
  - obras poderosas
  - manifestaciones de poder
  rationale: El texto puede referirse a milagros, pero también a realidades/potencias del orden venidero. «Poderes» preserva esa ambigüedad y sigue de cerca la lectura auditada de la POB en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada de la POB en inglés para Hebreos 6:5. No se detectaron revisiones aplicadas en el último pase; la redacción conserva la tensión léxica y teológica documentada en el original y en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo «poderes» para δύναμις plural, evitando reducirlo a «milagros».
  - Se conservó la metáfora de γεύομαι con «han gustado», sin explicarla más allá de lo que el contexto exige.
  - «Siglo venidero» traduce αἰών con un registro escatológico comprensible en español; la nota ofrece la alternativa «edad venidera».
  - La referencia a θεοῦ ῥῆμα se deja sintácticamente condensada para evitar introducir un sustantivo innecesario en el texto principal; la nota aclara la alternativa más explícita.
