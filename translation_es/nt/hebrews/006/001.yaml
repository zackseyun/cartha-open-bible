translation:
  language: es
  text: Por tanto, dejando el mensaje elemental[a] acerca del Mesías, seamos llevados adelante[c] hacia la madurez[b], sin echar otra vez el fundamento del arrepentimiento de obras muertas y de fe hacia Dios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mensaje del comienzo del Mesías» o «la enseñanza básica acerca del Mesías».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a la perfección» o «a la plenitud».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «avancemos»; el griego, más literalmente, tiene sentido pasivo: «seamos llevados adelante» o «seamos impulsados».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «fe en Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa la conclusión inferencial de modo natural en español y conserva el valor exhortativo del contexto.
- source_word: ἀφέντες
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - habiendo dejado
  - apartando
  lexicon: BDAG
  rationale: El participio aoristo indica dejar atrás el tema previo para avanzar; 'dejando' mantiene la idea de transición sin sugerir abandono definitivo.
- source_word: τὸν τῆς ἀρχῆς τοῦ Χριστοῦ λόγον
  english_pob_choice: the elementary message about the Messiah
  chosen_spanish: el mensaje elemental acerca del Mesías
  alternatives_spanish:
  - la enseñanza básica acerca del Mesías
  - el mensaje de los principios del Mesías
  - la palabra inicial acerca del Mesías
  lexicon: BDAG
  rationale: λόγος aquí funciona como mensaje/enseñanza, y ἀρχή en contexto apunta a lo elemental o inicial. 'Mesías' sigue el criterio POB para Χριστός como título.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se trata del título, no de un nombre litúrgico fijo; en este contexto 'Mesías' preserva mejor el valor semántico del griego.
- source_word: ἐπὶ τὴν τελειότητα
  english_pob_choice: to maturity
  chosen_spanish: hacia la madurez
  alternatives_spanish:
  - a la perfección
  - hacia la plenitud
  - a la madurez
  lexicon: BDAG
  rationale: τελειότης alude a plenitud/desarrollo completo en un marco exhortativo; 'madurez' comunica bien esa progresión espiritual sin cargarla con la idea de impecabilidad absoluta.
- source_word: φερώμεθα
  english_pob_choice: let us be carried on
  chosen_spanish: avancemos
  alternatives_spanish:
  - seamos llevados adelante
  - dejémonos llevar
  - seamos conducidos adelante
  lexicon: BDAG
  rationale: Aunque el griego conserva una voz pasiva exhortativa, en español una pasiva literal suena pesada; 'avancemos' comunica la progresión requerida, con conciencia de que el original no usa un simple activo voluntarista.
- source_word: μὴ πάλιν θεμέλιον καταβαλλόμενοι
  english_pob_choice: not laying again a foundation
  chosen_spanish: no echando otra vez el fundamento
  alternatives_spanish:
  - no poniendo de nuevo un fundamento
  - sin volver a poner el fundamento
  lexicon: BDAG
  rationale: La metáfora de construcción se conserva con 'echar el fundamento', una fórmula clara y natural en español bíblico contemporáneo.
- source_word: μετανοίας ἀπὸ νεκρῶν ἔργων
  english_pob_choice: repentance from dead works
  chosen_spanish: del arrepentimiento de obras muertas
  alternatives_spanish:
  - del arrepentimiento de obras muertas
  - del cambio de mente respecto de obras muertas
  - de arrepentirse de obras muertas
  lexicon: BDAG
  rationale: '''Arrepentimiento'' es el equivalente más directo y doctrinalmente transparente para μετάνοια en este contexto, y ''obras muertas'' conserva la metáfora sin reducirla.'
- source_word: πίστεως ἐπὶ θεόν
  english_pob_choice: faith toward God
  chosen_spanish: de la fe hacia Dios
  alternatives_spanish:
  - de la fe en Dios
  - de la confianza en Dios
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo puede sugerir dirección. 'Hacia Dios' preserva ese matiz sin impedir la lectura idiomática de fe dirigida a Dios.
theological_decisions:
- issue: How to render the exhortation to move beyond initial instruction without implying rejection of the foundation
  english_pob_reading: The phrase means leaving behind elementary instruction as the present focus in order to advance, not repudiating it.
  chosen_spanish_reading: Se traduce como una invitación a pasar de la instrucción elemental a la madurez, no como un rechazo del fundamento.
  alternative_spanish_readings:
  - dejando atrás la enseñanza cristiana básica en un sentido de ruptura
  - abandonando por completo el mensaje acerca de Cristo
  rationale: El versículo inmediatamente habla de no volver a poner el fundamento; por eso la idea es progresar, no negar lo anterior.
  doctrine_reference: Mantener la tensión exegética sin resolverla artificialmente; equivalencia óptima
translation_notes:
  revision_awareness: Se siguió el ajuste auditado que corrigió la idea de ἀρχή hacia 'elemental' en contexto y μετανοίας hacia 'arrepentimiento'; además, se conservó la tensión entre el pasivo griego de φερώμεθα y una formulación española natural, y se mantuvo 'Mesías' conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - '''Mesías'' se usa para Χριστός como título, no como nombre propio litúrgico.'
  - '''Obras muertas'' se conserva como metáfora compacta y auditable para νεκρῶν ἔργων.'
  - '''Hacia Dios'' preserva el matiz direccional de ἐπὶ θεόν y queda armonizado con la nota alternativa ''fe en Dios''.'
  - '''Madurez'' evita sobreinterpretar τελειότης como impecabilidad moral absoluta.'
