translation:
  language: es
  text: instrucción acerca de lavamientos[a], la imposición de manos, la resurrección de los muertos y el juicio eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción acerca de bautismos». El plural griego puede referirse a lavamientos rituales en sentido más amplio, no necesariamente al bautismo cristiano.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαπτισμῶν
  english_pob_choice: washings
  chosen_spanish: lavamientos
  alternatives_spanish:
  - bautismos
  - abluciones
  lexicon: BDAG
  rationale: El plural griego puede referirse a lavamientos rituales en sentido amplio, no necesariamente al bautismo cristiano. En español, «lavamientos» conserva ese valor ritual y evita fijar de antemano una lectura sacramental más estrecha. «Bautismos» también sería posible, pero en este contexto podría sugerir repetición de un rito cristiano específico.
- source_word: διδαχὴν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - doctrina
  lexicon: BDAG
  rationale: «Instrucción» reproduce bien el matiz de formación básica o catequética en una lista de fundamentos. «Doctrina» suena más eclesiástico de lo que exige el griego aquí; «enseñanza» también es viable, pero «instrucción» enlaza mejor con la serie de elementos enumerados.
- source_word: ἐπιθέσεώς τε χειρῶν
  english_pob_choice: the laying on of hands
  chosen_spanish: la imposición de manos
  alternatives_spanish:
  - el poner de manos
  - la colocación de manos
  lexicon: BDAG
  rationale: Es la expresión idiomática normal en español para este acto ritual. Conserva la referencia práctica reconocible del griego sin añadir interpretación.
- source_word: ἀναστάσεώς τε νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de los difuntos
  - la resurrección de los que han muerto
  lexicon: BDAG
  rationale: La construcción griega colectiva se expresa de forma natural con «los muertos» en español. Mantiene el sentido tradicional y la referencia general a la resurrección escatológica.
- source_word: κρίματος αἰωνίου
  english_pob_choice: eternal judgment
  chosen_spanish: el juicio eterno
  alternatives_spanish:
  - el juicio perpetuo
  - el juicio del siglo venidero
  lexicon: BDAG
  rationale: «Juicio» traduce κρίμα sin convertirlo en «condenación», que sería más específico de lo que dice el texto. «Eterno» conserva el valor de αἰώνιος en este contexto escatológico y no fuerza una especificación doctrinal adicional.
theological_decisions:
- issue: Sentido de βαπτισμῶν en la serie de fundamentos
  english_pob_reading: Rendered as 'washings' rather than 'baptisms.'
  chosen_spanish_reading: «lavamientos» en vez de «bautismos»
  alternative_spanish_readings:
  - «bautismos» como referencia al bautismo cristiano
  rationale: El plural griego y el audit trail inglés favorecen un sentido de lavamientos rituales más amplio. La traducción española preserva esa ambigüedad productiva y evita imponer una lectura denominacional demasiado estrecha.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de κρίματος αἰωνίου
  english_pob_reading: Rendered as 'eternal judgment' without specifying condemnation only.
  chosen_spanish_reading: «juicio eterno» sin añadir «condenación»
  alternative_spanish_readings:
  - «condenación eterna»
  rationale: El griego dice «juicio», no «condenación». La versión española conserva la tensión del texto y no restringe el resultado más de lo que el original permite.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés y no requiere revisión adicional; la versión española sigue la misma decisión léxica principal para βαπτισμῶν y conserva la serie enumerativa sin expansión interpretativa.
  spanish_consistency_notes:
  - 'Se mantuvo el orden enumerativo del griego y del inglés POB: instrucción, lavamientos, imposición de manos, resurrección de los muertos, juicio eterno.'
  - Se evitó «SEÑOR»/«Cristo» porque no aparecen en el versículo.
  - Se preservó la ambigüedad de βαπτισμῶν con una nota alternativa, siguiendo el criterio del POB inglés.
