translation:
  language: es
  text: Porque la tierra que bebe la lluvia que muchas veces cae sobre ella, y produce hierba útil para aquellos por cuya causa también es cultivada, recibe bendición de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "vegetación", "plantas" o "cosecha" para "hierba".
    reason: lexical_alternative
  - marker: b
    text: O "para quienes también es cultivada"; sin embargo, "por cuya causa también es cultivada" refleja mejor διά con acusativo aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: γῆ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  - campo
  lexicon: BDAG
  rationale: En español, "tierra" comunica bien una extensión cultivable sin restringirla al mero suelo físico. Mantiene la imagen agrícola amplia que en inglés se resolvió con "land".
- source_word: πιοῦσα
  english_pob_choice: drinks
  chosen_spanish: bebe
  alternatives_spanish:
  - habiendo bebido
  - absorbe
  lexicon: BDAG
  rationale: El participio es figurado y personifica la tierra como receptora de la lluvia. "Bebe" conserva esa vivacidad mejor que una formulación más técnica como "absorbe".
- source_word: τὸν ἐπ’ αὐτῆς ἐρχόμενον πολλάκις ὑετόν
  english_pob_choice: the rain that often comes upon it
  chosen_spanish: la lluvia que muchas veces cae sobre ella
  alternatives_spanish:
  - la lluvia que llega sobre ella con frecuencia
  - la lluvia que cae repetidas veces sobre ella
  lexicon: BDAG
  rationale: '"Muchas veces" reproduce πολλάκις con naturalidad. "Cae sobre ella" expresa de manera idiomática ἐρχόμενον ἐπ’ αὐτῆς, preservando el movimiento de la lluvia hacia la tierra.'
- source_word: τίκτουσα βοτάνην
  english_pob_choice: produces vegetation
  chosen_spanish: produce hierba
  alternatives_spanish:
  - produce vegetación
  - da plantas
  - hace brotar hierba
  lexicon: BDAG
  rationale: βοτάνη puede abarcar vegetación, herbage o cultivo. Aquí "hierba" mantiene amplitud suficiente en español y resulta más natural junto con el verbo agrícola que sigue, sin cerrarlo a un cultivo específico.
- source_word: εὔθετον
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - apta
  - adecuada
  - aprovechable
  lexicon: BDAG
  rationale: El adjetivo indica idoneidad o utilidad. "Útil" es la opción más directa y transparente en español, en paralelo con el uso práctico del terreno.
- source_word: ἐκείνοις δι’ οὓς καὶ γεωργεῖται
  english_pob_choice: to those for whose sake it is also cultivated
  chosen_spanish: para aquellos por cuya causa también es cultivada
  alternatives_spanish:
  - para aquellos por quienes también es cultivada
  - por aquellos por cuya causa es cultivada
  lexicon: BDAG
  rationale: διά con acusativo expresa causa/fin, no agencia. Por eso se mantiene "por cuya causa" en vez de convertirlo en una pasiva de agente. "También" refleja καί y conserva el vínculo con la labor agrícola anterior.
- source_word: γεωργεῖται
  english_pob_choice: it is also cultivated
  chosen_spanish: es cultivada
  alternatives_spanish:
  - es labrada
  - es trabajada
  - es cultivada también
  lexicon: BDAG
  rationale: '"Cultivada" es el equivalente más natural y amplio para γεωργεῖται en este contexto. Se evita "labrada" porque estrecha demasiado el sentido y puede sonar más rústico que el registro del pasaje.'
- source_word: μεταλαμβάνει
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - participa de
  - obtiene
  lexicon: BDAG
  rationale: El verbo expresa aquí el resultado favorable que le llega a la tierra. "Recibe" es claro y fiel, sin añadir matices sacramentales o metafóricos que no están en el texto.
- source_word: εὐλογίας ἀπὸ τοῦ θεοῦ
  english_pob_choice: blessing from God
  chosen_spanish: bendición de Dios
  alternatives_spanish:
  - bendición de parte de Dios
  - una bendición de Dios
  lexicon: BDAG
  rationale: La construcción se traduce naturalmente en español como "bendición de Dios". Se conserva la fuente divina sin sobrecargar la frase con una explicación innecesaria.
theological_decisions:
- issue: Metáfora agrícola en contexto de advertencia
  english_pob_reading: Retain the metaphor straightforwardly without importing a doctrinal conclusion about perseverance or apostasy into the translation.
  chosen_spanish_reading: Conservar la metáfora de manera directa, sin introducir en la traducción una conclusión doctrinal sobre perseverancia o apostasía.
  alternative_spanish_readings:
  - Traducir de forma interpretativa para señalar a creyentes verdaderos frente a falsos
  - Traducir de forma interpretativa para señalar el favor divino sobre creyentes fructíferos
  rationale: El versículo presenta el lado positivo de una analogía agrícola dentro de una sección exhortativa más amplia. La traducción debe dejar intacta la imagen y no resolver aquí debates teológicos que el griego no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene la lectura aprobada del inglés POB y la traslada al español con equivalentes idiomáticos y auditables.
  spanish_consistency_notes:
  - Se usó "bendición de Dios" para mantener la fórmula breve y natural.
  - '"Tierra" conserva el alcance amplio de land sin reducirlo a suelo técnico.'
  - '"Bebe" mantiene la personificación agrícola del participio griego.'
  - Se preservó la distinción de causa/fin en διά con acusativo mediante "por cuya causa".
