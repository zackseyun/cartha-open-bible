translation:
  language: es
  text: donde Jesús ha entrado como precursor por nosotros[a], habiendo llegado a ser sumo sacerdote para siempre, según el orden de Melquisedec[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en nuestro favor». La frase griega puede expresar acción para beneficio de otros; aquí resalta la entrada representativa de Jesús.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el orden de Melquisedec», en eco de Salmo 110:4.'
    reason: cross_reference
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - allí donde
  lexicon: BDAG
  rationale: Retoma el lugar referido en el versículo anterior y mantiene la relación locativa sin sobreexplicar el antecedente.
- source_word: πρόδρομος
  english_pob_choice: forerunner
  chosen_spanish: precursor
  alternatives_spanish:
  - forjador del camino
  - el que va delante
  lexicon: BDAG
  rationale: En español, "precursor" comunica la idea de quien va delante y abre camino. "Forerunner" sería un calco poco natural; "precursor" conserva la fuerza metafórica del término griego.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: on our behalf
  chosen_spanish: en nuestro favor
  alternatives_spanish:
  - por nosotros
  - a nuestro favor
  lexicon: BDAG
  rationale: La preposición ὑπέρ aquí expresa beneficio y representación. "En nuestro favor" preserva ese sentido sin convertirlo en una fórmula más fuerte de sustitución que el contexto inmediato no exige.
- source_word: εἰσῆλθεν
  english_pob_choice: has entered
  chosen_spanish: ha entrado
  alternatives_spanish:
  - entró
  - ha ingresado
  lexicon: BDAG
  rationale: El perfecto compuesto en español reproduce bien la acción pasada con relevancia presente en el argumento de Hebreos.
- source_word: κατὰ τὴν τάξιν Μελχισέδεκ
  english_pob_choice: according to the order of Melchizedek
  chosen_spanish: según el orden de Melquisedec
  alternatives_spanish:
  - en el orden de Melquisedec
  - conforme al orden de Melquisedec
  lexicon: BDAG
  rationale: '"Según" conserva la relación de correspondencia/apuntamiento con Salmo 110:4 y suena natural en español bíblico contemporáneo.'
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - gran sacerdote
  lexicon: BDAG
  rationale: '"Sumo sacerdote" es el equivalente bíblico y litúrgico estándar en español para el oficio cultual de Hebreos.'
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_spanish: habiendo llegado a ser
  alternatives_spanish:
  - habiendo sido hecho
  - siendo hecho
  lexicon: BDAG
  rationale: La forma participial se conserva como antecedente a la cláusula principal, indicando adquisición de estado/oficio, no cambio de naturaleza. "Llegado a ser" evita una lectura ontológica indebida.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: Expresa con claridad la duración permanente implícita en el modismo griego y es idiomático en español.
theological_decisions:
- issue: Función de ὑπὲρ ἡμῶν
  english_pob_reading: Rendered representationally as 'on our behalf.'
  chosen_spanish_reading: '"en nuestro favor" conserva el matiz de beneficio/representación.'
  alternative_spanish_readings:
  - por nosotros
  - en lugar de nosotros
  rationale: El contexto resalta que Jesús entra antes que los creyentes y a favor de ellos. "En nuestro favor" mantiene esa representación sin imponer una teoría expiatoria más específica que el texto no formula aquí.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación de γενόμενος con la cristología
  english_pob_reading: Retained 'having become a high priest' as an appointment-to-office statement, not a change in divine nature.
  chosen_spanish_reading: '"habiendo llegado a ser sumo sacerdote" expresa nombramiento u oficio, no cambio de naturaleza divina.'
  alternative_spanish_readings:
  - habiendo sido hecho sumo sacerdote
  - siendo constituido sumo sacerdote
  rationale: La traducción mantiene el participio y su valor de estado adquirido, evitando que el español sugiera origen creado o mutación esencial del Hijo.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)'
translation_notes:
  revision_awareness: La versión coincide con el pasaje fuente y con el audit trail inglés en una lectura de equivalencia óptima; no se registran revisiones aplicadas en el expediente más reciente.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Melquisedec» para la forma tradicional en español.
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se conserva «sumo sacerdote» como término técnico cultual, consistente con Hebreos.
  - La construcción verbal «habiendo llegado a ser» preserva el participio griego sin forzar una lectura doctrinal no presente en el verso.
