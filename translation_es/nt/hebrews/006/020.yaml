review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: Jesús entró donde estaba la esperanza anclada, como quien va delante de nosotros, y lo hizo como sumo sacerdote permanente según el orden de Melquisedec. Sin embargo, hay dos desajustes con la evidencia y el rastro POB. Primero, la nota [a] no preserva una alternativa real: repite «precursor», cuando el texto ya usa «precursor»; la nota inglesa relevante de cruce/intertexto está asociada a «according to the order of Melchizedek / in the order of Melchizedek», no a πρόδρομος. Segundo, «en nuestro favor» es comprensible, pero «por nosotros» o «a favor de nosotros» preserva menos matiz jurídico-abstracto y más claramente el valor representativo/benefactivo de ὑπὲρ ἡμῶν en este contexto. La revisión puede ser menor.'
  spanish_quality_summary: El español es claro, natural y digno. «Sumo sacerdote», «para siempre» y «según el orden de Melquisedec» funcionan bien. «Habiendo llegado a ser» es fiel pero algo pesado en la línea; «habiendo llegado a ser sumo sacerdote» sigue siendo aceptable y teológicamente prudente. La principal reparación necesaria está en las notas y en afinar ὑπὲρ ἡμῶν a una formulación más representativa y más directa en español bíblico.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Jesús» y «sumo sacerdote» están bien; no aparece vocabulario sensible como Yahvé/Mesías. «Melquisedec» es la forma española estándar. «Precursor» es aceptable para πρόδρομος, aunque «precursor» en nota no sirve como alternativa. Se debe preservar la nota intertextual/alternativa en «según el orden de Melquisedec».'
  issues:
  - severity: medium
    issue: La nota [a] es defectuosa y no corresponde al rastro inglés
    rationale: 'La nota actual dice «O: “precursor”», que no ofrece una alternativa distinta ni refleja la nota inglesa asociada al eco de Salmo 110:4 sobre «según/en el orden de Melquisedec».'
  - severity: low
    issue: «en nuestro favor» suena algo abstracto frente al matiz representativo de ὑπὲρ ἡμῶν
    rationale: Aunque no es incorrecto, «por nosotros» comunica de forma más directa en español el beneficio y la representación sin imponer sustitución fuerte.
  revised_spanish_text: donde Jesús ha entrado como precursor por nosotros[a], habiendo llegado a ser sumo sacerdote para siempre, según el orden de Melquisedec[b].
  revised_footnotes:
  - marker: a
    text: 'O: «en nuestro favor». La frase griega puede expresar acción para beneficio de otros; aquí resalta la entrada representativa de Jesús.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el orden de Melquisedec», en eco de Salmo 110:4.'
    reason: cross_reference
  revision_rationale: Se corrigen las notas para que reflejen fielmente el rastro POB y se ajusta ὑπὲρ ἡμῶν a «por nosotros», que en español comunica mejor el sentido benefactivo/representativo sin sobreinterpretar. El resto del texto se mantiene por ser fiel, claro y teológicamente cuidadoso.
