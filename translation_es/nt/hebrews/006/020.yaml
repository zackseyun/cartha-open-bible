- from: donde Jesús ha entrado como precursor[a] en nuestro favor[b], habiendo llegado a ser sumo sacerdote para siempre, según el orden de Melquisedec.
  to: donde Jesús ha entrado como precursor por nosotros[a], habiendo llegado a ser sumo sacerdote para siempre, según el orden de Melquisedec[b].
  rationale: Se corrigen las notas para que reflejen fielmente el rastro POB y se ajusta ὑπὲρ ἡμῶν a «por nosotros», que en español comunica mejor el sentido benefactivo/representativo sin sobreinterpretar. El resto del texto se mantiene por ser fiel, claro y teológicamente cuidadoso.
