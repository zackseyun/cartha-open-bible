  to: Porque Dios no es injusto como para olvidar la obra de ustedes y el amor que mostraron por su nombre, al haber servido a los santos[b] y al seguir sirviéndoles[c].
  rationale: Se corrigió «su obra» por «la obra de ustedes» para reflejar con claridad ὑμῶν y evitar la ambigüedad referencial. Se ajustó «para olvidar» a «como para olvidar» por mayor naturalidad en español. Se eliminó la nota a porque el inglés POB no conserva aquí una alternativa para «olvidar» y la nota c se rehízo para corresponder a la alternativa estructural documentada sobre los participios de servicio continuo.
