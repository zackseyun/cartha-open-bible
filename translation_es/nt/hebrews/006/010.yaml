  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Dios no es injusto para olvidar la obra y el amor manifestado hacia su nombre, expresado en servicio pasado y continuo a los santos. Sin embargo, «su obra» cambia indebidamente ὑμῶν («su/ vuestra») a singular posesivo ambiguo y puede leerse como obra de Dios; debe ser «la obra de ustedes» o equivalente. Además, la nota c no preserva fielmente la alternativa documentada en inglés para la construcción participial.'
  spanish_quality_summary: El español es claro y digno, pero «su obra» resulta ambiguo en español y menos natural en contexto. «Porque Dios no es injusto para olvidar…» es aceptable, aunque mejora con «como para olvidar». El resto fluye bien y mantiene la distinción entre servicio pasado y continuo.
  glossary_alignment: 'Alineación general buena: θεός -> «Dios», ἀγάπη -> «amor», ἅγιοι -> «santos». No hay conflicto con la terminología del proyecto. La corrección principal es gramatical y de fidelidad referencial en ὑμῶν.'
  issues:
  - severity: high
    issue: «su obra» no expresa claramente ὑμῶν
    rationale: El griego dice «vuestro/su obra» refiriéndose a los destinatarios. En español, «su obra» puede entenderse como la obra de Dios o de un tercero. Esto afecta la fidelidad del referente.
  - severity: medium
    issue: La nota c no corresponde a la alternativa preservada en el inglés POB
    rationale: 'La nota inglesa ofrece una alternativa de estructura completa: «by having served ... and by continuing to serve them». La española «mientras seguían sirviéndoles» introduce un matiz temporal distinto y no refleja esa alternativa documentada.'
  - severity: low
    issue: La construcción «para olvidar» suena menos idiomática que «como para olvidar»
    rationale: No es incorrecta, pero «como para olvidar» suena más natural y mantiene bien el sentido de οὐ ... ἐπιλαθέσθαι en esta construcción.
