translation:
  language: es
  text: Porque Dios no es injusto como para olvidar la obra de ustedes y el amor que mostraron por su nombre, al haber servido a los santos[b] y al seguir sirviéndoles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: Es decir, el pueblo santo de Dios; aquí «santos» se refiere a los creyentes, no a una clase posterior de canonizados.
    reason: cultural_note
  - marker: c
    text: O «al haber servido a los santos y al continuar sirviéndoles».
    reason: previous_rendering
lexical_decisions:
- source_word: ἄδικος
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - injusto
  - no recto
  lexicon: BDAG
  rationale: «Injusto» expresa de forma natural en español la afirmación de que Dios no actuaría contra la justicia al pasar por alto sus obras. «No recto» sería posible, pero suena menos idiomático y más débil en este contexto.
- source_word: ἐπιλαθέσθαι
  english_pob_choice: to forget
  chosen_spanish: olvidar
  alternatives_spanish:
  - olvidar
  - pasar por alto
  - dejar de tener en cuenta
  lexicon: BDAG
  rationale: El infinitivo significa «olvidar»; en contexto implica no dejar de tomar en cuenta lo hecho. «Olvidar» conserva el valor léxico directo y permite que la idea contextual se entienda sin añadir explicación indebida al texto principal.
- source_word: ἔργου
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - obra
  - trabajo
  - hecho
  lexicon: BDAG
  rationale: «Obra» funciona bien en español para ἔργον en singular colectivo y evita la repetición demasiado literal de «trabajo» junto con la frase sobre el amor expresado en servicio.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: Se mantiene el equivalente básico «amor», conforme al uso estándar del proyecto para ἀγάπη.
- source_word: ἐνεδείξασθε
  english_pob_choice: you showed
  chosen_spanish: mostraron
  alternatives_spanish:
  - mostraron
  - demostraron
  - manifestaron
  lexicon: BDAG
  rationale: El verbo expresa que hicieron evidente ese amor. «Mostraron» es natural en español y preserva el sentido de evidencia o manifestación sin volverlo demasiado técnico.
- source_word: εἰς τὸ ὄνομα αὐτοῦ
  english_pob_choice: for his name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - por su nombre
  - para su nombre
  - en favor de su nombre
  lexicon: BDAG
  rationale: La preposición εἰς aquí apunta a orientación o dedicación hacia el nombre de Dios. «Por su nombre» conserva la relación de causa/propósito y suena natural; las alternativas son posibles, pero más explicativas o menos fluidas. Se evita sustituir «nombre» por una paráfrasis como «honor», porque el texto conserva deliberadamente ese término bíblico.
- source_word: διακονήσαντες
  english_pob_choice: having served
  chosen_spanish: al haber servido
  alternatives_spanish:
  - al haber servido
  - habiendo servido
  - después de servir
  lexicon: BDAG
  rationale: El participio aoristo indica una acción pasada anterior al presente. «Al haber servido» reproduce bien esa relación temporal en español formal.
- source_word: τοῖς ἁγίοις
  english_pob_choice: the saints
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los santos
  - a los creyentes
  - a los fieles
  lexicon: BDAG
  rationale: «Santos» preserva el término neotestamentario sin convertirlo en una clase canónica posterior. Dado que el objeto del servicio está regido por la preposición implícita en la construcción española, se expresa como «a los santos».
- source_word: διακονοῦντες
  english_pob_choice: continuing to serve them
  chosen_spanish: al seguir sirviéndoles
  alternatives_spanish:
  - al seguir sirviéndoles
  - y sirviéndoles
  - mientras les servían
  lexicon: BDAG
  rationale: El participio presente destaca la acción continuada. «Al seguir sirviéndoles» refleja ese aspecto progresivo en un español claro y formal, manteniendo la distinción con el participio aoristo anterior.
theological_decisions:
- issue: Si el verso sugiere mérito humano o el reconocimiento fiel de Dios
  english_pob_reading: Dios no es injusto al no olvidar sus obras y su amor; el texto no dice que esas obras ganen la salvación.
  chosen_spanish_reading: Dios es presentado como justo al no olvidar la obra y el amor de los creyentes, sin insinuar que esas obras compren la salvación.
  alternative_spanish_readings:
  - Dios les debe recompensa por sus obras
  - sus obras merecen automáticamente la salvación
  rationale: El griego afirma la justicia de Dios para no olvidar. La traducción conserva esa afirmación sin introducir un lenguaje de mérito que el versículo no explicita.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de «santos»
  english_pob_reading: ‘Saints’ aquí se refiere al pueblo santo de Dios, no a una clase posterior de canonizados.
  chosen_spanish_reading: «Santos» se entiende como el pueblo santo de Dios, no como una categoría posterior de canonizados.
  alternative_spanish_readings:
  - los canonizados
  - los santos en sentido litúrgico
  rationale: En el contexto de Hebreos, ἅγιοι designa a los creyentes. Mantener «santos» respeta el término bíblico y evita una carga histórica ajena al pasaje.
  doctrine_reference: BDAG; usage in NT
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del texto inglés auditado, especialmente la secuencia participial final que distingue una acción pasada («al haber servido») de una acción continua («al seguir sirviéndoles»). Se evitó una paráfrasis excesiva y se mantuvo la referencia bíblica a «su nombre» y «los santos».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «santos» para ἁγίοις, conforme a la terminología del proyecto.
  - Se usa «injusto» para ἄδικος y «olvidar» para ἐπιλαθέσθαι, evitando suavizar la fuerza del juicio divino.
  - La estructura con «al haber servido... al seguir sirviéndoles» preserva la diferencia aspectual entre aoristo y presente.
  - «Por su nombre» conserva la metáfora bíblica sin reemplazarla por una explicación interpretativa dentro del texto principal.
