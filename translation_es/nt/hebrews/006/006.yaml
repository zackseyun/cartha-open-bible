translation:
  language: es
  text: y después de haber caído[a], renovarlos otra vez para arrepentimiento[b], crucificando de nuevo para sí mismos al Hijo de Dios y exponiéndolo a vergüenza pública.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘después de haber apostatado’. El verbo griego puede denotar un apartamiento grave o apostasía.
    reason: lexical_alternative
  - marker: b
    text: O ‘mientras crucifican de nuevo para sí mismos al Hijo de Dios y lo exponen a vergüenza pública’. Los participios griegos pueden entenderse tanto de modo contemporáneo como explicativo.
    reason: alternative_reading
lexical_decisions:
- source_word: παραπεσόντας
  english_pob_choice: have fallen away
  chosen_spanish: habiendo caído
  alternatives_spanish:
  - habiendo apostatado
  - habiendo caído lejos
  lexicon: BDAG
  rationale: El participio aoristo exige una forma participial en español que mantenga la dependencia sintáctica del contexto previo. 'Habiendo caído' conserva la imagen básica del desvío/grave caída sin convertir de antemano el término en un tecnicismo doctrinal fijo; la nota puede preservar la alternativa de apostasía que el inglés ya documenta.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: El adverbio modifica naturalmente ἀνακαινίζειν. 'Otra vez' es claro y natural en español para expresar repetición sin alterar la relación sintáctica.
- source_word: ἀνακαινίζειν
  english_pob_choice: to renew
  chosen_spanish: renovarlos
  alternatives_spanish:
  - restaurarlos
  - hacerlos nuevos
  lexicon: BDAG
  rationale: El infinitivo expresa renovar o restaurar a un estado anterior. En español, el objeto implícito se vuelve explícito con 'los' para mantener la fluidez y la referencia a los que han caído del contexto inmediato.
- source_word: εἰς μετάνοιαν
  english_pob_choice: to repentance
  chosen_spanish: para arrepentimiento
  alternatives_spanish:
  - hacia arrepentimiento
  - para una conversión de mente
  lexicon: BDAG
  rationale: Con εἰς, la frase indica meta o resultado. 'Para arrepentimiento' conserva ese rumbo en español y mantiene el término bíblico corriente; 'arrepentimiento' evita imponer una paráfrasis cognitiva donde el contexto no la exige.
- source_word: ἀνασταυροῦντας
  english_pob_choice: are crucifying again
  chosen_spanish: crucificando de nuevo
  alternatives_spanish:
  - recrucificando
  - crucificando otra vez
  lexicon: BDAG
  rationale: El participio presente conserva acción en curso. 'Crucificando de nuevo' transmite el valor repetitivo y el carácter explicativo del participio sin sonar excesivamente técnico.
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - a sí mismos
  - en su propio perjuicio
  lexicon: BDAG
  rationale: El dativo reflexivo señala referencia o interés afectado. 'Para sí mismos' es idiomático y reproduce bien la orientación reflexiva/culpable que el inglés POB preserva.
- source_word: τὸν υἱὸν τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: al Hijo de Dios
  alternatives_spanish:
  - al Hijo de Dios Padre
  - al Hijo de Dios
  lexicon: BDAG
  rationale: Es el título cristológico estándar y debe mantenerse de forma directa. El acusativo con artículo se expresa naturalmente con 'al' en español.
- source_word: παραδειγματίζοντας
  english_pob_choice: exposing him to public shame
  chosen_spanish: exponiéndolo a vergüenza pública
  alternatives_spanish:
  - haciéndolo objeto de escarnio público
  - poniéndolo en vergüenza pública
  lexicon: BDAG
  rationale: El verbo denota exposición pública a deshonra o vergüenza. 'Exponiéndolo a vergüenza pública' conserva la dimensión honor/vergüenza y suena transparente en español moderno.
theological_decisions:
- issue: Cómo reflejar el posible valor de apostasía en παραπεσόντας sin cerrar el debate doctrinal
  english_pob_reading: 'have fallen away; alternative note: ''have committed apostasy.'''
  chosen_spanish_reading: habiendo caído
  alternative_spanish_readings:
  - habiendo apostatado
  - habiendo cometido apostasía
  rationale: La frase principal mantiene el sentido de una caída grave y real, pero no impone un rótulo doctrinal técnico en el texto principal. La alternativa queda documentada en nota para preservar la tensión teológica que el inglés ya reconoce.
  doctrine_reference: Preservar la tensión sin resolverla denominacionalmente; cf. Hebreos 6:4–6.
- issue: Relación sintáctica de los participios con el infinitivo del versículo
  english_pob_reading: The participles may be taken as contemporaneous as well as explanatory.
  chosen_spanish_reading: crucificando de nuevo ... y exponiéndolo a vergüenza pública
  alternative_spanish_readings:
  - mientras crucifican de nuevo ... y lo exponen a vergüenza pública
  - puesto que están crucificando de nuevo ... y exponiéndolo a vergüenza pública
  rationale: El español permite conservar la fuerza explicativa sin sobreespecificar la lógica con una conjunción que no está en el griego. La forma participial coordena bien con el infinitivo 'renovarlos' y deja abierta la relación temporal/explicativa, como indica el audit trail.
  doctrine_reference: Mantener la ambigüedad gramatical del griego donde no hay determinación inequívoca.
- issue: 'Cómo traducir μετάνοιαν: término teológico tradicional versus fuerza semántica'
  english_pob_reading: repentance
  chosen_spanish_reading: arrepentimiento
  alternative_spanish_readings:
  - cambio de mente
  - conversión
  rationale: '''Arrepentimiento'' es la equivalencia más estable y transparente en español eclesial contemporáneo. Aunque μετάνοια puede tener matiz de cambio de mente, aquí el contexto exhortativo y el uso bíblico favorecen el término tradicional sin perder exactitud.'
  doctrine_reference: No sustituir el término bíblico por una paráfrasis reductiva salvo necesidad clara de claridad.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al reflejar el participio de παραπεσόντας con una construcción participial ('habiendo caído') y al usar 'arrepentimiento' para μετάνοιαν, en lugar de una paráfrasis cognitiva. También conserva la explicación causal/participial de los dos participios finales sin fijar de manera exclusiva una lectura temporal.
  spanish_consistency_notes:
  - Se mantiene 'Hijo de Dios' como título cristológico directo, sin sustituirlo por una formulación más interpretativa.
  - '''Vergüenza pública'' conserva la dimensión honor/deshonor del verbo παραδειγματίζω.'
  - La sintaxis española deja claro que la cláusula depende del contexto inmediato de Hebreos 6:4–6, sin repetir explícitamente 'es imposible', tal como el texto griego.
  - Se evita 'SEÑOR' y otras sustituciones convencionales porque aquí no aparece el tetragrámaton ni κύριος en la forma de cita relevante.
