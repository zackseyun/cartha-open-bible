translation:
  language: es
  text: Porque cuando Dios hizo la promesa a Abraham[a], como no podía jurar por nadie mayor, juró por sí mismo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más simplemente: «cuando Dios prometió a Abraham».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pues no tenía a nadie mayor por quien jurar».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπαγγειλάμενος
  english_pob_choice: made the promise
  chosen_spanish: hizo la promesa
  alternatives_spanish:
  - prometió
  lexicon: BDAG
  rationale: El participio aoristo medio de ἐπαγγέλλομαι expresa el acto de prometer. «Hizo la promesa» conserva el valor verbal y suena natural en español sin perder la referencia al acto formal de prometer.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: como
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de que Dios jurara por sí mismo. «Como» funciona de manera causal en español y mantiene un tono fluido y sobrio.
- source_word: κατ’ οὐδενὸς ... μείζονος
  english_pob_choice: no one greater
  chosen_spanish: a nadie mayor
  alternatives_spanish:
  - por nadie mayor
  - por ninguna persona mayor
  lexicon: BDAG
  rationale: El contexto es de juramento y apunta a un referente personal; por eso «nadie mayor» reproduce bien el sentido idiomático del griego y la lógica del pasaje.
- source_word: ὀμόσαι
  english_pob_choice: to swear
  chosen_spanish: jurar
  alternatives_spanish:
  - hacer juramento
  - prestar juramento
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la acción de jurar. «Jurar» es la equivalencia directa y preserva la relación léxica con «juró» en la segunda mitad del versículo.
- source_word: ὤμοσεν
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo juramento
  lexicon: BDAG
  rationale: El aoristo activo de ὀμνύω se vierte con el verbo común «juró», que es conciso y mantiene el paralelismo con el infinitivo anterior.
- source_word: καθ’ ἑαυτοῦ
  english_pob_choice: by himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - en sí mismo
  - por su propia persona
  lexicon: BDAG
  rationale: La fórmula juramentaria griega con κατά + reflexivo se expresa naturalmente en español con «por sí mismo», que conserva la fuerza teológica de la autoafirmación divina.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula enlaza con el argumento precedente como explicación. «Porque» es la conexión causal más clara y natural en español.
- source_word: Τῷ ... Ἀβραὰμ
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: BDAG
  rationale: El dativo con ἐπαγγειλάμενος marca al destinatario de la promesa; «a Abraham» transmite de forma directa esa relación.
theological_decisions:
- issue: Juramento divino por sí mismo
  english_pob_reading: God swore by himself because there was no one greater by whom he could swear.
  chosen_spanish_reading: Dios juró por sí mismo porque no tenía a nadie mayor por quien jurar.
  alternative_spanish_readings:
  - Dios juró por sí mismo, pues no había nadie mayor por quien pudiera jurar.
  - Dios juró por sí mismo, ya que no tenía a nadie superior por quien jurar.
  rationale: La traducción conserva la supremacía única de Dios sin añadir formulaciones doctrinales externas. «Por sí mismo» mantiene la fuerza del juramento autosuficiente y «nadie mayor» refleja el contraste jerárquico del texto.
  doctrine_reference: Hebreos 6:13; afirmación sobre la supremacía de Dios en el acto de jurar
- issue: Relación entre promesa y juramento
  english_pob_reading: For when God made the promise to Abraham, since he could swear by no one greater, he swore by himself.
  chosen_spanish_reading: Porque cuando Dios hizo la promesa a Abraham, como no tenía a nadie mayor por quien jurar, juró por sí mismo.
  alternative_spanish_readings:
  - Porque cuando Dios prometió a Abraham, como no tenía a nadie mayor por quien jurar, juró por sí mismo.
  rationale: Se conserva la distinción entre la promesa inicial y el juramento posterior, tal como la estructura del verso lo presenta. No se fusionan ambos actos en una sola idea para no borrar la progresión argumental.
  doctrine_reference: Hebreos 6:13; estructura argumental del juramento y la promesa
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: ἐπαγγειλάμενος se mantiene como «hizo la promesa»; ἐπεὶ se vierte causalmente; κατ’ οὐδενὸς μείζονος se conserva como «a nadie mayor» para reflejar el idiomatismo del juramento; ὀμόσαι/ὤμοσεν se tradujeron con el par léxico «jurar/juró»; καθ’ ἑαυτοῦ se expresó como «por sí mismo» para preservar la autoafirmación divina. No se introdujeron términos eclesiásticos ajenos al texto ni se suavizó la fuerza del juramento.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - «Dios» se emplea sin sustitución por «SEÑOR» porque el griego dice ὁ θεός.
  - El paralelismo promesa/juramento queda visible en español mediante «hizo la promesa» y «juró».
  - Las notas al pie conservan la alternativa lexical documentada por la POB inglesa.
