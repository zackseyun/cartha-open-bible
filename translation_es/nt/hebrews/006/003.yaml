- from: Y esto lo[h]aremos, si en verdad Dios lo permite.
  to: Y esto haremos[a], si en verdad Dios permite.
  rationale: Se corrige la nota al marcador secuencial requerido, se mueve el anclaje a una posición natural y se elimina el objeto añadido «lo» para ceñirse mejor al griego. Se conserva «si en verdad» como intento válido de reflejar el énfasis de ἐάνπερ sin convertir la cláusula en una fórmula idiomática.
