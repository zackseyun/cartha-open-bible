translation:
  language: es
  text: 'diciendo[a]: «Ciertamente te bendeciré y ciertamente te multiplicaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «bendiciendo te bendeciré, y multiplicando te multiplicaré», una construcción enfática que hace eco de Génesis 22:17.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijo
  lexicon: BDAG
  rationale: El participio presente introduce la cita de la promesa jurada; «diciendo» conserva de forma natural esa función introductoria sin añadir sentido ajeno.
- source_word: Εἰ μὴν
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - Seguro
  lexicon: BDAG
  rationale: La combinación funciona como una fuerte aseveración en lenguaje de juramento, no como condicional literal. «Ciertamente» comunica bien esa fuerza en español actual.
- source_word: εὐλογῶν εὐλογήσω
  english_pob_choice: I will bless
  chosen_spanish: te bendeciré
  alternatives_spanish:
  - bendiciéndote te bendeciré
  - te bendeciré ciertamente
  lexicon: BDAG
  rationale: La duplicación participio+verbo refleja un giro semítico enfático, paralelo a la fórmula de Génesis 22:17. En el texto principal, el futuro simple español es más natural; la nota conserva la intensificación formal.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Pronombre de objeto directo singular, dirigido a Abraham en la cita prometida.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y además
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple que enlaza las dos acciones prometidas.
- source_word: πληθύνων πληθυνῶ
  english_pob_choice: multiply you
  chosen_spanish: te multiplicaré
  alternatives_spanish:
  - te multiplicaré grandemente
  - multiplicándote te multiplicaré
  - te haré numeroso
  lexicon: BDAG
  rationale: Se conserva el verbo directo «multiplicar» para mantener la alusión a la promesa abrahámica. La repetición enfática se refleja con el adverbio «ciertamente» en el texto principal y con la nota alternativa.
theological_decisions:
- issue: Cómo rendir la fórmula enfática de juramento citada de la promesa a Abraham
  english_pob_reading: Use idiomatic English ('Surely I will bless you and surely multiply you') while preserving the underlying emphatic duplication in a footnote.
  chosen_spanish_reading: Usar español natural («Ciertamente te bendeciré y ciertamente te multiplicaré») y preservar la duplicación enfática en una nota.
  alternative_spanish_readings:
  - «Ciertamente, bendiciendo te bendeciré y multiplicando te multiplicaré»
  - «Ciertamente te bendeciré y te multiplicaré grandemente»
  rationale: La cita reproduce una fórmula solemne de promesa jurada con duplicación enfática de los verbos. El texto principal debe leerse con fluidez, pero la nota mantiene visible la intensificación formal y la intertextualidad con Génesis 22:17.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado para repetir «surely» antes de «multiply you»; la versión española refleja ese mismo incremento enfático con la repetición de «ciertamente» en ambas cláusulas y mantiene la alusión al lenguaje de promesa de Génesis.
  spanish_consistency_notes:
  - Se mantiene «bendeciré» y «multiplicaré» con futuro simple por naturalidad idiomática, sin perder la duplicación enfática señalada en la nota.
  - «Te» conserva el objeto directo singular dirigido a Abraham, coherente con la cita bíblica.
  - La nota al pie usa la construcción participial más formal para transparentar la estructura subyacente del griego/LXX.
