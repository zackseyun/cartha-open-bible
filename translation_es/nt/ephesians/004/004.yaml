translation:
  language: es
  text: Hay un solo cuerpo y un solo Espíritu[a], así como ustedes también fueron llamados en una sola esperanza de su llamamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'espíritu'. El término griego puede significar 'espíritu' o 'Espíritu'; aquí probablemente se refiere al Espíritu Santo dentro de la fórmula de unidad del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: un / una sola
  alternatives_spanish:
  - uno
  - único
  - un solo
  lexicon: BDAG
  rationale: En español conviene variar según el sustantivo para mantener concordancia natural; aquí se usa 'un solo' / 'una sola' para conservar el énfasis repetido de unidad que el griego marca con ἓν.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  - cuerpo corporativo
  lexicon: BDAG
  rationale: '''Cuerpo'' es el equivalente directo y preserva la metáfora de unidad sin explicitar más de lo que el texto dice. El matiz corporativo queda implícito por el contexto de Efesios.'
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Se capitaliza como 'Espíritu' porque el contexto de Efesios 4:4–6 apunta al Espíritu Santo dentro de la fórmula de unidad; sin embargo, se mantiene la posibilidad léxica de 'espíritu' en la nota para no borrar la ambigüedad griega.
- source_word: καθὼς καὶ
  english_pob_choice: just as you also
  chosen_spanish: así como también
  alternatives_spanish:
  - tal como también
  - del mismo modo que también
  lexicon: BDAG
  rationale: '''Así como también'' comunica la relación comparativa y la partícula aditiva καί de manera natural en español, sin endurecer la sintaxis.'
- source_word: ἐκλήθητε
  english_pob_choice: were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - recibieron el llamado
  lexicon: BDAG
  rationale: Se conserva el pasivo aoristo de καλέω con una forma idiomática en español. 'Fueron llamados' mantiene la pasividad divina implícita sin añadir un agente explícito.
- source_word: ἐν μιᾷ ἐλπίδι
  english_pob_choice: in one hope
  chosen_spanish: en una sola esperanza
  alternatives_spanish:
  - en una esperanza única
  - hacia una sola esperanza
  lexicon: BDAG
  rationale: '''En una sola esperanza'' sigue de cerca la construcción preposicional griega y conserva el motivo de unidad; ''una sola'' refuerza el paralelo con ''un solo cuerpo'' y ''un solo Espíritu''.'
- source_word: τῆς κλήσεως ὑμῶν
  english_pob_choice: of your calling
  chosen_spanish: de su llamado
  alternatives_spanish:
  - de su vocación
  - del llamado que recibieron
  lexicon: BDAG
  rationale: '''Llamado'' traduce κλῆσις con transparencia y es más natural en español que ''vocación'' en este contexto. Se usa ''su'' en una forma de cortesía/plural contextual para dirigir el texto a los lectores; el vínculo genitivo con el llamado se mantiene.'
theological_decisions:
- issue: Referencia de πνεῦμα
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu
  - un espíritu común
  rationale: 'La estructura de Efesios 4:4–6 favorece una lectura trinitaria: un solo cuerpo, un solo Espíritu, un solo Señor, un solo Dios y Padre. Por eso la traducción principal usa ''Espíritu'' con mayúscula y la nota documenta la alternativa léxica.'
  doctrine_reference: Nicene Creed (381); traducción con tensión teológica preservada
- issue: Relación entre κλῆσις y ἐκλήθητε
  english_pob_reading: of your calling
  chosen_spanish_reading: de su llamado
  alternative_spanish_readings:
  - del llamado al que fueron llamados
  - de la vocación que recibieron
  rationale: El griego conserva deliberadamente la conexión entre 'fueron llamados' y 'llamado'. La traducción mantiene ese enlace sin resolverlo en una paráfrasis más explícita.
  doctrine_reference: Principio de transparencia léxica de POB
translation_notes:
  revision_awareness: El pasaje fue revisado y quedó sin cambios en el último pase; el acuerdo de revisión es alto y no se registraron correcciones posteriores. La versión española sigue esa estabilidad textual y mantiene la misma decisión interpretativa principal sobre πνεῦμα.
  spanish_consistency_notes:
  - Se mantiene 'llamado' para κλῆσις a fin de conservar la familia léxica con 'llamados'.
  - Se usa 'un solo/una sola' para reforzar la repetición de unidad presente en el griego.
  - Se capitaliza 'Espíritu' en el texto principal, pero se documenta la alternativa 'espíritu' en nota para preservar la tensión lexical.
