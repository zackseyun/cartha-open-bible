    issue: Discordancia de registro en 'ustedes ... de su llamado'
    rationale: Aunque 'su' puede referirse a 'ustedes', en este contexto suena menos directo y algo distante. Un ajuste mejora la coherencia del español contemporáneo amplio.
  - severity: medium
    issue: Posición poco natural de 'también' en 'así como también ustedes fueron llamados'
    rationale: El griego καθώς καὶ vincula el adverbio con los destinatarios/cláusula; en español suena mejor 'así como ustedes también fueron llamados'.
  - severity: low
    issue: '''llamado'' como sustantivo es entendible pero menos estable que ''llamamiento'' en estilo bíblico moderno-digno'
    rationale: '''Llamamiento'' preserva mejor la relación con κλῆσις y reduce la posible lectura coloquial o ambigua de ''llamado''.'
  revised_spanish_text: Hay un solo cuerpo y un solo Espíritu[a], así como ustedes también fueron llamados en una sola esperanza de su llamamiento.
