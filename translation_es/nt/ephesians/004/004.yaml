review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB en casi todo: mantiene la triple/unificada repetición de ''uno'', preserva ''cuerpo'', interpreta πνεῦμα como ''Espíritu'' con nota de alternativa, y conserva la relación léxica entre ἐκλήθητε y κλήσεως. La principal desviación está en ''de su llamado'', que en español con ''ustedes'' crea discordancia de registro; debe ser ''de su llamamiento'' o ''de su llamado'' con ''su'' ajustado mejor al español del conjunto. También conviene mejorar la fluidez de ''así como también ustedes fueron llamados'' a ''así como ustedes también fueron llamados'', que refleja mejor καθώς καὶ.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero 'de su llamado' suena algo rígido y ambiguo en español eclesial amplio, y la posición de 'también' es menos idiomática que la alternativa. 'Llamamiento' suena más digno y evita la ambigüedad de 'llamado' como sustantivo menos estable, mientras conserva el vínculo con 'fueron llamados'.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ''Espíritu'' está bien justificado; no aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión sobre πνεῦμα y la nota léxica están bien alineadas con POB. La revisión propuesta mantiene la transparencia léxica entre καλέω/κλῆσις con ''fueron llamados'' / ''llamamiento''.'
  issues:
