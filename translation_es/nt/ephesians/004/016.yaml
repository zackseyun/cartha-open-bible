revisions:
- from: procedente de quien todo el cuerpo[a], bien concertado y unido por medio de todo vínculo de provisión[b], según la acción[c] proporcionada de cada una[d] de las partes, hace crecer el cuerpo para edificarse en amor.
  to: de quien todo el cuerpo[a], bien concertado y unido por medio de toda articulación de provisión[b], según el obrar en medida de cada parte individual[c], hace crecer el cuerpo para edificarse en amor.
  rationale: 'La revisión corrige tres puntos principales: (1) simplifica «procedente de quien» a «de quien», que sigue siendo personal y natural; (2) restituye la imagen corporal concreta con «articulación de provisión», en línea con la decisión inglesa de no abstractar ἁφή; y (3) rehace la frase de ἐνέργεια/μέτρον para reflejar mejor el obrar proporcionado de cada parte individual sin introducir la interpretación «apropiado/proper». Se elimina además una nota redundante.'
