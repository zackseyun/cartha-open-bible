translation:
  language: es
  text: de quien todo el cuerpo[a], bien concertado y unido por medio de toda articulación de provisión[b], según el obrar en medida de cada parte individual[c], hace crecer el cuerpo para edificarse en amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cuerpo entero».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «articulación de provisión», «vínculo de suministro», «ligamento de apoyo» o «conexión que suministra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «según la actividad en medida de cada parte individual» o «según el funcionamiento en la medida de cada parte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ οὗ
  english_pob_choice: from whom
  chosen_spanish: procedente de quien
  alternatives_spanish:
  - de quien
  - del cual
  lexicon: BDAG
  rationale: El antecedente inmediato es personal y masculino, por lo que conviene conservar la referencia a Cristo con un relativo personal. «Procedente de quien» expresa el origen sin sonar forzado en español.
- source_word: πᾶν τὸ σῶμα
  english_pob_choice: the whole body
  chosen_spanish: todo el cuerpo
  alternatives_spanish:
  - el cuerpo entero
  - todo el organismo
  lexicon: BDAG
  rationale: La imagen corporal colectiva se mantiene con un español natural y claro. «Todo el cuerpo» conserva la unidad del conjunto sin añadir matices médicos no explícitos.
- source_word: συναρμολογούμενον
  english_pob_choice: being joined together
  chosen_spanish: bien concertado
  alternatives_spanish:
  - unido
  - ajustado
  lexicon: BDAG
  rationale: El participio comunica la idea de piezas ensambladas en una unidad coherente. «Bien concertado» preserva el sentido de ajuste/ensamblaje de modo idiomático en español y mantiene la imagen de integración.
- source_word: συμβιβαζόμενον
  english_pob_choice: held together
  chosen_spanish: unido
  alternatives_spanish:
  - mantenido unido
  - trabado
  lexicon: BDAG
  rationale: La idea central es cohesión o integración del cuerpo. «Unido» es la forma más clara en español; el doblete con «bien concertado» evita perder la segunda idea de cohesión.
- source_word: διὰ πάσης ἁφῆς τῆς ἐπιχορηγίας
  english_pob_choice: through every supporting joint
  chosen_spanish: por medio de todo vínculo de provisión
  alternatives_spanish:
  - por medio de toda articulación de provisión
  - por medio de todo vínculo de suministro
  - por medio de toda unión de provisión
  lexicon: BDAG
  rationale: ἁφή puede referir a un punto de unión/contacto, y ἐπιχορηγία añade la noción de provisión o suministro. «Vínculo de provisión» conserva la imagen de unión y la idea de suministro sin imponer «articulación» como si el sentido anatómico fuera seguro.
- source_word: κατ’ ἐνέργειαν
  english_pob_choice: according to the working
  chosen_spanish: según la acción
  alternatives_spanish:
  - según la energía
  - conforme a la actividad
  - según el obrar
  lexicon: BDAG
  rationale: ἐνέργεια denota actividad eficaz, operación o acción. «Según la acción» comunica el carácter operativo sin recargar el texto con un tecnicismo innecesario.
- source_word: ἐν μέτρῳ ἑνὸς ἑκάστου μέρους
  english_pob_choice: in measure of each individual part
  chosen_spanish: proporcionada de cada una de las partes
  alternatives_spanish:
  - medida de cada parte
  - según la medida de cada una de las partes
  - en medida de cada parte individual
  lexicon: BDAG
  rationale: La frase expresa proporcionalidad en el funcionamiento de cada parte. «Proporcionada de cada una de las partes» intenta reproducir esa relación sin un calco torpe; el femenino plural en español se ajusta a «partes».
- source_word: τὴν αὔξησιν τοῦ σώματος ποιεῖται
  english_pob_choice: makes the body's growth
  chosen_spanish: hace crecer el cuerpo
  alternatives_spanish:
  - causa el crecimiento del cuerpo
  - produce el crecimiento del cuerpo
  - hace la crecimiento del cuerpo
  lexicon: BDAG
  rationale: El griego usa un verbo de realización/producción con el sustantivo crecimiento. «Hace crecer el cuerpo» es la forma más natural y fiel para expresar el resultado sin perder la agencia del proceso.
- source_word: εἰς οἰκοδομὴν ἑαυτοῦ
  english_pob_choice: for building itself up
  chosen_spanish: para edificarse
  alternatives_spanish:
  - para su propia edificación
  - para edificarse a sí mismo
  - para construirse
  lexicon: BDAG
  rationale: οἰκοδομή mantiene la metáfora de edificación. «Edificarse» conserva el reflexivo de ἑαυτοῦ y suena natural en español eclesial contemporáneo.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en el amor
  - con amor
  lexicon: BDAG
  rationale: Se mantiene el valor relacional y teológico de ἀγάπη con una expresión directa y estándar. «En amor» es breve y fiel al cierre paulino.
theological_decisions:
- issue: Cristo como fuente del crecimiento del cuerpo
  english_pob_reading: from whom the whole body ... causes the growth of the body
  chosen_spanish_reading: procedente de quien todo el cuerpo ... hace crecer el cuerpo
  alternative_spanish_readings:
  - de quien todo el cuerpo ...
  - del cual todo el cuerpo ...
  rationale: El antecedente es Cristo en el contexto inmediato; la traducción personaliza correctamente el relativo y evita una lectura impersonal. La formulación conserva que el crecimiento deriva de él y no solo de la estructura interna del cuerpo.
  doctrine_reference: Translation philosophy §3
- issue: Cooperación orgánica de las partes del cuerpo
  english_pob_reading: being joined together and held together through every supporting joint ... according to the working in measure of each individual part
  chosen_spanish_reading: bien concertado y unido por medio de todo vínculo de provisión ... según la acción proporcionada de cada una de las partes
  alternative_spanish_readings:
  - unido y sostenido por todo vínculo de suministro
  - ajustado y mantenido unido por toda articulación de provisión
  rationale: La imagen paulina combina cohesión corporal y aporte de cada miembro. La versión española conserva ambas dimensiones sin desmaterializar el cuerpo en una simple abstracción de organización.
  doctrine_reference: Translation philosophy §6
- issue: Sentido de οἰκοδομή en el cierre del versículo
  english_pob_reading: for building itself up
  chosen_spanish_reading: para edificarse
  alternative_spanish_readings:
  - para su edificación
  - para la edificación de sí mismo
  rationale: La metáfora de edificación es importante en Efesios y debe mantenerse. «Edificarse» conserva el reflexivo y el lenguaje bíblico sin forzar un giro más explicativo que el griego no exige.
  doctrine_reference: Affirmations; Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés del POB revisó la frase de κατ’ ἐνέργειαν ἐν μέτρῳ para evitar «working in measure» como calco torpe, y también promovió la idea de «causes the growth of the body» como formulación más natural. En español se decidió conservar la proporcionalidad con «según la acción proporcionada» y la imagen de resultado con «hace crecer el cuerpo», sin depender de una traducción mecánica del inglés auditado.
  spanish_consistency_notes:
  - Se usa «cuerpo» para σῶμα y «edificarse» para οἰκοδομή, coherente con el registro bíblico del contexto.
  - Se evitó «Cristo» en el cuerpo principal porque el antecedente inmediato es pronominal; la nota teológica preserva la referencia cristológica implícita.
  - Se mantuvo un tono formal y publicable, con sintaxis fluida en español latinoamericano.
  - Las alternativas en notas reflejan ambigüedades reales del griego, especialmente en ἁφή/ἐπιχορηγία y en la proporcionalidad de ἐν μέτρῳ.
