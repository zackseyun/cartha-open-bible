review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo: Cristo como fuente personal («de quien»), el cuerpo entero como sujeto, la doble idea de ensamblaje/cohesión, el crecimiento del cuerpo y la edificación en amor. Sin embargo, varias elecciones no reflejan con suficiente precisión el griego ni el rastro auditado del POB: «procedente de quien» suena menos natural que «de quien»; «vínculo de provisión» debilita la imagen corporal concreta de ἁφή; y «según la acción proporcionada de cada una de las partes» no representa bien «κατ’ ἐνέργειαν ἐν μέτρῳ ἑνὸς ἑκάστου μέρους», donde la idea principal es el funcionamiento/obrar en medida de cada parte individual.'
  spanish_quality_summary: 'El español es mayormente claro, pero algunas frases suenan algo forzadas o imprecisas: «procedente de quien» y «acción proporcionada de cada una de las partes» no fluyen con naturalidad; además, la nota d repite exactamente el texto principal y no aporta valor. Conviene ajustar hacia un español más idiomático y a la vez más ceñido al original.'
  glossary_alignment: No hay conflictos con términos doctrinales del proyecto. «En amor» y «edificarse» encajan bien. El punto clave de alineación léxica es mantener la corporeidad de la metáfora con algo como «articulación»/«coyuntura» y no abstractarla excesivamente como «vínculo».
  issues:
  - severity: medium
    issue: «procedente de quien» para ἐξ οὗ
    rationale: Aunque expresa origen, en español suena más pesado y menos natural que «de quien», sin ganar precisión semántica.
  - severity: high
    issue: «vínculo de provisión» debilita la imagen corporal de διὰ πάσης ἁφῆς τῆς ἐπιχορηγίας
    rationale: El audit trail inglés preserva deliberadamente una imagen concreta de articulación/juntura de soporte. «Vínculo» se vuelve demasiado abstracto y se aleja de la metáfora corporal que Pablo mantiene.
  - severity: high
    issue: «según la acción proporcionada de cada una de las partes» no refleja bien κατ’ ἐνέργειαν ἐν μέτρῳ ἑνὸς ἑκάστου μέρους
    rationale: La construcción española es poco natural y diluye la secuencia «según el obrar/funcionamiento en medida de cada parte individual». La proporcionalidad debe expresarse con mayor claridad.
  - severity: low
    issue: La nota d es redundante
    rationale: 'La nota «O: de cada una de las partes» repite el texto principal y no preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva en español.'
