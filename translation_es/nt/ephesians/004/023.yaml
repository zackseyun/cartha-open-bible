translation:
  language: es
  text: y a ser renovados en el espíritu de la mente de ustedes,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el espíritu de la mente de ustedes»; sin embargo, la expresión probablemente se refiere a la disposición interior o a la orientación de la mente, más que directamente al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνανεοῦσθαι
  english_pob_choice: to be renewed
  chosen_spanish: a renovarse
  alternatives_spanish:
  - a ser renovados
  - a ser hechos nuevos
  - a renovarse continuamente
  lexicon: BDAG
  rationale: El infinitivo pasivo medio griego expresa una acción recibida/procesual; en español, «a renovarse» conserva bien el valor de proceso dentro de la serie de infinitivos del contexto, sin volverlo una forma demasiado pesada. «Ser renovados» también es posible, pero suena menos natural en una construcción coordinada con infinitivos.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace suave entre elementos de la secuencia, no como contraste fuerte. «Y» reproduce mejor ese flujo coordinado en español.
- source_word: τῷ πνεύματι
  english_pob_choice: in the spirit
  chosen_spanish: en el espíritu
  alternatives_spanish:
  - por el Espíritu
  - en el espíritu interior
  - en la disposición
  lexicon: BDAG
  rationale: 'La construcción dativa se entiende mejor como esfera o respectivo: la renovación ocurre «en el espíritu» de la mente. Se evita capitalizar «Espíritu», porque el contexto inmediato («de su mente») apunta a la disposición interior humana más que al Espíritu Santo.'
- source_word: νοὸς
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - modo de pensar
  - inteligencia
  lexicon: BDAG
  rationale: «Mente» es una equivalencia directa y idiomática en español para νοῦς en este contexto, manteniendo la relación con la dimensión interior que acompaña a πνεύματι. «Entendimiento» o «modo de pensar» serían posibles, pero desplazan ligeramente el foco.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - vuestro
  - de ustedes
  lexicon: BDAG
  rationale: El pronombre griego es plural de segunda persona. En español neutro bíblico, «su» permite una lectura plural sin forzar un posesivo marcado regionalmente; el contexto garantiza que se trata de varios destinatarios.
theological_decisions:
- issue: Si πνεύματι se refiere al Espíritu Santo o al espíritu/disposición humana
  english_pob_reading: 'human inner disposition: ''the spirit of your mind'''
  chosen_spanish_reading: 'la disposición interior de la mente: «en el espíritu de su mente»'
  alternative_spanish_readings:
  - por el Espíritu Santo
  - en el Espíritu de su mente
  rationale: 'La cadena genitiva «del espíritu de la mente de ustedes» favorece una lectura antropológica: una orientación o disposición interior de la mente, no una referencia explícita al Espíritu Santo. La traducción conserva esa tensión sin resolverla de manera doctrinalmente más específica de lo que exige el griego.'
  doctrine_reference: Preservar la ambigüedad significativa del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no hubo cambios en la lectura de fondo ni en las decisiones léxicas o teológicas relevantes.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» en minúscula porque el contexto apunta a la facultad o disposición humana, no al Espíritu Santo.
  - Se usa «mente» para νοῦς por claridad y naturalidad en español, sin perder el sentido de interioridad.
  - La coordinación con «y» conserva el enlace suave de δέ dentro de la serie de infinitivos.
