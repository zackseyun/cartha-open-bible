translation:
  language: es
  text: No salga[a] de la boca de ustedes ninguna palabra podrida, sino solo la que sea buena para edificación[b] conforme a la necesidad[c], para que dé gracia[d] a los que oyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habla corrupta' o 'palabra malsana'. El griego dice literalmente 'palabra podrida'.
    reason: lexical_alternative
  - marker: b
    text: O 'para edificar'.
    reason: lexical_alternative
  - marker: c
    text: O 'según la necesidad' o 'como convenga a la situación'.
    reason: lexical_alternative
  - marker: d
    text: O 'para que dé beneficio a los que oyen'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς λόγος σαπρὸς
  english_pob_choice: no rotten word
  chosen_spanish: ninguna palabra podrida
  alternatives_spanish:
  - ninguna palabra corrupta
  - ninguna palabra malsana
  - ningún الكلام podrido
  lexicon: BDAG
  rationale: πᾶς con un sustantivo singular bajo negación tiene fuerza distributiva, equivalente a 'ninguna...'. λόγος aquí es habla/expresión, y σαπρός es literalmente 'podrido, echado a perder'. 'Podrida' conserva la metáfora vívida mejor que una versión suavizada como 'malsana' o una frase eclesiástica menos concreta.
- source_word: ἐκ τοῦ στόματος ὑμῶν
  english_pob_choice: out of your mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de vuestra boca
  - de sus bocas
  - de la boca de ustedes
  lexicon: BDAG
  rationale: En español natural, 'de su boca' expresa bien el origen de la խոս? speech y mantiene la imagen corporal. Se prefiere el singular colectivo, como en el inglés auditado, para conservar fluidez y evitar una pluralidad innecesaria.
- source_word: μὴ ἐκπορευέσθω
  english_pob_choice: let ... come out
  chosen_spanish: no salga
  alternatives_spanish:
  - no proceda
  - no salga hacia afuera
  - no brote
  lexicon: BDAG
  rationale: El imperativo prohibitivo pide una forma breve y clara. 'No salga' es idiomático en español y conserva la imagen de algo que emerge de la boca sin endurecerse con un calco como 'proceda'.
- source_word: ἀλλὰ εἴ τις ἀγαθὸς
  english_pob_choice: but only such as is good
  chosen_spanish: sino solo la que sea buena
  alternatives_spanish:
  - sino solo lo que sea bueno
  - sino solo aquello que sea bueno
  - sino únicamente la que sea buena
  lexicon: BDAG
  rationale: La construcción elíptica contrasta el habla prohibida con la permitida. En español, 'la que sea buena' mantiene el género implícito de λόγος ('palabra/habla') y suena natural sin perder la restricción absoluta del texto.
- source_word: πρὸς οἰκοδομὴν
  english_pob_choice: for building up
  chosen_spanish: para edificación
  alternatives_spanish:
  - para edificar
  - para construcción
  - para levantar
  lexicon: BDAG
  rationale: Aunque 'edificación' es más tradicional, aquí refleja bien οἰκοδομή como edificación espiritual/relacional. 'Para edificación' evita una perífrasis pesada y mantiene la metáfora de construir, aceptable en español bíblico contemporáneo.
- source_word: τῆς χρείας
  english_pob_choice: according to the need
  chosen_spanish: conforme a la necesidad
  alternatives_spanish:
  - según la necesidad
  - de acuerdo con la necesidad
  - conforme al momento
  lexicon: BDAG
  rationale: El genitivo con οἰκοδομήν es compacto y relaciona la edificación con la necesidad presente. 'Conforme a la necesidad' comunica esa adecuación sin desplazar el sentido hacia mera circunstancia u ocasión.
- source_word: ἵνα δῷ χάριν
  english_pob_choice: so that it may give grace
  chosen_spanish: para que dé gracia
  alternatives_spanish:
  - para que dé beneficio
  - para que conceda favor
  - para que sea de bendición
  lexicon: BDAG
  rationale: χάρις puede significar gracia, favor o beneficio. Se conserva 'gracia' porque el POB inglés también la preserva y porque mantiene el peso paulino del término, aunque el contexto ético permite percibir una gracia que beneficia al oyente.
- source_word: τοῖς ἀκούουσιν
  english_pob_choice: to those who hear
  chosen_spanish: a los que oyen
  alternatives_spanish:
  - a los que escuchan
  - a quienes oyen
  - a los oyentes
  lexicon: BDAG
  rationale: El participio presente describe a quienes están oyendo. 'A los que oyen' es natural, breve y fiel; 'escuchan' podría sugerir más atención intencional de la que exige el griego.
theological_decisions:
- issue: χάρις en una exhortación ética sobre el habla
  english_pob_reading: give grace
  chosen_spanish_reading: dé gracia
  alternative_spanish_readings:
  - dé beneficio
  - sea de beneficio
  - dé favor
  rationale: Se preserva 'gracia' para no reducir el término a utilidad práctica. En este contexto, el habla cristiana debe producir un efecto benéfico y graciable en quienes la oyen, sin vaciar el vocabulario paulino de su resonancia teológica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: οἰκοδομή como imagen de crecimiento comunitario
  english_pob_reading: building up
  chosen_spanish_reading: edificación
  alternative_spanish_readings:
  - construcción
  - edificar
  - fortalecimiento
  rationale: '''Edificación'' transmite la metáfora de construir aplicada a la vida comunitaria y personal. En español eclesial es comprensible, pero aquí sigue siendo suficientemente transparente para una audiencia amplia.'
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa sin adoptar suavizaciones innecesarias. Se mantiene el valor metafórico fuerte de σαπρός, la compacidad de τῆς χρείας y la ambigüedad productiva de χάρις como 'gracia', tal como quedó en el expediente auditado final.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις, coherente con la terminología POB.
  - Se usa 'edificación' para οἰκοδομή, evitando un tecnicismo opaco pero conservando la metáfora.
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - La puntuación y el orden siguen una sintaxis natural en español sin perder la estructura de contraste del griego.
