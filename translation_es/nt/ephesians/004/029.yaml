    rationale: La nota c ('según la necesidad' / 'como convenga a la situación') explica τῆς χρείας, no 'edificación'; la nota d ('dé beneficio') explica ἵνα δῷ χάριν, no 'necesidad'. Así como está, el lector recibe información lexical en el lugar equivocado.
  - severity: low
    issue: '''de su boca'' para ὑμῶν'
    rationale: Aunque comprensible, en español latinoamericano neutral la combinación de plural exhortativo con singular de cortesía puede sonar menos natural o ambigua. 'de la boca de ustedes' refleja claramente el plural del original y mantiene la imagen idiomática.
