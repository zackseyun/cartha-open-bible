review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: conserva la metáfora vívida de σαπρός con ''podrida'', mantiene la imagen corporal de ''boca'', refleja la prohibición con ''No salga'', y retiene ''gracia'' para χάρις, en línea con la decisión teológica documentada. Sin embargo, la distribución de notas está desajustada respecto a los segmentos que comentan: la nota sobre ''beneficio'' está anclada a ''necesidad'' cuando corresponde a ''dé gracia'', y la nota sobre ''según la necesidad'' está anclada a ''edificación'' aunque comenta τῆς χρείας. Además, ''de su boca'' suena singular-individual y menos natural para un plural exhortativo; ''de la boca de ustedes'' preserva mejor el plural sin perder claridad.'
  spanish_quality_summary: El español es en general claro y digno. 'Ninguna palabra podrida' es fuerte pero comprensible. 'Para edificación' es aceptable en registro bíblico, aunque algo eclesial; no requiere cambio. La principal necesidad es corregir la colocación de notas para evitar confusión exegética, y ajustar 'su boca' a una formulación más natural y precisa para audiencia latinoamericana amplia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La conservación de 'gracia' para χάρις está bien justificada. 'Edificación' es una excepción contextual válida frente a una opción más dinámica como 'para edificar'.
  issues:
