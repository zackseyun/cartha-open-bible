    rationale: El adverbio «también» refleja καὶ, pero en español la comparación se oye más natural como «como andan también los gentiles» o simplemente «como los gentiles andan», conservando el sentido sin rigidez.
  revised_spanish_text: 'Por tanto, digo esto y doy testimonio en el Señor: ustedes ya no deben andar como andan también los gentiles[a], en la futilidad de su mente,'
