translation:
  language: es
  text: 'Por tanto, digo esto y doy testimonio en el Señor: ustedes ya no deben andar como andan también los gentiles[a], en la futilidad de su mente,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones»; algunas traducciones vierten ἔθνη aquí como «los paganos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο οὖν
  english_pob_choice: Therefore I say this
  chosen_spanish: Por tanto, digo esto
  alternatives_spanish:
  - Así que digo esto
  - Por eso digo esto
  lexicon: BDAG
  rationale: οὖν marca una transición inferencial; «por tanto» conserva esa relación lógica en español. Τοῦτο se vierte naturalmente como «esto», manteniendo el objeto de λέγω sin sobrecargar la frase.
- source_word: μαρτύρομαι
  english_pob_choice: testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - afirmo solemnemente
  - hago testimonio
  lexicon: BDAG
  rationale: La forma media aquí comunica una declaración solemne y personal. «Doy testimonio» conserva la fuerza de testimonio sin sonar excesivamente técnica o rígida en español.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - delante del Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión preposicional directa. Como κύριος se rinde normalmente por «Señor», la frase conserva la esfera o autoridad bajo la cual Pablo habla.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no sigan
  lexicon: BDAG
  rationale: Expresa el cese de una conducta anterior con naturalidad en español moderno y sin perder el valor temporal de la negación.
- source_word: ὑμᾶς περιπατεῖν
  english_pob_choice: you must no longer walk
  chosen_spanish: que ya no anden
  alternatives_spanish:
  - que ya no vivan
  - que no continúen andando
  lexicon: BDAG
  rationale: El infinitivo exhortativo requiere en español una formulación explícita. «Anden» conserva la metáfora ética de περιπατέω mejor que «vivan», aunque se entiende con el sentido de conducta habitual.
- source_word: καθὼς καὶ τὰ ἔθνη
  english_pob_choice: as the Gentiles
  chosen_spanish: como también andan los gentiles
  alternatives_spanish:
  - como también andan las naciones
  - como también andan los paganos
  lexicon: BDAG
  rationale: «Gentiles» es el equivalente más preciso del uso paulino de ἔθνη. Se mantiene la comparación con su fuerza étnico-covenantal sin añadir el matiz peyorativo de «paganos».
- source_word: περιπατεῖ
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - se conducen
  lexicon: BDAG
  rationale: Se conserva la metáfora de conducta mediante el verbo «andar», coherente con περιπατέω y con el paralelismo de la frase.
- source_word: ἐν ματαιότητι
  english_pob_choice: in the futility
  chosen_spanish: en la futilidad
  alternatives_spanish:
  - en la vanidad
  - en el vacío
  lexicon: BDAG
  rationale: ματαιότης expresa vaciedad, inutilidad o carencia de propósito. «Futilidad» es una equivalencia moderna que conserva ese sentido moral e intelectual.
- source_word: τοῦ νοὸς αὐτῶν
  english_pob_choice: of their minds
  chosen_spanish: de su mente
  alternatives_spanish:
  - de su entendimiento
  - de su pensar
  lexicon: BDAG
  rationale: νοῦς se refiere a la mente o intelecto. «Mente» es la opción más directa y clara; evita anticipar demasiado el matiz de διάνοια del versículo siguiente.
theological_decisions:
- issue: Sentido de ἔθνη en contraste ético para una iglesia mayoritariamente gentil
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  - paganos
  rationale: En Pablo, ἔθνη suele funcionar como categoría étnica y covenantal. «Gentiles» preserva ese valor sin intensificar indebidamente el juicio moral implícito en «paganos».
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza exhortativa del infinitivo περιπατεῖν tras λέγω καὶ μαρτύρομαι
  english_pob_reading: you must no longer walk
  chosen_spanish_reading: que ya no anden
  alternative_spanish_readings:
  - que ya no deben andar
  - que no continúen andando
  rationale: El español exige explicitar la fuerza exhortativa. La forma subordinada con «que» conserva el valor imperativo implícito sin añadir una categoría doctrinal ajena al griego.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego de forma directa y está alineada con el audit trail inglés. No se introdujeron cambios de sentido respecto de la revisión más reciente; se mantuvieron la metáfora de «andar», el valor paulino de ἔθνη y la expresión solemne de μαρτύρομαι.
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριος según el uso doctrinal del proyecto.
  - Se mantuvo «gentiles» para ἔθνη por precisión paulina.
  - Se tradujo el verbo de conducta con «andar» para preservar la metáfora ética.
  - «Mente» se eligió para νοῦς por claridad y consistencia terminológica.
