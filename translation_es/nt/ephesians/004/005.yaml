translation:
  language: es
  text: un solo Señor, una sola fe[a], un solo bautismo;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad» o «confianza» para πίστις; aquí se ha elegido «fe» por ajustarse mejor a la unidad compartida que enfatiza el pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno / una sola
  alternatives_spanish:
  - uno
  - único
  - un solo
  lexicon: BDAG
  rationale: Se conserva la repetición enfática de εἷς en la serie. En español, «un solo» / «una sola» comunica mejor la unidad exclusiva y mantiene el paralelismo con los tres miembros de la cláusula.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto paulino funciona como título cristológico. «Señor» es el equivalente español natural y fiel; «Dueño» o «Maestro» debilitarían la referencia confesional.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La POB inglesa preserva «faith» y nota las posibilidades de «faithfulness» o «trust», pero aquí opta por la unidad confesional compartida. En español, «fe» es el término más directo y ampliamente inteligible para ese valor.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - inmersión
  - rito bautismal
  lexicon: BDAG
  rationale: «Bautismo» es el equivalente estándar y preciso para βάπτισμα. Se evita explicitar un modo o una teología del rito que el versículo no desarrolla.
theological_decisions:
- issue: Referencia de «Señor»
  english_pob_reading: '''Lord'' is retained as the christological title, most naturally referring to Jesus in the flow of Ephesians 4:4–6.'
  chosen_spanish_reading: «Señor» se mantiene como título cristológico y se entiende más naturalmente de Jesús en el flujo de Efesios 4:4–6.
  alternative_spanish_readings:
  - Una referencia más general a Dios
  rationale: La secuencia «un Espíritu, un Señor, un Dios y Padre de todos» favorece una lectura trinitaria funcional sin que la traducción añada más de lo que dice el texto.
  doctrine_reference: Credo niceno; κύριος → Señor
- issue: Sentido de «un solo bautismo»
  english_pob_reading: Rendered neutrally as 'one baptism' without specifying mode, efficacy, or whether the emphasis is sacramental rite versus its unifying significance.
  chosen_spanish_reading: «Un solo bautismo» se mantiene neutral, sin precisar modo, eficacia ni una interpretación sacramental o meramente simbólica.
  alternative_spanish_readings:
  - Un énfasis sacramental específico
  - Un énfasis principalmente metafórico o espiritual
  rationale: El versículo afirma unidad; no resuelve debates bautismales. La traducción debe preservar esa tensión documentada sin decantarla.
  doctrine_reference: Principio POB de preservar tensiones teológicas no resueltas
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no hubo cambios necesarios; el borrador mantiene la alta concordancia del texto fuente y la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se conserva la triple repetición de «uno/una sola» para reflejar la estructura enfática del griego.
  - «Señor» se usa como título cristológico y no como mero equivalente de «dueño».
  - No se introduce mayúscula teológica en «fe» ni en «bautismo», porque el griego no lo exige aquí.
  - Se evita cualquier paráfrasis sobre el tipo de bautismo o su eficacia, en fidelidad al alcance del versículo.
