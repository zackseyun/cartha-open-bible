translation:
  language: es
  text: despojarse[a] del hombre viejo, en cuanto a su antigua manera de vivir, que se va corrompiendo conforme a los deseos engañosos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el viejo yo». Literalmente, «el hombre viejo». El griego usa una expresión masculina representativa para la forma humana anterior de vivir.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «los deseos del engaño»; es decir, deseos moldeados por el engaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποθέσθαι
  english_pob_choice: to put off
  chosen_spanish: despojarse
  alternatives_spanish:
  - quitarse
  - poner aparte
  - dejar de lado
  lexicon: BDAG
  rationale: El infinitivo aoristo medio expresa la acción de quitarse o apartarse de algo. En español, «despojarse» mantiene de manera natural la metáfora de vestirse/desvestirse que continúa en el contexto inmediato con «vestirse» en el versículo siguiente, sin perder claridad.
- source_word: κατὰ τὴν προτέραν ἀναστροφὴν
  english_pob_choice: with respect to your former way of life
  chosen_spanish: en cuanto a su antigua manera de vivir
  alternatives_spanish:
  - con respecto a su antigua manera de vivir
  - según su antigua manera de vivir
  - en relación con su antigua conducta
  lexicon: BDAG
  rationale: Aquí κατά funciona como referencia o esfera, no como norma estricta. «En cuanto a» comunica bien esa relación sin sonar rígido. «Manera de vivir» traduce ἀναστροφή de forma clara y natural en español bíblico contemporáneo.
- source_word: προτέραν
  english_pob_choice: former
  chosen_spanish: antigua
  alternatives_spanish:
  - anterior
  - previa
  - de antes
  lexicon: BDAG
  rationale: «Antigua» expresa de manera idiomática el contraste temporal con la vida renovada del contexto. Mantiene el sentido de algo perteneciente al pasado sin sonar técnico.
- source_word: ἀναστροφὴν
  english_pob_choice: way of life
  chosen_spanish: manera de vivir
  alternatives_spanish:
  - conducta
  - modo de vida
  - proceder
  lexicon: BDAG
  rationale: El sustantivo se refiere al comportamiento o forma de vida. «Manera de vivir» es fiel y más natural que un calco como «conducta» en este entorno.
- source_word: τὸν παλαιὸν ἄνθρωπον
  english_pob_choice: the old man
  chosen_spanish: el viejo hombre
  alternatives_spanish:
  - el viejo yo
  - el hombre viejo
  - el antiguo hombre
  lexicon: BDAG
  rationale: Se conserva la expresión masculina literal del griego, como en el texto inglés auditado, porque tiene fuerza representativa y resuena con el contraste antropológico de Pablo. «Viejo hombre» preserva esa forma sin neutralizarla a «yo» o «ser interior».
- source_word: φθειρόμενον
  english_pob_choice: which is being corrupted
  chosen_spanish: que se va corrompiendo
  alternatives_spanish:
  - que está siendo corrompido
  - que se corrompe
  - que va decayendo
  lexicon: BDAG
  rationale: El participio presente pasivo indica un proceso en curso. «Se va corrompiendo» comunica esa progresión continua y sugiere deterioro moral sin perder la pasividad del verbo.
- source_word: κατὰ τὰς ἐπιθυμίας
  english_pob_choice: according to ... desires
  chosen_spanish: conforme a los deseos
  alternatives_spanish:
  - según los deseos
  - de acuerdo con los deseos
  - en consonancia con los deseos
  lexicon: BDAG
  rationale: κατά expresa aquí norma o influencia rectora. «Conforme a» mantiene esa idea de alineación con los deseos, con buen español.
- source_word: ἐπιθυμίας
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - ansias
  - apetitos
  lexicon: BDAG
  rationale: «Deseos» conserva el campo semántico amplio del término sin restringirlo a lujuria sexual. Es suficientemente general para el contexto moral.
- source_word: τῆς ἀπάτης
  english_pob_choice: deceitful
  chosen_spanish: engañosos
  alternatives_spanish:
  - de engaño
  - mentirosos
  - falaces
  lexicon: BDAG
  rationale: 'El genitivo se vierte de manera atributiva: no son deseos neutrales que pertenecen a «engaño», sino deseos caracterizados por el engaño. «Engañosos» es la opción más natural y fiel en español.'
theological_decisions:
- issue: Renderización de τὸν παλαιὸν ἄνθρωπον
  english_pob_reading: the old man
  chosen_spanish_reading: el viejo hombre
  alternative_spanish_readings:
  - el viejo yo
  - el antiguo hombre
  - la vieja persona
  rationale: Se conserva la forma masculina del griego, siguiendo la decisión auditada de no neutralizar la expresión. Aunque en español «hombre» puede sonar genérico o marcado por sexo, aquí funciona como expresión representativa del antiguo modo humano de vida, y además preserva la tensión antropológica del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
- issue: Valor del infinitivo ἀποθέσθαι en el contexto
  english_pob_reading: to put off
  chosen_spanish_reading: despojarse
  alternative_spanish_readings:
  - que os despojéis
  - despojaos
  - haber dejado
  rationale: El infinitivo conserva la relación con la instrucción previa sin resolver si el énfasis es mandamiento, contenido de enseñanza o evento de conversión. «Despojarse» permite mantener esa ambigüedad funcional y el vínculo con el vocabulario de vestirse/desvestirse del contexto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada presentan alto acuerdo y no muestran revisiones aplicadas en la última pasada. Esta versión española sigue esa línea estable, conservando la metáfora de despojar/vestir, la referencia al modo de vida anterior y la representación literal de «el viejo hombre», con una adaptación estilística mínima para el español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se preserva la metáfora vestidura/desvestidura mediante «despojarse», coherente con el contexto inmediato.
  - «Viejo hombre» conserva la decisión representativa y la posible tensión entre lectura literal y idiomática, explicada en nota.
  - «Deseos engañosos» mantiene el matiz ético del genitivo sin reducirlo a un simple sustantivo abstracto.
