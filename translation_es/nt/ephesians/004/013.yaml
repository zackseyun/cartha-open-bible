  text: μέχρι καταντήσωμεν οἱ πάντες εἰς τὴν ἑνότητα τῆς πίστεως καὶ τῆς ἐπιγνώσεως τοῦ υἱοῦ τοῦ θεοῦ, εἰς ἄνδρα τέλειον, εἰς μέτρον ἡλικίας τοῦ πληρώματος τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/004/013.yaml
  text: until we all attain to the unity of the faith and of the knowledge of the Son of God[a], to a mature man, to the measure of the stature of the fullness of Messiah[e][d][c][b],
  footnotes:
  - marker: a
    text: Or 'of faith.' The phrase may emphasize either the shared body of Christian belief ('the faith') or believers' faith more generally.
    reason: alternative_reading
  - marker: b
    text: Or 'full knowledge' or 'deep knowledge.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to mature manhood.' The Greek literally says 'to a mature man,' using a masculine singular image for the corporate maturity of the whole church.
    reason: lexical_alternative
  - marker: d
    text: Or 'maturity' for 'stature.'
    reason: lexical_alternative
  - marker: e
    text: Greek 'Christ.' Here rendered 'Messiah' because the title sense is prominent.
    reason: alternative_reading
