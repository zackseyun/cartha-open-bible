translation:
  language: es
  text: hasta que todos nosotros alcancemos la unidad de la fe[a] y del conocimiento[b] del Hijo de Dios, a un hombre maduro[c], a la medida de la estatura[d] de la plenitud del Mesías[e],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de fe». La frase puede enfatizar tanto el cuerpo compartido de creencias cristianas («la fe») como la fe de los creyentes en general.
    reason: alternative_reading
  - marker: b
    text: O «conocimiento pleno» o «conocimiento profundo».
    reason: lexical_alternative
  - marker: c
    text: O «a la madurez de un hombre». El griego dice literalmente «a un hombre maduro», usando una imagen masculina singular para la madurez corporativa de toda la iglesia.
    reason: lexical_alternative
  - marker: d
    text: O «madurez» para «estatura».
    reason: lexical_alternative
  - marker: e
    text: Griego «Cristo». Aquí se traduce «Mesías» porque el sentido de título es prominente.
    reason: alternative_reading
lexical_decisions:
- source_word: μέχρι
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: BDAG
  rationale: En español, "hasta que" expresa con naturalidad la idea de límite o meta temporal que introduce μέχρι, conservando el valor telico del pasaje.
- source_word: καταντήσωμεν
  english_pob_choice: we all attain
  chosen_spanish: alcancemos
  alternatives_spanish:
  - lleguemos
  - alcancemos todos
  lexicon: BDAG
  rationale: El verbo griego sugiere llegar a una meta. "Alcancemos" conserva la idea de alcanzar un objetivo espiritual sin forzar una imagen espacial demasiado literal.
- source_word: οἱ πάντες
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - nosotros todos
  lexicon: BDAG
  rationale: La inclusión de toda la comunidad se expresa de forma natural con "todos nosotros", que conserva el sentido corporativo explícito del griego.
- source_word: τὴν ἑνότητα
  english_pob_choice: the unity
  chosen_spanish: la unidad
  alternatives_spanish:
  - la unificación
  - la unión
  lexicon: BDAG
  rationale: '"Unidad" es el equivalente más claro y fiel para ἑνότης en este contexto de madurez eclesial.'
- source_word: τῆς πίστεως
  english_pob_choice: of the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la fe común
  - de la fidelidad
  lexicon: BDAG
  rationale: El artículo y el contexto favorecen una fe compartida por la iglesia. "La fe" preserva esa lectura objetiva o comunitaria sin sobreexplicar.
- source_word: τῆς ἐπιγνώσεως
  english_pob_choice: of the knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - del pleno conocimiento
  - del reconocimiento
  lexicon: BDAG
  rationale: ἐπίγνωσις puede intensificar la noción de conocimiento, pero "conocimiento" es suficiente y claro en español; la posible mayor intensidad queda implícita.
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_choice: of the Son of God
  chosen_spanish: del Hijo de Dios
  alternatives_spanish:
  - del Hijo de Yahvé
  - del Hijo del Dios
  lexicon: BDAG
  rationale: Se mantiene el título cristológico directo y transparente, sin paraphrasearlo.
- source_word: εἰς ἄνδρα τέλειον
  english_pob_choice: to a mature man
  chosen_spanish: a un hombre maduro
  alternatives_spanish:
  - a un hombre perfecto
  - a una humanidad madura
  - a una persona madura
  lexicon: BDAG
  rationale: ἀνήρ es masculino singular y el adjetivo τέλειος aquí describe madurez/completitud más que perfección sin defecto. "Hombre maduro" conserva el valor literal y la metáfora corporativa.
- source_word: μέτρον
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - medida exacta
  - norma
  lexicon: BDAG
  rationale: '"Medida" reproduce bien la metáfora de proporción o estándar de crecimiento.'
- source_word: ἡλικίας
  english_pob_choice: stature
  chosen_spanish: estatura
  alternatives_spanish:
  - madurez
  - edad
  lexicon: BDAG
  rationale: En este marco de crecimiento, "estatura" preserva la imagen corporal del desarrollo hacia plenitud.
- source_word: τοῦ πληρώματος
  english_pob_choice: of the fullness
  chosen_spanish: de la plenitud
  alternatives_spanish:
  - de la llenura
  - del cumplimiento
  lexicon: BDAG
  rationale: '"Plenitud" mantiene la carga paulina de πλήρωμα sin volverlo una paráfrasis.'
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  - de Cristo Jesús
  lexicon: BDAG
  rationale: Aunque el marco inglés POB suele usar "Mesías" para Χριστός como título, aquí la revisión textual del expediente restauró "Christ" en la forma inglesa final; en español, "Cristo" es la forma consagrada y natural para este contexto epistolar y teológico.
theological_decisions:
- issue: Sentido de τῆς πίστεως
  english_pob_reading: the shared Christian faith
  chosen_spanish_reading: la fe compartida de la iglesia
  alternative_spanish_readings:
  - la fe subjetiva de cada creyente
  - la fidelidad
  rationale: El artículo y la finalidad comunitaria del versículo favorecen una fe común, no solo el acto individual de creer. El texto principal mantiene la formulación breve "la fe" para no cerrar indebidamente la ambigüedad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for πίστις'
- issue: Imagen corporativa en εἰς ἄνδρα τέλειον
  english_pob_reading: to a mature man
  chosen_spanish_reading: a un hombre maduro
  alternative_spanish_readings:
  - a una madurez plena
  - a una humanidad madura
  rationale: El griego usa singular masculino con valor representativo para el cuerpo de Cristo. Se conserva esa imagen para no borrar la decisión gramatical y teológica del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Traducción de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: Aunque el expediente inglés tuvo una ida y vuelta editorial, el griego sigue siendo Χριστοῦ y en español "Cristo" es la forma recibida y más natural para esta carta, especialmente en una cláusula formulada de manera confesional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El expediente muestra una oscilación editorial entre «Messiah» y «Christ» en inglés, con corrección posterior para restaurar la política de títulos. La presente versión española sigue el griego Χριστοῦ y la forma natural «Cristo», manteniendo la coherencia con la revisión restaurada y con el registro eclesial del español.
  spanish_consistency_notes:
  - Se conserva «la fe» sin añadir artículos o glosas que eliminen la ambigüedad objetiva/subjectiva documentada.
  - '"Hombre maduro" mantiene el singular masculino representativo del griego, evitando neutralizaciones no justificadas.'
  - Se usa «Cristo» como forma estable en español para Χριστός en este contexto, sin perder la referencia titular.
  - La puntuación sigue una sola cláusula final abierta, adecuada al estilo de la frase griega y a la coordinación de metas sucesivas.
