    rationale: En Efesios 4:31 el término apunta a habla dañina contra otros en sentido amplio. «Calumnia» en español suele implicar falsedad específica; el rastro inglés preserva como alternativa «abusive speech» además de «blasphemy». «Maledicencia» o una formulación equivalente refleja mejor el campo semántico interpersonal.
  - severity: medium
