review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la lista de vicios del griego y conserva la fuerza general de remoción total: «amargura», «ira», «enojo», «gritería» y «malicia» son opciones viables para πικρία, θυμός, ὀργή, κραυγή y κακία. Sin embargo, el anclaje de la nota está puesto sobre «quitados» aunque la nota trata una alternativa de ἀρθήτω, y la alternativa principal más importante documentada en el rastro inglés es para βλασφημία, no para ἀρθήτω. Además, «calumnia» es más estrecho que el campo semántico contextual de βλασφημία, que aquí abarca habla injuriosa/abusiva contra otros, no necesariamente acusación falsa técnicamente calumniosa.'
  spanish_quality_summary: 'La frase es legible y natural en español eclesial moderno. No obstante, «sean quitados» suena menos idiomático con una lista mixta de sustantivos femeninos y masculinos; «sea quitada de ustedes» con sujeto colectivo («toda amargura… y calumnia») o una reformulación impersonal sería más pulida, pero el plural también es comprensible. El ajuste principal recomendado es léxico: reemplazar «calumnia» por «maledicencia» o una nota que preserve «habla injuriosa/abusiva». También conviene alinear las notas con la decisión inglesa documentada.'
  glossary_alignment: 'No hay conflicto con términos nucleares del glosario del proyecto. La principal cuestión terminológica es βλασφημία: el borrador evita correctamente «blasfemia» en el texto principal por contexto interpersonal, pero «calumnia» restringe demasiado el sentido. «Maledicencia» encaja mejor con la justificación léxica/theológica auditada y mantiene un registro bíblico claro.'
  issues:
