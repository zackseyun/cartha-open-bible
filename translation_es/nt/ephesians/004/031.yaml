translation:
  language: es
  text: Que toda amargura, ira, enojo, gritería y maledicencia[a] sean quitados de ustedes, junto con toda malicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habla abusiva»; tradicionalmente, «blasfemia». En este contexto, el griego probablemente se refiere a habla dañina contra otras personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda clase de
  - todo
  lexicon: BDAG
  rationale: En esta lista de vicios, πᾶσα expresa totalidad distributiva; «toda» suena natural en español y comunica la amplitud de la remoción sin forzar una construcción pesada.
- source_word: πικρία
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - bitterness
  - resentimiento
  lexicon: BDAG
  rationale: «Amargura» es la forma más transparente y estable en español para este estado interior persistente de dureza y resentimiento.
- source_word: θυμός
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  - rabia
  lexicon: BDAG
  rationale: Siguiendo la revisión inglesa que ajustó θυμός a un término más formal, «ira» conserva intensidad sin caer en un registro demasiado coloquial; además distingue este término del siguiente ὀργή en la lista.
- source_word: ὀργή
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - enojo
  - indignación
  lexicon: BDAG
  rationale: «Enojo» permite diferenciar ὀργή de θυμός en español, manteniendo un tono natural y menos solemne que «ira», tal como la POB inglesa distingue los dos términos cercanos.
- source_word: κραυγή
  english_pob_choice: clamor
  chosen_spanish: gritería
  alternatives_spanish:
  - clamor
  - gritos
  - algarabía
  lexicon: BDAG
  rationale: La POB inglesa pasó de una opción más explicativa a una más formal. En español, «gritería» comunica la idea de alboroto verbal hostil y refleja bien la fuerza social/relacional del término sin sonar demasiado técnico.
- source_word: βλασφημία
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - difamación
  - maledicencia
  - blasfemia
  lexicon: BDAG
  rationale: En este contexto ético interpersonal, βλασφημία apunta a habla dañina contra otras personas. «Calumnia» expresa esa dimensión de injuria verbal mejor que «blasfemia», que en español suele reservarse para irreverencia contra Dios.
- source_word: ἀρθήτω
  english_pob_choice: be taken away
  chosen_spanish: sean quitados
  alternatives_spanish:
  - sean removidos
  - sean quitados de en medio
  - se aparten
  lexicon: BDAG
  rationale: La forma pasiva imperativa pide una traducción que conserve la remoción externa de estas conductas. «Sean quitados» mantiene la fuerza pasiva y es idiomático en español bíblico contemporáneo.
- source_word: ἀφ’ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de entre ustedes
  - de su medio
  - de ustedes mismos
  lexicon: BDAG
  rationale: «De ustedes» es directo y natural; el contexto deja claro que la remoción es de la vida comunitaria y de la conducta de los creyentes.
- source_word: σὺν πάσῃ κακίᾳ
  english_pob_choice: along with all malice
  chosen_spanish: junto con toda malicia
  alternatives_spanish:
  - con toda malicia
  - junto con toda maldad
  - además de toda malicia
  lexicon: BDAG
  rationale: «Malicia» captura bien κακία como disposición hostil o mala intención, y «junto con» refleja la fuerza aditiva de σύν, como en la lectura inglesa.
theological_decisions:
- issue: βλασφημία en una lista de vicios relacionales
  english_pob_reading: interpersonal 'slander' rather than God-directed 'blasphemy'
  chosen_spanish_reading: calumnia, entendida como habla dañina contra otras personas
  alternative_spanish_readings:
  - blasfemia
  - maledicencia
  - abuso verbal
  rationale: El contexto inmediato enumera actitudes y conductas destructivas dentro de la comunidad. Traducir βλασφημία como «calumnia» evita importar automáticamente el sentido más estrecho de blasfemia contra Dios, que en español sería lo más esperado.
  doctrine_reference: Efesios 4:31; uso contextual de βλασφημία en listas éticas
- issue: Distinción entre θυμός y ὀργή
  english_pob_reading: θυμός as a more heated passion and ὀργή as anger
  chosen_spanish_reading: «ira» para θυμός y «enojo» para ὀργή
  alternative_spanish_readings:
  - cólera / ira
  - rabia / enojo
  - furor / indignación
  rationale: El texto griego acumula términos cercanos pero no idénticos; la POB inglesa mantiene esa diferencia. En español, «ira» y «enojo» permiten conservar la tensión léxica sin volver la lista redundante.
  doctrine_reference: Matiz lexical de vice lists en el NT
- issue: Sujeto implícito plural en ἀρθήτω
  english_pob_reading: be taken away
  chosen_spanish_reading: sean quitados
  alternative_spanish_readings:
  - sea quitado
  - se quite
  - sean removidos
  rationale: Aunque el verbo es singular en griego, el sustantivo colectivo de la lista y la referencia comunitaria justifican una concordancia española plural natural con los elementos enumerados. La pasiva conserva el mandato de remoción.
  doctrine_reference: Sujeto colectivo y concordancia idiomática en español bíblico
translation_notes:
  revision_awareness: 'La base inglesa revisó θυμός de ''rage'' a ''wrath'' y κραυγή de ''shouting'' a ''clamor'' para un registro más formal. La versión española sigue esa revisión en un registro digno, pero usa equivalentes naturales en español que conservan la distinción léxica: «ira» / «enojo» y «gritería». También se preserva el sentido interpersonal de βλασφημία que la auditoría inglesa documenta como ''slander''.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - «Mesías/Cristo» no aplica aquí.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La lista de vicios se traduce con términos sustantivos breves y paralelos para conservar el ritmo del griego.
