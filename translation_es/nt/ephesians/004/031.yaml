  to: Que toda amargura, ira, enojo, gritería y maledicencia[a] sean quitados de ustedes, junto con toda malicia.
  rationale: 'Se mantiene la estructura general del borrador porque representa fielmente la lista griega y su tono exhortativo. Se revisa βλασφημία de «calumnia» a «maledicencia» para evitar un sentido demasiado técnico/estrecho y para ajustarse mejor a la decisión léxica documentada en la POB inglesa. También se reemplaza la nota sobre ἀρθήτω por la nota léxica pertinente para βλασφημία, con el anclaje correspondiente en el texto. No se requiere adjudicación adicional: es una corrección menor y clara.'
