translation:
  language: es
  text: Enójense[a], y no pequen. No dejen que el sol se ponga sobre su enojo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si se enojan, no pequen». El griego está formalmente en imperativo («Enójense»), pero algunos lo entienden en el contexto como una exhortación concesiva.'
    reason: alternative_reading
  - marker: b
    text: Pablo probablemente hace eco del Salmo 4:4 (LXX 4:5), vinculando el enojo con el mandato de no pecar.
    reason: cross_reference
  - marker: c
    text: 'O: «sobre su provocación» o «mientras permanezcan irritados». El término griego puede referirse al enojo o al estado que lo provoca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργίζεσθε
  english_pob_choice: Be angry
  chosen_spanish: Airaos
  alternatives_spanish:
  - Enójense
  - Si se enojan
  lexicon: BDAG
  rationale: El griego es un imperativo presente; por eso conviene conservar la fuerza exhortativa. "Airaos" mantiene el valor verbal y la tensión del texto, sin convertirlo en una simple condición. "Enójense" sería más coloquial; "Si se enojan" debilita la forma imperativa.
- source_word: μὴ ἁμαρτάνετε
  english_pob_choice: do not sin
  chosen_spanish: no pequen
  alternatives_spanish:
  - no cometan pecado
  - y no pequen
  lexicon: BDAG
  rationale: La prohibición directa del griego se expresa con claridad en español como "no pequen". "Cometan pecado" suena más explicativo y menos natural en este contexto.
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: BDAG
  rationale: Traducción literal y transparente, sin necesidad de expansión.
- source_word: μὴ ἐπιδυέτω
  english_pob_choice: Do not let ... go down
  chosen_spanish: No dejen que ... se ponga
  alternatives_spanish:
  - No permita[n] que ... se ponga
  - No debe ponerse
  lexicon: BDAG
  rationale: En español, la prohibición tercera persona se vuelve idiomáticamente natural con "No dejen que... se ponga". Conserva la fuerza prohibitiva del griego y la imagen del movimiento del sol.
- source_word: ἐπὶ παροργισμῷ ὑμῶν
  english_pob_choice: on your anger
  chosen_spanish: sobre su enojo
  alternatives_spanish:
  - sobre su provocación
  - mientras permanezcan irritados
  - sobre su ira
  lexicon: BDAG
  rationale: παροργισμός puede referirse al enojo o a la irritación que lo provoca. En este contexto, el paralelo con "airaos" favorece entenderlo como el estado de enojo; por eso "enojo" comunica mejor el sentido que "provocación".
theological_decisions:
- issue: ¿El inicio debe entenderse como mandato o como concesión condicional?
  english_pob_reading: 'Rendered as an imperative: ''Be angry, and do not sin.'''
  chosen_spanish_reading: 'Se mantiene como imperativo: «Airaos, pero no pequen.»'
  alternative_spanish_readings:
  - Si se enojan, no pequen.
  - Si están enojados, no pequen.
  rationale: La forma griega es imperativa, y la traducción debe preservar esa tensión sin resolverla. No se está aprobando el pecado; la prohibición inmediata limita moral y temporalmente el enojo. La redacción española conserva esa relación entre mandato y restricción.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación posible con el Salmo 4:4 (LXX 4:5)
  english_pob_reading: Paul likely echoes Psalm 4:4 (LXX 4:5), linking anger with the command not to sin.
  chosen_spanish_reading: Se conserva la formulación que recuerda el eco del Salmo, sin explicitarlo en el texto principal.
  alternative_spanish_readings:
  - Incorporar una nota explícita al Salmo 4:4.
  - Traducir de modo más libre para hacer visible el eco salmódico.
  rationale: La alusión salmódica es importante para la lectura teológica, pero no debe cargarse al texto principal. Una nota permite mantener la transparencia del eco sin sobretraducción.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y se mantuvo sin cambios en el pasaje fuente inglés; esta propuesta sigue esa lectura estable y conserva tanto la forma imperativa como la ambigüedad léxica relevante de παροργισμός.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en este proyecto, pero este versículo no contiene el nombre divino.
  - «Airaos» conserva la fuerza del imperativo plural y evita suavizar el mandato.
  - «enojo» se eligió para παροργισμός por cercanía contextual con ὀργίζεσθε.
  - Se evitó «Cristo»/«Mesías» porque no hay término cristológico en el versículo.
  - 'La puntuación española sigue el ritmo breve del original: mandato, prohibición y cláusula final con imagen temporal.'
