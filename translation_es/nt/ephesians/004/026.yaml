revisions:
- from: Airaos[a], pero no pequen. No dejen[b] que el sol se ponga[c] sobre su enojo.
  to: Enójense[a], y no pequen. No dejen que el sol se ponga sobre su enojo[c][b].
  rationale: La revisión es menor pero necesaria para ajustar el español al registro objetivo del proyecto, corregir la ubicación de las notas según la evidencia y mejorar la naturalidad de una nota explicativa. «Enójense» preserva el imperativo griego sin el tono arcaico de «Airaos». Se mantiene «sobre su enojo» como texto principal por claridad y paralelo con la primera cláusula, y se conservan las alternativas léxicas en nota.
