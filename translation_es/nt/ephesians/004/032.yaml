translation:
  language: es
  text: Y sean bondadosos unos con otros, compasivos, perdonándose unos a otros[b], así como Dios en el Mesías[a] los perdonó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en Cristo».'
    reason: alternative_reading
  - marker: b
    text: 'También: «tal como Dios en el Mesías también los perdonó».'
    reason: alternative_reading
lexical_decisions:
- source_word: γίνεσθε
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - háganse
  lexicon: BDAG
  rationale: Es un imperativo presente de estado o conducta continua; en español, «sean» comunica mejor la exhortación ética sostenida que una paráfrasis más marcada como «lleguen a ser».
- source_word: εἰς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: La relación recíproca se expresa de forma natural y clara en español con «unos con otros», sin perder el sentido mutuo del original.
- source_word: χρηστοί
  english_pob_choice: kind
  chosen_spanish: bondadosos
  alternatives_spanish:
  - amables
  - benignos
  - buenos
  lexicon: BDAG
  rationale: El término describe una disposición favorable y benevolente hacia el prójimo; «bondadosos» conserva ese matiz interpersonal en español actual. «Amables» puede sonar más superficial en este contexto.
- source_word: εὔσπλαγχνοι
  english_pob_choice: tenderhearted
  chosen_spanish: compasivos
  alternatives_spanish:
  - de tierno corazón
  - misericordiosos
  - entrañables
  lexicon: BDAG
  rationale: El griego apunta a una compasión profunda y afectiva. «Compasivos» comunica bien el sentido central en español y evita una expresión demasiado literal o poco natural.
- source_word: χαριζόμενοι
  english_pob_choice: forgiving one another
  chosen_spanish: perdonándose unos a otros
  alternatives_spanish:
  - mostrando gracia unos a otros
  - otorgándose perdón unos a otros
  lexicon: BDAG
  rationale: En este contexto el verbo se entiende como remitir la ofensa o perdonar, confirmado por la comparación con la acción de Dios al final del versículo. «Perdonándose unos a otros» es la opción más clara y fiel.
- source_word: ἑαυτοῖς
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - a sí mismos
  lexicon: BDAG
  rationale: Aunque la forma es reflexiva, en uso recíproco plural funciona como «unos a otros». Mantiene la reciprocidad sin introducir una lectura reflexiva errónea.
- source_word: καθὼς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: así como ... también
  alternatives_spanish:
  - como también
  - tal como
  lexicon: BDAG
  rationale: La comparación incluye énfasis de correspondencia; «así como ... también» conserva esa relación sin sonar forzado en español.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Es el sujeto directo y se traduce de manera estándar como «Dios».
- source_word: ἐν Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  - por el Mesías
  lexicon: BDAG
  rationale: Se preserva el valor titular de Χριστός como «Mesías», conforme al criterio editorial. «En el Mesías» conserva la preposición ἐν y mantiene la referencia cristológica sin volverla una interpretación más dinámica.
- source_word: ἐχαρίσατο
  english_pob_choice: forgave
  chosen_spanish: perdonó
  alternatives_spanish:
  - fue generoso al perdonar
  - concedió gracia
  lexicon: BDAG
  rationale: En este contexto el aoristo medio de χαρίζομαι expresa la acción divina de perdonar. «Perdonó» es el equivalente más directo en español, mientras que el trasfondo de gracia queda implícito en el verbo y en el contexto.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ustedes
  lexicon: BDAG
  rationale: El destinatario plural se integra naturalmente en español con el clítico de objeto directo asociado a «perdonó» en esta construcción.
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: in the Messiah
  chosen_spanish_reading: en el Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se mantiene la política de traducir Χριστός como título cuando el contexto lo presenta así. En esta doxología ética, la frase conserva un valor titular transparente y no requiere la forma litúrgica «Cristo» para ser inteligible.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Relación entre el perdón humano y el perdón divino
  english_pob_reading: forgiving one another, just as God in the Messiah forgave you
  chosen_spanish_reading: perdonándose unos a otros, así como Dios también los perdonó en el Mesías
  alternative_spanish_readings:
  - perdonándose unos a otros, tal como Dios en el Mesías también los perdonó
  rationale: 'La comparación mantiene el fundamento ético: el perdón entre creyentes se modela en la acción previa de Dios. La redacción evita suavizar la exigencia moral o diluir el paralelismo.'
  doctrine_reference: Ética paulina de imitación divina en el contexto de Efesios 4:32
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones del POB en inglés. El punto principal de auditoría es Χριστός/Christ: el registro inglés osciló entre «the Messiah» y «Christ», pero la corrección final restauró «Messiah» por coherencia doctrinal. La versión española conserva esa decisión con «el Mesías». También se consideró la fuerza de καθὼς καὶ, que el inglés simplificó a «just as»; en español se optó por «así como ... también» para mantener de forma natural la correspondencia enfática del griego.'
  spanish_consistency_notes:
  - Se usó «bondadosos» para χρηστοί y «compasivos» para εὔσπλαγχνοι para evitar sinonimia plana.
  - Se mantuvo la reciprocidad con «unos con otros» tanto en la exhortación inicial como en el participio de perdón.
  - Se preservó «Mesías» en lugar de «Cristo» para seguir la política editorial del proyecto.
  - Se evitó sobretraducir ἐν Χριστῷ como «por medio del Mesías»; la preposición «en» se conserva.
  - El pronombre objeto «los» en «los perdonó» se ajusta al referente plural implícito de ὑμῖν y a la sintaxis natural del español.
