  spanish_quality_summary: El texto principal es claro, natural y de registro digno. «Habiéndose vuelto insensibles» y «se entregaron a la sensualidad» suenan bien en español bíblico contemporáneo. La única falla de calidad relevante está en la nota [a], que mezcla español con inglés. Conviene también afinar la formulación alternativa a un español idiomático completo.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. La elección de «sensualidad» para ἀσέλγεια y de «avidez» para πλεονεξία es defendible según la justificación documentada, aunque «codicia» se mantiene bien como alternativa de nota. No aparecen términos sensibles del glosario principal (Yahvé, Mesías, esclavo, etc.).
  issues:
  - severity: medium
    issue: La nota al pie [a] contiene la frase inglesa «past feeling».
    rationale: Las notas deben ser plenamente legibles en español y reflejar las alternativas del audit trail sin dejar inglés incrustado. Esto afecta fidelidad editorial y legibilidad, aunque no el sentido del texto principal.
  - severity: low
    issue: La alternativa española asociada a «past feeling» debe expresarse idiomáticamente en español.
    rationale: Una formulación como «ya sin sensibilidad» o «habiendo perdido toda sensibilidad» comunica mejor la opción léxica documentada que una cita en inglés.
  revised_spanish_text: quienes, habiéndose vuelto insensibles[a], se entregaron a la sensualidad[b] para practicar toda clase de impureza con avidez[c].
