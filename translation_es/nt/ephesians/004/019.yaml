translation:
  language: es
  text: quienes, habiéndose vuelto insensibles[a], se entregaron a la sensualidad[b] para practicar toda clase de impureza con avidez[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo perdido toda sensibilidad» o «quedando ya sin sensibilidad».
    reason: lexical_alternative
  - marker: b
    text: O «a la depravación» o «a la licenciosidad».
    reason: lexical_alternative
  - marker: c
    text: O «con codicia» o «en codicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - los cuales
  - quienes precisamente
  lexicon: BDAG
  rationale: El relativo introduce una referencia retomando a los gentiles ya mencionados. «Quienes» mantiene esa conexión sin añadir énfasis que el griego no exige.
- source_word: ἀπηλγηκότες
  english_pob_choice: having become callous
  chosen_spanish: habiéndose vuelto insensibles
  alternatives_spanish:
  - habiendo perdido toda sensibilidad
  - estando ya insensibles
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante de endurecimiento o insensibilidad. «Habiéndose vuelto insensibles» conserva ese valor de proceso culminado y estado presente, sin reducirlo a una mera reacción emocional.
- source_word: ἑαυτοὺς παρέδωκαν
  english_pob_choice: gave themselves over
  chosen_spanish: se entregaron
  alternatives_spanish:
  - se entregaron por completo
  - se abandonaron
  lexicon: BDAG
  rationale: La construcción reflexiva con παραδίδωμι comunica rendición voluntaria al vicio. «Se entregaron» es idiomático en español y preserva la idea de cederse deliberadamente.
- source_word: τῇ ἀσελγείᾳ
  english_pob_choice: to sensuality
  chosen_spanish: a la sensualidad
  alternatives_spanish:
  - a la depravación
  - a la licenciosidad
  lexicon: BDAG
  rationale: ἀσέλγεια denota conducta desenfrenada y sin vergüenza, a menudo sexual, pero no limitada a ello. «Sensualidad» mantiene esa amplitud con un registro natural en español; se evita estrecharlo solo a lo sexual o sustituirlo por un término más eclesiástico.
- source_word: εἰς ἐργασίαν
  english_pob_choice: for the practice of
  chosen_spanish: para practicar
  alternatives_spanish:
  - para la práctica de
  - para dedicarse a
  lexicon: BDAG
  rationale: Aquí ἐργασία apunta a actividad o ejercicio habitual, no a trabajo literal. «Para practicar» transmite el sentido de dedicarse activamente a ello con buena fluidez en español.
- source_word: ἀκαθαρσίας πάσης
  english_pob_choice: every kind of impurity
  chosen_spanish: toda clase de impureza
  alternatives_spanish:
  - toda impureza
  - cada clase de impureza
  lexicon: BDAG
  rationale: La combinación con πάσης es distributiva y expresa amplitud total. «Toda clase de impureza» refleja esa cobertura completa de manera natural en español.
- source_word: ἐν πλεονεξίᾳ
  english_pob_choice: with greediness
  chosen_spanish: con avidez
  alternatives_spanish:
  - con codicia
  - en codicia
  lexicon: BDAG
  rationale: πλεονεξία es deseo insaciable de tener más, y en este contexto modifica la manera de practicar la impureza. «Con avidez» conserva la fuerza de ansia desmedida; «codicia» es posible, pero puede sonar más restringida a lo material.
theological_decisions:
- issue: Fuerza moral de ἀπηλγηκότες
  english_pob_reading: The term is rendered as moral callousness rather than mere emotional numbness.
  chosen_spanish_reading: Se expresa como una insensibilidad moral ya asentada, no como simple frialdad emocional.
  alternative_spanish_readings:
  - habiendo perdido toda sensibilidad
  - estando pastosos de sentir
  rationale: En el contexto de Efesios, Pablo describe alienación ética y entrega al pecado. «Habiéndose vuelto insensibles» comunica ese endurecimiento moral sin patologizarlo ni reducirlo a un estado anímico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de ἀσέλγεια
  english_pob_reading: Rendered broadly as 'sensuality' rather than narrowly as explicitly sexual sin alone.
  chosen_spanish_reading: Se vierte ampliamente como «sensualidad», no como un vicio sexual exclusivamente definido.
  alternative_spanish_readings:
  - depravación
  - licenciosidad
  rationale: El término puede incluir desenfreno sexual, pero también una conducta sin pudor y sin freno. «Sensualidad» conserva esa amplitud y sigue siendo comprensible en español contemporáneo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios y que hubo alto acuerdo con el texto base. Esta versión mantiene esa línea, preservando la fuerza moral del participio perfecto, la amplitud de ἀσέλγεια y el matiz de πλεονεξία sin sobreinterpretarlos.
  spanish_consistency_notes:
  - Se mantiene «sensualidad» para ἀσέλγεια conforme al criterio POB de amplitud semántica.
  - «Avidez» refleja la cualidad insaciable de πλεονεξία sin convertirla en un término técnico de codicia material.
  - La sintaxis española conserva la progresión participial del griego con un orden fluido y publicable.
