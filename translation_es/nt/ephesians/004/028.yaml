translation:
  language: es
  text: El que roba, que no robe más, sino que más bien trabaje, haciendo con sus propias manos lo bueno[a], para que tenga qué compartir con quien tiene necesidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trabajando lo bueno» / «haciendo lo que es bueno».
    reason: lexical_alternative
  - marker: b
    text: O «con el que está necesitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κλέπτων
  english_pob_choice: The one who steals
  chosen_spanish: El que roba
  alternatives_spanish:
  - El ladrón
  - El que está robando
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente y describe a una persona caracterizada por robar. «El que roba» conserva el valor habitual/continuado sin convertirlo en una etiqueta fija más fuerte que el griego.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - no más
  lexicon: BDAG
  rationale: Con la negación «que no robe más» se expresa bien la cesación de una práctica previa. «Ya no» también sería viable, pero aquí «más» mantiene una estructura natural en español junto con el imperativo.
- source_word: κλεπτέτω
  english_pob_choice: must steal
  chosen_spanish: que no robe
  alternatives_spanish:
  - no debe robar
  - que deje de robar
  lexicon: BDAG
  rationale: El imperativo de tercera persona se vierte de manera natural en español con «que no robe», que conserva fuerza exhortativa sin volverlo demasiado jurídico. La idea es que cese el acto de robar.
- source_word: μᾶλλον δὲ
  english_pob_choice: but rather
  chosen_spanish: sino que más bien
  alternatives_spanish:
  - sino más bien
  - antes bien
  lexicon: BDAG
  rationale: 'La combinación española «sino que más bien» reproduce la oposición correctiva: no solo dejar una conducta, sino adoptar la contraria.'
- source_word: κοπιάτω
  english_pob_choice: must labor
  chosen_spanish: trabaje
  alternatives_spanish:
  - se afane
  - trabaje duro
  - labore
  lexicon: BDAG
  rationale: κοπιάω implica labor con esfuerzo, incluso cansancio. En español, «trabaje» es claro y digno; el matiz de esfuerzo se refuerza por el contexto y por la frase siguiente. «Labore» sería más formal pero menos natural.
- source_word: ἐργαζόμενος
  english_pob_choice: doing good work
  chosen_spanish: haciendo
  alternatives_spanish:
  - trabajando
  - obrando
  lexicon: BDAG
  rationale: El participio explica el modo de la labor. «Haciendo» permite unir de forma idiomática el participio con el complemento neutro siguiente, sin forzar una construcción extraña.
- source_word: τὸ ἀγαθόν
  english_pob_choice: good work / what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  - trabajo bueno
  lexicon: BDAG
  rationale: El neutro sustantivado apunta a «lo bueno» / «lo que es bueno». Se evita reducirlo de manera demasiado específica a «trabajo bueno» porque el griego es más amplio; la nota preserva la alternativa interpretativa que el POB inglés también retuvo.
- source_word: ταῖς ἰδίαις χερσὶν
  english_pob_choice: with his own hands
  chosen_spanish: con sus propias manos
  alternatives_spanish:
  - con las manos propias
  - por sus propias manos
  lexicon: BDAG
  rationale: La expresión idiomática subraya labor personal y honesta. «Con sus propias manos» es natural en español y refleja el valor de ἰδίαις.
- source_word: ἵνα ἔχῃ
  english_pob_choice: so that he may have something
  chosen_spanish: para que tenga qué
  alternatives_spanish:
  - a fin de que tenga
  - para que pueda tener
  lexicon: BDAG
  rationale: La finalidad del trabajo es disponer de recursos para compartir. «Para que tenga qué» reproduce de modo idiomático la idea implícita de tener algo disponible, sin añadir explícitamente más de lo que el contexto exige.
- source_word: μεταδιδόναι
  english_pob_choice: to share
  chosen_spanish: compartir
  alternatives_spanish:
  - dar
  - repartir
  - compartir de
  lexicon: BDAG
  rationale: El verbo implica dar desde lo propio, con sentido generoso y relacional. «Compartir» capta bien esa fuerza en español mejor que un simple «dar».
- source_word: τῷ χρείαν ἔχοντι
  english_pob_choice: with the one who has need
  chosen_spanish: con el que tiene necesidad
  alternatives_spanish:
  - con el necesitado
  - con el que está necesitado
  - al que tiene necesidad
  lexicon: BDAG
  rationale: El dativo describe al destinatario como uno que tiene necesidad. Se conserva la construcción con «con» porque el verbo «compartir» en español puede tomar complemento introducido por «con»; además evita convertir demasiado pronto la frase en un destinatario directo.
theological_decisions:
- issue: Finalidad ética del trabajo
  english_pob_reading: The verse presents honest labor as the divinely intended alternative to theft and as a means of generosity toward the needy.
  chosen_spanish_reading: El trabajo honesto aparece como la alternativa ordenada al robo y como medio para compartir con quien tiene necesidad.
  alternative_spanish_readings:
  - El énfasis principal es la autosuficiencia.
  - El énfasis principal es la restitución.
  rationale: La cláusula de propósito culmina en «para que tenga qué compartir con el que tiene necesidad», por lo que la meta no es solo sostenerse a sí mismo. La traducción deja visible la dimensión generosa y no introduce una doctrina adicional ajena al versículo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, manteniendo la fuerza del imperativo, la oposición correctiva y la finalidad de compartir. Se conserva la alternativa de traducción para τὸ ἀγαθόν y para el destinatario final, tal como el POB inglés documenta opciones equivalentes.
  spanish_consistency_notes:
  - Se usa «roba» y «no robe más» para conservar la progresión verbal y la idea de cese continuo.
  - «Lo bueno» refleja el neutro sustantivado τὸ ἀγαθόν sin cerrarlo prematuramente a «trabajo»; la nota aclara la alternativa.
  - Se mantiene «con» en «compartir con» para que la frase suene natural en español y siga el valor relacional del verbo.
  - No se emplean términos eclesiásticos tradicionales ajenos al contexto; el registro es sobrio y público.
