    issue: Las notas al pie están ancladas en frases incorrectas.
    rationale: La nota [a] explica una alternativa para «haciendo ... lo bueno», no para «no robe más». La nota [b] explica una alternativa para «el que tiene necesidad», no para «trabaje». Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: low
    issue: La construcción final puede expresarse de manera más natural en español.
    rationale: Aunque «compartir con el que tiene necesidad» es aceptable, «compartir con quien tiene necesidad» fluye mejor. Mantiene el sentido relacional de μεταδιδόναι sin forzar una lectura menos directa del destinatario.
  revised_spanish_text: El que roba, que no robe más, sino que más bien trabaje, haciendo con sus propias manos lo bueno[a], para que tenga qué compartir con quien tiene necesidad[b].
  revised_footnotes:
