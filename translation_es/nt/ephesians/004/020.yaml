lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: pronombre personal de 2.ª persona plural
  rationale: El griego explícita el pronombre para contraste; en español, «ustedes» es natural y neutral para un público amplio. No hace falta reforzarlo con un equivalente enfático añadido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Sin embargo
  lexicon: conjunción adversativa
  rationale: Introduce contraste con la conducta descrita antes; «Pero» conserva la fuerza adversativa con la mayor naturalidad en español.
- source_word: οὐχ οὕτως
  english_pob_choice: not in this way
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - no así
  - no de esa manera
  lexicon: adverbio de modo con negación
  rationale: La negación de οὕτως apunta al modo. En español, la idea queda bien en «así» dentro de la estructura negativa implícita del verbo en pasado; evita una repetición pesada y sigue indicando contraste de manera.
- source_word: ἐμάθετε
  english_pob_choice: did ... learn
  chosen_spanish: aprendieron
  alternatives_spanish:
  - llegaron a conocer
  - fueron enseñados
  lexicon: μανθάνω
  rationale: El aoristo activo de μανθάνω se rinde con el verbo simple «aprender». «Fueron enseñados» introduciría pasividad no presente aquí; «llegaron a conocer» sería más interpretativo.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  - al Cristo
  lexicon: Χριστός
  rationale: Se conserva el valor titular de Χριστός como «Mesías», conforme a la guía del proyecto. En español, el acusativo personal se expresa naturalmente con «a». No se sustituye por «Cristo» salvo que haya una razón idiomática o documental específica, que aquí no la hay.
theological_decisions:
- issue: Χριστός como título mesiánico, no solo nombre propio
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: El contexto trata de la identidad y enseñanza recibida en relación con el ungido prometido, no de un simple nombre fijo. «Mesías» preserva esa carga titular y la distinción auditada en la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: El expediente inglés registró oscilación entre «Christ» y «Messiah», con restauración final de «Messiah» por coherencia doctrinal. La versión española sigue esa lectura final y conserva la alternativa tradicional en nota para reflejar la tensión léxica sin borrarla.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, conforme al criterio del proyecto.
  - Se usa «ustedes» como pronombre plural neutral y «Pero» como adversativa breve y clara.
  - La estructura breve del versículo se conserva sin añadir información ausente en el griego.
