translation:
  language: es
  text: y no den lugar al diablo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse literalmente: ''dar lugar'' o ''dar espacio''; el griego dice, de manera más directa, ''dar lugar al diablo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: and do not
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y no den
  lexicon: BDAG
  rationale: La conjunción negativa continúa la exhortación previa; en español, 'y no' conserva la fuerza conectiva y prohibitiva de manera natural en un registro bíblico actual.
- source_word: δίδοτε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - den lugar
  - permitan
  - concedan
  lexicon: BDAG
  rationale: El imperativo plural se vierte con 'den' para mantener la orden directa. En combinación con τόπον, el giro español idiomático 'dar lugar' comunica bien la idea sin añadir explicación interpretativa.
- source_word: τόπον
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - sitio
  - oportunidad
  lexicon: BDAG
  rationale: '''Lugar'' refleja más de cerca el sustantivo griego τόπος y mantiene la tensión lexical documentada por la POB inglesa entre el sentido literal y el idiomático.'
- source_word: τῷ διαβόλῳ
  english_pob_choice: the devil
  chosen_spanish: al diablo
  alternatives_spanish:
  - al diablo, el acusador
  - al calumniador
  lexicon: BDAG
  rationale: Con artículo y en este contexto paulino, διάβολος funciona como designación personal del adversario. 'Al diablo' es la forma española estable y sobria para ese referente.
theological_decisions:
- issue: Si διάβολος debe leerse como un sustantivo común ('calumniador') o como el adversario personal
  english_pob_reading: the devil
  chosen_spanish_reading: el diablo
  alternative_spanish_readings:
  - el calumniador
  - el acusador
  rationale: La exhortación paulina apunta al adversario personal, no meramente a una figura genérica de difamación. 'El diablo' preserva esa lectura sin ampliar el texto.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión auditada de la POB inglesa que pasó de una paráfrasis interpretativa a una forma más directa: ''give place to the devil''. Por eso se evita ''oportunidad'' y se prefiere ''lugar'', manteniendo un registro formal y la cercanía al τόπον griego.'
  spanish_consistency_notes:
  - Se mantuvo 'diablo' en lugar de 'Satanás' porque el texto griego usa διάβολος y el audit trail inglés también eligió 'the devil'.
  - La construcción 'den lugar' preserva el valor idiomático natural del español sin desplazar el sentido literal de τόπον.
  - Se usó la forma verbal de tratamiento plural en imperativo ('den') por corresponder al sujeto implícito plural del contexto epistolar.
