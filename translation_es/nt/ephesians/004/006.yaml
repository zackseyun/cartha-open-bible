translation:
  language: es
  text: un solo Dios y Padre de todos[a], que está sobre todos y por medio de todos y en todos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''de todos'' en sentido de ''de toda persona'' / ''de todas las cosas''; el griego no expresa aquí un sustantivo explícito, así que ''todos'' puede mantenerse amplio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''en cada uno''. Algunos manuscritos leen ''en ustedes todos''.'
    reason: textual_variant
lexical_decisions:
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - único
  lexicon: gramática griega
  rationale: εἷς introduce con énfasis la unidad dentro del contexto inmediato de Efesios 4. En español, 'un solo' comunica con naturalidad esa unicidad enfática mejor que un simple 'uno'.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se traduce de manera estándar como 'Dios'. En este contexto confesional, el español natural no requiere artículo adicional.
- source_word: πατήρ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - padre
  lexicon: BDAG
  rationale: 'Se conserva como título divino y relacional: ''Padre''. La mayúscula responde al referente teológico en el contexto.'
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de toda persona
  - de todas las cosas
  lexicon: BDAG
  rationale: El genitivo plural es amplio y no lleva un sustantivo explícito. 'De todos' mantiene esa amplitud sin restringirlo a personas o cosas en el texto principal.
- source_word: ὁ
  english_pob_choice: who is
  chosen_spanish: el que está
  alternatives_spanish:
  - quien es
  - el que es
  lexicon: gramática griega
  rationale: El artículo con valor descriptivo introduce una cláusula explicativa. En español, 'el que está' suena natural y conserva el carácter relativo sin sobrecargar la frase.
- source_word: ἐπὶ πάντων
  english_pob_choice: over all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - encima de todos
  - por encima de todos
  lexicon: BDAG
  rationale: Con ἐπί y genitivo, la idea primaria es de superioridad o supremacía. 'Sobre todos' expresa bien esa relación en español.
- source_word: διὰ πάντων
  english_pob_choice: through all
  chosen_spanish: por medio de todos
  alternatives_spanish:
  - a través de todos
  - por todos
  lexicon: BDAG
  rationale: διά con genitivo puede indicar medio o agencia. 'Por medio de todos' es más claro y idiomático en español que un calco como 'a través de todos', aunque mantiene la noción de mediación/pervasividad.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - en cada uno
  - entre todos
  lexicon: BDAG
  rationale: La preposición ἐν con dativo plural se vierte de manera directa como 'en todos'. Se preserva la amplitud y la paralelía retórica del triple esquema preposicional.
theological_decisions:
- issue: Alcance de πάντων / πᾶσιν
  english_pob_reading: Render broadly as 'all' without specifying 'all people' or 'all things' in the main text.
  chosen_spanish_reading: Mantener 'todos' sin precisar 'todas las personas' ni 'todas las cosas' en el texto principal.
  alternative_spanish_readings:
  - todos los creyentes
  - todas las personas
  - todas las cosas
  rationale: El griego usa formas plurales amplias sin un sustantivo explícito. Dado que el contexto inmediato trata de la unidad de la iglesia, pero la redacción es más amplia, conviene preservar esa tensión en vez de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre Dios como Padre y su acción tripartita
  english_pob_reading: who is over all and through all and in all.
  chosen_spanish_reading: el que está sobre todos, y por medio de todos, y en todos.
  alternative_spanish_readings:
  - que es sobre todos y por medio de todos y en todos
  - el cual está sobre todo y por medio de todo y en todo
  rationale: La formulación española mantiene el paralelismo del original y evita suavizar la estructura triple. No se introduce una explicación doctrinal adicional que no esté en el texto.
  doctrine_reference: 'POB translation principle: preserve rhetorical and theological parallelism'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios: no se registraron revisiones aplicadas y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Padre' para πατήρ, en consonancia con el registro confesional del pasaje.
  - Se preserva la amplitud de 'todos' sin añadir limitadores interpretativos en el cuerpo principal.
  - La secuencia preposicional sobre/por medio/en refleja el paralelismo retórico del griego sin expandir el sentido más allá de lo atestiguado.
