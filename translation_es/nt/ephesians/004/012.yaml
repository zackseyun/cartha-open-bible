translation:
  language: es
  text: para la capacitación de los santos, para la obra del ministerio[a], para la edificación del cuerpo de Mesías[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obra de servicio». El griego διακονία puede significar «servicio» o «ministerio».
    reason: lexical_alternative
  - marker: b
    text: O «de Cristo». Χριστός se traduce aquí como «Mesías» para conservar su valor titular.
    reason: alternative_reading
  - marker: c
    text: 'El griego también puede entenderse de manera progresiva: «para capacitar a los santos para la obra del ministerio, para la edificación del cuerpo de Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - con el fin de
  lexicon: BDAG
  rationale: En esta cadena de finalidad después de los dones dados en el v. 11, πρός con acusativo expresa propósito; en español, «para» comunica esa finalidad de manera natural y fiel.
- source_word: καταρτισμὸν
  english_pob_choice: equipping
  chosen_spanish: equipamiento
  alternatives_spanish:
  - preparación
  - perfeccionamiento
  lexicon: BDAG
  rationale: καταρτισμός implica equipar, preparar o hacer apto. «Equipamiento» conserva la imagen funcional de dotar para una tarea y evita el posible malentendido de «perfeccionamiento» como impecabilidad moral.
- source_word: τῶν ἁγίων
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - el pueblo santo de Dios
  lexicon: BDAG
  rationale: ἅγιοι es el término paulino habitual para los creyentes como los apartados para Dios. «Los santos» preserva ese término estable en español sin reducirlo a la idea posterior de canonización.
- source_word: ἔργον διακονίας
  english_pob_choice: the work of ministry
  chosen_spanish: la obra del ministerio
  alternatives_spanish:
  - la obra del servicio
  - la labor del servicio
  lexicon: BDAG
  rationale: διακονία puede significar servicio o ministerio. Aquí «ministerio» encaja con el contexto eclesial y «obra» refleja bien el singular ἔργον, manteniendo la estructura del griego.
- source_word: διακονίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  lexicon: BDAG
  rationale: Aunque «servicio» es una glosa válida, «ministerio» expresa con más naturalidad el ámbito de función y servicio en la iglesia. No se restringe a un oficio clerical.
- source_word: οἰκοδομὴν
  english_pob_choice: building up
  chosen_spanish: edificación
  alternatives_spanish:
  - construcción
  - edificación progresiva
  lexicon: BDAG
  rationale: 'οἰκοδομή es metafórico: fortalecer o construir la comunidad. «Edificación» conserva la metáfora y es un término comprensible y sobrio en español bíblico.'
- source_word: σώματος
  english_pob_choice: the body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: σῶμα se traduce directamente como «cuerpo» y aquí apunta metafóricamente al pueblo corporativo de Dios.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Según la guía doctrinal, Χριστός se rinde normalmente como «Mesías» cuando funciona como título. Aquí el genitivo identifica a quién pertenece el cuerpo, por lo que se conserva el sentido titular.
theological_decisions:
- issue: Relación sintáctica de las tres frases preposicionales
  english_pob_reading: 'All three phrases are rendered as coordinate purpose phrases: the gifted leaders are given for equipping the saints, for the work of ministry, and for the building up of the body of the Messiah.'
  chosen_spanish_reading: 'Las tres frases se mantienen como fines coordinados: equipar a los santos, realizar la obra del ministerio y edificar el cuerpo de Mesías.'
  alternative_spanish_readings:
  - equipar a los santos para la obra del ministerio, lo cual resulta en la edificación del cuerpo de Mesías
  - equipar a los santos para la obra del ministerio y para la edificación del cuerpo de Mesías
  rationale: La secuencia griega πρός ... εἰς ... εἰς permite leer metas coordinadas o una progresión. La redacción elegida preserva la estructura sin decidir en exceso si el ministerio corresponde principalmente a los líderes o a toda la iglesia, manteniendo la tensión teológica documentada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Título Χριστοῦ en esta fórmula
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titular de Χριστός conforme a la política de la obra. La elección evita una transliteración habitual que en español puede sonar más confesional que descriptiva, y conserva la referencia al Ungido.
  doctrine_reference: 'DOCTRINE.md policy: render Χριστός as Mesías when functioning as a title.'
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre «Christ» y «Messiah», con restauración final de «Messiah» por política doctrinal. La versión española sigue esa decisión final y evita normalizar el título como nombre propio fijo. También conserva la ambigüedad sintáctica entre fines coordinados y lectura progresiva, como el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός cuando funciona como título, en consonancia con la política del proyecto.
  - Se traduce διακονία como «ministerio» en el texto principal, pero se deja nota de la alternativa «servicio».
  - «Edificación» conserva la metáfora constructiva de οἰκοδομή y es consistente con el registro bíblico en español.
  - La puntuación y el orden buscan reflejar la acumulación de propósitos del griego sin resolver de más la sintaxis.
