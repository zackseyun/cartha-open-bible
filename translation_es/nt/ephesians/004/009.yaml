translation:
  language: es
  text: Ahora, ¿qué significa «subió», sino que también descendió a las regiones inferiores de la tierra?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las regiones inferiores, es decir, la tierra»; la frase puede referirse simplemente al descenso a la tierra o, más específicamente, al ámbito de los muertos.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀνέβη
  english_pob_choice: he ascended
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  lexicon: BDAG
  rationale: El verbo aoristo de ἀναβαίνω expresa movimiento vertical; en español, «subió» mantiene la imagen con naturalidad y sigue el contraste con «descendió». «Ascendió» también es posible, pero suena más marcado o litúrgico en este contexto.
- source_word: τί ἐστιν εἰ μὴ ὅτι
  english_pob_choice: what does ... mean except that
  chosen_spanish: ¿qué significa ... sino que
  alternatives_spanish:
  - ¿qué es ... sino que
  - ¿qué implica ... sino que
  lexicon: BDAG
  rationale: La construcción introduce una inferencia a partir de la cita; «¿qué significa ... sino que» comunica bien la función argumentativa en español sin calcar la sintaxis griega.
- source_word: καὶ κατέβη
  english_pob_choice: he also descended
  chosen_spanish: también descendió
  alternatives_spanish:
  - descendió también
  - y descendió
  lexicon: BDAG
  rationale: Se conserva el valor aditivo de καί con «también». «Descendió» mantiene el paralelismo con «subió» y el movimiento descendente sugerido por el texto.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - en
  lexicon: BDAG
  rationale: En español, con verbos de movimiento, «a» expresa de forma natural la dirección. «Hacia» debilita más el ingreso; «en» sería menos preciso aquí.
- source_word: τὰ κατώτερα μέρη
  english_pob_choice: the lower regions
  chosen_spanish: las regiones más bajas
  alternatives_spanish:
  - las partes más bajas
  - las regiones inferiores
  lexicon: BDAG
  rationale: μέρη puede rendirse como «regiones» o «partes». Dado el ajuste ya documentado en inglés, «regiones» suena más natural en español y conserva la amplitud del sintagma sin decidir de antemano su referente.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra, es decir, la tierra misma
  - de la tierra, o sea, el mundo
  lexicon: BDAG
  rationale: γῆ admite «tierra» o «tierra/país». Aquí «tierra» preserva la amplitud cósmica del contraste y deja abierta la ambigüedad entre descenso a la tierra, al sepulcro o al ámbito de los muertos, conforme al expediente inglés.
theological_decisions:
- issue: Interpretación de εἰς τὰ κατώτερα μέρη τῆς γῆς
  english_pob_reading: Render the phrase transparently without specifying whether it refers to the earth in contrast to heaven, the grave/realm of the dead, or the incarnation more broadly.
  chosen_spanish_reading: Traducirla de manera transparente como «a las regiones más bajas de la tierra», sin resolver si alude simplemente a la tierra, al sepulcro o al ámbito de los muertos.
  alternative_spanish_readings:
  - a las regiones inferiores, es decir, la tierra
  - a las partes más bajas de la tierra, o sea, el reino de los muertos
  rationale: El griego permite más de una lectura y el expediente inglés preserva la tensión teológica. La redacción española mantiene esa ambigüedad en lugar de imponer una interpretación doctrinal específica.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla.
translation_notes:
  revision_awareness: El expediente inglés revisó «lower parts» a «lower regions» para una formulación más natural sin perder formalidad. La versión española refleja esa misma decisión con «regiones más bajas», manteniendo la ambigüedad del original y del audit trail.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto; no hay léxico de YHWH aquí.
  - Se mantiene el paralelismo ascenso/descenso con verbos simples y claros en español.
  - La nota al pie conserva la alternativa principal sin sobreinterpretar el referente de la frase.
