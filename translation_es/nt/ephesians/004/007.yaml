translation:
  language: es
  text: Pero a cada uno de nosotros se le dio la gracia conforme a la medida del don del Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de Cristo». El griego Χριστοῦ puede verterse «Cristo» cuando funciona más como nombre; aquí «Mesías» conserva mejor el sentido del título.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑνὶ δὲ ἑκάστῳ ἡμῶν
  english_pob_choice: to each one of us
  chosen_spanish: a cada uno de nosotros
  alternatives_spanish:
  - a cada uno
  - a cada uno de nosotros mismos
  lexicon: BDAG
  rationale: La construcción distributiva con ἑνὶ ... ἑκάστῳ enfatiza la asignación individual dentro del conjunto. En español, 'a cada uno de nosotros' conserva ese matiz distributivo y mantiene el alcance comunitario del pronombre 'de nosotros'.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición con leve contraste respecto del contexto anterior sobre la unidad del cuerpo. 'Pero' comunica bien ese giro discursivo en español natural sin exagerarlo.
- source_word: ἐδόθη
  english_pob_choice: was given
  chosen_spanish: se le dio
  alternatives_spanish:
  - fue dada
  - le fue dada
  lexicon: BDAG
  rationale: El aoristo pasivo se puede verter de forma simple y natural como 'se le dio'. Esta forma conserva el pasivo y suena menos rígida que una perífrasis más literal.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - la gracia concedida
  - el favor
  lexicon: BDAG
  rationale: χάρις aquí nombra el don/gracia repartido a cada creyente para la vida y el ministerio en el cuerpo. 'La gracia' preserva el vocabulario paulino y la amplitud teológica del término.
- source_word: κατὰ τὸ μέτρον
  english_pob_choice: according to the measure of
  chosen_spanish: conforme a la medida de
  alternatives_spanish:
  - según la medida de
  - de acuerdo con la medida de
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o proporción. 'Conforme a la medida de' reproduce bien esa relación proporcional en un español claro y digno.
- source_word: τῆς δωρεᾶς
  english_pob_choice: gift
  chosen_spanish: del don
  alternatives_spanish:
  - del regalo
  - de la dádiva
  lexicon: BDAG
  rationale: δωρεά subraya un don dado gratuitamente. 'Don' es la opción más natural y sobria en español para conservar la idea de regalo concedido sin redundancia.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: Messiah’s
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Siguiendo la terminología del proyecto, Χριστός se vierte como 'Mesías' cuando funciona como título. En este contexto el genitivo señala pertenencia u origen del don; 'del Mesías' preserva el valor titular del término y evita borrar la tensión léxica.
theological_decisions:
- issue: Sentido de χάρις en el contexto
  english_pob_reading: ‘Grace’ refers to individually apportioned gracious enablement/gift within the church, not saving grace in the narrow sense.
  chosen_spanish_reading: ‘La gracia’ se entiende aquí como gracia concedida de manera individual y capacitada para el servicio en la iglesia, no solo como gracia salvadora en sentido estrecho.
  alternative_spanish_readings:
  - gracia salvadora
  - favor divino general
  rationale: El contexto inmediato pasa de la unidad del cuerpo a la diversidad de dones y ministerios. Mantener 'gracia' sin añadir explicaciones al texto conserva la formulación paulina y deja abierta la amplitud contextual del término.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica sin resolverla de antemano; español moderno y fiel al contexto.'
- issue: Renderización de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El proyecto distingue el título 'Mesías' de la forma litúrgica/nombre 'Cristo'. Aquí el contexto favorece el sentido titular y el genitivo puede leerse como don perteneciente al Mesías o procedente de él.
  doctrine_reference: 'Contested terms: Χριστός → Mesías cuando funciona como título.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección de revisión que restauró 'Messiah' frente a una sustitución intermedia por 'Christ'. En español se sigue la política del proyecto y se mantiene 'Mesías' para Χριστός cuando opera como título, de modo que la decisión está alineada con la última corrección válida y con el glosario doctrinal del POB.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις y no se sustituye por 'favor' para conservar el vocabulario paulino.
  - '''Mesías'' se usa de forma consistente para Χριστός cuando el término conserva su fuerza titular.'
  - La pasiva impersonal 'se le dio' preserva el matiz del original sin volverlo demasiado literal o pesado.
  - La preposición 'conforme a' expresa proporcionalidad de manera idiomática en español bíblico contemporáneo.
