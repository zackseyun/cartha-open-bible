review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: propósito (''para que''), cese de inmadurez (''ya no seamos niños''), metáfora marítima (''zarandeados por las olas'') y vulnerabilidad doctrinal (''por todo viento de enseñanza''). También preserva razonablemente la progresión de engaño humano → astucia/cunning → esquema de error. Sin embargo, ''maniobra del error'' no representa bien μεθοδεία; suena mecánico y menos idiomático que ''estratagema'' o ''trama''. Además, la combinación ''astucia humana, por la artimaña'' repite campos semánticos demasiado cercanos y debilita la diferenciación entre κυβεία (trampa/engaño tramposo) y πανουργία (cunning/craftiness).'
  spanish_quality_summary: El español es mayormente claro y legible, con buen tono neutral y eclesial. 'Zarandeados por las olas' y 'llevados de aquí para allá' suenan naturales. No obstante, 'maniobra del error' es poco natural en este contexto y 'astucia humana' puede sonar demasiado neutral o incluso positiva, mientras que el griego exige una connotación más abiertamente engañosa. Conviene afinar esa parte para mayor precisión y fluidez.
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. Se mantiene 'enseñanza' para διδασκαλία, en línea con la auditoría inglesa, y 'error' para πλάνη, con alternativa en nota para 'engaño'. La revisión propuesta mejora la precisión léxica de κυβεία y μεθοδεία sin apartarse de la rationale documentada.
  issues:
  - severity: medium
    issue: '''astucia humana'' suaviza demasiado ἐν τῇ κυβείᾳ τῶν ἀνθρώπων'
    rationale: κυβεία no es mera astucia sino trampa/engaño tramposo, con trasfondo literal de juego de dados. 'Astucia' en español puede ser neutral o admirativa; 'trampa humana' o 'engaño humano' expresa mejor la carga negativa.
  - severity: medium
    issue: '''maniobra del error'' no comunica bien πρὸς τὴν μεθοδείαν τῆς πλάνης'
    rationale: μεθοδεία denota plan, estratagema o esquema deliberado. 'Maniobra' suena poco idiomática aquí y no enlaza bien con 'de error'. 'Estratagema del error' o 'trama del error' representan mejor la intención calculada.
  - severity: low
    issue: La repetición 'astucia humana ... artimaña' reduce la diferenciación entre las dos expresiones griegas
    rationale: 'El texto griego usa dos términos relacionados pero distinguibles: κυβεία y πανουργία. En español conviene evitar casi duplicarlos con vocablos demasiado superpuestos.'
