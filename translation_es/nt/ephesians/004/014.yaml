revisions:
- from: para que ya no seamos niños[a], zarandeados por las olas y llevados de aquí para allá por todo viento de enseñanza, por la astucia humana, por la artimaña en la maniobra del error[c][b],
  to: para que ya no seamos niños[a], zarandeados por las olas y llevados de aquí para allá por todo viento de enseñanza, por la trampa humana, por la astucia en la estratagema del error[c][b],
  rationale: Se cambió 'astucia humana' por 'trampa humana' para reflejar mejor κυβεία como engaño tramposo, manteniendo la nota sobre los dados. Se conservó 'astucia' para πανουργία, donde encaja mejor como 'craftiness'. Se reemplazó 'maniobra del error' por 'estratagema del error' para representar con más precisión y naturalidad μεθοδεία como plan deliberado. El resto del versículo ya era fiel y claro.
  reviewer_model: gpt-5.4
