translation:
  language: es
  text: para que ya no seamos niños[a], zarandeados por las olas y llevados de aquí para allá por todo viento de enseñanza, por la trampa humana, por la astucia en la estratagema del error[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por todo viento de doctrina'.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'en el juego de dados de los hombres', una imagen de engaño o trampa.
    reason: cultural_note
  - marker: c
    text: O 'en la estratagema del engaño' o 'hacia la estratagema del engaño'.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación de propósito/resultado que introduce ἵνα, conservando el valor final de la cláusula anterior.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  lexicon: BDAG
  rationale: En español moderno, 'ya no' comunica con claridad la cesación de un estado previo sin sonar forzado.
- source_word: νήπιοι
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - infantes
  - criaturas
  lexicon: BDAG
  rationale: Aquí la imagen es metafórica para inmadurez; 'niños' es la opción más natural en español y mantiene la idea de falta de madurez.
- source_word: κλυδωνιζόμενοι
  english_pob_choice: tossed by waves
  chosen_spanish: zarandeados por las olas
  alternatives_spanish:
  - azotados por las olas
  - tossed and fro
  lexicon: BDAG
  rationale: El verbo evoca ser batidos por el oleaje. 'Zarandeados por las olas' conserva la imagen marítima y el sentido de inestabilidad con buena fluidez en español.
- source_word: περιφερόμενοι
  english_pob_choice: carried about
  chosen_spanish: llevados de aquí para allá
  alternatives_spanish:
  - arrastrados de un lado a otro
  - movidos de acá para allá
  lexicon: BDAG
  rationale: La pasiva indica ser impulsados o desplazados continuamente. 'Llevados de aquí para allá' es idiomático y reproduce esa dispersión.
- source_word: παντὶ ἀνέμῳ τῆς διδασκαλίας
  english_pob_choice: by every wind of teaching
  chosen_spanish: por todo viento de enseñanza
  alternatives_spanish:
  - por todo viento de doctrina
  - por cada viento de enseñanza
  lexicon: BDAG
  rationale: Se conserva 'enseñanza' como equivalente directo de διδασκαλία, siguiendo la decisión inglesa de no forzar 'doctrina' donde el griego es más amplio. 'Todo viento' reproduce la generalidad de παντὶ ἀνέμῳ.
- source_word: ἐν τῇ κυβείᾳ τῶν ἀνθρώπων
  english_pob_choice: by human trickery
  chosen_spanish: por la astucia humana
  alternatives_spanish:
  - por el engaño de los hombres
  - por la trampa humana
  lexicon: BDAG
  rationale: κυβεία alude literalmente al juego con dados y, por extensión, al engaño tramposo. 'Astucia humana' comunica el sentido manipulador de manera natural, aunque la nota conserva la imagen más literal.
- source_word: ἐν πανουργίᾳ
  english_pob_choice: by craftiness
  chosen_spanish: por la artimaña
  alternatives_spanish:
  - por la astucia
  - por la malicia
  lexicon: BDAG
  rationale: πανουργία tiene la idea de habilidad deshonesta y sagacidad malvada. 'Artimaña' preserva el matiz de recurso engañoso, distinto de una simple 'astucia' neutral.
- source_word: πρὸς τὴν μεθοδείαν τῆς πλάνης
  english_pob_choice: in the scheming of error
  chosen_spanish: en la maniobra del error
  alternatives_spanish:
  - en la estrategia del engaño
  - para la trama del error
  lexicon: BDAG
  rationale: μεθοδεία sugiere un plan o procedimiento calculado; 'maniobra' intenta captar ese carácter estratégico sin sobrecargar el español. 'Error' conserva la amplitud semántica de πλάνη, en línea con la decisión inglesa.
theological_decisions:
- issue: διδασκαλία como 'enseñanza' y no 'doctrina'
  english_pob_reading: teaching
  chosen_spanish_reading: enseñanza
  alternative_spanish_readings:
  - doctrina
  rationale: La POB inglesa eligió 'teaching' para evitar restringir el término a un sistema doctrinal formal. En español, 'enseñanza' mantiene esa amplitud y la advertencia contra influencias formativas inestables.
  doctrine_reference: Translation philosophy §6
- issue: πλάνη como 'error'
  english_pob_reading: error
  chosen_spanish_reading: error
  alternative_spanish_readings:
  - engaño
  - decepción
  rationale: '''Error'' conserva el alcance semántico de πλάνη entre desviación, extravío y falsedad, sin imponer de entrada que todo el énfasis recaiga en la intención engañosa.'
  doctrine_reference: Translation philosophy §3
- issue: κυβεία con imagen literal de dados versus sentido idiomático
  english_pob_reading: Literally 'in the dice-playing of men,' an image for cheating or trickery.
  chosen_spanish_reading: astucia humana / artimaña
  alternative_spanish_readings:
  - juego de dados de los hombres
  - engaño tramposo de los hombres
  rationale: El español público normal no recibe de inmediato la imagen de 'dados' como metáfora de trampa; por eso el texto principal comunica el sentido. La nota conserva la metáfora literal para el trazado auditable.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión revisada del POB inglés: se prefirió ''in the scheming of error'' frente a ''toward the scheming of error''. En español, esto se reflejó con ''en la maniobra del error'' para mantener la relación locativa/instrumental de ἐν y la noción de un plan calculado. También se preservó la imagen marítima y la metáfora de inestabilidad, evitando sustituirla por un resumen más abstracto.'
  spanish_consistency_notes:
  - Se mantuvo 'enseñanza' para διδασκαλία en coherencia con el criterio POB de no estrecharlo a 'doctrina'.
  - '''Error'' se usó para πλάνη por consistencia con la amplitud semántica ya documentada.'
  - 'El orden de los complementos conserva la secuencia retórica del griego: inestabilidad personal, viento doctrinal, engaño humano y planificación del error.'
  - La puntuación final con coma sigue el flujo del segmento griego, que continúa con la frase siguiente en el contexto mayor.
