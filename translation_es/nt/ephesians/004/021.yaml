  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está bien preservado; no hay términos como Yahvé/Mesías/esclavo implicados. La decisión de mantener «en» en ambas expresiones ἐν concuerda con la política teológica del proyecto.
