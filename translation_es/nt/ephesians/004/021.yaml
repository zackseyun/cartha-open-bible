translation:
  language: es
  text: si en verdad lo oyeron[a] y fueron enseñados en él, tal como verdad está en Jesús[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega dice más literalmente «lo oyeron». También puede entenderse como «oyeron sobre él»; sin embargo, el objeto directo mantiene mejor la fuerza del texto y la cercanía de la proclamación apostólica a la voz de Cristo.
    reason: alternative_reading
  - marker: b
    text: «En él» y «en Jesús» pueden expresar esfera, unión o relación estrecha; el griego deja la idea más amplia que un simple «por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si ciertamente
  - si de verdad
  - si en efecto
  lexicon: BDAG
  rationale: La combinación introduce una condición con matiz de afirmación enfática. «Si en verdad» conserva la forma condicional y la fuerza de γε sin convertirla en una causal como «puesto que».
- source_word: αὐτὸν ἠκούσατε
  english_pob_choice: you heard him
  chosen_spanish: lo oyeron a él
  alternatives_spanish:
  - oyeron sobre él
  - lo escucharon
  - oyeron de él
  lexicon: BDAG
  rationale: El objeto directo acusa una relación directa con «αὐτόν». En español, «lo oyeron a él» mantiene esa fuerza formal, aunque suene algo marcado; evita resolver prematuramente la frase como «oyeron sobre él».
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - mediante él
  - unidos a él
  lexicon: BDAG
  rationale: La preposición ἐν con dativo se traduce de manera más directa como «en». Se conserva así la posible idea de esfera o unión, sin reducirla a agencia instrumental.
- source_word: ἐδιδάχθητε
  english_pob_choice: were taught
  chosen_spanish: fueron enseñados
  alternatives_spanish:
  - recibieron enseñanza
  - fueron instruidos
  lexicon: BDAG
  rationale: El pasivo aoristo se refleja con «fueron enseñados», que es claro y fiel. «Instruidos» es posible, pero menos directo y menos natural en este contexto.
- source_word: καθώς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - justo como
  lexicon: BDAG
  rationale: «Así como» expresa bien la comparación y enlaza la instrucción con la verdad que está en Jesús, sin sobreinterpretar la relación.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - realidad
  lexicon: BDAG
  rationale: 'Aunque el anartro puede sonar simplemente como «verdad», en español el artículo resulta natural y ayuda a la fluidez: «la verdad está en Jesús». Mantiene el peso conceptual del término.'
- source_word: ἐν τῷ Ἰησοῦ
  english_pob_choice: in Jesus
  chosen_spanish: en Jesús
  alternatives_spanish:
  - unido a Jesús
  - en la persona de Jesús
  lexicon: BDAG
  rationale: Se preserva el personal «Jesús» y la preposición «en», porque el griego deja abierta la fuerza de esfera, unión o localización. No se resuelve la tensión con una paráfrasis más interpretativa.
theological_decisions:
- issue: 'Cómo renderizar αὐτὸν ἠκούσατε: ¿«lo oyeron a él» o una forma idiomática como «oyeron sobre él»?'
  english_pob_reading: heard him
  chosen_spanish_reading: lo oyeron a él
  alternative_spanish_readings:
  - oyeron sobre él
  - oyeron acerca de él
  rationale: La construcción griega con objeto directo favorece una traducción más literal. Se conserva así la intensidad del testimonio apostólico sin añadir una glosa que el texto no expresa explícitamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo representar las dos frases con ἐν para no borrar la tensión de unión/esfera/medio.
  english_pob_reading: in him / in Jesus
  chosen_spanish_reading: en él / en Jesús
  alternative_spanish_readings:
  - por él / por Jesús
  - mediante él / en unión con Jesús
  rationale: Mantener «en» en ambos lugares deja abierta la amplitud semántica del griego y evita decidir demasiado pronto por una lectura instrumental. Así se preserva la tensión teológica y lingüística del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No se introdujeron revisiones textuales respecto del flujo de referencia proporcionado; la redacción española sigue de cerca el paquete fuente griego y conserva las tensiones señaladas por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio personal, no «Cristo», porque el griego usa Ἰησοῦς.
  - Se preservó la repetición de «en» para reflejar la estructura paralela del original.
  - Se evitó resolver «ἐν» como «por» o «mediante» para no perder la ambigüedad teológica documentada.
  - Se eligió «si en verdad» para reproducir el matiz enfático de εἴ γε sin convertirlo en una afirmación causal.
