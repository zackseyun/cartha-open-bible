translation:
  language: es
  text: y vestirse con el nuevo hombre[a], creado según Dios[b], en rectitud[c] y santidad de la verdad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nuevo ser' o 'nueva persona'. El griego dice literalmente 'nuevo hombre', en paralelo con el 'hombre viejo' del contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'conforme a Dios' o 'a la manera de Dios'. La frase griega puede expresar conformidad con Dios o correspondencia con su patrón.
    reason: lexical_alternative
  - marker: c
    text: O 'justicia' para δικαιοσύνη.
    reason: alternative_reading
  - marker: d
    text: O 'de verdad' o 'verdadera', según cómo se entienda el genitivo τῆς ἀληθείας.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνδύσασθαι
  english_pob_choice: to put on
  chosen_spanish: vestirse de
  alternatives_spanish:
  - ponerse
  - revestirse de
  lexicon: BDAG
  rationale: El griego conserva la metáfora de vestidura; en español, 'vestirse de' reproduce esa imagen de forma natural sin perderla. 'Ponerse' sería más breve, pero menos explícito en cuanto al campo metafórico.
- source_word: καινὸν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - renovado
  - fresco
  lexicon: BDAG
  rationale: '''Nuevo'' es la equivalencia más directa y amplia para καινός, y preserva la oposición con el ''viejo'' del contexto inmediato.'
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - yo
  - ser humano
  lexicon: BDAG
  rationale: Se conserva la correspondencia con el contraste contextual de 'hombre viejo / hombre nuevo'. 'Persona' o 'yo' suavizarían el enlace léxico y harían más interpretativo el texto.
- source_word: κατὰ θεόν
  english_pob_choice: according to God
  chosen_spanish: según Dios
  alternatives_spanish:
  - conforme a Dios
  - a la manera de Dios
  - a imagen de Dios
  lexicon: BDAG
  rationale: '''Según Dios'' mantiene la fuerza relacional de κατά con acusativo sin introducir una explicación más amplia que el griego no exige. ''A imagen de Dios'' o ''conforme a Dios'' serían posibles, pero más interpretativos.'
- source_word: κτισθέντα
  english_pob_choice: created
  chosen_spanish: creado
  alternatives_spanish:
  - formado
  - hecho
  lexicon: BDAG
  rationale: '''Creado'' reproduce el lenguaje de creación del participio pasivo y conserva el peso teológico del pasaje.'
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque la pauta general favorece 'justicia' como equivalente válido de δικαιοσύνη, aquí se mantiene 'justicia' para reflejar la amplitud semántica y permitir la nota sobre la alternativa 'rectitud'. En español bíblico, 'justicia' no se limita a legalidad estrecha.
- source_word: ὁσιότητι
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - piedad
  - devoción
  lexicon: BDAG
  rationale: '''Santidad'' es el equivalente más natural y teológicamente cargado para ὁσιότης en español. ''Piedad'' o ''devoción'' desplazan el énfasis hacia la práctica religiosa y no expresan tan bien la cualidad de ser santo.'
- source_word: τῆς ἀληθείας
  english_pob_choice: of the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - verdadera
  - que proviene de la verdad
  lexicon: BDAG
  rationale: Se conserva el genitivo como 'de la verdad' para no resolver de antemano la relación exacta entre 'verdad' y las cualidades nombradas. Esto mantiene la transparencia del original y evita una paráfrasis que cierre la ambigüedad.
theological_decisions:
- issue: Expresión antropológica en 'new man'
  english_pob_reading: Retain 'new man' rather than interpretive 'new self.'
  chosen_spanish_reading: Mantener 'nuevo hombre' en lugar de 'nuevo yo' o 'nueva persona'.
  alternative_spanish_readings:
  - nuevo yo
  - nueva persona
  rationale: El texto griego usa ἄνθρωπον en paralelo con el motivo del 'hombre viejo' del contexto. 'Nuevo hombre' conserva ese vínculo léxico y la representación corporativa/antropológica del pasaje, mientras que 'yo' o 'persona' introducen una interpretación no explícita.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La forma elegida mantiene el campo semántico bíblico y la posibilidad de lectura ética/covenantal. 'Rectitud' es una alternativa válida, pero menos habitual en español para este término paulino en este contexto.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
- issue: Función del genitivo τῆς ἀληθείας
  english_pob_reading: of the truth
  chosen_spanish_reading: de la verdad
  alternative_spanish_readings:
  - verdadera
  - verdad que caracteriza
  rationale: Se evita convertir el genitivo en adjetivo ('verdadera') para no perder la estructura del griego. La lectura elegida deja abierta la posibilidad de que la verdad califique ambas cualidades o la frase completa.
  doctrine_reference: Genitive handling / source transparency
translation_notes:
  revision_awareness: La auditoría inglesa pasó por una oscilación entre 'righteousness and holiness of the truth' y una revisión interpretativa a 'true righteousness and holiness', pero la pasarela final restauró la lectura más literal con el genitivo 'of the truth'. Esta versión española sigue esa decisión final y mantiene el genitivo explícito como 'de la verdad', sin convertirlo en adjetivo. También conserva 'new man' como solución de consistencia contextual frente a alternativas más interpretativas.
  spanish_consistency_notes:
  - Se mantiene la metáfora de vestir para ἐνδύσασθαι con 'vestirse de'.
  - '''Nuevo hombre'' conserva el enlace con el ''hombre viejo'' del contexto inmediato.'
  - '''Según Dios'' sigue de cerca κατά con acusativo sin sobreinterpretarlo.'
  - '''Justicia'' se usa como equivalente principal de δικαιοσύνη, con ''rectitud'' reservada como alternativa.'
  - '''Santidad'' traduce ὁσιότης de forma natural en español eclesial.'
  - '''De la verdad'' preserva la estructura genitiva de τῆς ἀληθείας.'
