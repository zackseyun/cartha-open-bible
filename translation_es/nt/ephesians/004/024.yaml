  to: y vestirse con el nuevo hombre[a], creado según Dios[b], en rectitud[c] y santidad de la verdad[d].
  rationale: Se corrige la construcción verbal para que el español suene natural y siga mejor el acusativo griego; se reubica la nota sobre κατὰ θεόν en su anclaje correcto; y se ajusta δικαιοσύνη a 'rectitud' por mejor adecuación contextual en español, preservando 'justicia' como alternativa documentada. No se requiere adjudicación adicional porque los cambios son menores, claros y bien sustentados por el source packet y el audit trail.
