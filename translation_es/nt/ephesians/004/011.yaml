translation:
  language: es
  text: Y él mismo dio a unos como apóstoles, a otros como profetas, a otros como evangelistas, y a otros como pastores de rebaño y maestros[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastores y maestros». El griego dice literalmente «pastores de rebaño y maestros».
    reason: lexical_alternative
  - marker: b
    text: El único artículo antes de «pastores de rebaño y maestros» puede indicar una relación especialmente estrecha entre estas funciones, aunque la frase no necesariamente debe entenderse como un solo oficio.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Además
  lexicon: BDAG
  rationale: Conserva la continuidad discursiva sin cargar el sentido más allá de la simple conexión del texto.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - mismo él
  lexicon: BDAG
  rationale: La posición enfática del pronombre se expresa naturalmente en español con 'él mismo', preservando la idea de que el dador actúa personalmente.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se vierte con el verbo básico 'dar'; en este contexto, el sentido de conceder personas a la iglesia queda bien reflejado con 'dio'.
- source_word: τοὺς μὲν ἀποστόλους
  english_pob_choice: some as apostles
  chosen_spanish: a unos como apóstoles
  alternatives_spanish:
  - a algunos como apóstoles
  - unos apóstoles
  lexicon: BDAG
  rationale: La construcción distributiva μεν/δέ se expresa de forma natural con 'a unos... a otros...', evitando una repetición demasiado literal de los artículos y manteniendo el valor distributivo del griego.
- source_word: προφήτας
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - videntes
  - mensajeros
  lexicon: BDAG
  rationale: Traducción directa y estándar de προφήτης, sin necesidad de matizar más el término en este contexto.
- source_word: εὐαγγελιστάς
  english_pob_choice: evangelists
  chosen_spanish: evangelistas
  alternatives_spanish:
  - proclamadores de las buenas noticias
  lexicon: BDAG
  rationale: '''Evangelistas'' es el equivalente asentado y preciso en español para εὐαγγελιστής, y funciona bien dentro de la lista de ministerios.'
- source_word: ποιμένας
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores
  lexicon: BDAG
  rationale: Aunque el sentido literal de ποιμήν es 'pastor/guardián de rebaño', en español 'pastores' es la forma más natural y transparente para el lector eclesial, y además preserva la alternativa tradicional que el inglés POB deja en nota. Se mantiene la tensión entre el oficio eclesial y la metáfora pastoral.
- source_word: καὶ διδασκάλους
  english_pob_choice: and teachers
  chosen_spanish: y maestros
  alternatives_spanish:
  - y doctores
  - y enseñantes
  lexicon: BDAG
  rationale: '''Maestros'' comunica con claridad διδάσκαλος en español bíblico contemporáneo y conserva la coordinación con el término anterior sin forzar una fusión semántica.'
theological_decisions:
- issue: 'Cómo traducir ποιμένας: metáfora literal de ''shepherds'' frente al título eclesial ''pastors'''
  english_pob_reading: shepherds, with 'pastors' preserved as a footnote alternative
  chosen_spanish_reading: pastores, con la nota de que el griego literalmente dice 'pastores' en sentido de 'pastores/shepherds'
  alternative_spanish_readings:
  - pastores
  - pastores espirituales
  - pastores y maestros como un solo cargo
  rationale: En español, 'pastores' es el término eclesial natural y además el cognado estándar de la tradición cristiana. Dado que el inglés POB ya preserva la observación literal en nota, el texto principal puede usar el equivalente más idiomático sin perder el vínculo con la metáfora pastoral. La nota mantiene la tensión léxica entre metáfora y oficio.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si 'pastores y maestros' debe entenderse como una sola función o dos relacionadas estrechamente
  english_pob_reading: Render both nouns straightforwardly without resolving the syntactical debate
  chosen_spanish_reading: Traducir ambos sustantivos de manera directa, sin decidir en la traducción si forman un solo oficio o dos funciones estrechamente unidas
  alternative_spanish_readings:
  - 'un solo ministerio: ''pastores-maestros'''
  - dos ministerios distintos pero relacionados
  rationale: El griego presenta una relación estrecha, pero la sintaxis no obliga a resolver el debate eclesiológico. Mantener 'pastores y maestros' deja abierta la cuestión y preserva la tensión documentada por el texto base.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el último pase de revisión y no presenta cambios respecto del control de alta concordancia; se conserva la decisión de traducir ποιμένας con una opción natural en español y documentar la alternativa literal en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general para el nombre divino, pero este versículo no contiene el Tetragrámaton ni una cita directa de κύριος en ese sentido.
  - '''Apóstoles'', ''profetas'', ''evangelistas'' y ''maestros'' siguen la terminología ministerial estándar y transparente del proyecto.'
  - Se evita resolver en el texto principal la discusión sobre si 'pastores y maestros' designa un solo cargo o dos funciones distintas; esa tensión queda documentada en la nota.
  - El español conserva el valor distributivo de τοὺς μὲν / τοὺς δὲ con la fórmula 'a unos... a otros...' sin añadir interpretaciones no requeridas por el griego.
