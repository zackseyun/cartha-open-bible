revisions:
- from: Y él mismo dio a unos como apóstoles[a], a otros como profetas, a otros como evangelistas, y a otros como pastores y maestros[b],
  to: Y él mismo dio a unos como apóstoles, a otros como profetas, a otros como evangelistas, y a otros como pastores de rebaño y maestros[a][b],
