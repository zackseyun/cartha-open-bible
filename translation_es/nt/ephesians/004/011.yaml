review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura distributiva de μεν/δέ ('a unos... a otros...') y la fuerza enfática de αὐτὸς con 'él mismo'. Sin embargo, no sigue la decisión léxica documentada del POB para ποιμένας, que en el texto principal debe conservar la metáfora 'shepherds' como 'pastores de rebaño'/'pastores' no eclesialmente cargado; en español, 'pastores' solo en el texto principal tiende a leerse como título eclesiástico, y además la nota a invierte la alternativa del inglés. También la nota b dice 'la única forma' donde el dato relevante es 'el único artículo'.
  spanish_quality_summary: El español es fluido y legible, pero conviene ajustar 'pastores' a 'pastores de rebaño' en el texto principal para reflejar mejor la metáfora griega y evitar resolver implícitamente el debate hacia un oficio eclesiástico. La nota a debe ofrecer la alternativa tradicional 'pastores' en sentido eclesial, no afirmar incorrectamente que el griego literalmente dice eso como si fuera la misma decisión. La nota b necesita precisión gramatical.
  glossary_alignment: 'Alineación parcial. No hay conflicto con terminología principal del proyecto salvo en ποιμένας: el English POB documentó ''shepherds'' en el texto principal y ''pastors'' como alternativa en nota. El borrador español cambia esa prioridad sin justificación suficiente y por tanto no preserva la racionalidad léxica auditada.'
  issues:
  - severity: high
    issue: ποιμένας se tradujo como 'pastores' en el texto principal
    rationale: La auditoría inglesa eligió deliberadamente 'shepherds' para preservar la metáfora griega y evitar importar demasiado el título eclesiástico 'pastors'. En español, 'pastores' solo puede sonar más a cargo de iglesia que a imagen pastoral, por lo que conviene explicitar 'pastores de rebaño' en el texto principal y dejar 'pastores' como alternativa tradicional en nota.
  - severity: high
    issue: La nota [a] está invertida y no corresponde al punto anotado por el POB inglés
    rationale: 'La nota inglesa para [a] dice esencialmente: ''O “pastors and teachers.” El griego dice literalmente “shepherds and teachers”.'' La nota española actual habla solo de ''pastores'', no de toda la frase, y presenta como literal lo que en realidad es la alternativa tradicional.'
  - severity: medium
    issue: La nota [b] dice 'La única forma' en vez de 'el único artículo'
    rationale: El argumento sintáctico documentado depende del artículo griego singular compartido antes de 'ποιμένας καὶ διδασκάλους', no de una 'forma' no especificada. Debe expresarse con precisión para no confundir al lector.
  revised_spanish_text: Y él mismo dio a unos como apóstoles, a otros como profetas, a otros como evangelistas, y a otros como pastores de rebaño y maestros[a][b],
  revised_footnotes:
  - marker: a
    text: O «pastores y maestros». El griego dice literalmente «pastores de rebaño y maestros».
    reason: lexical_alternative
  - marker: b
    text: El único artículo antes de «pastores de rebaño y maestros» puede indicar una relación especialmente estrecha entre estas funciones, aunque la frase no necesariamente debe entenderse como un solo oficio.
    reason: alternative_reading
  revision_rationale: Se revisa ποιμένας a «pastores de rebaño» para preservar en español la metáfora literal que el POB inglés decidió mantener en el texto principal, evitando cargar el término como título eclesiástico. Se corrige la nota alternativa para reflejar adecuadamente la opción tradicional «pastores y maestros» y se precisa la nota sintáctica hablando del único artículo griego compartido.
