translation:
  language: es
  text: estando entenebrecidos en su entendimiento[a], alejados de la vida de Dios[b][c], a causa de la ignorancia que hay en ellos, a causa de la dureza de su corazón[e][d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mente» por «entendimiento» (διανοίᾳ).
    reason: lexical_alternative
  - marker: b
    text: O «excluidos de la vida de Dios» por «alejados de la vida de Dios».
    reason: lexical_alternative
  - marker: c
    text: «La vida de Dios» puede significar ya sea la vida que pertenece a Dios o la vida que procede de Dios.
    reason: alternative_reading
  - marker: d
    text: O «insensibilidad» por «dureza» (πώρωσις).
    reason: lexical_alternative
  - marker: e
    text: En griego, «corazón» está en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκοτωμένοι
  english_pob_choice: being darkened
  chosen_spanish: estando entenebrecidos
  alternatives_spanish:
  - siendo oscurecidos
  - estando oscurecidos
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «estando entenebrecidos» conserva ese estado y la relación con ὄντες, con un español natural y bíblico.
- source_word: διανοίᾳ
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - mente
  - pensamiento
  lexicon: BDAG
  rationale: διάνοια puede abarcar mente, pensamiento o entendimiento. «Entendimiento» comunica bien la facultad cognitiva y funciona naturalmente con «entenebrecidos en su entendimiento».
- source_word: ἀπηλλοτριωμένοι
  english_pob_choice: alienated
  chosen_spanish: alejados
  alternatives_spanish:
  - alienados
  - separados
  - excluidos
  lexicon: BDAG
  rationale: El perfecto pasivo indica una condición de separación/extrañamiento. «Alejados» preserva la separación relacional en un español claro; «alienados» podría sonar más técnico o psicológico.
- source_word: τῆς ζωῆς τοῦ θεοῦ
  english_pob_choice: from the life of God
  chosen_spanish: de la vida de Dios
  alternatives_spanish:
  - de la vida que viene de Dios
  - de la vida que pertenece a Dios
  lexicon: BDAG
  rationale: 'Se mantiene la construcción genitiva de forma cercana al griego para no resolver una ambigüedad real: puede referirse a la vida que pertenece a Dios o a la que procede de Dios.'
- source_word: διὰ τὴν ἄγνοιαν τὴν οὖσαν ἐν αὐτοῖς
  english_pob_choice: because of the ignorance that is in them
  chosen_spanish: a causa de la ignorancia que hay en ellos
  alternatives_spanish:
  - por la ignorancia que está en ellos
  - debido a la ignorancia que está en ellos
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; «a causa de» es idiomático. «Que hay en ellos» conserva la localización interna sin forzar una paráfrasis.
- source_word: διὰ τὴν πώρωσιν
  english_pob_choice: because of the hardness
  chosen_spanish: a causa de la dureza
  alternatives_spanish:
  - por la dureza
  - a causa del endurecimiento
  lexicon: BDAG
  rationale: πώρωσις denota dureza/insensibilidad; «dureza» conserva la metáfora bíblica y es transparente en español.
- source_word: τῆς καρδίας αὐτῶν
  english_pob_choice: of their hearts
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de sus corazones
  - de su corazón interior
  lexicon: BDAG
  rationale: El griego usa καρδίας en singular con posesivo plural, una forma colectiva o representativa. Mantener el singular ayuda a reflejar la antropología bíblica del corazón como centro interior.
theological_decisions:
- issue: Sentido de «la vida de Dios»
  english_pob_reading: Retain the genitive as 'the life of God' without specifying whether it means life belonging to God or life given by God.
  chosen_spanish_reading: Conservar «la vida de Dios» sin decidir entre vida que pertenece a Dios o vida que procede de Dios.
  alternative_spanish_readings:
  - la vida que viene de Dios
  - la propia vida de Dios
  rationale: La frase griega admite más de un matiz estrechamente relacionado. La traducción mantiene esa tensión en vez de cerrarla interpretativamente.
  doctrine_reference: Translation philosophy §3
- issue: Singular καρδίας frente al plural del posesivo
  english_pob_reading: Use 'their heart' rather than smoothing to 'their hearts.'
  chosen_spanish_reading: Usar el singular «su corazón» en lugar de suavizarlo a «sus corazones».
  alternative_spanish_readings:
  - sus corazones
  rationale: Cuando el español lo permite, el singular preserva la imagen del corazón como facultad interior unificada. Es una decisión lexical-antropológica, no doctrinal.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La base inglesa más reciente pasó de «their heart» a «their hearts» para reflejar más naturalmente el posesivo plural griego; en español se optó por mantener el singular «su corazón» para conservar la fuerza antropológica del singular de καρδίας, sin perder el sentido colectivo del posesivo plural.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en toda la serie, pero aquí el texto griego usa θεοῦ y por eso corresponde «Dios».
  - Se evita «Cristo» porque no aparece en el verso.
  - «Entendimiento» traduce διάνοια con el matiz cognitivo señalado por el audit trail.
  - «Corazón» se conserva en singular por la forma griega καρδίας, aunque el posesivo sea plural en sentido colectivo.
