translation:
  language: es
  text: Por tanto[a], habiendo dejado la falsedad, que cada uno diga la verdad con su prójimo, porque somos miembros los unos de los otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo dejado la mentira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por ello
  - Así que
  lexicon: BDAG
  rationale: La conjunción inferencial introduce una conclusión respecto de lo anterior. «Por tanto» conserva la fuerza lógica y suena natural en español bíblico contemporáneo sin volverlo explicativo en exceso.
- source_word: ἀποθέμενοι
  english_pob_choice: having put away
  chosen_spanish: habiendo dejado
  alternatives_spanish:
  - habiendo desechado
  - dejando a un lado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa y renunciativa respecto del mandato principal. «Habiendo dejado» preserva esa anterioridad y resulta idiomático en español; «desechado» sería más fuerte, pero menos neutral.
- source_word: τὸ ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - la mentira / el engaño
  lexicon: BDAG
  rationale: El singular con artículo puede referirse a la mentira como práctica o a la falsedad como categoría ética. «La falsedad» mantiene ese alcance general; «la mentira» queda como alternativa válida, pero puede sonar más puntual que el griego.
- source_word: λαλεῖτε
  english_pob_choice: let each one speak
  chosen_spanish: hable cada uno
  alternatives_spanish:
  - cada uno hable
  - hablen
  lexicon: BDAG
  rationale: El imperativo plural se distribuye por ἕκαστος. En español, «hable cada uno» preserva la obligación individual dentro del mandato colectivo y suena natural.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - lo verdadero
  - lo que es verdad
  lexicon: BDAG
  rationale: Objeto directo del mandato. «Verdad» es la equivalencia más directa e idiomática, y mantiene el contraste ético con «falsedad».
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: BDAG
  rationale: El valor distributivo se expresa bien con «cada uno», que conserva el énfasis en la responsabilidad individual de cada creyente.
- source_word: μετὰ τοῦ πλησίον αὐτοῦ
  english_pob_choice: with his neighbor
  chosen_spanish: con su prójimo
  alternatives_spanish:
  - con su vecino
  - con el que está cerca de él
  lexicon: BDAG
  rationale: μετά con genitivo indica asociación. πλησίον aquí tiene sentido ético/social; «prójimo» comunica ese matiz bíblico en español de manera clara y fiel. Aunque «vecino» es posible, suena más limitado o geográfico.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la razón del mandato. «Porque» transmite la causalidad de manera directa y natural.
- source_word: ἐσμὲν ἀλλήλων μέλη
  english_pob_choice: we are members of one another
  chosen_spanish: somos miembros los unos de los otros
  alternatives_spanish:
  - somos miembros unos de otros
  - somos partes los unos de los otros
  lexicon: BDAG
  rationale: La imagen corporal de μέλη se conserva con «miembros». La construcción recíproca «los unos de los otros» refleja ἀλλήλων y mantiene la interdependencia comunitaria sin perder la metáfora.
theological_decisions:
- issue: Alcance de τὸ ψεῦδος en una exhortación ética comunitaria
  english_pob_reading: falsehood rather than the lie
  chosen_spanish_reading: la falsedad más que «la mentira» puntual
  alternative_spanish_readings:
  - la mentira
  - el engaño
  rationale: El contexto exhortativo apunta a una práctica ética general opuesta a la verdad, no necesariamente a un solo acto mentiroso. «La falsedad» conserva mejor esa amplitud. La alternativa «la mentira» sigue siendo viable por la presencia del artículo y del singular, por eso se preserva como opción textual/lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Forma distributiva del mandato con ἕκαστος
  english_pob_reading: let each one speak truth with his neighbor
  chosen_spanish_reading: hable cada uno verdad con su prójimo
  alternative_spanish_readings:
  - cada uno hable verdad con su prójimo
  - hable cada persona verdad con su prójimo
  rationale: El griego usa un singular representativo dentro de un mandato plural. En español, «cada uno» mantiene la fuerza distributiva y evita neutralizar innecesariamente la estructura del texto. El posesivo masculino singular en el griego no obliga a una lectura restrictiva; en español se vierte de modo inclusivo sin alterar el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no requieren revisión sustantiva. Se mantuvo la lógica inferencial de Διὸ, el participio anterior de ἀποθέμενοι, la alternativa léxica para τὸ ψεῦδος y la metáfora corporal de μέλη, con una solución española natural y auditable.
  spanish_consistency_notes:
  - Se usa «prójimo» para πλησίον por su valor ético-bíblico, no «vecino» como simple referencia espacial.
  - Se mantiene «miembros» para μέλη, evitando convertir la metáfora en una paráfrasis de pertenencia abstracta.
  - La nota al pie conserva la alternativa formal «la mentira» sin desplazar la traducción principal.
  - La estructura «hable cada uno» preserva el valor distributivo de ἕκαστος dentro del mandato plural.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
