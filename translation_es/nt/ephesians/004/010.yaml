review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene la identidad enfática entre el que descendió y el que ascendió, conserva el plural «cielos» y traduce τὰ πάντα con amplitud. Sin embargo, pierde algo de la repetición paralela de los participios sustantivados al omitir «el que» antes de «ascendió», y «llenara» suena menos natural aquí que el presente de subjuntivo «llene».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero requiere pequeños ajustes de naturalidad y precisión formal. La nota [a] está mal anclada: no aporta una alternativa real porque repite la misma frase del texto, mientras que el contraste documentado es con una opción sin intensificación adicional. También conviene reflejar mejor el paralelismo del original con «el que ascendió».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ascendió», «cielos», «llenar» y «todas las cosas» se alinean con las decisiones léxicas auditadas. El cambio propuesto preserva mejor la decisión inglesa sobre los participios sustantivados y la fuerza de ὑπεράνω como exaltación por encima de todos los cielos.
  issues:
  - severity: medium
    issue: Se omite el paralelismo explícito de «ὁ ... καὶ ὁ ...»
    rationale: 'El griego repite el artículo con ambos participios sustantivados: «el que descendió ... y el que ascendió». En español, «es el mismo que también ascendió» comunica identidad, pero atenúa la simetría enfática que el POB inglés conservó.'
  - severity: medium
    issue: La nota [a] no presenta una alternativa real y está asociada al lugar equivocado
    rationale: El texto principal no incluye una intensificación equivalente a «far above», y la nota actual repite «por encima de todos los cielos» como si fuera variante. La evidencia inglesa documenta la alternativa «above all the heavens» frente a la forma escogida intensificada; en español conviene reflejar eso con «muy por encima de» en el texto y «por encima de» en nota, o bien eliminar la nota. Dado que el inglés sí preservó alternativa, se recomienda conservarla correctamente.
  - severity: low
    issue: «Llenara» es posible pero menos idiomático que «llene» después de «para que»
    rationale: Ambas formas son gramaticales, pero en español bíblico contemporáneo «para que llene» suena más natural y directa para un propósito general, sin perder la fuerza del subjuntivo griego.
  revised_spanish_text: El que descendió es el mismo que también ascendió muy por encima de todos los cielos[a], para que llene[b] todas las cosas.
  revised_footnotes:
  - marker: a
    text: 'O: «por encima de todos los cielos». La expresión puede subrayar la exaltación por encima de toda esfera celestial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que cumpla todas las cosas». El verbo griego puede significar «cumplir» en ciertos contextos, pero aquí «llenar» encaja mejor con el contexto inmediato.'
    reason: lexical_alternative
