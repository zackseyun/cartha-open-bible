translation:
  language: es
  text: El que descendió es el mismo que también ascendió muy por encima de todos los cielos[a], para que llene[b] todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por encima de todos los cielos». La expresión puede subrayar la exaltación por encima de toda esfera celestial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que cumpla todas las cosas». El verbo griego puede significar «cumplir» en ciertos contextos, pero aquí «llenar» encaja mejor con el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καταβὰς
  english_pob_choice: the one who descended
  chosen_spanish: El que descendió
  alternatives_spanish:
  - el que bajó
  - el que había descendido
  lexicon: BDAG
  rationale: El participio articular aoristo funciona sustantivamente; en español, la cláusula relativa con pretérito perfecto simple es la forma más natural y conserva la referencia a una sola persona.
- source_word: αὐτός
  english_pob_choice: is himself also
  chosen_spanish: es el mismo que también
  alternatives_spanish:
  - es también
  - es él mismo también
  lexicon: BDAG
  rationale: αὐτός es enfático y subraya la identidad entre el que descendió y el que ascendió. 'El mismo que también' conserva esa fuerza sin sonar artificial en español.
- source_word: ὁ ἀναβὰς
  english_pob_choice: the one who ascended
  chosen_spanish: ascendió
  alternatives_spanish:
  - subió
  - el que ascendió
  lexicon: BDAG
  rationale: La segunda cláusula retoma al mismo referente; en español se puede omitir la repetición del relativo para evitar pesadez, manteniendo el paralelismo implícito.
- source_word: ὑπεράνω
  english_pob_choice: far above
  chosen_spanish: por encima de
  alternatives_spanish:
  - muy por encima de
  - sobre
  lexicon: BDAG
  rationale: El griego expresa superioridad/exaltación espacial y de rango. 'Por encima de' preserva el sentido básico; la intensificación queda apoyada por 'todos los cielos' y por la estructura enfática del verso. Se evita añadir 'far' si suena redundante en español.
- source_word: πάντων τῶν οὐρανῶν
  english_pob_choice: all the heavens
  chosen_spanish: todos los cielos
  alternatives_spanish:
  - todos los cielos
  - todos los cielos/los cielos
  lexicon: BDAG
  rationale: Se mantiene el plural de οὐρανῶν como 'cielos' y el alcance total de πάντων como 'todos'. Esto conserva la imagen cosmológica plural sin reducirla a un singular teológico.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: BDAG
  rationale: ἵνα introduce propósito. 'Para que' es el equivalente natural y claro en español bíblico contemporáneo.
- source_word: πληρώσῃ
  english_pob_choice: he might fill
  chosen_spanish: llenara
  alternatives_spanish:
  - llenara de lleno
  - cumpliera
  lexicon: BDAG
  rationale: En este contexto, πληρόω significa 'llenar' más que 'cumplir'. 'Llenara' conserva la fuerza de plenitud y el valor final/purposivo del subjuntivo aoristo.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: El neutro plural tiene alcance amplio y deliberadamente no especificado. 'Todas las cosas' preserva la amplitud y evita concretar indebidamente a personas o al universo entero.
theological_decisions:
- issue: Identidad del que desciende y asciende
  english_pob_reading: The verse speaks of the same person in both descent and ascent, with emphatic identity preserved in translation.
  chosen_spanish_reading: El verso presenta a la misma persona en el descenso y en la ascensión, y la traducción conserva ese énfasis de identidad.
  alternative_spanish_readings:
  - Una traducción menos enfática que solo indique la secuencia de acciones
  - Separar las cláusulas como si se tratara de sujetos distintos
  rationale: El αὐτός enfático y las dos cláusulas articularizadas señalan identidad personal. La traducción evita suavizar ese rasgo cristológico.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
- issue: Alcance de τὰ πάντα
  english_pob_reading: Rendered as 'all things' to preserve the text's comprehensive scope.
  chosen_spanish_reading: Se traduce como 'todas las cosas' para conservar su alcance comprensivo.
  alternative_spanish_readings:
  - todo
  - todo el universo
  - todas las personas
  rationale: El griego deja la expresión deliberadamente amplia. No se debe restringir ni expandir con una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente, el análisis léxico y la evaluación cruzada permanecen en alto acuerdo, por lo que la propuesta española sigue la lectura estable del expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene 'cielos' en plural para reflejar οὐρανῶν.
  - Se conserva 'llenara' y no 'cumpliera' en el texto principal, siguiendo la preferencia contextual del expediente.
  - Se usa 'para que' para expresar finalidad de ἵνα con español natural y digno.
  - La nota sobre ὑπεράνω se ancla en el propio segmento de ascensión para evitar ambigüedad sin sobretraducir.
