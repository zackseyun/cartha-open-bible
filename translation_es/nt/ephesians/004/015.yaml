    changes_summary: 'Changed ''speaking the truth'' to ''speaking truth'' for closer lexical accuracy to ἀληθεύοντες, and changed ''the Messiah'' to ''Christ'' to reflect the Greek proper title Χριστός more directly and maintain formal register. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: pero diciendo la verdad en amor[a], crezcamos en todo hacia él, que es la cabeza, Mesías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siendo veraces' o 'practicando la verdad'; el verbo griego puede incluir tanto el habla veraz como la conducta veraz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀληθεύοντες
  english_pob_choice: speaking truth
  chosen_spanish: hablando verdad
  alternatives_spanish:
  - siendo veraces
  - practicando la verdad
  lexicon: BDAG
  rationale: El participio puede abarcar tanto el hablar con verdad como el vivir de manera veraz. En este contexto, la forma breve y natural 'hablando verdad' conserva la fuerza verbal y permite mantener la cercanía con el griego sin reducir el sentido solo al discurso ni resolverlo por completo en conducta general.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - sin embargo
  lexicon: BDAG
  rationale: δέ introduce una transición contrastiva suave respecto del cuadro anterior de inestabilidad y engaño; 'pero' comunica bien ese contraste en español.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  lexicon: BDAG
  rationale: La preposición con dativo expresa esfera o manera. 'En amor' es directo y fiel; en español suena algo más sobrio que 'con amor' y preserva la construcción de la fuente.
- source_word: αὐξήσωμεν
  english_pob_choice: let us grow
  chosen_spanish: crezcamos
  alternatives_spanish:
  - crezcamos nosotros
  - vamos a crecer
  lexicon: BDAG
  rationale: El subjuntivo exhortativo en primera persona plural se expresa naturalmente con 'crezcamos'. Conserva el tono de exhortación sin añadir perífrasis innecesarias.
- source_word: εἰς αὐτὸν
  english_pob_choice: into him
  chosen_spanish: hacia él
  alternatives_spanish:
  - en él
  - a él
  lexicon: BDAG
  rationale: La imagen de dirección es real, pero en español 'crecer hacia él' resulta más natural que 'crecer en él' o 'crecer dentro de él' para este giro, y mantiene el impulso direccional sin forzar una imagen física extraña.
- source_word: τὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - completamente
  lexicon: BDAG
  rationale: Aunque literalmente es 'todas las cosas', aquí funciona de modo comprehensivo/adverbial. 'En todo' reproduce esa amplitud de manera breve y idiomática en español.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - cabeza directiva
  lexicon: BDAG
  rationale: '''Cabeza'' preserva la metáfora paulina del cuerpo sin introducir una interpretación más estrecha como ''jefe'' o ''autoridad''. Mantiene abierta la tensión lexical y teológica documentada.'
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: La guía del proyecto favorece 'Mesías' para Χριστός cuando funciona como título. Aquí el término aparece en aposición, por lo que 'Mesías' comunica mejor el valor titular y evita convertirlo en un simple nombre eclesial fijo.
theological_decisions:
- issue: 'Sentido de ἀληθεύοντες: habla veraz o conducta veraz'
  english_pob_reading: speaking truth in love, with a footnote noting 'being truthful' / 'practicing the truth'
  chosen_spanish_reading: hablando verdad en amor
  alternative_spanish_readings:
  - siendo veraces en amor
  - practicando la verdad en amor
  rationale: La frase española conserva la ambigüedad útil entre palabra y conducta. No se fuerza el término a un solo ámbito, y así se respeta la amplitud ética que el griego puede tener en el contexto de edificación y contraste con el engaño.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than over-resolve it'
- issue: Valor cristológico de Χριστός como título
  english_pob_reading: Messiah (title)
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: '''Mesías'' mantiene el carácter titular de Χριστός y sigue la política del proyecto para no ocultar el valor semántico original detrás de una forma ya lexicalizada en español. Se conserva así la referencia cristológica sin neutralizarla en un nombre propio convencional.'
  doctrine_reference: DOCTRINE.md title usage guidance for Χριστός
- issue: Interpretación de κεφαλή
  english_pob_reading: head
  chosen_spanish_reading: cabeza
  alternative_spanish_readings:
  - fuente
  - autoridad
  rationale: Se retiene la metáfora sin decidir entre lecturas teológicas debatidas. Esto evita introducir una conclusión doctrinal no expresada explícitamente por el texto griego.
  doctrine_reference: Affirmations; translation philosophy on preserving lexical/theological tension
translation_notes:
  revision_awareness: 'El texto inglés de referencia pasó por una corrección desde ''speaking the truth'' a ''speaking truth'' para mayor precisión léxica en ἀληθεύοντες, y restauró ''Messiah'' tras una desviación momentánea hacia ''Christ''. La presente versión sigue esa línea: mantiene la fuerza verbal sin añadir artículos innecesarios y traduce Χριστός como ''Mesías'' conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Se usa 'amor' para ἀγάπη conforme al uso estable del proyecto.
  - Se evita 'Señor' como sustituto de un nombre divino, porque este versículo no contiene יהוה/κύριος en esa función.
  - '''Mesías'' se mantiene en lugar de ''Cristo'' para conservar el valor titular de Χριστός.'
  - No se añadió nota al pie porque la ambigüedad principal puede explicarse en los campos de decisión léxica y teológica sin requerir marcador textual.
