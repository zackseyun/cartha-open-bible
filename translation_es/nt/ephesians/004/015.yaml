  spanish_quality_summary: El español es mayormente claro, pero 'hablando verdad' suena calcado y menos idiomático que 'diciendo la verdad', mientras que la nota puede preservar las alternativas más amplias. 'En amor' es comprensible y digno, aunque algo literal; se puede mantener por cercanía estructural. La coma tras 'pero' es innecesaria en español.
  glossary_alignment: '''Mesías'' alinea correctamente con la política del proyecto para Χριστός como título. ''Cabeza'' preserva bien κεφαλή sin imponer una lectura doctrinal. No hay conflicto con otras preferencias terminológicas del proyecto.'
