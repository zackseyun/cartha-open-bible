translation:
  language: es
  text: esforzándose diligentemente[a] por guardar la unidad del Espíritu[b] en el vínculo de la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo diligentes para mantener» o «esforzándose por preservar».
    reason: lexical_alternative
  - marker: b
    text: «El Espíritu» aquí probablemente se refiere al Espíritu Santo, aunque algunos lo entienden de manera más general como un espíritu compartido entre los creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: σπουδάζοντες
  english_pob_choice: making every effort
  chosen_spanish: procurando con diligencia
  alternatives_spanish:
  - esforzándose
  - haciendo todo esfuerzo
  - siendo diligentes
  lexicon: BDAG
  rationale: El participio expresa empeño activo y continuo. «Procurando con diligencia» conserva el sentido de esfuerzo serio sin sonar mecánico en español, y mantiene la fuerza exhortativa del flujo contextual.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - mantener
  - preservar
  - vigilar
  lexicon: BDAG
  rationale: En este contexto, τηρεῖν apunta a mantener algo ya dado. «Guardar» es una equivalencia natural en español bíblico actual y conserva la idea de custodia o preservación.
- source_word: ἑνότητα
  english_pob_choice: unity
  chosen_spanish: la unidad
  alternatives_spanish:
  - la oneness
  lexicon: BDAG
  rationale: «Unidad» es el equivalente normal y claro de ἑνότης; preserva el sentido eclesial sin añadir matices ajenos al texto.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  lexicon: BDAG
  rationale: Por el contexto de Efesios, la referencia más probable es al Espíritu Santo. La mayúscula en español refleja esa decisión interpretativa y sigue la lectura auditada del POB inglés.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por
  - mediante
  lexicon: BDAG
  rationale: 'La preposición se conserva con su valor básico de esfera o ámbito: la unidad se guarda dentro del marco del vínculo de la paz.'
- source_word: συνδέσμῳ
  english_pob_choice: bond
  chosen_spanish: vínculo
  alternatives_spanish:
  - lazo
  - ligamento
  - unión
  lexicon: BDAG
  rationale: «Vínculo» transmite la imagen de aquello que une o ata, de modo natural en español y sin perder la metáfora de conexión.
- source_word: τῆς εἰρήνης
  english_pob_choice: of peace
  chosen_spanish: de la paz
  alternatives_spanish:
  - de paz
  lexicon: BDAG
  rationale: La genitivo simple se mantiene de forma directa. «De la paz» es la solución más clara y fiel para expresar la cualidad o esfera que caracteriza el vínculo.
theological_decisions:
- issue: Referent of πνεύματος
  english_pob_reading: the Holy Spirit, though some understand it more generally as a shared spirit among believers
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu compartido entre los creyentes
  - el espíritu humano
  rationale: En Efesios, πνεῦμα con artículo remite con alta probabilidad al Espíritu Santo, especialmente por el contexto inmediato de 4:4 y 4:30. Se conserva esa lectura, documentando implícitamente la alternativa más general sin imponerla en el texto principal.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa documentada por el POB.
- issue: Nature of the unity
  english_pob_reading: unity already given, to be maintained
  chosen_spanish_reading: unidad ya dada, que debe guardarse
  alternative_spanish_readings:
  - unidad que los creyentes crean
  - unidad que se produce entre los creyentes
  rationale: El infinitivo τηρεῖν indica custodia o mantenimiento, no creación. «Guardar» refleja mejor esa responsabilidad de preservar una realidad recibida.
  doctrine_reference: No importar más contenido doctrinal del que el sintagma griego exige; mantener la lectura auditable del POB.
translation_notes:
  revision_awareness: El borrador corrige el problema de validación anterior eliminando notas sin anclaje. Se mantiene la decisión auditada de traducir el sintagma como exhortación a preservar una unidad dada por el Espíritu, sin añadir glosas no ancladas en el texto.
  spanish_consistency_notes:
  - Se emplea «Espíritu» con mayúscula por la lectura contextual del Espíritu Santo.
  - Se evita «SEÑOR» u otras máscaras no pertinentes, ya que no aparece el nombre divino en este versículo.
  - El registro es formal y eclesialmente inteligible, sin calcado excesivo del inglés.
