translation:
  language: es
  text: Y no entristezcan al Espíritu Santo de Dios, en quien fueron sellados para el día de la redención[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el día de la redención». El griego dice literalmente «para el día de la redención» (εἰς ἡμέραν ἀπολυτρώσεως), y puede entenderse con un matiz orientado al futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπεῖτε
  english_pob_choice: grieve
  chosen_spanish: entristezcan
  alternatives_spanish:
  - apenen
  - causen tristeza a
  lexicon: BDAG
  rationale: 'El imperativo prohibitivo con μή pide una negación directa: «no entristezcan». En español, «entristecer» conserva la fuerza relacional y personal del verbo mejor que opciones más débiles o demasiado coloquiales.'
- source_word: τὸ πνεῦμα τὸ ἅγιον τοῦ θεοῦ
  english_pob_choice: the Holy Spirit of God
  chosen_spanish: el Espíritu Santo de Dios
  alternatives_spanish:
  - el Espíritu Santo
  - el Espíritu Santo de Dios
  lexicon: BDAG
  rationale: Se mantiene el título completo y la referencia explícita a Dios. En español, «Espíritu Santo» es la forma estable y digna del título, y el genitivo «de Dios» conserva el matiz del griego sin suavizarlo.
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: con quien
  alternatives_spanish:
  - en quien
  - en el cual
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «en quien», el español suele expresar mejor la relación con la pasiva de sellado mediante «con quien», que mantiene la referencia personal al Espíritu y evita una formulación demasiado rígida. Se preserva así el sentido relacional sin convertir el referente en impersonal.
- source_word: ἐσφραγίσθητε
  english_pob_choice: you were sealed
  chosen_spanish: fueron sellados
  alternatives_spanish:
  - quedaron sellados
  - fueron marcados con un sello
  lexicon: BDAG
  rationale: «Fueron sellados» reproduce la metáfora de sello con naturalidad en español y conserva el valor pasivo aorístico sin explicarlo en exceso.
- source_word: εἰς ἡμέραν ἀπολυτρώσεως
  english_pob_choice: for the day of redemption
  chosen_spanish: para el día de la redención
  alternatives_spanish:
  - hasta el día de la redención
  - para el día de la redención
  lexicon: BDAG
  rationale: «Para» conserva bien el valor direccional/final de εἰς y permite dejar abierta la orientación futura de la expresión. No se fuerza «hasta», aunque sigue siendo una posibilidad interpretativa, porque el griego no exige cerrarla así.
theological_decisions:
- issue: Referencia personal al Espíritu Santo en la cláusula relativa
  english_pob_reading: Use 'in whom' rather than 'in which'
  chosen_spanish_reading: con quien
  alternative_spanish_readings:
  - en quien
  - en el cual
  rationale: Aunque el pronombre relativo griego concuerda gramaticalmente con el sustantivo neutro πνεῦμα, el referente es personal y puede ser entristecido. «Con quien» evita una lectura impersonal en español y conserva la fuerza relacional del texto.
  doctrine_reference: 'Credo Niceno-Constantinopolitano (381): el Espíritu Santo es personal y divino.'
- issue: Fuerza de εἰς ἡμέραν ἀπολυτρώσεως
  english_pob_reading: '''for the day of redemption'''
  chosen_spanish_reading: para el día de la redención
  alternative_spanish_readings:
  - hasta el día de la redención
  - para el día de la redención
  rationale: La redacción mantiene el sentido de meta o orientación futura sin resolver más de lo que el texto dice acerca del alcance exacto del sellado. Se conserva así la tensión teológica entre propósito y temporalidad.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica donde el texto no la resuelve explícitamente.'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió cambios revisionales: la lectura principal se mantiene estable, con la única tensión relevante en εἰς ἡμέραν ἀπολυτρώσεως, donde el inglés ya preserva una alternativa («until»). La versión española conserva esa apertura mediante una nota de alternativa sin cerrar indebidamente el sentido.'
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas como título fijo y «de Dios» para reflejar el genitivo explícito.
  - Se prefiere «redención» para ἀπολύτρωσις, en continuidad con la terminología paulina habitual.
  - Se evita «SEÑOR» o sustituciones litúrgicas no presentes en el verso.
  - Se mantiene un registro digno y comprensible para lectura eclesial contemporánea.
