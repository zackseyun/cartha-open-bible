translation:
  language: es
  text: 'Por eso dice: «Habiendo subido a lo alto, llevó cautiva la cautividad[a] y dio dones a los hombres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevó cautivos cautivos» o «capturó una multitud de cautivos». El griego emplea una expresión cognada muy vívida que hace eco del Salmo 68:18.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «hombres» probablemente tiene un sentido genérico, es decir, seres humanos o personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: Conserva el valor inferencial del conector y suena natural en español sin debilitar la relación con el argumento previo.
- source_word: λέγει
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice la Escritura
  - dice él
  lexicon: BDAG
  rationale: El griego carece de sujeto explícito; en una fórmula de cita, «dice» mantiene la referencia impersonal sin añadir especificación no exigida por el texto.
- source_word: Ἀναβὰς
  english_pob_choice: Having ascended
  chosen_spanish: Habiendo subido
  alternatives_spanish:
  - Cuando subió
  - Después de subir
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales; el gerundio compuesto conserva la secuencia temporal con naturalidad en español.
- source_word: εἰς ὕψος
  english_pob_choice: on high
  chosen_spanish: a lo alto
  alternatives_spanish:
  - en lo alto
  - a las alturas
  lexicon: BDAG
  rationale: La expresión remite al lenguaje poético del Salmo citado; «a lo alto» reproduce el movimiento ascendente sin introducir una interpretación más específica de la necesaria.
- source_word: ᾐχμαλώτευσεν
  english_pob_choice: led captivity captive
  chosen_spanish: llevó cautiva la cautividad
  alternatives_spanish:
  - llevó cautivos cautivos
  - hizo cautiva la cautividad
  lexicon: BDAG
  rationale: El griego presenta una construcción de cognados muy enfática. En español, «llevó cautiva la cautividad» conserva la fuerza retórica y el eco del Salmo sin vaciar la imagen en una paráfrasis más suave.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity captive
  chosen_spanish: la cautividad
  alternatives_spanish:
  - los cautivos
  - un grupo de cautivos
  lexicon: BDAG
  rationale: Se mantiene el sustantivo abstracto para respetar la figura cognada del original, que intensifica la victoria y no sólo describe personas cautivas.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - concedió
  - entregó
  lexicon: BDAG
  rationale: Verbo simple de dar; «dio» es la opción más directa y transparente.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - presentes
  lexicon: BDAG
  rationale: «Dones» es una opción más natural y eclesialmente reconocible en español bíblico para el contexto de gracia y ministerio, sin perder el sentido de regalo conferido.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural como reflejo del griego y del eco citacional. En español puede funcionar de modo genérico; la nota aclara el alcance humano general.
theological_decisions:
- issue: Cognate accusative en la cita de Salmo 68:18 y su densidad retórica
  english_pob_reading: Retain the vivid idiom 'he led captivity captive' in the main text
  chosen_spanish_reading: Mantener «llevó cautiva la cautividad» en el texto principal
  alternative_spanish_readings:
  - llevó cautivos cautivos
  - capturó una multitud de cautivos
  rationale: La expresión no debe aplanarse a una imagen puramente prosaica. La forma escogida preserva la ironía/vigor del original y el eco del salmo subyacente.
  doctrine_reference: Ps 68:18; Ef 4:8
- issue: Valor genérico de τοῖς ἀνθρώποις
  english_pob_reading: to men
  chosen_spanish_reading: a los hombres
  alternative_spanish_readings:
  - a las personas
  - a los seres humanos
  rationale: El sustantivo griego es masculino plural pero puede abarcar a la humanidad en general. Se mantiene la forma del texto citacional, con un matiz genérico compatible con el contexto.
  doctrine_reference: Política de exactitud de género del proyecto; Ef 4:8
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés y refleja la revisión que prefirió «led captivity captive» por encima de una paráfrasis más débil. En español se preservó esa densidad mediante una construcción cognada equivalente, evitando suavizar el giro.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en otros contextos, aunque este versículo no lo contiene.
  - Se conserva el tono de cita bíblica formal con puntuación española y comillas angulares.
  - «Dones» se usa por coherencia con el registro bíblico y con el contexto paulino de concesión graciosa.
