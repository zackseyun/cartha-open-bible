    reason: lexical_alternative
  revision_rationale: Se corrige «los ruego» a «les ruego» por gramática natural del español. Se cambia «la llamada» por «el llamamiento» para reflejar mejor κλήσις en el contexto paulino. Se conserva «en el Señor» y la metáfora de «anden». La nota alternativa de estilo se actualiza para concordar con «llamamiento».
