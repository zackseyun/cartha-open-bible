revisions:
- from: Por tanto, yo, el prisionero en el Señor, los ruego que anden de un modo digno de la llamada[a] con que fueron llamados[b],
  to: Por tanto, yo, el prisionero en el Señor, les ruego que anden de un modo digno del llamamiento[a] con que fueron llamados[b],
  rationale: Se corrige «los ruego» a «les ruego» por gramática natural del español. Se cambia «la llamada» por «el llamamiento» para reflejar mejor κλήσις en el contexto paulino. Se conserva «en el Señor» y la metáfora de «anden». La nota alternativa de estilo se actualiza para concordar con «llamamiento».
