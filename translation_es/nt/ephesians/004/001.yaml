translation:
  language: es
  text: Por tanto, yo, el prisionero en el Señor, les ruego que anden de un modo digno del llamamiento[a] con que fueron llamados[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el prisionero del Señor» o «un prisionero por el Señor».
    reason: alternative_reading
  - marker: b
    text: O «vivan de una manera digna del llamamiento al que fueron llamados».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: urge
  chosen_spanish: los ruego
  alternatives_spanish:
  - les exhorto
  - los exhorto
  - les ruego encarecidamente
  lexicon: BDAG
  rationale: παρακαλέω introduce una súplica exhortativa fuerte. En español, «los ruego» conserva el tono pastoral y exhortativo sin volverse rígido; «exhorto» también sería posible, pero suena más formal y menos natural en este contexto.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: οὖν señala inferencia lógica. «Por tanto» preserva bien la relación argumentativa con lo anterior y es natural en español bíblico moderno.
- source_word: δέσμιος
  english_pob_choice: prisoner
  chosen_spanish: el prisionero
  alternatives_spanish:
  - el preso
  - el cautivo
  - el que está preso
  lexicon: BDAG
  rationale: δέσμιος significa de forma directa «prisionero». «El prisionero» mantiene la fuerza lexical sin añadir matices que el término griego no exige.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - del Señor
  - para el Señor
  - unido al Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina «en el Señor» para reflejar la expresión griega ἐν κυρίῳ y su amplitud teológica. No se resuelve como posesión o finalidad, porque el griego permite una relación más amplia.
- source_word: ἀξίως περιπατῆσαι
  english_pob_choice: to walk worthily
  chosen_spanish: anden de un modo digno
  alternatives_spanish:
  - vivan de manera digna
  - caminen dignamente
  - se conduzcan de manera digna
  lexicon: BDAG
  rationale: περιπατῆσαι es una metáfora paulina de conducta o estilo de vida. En español, «anden de un modo digno» conserva la imagen del caminar y comunica el valor adverbial de ἀξίως sin sonar forzado.
- source_word: κλήσεως
  english_pob_choice: calling
  chosen_spanish: la llamada
  alternatives_spanish:
  - el llamamiento
  - la vocación
  - la llamada de Dios
  lexicon: BDAG
  rationale: κλῆσις en este contexto se refiere al acto y efecto del llamado divino. «La llamada» es natural en español y mantiene el sentido de invitación/convocación eficaz; «vocación» puede sonar más técnico o eclesial de lo deseado aquí.
- source_word: ἧς ἐκλήθητε
  english_pob_choice: with which you were called
  chosen_spanish: con que fueron llamados
  alternatives_spanish:
  - a la que fueron llamados
  - mediante la cual fueron llamados
  lexicon: BDAG
  rationale: La construcción relativa griega se refleja con «con que», que reproduce la relación formal sin sobreexplicar. «Fueron llamados» mantiene el pasivo y el carácter de llamado recibido.
theological_decisions:
- issue: 'Fuerza de la autodescripción de Pablo: ὁ δέσμιος ἐν κυρίῳ'
  english_pob_reading: the prisoner in the Lord
  chosen_spanish_reading: el prisionero en el Señor
  alternative_spanish_readings:
  - el prisionero del Señor
  - un prisionero por el Señor
  rationale: Se preserva la preposición «en» para no reducir el vínculo a posesión («del Señor») ni a causa («por el Señor»). Esto mantiene la amplitud teológica del original y evita resolver una tensión que el griego deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente griego y el audit trail inglés, manteniendo la relación inferencial de οὖν, la metáfora paulina de περιπατέω y la ambigüedad teológica de ἐν κυρίῳ sin resolverla en exceso. Se prefirió un español publicable y natural, pero suficientemente literal para auditar la correspondencia con el original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece יהוה; aquí no aplica.
  - Se mantiene «Señor» para κύριος en la fórmula estable ἐν κυρίῳ, no como sustituto del nombre divino.
  - Se preserva «llamada» para κλῆσις siguiendo el valor paulino de llamado eficaz.
  - Se conserva la metáfora de caminar mediante «anden», en lugar de neutralizarla con «vivan».
