review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: «Por tanto» para οὖν, «el prisionero en el Señor» para ὁ δέσμιος ἐν κυρίῳ, y mantiene la metáfora de «andar» para περιπατῆσαι. También conserva correctamente la tensión teológica de ἐν κυρίῳ y la nota alternativa correspondiente. Sin embargo, «los ruego que anden» es menos natural en español con objeto directo personal; «les ruego que anden» es la construcción estándar. Además, «la llamada» suena menos adecuada que «el llamamiento» en este contexto paulino de κλῆσις, donde no se trata de una llamada telefónica o momentánea sino del llamamiento divino recibido. La nota [b] también debe ajustarse para concordar con la revisión.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere un pequeño ajuste de gramática y registro bíblico-natural. «Les ruego» mejora la sintaxis. «El llamamiento» suena más preciso teológicamente y más idiomático en español eclesial amplio que «la llamada», sin caer en arcaísmo. El resto del versículo fluye bien.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Señor» para κύριος es apropiado aquí. La principal decisión léxica a corregir es κλήσεως: «el llamamiento» preserva mejor el valor paulino de calling. Se mantiene «anden» para preservar la metáfora de περιπατέω.'
  issues:
  - severity: medium
    issue: Uso de «los ruego» en vez de «les ruego»
    rationale: 'Con el verbo «rogar» seguido de una subordinada con «que», el pronombre de objeto indirecto «les» es la construcción natural y normativa en español: «les ruego que...». «Los ruego» suena forzado y menos correcto en este contexto.'
  - severity: medium
    issue: «La llamada» debilita el sentido de κλήσις en contexto paulino
    rationale: Aunque literalmente posible, «la llamada» en español moderno es menos estable y más ambigua. «El llamamiento» comunica mejor el llamado divino recibido por los creyentes y encaja mejor con el tono teológico del pasaje.
  - severity: low
    issue: La nota [b] debe concordar con la revisión léxica
    rationale: Si el texto principal usa «llamamiento», la alternativa en la nota debe ajustarse para mantener coherencia terminológica y evitar una mezcla innecesaria.
  revised_spanish_text: Por tanto, yo, el prisionero en el Señor, les ruego que anden de un modo digno del llamamiento[a] con que fueron llamados[b],
  revised_footnotes:
