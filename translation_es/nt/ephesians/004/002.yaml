translation:
  language: es
  text: con toda humildad y mansedumbre, con paciencia, soportándose unos a otros en amor,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ πάσης
  english_pob_choice: with all
  chosen_spanish: con toda
  alternatives_spanish:
  - con toda clase de
  - con plena
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento; πάσης intensifica la cualidad. En español, «con toda» comunica esa plenitud de modo natural y directo, sin volver la frase pesada.
- source_word: ταπεινοφροσύνης
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - humildad de mente
  - bajeza de ánimo
  lexicon: BDAG
  rationale: El sustantivo nombra la virtud de humildad o modestia interior. «Humildad» es el equivalente español más claro y fiel, y evita una perífrasis innecesaria.
- source_word: πραΰτητος
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - suavidad
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «gentleness», en español «mansedumbre» transmite mejor la virtud bíblica de fuerza contenida y trato apacible; es un término leído y reconocible en contexto eclesial. «Gentileza» puede sonar más social que moral.
- source_word: μακροθυμίας
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad y paciencia
  lexicon: BDAG
  rationale: La idea es la de aguante paciente frente a otros, especialmente sin ira pronta. «Paciencia» es la forma natural en español y conserva el valor ético del término.
- source_word: ἀνεχόμενοι
  english_pob_choice: bearing with
  chosen_spanish: soportándoos
  alternatives_spanish:
  - soportando
  - tolerándoos
  - sufriéndoos
  lexicon: BDAG
  rationale: El participio presente medio expresa una acción continua de tolerarse mutuamente. «Soportándoos» mantiene la reciprocidad y el matiz de perseverancia relacional, mejor que una opción demasiado coloquial.
- source_word: ἀλλήλων
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre ustedes
  - los unos a los otros
  lexicon: BDAG
  rationale: El pronombre recíproco se vierte naturalmente como «unos a otros» en español y preserva la mutualidad explícita del griego.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - por amor
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» para conservar la relación de esfera o modo. «Amor» corresponde al valor de ἀγάπη según el criterio doctrinal del proyecto, sin sustituirlo por un término más arcaico.
theological_decisions:
- issue: ἀγάπη como término doctrinal
  english_pob_reading: love
  chosen_spanish_reading: amor
  alternative_spanish_readings:
  - caridad
  rationale: El proyecto fija ἀγάπη como «love»; en español, «amor» es la correspondencia más directa y actual. «Caridad» sería más restrictivo y arcaizante, y podría ocultar el alcance relacional y ético del término.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: πραΰτης y su tono moral
  english_pob_reading: gentleness
  chosen_spanish_reading: mansedumbre
  alternative_spanish_readings:
  - suavidad
  - gentileza
  rationale: No se trata de mera amabilidad social, sino de una virtud cristiana de trato apacible bajo dominio propio. «Mansedumbre» conserva mejor esa carga ética y teológica en español bíblico.
  doctrine_reference: Uso contextual de virtud ética en cartas paulinas
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no registran revisiones posteriores; se ha producido una versión española estable, sin necesidad de notas de variante textual ni de ajustes por revisiones. Se han respetado las decisiones léxicas principales del inglés POB, adaptándolas a equivalentes naturales en español.
  spanish_consistency_notes:
  - Se mantiene la estructura paralela de dos complementos introducidos por «con» y el participio final, para reflejar el ritmo del griego.
  - Se usa «amor» para ἀγάπη de forma consistente con el criterio doctrinal del proyecto.
  - «Soportándoos unos a otros» conserva la reciprocidad mutua y el carácter durativo de ἀνεχόμενοι.
  - No se introduce mayúscula en «amor» ni en las virtudes, porque el contexto no exige personificación ni título.
