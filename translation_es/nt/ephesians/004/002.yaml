  revision_rationale: Se ajusta solo el participio para cumplir el perfil de español neutral y mantener con claridad la reciprocidad de ἀνεχόμενοι ἀλλήλων. No hacen falta notas adicionales porque no se introduce nueva ambigüedad ni se pierde ninguna alternativa preservada por el inglés POB.
