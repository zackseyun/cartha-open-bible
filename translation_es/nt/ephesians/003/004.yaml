translation:
  language: es
  text: Al leer[a] esto, pueden entender mi comprensión acerca del misterio del Mesías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Cristo». El título griego Χριστός puede verterse como «Mesías» o, tradicionalmente, como «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς ὃ
  english_pob_choice: By reading this
  chosen_spanish: Al leer esto
  alternatives_spanish:
  - con respecto a lo cual
  - en relación con lo cual
  - mediante la lectura de esto
  lexicon: BDAG
  rationale: La construcción enlaza con lo anterior e introduce el medio por el cual los lectores pueden captar lo que Pablo expone. En español, «Al leer esto» expresa con naturalidad ese vínculo discursivo e instrumental sin perder la referencia al texto precedente.
- source_word: δύνασθε
  english_pob_choice: you are able to
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - pueden llegar a
  lexicon: BDAG
  rationale: El verbo expresa capacidad. En español, «pueden» es claro, natural y conserva la idea de posibilidad/capacidad sin sobrecargar la frase.
- source_word: ἀναγινώσκοντες
  english_pob_choice: reading
  chosen_spanish: leer
  alternatives_spanish:
  - al leer
  - mientras leen
  - leyendo
  lexicon: BDAG
  rationale: El participio presente funciona aquí de manera circunstancial e instrumental. En español, el infinitivo en la construcción «Al leer esto» transmite bien el medio por el cual se produce la comprensión.
- source_word: νοῆσαι
  english_pob_choice: to understand
  chosen_spanish: entender
  alternatives_spanish:
  - comprender
  - percibir
  lexicon: BDAG
  rationale: Aquí νοέω apunta a captar mentalmente el sentido. «Entender» es natural en español moderno y conserva adecuadamente el valor cognitivo.
- source_word: τὴν σύνεσίν μου
  english_pob_choice: my insight
  chosen_spanish: mi entendimiento
  alternatives_spanish:
  - mi comprensión
  - mi perspicacia
  lexicon: BDAG
  rationale: σύνεσις designa entendimiento o capacidad de comprender. En español, «entendimiento» mantiene el sentido sin repetir de forma pesada el verbo «entender»; «perspicacia» sería más interpretativo y menos directo.
- source_word: ἐν τῷ μυστηρίῳ
  english_pob_choice: into the mystery
  chosen_spanish: acerca del misterio
  alternatives_spanish:
  - en el misterio
  - sobre el misterio
  - respecto del misterio
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», el contexto de «mi entendimiento» pide en español una relación de contenido u objeto. «Acerca del misterio» comunica de forma natural el ámbito de lo comprendido, sin imponer una lectura excesivamente literal.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Χριστός es un título y, por norma del proyecto, se traduce como «Mesías» cuando funciona titularmente. Se evita «Cristo» como forma fija tradicional, salvo necesidad idiomática o razón textual específica.
theological_decisions:
- issue: Rendering of Χριστοῦ as a title
  english_pob_reading: of the Messiah
  chosen_spanish_reading: de Mesías
  alternative_spanish_readings:
  - de Cristo
  rationale: En este contexto, Χριστός funciona como título cristológico, no como simple nombre propio. Traducirlo como «Mesías» preserva su fuerza semántica y la coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El paquete inglés muestra una trayectoria de revisión con un ajuste temporal hacia «Christ» y su posterior corrección de regresión de vuelta a «Messiah». La decisión española sigue la política doctrinal vigente del proyecto para Χριστός como título, manteniendo «Mesías» y registrando la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto.
  - «entendimiento» evita una repetición innecesaria con «entender» y refleja bien σύνεσις.
  - La preposición se adaptó a un español natural («Al leer esto») para conservar la relación discursiva e instrumental del griego.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
