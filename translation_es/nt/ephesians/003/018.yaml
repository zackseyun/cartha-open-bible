translation:
  language: es
  text: para que sean lo bastante fuertes para comprender, junto con todos los santos, cuál es la anchura, la longitud, la altura y la profundidad[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego deja sin expresar qué describen estas dimensiones; muchos entienden que el pensamiento se completa en el versículo siguiente con el amor del Mesías.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito/resultadocomo en el griego. «Para que» es natural en español y conserva la fuerza telicadel texto sin sobrecargarlo.
- source_word: ἐξισχύσητε
  english_pob_choice: you may be strong enough
  chosen_spanish: puedan fortalecerse lo suficiente
  alternatives_spanish:
  - sean lo bastante fuertes
  - tengan fuerza suficiente
  - puedan ser suficientemente fuertes
  lexicon: BDAG
  rationale: El verbo comunica suficiencia de fuerza o capacidad para lo que sigue. En español, «fortalecerse lo suficiente» conserva esa idea de capacidad adecuada y suena más natural que una fórmula demasiado literal.
- source_word: καταλαβέσθαι
  english_pob_choice: to comprehend
  chosen_spanish: comprender
  alternatives_spanish:
  - captar
  - entender
  - aprehender
  lexicon: BDAG
  rationale: Aquí el verbo apunta a abarcar mentalmente una realidad espiritual. «Comprender» mantiene el peso conceptual de «comprehend» en inglés y evita una banalización coloquial.
- source_word: σὺν πᾶσιν τοῖς ἁγίοις
  english_pob_choice: together with all the saints
  chosen_spanish: junto con todos los santos
  alternatives_spanish:
  - con todos los santos
  - junto a todos los santos
  - con todo el pueblo santo
  lexicon: BDAG
  rationale: «Santos» conserva el término paulino establecido para los creyentes. «Junto con» refleja σύν como participación compartida.
- source_word: τί
  english_pob_choice: what is
  chosen_spanish: cuál es
  alternatives_spanish:
  - qué es
  - qué
  - cómo es
  lexicon: BDAG
  rationale: En español, «cuál es» introduce con claridad el contenido que será descrito por las cuatro dimensiones. Evita una construcción demasiado inglesa.
- source_word: τὸ πλάτος
  english_pob_choice: the width
  chosen_spanish: la anchura
  alternatives_spanish:
  - el ancho
  - la amplitud
  - la largura
  lexicon: BDAG
  rationale: πλάτος denota anchura/breadth. «Anchura» es el equivalente más directo y formal en español; «amplitud» sería menos preciso en este contexto dimensional.
- source_word: μῆκος
  english_pob_choice: length
  chosen_spanish: la longitud
  alternatives_spanish:
  - el largo
  lexicon: BDAG
  rationale: Término dimensional estándar; «longitud» es la correspondencia directa y conserva la serie de medidas.
- source_word: ὕψος
  english_pob_choice: height
  chosen_spanish: la altura
  alternatives_spanish:
  - lo alto
  lexicon: BDAG
  rationale: Término dimensional estándar; «altura» es la forma natural y precisa en español.
- source_word: βάθος
  english_pob_choice: depth
  chosen_spanish: la profundidad
  alternatives_spanish:
  - lo profundo
  lexicon: BDAG
  rationale: Término dimensional estándar; «profundidad» es el equivalente directo y mantiene el paralelismo con las otras medidas.
theological_decisions:
- issue: Referente de las cuatro dimensiones
  english_pob_reading: Leave the object of 'width and length and height and depth' implicit in the main text, to be clarified by context rather than supplied by translation.
  chosen_spanish_reading: Dejar implícito en el texto principal el referente de la anchura, la longitud, la altura y la profundidad, sin añadir un objeto interpretativo.
  alternative_spanish_readings:
  - de la anchura, la longitud, la altura y la profundidad de su amor
  - de la anchura, la longitud, la altura y la profundidad del plan de Dios
  - de la anchura, la longitud, la altura y la profundidad, que se completan en el versículo siguiente
  rationale: El griego no explicita el referente en este versículo. Añadirlo aquí resolvería prematuramente una tensión que el contexto inmediato desarrolla en el versículo siguiente. Mantener la abertura respeta el texto y la lectura auditada del POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es de alto acuerdo y la formulación inglesa quedó estable.
  spanish_consistency_notes:
  - Se mantiene «santos» para ἅγιοι conforme al uso paulino establecido.
  - 'Se usa una serie de sustantivos femeninos paralelos: anchura, longitud, altura y profundidad, para conservar el ritmo de medidas del griego.'
  - No se añade «del Mesías» en el texto principal para no resolver una relación interpretativa que el contexto inmediato deja abierta.
