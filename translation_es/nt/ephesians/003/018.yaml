review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido del griego: cláusula final con ἵνα, suficiencia/capacidad para comprender, participación comunitaria «junto con todos los santos», y las cuatro dimensiones dejadas sin referente explícito. También mantiene correctamente la nota interpretativa sobre la elipsis completada en el v. 19.'
  spanish_quality_summary: El español es claro y digno, pero «puedan fortalecerse lo suficiente» desplaza levemente el sentido desde tener suficiente fuerza/capacidad hacia un proceso reflexivo de fortalecimiento. En contexto suena menos natural y menos preciso que una formulación de capacidad suficiente. El resto del versículo fluye bien. La nota a es aceptable, aunque conviene formularla según la alternativa inglesa más cercana.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Santos» para ἅγιοι y «Mesías» en la nota son consistentes. La decisión de dejar implícito el referente de las dimensiones respeta la pauta teológica auditada.
  issues:
  - severity: medium
    issue: «puedan fortalecerse lo suficiente» para ἐξισχύσητε
    rationale: El griego expresa estar suficientemente capacitados/ser lo bastante fuertes para el infinitivo καταλαβέσθαι. La forma reflexiva «fortalecerse» introduce una idea de llegar a fortalecerse más que de poseer fuerza suficiente, y puede sugerir proceso donde el texto enfatiza capacidad adecuada.
  - severity: low
    issue: Nota a algo alejada de la alternativa auditada
    rationale: La nota inglesa preserva «breadth» como alternativa para «width». En español, la nota actual ofrece «captar» para καταλαβέσθαι, lo cual no refleja una alternativa preservada en el POB inglés. No es incorrecta como posibilidad léxica, pero es menos justificada por la auditoría disponible que una nota sobre «anchura/amplitud» no sería tampoco ideal. Dado que «comprender» ya funciona bien, la mejor reparación es eliminar la nota a.
  revised_spanish_text: para que sean lo bastante fuertes para comprender, junto con todos los santos, cuál es la anchura, la longitud, la altura y la profundidad[a],
  revised_footnotes:
  - marker: a
    text: El griego deja sin expresar qué describen estas dimensiones; muchos entienden que el pensamiento se completa en el versículo siguiente con el amor del Mesías.
    reason: alternative_reading
  revision_rationale: Se ajusta ἐξισχύσητε a una expresión de capacidad suficiente más fiel al griego y más natural en español («sean lo bastante fuertes»). Se elimina la nota léxica sobre «comprender» porque no está respaldada por una alternativa preservada en la auditoría inglesa y no es necesaria para la claridad. Se conserva la nota interpretativa sobre el referente implícito de las dimensiones.
