  - severity: medium
    issue: La combinación «infinitamente más de todo» reproduce de forma poco natural ὑπὲρ πάντα + ὑπερεκπερισσοῦ
    rationale: 'Conviene distinguir mejor la estructura de excedencia: ''más allá de todo lo que...'' o ''muchísimo más allá de todo lo que...'' refleja con más fidelidad y mejor español la construcción griega.'
  - severity: low
