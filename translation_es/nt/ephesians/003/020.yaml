translation:
  language: es
  text: Y a Aquel que puede hacer muchísimo más allá de todo lo que pedimos o pensamos[a], conforme al poder que actúa en nosotros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abundantemente más allá» o «más allá de toda medida»; el griego intensifica la idea de exceder lo que se pide o se piensa. «Pensamos» también podría traducirse aquí como «imaginamos», destacando lo que la mente puede concebir.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῷ ... δυναμένῳ
  english_pob_choice: to the one who is able
  chosen_spanish: a Aquel que puede
  alternatives_spanish:
  - al que puede
  - a quien es capaz
  lexicon: BDAG
  rationale: El participio articular dativo funciona como destinatario de la doxología. En español, «a Aquel que puede» mantiene el valor sustantivado y suena natural, sin convertirlo en una paráfrasis más explícita que el griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce una continuación doxológica, no una oposición fuerte. En español, «Y» comunica bien la transición fluida del discurso sin añadir matiz adversativo.
- source_word: ὑπὲρ πάντα
  english_pob_choice: beyond all
  chosen_spanish: infinitamente más de todo
  alternatives_spanish:
  - más allá de todo
  - por encima de todo
  - mucho más que todo
  lexicon: BDAG
  rationale: Con ποιῆσαι, ὑπέρ expresa excedencia de medida. «Infinitamente más de todo» preserva la intensificación y la amplitud del griego en un español idiomático y reverente.
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - realizar
  - cumplir
  - acometer
  lexicon: BDAG
  rationale: ποιέω es amplio; «hacer» conserva su simplicidad y evita especificar más de lo que el texto dice.
- source_word: ὑπερεκπερισσοῦ
  english_pob_choice: far beyond
  chosen_spanish: infinitamente más
  alternatives_spanish:
  - sobremanera
  - muchísimo más
  - abundantemente más
  lexicon: BDAG
  rationale: El adverbio intensifica la idea de excedencia con acumulación de prefijos. «Infinitamente más» transmite bien esa fuerza superlativa; se deja constancia de alternativas más literales pero menos naturales.
- source_word: ὧν αἰτούμεθα ἢ νοοῦμεν
  english_pob_choice: all that we ask or think
  chosen_spanish: de todo lo que pedimos o pensamos
  alternatives_spanish:
  - de cuanto pedimos o imaginamos
  - de todo lo que pedimos o entendemos
  lexicon: BDAG
  rationale: La construcción relativa después de una expresión de excedencia se vierte de forma natural como «de todo lo que». αἰτούμεθα se expresa con «pedimos», y νοοῦμεν con «pensamos», preservando su alcance cognitivo general sin estrecharlo a «imaginar».
- source_word: κατὰ τὴν δύναμιν
  english_pob_choice: according to the power
  chosen_spanish: conforme al poder
  alternatives_spanish:
  - según el poder
  - de acuerdo con el poder
  - en proporción al poder
  lexicon: BDAG
  rationale: κατά con acusativo indica norma o medida. «Conforme al poder» conserva esa relación de correspondencia; «en proporción al poder» sería más explícito pero más pesado en español.
- source_word: τὴν ἐνεργουμένην
  english_pob_choice: at work
  chosen_spanish: que actúa
  alternatives_spanish:
  - que está en acción
  - en operación
  - obrando
  lexicon: BDAG
  rationale: El participio presente medio/pasivo describe poder efectivamente activo. «Que actúa» mantiene la idea de actividad continua con naturalidad en español.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - dentro de nosotros
  lexicon: BDAG
  rationale: 'La lectura directa es interior o corporativa: el poder opera «en nosotros». «En nosotros» es la forma más fiel y clara para el lector español.'
theological_decisions:
- issue: Referente implícito del destinatario doxológico
  english_pob_reading: The translation keeps the referent generic as 'the one who is able,' leaving the identity to context rather than inserting 'God' into the verse.
  chosen_spanish_reading: Se mantiene de forma genérica como «Aquel que puede», sin añadir «Dios» en el verso.
  alternative_spanish_readings:
  - a Dios, que puede
  - al Dios que puede
  rationale: El griego no repite explícitamente «Dios» en este versículo, aunque el contexto lo identifica. La versión española conserva esa forma, evitando introducir un sustantivo ausente del texto inmediato.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido del poder divino en los creyentes
  english_pob_reading: the power at work in us
  chosen_spanish_reading: «el poder que actúa en nosotros»
  alternative_spanish_readings:
  - «el poder que obra en nosotros»
  - «el poder que está operando entre nosotros»
  rationale: La formulación conserva la afirmación de una eficacia divina presente sin fijar una explicación doctrinal más específica sobre carismas o santificación.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete de fuente griego y el audit trail inglés, sin cambios respecto a la última revisión aprobada; se conserva la intensificación adverbial y la referencia genérica del destinatario doxológico.
  spanish_consistency_notes:
  - Se usa «Aquel» para un referente personal elevado y reverente, coherente con el estilo bíblico en español.
  - Se mantiene «poder» para δύναμις y «actúa» para ἐνεργουμένην, preservando la idea de eficacia continua.
  - La expresión «infinitamente más» recoge la intensificación de ὑπερεκπερισσοῦ sin perder legibilidad.
  - Se evita «Señor» o «Cristo» porque este versículo, por sí solo, no los enuncia en el griego ni en el audit trail inglés.
