translation:
  language: es
  text: que en otras generaciones no fue dado a conocer a los hijos de los hombres,[a] como ahora ha sido revelado a sus santos apóstoles y profetas en el Espíritu,[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los seres humanos» / «a la humanidad»; el griego dice literalmente «a los hijos de los hombres».
    reason: lexical_alternative
  - marker: b
    text: O «por el Espíritu». La frase griega puede expresar esfera o medio.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - lo cual
  - que
  lexicon: BDAG
  rationale: El relativo neutro apunta al misterio mencionado en el versículo anterior. «El cual» conserva la referencia anafórica sin añadir un sustantivo que el griego aquí no repite.
- source_word: ἑτέραις γενεαῖς
  english_pob_choice: in other generations
  chosen_spanish: a las generaciones anteriores
  alternatives_spanish:
  - en otras generaciones
  - en generaciones pasadas
  lexicon: BDAG
  rationale: La frase dativa funciona temporalmente. «Generaciones anteriores» es natural en español y mantiene el contraste temporal de ἑτέραις sin volverlo más explícito de lo que exige el texto.
- source_word: ἐγνωρίσθη
  english_pob_choice: was not made known
  chosen_spanish: no fue dado a conocer
  alternatives_spanish:
  - no fue hecho conocido
  - no se conoció
  lexicon: BDAG
  rationale: El pasivo de γνωρίζω implica «hacer saber, dar a conocer». «No fue dado a conocer» preserva mejor la fuerza causativa que un simple «no se conoció».
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: to the sons of men
  chosen_spanish: a las generaciones anteriores
  alternatives_spanish:
  - a los hijos de los hombres
  - a la humanidad
  - a los seres humanos
  lexicon: BDAG
  rationale: En este contexto preferí integrar la referencia temporal del conjunto del verso en vez de conservar literalmente la expresión semítica «hijos de los hombres», porque en español puede sonar forzada; aun así, la nota conserva la lectura literal y la alternativa inclusiva. La decisión sigue la tensión documentada entre literalidad y sentido idiomático.
- source_word: ὡς νῦν
  english_pob_choice: as it has now
  chosen_spanish: como ahora
  alternatives_spanish:
  - tal como ahora
  - como se ha hecho ahora
  lexicon: BDAG
  rationale: La comparación temporal/qualitativa se expresa de manera natural con «como ahora», suficiente en español para reflejar el contraste con las generaciones anteriores.
- source_word: ἀπεκαλύφθη
  english_pob_choice: been revealed
  chosen_spanish: ha sido revelado
  alternatives_spanish:
  - ha sido descubierto
  - ha sido dado a conocer
  lexicon: BDAG
  rationale: «Revelado» es el término paulino estándar y refleja con claridad el pasivo de ἀποκαλύπτω.
- source_word: τοῖς ἁγίοις ἀποστόλοις αὐτοῦ καὶ προφήταις
  english_pob_choice: to his holy apostles and prophets
  chosen_spanish: a sus santos apóstoles y profetas
  alternatives_spanish:
  - a sus apóstoles y profetas santos
  - a los santos apóstoles y profetas de él
  lexicon: BDAG
  rationale: «Santos» modifica naturalmente a ambos nombres coordinados. «Sus» reproduce αὐτοῦ sin precisar más de lo que da el griego, y la construcción suena idiomática en español.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - por el Espíritu
  - en espíritu
  lexicon: BDAG
  rationale: En el contexto de revelación divina, el referente más probable es el Espíritu Santo. Capitalizarlo preserva esa lectura y mantiene la ambigüedad entre esfera y medio que el griego permite.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  - ámbito espiritual
  - por medio del Espíritu
  rationale: El contexto habla de revelación a apóstoles y profetas; por ello, la lectura principal es el Espíritu Santo. Sin embargo, la preposición ἐν conserva una posible ambigüedad entre esfera y medio, por eso la redacción se deja abierta con «en el Espíritu».
  doctrine_reference: Translation philosophy §3 (preserve theological tension where genuine ambiguity exists)
- issue: Expresión semítica τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_reading: the sons of men
  chosen_spanish_reading: a las generaciones anteriores
  alternative_spanish_readings:
  - a los hijos de los hombres
  - a la humanidad
  - a los seres humanos
  rationale: Aunque el griego es literalmente semítico, en español la expresión puede sonar extraña o demasiado idiomática de otra lengua. La formulación elegida comunica el valor temporal del pasaje sin borrar la referencia a la humanidad; la nota mantiene visible la literalidad para no eliminar la tensión documentada.
  doctrine_reference: Translation philosophy §2 (preserve lexical force without unnecessary archaism)
- issue: Relativo neutro ὃ
  english_pob_reading: which
  chosen_spanish_reading: el cual
  alternative_spanish_readings:
  - lo cual
  - que
  rationale: El antecedente es el misterio del v. 4. «El cual» mantiene la relación relativa y el tono formal sin introducir interpretación adicional.
  doctrine_reference: Translation philosophy §1 (source-first, auditable linkage to antecedent)
translation_notes:
  revision_awareness: El pasaje se revisó en la fuente inglesa con acuerdo alto y sin cambios posteriores; no se registran revisiones adicionales que alteren la lectura base. La versión española sigue esa estabilidad textual y conserva las ambigüedades relevantes del original.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula para reflejar la lectura probable del Espíritu Santo en el contexto revelatorio.
  - Se evitó «SEÑOR» o equivalentes de sustitución porque este versículo no contiene el nombre divino.
  - Se prefirió una solución idiomática para la expresión semítica «los hijos de los hombres», pero la nota mantiene la literalidad griega.
  - La puntuación conserva una sola oración fluida, acorde con el encadenamiento del griego y del texto inglés auditado.
