translation:
  language: es
  text: suponiendo, en efecto, que han oído[a] de la mayordomía[b] de la gracia de Dios que me fue dada para ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si en verdad han oído». El griego conserva una forma condicional, aunque en contexto Pablo probablemente la presenta como algo dado por supuesto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «administración» o «comisión» para «mayordomía». El término griego puede expresar una responsabilidad encomendada o una administración recibida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  english_pob_choice: assuming indeed that
  chosen_spanish: asumiendo, en efecto, que
  alternatives_spanish:
  - si en verdad
  - si es que realmente
  - suponiendo que en verdad
  lexicon: BDAG
  rationale: La construcción griega mantiene una forma condicional, pero en el contexto funciona como una presuposición retórica. «Asumiendo, en efecto, que» conserva esa tensión entre condicionalidad y expectativa de verdad sin volverla una duda fuerte.
- source_word: ἠκούσατε
  english_pob_choice: you have heard
  chosen_spanish: habéis oído
  alternatives_spanish:
  - habéis escuchado
  - oísteis
  - han oído
  lexicon: BDAG
  rationale: El aoristo se refiere al hecho de haber recibido la noticia como un todo. «Habéis oído» suena natural en español bíblico y conserva la referencia a una recepción ya ocurrida con relevancia actual.
- source_word: οἰκονομίαν
  english_pob_choice: stewardship
  chosen_spanish: administración
  alternatives_spanish:
  - mayordomía
  - encargo
  - comisión
  lexicon: BDAG
  rationale: En este contexto el término puede referirse a una administración o encargo confiado. Opto por «administración» porque en español comunica con claridad la idea de una responsabilidad encomendada, sin forzar demasiado un tecnicismo como «mayordomía».
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente paulino normal y conserva la carga teológica del don inmerecido de Dios.
- source_word: τῆς δοθείσης
  english_pob_choice: that was given
  chosen_spanish: que me fue dada
  alternatives_spanish:
  - que fue dada a mí
  - dada a mí
  lexicon: BDAG
  rationale: El participio pasivo atributivo expresa una gracia recibida, no autoasumida. «Me fue dada» preserva el pasivo divino y suena más natural que una perífrasis más pesada.
- source_word: μoi
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: 'El dativo se integra naturalmente en la pasiva española: «me fue dada». Mantiene la función de receptor sin sobrecargar la frase.'
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para vosotros
  alternatives_spanish:
  - para ustedes
  - hacia vosotros
  - en favor de vosotros
  lexicon: BDAG
  rationale: La preposición expresa orientación y beneficio respecto de los destinatarios. «Para vosotros» comunica bien esa finalidad/beneficio y mantiene la dirección del encargo.
theological_decisions:
- issue: Alcance de «la administración de la gracia de Dios»
  english_pob_reading: Paul refers to the entrusted commission/administration of God's grace given to him on behalf of the readers.
  chosen_spanish_reading: Pablo alude al encargo administrativo confiado por Dios respecto de su gracia, recibido para beneficio de los destinatarios.
  alternative_spanish_readings:
  - Pablo habla del plan de la gracia de Dios
  - Pablo se refiere a la dispensación de la gracia de Dios
  rationale: «Administración» mantiene la idea de una responsabilidad encomendada y evita reducir el texto a un mero plan abstracto. En el contexto, la gracia está ligada al ministerio recibido por Pablo para los lectores.
  doctrine_reference: Translation philosophy §5
- issue: Fuerza de εἴ γε
  english_pob_reading: A rhetorical assumption expected to be true, not genuine uncertainty.
  chosen_spanish_reading: 'Una presuposición retórica: Pablo da por sabido que los lectores han oído de esto.'
  alternative_spanish_readings:
  - 'Una condicional abierta: «si en verdad habéis oído»'
  - Una afirmación dubitativa
  rationale: La frase conserva la estructura condicional, pero el discurso presupone que la información ya es conocida por los destinatarios. La redacción española deja ver esa expectativa sin borrar la forma griega.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo con la traducción inglesa final y sin revisiones recientes sustantivas; por eso el borrador español sigue de cerca las decisiones léxicas y retóricas ya justificadas, adaptándolas a un español natural y eclesialmente amplio.
  spanish_consistency_notes:
  - He mantenido «gracia» como término paulino central, sin reemplazarlo por «favor».
  - He preservado la condicionalidad de εἴ γε con una nota alternativa, en vez de convertirla sin más en una afirmación lisa.
  - He traducido οἰκονομίαν con «administración» para conservar la idea de encargo/gestión confiada, evitando un calco rígido.
  - He usado el pasivo «me fue dada» para reflejar el sentido de don recibido.
  - He elegido «vosotros» por coherencia con un registro bíblico amplio; podría adaptarse a «ustedes» según la convención del libro, pero aquí el contexto permite un tono reverente y claro.
