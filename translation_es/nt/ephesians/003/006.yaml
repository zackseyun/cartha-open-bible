    rationale: El inglés POB fue revisado de «fellow members of the same body» a «fellow members of the body» para preservar el paralelismo del tricolon. En español, «miembros del cuerpo» logra mejor ese equilibrio, mientras que «del mismo cuerpo» puede quedar como alternativa explicativa en nota.
