    issue: Modo verbal en «que los gentiles sean»
    rationale: 'El infinitivo εἶναι introduce el contenido del misterio revelado; en español aquí se comunica mejor con indicativo: «que los gentiles son». El subjuntivo puede sugerir finalidad o eventualidad, y debilita la afirmación proposicional del versículo.'
