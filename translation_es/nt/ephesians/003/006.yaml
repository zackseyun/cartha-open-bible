translation:
  language: es
  text: que los gentiles[a] son coherederos, miembros[b] del cuerpo y copartícipes de la promesa en Mesías Jesús[c], mediante el evangelio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones». Aquí el término se refiere específicamente a los pueblos no judíos incluidos junto con Israel en la promesa salvadora de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «miembros del mismo cuerpo». El griego usa un término muy compacto que expresa pertenencia conjunta a un solo cuerpo.
    reason: alternative_reading
  - marker: c
    text: O «en Cristo Jesús». Se traduce Χριστός como «Mesías» para conservar su fuerza titular.
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En este contexto paulino, ἔθνη se refiere a los no judíos incluidos en el plan salvador de Dios. «Gentiles» comunica mejor esa oposición judío/gentil que «las naciones» en español bíblico contemporáneo.
- source_word: συγκληρονόμα
  english_pob_choice: fellow heirs
  chosen_spanish: coherederos
  alternatives_spanish:
  - herederos juntamente
  - consherederos
  lexicon: BDAG
  rationale: El compuesto con σύν indica participación compartida en la herencia. «Coherederos» conserva la fuerza relacional y es natural en español; también refleja la simetría del tricolon.
- source_word: σύσσωμα
  english_pob_choice: fellow members of the body
  chosen_spanish: miembros del mismo cuerpo
  alternatives_spanish:
  - miembros del cuerpo
  - co-miembros
  lexicon: BDAG
  rationale: El término alude a la incorporación a un solo cuerpo. En español, «miembros del mismo cuerpo» mantiene la imagen eclesial y la idea de una sola comunidad sin añadir explicaciones innecesarias.
- source_word: συμμέτοχα
  english_pob_choice: fellow partakers
  chosen_spanish: copartícipes
  alternatives_spanish:
  - participantes juntos
  - partícipes juntamente
  lexicon: BDAG
  rationale: El verbo/adjunto compuesto expresa participación conjunta en algo recibido. «Copartícipes» preserva el valor de compartir en común y mantiene el paralelismo con «coherederos».
- source_word: τῆς ἐπαγγελίας
  english_pob_choice: of the promise
  chosen_spanish: de la promesa
  alternatives_spanish:
  - de la promesa prometida
  - del promiso
  lexicon: BDAG
  rationale: 'El genitivo depende de «copartícipes»: comparten la promesa. El singular «promesa» refleja el griego y resume la promesa pactal de Dios en el contexto.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título y no solo como nombre fijo. En español, «Mesías Jesús» evita la forma tradicional de transliteración cuando el matiz titulario está semánticamente activo.
- source_word: διὰ τοῦ εὐαγγελίου
  english_pob_choice: through the gospel
  chosen_spanish: mediante el evangelio
  alternatives_spanish:
  - por medio del evangelio
  - a través del evangelio
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Mediante» es conciso, digno y claro en español; mantiene la idea de agencia instrumental sin sobreexplicar.
- source_word: εἶναι
  english_pob_choice: that ... are
  chosen_spanish: que ... sean
  alternatives_spanish:
  - que ... son
  - para que ... sean
  lexicon: BDAG
  rationale: El infinitivo dependiente del misterio revelado se vierte con una subordinada sustantiva en español. El subjuntivo «sean» funciona bien después de la idea de revelación y conserva el carácter contenido/proposicional.
theological_decisions:
- issue: Traducción de Χριστός como título mesianico
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: La pauta doctrinal favorece «Mesías» cuando Χριστός opera como título. Aquí el versículo trata de la inclusión de los gentiles en la promesa de Dios, por lo que el valor mesiánico sigue vivo y no debe quedar neutralizado.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where title; Christ where name-like)'
- issue: Sentido de ἔθνη en la inclusión del pueblo de Dios
  english_pob_reading: the Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  rationale: El pasaje contrasta a los no judíos con Israel y afirma su igualdad de estatus en la promesa. «Los gentiles» expresa mejor esa carga teológica que «las naciones», que en español puede sonar más geopolítica que soteriológica.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; optimal equivalence'
translation_notes:
  revision_awareness: 'La revisión auditada del inglés ajustó la fórmula intermedia para equilibrar mejor el paralelismo del tricolon. En español, esa observación se refleja evitando ampliaciones explicativas y manteniendo tres miembros breves y simétricos: «coherederos, miembros del mismo cuerpo y copartícipes».'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la política del proyecto, con nota para la alternativa tradicional.
  - «Gentiles» se usa en sentido técnico paulino, no como generalización cultural.
  - La cláusula final conserva el medio instrumental de διά con «mediante» para no diluir el matiz causal/instrumental.
  - Se evita añadir material interpretativo ajeno al griego; la frase es sintácticamente breve para respetar el tricolon original.
