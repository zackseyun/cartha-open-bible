translation:
  language: es
  text: Por esta razón yo, Pablo, el prisionero de Mesías Jesús[a], por ustedes, los gentiles[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo Jesús».'
    reason: alternative_reading
  - marker: b
    text: 'O simplemente: «por ustedes, los gentiles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτου χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - A causa de esto
  lexicon: BDAG
  rationale: La expresión funciona como un marcador discursivo inferencial que retoma el argumento previo. «Por esta razón» comunica con naturalidad esa relación lógica en español y conserva el vínculo causal/inferencial sin volverlo más interpretativo de lo que permite el griego.
- source_word: ἐγὼ Παῦλος
  english_pob_choice: I, Paul,
  chosen_spanish: yo, Pablo,
  alternatives_spanish:
  - yo Pablo
  - yo mismo, Pablo,
  lexicon: BDAG
  rationale: El pronombre explícito tiene valor enfático. En español, «yo, Pablo,» preserva la autoidentificación y el énfasis retórico con puntuación natural y sin añadir palabras ajenas al texto.
- source_word: ὁ δέσμιος
  english_pob_choice: the prisoner
  chosen_spanish: el prisionero
  alternatives_spanish:
  - el cautivo
  - el que está preso
  lexicon: BDAG
  rationale: δέσμιος designa a una persona detenida o encarcelada. «Prisionero» es la traducción más directa y idiomática en español; «cautivo» o «el que está preso» son posibles, pero menos naturales aquí.
- source_word: τοῦ Χριστοῦ Ἰησοῦ
  english_pob_choice: of Messiah Jesus
  chosen_spanish: de Mesías Jesús
  alternatives_spanish:
  - de Cristo Jesús
  - perteneciente a Mesías Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» como equivalente del título Χριστός, conforme a la política del proyecto para el título cristológico. El genitivo se expresa con «de», que en español puede comunicar pertenencia o relación estrecha sin forzar una paráfrasis.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: on behalf of you Gentiles
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - en favor de ustedes
  - en nombre de ustedes
  lexicon: BDAG
  rationale: ὑπέρ aquí puede expresar beneficio o representación. «Por causa de ustedes» conserva la relación benefactiva/explicativa de la prisión de Pablo sin añadir una interpretación más fuerte de representación legal que el contexto no exige por sí solo.
- source_word: τῶν ἐθνῶν
  english_pob_choice: Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - las naciones no judías
  lexicon: BDAG
  rationale: En el contexto paulino, ἔθνη se refiere a los no judíos. «Gentiles» es la equivalencia más clara y fiel al uso contextual; «naciones» en español podría sonar demasiado geográfico o político.
theological_decisions:
- issue: Cómo rendir Χριστοῦ como título cristológico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva «Mesías» para traducir el título Χριστός, siguiendo la directriz del proyecto de traducir títulos y no sustituirlos por la forma litúrgica tradicional sin necesidad. «Cristo Jesús» queda como alternativa reconocida, pero no como forma principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for Χριστός'
- issue: Relación semántica de ὑπὲρ ὑμῶν con la prisión de Pablo
  english_pob_reading: on behalf of you Gentiles
  chosen_spanish_reading: por causa de ustedes, los gentiles
  alternative_spanish_readings:
  - en favor de ustedes, los gentiles
  - por ustedes, los gentiles
  rationale: 'La preposición ὑπέρ admite un matiz benefactivo o representativo. «Por causa de ustedes» mantiene abierta esa tensión: Pablo está preso en relación con la misión a los gentiles, sin reducir el sentido a una sola explicación doctrinal. Así se evita borrar la ambigüedad útil del original.'
  doctrine_reference: BDAG, ὑπέρ; contexto de Efesios 3:1
translation_notes:
  revision_awareness: El texto sigue la decisión restaurada del audit trail de mantener Χριστός como «Mesías» en la línea principal, después de una revisión intermedia que había cambiado indebidamente a «Cristo». También conserva la relación benefactiva/representativa de ὑπέρ sin volverla más explícita de lo que el griego exige.
  spanish_consistency_notes:
  - Se usa «Mesías» como traducción principal de Χριστός, en coherencia con la política del proyecto y con el registro auditado.
  - Se mantiene «gentiles» para ἔθνη en el sentido paulino de no judíos.
  - Se evita «SEÑOR» porque no hay κύριος en este versículo; el término relevante es Χριστοῦ.
  - La puntuación con raya final refleja que el enunciado continúa al siguiente versículo en el contexto.
  - «Por causa de ustedes» preserva la ambigüedad entre beneficio y representación de ὑπέρ, acorde con el audit trail en inglés.
