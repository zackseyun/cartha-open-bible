    rationale: 'El inglés auditado preserva como alternativa «for you Gentiles», es decir, la frase preposicional completa con el sustantivo en aposición. La nota española «O simplemente: “los gentiles”» no refleja esa alternativa y resulta confusa, porque parece ofrecer una variante solo para τῶν ἐθνῶν.'
  revised_spanish_text: Por esta razón yo, Pablo, el prisionero de Mesías Jesús[a], por ustedes, los gentiles[b]—
