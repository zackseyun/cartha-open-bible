    issue: «por causa de ustedes» restringe indebidamente ὑπὲρ ὑμῶν
    rationale: ὑπέρ aquí admite «por / en favor de / en beneficio de». «Por causa de» inclina el sentido hacia causa u ocasión, mientras que el contexto y el audit trail destacan un valor benefactivo/representativo más amplio.
