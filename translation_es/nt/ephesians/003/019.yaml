    reason: lexical_alternative
  revision_rationale: Se restaura 'del Mesías' en el texto principal para traducir explícitamente τοῦ Χριστοῦ conforme al griego y a la política terminológica del proyecto. La nota [a] queda como alternativa tradicional 'de Cristo' en lugar de reemplazar una palabra ausente. Se conserva 'hasta toda la plenitud de Dios' y su nota porque refleja adecuadamente la fuerza de εἰς.
