source:
  edition: SBLGNT
  text: γνῶναί τε τὴν ὑπερβάλλουσαν τῆς γνώσεως ἀγάπην τοῦ Χριστοῦ, ἵνα πληρωθῆτε εἰς πᾶν τὸ πλήρωμα τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/003/019.yaml
  text: and to know the love of Messiah that surpasses knowledge[b][a], so that you may be filled unto all the fullness of God.
  footnotes:
  - marker: a
    text: Or, traditionally, 'the love of Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'filled with all the fullness of God.' The Greek says 'filled unto all the fullness of God,' a compressed expression that may emphasize movement toward the full measure of God's fullness.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
