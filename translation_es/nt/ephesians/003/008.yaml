    issue: «el más insignificante» para ἐλαχιστοτέρῳ
    rationale: Aunque comunica humildad extrema, «insignificante» sugiere falta de importancia o valor intrínseco, no simplemente ser «el más pequeño/el menor». El griego comparativo intensificado y la decisión inglesa auditada apuntan mejor a «the very least», no a una evaluación tan cargada.
  - severity: medium
    issue: Falta la nota equivalente a la alternativa tradicional «less than the least»
    rationale: El rastro inglés preserva explícitamente esta alternativa tradicional; la revisión española debe conservarla también, ya que documenta una opción exegética/estilística significativa y ayuda a explicar la formulación paulina.
  - severity: low
    issue: Dos puntos en lugar de raya larga tras «esta gracia»
    rationale: El griego y el POB inglés marcan una pausa explicativa fuerte con raya. En español ambas posibilidades existen, pero la raya refleja mejor la estructura auditada y mantiene paralelismo formal.
