source:
  edition: SBLGNT
  text: ἐμοὶ τῷ ἐλαχιστοτέρῳ πάντων ἁγίων ἐδόθη ἡ χάρις αὕτη— ⸀τοῖς ἔθνεσιν εὐαγγελίσασθαι ⸂τὸ ἀνεξιχνίαστον πλοῦτος⸃ τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/003/008.yaml
  text: To me[a], the very least of all the saints, this grace was given—to proclaim to the Gentiles the unsearchable riches of Messiah[c][b],
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός can be rendered either 'Messiah' or 'Christ'; here it is translated for meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'the nations.' In this context Paul most likely means the Gentiles, that is, the non-Jewish peoples.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''less than the least of all the saints.'''
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 0fcde54f46cea63b5c14672d6c184d7f34257e7baa2079a8beaeaa03cd6e12e8
    timestamp: '2026-04-18T10:59:20Z'
    output_hash: c876e4266a198a94ec7697ef569a261f858b79a1af8c7710bd09f66342567361
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:47Z'
    unchanged: false
    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for closer lexical correspondence and more natural consistency in this Pauline context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'A mí[a], el más pequeño[c] de todos los santos, me fue dada esta gracia: anunciar a los gentiles[b] las inescrutables riquezas del Mesías[d],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para mí». El dativo griego expresa aquí al beneficiario de la gracia y puede verterse con distintos matices en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las naciones». En este contexto, Pablo probablemente se refiere a los gentiles, es decir, a los pueblos no judíos.'
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «menos que el menor de todos los santos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «de Cristo». El griego Χριστός puede traducirse como «Mesías» o conservarse como «Cristo»; aquí se vierte por su sentido titular.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμοὶ
  english_pob_choice: To me
  chosen_spanish: A mí
  alternatives_spanish:
  - Para mí
  - A mí mismo
  lexicon: SBLGNT / pronombre dativo personal
  rationale: El dativo de ventaja/relación se expresa de forma natural en español con "a mí". Mantiene el énfasis paulino en el destinatario de la gracia sin sobrecargar la frase.
- source_word: ἐλαχιστοτέρῳ
  english_pob_choice: the very least
  chosen_spanish: el más insignificante
  alternatives_spanish:
  - el menor de todos
  - el más pequeño de todos
  - menos que el menor
  lexicon: BDAG
  rationale: La forma comparativa intensificada comunica extrema humildad. "El más insignificante" conserva esa fuerza en español actual; evita la dureza de una calca como "menos que el más pequeño" y sigue el sentido retórico del pasaje.
- source_word: ἁγίων
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los creyentes
  - el pueblo santo de Dios
  lexicon: BDAG
  rationale: '"Santos" es el equivalente directo y tradicional para los creyentes consagrados a Dios en el lenguaje paulino. Es conciso y fiel al sustantivo plural griego.'
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don de gracia
  lexicon: BDAG
  rationale: Se mantiene "gracia" por su continuidad léxica y teológica en Pablo. Aquí designa el favor inmerecido y también la comisión recibida.
- source_word: ἔθνεσιν
  english_pob_choice: the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En este contexto paulino el referente es el contraste judíos/no judíos. "Gentiles" comunica mejor esa distinción que "naciones" en español contemporáneo.
- source_word: εὐαγγελίσασθαι
  english_pob_choice: to proclaim
  chosen_spanish: anunciar
  alternatives_spanish:
  - predicar la buena noticia
  - evangelizar
  lexicon: BDAG
  rationale: El infinitivo indica la misión de dar a conocer el evangelio. "Anunciar" es natural y suficientemente fuerte en español sin introducir un tecnicismo eclesiástico innecesario.
- source_word: ἀνεξιχνίαστον
  english_pob_choice: unsearchable
  chosen_spanish: inescrutables
  alternatives_spanish:
  - insondables
  - impenetrables
  lexicon: BDAG
  rationale: El adjetivo expresa lo que no puede rastrearse ni agotarse en comprensión. "Inescrutables" conserva el matiz clásico y el sentido de algo que no puede examinarse hasta el fondo.
- source_word: πλοῦτος
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - abundancia
  lexicon: BDAG
  rationale: Se conserva el plural sustantivado "riquezas" como metáfora paulina de la abundancia salvadora. Es el equivalente más natural y estable en español.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se traduce el título por "Mesías" porque el proyecto POB lo prefiere cuando Χριστός funciona como designación titulante. En español evita convertir el término en un nombre fijo y mantiene el contenido del título.
theological_decisions:
- issue: Título Χριστός en genitivo final
  english_pob_reading: Messiah; footnote allows 'Christ' as alternative, but the main line translates the title for meaning.
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la pauta del proyecto: traducir el título cuando es claramente titular. En una frase sobre las riquezas pertenecientes al Ungido, "Mesías" comunica el valor semántico del término sin borrar su sentido mesiánico.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: ἔθνεσιν en contexto paulino
  english_pob_reading: the Gentiles, with note that 'the nations' is possible but non-Jewish peoples are intended.
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  rationale: La carta enfatiza la inclusión de los no judíos; por eso "gentiles" es la opción doctrinal y contextualmente más precisa. "Las naciones" quedaría más genérico y podría ocultar la oposición étnico-religiosa del pasaje.
  doctrine_reference: Contexto paulino de judíos y gentiles; uso léxico de ἔθνη
- issue: ἐλαχιστοτέρῳ como expresión de humildad extrema
  english_pob_reading: the very least; traditional rendering noted as 'less than the least.'
  chosen_spanish_reading: el más insignificante de todos los santos
  alternative_spanish_readings:
  - menos que el menor de todos los santos
  - el menos de todos los santos
  rationale: La construcción griega es intensiva y retórica. La versión elegida conserva la autohumillación de Pablo en un español fluido, sin perder la fuerza de la comparación extrema.
  doctrine_reference: Retórica paulina de humildad; comparación superlativa intensificada
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación entre 'Messiah' y 'Christ' en la revisión, con restauración final de 'Messiah' por política doctrinal. La versión española sigue esa decisión final y conserva el valor titular de Χριστός como «Mesías», evitando una transliteración mecánica no sustentada por el cierre editorial.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις, coherente con la terminología paulina del proyecto.
  - Se usa «gentiles» para ἔθνη por la distinción judíos/no judíos en el contexto.
  - Se prefiere «Mesías» para Χριστός conforme a la política POB y al cierre revisado del expediente.
  - «Inescrutables riquezas» conserva la metáfora de abundancia insondable sin suavizar el adjetivo griego.
  - La puntuación con dos puntos y raya reproduce la relación entre la afirmación de gracia y el propósito misionero.
