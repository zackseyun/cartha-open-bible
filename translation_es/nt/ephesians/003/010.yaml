review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: finalidad (ἵνα), temporalidad presente (νῦν), medio instrumental (διὰ τῆς ἐκκλησίας), pasiva de γνωρισθῇ, y destinatarios celestiales. Sin embargo, hay dos problemas de fidelidad documental: el orden de los complementos en español separa innecesariamente «en los lugares/regiones celestiales» de «los principados y las autoridades», cuando en el griego modifica a esos poderes; y la nota b introduce «maniforme», forma incorrecta y no documentada.'
  spanish_quality_summary: El texto es generalmente legible y digno. «Sabiduría multiforme» funciona bien en español bíblico moderno. No obstante, «principados y autoridades en los lugares celestiales» suena algo rígido; «gobernantes y autoridades en las regiones celestiales» o mantener «principados» depende del balance entre claridad y tradición. La reparación principal es reanclar mejor el modificador locativo y limpiar las notas.
  glossary_alignment: 'Alineación general correcta con la terminología del proyecto: «Dios», «iglesia». No hay términos del glosario mayor en conflicto. La elección «principados» para ἀρχαῖς es defendible por la racionalidad paulina/cósmica, aunque «gobernantes» sería más claro; no exige rechazo. «Lugares celestiales» es tradicional, pero dado que el English POB escogió «heavenly realms», «regiones celestiales» representa mejor la idea de esfera/ámbito. Las notas deben conservar la alternativa «lugares celestiales» y la observación sobre poderes espirituales.'
  issues:
  - severity: medium
    issue: La nota b contiene «maniforme», una forma española incorrecta.
    rationale: El English POB documenta «manifold» como alternativa inglesa, pero en español «maniforme» no es una opción válida ni natural. Debe sustituirse por una explicación léxica correcta, p. ej. «de múltiples facetas» o una nota explicativa de «multiforme».
  - severity: medium
    issue: La ubicación de «en los lugares celestiales» al final puede leerse como modificador de toda la cláusula en vez de anclar claramente a «los principados y las autoridades».
    rationale: En el griego, ἐν τοῖς ἐπουρανίοις sigue inmediatamente a ταῖς ἀρχαῖς καὶ ταῖς ἐξουσίαις y caracteriza a esos poderes. Conviene en español mantener esa asociación más clara.
  - severity: low
    issue: La nota a no aporta una alternativa real.
    rationale: '«También: “para que ahora”» repite esencialmente el mismo texto. Es mejor usar la nota para explicar el valor temporal presente de νῦν o eliminarla si no hay verdadera variante de traducción.'
  revised_spanish_text: para que ahora, por medio de la iglesia, la sabiduría multiforme[a] de Dios sea dada a conocer a los principados y a las autoridades en las regiones celestiales[b],
