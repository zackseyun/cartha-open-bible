translation:
  language: es
  text: para que ahora, por medio de la iglesia, la sabiduría multiforme[a] de Dios sea dada a conocer a los principados y a las autoridades en las regiones celestiales[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sabiduría de múltiples facetas». El griego πολυποίκιλος sugiere gran variedad o riqueza de aspectos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en los lugares celestiales». La expresión puede referirse al ámbito celestial, especialmente como esfera donde actúan poderes espirituales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Expresa claramente la finalidad del ἵνα en español natural y digno, conservando el valor telic o de propósito.
- source_word: γνωρισθῇ
  english_pob_choice: might be made known
  chosen_spanish: sea dada a conocer
  alternatives_spanish:
  - pueda ser dada a conocer
  - llegue a ser conocida
  lexicon: BDAG
  rationale: Mantiene la pasiva y la idea de manifestación pública sin forzar un calco pesado; en español suena natural y conserva el matiz de ser revelada a otros.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: BDAG
  rationale: Adverbio temporal directo, equivalente y transparente.
- source_word: ταῖς ἀρχαῖς
  english_pob_choice: to the rulers
  chosen_spanish: a los principados
  alternatives_spanish:
  - a los gobernantes
  - a los poderes
  lexicon: BDAG
  rationale: Se conserva el término tradicional 'principados' para reflejar la carga cósmica/espiritual frecuente en Pablo, en vez de reducirlo a autoridades humanas; el contexto sigue abierto en la nota.
- source_word: ταῖς ἐξουσίαις
  english_pob_choice: and the authorities
  chosen_spanish: y a las autoridades
  alternatives_spanish:
  - y a los poderes
  - y a las potestades
  lexicon: BDAG
  rationale: '''Autoridades'' reproduce con claridad el segundo término de la pareja paulina y evita uniformar indebidamente con ''poderes'' o ''potestades''.'
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly realms
  chosen_spanish: en los lugares celestiales
  alternatives_spanish:
  - en las regiones celestiales
  - en el ámbito celestial
  lexicon: BDAG
  rationale: Expresión ya estable en español bíblico para la esfera celestial de Efesios; conserva el valor locativo del término sin volverlo demasiado abstracto.
- source_word: διὰ τῆς ἐκκλησίας
  english_pob_choice: through the church
  chosen_spanish: por medio de la iglesia
  alternatives_spanish:
  - a través de la iglesia
  lexicon: BDAG
  rationale: '''Por medio de'' expresa de forma explícita la instrumentalidad de διά con genitivo y resulta idiomático en español.'
- source_word: ἡ πολυποίκιλος σοφία
  english_pob_choice: the manifold wisdom
  chosen_spanish: la sabiduría multiforme
  alternatives_spanish:
  - la sabiduría de múltiples facetas
  - la sabiduría manifold
  lexicon: BDAG
  rationale: '''Multiforme'' comunica la idea de gran variedad y múltiples facetas con tono formal y bíblico; preserva mejor la riqueza semántica de πολυποίκιλος que una simple repetición de ''manifold'' en español.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Genitivo posesivo directo y sin ambigüedad.
theological_decisions:
- issue: Identidad de 'los principados y las autoridades'
  english_pob_reading: Cosmic/spiritual powers are in view, not merely human political leaders.
  chosen_spanish_reading: La traducción mantiene 'principados y autoridades' sin concretar si son seres espirituales, jerarquías cósmicas o poderes humanos, aunque el contexto sugiere una referencia suprahumana.
  alternative_spanish_readings:
  - Autoridades humanas
  - Poderes cósmicos/espirituales
  - Referencia amplia que incluya ambas esferas
  rationale: En Efesios la pareja léxica suele señalar poderes no meramente humanos; sin embargo, el texto español no debe cerrar lo que el griego deja abierto. La nota de contexto preserva esa tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin sobreespecificar; prioridad al original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior anclando cada nota al texto español mediante [a], [b] y [c]. Además, se evitó depender de una traducción mecánica del inglés: se recuperó la formulación española natural para ἵνα, διὰ y ἐν τοῖς ἐπουρανίοις, y se mantuvo la ambigüedad teológica de los poderes mencionados.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ conforme al criterio del proyecto.
  - Se mantiene 'iglesia' para ἐκκλησία sin mayúscula litúrgica innecesaria.
  - '''Principados y autoridades'' conserva el registro paulino tradicional sin borrar el matiz cósmico del contexto.'
  - '''Lugares celestiales'' es coherente con Efesios y evita un calco demasiado anglicado.'
