source:
  edition: SBLGNT
  text: ἵνα γνωρισθῇ νῦν ταῖς ἀρχαῖς καὶ ταῖς ἐξουσίαις ἐν τοῖς ἐπουρανίοις διὰ τῆς ἐκκλησίας ἡ πολυποίκιλος σοφία τοῦ θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/003/010.yaml
  text: so that now[a], through the church, the manifold wisdom of God might be made known to the rulers and the authorities in the heavenly realms[c][b],
  footnotes:
