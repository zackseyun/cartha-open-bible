translation:
  language: es
  text: según el propósito de los siglos, que él realizó en el Mesías[a] Jesús nuestro Señor[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «Cristo»; se traduce «Mesías» aquí porque el término funciona como título.
    reason: lexical_alternative
  - marker: b
    text: O «el propósito eterno». El griego es más literalmente «el propósito de los siglos». También puede entenderse «por medio del Mesías Jesús», ya que la preposición griega es «en», pero en contexto puede tener matiz instrumental.
    reason: combined_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - conforme a
  lexicon: BDAG
  rationale: Con el acusativo πρόθεσιν, κατά expresa conformidad o acuerdo. En español, «según» transmite esa relación de manera natural y fiel, sin añadir una interpretación excesiva.
- source_word: πρόθεσιν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - designio
  lexicon: BDAG
  rationale: πρόθεσις denota una intención deliberada o plan previamente establecido. «Propósito» conserva la idea de intención definida y funciona bien en español bíblico contemporáneo.
- source_word: τῶν αἰώνων
  english_pob_choice: of the ages
  chosen_spanish: de los siglos
  alternatives_spanish:
  - de las edades
  - eterno
  lexicon: BDAG
  rationale: 'La forma griega es literalmente plural: «de los siglos/edades». Se conserva la imagen temporal sin reducirla prematuramente a «eterno», que es una interpretación válida pero más abstracta.'
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: El relativo retoma πρόθεσιν. «Que» es la forma más natural en español para introducir la cláusula relativa sin perder claridad.
- source_word: ἐποίησεν
  english_pob_choice: accomplished
  chosen_spanish: realizó
  alternatives_spanish:
  - cumplió
  - llevó a cabo
  lexicon: BDAG
  rationale: Con «propósito» el verbo apunta a poner en efecto o llevar a cabo ese designio divino. «Realizó» comunica la idea de ejecución/puesta en obra sin convertir el texto en una paráfrasis.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: Se conserva la preposición formal del griego. Aunque existe una lectura instrumental posible, «en» mantiene la tensión del texto y permite que el matiz exacto quede abierto al lector.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: En este contexto, la tradición bíblica española y el flujo natural de la frase favorecen «Cristo» como forma establecida del título/nombre. Se mantiene la equivalencia directa del término griego en una construcción muy fijada en español.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: κύριος se vierte como «Señor», que preserva tanto el uso cristológico como la carga reverente habitual en español bíblico.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  lexicon: BDAG
  rationale: Genitivo posesivo directo que modifica a «Señor».
theological_decisions:
- issue: Cómo reflejar πρόθεσιν τῶν αἰώνων
  english_pob_reading: the eternal purpose / the purpose of the ages
  chosen_spanish_reading: el propósito de los siglos
  alternative_spanish_readings:
  - el propósito eterno
  - el propósito de las edades
  rationale: Se conserva la forma más literal del sintagma griego, sin borrar la tensión entre la expresión temporal plural y su sentido teológico de alcance eterno. «El propósito de los siglos» deja visible el dato del texto y permite que el contexto paulino sostenga la lectura más amplia.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo entender ἐν τῷ Χριστῷ Ἰησοῦ
  english_pob_reading: in the Messiah Jesus / through the Messiah Jesus
  chosen_spanish_reading: en Cristo Jesús
  alternative_spanish_readings:
  - por medio de Cristo Jesús
  - en el Mesías Jesús
  rationale: Se preserva la preposición «en» del griego, evitando resolver de antemano el matiz instrumental. Al mismo tiempo, «Cristo Jesús» es una forma plenamente natural en español y auditable frente al original.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Tratamiento de Χριστός en español
  english_pob_reading: Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: Aunque el audit trail inglés prefirió «Messiah» para resaltar el valor titular, en español la forma más estable y reconocible en este tipo de unión fija con Jesús es «Cristo Jesús». No se pretende negar el trasfondo titular, sino reflejar el uso tradicional ya lexicalizado en español bíblico.
  doctrine_reference: 'Contested terms: Χριστός'
translation_notes:
  revision_awareness: El archivo inglés muestra un historial con una primera revisión que suavizó la expresión hacia «the eternal purpose» y cambió «Messiah Jesus» por «Christ Jesus», seguida de una corrección que restauró «Messiah». La presente propuesta española vuelve al dato más literal del griego («propósito de los siglos») pero usa la forma española plenamente lexicalizada «Cristo Jesús», manteniendo auditable la decisión y sin ocultar el trasfondo titular de Χριστός.
  spanish_consistency_notes:
  - Se conserva el orden natural del español y la puntuación final con coma, en paralelo al cierre del griego.
  - Se mantiene «Jesús» y «Señor» como formas estables y reverentes en español bíblico.
  - La elección de «propósito de los siglos» evita introducir «eterno» en el texto principal, reservando esa equivalencia como alternativa anotada.
  - No se usa «Mesías» en el texto principal para evitar una fórmula menos natural en español dentro de la secuencia fija «Cristo Jesús».
