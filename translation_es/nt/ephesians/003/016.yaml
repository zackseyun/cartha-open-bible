translation:
  language: es
  text: para que él les conceda[a], conforme a las riquezas de su gloria, ser fortalecidos con poder por medio de su Espíritu en el hombre interior,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para la persona interior'. El griego dice 'hombre interior', una expresión singular representativa del ser interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - que
  lexicon: BDAG
  rationale: Introduces el contenido y la finalidad de la petición; en español, 'para que' expresa bien la subordinación final sin perder naturalidad.
- source_word: δῷ
  english_pob_choice: he may grant
  chosen_spanish: les conceda
  alternatives_spanish:
  - les dé
  - les otorgue
  lexicon: BDAG
  rationale: En un contexto de oración, 'conceda' conserva el matiz de favor acordado por petición, más preciso que el genérico 'dar'.
- source_word: κατὰ τὸ πλοῦτος τῆς δόξης αὐτοῦ
  english_pob_choice: according to the riches of his glory
  chosen_spanish: conforme a las riquezas de su gloria
  alternatives_spanish:
  - según las riquezas de su gloria
  - de acuerdo con las riquezas de su gloria
  lexicon: BDAG
  rationale: '''κατά'' con acusativo expresa norma/medida; ''conforme a'' refleja esa relación sin sugerir una mera procedencia parcial. ''Riquezas'' y ''gloria'' conservan el peso teológico del griego.'
- source_word: δυνάμει
  english_pob_choice: with power
  chosen_spanish: con poder
  alternatives_spanish:
  - con la fuerza
  - en poder
  lexicon: BDAG
  rationale: La dative of means/instrument se integra naturalmente en español con 'con poder', preservando la idea de fortalecimiento mediante poder.
- source_word: κραταιωθῆναι
  english_pob_choice: to be strengthened
  chosen_spanish: ser fortalecidos
  alternatives_spanish:
  - ser fortalecidos y hechos fuertes
  - ser robustecidos
  lexicon: BDAG
  rationale: El infinitivo pasivo pide un pasivo en español. 'Ser fortalecidos' es claro y fiel, sin añadir intensificación innecesaria.
- source_word: διὰ τοῦ πνεύματος αὐτοῦ
  english_pob_choice: through his Spirit
  chosen_spanish: por medio de su Espíritu
  alternatives_spanish:
  - por su Espíritu
  - a través de su Espíritu
  lexicon: BDAG
  rationale: '''διά'' con genitivo expresa medio/agency. ''Por medio de'' es explícito y elegante; ''Espíritu'' con mayúscula refleja el referente divino en el contexto paulino.'
- source_word: εἰς τὸν ἔσω ἄνθρωπον
  english_pob_choice: in the inner man
  chosen_spanish: en el hombre interior
  alternatives_spanish:
  - en la persona interior
  - para el hombre interior
  lexicon: BDAG
  rationale: Se conserva la expresión paulina representativa. 'En el hombre interior' reproduce la esfera de la acción y mantiene la formulación tradicional del pasaje; la alternativa 'persona interior' queda para clarificar la referencia inclusiva sin borrar el singular del griego.
theological_decisions:
- issue: Referent of πνεῦμα
  english_pob_reading: his Spirit as the Holy Spirit
  chosen_spanish_reading: su Espíritu como el Espíritu Santo
  alternative_spanish_readings:
  - su espíritu en sentido impersonal
  - su fuerza espiritual
  rationale: El contexto paulino favorece un referente personal divino. Se mantiene 'su Espíritu' y la mayúscula en español indica ese referente sin sobretraducir.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of ἔσω ἄνθρωπον
  english_pob_reading: inner man
  chosen_spanish_reading: hombre interior
  alternative_spanish_readings:
  - persona interior
  - ser interior
  rationale: El griego es masculino singular, pero de valor representativo. 'Hombre interior' preserva la forma de la fuente y su resonancia paulina; la nota permite la alternativa inclusiva sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español. No se añadieron notas sin anclaje. La redacción mantiene la relación final de ἵνα, la medida de κατά, el medio de διά y la expresión paulina ἔσω ἄνθρωπον.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu' con mayúscula para el referente divino implícito en 'su Espíritu'.
  - '''Hombre interior'' conserva la formulación representativa del griego y la tradición paulina, con alternativa inclusiva en nota.'
  - No se usa 'Señor' ni otras sustituciones no requeridas por este versículo.
  - La puntuación sigue el español estándar y la sintaxis es publicable sin calco mecánico.
