translation:
  language: es
  text: A él sea la gloria en la iglesia y en Mesías Jesús por todas las generaciones, por los siglos de los siglos[a]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «por los siglos de los siglos», expresión idiomática de duración sin fin.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτῷ
  english_pob_choice: To him
  chosen_spanish: A él
  alternatives_spanish:
  - Para él
  - A él pertenece
  lexicon: BDAG
  rationale: El dativo en una fórmula doxológica expresa destinación/ascripción. En español, 'A él' conserva la referencia y permite que el sentido doxológico lo complete la cláusula sin introducir una paráfrasis excesiva.
- source_word: ἡ δόξα
  english_pob_choice: be glory
  chosen_spanish: sea la gloria
  alternatives_spanish:
  - le sea la gloria
  - la gloria
  lexicon: BDAG
  rationale: El griego es elíptico. 'Sea la gloria' transmite bien la ascripción implícita en un registro doxológico natural en español, sin perder el sustantivo 'gloria' como equivalente de δόξα.
- source_word: ἐν τῇ ἐκκλησίᾳ
  english_pob_choice: in the church
  chosen_spanish: en la iglesia
  alternatives_spanish:
  - en la asamblea
  - entre la iglesia
  lexicon: BDAG
  rationale: En Pablo, ἐκκλησία designa la comunidad reunida del pueblo de Dios; 'iglesia' es el equivalente español más establecido y fiel aquí. Se mantiene 'en' para conservar la paralela estructura con la frase siguiente.
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Mesías, Jesús
  lexicon: BDAG
  rationale: Χριστός funciona como título, no solo como parte fija del nombre. Siguiendo el criterio del POB de traducir el título, 'Mesías' preserva su sentido semántico en español sin borrar la carga teológica del término.
- source_word: εἰς πάσας τὰς γενεὰς
  english_pob_choice: through all generations
  chosen_spanish: por todas las generaciones
  alternatives_spanish:
  - a través de todas las generaciones
  - para todas las generaciones
  lexicon: BDAG
  rationale: La expresión temporal apunta a extensión continua. 'Por todas las generaciones' comunica esa duración de manera idiomática en español y evita la rigidez de un calco.
- source_word: τοῦ αἰῶνος τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por la eternidad
  lexicon: BDAG
  rationale: Es una fórmula idiomática de duración sin fin. En español bíblico, 'por los siglos de los siglos' es una equivalencia estable y transparente que conserva el tono doxológico y la intensificación semítica/grecolatina.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica tradicional en español, ampliamente reconocida y apropiada al cierre de una doxología.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La política del POB prefiere traducir Χριστός como título cuando el contexto lo permite. 'Mesías' mantiene visible el valor titular y evita convertirlo automáticamente en un nombre fijo sin reflexión textual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
- issue: Fórmula de gloria final y alcance temporal
  english_pob_reading: through all generations forever and ever
  chosen_spanish_reading: por todas las generaciones, por los siglos de los siglos
  alternative_spanish_readings:
  - a través de todas las generaciones, para siempre y para siempre
  rationale: La combinación expresa una duración ilimitada. La formulación española tradicional bíblica comunica mejor la intensidad acumulativa del original que una traducción más literal pero menos natural.
  doctrine_reference: Uso idiomático de fórmulas doxológicas en griego koiné
translation_notes:
  revision_awareness: 'El audit trail inglés osciló entre ''Christ Jesus'' y ''Messiah Jesus''; la corrección posterior restauró ''Messiah'' conforme a la política doctrinal. La versión española sigue esa decisión titulística y ajusta el ritmo para que la doxología fluya naturalmente: ''por todas las generaciones, por los siglos de los siglos''.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός de acuerdo con la preferencia doctrinal del proyecto, en lugar de 'Cristo'.
  - Se conserva el tono doxológico con una estructura ascriptiva natural en español ('A él sea la gloria').
  - Se usa 'iglesia' para ἐκκλησία, término ya establecido en español bíblico y coherente con el contexto paulino.
  - La nota al pie [a] está anclada explícitamente en el texto y explica la equivalencia idiomática de la expresión final.
