translation:
  language: es
  text: Por eso les pido que no se desanimen[a] a causa de mis aflicciones por ustedes,[b] lo cual es su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no desmayen a causa de mis aflicciones por ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los sufrimientos de Pablo en favor de ellos son para su honor dentro del propósito salvador de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto anterior en un español natural y directo, manteniendo la conexión argumentativa sin sonar rígido.
- source_word: αἰτοῦμαι
  english_pob_choice: I ask you
  chosen_spanish: les pido
  alternatives_spanish:
  - les ruego
  - les pido a ustedes
  lexicon: BDAG
  rationale: El verbo introduce una súplica/apelación de Pablo; 'les pido' conserva el tono personal y permite omitir el objeto explícito por estar claro en el contexto.
- source_word: μὴ ἐγκακεῖν
  english_pob_choice: not to lose heart
  chosen_spanish: que no desmayen
  alternatives_spanish:
  - que no se desanimen
  - que no pierdan el ánimo
  - que no se echen atrás
  lexicon: BDAG
  rationale: ἐγκακέω denota perder ánimo o rendirse interiormente; 'desmayen' transmite bien el sentido idiomático en español bíblico contemporáneo sin reducirlo a mera fatiga física.
- source_word: ἐν ταῖς θλίψεσίν μου
  english_pob_choice: because of my afflictions
  chosen_spanish: a causa de mis aflicciones
  alternatives_spanish:
  - por mis aflicciones
  - en mis aflicciones
  - a causa de mis tribulaciones
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente 'en', aquí el valor es ocasionado por/causado por. 'Aflicciones' preserva la fuerza de θλῖψις sin suavizarla, y 'a causa de' comunica la relación causal en español.
- source_word: θλίψεσίν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - sufrimientos
  - problemas
  lexicon: BDAG
  rationale: '''Aflicciones'' es la equivalencia más fiel y seria; mantiene el peso de la palabra griega mejor que términos más leves o más arcaizantes.'
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for your sake
  chosen_spanish: por ustedes
  alternatives_spanish:
  - por el bien de ustedes
  - en favor de ustedes
  - por causa de ustedes
  lexicon: BDAG
  rationale: En español, el matiz de beneficio/representación se expresa con naturalidad como 'por ustedes'. Evita una formulación demasiado explicativa y conserva la simplicidad del original.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: las cuales
  alternatives_spanish:
  - lo cual
  - que
  lexicon: BDAG
  rationale: El relativo femenino plural concuerda con 'aflicciones' y mantiene la referencia al conjunto conceptual, respetando la conexión sintáctica del griego.
- source_word: δόξα ὑμῶν
  english_pob_choice: your glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su honra
  - su gloria
  lexicon: BDAG
  rationale: '''Gloria'' preserva el peso teológico y retórico de δόξα. Se mantiene la relación posesiva de tercera persona plural en español por el referente colectivo de los destinatarios.'
theological_decisions:
- issue: Referente de la cláusula relativa singular/plural y su sentido teológico
  english_pob_reading: The clause refers to Paul's afflictions as constituting the Ephesians' glory.
  chosen_spanish_reading: La cláusula se entiende como referencia a las aflicciones de Pablo en cuanto resultan en la gloria de los destinatarios.
  alternative_spanish_readings:
  - La cláusula se refiere más ampliamente al ministerio y sufrimiento de Pablo en favor de ellos como su gloria.
  - La cláusula identifica las aflicciones mismas como motivo de honra para los destinatarios.
  rationale: 'El antecedente más cercano es ''mis aflicciones'', y el relativo femenino plural singulariza la idea como un todo conceptual. La traducción conserva la ambigüedad útil: no explica más de lo que el texto exige, pero sí deja claro que el sufrimiento apostólico repercute para bien de ellos en el propósito salvífico de Dios.'
  doctrine_reference: Preservar la tensión exegética sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto sigue el sentido y la puntuación del griego SBLGNT y es consistente con el audit trail inglés de la POB. No se introdujeron ajustes de revisión adicionales; se mantuvo la lectura relacional de ἐν como causal/ocasional y la conexión de ἥτις con las aflicciones.
  spanish_consistency_notes:
  - Se usó 'aflicciones' de manera uniforme para θλίψεις, en consonancia con la decisión inglesa.
  - Se prefirió 'gloria' para δόξα, evitando 'honra' para no debilitar la carga teológica del pasaje.
  - Se evitó 'Señor' o terminología de máscara porque el versículo no contiene el nombre divino.
  - El posesivo 'su' en español representa colectivamente a los destinatarios, aunque el griego use ὑμῶν.
