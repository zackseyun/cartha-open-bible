- from: de quien toda familia[a] en los cielos y en la tierra es nombrada
  to: de quien cada familia[a] en los cielos y en la tierra recibe su nombre
  rationale: 'Se cambia «toda familia» por «cada familia» para reflejar con más precisión el valor distributivo de πᾶσα según el expediente del POB. Se ajusta el predicado a «recibe su nombre» para lograr un español más natural conservando la relación léxica con «nombre» y el matiz de procedencia de ἐξ οὗ sin sobrerresolverlo. Se corrige la nota para que preserve las alternativas documentadas por el POB: «toda la familia» como lectura tradicional posible y «toda paternidad ... deriva su nombre» como opción más interpretativa.'
