translation:
  language: es
  text: de quien cada familia[a] en los cielos y en la tierra recibe su nombre
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la familia en los cielos y en la tierra»; o, de manera más interpretativa, «de quien toda paternidad en los cielos y en la tierra deriva su nombre».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξ οὗ
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de quien procede
  - de quien deriva su nombre
  lexicon: BDAG
  rationale: El griego con ἐξ + genitivo expresa origen o procedencia. «De quien» conserva de manera natural esa relación de fuente sin añadir una expansión interpretativa al texto principal.
- source_word: πᾶσα
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - toda la
  lexicon: BDAG
  rationale: Con un sustantivo singular colectivo como πατριά, «toda» reproduce bien el alcance distributivo o total que el inglés POB resolvió con «every». En español evita la dureza de «cada familia» y mantiene abierta la tensión entre grupo total y grupos particulares.
- source_word: πατριὰ
  english_pob_choice: family
  chosen_spanish: familia
  alternatives_spanish:
  - linaje
  - clan
  - paternidad
  lexicon: BDAG
  rationale: «Familia» es el equivalente español más claro y natural para πατριά como grupo familiar o estirpe. «Paternidad» sería demasiado abstracto para el uso principal, aunque la cercanía con πατήρ en el contexto puede sugerir un juego de palabras que no se debe borrar.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el ámbito celestial
  lexicon: BDAG
  rationale: Dado que el griego usa plural, «en los cielos» conserva mejor la forma original y el ámbito celestial como plural de esfera. Aunque el inglés POB suaviza a singular por idiomaticidad, en español la pluralidad es perfectamente natural y más cercana al texto.
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: y en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: «En la tierra» es una locución clara y bíblica en español; se antepone la conjunción para reflejar el paralelismo con «en los cielos». «Sobre la tierra» sería más literal pero menos natural aquí.
- source_word: ὀνομάζεται
  english_pob_choice: is named
  chosen_spanish: es nombrada
  alternatives_spanish:
  - es llamada
  - recibe su nombre
  lexicon: BDAG
  rationale: El pasivo de ὀνομάζω significa propiamente ser nombrado o llamado. «Es nombrada» mantiene la conexión léxica con nombre y evita decidir demasiado pronto por una interpretación explicativa como «recibe su nombre».
theological_decisions:
- issue: 'Alcance de πᾶσα πατριὰ: «cada familia», «toda familia» o «todo el linaje/filiación»'
  english_pob_reading: every family in heaven and on earth is named
  chosen_spanish_reading: toda familia en los cielos y en la tierra es nombrada
  alternative_spanish_readings:
  - cada familia en los cielos y en la tierra es nombrada
  - toda la familia en los cielos y en la tierra es nombrada
  - toda paternidad en los cielos y en la tierra es nombrada
  rationale: La frase mantiene el sentido distributivo general del texto y no convierte el verso en una afirmación de una sola familia colectiva. También preserva el posible juego entre «Padre» del versículo anterior y «familia» aquí sin resolverlo de forma dogmática. La opción «paternidad» existe, pero en español sería más interpretativa y menos transparente como sentido principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto base está en alto acuerdo con el auditor inglés y no requiere revisión sustantiva. La principal decisión de español fue conservar la ambigüedad productiva de πατριά con «familia» y reflejar la pluralidad de οὐρανοῖς con «los cielos», sin mecanizar el singular idiomático del inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en el proyecto, pero aquí no aparece.
  - Se usa «familia» para πατριά de manera consistente con el valor social del término.
  - Se conserva la relación de origen con «de quien» y la referencia al nombre con «es nombrada».
