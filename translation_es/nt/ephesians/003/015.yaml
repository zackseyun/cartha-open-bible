review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἐξ οὗ = «de quien», πατριά = «familia», la ubicación celestial/terrenal, y ὀνομάζεται con sentido de nombrar. Sin embargo, el texto principal se aparta del énfasis distributivo que el POB documentó para πᾶσα al usar «toda familia», que en español suena más genérico/colectivo que «cada familia». Además, la nota invierte dos alternativas del rastro inglés: pone «cada familia» como alternativa y «toda la familia» como otra, cuando el inglés principal eligió «every family» y la alternativa era «the whole family».'
  spanish_quality_summary: «de quien cada familia en los cielos y en la tierra recibe su nombre» suena más natural y claro en español bíblico actual que «es nombrada», y conserva mejor la relación con «nombre». «Es nombrada» no es incorrecto, pero resulta algo rígido. El resto del verso es legible y digno. La nota necesita reajuste para alinear las alternativas con el expediente inglés y evitar confusión.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Familia» para πατριά concuerda con la decisión auditada; no corresponde mover el principal a «paternidad». La revisión mantiene el juego con «Padre» del v. 14 sin sobreinterpretarlo.
  issues:
  - severity: medium
    issue: «toda familia» en el texto principal debilita la decisión auditada «every family»
    rationale: El expediente inglés justificó explícitamente el sentido distributivo de πᾶσα + singular como «every family». En español, «cada familia» expresa mejor ese valor; «toda familia» deja más abierta una lectura genérica o colectiva.
  - severity: medium
    issue: La nota de alternativas no sigue el orden ni el contenido del POB auditado
    rationale: La nota inglesa ofrece como alternativas «the whole family» y «all fatherhood ... derives its name». El borrador español pone «cada familia» como alternativa al principal y añade «toda la familia» como otra, invirtiendo la relación entre lectura principal y alternativa documentada.
  - severity: low
    issue: «es nombrada» es menos idiomático que una formulación con «nombre»
    rationale: Aunque léxicamente defendible, «recibe su nombre» o «deriva su nombre» comunica mejor en español la conexión entre ὀνομάζεται y el origen indicado por ἐξ οὗ. «Recibe su nombre» mantiene la moderación interpretativa mejor que «deriva su nombre» en el texto principal.
