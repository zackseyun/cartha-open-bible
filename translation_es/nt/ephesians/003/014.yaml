lexical_decisions:
- source_word: Τούτου χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - A causa de esto
  - Por este motivo
  lexicon: BDAG
  rationale: La construcción idiomática expresa causa o fundamento del enunciado siguiente. «Por esta razón» conserva la relación discursiva y suena natural en español sin perder el valor explicativo.
- source_word: κάμπτω
  english_pob_choice: I bend
  chosen_spanish: doblo
  alternatives_spanish:
  - doblego
  - bendo
  lexicon: BDAG
  rationale: El verbo significa literalmente «doblar / inclinar». Con el objeto explícito «mis rodillas», «doblo» reproduce la imagen corporal de manera clara y idiomática en español.
- source_word: τὰ γόνατά μου
  english_pob_choice: my knees
  chosen_spanish: mis rodillas
  alternatives_spanish:
  - las rodillas de mí
  lexicon: BDAG
  rationale: Se mantiene el miembro corporal explícito, como en el griego, porque la imagen postural forma parte del sentido del verso.
- source_word: πρὸς
  english_pob_choice: to
  chosen_spanish: ante
  alternatives_spanish:
  - hacia
  - delante de
  lexicon: BDAG
  rationale: En este contexto, con objeto personal en oración, la preposición expresa orientación/dirigirse a. «Ante» comunica bien la postura de oración y evita una rigidez innecesaria; conserva el matiz relacional sin añadir una precisión no exigida por el griego.
- source_word: πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: El contexto de Efesios muestra un referente divino, y en español la mayúscula en «Padre» refleja ese uso titular sin apartarse del sustantivo griego.
theological_decisions:
- issue: Si πατέρα debe entenderse como título divino
  english_pob_reading: the Father
  chosen_spanish_reading: el Padre
  alternative_spanish_readings:
  - el padre
  rationale: La oración paulina está dirigida a Dios, y el contexto inmediato del pasaje desarrolla la paternidad divina. Traducir «el Padre» preserva el sentido teológico del texto y su lectura natural en español.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: El texto griego y el audio textual inglés presentan alta concordancia; no hay revisiones relevantes que requieran marcar variantes en español. La redacción española sigue de cerca el orden y las imágenes del original.
  spanish_consistency_notes:
  - Se prefiere «Padre» con mayúscula cuando el referente es Dios.
  - Se mantiene la imagen corporal de «rodillas» para conservar la concreción del verbo κάμπτω.
  - No se sustituye el valor relacional de πρός por una paráfrasis doctrinal más amplia.
