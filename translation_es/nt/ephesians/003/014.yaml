review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: «Por esta razón» refleja Τούτου χάριν; «mis rodillas» conserva la imagen corporal explícita; «el Padre» transmite correctamente el sentido titular/divino de πατέρα en contexto. La única desviación significativa está en πρὸς, donde «ante» cambia la orientación básica de dirigirse «a/hacia» por una noción más estática de presencia «delante de».'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «doblo mis rodillas ante el Padre» suena algo menos fiel que «doblo mis rodillas al Padre» o «ante el Padre»; entre esas, la opción más fiel al griego y al inglés auditado es «al Padre», aunque en español no es la formulación más común fuera de contexto litúrgico. Aun así, en esta cláusula breve funciona bien y preserva mejor la dirección de la oración.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «el Padre» está bien capitalizado por su referente divino. No hay términos sensibles adicionales. La revisión propuesta ajusta solo la preposición para alinearse mejor con πρὸς y con la decisión léxica inglesa «to».
  issues:
  - severity: medium
    issue: La preposición «ante» para πρὸς introduce un matiz no requerido por el griego.
    rationale: πρὸς con objeto personal aquí expresa dirección/orientación hacia aquel a quien Pablo ora. «Ante» enfatiza estar en presencia de alguien («delante de») más que dirigirse a él. El inglés auditado eligió «to», y «al Padre» conserva mejor esa relación.
  - severity: low
    issue: La justificación léxica de «ante» afirma que no añade precisión no exigida por el griego, pero sí desplaza ligeramente el sentido.
    rationale: Aunque «ante el Padre» es comprensible y devocionalmente natural, la racionalidad documentada en el audit trail favorece una equivalencia direccional más simple.
  revised_spanish_text: Por esta razón doblo mis rodillas al Padre,
  revision_rationale: Se cambia «ante el Padre» por «al Padre» para reflejar con mayor precisión la orientación de πρὸς en contexto de oración, en línea con la evidencia griega y la decisión inglesa «to», sin afectar la naturalidad básica del español.
