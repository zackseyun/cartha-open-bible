translation:
  language: es
  text: que el misterio me fue dado a conocer por revelación[a], como escribí antes brevemente[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'según revelación' o 'mediante revelación'.
    reason: lexical_alternative
  - marker: b
    text: O 'me fue revelado'; el griego dice 'me fue dado a conocer'.
    reason: lexical_alternative
  - marker: c
    text: O 'en breve' o 'en pocas palabras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ ἀποκάλυψιν
  english_pob_choice: by revelation
  chosen_spanish: por revelación
  alternatives_spanish:
  - según revelación
  - a través de revelación
  lexicon: BDAG
  rationale: κατά con acusativo aquí expresa modo o norma; en español, 'por revelación' comunica con naturalidad que el conocimiento llegó mediante una acción reveladora de Dios. 'Según revelación' suena más rígido y puede oscurecer el valor instrumental/misional del giro.
- source_word: ἐγνωρίσθη μοι
  english_pob_choice: was made known to me
  chosen_spanish: me fue dado a conocer
  alternatives_spanish:
  - me fue revelado
  - me fue hecho saber
  lexicon: BDAG
  rationale: El pasivo aoristo de γνωρίζω significa 'dar a conocer' o 'hacer saber'. 'Me fue dado a conocer' conserva el pasivo y evita sobrecargar el texto con un término de revelación ya presente en ἀποκάλυψις. 'Me fue revelado' es posible, pero puede sonar redundante.
- source_word: τὸ μυστήριον
  english_pob_choice: the mystery
  chosen_spanish: el misterio
  alternatives_spanish:
  - el secreto
  - este misterio
  lexicon: BDAG
  rationale: En Pablo, μυστήριον designa un propósito divino antes oculto y ahora revelado. 'Misterio' es el término técnico más fiel y reconocible en español; 'secreto' puede sonar demasiado doméstico o privado.
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: La comparación es simple y enlaza la afirmación presente con lo ya escrito. 'Como' es la forma más natural y directa en español.
- source_word: προέγραψα
  english_pob_choice: I wrote before
  chosen_spanish: antes escribí
  alternatives_spanish:
  - escribí antes
  - escribí previamente
  lexicon: BDAG
  rationale: Aquí προγράφω se refiere a escribir con anterioridad en la misma carta. 'Antes escribí' mantiene la referencia temporal sin añadir matices ajenos.
- source_word: ἐν ὀλίγῳ
  english_pob_choice: briefly
  chosen_spanish: brevemente
  alternatives_spanish:
  - en breve
  - en pocas palabras
  lexicon: BDAG
  rationale: La frase adverbial indica concisión. 'Brevemente' reproduce el sentido idiomático con fluidez moderna en español.
theological_decisions:
- issue: Sentido de μυστήριον en el uso paulino
  english_pob_reading: Retain 'the mystery' as a revealed divine purpose formerly hidden, without paraphrasing its content in the verse itself.
  chosen_spanish_reading: Mantener 'el misterio' como un propósito divino revelado, sin explicar aún su contenido dentro del versículo.
  alternative_spanish_readings:
  - el secreto de Dios
  - el plan oculto de Dios
  rationale: El versículo nombra la categoría teológica, pero no la desarrolla; ampliar su contenido excedería la evidencia inmediata. 'Misterio' preserva la tensión teológica y deja la explicación al contexto cercano.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del texto fuente y del audit trail inglés. No se requirieron revisiones adicionales; se mantuvo la tensión de μυστήριον y el valor pasivo de γνωρίζω sin sobreexplicación.
  spanish_consistency_notes:
  - Se usó 'misterio' para μυστήριον conforme al uso paulino establecido.
  - Se evitó 'SEÑOR' o equivalentes de enmascaramiento porque no aparece el nombre divino en este versículo.
  - La frase final mantiene el adverbio de brevedad y no lo expande a una paráfrasis interpretativa.
  - El orden sintáctico español se ajustó para que la oración sea publicable y natural, sin perder la dependencia de 'como antes escribí brevemente'.
