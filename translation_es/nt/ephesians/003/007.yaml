revisions:
- from: del cual llegué a ser esclavo conforme al don de la gracia de Dios que me fue dada conforme a la eficacia de su poder—
  to: del cual llegué a ser servidor conforme al don de la gracia de Dios que me fue dada conforme a la acción eficaz de su poder—[a]
  rationale: Se cambia «esclavo» por «servidor» para reflejar fielmente διάκονος y la decisión léxica del POB inglés, evitando importar la fuerza de δοῦλος. Se cambia «eficacia» por «acción eficaz» para representar mejor ἐνέργεια como obrar operativo. Se añade la nota alternativa del audit trail inglés en español. El resto del texto preserva adecuadamente la sintaxis y el sentido del original.
