review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura general del borrador sigue bien el griego: «del cual» refleja correctamente οὗ con antecedente neutro; «llegué a ser» representa de forma idiomática ἐγενήθην; «conforme al don de la gracia de Dios ... conforme a ... su poder» conserva las dos frases con κατὰ. Sin embargo, «esclavo» para διάκονος no sigue el audit trail inglés ni el valor léxico contextual aquí, donde se trata de servicio/ministerio funcional, no de δοῦλος. Además, «eficacia» reduce ἐνέργεια a resultado más que al obrar operativo; «acción eficaz» o «obrar» refleja mejor el sustantivo.'
  spanish_quality_summary: 'El español es mayormente natural y legible, pero «esclavo» suena teológicamente y léxicamente desviado en este contexto. También conviene concordar «gracia» con el participio femenino singular: «que me fue dada» es gramaticalmente correcto, aunque toda la cadena suena más fluida como «que me fue dada». La frase mejora mucho con «servidor» y «acción eficaz».'
  glossary_alignment: 'No hay conflicto con los términos base Dios/gracia/poder. El problema principal es terminológico: la preferencia proyectual por «esclavo» aplica cuando el griego es δοῦλος o cuando el audit trail lo documenta con esa fuerza, pero aquí el original usa διάκονος y el POB inglés eligió «servant» precisamente para evitar sobrerreforzar el término. En español, «servidor» o «siervo» preserva mejor esa decisión; «servidor» es el mejor equivalente moderno y no clerical. Se mantiene «Dios» y «gracia» sin cambios.'
  issues:
  - severity: high
    issue: διάκονος fue traducido como «esclavo»
    rationale: El griego dice διάκονος, no δοῦλος. El audit trail inglés documenta «servant» para evitar tanto el oficio eclesiástico como una fuerza servil excesiva. «Esclavo» introduce una carga semántica no presente en este término y altera el matiz de la función de Pablo respecto del evangelio.
  - severity: medium
    issue: ἐνέργεια fue traducido como «eficacia»
    rationale: «Eficacia» expresa más el resultado o la cualidad de ser eficaz que el obrar operativo/actividad efectiva del sustantivo griego. «Acción eficaz» o «obrar» refleja mejor la idea de poder en operación.
  - severity: low
    issue: Falta la nota léxica alternativa preservada por el POB inglés
    rationale: 'El inglés incluyó una nota: «Or ''I was made a minister.''» Conviene conservarla en español porque documenta una alternativa significativa para ἐγενήθην + διάκονος sin alterar el texto principal.'
  revised_spanish_text: del cual llegué a ser servidor conforme al don de la gracia de Dios que me fue dada conforme a la acción eficaz de su poder—[a]
