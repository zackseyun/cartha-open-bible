translation:
  language: es
  text: del cual llegué a ser servidor conforme al don de la gracia de Dios que me fue dada conforme a la acción eficaz de su poder—[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fui hecho ministro»
    reason: alternative_lexical_rendering
lexical_decisions:
- source_word: οὗ
  english_pob_choice: of which
  chosen_spanish: del cual
  alternatives_spanish:
  - de quien
  lexicon: BDAG
  rationale: El relativo genitivo neutro remite al evangelio mencionado en el contexto inmediato, no a una persona. En español, «del cual» conserva esa referencia impersonal y evita masculinizar indebidamente el antecedente.
- source_word: ἐγενήθην
  english_pob_choice: I became
  chosen_spanish: llegué a ser
  alternatives_spanish:
  - fui hecho
  - me hice
  lexicon: BDAG
  rationale: La forma aorista permite un matiz de entrada en un estado/rol. «Llegué a ser» mantiene esa idea de incorporación al ministerio sin imponer de manera explícita una pasiva que el español puede volver pesada.
- source_word: διάκονος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - servidor
  - ministro
  - diácono
  lexicon: BDAG
  rationale: El audit trail inglés eligió «servant» para evitar una lectura institucional de «minister/deacon». En este proyecto, sin embargo, el término POB «esclavo» se usa cuando el griego exige fuerza lexical de servidumbre; aquí la relación de servicio commissioned al evangelio admite ese peso. «Esclavo» preserva la subordinación funcional con más fuerza que «servidor».
- source_word: κατὰ τὴν δωρεὰν
  english_pob_choice: according to the gift
  chosen_spanish: conforme al don
  alternatives_spanish:
  - según el don
  - de acuerdo con el don
  lexicon: BDAG
  rationale: «κατά» con acusativo expresa norma o base. «Conforme a» reproduce bien esa relación de medida/criterio en español y evita un literalismo rígido.
- source_word: τῆς χάριτος τοῦ θεοῦ
  english_pob_choice: of God's grace
  chosen_spanish: de la gracia de Dios
  alternatives_spanish:
  - de la gracia que es de Dios
  - de la gracia divina
  lexicon: BDAG
  rationale: La cadena genitiva se traduce de manera natural y fiel como «de la gracia de Dios», preservando que el don procede y está caracterizado por la gracia divina.
- source_word: τῆς δοθείσης μοι
  english_pob_choice: given to me
  chosen_spanish: que me fue dada
  alternatives_spanish:
  - dada a mí
  - otorgada a mí
  lexicon: BDAG
  rationale: El participio pasivo atributivo conserva la agencia divina. La pasiva perifrástica «me fue dada» expresa claramente que la gracia recibida no es autogenerada.
- source_word: κατὰ τὴν ἐνέργειαν
  english_pob_choice: according to the working
  chosen_spanish: conforme a la eficacia
  alternatives_spanish:
  - según la operación
  - de acuerdo con la acción eficaz
  lexicon: BDAG
  rationale: ἐνέργεια apunta a actividad efectiva, poder en operación. «Eficacia» comunica el carácter activo y eficaz del obrar divino en un español natural.
- source_word: τῆς δυνάμεως αὐτοῦ
  english_pob_choice: of his power
  chosen_spanish: de su poder
  alternatives_spanish:
  - de su fuerza
  - de su potencia
  lexicon: BDAG
  rationale: δύναμις se traduce regularmente como «poder» en contextos paulinos. Mantener este término preserva la resonancia bíblica y evita un registro demasiado físico como «fuerza».
theological_decisions:
- issue: Naturaleza del papel de Pablo en διάκονος
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - servidor
  - ministro
  - diácono
  rationale: El verso describe la función recibida por Pablo en relación con el evangelio, no un oficio eclesiástico posterior. «Esclavo» conserva el sentido de pertenencia y servicio subordinado que el contexto admite, sin introducir la institución de «diácono» como cargo técnico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre la recepción de la gracia y el ministerio
  english_pob_reading: I became ... according to the gift of God's grace given to me according to the working of his power
  chosen_spanish_reading: llegué a ser ... conforme al don ... que me fue dada ... conforme a la eficacia de su poder
  alternative_spanish_readings:
  - fui hecho ...
  - llegué a ser ... según el don ...
  rationale: La pasiva en «me fue dada» deja claro que la gracia y el poder de Dios son la fuente del ministerio de Pablo. Al mismo tiempo, «llegué a ser» evita forzar la sintaxis hacia una pasiva absoluta que no es necesaria en español.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés. Se decidió no introducir una nota alternativa visible para διάκονος porque la elección española ya queda explicitada en las decisiones léxicas; tampoco se añadió puntuación de apoyo que altere el cierre enfático del verso.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «poder» para δύναμις, en línea con el criterio POB.
  - Se conserva la repetición de «conforme a» para reflejar el doble κατὰ del griego.
  - No se usa «Cristo» ni terminología eclesiástica adicional porque no aparecen en el versículo fuente.
  - La forma verbal «me fue dada» preserva la pasividad del participio δοθείσης sin sobrecargar el verso.
