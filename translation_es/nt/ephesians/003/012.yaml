    issue: '''osadía'' para παρρησίαν'
    rationale: Aunque puede sugerir atrevimiento, en español suele connotar imprudencia o descaro. El contexto paulino de acceso a Dios pide más bien 'denuedo', 'franqueza' o similar, en línea con 'boldness' sin contaminarse con el posterior 'confianza'.
  - severity: low
