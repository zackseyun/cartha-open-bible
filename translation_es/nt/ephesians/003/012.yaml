translation:
  language: es
  text: en quien tenemos el denuedo[a] y el acceso con confianza, mediante la fe en él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'franqueza'. El griego παρρησία puede abarcar valor, libertad de expresión y apertura al acercarse.
    reason: lexical_alternative
  - marker: b
    text: O, 'mediante su fidelidad'. La frase griega puede entenderse como fe puesta en él o como su propia fidelidad.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  - en él
  lexicon: BDAG
  rationale: El relativo masculino singular se entiende naturalmente referido al Mesías en el contexto inmediato. En español, 'en quien' conserva la referencia personal y la unión relacional sin volver impersonal la frase.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: osadía
  alternatives_spanish:
  - denuedo
  - franqueza
  - confianza
  lexicon: BDAG
  rationale: La palabra griega puede expresar franqueza, libertad de palabra y valentía al acercarse. 'Osadía' mantiene la fuerza lexical de atrevimiento reverente y evita confundir este término con πεποιθήσει, que se expresa después con 'confianza'.
- source_word: προσαγωγὴν
  english_pob_choice: access
  chosen_spanish: acceso
  alternatives_spanish:
  - entrada
  - acercamiento
  - introducción
  lexicon: BDAG
  rationale: En uso paulino, el término apunta a acceso o entrada a la presencia de Dios. 'Acceso' es la equivalencia más natural y estable en español.
- source_word: ἐν πεποιθήσει
  english_pob_choice: with confidence
  chosen_spanish: con confianza
  alternatives_spanish:
  - en confianza
  - con seguridad
  - con certeza
  lexicon: BDAG
  rationale: La construcción adverbial expresa el modo del acceso y la osadía. 'Con confianza' reproduce bien la idea de seguridad y distingue este matiz del sustantivo παρρησία.
- source_word: διὰ τῆς πίστεως αὐτοῦ
  english_pob_choice: through faith in him
  chosen_spanish: mediante la fe en él
  alternatives_spanish:
  - mediante su fidelidad
  - por la fe en él
  - por medio de su fidelidad
  lexicon: BDAG
  rationale: La frase admite una lectura objetiva ('fe en él') o subjetiva ('su fidelidad'). El texto principal conserva la lectura de fe dirigida a Cristo, mientras que la alternativa de fidelidad queda preservada en la nota. 'Mediante' refleja bien la mediación de la fe sin sonar demasiado rígido.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - su
  - a él
  lexicon: BDAG
  rationale: 'En la lectura principal, αὐτοῦ modifica πίστις como complemento objetivo: ''fe en él''. En español, el pronombre personal en el complemento preposicional evita ambigüedad y mantiene la referencia a Cristo.'
theological_decisions:
- issue: Ambigüedad de διὰ τῆς πίστεως αὐτοῦ
  english_pob_reading: through faith in him
  chosen_spanish_reading: mediante la fe en él
  alternative_spanish_readings:
  - mediante su fidelidad
  - por medio de su fidelidad
  rationale: La construcción griega es genuinamente ambigua y el audit trail inglés preserva esa tensión. La traducción principal sigue la lectura objetiva, coherente con el énfasis en el acceso de los creyentes a Dios; la nota conserva la lectura subjetiva sin excluirla.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for πίστις'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto griego, el audit trail inglés y la revisión más reciente, que no requirió cambios. Se preservó la ambigüedad reconocida en πίστις/αὐτοῦ mediante nota, y se evitó mezclar los matices de παρρησία y πεποίθησις en una sola palabra española.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - '''Fe'' se usó para πίστις según la guía doctrinal; no se recurrió a ''fidelidad'' en el texto principal para no imponer una lectura unilateral.'
  - '''Acceso'' y ''confianza'' se distinguieron para preservar los dos sustantivos griegos παρρησία y προσαγωγή/πεποίθησις.'
  - El pronombre 'él' en la nota se reserva para la lectura objetiva; el cuerpo del texto usa 'en él' para claridad sintáctica en español.
