  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: finalidad (''para que''), Χριστόν como título (''el Mesías''), medio (''por la fe''), ubicación (''en sus corazones'') y los dos participios metafóricos. Sin embargo, ''sobre fundamento'' no refleja bien τεθεμελιωμένοι como participio pasivo coordinado con ἐρριζωμένοι, y la nota b introduce una alternativa no sustentada por el expediente inglés ni por el análisis principal del griego. También conviene explicitar mejor en español la relación de ''en amor'' con los participios.'
  spanish_quality_summary: La redacción es mayormente comprensible, pero 'arraigados y sobre fundamento' suena poco natural y gramaticalmente desigual en español. 'En amor' es aceptable bíblicamente, aunque con 'arraigados y cimentados en amor' fluye mejor y preserva las metáforas agrícola y arquitectónica. Las notas necesitan depuración para evitar confusión innecesaria.
  glossary_alignment: 'Alineado en términos clave: Χριστός → ''el Mesías'', πίστις → ''fe''. No hay conflicto con la terminología del proyecto. La mejora principal es léxica/estilística en τεθεμελιωμένοι → ''cimentados'' en lugar de ''sobre fundamento''.'
  issues:
