  - marker: b
    text: Or 'through trust.' The Greek πίστις can also carry the sense of trust or faithfulness, though 'faith' best fits here.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in love' is most naturally read with 'being rooted and grounded,' though some take it with 'may dwell in your hearts.'
    reason: alternative_reading
