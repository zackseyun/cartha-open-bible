  text: κατοικῆσαι τὸν Χριστὸν διὰ τῆς πίστεως ἐν ταῖς καρδίαις ὑμῶν ἐν ἀγάπῃ· ἐρριζωμένοι καὶ τεθεμελιωμένοι,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/003/017.yaml
  text: so that Messiah may dwell in your hearts through faith[a], being rooted and grounded in love[c][b],
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
