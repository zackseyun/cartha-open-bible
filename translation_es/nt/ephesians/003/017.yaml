translation:
  language: es
  text: para que el Mesías habite en sus corazones por la fe[a], arraigados y cimentados en amor[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por confianza». πίστις también puede tener el matiz de confianza o fidelidad, aunque aquí «fe» es la opción más natural.
    reason: lexical_alternative
  - marker: c
    text: O bien la frase «en amor» puede leerse con «habite en sus corazones», aunque la lectura más natural la une con «arraigados y cimentados».
    reason: alternative_reading
lexical_decisions:
- source_word: κατοικῆσαι
  english_pob_choice: may dwell
  chosen_spanish: habite
  alternatives_spanish:
  - more
  - resida
  - haga su hogar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa finalidad dentro de la oración. En español, «habite» comunica residencia estable de manera natural y fiel; «more» también sería posible, pero «habite» mantiene mejor el matiz de permanencia sin sonar forzado.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como nombre propio. Siguiendo la preferencia del proyecto por traducir el título, «el Mesías» preserva su valor semántico; «Cristo» queda como alternativa idiomática pero menos transparente para el lector español.
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  - por confianza
  lexicon: BDAG
  rationale: La preposición διά con genitivo indica medio o instrumento. «Por la fe» es la forma más natural en español y conserva la decisión doctrinal de tomar πίστις aquí como «fe»; «por confianza» sería posible, pero menos directo.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en sus corazones interiores
  - en lo íntimo de ustedes
  lexicon: BDAG
  rationale: La expresión antropológica apunta al centro interior de la persona. En español, «corazones» reproduce bien el uso bíblico y es claro; «sus» mantiene el plural de segunda persona sin necesidad de un pronombre explícito.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en la amor
  - con amor
  lexicon: BDAG
  rationale: Se conserva la preposición y el sustantivo de forma sobria. La colocación es ambigua en cuanto a su alcance, y el español permite reflejarla sin decidir en exceso; «en amor» puede leerse naturalmente con lo que sigue, como en el contexto inglés auditado.
- source_word: ἐρριζωμένοι
  english_pob_choice: being rooted
  chosen_spanish: arraigados
  alternatives_spanish:
  - siendo arraigados
  - enraizados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa estado resultante. «Arraigados» es idiomático en español y conserva la metáfora agrícola; «enraizados» es cercano, pero «arraigados» suena más natural en la construcción con participio.
- source_word: τεθεμελιωμένοι
  english_pob_choice: grounded
  chosen_spanish: sobre fundamento
  alternatives_spanish:
  - fundados
  - establecidos sobre fundamento
  lexicon: BDAG
  rationale: La metáfora arquitectónica debe quedar visible junto a «arraigados». «Sobre fundamento» conserva la imagen de base sin sobreexplicar; «fundados» sería posible, pero en español puede sonar más abstracto y menos figurativo.
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La política del proyecto favorece traducir Χριστός cuando opera como título. «El Mesías» preserva el contenido titular y evita ocultarlo detrás de una forma ya lexicalizada por la tradición eclesial.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Meaning of πίστις
  english_pob_reading: through faith
  chosen_spanish_reading: por la fe
  alternative_spanish_readings:
  - por confianza
  - por fidelidad
  rationale: Aquí πίστις no presenta la ambigüedad específica de pistis-Christou. Por eso se mantiene el sentido normal de «fe», con alternativas registradas solo como posibilidades léxicas.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
- issue: Attachment of ἐν ἀγάπῃ
  english_pob_reading: taken with 'being rooted and grounded'
  chosen_spanish_reading: tomado con «arraigados y sobre fundamento»
  alternative_spanish_readings:
  - tomado con «habite en sus corazones»
  rationale: La secuencia griega favorece vincular ἐν ἀγάπῃ con los participios siguientes. El español refleja esa decisión con una colocación que mantiene la ambigüedad razonable sin cerrarla prematuramente.
  doctrine_reference: Syntactic reading consistent with English audit trail and Greek punctuation
translation_notes:
  revision_awareness: La traducción auditada en inglés pasó por una oscilación entre «the Messiah» y «Christ» para Χριστός; aquí se sigue la restauración doctrinal de «Messiah» y se traslada al español como «el Mesías». También se tuvo en cuenta la decisión revisada sobre la unión de ἐν ἀγάπῃ con los participios siguientes.
  spanish_consistency_notes:
  - Se mantuvo la terminología proyectual «Mesías» para Χριστός, en lugar de la forma tradicional «Cristo».
  - Se optó por «fe» para πίστις, con nota sobre el matiz alternativo de confianza.
  - La imagen doble «arraigados y sobre fundamento» conserva la metáfora mixta agrícola y arquitectónica del griego.
  - No se introdujo puntuación interpretativa fuerte más allá de lo necesario para la legibilidad en español.
