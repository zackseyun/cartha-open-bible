    issue: '''sobre fundamento'' no traduce fielmente τεθεμελιωμένοι'
    rationale: El griego usa un participio perfecto pasivo paralelo a ἐρριζωμένοι. 'Sobre fundamento' no es participio, rompe el paralelismo y suena incompleto. 'Cimentados' o 'fundamentados' preserva mejor la metáfora arquitectónica y la sintaxis.
  - severity: medium
    issue: La nota b introduce una alternativa ajena al expediente auditado
    rationale: La nota dice que 'por la fe' también puede entenderse como 'en la fe', pero el expediente inglés documenta la alternativa léxica 'trust/faithfulness', no una alternancia preposicional española. Esto puede confundir al lector sobre una ambigüedad que no es la documentada.
  - severity: low
