translation:
  language: es
  text: y sacar a la luz para todos cuál es la administración del misterio oculto desde los siglos en Dios[a], quien creó todas las cosas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mayordomía del misterio» o «el plan del misterio».
    reason: lexical_alternative
  - marker: b
    text: O «oculto por los siglos» o, de manera más interpretativa, «oculto desde la eternidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: φωτίσαι
  english_pob_choice: to bring to light
  chosen_spanish: iluminar
  alternatives_spanish:
  - traer a la luz
  - dar a conocer
  - alumbrar
  lexicon: BDAG
  rationale: El infinitivo mantiene la idea de iluminación como metáfora. «Iluminar» es natural en español y conserva mejor el matiz que un simple «dar a conocer»; «traer a la luz» sería más literal pero menos fluido en esta oración.
- source_word: πάντας
  english_pob_choice: for everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a todas las personas
  - para todos
  - para cada uno
  lexicon: BDAG
  rationale: El griego expresa alcance universal. En español, «a todos» funciona con el infinitivo de propósito y mantiene la amplitud sin forzar una glosa explicativa.
- source_word: τίς ἡ οἰκονομία
  english_pob_choice: what is the administration
  chosen_spanish: cuál es la administración
  alternatives_spanish:
  - cuál es la mayordomía
  - cuál es el plan
  - cuál es la administración de
  lexicon: BDAG
  rationale: Se conserva la pregunta indirecta «cuál es» y «administración» para reflejar el sentido de gestión/ordenamiento del término. «Mayordomía» es posible, pero en español puede sonar más eclesial y desplazar el matiz administrativo.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: «Misterio» es el equivalente normal en el uso paulino y preserva la carga teológica de algo antes oculto y ahora revelado. «Secreto» es viable, pero perdería esa resonancia establecida.
- source_word: ἀποκεκρυμμένου
  english_pob_choice: hidden
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - tenido oculto
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un estado resultante de haber sido escondido. «Escondido» es claro y idiomático en español; «oculto» también sería posible, pero «escondido» mantiene bien la imagen de ocultamiento.
- source_word: ἀπὸ τῶν αἰώνων
  english_pob_choice: from the ages
  chosen_spanish: desde los siglos
  alternatives_spanish:
  - desde las eras
  - desde la eternidad
  - por los siglos
  lexicon: BDAG
  rationale: Se conserva la referencia a «los siglos» para no convertirla interpretativamente en «la eternidad». Esto mantiene la tensión temporal del griego y su referencia a la larga duración de la ocultación.
- source_word: ἐν τῷ θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - con Dios
  lexicon: BDAG
  rationale: La preposición se traduce de manera directa para preservar la localización relacional del misterio. «Con Dios» suavizaría indebidamente el sentido.
- source_word: τῷ τὰ πάντα κτίσαντι
  english_pob_choice: who created all things
  chosen_spanish: quien creó todas las cosas
  alternatives_spanish:
  - el que creó todas las cosas
  - quien hizo todas las cosas
  lexicon: BDAG
  rationale: La cláusula relativa expresa la identificación de Dios como creador. «Creó todas las cosas» reproduce con fidelidad τὰ πάντα κτίσαντι y evita debilitar κτίζω con un «hacer» genérico.
theological_decisions:
- issue: Sentido de οἰκονομία
  english_pob_reading: administration
  chosen_spanish_reading: administración
  alternative_spanish_readings:
  - mayordomía
  - plan
  rationale: Se mantiene el valor de gestión u ordenamiento divino sin imponer una lectura técnica posterior. «Administración» retiene el alcance concreto y la relación con el despliegue del misterio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance temporal de ἀπὸ τῶν αἰώνων
  english_pob_reading: from the ages
  chosen_spanish_reading: desde los siglos
  alternative_spanish_readings:
  - desde la eternidad
  - por los siglos
  rationale: La traducción conserva el plural temporal del griego y evita cerrar la expresión con una equivalencia más interpretativa como «desde la eternidad».
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión inglesa más reciente permanece sin cambios; el borrador español sigue esa lectura estable y conserva las dos tensiones léxicas principales: οἰκονομία como «administración» y ἀπὸ τῶν αἰώνων como «desde los siglos», sin cerrar interpretativamente la temporalidad.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «misterio» para μυστήριον.
  - Se usa un estilo sobrio y publicable, evitando calcos excesivamente duros.
  - Se conserva la metáfora de iluminación con un verbo natural en español.
  - No se introduce «Mesías» ni «SEÑOR» porque este verso no lo requiere.
