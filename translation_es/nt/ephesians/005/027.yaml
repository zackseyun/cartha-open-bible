    text: O «sin mancha».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el núcleo verbal para reflejar con precisión el griego: Cristo presenta a la iglesia, no se presenta a sí mismo. También se ajusta ἑαυτῷ a ''a sí mismo'' para preservar la fuerza reflexiva documentada por el POB inglés. ''En esplendor'' mejora la naturalidad y alinea mejor con ''in splendor'', manteniendo la alternativa ''gloriosa'' en nota. El resto del versículo se conserva porque transmite bien la imaginería de pureza y santidad.'
