translation:
  language: es
  text: para que él mismo presente a la iglesia a sí mismo en esplendor[a], sin mancha ni arruga ni cosa semejante[b], sino para que sea santa y sin defecto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «gloriosa»: el adjetivo griego puede entenderse como cualidad («gloriosa») o como estado («en esplendor»).'
    reason: lexical_alternative
  - marker: b
    text: O «o cualquier cosa semejante».
    reason: lexical_alternative
  - marker: c
    text: O «sin mancha».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραστήσῃ
  english_pob_choice: might present
  chosen_spanish: presentarse
  alternatives_spanish:
  - presentar
  - poner delante de
  lexicon: BDAG
  rationale: Con ἵνα + subjuntivo aoristo, el valor de propósito se mantiene bien con un infinitivo reflexivo natural en español. 'Presentarse' conserva la idea de poner a la iglesia en una relación formal de comparecencia, sin perder la imagen nupcial/purificadora.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. 'Él mismo' conserva ese énfasis en español y evita diluir la fuerza del sujeto.
- source_word: ἑαυτῷ
  english_pob_choice: to himself
  chosen_spanish: ante sí
  alternatives_spanish:
  - para sí
  - a sí mismo
  lexicon: BDAG
  rationale: El dativo reflexivo expresa relación con el mismo sujeto. 'Ante sí' comunica con naturalidad la idea de comparecencia o presentación personal, manteniendo la referencia reflexiva sin sonar artificial.
- source_word: ἔνδοξον
  english_pob_choice: in splendor
  chosen_spanish: en gloria
  alternatives_spanish:
  - gloriosa
  - espléndida
  - en esplendor
  lexicon: BDAG
  rationale: El adjetivo describe el estado en que la iglesia es presentada. 'En gloria' refleja bien la cualidad resultante en español bíblico contemporáneo y mantiene abierta la alternativa semántica entre cualidad ('gloriosa') y estado ('en gloria').
- source_word: ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  lexicon: BDAG
  rationale: En este contexto paulino, ἐκκλησία designa al pueblo de Dios corporativamente. 'La iglesia' es la equivalencia estable y apropiada en español.
- source_word: μὴ ἔχουσαν
  english_pob_choice: not having
  chosen_spanish: sin
  alternatives_spanish:
  - no teniendo
  - no teniendo en ella
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva la estructura participial, en español 'sin' resulta más natural y comunica la condición descrita sin añadir interpretación.
- source_word: σπίλον
  english_pob_choice: spot
  chosen_spanish: mancha
  alternatives_spanish:
  - marca
  - roña
  - defecto
  lexicon: BDAG
  rationale: '''Mancha'' es un equivalente natural para la imagen de pureza y funciona bien con la serie de defectos visibles que sigue.'
- source_word: ῥυτίδα
  english_pob_choice: wrinkle
  chosen_spanish: arruga
  alternatives_spanish:
  - pliegue
  - línea
  lexicon: BDAG
  rationale: '''Arruga'' es el equivalente directo y mantiene la imagen corporal/estética del pasaje.'
- source_word: ἤ τι τῶν τοιούτων
  english_pob_choice: or anything like that
  chosen_spanish: ni cosa semejante
  alternatives_spanish:
  - ni nada de eso
  - ni algo semejante
  - ni cualquier cosa parecida
  lexicon: BDAG
  rationale: La frase griega amplía la negación más allá de los dos ejemplos. 'Ni cosa semejante' reproduce bien esa ampliación en un español fluido y reverente.
- source_word: ἀλλ’ ἵνα ᾖ
  english_pob_choice: but so that she might be
  chosen_spanish: sino para que sea
  alternatives_spanish:
  - sino que sea
  - más bien para que sea
  lexicon: BDAG
  rationale: La segunda cláusula de ἵνα expresa el objetivo positivo. 'Sino para que sea' conserva la relación adversativa y final, y suena natural en español bíblico.
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - consagrada
  lexicon: BDAG
  rationale: '''Santa'' es el equivalente habitual y teológicamente robusto para ἁγία en este contexto.'
- source_word: ἄμωμος
  english_pob_choice: blameless
  chosen_spanish: sin defecto
  alternatives_spanish:
  - irreprensible
  - sin mancha
  - sin culpa
  lexicon: BDAG
  rationale: '''Sin defecto'' traduce con claridad la idea de ausencia de mancha o imperfección. En combinación con ''mancha'' evita repetir exactamente la misma imagen y conserva la tensión entre pureza visible e integridad moral.'
theological_decisions:
- issue: Emphatic and reflexive presentation of the church
  english_pob_reading: he himself...to himself
  chosen_spanish_reading: él mismo...ante sí
  alternative_spanish_readings:
  - él mismo...para sí
  - él...ante sí
  rationale: El griego enfatiza tanto al sujeto como la relación reflexiva. La redacción española conserva esa tensión sin explicarla de más ni convertirla en una presentación meramente genérica.
  doctrine_reference: Preservar la tensión literaria y teológica del texto; no resolverla artificialmente.
- issue: Purity imagery combined with holiness language
  english_pob_reading: in splendor, not having spot or wrinkle..., but...holy and blameless
  chosen_spanish_reading: en gloria, sin mancha ni arruga ni cosa semejante, sino para que sea santa y sin defecto
  alternative_spanish_readings:
  - en esplendor, sin mancha ni arruga..., sino para que sea santa y sin mancha
  - gloriosa, sin defecto...
  rationale: La versión mantiene las imágenes concretas de pureza corporal/visual y las une con la santidad moral final. 'Sin defecto' evita colapsar todo en una sola metáfora y deja visible la doble dimensión del pasaje.
  doctrine_reference: Equivalencia óptima; preservar la tensión imagética y moral.
translation_notes:
  revision_awareness: Se ha revisado la clausula de ἔνδοξον para permitir la alternativa entre adjetivo de cualidad y estado; también se ha conservado la ampliación indefinida de ἤ τι τῶν τοιούτων y la posibilidad léxica de ἄμωμος como «sin mancha» en nota, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'iglesia' para ἐκκλησία en coherencia paulina.
  - Se mantiene 'santa' para ἁγία y 'sin defecto' para ἄμωμος, reservando 'sin mancha' como alternativa anotada.
  - Se evita 'SEÑOR' porque este versículo no contiene κύριος ni alude directamente al nombre divino.
