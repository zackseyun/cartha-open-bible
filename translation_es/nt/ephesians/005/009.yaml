revisions:
- from: porque el fruto de la luz consiste en toda bondad, justicia[a] y verdad[b][c].
  to: porque el fruto de la luz[b] se halla[c] en toda bondad, rectitud[a] y verdad.
  rationale: Se revisa «consiste en» a «se halla en» para reflejar ἐν sin introducir una interpretación composicional más fuerte que el griego. Se cambia «justicia» a «rectitud» en el texto principal para representar mejor δικαιοσύνη en esta tríada ética, conservando «justicia» como alternativa significativa en nota. También se recolocan las notas en los puntos léxicos pertinentes.
