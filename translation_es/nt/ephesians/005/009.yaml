translation:
  language: es
  text: porque el fruto de la luz[b] se halla[c] en toda bondad, rectitud[a] y verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». La palabra griega puede abarcar ambos sentidos en Pablo.
    reason: lexical_alternative
  - marker: b
