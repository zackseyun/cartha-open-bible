lexical_decisions:
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce una explicación del mandato anterior; «porque» comunica con naturalidad la relación causal/expositiva en español y mantiene el valor de fundamento del griego.
- source_word: καρπὸς
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - resultado
  - producto
  lexicon: BDAG
  rationale: Conserva la metáfora paulina del «fruto» para las cualidades morales producidas, sin reducirla a un mero resultado abstracto.
- source_word: τοῦ φωτός
  english_pob_choice: of the light
  chosen_spanish: de la luz
  alternatives_spanish:
  - de la luz divina
  - de la luz
  lexicon: BDAG
  rationale: La forma genitiva se expresa de modo directo. «La luz» mantiene el artículo y deja abierta la referencia contextual a la identidad de los creyentes como luz en el Señor.
- source_word: ἐν
  english_pob_choice: is in
  chosen_spanish: consiste en
  alternatives_spanish:
  - está en
  - se manifiesta en
  lexicon: BDAG
  rationale: En este contexto ἐν señala esfera o manifestación. «Consiste en» evita una locución demasiado locativa en español y refleja bien el sentido de que el fruto se expresa en esas cualidades.
- source_word: πάσῃ
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda
  - cada
  lexicon: BDAG
  rationale: Con sustantivos abstractos en singular, el valor es comprehensivo. «Toda» suena natural con la serie coordinada y preserva la amplitud del término.
- source_word: ἀγαθωσύνῃ
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - bien
  - benevolencia
  lexicon: BDAG
  rationale: El término denota bondad moral y beneficencia. «Bondad» es la equivalencia más clara y natural en español para este contexto.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - justicia
  - rectitud
  lexicon: BDAG
  rationale: Aunque la pauta general favorece «justicia» para δικαιοσύνη, en español aquí encaja mejor dentro de la tríada ética «bondad, justicia y verdad», sin perder el alcance moral y relacional del término paulino.
- source_word: ἀληθείᾳ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdad
  - veracidad
  lexicon: BDAG
  rationale: '«Verdad» preserva el sentido amplio del término: conformidad con la realidad y sinceridad moral.'
theological_decisions:
- issue: 'Variante textual en el sustantivo genitivo: φωτός vs. πνεύματος'
  english_pob_reading: the fruit of the light
  chosen_spanish_reading: el fruto de la luz
  alternative_spanish_readings:
  - el fruto del Espíritu
  rationale: El texto base SBLGNT lee φωτός («luz»), coherente con el contexto inmediato de andar como hijos de luz. La variante «Espíritu» debe mantenerse como nota, no sustituir la lectura base.
  doctrine_reference: Primacía del texto original base; preservar variantes manuscritas significativas en nota.
- issue: δικαιοσύνη en el contexto paulino
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - justicia
  - rectitud
  rationale: En esta enumeración ética, «justicia» comunica bien la cualidad moral exigida por el contexto y conserva la amplitud semántica de δικαιοσύνη. Se evita imponer una terminología eclesiástica más estrecha.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη admite «justicia» y, según contexto, «rectitud»; la traducción debe conservar la tensión semántica cuando sea relevante.'
- issue: Valor de ἐν con lista de cualidades
  english_pob_reading: is in
  chosen_spanish_reading: consiste en
  alternative_spanish_readings:
  - está en
  - se manifiesta en
  rationale: La preposición expresa esfera o manifestación, no simple localización. «Consiste en» comunica mejor la relación entre el fruto y las cualidades enumeradas sin forzar una lectura espacial.
  doctrine_reference: 'Principio de equivalencia óptima: preservar función semántica antes que calco preposicional.'
translation_notes:
  revision_awareness: El contexto inglés pasó de una formulación más libre («consists in») a una más cercana al griego («is in»). En español, sin embargo, «consiste en» sigue siendo la opción más natural y fiel para expresar la función de ἐν como esfera/manifestación, por lo que se mantiene una equivalencia óptima en lugar de un calco mecánico. Se conserva además la variante manuscrita de φωτός/πνεύματος en nota, y la ambigüedad de δικαιοσύνη se hace visible con una nota léxica.
  spanish_consistency_notes:
  - Se usa «luz» para φωτός siguiendo el texto base, no «Espíritu», que queda reservado a la variante manuscrita.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el versículo.
  - «Bondad, justicia y verdad» mantiene una tríada ética clara y publicable en español contemporáneo.
  - La puntuación con coma final antes del cierre refleja el estilo del griego, pero se adapta a la norma española con punto final solo en el versículo completo.
