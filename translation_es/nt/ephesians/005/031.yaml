translation:
  language: es
  text: Por esta razón un hombre dejará a su padre y a su madre y se unirá a su esposa[a], y los dos llegarán a ser una sola carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos idiomáticamente: «A causa de esto». La frase griega ἀντὶ τούτου funciona aquí como un conector causal en la cita de Génesis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ τούτου
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - A causa de esto
  - Por eso
  - En lugar de esto
  lexicon: BDAG
  rationale: La frase funciona aquí como conector causal/resultativo en la cita de Génesis, no como sustitución literal. «Por esta razón» conserva el valor discursivo y suena natural en español formal.
- source_word: καταλείψει
  english_pob_choice: will leave
  chosen_spanish: dejará
  alternatives_spanish:
  - abandonará
  - se apartará de
  - desamparará
  lexicon: BDAG
  rationale: El futuro de καταλείπω expresa dejar la casa paterna para formar una nueva unión. «Dejará» es directo y suficientemente formal, sin introducir la dureza de «abandonará».
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: En este contexto matrimonial, ἄνθρωπος señala al varón que se casa con «su esposa». «Un hombre» mantiene esa precisión de género conforme al sentido del pasaje.
- source_word: πατέρα ... μητέρα
  english_pob_choice: his father and mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a su padre y su madre
  - a su padre y a la madre
  lexicon: BDAG
  rationale: El español puede repetir el posesivo para claridad y ritmo, sin forzar la frase. Se mantiene el parentesco doble de manera natural.
- source_word: προσκολληθήσεται
  english_pob_choice: be joined to
  chosen_spanish: se unirá a
  alternatives_spanish:
  - se pegará a
  - quedará unido a
  - se adherirá a
  lexicon: BDAG
  rationale: El verbo expresa una unión estrecha y vinculante. «Se unirá a» preserva la fuerza relacional del hebreo subyacente y la formulación bíblica tradicional sin sonar mecánico.
- source_word: τῇ γυναικὶ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa propia
  lexicon: BDAG
  rationale: Aunque γυνή puede significar «mujer», aquí el contexto es matrimonial. «Esposa» explicita correctamente la relación con un registro sobrio.
- source_word: ἔσονται οἱ δύο
  english_pob_choice: the two will become
  chosen_spanish: los dos serán
  alternatives_spanish:
  - los dos llegarán a ser
  - los dos se volverán
  lexicon: BDAG
  rationale: El griego dice literalmente «serán», y en español esta forma conserva bien la unión resultante sin necesidad de suplir un verbo interpretativo. «Los dos» mantiene el énfasis del original.
- source_word: εἰς σάρκα μίαν
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - un solo cuerpo
  lexicon: BDAG
  rationale: Se conserva «carne» porque σάρξ aquí pertenece a la fórmula bíblica de la unión matrimonial, no a un uso paulino de «naturaleza humana» o «pecado». «Una sola carne» reproduce la expresión establecida con claridad en español.
theological_decisions:
- issue: Conector causal en la cita de Génesis
  english_pob_reading: For this reason
  chosen_spanish_reading: Por esta razón
  alternative_spanish_readings:
  - Porque de esto
  - A causa de esto
  - Por eso
  rationale: La cita formula una consecuencia causal de lo dicho antes. «Por esta razón» deja explícita la relación lógica sin convertir el texto en una paráfrasis.
  doctrine_reference: Génesis 2:24; Efesios 5:31
- issue: Lenguaje de género en la unión matrimonial
  english_pob_reading: a man ... his wife
  chosen_spanish_reading: un hombre ... su esposa
  alternative_spanish_readings:
  - una persona ... su cónyuge
  - alguien ... su pareja
  rationale: El pasaje cita una formulación masculina-femenina concreta. La traducción conserva esa especificidad sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de σάρξ en la fórmula final
  english_pob_reading: one flesh
  chosen_spanish_reading: una sola carne
  alternative_spanish_readings:
  - un solo cuerpo
  - una sola entidad
  rationale: Aquí σάρξ es lenguaje covenantal/corporal de Génesis; traducirlo como «carne» preserva la frase bíblica y evita una reinterpretación teológica ajena al contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no se requieren cambios respecto del texto auditado en inglés; por eso la redacción española se alineó estrechamente con la decisión ya aprobada y se preservó la equivalencia óptima sin añadir novedades interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usó «carne» para σάρξ por tratarse de la fórmula matrimonial de Génesis 2:24, no de un uso metafórico paulino.
  - Se eligió «esposa» en lugar de «mujer» para clarificar el contexto marital en español sin perder fidelidad.
  - La estructura verbal «serán una sola carne» conserva la cadencia bíblica y el valor resultativo del griego.
