translation:
  language: es
  text: sometiéndose los unos a los otros en el temor del Mesías[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en reverencia por el Mesías» o «en asombro ante el Mesías».
    reason: alternative_reading
  - marker: b
