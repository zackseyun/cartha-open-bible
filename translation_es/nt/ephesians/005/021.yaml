lexical_decisions:
- source_word: ὑποτασσόμενοι
  english_pob_choice: submitting
  chosen_spanish: sometiéndose
  alternatives_spanish:
  - sujetándose
  - estando sujetos
  lexicon: BDAG
  rationale: El participio presente medio/pasivo en contexto depende de la exhortación previa y conserva valor de acción continua. «Sometiéndose» mantiene el participio y el matiz de actitud/acción en curso sin volverlo innecesariamente reflexivo o pesado en español.
- source_word: ἀλλήλοις
  english_pob_choice: to one another
  chosen_spanish: los unos a los otros
  alternatives_spanish:
  - unos a otros
  - entre sí
  lexicon: BDAG
  rationale: La forma recíproca en dativo plural pide un equivalente igualmente recíproco. «Los unos a los otros» es claro, idiomático y conserva la relación mutua explícita del griego.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - con
  - por
  lexicon: BDAG
  rationale: «En» reproduce la esfera o modo expresado por la preposición con φόβῳ y evita añadir una relación causal o instrumental que no está explicitada en el texto.
- source_word: φόβῳ
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - reverencia
  - awe
  - respeto reverente
  lexicon: BDAG
  rationale: Se conserva el núcleo semántico de φόβος con «temor», porque el término puede abarcar temor reverente y no conviene suavizarlo demasiado en el texto principal. «Reverencia» o «respeto reverente» pueden servir como explicación interpretativa, pero no reemplazan bien la tensión lexical del término.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí con fuerza titular, por lo que se traduce como «Mesías» según la política terminológica del proyecto. En español, «el Mesías» preserva el valor de título y evita convertirlo en un mero nombre propio tradicional.
theological_decisions:
- issue: Sentido de «temor del Mesías»
  english_pob_reading: 'objective genitive: reverent fear directed toward the Messiah'
  chosen_spanish_reading: temor reverente dirigido al Mesías
  alternative_spanish_readings:
  - temor causado por el Mesías
  - respeto hacia el Mesías
  rationale: La construcción se entiende mejor como temor reverente dirigido a Cristo/Mesías, no como miedo servil ni como mera cortesía. Mantener «temor» en el texto preserva la fuerza del original y deja abierta la lectura reverente sin diluirla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
- issue: Traducción de Χριστοῦ como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la directriz del proyecto: Χριστός se traduce normalmente como «Mesías» cuando actúa como título. La alternativa tradicional «Cristo» queda como posible equivalencia idiomática, pero no se adopta en el texto principal.'
  doctrine_reference: Χριστός → Mesías cuando funciona como título; Cristo cuando es nombre-forma.
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «the Messiah» y «Christ», con corrección regresiva final a «Messiah» para respetar la política terminológica. La versión española sigue esa decisión final y mantiene el matiz de φόβος sin suavizarlo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Mesías» en lugar de «Cristo» para Χριστοῦ, en coherencia con la política terminológica del proyecto.
  - Se usa «temor» en el texto principal y se explicitan alternativas más suaves en nota, para no borrar la tensión lexical de φόβος.
  - La estructura participial se conserva con «sometiéndose», evitando una paráfrasis más interpretativa.
