translation:
  language: es
  text: Y no participen en las obras infructuosas de las tinieblas[a], sino más bien sáquenlas a la luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compartan con» o «tengan comunión con».
    reason: lexical_alternative
  - marker: b
    text: O «repréndanlas». El griego puede incluir corrección verbal, pero en este contexto también implica sacar esas obras al descubierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκοινωνεῖτε
  english_pob_choice: participate in
  chosen_spanish: participen en
  alternatives_spanish:
  - compartan con
  - tengan comunión con
  - sean partícipes de
  lexicon: BDAG
  rationale: El verbo expresa participación conjunta o complicidad activa. «Participen en» conserva ese sentido directo y natural en español, sin reducirlo a mera relación social ni cargarlo con una formulación eclesiástica más estrecha.
- source_word: ἔργοις
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras
  lexicon: BDAG
  rationale: «Obras» reproduce bien el vocabulario moral paulino y mantiene la continuidad semántica con el inglés POB y con el campo léxico de conducta/acciones.
- source_word: ἀκάρποις
  english_pob_choice: unfruitful
  chosen_spanish: infructuosas
  alternatives_spanish:
  - sin fruto
  - estériles
  - no fructíferas
  lexicon: BDAG
  rationale: «Infructuosas» refleja con fidelidad la imagen agrícola del griego y conserva el contraste moral con la fecundidad de la vida en la luz. Es más elegante y preciso que «sin fruto» en este contexto.
- source_word: σκότους
  english_pob_choice: of darkness
  chosen_spanish: de las tinieblas
  alternatives_spanish:
  - de la oscuridad
  - propias de las tinieblas
  - de tinieblas
  lexicon: BDAG
  rationale: El genitivo se vierte de modo directo como «de las tinieblas», conservando el valor metafórico y moral. «Tinieblas» es un registro bíblico natural en español y mantiene el contraste con la luz del contexto.
- source_word: μᾶλλον δὲ καὶ
  english_pob_choice: but instead even
  chosen_spanish: sino más bien
  alternatives_spanish:
  - pero más bien
  - antes bien
  - sino incluso
  lexicon: BDAG
  rationale: La combinación marca contraste y refuerzo. En español, «sino más bien» comunica con claridad el giro adversativo y evita una construcción forzada; el matiz intensificador queda implícito y se apoya en el contexto exhortativo.
- source_word: ἐλέγχετε
  english_pob_choice: expose
  chosen_spanish: exhótenlas
  alternatives_spanish:
  - repréndanlas
  - reprueben esas obras
  - sáquenlas a la luz
  lexicon: BDAG
  rationale: El verbo puede significar reprender, refutar o poner al descubierto. En este contexto, la idea central es sacar a la luz y denunciar públicamente esas obras; «exhótenlas» intenta conservar la fuerza de exposición moral, aunque la forma es poco usada. Se elige para no reducir el mandato a una simple corrección verbal. La referencia plural femenina concuerda con «obras».
theological_decisions:
- issue: Alcance de ἐλέγχετε en relación con las obras de las tinieblas
  english_pob_reading: expose them
  chosen_spanish_reading: exhótenlas
  alternative_spanish_readings:
  - repréndanlas
  - reprueben esas obras
  - sáquenlas a la luz
  rationale: El contexto inmediato de Efesios 5 vincula tinieblas, luz y manifestación. Por eso la traducción debe expresar tanto denuncia como desvelamiento, no solo corrección verbal. La forma elegida busca preservar esa tensión, aunque sea menos común en español.
  doctrine_reference: Translation philosophy §3, §6
- issue: 'Fuerza del mandato doble: abstención y oposición activa'
  english_pob_reading: do not participate ... but instead even expose
  chosen_spanish_reading: no participen ... sino más bien exhótenlas
  alternative_spanish_readings:
  - no compartan ... sino más bien repréndanlas
  - no tengan comunión ... sino antes bien sáquenlas a la luz
  rationale: La cláusula no solo prohíbe complicidad, sino que ordena una respuesta activa frente al mal. La traducción conserva ese doble movimiento sin especificar un medio más allá de lo que el griego permite.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no requieren revisión sustantiva. La principal tensión traductológica está en ἐλέγχετε, donde el inglés POB opta por «expose» para preservar el motivo de luz/oscuridad; la versión española intenta mantener esa misma decisión interpretativa sin recurrir a un calco demasiado áspero, aunque con una forma verbal menos frecuente.
  spanish_consistency_notes:
  - Se mantiene «tinieblas» para el campo metafórico de oscuridad moral, en coherencia con el lenguaje bíblico común y con el valor del genitivo τοῦ σκότους.
  - Se usa un imperativo plural de segunda persona formal implícita por concordancia («participen», «exhótenlas») para un registro bíblico reverente y panhispánico.
  - No se sustituye «obras» por un sinónimo más interpretativo como «actos» o «hechos», para conservar la continuidad paulina.
  - La decisión sobre ἐλέγχετε evita reducir el mandato a mera reprensión verbal; el sentido de exposición pública permanece en la nota de pie de página.
