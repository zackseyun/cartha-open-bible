review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del verso está bien alineada con el griego y con el POB inglés: «no participen en», «las obras infructuosas», y «de las tinieblas» reflejan adecuadamente συγκοινωνεῖτε, ἔργοις ἀκάρποις, y τοῦ σκότους. Sin embargo, el verbo final ἐλέγχετε no está fielmente representado por «exhótenlas», que en español significa animar o instar, no exponer, reprender ni sacar a la luz. Esto altera el mandato principal del verso y rompe la decisión léxica/theológica documentada en inglés.'
  spanish_quality_summary: El borrador es mayormente legible y de registro bíblico natural. «Infructuosas» y «tinieblas» funcionan bien. Pero «exhótenlas» no solo es poco natural en este contexto; además comunica un sentido equivocado. Una reparación pequeña y suficiente es usar «sáquenlas a la luz», que suena natural en español, preserva el vínculo contextual con luz/tinieblas, y coincide con la rationale del POB inglés.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. La corrección necesaria es específicamente sobre ἐλέγχετε: debe reflejar exponer/reprender, no exhortar. Las notas pueden conservar las alternativas «repréndanlas» y explicar el matiz de «sacar a la luz».'
  issues:
  - severity: high
    issue: «Exhótenlas» traduce incorrectamente ἐλέγχετε
    rationale: ἐλέγχω significa exponer, reprender, poner en evidencia, convencer de culpa. «Exhortar» en español significa animar o instar, casi el opuesto pragmático del sentido aquí. Esto distorsiona el mandato apostólico.
  - severity: medium
    issue: Se pierde el enlace temático con luz/tinieblas
    rationale: El POB inglés escoge «expose» precisamente por el contexto de Efesios 5. «Exhótenlas» borra esa conexión, mientras que «sáquenlas a la luz» o «expónganlas» la conserva mejor.
  - severity: low
    issue: El intensificador de μᾶλλον δὲ καὶ queda algo atenuado
    rationale: «Sino más bien» es aceptable, aunque no expresa tan claramente el «even» del inglés. No hace falta forzar una solución más pesada; el problema principal está en el verbo final.
  revised_spanish_text: Y no participen en las obras infructuosas de las tinieblas[a], sino más bien sáquenlas a la luz[b].
  revised_footnotes:
