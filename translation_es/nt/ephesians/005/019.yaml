    rationale: Aunque intenta seguir «making melody», en español resulta forzado. Puede preservarse mejor el valor de ψάλλοντες con «salmodiando», dejando en nota la alternativa «cantando alabanza» y la observación de que no exige acompañamiento instrumental.
