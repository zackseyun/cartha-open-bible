translation:
  language: es
  text: hablando entre ustedes con salmos, himnos y cánticos espirituales[a], cantando y salmodiando[b] con su corazón al Señor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «entre ustedes mismos» o «unos a otros»; el reflexivo griego aquí suele entenderse de manera recíproca: «unos a otros».'
    reason: lexical_alternative
  - marker: b
    text: O «cantando alabanza»; el griego puede denotar cantar alabanza o hacer melodía, sin especificar necesariamente acompañamiento instrumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλοῦντες
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - hablando unos a otros
  - hablando entre ustedes
  lexicon: BDAG
  rationale: El participio presente conserva mejor el valor verbal continuo en español. «Hablando entre ustedes» expresa bien el sentido comunitario del contexto.
- source_word: ἑαυτοῖς
  english_pob_choice: to one another
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos a otros
  - entre sí
  lexicon: BDAG
  rationale: En contexto plural recíproco, el reflexivo tiene sentido mutuo. «Entre ustedes» suena natural en español y mantiene la idea comunitaria sin volverla individual.
- source_word: ψαλμοῖς
  english_pob_choice: psalms
  chosen_spanish: salmos
  alternatives_spanish:
  - salmos cantados
  - salmodias
  lexicon: BDAG
  rationale: «Salmos» es el equivalente directo y reconocido; no hay base suficiente para estrecharlo solo a los Salmos canónicos ni para sustituirlo por un término menos claro.
- source_word: ὕμνοις
  english_pob_choice: hymns
  chosen_spanish: himnos
  alternatives_spanish:
  - cánticos
  lexicon: BDAG
  rationale: Se preserva la distinción del trío léxico mediante el equivalente estándar «himnos».
- source_word: ᾠδαῖς πνευματικαῖς
  english_pob_choice: spiritual songs
  chosen_spanish: canciones espirituales
  alternatives_spanish:
  - cánticos espirituales
  - canciones inspiradas por el Espíritu
  lexicon: BDAG
  rationale: «Canciones espirituales» comunica bien el sentido adjetival de πνευματικαῖς sin añadir una afirmación más fuerte de inspiración que la que el texto exige. «Cánticos espirituales» también sería posible, pero «canciones» es más transparente y natural en español contemporáneo.
- source_word: ᾄδοντες
  english_pob_choice: singing
  chosen_spanish: cantando
  alternatives_spanish:
  - entonando
  lexicon: BDAG
  rationale: 'El participio se traduce de forma verbal y fluida: «cantando».'
- source_word: ψάλλοντες
  english_pob_choice: making melody
  chosen_spanish: haciendo melodía
  alternatives_spanish:
  - cantando alabanza
  - tocando
  lexicon: BDAG
  rationale: Se conserva la imagen musical sin imponer acompañamiento instrumental. «Haciendo melodía» refleja bien la decisión inglesa de mantener la tensión semántica de ψάλλω.
- source_word: τῇ καρδίᾳ ὑμῶν
  english_pob_choice: with your heart
  chosen_spanish: con su corazón
  alternatives_spanish:
  - con el corazón de ustedes
  - desde el corazón
  lexicon: BDAG
  rationale: La revisión inglesa pasó de «in your heart» a una construcción con «with». En español, «con su corazón» reproduce con naturalidad el valor de instrumento o modo del dativo, manteniendo la lectura comunitaria del plural.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - para el Señor
  lexicon: BDAG
  rationale: Aquí κύριος se traduce por el término usual «Señor». Dado que el texto griego no explicita el nombre divino y la frase funciona como destinatario de la alabanza, «al Señor» es la opción más directa. No se introduce «Yahvé» ni una identificación más específica que el verso no formule.
theological_decisions:
- issue: ψάλλοντες y la cuestión del acompañamiento instrumental
  english_pob_reading: Rendered as 'making melody' without specifying instrumental accompaniment.
  chosen_spanish_reading: «haciendo melodía» sin implicar instrumentos.
  alternative_spanish_readings:
  - «cantando alabanza»
  - «tocando» o «haciendo música» con posible matiz instrumental
  rationale: El término puede relacionarse históricamente con pulsar cuerdas, pero en este contexto no obliga a entender instrumentos. La traducción evita resolver una tensión lexical que el texto no resuelve.
  doctrine_reference: Preservar la tensión lexical sin importar una postura litúrgica.
- issue: Identidad del destinatario τῷ κυρίῳ
  english_pob_reading: Retained as 'the Lord' without specifying 'the Lord Jesus' in the translation.
  chosen_spanish_reading: «al Señor» sin precisar más.
  alternative_spanish_readings:
  - «al Señor Jesús»
  - «a Cristo»
  rationale: En Efesios el referente puede ser Cristo, pero el griego dice κύριος. Se conserva el alcance textual y se deja la identificación completa al contexto, no a una ampliación del versículo.
  doctrine_reference: κύριος se traduce por «Señor»; no se añade una identificación doctrinal no formulada en el verso.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió «in your heart» a una expresión más cercana al dativo griego τῇ καρδίᾳ ὑμῶν, manteniendo el sentido natural. La versión española refleja esa misma atención al dativo con «con su corazón».
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo participial del griego con tres acciones: hablando/cantando/haciendo melodía.'
  - Se conserva la distinción entre salmos, himnos y canciones espirituales sin fusionar categorías.
  - Se evita sustituir «Señor» por un nombre divino explícito, porque el texto griego usa κύριος.
  - El tono es formal pero natural para lectura eclesial amplia, sin calcos excesivamente rígidos.
