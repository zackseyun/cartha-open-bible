translation:
  language: es
  text: Por lo tanto[a], fíjense bien cómo andan; no como insensatos, sino como sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presten mucha atención a cómo viven». El griego dice literalmente «fíjense bien cómo andan», usando «andar» como metáfora de la manera de vivir.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: watch
  chosen_spanish: miren
  alternatives_spanish:
  - vean
  - estén atentos
  - vigilen
  lexicon: BDAG
  rationale: El imperativo plural pide atención vigilante. «Miren» comunica esa exhortación de forma natural en español y mantiene el tono directo sin sobrerreligiosizarlo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - entonces
  - así que
  - por eso
  lexicon: BDAG
  rationale: Marca conclusión lógica respecto del contexto anterior. «Por lo tanto» conserva bien ese enlace inferencial en español formal y claro.
- source_word: ἀκριβῶς πῶς
  english_pob_choice: carefully how
  chosen_spanish: cuidadosamente cómo
  alternatives_spanish:
  - con exactitud cómo
  - con precisión cómo
  - exactamente cómo
  lexicon: BDAG
  rationale: El adverbio intensifica la manera de vivir. «Cuidadosamente» conserva la idea de atención minuciosa sin sonar técnico, y «cómo» introduce la cláusula de modo.
- source_word: περιπατεῖτε
  english_pob_choice: you walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - viven
  - se conducen
  lexicon: BDAG
  rationale: Se conserva la metáfora paulina de «caminar» como manera de vida, pero «andar» suena más natural en español bíblico contemporáneo que una traducción más literal y sigue siendo claramente metafórico.
- source_word: μὴ ὡς ἄσοφοι
  english_pob_choice: not as unwise
  chosen_spanish: no como insensatos
  alternatives_spanish:
  - no como imprudentes
  - no como necios
  - no como no sabios
  lexicon: BDAG
  rationale: ἄσοφοι expresa falta de sabiduría; en español, «insensatos» reproduce bien el contraste moral e intelectual sin caer en una simple negación de sabiduría. Se evita añadir «hombres» porque no está en el griego y la revisión más reciente del POB lo retiró.
- source_word: ἀλλ’ ὡς σοφοί
  english_pob_choice: but as wise
  chosen_spanish: sino como sabios
  alternatives_spanish:
  - pero como sabios
  - sino como personas sabias
  - sino como prudentes
  lexicon: BDAG
  rationale: La oposición antitética se expresa de forma natural con «sino». «Sabios» mantiene el paralelismo con «insensatos» y preserva el contraste del texto.
theological_decisions:
- issue: Metáfora de la conducta como 'caminar'
  english_pob_reading: The Greek literally says 'watch carefully how you walk,' using 'walk' as a metaphor for one's manner of life.
  chosen_spanish_reading: «cómo andan» conserva la metáfora de la conducta como caminar/andar, no solo la idea abstracta de vivir.
  alternative_spanish_readings:
  - cómo viven
  - cómo se conducen
  rationale: El texto paulino usa una imagen corporal y ética. Mantenerla ayuda a que el lector perciba el lenguaje figurado y no pierda la fuerza pastoral de la exhortación.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
- issue: Forma plural masculina en el contraste 'insensatos/sabios'
  english_pob_reading: The Greek uses masculine plural forms that can function generically; the exhortation is addressed to the whole believing community, not to males only.
  chosen_spanish_reading: Se traduce sin añadir un equivalente masculino explícito, porque en español «insensatos» y «sabios» pueden funcionar de modo genérico en este contexto.
  alternative_spanish_readings:
  - no como insensatos hombres, sino como sabios
  - no como personas insensatas, sino como personas sabias
  rationale: La revisión auditada del POB retiró 'men' por no estar en el griego. En español, añadir un masculino explícito sería innecesario y menos fiel; la forma genérica ya comunica la exhortación comunitaria.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La revisión más reciente del POB eliminó la palabra equivalente a ''men'' porque no está en el griego. La versión española sigue esa decisión: no introduce un masculino explícito y conserva la metáfora de ''andar'' sin sobrecargar el texto. También se evitó traducir mecánicamente desde el inglés cuando el español podía expresar con más naturalidad el imperativo de atención.'
  spanish_consistency_notes:
  - Se usa «andar» para la metáfora paulina de conducta, en consonancia con el patrón del POB de conservar imágenes literales cuando siguen siendo comprensibles.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; este versículo no contiene el nombre divino ni cristología explícita.
  - «Insensatos» / «sabios» mantiene el contraste semántico y retórico del griego con registro bíblico claro en español.
  - La puntuación con punto y coma refleja la antítesis del original y permite leer la exhortación en dos miembros equilibrados.
