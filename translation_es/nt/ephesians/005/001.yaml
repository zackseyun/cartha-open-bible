translation:
  language: es
  text: Por tanto[a], lleguen a ser imitadores de Dios, como hijos amados,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean imitadores de Dios»; el imperativo griego puede enfatizar tanto el llegar a ser como el ser de manera continua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - se hagan
  - sigan siendo
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι puede tener matiz ingressivo o procesual. En español, "sean" mantiene un mandato natural y fluido, mientras que "lleguen a ser" explicitaría más el proceso. Aquí se conserva la fuerza exhortativa sin sobrecargar la frase.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Marca la inferencia respecto de lo anterior. "Por tanto" es la opción más clara y formal para conservar la conexión lógica del argumento.
- source_word: μιμηταὶ
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  - emuladores
  - copistas
  lexicon: BDAG
  rationale: El sustantivo apunta a quienes imitan o emulan. "Imitadores" preserva el motivo verbal de la imitación con mayor precisión que "seguidores", que sería demasiado amplio.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - del Dios
  lexicon: BDAG
  rationale: El genitivo se expresa naturalmente en español como "de Dios". Mantiene la referencia directa sin introducir una forma menos idiomática.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: BDAG
  rationale: Introduce la comparación o el modo en que debe entenderse la exhortación. "Como" es la equivalencia más breve y fiel en español.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - descendientes
  lexicon: BDAG
  rationale: Aunque τέκνα es inclusivo, en español la expresión fija "hijos amados" comunica bien la relación filial en un registro bíblico natural. Se evita "niños", que sería inadecuado, y "hijos e hijas", que añade explicitación no requerida por el texto.
- source_word: ἀγαπητά
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - muy amados
  lexicon: BDAG
  rationale: '"Amados" conserva la intensidad afectiva y el registro bíblico sin sonar anticuado. Unido a "hijos" reproduce bien la relación de filiación afectuosa.'
theological_decisions:
- issue: Relación entre la imitación de Dios y la condición de hijos amados
  english_pob_reading: The verse exhorts believers to become imitators of God on the basis of their identity as beloved children, without implying they become God's children by imitation.
  chosen_spanish_reading: La exhortación llama a imitar a Dios partiendo de la identidad de los creyentes como hijos amados, sin sugerir que lleguen a ser hijos de Dios por imitación.
  alternative_spanish_readings:
  - Sean imitadores de Dios, porque son hijos amados.
  - Imiten a Dios, ya que son hijos amados.
  rationale: 'La construcción española debe mantener la misma tensión teológica: la identidad filial fundamenta la exhortación, pero no la produce. "Como hijos amados" se deja como base o marco del mandato, no como medio meritorio para obtener filiación.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente; el contexto de revisión más reciente indica que el texto inglés quedó sin cambios tras la evaluación de alta concordancia. La presente propuesta sigue de cerca ese estado estable.
  spanish_consistency_notes:
  - Se conserva el registro bíblico contemporáneo y claro, evitando formas arcaizantes innecesarias.
  - '"Dios" se mantiene sin artículos añadidos, conforme al uso idiomático español y a la referencia directa del genitivo griego.'
  - La nota textual/lexical se ancla en el verbo principal porque la alternativa afecta la fuerza del mandato, no el contenido léxico de un sustantivo.
