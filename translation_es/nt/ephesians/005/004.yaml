    changes_summary: Replaced the em-dash construction with a relative clause to more directly reflect ἃ οὐκ ἀνῆκεν ('which are not fitting') and improve formal naturalness; retained the lexical choices of 'obscenity,' 'foolish talk,' 'crude joking,' and 'thanksgiving.'
translation:
  language: es
  text: Y obscenidad, habla necia o broma grosera[a], las cuales no convienen[b], sino más bien acción de gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘broma de mal gusto’ o ‘chiste soez’. El término griego εὐτραπελία puede referirse en otros contextos a la agudeza o el ingenio, pero aquí se usa en sentido negativo por su asociación con conductas que no convienen.
    reason: lexical_alternative
  - marker: b
    text: O ‘que no son apropiadas’ o ‘que no son propias’.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰσχρότης
  english_pob_choice: obscenity
  chosen_spanish: obscenidad
  alternatives_spanish:
  - vergüenza
  - indecencia
  - fealdad moral
  lexicon: BDAG
  rationale: En este contexto la palabra se agrupa con vicios del habla, así que el español debe reflejar una expresión indecente o deshonrosa en el discurso, no una vergüenza moral general. 'Obscenidad' conserva esa fuerza y suena natural en español actual.
- source_word: μωρολογία
  english_pob_choice: foolish talk
  chosen_spanish: habla necia
  alternatives_spanish:
  - habla tonta
  - habla insensata
  - discurso necio
  lexicon: BDAG
  rationale: El término apunta a un habla insensata o tonta. 'Habla necia' preserva el vínculo con el habla y mantiene un tono bíblico claro sin volverlo coloquial en exceso.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - ni
  lexicon: BDAG
  rationale: La conjunción enlaza el último elemento de la serie viciosa. 'O' es la equivalencia directa y mantiene la estructura acumulativa del listado.
- source_word: εὐτραπελία
  english_pob_choice: crude joking
  chosen_spanish: broma grosera
  alternatives_spanish:
  - chiste grosero
  - juego de palabras indebido
  - broma procaz
  lexicon: BDAG
  rationale: Aunque el término puede tener un sentido positivo de agudeza en otros contextos, aquí aparece junto con vicios y bajo la evaluación 'no convienen'. Por eso se requiere una traducción negativa. 'Broma grosera' comunica humor inapropiado de forma natural en español.
- source_word: ἃ οὐκ ἀνῆκεν
  english_pob_choice: which are not fitting
  chosen_spanish: cosas que no convienen
  alternatives_spanish:
  - cosas que no son apropiadas
  - cosas que no son convenientes
  - las cuales no son propias
  lexicon: BDAG
  rationale: El pronombre neutro plural remite colectivamente a las conductas mencionadas. 'No convienen' transmite la idea moral de algo impropio o fuera de lugar, con una cadencia adecuada en español bíblico moderno.
- source_word: ἀλλὰ μᾶλλον
  english_pob_choice: but rather
  chosen_spanish: sino más bien
  alternatives_spanish:
  - pero más bien
  - antes bien
  lexicon: BDAG
  rationale: La expresión introduce un contraste fuerte entre lo prohibido y la alternativa positiva. 'Sino más bien' conserva esa oposición con buena naturalidad en español.
- source_word: εὐχαριστία
  english_pob_choice: thanksgiving
  chosen_spanish: gratitud
  alternatives_spanish:
  - acción de gracias
  - dar gracias
  - agradecimiento
  lexicon: BDAG
  rationale: El sustantivo puede expresar tanto gratitud como acción de gracias. Aquí, en contraste con formas de habla, 'gratitud' funciona bien en español como el contenido positivo que debe reemplazar ese lenguaje. Se mantiene la posibilidad litúrgica sin forzar una fórmula fija.
theological_decisions:
- issue: Naturaleza del contraste ético y del habla
  english_pob_reading: The list is rendered as primarily speech-related vices, culminating in a contrast with thankful speech.
  chosen_spanish_reading: La lista se entiende principalmente como vicios del habla, culminando en el contraste con la gratitud.
  alternative_spanish_readings:
  - Tomar obscenidad como maldad moral general no limitada al habla
  - Neutralizar εὐτραπελία como mera agudeza o ingenio
  rationale: El contexto inmediato reúne términos de habla y concluye con εὐχαριστία, una respuesta verbal o actitud agradecida. Por eso la traducción española debe mantener el foco en el lenguaje y no generalizar indebidamente el alcance moral del primer término.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido negativo de εὐτραπελία
  english_pob_reading: Translate negatively as 'crude joking' in the main text.
  chosen_spanish_reading: Traducir εὐτραπελία de modo negativo como 'broma grosera'.
  alternative_spanish_readings:
  - gracia
  - agudeza
  - ingenio
  - bromas ingeniosas
  rationale: Aunque el griego puede tener un uso positivo en otros contextos, aquí la asociación con conductas no convenientes exige un matiz peyorativo. La versión española debe conservar esa tensión y no suavizarla con un término neutro o elogioso.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del inglés POB, que prefirió una cláusula relativa explícita ('which are not fitting') en lugar de una construcción con guion. También conserva la evaluación negativa de εὐτραπελία y el cierre con un sustantivo positivo equivalente a thanksgiving. La versión española refleja ese mismo perfil sintáctico y semántico.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la serie de sustantivos y el contraste final con una expresión positiva.
  - '''Obscenidad'' y ''broma grosera'' preservan el matiz de vicio del habla sin desplazar el foco a otras áreas semánticas.'
  - '''No convienen'' busca una equivalencia natural para ἃ οὐκ ἀνῆκεν, evitando un tono excesivamente arcaico.'
  - '''Gratitud'' se usa como valor/actitud positiva en contraste con el habla impropia, sin perder la posibilidad de una lectura de acción de gracias.'
