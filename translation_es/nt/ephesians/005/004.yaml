  text: καὶ αἰσχρότης καὶ μωρολογία ἢ εὐτραπελία, ⸂ἃ οὐκ ἀνῆκεν⸃, ἀλλὰ μᾶλλον εὐχαριστία.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/005/004.yaml
  text: And obscenity and foolish talk or crude joking[a], which are not fitting[b], but rather thanksgiving.
  footnotes:
  - marker: a
    text: Or 'coarse jesting.' The Greek term εὐτραπελία can refer more generally to wit, but here it is used negatively because it is grouped with unfitting speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'which are not proper' or 'which are not appropriate.'
    reason: lexical_alternative
