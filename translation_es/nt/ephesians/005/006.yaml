translation:
  language: es
  text: Que nadie los engañe con palabras vacías, pues por causa de estas cosas viene la ira de Dios sobre los hijos de la desobediencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de la desobediencia», es decir, los caracterizados por la desobediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδεὶς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Nadie
  - No permitas que nadie
  lexicon: BDAG
  rationale: El griego usa un mandato prohibitivo con ἀπατάτω; en español, «Que nadie...» conserva bien el valor exhortativo sin sonar forzado. «Nadie» solo sería posible, pero perdería algo del matiz imperativo.
- source_word: ἀπατάτω
  english_pob_choice: deceive
  chosen_spanish: engañe
  alternatives_spanish:
  - deceive
  - mienta
  lexicon: BDAG
  rationale: «Engañar» es el equivalente natural y fiel en español para ἀπατάω en este contexto de advertencia moral. Mantiene la fuerza de la exhortación sin endurecer innecesariamente el registro.
- source_word: κενοῖς λόγοις
  english_pob_choice: with empty words
  chosen_spanish: con palabras vacías
  alternatives_spanish:
  - con palabras vanas
  - con argumentos vacíos
  lexicon: BDAG
  rationale: «Palabras vacías» reproduce bien la imagen de κενοῖς λόγοις y suena natural en español. Se evita «vanas» porque podría sonar más arcaico o litúrgico sin añadir claridad.
- source_word: διὰ ταῦτα
  english_pob_choice: because of these things
  chosen_spanish: por causa de estas cosas
  alternatives_spanish:
  - porque por estas cosas
  - a causa de estas cosas
  lexicon: BDAG
  rationale: La preposición con acusativo expresa causalidad; «por causa de estas cosas» lo comunica con claridad y mantiene la referencia plural de ταῦτα.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - llega
  lexicon: BDAG
  rationale: «Viene» conserva el presente griego y puede expresar tanto inminencia como valor gnómico. Es más natural que «llega» en esta construcción solemne.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - el enojo de Dios
  - la cólera de Dios
  lexicon: BDAG
  rationale: «Ira» es el equivalente directo y más estable para ὀργή en este contexto teológico. Se evita suavizarlo a «juicio» para no borrar la fuerza del término original.
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: BDAG
  rationale: «Sobre» reproduce adecuadamente el movimiento dirigido de ἐπὶ con personas objeto y mantiene el tono judicial del pasaje.
- source_word: τοὺς υἱοὺς τῆς ἀπειθείας
  english_pob_choice: the sons of disobedience
  chosen_spanish: los hijos de la desobediencia
  alternatives_spanish:
  - los hijos de la desobediencia, es decir, los caracterizados por la desobediencia
  - los hijos de la desobediencia
  lexicon: BDAG
  rationale: En español, «hijos» conserva la forma masculina plural del griego y la construcción idiomática semítica. «Los hijos de la desobediencia» es comprensible y respeta la frase nominal sin neutralizarla.
- source_word: ἀπειθείας
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - rebeldía
  - incredulidad
  lexicon: BDAG
  rationale: «Desobediencia» corresponde de manera directa a ἀπείθεια y mantiene el vínculo con el contexto ético inmediato. No se sustituye por «rebeldía» o «incredulidad» porque alterarían el matiz.
theological_decisions:
- issue: Rendering divine wrath language
  english_pob_reading: the wrath of God
  chosen_spanish_reading: la ira de Dios
  alternative_spanish_readings:
  - el juicio de Dios
  rationale: El griego usa ὀργή, por lo que la traducción debe conservar la referencia a la ira divina y no diluirla en un término más general. Esto preserva la tensión teológica del texto.
  doctrine_reference: Primacía del texto original; mantener el peso semántico de ὀργή.
- issue: Gendered idiom τοὺς υἱοὺς τῆς ἀπειθείας
  english_pob_reading: the sons of disobedience
  chosen_spanish_reading: los hijos de la desobediencia
  alternative_spanish_readings:
  - los hijos de la desobediencia, es decir, los caracterizados por la desobediencia
  - las personas desobedientes
  rationale: La forma griega es masculina plural y la política de la POB en inglés preserva esa forma con una nota explicativa. En español, «hijos» mantiene la estructura idiomática sin borrar la señal de género gramatical del original.
  doctrine_reference: Precisión gramatical y fidelidad idiomática sobre neutralización automática.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje de referencia; el borrador sigue de cerca el griego SBLGNT y armoniza con la decisión auditada en inglés de preservar el giro idiomático y la fuerza de la ira divina.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, sin convertirlo en perífrasis explicativa.
  - Se conserva la estructura causal de διὰ ταῦτα con una expresión natural en español.
  - «Palabras vacías» evita una calca rígida y sigue siendo transparente para lectores eclesiales.
  - La nota aclara el valor idiomático de «hijos de la desobediencia» sin reemplazar la forma principal.
