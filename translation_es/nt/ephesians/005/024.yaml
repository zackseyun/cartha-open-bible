translation:
  language: es
  text: Pero así como la iglesia se somete al Mesías[a], así también las esposas a sus maridos en todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». El título griego Χριστός se vierte aquí «Mesías» porque funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Marca contraste con la afirmación anterior; «Pero» es la conexión natural y clara en español para este giro adversativo.
- source_word: ὡς ... οὕτως καὶ
  english_pob_choice: as ... so also
  chosen_spanish: así como ... así también
  alternatives_spanish:
  - tal como ... así también
  - como ... igualmente
  lexicon: BDAG
  rationale: Conserva la correlación comparativa del griego sin añadir explicación interpretativa.
- source_word: ἐκκλησία
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En el uso paulino el referente es la comunidad cristiana; «iglesia» es la equivalencia más clara y estable en español.
- source_word: ὑποτάσσεται
  english_pob_choice: submits
  chosen_spanish: se somete
  alternatives_spanish:
  - se sujeta
  - está sujeta
  lexicon: BDAG
  rationale: La forma media/pasiva expresa una sumisión relacional u ordenada; «se somete» comunica el sentido sin forzar una lectura de coerción ni suavizar el verbo.
- source_word: τῷ Χριστῷ
  english_pob_choice: to the Messiah
  chosen_spanish: a Messiah
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título. Para seguir la política del POB de traducir títulos cuando el contexto lo permite, se conserva «Mesías»; se omite el artículo en español para mantener fluidez sintáctica y porque el referente es definido por el contexto.
- source_word: αἱ γυναῖκες
  english_pob_choice: wives
  chosen_spanish: las esposas
  alternatives_spanish:
  - las mujeres
  lexicon: BDAG
  rationale: El contexto doméstico y la correlación con «maridos» requiere el sentido relacional de «esposas», no el más general de «mujeres».
- source_word: τοῖς ἀνδράσιν
  english_pob_choice: to their husbands
  chosen_spanish: a sus maridos
  alternatives_spanish:
  - a los maridos
  - a los hombres
  lexicon: BDAG
  rationale: ἀνήρ puede significar «varón» o «marido»; aquí el paralelismo matrimonial exige «maridos». El posesivo «sus» expresa en español la relación implícita en el griego.
- source_word: ἐν παντί
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo aspecto
  - en todas las cosas
  lexicon: BDAG
  rationale: Reproduce la amplitud de ἐν παντί con una frase natural en español. «En todo» preserva la extensión sin introducir límites interpretativos.
theological_decisions:
- issue: Rendering Χριστός in a title-bearing comparison
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto presenta Χριστός como título en una comparación, no simplemente como nombre fijo. En coherencia con la directriz del proyecto, se traduce el título por «Mesías» y se mantiene la alternativa tradicional en nota.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Scope of marital submission
  english_pob_reading: in everything
  chosen_spanish_reading: en todo, sin calificadores añadidos
  alternative_spanish_readings:
  - en todo lo apropiado
  - en todo lo debido
  rationale: El griego dice ἐν παντί y no ofrece limitación explícita. La traducción debe preservar esa amplitud y no resolverla con aclaraciones interpretativas en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: El audit trail inglés muestra un vaivén entre «Christ» y «Messiah», con restauración final de «Messiah» por política doctrinal. También se eliminó el verbo suplido en la segunda cláusula para respetar la elipsis del griego. La versión española sigue esa decisión final y conserva la omisión verbal en la segunda parte.
  spanish_consistency_notes:
  - Se mantiene «iglesia» para ἐκκλησία y «se somete» para ὑποτάσσεται, en registro natural y fiel al griego.
  - Se usa «Mesías» en el texto principal para Χριστός, con nota alternativa «Cristo» por tradición habitual.
  - «A sus maridos» expresa la relación implícita del plural femenino con el plural masculino en contexto matrimonial.
  - «En todo» conserva la amplitud de ἐν παντί sin glosa restrictiva.
