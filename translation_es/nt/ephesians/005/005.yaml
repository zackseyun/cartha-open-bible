revisions:
- from: Porque saben esto[a], entendiendo que toda persona sexualmente inmoral, impura o avara, la cual es idolatra[b], no tiene herencia en el reino de Mesías y de Dios.
  to: Porque saben esto[a], entendiendo que toda persona sexualmente inmoral, impura o avara, que es idólatra, no tiene herencia en el reino del Mesías[b] y de Dios.
  rationale: Se corrige un problema de legibilidad y ortografía en «la cual es idolatra» → «que es idólatra», manteniendo la decisión exegética del POB. También se mejora la naturalidad de «de Mesías» a «del Mesías» en español, sin alterar el sentido titular de Χριστός. Las notas se conservan con leve pulido estilístico y anclaje correcto en el texto revisado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue correctamente decisiones clave del POB: mantiene el presente «no tiene», conserva «Mesías» para Χριστοῦ y preserva en nota la alternativa más literal «lo cual es idolatría». Sin embargo, varios giros españoles no representan de la mejor manera la forma ni la legibilidad del original: «la cual» suena forzado para una lista de cualidades/persona, falta tilde en «idólatra», y la construcción «reino de Mesías y de Dios» resulta menos natural y menos digna que «reino del Mesías y de Dios».'
  spanish_quality_summary: La redacción es comprensible, pero necesita pulido para sonar natural en español eclesial moderno. «Porque saben esto, entendiendo» es aceptable, aunque algo rígido; el mayor problema es «la cual es idolatra», que es gramaticalmente torpe y ortográficamente incorrecto. «Toda persona sexualmente inmoral, impura o avara» funciona, pero el relativo debe simplificarse a «que es idólatra». También conviene usar «del Mesías» para mejor español sin apartarse del sentido.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Mesías» por Χριστός, «Dios» por θεοῦ, «herencia» por κληρονομίαν y «reino» por βασιλείᾳ. «Impura» como opción para ἀκάθαρτος es defendible en español. La nota sobre «Cristo»→«Mesías» es correcta. Debe corregirse únicamente la forma española del relativo y la ortografía de «idólatra»; además, «del Mesías» expresa mejor el título en español.'
  issues:
  - severity: medium
    issue: 'Relativo español forzado: «la cual es idolatra»'
    rationale: Aunque intenta reflejar la referencia personal del inglés POB, en español aplicado a «persona... impura o avara» suena torpe y poco natural. «Que es idólatra» transmite el mismo sentido con mejor legibilidad y fidelidad funcional.
  - severity: medium
    issue: Error ortográfico en «idolatra»
    rationale: La forma correcta en español es «idólatra». La tilde es obligatoria.
  - severity: low
    issue: «reino de Mesías y de Dios» suena menos natural que «reino del Mesías y de Dios»
    rationale: En español, cuando «Mesías» funciona claramente como título, el artículo mejora la fluidez y dignidad sin introducir una interpretación adicional no presente en el original.
  revised_spanish_text: Porque saben esto[a], entendiendo que toda persona sexualmente inmoral, impura o avara, que es idólatra, no tiene herencia en el reino del Mesías[b] y de Dios.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «lo cual es idolatría»; probablemente se refiere de manera especial a la avaricia o codicia.
    reason: alternative_reading
  - marker: b
    text: El griego dice «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
  revision_rationale: Se corrige un problema de legibilidad y ortografía en «la cual es idolatra» → «que es idólatra», manteniendo la decisión exegética del POB. También se mejora la naturalidad de «de Mesías» a «del Mesías» en español, sin alterar el sentido titular de Χριστός. Las notas se conservan con leve pulido estilístico y anclaje correcto en el texto revisado.
