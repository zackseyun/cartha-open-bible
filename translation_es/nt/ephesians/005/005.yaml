    changes_summary: 'Changed ''recognizing'' to ''understanding'' for more natural rendering of γινώσκοντες, and changed ''the Messiah'' to ''Christ'' for closer correspondence to Χριστοῦ and more natural Pauline register. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque saben esto[a], entendiendo que toda persona sexualmente inmoral, impura o avara, que es idólatra, no tiene herencia en el reino del Mesías[b] y de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «lo cual es idolatría»; probablemente se refiere de manera especial a la avaricia o codicia.
    reason: alternative_reading
  - marker: b
    text: El griego dice «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο γὰρ ἴστε γινώσκοντες
  english_pob_choice: For you know this, understanding
  chosen_spanish: Porque saben esto, entendiendo
  alternatives_spanish:
  - Porque ustedes saben esto
  - Pues ustedes saben esto y entienden
  lexicon: BDAG
  rationale: 'La combinación de οἶδα con el participio de γινώσκω expresa un saber enfático. «Saben esto, entendiendo» conserva ambos matices: conocimiento asentado y aprehensión activa, sin volverlo más pesado de lo necesario en español.'
- source_word: πόρνος
  english_pob_choice: sexually immoral
  chosen_spanish: persona sexualmente inmoral
  alternatives_spanish:
  - fornicador
  - inmoral sexual
  lexicon: BDAG
  rationale: El término designa a alguien caracterizado por inmoralidad sexual. «Persona sexualmente inmoral» mantiene el valor moral general y evita el tono más estrecho o arcaico de «fornicador».
- source_word: ἀκάθαρτος
  english_pob_choice: unclean
  chosen_spanish: impura
  alternatives_spanish:
  - inmunda
  - impropia
  lexicon: BDAG
  rationale: En listas éticas paulinas puede expresar impureza moral amplia. «Impura» conserva la resonancia moral y, en español, resulta más natural que un calco rígido.
- source_word: πλεονέκτης
  english_pob_choice: greedy person
  chosen_spanish: avara
  alternatives_spanish:
  - codiciosa
  - codicioso
  lexicon: BDAG
  rationale: El término apunta a la persona dominada por la avidez o la codicia. Dado que la serie gramatical en español ya usa sustantivos/adjetivos de género común, «avara» comunica bien el rasgo sin perder la fuerza ética.
- source_word: ὅ ἐστιν εἰδωλολάτρης
  english_pob_choice: who is an idolater
  chosen_spanish: la cual es idolatra
  alternatives_spanish:
  - que es idólatra
  - que es un idólatra
  lexicon: BDAG
  rationale: 'El relativo neutro crea una ambigüedad real: puede referirse al avaro/persona previa o, más literalmente, a la avaricia como idolatría. En el texto principal se opta por el sentido contextual más natural, pero se conserva la tensión gramatical en nota.'
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: BDAG
  rationale: «Herencia» es el equivalente normal y preserva la resonancia escatológica y pactal del término paulino.
- source_word: βασιλείᾳ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio real
  lexicon: BDAG
  rationale: «Reino» es el equivalente estable y comprensible en español, y puede abarcar tanto esfera como gobierno.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» porque Χριστός funciona aquí como título. Esto sigue la pauta del proyecto para no sustituirlo por el uso eclesiástico fijo de «Cristo» sin razón textual.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El sustantivo teológico estándar se traduce directamente como «Dios».
theological_decisions:
- issue: Sentido de ὅ ἐστιν εἰδωλολάτρης
  english_pob_reading: 'Applied in translation to the person just mentioned, especially the greedy person: ''who is an idolater.'''
  chosen_spanish_reading: 'Aplicado a la persona mencionada: «la cual es idólatra».'
  alternative_spanish_readings:
  - «lo cual es idolatría»
  - «que es idolatría, especialmente la avaricia»
  rationale: El griego usa un relativo neutro que permite una lectura más abstracta, vinculada especialmente a la avaricia como idolatría. Sin embargo, el contexto inmediato y el paralelo paulino favorecen tomarlo como una caracterización de la persona. La nota preserva la alternativa literal para no borrar la tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Tiempo/valor de οὐκ ἔχει κληρονομίαν
  english_pob_reading: 'Rendered as a present statement of status: ''has no inheritance.'''
  chosen_spanish_reading: «no tiene herencia» como afirmación presente de estado.
  alternative_spanish_readings:
  - «no heredará»
  - «no posee herencia»
  rationale: El presente griego οὐκ ἔχει se conserva como estado actual, sin convertirlo en una simple predicción futura.
  doctrine_reference: Translation philosophy §1
- issue: τοῦ Χριστοῦ καὶ θεοῦ
  english_pob_reading: the kingdom of Messiah and God
  chosen_spanish_reading: «el reino de Mesías y de Dios».
  alternative_spanish_readings:
  - «el reino del Mesías y de Dios»
  - «el reino de Cristo y de Dios»
  rationale: Se mantiene la traducción titulár de Χριστός como «Mesías» conforme a la pauta del proyecto. No se fuerza una conclusión sintáctica adicional sobre la relación entre los dos genitivos más allá de lo que el griego expresa de forma explícita.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del audit trail: se adoptó una expresión más natural para γινώσκοντες y se restauró «Mesías» para Χριστός después de una revisión que había usado «Cristo». La nota sobre ὅ ἐστιν εἰδωλολάτρης preserva la ambigüedad registrada en el contexto inglés.'
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y eclesialmente legible propio del proyecto.
  - Se usa «Mesías» para Χριστός y «Dios» para θεοῦ, sin sustituirlos por convenciones de mayúsculas o máscaras litúrgicas.
  - «Herencia» y «reino» conservan el campo semántico paulino usual.
  - La nota a/b sigue el orden de marcadores único y se ancla solo donde hay ambigüedad o decisión lexical significativa.
