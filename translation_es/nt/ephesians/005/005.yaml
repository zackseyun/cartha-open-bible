  text: τοῦτο γὰρ ⸀ἴστε γινώσκοντες ὅτι πᾶς πόρνος ἢ ἀκάθαρτος ἢ πλεονέκτης, ⸀ὅ ἐστιν εἰδωλολάτρης, οὐκ ἔχει κληρονομίαν ἐν τῇ βασιλείᾳ τοῦ Χριστοῦ καὶ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/005/005.yaml
  text: For you know this[a], understanding that every sexually immoral or unclean or greedy person, who is an idolater[b], has no inheritance in the kingdom of Messiah and God.
  footnotes:
  - marker: a
    text: Or, more literally, 'which is idolatry,' likely referring especially to greed/covetousness.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
