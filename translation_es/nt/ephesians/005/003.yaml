translation:
  language: es
  text: Pero la inmoralidad sexual[a] y toda impureza, o avaricia[b], ni siquiera debe mencionarse entre ustedes, como conviene a los santos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fornicación».
    reason: lexical_alternative
  - marker: b
    text: O «codicia».
    reason: lexical_alternative
  - marker: c
    text: «Los santos» aquí significa los creyentes como pueblo santo de Dios, no una clase canonizada posterior.
    reason: cultural_note
lexical_decisions:
- source_word: Πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: πορνεία abarca conducta sexual ilícita en sentido amplio, no solo una práctica específica. «Inmoralidad sexual» comunica esa amplitud en español moderno sin reducir el término a «fornicación», que sería más estrecho y más tradicional que preciso.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz contrastivo respecto del contexto anterior. «Pero» conserva esa relación de contraste de forma natural en español.
- source_word: καὶ ἀκαθαρσία πᾶσα
  english_pob_choice: every impurity
  chosen_spanish: toda impureza
  alternatives_spanish:
  - toda clase de impureza
  - toda inmundicia
  lexicon: BDAG
  rationale: La combinación expresa totalidad. «Toda impureza» mantiene la fuerza inclusiva del griego y fluye mejor que una forma más pesada como «toda clase de impureza».
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: ἤ es disyuntiva aquí, introduciendo otra categoría prohibida. «O» reproduce esa relación de manera directa.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición de tener más
  lexicon: BDAG
  rationale: πλεονεξία designa el deseo insaciable de obtener más, con matiz moral de afán posesivo. «Avaricia» es una opción española clara y amplia, cercana al sentido de «greed»; «codicia» también es posible, pero puede sonar más estrechamente ligada al décimo mandamiento en algunos registros.
- source_word: μηδὲ ὀνομαζέσθω
  english_pob_choice: must not even be named
  chosen_spanish: ni siquiera deben nombrarse
  alternatives_spanish:
  - ni siquiera debe mencionarse
  - ni aun debe ser nombrada
  lexicon: BDAG
  rationale: La forma griega expresa una prohibición intensa. En español, «ni siquiera deben nombrarse» comunica bien esa fuerza y evita una construcción excesivamente literal o poco natural.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en ustedes
  lexicon: BDAG
  rationale: El contexto es comunitario; por eso conviene una lectura corporativa. «Entre ustedes» refleja mejor la vida de la comunidad que una traducción más interiorizada como «en ustedes».
- source_word: καθὼς πρέπει
  english_pob_choice: as is proper
  chosen_spanish: como conviene
  alternatives_spanish:
  - como es apropiado
  - como es debido
  lexicon: BDAG
  rationale: πρέπει expresa conveniencia o idoneidad ética. «Como conviene» es una forma natural y fiel en español para esa norma de conducta.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los creyentes
  - al pueblo santo de Dios
  lexicon: BDAG
  rationale: ἅγιοι es el término paulino habitual para los creyentes como pueblo apartado para Dios. «Los santos» preserva esa designación teológica sin introducir la idea posterior de canonización.
theological_decisions:
- issue: Alcance de πλεονεξία junto a los vicios sexuales
  english_pob_reading: Rendered as the broader 'greed' rather than restricting it to sexual lust.
  chosen_spanish_reading: Se traduce como «avaricia» en sentido amplio, sin reducirlo a un deseo sexual ni a un solo tipo de pecado.
  alternative_spanish_readings:
  - codicia
  - ambición de tener más
  - codicia sexual
  rationale: El contexto menciona pecados sexuales, pero πλεονεξία en el uso paulino no se limita a ellos. Mantener un término amplio evita estrechar indebidamente la lista de vicios y conserva la tensión moral del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de ἁγίοις
  english_pob_reading: Translated as 'saints' referring to all believers.
  chosen_spanish_reading: «Los santos» se entiende como todos los creyentes, el pueblo apartado para Dios.
  alternative_spanish_readings:
  - los santos canonizados
  - los creyentes
  - el pueblo santo de Dios
  rationale: En Pablo, ἅγιοι nombra a la comunidad cristiana en su identidad dedicada a Dios. La traducción conserva el término tradicional y desactiva una lectura posterior de canonización.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide sustancialmente con la trayectoria auditada en inglés. Se mantiene el valor amplio de πορνεία y πλεονεξία, la prohibición enfática de μηδὲ ὀνομαζέσθω y la designación paulina de ἁγίοις como «los santos». No se requieren revisiones adicionales según el control de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto no presente en el griego.
  - «Los santos» se usa en sentido paulino comunitario, no hagiográfico.
  - «Inmoralidad sexual» conserva el alcance amplio de πορνεία sin volverlo un término técnico eclesiástico.
  - «Avaricia» se eligió por naturalidad; se deja nota de la alternativa «codicia» porque el griego admite esa lectura.
