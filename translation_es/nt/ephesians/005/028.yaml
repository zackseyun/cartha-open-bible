translation:
  language: es
  text: De la misma manera, los esposos también deben amar a sus propias esposas como a sus propios cuerpos. El que ama a su propia esposa se ama a sí mismo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Así
  - Del mismo modo
  lexicon: BDAG
  rationale: Conserva la fuerza inferencial y la conexión con el argumento anterior en un español natural y claro.
- source_word: ὀφείλουσιν
  english_pob_choice: ought to
  chosen_spanish: deben
  alternatives_spanish:
  - están obligados a
  - deberían
  lexicon: BDAG
  rationale: Expresa obligación moral con tono exhortativo sin volverlo más fuerte de lo que permite el indicativo.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: 'Mantiene el valor aditivo: los esposos son añadidos al patrón ya descrito.'
- source_word: οἱ ἄνδρες
  english_pob_choice: husbands
  chosen_spanish: los esposos
  alternatives_spanish:
  - los hombres
  - los maridos
  lexicon: BDAG
  rationale: En este contexto doméstico y marital, ἀνήρ apunta a varones casados; 'esposos' es preciso y natural en español.
- source_word: ἀγαπᾶν
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - amar profundamente
  - querer
  lexicon: BDAG
  rationale: Conserva el verbo de amor de la sección; 'amar' es el equivalente directo y digno en español.
- source_word: τὰς ἑαυτῶν γυναῖκας
  english_pob_choice: their own wives
  chosen_spanish: a sus propias esposas
  alternatives_spanish:
  - a sus propias mujeres
  - a sus esposas
  lexicon: BDAG
  rationale: γυναῖκας aquí significa 'esposas'; 'propias' mantiene el énfasis reflexivo de ἑαυτῶν.
- source_word: ὡς τὰ ἑαυτῶν σώματα
  english_pob_choice: as their own bodies
  chosen_spanish: como a sus propios cuerpos
  alternatives_spanish:
  - como sus propios cuerpos
  - igual que a sus cuerpos
  lexicon: BDAG
  rationale: Retiene la comparación directa con σῶμα y hace explícito el objeto de la comparación en español natural.
- source_word: ὁ ἀγαπῶν
  english_pob_choice: He who loves
  chosen_spanish: El que ama
  alternatives_spanish:
  - Quien ama
  - El que ama a
  lexicon: BDAG
  rationale: Reproduce el participio sustantivado con una forma general y idiomática en español.
- source_word: τὴν ἑαυτοῦ γυναῖκα
  english_pob_choice: his own wife
  chosen_spanish: a su propia esposa
  alternatives_spanish:
  - a su esposa
  - a su mujer
  lexicon: BDAG
  rationale: Preserva el énfasis reflexivo y mantiene la claridad marital de γυνή en este contexto.
- source_word: ἑαυτὸν ἀγαπᾷ
  english_pob_choice: loves himself
  chosen_spanish: se ama a sí mismo
  alternatives_spanish:
  - ama a sí mismo
  - se quiere a sí mismo
  lexicon: BDAG
  rationale: Refleja de manera directa la construcción reflexiva y conserva el razonamiento de Pablo sin suavizarlo.
theological_decisions:
- issue: Lenguaje de género en la exhortación doméstica
  english_pob_reading: Rendered οἱ ἄνδρες / ὁ ἀγαπῶν with masculine terms ('husbands,' 'He who loves')
  chosen_spanish_reading: 'Se tradujo con masculinos contextuales: ''los esposos'' y ''el que ama'''
  alternative_spanish_readings:
  - los hombres
  - quien ama
  rationale: El marco es instrucción matrimonial, no una generalización antropológica; el español debe conservar esa especificidad sin neutralizar el referente masculino del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre esposa y cuerpo
  english_pob_reading: Kept the analogy explicit without expanding it doctrinally
  chosen_spanish_reading: Se mantuvo la comparación explícita sin convertirla en explicación doctrinal adicional
  alternative_spanish_readings:
  - interpretar el texto como una identidad metafísica
  - parafrasear la analogía
  rationale: El griego compara el amor del esposo por su esposa con el cuidado del propio cuerpo y concluye que amar a la esposa es amarse a sí mismo; la traducción preserva esa lógica ética.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide con la lectura auditada en inglés; no se observaron revisiones textuales ni cambios de sentido que exijan notas adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'esposos/esposas' por la clara relación marital del contexto.
  - Se prefirió 'amar' para ἀγαπάω, manteniendo la coherencia con la repetición verbal del versículo.
  - Se conservó la reflexividad de ἑαυτῶν/ἑαυτοῦ con 'propios' y 'sí mismo'.
  - La puntuación reproduce la pausa fuerte entre las dos cláusulas del versículo.
