revisions:
- from: Este misterio[a] es grande[b], pero yo hablo con referencia al Mesías[c] y a la iglesia.
  to: Este misterio es grande[a], pero yo me refiero[b] al Mesías[c] y a la iglesia.
  rationale: 'Se ajusta la sintaxis a un español más natural («me refiero») sin apartarse del sentido de λέγω εἰς, y se reorganizan las notas para que correspondan correctamente a las decisiones léxicas documentadas: la alternativa «profundo» se ancla a «grande», se preserva la formulación más literal en nota, y se explicita la decisión titular «Mesías» frente a «Cristo».'
