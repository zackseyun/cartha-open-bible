translation:
  language: es
  text: Este misterio es grande[a], pero yo me refiero[b] al Mesías[c] y a la iglesia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Este misterio es profundo». El griego dice más literalmente «grande», que puede expresar magnitud o importancia, no solo profundidad.
    reason: lexical_alternative
  - marker: b
    text: O «hablo con referencia al Mesías y a la iglesia».
    reason: previous_rendering
  - marker: c
    text: Griego «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  - verdad escondida
  lexicon: BDAG
  rationale: En Pablo, μυστήριον designa una realidad divina antes oculta y ahora revelada. «Misterio» preserva ese uso paulino y su peso teológico sin explicarlo de más.
- source_word: μέγα
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - profundo
  lexicon: BDAG
  rationale: «Grande» reproduce el adjetivo griego con naturalidad en español y conserva la idea de magnitud o importancia. «Profundo» introduciría una matización interpretativa que el griego no exige.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: δέ introduce aquí una leve transición contrastiva. «Pero» comunica bien el paso desde la afirmación sobre el misterio hacia la aclaración de Pablo.
- source_word: λέγω
  english_pob_choice: am speaking
  chosen_spanish: hablo
  alternatives_spanish:
  - digo
  - me refiero
  lexicon: BDAG
  rationale: En español, «hablo» funciona de forma natural en una aclaración explicativa y mantiene el presente verbal. «Me refiero» sería más interpretativo; «digo» suena menos idiomático aquí.
- source_word: εἰς
  english_pob_choice: with reference to
  chosen_spanish: con referencia a
  alternatives_spanish:
  - acerca de
  - en cuanto a
  - respecto de
  lexicon: BDAG
  rationale: Aquí εἰς, con λέγω, expresa referencia y no movimiento. «Con referencia a» refleja ese valor relacional de manera clara y sobria en español.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto y el valor titular de Χριστός en este contexto, se usa «Mesías». Así se conserva el sentido funcional del título y no se lo reduce a un nombre fijo.
- source_word: ἐκκλησίαν
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En Pablo, ἐκκλησία denota la comunidad del pueblo de Dios. «Iglesia» es la equivalencia más clara y estable en español para esa realidad corporativa.
theological_decisions:
- issue: Alcance de «este misterio»
  english_pob_reading: Render the clause straightforwardly without specifying in the main text whether the mystery is marriage itself, Genesis 2:24, or the typological relation fulfilled in Messiah and the church.
  chosen_spanish_reading: Traducir la cláusula de forma directa sin resolver en el texto principal si el misterio es el matrimonio, la cita de Génesis 2:24 o la relación tipológica que culmina en el Mesías y la iglesia.
  alternative_spanish_readings:
  - Este misterio es el matrimonio en sí.
  - Este misterio es específicamente la cita de Génesis 2:24.
  - Este misterio es la significación tipológica del matrimonio.
  rationale: El griego afirma que «este misterio es grande» y enseguida aclara que Pablo habla con referencia al Mesías y a la iglesia. La traducción debe conservar ese movimiento explicativo sin imponer una resolución interpretativa que el texto no explicita.
  doctrine_reference: Preservar la tensión interpretativa en vez de cerrarla.
translation_notes:
  revision_awareness: 'El contexto auditado de la POB en inglés pasó por ajustes de formulación: primero se usó «Messiah», luego una revisión lo cambió a «Christ» y después se restauró «Messiah» conforme a la política doctrinal del proyecto. Para el español se sigue la última decisión vigente: Χριστός se vierte como «Mesías».'
  spanish_consistency_notes:
  - Se evita «Señor» como sustituto del nombre divino porque este versículo no contiene el Tetragrámaton.
  - Se mantiene «iglesia» como término eclesial estándar para ἐκκλησία en este contexto paulino.
  - Se conserva el registro sobrio y directo, sin añadir explicaciones doctrinales en el texto principal.
