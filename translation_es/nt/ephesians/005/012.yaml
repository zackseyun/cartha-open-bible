translation:
  language: es
  text: Porque es vergonzoso aún[a] hablar de las cosas que se hacen en secreto por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que se hace en secreto».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... γινόμενα
  english_pob_choice: the things done
  chosen_spanish: las cosas que se hacen
  alternatives_spanish:
  - los hechos
  - las obras que se realizan
  lexicon: BDAG
  rationale: El artículo con el participio funciona de modo sustantivo, refiriéndose a acciones. En español, «las cosas que se hacen» conserva ese valor general e impersonal sin añadir precisión que el griego no exige.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento. «Porque» mantiene la relación causal-explicativa en un español claro y natural.
- source_word: κρυφῇ
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: BDAG
  rationale: El adverbio/dativo de manera indica ocultamiento. «En secreto» es la opción más idiomática y fiel al matiz de clandestinidad.
- source_word: γινόμενα
  english_pob_choice: done
  chosen_spanish: se hacen
  alternatives_spanish:
  - son hechas
  - están siendo hechas
  lexicon: BDAG
  rationale: Aunque la forma verbal tiene aspecto de participio presente, en español resulta natural expresar la acción con «se hacen», que preserva el carácter general de lo que ocurre sin forzar una perífrasis pesada.
- source_word: ὑπ’ αὐτῶν
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - por ellos mismos
  - por estas personas
  lexicon: BDAG
  rationale: ὑπό con genitivo señala agencia. «Por ellos» reproduce de forma directa el agente implícito por el contexto sin expandirlo innecesariamente en el texto principal.
- source_word: αἰσχρόν
  english_pob_choice: shameful
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - deshonroso
  - afrentoso
  lexicon: BDAG
  rationale: αἰσχρός expresa lo moralmente vergonzoso o indecoroso. «Vergonzoso» conserva ese peso ético en un español moderno y claro.
- source_word: καὶ λέγειν
  english_pob_choice: even to speak of
  chosen_spanish: aun hablar de
  alternatives_spanish:
  - incluso decir
  - hasta mencionarlo
  lexicon: BDAG
  rationale: 'El καί tiene fuerza ascendente: no sólo las acciones son vergonzosas, sino aun mencionarlas. «Aun hablar de» reproduce esa intensificación de modo natural.'
theological_decisions:
- issue: Alcance de αὐτῶν
  english_pob_reading: Retain the pronoun as 'them' without specifying the antecedent in the verse text.
  chosen_spanish_reading: Conservar «ellos» sin explicitar el antecedente dentro del versículo.
  alternative_spanish_readings:
  - «los hijos de desobediencia»
  - «los desobedientes»
  - explicar el antecedente en una nota
  rationale: El antecedente se entiende por el contexto inmediato. Añadirlo al versículo iría más allá del griego y cargaría el texto con una expansión interpretativa no requerida aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto fuente y con el audit trail inglés; no se identificaron revisiones textuales ni decisiones adicionales de importancia más allá de las equivalencias léxicas y del orden natural del español.
  spanish_consistency_notes:
  - Se mantiene «en secreto» como equivalente estable de κρυφῇ.
  - Se conserva el agente con «por ellos» para reflejar ὑπ’ αὐτῶν sin sobreexplicación.
  - Se usa lenguaje moral directo («vergonzoso») coherente con αἰσχρόν y con el registro POB.
  - La nota al pie preserva la alternativa inglesa sin convertirla en paráfrasis extensa.
