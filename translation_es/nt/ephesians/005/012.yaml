    rationale: «Porque vergonzoso es aun hablar...» reproduce demasiado de cerca el orden de énfasis del griego/inglés y suena forzado en español moderno. «Porque es vergonzoso aun hablar...» conserva el sentido con mejor legibilidad.
  - severity: low
    issue: Acentuación de «aún»
    rationale: En este contexto tiene valor de «incluso/hasta», por lo que la forma acentuada es la más clara y normativa en una edición cuidada.
