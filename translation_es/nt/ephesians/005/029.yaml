revisions:
- from: Porque nadie jamás aborreció su propia carne[a], sino que la alimenta y la cuida con ternura, así también el Mesías[c][b] a la iglesia.
  to: Porque nadie jamás aborreció su propia carne[a], sino que la alimenta y la cuida con ternura, así también el Mesías[c] cuida de la iglesia[b].
