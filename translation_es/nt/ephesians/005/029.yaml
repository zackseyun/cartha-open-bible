  - marker: b
    text: Lit. 'así también el Mesías a la iglesia'. El griego elide el verbo final y la comparación remite a las acciones de alimentar y cuidar con ternura.
    reason: alternative_reading
  - marker: c
    text: O 'Cristo'. El título griego Χριστός se traduce aquí como 'Mesías' para preservar su significado.
    reason: alternative_reading
