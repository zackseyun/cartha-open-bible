translation:
  language: es
  text: Porque nadie jamás aborreció su propia carne[a], sino que la alimenta y la cuida con ternura, así también el Mesías[c] cuida de la iglesia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuerpo'. Se conserva 'carne' porque el término apunta literalmente al propio ser físico, no al sentido metafórico de 'naturaleza pecaminosa'.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'así también el Mesías a la iglesia'. El griego elide el verbo final y la comparación remite a las acciones de alimentar y cuidar con ternura.
    reason: alternative_reading
  - marker: c
    text: O 'Cristo'. El título griego Χριστός se traduce aquí como 'Mesías' para preservar su significado.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - ninguno
  lexicon: BDAG
  rationale: Pronombre negativo indefinido estándar. 'Nadie' es natural en español y conserva la universalidad del original.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base o explicación de la afirmación anterior; 'Porque' reproduce bien la función discursiva en español.
- source_word: ποτε
  english_pob_choice: ever
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - alguna vez
  lexicon: BDAG
  rationale: Con negación y aoristo, ποτέ intensifica la idea de experiencia universal; 'jamás' comunica esa fuerza con naturalidad.
- source_word: τὴν ἑαυτοῦ σάρκα
  english_pob_choice: his own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - su propio cuerpo
  lexicon: BDAG
  rationale: σάρξ se traduce aquí por 'carne' por su sentido literal y concreto. 'Su propia' refleja ἑαυτοῦ. 'Cuerpo' suavizaría el léxico y perdería la decisión auditada de mantener 'flesh/carne' frente al sentido metafórico de 'naturaleza pecaminosa'.
- source_word: ἐμίσησεν
  english_pob_choice: hated
  chosen_spanish: aborreció
  alternatives_spanish:
  - odió
  - detestó
  lexicon: BDAG
  rationale: Verbo fuerte de rechazo. 'Aborreció' es idiomático, sobrio y suficientemente intenso en español.
- source_word: ἐκτρέφει
  english_pob_choice: nourishes
  chosen_spanish: la alimenta
  alternatives_spanish:
  - la nutre
  - la cría
  lexicon: BDAG
  rationale: En este contexto ἐκτρέφω tiene matiz de alimentar y sostener. 'La alimenta' es claro y evita una formulación demasiado abstracta.
- source_word: θάλπει
  english_pob_choice: cherishes
  chosen_spanish: la cuida con ternura
  alternatives_spanish:
  - la acaricia
  - la protege con ternura
  lexicon: BDAG
  rationale: θάλπω puede implicar cuidado tierno, incluso calor protector. 'La cuida con ternura' preserva el matiz afectivo sin forzar un calco como 'acaricia'.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la misma
  - a ella
  lexicon: BDAG
  rationale: Retoma 'carne', sustantivo femenino en español; el clítico átono es la forma natural de completar la elipsis verbal.
- source_word: καθὼς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: así también
  alternatives_spanish:
  - tal como también
  - como también
  lexicon: BDAG
  rationale: Mantiene la comparación y el añadido enfático de καὶ con un giro fluido en español.
- source_word: ὁ Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: 'Χριστός se rinde como título: ''el Mesías''. Se conserva la decisión del POB inglés de traducir el título en vez de transliterarlo como nombre litúrgico.'
- source_word: τὴν ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: a la iglesia
  alternatives_spanish:
  - a la asamblea
  lexicon: BDAG
  rationale: En uso paulino, ἐκκλησία se refiere al pueblo de Dios reunido; 'iglesia' es la forma estable y comprensible en español.
theological_decisions:
- issue: Renderizado de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La línea del POB en inglés traduce Χριστός para preservar su valor de título. En español, 'el Mesías' comunica ese sentido sin perder la referencia cristológica. Se mantiene 'Cristo' solo como alternativa tradicional, no como forma principal.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Renderizado de σάρξ en sentido literal
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza pecaminosa
  rationale: El contexto aquí habla del propio self físico, no del uso ético de 'carne' como inclinación al pecado. 'Carne' conserva la decisión lexical auditada y evita desplazar el sentido hacia 'naturaleza pecaminosa'.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del POB en inglés: la oscilación entre ''does the church'' y la formulación ajustada para reflejar mejor el objeto directo griego. En español se optó por una coordinación natural (''así también... a la iglesia'') que mantiene la elipsis verbal sin sobrecargar el texto. También se conservó la decisión auditada de traducir Χριστός como título (''Mesías'') y de mantener σάρξ como ''carne''.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto, reservando 'Cristo' para nota alternativa.
  - '''Carne'' se usa en sentido literal y se distingue de cualquier lectura ética de σάρξ.'
  - La comparación final evita añadir un verbo explícito que exceda el griego; la relación con 'alimenta' y 'cuida con ternura' queda implícita como en la fuente.
  - Se usa 'iglesia' como equivalente estable de ἐκκλησία en uso paulino.
