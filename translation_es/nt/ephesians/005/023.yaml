translation:
  language: es
  text: Pues el marido es cabeza de la esposa,[b] así como también el Mesías es cabeza de la iglesia,[d][c] él mismo es el Salvador del cuerpo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él mismo siendo el Salvador del cuerpo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Porque» al inicio del versículo.'
    reason: lexical_alternative
  - marker: c
    text: '«Cabeza» conserva la metáfora griega. Los intérpretes la entienden de diversas maneras: autoridad, prominencia o fuente.'
    reason: lexical_alternative
  - marker: d
    text: Griego «Cristo»; aquí se traduce «Mesías» porque el sentido titular está activo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En español, 'Porque' conserva la fuerza explicativa o causal del griego al inicio del versículo. 'Pues' o 'Ya que' también son posibles, pero 'Porque' mantiene un tono claro y natural sin debilitar la conexión con lo anterior.
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: marido
  alternatives_spanish:
  - esposo
  - hombre
  lexicon: BDAG
  rationale: En este contexto doméstico de relación matrimonial, el sentido relacional de ἀνήρ requiere una traducción como 'marido' o 'esposo'. 'Marido' es directo y natural en español, y evita la lectura genérica de 'hombre'.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - líder
  - fuente
  lexicon: BDAG
  rationale: Se conserva la metáfora griega 'cabeza' en lugar de resolverla como 'líder' o 'jefe'. Eso preserva la tensión interpretativa documentada por la POB, ya que el término puede implicar autoridad, prominencia o fuente, pero el texto no la especifica.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: Aquí γυνή está en paralelo con ἀνήρ en un marco matrimonial, por lo que 'esposa' expresa con precisión el sentido relacional. 'Mujer' sería demasiado general en español.
- source_word: ὡς καὶ
  english_pob_choice: as ... also
  chosen_spanish: así como también
  alternatives_spanish:
  - como también
  - así como
  lexicon: BDAG
  rationale: La frase comparativa se vierte de manera que conserve la relación analógica entre marido-esposa y Mesías-iglesia. 'Así como también' refleja bien la correlación y su matiz de comparación.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se usa 'Mesías' porque el término funciona aquí como título y la POB lo ha documentado así cuando el sentido titulativo está activo. 'Cristo' se reserva como forma fija sólo cuando el contexto o la tradición lo exijan.
- source_word: ἐκκλησία
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En este uso paulino, ἐκκλησία designa a la comunidad del pueblo redimido. 'Iglesia' es el equivalente moderno más claro y asentado en español para ese referente.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - mismo él
  lexicon: BDAG
  rationale: El pronombre es enfático y se expresa con 'él mismo' para conservar ese énfasis. En español, colocado después de la apposición, mantiene la fuerza del original sin sonar forzado.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: BDAG
  rationale: '''Salvador'' es la traducción estable y teológicamente adecuada en este contexto cristológico, preservando la idea de rescate y salvación.'
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: Se mantiene la metáfora paulina de 'cuerpo'. La expresión 'del cuerpo' sigue de cerca el genitivo griego, sin añadir un posesivo que el texto no explicita, aunque el referente contextual sea claro.
theological_decisions:
- issue: Sentido de κεφαλή en la comparación marido-esposa / Mesías-iglesia
  english_pob_reading: Retain the metaphor as 'head' without resolving it to 'authority over' or 'source' in the main text.
  chosen_spanish_reading: Mantener la metáfora como 'cabeza' sin resolverla en 'autoridad sobre' ni en 'fuente' en el texto principal.
  alternative_spanish_readings:
  - autoridad sobre
  - jefe
  - fuente
  rationale: La POB documenta que κεφαλή es interpretativamente debatido. En español conviene conservar la metáfora y no cerrar la discusión con una glosa interpretativa que el griego no exige.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El término funciona como título activo y debe conservar su fuerza mesiánica. 'Mesías' comunica mejor ese valor semántico y evita tratarlo solo como nombre propio.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Relación sintáctica de αὐτὸς σωτὴρ τοῦ σώματος
  english_pob_reading: himself the Savior of the body
  chosen_spanish_reading: él mismo, Salvador del cuerpo
  alternative_spanish_readings:
  - él mismo, siendo el Salvador del cuerpo
  - él mismo como Salvador del cuerpo
  rationale: El griego presenta una apposición breve y declarativa. En español, una coma permite reflejar esa estructura sin introducir una perífrasis de 'siendo' que suavizaría la construcción.
  doctrine_reference: Applied revision 2026-04-21 and 2026-04-23; syntax of nominative apposition
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB al preferir una estructura appositiva breve para αὐτὸς σωτὴρ τοῦ σώματος y al usar coma en lugar de un guion. También conserva la decisión auditada de mantener κεφαλή como metáfora y de traducir Χριστός como Mesías cuando funciona como título.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' conforme al criterio terminológico del proyecto para Χριστός en sentido titular.
  - Se preservó 'cabeza' para κεφαλή, evitando 'jefe' o 'autoridad' en el texto principal.
  - '''Marido'' y ''esposa'' reflejan el contexto matrimonial más estrecho que ''hombre'' y ''mujer''.'
  - La frase final conserva el valor enfático de αὐτός con 'él mismo' y la apposición nominal con una coma, de acuerdo con la revisión auditada.
