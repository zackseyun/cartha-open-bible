revisions:
- from: Porque el marido es cabeza de la esposa[a], así como también el Mesías es cabeza de la iglesia[c][b], él mismo, Salvador del cuerpo[d].
  to: Pues el marido es cabeza de la esposa,[b] así como también el Mesías es cabeza de la iglesia,[d][c] él mismo es el Salvador del cuerpo.[a]
  rationale: Se revisa el inicio a «Pues» para que la nota de alternativa sobre ὅτι tenga sentido y para mantener una conexión explicativa natural en español. Se ajusta la cláusula final a «él mismo es el Salvador del cuerpo» para lograr mejor fluidez y claridad en español, preservando el énfasis de αὐτός y la función appositiva/declarativa del griego. Se reordenan las notas para que sus anclajes correspondan de manera exacta al texto revisado.
