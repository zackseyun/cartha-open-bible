  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Mesías» por Χριστός, «iglesia» por ἐκκλησία, «cabeza» por κεφαλή, «Salvador» por σωτήρ y «cuerpo» por σῶμα. No hay conflicto con los términos doctrinales base. El ajuste principal es estilístico y de coherencia de nota en ὅτι.'
