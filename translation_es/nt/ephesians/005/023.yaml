  source_alignment_summary: 'El borrador sigue bien el griego en sus elementos principales: ἀνήρ/γυνή se entienden correctamente como relación matrimonial; κεφαλή se conserva como metáfora; Χριστός se vierte apropiadamente como «Mesías»; y αὐτὸς σωτὴρ τοῦ σώματος se entiende como apposición enfática. Sin embargo, hay pequeños problemas de fidelidad al expediente inglés y de naturalidad española: la nota [a] no puede ofrecer «porque» como alternativa cuando el texto principal ya usa «Porque», y la colocación/puntuación de «él mismo, Salvador del cuerpo» suena menos natural que una apposición directa española.'
