translation:
  language: es
  text: dando siempre gracias por todo[b] a Dios el Padre en el nombre de nuestro Señor Jesús Mesías[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «Jesucristo».
    reason: alternative_reading
  - marker: b
    text: «Por todo» puede entenderse más literalmente como «por todas las cosas»; algunos lo toman como «por todos», aunque el contexto favorece el sentido amplio de circunstancias o asuntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστοῦντες
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - agradeciendo
  lexicon: BDAG
  rationale: El participio presente expresa una acción continua o acompañante; en español, «dando gracias» conserva bien esa continuidad y suena natural en un registro bíblico moderno.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  lexicon: BDAG
  rationale: Adverbio temporal general; «siempre» es la equivalencia más natural y concisa en español.
- source_word: ὑπὲρ πάντων
  english_pob_choice: for everything
  chosen_spanish: por todo
  alternatives_spanish:
  - por todas las cosas
  - por todo lo que hay
  - por todos
  lexicon: BDAG
  rationale: La combinación con el genitivo puede abarcar «por todo» o «por todas las cosas». El contexto de gratitud amplia favorece una lectura de circunstancias o asuntos, no de personas; por eso se evita «por todos» en el cuerpo del texto.
- source_word: ἐν ὀνόματι
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - por medio del nombre
  - con la autoridad de
  lexicon: BDAG
  rationale: Se conserva el giro bíblico reconocido en español; su fuerza representativa y mediadora queda abierta sin añadir interpretación más explícita que la del griego.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico; «Señor» es la forma española estándar y reverente para ese título.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene la decisión de traducir Χριστός como «Mesías» cuando opera como título. En español, «Jesús Mesías» preserva esa fuerza titular sin convertirlo en un nombre fijo tradicional.
- source_word: τῷ θεῷ καὶ πατρί
  english_pob_choice: to God the Father
  chosen_spanish: a Dios el Padre
  alternatives_spanish:
  - a Dios, el Padre
  - a Dios y Padre
  lexicon: BDAG
  rationale: El dativo marca el destinatario de la acción de gracias. «A Dios el Padre» expresa de forma natural la referencia conjunta a Dios y al Padre, sin perder la relación sintáctica del original.
theological_decisions:
- issue: Traducción de Χριστός en el título de Jesús
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la pauta del proyecto de traducir Χριστός como «Mesías» cuando tiene valor titular. Se conserva la alternativa tradicional en nota para respetar la tensión entre uso litúrgico e ինտención semántica del griego.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Alcance de ὑπὲρ πάντων
  english_pob_reading: for everything
  chosen_spanish_reading: por todo
  alternative_spanish_readings:
  - por todos
  rationale: El contexto exhorta a una gratitud integral. «Por todo» mantiene la amplitud sin inclinarse innecesariamente hacia personas («por todos»), aunque esa posibilidad léxica existe en abstracto.
  doctrine_reference: BDAG sobre ὑπέρ con genitivo; contexto inmediato de gratitud general en Efesios 5
- issue: Orden sintáctico de los complementos
  english_pob_reading: always giving thanks for everything to God the Father in the name of our Lord Jesus Messiah
  chosen_spanish_reading: siempre dando gracias por todo a Dios el Padre en el nombre de nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - siempre dando gracias a Dios el Padre por todo en el nombre de nuestro Señor Jesús Mesías
  rationale: En español, el orden elegido refleja con claridad que «por todo» modifica a «dando gracias», mientras «a Dios el Padre» marca el destinatario de la acción de gracias. Se evita una reordenación que oscurezca la relación de los sintagmas.
  doctrine_reference: Sintaxis del participio presente y del dativo de destinatario en el griego de Efesios 5:20
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último tramo de revisión del expediente: se mantuvo el orden sintáctico que coloca primero la acción de gracias, luego el complemento de alcance («por todo») y finalmente el destinatario («a Dios el Padre»). También se respetó la decisión doctrinal de conservar «Mesías» para Χριστός, dejando la forma tradicional en nota. Frente a la oscilación del audit trail entre «Christ» y «Messiah», la versión española adopta consistentemente «Mesías» como equivalente titular.'
  spanish_consistency_notes:
  - Se usa «Jesús Mesías» de manera consistente con la política del proyecto para Χριστός como título.
  - Se conserva «Dios el Padre» sin expandirlo a una glosa más interpretativa.
  - «Por todo» mantiene la amplitud del griego y evita una restricción indebida a personas.
  - La puntuación final con coma refleja la clausula participial abierta del griego y el cierre del versículo en serie retórica.
