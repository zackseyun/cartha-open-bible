translation:
  language: es
  text: Por tanto[a], no lleguen a ser partícipes de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No lleguen a ser participantes con ellos'' o ''No tengan parte con ellos''. La frase, según el contexto, se refiere a compartir su conducta pecaminosa o sus consecuencias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  english_pob_choice: do not
  chosen_spanish: no se hagan
  alternatives_spanish:
  - no sean
  - no lleguen a ser
  lexicon: BDAG
  rationale: La negación con el imperativo presente se expresa naturalmente en español con una prohibición directa. 'No se hagan' conserva el sentido de entrar en un estado o condición, equivalente al 'do not become' del POB.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Indica inferencia lógica desde el contexto inmediato; 'Por tanto' preserva bien la relación discursiva sin sonar forzado.
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: se hagan
  alternatives_spanish:
  - lleguen a ser
  - se vuelvan
  lexicon: BDAG
  rationale: γίνομαι aquí apunta a entrar en una condición. 'Se hagan' comunica ese cambio de estado con naturalidad en español y evita una traducción meramente estática.
- source_word: συμμέτοχοι
  english_pob_choice: partners
  chosen_spanish: partícipes
  alternatives_spanish:
  - socios
  - compañeros
  - participantes
  lexicon: BDAG
  rationale: El término denota quienes comparten algo con otros. 'Partícipes' mantiene la idea de participación compartida y, en contexto, deja abierta la referencia a compartir en la conducta o en sus consecuencias, como en el audit trail inglés.
- source_word: αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - de ellos
  - en sus actos
  lexicon: BDAG
  rationale: El pronombre genitivo se expresa idiomáticamente en español con 'con ellos' al depender de 'partícipes'. No se explicita 'en sus actos' para no sobreinterpretar más allá del texto griego, aunque el contexto lo sugiere.
theological_decisions:
- issue: Alcance de la participación prohibida
  english_pob_reading: A general prohibition against sharing in the people and their sinful way of life, rendered without over-specifying the object.
  chosen_spanish_reading: Una prohibición general de hacerse partícipes de ellos, dejando implícita la participación en su conducta pecaminosa o en sus consecuencias.
  alternative_spanish_readings:
  - No se hagan partícipes de esas cosas
  - No participen de sus obras
  rationale: El griego nombra personas ('ellos') y no añade un objeto explícito como 'esas cosas'. Por eso conviene mantener la referencia personal en el texto principal y dejar que el contexto determine la participación implícita en sus obras o su destino.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje se mantiene alineado con el pasaje fuente griego y con el audit trail inglés; no se documentan revisiones posteriores que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra sustitución innecesaria, ya que no hay nombre divino en este versículo.
  - '''Partícipes'' conserva mejor la relación semántica con συμμέτοχοι que ''socios'', que podría sonar demasiado comercial en español.'
  - La nota al pie preserva la alternativa léxica documentada por el POB inglés sin sobrecargar el texto principal.
