review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico de μὴ οὖν γίνεσθε συμμέτοχοι αὐτῶν como una prohibición inferencial: ''Por tanto ... no ... con ellos''. Sin embargo, ''no se hagan partícipes con ellos'' suena algo forzado en español y no representa con la mejor naturalidad la relación de γίνεσθε + συμμέτοχοι. El matiz de ''become'' puede mantenerse mejor con ''no lleguen a ser''.'
  spanish_quality_summary: La redacción es comprensible, pero 'hacerse partícipe con' es menos idiomático que 'llegar a ser partícipes de' o 'ser partícipes con'. Además, la nota al pie reproduce como alternativa la misma frase principal, lo que la vuelve defectuosa. Conviene pulir la sintaxis y corregir la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Partícipes' encaja bien para συμμέτοχοι y preserva la apertura semántica documentada por el POB. 'Por tanto' para οὖν también está bien. La mejora propuesta es estilística y de precisión idiomática, no de glosario.
  issues:
  - severity: medium
    issue: 'Expresión principal poco idiomática: ''no se hagan partícipes con ellos'''
    rationale: Aunque entendible, en español bíblico-natural 'hacerse partícipe con' suena torpe. El griego γίνεσθε pide una idea de llegar a ser, y συμμέτοχοι αὐτῶν se expresa más naturalmente como 'partícipes de ellos' o, mejor aún en sentido contextual, conservando la referencia personal sin sobreexplicarla.
  - severity: low
    issue: Nota al pie defectuosa y redundante
    rationale: La nota ofrece como alternativa 'No se hagan partícipes con ellos', que es idéntica al texto principal. Debe presentar alternativas reales, paralelas a 'participants/partakers' del inglés, y mantener la explicación contextual.
  revised_spanish_text: Por tanto[a], no lleguen a ser partícipes de ellos.
  revised_footnotes:
  - marker: a
    text: 'O: ''No lleguen a ser participantes con ellos'' o ''No tengan parte con ellos''. La frase, según el contexto, se refiere a compartir su conducta pecaminosa o sus consecuencias.'
    reason: lexical_alternative
