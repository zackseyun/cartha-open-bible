- from: Por tanto[a], no se hagan partícipes con ellos.
  to: Por tanto[a], no lleguen a ser partícipes de ellos.
  rationale: Se ajusta la frase para que suene más natural en español y refleje mejor el valor ingresivo de γίνεσθε ('lleguen a ser'). Se mantiene la referencia personal 'de ellos' sin sobreinterpretar el objeto implícito. También se corrige la nota al pie para que ofrezca alternativas reales y útiles.
