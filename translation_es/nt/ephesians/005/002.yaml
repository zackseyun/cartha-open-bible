translation:
  language: es
  text: y anden en amor[a], así como también el Mesías[b] nos amó y se entregó a sí mismo por nosotros[c], como ofrenda y sacrificio a Dios, como aroma fragante[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con amor». La expresión griega conserva la idea de esfera o modo de vida, no solo de afecto interior.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». Χριστός aparece aquí como título; por eso se traduce «Mesías» en el texto principal.
    reason: alternative_reading
  - marker: c
    text: O «en nuestro favor». El griego ὑπὲρ ἡμῶν puede expresar una acción representativa o benefactora, sin exigir una formulación más estrecha.
    reason: lexical_alternative
  - marker: d
    text: La expresión «como aroma fragante» evoca el lenguaje sacrificial del Antiguo Testamento para una ofrenda agradable a Dios.
    reason: cross_reference
lexical_decisions:
- source_word: περιπατεῖτε
  english_pob_choice: walk
  chosen_spanish: anden
  alternatives_spanish:
  - vivan
  - conduzcan su vida
  lexicon: BDAG
  rationale: El verbo conserva la metáfora paulina del caminar como modo de vida. En español, «anden» mantiene la imagen sin sonar forzado; «vivan» y «conduzcan su vida» explican el sentido pero atenúan la figura verbal.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - en la esfera del amor
  lexicon: BDAG
  rationale: Se preserva la preposición y la idea de ámbito o modo. «En amor» es breve y natural en español bíblico contemporáneo, aunque menos explicativo que «con amor».
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El griego usa el título con artículo; por eso se traduce como título y no se deja como nombre litúrgico. «Mesías» mantiene la función titular y la conexión con el lenguaje bíblico original.
- source_word: ἠγάπησεν ἡμᾶς
  english_pob_choice: loved us
  chosen_spanish: nos amó
  alternatives_spanish:
  - nos amó con amor
  - nos tuvo amor
  lexicon: BDAG
  rationale: Es el equivalente directo y natural del aoristo, manteniendo el vínculo verbal con ἀγάπη / amor.
- source_word: παρέδωκεν ἑαυτὸν
  english_pob_choice: gave himself up
  chosen_spanish: se entregó a sí mismo
  alternatives_spanish:
  - se entregó
  - se dio a sí mismo
  lexicon: BDAG
  rationale: La idea es de autoentrega sacrificial. «Se entregó a sí mismo» expresa la acción completa y conserva la fuerza reflexiva sin volverla mecánica.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en nuestro favor
  - en lugar nuestro
  lexicon: BDAG
  rationale: «Por nosotros» es la forma más natural en español y preserva la amplitud semántica de ὑπέρ sin cerrar la frase a una sola interpretación (representativa o benefactiva).
- source_word: προσφορὰν καὶ θυσίαν
  english_pob_choice: an offering and sacrifice
  chosen_spanish: como ofrenda y sacrificio
  alternatives_spanish:
  - una ofrenda y un sacrificio
  - como ofrenda y como sacrificio
  lexicon: BDAG
  rationale: Se mantienen los dos términos cultuales sin fusionarlos. El «como» inicial reproduce la relación explicativa/predicativa del griego con naturalidad en español.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: BDAG
  rationale: La dativa de destinatario o dirección se expresa bien con «a Dios», más natural que «para Dios» en un contexto sacrificial.
- source_word: εἰς ὀσμὴν εὐωδίας
  english_pob_choice: for a fragrant aroma
  chosen_spanish: en aroma fragante
  alternatives_spanish:
  - para fragancia aromática
  - como olor fragante
  lexicon: BDAG
  rationale: Se conserva el eco sacrificial del AT y la imagen concreta de olor/aroma agradable, evitando un giro demasiado interpretativo. «Fragante» retiene la calidad descriptiva de εὐωδίας.
theological_decisions:
- issue: Rendering of Χριστός as title rather than name-form
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El artículo y el uso en este contexto favorecen lectura titular. Traducirlo como «Mesías» evita perder el valor semántico del título y sigue la línea auditada del POB inglés.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Force of ὑπὲρ ἡμῶν in a sacrificial context
  english_pob_reading: for us
  chosen_spanish_reading: por nosotros
  alternative_spanish_readings:
  - en nuestro favor
  - en lugar nuestro
  rationale: «Por nosotros» deja abierta la fuerza representativa/benefactiva del ὑπέρ sin imponer una formulación más precisa de sustitución que el griego no explicita aquí. Se conserva la tensión teológica en lugar de resolverla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sacrificial idiom of εἰς ὀσμὴν εὐωδίας
  english_pob_reading: for a fragrant aroma
  chosen_spanish_reading: en aroma fragante
  alternative_spanish_readings:
  - como olor fragante
  - para un aroma fragante
  rationale: La frase refleja el lenguaje sacrificial bíblico con fidelidad y sin domesticarlo a una simple metáfora sentimental. «En aroma fragante» es breve y respetuoso del eco veterotestamentario.
  doctrine_reference: OT sacrificial imagery / cross-reference echo
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios adicionales (latest_revision_pass: unchanged = true). La redacción española se mantiene alineada con el audit trail inglés y con el texto griego SBLGNT, conservando tanto la imagen de caminar como la formulación sacrificial y el título cristológico.'
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός en coherencia con la política terminológica del proyecto y con el análisis del artículo griego.
  - Se prefirió «por nosotros» / «por nosotros» como opción amplia para ὑπὲρ ἡμῶν, dejando abierta la tensión representativa-benefactiva.
  - Se mantuvo el paralelismo cultual «ofrenda y sacrificio» para no colapsar dos sustantivos distintos.
  - Se evitó «SEÑOR» para θεός; se traduce «Dios» conforme a los lineamientos del proyecto.
  - La nota del aroma se formuló de modo breve para preservar el eco bíblico sin añadir interpretación excesiva.
