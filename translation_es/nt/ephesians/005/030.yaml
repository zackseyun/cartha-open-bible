lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: El griego introduce la razón de la afirmación anterior; «porque» expresa con naturalidad en español la fuerza causal y mantiene el vínculo lógico sin sonar artificial.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - miembros del cuerpo
  lexicon: BDAG
  rationale: «Miembros» conserva la metáfora paulina de pertenencia orgánica al cuerpo y evita reducir el sentido a piezas anatómicas; en español es el equivalente más directo y eclesialmente claro.
- source_word: ἐσμὲν
  english_pob_choice: are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: BDAG
  rationale: La cópula presente se vierte mejor con «somos» en español, porque expresa identidad y pertenencia, no mera ubicación.
- source_word: σώματος
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - organismo
  lexicon: BDAG
  rationale: «Cuerpo» reproduce el término básico y la metáfora paulina sin añadir explicaciones que el texto no da; en este contexto remite al cuerpo de Cristo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El pronombre posesivo español «su» conserva la referencia personal a Cristo en el contexto inmediato, y es la forma más natural en español para la relación posesiva.
theological_decisions:
- issue: Lectura breve frente a la expansión textual «de su carne y de sus huesos»
  english_pob_reading: 'Translate only the SBLGNT text: ''because we are members of his body.''; note the longer reading as a variant'
  chosen_spanish_reading: 'Traducir solo la lectura breve: «porque somos miembros de su cuerpo»; anotar la expansión larga como variante textual'
  alternative_spanish_readings:
  - porque somos miembros de su cuerpo, de su carne y de sus huesos
  rationale: El texto fuente proporcionado es la forma breve. Para no disimular la evidencia textual, la expansión tradicional se mantiene fuera del cuerpo principal y se señala como variante en nota.
  doctrine_reference: Primacía del testimonio textual original; preservación de variantes sin resolverlas por armonización
- issue: Referencia del posesivo a Cristo
  english_pob_reading: his refers to Christ in the surrounding context
  chosen_spanish_reading: «su» se entiende referido a Cristo por el contexto inmediato
  alternative_spanish_readings:
  - su (sin especificación)
  - de él
  rationale: Aunque el pronombre no nombra a Cristo explícitamente, el contexto de Efesios 5 lo identifica con claridad; mantener el posesivo evita una paráfrasis innecesaria y respeta la referencia contextual.
  doctrine_reference: Cristología contextual en la argumentación paulina
translation_notes:
  revision_awareness: Concordamos con el audit trail en leer el texto griego corto de SBLGNT y reflejar la expansión manuscrita solo como variante textual, sin incorporarla al texto principal.
  spanish_consistency_notes:
  - Se mantiene la terminología POB de «cuerpo» y «miembros» para conservar la metáfora paulina.
  - «Su» conserva la referencia a Cristo sin introducir un nombre propio que el verso no repite.
  - La nota textual usa una formulación sobria y transparente, acorde con la política de variantes del POB.
