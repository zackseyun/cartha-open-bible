    issue: '''probando'' no es la mejor opción para δοκιμάζοντες en este contexto'
    rationale: Aunque lexicalmente posible, en español bíblico actual 'probando qué es agradable al Señor' puede sonar menos natural y más ambiguo que el griego y que el inglés auditado. El sentido es evaluar/discernir/comprobar, no simplemente 'probar'.
  - severity: low
    issue: La nota al pie puede refinarse tras el ajuste del verbo principal
    rationale: Si el texto principal usa 'comprobando', conviene mantener como alternativas formas distintas y claramente útiles, como 'discerniendo' o 'averiguando', en lugar de dejar una nota pensada para otro verbo base.
