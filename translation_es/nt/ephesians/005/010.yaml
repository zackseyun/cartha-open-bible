translation:
  language: es
  text: comprobando qué es agradable al Señor;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «discerniendo» o «averiguando» qué es agradable al Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμάζοντες
  english_pob_choice: testing
  chosen_spanish: probando
  alternatives_spanish:
  - examinando
  - discerniendo
  - probando y aprobando
  lexicon: BDAG
  rationale: El participio presente activo conserva una acción continua en el flujo exhortativo. "Probando" comunica la idea de examinar para verificar o poner a prueba, sin perder naturalidad en español. "Discerniendo" es posible, pero puede debilitar el matiz de prueba/evaluación que destaca δοκιμάζω.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - lo que
  - aquello que
  lexicon: BDAG
  rationale: En la pregunta indirecta, "qué" es la forma más natural en español y refleja bien el valor interrogativo/indefinido del griego.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - resulta ser
  - se trata de
  lexicon: BDAG
  rationale: Copula simple; no se requiere expansión en español.
- source_word: εὐάρεστον
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - placentero
  - aceptable
  - bien agradable
  lexicon: BDAG
  rationale: '"Agradable" expresa con naturalidad en español la idea de algo que agrada o es acepto ante alguien. "Aceptable" puede funcionar, pero suena más jurídico y menos relacional. Se evita una calca como "bien agradable" por ser poco idiomática.'
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Jesús
  - ante el Señor
  lexicon: BDAG
  rationale: El dativo con εὐάρεστον se expresa naturalmente con "a/al" en español. Se conserva "Señor" como título, dejando sin resolver explícitamente la referencia cristológica para respetar la forma del texto fuente y la tensión documentada en el auditorio inglés.
theological_decisions:
- issue: Referencia de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego usa κύριος sin expansión. Aunque el contexto paulino puede leerse cristológicamente, la traducción debe preservar el título tal como aparece y no cerrar la referencia más allá del texto explícito.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una decisión estable: το δοκιμάζοντες se traduce con una acción de examen/evaluación, y κύριος se deja como "Lord" sin especificación adicional. No hubo revisiones aplicadas; el borrador español sigue esa línea sin introducir expansión doctrinal.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno.
  - '"Señor" conserva el título sin sustituirlo por una formulación interpretativa más explícita.'
  - La nota ofrece alternativas reales para δοκιμάζοντες sin convertirlas en paráfrasis del texto principal.
