  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección «temer» para φοβῆται concuerda con la revisión inglesa final y mantiene transparencia léxica; «esposa/marido» preserva la especificidad conyugal del griego.
