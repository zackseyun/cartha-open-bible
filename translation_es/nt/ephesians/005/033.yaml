translation:
  language: es
  text: Sin embargo, ustedes también—cada uno en particular[a]—deben amar a su propia esposa como a sí mismos, y la esposa debe temer a su marido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión distributiva señala que la instrucción se aplica a cada esposo por separado, no solo al grupo en conjunto.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «que la esposa tema a su marido»; aquí «temer» puede llevar el sentido de respeto reverente, no de terror servil.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: BDAG
  rationale: La partícula introduce una transición conclusiva y concesiva. «Sin embargo» conserva bien el giro adversativo sin sonar forzado en español contemporáneo.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes igualmente
  lexicon: BDAG
  rationale: Mantiene la inclusión enfática de los destinatarios en la exhortación. «Ustedes también» es natural y refleja el énfasis del griego.
- source_word: οἱ καθ’ ἕνα ἕκαστος
  english_pob_choice: each one individually
  chosen_spanish: cada uno en particular
  alternatives_spanish:
  - cada uno individualmente
  - cada uno por separado
  lexicon: BDAG
  rationale: La expresión distributiva enfatiza que la instrucción recae persona por persona. «En particular» conserva ese matiz distributivo y evita una lectura meramente colectiva.
- source_word: τὴν ἑαυτοῦ γυναῖκα
  english_pob_choice: his own wife
  chosen_spanish: su propia esposa
  alternatives_spanish:
  - su esposa
  - su mujer
  lexicon: BDAG
  rationale: En este contexto γυνή significa «esposa», no «mujer» en sentido general. «Su propia esposa» conserva el matiz reflexivo de ἑαυτοῦ y la especificidad marital.
- source_word: ἀγαπάτω
  english_pob_choice: must love
  chosen_spanish: debe amar
  alternatives_spanish:
  - debe amarla
  - ha de amar
  lexicon: BDAG
  rationale: El imperativo presente distributivo se traduce de forma normativa y clara. «Debe amar» comunica el mandato sin recurrir a un calco rígido.
- source_word: ὡς ἑαυτόν
  english_pob_choice: as himself
  chosen_spanish: como a sí mismo
  alternatives_spanish:
  - como él mismo
  - como se ama a sí mismo
  lexicon: BDAG
  rationale: La comparación reflexiva se expresa de manera idiomática en español con «como a sí mismo», preservando el estándar de autoconducta del griego.
- source_word: ἡ δὲ γυνὴ
  english_pob_choice: and the wife
  chosen_spanish: y la esposa
  alternatives_spanish:
  - pero la esposa
  - la esposa, en cambio
  lexicon: BDAG
  rationale: Aquí γυνή sigue refiriéndose a la esposa en el paralelo doméstico. Se vierte con «y» para una coordinación natural, manteniendo la segunda cláusula exhortativa.
- source_word: ἵνα φοβῆται
  english_pob_choice: must fear
  chosen_spanish: debe temer
  alternatives_spanish:
  - debe respetar
  - debe reverenciar
  lexicon: BDAG
  rationale: φόβῃται conserva su valor léxico de «temer»; el texto español mantiene esa tensión semántica y no la suaviza a «respetar». El contexto matrimonial mitigará la lectura de terror, pero la palabra elegida sigue siendo la más cercana al original.
- source_word: τὸν ἄνδρα
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: BDAG
  rationale: En este contexto ἀνήρ significa «marido». La preposición «a» marca el complemento directo personal según el español normal.
theological_decisions:
- issue: Valor de φοβῆται en una exhortación matrimonial
  english_pob_reading: fear
  chosen_spanish_reading: temer
  alternative_spanish_readings:
  - respetar
  - reverenciar
  rationale: La auditoría inglesa volvió desde «respect» a «fear» para mayor precisión léxica. En español, «temer» preserva esa correspondencia directa con φόβηται y deja visible la tensión interpretativa; no la resuelve prematuramente con «respetar».
  doctrine_reference: Translation philosophy §3, §6
- issue: Especificidad de género y vínculo conyugal
  english_pob_reading: his own wife ... the wife ... her husband
  chosen_spanish_reading: su propia esposa ... la esposa ... a su marido
  alternative_spanish_readings:
  - su cónyuge ... la cónyuge ... a su cónyuge
  rationale: El griego conserva singularidad y relación marital concreta. La traducción española mantiene esa especificidad en vez de neutralizarla, siguiendo el principio de precisión de género y relación del texto fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando los marcadores de nota directamente en el texto español. Además, se alineó la traducción con la revisión más reciente del audit trail, que favorece «temer» para φοβῆται frente a una atenuación a «respetar».
  spanish_consistency_notes:
  - 'Se preserva el paralelismo conyugal de la cláusula griega: esposo/esposa, no una formulación neutra que diluya el vínculo.'
  - «Sin embargo» refleja adecuadamente πλὴν como transición concesiva al cierre de la sección.
  - «Cada uno en particular» mantiene la fuerza distributiva de οἱ καθ’ ἕνα ἕκαστος.
  - Se evita introducir vocabulario eclesial no presente en el pasaje.
