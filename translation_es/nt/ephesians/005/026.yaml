    issue: '''Lavamiento'' suena algo rígido en español actual'
    rationale: Aunque es defendible por registro bíblico y cercanía léxica a λουτρόν, 'lavado' o 'baño' serían más naturales. Aquí 'lavado' conserva el sentido sin sobreinterpretar.
