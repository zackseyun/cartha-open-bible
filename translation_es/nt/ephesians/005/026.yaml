  text: para santificarla[a], habiéndola limpiado por el lavado del agua con la palabra[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «para hacerla santa, habiéndola limpiado por el lavado del agua con la palabra».'
    reason: lexical_alternative
