lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: Introduce el propósito de manera natural en español, preservando la fuerza final sin sonar forzado.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El pronombre femenino singular se conserva como objeto directo retomando a la iglesia en el contexto.
- source_word: ἁγιάσῃ
  english_pob_choice: might sanctify
  chosen_spanish: santificarla
  alternatives_spanish:
  - hacerla santa
  - consagrarla
  lexicon: BDAG
  rationale: '"Santificar" mantiene la conexión léxica y teológica con la santidad mejor que una paráfrasis explicativa.'
- source_word: καθαρίσας
  english_pob_choice: having cleansed her
  chosen_spanish: habiéndola limpiado
  alternatives_spanish:
  - después de limpiarla
  - habiéndola purificado
  lexicon: BDAG
  rationale: El participio aoristo se vierte como acción anterior/antecedente al verbo principal, conservando la secuencia del griego.
- source_word: τῷ λουτρῷ
  english_pob_choice: by the washing
  chosen_spanish: por el lavamiento
  alternatives_spanish:
  - por el baño
  - mediante el lavamiento
  lexicon: BDAG
  rationale: '"Lavamiento" conserva el sentido de λουτρόν y permite una expresión idiomática en español, manteniendo la referencia a un acto de lavado.'
- source_word: τοῦ ὕδατος
  english_pob_choice: of water
  chosen_spanish: del agua
  alternatives_spanish:
  - de agua
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene de forma transparente como complemento nominal de "lavamiento".
- source_word: ἐν ῥήματι
  english_pob_choice: with the word
  chosen_spanish: con la palabra
  alternatives_spanish:
  - con el mensaje
  - por la palabra
  - en palabra
  lexicon: BDAG
  rationale: '"Con la palabra" preserva la ambigüedad instrumental y el valor de ῥῆμα sin decidir demasiado entre "palabra" y "mensaje".'
- source_word: ῥήματι
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - dicho
  - expresión
  lexicon: BDAG
  rationale: '"Palabra" mantiene el alcance amplio del término y su resonancia bíblica, sin estrecharlo a una formulación doctrinal específica.'
theological_decisions:
- issue: Relación entre lavamiento, agua y palabra en un posible trasfondo bautismal
  english_pob_reading: Preserve the text's imagery and ambiguity without specifying a denominational sacramental theology.
  chosen_spanish_reading: Conservar la imaginería del lavamiento con agua y palabra sin fijar una teología sacramental denominacional.
  alternative_spanish_readings:
  - Lectura bautismal sacramental explícita
  - Lectura puramente metafórica no sacramental
  rationale: El griego sugiere fuertemente imaginería de lavado y posiblemente bautismal, pero no obliga a resolver el alcance teológico. La traducción mantiene esa tensión.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Valor de ῥήματι como 'word'
  english_pob_reading: Use 'word' in the main text.
  chosen_spanish_reading: Usar 'palabra' en el texto principal.
  alternative_spanish_readings:
  - mensaje
  - palabra pronunciada
  - proclamación
  rationale: '"Palabra" es suficientemente amplia para incluir el habla o mensaje proclamado, sin restringir indebidamente el sentido del término griego.'
  doctrine_reference: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió la anclaje de las notas para que cada marcador aparezca exactamente en el texto español, manteniendo la lectura de tensión teológica y la elección léxica documentada por el POB en inglés.
  spanish_consistency_notes:
  - Se prefirió «palabra» para ῥῆμα por coherencia con el registro bíblico y la decisión del POB en inglés.
  - Se usó «santificar» para ἁγιάζω en lugar de «hacer santa» por consistencia terminológica.
  - Se mantuvo «lavamiento» para λουτρόν, evitando una paráfrasis que borrara la imaginería del pasaje.
  - La secuencia participial se conservó con «habiéndola limpiado» para reflejar el antecedente temporal del participio aoristo.
