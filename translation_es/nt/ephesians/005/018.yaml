translation:
  language: es
  text: Y no se embriaguen con vino[a], en lo cual hay desenfreno; más bien, sean llenos del Espíritu,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Espíritu»; algunos entienden esto de manera más general como «en espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: μεθύσκεσθε
  english_pob_choice: do not get drunk
  chosen_spanish: no se emborrachen
  alternatives_spanish:
  - no se emborrachen
  - no estén borrachos
  - no lleguen a embriagarse
  lexicon: BDAG
  rationale: El imperativo presente con μή expresa prohibición de un estado/proceso de embriaguez. En español, «emborracharse» es idiomático, natural y conserva la fuerza exhortativa sin suavizarla a un mero estado pasivo.
- source_word: οἴνῳ
  english_pob_choice: with wine
  chosen_spanish: con vino
  alternatives_spanish:
  - por vino
  - a causa del vino
  lexicon: BDAG
  rationale: El dativo con el verbo se expresa de manera natural en español con «con vino», manteniendo la idea del medio o sustancia ligada a la embriaguez.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: porque eso lleva a
  alternatives_spanish:
  - en el cual hay
  - donde hay
  lexicon: BDAG
  rationale: La relación relativa puede entenderse como referencia al vino o al estado de embriaguez asociado. «Porque eso lleva a» comunica la conexión causal implícita sin forzar una literalidad extraña en español.
- source_word: ἀσωτία
  english_pob_choice: debauchery
  chosen_spanish: desenfreno
  alternatives_spanish:
  - debauchería
  - disolución
  - desorden
  lexicon: BDAG
  rationale: El sustantivo denota conducta moralmente desatada y despilfarradora. «Desenfreno» es claro, bíblico y suficientemente fuerte en español, aunque «debauchería» sería más etimológico pero menos natural.
- source_word: πληροῦσθε
  english_pob_choice: be filled
  chosen_spanish: sean llenos
  alternatives_spanish:
  - sean continuamente llenos
  - llénense
  lexicon: BDAG
  rationale: El imperativo presente pasivo sugiere una acción continua o habitual, pero en español la forma imperativa pasiva refleja mejor la exhortación que una perífrasis demasiado explicativa. «Sean llenos» conserva la pasividad y la apertura aspectual.
- source_word: πνεύματι
  english_pob_choice: with the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - con el Espíritu
  - en el Espíritu
  - por el Espíritu
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «with the Spirit» para preservar la ambigüedad de medio/esfera, en español «llenos del Espíritu» es la construcción más natural y reverente. Mantiene la lectura del Espíritu Santo sin resolver por completo la relación semántica de la preposición.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: the Spirit (Holy Spirit), with footnoted alternative 'in spirit'
  chosen_spanish_reading: el Espíritu (Espíritu Santo), con alternativa notada 'en espíritu'
  alternative_spanish_readings:
  - espíritu
  - el propio espíritu humano
  rationale: El contexto paulino favorece la referencia al Espíritu Santo, y el español debe reflejar esa lectura principal. Sin embargo, como el griego es anartro y la POB inglesa preserva la alternativa, se mantiene la tensión textual con una nota que permite la lectura más general de 'en espíritu'.
  doctrine_reference: Preservar la ambigüedad documentada sin borrar la lectura pneumatológica principal.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y la decisión auditada de la POB inglesa. Se ajustó el enlace relativo ἐν ᾧ para que suene natural en español sin perder la relación causal entre vino y desenfreno, y se conservó la ambigüedad de πνεύματι mediante nota.
  spanish_consistency_notes:
  - Se emplea «Espíritu» con mayúscula cuando la lectura principal es el Espíritu Santo.
  - «Desenfreno» se usa para ἀσωτία como término moral fuerte y comprensible.
  - La construcción «sean llenos» conserva la pasividad del griego sin sobreexplicar el aspecto.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
