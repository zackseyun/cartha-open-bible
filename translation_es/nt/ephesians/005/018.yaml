- from: Y no se emborrachen con vino[a], porque eso lleva al desenfreno; más bien, sean llenos del Espíritu,
  to: Y no se embriaguen con vino[a], en lo cual hay desenfreno; más bien, sean llenos del Espíritu,
  rationale: Se corrige la cláusula relativa para reflejar con mayor fidelidad ἐν ᾧ ἐστιν ἀσωτία sin convertirla en una paráfrasis causal. También se ajusta 'emborrachen' a 'embriaguen' por registro más digno y eclesial. Se conserva 'sean llenos del Espíritu' como español natural y ampliamente inteligible, junto con la nota que preserva la alternativa documentada.
