translation:
  language: es
  text: Maridos[a], amen a sus esposas, así como el Mesías amó a la iglesia y se entregó por ella[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres». Se usa «maridos» porque el contexto de Efesios 5:22–33 es marital y el griego se dirige a los varones en relación con sus esposas.
    reason: alternative_reading
  - marker: b
    text: O «se entregó a sí mismo por ella». También puede expresarse más literalmente como «se puso en manos de otros por ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες
  english_pob_choice: Husbands
  chosen_spanish: Maridos
  alternatives_spanish:
  - Hombres
  lexicon: BDAG
  rationale: 'En este contexto de código doméstico y en paralelo directo con γυναῖκας, el sentido es relacional: hombres casados en relación con sus esposas. «Maridos» comunica mejor esa relación que «hombres».'
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - amen con amor
  - quieran bien
  lexicon: BDAG
  rationale: El imperativo de ἀγαπάω se vierte naturalmente con «amen», preservando la conexión léxica con ἠγάπησεν más adelante y manteniendo el tono exhortativo directo.
- source_word: τὰς γυναῖκας
  english_pob_choice: your wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus mujeres casadas
  lexicon: BDAG
  rationale: Por el contexto inmediato de Efesios 5:22–33, γυναῖκας significa «esposas», no mujeres en general. En español, «sus esposas» expresa con claridad la relación implícita sin añadir una glosa innecesaria.
- source_word: καθὼς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: así como también
  alternatives_spanish:
  - tal como también
  - de la misma manera que también
  lexicon: BDAG
  rationale: La construcción introduce a Cristo como modelo de la conducta de los maridos. «Así como también» conserva el valor comparativo y el matiz aditivo de καί en un español natural.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se traduce normalmente como «Mesías» cuando funciona como título. Aquí el artículo y el contexto teológico favorecen claramente ese valor titular.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amó profundamente
  - mostró amor a
  lexicon: BDAG
  rationale: El aoristo se expresa con pasado simple. «Amó» mantiene la correspondencia léxica con ἀγαπᾶτε y evita amplificar el sentido más allá del verbo griego.
- source_word: τὴν ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En el uso paulino aquí, ἐκκλησία designa al pueblo de Dios corporativamente. «La iglesia» es la equivalencia estable y comprensible en español para este contexto.
- source_word: ἑαυτὸν παρέδωκεν
  english_pob_choice: gave himself up
  chosen_spanish: se entregó
  alternatives_spanish:
  - se entregó a sí mismo
  - se dio en entrega
  lexicon: BDAG
  rationale: La expresión comunica autoentrega voluntaria, con posible resonancia sacrificial. «Se entregó» preserva esa fuerza sin introducir explicaciones atonales que el griego no explicita en esta cláusula.
- source_word: ὑπὲρ αὐτῆς
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - en favor de ella
  - por su causa
  lexicon: BDAG
  rationale: Con ὑπέρ + genitivo, el sentido básico es «por / en favor de». Como ἐκκλησία es femenino en griego y personificado, «por ella» es natural y fiel en español.
theological_decisions:
- issue: Cómo verter Χριστός en una exhortación matrimonial
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura española sigue la política del POB de traducir Χριστός como título («Mesías») cuando el contexto lo presenta de ese modo. Esto conserva el valor semántico del título sin depender de la forma eclesiástica tradicional.
  doctrine_reference: 'DOCTRINE.md: términos en disputa — Χριστός como «Mesías» cuando es título; filosofía de traducción §2'
- issue: Fuerza sacrificial de ἑαυτὸν παρέδωκεν ὑπὲρ αὐτῆς
  english_pob_reading: gave himself up for her
  chosen_spanish_reading: se entregó por ella
  alternative_spanish_readings:
  - se entregó a sí mismo por ella
  - se dio por ella
  rationale: La frase presenta la autoentrega de Cristo en favor de la iglesia, pero no añade terminología explicativa sobre expiación que el texto no desarrolla explícitamente aquí. «Se entregó por ella» conserva el peso teológico y la reserva del original.
  doctrine_reference: 'DOCTRINE.md: filosofía de traducción §1 y §3'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «Christ» y «Messiah», con restauración final de «Messiah» por política del proyecto. La presente versión española sigue esa decisión titulando Χριστός como «el Mesías». También conserva la equivalencia breve de la autoentrega («se entregó») y la referencia pronominal femenina a la iglesia.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός de acuerdo con la política terminológica del proyecto, no con la convención eclesiástica más común.
  - «Iglesia» se eligió para ἐκκλησία por consistencia con el contexto paulino y la práctica terminológica del POB.
  - La forma verbal «se entregó» mantiene el paralelismo con el imperativo «amen» y con la autoentrega voluntaria del original.
  - Se usó «por ella» para reflejar el género gramatical de ἐκκλησία sin añadir una explicación interpretativa.
