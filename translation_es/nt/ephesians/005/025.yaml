review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: ἄνδρες en contexto relacional como «Maridos», ἀγαπᾶτε/ἠγάπησεν con la misma raíz verbal («amen / amó»), γυναῖκας como «esposas», Χριστός como título «Mesías», ἐκκλησίαν como «iglesia» y ὑπὲρ αὐτῆς como «por ella». También preserva adecuadamente la autoentrega de παρέδωκεν. Sin embargo, «así como también» suena algo pesado en español, y la nota b no refleja con suficiente precisión la alternativa inglesa documentada, que contrasta «gave himself up» con «handed himself over».'
  spanish_quality_summary: 'El texto es claro y fiel, con español eclesial natural. La principal mejora necesaria es estilística y de precisión idiomática: «así como también» puede simplificarse a «así como», ya que el valor de καί no necesita reproducirse de forma tan marcada en español aquí. Además, la nota b debe formular mejor la alternativa léxica de «entregarse / ser entregado» sin la expresión poco natural «verbo de “entregar”».'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: «Mesías» se mantiene correctamente frente a un cambio previo revertido en el rastro de auditoría; «iglesia» para ἐκκλησίαν y «por ella» para ὑπὲρ αὐτῆς están bien. No hay conflicto con los términos doctrinales por defecto.'
  issues:
  - severity: medium
    issue: «Así como también» suena recargado en español.
    rationale: Aunque reproduce formalmente καθώς καὶ, en español bíblico natural «así como» comunica bien la comparación sin perder sentido. El «también» aquí no aporta claridad suficiente para justificar la pesadez estilística.
  - severity: low
    issue: La nota b es imprecisa y poco natural en su redacción.
    rationale: La alternativa documentada en inglés es específicamente «handed himself over for her». En español conviene explicitar esa alternativa como «se entregó a sí mismo por ella» o «se puso en manos de otros por ella», no hablar vagamente del verbo de “entregar”.
  revised_spanish_text: Maridos[a], amen a sus esposas, así como el Mesías amó a la iglesia y se entregó por ella[b],
  revised_footnotes:
  - marker: a
    text: O «hombres». Se usa «maridos» porque el contexto de Efesios 5:22–33 es marital y el griego se dirige a los varones en relación con sus esposas.
    reason: alternative_reading
  - marker: b
    text: O «se entregó a sí mismo por ella». También puede expresarse más literalmente como «se puso en manos de otros por ella».
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español («así como» en lugar de «así como también») sin alterar el sentido del griego. También se ajustó la nota léxica de παρέδωκεν para reflejar con más precisión la alternativa documentada en el POB inglés y evitar una explicación torpe.
