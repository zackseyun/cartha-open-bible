translation:
  language: es
  text: aprovechando[a] bien el tiempo, porque los días son malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «redimiendo el tiempo»; la expresión griega también puede significar «aprovechando la oportunidad» o «comprando por completo la oportunidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαγοραζόμενοι
  english_pob_choice: making the most of
  chosen_spanish: aprovechando bien
  alternatives_spanish:
  - redimiendo
  - comprando de nuevo
  - sacando el máximo provecho de
  lexicon: BDAG
  rationale: El participio tiene un matiz literal de 'comprar para sacar de circulación' o 'comprar plenamente', pero en este contexto exhortativo el sentido idiomático es usar bien una oportunidad. 'Aprovechando bien' comunica esa fuerza en español natural sin introducir de manera innecesaria lenguaje soteriológico. Se preserva la alternativa más literal en nota.
- source_word: τὸν καιρόν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la oportunidad
  - la ocasión
  - el momento oportuno
  lexicon: BDAG
  rationale: καιρός suele señalar un tiempo oportuno o conveniente más que el tiempo en abstracto. El texto base conserva 'the time' por claridad; en español 'el tiempo' funciona bien con el verbo 'aprovechar' y mantiene la fluidez, mientras que la idea de oportunidad queda implícita en el verbo y se explicita en la nota alternativa.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación. 'Porque' es la equivalencia más clara y natural en español contemporáneo.
- source_word: ἡμέραι
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - estos días
  - la época
  lexicon: BDAG
  rationale: El plural se conserva de forma directa. Aunque el contexto apunta al presente orden de cosas, no es necesario expandirlo en el texto principal.
- source_word: πονηραί
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  - malignos
  lexicon: BDAG
  rationale: En español, 'malos' puede funcionar para caracterizar días como moralmente dañinos, hostiles o desordenados sin sonar excesivamente abstracto. 'Evil' en español bíblico puede sentirse más pesado o menos natural en este sustantivo; 'malos' mantiene la carga moral sin sobrerrepresentar el matiz.
theological_decisions:
- issue: Posible lectura de ἐξαγοραζόμενοι como lenguaje redentivo/salvífico
  english_pob_reading: Idiomatic exhortation to use time/opportunity wisely
  chosen_spanish_reading: Exhortación práctica a aprovechar bien el tiempo
  alternative_spanish_readings:
  - redimiendo el tiempo
  - comprando la oportunidad
  rationale: Aunque el verbo permite una traducción literal cercana a 'redimir', aquí el contexto es parenético y práctico, no doctrinalmente redentor. 'Aprovechando bien el tiempo' evita importar a priori lenguaje de expiación o rescate que el pasaje no desarrolla, pero la nota preserva la alternativa literal y la posibilidad de 'oportunidad'.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto del trazado inglés, y la decisión española mantiene la misma lectura idiomática con una nota que preserva la alternativa literal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto en otros contextos, aunque este versículo no lo contiene.
  - '''Tiempo'' se conserva en el cuerpo principal para reflejar la estructura del original; la noción de oportunidad queda recogida en la nota.'
  - No se introduce léxico eclesiástico tradicional innecesario; el registro es bíblico moderno y digno.
