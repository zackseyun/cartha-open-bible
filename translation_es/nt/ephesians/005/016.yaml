    rationale: La alternativa inglesa documentada es 'buying up the opportunity', no simplemente 'buying the opportunity'. En español, 'comprando la oportunidad' suena poco natural y no transmite bien el matiz de 'aprovechar/comprar para no perder'.
  - severity: medium
    issue: '''Malos'' debilita el peso moral de πονηραί frente al audit trail.'
    rationale: La documentación inglesa subraya que 'evil' se eligió para no reducir la dimensión moral a algo meramente difícil o problemático. 'Malos' es posible, pero más amplio y menos preciso que 'malvados' en este contexto.
