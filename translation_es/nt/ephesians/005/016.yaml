  rationale: Se mantiene la excelente decisión principal 'aprovechando bien el tiempo' por su fidelidad idiomática al valor exhortativo de ἐξαγοραζόμενοι. Se revisa πονηραί de 'malos' a 'malvados' para conservar mejor la carga moral expresada en el griego y documentada en la auditoría inglesa. La nota se corrige para ofrecer alternativas españolas naturales y fieles al campo semántico de 'redeeming / buying up the opportunity', evitando la formulación poco idiomática 'comprando la oportunidad'.
