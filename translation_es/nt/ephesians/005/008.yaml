translation:
  language: es
  text: Porque ustedes antes eran tinieblas, pero ahora son luz en el Señor. Anden[a] como hijos de luz,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «vivan como hijos de luz». El griego dice «anden», una metáfora paulina común para el modo de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦτε
  english_pob_choice: you were
  chosen_spanish: ustedes eran
  alternatives_spanish:
  - ustedes fueron
  - ustedes solían ser
  lexicon: BDAG
  rationale: El imperfecto griego expresa un estado pasado continuo o característico. En español, «eran» comunica mejor esa condición anterior que un perfecto simple. Se mantiene la referencia a su estado previo sin volverla demasiado puntual.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La conjunción introduce la base explicativa de la exhortación anterior. «Porque» preserva la conexión causal/explicativa de manera natural en español.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: antes
  alternatives_spanish:
  - una vez
  - en otro tiempo
  - antes bien
  lexicon: BDAG
  rationale: «Antes» transmite con claridad la oposición entre la condición pasada y la presente. En este contexto suena más natural que una traducción adverbial más literal y conserva la idea de un estado previo.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tiniebla
  lexicon: BDAG
  rationale: El griego usa un predicado nominal metafórico. «Tinieblas» conserva mejor la fuerza bíblica y abstracta del contraste con «luz» que una expresión locativa como «en oscuridad». En español bíblico puede funcionar en plural con valor colectivo y metafórico.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - ahora bien
  - y ahora
  lexicon: BDAG
  rationale: La construcción marca un contraste fuerte con el estado anterior. «Pero ahora» reproduce bien el giro adversativo y la inmediatez del contraste.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - luminosidad
  - iluminados
  lexicon: BDAG
  rationale: Como en el griego, se conserva el predicado nominal metafórico. «Luz» mantiene la identidad/condición transformada sin convertirla en mera experiencia o resultado.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - unidos al Señor
  lexicon: BDAG
  rationale: La preposición indica esfera/relación de pertenencia. «En el Señor» sigue el valor paulino habitual y preserva la conexión teológica del texto. Se mantiene «Señor» por la convención doctrinal del término κύριος.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: Introduce el modo de caminar concorde con la identidad recibida. «Como» es la equivalencia más natural y fiel en español.
- source_word: τέκνα φωτός
  english_pob_choice: children of light
  chosen_spanish: hijos de luz
  alternatives_spanish:
  - hijos e hijas de luz
  - niños de luz
  - hijos de la luz
  lexicon: BDAG
  rationale: τέκνα es inclusivo en el plural y puede traducirse bien por «hijos» en español bíblico general, donde la expresión es estable y comprensible. Se conserva la metáfora genitiva «de luz» para mantener el carácter identitario del sintagma.
- source_word: περιπατεῖτε
  english_pob_choice: Walk
  chosen_spanish: anden
  alternatives_spanish:
  - vivan
  - comportense
  - caminen
  lexicon: BDAG
  rationale: El imperativo de περιπατέω es una metáfora ética paulina de la conducta de vida. «Anden» conserva la imagen sin quitarle naturalidad al español. «Vivan» sería más interpretativo; se deja en nota la posibilidad de entenderlo así.
theological_decisions:
- issue: Metáfora identitaria de 'tinieblas' y 'luz'
  english_pob_reading: Retain the stark identity metaphors 'darkness' and 'light' rather than softening to location ('in darkness') or experience ('darkened/enlightened').
  chosen_spanish_reading: Conservar «eran tinieblas» / «son luz» sin convertirlo en «estaban en tinieblas» o «están iluminados».
  alternative_spanish_readings:
  - ustedes estaban en tinieblas, pero ahora están en la luz
  - ustedes eran oscuros, pero ahora están iluminados
  rationale: El griego usa predicados nominales sin preposición, lo que apunta a un lenguaje de identidad y transformación moral-espiritual. El español debe conservar esa tensión para no debilitar la fuerza retórica y teológica del contraste.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Sentido de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene la decisión doctrinal de traducir κύριος como «Señor», pues es el equivalente funcional más asentado en el corpus paulino y preserva la resonancia cristológica sin estrechar el término.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
- issue: Valor exhortativo de περιπατεῖτε
  english_pob_reading: Walk as children of light
  chosen_spanish_reading: Anden como hijos de luz
  alternative_spanish_readings:
  - Vivan como hijos de luz
  - Compórtense como hijos de luz
  rationale: La metáfora de «caminar» en Pablo suele abarcar toda la conducta de vida. «Anden» conserva el figurado original y permite que el lector perciba la imagen, mientras que una paráfrasis como «vivan» explicaría el sentido pero perdería parte de la forma.
  doctrine_reference: Translation philosophy item 4
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la revisión más reciente y no presenta cambios pendientes relevantes. Se mantuvo la lectura de identidad metafórica («tinieblas»/«luz») y la metáfora paulina de «andar», con una nota para la alternativa interpretativa de «vivir».
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος de forma consistente con la pauta doctrinal del proyecto.
  - 'Se conserva el paralelismo antitético entre el estado pasado y el presente: «eran tinieblas» / «son luz».'
  - Se mantiene la metáfora ética «anden» para περιπατεῖτε, con nota sobre la alternativa interpretativa.
  - Se emplea «hijos de luz» como expresión bíblica natural y comprensible en español, evitando una sustitución más explicativa.
