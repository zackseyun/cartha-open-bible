review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva correctamente la elipsis del griego en este versículo, el sentido relacional de γυναῖκες como 'esposas', el valor marital de ἰδίοις ἀνδράσιν como 'sus propios maridos' y la comparación simple de ὡς como 'como'. También mantiene adecuadamente 'el Señor' para τῷ κυρίῳ. Sin embargo, la nota al pie no refleja con suficiente precisión el alcance del expediente inglés, que explica específicamente que muchas traducciones suplen 'submit' desde el v. 21; conviene explicitar esa conexión de manera más ceñida.
  spanish_quality_summary: El texto principal es claro y legible en español eclesial contemporáneo. La elipsis resulta algo abrupta, pero eso es intencional y fiel al griego. 'Esposas' y 'maridos' suenan naturales. El único ajuste necesario es refinar la nota para alinearla mejor con la auditoría inglesa y con la explicación sintáctica del verso.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος -> ''Señor''; no hay conflicto con Yahvé/Mesías u otros términos sensibles. La decisión de conservar la elipsis sin suplir ''sométanse'' en el texto principal coincide con la racionalidad documentada. No obstante, en la explicación del verbo implícito conviene no introducir tensión innecesaria entre ''sujétense'' y ''sométanse''; la nota revisada puede hablar genéricamente de ''añaden "sométanse"'' como ejemplo de explicitación, en línea con el expediente.'
  issues:
