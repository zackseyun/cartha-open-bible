translation:
  language: es
  text: Esposas[a], a sus propios maridos, como al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Muchas traducciones añaden ''sométanse'' desde el versículo 21: ''Esposas, sométanse a sus propios maridos como al Señor''. El griego del versículo 22 en sí es elíptico y depende de la cláusula anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: Wives
  chosen_spanish: Esposas
  alternatives_spanish:
  - mujeres
  lexicon: BDAG
  rationale: En el contexto doméstico y con ἀνδράσιν modificado por ἰδίοις, γυνή se entiende relacionalmente como 'esposa' más que como 'mujer'. 'Esposas' conserva ese valor marital en español.
- source_word: ἰδίοις ἀνδράσιν
  english_pob_choice: your own husbands
  chosen_spanish: a sus propios maridos
  alternatives_spanish:
  - a sus propios hombres
  - a sus propios cónyuges
  lexicon: BDAG
  rationale: ἀνήρ puede significar 'hombre' o 'marido'; aquí el sentido marital es el más natural. 'Propios' traduce ἰδίοις y mantiene el énfasis en la relación específica.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: '''Como'' reproduce de manera natural la comparación simple del griego sin añadir una explicación interpretativa que no está explícita en el verso.'
- source_word: κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - el Amo
  lexicon: BDAG
  rationale: Por el principio doctrinal del proyecto, κύριος se vierte normalmente como 'Señor'. En este contexto paulino, la referencia es al Señor Jesús; el artículo se expresa de forma natural en español.
- source_word: implicit verb from context
  english_pob_choice: '[understand ''submit'']'
  chosen_spanish: '[entender ''sujétense'']'
  alternatives_spanish:
  - '[entender ''sométanse'']'
  - '[entender ''estén sujetas'']'
  lexicon: NA28/SBLGNT apparatus; BDAG
  rationale: El griego de este versículo es elíptico y depende sintácticamente de 5:21. En español se conserva la elipsis en el texto principal y se indica el verbo implícito para auditar la conexión contextual sin introducirlo como si estuviera escrito aquí.
theological_decisions:
- issue: Si se debe suplir el verbo de 5:21 en el texto principal
  english_pob_reading: Do not supply the verb in the main text; preserve the elliptical construction and note the implied sense from v. 21.
  chosen_spanish_reading: No suplir el verbo en el texto principal; conservar la construcción elíptica e indicar el sentido implícito de 5:21.
  alternative_spanish_readings:
  - Esposas, sométanse a sus propios maridos como al Señor.
  - Esposas, estén sujetas a sus propios maridos como al Señor.
  rationale: El griego de 5:22 carece de verbo finito expreso. Añadirlo en el texto principal haría la lectura más fluida, pero introduciría una palabra que no aparece en este versículo. Mantener la elipsis respeta mejor el dato fuente y evita sobreespecificar la forma exacta en este verso aislado.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el pasaje quedó sin cambios en la última pasada, aunque el informe de contraste señaló cuestiones mayores que aquí se atienden conservando la elipsis y la relación marital específica.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος conforme al estándar del proyecto.
  - Se prefirió 'esposas'/'maridos' por el contexto doméstico, no 'mujeres'/'hombres'.
  - La elipsis verbal se conserva en el texto principal y se explica en nota para no añadir contenido no escrito en el verso.
