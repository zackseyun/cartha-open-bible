    issue: La nota al pie no reproduce con suficiente exactitud la explicación auditada del inglés.
    rationale: El expediente inglés destaca que muchas traducciones suplen 'submit' específicamente desde el v. 21 y que el griego de 5:22 depende de la cláusula precedente. La nota española actual lo sugiere, pero puede formularse de manera más exacta y completa.
