  spanish_quality_summary: 'El español es claro, natural y digno. Sin embargo, hay un pequeño problema de puntuación tipográfica: en español el punto final de una cita que coincide con el final de la oración normalmente va fuera de las comillas, no dentro. Además, para mayor fluidez y correspondencia con la construcción impersonal del inglés auditado, “todo lo que es hecho visible” suena algo más preciso que “todo lo que se hace visible”, aunque el borrador actual no es infiel. La revisión propuesta es menor y estilística, no doctrinal.'
  glossary_alignment: 'La terminología clave está bien alineada: Χριστός → “el Mesías” con nota alternativa a “Cristo”; φῶς → “luz”; ἐκ τῶν νεκρῶν → “de entre los muertos”. No hay conflicto con los defaults del proyecto. Las notas conservan correctamente la alternativa lexical de φανερούμενον y la incertidumbre sobre la fuente de la cita.'
  issues:
  - severity: low
    issue: Puntuación final de la cita
    rationale: El texto coloca el punto dentro de las comillas finales (“...sobre ti”). En español general y editorial bíblica moderna, al cerrar una cita que termina también la oración, el punto se coloca fuera de las comillas.
  - severity: low
