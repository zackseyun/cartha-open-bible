source:
  edition: SBLGNT
  text: πᾶν γὰρ τὸ φανερούμενον φῶς ἐστιν. διὸ λέγει· Ἔγειρε, ὁ καθεύδων, καὶ ἀνάστα ἐκ τῶν νεκρῶν, καὶ ἐπιφαύσει σοι ὁ Χριστός.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/005/014.yaml
  text: For everything that is made visible is light[a]. Therefore it says, “Wake up, sleeper, and rise from the dead[c][b], and Messiah will shine on you.”
  footnotes:
  - marker: a
    text: Or “everything exposed is light.” The participle φανερούμενον can be understood as “made visible” or “exposed/revealed.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek “the Christ”; rendered “the Messiah” here because Χριστός functions as a title. Traditional English: “Christ.”'
    reason: alternative_reading
  - marker: c
    text: The source of the quotation is uncertain; it may echo Scripture themes (especially Isa 60:1) or an early Christian hymn.
    reason: cross_reference
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: c5c09ef6517fca114fe92a90f1d6c6fa926aae6e4c1c79cff23db8a2fbdb077b
    timestamp: '2026-04-18T11:16:09Z'
    output_hash: 0e7cfda391c39e4413ddb1e44e99e5682d30f4c2dc45e4c0b8e4ec86618bf014
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:58Z'
    unchanged: false
    changes_summary: 'Replaced “the Messiah” with “Christ” for more natural English and closer consistency with the Greek Χριστός in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Porque todo lo que es hecho visible es luz[a]. Por eso dice: “Despierta, tú que duermes, y levántate de entre los muertos[c][b], y el Mesías resplandecerá sobre ti”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todo lo expuesto es luz”. El participio φανερούμενον puede entenderse como “hecho visible”, “expuesto” o “revelado”.
    reason: lexical_alternative
  - marker: b
    text: O “Cristo”. El griego dice literalmente “el Cristo”, con valor de título; aquí se ha traducido “el Mesías” por coherencia terminológica.
    reason: alternative_reading
  - marker: c
    text: La fuente de la cita es incierta; puede aludir a motivos bíblicos, especialmente Isaías 60:1, o a un himno cristiano temprano.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶν
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo que
  - todas las cosas
  lexicon: BDAG
  rationale: El neutro singular con participio articular se entiende de manera general. “Todo” conserva el alcance amplio sin forzar un referente personal o demasiado concreto.
- source_word: φανερούμενον
  english_pob_choice: that is made visible
  chosen_spanish: se hace visible
  alternatives_spanish:
  - se expone
  - se revela
  - llega a ser visible
  lexicon: BDAG
  rationale: El participio pasivo puede expresar “hecho visible”, “expuesto” o “revelado”. En español, “se hace visible” mantiene el valor pasivo y la imagen de manifestación sin endurecer el sentido.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - luz
  - claridad
  lexicon: BDAG
  rationale: Equivalente directo y natural. Mantiene la metáfora sin explicarla o paraprasearla.
- source_word: διὸ
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por esta razón
  lexicon: BDAG
  rationale: Marca inferencia causal. “Por eso” es natural en español contemporáneo y conserva la relación lógica con lo anterior.
- source_word: λέγει
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice
  - es decir
  lexicon: BDAG
  rationale: El sujeto está implícito en griego. “Dice” reproduce esa indeterminación sin especificar indebidamente quién habla.
- source_word: Ἔγειρε
  english_pob_choice: Wake up
  chosen_spanish: Despierta
  alternatives_spanish:
  - Despiértate
  - Levántate
  - Despierta, tú
  lexicon: BDAG
  rationale: Imperativo dirigido a un durmiente en sentido metafórico. “Despierta” es idiomático y conserva la llamada urgente.
- source_word: ὁ καθεύδων
  english_pob_choice: sleeper
  chosen_spanish: tú que duermes
  alternatives_spanish:
  - durmiente
  - el que duerme
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente y en vocativo. “Tú que duermes” suena natural en español y preserva el tono de llamado directo.
- source_word: ἀνάστα
  english_pob_choice: rise
  chosen_spanish: levántate
  alternatives_spanish:
  - despierta y levántate
  - surge
  - resurge
  lexicon: BDAG
  rationale: Aunque ἀνάστα puede traducirse “levántate” o “surge”, en este contexto la secuencia “de entre los muertos” hace que “levántate” conserve bien el matiz de transición desde la muerte. Se evita sobrecargarlo con una paráfrasis.
- source_word: ἐκ τῶν νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de en medio de los muertos
  lexicon: BDAG
  rationale: “De entre los muertos” es una forma natural y clara en español para expresar el origen/separación desde el conjunto de los muertos.
- source_word: ἐπιφαύσει
  english_pob_choice: will shine on
  chosen_spanish: resplandecerá sobre
  alternatives_spanish:
  - brillará sobre
  - irradiará sobre
  - dará luz sobre
  lexicon: BDAG
  rationale: El verbo futuro tiene la idea de brillar sobre o dar luz. “Resplandecerá sobre” conserva el lenguaje luminoso con dignidad y evita interpretarlo demasiado libremente.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se vierte normalmente “Mesías” según el criterio del proyecto. El artículo griego refuerza el valor titular; “el Cristo” queda como alternativa menos natural en español.
theological_decisions:
- issue: Fuente de la cita introducida por λέγει
  english_pob_reading: Render the source of the quotation impersonally as 'it says' without identifying it as Scripture, God, or a known hymn.
  chosen_spanish_reading: “dice” sin identificar explícitamente la fuente
  alternative_spanish_readings:
  - “dice la Escritura”
  - “dice Dios”
  - “dice el himno”
  rationale: El griego no nombra el sujeto, y el contexto deja abierta la procedencia de la cita. Mantener la ambigüedad respeta la tensión documentada por el audit trail.
  doctrine_reference: Preservar la indeterminación del origen de la cita
- issue: Traducción de Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: Aquí Χριστός funciona como título, no como mero nombre propio. “Mesías” comunica mejor el valor semántico y sigue la terminología por defecto del proyecto.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando funciona como título'
- issue: Alcance metafórico de 'luz'
  english_pob_reading: For everything that is made visible is light.
  chosen_spanish_reading: Porque todo lo que se hace visible es luz.
  alternative_spanish_readings:
  - Porque todo lo expuesto es luz.
  - Porque todo lo revelado es luz.
  rationale: La frase conserva la tensión entre visibilidad y exposición/revelación sin cerrarla a una sola interpretación. “Se hace visible” permite oír ambas posibilidades, como en el auditable inglés.
  doctrine_reference: Preservar la ambigüedad lexical de φανερόω
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado más estable del audit trail: se conserva la indeterminación de λέγει, se mantiene la ambigüedad de φανερούμενον con una nota alternativa, y se traduce Χριστός como título (“el Mesías”) conforme a la corrección doctrinal posterior que restauró Messiah frente a Christ como forma nominalizada.'
  spanish_consistency_notes:
  - Se usa “Mesías” para Χριστός como título, coherente con el criterio del proyecto en español.
  - Se mantiene “de entre los muertos” para ἐκ τῶν νεκρῶν, una forma natural y doctrinalmente transparente.
  - Se evita “SEÑOR” u otra sustitución para el nombre divino porque el versículo no contiene el Tetragrámaton; la cita conserva su ambigüedad de fuente.
  - El tono es bíblico pero contemporáneo, sin calcos excesivamente literales que oscurezcan el sentido.
