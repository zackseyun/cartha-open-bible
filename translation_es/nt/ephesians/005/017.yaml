translation:
  language: es
  text: Por esta razón[a], no se vuelvan insensatos, sino entiendan cuál es la voluntad del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, no sean insensatos». El verbo griego puede verterse de manera más estática como «ser», pero «volverse» refleja mejor γίνεσθε.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por tanto
  - Por eso
  - Por consiguiente
  lexicon: BDAG
  rationale: La construcción con διά + demostrativo mira hacia lo anterior y expresa consecuencia o inferencia. «Por esta razón» conserva el valor conectivo sin sonar rígido en español.
- source_word: μὴ γίνεσθε
  english_pob_choice: do not become
  chosen_spanish: no se vuelvan
  alternatives_spanish:
  - no sean
  - no lleguen a ser
  - no se hagan
  lexicon: BDAG
  rationale: γίνομαι comunica llegar a ser o entrar en un estado, no solo un ser estático. «No se vuelvan» mantiene esa idea procesual en un español natural y exhortativo.
- source_word: ἄφρονες
  english_pob_choice: foolish
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - tontos
  - faltos de juicio
  lexicon: BDAG
  rationale: ἄφρων apunta a falta de juicio o entendimiento práctico. «Insensatos» comunica bien esa carencia y suena digno; «necios» es posible, pero puede cargar resonancias tradicionales más fuertes y menos precisas según contexto.
- source_word: συνίετε
  english_pob_choice: understand
  chosen_spanish: comprendan
  alternatives_spanish:
  - entiendan
  - disciernan
  - capten
  lexicon: BDAG
  rationale: συνίημι significa comprender, captar o percibir con discernimiento. «Comprendan» es claro, formal y suficientemente amplio para abarcar la idea de entender con juicio.
- source_word: τί τὸ θέλημα
  english_pob_choice: what the will
  chosen_spanish: cuál es la voluntad
  alternatives_spanish:
  - qué es la voluntad
  - qué voluntad
  - cuál sea la voluntad
  lexicon: BDAG
  rationale: En español, la pregunta indirecta se expresa de forma más natural como «cuál es la voluntad». Mantiene el contenido de lo que debe entenderse sin forzar una estructura literal poco idiomática.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Señor
  - del Maestro
  lexicon: BDAG
  rationale: κύριος se traduce aquí como «Señor», siguiendo el valor cristológico usual y la convención del POB. El genitivo se expresa naturalmente con «del».
theological_decisions:
- issue: Referente de «el Señor» (τοῦ κυρίου)
  english_pob_reading: Rendered simply as 'the Lord' without specifying 'Jesus' in the main text.
  chosen_spanish_reading: Se conserva «el Señor» sin explicitar «Jesús» en el texto principal.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego dice solo κυρίου. Aunque el contexto de Efesios suele referirse a Jesús, el texto no lo explicita; por eso se conserva la forma genérica y se evita añadir especificación no presente en el original.
  doctrine_reference: Afirmaciones; filosofía de traducción 1 y 3
- issue: Fuerza de la prohibición μὴ γίνεσθε
  english_pob_reading: Translated as 'do not become' to preserve the verbal aspect of coming into a state.
  chosen_spanish_reading: Se traduce con «no se vuelvan» para preservar el matiz de llegar a ser o entrar en un estado.
  alternative_spanish_readings:
  - no sean
  - dejen de ser
  - no lleguen a ser
  rationale: La orden no describe solo una condición estática; advierte contra entrar en esa condición. «No se vuelvan» refleja mejor ese movimiento que un simple «no sean».
  doctrine_reference: Filosofía de traducción 1
translation_notes:
  revision_awareness: 'Se mantuvo el sentido y la tensión lexical del griego: una exhortación conectiva que mira a lo anterior, un imperativo prohibitivo con matiz procesual en γίνομαι, y el término κύριος sin sobreespecificación. No se introdujeron cambios respecto del audit trail inglés salvo los ajustes necesarios para una formulación española natural y fiel.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al criterio del proyecto y al audit trail en inglés.
  - Se prefirió «insensatos» frente a «necios» para conservar un tono sobrio y evitar una carga excesivamente proverbial.
  - «Comprendan» mantiene el sentido de συνίημι sin perder el matiz de discernimiento.
  - La nota a pie preserva la alternativa estática «ser» porque el inglés POB documenta esa posibilidad para γίνεσθε.
