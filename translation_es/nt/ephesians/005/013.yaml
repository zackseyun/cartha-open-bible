translation:
  language: es
  text: Pero todo[a], cuando es expuesto por la luz, se hace visible,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que es expuesto por la luz se hace visible». El participio y el verbo griegos pueden entenderse de manera muy cercana, con énfasis ya sea en el acto de exposición o en el resultado de hacerse visible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo demás
  lexicon: BDAG
  rationale: El plural neutro con artículo tiene un alcance amplio y total. «Todas las cosas» conserva mejor la amplitud formal que una reducción más natural pero menos precisa como «todo».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro o desarrollo con matiz adversativo; «Pero» reproduce bien ese contraste en español.
- source_word: ἐλεγχόμενα
  english_pob_choice: when exposed
  chosen_spanish: cuando son expuestas
  alternatives_spanish:
  - siendo expuestas
  - cuando quedan expuestas
  - cuando son reprendidas
  lexicon: BDAG
  rationale: En este contexto, con ὑπὸ τοῦ φωτός y en paralelo con φανεροῦται, el sentido principal es de exposición o desenmascaramiento por la luz, no de reprensión verbal. El participio se vierte con una subordinada temporal natural en español.
- source_word: ὑπὸ τοῦ φωτὸς
  english_pob_choice: by the light
  chosen_spanish: por la luz
  alternatives_spanish:
  - por la luz aquella
  - por la luz
  lexicon: BDAG
  rationale: ὑπό con genitivo expresa agente; «por la luz» conserva esa función y suena natural en español. Se mantiene el artículo implícito del contexto sin sobrecargar la frase.
- source_word: φανεροῦται
  english_pob_choice: are made visible
  chosen_spanish: quedan manifestadas
  alternatives_spanish:
  - son hechas visibles
  - se hacen visibles
  - quedan visibles
  lexicon: BDAG
  rationale: φανερόω en pasivo indica llegar a ser visible o quedar revelado. «Quedan manifestadas» preserva el pasivo y la idea de resultado, con un tono más idiomático que una calca como «son hechas visibles».
theological_decisions:
- issue: Sentido de «la luz» en el contexto
  english_pob_reading: Translate as 'the light' without specifying its referent in the verse itself.
  chosen_spanish_reading: Traducir «la luz» sin cerrar su referente en el versículo.
  alternative_spanish_readings:
  - Cristo
  - el evangelio
  - la verdad moral
  - el testimonio de la comunidad creyente
  rationale: El contexto inmediato habla de creyentes como luz en el Señor y de exponer las obras de las tinieblas, pero el versículo no identifica explícitamente el referente. Mantener «la luz» preserva la amplitud metafórica y la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La versión revisada mantiene el valor de ἐλεγχόμενα como exposición por la luz y de φανεροῦται como resultado visible; no introduce cambios doctrinales ni suaviza la tensión lexical entre exposición y manifestación.
  spanish_consistency_notes:
  - Se mantiene «luz» en forma no especificada, en consonancia con el contexto inmediato y la auditoría inglesa.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente, ya que el versículo no contiene el tetragrámaton ni κύριος como equivalente directo.
  - «Manifestadas» preserva el resultado pasivo de φανεροῦται sin perder la imagen de visibilidad.
