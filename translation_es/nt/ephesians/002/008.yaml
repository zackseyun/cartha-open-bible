translation:
  language: es
  text: Porque por gracia ustedes han sido salvados por medio de la fe[a], y esto[b] no proviene de ustedes; es don de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fe» también puede entenderse como «confianza»; en algunos contextos el término griego puede además significar «fidelidad».
    reason: lexical_alternative
  - marker: b
    text: 'O, de manera más amplia: «toda esta realidad salvadora por gracia mediante la fe no proviene de ustedes». El demostrativo griego probablemente se refiere a la cláusula precedente en su conjunto, no solo a «fe».'
    reason: alternative_reading
lexical_decisions:
- source_word: χάριτί
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En Pablo, χάρις suele expresar la benevolencia salvadora e inmerecida de Dios. «Gracia» conserva ese sentido teológico ya establecido en español y evita debilitar la fuerza del término con una paráfrasis como «favor».
- source_word: ἐστε σεσῳσμένοι
  english_pob_choice: you have been saved
  chosen_spanish: han sido salvados
  alternatives_spanish:
  - son salvados
  - han sido rescatados
  lexicon: BDAG
  rationale: La construcción perifrástica de perfecto indica una acción completada con resultado vigente. En español, «han sido salvados» comunica bien ese valor sin perder la pasividad ni introducir una interpretación más libre como «rescatados».
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. «Por medio de la fe» lo deja explícito en español y mantiene la relación instrumental sin cambiar el contenido doctrinal. Se conserva «fe» como la opción principal, conforme al uso paulino habitual.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - todo esto
  - esta realidad salvadora
  lexicon: BDAG
  rationale: El demostrativo neutro probablemente remite al conjunto de la realidad precedente («por gracia... por medio de la fe») más que a «fe» sola. «Esto» preserva esa amplitud y deja intacta la tensión interpretativa documentada por el POB inglés.
- source_word: οὐκ ἐξ ὑμῶν
  english_pob_choice: is not from yourselves
  chosen_spanish: no proviene de ustedes
  alternatives_spanish:
  - no es de ustedes
  - no viene de ustedes
  lexicon: BDAG
  rationale: ἐκ con genitivo indica origen. «No proviene de ustedes» suena natural en español y mantiene la idea de procedencia/origen sin hacerla más abstracta de lo necesario.
- source_word: θεοῦ τὸ δῶρον
  english_pob_choice: it is the gift of God
  chosen_spanish: es don de Dios
  alternatives_spanish:
  - es el regalo de Dios
  - es el don de Dios
  lexicon: BDAG
  rationale: La frase appositiva identifica la realidad previa como un regalo divino. «Don de Dios» es más idiomático y solemne en español bíblico que «regalo», y conserva la relación genitiva sin expandir el texto con una cópula adicional explícita.
theological_decisions:
- issue: Referente de τοῦτο («esto»)
  english_pob_reading: This refers to the whole preceding reality of salvation by grace through faith, not narrowly to faith alone.
  chosen_spanish_reading: '«Esto» se entiende como la totalidad de la realidad anterior: la salvación por gracia mediante la fe, no solo la fe aisladamente.'
  alternative_spanish_readings:
  - «Esto» se refiere específicamente a la fe como don de Dios
  - «Esto» se refiere específicamente a la gracia
  rationale: El neutro griego no se ajusta de manera natural a un antecedente femenino singular como χάρις o πίστις tomadas por separado. Por eso la traducción española conserva «esto» sin resolver la referencia de modo más estrecho de lo que el griego permite. Se mantiene así la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión textual sin imponer una lectura denominacional específica.
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis auditado del texto griego y la decisión inglesa de mantener τοῦτο con referencia amplia. No se registran revisiones aplicadas en el paquete fuente, y el presente español conserva esa misma estabilidad interpretativa.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις y «fe» para πίστις, conforme a la terminología POB.
  - «Salvados» reproduce la pasiva perfecta perifrástica sin introducir una glosa doctrinal adicional.
  - «Don de Dios» conserva el tono bíblico sin sustituirlo por una formulación eclesiástica más tradicional que el griego no exige.
  - La nota [a] ancla la ambigüedad referencial de «esto»; la nota [b] ancla la alternativa lexical de πίστις.
