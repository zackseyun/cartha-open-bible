lexical_decisions:
- source_word: συνήγειρεν
  english_pob_choice: raised us up with him
  chosen_spanish: nos resucitó con él
  alternatives_spanish:
  - nos levantó con él
  - nos hizo resucitar con él
  lexicon: BDAG
  rationale: El prefijo συν- expresa participación compartida con Cristo; en español, «resucitó con él» comunica de forma natural esa acción conjunta y conserva el vínculo con la resurrección, más directamente que un simple «levantó».
- source_word: συνεκάθισεν
  english_pob_choice: seated us with him
  chosen_spanish: nos sentó con él
  alternatives_spanish:
  - nos hizo sentar con él
  - nos enthronó con él
  lexicon: BDAG
  rationale: «Sentó con él» reproduce la idea de colocar juntos sin introducir la carga interpretativa de «entronizó». Mantiene la unión con Cristo y su tono concreto.
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly places
  chosen_spanish: en los lugares celestiales
  alternatives_spanish:
  - en las regiones celestiales
  - en los ámbitos celestiales
  lexicon: BDAG
  rationale: «Lugares celestiales» es una solución clara y estable en español, cercana al sentido locativo de la expresión paulina. Conserva el plural y la esfera celestial sin volverla demasiado abstracta.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» según la preferencia del proyecto para Χριστός cuando funciona como título. «Mesías Jesús» conserva el valor titular del término y evita aplanarlo a un mero nombre propio.
theological_decisions:
- issue: Explicitar la unión con Cristo en los verbos compuestos con συν-
  english_pob_reading: The συν- prefix indicates shared participation with Christ; the English POB makes this explicit with “with him.”
  chosen_spanish_reading: La frase «con él» se repite en ambos verbos para reflejar la participación compartida con Cristo.
  alternative_spanish_readings:
  - y nos resucitó y nos sentó
  - y nos resucitó junto con él y nos sentó junto con él
  rationale: La construcción griega resalta una acción compartida con Cristo. En español, «con él» hace visible esa participación sin añadir contenido ajeno al texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor titular de Χριστός en esta expresión
  english_pob_reading: The English audit trail preserves the title sense as “Messiah Jesus.”
  chosen_spanish_reading: Se traduce Χριστός como «Mesías» en lugar de ocultarlo bajo «Cristo».
  alternative_spanish_readings:
  - Cristo Jesús
  - el Cristo Jesús
  rationale: La guía del proyecto pide conservar el sentido mesiánico del título cuando es pertinente. Aquí el título sigue siendo transparente en español y evita la lectura puramente tradicionalizada.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: El paquete inglés muestra una oscilación editorial entre «heavenly realms/places» y entre «Messiah Jesus/Christ Jesus», con una restitución final de «Messiah Jesus». La versión española sigue esa última decisión doctrinal para Χριστός y opta por «lugares celestiales» como equivalente natural y preciso de ἐπουρανίοις.
  spanish_consistency_notes:
  - Mantener «Mesías» como traducción de Χριστός en esta unidad, conforme a la política del proyecto.
  - Conservar la repetición de «con él» para reflejar los compuestos con συν-.
  - Usar minúscula en «celestiales» y no introducir mayúsculas teológicas innecesarias.
