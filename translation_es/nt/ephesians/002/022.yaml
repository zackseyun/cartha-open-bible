translation:
  language: es
  text: en quien también ustedes son edificados juntamente para ser morada de Dios en el Espíritu[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el cual', si la relativa se toma como referente de todo el edificio y no directamente de Mesías.
    reason: alternative_reading
  - marker: b
    text: O 'en espíritu' o 'por el Espíritu'. La frase puede indicar la esfera de la morada de Dios o la agencia del Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  lexicon: BDAG
  rationale: El antecedente más inmediato y natural en el contexto es personal y se refiere a Mesías/Christo como centro del edificio. Por eso, en español, 'en quien' conserva mejor el referente personal que 'en el cual', aunque esta última sigue siendo una alternativa posible si se entendiera la relativa como referida al edificio.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - hasta
  lexicon: BDAG
  rationale: La partícula añade a los destinatarios ('ustedes') al desarrollo anterior de la imagen del edificio. 'También' reproduce bien ese valor aditivo en español sin sobrerreforzarlo.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El plural de segunda persona debe quedar explícito. 'Ustedes' es natural y claro en español neutral latinoamericano y conserva el tono de dirección directa.
- source_word: συνοικοδομεῖσθε
  english_pob_choice: are being built together
  chosen_spanish: son edificados juntamente
  alternatives_spanish:
  - están siendo edificados juntamente
  - son construidos juntos
  lexicon: BDAG
  rationale: El griego es presente pasivo indicativo plural, con sentido progresivo. En español, 'son edificados juntamente' mantiene la pasiva y la acción conjunta sin sonar tan pesada como una perífrasis continua; 'juntamente' preserva el matiz de σύν. 'Edificados' encaja con la metáfora arquitectónica y evita 'construidos juntos', que puede sonar menos idiomático.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - para
  - hacia
  lexicon: BDAG
  rationale: Aunque 'into' marca meta/resulto, en español 'en un lugar de morada' comunica mejor el estado resultante sin forzar una preposición literal poco natural. El sentido de llegada a un resultado se conserva en la construcción completa.
- source_word: κατοικητήριον
  english_pob_choice: a dwelling place
  chosen_spanish: un lugar de morada
  alternatives_spanish:
  - una morada
  - una vivienda
  - un templo
  lexicon: BDAG
  rationale: '''Lugar de morada'' preserva la imagen concreta de un sitio habitable y evita cargar el término con resonancias eclesiásticas o cultuales más específicas de lo que el sustantivo exige. ''Morada'' sola es posible, pero ''lugar de morada'' hace más transparente la idea de espacio habitado.'
- source_word: τοῦ θεοῦ
  english_pob_choice: for God
  chosen_spanish: para Dios
  alternatives_spanish:
  - de Dios
  - perteneciente a Dios
  lexicon: BDAG
  rationale: 'Con ''lugar de morada'', el genitivo se expresa de modo natural como destino/ocupación: un lugar para Dios. ''De Dios'' sería más literal, pero en español puede sonar posesivo o estructural en lugar de indicar al que habita allí.'
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  - por el Espíritu
  lexicon: BDAG
  rationale: El contexto de templo e inhabitación favorece la referencia al Espíritu Santo. En español, el artículo y la mayúscula ayudan a identificar al referente personal. Se conserva 'en' para no resolver excesivamente la relación semántica entre esfera, presencia y agencia.
theological_decisions:
- issue: Referente de ἐν ᾧ
  english_pob_reading: The phrase refers to Christ, yielding 'in whom.'
  chosen_spanish_reading: La frase se entiende referida a Mesías, dando 'en quien'.
  alternative_spanish_readings:
  - La frase se puede entender referida al edificio entero, dando 'en el cual'.
  rationale: El contexto inmediato sigue centrado en Mesías como piedra angular y principio de cohesión del edificio. Mantener 'en quien' conserva ese enfoque cristológico sin cerrar por completo la posibilidad alternativa que el griego permite.
  doctrine_reference: Preservar la tensión exegética cuando el antecedente gramatical es genuinamente discutible, pero el contexto favorece una lectura principal.
- issue: Sentido de ἐν πνεύματι
  english_pob_reading: 'Reference to the Holy Spirit: ''in the Spirit.'''
  chosen_spanish_reading: 'Referencia al Espíritu Santo: ''en el Espíritu''.'
  alternative_spanish_readings:
  - 'Sentido locativo o modal: ''en espíritu''.'
  - 'Sentido instrumental: ''por el Espíritu''.'
  rationale: En Efesios, el lenguaje de templo e inhabitación apunta naturalmente al Espíritu Santo. La traducción conserva la preposición 'en' y capitaliza 'Espíritu' para reflejar el referente más probable sin excluir por completo la superposición de esfera y medio que admite el griego.
  doctrine_reference: La mayúscula señala el referente personal probable por contexto, no una imposición dogmática ajena al texto.
translation_notes:
  revision_awareness: 'La versión sigue el pass final sin cambios del expediente inglés: se mantiene la lectura cristológica preferente de ἐν ᾧ y la referencia probable al Espíritu Santo en ἐν πνεύματι, sin nivelar las ambigüedades del griego más de lo que el texto permite.'
  spanish_consistency_notes:
  - Se conserva 'Mesías' en las decisiones explicativas, pero el texto principal usa la referencia pronominal 'en quien' para reflejar el antecedente inmediato sin introducir el nombre donde el griego no lo repite.
  - '''Edificados juntamente'' mantiene la pasiva y el matiz de acción conjunta que el prefijo σύν aporta.'
  - '''Espíritu'' se escribe con mayúscula en el texto principal por la lectura contextual del Espíritu Santo; la nota deja abierta la alternativa de ''espíritu'' sin mayúscula.'
  - Se usa 'para Dios' en vez de 'de Dios' para naturalidad española y para expresar mejor la finalidad/ocupación del lugar de morada.
  - '''Lugar de morada'' evita forzar una lectura litúrgica más específica que el sustantivo griego no exige por sí solo.'
