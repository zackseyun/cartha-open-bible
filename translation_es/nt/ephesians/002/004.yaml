translation:
  language: es
  text: Pero Dios[a], siendo rico en misericordia, por su gran amor con que nos amó,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con misericordia». La expresión griega es literalmente «rico en misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: El δέ adversativo contrasta la condición humana previa con la intervención divina; en español, «Pero» preserva bien esa oposición de forma natural y solemne.
- source_word: πλούσιος ὢν
  english_pob_choice: being rich
  chosen_spanish: siendo rico
  alternatives_spanish:
  - que es rico
  - rico siendo
  lexicon: BDAG
  rationale: El participio expresa una cualidad en curso o característica de Dios; «siendo rico» conserva el valor descriptivo sin forzar una subordinación explicativa ajena al griego.
- source_word: ἐν ἐλέει
  english_pob_choice: in mercy
  chosen_spanish: en misericordia
  alternatives_spanish:
  - con misericordia
  - en compasión
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente habitual y fiel de ἔλεος. Se mantiene la imagen de plenitud o abundancia «en» esa esfera, en vez de fundirla con el amor en una sola noción.
- source_word: διὰ τὴν πολλὴν ἀγάπην αὐτοῦ
  english_pob_choice: because of his great love
  chosen_spanish: por su gran amor
  alternatives_spanish:
  - a causa de su gran amor
  - por el mucho amor de él
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o razón; «por» comunica bien esa relación causal. «Gran amor» refleja el peso de πολλὴν ἀγάπην sin volverlo mecánicamente «mucho amor» en español.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amorosa bondad
  lexicon: BDAG
  rationale: Se conserva «amor», la equivalencia directa y clara de ἀγάπη. Evita términos eclesiásticos más estrechos o explicativos que no están en el texto.
- source_word: ἣν ἠγάπησεν ἡμᾶς
  english_pob_choice: with which he loved us
  chosen_spanish: con que nos amó
  alternatives_spanish:
  - con el cual nos amó
  - con el que nos amó
  lexicon: BDAG
  rationale: Se mantiene la cláusula relativa y la repetición cognada amor/amó, importante para la fuerza retórica del griego. «Con que» resulta natural en español y conserva la relación instrumental o modal sin suavizar el eco verbal.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - mostró amor a
  lexicon: BDAG
  rationale: El verbo se traduce de manera directa para conservar la repetición con ἀγάπη y el énfasis del original; «amó» es la forma más transparente y fiel.
theological_decisions:
- issue: Relación entre misericordia y amor
  english_pob_reading: 'Render both as distinct but related grounds: ''being rich in mercy, because of his great love'''
  chosen_spanish_reading: 'Mantener «misericordia» y «amor» como motivos relacionados pero distintos: «siendo rico en misericordia, por su gran amor»'
  alternative_spanish_readings:
  - siendo rico en amor misericordioso
  - siendo rico en misericordia, en su gran amor
  rationale: El griego presenta ἐλέει y ἀγάπη como términos distintos, coordinados en la lógica del versículo. La traducción conserva esa tensión teológica sin fusionarlos en una sola idea.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Retención del eco cognado amor/amó
  english_pob_reading: 'Preserve the repetition: ''his great love with which he loved us'''
  chosen_spanish_reading: 'Preservar la repetición: «su gran amor con que nos amó»'
  alternative_spanish_readings:
  - su gran amor por el cual nos amó
  - su gran amor que tuvo por nosotros
  rationale: El griego repite la misma raíz ἀγάπ- para dar énfasis. En español, «amor / amó» conserva ese recurso retórico y evita diluir la forma del texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no requieren cambios de sentido. La decisión principal en español fue conservar la adversativa, la distinción entre misericordia y amor, y el eco cognado amor/amó de manera natural y publicable.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene «misericordia» para ἔλεος y «amor» para ἀγάπη, sin fusionarlos.
  - Se conserva la relación causal de διά con «por».
  - La nota al pie marca la alternativa «con misericordia» para reflejar la literalidad de ἐν ἐλέει.
