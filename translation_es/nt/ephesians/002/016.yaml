translation:
  language: es
  text: y reconciliar[a] a ambos con Dios en un solo cuerpo por medio de la cruz, habiendo dado muerte a la hostilidad en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en él», tomando el pronombre como referencia al Mesías en lugar de a la cruz.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκαταλλάξῃ
  english_pob_choice: might reconcile
  chosen_spanish: reconciliar
  alternatives_spanish:
  - reconciliar plenamente
  - reconciliar por completo
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la construcción de propósito se expresa de forma natural en español con infinitivo de finalidad, y «reconciliar» comunica el valor básico del verbo sin sobrecargar el texto con una paráfrasis. La intensificación del compuesto queda implícita por el contexto y puede explicitarse solo si fuera necesario.
- source_word: τοὺς ἀμφοτέρους
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos grupos
  lexicon: BDAG
  rationale: «Ambos» conserva la referencia dual a los dos grupos del contexto y es breve y natural en español. «Ambos grupos» explicita la identificación, pero añade interpretación que el griego no formula aquí.
- source_word: ἐν ἑνὶ σώματι
  english_pob_choice: in one body
  chosen_spanish: en un solo cuerpo
  alternatives_spanish:
  - en un cuerpo
  - en un único cuerpo
  lexicon: BDAG
  rationale: La preposición ἐν con dativo se traduce con más naturalidad por «en», y «cuerpo» conserva la metáfora corporativa eclesial de Pablo. «Solo» refuerza la unidad expresada por ἑνί sin alejarse del griego.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - con Dios
  lexicon: BDAG
  rationale: Aunque el griego admite una relación direccional/dativa con reconciliación, en español «para Dios» funciona bien para expresar el destinatario o término de la reconciliación dentro de la cláusula. «A Dios» es la alternativa más literal, pero aquí «para» suena más fluido en la construcción verbal elegida.
- source_word: διὰ τοῦ σταυροῦ
  english_pob_choice: through the cross
  chosen_spanish: por medio de la cruz
  alternatives_spanish:
  - a través de la cruz
  - mediante la cruz
  lexicon: BDAG
  rationale: διά con genitivo indica medio/instrumento; «por medio de» lo expresa con claridad y solemnidad en español. «Cruz» mantiene el referente material y teológico sin necesidad de añadir contenido implícito.
- source_word: ἀποκτείνας
  english_pob_choice: having put ... to death
  chosen_spanish: habiendo dado muerte a
  alternatives_spanish:
  - habiendo matado
  - matando
  lexicon: BDAG
  rationale: El participio aoristo se vierte como acción anterior o concomitante en una forma participial española. «Dar muerte a» preserva el carácter figurado aplicado a «la hostilidad» y evita una formulación demasiado literal que sonaría extraña.
- source_word: τὴν ἔχθραν
  english_pob_choice: the hostility
  chosen_spanish: la hostilidad
  alternatives_spanish:
  - la enemistad
  - la enemistad hostil
  lexicon: BDAG
  rationale: «Hostilidad» reproduce bien el campo semántico de ἔχθρα y mantiene el tono moderno y claro del texto. «Enemistad» es posible, pero puede sonar más abstracta o tradicional en español eclesiástico.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en él
  - por medio de ella
  lexicon: BDAG
  rationale: 'El antecedente inmediato más natural es «la cruz», por eso el pronombre femenino singular se usa en español: «en ella». Esto conserva la relación gramatical con el antecedente textual, aunque la nota mantiene abierta la lectura alternativa cristológica.'
theological_decisions:
- issue: Referente de ἐν αὐτῷ
  english_pob_reading: 'The phrase refers to the cross: ''in it.'''
  chosen_spanish_reading: 'La frase se refiere a la cruz: «en ella».'
  alternative_spanish_readings:
  - «en él», refiriendo el pronombre a Mesías/ Cristo
  - «por él» o «por medio de él», entendiendo el pronombre como referencia personal
  rationale: El antecedente más cercano de αὐτῷ es σταυροῦ, y la sintaxis inmediata vincula la muerte de la hostilidad con la cruz como medio. Sin embargo, como el pronombre es gramaticalmente ambiguo y una referencia a Cristo es posible, conviene preservar esa tensión en una nota en lugar de resolverla silenciosamente.
  doctrine_reference: 'Principio de transparencia textual del POB: conservar ambigüedades interpretativas relevantes cuando el griego lo permite.'
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: ἀποκαταλλάξῃ como propósito («reconciliar»), τοὺς ἀμφοτέρους como «ambos», ἐν ἑνὶ σώματι como «en un solo cuerpo», διὰ τοῦ σταυροῦ como medio instrumental, ἀποκτείνας como participio antecedente («habiendo dado muerte a»), y ἐν αὐτῷ con la ambigüedad conservada mediante nota. La opción española evita calco áspero, pero no añade paráfrasis doctrinal.'
  spanish_consistency_notes:
  - Se usó «cuerpo» para σῶμα conforme al uso paulino y no se expandió a «comunidad» en el texto principal.
  - Se eligió «por medio de» para διά con genitivo por claridad natural en español.
  - Se mantuvo «hostilidad» para ἔχθρα, coherente con la decisión inglesa y con un registro actual.
  - La nota a preserva la alternativa cristológica sin imponerla en el texto principal.
  - Se evitó «Cristo» porque en este versículo no hay Χριστός en el griego fuente y la referencia a Mesías no está lexicalmente explícita.
