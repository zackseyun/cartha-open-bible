  rationale: 'La revisión es pequeña y no doctrinalmente controvertida: mejora la naturalidad del español en dos puntos sin alterar el sentido del griego ni el razonamiento léxico-teológico ya documentado en el audit trail. Se conserva la terminología clave y la tensión retórica de Pablo.'
