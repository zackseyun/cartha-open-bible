    changes_summary: Adjusted punctuation and syntax for clearer alignment with the Greek; rendered οἱ λεγόμενοι as “who are called,” and τῆς λεγομένης περιτομῆς more literally as “what is called ‘circumcision,’” while retaining “made by hands in the flesh.”
translation:
  language: es
  text: Por tanto, recuerden que en otro tiempo ustedes, los gentiles[a] en la carne, a quienes llaman “incircuncisión” por lo que se llama “circuncisión”, hecha por manos humanas en la carne[b][c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ustedes una vez, las naciones en la carne». El griego pone énfasis en «ustedes» y usa «naciones/gentiles» en el sentido de no judíos.
    reason: lexical_alternative
  - marker: b
    text: «Circuncisión» e «incircuncisión» son aquí rótulos étnico-covenantales, no meramente descripciones anatómicas.
    reason: cultural_note
  - marker: c
    text: O «la llamada “circuncisión”, hecha por manos humanas en la carne». La redacción de Pablo puede insinuar una crítica a una circuncisión meramente externa.
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica desde lo anterior; “Por tanto” es natural, formal y mantiene el valor conclusivo sin sobrerrepresentarlo.
- source_word: μνημονεύετε
  english_pob_choice: remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - recuerden siempre
  - tengan presente
  lexicon: BDAG
  rationale: El imperativo plural pide una exhortación directa; “recuerden” es idiomático en español y conserva el sentido de traer a la memoria.
- source_word: ποτὲ ὑμεῖς
  english_pob_choice: formerly you
  chosen_spanish: en otro tiempo ustedes
  alternatives_spanish:
  - antes ustedes
  - ustedes alguna vez
  lexicon: BDAG
  rationale: Preserva el contraste temporal y el énfasis en el pronombre personal con un orden natural en español.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: BDAG
  rationale: En este contraste judío/gentil, ἔθνη designa a los no judíos; “gentiles” es la forma más precisa y comprensible en español bíblico.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en términos corporales
  - físicamente
  lexicon: BDAG
  rationale: Aquí σάρξ es un marcador literal/social-étnico, no moral; “carne” preserva la imagen y la tensión lexical que el texto exige.
- source_word: οἱ λεγόμενοι ἀκροβυστία
  english_pob_choice: called “uncircumcision”
  chosen_spanish: llamados “incircuncisión”
  alternatives_spanish:
  - a quienes llaman “incircuncisión”
  - llamados “los incircuncisos”
  lexicon: BDAG
  rationale: Mantiene el participio pasivo y el rótulo social/étnico como etiqueta convencional. “Incircuncisión” refleja el sustantivo abstracto del griego y su valor polémico.
- source_word: ἀκροβυστία
  english_pob_choice: uncircumcision
  chosen_spanish: incircuncisión
  alternatives_spanish:
  - foreskin
  - los incircuncisos
  lexicon: BDAG
  rationale: En este contexto funciona como designación colectiva y covenantal, no como descripción anatómica; “incircuncisión” conserva el contraste terminológico con “circuncisión”.
- source_word: ὑπὸ τῆς λεγομένης περιτομῆς
  english_pob_choice: by what is called “circumcision”
  chosen_spanish: por lo que se llama “circuncisión”
  alternatives_spanish:
  - por la llamada “circuncisión”
  - por la así llamada “circuncisión”
  lexicon: BDAG
  rationale: Reproduce la distancia retórica de λεγομένης sin forzar una interpretación más fuerte. “Lo que se llama” preserva la simetría con el verbo “llamados”.
- source_word: περιτομή
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - los circuncisos
  lexicon: BDAG
  rationale: Mantiene el término del pacto y la abstracción grupal usada por Pablo.
- source_word: ἐν σαρκὶ χειροποιήτου
  english_pob_choice: made by hands in the flesh
  chosen_spanish: hecha por manos en la carne
  alternatives_spanish:
  - hecha por mano humana en la carne
  - hecha por manos humanas en el cuerpo
  lexicon: BDAG
  rationale: χειροποίητος significa literalmente “hecha por manos”; “por manos” conserva la expresión breve del griego y el adjetivo recae sobre “circuncisión” como en el original. Se mantiene “en la carne” para reflejar el complemento local/identificatorio sin suavizarlo.
theological_decisions:
- issue: Renderización de σάρξ en un contexto no moral
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza humana
  rationale: La guía doctrinal pide “carne” en contextos literales. Aquí el contraste es étnico/corporal, no una referencia a la naturaleza pecaminosa.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
- issue: Tensión retórica entre circuncisión e incircuncisión
  english_pob_reading: what is called “circumcision” / “uncircumcision”
  chosen_spanish_reading: lo que se llama “circuncisión” / “incircuncisión”
  alternative_spanish_readings:
  - la así llamada “circuncisión”
  - la llamada “circuncisión”
  rationale: La repetición de “llama-” preserva la distancia retórica del griego y evita resolver la posible crítica de Pablo hacia una identidad meramente externa. Se conserva la tensión documentada en el audit trail.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que alineó con más precisión οἱ λεγόμενοι como “who are called” y τῆς λεγομένης περιτομῆς como “what is called ‘circumcision’,” manteniendo la unión estrecha de χειροποιήτου con “circumcision.” En español se reflejó esa misma sintaxis con “llamados… por lo que se llama…”, y se conservó “hecha por manos en la carne” para no perder la tensión del adjetivo compuesto.
  spanish_consistency_notes:
  - Se usó “gentiles” para ἔθνη conforme al contraste judío/gentil del pasaje.
  - Se mantuvo “carne” para σάρξ por tratarse de un uso literal/identitario, no moral.
  - Se prefirió “incircuncisión” como sustantivo abstracto paralelo a “circuncisión”.
  - No se sustituyó el rótulo covenantal por expresiones eclesiales tradicionales, para respetar la etiqueta social del texto griego.
  - La puntuación con raya final conserva la frase abierta del original, que continúa en el versículo siguiente.
