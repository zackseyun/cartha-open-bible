source:
  edition: SBLGNT
  text: Διὸ μνημονεύετε ὅτι ⸂ποτὲ ὑμεῖς⸃ τὰ ἔθνη ἐν σαρκί, οἱ λεγόμενοι ἀκροβυστία ὑπὸ τῆς λεγομένης περιτομῆς ἐν σαρκὶ χειροποιήτου,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/011.yaml
  text: Therefore remember that formerly you[a], the Gentiles in the flesh[d][c][b], who are called “uncircumcision” by what is called “circumcision,” made by hands in the flesh—
  footnotes:
  - marker: a
    text: Or “you once, the nations in the flesh.” The Greek places emphasis on “you” and uses “nations/Gentiles” in the sense of non-Jews.
    reason: lexical_alternative
  - marker: b
    text: “Circumcision” and “uncircumcision” are covenantal-ethnic labels here, not merely anatomical descriptions.
    reason: cultural_note
  - marker: c
    text: Or “the so-called circumcision, which is made by hands in the flesh.” Paul’s wording may carry a note of critique toward merely outward circumcision.
    reason: alternative_reading
  - marker: d
    text: Or 'by what is called “circumcision,” made by hands in the flesh—'.
    reason: previous_rendering
