    issue: «llamados “incircuncisión”» es gramatical pero poco idiomático en español
    rationale: Aunque refleja el participio pasivo griego, en español suena más natural y preciso «a quienes llaman “incircuncisión”», que sigue expresando una etiqueta impuesta por otros.
  - severity: medium
    issue: «hecha por manos en la carne» es una literalidad poco natural
    rationale: χειροποιήτου significa «hecha por manos», pero en español estándar bíblico y general se requiere normalmente «manos humanas» para que la expresión sea clara e idiomática, sin perder el matiz de obra meramente humana y externa.
  - severity: low
    issue: Puntuación con la coma respecto de las comillas
    rationale: 'En español la coma debe ir fuera de las comillas angulares o inglesas cuando no pertenece al material citado: «circuncisión»,.'
