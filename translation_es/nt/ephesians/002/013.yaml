translation:
  language: es
  text: Pero ahora, en Mesías Jesús[d], ustedes, los que antes estaban lejos[a], han llegado a estar cerca[b] por la sangre[c] del Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy lejos».
    reason: lexical_alternative
  - marker: b
    text: O «han sido hechos cercanos».
    reason: lexical_alternative
  - marker: c
    text: O «mediante la sangre del Mesías» / «a través de la sangre del Mesías».
    reason: lexical_alternative
  - marker: d
    text: Griego «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Mas ahora
  lexicon: BDAG
  rationale: 'Conserva el giro adversativo-temporal: transición desde la condición anterior hacia la situación presente, con español natural y digno.'
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Χριστός funciona como título, no solo como nombre fijo; por eso se mantiene la decisión del POB inglés de usar «Mesías». «En» conserva la unión/incorporación implícita en la frase.
- source_word: ὑμεῖς οἵ ποτε ὄντες
  english_pob_choice: you who once were
  chosen_spanish: ustedes, los que antes estaban
  alternatives_spanish:
  - ustedes, que una vez estaban
  - ustedes, los que antes eran
  lexicon: BDAG
  rationale: La relativa con participio se vierte de manera natural en español, preservando la referencia a un estado pasado. «Estaban» evita una literalidad pesada y mantiene el contraste temporal.
- source_word: μακρὰν
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - muy lejos
  - apartados
  lexicon: BDAG
  rationale: «Lejos» comunica distancia relacional y covenantal de forma clara. En nota se preserva la alternativa «far off / lejos de» como posible matiz.
- source_word: ἐγενήθητε ἐγγὺς
  english_pob_choice: have become near
  chosen_spanish: han llegado a estar cerca
  alternatives_spanish:
  - se hicieron cercanos
  - han sido hechos cercanos
  lexicon: BDAG
  rationale: Se respeta el verbo γίνομαι («llegar a ser / llegar a estar») sin introducir de modo explícito una pasiva que el último ajuste inglés decidió no imponer. «Cerca» conserva la idea de proximidad relacional.
- source_word: ἐν τῷ αἵματι
  english_pob_choice: by the blood
  chosen_spanish: por la sangre
  alternatives_spanish:
  - a través de la sangre
  - mediante la sangre
  lexicon: BDAG
  rationale: El ἐν se entiende instrumentalmente, como medio. «Por la sangre» es natural en español y reproduce la fuerza causal/mediadora sin desarrollar la teología más allá del texto.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se mantiene la decisión consistente de traducir Χριστός como título («Mesías»), coherente con el estilo del proyecto y con la función teológica del término en este contexto.
theological_decisions:
- issue: Rendering Χριστός as title
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La elección preserva el valor titular y mesiánico del griego, en lugar de acomodarlo al uso eclesial heredado de «Cristo». Esto sigue la política del proyecto y evita perder la carga semántica del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Force of ἐν τῷ αἵματι τοῦ Χριστοῦ
  english_pob_reading: 'instrumental: ''by the blood of the Messiah'''
  chosen_spanish_reading: 'instrumental: ''por la sangre del Mesías'''
  alternative_spanish_readings:
  - a través de la sangre del Mesías
  - mediante la sangre del Mesías
  - en la sangre del Mesías
  rationale: La frase señala el medio por el cual los que estaban lejos llegan a estar cerca, sin expandir el texto hacia una formulación atonemental más desarrollada de la que el versículo expresa. Se conserva la tensión teológica y la referencia al sacrificio.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió «have become near» frente a una pasiva más explícita. En español se refleja con «han llegado a estar cerca», manteniendo el cambio de estado sin sobredeterminar la agencia. También se conserva la decisión del registro revisado de traducir Χριστός como «Messiah/Mesías».
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός de forma consistente con la política del proyecto.
  - Se usa «por» para el medio instrumental, acorde con el sentido del griego ἐν en este contexto.
  - No se introduce «SEÑOR» ni otras convenciones eclesiales que oculten el texto fuente.
  - La puntuación y el tono buscan ser públicos y litúrgicamente legibles sin sonar arcaicos.
