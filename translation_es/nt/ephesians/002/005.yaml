translation:
  language: es
  text: Aun cuando estábamos muertos en nuestras faltas[a], nos dio vida juntamente con el Mesías—por gracia ustedes han sido salvos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pecados». El griego παράπτωμα puede referirse a una falta, caída o transgresión; aquí «faltas» preserva mejor el matiz léxico sin perder la idea de culpa.
    reason: alternative_reading
lexical_decisions:
- source_word: ὄντας ἡμᾶς νεκροὺς
  english_pob_choice: when we were dead
  chosen_spanish: Aun cuando estábamos muertos
  alternatives_spanish:
  - cuando estábamos muertos
  - mientras estábamos muertos
  lexicon: BDAG
  rationale: El participio expresa una condición de trasfondo temporal/concesivo. «Aun cuando» conserva mejor el matiz concesivo que «cuando» solo, y «estábamos muertos» mantiene el estado descrito por νεκρούς sin añadir más de lo que el texto dice.
- source_word: τοῖς παραπτώμασιν
  english_pob_choice: in our trespasses
  chosen_spanish: en nuestros pecados
  alternatives_spanish:
  - en nuestras transgresiones
  - a causa de nuestros pecados
  - por nuestros pecados
  lexicon: BDAG
  rationale: 'El dativo señala esfera o relación: muertos respecto de las faltas/pecados. «En nuestros pecados» es natural en español y conserva la idea de ámbito. «Pecados» es una opción interpretativa válida aquí por la proximidad semántica de παράπτωμα a culpa/falta/pecado; se evita una calca excesivamente técnica.'
- source_word: συνεζωοποίησεν
  english_pob_choice: he made us alive together
  chosen_spanish: nos dio vida juntamente
  alternatives_spanish:
  - nos hizo vivir juntamente
  - nos vivificó juntamente
  lexicon: BDAG
  rationale: El compuesto incluye tanto la idea de vivificar como la de hacerlo en unión. «Nos dio vida juntamente» conserva el valor verbal de dar vida y deja espacio para la frase siguiente que especifica la unión con el Mesías.
- source_word: τῷ Χριστῷ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título, no solo como nombre propio litúrgico. En español, «con el Mesías» preserva el contenido mesiánico explícito que la política terminológica del proyecto favorece.
- source_word: χάριτί
  english_pob_choice: by grace
  chosen_spanish: por gracia
  alternatives_spanish:
  - mediante la gracia
  - a causa de la gracia
  lexicon: BDAG
  rationale: El dativo se entiende instrumentalmente; «por gracia» es la formulación española natural y teológicamente establecida. Mantiene la fuerza de la causa/medio sin volverla explicativa de más.
- source_word: ἐστε σεσῳσμένοι
  english_pob_choice: you have been saved
  chosen_spanish: han sido salvos
  alternatives_spanish:
  - han sido salvados
  - son salvos
  lexicon: BDAG
  rationale: El perfecto perifrástico subraya un estado presente resultante de una acción completada. En español, «han sido salvos» mantiene ese valor resultativo y la voz pasiva. Se evita «son salvos» porque puede sonar más atemporal y menos claramente perfectivo.
theological_decisions:
- issue: Título Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se traduce el título con su sentido semántico primario, no con la forma tradicionalizada como nombre. Esto preserva la carga mesiánica del texto y sigue la línea auditada del POB.
  doctrine_reference: 'DOCTRINE.md: Χριστός default ''Messiah'' where title; ''Christ'' where name-like'
- issue: El alcance de χάριτί ἐστε σεσῳσμένοι
  english_pob_reading: retain as a parenthetical exclamation within dashes
  chosen_spanish_reading: mantenerlo como inciso entre rayas
  alternative_spanish_readings:
  - integrarlo sin rayas
  - colocarlo como cláusula subordinada
  rationale: Las rayas conservan el énfasis retórico abrupto del griego y la tensión teológica de la afirmación sobre la gracia, sin suavizarla ni explicarla de más.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el patrón auditado del POB: participio concesivo/temporal, dativo de esfera en παραπτώμασιν, compuesto verbal con idea de vivificación conjunta, Χριστός traducido como título, y el perfecto perifrástico conservado como estado presente resultante. Se tuvo en cuenta la revisión inglesa que osciló entre ''Christ'' y ''Messiah''; en español se mantiene ''Mesías'' por coherencia doctrinal y porque aquí el título es todavía activo semánticamente.'
  spanish_consistency_notes:
  - Se usa «Mesías» conforme al criterio del proyecto para Χριστός como título.
  - Se usa «por gracia» como equivalente estable de χάρις en sentido salvífico.
  - La voz pasiva «han sido salvos» conserva el resultado presente del perfecto griego.
  - «Pecados» funciona como equivalente idiomático de paráπτώμασιν en este contexto, con nota de alternativa para no ocultar la amplitud semántica.
