  glossary_alignment: 'Buena alineación con el glosario del proyecto en los puntos principales: σάρξ → «carne», no «naturaleza pecaminosa» en texto; τέκνα ὀργῆς preservado idiomáticamente; φύσει → «por naturaleza». La única mejora necesaria es reflejar mejor la diferencia léxica entre ἐπιθυμίαις («deseos») y θελήματα («voluntades») sin sacrificar demasiado la naturalidad.'
