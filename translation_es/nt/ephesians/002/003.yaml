translation:
  language: es
  text: entre quienes también todos nosotros una vez vivimos en los deseos de nuestra carne[a][b], haciendo las voluntades[c] de la carne y de los pensamientos, y éramos por naturaleza hijos de ira[d], como también los demás.[e]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los cuales»; el relativo griego puede apuntar de vuelta al ámbito de desobediencia o a las personas caracterizadas por él. «Entre quienes» toma la referencia personalmente en el contexto.
    reason: alternative_reading
  - marker: b
    text: «Carne» también podría verterse aquí como «naturaleza pecaminosa», pero el texto principal conserva el término paulino y deja explícita su plena carga teológica en lugar de interpretarla.
    reason: lexical_alternative
  - marker: c
    text: O «haciendo los deseos de la carne y de los pensamientos».
    reason: lexical_alternative
  - marker: d
    text: O «objetos de ira». La expresión «hijos de ira» es una traducción literal del modismo griego.
    reason: lexical_alternative
  - marker: e
    text: O «como también eran los demás».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν οἷς
  english_pob_choice: among whom
  chosen_spanish: entre quienes
  alternatives_spanish:
  - en los cuales
  - entre los cuales
  lexicon: BDAG
  rationale: El relativo dativo plural puede referirse personalmente a las personas mencionadas en el contexto. "Entre quienes" conserva esa referencia personal y suena natural en español, sin convertir la frase en una mera localización abstracta.
- source_word: ἀνεστράφημέν
  english_pob_choice: lived
  chosen_spanish: vivimos
  alternatives_spanish:
  - nos comportamos
  - anduvimos
  lexicon: BDAG
  rationale: El verbo puede significar vivir o conducirse. "Vivimos" comunica una forma de vida pasada de manera idiomática en español y sigue la decisión inglesa de no recargar la frase con una paráfrasis moralizante.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - antes
  - en otro tiempo
  lexicon: BDAG
  rationale: Marca el estado pasado previo a la conversión. "Una vez" es breve, natural y conserva el valor temporal puntual del griego.
- source_word: ἐπιθυμίαις
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - apetitos
  - codicias
  lexicon: BDAG
  rationale: '"Deseos" es amplio y permite abarcar anhelos moralmente desordenados sin restringir el sentido a lo sexual ni intensificarlo innecesariamente.'
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana
  lexicon: BDAG
  rationale: Se conserva el término paulino "carne" para no resolver por anticipado la tensión teológica del término. En español, como en el texto fuente, mantiene su fuerza antropológica y ética.
- source_word: ποιοῦντες
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - cumpliendo
  - practicando
  lexicon: BDAG
  rationale: El participio expresa acción en curso; "haciendo" refleja de forma directa y sobria el valor verbal sin sobreinterpretar la relación con la cláusula anterior.
- source_word: θελήματα
  english_pob_choice: wills
  chosen_spanish: deseos
  alternatives_spanish:
  - voluntades
  - quereres
  - voliciones
  lexicon: BDAG
  rationale: Aunque el inglés POB usa "desires" en su versión final para naturalidad, el griego indica una orientación volitiva. En español, "deseos" aquí mantiene el paralelismo con la cláusula anterior y sigue siendo comprensible; "voluntades" sonaría forzado en plural. La decisión preserva el matiz de impulsos/quereres sin endurecerlo doctrinalmente.
- source_word: διανοιῶν
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - mente
  - ideas
  - intenciones
  lexicon: BDAG
  rationale: El plural apunta a disposiciones o procesos mentales. "Pensamientos" es claro en español y mantiene el paralelismo con "carne" sin convertir el término en una abstracción técnica.
- source_word: τέκνα ὀργῆς
  english_pob_choice: children of wrath
  chosen_spanish: hijos de ira
  alternatives_spanish:
  - hijos de la ira
  - objetos de ira
  - destinados a ira
  lexicon: BDAG
  rationale: Se preserva el idiomático semitizante "hijos de ira" para no neutralizar la fuerza de la expresión. Aunque "de la ira" sería más explícito en español, la forma sin artículo mantiene la textura del original y la tensión interpretativa.
- source_word: φύσει
  english_pob_choice: by nature
  chosen_spanish: por naturaleza
  alternatives_spanish:
  - naturalmente
  - desde el nacimiento
  lexicon: BDAG
  rationale: '"Por naturaleza" es la forma más transparente y estable en español para expresar condición intrínseca o derivada del ser, manteniendo abierta la discusión teológica sin resolverla.'
- source_word: οἱ λοιποί
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los otros
  lexicon: BDAG
  rationale: '"Los demás" es una equivalencia natural y relacional en español, y comunica bien el contraste con la humanidad fuera de Cristo.'
theological_decisions:
- issue: σάρξ en contexto moral paulino
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  rationale: El texto habla de una esfera de deseos desordenados, pero traducirlo como "naturaleza pecaminosa" interpretaría más de lo que el griego dice. "Carne" conserva el término paulino y deja explícita la tensión teológica.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos para σάρξ; filosofía de traducción #3'
- issue: τέκνα φύσει ὀργῆς y su carga doctrinal
  english_pob_reading: we were by nature children of wrath
  chosen_spanish_reading: éramos por naturaleza hijos de ira
  alternative_spanish_readings:
  - éramos naturalmente hijos de ira
  - éramos por nacimiento objetos de ira
  rationale: La expresión es doctrinalmente sensible y se presta a lecturas sobre la condición humana y el juicio. La versión elegida reproduce el giro del griego sin explicarlo en exceso, preservando la tensión y la posibilidad de varias discusiones teológicas.
  doctrine_reference: 'DOCTRINE.md: filosofía de traducción #3'
- issue: Relación de ἐν οἷς con el antecedente
  english_pob_reading: among whom
  chosen_spanish_reading: entre quienes
  alternative_spanish_readings:
  - en los cuales
  rationale: La referencia personal al grupo mencionado previamente es más probable en contexto. "Entre quienes" mantiene esa lectura, aunque la construcción permite otras posibilidades; por eso se conserva la alternativa implícita en nota.
  doctrine_reference: Comentario sintáctico de Efesios 2:3; nota de lectura alternativa
- issue: distinción entre ἐπιθυμίαις y θελήματα
  english_pob_reading: desires ... desires
  chosen_spanish_reading: deseos ... deseos
  alternative_spanish_readings:
  - deseos ... voluntades
  - deseos ... quereres
  rationale: El griego usa dos términos distintos, pero en la segunda mitad el sustantivo tiene matiz volitivo. En español se optó por mantener "deseos" también allí para conservar naturalidad y paralelismo, señalando la diferencia en la documentación lexical.
  doctrine_reference: Comentario léxico de Efesios 2:3
- issue: τέκνα ὀργῆς como idiomático semitizante
  english_pob_reading: children of wrath
  chosen_spanish_reading: hijos de ira
  alternative_spanish_readings:
  - hijos de la ira
  - objetos de ira
  rationale: Se preserva la metáfora literal para no aplanarla en una categoría doctrinal más explícita. Esto mantiene la textura semítica del original y la ambigüedad productiva del sintagma.
  doctrine_reference: Comentario lexical-teológico de Efesios 2:3
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del contexto inglés, que mantuvo 'doing' para ποιοῦντες y conservó la estructura de la frase final con 'just as the rest were'. También respeta la decisión auditada de preservar 'flesh' como término paulino y de no sustituir el modismo 'children of wrath' por una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ en todo el versículo y se evita alternar con 'naturaleza pecaminosa' en el texto principal.
  - '''Hijos de ira'' conserva el modismo; la nota aclara la alternativa interpretativa sin borrar la tensión.'
  - La secuencia verbal 'vivimos ... haciendo ... éramos' refleja el paralelismo del griego y la progresión del argumento.
  - Se prefirió 'entre quienes' para sostener la referencia personal del relativo, coherente con el contexto inmediato de Efesios 2:2-3.
