  source_alignment_summary: 'El borrador capta bien la estructura general del griego: referencia personal en ἐν οἷς («entre quienes»), pasado compartido («también todos nosotros... una vez»), mantenimiento de σάρξ como «carne», y preservación del idiomático «hijos de ira». Sin embargo, hay dos desajustes relevantes. Primero, la nota [b] sobre «carne» está anclada a la primera ocurrencia, pero su ubicación actual junto a «hijos de ira» no corresponde al término comentado. Segundo, la traducción repite «deseos» para θελήματα, borrando en el texto principal la distinción fuente entre ἐπιθυμίαις y θελήματα, aunque la documentación reconoce ese matiz volitivo.'
