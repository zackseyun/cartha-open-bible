translation:
  language: es
  text: para que en los siglos venideros muestre las riquezas sobreabundantes de su gracia con bondad hacia nosotros en Mesías Jesús[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las edades venideras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las riquezas inconmensurables de su gracia».'
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «en Cristo Jesús»; se traduce «en Mesías Jesús» porque Χριστός se trata aquí como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa propósito o resultado; «para que» es natural en español y conserva la relación final de la cláusula.
- source_word: ἐνδείξηται
  english_pob_choice: he might display
  chosen_spanish: muestre
  alternatives_spanish:
  - demuestre
  - muestre públicamente
  lexicon: BDAG
  rationale: El aoristo medio subjuntivo después de ἵνα pide una forma final. «Muestre» conserva el sentido de hacer visible o exhibir sin sobrerregularizar el matiz técnico.
- source_word: ἐν τοῖς αἰῶσιν τοῖς ἐπερχομένοις
  english_pob_choice: in the coming ages
  chosen_spanish: en los siglos venideros
  alternatives_spanish:
  - en las edades venideras
  - en los siglos por venir
  lexicon: BDAG
  rationale: αἰῶνες puede referirse a edades o eras; «siglos venideros» es idiomático en español bíblico y preserva el plural y la idea de tiempo sucesivo. Se mantiene el sentido de futuro plural, no una sola era.
- source_word: τὸ ὑπερβάλλον πλοῦτος
  english_pob_choice: the surpassing riches
  chosen_spanish: las riquezas sobreabundantes
  alternatives_spanish:
  - las riquezas superabundantes
  - las riquezas inconmensurables
  lexicon: BDAG
  rationale: ὑπερβάλλον comunica excedencia/superación. «Sobreabundantes» conserva la intensificación y suena natural en español; el plural «riquezas» sigue el sustantivo griego de valor colectivo.
- source_word: τῆς χάριτος αὐτοῦ
  english_pob_choice: of his grace
  chosen_spanish: de su gracia
  alternatives_spanish:
  - de su favor
  lexicon: BDAG
  rationale: En Pablo, χάρις designa principalmente la gracia divina. «Gracia» es la equivalencia más fiel y teológicamente estable.
- source_word: ἐν χρηστότητι
  english_pob_choice: in kindness
  chosen_spanish: en bondad
  alternatives_spanish:
  - en amabilidad
  - con bondad
  lexicon: BDAG
  rationale: χρηστότης abarca bondad, benignidad y benevolencia. «Bondad» es una opción amplia y digna en español; aquí se mantiene la preposición para reflejar la estructura del griego.
- source_word: ἐφ’ ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - sobre nosotros
  - para con nosotros
  lexicon: BDAG
  rationale: ἐπί con acusativo indica dirección u ओरiente benéfico. «Hacia nosotros» comunica bien esa orientación sin introducir una imagen más fuerte que la del griego.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva «Mesías» como traducción del título Χριστός, siguiendo la pauta doctrinal del proyecto. En español, el orden «Mesías Jesús» mantiene la fuerza titular sin volverlo un mero nombre fijo.
theological_decisions:
- issue: Χριστός como título frente a forma nominalizada tradicional
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: 'El contexto conserva fuerza titulativa: no se trata solo de un nombre propio eclesiástico, sino del Mesías prometido. Traducirlo como «Mesías» evita borrar esa carga semántica y sigue la directriz del POB.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Relación semántica de ἐν χρηστότητι
  english_pob_reading: in kindness
  chosen_spanish_reading: en bondad
  alternative_spanish_readings:
  - en amabilidad
  - con bondad
  rationale: La frase puede entenderse como la esfera o el modo en que se manifiesta la gracia. «En bondad» conserva la estructura preposicional y la cualidad benevolente sin disolverla en una paráfrasis.
  doctrine_reference: BDAG χρηστότης
- issue: Pluralidad temporal de αἰῶσιν
  english_pob_reading: the coming ages
  chosen_spanish_reading: los siglos venideros
  alternative_spanish_readings:
  - las edades venideras
  - los siglos por venir
  rationale: El plural griego es significativo y se preserva. «Siglos» funciona bien en español bíblico y no reduce el horizonte a un solo tiempo futuro.
  doctrine_reference: BDAG αἰών
translation_notes:
  revision_awareness: El contexto inglés muestra una oscilación editorial entre «Christ Jesus» y «Messiah Jesus», con corrección final que restituye «Messiah Jesus» por política doctrinal. Para el español se siguió la lectura titulativa y se mantuvo la distinción entre título y nombre, sin depender mecánicamente de la última redacción inglesa. También se respetó la pluralidad de αἰῶνες y el matiz intensivo de ὑπερβάλλον sin exagerarlo.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός cuando funciona como título, en coherencia con la política del proyecto.
  - Se conserva «gracia» para χάρις por su fuerza paulina estable.
  - Se optó por un español digno y claro, con «siglos venideros» y «hacia nosotros» como equivalencias naturales que preservan el sentido del griego.
  - Las notas a, b y c se anclan exactamente en los segmentos relevantes del texto y ofrecen alternativas reales sin duplicar marcadores.
