translation:
  language: es
  text: no es de obras[a], para que nadie se jacte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «procede de obras». La frase denota origen o fuente; algunos intérpretes entienden un matiz instrumental («por obras»), pero el griego es más literalmente «de obras».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no ... de
  - no procede de
  lexicon: negación estándar
  rationale: La negación se vierte naturalmente con «no» en español, manteniéndola sobre la frase preposicional sin añadir matices ajenos al griego.
- source_word: ἐξ
  english_pob_choice: from
  chosen_spanish: proviene de
  alternatives_spanish:
  - de
  - sale de
  - es de origen en
  lexicon: ἐκ/ἐξ
  rationale: Aunque el inglés POB usa «from» para señalar origen, en español «proviene de» expresa con claridad el valor de fuente/origen de ἐξ sin volver la frase rígida. «De» sería más breve, pero menos explícito sobre la idea de procedencia.
- source_word: ἔργων
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - obras
  - hechos
  - obras de la ley
  lexicon: ἔργον
  rationale: «Obras» es un equivalente directo y natural en español para ἔργα/ἔργων en este contexto paulino. Se evita «obras de la ley» porque el texto griego no lo dice, y «hechos» suena menos específico en esta formulación.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - para que
  - a fin de que
  - de modo que
  lexicon: ἵνα
  rationale: «Para que» comunica bien la cláusula de propósito/resultado en español moderno y conserva la fuerza final de ἵνα.
- source_word: μή τις
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - nadie
  lexicon: μή τις
  rationale: La combinación negativa expresa el propósito de exclusión universal; «nadie» es la forma idiomática y precisa en español.
- source_word: καυχήσηται
  english_pob_choice: may boast
  chosen_spanish: se jacte
  alternatives_spanish:
  - se gloríe
  - presuma
  - se jacte
  lexicon: καυχάομαι
  rationale: «Jactarse» preserva bien el sentido de autoexaltación de καυχάομαι en Pablo. «Gloriarse» sería posible, pero en español puede sonar más litúrgico o ambiguo; «se jacte» mantiene la fuerza negativa del pasaje.
theological_decisions:
- issue: Alcance de «obras»
  english_pob_reading: Retain the broad phrase 'works' without narrowing it in translation.
  chosen_spanish_reading: Mantener «obras» sin especificar «de la ley» ni generalizarlo a «esfuerzo humano».
  alternative_spanish_readings:
  - obras de la ley
  - esfuerzo humano
  - buenas obras
  rationale: El griego dice solo ἔργων. La traducción debe conservar esa amplitud y dejar la delimitación exegética al contexto, sin resolver aquí una tensión teológica que el texto mismo no explicita.
  doctrine_reference: 'Principio POB: preservar la tensión teológica y no interpretar más allá del lexema.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el auditorial inglés: se conserva la negación, la idea de origen de ἐξ y la finalidad de ἵνα μή τις καυχήσηται. No se añadieron limitaciones interpretativas como «de la ley» ni expansiones como «esfuerzo humano».'
  spanish_consistency_notes:
  - Se usó «obras» de manera consistente con la terminología paulina y con la decisión inglesa de no estrechar el término.
  - «Se jacte» conserva el verbo de autoexaltación de καυχάομαι y funciona bien con la cláusula final negativa.
  - La nota al pie mantiene la alternativa «de obras» para reflejar la posible lectura de fuente/origen sin imponer una instrumentación exclusiva.
