translation:
  language: es
  text: Y vino y proclamó paz[a][b] a ustedes, los que estaban lejos, y paz a los que estaban cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, paz proclamada a los que antes estaban lejos y a los que estaban cerca; en el contexto, gentiles y judíos respectivamente (véase Efesios 2:11–13).
    reason: cross_reference
  - marker: b
    text: 'O: «predicó la buena noticia de paz». El verbo griego suele significar «anunciar buenas noticias», pero aquí su objeto es simplemente «paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - y vino
  - habiendo venido
  - cuando vino
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera natural en español con un verbo de movimiento simple. «Vino» conserva la imagen de llegada sin forzar una construcción participial pesada.
- source_word: εὐηγγελίσατο
  english_pob_choice: proclaimed
  chosen_spanish: anunció
  alternatives_spanish:
  - proclamó
  - predicó
  - anunció la buena nueva
  lexicon: BDAG
  rationale: El verbo puede significar anunciar buenas noticias. Aquí su objeto directo es «paz», así que «anunció» mantiene el acto de proclamación sin añadir «la buena nueva» al texto principal.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz reconciliadora
  - shalom
  lexicon: BDAG
  rationale: «Paz» es la correspondencia directa y suficientemente rica en este contexto de reconciliación entre grupos.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con «a ustedes» en español latinoamericano neutro.
- source_word: τοῖς μακρὰν
  english_pob_choice: who were far away
  chosen_spanish: los que estaban lejos
  alternatives_spanish:
  - los que estaban lejos
  - los de lejos
  - los que estaban alejados
  lexicon: BDAG
  rationale: La expresión sustantivada se conserva de forma idiomática. «Estaban» explicita el estado pasado implícito en el contexto sin insertar una identificación interpretativa en el cuerpo del versículo.
- source_word: τοῖς ἐγγύς
  english_pob_choice: those who were near
  chosen_spanish: los que estaban cerca
  alternatives_spanish:
  - los cercanos
  - los que estaban próximos
  lexicon: BDAG
  rationale: Se mantiene el paralelo con «los que estaban lejos» y el contraste espacial/metafórico del griego.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  lexicon: BDAG
  rationale: La repetición de la conjunción refleja la coordinación doble del griego y preserva el paralelismo retórico.
theological_decisions:
- issue: Identidad de «los que estaban lejos» y «los que estaban cerca»
  english_pob_reading: Render the phrases literally without importing the interpretation into the main text.
  chosen_spanish_reading: Mantener las categorías literales en el texto principal y dejar la identificación contextual en una nota.
  alternative_spanish_readings:
  - «ustedes gentiles que estaban lejos» y «los judíos que estaban cerca»
  rationale: En el contexto inmediato, Pablo alude a gentiles y judíos, pero el versículo usa primero el contraste metafórico de lejanía y cercanía. La traducción conserva esa tensión y evita resolverla prematuramente en el cuerpo del texto.
  doctrine_reference: Efesios 2:11–13, 19
- issue: Sentido de εὐηγγελίσατο con objeto «paz»
  english_pob_reading: Or 'preached good news of peace.' The Greek verb often means 'announce good news,' but here its object is simply 'peace.'
  chosen_spanish_reading: Anunciar «paz» como el contenido proclamado, sin introducir una glosa explicativa en el texto principal.
  alternative_spanish_readings:
  - «proclamó la buena nueva de paz»
  - «predicó buenas noticias de paz»
  rationale: El griego permite oír el matiz de buenas noticias, pero el objeto explícito es «paz». Por eso se conserva el verbo de anuncio en el texto y se aclara en nota la alternativa léxica.
  doctrine_reference: BDAG; Efesios 2:17
translation_notes:
  revision_awareness: El texto se mantiene alineado con la última revisión inglesa, que no requirió cambios, y con el dictamen de alta concordancia. No se introdujeron revisiones adicionales; se conservó el paralelismo doble del griego y la ambigüedad contextual de «lejos/cerca».
  spanish_consistency_notes:
  - Se usa «paz» en lugar de una paráfrasis teológica más amplia para respetar el objeto explícito del verbo griego.
  - Se evita «Cristo» o «Mesías» porque este versículo no contiene ninguno de esos términos.
  - Se mantiene el contraste «lejos/cerca» sin explicarlo en el cuerpo, siguiendo la disciplina de dejar la identificación contextual en nota.
  - La puntuación reproduce el paralelismo del griego con dos miembros coordinados por «y».
