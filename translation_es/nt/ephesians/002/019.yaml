  - severity: medium
    issue: '''conciudadanos de los santos'' para συμπολῖται τῶν ἁγίων'
    rationale: El audit trail inglés justifica un valor asociativo ('with the saints'). En español, 'de los santos' puede leerse como genitivo de pertenencia y no comunica tan claramente la ciudadanía compartida. 'Conciudadanos con los santos' es más fiel al sentido aunque ligeramente marcado; una nota puede explicar la alternativa.
