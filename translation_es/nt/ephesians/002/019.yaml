  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Dios'' y ''santos'' están bien manejados. La principal corrección es lexical/sintáctica: ajustar πάροικοι y la construcción con συμπολῖται τῶν ἁγίων para reflejar mejor el razonamiento documentado en el POB inglés.'
