  text: ἄρα οὖν οὐκέτι ἐστὲ ξένοι καὶ πάροικοι, ἀλλὰ ⸀ἐστὲ συμπολῖται τῶν ἁγίων καὶ οἰκεῖοι τοῦ θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/019.yaml
  text: So then[a], you are no longer strangers and resident foreigners, but you are fellow citizens with the saints and members of God's household[c][b],
  footnotes:
  - marker: a
    text: Or 'sojourners' for 'resident foreigners.' The Greek term refers to those living in a place without full civic status.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellow citizens of the saints.' The sense is that believers now share citizenship with God's holy people.
    reason: lexical_alternative
  - marker: c
    text: '''Saints'' here means God''s holy people, not a specially canonized class.'
    reason: cultural_note
