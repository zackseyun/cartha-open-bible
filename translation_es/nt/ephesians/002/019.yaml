translation:
  language: es
  text: Así que ya no son extranjeros ni forasteros, sino que son conciudadanos[a] con los santos y miembros de la casa de Dios[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conciudadanos de los santos». El griego expresa ciudadanía compartida con el pueblo santo de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «de la casa de Dios». La metáfora del hogar/casa señala pertenencia relacional, no solo residencia.
    reason: lexical_alternative
  - marker: c
    text: «Los santos» aquí significa el pueblo santo de Dios, no una clase especial canonizada.
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La combinación inferencial de partículas introduce una conclusión. «Así que» expresa bien ese enlace discursivo en español actual sin volver el texto demasiado rígido.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no es el caso que
  lexicon: BDAG
  rationale: «Ya no» comunica con naturalidad el cambio de estado que marca la negación temporal.
- source_word: ξένοι
  english_pob_choice: strangers
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - extraños
  - ajenos
  lexicon: BDAG
  rationale: En este contexto de pertenencia comunitaria y cívica, «extranjeros» transmite bien la idea de no pertenecer al pueblo/casa, aunque en español se cruza parcialmente con la siguiente palabra.
- source_word: πάροικοι
  english_pob_choice: resident foreigners
  chosen_spanish: residentes forasteros
  alternatives_spanish:
  - forasteros residentes
  - extranjeros residentes
  - sojuzgados
  lexicon: BDAG
  rationale: 'Se conserva la distinción social-jurídica: personas que viven allí, pero sin pertenencia plena. «Residentes forasteros» refleja ese matiz y evita neutralizar la fuerza del término.'
- source_word: συμπολῖται
  english_pob_choice: fellow citizens
  chosen_spanish: conciudadanos
  alternatives_spanish:
  - ciudadanos juntamente con
  - copartícipes de ciudadanía
  - compatriotas
  lexicon: BDAG
  rationale: «Conciudadanos» expresa de forma idiomática la ciudadanía compartida que enfatiza el compuesto griego.
- source_word: τῶν ἁγίων
  english_pob_choice: with the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - con los santos
  - de los santos de Dios
  lexicon: BDAG
  rationale: Aunque el inglés opta por «with», en español «conciudadanos de los santos» resulta menos natural y oscurece la relación. «De los santos» conserva la referencia al grupo de los consagrados, dejando abierta la tensión interpretativa documentada en el audit trail.
- source_word: οἰκεῖοι
  english_pob_choice: members of God's household
  chosen_spanish: miembros de la casa de Dios
  alternatives_spanish:
  - de la casa de Dios
  - miembros de la familia de Dios
  - domésticos de Dios
  lexicon: BDAG
  rationale: El sustantivo/adjetivo relacional apunta a pertenencia doméstica. «Miembros de la casa de Dios» mantiene la metáfora y es claro en español; se evita «familia» por no estar tan directamente sostenido por el término griego.
- source_word: τοῦ θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo posesivo de manera directa y transparente.
theological_decisions:
- issue: Referencia de «los santos» (τῶν ἁγίων)
  english_pob_reading: '''the saints'' refers to God''s holy people, likely including the covenant people of God broadly rather than only angels or only a narrow subgroup of Christians'
  chosen_spanish_reading: «los santos» se entiende como el pueblo santo de Dios, sin reducirlo en el texto principal a una subcategoría más estrecha
  alternative_spanish_readings:
  - ángeles
  - los cristianos canonizados
  - solo los creyentes judíos
  - todos los creyentes
  rationale: La traducción mantiene el término bíblico tradicional «los santos» porque el contexto exige preservar la amplitud del referente sin resolverla interpretativamente en la línea principal.
  doctrine_reference: Preservar la tensión teológica sin cerrarla en el texto principal.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto fuente y con el audit trail inglés: se mantienen las dos negaciones de estatus («ya no... sino...») y la triple idea de extranjería abolida, ciudadanía compartida y pertenencia doméstica. No hubo revisiones aplicadas en el registro inglés, y este borrador conserva esa estabilidad.'
  spanish_consistency_notes:
  - Se usa «Dios» en lugar de una máscara reverencial, conforme al principio del proyecto.
  - Se conserva «santos» como término bíblico, con aclaración en nota para evitar una lectura canonizadora.
  - '«Conciudadanos» y «miembros de la casa de Dios» mantienen el paralelismo conceptual del griego: ciudadanía y pertenencia doméstica.'
