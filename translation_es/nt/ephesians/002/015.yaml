translation:
  language: es
  text: habiendo abolido la ley de los mandamientos en decretos[a], para crear en sí mismo a los dos en un solo hombre nuevo[b], creando paz[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consistente en decretos» o, tradicionalmente, «en ordenanzas».
    reason: lexical_alternative
  - marker: b
    text: «Un solo hombre nuevo» es una imagen corporativa singular; alternativamente, «una nueva humanidad».
    reason: lexical_alternative
  - marker: c
    text: O «crear a los dos en sí mismo en un solo hombre nuevo».
    reason: previous_rendering
lexical_decisions:
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Ley
  lexicon: BDAG
  rationale: En español, «ley» conserva el sentido jurídico-covenantal de νόμος. Se escribe en minúscula porque aquí está cualificada por la frase siguiente y no funciona como nombre abstracto.
- source_word: ἐντολῶν
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - órdenes
  lexicon: BDAG
  rationale: «Mandamientos» preserva el valor formal y covenantal de ἐντολή mejor que «mandatos», y encaja naturalmente con «ley de los mandamientos».
- source_word: ἐν δόγμασιν
  english_pob_choice: in decrees
  chosen_spanish: en decretos
  alternatives_spanish:
  - en ordenanzas
  - consistente en decretos
  lexicon: BDAG
  rationale: «Decretos» es la correspondencia más directa y transparente para δόγμα. Se evita «ordenanzas» por su posible sesgo ritual tradicional y porque el texto griego subraya la forma decretiva de esa ley.
- source_word: καταργήσας
  english_pob_choice: having abolished
  chosen_spanish: habiendo abolido
  alternatives_spanish:
  - habiendo anulado
  - habiendo dejado sin efecto
  lexicon: BDAG
  rationale: «Habiendo abolido» transmite la acción decisiva previa del participio aoristo. Mantiene la fuerza fuerte del verbo sin expandir el sentido más allá del contexto de barrera divisoria entre judíos y gentiles.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: «Para» expresa con naturalidad la finalidad en español y mantiene el impulso teleológico del griego sin volver la frase pesada.
- source_word: τοὺς δύο
  english_pob_choice: the two
  chosen_spanish: a los dos
  alternatives_spanish:
  - los dos
  - ambos
  lexicon: BDAG
  rationale: «A los dos» conserva el numeral explícito y la referencia corporativa del contexto inmediato. Se prefiere esta forma para que el objeto directo suene natural en español.
- source_word: κτίσῃ
  english_pob_choice: might create
  chosen_spanish: crear
  alternatives_spanish:
  - formar
  - hacer
  lexicon: BDAG
  rationale: «Crear» conserva la fuerza de κτίζω y la resonancia de nueva creación que el pasaje sugiere.
- source_word: ἐν αὑτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - en él
  lexicon: BDAG
  rationale: «En sí mismo» refleja bien el reflexivo griego y subraya que la unidad nueva se produce en la persona misma de Cristo. Se prefiere la forma reflexiva por claridad en español.
- source_word: εἰς ἕνα καινὸν ἄνθρωπον
  english_pob_choice: into one new man
  chosen_spanish: en un solo hombre nuevo[b]
  alternatives_spanish:
  - en una nueva humanidad
  - en un nuevo ser humano
  lexicon: BDAG
  rationale: Se mantiene la metáfora singular masculina de ἄνθρωπον con «hombre». «Solo» ayuda a expresar la unidad de una sola realidad nueva. «Humanidad» es una alternativa interpretativa, pero no se adopta en el texto principal para no suavizar la imagen paulina.
- source_word: ποιῶν εἰρήνην
  english_pob_choice: making peace
  chosen_spanish: haciendo la paz
  alternatives_spanish:
  - procurando la paz
  - estableciendo la paz
  lexicon: BDAG
  rationale: «Haciendo la paz» sigue de cerca el participio presente y conserva la acción en curso/resultante vinculada a la nueva creación.
theological_decisions:
- issue: Cómo rendir ἄνθρωπον en un contexto corporativo de salvación
  english_pob_reading: one new man
  chosen_spanish_reading: un solo hombre nuevo
  alternative_spanish_readings:
  - una nueva humanidad
  - un nuevo ser humano
  rationale: El contexto es corporativo, pero el griego usa un singular masculino con fuerza representativa. Se conserva la imagen de «un solo hombre nuevo» para no sustituirla por una abstracción más interpretativa como «humanidad».
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Alcance de καταργήσας respecto de la ley
  english_pob_reading: having abolished
  chosen_spanish_reading: habiendo abolido
  alternative_spanish_readings:
  - habiendo anulado
  - habiendo dejado sin efecto
  rationale: Se conserva el lenguaje fuerte del texto, pero sin concluir que toda la voluntad moral de Dios queda abolida. El objeto inmediato es la «ley de los mandamientos en decretos» como factor de separación entre judíos y gentiles.
  doctrine_reference: DOCTRINE.md Affirmations and Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa en el orden de los complementos: «en sí mismo» va ligado a «crear» y antes del resultado «en un solo hombre nuevo», preservando la secuencia del griego sin sonar forzada en español. También incorpora la revisión que simplificó la equivalencia de δόγμα a «decretos» en lugar de «expresado en decretos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se usa «mandamientos» en línea con la decisión POB para ἐντολή.
  - Se evita «ordenanzas» en el texto principal para no importar una tradición terminológica no exigida por el griego.
  - La preposición «en» se usa para ἐν/εἰς según la naturalidad del español, conservando el sentido relacional y direccional del original.
