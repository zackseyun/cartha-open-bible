  text: αὐτοῦ γάρ ἐσμεν ποίημα, κτισθέντες ἐν Χριστῷ Ἰησοῦ ἐπὶ ἔργοις ἀγαθοῖς οἷς προητοίμασεν ὁ θεὸς ἵνα ἐν αὐτοῖς περιπατήσωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/010.yaml
  text: For we are his workmanship[a], created in Messiah Jesus for good works[b], which God prepared beforehand so that we might walk in them.
  footnotes:
  - marker: a
    text: Or 'in Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Paul's 'walk' language refers to one's manner of life or conduct.
    reason: lexical_alternative
