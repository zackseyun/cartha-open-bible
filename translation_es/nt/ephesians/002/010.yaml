  to: Porque somos obra suya, creados en Mesías Jesús[a] para buenas obras, las cuales Dios preparó de antemano para que anduviéramos en ellas[b].
  rationale: Se corrige la frase inicial para que refleje αὐτοῦ γάρ ἐσμεν ποίημα con español natural y sin redundancia posesiva. 'Obra suya' preserva bien el sentido de ποίημα y mejora la legibilidad general. Se mantienen 'Mesías Jesús', 'de antemano' y 'andar' conforme al rastro auditado y la política terminológica del proyecto.
