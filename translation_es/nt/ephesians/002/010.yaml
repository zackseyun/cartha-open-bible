translation:
  language: es
  text: Porque somos obra suya, creados en Mesías Jesús[a] para buenas obras, las cuales Dios preparó de antemano para que anduviéramos en ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en Cristo Jesús'. El título griego Χριστός se traduce aquí como 'Mesías' para preservar su sentido.
    reason: alternative_reading
  - marker: b
    text: El lenguaje de 'andar' en Pablo se refiere al modo de vivir o conducta.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: de él
  alternatives_spanish:
  - suyo
  - de Dios
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa con naturalidad en español como 'de él'. Mantiene la referencia a Dios sin volver la frase posesiva pesada o ambigua en este contexto.
- source_word: ποίημα
  english_pob_choice: workmanship
  chosen_spanish: hechura suya
  alternatives_spanish:
  - obra suya
  - obra de sus manos
  - trabajo
  lexicon: BDAG
  rationale: '''Hechura'' comunica el sentido de algo hecho o producido por Dios y preserva la imagen concreta de una obra fabricada, sin sonar tan técnico como ''workmanship'' ni tan genérico como ''obra''.'
- source_word: κτισθέντες
  english_pob_choice: created
  chosen_spanish: creados
  alternatives_spanish:
  - habiendo sido creados
  - hechos
  lexicon: BDAG
  rationale: El participio aoristo pasivo de κτίζω se vierte de forma directa con 'creados'. En español funciona bien como participio que acompaña a 'somos hechura suya'.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - en Jesús el Mesías
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' para Χριστός conforme a la política POB y porque aquí funciona como título, no meramente como parte fija del nombre. 'En Mesías Jesús' preserva la fuerza titular aunque sea menos convencional que 'Cristo Jesús'.
- source_word: ἐπὶ ἔργοις ἀγαθοῖς
  english_pob_choice: for good works
  chosen_spanish: para buenas obras
  alternatives_spanish:
  - para buenas obras y acciones
  - con vistas a buenas obras
  lexicon: BDAG
  rationale: La construcción con ἐπί + dativo expresa finalidad o dirección. 'Para buenas obras' es natural y fiel; 'obras' conserva el término paulino sin suavizarlo a 'acciones'.
- source_word: οἷς
  english_pob_choice: which
  chosen_spanish: las cuales
  alternatives_spanish:
  - que
  - en las cuales
  lexicon: BDAG
  rationale: El relativo retoma 'buenas obras'. 'Las cuales' mantiene claridad formal en español y evita una ambigüedad de antecedente.
- source_word: προητοίμασεν
  english_pob_choice: prepared beforehand
  chosen_spanish: preparó de antemano
  alternatives_spanish:
  - preparó antes
  - preparó previamente
  lexicon: BDAG
  rationale: '''De antemano'' refleja explícitamente el prefijo προ- y conserva la idea temporal sin añadir matices doctrinales ajenos al texto.'
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. 'Para que' es la forma más natural y clara en español contemporáneo.
- source_word: ἐν αὐτοῖς περιπατήσωμεν
  english_pob_choice: we might walk in them
  chosen_spanish: anduviéramos en ellas
  alternatives_spanish:
  - camináramos en ellas
  - viviéramos en ellas
  lexicon: BDAG
  rationale: '''Andar'' conserva el valor paulino de conducta o estilo de vida, y es el equivalente español más idiomático de περιπατέω sin perder la metáfora. El plural ''ellas'' concuerda con ''buenas obras''.'
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: La partícula introduce explicación o causa en relación con el contexto previo. 'Porque' transmite bien esa relación en español sin sobrecargar el nexo discursivo.
theological_decisions:
- issue: Χριστός como título o como forma nominalizada fija
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva la traducción titular 'Mesías' para no ocultar el valor semántico de Χριστός. Esto sigue la decisión auditada del POB de traducir títulos cuando el contexto lo permite, en lugar de adoptar la forma eclesial heredada por inercia.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested term Χριστός'
- issue: Relación entre la iniciativa divina y la conducta humana
  english_pob_reading: which God prepared beforehand so that we might walk in them
  chosen_spanish_reading: las cuales Dios preparó de antemano para que anduviéramos en ellas
  alternative_spanish_readings:
  - las cuales Dios preparó de antemano para que las hiciéramos
  - las cuales Dios preparó de antemano para vivir conforme a ellas
  rationale: 'La redacción conserva ambas afirmaciones del texto: Dios prepara previamente y el creyente debe andar en esas obras. No se resuelve la tensión teológica más allá de lo que el griego afirma.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La auditoría inglesa muestra un ida y vuelta reciente entre 'Messiah Jesus' y 'Christ Jesus', con corrección final para restaurar 'Messiah'. La versión española sigue esa decisión doctrinal y no adopta la forma heredada 'Cristo' salvo como alternativa anotada. También se retuvo la lectura de propósito con 'para que' y la metáfora de 'andar' sin resolverla a 'vivir', siguiendo el criterio de conservar el idioma paulino.
  spanish_consistency_notes:
  - Se usó 'Mesías' para Χριστός en el texto principal, en línea con la política POB y con la revisión final del registro inglés.
  - '''Anduviéramos'' preserva el valor metafórico de περιπατέω; la nota aclara el sentido conductual sin sustituirlo.'
  - '''Buenas obras'' mantiene el plural y el registro bíblico; no se suavizó a ''buenas acciones''.'
  - El orden de la cláusula relativa sigue el flujo del griego y evita una paráfrasis interpretativa.
