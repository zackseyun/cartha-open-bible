    text: O 'en Cristo Jesús'. El título griego Χριστός se traduce aquí como 'Mesías' para preservar su sentido.
    reason: alternative_reading
  - marker: b
    text: El lenguaje de 'andar' en Pablo se refiere al modo de vivir o conducta.
    reason: lexical_alternative
  revision_rationale: Se corrige la frase inicial para que refleje αὐτοῦ γάρ ἐσμεν ποίημα con español natural y sin redundancia posesiva. 'Obra suya' preserva bien el sentido de ποίημα y mejora la legibilidad general. Se mantienen 'Mesías Jesús', 'de antemano' y 'andar' conforme al rastro auditado y la política terminológica del proyecto.
