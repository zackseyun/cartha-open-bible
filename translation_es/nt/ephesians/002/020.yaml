translation:
  language: es
  text: habiendo sido edificados sobre el fundamento de los apóstoles y profetas[b], siendo el mismo Mesías Jesús[a] la piedra angular,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo Jesús». El título griego Χριστός se traduce aquí como «Mesías» para preservar su sentido.'
    reason: alternative_reading
  - marker: b
    text: «De los apóstoles y profetas» puede significar el fundamento asociado con su testimonio, el fundamento puesto por ellos o el fundamento que consiste en ellos; el genitivo griego no lo especifica con mayor precisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποικοδομηθέντες
  english_pob_choice: having been built
  chosen_spanish: habiendo sido edificados
  alternatives_spanish:
  - siendo edificados
  - habiendo sido construidos
  lexicon: BDAG
  rationale: El participio aoristo pasivo pide una forma participial en español que conserve la pasividad y la relación con la imagen de edificación. 'Habiendo sido edificados' mantiene el valor resultativo y encaja con la sintaxis amplia del pasaje.
- source_word: ἐπὶ τῷ θεμελίῳ
  english_pob_choice: on the foundation
  chosen_spanish: sobre el fundamento
  alternatives_spanish:
  - sobre la base
  - sobre la fundación
  lexicon: BDAG
  rationale: '''Fundamento'' es el equivalente arquitectónico más natural y fiel. ''Sobre'' expresa el soporte/lugar de apoyo que exige la imagen.'
- source_word: τῶν ἀποστόλων καὶ προφητῶν
  english_pob_choice: of the apostles and prophets
  chosen_spanish: de los apóstoles y profetas
  alternatives_spanish:
  - puesto por los apóstoles y profetas
  - de los apóstoles y de los profetas
  lexicon: BDAG
  rationale: Se conserva el genitivo de forma sobria sin decidir más de lo que el griego permite. El español mantiene la tensión entre fundamento asociado a su testimonio, puesto por ellos o consistente en ellos.
- source_word: ὄντος
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - mientras él es
  - con él como
  lexicon: BDAG
  rationale: El genitivo absoluto se traslada con un participio español breve para conservar la relación subordinada sin añadir una estructura interpretativa más fuerte.
- source_word: ἀκρογωνιαίου
  english_pob_choice: cornerstone
  chosen_spanish: piedra angular
  alternatives_spanish:
  - piedra principal
  - piedra del ángulo
  lexicon: BDAG
  rationale: '''Piedra angular'' es una solución natural y precisa para el término de la metáfora edilicia. Evita ampliar el sentido a ''principal'' o restringirlo innecesariamente.'
- source_word: αὐτοῦ
  english_pob_choice: himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - mismo él
  - en persona
  lexicon: BDAG
  rationale: El pronombre se vuelve enfático en español con 'él mismo', preservando la identificación personal con el sujeto, no una lectura impersonal.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' porque Χριστός funciona aquí como título, conforme a la política del POB y al sentido doctrinal del texto. 'Jesús' mantiene el nombre propio sin fusionarlo en una forma litúrgica fija.
theological_decisions:
- issue: Sentido de 'fundamento de los apóstoles y profetas'
  english_pob_reading: A deliberately broad genitive left untranslated beyond 'of the apostles and prophets,' allowing the phrase to denote the foundational role/witness associated with apostles and prophets without specifying whether they are the foundation personally or by their teaching.
  chosen_spanish_reading: Se deja 'de los apóstoles y profetas' sin precisar si el fundamento consiste en su testimonio, si fue puesto por ellos o si se refiere a ellos mismos como fundamento.
  alternative_spanish_readings:
  - fundamento puesto por los apóstoles y profetas
  - fundamento que consiste en los apóstoles y profetas
  rationale: El griego permite más de una relación genitiva; la traducción española conserva esa amplitud para no resolver una tensión eclesiológica que el texto no cierra.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Traducción de Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La política terminológica del proyecto favorece 'Mesías' cuando Χριστός funciona como título. En este contexto la identificación con Jesús es titulary doctrinalmente significativa, por lo que la forma española conserva el valor semántico del griego.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (where title; Cristo where name-like).'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión intermedia que cambió 'Messiah Jesus' por 'Christ Jesus' para mayor correspondencia léxica, seguida de una corrección regresiva que restauró 'Messiah' conforme a la política doctrinal del proyecto. La presente versión española sigue esa corrección final y mantiene 'Mesías Jesús'.
  spanish_consistency_notes:
  - Se emplea 'Mesías' para Χριστός por coherencia con la terminología base del proyecto, evitando 'Cristo' como forma no motivada por el contexto.
  - '''Fundamento'' y ''piedra angular'' conservan la metáfora arquitectónica sin expansión interpretativa.'
  - La secuencia participial en español busca sonar natural sin perder la subordinación del original griego.
