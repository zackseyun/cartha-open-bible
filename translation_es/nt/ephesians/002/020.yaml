  source_alignment_summary: 'El borrador conserva bien los elementos léxicos principales del griego: participio pasivo (''habiendo sido edificados''), metáfora arquitectónica (''fundamento'', ''piedra angular''), genitivo amplio (''de los apóstoles y profetas'') y la política del proyecto para Χριστός (''Mesías Jesús''). Sin embargo, el orden sintáctico español descoloca gravemente el sentido: deja ''Mesías Jesús'' al final, separado de ''siendo él mismo la piedra angular'', cuando en el griego αὐτοῦ ⸂Χριστοῦ Ἰησοῦ⸃ forma una unidad clara: ''siendo el mismo Mesías Jesús la piedra angular''.'
  spanish_quality_summary: 'La legibilidad y naturalidad requieren reparación. La frase actual suena truncada y poco idiomática en español porque el predicado participial y su referente personal quedan invertidos de manera antinatural. Además, las notas están mal distribuidas respecto del rastro inglés: la nota sobre el genitivo pertenece a ''apóstoles y profetas'', pero la nota sobre ''piedra angular'' no corresponde a la nota inglesa b, que trata del genitivo, no de ἀκρογωνιαῖος. Conviene reordenar la oración y ajustar las notas para que reflejen la auditoría POB.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: ''Mesías Jesús'' es correcto y preferible a ''Cristo Jesús'' aquí; ''piedra angular'' es aceptable para ἀκρογωνιαῖος; ''fundamento'' y ''edificados'' son fieles. No hay conflicto con Yahvé, Espíritu, justicia, gracia, etc. La principal corrección es sintáctica y de correspondencia de notas, no terminológica.'
