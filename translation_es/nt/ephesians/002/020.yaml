    rationale: El español 'siendo él mismo la piedra angular, Mesías Jesús' suena invertido y separa al referente de 'él mismo'. El griego identifica directamente a Χριστοῦ Ἰησοῦ como la piedra angular; en español debe decirse 'siendo el mismo Mesías Jesús la piedra angular' o equivalente.
  - severity: medium
