  to: Porque él mismo es nuestra paz[a], quien hizo de ambos uno y derribó el muro divisorio de la barrera[b]—la hostilidad— en su carne[c].
  rationale: Se ajusta «muro de separación» a «muro divisorio de la barrera» para conservar mejor la doble expresión griega μεσότοιχον τοῦ φραγμοῦ y alinearse con la auditoría inglesa. También se normaliza el uso del guion largo en español. El resto del versículo es fiel y natural, por lo que la revisión es menor.
