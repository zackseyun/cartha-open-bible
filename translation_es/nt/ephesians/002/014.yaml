translation:
  language: es
  text: Porque él mismo es nuestra paz[a], quien hizo de ambos uno y derribó el muro divisorio de la barrera[b]—la hostilidad— en su carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos»; la frase se refiere a judíos y gentiles en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O «muro medio de partición».
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «en su carne»; es decir, mediante su muerte encarnada, no por dejar de ser humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: 'El pronombre intensivo se conserva con «él mismo» para mantener el énfasis personal: no solo trae paz, sino que él mismo es nuestra paz.'
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Aquí introduce la base de la afirmación previa; «Porque» mantiene la relación discursiva con claridad natural en español.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz reconciliadora
  - paz
  lexicon: BDAG
  rationale: «Paz» comunica bien el sentido relacional y reconciliador del contexto; añadir un adjetivo interpretativo no es necesario en el texto principal.
- source_word: ὁ ποιήσας
  english_pob_choice: who made
  chosen_spanish: quien hizo
  alternatives_spanish:
  - quien habiendo hecho
  - el que hizo
  lexicon: BDAG
  rationale: La cláusula participial se vierte naturalmente como relativa en español, preservando la acción completada atribuida a Cristo.
- source_word: τὰ ἀμφότερα
  english_pob_choice: both
  chosen_spanish: de ambos
  alternatives_spanish:
  - ambos
  - las dos partes
  lexicon: BDAG
  rationale: «De ambos» conserva la referencia dual sin añadir un sustantivo que el griego no expresa explícitamente; el contexto permite entender judíos y gentiles.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - en uno
  - una sola cosa
  lexicon: BDAG
  rationale: «Uno» reproduce con concisión el resultado de unidad expresado por el predicativo griego.
- source_word: μεσότοιχον
  english_pob_choice: dividing wall
  chosen_spanish: muro de separación
  alternatives_spanish:
  - muro divisorio
  - muro de partición
  lexicon: BDAG
  rationale: «Muro de separación» comunica el valor separador del término con naturalidad en español y mantiene la imagen arquitectónica/metafórica.
- source_word: τοῦ φραγμοῦ
  english_pob_choice: of the barrier
  chosen_spanish: de separación
  alternatives_spanish:
  - de la barrera
  - de la partición
  lexicon: BDAG
  rationale: El genitivo refuerza la idea de barrera o separación; en español, «de separación» integra bien el sentido sin sonar arcaico.
- source_word: λύσας
  english_pob_choice: broke down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - demolió
  lexicon: BDAG
  rationale: Para un muro, «derribó» es la expresión más natural y vívida en español, equivalente a la acción de desmontar o abatir el obstáculo.
- source_word: ἔχθραν
  english_pob_choice: the hostility
  chosen_spanish: la hostilidad
  alternatives_spanish:
  - la enemistad
  lexicon: BDAG
  rationale: «Hostilidad» conserva el tono relacional y conflictivo del sustantivo; «enemistad» es posible, pero «hostilidad» es más directa en español contemporáneo.
- source_word: ἐν τῇ σαρκὶ αὐτοῦ
  english_pob_choice: in his flesh
  chosen_spanish: en su carne
  alternatives_spanish:
  - en su cuerpo
  - por su carne
  lexicon: BDAG
  rationale: Se mantiene «carne» porque σάρξ en este contexto debe conservar su forma literal; no se sustituye por «cuerpo» ni por una paráfrasis moralizante. La frase se entiende en relación con su muerte encarnada.
theological_decisions:
- issue: Referente de τὰ ἀμφότερα
  english_pob_reading: '''both'' refers to Jews and Gentiles in the immediate context'
  chosen_spanish_reading: «ambos» deja implícitos judíos y gentiles según el contexto inmediato
  alternative_spanish_readings:
  - «ambos grupos»
  - «las dos partes»
  rationale: El texto griego solo dice «ambos»; el contexto de Efesios 2 permite identificar a judíos y gentiles sin introducir una expansión innecesaria en el versículo principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de σάρξ
  english_pob_reading: literal 'flesh' rather than interpretive 'body' or metaphorical 'sinful nature'
  chosen_spanish_reading: «carne» se conserva literalmente, no como «cuerpo» ni como «naturaleza pecaminosa»
  alternative_spanish_readings:
  - cuerpo
  - naturaleza humana
  - naturaleza pecaminosa
  rationale: La guía del proyecto favorece «carne» en usos literales de σάρξ. Aquí la referencia es a la realidad encarnada y sacrificial de Cristo, no a una naturaleza moralmente caída.
  doctrine_reference: 'Contested terms table: σάρξ'
- issue: Relación sintáctica de «la hostilidad»
  english_pob_reading: 'appositional/explanatory dash: the dividing wall of the barrier—namely, the hostility'
  chosen_spanish_reading: 'guiones para conservar el valor explicativo: «muro de separación —la hostilidad—»'
  alternative_spanish_readings:
  - «muro de separación, es decir, la hostilidad»
  - «muro de separación; la hostilidad»
  rationale: El griego presenta una secuencia que explica la barrera como hostilidad; los guiones preservan esa relación sin cerrar prematuramente la frase ni desplazar el sentido al versículo siguiente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés que afinó τὰ ἀμφότερα de «both groups» a «both» por mayor fidelidad léxica, y mantiene la aclaración de la hostilidad entre guiones para conservar la sintaxis abierta del griego. También conserva «in his flesh» como «en su carne» para evitar la lectura errónea de una localización interna de la hostilidad en Cristo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino; aquí no se presenta.
  - «carne» mantiene coherencia con el tratamiento de σάρξ en sentidos literales.
  - «paz» se usa en sentido reconciliador, acorde con el contexto de Efesios 2.
  - La puntuación con guiones busca reflejar la apposición explicativa del original sin sobrecargar el verso.
