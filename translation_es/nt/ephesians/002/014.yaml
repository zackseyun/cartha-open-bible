    reason: lexical_alternative
  - marker: c
    text: Greek 'in his flesh'; that is, through his embodied death, not by removing his humanity.
    reason: lexical_alternative
  - marker: d
    text: Or 'the hostility in his flesh,'.
    reason: previous_rendering
