translation:
  language: es
  text: Y ustedes[a], estando muertos en sus delitos y pecados,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muertos a causa de sus delitos y pecados». El dativo griego puede entenderse de más de una manera estrechamente relacionada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Ahora
  lexicon: BDAG
  rationale: Mantiene la fuerza conjuntiva que enlaza este versículo con el contexto anterior. En español, «Y» es la opción más natural y fiel.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes todos
  lexicon: BDAG
  rationale: El griego es plural; «ustedes» comunica ese plural de manera natural en español latinoamericano sin perder la referencia directa a los lectores.
- source_word: ὄντας
  english_pob_choice: being
  chosen_spanish: estando
  alternatives_spanish:
  - siendo
  - eran
  lexicon: BDAG
  rationale: El participio presente se refleja mejor con una forma participial española. «Estando» preserva el valor de estado continuo que el inglés POB también procuró mantener con «being».
- source_word: νεκροὺς
  english_pob_choice: dead
  chosen_spanish: muertos
  alternatives_spanish:
  - sin vida
  - espiritualmente muertos
  lexicon: BDAG
  rationale: «Muertos» es el equivalente directo de νεκρός y conserva la metáfora sin explicarla de antemano. Se evita añadir «espiritualmente» para no resolver la tensión interpretativa del texto.
- source_word: τοῖς παραπτώμασιν
  english_pob_choice: in your trespasses
  chosen_spanish: en sus transgresiones
  alternatives_spanish:
  - por sus transgresiones
  - a causa de sus transgresiones
  lexicon: BDAG
  rationale: El dativo griego admite una relación cercana a esfera o causa. «En sus transgresiones» reproduce de manera compacta esa relación, siguiendo la decisión inglesa de no fijarla en exceso.
- source_word: παραπτώμασιν
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - pecados
  lexicon: BDAG
  rationale: «Transgresiones» distingue este término de ἁμαρτίαι y conserva la idea de una desviación o violación específica.
- source_word: ταῖς ἁμαρτίαις
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - errores
  lexicon: BDAG
  rationale: «Pecados» es el equivalente directo y más natural de ἁμαρτία en este contexto. Se conserva la distinción léxica frente a «transgresiones».
theological_decisions:
- issue: Estado de muerte en relación con el pecado
  english_pob_reading: Retain 'dead' as the text's metaphor for the readers' condition in relation to sin, without expanding it to 'spiritually dead' in the main text.
  chosen_spanish_reading: Conservar «muertos» como metáfora de la condición de los lectores en relación con el pecado, sin expandirla a «espiritualmente muertos» en el texto principal.
  alternative_spanish_readings:
  - espiritualmente muertos
  - muertos a causa de sus pecados
  rationale: La frase griega expresa muerte vinculada a las transgresiones y pecados, pero no explicita la categoría teológica. La traducción debe preservar esa tensión y no interpretar de más.
  doctrine_reference: Translation philosophy §3
- issue: Relación del dativo con transgresiones y pecados
  english_pob_reading: The Greek dative can be understood in more than one closely related way.
  chosen_spanish_reading: El dativo griego puede entenderse de más de una manera estrechamente relacionada; «en» deja abierta la relación.
  alternative_spanish_readings:
  - por
  - a causa de
  rationale: Como en el inglés POB, conviene mantener abierta la relación semántica del dativo sin fijar una sola explicación causal o local. Esto respeta la ambigüedad útil del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una construcción participial ('being dead') para reflejar ὄντας con mayor cercanía. En español se conserva esa cercanía con «estando muertos», manteniendo además la relación compacta del dativo mediante «en sus transgresiones y pecados».
  spanish_consistency_notes:
  - Se usa «transgresiones» para παραπτώμασιν y «pecados» para ἁμαρτίαις, conservando la distinción léxica observada en el audit trail.
  - Se emplea «ustedes» para reflejar el plural griego sin forzar una forma regional particular.
  - Se evita añadir «espiritualmente» en el cuerpo principal para no desplazar la metáfora textual.
  - La nota a pie de página reproduce la alternativa causal documentada en el inglés POB y la adapta al español sin introducir una lectura nueva.
