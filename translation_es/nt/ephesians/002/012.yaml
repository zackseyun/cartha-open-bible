translation:
  language: es
  text: que en aquel tiempo ustedes estaban sin[a] Mesías, ajenos a la ciudadanía de Israel y extraños a los pactos de la promesa[b], sin esperanza y sin Dios[c] en el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sin Cristo’. Χριστός puede traducirse aquí de cualquiera de las dos maneras; ‘Mesías’ preserva mejor el sentido del título en este contexto judío-covenantal.
    reason: alternative_reading
  - marker: b
    text: O ‘los pactos de promesa’. Se conserva el plural de διαθῆκαι; el singular ‘promesa’ especifica la promesa asociada a esos pactos.
    reason: lexical_alternative
  - marker: c
    text: O ‘impíos’. La frase puede denotar estar sin el verdadero Dios más que ateísmo filosófico.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς Χριστοῦ
  english_pob_choice: without Messiah
  chosen_spanish: sin Mesías
  alternatives_spanish:
  - sin Cristo
  lexicon: BDAG
  rationale: χωρὶς expresa separación o ausencia, y Χριστοῦ funciona aquí como título. En español, ‘Mesías’ preserva el valor titular y su trasfondo judío-covenantal, siguiendo la decisión auditada del POB en inglés.
- source_word: ἀπηλλοτριωμένοι
  english_pob_choice: alienated
  chosen_spanish: alejados
  alternatives_spanish:
  - alienados
  - separados
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado de distancia o exclusión ya establecido. ‘Alejados’ comunica bien la separación relacional y social en español; ‘alienados’ es posible pero suena más técnico/abstracto en este contexto.
- source_word: τῆς πολιτείας τοῦ Ἰσραήλ
  english_pob_choice: the commonwealth of Israel
  chosen_spanish: de la comunidad de Israel
  alternatives_spanish:
  - de la ciudadanía de Israel
  - de la commonwealth de Israel
  lexicon: BDAG
  rationale: πολιτεία aquí apunta a la pertenencia corporativa y al orden cívico-identitario de Israel. ‘Comunidad de Israel’ conserva el sentido colectivo de pertenencia de forma natural en español, sin introducir un calco duro como ‘commonwealth’.
- source_word: ξένοι
  english_pob_choice: strangers
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - extraños
  lexicon: BDAG
  rationale: En paralelo con ‘alejados’, ξένοι nombra a quienes están fuera de una esfera de pertenencia. ‘Extranjeros’ expresa bien la exterioridad respecto de los pactos; ‘forasteros’ es menos formal y ‘extraños’ puede sonar demasiado literal o ambiguo.
- source_word: τῶν διαθηκῶν τῆς ἐπαγγελίας
  english_pob_choice: the covenants of the promise
  chosen_spanish: a los pactos de la promesa
  alternatives_spanish:
  - a los pactos de la promesa
  - a los pactos prometidos
  - a los pactos de la promesa hecha
  lexicon: BDAG
  rationale: Se preserva el plural de διαθήκαι y el genitivo ἐπαγγελίας como especificación. ‘Pactos’ es una opción transparente en español para διαθήκη en este pasaje; mantiene el matiz de alianza sin exigir el término eclesiástico ‘pacto’ como tecnicismo rígido.
- source_word: ἐλπίδα μὴ ἔχοντες
  english_pob_choice: having no hope
  chosen_spanish: sin esperanza
  alternatives_spanish:
  - no teniendo esperanza
  - sin ninguna esperanza
  lexicon: BDAG
  rationale: La frase participial se vierte de manera natural como un estado continuo. ‘Sin esperanza’ conserva la idea de carencia total y fluye bien en español bíblico contemporáneo.
- source_word: ἄθεοι
  english_pob_choice: without God
  chosen_spanish: sin Dios
  alternatives_spanish:
  - sin el verdadero Dios
  - desprovistos de Dios
  lexicon: BDAG
  rationale: Como en el POB inglés, se evita trasladar el término a la categoría moderna de ateísmo filosófico. ‘Sin Dios’ mantiene la fuerza de privación teológica y la referencia a ausencia de relación con el Dios verdadero.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en este mundo
  lexicon: BDAG
  rationale: κόσμος se traduce de forma directa como ‘mundo’ aquí, con el sentido de esfera de existencia humana. La construcción es idiomática y suficiente en español.
- source_word: ὅτι ... ἦτε
  english_pob_choice: that ... you were
  chosen_spanish: que ... ustedes estaban
  alternatives_spanish:
  - que ... ustedes eran
  - que ... ustedes fueron
  lexicon: BDAG
  rationale: ὅτι introduce la cláusula dependiente del recuerdo previo. El imperfecto ἦτε se expresa con ‘estaban’ para señalar condición pasada continua; se usa ‘ustedes’ por claridad y naturalidad en español.
theological_decisions:
- issue: Rendering of Χριστός as a title in Ephesians 2:12
  english_pob_reading: without Messiah
  chosen_spanish_reading: sin Mesías
  alternative_spanish_readings:
  - sin Cristo
  rationale: La decisión del POB privilegia el valor titular y la carga judío-mesiánica de Χριστός. En español, ‘Mesías’ preserva ese sentido y evita que el lector oiga solo un nombre propio descontextualizado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Meaning of ἄθεοι in a covenantal context
  english_pob_reading: without God
  chosen_spanish_reading: sin Dios
  alternative_spanish_readings:
  - impíos
  - ateos
  rationale: Se conserva la tensión entre ausencia relacional y ausencia del verdadero Dios, sin imponer la categoría moderna de ateísmo. ‘Sin Dios’ deja abierta la fuerza teológica del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
- issue: Sense of πολιτεία in relation to Israel
  english_pob_reading: the commonwealth of Israel
  chosen_spanish_reading: la comunidad de Israel
  alternative_spanish_readings:
  - la ciudadanía de Israel
  - el orden cívico de Israel
  rationale: El punto no es solo estatus individual, sino pertenencia corporativa al pueblo y su orden de vida. ‘Comunidad de Israel’ comunica esa dimensión sin forzar un tecnicismo político poco natural en español.
  doctrine_reference: 'DOCTRINE.md: Preserve corporate/covenantal nuance'
translation_notes:
  revision_awareness: El contexto inglés muestra una oscilación revisada entre ‘Christ’ y ‘Messiah’, con restitución final de ‘Messiah’ por fidelidad a la política doctrinal del proyecto. La presente versión española sigue esa decisión y la expresa como ‘Mesías’. También se conserva la nota sobre ἄθεοι para evitar una lectura moderna de ateísmo filosófico.
  spanish_consistency_notes:
  - Se mantuvo ‘Mesías’ para Χριστός, coherente con la política del proyecto y con el audit trail en inglés.
  - ‘Pactos’ se usa para διαθήκαι de modo natural en español, sin perder el plural ni la referencia al pacto/promesa.
  - ‘Sin Dios’ conserva la ambigüedad teológica productiva de ἄθεοι; la nota aclara que no se trata necesariamente de ateísmo moderno.
  - Se evitó ‘SEÑOR’ o una máscara para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - La puntuación sigue una sola cláusula larga, adecuada al griego y legible en español moderno.
