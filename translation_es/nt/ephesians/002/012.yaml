source:
  edition: SBLGNT
  text: ὅτι ⸀ἦτε τῷ καιρῷ ἐκείνῳ χωρὶς Χριστοῦ, ἀπηλλοτριωμένοι τῆς πολιτείας τοῦ Ἰσραὴλ καὶ ξένοι τῶν διαθηκῶν τῆς ἐπαγγελίας, ἐλπίδα μὴ ἔχοντες καὶ ἄθεοι ἐν τῷ κόσμῳ.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/012.yaml
  text: that at that time you were without Messiah[a], alienated from the commonwealth of Israel and strangers to the covenants of the promise[c][b], having no hope and without God in the world.
  footnotes:
  - marker: a
    text: Or 'without Christ.' The Greek title Χριστός can be rendered either way; here 'Messiah' preserves the title's meaning in its Jewish-covenantal context.
    reason: alternative_reading
  - marker: b
    text: Or 'the covenants of promise.'
    reason: lexical_alternative
  - marker: c
    text: Or 'godless.' The phrase may denote being without the true God rather than philosophical atheism.
    reason: lexical_alternative
