  - severity: high
    issue: ‘extranjeros a los pactos’ es poco idiomático
    rationale: En español la construcción con ‘a’ suena forzada. Para ξένοι τῶν διαθηκῶν conviene ‘ajenos a los pactos’ o ‘extraños a los pactos’, que expresan exterioridad relacional de manera natural.
  - severity: medium
    issue: Marcador de nota c mal ubicado
    rationale: La nota c explica ‘sin Dios’/‘sin el verdadero Dios’, pero el ancla está puesta en ‘mundo’. El marcador debe aparecer junto a ‘Dios’ o la frase correspondiente.
  - severity: low
