translation:
  language: es
  text: Porque por medio de él los dos tenemos acceso[a][b][c] en un mismo Espíritu al Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque, por medio de él, los dos tenemos acceso…».'
    reason: lexical_alternative
  - marker: b
    text: «Acceso» también puede traducirse «introducción» o «acercamiento».
    reason: lexical_alternative
  - marker: c
    text: 'O: «en un solo Espíritu»; «en un mismo Espíritu» conserva la forma griega y puede expresar medio o esfera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto ὅτι introduce la razón o explicación de la afirmación anterior. «Porque» comunica bien esa relación causal/explanatoria en español y mantiene naturalidad.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de él» conserva con claridad el matiz mediador de Cristo/Mesías y suena natural en español bíblico actual.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - contamos con
  lexicon: BDAG
  rationale: El presente indicativo expresa una realidad compartida y actual. «Tenemos» es la equivalencia más directa y idiomática para la afirmación de acceso presente.
- source_word: τὴν προσαγωγὴν
  english_pob_choice: access
  chosen_spanish: acceso
  alternatives_spanish:
  - introducción
  - aproximación
  - derecho de acceso
  lexicon: BDAG
  rationale: «Acceso» es el equivalente moderno más claro y reproduce bien la idea de entrada o posibilidad de acercarse a la presencia del Padre sin sobreexplicar la imagen.
- source_word: οἱ ἀμφότεροι
  english_pob_choice: we both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos grupos
  - nosotros dos
  lexicon: BDAG
  rationale: La frase alude a los dos grupos antes separados, ahora unidos. En español, «ambos» comunica esa inclusión conjunta sin añadir palabras que el texto no dice.
- source_word: ἐν ἑνὶ πνεύματι
  english_pob_choice: in one Spirit
  chosen_spanish: en un mismo Espíritu
  alternatives_spanish:
  - en un solo Espíritu
  - por un mismo Espíritu
  - en un espíritu
  lexicon: BDAG
  rationale: Se conserva la preposición ἐν con «en» para respetar la formulación griega. «Un mismo Espíritu» refleja la unidad compartida y, por el contexto trinitario de Efesios 2, se entiende mejor con Espíritu mayúscula.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - hacia el Padre
  - ante el Padre
  - a Dios el Padre
  lexicon: BDAG
  rationale: πρός con acusativo indica orientación o movimiento hacia una presencia personal. «Al Padre» es conciso, fiel y natural en español; evita añadir «Dios» que el texto no explicita.
theological_decisions:
- issue: Referente de «Espíritu»
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu humano compartido
  - espíritu
  rationale: 'El contexto inmediato de Efesios 2 presenta una estructura trinitaria: por medio del Hijo, en un Espíritu, al Padre. Aunque el texto griego no añade el artículo ni «Santo», la mayúscula en español señala la lectura teológica más probable sin forzar el sentido.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de προσαγωγή
  english_pob_reading: shared access to the Father
  chosen_spanish_reading: acceso compartido al Padre
  alternative_spanish_readings:
  - introducción formal a la presencia del Padre
  - acercamiento
  rationale: El término puede sugerir acceso, introducción o aproximación reverente. «Acceso» conserva el valor relacional y cultual sin estrechar indebidamente la metáfora. La redacción española mantiene la idea de privilegio común para ambos grupos.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios. La redacción española sigue el griego directamente, tomando el audit trail inglés como apoyo para las decisiones de conjunción, medio, acceso, inclusión conjunta y referencia del Espíritu.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Padre» de manera consistente con el contexto trinitario, sin introducir «SEÑOR» como máscara.
  - Se mantiene «acceso» para προσαγωγή, evitando «introducción» como término principal.
  - «Espíritu» se capitaliza por coherencia contextual con la lectura del Espíritu Santo.
  - «por medio de él» conserva el matiz mediador de δι’ αὐτοῦ.
  - La cláusula final usa «al Padre» para reflejar el movimiento relacional de πρὸς τὸν πατέρα.
