translation:
  language: es
  text: en quien todo el edificio[a], bien ajustado, crece para llegar a ser un templo santo en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada edificio». La frase griega puede leerse distributivamente o como una unidad corporativa; el texto principal sigue la imagen unificada del templo en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  lexicon: BDAG
  rationale: El antecedente inmediato es personal (el Mesías Jesús, v. 20), así que en español conviene mantener la referencia personal con «en quien»; «en el cual» sonaría más impersonal y debilitaría el enlace cristológico del contexto.
- source_word: πᾶσα οἰκοδομὴ
  english_pob_choice: the whole building
  chosen_spanish: todo el edificio
  alternatives_spanish:
  - cada edificio
  - toda construcción
  lexicon: BDAG
  rationale: El sustantivo singular sin artículo permite una lectura distributiva o corporativa. En el contexto de una sola realidad templaria formada por judíos y gentiles, «todo el edificio» comunica mejor la unidad colectiva sin perder la ambigüedad documentada.
- source_word: συναρμολογουμένη
  english_pob_choice: being fitted together
  chosen_spanish: bien coordinado
  alternatives_spanish:
  - siendo unido
  - siendo ensamblado
  lexicon: BDAG
  rationale: El participio pasivo presenta un proceso continuo de ensamblaje. «Bien coordinado» transmite en español la idea de piezas ajustadas armónicamente; se evita «ensamblado» por sonar demasiado técnico y menos natural en este contexto metafórico.
- source_word: αὔξει
  english_pob_choice: grows
  chosen_spanish: crece
  alternatives_spanish:
  - va creciendo
  - aumenta
  lexicon: BDAG
  rationale: El verbo expresa desarrollo continuo. «Crece» es la opción más natural y conserva la imagen de crecimiento aplicada al edificio/templo, sin añadir matices no presentes en el griego.
- source_word: εἰς ναὸν ἅγιον
  english_pob_choice: into a holy temple
  chosen_spanish: para llegar a ser un templo santo
  alternatives_spanish:
  - hasta convertirse en un templo santo
  - en un templo santo
  lexicon: BDAG
  rationale: «εἰς» aquí indica meta o resultado. «Para llegar a ser» expresa ese valor resultativo en un español claro y fiel. «Templo» reproduce ναός como el santuario templario, y «santo» mantiene ἅγιον sin diluirlo en un concepto más general.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - unido al Señor
  lexicon: BDAG
  rationale: Se mantiene la fórmula paulina «en el Señor» para κύριος. Aunque en el proyecto la norma general es «Yahvé» para el nombre divino, aquí κύριος funciona como título cristológico y la frase fija del contexto exige conservar «Señor».
theological_decisions:
- issue: 'Alcance de πᾶσα οἰκοδομή: lectura corporativa o distributiva'
  english_pob_reading: the whole building
  chosen_spanish_reading: todo el edificio
  alternative_spanish_readings:
  - cada edificio
  rationale: La unidad del templo espiritual es el énfasis del pasaje (2:14–22). Por eso la lectura corporativa se refleja en el texto principal; la opción distributiva se conserva como posibilidad real del griego.
  doctrine_reference: Efesios 2:14–22; unidad de judíos y gentiles en un solo pueblo
translation_notes:
  revision_awareness: 'El contexto auditado coincide con la decisión textual inglesa: no hubo revisiones posteriores que alteraran la lectura personal de ἐν ᾧ ni la opción corporativa de πᾶσα οἰκοδομή. La versión española sigue esa misma línea, manteniendo la metáfora arquitectónica y la meta resultativa de εἰς.'
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος por coherencia con el uso cristológico del contexto.
  - «Templo santo» evita expandir ναός a una paráfrasis más amplia y mantiene la referencia al santuario.
  - La nota a pie de página marca la ambigüedad de πᾶσα οἰκοδομή sin romper la unidad del flujo principal.
