  - severity: low
    issue: Matiz de naturalidad en «todo el edificio»
    rationale: Aunque es comprensible y fiel, en este contexto puede sonar algo rígido. La revisión principal no necesita cambiarlo obligatoriamente, pero conviene acompañarlo con una expresión arquitectónica más concreta en el participio para que el conjunto suene más natural.
