translation:
  language: es
  text: en las cuales antes anduvisteis, conforme a la era[a] de este mundo, conforme al gobernante de la autoridad del aire[b], el espíritu que ahora actúa en los hijos[c] de la desobediencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'conforme al curso de este mundo'. El griego usa 'era' (αἰών), destacando la era o patrón presente del mundo.
    reason: lexical_alternative
  - marker: b
    text: '''El aire'' refleja el lenguaje cosmológico antiguo para la esfera asociada con poderes espirituales hostiles.'
    reason: cultural_note
  - marker: c
    text: O 'hijos e hijas de la desobediencia' o 'personas caracterizadas por la desobediencia'. El griego dice literalmente 'hijos', en un sentido idiomático representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αἷς
  english_pob_choice: in which
  chosen_spanish: en las cuales
  alternatives_spanish:
  - en las que
  - en las cuales ustedes
  lexicon: BDAG
  rationale: El relativo plural femenino retoma las realidades mencionadas en el versículo anterior; 'en las cuales' conserva el valor locativo y el referente plural sin añadir contenido.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: antes
  alternatives_spanish:
  - una vez
  - en otro tiempo
  - alguna vez
  lexicon: BDAG
  rationale: '''Antes'' comunica con naturalidad el contraste temporal de una vida pasada; mantiene la referencia a un tiempo anterior sin sonar forzado en español.'
- source_word: περιεπατήσατε
  english_pob_choice: walked
  chosen_spanish: anduvisteis
  alternatives_spanish:
  - vivisteis
  - os condujisteis
  - caminasteis
  lexicon: BDAG
  rationale: El verbo paulino de 'andar' funciona como metáfora del modo de vida. 'Anduvisteis' preserva la imagen verbal y es idiomático en español bíblico moderno.
- source_word: κατὰ τὸν αἰῶνα τοῦ κόσμου τούτου
  english_pob_choice: according to the age of this world
  chosen_spanish: conforme a la edad de este mundo
  alternatives_spanish:
  - conforme al curso de este mundo
  - según la era de este mundo
  - de acuerdo con la edad de este mundo
  lexicon: BDAG
  rationale: Se mantiene la distinción entre αἰών ('edad, era') y κόσμος ('mundo'); 'conforme a' expresa la idea de alineación o norma, y 'edad' conserva el matiz temporal-cultural señalado en el audit trail.
- source_word: ἄρχοντα
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - príncipe
  - autoridad
  lexicon: BDAG
  rationale: '''Gobernante'' comunica un cargo de dominio de forma clara y moderna; preserva la fuerza de ἄρχων sin recurrir a ''príncipe'', que en español puede sonar más tradicional que transparente.'
- source_word: τῆς ἐξουσίας
  english_pob_choice: of the authority
  chosen_spanish: de la autoridad
  alternatives_spanish:
  - del poder
  - del dominio
  - de la potestad
  lexicon: BDAG
  rationale: '''Autoridad'' reproduce el valor central de ἐξουσία y encaja con la cadena de genitivos del texto; evita sustituirlo por un término más general como ''poder''.'
- source_word: τοῦ ἀέρος
  english_pob_choice: of the air
  chosen_spanish: del aire
  alternatives_spanish:
  - del aire superior
  - de los aires
  lexicon: BDAG
  rationale: Se conserva la literalidad de la expresión. El audit trail indica que es lenguaje cosmológico antiguo; por eso se mantiene en el texto y se explica en nota.
- source_word: τοῦ πνεύματος
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el Espíritu
  - la fuerza espiritual
  lexicon: BDAG
  rationale: El contexto apunta a una influencia espiritual hostil, no al Espíritu Santo. 'El espíritu' conserva la ambigüedad controlada del griego y su relación apposicional con la frase anterior.
- source_word: τοῦ νῦν ἐνεργοῦντος
  english_pob_choice: now at work
  chosen_spanish: que ahora actúa
  alternatives_spanish:
  - que ahora obra
  - que ahora está en acción
  - que ahora trabaja
  lexicon: BDAG
  rationale: '''Actúa'' comunica la actividad presente del participio ἐνεργοῦντος de manera natural en español y mantiene la idea de acción continua.'
- source_word: ἐν τοῖς υἱοῖς τῆς ἀπειθείας
  english_pob_choice: in the sons of disobedience
  chosen_spanish: en los hijos de la desobediencia
  alternatives_spanish:
  - entre los hijos de la desobediencia
  - en los hijos de desobediencia
  - en los hijos desobedientes
  lexicon: BDAG
  rationale: Se conserva el sintagma semítico y el sustantivo masculino plural υἱοί, siguiendo la preferencia del POB por mantener la forma lexical cuando tiene fuerza retórica y teológica. 'Desobediencia' traduce literalmente ἀπείθεια.
theological_decisions:
- issue: Relación entre 'el gobernante de la autoridad del aire' y 'el espíritu que ahora actúa'
  english_pob_reading: 'Appositional: ''the spirit'' further describes the evil power associated with the ruler, rather than introducing a separate unrelated entity.'
  chosen_spanish_reading: '''el espíritu que ahora actúa'' se entiende como una designación que describe más al poder maligno asociado al gobernante que como una entidad separada sin relación.'
  alternative_spanish_readings:
  - un segundo nombre para Satanás mismo
  - una fuerza espiritual impersonal bajo su control
  rationale: La cadena de genitivos y el artículo permiten leer la frase en aposición. La traducción española conserva esa tensión sin fijar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin resolver la ontología más allá del texto.
- issue: Uso de 'hijos' para υἱοί
  english_pob_reading: Use 'sons of disobedience' in the main text.
  chosen_spanish_reading: Se mantiene 'hijos' en el texto principal.
  alternative_spanish_readings:
  - personas desobedientes
  - hijos e hijas de la desobediencia
  rationale: La forma masculina plural del griego tiene valor idiomático y representativo; se conserva en español para no neutralizar innecesariamente el sintagma.
  doctrine_reference: Preferencia por una traducción lexicalmente precisa antes que neutralizar el género gramatical.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran un acuerdo alto y no requieren cambios de fondo. La principal decisión en español fue conservar la distinción entre αἰών y κόσμος con 'edad de este mundo', mantener la metáfora de andar, y respetar la imaginería cosmológica de 'aire' con explicación en nota. También se preservó la apposición implícita entre 'el gobernante de la autoridad del aire' y 'el espíritu que ahora actúa' sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, aunque este versículo no lo contiene.
  - Se usa 'espíritu' en minúscula porque no se refiere al Espíritu Santo.
  - '''Hijos'' conserva la forma masculina plural del griego y su valor idiomático.'
  - La puntuación mantiene las comas para reflejar la cadena de genitivos y la relación apposicional.
