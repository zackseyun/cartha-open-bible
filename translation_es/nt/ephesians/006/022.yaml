translation:
  language: es
  text: 'Lo envié a ustedes precisamente para esto: para que sepan cómo estamos[a], y para que él anime sus corazones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sepan nuestras circunstancias» o «sepan las cosas acerca de nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo / lo envié
  alternatives_spanish:
  - a él
  - al cual
  lexicon: BDAG
  rationale: El pronombre relativo acusativo masculino singular retoma a Tíquico (v. 21). En español, al anteponerlo al verbo de envío, resulta natural y claro expresarlo como objeto directo implícito en «lo envié»; la referencia personal queda recuperada por el contexto inmediato.
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - he enviado
  - he mandado
  lexicon: BDAG
  rationale: El aoristo indica la acción como un hecho puntual pasado. «Envié» conserva esa fuerza narrativa sin introducir un perfecto compuesto menos natural aquí.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - para ustedes
  lexicon: BDAG
  rationale: Con verbos de envío, πρός + acusativo expresa movimiento hacia personas. «A ustedes» es la equivalencia más directa y natural en español neutro; «para ustedes» podría sugerir finalidad en vez de destino.
- source_word: εἰς αὐτὸ τοῦτο
  english_pob_choice: for this very purpose
  chosen_spanish: para este mismo propósito
  alternatives_spanish:
  - para este propósito
  - para esto mismo
  lexicon: BDAG
  rationale: La expresión intensiva αὐτὸ τοῦτο se conserva con «este mismo propósito», que reproduce la focalización de «for this very purpose» sin endurecer el español.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: En español, la subordinación final queda clara y fluida con «que» tras dos puntos. Aunque «para que» es posible, «que» aquí mantiene la naturalidad del texto y la relación de propósito ya marcada por «para este mismo propósito».
- source_word: γνῶτε τὰ περὶ ἡμῶν
  english_pob_choice: you may know how we are
  chosen_spanish: sepan lo que nos concierne
  alternatives_spanish:
  - sepan cómo estamos
  - sepan nuestras circunstancias
  - sepan las cosas acerca de nosotros
  lexicon: BDAG
  rationale: τὰ περὶ ἡμῶν abarca asuntos/circunstancias relativas a Pablo y sus compañeros. «Lo que nos concierne» preserva la amplitud semántica y evita restringirlo solo a estado anímico o solo a circunstancias externas. La nota explica la alternativa concreta de lectura.
- source_word: καὶ
  english_pob_choice: and that
  chosen_spanish: y que
  alternatives_spanish:
  - y
  - e
  lexicon: BDAG
  rationale: Coordina la segunda finalidad con la primera bajo ἵνα. «Y que» resulta natural en español para enlazar dos propósitos paralelos.
- source_word: παρακαλέσῃ
  english_pob_choice: he may encourage
  chosen_spanish: anime
  alternatives_spanish:
  - consuele
  - aliente
  - exhorte
  lexicon: BDAG
  rationale: παρακαλέω puede significar animar, consolar o exhortar. En este contexto pastoral de fortalecimiento, «anime» conserva el sentido de apoyo y aliento sin cargarlo excesivamente hacia «consuele» o «exhorte».
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus corazones interiores
  - su interior
  lexicon: BDAG
  rationale: «Corazones» mantiene la metáfora bíblica antropológica. En español, el posesivo plural de cortesía/lectura comunitaria se expresa aquí como «sus» por referencia a los destinatarios; en el texto final se mantiene el referente plural claro.
theological_decisions:
- issue: Alcance de τὰ περὶ ἡμῶν
  english_pob_reading: Rendered personally and circumstantially as 'how we are.'
  chosen_spanish_reading: «lo que nos concierne»
  alternative_spanish_readings:
  - «cómo estamos»
  - «nuestras circunstancias»
  - «las cosas acerca de nosotros»
  rationale: La frase griega admite tanto la condición personal como las circunstancias de Pablo y sus colaboradores. «Lo que nos concierne» preserva esa amplitud sin cerrar indebidamente la ambigüedad interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas genuinas cuando el original es amplio.'
- issue: Valor de παρακαλέσῃ en un cierre epistolar pastoral
  english_pob_reading: he may encourage your hearts
  chosen_spanish_reading: «anime sus corazones»
  alternative_spanish_readings:
  - «consuele sus corazones»
  - «exhorte sus corazones»
  - «aliente sus corazones»
  rationale: En el contexto de despedida y fortalecimiento, παρακαλέω combina aliento y consolación. «Anime» comunica ese efecto pastoral sin reducir el término a una sola arista semántica.
  doctrine_reference: BDAG; sensibilidad semántica contextual en lenguaje pastoral.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión inglesa más reciente; no hubo cambios sustantivos en el audit trail, así que el español sigue de cerca las decisiones léxicas consolidadas, manteniendo la ambigüedad de τὰ περὶ ἡμῶν mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene un registro neutro latinoamericano con tratamiento formal plural («ustedes», «sus»).
  - Se evita la sustitución de términos bíblicos por paráfrasis excesivas; el único ajuste interpretativo principal es la frase amplia de τὰ περὶ ἡμῶν.
  - La puntuación con dos puntos refleja correctamente la relación de propósito doble en el griego.
  - «Anime» se usa como equivalente flexible de παρακαλέω en contexto pastoral, sin borrar la posibilidad de «consolar» o «exhortar».
