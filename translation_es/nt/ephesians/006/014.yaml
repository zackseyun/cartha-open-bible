revisions:
- from: Párense, por lo tanto, teniendo ceñida su cintura con la verdad y habiéndose puesto la coraza de la justicia[a],
  to: Párense, por lo tanto, habiéndose ceñido la cintura con la verdad y habiéndose puesto la coraza de la rectitud[a],
  rationale: 'Se corrige el término clave δικαιοσύνη para alinearlo con la decisión documentada del POB: lectura principal equivalente a ''righteousness'' y alternativa ''justice'' en nota. En español, ''rectitud'' preserva mejor esa prioridad semántica en este contexto, mientras ''justicia'' queda como alternativa. Además, se mejora levemente la naturalidad de la primera construcción participial con ''habiéndose ceñido la cintura'', sin apartarse del griego ni de la revisión inglesa final. No se requiere adjudicación adicional porque la corrección es directa y está bien documentada en el material provisto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:15:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: imperativo principal (''στῆτε'' → ''Párense''), inferencia (''οὖν'' → ''por lo tanto''), y dos participios circunstanciales de preparación (''περιζωσάμενοι'', ''ἐνδυσάμενοι''). También conserva la imaginería de armadura con ''coraza''. Sin embargo, no refleja bien la decisión léxica/auditada del POB para δικαιοσύνη: el inglés principal lleva ''righteousness'' y reserva ''justice'' como alternativa en nota. En español, el borrador invierte esa prioridad al poner ''justicia'' en el texto principal y ''rectitud o justicia'' en nota, lo cual se aparta de la pauta doctrinal y del rastro de auditoría.'
  spanish_quality_summary: 'El español es mayormente claro, pero ''Párense'' puede sonar más coloquial/regional que el registro neutral y digno pedido; ''Manténganse firmes'' sería demasiado interpretativo, pero ''Estén firmes'' añade ''firmes'' no explícito. ''Pónganse de pie'' pierde algo de la idea exhortativa de adoptar posición en combate. La mejor reparación mínima es mantener el imperativo pero con formulación más natural y eclesial: ''Estén, pues, en pie'' sería fiel y digno, aunque algo más interpretativo; para mínima intervención puede conservarse ''Párense''. Más importante, ''teniendo ceñida su cintura'' suena algo pesado; ''habiéndose ceñido la cintura'' fluye mejor y corresponde mejor al participio medio. La nota actual también repite ''justicia'' como principal y alternativa, lo que debe corregirse.'
  glossary_alignment: 'Hay un desajuste claro con la directriz del proyecto para δικαιοσύνη: por defecto ''justicia/rectitud'' por contexto, pero en este pasaje paulino el POB inglés documentó lectura principal equivalente a ''righteousness'' con ''justice'' preservado en nota. En español, ''rectitud'' funciona mejor como equivalente principal aquí, con ''justicia'' como alternativa en nota. No hay otros términos del glosario en disputa.'
  issues:
  - severity: high
    issue: δικαιοσύνη está renderizado como 'justicia' en el texto principal
    rationale: El rastro auditado del POB y la decisión teológica para este versículo establecen como lectura principal 'righteousness' y preservan 'justice' en nota. El borrador invierte esa relación.
  - severity: medium
    issue: La nota al pie para δικαιοσύνη no refleja correctamente la prioridad semántica
    rationale: La nota dice 'O la justicia' pero el texto principal ya dice 'la justicia', y luego explica 'rectitud o justicia'. Esto genera inconsistencia y no preserva bien la alternativa documentada.
  - severity: low
    issue: '''Teniendo ceñida su cintura'' es menos natural que otras opciones fieles'
    rationale: Aunque entendible, suena más forzado que 'habiéndose ceñido la cintura', que refleja mejor el participio medio y mejora la legibilidad sin perder precisión.
  revised_spanish_text: Párense, por lo tanto, habiéndose ceñido la cintura con la verdad y habiéndose puesto la coraza de la rectitud[a],
  revised_footnotes:
  - marker: a
    text: O 'la justicia'. El griego δικαιοσύνη puede llevar tanto el sentido de rectitud como el de justicia en Pablo.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el término clave δικαιοσύνη para alinearlo con la decisión documentada del POB: lectura principal equivalente a ''righteousness'' y alternativa ''justice'' en nota. En español, ''rectitud'' preserva mejor esa prioridad semántica en este contexto, mientras ''justicia'' queda como alternativa. Además, se mejora levemente la naturalidad de la primera construcción participial con ''habiéndose ceñido la cintura'', sin apartarse del griego ni de la revisión inglesa final. No se requiere adjudicación adicional porque la corrección es directa y está bien documentada en el material provisto.'
