translation:
  language: es
  text: Párense, por lo tanto, habiéndose ceñido la cintura con la verdad y habiéndose puesto la coraza de la rectitud[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la justicia'. El griego δικαιοσύνη puede llevar tanto el sentido de rectitud como el de justicia en Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: στῆτε
  english_pob_choice: Stand
  chosen_spanish: Párense
  alternatives_spanish:
  - Pónganse de pie
  - Permanezcan firmes
  lexicon: ἵστημι
  rationale: El imperativo exhorta a una postura decidida. En español, 'Párense' comunica la llamada directa a mantenerse en posición; 'permanezcan firmes' añade una interpretación contextual que no está explícita en la forma verbal misma.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por lo tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: οὖν
  rationale: Marca consecuencia lógica respecto de lo anterior. 'Por lo tanto' conserva bien la inferencia en un español natural y digno.
- source_word: περιζωσάμενοι τὴν ὀσφὺν ὑμῶν
  english_pob_choice: having fastened your waist
  chosen_spanish: teniendo ceñida su cintura
  alternatives_spanish:
  - habiéndose ceñido la cintura
  - con la cintura ceñida
  lexicon: περιζώννυμι / ὀσφύς
  rationale: La imagen es de ceñir alrededor la zona de la cintura/lomos. 'Teniendo ceñida su cintura' conserva el participio y la metáfora corporal sin el calco duro de 'riñones'. 'Cintura' es la opción más clara para lectores modernos; 'lomos' o 'riñones' sonarían más arcaicos o regionales.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: with truth
  chosen_spanish: con la verdad
  alternatives_spanish:
  - en verdad
  - en la verdad
  - con veracidad
  lexicon: ἀλήθεια
  rationale: El POB inglés revisó esta frase hacia un medio/instrumento más explícito. En español, 'con la verdad' mantiene esa función y evita imponer de inmediato 'verdad' como solo una cualidad abstracta. 'Con veracidad' estrecha demasiado el sentido hacia honestidad subjetiva.
- source_word: ἐνδυσάμενοι τὸν θώρακα
  english_pob_choice: having put on the breastplate
  chosen_spanish: habiéndose puesto la coraza
  alternatives_spanish:
  - habiendo vestido la coraza
  - poniéndose la coraza
  lexicon: ἐνδύω / θώραξ
  rationale: '''Coraza'' conserva la imagen militar reconocible en español. ''Habiéndose puesto'' respeta el participio aoristo medio sin volverlo demasiado pesado. ''Armadura'' sería más general y borraría el objeto específico del texto.'
- source_word: τῆς δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de la rectitud
  - de la justicia y rectitud
  lexicon: δικαιοσύνη
  rationale: La elección principal sigue el valor semántico que el POB preserva con la nota alternativa inglesa. En español, 'justicia' mantiene la amplitud legal, relacional y ética de δικαιοσύνη. Se conserva la tensión con 'rectitud' como posible matiz, sin cerrarla en una sola abstracción moral.
theological_decisions:
- issue: δικαιοσύνη en la metáfora de la armadura
  english_pob_reading: righteousness, with justice preserved as an alternative
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  rationale: En un pasaje paulino de armadura, δικαιοσύνη puede abarcar justicia/rectitud. El español 'justicia' conserva mejor el rango público y pactual que 'rectitud', y permite mantener la alternativa sin neutralizar el peso teológico del término.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness; preserve ''justice'' in footnotes for Pauline passages'
translation_notes:
  revision_awareness: Tomé como base el texto griego SBLGNT y la auditoría inglesa más reciente, especialmente la decisión de conservar el participio y hacer explícita la cintura/verdad. Para el español, opté por una construcción participial natural ('teniendo ceñida... y habiéndose puesto...') que mantiene el paralelo del griego sin sonar mecánica. También preservé la alternativa lexical de δικαιοσύνη en nota, porque el propio audit trail la documenta como tensión significativa.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo.'
  - '''Cristo/Mesías'' no aparece en este versículo.'
  - Se eligió 'justicia' como término principal para δικαιοσύνη, con nota de alternativa 'rectitud' para respetar la amplitud semántica.
  - '''Coraza'' conserva la metáfora militar; no se expandió a ''armadura'' para no borrar el sustantivo específico del griego.'
  - '''Con la verdad'' refleja la opción inglesa más reciente y permite una lectura de medio/instrumento sin forzar una glosa interpretativa.'
