translation:
  language: es
  text: Para que también ustedes sepan las cosas concernientes a mí[a], lo que estoy haciendo, Tíquico, el hermano amado y fiel ministro en el Señor[b], les hará saber todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis circunstancias» para «las cosas concernientes a mí»; el giro griego se refiere literalmente a «las cosas acerca de mí».
    reason: alternative_reading
  - marker: b
    text: O «servidor fiel»; διάκονος también puede traducirse «servidor» o, en algunos contextos, «diácono».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἵνα δὲ
  english_pob_choice: So that
  chosen_spanish: Así que
  alternatives_spanish:
  - Para que
  - De modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad, y δέ aporta un enlace suave. En español, «Así que» da continuidad natural al discurso y conserva la relación con el contexto sin volver la frase rígida.
- source_word: εἰδῆτε καὶ ὑμεῖς
  english_pob_choice: you also may know
  chosen_spanish: ustedes también conozcan
  alternatives_spanish:
  - también ustedes sepan
  - ustedes también sepan
  lexicon: BDAG
  rationale: El pronombre enfático con καί añade a los destinatarios. «Ustedes también» mantiene esa énfasis de inclusión de manera natural en español.
- source_word: τὰ κατ’ ἐμέ
  english_pob_choice: the things concerning me
  chosen_spanish: las cosas concernientes a mí
  alternatives_spanish:
  - mis circunstancias
  - lo que me concierne
  lexicon: BDAG
  rationale: Se conserva la expresión más cercana al giro griego, como hizo la revisión inglesa al evitar interpretar «how I am». «Mis circunstancias» es posible, pero añade una interpretación más específica que el griego no obliga aquí.
- source_word: τί πράσσω
  english_pob_choice: what I am doing
  chosen_spanish: lo que estoy haciendo
  alternatives_spanish:
  - lo que hago
  - en qué estoy
  lexicon: BDAG
  rationale: πράσσω aquí se refiere a la actividad presente de Pablo. «Lo que estoy haciendo» es directo y fiel, sin ampliar el sentido a logro u ocupación más allá de lo dicho.
- source_word: πάντα γνωρίσει ὑμῖν
  english_pob_choice: will make everything known to you
  chosen_spanish: les hará saber todo
  alternatives_spanish:
  - les informará de todo
  - les dará a conocer todo
  lexicon: BDAG
  rationale: γνωρίζω significa hacer saber o informar. «Les hará saber todo» conserva la naturalidad del español y el valor informativo del verbo.
- source_word: Τυχικὸς
  english_pob_choice: Tychicus
  chosen_spanish: Tíquico
  alternatives_spanish:
  - Tychico
  lexicon: Onomasticon griego estándar
  rationale: Se usa la forma española tradicional del nombre propio en un registro bíblico natural y reconocible.
- source_word: ἀγαπητὸς ἀδελφός
  english_pob_choice: the beloved brother
  chosen_spanish: el hermano amado
  alternatives_spanish:
  - el hermano amado por muchos
  - el hermano querido
  lexicon: BDAG
  rationale: ἀγαπητός comunica afecto fuerte. «Hermano amado» preserva el sentido fraternal cristiano y suena idiomático en español.
- source_word: πιστὸς διάκονος
  english_pob_choice: faithful minister
  chosen_spanish: fiel ministro
  alternatives_spanish:
  - fiel servidor
  - fiel diácono
  lexicon: BDAG
  rationale: διάκονος puede ser «servidor», «ministro» o «diácono». Aquí el contexto describe una función de servicio y confianza, no necesariamente el oficio eclesial formal; «ministro» conserva el valor funcional que eligió la POB inglesa.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - unido al Señor
  lexicon: BDAG
  rationale: La expresión paulina es una locución fija de relación y esfera. «En el Señor» es la equivalencia natural y estable para κύριος en este contexto cristológico.
theological_decisions:
- issue: Sentido de διάκονος aplicado a Tíquico
  english_pob_reading: faithful minister
  chosen_spanish_reading: fiel ministro
  alternative_spanish_readings:
  - fiel servidor
  - fiel diácono
  rationale: El contexto presenta a Tíquico como colaborador confiable que informará a los destinatarios. «Ministro» preserva la función de servicio sin convertir el término en un cargo eclesiástico técnico que el pasaje no especifica.
  doctrine_reference: Translation philosophy §§1, 5; contested-term consistency principles
- issue: Valor de τὰ κατ’ ἐμέ
  english_pob_reading: the things concerning me
  chosen_spanish_reading: las cosas concernientes a mí
  alternative_spanish_readings:
  - mis circunstancias
  - lo que me concierne
  rationale: La redacción conserva la tensión semántica del griego entre información sobre la situación personal y un giro más literal. Se evita estrecharlo prematuramente a una sola interpretación como estado físico o emocional.
  doctrine_reference: Revisión inglesa 2026-04-23T09:43:04Z; lexical correspondence guidance
- issue: κύριος en la clausula final
  english_pob_reading: in the Lord
  chosen_spanish_reading: en el Señor
  alternative_spanish_readings:
  - en el Señor Jesús
  - unido al Señor
  rationale: Se mantiene el título cristológico estándar sin sustituirlo por una paráfrasis. Esto conserva la resonancia paulina y la coherencia terminológica del proyecto.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «how I am» por «the things concerning me» para reflejar mejor τὰ κατ’ ἐμέ. La presente redacción española sigue esa decisión y conserva también la segunda cláusula con un equivalente natural de «will make everything known to you».
  spanish_consistency_notes:
  - Se mantiene «Tíquico» como forma española del nombre propio, en coherencia con un registro bíblico de lectura pública.
  - Se usa «Señor» para κύριος, en continuidad con la terminología cristológica del proyecto.
  - Se evita interpretar τὰ κατ’ ἐμέ como una referencia específica al bienestar personal, para no borrar la tensión lexical documentada.
  - «Ministro» se eligió aquí por el valor funcional de διάκονος y por consistencia con la decisión inglesa auditada.
