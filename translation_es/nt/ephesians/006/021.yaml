    text: Or 'my circumstances' for 'how I am'; the Greek expression literally refers to 'the things concerning me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faithful servant'; Greek διάκονος can also be rendered 'servant' or, in some contexts, 'deacon.'
    reason: alternative_reading
