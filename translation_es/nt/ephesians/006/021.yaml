    issue: «Así que» para Ἵνα δὲ
    rationale: ἵνα introduce propósito, no consecuencia. «Así que» en español comunica inferencia o resultado y altera la relación lógica del original.
  - severity: medium
    issue: «conozcan» para εἰδῆτε
    rationale: No es imposible, pero en español bíblico natural «sepan» encaja mejor con información sobre circunstancias y acciones; además evita una construcción menos idiomática con «conocer» + proposición.
  - severity: low
    issue: Punto y coma antes de «Tíquico»
    rationale: La frase fluye mejor con coma, reflejando la apposición descriptiva del griego sin separar demasiado la oración principal.
