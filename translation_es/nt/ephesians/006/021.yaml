base_translation:
  language: en
  yaml_path: translation/nt/ephesians/006/021.yaml
  text: So that you also may know the things concerning me[a], what I am doing, Tychicus, the beloved brother and faithful minister in the Lord[b], will make everything known to you.
  footnotes:
