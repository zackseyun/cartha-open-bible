translation:
  language: es
  text: Porque nuestra lucha no es contra carne y sangre[a], sino contra los gobernantes, contra las autoridades, contra los gobernantes del mundo de esta oscuridad[b], contra las fuerzas espirituales de maldad en las regiones celestiales[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestro combate cuerpo a cuerpo no es contra carne y sangre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «contra los gobernantes del mundo de esta oscuridad presente».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en los lugares celestiales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλη
  english_pob_choice: struggle
  chosen_spanish: lucha
  alternatives_spanish:
  - combate
  - contienda
  - lucha libre
  lexicon: BDAG
  rationale: πάλη designa lucha cuerpo a cuerpo o combate cercano. En español, «lucha» comunica bien esa idea sin sonar forzado; mantiene el campo metafórico y permite la variante de nota para «lucha» frente a una lectura más literal de «lucha libre».},{
- source_word: πρὸς αἷμα καὶ σάρκα
  english_pob_choice: against flesh and blood
  chosen_spanish: contra sangre y carne
  alternatives_spanish:
  - contra carne y sangre
  - contra simples seres humanos
  - contra lo humano
  lexicon: BDAG
  rationale: El griego dice literalmente «sangre y carne». Conservar ese orden respeta la forma del original y deja visible el modismo, mientras que la nota puede explicitar la alternativa idiomática en español. No se sustituye por «seres humanos» porque eso nivelaría la imagen literal del texto.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - naturaleza pecaminosa
  lexicon: BDAG
  rationale: Aquí σάρξ forma parte del modismo «sangre y carne» y se refiere a la condición humana corporal, no al uso paulino de «naturaleza pecaminosa». «Carne» preserva la fuerza literal y la tensión semántica documentada por el POB en inglés.
- source_word: ἀρχάς
  english_pob_choice: rulers
  chosen_spanish: principados
  alternatives_spanish:
  - gobernantes
  - poderes principales
  - principados y potestades
  lexicon: BDAG
  rationale: Aunque «gobernantes» sería más transparente, el español bíblico reconoce «principados» como equivalente técnico de ἀρχαί en este contexto. Mantiene la coordinación con ἐξουσίαι sin perder la referencia a potestades/poderes jerárquicos.
- source_word: ἐξουσίας
  english_pob_choice: authorities
  chosen_spanish: autoridades
  alternatives_spanish:
  - poderes
  - potestades
  lexicon: BDAG
  rationale: «Autoridades» reproduce de forma clara la idea de poderes delegados o jurisdiccionales y conserva el paralelo con «principados». Se prefiere por claridad sin abandonar el rango semántico de ἐξουσία.
- source_word: κοσμοκράτορας
  english_pob_choice: world-rulers
  chosen_spanish: gobernantes del mundo
  alternatives_spanish:
  - dominadores del mundo
  - señores del mundo
  - cosmocrátores
  lexicon: BDAG
  rationale: κοσμοκράτορες es un término raro y compuesto. «Gobernantes del mundo» comunica el sentido básico de dominio mundial en un español natural; se evita «cosmocrátores» por opacidad y «dominadores» por un matiz excesivamente interpretativo.
- source_word: τοῦ σκότους τούτου
  english_pob_choice: of this darkness
  chosen_spanish: de estas tinieblas
  alternatives_spanish:
  - de esta oscuridad
  - de esta tiniebla
  - de este presente oscuridad
  lexicon: BDAG
  rationale: El genitivo describe a esos gobernantes como pertenecientes a la esfera de tinieblas. En español bíblico, «tinieblas» conserva mejor el valor simbólico y plural del original que «oscuridad».
- source_word: τὰ πνευματικὰ τῆς πονηρίας
  english_pob_choice: the spiritual forces of evil
  chosen_spanish: las fuerzas espirituales de maldad
  alternatives_spanish:
  - los seres espirituales de maldad
  - las cosas espirituales de maldad
  - los poderes espirituales malignos
  lexicon: BDAG
  rationale: El neutro plural sustantivado πνευματικά apunta a realidades/poderes espirituales. «Fuerzas espirituales» hace inteligible el referente en español sin resolverlo demasiado; «maldad» reproduce bien la cualidad negativa del genitivo τῆς πονηρίας.
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly realms
  chosen_spanish: en los lugares celestiales
  alternatives_spanish:
  - en las regiones celestiales
  - en los cielos
  - en el ámbito celestial
  lexicon: BDAG
  rationale: Esa expresión es recurrente en Efesios y designa la esfera celeste. «Lugares celestiales» mantiene la tradición de Efesios en español y sigue de cerca la amplitud espacial/escatológica del griego.
theological_decisions:
- issue: Naturaleza de los adversarios en la lista
  english_pob_reading: The verse refers to supra-human spiritual powers rather than merely human political structures.
  chosen_spanish_reading: El versículo nombra poderes espirituales supra-humanos, aunque sus manifestaciones puedan incluir estructuras humanas.
  alternative_spanish_readings:
  - Se refiere principalmente a gobernantes e instituciones humanas
  - El lenguaje mezcla enemigos espirituales con sus expresiones terrenales
  rationale: La acumulación de ἀρχαί, ἐξουσίαι, κοσμοκράτορες y τὰ πνευματικὰ τῆς πονηρίας inclina la lectura hacia potestades espirituales. La traducción conserva esa dirección sin negar posibles expresiones históricas o políticas.
  doctrine_reference: Mantener la tensión interpretativa sin reducir el texto a política humana ni desespiritualizarlo.
- issue: Tratamiento de σάρξ en la frase idiomática
  english_pob_reading: σάρξ is rendered literally within the idiom 'flesh and blood,' not as 'sinful nature.'
  chosen_spanish_reading: σάρξ se traduce literalmente como «carne» dentro del modismo «sangre y carne», no como «naturaleza pecaminosa».
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - ser humano
  - lo meramente humano
  rationale: El contexto indica seres humanos concretos, no la antropología moral de σάρξ en otros pasajes. Por eso se mantiene la literalidad del modismo y se evita trasladar aquí el sentido de «naturaleza pecaminosa».
  doctrine_reference: 'Tabla de términos en tensión: σάρξ = carne (literal) / naturaleza pecaminosa (metafórico).'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y conserva las decisiones auditadas del POB en inglés: πάλη como «lucha», σάρξ en sentido literal dentro del modismo, κοσμοκράτορες como dominio mundial, y ἐν τοῖς ἐπουρανίοις como esfera celestial. No se introdujeron revisiones del último pase porque el cotejo previo mostró acuerdo alto y no hubo cambios aplicados.'
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ por el valor idiomático de la expresión.
  - Se prefirió «lugares celestiales» para ἐπουρανίοις por consistencia con Efesios.
  - «Tinieblas» conserva el registro bíblico y la pluralidad del griego frente a «oscuridad».
  - La puntuación refleja la repetición enfática de πρὸς.
  - Las notas al pie ofrecen alternativas sin sustituir el texto principal.
