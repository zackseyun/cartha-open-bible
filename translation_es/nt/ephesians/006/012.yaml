review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura adversativa y el sentido general del versículo, incluyendo la referencia a poderes espirituales supra-humanos. Sin embargo, varias elecciones no siguen fielmente el audit trail del POB inglés ni el mejor español natural: «contra sangre y carne» suena antinatural en español para un modismo establecido; «principados» introduce una formulación más tradicional que la preferencia documentada por claridad moderna de ἀρχάς = «gobernantes»/«dirigentes»; y la nota [c] está mal anclada, porque el alternante inglés corresponde al sintagma principal, mientras el texto español ya usa la alternativa tradicional «lugares celestiales».'
  spanish_quality_summary: El español es mayormente legible, pero mezcla literalismo innecesario y tradición eclesiástica donde el proyecto busca español moderno y digno. «Contra sangre y carne» y «de estas tinieblas» son menos naturales que «contra carne y sangre» y «de esta oscuridad». Además, la duplicación de «lugares celestiales» en texto y nota elimina el valor de la nota alternativa.
  glossary_alignment: 'No hay conflicto con términos base del glosario general. Las decisiones problemáticas son de estilo/lexicalidad local: ἀρχάς debe acercarse a la claridad moderna del POB inglés («gobernantes» mejor que «principados»), κοσμοκράτορας debe conservar la fuerza compuesta («gobernantes del mundo» está bien), τοῦ σκότους τούτου conviene reflejar «de esta oscuridad» según la decisión auditada, y ἐν τοῖς ἐπουρανίοις debe llevar en el texto la opción principal equivalente a «en las regiones celestiales» o similar, dejando «lugares celestiales» como alternativa de nota.'
  issues:
  - severity: high
    issue: El modismo πρὸς αἷμα καὶ σάρκα se tradujo «contra sangre y carne».
    rationale: Aunque el griego invierte el orden, el POB inglés documenta que debe seguirse el modismo natural del idioma receptor. En español bíblico y general, «carne y sangre» es la forma idiomática normal; «sangre y carne» suena forzada y reduce legibilidad sin aportar fidelidad real.
  - severity: medium
    issue: ἀρχάς se tradujo «principados».
    rationale: El audit trail eligió una forma clara y moderna («rulers»), dejando la tradicional como alternativa. «Principados» suena técnico-tradicional y menos transparente en español contemporáneo. «Gobernantes» preserva mejor la intención del POB.
  - severity: medium
    issue: τοῦ σκότους τούτου se tradujo «de estas tinieblas».
    rationale: 'El griego es singular demostrativo: «de esta oscuridad». El plural «tinieblas» es idiomáticamente posible, pero aquí se aleja de la decisión lexical documentada y además «estas» no refleja bien el singular τούτου.'
  - severity: high
    issue: La nota [c] no corresponde al texto principal.
    rationale: 'El POB inglés tiene como texto principal «heavenly realms» y como alternativa «heavenly places». El borrador puso «lugares celestiales» en el texto y repitió exactamente lo mismo en la nota. Debe invertirse: texto principal más equivalente a «regiones/ámbitos celestiales» y nota alternativa «lugares celestiales».'
  - severity: low
    issue: 'La nota [a] usa una alternativa poco natural: «sangre y carne».'
    rationale: Si se conserva una nota alternativa para πάλη, la variación debería recaer en «lucha»/«combate cuerpo a cuerpo» o en la estructura verbal, no en una forma idiomática menos natural del complemento.
