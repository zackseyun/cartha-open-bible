  to: Honra a tu padre y a tu madre, que es el primer mandamiento con una promesa[a].
  rationale: Se corrige el anclaje de la nota para que corresponda a la frase que comenta, se elimina una nota teológica redundante no sustentada por el aparato inglés, y se ajusta «con promesa» a «con una promesa» para una españolidad más natural y una alineación más estrecha con el POB inglés. No se requiere adjudicación adicional.
