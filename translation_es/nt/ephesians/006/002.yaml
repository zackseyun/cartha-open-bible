  source_alignment_summary: 'El borrador español transmite bien el mandato principal y el sentido de la cláusula explicativa: τίμα → «Honra», πατέρα/μητέρα → «padre/madre», ἐντολὴ πρώτη ἐν ἐπαγγελίᾳ → «el primer mandamiento con promesa». Sin embargo, la distribución de notas no refleja fielmente el rastro inglés: la nota literal alternativa corresponde a toda la frase final, no a «madre», y la nota teológica añadida en [b] introduce explicación interpretativa no preservada como nota en el inglés base.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, el anclaje de [a] tras «madre» es incorrecto y confunde su alcance. Además, «con promesa» es aceptable, pero «con una promesa» suena un poco más natural en español y coincide mejor con el inglés POB «with a promise».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Honra», «padre», «madre» y «mandamiento» están bien alineados. La decisión para ἐν ἐπαγγελίᾳ debe mantenerse idiomática; «con una promesa» o «con promesa» sirven, pero la nota literal debe anclarse a esa expresión final.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «madre» pero explica «el primer mandamiento en promesa / con promesa».
    rationale: El marcador debe aparecer en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta «madre» en vez de la cláusula final.
  - severity: medium
    issue: La nota [b] añade una explicación teológica no presente como nota en el rastro inglés.
    rationale: La interpretación ya queda recogida en las decisiones teológicas del registro; no es necesario convertirla en nota del texto salvo que el inglés también la preserve o el español cree una ambigüedad nueva.
  - severity: low
    issue: «con promesa» es inteligible, pero «con una promesa» suena más natural y corresponde más estrechamente a la solución inglesa documentada.
    rationale: La presencia del artículo indefinido mejora la fluidez en español sin alejarse del griego ni del razonamiento léxico del POB.
  revised_spanish_text: Honra a tu padre y a tu madre, que es el primer mandamiento con una promesa[a].
  revised_footnotes:
