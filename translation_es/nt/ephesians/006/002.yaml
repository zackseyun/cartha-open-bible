translation:
  language: es
  text: Honra a tu padre y a tu madre, que es el primer mandamiento con una promesa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el primer mandamiento en promesa»; el sentido es que este es el primer mandamiento acompañado de una promesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Honrad
  - Muestra honor a
  - Respeta
  lexicon: BDAG
  rationale: El imperativo de τιμάω pide una acción visible de reconocimiento y estima. «Honra» preserva el peso ético del mandato y su conexión directa con el Decálogo, sin reducirlo a una mera actitud interior.
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - progenitor varón
  - papá
  lexicon: BDAG
  rationale: Es el término familiar directo y natural para el original. «Padre» mantiene la precisión referencial y el eco bíblico del mandamiento citado.
- source_word: μητέρα
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - progenitora
  - mamá
  lexicon: BDAG
  rationale: Es el equivalente directo y natural de μητέρα. «Madre» conserva la simetría con «padre» y la forma solemne del mandamiento.
- source_word: ἐντολὴ
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: BDAG
  rationale: Pablo alude al Decálogo; «mandamiento» conserva mejor el valor escritural y pactual que «mandato».
- source_word: πρώτη
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - principal
  - más importante
  lexicon: BDAG
  rationale: «Primer» reproduce el valor ordinal del griego y permite que la frase se entienda como el primer mandamiento acompañado por una promesa, sin convertirlo en «el más importante».
- source_word: ἐν ἐπαγγελίᾳ
  english_pob_choice: with a promise
  chosen_spanish: con promesa
  alternatives_spanish:
  - con una promesa
  - en promesa
  - acompañado de una promesa
  lexicon: BDAG
  rationale: La construcción griega es formalmente «en promesa», pero el sentido idiomático es que el mandamiento va unido a una promesa. «Con promesa» es breve, natural y fiel al significado sin sobreparáfrasis.
theological_decisions:
- issue: Cómo entender «primer mandamiento» en relación con la enumeración del Decálogo
  english_pob_reading: Rendered 'the first commandment with a promise' to indicate not absolute first in sequence, but first among the commandments that includes an explicit promise.
  chosen_spanish_reading: «el primer mandamiento con promesa» indica que es el primero de los mandamientos que incluye una promesa explícita, no necesariamente el primero en toda la serie del Decálogo.
  alternative_spanish_readings:
  - el mandamiento más importante con promesa
  - el primer mandamiento de la segunda tabla
  - el primer mandamiento en promesa
  rationale: La frase griega se entiende mejor como una observación explicativa sobre el mandamiento citado y su promesa asociada en el v. 3. La traducción evita imponer un esquema denominacional de numeración del Decálogo o convertir «primer» en «principal».
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente; dejar que el contexto inmediato determine el alcance de 'primer'.
translation_notes:
  revision_awareness: El inglés POB mantuvo «with a promise» y añadió una nota sobre la posibilidad más literal «in promise». La versión española conserva esa decisión principal como «con promesa» y explicita en nota la alternativa formal, sin perder el valor explicativo del inciso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente requiera el nombre divino; aquí no aparece.
  - Se mantiene «mandamiento» para conservar el eco del Decálogo.
  - Se evita «Cristo» porque no interviene en este versículo.
  - La puntuación con rayas puede usarse en edición final si se prefiere reproducir el inciso parentético; aquí se opta por una coma fluida y natural en español.
