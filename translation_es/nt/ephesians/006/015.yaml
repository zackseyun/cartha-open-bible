translation:
  language: es
  text: y, habiendo calzado sus pies con la preparación del evangelio de la paz[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disposición»; posiblemente «la preparación para proclamar el evangelio de la paz», o «la firmeza del evangelio de la paz».
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποδησάμενοι
  english_pob_choice: having shod
  chosen_spanish: habiendo calzado
  alternatives_spanish:
  - habiendo puesto sandalias
  - habiendo equipado
  lexicon: BDAG
  rationale: El participio aoristo medio conserva la imagen corporal de ponerse el calzado. «Habiendo calzado» refleja el gesto de armarse con el calzado sin convertirlo en una paráfrasis más abstracta.
- source_word: πόδας
  english_pob_choice: feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - los pies
  - sus plantas
  lexicon: BDAG
  rationale: El griego nombra directamente los pies, no el calzado. Mantener «pies» conserva la metáfora física y el paralelismo con la imagen de la armadura.
- source_word: ἐν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en
  - mediante
  lexicon: BDAG
  rationale: Aquí ἐν expresa medio o equipamiento dentro de la metáfora; «con» suena natural en español y preserva el valor instrumental.
- source_word: ἑτοιμασίᾳ
  english_pob_choice: readiness
  chosen_spanish: la disposición
  alternatives_spanish:
  - la preparación
  - la prontitud
  lexicon: BDAG
  rationale: «ἑτοιμασία» admite «readiness/preparedness». «Disposición» mantiene la idea de estar preparado y evita decidir de más entre preparación interior, prontitud o firmeza de pie.
- source_word: εὐαγγελίου
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» conserva el término paulino ya fijado en el uso cristiano y mantiene la densidad teológica del sustantivo.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: de la paz
  alternatives_spanish:
  - de paz
  lexicon: BDAG
  rationale: 'El genitivo qualifica al evangelio: se trata del evangelio caracterizado por la paz. «De la paz» es la forma española más natural y clara.'
theological_decisions:
- issue: Ambigüedad de ἐν ἑτοιμασίᾳ τοῦ εὐαγγελίου τῆς εἰρήνης
  english_pob_reading: the believer is to have feet equipped with the readiness that comes from or is associated with the gospel of peace
  chosen_spanish_reading: los pies deben ir equipados con una disposición vinculada al evangelio de la paz
  alternative_spanish_readings:
  - los pies deben ir equipados con la preparación para proclamar el evangelio de la paz
  - los pies deben ir equipados con la firmeza que da el evangelio de la paz
  rationale: 'La expresión griega es comprimida y permite más de una lectura: prontitud para anunciar, preparación interior o firmeza/estabilidad. La redacción española conserva esa apertura con «la disposición» y no resuelve explícitamente el matiz evangelístico ni el de firmeza.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios necesarios; esta propuesta mantiene la misma resolución semántica general, con una opción española ligeramente más idiomática para ἑτοιμασία sin abandonar la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene «evangelio» para εὐαγγέλιον, en continuidad con la terminología paulina del proyecto.
  - Se evita «SEÑOR» u այլ sustitución no pertinente; el versículo no contiene el nombre divino.
  - «Disposición» conserva la tensión lexical de ἑτοιμασία sin imponer una interpretación única.
  - La puntuación reproduce el arranque coordinado con participio en cadena, adecuado al estilo de lista de armadura.
