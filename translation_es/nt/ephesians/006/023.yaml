base_translation:
  language: en
  yaml_path: translation/nt/ephesians/006/023.yaml
  text: Peace to the brothers[a], and love with faith[c][b], from God the Father and the Lord Jesus Messiah.
  footnotes:
  - marker: a
    text: Or 'to the brothers and sisters.' The Greek says 'brothers,' a masculine plural form that can address the whole believing community.
    reason: alternative_reading
  - marker: b
    text: Or 'love with faithfulness' or 'love with trust.' The Greek word can carry these senses, though 'faith' is the default rendering here.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Jesus Christ.' Here 'Messiah' translates the title Χριστός to preserve its meaning.
    reason: alternative_reading
