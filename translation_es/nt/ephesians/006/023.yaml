    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' to reflect the Greek title Ἰησοῦ Χριστοῦ in a formal, conventional rendering and to maintain register and consistency. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Paz a los hermanos[a], y amor con fe[b], de Dios el Padre y del Señor Jesús Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hermanos y hermanas». El griego dice «hermanos», forma masculina plural que puede dirigirse a toda la comunidad creyente.
    reason: alternative_reading
  - marker: b
    text: O «con fidelidad» o «con confianza». El término griego puede abarcar estos matices, aunque aquí se traduce por «fe» como sentido base.
    reason: lexical_alternative
  - marker: c
    text: Griego «Jesús Cristo». Aquí Χριστός se traduce como «Mesías» para conservar el sentido del título.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Que haya paz
  - Paz sea
  lexicon: BDAG
  rationale: El sustantivo funciona aquí como bendición elíptica. "Paz" conserva la concisión del griego sin añadir un verbo inexistente en el texto fuente.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: to the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los hermanos/as
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἀδελφοῖς, forma que puede abarcar a toda la comunidad creyente. En español, "hermanos" mantiene la forma de origen y el alcance representativo; la alternativa inclusiva queda documentada en nota.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  lexicon: BDAG
  rationale: Es el equivalente normal de ἀγάπη y conserva el sentido paulino habitual.
- source_word: μετὰ πίστεως
  english_pob_choice: with faith
  chosen_spanish: con fe
  alternatives_spanish:
  - con fidelidad
  - con confianza
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento, por lo que "con" es natural en español. πίστις se rinde por su valor básico como "fe"; se documentan sus posibles matices semánticos.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: BDAG
  rationale: Aunque el sentido básico es origen, en una fórmula de bendición española "de parte de" comunica de forma natural la procedencia de la bendición sin perder el valor fuente/origen.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios Padre
  - Dios nuestro Padre
  lexicon: BDAG
  rationale: El griego no añade "nuestro"; "Dios el Padre" preserva con precisión la referencia y suena natural en español bíblico contemporáneo.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: '"Señor" es la equivalencia estándar de κύριος en el NT y mantiene la fórmula cristológica.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός conserva aquí fuerza titular; siguiendo la política del proyecto, se traduce como "Mesías" para preservar el sentido del título. En español, "Jesús Mesías" es gramaticalmente posible y mantiene la decisión lexical documentada.
theological_decisions:
- issue: Renderizado de Χριστοῦ en la doxología final
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La política de traducción del proyecto prioriza traducir títulos cristológicos cuando el contexto los presenta con fuerza titular. Aquí Χριστοῦ mantiene el valor de título y no se reduce a un nombre fijo sin explicación.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Alcance de ἀδελφοῖς
  english_pob_reading: to the brothers
  chosen_spanish_reading: a los hermanos
  alternative_spanish_readings:
  - a los hermanos y hermanas
  rationale: El plural masculino griego puede dirigirse a toda la comunidad creyente. Se mantiene la forma del texto fuente en el cuerpo principal y se anota la lectura inclusiva para no borrar la tensión gramatical.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Sentido de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: En este contexto no hay una construcción genitiva especialmente disputada; por eso se conserva el valor básico de πίστις como "fe", dejando en nota sus alternativas semánticas.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
translation_notes:
  revision_awareness: El historial inglés muestra una oscilación entre «Christ» y «Messiah», con restauración final de «Messiah» por coherencia doctrinal. La presente versión sigue esa decisión final y la explicita en español como «Mesías». También se ajustó ἀπὸ a una fórmula española natural de procedencia («de parte de») sin perder el valor de origen.
  spanish_consistency_notes:
  - Se mantuvo «Paz» al inicio como bendición nominal, sin añadir verbo.
  - Se eligió «hermanos» por fidelidad morfológica; la inclusión comunitaria queda en nota.
  - «Amor con fe» conserva el paralelismo breve del griego.
  - «Señor» se usa para κύριος conforme al estándar neotestamentario del proyecto.
  - «Jesús Mesías» refleja la traducción del título Χριστός sin transliterarlo como nombre fijo.
