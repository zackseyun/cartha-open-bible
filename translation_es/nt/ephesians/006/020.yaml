translation:
  language: es
  text: por esto[a] soy embajador en cadenas[b], para que en ello[c] hable con denuedo, como debo hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por quien' si se entiende de manera más personal; el griego aquí es neutro, y probablemente remite al 'misterio del evangelio' del versículo anterior.
    reason: alternative_reading
  - marker: b
    text: 'Griego: ''en una cadena''; en español idiomático, ''en cadenas'' expresa el encarcelamiento.'
    reason: lexical_alternative
  - marker: c
    text: O 'en él' en algunas interpretaciones, pero el pronombre griego es neutro, probablemente refiriéndose al evangelio o a su misterio.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ οὗ
  english_pob_choice: for which
  chosen_spanish: por el cual
  alternatives_spanish:
  - por quien
  - por el que
  - en favor del cual
  lexicon: BDAG
  rationale: El relativo es genitivo singular neutro, por lo que el antecedente más probable es neutro, no personal. "Por el cual" preserva la referencia impersonal al evangelio o al misterio del evangelio sin imponer un referente masculino.
- source_word: πρεσβεύω
  english_pob_choice: I am an ambassador
  chosen_spanish: soy embajador
  alternatives_spanish:
  - represento como embajador
  - soy representante
  lexicon: BDAG
  rationale: El verbo expresa actuar como enviado oficial o embajador. "Soy embajador" mantiene ese sentido formal y natural en español.
- source_word: ἐν ἁλύσει
  english_pob_choice: in chains
  chosen_spanish: en cadenas
  alternatives_spanish:
  - en una cadena
  - en prisión
  - encadenado
  lexicon: BDAG
  rationale: Aunque el griego está en singular, el español idiomático para la situación de cautiverio es "en cadenas". Conserva la imagen de confinamiento sin volver la expresión forzada.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una finalidad clara. "Para que" es la forma natural y precisa en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  - en esto
  - en él mismo
  lexicon: BDAG
  rationale: El pronombre es dativo singular neutro; en español, cuando el antecedente es una realidad impersonal como el evangelio o el misterio, "en él" puede funcionar como referencia resumida y más natural que "en ello". La nota conserva la tensión gramatical neutra del original.
- source_word: παρρησιάσωμαι
  english_pob_choice: I may speak boldly
  chosen_spanish: hable con denuedo
  alternatives_spanish:
  - hable con valentía
  - hable abiertamente
  - hable con franqueza
  lexicon: BDAG
  rationale: El verbo denota hablar con libertad, franqueza y valentía. "Con denuedo" es una forma tradicional y precisa en español bíblico para ese matiz, sin reducirlo solo a "valentía".
- source_word: ὡς δεῖ με λαλῆσαι
  english_pob_choice: as I ought to speak
  chosen_spanish: como debo hablar
  alternatives_spanish:
  - como me es debido hablar
  - como debo decirlo
  - como es necesario que hable
  lexicon: BDAG
  rationale: δεῖ expresa obligación o necesidad. "Como debo hablar" transmite la obligación de forma sobria y natural, manteniendo el sentido sin sobrecargar la frase.
theological_decisions:
- issue: Referente neutro de ὃ y αὐτῷ
  english_pob_reading: Both ὃ/αὐτῷ are taken as neuter references to the gospel or 'the mystery of the gospel' from v. 19.
  chosen_spanish_reading: El relativo y el pronombre se entienden como referencias neutras al evangelio o al misterio del evangelio, no como un referente personal masculino.
  alternative_spanish_readings:
  - 'Tomarlos como referencias personales: ''por quien... en él'''
  - 'Hacerlos más vagos: ''por esto... en esto'''
  rationale: La morfología señalada marca ambos términos como neutros. La traducción española debe conservar esa tensión gramatical y no forzar una lectura cristológica personal que el griego no pide aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje fue revisado y quedó sin cambios sustanciales en el último pase; la presente redacción mantiene el acuerdo alto del control cruzado y conserva la observación crítica sobre los neutros griegos sin introducir lecturas nuevas.
  spanish_consistency_notes:
  - Se mantiene 'cadenas' para ἐν ἁλύσει, siguiendo el valor idiomático de prisión/confinamiento.
  - Se evita 'Cristo' porque el contexto inmediato apunta a un antecedente neutro y no personal.
  - '''Denuedo'' se usa como equivalente bíblico estable de παρρησία/παρρησιάζομαι.'
  - Se conserva el registro moderno y digno, sin depender de giros arcaizantes innecesarios.
