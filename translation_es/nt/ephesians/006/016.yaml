translation:
  language: es
  text: En todas las circunstancias[a], tomando el escudo de la fe, con el cual podrán extinguir todas las flechas[b] encendidas[c] del maligno[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en todo'; el griego puede entenderse también como 'en todas las cosas' o 'en cada situación'.
    reason: alternative_reading
  - marker: b
    text: O 'dardos'; βέλη es un término general para proyectiles.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: ''dardos de fuego''.'
    reason: lexical_alternative
  - marker: d
    text: O 'del mal'; el griego también puede entenderse de manera abstracta, aunque en este contexto la referencia personal es la más probable.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πᾶσιν
  english_pob_choice: In all circumstances
  chosen_spanish: En todas las circunstancias
  alternatives_spanish:
  - En todo
  - En todas las cosas
  - En cada situación
  lexicon: BDAG
  rationale: La expresión dativa con ἐν funciona aquí de manera adverbial y no meramente locativa. 'En todas las circunstancias' conserva el alcance general del mandato sin sonar tan literal ni tan raro como 'en todas las cosas'.
- source_word: ἀναλαβόντες
  english_pob_choice: taking up
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - tomen
  - levantando
  lexicon: BDAG
  rationale: El participio aoristo acompaña la serie exhortativa de la armadura. 'Tomando' refleja la acción concomitante de manera natural en español y conserva la fuerza verbal sin convertirla en perífrasis innecesaria.
- source_word: θυρεὸν
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - escudo grande
  - broquel
  lexicon: BDAG
  rationale: θυρεός designa un escudo. 'Escudo' es el equivalente claro y fiel en español; añadir 'grande' sería explicativo pero no imprescindible en el texto principal.
- source_word: τῆς πίστεως
  english_pob_choice: of faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la confianza
  - de la fidelidad
  lexicon: BDAG
  rationale: πίστις se traduce de forma estándar como 'fe' según el criterio del proyecto. El genitivo describe el escudo como caracterizado por la fe; 'confianza' y 'fidelidad' quedan como alternativas semánticas, pero 'fe' es la opción principal mejor asentada aquí.
- source_word: ἐν ᾧ
  english_pob_choice: with which
  chosen_spanish: con el cual
  alternatives_spanish:
  - por el cual
  - en el cual
  lexicon: BDAG
  rationale: El relativo apunta al 'escudo' y el valor instrumental se expresa naturalmente en español con 'con el cual'. Mantiene claridad y evita una calca como 'en el cual'.
- source_word: δυνήσεσθε
  english_pob_choice: you will be able
  chosen_spanish: podrán
  alternatives_spanish:
  - podrán ser capaces
  - serán capaces
  lexicon: BDAG
  rationale: El futuro medio expresa capacidad futura. En español, 'podrán' comunica bien esa capacidad sin recargar el verso con una redundancia innecesaria.
- source_word: βέλη
  english_pob_choice: arrows
  chosen_spanish: dardos
  alternatives_spanish:
  - flechas
  - misiles
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por 'arrows' y preserva la nota tradicional, en español 'dardos' mantiene mejor la amplitud semántica de βέλη como proyectiles, y además conecta con la tradición clásica de este pasaje. Se evita 'flechas' porque estrecha demasiado el campo y suena más específico de lo que el griego exige.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: del maligno
  alternatives_spanish:
  - del malo
  - del que es malo
  - del maligno, es decir, el maligno
  lexicon: BDAG
  rationale: El genitivo con artículo puede leerse personal o abstractamente. En español, 'el maligno' conserva la lectura personal fuerte del contexto de guerra espiritual sin perder la posibilidad de una alusión al mal. Es una solución tradicional pero también fiel al referente probable.
- source_word: πεπυρωμένα
  english_pob_choice: flaming
  chosen_spanish: ardientes
  alternatives_spanish:
  - encendidos
  - en llamas
  - fiery
  lexicon: BDAG
  rationale: '''πεπυρωμένα'' significa ''encendidos / puestos en fuego''. ''Ardientes'' comunica la imagen de manera natural en español y no obliga a una expresión más pesada como ''en llamas''.'
- source_word: σβέσαι
  english_pob_choice: to extinguish
  chosen_spanish: extinguir
  alternatives_spanish:
  - apagar
  - sofocar
  - quebrar
  lexicon: BDAG
  rationale: σβέννυμι significa extinguir o apagar. 'Extinguir' conserva con precisión la metáfora de fuego y funciona bien con 'dardos ardientes'.
theological_decisions:
- issue: Lectura de τοῦ πονηροῦ
  english_pob_reading: the evil one
  chosen_spanish_reading: del maligno
  alternative_spanish_readings:
  - del mal
  - de lo malo
  rationale: En el contexto inmediato de la armadura de Dios, la referencia personal es la lectura más sólida y la más coherente con la imagen de ataque espiritual. 'Del maligno' preserva esa lectura sin cerrar por completo la tensión textual que permite una lectura abstracta.
  doctrine_reference: Mantener la tensión exegética cuando el griego permite más de una lectura; no ocultar la referencia personal probable en contexto.
- issue: Valor de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La norma del proyecto para πίστις es 'fe'. Aquí esa elección encaja con la imagen del escudo como recurso de dependencia y adhesión confiada a Dios. Las alternativas se documentan, pero no desplazan la forma principal.
  doctrine_reference: 'Terminología bíblica estable del proyecto: πίστις → fe, salvo razón contextual documentada.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustantivos: el texto fuente y el audit trail inglés muestran acuerdo moderado con solo observaciones menores. La versión española conserva las decisiones léxicas clave, especialmente πίστις, βέλη y τοῦ πονηροῦ, sin suavizar las tensiones documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'fe' para πίστις conforme al criterio del proyecto.
  - Se usa 'el maligno' para τοῦ πονηροῦ, preservando la lectura personal probable y dejando abierta la alternativa abstracta en nota.
  - Se elige 'dardos' para βέλη por amplitud semántica y tradición, aunque 'flechas' queda documentado como alternativa.
  - 'La estructura verbal respeta el participio aoristo con un gerundio natural en español: ''tomando''.'
