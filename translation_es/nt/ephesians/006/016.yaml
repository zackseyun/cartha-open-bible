  glossary_alignment: 'Alineación general buena con la terminología del proyecto: πίστις → ''fe''; τοῦ πονηροῦ → ''del maligno'' con alternativa abstracta en nota; no hay conflictos con Yahvé/Mesías/etc. El único desajuste relevante es no seguir la decisión auditada de βέλη en el texto principal, donde la versión española debería privilegiar ''flechas'' y dejar ''dardos'' como alternativa.'
