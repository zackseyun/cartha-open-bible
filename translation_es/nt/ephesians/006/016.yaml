  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: ἐν πᾶσιν como adverbial (''en todas las circunstancias''), ἀναλαβόντες como acción concomitante, θυρεός como ''escudo'', πίστις como ''fe'', ἐν ᾧ instrumental, δυνήσεσθε como capacidad futura, y τοῦ πονηροῦ con lectura personal probable (''del maligno''). Sin embargo, se aparta innecesariamente del rastro auditado en βέλη al poner ''dardos'' en el texto principal, cuando el inglés POB eligió ''arrows'' por claridad moderna y dejó la alternativa en nota. Además, la colocación de notas no preserva bien la lógica del audit trail inglés sobre las alternativas tradicionales.'
