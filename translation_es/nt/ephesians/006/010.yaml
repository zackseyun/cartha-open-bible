translation:
  language: es
  text: Por lo demás, fortalézcanse[a] en el Señor y en la fuerza de su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean fortalecidos». El verbo griego puede expresarse de manera más idiomática como «sean fuertes», pero «fortalézcanse» conserva mejor el matiz exhortativo recibido del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ λοιποῦ
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - Para concluir
  - En adelante
  lexicon: BDAG
  rationale: La expresión funciona como marcador de transición conclusiva. En español, «Por lo demás» comunica de forma natural el paso a la exhortación final sin sonar tan mecánico como «Finalmente» ni tan interpretativo como «En adelante».
- source_word: ἐνδυναμοῦσθε
  english_pob_choice: be strengthened
  chosen_spanish: fortalézcanse
  alternatives_spanish:
  - sean fortalecidos
  - se fortalezcan
  - sean fortalecidos por Dios
  lexicon: BDAG
  rationale: El verbo griego exhorta en forma pasiva/media a recibir fuerza. «Fortalézcanse» conserva el valor exhortativo y suena natural en español; «sean fortalecidos» preservaría más explícitamente la pasividad, pero resulta más pesado. Se evita «se fortalezcan» por posible lectura más autónoma que la fuerza del contexto no favorece plenamente.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se mantiene la imagen relacional/esférica del ἐν con la forma establecida «en el Señor». «Por el Señor» desplazaría el matiz hacia instrumento; «en unión con el Señor» añade interpretación no explícita en el texto.
- source_word: ἐν τῷ κράτει τῆς ἰσχύος αὐτοῦ
  english_pob_choice: in the strength of his might
  chosen_spanish: en la fuerza de su poder
  alternatives_spanish:
  - en la fortaleza de su poder
  - en el poder de su fuerza
  - en la fuerza de su fortaleza
  lexicon: BDAG
  rationale: La cadena de sustantivos griegos acumula términos de poder. «Fuerza» traduce bien κράτος en este contexto; «poder» traduce ἰσχύς de manera amplia y natural en español. Se evita una duplicación rígida como «la fuerza de su fuerza», y «fuerza de su poder» preserva la intensificación sin sonar artificial.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - del Señor
  - de él
  lexicon: BDAG
  rationale: El pronombre retoma naturalmente a «el Señor». «Su» es la equivalencia más directa y evita sobreexplicar o repetir el referente en la frase.
theological_decisions:
- issue: Matiz exhortativo-passivo de ἐνδυναμοῦσθε
  english_pob_reading: 'A receptive exhortation: believers are to be strengthened by virtue of their relation to the Lord, not merely told to summon inner resolve.'
  chosen_spanish_reading: 'Una exhortación receptiva: los creyentes deben recibir fortaleza del Señor, no simplemente movilizar autosuficiencia interior.'
  alternative_spanish_readings:
  - 'Una exhortación activa: sean fuertes'
  - 'Una exhortación puramente reflexiva: esfuércense'
  rationale: «Fortalézcanse» mantiene el impulso exhortativo, pero en el contexto de «en el Señor» comunica dependencia de una fortaleza recibida. Así se conserva la tensión entre exhortación y pasividad implícita sin convertirla en una orden de mera autodisciplina.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: La forma doctrinal y eclesialmente transparente en español para κύριος aquí es «Señor». En este contexto paulino se refiere naturalmente al Cristo exaltado, sin necesidad de añadirlo en el texto.
  doctrine_reference: 'Contested terms: κύριος Kyrios'
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo más reciente y se mantuvo sin cambios en el texto inglés auditado; la versión española sigue esa estabilidad y preserva la tensión semántica principal del verbo ἐνδυναμοῦσθε sin ampliar el alcance del versículo.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar POB y a la transparencia doctrinal.
  - Se evita «Cristo» porque el texto griego dice κύριος y no χρειάζεται expansión interpretativa.
  - La secuencia «fuerza de su poder» intenta reflejar la acumulación de κράτος + ἰσχύς sin forzar una repetición poco natural en español.
