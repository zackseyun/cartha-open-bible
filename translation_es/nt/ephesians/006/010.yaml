  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: marcador conclusivo, exhortación a recibir fortaleza, y la doble frase preposicional «en el Señor» / «en la fuerza de su poder». Sin embargo, la nota al pie invierte la relación principal/alternativa documentada en el rastro inglés: el texto español usa una forma más idiomática-reflexiva («fortalézcanse»), mientras que la traducción base privilegia el matiz pasivo («be strengthened»). Conviene alinear mejor la nota y la explicación con ese matiz pasivo recibido del griego.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Por lo demás» y «en el Señor» funcionan muy bien. «En la fuerza de su poder» también suena bien en español. El único punto de calidad/precisión es que «fortalézcanse» puede leerse como reflexivo o más activo de lo deseado; dado que se conserva por naturalidad, la nota debe explicar con exactitud que una opción más literal sería «sean fortalecidos».
  glossary_alignment: 'Se respetan bien las decisiones terminológicas relevantes: κύριος → «Señor»; no hay conflicto con defaults de Yahvé/Mesías/etc. La cadena κράτος / ἰσχύς está diferenciada de forma aceptable con «fuerza» / «poder». La principal desalineación está en la nota léxica de ἐνδυναμοῦσθε, que debe reflejar que la alternativa más fiel al pasivo es «sean fortalecidos», mientras «fortalézcanse» es la forma más idiomática del texto principal.'
  issues:
  - severity: medium
    issue: La nota al pie para ἐνδυναμοῦσθε está invertida respecto al rastro inglés y al valor pasivo del griego.
    rationale: El texto principal usa «fortalézcanse», pero la nota dice «O “sean fortalecidos”» y luego presenta «fortalézcanse» como si preservara mejor el matiz. En realidad, «sean fortalecidos» preserva más explícitamente la pasividad; «fortalézcanse» es la opción más idiomática elegida para el español.
  - severity: low
    issue: 'La justificación del matiz verbal en la nota usa una formulación algo imprecisa: «matiz exhortativo recibido del texto».'
    rationale: La cuestión no es solo exhortativa, sino específicamente la voz pasiva/media con sentido receptivo. Una redacción más precisa ayudaría a preservar la decisión lexical y teológica documentada.
  revised_spanish_text: Por lo demás, fortalézcanse[a] en el Señor y en la fuerza de su poder.
  revised_footnotes:
  - marker: a
    text: O «sean fortalecidos». El verbo griego también puede expresarse de manera más idiomática como «sean fuertes», pero «sean fortalecidos» preserva mejor el matiz pasivo.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es natural y fiel en conjunto, pero se corrige la nota para alinearla con el griego y con la auditoría inglesa: la alternativa más literal es «sean fortalecidos», mientras la forma principal «fortalézcanse» es una adaptación idiomática española que puede mantenerse en el cuerpo del texto.'
