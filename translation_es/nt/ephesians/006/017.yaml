  glossary_alignment: 'Se alinea con los términos del proyecto: «Espíritu» para πνεῦμα en contexto del Espíritu Santo, «Dios» para θεοῦ, y «palabra» para ῥῆμα en el texto principal. No hay conflicto con Yahvé/Mesías u otras políticas globales. La excepción necesaria es corregir la alternativa léxica de la nota b a un español natural y fiel al matiz de ῥῆμα.'
