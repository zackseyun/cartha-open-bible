    rationale: El inglés auditado ofrece «utterance of God» como alternativa léxica para ῥῆμα, pero en español debe expresarse con una forma idiomática. «Utterancia» es un calco/anglicismo impropio y perjudica la legibilidad y la credibilidad de la nota.
  revised_spanish_text: Y reciban el casco de la salvación[a], y la espada del Espíritu, que es la palabra de Dios[b],
