translation:
  language: es
  text: Y reciban el casco de la salvación[a], y la espada del Espíritu, que es la palabra de Dios[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomen» el casco de la salvación.
    reason: lexical_alternative
  - marker: b
    text: O «la palabra hablada de Dios»; el griego rhēma puede enfatizar una palabra pronunciada o un mensaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέξασθε
  english_pob_choice: receive
  chosen_spanish: reciban
  alternatives_spanish:
  - tomen
  - acepten
  lexicon: BDAG
  rationale: El imperativo aoristo medio plural pide una acción exhortativa dirigida a la comunidad. «Reciban» conserva la idea de acoger lo provisto, sin volverlo más brusco que el griego; también funciona bien en español para la imagen de la armadura.
- source_word: περικεφαλαίαν
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  - casco protector
  lexicon: BDAG
  rationale: El término militar corresponde a un protector de la cabeza. En español, «casco» es claro y natural; «yelmo» suena más arcaico y menos transparente para lectores actuales.
- source_word: τοῦ σωτηρίου
  english_pob_choice: of salvation
  chosen_spanish: de la salvación
  alternatives_spanish:
  - de liberación
  lexicon: BDAG
  rationale: El genitivo expresa la cualidad o procedencia asociada a la armadura. «De la salvación» sigue de cerca el valor teológico habitual del pasaje y conserva la fórmula conocida sin imponer una interpretación más estrecha de «liberación».
- source_word: μάχαιραν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - espada corta
  - daga
  lexicon: BDAG
  rationale: Aunque μαχαίρα puede referirse a un arma de hoja más corta, en español «espada» es el equivalente idiomático más natural para el símbolo bélico del texto. Las opciones más específicas restringirían innecesariamente el sentido.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  lexicon: BDAG
  rationale: En este contexto paulino, el genitivo se entiende mejor como referencia al Espíritu Santo. La mayúscula en «Espíritu» comunica ese referente sin añadir explicación al texto principal.
- source_word: ὅ ἐστιν
  english_pob_choice: which is
  chosen_spanish: que es
  alternatives_spanish:
  - lo cual es
  - es decir
  lexicon: BDAG
  rationale: La cláusula explicativa introduce una apposición natural en español. «Que es» reproduce con claridad la relación explicativa entre la espada y la frase siguiente.
- source_word: ῥῆμα θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la utterancia de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: Aunque ῥῆμα puede destacar una palabra pronunciada o dicho concreto, «palabra de Dios» es la formulación más natural y reconocible en español, y mantiene la resonancia bíblica del pasaje sin sobrerregular el matiz léxico.
theological_decisions:
- issue: Referente de «el Espíritu»
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  - el ámbito espiritual
  rationale: En la imagen de la armadura de Dios, la espada pertenece o es suministrada por el Espíritu Santo; la frase final («la palabra de Dios») refuerza ese referente divino. Mantener «Espíritu» con mayúscula preserva la lectura teológica sin sobreexplicarla en el verso.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el borrador sigue el estado más reciente sin cambios y conserva las decisiones auditadas del texto inglés.
  spanish_consistency_notes:
  - Se emplea «Dios» para θεοῦ y «Espíritu» con mayúscula para el referente del Espíritu Santo.
  - Se mantiene una equivalencia natural y eclesialmente legible sin usar «SEÑOR» como sustituto de un nombre divino que no aparece en este versículo.
  - 'La terminología bélica se mantiene simple y contemporánea: «casco» y «espada».'
  - Las notas a pie conservan la alternativa léxica documentada para δέξασθε y ῥῆμα, sin añadir variantes no sustentadas.
