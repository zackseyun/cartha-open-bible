source:
  edition: SBLGNT
  text: Καὶ οἱ κύριοι, τὰ αὐτὰ ποιεῖτε πρὸς αὐτούς, ἀνιέντες τὴν ἀπειλήν, εἰδότες ὅτι καὶ ⸂αὐτῶν καὶ ὑμῶν⸃ ὁ κύριός ἐστιν ἐν οὐρανοῖς, καὶ προσωπολημψία οὐκ ἔστιν παρ’ αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/006/009.yaml
  text: And masters[a], do the same things toward them, giving up threatening, knowing that both their Master and yours is in heaven[c][b], and there is no partiality with him.
  footnotes:
  - marker: a
    text: Or 'do the same to them' or 'treat them in the same way.' The Greek closely echoes the previous instruction and stresses reciprocity.
    reason: lexical_alternative
  - marker: b
    text: Or 'stopping your threats.' The Greek participle ἀνιέντες can mean ceasing or giving up the practice of threatening.
    reason: lexical_alternative
  - marker: c
    text: Greek 'in the heavens'; rendered 'in heaven' as the natural English equivalent of the idiom.
    reason: lexical_alternative
