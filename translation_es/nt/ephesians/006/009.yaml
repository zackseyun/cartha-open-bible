translation:
  language: es
  text: Y ustedes, amos[a], hagan lo mismo con ellos, dejando las amenazas[b], sabiendo que tanto el Señor de ellos como el de ustedes está en los cielos[c], y que no hay parcialidad con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘señores’. El griego usa κύριοι para los amos humanos del hogar, en contraste con el κύριος celestial del resto del versículo.
    reason: lexical_alternative
  - marker: b
    text: O ‘dejando de amenazar’ o ‘cesando sus amenazas’. El participio ἀνιέντες expresa abandonar o cesar una práctica habitual.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘en los cielos’. Se conserva aquí el plural del griego; también podría decirse naturalmente ‘en el cielo’.
    reason: source_note
lexical_decisions:
- source_word: κύριοι
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - patrones
  lexicon: BDAG
  rationale: En este contexto de código doméstico, κύριοι se refiere a superiores humanos en relación con esclavos/siervos. 'Amos' conserva la relación social y la asimetría de poder con fuerza más natural en español que 'señores', y evita confundirlo con el título divino que aparece después en el versículo.
- source_word: τὰ αὐτὰ ποιεῖτε πρὸς αὐτούς
  english_pob_choice: do the same things toward them
  chosen_spanish: hagan lo mismo con ellos
  alternatives_spanish:
  - háganles lo mismo
  - trátenlos de la misma manera
  lexicon: BDAG
  rationale: La expresión pide reciprocidad directa con el grupo anterior. 'Hagan lo mismo con ellos' conserva esa relación sin sonar forzado en español, y refleja el valor de πρὸς con naturalidad.
- source_word: ἀνιέντες
  english_pob_choice: giving up
  chosen_spanish: dejando de
  alternatives_spanish:
  - cesando de
  - abandonando
  lexicon: BDAG
  rationale: El participio expresa dejar una práctica habitual, en este caso las amenazas. 'Dejando de' comunica bien la cesación de la conducta y mantiene la función participial ligada al mandato principal.
- source_word: τὴν ἀπειλήν
  english_pob_choice: threatening
  chosen_spanish: amenazar
  alternatives_spanish:
  - la amenaza
  - las amenazas
  lexicon: BDAG
  rationale: El sustantivo abstracto singular apunta a la práctica de amenazar, no solo a un acto aislado. En español, el infinitivo sustantivado 'amenazar' comunica mejor esa conducta continua, aunque 'la amenaza' sigue siendo una alternativa posible.
- source_word: καὶ αὐτῶν καὶ ὑμῶν ὁ κύριος
  english_pob_choice: both their Master and yours
  chosen_spanish: tanto su Amo como el de ustedes
  alternatives_spanish:
  - tanto su Señor como el de ustedes
  - su Amo y el de ustedes
  lexicon: BDAG
  rationale: El contexto inmediato trata de amos humanos y esclavos, pero aquí κύριος se refiere al Señor celestial. Para preservar la distinción auditiva con los 'amos' humanos y a la vez reflejar la relación poseída por ambos grupos, se usa 'Amo' con mayúscula en sentido titular. 'Señor' sería posible, pero en español puede perder la tensión con el vocabulario del mismo versículo; 'Amo' conserva el contraste con los amos terrenales y sigue el audit trail que distingue el referente divino del humano.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el cielo(s)
  lexicon: BDAG
  rationale: El plural griego se conserva de manera más cercana con 'en los cielos'. Aunque 'en el cielo' es idiomático, aquí la forma plural mantiene mejor la huella del original sin sacrificar comprensibilidad.
- source_word: προσωπολημψία
  english_pob_choice: partiality
  chosen_spanish: acepción de personas
  alternatives_spanish:
  - parcialidad
  - favoritismo
  lexicon: BDAG
  rationale: '''Acepción de personas'' es la equivalencia tradicional y precisa para este término jurídico-moral, y expresa la idea de trato desigual por estatus o apariencia. Aunque ''parcialidad'' es más moderno, ''acepción de personas'' preserva mejor la fuerza técnica del concepto en este contexto.'
- source_word: παρ’ αὐτῷ
  english_pob_choice: with him
  chosen_spanish: delante de él
  alternatives_spanish:
  - con él
  - ante él
  lexicon: BDAG
  rationale: La idiomática presencia de Dios se expresa naturalmente en español como 'delante de él'. Esta opción comunica que no existe favoritismo en su presencia o con respecto a su carácter, sin perder claridad.
theological_decisions:
- issue: Diferenciar κύριοι humanos del κύριος celestial en un mismo versículo
  english_pob_reading: Translate human κύριοι as 'masters' and divine κύριος as 'Master'
  chosen_spanish_reading: Traducir los κύριοι humanos como 'amos' y el κύριος celestial como 'Amo' titular con mayúscula
  alternative_spanish_readings:
  - traducir ambos como 'señor/Señor'
  - usar 'patrones' para los humanos y 'Señor' para el celestial
  rationale: El griego usa la misma raíz, pero el contexto distingue entre autoridades domésticas humanas y el Señor en los cielos. En español, 'amo' para los humanos mantiene el marco social del pasaje, y 'Amo' para el referente celestial conserva la conexión léxica sin borrar la distinción teológica. La mayúscula ayuda a identificar el uso titular y evita confundirlo con el uso ordinario.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
- issue: Reconocer la cláusula de falta de favoritismo como afirmación sobre el carácter divino
  english_pob_reading: and there is no partiality with him
  chosen_spanish_reading: y que no hay acepción de personas delante de él
  alternative_spanish_readings:
  - y no hay parcialidad con él
  - y no hace acepción de personas
  rationale: La frase afirma que Dios no juzga por estatus, posición o apariencia. 'Acepción de personas' conserva el peso bíblico-jurídico de la expresión y conecta bien con el marco ético del pasaje. 'Delante de él' mantiene el sentido de presencia/perspectiva sin reducir la afirmación a mera compañía.
  doctrine_reference: Santiago 2:1; Romanos 2:11
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de 'Lord' a 'Master' en el tramo celestial por coherencia contextual con los κύριοι humanos, pero la revisión final mantiene la distinción semántica entre los amos humanos y el referente celestial. Para el español, se optó por 'amo'/'Amo' para preservar esa tensión léxica sin introducir ambigüedad con 'Señor'. También se siguió la decisión revisada de ver ἀνιέντες como cesación de una práctica ('dejando de') y no como una mera atenuación.
  spanish_consistency_notes:
  - Se mantiene la distinción entre el uso social de 'amo' y el uso titular de 'Amo' para el referente celestial.
  - '''Acepción de personas'' conserva una formulación bíblico-jurídica estable y evita una simplificación excesiva.'
  - La preposición 'delante de él' se eligió para expresar presencia divina de forma clara en español, sin añadir ideas no presentes en el griego.
  - Se conserva la reciprocidad del mandato con 'hagan lo mismo con ellos', que refleja la repetición enfática del original.
