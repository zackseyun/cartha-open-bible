    text: Literalmente, ‘en los cielos’. Se conserva aquí el plural del griego; también podría decirse naturalmente ‘en el cielo’.
    reason: source_note
  revision_rationale: Se revisa 'su Amo' a 'el Señor de ellos' porque el referente es el κύριος celestial y 'Señor' es la opción más fiel, natural y doctrinalmente clara en español, mientras mantiene el contraste con los 'amos' humanos. Se cambia 'acepción de personas delante de él' por 'parcialidad con él' para un español moderno y más cercano al sentido de παρ’ αὐτῷ. También se ajusta 'dejando de amenazar' a 'dejando las amenazas' para representar mejor el sustantivo abstracto τὴν ἀπειλήν como práctica habitual, sin perder naturalidad.
