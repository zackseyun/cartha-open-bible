translation:
  language: es
  text: sabiendo que cada uno, cualquier bien que haga, esto lo recibirá de vuelta[a] del Señor, sea esclavo o libre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será recompensado por esto por el Señor». El verbo griego puede expresar recibir de vuelta lo que corresponde a la acción realizada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sea esclavo o persona libre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - sabiendo que
  lexicon: οἶδα
  rationale: El participio causal/adverbial se conserva con un gerundio natural en español. 'Sabiendo' comunica la conexión con la exhortación anterior sin forzar una subordinación explícita que el griego no marca de modo absoluto.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: ἕκαστος
  rationale: '''Cada uno'' preserva el valor distributivo singular del griego y mantiene el énfasis en la responsabilidad individual. Evita neutralizar la forma singular representativa.'
- source_word: ὃ ἂν ποιήσῃ ἀγαθόν
  english_pob_choice: whatever good ... does
  chosen_spanish: cualquier bien que haga
  alternatives_spanish:
  - todo bien que haga
  - lo que sea bueno que haga
  lexicon: ποιέω / ἀγαθός
  rationale: La cláusula indefinida expresa 'cualquier cosa que' en sentido de acción buena. 'Cualquier bien que haga' conserva la indefinición y el valor moral de ἀγαθόν sin volver la frase pesada en español.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - eso
  - lo mismo
  lexicon: οὗτος
  rationale: '''Esto'' retoma de manera directa la acción buena mencionada. En español conserva bien la deíxis anafórica del demostrativo.'
- source_word: κομίσεται
  english_pob_choice: will receive back
  chosen_spanish: recibirá
  alternatives_spanish:
  - recibirá de vuelta
  - será recompensado
  lexicon: κομίζω
  rationale: El griego puede implicar recibir lo correspondiente a la acción, no solo 'recibir' en sentido general. En el texto principal se usa 'recibirá' para mantener fluidez; la nota explica la alternativa de 'recibirá de vuelta' como posible matiz de reciprocidad.
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de parte del Señor
  alternatives_spanish:
  - del Señor
  - de parte del Señor
  lexicon: παρά + genitivo / κύριος
  rationale: '''De parte de'' expresa claramente la procedencia y evita una lectura meramente local. ''Señor'' sigue la equivalencia establecida para κύριος en este contexto cristológico.'
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: δοῦλος
  rationale: Se mantiene 'esclavo' para conservar la fuerza social del contraste con 'libre'. La alternativa 'siervo' suavizaría indebidamente el término y borraría la realidad histórica presente en el pasaje.
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - liberto
  - persona libre
  lexicon: ἐλεύθερος
  rationale: '''Libre'' reproduce de forma concisa y natural el contraste binario con ''esclavo''. ''Persona libre'' sería explicativo pero innecesario en el flujo del versículo.'
theological_decisions:
- issue: Referencia de κύριος en el contexto de amos y esclavos
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - el Dueño
  rationale: Aunque el contexto inmediato trata de relaciones domésticas, la recompensa proviene del Señor exaltado. 'El Señor' preserva esa referencia sin reducirla al amo humano.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
- issue: δοῦλος frente a ἐλεύθερος como contraste social
  english_pob_reading: slave or free
  chosen_spanish_reading: esclavo o libre
  alternative_spanish_readings:
  - siervo o libre
  - esclavo o persona libre
  rationale: El texto contrapone de manera directa condición esclava y condición libre. 'Esclavo' evita suavizar la tensión social y se alinea con la política terminológica del proyecto para δοῦλος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que coloca el énfasis en ''cada uno'' antes de la cláusula relativa de la acción buena. También conserva la ambigüedad controlada de κομίσεται: el cuerpo principal favorece una lectura fluida en español, mientras la nota mantiene visible el matiz de reciprocidad documentado en el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος de manera consistente con el uso doctrinal del proyecto.
  - Se mantiene 'esclavo' para δοῦλος, no 'siervo', para conservar la fuerza lexical y social del contraste.
  - '''Libre'' se usa como término simétrico de contraste social frente a ''esclavo''.'
  - La puntuación reproduce una lectura natural del participio inicial como marco de la exhortación anterior.
