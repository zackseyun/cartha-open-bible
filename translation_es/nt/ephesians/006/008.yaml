review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: participio introductorio (''sabiendo''), énfasis distributivo en ἕκαστος (''cada uno''), cláusula indefinida de ὃ ἂν ποιήσῃ ἀγαθόν, y contraste social ''esclavo o libre''. También conserva correctamente κύριος como ''Señor'' y δοῦλος como ''esclavo''. Sin embargo, el texto principal atenúa innecesariamente el matiz de κομίσεται (''recibirá de vuelta / recibirá como correspondencia'') al dejar solo ''recibirá'', pese a que la auditoría inglesa hizo de ese matiz una decisión léxica significativa en el texto principal.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''esto recibirá de parte del Señor'' suena algo forzado. ''Recibirá de vuelta del Señor'' es más natural y comunica mejor la reciprocidad documentada. Además, la nota [a] está mal anclada: el marcador aparece en ''cada uno'' aunque la nota trata sobre κομίσεται, no sobre ἕκαστος. Conviene mover el anclaje al verbo/frase correspondiente.'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: κύριος -> ''Señor'' y δοῦλος -> ''esclavo'' están bien; ἐλεύθερος -> ''libre'' también. No hay conflicto con Yahvé/Mesías u otros términos por defecto. La única desviación sustancial es no reflejar en el texto principal la fuerza léxica de κομίσεται, que el POB inglés sí preserva con ''will receive back''.'
  issues:
  - severity: medium
    issue: El matiz de κομίσεται se debilitó en el texto principal.
    rationale: La evidencia y la auditoría inglesa favorecen 'recibirá de vuelta' o una formulación equivalente en el texto principal, no solo en nota. 'Recibirá' por sí solo pierde la correspondencia/retribución implícita en el verbo.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: El marcador [a] aparece tras 'cada uno', pero la nota comenta el verbo κομίσεται ('será recompensado...' / 'recibir de vuelta'). Debe anclarse en 'recibirá' o la frase verbal correspondiente.
  - severity: low
    issue: '''de parte del Señor'' es aceptable, pero menos directo que ''del Señor'' en este contexto.'
    rationale: παρὰ κυρίου expresa procedencia/fuente. En español bíblico natural, 'del Señor' funciona bien y evita una leve rigidez estilística.
  revised_spanish_text: sabiendo que cada uno, cualquier bien que haga, esto lo recibirá de vuelta[a] del Señor, sea esclavo o libre[b].
  revised_footnotes:
