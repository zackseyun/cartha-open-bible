revisions:
- from: sabiendo que cada uno[a], cualquier bien que haga, esto recibirá de parte del Señor[b], sea esclavo o libre.
  to: sabiendo que cada uno, cualquier bien que haga, esto lo recibirá de vuelta[a] del Señor, sea esclavo o libre[b].
  rationale: Se revisa para reflejar en el texto principal el matiz de κομίσεται ('recibirá de vuelta'), mejorar la naturalidad de la frase en español y corregir el anclaje de la nota léxica al elemento que realmente comenta. Se mantiene 'Señor' y 'esclavo' conforme a la evidencia y a la terminología del proyecto.
