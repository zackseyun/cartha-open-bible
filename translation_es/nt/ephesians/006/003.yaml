lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La conjunción expresa finalidad o resultado; en español, «para que» comunica con naturalidad esa relación sin perder la fuerza prospectiva del griego.
- source_word: εὖ
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - prósperamente
  - favorablemente
  lexicon: BDAG
  rationale: «Bien» reproduce el adverbio de manera directa y conserva el sentido idiomático de que la situación le resulte favorable.
- source_word: σοι
  english_pob_choice: with you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - contigo
  lexicon: BDAG
  rationale: 'El dativo en esta construcción idiomática se expresa naturalmente en español con pronombre de objeto indirecto: «te vaya bien».'
- source_word: γένηται
  english_pob_choice: it may go
  chosen_spanish: vaya
  alternatives_spanish:
  - sea
  - ocurra
  lexicon: BDAG
  rationale: En la frase idiomática εὖ σοι γένηται, γίνομαι expresa que las cosas resulten de cierta manera; «vaya» reproduce esa idea de desenvolverse o resultar.
- source_word: ἔσῃ
  english_pob_choice: you may live
  chosen_spanish: seas
  alternatives_spanish:
  - vivirás
  - serás
  lexicon: BDAG
  rationale: El verbo copulativo con el predicado siguiente no exige en español una paráfrasis verbal; «seas» mantiene la forma y prepara el adjetivo predicativo.
- source_word: μακροχρόνιος
  english_pob_choice: live long
  chosen_spanish: de larga vida
  alternatives_spanish:
  - de larga duración
  - longevo
  lexicon: BDAG
  rationale: El adjetivo significa «de larga duración / longevo». En español, «de larga vida» conserva el valor predicativo con fluidez y dignidad.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  lexicon: BDAG
  rationale: La preposición y el sustantivo permiten «sobre la tierra» como reflejo directo del griego. Se evita introducir «país» en el texto principal porque el griego de Efesios dice «la tierra»; la posible alusión a «la tierra / el país» queda preservada en la nota.
theological_decisions:
- issue: Alcance de ἐπὶ τῆς γῆς frente a la promesa del quinto mandamiento
  english_pob_reading: on the earth
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - en la tierra
  - en el país
  rationale: Se sigue la redacción griega tal como está en Efesios, sin importar de antemano el complemento más específico de Éxodo/Deuteronomio. «Sobre la tierra» mantiene el alcance amplio del texto, mientras la nota conserva la posible resonancia con la promesa del mandamiento.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de la tensión textual cuando el eco veterotestamentario puede leerse de más de una manera.'
translation_notes:
  revision_awareness: La versión inglesa POB mantiene una lectura amplia («on the earth») y anota la alternativa «in the land». No se aplicaron revisiones posteriores; el texto griego y el aparato de auditoría muestran acuerdo alto y sin cambios.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, evitando calco mecánico pero conservando la correspondencia semántica con el griego.
  - «Tierra» se conserva para reflejar γῆς; la alternativa «país» no se incorporó al cuerpo por no estar en la forma griega de Efesios.
  - La construcción final usa una estructura española natural («sobre la tierra») sin perder el paralelismo con la promesa bíblica citada indirectamente.
