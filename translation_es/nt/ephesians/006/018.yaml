translation:
  language: es
  text: con toda oración y súplica, orando en todo tiempo en el Espíritu[a][b], y para este fin velando con toda perseverancia y súplica por todos los santos[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en espíritu'. El griego puede leerse de manera más general, pero en el contexto probablemente se refiere al Espíritu Santo.
    reason: alternative_reading
  - marker: b
    text: Esto es, en el Espíritu Santo; la frase griega no lleva artículo y algunos intérpretes la entienden de modo más general.
    reason: theological_note
  - marker: c
    text: '''Santos'' aquí significa todo el pueblo santo de Dios, es decir, todos los creyentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πάσης προσευχῆς καὶ δεήσεως
  english_pob_choice: with every prayer and petition
  chosen_spanish: con toda oración y súplica
  alternatives_spanish:
  - por medio de toda oración y súplica
  - mediante toda oración y súplica
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o instrumento. En español, 'con' comunica bien ese valor sin sonar forzado. Distingo προσευχή como 'oración' general y δέησις como 'súplica' para conservar la diferencia léxica entre ambas palabras.
- source_word: προσευχόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - orando ustedes
  - mientras oran
  lexicon: BDAG
  rationale: El participio presente acompaña la exhortación anterior y mantiene el flujo de acciones. 'Orando' conserva ese carácter participial y suena natural en español bíblico contemporáneo.
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - a toda hora
  - en cada ocasión
  lexicon: BDAG
  rationale: καιρός aquí señala todo momento o circunstancia adecuada. 'En todo tiempo' preserva la extensión total sin añadir una restricción interpretativa.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  lexicon: BDAG
  rationale: La lectura probable en contexto paulino es el Espíritu Santo; por eso uso mayúscula. Aun así, la frase griega permite una lectura más general, y la nota preserva esa tensión.
- source_word: εἰς αὐτὸ
  english_pob_choice: to this end
  chosen_spanish: para este fin
  alternatives_spanish:
  - con este propósito
  - a esto
  lexicon: BDAG
  rationale: La expresión apunta al propósito de lo dicho antes. 'Para este fin' reproduce bien el valor final y el énfasis de αὐτό de manera natural en español.
- source_word: ἀγρυπνοῦντες
  english_pob_choice: staying alert
  chosen_spanish: velando
  alternatives_spanish:
  - manteniéndose alerta
  - vigilando
  lexicon: BDAG
  rationale: El verbo expresa vigilancia despierta. 'Velando' funciona de forma idiomática en español y conserva el sentido de atención vigilante del pasaje.
- source_word: ἐν πάσῃ προσκαρτερήσει
  english_pob_choice: with all perseverance
  chosen_spanish: con toda perseverancia
  alternatives_spanish:
  - con toda constancia
  - con toda persistencia
  lexicon: BDAG
  rationale: προσκαρτέρησις denota constancia persistente. 'Perseverancia' comunica esa continuidad sostenida en la oración y la vigilancia.
- source_word: καὶ δεήσει
  english_pob_choice: and petition
  chosen_spanish: y súplica
  alternatives_spanish:
  - y petición
  - y ruego
  lexicon: BDAG
  rationale: Repito 'súplica' para conservar la correspondencia con δέησις y evitar que el español borre la reiteración léxica del griego. 'Petición' es posible, pero aquí 'súplica' mantiene mejor el tono de ruego insistente.
- source_word: περὶ πάντων τῶν ἁγίων
  english_pob_choice: for all the saints
  chosen_spanish: por todos los santos
  alternatives_spanish:
  - por todos los creyentes
  - por todos los santos de Dios
  lexicon: BDAG
  rationale: ἅγιοι en Pablo se refiere al pueblo de Dios, no a una categoría posterior de canonización. 'Santos' preserva el término establecido y sigue siendo inteligible en español; la nota aclara su referente comunitario.
theological_decisions:
- issue: Sentido de ἐν πνεύματι
  english_pob_reading: Holy Spirit ('in the Spirit')
  chosen_spanish_reading: el Espíritu Santo ('en el Espíritu')
  alternative_spanish_readings:
  - espíritu humano ('en espíritu')
  rationale: En Efesios, y en el marco inmediato de la guerra espiritual y la exhortación a la oración, la referencia más probable es el Espíritu Santo. La traducción conserva esa lectura probable sin borrar la ambigüedad griega, que se explica en la nota.
  doctrine_reference: 'POB translation philosophy: preservar tensiones genuinas cuando la ambigüedad del original no desaparece del todo'
- issue: Sentido de ἅγιοι
  english_pob_reading: all believers ('all the saints')
  chosen_spanish_reading: todos los creyentes ('todos los santos')
  alternative_spanish_readings:
  - los santos en sentido eclesial posterior
  rationale: En uso paulino, ἅγιοι designa a la comunidad apartada para Dios. Mantengo 'santos' porque es fiel al léxico y transparente, y la nota evita una lectura restringida a la canonización posterior.
  doctrine_reference: Uso paulino de ἅγιοι en el NT
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y toma en cuenta el archivo auditado en inglés. En particular, refleja la revisión más reciente de εἰς αὐτό como finalidad ('para este fin') y conserva la doble mención de δέησις con 'súplica' en ambos lugares, para no diluir la repetición del griego ni la fuerza de la exhortación.
  spanish_consistency_notes:
  - Se usó 'súplica' para δέησις en ambas apariciones, manteniendo la consistencia léxica.
  - '''En el Espíritu'' conserva la mayúscula teológica coherente con la lectura preferida del contexto.'
  - '''Santos'' se mantiene como término técnico paulino, acompañado de nota explicativa.'
  - Se prefirió 'velando' para ἀγρυπνοῦντες por su naturalidad en español y su vínculo con vigilancia espiritual.
