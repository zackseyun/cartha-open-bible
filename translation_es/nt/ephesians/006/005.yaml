translation:
  language: es
  text: Esclavos, obedezcan a sus amos según la carne[a], con temor y temblor, con sinceridad de corazón, como al Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amos terrenales' o 'amos humanos'; literalmente, 'amos según la carne', es decir, amos solo en términos terrenales o humanos.
    reason: lexical_alternative
  - marker: b
    text: Griego 'Cristo'; se traduce 'Mesías' aquí porque el término funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: Slaves
  chosen_spanish: Esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: δοῦλος designa personas en servidumbre vinculada. En este contexto de código doméstico, 'esclavos' mantiene la fuerza social del término y evita suavizarla con 'siervos'.
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedezcan
  alternatives_spanish:
  - escuchen
  - estén sujetos
  lexicon: BDAG
  rationale: El imperativo presente pide obediencia continua; en español, 'obedezcan' expresa con claridad esa relación de acción requerida.
- source_word: τοῖς ⸂κατὰ σάρκα κυρίοις⸃
  english_pob_choice: your masters according to the flesh
  chosen_spanish: a sus amos según la carne
  alternatives_spanish:
  - a sus amos humanos
  - a sus amos terrenales
  - a sus amos según lo humano
  lexicon: BDAG
  rationale: Se conserva 'según la carne' para reflejar la construcción literal κατὰ σάρκα y la tensión entre autoridad temporal y la referencia al Mesías. 'Amos' corresponde al sentido social de κύριος aquí.
- source_word: μετὰ φόβου καὶ τρόμου
  english_pob_choice: with fear and trembling
  chosen_spanish: con temor y temblor
  alternatives_spanish:
  - con reverencia y temblor
  - con miedo y temblor
  lexicon: BDAG
  rationale: La expresión paulina se mantiene casi formulística; 'temor y temblor' conserva su fuerza retórica y su resonancia bíblica en español.
- source_word: ἐν ἁπλότητι τῆς καρδίας ὑμῶν
  english_pob_choice: in sincerity of your heart
  chosen_spanish: con sinceridad de corazón
  alternatives_spanish:
  - con sencillez de corazón
  - con pureza de corazón
  - con corazón sincero
  lexicon: BDAG
  rationale: ἁπλότης aquí apunta a sinceridad, integridad y no duplicidad. 'Con sinceridad de corazón' comunica bien el sentido interior y global en español.
- source_word: ὡς τῷ Χριστῷ
  english_pob_choice: as to Messiah
  chosen_spanish: como a Mesías
  alternatives_spanish:
  - como a Cristo
  - como al Mesías
  lexicon: BDAG
  rationale: Χριστός funciona como título; el proyecto prefiere traducirlo como 'Mesías'. En español, 'como a Mesías' suena abreviado pero fiel; la frase apunta comparativamente a la obediencia ofrecida al Mesías.
theological_decisions:
- issue: Rendering Χριστῷ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se preserva el valor titular de Χριστός conforme a la norma del proyecto. En este versículo, el contraste entre amos humanos y el Mesías se expresa mejor manteniendo la traducción del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Rendering δοῦλοι in a slavery context
  english_pob_reading: Slaves
  chosen_spanish_reading: Esclavos
  alternative_spanish_readings:
  - siervos
  rationale: El contexto social del pasaje exige una traducción directa que no atenúe la realidad de la esclavitud. 'Esclavos' mantiene la transparencia histórica y semántica del original.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
translation_notes:
  revision_awareness: La redacción sigue el último paso de revisión del inglés POB al preferir 'según la carne' para κατὰ σάρκα y mantener 'Mesías' para Χριστός. Se evitó 'Cristo' como forma principal por la política del proyecto, pero se reconoció la posibilidad lexical histórica en la nota.
  spanish_consistency_notes:
  - Se usó 'Mesías' de manera consistente para Χριστός, conforme al criterio del proyecto.
  - '''Esclavos'' conserva la fuerza social de δοῦλοι en un contexto de instrucción doméstica.'
  - '''Con temor y temblor'' mantiene una fórmula paulina reconocible sin añadir explicaciones al texto principal.'
  - La preposición 'como a Mesías' refleja el valor comparativo de ὡς; en español suena más natural que una construcción más literal pero menos idiomática.
