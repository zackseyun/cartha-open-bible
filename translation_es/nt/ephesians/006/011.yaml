review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: imperativo de equiparse, propósito de poder resistir, y oposición a las tácticas del diablo. Sin embargo, dos elecciones amplían o desplazan el sentido auditado: ''mantenerse firmes'' hace explícita una firmeza interpretativa donde el inglés POB mantuvo simplemente ''stand'', y ''estrategias'' debilita el matiz engañoso/cauteloso de μεθοδείας mejor preservado por ''artimañas'' o similar.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para mayor fidelidad léxica y estilo bíblico legible. 'Pónganse' y 'la armadura completa de Dios' funcionan bien. La frase final suena mejor y más precisa con 'estar firmes contra las artimañas del diablo' o 'hacer frente a las artimañas del diablo'; esto mantiene buena legibilidad sin sobreinterpretar.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Dios'', ''diablo'' y el resto del vocabulario son apropiados. La principal cuestión es de precisión léxica más que de glosario: μεθοδείας pide un término con matiz de astucia o engaño, y στῆναι conviene no expandirlo más de lo necesario en el texto principal.'
  issues:
  - severity: medium
    issue: '''mantenerse firmes'' sobretraduce στῆναι'
    rationale: El inglés POB decidió mantener 'to stand' en el texto principal y dejar la firmeza como matiz contextual, no como expansión. En español, 'estar firmes' conserva mejor esa cercanía sin añadir el matiz durativo de 'mantenerse'.
  - severity: medium
    issue: '''estrategias'' atenúa el matiz engañoso de μεθοδείας'
    rationale: Aunque es natural, 'estrategias' puede sonar neutral o incluso legítimo. El término griego apunta a tácticas astutas o engañosas; 'artimañas', 'maquinaciones' o 'métodos engañosos' lo conservan mejor. Dado que la nota ya incluye 'artimañas', conviene promoverla al texto principal.
  - severity: low
    issue: La nota a sobreexplica 'armadura' como 'no solo a una pieza de protección'
    rationale: La nota inglesa habla del equipo completo de un soldado. La explicación española es aceptable, pero puede alinearse más estrechamente con la auditoría usando 'equipo completo de un soldado' sin contraste añadido.
  revised_spanish_text: Pónganse la armadura completa de Dios[a], para que puedan estar firmes contra las artimañas[b] del diablo.
  revised_footnotes:
  - marker: a
    text: O “armadura entera”. El término griego se refiere al equipo completo de un soldado.
    reason: lexical_alternative
  - marker: b
    text: O “métodos engañosos” o “maquinaciones” del diablo.
    reason: lexical_alternative
  revision_rationale: La revisión reduce expansión interpretativa en στῆναι al pasar de 'mantenerse firmes' a 'estar firmes', más cercano al griego y a la decisión del POB auditado. También mejora μεθοδείας con 'artimañas', que expresa mejor la astucia engañosa del adversario que 'estrategias'. Se conserva la naturalidad del español y la estructura del versículo.
