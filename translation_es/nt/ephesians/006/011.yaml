revisions:
- from: Pónganse la armadura completa de Dios[a], para que puedan mantenerse firmes contra las estrategias[b] del diablo.
  to: Pónganse la armadura completa de Dios[a], para que puedan estar firmes contra las artimañas[b] del diablo.
  rationale: La revisión reduce expansión interpretativa en στῆναι al pasar de 'mantenerse firmes' a 'estar firmes', más cercano al griego y a la decisión del POB auditado. También mejora μεθοδείας con 'artimañas', que expresa mejor la astucia engañosa del adversario que 'estrategias'. Se conserva la naturalidad del español y la estructura del versículo.
