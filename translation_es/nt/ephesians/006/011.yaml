translation:
  language: es
  text: Pónganse la armadura completa de Dios[a], para que puedan estar firmes contra las artimañas[b] del diablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “armadura entera”. El término griego se refiere al equipo completo de un soldado.
    reason: lexical_alternative
  - marker: b
    text: O “métodos engañosos” o “maquinaciones” del diablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσασθε
  english_pob_choice: Put on
  chosen_spanish: Pónganse
  alternatives_spanish:
  - Vístanse
  - Pónganse encima
  lexicon: BDAG
  rationale: El imperativo aoristo medio plural pide una acción deliberada y completa. En español, "ponerse" es la forma más natural para vestir o equiparse con algo; conserva el carácter exhortativo sin sonar rígido. "Vístanse" sería más formal, pero puede sugerir ropa en general más que equipamiento militar.
- source_word: τὴν πανοπλίαν
  english_pob_choice: full armor
  chosen_spanish: la armadura completa
  alternatives_spanish:
  - la armadura total
  - la armadura entera
  - la armadura completa de guerra
  lexicon: BDAG
  rationale: πανοπλία denota el equipo completo de un soldado fuertemente armado. "Armadura completa" comunica esa totalidad de manera clara y natural en español. Se evita "armadura total" por sonar menos idiomática, y "entera" por resultar algo coloquial.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - que pertenece a Dios
  lexicon: BDAG
  rationale: El genitivo se mantiene amplio, como en el inglés auditado. "De Dios" preserva tanto la pertenencia como la procedencia posible, sin cerrar el matiz con una explicación añadida.
- source_word: πρὸς τὸ δύνασθαι ὑμᾶς στῆναι
  english_pob_choice: so that you may be able to stand
  chosen_spanish: para que puedan mantenerse firmes
  alternatives_spanish:
  - para que puedan estar de pie
  - para que puedan resistir
  - a fin de que puedan mantenerse firmes
  lexicon: BDAG
  rationale: La construcción expresa propósito o resultado. En contexto militar-espiritual, "mantenerse firmes" comunica mejor el sentido de resistir y no ceder. Se conserva la capacidad modal con "puedan" y el matiz de firmeza implícito en στῆναι.
- source_word: στῆναι
  english_pob_choice: to stand
  chosen_spanish: mantenerse firmes
  alternatives_spanish:
  - estar firmes
  - quedarse de pie
  - resistir
  lexicon: BDAG
  rationale: El infinitivo aquí significa sostener la posición, no meramente ponerse de pie. "Mantenerse firmes" expresa de forma idiomática la idea de resistir el ataque sin añadir más que el contexto ya sugiere.
- source_word: μεθοδείας
  english_pob_choice: schemes
  chosen_spanish: las estrategias
  alternatives_spanish:
  - los planes astutos
  - las artimañas
  - las maquinaciones
  lexicon: BDAG
  rationale: μεθοδεία connota métodos hábiles, engañosos y calculados. "Estrategias" es contemporáneo y mantiene la idea de métodos organizados; se deja en nota la alternativa de tono más tradicional o más marcadamente engañoso. No se usa "wiles" ni su equivalente arcaizante por estilo español.
- source_word: τοῦ διαβόλου
  english_pob_choice: the devil
  chosen_spanish: del diablo
  alternatives_spanish:
  - de Satanás
  - del acusador
  lexicon: BDAG
  rationale: En este contexto, διάβολος funciona como designación personal del adversario espiritual. "Diablo" es el equivalente español directo y ampliamente inteligible; se prefiere sobre una glosa interpretativa como "acusador" porque el texto ya identifica al oponente de forma estable.
theological_decisions:
- issue: 'Naturaleza de la armadura: posesión, provisión o procedencia'
  english_pob_reading: of God, left formally broad
  chosen_spanish_reading: de Dios, sin precisar más la relación
  alternative_spanish_readings:
  - que pertenece a Dios
  - que proviene de Dios
  - que Dios provee
  rationale: 'El genitivo griego permite más de una relación semántica. Se conserva la amplitud en español para no resolver una tensión que el texto no explicita: la armadura puede entenderse como de pertenencia, de procedencia o de provisión divina.'
  doctrine_reference: Preservar la tensión lexical; no sobreespecificar el genitivo
- issue: Referente de διάβολος en guerra espiritual
  english_pob_reading: the devil as the personal evil adversary
  chosen_spanish_reading: el diablo como adversario personal y espiritual
  alternative_spanish_readings:
  - el slanderer
  - el acusador
  rationale: El contexto inmediato de guerra espiritual en Efesios 6 favorece un referente personal. "Diablo" conserva esa lectura establecida en español bíblico sin diluirla en una descripción genérica.
  doctrine_reference: Efesios 6; afirmaciones sobre conflicto espiritual
- issue: στῆναι como resistencia firme
  english_pob_reading: to stand
  chosen_spanish_reading: mantenerse firmes
  alternative_spanish_readings:
  - estar firmes
  - resistir
  rationale: Aunque la forma básica es "estar de pie", el contexto de armadura indica sostener la posición frente al ataque. "Mantenerse firmes" recoge la fuerza contextual sin expandir el sentido más allá de lo que el pasaje requiere.
  doctrine_reference: Efesios 6:11; imagen militar de resistencia
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantienen el imperativo de equipamiento, la idea de equipo completo, la finalidad del infinitivo articular y el referente personal de διάβολος. No se registraron revisiones posteriores que alteraran la decisión base.'
  spanish_consistency_notes:
  - Se mantuvo "Dios" para θεός y "diablo" para διάβολος conforme al criterio del proyecto.
  - Se evitó "SEÑOR" porque aquí no aparece κύριος.
  - '"Mantenerse firmes" preserva la fuerza contextual de στῆναι sin introducir un adverbio no requerido.'
  - '"Armadura completa" sigue la preferencia de claridad moderna y no reemplaza una terminología eclesial tradicional sin base textual.'
