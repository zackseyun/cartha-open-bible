  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'evangelio', 'misterio' y la sintaxis general están bien. 'Palabra' en singular intenta respetar λόγος, pero en español aquí resulta menos natural que 'palabras', una alternativa ya documentada por el POB inglés ('words may be given'). 'Con denuedo' no contradice la guía, aunque 'con valentía' sería más común; no es necesario forzar el cambio.
