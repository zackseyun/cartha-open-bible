translation:
  language: es
  text: y por mí[a], para que me sean dadas palabras[b] al abrir mi boca[c], para dar a conocer con denuedo[d] el misterio del evangelio[e]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mi favor» o «por mi causa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me sea dada palabra» o «me sea dado un mensaje»; cf. el valor de λόγος como contenido verbal dado por Dios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «cuando abra mi boca».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «con confianza» o «con valentía».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «la buena noticia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ἐμοῦ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - a favor de mí
  - por mi causa
  lexicon: BDAG
  rationale: En el contexto de oración de la sección previa, ὑπέρ con genitivo expresa petición en favor de alguien. «Por mí» es breve, idiomático y conserva el sentido intercesor sin sobrecargar el español.
- source_word: δοθῇ λόγος
  english_pob_choice: words may be given / a message may be given
  chosen_spanish: me sea dada palabra
  alternatives_spanish:
  - me sean dadas palabras
  - me sea dado un mensaje
  - me sea dada la palabra
  lexicon: BDAG
  rationale: λόγος aquí no funciona como título, sino como contenido habilitado para hablar. «Palabra» permite reflejar el singular del griego y, en español, expresa de manera natural una intervención verbal oportuna sin imponer una paráfrasis más amplia.
- source_word: ἐν ἀνοίξει τοῦ στόματός μου
  english_pob_choice: in opening my mouth / when I open my mouth
  chosen_spanish: al abrir mi boca
  alternatives_spanish:
  - en la apertura de mi boca
  - cuando abra mi boca
  lexicon: BDAG
  rationale: La expresión es idiomática y señala el inicio del habla. «Al abrir mi boca» conserva la imagen semítica/griega y suena natural en español, evitando un calco pesado.
- source_word: ἐν παρρησίᾳ
  english_pob_choice: with boldness
  chosen_spanish: con denuedo
  alternatives_spanish:
  - con valentía
  - con confianza
  - con franqueza
  lexicon: BDAG
  rationale: παρρησία combina franqueza, libertad y valentía al hablar. «Denuedo» mantiene el matiz de valor confiado y es un término bíblicamente reconocible en español; no se reduce a mera confianza subjetiva.
- source_word: γνωρίσαι
  english_pob_choice: to make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - proclamar
  - manifestar
  lexicon: BDAG
  rationale: 'El infinitivo aoristo expresa finalidad: que el mensaje dado sirva para comunicar. «Dar a conocer» es el equivalente natural de «make known» y no añade un matiz de proclamación formal que el texto no exige.'
- source_word: τὸ μυστήριον
  english_pob_choice: the mystery
  chosen_spanish: el misterio
  alternatives_spanish:
  - el secreto
  lexicon: BDAG
  rationale: 'En uso paulino, μυστήριον conserva fuerza teológica: algo antes oculto y ahora revelado. «Misterio» es el término español estándar y más fiel para ese uso.'
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - de la buena noticia
  lexicon: BDAG
  rationale: «Evangelio» preserva la densidad teológica del término en Pablo y el registro eclesial común en español. «Buena noticia» es posible, pero aquí debilita la resonancia terminológica del contexto.
theological_decisions:
- issue: Relación entre la palabra dada y la valentía al hablar
  english_pob_reading: The prayer asks for divinely given speech content and fearless proclamation.
  chosen_spanish_reading: La oración pide que se le conceda palabra para hablar y que ese hablar ocurra con denuedo.
  alternative_spanish_readings:
  - que me sean dadas palabras para hablar con valentía
  - que se me dé un mensaje para proclamar con confianza
  rationale: El griego une el don de λόγος con la finalidad de γνωρίσαι. La versión española mantiene ambas partes sin convertirlas en dos peticiones separadas ni interpretar más allá del texto.
  doctrine_reference: Efesios 6:19; teoría de la traducción POB sobre correspondencia semántica y sintaxis
- issue: Sentido de παρρησία
  english_pob_reading: Rendered as 'with boldness,' preserving courageous openness.
  chosen_spanish_reading: «Con denuedo»
  alternative_spanish_readings:
  - con valentía
  - con confianza
  - con franqueza
  rationale: «Denuedo» comunica mejor la mezcla de valentía, libertad y franqueza propia de παρρησία que una simple confianza interior. Preserva el énfasis en el testimonio sin diluirlo en un tono meramente psicológico.
  doctrine_reference: Efesios 6:19; uso paulino de παρρησία
- issue: Valor de λόγος en esta petición
  english_pob_reading: Rendered as 'a message' / 'words' rather than a title or abstract doctrine.
  chosen_spanish_reading: «Palabra»
  alternative_spanish_readings:
  - palabras
  - mensaje
  - habla
  rationale: El español permite «palabra» como equivalente sobrio del singular λόγος, manteniendo el carácter concreto de lo que ha de ser dado. No se convierte en el Logos teológico ni se banaliza en un plural indiscriminado.
  doctrine_reference: Efesios 6:19; léxico paulino de λόγος
translation_notes:
  revision_awareness: 'El inglés POB pasó de «a message may be given to me when I open my mouth, so that I may make known...» a «words may be given to me in opening my mouth, to make known...», acercándose más a la sintaxis griega. La presente versión española sigue esa última lectura: mantiene el pedido de palabra, conserva la expresión idiomática del abrir la boca y vincula directamente ese don con el propósito de dar a conocer el misterio del evangelio. No adopta una paráfrasis más libre como «mensaje» para no perder el singular de λόγος ni la concisión del original.'
  spanish_consistency_notes:
  - Se usa «Dios»/«evangelio» según la terminología estándar del proyecto en lugar de variantes expansivas.
  - «Denuedo» se emplea como equivalente estable de παρρησία en un registro bíblico comprensible, coherente con una traducción formal-optativa.
  - La puntuación reproduce una sola cláusula de propósito continua, sin dividir indebidamente las relaciones sintácticas del griego.
