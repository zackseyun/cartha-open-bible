  source_alignment_summary: 'El borrador español transmite bien la estructura exhortativa del griego: rechaza el servicio meramente aparente, evita el agradar a seres humanos, afirma la identidad de pertenencia y conserva ‘haciendo la voluntad de Dios’ y ‘desde el alma’. Sin embargo, no sigue fielmente la decisión léxica/doctrinal auditada para Χριστοῦ, donde el POB inglés restauró explícitamente ‘Messiah’.'
  spanish_quality_summary: 'El español es claro y natural, pero mezcla registros: ‘os están mirando’ suena peninsular y menos neutral para un objetivo latinoamericano amplio. Además, ‘Cristo’ contradice la pauta terminológica del proyecto para Χριστός como título en este contexto. ‘Sirviendo solo cuando los miran’ o similar mejora la neutralidad.'
  glossary_alignment: Alinea bien δοῦλοι → ‘esclavos’ y ἐκ ψυχῆς → ‘desde el alma’, con nota útil. Pero incumple la preferencia del proyecto y del audit trail para Χριστοῦ → ‘Mesías’, no ‘Cristo’, en un uso titular. También conviene evitar ‘os’ por estilo meta.
  issues:
