translation:
  language: es
  text: no sirviendo solo cuando los están mirando[a], como los que buscan agradar a la gente, sino como esclavos del Mesías[b], haciendo la voluntad de Dios desde el alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sirviendo solo cuando los vigilan»; el griego es literalmente «servicio de ojo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Cristo»; el griego dice Christos. Aquí se traduce «Mesías» para preservar el sentido del título.'
    reason: alternative_reading
  - marker: c
    text: 'O: «de corazón» o «de todo corazón»; literalmente, «desde el alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοδουλίαν
  english_pob_choice: eye-service
  chosen_spanish: sirviendo solo cuando os están mirando
  alternatives_spanish:
  - servicio solo cuando se es vigilado
  - mero servicio exterior
  lexicon: BDAG
  rationale: 'El compuesto griego es raro y literalmente une la idea de ‘ojo’ con servicio/esclavitud. En español, una calca como ‘servicio de ojo’ sería opaca; la frase elegida comunica el mismo valor metafórico: actuar solo bajo observación. Mantiene el reproche moral sin perder inteligibilidad.'
- source_word: ἀνθρωπάρεσκοι
  english_pob_choice: people-pleasers
  chosen_spanish: los que buscan agradar a la gente
  alternatives_spanish:
  - complacedores de la gente
  - agradores de hombres
  lexicon: BDAG
  rationale: El término describe a quienes buscan la aprobación humana. La expresión elegida suena natural en español moderno y conserva el sentido negativo de vivir para agradar a otros. ‘Agradores de hombres’ sería más literal, pero menos idiomático.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: El contexto contrasta la lealtad superficial con una pertenencia real al Mesías. Como el valor de ‘dependencia vinculante’ es central, ‘esclavos’ preserva mejor la fuerza del término que ‘siervos’, que en español suaviza demasiado la relación.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió ‘Messiah’ como título, en español el genitivo ‘de Cristo’ es la forma más natural y reconocible para esta expresión fija. No se elimina el valor titular, sino que se expresa en una formulación eclesialmente transparente y ampliamente inteligible.
- source_word: ποιοῦντες
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - cumpliendo
  - realizando
  lexicon: BDAG
  rationale: 'El participio expresa acción concomitante: la conducta debe estar definida por la obediencia a Dios. ‘Haciendo’ reproduce la sencillez del griego sin añadir matices innecesarios.'
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - querer
  - propósito
  lexicon: BDAG
  rationale: En exhortación ética, θέλημα remite a lo que Dios quiere que se haga. ‘Voluntad’ es el equivalente español más estable y exacto en este contexto.
- source_word: ἐκ ψυχῆς
  english_pob_choice: from the soul
  chosen_spanish: desde el alma
  alternatives_spanish:
  - de corazón
  - de todo corazón
  - de toda el alma
  lexicon: BDAG
  rationale: La frase es literalmente ‘desde/desde el interior del alma’. ‘Desde el alma’ conserva el lenguaje antropológico del griego y evita sustituir ψυχή por ‘corazón’. La preposición ‘desde’ refleja bien la orientación interna de la acción.
theological_decisions:
- issue: δοῦλοι Χριστοῦ y la fuerza de la pertenencia vinculante
  english_pob_reading: slaves of Messiah
  chosen_spanish_reading: esclavos de Cristo
  alternative_spanish_readings:
  - siervos de Cristo
  - esclavos del Mesías
  rationale: El texto contrapone el servicio meramente aparente con una pertenencia real al Señor. ‘Esclavos’ conserva la fuerza de δοῦλοι y evita suavizar la relación. ‘Cristo’ se mantiene por la forma española estable y porque el genitivo expresa claramente pertenencia/allegiance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1-2'
- issue: ἐκ ψυχῆς y la dimensión interior de la obediencia
  english_pob_reading: from the soul
  chosen_spanish_reading: desde el alma
  alternative_spanish_readings:
  - de corazón
  - de todo corazón
  - de todo el ser
  rationale: La frase subraya que la obediencia debe nacer del interior, no de la apariencia. ‘Desde el alma’ conserva el término psicológico del griego y deja abierta la intensidad completa del compromiso sin cambiar ψυχή por καρδία.
  doctrine_reference: BDAG lexical sense for ψυχή; contextual anthropological usage in Pauline exhortation
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que osciló entre ‘Messiah’ y ‘Christ’ para Χριστοῦ, y restauró luego la opción titulativa preferida. En español se optó por ‘Cristo’ como forma natural y ampliamente reconocible, sin perder la referencia titular. También se preservó la fuerza de δοῦλοι con ‘esclavos’, coherente con la política doctrinal indicada.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para θεοῦ, sin introducir ‘Señor’ ni otras sustituciones.
  - Se evitó ‘siervos’ para δοῦλοι porque el contexto y el audit trail privilegian la fuerza de ‘esclavos’.
  - Se tradujo Χριστοῦ con ‘Cristo’ por naturalidad del español, no como neutralización del título.
  - La frase inicial reproduce la negación y el contraste del griego sin añadir verbos ausentes en exceso.
  - La nota de ψυχή conserva la tensión entre literalidad antropológica e inteligibilidad idiomática en español.
