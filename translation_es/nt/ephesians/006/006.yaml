    issue: Χριστοῦ se tradujo como ‘Cristo’ en vez de ‘Mesías’.
    rationale: 'El audit trail inglés documenta y restaura ‘Messiah’ por razón doctrinal y léxica: Χριστός funciona aquí como título. La política del proyecto en español indica usar normalmente ‘Mesías’ salvo carve-out documentado, que aquí no existe.'
  - severity: medium
    issue: Uso de ‘os están mirando’ en un texto objetivo de español latinoamericano neutral.
    rationale: Aunque comprensible, ‘os’ introduce un registro peninsular que desentona con la guía de estilo. Puede resolverse sin pérdida semántica con una formulación más neutra.
  - severity: low
    issue: La nota b presenta ‘Mesías’ como mera alternativa opcional.
    rationale: 'Dado que ‘Mesías’ debe ser la lectura principal, la nota debe invertirse: el texto principal debe llevar ‘Mesías’ y la nota puede mencionar ‘Cristo’ como alternativa formal/tradicional.'
