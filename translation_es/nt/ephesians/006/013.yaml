translation:
  language: es
  text: Por eso, tomen la armadura completa de Dios[a], para que puedan resistir[b] en el día malo[c] y, habiendo hecho todo[d], mantenerse firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «armadura entera». El término griego denota el equipo completo de un soldado.
    reason: lexical_alternative
  - marker: b
    text: O «hacer frente» o «oponerse».
    reason: lexical_alternative
  - marker: c
    text: La frase «el día malo» puede referirse en general a un tiempo de intensa maldad o prueba, no necesariamente solo a un evento escatológico específico.
    reason: alternative_reading
  - marker: d
    text: O «habiendo cumplido todo» o «habiendo hecho todo».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: La frase introduce una conclusión inferencial; «Por eso» preserva la relación lógica de manera natural en español sin añadir énfasis innecesario.
- source_word: ἀναλάβετε
  english_pob_choice: take up
  chosen_spanish: tomen
  alternatives_spanish:
  - tomen en mano
  - levanten
  lexicon: BDAG
  rationale: El verbo puede implicar tomar o recoger para usar. En español, «tomen» funciona bien con la imagen militar, y el complemento «la armadura completa» mantiene la idea de equiparse.
- source_word: τὴν πανοπλίαν
  english_pob_choice: full armor
  chosen_spanish: la armadura completa
  alternatives_spanish:
  - la armadura total
  - la armadura entera
  lexicon: BDAG
  rationale: πανοπλία denota el equipo completo de un soldado. «Completa» comunica esa totalidad de forma clara y natural en español.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - que pertenece a Dios
  lexicon: BDAG
  rationale: Se conserva la amplitud del genitivo sin especificar si la armadura pertenece a Dios, procede de Dios o está caracterizada por él.
- source_word: ἵνα δυνηθῆτε
  english_pob_choice: so that you may be able
  chosen_spanish: para que puedan
  alternatives_spanish:
  - a fin de que puedan
  - para que sean capaces
  lexicon: BDAG
  rationale: La cláusula de propósito se expresa de forma natural con «para que puedan», manteniendo la idea de capacidad sin sobretraducirla.
- source_word: ἀντιστῆναι
  english_pob_choice: withstand
  chosen_spanish: resistir
  alternatives_spanish:
  - hacer frente
  - oponerse
  lexicon: BDAG
  rationale: En contexto bélico, el verbo expresa oposición firme. «Resistir» comunica bien la idea de mantenerse contra el ataque y es idiomático en español.
- source_word: ἐν τῇ ἡμέρᾳ τῇ πονηρᾷ
  english_pob_choice: in the evil day
  chosen_spanish: en el día malo
  alternatives_spanish:
  - en el día de maldad
  - en el día de lo malo
  lexicon: BDAG
  rationale: «Malo» conserva la sencillez y amplitud del adjetivo griego. Se evita restringir la frase a una interpretación escatológica específica.
- source_word: ἅπαντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo lo necesario
  lexicon: BDAG
  rationale: El neutro plural tiene valor comprehensivo. «Todo» en español reproduce esa totalidad de manera breve y fuerte.
- source_word: κατεργασάμενοι
  english_pob_choice: having done
  chosen_spanish: habiendo hecho
  alternatives_spanish:
  - habiendo realizado
  - habiendo cumplido
  lexicon: BDAG
  rationale: El participio puede significar hacer, llevar a cabo o completar. «Habiendo hecho» es amplio y no fuerza un matiz de logro que el contexto no exige explícitamente.
- source_word: στῆναι
  english_pob_choice: to stand firm
  chosen_spanish: mantenerse firmes
  alternatives_spanish:
  - permanecer en pie
  - estar firmes
  lexicon: BDAG
  rationale: El verbo final retoma la imagen de sostener la posición. «Mantenerse firmes» transmite bien la fuerza exhortativa y militar del contexto en español.
theological_decisions:
- issue: Sentido de «la armadura de Dios»
  english_pob_reading: Retained as 'of God' without specifying whether the armor is God's own armor or armor supplied by God
  chosen_spanish_reading: «la armadura completa de Dios» mantiene abierta la relación del genitivo
  alternative_spanish_readings:
  - la armadura que Dios da
  - la armadura que pertenece a Dios
  rationale: El griego permite más de una relación semántica. La redacción española conserva esa amplitud en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión lexical y teológica del texto fuente.
- issue: Sentido de «el día malo»
  english_pob_reading: A time of evil or spiritual conflict, left general
  chosen_spanish_reading: «el día malo» se entiende de modo general, como tiempo de oposición intensa
  alternative_spanish_readings:
  - el día de maldad
  - un día final de prueba
  rationale: La expresión no obliga a una referencia técnica única. La traducción conserva su apertura, compatible con un tiempo de prueba o conflicto concentrado.
  doctrine_reference: Preservar la ambigüedad del texto original cuando es significativa.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente al reflejar la fuerza de στῆναι con una expresión de firmeza final («mantenerse firmes») y al conservar el tono militar de la exhortación. También respeta el estado auditado del inglés: la lectura de la armadura como equipo completo, la amplitud de «el día malo» y la doble posibilidad semántica de los cierres exhortativos.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al criterio del proyecto.
  - Se prefiere «resistir» frente a «oponerse» por naturalidad y por el paralelo con la exhortación final.
  - «Mantenerse firmes» evita perder la resonancia de «stand» y la consolida con el contexto militar.
  - Las notas mantienen las alternativas documentadas sin sobreinterpretar el pasaje.
