  text: διὰ τοῦτο ἀναλάβετε τὴν πανοπλίαν τοῦ θεοῦ, ἵνα δυνηθῆτε ἀντιστῆναι ἐν τῇ ἡμέρᾳ τῇ πονηρᾷ καὶ ἅπαντα κατεργασάμενοι στῆναι.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/006/013.yaml
  text: Therefore take up the full armor of God[a], so that you may be able to withstand in the evil day, and having done everything[d][c][b], to stand firm.
  footnotes:
  - marker: a
    text: Or 'whole armor of God.' The Greek term denotes the complete equipment of a soldier.
    reason: lexical_alternative
  - marker: b
    text: Or 'resist' or 'stand against.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the evil day' may refer generally to a time of intense evil or testing, not necessarily only to a specific end-time event.
    reason: alternative_reading
  - marker: d
    text: Or 'having accomplished everything' or 'having done all.'
    reason: lexical_alternative
