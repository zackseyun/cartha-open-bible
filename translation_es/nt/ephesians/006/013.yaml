review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: inferencia («Por eso»), mandato de tomar la panoplia, propósito («para que puedan»), resistencia en «el día malo» y resultado final de permanecer firmes. También conserva bien la amplitud de «de Dios» y la generalidad de «el día malo». Sin embargo, hay dos puntos a reparar: (1) el verbo ἀναλάβετε se acerca mejor a «tomen»/«tomen para sí» que a un matiz de mera colocación, pero en español bíblico natural «tomen la armadura completa» funciona; (2) la nota b no corresponde al ancla textual actual, porque ofrece alternativas para ἀντιστῆναι mientras está colocada sobre «habiendo hecho todo». Además, «ponerse contra» no suena natural para este contexto.'
  spanish_quality_summary: El texto es claro y legible, con registro digno y natural. «Por eso» y «mantenerse firmes» suenan bien en español eclesial amplio. No obstante, la colocación de notas al final desordena la relación entre texto y aparato, y la alternativa «ponerse contra» es poco idiomática. También conviene reducir la puntuación interna para una cadencia más limpia.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ = «Dios» está bien; no aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. «Armadura completa» preserva adecuadamente πανοπλία; «resistir» para ἀντιστῆναι es válido; «mantenerse firmes» transmite bien el valor contextual de στῆναι.'
  issues:
  - severity: medium
    issue: La nota b está anclada en la frase equivocada.
    rationale: La nota b comenta ἀντιστῆναι («resistir / hacer frente / oponerse»), pero en el borrador aparece junto a «habiendo hecho todo», lo cual rompe la trazabilidad entre fuente, traducción y nota.
  - severity: medium
    issue: La alternativa «ponerse contra» no es idiomática en español bíblico natural.
    rationale: Aunque intenta reflejar «stand against», en español amplio y digno suena forzada. «hacer frente» u «oponerse» son alternativas más naturales y fieles.
  - severity: low
    issue: La puntuación alrededor de «y, habiendo hecho todo...», puede aligerarse.
    rationale: Las comas internas no son incorrectas, pero una secuencia más fluida mejora la lectura sin alterar el sentido.
  revised_spanish_text: Por eso, tomen la armadura completa de Dios[a], para que puedan resistir[b] en el día malo[c] y, habiendo hecho todo[d], mantenerse firmes.
  revised_footnotes:
