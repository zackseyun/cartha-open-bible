    reason: lexical_alternative
  - marker: c
    text: La frase «el día malo» puede referirse en general a un tiempo de intensa maldad o prueba, no necesariamente solo a un evento escatológico específico.
    reason: alternative_reading
  - marker: d
    text: O «habiendo cumplido todo» o «habiendo hecho todo».
    reason: lexical_alternative
