translation:
  language: es
  text: Hijos[a], obedezcan a sus padres en el Señor, porque esto es justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como pertenecientes al Señor» / «en unión con el Señor». La frase puede describir la esfera o la manera de la obediencia, y también puede sugerir que esa obediencia está limitada por la lealtad al Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: Children
  chosen_spanish: Niños
  alternatives_spanish:
  - Hijos
  - Niños y niñas
  - Hijos e hijas
  lexicon: BDAG
  rationale: El vocativo plural se dirige directamente a los miembros jóvenes del hogar. En español, «niños» funciona de manera natural y directa en este contexto exhortativo. «Hijos» también es posible, pero puede sonar menos específico para el registro de instrucción doméstica.
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedezcan
  alternatives_spanish:
  - escuchen
  - se sujeten
  lexicon: BDAG
  rationale: El imperativo presente expresa obediencia activa, no solo atención auditiva. «Obedezcan» comunica bien esa fuerza en español contemporáneo.
- source_word: τοῖς γονεῦσιν
  english_pob_choice: parents
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus progenitores
  - a su padre y madre
  lexicon: BDAG
  rationale: El plural griego señala a ambos padres en conjunto. «Sus padres» es la equivalencia idiomática y precisa en español; el dativo se expresa naturalmente con «a».
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - como pertenecientes al Señor
  - en unión con el Señor
  - en el ámbito del Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina compacta sin expandirla innecesariamente. «Señor» refleja κύριος en este contexto cristológico, y la frase se deja abierta para mantener la posible referencia al ámbito, la manera o el límite de la obediencia.
- source_word: δίκαιον
  english_pob_choice: right
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - correcto
  - righteous
  lexicon: BDAG
  rationale: Aquí el adjetivo describe lo moralmente debido o apropiado. «Justo» es una opción natural en español y conserva mejor la resonancia ética que «correcto».
theological_decisions:
- issue: Alcance de «en el Señor»
  english_pob_reading: Obey your parents in the Lord, preserving interpretive openness about whether the phrase modifies the sphere, manner, or possible limit of obedience.
  chosen_spanish_reading: Obedezcan a sus padres en el Señor, manteniendo abierta la relación exacta de la frase con la obediencia.
  alternative_spanish_readings:
  - Obedezcan a sus padres, ustedes que están en el Señor
  - Obedezcan a sus padres como corresponde en el Señor
  - Obedezcan a sus padres en la esfera del Señor
  rationale: El griego sitúa ἐν κυρίῳ de manera que naturalmente acompaña al imperativo, pero sin especificar por completo su matiz. La traducción conserva la expresión sin forzar una sola interpretación, para no perder la tensión teológica documentada por el POB inglés.
  doctrine_reference: Tradición de equivalencia óptima; decisión lexical sobre κύριος → Señor
translation_notes:
  revision_awareness: El testimonio inglés más reciente no introdujo cambios y conserva un alto acuerdo con la revisión previa. Esta versión española sigue esa lectura estable, manteniendo la ambigüedad interpretativa de ἐν κυρίῳ sin expandirla más allá de lo que el griego y el POB inglés permiten.
  spanish_consistency_notes:
  - Se mantiene la fórmula «en el Señor» para κύριος, coherente con el estándar del proyecto.
  - Se usa «obedecer» con fuerza imperativa, evitando «escuchar» o «estar sujeto» por ser menos precisos aquí.
  - «Justo» traduce δίκαιον como cualidad moral apropiada, sin convertirlo en un juicio legal técnico.
  - El tratamiento de παιδιά/τέκνα como «Niños» es natural en español, aunque «Hijos» seguiría siendo una alternativa viable según el registro local.
