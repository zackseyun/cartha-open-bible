translation:
  language: es
  text: sirviendo con buena voluntad[a], como al Señor y no a los hombres,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las personas»; el griego «a los hombres» contrasta a los seres humanos con el Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ’ εὐνοίας
  english_pob_choice: with goodwill
  chosen_spanish: con buena voluntad
  alternatives_spanish:
  - con buen ánimo
  - con benevolencia
  - con voluntad dispuesta
  lexicon: BDAG
  rationale: μετά con genitivo expresa manera o disposición acompañante, y εὔνοια denota buena voluntad, benevolencia o favor. En español, «con buena voluntad» comunica de forma natural la actitud interior del siervo sin perder el matiz de disposición favorable.
- source_word: δουλεύοντες
  english_pob_choice: serving
  chosen_spanish: sirviendo
  alternatives_spanish:
  - esclavizando
  - siendo esclavos
  - prestando servicio
  lexicon: BDAG
  rationale: δουλεύω significa literalmente ‘servir como esclavo’. En este contexto de código doméstico, el pasaje ya identifica a los destinatarios como esclavos; aquí el participio enfatiza la acción de prestar servicio. «Sirviendo» conserva la fluidez del español y el trasfondo de esclavitud queda documentado en el contexto y en las notas.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - como si
  - así como
  lexicon: BDAG
  rationale: 'ὡς introduce una comparación o manera: el servicio debe rendirse como al Señor. «Como» es claro en español y no añade fuerza interpretativa que el griego no exige.'
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al Maestro
  lexicon: BDAG
  rationale: κύριος se traduce normalmente «Señor» en el marco doctrinal del POB. En Efesios, la referencia natural es al Señor exaltado Jesucristo; «Señor» preserva el título cristológico y evita confundirlo con amos humanos del contexto inmediato.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: ἄνθρωποι aquí contrasta a los seres humanos con el Señor. Se conserva «hombres» porque refleja la forma plural del griego y mantiene el contraste directo del texto fuente; además, la alternativa inclusiva puede explicitarse en nota por si se desea señalar el sentido general de ‘human beings’.
theological_decisions:
- issue: Cómo traducir κύριος en contraste con amos humanos
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: La cláusula contrasta el servicio rendido finalmente al Señor con el servicio a seres humanos. «Señor» preserva el título cristológico y la lectura doctrinal del POB, sin diluirlo en un término meramente social.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Fuerza de δουλεύοντες en un contexto de esclavitud
  english_pob_reading: serving
  chosen_spanish_reading: sirviendo
  alternative_spanish_readings:
  - sirviendo como esclavos
  - siendo esclavos
  rationale: El contexto cercano ya trata de esclavos, por lo que el participio puede verterse idiomáticamente como «sirviendo» sin borrar la realidad social. Se conserva así la transparencia léxica y la legibilidad en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος / translation philosophy on context-dependent rendering'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se documentaron cambios necesarios y la verificación cruzada mostró acuerdo alto. La redacción española sigue ese estado estable, manteniendo el contraste entre el Señor y los seres humanos y la moderación de «sirviendo» para δουλεύοντες.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al uso doctrinal del proyecto.
  - Se conserva «hombres» para ἀνθρώποις en el texto principal y se aclara su valor genérico en nota.
  - «Sirviendo» refleja el acto de δουλεύοντες sin sobrecargar el verso con una paráfrasis de la condición de esclavitud, ya establecida en el contexto inmediato.
