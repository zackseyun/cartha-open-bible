review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene «padres» para πατέρες, conserva la prohibición de provocar a los hijos, y traduce ἐκτρέφετε... ἐν παιδείᾳ καὶ νουθεσίᾳ κυρίου de manera básicamente fiel. Sin embargo, «provoquen a ira» suena poco natural en español y no comunica tan bien como el original la idea de causar enojo/resentimiento; además, la nota alternativa b no corresponde bien al orden ni al valor semántico inglés/ griego, ya que νουθεσία se acerca más a «amonestación» que a «instrucción» en la alternativa preservada.'
  spanish_quality_summary: 'La redacción es mayormente clara y eclesialmente legible, pero «Y ustedes, padres» añade énfasis no presente en el griego y suena algo discursivo. «No provoquen a ira» es comprensible pero poco idiomático; «no hagan enojar» sería demasiado interpretativo, mientras que «no provoquen a sus hijos a enojo» o «no exasperen» son más naturales. «Críenlos» funciona, aunque «críenlos»/«críenlos en la disciplina...» puede mantenerse. Las notas requieren pulido de estilo: quitar comillas sobrantes iniciales y ajustar la alternativa b.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος como «Señor» está bien en contexto paulino; πατέρες como «padres» preserva la especificidad masculina; παιδεία/νουθεσία como «disciplina e instrucción» es aceptable en texto principal. La excepción necesaria es mejorar la alternativa léxica para νουθεσία en la nota, donde «amonestación» preserva mejor el matiz correctivo documentado.'
  issues:
  - severity: medium
    issue: «provoquen a ira» es poco natural en español
    rationale: Aunque intenta calcar la fuerza causativa de παροργίζετε, la expresión suena rígida y menos idiomática que alternativas fieles como «provoquen a sus hijos a enojo». La traducción debe ser fiel y legible, no un calco innecesario.
  - severity: low
    issue: «Y ustedes, padres» añade un matiz enfático no presente
    rationale: Καὶ οἱ πατέρες se puede verter simplemente como «Y padres» o «Y ustedes, padres», pero la segunda opción introduce una marca pragmática adicional. No es grave, pero puede simplificarse.
  - severity: medium
    issue: La nota b no preserva adecuadamente la alternativa léxica del inglés
    rationale: El inglés ofrece «training and admonition of the Lord» como alternativa a «discipline and instruction». En español, la alternativa correspondiente debe reflejar παιδεία/νουθεσία como «disciplina/formación y amonestación», no repetir «instrucción» como primer elemento.
  - severity: low
    issue: La nota a tiene puntuación/comillas torpes
    rationale: Empieza con una comilla simple innecesaria antes de O:, lo que afecta la calidad editorial.
