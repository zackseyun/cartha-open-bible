translation:
  language: es
  text: Y padres[a], no provoquen a sus hijos a enojo, sino críenlos en la disciplina y la instrucción del Señor[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «exasperen a sus hijos». El verbo griego indica causar ira o resentimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «disciplina y amonestación del Señor».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «del Señor» puede entenderse como procedente del Señor, perteneciente al Señor o orientada por él.
    reason: alternative_reading
lexical_decisions:
- source_word: πατέρες
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - padres de familia
  - progenitores
  lexicon: BDAG
  rationale: El griego es masculino plural y el POB inglés lo toma específicamente como 'fathers'. En español, 'padres' es el equivalente natural y mantiene el valor masculino del vocativo sin ampliar indebidamente a un término neutro como 'progenitores'.
- source_word: παροργίζετε
  english_pob_choice: provoke ... to anger
  chosen_spanish: provoquen a ira
  alternatives_spanish:
  - irriten
  - exasperen
  - provoquen a enojo
  lexicon: BDAG
  rationale: El verbo expresa causar ira o resentimiento. 'Provoquen a ira' conserva la fuerza causativa y la relación directa con la ira, de modo más cercano al griego que un verbo más suave como 'irriten'.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  lexicon: BDAG
  rationale: τέκνα designa a los hijos en sentido familiar. En español, 'hijos' funciona de manera natural en este contexto doméstico y puede abarcar a la descendencia sin forzar una expansión interpretativa.
- source_word: ἐκτρέφετε
  english_pob_choice: bring them up
  chosen_spanish: críenlos
  alternatives_spanish:
  - críenlos y aliméntenlos
  - críenlos
  - enséñenlos
  lexicon: BDAG
  rationale: En contexto de crianza, el verbo apunta a criar o educar a los hijos. 'Críenlos' es un equivalente breve y natural en español, y preserva el sentido de formación continua mejor que una traducción puramente literal como 'nutran'.
- source_word: παιδείᾳ
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - formación
  - adiestramiento
  - enseñanza disciplinaria
  lexicon: BDAG
  rationale: παιδεία incluye formación correctiva y disciplina educativa. 'Disciplina' reproduce bien la dimensión formativa y correctiva que el POB inglés quiso preservar.
- source_word: νουθεσίᾳ
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - amonestación
  - advertencia
  - consejo
  lexicon: BDAG
  rationale: '''Instrucción'' es una solución clara y aceptable en español para νουθεσία, manteniendo la idea de enseñanza verbal correctiva. Conserva la pareja conceptual con ''disciplina'' sin volverla excesivamente técnica.'
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Jesucristo
  - de Yahvé
  - según el Señor
  lexicon: BDAG
  rationale: El genitivo puede expresar pertenencia, origen u orientación. En español, 'del Señor' mantiene esa amplitud y refleja la decisión del POB inglés de no estrechar el sentido. Se usa 'Señor' porque aquí κύριος funciona como título cristológico/teológico en la fórmula paulina.
theological_decisions:
- issue: Alcance de πατέρες en la exhortación doméstica
  english_pob_reading: The address is rendered specifically as 'fathers' rather than expanded to 'parents.'
  chosen_spanish_reading: Se mantiene 'padres' y no se expande a 'padres y madres' ni a 'progenitores'.
  alternative_spanish_readings:
  - progenitores
  - padres y madres
  rationale: El texto griego se dirige explícitamente a los varones padres. La traducción no debe generalizar el destinatario más allá del original, aunque la aplicación ética pueda extenderse en la enseñanza.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Original-language primacy over translation tradition'
- issue: Sentido de ἐν παιδείᾳ καὶ νουθεσίᾳ κυρίου
  english_pob_reading: The genitive is left as 'of the Lord' rather than interpreted more narrowly.
  chosen_spanish_reading: Se traduce 'la disciplina y la instrucción del Señor', sin precisar si procede del Señor, pertenece al Señor o está orientada al Señor.
  alternative_spanish_readings:
  - la disciplina y la instrucción provenientes del Señor
  - la disciplina y la instrucción acerca del Señor
  - la disciplina y la instrucción conforme al Señor
  rationale: La frase griega mantiene una ambigüedad real. El español 'del Señor' preserva esa amplitud semántica y evita resolver una tensión que el texto no resuelve por sí mismo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; κύριος default rendering ''Lord'''
translation_notes:
  revision_awareness: El texto coincide con la revisión más reciente indicada como sin cambios; no se detectan ajustes pendientes respecto del audit trail en inglés. Se mantuvo la equivalencia óptima con atención a la precisión léxica y a la ambigüedad teológica de κύριος.
  spanish_consistency_notes:
  - Se preserva el destinatario masculino plural con 'padres', en paralelo al inglés POB.
  - '''Señor'' se usa de forma consistente para κύριος, manteniendo la apertura semántica del genitivo.'
  - La pareja 'disciplina e instrucción' refleja la coordinación del griego y la decisión inglesa de distinguir παιδεία de νουθεσία.
  - El registro es bíblico pero contemporáneo, evitando calcos innecesarios sin perder el tono exhortativo.
