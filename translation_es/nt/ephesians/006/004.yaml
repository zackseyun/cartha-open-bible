- from: Y ustedes, padres[a], no provoquen a ira a sus hijos, sino críenlos en la disciplina y la instrucción del Señor[b][c].
  to: Y padres[a], no provoquen a sus hijos a enojo, sino críenlos en la disciplina y la instrucción del Señor[b][c].
  rationale: Se suaviza un calco poco idiomático («a ira») sin perder la fuerza causativa del griego, se simplifica la apertura para mayor naturalidad, y se corrige la nota alternativa para reflejar mejor la decisión léxica documentada sobre νουθεσία/«amonestación».
