translation:
  language: es
  text: La gracia sea con todos los que aman a nuestro Señor Jesús Mesías con incorrupción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con amor incorruptible»; o «en sinceridad»; o «con amor imperecedero». La expresión griega «con incorrupción» es concisa y ambigua.'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - La gracia sea
  - Gracia
  lexicon: BDAG
  rationale: En una bendición paulina, χάρις funciona como deseo o saludo benéfico. En español, 'La gracia sea' conserva el carácter de bendición verbal y la naturalidad litúrgica sin convertirlo en una paráfrasis.
- source_word: μετὰ πάντων
  english_pob_choice: be with all
  chosen_spanish: con todos
  alternatives_spanish:
  - sea con todos
  - esté con todos
  lexicon: BDAG
  rationale: El griego es nominal y el español requiere una construcción verbal implícita o explícita. 'Con todos' preserva la relación de compañía/asociación de μετά con genitivo; la forma completa queda entendida por el giro benedictivo.
- source_word: ἀγαπώντων
  english_pob_choice: who love
  chosen_spanish: los que aman
  alternatives_spanish:
  - quienes aman
  - los que están amando
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa una característica continua. 'Los que aman' transmite bien ese rasgo en español y evita una literalidad forzada.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: '''Señor'' es el equivalente establecido para κύριος en este contexto cristológico y conserva el valor confesional del título.'
- source_word: Ἰησοῦν Χριστὸν
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se conserva 'Mesías' conforme a la preferencia del proyecto para Χριστός como título. En español, 'Jesús Mesías' es comprensible y mantiene el matiz titular sin reemplazarlo por el nombre-forma tradicional.
- source_word: ἐν ἀφθαρσίᾳ
  english_pob_choice: with incorruptibility
  chosen_spanish: en incorrupción
  alternatives_spanish:
  - con incorrupción
  - en sinceridad
  - con amor incorruptible
  - con amor imperecedero
  lexicon: BDAG
  rationale: La frase griega es breve y ambigua; 'en incorrupción' preserva la forma y la tensión semántica. Aunque suena menos idiomático, mantiene abierta la posibilidad de que califique la esfera, la cualidad o el modo del amor, sin resolver interpretativamente el texto.
theological_decisions:
- issue: Interpretación de ἐν ἀφθαρσίᾳ
  english_pob_reading: Retain the more literal and ambiguous 'in incorruptibility' in the main text
  chosen_spanish_reading: Mantener 'en incorrupción' en el texto principal
  alternative_spanish_readings:
  - con amor incorruptible
  - en sinceridad
  - con amor imperecedero
  rationale: El griego no determina con claridad si ἀφθαρσία describe el amor de los creyentes, la cualidad de su lealtad, o el ámbito/modo de la bendición. La traducción principal conserva esa ambigüedad para no cerrar una tensión real del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue el último estado revisado del POB en cuanto a la preferencia por 'Mesías' para Χριστός y la decisión de mantener una expresión formalmente transparente para ἐν ἀφθαρσίᾳ. A diferencia del inglés, el español opta por 'en incorrupción' para conservar más de cerca la construcción preposicional griega y su ambigüedad.
  spanish_consistency_notes:
  - Se usó 'Mesías' en lugar de 'Cristo' conforme a la política del proyecto para Χριστός como título.
  - '''Señor'' se mantiene para κύριος por coherencia cristológica.'
  - '''Incorrupción'' se eligió por transparencia formal; la nota recoge alternativas más idiomáticas en español.'
  - La frase inicial funciona como bendición breve y no requiere verbo explícito en el registro español de este versículo.
