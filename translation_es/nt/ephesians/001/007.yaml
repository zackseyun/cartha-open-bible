translation:
  language: es
  text: En él tenemos redención por su sangre[a], el perdón de las ofensas[b], conforme a las riquezas de su gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en quien».
    reason: lexical_alternative
  - marker: b
    text: O «transgresiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - En quien
  lexicon: BDAG
  rationale: El relativo remite a Cristo del versículo anterior. «En él» conserva la idea de unión con Cristo de manera natural en español; «en quien» es posible, pero suena más formal y menos idiomático aquí.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: El presente indica una realidad actual. «Tenemos» comunica directamente esa posesión/reality; «poseemos» es más marcado y menos natural en este contexto.
- source_word: ἀπολύτρωσιν
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» preserva el peso paulino y la idea de liberación costosa. «Liberación» o «rescate» atenúan o desplazan el matiz teológico y lexical.
- source_word: διὰ τοῦ αἵματος αὐτοῦ
  english_pob_choice: through his blood
  chosen_spanish: por su sangre
  alternatives_spanish:
  - mediante su sangre
  - a través de su sangre
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por su sangre» es literal y claro en español; mantiene la imaginería sacrificial sin interpretar como «muerte».
- source_word: ἄφεσιν
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - remisión
  - indulto
  lexicon: BDAG
  rationale: Aquí ἄφεσις explica la redención como perdón/remisión de ofensas. «Perdón» es la opción más transparente y bíblicamente reconocible en español; «remisión» sería más técnico.
- source_word: παραπτωμάτων
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - ofensas
  - faltas
  lexicon: BDAG
  rationale: παράπτωμα denota una caída, ofensa o transgresión. «Transgresiones» conserva mejor la fuerza moral y legal que «faltas»; «ofensas» es posible, pero menos preciso.
- source_word: κατὰ τὸ πλοῦτος
  english_pob_choice: according to the riches
  chosen_spanish: conforme a las riquezas
  alternatives_spanish:
  - según las riquezas
  - de acuerdo con las riquezas
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o medida. «Conforme a» comunica bien la abundancia medida por las riquezas de Dios; «según» también es viable, pero menos solemne.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el término teológico estándar y semánticamente adecuado en Pablo. «Favor» aclararía el sentido, pero debilitaría la terminología paulina.
theological_decisions:
- issue: Relación entre «redención» y «el perdón de las transgresiones»
  english_pob_reading: 'Rendered appositionally: ''redemption ... the forgiveness of trespasses'''
  chosen_spanish_reading: «redención ... el perdón de las transgresiones» en aposición implícita
  alternative_spanish_readings:
  - «redención, es decir, el perdón de las transgresiones»
  rationale: El segundo sintagma nominal aclara el primero y funciona naturalmente como aposición. Mantener la estructura sin añadir «es decir» evita explicitar más de lo que el griego dice, pero conserva la relación conceptual.
  doctrine_reference: Preservar la tensión y la estructura del texto fuente; no paraphrasear más allá de lo que el original garantiza.
- issue: Lenguaje de expiación en «por su sangre»
  english_pob_reading: Retained the concrete phrase 'through his blood'
  chosen_spanish_reading: Se conserva la imagen concreta «por su sangre»
  alternative_spanish_readings:
  - «por su muerte»
  - «por su muerte sacrificial»
  rationale: El texto griego dice «sangre», una expresión sacrificial y de pacto. Sustituirla por «muerte» interpretaría el versículo y atenuaría su imaginería cultual.
  doctrine_reference: Primacía del original sobre la tradición de traducción; no suavizar la imagen sacrificial.
translation_notes:
  revision_awareness: La versión sigue de cerca el acuerdo alto del audit trail inglés y no introduce revisiones adicionales; mantiene la estructura de aposición entre «redención» y «perdón», y conserva la referencia concreta a la sangre.
  spanish_consistency_notes:
  - Se usa «redención» para ἀπολύτρωσις, en línea con la terminología paulina.
  - Se mantiene «gracia» para χάρις sin reemplazarlo por «favor».
  - Se prefiere «transgresiones» para παραπτώματα por precisión y resonancia bíblica.
  - «Por su sangre» conserva el medio sacrificial explícito del texto griego.
  - La puntuación refleja la relación explicativa entre los dos sustantivos acusativos.
