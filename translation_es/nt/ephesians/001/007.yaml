  source_alignment_summary: 'El borrador sigue de cerca el griego en la estructura principal: «En él tenemos redención por su sangre … conforme a las riquezas de su gracia» preserva bien ἐν ᾧ, ἔχομεν, ἀπολύτρωσιν, διὰ τοῦ αἵματος αὐτοῦ y κατὰ τὸ πλοῦτος τῆς χάριτος αὐτοῦ. También mantiene correctamente la aposición entre «redención» y «el perdón …». El único desajuste significativo frente al rastro POB en inglés es παραπτωμάτων: el inglés escogió «trespasses» con nota alternativa «transgressions», mientras que el español puso «transgresiones» en el texto y repitió la misma palabra como alternativa en la nota, lo que pierde la distinción auditada.'
