  glossary_alignment: 'No hay conflicto con la terminología marco del proyecto: no aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «Gracia», «redención», «sangre» y «perdón» están bien alineados. La corrección necesaria es interna a la decisión léxica de παραπτώματα y a la coherencia de la nota alternativa.'
