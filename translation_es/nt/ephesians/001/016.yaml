translation:
  language: es
  text: No ceso de dar gracias por ustedes[a], haciendo mención de ustedes en mis oraciones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recordándolos en mis oraciones». El giro griego es literalmente «haciendo mención [de ustedes] en mis oraciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ παύομαι
  english_pob_choice: I do not cease
  chosen_spanish: No ceso
  alternatives_spanish:
  - No dejo de
  - No paro de
  lexicon: BDAG
  rationale: El presente con οὐ expresa continuidad en la negación; «no ceso» conserva mejor el tono formal y paulino que una fórmula más coloquial. «No dejo de» sería natural, pero menos transparente como correspondencia del verbo de cese.
- source_word: εὐχαριστῶν
  english_pob_choice: giving thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - agradeciendo
  - dando gracias
  lexicon: BDAG
  rationale: El participio expresa acción concomitante con «cesar». «Dar gracias» es la forma más natural y estable en español para preservar el sentido explícito de thanksgiving sin volverlo interpretativo.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en favor de ustedes
  - por ustedes mismos
  lexicon: BDAG
  rationale: En este contexto de gratitud, ὑπέρ con genitivo indica la referencia de la acción de gracias; «por ustedes» comunica bien esa dirección en español. Se evita «a favor de» por sonar más explicativo que el griego.
- source_word: μνείαν ποιούμενος
  english_pob_choice: making mention of you
  chosen_spanish: haciendo mención de ustedes
  alternatives_spanish:
  - recordándolos
  - mencionándolos
  lexicon: BDAG
  rationale: La construcción es idiomática y literalmente significa «hacer mención». «Haciendo mención de ustedes» mantiene la transparencia formal y evita sustituir el giro por «recordándolos», que aunque posible en inglés, no es la forma más directa del griego.
- source_word: ἐπὶ τῶν προσευχῶν μου
  english_pob_choice: in my prayers
  chosen_spanish: en mis oraciones
  alternatives_spanish:
  - durante mis oraciones
  - cuando oro
  lexicon: BDAG
  rationale: La frase preposicional señala el ámbito o la ocasión de la mención. «En mis oraciones» es la equivalencia natural en español y conserva el marco oracional sin sobreexplicarlo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se registraron revisiones aplicadas. La versión española mantiene esa estabilidad, con una equivalencia formal-optimal que conserva el paralelismo y la idiomaticidad.
  spanish_consistency_notes:
  - Se mantiene «oraciones» en plural para corresponder con τῶν προσευχῶν.
  - Se conserva la referencia explícita a los destinatarios con «ustedes», en lugar de omitir el objeto implícito.
  - Se usa un registro neutral y eclesialmente legible, sin recurrir a arcaísmos como «vosotros» o «hago memoria».
