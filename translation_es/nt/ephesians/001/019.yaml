review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido general del griego: «y cuál es», «grandeza», «su poder», «hacia nosotros», «los que creemos», y «conforme a» siguen fielmente el original y el rastro de auditoría en inglés. También preserva correctamente la nota alternativa sobre εἰς ἡμᾶς. Sin embargo, dos elecciones léxicas debilitan la fidelidad estilística al original y al POB inglés: «sobresaliente» para ὑπερβάλλον suena menos natural en esta construcción que una forma comparativa como «extraordinaria» o «que sobrepasa», y «operación» para ἐνέργεια en español tiene connotación técnica o mecánica más marcada que la inglesa «working».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «la sobresaliente grandeza» suena poco idiomática en español bíblico moderno, y «la operación del poderío de su fuerza» resulta más rígido de lo necesario. Una leve revisión puede mejorar naturalidad sin perder la acumulación retórica de términos de poder. «La extraordinaria grandeza» y «la acción eficaz» leen mejor y mantienen el énfasis paulino.
  glossary_alignment: No hay conflicto con los términos doctrinales globales del proyecto. La cadena δύναμις / ἐνέργεια / κράτος / ἰσχύς debe seguir diferenciada en español. «Poder ... acción eficaz ... poderío ... fuerza» preserva mejor la distinción que «operación».
  issues:
  - severity: medium
    issue: «sobresaliente» para ὑπερβάλλον en «la sobresaliente grandeza»
    rationale: Aunque semánticamente posible, la combinación suena poco natural en español y no transmite tan bien el matiz de superación/exceso del participio adjetival. Una opción como «extraordinaria» mejora la fluidez y conserva el énfasis sin exagerar a «inconmensurable».
  - severity: medium
    issue: «operación» para ἐνέργεια
    rationale: En español general y eclesial, «operación» puede sonar técnica, mecánica o incluso médica. El contexto pide actividad eficaz divina; «acción eficaz» o «obrar» comunican mejor ese sentido y mantienen la distinción de la cadena léxica.
  revised_spanish_text: y cuál es la extraordinaria grandeza de su poder hacia nosotros, los que creemos[a], conforme a la acción eficaz del poderío de su fuerza
  revised_footnotes:
  - marker: a
    text: O «en nosotros, los que creemos». El griego dice «hacia nosotros», pero algunas traducciones lo vierten de manera más interpretativa como el poder de Dios obrando dentro de los creyentes.
    reason: alternative_reading
  revision_rationale: 'Se ajustan dos expresiones para mejorar la naturalidad y reflejar mejor el matiz del griego y la filosofía del POB: «extraordinaria» sustituye a «sobresaliente» en una construcción más idiomática para ὑπερβάλλον μέγεθος, y «acción eficaz» expresa mejor ἐνέργεια que «operación» en español eclesial actual. Se conserva «hacia nosotros» con su nota alternativa, así como la cadena retórica de términos de poder.'
