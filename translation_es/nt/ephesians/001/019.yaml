translation:
  language: es
  text: y cuál es la extraordinaria grandeza de su poder hacia nosotros, los que creemos[a], conforme a la acción eficaz del poderío de su fuerza
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nosotros, los que creemos». El griego dice «hacia nosotros», pero algunas traducciones lo vierten de manera más interpretativa como el poder de Dios obrando dentro de los creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερβάλλον
  english_pob_choice: surpassing
  chosen_spanish: sobresaliente
  alternatives_spanish:
  - que sobrepasa
  - extraordinaria
  - excedente
  lexicon: BDAG
  rationale: El participio se usa adjetivalmente con μέγεθος. «Sobresaliente» conserva la idea de excelencia/superación sin volver más absoluto el término que «inconmensurable» o una paráfrasis más fuerte.
- source_word: μέγεθος
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnitud
  lexicon: BDAG
  rationale: «Grandeza» es natural en español y corresponde bien al sustantivo abstracto del original. «Magnitud» sería posible, pero suena más técnico.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: En Pablo, δύναμις suele expresar poder eficaz. «Poder» es la opción más clara y natural en español, y permite distinguirlo del siguiente grupo léxico.
- source_word: εἰς ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - para nosotros
  - en nosotros
  lexicon: BDAG
  rationale: εἰς con personas expresa dirección/aplicación. «Hacia nosotros» preserva mejor esa orientación que «en nosotros», que sería una interpretación más específica de la frase.
- source_word: τοὺς πιστεύοντας
  english_pob_choice: who believe
  chosen_spanish: los que creemos
  alternatives_spanish:
  - los creyentes
  - los que están creyendo
  lexicon: BDAG
  rationale: El participio presente funciona sustantivamente. «Los que creemos» mantiene el valor verbal y encaja de forma fluida en español; «los creyentes» nominaliza más la forma verbal.
- source_word: κατά
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: «Conforme a» expresa bien la idea de correspondencia/medida del griego sin sonar mecánico.
- source_word: ἐνέργεια
  english_pob_choice: working
  chosen_spanish: operación
  alternatives_spanish:
  - funcionamiento
  - actividad
  lexicon: BDAG
  rationale: En esta cadena de términos de poder, «operación» comunica la actividad eficaz del poder divino y conserva una relación distinguible con los sustantivos cercanos.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: poderío
  alternatives_spanish:
  - dominio
  - mando
  lexicon: BDAG
  rationale: κράτος aquí denota fuerza manifestada, vigor dominante. «Poderío» transmite esa idea con fuerza expresiva sin confundirse con δύναμις.
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - fortaleza
  lexicon: BDAG
  rationale: ἰσχύς denota fuerza o capacidad inherente. «Fuerza» es el equivalente más natural y mantiene el cierre del encadenamiento de términos.
- source_word: καὶ τί
  english_pob_choice: and what is
  chosen_spanish: y cuál es
  alternatives_spanish:
  - y qué es
  - y cuál
  lexicon: BDAG
  rationale: Se sobreentiende el verbo en el contexto. «Y cuál es» da una oración natural en español y conserva la estructura interrogativa del griego.
theological_decisions:
- issue: Cadena de términos de poder (δύναμις / ἐνέργεια / κράτος / ἰσχύς)
  english_pob_reading: 'Preserve the rhetorical accumulation with distinct but related English terms: ''power ... working ... might ... strength.'''
  chosen_spanish_reading: 'Conservar la acumulación retórica con términos distintos pero emparentados: «poder ... operación ... poderío ... fuerza».'
  alternative_spanish_readings:
  - Reducir la cadena a «el gran poder de Dios»
  - Fundir los términos en una sola expresión más libre
  rationale: Pablo apila términos cercanos para intensificar el énfasis. En español conviene mantenerlos diferenciados para no perder la retórica ni borrar matices léxicos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Dirección de εἰς ἡμᾶς
  english_pob_reading: '''toward us who believe'''
  chosen_spanish_reading: «hacia nosotros, los que creemos»
  alternative_spanish_readings:
  - «en nosotros, los que creemos»
  - «para nosotros, los que creemos»
  rationale: La preposición griega expresa dirección/aplicación. «Hacia nosotros» conserva el valor direccional sin especificar indebidamente si la acción se enfatiza como interna o meramente beneficiosa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y no hay revisiones aplicadas adicionales. Esta versión sigue de cerca el griego y conserva la acumulación de términos de poder, con la única nota explicativa sobre εἰς ἡμᾶς.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto inmediato, sin añadirlo al texto.
  - Se evita «Cristo» porque este versículo no lo contiene.
  - «Creemos» conserva el valor verbal del participio presente mejor que una nominalización simple.
  - «Poderío» y «fuerza» se distinguen para reproducir el encadenamiento κράτος / ἰσχύς.
