- from: y cuál es la sobresaliente grandeza de su poder hacia nosotros, los que creemos[a], conforme a la operación del poderío de su fuerza
  to: y cuál es la extraordinaria grandeza de su poder hacia nosotros, los que creemos[a], conforme a la acción eficaz del poderío de su fuerza
  rationale: 'Se ajustan dos expresiones para mejorar la naturalidad y reflejar mejor el matiz del griego y la filosofía del POB: «extraordinaria» sustituye a «sobresaliente» en una construcción más idiomática para ὑπερβάλλον μέγεθος, y «acción eficaz» expresa mejor ἐνέργεια que «operación» en español eclesial actual. Se conserva «hacia nosotros» con su nota alternativa, así como la cadena retórica de términos de poder.'
