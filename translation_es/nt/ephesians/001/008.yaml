translation:
  language: es
  text: que derramó abundantemente sobre nosotros en toda sabiduría y discernimiento[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con la cual hizo abundar hacia nosotros».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «en toda sabiduría y discernimiento» puede referirse al modo en que Dios derramó abundantemente su gracia o a la sabiduría y el discernimiento asociados con lo dado a los creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: ἧς
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - de la cual
  lexicon: BDAG
  rationale: El relativo femenino singular debe referirse a «las riquezas de su gracia» del v. 7. En español, «la cual» mantiene con claridad esa referencia y conserva el enlace sintáctico sin volver la frase ambigua.
- source_word: ἐπερίσσευσεν
  english_pob_choice: lavished
  chosen_spanish: hizo sobreabundar
  alternatives_spanish:
  - derramó abundantemente
  - la prodigó
  - abundó
  lexicon: BDAG
  rationale: El verbo griego tiene fuerza causativa de superabundancia. «Hizo sobreabundar» conserva esa acción causativa y la imagen de abundancia excesiva mejor que un simple «abundó».
- source_word: εἰς ἡμᾶς
  english_pob_choice: on us
  chosen_spanish: para con nosotros
  alternatives_spanish:
  - sobre nosotros
  - en nosotros
  - hacia nosotros
  lexicon: BDAG
  rationale: La preposición con persona expresa dirección hacia los beneficiarios. «Para con nosotros» comunica bien la orientación del acto en español bíblico contemporáneo sin sugerir un sentido espacial impropio.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - con
  lexicon: BDAG
  rationale: Se conserva la preposición abierta del griego. «En» permite dejar sin resolver si la frase expresa esfera o modo, como en el texto fuente.
- source_word: πάσῃ
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda clase de
  - plena
  lexicon: BDAG
  rationale: Con sustantivos abstractos singulares, el sentido es de plenitud o totalidad. «Toda» suena natural en español y preserva la amplitud de la expresión.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sabio entendimiento
  lexicon: BDAG
  rationale: Es el equivalente directo y más transparente para σοφία. Mantiene el paralelismo con φρόνησις sin introducir matices ajenos.
- source_word: φρονήσει
  english_pob_choice: insight
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - prudencia
  - comprensión
  lexicon: BDAG
  rationale: φρόνησις puede aludir a discernimiento práctico, comprensión o prudencia. «Entendimiento» diferencia el término de «sabiduría» y resulta natural en español; a la vez deja espacio para el matiz de discernimiento sin resolverlo excesivamente.
theological_decisions:
- issue: Relación entre «en toda sabiduría e entendimiento» y el acto de Dios
  english_pob_reading: The phrase is left syntactically open in English, without explicitly assigning wisdom and insight either to God as the manner of lavishing grace or to believers as what accompanies the gift.
  chosen_spanish_reading: 'La frase se deja igualmente abierta: puede leerse como el modo en que Dios hizo sobreabundar su gracia o como la sabiduría y el entendimiento que acompañan lo concedido a los creyentes.'
  alternative_spanish_readings:
  - describe la sabiduría y el entendimiento de Dios al hacer sobreabundar la gracia
  - describe la sabiduría y el entendimiento dados a los creyentes junto con la gracia
  rationale: La construcción griega permite ambas relaciones, y el texto no obliga a decidir entre ellas. La traducción conserva esa tensión en lugar de resolverla de manera dogmática o interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica cuando la ambigüedad es genuina.'
translation_notes:
  revision_awareness: 'Concordamos con el audit trail inglés: se conserva la fuerza causativa de περισσεύω, se mantiene abierta la relación de la frase final y se evita forzar una solución interpretativa donde el griego sigue siendo ambivalente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino explícito.
  - «sabiduría» y «entendimiento» se emplean como par diferenciado para reproducir σοφία y φρόνησις sin homogeneizarlos.
  - La nota a distingue una alternativa verbal posible; la nota b preserva la ambigüedad teológica del sintagma final.
