translation:
  language: es
  text: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor Jesús el Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo». El griego Χριστός puede funcionar como título («Mesías») o, en ciertos contextos, como forma ya fijada semejante a un nombre propio («Cristo»). También: «el Señor Jesús Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  - gracia
  lexicon: BDAG
  rationale: En el saludo paulino, χάρις funciona como fórmula de bendición con peso teológico. «Gracia» conserva ese valor sin suavizarlo a «favor», que en español perdería la resonancia doctrinal.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo en esta salutación se expresa naturalmente en español con «a ustedes». Mantiene el destinatario plural sin regionalismos marcados.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz interior
  - shalom
  lexicon: BDAG
  rationale: «Paz» es la equivalencia directa y suficiente. En este contexto conserva la amplitud bíblica del saludo sin añadir glosa interpretativa.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - procedente de
  lexicon: BDAG
  rationale: Aunque «de» sería literal, «de parte de» comunica mejor el origen personal de la bendición en un saludo epistolar español, sin alterar el sentido de procedencia.
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios y Padre nuestro
  - nuestro Dios y Padre
  lexicon: BDAG
  rationale: La secuencia griega se entiende naturalmente como aposición. «Dios nuestro Padre» evita introducir una conjunción que no está en el texto y sigue la lectura auditada del POB inglés.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente cristológico normal para κύριος y preserva el título reverencial sin desplazar el nombre de Jesús.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» conforme a la pauta del proyecto de traducir títulos. En español, la construcción «el Señor Jesús Mesías» resulta menos natural que el apostólico «el Señor Jesús Mesías»; se mantiene la tensión entre nombre y título sin sustituirla por la forma litúrgica fija «Jesucristo».
theological_decisions:
- issue: Renderización de Χριστοῦ en la fórmula Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah, with footnote noting the alternative Jesus Christ / the Lord Jesus the Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús el Mesías
  rationale: Se sigue la política del POB de traducir el título Χριστός por «Mesías» cuando funciona claramente como título. La nota preserva la alternativa tradicional «Cristo» y la posible lectura apuestal «Jesús el Mesías» sin borrar la tensión del original.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una oscilación entre «Jesus Messiah» y «Jesus Christ», con una corrección final que restableció «Messiah» por política doctrinal. La versión española toma esa decisión como base y la expresa de forma transparente con «Jesús Mesías», manteniendo la posibilidad tradicional en nota sin depender mecánicamente de la última redacción inglesa.
  spanish_consistency_notes:
  - Se mantiene «Dios» y «Señor» como títulos teológicos estándar en español, en línea con el griego θεοῦ y κυρίου.
  - No se usa «SEÑOR» como máscara tipográfica; el nombre divino no aparece explícitamente en este versículo.
  - La fórmula de saludo se conserva breve y epistolar, sin introducir artículos o conectores ausentes en el griego.
  - «Mesías» se usa para Χριστός conforme a la terminología del proyecto; no se reemplaza por «Cristo» en el texto principal.
