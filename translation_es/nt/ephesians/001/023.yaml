translation:
  language: es
  text: la cual es su cuerpo, la plenitud del que llena[a] todas las cosas en todo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del que es llenado»; el participio griego admite también una lectura pasiva, aunque aquí suele entenderse en sentido activo.'
    reason: alternative_reading
  - marker: b
    text: 'O, más literalmente: «la plenitud del que llena todo en todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - la que
  lexicon: ὅστις / ἥτις
  rationale: El relativo femenino singular concuerda con «iglesia» en el contexto inmediato. «La cual» suena natural en español y conserva mejor el valor relativo específico que un simple «que».
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  - cuerpo espiritual
  lexicon: σῶμα
  rationale: «Cuerpo» es el equivalente directo y mantiene la metáfora paulina establecida en el contexto de la iglesia y el Mesías.
- source_word: πλήρωμα
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - plenitud
  - llenura
  - completitud
  lexicon: πλήρωμα
  rationale: «Plenitud» conserva la densidad semántica del término sin resolver de antemano si se trata de llenura, totalidad o complemento; mantiene visible la tensión teológica del pasaje.
- source_word: τοῦ ... πληρουμένου
  english_pob_choice: of the one who fills
  chosen_spanish: del que llena
  alternatives_spanish:
  - del que llena
  - del que es llenado
  lexicon: πληρόω
  rationale: El participio admite una lectura activa o pasiva. En este contexto, la lectura activa es la más natural y está en línea con el auditable inglés POB; el español conserva la alternativa pasiva en la nota.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todas las cosas
  - todo
  lexicon: πᾶς
  rationale: «Todas las cosas» expresa mejor el plural neutro totalizador y evita reducir la referencia a personas solamente.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo
  - en todos
  - de todos modos
  lexicon: ἐν + πᾶς
  rationale: «En todo» refleja la ambigüedad formal de ἐν πᾶσιν y preserva la amplitud del griego sin imponer de entrada una paráfrasis más interpretativa.
theological_decisions:
- issue: Relación entre la iglesia, el cuerpo de Mesías y la «plenitud»
  english_pob_reading: The church is Christ's body and 'the fullness,' while the phrase is left open as to whether the church is filled by him or somehow completes the body metaphor.
  chosen_spanish_reading: La iglesia es su cuerpo y, a la vez, «la plenitud», sin especificar más si se trata de lo que él llena o de lo que de algún modo completa la imagen.
  alternative_spanish_readings:
  - la iglesia como aquello que es llenado por él
  - la iglesia como complemento o completación de él
  rationale: La traducción preserva la ambigüedad real del sustantivo πλήρωμα en vez de cerrarla con una explicación doctrinal que el texto no impone.
  doctrine_reference: Translation philosophy §3
- issue: Valor de la forma verbal πληρουμένου
  english_pob_reading: 'Rendered with active sense: ''the one who fills all things in all.'''
  chosen_spanish_reading: 'Se traduce con sentido activo: «el que llena todas las cosas en todo».'
  alternative_spanish_readings:
  - el que es llenado en todas las cosas por todos
  - el que llena todas las cosas en todas
  rationale: Aunque la forma griega es morfológicamente media/pasiva, el contexto favorece una lectura activa. La nota preserva la alternativa pasiva para no borrar la tensión documentada.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del contexto inglés, que prefirió mantener la ambigüedad formal de ἐν πᾶσιν con «in all». En español se reflejó con «en todo», evitando una paráfrasis como «en todas maneras» o «en todo sentido».
  spanish_consistency_notes:
  - Se mantuvo «cuerpo» para σῶμα y «plenitud» para πλήρωμα, coherentes con la terminología paulina del proyecto.
  - Se evitó «Cristo» porque el texto griego aquí no usa Χριστός como nombre-título; se conservó una formulación referida por pronombre según el contexto.
  - Se usó «Yahvé» solo cuando corresponda a יהוה; este versículo no lo requiere.
