translation:
  language: es
  text: que es el anticipo[a] de nuestra herencia, para la redención de la posesión[b], para alabanza de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «garantía», «depósito» o «primer pago». El término griego designa un pago inicial que asegura que seguirá el resto.
    reason: lexical_alternative
  - marker: b
    text: O «la posesión adquirida», posiblemente refiriéndose al pueblo de Dios como su posesión.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅ
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: BDAG
  rationale: En español, el relativo neutro/personal en esta cláusula se expresa de forma natural con «que». Mantiene la referencia al Espíritu Santo del contexto inmediato sin forzar un pronombre personal donde el español resultaría menos idiomático.
- source_word: ἀρραβών
  english_pob_choice: down payment
  chosen_spanish: garantía
  alternatives_spanish:
  - anticipo
  - arras
  - depósito
  - primer pago
  lexicon: BDAG
  rationale: «Garantía» conserva la idea central de una prenda inicial que asegura la consumación futura. En español suena más natural que un calco comercial y permite mantener la fuerza teológica del término. La metáfora económica queda representada por las alternativas, pero la forma principal evita dureza innecesaria.
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  lexicon: BDAG
  rationale: «Herencia» es el equivalente más claro y corriente en español para el sentido paulino de κληρονομία, conservando el trasfondo de promesa y recepción futura.
- source_word: ἀπολύτρωσις
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» es el término bíblico estándar en español y preserva el sentido de liberación decisiva mediante un acto de pago o rescate.
- source_word: περιποίησις
  english_pob_choice: possession
  chosen_spanish: posesión
  alternatives_spanish:
  - posesión adquirida
  - pueblo adquirido
  - posesión propia
  lexicon: BDAG
  rationale: «Posesión» mantiene la concisión del griego y deja abierta la relación exacta del genitivo, como hace el texto fuente. Así no se resuelve de antemano si se trata de la posesión adquirida, del pueblo como posesión propia o del objeto de adquisición.
- source_word: ἔπαινος
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - elogio
  lexicon: BDAG
  rationale: «Alabanza» expresa con naturalidad el valor doxológico del término en la cadena de propósito de Efesios 1.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es la equivalencia más estable y teológicamente cargada en este contexto doxológico, y conserva la resonancia bíblica esperada en español.
theological_decisions:
- issue: Referencia del relativo inicial ὅ
  english_pob_reading: The pronoun refers to the Holy Spirit mentioned in the previous verse, rendered personally as 'who.'
  chosen_spanish_reading: El relativo se traduce de manera neutra con «que», remitiendo al Espíritu Santo del contexto inmediato.
  alternative_spanish_readings:
  - quien
  - el cual
  rationale: Aunque el antecedente es personal, el español permite una referencia natural con «que» sin perder la conexión con el Espíritu. Esto evita una personalización forzada y conserva la claridad del flujo oracional.
  doctrine_reference: Efesios 1:13-14; Translation philosophy §1
- issue: Sentido de τῆς περιποιήσεως
  english_pob_reading: Rendered generically as 'the possession' in the main text, without specifying whether the possession is God's people, the inheritance itself, or the act/result of acquisition.
  chosen_spanish_reading: Se deja «la posesión» sin precisar cuál de las lecturas posibles domina.
  alternative_spanish_readings:
  - la posesión adquirida
  - el pueblo adquirido
  - la posesión propia de Dios
  rationale: La expresión griega admite más de una relación semántica cercana. Mantener la ambigüedad en español evita sobreinterpretar el genitivo y preserva la tensión exegética documentada por el texto fuente y el audit trail inglés.
  doctrine_reference: Translation philosophy §3
- issue: Valor de εἰς en las dos cláusulas finales
  english_pob_reading: for the redemption ... to the praise ...
  chosen_spanish_reading: «para la redención ... para alabanza ...»
  alternative_spanish_readings:
  - con miras a
  - hasta
  - hacia
  rationale: En ambas ocurrencias, εἰς expresa finalidad o meta. «Para» comunica de manera natural esa orientación teleológica en español sin introducir un matiz temporal o direccional innecesario.
  doctrine_reference: Efesios 1:14; Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «for» en lugar de «toward» para εἰς en el segundo movimiento final. En español se reflejó esa mejora con «para» en ambas cláusulas de finalidad. También se preservó la solución inglesa de mantener la referencia lexicalmente abierta en τῆς περιποιήσεως, sin resolverla de modo interpretativo en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «herencia» para κληρονομία, coherente con el uso paulino y con la terminología bíblica habitual en español.
  - Se eligió «garantía» como equivalente funcional de ἀρραβών, evitando un calco demasiado técnico y conservando la idea de prenda inicial.
  - Se tradujo ἐἰς con «para» en ambos casos por claridad y naturalidad, manteniendo la finalidad del pasaje.
  - Se usó «gloria» y «alabanza» como términos doxológicos estables en español, sin añadir explicaciones interpretativas al cuerpo del verso.
