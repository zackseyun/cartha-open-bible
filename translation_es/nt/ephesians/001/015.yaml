translation:
  language: es
  text: Por esta razón[a], yo también, habiendo oído de la fe de ustedes en el Señor Jesús y de su amor hacia todos los santos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «A causa de esto»; la frase griega introduce una relación inferencial con lo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «por todos los santos»; la preposición griega puede expresar dirección del amor hacia sus objetos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por ello
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: La expresión griega introduce una relación inferencial con lo anterior. «Por esta razón» conserva mejor esa conexión causal/argumentativa en español que una simple coordinante como «así que», y mantiene un registro digno y claro.
- source_word: κἀγώ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - incluso yo
  lexicon: BDAG
  rationale: La crasis añade a Pablo a la respuesta descrita. «Yo también» reproduce de manera natural el matiz aditivo sin sobrecargar el énfasis.
- source_word: ἀκούσας
  english_pob_choice: having heard
  chosen_spanish: habiendo oído
  alternatives_spanish:
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: El participio aoristo se mantiene como participio en español para conservar la estructura dependiente del enunciado y su valor temporal previo.
- source_word: τὴν καθ’ ὑμᾶς πίστιν
  english_pob_choice: your faith
  chosen_spanish: su fe
  alternatives_spanish:
  - la fe de ustedes
  - su confianza
  lexicon: BDAG
  rationale: En español, «su fe» es la forma natural para referirse a la fe de los destinatarios. Se conserva πίστις como «fe» por defecto doctrinal; el contexto la sitúa en relación con los lectores.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se mantiene «fe» según el valor principal de πίστις en este contexto paulino. «Confianza» puede expresar una faceta relacional, pero no sustituye el término base sin pérdida de precisión.
- source_word: ἐν τῷ κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_spanish: en el Señor Jesús
  alternatives_spanish:
  - en el Señor Jesucristo
  - para con el Señor Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición «en» y el título cristológico «Señor» por fidelidad al griego y al criterio del proyecto para κύριος. En español, «Señor Jesús» resulta idiomático y reverente.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: κύριος se traduce como «Señor» de manera consistente con el valor cristológico y teológico del término en el proyecto.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin necesidad de ampliación que no esté en el texto griego.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se vierte como «amor» por ser el equivalente natural y transparente en español contemporáneo, evitando «caridad» por su tono más restringido o arcaizante.
- source_word: εἰς πάντας τοὺς ἁγίους
  english_pob_choice: for all the saints
  chosen_spanish: por todos los santos
  alternatives_spanish:
  - hacia todos los santos
  - para todos los santos
  lexicon: BDAG
  rationale: Con ἀγάπη, εἰς puede expresar dirección hacia el objeto del amor. En español, «por todos los santos» suena natural y conserva esa orientación relacional sin forzar una calca preposicional.
- source_word: ἁγίους
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - personas santas
  - los santos de Dios
  lexicon: BDAG
  rationale: Se mantiene «santos» como término paulino establecido para los creyentes, sin introducir una explicación perifrástica que debilite la designación comunitaria.
theological_decisions:
- issue: Rendering of πίστις in relation to believers’ response to Christ
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El contexto apunta a la respuesta creyente de los destinatarios respecto del Señor Jesús. «Fe» preserva la referencia doctrinal principal sin desplazar el término hacia una lectura más moralizante como «fidelidad».
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Rendering of κύριος as a christological title
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: En este pasaje κύριος funciona como título de Jesús. «Señor» conserva el peso cristológico y la continuidad terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran alta concordancia y no registran revisiones aplicadas. La versión española sigue de cerca esa lectura estable, conservando la estructura participial y las decisiones léxicas principales (πίστις = fe; κύριος = Señor; ἀγάπη = amor; ἅγιοι = santos).
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y digno, evitando calcos innecesarios.
  - «Señor Jesús» conserva la fórmula cristológica usual en español y respeta el valor de κύριος.
  - «Santos» se usa como designación comunitaria paulina, no como término de canonización posterior.
  - La puntuación reproduce la frase abierta del verso, que continúa en el siguiente contexto.
