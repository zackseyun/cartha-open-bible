    reason: cross_reference
lexical_decisions:
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a
  - hacia
  lexicon: BDAG
  rationale: En la construcción εἰς ἔπαινον, la relación es de propósito o resultado. En español, «para alabanza» expresa naturalmente esa finalidad sin perder la fuerza del griego.
- source_word: ἔπαινον
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - elogio
  lexicon: BDAG
  rationale: «Alabanza» es el equivalente más natural y reverente en español para ἔπαινος en un contexto doxológico.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: En contextos paulinos, δόξα se traduce de forma estable como «gloria». Mantiene el valor teológico del término mejor que alternativas más interpretativas.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: «Gracia» conserva el sentido teológico habitual de χάρις y la conexión léxica con ἐχαρίτωσεν.
- source_word: ἐχαρίτωσεν
  english_pob_choice: has favored / has graced
  chosen_spanish: nos ha favorecido
  alternatives_spanish:
  - nos ha agraciado
  - nos ha colmado de gracia
  - nos ha dado gracia
  lexicon: BDAG
  rationale: El verbo χαριτόω es cognado de χάρις y expresa una acción de gracia/favor otorgada por Dios. «Nos ha favorecido» es natural en español y preserva la idea de acción benévola; en nota se explicita la relación léxica con «gracia» para no perder la tensión documentada por el POB inglés.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Objeto directo del verbo, expresado de manera natural con el pronombre enclítico «nos».
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por medio de
  - unidos a
  lexicon: BDAG
  rationale: «En» reproduce el valor básico de la preposición y deja abierta la riqueza de esfera/unión sin forzarla.
- source_word: τῷ ἠγαπημένῳ
  english_pob_choice: the Beloved
  chosen_spanish: el Amado
  alternatives_spanish:
  - el Amado de Dios
  - el que es amado
  - su Hijo amado
  lexicon: BDAG
  rationale: El participio sustantivado funciona como título cristológico. «El Amado» preserva la concisión y el peso de título, sin añadir «Hijo» que no aparece explícitamente en este versículo.
theological_decisions:
- issue: Relación entre χάρις y χαριτόω
  english_pob_reading: with which he has favored us / has graced us
  chosen_spanish_reading: con la cual nos ha favorecido
  alternative_spanish_readings:
  - con la cual nos ha agraciado
  - con la cual nos ha dado gracia
  - por la cual nos ha favorecido
  rationale: El texto griego une léxicamente χάρις y χαριτόω. «Nos ha favorecido» es idiomático y comunica la acción benévola de Dios; la nota preserva la relación de raíz y evita borrar la tensión documentada por el POB inglés entre un verbo más literal («agraciar») y una formulación más natural.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Referencia cristológica de ἐν τῷ ἠγαπημένῳ
  english_pob_reading: in the Beloved
  chosen_spanish_reading: en el Amado
  alternative_spanish_readings:
  - en el Amado, es decir, el Mesías
  - en su Amado
  - en el Amado de Dios
  rationale: La expresión apunta a Cristo como título. «El Amado» mantiene la referencia cristológica sin expandirla más allá de lo que el griego dice; la mayúscula inicial en «Amado» ayuda a marcar que no se trata de un simple adjetivo.
  doctrine_reference: Affirmations; Translation philosophy §1 (Original-language primacy over translation tradition) and §2 (Translate titles; transliterate names)
translation_notes:
  revision_awareness: 'El contexto inglés revisó «has graced us» a «has favored us» por naturalidad, manteniendo intacta la relación entre χάρις y χαριτόω. La versión española sigue esa misma línea: emplea una forma natural («nos ha favorecido») y deja documentada en nota la alternativa más cercana al cognado («nos ha agraciado»), preservando el hilo léxico y teológico del audit trail.'
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις y se evita sustituirla por «favor» en el sustantivo, para no diluir el término teológico central.
  - Se usa «Amado» como título cristológico, no como simple adjetivo, coherente con el POB inglés y con el contexto paulino.
  - La preposición «en» se conserva en el texto principal para respetar la estructura griega; no se fuerza una expansión interpretativa como «unidos a» en el cuerpo del verso.
