translation:
  language: es
  text: para alabanza de la gloria de su gracia, con la cual nos ha favorecido[a] en el Amado[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos ha agraciado» o «por la cual nos ha favorecido». El verbo griego es cognado de «gracia», lo que preserva la idea de que Dios actuó con gracia hacia nosotros.'
    reason: lexical_alternative
  - marker: b
