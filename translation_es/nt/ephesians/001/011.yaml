translation:
  language: es
  text: En él también fuimos hechos herencia[a], habiendo sido predestinados conforme al propósito de aquel que obra todas las cosas conforme al consejo de su voluntad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «obtuvimos una herencia». El verbo griego puede entenderse tanto como recibir una herencia como ser hechos la posesión asignada de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - en quien
  lexicon: BDAG
  rationale: El antecedente es el Mesías del contexto inmediato. «En él» conserva la unión con Cristo de manera natural en español y evita una construcción más pesada, mientras que «en quien» queda como alternativa posible pero menos idiomática.
- source_word: ἐκληρώθημεν
  english_pob_choice: were made an inheritance
  chosen_spanish: fuimos hechos herencia
  alternatives_spanish:
  - obtuvimos una herencia
  - fuimos asignados como herencia
  - fuimos hechos posesión
  lexicon: BDAG
  rationale: La voz pasiva de κληρόω admite el sentido de recibir herencia o de ser constituidos como la porción/herencia de Dios. «Fuimos hechos herencia» conserva esa tensión y reproduce bien la lectura preferida por la POB en español sin cerrar la alternativa de «obtuvimos una herencia».
- source_word: προορισθέντες
  english_pob_choice: having been predestined
  chosen_spanish: habiendo sido predestinados
  alternatives_spanish:
  - habiendo sido determinados de antemano
  - habiendo sido destinados de antemano
  lexicon: BDAG
  rationale: «Predestinados» es el equivalente más directo y reconocido para προορίζω; mantiene el sentido de determinación previa sin añadir explicaciones que el texto no da.
- source_word: κατὰ πρόθεσιν
  english_pob_choice: according to the purpose
  chosen_spanish: conforme al propósito
  alternatives_spanish:
  - según el propósito
  - de acuerdo con el propósito
  - conforme al plan
  lexicon: BDAG
  rationale: «Propósito» comunica bien πρόθεσις en español bíblico contemporáneo. «Conforme a» preserva la relación normativa/causal del griego mejor que una paráfrasis más libre.
- source_word: τοῦ τὰ πάντα ἐνεργοῦντος
  english_pob_choice: of the one who works all things
  chosen_spanish: de aquel que hace todas las cosas
  alternatives_spanish:
  - de aquel que obra todas las cosas
  - de aquel que produce todas las cosas
  - de aquel que lleva a cabo todas las cosas
  lexicon: BDAG
  rationale: «Hace» es una forma amplia y clara de ἐνεργέω en este contexto de acción divina total. Aunque «obra» también es posible, «hace» evita un tono arcaizante y sigue reflejando el alcance de la actividad divina.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: «Todas las cosas» reproduce la amplitud del plural neutro sin reducirlo a un abstracto. Mantiene el alcance universal de la expresión.
- source_word: κατὰ τὴν βουλὴν
  english_pob_choice: according to the counsel
  chosen_spanish: conforme al consejo
  alternatives_spanish:
  - según el consejo
  - conforme a la decisión
  - según la deliberación
  lexicon: BDAG
  rationale: «Consejo» conserva la nuance deliberativa de βουλή y, en español bíblico, suena natural en la frase «conforme al consejo de su voluntad».
- source_word: τοῦ θελήματος αὐτοῦ
  english_pob_choice: of his will
  chosen_spanish: de su voluntad
  alternatives_spanish:
  - de lo que él quiere
  - de su querer
  lexicon: BDAG
  rationale: «Voluntad» es la equivalencia estándar de θέλημα y encaja bien con «consejo», manteniendo la relación genitiva sin forzar el español.
theological_decisions:
- issue: Sentido de ἐκληρώθημεν
  english_pob_reading: Believers are described as being made God's inheritance/allotted people.
  chosen_spanish_reading: Los creyentes son presentados como hechos herencia de Dios / su porción asignada.
  alternative_spanish_readings:
  - Los creyentes obtuvieron una herencia.
  - Los creyentes recibieron una herencia.
  rationale: La forma pasiva permite ambas lecturas. Se conserva en el texto principal la lectura de pertenencia/posesión divina, pero se mantiene la tensión con la alternativa de recepción hereditaria, en línea con el audit trail inglés y con la pauta de no resolver indebidamente la ambigüedad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se documentaron cambios posteriores al criterio base, y el consenso de auditoría fue de alta concordancia. Se conserva la ambigüedad de ἐκληρώθημεν con una nota, siguiendo el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero aquí el texto griego no usa el nombre divino sino un participio sustantivado referido a Dios; por eso se traduce «de aquel que».
  - Se conserva «Mesías» solo cuando el contexto o el audit trail lo requieran; aquí el antecedente es Cristo implícito por el contexto inmediato, y «él» resulta más natural y fiel en español.
  - «Predestinados» se usa como equivalente directo de προορίζω, sin desarrollar una formulación doctrinal adicional.
  - «Consejo de su voluntad» se mantiene como giro estable y auditable, porque refleja con precisión la relación entre βουλή y θέλημα.
