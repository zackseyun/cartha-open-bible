review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: «todas las cosas», «bajo sus pies», y la relación entre «cabeza sobre todas las cosas» y «a la iglesia». Sin embargo, las notas al pie están ancladas en lugares incorrectos: la nota sobre τῇ ἐκκλησίᾳ aparece en «pies», y la nota del eco de Salmo 8:6 aparece en «iglesia». Además, en español suena más natural y claro «como cabeza» que «por cabeza» con «lo dio».'
  spanish_quality_summary: La redacción es generalmente fiel y legible, pero el orden y anclaje de las notas dañan la claridad. «Lo dio por cabeza» es comprensible, aunque menos natural en español actual que «lo dio como cabeza». La revisión propuesta mejora fluidez sin perder literalidad ni la tensión teológica del original.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Iglesia», «todas las cosas» y la metáfora «cabeza» están bien preservadas. La decisión de mantener «bajo sus pies» conserva adecuadamente el eco escriturario.
  issues:
  - severity: high
    issue: Las notas al pie están invertidas/ancladas en frases equivocadas.
    rationale: La nota sobre «para la iglesia» debe anclarse en «a la iglesia», porque explica el dativo τῇ ἐκκλησίᾳ. La nota sobre el eco del Salmo 8:6 debe anclarse en «bajo sus pies», no en «iglesia».
  - severity: medium
    issue: «Lo dio por cabeza» suena menos natural que «lo dio como cabeza».
    rationale: Ambas opciones pueden reflejar el valor predicativo de κεφαλήν, pero «como cabeza» es más claro y natural en español contemporáneo sin perder la metáfora ni la sintaxis teológica documentada.
  revised_spanish_text: Y sometió todas las cosas bajo sus pies[a], y lo dio como cabeza sobre todas las cosas a la iglesia[b],
  revised_footnotes:
  - marker: a
    text: La formulación evoca el Salmo 8:6, imagen bíblica de todas las cosas puestas bajo los pies del gobernante.
    reason: cross_reference
  - marker: b
    text: O «para la iglesia»; el dativo τῇ ἐκκλησίᾳ puede expresar beneficio además de destinatario.
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan al griego y a la auditoría inglesa, y se mejora la naturalidad de «por cabeza» a «como cabeza» sin cambiar el sentido.
