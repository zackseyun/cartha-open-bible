translation:
  language: es
  text: Y sometió todas las cosas bajo sus pies[a], y lo dio como cabeza sobre todas las cosas a la iglesia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación evoca el Salmo 8:6, imagen bíblica de todas las cosas puestas bajo los pies del gobernante.
    reason: cross_reference
  - marker: b
    text: O «para la iglesia»; el dativo τῇ ἐκκλησίᾳ puede expresar beneficio además de destinatario.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: El plural neutro abarca la totalidad de las cosas, no solo personas. «Todas las cosas» conserva el alcance cósmico y la naturalidad en español.
- source_word: ὑπέταξεν
  english_pob_choice: subjected
  chosen_spanish: sometió
  alternatives_spanish:
  - puso en sujeción
  - subordinó
  lexicon: BDAG
  rationale: El aoristo de ὑποτάσσω expresa colocar bajo autoridad. «Sometió» transmite bien la subordinación sin sonar artificial en español.
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  english_pob_choice: under his feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo los pies de él
  lexicon: BDAG
  rationale: Se conserva el modismo bíblico de dominio y derrota. «Bajo sus pies» mantiene la imagen intertextual de Salmo 8:6.
- source_word: αὐτὸν ἔδωκεν
  english_pob_choice: gave him
  chosen_spanish: lo dio
  alternatives_spanish:
  - lo entregó
  - lo concedió
  lexicon: BDAG
  rationale: δίδωμι significa literalmente «dar». «Lo dio» preserva el vínculo con la frase siguiente y deja que el dativo exprese destinatario/beneficio.
- source_word: κεφαλὴν
  english_pob_choice: as head
  chosen_spanish: por cabeza
  alternatives_spanish:
  - como cabeza
  - por jefe
  lexicon: BDAG
  rationale: En español, «por cabeza» reproduce el valor predicativo de la expresión sin perder la metáfora de autoridad y preeminencia.
- source_word: ὑπὲρ πάντα
  english_pob_choice: over all things
  chosen_spanish: sobre todas las cosas
  alternatives_spanish:
  - por encima de todas las cosas
  - sobre todo
  lexicon: BDAG
  rationale: ὑπέρ expresa supremacía/autoridad. «Sobre todas las cosas» comunica bien esa posición y suena natural en español.
- source_word: τῇ ἐκκλησίᾳ
  english_pob_choice: to the church
  chosen_spanish: a la iglesia
  alternatives_spanish:
  - para la iglesia
  - a la asamblea
  lexicon: BDAG
  rationale: «Iglesia» es el equivalente corriente de ἐκκλησία en el uso paulino. El dativo puede ser de destinatario o de beneficio; «a la iglesia» lo preserva de forma directa.
theological_decisions:
- issue: Relación entre la cabeza universal de Cristo y el beneficio para la iglesia
  english_pob_reading: Christ is given to the church as the one who is head over all things.
  chosen_spanish_reading: Dios lo dio a la iglesia como cabeza sobre todas las cosas.
  alternative_spanish_readings:
  - Dios lo dio para la iglesia como cabeza sobre todas las cosas.
  - Dios lo hizo cabeza sobre todas las cosas para la iglesia.
  rationale: La sintaxis española mantiene unida la cabeza universal («sobre todas las cosas») con el dativo final/beneficiario («a la iglesia»), preservando la tensión entre supremacía cósmica y beneficio eclesial.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Coincide con la última revisión inglesa indicada como sin cambios; no se registran revisiones aplicadas en el texto de partida.
  spanish_consistency_notes:
  - Se mantiene «iglesia» para ἐκκλησία, conforme al uso paulino estándar del proyecto.
  - Se conserva «todas las cosas» para el neutro plural πάντα, evitando reducirlo a «todos» y perdiendo el alcance impersonal/cósmico.
  - «Sometió» y «bajo sus pies» preservan el eco de Salmo 8:6 y el lenguaje de dominación sin suavizarlo.
