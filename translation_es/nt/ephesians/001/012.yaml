  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: propósito («para que ... seamos»), fórmula paulina «para alabanza de su gloria», y la cautela interpretativa de τοὺς προηλπικότας mediante «los que ya habíamos esperado». También preserva correctamente «Mesías» para Χριστῷ. Sin embargo, la puntuación con comas trata la cláusula participial como incidental, cuando en el contexto y en la auditoría inglesa funciona de modo definitorio/restrictivo: identifica qué «nosotros» está en vista. Además, la nota b introduce «la alabanza», que no corresponde al texto principal elegido.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un pequeño problema de naturalidad y precisión discursiva: «nosotros, los que...» con comas suena explicativo/no restrictivo. En español bíblico natural aquí fluye mejor «nosotros los que...» sin comas, o incluso sin «nosotros» explícito. Mantener «nosotros» es aceptable por claridad, pero conviene quitar las comas. La frase «para alabanza de su gloria» es idiomática y preferible a «para la alabanza».'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: Χριστός → «Mesías»; δόξα → «gloria»; ἔπαινος → «alabanza». No hay conflicto con otras políticas léxicas. La excepción necesaria es corregir la nota b para que refleje exactamente la alternativa documentada sin introducir un artículo ajeno al texto principal.'
  issues:
