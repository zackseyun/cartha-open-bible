  text: para que nosotros los que ya habíamos esperado en el Mesías seamos para alabanza de su gloria[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que fueron los primeros en esperar en el Mesías».'
