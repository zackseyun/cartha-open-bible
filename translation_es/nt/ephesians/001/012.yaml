lexical_decisions:
- source_word: εἰς τὸ εἶναι
  english_pob_choice: so that ... might be
  chosen_spanish: para que ... seamos
  alternatives_spanish:
  - a fin de que ... seamos
  - para que ... pudiéramos ser
  lexicon: BDAG
  rationale: La construcción con preposición y articular infinitivo expresa propósito. En español, «para que» comunica esa finalidad con naturalidad; «seamos» mantiene el valor prospectivo/teleológico del conjunto sin volverlo mecánico.
- source_word: ἡμᾶς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nos
  lexicon: BDAG
  rationale: El griego usa el acusativo como sujeto del infinitivo; en español, la reestructuración natural exige el nominativo explícito «nosotros» para preservar la claridad sintáctica.
- source_word: εἰς ἔπαινον
  english_pob_choice: for the praise
  chosen_spanish: para alabanza
  alternatives_spanish:
  - para la alabanza
  - en alabanza
  lexicon: BDAG
  rationale: La fórmula paulina se vierte de modo más idiomático con «para alabanza», conservando el sentido de finalidad. «Alabanza» evita diluir el sustantivo con una paráfrasis más amplia.
- source_word: δόξης αὐτοῦ
  english_pob_choice: of his glory
  chosen_spanish: de su gloria
  alternatives_spanish:
  - de su gloriosa majestad
  - de su esplendor glorioso
  lexicon: BDAG
  rationale: Se conserva el genitivo simple y el peso teológico de «gloria», sin expandirlo innecesariamente.
- source_word: τοὺς προηλπικότας
  english_pob_choice: who had already hoped
  chosen_spanish: los que ya habíamos esperado
  alternatives_spanish:
  - los que habían esperado antes
  - los que fueron los primeros en esperar
  lexicon: BDAG
  rationale: El participio perfecto con προ- señala una esperanza previa con relevancia continua. «Ya habíamos esperado» mantiene la anterioridad sin forzar en el texto principal la lectura interpretativa de «los primeros en esperar»; esa posibilidad queda preservada en nota.
- source_word: ἐν τῷ Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Según la política del proyecto, Χριστός como título se traduce normalmente «Mesías». Aquí mantiene el sentido titular y la coherencia terminológica sin importar la fórmula litúrgica «Cristo».
theological_decisions:
- issue: Si προηλπικότας señala simplemente una esperanza previa o un grupo salvífico-histórico distinguible como «los primeros en esperar»
  english_pob_reading: Render more cautiously as 'who had already hoped' in the main text
  chosen_spanish_reading: «los que ya habíamos esperado» en el texto principal, con la alternativa «los que fueron los primeros en esperar» en nota
  alternative_spanish_readings:
  - los que fueron los primeros en esperar
  - los que habían esperado antes
  rationale: El prefijo προ- indica anterioridad, pero no obliga por sí solo a definir aquí una categoría teológica cerrada. La redacción principal conserva la tensión documental y evita resolver demasiado pronto si Pablo alude a un primer grupo concreto o simplemente a una esperanza anterior.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una lectura dogmática en el texto principal.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión que hizo más restrictiva la cláusula relativa y luego restauró «Messiah» por política del proyecto. La versión española sigue esa línea: hace la cláusula definitoria en forma natural y mantiene «Mesías» como traducción titular de Χριστός.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme a la norma del proyecto; no se adopta «Cristo» en el texto principal.
  - «Alabanza de su gloria» conserva la fórmula paulina sin expandir δόξα a «majestad» o «esplendor».
  - La estructura «para que ... seamos» refleja finalidad, no simple resultado pasivo.
  - La lectura en primera persona plural está mantenida por el griego ἡμᾶς; el español explícito «nosotros» evita ambigüedad.
  - La nota a preserva la alternativa interpretativa documentada para προηλπικότας.
