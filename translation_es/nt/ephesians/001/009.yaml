translation:
  language: es
  text: dándonos a conocer el misterio de su voluntad, según su beneplácito[a], que se propuso en sí mismo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se propuso en Cristo»; el griego dice literalmente «en él».'
    reason: alternative_reading
lexical_decisions:
- source_word: γνωρίσας
  english_pob_choice: having made known
  chosen_spanish: dándonos a conocer
  alternatives_spanish:
  - habiéndonos dado a conocer
  - haciéndonos conocer
  - revelándonos
  lexicon: BDAG
  rationale: El participio aoristo conserva una acción anterior al verbo principal. En español, "dándonos a conocer" mantiene el valor participial y el objeto indirecto sin sonar tan rígido como un calco literal.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: BDAG
  rationale: El dativo funciona naturalmente como complemento indirecto; en español, el clítico "nos" integra mejor la frase y evita pesadez.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: '"Misterio" preserva el uso paulino de una realidad divina antes oculta y ahora revelada. "Secreto" atenúa esa carga teológica y puede sonar más privado que revelado.'
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - propósito
  - deseo
  lexicon: BDAG
  rationale: '"Voluntad" es la correspondencia más directa y mantiene la distinción con el verbo posterior de propósito/premeditación.'
- source_word: εὐδοκίαν
  english_pob_choice: good pleasure
  chosen_spanish: buena voluntad
  alternatives_spanish:
  - beneplácito
  - agrado
  - buen propósito
  lexicon: BDAG
  rationale: Aquí la expresión señala una disposición favorable o complacencia divina. "Buena voluntad" es clara en español y conserva el sentido volitivo-relacional sin forzar una paráfrasis.
- source_word: προέθετο
  english_pob_choice: purposed
  chosen_spanish: se propuso
  alternatives_spanish:
  - determinó
  - planeó
  - preordenó
  lexicon: BDAG
  rationale: El verbo medio expresa una resolución tomada de antemano. "Se propuso" comunica bien la intención divina y evita confundirlo con un mero 'poner delante'.
- source_word: ἐν αὐτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - en él
  - en Cristo
  lexicon: BDAG
  rationale: El griego permite una lectura reflexiva o una referencia al antecedente inmediato. Dado el audit trail inglés y la revisión posterior, se adopta la lectura reflexiva en el texto principal, manteniendo la transparencia del pronombre.
theological_decisions:
- issue: Sentido de ἐν αὐτῷ
  english_pob_reading: The English audit trail ultimately prefers the reflexive sense 'in himself,' while documenting the alternative 'in Christ' / 'in him.'
  chosen_spanish_reading: se propuso en sí mismo
  alternative_spanish_readings:
  - que se propuso en él
  - que se propuso en Cristo
  rationale: La frase es ambigua en griego, pero la revisión inglesa indicó una preferencia por la lectura reflexiva. En español, "en sí mismo" conserva esa decisión sin borrar la alternativa cristológica, que sigue siendo posible desde el contexto inmediato.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés revisado cambió de 'in him' a 'in himself' para reflejar la lectura reflexiva probable de ἐν αὐτῷ. La redacción española sigue esa revisión, pero conserva la alternativa cristológica documentada en nota.
  spanish_consistency_notes:
  - Se usó 'misterio' para μυστήριον por coherencia con el uso paulino.
  - Se prefirió 'voluntad' para θέλημα y 'buena voluntad' para εὐδοκία para distinguir ambos términos.
  - Se mantuvo la distinción entre el pronombre reflexivo principal ('en sí mismo') y la alternativa contextual ('en Cristo').
  - La puntuación y el registro buscan ser bíblicos y publicables en español latinoamericano sin depender de fórmulas tradicionales de sustitución del Nombre divino, que no aparecen en este versículo.
