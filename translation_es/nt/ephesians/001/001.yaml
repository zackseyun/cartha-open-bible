    timestamp: '2026-04-18T10:43:07Z'
    output_hash: ee3d6fee34232927af24fdf93b0ea7efee5754c2f58e742c52c08383d7561440
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:32Z'
    unchanged: false
    changes_summary: 'Replaced ''Messiah Jesus'' with ''Christ Jesus'' for more natural formal English and consistency with standard rendering of Χριστοῦ Ἰησοῦ / ἐν Χριστῷ Ἰησοῦ in this verse. Kept the bracketed ''[in Ephesus]'' to reflect the textual uncertainty. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pablo, apóstol de Mesías[a] Jesús, por la voluntad de Dios, a los santos que están [en Éfeso][b] y fieles[c] en Mesías Jesús:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Mesías'' aquí traduce el griego Χριστός como título, no como un nombre fijo.'
    reason: theological_note
  - marker: b
    text: Algunos manuscritos antiguos omiten 'en Éfeso', por lo que esta carta ha sido entendida por algunos como destinada a una circulación más amplia que solo la iglesia de Éfeso.
    reason: textual_variant
  - marker: c
    text: O 'creyentes en Mesías Jesús'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Pablo
  lexicon: nombre propio
  rationale: Nombre propio estándar en español para Παῦλος; no requiere transliteración ni adaptación adicional.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: En este saludo epistolar, ἀπόστολος funciona como título/función reconocible; 'apóstol' conserva el valor técnico y la autoridad implícita.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Χριστός se traduce como 'Mesías' cuando actúa como título; en español, 'Mesías Jesús' preserva la lectura titulada y sigue la política terminológica del proyecto.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - por medio de la voluntad de Dios
  - a causa de la voluntad de Dios
  lexicon: BDAG
  rationale: διά con genitivo expresa aquí agencia/autoridad en una fórmula de comisión. 'Por la voluntad de Dios' es idiomático en español y conserva la relación causal y autorizadora.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santos consagrados
  - santos de Dios
  lexicon: BDAG
  rationale: En la dirección paulina, ἅγιοι designa al pueblo apartado para Dios. 'Santos' es el equivalente natural en español y mantiene el valor comunitario del término.
- source_word: τοῖς οὖσιν
  english_pob_choice: who are
  chosen_spanish: que están
  alternatives_spanish:
  - que son
  - que existen
  lexicon: BDAG
  rationale: El participio con artículo identifica a los destinatarios; en español, 'que están' comunica de forma directa el enlace relacional sin sobreinterpretar el aspecto verbal.
- source_word: '[ἐν Ἐφέσῳ]'
  english_pob_choice: '[in Ephesus]'
  chosen_spanish: '[en Éfeso]'
  alternatives_spanish:
  - '[a Éfeso]'
  lexicon: BDAG
  rationale: La frase está textualmente incierta y se conserva entre corchetes para reflejar esa variación. 'En Éfeso' sigue la localización más probable sin ocultar la duda textual.
- source_word: πιστοῖς
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - creyentes
  lexicon: BDAG
  rationale: πιστός puede significar 'fiel' o 'creyente'. Aquí se preserva el valor adjetival de lealtad/fiabilidad; la alternativa 'creyentes' se mantiene como posibilidad semántica válida.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: La preposición ἐν expresa unión o esfera relacional. Se conserva la traducción de Χριστός como 'Mesías' también aquí para mantener consistencia terminológica y el sentido titular.
theological_decisions:
- issue: Traducción de Χριστός en el saludo paulino
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El marco doctrinal del proyecto pide traducir Χριστός como 'Mesías' cuando conserva fuerza titular. En este versículo, el valor de título permanece transparente, por lo que 'Mesías' es la opción preferida.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título.'
- issue: Lectura de ἐν Ἐφέσῳ
  english_pob_reading: Preserved in brackets in the main text as [in Ephesus]
  chosen_spanish_reading: Preservado entre corchetes en el texto principal como [en Éfeso]
  alternative_spanish_readings:
  - omitir 'en Éfeso'
  rationale: La evidencia textual es inestable; por eso se conserva la frase entre corchetes, sin resolver silenciosamente la variante. Así se respeta la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales y documentar variantes significativas.'
- issue: Sentido de πιστοῖς
  english_pob_reading: faithful
  chosen_spanish_reading: fieles
  alternative_spanish_readings:
  - creyentes
  rationale: '''Fieles'' preserva el matiz adjetival y evita reducir el término a una etiqueta doctrinal única. La alternativa ''creyentes'' se reconoce, pero no se impone en el texto principal.'
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas/teológicas cuando el término admite más de una lectura.'
translation_notes:
  revision_awareness: El texto inglés de auditoría pasó de 'Christ Jesus' a 'Messiah Jesus' y luego fue restaurado a 'Messiah Jesus' por coherencia doctrinal; la presente versión española mantiene esa política terminológica con 'Mesías Jesús' y conserva la variante textual de '[en Éfeso]'.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en ambas ocurrencias del versículo.
  - Se usa 'santos' para ἅγιοι y 'fieles' para πιστοῖς, evitando uniformar indebidamente dos términos distintos.
  - La frase entre corchetes '[en Éfeso]' refleja la incertidumbre textual sin resolverla en el cuerpo principal.
  - Se prefieren construcciones naturales en español ('por la voluntad de Dios', 'que están') sin perder la correspondencia fuente a fuente.
