source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ τοῖς ἁγίοις τοῖς οὖσιν ⸂[ἐν Ἐφέσῳ]⸃ καὶ πιστοῖς ἐν Χριστῷ Ἰησοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/001.yaml
  text: 'Paul[a], an apostle of Messiah Jesus by the will of God[c][b], to the saints who are [in Ephesus] and faithful in Messiah Jesus:'
  footnotes:
  - marker: a
    text: Some early manuscripts omit 'in Ephesus,' which has led some to understand this letter as intended for a wider circulation rather than only for the church in Ephesus.
    reason: textual_variant
  - marker: b
    text: Or 'believers in Messiah Jesus.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ Jesus' / 'Christos Iēsous'; rendered 'Messiah Jesus' here because Χριστός functions as a title.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
