translation:
  language: es
  text: iluminados los ojos del corazón de ustedes, para que sepan cuál es la esperanza de su llamamiento, cuál es la riqueza[a] de la gloria de su herencia entre los santos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las riquezas de la gloria'.
    reason: lexical_alternative
  - marker: b
    text: O 'su herencia en los santos' o 'entre su pueblo santo'.
    reason: alternative_reading
lexical_decisions:
- source_word: πεφωτισμένους
  english_pob_choice: having ... enlightened
  chosen_spanish: iluminados
  alternatives_spanish:
  - habiendo sido iluminados
  - siendo iluminados
  lexicon: BDAG
  rationale: El participio perfecto pasivo se vierte de forma natural como adjetivo participial en español. 'Iluminados' conserva el resultado duradero de la acción sin añadir elementos que el griego no dice.
- source_word: τοὺς ὀφθαλμοὺς τῆς καρδίας ὑμῶν
  english_pob_choice: the eyes of your heart
  chosen_spanish: los ojos de su corazón
  alternatives_spanish:
  - los ojos de vuestro corazón
  - los ojos del corazón de ustedes
  lexicon: BDAG
  rationale: Se mantiene la metáfora de 'ojos del corazón' sin convertirla en 'entendimiento' o 'mente'. 'Su' refleja un registro natural y bíblico en español neutral, compatible con la segunda persona plural implícita.
- source_word: εἰς τὸ εἰδέναι ὑμᾶς
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - para que conozcan
  - a fin de que sepan
  lexicon: BDAG
  rationale: La construcción de propósito se expresa de forma idiomática con 'para que'. 'Sepan' preserva el valor cognitivo de οἶδα sin forzar un tecnicismo.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - la esperanza confiada
  - la esperanza segura
  lexicon: BDAG
  rationale: '''Esperanza'' es el equivalente natural y teológicamente estable para la expectativa confiada paulina.'
- source_word: κλήσεως αὐτοῦ
  english_pob_choice: his calling
  chosen_spanish: su llamamiento
  alternatives_spanish:
  - su llamado
  - la llamada que él hace
  lexicon: BDAG
  rationale: '''Llamamiento'' preserva el vocabulario paulino y el sentido vocacional/eficaz del sustantivo, sin desdoblar innecesariamente el genitivo.'
- source_word: πλοῦτος
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - las riquezas
  - la abundancia
  lexicon: BDAG
  rationale: '''Riqueza'' transmite bien la idea de abundancia y mantiene la posible relación léxica con la alternativa inglesa ''riches'' sin sonar arcaica.'
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: de la gloria
  alternatives_spanish:
  - de esplendor
  lexicon: BDAG
  rationale: '''Gloria'' es el equivalente bíblico estándar y conserva el peso teológico del término.'
- source_word: κληρονομίας αὐτοῦ
  english_pob_choice: his inheritance
  chosen_spanish: de su herencia
  alternatives_spanish:
  - de la herencia que le pertenece
  - de la herencia que él da
  lexicon: BDAG
  rationale: 'Se conserva la ambigüedad del genitivo: puede referirse a la herencia que pertenece a Dios o a la herencia relacionada con él. ''Herencia'' mantiene abierta la tensión interpretativa.'
- source_word: ἐν τοῖς ἁγίοις
  english_pob_choice: among the saints
  chosen_spanish: entre los santos
  alternatives_spanish:
  - en los santos
  - entre su pueblo santo
  lexicon: BDAG
  rationale: '''Entre'' es la forma más natural en español para ἐν cuando el sentido es locativo-colectivo. Se conserva ''santos'' en la línea principal, como en el texto inglés auditable.'
theological_decisions:
- issue: El sentido de 'su herencia' puede apuntar a la posesión de Dios o a la herencia asociada con los creyentes
  english_pob_reading: his inheritance among the saints
  chosen_spanish_reading: su herencia entre los santos
  alternative_spanish_readings:
  - su herencia en los santos
  - la herencia que él da entre los santos
  rationale: La frase griega permite más de una lectura y el POB inglés preserva esa tensión. La versión española mantiene la misma apertura sin resolverla en favor de una interpretación doctrinal específica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La traducción sigue el pasaje con alta concordancia con el auditor inglés y no requiere revisión adicional según el último pase, que permaneció sin cambios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aparece.
  - Se conserva la metáfora corporal/espiritual 'ojos de su corazón' sin sustitución explicativa.
  - '''Santos'' se retiene como término técnico de comunidad creyente, coherente con el texto fuente y con el audit trail inglés.'
