id: EPH.1.17
reference: Ephesians 1:17
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ἵνα ὁ θεὸς τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ πατὴρ τῆς δόξης, δώῃ ὑμῖν πνεῦμα σοφίας καὶ ἀποκαλύψεως ἐν ἐπιγνώσει αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/017.yaml
  text: that the God of our Lord Jesus Messiah[a], the Father of glory, may give you a spirit of wisdom and revelation in the knowledge of him[c][b],
  footnotes:
  - marker: a
    text: Or, 'the Spirit of wisdom and revelation.' The Greek πνεῦμα can be understood either as a God-given spirit/disposition or as a reference to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστός means ''Messiah.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'the glorious Father.' The phrase is literally 'the Father of glory.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
