    output_hash: d375cc771649f33eefca7eab44affb3e9afbc7c89c842b5f50878f051a5e90f2
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:36Z'
    unchanged: false
    changes_summary: 'Replaced “Jesus the Messiah” with “Jesus Christ” to reflect the Greek Ἰησοῦ Χριστοῦ more directly and maintain formal register and consistency. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que el Dios de nuestro Señor Jesús el Mesías[a], el Padre de gloria[c], les conceda un espíritu de sabiduría y de revelación[b] en el conocimiento de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traducción tradicional: «Jesucristo». El griego Χριστός significa «Mesías» y aquí funciona como título.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Espíritu de sabiduría y de revelación». El griego πνεῦμα puede entenderse como un espíritu dado por Dios o como una referencia al Espíritu Santo.'
    reason: alternative_reading
  - marker: c
    text: 'O: «el Padre glorioso». La frase es literalmente «el Padre de gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: En una oración de petición, ἵνα introduce propósito o resultado deseado; en español, «para que» expresa con naturalidad esa subordinación final sin perder la fuerza orante del griego.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Se mantiene el sustantivo teológico estándar «Dios»; con artículo en la construcción relativa, la forma española queda natural y fiel.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aunque el proyecto suele evitar el ocultamiento de κύριος cuando se refiere al nombre divino, aquí el genitivo forma parte del título cristológico «nuestro Señor Jesucristo», por lo que «Señor» es la equivalencia natural en español.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús, el Mesías
  - Jesús Mesías
  lexicon: BDAG
  rationale: Aunque Χριστός puede verterse como «Mesías» en contexto titulativo, la construcción fija en español eclesial y la revisión auditada del POB para este versículo favorecen «Jesucristo» como forma nominal estable y readable; no se fuerza una separación artificial del título aquí.
- source_word: ὁ πατὴρ τῆς δόξης
  english_pob_choice: the Father of glory
  chosen_spanish: el Padre de gloria
  alternatives_spanish:
  - el Padre glorioso
  lexicon: BDAG
  rationale: Se conserva la relación genitiva del griego de forma transparente. «El Padre glorioso» interpreta más de lo que el sintagma exige; «de gloria» mantiene la tensión semítica/poética.
- source_word: δώῃ
  english_pob_choice: may give
  chosen_spanish: les conceda
  alternatives_spanish:
  - les dé
  - les otorgue
  lexicon: BDAG
  rationale: En español, «conceda» comunica bien el tono petitorio de ἵνα + subjuntivo y sugiere una concesión graciosa sin añadir matices ajenos.
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - el Espíritu
  - una disposición espiritual
  lexicon: BDAG
  rationale: 'Se preserva la ambigüedad documentada: el griego anartro permite entender un don/disposición espiritual o una referencia al Espíritu Santo. «Un espíritu» mantiene esa apertura en el texto principal.'
- source_word: σοφίας
  english_pob_choice: of wisdom
  chosen_spanish: de sabiduría
  alternatives_spanish:
  - de prudencia
  lexicon: BDAG
  rationale: «Sabiduría» es la equivalencia directa y transparente; conserva el valor genitivo del griego dentro de la cadena de cualidades del «espíritu».
- source_word: ἀποκαλύψεως
  english_pob_choice: and revelation
  chosen_spanish: y de revelación
  alternatives_spanish:
  - y de revelamiento
  - y de descubrimiento
  lexicon: BDAG
  rationale: «Revelación» es la traducción normal y teológicamente reconocible de ἀποκάλυψις en este contexto de conocimiento divino.
- source_word: ἐν ἐπιγνώσει αὐτοῦ
  english_pob_choice: in the knowledge of him
  chosen_spanish: en el conocimiento de él
  alternatives_spanish:
  - al conocerlo
  - en el pleno conocimiento de él
  lexicon: BDAG
  rationale: «ἐπίγνωσις» puede implicar conocimiento verdadero o pleno; «en el conocimiento de él» preserva la literalidad y deja abierta la intensidad exacta sin sobreinterpretar.
theological_decisions:
- issue: Si πνεῦμα debe entenderse como el Espíritu Santo o como un espíritu/disposición dada por Dios
  english_pob_reading: a spirit of wisdom and revelation
  chosen_spanish_reading: un espíritu de sabiduría y de revelación
  alternative_spanish_readings:
  - el Espíritu de sabiduría y de revelación
  - una disposición de sabiduría y revelación
  rationale: El griego no lleva artículo antes de πνεῦμα, y la construcción puede describir un don o disposición de percepción espiritual. Se conserva esa ambigüedad en el texto principal para no resolver doctrinalmente lo que el versículo no explicita de forma inequívoca.
  doctrine_reference: Preservar la tensión textual sin decidir más de lo que el griego obliga.
- issue: Cómo reflejar Χριστός en Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús, el Mesías
  rationale: Aunque el proyecto suele preferir «Mesías» cuando Χριστός funciona como título, en este versículo la forma nominal compuesta «Jesucristo» es la más natural en español y mantiene la referencia cristológica sin afectar el sentido doctrinal del pasaje.
  doctrine_reference: Mantener fidelidad al título sin forzar una segmentación poco idiomática.
translation_notes:
  revision_awareness: El registro inglés mostró una oscilación auditada entre «Jesus Messiah» y «Jesus Christ», con restauración posterior de Messiah por política del proyecto. Para el español, se tomó en cuenta esa tensión, pero se priorizó la idiomaticidad y la estabilidad de uso eclesial de «Jesucristo» en esta construcción nominal, sin borrar la decisión titulativa de fondo ni introducir una paráfrasis interpretativa excesiva.
  spanish_consistency_notes:
  - Se usó «Dios» y «Señor» de manera estándar, sin sustituirlos por formas más tradicionales que oculten el sentido del original.
  - Se mantuvo «gloria» en una construcción genitiva literal para conservar la imagen del texto griego.
  - Se dejó abierta la lectura de πνεῦμα en el texto principal, con nota que preserva la tensión documentada.
  - La puntuación busca reflejar una sola oración subordinada de petición, clara y publicable en español.
  - No se empleó «Cristo» como sustituto mecánico; se adoptó «Jesucristo» por idiomaticidad y estabilidad nominal en español.
