review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura general del griego y mantiene correctamente «administración», «plenitud de los tiempos», «el Mesías», «los cielos» y «en él». Sin embargo, el infinitivo ἀνακεφαλαιώσασθαι fue auditado en inglés como «to sum up», con una nota que preserva la alternativa de reunir/unir bajo una cabeza. El español principal «de reunir todas las cosas» desplaza indebidamente el centro semántico desde «resumir/recapitular» hacia «reunir», que en el expediente queda como alternativa, no como elección principal.
  spanish_quality_summary: El español es generalmente claro y digno, pero «para la administración…, de reunir…» suena algo trabado. Cambiar a «para la administración…, para resumir…» mejora la naturalidad y refleja mejor la relación de propósito. La nota también debe armonizarse con el verbo principal elegido, añadiendo «resumir» en vez de dejar solo «poner… bajo una sola cabeza».
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «Mesías» para Χριστός. No hay conflicto con otros términos base. El ajuste principal es alinear ἀνακεφαλαιώσασθαι con la decisión lexical y teológica documentada por POB: texto principal con «resumir» y nota con la alternativa de reunir/unir bajo una cabeza.'
  issues:
  - severity: medium
    issue: El verbo principal ἀνακεφαλαιώσασθαι está traducido como «reunir» en vez de la opción principal auditada «sum up / resumir».
    rationale: El expediente inglés documenta que el texto principal debe preservar la equivalencia más directa («sum up») y dejar la noción de unificación/cabeza en nota. «Reunir» adelanta una alternativa interpretativa al texto base.
  - severity: low
    issue: La secuencia «para la administración…, de reunir…» resulta menos natural en español.
    rationale: Aunque comprensible, «para… de…» suena más forzado que una construcción paralela con «para resumir…», que expresa mejor el propósito en español y sigue bien el flujo del griego.
  - severity: low
    issue: La nota al pie no refleja del todo la elección principal revisada.
    rationale: Si el texto principal usa «resumir», conviene que la nota preserve explícitamente la alternativa «reunir/unir bajo una sola cabeza», en paralelo con el expediente inglés.
  revised_spanish_text: para la administración de la plenitud de los tiempos, para resumir todas las cosas[a] en el Mesías—las cosas en los cielos y las cosas en la tierra—en él,
