translation:
  language: es
  text: para la administración de la plenitud de los tiempos, para resumir todas las cosas[a] en el Mesías—las cosas en los cielos y las cosas en la tierra—en él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reunir todas las cosas bajo una sola cabeza en el Mesías»; el verbo griego puede llevar el sentido de resumir o de unir bajo una cabeza.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκονομίαν
  english_pob_choice: administration
  chosen_spanish: administración
  alternatives_spanish:
  - plan
  - mayordomía
  - ordenamiento
  lexicon: BDAG
  rationale: οἰκονομία puede denotar administración, gestión u ordenamiento de un plan. «Administración» conserva la idea de una gestión ordenada y evita diluir el sentido en una mera «idea» o «plan».
- source_word: πληρώματος
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - completud
  - cumplimiento
  - llenura
  lexicon: BDAG
  rationale: «Plenitud» conserva el peso temporal y teológico de πλήρωμα sin reducirlo solo a un punto final cronológico.
- source_word: καιρῶν
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - épocas
  - momentos
  - tiempos señalados
  lexicon: BDAG
  rationale: καιρός apunta a tiempos fijados o apropiados. «Tiempos» es natural en español y mantiene la referencia a épocas divinamente determinadas.
- source_word: ἀνακεφαλαιώσασθαι
  english_pob_choice: to sum up
  chosen_spanish: reunir todas las cosas
  alternatives_spanish:
  - resumir
  - recapitular
  - poner bajo una sola cabeza
  lexicon: BDAG
  rationale: El verbo puede significar «resumir», «reunir» o «poner bajo una cabeza». En español, «reunir todas las cosas» expresa bien la amplitud cósmica del acto sin borrar el matiz de integración; la nota preserva la alternativa de cabeza/unidad.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: La construcción neutra plural con artículo es totalizante. «Todas las cosas» es una equivalencia directa y solemne para este contexto cósmico.
- source_word: ἐν τῷ Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no solo como nombre propio. Por la convención del proyecto, se traduce «Mesías» para preservar el valor titular y mesiánico.
- source_word: τὰ ἐπὶ τοῖς οὐρανοῖς
  english_pob_choice: the things in the heavens
  chosen_spanish: las cosas en los cielos
  alternatives_spanish:
  - las cosas en el cielo
  - las realidades celestiales
  lexicon: BDAG
  rationale: El plural οὐρανοῖς se refleja mejor con «cielos». «Las cosas en los cielos» mantiene el alcance cósmico y la forma plural del griego.
- source_word: τὰ ἐπὶ τῆς γῆς
  english_pob_choice: the things on the earth
  chosen_spanish: las cosas en la tierra
  alternatives_spanish:
  - las cosas terrenales
  - las cosas sobre la tierra
  lexicon: BDAG
  rationale: La frase es locativa y contrasta con «los cielos». «En la tierra» es claro y fiel sin sobrecargar el giro.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él solo
  - en él mismo
  lexicon: BDAG
  rationale: El pronombre vuelve naturalmente al Mesías. «En él» conserva la repetición enfática del griego sin añadir exclusividad que el texto no expresa explícitamente.
theological_decisions:
- issue: Traducción de Χριστῷ como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto es titular y escatológico. Traducir como «Mesías» mantiene el sentido del título y evita fijar una forma litúrgica donde el griego presenta una función teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Sentido de ἀνακεφαλαιώσασθαι
  english_pob_reading: to sum up all things
  chosen_spanish_reading: reunir todas las cosas
  alternative_spanish_readings:
  - resumir todas las cosas
  - poner todas las cosas bajo una sola cabeza
  rationale: La acción divina aquí es cósmica e integradora. «Reunir todas las cosas» comunica esa unificación sin resolver por completo la tensión entre «sumar/resumir» y la posible idea de jefatura; la nota conserva la alternativa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la estructura del griego y del POB inglés, pero adopta una formulación natural en español: se mantuvo la secuencia de propósito («para...») y el paralelismo cósmico, y se ajustó la expresión de ἀνακεφαλαιώσασθαι para no cerrar indebidamente su doble posibilidad semántica. También se respetó la revisión inglesa que sustituye la pausa más fuerte por una coma, reflejada aquí con una sola coma principal.'
  spanish_consistency_notes:
  - Se usa «Mesías» de forma consistente para Χριστός cuando funciona como título.
  - Se conserva «cielos» en plural para reflejar οὐρανοῖς.
  - «En él» mantiene la referencia pronominal al Mesías sin añadir énfasis no explicitado.
  - La nota de pie preserva la tensión lexical de ἀνακεφαλαιώσασθαι sin imponer una sola lectura.
  - La puntuación reproduce la estructura acumulativa del griego con guiones largos para el inciso explicativo.
