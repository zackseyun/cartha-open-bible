translation:
  language: es
  text: muy por encima de todo principado, de toda autoridad, de todo poder y de todo señorío[a], y de todo nombre que se nombra[b], no solo en este siglo[c], sino también en el venidero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo principado y autoridad y poder y señorío». Los términos griegos pueden designar rangos o esferas de autoridad, incluso poderes cósmicos o espirituales.
    reason: lexical_alternative
  - marker: b
    text: O «todo título que se da».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no solo en este siglo, sino también en el venidero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεράνω
  english_pob_choice: far above
  chosen_spanish: muy por encima de
  alternatives_spanish:
  - por encima de
  - muy alto sobre
  lexicon: BDAG
  rationale: La idea es de superioridad/exaltación, no solo de posición espacial. «Muy por encima de» conserva la fuerza intensiva de ὑπεράνω de manera natural en español.
- source_word: πάσης ἀρχῆς
  english_pob_choice: every rule
  chosen_spanish: todo principado
  alternatives_spanish:
  - toda regla
  - todo gobierno
  lexicon: BDAG
  rationale: En este contexto ἀρχή designa una esfera o rango de autoridad; «principado» mantiene el matiz de rango/poder sin reducirlo a una sola persona. Aunque «regla» sería más literal en inglés, en español resulta menos idiomático para esta lista de poderes.
- source_word: ἐξουσίας
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - jurisdicción
  - poder
  lexicon: BDAG
  rationale: Es la equivalencia más directa y clara para una autoridad delegada o ejercida, y preserva la distinción con δύναμις.
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - maldad
  lexicon: BDAG
  rationale: «Poder» mantiene la serie de términos y la amplitud semántica sin forzar una especificación que el griego no da aquí.
- source_word: κυριότητος
  english_pob_choice: dominion
  chosen_spanish: señorío
  alternatives_spanish:
  - dominio
  - soberanía
  lexicon: BDAG
  rationale: «Señorío» refleja bien la noción de lordship/dominion y evita confusión con el título divino «Señor». En español bíblico suena más natural que «dominación» y menos técnico que «dominio».
- source_word: παντὸς ὀνόματος ὀνομαζομένου
  english_pob_choice: every name that is named
  chosen_spanish: todo nombre que se nombra
  alternatives_spanish:
  - todo título que se da
  - todo nombre que es llamado
  lexicon: BDAG
  rationale: La construcción participial se conserva de forma transparente. «Se nombra» mantiene la amplitud retórica de cualquier nombre/título/estatus sin estrechar el sentido.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no solamente ... sino también
  - no solo ... pero también
  lexicon: BDAG
  rationale: Es la correlación natural en español y reproduce bien el énfasis distributivo del griego.
- source_word: ἐν τῷ αἰῶνι τούτῳ
  english_pob_choice: in this age
  chosen_spanish: en este siglo
  alternatives_spanish:
  - en esta era
  - en este tiempo
  lexicon: BDAG
  rationale: «Siglo» es un equivalente bíblico tradicional y todavía comprensible para αἰών en contraste temporal-redentivo con el futuro. Se evita «mundo» porque el griego enfatiza la era/edad, no el planeta.
- source_word: ἐν τῷ μέλλοντι
  english_pob_choice: in the one to come
  chosen_spanish: en el venidero
  alternatives_spanish:
  - en el que ha de venir
  - en la edad venidera
  lexicon: BDAG
  rationale: Se conserva la elipsis del griego (con αἰῶνι entendido) mediante «el venidero», una forma concisa y natural que mantiene el contraste con «este siglo».
theological_decisions:
- issue: Naturaleza de la lista de poderes (ἀρχή, ἐξουσία, δύναμις, κυριότης)
  english_pob_reading: Render as broad categories of rule/authority without specifying human or angelic beings in the main text.
  chosen_spanish_reading: Traducir como categorías amplias de rango y autoridad, sin especificar en el texto principal si se trata de seres humanos, celestiales o espirituales.
  alternative_spanish_readings:
  - «poderes cósmicos»
  - «jerarquías angélicas»
  rationale: El griego enumera categorías de autoridad; la POB inglesa preserva esa amplitud y no resuelve la identidad ontológica. La versión española evita estrechar el alcance doctrinal y mantiene la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión teológica sin resolverla indebidamente.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios: el borrador español mantiene la misma lectura auditada del texto griego y conserva las alternativas léxicas pertinentes sin resolver la ambigüedad teológica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «siglo» para αἰών por coherencia con el contraste escatológico y con la tradición bíblica española, sin caer en un calco de «mundo».
  - «Señorío» se eligió para κυριότης por su valor semántico y para evitar colisión con el título divino «Señor».
