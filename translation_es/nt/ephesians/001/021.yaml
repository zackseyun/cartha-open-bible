  spanish_quality_summary: El español es claro, digno y eclesialmente legible. «Muy por encima de», «autoridad», «poder» y «señorío» funcionan bien. «Todo principado» es defendible y tradicionalmente inteligible en este contexto. La principal mejora necesaria es alinear las notas al lugar correcto y hacer la puntuación/flujo un poco más natural con repetición de «de» antes de la serie nominal.
