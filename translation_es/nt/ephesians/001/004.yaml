review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en su estructura principal: καθὼς = «así como», ἐξελέξατο = «nos escogió», ἐν αὐτῷ = «en él», πρὸ καταβολῆς κόσμου = «antes de la fundación del mundo», y preserva la ambigüedad de ἐν ἀγάπῃ al dejar la frase al final. Sin embargo, hay dos fallas en la implementación de las notas y una decisión de estilo/lexical que conviene reparar para alinearse mejor con la POB inglesa y con un español más natural.'
  spanish_quality_summary: '«Así como nos escogió en él...» es legible y digno. Pero «en amor» suena menos natural que «en amor» mantenido con nota, y sobre todo la puntuación con coma antes de «en amor» endurece una construcción ya ambigua. Además, las notas están mal ancladas: la nota sobre la posible unión de «en amor» con el v. 5 aparece en «mundo» en vez de en «en amor», y la nota c («O, “para ser”») es vacía porque repite exactamente el texto principal. También, dado que la POB inglesa escogió «blameless» en texto principal y dejó «without blemish» como alternativa, el español debería preferir «irreprensibles» o equivalente en el texto, dejando «sin mancha» en nota.'
  glossary_alignment: 'No hay conflicto con la glosa doctrinal principal. «Nos escogió» respeta la cautela frente a sobrelecturas de elección. «En él» preserva la formulación paulina. La principal desalineación con el rastro auditado está en ἀμώμους: el inglés principal eligió un equivalente idiomático («blameless»), mientras el español puso en texto la alternativa más literal/cultual («sin mancha»). En español eclesial amplio, «irreprensibles» refleja mejor esa decisión, con «sin mancha» en nota léxica.'
  issues:
  - severity: high
    issue: La nota sobre la ambigüedad de «en amor» está anclada en «mundo[a]» en vez de en la frase «en amor[a]».
    rationale: La instrucción exige que el marcador aparezca en el lugar relevante del texto. La nota explica la colocación sintáctica de ἐν ἀγάπῃ, no de «fundación del mundo».
  - severity: high
    issue: 'La nota c es incorrecta o inútil: «O, “para ser”» repite exactamente el texto principal.'
    rationale: La nota inglesa c documenta una traducción previa («for us to be»). En español, si el texto principal ya dice «para ser», esa nota no aporta alternativa real y no debe conservarse así.
  - severity: medium
    issue: «Sin mancha» en el texto principal no refleja la preferencia idiomática de la POB inglesa por «blameless».
    rationale: Aunque «sin mancha» es léxicamente válido, el rastro auditado explicitó una preferencia por una opción más natural en el cuerpo del texto y dejar la más literal como alternativa. «Irreprensibles» hace mejor esa función en español.
  - severity: low
    issue: La coma antes de «en amor» dificulta una ambigüedad sintáctica que el texto pretende preservar.
    rationale: Quitarla ayuda a que «en amor» pueda leerse tanto con lo anterior como, mediante la nota, con el v. 5, sin forzar una pausa innecesaria.
  revised_spanish_text: así como nos escogió en él antes de la fundación del mundo, para ser santos e irreprensibles delante de él en amor[a][b],
