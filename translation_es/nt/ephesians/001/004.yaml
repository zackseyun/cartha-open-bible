translation:
  language: es
  text: así como nos escogió en él antes de la fundación del mundo, para ser santos e irreprensibles delante de él en amor[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, la frase «en amor» puede tomarse con el versículo siguiente: «En amor nos predestinó ...»'
    reason: alternative_reading
  - marker: b
    text: O, «sin mancha».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: Introduce la relación comparativa/explicativa con lo anterior. 'Así como' conserva la fuerza de conexión de καθὼς en un español natural y solemne.
- source_word: ἐξελέξατο
  english_pob_choice: he chose
  chosen_spanish: nos escogió
  alternatives_spanish:
  - nos eligió
  - nos seleccionó
  lexicon: BDAG
  rationale: El verbo expresa elección divina. 'Escogió' comunica esa acción de manera clara y idiomática en español, sin cargar el término con una formulación sistemática ajena al griego.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre de objeto directo en español, correspondiente al objeto de ἐξελέξατο y conservando la primera persona plural.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - unidos a él
  - en unión con él
  lexicon: BDAG
  rationale: Mantiene la compacta expresión paulina de localización/unión. 'En él' sigue de cerca el griego y evita expandir el sentido más allá de lo que el texto dice.
- source_word: πρὸ καταβολῆς κόσμου
  english_pob_choice: before the foundation of the world
  chosen_spanish: antes de la fundación del mundo
  alternatives_spanish:
  - antes de que existiera el mundo
  - antes de la creación del mundo
  lexicon: BDAG
  rationale: Equivalente idiomático asentado que reproduce con fidelidad la referencia temporal y la imagen de origen/fundación del cosmos.
- source_word: εἶναι ἡμᾶς
  english_pob_choice: to be
  chosen_spanish: para ser
  alternatives_spanish:
  - para que fuéramos
  - que fuéramos
  lexicon: BDAG
  rationale: En español, el infinitivo final 'para ser' expresa con naturalidad la finalidad del infinitivo griego sin sobreinterpretar la construcción.
- source_word: ἁγίους
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: BDAG
  rationale: '''Santos'' es el equivalente bíblico habitual en español para ἅγιος en este contexto paulino, preservando tanto la idea de consagración como la de vida moral.'
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - irreprensibles
  - sin defecto
  lexicon: BDAG
  rationale: '''Sin mancha'' refleja bien el matiz cultual/moral de ἀμώμους y conserva la imagen de pureza no contaminada; la alternativa ''irreprensibles'' comunica el aspecto ético, pero pierde la resonancia imaginal.'
- source_word: κατενώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: BDAG
  rationale: '''Delante de él'' reproduce de forma transparente la idea de estar en la presencia/ante la mirada de Dios y funciona con claridad en español.'
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - por amor
  lexicon: BDAG
  rationale: Se mantiene la posición y la ambigüedad sintáctica de la frase final. 'En amor' sigue de cerca el griego; puede leerse con lo anterior o, según la nota, con el versículo siguiente.
theological_decisions:
- issue: Elección divina y posibles lecturas doctrinales de ἐξελέξατο
  english_pob_reading: he chose us
  chosen_spanish_reading: nos escogió
  alternative_spanish_readings:
  - nos eligió
  - nos predestinó
  rationale: El texto afirma elección divina, pero no obliga a introducir una formulación doctrinal más cerrada como 'predestinó' en este verbo. 'Escogió' preserva la afirmación bíblica sin ampliar el término más allá de su valor lexical.
  doctrine_reference: Translation philosophy §3
- issue: Ajuste sintáctico de ἐν ἀγάπῃ
  english_pob_reading: retain with verse 4 as 'before him in love' while preserving ambiguity in a footnote
  chosen_spanish_reading: mantener 'en amor' con el versículo 4 y documentar la posible unión con el versículo 5
  alternative_spanish_readings:
  - '''en amor'' unido al versículo 5: ''En amor nos predestinó...'''
  - tomarlo con lo anterior como cualidad del estado de santidad
  rationale: La frase final es genuinamente ambigua en griego. La traducción la deja en su lugar para no resolver artificialmente la sintaxis, y la nota preserva la alternativa de lectura con el versículo siguiente.
  doctrine_reference: Translation philosophy §3
- issue: Rango semántico de ἁγίους y ἀμώμους
  english_pob_reading: holy and blameless
  chosen_spanish_reading: santos y sin mancha
  alternative_spanish_readings:
  - santos e irreprensibles
  - consagrados y sin defecto
  rationale: '''Santos'' mantiene la convención bíblica y eclesial más reconocible en español, mientras que ''sin mancha'' conserva el matiz moral/cultual de ἀμώμους sin diluirlo en un término puramente legal.'
  doctrine_reference: Affirmations; lexical notes
- issue: Sentido de ἐν αὐτῷ en el contexto cristológico
  english_pob_reading: in him
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - en Cristo
  - unidos a él
  rationale: Se conserva el pronombre como en el griego y como en la POB inglesa, evitando sustituirlo por 'Cristo' sin necesidad textual inmediata. El contexto identifica al referente, pero la forma pronominal queda intacta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El audit trail inglés mantiene la ambigüedad de ἐν ἀγάπῃ y documenta 'without blemish' como alternativa de ἀμώμους; también muestra una revisión editorial menor en 'for us to be' > 'to be' por fluidez. La redacción española sigue la lectura final estable en inglés para el sentido, pero conserva explícitamente las dos alternativas relevantes en notas, sin forzar una resolución sintáctica que el griego no exige.
  spanish_consistency_notes:
  - Se preserva 'en él' para ἐν αὐτῷ, manteniendo el referente cristológico pronominal sin sustituirlo por un nombre propio.
  - '''Santos'' y ''sin mancha'' se eligieron por su equilibrio entre convención bíblica y resonancia cultual/moral.'
  - La frase final 'en amor' queda colocada al final del versículo como en el griego para respetar la ambigüedad de encuadre.
  - La puntuación reproduce la cadencia de una sola oración extensa, en consonancia con la sintaxis de Efesios 1:3-14.
