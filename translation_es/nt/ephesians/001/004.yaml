revisions:
- from: así como nos escogió en él antes de la fundación del mundo[a], para ser santos y sin mancha delante de él, en amor[c][b],
  to: así como nos escogió en él antes de la fundación del mundo, para ser santos e irreprensibles delante de él en amor[a][b],
  rationale: Se corrigieron los anclajes de notas para que correspondan a la frase relevante en el texto. Se eliminó la nota redundante sobre «para ser». Se cambió «sin mancha» por «irreprensibles» en el texto principal para reflejar mejor la decisión de la POB inglesa de usar un equivalente idiomático principal para ἀμώμους, dejando la opción más literal como nota. También se quitó la coma antes de «en amor» para preservar mejor la ambigüedad sintáctica del griego y mejorar la naturalidad del español.
