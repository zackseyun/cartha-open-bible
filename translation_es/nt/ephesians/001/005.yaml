translation:
  language: es
  text: habiéndonos predestinado para adopción[a] por medio de Jesús el Mesías[b] para sí mismo[c], conforme al beneplácito de su voluntad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para adopción como hijos»; el término griego alude a la adopción en el estatus de hijo, con énfasis en la herencia legal.
    reason: lexical_alternative
  - marker: b
    text: O «por medio de Jesucristo». «Mesías» traduce el título griego Χριστός.
    reason: alternative_reading
  - marker: c
    text: O «para él» o «hacia él»; la frase griega puede expresar dirección hacia Dios o finalidad respecto de él mismo.
    reason: alternative_reading
lexical_decisions:
- source_word: προορίσας
  english_pob_choice: having predestined
  chosen_spanish: habiéndonos predestinado
  alternatives_spanish:
  - habiéndonos decidido de antemano
  - habiéndonos preordenado
  lexicon: BDAG
  rationale: El aoristo participio expresa una acción anterior que modifica la bendición principal. «Predestinado» conserva la fuerza de προορίζω y el valor temporal de «antes». La forma compuesta «habiéndonos» refleja mejor la relación sintáctica con el objeto directo que un infinitivo suelto.
- source_word: εἰς υἱοθεσίαν
  english_pob_choice: for adoption
  chosen_spanish: para adopción[a]
  alternatives_spanish:
  - para adopción como hijos
  - para filiación
  lexicon: BDAG
  rationale: υἱοθεσία nombra la adopción con trasfondo legal y de herencia filial. «Adopción» es el núcleo más claro en español; la nota preserva la alternativa «como hijos» para no perder el matiz del término griego.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías[b]
  alternatives_spanish:
  - por medio de Jesús Cristo
  lexicon: BDAG
  rationale: διά con genitivo indica medio o agencia. «Por medio de» expresa bien esa función. «Mesías» traduce Χριστός como título, conforme a la preferencia editorial de traducir títulos cuando el contexto lo permite.
- source_word: εἰς αὐτόν
  english_pob_choice: to himself
  chosen_spanish: para sí mismo[c]
  alternatives_spanish:
  - hacia él
  - para él mismo
  lexicon: BDAG
  rationale: La frase es reflexiva y expresa orientación o finalidad respecto de Dios. «Para sí mismo» mantiene la relación reflexiva que el griego permite, sin forzar una paráfrasis teleológica más amplia.
- source_word: κατὰ τὴν εὐδοκίαν
  english_pob_choice: according to the good pleasure
  chosen_spanish: conforme al beneplácito
  alternatives_spanish:
  - según el buen placer
  - de acuerdo con su buena voluntad
  lexicon: BDAG
  rationale: 'κατά aquí significa correspondencia: «conforme a». εὐδοκία puede ser «buena disposición», «agrado» o «beneplácito»; en español bíblico «beneplácito» preserva el matiz de propósito favorable sin trivializarlo.'
- source_word: τοῦ θελήματος αὐτοῦ
  english_pob_choice: of his will
  chosen_spanish: de su voluntad
  alternatives_spanish:
  - de su querer
  - de su propósito
  lexicon: BDAG
  rationale: θέλημα se rinde de forma directa como «voluntad». Se evita expandirlo a «propósito», porque eso introduce interpretación no exigida por el lexema.
theological_decisions:
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός funciona como título, no como simple elemento nominal. «Mesías» mantiene el valor semántico del original y sigue la política de traducir títulos cuando el contexto lo justifica. Se conserva «Jesús» como nombre propio.
  doctrine_reference: Translate titles; transliterate names.
- issue: Alcance de υἱοθεσία
  english_pob_reading: adoption
  chosen_spanish_reading: adopción
  alternative_spanish_readings:
  - adopción como hijos
  - filiación
  rationale: El texto griego incluye el componente filial/legal de υἱοθεσία. En español, «adopción» es la forma más natural; el matiz de hijo/heredero queda señalado en la nota para no perder la tensión léxica. No se sustituye por un término doctrinal más amplio que el texto no usa.
  doctrine_reference: Preserve lexical tension rather than flatten it.
- issue: Sentido de εἰς αὐτόν
  english_pob_reading: to himself
  chosen_spanish_reading: para sí mismo
  alternative_spanish_readings:
  - para él
  - hacia él
  rationale: La construcción puede ser leída como dirección hacia Dios o como finalidad en relación consigo mismo. «Para sí mismo» conserva la ambigüedad funcional sin decidir prematuramente entre dirección y propósito. Se mantiene la tensión del original y del POB inglés.
  doctrine_reference: Preserve theological tension; avoid over-resolving referential nuances.
translation_notes:
  revision_awareness: Tomé como base el último estado auditado del inglés POB, incluyendo la restauración de «Messiah» frente a la revisión pasajera que había revertido el título a «Christ». También observé la revisión que simplificó «adoption as sons» a «adoption» en inglés; en español mantuve «adopción» en el texto principal y conservé en nota el matiz filial del griego. El orden y la sintaxis buscan seguir el participio aoristo y las dos frases preposicionales del griego sin forzar calcos innecesarios.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός, coherente con la política editorial y con el estado auditado más reciente.
  - Se usa «predestinado» para προορίσας, evitando suavizar el término.
  - Se mantiene «voluntad» para θέλημα y «beneplácito» para εὐδοκία, distinguiendo ambos lexemas.
  - La nota sobre υἱοθεσία preserva el matiz filial/legal sin introducir «siervos» o vocabulario ajeno al verso.
  - La frase final conserva la ambigüedad de εἰς αὐτόν sin decidirla de manera excesiva.
