id: EPH.1.3
reference: Ephesians 1:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ εὐλογήσας ἡμᾶς ἐν πάσῃ εὐλογίᾳ πνευματικῇ ἐν τοῖς ἐπουρανίοις ἐν Χριστῷ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/003.yaml
  text: Blessed be the God and Father of our Lord Jesus Messiah[a], who has blessed us with every spiritual blessing in the heavenly realms in Messiah[c][b],
  footnotes:
  - marker: a
    text: Or 'every blessing of the Spirit.' The Greek adjective can mean 'spiritual' more broadly or 'pertaining to the Spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the heavenly places.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''Jesus Christ'' and ''in Christ.'' The Greek title Χριστός is translated here as ''Messiah'' to preserve its meaning.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 8d76bad538c192e42ea1d6afc85f3ea451c111e94fff1c04708ff0ebfc675d60
    timestamp: '2026-04-18T10:43:45Z'
    output_hash: 6b57de5847fa4c2f9c5619441aa6cde0e16f0b49d3905b8f0070a7923ab5b62a
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:33Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah''/''Messiah'' with ''Christ'' for closer correspondence to Χριστοῦ/Χριστῷ and more natural consistency in this verse; retained the rest as accurate and complete. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Bendito sea el Dios y Padre de nuestro Señor Jesús Mesías[a], que nos ha bendecido con toda bendición espiritual[b] en las regiones celestiales[c] en Mesías[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús Cristo». El título Χριστός se traduce aquí como «Mesías» para preservar su significado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «bendición del Espíritu». El adjetivo griego puede significar «espiritual» en sentido amplio o «perteneciente al Espíritu».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en los lugares celestiales» o «en los cielos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Alabado sea
  lexicon: BDAG
  rationale: La forma griega funciona como una bendición/exclamación de alabanza dirigida a Dios. En español, «Bendito sea» comunica mejor el valor doxológico que un simple adjetivo predicativo plano.
- source_word: θεὸς καὶ πατὴρ
  english_pob_choice: the God and Father
  chosen_spanish: el Dios y Padre
  alternatives_spanish:
  - Dios y Padre
  lexicon: BDAG
  rationale: Se conserva la coordinación nominal y el matiz relacional de la fórmula paulina. El artículo en español ayuda a reflejar la expresión fija «el Dios y Padre».
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente natural y reverente para κύριος en este título cristológico. Mantiene el valor confesional del texto.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» conforme a la política terminológica del proyecto, preservando su valor de título y no solo de nombre propio.
- source_word: ὁ εὐλογήσας
  english_pob_choice: who has blessed
  chosen_spanish: que nos ha bendecido
  alternatives_spanish:
  - que nos bendijo
  lexicon: BDAG
  rationale: El aoristo participial se vierte con perfecto compuesto para expresar una acción concluida con resultado vigente, como en el contexto doxológico de Efesios 1.
- source_word: ἐν πάσῃ εὐλογίᾳ πνευματικῇ
  english_pob_choice: with every spiritual blessing
  chosen_spanish: con toda bendición espiritual
  alternatives_spanish:
  - en toda bendición espiritual
  - con toda bendición del Espíritu
  lexicon: BDAG
  rationale: «Con» refleja con naturalidad el sentido instrumental o de contenido en español después de «nos ha bendecido». «Bendición espiritual» conserva la amplitud semántica de πνευματικῇ sin resolverla de más.
- source_word: πνευματικῇ
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - del Espíritu
  lexicon: BDAG
  rationale: Se mantiene el sentido amplio de «espiritual» sin cerrar la posible relación con el Espíritu Santo, preservando la tensión interpretativa documentada por el POB inglés.
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly realms
  chosen_spanish: en los lugares celestiales
  alternatives_spanish:
  - en las regiones celestiales
  - en los cielos
  lexicon: BDAG
  rationale: «Lugares celestiales» es la equivalencia tradicional y clara en español para esta expresión paulina de esfera/ámbito celestial, sin volverla excesivamente espacial.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva la traducción terminológica de Χριστός como «Mesías» también en la frase preposicional, manteniendo la coherencia con el título del verso y su sentido de unión/esfera.
theological_decisions:
- issue: Traducción de Χριστός como título cristológico
  english_pob_reading: Messiah in both 'Jesus Messiah' and 'in Messiah'
  chosen_spanish_reading: Mesías en «Jesús Mesías» y «en Mesías»
  alternative_spanish_readings:
  - Cristo
  - Jesucristo
  - en Cristo
  rationale: La política del proyecto pide traducir Χριστός como «Mesías» cuando funciona como título. Aquí el título es plenamente activo en la doxología paulina, por lo que se preserva su contenido mesiánico en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Alcance de πνευματικῇ
  english_pob_reading: spiritual, with note that it could mean 'pertaining to the Spirit'
  chosen_spanish_reading: espiritual, con nota sobre la posible lectura «del Espíritu»
  alternative_spanish_readings:
  - del Espíritu
  - espiritual en sentido más general
  rationale: Se evita resolver el término solo en una dirección. La traducción principal deja abierta la relación con el Espíritu Santo, y la nota conserva la alternativa documentada por el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una ida y vuelta entre «Christ/Christ» y «Messiah/Messiah», con restauración final de «Messiah» por política doctrinal. También conserva la ambigüedad de πνευματικῇ mediante nota. La presente versión española sigue esa resolución final: traduce Χριστός como «Mesías» y mantiene una formulación abierta para πνευματικῇ, sin colapsar la tensión semántica.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός tanto en el título como en la frase final, coherente con la terminología del proyecto.
  - Se usa «Señor» para κύριος en el título cristológico, por ser el equivalente estándar y reverente en español.
  - «Lugares celestiales» conserva la expresión paulina fija y es idiomática en español bíblico contemporáneo.
  - La puntuación y el orden siguen de cerca la sintaxis griega sin sonar forzados en español.
