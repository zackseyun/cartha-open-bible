  rationale: Se ajusta la última frase para seguir la decisión auditada del POB y mejorar la naturalidad del español. 'El Espíritu Santo prometido' comunica con claridad el sentido más probable de τῷ πνεύματι τῆς ἐπαγγελίας τῷ ἁγίῳ, mientras que 'de la promesa' se conserva como alternativa formal en nota.
  reviewer_model: gpt-5.4
