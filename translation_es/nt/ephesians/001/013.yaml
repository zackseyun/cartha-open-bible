review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego en casi todo: ''En él'', ''ustedes también'', ''cuando oyeron'', ''cuando creyeron'', y ''fueron sellados'' reflejan adecuadamente ἐν ᾧ, καὶ ὑμεῖς, los participios aoristos y ἐσφραγίσθητε. Sin embargo, en τῷ πνεύματι τῆς ἐπαγγελίας τῷ ἁγίῳ el texto fuente y la revisión inglesa auditada favorecen la lectura más natural ''el Espíritu Santo prometido'' / ''the promised Holy Spirit''. La redacción actual ''el Espíritu Santo de la promesa'' conserva una posibilidad formal, pero en español suena menos natural y no preserva bien la decisión auditada principal del POB.'
  spanish_quality_summary: El español es claro y digno, pero 'el Espíritu Santo de la promesa' resulta algo rígido y poco idiomático en español bíblico contemporáneo. Cambiarlo a 'el Espíritu Santo prometido' mejora notablemente la naturalidad sin perder fidelidad. Además, la nota correspondiente debe invertirse para preservar la alternativa formal 'de la promesa' como variante, en vez de dejar como nota la formulación más natural que debería estar en el texto principal.
  glossary_alignment: 'La terminología clave está bien alineada: ''Espíritu Santo'', ''evangelio'', ''salvación'', ''palabra de la verdad''. No hay conflicto con las directrices de Yahvé/Mesías/esclavo, etc. El punto principal es alinear τῆς ἐπαγγελίας con la decisión POB auditada: en español conviene usar ''prometido'' en el texto principal y dejar ''de la promesa'' como alternativa formal.'
  issues:
  - severity: medium
    issue: La frase principal 'el Espíritu Santo de la promesa' no sigue la decisión principal del audit trail inglés.
    rationale: La revisión inglesa final cambió a 'the promised Holy Spirit' por ser más natural y exacto. El español debería reflejar esa decisión, salvo razón fuerte en contra, que aquí no aparece.
  - severity: medium
    issue: La nota [c] está invertida respecto de la mejor elección principal para español.
    rationale: Si el texto principal pasa a 'el Espíritu Santo prometido', la alternativa formal 'el Espíritu Santo de la promesa' debe quedar en nota, no al revés.
  revised_spanish_text: En él[a], ustedes también, cuando oyeron la palabra de la verdad, el evangelio de su salvación[b], y cuando creyeron en él, fueron sellados con el Espíritu Santo prometido[c].
  revised_footnotes:
  - marker: a
    text: 'O: «en quien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la buena noticia de su salvación».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el Espíritu Santo de la promesa».'
    reason: alternative_reading
  revision_rationale: Se ajusta la última frase para seguir la decisión auditada del POB y mejorar la naturalidad del español. 'El Espíritu Santo prometido' comunica con claridad el sentido más probable de τῷ πνεύματι τῆς ἐπαγγελίας τῷ ἁγίῳ, mientras que 'de la promesa' se conserva como alternativa formal en nota.
