translation:
  language: es
  text: En él[a], ustedes también, cuando oyeron la palabra de la verdad, el evangelio de su salvación[b], y cuando creyeron en él, fueron sellados con el Espíritu Santo prometido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en quien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la buena noticia de su salvación».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el Espíritu Santo de la promesa».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - En quien
  lexicon: BDAG
  rationale: La referencia es a Cristo/Mesías del contexto inmediato; en español, 'en él' conserva de forma natural la unión con Cristo sin forzar el relativo 'en quien', que suena más rígido.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes asimismo
  lexicon: BDAG
  rationale: '''También'' conserva el valor aditivo de καὶ y marca la inclusión de los destinatarios junto con los hablantes del contexto anterior.'
- source_word: ἀκούσαντες
  english_pob_choice: when you heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - después de oír
  lexicon: BDAG
  rationale: El aoristo participial se expresa con una relación temporal anterior o concomitante al verbo principal; 'cuando oyeron' es natural en español y no añade una secuencia interpretativa más fuerte de la que exige el griego.
- source_word: τὸν λόγον τῆς ἀληθείας
  english_pob_choice: the word of truth
  chosen_spanish: la palabra de la verdad
  alternatives_spanish:
  - el mensaje de la verdad
  - la palabra verdadera
  lexicon: BDAG
  rationale: '''λόγος'' puede ser ''palabra'' o ''mensaje''; se conserva la expresión paulina habitual con ''palabra de la verdad'', que reproduce bien el genitivo y su tono bíblico.'
- source_word: τὸ εὐαγγέλιον τῆς σωτηρίας ὑμῶν
  english_pob_choice: the good news of your salvation
  chosen_spanish: el evangelio de su salvación
  alternatives_spanish:
  - la buena noticia de su salvación
  - el evangelio de la salvación de ustedes
  lexicon: BDAG
  rationale: Se eligió 'evangelio' porque en español eclesial es el equivalente asentado de εὐαγγέλιον y preserva la formulación patrística/paulina; el genitivo se mantiene como contenido perteneciente a ellos ('su salvación').
- source_word: πιστεύσαντες
  english_pob_choice: when you believed
  chosen_spanish: cuando creyeron
  alternatives_spanish:
  - al creer
  - después de creer
  lexicon: BDAG
  rationale: Como el participio aoristo antecede al verbo principal, 'cuando creyeron' comunica bien la relación temporal sin convertirla en una tesis doctrinal sobre el orden de la salvación.
- source_word: ἐσφραγίσθητε
  english_pob_choice: were sealed
  chosen_spanish: fueron sellados
  alternatives_spanish:
  - quedaron sellados
  - recibieron un sello
  lexicon: BDAG
  rationale: '''Sellar'' conserva la metáfora bíblica de autenticación/pertenencia; el pasivo se traduce de forma directa como ''fueron sellados''.'
- source_word: τῷ πνεύματι τῆς ἐπαγγελίας τῷ ἁγίῳ
  english_pob_choice: the promised Holy Spirit
  chosen_spanish: el Espíritu Santo de la promesa
  alternatives_spanish:
  - el Espíritu Santo prometido
  - el Espíritu Santo prometido por Dios
  lexicon: BDAG
  rationale: La construcción griega es compacta y permite tanto 'prometido' como 'de la promesa'. Se preserva la forma nominal 'de la promesa' para no perder el matiz de título y para evitar imponer una paráfrasis interpretativa más amplia que el texto.
theological_decisions:
- issue: Relación entre oír, creer y ser sellados
  english_pob_reading: The participles are rendered as antecedent in sequence ('when you heard ... when you believed ... were sealed') without making a denominational claim about the precise timing of salvation or Spirit reception beyond what the Greek indicates.
  chosen_spanish_reading: Los participios se traducen con secuencia temporal natural ('cuando oyeron ... cuando creyeron ... fueron sellados') sin fijar una postura denominacional sobre el momento exacto de la salvación o de la recepción del Espíritu.
  alternative_spanish_readings:
  - al oír ... al creer ... fueron sellados
  - después de oír ... después de creer ... fueron sellados
  rationale: El griego usa participios aoristos que normalmente preceden o acompañan el verbo finito; el español mantiene la secuencia sin sobreinterpretar debates sobre ordo salutis.
  doctrine_reference: Efesios 1:13; comparación con la sintaxis de participios aoristos en el NT
- issue: Identificación del Espíritu Santo como prometido
  english_pob_reading: Rendered as a genitival title, 'the Holy Spirit of promise,' understood as the Spirit promised by God.
  chosen_spanish_reading: Se conserva 'el Espíritu Santo de la promesa' como título genitival, entendible como el Espíritu prometido por Dios.
  alternative_spanish_readings:
  - el Espíritu Santo prometido
  - el Espíritu Santo, la promesa
  rationale: La frase griega es condensada; en español, 'de la promesa' preserva la ambigüedad útil entre título y cualidad prometida, sin cerrar prematuramente el sentido.
  doctrine_reference: Lucas 24:49; Hechos 1:4-5; Efesios 1:13
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión en inglés: se evitó la primera solución literal (''en él también...'') y la formulación más pesada ''después de oír/después de creer''; también se reconoció que la revisión final inglesa prefirió ''the promised Holy Spirit''. En español se conservó la naturalidad con ''cuando oyeron... cuando creyeron...'' y se mantuvo el valor genitival de ''de la promesa'' sin borrar la alternativa interpretativa.'
  spanish_consistency_notes:
  - Se usa 'usted(es)' como tratamiento plural respetuoso e impersonal de destinatarios epistolares, consistente con un registro bíblico neutral.
  - '''Evangelio'' se mantiene como término técnico estable para εὐαγγέλιον en el cuerpo principal, con alternativa más explicativa en nota.'
  - '''Espíritu Santo'' se capitaliza por ser título divino; ''de la promesa'' se deja en minúsculas como complemento genitival.'
  - No se introduce 'Cristo' en el texto porque el antecedente inmediato es 'él' y la versión española conserva el enlace pronominal sin perder la referencia contextualmente identificable.
