revisions:
- from: la cual él obró en el Mesías, al resucitarlo de entre los muertos y sentarlo a su diestra en los lugares celestiales[a][b].
  to: la cual él obró en el Mesías[a], cuando lo resucitó de entre los muertos y lo sentó a su diestra en los lugares celestiales[b].
  rationale: Se ajustó la secuencia verbal a una forma más natural y simétrica en español («cuando lo resucitó ... y lo sentó»), manteniendo intacto el sentido de los participios griegos. Se conservaron «Mesías», «de entre los muertos», «a su diestra» y «en los lugares celestiales» por fidelidad al original y a las decisiones auditadas. La nota [b] se simplificó para preservar una alternativa léxica útil sin añadir explicación interpretativa innecesaria.
