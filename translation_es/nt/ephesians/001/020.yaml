translation:
  language: es
  text: la cual él obró en el Mesías[a], cuando lo resucitó de entre los muertos y lo sentó a su diestra en los lugares celestiales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo».
    reason: alternative_reading
  - marker: b
    text: O «en las regiones celestiales».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El pronombre relativo femenino retoma un antecedente femenino implícito en el contexto inmediato. «La cual» conserva mejor la referencia y la continuidad sintáctica que un simple «que».
- source_word: ἐνήργηκεν
  english_pob_choice: worked
  chosen_spanish: obró
  alternatives_spanish:
  - actuó
  - produjo
  - puso en efecto
  lexicon: BDAG
  rationale: El verbo expresa una acción eficaz de Dios. «Obró» comunica operación efectiva en español sin reducirlo a una mera actividad genérica.
- source_word: ἐν τῷ Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como nombre propio. Se preserva el valor mesiánico con «Mesías», siguiendo la preferencia terminológica del proyecto.
- source_word: ἐγείρας
  english_pob_choice: when he raised
  chosen_spanish: al resucitarlo
  alternatives_spanish:
  - cuando lo resucitó
  - resucitándolo
  lexicon: BDAG
  rationale: El participio aoristo expresa circunstancia concomitante o medio respecto del verbo principal. «Al resucitarlo» transmite bien esa relación en un español natural.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos y vivos
  lexicon: BDAG
  rationale: La expresión es la fórmula habitual de resurrección. «De entre los muertos» mantiene el sentido colectivo del plural y evita un giro menos preciso.
- source_word: καθίσας
  english_pob_choice: and seated
  chosen_spanish: y sentarlo
  alternatives_spanish:
  - y lo sentó
  - y habiéndolo sentado
  lexicon: BDAG
  rationale: Se conserva la coordinación de acciones divinas. En español, «sentarlo» con valor causativo refleja el acto de entronización sin forzar una perífrasis más pesada.
- source_word: ἐν δεξιᾷ αὐτοῦ
  english_pob_choice: at his right hand
  chosen_spanish: a su diestra
  alternatives_spanish:
  - a su derecha
  - a su mano derecha
  lexicon: BDAG
  rationale: Es una expresión idiomática de honor y autoridad. «Diestra» es una forma bíblica clara y digna en español, equivalente a «right hand» sin literalismo corporal.
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly places
  chosen_spanish: en los lugares celestiales
  alternatives_spanish:
  - en las regiones celestiales
  - en los cielos
  lexicon: BDAG
  rationale: La frase paulina refiere la esfera celestial. «Lugares celestiales» es la opción más directa y reconocible en español, preservando el plural del original.
theological_decisions:
- issue: Rendering of Χριστῷ as title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva el matiz titular y mesiánico del griego, en línea con la pauta del proyecto de usar «Mesías» cuando el contexto es claramente titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Χριστός = Mesías cuando es título/contexto'
- issue: Expression ἐν τοῖς ἐπουρανίοις
  english_pob_reading: in the heavenly places
  chosen_spanish_reading: en los lugares celestiales
  alternative_spanish_readings:
  - en el cielo
  - en las regiones celestiales
  rationale: La expresión no describe simplemente el cielo físico, sino la esfera celestial de exaltación y autoridad. «Lugares celestiales» preserva esa lectura tradicional sin perder claridad.
  doctrine_reference: 'DOCTRINE.md: translation philosophy on readable modern Spanish and documented consistency'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el ajuste final del audit trail inglés, manteniendo la lectura directa de ἐν τοῖς ἐπουρανίοις como «lugares celestiales» y conservando la secuencia de acciones divinas: resucitar y sentar. Se prefirió un español publication-readable, con terminología consistente y sin aplanar el valor titular de Χριστός.'
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός, conforme al criterio del proyecto y al uso titular del contexto.
  - Se eligió «de entre los muertos» para mantener la fuerza idiomática de la resurrección.
  - «A su diestra» conserva el valor bíblico de honor/entronización de ἐν δεξιᾷ αὐτοῦ.
  - La colocación de notas [a][b] al final de la cláusula refleja las dos alternativas documentadas en el audit trail.
  - No se introdujo «Cristo» como nombre fijo, porque el contexto favorece la lectura titular de Mesías.
