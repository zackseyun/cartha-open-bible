  timestamp: '2026-05-07T21:14:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: la cláusula relativa retoma correctamente el antecedente femenino previo; «obró» representa adecuadamente ἐνήργηκεν; «en el Mesías» conserva el valor titular de Χριστῷ; «de entre los muertos» y «en los lugares celestiales» son fieles al original y al rastro auditado en inglés. La principal desviación está en la secuencia participial final: «al resucitarlo ... y sentarlo» queda algo asimétrica y menos natural en español que una coordinación finita o paralela.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «la cual» suena algo rígido en continuidad paulina, y sobre todo «y sentarlo» suena menos idiomático que «y lo sentó». «A su diestra» es aceptable y bíblico; «en los lugares celestiales» también. La nota [b] introduce una explicación («en el cielo/la esfera celestial») que no corresponde exactamente al patrón de alternativa preservada en el inglés y puede sobreexplicar más allá de lo necesario.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Χριστός -> «Mesías» como título; no hay conflicto con otros términos doctrinales. «Lugares celestiales» concuerda con la revisión auditada del inglés. La alternativa «en Cristo» debe conservarse en nota [a].'
  issues:
  - severity: medium
    issue: Construcción «al resucitarlo ... y sentarlo»
    rationale: Aunque comprensible, mezcla una construcción preposicional con un infinitivo coordinado y resulta menos natural que «cuando lo resucitó ... y lo sentó» o una coordinación más paralela. El griego presenta dos participios aoristos coordinados; en español conviene una estructura más fluida.
  - severity: low
    issue: «La cual» suena algo acartonado
    rationale: Es fiel, pero «que» suele sonar más natural en español contemporáneo. Sin embargo, mantener «la cual» no distorsiona el sentido y puede tolerarse en registro bíblico.
  - severity: low
    issue: Nota [b] sobreexplica la alternativa
    rationale: El rastro inglés preserva como alternativa «in the heavenly places», no una glosa interpretativa extensa. En español basta con una nota breve que preserve la alternativa relevante sin introducir formulaciones no auditadas.
  revised_spanish_text: la cual él obró en el Mesías[a], cuando lo resucitó de entre los muertos y lo sentó a su diestra en los lugares celestiales[b].
  revised_footnotes:
  - marker: a
    text: O «en Cristo».
