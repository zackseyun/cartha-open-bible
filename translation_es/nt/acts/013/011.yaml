base_translation:
  language: en
  yaml_path: translation/nt/acts/013/011.yaml
  text: And now[a], behold, the hand of the Lord is upon you, and you will be blind, not seeing the sun for a time. Immediately a mist and darkness fell upon him, and going about[c][b], he was seeking people to lead him by the hand.
