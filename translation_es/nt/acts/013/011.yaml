revisions:
- from: Y ahora[a], mira, la mano del Señor está sobre ti, y quedarás ciego, sin ver el sol por un tiempo[b]. Al instante cayó sobre él una neblina y oscuridad, y andando alrededor, buscaba quienes lo llevaran de la mano.
  to: Y ahora[a], mira, la mano del Señor está sobre ti, y quedarás ciego, sin ver el sol por un tiempo[b]. Al instante cayó sobre él una neblina y oscuridad, y yendo de un lado a otro, buscaba quien lo llevara de la mano.
  rationale: Se reubica correctamente la nota [b] en «por un tiempo», se sustituye «andando alrededor» por «yendo de un lado a otro» para un español más natural y fiel al contexto de ceguera súbita, y se pule la cláusula final a «buscaba quien lo llevara de la mano» para conservar la concreción de χειραγωγούς sin dureza sintáctica.
