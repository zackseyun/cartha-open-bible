translation:
  language: es
  text: Y ahora[a], mira, la mano del Señor está sobre ti, y quedarás ciego, sin ver el sol por un tiempo[b]. Al instante cayó sobre él una neblina y oscuridad, y yendo de un lado a otro, buscaba quien lo llevara de la mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí».
    reason: lexical_alternative
  - marker: b
    text: O «por una temporada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - fíjate
  lexicon: BDAG
  rationale: El griego funciona como llamada de atención. En español, «mira» conserva la fuerza deíctica con un registro natural; «he aquí» es más tradicional pero menos corriente.
- source_word: χεὶρ κυρίου
  english_pob_choice: the hand of the Lord
  chosen_spanish: la mano del Señor
  alternatives_spanish:
  - la mano de Yahvé
  - la mano del Señor sobre ti
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica transparente sin explicarla en exceso. «Del Señor» respeta el sentido de κύριος en este contexto de juicio divino; «Yahvé» sería posible si se quisiera explicitar el nombre divino, pero el contexto inmediato griego usa κύριος.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος se refiere al Señor en sentido divino-judicial, por lo que «Señor» es la forma natural y reverente en español.
- source_word: ἔσῃ τυφλός
  english_pob_choice: you will be blind
  chosen_spanish: quedarás ciego
  alternatives_spanish:
  - serás ciego
  - te pondrás ciego
  lexicon: BDAG
  rationale: «Quedarás ciego» expresa bien el resultado repentino de la sentencia y suena más natural que una construcción demasiado literal. Mantiene el futuro de estado del griego.
- source_word: μὴ βλέπων τὸν ἥλιον
  english_pob_choice: not seeing the sun
  chosen_spanish: sin ver el sol
  alternatives_spanish:
  - no viendo el sol
  - sin poder ver el sol
  lexicon: BDAG
  rationale: Se conserva la imagen concreta del sol. «Sin ver» comunica con naturalidad la construcción participial negativa sin añadir más de lo necesario.
- source_word: ἄχρι καιροῦ
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por una temporada
  - hasta cierto tiempo
  lexicon: BDAG
  rationale: Expresa bien el período temporal indefinido y limitado. «Por un tiempo» es más natural en español que una calca como «hasta un tiempo».
- source_word: παραχρῆμα
  english_pob_choice: Immediately
  chosen_spanish: Al instante
  alternatives_spanish:
  - Inmediatamente
  - De pronto
  lexicon: BDAG
  rationale: Marca la inmediatez de la acción con un español claro y sobrio.
- source_word: ἀχλὺς
  english_pob_choice: a mist
  chosen_spanish: una neblina
  alternatives_spanish:
  - una bruma
  - una niebla
  lexicon: BDAG
  rationale: «Neblina» preserva la imagen visual de una opacidad leve que afecta la vista. Encaja bien con la secuencia junto a «oscuridad».
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombra
  lexicon: BDAG
  rationale: «Oscuridad» es el equivalente directo y claro; «tinieblas» sería más solemne, pero menos neutral.
- source_word: περιάγων
  english_pob_choice: going about
  chosen_spanish: andando alrededor
  alternatives_spanish:
  - dando vueltas
  - vagando
  lexicon: BDAG
  rationale: El participio describe un moverse desorientado sin añadir una interpretación demasiado fuerte. «Andando alrededor» mantiene la literalidad funcional del giro griego.
- source_word: χειραγωγούς
  english_pob_choice: people to lead him by the hand
  chosen_spanish: quienes lo llevaran de la mano
  alternatives_spanish:
  - guías
  - personas que lo guiaran de la mano
  lexicon: BDAG
  rationale: χειραγωγός conserva la idea concreta de conducir a alguien físicamente de la mano. La formulación elegida mantiene esa especificidad sin sonar forzada en español.
theological_decisions:
- issue: La expresión 'la mano del Señor'
  english_pob_reading: Retained as a literal idiom for divine action/judgment without paraphrasing it as punishment or curse.
  chosen_spanish_reading: Se conserva como modismo bíblico literal de acción divina y juicio, sin convertirlo en una explicación interpretativa.
  alternative_spanish_readings:
  - la sentencia del Señor está sobre ti
  - el Señor te está castigando
  rationale: El texto comunica intervención divina, pero la traducción debe dejar visible la metáfora bíblica. Así se preserva la tensión entre imagen y sentido judicial sin resolverla demasiado pronto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió un registro más formal para ἰδοὺ y una traducción más literal de περιάγων; la propuesta española sigue ese criterio al usar «mira» como llamada de atención natural y «andando alrededor» para no añadir matiz interpretativo excesivo. También conserva la temporalidad indeterminada de ἄχρι καιροῦ con «por un tiempo».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en sentido divino, coherente con el proyecto.
  - Se evita sustituir la metáfora de la mano por una paráfrasis doctrinal.
  - Se conserva el contraste visual entre «neblina» y «oscuridad» para reflejar ἀχλύς y σκότος.
  - No se usa «Cristo» ni terminología eclesiástica ajena al texto.
  - La puntuación española separa con claridad las dos escenas del versículo.
