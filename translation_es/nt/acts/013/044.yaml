  verdict: revise
  source_alignment_summary: 'El borrador español comunica bien el sentido básico del griego: temporalidad futura del sábado, reunión casi total de la ciudad, propósito de oír, y preservación de «la palabra del Señor». Sin embargo, la nota a invierte mal las alternativas del inglés: el texto principal ya dice «sábado siguiente», pero la nota ofrece de nuevo «sábado siguiente» en lugar de una alternativa distinta como «sábado próximo» o «sábado venidero».'
  spanish_quality_summary: El español es claro y natural. No obstante, «En el sábado siguiente» suena menos idiomático que «El sábado siguiente» o «En el siguiente sábado». Para lectura bíblica fluida, «El sábado siguiente» es preferible. La nota b es mayormente útil, pero «la palabra que pertenece al Señor» resulta algo torpe; puede simplificarse para mantener claridad.
  glossary_alignment: La renderización de κύριος como «Señor» está alineada con el audit trail y la política del proyecto para κύριος en el NT. La conservación de «la palabra» para λόγος también está bien alineada. No hay conflicto relevante con la preferencia de «Yahvé», porque aquí la fuente inmediata es κύριος griego y el expediente inglés documenta «Lord».
  issues:
  - severity: medium
    issue: La nota a repite el texto principal en vez de ofrecer una alternativa real.
    rationale: 'El inglés conserva alternativas distintas: «On the next Sabbath» / «On the following Sabbath». En español, si el texto principal usa «sábado siguiente», la nota debe ofrecer opciones diferentes como «sábado próximo» o «sábado venidero», no repetir «sábado siguiente».'
  - severity: low
    issue: «En el sábado siguiente» es menos natural que «El sábado siguiente».
    rationale: El dativo temporal se vierte naturalmente en español sin preposición en este contexto narrativo. Es un ajuste estilístico menor, no un problema de fidelidad.
  - severity: low
    issue: La frase de la nota b «la palabra que pertenece al Señor» suena poco idiomática.
    rationale: La nota debe aclarar posibilidades semánticas sin introducir un giro español extraño. «la palabra del Señor» / «el mensaje del Señor» / «el mensaje acerca del Señor» bastan.
  revised_spanish_text: El sábado siguiente[a], casi toda la ciudad se reunió para oír la palabra del Señor[b].
  revised_footnotes:
