translation:
  language: es
  text: El sábado siguiente[a], casi toda la ciudad se reunió para oír la palabra del Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El sábado próximo» o «El sábado venidero».
    reason: lexical_alternative
  - marker: b
    text: «La palabra del Señor» también puede entenderse como «el mensaje del Señor» o, según el contexto, «el mensaje acerca del Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: Τῷ δὲ ἐρχομένῳ σαββάτῳ
  english_pob_choice: On the coming Sabbath
  chosen_spanish: En el sábado siguiente
  alternatives_spanish:
  - En el sábado que venía
  - En el próximo sábado
  lexicon: BDAG
  rationale: El dativo temporal con ἐρχομένῳ indica un sábado venidero o siguiente. En español, «sábado siguiente» comunica con naturalidad la relación temporal sin perder la idea de continuidad respecto al sábado anterior.
- source_word: σχεδὸν
  english_pob_choice: nearly
  chosen_spanish: casi
  alternatives_spanish:
  - aproximadamente
  - por poco
  lexicon: BDAG
  rationale: σχεδόν expresa aproximación. «Casi» es la equivalencia más directa y natural en español para el alcance cuantitativo de la frase.
- source_word: πᾶσα ἡ πόλις
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - casi la población entera de la ciudad
  lexicon: BDAG
  rationale: La expresión es idiomática y probablemente hiperbólica, no necesariamente absoluta. «Toda la ciudad» conserva la fuerza colectiva del griego en español fluido.
- source_word: συνήχθη
  english_pob_choice: gathered together
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - se congregó
  lexicon: BDAG
  rationale: 'El aoristo pasivo tiene sentido intransitivo: la gente se congregó. «Se reunió» comunica bien la acción colectiva en español moderno; la noción de reunión está suficientemente presente sin forzar un calco.'
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Oír» reproduce de manera directa el verbo del texto; «escuchar» podría sugerir una atención más intensa de la que el griego exige.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra predicada
  lexicon: BDAG
  rationale: Aunque λόγος puede significar «mensaje» o «discurso», el texto de Hechos usa frecuentemente «la palabra» como fórmula para la proclamación. Se mantiene ese lenguaje recurrente sin expandirlo innecesariamente.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Amo
  lexicon: BDAG
  rationale: El contexto griego usa κύριος, y el audit trail inglés lo rinde «Lord». En español, la forma bíblica y transparente es «Señor» en este sintagma fijo; no se desambiguó explícitamente como «Yahvé» porque el giro funciona aquí como fórmula proclamatoria y el texto auditado preserva la ambigüedad reverencial.
theological_decisions:
- issue: Alcance de «la palabra del Señor»
  english_pob_reading: Retain the traditional phrase rather than interpretively expanding it to 'the Lord's message' or 'the message about the Lord.'
  chosen_spanish_reading: Conservar «la palabra del Señor» sin expansión interpretativa
  alternative_spanish_readings:
  - la palabra del Señor, es decir, el mensaje del Señor
  - el mensaje acerca del Señor
  rationale: La construcción genitiva admite varias relaciones semánticas. Mantener la frase tradicional preserva la tensión textual y la ambigüedad teológica presente en el original y en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El proyecto define κύριος como «Lord»; en español, la equivalencia estable y reverente es «Señor». Esto conserva el registro bíblico y la referencia abierta sin forzar una lectura más estrecha.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto base y con el control de revisión más reciente; no se identificaron cambios aplicados en la última pasada, y la presente redacción mantiene esa estabilidad con ajustes mínimos para naturalidad española.
  spanish_consistency_notes:
  - Se mantuvo el estilo POB de traducción fuente-cercana con español moderno y digno.
  - «Señor» se usó para κύριος en coherencia con el registro bíblico del proyecto.
  - Se preservó la ambigüedad de λόγον τοῦ κυρίου mediante nota sin resolverla en el texto principal.
  - «Casi toda la ciudad» conserva el valor hiperbólico/colectivo del original sin absolutizarlo.
