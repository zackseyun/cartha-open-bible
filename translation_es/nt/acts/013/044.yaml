    text: O «El sábado próximo» o «El sábado venidero».
    reason: lexical_alternative
  - marker: b
    text: «La palabra del Señor» también puede entenderse como «el mensaje del Señor» o, según el contexto, «el mensaje acerca del Señor».
    reason: alternative_reading
  revision_rationale: Se ajusta la expresión temporal a un español más natural y se corrige la nota a para que preserve verdaderas alternativas documentadas en el audit trail inglés. También se pule la nota b para mayor claridad idiomática sin perder la ambigüedad semántica que el POB desea conservar.
