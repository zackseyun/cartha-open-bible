translation:
  language: es
  text: Después de que se despidió la sinagoga[a], muchos de los judíos y de los prosélitos devotos siguieron a Pablo y a Bernabé, quienes, hablando con ellos, los exhortaban[b] a continuar[c] en la gracia de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después de que la sinagoga se disolvió» o «Después de que la asamblea se despidió». El griego puede referirse a la despedida de la congregación reunida más que al edificio mismo.
    reason: lexical_alternative
  - marker: b
    text: O «los persuadían». El verbo griego puede expresar persuasión o exhortación insistente.
    reason: lexical_alternative
  - marker: c
    text: O «permanecer» o «perseverar». προσμένω puede indicar seguir, mantenerse o perseverar en algo.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυθείσης δὲ τῆς συναγωγῆς
  english_pob_choice: After the synagogue had been dismissed
  chosen_spanish: Después de que se disolvió la sinagoga
  alternatives_spanish:
  - Después de que la sinagoga fue despedida
  - Cuando se disolvió la asamblea de la sinagoga
  - Después de que se disolvió la reunión de la sinagoga
  lexicon: SBLGNT / BDAG / POB audit trail
  rationale: λύω en genitivo absoluto marca una circunstancia previa concluida; en español, «se disolvió» expresa bien el cierre de la reunión. «Sinagoga» mantiene la referencia al grupo reunido, como en el contexto auditado, sin añadir innecesariamente «reunión» al texto principal.
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: siguieron
  alternatives_spanish:
  - fueron tras
  - acompañaron
  - iban detrás de
  lexicon: BDAG
  rationale: El verbo puede significar seguir en sentido literal; «siguieron» es natural y directo en español, y conserva la secuencia narrativa.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de entre los judíos
  - de los judíos presentes
  lexicon: BDAG
  rationale: El genitivo partitivo se expresa de modo natural con «de los judíos».
- source_word: τῶν σεβομένων προσηλύτων
  english_pob_choice: devout proselytes
  chosen_spanish: de los prosélitos devotos
  alternatives_spanish:
  - de los prosélitos piadosos
  - de los prosélitos temerosos de Dios
  lexicon: BDAG
  rationale: προσήλυτος designa a un prosélito, es decir, un convertido al judaísmo; «prosélitos devotos» preserva la combinación de conversión y reverencia sin sustituirla por una expresión más interpretativa.
- source_word: προσλαλοῦντες αὐτοῖς
  english_pob_choice: speaking with them
  chosen_spanish: hablándoles
  alternatives_spanish:
  - hablando con ellos
  - dirigiéndoles la palabra
  lexicon: BDAG
  rationale: El participio indica acción acompañante; «hablándoles» es conciso y natural. No añade un matiz de debate que el griego no exige.
- source_word: ἔπειθον
  english_pob_choice: were urging
  chosen_spanish: los persuadían
  alternatives_spanish:
  - los exhortaban
  - insistían con ellos
  - los animaban
  lexicon: BDAG
  rationale: πείθω conserva la idea de persuadir/convencer; aquí, por el contexto exhortativo, «los persuadían» mantiene la fuerza verbal sin resolver la tensión entre persuasión e instar. Se deja abierta la alternativa de exhortación en la nota.
- source_word: αὐτοὺς προσμένειν
  english_pob_choice: them to continue
  chosen_spanish: a perseverar
  alternatives_spanish:
  - a continuar
  - a permanecer
  - a seguir firmes
  lexicon: BDAG
  rationale: προσμένω significa continuar, permanecer, perseverar. Dado el complemento con «en la gracia de Dios», «perseverar» comunica bien la continuidad fiel exigida por el verbo.
- source_word: τῇ χάριτι τοῦ θεοῦ
  english_pob_choice: in the grace of God
  chosen_spanish: en la gracia de Dios
  alternatives_spanish:
  - en la gracia de Dios
  - en el favor de Dios
  - en la gracia que viene de Dios
  lexicon: BDAG
  rationale: «Gracia» conserva el término teológico central y el dativo con προσμένειν se expresa naturalmente con «en».
theological_decisions:
- issue: Alcance de τῇ χάριτι τοῦ θεοῦ
  english_pob_reading: continue in the grace of God
  chosen_spanish_reading: perseverar en la gracia de Dios
  alternative_spanish_readings:
  - continuar en la gracia de Dios
  - permanecer en la gracia de Dios
  - seguir en la gracia de Dios
  rationale: La frase puede abarcar tanto la esfera de la gracia divina como la perseverancia dentro de ella. «Perseverar» conserva el llamado a una continuidad activa sin cerrar el sentido a una sola lectura doctrinal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'El borrador español sigue de cerca la forma revisada más directa del inglés auditado: «After the synagogue had been dismissed» frente a «synagogue meeting», manteniendo el sentido de una asamblea concluida. También conserva la tensión reconocida en πείθω y προσμένω, sin convertirlas en paráfrasis interpretativas. Se evitó la opción inglesa anterior «and devout proselytes» como estructura repetida, pero en español la formulación «de los prosélitos devotos» ya es idiomática y fiel.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el nombre divino explícito; aquí el texto tiene «Dios», por lo que se mantiene «Dios».
  - Se eligió «prosélitos» para προσηλύτων conforme al valor lexical de conversos al judaísmo, no «temerosos de Dios», que sería otra categoría en Hechos.
  - Se mantuvo «gracia» y no se la sustituyó por «favor», para preservar el peso teológico del término en el contexto apostólico.
  - Se prefirió «perseverar» en el texto principal por la fuerza aspectual de προσμένειν, mientras las notas conservan alternativas como «continuar» y «permanecer».
