  text: λυθείσης δὲ τῆς συναγωγῆς ἠκολούθησαν πολλοὶ τῶν Ἰουδαίων καὶ τῶν σεβομένων προσηλύτων τῷ Παύλῳ καὶ τῷ Βαρναβᾷ, οἵτινες προσλαλοῦντες ⸀αὐτοῖς ἔπειθον· αὐτοὺς ⸀προσμένειν τῇ χάριτι τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/043.yaml
  text: After the synagogue had been dismissed[a], many of the Jews and devout proselytes followed Paul and Barnabas, who, speaking with them[c][b], were urging them to continue in the grace of God.
  footnotes:
