    text: O «Después de que la sinagoga se disolvió» o «Después de que la asamblea se despidió». El griego puede referirse a la despedida de la congregación reunida más que al edificio mismo.
    reason: lexical_alternative
  - marker: b
    text: O «los persuadían». El verbo griego puede expresar persuasión o exhortación insistente.
    reason: lexical_alternative
  - marker: c
    text: O «permanecer» o «perseverar». προσμένω puede indicar seguir, mantenerse o perseverar en algo.
    reason: lexical_alternative
  revision_rationale: Se corrige una apertura poco natural y potencialmente engañosa en español («se disolvió la sinagoga»), se alinea ἔπειθον con la elección principal auditada («los exhortaban»), se mejora προσλαλοῦντες αὐτοῖς a «hablando con ellos», y se ajusta προσμένειν a «continuar» como opción principal, dejando las alternativas pertinentes en notas.
