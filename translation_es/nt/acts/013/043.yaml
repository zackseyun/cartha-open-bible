revisions:
- from: Después de que se disolvió la sinagoga, muchos de los judíos y de los prosélitos devotos siguieron a Pablo y a Bernabé, quienes, hablándoles, los persuadían[a] a perseverar[b] en la gracia de Dios.
  to: Después de que se despidió la sinagoga[a], muchos de los judíos y de los prosélitos devotos siguieron a Pablo y a Bernabé, quienes, hablando con ellos, los exhortaban[b] a continuar[c] en la gracia de Dios.
  rationale: Se corrige una apertura poco natural y potencialmente engañosa en español («se disolvió la sinagoga»), se alinea ἔπειθον con la elección principal auditada («los exhortaban»), se mejora προσλαλοῦντες αὐτοῖς a «hablando con ellos», y se ajusta προσμένειν a «continuar» como opción principal, dejando las alternativas pertinentes en notas.
