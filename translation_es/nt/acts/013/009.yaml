translation:
  language: es
  text: Pero Saulo[a], también llamado Pablo, lleno del Espíritu Santo, fijó la mirada en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que también era llamado Pablo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαῦλος
  english_pob_choice: Saul
  chosen_spanish: Saulo
  alternatives_spanish:
  - Saúl
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma española habitual. «Saulo» refleja el uso bíblico establecido en español y mantiene la identidad narrativa del personaje.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa con contraste leve; «Pero» comunica bien el giro discursivo en español sin sobredramatizarlo.
- source_word: ὁ καὶ Παῦλος
  english_pob_choice: who was also called Paul
  chosen_spanish: que también era llamado Pablo
  alternatives_spanish:
  - que también era Pablo
  - también llamado Pablo
  lexicon: BDAG
  rationale: La construcción articular con καί introduce una apposición identificadora. «Que también era llamado Pablo» preserva el matiz explicativo y la forma más reciente del audit trail inglés, sin convertirlo en un simple apodo.
- source_word: πλησθεὶς
  english_pob_choice: filled
  chosen_spanish: lleno
  alternatives_spanish:
  - habiendo sido lleno
  - lleno de
  lexicon: BDAG
  rationale: El participio pasivo aoristo se expresa naturalmente en español como un participio adjetival coordinado con el verbo principal. «Lleno» conserva la fuerza de estado resultante y fluye bien en la oración.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo de Dios
  - de un espíritu santo
  lexicon: BDAG
  rationale: En Hechos la expresión se refiere al Espíritu divino. En español, la forma idiomática y reverente es «Espíritu Santo»; el genitivo se vierte con «del» para mantener la relación de llenura sin perder claridad.
- source_word: ἀτενίσας
  english_pob_choice: looked intently
  chosen_spanish: fijó la mirada
  alternatives_spanish:
  - miró fijamente
  - clavó la mirada
  lexicon: BDAG
  rationale: El verbo indica mirar de manera sostenida e intensa. «Fijó la mirada» conserva el valor aspectual y resulta natural en español bíblico contemporáneo.
- source_word: εἰς αὐτόν
  english_pob_choice: at him
  chosen_spanish: en él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: BDAG
  rationale: Con ἀτενίζω, la preposición εἰς marca el objeto directo de la mirada dirigida. «En él» mantiene la dirección visual de forma natural en español; aunque «hacia él» también es posible, «en él» reproduce mejor el foco intenso del gesto.
theological_decisions:
- issue: Referencia al Espíritu Santo
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu santo
  rationale: El contexto de Hechos y la lectura auditada del POB inglés apuntan al Espíritu divino personal, no a una cualidad indefinida. Por eso se mantiene la capitalización y la referencia personal en español.
  doctrine_reference: Hechos; afirmaciones doctrinales del POB sobre el Espíritu Santo
- issue: Identificación de Pablo en la apposición
  english_pob_reading: who was also called Paul
  chosen_spanish_reading: que también era llamado Pablo
  alternative_spanish_readings:
  - también llamado Pablo
  - que también era Pablo
  rationale: La apposición no explica la causa del cambio de nombre, sólo lo identifica. La redacción elegida evita sobreinterpretar y conserva la tensión documental del texto.
  doctrine_reference: principio de no sobreinterpretación en traducción
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «who was also Paul» a «who was also called Paul» para reflejar con mayor precisión ὁ καὶ Παῦλος. La versión española adopta esa precisión con «que también era llamado Pablo».
  spanish_consistency_notes:
  - Se mantiene «Pablo» como forma española estable del nombre propio.
  - «Espíritu Santo» se usa con mayúsculas por referencia personal al Espíritu divino.
  - «Pero» conserva el giro narrativo breve de δέ sin introducir contraste excesivo.
  - La sintaxis busca ser publicable y natural en español, pero sin diluir la fuerza aspectual de los participios griegos.
