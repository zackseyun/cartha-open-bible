    rationale: El griego usa el imperfecto pasivo de πληρόω, no solo un adjetivo de estado. Aunque «estaban llenos» es idiomático, desplaza la imagen de ‘ser llenados/llenarse’. «Se llenaban» mantiene mejor el verbo y el aspecto imperfectivo en español natural.
  - severity: low
    issue: La nota al pie no reproduce con precisión la alternativa auditada
    rationale: La nota inglesa contrasta la forma simple ‘were filled’ con la idea de llenura continua o repetida. La nota española actual formula una alternativa casi idéntica al texto principal y puede confundir al lector sobre qué se está alternando realmente.
  revised_spanish_text: Y los discípulos se llenaban de alegría y del Espíritu Santo[a].
