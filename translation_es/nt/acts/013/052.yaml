translation:
  language: es
  text: Y los discípulos se llenaban de alegría y del Espíritu Santo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron llenos de alegría y del Espíritu Santo». El verbo griego en imperfecto también puede traducirse más simplemente como «eran llenos» o «fueron llenos», aunque la forma sugiere una llenura continua o repetida en el pasado.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y también
  lexicon: BDAG
  rationale: La construcción articula continuidad narrativa con lo anterior; en español, «Y» conserva esa conexión de manera natural y sobria.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  - los aprendices
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente directo y estándar en el NT; mantiene el sentido técnico y eclesial del grupo referido.
- source_word: ἐπληροῦντο
  english_pob_choice: were filled
  chosen_spanish: estaban llenos
  alternatives_spanish:
  - eran llenos
  - se llenaban
  - estaban siendo llenos
  lexicon: BDAG
  rationale: El imperfecto griego sugiere estado o acción continua/reiterada en pasado. En español, «estaban llenos» comunica con naturalidad ese carácter durativo sin forzar una perífrasis pesada.
- source_word: χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: de alegría
  alternatives_spanish:
  - con alegría
  - de gozo
  lexicon: BDAG
  rationale: El genitivo griego expresa el contenido de la plenitud; en español, «llenos de alegría» es idiomático y fiel. «Alegría» es el equivalente más directo de χαρά.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - de Espíritu Santo
  - del espíritu santo
  lexicon: BDAG
  rationale: En Hechos, πνεῦμα ἅγιον designa al Espíritu divino personal. En español, la forma con artículo y mayúsculas («del Espíritu Santo») expresa mejor esa referencia personal y se ajusta al uso bíblico.
theological_decisions:
- issue: Referencia personal de πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: del Espíritu Santo
  alternative_spanish_readings:
  - de espíritu santo
  - del santo espíritu
  rationale: El contexto de Hechos favorece la referencia personal al Espíritu de Dios, no solo una cualidad interior de santidad. Mantener «Espíritu Santo» preserva esa lectura teológica.
  doctrine_reference: Affirmations; contexto de Hechos sobre la misión del Espíritu
- issue: Valor aspectual del imperfecto ἐπληροῦντο
  english_pob_reading: were filled
  chosen_spanish_reading: estaban llenos
  alternative_spanish_readings:
  - eran llenos
  - se llenaban
  rationale: La POB inglesa revisó «were being filled» a «were filled» para una expresión más natural sin perder la idea de estado continuo. En español, «estaban llenos» conserva mejor esa estabilidad/resultativo-durativa que un simple pretérito.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La fuente inglesa revisó la forma verbal desde «were being filled» a «were filled» para reflejar mejor el imperfecto como estado continuo en inglés natural. En español, se opta por «estaban llenos», que conserva ese matiz aspectual sin añadir una perífrasis innecesaria. También se mantiene la lectura personal de «Espíritu Santo» y se evita una traducción impersonal.
  spanish_consistency_notes:
  - Se usó «Espíritu Santo» con mayúsculas por consistencia con la referencia personal al Espíritu divino.
  - «Alegría» se eligió por ser el equivalente más idiomático de χαρά en este contexto.
  - La coordinación inicial con «Y» conserva el enlace narrativo del griego οἵ τε sin sobretraducirlo.
