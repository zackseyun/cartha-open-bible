revisions:
- from: Pero los judíos incitaron a las mujeres devotas de alta posición y a los principales de la ciudad, y provocaron persecución[a] contra Pablo y Bernabé, y los expulsaron de su distrito[b].
  to: Pero los judíos incitaron a las mujeres devotas[a] de alta posición social y a los hombres principales de la ciudad, y desataron una persecución contra Pablo y Bernabé, y los expulsaron del distrito[b].
  rationale: Se revisa para reflejar mejor la referencia masculina explícita de τοὺς πρώτους, mejorar la naturalidad de ἐπήγειραν διωγμόν en español y evitar una ambigüedad menor en «su distrito». También se afina «de alta posición» a «de alta posición social» para mayor claridad idiomática.
