  text: οἱ δὲ Ἰουδαῖοι παρώτρυναν τὰς σεβομένας ⸀γυναῖκας τὰς εὐσχήμονας καὶ τοὺς πρώτους τῆς πόλεως καὶ ἐπήγειραν διωγμὸν ἐπὶ τὸν Παῦλον ⸀καὶ Βαρναβᾶν, καὶ ἐξέβαλον αὐτοὺς ἀπὸ τῶν ὁρίων αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/050.yaml
  text: But the Jews stirred up the devout women of high standing and the leading men of the city[b][a], and stirred up persecution against Paul and Barnabas and drove them out of their district.
  footnotes:
  - marker: a
    text: Or 'God-fearing women.' The participle can denote women who worshiped the God of Israel, possibly Gentile adherents associated with the synagogue.
    reason: lexical_alternative
  - marker: b
    text: Or 'from their region' or 'from their borders.' The Greek term can refer to territorial boundaries or the district enclosed by them.
    reason: lexical_alternative
