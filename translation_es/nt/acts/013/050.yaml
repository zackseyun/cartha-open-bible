translation:
  language: es
  text: Pero los judíos incitaron a las mujeres devotas[a] de alta posición social y a los hombres principales de la ciudad, y desataron una persecución contra Pablo y Bernabé, y los expulsaron del distrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temerosas de Dios». El participio puede referirse a mujeres que veneraban al Dios de Israel, posiblemente gentiles asociadas con la sinagoga.
    reason: lexical_alternative
  - marker: b
    text: O «de la región» o «de las fronteras». El término griego puede referirse a los límites territoriales o al distrito encerrado por ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ Ἰουδαῖοι
  english_pob_choice: But the Jews
  chosen_spanish: Pero los judíos
  alternatives_spanish:
  - Ahora los judíos
  lexicon: BDAG
  rationale: δέ marca contraste narrativo; «pero» refleja bien el giro frente a la respuesta positiva anterior.
- source_word: παρώτρυναν
  english_pob_choice: stirred up
  chosen_spanish: incitaron
  alternatives_spanish:
  - instigaron
  - provocaron
  lexicon: BDAG
  rationale: El verbo expresa una acción de impulso hostil; «incitaron» conserva la fuerza causal y es natural en español.
- source_word: τὰς σεβομένας γυναῖκας
  english_pob_choice: the devout women
  chosen_spanish: las mujeres devotas
  alternatives_spanish:
  - las mujeres temerosas de Dios
  - las mujeres adoradoras
  lexicon: BDAG
  rationale: σέβομαι aquí señala reverencia religiosa; «devotas» comunica esa piedad sin fijar más de lo que el texto exige. Se conserva la ambigüedad entre mujeres piadosas en general y posibles adherentes al culto del Dios de Israel.
- source_word: τὰς εὐσχήμονας
  english_pob_choice: of high standing
  chosen_spanish: de alta posición
  alternatives_spanish:
  - prominentes
  - respetables
  - de buena posición
  lexicon: BDAG
  rationale: El adjetivo apunta a estatus social visible; «de alta posición» suena natural y mantiene la idea de prominencia pública.
- source_word: τοὺς πρώτους τῆς πόλεως
  english_pob_choice: the leading men of the city
  chosen_spanish: a los principales de la ciudad
  alternatives_spanish:
  - a los líderes de la ciudad
  - a los hombres principales de la ciudad
  lexicon: BDAG
  rationale: πρῶτοι indica los primeros en rango o influencia. «Principales» preserva el valor social y la referencia masculina sin forzar una formulación moderna excesivamente técnica.
- source_word: ἐπήγειραν διωγμὸν
  english_pob_choice: stirred up persecution
  chosen_spanish: provocaron persecución
  alternatives_spanish:
  - desataron persecución
  - incitaron persecución
  lexicon: BDAG
  rationale: La combinación verbal-nominal expresa hacer surgir hostilidad organizada. «Provocaron persecución» mantiene el causativo del griego y evita repetir demasiado «incitaron» en la misma cláusula.
- source_word: ἐπὶ τὸν Παῦλον καὶ Βαρναβᾶν
  english_pob_choice: against Paul and Barnabas
  chosen_spanish: contra Pablo y Bernabé
  alternatives_spanish:
  - sobre Pablo y Bernabé
  lexicon: BDAG
  rationale: Con διωγμός y ἐπί + acusativo, «contra» expresa la dirección hostil de manera clara y fiel.
- source_word: ἐξέβαλον
  english_pob_choice: drove them out
  chosen_spanish: los expulsaron
  alternatives_spanish:
  - los echaron
  - los arrojaron fuera
  lexicon: BDAG
  rationale: ἐκβάλλω es fuerte; «expulsaron» conserva la idea de expulsión coercitiva en español moderno y digno.
- source_word: ἀπὸ τῶν ὁρίων αὐτῶν
  english_pob_choice: out of their district
  chosen_spanish: de su distrito
  alternatives_spanish:
  - de su región
  - de sus límites
  - de su territorio
  lexicon: BDAG
  rationale: ὅρια puede referirse a límites territoriales o al distrito encerrado por ellos. «Distrito» comunica bien la jurisdicción local en un contexto cívico; el posesivo se entiende respecto de la comunidad/autoridad local.
theological_decisions:
- issue: Referencia al grupo masculino civil en τοὺς πρώτους τῆς πόλεως
  english_pob_reading: the leading men of the city
  chosen_spanish_reading: a los principales de la ciudad
  alternative_spanish_readings:
  - a los líderes de la ciudad
  rationale: El griego es masculino plural explícito. Se conserva la referencia masculina sin neutralizarla, pero con una expresión natural en español.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sentido de σεβομένας en un contexto judío/sinagogal
  english_pob_reading: the devout women
  chosen_spanish_reading: las mujeres devotas
  alternative_spanish_readings:
  - las mujeres temerosas de Dios
  - las mujeres adoradoras
  rationale: La forma participial admite la idea de reverencia religiosa y, posiblemente, de simpatizantes gentiles vinculadas a la sinagoga. Se mantiene la ambigüedad sin cerrarla de forma excesiva.
  doctrine_reference: Acts 13:50 lexical note in audit trail
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del inglés POB, conservando la repetición de la idea de incitar/agitar y reflejando el ajuste final de ἐπήγειραν como acción causal separada de παρώτρυναν. También mantiene la solución terminológica para ὅρια como un ámbito territorial local, no una expulsión meramente metafórica.
  spanish_consistency_notes:
  - Se usa «Pablo y Bernabé» como orden natural en español y consistente con el nombre propio españolizado.
  - Se evita «SEÑOR» u otra equivalencia no pertinente; no hay léxico divino directo en el versículo.
  - 'Se preserva la fuerza hostil de ambos verbos mediante dos acciones distintas: «incitaron» y «provocaron persecución».'
  - «Distrito» se eligió por claridad pública; la nota mantiene las alternativas territoriales que el griego permite.
