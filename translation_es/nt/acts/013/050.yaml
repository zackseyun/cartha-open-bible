review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: contraste narrativo («Pero»), instigación de las mujeres devotas y de los notables de la ciudad, persecución dirigida contra Pablo y Bernabé, y expulsión del territorio local. Sin embargo, hay dos ajustes de fidelidad/estilo recomendables: (1) «provocaron persecución» es entendible, pero «desataron una persecución» refleja mejor ἐπήγειραν διωγμόν como hacer surgir una campaña hostil; (2) «a los principales de la ciudad» no deja tan clara como conviene la referencia masculina explícita de τοὺς πρώτους, mejor preservada con «a los hombres principales de la ciudad».'
  spanish_quality_summary: El español es claro y digno, pero «de alta posición» suena algo calcado; «de alta posición social» mejora la naturalidad sin añadir interpretación indebida. Además, «su distrito» puede sonar ambiguo si se refiere posesivamente a Pablo y Bernabé; «del distrito» evita esa posible lectura y sigue comunicando la jurisdicción local. La frase revisada resulta más idiomática y precisa.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Bernabé», «Pablo», «judíos», «devotas» y «distrito» son compatibles. La excepción relevante es teológica/lexical: el proyecto de precisión de género favorece conservar la referencia masculina de τοὺς πρώτους; por eso se recomienda «hombres principales» en vez de solo «principales».'
  issues:
  - severity: medium
    issue: La referencia masculina explícita de τοὺς πρώτους τῆς πόλεως queda atenuada en «a los principales de la ciudad».
    rationale: El griego usa masculino plural para los notables cívicos. «Principales» es posible en español, pero no hace visible esa marca como sí la conserva el rastro inglés auditado. «A los hombres principales de la ciudad» la preserva con naturalidad.
  - severity: low
    issue: «Provocaron persecución» es menos idiomático y menos concreto que otras opciones para ἐπήγειραν διωγμόν.
    rationale: La construcción griega expresa que hicieron surgir persecución. En español bíblico-natural, «desataron una persecución» o «incitaron persecución» suena más claro. «Desataron una persecución» conserva bien el matiz causativo y evita repetición directa de «incitaron».
  - severity: low
    issue: «De alta posición» y «de su distrito» pueden mejorarse estilísticamente.
    rationale: «De alta posición social» suena más natural en español; y «del distrito» evita una posible ambigüedad posesiva de «su distrito», que podría asociarse erróneamente con Pablo y Bernabé.
  revised_spanish_text: Pero los judíos incitaron a las mujeres devotas[a] de alta posición social y a los hombres principales de la ciudad, y desataron una persecución contra Pablo y Bernabé, y los expulsaron del distrito[b].
  revised_footnotes:
  - marker: a
    text: O «temerosas de Dios». El participio puede referirse a mujeres que veneraban al Dios de Israel, posiblemente gentiles asociadas con la sinagoga.
    reason: lexical_alternative
  - marker: b
    text: O «de la región» o «de las fronteras». El término griego puede referirse a los límites territoriales o al distrito encerrado por ellos.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar mejor la referencia masculina explícita de τοὺς πρώτους, mejorar la naturalidad de ἐπήγειραν διωγμόν en español y evitar una ambigüedad menor en «su distrito». También se afina «de alta posición» a «de alta posición social» para mayor claridad idiomática.
