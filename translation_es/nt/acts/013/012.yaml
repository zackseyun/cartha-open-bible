translation:
  language: es
  text: Entonces[a], al ver lo que había sucedido, el procónsul creyó, quedando asombrado ante la enseñanza del Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que había ocurrido».
    reason: lexical_alternative
  - marker: b
    text: O «la enseñanza del Señor» o «la enseñanza acerca del Señor». El genitivo griego puede entenderse de más de una manera.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Así que
  lexicon: BDAG
  rationale: Marca la transición temporal y narrativa al siguiente hecho; «Entonces» es natural en español y conserva la secuencia sin sobrecargar el estilo.
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - habiendo visto
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior o concomitante al verbo principal; «al ver» mantiene la relación temporal de forma idiomática en español.
- source_word: ὁ ἀνθύπατος
  english_pob_choice: the proconsul
  chosen_spanish: el procónsul
  alternatives_spanish:
  - el gobernador
  lexicon: BDAG
  rationale: Se conserva el título romano específico. «Procónsul» evita diluir la precisión histórica en un término más genérico.
- source_word: τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - el acontecimiento
  - lo que había ocurrido
  lexicon: BDAG
  rationale: El participio perfecto sustantivado refiere a un hecho ya consumado; «lo que había sucedido» es natural y preserva el valor resultativo/completado.
- source_word: ἐπίστευσεν
  english_pob_choice: he believed
  chosen_spanish: creyó
  alternatives_spanish:
  - llegó a creer
  - creyó en el Señor
  lexicon: BDAG
  rationale: Se mantiene la brevedad del verbo griego sin añadir un objeto explícito que el texto no expresa. En contexto implica fe, pero la traducción no la especifica de más.
- source_word: ἐκπλησσόμενος
  english_pob_choice: being astonished
  chosen_spanish: asombrado
  alternatives_spanish:
  - estupefacto
  - maravillado
  - lleno de asombro
  lexicon: BDAG
  rationale: El participio presente describe una circunstancia acompañante de la acción principal. «Asombrado» comunica adecuadamente la intensidad del participio sin volverlo excesivamente interpretativo.
- source_word: ἐπὶ τῇ διδαχῇ
  english_pob_choice: at the teaching
  chosen_spanish: por la enseñanza
  alternatives_spanish:
  - ante la enseñanza
  - a causa de la enseñanza
  - sobre la enseñanza
  lexicon: BDAG
  rationale: La preposición puede indicar base, ocasión o motivo del asombro. En español, «por» expresa bien la causa/ocasión del asombro y suena más natural que un calco literal.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Jesús
  - acerca del Señor
  - del Señor, Jesús
  lexicon: BDAG
  rationale: «Señor» sigue la convención del proyecto para κύριος. El genitivo se deja abierto, como en el inglés POB, sin fijar si es enseñanza del Señor, acerca del Señor o perteneciente al Señor.
theological_decisions:
- issue: Alcance del verbo πιστεύω sin objeto expreso
  english_pob_reading: Rendered simply as 'he believed' without adding 'in the Lord' or 'the gospel.'
  chosen_spanish_reading: «creyó» sin añadir objeto explícito
  alternative_spanish_readings:
  - creyó en el Señor
  - creyó el mensaje
  - llegó a creer
  rationale: El griego no expresa el objeto de la fe. Mantener «creyó» respeta la sobriedad del texto y deja que el contexto narre la fe sin imponer más contenido del que está escrito.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Ambigüedad del genitivo en τῇ διδαχῇ τοῦ κυρίου
  english_pob_reading: '''the teaching of the Lord'' with note that the genitive may be understood in more than one way.'
  chosen_spanish_reading: «la enseñanza del Señor» con nota de ambigüedad
  alternative_spanish_readings:
  - la enseñanza del Señor Jesús
  - la enseñanza acerca del Señor
  - la enseñanza que procede del Señor
  rationale: 'El genitivo griego admite varias lecturas: posesiva, subjetiva u objetiva. «Del Señor» conserva esa amplitud y evita resolver una tensión interpretativa que el texto no resuelve.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; la redacción española sigue de cerca esa decisión estable, conservando la precisión histórica de «procónsul», la brevedad de «creyó» y la ambigüedad del genitivo en «del Señor» sin intentar resolverla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el texto griego usa κύριος y el contexto del NT favorece «Señor», por lo que no se sustituye por «Yahvé».
  - «Procónsul» conserva el título romano específico y evita generalizarlo como «gobernador».
  - «Asombrado» y «por la enseñanza» conservan el tono del participio y la relación causal/ocasional sin calco rígido.
  - La nota [a] aparece solo en el término con ambigüedad genitiva real; no se añade al verbo «creyó» porque en español no se documenta una alternativa textual necesaria allí.
