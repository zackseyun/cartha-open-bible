translation:
  language: es
  text: Pero Elymas[b] el mago se les oponía —pues así se traduce su nombre— buscando apartar al procónsul de[a] la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de fe». La frase griega puede entenderse como apartarlo de la fe cristiana en particular o de una respuesta creyente más general.'
    reason: alternative_reading
  - marker: b
    text: «Elymas» se presenta como un nombre traducido o interpretado; su derivación exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθίστατο
  english_pob_choice: opposed
  chosen_spanish: se les oponía
  alternatives_spanish:
  - se oponía a ellos
  - les resistía
  lexicon: BDAG
  rationale: El imperfecto expresa oposición շարունակada; en español, "se les oponía" comunica bien la acción sostenida y el matiz adversativo sin volverse arcaico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con el contexto inmediato; "Pero" reproduce con naturalidad el valor adversativo.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  - a Pablo y Bernabé
  lexicon: BDAG
  rationale: El pronombre se refiere a los misioneros ya mencionados; "se les" mantiene la referencia sin sobreespecificar en el texto principal.
- source_word: Ἐλύμας
  english_pob_choice: Elymas
  chosen_spanish: Elymas
  lexicon: transliteración
  rationale: Nombre propio transliterado, preservando la forma usada por el audit trail inglés.
- source_word: ὁ μάγος
  english_pob_choice: the magician
  chosen_spanish: el mago
  alternatives_spanish:
  - el mago hechicero
  - el mago/astrólogo
  lexicon: BDAG
  rationale: '"μάγος" puede abarcar mago, hechicero o mago/astrólogo; "el mago" es claro en español y suficientemente amplio para el contexto sin cargar más de lo que el griego exige.'
- source_word: οὕτως γὰρ μεθερμηνεύεται τὸ ὄνομα αὐτοῦ
  english_pob_choice: for that is how his name is translated
  chosen_spanish: pues así se traduce su nombre
  alternatives_spanish:
  - pues así se interpreta su nombre
  - pues ese es el significado de su nombre
  lexicon: BDAG
  rationale: μεθερμηνεύεται apunta a traducir/interpretar un nombre; "se traduce" es idiomático y mantiene la explicación parentética.
- source_word: ζητῶν
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - tratando de
  - intentando
  lexicon: BDAG
  rationale: El participio expresa propósito concomitante; "buscando" conserva la relación verbal de manera natural en español.
- source_word: διαστρέψαι
  english_pob_choice: to turn ... away
  chosen_spanish: apartar
  alternatives_spanish:
  - desviar
  - hacer que se alejara
  lexicon: BDAG
  rationale: En este contexto el verbo rige una persona y una relación con la fe; "apartar" comunica el intento de alejarlo de esa adhesión sin reducirlo a una mera distorsión de ideas.
- source_word: τὸν ἀνθύπατον
  english_pob_choice: the proconsul
  chosen_spanish: al procónsul
  alternatives_spanish:
  - al gobernador
  lexicon: BDAG
  rationale: '"ἀνθύπατος" es un título romano específico; "procónsul" preserva la precisión histórica mejor que "gobernador".'
- source_word: ἀπὸ τῆς πίστεως
  english_pob_choice: away from the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la fe cristiana
  - de la fe
  lexicon: BDAG
  rationale: En español, con "apartar" la construcción más natural es "apartar ... de la fe". El artículo sugiere una referencia concreta a la fe cristiana, pero el texto principal mantiene la formulación breve y fiel, dejando la posible especificación en nota.
theological_decisions:
- issue: Sentido de πίστις con artículo definido
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - fe
  - la fe cristiana
  rationale: El contexto de conversión y oposición permite entender una referencia concreta a la fe cristiana; sin embargo, el español puede sonar natural con "la fe" sin añadir más de lo que el griego exige. La ambigüedad se conserva en nota, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: se preservó la oposición continua, la explicación del nombre, el matiz de intento con participio, y la referencia concreta pero no excesivamente explicitada de πίστις. No se introdujeron revisiones adicionales respecto del estado más reciente, que permaneció sin cambios.'
  spanish_consistency_notes:
  - Se mantuvo "procónsul" para ἀνθύπατος por precisión histórica.
  - Se evitó "Cristo" y terminología eclesiástica tradicional no sustentada aquí.
  - '"El mago" conserva el valor amplio de μάγος sin cargarlo innecesariamente con un sentido exclusivamente de hechicería.'
  - La nota de pie preserva la ambigüedad documentada para πίστις, alineada con el audit trail inglés.
