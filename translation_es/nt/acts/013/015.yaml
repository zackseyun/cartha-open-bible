  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: la lectura de la Ley y los Profetas, el envío de un mensaje por parte de los dirigentes de la sinagoga, el vocativo respetuoso a Pablo y sus compañeros, y la invitación a hablar. Sin embargo, hay un desajuste importante con la auditoría POB inglesa en λόγος παρακλήσεως: el inglés fijó como texto principal ''word of encouragement'' y dejó ''message of exhortation'' como alternativa en nota. El español invierte esa decisión al poner ''palabra de exhortación'' en el texto principal y una nota mal anclada en ''los Profetas[a]''.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. ''Ahora bien'' y ''les enviaron mensaje'' funcionan bien, aunque ''les mandaron a decir'' sería otra opción idiomática. El problema principal es de consistencia semántica y de colocación de nota: la nota [a] está anclada en ''los Profetas'' pero explica ''mensaje de exhortación'', por lo que el lector no puede asociarla con la frase correcta.'
  glossary_alignment: 'No hay conflicto con los términos del glosario de proyecto. ''La Ley'', ''los Profetas'', ''Hermanos'' y ''pueblo'' son adecuados. La revisión necesaria es alinear παράκλησις con la decisión documentada de la POB: texto principal con ''palabra de ánimo'' o ''palabra de aliento/ánimo'' y nota alternativa ''mensaje/palabra de exhortación''.'
