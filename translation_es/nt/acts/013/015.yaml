translation:
  language: es
  text: 'Ahora bien, después de la lectura de la Ley y de los Profetas, los jefes de la sinagoga les enviaron mensaje, diciendo: «Hermanos[a], si hay entre ustedes alguna palabra de ánimo[b] para el pueblo, hablen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Hombres, hermanos», una forma familiar y respetuosa de dirigirse a ellos.'
    reason: lexical_alternative
  - marker: b
    text: O «mensaje de exhortación». La expresión griega puede abarcar tanto ánimo como exhortación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάγνωσιν
  english_pob_choice: the reading
  chosen_spanish: la lectura
  alternatives_spanish:
  - la lectura pública
  - la lección
  lexicon: BDAG
  rationale: En el contexto sinagogal se refiere a la lectura formal de las Escrituras. «La lectura» conserva esa referencia sin volverlo técnico o pesado en español.
- source_word: νόμου
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  lexicon: BDAG
  rationale: Se usa mayúscula para reflejar la división escritural reconocida en el contexto judío, en paralelo con «los Profetas».
- source_word: προφητῶν
  english_pob_choice: the Prophets
  chosen_spanish: los Profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: La capitalización refleja la colección escritural leída en la sinagoga, no solo personas proféticas en sentido general.
- source_word: ἀπέστειλαν
  english_pob_choice: sent word
  chosen_spanish: les enviaron mensaje
  alternatives_spanish:
  - les enviaron
  - les mandaron mensaje
  lexicon: BDAG
  rationale: El griego implica una comunicación dirigida antes de la cita directa. «Les enviaron mensaje» reproduce bien esa función idiomática sin forzar un calco.
- source_word: ἀρχισυνάγωγοι
  english_pob_choice: the synagogue rulers
  chosen_spanish: los jefes de la sinagoga
  alternatives_spanish:
  - los líderes de la sinagoga
  - los oficiales de la sinagoga
  lexicon: BDAG
  rationale: Designa a quienes estaban a cargo del servicio sinagogal. «Jefes» comunica autoridad funcional sin sugerir necesariamente gobierno civil.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hombres, hermanos
  - Hermanos, varones
  lexicon: BDAG
  rationale: La forma griega es masculina y respetuosa. «Hermanos» mantiene el tono familiar y la referencia masculina sin sonar rígido en español.
- source_word: λόγος παρακλήσεως
  english_pob_choice: word of encouragement
  chosen_spanish: palabra de exhortación
  alternatives_spanish:
  - palabra de ánimo
  - mensaje de exhortación
  - palabra de aliento
  lexicon: BDAG
  rationale: παράκλησις puede abarcar ánimo y exhortación. La opción «palabra de exhortación» sigue de cerca la amplitud semántica que la POB inglesa preserva con una nota, y es natural en español eclesial.
- source_word: πρὸς τὸν λαόν
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - al pueblo
  - en favor del pueblo
  lexicon: BDAG
  rationale: Marca el destinatario del discurso. «Para el pueblo» es claro y corresponde al valor direccional de πρός en este contexto.
- source_word: λέγετε
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - digan
  - hablad
  lexicon: BDAG
  rationale: El imperativo plural invita a tomar la palabra ante la asamblea. «Hablen» es natural y mantiene el sentido de pronunciar un mensaje oral.
- source_word: εἴ τίς ἐστιν ἐν ὑμῖν
  english_pob_choice: if there is among you any
  chosen_spanish: si hay entre ustedes alguna
  alternatives_spanish:
  - si alguno de ustedes tiene
  - si hay en ustedes alguna
  lexicon: BDAG
  rationale: Se conserva la estructura algo impersonal del griego sin volverlo mecánico. El femenino de «alguna» concuerda con «palabra» que sigue implícitamente en español.
theological_decisions:
- issue: Sentido de λόγος παρακλήσεως en una invitación sinagogal
  english_pob_reading: word of encouragement
  chosen_spanish_reading: palabra de exhortación
  alternative_spanish_readings:
  - palabra de ánimo
  - mensaje de exhortación
  - palabra de aliento
  rationale: La frase griega puede incluir estímulo y exhortación. En una reunión de lectura y enseñanza, «exhortación» preserva la posibilidad de instrucción seria sin excluir el ánimo. La nota bíblica puede conservar la alternativa semántica.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
- issue: Tratamiento del vocativo masculino Ἄνδρες ἀδελφοί
  english_pob_reading: Brothers
  chosen_spanish_reading: Hermanos
  alternative_spanish_readings:
  - Hombres, hermanos
  - Hermanos, varones
  rationale: El griego es explícitamente masculino. Se conserva esa precisión sin ampliar indebidamente el destinatario; «Hermanos» es fiel y idiomático en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés de la POB: se mantuvo la estructura sinagogal («la lectura de la Ley y de los Profetas»), se preservó la fuerza comunicativa de ἀπέστειλαν como envío de mensaje, y se respetó el carácter masculino del vocativo. La única decisión léxica con tensión semántica significativa es λόγος παρακλήσεως; se optó por «palabra de exhortación» en el texto y se dejó constancia de la alternativa inclusiva de ánimo/exhortación en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Ley» y «Profetas» van en mayúscula por su valor escritural como colecciones canónicas.
  - Se mantuvo «sinagoga» y no se sustituyó por términos eclesiales posteriores.
  - La cita directa conserva un registro digno y sobrio, apto para lectura pública.
