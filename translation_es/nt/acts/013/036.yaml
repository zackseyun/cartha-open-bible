  text: Δαυὶδ μὲν γὰρ ἰδίᾳ γενεᾷ ὑπηρετήσας τῇ τοῦ θεοῦ βουλῇ ἐκοιμήθη καὶ προσετέθη πρὸς τοὺς πατέρας αὐτοῦ καὶ εἶδεν διαφθοράν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/036.yaml
  text: For David[a], after serving God's purpose in his own generation[d][c][b], fell asleep and was gathered to his fathers and saw decay.
  footnotes:
  - marker: a
    text: Or 'having served the purpose/counsel of God in his own generation.'
    reason: lexical_alternative
  - marker: b
    text: '''Fell asleep'' is a biblical euphemism for death.'
    reason: cultural_note
  - marker: c
    text: Or 'was added to his fathers,' a Hebrew-style idiom meaning he joined his forefathers in death.
    reason: lexical_alternative
  - marker: d
    text: That is, his body underwent decay; compare the contrast in the following verse.
    reason: cross_reference
