revisions:
- from: Porque David[a], después de servir al propósito de Dios en su propia generación, durmió[b], fue reunido con sus padres[c] y vio corrupción[d].
  to: Porque David[a], después de haber servido al propósito de Dios en su propia generación, durmió[b], fue reunido con sus padres[c] y vio descomposición[d].
  rationale: Se revisa el texto para reducir la ambigüedad de «corrupción» en español y hacer explícito el sentido físico de διαφθορά mediante «descomposición», en línea con la nota y el contexto inmediato. Se mantiene el eufemismo «durmió» y el modismo «fue reunido con sus padres». La construcción con «servir» se conserva por cercanía al griego y al POB inglés, suavizada con «después de haber servido».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: David sirvió, luego murió, fue unido a sus padres y experimentó descomposición. También preserva las notas clave del POB inglés sobre el eufemismo de muerte, el modismo semítico y el contraste con la ausencia de corrupción en el versículo siguiente. Sin embargo, dos elecciones españolas necesitan ajuste para mayor fidelidad idiomática y claridad: «servir al propósito» suena poco natural en español para ὑπηρετήσας τῇ ... βουλῇ, y «vio corrupción» en español puede sugerir corrupción moral más que descomposición física.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene leves calcos. «Después de servir al propósito de Dios» debe cambiarse a una formulación idiomática como «después de servir al propósito de Dios» → mejor «después de haber servido al propósito de Dios» o, más natural aún, «después de cumplir el propósito de Dios». No obstante, para no sobreinterpretar ὑπηρετήσας, conviene mantener «servir» y corregir la construcción a «después de haber servido al propósito de Dios» o mejor «después de servir al propósito de Dios»? Aun así, la preposición sigue sonando forzada; la opción más natural y fiel es «después de haber servido al propósito de Dios en su propia generación» solo mejora un poco. La mejor reparación mínima es «después de servir al propósito de Dios» → «después de servir al propósito de Dios en su propia generación» no resuelve el problema. Por tanto, conviene recast: «Porque David, después de haber servido al propósito de Dios en su propia generación...»; además
    «vio corrupción» debe aclararse como «vio descomposición» en el texto principal, con nota que preserve la alternativa más literal.'
  glossary_alignment: No hay términos de glosario mayor en conflicto. «Dios» está bien. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. La decisión sobre διαφθορά debe favorecer una lectura física en español; «descomposición» alinea mejor con la justificación léxica documentada que «corrupción», que en español moderno es ambigua.
  issues:
  - severity: medium
    issue: «servir al propósito de Dios» es una construcción poco natural en español
    rationale: Aunque refleja de cerca el inglés, en español «servir a un propósito» suele significar que algo es útil para un fin, no que una persona sirvió conforme al designio divino. El griego expresa servicio en relación con la βουλή de Dios; hace falta una formulación más idiomática sin perder «servir».
  - severity: medium
    issue: «vio corrupción» es potencialmente ambigua en español moderno
    rationale: διαφθορά aquí se refiere a la corrupción/descomposición del cuerpo. En español común, «corrupción» evoca primero corrupción moral o social. «Vio descomposición» preserva el sentido físico y el contraste contextual.
  - severity: low
    issue: La nota a sobre «propósito / consejo» puede afinarse estilísticamente
    rationale: Conviene mantener la alternativa, pero con formulación española más limpia y sin barra innecesaria si se listan alternativas de modo más natural.
  revised_spanish_text: Porque David[a], después de haber servido al propósito de Dios en su propia generación, durmió[b], fue reunido con sus padres[c] y vio descomposición[d].
