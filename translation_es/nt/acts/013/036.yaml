    reason: cultural_note
  - marker: c
    text: 'O: «fue añadido a sus padres», un modismo de estilo hebreo que significa que se unió a sus antepasados en la muerte.'
    reason: lexical_alternative
  - marker: d
    text: Es decir, su cuerpo experimentó descomposición; compárese el contraste con el versículo siguiente.
    reason: cross_reference
  revision_rationale: Se revisa el texto para reducir la ambigüedad de «corrupción» en español y hacer explícito el sentido físico de διαφθορά mediante «descomposición», en línea con la nota y el contexto inmediato. Se mantiene el eufemismo «durmió» y el modismo «fue reunido con sus padres». La construcción con «servir» se conserva por cercanía al griego y al POB inglés, suavizada con «después de haber servido».
