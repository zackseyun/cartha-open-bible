translation:
  language: es
  text: Porque David[a], después de haber servido al propósito de Dios en su propia generación, durmió[b], fue reunido con sus padres[c] y vio descomposición[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo servido al propósito de Dios en su propia generación»; también puede traducirse «al consejo de Dios».'
    reason: lexical_alternative
  - marker: b
    text: «Durmió» es un eufemismo bíblico para la muerte.
    reason: cultural_note
  - marker: c
    text: 'O: «fue añadido a sus padres», un modismo de estilo hebreo que significa que se unió a sus antepasados en la muerte.'
    reason: lexical_alternative
  - marker: d
    text: Es decir, su cuerpo experimentó descomposición; compárese el contraste con el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ἰδίᾳ γενεᾷ
  english_pob_choice: in his own generation
  chosen_spanish: en su propia generación
  alternatives_spanish:
  - para su propia generación
  - entre su propia generación
  lexicon: BDAG
  rationale: La dative indica el ámbito temporal-histórico del servicio de David. «En su propia generación» conserva ese sentido de esfera/época de manera natural en español y evita convertir la frase en un beneficio ('para').
- source_word: ὑπηρετήσας
  english_pob_choice: after serving
  chosen_spanish: después de servir
  alternatives_spanish:
  - habiendo servido
  - tras servir
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales. «Después de servir» expresa con claridad la secuencia y mantiene el valor general de υπηρετέω como servicio real, sin cargarlo de un matiz eclesiástico innecesario.
- source_word: τῇ τοῦ θεοῦ βουλῇ
  english_pob_choice: God’s purpose
  chosen_spanish: el propósito de Dios
  alternatives_spanish:
  - el consejo de Dios
  - el plan de Dios
  lexicon: BDAG
  rationale: βουλή aquí puede significar propósito, consejo o plan. «El propósito de Dios» comunica bien la intención divina en español actual y conserva la idea de determinación soberana sin forzar una formulación más técnica.
- source_word: ἐκοιμήθη
  english_pob_choice: fell asleep
  chosen_spanish: durmió
  alternatives_spanish:
  - se quedó dormido
  - murió
  lexicon: BDAG
  rationale: En español, el eufemismo bíblico se conserva con «durmió», que comunica la metáfora de la muerte sin aplanarla a «murió». Mantiene la resonancia bíblica que el POB inglés quiso preservar.
- source_word: προσετέθη πρὸς τοὺς πατέρας αὐτοῦ
  english_pob_choice: was gathered to his fathers
  chosen_spanish: fue reunido con sus padres
  alternatives_spanish:
  - fue añadido a sus padres
  - fue reunido con sus antepasados
  lexicon: BDAG
  rationale: El giro es un semitismo para expresar la muerte y la incorporación a los antepasados. «Fue reunido con sus padres» es fiel, inteligible y conserva la imagen idiomática mejor que una traducción literal de «añadido».
- source_word: εἶδεν διαφθοράν
  english_pob_choice: saw decay
  chosen_spanish: vio corrupción
  alternatives_spanish:
  - vio descomposición
  - experimentó corrupción
  lexicon: BDAG
  rationale: διαφθορά refiere a la corrupción o descomposición del cuerpo. «Vio corrupción» es una formulación bíblica y sobria en español, coherente con la oposición del contexto al que no vio corrupción en el versículo siguiente.
theological_decisions:
- issue: Eufemismo bíblico para la muerte
  english_pob_reading: fell asleep
  chosen_spanish_reading: durmió
  alternative_spanish_readings:
  - murió
  - se durmió
  rationale: El texto usa κοιμάομαι como eufemismo convencional de muerte. «Durmió» preserva esa figura sin introducir una explicación doctrinal adicional y mantiene la continuidad con el estilo bíblico de Lucas-Hechos.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Relación entre la vida de David y el propósito divino
  english_pob_reading: God's purpose
  chosen_spanish_reading: el propósito de Dios
  alternative_spanish_readings:
  - el consejo de Dios
  - el plan de Dios
  rationale: La frase presenta la vida y servicio de David dentro de la intención soberana de Dios para su generación. «Propósito de Dios» conserva esa orientación teológica con lenguaje claro y sin precisar indebidamente el término a una escuela doctrinal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés final conservó la lectura «God's purpose» y mantuvo sin cambios sustanciales el conjunto de decisiones léxicas; la revisión posterior solo corrigió un detalle de puntuación/posesivo. La propuesta española sigue ese mismo núcleo de decisiones, adaptándolo al español con equivalencia óptima y manteniendo la metáfora de muerte y el modismo semítico.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en todo el proyecto, pero aquí el griego θεοῦ se vierte naturalmente como «Dios» porque la frase habla del propósito de Dios sin implicar una cita explícita del tetragrámaton.
  - «Padres» reproduce el valor idiomático de πρὸς τοὺς πατέρας αὐτοῦ; no se sustituye por «antepasados» en el texto principal para conservar la forma bíblica breve, pero se ofrece la alternativa en nota.
  - «Corrupción» se eligió por su cercanía a la red semántica de διαφθορά y por su conexión literaria con el versículo siguiente; «descomposición» queda como alternativa aclaratoria en nota.
