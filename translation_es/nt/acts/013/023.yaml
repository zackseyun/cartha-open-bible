  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica y las decisiones léxicas principales del griego: Dios es el sujeto, Jesús es el objeto como «un Salvador», e «Israel» recibe el beneficio. Sin embargo, el texto español omite en el cuerpo principal el elemento explícito «ἀπὸ τοῦ σπέρματος» al traducir solo «De este hombre», dejando fuera que Jesús procede de la descendencia de David. Esa información no debe quedar relegada a nota, porque es parte central del sentido fuente y del argumento davídico del contexto.'
  spanish_quality_summary: El español es claro y digno, pero la frase inicial «De este hombre, Dios ha traído...» suena algo incompleta y poco natural porque «de este hombre» queda colgando sin su complemento semántico («descendencia»). La revisión debe integrar «de la descendencia de este hombre» o un orden equivalente. El resto del verso lee bien en español eclesial contemporáneo.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «Dios», «Salvador» y «Jesús» están bien. «Conforme a la promesa» es aceptable para κατ’ ἐπαγγελίαν. La cuestión no es de glosario sino de omisión semántica del sintagma «ἀπὸ τοῦ σπέρματος».'
  issues:
  - severity: high
    issue: Omisión de «descendencia» en el texto principal
    rationale: El griego dice «ἀπὸ τοῦ σπέρματος»; el borrador principal «De este hombre» no expresa que Jesús fue traído de la descendencia/linaje de David. Esa relación genealógica es esencial en el versículo y en el contexto inmediato.
  - severity: medium
    issue: Anclaje de notas invertido respecto al contenido
    rationale: La nota [a] está colocada en «Israel» pero explica una alternativa para «conforme a la promesa»; la nota [b] está en «Jesús» pero explica «descendencia». Los marcadores deben anclarse en la palabra o frase relevante.
  - severity: low
    issue: Fluidez española mejorable en el arranque
    rationale: «De este hombre, Dios ha traído...» es menos natural y más ambiguo que «De la descendencia de este hombre, Dios ha traído...» o «De la descendencia de este hombre Dios ha traído...».
  revised_spanish_text: De la descendencia de este hombre[a], Dios ha traído a Israel un Salvador, Jesús, conforme a la promesa[b].
  revised_footnotes:
