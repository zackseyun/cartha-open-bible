translation:
  language: es
  text: De la descendencia de este hombre[a], Dios ha traído a Israel un Salvador, Jesús, conforme a la promesa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la simiente de este». «Descendencia» se refiere aquí al linaje davídico.
    reason: lexical_alternative
  - marker: b
    text: O «según la promesa» o «como prometió».
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου
  english_pob_choice: this man's
  chosen_spanish: de este hombre
  alternatives_spanish:
  - de este
  - de éste
  lexicon: BDAG
  rationale: El demostrativo genitivo se refiere a David en el contexto inmediato. En español, «de este hombre» hace explícito el antecedente personal sin volver rígida la frase, y conserva la relación posesiva implícita en el griego.
- source_word: ἀπὸ τοῦ σπέρματος
  english_pob_choice: from ... offspring
  chosen_spanish: de ... descendencia
  alternatives_spanish:
  - de ... simiente
  - de ... semilla
  lexicon: BDAG
  rationale: σπέρμα aquí es linaje/descendencia davídica, no semilla botánica. «Descendencia» comunica la idea genealógica con naturalidad en español y evita una traducción demasiado literal que sería menos clara.
- source_word: κατ’ ἐπαγγελίαν
  english_pob_choice: according to promise
  chosen_spanish: conforme a la promesa
  alternatives_spanish:
  - según la promesa
  - de acuerdo con la promesa
  - como fue prometido
  lexicon: BDAG
  rationale: La expresión indica conformidad con una promesa previa. «Conforme a la promesa» mantiene el valor relacional de κατά + acusativo sin añadir explicación que el verso no desarrolla.
- source_word: ἤγαγεν
  english_pob_choice: has brought
  chosen_spanish: ha traído
  alternatives_spanish:
  - trajo
  - ha conducido
  - ha hecho venir
  lexicon: BDAG
  rationale: ἄγω en este contexto expresa traer/introducir a alguien para Israel. «Ha traído» es fiel y natural en español, y evita la posible confusión de «ha levantado», que podría sugerir resurrección.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  lexicon: BDAG
  rationale: El dativo se traduce de forma directa como «a Israel», conservando la dirección/beneficio del acto divino sin sobreinterpretarlo.
- source_word: σωτῆρα
  english_pob_choice: a Savior
  chosen_spanish: un Salvador
  alternatives_spanish:
  - un libertador
  lexicon: BDAG
  rationale: σωτήρ en este contexto cristológico es un título fuerte; «Salvador» es el equivalente más natural y tradicional en español, sin perder su fuerza teológica.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención española estándar.
theological_decisions:
- issue: Relación entre Jesús y la promesa davídica
  english_pob_reading: The verse states that God brought Jesus from David's offspring to Israel in fulfillment of promise, without expanding beyond the text.
  chosen_spanish_reading: El verso afirma que Dios trajo a Jesús de la descendencia davídica para Israel, conforme a la promesa, sin añadir explicitaciones no presentes en el texto.
  alternative_spanish_readings:
  - Dios lo levantó como Salvador para Israel.
  - Dios hizo venir a Jesús, el Salvador prometido, de la descendencia de David.
  rationale: 'La traducción conserva la conexión entre linaje davídico, acción divina y promesa, pero no la amplía con formulaciones que el griego no exige. Se mantiene la tensión/precisión del texto fuente: el cumplimiento está insinuado, no explicando en detalle el objeto exacto de la promesa.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Se revisó el orden para sonar natural en español manteniendo la secuencia fuente: origen davídico, acción de Dios, destinatario Israel, título cristológico y referencia a la promesa. La elección de «ha traído» sigue el audit trail inglés y evita ambigüedad con lenguaje de resurrección.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, de acuerdo con el estándar del proyecto.
  - Se usa «Salvador» para σωτήρ por su fuerza cristológica y buena inteligibilidad en español.
  - «Promesa» se dejó singular, como en el griego y en el audit trail inglés, sin especificar en el cuerpo cuál promesa es.
  - 'Los corchetes de nota se colocan tras los términos relevantes: «Israel[a]» y «Jesús[b]».'
