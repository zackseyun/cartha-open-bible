revisions:
- from: De este hombre, Dios ha traído a Israel[a] un Salvador, Jesús[b], conforme a la promesa.
  to: De la descendencia de este hombre[a], Dios ha traído a Israel un Salvador, Jesús, conforme a la promesa[b].
  rationale: La revisión restaura en el texto principal el sintagma «de la descendencia», que el griego expresa explícitamente y que el borrador había desplazado indebidamente a una nota. También recoloca las notas en las frases que realmente comentan. «Conforme a la promesa» se mantiene por fidelidad al valor de κατ’ ἐπαγγελίαν y buena legibilidad en español.
