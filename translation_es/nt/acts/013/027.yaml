translation:
  language: es
  text: Pues los que viven en Jerusalén y sus gobernantes, sin reconocerlo[a] y condenándolo, cumplieron las palabras de los profetas que se leen cada sábado[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a este». El griego tiene el demostrativo «este», que puede subrayar la referencia a Jesús.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las voces de los profetas».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικοῦντες ἐν Ἰερουσαλήμ
  english_pob_choice: those who live in Jerusalem
  chosen_spanish: los que viven en Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los habitantes de Jerusalén
  lexicon: BDAG
  rationale: El participio funciona sustantivamente para un grupo de personas. «Los que viven» es natural en español moderno y conserva el sentido de κατοικέω sin volverlo excesivamente literal.
- source_word: οἱ ἄρχοντες αὐτῶν
  english_pob_choice: their rulers
  chosen_spanish: sus gobernantes
  alternatives_spanish:
  - sus líderes
  - sus autoridades
  lexicon: BDAG
  rationale: ἄρχοντες apunta a autoridades rectoras o dirigentes con peso político/jurídico. «Gobernantes» mantiene esa fuerza en español.
- source_word: τοῦτον
  english_pob_choice: this one
  chosen_spanish: a este
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El demostrativo es explícito en griego y señala a Jesús de manera enfática. En español, «a este» conserva mejor esa deixis que un simple pronombre.
- source_word: ἀγνοήσαντες
  english_pob_choice: did not recognize
  chosen_spanish: no reconociendo
  alternatives_spanish:
  - no sabiendo quién era
  - ignorándolo
  lexicon: BDAG
  rationale: En contexto no se trata solo de falta de información, sino de no reconocer quién era Jesús. El gerundio reproduce el participio causal/temporal del griego y preserva la tensión culpable del pasaje.
- source_word: τὰς φωνὰς τῶν προφητῶν
  english_pob_choice: the words of the prophets / literally 'the voices of the prophets'
  chosen_spanish: las palabras de los profetas
  alternatives_spanish:
  - las voces de los profetas
  - los dichos de los profetas
  lexicon: BDAG
  rationale: φωνάς es literalmente «voces», pero en este contexto español suena más natural «palabras». Se conserva el sentido de la proclamación profética sin introducir una imagen extraña en la lectura pública.
- source_word: τὰς κατὰ πᾶν σάββατον ἀναγινωσκομένας
  english_pob_choice: that are read every Sabbath
  chosen_spanish: que se leen cada sábado
  alternatives_spanish:
  - que se leen en cada sábado
  - que son leídas cada sábado
  lexicon: BDAG
  rationale: La frase atributiva modifica «las palabras de los profetas». «Cada sábado» es idiomático en español y reproduce con claridad la lectura semanal.
- source_word: κρίναντες
  english_pob_choice: by condemning him
  chosen_spanish: condenándolo
  alternatives_spanish:
  - al condenarlo
  - después de condenarlo
  lexicon: BDAG
  rationale: En este contexto κρίνω tiene sentido judicial de condenar. El gerundio español expresa la acción concurrente/instrumental que contribuye a la idea de cumplimiento.
- source_word: ἐπλήρωσαν
  english_pob_choice: fulfilled
  chosen_spanish: cumplieron
  alternatives_spanish:
  - llevaron a cumplimiento
  - cumplieron plenamente
  lexicon: BDAG
  rationale: «Cumplieron» mantiene el valor de πληρόω aplicado al cumplimiento de la Escritura y es natural en español bíblico contemporáneo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce una explicación de lo dicho anteriormente. «Porque» es la conjunción más natural en español para este vínculo explicativo.
theological_decisions:
- issue: El alcance de la ignorancia respecto de Jesús
  english_pob_reading: did not recognize this one
  chosen_spanish_reading: no reconociendo a este
  alternative_spanish_readings:
  - ignorando a este
  - no sabiendo quién era
  rationale: El texto presenta una falta de reconocimiento culpable, no necesariamente una ignorancia total de la existencia de Jesús. La traducción preserva esa tensión sin suavizarla ni exagerarla.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica del texto en lugar de resolverla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que ajustó la estructura para reflejar más directamente el participio, sustituyó «voices» por «words» por naturalidad en contexto y reordenó levemente la cláusula sin cambiar el sentido básico. La versión española sigue esa lectura revisada, conservando el valor participial y la referencia profética.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece.
  - Se mantiene «Jesús» implícito mediante el demostrativo «este», siguiendo el énfasis del griego.
  - «Gobernantes» y no «autoridades» para conservar el matiz de liderazgo rector en el contexto de Jerusalén.
  - Se evita un calco rígido de la voz pasiva griega en favor de una sintaxis española clara y litúrgicamente usable.
