revisions:
- from: Porque los que viven en Jerusalén y sus gobernantes, no reconociendo a este[a] y condenándolo, cumplieron las palabras de los profetas que se leen cada sábado[b],
  to: Pues los que viven en Jerusalén y sus gobernantes, sin reconocerlo[a] y condenándolo, cumplieron las palabras de los profetas que se leen cada sábado[b],
  rationale: Se revisa para lograr un español más natural sin perder la fuerza del griego. «Sin reconocerlo[a]» comunica mejor ἀγνοήσαντες en español corriente, mientras la nota preserva el demostrativo explícito τοῦτον. Se corrige la nota a y se rehace la nota b para reflejar correctamente la alternativa literal «voces». También se usa «Pues» como equivalente más fluido de γάρ al inicio del versículo.
