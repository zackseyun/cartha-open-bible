translation:
  language: es
  text: Así que, habiendo sido enviados por el Espíritu Santo, descendieron a Seleucia, y desde allí zarparon a Chipre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por el espíritu santo'. El griego dice literalmente 'por el espíritu santo', pero en Hechos se refiere al agente divino personal que suele verterse 'el Espíritu Santo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - ellos
  lexicon: BDAG
  rationale: El pronombre explícito puede expresarse con un sujeto simple en español; 'ellos' conserva la referencia narrativa sin recargar con énfasis innecesario. El valor enfático leve del griego queda razonablemente cubierto por el arranque de la oración.
- source_word: μὲν οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  - de modo que
  lexicon: BDAG
  rationale: La combinación funciona como avance discursivo e inferencia narrativa. 'Así que' transmite bien la transición natural en español moderno sin forzar un equivalente más rígido.
- source_word: ἐκπεμφθέντες
  english_pob_choice: having been sent out
  chosen_spanish: habiendo sido enviados
  alternatives_spanish:
  - siendo enviados
  - enviados
  lexicon: BDAG
  rationale: El participio aoristo pasivo antecede a los verbos principales. 'Habiendo sido enviados' conserva la anterioridad y la voz pasiva con claridad en español.
- source_word: ὑπὸ τοῦ ἁγίου πνεύματος
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - por el espíritu santo
  - por el Santo Espíritu
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agencia. En español bíblico y eclesial, 'Espíritu Santo' es la forma natural para el agente divino personal que envía y dirige la misión.
- source_word: κατῆλθον
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: BDAG
  rationale: El verbo indica descenso; 'descendieron' preserva la imagen concreta y suena natural en español, especialmente en contexto geográfico hacia la costa o un puerto.
- source_word: εἰς Σελεύκειαν
  english_pob_choice: to Seleucia
  chosen_spanish: a Seleucia
  alternatives_spanish:
  - hacia Seleucia
  - hasta Seleucia
  lexicon: BDAG
  rationale: Con un destino geográfico, 'a' es la preposición más natural en español. Mantiene la dirección del movimiento sin añadir matices no requeridos.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: BDAG
  rationale: Equivalente adverbial directo y idiomático en español para indicar el punto de salida.
- source_word: ἀπέπλευσαν
  english_pob_choice: sailed away
  chosen_spanish: zarparon
  alternatives_spanish:
  - navegaron
  - se hicieron a la mar
  lexicon: BDAG
  rationale: El compuesto griego expresa partida por mar. 'Zarparon' es natural y comunica la salida marítima con la fuerza requerida.
- source_word: εἰς Κύπρον
  english_pob_choice: to Cyprus
  chosen_spanish: hacia Chipre
  alternatives_spanish:
  - a Chipre
  - para Chipre
  lexicon: BDAG
  rationale: '''Hacia Chipre'' mantiene la dirección del viaje marítimo y suena bien en español narrativo. También sería posible ''a Chipre'', pero ''hacia'' refleja mejor el movimiento de navegación.'
theological_decisions:
- issue: Rendering of ἁγίου πνεύματος
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu santo
  rationale: En Hechos, la frase se refiere al agente divino personal que comisiona y dirige. La mayúscula en 'Espíritu Santo' preserva esa lectura sin introducir una paráfrasis doctrinal adicional.
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d.C.); principio POB de preservar el sentido fuente con claridad confesional
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español en el lugar correspondiente. No se añadieron notas sin anclaje; se mantuvo la lectura ya aprobada por la auditoría inglesa y la referencia léxica del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Espíritu Santo' para el referente personal divino, coherente con Hechos y con la práctica confesional estándar cuando el contexto describe agencia y envío.
  - Se evitó 'SEÑOR' u otros sustitutos, porque no hay aquí el nombre divino יהוה sino πνεῦμα con artículo y adjetivo.
  - '''Zarparon'' preserva la partida marítima implícita en ἀπέπλευσαν mejor que un simple ''navegaron''.'
  - '''Chipre'' y ''Seleucia'' se transliteran de forma convencional y readable para español bíblico.'
