translation:
  language: es
  text: Mientras ellos salían, rogaban que estas palabras les fueran dichas el sábado siguiente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐξιόντων
  english_pob_choice: As they were going out
  chosen_spanish: Mientras ellos salían
  alternatives_spanish:
  - Cuando ellos salían
  - Mientras iban saliendo
  lexicon: BDAG
  rationale: El participio genitivo absoluto funciona como cláusula temporal circunstancial. 'Mientras ellos salían' conserva el valor aspectual y suena natural en español sin añadir más interpretación que la necesaria.
- source_word: δὲ
  english_pob_choice: As
  alternatives_spanish:
  - y
  - ahora
  - entonces
  lexicon: BDAG
  rationale: Se integra en la cláusula temporal en español y no requiere equivalente explícito para mantener fluidez y la relación narrativa leve del griego.
- source_word: αὐτῶν
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - Pablo y Bernabé
  - la gente
  lexicon: BDAG
  rationale: El pronombre se deja general como 'ellos' para preservar la ambigüedad referencial del texto griego y del aparato crítico, sin resolverla en el texto principal.
- source_word: παρεκάλουν
  english_pob_choice: they were urging
  chosen_spanish: les rogaban
  alternatives_spanish:
  - les insistían
  - les suplicaban
  - les pedían encarecidamente
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. 'Rogaban' comunica con dignidad la intensidad de la petición mejor que un simple 'pedían', sin ir más allá del matiz de παρακαλέω.
- source_word: εἰς τὸ μεταξὺ σάββατον
  english_pob_choice: on the next Sabbath
  chosen_spanish: en el sábado siguiente
  alternatives_spanish:
  - para el sábado siguiente
  - en el próximo sábado
  - en el siguiente sábado
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de manera natural como referencia temporal al sábado inmediatamente posterior, manteniendo el sentido del POB en inglés.
- source_word: λαληθῆναι
  english_pob_choice: be spoken
  chosen_spanish: se les hablaran
  alternatives_spanish:
  - se les dijeran
  - les fueran habladas
  - se hablara
  lexicon: BDAG
  rationale: Aunque el griego es pasivo infinitivo, en español la pasiva perifrástica con 'hablar' resulta poco natural. 'Se les hablaran' conserva la idea de recibir palabras dichas a ellos; se mantiene el matiz de pasividad sin sobreexplicar.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con clítico dativo en español.
- source_word: τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: BDAG
  rationale: ῥήματα se refiere a palabras pronunciadas; 'palabras' es el equivalente directo y mantiene la conexión con el discurso previo sin interpretarlo como 'mensaje'.
theological_decisions:
- issue: Ambigüedad sobre quién sale y quién pide que se vuelva a hablar
  english_pob_reading: The main text preserves the ambiguity with 'they' rather than specifying the speakers or hearers.
  chosen_spanish_reading: El texto principal conserva la ambigüedad con 'ellos' y la construcción impersonal pasiva, sin identificar explícitamente a los interlocutores.
  alternative_spanish_readings:
  - Mientras Pablo y Bernabé salían, la gente les rogaba...
  - Mientras la gente salía, Pablo y Bernabé les rogaban...
  rationale: El aparato inglés señala una dificultad textual e interpretativa conocida. La versión española mantiene esa reserva y evita resolver en el texto principal una identificación no explicitada por la forma griega de esta edición.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. También se preservó la ambigüedad referencial del pasaje sin introducir marcadores de nota.
  spanish_consistency_notes:
  - Se usa 'sábado' para μεταξὺ σάββατον, siguiendo el sentido temporal de 'next Sabbath'.
  - Se evitó 'Cristo', 'Señor' u otras equivalencias no presentes en el versículo.
  - Se mantuvo un registro digno y neutro, apto para lectura eclesial amplia.
  - La construcción 'se les hablaran' busca reflejar la pasiva griega, aunque en español suena menos directa; se acepta como ajuste óptimo para conservar la relación sintáctica del original.
