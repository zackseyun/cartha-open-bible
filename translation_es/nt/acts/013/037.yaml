review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el contraste con David, el sentido de resurrección de ἤγειρεν y el eco escritural de ''ver corrupción''. Sin embargo, ''aquel[a] a quien'' introduce una nota innecesaria y la nota léxica no refleja fielmente la alternativa documentada en el rastro inglés: allí el texto principal es ''decay'' con nota ''corruption'', mientras que en español se ha puesto ''corrupción'' en el texto y se añaden alternativas menos adecuadas como ''decadencia''.'
  spanish_quality_summary: La frase es mayormente natural y digna, pero 'aquel a quien' suena algo pesada en español bíblico corriente; 'aquel a quien Dios levantó' es aceptable, aunque sin nota. La principal mejora es limpiar la nota y alinear mejor las alternativas léxicas con la evidencia y con el español natural. 'Decadencia' no funciona bien para corrupción corporal.
  glossary_alignment: No hay conflicto con la glosa del proyecto para Dios. La elección de 'levantó' es defendible para ἤγειρεν en contexto de resurrección. 'Corrupción' como texto principal en español es una excepción razonable por la fuerte resonancia con Salmo 16:10, pero la nota debe ofrecer 'descomposición' como alternativa clara y no 'decadencia'.
  issues:
  - severity: medium
    issue: Nota [a] anclada en 'aquel' sin necesidad semántica
    rationale: No existe alternativa o ambigüedad que requiera nota en ὃν. La nota presente trata sobre διαφθοράν, por lo que debe anclarse allí, no en el pronombre relativo.
  - severity: medium
    issue: La nota léxica incluye 'decadencia'
    rationale: '''Decadencia'' no expresa bien la corrupción corporal de διαφθορά en este contexto de resurrección y puede desviar hacia deterioro moral o social.'
  - severity: low
    issue: Desajuste parcial con el rastro auditado en la función de la nota
    rationale: El inglés preserva una alternativa léxica significativa ('corruption') por eco del Salmo. En español, si el texto principal usa 'corrupción', la nota debe ofrecer una alternativa moderna como 'descomposición' y explicar la elección, no multiplicar opciones menos precisas.
  revised_spanish_text: Pero aquel a quien Dios levantó no vio corrupción[a].
  revised_footnotes:
