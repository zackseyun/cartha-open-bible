translation:
  language: es
  text: Pero aquel a quien Dios levantó no vio corrupción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descomposición». El término griego puede denotar corrupción o descomposición corporal; «corrupción» conserva mejor el eco de Salmo 16:10 en las Escrituras griegas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: the one whom
  chosen_spanish: aquel a quien
  alternatives_spanish:
  - el que
  - a quien
  lexicon: BDAG
  rationale: El relativo introduce a la persona ya identificada en el contexto; 'aquel a quien' conserva la referencia personal y el valor de objeto sin volver la frase pesada en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste con la afirmación previa sobre David; 'Pero' reproduce bien la fuerza adversativa en español natural.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En español idiomático, el artículo no se conserva aquí; 'Dios' expresa con claridad el sujeto sin añadir rareza sintáctica.
- source_word: ἤγειρεν
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - levantó de entre los muertos
  lexicon: BDAG
  rationale: El contexto inmediato apunta a resurrección; 'levantó' mantiene el verbo más cercano al griego y deja visible la relación con el uso bíblico de ἐγείρω. 'Resucitó' explicita más el sentido pero puede estrechar el campo verbal.
- source_word: οὐκ εἶδεν
  english_pob_choice: did not see
  chosen_spanish: no vio
  alternatives_spanish:
  - no experimentó
  - no sufrió
  lexicon: BDAG
  rationale: Se conserva el giro 'ver corrupción' del texto bíblico aludido; 'no vio' mantiene la imagen verbal y su eco intertextual.
- source_word: διαφθοράν
  english_pob_choice: decay
  chosen_spanish: corrupción
  alternatives_spanish:
  - descomposición
  - descomposición del cuerpo
  - decadencia
  lexicon: BDAG
  rationale: La POB en inglés preserva 'corruption' en nota por su valor intertextual con Salmo 16:10; en español, 'corrupción' reproduce mejor ese eco bíblico que 'decadencia' y puede abarcar la corrupción corporal sin perder la resonancia textual.
theological_decisions:
- issue: Sentido de ἤγειρεν en contexto de resurrección
  english_pob_reading: raised up, referring to God raising Jesus from the dead
  chosen_spanish_reading: levantó, refiriéndose a que Dios levantó a Jesús de entre los muertos
  alternative_spanish_readings:
  - resucitó a Jesús
  - lo levantó como exaltación o puesta en escena
  rationale: El contraste con 'no vio corrupción' hace decisivo el sentido de resurrección. 'Levantó' conserva la literalidad del verbo y deja claro el acto divino sin cambiarlo por una paráfrasis más interpretativa.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión teológica y el nexo con el Salmo citado
- issue: Término 'corrupción' y su eco escritural
  english_pob_reading: decay, with a footnote preserving 'corruption' because of Psalm 16:10
  chosen_spanish_reading: corrupción
  alternative_spanish_readings:
  - decadencia
  - descomposición
  rationale: Se conserva el término que mejor mantiene el enlace con la cita del Salmo en la tradición griega. Aunque 'corrupción' puede sonar más abstracto, aquí es precisamente la palabra con mayor carga intertextual.
  doctrine_reference: Lectura intertextual de Salmo 16:10 / Hechos 13:37
translation_notes:
  revision_awareness: 'Se siguió el expediente en inglés sin cambios sustantivos: la lectura de resurrección de ἤγειρεν se mantiene, y se preserva el valor intertextual de διαφθοράν con una opción principal y una nota alternativa. La redacción española se ajusta a la sintaxis natural sin perder el paralelismo bíblico.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός en forma idiomática.
  - Se conserva 'corrupción' en el texto principal por el eco con Salmo 16:10; la nota ofrece alternativas semánticamente cercanas.
  - Se evita 'SEÑOR' porque el texto no contiene el tetragrámaton ni κύριος.
  - '''Levantar'' se emplea para mantener la cercanía al griego y al contexto de resurrección.'
