translation:
  language: es
  text: Pero ellos sacudieron el polvo de sus pies contra ellos y fueron a Iconio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sacudirse el polvo de los pies era un acto simbólico de separación y de testimonio contra quienes rechazaban el mensaje.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Pero aquellos
  lexicon: BDAG
  rationale: δέ introduce contraste o transición narrativa leve. En español, «Pero» conserva el matiz adversativo, y «ellos» mantiene la referencia a Pablo y Bernabé sin necesidad de añadir nombres.
- source_word: ἐκτιναξάμενοι
  english_pob_choice: shook off
  chosen_spanish: sacudieron
  alternatives_spanish:
  - sacudieron fuera
  - habiendo sacudido
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción enfática de sacudir algo para desprenderlo. «Sacudieron» es natural en español y preserva la acción simbólica sin forzar una construcción participial pesada.
- source_word: τὸν κονιορτὸν
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo fino
  - la tierra
  lexicon: BDAG
  rationale: κονιορτός designa polvo levantado del suelo. «Polvo» es la equivalencia directa y más clara en español.
- source_word: τῶν ποδῶν
  english_pob_choice: from their feet
  chosen_spanish: de sus pies
  alternatives_spanish:
  - de los pies
  - desde sus pies
  lexicon: BDAG
  rationale: El genitivo expresa la relación con el polvo en la expresión idiomática. «De sus pies» reproduce naturalmente esa fuente en español.
- source_word: ἐπ’ αὐτοὺς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en su contra
  lexicon: BDAG
  rationale: La preposición con acusativo aquí sugiere dirección hostil o testimonial del gesto. «Contra ellos» conserva esa fuerza sin explicitar más de lo que el texto dice.
- source_word: ἦλθον
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: BDAG
  rationale: En narrativa de movimiento hacia un destino concreto, ἦλθον puede expresarse naturalmente como «fueron» en español, manteniendo la dirección del viaje.
- source_word: εἰς Ἰκόνιον
  english_pob_choice: to Iconium
  chosen_spanish: a Iconio
  alternatives_spanish:
  - hasta Iconio
  - hacia Iconio
  lexicon: BDAG
  rationale: εἰς marca movimiento hacia una ciudad. «A Iconio» es la forma más natural y fiel en español.
theological_decisions:
- issue: Sentido simbólico de sacudir el polvo
  english_pob_reading: Rendered plainly as a gesture 'against them' without expanding its meaning in the main text.
  chosen_spanish_reading: Se traduce de forma llana como un gesto «contra ellos», sin ampliar en el texto principal su significado testimonial o judicial.
  alternative_spanish_readings:
  - como testimonio contra ellos
  - como señal de juicio contra ellos
  rationale: El griego menciona el acto y su dirección, pero no desarrolla la interpretación. La traducción principal evita sobreinterpretar; el sentido cultural queda reservado para la nota.
  doctrine_reference: Mantener la tensión exegética sin resolverla en la traducción; primacía del texto fuente sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'El contexto inglés muestra acuerdo alto y no registra revisiones aplicadas. La presente propuesta mantiene la lectura del POB: gesto simbólico, dirección contra los oyentes y movimiento hacia Iconio, con una formulación española natural y sobria.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - 'Se usa el vocabulario verbal y nominal más directo posible: «polvo», «pies», «contra ellos», «fueron».'
  - La nota cultural se ancla en el gesto completo, no en una interpretación doctrinal añadida al cuerpo principal.
