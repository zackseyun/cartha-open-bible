translation:
  language: es
  text: 'Entonces Pablo se puso de pie y, haciendo una señal con la mano, dijo: «Hombres israelitas y ustedes que temen a Dios[a], escuchen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los temerosos de Dios». La frase se refiere a los que temen a Dios, probablemente adoradores gentiles asociados con la sinagoga.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - se puso en pie
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción física previa al discurso. «Se puso de pie» comunica el movimiento de manera natural en español y evita un tono más literario o ambiguo que «se levantó», que en algunos contextos puede sonar menos específico.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ marca avance narrativo. «Entonces» reproduce bien la progresión del relato sin imponer contraste fuerte y suena fluido en español.
- source_word: κατασείσας τῇ χειρὶ
  english_pob_choice: motioning with his hand
  chosen_spanish: haciendo una señal con la mano
  alternatives_spanish:
  - gesticulando con la mano
  - moviendo la mano
  - haciendo un gesto con la mano
  lexicon: BDAG
  rationale: La frase describe un gesto para llamar la atención o pedir silencio antes de hablar. «Haciendo una señal con la mano» mantiene el sentido concreto y evita imágenes demasiado coloquiales o inciertas.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: Verbo narrativo estándar para introducir el discurso directo.
- source_word: Ἄνδρες Ἰσραηλῖται
  english_pob_choice: Men of Israel
  chosen_spanish: Hombres israelitas
  alternatives_spanish:
  - Varones israelitas
  - Israelitas
  lexicon: BDAG
  rationale: La vocativa masculina se conserva con «Hombres», y el identificador étnico/religioso con «israelitas». «Hombres israelitas» es claro y sigue de cerca la estructura del griego sin sonar arcaico.
- source_word: οἱ φοβούμενοι τὸν θεόν
  english_pob_choice: you who fear God
  chosen_spanish: ustedes que temen a Dios
  alternatives_spanish:
  - los que temen a Dios
  - los temerosos de Dios
  - God-fearers
  lexicon: BDAG
  rationale: Se conserva el participio verbal como una descripción abierta, no como una etiqueta técnica. «Ustedes que temen a Dios» es transparente, mantiene la fuerza del verbo y evita introducir un tecnicismo no explicado en el texto principal.
- source_word: ἀκούσατε
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - presten atención
  lexicon: BDAG
  rationale: Imperativo plural que pide atención inmediata. «Escuchen» es natural, solemne y adecuado para un discurso público.
theological_decisions:
- issue: Identificación de οἱ φοβούμενοι τὸν θεόν en contexto sinagogal
  english_pob_reading: '“you who fear God” with footnote: “Or ‘God-fearers.’ The phrase refers to those who fear God, likely Gentile worshipers associated with the synagogue.”'
  chosen_spanish_reading: «ustedes que temen a Dios»
  alternative_spanish_readings:
  - «los temerosos de Dios»
  - «los que temen a Dios»
  - «God-fearers»
  rationale: El griego describe literalmente a personas que temen a Dios; la etiqueta histórica «God-fearers» puede ser una explicación útil en nota, pero no debe reemplazar la expresión verbal en el cuerpo del texto. En español, «ustedes que temen a Dios» preserva la tensión entre descripción literal y posible categoría socioreligiosa.
  doctrine_reference: Translation philosophy §§4–6
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada y conserva su decisión principal sobre οἱ φοβούμενοι τὸν θεόν. La diferencia es que en español la segunda invocación se expresa de manera más directa como «ustedes que temen a Dios», manteniendo la distinción entre los israelitas y el segundo grupo sin introducir un tecnicismo sin explicar en el texto principal.
  spanish_consistency_notes:
  - Se usa «Dios» para θεόν conforme al estándar POB en español.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se mantiene un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - La puntuación abre el discurso directo de forma natural para español.
