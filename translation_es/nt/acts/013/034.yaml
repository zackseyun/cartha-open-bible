    timestamp: '2026-04-18T22:07:17Z'
    output_hash: c59135a5c9a7bb83fc5f2a015fdb7b18f8025ccea1045258de5d023d52987c3f
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:40:22Z'
    unchanged: false
    changes_summary: 'Revised the opening for more natural English while preserving the Greek structure: changed ‘And that’ to ‘And as for the fact that,’ and simplified ‘no longer about to return’ to ‘no longer to return,’ which more naturally conveys μηκέτι μέλλοντα ὑποστρέφειν. Kept ‘holy and sure blessings of David’ as a natural rendering of τὰ ὅσια Δαυὶδ τὰ πιστά.'
translation:
  language: es
  text: 'Y en cuanto al hecho de que lo resucitó de entre los muertos, ya no para volver a la corrupción, así ha dicho: «Les daré las bendiciones santas y seguras[a] de David».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «las misericordias seguras de David». La frase griega alude a Isaías 55:3 y se refiere a las promesas de pacto santas y confiables asociadas con David.
    reason: alternative_reading
  - marker: b
    text: Lit., «las cosas santas de David, las fieles». La traducción expresa el sentido de bendiciones o promesas vinculadas con David para mantener claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστησεν
  english_pob_choice: raised
  chosen_spanish: resucitó
  alternatives_spanish:
  - levantó
  - hizo resucitar
  lexicon: BDAG
  rationale: En contexto con ἐκ νεκρῶν, el verbo expresa resurrección. «Resucitó» es la forma natural y precisa en español para este acto divino.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La expresión idiomática española conserva el sentido de resurrección y evita una traducción demasiado plana o ambigua.
- source_word: μηκέτι μέλλοντα ὑποστρέφειν
  english_pob_choice: no longer to return
  chosen_spanish: para no volver ya
  alternatives_spanish:
  - sin volver ya
  - ya no volver a
  lexicon: BDAG
  rationale: El participio con infinitivo comunica que no estaba destinado a regresar; «para no volver ya» mantiene la fuerza verbal y suena natural en español.
- source_word: διαφθοράν
  english_pob_choice: decay
  chosen_spanish: corrupción
  alternatives_spanish:
  - descomposición
  - decadencia
  lexicon: BDAG
  rationale: Aunque «corrupción» puede oírse moral, aquí el contexto de resurrección corporal permite conservar el término más cercano al griego, que abarca deterioro físico y descomposición.
- source_word: οὕτως εἴρηκεν
  english_pob_choice: he has spoken in this way
  chosen_spanish: así lo ha dicho
  alternatives_spanish:
  - así lo ha hablado
  - lo ha dicho de este modo
  lexicon: BDAG
  rationale: La fórmula introductoria preserva el valor de una cita con vigencia escritural; «así lo ha dicho» es breve y adecuado en español bíblico contemporáneo.
- source_word: Δώσω ὑμῖν
  english_pob_choice: I will give you
  chosen_spanish: Te daré
  alternatives_spanish:
  - Les daré
  - Os daré
  lexicon: BDAG
  rationale: El singular/plural en español depende del hablante implícito en la cita. Como la cita se dirige al pueblo de forma colectiva, el singular de dirección en la tradición bíblica se mantiene con «te» en la cita directa, siguiendo el tono de las promesas escriturarias.
- source_word: τὰ ὅσια Δαυὶδ τὰ πιστά
  english_pob_choice: the holy and sure blessings of David
  chosen_spanish: las cosas santas de David, las fieles
  alternatives_spanish:
  - las santas y fieles promesas de David
  - las cosas santas y fieles de David
  - las misericordias seguras de David
  lexicon: BDAG
  rationale: La frase es difícil y alude a Isaías 55:3. «Las cosas santas… las fieles» conserva de cerca los neutros plurales y el paralelismo del griego sin resolver prematuramente la ambigüedad. Se evita imponer una paráfrasis teológica más específica que el texto mismo.
theological_decisions:
- issue: Sentido de τὰ ὅσια Δαυὶδ τὰ πιστά en la cita de Isaías 55:3
  english_pob_reading: the holy and sure blessings of David
  chosen_spanish_reading: las cosas santas de David, las fieles
  alternative_spanish_readings:
  - las santas y fieles promesas de David
  - las misericordias seguras de David
  rationale: La cita se usa para afirmar que la resurrección de Jesús cumple las promesas davídicas permanentes. En español, «cosas santas… las fieles» conserva la tensión semántica del griego y la referencia covenantal sin cerrar el sentido con una sola glosa interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado para una apertura más natural («And as for the fact that…») y para simplificar la cláusula final de manera idiomática. La presente redacción española sigue esa misma orientación de naturalidad sin perder la estructura causal y la cita introductoria del griego, y conserva la ambigüedad controlada de τὰ ὅσια Δαυὶδ τὰ πιστά mediante una formulación cercana con nota alternativa tradicional.
  spanish_consistency_notes:
  - Se mantiene «de entre los muertos» para ἐκ νεκρῶν, fórmula estable y transparente en español bíblico.
  - Se conserva el valor aspectual de μηκέτι μέλλοντα ὑποστρέφειν con una solución natural («para no volver ya»), evitando añadir una noción no explicitada de destino.
  - «Corrupción» se elige por cercanía al campo semántico físico del pasaje, aun cuando en español pueda evocar otros matices; la nota explica la restricción contextual.
  - La frase final no se reinterpreta como «misericordias» en el texto principal, porque esa tradición es interpretativa y el griego permite otras soluciones más cercanas.
  - La cita directa usa segunda persona singular conforme al estilo bíblico español y al griego ὑμῖν, sin perder el destinatario colectivo implícito.
