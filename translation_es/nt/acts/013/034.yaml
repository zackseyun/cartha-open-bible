revisions:
- from: 'Y en cuanto al hecho de que lo resucitó de entre los muertos[a], para no volver ya a la corrupción, así lo ha dicho: «Te daré las cosas santas[b] de David, las fieles».'
  to: 'Y en cuanto al hecho de que lo resucitó de entre los muertos, ya no para volver a la corrupción, así ha dicho: «Les daré las bendiciones santas y seguras[a] de David».[b]'
  rationale: 'Se revisa la cita final para reflejar con claridad el sentido documentado en la auditoría inglesa: no una literalidad opaca («las cosas santas…»), sino una formulación española inteligible que conserva la fuerza pactual de Isaías 55:3. También se corrige ὑμῖν con «Les daré» y se alinean las notas con la alternativa tradicional preservada en inglés («las misericordias seguras de David»).'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego: resurrección «de entre los muertos», no volver a la corrupción, e introducción de cita escritural con valor vigente. Sin embargo, la frase final τὰ ὅσια Δαυὶδ τὰ πιστά no queda fielmente comunicada en español con «las cosas santas de David, las fieles», porque resulta oscura e innecesariamente literal, y además se aparta de la decisión auditada en inglés, que explicitó el sentido pactual como bendiciones/promesas asociadas con David. También hay desajuste en la nota a: el inglés conserva como alternativa tradicional «the sure mercies of David», pero la nota española ofrece otra alternativa distinta.'
  spanish_quality_summary: 'El español es mayormente natural al inicio, aunque «para no volver ya» suena menos idiomático que «ya no para volver» o, mejor, una reformulación directa como «para que ya no volviera a la corrupción» / «para no volver jamás a la corrupción». La principal dificultad es la cola de la cita: «las cosas santas de David, las fieles» suena forzada, poco inteligible para lectura eclesial general, y no comunica con claridad el sentido. También «Te daré» introduce un singular que no corresponde al ὑμῖν plural; en español neutral de registro bíblico amplio conviene «les daré».'
  glossary_alignment: 'No hay conflicto con términos del glosario principal. La revisión propuesta mantiene «resucitó», «de entre los muertos» y «corrupción» como opciones válidas. En la frase isaiana, conviene alinear con la rationale documentada: no una literalidad opaca, sino una formulación clara con sentido de promesas/bendiciones davídicas, preservando en nota la alternativa tradicional «las misericordias seguras de David».'
  issues:
  - severity: high
    issue: La frase «las cosas santas de David, las fieles» es demasiado opaca y no comunica bien τὰ ὅσια Δαυὶδ τὰ πιστά.
    rationale: Aunque intenta reflejar la forma griega, en español resulta poco natural y oscurece el sentido pactual/documentado por la auditoría inglesa. La traducción debe ser inteligible sin perder fidelidad.
  - severity: high
    issue: La nota [a] no preserva la alternativa tradicional documentada en el inglés.
    rationale: El inglés POB conserva «the sure mercies of David» como alternativa histórica importante; la nota española la reemplaza por «las santas y fieles promesas de David», perdiendo esa trazabilidad auditada.
  - severity: medium
    issue: «Te daré» no refleja bien el dativo plural ὑμῖν.
    rationale: La cita se dirige al pueblo en plural. «Les daré» es más fiel y natural en español neutral; «te daré» introduce un singular no marcado por el griego.
  - severity: low
    issue: «para no volver ya a la corrupción» es algo menos natural que otras opciones españolas.
    rationale: No es incorrecto, pero una redacción como «ya no para volver a la corrupción» o similar suena más fluida en un registro bíblico moderno.
