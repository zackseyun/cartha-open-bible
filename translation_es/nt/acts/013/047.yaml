translation:
  language: es
  text: 'Porque así nos lo ha mandado el Señor: «Te he puesto como luz para las naciones[a][b], para que seas para salvación hasta el fin de la tierra.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como luz para los gentiles». El griego ἐθνῶν puede significar «naciones» o, en muchos contextos, «gentiles».
    reason: lexical_alternative
  - marker: b
    text: O «hasta los confines de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: BDAG
  rationale: El adverbio introduce la relación causal o inferencial con el mandato precedente. «Así» es natural en español, conserva la fuerza de conexión y evita un calco rígido.
- source_word: ἐντέταλται
  english_pob_choice: has commanded
  chosen_spanish: nos lo ha mandado
  alternatives_spanish:
  - nos lo ha ordenado
  - nos ha dado este mandato
  lexicon: BDAG
  rationale: El perfecto expresa una orden ya dada con vigencia presente. «Ha mandado» conserva la autoridad del acto; se añade «lo» para reflejar el contenido implícito del mandato sin expandirlo indebidamente.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Dueño
  lexicon: BDAG
  rationale: En este contexto se trata del hablante divino de la cita bíblica. «Señor» mantiene la convención cristiana y la fuerza reverencial del término griego.
- source_word: Τέθεικά
  english_pob_choice: I have set
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he establecido
  - te he colocado
  lexicon: BDAG
  rationale: El perfecto de τίθημι indica una designación establecida. «He puesto» es una traducción idiomática y fiel; «te» preserva el singular de la cita.
- source_word: εἰς φῶς ἐθνῶν
  english_pob_choice: as a light for the nations
  chosen_spanish: como luz de las naciones
  alternatives_spanish:
  - como luz para las naciones
  - como luz de los gentiles
  lexicon: BDAG
  rationale: «εἰς» aquí funciona idiomáticamente como designación/resulto, por lo que «como» expresa mejor la función asignada. «Naciones» conserva el alcance amplio del texto isaiano; se mantiene la alternativa «gentiles» en nota por su plausibilidad contextual.
- source_word: ἐθνῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: En la cita de Isaías el término conserva su referencia amplia a los pueblos no israelitas. «Las naciones» mantiene esa amplitud y evita restringir el sentido a un grupo étnico específico en el cuerpo del texto.
- source_word: τοῦ εἶναί σε
  english_pob_choice: so that you may be
  chosen_spanish: para que seas
  alternatives_spanish:
  - a fin de que seas
  - para ser
  lexicon: BDAG
  rationale: El articular infinitivo expresa propósito. «Para que seas» comunica con claridad la finalidad sin sonar forzado en español.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - como salvación
  - llevando salvación
  lexicon: BDAG
  rationale: «εἰς» marca meta o resultado. «Para salvación» preserva la concisión del griego y evita decidir demasiado entre el medio y el resultado; el sustantivo queda deliberadamente abierto.
- source_word: ἕως ἐσχάτου τῆς γῆς
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el fin de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta los extremos de la tierra
  lexicon: BDAG
  rationale: La frase singular griega apunta al límite/extremo de la tierra. «Hasta el fin de la tierra» refleja el singular sin forzarlo al plural tradicional, y suena natural en español.
theological_decisions:
- issue: Aplicación de la cita isaiana al envío apostólico sin resolver la relación entre el siervo de Isaías y la misión de Pablo y Bernabé
  english_pob_reading: Retain the direct quotation in singular ('you') without expanding or resolving how the servant-text is applied to apostolic mission.
  chosen_spanish_reading: Mantener la cita en singular («te / seas») sin explicitar en la traducción cómo se relaciona el texto de Isaías con la misión apostólica.
  alternative_spanish_readings:
  - Parafrasear la cita como si se dirigiera directamente a los apóstoles en plural
  - Explicitar en el texto quién habla y a quién se aplica la profecía
  rationale: El griego cita la Escritura de forma directa y deja implícita la relación teológica entre el pasaje del siervo y la misión apostólica. La traducción conserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: Conservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; por eso este borrador mantiene la estructura y el sentido del texto griego con equivalencia óptima, sin añadir explicaciones interpretativas innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al uso teológico del POB.
  - Se conserva el singular de la cita («te», «seas») para respetar el texto griego y la tensión teológica documentada.
  - «Naciones» se usa en el cuerpo del texto; la alternativa «gentiles» queda reservada para nota.
  - «Hasta el fin de la tierra» reproduce el singular de ἕως ἐσχάτου τῆς γῆς y se complementa con la nota alternativa tradicional.
