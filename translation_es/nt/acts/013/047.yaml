  glossary_alignment: 'La terminología principal está alineada: κύριος -> «el Señor», σωτηρία -> «salvación», ἐθνῶν -> «las naciones» con nota alternativa «gentiles». No hay conflicto con los defaults del proyecto. La revisión propuesta mantiene la decisión POB de preferir «naciones» en el texto principal y conservar «gentiles» en nota.'
