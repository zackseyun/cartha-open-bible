  rationale: Se ajusta únicamente la preposición en la frase de misión para reflejar mejor el sentido del griego y la decisión léxica documentada en inglés. «Como luz para las naciones» es más fiel y más natural que «como luz de las naciones» en español. También se armoniza la nota alternativa para que corresponda exactamente a la construcción revisada del texto principal.
