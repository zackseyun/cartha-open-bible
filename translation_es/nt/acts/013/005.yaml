revisions:
- from: Y cuando llegaron a Salamina[a], proclamaban la palabra de Dios en las sinagogas de los judíos; y también tenían a Juan como ayudante[b].
  to: Y cuando llegaron a Salamina[a], proclamaban la palabra de Dios en las sinagogas de los judíos; y también tenían a Juan como asistente[b].
  rationale: Se cambia «como ayudante» por «como asistente» para alinearlo mejor con la decisión léxica principal auditada en inglés para ὑπηρέτην, manteniendo las demás opciones en nota. Se conserva el resto del versículo porque representa fielmente el griego y suena natural en español.
