translation:
  language: es
  text: Y cuando llegaron a Salamina[a], proclamaban la palabra de Dios en las sinagogas de los judíos; y también tenían a Juan como asistente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo llegado a Salamina».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como ayudante», «como auxiliar» o «como servidor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενοι
  english_pob_choice: when they arrived
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - habiendo llegado
  - cuando vinieron
  lexicon: BDAG
  rationale: El participio aoristo con marcador locativo expresa llegada o llegada a un lugar. «Cuando llegaron» conserva el valor temporal y es natural en español.
- source_word: Σαλαμῖνι
  english_pob_choice: Salamis
  chosen_spanish: Salamina
  alternatives_spanish:
  - Salamis
  lexicon: BDAG
  rationale: Se translitera el topónimo griego al español como «Salamina», forma natural y reconocible, manteniendo la referencia geográfica.
- source_word: κατήγγελλον
  english_pob_choice: proclaimed
  chosen_spanish: proclamaban
  alternatives_spanish:
  - anunciaban
  - declaraban
  - predicaban
  lexicon: BDAG
  rationale: καταγγέλλω denota proclamación pública. «Proclamaban» conserva ese sentido formal sin restringirlo al matiz eclesiástico de «predicaban».
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: La expresión se mantiene de forma transparente y fiel al genitivo, sin forzar una paráfrasis.
- source_word: συναγωγαῖς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  alternatives_spanish:
  - lugares de reunión
  lexicon: BDAG
  rationale: El término remite específicamente a las asambleas/edificios judíos; «sinagogas» es preciso y claro en español.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - del pueblo judío
  lexicon: BDAG
  rationale: En este contexto el referente es étnico-religioso, y «de los judíos» reproduce el uso más natural y directo en español.
- source_word: εἶχον δὲ καὶ
  english_pob_choice: and they also had
  chosen_spanish: y también tenían
  alternatives_spanish:
  - y además tenían
  - y asimismo tenían
  lexicon: BDAG
  rationale: La partícula δέ añade transición leve y καί agrega «también». «Y también tenían» comunica la adición con fluidez.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ὑπηρέτην
  english_pob_choice: as an assistant
  chosen_spanish: como ayudante
  alternatives_spanish:
  - como asistente
  - como auxiliar
  - como servidor
  lexicon: BDAG
  rationale: ὑπηρέτης puede designar ayudante o asistente subordinado. «Ayudante» preserva la función de apoyo y evita la carga servil de «siervo».
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español. La redacción sigue de cerca el griego y el audit trail inglés, sin depender mecánicamente del inglés para la elección léxica.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ conforme a la terminología base del proyecto.
  - Se usó «proclamaban» para conservar el sentido público de καταγγέλλω sin introducir una lectura homilética más estrecha.
  - Se eligió «ayudante» para ὑπηρέτην, alineado con la decisión auditada de evitar «siervo» por su posible carga semántica indebida.
