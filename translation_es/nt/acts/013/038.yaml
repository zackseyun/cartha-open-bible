    text: O 'hermanos y hermanas', si el auditorio se entiende de manera inclusiva.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Jesús, el referido inmediatamente antes.
    reason: cross_reference
  - marker: c
    text: O 'ser declarados justos'.
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis inicial para reflejar mejor la construcción impersonal γνωστὸν ... ἔστω ὑμῖν en español formal-natural; se fortalece καταγγέλλεται con 'se les proclama'; y se aligera la cláusula relativa 'de todo aquello de lo cual' a una forma más legible sin perder el alcance de ἀπὸ πάντων ὧν. Se conservan las decisiones teológicas y las notas del POB inglés, incluida la referencia implícita de διὰ τούτου a Jesús.
