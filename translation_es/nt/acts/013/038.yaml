revisions:
- from: Por tanto, sepan que a ustedes, hermanos[a], por medio de este[b] se les anuncia el perdón de pecados, y de todo aquello de lo cual no pudieron ser justificados por la ley de Moisés[c], todo el que cree es justificado.
  to: Por tanto, les sea conocido a ustedes, hermanos[a], que por medio de este[b] se les proclama el perdón de pecados, y de todas aquellas cosas de las que no pudieron ser justificados por la ley de Moisés[c], todo el que cree es justificado.
  rationale: Se corrige la sintaxis inicial para reflejar mejor la construcción impersonal γνωστὸν ... ἔστω ὑμῖν en español formal-natural; se fortalece καταγγέλλεται con 'se les proclama'; y se aligera la cláusula relativa 'de todo aquello de lo cual' a una forma más legible sin perder el alcance de ἀπὸ πάντων ὧν. Se conservan las decisiones teológicas y las notas del POB inglés, incluida la referencia implícita de διὰ τούτου a Jesús.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego y del POB inglés: exhortación introductoria, vocativo fraternal, perdón de pecados proclamado por medio de Jesús, e imposibilidad de ser justificados por la ley de Moisés. También mantiene correctamente el término teológico clave ''justificados'' y la nota alternativa ''declarados justos''. Sin embargo, hay dos puntos de fidelidad/forma que requieren ajuste: (1) ''sepan que a ustedes'' suena sintácticamente trabado para γνωστὸν οὖν ἔστω ὑμῖν; en español formal-natural conviene ''les sea conocido'' o ''sepan, pues,''. (2) ''por medio de este'' sin apoyo nominal suena menos natural en español que en inglés; aunque el demostrativo es fiel, la mejor solución es mantenerlo con la nota, pero encajado en una frase más natural.'
  spanish_quality_summary: La redacción es generalmente comprensible y digna, pero presenta rigidez en 'sepan que a ustedes' y en 'de todo aquello de lo cual', que resulta innecesariamente pesada. 'Se les anuncia' es aceptable, aunque 'se proclama' refleja mejor καταγγέλλεται. Una leve reestructuración mejora mucho la fluidez sin perder precisión. El resto del registro es adecuado para español eclesial moderno.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: ''Jesús'', ''perdón de pecados'', ''ley de Moisés'', y especialmente ''justificados'' para δικαιωθῆναι. No hay conflicto con los defaults mayores. La nota inclusiva para ''hermanos'' y la nota explicativa para el demostrativo siguen correctamente el rastro del POB inglés.'
  issues:
  - severity: medium
    issue: 'Inicio español poco natural: ''Por tanto, sepan que a ustedes'''
    rationale: γνωστὸν ... ἔστω ὑμῖν pide una fórmula declarativa/impersonal. 'Sepan que a ustedes' no fluye bien en español y deja colgando el dativo. 'Les sea conocido' o una reformulación equivalente conserva mejor la fuerza del original.
  - severity: medium
    issue: '''por medio de este'' suena abrupto en español'
    rationale: Aunque refleja transparentemente διὰ τούτου, en español el demostrativo desnudo aplicado a una persona puede sentirse áspero. Puede mantenerse por fidelidad, pero integrado en una sintaxis más natural y apoyado por la nota [b].
  - severity: low
    issue: '''de todo aquello de lo cual'' es demasiado pesado'
    rationale: Preserva la estructura, pero resulta más enrevesado de lo necesario. 'De todas aquellas cosas de las que' o 'de todo aquello de lo que' comunica mejor en español sin pérdida relevante.
  - severity: low
    issue: '''se les anuncia'' atenúa el matiz de proclamación pública'
    rationale: No es incorrecto, pero καταγγέλλεται tiene fuerza heráldica. 'Se les proclama' o 'se proclama' refleja mejor el verbo en contexto apostólico.
  revised_spanish_text: Por tanto, les sea conocido a ustedes, hermanos[a], que por medio de este[b] se les proclama el perdón de pecados, y de todas aquellas cosas de las que no pudieron ser justificados por la ley de Moisés[c], todo el que cree es justificado.
  revised_footnotes:
