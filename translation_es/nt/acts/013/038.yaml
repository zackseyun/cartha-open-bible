translation:
  language: es
  text: Por tanto, les sea conocido a ustedes, hermanos[a], que por medio de este[b] se les proclama el perdón de pecados, y de todas aquellas cosas de las que no pudieron ser justificados por la ley de Moisés[c], todo el que cree es justificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas', si el auditorio se entiende de manera inclusiva.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Jesús, el referido inmediatamente antes.
    reason: cross_reference
  - marker: c
    text: O 'ser declarados justos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν οὖν ἔστω ὑμῖν
  english_pob_choice: Therefore let it be known to you
  chosen_spanish: Por tanto, sepan que a ustedes
  alternatives_spanish:
  - Por tanto, háganse saber
  - Por tanto, sea conocido para ustedes
  lexicon: BDAG
  rationale: Conserva la fuerza imperativa/declarativa de la construcción impersonal y el valor de οὖν con una fórmula natural en español. 'Sepan' comunica el llamado a reconocer la verdad de lo anunciado sin volverlo mecánico.
- source_word: ἄνδρες ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - varones hermanos
  lexicon: BDAG
  rationale: Se mantiene el vocativo fraternal en forma breve y publicable. El potencial inclusivo se preserva en nota, porque el plural masculino puede funcionar como dirección al auditorio mixto sin forzar el texto principal.
- source_word: διὰ τούτου
  english_pob_choice: through this one
  chosen_spanish: por medio de este
  alternatives_spanish:
  - por medio de él
  - por este
  lexicon: BDAG
  rationale: '''Este'' conserva el demostrativo masculino singular sin añadir ''hombre''. ''Por medio de'' expresa bien el valor instrumental de διά con referencia personal implícita a Jesús.'
- source_word: ἄφεσις ἁμαρτιῶν
  english_pob_choice: forgiveness of sins
  chosen_spanish: el perdón de pecados
  alternatives_spanish:
  - la remisión de pecados
  - la liberación de pecados
  lexicon: BDAG
  rationale: '''Perdón de pecados'' es la equivalencia más clara y natural en español para el anuncio apostólico, sin perder el sentido soteriológico de ἄφεσις.'
- source_word: καταγγέλλεται
  english_pob_choice: is proclaimed
  chosen_spanish: se les anuncia
  alternatives_spanish:
  - es proclamado
  - se proclama
  lexicon: BDAG
  rationale: El verbo transmite proclamación pública; en español, la pasiva refleja 'se les anuncia' suena natural y mantiene el carácter de anuncio dirigido a los oyentes.
- source_word: ἀπὸ πάντων ὧν
  english_pob_choice: from all the things from which
  chosen_spanish: de todo aquello de lo cual
  alternatives_spanish:
  - de todo lo que
  - de todas las cosas de las que
  lexicon: BDAG
  rationale: Se conserva la relación preposicional y el antecedente amplio para no simplificar indebidamente la estructura griega. 'Aquello de lo cual' mantiene la referencia sin introducir un giro ajeno al texto.
- source_word: οὐκ ἠδυνήθητε
  english_pob_choice: you could not
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no les fue posible
  lexicon: BDAG
  rationale: Responde de forma directa y idiomática al aoristo de δύναμαι. El sujeto plural concuerda con el auditorio interpelado.
- source_word: ἐν νόμῳ Μωϋσέως
  english_pob_choice: by the law of Moses
  chosen_spanish: por la ley de Moisés
  alternatives_spanish:
  - en la ley de Moisés
  - mediante la ley de Moisés
  lexicon: BDAG
  rationale: '''Por'' expresa con naturalidad el valor instrumental que el inglés POB también captura con ''by''. ''Ley de Moisés'' conserva la referencia legal-covenantal del texto.'
- source_word: δικαιωθῆναι
  english_pob_choice: be justified
  chosen_spanish: ser justificados
  alternatives_spanish:
  - ser declarados justos
  - ser absueltos
  lexicon: BDAG
  rationale: Se conserva el término teológico forense 'justificar' en español, en voz pasiva infinitiva, para mantener la fuerza doctrinal del contraste con la ley de Moisés.
theological_decisions:
- issue: Alcance de ἄνδρες ἀδελφοί en el vocativo
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: La forma masculina se conserva en el texto principal, siguiendo el valor gramatical del griego y la práctica POB de no borrar el marcado masculino cuando funciona vocativamente. La opción inclusiva se deja en nota porque puede ser válida según la composición del auditorio.
  doctrine_reference: Translation philosophy §4
- issue: Sentido de δικαιωθῆναι frente a la ley mosaica
  english_pob_reading: be justified
  chosen_spanish_reading: ser justificados
  alternative_spanish_readings:
  - ser declarados justos
  rationale: Se mantiene el lenguaje forense tradicional de 'justificar' para no diluir el contraste teológico entre el perdón proclamado por Jesús y la incapacidad de obtener justificación por la ley de Moisés. La alternativa aclara el sentido sin reemplazar el término técnico.
  doctrine_reference: Translation philosophy §3, §5; Contested terms table on δικαιοσύνη
- issue: Referencia implícita de διὰ τούτου
  english_pob_reading: through this one
  chosen_spanish_reading: por medio de este
  alternative_spanish_readings:
  - por medio de él
  - por este
  rationale: La deixis masculina singular se conserva sin explicitar 'Jesús' en el cuerpo del versículo, porque el griego también usa un demostrativo inmediato y el POB inglés opta por transparencia sin sobreexplicar. La nota [b] aclara la referencia.
  doctrine_reference: Cross-reference policy
- issue: Forma de παρουσία/public proclamation en καταγγέλλεται
  english_pob_reading: is proclaimed
  chosen_spanish_reading: se les anuncia
  alternative_spanish_readings:
  - es proclamado
  - se proclama
  rationale: El anuncio apostólico puede expresarse con un impersonal natural en español sin perder solemnidad. 'Se les anuncia' conserva la dirección del mensaje a los oyentes y su dimensión pública.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente completó la cláusula final con 'everyone who believes is justified'. En español se incorporó esa cláusula explícita como 'todo el que cree es justificado', manteniendo el mismo alcance revisado y evitando depender del contexto para completar la oración.
  spanish_consistency_notes:
  - Se mantuvo 'ley de Moisés' para coherencia con la terminología bíblica estable del pasaje.
  - Se evitó 'Cristo' porque el referente inmediato es el demostrativo masculino singular y el audit trail inglés prefirió una formulación transparente sin nombre añadido.
  - '''Justificar/justificado'' se conservó de forma consistente para la carga forense del pasaje.'
  - La nota [b] está anclada en 'este' para cumplir la referencia explícita requerida.
