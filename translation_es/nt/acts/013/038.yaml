  text: γνωστὸν οὖν ἔστω ὑμῖν, ἄνδρες ἀδελφοί, ὅτι διὰ τούτου ὑμῖν ἄφεσις ἁμαρτιῶν καταγγέλλεται, καὶ ἀπὸ πάντων ὧν οὐκ ἠδυνήθητε ⸀ἐν νόμῳ Μωϋσέως δικαιωθῆναι
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/038.yaml
  text: Therefore let it be known to you[a], brothers, that through this one forgiveness of sins is proclaimed to you, and from all the things from which you could not be justified by the law of Moses[c][b], everyone who believes is justified.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' if the address is understood inclusively to the gathered audience.
    reason: lexical_alternative
  - marker: b
    text: That is, Jesus, the one just mentioned.
    reason: cross_reference
  - marker: c
    text: Or 'be declared righteous.'
    reason: lexical_alternative
