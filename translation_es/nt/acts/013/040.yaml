translation:
  language: es
  text: 'Por lo tanto, estén alerta, no sea que les sobrevenga lo que ha sido dicho en los profetas[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los profetas». El griego dice «en los profetas», probablemente refiriéndose a los escritos proféticos como el lugar donde se encuentra esta advertencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: watch out
  chosen_spanish: estén alerta
  alternatives_spanish:
  - cuiden
  - vigilen
  - estén atentos
  lexicon: BDAG
  rationale: El imperativo plural de advertencia pide una exhortación urgente. «Estén alerta» conserva la fuerza de vigilancia preventiva de manera natural en español moderno y refleja bien el valor admonitorio de βλέπετε.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por lo tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica a partir del argumento previo. «Por lo tanto» es claro, formal y fiel al valor conclusivo de οὖν.
- source_word: μὴ ἐπέλθῃ
  english_pob_choice: lest ... come upon you
  chosen_spanish: no sea que les sobrevenga
  alternatives_spanish:
  - para que no les sobrevenga
  - no vaya a sobrevenirles
  - no sea que caiga sobre ustedes
  lexicon: BDAG
  rationale: La combinación negativa con subjuntivo expresa advertencia de posible resultado. «No sea que» reproduce bien ese matiz precautorio en español; «les sobrevenga» mantiene el sentido de ἐπέρχομαι de un juicio o acontecimiento que alcanza a alguien.
- source_word: τὸ εἰρημένον
  english_pob_choice: what has been spoken
  chosen_spanish: lo que ha sido dicho
  alternatives_spanish:
  - lo dicho
  - lo que fue dicho
  - lo que ha sido hablado
  lexicon: BDAG
  rationale: El participio perfecto pasivo sustantivado sugiere algo dicho con vigencia presente. «Lo que ha sido dicho» preserva esa fuerza aspectual y la función sustantiva del griego.
- source_word: ἐν τοῖς προφήταις
  english_pob_choice: in the prophets
  chosen_spanish: en los profetas
  alternatives_spanish:
  - por los profetas
  - en los escritos proféticos
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para no perder la redacción del griego ni borrar la posible referencia al corpus profético. En contexto, puede aludir a lo escrito en los profetas, no solamente a la agencia humana.
theological_decisions:
- issue: Referencia de «los profetas»
  english_pob_reading: a reference to the prophetic writings/scriptural prophets as a corpus
  chosen_spanish_reading: una referencia al corpus profético, es decir, a lo escrito en los profetas
  alternative_spanish_readings:
  - una referencia principalmente a los profetas humanos
  - una referencia a lo dicho por los profetas
  rationale: En el contexto inmediato Pablo está a punto de citar Habacuc, así que la expresión apunta a lo que está escrito en la Escritura profética. Mantener «en los profetas» permite esa lectura sin convertirla prematuramente en una simple indicación de autoría.
  doctrine_reference: Uso canónico de la Escritura profética; coherencia intertextual con Habacuc 1:5 y el argumento paulino.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó que no había cambios necesarios, y se mantuvo la lectura de alta concordancia con la fuente griega y el audit trail en inglés.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el texto.
  - Se eligió una construcción española natural que mantiene la advertencia imperativa y el matiz de resultado temido del subjuntivo griego.
  - La nota al pie preserva la ambigüedad entre «en» y «por» sin sobretraducir el sintagma griego.
