translation:
  language: es
  text: 'que Dios ha cumplido esto para nuestros hijos[a], al levantar a Jesús[b], como también está escrito en el segundo salmo: «Tú eres mi Hijo; hoy te he engendrado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a nosotros, sus hijos». Algunos manuscritos dicen «para nuestros hijos», mientras que otros apoyan «a nosotros, sus hijos».'
    reason: textual_variant
  - marker: b
    text: 'O: «al resucitar a Jesús». El griego también puede entenderse como «al levantar a Jesús» en el sentido de hacerlo surgir o designarlo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπεπλήρωκεν
  english_pob_choice: has fulfilled
  chosen_spanish: ha cumplido
  alternatives_spanish:
  - ha cumplido plenamente
  - ha llevado a cumplimiento
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con vigencia presente. «Ha cumplido» es natural en español y conserva el lenguaje de cumplimiento de promesa o plan, sin añadir explicaciones ajenas al texto.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta
  - esta promesa
  lexicon: BDAG
  rationale: El demostrativo apunta a algo ya mencionado en el contexto. «Esto» mantiene la referencia abierta del griego sin introducir un sustantivo que el versículo no dice explícitamente.
- source_word: τοῖς τέκνοις ἡμῶν
  english_pob_choice: for our children
  chosen_spanish: para nuestros hijos
  alternatives_spanish:
  - a nuestros hijos
  - para nosotros, sus hijos
  lexicon: BDAG
  rationale: El dativo puede expresar destinatario o beneficio. «Para nuestros hijos» refleja bien el sentido contextual y la relación generacional; en nota se conserva la variante textual y la posible ambigüedad.
- source_word: ἀναστήσας Ἰησοῦν
  english_pob_choice: by raising up Jesus
  chosen_spanish: al levantar a Jesús
  alternatives_spanish:
  - al resucitar a Jesús
  - al hacer surgir a Jesús
  - al levantar a Jesús de entre los muertos
  lexicon: BDAG
  rationale: El participio aoristo se vierte adverbialmente. «Levantar» preserva la ambigüedad del griego entre resucitar, hacer surgir o designar/exaltar, sin resolver de antemano la relación con el contexto inmediato.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: Fórmula estándar en español para introducir una cita bíblica, equivalente al perfecto pasivo griego y apta para uso litúrgico y académico.
- source_word: ψαλμῷ ... τῷ δευτέρῳ
  english_pob_choice: the second Psalm
  chosen_spanish: el segundo salmo
  alternatives_spanish:
  - Salmo 2
  - el salmo segundo
  lexicon: BDAG
  rationale: «El segundo salmo» sigue de cerca la expresión griega y suena natural en español. Se evita reemplazarlo por una numeración normalizada en el cuerpo principal, para no ocultar la forma del texto fuente.
- source_word: Υἱός μου εἶ σύ
  english_pob_choice: You are my Son
  chosen_spanish: Tú eres mi Hijo
  alternatives_spanish:
  - Mi Hijo eres tú
  - Eres mi Hijo
  lexicon: BDAG
  rationale: El orden español normal comunica la identificación enfática sin sonar artificial. Se conserva «Hijo» con mayúscula inicial por tratarse de un título cristológico en la cita.
- source_word: σήμερον γεγέννηκά σε
  english_pob_choice: today I have begotten you
  chosen_spanish: yo te he engendrado hoy
  alternatives_spanish:
  - hoy te he engendrado
  - hoy te he dado a luz
  lexicon: BDAG
  rationale: «Engendrado» mantiene el peso intertextual de Salmo 2:7 y la fuerza terminológica de γεννάω. El orden español se ajusta para sonar natural sin perder el énfasis temporal de «hoy».
theological_decisions:
- issue: Sentido de ἀναστήσας Ἰησοῦν en este contexto
  english_pob_reading: rendered as 'raising up Jesus' to preserve ambiguity between resurrection language and God's raising up/appointing Jesus
  chosen_spanish_reading: «al levantar a Jesús» mantiene abierta la posibilidad de resurrección, exaltación o designación divina
  alternative_spanish_readings:
  - «al resucitar a Jesús»
  - «al levantar a Jesús de entre los muertos»
  - «al suscitar a Jesús»
  rationale: El contexto inmediato y el uso lucano de ἀνίστημι permiten más de una lectura. La traducción evita cerrar prematuramente la tensión, de modo que el lector pueda percibir tanto la resonancia con la resurrección como la idea de Dios levantando/estableciendo a Jesús.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla; cristología y resurrección en Hechos.
- issue: Fuerza cristológica de «yo te he engendrado hoy»
  english_pob_reading: retain the quotation directly without interpretive expansion
  chosen_spanish_reading: conservar la cita sin expansión interpretativa
  alternative_spanish_readings:
  - entenderla como lenguaje de entronización
  - entenderla como vindicación por resurrección
  rationale: La cita de Salmo 2:7 debe permanecer como cita. La traducción no introduce glosa doctrinal, para respetar el uso intertextual del texto y dejar abierta la discusión teológica que el mismo pasaje no cierra aquí.
  doctrine_reference: Afirmaciones cristológicas históricas; preservar la tensión textual.
translation_notes:
  revision_awareness: Se revisó la redacción final para mantener una sintaxis española fluida, conservar la ambigüedad de ἀναστήσας Ἰησοῦν y reflejar de manera transparente la cita del Salmo 2 sin resolver la tensión interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se conserva «Hijo» con mayúscula en la cita por su valor cristológico y porque reproduce la capitalización reverente común en español bíblico.
  - Se prefiere «engendrado» para γεγέννηκά, en coherencia con el peso intertextual de Salmo 2:7.
  - No se normaliza la referencia al salmo en el cuerpo del texto; la alternativa numerada queda en nota.
  - La puntuación española se ajusta a comillas latinas y sintaxis natural, sin alterar el contenido fuente.
