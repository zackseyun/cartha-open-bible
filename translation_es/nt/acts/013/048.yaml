revisions:
- from: Cuando los gentiles[oíron] esto, se regocijaban y glorificaban la palabra de Yahvé, y creyeron todos los que habían sido destinados para vida eterna[a].
  to: Cuando los gentiles oyeron esto, se alegraron y glorificaron la palabra de Yahvé, y creyeron cuantos habían sido destinados para la vida eterna[a].
  rationale: Se corrige el error «oíron» → «oyeron» y se elimina el corchete espurio. Se ajustan los imperfectos griegos a pretéritos españoles más naturales en narrativa y conformes con la revisión inglesa auditada. Se cambia «todos los que» por «cuantos» para reflejar mejor ὅσοι, y se mejora la naturalidad con «para la vida eterna». Se conserva «Yahvé» y la nota teológicamente sensible sobre τεταγμένοι según la política del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: circunstancia inicial con «cuando», referencia contextual a «esto», identificación de τὰ ἔθνη como «los gentiles», y conservación de la pasiva en τεταγμένοι con nota alternativa. Sin embargo, hay varios desajustes relevantes: «[oíron]» es una forma incorrecta y además introduce un corchete impropio en el texto; los imperfectos ἔχαιρον/ἐδόξαζον se han vertido como imperfectos españoles («se regocijaban... glorificaban»), lo que aquí suena menos natural en narrativa que el pretérito y no sigue el inglés POB revisado; y «todos los que» debilita ligeramente la fuerza cuantitativa de ὅσοι frente a una opción más cercana como «cuantos».'
  spanish_quality_summary: La redacción es mayormente comprensible, pero el texto actual tiene un error ortográfico/gramatical serio en «oíron» y una puntuación tipográfica impropia por el corchete incrustado. «Se regocijaban y glorificaban» es entendible, pero en español narrativo resulta más natural «se alegraron y glorificaban» o mejor, coordinado, «se alegraron y glorificaron». «Para vida eterna» es aceptable, pero «para la vida eterna» suena más idiomático y completo en español eclesial. La nota al pie está bien orientada y debe conservarse.
  glossary_alignment: Buen alineamiento general con terminología del proyecto en «Yahvé», «gentiles», «vida eterna» y la preservación de la pasiva en τεταγμένοι. No obstante, dado que el griego tiene κύριος y no יהוה explícito, el uso de «Yahvé» aquí sigue una decisión doctrinal sensible ya documentada; no es necesario cambiarlo en esta revisión, pero conviene reconocer que es una aplicación de la política del proyecto más que una exigencia léxica inmediata del versículo. «Destinados» es posible, aunque «designados» o «asignados» evitarían matices fatalistas; aun así, con la nota alternativa, «destinados» puede mantenerse.
  issues:
  - severity: high
    issue: Forma verbal incorrecta y texto corrupto en «[oíron]»
    rationale: «Oíron» no es español correcto; debe ser «oyeron». Además, los corchetes no corresponden a marcadores de nota y dañan la legibilidad del texto bíblico.
  - severity: medium
    issue: Uso de imperfectos españoles «se regocijaban y glorificaban»
    rationale: Aunque los verbos griegos están en imperfecto, en español narrativo bíblico el pretérito simple comunica mejor la secuencia y coincide con la revisión inglesa auditada («rejoiced and glorified»). El imperfecto aquí suena progresivo/habitual de manera innecesaria.
  - severity: medium
    issue: «todos los que» no refleja tan de cerca la fuerza cuantitativa de ὅσοι
    rationale: Es comprensible, pero «cuantos» o «todos cuantos» se acerca mejor a «as many as» sin forzar el español.
  - severity: low
    issue: Ausencia del artículo en «para vida eterna»
    rationale: «Para vida eterna» es aceptable, pero «para la vida eterna» es más idiomático y natural en español estándar de registro bíblico.
  revised_spanish_text: Cuando los gentiles oyeron esto, se alegraron y glorificaron la palabra de Yahvé, y creyeron cuantos habían sido destinados para la vida eterna[a].
  revised_footnotes:
  - marker: a
    text: O «habían sido dispuestos hacia la vida eterna». El participio pasivo de τάσσω puede entenderse de distintas maneras; «habían sido destinados» conserva aquí el sentido pasivo más directo.
    reason: alternative_reading
  revision_rationale: Se corrige el error «oíron» → «oyeron» y se elimina el corchete espurio. Se ajustan los imperfectos griegos a pretéritos españoles más naturales en narrativa y conformes con la revisión inglesa auditada. Se cambia «todos los que» por «cuantos» para reflejar mejor ὅσοι, y se mejora la naturalidad con «para la vida eterna». Se conserva «Yahvé» y la nota teológicamente sensible sobre τεταγμένοι según la política del proyecto.
