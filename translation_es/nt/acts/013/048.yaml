translation:
  language: es
  text: Cuando los gentiles oyeron esto, se alegraron y glorificaron la palabra de Yahvé, y creyeron cuantos habían sido destinados para la vida eterna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían sido dispuestos hacia la vida eterna». El participio pasivo de τάσσω puede entenderse de distintas maneras; «habían sido destinados» conserva aquí el sentido pasivo más directo.
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En Hechos, el término contrasta normalmente a los no judíos con los judíos; «gentiles» comunica mejor ese valor contextual que «naciones».
- source_word: ἔχαιρον
  english_pob_choice: rejoiced
  chosen_spanish: se regocijaban
  alternatives_spanish:
  - se alegraban
  - se gozaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o en desarrollo; el imperfecto español «se regocijaban» conserva bien ese matiz sin añadir un inicio que el griego no obliga.
- source_word: ἐδόξαζον
  english_pob_choice: glorified
  chosen_spanish: glorificaban
  alternatives_spanish:
  - alababan
  - honraban
  lexicon: BDAG
  rationale: δοξάζω en Lucas-Hechos suele significar «glorificar»; el verbo español mantiene la correspondencia semántica y el paralelismo con el imperfecto anterior.
- source_word: τὸν λόγον τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  - el mensaje del Señor
  lexicon: BDAG
  rationale: λόγος conserva aquí el valor de mensaje proclamado, pero «palabra» es el equivalente bíblico natural. Dado que el texto griego usa κύριος en un marco lucano donde el nombre divino puede estar en vista, se sigue el criterio del proyecto de rendir YHWH como «Yahvé» en el texto principal.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - pusieron su fe
  - llegaron a creer
  lexicon: BDAG
  rationale: El aoristo se traduce con pasado simple. «Creyeron» es directo y no añade expansión interpretativa.
- source_word: ὅσοι
  english_pob_choice: as many as
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - tantos como
  lexicon: BDAG
  rationale: La expresión cuantitativa relativa admite en español «todos los que», que comunica el alcance colectivo de manera natural; aunque el inglés revisado favorece «as many as», aquí la formulación española conserva la fuerza distributiva sin sonar forzada.
- source_word: τεταγμένοι
  english_pob_choice: had been appointed
  chosen_spanish: habían sido destinados
  alternatives_spanish:
  - habían sido designados
  - habían sido ordenados
  - estaban dispuestos
  lexicon: BDAG
  rationale: El participio perfecto pasivo de τάσσω sugiere haber sido asignados/puestos para un fin. «Destinados» mantiene la pasividad y la ambigüedad teológica sin resolverla de antemano; evita suavizarla hacia una mera disposición interna.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: for eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - a vida eterna
  - hacia vida eterna
  lexicon: BDAG
  rationale: La preposición εἰς con esta expresión puede ser final o direccional; «para» transmite bien el propósito/resultado en español y suena natural.
theological_decisions:
- issue: Relación entre τεταγμένοι y la respuesta de fe
  english_pob_reading: had been appointed for eternal life
  chosen_spanish_reading: habían sido destinados para vida eterna
  alternative_spanish_readings:
  - habían sido designados para vida eterna
  - estaban dispuestos para vida eterna
  - habían sido ordenados para vida eterna
  rationale: La pasiva de τάσσω se conserva sin convertirla en una formulación doctrinal más amplia de la necesaria. «Destinados» deja abierta la tensión interpretativa reconocida en la nota inglesa, pero mantiene el sentido pasivo más directo en español.
  doctrine_reference: Affirmations; Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: κύριος y el tratamiento del nombre divino
  english_pob_reading: the word of the Lord
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  - la palabra del Señor Yahvé
  rationale: Siguiendo el estándar del proyecto, cuando κύριος en este tipo de contexto remite al nombre divino, se explicita como «Yahvé» en el texto principal en vez de ocultarlo con «Señor». Esto mantiene la trazabilidad al trasfondo del nombre divino.
  doctrine_reference: Project-level terminology default for יהוה / YHWH
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: se evitó introducir un matiz inceptivo equivalente a «began», y se reflejó la cuantificación de ὅσοι con una fórmula española natural. También se preservó la tensión interpretativa sobre τεταγμένοι mediante una nota alternativa en lugar de resolverla dogmáticamente.'
  spanish_consistency_notes:
  - Se usó «gentiles» para τὰ ἔθνη por coherencia con Hechos.
  - Se mantuvo «glorificaban» para ἐδόξαζον, en paralelo con el imperfecto griego.
  - Se prefirió el pasado simple «creyeron» para ἐπίστευσαν.
  - Se adoptó «Yahvé» por la directriz terminológica del proyecto cuando κύριος remite al nombre divino.
