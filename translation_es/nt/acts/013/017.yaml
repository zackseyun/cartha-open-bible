translation:
  language: es
  text: El Dios de este pueblo de Israel escogió a nuestros padres[a], e hizo grande al pueblo durante su estadía como extranjeros en la tierra de Egipto[b][c][d], y con brazo levantado los sacó de allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «nuestros antepasados». Griego: «nuestros padres».'
    reason: lexical_alternative
  - marker: b
    text: O «exaltó al pueblo» o «aumentó al pueblo».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «con un brazo alto»; un modismo del Éxodo para la poderosa liberación de Dios.
    reason: cultural_note
  - marker: d
    text: O «los hizo salir».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς
  english_pob_choice: The God
  chosen_spanish: El Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: En español, el artículo definido antepuesto a «Dios» en una construcción genitiva suena natural y conserva la apertura formal del griego sin forzar una calca extraña. Mantiene la identificación específica del Dios de Israel.
- source_word: τοῦ λαοῦ τούτου Ἰσραήλ
  english_pob_choice: of this people Israel
  chosen_spanish: de este pueblo de Israel
  alternatives_spanish:
  - de este pueblo, Israel
  - de este pueblo israelita
  lexicon: BDAG
  rationale: Se conserva la estructura posesiva y la apposición con «Israel» como nombre propio. «Pueblo de Israel» es la forma más natural en español y mantiene la referencia histórica-covenantal.
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: «Escogió» transmite bien el aoristo medio de ἐκλέγομαι en español bíblico contemporáneo sin añadir una glosa innecesaria. Conserva el acto soberano de elección.
- source_word: τοὺς πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: Se mantiene el sustantivo masculino concreto de la fuente griega, como hace la POB en inglés. «Antepasados» sería posible, pero suaviza la forma del original.
- source_word: τὸν λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: BDAG
  rationale: Aquí el verbo exige complemento directo; «el pueblo» conserva la continuidad con la primera cláusula y el sentido corporativo de λαός.
- source_word: ὕψωσεν
  english_pob_choice: made the people great
  chosen_spanish: hizo grande al pueblo
  alternatives_spanish:
  - exaltó al pueblo
  - aumentó al pueblo
  lexicon: BDAG
  rationale: «Hizo grande» refleja bien la amplitud semántica del verbo en este contexto de Éxodo sin reducirlo solo a aumento numérico o solo a exaltación social. Es una solución idiomática y fiel.
- source_word: ἐν τῇ παροικίᾳ
  english_pob_choice: during their sojourn
  chosen_spanish: durante su estancia forastera
  alternatives_spanish:
  - durante su sojourn
  - durante su permanencia como extranjeros
  lexicon: BDAG
  rationale: «Paroikía» implica residencia temporal y condición de forastero. En español, «estancia forastera» preserva esa tensión sin depender del tecnicismo «sojorn», menos natural.
- source_word: ἐν γῇ Αἰγύπτου
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en el país de Egipto
  - en Egipto
  lexicon: BDAG
  rationale: «Tierra de Egipto» sigue de cerca la frase griega con γῇ y conserva el registro bíblico. «Tierra» resulta más cercano al lenguaje de la Escritura que «país».
- source_word: μετὰ βραχίονος ὑψηλοῦ
  english_pob_choice: with an uplifted arm
  chosen_spanish: con brazo levantado
  alternatives_spanish:
  - con brazo alzado
  - con un brazo alto
  lexicon: BDAG
  rationale: La expresión bíblica se vierte de manera natural en español. «Brazo levantado» mantiene la imagen idiomática del éxodo sin imponer una interpretación como «mighty arm».
- source_word: ἐξήγαγεν
  english_pob_choice: he led them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los condujo fuera
  - los hizo salir
  lexicon: BDAG
  rationale: En español, «los sacó» expresa con claridad y concisión la acción de ἐξάγω. La idea direccional queda reforzada por «de allí».
- source_word: ἐξ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de allí
  alternatives_spanish:
  - de ella
  - fuera de ella
  lexicon: BDAG
  rationale: El antecedente es Egipto; «de allí» evita una repetición poco natural en español y conserva el referente espacial sin perder claridad.
theological_decisions:
- issue: Referencia a los antepasados de Israel
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: La forma griega es literalmente masculina plural y la POB en inglés preserva ese dato. En español, «padres» mantiene el vínculo patriarcal e histórico del discurso de Pablo sin neutralizar la referencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de ὕψωσεν en Egipto
  english_pob_reading: made the people great
  chosen_spanish_reading: hizo grande al pueblo
  alternative_spanish_readings:
  - exaltó al pueblo
  - aumentó al pueblo
  rationale: El verbo puede abarcar exaltación de estatus y crecimiento del pueblo. «Hizo grande» deja abierta esa tensión semántica y se ajusta al marco de la historia del éxodo sin estrechar el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Idioma exódico de «brazo alto»
  english_pob_reading: Literally 'with a high arm'; an Exodus idiom for God's powerful deliverance.
  chosen_spanish_reading: con brazo levantado
  alternative_spanish_readings:
  - con brazo alto
  - con brazo poderoso
  rationale: Se conserva el modismo bíblico y su resonancia exódica. La formulación española no debe reemplazar el tropo por una paráfrasis interpretativa, para no perder el eco intertextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El texto inglés auditado muestra alta concordancia y no registra revisiones aplicadas. La traducción española sigue de cerca el consenso del paquete fuente, manteniendo las tensiones léxicas relevantes (padres/antepasados, hizo grande/exaltó/aumentó, brazo levantado/brazo alto) sin añadir interpretaciones ajenas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se introdujo una sustitución litúrgica por «SEÑOR», conforme al estándar del proyecto.
  - Se preservó el paralelismo entre «pueblo» en ambas cláusulas, como reflejo del griego λαός.
  - «Egipto» se tradujo con artículo explícito en la cláusula completa («la tierra de Egipto») para respetar γῇ y la cadencia bíblica.
  - La nota c se ancla en «brazo levantado» porque allí se concentra la decisión idiomática relevante.
  - El uso de «escogió» y «hizo grande» evita mecanicismos, pero permanece fiel al registro histórico-teológico del discurso de Hechos.
