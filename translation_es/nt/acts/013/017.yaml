revisions:
- from: El Dios de este pueblo de Israel escogió a nuestros padres[a], e hizo grande al pueblo durante su estancia forastera en la tierra de Egipto[d][c][b], y con brazo levantado los sacó de allí.
  to: El Dios de este pueblo de Israel escogió a nuestros padres[a], e hizo grande al pueblo durante su estadía como extranjeros en la tierra de Egipto[b][c][d], y con brazo levantado los sacó de allí.
  rationale: Se revisa «estancia forastera» a «estadía como extranjeros» para expresar con naturalidad y precisión la idea de παροικία. Se corrige la nota d para que preserve una alternativa real de ἐξήγαγεν en lugar de repetir el texto principal, y se amplía la nota b para incluir las dos alternativas semánticas significativas documentadas por la auditoría inglesa. El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:17Z'
