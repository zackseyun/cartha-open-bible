review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste narrativo, visión de las multitudes, reacción de celos, contradicción y blasfemia. Sin embargo, en τοῖς ὑπὸ Παύλου λαλουμένοις la auditoría inglesa decidió conservar un giro más formal equivalente a ''lo que fue hablado/dicho por Pablo'', mientras que el español draft lo cambió a ''lo que Pablo decía''. Esa opción es comprensible, pero reduce el matiz del participio pasivo sustantivado con ὑπό + genitivo y además invierte la relación de voz documentada en la trazabilidad POB.'
  spanish_quality_summary: El español es claro, natural y de buena legibilidad eclesial. 'Las multitudes', 'se llenaron de celos' y 'blasfemando' funcionan bien. El único ajuste recomendado es hacer más fiel y algo más formal la frase sobre el mensaje de Pablo sin caer en un calco torpe.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los judíos' con nota aclaratoria sigue la decisión documentada. 'Celos' para ζῆλος en contexto hostil está bien justificado. 'Blasfemando' preserva la fuerza de βλασφημοῦντες. La única desalineación relevante es con la decisión lexical auditada para τοῖς ὑπὸ Παύλου λαλουμένοις.
  issues:
  - severity: medium
    issue: La frase 'lo que Pablo decía' no conserva bien la forma ni la decisión auditada de τοῖς ὑπὸ Παύλου λαλουμένοις.
    rationale: El griego usa participio pasivo sustantivado con ὑπό + genitivo ('las cosas habladas por Pablo' / 'lo dicho por Pablo'). 'Lo que Pablo decía' es natural, pero cambia a una formulación activa e imperfectiva y se aparta de la trazabilidad formal elegida por el English POB.
  revised_spanish_text: Pero cuando los judíos vieron las multitudes[a], se llenaron de celos[b] y comenzaron a contradecir lo dicho por Pablo[c], blasfemando.
  revised_footnotes:
  - marker: a
    text: Es decir, el grupo judío local que se oponía a Pablo en esta escena, no el pueblo judío en su conjunto.
    reason: cultural_note
  - marker: b
    text: O 'se llenaron de celo'; aquí el contexto favorece el sentido negativo, 'celos'.
    reason: lexical_alternative
  - marker: c
    text: O 'lo que Pablo estaba diciendo'.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta solo τοῖς ὑπὸ Παύλου λαλουμένοις para alinearlo mejor con el griego pasivo sustantivado y con la decisión documentada en la auditoría inglesa, usando un español natural y digno: ''lo dicho por Pablo''.'
