translation:
  language: es
  text: Pero cuando los judíos vieron las multitudes[a], se llenaron de celos[b] y comenzaron a contradecir lo dicho por Pablo[c], blasfemando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el grupo judío local que se oponía a Pablo en esta escena, no el pueblo judío en su conjunto.
    reason: cultural_note
  - marker: b
    text: O 'se llenaron de celo'; aquí el contexto favorece el sentido negativo, 'celos'.
    reason: lexical_alternative
  - marker: c
    text: O 'lo que Pablo estaba diciendo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when ... saw
  chosen_spanish: cuando vieron
  alternatives_spanish:
  - al ver
  - viendo
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte con valor temporal en un español natural: ''cuando vieron''. Mantiene la relación con la acción principal sin calco duro.'
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo contrastivo; 'Pero' reproduce bien el cambio respecto del contexto previo.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego dice literalmente 'los judíos'. Se conserva la designación explícita, con la nota aclaratoria para evitar una generalización indebida en español.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las masas
  - la multitud
  lexicon: BDAG
  rationale: ὄχλοι es plural; 'las multitudes' preserva ese plural y suena natural en español bíblico contemporáneo.
- source_word: ἐπλήσθησαν ζήλου
  english_pob_choice: were filled with jealousy
  chosen_spanish: se llenaron de celos
  alternatives_spanish:
  - se llenaron de celo
  - se sintieron celosos
  - se inflamaron de celo
  lexicon: BDAG
  rationale: En este contexto hostil, ζῆλος tiene el sentido negativo de celos/envidia, no de celo positivo. 'Se llenaron de celos' conserva la fuerza idiomática y la tensión semántica del término.
- source_word: ἀντέλεγον
  english_pob_choice: began contradicting
  chosen_spanish: comenzaron a contradecir
  alternatives_spanish:
  - contradecían
  - se opusieron
  - empezaron a hablar en contra
  lexicon: BDAG
  rationale: El imperfecto puede expresar comienzo o acción en desarrollo; 'comenzaron a contradecir' sigue el valor inceptivo señalado en la auditoría inglesa y suena idiomático en español.
- source_word: τοῖς ὑπὸ Παύλου λαλουμένοις
  english_pob_choice: what was spoken by Paul
  chosen_spanish: lo que Pablo decía
  alternatives_spanish:
  - lo que era hablado por Pablo
  - las cosas dichas por Pablo
  - lo que se decía por medio de Pablo
  lexicon: BDAG
  rationale: La construcción participial articular con ὑπό + genitivo se refiere al contenido del habla de Pablo. 'Lo que Pablo decía' es una forma natural de español que conserva el foco en el mensaje sin introducir pasividad extraña.
- source_word: βλασφημοῦντες
  english_pob_choice: blaspheming
  chosen_spanish: blasfemando
  alternatives_spanish:
  - hablando blasfemias
  - injuriando
  - maldiciendo
  lexicon: BDAG
  rationale: El participio expresa acción concomitante; 'blasfemando' preserva la gravedad del verbo y su correspondencia directa con el griego.
theological_decisions:
- issue: Alcance de 'los judíos' en una escena de oposición
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se mantiene la designación textual explícita sin reducirla a 'líderes' ni sustituirla por otra etnónimo más interpretativo. La nota a pie aclara que se trata del grupo local en la escena, no del pueblo judío en su totalidad.
  doctrine_reference: Principios de traducción POB §1, §6
- issue: ζῆλος en contexto hostil
  english_pob_reading: were filled with jealousy
  chosen_spanish_reading: se llenaron de celos
  alternative_spanish_readings:
  - se llenaron de celo
  - se volvieron celosos
  rationale: La escena de oposición y la secuencia con contradicción y blasfemia favorecen el sentido negativo. 'Celos' evita suavizar el conflicto y mantiene la tensión lexical documentada.
  doctrine_reference: BDAG ζῆλος; coherencia semántica del pasaje
- issue: βλασφημοῦντες como modo de su oposición
  english_pob_reading: blaspheming
  chosen_spanish_reading: blasfemando
  alternative_spanish_readings:
  - hablando blasfemias
  - injuriando
  - calumniando
  rationale: Se conserva el peso teológico y verbal de βλασφημέω. No se diluye en un término genérico como 'insultando', pues el texto apunta a lenguaje irreverente y ofensivo contra el mensaje.
  doctrine_reference: BDAG βλασφημέω
translation_notes:
  revision_awareness: La auditoría inglesa revisó una redacción más literal ('what was being spoken by Paul') a una forma más natural ('what was spoken by Paul'). En español se optó por una solución equivalente y natural ('lo que Pablo decía') que conserva el contenido y la relación participial sin forzar una pasiva perifrástica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - Se mantiene 'blasfemando' para reflejar el valor fuerte de βλασφημέω.
  - '''Los judíos'' se conserva por fidelidad textual, con nota aclaratoria para evitar lectura universalizante.'
