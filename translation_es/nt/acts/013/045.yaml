  text: ἰδόντες δὲ οἱ Ἰουδαῖοι τοὺς ὄχλους ἐπλήσθησαν ζήλου καὶ ἀντέλεγον τοῖς ⸀ὑπὸ Παύλου ⸀λαλουμένοις ⸀βλασφημοῦντες.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/045.yaml
  text: But when the Jews saw the crowds[a], they were filled with jealousy and began contradicting what was spoken by Paul[c][b], blaspheming.
  footnotes:
  - marker: a
    text: That is, the local Jewish group opposing Paul in this scene, not the Jewish people as a whole.
    reason: cultural_note
  - marker: b
    text: Or 'were filled with zeal'; here the context favors the negative sense, 'jealousy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the things Paul was saying.'
    reason: lexical_alternative
