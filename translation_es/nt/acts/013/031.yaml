translation:
  language: es
  text: Él se apareció[a] durante muchos días a los que habían subido con él desde Galilea hasta Jerusalén, quienes ahora son sus testigos al pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue visto'. El verbo griego puede verterse de manera más formal así, especialmente en contextos de apariciones de resurrección.
    reason: lexical_alternative
  - marker: b
    text: '''El pueblo'' aquí probablemente se refiere de manera específica al pueblo judío/Israel en el contexto.'
    reason: cultural_note
lexical_decisions:
- source_word: ὃς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: El pronombre relativo retoma a Jesús del versículo anterior. En español, como en la decisión inglesa, comenzar con un pronombre personal evita una apertura pesada y mantiene clara la referencia sin perder el enlace anafórico.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - fue visto
  - se dejó ver
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω suele usarse en contextos de apariciones de resurrección. 'Se apareció' comunica bien el evento en español natural; 'fue visto' sería más formalmente literal, pero menos idiomático.
- source_word: ἐπὶ ἡμέρας πλείους
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - a lo largo de muchos días
  lexicon: BDAG
  rationale: La preposición con acusativo expresa duración. 'Durante muchos días' es natural y fiel al valor temporal del griego.
- source_word: τοῖς συναναβᾶσιν αὐτῷ
  english_pob_choice: to those who had gone up with him
  chosen_spanish: a los que habían subido con él
  alternatives_spanish:
  - a los que subieron con él
  - a sus compañeros que subieron con él
  lexicon: BDAG
  rationale: El participio aoristo señala a quienes lo acompañaron en la subida/jornada. 'Habían subido' refleja la anterioridad respecto de la aparición y conserva el matiz de ascenso hacia Jerusalén.
- source_word: ἀπὸ τῆς Γαλιλαίας εἰς Ἰερουσαλήμ
  english_pob_choice: from Galilee to Jerusalem
  chosen_spanish: desde Galilea hasta Jerusalén
  alternatives_spanish:
  - de Galilea a Jerusalén
  - desde Galilea a Jerusalén
  lexicon: BDAG
  rationale: La trayectoria geográfica es directa. 'Desde... hasta...' mantiene el movimiento y sugiere con naturalidad el desplazamiento completo.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los cuales
  alternatives_spanish:
  - quienes
  - que
  lexicon: BDAG
  rationale: El relativo cualitativo identifica a este grupo como los testigos actuales. 'Los cuales' preserva mejor la relación explicativa/formal del griego en un español solemne.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: Marca el estado presente de los testigos en contraste con la aparición pasada.
- source_word: μάρτυρες αὐτοῦ
  english_pob_choice: his witnesses
  chosen_spanish: sus testigos
  alternatives_spanish:
  - testigos de él
  - testigos acerca de él
  lexicon: BDAG
  rationale: 'El genitivo es relacional: son testigos pertenecientes a él y testigos de su persona/obra. ''Sus testigos'' suena natural en español y preserva esa relación sin sobreexplicarla.'
- source_word: πρὸς τὸν λαόν
  english_pob_choice: to the people
  chosen_spanish: ante el pueblo
  alternatives_spanish:
  - para el pueblo
  - al pueblo
  lexicon: BDAG
  rationale: πρός con acusativo aquí señala dirección hacia una audiencia. 'Ante el pueblo' expresa mejor la función testimonial pública que 'al pueblo' o 'para el pueblo' en español.
- source_word: λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo de Israel
  - la gente
  lexicon: BDAG
  rationale: El griego dice simplemente 'el pueblo'. En contexto se entiende de Israel/Judá, pero la traducción conserva la forma general y evita ampliar explícitamente más de lo que el texto expresa.
theological_decisions:
- issue: Lenguaje de la aparición de resurrección
  english_pob_reading: He appeared
  chosen_spanish_reading: Él se apareció
  alternative_spanish_readings:
  - Él fue visto
  - Él se dejó ver
  rationale: El contexto habla de una aparición histórica del resucitado a testigos designados. 'Se apareció' comunica esa realidad sin reducirla a mera percepción pasiva.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Alcance de 'el pueblo'
  english_pob_reading: the people
  chosen_spanish_reading: el pueblo
  alternative_spanish_readings:
  - el pueblo de Israel
  - el pueblo judío
  rationale: Aunque el contexto apunta fuertemente al pueblo judío/Israel, el griego usa λαός sin expansión explícita. Se mantiene la misma amplitud y se deja la especificación al contexto inmediato.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios según el control cruzado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió un registro formal y eclesial, evitando arcaísmos innecesarios.
  - Se conservó la distinción entre aparición pascual y testimonio público sin introducir expansión doctrinal ajena al texto.
