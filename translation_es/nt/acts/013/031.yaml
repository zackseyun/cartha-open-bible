revisions:
- from: Él se apareció[a] durante muchos días a los que habían subido con él desde Galilea hasta Jerusalén, los cuales ahora son sus testigos ante el pueblo[b].
  to: Él se apareció[a] durante muchos días a los que habían subido con él desde Galilea hasta Jerusalén, quienes ahora son sus testigos al pueblo[b].
  rationale: 'La revisión hace dos ajustes menores: cambia ''los cuales'' por ''quienes'' para un español más natural y cambia ''ante el pueblo'' por ''al pueblo'' para reflejar mejor la orientación de πρός hacia la audiencia del testimonio. Se conservan el sentido, las notas y la dignidad del registro.'
