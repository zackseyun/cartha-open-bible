translation:
  language: es
  text: antes de su venida[a], Juan había proclamado a todo el pueblo de Israel un bautismo de arrepentimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de su llegada». La expresión griega dice literalmente «antes de la faz de su entrada», un modismo para ir delante de la venida de alguien.
    reason: lexical_alternative
  - marker: b
    text: O «un bautismo para arrepentimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: προκηρύξαντος
  english_pob_choice: had proclaimed
  chosen_spanish: había proclamado
  alternatives_spanish:
  - había anunciado
  - había predicado de antemano
  lexicon: BDAG
  rationale: El participio aoristo en esta construcción señala una proclamación pública previa. «Había proclamado» comunica bien la acción pública y anterior sin añadir un adverbio innecesario en español.
- source_word: πρὸ προσώπου τῆς εἰσόδου αὐτοῦ
  english_pob_choice: before his coming
  chosen_spanish: antes de su venida
  alternatives_spanish:
  - antes de su llegada
  - antes de su entrada
  - antes de que él viniera
  lexicon: BDAG
  rationale: La expresión es idiomática y no debe traducirse literalmente como «ante la faz de su entrada». «Antes de su venida» conserva la prioridad temporal y funciona con naturalidad en español bíblico contemporáneo.
- source_word: εἰσόδου
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - llegada
  - entrada
  lexicon: BDAG
  rationale: Aunque el sustantivo puede significar «entrada» o «ingreso», aquí se refiere a la llegada/aparición del que viene. «Venida» es natural en español y puede mantener el matiz solemne del contexto.
- source_word: βάπτισμα μετανοίας
  english_pob_choice: a baptism of repentance
  chosen_spanish: un bautismo de arrepentimiento
  alternatives_spanish:
  - un bautismo para arrepentimiento
  - un bautismo de cambio de mente
  lexicon: BDAG
  rationale: La relación genitiva se conserva de manera directa con «de arrepentimiento», que es la formulación más transparente en español y mantiene la conexión terminológica con el ministerio de Juan.
- source_word: παντὶ τῷ λαῷ Ἰσραήλ
  english_pob_choice: to all the people of Israel
  chosen_spanish: a todo el pueblo de Israel
  alternatives_spanish:
  - a todo Israel
  - a todo el pueblo israelita
  lexicon: BDAG
  rationale: La dativa se vierte como destinatario de la proclamación. «Todo el pueblo de Israel» preserva πᾶς y λαός sin perder la referencia colectiva e histórica.
- source_word: Ἰωάννου
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: Se usa el nombre propio estándar en español. No se añade «el Bautista» porque no aparece en el verso y el contexto ya identifica a Juan como precursor.
theological_decisions:
- issue: Sentido de «su» en «antes de su venida»
  english_pob_reading: The pronoun refers to Jesus/the Davidic Savior in Paul's speech context.
  chosen_spanish_reading: El pronombre se entiende por el contexto como referido a Jesús, el Salvador davídico del discurso de Pablo.
  alternative_spanish_readings:
  - Referencia no explicitada en el versículo aislado
  rationale: El griego del versículo no nombra al referente, pero el contexto inmediato de Hechos 13:23–25 lo identifica claramente. La traducción conserva esa referencia implícita sin añadir un nombre que no está en el verso.
  doctrine_reference: Hechos 13:23–25; coherencia contextual del discurso apostólico.
translation_notes:
  revision_awareness: 'El modelo base en inglés ya fue revisado y conservó la misma lectura (sin cambios) tras control cruzado de alta concordancia. Esta versión española sigue el mismo perfil: mantiene la prioridad temporal, la proclama pública de Juan y la lectura genitiva de «bautismo de arrepentimiento» sin sobreexplicaciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Venida» se usa aquí por naturalidad y solemnidad; no se fuerza una traducción literal de «entrada».
  - La puntuación sigue el orden sintáctico español y conserva el sentido de una frase subordinada temporal inicial.
