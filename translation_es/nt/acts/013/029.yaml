translation:
  language: es
  text: Y cuando cumplieron todo lo que estaba escrito acerca de él[a], lo bajaron del árbol y lo pusieron en un sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cruz»; el griego dice ξύλον, literalmente «árbol» o «madera», término también usado para el instrumento de ejecución de madera y posiblemente con eco de Deuteronomio 21:23.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y después que
  lexicon: BDAG
  rationale: La expresión introduce la secuencia narrativa con sentido temporal. «Y cuando» conserva la transición del relato en un español natural y fiel al valor de ὡς δὲ.
- source_word: ἐτέλεσαν
  english_pob_choice: had carried out
  chosen_spanish: hubieron cumplido
  alternatives_spanish:
  - habían llevado a cabo
  - habían completado
  - habían acabado
  lexicon: BDAG
  rationale: τελέω aquí expresa llevar a término o cumplir lo escrito. «Hubieron cumplido» refleja un cumplimiento consumado y mantiene el matiz de realización de lo que estaba determinado por las Escrituras.
- source_word: πάντα τὰ περὶ αὐτοῦ γεγραμμένα
  english_pob_choice: all that had been written concerning him
  chosen_spanish: todo lo que estaba escrito acerca de él
  alternatives_spanish:
  - todas las cosas escritas acerca de él
  - todo lo escrito sobre él
  lexicon: BDAG
  rationale: La frase abarca de manera total lo escrito previamente sobre Jesús. «Acerca de él» reproduce περὶ αὐτοῦ con un giro natural en español, y «estaba escrito» mantiene la prioridad de lo escrito en el texto griego.
- source_word: καθελόντες
  english_pob_choice: they took him down
  chosen_spanish: lo bajaron
  alternatives_spanish:
  - lo descendieron
  - lo quitaron
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente en español con una acción narrativa sucesiva. «Lo bajaron» es idiomático y comunica con claridad el retiro del cuerpo del instrumento de ejecución.
- source_word: ἀπὸ τοῦ ξύλου
  english_pob_choice: from the tree
  chosen_spanish: del árbol
  alternatives_spanish:
  - de la madera
  - de la cruz
  lexicon: BDAG
  rationale: ξύλον significa literalmente «madera» o «árbol». En este contexto, «árbol» preserva la opción léxica del griego y su posible eco bíblico, en lugar de armonizar directamente con «cruz» en el texto principal.
- source_word: ἔθηκαν
  english_pob_choice: laid
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo colocaron
  - lo depositaron
  lexicon: BDAG
  rationale: τίθημι es un verbo amplio de poner o colocar. «Lo pusieron» es claro, natural y suficientemente preciso para el acto de sepultura.
- source_word: εἰς μνημεῖον
  english_pob_choice: in a tomb
  chosen_spanish: en un sepulcro
  alternatives_spanish:
  - en una tumba
  - en un monumento funerario
  lexicon: BDAG
  rationale: μνημεῖον en este contexto designa un lugar de entierro. «Sepulcro» es un equivalente reverente y claro en español, útil para registros bíblicos, sin imponer una formulación demasiado litúrgica.
theological_decisions:
- issue: Renderización de ξύλον en un contexto de pasión
  english_pob_reading: tree
  chosen_spanish_reading: árbol
  alternative_spanish_readings:
  - cruz
  - madero
  rationale: La lectura de la POB inglesa preserva la forma léxica griega ξύλον y su posible resonancia con Deuteronomio 21:23. «Árbol» mantiene esa primacía original en español; «cruz» queda como alternativa contextual más interpretativa, mientras que «madero» sería posible pero menos literal en este versículo.
  doctrine_reference: Translation philosophy §1 (primacía de la lengua original sobre la tradición de traducción)
- issue: Relación entre el cumplimiento de lo escrito y la secuencia narrativa
  english_pob_reading: had been written / had carried out
  chosen_spanish_reading: habían cumplido / estaba escrito
  alternative_spanish_readings:
  - habían realizado
  - se había escrito
  rationale: El griego presenta el cumplimiento de todo lo escrito como un hecho previo y completo. La formulación elegida conserva esa prioridad temporal sin perder fluidez en español y sin diluir la idea de cumplimiento de las Escrituras.
  doctrine_reference: Gramática del perfecto anterior y función profética del texto
- issue: μνημεῖον como lugar de entierro
  english_pob_reading: tomb
  chosen_spanish_reading: sepulcro
  alternative_spanish_readings:
  - tumba
  - sepultura
  rationale: En español bíblico, «sepulcro» expresa con precisión un lugar de entierro y mantiene un registro digno. No fuerza una lectura doctrinal adicional; simplemente recoge el sentido funerario de μνημεῖον en este contexto.
  doctrine_reference: Léxico funerario en el Nuevo Testamento
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego SBLGNT y el audit trail inglés POB. La redacción española conserva la decisión clave de ξύλον como «árbol», junto con una nota alternativa para «cruz», y refleja el valor de cumplimiento previo de las Escrituras mediante una estructura temporal natural en español. No se detectaron revisiones posteriores que alteraran el contenido base.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio implícito («él») conforme al contexto inmediato del capítulo; no se introdujo «Jesús» porque el versículo no lo repite explícitamente.
  - Se evitó «SEÑOR» u այլ masking porque el texto no contiene el nombre divino.
  - El tono es bíblico y publicable, con vocabulario funerario claro y sin exceso de arcaísmo.
