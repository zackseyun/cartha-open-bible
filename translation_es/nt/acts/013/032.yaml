translation:
  language: es
  text: Y nosotros les anunciamos las buenas noticias de la promesa hecha a los padres,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'antepasados'. El griego dice 'los padres', una referencia histórico-pactual a los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - También
  lexicon: BDAG
  rationale: Conserva la conexión discursiva sin añadir matiz interpretativo; en español, 'Y' reproduce de forma natural el enlace del griego.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - también nosotros
  lexicon: BDAG
  rationale: El pronombre explícito marca énfasis en griego, pero el español bíblico fluido suele expresarlo simplemente con 'nosotros' cuando no se requiere reforzarlo de manera artificial.
- source_word: ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: Con un verbo de anuncio dirigido a un destinatario, el español exige dativo indirecto; 'les' conserva la función pragmática sin forzar la estructura.
- source_word: εὐαγγελιζόμεθα
  english_pob_choice: proclaim ... the good news
  chosen_spanish: anunciamos
  alternatives_spanish:
  - les anunciamos la buena noticia
  - predicamos el evangelio
  lexicon: BDAG
  rationale: El verbo significa anunciar buenas nuevas. En español, 'anunciamos' es sobrio y fiel; el complemento 'la promesa' ya porta el contenido de buenas nuevas sin necesidad de añadir 'evangelio' en la línea principal.
- source_word: τὴν πρὸς τοὺς πατέρας ἐπαγγελίαν
  english_pob_choice: the promise made to the fathers
  chosen_spanish: la promesa hecha a los padres
  alternatives_spanish:
  - la promesa hecha a los antepasados
  - la promesa dirigida a los padres
  lexicon: BDAG
  rationale: '''Promesa'' es la equivalencia directa para ἐπαγγελία en este contexto. ''Hecha a'' refleja bien el participio y la relación de dirección hacia los destinatarios. ''Padres'' mantiene el lenguaje histórico-covenantal del griego; ''antepasados'' suaviza, pero pierde esa forma concreta.'
- source_word: γενομένην
  english_pob_choice: made
  chosen_spanish: hecha
  alternatives_spanish:
  - dada
  - cumplida
  lexicon: BDAG
  rationale: Como participio atributivo que modifica 'promesa', el sentido idiomático en español es 'hecha'. 'Cumplida' adelantaría el desarrollo argumental del versículo siguiente y sería demasiado interpretativa.
theological_decisions:
- issue: Renderización de πατέρας
  english_pob_reading: fathers
  chosen_spanish_reading: padres
  alternative_spanish_readings:
  - antepasados
  - nuestros padres
  rationale: El griego usa el término masculino plural πατέρας, que en este contexto alude históricamente a los padres patriarcales de Israel. 'Padres' conserva la forma del término y la referencia pactual; 'antepasados' es posible, pero atenúa la huella lexical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado de la POB en inglés: se mantuvo la fuerza de εὐαγγελιζόμεθα como anuncio de buenas nuevas, se evitó anticipar ''cumplida'' para γενομένην, y se conservó el término relacional ''padres'' con una nota alternativa para ''antepasados''.'
  spanish_consistency_notes:
  - Se prefirió 'les' en lugar de repetir 'a ustedes' para una construcción natural con verbo de anuncio.
  - '''Padres'' se usa en sentido histórico-covenantal, no como referencia genérica a progenitores inmediatos.'
  - La línea principal evita 'evangelio' porque el griego aquí enfatiza el acto de anunciar la promesa, no un título eclesiástico.
