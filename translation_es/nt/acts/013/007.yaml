translation:
  language: es
  text: quien estaba con el procónsul Sergio Paulo, un hombre inteligente[a]. Este hombre mandó llamar a Bernabé y a Saulo y procuró oír la palabra de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre prudente» o «un hombre de entendimiento».
    reason: lexical_alternative
  - marker: b
    text: O «el mensaje de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθυπάτῳ
  english_pob_choice: proconsul
  chosen_spanish: procónsul
  alternatives_spanish:
  - gobernador
  lexicon: BDAG
  rationale: ἀνθύπατος nombra con precisión a un funcionario romano de rango proconsular. «Procónsul» reproduce esa especificidad histórica y administrativa mejor que el genérico «gobernador».
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  lexicon: BDAG
  rationale: La preposición indica acompañamiento o asociación; «con» es la equivalencia natural en español y conserva la relación básica del texto.
- source_word: ἀνδρὶ συνετῷ
  english_pob_choice: an intelligent man
  chosen_spanish: un hombre inteligente
  alternatives_spanish:
  - un hombre prudente
  - un hombre de entendimiento
  lexicon: BDAG
  rationale: συνετός puede abarcar inteligencia, prudencia o discernimiento. En español, «inteligente» es claro y moderno, y mantiene el valor descriptivo sin cargar la frase con una valoración moral más fuerte de la que el griego exige.
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Él
  - Este
  lexicon: BDAG
  rationale: El demostrativo retoma con énfasis al personaje ya descrito. «Este hombre» preserva mejor esa función discursiva que un simple «él».
- source_word: προσκαλεσάμενος
  english_pob_choice: summoned
  chosen_spanish: llamó a sí / llamó a
  alternatives_spanish:
  - convocó
  - hizo llamar
  lexicon: BDAG
  rationale: El participio medio expresa que los llamó hacia sí. «Llamó» es suficiente en español; el contexto de autoridad romana también admite el matiz de convocatoria, pero «llamó» evita sobreinterpretar coerción.
- source_word: ἐπεζήτησεν
  english_pob_choice: sought
  chosen_spanish: quiso oír
  alternatives_spanish:
  - buscó oír
  - deseó oír
  lexicon: BDAG
  rationale: ἐπιζητέω expresa una búsqueda o deseo intenso. En esta construcción con infinitivo, «quiso oír» comunica de forma natural la intención de escuchar y preserva el impulso volitivo del verbo.
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  lexicon: BDAG
  rationale: El infinitivo aoristo pide una equivalencia directa. «Oír» mantiene el valor básico de recibir el mensaje; «escuchar» puede sonar más interpretativo en español.
- source_word: λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  lexicon: BDAG
  rationale: λόγος aquí remite al mensaje proclamado por Dios. «La palabra de Dios» conserva la formulación bíblica habitual y sigue de cerca el griego sin perder claridad en español.
- source_word: Σεργίῳ Παύλῳ
  english_pob_choice: Sergius Paulus
  chosen_spanish: Sergio Paulo
  lexicon: standard transliteration
  rationale: Los nombres propios se transliteran conforme al uso español estándar.
- source_word: Βαρναβᾶν καὶ Σαῦλον
  english_pob_choice: Barnabas and Saul
  chosen_spanish: Bernabé y Saulo
  lexicon: standard transliteration
  rationale: 'Los nombres propios se adaptan a las formas usuales en español bíblico: Bernabé y Saulo.'
theological_decisions:
- issue: Nuance of λόγον τοῦ θεοῦ
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - el mensaje de Dios
  rationale: Aunque el contexto permite una paráfrasis como «el mensaje de Dios», la forma tradicional y más transparente en español es «la palabra de Dios». Mantiene la tensión entre el contenido proclamado y la expresión bíblica establecida sin añadir doctrina extra.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Nuance of συνετῷ in describing Sergius Paulus
  english_pob_reading: an intelligent man
  chosen_spanish_reading: un hombre inteligente
  alternative_spanish_readings:
  - un hombre prudente
  - un hombre de entendimiento
  rationale: El adjetivo no implica necesariamente virtud teológica, sino capacidad de discernimiento. «Inteligente» conserva el juicio positivo sin exceder la fuerza del original.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y coincide sustancialmente con el trazado auditado en inglés; no se detectaron revisiones aplicadas en el pasaje de referencia.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «palabra de Dios» para λόγον τοῦ θεοῦ, conforme al criterio del proyecto.
  - Se usa «procónsul» para ἀνθυπάτῳ, evitando el genérico «gobernador» por mayor precisión histórica.
  - Se conserva la distinción entre «oír» y «escuchar» en la nota, pero en el texto se eligió «oír» por fidelidad y naturalidad.
  - 'Los nombres propios siguen las formas establecidas en español bíblico: Sergio Paulo, Bernabé, Saulo.'
