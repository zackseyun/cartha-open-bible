translation:
  language: es
  text: Y la palabra del Señor se difundía por toda la región[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje del Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφέρετο
  english_pob_choice: was being spread
  chosen_spanish: se difundía
  alternatives_spanish:
  - se estaba difundiendo
  - era difundida
  - se propagaba
  lexicon: BDAG
  rationale: El imperfecto pasivo griego expresa una acción continua en el pasado. En español, «se difundía» conserva bien el aspecto imperfectivo y la idea de expansión de forma natural, sin volver pesada la frase.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: BDAG
  rationale: En Hechos, λόγος suele referirse al mensaje proclamado. Mantengo «la palabra» para conservar el idiomatismo lucano y la conexión con la traducción inglesa auditada, aunque «el mensaje» sigue siendo una alternativa contextual posible.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia doctrinal estable para κύριος en este contexto. En español, «del Señor» preserva la resonancia cristológica y evita estrechar el sentido a mera autoridad humana.
- source_word: δι’ ὅλης τῆς χώρας
  english_pob_choice: throughout the whole region
  chosen_spanish: por toda la región
  alternatives_spanish:
  - por toda la comarca
  - por todo el territorio
  - a través de toda la región
  lexicon: BDAG
  rationale: χώρα designa el área geográfica circundante, no una nación moderna. «Por toda la región» es una equivalencia clara y natural en español, y transmite la extensión total del avance.
theological_decisions:
- issue: Uso de κύριος para referirse a Dios / al Señor
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Sigo la guía doctrinal del proyecto para κύριος como «Señor». En este versículo, además, la expresión «la palabra del Señor» conserva la carga teológica del mensaje perteneciente a Cristo resucitado sin perder claridad en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene una sola nota léxica para λόγος/"word" vs. "message" y no introduce revisiones textuales. La versión española conserva esa misma tensión semántica con una nota equivalente, sin ampliar indebidamente el sentido del versículo.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme a la convención del proyecto.
  - «Palabra» se usa como traducción principal de λόγος, con nota alternativa para «mensaje».
  - La estructura verbal en imperfecto («se difundía») refleja continuidad pasada mejor que un perfecto simple.
