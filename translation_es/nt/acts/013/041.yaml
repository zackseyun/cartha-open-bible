translation:
  language: es
  text: ¡Miren[a], ustedes, los despreciadores, y asómbrense, y perezcan[b]; porque yo estoy realizando una obra en sus días, una obra que ciertamente no creerán si alguien se la cuente[c] a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'burladores'. El término griego puede designar a quienes tratan algo con desprecio; 'burladores' subraya el matiz derisorio del contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'desaparezcan' o 'sean destruidos'. La cita hace eco de Habacuc 1:5 en griego y lleva una fuerte advertencia de ruina.
    reason: alternative_reading
  - marker: c
    text: O 'la relate en detalle'. El verbo puede significar contar o narrar plenamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἴδετε
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Vean
  - Miren
  lexicon: BDAG
  rationale: El imperativo aoristo plural llama la atención de manera enérgica. '¡Miren!' suena natural y directo en español actual, y conserva el tono vívido de la exhortación.
- source_word: καταφρονηταί
  english_pob_choice: scoffers
  chosen_spanish: despreciadores
  alternatives_spanish:
  - burladores
  - mofadores
  lexicon: BDAG
  rationale: El término puede indicar quienes tratan algo con desprecio. En español, 'despreciadores' conserva ese valor de menosprecio; la nota mantiene la alternativa más derisiva de 'scoffers' como posibilidad contextual.
- source_word: θαυμάσατε
  english_pob_choice: marvel
  chosen_spanish: asómbrense
  alternatives_spanish:
  - admírense
  - maravíllense
  lexicon: BDAG
  rationale: El imperativo mantiene la fuerza profética e irónica del pasaje. 'Asómbrense' expresa impacto repentino y funciona con naturalidad en español.
- source_word: ἀφανίσθητε
  english_pob_choice: perish
  chosen_spanish: perezcan
  alternatives_spanish:
  - desaparezcan
  - sean destruidos
  lexicon: BDAG
  rationale: El pasivo imperativo en la cita lleva un fuerte sentido de ruina bajo juicio. 'Perezcan' conserva mejor esa carga judicial que una opción más neutra como 'desaparezcan'.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - acto
  lexicon: BDAG
  rationale: Aunque 'work' es la equivalencia base, en español 'obra' comunica mejor una acción divina significativa y solemne, con el peso profético del contexto.
- source_word: ἐργάζομαι ἐγώ
  english_pob_choice: I am doing
  chosen_spanish: yo estoy realizando
  alternatives_spanish:
  - yo hago
  - yo estoy haciendo
  lexicon: BDAG
  rationale: El presente enfático subraya la acción en curso de Dios. 'Estoy realizando' conserva la progresividad y suena más natural con 'obra' en español.
- source_word: ἐν ταῖς ἡμέραις ὑμῶν
  english_pob_choice: in your days
  chosen_spanish: en sus días
  alternatives_spanish:
  - en sus tiempos
  - durante sus días
  lexicon: BDAG
  rationale: La referencia temporal mantiene la proximidad retórica. En español, el posesivo de cortesía/plural 'sus' es el equivalente natural para el plural de segunda persona.
- source_word: οὐ μὴ πιστεύσητε
  english_pob_choice: you will certainly not believe
  chosen_spanish: ciertamente no creerán
  alternatives_spanish:
  - de ninguna manera creerán
  - no creerán jamás
  lexicon: BDAG
  rationale: La negación enfática se preserva con 'ciertamente no'. 'Creerán' expresa con claridad la incredulidad prevista en la cita, sin suavizarla.
- source_word: ἐάν τις ἐκδιηγῆται ὑμῖν
  english_pob_choice: if someone tells it to you
  chosen_spanish: aunque alguien se la cuente a ustedes
  alternatives_spanish:
  - si alguien se la cuenta a ustedes
  - si alguien la relata en detalle a ustedes
  lexicon: BDAG
  rationale: ἐκδιηγέομαι sugiere relatar con detalle. En español, 'se la cuente' reproduce el referente implícito de 'la obra' y la nota preserva la posibilidad de 'relatar en detalle' sin sobrecargar el texto principal.
theological_decisions:
- issue: Fuerza judicial de la cita profética
  english_pob_reading: Use direct judicial language ('perish') and emphatic unbelief without softening the warning.
  chosen_spanish_reading: Usar 'perezcan' y 'ciertamente no creerán' mantiene el tono de advertencia y juicio.
  alternative_spanish_readings:
  - '''desaparezcan'''
  - '''sean destruidos'''
  rationale: La cita funciona como advertencia solemne frente al rechazo de la obra de Dios. El español debe conservar esa severidad sin volverla arcaica o ambigua.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense; do not import or soften doctrinal claims.'
translation_notes:
  revision_awareness: La comparación con el texto griego y el audit trail inglés muestra alta concordancia; no se requirieron cambios respecto a la lectura base, salvo ajustes naturales al español para mantener el tono profético y la carga de juicio.
  spanish_consistency_notes:
  - Se mantuvo 'obra' para ἔργον por coherencia con el campo semántico de una acción divina significativa.
  - Se tradujo la negación enfática de οὐ μή con 'ciertamente no' para evitar suavización.
  - Se conservó la segunda persona plural en todo el versículo, coherente con el vocativo plural y el plural de los verbos.
  - La frase final usa 'se la cuente' para hacer explícito el objeto implícito en español sin añadir contenido ajeno al texto.
