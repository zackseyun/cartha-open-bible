    rationale: En español debe ser 'relatar en detalle' o 'contar en detalle'. La forma actual parece un infinitivo mal conjugado y baja la calidad editorial.
  - severity: low
    issue: '''La cita ecoa Habacuc 1:5'' suena poco natural'
    rationale: En español eclesial general es más natural 'hace eco de Habacuc 1:5 en griego'.
