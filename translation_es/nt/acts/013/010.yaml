translation:
  language: es
  text: 'Y dijo: «Oh, lleno de todo engaño y de toda perversidad, hijo del diablo, enemigo de toda rectitud[a], ¿no cesarás de torcer los caminos rectos del Señor?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enemigo de toda justicia». El griego puede denotar rectitud o justicia según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήρης παντὸς δόλου
  english_pob_choice: full of every kind of deceit
  chosen_spanish: lleno de todo engaño
  alternatives_spanish:
  - lleno de todo tipo de engaño
  - lleno de todo fraude
  lexicon: BDAG
  rationale: πλήρης con genitivo expresa estar colmado o caracterizado por algo. δόλος es engaño, dolo o astucia engañosa; «engaño» comunica bien la carga moral en español sin volverlo técnico. Se conserva la idea comprehensiva de παντός con «todo».
- source_word: πάσης ῥᾳδιουργίας
  english_pob_choice: every kind of villainy
  chosen_spanish: de toda perversidad
  alternatives_spanish:
  - de toda villanía
  - de toda maldad
  - de toda iniquidad
  lexicon: BDAG
  rationale: ῥᾳδιουργία no es solo maldad genérica, sino conducta ruin, pérfida o sin escrúpulos. «Perversidad» en español transmite una desviación moral fuerte y evita suavizar el reproche. Se mantiene el paralelismo con «todo» para reflejar la amplitud del griego.
- source_word: υἱὲ διαβόλου
  english_pob_choice: son of the devil
  chosen_spanish: hijo del diablo
  alternatives_spanish:
  - hijo del maligno
  - hijo del diablo
  lexicon: BDAG
  rationale: Se conserva el vocativo literal «hijo», porque el griego usa υἱέ y la expresión bíblica marca pertenencia y semejanza moral. «Diablo» corresponde directamente a διαβόλου y mantiene la fuerza de la reprensión.
- source_word: ἐχθρὲ πάσης δικαιοσύνης
  english_pob_choice: enemy of all righteousness
  chosen_spanish: enemigo de toda justicia
  alternatives_spanish:
  - enemigo de toda rectitud
  - enemigo de toda justicia
  lexicon: BDAG
  rationale: δικαιοσύνη puede ser «justicia» o «rectitud». Aquí el tono es de oposición a lo recto y bueno, y en español «enemigo de toda justicia» suena natural y grave. Se preserva la alternativa teológica en nota porque el inglés POB la documenta.
- source_word: οὐ παύσῃ
  english_pob_choice: will you not stop
  chosen_spanish: ¿no cesarás
  alternatives_spanish:
  - ¿no pararás
  - ¿no dejarás de
  lexicon: BDAG
  rationale: El futuro medio interrogativo funciona como una reprensión. «¿No cesarás…?» conserva el matiz de pregunta retórica con tono solemne y idiomático en español.
- source_word: διαστρέφων
  english_pob_choice: twisting
  chosen_spanish: de pervertir
  alternatives_spanish:
  - de torcer
  - de trastornar
  - de desviar
  lexicon: BDAG
  rationale: διαστρέφω significa torcer, desviar o pervertir. Aunque «torcer» es más literal, «pervertir» reproduce mejor en español la gravedad de la acción sobre «los caminos rectos». Se mantiene el gerundio participial en una forma natural con «de».
- source_word: τὰς ὁδοὺς κυρίου τὰς εὐθείας
  english_pob_choice: the straight ways of the Lord
  chosen_spanish: los caminos rectos del Señor
  alternatives_spanish:
  - los caminos rectos del Señor
  - las sendas rectas del Señor
  - los caminos derechos del Señor
  lexicon: BDAG
  rationale: ὁδοί se traduce naturalmente por «caminos» en español bíblico. εὐθείας se expresa con «rectos», que conserva la imagen de dirección correcta. κύριος se vierte como «Señor» en esta construcción porque el contexto griego cita una expresión bíblica establecida y el inglés POB también mantiene «Lord».
- source_word: Ὦ
  english_pob_choice: You who are
  chosen_spanish: ¡Oh,
  alternatives_spanish:
  - ¡Oh!
  - Tú que eres
  lexicon: BDAG
  rationale: El vocativo exclamativo Ὦ se refleja con «¡Oh,» como marcador de reprensión directa. En español, comenzar con una interjección permite luego encadenar las acusaciones sin forzar una perífrasis.
theological_decisions:
- issue: δικαιοσύνη en el reproche de Pablo
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El POB inglés mantiene «righteousness» en el texto y nota la alternativa «justice». En español, «justicia» funciona como equivalente principal y conserva el campo semántico moral/covenantal. Se evita «rectitud» en el texto principal para no debilitar la correspondencia con la nota del POB y con el término bíblico tradicional, pero la nota deja abierta la alternativa semántica.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés sin cambios sustantivos respecto a la lectura aprobada; la versión española conserva la intensidad del reproche, el paralelismo de los dos sustantivos de acusación y la metáfora de los caminos rectos. No se detectaron revisiones aplicadas en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Dios/Señor» según la guía proyectiva; aquí κύριος se vierte como «Señor» por la forma establecida de la expresión final.
  - Se usa «hijo del diablo» como calco fiel del vocativo bíblico y no «hijo del maligno», para conservar la fuerza literal del insulto profético.
  - Se preserva la estructura interrogativa retórica con «¿no cesarás…?» para reflejar οὐ παύσῃ.
  - La nota sobre δικαιοσύνη se ancla en el texto porque el POB inglés documenta la alternativa semántica y el español introduce la misma tensión lexical.
