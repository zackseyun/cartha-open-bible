revisions:
- from: Como por cuatrocientos cincuenta años[a]. Y después de estas cosas les dio jueces hasta Samuel el profeta.
  to: Unos cuatrocientos cincuenta años[a]. Y después de estas cosas dio jueces hasta Samuel el profeta.
  rationale: Se ajusta la frase inicial a un español más natural y claro para expresar aproximación temporal independiente, y se elimina «les» para evitar una adición no explícita en el griego. Se conserva la estructura sintáctica del SBLGNT y la nota sobre la alternativa de puntuación/conexión.
  reviewer_model: gpt-5.4
