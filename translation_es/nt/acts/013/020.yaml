translation:
  language: es
  text: Unos cuatrocientos cincuenta años[a]. Y después de estas cosas dio jueces hasta Samuel el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en algunas traducciones, la referencia temporal se conecta de otro modo: «dio jueces por unos cuatrocientos cincuenta años, hasta Samuel el profeta». La redacción y la puntuación griegas aquí son debatidas.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς
  english_pob_choice: about
  chosen_spanish: como
  alternatives_spanish:
  - aproximadamente
  - alrededor de
  lexicon: BDAG
  rationale: ὡς con un número suaviza la cifra y expresa aproximación. En español, 'como' comunica esa misma atenuación de manera natural y sobria, sin introducir una precisión que el griego no da.
- source_word: ἔτεσι τετρακοσίοις καὶ πεντήκοντα
  english_pob_choice: four hundred and fifty years
  chosen_spanish: cuatrocientos cincuenta años
  alternatives_spanish:
  - 450 años
  lexicon: BDAG
  rationale: El dativo plural expresa duración temporal. 'Cuatrocientos cincuenta años' conserva el contenido formal y es plenamente idiomático en español.
- source_word: καὶ μετὰ ταῦτα
  english_pob_choice: And after these things
  chosen_spanish: Y después de estas cosas
  alternatives_spanish:
  - Y después de eso
  - Después de estas cosas
  lexicon: BDAG
  rationale: La expresión marca secuencia narrativa. Se conserva el plural demostrativo con una forma española transparente y literal sin sonar artificial.
- source_word: ἔδωκεν
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  - les nombró
  lexicon: BDAG
  rationale: El verbo básico es δίδωμι, 'dar'. En este contexto se refiere a la provisión/otorgamiento de jueces para Israel. 'Les dio' preserva el verbo del texto y funciona de modo comprensible en español.
- source_word: κριτὰς
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - gobernantes
  - líderes
  lexicon: BDAG
  rationale: '''Jueces'' es el término histórico y bíblico estándar para el período anterior a la monarquía, y mantiene la referencia institucional del texto.'
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  lexicon: BDAG
  rationale: Marca el límite temporal del período de los jueces. 'Hasta' es la equivalencia directa y natural en español.
- source_word: Σαμουὴλ τοῦ προφήτου
  english_pob_choice: Samuel the prophet
  chosen_spanish: Samuel el profeta
  alternatives_spanish:
  - Samuel, el profeta
  lexicon: BDAG
  rationale: La construcción genitiva identifica a Samuel por su función profética. 'El profeta' conserva el aposición identificadora sin necesidad de puntuación adicional.
theological_decisions:
- issue: Relación sintáctica de 'como por cuatrocientos cincuenta años' en un versículo textualmente debatido
  english_pob_reading: Treat the phrase as a standalone duration statement followed by 'And after these things he gave judges until Samuel the prophet,' while preserving the note that other punctuations/connectivities exist.
  chosen_spanish_reading: 'Tratar la frase inicial como una declaración temporal independiente: ''Como por cuatrocientos cincuenta años. Y después de estas cosas les dio jueces hasta Samuel el profeta.'''
  alternative_spanish_readings:
  - '''Y después de estas cosas les dio jueces por cerca de cuatrocientos cincuenta años, hasta Samuel el profeta.'''
  - '''Como por cuatrocientos cincuenta años, y después de estas cosas les dio jueces...'''
  rationale: Hechos 13:20 presenta una dificultad sintáctica y textual real. La traducción sigue el orden del texto griego provisto y no armoniza con otra puntuación tradicional. La nota preserva la alternativa reconocida por el POB inglés sin resolver dogmáticamente la relación de la cifra con la cláusula siguiente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; se mantiene la decisión de lectura alternativa en nota y se conserva la formulación del texto fuente sin harmonizarla a otra tradición textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general para el nombre divino, pero este versículo no contiene el Tetragrámaton.
  - Se conserva 'jueces' para κριτὰς, evitando sustituir el término histórico por 'líderes' o 'gobernantes'.
  - '''Como'' refleja la función aproximativa de ὡς sin convertir la cifra en una exactitud matemática.'
  - La puntuación separa la frase temporal inicial para respetar el texto griego suministrado y su debate de conexión sintáctica.
