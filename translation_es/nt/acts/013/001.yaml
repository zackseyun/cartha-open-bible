translation:
  language: es
  text: 'Ahora bien, en Antioquía, en la iglesia que estaba en Antioquía, había profetas y maestros: Bernabé, Simeón, llamado Niger[a], Lucio de Cirene[b], Manaén, compañero cercano de Herodes el tetrarca[c], y Saulo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Niger» es un nombre latino que significa «negro». Se conserva aquí como nombre propio, no como traducción.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Lucio era de Cirene, en el norte de África.
    reason: cultural_note
  - marker: c
    text: O «hermano de crianza de Herodes el tetrarca» o «uno criado con Herodes el tetrarca».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦσαν δὲ
  english_pob_choice: Now ... there were
  chosen_spanish: Ahora bien ... había
  alternatives_spanish:
  - Y ... había
  - Ahora ... había
  lexicon: BDAG
  rationale: Ἦσαν introduce una afirmación existencial, bien expresada con 'había'. δέ funciona como enlace discursivo suave; 'Ahora bien' transmite continuidad natural en español sin exagerar contraste.
- source_word: ἐν Ἀντιοχείᾳ
  english_pob_choice: in Antioch
  chosen_spanish: en Antioquía
  alternatives_spanish:
  - en Antioch
  lexicon: BDAG
  rationale: Es un topónimo estándar; 'Antioquía' es la forma normal en español y corresponde directamente al griego.
- source_word: κατὰ τὴν οὖσαν ἐκκλησίαν
  english_pob_choice: in the church there
  chosen_spanish: en la iglesia que estaba allí
  alternatives_spanish:
  - en la iglesia allí
  - en la iglesia de allí
  - en la iglesia que existía allí
  lexicon: BDAG
  rationale: La construcción con κατά y el participio οὖσαν indica referencia local a la congregación existente allí. 'Iglesia que estaba allí' conserva esa localización sin forzar una paráfrasis institucional.
- source_word: ἐκκλησίαν
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En Hechos, el término designa la congregación cristiana local. 'Iglesia' es la traducción clara y natural en español.
- source_word: προφῆται καὶ διδάσκαλοι
  english_pob_choice: prophets and teachers
  chosen_spanish: profetas y maestros
  alternatives_spanish:
  - profetas y enseñadores
  lexicon: BDAG
  rationale: Ambos sustantivos se vierten de manera directa como funciones o personas reconocidas en la comunidad. 'Maestros' es el equivalente natural de διδάσκαλοι en español bíblico contemporáneo.
- source_word: Συμεὼν ὁ καλούμενος Νίγερ
  english_pob_choice: Simeon who was called Niger
  chosen_spanish: Simeón, llamado Niger
  alternatives_spanish:
  - Simón, llamado Niger
  - Simeón, conocido como Niger
  lexicon: BDAG
  rationale: 'Συμεών se translitera ''Simeón''. καλούμενος se traduce con una fórmula natural y fiel: ''llamado''. ''Niger'' se conserva como cognomen propio en vez de traducirlo en el texto principal.'
- source_word: Νίγερ
  english_pob_choice: Niger
  chosen_spanish: Niger
  alternatives_spanish:
  - el Negro
  lexicon: BDAG
  rationale: Se conserva como nombre propio latino. Traducirlo como 'el Negro' introduciría una interpretación epitética que el texto griego no exige en la línea principal.
- source_word: Λούκιος ὁ Κυρηναῖος
  english_pob_choice: Lucius the Cyrenian
  chosen_spanish: Lucio el cireneo
  alternatives_spanish:
  - Lucio de Cirene
  - Lucio, el de Cirene
  lexicon: BDAG
  rationale: ὁ Κυρηναῖος indica procedencia. 'El cireneo' es conciso y fiel al griego; mantiene la marca de origen geográfico sin extenderse más de lo necesario.
- source_word: Μαναήν
  english_pob_choice: Manaen
  chosen_spanish: Manaén
  alternatives_spanish:
  - Manaen
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio al español.
- source_word: Ἡρῴδου τοῦ τετραάρχου
  english_pob_choice: of Herod the tetrarch
  chosen_spanish: de Herodes el tetrarca
  alternatives_spanish:
  - de Herodes Antipas, el tetrarca
  lexicon: BDAG
  rationale: El griego lo identifica por título; se conserva esa forma sin ampliar el nombre histórico. 'El tetrarca' reproduce el valor del genitivo y del título.
- source_word: σύντροφος
  english_pob_choice: a close companion
  chosen_spanish: compañero cercano
  alternatives_spanish:
  - foster-brother
  - compañero de crianza
  - íntimo compañero
  lexicon: BDAG
  rationale: El término puede sugerir una relación de crianza compartida, pero no obliga a la especificación 'hermanastro de crianza'. 'Compañero cercano' conserva la cercanía relacional sin sobreprecisar.
- source_word: καὶ Σαῦλος
  english_pob_choice: and Saul
  chosen_spanish: y Saulo
  alternatives_spanish:
  - y Pablo
  lexicon: BDAG
  rationale: Se mantiene el nombre griego/hebreo 'Saulo', tal como está en esta lista, sin introducir el nombre posterior 'Pablo'.
theological_decisions:
- issue: Naturaleza de los ministerios en Antioquía
  english_pob_reading: Render προφῆται καὶ διδάσκαλοι straightforwardly as recognized roles within the local church, without importing later ecclesiastical office structures.
  chosen_spanish_reading: Traducir 'profetas y maestros' como designaciones de personas/funciones reconocidas en la iglesia local, sin convertirlas en una jerarquía eclesial posterior.
  alternative_spanish_readings:
  - interpretarlos como oficios formales de una estructura posterior
  - leerlos como carismas sin referencia a personas concretas
  rationale: El verso nombra categorías de servicio presentes en Antioquía; la traducción debe preservar esa identificación sin añadir una organización eclesiástica que el texto no explicita.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 6
- issue: Alcance de σύντροφος respecto de Herodes
  english_pob_reading: Use the broader 'a close companion' rather than the more specific 'foster-brother.'
  chosen_spanish_reading: Usar 'compañero cercano' en vez de 'hermano de crianza' o una fórmula más específica.
  alternative_spanish_readings:
  - hermano de crianza
  - compañero de infancia
  - compañero de corte
  rationale: La relación exacta no queda definida con suficiente precisión para imponer una lectura más estrecha. 'Compañero cercano' respeta la posible cercanía de crianza sin afirmar más de lo que el griego exige.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el expediente inglés; el pasaje quedó estable en la última pasada, con concordancia alta y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica en este versículo; no hay nombres divinos a verter.
  - '''Iglesia'' se usa para ἐκκλησία según el uso contextual de Hechos.'
  - '''Saulo'' se conserva en la lista, en consonancia con la forma griega del texto.'
  - '''Cireneo'' y ''tetrarca'' siguen la terminología histórica explícita del original.'
