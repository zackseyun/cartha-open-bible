  text: Ἦσαν ⸀δὲ ἐν Ἀντιοχείᾳ κατὰ τὴν οὖσαν ἐκκλησίαν προφῆται καὶ διδάσκαλοι ὅ τε Βαρναβᾶς καὶ Συμεὼν ὁ καλούμενος Νίγερ, καὶ Λούκιος ὁ Κυρηναῖος, Μαναήν τε Ἡρῴδου τοῦ τετραάρχου σύντροφος καὶ Σαῦλος.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/001.yaml
  text: 'Now in Antioch[a], in the church there, there were prophets and teachers: Barnabas, Simeon who was called Niger, Lucius the Cyrenian, Manaen, a close companion of Herod the tetrarch[c][b], and Saul.'
  footnotes:
  - marker: a
    text: “Niger” is a Latin name meaning “black.” It is retained here as a proper name rather than translated.
    reason: lexical_alternative
  - marker: b
    text: Or “foster-brother of Herod the tetrarch” or “one brought up with Herod the tetrarch.”
    reason: alternative_reading
  - marker: c
    text: That is, Lucius was from Cyrene in North Africa.
    reason: cultural_note
