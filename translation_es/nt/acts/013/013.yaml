translation:
  language: es
  text: Después de zarpar[a] de Pafos, los que estaban con Pablo llegaron a Perge en Panfilia; pero Juan, separándose de ellos, volvió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haciendo a la mar». Literalmente, el verbo puede referirse a zarpar o salir por mar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχθέντες
  english_pob_choice: After setting sail
  chosen_spanish: Después de zarpar
  alternatives_spanish:
  - Habiendo zarpado
  - Después de partir por mar
  lexicon: BDAG
  rationale: El participio en contexto de viaje marítimo señala salida por mar. «Zarpar» conserva ese matiz con naturalidad en español, sin volverlo demasiado literal ni perder la imagen náutica.
- source_word: οἱ περὶ Παῦλον
  english_pob_choice: those with Paul
  chosen_spanish: los que estaban con Pablo
  alternatives_spanish:
  - los de alrededor de Pablo
  - Pablo y sus compañeros
  lexicon: BDAG
  rationale: La expresión griega nombra al grupo asociado con Pablo. «Los que estaban con Pablo» comunica el sentido idiomático de manera clara y evita añadir una interpretación más específica de la que el texto ofrece.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: En un relato de desplazamiento, «llegaron» expresa el resultado del viaje en español natural y corresponde bien al verbo de movimiento en el contexto.
- source_word: Πέργην τῆς Παμφυλίας
  english_pob_choice: Perga in Pamphylia
  chosen_spanish: Perge de Panfilia
  alternatives_spanish:
  - Perge en Panfilia
  - Perge, en Panfilia
  lexicon: BDAG
  rationale: La relación genitiva local se puede reproducir en español con «de» o «en». Aquí «de Panfilia» mantiene una formulación breve y aceptable en registro bíblico, sin perder la ubicación regional.
- source_word: ἀποχωρήσας
  english_pob_choice: departing from them
  chosen_spanish: apartándose de ellos
  alternatives_spanish:
  - se separó de ellos
  - retirándose de ellos
  lexicon: BDAG
  rationale: El verbo puede significar apartarse o retirarse. «Apartándose de ellos» conserva la acción reportada sin atribuir motivo, en línea con la cautela del texto y del audit trail inglés.
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: BDAG
  rationale: «Volvió» es una forma natural y fiel para el valor básico de retorno del verbo, con tono narrativo fluido en español.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Hierosólima
  lexicon: BDAG
  rationale: Se usa la forma castellana estándar del topónimo, plenamente inteligible y tradicional en el uso bíblico.
theological_decisions:
- issue: Posible valoración negativa de la partida de Juan
  english_pob_reading: Render the action neutrally as 'departing from them' without suggesting desertion or apostasy.
  chosen_spanish_reading: 'Traducir la acción de Juan de forma neutral: «apartándose de ellos», sin insinuar deserción o abandono moral.'
  alternative_spanish_readings:
  - dejándolos
  - retirándose de ellos
  rationale: El versículo solo informa que Juan se apartó y volvió a Jerusalén. No explicita motivo ni juicio moral; por eso la traducción evita cargar el hecho con una interpretación posterior.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del griego SBLGNT y coincide sustancialmente con el audit trail inglés; no se requirieron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantuvo «Pablo» y «Jerusalén» como formas españolas estándar.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene ese léxico.
  - Se preservó la neutralidad narrativa respecto a la salida de Juan, sin añadir explicaciones inexistentes en el versículo.
