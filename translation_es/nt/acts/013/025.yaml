translation:
  language: es
  text: 'Y cuando Juan estaba completando su curso[a], seguía diciendo: «¿Qué suponen que soy? Yo no soy él. Pero he aquí, viene después de mí[b] uno de quien no soy digno de desatar las sandalias de sus pies».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «¿Qué suponen que soy? Yo no soy el Mesías». El griego deja implícita la identidad negada, aunque el contexto apunta al Mesías.'
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos y traducciones expresan esto más específicamente como «desatar la correa de sus sandalias», pero el texto griego impreso aquí dice simplemente «la sandalia(s) de sus pies ... desatar».
    reason: textual_variant
lexical_decisions:
- source_word: ἐπλήρου ... τὸν δρόμον
  english_pob_choice: was completing his course
  chosen_spanish: estaba completando su carrera
  alternatives_spanish:
  - estaba terminando su carrera
  - estaba cumpliendo su carrera
  lexicon: BDAG
  rationale: πληρόω aquí expresa llevar algo a su término, y δρόμος funciona metafóricamente como curso o tarea asignada. «Carrera» conserva la metáfora atlética subyacente sin volverla demasiado técnica, y «estaba completando» refleja bien el imperfecto con valor continuo.
- source_word: ἔλεγεν
  english_pob_choice: he kept saying
  chosen_spanish: seguía diciendo
  alternatives_spanish:
  - decía
  - seguía hablando
  lexicon: BDAG
  rationale: El imperfecto sugiere repetición o insistencia. «Seguía diciendo» reproduce esa continuidad de manera natural en español.
- source_word: Τί ἐμὲ ὑπονοεῖτε εἶναι;
  english_pob_choice: What do you suppose I am?
  chosen_spanish: ¿Qué suponéis que soy?
  alternatives_spanish:
  - ¿Qué pensáis que soy?
  - ¿A quién suponéis que soy?
  lexicon: BDAG
  rationale: ὑπονοέω significa suponer, pensar o inferir. En español, «¿Qué suponéis que soy?» comunica bien la pregunta de identidad y mantiene la referencia al τί griego sin añadir más de lo que el texto dice.
- source_word: οὐκ εἰμὶ ἐγώ
  english_pob_choice: I am not he
  chosen_spanish: Yo no soy él
  alternatives_spanish:
  - No soy yo
  - Yo no soy el Mesías
  lexicon: BDAG
  rationale: El griego es elíptico y niega una identidad implícita. «Yo no soy él» preserva la brevedad y deja abierta la referencia, sin resolverla explícitamente en el cuerpo principal.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mirad
  alternatives_spanish:
  - he aquí
  - miren
  lexicon: BDAG
  rationale: ἰδού funciona como marcador discursivo de atención. «Mirad» es natural, solemne y adecuado al registro bíblico en español.
- source_word: ἔρχεται μετ’ ἐμὲ
  english_pob_choice: one is coming after me
  chosen_spanish: viene después de mí
  alternatives_spanish:
  - está viniendo después de mí
  - va a venir después de mí
  lexicon: BDAG
  rationale: El presente puede tener fuerza inminente o vívida. En español, «viene después de mí» mantiene esa inmediatez y la relación temporal del texto.
- source_word: τὸ ὑπόδημα τῶν ποδῶν
  english_pob_choice: the sandals of whose feet
  chosen_spanish: la correa de las sandalias de sus pies
  alternatives_spanish:
  - las sandalias de sus pies
  - la sandalia de sus pies
  lexicon: BDAG
  rationale: Aunque el texto griego leído aquí dice literalmente «el calzado/sandalia de los pies», en español la expresión natural para la acción de desatar es «la correa de las sandalias». Esta redacción sigue la nota inglesa sobre la variante textual/traslación tradicional, pero la incorpora solo como aclaración traductiva necesaria para un español idiomático y transparente.
- source_word: λῦσαι
  english_pob_choice: to untie
  chosen_spanish: desatar
  alternatives_spanish:
  - soltar
  - deshacer
  lexicon: BDAG
  rationale: λύω en este contexto significa aflojar o desatar. «Desatar» es la opción más directa y bíblicamente reconocible en español.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - merecedor de
  lexicon: BDAG
  rationale: ἄξιος expresa dignidad o idoneidad. «Digno» es la forma más natural y fiel en esta fórmula de humildad.
theological_decisions:
- issue: Identidad negada por Juan en οὐκ εἰμὶ ἐγώ
  english_pob_reading: John denies that he is the expected messianic figure without explicitly naming 'the Messiah' in the main text.
  chosen_spanish_reading: Juan niega ser la figura esperada sin nombrarla explícitamente en el cuerpo principal.
  alternative_spanish_readings:
  - Yo no soy el Mesías
  - No soy yo
  rationale: El contexto sugiere una negación de identidad mesiánica, pero el griego sigue siendo elíptico. La traducción principal conserva esa tensión textual y evita resolverla demasiado pronto; la nota puede aclarar el sentido probable.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Forma de la afirmación final de humildad
  english_pob_reading: the sandals of whose feet I am not worthy to untie
  chosen_spanish_reading: no soy digno de desatar la correa de las sandalias de sus pies
  alternative_spanish_readings:
  - no soy digno de desatar sus sandalias
  - no soy digno de desatar la sandalia de sus pies
  rationale: La expresión mantiene la humildad extrema de Juan y no introduce elementos doctrinales ajenos. La mención concreta del calzado conserva el colorido del dicho y su fuerza reverencial.
  doctrine_reference: Principio POB de conservar la fuerza lexical y no suavizarla
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés que ajustó la pregunta a una formulación más natural («What do you suppose I am?») y elevó el marcador discursivo a un registro más formal («behold»). También he respetado la decisión textual de no importar ‘strap’ al cuerpo principal, dejando esa expansión solo como nota cuando ayuda al lector español.
  spanish_consistency_notes:
  - Se mantiene Yahvé como término divino por defecto, aunque este versículo no lo contiene.
  - «Mesías» queda solo en la nota explicativa, porque el griego del cuerpo principal sigue elíptico.
  - «Digno» se usa para ἄξιος, coherente con el registro bíblico y la nota de humildad.
  - Se conserva el tono de testimonio repetido con «seguía diciendo».
