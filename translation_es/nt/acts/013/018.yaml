translation:
  language: es
  text: Y durante unos cuarenta años los soportó[a] en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «los cuidó» en lugar de «los soportó».
    reason: textual_variant
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y además
  lexicon: BDAG
  rationale: Conecta la narración histórica sin añadir énfasis interpretativo. En español, 'Y' conserva la simple continuidad del discurso.
- source_word: ὡς τεσσερακονταετῆ χρόνον
  english_pob_choice: about forty years
  chosen_spanish: unos cuarenta años
  alternatives_spanish:
  - aproximadamente cuarenta años
  - por cerca de cuarenta años
  lexicon: BDAG
  rationale: La construcción con ὡς marca aproximación; 'unos cuarenta años' comunica la misma indeterminación de manera natural en español.
- source_word: ἐτροποφόρησεν
  english_pob_choice: put up with
  chosen_spanish: los soportó
  alternatives_spanish:
  - los toleró
  - los aguantó
  - los llevó con paciencia
  lexicon: BDAG
  rationale: La lectura textual base favorece la idea de soportar/bear with, no simplemente cuidar. 'Los soportó' mantiene la tensión del verbo sin suavizarla. 'Aguantó' sería más coloquial; 'los llevó con paciencia' introduce una valoración más explicativa.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los israelitas
  lexicon: BDAG
  rationale: El objeto directo plural se expresa naturalmente con 'los'; el referente queda claro por el contexto de la historia de Israel.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  - en el yermo
  lexicon: BDAG
  rationale: Aunque 'wilderness' suele corresponder a 'desierto' en español bíblico, aquí 'desierto' es suficientemente fiel y natural. 'Desierto' preserva el trasfondo geográfico de la marcha de Israel.
theological_decisions:
- issue: Tensión entre 'soportar' y 'cuidar' en la tradición textual
  english_pob_reading: he put up with them
  chosen_spanish_reading: los soportó
  alternative_spanish_readings:
  - los cuidó
  - los atendió
  rationale: La forma griega impresa en SBLGNT sustenta la idea de que Dios toleró/soportó al pueblo en el desierto. No se debe convertir la frase principal en una lectura de cuidado, aunque esa alternativa existe en la tradición manuscrita; por eso se conserva en la nota textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se siguió la lectura griega SBLGNT proporcionada y el análisis auditado en inglés. La decisión principal mantiene la ambigüedad textual documentada: el texto base transmite ''soportar/tolerar'', mientras que la variante manuscrita ''cuidar'' se preserva solo en nota.'
  spanish_consistency_notes:
  - Se prefirió 'desierto' por su uso bíblico natural en español.
  - '''Soportó'' conserva el matiz difícil del verbo griego sin reinterpretarlo como mero cuidado.'
  - El adverbio de aproximación se integró como 'unos' para evitar calco rígido.
