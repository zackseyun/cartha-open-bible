translation:
  language: es
  text: Y después de haber atravesado toda la isla hasta Pafos, hallaron a cierto hombre, un mago, falso profeta, judío, cuyo nombre era Barjesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Barjesús también puede escribirse Bar-Jesús; el nombre probablemente refleja un patronímico semítico con el sentido de «hijo de Jesús» o «hijo de Josué».
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντες
  english_pob_choice: after they had gone through
  chosen_spanish: después de haber atravesado
  alternatives_spanish:
  - habiendo atravesado
  - después de recorrer
  lexicon: BDAG
  rationale: El participio aoristo antecedente se refleja bien con una construcción temporal de anterioridad. «Atravesado» conserva la idea de cruzar la isla sin añadir matices innecesarios de viaje o permanencia.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce el avance narrativo de forma suave. «Y» suena natural en español y no fuerza contraste.
- source_word: ὅλην τὴν νῆσον
  english_pob_choice: the whole island
  chosen_spanish: toda la isla
  alternatives_spanish:
  - la isla entera
  - la isla completa
  lexicon: BDAG
  rationale: La expresión griega indica la totalidad del recorrido; «toda la isla» es claro, natural y fiel.
- source_word: ἄχρι Πάφου
  english_pob_choice: as far as Paphos
  chosen_spanish: hasta Pafos
  alternatives_spanish:
  - así como Pafos
  - hasta llegar a Pafos
  lexicon: BDAG
  rationale: ἄχρι marca el límite del desplazamiento. «Hasta Pafos» reproduce de manera directa ese punto de llegada.
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - dieron con
  lexicon: BDAG
  rationale: «Hallaron» conserva el valor narrativo del aoristo y suena más literario sin perder transparencia. «Encontraron» también sería posible.
- source_word: ἄνδρα τινὰ
  english_pob_choice: a certain man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a cierto hombre
  - a un hombre determinado
  lexicon: BDAG
  rationale: En español, «un hombre» comunica la indefinición sin sonar forzado; el matiz individuante de τινά queda suficientemente señalado por el contexto narrativo.
- source_word: μάγον
  english_pob_choice: a magician
  chosen_spanish: un mago
  alternatives_spanish:
  - un hechicero
  - un mago/astrólogo
  lexicon: BDAG
  rationale: El término denota a un practicante de artes ocultas. «Mago» es el equivalente más directo y comprensible; «hechicero» intensifica el tono de forma más interpretativa.
- source_word: ψευδοπροφήτην
  english_pob_choice: a false prophet
  chosen_spanish: falso profeta
  alternatives_spanish:
  - profeta falso
  - profeta engañoso
  lexicon: BDAG
  rationale: «Falso profeta» es la correspondencia transparente y estable para ψευδοπροφήτης, preservando la evaluación religiosa del texto.
- source_word: Ἰουδαῖον
  english_pob_choice: a Jew
  chosen_spanish: judío
  alternatives_spanish:
  - un judío
  - judeo
  lexicon: BDAG
  rationale: Como adjetivo sustantivado/apositivo, identifica étnica y religiosamente al hombre. «Judío» mantiene la fuerza nominal en español sin añadir ambigüedad geográfica.
- source_word: ᾧ ὄνομα Βαριησοῦ
  english_pob_choice: whose name was Bar-Jesus
  chosen_spanish: cuyo nombre era Bar-Jesús
  alternatives_spanish:
  - de nombre Bar-Jesús
  - llamado Bar-Jesús
  lexicon: BDAG
  rationale: La fórmula posesiva es natural en español y conserva el dato identificador. El nombre se translitera como nombre propio, no se traduce.
theological_decisions:
- issue: Tratamiento del nombre Βαριησοῦ
  english_pob_reading: Bar-Jesus may also be written Barjesus; the name likely reflects a Semitic patronymic meaning 'son of Jesus' or 'son of Joshua.'
  chosen_spanish_reading: Bar-Jesús
  alternative_spanish_readings:
  - Barjesús
  rationale: Se mantiene la transliteración como nombre propio, siguiendo la filosofía del proyecto para nombres. La forma con guion en inglés ayuda a reconocer el patronímico; en español, el uso de guion no es necesario y la forma compuesta sigue siendo legible.
  doctrine_reference: 'Translation philosophy: transliterate names; preserve identifiable Semitic patronymics in notes rather than in the main text.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y armoniza la lectura inglesa auditada con un español natural. No se detectaron revisiones textuales relevantes en el registro; el estado de alta concordancia respalda mantener la estructura básica y solo ajustar la naturalidad del español.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa «mago» para μάγος por consistencia con el sentido negativo del contexto.
  - Se usa «falso profeta» como término fijo y transparente.
  - Se translitera el nombre propio con forma española «Bar-Jesús» y se documenta la variante en nota.
