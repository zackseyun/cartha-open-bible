  to: Y después de haber atravesado toda la isla hasta Pafos, hallaron a cierto hombre, un mago, falso profeta, judío, cuyo nombre era Barjesús[a].
  rationale: Se reubica la nota al nombre propio pertinente, se recupera el matiz de ἄνδρα τινὰ con «cierto hombre», y se armoniza la transliteración española usando «Barjesús» en el texto principal con «Bar-Jesús» como variante explicada en la nota. El resto del versículo ya era fiel al griego y de buena calidad en español.
