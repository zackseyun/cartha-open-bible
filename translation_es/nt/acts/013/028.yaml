translation:
  language: es
  text: Y aunque no hallaron ningún motivo para una sentencia de muerte[a], pidieron a Pilato que lo mandara ejecutar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún cargo que mereciera muerte» o «ninguna base legal para una pena de muerte».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que le diera muerte» o «que lo pusiera a muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Se conserva la conexión narrativa simple de καί sin añadir matiz interpretativo.
- source_word: μηδεμίαν αἰτίαν θανάτου
  english_pob_choice: no basis for a death sentence
  chosen_spanish: ninguna causa de muerte
  alternatives_spanish:
  - ningún cargo que mereciera muerte
  - ninguna base legal para una pena de muerte
  - ningún motivo de muerte
  lexicon: BDAG
  rationale: αἰτία puede significar causa, cargo o fundamento; en este contexto judicial unido a θανάτου, la frase apunta a una causa penal para dar muerte. Se eligió una forma española breve y natural, manteniendo la tensión de que no encontraron fundamento de muerte sin suavizarla del todo.
- source_word: εὑρόντες
  english_pob_choice: though they found
  chosen_spanish: Y aunque no hallaron
  alternatives_spanish:
  - habiendo hallado
  - después de hallar
  - cuando hallaron
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior al verbo principal y, por el contexto, un sentido concesivo. 'Aunque' hace explícita esa relación sin forzar el contenido.
- source_word: ᾐτήσαντο
  english_pob_choice: they asked
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - rogaron
  - requirieron
  lexicon: BDAG
  rationale: αἰτέω se traduce con 'pedir' en español actual de manera natural y sobria, apropiada para una solicitud formal ante Pilato.
- source_word: Πιλᾶτον
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  lexicon: Transliteration standard
  rationale: Nombre propio transliterado de forma convencional.
- source_word: ἀναιρεθῆναι αὐτόν
  english_pob_choice: to have him executed
  chosen_spanish: que lo mandara ejecutar
  alternatives_spanish:
  - que lo hiciera matar
  - que lo mandara quitar de en medio
  - que lo pusiera a muerte
  lexicon: BDAG
  rationale: ἀναιρέω en este contexto es quitar la vida por acción judicial o ejecutiva. 'Mandara ejecutar' comunica bien la intervención de Pilato y la fuerza judicial del verbo, sin volverlo excesivamente coloquial.
theological_decisions:
- issue: Relación concesiva de εὑρόντες con la petición de ejecución
  english_pob_reading: Though they found no basis for a death sentence, they asked Pilate to have him executed.
  chosen_spanish_reading: Y aunque no hallaron ninguna causa de muerte, pidieron a Pilato que lo mandara ejecutar.
  alternative_spanish_readings:
  - Y no hallando ninguna causa de muerte, pidieron a Pilato que lo mandara ejecutar.
  - Y después de no hallar ninguna causa de muerte, pidieron a Pilato que lo mandara ejecutar.
  rationale: 'La cláusula participial no se deja meramente temporal; el contexto presenta una tensión moral y jurídica: aun sin causa, solicitan la ejecución. ''Aunque'' preserva esa tensión sin resolverla ni intensificarla indebidamente.'
  doctrine_reference: Preservar la tensión textual y judicial del relato apostólico; equivalencia óptima.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido ya auditado del inglés POB: lectura concesiva de εὑρόντες, matiz judicial de αἰτία θανάτου y fuerza ejecutiva de ἀναιρεθῆναι. No se introdujeron cambios respecto del control reciente; se mantuvo la equivalencia óptima con español natural.'
  spanish_consistency_notes:
  - Se usa 'Pilato' para el nombre propio, conforme a transliteración estándar.
  - Se evita 'SEÑOR' o cualquier sustitución litúrgica no presente en el griego.
  - Se conserva 'muerte' en la frase nominal para no diluir el contenido penal/judicial de θανάτου.
  - '''Mandara ejecutar'' mantiene el matiz de una acción solicitada a la autoridad romana, acorde con el contexto narrativo.'
