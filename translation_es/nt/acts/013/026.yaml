translation:
  language: es
  text: Hermanos[a], hijos del linaje de Abraham, y los que entre ustedes temen a Dios[b], a nosotros se nos ha enviado el mensaje de esta salvación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hombres, hermanos». El vocativo griego es masculino; la apelación puede incluir a la audiencia reunida en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «los temerosos de Dios entre ustedes», una posible referencia a gentiles adherentes de la sinagoga que adoraban al Dios de Israel.
    reason: cultural_note
  - marker: c
    text: O «la palabra de esta salvación».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hombres, hermanos
  - Hermanos y hermanas
  lexicon: BDAG
  rationale: El vocativo griego es masculino, pero en español «Hermanos» comunica con naturalidad la forma de apelación fraterna sin volver el texto áspero. «Hombres, hermanos» sería demasiado literal; «Hermanos y hermanas» introduciría explícitamente un matiz no expresado por la forma griega.
- source_word: υἱοὶ γένους Ἀβραὰμ
  english_pob_choice: sons of the family of Abraham
  chosen_spanish: hijos del linaje de Abraham
  alternatives_spanish:
  - hijos de la familia de Abraham
  - hijos del linaje abrahámico
  - hijos de Abraham
  lexicon: BDAG
  rationale: υἱοί conserva la idea de «hijos» y γένος apunta a linaje, estirpe o familia. «Linaje» preserva esa conexión genealógica y suena natural en español; evita reducirlo solo a filiación espiritual o a una mera pertenencia étnica sin matiz.
- source_word: οἱ ἐν ὑμῖν φοβούμενοι τὸν θεόν
  english_pob_choice: those among you who fear God
  chosen_spanish: los que entre ustedes temen a Dios
  alternatives_spanish:
  - los temerosos de Dios entre ustedes
  - los adoradores de Dios entre ustedes
  - los God-fearers entre ustedes
  lexicon: BDAG
  rationale: La expresión se traduce de manera descriptiva para no introducir un tecnicismo histórico en el texto principal. «Temen a Dios» refleja fielmente φοβούμενοι τὸν θεόν; la estructura «los que entre ustedes» mantiene el sentido distributivo y el contraste con «hijos del linaje de Abraham».
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: 'El dativo con ἐξαπεστάλη pide una dirección de envío: «a nosotros» preserva esa orientación en español. «Para nosotros» sería posible, pero suaviza el movimiento verbal del envío.'
- source_word: ὁ λόγος
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - la palabra
  lexicon: BDAG
  rationale: En este contexto proclamativo, λόγος funciona como anuncio o mensaje. «Mensaje» comunica el sentido con mayor claridad para el lector español moderno; «palabra» se conserva como alternativa viable, pero aquí sería más ambigua.
- source_word: τῆς σωτηρίας ταύτης
  english_pob_choice: of this salvation
  chosen_spanish: de esta salvación
  alternatives_spanish:
  - de esta liberación
  - acerca de esta salvación
  lexicon: BDAG
  rationale: 'σωτηρία se rinde como «salvación», el término normal y más preciso en Lucas-Hechos. El genitivo se entiende de forma natural como contenido o relación con «mensaje»: «el mensaje de esta salvación».'
- source_word: ἐξαπεστάλη
  english_pob_choice: has been sent
  chosen_spanish: ha sido enviado
  alternatives_spanish:
  - fue enviado
  lexicon: BDAG
  rationale: El aoristo pasivo expresa una acción completa de envío. «Ha sido enviado» conserva la relevancia actual del anuncio en el discurso; «fue enviado» también es posible, pero suena menos enfático en español.
theological_decisions:
- issue: φοβούμενοι τὸν θεόν y el trasfondo de los gentiles simpatizantes de la sinagoga
  english_pob_reading: those among you who fear God, with a footnote allowing 'the God-fearers among you' as a possible reference to Gentile synagogue adherents
  chosen_spanish_reading: los que entre ustedes temen a Dios, con nota que admite la referencia posible a simpatizantes gentiles de la sinagoga
  alternative_spanish_readings:
  - los temerosos de Dios entre ustedes
  - los God-fearers entre ustedes
  rationale: La frase puede leerse descriptivamente sin exigir al lector conocimiento del rótulo histórico. La nota mantiene la posibilidad de que se trate de los llamados «temerosos de Dios», sin convertirla en la única interpretación.
  doctrine_reference: Hechos 13:26; uso histórico de φοβούμενοι τὸν θεόν en el contexto de sinagoga y gentiles adherentes.
- issue: Tratamiento del vocativo masculino Ἄνδρες ἀδελφοί en una audiencia posiblemente mixta
  english_pob_reading: Brothers, with a footnote noting 'Men, brothers' and the possibility of a wider gathered audience
  chosen_spanish_reading: Hermanos, con nota que señala el vocativo masculino y la posible inclusión de una audiencia más amplia
  alternative_spanish_readings:
  - Hombres, hermanos
  - Hermanos y hermanas
  rationale: La forma griega es masculina y conviene no neutralizarla en el cuerpo del texto. «Hermanos» es idiomático en español y la nota preserva la precisión gramatical y la posible amplitud de la audiencia.
  doctrine_reference: Principio de fidelidad formal con claridad idiomática; vocativo masculino en griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y es consistente con la decisión auditada en inglés de conservar el vocativo masculino, traducir φοβούμενοι τὸν θεόν de manera descriptiva y preferir un equivalente natural para λόγος en contexto proclamativo. No se reportan revisiones aplicadas en el expediente inglés; la propuesta mantiene ese estado estable.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν conforme al criterio del proyecto.
  - Se usa «salvación» para σωτηρίας, en continuidad con la terminología bíblica estándar y el expediente inglés.
  - «Mensaje» para λόγος evita una calca innecesaria y sigue la decisión auditada del POB inglés.
  - La puntuación y el orden sintáctico buscan naturalidad en español sin desplazar el foco retórico del original.
