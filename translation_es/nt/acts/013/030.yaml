translation:
  language: es
  text: Pero Dios lo levantó de entre los muertos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ aquí marca contraste con la acción humana anterior; «Pero» conserva ese valor adversativo de manera natural en español.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: El sustantivo designa directamente a Dios como sujeto de la acción.
- source_word: ἤγειρεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - levantó de nuevo
  lexicon: BDAG
  rationale: En contexto de resurrección, ἐγείρω puede expresarse como «levantar»; aquí «levantó» mantiene la fuerza verbal del griego y, unido al complemento «de entre los muertos», comunica claramente el sentido de resurrección. «Resucitó» sería más explícito, pero añade un verbo intransitivo que desplaza levemente la forma del original.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús y en español el objeto directo natural es «lo»; conserva la referencia personal sin sobrecargar la frase.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: La expresión es un modismo de resurrección. «De entre los muertos» refleja bien la idea de salida desde el ámbito de los muertos y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Forma de la afirmación de resurrección
  english_pob_reading: But God raised him from the dead.
  chosen_spanish_reading: Pero Dios lo levantó de entre los muertos.
  alternative_spanish_readings:
  - Pero Dios lo resucitó de entre los muertos.
  - Pero Dios lo levantó de entre los muertos.
  rationale: El griego atribuye a Dios la acción de ἐγείρω sobre Jesús. «Levantó» preserva la imagen verbal de la acción divina y, con «de entre los muertos», expresa la resurrección sin introducir una paráfrasis más interpretativa que el original.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada no registró notas ni revisiones; el griego coincide plenamente con la lectura inglesa y no requiere expansión textual.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto aquí porque el sujeto explícito es θεός, no el tetragrama.
  - Se mantiene un registro bíblico sobrio y contemporáneo, con sintaxis breve y directa.
  - «De entre los muertos» conserva el modismo de resurrección sin convertir la frase en una glosa explicativa.
