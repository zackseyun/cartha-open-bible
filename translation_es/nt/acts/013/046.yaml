translation:
  language: es
  text: 'Entonces Pablo y Bernabé hablaron con valentía y dijeron: «Era necesario que la palabra de Dios se les anunciara primero a ustedes. Ya que la rechazan y se juzgan a sí mismos indignos de la vida eterna, miren, nos dirigimos a los gentiles[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las naciones». Aquí la frase se refiere a los no judíos en contraste con la audiencia de la sinagoga, por eso se usa «gentiles» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησιασάμενοί
  english_pob_choice: spoke boldly
  chosen_spanish: hablaron con valentía
  alternatives_spanish:
  - hablaron abiertamente
  - se expresaron con franqueza
  lexicon: BDAG
  rationale: El participio indica un hablar libre, franco y sin temor. En español, «hablaron con valentía» comunica bien el matiz adverbial y suena natural con el verbo principal «dijeron».
- source_word: τέ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Así que
  lexicon: BDAG
  rationale: La partícula enlaza con la escena anterior. «Entonces» expresa esa conexión discursiva sin forzar una equivalencia mecánica.
- source_word: Ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo señala el destinatario inmediato. «A ustedes» es el equivalente natural en español neutral latinoamericano.
- source_word: ἀναγκαῖον
  english_pob_choice: necessary
  chosen_spanish: era necesario
  alternatives_spanish:
  - era preciso
  - era obligatorio
  lexicon: BDAG
  rationale: «Era necesario» conserva la idea de necesidad/obligación sin endurecer el sentido más allá de lo que exige el contexto.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  lexicon: BDAG
  rationale: Indica prioridad temporal y salvífico-histórica. «Primero» reproduce esa prioridad de forma clara y concisa.
- source_word: λαληθῆναι
  english_pob_choice: be spoken
  chosen_spanish: se anunciara
  alternatives_spanish:
  - fuera dicho
  - se hablara
  lexicon: BDAG
  rationale: Aunque literalmente es «ser hablado», en este contexto el español gana naturalidad con «se anunciara», que conserva la pasiva y el carácter de proclamación pública.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» es la expresión bíblica estable y fiel al giro griego. «Mensaje de Dios» sería posible, pero pierde la fórmula establecida.
- source_word: ἐπειδὴ
  english_pob_choice: Since
  chosen_spanish: Ya que
  alternatives_spanish:
  - Porque
  - Puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la nueva orientación misionera. «Ya que» fluye bien en español y mantiene el valor causal.
- source_word: ἀπωθεῖσθε
  english_pob_choice: are rejecting
  chosen_spanish: la rechazan
  alternatives_spanish:
  - la están rechazando
  - la desechan
  lexicon: BDAG
  rationale: El presente medio expresa rechazo efectivo y continuado del mensaje. En español, «la rechazan» mantiene el sentido y la referencia a «la palabra de Dios».
- source_word: αὐτὸν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - ella
  lexicon: BDAG
  rationale: Aunque el pronombre griego es masculino, en español la referencia natural es a «la palabra de Dios», por lo que «la» evita dureza o ambigüedad innecesaria.
- source_word: οὐκ ἀξίους κρίνετε ἑαυτοὺς
  english_pob_choice: judging yourselves unworthy
  chosen_spanish: se juzgan a sí mismos indignos
  alternatives_spanish:
  - se consideran indignos
  - se estiman indignos
  lexicon: BDAG
  rationale: El verbo κρίνω conserva fuerza judicial. «Se juzgan a sí mismos indignos» mantiene la reflexividad y la implicación de autoveredicto, como en el texto fuente.
- source_word: τῆς αἰωνίου ζωῆς
  english_pob_choice: of eternal life
  chosen_spanish: de la vida eterna
  alternatives_spanish:
  - para la vida eterna
  lexicon: BDAG
  rationale: La expresión española usual «vida eterna» comunica bien el genitivo y conserva la formulación bíblica corriente.
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - miren aquí
  - he aquí
  lexicon: BDAG
  rationale: Marca atención e introduce el giro decisivo. «Miren» es natural en español moderno y preserva el énfasis del griego.
- source_word: στρεφόμεθα
  english_pob_choice: we are turning
  chosen_spanish: nos volvemos
  alternatives_spanish:
  - nos dirigimos
  - estamos volviéndonos
  lexicon: BDAG
  rationale: El presente señala una acción decisiva y actual. «Nos volvemos» conserva el movimiento de cambio de dirección sin añadir elementos no presentes en el texto.
- source_word: εἰς τὰ ἔθνη
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En este contexto lucano el contraste es étnico-religioso entre la audiencia de la sinagoga y los no judíos. «Gentiles» preserva ese contraste, siguiendo la decisión auditada del POB en inglés.
theological_decisions:
- issue: Sentido de τὰ ἔθνη en el marco de Hechos
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: La escena contrasta a los oyentes judíos con los no judíos. «Gentiles» mantiene esa oposición histórico-salvífica sin reducirla a una lectura geográfica.
  doctrine_reference: Hechos; filosofía de traducción §1, §5
- issue: Fuerza de οὐκ ἀξίους κρίνετε ἑαυτοὺς τῆς αἰωνίου ζωῆς
  english_pob_reading: Their rejection shows they judge themselves unworthy of eternal life
  chosen_spanish_reading: su rechazo muestra que se juzgan a sí mismos indignos de la vida eterna
  alternative_spanish_readings:
  - Pablo declara que son objetivamente indignos de la vida eterna
  rationale: El griego coloca la acción de juzgar en los oyentes mismos. La traducción conserva ese matiz reflexivo y evita convertir la frase en una sentencia externa no explicitada por el texto.
  doctrine_reference: Afirmaciones; filosofía de traducción §3
translation_notes:
  revision_awareness: 'El texto inglés auditado está en alta concordancia con el griego y no requiere cambios de fondo. Se conservan las decisiones clave: ἔθνη = «gentiles», el valor reflexivo de κρίνετε ἑαυτούς y la progresión causal introducida por ἐπειδή. La única adaptación principal en español es hacer natural la pasiva de λαληθῆναι con «se anunciara» sin perder la idea de que la palabra debía ser proclamada primero.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en general, pero aquí el texto dice «Dios», por lo que no aplica.
  - «Gentiles» se conserva por coherencia con la decisión auditada en Hechos y con el contraste judíos/no judíos.
  - Se usa español neutral latinoamericano («a ustedes», «miran», «nos volvemos»).
  - La nota[a] queda anclada en «hablaron con valentía» y ofrece una alternativa léxica sin alterar el texto principal.
