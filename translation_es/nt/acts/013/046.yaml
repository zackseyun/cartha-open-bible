    rationale: El POB inglés preserva explícitamente la alternativa «to the nations» para εἰς τὰ ἔθνη. El borrador español usa la nota en παρρησιασάμενοί, pero omite la alternativa más significativa y contextual para este versículo.
  - severity: medium
    issue: «Nos volvemos a los gentiles» es menos natural y potencialmente ambiguo en español.
    rationale: Aunque στρεφόμεθα expresa un giro actual, en español «volverse a» puede sonar torpe aquí. «Nos dirigimos a los gentiles» comunica con más claridad el cambio de enfoque misional sin traicionar el sentido.
  - severity: low
    issue: La nota actual en «dijeron[a]» sobre παρρησιασάμενοί no corresponde a la alternativa más importante preservada por la auditoría inglesa.
    rationale: La nota no es incorrecta, pero el registro auditado prioriza una nota sobre ἔθνη. Dado que no conviene sobrecargar el versículo con notas innecesarias, es mejor reubicar la nota en «gentiles».
