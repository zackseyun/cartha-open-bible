  to: 'Entonces Pablo y Bernabé hablaron con valentía y dijeron: «Era necesario que la palabra de Dios se les anunciara primero a ustedes. Ya que la rechazan y se juzgan a sí mismos indignos de la vida eterna, miren, nos dirigimos a los gentiles[a]».'
  rationale: 'Se mantiene la traducción general del borrador porque es fiel y legible, pero se hacen dos reparaciones menores: (1) se sustituye «nos volvemos a los gentiles» por «nos dirigimos a los gentiles» para un español más natural y claro en este contexto; (2) se traslada la nota al término «gentiles» para preservar la alternativa auditada «naciones», que es la variante léxica más importante del versículo.'
