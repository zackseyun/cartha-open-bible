translation:
  language: es
  text: 'Mientras ellos ministraban al Señor[a] y ayunaban, el Espíritu Santo dijo: «Aparten para mí a Bernabé y a Saulo para la obra a la que los he llamado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoraban al Señor». El verbo griego puede denotar servicio con matiz de culto o liturgia.
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργούντων
  english_pob_choice: ministering
  chosen_spanish: ministraban
  alternatives_spanish:
  - servían
  - adoraban
  lexicon: BDAG
  rationale: λειτουργέω puede abarcar servicio con matiz cultual o litúrgico. En español, «ministraban» conserva mejor ese doble valor de servicio y culto que «servían» (más general) o «adoraban» (más restringido).
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - ante el Señor
  lexicon: BDAG
  rationale: κύριος se traduce aquí con el título reverente «Señor». La construcción dativa expresa dirección del servicio; «al Señor» es natural y fiel.
- source_word: νηστευόντων
  english_pob_choice: fasting
  chosen_spanish: ayunaban
  alternatives_spanish:
  - estaban ayunando
  lexicon: BDAG
  rationale: El participio indica una acción concurrente. «Ayunaban» es breve, idiomático y mantiene la simultaneidad con el verbo principal.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo, el Espíritu de Dios
  lexicon: BDAG
  rationale: Se conserva la referencia personal y directa al sujeto que habla. «Espíritu Santo» es la forma natural y precisa en español.
- source_word: Ἀφορίσατε
  english_pob_choice: Set apart
  chosen_spanish: Aparten
  alternatives_spanish:
  - Separen
  - Pongan aparte
  lexicon: BDAG
  rationale: El imperativo expresa apartar para un propósito especial. «Aparten» comunica consagración y comisión sin añadir lenguaje eclesiástico posterior.
- source_word: δή
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - ahora
  - pues
  lexicon: BDAG
  rationale: δή aporta urgencia o inmediatez, pero en español puede quedar implícita en el mandato directo sin forzar una partícula adicional.
- source_word: μοι
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Con ἀφορίσατε, el dativo indica propósito/beneficio. «Para mí» refleja de modo idiomático que el apartamiento es para la obra del Espíritu.
- source_word: Βαρναβᾶν καὶ Σαῦλον
  english_pob_choice: Barnabas and Saul
  chosen_spanish: a Bernabé y a Saulo
  alternatives_spanish:
  - a Bernabé y Saulo
  lexicon: BDAG
  rationale: Se usan las formas españolas habituales de los nombres propios. El objeto directo personal se marca con la preposición «a».
- source_word: εἰς τὸ ἔργον
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para la misión
  lexicon: BDAG
  rationale: ἔργον es amplio y no debe limitarse prematuramente. «Obra» conserva la amplitud del encargo divino sin imponer una categoría técnica.
- source_word: ὃ προσκέκλημαι αὐτούς
  english_pob_choice: to which I have called them
  chosen_spanish: a la que los he llamado
  alternatives_spanish:
  - para la que los he llamado
  - para la cual los he llamado
  lexicon: BDAG
  rationale: El perfecto medio indica una llamada ya realizada con vigencia presente. «Los he llamado» reproduce bien esa fuerza vocacional; el relativo femenino concuerda con «obra».
theological_decisions:
- issue: Función de λειτουργούντων en contexto de oración/ayuno y comisión divina
  english_pob_reading: ministering to the Lord
  chosen_spanish_reading: ministraban al Señor
  alternative_spanish_readings:
  - adoraban al Señor
  - servían al Señor
  rationale: El verbo puede incluir servicio litúrgico o culto reverente, no solo «servir» en sentido general ni exclusivamente «adorar». «Ministraban» preserva ambas dimensiones y evita reducir el matiz del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no reducir el alcance semántico del original'
- issue: Sujeto personal del verbo de habla
  english_pob_reading: the Holy Spirit said
  chosen_spanish_reading: el Espíritu Santo dijo
  alternative_spanish_readings:
  - el Espíritu Santo habló
  rationale: El griego presenta al Espíritu Santo como sujeto que habla. La traducción conserva esa personalización sin suavizarla ni depersonalizarla.
  doctrine_reference: Ortodoxia histórica trinitaria; el texto atribuye habla personal al Espíritu Santo
- issue: Sentido de Ἀφορίσατε ... εἰς τὸ ἔργον
  english_pob_reading: Set apart for me ... for the work
  chosen_spanish_reading: Aparten para mí ... para la obra
  alternative_spanish_readings:
  - Sepárenlos para mí ... para la misión
  - Designen ... para la obra
  rationale: La frase expresa separación divina para una tarea específica. «Aparten» evita imponer una categoría institucional posterior como «ordenar» o «consagrar» y mantiene el carácter de comisión.
  doctrine_reference: No introducir estructuras eclesiales que el texto no explicita
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audio y la auditoría inglesa final; no se detectaron revisiones aplicadas. La redacción española sigue esa lectura estable, conservando las ambigüedades relevantes del verbo λειτουργέω y el mandato de separación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; aquí el texto usa κύριος y, por contexto cristológico y de habla del Espíritu Santo, se traduce «Señor».
  - Se emplea «Espíritu Santo» en mayúsculas como designación personal del Espíritu.
  - Se usa «Aparten para mí» para reflejar la comisión divina sin cargar el texto con terminología técnica eclesiástica.
  - La preposición «a» ante Bernabé y Saulo responde al objeto directo personal en español.
