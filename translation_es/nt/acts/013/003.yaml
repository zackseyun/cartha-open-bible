  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: τότε = «Entonces», los participios de ayuno, oración e imposición de manos están preservados, y el gesto de «imponer las manos» mantiene la concreción del original sin sobreinterpretación doctrinal. El punto principal a corregir es ἀπέλυσαν: en este contexto misional, «los despidieron» puede sonar en español a mera despedida social, mientras que el audit trail inglés documenta mejor la idea de dejarlos partir/enviarlos.'
  spanish_quality_summary: 'El español es claro y natural, pero la coordinación «después de ayunar y orar y de imponerles las manos» se lee algo desigual. Una leve mejora estilística mantiene la dignidad y fluidez. También conviene ajustar la nota: la nota actual en [a] comenta «Entonces/luego», pero en el POB inglés la nota pertenece a «sent them off», no al adverbio temporal.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Imponerles las manos» es una buena decisión lexical y teológica. La revisión propuesta alinea mejor ἀπέλυσαν con el razonamiento documentado: «los enviaron» en texto principal, con nota que preserve «los dejaron ir»/«los despidieron» como alternativas contextuales.'
  issues:
