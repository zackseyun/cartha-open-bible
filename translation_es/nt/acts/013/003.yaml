    rationale: El audit trail documenta la alternativa léxica para el verbo principal («sent them off / released / dismissed»), no para τότε. En español, la nota debe moverse al verbo de envío para reflejar fielmente la evidencia y la decisión lexical.
  - severity: medium
    issue: «Los despidieron» debilita o desplaza el sentido de ἀπέλυσαν en contexto.
    rationale: Aunque puede ser defendible, en español suele sugerir una despedida o conclusión social/reunión. En Hechos 13:3 el sentido es permitir la partida para la misión; «los enviaron» expresa mejor el contexto sin sobretraducir.
  - severity: low
