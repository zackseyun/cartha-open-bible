translation:
  language: es
  text: Entonces, después de ayunar, orar e imponerles las manos, los enviaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dejaron ir» o «los despidieron». En contexto, el sentido es que permitieron que Bernabé y Saulo partieran para la misión.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: BDAG
  rationale: Marca la secuencia temporal inmediata respecto a la instrucción profética anterior. «Entonces» comunica bien el valor consecutivo sin sonar rígido ni demasiado interpretativo.
- source_word: νηστεύσαντες
  english_pob_choice: after fasting
  chosen_spanish: después de ayunar
  alternatives_spanish:
  - habiendo ayunado
  - tras ayunar
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa a la principal. «Después de ayunar» conserva el orden de acciones y resulta natural en español.
- source_word: προσευξάμενοι
  english_pob_choice: praying
  chosen_spanish: orar
  alternatives_spanish:
  - habían orado
  - haciendo oración
  lexicon: BDAG
  rationale: El participio coordinado acompaña al ayuno como preparación. El infinitivo/gerundio nominal «orar» dentro de la frase mantiene concisión y la secuencia previa sin forzar un calco.
- source_word: ἐπιθέντες τὰς χεῖρας αὐτοῖς
  english_pob_choice: laying their hands on them
  chosen_spanish: de imponerles las manos
  alternatives_spanish:
  - de ponerles las manos
  - habiéndoles impuesto las manos
  lexicon: BDAG
  rationale: La expresión es idiomática y concreta. «Imponerles las manos» es una equivalencia estable en español bíblico y conserva el gesto físico de comisión sin añadir un sentido sacramental no explicitado por el verso.
- source_word: ἀπέλυσαν
  english_pob_choice: they sent them off
  chosen_spanish: los despidieron
  alternatives_spanish:
  - los dejaron ir
  - los enviaron
  lexicon: BDAG
  rationale: En este contexto de misión, el verbo indica dejar partir/mandar salir. «Despedir» comunica correctamente la liberación para partir, sin reducirlo a una mera despedida social.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les / los
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: BDAG
  rationale: El pronombre dativo refiere a Bernabé y Saulo como destinatarios de la imposición de manos y del acto de dejarles partir. En español se resuelve naturalmente en la cliticidad del verbo compuesto.
theological_decisions:
- issue: Sentido de la imposición de manos
  english_pob_reading: Render the action descriptively as a commissioning gesture without importing a specific sacramental or ordination theology.
  chosen_spanish_reading: Describir el gesto como una acción de comisión/envío, sin decidir si fue ordenación, bendición sacramental o rito eclesial específico.
  alternative_spanish_readings:
  - ordenación
  - bendición
  - rito de envío formal
  rationale: El versículo presenta ayuno, oración, imposición de manos y envío, pero no define por sí mismo el estatus teológico exacto del gesto. La traducción debe preservar esa tensión y no cerrarla con una etiqueta doctrinal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada: la secuencia temporal, el ayuno y la oración preparatorios, la imposición de manos como gesto de comisión, y ἀπέλυσαν en sentido de dejar partir/enviar. No se introdujeron cambios respecto al contexto revisado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece Χριστός en el texto fuente.
  - «Imponer las manos» conserva la formulación bíblica habitual y evita una paráfrasis doctrinal.
  - «Despidieron» se eligió por naturalidad española y por cercanía al matiz contextual de permitir la partida.
