translation:
  language: es
  text: En él, todo el que cree es justificado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por él, todo el que cree es justificado». El griego ἐν τούτῳ puede verterse más literalmente como «en/por este», con referencia a Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - En este
  - Por este
  - En este hombre
  lexicon: BDAG
  rationale: El contexto inmediato presenta a Jesús como el referente, así que el demostrativo se entiende de modo personal y anafórico. En español, «en él» conserva la relación preposicional sin forzar una traducción más literal pero menos natural como «en este».
- source_word: πᾶς ὁ πιστεύων
  english_pob_choice: everyone who believes
  chosen_spanish: todo el que cree
  alternatives_spanish:
  - todos los que creen
  - cualquiera que cree
  - todo creyente
  lexicon: BDAG
  rationale: El participio articular tiene valor genérico y sustantivo. «Todo el que cree» reproduce bien el alcance universal y el aspecto continuo/generativo del griego en un español claro y bíblico.
- source_word: δικαιοῦται
  english_pob_choice: is justified
  chosen_spanish: es justificado
  alternatives_spanish:
  - es declarado justo
  - es declarado inocente
  - es absuelto
  lexicon: BDAG
  rationale: En el uso paulino, δικαιόω conserva un sentido forense. «Es justificado» mantiene el término técnico tradicional sin convertirlo en una paráfrasis interpretativa.
theological_decisions:
- issue: Referencia de ἐν τούτῳ
  english_pob_reading: 'personal reference to Jesus: ''In him'''
  chosen_spanish_reading: 'referencia personal a Jesús: «En él»'
  alternative_spanish_readings:
  - 'referencia instrumental o impersonal: «por este»'
  - 'referencia más literal: «en este»'
  rationale: La cláusula anterior identifica a Jesús como el sujeto del anuncio; por eso la referencia es cristológica y personal. «En él» preserva ese flujo discursivo sin añadir teología ajena al texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de δικαιοῦται en un contexto paulino
  english_pob_reading: forensic 'is justified'
  chosen_spanish_reading: 'sentido forense: «es justificado»'
  alternative_spanish_readings:
  - «es declarado justo»
  - «es puesto en orden»
  rationale: El contraste inmediato del versículo y el uso paulino favorecen la justificación forense. La forma española tradicional mantiene la tensión doctrinal entre justificación y transformación moral sin diluirla.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó que no eran necesarios cambios adicionales y que el acuerdo con el control cruzado era alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «justificado» para δικαιοῦται, en continuidad con el lenguaje teológico paulino y con la auditoría inglesa.
  - Se prefirió «En él» frente a fórmulas más literales para conservar la referencia a Jesús sin perder naturalidad en español.
  - Se usó «todo el que cree» para reflejar el participio presente articular de forma idiomática y genérica.
