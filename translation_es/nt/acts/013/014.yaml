revisions:
- from: Pero ellos siguieron de Perge y llegaron a Antioquía[a] de Pisidia, y, al entrar en la sinagoga el día de sábado, se sentaron.
  to: Pero ellos continuaron desde Perge y llegaron a Antioquía[a] de Pisidia, y en el día de sábado entraron en la sinagoga y se sentaron.
  rationale: Se corrige «siguieron de Perge» por «continuaron desde Perge» para un español natural y fiel al sentido de proseguir el viaje; se suaviza la sintaxis del segmento sabático convirtiendo el participio en verbo finito, en línea con el POB inglés, y se corrige la nota para que refleje con precisión la construcción griega documentada en el expediente auditado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del viaje y la acción principal del versículo: salir/continuar desde Perge, llegar a Antioquía de/en Pisidia, entrar en la sinagoga y sentarse en sábado. Sin embargo, hay dos puntos donde la fidelidad y la naturalidad pueden mejorarse: «siguieron de Perge» no es español natural para διελθόντες ἀπὸ τῆς Πέργης, y «el día de sábado» suena poco idiomático para τῇ ἡμέρᾳ τῶν σαββάτων. Además, la nota actual invierte la relación entre texto principal y alternativa, y afirma incorrectamente que el griego dice «Antioquía de Pisidia» cuando el audit trail documenta «Antioquía en Pisidia».'
  spanish_quality_summary: 'El texto es generalmente claro, pero contiene giros poco naturales en español eclesial general: «siguieron de Perge» y «el día de sábado». Una redacción más idiomática y digna sería «continuaron desde Perge» y «en el día de sábado» o mejor «en el día de reposo», pero dado el audit trail conviene mantener referencia explícita a sábado: «en el día de sábado» todavía suena algo rígido. La opción más natural y fiel es reestructurar a «y en el día de sábado entraron en la sinagoga y se sentaron».'
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo el topónimo. «Antioquía de Pisidia» es aceptable en español, pero la nota debe preservar correctamente la alternativa documentada por el POB inglés: el texto inglés principal usa «Antioch in Pisidia», con nota alternativa «Pisidian Antioch». En español, si el texto principal queda como «Antioquía de Pisidia», la nota debe decir «O «Antioquía en Pisidia». El griego dice «Antioquía en Pisidia»» para reflejar el expediente auditado.'
  issues:
  - severity: medium
    issue: «siguieron de Perge» es poco natural en español
    rationale: Aunque intenta reflejar διελθόντες, en español estándar no se dice normalmente «seguir de» un lugar. «Continuaron desde Perge» o «siguieron adelante desde Perge» comunica mejor la idea de proseguir el viaje desde ese punto.
  - severity: medium
    issue: «el día de sábado» suena forzado
    rationale: Para τῇ ἡμέρᾳ τῶν σαββάτων, el español natural sería «en sábado», «el día sábado» o «en el día de sábado», pero el proyecto inglés escogió «on the Sabbath day». Conviene mantener la explicitud temporal con una formulación más fluida en la oración completa.
  - severity: medium
    issue: La nota toponímica no refleja correctamente el expediente inglés
    rationale: La nota actual dice que el griego dice «Antioquía de Pisidia», pero el POB inglés documenta explícitamente «The Greek reads ‘Antioch in Pisidia.’». La nota española debe concordar con esa documentación.
  revised_spanish_text: Pero ellos continuaron desde Perge y llegaron a Antioquía[a] de Pisidia, y en el día de sábado entraron en la sinagoga y se sentaron.
  revised_footnotes:
  - marker: a
    text: O «Antioquía en Pisidia». El griego dice «Antioquía en Pisidia».
    reason: lexical_alternative
  revision_rationale: Se corrige «siguieron de Perge» por «continuaron desde Perge» para un español natural y fiel al sentido de proseguir el viaje; se suaviza la sintaxis del segmento sabático convirtiendo el participio en verbo finito, en línea con el POB inglés, y se corrige la nota para que refleje con precisión la construcción griega documentada en el expediente auditado.
