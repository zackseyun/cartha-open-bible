translation:
  language: es
  text: Pero ellos continuaron desde Perge y llegaron a Antioquía[a] de Pisidia, y en el día de sábado entraron en la sinagoga y se sentaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Antioquía en Pisidia». El griego dice «Antioquía en Pisidia».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Ahora ellos
  - Pero ellos mismos
  lexicon: BDAG
  rationale: δέ marca continuación con leve contraste; αὐτοί añade énfasis de sujeto, pero en español ese matiz queda razonablemente cubierto con «ellos» y el conector «Pero» sin forzar una repetición enfática artificial.
- source_word: διελθόντες ἀπὸ τῆς Πέργης
  english_pob_choice: went on from Perga
  chosen_spanish: siguieron de Perge
  alternatives_spanish:
  - pasaron de Perge
  - partieron de Perge
  lexicon: BDAG
  rationale: El participio de διέρχομαι en contexto de viaje expresa continuar el recorrido desde un lugar. «Siguieron de» mantiene el movimiento narrativo con naturalidad en español y evita una traducción demasiado literal como «pasaron por», que aquí no recoge bien la salida desde Perge.
- source_word: παρεγένοντο
  english_pob_choice: came to
  chosen_spanish: llegaron a
  alternatives_spanish:
  - vinieron a
  - arribaron a
  lexicon: BDAG
  rationale: En contextos de viaje, παραγίνομαι indica llegar a un lugar. «Llegaron a» es la equivalencia española más directa y natural.
- source_word: Ἀντιόχειαν τὴν Πισιδίαν
  english_pob_choice: Antioch in Pisidia
  chosen_spanish: Antioquía de Pisidia
  alternatives_spanish:
  - Antioquía en Pisidia
  - Antioquía de la Pisidia
  lexicon: BDAG
  rationale: El griego identifica la ciudad por región. En español, la forma toponímica más clara y estable es «Antioquía de Pisidia»; conserva la referencia geográfica sin sonar rígida. Se mantiene la alternativa en nota porque el orden griego puede leerse literalmente como «Antioquía en Pisidia».
- source_word: εἰσελθόντες εἰς τὴν συναγωγήν
  english_pob_choice: they entered the synagogue
  chosen_spanish: al entrar en la sinagoga
  alternatives_spanish:
  - entraron en la sinagoga
  - habiendo entrado en la sinagoga
  lexicon: BDAG
  rationale: El participio aoristo se vierte mejor con una construcción subordinada natural en español. «Al entrar» conserva la relación temporal con lo que sigue y evita una acumulación de verbos finitos.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the Sabbath day
  chosen_spanish: el día de sábado
  alternatives_spanish:
  - en el día del sábado
  - en el día de reposo
  lexicon: BDAG
  rationale: La expresión griega es idiomática para el sábado judío. «El día de sábado» refleja bien la construcción temporal sin importar una formulación eclesiástica más interpretativa. Se evita «día del reposo» porque no es la equivalencia más directa en español contemporáneo.
- source_word: ἐκάθισαν
  english_pob_choice: sat down
  chosen_spanish: se sentaron
  alternatives_spanish:
  - tomaron asiento
  - se sentaron de nuevo
  lexicon: BDAG
  rationale: El aoristo simple expresa la acción de sentarse. «Se sentaron» es natural en español y suficiente para el valor ingresevo sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Topónimo y referencia geográfica de Antioquía
  english_pob_reading: Antioch in Pisidia
  chosen_spanish_reading: Antioquía de Pisidia
  alternative_spanish_readings:
  - Antioquía en Pisidia
  - Pisidian Antioch
  rationale: No hay una decisión doctrinal, sino una decisión de claridad geográfica. El griego usa una construcción atributiva que identifica la ciudad por región; en español, «de Pisidia» es la forma más natural y fiel.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden ampliamente; la única cuestión relevante es la forma del topónimo y la manera de expresar el participio inicial y la frase temporal. La presente versión conserva el movimiento narrativo, la identificación geográfica y la naturalidad del español sin perder la estructura del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» como norma general del proyecto, aunque este versículo no contiene esos términos.
  - «Sinagoga» se conserva como término técnico estándar para συναγωγή.
  - 'La secuencia verbal respeta el orden narrativo: salir de Perge, llegar a Antioquía de Pisidia, entrar en la sinagoga y sentarse.'
  - No se introduce una equivalencia litúrgica o doctrinal para τῶν σαββάτων; se deja como referencia al sábado judío.
