revisions:
- from: Pero levántate y entra en la ciudad[a], y se te dirá lo que te es necesario hacer.
  to: Pero levántate y entra en la ciudad[a], y se te dirá lo que debes hacer.
  rationale: 'Se revisa para: 1) hacer más natural el español principal con «debes» para reflejar la fuerza de δεῖ sin calco rígido; 2) corregir la nota al pie para que sí preserve la alternativa más literal del inglés auditado, manteniendo el pasivo/impersonal de λαληθήσεταί y la expresión de necesidad; 3) conservar una formulación digna y clara, fiel al griego.'
