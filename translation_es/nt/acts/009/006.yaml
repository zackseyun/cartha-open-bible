review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega general: imperativos consecutivos, referencia a la ciudad, pasivo impersonal futuro y contenido de la instrucción. Sin embargo, dos decisiones no preservan óptimamente el sentido ni el rastro de auditoría inglés: «entra en la ciudad» suena menos natural que «entra a la ciudad»/«entra en la ciudad» depende del dialecto, pero la explicación lexical del borrador para justificar «en» como direccional es débil; y sobre todo la nota al pie repite el mismo texto principal en vez de reflejar la alternativa más literal documentada en inglés. Además, «lo que te es necesario hacer» es comprensible pero menos idiomático que «lo que debes hacer» o «lo que tienes que hacer»; aun así, puede mantenerse una formulación cercana si se mejora la sintaxis.'
  spanish_quality_summary: El texto es legible, pero «lo que te es necesario hacer» resulta algo rígido y poco natural en español eclesial contemporáneo. «Se te dirá lo que debes hacer» comunica mejor la fuerza de δεῖ sin perder dignidad. La nota al pie necesita corrección porque actualmente no aporta una alternativa real. El resto del verso suena claro y fiel.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La principal cuestión léxica es δεῖ: el proyecto inglés eligió «must», y en español «debes» expresa mejor esa necesidad fuerte que «te es necesario» en este contexto. «Se te dirá» alinea bien con λαληθήσεταί σοι. No hay conflicto con terminología de Yahvé/Mesías/etc.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa literal del inglés POB.
    rationale: 'El texto de la nota repite esencialmente la redacción principal («se te dirá lo que te es necesario hacer») en lugar de reflejar la forma más literal documentada: «te será hablado/dicho lo que es necesario que hagas». Eso rompe la trazabilidad del audit trail.'
  - severity: medium
    issue: «Lo que te es necesario hacer» suena forzado en español.
    rationale: Aunque intenta reflejar δεῖ literalmente, la frase es menos natural y menos clara que «lo que debes hacer» o «lo que es necesario que hagas». El proyecto pide español moderno, claro y digno, evitando calcos innecesarios.
  - severity: low
    issue: La justificación de «en la ciudad» como complemento direccional es discutible.
    rationale: Con «entrar», muchas variedades aceptan «entrar en», pero la explicación dada dice que «en la ciudad» cubre naturalmente el valor direccional, lo cual puede sonar menos preciso. El texto mismo puede mantenerse o ajustarse levemente según naturalidad general; no es un problema grave de fidelidad.
  revised_spanish_text: Pero levántate y entra en la ciudad[a], y se te dirá lo que debes hacer.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «se te hablará lo que es necesario que hagas».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para: 1) hacer más natural el español principal con «debes» para reflejar la fuerza de δεῖ sin calco rígido; 2) corregir la nota al pie para que sí preserve la alternativa más literal del inglés auditado, manteniendo el pasivo/impersonal de λαληθήσεταί y la expresión de necesidad; 3) conservar una formulación digna y clara, fiel al griego.'
