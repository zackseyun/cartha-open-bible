translation:
  language: es
  text: Pero levántate y entra en la ciudad[a], y se te dirá lo que debes hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «se te hablará lo que es necesario que hagas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Sin embargo
  lexicon: BDAG
  rationale: Marca la transición adversativa desde la situación previa a la orden de Jesús. En español, «Pero» es la equivalencia más natural y concisa en este contexto narrativo.
- source_word: ἀνάστηθι
  english_pob_choice: get up
  chosen_spanish: levántate
  alternatives_spanish:
  - ponte de pie
  - álzate
  lexicon: BDAG
  rationale: Imperativo aoristo de ἀνίστημι. «Levántate» comunica bien la acción inmediata de incorporarse tras haber caído, con naturalidad idiomática en español.
- source_word: εἴσελθε
  english_pob_choice: enter
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  - ve dentro
  lexicon: BDAG
  rationale: Imperativo de εἰσέρχομαι. «Entra» es la forma más directa y clara en español para este mandato de movimiento hacia adentro.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - dentro de la ciudad
  lexicon: BDAG
  rationale: El griego expresa la dirección mediante εἰς. En español, con «entra» el valor direccional queda bien cubierto por «en la ciudad» sin volver la frase pesada; la idea es la de entrar a la ciudad mencionada en el contexto.
- source_word: λαληθήσεταί σοι
  english_pob_choice: you will be told
  chosen_spanish: se te dirá
  alternatives_spanish:
  - te hablarán
  - te será dicho
  lexicon: BDAG
  rationale: El futuro pasivo de λαλέω conserva la forma indirecta. «Se te dirá» mantiene el pasivo sin añadir un sujeto explícito, de modo cercano al griego y natural en español.
- source_word: ὅ τί
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  - aquello que
  lexicon: BDAG
  rationale: La combinación relativo-interrogativa introduce el contenido de la instrucción que será comunicada. «Lo que» expresa con claridad y fluidez el contenido resultante en español.
- source_word: σε δεῖ ποιεῖν
  english_pob_choice: you must do
  chosen_spanish: te es necesario hacer
  alternatives_spanish:
  - debes hacer
  - es necesario que hagas
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. Se conserva con una formulación más literal pero natural en español, manteniendo la tensión de necesidad sin especificar su origen más allá del texto.
theological_decisions:
- issue: Fuerza de δεῖ en un contexto de dirección divina
  english_pob_reading: must
  chosen_spanish_reading: te es necesario
  alternative_spanish_readings:
  - debes
  - tienes que
  rationale: En Hechos, δεῖ suele señalar necesidad fuerte dentro del propósito de Dios. «Te es necesario» preserva esa fuerza sin resolver explícitamente la fuente de la obligación, manteniendo la tensión teológica del texto.
  doctrine_reference: Necesidad bajo dirección divina; evitar sobreexplicación del agente de la obligación.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente en el sentido general: no se requieren cambios sustanciales respecto del sentido y la fuerza del griego. Se conserva la pasiva indirecta y la obligación expresada por δεῖ sin resolverla interpretativamente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí, ya que el versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece Χριστός en este versículo.
  - Se conserva una construcción pasiva impersonal («se te dirá») para reflejar el griego sin añadir sujeto.
  - La nota al pie preserva la alternativa más literal del pasivo griego y de δεῖ, como en el audit trail en inglés.
