translation:
  language: es
  text: Pero Saulo se iba fortaleciendo cada vez más y confundía a los judíos que vivían en Damasco, demostrando que este es el Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». El título griego Χριστός se traduce aquí «Mesías» para preservar su sentido mesiánico judío.'
    reason: alternative_reading
lexical_decisions:
- source_word: μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: cada vez más
  alternatives_spanish:
  - más y más
  - todavía más
  lexicon: BDAG
  rationale: El adverbio intensifica el progreso de la acción. «Cada vez más» conserva la idea de incremento continuo de manera natural en español.
- source_word: ἐνεδυναμοῦτο
  english_pob_choice: kept gaining strength
  chosen_spanish: se iba fortaleciendo
  alternatives_spanish:
  - iba ganando fuerza
  - era fortalecido
  lexicon: BDAG
  rationale: El imperfecto expresa desarrollo continuo. «Se iba fortaleciendo» mantiene esa progresividad sin decidir de manera cerrada entre fortalecimiento interno o recibido.
- source_word: συνέχυννεν
  english_pob_choice: was confounding
  chosen_spanish: confundía
  alternatives_spanish:
  - estaba confundiendo
  - ponía en confusión
  lexicon: BDAG
  rationale: El verbo puede significar confundir o poner en desorden. «Confundía» comunica el efecto polémico en el debate, aunque en español es algo más suave que «confundía/ponía en confusión».
- source_word: Ἰουδαίους
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judíos
  - al pueblo judío
  lexicon: BDAG
  rationale: En Hechos, el término designa al grupo judío en sentido étnico-religioso. El acusativo con artículo se vierte naturalmente con «a los judíos».
- source_word: κατοικοῦντας ἐν Δαμασκῷ
  english_pob_choice: living in Damascus
  chosen_spanish: que vivían en Damasco
  alternatives_spanish:
  - que habitaban en Damasco
  - residentes en Damasco
  lexicon: BDAG
  rationale: La expresión participial identifica a qué judíos se refiere. «Que vivían en Damasco» es claro y idiomático en español.
- source_word: συμβιβάζων
  english_pob_choice: proving
  chosen_spanish: demostrando[a]
  alternatives_spanish:
  - probando[a]
  - mostrando
  lexicon: BDAG
  rationale: En contexto forense/argumentativo, el participio describe la acción de establecer una conclusión con razones. «Demostrando» conserva esa fuerza evidencial mejor que «mostrando».
- source_word: οὗτός
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: El demostrativo tiene fuerza enfática. En español, «este» conserva la referencia directa a Jesús sin forzar una perífrasis más pesada.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título mesiánico. Se traduce «Mesías» para preservar el sentido judío del enunciado, conforme al criterio del proyecto.
theological_decisions:
- issue: Χριστός como título mesiánico y no como nombre litúrgico fijo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto muestra a Saulo argumentando que Jesús cumple la expectativa mesiánica. En español, «Mesías» mantiene mejor el valor titular y la carga judía del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (cuando es título)'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés y no requiere revisión adicional: se mantiene el progreso continuo de Saulo, el matiz de confusión polémica y la traducción titular de Χριστός como «Mesías».'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin calco excesivo.
  - «Judíos» se conserva por corresponder al uso de Hechos y al audit trail inglés.
  - La nota al pie sigue la alternativa documentada «el Cristo» sin desplazar la traducción principal.
