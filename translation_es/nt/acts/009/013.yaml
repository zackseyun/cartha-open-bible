translation:
  language: es
  text: 'Pero Ananías respondió[a]: «Señor, he oído de muchos acerca de este hombre, cuánto mal ha hecho a tus santos en Jerusalén».


    [a] O «a tus santos/consagrados en Jerusalén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tus santos/consagrados en Jerusalén».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη δὲ
  english_pob_choice: But ... answered
  chosen_spanish: Pero ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Pero ... contestó
  lexicon: SBLGNT / BDAG
  rationale: δέ introduce una transición suave con matiz adversativo; en español, «Pero» comunica bien el giro de Ananías ante la instrucción recibida. «Respondió» refleja con precisión ἀποκρίνομαι y es natural en este contexto narrativo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: En el contexto de una visión en Hechos 9, el vocativo se dirige a Jesús resucitado. «Señor» conserva el peso reverencial y teológico del término sin debilitarlo a un mero tratamiento cortesano.
- source_word: ἤκουσα ἀπὸ πολλῶν
  english_pob_choice: I have heard from many
  chosen_spanish: he oído de muchos
  alternatives_spanish:
  - he escuchado de muchos
  - he sabido por muchos
  lexicon: BDAG
  rationale: El aoristo se vierte de manera natural en español con un perfecto o pretérito; «he oído» transmite que la información recibida sigue siendo relevante para la objeción de Ananías. «De muchos» preserva la concisión del griego sin añadir un sustantivo no explícito.
- source_word: περὶ τοῦ ἀνδρὸς τούτου
  english_pob_choice: about this man
  chosen_spanish: acerca de este hombre
  alternatives_spanish:
  - sobre este hombre
  - de este hombre
  lexicon: BDAG
  rationale: «Acerca de» reproduce bien περί con genitivo en un registro claro y sobrio. «Este hombre» conserva el demostrativo y la referencia inmediata a Saulo.
- source_word: ὅσα κακὰ
  english_pob_choice: how much evil
  chosen_spanish: cuánto mal
  alternatives_spanish:
  - qué mal
  - qué cosas malas
  lexicon: BDAG
  rationale: ὅσα + neutro plural κακά expresa extensión/cantidad de acciones malas. «Cuánto mal» capta esa idea de magnitud de manera más natural en español que una traducción literal como «cuántas cosas malas», sin borrar la fuerza moral del término.
- source_word: τοῖς ἁγίοις σου
  english_pob_choice: your saints
  chosen_spanish: a tus santos
  alternatives_spanish:
  - a tus santos fieles
  - a tus santos/consagrados
  lexicon: BDAG
  rationale: ἅγιοι en Hechos designa a los creyentes; el equivalente eclesial establecido en español es «santos». Se conserva el posesivo «tus» para reflejar la pertenencia a Jesús y el destinatario directo de la frase.
- source_word: ἐποίησεν
  english_pob_choice: he has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha cometido
  lexicon: BDAG
  rationale: ποιέω es amplio; «ha hecho» es el equivalente más directo y funciona bien con la expresión de daño acumulado. El perfecto español mantiene la relevancia presente de lo que Ananías ha oído.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: BDAG
  rationale: Traducción locativa directa y estándar.
theological_decisions:
- issue: Valor de Κύριε como vocativo en la visión
  english_pob_reading: Direct address to Jesus as 'Lord'
  chosen_spanish_reading: Dirección directa a Jesús como «Señor»
  alternative_spanish_readings:
  - señor en sentido meramente respetuoso
  - maestro
  rationale: El contexto narrativo de Hechos 9 sitúa a Ananías respondiendo al Señor resucitado. Mantener «Señor» preserva tanto la reverencia como la carga cristológica del pasaje, sin introducir una explicación que el texto no exige explícitamente.
  doctrine_reference: 'DOCTRINE.md: κύριος -> «Lord» / en español, «Señor»'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: conserva el giro adversativo de δέ, el vocativo cristológico κύριος como «Señor», y la fuerza cuantitativa de ὅσα κακά como «cuánto mal», evitando una paráfrasis más amplia. La nota mantiene la alternativa lexical que el inglés documentó para la expresión final.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en vocativo directo, conforme al valor cristológico del contexto.
  - Se mantiene «santos» para ἅγιοι, consistente con el uso eclesial en el NT y con la POB inglesa.
  - El perfecto compuesto («he oído», «ha hecho») conserva la relevancia presente de la información en la objeción de Ananías.
  - La puntuación usa comillas angulares y vocativo con coma conforme al estilo español editorial.
