revisions:
- from: Y allí encontró a un hombre llamado Aeneas[a], postrado en una camilla[b] desde hacía ocho años, que estaba paralítico.
  to: Y allí encontró a un hombre llamado Eneas, postrado en un camastro[a] desde hacía ocho años, que estaba paralítico.
  rationale: Se corrige «Aeneas» a «Eneas» para ajustarlo al uso natural del español bíblico. Se reemplaza «camilla» por «camastro» para reflejar mejor κράβαττος sin introducir una imagen médica moderna. Se elimina la nota innecesaria sobre el nombre y se conserva una sola nota útil para la alternativa más literal del objeto sobre el que yacía. No se requiere adjudicación adicional porque la revisión es léxica y estilística, no doctrinal ni textualmente incierta.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia narrativa y el sentido básico del griego: Pedro encuentra allí a un hombre llamado Aeneas/Aeneas, postrado por ocho años y paralítico. Sin embargo, hay dos desajustes importantes con la evidencia y la línea editorial auditada: (1) el nombre propio no está adaptado a la forma española más natural; (2) «camilla» no refleja bien κράβαττος, que aquí apunta más bien a estera/camastro/lecho sencillo, no a una camilla de traslado. Además, el borrador elimina el matiz de ἄνθρωπόν τινα (‘un cierto hombre’) más de lo necesario.'
  spanish_quality_summary: El español es claro y legible, pero «Aeneas» se siente ajeno en un texto bíblico en español y «camilla» introduce una imagen médica moderna poco natural en este contexto. «Postrado» funciona, pero combinado con «en una camilla» suena algo clínico. Una redacción como «tendido en un camastro» o «postrado en un camastro» mejora fidelidad e inteligibilidad.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión léxica es el nombre propio y κράβαττος. Para una Biblia en español, «Eneas» es la forma normal y más legible del nombre Αἰνέας. Para κράβαττος, conviene evitar «camilla» y usar «camastro» en texto, preservando «estera» o formulaciones más literales en nota.
  issues:
  - severity: medium
    issue: El nombre propio aparece como «Aeneas» en vez de «Eneas».
    rationale: Aunque el inglés auditado translitera ‘Aeneas’, la tarea es revisar un texto español, no calcar la transliteración inglesa. En español bíblico y general, «Eneas» es la forma natural y reconocible de Αἰνέας. Mantener «Aeneas» perjudica la legibilidad sin ganar fidelidad.
  - severity: medium
    issue: «Camilla» no representa bien κράβαττος en este contexto.
    rationale: κράβαττος suele denotar una estera, catre o camastro sencillo. «Camilla» en español actual sugiere una camilla médica o de traslado, lo que puede desviar la imagen concreta del texto fuente.
  - severity: low
    issue: Se pierde el matiz de ἄνθρωπόν τινα al decir solo «un hombre».
    rationale: No es un error grave, porque en español «un hombre» puede bastar, pero «cierto hombre» o «un hombre llamado…» puede reflejar mejor la función introductoria del griego. Aun así, la naturalidad del español permite no forzarlo.
  - severity: low
    issue: La nota del nombre propio es innecesaria y de poco valor exegético.
    rationale: El inglés no exigía una nota sobre el nombre, y en español una nota explicando simple transliteración no aporta al lector. Es preferible reservar la nota para la alternativa léxica de κράβαττος.
  revised_spanish_text: Y allí encontró a un hombre llamado Eneas, postrado en un camastro[a] desde hacía ocho años, que estaba paralítico.
  revised_footnotes:
