translation:
  language: es
  text: Y allí encontró a un hombre llamado Eneas, postrado en un camastro[a] desde hacía ocho años, que estaba paralítico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «tendido sobre una estera» o «reclinado sobre un camastro». El griego κράβαττος puede señalar un lecho sencillo, una estera o un catre portátil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: encontró
  alternatives_spanish:
  - halló
  - se encontró con
  lexicon: BDAG
  rationale: El aoristo de εὑρίσκω expresa una acción puntual de hallazgo; «encontró» conserva la secuencia narrativa sin añadir matices ajenos.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como continuación narrativa simple; «Y» es natural en español y mantiene la conexión sin sobrerinterpretarla.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo se vierte de forma breve y natural con «allí».
- source_word: ἄνθρωπόν τινα
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - alguien
  lexicon: BDAG
  rationale: En español, «un cierto hombre» suena forzado; el sentido discursivo de persona previamente no identificada queda suficientemente expresado con «un hombre» sin perder naturalidad.
- source_word: ὀνόματι Αἰνέαν
  english_pob_choice: named Aeneas
  chosen_spanish: llamado Aeneas
  alternatives_spanish:
  - de nombre Aeneas
  - nombrado Aeneas
  lexicon: BDAG
  rationale: La construcción dativa con ὀνόματι se expresa idiomáticamente en español con «llamado». Se preserva el nombre propio transliterado.
- source_word: ἐξ ἐτῶν ὀκτὼ
  english_pob_choice: for eight years
  chosen_spanish: desde hacía ocho años
  alternatives_spanish:
  - por ocho años
  - durante ocho años
  lexicon: BDAG
  rationale: La frase griega indica duración extendida; «desde hacía ocho años» comunica bien el estado prolongado y evita una simple traducción mecánica.
- source_word: κατακείμενον ἐπὶ κραβάττου
  english_pob_choice: bedridden
  chosen_spanish: postrado en una camilla
  alternatives_spanish:
  - tendido en una estera
  - acostado en un lecho
  lexicon: BDAG
  rationale: El griego describe estar tendido sobre un κράβαττος, una camilla/colchoneta/paleta. Opto por «camilla» para conservar la imagen concreta, y «postrado» para reflejar el estado de inmovilidad sin borrar el matiz físico del texto.
- source_word: κραβάττου
  english_pob_choice: bedridden
  chosen_spanish: camilla
  alternatives_spanish:
  - estera
  - camastro
  - lecho
  lexicon: BDAG
  rationale: Aunque κράβαττος puede referir a una estera o paleta, «camilla» comunica en español la idea de un soporte de carga/descanso y mantiene la concreción material que la versión inglesa atenuó.
- source_word: ὃς ἦν παραλελυμένος
  english_pob_choice: who was paralyzed
  chosen_spanish: que estaba paralítico
  alternatives_spanish:
  - que estaba paralizado
  - el cual era paralítico
  lexicon: BDAG
  rationale: παραλελυμένος denota una condición de parálisis. En español, «estaba paralítico» es claro y digno; «paralizado» es posible, pero «paralítico» conserva mejor el estado resultante como descripción de condición.
translation_notes:
  revision_awareness: La revisión inglesa eliminó el pluscuamperfecto («had been») y la conjunción adicional antes de «was paralyzed» para reflejar más directamente el griego. En español se siguió esa línea con una sola cláusula descriptiva final («que estaba paralítico») y sin añadir un pasado compuesto. También se preservó la concreción de κράβαττος mediante una imagen física equivalente, con nota alternativa para el sentido más literal.
  spanish_consistency_notes:
  - Se usa «Y» para δέ como continuación narrativa simple.
  - Se translitera el nombre propio Aeneas sin adaptar a una forma castellana distinta.
  - Se conserva la distinción entre el estado prolongado («desde hacía ocho años») y la condición física («postrado...», «paralítico»).
  - La nota sobre κράβαττος mantiene abierta la alternativa léxica sin sustituirla en el texto principal.
