translation:
  language: es
  text: Y todos los que vivían en Lida y en Sarón[a] lo vieron, y se volvieron al Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Sarón» o «la llanura de Sarón».
    reason: lexical_alternative
  - marker: b
    text: «Se volvieron al Señor» también puede entenderse como «retornaron al Señor» o, de manera más interpretativa, «se convirtieron al Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδαν
  english_pob_choice: saw
  chosen_spanish: lo vieron
  alternatives_spanish:
  - vieron
  - lo observaron
  lexicon: BDAG
  rationale: El aoristo de ὁράω expresa percepción visual simple; en español, «lo vieron» es natural y conserva la referencia directa al hecho de verlo tras su sanidad.
- source_word: πάντες οἱ κατοικοῦντες
  english_pob_choice: all those living
  chosen_spanish: todos los que habitaban
  alternatives_spanish:
  - todos los que vivían
  - todos los habitantes
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. «Todos los que habitaban» preserva el valor de “los que residían” sin sonar forzado en español.
- source_word: Λύδδα
  english_pob_choice: Lydda
  chosen_spanish: Lida
  alternatives_spanish:
  - Lydda
  lexicon: Transliteration standard of the place name
  rationale: En español bíblico puede adaptarse la transliteración con «Lida», forma más natural y reconocible para lectores hispanos, sin alterar la identidad del topónimo.
- source_word: τὸν Σαρῶνα
  english_pob_choice: Sharon
  chosen_spanish: Sarón
  alternatives_spanish:
  - el Sarón
  - la llanura de Sarón
  lexicon: BDAG
  rationale: Σαρών designa la región/llanura de Sarón. En el texto principal se conserva el topónimo en forma breve; la posible expansión se mantiene como alternativa lexical, sin añadir especificación no explicitada por el griego.
- source_word: οἵτινες
  english_pob_choice: and they
  chosen_spanish: y se
  alternatives_spanish:
  - quienes
  - y ellos
  lexicon: BDAG
  rationale: El relativo introduce la acción consecuente; en español, la coordinación verbal con «y se volvieron» reproduce mejor la fluidez narrativa que una cláusula relativa más pesada.
- source_word: ἐπέστρεψαν ἐπὶ τὸν κύριον
  english_pob_choice: turned to the Lord
  chosen_spanish: se volvieron al Señor
  alternatives_spanish:
  - volvieron al Señor
  - se convirtieron al Señor
  lexicon: BDAG
  rationale: ἐπιστρέφω con ἐπί + acusativo denota un volverse/turnarse hacia el Señor en sentido de arrepentimiento o conversión. «Se volvieron al Señor» preserva el idiomа bíblico sin sobreespecificar doctrinalmente.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - el Dueño
  lexicon: BDAG
  rationale: «El Señor» reproduce el título reverencial usual en el NT. Dado el contexto de Hechos, el referente es Jesús resucitado, pero el texto griego conserva solo el título.
theological_decisions:
- issue: Referente de «el Señor»
  english_pob_reading: Rendered simply as 'the Lord' without expanding to 'the Lord Jesus' in the main text.
  chosen_spanish_reading: Se traduce simplemente como «el Señor», sin ampliar a «el Señor Jesús» en el texto principal.
  alternative_spanish_readings:
  - el Señor Jesús
  rationale: El contexto de Hechos apunta a Jesús, pero el griego dice solo τὸν κύριον. Mantener el título evita añadir palabras no presentes y preserva la referencia probable sin explicitarla en el versículo.
  doctrine_reference: 'Contested terms: κύριος → Señor; translation philosophy #1 and #3'
- issue: Fuerza de ἐπέστρεψαν
  english_pob_reading: Expressed as 'turned to' rather than a more doctrinally loaded term.
  chosen_spanish_reading: Se expresa como «se volvieron a/al Señor» en vez de una fórmula más doctrinalmente cargada.
  alternative_spanish_readings:
  - se convirtieron al Señor
  - retornaron al Señor
  rationale: La frase reporta una respuesta de fe/arrepentimiento. «Se volvieron» conserva la imagen de cambio de dirección y el sentido de conversión sin imponer una formulación interpretativa más estrecha.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: El estado del texto fuente y del aparato inglés muestra alta concordancia y ninguna revisión aplicada; por ello, el borrador español sigue de cerca las decisiones ya auditadas, conservando el sentido narrativo y la ambigüedad lexical de ἐπέστρεψαν sin añadir expansión doctrinal.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριον, coherente con la política POB de no ampliar el título en el texto principal.
  - Se usa «Sarón» como topónimo breve y publicable; la alternativa regional queda documentada en nota.
  - «Se volvieron» conserva la imagen semántica de cambio de dirección/retorno y encaja con el registro bíblico en español.
  - 'El orden de la oración respeta la progresión narrativa del griego: ver → respuesta de conversión/retorno.'
