translation:
  language: es
  text: Ahora los hombres que lo acompañaban estaban sin habla[a], oyendo la voz[b], pero sin ver a nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “se quedaron sin habla”.
    reason: lexical_alternative
  - marker: b
    text: O “el sonido”. La palabra griega puede significar “voz” o “sonido”; compárese Hechos 22:9.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄνδρες
  english_pob_choice: Now the men
  chosen_spanish: Ahora los hombres
  alternatives_spanish:
  - Y los hombres
  - Pero los hombres
  lexicon: BDAG
  rationale: οἱ ἄνδρες se refiere de manera directa a “los hombres”; δέ aporta una transición narrativa suave. “Ahora” mantiene ese flujo discursivo en español sin cargar la conexión con un contraste más fuerte de lo que exige el griego.
- source_word: οἱ συνοδεύοντες αὐτῷ
  english_pob_choice: traveling with him
  chosen_spanish: que lo acompañaban
  alternatives_spanish:
  - viajaban con él
  - que iban con él
  lexicon: BDAG
  rationale: συνοδεύω significa acompañar en un viaje. “Que lo acompañaban” es natural en español y conserva la idea de ir con él en el trayecto.
- source_word: εἱστήκεισαν
  english_pob_choice: stood
  chosen_spanish: se quedaron
  alternatives_spanish:
  - estaban de pie
  - permanecieron
  lexicon: BDAG
  rationale: 'El pluscuamperfecto de ἵστημι aquí tiene fuerza estativa: estaban en una postura inmóvil. En español, “se quedaron” comunica esa inmovilidad narrativamente, junto con el efecto de quedar paralizados por lo ocurrido.'
- source_word: ἐνεοί
  english_pob_choice: speechless
  chosen_spanish: mudos
  alternatives_spanish:
  - sin habla
  - callados
  - sin poder hablar
  lexicon: BDAG
  rationale: ἐνεός indica incapacidad de hablar, a menudo por asombro. “Mudos” reproduce con fuerza esa imposibilidad momentánea de hablar; en el contexto narrativo español suena idiomático y sobrio.
- source_word: ἀκούοντες μὲν τῆς φωνῆς
  english_pob_choice: hearing the voice
  chosen_spanish: oyendo la voz
  alternatives_spanish:
  - oyendo el sonido
  - escuchando la voz
  lexicon: BDAG
  rationale: φωνή puede significar “voz” o “sonido”. Aquí se mantiene “voz” para seguir de cerca el valor léxico del término, dejando la posible tensión con Hechos 22:9 para una nota explicativa en vez de resolverla por paráfrasis.
- source_word: μηδένα δὲ θεωροῦντες
  english_pob_choice: but seeing no one
  chosen_spanish: pero no viendo a nadie
  alternatives_spanish:
  - pero sin ver a nadie
  - pero no observando a nadie
  lexicon: BDAG
  rationale: θεωρέω es “ver/observar/contemplar”; “no viendo a nadie” expresa con claridad que no percibían ninguna persona visible.
theological_decisions:
- issue: Tensión aparente entre Hechos 9:7 y Hechos 22:9 respecto a lo que oyeron los compañeros de Saulo
  english_pob_reading: Acts 9:7 keeps 'hearing the voice' in the main text; the English footnote mentions the lexical range of φωνή and cites Acts 22:9.
  chosen_spanish_reading: Mantener “la voz” en el texto principal y señalar en nota que φωνή también puede abarcar “sonido”.
  alternative_spanish_readings:
  - Traducir aquí “el sonido” para suavizar la tensión con Hechos 22:9
  - Dejar “la voz” sin nota
  rationale: La decisión española conserva la lectura léxica más directa de φωνή y, al mismo tiempo, reconoce la tensión textual con una nota breve. Esto evita una armonización excesiva y respeta la amplitud semántica del término griego.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El audit trail inglés pasó de traducir φωνή como “sound” a revisarlo a “voice” para mayor precisión léxica. La versión española sigue la decisión final revisada (“voz”) y conserva una nota que reconoce la amplitud semántica y la referencia cruzada a Hechos 22:9.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa “voz” para φωνή en el texto principal, con nota sobre la alternativa “sonido”, en coherencia con la revisión final del POB en inglés.
  - “Mudos” traduce ἐνεοί con fuerza léxica, sin convertirlo en un mero “callados” más débil.
