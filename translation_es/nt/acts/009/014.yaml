review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien ὧδε = «aquí», ἐξουσίαν = «autoridad», παρὰ τῶν ἀρχιερέων = procedencia desde los principales sacerdotes, y conserva adecuadamente «invocan tu nombre» para ἐπικαλουμένους τὸ ὄνομά σου. Sin embargo, δῆσαι significa literalmente «atar» o «poner ataduras», y el English POB eligió explícitamente «to bind» en el texto principal, dejando «arrest» solo como alternativa explicativa. El español principal con «prender» desplaza el sentido desde la imagen léxica del original hacia una interpretación práctica.
  spanish_quality_summary: El español es claro y natural, pero «prender» introduce una lectura más interpretativa de la necesaria. «Atar» suena plenamente comprensible en contexto y preserva mejor la imaginería del original sin perder legibilidad eclesial. El resto del verso está bien formulado y fluye con naturalidad.
  glossary_alignment: No hay conflicto con las directrices mayores del glosario. «Invocan tu nombre» está bien alineado con la decisión teológica documentada. La única desalineación relevante es con la decisión léxica auditada para δῆσαι, que favorece una traducción más literal en el texto principal.
  issues:
  - severity: medium
    issue: δῆσαι fue vertido como «prender» en el texto principal
    rationale: El original griego significa literalmente «atar», y el English POB decidió mantener «to bind» en el cuerpo del texto precisamente para preservar la imagen fuente. «Prender» comunica el efecto práctico de arrestar, pero traslada al texto principal una interpretación que el audit trail reservó para nota o alternativa.
  revised_spanish_text: Y aquí tiene autoridad de parte de los principales sacerdotes para atar[a] a todos los que invocan tu nombre.
