  rationale: Se reemplaza «prender» por «atar» para alinear el español con el sentido léxico principal de δῆσαι y con la decisión documentada del English POB de conservar la imagen de «bind» en el texto principal. Se mantiene una nota con «prender» como alternativa contextual, ya que en español esa lectura práctica sigue siendo válida y útil.
