translation:
  language: es
  text: Y aquí tiene autoridad de parte de los principales sacerdotes para atar[a] a todos los que invocan tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prender»; el verbo griego significa literalmente «atar», aunque en este contexto también puede referirse a arrestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: La idea es de lugar inmediato; en español, «aquí» es la forma natural y directa. Mantiene el contraste espacial con el contexto de Damasco sin añadir explicación.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - facultad
  lexicon: BDAG
  rationale: «Autoridad» refleja mejor la autorización legal o delegada que Saulo recibe, no mera fuerza. Encaja con la fuente implícita en los principales sacerdotes.
- source_word: παρὰ τῶν ἀρχιερέων
  english_pob_choice: from the chief priests
  chosen_spanish: de parte de los principales sacerdotes
  alternatives_spanish:
  - de los principales sacerdotes
  - de parte de los sumos sacerdotes
  lexicon: BDAG
  rationale: «παρά + genitivo» indica procedencia o fuente; «de parte de» preserva esa relación de origen. «Principales sacerdotes» conserva el uso común del NT para el liderazgo sacerdotal de Jerusalén sin forzar una formulación menos idiomática.
- source_word: δῆσαι
  english_pob_choice: to bind
  chosen_spanish: prender
  alternatives_spanish:
  - atar
  - ligar
  - arrestar
  lexicon: BDAG
  rationale: Aunque el sentido literal es «atar» o «ligar», en español «prender» comunica de manera más natural la acción de arrestar bajo autoridad. Se mantiene la fuerza coercitiva del verbo sin sonar artificial; «atar» queda como alternativa más literal.
- source_word: πάντας τοὺς ἐπικαλουμένους
  english_pob_choice: all who call on
  chosen_spanish: a todos los que invocan
  alternatives_spanish:
  - a todos los que llaman sobre
  - a todos los que llaman invocando
  lexicon: BDAG
  rationale: La expresión participial sustantivada se vierte de forma natural como «a todos los que invocan». «Invocar» conserva el valor bíblico de ἐπικαλέομαι, especialmente cuando el objeto es el nombre de Jesús.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - su nombre
  lexicon: BDAG
  rationale: Se conserva el valor literal de «nombre» como designación personal y autoridad invocada. «Tu» mantiene la dirección directa de la oración a Jesús en el texto.
theological_decisions:
- issue: Sentido teológico de ἐπικαλουμένους τὸ ὄνομά σου
  english_pob_reading: Retain the idiom 'call on your name' without reducing it to merely 'identify with you' or expanding it to an explicit doctrinal paraphrase about worship.
  chosen_spanish_reading: Conservar «los que invocan tu nombre» sin reducirlo a «los que te siguen» ni ampliarlo a una paráfrasis doctrinal.
  alternative_spanish_readings:
  - los que oran a ti
  - los que apelan a tu autoridad
  - los que invocan tu nombre en oración
  rationale: La expresión bíblica implica invocación, dependencia y lealtad dirigidas a Jesús; el español «invocan tu nombre» conserva esa densidad sin explicarla de más. Evita debilitar el valor devocional del giro o reemplazarlo por una explicación interpretativa.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión más reciente y no requiere cambios sustanciales; la versión española sigue el mismo perfil semántico y mantiene la tensión idiomática de ἐπικαλεῖσθαι τὸ ὄνομα.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto; este versículo no contiene el Tetragrámaton.
  - Se evita «SEÑOR» como sustituto editorial, y aquí el referente directo es Jesús, por lo que se conserva la segunda persona «tu».
  - Se mantiene «principales sacerdotes» para reflejar el grupo dirigente sacerdotal del contexto neotestamentario.
  - «Invocan tu nombre» conserva el idiomático bíblico sin añadir «orar» ni «adorar», que serían más interpretativos.
