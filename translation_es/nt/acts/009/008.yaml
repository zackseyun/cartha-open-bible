- from: Pero Saulo se levantó de la tierra[a], y aunque sus ojos estaban abiertos, no veía nada. Entonces, llevándolo de la mano, lo introdujeron en Damasco.
  to: Pero Saulo se levantó del suelo, y aunque sus ojos estaban abiertos[a], no veía nada. Entonces lo llevaron de la mano a Damasco.
  rationale: Se corrige 'de la tierra' a 'del suelo' para reflejar mejor el referente inmediato de γῆ en este episodio. Se mueve la nota [a] a la cláusula de los ojos abiertos, que es el segmento griego que la nota explica. También se suaviza la redacción a 'lo llevaron de la mano a Damasco' para un español más natural y fiel al sentido global del verso.
