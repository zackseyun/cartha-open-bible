    rationale: En este contexto narrativo γῆ apunta al suelo del que Saulo se levanta tras caer. 'De la tierra' en español puede sonar más amplio o ambiguo; 'del suelo' o 'del suelo donde cayó' refleja mejor el referente inmediato y coincide mejor con el audit trail inglés 'from the ground'.
