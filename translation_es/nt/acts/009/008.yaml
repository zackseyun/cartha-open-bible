translation:
  language: es
  text: Pero Saulo se levantó del suelo, y aunque sus ojos estaban abiertos[a], no veía nada. Entonces lo llevaron de la mano a Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “con sus ojos habiendo sido abiertos”. La construcción griega subraya la ironía de que sus ojos estaban abiertos y, sin embargo, no podía ver.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγέρθη
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: 'El aoristo pasivo funciona aquí con sentido intransitivo en la narración: Saulo se incorporó desde el suelo. ''Se levantó'' comunica de manera natural y fiel la acción sin introducir una pasiva extraña en español.'
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - de la tierra
  lexicon: BDAG
  rationale: 'En este contexto γῆ se refiere al lugar físico donde Saulo había caído. ''Tierra'' mantiene la amplitud semántica posible del término griego y sigue siendo natural en español; el sentido inmediato es ''del suelo''. '
- source_word: ἀνεῳγμένων ... τῶν ὀφθαλμῶν αὐτοῦ
  english_pob_choice: though his eyes were open
  chosen_spanish: aunque sus ojos estaban abiertos
  alternatives_spanish:
  - con sus ojos abiertos
  - cuando sus ojos habían sido abiertos
  lexicon: BDAG
  rationale: 'La construcción de genitivo absoluto expresa circunstancia concomitante con matiz concesivo en el contexto. ''Aunque sus ojos estaban abiertos'' preserva el contraste irónico: ojos abiertos, pero incapacidad de ver.'
- source_word: οὐδὲν ἔβλεπεν
  english_pob_choice: he saw nothing
  chosen_spanish: no veía nada
  alternatives_spanish:
  - no vio nada
  - no podía ver nada
  lexicon: BDAG
  rationale: 'El imperfecto describe la condición en curso: mientras estaba así, no veía. ''No veía nada'' mantiene el valor aspectual mejor que un pasado puntual en español.'
- source_word: χειραγωγοῦντες
  english_pob_choice: led him by the hand
  chosen_spanish: llevándolo de la mano
  alternatives_spanish:
  - guiándolo de la mano
  - tomándolo de la mano
  lexicon: BDAG
  rationale: El participio expresa la manera concreta de conducción. 'Llevándolo de la mano' conserva la imagen corporal y fluye con naturalidad en español; 'guiándolo de la mano' también sería posible, pero suena algo más interpretativo.
- source_word: εἰσήγαγον εἰς Δαμασκόν
  english_pob_choice: brought him into Damascus
  chosen_spanish: lo introdujeron en Damasco
  alternatives_spanish:
  - lo llevaron a Damasco
  - lo condujeron a Damasco
  lexicon: BDAG
  rationale: εἰσάγω implica hacer entrar o introducir. Dado que el versículo ya dijo que lo llevaban de la mano, 'lo introdujeron en Damasco' evita redundancia y preserva el movimiento hacia la ciudad.
- source_word: Σαῦλος
  english_pob_choice: Saul
  chosen_spanish: Saulo
  alternatives_spanish:
  - Saúl
  lexicon: BDAG
  rationale: Se conserva la transliteración normalizada usada en español bíblico para el nombre griego del personaje.
- source_word: Δαμασκόν
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: BDAG
  rationale: Nombre propio geográfico tradicionalmente establecido en español como 'Damasco'.
theological_decisions:
- issue: Contraste entre ojos abiertos e incapacidad de ver
  english_pob_reading: though his eyes were open, he saw nothing
  chosen_spanish_reading: aunque sus ojos estaban abiertos, no veía nada
  alternative_spanish_readings:
  - con sus ojos abiertos, no veía nada
  - sus ojos fueron abiertos, pero no veía nada
  rationale: El punto narrativo es la ironía de que la apertura física de los ojos no produjo visión. La forma elegida conserva esa tensión sin suavizarla ni explicarla en exceso.
  doctrine_reference: Narrative irony; no doctrinal claim beyond the text
- issue: Valor aspectual del imperfecto en 'ἔβλεπεν'
  english_pob_reading: he saw nothing
  chosen_spanish_reading: no veía nada
  alternative_spanish_readings:
  - no vio nada
  - no podía ver nada
  rationale: El imperfecto griego sugiere una condición sostenida. En español, el imperfecto 'no veía' reproduce mejor ese estado continuo mientras era conducido.
  doctrine_reference: Aspecto verbal narrativo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje griego SBLGNT y se alinea con el audit trail inglés: respeta la progresión narrativa, la circunstancia concesiva del genitivo absoluto, el matiz aspectual del imperfecto y la imagen concreta de ser conducido de la mano. No se requieren revisiones adicionales con respecto al estado auditado más reciente.'
  spanish_consistency_notes:
  - Se usa 'Saulo' para el nombre propio del personaje, en continuidad con el griego Σαῦλος y el estándar bíblico en español.
  - Se mantiene 'Damasco' como topónimo establecido en español.
  - '''Tierra'' se usa en el texto principal por fidelidad al griego γῆ; la nota aclara la alternativa más idiomática ''suelo''.'
  - No se introduce terminología eclesiástica ajena al versículo; el tono es sobrio y narrativo.
