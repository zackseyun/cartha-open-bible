translation:
  language: es
  text: Pero Bernabé, tomándolo, lo llevó ante los apóstoles y les contó cómo en el camino había visto al Señor, y que le había hablado, y cómo en Damasco había hablado con valentía en el nombre de Jesús.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιλαβόμενος
  english_pob_choice: took hold of
  chosen_spanish: tomándolo de la mano
  alternatives_spanish:
  - tomándolo
  - agarrándolo
  - tomándolo por la mano
  lexicon: BDAG
  rationale: El participio expresa una acción concreta y favorable de Bernabé. En español, «tomándolo de la mano» transmite la idea de apoyo y conducción sin sugerir violencia; conserva la fuerza corporal del griego mejor que un simple «lo tomó».
- source_word: ἤγαγεν πρὸς τοὺς ἀποστόλους
  english_pob_choice: brought him to the apostles
  chosen_spanish: lo llevó ante los apóstoles
  alternatives_spanish:
  - lo condujo ante los apóstoles
  - lo llevó a los apóstoles
  lexicon: BDAG
  rationale: ἄγω aquí es llevar o conducir a una persona hacia otra instancia. «Ante los apóstoles» comunica con naturalidad que Bernabé lo presentó delante de ellos.
- source_word: διηγήσατο
  english_pob_choice: told them
  chosen_spanish: les contó
  alternatives_spanish:
  - les relató
  - les refirió
  - les narró
  lexicon: BDAG
  rationale: El verbo implica relatar con cierto detalle. «Les contó» es natural en español y deja que los elementos siguientes desarrollen el contenido del relato.
- source_word: πῶς ἐν τῇ ὁδῷ
  english_pob_choice: how on the road
  chosen_spanish: cómo en el camino
  alternatives_spanish:
  - cómo en la ruta
  - cómo en el camino de viaje
  lexicon: BDAG
  rationale: Aquí ὁδός se refiere al trayecto, no al nombre técnico «el Camino». «En el camino» evita esa ambigüedad y sigue el sentido contextual.
- source_word: εἶδεν τὸν κύριον
  english_pob_choice: he had seen the Lord
  chosen_spanish: había visto al Señor
  alternatives_spanish:
  - vio al Señor
  lexicon: BDAG
  rationale: Se mantiene «Señor» para κύριος por la referencia al Cristo resucitado. El pluscuamperfecto español refleja bien la secuencia del relato de Bernabé, aunque el aoristo griego solo expresa pasado.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: En este contexto, κύριος designa a Jesús resucitado y tiene carga cristológica. «Señor» conserva el título y el peso doctrinal sin rebajarlo a un simple tratamiento cortesano.
- source_word: ὅτι ἐλάλησεν αὐτῷ
  english_pob_choice: that he had spoken to him
  chosen_spanish: y que le había hablado
  alternatives_spanish:
  - y que le habló
  - y que había hablado con él
  lexicon: BDAG
  rationale: El griego introduce el contenido del testimonio de Bernabé. «Le había hablado» expresa con claridad que el sujeto implícito sigue siendo el Señor del contexto anterior.
- source_word: ἐπαρρησιάσατο
  english_pob_choice: he had spoken boldly
  chosen_spanish: había hablado con valentía
  alternatives_spanish:
  - había hablado abiertamente
  - había hablado con denuedo
  lexicon: BDAG
  rationale: παρρησιάζομαι denota hablar libre y valerosamente. «Con valentía» es una opción natural en español y mantiene la idea de franqueza y osadía sin añadir el matiz específico de «predicar».
- source_word: ἐν τῷ ὀνόματι τοῦ Ἰησοῦ
  english_pob_choice: in the name of Jesus
  chosen_spanish: en el nombre de Jesús
  alternatives_spanish:
  - bajo el nombre de Jesús
  - en autoridad de Jesús
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico estable que alude a actuar y hablar bajo la autoridad y representación de Jesús. «En el nombre de Jesús» conserva esa formulación reconocible y precisa.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Se usa el nombre propio normalizado en español. No se añade «Cristo» porque el griego aquí da el nombre, no el título.
theological_decisions:
- issue: Identidad de «el Señor» en la experiencia del camino
  english_pob_reading: '''the Lord'' refers to Jesus'
  chosen_spanish_reading: «el Señor» se entiende como Jesús resucitado
  alternative_spanish_readings:
  - «el Señor» como referencia divina más general
  rationale: El contexto inmediato de Hechos 9 presenta la aparición del Cristo resucitado a Saulo, y el cierre con «en el nombre de Jesús» refuerza esa identificación. Traducir «Señor» preserva el título cristológico sin ocultarlo.
  doctrine_reference: 'Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como unchanged y el control cruzado indicó high_agreement; por eso no se introducen variantes textuales ni notas de revisión, solo una redacción española fiel al audit trail inglés y al griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el uso cristológico documentado.
  - Se evita «el Camino» para ὁδός porque aquí el contexto es el trayecto físico a Damasco.
  - Se usa «había visto / había hablado / había hablado con valentía» para reflejar la secuencia narrativa en español sin alterar el valor aspectual del griego.
