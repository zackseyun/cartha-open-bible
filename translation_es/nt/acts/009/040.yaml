translation:
  language: es
  text: 'Pero Pedro hizo salir a todos, se arrodilló y oró, y volviéndose hacia el cuerpo dijo: «Tabita, levántate[a]». Entonces ella abrió los ojos y, al ver a Pedro, se incorporó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levántate» puede entenderse como «incorpórate» o «ponte en pie». El imperativo griego también podría traducirse «levántate» o «ponte de pie»; se eligió esta forma para conservar el tono solemne de la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλὼν ... ἔξω πάντας
  english_pob_choice: put them all outside
  chosen_spanish: los puso a todos fuera
  alternatives_spanish:
  - hizo salir a todos
  - echó a todos fuera
  lexicon: BDAG
  rationale: La construcción expresa la acción concreta de sacar a todos del lugar. «Los puso a todos fuera» conserva esa concreción sin intensificar innecesariamente la fuerza verbal como podría sugerir «echó».
- source_word: θεὶς τὰ γόνατα
  english_pob_choice: knelt down
  chosen_spanish: se arrodilló
  alternatives_spanish:
  - dobló las rodillas
  - cayó de rodillas
  lexicon: BDAG
  rationale: Es un modismo de postura para oración. «Se arrodilló» es la equivalencia natural en español y conserva el valor idiomático sin sonar forzado.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - hizo oración
  - oró y oró
  lexicon: BDAG
  rationale: Es el verbo normal para la acción de orar. «Oró» mantiene la sencillez del original y el registro reverente del relato.
- source_word: ἐπιστρέψας πρὸς τὸ σῶμα
  english_pob_choice: turning toward the body
  chosen_spanish: volviéndose hacia el cuerpo
  alternatives_spanish:
  - habiéndose vuelto hacia el cuerpo
  - girándose hacia el cuerpo
  lexicon: BDAG
  rationale: «Volviéndose hacia» reproduce la orientación física del participio y πρός. Se conserva «cuerpo» porque el griego usa σῶμα; «cadáver» introduciría una carga interpretativa no exigida por el término.
- source_word: Ταβιθά
  english_pob_choice: Tabitha
  chosen_spanish: Tabita
  alternatives_spanish:
  - Tabita
  lexicon: transliteration
  rationale: Nombre propio transliterado según el uso habitual en español bíblico; se adapta la forma gráfica al español sin cambiar la identidad del nombre.
- source_word: ἀνάστηθι
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - ressucita
  - alza tu cuerpo
  lexicon: BDAG
  rationale: El imperativo puede verterse como «levántate» o «arrepiéntete/ponte de pie» según contexto; aquí la escena de restauración de vida permite «levántate» como equivalente natural y solemne en español, sin cargarlo con una formulación doctrinal extra.
- source_word: ἤνοιξεν τοὺς ὀφθαλμοὺς αὐτῆς
  english_pob_choice: opened her eyes
  chosen_spanish: abrió los ojos
  alternatives_spanish:
  - abrió sus ojos
  lexicon: BDAG
  rationale: Traducción directa y natural del giro griego. En español el posesivo es innecesario y menos idiomático aquí.
- source_word: ἰδοῦσα τὸν Πέτρον
  english_pob_choice: when she saw Peter
  chosen_spanish: al ver a Pedro
  alternatives_spanish:
  - cuando vio a Pedro
  - viendo a Pedro
  lexicon: BDAG
  rationale: El participio se vuelve naturalmente una cláusula temporal en español. «Al ver a Pedro» conserva la secuencia narrativa y la fluidez.
- source_word: ἀνεκάθισεν
  english_pob_choice: she sat up
  chosen_spanish: se incorporó
  alternatives_spanish:
  - se sentó
  - se sentó erguida
  lexicon: BDAG
  rationale: El verbo describe pasar de estar reclinada a adoptar postura erguida. «Se incorporó» expresa mejor ese movimiento que «se sentó» en español, que podría sugerir simplemente tomar asiento.
- source_word: δὲ
  english_pob_choice: But / Then
  chosen_spanish: Pero / Entonces
  alternatives_spanish:
  - Y / Luego
  lexicon: BDAG
  rationale: 'Se preserva la progresión narrativa con dos marcadores distintos, como en el audit trail inglés: «Pero» abre el episodio y «Entonces» avanza la acción.'
theological_decisions:
- issue: Lenguaje del mandato de restauración a la vida
  english_pob_reading: arise
  chosen_spanish_reading: levántate
  alternative_spanish_readings:
  - levántate y vive
  - resucita
  rationale: El mandato griego admite varias soluciones. «Levántate» mantiene la sobriedad y la resonancia de restauración sin añadir explícitamente el verbo «resucitar», que interpretaría más de lo que el verso dice de forma inmediata.
  doctrine_reference: Actos 9:40; filosofía de traducción POB §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés. Se mantuvo la estructura narrativa en secuencia: sacar a todos, arrodillarse y orar, volverse hacia el cuerpo, mandar a Tabita levantarse, y describir su reacción con abrió los ojos y se incorporó. No se introdujeron ampliaciones devocionales ni equivalencias más tradicionales que oculten matices léxicos del original.'
  spanish_consistency_notes:
  - Se usa «Pedro» y «Tabita» de forma consistente con la transliteración española habitual.
  - «Cuerpo» se mantiene para σῶμα, respetando la decisión auditada de no sustituirlo por «cadáver».
  - «Levantarse» conserva el tono solemne sin recurrir a una traducción demasiado arcaizante.
  - La puntuación sigue el flujo narrativo del griego y la práctica editorial española con comillas angulares.
