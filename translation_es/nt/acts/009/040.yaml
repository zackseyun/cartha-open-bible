    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota al pie para alinearla con ἀνάστηθι, que es donde el audit trail inglés documenta la alternativa léxica. También se sustituyó «los puso a todos fuera» por «hizo salir a todos» para un español más natural sin pérdida semántica. El resto del versículo puede mantenerse sustancialmente igual.
