review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: Pedro saca a todos, se arrodilla, ora, se vuelve hacia el cuerpo, habla a Tabita, ella abre los ojos, ve a Pedro y se incorpora. También conserva correctamente «cuerpo» para σῶμα y evita sobretraducir ἀνάστηθι como «resucita». Sin embargo, la nota al pie está anclada en la frase equivocada: la nota inglesa documenta una alternativa léxica para ἀνάστηθι («arise / get up»), no para ἐκβαλών…ἔξω πάντας. Además, «los puso a todos fuera» suena menos natural en español que «hizo salir a todos».'
  spanish_quality_summary: 'El texto es claro, digno y ampliamente legible. «Se arrodilló», «volviéndose hacia el cuerpo» y «se incorporó» son buenas decisiones. La mejora principal es idiomática: «hizo salir a todos» suena más natural que «los puso a todos fuera». También conviene mover la nota a «levántate[a]» para reflejar la decisión léxica realmente documentada.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. Los nombres propios, «cuerpo», y el tono narrativo están bien manejados. «Tabita» es una adaptación española aceptable de Ταβιθά. «Levántate» es una buena equivalencia contextual de ἀνάστηθι, con nota de alternativa para preservar la racionalidad del POB inglés.
  issues:
  - severity: medium
    issue: La nota al pie está asociada a la unidad léxica incorrecta.
    rationale: El audit trail inglés pone la nota en «arise» como alternativa de ἀνάστηθι («get up»). El borrador español la coloca en «fuera», creando desalineación con la evidencia y la rationale documentada.
  - severity: low
    issue: «Los puso a todos fuera» es comprensible pero poco idiomático en español.
    rationale: Aunque reproduce el sentido de ἐκβαλών…ἔξω πάντας, en español natural y bíblicamente legible «hizo salir a todos» o «sacó a todos» funciona mejor sin perder concreción.
  - severity: low
    issue: Hay errores menores en las alternativas y rationale léxicos de ἀνάστηθι.
    rationale: «ressucita» está mal escrito, y «arrepiéntete» aparece indebidamente en la rationale como posibilidad contextual no pertinente aquí. Esto no afecta el texto principal, pero confirma la necesidad de ajustar la documentación y la nota.
  revised_spanish_text: 'Pero Pedro hizo salir a todos, se arrodilló y oró, y volviéndose hacia el cuerpo dijo: «Tabita, levántate[a]». Entonces ella abrió los ojos y, al ver a Pedro, se incorporó.'
