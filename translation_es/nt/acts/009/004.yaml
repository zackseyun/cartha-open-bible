translation:
  language: es
  text: 'Y al caer al suelo, oyó una voz que le decía: «Saúl, Saúl, ¿por qué me persigues?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεσὼν
  english_pob_choice: falling
  chosen_spanish: al caer
  alternatives_spanish:
  - cayendo
  - cuando cayó
  lexicon: BDAG
  rationale: El participio aoristo se conserva como acción circunstancial; en español, «al caer» expresa con naturalidad la acción concomitante sin volverla demasiado narrativa ni añadir una temporalidad más fuerte de la que exige el griego.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: to the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - al suelo
  - sobre la tierra
  lexicon: BDAG
  rationale: «En tierra» comunica el movimiento hacia el suelo con estilo sobrio y bíblico, sin sonar mecánico. «Suelo» sería más moderno pero menos solemne; «sobre la tierra» puede sonar más amplio o cosmológico de lo que pide el contexto inmediato.
- source_word: ἤκουσεν φωνὴν
  english_pob_choice: he heard a voice
  chosen_spanish: oyó una voz
  alternatives_spanish:
  - escuchó una voz
  - oyó un sonido
  lexicon: BDAG
  rationale: «Voz» es la mejor equivalencia para φωνή aquí, porque el contexto inmediato incluye habla directa. «Oyó» mantiene la sencillez narrativa y evita la sobreespecificación de «escuchó».
- source_word: λέγουσαν αὐτῷ
  english_pob_choice: saying to him
  chosen_spanish: que le decía
  alternatives_spanish:
  - hablándole
  - diciéndole
  lexicon: BDAG
  rationale: En español, la construcción relativa «que le decía» reproduce con naturalidad la función del participio presente y prepara la cita directa. «Hablándole» sería correcto, pero menos preciso respecto del contenido verbal explícito.
- source_word: Σαοὺλ Σαούλ
  english_pob_choice: Saul, Saul
  chosen_spanish: Saúl, Saúl
  lexicon: BDAG
  rationale: Se translitera el nombre propio conforme al español bíblico y se conserva la repetición enfática. El doble vocativo es retóricamente significativo y no debe simplificarse.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿con qué fin
  - ¿para qué
  lexicon: BDAG
  rationale: En este interrogativo idiomático, «¿por qué?» es la equivalencia natural y fiel. Otras opciones introducirían una matiz más final o teleológico que el griego no exige.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: Se mantiene el pronombre de objeto directo sin expansión explicativa. La fuerza teológica de la identificación personal del hablante con el perseguido depende precisamente de esa forma breve.
- source_word: διώκεις
  english_pob_choice: are you persecuting
  chosen_spanish: persigues
  alternatives_spanish:
  - estás persiguiendo
  - persigues
  lexicon: BDAG
  rationale: «Persigues» refleja el valor básico de διώκω y preserva el presente en forma natural en español. Dado que el contexto de Hechos hace evidente la hostilidad, no hace falta explicitar «perseguir con hostilidad» en el texto principal.
theological_decisions:
- issue: Identificación del hablante con los perseguidos
  english_pob_reading: Retain the direct wording 'me' without explanatory expansion.
  chosen_spanish_reading: Conservar «me» sin glosa interpretativa en el texto principal.
  alternative_spanish_readings:
  - «a mis seguidores»
  - «a mi pueblo»
  - «a los que pertenecen a mí»
  rationale: El texto griego presenta una identificación directa y deliberadamente impactante entre el hablante y aquellos a quienes Saúl ataca. El español debe mantener esa tensión teológica sin resolverla por paráfrasis, dejando que el lector perciba el peso de la frase tal como está.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el griego SBLGNT sin introducir glosas. Se optó por una equivalencia óptima en español para conservar el participio inicial, el vocativo repetido y la identificación directa del hablante con la persecución.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Saúl» con ortografía estándar en español bíblico.
  - Se evita «SEÑOR» porque aquí no aparece κύριος en el texto base; no hay necesidad de sustitución teológica.
  - La voz narrativa conserva un tono bíblico claro y contemporáneo, sin caer en arcaísmos fuertes.
