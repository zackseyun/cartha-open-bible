translation:
  language: es
  text: Pero Saulo[a], todavía respirando amenazas y asesinato contra los discípulos del Señor, se acercó al sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matanza» para φόνος. El griego puede denotar matar o asesinato; se eligió «asesinato» por su fuerza moral, mientras que «matanza» refleja una traducción tradicional e idiomática en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca continuidad narrativa con un leve contraste. En español, «Pero» reproduce bien ese giro sin endurecer el texto.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - seguía
  lexicon: BDAG
  rationale: Expresa la continuidad de la actitud hostil de Saulo. «Todavía» suena natural y conserva la idea de persistencia.
- source_word: ἐμπνέων
  english_pob_choice: breathing
  chosen_spanish: respirando
  alternatives_spanish:
  - exhalando
  - estando lleno de
  lexicon: BDAG
  rationale: Conserva la metáfora vívida de la fuente griega; en español, «respirando» mantiene la imagen de algo que lo caracteriza de manera constante.
- source_word: ἀπειλῆς
  english_pob_choice: threats
  chosen_spanish: amenazas
  alternatives_spanish:
  - amenazando
  - amenaza
  lexicon: BDAG
  rationale: En combinación con ἐμπνέων, el sentido es el de una disposición cargada de amenazas. El plural «amenazas» refleja bien el valor idiomático del genitivo.
- source_word: φόνου
  english_pob_choice: murder
  chosen_spanish: muerte
  alternatives_spanish:
  - asesinato
  - matanza
  lexicon: BDAG
  rationale: φόνος puede significar muerte violenta, asesinato o matar. Aquí se preserva la fuerza moral del término sin imponer una sola lectura legal; «muerte» mantiene la gravedad y deja abierta la tensión lexical documentada entre «murder» y «slaughter».
- source_word: εἰς τοὺς μαθητὰς
  english_pob_choice: against the disciples
  chosen_spanish: contra los discípulos
  alternatives_spanish:
  - hacia los discípulos
  - para con los discípulos
  lexicon: BDAG
  rationale: El contexto hostil da a εἰς valor adversativo. «Contra» expresa con claridad la dirección de la amenaza y del propósito violento.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: Es el término natural y preciso en el contexto de Hechos para los adherentes de Jesús.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: Se mantiene la traducción habitual de κύριος como «Señor», coherente con el uso de Lucas-Hechos y con el audit trail inglés. El genitivo modifica naturalmente a «discípulos».
- source_word: προσελθὼν
  english_pob_choice: came to
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino a
  - fue donde
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal del siguiente versículo; en español, «se acercó» comunica el movimiento de manera fluida y fiel.
- source_word: ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: al sumo sacerdote
  alternatives_spanish:
  - al gran sacerdote
  - al jefe de los sacerdotes
  lexicon: BDAG
  rationale: Es la equivalencia estándar y clara de ἀρχιερεύς en singular; «sumo sacerdote» preserva el rango oficial sin explicitar de más.
theological_decisions:
- issue: Rendering κύριος in τοῦ κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: No hay ambigüedad textual que justifique apartarse del valor doctrinal y contextual de κύριος como «Señor». En Hechos, este título apunta normalmente a Jesús.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor'
- issue: Valor moral de φόνος
  english_pob_reading: murder
  chosen_spanish_reading: muerte
  alternative_spanish_readings:
  - asesinato
  - matanza
  rationale: La fuente admite una gama semántica entre matar, asesinato y matanza. Para no cerrar indebidamente la tensión lexical, se optó por «muerte», que mantiene la gravedad y deja espacio a la amplitud del término griego.
  doctrine_reference: BDAG / audit trail lexical note on φόνος
translation_notes:
  revision_awareness: Se revisó el trazado inglés y no hubo cambios aplicados en la última pasada; la versión española sigue ese nivel de acuerdo alto, conservando la metáfora de «respirando» y la nota lexical sobre φόνος sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, conforme al valor doctrinal y al uso en Lucas-Hechos.
  - Se mantiene «sumo sacerdote» como equivalente natural de ἀρχιερεύς.
  - Se preserva la imagen verbal de ἐμπνέων con una forma española viva y comprensible.
  - Se evita la traducción eclesiástica arcaizante donde no añade fidelidad semántica.
