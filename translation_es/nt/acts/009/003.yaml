revisions:
- from: Ahora bien, mientras viajaba[a], aconteció que se acercaba a Damasco, y de repente una luz del cielo lo rodeó.
  to: Ahora bien, mientras viajaba, aconteció que se acercaba a Damasco, y de repente una luz del cielo[a] resplandeció alrededor de él.
  rationale: Se revisa «lo rodeó» a «resplandeció alrededor de él» para reflejar el sentido de περιήστραψεν como fulgor envolvente, no mera circunvalación. Se conserva «del cielo» como español natural, pero se añade una nota léxica que preserva la alternativa documentada para οὐρανός y explica por qué aquí probablemente tiene sentido revelatorio. Se elimina la nota gramatical previa porque no corresponde a la nota preservada en el expediente inglés.
