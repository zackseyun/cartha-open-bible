translation:
  language: es
  text: Ahora bien, mientras viajaba, aconteció que se acercaba a Damasco, y de repente una luz del cielo[a] resplandeció alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del firmamento». El griego οὐρανός puede significar «cielo» o «firmamento/cielo visible», aunque en este contexto probablemente señala el origen divino de la luz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δὲ τῷ πορεύεσθαι
  english_pob_choice: Now as he was traveling
  chosen_spanish: Ahora bien, mientras viajaba
  alternatives_spanish:
  - Mientras iba de camino
  - Mientras viajaba
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa acción contemporánea; en español, «mientras viajaba» comunica bien la simultaneidad. «Ahora bien» refleja el valor narrativo de δέ sin sobrecargar el texto.
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: aconteció
  alternatives_spanish:
  - sucedió
  - pasó
  lexicon: BDAG
  rationale: Se conserva el marcador narrativo de Lucas con un verbo explícito que mantiene la irrupción del evento sin omitir la estructura del griego.
- source_word: αὐτὸν ἐγγίζειν
  english_pob_choice: he was drawing near
  chosen_spanish: se acercaba
  alternatives_spanish:
  - iba acercándose
  - se aproximaba
  lexicon: BDAG
  rationale: La construcción acusativo + infinitivo se vierte idiomáticamente en español. «Se acercaba» conserva mejor el aspecto progresivo que un perfecto puntual.
- source_word: τῇ Δαμασκῷ
  english_pob_choice: to Damascus
  chosen_spanish: a Damasco
  alternatives_spanish:
  - hacia Damasco
  - cerca de Damasco
  lexicon: BDAG
  rationale: El dativo con ἐγγίζω señala el lugar al que se aproxima; «a Damasco» es la equivalencia natural y fiel en español.
- source_word: ἐξαίφνης τε
  english_pob_choice: and suddenly
  chosen_spanish: y de repente
  alternatives_spanish:
  - de pronto
  - súbitamente
  lexicon: BDAG
  rationale: «De repente» transmite la abrupta irrupción del hecho; la conjunción inicial conserva el enlace narrativo suave de τε.
- source_word: περιήστραψεν
  english_pob_choice: flashed around him
  chosen_spanish: lo rodeó
  alternatives_spanish:
  - resplandeció alrededor de él
  - lo envolvió en resplandor
  lexicon: BDAG
  rationale: El verbo compuesto indica un resplandor que lo cercó por todos lados. En español, «lo rodeó» es breve y natural; el complemento «una luz» preserva que el sujeto es el resplandor mismo.
- source_word: φῶς
  english_pob_choice: a light
  chosen_spanish: una luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: El sustantivo anartro aparece naturalmente con artículo indefinido en español.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del cielo
  lexicon: BDAG
  rationale: Se mantiene el sentido referencial de οὐρανός en este contexto, donde puede significar «cielo» o «cielo/heaven». Se elige «cielo» para evitar una formulación demasiado interpretativa, sin negar el origen divino implícito.
theological_decisions:
- issue: Sentido de οὐρανός en un contexto revelatorio
  english_pob_reading: from heaven
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - del cielo
  - del firmamento
  rationale: Aunque la luz tiene origen divino en la narración, el griego permite «cielo» como referencia directa. En español, «del cielo» conserva la ambigüedad reverente sin imponer una glosa más explícita.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without paraphrase'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto español junto a una nota anclada. También se ajustó la elección de οὐρανός para ofrecer una solución española coherente y auditable.'
  spanish_consistency_notes:
  - Se mantiene un español natural y bíblico sin depender de calcos rígidos.
  - «Ahora bien» funciona como transición narrativa breve equivalente al δέ del griego.
  - Se evitó «SEÑOR» u otra terminología no presente en el versículo.
  - La nota se ancla correctamente a «viajaba[a]» y no se usan marcadores sin anclaje.
