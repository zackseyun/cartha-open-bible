translation:
  language: es
  text: Y hablaba y debatía con los helenistas[a], pero ellos intentaban matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los judíos de habla griega».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλει
  english_pob_choice: was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - hablaba continuamente
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o repetida; en español, «hablaba» conserva ese valor durativo de manera natural y digna.
- source_word: τε καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - tanto ... como
  lexicon: BDAG
  rationale: La coordinación simple con «y» transmite la unión de los dos verbos sin forzar una correlación más pesada en español.
- source_word: συνεζήτει
  english_pob_choice: debating
  chosen_spanish: debatía
  alternatives_spanish:
  - discutía
  - argüía
  - dialogaba
  lexicon: BDAG
  rationale: En este contexto el verbo implica controversia activa, no mera conversación; «debatía» conserva ese matiz confrontativo de forma comprensible en español.
- source_word: πρὸς τοὺς Ἑλληνιστάς
  english_pob_choice: with the Hellenists
  chosen_spanish: con los helenistas
  alternatives_spanish:
  - ante los helenistas
  - contra los helenistas
  - con los judíos de habla griega
  lexicon: BDAG
  rationale: Con verbos de discusión, πρός puede funcionar como interacción con personas; en español, «con» es la preposición más natural. Se conserva «helenistas» para mantener la designación técnica de Hechos.
- source_word: Ἑλληνιστάς
  english_pob_choice: Hellenists
  chosen_spanish: helenistas
  alternatives_spanish:
  - judíos de habla griega
  - griegos de habla griega
  lexicon: BDAG
  rationale: La transliteración adaptada como término técnico preserva la categoría social-lingüística del texto de Hechos sin interpretar de antemano que se trate de gentiles.
- source_word: ἐπεχείρουν
  english_pob_choice: were attempting
  chosen_spanish: intentaban
  alternatives_spanish:
  - trataban de
  - hacían el intento de
  - se proponían
  lexicon: BDAG
  rationale: El imperfecto destaca una acción en proceso; «intentaban» comunica bien el esfuerzo continuado y mantiene la tensión narrativa.
- source_word: ἀνελεῖν αὐτόν
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - darle muerte
  - hacerlo morir
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar; «matarlo» es claro, directo y fiel al sentido hostil del contexto.
theological_decisions:
- issue: Identidad de Ἑλληνιστάς
  english_pob_reading: Hellenists refers to the Greek-speaking Jewish group in Jerusalem rather than Gentiles in general.
  chosen_spanish_reading: «Helenistas» se entiende como el grupo judío de habla griega, no como gentiles en general.
  alternative_spanish_readings:
  - griegos
  - personas de habla griega
  - judíos helenistas
  rationale: El uso de este término en Hechos designa un grupo judío concreto y contrapuesto a otros judíos; mantener «helenistas» evita ampliar indebidamente la referencia.
  doctrine_reference: Hechos 6:1; uso lucano de Ἑλληνισταί
- issue: Tono del conflicto verbal en συνεζήτει
  english_pob_reading: '''debating'' signals active disputation rather than neutral conversation.'
  chosen_spanish_reading: «debatía» conserva la controversia activa y no suaviza el contraste con el intento de asesinato que sigue.
  alternative_spanish_readings:
  - discutía
  - razonaba con
  - dialogaba con
  rationale: El contexto inmediato exige una palabra que refleje oposición o controversia; «debatía» preserva esa tensión sin volverlo más fuerte que lo que permite el griego.
  doctrine_reference: Narrativa de Hechos 9:29
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran concordancia alta y no requieren cambios sustantivos; la redacción española busca conservar el aspecto imperfectivo, la fuerza polémica de συνεζήτει y la identidad técnica de Ἑλληνιστάς sin introducir explicaciones en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene el imperfecto narrativo con «hablaba», «debatía» e «intentaban».
  - Se conserva el término técnico «helenistas» con nota explicativa para lectores que no conozcan la designación.
  - El cierre «matarlo» refleja el valor de ἀναιρέω en este contexto hostil sin suavizarlo.
