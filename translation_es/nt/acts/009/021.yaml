    text: O “decían continuamente”. El imperfecto puede resaltar que seguían diciendo esto mientras estaban asombrados.
    reason: lexical_alternative
  - marker: b
    text: O “invocan este nombre”. La expresión “llaman a este nombre” preserva el modismo bíblico de apelar al nombre de Jesús o confesarlo.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el versículo para alinearlo mejor con el source y el audit trail del POB: se preserva en el texto principal el modismo de ἐπικαλέω + ὄνομα en vez de sustituirlo directamente por ''invocan''; se corrige la nota [a], que antes duplicaba el texto principal; y se cambia ''ante los sumos sacerdotes'' por ''a los sumos sacerdotes'' para seguir más de cerca la revisión inglesa final y evitar un matiz añadido. También se ancla una nota en ''decían'' para reflejar el imperfecto iterativo, ya que el inglés auditado lo marcó.'
