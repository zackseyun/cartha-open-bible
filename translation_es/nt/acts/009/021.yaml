  text: ἐξίσταντο δὲ πάντες οἱ ἀκούοντες καὶ ἔλεγον· Οὐχ οὗτός ἐστιν ὁ πορθήσας ⸀ἐν Ἰερουσαλὴμ τοὺς ἐπικαλουμένους τὸ ὄνομα τοῦτο, καὶ ὧδε εἰς τοῦτο ἐληλύθει ἵνα δεδεμένους αὐτοὺς ἀγάγῃ ἐπὶ τοὺς ἀρχιερεῖς;
base_translation:
  language: en
  yaml_path: translation/nt/acts/009/021.yaml
  text: And all who heard him were amazed and were saying[a], “Isn’t this the man who devastated in Jerusalem those who call on this name? And had he not come here for this purpose[b], that he might bring them bound to the chief priests?”
  footnotes:
  - marker: a
    text: Or “invoke this name.” The expression “call on this name” preserves the biblical idiom for appeal to or confession of Jesus’ name.
    reason: lexical_alternative
  - marker: b
    text: Literally “this name,” referring to Jesus.
    reason: alternative_reading
