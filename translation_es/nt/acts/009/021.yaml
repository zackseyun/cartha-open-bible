translation:
  language: es
  text: 'Y todos los que lo oían estaban asombrados y decían[a]: «¿No es este el hombre que devastó en Jerusalén a los que llaman a este nombre[b]? ¿Y no había venido aquí con este propósito, para llevarlos atados a los sumos sacerdotes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “decían continuamente”. El imperfecto puede resaltar que seguían diciendo esto mientras estaban asombrados.
    reason: lexical_alternative
  - marker: b
    text: O “invocan este nombre”. La expresión “llaman a este nombre” preserva el modismo bíblico de apelar al nombre de Jesús o confesarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  english_pob_choice: were amazed
  chosen_spanish: estaban asombrados
  alternatives_spanish:
  - quedaban atónitos
  - estaban maravillados
  lexicon: BDAG
  rationale: El imperfecto expresa un estado continuo de asombro; "estaban asombrados" conserva esa duración y suena natural en español sin debilitar la fuerza del verbo.
- source_word: πάντες οἱ ἀκούοντες
  english_pob_choice: all who heard him
  chosen_spanish: todos los que lo oían
  alternatives_spanish:
  - todos los oyentes
  - todos los que le escuchaban
  lexicon: BDAG
  rationale: El participio sustantivado señala a los que estaban oyendo a Saulo. "Lo oían" hace explícito el objeto implícito del contexto y mantiene la referencia narrativa.
- source_word: πορθήσας
  english_pob_choice: devastated
  chosen_spanish: devastó
  alternatives_spanish:
  - destruyó
  - asoló
  - causó estragos en
  lexicon: BDAG
  rationale: El verbo es más fuerte que "perseguir" y comunica ruina violenta. "Devastó" conserva esa dureza en español y sigue de cerca la decisión auditada en inglés.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - allí, en Jerusalén
  lexicon: BDAG
  rationale: La locución es locativa simple; no requiere expansión.
- source_word: τοὺς ἐπικαλουμένους τὸ ὄνομα τοῦτο
  english_pob_choice: those who call on this name
  chosen_spanish: a los que invocan este nombre
  alternatives_spanish:
  - a los que llaman sobre este nombre
  - a los que claman a este nombre
  lexicon: BDAG
  rationale: La expresión bíblica ἐπικαλέω con ὄνομα admite "invocar" en español para conservar la fuerza confesional y cultual del giro. En este contexto, "invocan" comunica mejor que una versión más genérica.
- source_word: τὸ ὄνομα τοῦτο
  english_pob_choice: this name
  chosen_spanish: este nombre
  alternatives_spanish:
  - el nombre de Jesús
  lexicon: BDAG
  rationale: El griego mantiene el demostrativo y deja implícito el referente. La traducción conserva esa reserva interpretativa en el texto principal.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  lexicon: BDAG
  rationale: Adverbio de lugar directo y sin matiz especial.
- source_word: εἰς τοῦτο
  english_pob_choice: for this purpose
  chosen_spanish: con este propósito
  alternatives_spanish:
  - para esto
  - por este motivo
  lexicon: BDAG
  rationale: La frase idiomática expresa finalidad. "Con este propósito" es natural y preserva el valor intencional del griego.
- source_word: ἐληλύθει
  english_pob_choice: he had come
  chosen_spanish: había venido
  alternatives_spanish:
  - venía
  - vino
  lexicon: BDAG
  rationale: El pluscuamperfecto refleja anterioridad respecto al punto de vista de los hablantes. "Había venido" mantiene esa relación temporal.
- source_word: δεδεμένους
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - encadenados
  - sujetos
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica estado de sujeción; "atados" es claro y no sobreespecifica el medio, aunque la alternativa "encadenados" sería posible si se quisiera enfatizar prisión.
- source_word: ἀγάγῃ
  english_pob_choice: bring
  chosen_spanish: llevar
  alternatives_spanish:
  - conducir
  - presentar
  lexicon: BDAG
  rationale: ἄγω puede significar llevar o conducir. En esta escena judicial, "llevar" es idiomático en español y no fuerza un matiz litúrgico o formal ajeno al contexto.
- source_word: ἐπὶ τοὺς ἀρχιερεῖς
  english_pob_choice: to the chief priests
  chosen_spanish: ante los sumos sacerdotes
  alternatives_spanish:
  - a los sumos sacerdotes
  - delante de los sumos sacerdotes
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí expresa movimiento hacia una autoridad para comparecer ante ella. "Ante" refleja mejor el matiz judicial que una simple dirección espacial; "sumos sacerdotes" es la forma española natural para el plural de ἀρχιερεῖς.
theological_decisions:
- issue: Cómo verter la expresión bíblica con ἐπικαλέομαι + ὄνομα
  english_pob_reading: Retain 'call on this name' with a footnote that it can also mean 'invoke this name.'
  chosen_spanish_reading: Usar "invocan este nombre" en el texto principal
  alternative_spanish_readings:
  - llaman a este nombre
  - invocan el nombre de Jesús
  rationale: En español, "invocar" conserva el valor confesional y cultual del griego mejor que una fórmula más débil. Se mantiene el demostrativo "este nombre" para respetar la reserva del texto y su fuerza narrativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo rendir la violencia de πορθήσας
  english_pob_reading: Use 'devastated' rather than a softer term like 'persecuted'
  chosen_spanish_reading: Usar "devastó"
  alternative_spanish_readings:
  - persiguió
  - hizo estragos en
  - destruyó
  rationale: La escena no describe solo persecución general, sino una acción de ruina violenta. "Devastó" preserva la intensidad del verbo y evita suavizar indebidamente la acusación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar la relación temporal de ἐληλύθει
  english_pob_reading: he had come
  chosen_spanish_reading: había venido
  alternative_spanish_readings:
  - vino
  - había llegado
  rationale: El pluscuamperfecto mantiene la anterioridad respecto al momento de habla de los presentes. Esto ayuda a reproducir la observación retórica de la pregunta sin convertirla en simple pasado.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que reordenó la frase para hacer más clara la relación de "en Jerusalén" con "devastó" y reforzó la segunda pregunta con un perfecto compuesto en español equivalente a la construcción griega. Por eso el español mantiene la fuerza de la primera pregunta y la secuencia temporal de la segunda sin introducir el nombre de Jesús en el cuerpo principal.
  spanish_consistency_notes:
  - Se conservó "este nombre" en el texto principal para mantener la reserva referencial del griego.
  - '"Sumos sacerdotes" se usa como equivalente natural y exacto de ἀρχιερεῖς en plural.'
  - '"Devastó" se eligió por consistencia con la decisión auditada en inglés de no suavizar πορθήσας.'
  - La puntuación interrogativa doble sigue la estructura retórica del griego y del texto inglés auditado.
