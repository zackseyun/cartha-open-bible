revisions:
- from: 'Y todos los que lo oían estaban asombrados y decían: «¿No es este el hombre que devastó en Jerusalén a los que invocan este nombre[a]? ¿Y no había venido aquí con este propósito[b], para llevarlos atados ante los sumos sacerdotes?»'
  to: 'Y todos los que lo oían estaban asombrados y decían[a]: «¿No es este el hombre que devastó en Jerusalén a los que llaman a este nombre[b]? ¿Y no había venido aquí con este propósito, para llevarlos atados a los sumos sacerdotes?»'
  rationale: 'Se ajusta el versículo para alinearlo mejor con el source y el audit trail del POB: se preserva en el texto principal el modismo de ἐπικαλέω + ὄνομα en vez de sustituirlo directamente por ''invocan''; se corrige la nota [a], que antes duplicaba el texto principal; y se cambia ''ante los sumos sacerdotes'' por ''a los sumos sacerdotes'' para seguir más de cerca la revisión inglesa final y evitar un matiz añadido. También se ancla una nota en ''decían'' para reflejar el imperfecto iterativo, ya que el inglés auditado lo marcó.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: asombro continuo, pregunta retórica, fuerza de πορθήσας con ''devastó'', pluscuamperfecto ''había venido'', y el demostrativo ''este nombre''. Sin embargo, se aparta del rastro auditado en dos puntos significativos: convierte el giro idiomático ἐπικαλουμένους τὸ ὄνομα τοῦτο en ''invocan este nombre'' en el texto principal, cuando el POB inglés decidió preservar el modismo ''call on this name''; y cambia ἐπὶ τοὺς ἀρχιερεῖς de ''to the chief priests'' a ''ante los sumos sacerdotes'', introduciendo un matiz interpretativo no retenido en la revisión inglesa final.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, la nota [a] es defectuosa porque ofrece como alternativa exactamente la misma formulación que aparece en el texto principal. Además, 'a los que llaman este nombre' no sería idiomático; conviene usar 'los que invocan este nombre' como alternativa si el texto principal preserva 'los que invocan/llaman al nombre'. 'A los sumos sacerdotes' suena más ceñido al texto que 'ante los sumos sacerdotes' en este caso.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto (Jesús, Dios, Mesías, Yahvé, etc.). La cuestión principal es de fidelidad al modismo bíblico con ἐπικαλέω + ὄνομα: en español conviene preservar en el texto algo como ''los que invocan el nombre'' o ''los que llaman al nombre'', pero dado el audit trail inglés, la mejor alineación es ''los que invocan este nombre'' en nota y en el texto principal una forma que conserve más explícitamente el modismo de apelación. También debe ajustarse ἀρχιερεῖς a ''sumos sacerdotes'' con la preposición simple ''a''.'
  issues:
  - severity: medium
    issue: El texto principal cambia el modismo auditado 'call on this name' por 'invocan este nombre'.
    rationale: Aunque 'invocar' es posible, la decisión inglesa documentada fue conservar el giro bíblico en el texto principal y relegar 'invoke' a nota alternativa. El español debe reflejar esa rationale en la medida de lo posible.
  - severity: medium
    issue: La nota [a] repite la misma formulación que el texto principal.
    rationale: Una nota de alternativa léxica no puede ofrecer como variante exacta la lectura ya usada en el texto. Debe distinguir entre texto principal y alternativa real.
  - severity: low
    issue: '''Ante los sumos sacerdotes'' introduce un matiz judicial no retenido en la revisión inglesa final.'
    rationale: El audit trail corrigió a 'to the chief priests'. En español, 'a los sumos sacerdotes' conserva mejor la dirección del movimiento sin añadir interpretación.
  revised_spanish_text: 'Y todos los que lo oían estaban asombrados y decían[a]: «¿No es este el hombre que devastó en Jerusalén a los que llaman a este nombre[b]? ¿Y no había venido aquí con este propósito, para llevarlos atados a los sumos sacerdotes?»'
  revised_footnotes:
