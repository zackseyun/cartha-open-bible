revisions:
- from: Porque yo le mostraré cuánto[a] debe padecer por causa de mi nombre.
  to: Porque yo le mostraré cuánto debe sufrir por mi nombre[a].
  rationale: Se corrige la ubicación de la nota para que explique la frase ὑπὲρ τοῦ ὀνόματός μου, en línea con la auditoría inglesa, y se simplifican las alternativas a las documentadas. También se cambia «padecer» por «sufrir» por mayor naturalidad y correspondencia con el valor estándar de πάσχω en este contexto. Se mantiene «Porque yo» y «debe» porque preservan bien la fuerza explicativa de γάρ y la necesidad de δεῖ.
