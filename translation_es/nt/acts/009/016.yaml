lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para mantener el énfasis del griego y la naturalidad del español con el futuro del verbo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o explicación de la afirmación precedente; en español, «Porque» transmite bien esa relación causal-explicativa sin endurecer el matiz.
- source_word: ὑποδείξω
  english_pob_choice: will show
  chosen_spanish: le mostraré
  alternatives_spanish:
  - le indicaré
  - le haré saber
  lexicon: BDAG
  rationale: «Mostrar» reproduce de modo claro y natural la idea de hacer ver o dar a conocer algo a alguien.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se expresa idiomáticamente en español con complemento indirecto.
- source_word: ὅσα
  english_pob_choice: how much
  chosen_spanish: cuánto
  alternatives_spanish:
  - cuánto sufrirá
  - todo lo que
  lexicon: BDAG
  rationale: En esta construcción, la forma expresa extensión o medida; «cuánto» conserva esa idea mejor que una simple enumeración de cosas.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - tiene que
  - es necesario que
  lexicon: BDAG
  rationale: «Debe» comunica la necesidad del griego sin convertirla en una afirmación más fuerte de lo que el texto exige.
- source_word: ὑπὲρ τοῦ ὀνόματός μου
  english_pob_choice: for my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - por amor a mi nombre
  - en favor de mi nombre
  lexicon: BDAG
  rationale: Se conserva «mi nombre» como expresión bíblica de persona, autoridad y confesión pública; «por causa de» explicita la relación causal implícita en ὑπέρ sin borrar el lenguaje nominal.
- source_word: παθεῖν
  english_pob_choice: suffer
  chosen_spanish: padecer
  alternatives_spanish:
  - sufrir
  lexicon: BDAG
  rationale: «Padecer» es una opción natural y digna en español para el verbo de sufrir, manteniendo el valor de experiencia de dolor o aflicción.
theological_decisions:
- issue: Fuerza de la necesidad expresada por δεῖ
  english_pob_reading: must
  chosen_spanish_reading: debe
  alternative_spanish_readings:
  - tiene que
  - es necesario que
  rationale: La versión española conserva la necesidad del verbo sin resolverla como determinismo, destino o decreto explícito; mantiene la tensión teológica presente en el griego.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de ὑπὲρ τοῦ ὀνόματός μου
  english_pob_reading: for my name
  chosen_spanish_reading: por causa de mi nombre
  alternative_spanish_readings:
  - por mi nombre
  - por el bien de mi nombre
  rationale: La traducción preserva el valor bíblico de «nombre» como referencia a la persona, autoridad y confesión de Jesús, evitando sustituirlo por una paráfrasis que lo reduzca.
  doctrine_reference: Uso bíblico de «nombre» como portador de identidad, autoridad y honor.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y el griego: mantiene el conector causal, el pronombre enfático, la idea de medida en ὅσα, la necesidad de δεῖ y la expresión nominal «mi nombre»; la única adaptación principal es elegir «padecer» para παθεῖν por naturalidad y registro en español.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «nombre» literalmente para conservar la carga bíblica de autoridad, persona y confesión.
  - La nota al pie recoge alternativas de ὑπέρ sin desplazar la lectura principal del texto.
