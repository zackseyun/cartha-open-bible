review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ἐγὼ γὰρ = «Porque yo», ὑποδείξω αὐτῷ = «le mostraré», ὅσα δεῖ αὐτὸν παθεῖν = «cuánto debe sufrir/padecer». Sin embargo, el anclaje de la nota en «cuánto[a]» no corresponde al punto léxico principal preservado en la auditoría inglesa, que es ὑπὲρ τοῦ ὀνόματός μου («for my name»). Además, la nota española mezcla alternativas para varias expresiones y cambia «for the sake of / on behalf of» a formulaciones menos controladas. Conviene anclar la nota en «mi nombre[a]» y ajustar sus alternativas al alcance semántico de ὑπέρ.'
  spanish_quality_summary: El español es claro y digno. No obstante, «padecer» aquí suena un poco más literario y menos natural que «sufrir» en español eclesial general, mientras que el inglés POB eligió precisamente la forma estándar «suffer». «Porque yo» es aceptable, aunque «Pues yo» sería también posible; no requiere cambio. La principal mejora necesaria es la colocación y contenido de la nota, y una leve naturalización con «sufrir».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «mi nombre» preserva correctamente la carga bíblica de ὄνομα. La decisión sobre δεῖ como «debe» está bien alineada. La revisión propuesta mantiene mejor la correspondencia con la nota léxica inglesa sobre ὑπέρ.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «cuánto[a]» en vez de en «mi nombre[a]».
    rationale: La auditoría inglesa conserva alternativas para ὑπέρ con «my name», no para ὅσα. El anclaje actual induce a pensar que la nota explica «cuánto» cuando en realidad explica la preposición y la frase nominal.
  - severity: medium
    issue: El contenido de la nota no reproduce con precisión las alternativas documentadas para ὑπέρ.
    rationale: La nota inglesa ofrece «for the sake of my name» y «on behalf of my name». La española introduce además una variante sobre «por mi nombre» y usa «por el bien de»; esto dispersa el foco léxico y se aleja del razonamiento auditado.
  - severity: low
    issue: «Padecer» es posible, pero «sufrir» es más natural y directo aquí.
    rationale: πάσχω en este contexto se expresa de manera más idiomática y ampliamente inteligible con «sufrir», sin pérdida de dignidad ni de fuerza semántica.
  revised_spanish_text: Porque yo le mostraré cuánto debe sufrir por mi nombre[a].
  revised_footnotes:
  - marker: a
    text: 'O: «por causa de mi nombre» o «en favor de mi nombre».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que explique la frase ὑπὲρ τοῦ ὀνόματός μου, en línea con la auditoría inglesa, y se simplifican las alternativas a las documentadas. También se cambia «padecer» por «sufrir» por mayor naturalidad y correspondencia con el valor estándar de πάσχω en este contexto. Se mantiene «Porque yo» y «debe» porque preservan bien la fuerza explicativa de γάρ y la necesidad de δεῖ.
