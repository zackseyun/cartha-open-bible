translation:
  language: es
  text: Y estuvo tres días sin ver[a], y no comió ni bebió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no viendo». La frase indica que Saulo no podía ver.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἡμέρας τρεῖς
  english_pob_choice: for three days he was
  chosen_spanish: estuvo tres días
  alternatives_spanish:
  - permaneció tres días
  - estuvo por tres días
  lexicon: BDAG
  rationale: El acusativo de extensión de tiempo expresa duración; en español, «estuvo tres días» comunica esa duración de forma natural sin añadir la idea de permanencia más de lo que el griego exige.
- source_word: μὴ βλέπων
  english_pob_choice: without sight
  chosen_spanish: sin ver
  alternatives_spanish:
  - sin vista
  - no viendo
  lexicon: BDAG
  rationale: El participio negativo βλέπων significa literalmente «no viendo». «Sin ver» conserva ese valor resultativo de manera idiomática en español. Se evita «ciego» en el texto principal porque la forma griega describe la condición, pero no usa un adjetivo explícito.
- source_word: οὐκ ἔφαγεν
  english_pob_choice: he neither ate
  chosen_spanish: no comió
  alternatives_spanish:
  - no cenó
  - no tomó alimento
  lexicon: BDAG
  rationale: Ἔφαγεν es el aoristo de «comer». En coordinación con la segunda negación, «no comió ni bebió» reproduce bien la sencillez del griego y el paralelismo de la frase.
- source_word: οὐδὲ ἔπιεν
  english_pob_choice: nor drank
  chosen_spanish: ni bebió
  alternatives_spanish:
  - y no bebió
  - ni tomó
  lexicon: BDAG
  rationale: οὐδὲ añade una negación coordinada; «ni bebió» mantiene el paralelismo con «no comió» y refleja con naturalidad la estructura negativa del original.
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el texto griego SBLGNT y con la auditoría inglesa: se mantiene la duración temporal, la negación participial de βλέπω y el paralelismo negativo de comer y beber, sin cambios doctrinales o textuales añadidos.'
  spanish_consistency_notes:
  - Se usa «sin ver» para conservar el matiz de estado/condición sin convertirlo en una interpretación más fuerte que el griego.
  - 'Se mantiene la coordinación negativa natural en español: «no comió ni bebió».'
  - No hay términos técnicos con política terminológica especial como Yahvé, Mesías o δοῦλος en este versículo.
