translation:
  language: es
  text: 'Pero el Señor le dijo: «Ve, porque este hombre es mi instrumento escogido para llevar mi nombre delante de los gentiles[a] y de reyes y de los hijos de Israel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones».
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Israel» es una expresión bíblica tradicional para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En este contexto narrativo se trata del Señor que habla con autoridad divina; «Señor» conserva el título y es natural en español bíblico.
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Prosigue
  lexicon: BDAG
  rationale: El imperativo queda claro y directo en español con «Ve»; mantiene la brevedad exhortativa del griego.
- source_word: σκεῦος
  english_pob_choice: instrument
  chosen_spanish: instrumento
  alternatives_spanish:
  - vasija
  - vaso
  lexicon: BDAG
  rationale: 'Aunque el término básico es «vasija/vaso», aquí la metáfora es funcional: alguien destinado para un propósito. «Instrumento» comunica bien ese sentido en español moderno sin perder la imagen de servicio.'
- source_word: ἐκλογῆς
  english_pob_choice: chosen
  chosen_spanish: escogido
  alternatives_spanish:
  - de elección
  - electo
  lexicon: BDAG
  rationale: El genitivo califica a σκεῦος. «Escogido» expresa la selección divina sin imponer una sistematización doctrinal ajena al contexto.
- source_word: ἐστίν μοι
  english_pob_choice: is ... of mine
  chosen_spanish: mío
  alternatives_spanish:
  - de mí
  - perteneciente a mí
  lexicon: BDAG
  rationale: «Mío» reproduce de forma natural la relación personal de posesión/pertinencia que expresa el dativo μοι.
- source_word: τοῦ βαστάσαι
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para cargar
  - para portar
  lexicon: BDAG
  rationale: La construcción final de propósito se expresa naturalmente con «para llevar»; conserva el sentido de portar/transportar el nombre.
- source_word: τὸ ὄνομά μου
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - el nombre mío
  lexicon: BDAG
  rationale: Se conserva la expresión literal, que en uso bíblico incluye representación y autoridad pública, sin explicitarlo en exceso.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» es una equivalencia natural y pública en español, adecuada al contexto de testimonio.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En Hechos, frente a «los hijos de Israel», el contraste favorece el sentido de pueblos no judíos; «gentiles» lo expresa mejor en este contexto. La alternativa más literal se mantiene como posibilidad contextual.
- source_word: βασιλέων
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  - soberanos
  lexicon: BDAG
  rationale: «Reyes» es el equivalente directo y suficientemente claro.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los hijos de Jacob
  lexicon: BDAG
  rationale: Se preserva la expresión bíblica tradicional y su matiz familiar/corporativo. No se neutraliza, porque el griego mantiene la formulación masculina familiar.
- source_word: τε ... καὶ ... τε
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - tanto ... como ... y
  lexicon: LSJ
  rationale: En español no hace falta reproducir cada partícula coordinante; la coordinación simple transmite con naturalidad la serie de destinatarios.
theological_decisions:
- issue: Posible sobrelectura doctrinal de ἐκλογῆς
  english_pob_reading: Render as 'chosen' in the phrase 'chosen instrument of mine'
  chosen_spanish_reading: «instrumento escogido mío»
  alternative_spanish_readings:
  - «vasija escogida mía»
  - «instrumento de elección mío»
  rationale: La frase afirma elección divina para una misión concreta, pero no obliga a introducir debates doctrinales posteriores sobre la elección. «Escogido» mantiene la tensión y el alcance misional del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla por medio de la traducción.
translation_notes:
  revision_awareness: 'Basado en el texto griego SBLGNT y en el rastro auditado en inglés. Se mantuvo la equivalencia óptima del POB: «chosen instrument» se vierte como «instrumento escogido» y se conserva el contraste misional entre gentiles y los hijos de Israel. Se corrigió el anclaje de las notas para que [a] y [b] aparezcan explícitamente en el texto español.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος conforme al uso bíblico estándar y a la lectura auditada del pasaje.
  - Se mantuvo «gentiles» como término contextual, con nota para la alternativa más literal «naciones».
  - Se preservó «los hijos de Israel» por fidelidad a la expresión bíblica y a la consistencia del registro del POB.
  - La construcción «instrumento escogido mío» sigue el énfasis relacional del griego sin introducir terminología eclesiástica ajena.
