translation:
  language: es
  text: Y se quedó en Jope muchos días con cierto Simón[a], un curtidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en casa de cierto Simón». La preposición griega puede implicar que se alojaba en la casa de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ... μεῖναι
  english_pob_choice: he stayed
  chosen_spanish: y permaneció
  alternatives_spanish:
  - y se quedó
  - y estuvo
  lexicon: BDAG
  rationale: La construcción griega ἐγένετο + infinitivo introduce el resultado o estado narrativo. En español, «permaneció» comunica de manera natural la idea de residir por un tiempo, sin volverla demasiado mecánica ni añadir interpretación.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: δέ aquí enlaza el relato con suavidad. «Y» conserva el avance narrativo simple que refleja la lectura inglesa.
- source_word: ἡμέρας ἱκανὰς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - por bastantes días
  - por un tiempo considerable
  lexicon: BDAG
  rationale: ἱκανός con una expresión temporal indica una duración amplia. «Por muchos días» es natural en español y mantiene la amplitud temporal sin exagerarla.
- source_word: ἐν Ἰόππῃ
  english_pob_choice: in Joppa
  chosen_spanish: en Jope
  alternatives_spanish:
  - en Joppé
  lexicon: BDAG
  rationale: El nombre propio se translitera según el uso español habitual como «Jope», conservando la referencia geográfica del texto.
- source_word: παρά τινι Σίμωνι
  english_pob_choice: with a certain Simon
  chosen_spanish: con cierto Simón
  alternatives_spanish:
  - en casa de cierto Simón
  - junto a cierto Simón
  lexicon: BDAG
  rationale: παρά con dativo puede señalar estancia con alguien o en su casa. El texto principal conserva la forma breve y no explicita la localización doméstica, que queda como posibilidad implícita.
- source_word: βυρσεῖ
  english_pob_choice: a tanner
  chosen_spanish: un curtidor
  alternatives_spanish:
  - un peletero
  - un trabajador del cuero
  lexicon: BDAG
  rationale: βυρσεύς designa específicamente a quien cura y trabaja pieles. «Curtidor» es el equivalente preciso en español y evita ampliar indebidamente el oficio.
translation_notes:
  revision_awareness: El texto griego y el testimonio inglés están en alto acuerdo; no se detectaron revisiones aplicadas que alteren el sentido. Se conservó la ambigüedad locativa de παρά con dativo en una nota, como en el inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Jope» para coherencia con la tradición bíblica en español y con la transliteración del original.
  - «Curtidor» conserva la precisión léxica del oficio y evita el término más general «trabajador del cuero».
  - La nota al pie preserva la alternativa locativa documentada sin convertirla en parte obligatoria del texto principal.
