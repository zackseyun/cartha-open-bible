translation:
  language: es
  text: Cuando habían pasado muchos días[b], los judíos[a] conspiraron[c] para matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los judíos»; en el contexto, esto se refiere a un grupo particular opuesto a Saulo, no a todas las personas judías sin excepción.'
    reason: cultural_note
  - marker: b
    text: O «se habían cumplido» / «fueron completados» para «habían pasado muchos días».
    reason: lexical_alternative
  - marker: c
    text: O «trazaron un plan juntos» para «conspiraron».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  - Pero cuando
  lexicon: BDAG
  rationale: Introduces a temporal transition. En español, 'Cuando' comunica con naturalidad el valor temporal de Ὡς δὲ sin sobrecargar δέ con una conjunción adversativa o enfática.
- source_word: ἐπληροῦντο
  english_pob_choice: had passed
  chosen_spanish: habían pasado
  alternatives_spanish:
  - se habían cumplido
  - se estaban cumpliendo
  - habían sido completados
  lexicon: BDAG
  rationale: Con un sujeto temporal como 'días', el imperfecto pasivo de πληρόω expresa el transcurso o cumplimiento del tiempo. 'Habían pasado' es idiomático en español y preserva ese sentido narrativo.
- source_word: ἡμέραι ἱκαναί
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - un número considerable de días
  - bastantes días
  lexicon: BDAG
  rationale: ἱκαναί aquí indica una cantidad considerable, no simplemente 'suficientes'. 'Muchos días' es la forma más natural y fiel en español.
- source_word: συνεβουλεύσαντο
  english_pob_choice: conspired
  chosen_spanish: conspiraron
  alternatives_spanish:
  - maquinaron juntos
  - trazaron un plan juntos
  - tomaron consejo juntos
  lexicon: BDAG
  rationale: El verbo en este contexto implica deliberación colectiva con intención hostil. 'Conspiraron' conserva tanto el elemento conjunto como la carga maliciosa que la escena requiere.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: Se mantiene el término del texto griego sin restringirlo indebidamente a 'líderes'. 'Los judíos' refleja el original, mientras que el contexto se aclara en nota para evitar una lectura universalizante injustificada.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - asesinar
  - quitarle la vida
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa quitar la vida. 'Matar' es directo, claro y plenamente natural en español; 'asesinar' añade una calificación moral no explicitada por el verbo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo que remite a Saulo en el contexto inmediato. 'Lo' mantiene la fluidez natural del español.
theological_decisions:
- issue: Alcance de 'los judíos' en un contexto hostil
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  - los líderes judíos
  rationale: La traducción conserva el referente explícito del griego sin estrecharlo a 'líderes' ni sustituirlo por una paráfrasis interpretativa. La nota ayuda a leerlo como un grupo concreto opuesto a Saulo, no como una afirmación sobre todos los judíos sin excepción.
  doctrine_reference: Primacía del texto original y precisión contextual; evitar generalizaciones indebidas
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el rastro auditado en inglés. No se introdujeron revisiones recientes adicionales; se mantiene la lectura de alto acuerdo y las decisiones léxicas ya validadas en el contexto inglés.
  spanish_consistency_notes:
  - Se usa 'judíos' conforme al término griego οἱ Ἰουδαῖοι, sin reemplazarlo por una explicación interpretativa dentro del texto principal.
  - '''Habían pasado muchos días'' reproduce en español el valor temporal idiomático de ἐπληροῦντο con sujeto temporal.'
  - '''Conspiraron'' mantiene el matiz de planificación hostil conjunto que el contexto exige.'
  - El pronombre enclítico 'matarlo' evita una repetición innecesaria del referente y suena natural en español bíblico moderno.
