translation:
  language: es
  text: 'Entonces Ananías fue y entró en la casa, y poniendo las manos sobre él dijo: «Hermano Saulo, el Señor Jesús, que se te apareció en el camino por el que venías[a], me ha enviado para que recobres la vista[b] y seas lleno del Espíritu Santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el camino por donde venías».
    reason: lexical_alternative
  - marker: b
    text: O «para que vuelvas a ver».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν δὲ
  english_pob_choice: So Ananias went
  chosen_spanish: Entonces Ananías fue
  alternatives_spanish:
  - Y Ananías fue
  - Ananías se fue
  lexicon: BDAG
  rationale: δὲ marca progresión narrativa; «Entonces» conserva el avance consecuencial sin sonar abrupto. ἀπῆλθεν se vierte con «fue» para un español natural y fiel al movimiento narrativo.
- source_word: εἰσῆλθεν εἰς τὴν οἰκίαν
  english_pob_choice: entered the house
  chosen_spanish: entró en la casa
  alternatives_spanish:
  - entró a la casa
  - fue a la casa
  lexicon: BDAG
  rationale: La combinación expresa entrada literal a una casa; «entró en la casa» es claro y preciso en español.
- source_word: ἐπιθεὶς ἐπ’ αὐτὸν τὰς χεῖρας
  english_pob_choice: laying his hands on him
  chosen_spanish: poniendo sobre él las manos
  alternatives_spanish:
  - imponiéndole las manos
  - al ponerle las manos
  lexicon: BDAG
  rationale: Se conserva el gesto físico y el orden bíblico del acto. Se evita «imponiendo» por ser más eclesial/tradicional y menos literal en este contexto.
- source_word: Σαοὺλ ἀδελφέ
  english_pob_choice: Brother Saul
  chosen_spanish: Saulo, hermano
  alternatives_spanish:
  - Hermano Saulo
  - Saulo, hermano mío
  lexicon: BDAG
  rationale: 'El vocativo ἀδελφέ puede sonar más natural en español después del nombre: «Saulo, hermano». Esto preserva la cercanía relacional sin forzar una fórmula menos idiomática.'
- source_word: ὁ κύριος ἀπέσταλκέν με
  english_pob_choice: the Lord ... has sent me
  chosen_spanish: el Señor me ha enviado
  alternatives_spanish:
  - el Señor me envió
  - el Señor me mandó
  lexicon: BDAG
  rationale: κύριος se traduce aquí como «el Señor», siguiendo el uso cristológico del texto. El perfecto ἀπέσταλκέν se refleja con «ha enviado», manteniendo la relevancia presente del envío.
- source_word: Ἰησοῦς ὁ ὀφθείς σοι
  english_pob_choice: Jesus, who appeared to you
  chosen_spanish: Jesús, que se te apareció
  alternatives_spanish:
  - Jesús, el que se te apareció
  - Jesús, el que apareció a ti
  lexicon: BDAG
  rationale: Se conserva la apposición identificando a «el Señor» con «Jesús». El participio pasivo se expresa naturalmente con «se te apareció», sin perder el valor identificador del sujeto.
- source_word: ἐν τῇ ὁδῷ ᾗ ἤρχου
  english_pob_choice: on the road by which you were coming
  chosen_spanish: en el camino por el que venías
  alternatives_spanish:
  - en el camino por donde venías
  - en la senda por la que venías
  lexicon: BDAG
  rationale: ὁδός puede ser «camino» o «ruta»; se prefiere «camino» por su amplitud y naturalidad. El imperfecto ἤρχου se vierte con «venías» para conservar la acción en desarrollo.
- source_word: ὅπως ἀναβλέψῃς
  english_pob_choice: so that you may regain your sight
  chosen_spanish: para que recobres la vista
  alternatives_spanish:
  - para que vuelvas a ver
  - para que veas de nuevo
  lexicon: BDAG
  rationale: En este contexto ἀναβλέπω denota recuperación de la vista. «Recobres la vista» mantiene ese sentido de sanidad visual sin recurrir a una paráfrasis excesiva.
- source_word: πλησθῇς πνεύματος ἁγίου
  english_pob_choice: be filled with the Holy Spirit
  chosen_spanish: seas lleno del Espíritu Santo
  alternatives_spanish:
  - seas lleno de Espíritu Santo
  - seas colmado del Espíritu Santo
  lexicon: BDAG
  rationale: La pasiva de πλησθῇς se expresa con «seas lleno». «Espíritu Santo» conserva la referencia personal divina; la preposición «de» se adapta al español con artículo cuando corresponde.
theological_decisions:
- issue: Identificación de ὁ κύριος con Jesús en la apposición
  english_pob_reading: the Lord Jesus, who appeared to you...
  chosen_spanish_reading: el Señor Jesús, que se te apareció...
  alternative_spanish_readings:
  - el Señor, Jesús, que se te apareció...
  - el Señor me ha enviado; Jesús, que se te apareció...
  rationale: El griego presentado une en una sola cadena a «el Señor» con «Jesús»; por eso el español conserva la identificación explícita «el Señor Jesús». Esto evita separar lo que el texto griego presenta como una sola referencia.
  doctrine_reference: Acts 9:17 context; Translation philosophy §6
- issue: Sentido de ἀδελφέ en el saludo de Ananías
  english_pob_reading: Brother Saul
  chosen_spanish_reading: Saulo, hermano
  alternative_spanish_readings:
  - Hermano Saulo
  - Saulo, hermano mío
  rationale: El término no solo indica parentesco lingüístico, sino aceptación fraterna dentro de la comunidad de fe. En español, posponer «hermano» después del nombre suena más natural y conserva ese matiz relacional.
  doctrine_reference: Translation philosophy §1, §6
- issue: πνεύματος ἁγίου sin artículo
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - el Espíritu Santo
  rationale: Aunque el griego es anartro, el contexto de Hechos apunta inequívocamente a la Persona divina. En español, la forma más clara y reverente es «el Espíritu Santo», sin sugerir indefinición.
  doctrine_reference: Affirmations; Acts theology of the Spirit
- issue: ὅπως ἀναβλέψῃς como resultado de sanidad
  english_pob_reading: so that you may regain your sight
  chosen_spanish_reading: para que recobres la vista
  alternative_spanish_readings:
  - para que vuelvas a ver
  - para que veas de nuevo
  rationale: El verbo puede ser traducido literalmente como «volver a ver», pero aquí el contexto de curación hace más precisa la idea de recuperación de la vista. «Recobres la vista» mantiene la tensión entre literalidad y claridad.
  doctrine_reference: Healing narrative in Acts 9
translation_notes:
  revision_awareness: El inglés POB revisó la puntuación y el orden de la apposición para unir «the Lord Jesus, who appeared to you...». En esta versión española se mantuvo esa identificación en una sola frase, evitando una ruptura que podría separar indebidamente a «el Señor» de «Jesús». También se mantuvo la preferencia por una forma idiomática de «regain your sight» como recuperación de la vista.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto base lo requiera; aquí no aparece.
  - Se usó «Espíritu Santo» y no una traducción mecanicista de «Holy Spirit» sin artículo, porque el español requiere una referencia definida en este contexto.
  - Se prefirió «hermano» para ἀδελφέ, conservando el tono fraternal sin volverlo eclesiásticamente formulístico.
  - Se evitó «imponiendo las manos» porque, aunque tradicional, «poniendo sobre él las manos» refleja con más transparencia el gesto descrito.
