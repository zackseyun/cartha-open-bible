base_translation:
  language: en
  yaml_path: translation/nt/acts/009/017.yaml
  text: So Ananias went and entered the house[a], and laying his hands on him he said, “Brother Saul, the Lord Jesus, who appeared to you on the road by which you were coming[b], has sent me so that you may regain your sight and be filled with the Holy Spirit.”
