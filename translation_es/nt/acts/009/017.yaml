  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y la revisión inglesa: Ananías va, entra en la casa, pone las manos sobre Saulo, identifica al Señor como Jesús, expresa el propósito de recuperar la vista y ser lleno del Espíritu Santo. Sin embargo, los marcadores y contenidos de las notas al pie están cruzados respecto de los puntos léxicos documentados, y una formulación española puede mejorarse para mayor naturalidad bíblica sin perder precisión.'
  spanish_quality_summary: El español es claro y mayormente digno y legible. No obstante, «poniendo sobre él las manos» suena algo forzado; «poniéndole las manos encima» o «poniendo las manos sobre él» serían más naturales. Además, la puntuación con punto y coma tras «casa[a]» es innecesariamente pesada. «Saulo, hermano» es aceptable, pero «Hermano Saulo» suena más natural en registro bíblico-eclesial y refleja bien el matiz fraternal reconocido en la auditoría inglesa.
  glossary_alignment: 'La terminología principal está alineada: «Señor Jesús», «Espíritu Santo», «Saulo», «vista». No hay conflicto con los defaults del proyecto. La referencia a κύριος es cristológica, por lo que «Señor» es apropiado. No se requieren ajustes doctrinales, solo correcciones de notas y estilo menor.'
  issues:
  - severity: high
    issue: Las notas al pie están invertidas
    rationale: En el texto, [a] va después de «la casa», pero la nota a dice «O “en el camino por el que venías”». Y [b] va después de «venías», pero la nota b dice «O “para que recobres la vista”». Esto rompe la trazabilidad de las alternativas léxicas documentadas.
  - severity: medium
    issue: La alternativa inglesa sobre ἀναβλέψῃς no está anclada al lugar correcto
    rationale: La nota sobre «you may see again» debe anclarse en «recobres la vista», no en «venías». La revisión debe conservar la alternativa donde corresponde.
  - severity: low
    issue: «poniendo sobre él las manos» suena poco idiomático
    rationale: Aunque es comprensible, en español natural y bíblico resulta más fluido «poniendo las manos sobre él» o «poniéndole las manos encima», conservando el gesto físico de ἐπιθεὶς ἐπ’ αὐτὸν τὰς χεῖρας.
  - severity: low
    issue: «Saulo, hermano» es menos natural que «Hermano Saulo» en este contexto
    rationale: Ambas opciones pueden defenderse, pero «Hermano Saulo» refleja mejor la carga fraternal inmediata y coincide más de cerca con la decisión teológica inglesa sin sonar forzado en español eclesial amplio.
