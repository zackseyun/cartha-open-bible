translation:
  language: es
  text: Pero cuando los hermanos se enteraron[a], lo bajaron a Cesarea y lo enviaron a Tarso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas»; el griego dice «hermanos», pero en este contexto puede referirse a la comunidad de creyentes en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  english_pob_choice: learned this
  chosen_spanish: se enteraron
  alternatives_spanish:
  - supieron esto
  - llegaron a saber esto
  - se dieron cuenta
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia que da pie a las acciones principales. En español, «se enteraron» expresa de manera natural que recibieron o conocieron la información, sin añadir más contenido que el del contexto inmediato.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: La forma griega es masculina plural y el POB en inglés conserva «brothers» en el texto principal. En español, «los hermanos» mantiene esa forma léxica; la posible referencia amplia a la comunidad creyente queda explicada en la nota.
- source_word: κατήγαγον
  english_pob_choice: brought him down
  chosen_spanish: lo bajaron
  alternatives_spanish:
  - lo llevaron abajo
  - lo condujeron hacia abajo
  - lo llevaron
  lexicon: BDAG
  rationale: El verbo compuesto conserva la idea direccional de movimiento hacia abajo, probablemente desde el interior hacia la costa. «Lo bajaron» es breve y refleja mejor ese matiz que un simple «lo llevaron».
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesarea Marítima
  - Cesarea
  lexicon: BDAG
  rationale: El topónimo se translitera de manera estándar al español como «Cesarea». No se amplía a la designación histórica más precisa porque el contexto inmediato no la requiere.
- source_word: ἐξαπέστειλαν
  english_pob_choice: sent him off
  chosen_spanish: lo enviaron
  alternatives_spanish:
  - lo despidieron
  - lo mandaron
  - lo enviaron de allí
  lexicon: BDAG
  rationale: El compuesto expresa envío con énfasis en la partida. En español, «lo enviaron» comunica con claridad la acción; el matiz de salida queda suficientemente implicado por el contexto y por el complemento de destino.
- source_word: Ταρσόν
  english_pob_choice: Tarsus
  chosen_spanish: Tarso
  alternatives_spanish:
  - Tarso
  lexicon: BDAG
  rationale: Se usa la forma española habitual del nombre de la ciudad.
theological_decisions:
- issue: Posible inclusión amplia en ἀδελφοί
  english_pob_reading: the brothers; possibly the community of believers more broadly
  chosen_spanish_reading: los hermanos; posiblemente la comunidad de creyentes en sentido amplio
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: La forma griega masculina plural se mantiene en el texto principal, sin neutralizarla. La nota preserva la observación contextual de que el grupo puede abarcar a toda la comunidad creyente, sin borrar la forma léxica documentada.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: 'El texto inglés del POB y su auditoría mantienen alta concordancia con el griego y no muestran revisiones aplicadas. La versión española sigue esa misma línea: conserva la secuencia narrativa, el referente masculino plural de ἀδελφοί y el movimiento direccional de los verbos compuestos, sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Cesarea» y «Tarso» de forma uniforme.
  - Se conserva el referente masculino plural «los hermanos» en el texto principal, con nota explicativa para la posible inclusión amplia.
  - La construcción «se enteraron» refleja adecuadamente el participio circunstancial sin sobretraducirlo.
