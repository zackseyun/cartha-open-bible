translation:
  language: es
  text: y vio en una visión a un hombre llamado Ananías entrando e imponiéndole las manos para que recobrara la vista[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha visto»; el verbo griego está en aoristo, pero «vio» es la forma más natural en español para esta escena narrativa.
    reason: lexical_alternative
  - marker: b
    text: O «volviera a ver»; ἀναβλέπω en este contexto significa recobrar la vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: has seen
  chosen_spanish: vio
  alternatives_spanish:
  - ha visto
  lexicon: BDAG
  rationale: El aoristo εἶδεν se expresa naturalmente en español con pretérito perfecto simple. Aunque el inglés POB usó present perfect por relevancia presente, en español 'vio' comunica con claridad la visión ya concedida y no suena forzado en este contexto narrativo.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un varón
  lexicon: BDAG
  rationale: ἀνήρ designa aquí a una persona masculina adulta. 'Hombre' es la opción natural y precisa en español contemporáneo.
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - en un vislumbre
  lexicon: BDAG
  rationale: La frase indica el ámbito o medio de lo visto. 'En una visión' reproduce ese valor de forma transparente y estándar.
- source_word: Ἁνανίαν ὀνόματι
  english_pob_choice: named Ananias
  chosen_spanish: llamado Ananías
  alternatives_spanish:
  - de nombre Ananías
  - nombrado Ananías
  lexicon: BDAG
  rationale: El giro identifica al hombre por su nombre. 'Llamado Ananías' es idiomático en español y conserva la función identificadora del original.
- source_word: εἰσελθόντα
  english_pob_choice: coming in
  chosen_spanish: que entraba
  alternatives_spanish:
  - entrando
  - que había entrado
  lexicon: BDAG
  rationale: El participio describe a Ananías en movimiento hacia el interior de la escena visionaria. 'Que entraba' mantiene la idea de acción en curso sin sobredeterminar la secuencia.
- source_word: ἐπιθέντα αὐτῷ χεῖρας
  english_pob_choice: laying his hands on him
  chosen_spanish: le imponía las manos
  alternatives_spanish:
  - le ponía las manos encima
  - le colocaba las manos
  lexicon: BDAG
  rationale: '''Imponer las manos'' es la forma española más reconocible para este gesto bíblico y conserva el sentido idiomático sin añadir interpretación sacramental o denominacional.'
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce una finalidad. 'Para que' es la construcción natural en español para expresar el propósito del acto.
- source_word: ἀναβλέψῃ
  english_pob_choice: he might regain his sight
  chosen_spanish: recobrara la vista
  alternatives_spanish:
  - volviera a ver
  - recuperara la vista
  lexicon: BDAG
  rationale: En este contexto sanador, ἀναβλέπω significa recuperar la vista o volver a ver. 'Recobrara la vista' es idiomático, claro y conserva el valor de restablecimiento visual.
theological_decisions:
- issue: Alcance del gesto de imponer las manos
  english_pob_reading: laying his hands on him
  chosen_spanish_reading: le imponía las manos
  alternative_spanish_readings:
  - le ponía las manos encima
  rationale: El griego describe el acto físico sin definir su significado doctrinal. La traducción conserva la fórmula bíblica común en español y evita cargarla con una lectura sacramental, ordenatoria o carismática que el texto no explicita.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla por adelantado.
- issue: Tiempo verbal del verbo de visión
  english_pob_reading: has seen
  chosen_spanish_reading: vio
  alternative_spanish_readings:
  - ha visto
  rationale: Aunque el inglés POB enfatiza la relevancia presente, en español el pretérito simple es la forma más natural para narrar la visión ya ocurrida dentro del relato. No cambia el contenido ni la fuerza del dato visionario.
  doctrine_reference: Coherencia aspectual y narrativa en español.
translation_notes:
  revision_awareness: El texto inglés revisado añadió 'his' antes de 'hands' para reflejar el plural con naturalidad. En español, 'le imponía las manos' ya expresa de manera natural el gesto plural sin requerir pronombre posesivo explícito.
  spanish_consistency_notes:
  - Se mantiene 'Ananías' con acento gráfico conforme al español.
  - Se usa 'visión' y no 'sueño' porque el griego ὅραμα indica una visión.
  - Se conserva el gesto bíblico fijo 'imponer las manos' por ser la equivalencia idiomática más estable en español.
  - '''Vista'' se prefiere sobre una traducción más literal como ''mirar'' porque el contexto es de recuperación visual.'
