base_translation:
  language: en
  yaml_path: translation/nt/acts/009/025.yaml
  text: But his disciples took him by night and lowered him through the wall in a large basket[a][b].
  footnotes:
  - marker: a
    text: Or 'through an opening in the wall.' The Greek says literally 'through the wall,' likely referring to an aperture or window in the city wall.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses two lowering expressions ('lowered' and 'letting down'), a vivid construction emphasizing the manner of escape.
    reason: lexical_alternative
