    unchanged: false
    changes_summary: Removed the redundant participial expansion 'letting him down,' since 'lowered him' already renders the Greek action. Kept 'through the wall' and 'in a large basket' for accuracy and natural formal English.
translation:
  language: es
  text: Pero sus discípulos lo tomaron de noche y lo bajaron a través del muro en una canasta grande[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por una abertura en el muro». El griego dice literalmente «a través del muro», probablemente aludiendo a una abertura o ventana en la muralla de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: El griego usa dos expresiones de descenso («lo bajaron» y «descolgándolo»), una construcción vívida que enfatiza la manera de la huida.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: took
  chosen_spanish: lo tomaron
  alternatives_spanish:
  - lo llevaron consigo
  - lo recibieron
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de los discípulos al hacerse cargo de Pablo para sacarlo. En español, «lo tomaron» conserva la concreción narrativa sin sobreexplicar el verbo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca transición con contraste narrativo respecto del complot previo; «Pero» reproduce bien ese giro en español.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos
  - sus seguidores
  lexicon: BDAG
  rationale: Se mantiene el posesivo de αὐτοῦ y el sustantivo técnico «discípulos», más preciso que «seguidores».
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: BDAG
  rationale: El genitivo de tiempo se expresa naturalmente en español como «de noche», con tono narrativo sobrio y claro.
- source_word: διὰ τοῦ τείχους
  english_pob_choice: through the wall
  chosen_spanish: por el muro
  alternatives_spanish:
  - a través del muro
  - por una abertura en el muro
  lexicon: BDAG
  rationale: διά con genitivo indica paso a través. En español, «por el muro» refleja el movimiento sin añadir una abertura no expresada explícitamente en el griego.
- source_word: καθῆκαν αὐτόν
  english_pob_choice: lowered him
  chosen_spanish: lo bajaron
  alternatives_spanish:
  - lo descendieron
  - lo dejaron caer
  lexicon: BDAG
  rationale: καθίημι aquí significa bajar desde una altura. «Lo bajaron» es idiomático en español y suficientemente preciso.
- source_word: χαλάσαντες
  english_pob_choice: large basket / lowering expression
  chosen_spanish: (implícito en el verbo principal)
  alternatives_spanish:
  - bajándolo
  - descolgándolo
  lexicon: BDAG
  rationale: El participio de χαλάω refuerza el modo de la acción de bajar. Para no introducir redundancia pesada en español, se integra en la fluidez de «lo bajaron» sin perder el sentido global de descenso.
- source_word: ἐν σπυρίδι
  english_pob_choice: in a large basket
  chosen_spanish: en una canasta grande
  alternatives_spanish:
  - en un canasto grande
  - en una cesta grande
  lexicon: BDAG
  rationale: σπυρίς designa una canasta de mayor tamaño. «Canasta grande» comunica bien el objeto y mantiene el matiz de tamaño sin sonar técnico o arcaico.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que eliminó la expansión redundante del participio y mantuvo «through the wall» y «in a large basket». En español, se resolvió la doble expresión verbal de forma natural con «lo bajaron» y se conservó el complemento locativo, evitando una duplicación innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «discípulos» para μαθηταί conforme al uso estándar POB.
  - Se evitó «SEÑOR» o equivalentes no pertinentes porque el versículo no contiene el nombre divino ni κύριος.
  - Se prefirió «canasta grande» sobre «cesta» o «canasto» por claridad y registro bíblico moderno.
  - El texto principal conserva la ambigüedad espacial de «por el muro» y la amplía solo en nota, siguiendo el audit trail inglés.
