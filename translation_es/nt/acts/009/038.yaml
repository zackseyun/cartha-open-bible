translation:
  language: es
  text: 'Ahora bien, como Lida estaba cerca de Jope, los discípulos, al oír que Pedro estaba allí, enviaron dos hombres a donde él estaba, para rogarle: «No tardes[a] en venir a donde nosotros estábamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No vaciles». El verbo puede denotar vacilación o demora; el texto principal elige el sentido más natural en esta petición urgente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγὺς ... οὔσης
  english_pob_choice: since ... was near
  chosen_spanish: como ... estaba cerca
  alternatives_spanish:
  - puesto que ... estaba cerca
  - ya que ... estaba cerca
  - siendo ... cerca
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia de fondo con matiz causal. «Como ... estaba cerca» comunica de forma natural en español la relación entre la cercanía de Lida y el envío de los hombres, sin perder el valor circunstancial del griego.
- source_word: Λύδδας
  english_pob_choice: Lydda
  chosen_spanish: Lida
  alternatives_spanish:
  - Lod
  lexicon: BDAG
  rationale: Se conserva el topónimo en su forma usual en español bíblico para este lugar, manteniendo la transliteración contextual del nombre propio.
- source_word: Ἰόππῃ
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Jafa
  lexicon: BDAG
  rationale: Se usa la forma tradicional y reconocible en español para el topónimo de Hechos, equivalente al Joppa del inglés POB.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente preciso y normal en Hechos para los miembros de la comunidad creyente.
- source_word: ἀκούσαντες
  english_pob_choice: hearing
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera natural con una construcción temporal breve en español, preservando la acción previa al envío.
- source_word: ἐν αὐτῇ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ella
  - en esa ciudad
  lexicon: BDAG
  rationale: El pronombre se refiere a Lida; «allí» evita una repetición pesada y conserva el sentido locativo idiomático.
- source_word: ἀπέστειλαν δύο ἄνδρας
  english_pob_choice: sent two men
  chosen_spanish: enviaron dos hombres
  alternatives_spanish:
  - despacharon dos hombres
  - enviaron a dos hombres
  lexicon: BDAG
  rationale: «Enviar» reproduce con sencillez el verbo de salida en el contexto narrativo; «dos hombres» mantiene el valor literal del griego.
- source_word: παρακαλοῦντες
  english_pob_choice: urging
  chosen_spanish: rogándole
  alternatives_spanish:
  - suplicándole
  - insistiéndole
  - rogando
  lexicon: BDAG
  rationale: Aquí el participio expresa el tenor de la petición. «Rogándole» comunica la insistencia respetuosa y urgente sin sobrecargar el tono emocional.
- source_word: Μὴ ὀκνήσῃς
  english_pob_choice: Do not delay
  chosen_spanish: No tardes
  alternatives_spanish:
  - No demores
  - No vaciles
  - No te retrases
  lexicon: BDAG
  rationale: En este contexto de viaje urgente, el verbo puede significar retrasarse o demorarse. «No tardes» es natural en español y recoge la prisa de la solicitud.
- source_word: διελθεῖν
  english_pob_choice: to come
  chosen_spanish: en venir
  alternatives_spanish:
  - en pasar
  - en atravesar
  - en llegar
  lexicon: BDAG
  rationale: Aunque el verbo es literalmente «pasar a través» o «cruzar», en la perspectiva de los hablantes significa el desplazamiento de Pedro hacia ellos. «Venir» expresa correctamente el movimiento de llegada al punto de referencia de los remitentes.
- source_word: ἕως ἡμῶν
  english_pob_choice: to us
  chosen_spanish: hasta nosotros
  alternatives_spanish:
  - a nosotros
  - a nuestro lugar
  lexicon: BDAG
  rationale: La expresión idiomática apunta al destino del movimiento. «Hasta nosotros» conserva la idea de llegada al lugar donde están los enviados y sigue de cerca la estructura del griego.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustantivos y el cotejo final mostró alta concordancia; por eso se mantiene la lectura base, ajustando solo la formulación española para mayor naturalidad y fidelidad al griego.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Yahvé» como norma del proyecto cuando corresponda; este versículo no lo requiere.
  - Se conserva «discípulos» en el sentido técnico de la comunidad creyente de Hechos.
  - No se introduce puntuación o segmentación que altere la urgencia del ruego final.
  - Se evita una traducción demasiado literal de διελθεῖν para no oscurecer el sentido de desplazamiento hacia los remitentes.
