translation:
  language: es
  text: 'Y había en Damasco un discípulo llamado Ananías, y el Señor le dijo en una visión: «Ananías». Él respondió: «Aquí estoy, Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἦν δέ τις μαθητὴς
  english_pob_choice: Now there was a disciple
  chosen_spanish: Y había un discípulo
  alternatives_spanish:
  - Ahora había un discípulo
  - Había un discípulo
  lexicon: BDAG
  rationale: El imperfecto Ἦν introduce la escena de manera narrativa, y δέ marca transición suave. En español, «Y había» conserva la continuidad narrativa sin forzar un «ahora» que puede sonar más interpretativo. Se mantiene el artículo indefinido para τις.
- source_word: ἐν Δαμασκῷ
  english_pob_choice: in Damascus
  chosen_spanish: en Damasco
  alternatives_spanish:
  - dentro de Damasco
  lexicon: BDAG
  rationale: Locativo directo y natural en español; se conserva el nombre propio tradicional y ampliamente entendido.
- source_word: ὀνόματι Ἁνανίας
  english_pob_choice: named Ananias
  chosen_spanish: llamado Ananías
  alternatives_spanish:
  - de nombre Ananías
  - cuyo nombre era Ananías
  lexicon: BDAG
  rationale: El dativo ὀνόματι es idiomático para identificar por nombre. «Llamado» reproduce bien la función identificadora con naturalidad en español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesucristo
  - el Señor
  lexicon: BDAG
  rationale: En el contexto de Hechos 9, el hablante en la visión es el Señor resucitado. «Señor» mantiene la referencia cristológica que el contexto exige sin añadir explícitamente «Jesucristo», que el versículo no dice.
- source_word: εἶπεν πρὸς αὐτὸν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló con él
  - se dirigió a él
  lexicon: BDAG
  rationale: La construcción griega se expresa de forma natural y directa con clítico dativo en español.
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - por medio de una visión
  - durante una visión
  lexicon: BDAG
  rationale: La frase indica el modo de la comunicación divina. «En una visión» es la equivalencia más transparente y sobria.
- source_word: Ἁνανία
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Ananías
  lexicon: BDAG
  rationale: Vocativo del nombre propio; se conserva la forma española usual con tilde.
- source_word: Ἰδοὺ ἐγώ
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Aquí me tienes
  lexicon: BDAG
  rationale: La respuesta idiomática de disponibilidad se expresa de forma natural en español con «Aquí estoy», sin perder la función de respuesta pronta.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Señor
  lexicon: BDAG
  rationale: La vocación κύριε se corresponde aquí con el mismo «Señor» que llama en la visión. Se conserva la capitalización reverencial en español.
theological_decisions:
- issue: Referente de ὁ κύριος / κύριε en la visión
  english_pob_reading: Both refer to the risen Jesus as Lord
  chosen_spanish_reading: Ambos se refieren al Señor resucitado
  alternative_spanish_readings:
  - Ambos se refieren a Dios de manera general
  - Ambos son un tratamiento reverente sin precisar identidad
  rationale: El contexto inmediato de Hechos 9 identifica al hablante como el Señor que comisiona a Ananías; por eso conviene mantener «el Señor» / «Señor» sin diluir la referencia cristológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura aprobada del inglés POB, pero ajusta la sintaxis al español para evitar un calco innecesario. Se preservan las decisiones clave: transición narrativa suave, vocativo del nombre, y el uso cristológico de «el Señor» en la visión.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en ambos casos, coherente con el contexto de Hechos 9.
  - Se usa «Ananías» con la ortografía española estándar del nombre.
  - La estructura verbal en español conserva el carácter narrativo del imperfecto griego sin sobreexplicar el matiz discursivo de δέ.
