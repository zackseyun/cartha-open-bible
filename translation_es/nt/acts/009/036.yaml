- from: Ahora bien, en Jope había una discípula llamada Tabita[a], que traducido se llama Dorcas. Esta estaba llena de buenas obras y de obras de misericordia que hacía.
  to: Ahora bien, en Jope había una discípula llamada Tabita[a], que traducida se llama Dorcas. Esta estaba llena de buenas obras y actos de misericordia que hacía.
  rationale: Se ajusta la cláusula explicativa del nombre para que suene natural y fiel en español, y se reemplaza «obras de misericordia» por «actos de misericordia» para evitar repetición innecesaria y reflejar mejor la distinción léxica del griego.
