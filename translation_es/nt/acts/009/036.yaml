translation:
  language: es
  text: Ahora bien, en Jope había una discípula llamada Tabita[a], que traducida se llama Dorcas. Esta estaba llena de buenas obras y actos de misericordia que hacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dorcas es el nombre griego correspondiente a Tabita; significa «gacela».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν Ἰόππῃ
  english_pob_choice: in Joppa
  chosen_spanish: en Jope
  alternatives_spanish:
  - en Joppa
  lexicon: uso bíblico común / toponimia
  rationale: El topónimo se mantiene en su forma castellana tradicional y clara, 'Jope', que comunica naturalmente el lugar sin depender de la transliteración inglesa.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG / marcador discursivo
  rationale: δέ introduce avance narrativo; 'Ahora bien' conserva ese giro discursivo en español sin sonar mecánico.
- source_word: μαθήτρια
  english_pob_choice: disciple
  chosen_spanish: discípula
  alternatives_spanish:
  - discípulo
  - mujer discípula
  lexicon: BDAG
  rationale: El griego usa la forma femenina explícita. 'Discípula' preserva esa marca sin necesidad de una glosa adicional en el cuerpo del texto.
- source_word: ὀνόματι
  english_pob_choice: named
  chosen_spanish: llamada
  alternatives_spanish:
  - de nombre
  - nombrada
  lexicon: BDAG
  rationale: La fórmula idiomática de identificación nominal se expresa de manera natural con 'llamada' en español, manteniendo el valor introductorio del nombre.
- source_word: Ταβιθά
  english_pob_choice: Tabitha
  chosen_spanish: Tabita
  alternatives_spanish:
  - Tabitha
  lexicon: convención onomástica
  rationale: Se translitera el nombre al uso habitual del español bíblico, 'Tabita', sin alterar la referencia personal.
- source_word: διερμηνευομένη λέγεται Δορκάς
  english_pob_choice: which translated is called Dorcas
  chosen_spanish: que traducido se llama Dorcas
  alternatives_spanish:
  - que interpretado se llama Dorcas
  - que traducida significa Dorcas
  lexicon: BDAG / fórmula de traducción
  rationale: La construcción refleja que el nombre Semítico tiene su equivalente griego; 'traducido se llama' conserva el dato explicativo sin convertirlo en paráfrasis.
- source_word: Δορκάς
  english_pob_choice: Dorcas
  chosen_spanish: Dorcas
  alternatives_spanish:
  - Gacela
  lexicon: BDAG
  rationale: Se conserva el nombre propio griego en el texto principal, como hace el POB en inglés. El valor semántico ('gacela') se reserva para nota.
- source_word: πλήρης
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena
  lexicon: BDAG
  rationale: '''Llena de'' expresa con naturalidad la abundancia habitual de las cualidades que siguen.'
- source_word: ἔργων ἀγαθῶν
  english_pob_choice: good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - obras buenas
  - obras buenas y rectas
  lexicon: BDAG
  rationale: '''Buenas obras'' es la correspondencia más natural en español y conserva la relación léxica con ἔργα sin forzar una formulación técnica.'
- source_word: ἐλεημοσυνῶν
  english_pob_choice: acts of mercy
  chosen_spanish: obras de misericordia
  alternatives_spanish:
  - actos de misericordia
  - limosnas
  - obras de caridad
  lexicon: BDAG
  rationale: El término puede aludir a limosnas concretas, pero aquí describe una práctica compasiva sostenida. 'Obras de misericordia' preserva ese alcance ético y resulta inteligible en español bíblico contemporáneo.
- source_word: ὧν ἐποίει
  english_pob_choice: that she was doing
  chosen_spanish: que hacía
  alternatives_spanish:
  - que estaba haciendo
  - que solía hacer
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o habitual; en español 'que hacía' transmite bien ese sentido sin recargar la frase.
theological_decisions:
- issue: Marcar explícitamente el femenino de μαθήτρια
  english_pob_reading: disciple
  chosen_spanish_reading: discípula
  alternative_spanish_readings:
  - discípulo
  - mujer discípula
  rationale: El griego destaca que se trata de una mujer discípula. 'Discípula' conserva esa precisión gramatical y no diluye el dato de género en una forma genérica.
  doctrine_reference: Precisión gramatical y fidelidad al referente
- issue: Traducir ἐλεημοσυνῶν con un término que no reduzca el sentido a una práctica institucional
  english_pob_reading: acts of mercy
  chosen_spanish_reading: obras de misericordia
  alternative_spanish_readings:
  - limosnas
  - obras de caridad
  - actos de misericordia
  rationale: Aunque el término puede incluir donativos concretos, el contexto presenta una vida caracterizada por la compasión activa. 'Obras de misericordia' evita estrechar el sentido a mera limosna y mantiene la carga ética del pasaje.
  doctrine_reference: Lectura contextual del vocabulario de misericordia
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del audit trail en inglés y no introduce cambios doctrinales. Se preserva la distinción entre el nombre semítico y su equivalente griego, así como el valor aspectual del imperfecto con una solución española natural.
  spanish_consistency_notes:
  - Se usó 'Jope' como topónimo bíblico castellano estándar.
  - Se mantuvo 'discípula' para reflejar la forma femenina explícita del griego.
  - '''Obras de misericordia'' conserva el matiz ético de ἐλεημοσυνῶν sin reducirlo a una sola práctica de limosna.'
  - La nota explica el vínculo semántico entre Tabita y Dorcas, siguiendo el patrón de la POB inglesa.
