translation:
  language: es
  text: Y al instante algo como escamas[a] se le cayó de los ojos, y recobró la vista; luego se levantó y fue bautizado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «como escamas se le cayó de los ojos». El griego usa una comparación, describiendo lo que parecía suceder más que afirmando escamas literales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εὐθέως
  english_pob_choice: And immediately
  chosen_spanish: Y al instante
  alternatives_spanish:
  - Y inmediatamente
  - Y enseguida
  lexicon: BDAG
  rationale: εὐθέως expresa inmediatez temporal; «al instante» comunica esa rapidez en español natural y mantiene el arranque narrativo del griego sin sonar forzado.
- source_word: ἀπέπεσαν
  english_pob_choice: fell
  chosen_spanish: se le cayeron
  alternatives_spanish:
  - cayeron
  - se desprendieron
  lexicon: BDAG
  rationale: ἀποπίπτω indica caer desde o separarse de algo. En español, «se le cayeron» conserva la separación respecto de los ojos y suena idiomático en contexto narrativo.
- source_word: αὐτοῦ ἀπὸ τῶν ὀφθαλμῶν
  english_pob_choice: from his eyes
  chosen_spanish: de los ojos
  alternatives_spanish:
  - de sus ojos
  - de encima de los ojos
  lexicon: BDAG
  rationale: La combinación de pronombre y ἀπό + genitivo se expresa naturalmente en español como «de los ojos», con el posesivo ya recuperado en el objeto indirecto «se le».
- source_word: ὡς λεπίδες
  english_pob_choice: something like scales
  chosen_spanish: algo como escamas
  alternatives_spanish:
  - como escamas
  - algo semejante a escamas
  lexicon: BDAG
  rationale: ὡς marca comparación, no identidad. «Algo como escamas» preserva la apariencia comparativa y evita afirmar que fueran escamas literales; «escamas» reproduce la imagen concreta de λεπίδες.
- source_word: ἀνέβλεψέν
  english_pob_choice: he regained his sight
  chosen_spanish: recobró la vista
  alternatives_spanish:
  - volvió a ver
  - recuperó la vista
  - recibió la vista
  lexicon: BDAG
  rationale: En contextos de curación, ἀναβλέπω puede significar recuperar la vista. «Recobró la vista» expresa ese sentido de restauración de manera clara y bíblica en español.
- source_word: τε καὶ
  english_pob_choice: and ... then
  chosen_spanish: luego
  alternatives_spanish:
  - y
  - y entonces
  lexicon: BDAG
  rationale: La secuencia narrativa queda mejor en español con «luego», que señala el paso al siguiente acto sin sobrecargar la coordinación de partículas griegas.
- source_word: ἀναστὰς
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - levantándose
  - se puso de pie
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción siguiente. «Se levantó» es la equivalencia idiomática más natural en español para indicar que pasó a incorporarse.
- source_word: ἐβαπτίσθη
  english_pob_choice: was baptized
  chosen_spanish: fue bautizado
  alternatives_spanish:
  - fue inmerso
  - recibió el bautismo
  lexicon: BDAG
  rationale: El pasivo de βαπτίζω se traduce de forma transparente como «fue bautizado», sin imponer una modalidad denominacional específica en el texto principal.
theological_decisions:
- issue: Naturaleza comparativa de la imagen visual
  english_pob_reading: something like scales fell from his eyes
  chosen_spanish_reading: algo como escamas le cayó de los ojos / se le cayeron de los ojos algo como escamas
  alternative_spanish_readings:
  - escamas cayeron de sus ojos
  - como escamas cayeron de sus ojos
  rationale: El griego usa ὡς («como»), por lo que la traducción debe preservar que se trata de una comparación de apariencia o efecto, no de identificación literal de escamas.
  doctrine_reference: Principio de precisión semántica en la traducción; no afirmar más que el texto griego.
- issue: Traducción de βαπτίζω sin cargar una postura de modo bautismal
  english_pob_reading: was baptized
  chosen_spanish_reading: fue bautizado
  alternative_spanish_readings:
  - fue inmerso
  - recibió el bautismo
  rationale: La narración reporta el acto sin especificar el modo. «Fue bautizado» mantiene la neutralidad lexicográfica y evita añadir una inferencia denominacional que el griego no exige.
  doctrine_reference: 'DOCTRINE.md: la traducción no debe imponer un distintivo denominacional donde el griego no lo haga explícito.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y coincide con la línea auditada en inglés: la comparación de ὡς se conserva mediante una nota, y βαπτίσθη se traduce sin cargar especificación confesional. No se detectan revisiones pendientes en el contexto inglés, por lo que no se introducen cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, aunque no aparece en este versículo.
  - Se usa «fue bautizado» para βαπτίζω conforme a la política POB de neutralidad denominacional.
  - «Recobró la vista» refleja el sentido curativo de ἀνέβλεψέν y evita el calco «miró hacia arriba» en un contexto de ceguera restaurada.
  - La puntuación conserva la secuencia narrativa del griego con una sola oración coordinada.
