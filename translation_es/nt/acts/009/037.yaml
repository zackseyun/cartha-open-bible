translation:
  language: es
  text: En aquellos días ocurrió que ella enfermó y murió. Después de lavarla, la pusieron en una habitación de arriba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el aposento alto». El griego simplemente se refiere a una habitación en el piso superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: ocurrió que
  alternatives_spanish:
  - sucedió que
  - aconteció que
  lexicon: BDAG
  rationale: La fórmula narrativa de γίνομαι en Hechos introduce un evento; «ocurrió que» comunica ese giro de manera natural en español sin volverlo arcaico.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector discursivo suave. «Ahora» conserva el cambio de escena con fluidez natural en español.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: Expresión temporal estándar; «en aquellos días» es fiel y natural.
- source_word: ἀσθενήσασαν
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - cayó enferma
  - se debilitó
  - se puso enferma
  lexicon: BDAG
  rationale: El participio aoristo de ἀσθενέω indica que ella enfermó antes de morir. «Enfermó» es claro y conserva la secuencia sin añadir matices no presentes.
- source_word: ἀποθανεῖν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a morir
  lexicon: BDAG
  rationale: El infinitivo griego, en este contexto, se entiende naturalmente como una afirmación finita de muerte. «Murió» expresa con precisión el sentido.
- source_word: λούσαντες
  english_pob_choice: after washing her
  chosen_spanish: Después de lavarla
  alternatives_spanish:
  - habiéndola lavado
  - cuando la hubieron lavado
  lexicon: BDAG
  rationale: El participio aoristo indica anterioridad respecto a la acción principal. En contexto funerario, «lavarla» se entiende como lavar el cuerpo y mantiene la secuencia narrativa.
- source_word: ἔθηκαν αὐτὴν
  english_pob_choice: they laid her
  chosen_spanish: la pusieron
  alternatives_spanish:
  - la colocaron
  - la depositaron
  lexicon: BDAG
  rationale: τίθημι aquí significa colocar/poner. En español, «la pusieron» es natural y suficientemente preciso; el matiz funerario se completa con el contexto.
- source_word: ἐν ὑπερῴῳ
  english_pob_choice: in an upstairs room
  chosen_spanish: en un cuarto de arriba
  alternatives_spanish:
  - en un aposento alto
  - en un cuarto superior
  lexicon: BDAG
  rationale: ὑπερῷον designa un cuarto en el piso alto. «Cuarto de arriba» evita sugerir una ubicación técnica o tradicional específica y refleja bien la referencia espacial del griego.
theological_decisions:
- issue: Si ὑπερῴῳ debe sonar como «cuarto de arriba» o como el tradicional «aposento alto / cuarto alto»
  english_pob_reading: in an upstairs room
  chosen_spanish_reading: en un cuarto de arriba
  alternative_spanish_readings:
  - en el aposento alto
  - en un cuarto alto
  rationale: El griego es anartro y señala simplemente un cuarto en la planta alta, no necesariamente un lugar identificable por tradición. «Cuarto de arriba» preserva esa transparencia espacial.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Este borrador sigue el texto griego SBLGNT y el auditorio inglés POB, sin cambios de revisión aplicados en la última pasada; mantiene la decisión de no sobrecargar ὑπερῷον con una lectura tradicional específica.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y publicación-readable.
  - Se evita «SEÑOR» u otros reemplazos teológicos no pertinentes a este verso.
  - 'Se conserva la secuencia temporal: enfermó → murió → la lavaron → la colocaron.'
  - «Cuarto de arriba» funciona como equivalente transparente de ὑπερῷον sin implicar un sitio técnico especial.
