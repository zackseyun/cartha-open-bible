revisions:
- from: Ahora, en aquellos días, ocurrió que ella enfermó y murió. Después de lavarla, la pusieron en un cuarto de arriba[a].
  to: En aquellos días ocurrió que ella enfermó y murió. Después de lavarla, la pusieron en una habitación de arriba[a].
  rationale: Se elimina «Ahora» para reflejar mejor el valor leve de δέ en español natural, y se cambia «cuarto de arriba» por «habitación de arriba» para mejorar el registro sin perder la precisión espacial ni introducir la implicación tradicional de un lugar específico. La nota conserva la alternativa tradicional documentada.
