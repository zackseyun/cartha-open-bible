translation:
  language: es
  text: Y dándole la mano, la levantó[a]; luego llamó a los santos y a las viudas, y la presentó viva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la ayudó a levantarse' / 'la hizo ponerse de pie'; el verbo griego puede indicar hacer que alguien se levante o se ponga de pie y, en este contexto, también resuena con lenguaje de resurrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοὺς ... χεῖρα
  english_pob_choice: giving her his hand
  chosen_spanish: dándole la mano
  alternatives_spanish:
  - tomándola de la mano
  - dándole su mano
  lexicon: BDAG
  rationale: La construcción griega con δοὺς y χεῖρα funciona como un modismo natural de ayuda física. En español, 'dándole la mano' conserva la imagen de asistencia sin forzar una literalidad extraña. 'Tomándola de la mano' es viable, pero desplaza el foco desde el gesto de ofrecer ayuda al de sujetarla; 'dándole su mano' suena menos natural en español moderno.
- source_word: ἀνέστησεν
  english_pob_choice: raised her up
  chosen_spanish: la levantó
  alternatives_spanish:
  - la hizo ponerse de pie
  - la alzó
  lexicon: BDAG
  rationale: En este contexto narrativo, ἀνέστησεν puede expresar hacer que alguien se ponga de pie. 'La levantó' es natural en español y sigue el gesto inmediato descrito por el texto. 'La hizo ponerse de pie' es más explicativo; 'la alzó' resulta menos preciso para la acción física concreta.
- source_word: φωνήσας
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - habiendo llamado
  lexicon: BDAG
  rationale: El participio aoristo indica una acción anterior a 'la presentó'. 'Llamó' comunica bien el acto de reunir a los presentes y funciona con naturalidad en español. 'Convocó' sería más formal y ligeramente más interpretativo; la forma participial explícita no es necesaria en el flujo español.
- source_word: τοὺς ἁγίους
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los creyentes
  - los santos de Dios
  lexicon: BDAG
  rationale: Se mantiene la designación eclesial directa 'los santos', que corresponde al uso neotestamentario de ἅγιοι. 'Los creyentes' suaviza la equivalencia léxica; 'los santos de Dios' añade material no presente en el texto.
- source_word: τὰς χήρας
  english_pob_choice: the widows
  chosen_spanish: las viudas
  alternatives_spanish:
  - las viudas de la comunidad
  lexicon: BDAG
  rationale: '''Las viudas'' es la traducción directa y suficiente. El contexto previo explica por qué se las menciona aparte, pero esa explicación no debe incorporarse al versículo.'
- source_word: παρέστησεν
  english_pob_choice: presented
  chosen_spanish: la presentó
  alternatives_spanish:
  - la puso delante de
  - la mostró
  lexicon: BDAG
  rationale: παρίστημι aquí significa presentar o poner ante otros a una persona. 'La presentó' conserva el valor relacional y narrativo del verbo. 'La puso delante de' es más pesado en español; 'la mostró' debilita la idea de presentación formal.
- source_word: ζῶσαν
  english_pob_choice: alive
  chosen_spanish: viva
  alternatives_spanish:
  - viva y con vida
  - viva todavía
  lexicon: BDAG
  rationale: '''Viva'' encaja de forma idiomática como predicativo en español y preserva la fuerza del resultado: fue presentada estando viva. ''Viva y con vida'' es redundante; ''viva todavía'' añade matiz innecesario.'
theological_decisions:
- issue: Carga de resurrección en ἀνέστησεν
  english_pob_reading: raised her up
  chosen_spanish_reading: la levantó
  alternative_spanish_readings:
  - la hizo ponerse de pie
  - la resucitó
  rationale: El contexto inmediato ya ha dejado claro que Tabita ha sido devuelta a la vida; por eso el verbo aquí puede traducirse como el gesto inmediato de levantarla. 'La levantó' preserva la acción visible sin sobretraducir como 'la resucitó', que sería más explícito de lo que el verbo aislado exige. El eco de resurrección se mantiene por el contexto narrativo completo.
  doctrine_reference: Hechos 9:36–42; filosofía de equivalencia óptima §1, §3
- issue: Designación de los receptores como 'los santos'
  english_pob_reading: the saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los creyentes
  - los consagrados
  rationale: Se conserva el término técnico bíblico 'santos' para no diluir la categoría del pueblo de Dios. 'Los creyentes' interpreta el término; 'los consagrados' suena más abstracto y menos transparente en español.
  doctrine_reference: NT uso de ἅγιοι
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente griego y al rastro auditado en inglés; no se detectaron revisiones pendientes en el último pase. La solución española mantiene el orden narrativo, la distinción entre 'santos' y 'viudas', y el matiz de ἀνέστησεν sin sobrerinterpretarlo.
  spanish_consistency_notes:
  - Se usa 'santos' de manera consistente con la terminología POB para ἅγιοι.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino ni κύριος con función de reemplazo.
  - '''Viva'' se usa como predicativo natural para ζῶσαν en un contexto de restauración de vida.'
