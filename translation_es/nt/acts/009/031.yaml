translation:
  language: es
  text: Así pues, la iglesia en toda Judea, Galilea y Samaria tenía paz e iba siendo edificada[a]; y, andando en el temor del Señor y con el aliento del Espíritu Santo[b], se multiplicaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «las iglesias» en lugar de «la iglesia».
    reason: textual_variant
  - marker: b
    text: O «consuelo» o «exhortación» del Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησία
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - las iglesias
  - la asamblea
  lexicon: BDAG
  rationale: El texto griego está en singular, y el contexto presenta una realidad colectiva y unificada. En español, «la iglesia» comunica con naturalidad esa singularidad colectiva, mientras que «las iglesias» quedaría reservado para la variante textual plural documentada.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας καὶ Γαλιλαίας καὶ Σαμαρείας
  english_pob_choice: throughout all Judea and Galilee and Samaria
  chosen_spanish: en toda Judea, Galilea y Samaria
  alternatives_spanish:
  - por toda Judea, Galilea y Samaria
  - en toda la región de Judea, Galilea y Samaria
  lexicon: BDAG
  rationale: La idea es distributiva/regional. «En toda» refleja ὅλης sin sonar forzado, y mantiene la enumeración geográfica de forma clara en español.
- source_word: εἶχεν εἰρήνην
  english_pob_choice: had peace
  chosen_spanish: tenía paz
  alternatives_spanish:
  - estaba en paz
  - gozaba de paz
  lexicon: BDAG
  rationale: «Tenía paz» reproduce de manera directa la construcción y conserva el sentido de calma y alivio, sin desplazar el énfasis hacia una paráfrasis más interpretativa.
- source_word: οἰκοδομουμένη
  english_pob_choice: was being built up
  chosen_spanish: era edificada
  alternatives_spanish:
  - era edificada espiritualmente
  - iba siendo edificada
  lexicon: BDAG
  rationale: La metáfora de construcción debe conservarse. «Era edificada» mantiene el pasivo progresivo del griego y es natural en español bíblico; evita sustituir la imagen por una explicación.
- source_word: πορευομένη
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - viviendo
  - conduciéndose
  lexicon: BDAG
  rationale: En Lucas-Hechos, el participio expresa manera de vivir o conducta. «Andando» conserva la metáfora de caminar y funciona bien junto al participio anterior en español.
- source_word: τῷ φόβῳ τοῦ κυρίου
  english_pob_choice: in the fear of the Lord
  chosen_spanish: en el temor del Señor
  alternatives_spanish:
  - con reverencia por el Señor
  - en reverente temor del Señor
  lexicon: BDAG
  rationale: «Temor del Señor» es la expresión bíblica tradicional y fiel al rango semántico de φόβος aquí, que incluye reverencia y obediencia, no sólo terror.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto, la equivalencia establecida es «Señor». Se conserva el matiz bíblico y la ambigüedad reverente del título griego, sin especificar más de lo que el texto exige.
- source_word: τῇ παρακλήσει τοῦ ἁγίου πνεύματος
  english_pob_choice: in the encouragement of the Holy Spirit
  chosen_spanish: en el estímulo del Espíritu Santo
  alternatives_spanish:
  - en el consuelo del Espíritu Santo
  - en la exhortación del Espíritu Santo
  - en el aliento del Espíritu Santo
  lexicon: BDAG
  rationale: παράκλησις admite varios matices. Aquí «estímulo» preserva la idea de sostén activo y ayuda a expresar el impulso edificante del Espíritu en un contexto de crecimiento; se mantiene la ambigüedad útil con alternativas cercanas.
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - del Espíritu de santidad
  lexicon: BDAG
  rationale: La traducción normal y precisa en español es «Espíritu Santo», manteniendo la referencia personal y divina sin arcaísmos.
- source_word: ἐπληθύνετο
  english_pob_choice: it was multiplying
  chosen_spanish: se multiplicaba
  alternatives_spanish:
  - aumentaba
  - crecía en número
  lexicon: BDAG
  rationale: El imperfecto expresa aumento continuo. «Se multiplicaba» conserva la fuerza del verbo griego y la referencia colectiva a la iglesia.
theological_decisions:
- issue: Referencia de ἐκκλησία y el problema de número
  english_pob_reading: 'collective singular: ''the church'''
  chosen_spanish_reading: 'singular colectivo: ''la iglesia'''
  alternative_spanish_readings:
  - 'plural textual variant: ''las iglesias'''
  rationale: El texto base griego es singular, y los verbos concuerdan con ese singular. La traducción principal mantiene la unidad eclesial; la lectura plural se reserva como variante textual documentada.
  doctrine_reference: Hechos 9:31; variante textual indicada en el audit trail
- issue: Sentido de 'temor del Señor'
  english_pob_reading: reverent awe and obedient piety, not servile terror
  chosen_spanish_reading: reverencia obediente y piedad fiel, no terror servil
  alternative_spanish_readings:
  - terror ante el Señor
  - simple respeto religioso
  rationale: La frase bíblica conserva su carga teológica si se traduce de forma literal. En español, «temor del Señor» es suficientemente transparente y no reduce el contenido a una mera emoción de miedo.
  doctrine_reference: Hechos 9:31; uso bíblico de φόβος τοῦ κυρίου
- issue: Alcance de παράκλησις aplicada al Espíritu Santo
  english_pob_reading: encouragement
  chosen_spanish_reading: estímulo
  alternative_spanish_readings:
  - consuelo
  - exhortación
  - aliento
  rationale: El contexto de paz, edificación y multiplicación favorece un sentido de impulso edificante. «Estímulo» es amplio y conserva la polisemia sin cerrarla a un solo matiz.
  doctrine_reference: Hechos 9:31; campo semántico de παράκλησις
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la fluidez de «was being built up» sin cambiar el sentido. En español se reflejó ese flujo con dos predicados coordinados: «tenía paz y era edificada». También se conservó el paralelismo participial de «andando... y... se multiplicaba» para mantener la progresión del griego.'
  spanish_consistency_notes:
  - Se usó «iglesia» en singular colectivo para seguir el texto base y no la variante plural.
  - Se mantuvo «Señor» para κύριος, conforme al estándar POB y al contexto reverente.
  - «Espíritu Santo» se capitaliza como nombre propio divino.
  - «Era edificada» conserva la metáfora de construcción y el aspecto progresivo del original.
  - Se evitó introducir explicaciones doctrinales en el cuerpo del versículo; las matizaciones quedan en notas y decisiones.
