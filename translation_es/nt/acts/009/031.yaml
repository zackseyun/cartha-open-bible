base_translation:
  language: en
  yaml_path: translation/nt/acts/009/031.yaml
  text: So then the church throughout all Judea and Galilee and Samaria had peace and was being built up[a]; and walking in the fear of the Lord and in the encouragement of the Holy Spirit[b], it was multiplying.
