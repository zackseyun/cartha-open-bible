translation:
  language: es
  text: Pero Saulo llegó a saber de su conspiración[a]. También vigilaban las puertas día y noche para matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las puertas de la ciudad». El griego dice simplemente «las puertas»; el contexto de la ciudad queda entendido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη
  english_pob_choice: became known
  chosen_spanish: llegó a ser conocida
  alternatives_spanish:
  - se supo
  - fue dada a conocer
  lexicon: BDAG
  rationale: El aoristo pasivo de γινώσκω expresa que el plan llegó a conocimiento de Saulo. «Llegó a ser conocida» conserva el matiz pasivo e impersonal sin añadir un agente que el griego no menciona.
- source_word: ἐπιβουλή
  english_pob_choice: plot
  chosen_spanish: conspiración
  alternatives_spanish:
  - plan
  - intriga
  - complot
  lexicon: BDAG
  rationale: El término puede designar un plan hostil o una maquinación. Aquí, por el contexto de querer matarlo, «conspiración» comunica bien la intención hostil. En el texto principal se mantiene una opción más fuerte que «plan», pero no se exagera más allá del sentido del pasaje.
- source_word: παρετηροῦντο
  english_pob_choice: were watching
  chosen_spanish: estaban vigilando
  alternatives_spanish:
  - estaban observando
  - lo estaban esperando
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo expresa vigilancia continua. «Estaban vigilando» conserva la duración y sugiere la vigilancia activa que el contexto exige.
- source_word: πύλας
  english_pob_choice: gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas de la ciudad
  - los portones
  lexicon: BDAG
  rationale: El griego dice simplemente «las puertas». En español, «puertas» mantiene la literalidad básica. El contexto urbano permite entender que se trata de las puertas de la ciudad sin introducir esa especificación en el texto principal.
- source_word: ἡμέρας τε καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  lexicon: BDAG
  rationale: La expresión genitiva es idiomática y señala continuidad. «Día y noche» es la equivalencia natural en español y preserva la idea de vigilancia incesante.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: La cláusula introduce propósito. En español, «para matarlo» expresa de manera directa y natural el valor final sin sobrecargar la frase.
- source_word: ἀνέλωσιν
  english_pob_choice: might kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarlo de en medio
  - darle muerte
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar o dar muerte. «Matarlo» es la traducción más clara y fiel en español moderno; evita una paráfrasis más amplia como «quitarlo de en medio».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ marca transición narrativa y contraste leve. «Pero» refleja bien el paso desde la noticia del complot a la vigilancia de las puertas.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: 'La partícula añade un dato suplementario: no solo había conspiración, sino también vigilancia. «También» conserva esa adición simple y natural.'
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el auditorio inglés POB: se mantuvo la estructura de dos cláusulas, la continuidad del imperfecto y la finalidad del infinitivo, sin introducir agentes ni detalles no presentes en el original. La nota sobre πύλας conserva la alternativa léxica documentada en el inglés.'
  spanish_consistency_notes:
  - Se prefirió «conspiración» para ἐπιβουλή por la carga hostil del contexto, pero sin convertirla en una explicación interpretativa extensa.
  - «Puertas» mantiene la simplicidad del griego; la referencia a la ciudad queda en la nota, no en el cuerpo.
  - «Matarlo» conserva la finalidad explícita de ὅπως + subjuntivo aoristo sin suavizar el sentido.
  - Se usó puntuación y sintaxis naturales para español, respetando el orden lógico de las dos acciones principales.
