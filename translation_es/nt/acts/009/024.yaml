review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido general del griego: Saulo llegó a saber del complot, y sus enemigos vigilaban las puertas continuamente para matarlo. Sin embargo, «llegó a ser conocida por Saulo» es innecesariamente pesado en español y menos idiomático que una forma impersonal/pasiva más natural. Además, la conjunción inicial de la segunda oración puede fluir mejor sin perder el valor aditivo de καὶ.'
  spanish_quality_summary: El español es claro y fiel, pero algo rígido en «llegó a ser conocida por Saulo». También conviene evitar «Y también» al inicio de oración; «También» solo o una estructura integrada suena más natural y digna. «Las puertas» y la nota al pie están bien resueltas.
  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. Las decisiones léxicas concuerdan en general con el expediente inglés. «Conspiración» es aceptable para ἐπιβουλή, aunque «complot» o «conjura» también podrían funcionar; no requiere cambio. «Las puertas» preserva correctamente πύλας, con alternativa en nota.
  issues:
  - severity: medium
    issue: «llegó a ser conocida por Saulo» suena forzado en español
    rationale: Aunque intenta reflejar el pasivo de ἐγνώσθη, en español bíblico natural es preferible «Saulo llegó a saber de su complot» o «su complot llegó a conocimiento de Saulo». La formulación actual es gramatical pero poco idiomática.
  - severity: low
    issue: «Y también estaban vigilando» es algo torpe como arranque de oración
    rationale: El καὶ aditivo se puede conservar de forma más natural con «También vigilaban...» o «Además, vigilaban...». Esto mejora la fluidez sin alterar el sentido.
