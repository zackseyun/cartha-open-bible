translation:
  language: es
  text: Ahora bien, sucedió que, mientras Pedro pasaba por todos[a], también descendió hasta donde estaban los santos que vivían en Lida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por todas las regiones»; el griego dice «por todos», dejando implícito el objeto por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Ahora bien, sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Ahora sucedió que
  lexicon: BDAG
  rationale: La fórmula narrativa griega marca transición de relato. «Ahora bien» preserva el giro discursivo, y «sucedió que» refleja Ἐγένετο sin sonar demasiado arcaico en español.
- source_word: Πέτρον
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pablo
  lexicon: Nombre propio
  rationale: Nombre propio estándar en español para Πέτρος.
- source_word: διερχόμενον
  english_pob_choice: was passing through
  chosen_spanish: pasaba por
  alternatives_spanish:
  - iba pasando por
  - recorría
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso. «Pasaba por» comunica bien el movimiento continuo sin forzar una perífrasis muy pesada.
- source_word: διὰ πάντων
  english_pob_choice: through all of them
  chosen_spanish: por todos[a]
  alternatives_spanish:
  - por todas aquellas regiones
  - entre todos
  lexicon: BDAG
  rationale: La construcción es elíptica en griego; el objeto queda implícito por el contexto. «Por todos» conserva esa brevedad y deja abierta la referencia, por lo que requiere nota.
- source_word: κατελθεῖν
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo expresa movimiento hacia abajo. «Descendió» mantiene el valor direccional de κατέρχομαι y suena natural y digno en español.
- source_word: τοὺς ἁγίους
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los creyentes
  lexicon: BDAG
  rationale: «Santos» reproduce el sustantivo técnico usado para los creyentes, sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: τοὺς κατοικοῦντας
  english_pob_choice: living
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - residentes
  lexicon: BDAG
  rationale: El participio de residencia se puede verter como «habitaban» para conservar un registro bíblico claro y preciso, sin perder el sentido de permanencia.
- source_word: Λύδδα
  english_pob_choice: Lydda
  chosen_spanish: Lida
  alternatives_spanish:
  - Lidda
  - Lydda
  lexicon: Nombre propio
  rationale: Se adopta la forma usual en español bíblico para el topónimo, manteniendo la identificación geográfica del lugar.
theological_decisions:
- issue: Tratamiento de ἁγίοις como designación de creyentes
  english_pob_reading: the saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los creyentes
  - los santos de Dios
  rationale: La frase funciona como apelativo comunitario en el texto y no requiere una expansión. «Los santos» conserva la designación eclesial sin suavizarla.
  doctrine_reference: Uso neotestamentario de ἅγιοι para la comunidad creyente
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del inglés POB, que reintrodujo explícitamente «it happened that» para reflejar Ἐγένετο con mayor plenitud. En español se integró ese valor narrativo con «sucedió que», manteniendo también la nota sobre la elipsis de διὰ πάντων.
  spanish_consistency_notes:
  - Se usa «Pedro» y «Lida» conforme a las formas normales en español bíblico.
  - Se conservó «los santos» como término comunitario, en paralelo con la decisión inglesa.
  - No se introdujo «SEÑOR» ni otras sustituciones terminológicas no requeridas por el texto.
  - La nota textual/lexical sobre διὰ πάντων se ancla en el término «por todos» para preservar la ambigüedad documentada.
