translation:
  language: es
  text: 'Y el Señor le dijo: «Levántate y ve a la calle llamada Recta, y en casa de Judas busca a un hombre de Tarso llamado Saulo[a], porque he aquí, está orando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Saulo de Tarso». El adjetivo griego Ταρσέα identifica a Saulo por su procedencia de Tarso.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Mantengo el título reverencial y narrativo que el POB inglés traduce como ‘Lord’. En español, ‘el Señor’ es la forma natural y digna para este contexto, sin explicitar más de lo que el griego dice en esta cláusula.
- source_word: Ἀναστὰς
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - Levantándose
  lexicon: BDAG
  rationale: El participio aoristo con valor imperatival pide una orden inicial de acción. ‘Levántate’ comunica de manera natural el arranque de la acción en español y conserva el tono directo del mandato.
- source_word: πορεύθητι
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - ponte en camino
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι se expresa con el verbo directo ‘ve’, que en español es claro, breve y suficientemente cercano al mandato griego.
- source_word: ῥύμην
  english_pob_choice: street
  chosen_spanish: la calle
  alternatives_spanish:
  - la callejuela
  - la vía
  lexicon: BDAG
  rationale: ῥύμη designa una vía urbana; ‘calle’ es la equivalencia más clara y natural en español. ‘Callejuela’ sería más específica de lo que el texto exige.
- source_word: τὴν καλουμένην Εὐθεῖαν
  english_pob_choice: called Straight
  chosen_spanish: llamada Recta
  alternatives_spanish:
  - nombrada Recta
  - llamada Derecha
  lexicon: BDAG
  rationale: Conservo la construcción nominativa del nombre de la calle. ‘Recta’ reproduce el sentido del adjetivo propio y mantiene el valor de nombre de lugar que el texto griego establece.
- source_word: ἐν οἰκίᾳ Ἰούδα
  english_pob_choice: at the house of Judas
  chosen_spanish: en casa de Judas
  alternatives_spanish:
  - en la casa de Judas
  - en la vivienda de Judas
  lexicon: BDAG
  rationale: La preposición ἐν con oἰκία puede funcionar locativamente. ‘En casa de Judas’ es natural en español bíblico y refleja el lugar donde debe buscarlo sin añadir una formulación más pesada.
- source_word: ζήτησον
  english_pob_choice: look for
  chosen_spanish: busca
  alternatives_spanish:
  - búscalo
  - pregunta por
  lexicon: BDAG
  rationale: ζητέω aquí significa buscar a alguien. ‘Busca’ preserva la idea de indagación activa y evita sobretraducir con ‘encontrar’, que adelantaría el resultado.
- source_word: Σαῦλον ὀνόματι Ταρσέα
  english_pob_choice: a man of Tarsus named Saul
  chosen_spanish: Saulo, de Tarso
  alternatives_spanish:
  - Saulo, originario de Tarso
  - Saulo, llamado de Tarso
  lexicon: BDAG
  rationale: El griego identifica a Saulo por nombre y origen. En español, ‘Saulo, de Tarso’ conserva de forma breve y transparente esa doble identificación. La nota explica que el adjetivo señala procedencia, no un segundo nombre.
- source_word: ἰδοὺ γὰρ
  english_pob_choice: for behold
  chosen_spanish: porque he aquí
  alternatives_spanish:
  - pues he aquí
  - porque mira
  lexicon: BDAG
  rationale: ‘He aquí’ conserva la función de énfasis y atención de ἰδού; ‘porque’ refleja γάρ como explicación causal del mandato. Juntos reproducen la fuerza discursiva del original.
- source_word: προσεύχεται
  english_pob_choice: he is praying
  chosen_spanish: está orando
  alternatives_spanish:
  - ora
  - está orando
  lexicon: BDAG
  rationale: El presente indica una acción en curso. ‘Está orando’ preserva ese aspecto progresivo de manera natural en español. ‘Orando’ mantiene el registro reverente sin introducir un matiz ajeno.
theological_decisions:
- issue: Referent of κύριος
  english_pob_reading: The speaker is rendered simply as 'the Lord' without expanding the identity in the translation.
  chosen_spanish_reading: El hablante queda como ‘el Señor’ sin añadir una identificación explícita.
  alternative_spanish_readings:
  - el Señor Jesús
  rationale: Aunque el contexto narrativo identifica al hablante, este versículo en sí usa solo κύριος. Mantener ‘el Señor’ respeta el texto inmediato y evita introducir una aclaración que el griego no expresa aquí.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'Esta redacción toma como base el texto griego SBLGNT y el audit trail inglés más reciente, conservando sus decisiones clave: ‘rise/go’, ‘street called Straight’, la localización en casa de Judas, la identificación de Saulo por nombre y procedencia, y la fuerza de ‘for behold’. Se ajustó el español para que suene natural y digno, sin mecanizar el inglés. La nota sobre Tarso se ancló en el texto para cumplir la exigencia de que toda nota tenga marcador visible.'
  spanish_consistency_notes:
  - Se usó ‘Señor’ para κύριος, coherente con el POB inglés y con el uso reverencial en español.
  - Se eligió ‘Levántate’ para expresar el participio imperatival de Ἀναστὰς sin perder naturalidad.
  - ‘Saulo, de Tarso’ conserva la procedencia indicada por Ταρσέα y evita una glosa excesiva en el cuerpo del texto.
  - La secuencia ‘porque he aquí’ mantiene tanto la causalidad de γάρ como el énfasis de ἰδού.
  - Se prefirió ‘está orando’ para reflejar el presente aspectual de προσεύχεται.
