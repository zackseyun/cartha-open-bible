revisions:
- from: 'Y el Señor le dijo: «Levántate y ve a la calle llamada Recta, y en casa de Judas busca a Saulo, de Tarso[a], porque he aquí está orando».'
  to: 'Y el Señor le dijo: «Levántate y ve a la calle llamada Recta, y en casa de Judas busca a un hombre de Tarso llamado Saulo[a], porque he aquí, está orando».'
  rationale: Se revisa para representar explícitamente ὀνόματι con 'llamado Saulo' y así preservar mejor la identificación doble del griego (nombre y procedencia). También se ajusta levemente la puntuación de 'porque he aquí' para que suene más natural en español sin perder el tono solemne ni la función discursiva del original. Se mantiene 'Señor', 'Recta', 'en casa de Judas' y 'está orando' por ser fieles y naturales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: mandato doble (''Levántate y ve''), destino (''la calle llamada Recta''), ubicación (''en casa de Judas''), objeto de búsqueda (Saulo identificado por su procedencia de Tarso) y la razón (''porque… está orando''). Sin embargo, omite explícitamente el matiz de ὀνόματι (''llamado/por nombre''), que en el texto fuente forma parte de la identificación de Saulo. Además, ''porque he aquí está orando'' suena algo forzado en español.'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita una pequeña mejora de naturalidad y precisión. 'En casa de Judas' es aceptable, y 'calle llamada Recta' funciona bien. La secuencia 'porque he aquí está orando' resulta poco idiomática; 'porque mira, está orando' sería demasiado coloquial, así que conviene conservar 'he aquí' pero con una sintaxis más natural. También es preferible explicitar 'llamado Saulo' para representar ὀνόματι.
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: κύριος -> ''Señor'', Σαῦλος -> ''Saulo'', προσεύχεται -> ''está orando''. No hay conflicto con términos teológicos principales. La única cuestión léxica relevante es que Σαῦλον ὀνόματι Ταρσέα pide en español una formulación que preserve tanto el nombre como la procedencia; ''Saulo, de Tarso'' conserva la procedencia pero difumina el valor de ὀνόματι.'
  issues:
  - severity: medium
    issue: No se refleja explícitamente ὀνόματι ('por nombre', 'llamado').
    rationale: El griego identifica al hombre tanto por nombre como por origen. 'Busca a Saulo, de Tarso' comunica bien la referencia, pero pierde un componente semántico presente en la fuente y preservado en el rastro inglés.
  - severity: low
    issue: '''Porque he aquí está orando'' suena poco natural en español.'
    rationale: Aunque reproduce literalmente las partículas, la colocación es rígida. Una leve reestructuración puede conservar el énfasis de ἰδοὺ γὰρ y mejorar la legibilidad.
  revised_spanish_text: 'Y el Señor le dijo: «Levántate y ve a la calle llamada Recta, y en casa de Judas busca a un hombre de Tarso llamado Saulo[a], porque he aquí, está orando».'
  revised_footnotes:
  - marker: a
    text: O «Saulo de Tarso». El adjetivo griego Ταρσέα identifica a Saulo por su procedencia de Tarso.
    reason: lexical_alternative
  revision_rationale: Se revisa para representar explícitamente ὀνόματι con 'llamado Saulo' y así preservar mejor la identificación doble del griego (nombre y procedencia). También se ajusta levemente la puntuación de 'porque he aquí' para que suene más natural en español sin perder el tono solemne ni la función discursiva del original. Se mantiene 'Señor', 'Recta', 'en casa de Judas' y 'está orando' por ser fieles y naturales.
