translation:
  language: es
  text: 'Y dijo: «¿Quién eres, Señor[a]?» Y él dijo: «Yo soy Jesús, a quien tú persigues».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede ser una forma respetuosa de tratamiento; aquí se traduce «Señor» conforme al valor por defecto del proyecto para κύριος y al contexto revelatorio del pasaje.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν δέ
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: BDAG
  rationale: El griego introduce una nueva intervención narrativa con δέ como conector suave. En español, «Y dijo» transmite esa continuidad sin añadir contraste. Se omite el sujeto explícito porque el español lo permite naturalmente, y el contexto ya identifica al hablante.
- source_word: Τίς εἶ
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Quién eres tú?
  - ¿Quién es usted?
  lexicon: BDAG
  rationale: La pregunta directa al interlocutor se expresa de manera natural con «¿Quién eres?». La forma conserva la fuerza interrogativa y evita un calco innecesario del orden griego.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: Se mantiene el valor reverente y la decisión auditada del inglés de traducir κύριος como «Lord». En español, «Señor» es el equivalente natural y digno; «señor» en minúscula bajaría demasiado el registro, y «amo» no corresponde al contexto de reconocimiento reverente.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo soy el que soy
  lexicon: BDAG
  rationale: La autoidentificación enfática se conserva con «Yo soy», que reproduce la forma del griego sin añadir una expansión interpretativa. «Soy yo» sería más idiomático en algunos contextos, pero aquí debilita el paralelismo formal de la declaración.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español como «Jesús». No se añade «Cristo» porque el griego aquí dice solamente Ἰησοῦς.
- source_word: ὃν σὺ διώκεις
  english_pob_choice: whom you are persecuting
  chosen_spanish: a quien tú persigues
  alternatives_spanish:
  - a quien persigues
  - a quien estás persiguiendo
  - a quien tú persigues y hostigas
  lexicon: BDAG
  rationale: El relativo acusativo se vuelve naturalmente «a quien» en español, y διώκεις se rinde con «persigues» para conservar el sentido de hostilidad activa sin sobrecargar con perífrasis. «Persigues» mantiene mejor la densidad del verbo griego que una expansión explicativa.
theological_decisions:
- issue: Traducción de κύριε en la boca de Saulo antes de la identificación completa del hablante
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: Se conserva el registro reverente y la lectura del POB en inglés, que deja abierta la ambigüedad entre cortesía y reconocimiento más pleno. En español, «Señor» mantiene esa tensión y además encaja con la revelación posterior de que el hablante es Jesús.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; contexto revelatorio de identificación divina/mesiánica'
- issue: Valor presente de διώκεις
  english_pob_reading: are persecuting
  chosen_spanish_reading: persigues
  alternative_spanish_readings:
  - estás persiguiendo
  - persigues y hostigas
  rationale: El presente griego expresa la acción en curso; en español, el presente simple comunica esa continuidad sin necesidad de perífrasis. Se evita suavizar el verbo porque el contexto es de persecución real y violenta contra Jesús en sus seguidores.
  doctrine_reference: Uso contextual de διώκω en el NT
translation_notes:
  revision_awareness: Revisión actual sin cambios necesarios según el seguimiento más reciente; la versión inglesa quedó confirmada con alto acuerdo y sin observaciones de revisión.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος de modo consistente con la política del proyecto y con la lectura auditada del pasaje.
  - Se conserva «Jesús» como nombre propio sin añadir títulos no presentes en el texto griego.
  - El verbo «persigues» reproduce el presente griego de manera natural en español y evita una paráfrasis innecesaria.
