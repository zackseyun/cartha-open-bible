translation:
  language: es
  text: Y esto llegó a saberse por toda Jope, y muchos creyeron en el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνωστὸν ... ἐγένετο
  english_pob_choice: it became known
  chosen_spanish: se dio a conocer
  alternatives_spanish:
  - llegó a conocerse
  - se hizo conocido
  lexicon: BDAG
  rationale: La construcción impersonal de γνωστόν ἐγένετο expresa que el hecho pasó a ser conocido públicamente. En español, «se dio a conocer» comunica ese resultado sin inventar un agente y mantiene el valor eventivo del griego.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δὲ funciona aquí como conector suave de avance narrativo. «Y» es la equivalencia más natural y neutra en español para no sobrecargar el enlace.
- source_word: καθ’ ὅλης τῆς Ἰόππης
  english_pob_choice: throughout all Joppa
  chosen_spanish: por toda Jope
  alternatives_spanish:
  - a lo largo de toda Jope
  - por toda la ciudad de Jope
  lexicon: BDAG
  rationale: La preposición con genitivo expresa difusión por toda el área. «Por toda Jope» conserva la distribución total con un español natural; no hace falta añadir «ciudad» porque el texto no lo especifica.
- source_word: Ἰόππης
  english_pob_choice: Joppa
  chosen_spanish: Jope
  alternatives_spanish:
  - Joppa
  - Jaffa
  lexicon: BDAG
  rationale: Se adopta la forma castellana tradicional «Jope», que es comprensible y estable en español bíblico. «Jaffa» moderniza el topónimo, pero no es la convención usual en este contexto.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - llegaron a creer
  - pusieron su fe
  lexicon: BDAG
  rationale: πιστεύω se traduce de forma directa con «creer». El aoristo narra el acto de creer; «creyeron» preserva esa entrada a la fe sin añadir explicaciones no presentes en el verso.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de personas
  lexicon: BDAG
  rationale: El adjetivo sustantivado se expresa de manera simple como «muchos». Añadir «personas» sería interpretativo y no requerido por el griego.
- source_word: ἐπὶ τὸν κύριον
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - sobre el Señor
  - en Yahvé
  lexicon: BDAG
  rationale: Con πιστεύω + ἐπί + acusativo, el sentido es depositar la confianza en el objeto de la fe. En español, «creer en» transmite de forma idiomática esa relación. Se mantiene «Señor» porque aquí κύριος es el título cristológico señalado por el contexto; no se sustituye por «Yahvé» porque el texto griego no está citando directamente el Tetragrámaton en esta forma.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia estándar y teológicamente adecuada para κύριος en Hechos. «Maestro» debilitaría el peso confesional del título en este contexto.
theological_decisions:
- issue: Renderizar πιστεύω + ἐπὶ τὸν κύριον
  english_pob_reading: believed in the Lord
  chosen_spanish_reading: creyeron en el Señor
  alternative_spanish_readings:
  - creyeron sobre el Señor
  - pusieron su fe en el Señor
  rationale: La construcción griega indica fe confiada dirigida al Señor. «Creyeron en el Señor» es la forma española más natural y fiel; conserva el acto de confiar sin convertirlo en una formulación doctrinal más estrecha que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: πίστις se mantiene como «creer/fe» según el contexto narrativo; evitar ampliaciones doctrinales no explícitas'
- issue: Traducir κύριος en un contexto cristológico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: En Hechos, κύριος aplicado al objeto de la fe suele tener peso cristológico. «Señor» preserva ese valor confesional y evita rebajar el título a un mero cargo o relación de autoridad humana.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del audit trail inglés sin introducir cambios textuales ni notas de variante; no se detectan tensiones léxicas o textuales adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene la distinción habitual del proyecto entre «Señor» para κύριος y «Yahvé» para el nombre divino, sin forzar la sustitución en este verso.
  - Se usa «creyeron» para πιστεύω en perfecto acuerdo con la narrativa, evitando una paráfrasis expansiva.
  - El topónimo se normaliza a la forma castellana tradicional «Jope» para uniformidad bíblica en español.
