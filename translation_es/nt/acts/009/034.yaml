translation:
  language: es
  text: 'Y Pedro le dijo: «Eneas, Jesús, el Mesías, te sana[a]. Levántate y haz tu cama[b].» Y enseguida se levantó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo te sana». Aquí Χριστός se traduce como «Mesías» para conservar su valor de título.
    reason: alternative_reading
  - marker: b
    text: O «arregla tu cama»; literalmente, «extiende tu lecho para ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰᾶταί
  english_pob_choice: heals
  chosen_spanish: te sana
  alternatives_spanish:
  - te está sanando
  - te cura
  - te ha sanado
  lexicon: BDAG
  rationale: El presente de ἰάομαι en discurso directo tiene fuerza declarativa y performativa. «Te sana» conserva ese valor en español sin forzar un aspecto progresivo o perfecto que el griego no exige.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre propio fijo. «Mesías» preserva el sentido titular y sigue la preferencia terminológica del proyecto cuando el contexto lo permite.
- source_word: ἀνάστηθι
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀνίστημι se refiere al acto inmediato de incorporarse. «Levántate» es natural en español y comunica con claridad el movimiento solicitado al hombre acostado.
- source_word: στρῶσον σεαυτῷ
  english_pob_choice: make your bed
  chosen_spanish: haz tu cama
  alternatives_spanish:
  - prepara tu lecho
  - acomoda tu camilla
  - extiende tu cama
  lexicon: BDAG
  rationale: στρώννυμι alude a extender o arreglar la ropa de cama. En este contexto de sanidad, «haz tu cama» es idiomático y expresa la capacidad restaurada de atender su propio lecho. Se omite una glosa explícita de «para ti» porque el imperativo español ya implica la acción personal, aunque el dativo reflexivo queda reflejado en el contexto.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: «Enseguida» es un equivalente natural y claro para εὐθέως, y mantiene la rapidez repentina del relato sin sonar pesado.
- source_word: Αἰνέα
  english_pob_choice: Aeneas
  chosen_spanish: Aeneas
  lexicon: N/A (nombre propio)
  rationale: El nombre personal se translitera para mantener la forma propia del personaje en castellano, sin intentar traducirlo.
theological_decisions:
- issue: Tratamiento de Χριστός como título en una declaración de sanidad
  english_pob_reading: Jesus Messiah heals you
  chosen_spanish_reading: Jesús Mesías te sana
  alternative_spanish_readings:
  - Jesús Cristo te sana
  - Jesús, el Mesías, te sana
  rationale: La lectura auditada entiende Χριστός como título. En español, «Mesías» conserva ese valor teológico y evita convertirlo en un mero apellido religioso. La forma «Jesús, el Mesías» sería posible, pero aquí la construcción breve refleja mejor la proclamación directa de Pedro.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título; Cristo cuando el uso es ya nombre-forma fijo'
- issue: Conservación de la fuerza imperativa en la orden de levantarse
  english_pob_reading: Get up and make your bed
  chosen_spanish_reading: Levántate y haz tu cama
  alternative_spanish_readings:
  - Ponte de pie y haz tu cama
  - Levántate y arregla tu cama
  rationale: La secuencia imperativa expresa la restauración visible e inmediata del hombre. «Levántate» y «haz tu cama» preservan el mandato concreto sin añadir explicación interpretativa.
  doctrine_reference: Principio de equivalencia óptima con atención al contexto narrativo de sanidad
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por varias revisiones sobre Χριστός: entre «Jesus Messiah» y «Jesus Christ», con una corrección posterior que restauró «Messiah» por política doctrinal. También hubo una revisión menor sobre la frase de la cama, simplificando el inglés a «make your bed». La versión española sigue esa decisión doctrinal y mantiene el sentido del comando sin añadir redundancias innecesarias.'
  spanish_consistency_notes:
  - Se usa «Jesús» y no «Iesús» o variantes arcaicas.
  - Se emplea «Mesías» para Χριστός en coherencia con la política del proyecto cuando el término es titular.
  - «Enseguida» mantiene el adverbio narrativo de rapidez y suena natural en español bíblico moderno.
  - «Haz tu cama» es una solución idiomática que conserva la acción concreta de στρώννυμι sin sobrecargar la frase.
