base_translation:
  language: en
  yaml_path: translation/nt/acts/009/034.yaml
  text: And Peter said to him[a], “Aeneas, Jesus Messiah heals you[b]. Get up and make your bed.” And immediately he got up.
  footnotes:
  - marker: a
    text: Or “Jesus Christ heals you.” The Greek title Χριστός can be rendered “Christ”; here it is translated “Messiah” to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'make your bed for yourself'.
    reason: previous_rendering
