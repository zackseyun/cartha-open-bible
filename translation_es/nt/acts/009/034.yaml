  rationale: Se ajusta «Aeneas» a «Eneas» para una forma española natural y reconocible. Se cambia «Jesús Mesías» por «Jesús, el Mesías» para conservar el valor titular de Χριστός con español idiomático y digno, en línea con la decisión teológica auditada. Se mantienen el presente performativo «te sana», el mandato «Levántate y haz tu cama», y las notas existentes, que siguen siendo adecuadas.
