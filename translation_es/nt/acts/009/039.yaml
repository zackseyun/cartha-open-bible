translation:
  language: es
  text: Entonces Pedro se levantó y fue con ellos. Cuando llegó, lo llevaron al aposento alto, y todas las viudas se pusieron junto a él[a], llorando y mostrando las túnicas y los mantos[b] que Dorcas[c] hizo mientras estaba con ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se pusieron ante él». El griego podría entenderse de manera más formal, pero el contexto sugiere que las viudas se reunieron alrededor de Pedro en su dolor.
    reason: lexical_alternative
  - marker: b
    text: «Túnicas y mantos» refleja dos términos griegos distintos para prendas, probablemente una interior y otra exterior.
    reason: cultural_note
  - marker: c
    text: Dorcas es el nombre griego; en Hechos 9:36 también se la llama Tabita.
    reason: cross_reference
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Pedro de manera narrativa y puntual. «Se levantó» es natural en español y conserva el movimiento sin sonar forzado.
- source_word: συνῆλθεν αὐτοῖς
  english_pob_choice: went with them
  chosen_spanish: fue con ellos
  alternatives_spanish:
  - acompañó a ellos
  - fue acompañado por ellos
  lexicon: BDAG
  rationale: La idea es que Pedro los acompaña. «Fue con ellos» comunica bien el sentido de compañía y evita una construcción pesada.
- source_word: παραγενόμενον
  english_pob_choice: when he arrived
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - al llegar
  - cuando hubo llegado
  lexicon: BDAG
  rationale: El participio marca el momento de la llegada respecto a la acción siguiente. «Cuando llegó» expresa con claridad esa relación temporal en español.
- source_word: ἀνήγαγον
  english_pob_choice: they took him up
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo hicieron subir
  - lo subieron
  lexicon: BDAG
  rationale: El verbo incluye movimiento hacia arriba, pero en español «lo llevaron al aposento alto» comunica el traslado con naturalidad. El contexto de «aposento alto» ya aporta la dirección ascendente.
- source_word: ὑπερῷον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - habitación alta
  - cuarto alto
  lexicon: BDAG
  rationale: «Aposento alto» es una forma tradicional y comprensible en español bíblico para un cuarto en la parte superior de la casa, y respeta el referente espacial del griego.
- source_word: παρέστησαν αὐτῷ
  english_pob_choice: stood beside him
  chosen_spanish: se pusieron junto a él
  alternatives_spanish:
  - se colocaron ante él
  - se mantuvieron junto a él
  lexicon: BDAG
  rationale: El contexto describe a las viudas congregadas alrededor de Pedro en duelo. «Se pusieron junto a él» evita una traducción demasiado formal de «presentarse» y conserva la cercanía física sugerida por el pasaje.
- source_word: πᾶσαι αἱ χῆραι
  english_pob_choice: all the widows
  chosen_spanish: todas las viudas
  alternatives_spanish:
  - todas las mujeres viudas
  lexicon: BDAG
  rationale: χῆραι significa «viudas». «Todas las viudas» mantiene el sentido directo y la fuerza colectiva del grupo.
- source_word: κλαίουσαι
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  - lamentándose
  lexicon: BDAG
  rationale: El participio expresa duelo continuo. «Llorando» es claro y natural en español, aunque «sollozando» podría intensificar el matiz emocional.
- source_word: ἐπιδεικνύμεναι
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - enseñando
  - exhibiendo
  lexicon: BDAG
  rationale: 'El gesto es demostrativo: enseñan la ropa para evidenciar el trabajo de Dorcas. «Mostrando» es la opción más transparente en español.'
- source_word: χιτῶνας
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - camisas
  - vestiduras interiores
  lexicon: BDAG
  rationale: χιτών designa una prenda básica del cuerpo. «Túnicas» conserva la categoría antigua sin modernizarla indebidamente.
- source_word: ἱμάτια
  english_pob_choice: garments
  chosen_spanish: mantos
  alternatives_spanish:
  - vestidos
  - prendas
  - ropas
  lexicon: BDAG
  rationale: En este contexto ἱμάτια contrasta con χιτῶνας y suele referir una prenda exterior. «Mantos» mantiene mejor esa posible distinción concreta que el más genérico «ropas».
- source_word: ὅσα ἐποίει
  english_pob_choice: made
  chosen_spanish: había hecho
  alternatives_spanish:
  - hacía
  - solía hacer
  lexicon: BDAG
  rationale: El imperfecto puede describir acción habitual en pasado, pero la revisión inglesa prefirió no añadir esa idea explícitamente. «Había hecho» conserva el resultado de su labor sin sobrecargar el matiz aspectual.
- source_word: μετ’ αὐτῶν οὖσα
  english_pob_choice: while she was with them
  chosen_spanish: mientras estaba con ellas
  alternatives_spanish:
  - cuando estaba con ellas
  - estando con ellas
  lexicon: BDAG
  rationale: El texto presenta la presencia de Dorcas entre las viudas. En español, el antecedente más inmediato dentro de la escena es femenino plural, por eso se mantiene «ellas» para el referente de las viudas.
- source_word: ἡ Δορκάς
  english_pob_choice: Dorcas
  chosen_spanish: Dorcas
  alternatives_spanish:
  - Tabita
  lexicon: BDAG
  rationale: El griego de este versículo usa el nombre Δορκάς; por eso se conserva esa forma en la traducción principal. «Tabita» pertenece al contexto inmediato, no a esta cláusula.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió «made» frente a «used to make» para no añadir una habitualidad explícita no exigida por el griego. También mantiene la lectura contextual de las viudas reunidas alrededor de Pedro, no una presentación formal ante él.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene la distinción entre prendas en «túnicas» y «mantos», alineada con la nota inglesa sobre dos términos griegos distintos.
  - «Dorcas» se conserva como nombre propio en la cláusula, con la nota de que «Tabita» pertenece al contexto cercano.
