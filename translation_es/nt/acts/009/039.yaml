revisions:
- from: Entonces Pedro se levantó y fue con ellos[a]. Cuando llegó, lo llevaron al aposento alto, y todas las viudas se pusieron junto a él[c][b], llorando y mostrando las túnicas y los mantos que Dorcas había hecho mientras estaba con ellas.
  to: Entonces Pedro se levantó y fue con ellos. Cuando llegó, lo llevaron al aposento alto, y todas las viudas se pusieron junto a él[a], llorando y mostrando las túnicas y los mantos[b] que Dorcas[c] hizo mientras estaba con ellas.
  rationale: 'Se corrigió el tiempo verbal de «había hecho» a «hizo» para no introducir un pluscuamperfecto ausente del griego y para seguir la revisión auditada en inglés. También se repararon las notas: se eliminó la nota incorrecta sobre «fue con ellos», se trasladó la alternativa léxica al lugar correspondiente («junto a él»), y se ordenaron/anclaron las demás notas de forma natural en español.'
  reviewer_model: gpt-5.4
