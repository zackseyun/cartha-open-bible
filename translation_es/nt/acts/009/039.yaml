review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego y conserva adecuadamente las decisiones principales: «se levantó», «fue con ellos», «cuando llegó», «aposento alto», «todas las viudas», «llorando», «mostrando» y «Dorcas». Sin embargo, «había hecho» para ὅσα ἐποίει desplaza innecesariamente el imperfecto a pluscuamperfecto y sugiere anterioridad completada más que la acción pasada descrita en la escena. También la nota a [a] no corresponde al punto léxico real de συνῆλθεν αὐτοῖς; la alternativa documentada en inglés para esa zona es sobre παρέστησαν αὐτῷ, no sobre ἀναστὰς/«fue con ellos».'
  spanish_quality_summary: El español es claro y digno, con buen ritmo narrativo. «Aposento alto» es comprensible y bíblicamente natural. «Se pusieron junto a él» suena algo más ingresivo que el inglés auditado, pero sigue siendo legible y aceptable. La mejora principal es usar un verbo simple en pasado para la ropa que Dorcas hacía/hizo, evitando el pluscuamperfecto. También conviene corregir las notas para que anclen donde corresponde y no reproduzcan el orden extraño [c][b] del inglés.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Los nombres y términos clave están bien alineados. «Mantos» para ἱμάτια es aceptable como distinción respecto de «túnicas», aunque más específico que el inglés «garments»; la nota cultural ayuda. «Dorcas» se mantiene correctamente con nota sobre «Tabita».
  issues:
  - severity: medium
    issue: «había hecho» para ὅσα ἐποίει
    rationale: El griego ἐποίει es imperfecto, no pluscuamperfecto. «Había hecho» introduce una anterioridad completada que el texto no expresa. «Hizo» o «hacía» serían más cercanos; dado el ajuste auditado en inglés, «hizo» es la opción más segura.
  - severity: medium
    issue: La nota [a] está anclada a «fue con ellos» pero comenta «se puso de pie»
    rationale: La nota no corresponde al punto de variación documentado. El inglés auditado no preserva una nota sobre ἀναστὰς, sino una alternativa sobre παρέστησαν αὐτῷ («stood before him»). Mantener [a] así confunde la base léxica.
  - severity: low
    issue: Orden y anclaje de notas junto a «junto a él[c][b]»
    rationale: Las notas deben seguir un orden claro y anclarse a la frase pertinente. En español conviene poner la nota de alternativa léxica en «junto a él[a]», la de ropa en «mantos[b]» y la de Dorcas en «Dorcas[c]».
  revised_spanish_text: Entonces Pedro se levantó y fue con ellos. Cuando llegó, lo llevaron al aposento alto, y todas las viudas se pusieron junto a él[a], llorando y mostrando las túnicas y los mantos[b] que Dorcas[c] hizo mientras estaba con ellas.
  revised_footnotes:
  - marker: a
    text: O «se pusieron ante él». El griego podría entenderse de manera más formal, pero el contexto sugiere que las viudas se reunieron alrededor de Pedro en su dolor.
    reason: lexical_alternative
  - marker: b
    text: «Túnicas y mantos» refleja dos términos griegos distintos para prendas, probablemente una interior y otra exterior.
    reason: cultural_note
  - marker: c
    text: Dorcas es el nombre griego; en Hechos 9:36 también se la llama Tabita.
    reason: cross_reference
  revision_rationale: 'Se corrigió el tiempo verbal de «había hecho» a «hizo» para no introducir un pluscuamperfecto ausente del griego y para seguir la revisión auditada en inglés. También se repararon las notas: se eliminó la nota incorrecta sobre «fue con ellos», se trasladó la alternativa léxica al lugar correspondiente («junto a él»), y se ordenaron/anclaron las demás notas de forma natural en español.'
