source:
  edition: SBLGNT
  text: ἀναστὰς δὲ Πέτρος συνῆλθεν αὐτοῖς· ὃν παραγενόμενον ἀνήγαγον εἰς τὸ ὑπερῷον, καὶ παρέστησαν αὐτῷ πᾶσαι αἱ χῆραι κλαίουσαι καὶ ἐπιδεικνύμεναι χιτῶνας καὶ ἱμάτια ὅσα ἐποίει μετ’ αὐτῶν οὖσα ἡ Δορκάς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/009/039.yaml
  text: So Peter got up and went with them[a]. When he arrived, they took him up to the upper room, and all the widows stood beside him[c][b], weeping and showing the tunics and garments that Dorcas made while she was with them.
  footnotes:
  - marker: a
    text: Or 'stood before him.' The Greek could be read more formally, but the context suggests the widows gathered around Peter in grief.
    reason: lexical_alternative
  - marker: b
    text: '''Tunics and garments'' reflects two distinct Greek clothing terms, likely referring to inner and outer garments.'
    reason: cultural_note
  - marker: c
    text: Dorcas is the Greek name; in Acts 9:36 she is also called Tabitha.
    reason: cross_reference
