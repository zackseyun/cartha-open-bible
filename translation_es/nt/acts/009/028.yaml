translation:
  language: es
  text: Y estaba con ellos en Jerusalén, entrando y saliendo, hablando con denuedo en el nombre del Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦν μετ’ αὐτῶν
  english_pob_choice: he was with them
  chosen_spanish: estaba con ellos
  alternatives_spanish:
  - estuvo con ellos
  - permanecía con ellos
  lexicon: BDAG
  rationale: El imperfecto de εἰμί con μετά + genitivo expresa asociación continua. «Estaba con ellos» conserva ese valor durativo en español sin añadir la idea más fuerte de residencia que tendría «permanecía con ellos» en este contexto.
- source_word: εἰσπορευόμενος καὶ ἐκπορευόμενος
  english_pob_choice: going in and going out
  chosen_spanish: entrando y saliendo
  alternatives_spanish:
  - yendo y viniendo
  - moviéndose libremente
  lexicon: BDAG
  rationale: La pareja de participios es una expresión idiomática de movimiento regular y relación abierta. «Entrando y saliendo» mantiene la repetición y la transparencia de la imagen, con un español natural y fiel al giro griego.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - dentro de Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele significar «a/into», aquí la frase funciona de manera locativa dentro del modismo «entrando y saliendo». «En Jerusalén» refleja mejor la esfera de actividad que la idea de entradas repetidas a la ciudad.
- source_word: παρρησιαζόμενος
  english_pob_choice: speaking boldly
  chosen_spanish: hablando con valentía
  alternatives_spanish:
  - hablando abiertamente
  - hablando con denuedo
  lexicon: BDAG
  rationale: El verbo denota discurso franco y sin temor. «Hablando con valentía» comunica bien la franqueza y la intrepidez en un español contemporáneo, conservando el sentido público y audaz del participio.
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - con la autoridad de
  - en representación de
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico con resonancias de autoridad, representación y confesión. «En el nombre de» preserva el giro tradicional del texto y deja intacto ese campo semántico sin restringirlo a una sola faceta.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesús
  - el Señor Dios
  lexicon: BDAG
  rationale: En el texto griego aparece κύριος, no un nombre propio. La traducción mantiene el título «el Señor», como hace la POB inglesa, dejando que el contexto de Hechos determine el referente sin resolverlo explícitamente en el cuerpo del versículo.
theological_decisions:
- issue: Referente de «el Señor»
  english_pob_reading: '''the Lord'' is retained as the title in the main text, with the contextual referent understood to be Jesus.'
  chosen_spanish_reading: Se conserva «el Señor» como título en el texto principal, entendiendo por contexto que el referente es Jesús.
  alternative_spanish_readings:
  - decir explícitamente «Jesús»
  - reemplazarlo por «Señor Dios»
  rationale: El griego dice κυρίου y no Ἰησοῦς. Dado que en Hechos el título tiene un referente claro por contexto, pero el texto no lo nombra aquí, conviene mantener el título traducido y no convertirlo en un nombre propio en el texto principal.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres. κύριος → Señor.'
translation_notes:
  revision_awareness: Esta versión sigue de cerca el audit trail inglés y el griego SBLGNT. No hay revisiones aplicadas en el pasaje inglés; por eso la redacción española busca equivalencia óptima con transparencia léxica y sin introducir aclaraciones interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος, conforme al criterio editorial del proyecto.
  - Se evita «entraba y salía» porque la forma participial expresa una actividad continua más que una acción puntual pasada.
  - «En Jerusalén» se usa en sentido locativo por el contexto del modismo, no como traducción mecánica de εἰς.
