    rationale: Aunque comunica parte del sentido, atenúa el matiz de franqueza pública/audaz característico del verbo en Hechos. «Hablando con denuedo» o «hablando abiertamente» preserva mejor la fuerza léxica y la consistencia terminológica bíblica.
  revised_spanish_text: Y estaba con ellos en Jerusalén, entrando y saliendo, hablando con denuedo en el nombre del Señor.
  revision_rationale: Se reordena «en Jerusalén» para reflejar mejor que modifica toda la actividad de Saulo, como en el inglés POB («with them in Jerusalem, going in and going out»), y se cambia «hablando con valentía» por «hablando con denuedo» para representar con mayor precisión y consistencia el valor de παρρησιαζόμενος en Hechos. No hacen falta notas.
