translation:
  language: es
  text: Y cuando llegó a Jerusalén[a], intentaba unirse a los discípulos, pero todos le tenían miedo porque no creían que fuera discípulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adherirse a los discípulos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγενόμενος
  english_pob_choice: when he came
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - después de llegar
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo introduce una circunstancia anterior a la acción principal. En español, «cuando llegó» reproduce bien el valor temporal y suena natural sin perder la secuencia narrativa.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como un conector narrativo suave. «Y» conserva el avance del relato sin cargar de contraste innecesario.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - en Jerusalén
  lexicon: BDAG
  rationale: El uso direccional de εἰς con una ciudad se expresa con naturalidad en español con «a»; mantiene la idea de llegada al lugar.
- source_word: ἐπείραζεν
  english_pob_choice: he was trying
  chosen_spanish: intentaba
  alternatives_spanish:
  - trataba de
  - estaba intentando
  lexicon: BDAG
  rationale: El imperfecto transmite una acción en curso y no simplemente un intento puntual. «Intentaba» preserva ese aspecto y resulta idiomático en español.
- source_word: κολλᾶσθαι
  english_pob_choice: to join
  chosen_spanish: unirse
  alternatives_spanish:
  - pegarse a
  - adherirse a
  - atarse a
  lexicon: BDAG
  rationale: El verbo medio infinitivo puede significar literalmente «adherirse/pegarse», pero en este contexto social la idea es buscar admisión o cercanía con el grupo. «Unirse» comunica esa relación sin institucionalizarla.
- source_word: τοῖς μαθηταῖς
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los discípulos allí
  lexicon: BDAG
  rationale: El artículo define el grupo conocido de discípulos en Jerusalén. «Los discípulos» mantiene la referencia estándar de μαθητής en Hechos.
- source_word: ἐφοβοῦντο αὐτόν
  english_pob_choice: they were all afraid of him
  chosen_spanish: todos le tenían miedo
  alternatives_spanish:
  - todos estaban asustados de él
  - todos lo temían
  lexicon: BDAG
  rationale: El imperfecto expresa un estado continuo de temor. «Le tenían miedo» es una formulación natural en español y conserva el sentido relacional del verbo.
- source_word: μὴ πιστεύοντες
  english_pob_choice: not believing
  chosen_spanish: no creyendo
  alternatives_spanish:
  - porque no creían
  - ya que no creían
  lexicon: BDAG
  rationale: El participio con μή da la razón de su temor. «No creyendo» mantiene la relación participial de manera compacta, como en el griego.
- source_word: ὅτι ἐστὶν μαθητής
  english_pob_choice: that he was a disciple
  chosen_spanish: que fuera discípulo
  alternatives_spanish:
  - que era discípulo
  - que es discípulo
  lexicon: BDAG
  rationale: Aunque el griego usa presente, el español suele retroceder el tiempo en discurso indirecto después de un verbo principal en pasado. «Que fuera discípulo» comunica con claridad la duda de ellos sin forzar el tiempo presente.
theological_decisions:
- issue: La naturaleza de la relación que Saulo intenta establecer con los discípulos
  english_pob_reading: Renderized κολλᾶσθαι as 'to join' rather than a more institutional or sacramental expression.
  chosen_spanish_reading: «unirse a los discípulos»
  alternative_spanish_readings:
  - «adherirse a los discípulos»
  - «asociarse con los discípulos»
  rationale: El versículo describe el esfuerzo de Saulo por ser recibido entre los discípulos, no una categoría eclesial formal. «Unirse» conserva la dimensión social y comunitaria sin introducir estructuras posteriores.
  doctrine_reference: 'Translation philosophy: original-language primacy; preservar la tensión teológica y narrativa sin resolverla artificialmente.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en su solución principal: llegada a Jerusalén, intento de acercarse a los discípulos, y el temor general por la incredulidad acerca de su discipulado. No se observaron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - «discípulos» mantiene la terminología estándar para μαθηταῖς/μαθητής en Hechos.
  - «unirse» evita importar una formulación eclesiástica ajena al contexto narrativo.
  - Se conservó el valor imperfectivo de ἐπείραζεν y ἐφοβοῦντο con formas naturales en español.
  - Se añadió nota lexical para reflejar la alternativa más literal de κολλᾶσθαι, siguiendo el criterio auditado del POB.
