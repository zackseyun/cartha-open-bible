translation:
  language: es
  text: y le pidió cartas para las sinagogas en Damasco[a], para que, si hallaba a algunos que eran del Camino, hombres y mujeres, los llevara atados a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Camino» o «seguidores del Camino». El griego usa un título temprano para el movimiento cristiano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐτήσατο
  english_pob_choice: asked
  chosen_spanish: le pidió
  alternatives_spanish:
  - le solicitó
  - le pidió a
  lexicon: BDAG
  rationale: El aoristo medio de αἰτέω expresa pedir/solicitar. En español, «le pidió» conserva el valor de súplica o solicitud y fluye con naturalidad antes del complemento de objeto directo «cartas».
- source_word: παρ’ αὐτοῦ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - a él
  lexicon: BDAG
  rationale: La construcción con παρά + genitivo marca la persona de quien se pide algo. En español, el dativo «le» expresa mejor esa relación que una repetición más pesada como «de él».
- source_word: ἐπιστολὰς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas de autorización
  - documentos
  lexicon: BDAG
  rationale: ἐπιστολή significa literalmente «carta». El contexto sugiere autoridad, pero el sustantivo por sí mismo no obliga a explicitar «de autorización» en el texto principal.
- source_word: εἰς Δαμασκὸν πρὸς τὰς συναγωγάς
  english_pob_choice: to the synagogues in Damascus
  chosen_spanish: para las sinagogas de Damasco
  alternatives_spanish:
  - a las sinagogas de Damasco
  - en Damasco, para las sinagogas
  lexicon: BDAG
  rationale: Las dos preposiciones griegas sitúan las cartas dirigidas a las sinagogas ubicadas en Damasco. En español, «para las sinagogas de Damasco» comunica con claridad la dirección y destino de las cartas sin recargar con dos preposiciones seguidas.
- source_word: ὅπως ἐάν
  english_pob_choice: so that if
  chosen_spanish: para que, si
  alternatives_spanish:
  - a fin de que, si
  - para que cuando
  lexicon: BDAG
  rationale: ὅπως introduce propósito, y ἐάν con subjuntivo añade contingencia. «Para que, si» preserva ambas ideas en español natural.
- source_word: τινας
  english_pob_choice: any
  chosen_spanish: a algunos
  alternatives_spanish:
  - a cualquiera
  - a algunos de ellos
  lexicon: BDAG
  rationale: En este contexto condicional, τινας funciona como objeto indefinido plural. «A algunos» evita una abstracción excesiva y encaja con el arresto de personas concretas.
- source_word: τῆς ὁδοῦ
  english_pob_choice: belonging to the Way
  chosen_spanish: que eran del Camino
  alternatives_spanish:
  - del Camino
  - pertenecientes al Camino
  - seguidores del Camino
  lexicon: BDAG
  rationale: La expresión es un título temprano del movimiento cristiano. «Del Camino» preserva la designación; la relativa «que eran» reproduce el participio ὄντας con una formulación natural en español. Se conserva la tensión entre pertenencia y descripción literal del genitivo.
- source_word: ἄνδρας τε καὶ γυναῖκας
  english_pob_choice: both men and women
  chosen_spanish: hombres y mujeres
  alternatives_spanish:
  - tanto hombres como mujeres
  - varones y mujeres
  lexicon: BDAG
  rationale: La coordinación τε καὶ enumera explícitamente ambos sexos. «Hombres y mujeres» mantiene esa inclusividad de forma directa y estándar en español.
- source_word: δεδεμένους
  english_pob_choice: bound
  chosen_spanish: presos
  alternatives_spanish:
  - atados
  - encadenados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de δέω indica un estado de sujeción. En español, «presos» comunica el resultado esperado del arresto en este contexto narrativo; «atados» o «encadenados» son posibles, pero añaden una imagen más específica que el griego no exige.
- source_word: ἀγάγῃ
  english_pob_choice: he might bring
  chosen_spanish: los trajera
  alternatives_spanish:
  - los llevara
  - los condujera
  lexicon: BDAG
  rationale: El aoristo subjuntivo de ἄγω en cláusula de propósito expresa la acción prevista. «Los trajera» es natural en español y conserva la idea de traslado hacia Jerusalén.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - para Jerusalén
  lexicon: BDAG
  rationale: Con un nombre de ciudad, εἰς suele verterse como «a». «A Jerusalén» es idiomático y fiel.
theological_decisions:
- issue: Traducción de τῆς ὁδοῦ como designación del movimiento cristiano temprano
  english_pob_reading: the Way
  chosen_spanish_reading: el Camino
  alternative_spanish_readings:
  - del Camino
  - seguidores del Camino
  - el movimiento llamado el Camino
  rationale: La expresión funciona como título reconocido de la comunidad cristiana primitiva. «El Camino» conserva la identificación histórica sin convertirla en paráfrasis explicativa dentro del texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mención explícita de ambos sexos en ἄνδρας τε καὶ γυναῖκας
  english_pob_reading: both men and women
  chosen_spanish_reading: hombres y mujeres
  alternative_spanish_readings:
  - tanto hombres como mujeres
  - varones y mujeres
  rationale: El griego nombra de manera explícita a hombres y mujeres, subrayando el alcance del arresto planeado. La traducción conserva esa especificidad sin neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente: no hubo cambios necesarios tras la última pasada editorial, y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Camino» con mayúscula como designación del movimiento cristiano temprano, en línea con el tratamiento auditado en inglés.
  - Se conserva «Jesalén»? No; se usa «Jerusalén» como forma española estable y reconocible.
  - El verbo «pedir» y el dativo «le» reflejan la relación sintáctica de αἰτέω + παρά sin añadir contenido interpretativo.
  - «Presos» se eligió por claridad narrativa española, aunque el griego habla de un estado de sujetos/atados; la nota lexical explicita esta decisión.
