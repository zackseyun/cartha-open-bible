translation:
  language: es
  text: Y enseguida, en las sinagogas, proclamaba acerca de Jesús[a], que Jesús es el Hijo de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «predicaba a Jesús» o «estaba proclamando a Jesús». El verbo griego expresa proclamación pública.
    reason: lexical_alternative
  - marker: b
    text: O, «Hijo de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio expresa prontitud narrativa. «Enseguida» suena natural en español moderno y conserva la rapidez del giro sin volverlo demasiado técnico o solemne.
- source_word: ἐν ταῖς συναγωγαῖς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - entre las sinagogas
  - en las sinagogas locales
  lexicon: BDAG
  rationale: Se mantiene el plural y el valor locativo de ἐν con el plural de συναγωγή. No se introduce una especificación que el griego no exige.
- source_word: ἐκήρυσσεν
  english_pob_choice: began proclaiming
  chosen_spanish: proclamaba
  alternatives_spanish:
  - predicaba
  - anunciaba públicamente
  - estaba proclamando
  lexicon: BDAG
  rationale: κηρύσσω tiene fuerza de proclamación pública. «Proclamaba» preserva mejor ese valor que «predicaba», que en español puede sonar más eclesiástico o más estrecho. No se añadió «comenzó» porque el imperfecto ya presenta la acción en curso, y «enseguida» aporta la progresión narrativa.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  - sobre Jesús
  lexicon: BDAG
  rationale: El acusativo directo tras κηρύσσω se expresa en español con «a Jesús». Así se conserva el carácter directo y cristocéntrico de la frase sin introducir «sobre» ni explicar de más el contenido.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que,
  - a saber, que
  lexicon: BDAG
  rationale: Introduce de manera natural el contenido de la proclamación en español.
- source_word: οὗτός
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - este mismo
  - él mismo
  lexicon: BDAG
  rationale: El demostrativo señala de forma enfática al referente; en español, «él» mantiene la referencia clara y evita una repetición artificial. La alternativa «este» sonaría más marcada y podría oscurecer la fluidez en español.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  - Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico directo y plenamente transparente. «Hijo de Dios» sin artículo debilitaría la referencia definida del griego; por eso se mantiene «el Hijo de Dios».
theological_decisions:
- issue: 'Título cristológico: ὁ υἱὸς τοῦ θεοῦ'
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - el Hijo de Dios de Dios
  rationale: El texto atribuye explícitamente a Jesús el título de Hijo de Dios. La traducción conserva esa afirmación sin suavizarla ni sustituirla por una paráfrasis doctrinalmente más blanda.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Valor de οὗτός en la cláusula de contenido
  english_pob_reading: he
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - este
  - él mismo
  rationale: El griego conserva un deíctico enfático. En español, «él» mantiene el referente personal de manera natural, sin perder la identificación de Jesús como sujeto de la predicación.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y también toma en cuenta el auditorio de revisión inglés, donde se prefirió un referente más natural para οὗτός. En español se resolvió con «él», manteniendo la claridad referencial sin introducir una paráfrasis innecesaria. También se evitó copiar el comienzo ingesivo inglés («began proclaiming») porque el imperfecto griego y «enseguida» ya expresan bien la progresión narrativa.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» para θεοῦ.
  - Se mantiene «Hijo de Dios» como título cristológico definido, no como expresión genérica.
  - Se preserva la fuerza pública de κηρύσσω con «proclamaba».
  - Se evita la terminología eclesiástica tradicional cuando no es exigida por el griego.
