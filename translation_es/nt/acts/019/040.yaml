translation:
  language: es
  text: Porque en verdad estamos en peligro de ser acusados de motín[a] por lo de hoy, ya que no hay causa alguna, y no podremos dar razón de este alboroto[b]. Y, después de decir estas cosas[c], despidió a la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sedición' o 'insurrección'; el término griego puede denotar un serio levantamiento civil, pero aquí 'motín' refleja mejor el contexto inmediato de una agitación pública ante las autoridades.
    reason: lexical_alternative
  - marker: b
    text: O 'tumulto' o 'conmoción'; el griego se refiere a esta reunión tumultuosa y se distingue de la asamblea más formal que aparece después en el versículo.
    reason: lexical_alternative
  - marker: c
    text: La palabra traducida 'asamblea' es la misma palabra griega que a menudo se usa en otros lugares para 'iglesia', pero aquí se refiere a la asamblea cívica de Éfeso.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque en verdad
  alternatives_spanish:
  - Pues en verdad
  - Porque ciertamente
  lexicon: BDAG
  rationale: La combinación introduce una explicación con énfasis. 'Porque en verdad' conserva el valor causal de καὶ γάρ y el matiz enfático sin sonar forzado en español.
- source_word: κινδυνεύομεν
  english_pob_choice: we are in danger
  chosen_spanish: estamos en peligro
  alternatives_spanish:
  - corremos peligro
  - estamos en riesgo
  lexicon: BDAG
  rationale: El presente expresa una situación actual. 'Estamos en peligro' es natural en español y mantiene la inmediatez del aviso del secretario.
- source_word: ἐγκαλεῖσθαι
  english_pob_choice: of being charged
  chosen_spanish: de ser acusados
  alternatives_spanish:
  - de ser imputados
  - de ser llevados a juicio
  lexicon: BDAG
  rationale: En el contexto cívico-judicial, el verbo tiene fuerza forense. 'Ser acusados' conserva esa carga sin volver demasiado técnico el español.
- source_word: στάσεως
  english_pob_choice: rioting
  chosen_spanish: sedición[a]
  alternatives_spanish:
  - motín
  - insurrección
  - alboroto
  lexicon: BDAG
  rationale: El término puede abarcar desorden civil serio, incluso levantamiento. Opté por 'sedición' para reflejar la gravedad política/jurídica que el contexto romano sugiere, dejando 'alboroto' aparte para el sustantivo final συστροφή. La nota ofrece alternativas reconocidas en el campo semántico.
- source_word: περὶ τῆς σήμερον
  english_pob_choice: over what happened today
  chosen_spanish: por lo de hoy
  alternatives_spanish:
  - sobre lo ocurrido hoy
  - acerca de los hechos de hoy
  lexicon: BDAG
  rationale: La construcción es idiomática; 'por lo de hoy' suena natural en español y remite claramente al incidente del día, como en el audit trail inglés.
- source_word: μηδενὸς αἰτίου ὑπάρχοντος
  english_pob_choice: since there is no cause for it
  chosen_spanish: ya que no hay causa alguna
  alternatives_spanish:
  - puesto que no existe motivo
  - ya que no hay razón válida
  lexicon: BDAG
  rationale: La frase expresa una ausencia de fundamento. 'Causa' preserva el matiz causal/legal de αἴτιον, y 'causa alguna' refuerza la negación.
- source_word: ἀποδοῦναι λόγον
  english_pob_choice: to give an account
  chosen_spanish: dar razón
  alternatives_spanish:
  - dar cuenta
  - rendir explicación
  lexicon: BDAG
  rationale: Es un modismo para explicar o responder de algo. 'Dar razón' conserva la idea de justificar el incidente y suena natural en español bíblico contemporáneo.
- source_word: συστροφῆς
  english_pob_choice: commotion
  chosen_spanish: alboroto[b]
  alternatives_spanish:
  - tumulto
  - agitación
  - revoltijo
  lexicon: BDAG
  rationale: La palabra describe una aglomeración tumultuosa; 'alboroto' expresa bien el carácter público y desordenado sin sobreprecisar 'motín'. La nota permite la alternativa 'commotion' del audit trail en inglés, aquí adaptada al español.
- source_word: ἐκκλησίαν
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la reunión
  - el consejo
  lexicon: BDAG
  rationale: Aquí ἐκκλησία designa la asamblea cívica de Éfeso, no la iglesia. 'Asamblea' conserva el sentido formal y evita confusión eclesiástica.
- source_word: ἀπέλυσεν
  english_pob_choice: dismissed
  chosen_spanish: despidió
  alternatives_spanish:
  - disolvió
  - dio por terminada
  lexicon: BDAG
  rationale: En el contexto de una reunión pública, 'despidió' comunica que la dio por terminada y envió a la gente a irse; es idiomático y fiel.
theological_decisions:
- issue: Sentido de ἐκκλησία como cuerpo eclesial versus asamblea cívica
  english_pob_reading: The word translated 'assembly' is the same Greek word often used elsewhere for 'church,' but here it refers to the civic assembly in Ephesus.
  chosen_spanish_reading: ἐκκλησία se traduce aquí como 'asamblea' cívica de Éfeso, no como 'iglesia'.
  alternative_spanish_readings:
  - '''iglesia'''
  - '''congregación'''
  rationale: El contexto inmediato es una reunión pública convocada por autoridades civiles; el POB en inglés ya documenta que el término no debe leerse eclesiásticamente aquí. 'Asamblea' mantiene la distinción sin perder el vínculo léxico con otros pasajes.
  doctrine_reference: Hechos 19:39-41; uso contextual de ἐκκλησία
- issue: Gravedad jurídica de στάσις
  english_pob_reading: with rioting; the Greek term can denote a serious civil uprising, but here 'rioting' best fits the immediate context of a public uproar before Roman authorities.
  chosen_spanish_reading: '''sedición'' en el cuerpo principal, con nota de alternativas semánticas.'
  alternative_spanish_readings:
  - '''motín'''
  - '''insurrección'''
  - '''disturbio'''
  rationale: El contexto romano y la preocupación legal de ser denunciados justifican una opción con peso jurídico. 'Sedición' mantiene la seriedad del término sin exigir una lectura militarizada; la nota conserva las alternativas que el griego admite.
  doctrine_reference: Hechos 19:40; sentido forense de στάσις
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'disorderly gathering' por 'commotion' para reflejar con más precisión συστροφή y evitar expansión interpretativa. La presente redacción española sigue esa revisión, usando 'alboroto' para el término final y reservando 'asamblea' para ἐκκλησία, conforme al audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero no aparece en este versículo.
  - '''Asamblea'' se usa para ἐκκλησία en su sentido cívico, evitando el término ''iglesia'' en este contexto.'
  - Se distingue 'sedición' (στάσις) de 'alboroto' (συστροφή) para conservar la diferencia léxica documentada en el texto fuente y en el audit trail inglés.
  - 'La sintaxis española conserva la progresión causal y explicativa del griego: peligro → ausencia de causa → imposibilidad de dar razón → conclusión narrativa.'
