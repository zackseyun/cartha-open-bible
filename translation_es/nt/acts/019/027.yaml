  text: οὐ μόνον δὲ τοῦτο κινδυνεύει ἡμῖν τὸ μέρος εἰς ἀπελεγμὸν ἐλθεῖν, ἀλλὰ καὶ τὸ τῆς μεγάλης θεᾶς ⸂Ἀρτέμιδος ἱερὸν⸃ εἰς οὐθὲν λογισθῆναι, μέλλειν ⸀τε καὶ καθαιρεῖσθαι ⸂τῆς μεγαλειότητος⸃ αὐτῆς, ἣν ὅλη ἡ Ἀσία καὶ ἡ οἰκουμένη σέβεται.
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/027.yaml
  text: And not only is this trade of ours in danger of coming into disrepute[a], but also the temple of the great goddess Artemis may be counted as nothing[b], and even her majesty—whom all Asia and the world worship—may be brought down.
  footnotes:
  - marker: a
    text: Or 'the inhabited world.' The Greek often refers to the populated world, especially the wider Roman world.
    reason: lexical_alternative
  - marker: b
    text: Or 'her magnificence' or 'her greatness.' The Greek expression refers to Artemis's exalted status or splendor being brought down.
    reason: lexical_alternative
