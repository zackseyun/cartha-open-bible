translation:
  language: es
  text: Y no solo nuestro oficio corre peligro de caer en descrédito, sino también que el templo de la gran diosa Artemisa sea tenido por nada, y aun que su majestad[b]—a quien toda Asia y el mundo[a] adoran—sea derribada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo habitado». El griego suele referirse al mundo poblado, especialmente al ámbito romano más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «su magnificencia» o «su grandeza». La expresión griega apunta al esplendor o estatus exaltado de Artemisa, que sería rebajado.
    reason: lexical_alternative
lexical_decisions:
- source_word: κινδυνεύει
  english_pob_choice: is in danger
  chosen_spanish: corre peligro
  alternatives_spanish:
  - está en peligro
  - está en riesgo
  lexicon: BDAG
  rationale: El verbo expresa estar expuesto a una amenaza real. «Corre peligro» es natural en español y conserva el matiz de riesgo presente en el contexto.
- source_word: τὸ μέρος
  english_pob_choice: this trade
  chosen_spanish: esto
  alternatives_spanish:
  - este oficio
  - este negocio
  lexicon: BDAG
  rationale: En el contexto de Demetrio, la referencia apunta a la actividad/ramo económico de los plateros. En español, el demostrativo «esto» sigue de cerca el alcance del griego sin forzar una especificación económica no explicitada en la forma básica de la frase; el sentido completo se entiende por el contexto inmediato y por la frase «para nosotros».
- source_word: εἰς ἀπελεγμὸν ἐλθεῖν
  english_pob_choice: of coming into disrepute
  chosen_spanish: caer en descrédito
  alternatives_spanish:
  - venir a reproche
  - caer en deshonra
  lexicon: BDAG
  rationale: La expresión comunica llegar a una condición de reproche o mala fama. «Caer en descrédito» reproduce bien el valor evaluativo y resulta idiomático en español.
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: BDAG
  rationale: El término designa el edificio/espacio sagrado de Artemisa. «Templo» es la equivalencia más clara y reconocible para el Artemision de Éfeso.
- source_word: εἰς οὐθὲν λογισθῆναι
  english_pob_choice: may be counted as nothing
  chosen_spanish: puede ser considerado como nada
  alternatives_spanish:
  - puede ser tenido por nada
  - puede ser estimado en nada
  lexicon: BDAG
  rationale: El pasivo expresa ser tenido por de ningún valor o cuenta. «Ser considerado como nada» conserva la fuerza evaluativa sin añadir interpretación excesiva.
- source_word: καθαιρεῖσθαι
  english_pob_choice: may be brought down
  chosen_spanish: puede ser derribada
  alternatives_spanish:
  - puede ser abatida
  - puede ser despojada
  lexicon: BDAG
  rationale: El verbo tiene la idea de derribar o deshacer algo elevado. «Derribada» comunica la caída de la grandeza o prestigio de Artemisa en un español directo.
- source_word: τῆς μεγαλειότητος αὐτῆς
  english_pob_choice: her majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su magnificencia
  - su grandeza
  lexicon: BDAG
  rationale: El genitivo señala la excelencia, esplendor o rango exaltado de la diosa. «Su majestad» resume esa noción de dignidad y esplendor público.
- source_word: ὅλη ἡ Ἀσία
  english_pob_choice: all Asia
  chosen_spanish: toda Asia
  alternatives_spanish:
  - Asia entera
  - toda la provincia de Asia
  lexicon: BDAG
  rationale: La referencia es la región romana de Asia. «Toda Asia» preserva el énfasis retórico del griego y sigue el uso de nombre geográfico tal como aparece en el texto.
- source_word: ἡ οἰκουμένη
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: BDAG
  rationale: El término puede significar el mundo habitado o el mundo romano poblado. «El mundo» es la forma más natural en español, dejando abierta la amplitud del alcance con la nota correspondiente si se requiere.
- source_word: σέβεται
  english_pob_choice: worship
  chosen_spanish: veneran
  alternatives_spanish:
  - adoran
  - rinden culto a
  lexicon: BDAG
  rationale: En contexto pagano, el verbo expresa reverencia/culto religioso. «Veneran» mantiene la fuerza religiosa sin sonar tan marcadamente eclesiástico como «adoran» y evita cargar el texto con un término demasiado técnico.
theological_decisions:
- issue: Habla pagana reportada sin atenuación doctrinal
  english_pob_reading: the temple of the great goddess Artemis ... whom all Asia and the world worship
  chosen_spanish_reading: el templo de la gran diosa Artemisa ... que toda Asia y el mundo veneran
  alternative_spanish_readings:
  - la supuesta gran diosa Artemisa ...
  - el templo de la llamada gran diosa Artemisa ...
  rationale: El verso registra la defensa de Demetrio dentro del discurso pagano. Se conserva su afirmación en forma directa, sin añadir marcadores de distancia que no están en el griego. La traducción mantiene la tensión narrativa del pasaje.
  doctrine_reference: Principio de primacía del texto original y preservación del discurso reportado
- issue: Referencia de adoración a la deidad pagana
  english_pob_reading: whom all Asia and the world worship
  chosen_spanish_reading: que toda Asia y el mundo veneran
  alternative_spanish_readings:
  - a quien toda Asia y el mundo adoran
  - a quien toda Asia y el mundo rinden culto
  rationale: El contexto es cultual y pagano; por eso la traducción evita cristianizar o suavizar la afirmación. «Veneran» comunica reverencia religiosa sin cambiar el hecho narrado.
  doctrine_reference: Preservación del marco religioso original sin armonización doctrinal
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del POB en el cierre coordinado: se opta por «veneran» para concordar con el sujeto compuesto («toda Asia y el mundo») y se preserva el giro evaluativo de «counted as nothing» y «brought down» con equivalentes idiomáticos en español.'
  spanish_consistency_notes:
  - Se mantiene «Artemisa» como forma española del nombre propio griego.
  - Se usa «templo» para ἱερόν, en consonancia con el audit trail inglés.
  - Se evita «SEÑOR» y otras equivalencias de nombre divino porque el pasaje trata de una deidad pagana nombrada explícitamente.
  - «Mundo» se conserva como término principal, con nota para el matiz de «mundo habitado».
  - «Veneran» en lugar de «adoran» busca equilibrio entre precisión cultual y fluidez en español.
