translation:
  language: es
  text: Porque un tal Demetrio, platero, que fabricaba santuarios de plata de Artemisa[a], daba a los artesanos no poco negocio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'templos de plata de Artemisa' o 'modelos de plata del templo de Artemisa'. El griego usa naous ('santuarios/templos'), probablemente para pequeños objetos de culto asociados con la adoración de Artemisa.
    reason: lexical_alternative
  - marker: b
    text: 'Litotes griega: ''no poco negocio'', es decir, un negocio o una ganancia considerable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrio
  lexicon: transliteración de nombre propio
  rationale: El nombre propio se translitera al español sin traducirse, conservando la forma reconocible y el valor referencial del texto griego.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación o trasfondo del relato anterior; 'Porque' preserva la fuerza causal/explicativa en español de manera natural.
- source_word: τις
  english_pob_choice: a certain man
  chosen_spanish: un tal
  alternatives_spanish:
  - un cierto hombre
  - alguien
  lexicon: BDAG
  rationale: La partícula indefinida presenta a una persona concreta pero no identificada previamente. 'Un tal' es natural y mantiene esa indefinición narrativa.
- source_word: ὀνόματι
  english_pob_choice: named
  chosen_spanish: llamado
  alternatives_spanish:
  - de nombre
  - nombrado
  lexicon: BDAG
  rationale: El dativo idiomático σημαίνει aquí identificación por nombre; 'llamado' es idiomático en español y conserva el sentido.
- source_word: ἀργυροκόπος
  english_pob_choice: a silversmith
  chosen_spanish: platero
  alternatives_spanish:
  - orfebre de plata
  - trabajador de la plata
  lexicon: BDAG
  rationale: El término designa a un artesano que trabaja la plata. 'Platero' es un equivalente natural y ampliamente comprensible en español, sin perder la referencia al oficio.
- source_word: ποιῶν ναοὺς ἀργυροῦς Ἀρτέμιδος
  english_pob_choice: who made silver shrines of Artemis
  chosen_spanish: que fabricaba templos de plata de Artemisa
  alternatives_spanish:
  - que hacía santuarios de plata de Artemisa
  - que fabricaba modelos de plata del templo de Artemisa
  lexicon: BDAG
  rationale: ναούς puede significar 'templos/santuarios', y el contexto comercial sugiere pequeños objetos de culto. Se mantiene 'templos de plata' para no adelantar una especificación más interpretativa que el griego no obliga a fijar; 'fabricaba' conserva el participio descriptivo de oficio.
- source_word: Ἀρτέμιδος
  english_pob_choice: Artemis
  chosen_spanish: Artemisa
  alternatives_spanish:
  - Artemis
  lexicon: transliteración de nombre propio
  rationale: Se translitera al español como nombre de la deidad, manteniendo la forma más usual y legible para lectores hispanos.
- source_word: παρείχετο
  english_pob_choice: was providing
  chosen_spanish: daba
  alternatives_spanish:
  - proveía
  - suministraba
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual o continua en pasado; 'daba' es breve, natural y conserva el trasfondo comercial sin sobrerrepresentar la precisión aspectual.
- source_word: τοῖς τεχνίταις
  english_pob_choice: the craftsmen
  chosen_spanish: a los artesanos
  alternatives_spanish:
  - a los obreros
  - a los artesanos especializados
  lexicon: BDAG
  rationale: τεχνίταις designa trabajadores hábiles; 'artesanos' comunica bien la idea de oficios especializados en el contexto de fabricación.
- source_word: οὐκ ὀλίγην ἐργασίαν
  english_pob_choice: no small business
  chosen_spanish: no poca ganancia
  alternatives_spanish:
  - un negocio nada pequeño
  - una considerable ganancia
  - bastante trabajo
  lexicon: BDAG
  rationale: La litotes se conserva con 'no poca', y ἐργασία en este contexto económico puede implicar actividad lucrativa o negocio. 'Ganancia' explicita el sentido comercial inferido por el pasaje sin borrar la figura retórica.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el hilo de auditoría en inglés: se mantiene la estructura narrativa, el oficio de Demetrio, la ambigüedad de ναούς, el imperfecto de παρείχετο y la litotes de οὐκ ὀλίγην ἐργασίαν sin introducir interpretaciones ajenas al contexto.'
  spanish_consistency_notes:
  - Se usa 'Artemisa' de forma consistente para el nombre de la deidad.
  - Se conserva el tono narrativo explícito con 'Porque' al inicio, acorde con γάρ.
  - Se evita 'SEÑOR' u otras sustituciones teológicas no pertinentes.
  - Se mantiene una formulación natural en español sin borrar la ambigüedad léxica de ναούς.
