  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. La transliteración 'Artemisa' es adecuada. La revisión propuesta mantiene la decisión inglesa sobre ναός como objeto cultual pequeño mediante 'santuarios', y conserva la litotes de οὐκ ὀλίγην ἐργασίαν con 'no poco negocio'.
