  text: Δημήτριος γάρ τις ὀνόματι, ἀργυροκόπος, ποιῶν ναοὺς ἀργυροῦς Ἀρτέμιδος παρείχετο τοῖς τεχνίταις ⸂οὐκ ὀλίγην ἐργασίαν⸃,
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/024.yaml
  text: For a certain man named Demetrius[a], a silversmith who made silver shrines of Artemis[b], was providing the craftsmen with no small business.
  footnotes:
