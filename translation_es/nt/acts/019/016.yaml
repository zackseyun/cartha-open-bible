source:
  edition: SBLGNT
  text: καὶ ⸀ἐφαλόμενος ⸂ὁ ἄνθρωπος ἐπ’ αὐτοὺς⸃ ἐν ᾧ ἦν τὸ πνεῦμα τὸ πονηρὸν ⸂κατακυριεύσας ἀμφοτέρων⸃ ἴσχυσεν κατ’ αὐτῶν, ὥστε γυμνοὺς καὶ τετραυματισμένους ἐκφυγεῖν ἐκ τοῦ οἴκου ἐκείνου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/016.yaml
  text: And the man in whom the evil spirit was leaped on them[a], and after overpowering both of them, prevailed against them[c][b], so that they fled out of that house naked and wounded.
  footnotes:
  - marker: a
    text: Or 'jumping on them' or 'springing on them.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'both of them.' Although the wider context mentions more than two sons of Sceva, the text here explicitly uses 'both,' so the translation preserves that wording.
    reason: alternative_reading
  - marker: c
    text: Or 'escaped out of that house.'
    reason: lexical_alternative
