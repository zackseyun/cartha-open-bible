revisions:
- from: Y el hombre en quien estaba el espíritu malo se lanzó sobre ellos[a], y después de dominarlos a ambos[b], pudo más que ellos, de modo que huyeron de aquella casa desnudos y heridos[c].
  to: Y el hombre en quien estaba el espíritu malo se abalanzó sobre ellos[a], y después de dominar a ambos[b], pudo más que ellos, de modo que huyeron[c] de aquella casa desnudos y heridos.
  rationale: Se hizo un ajuste menor para reflejar con más viveza el valor violento y repentino de ἐφαλόμενος mediante «se abalanzó sobre ellos». También se actualizó la nota léxica correspondiente para evitar repetir la nueva lectura principal y se mantuvo el anclaje de la alternativa de ἐκφυγεῖν en «huyeron». No se requieren cambios doctrinales ni estructurales mayores.
