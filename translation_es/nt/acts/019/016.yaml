review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del griego: el hombre con el espíritu malo se lanza sobre ellos, domina a ambos, resulta más fuerte que ellos, y ellos huyen desnudos y heridos. Conserva correctamente «a ambos» frente a la tensión contextual más amplia. Sin embargo, la nota léxica en [a] introduce «se abalanzó sobre ellos», que es demasiado cercana al texto principal si este se revisa, y la redacción principal puede mejorarse para reflejar con más viveza el valor de ἐφαλόμενος y con más naturalidad el resultado final.'
  spanish_quality_summary: 'El español es claro y natural. «Pudo más que ellos» es idiomático, pero «prevaleció contra ellos» o «resultó más fuerte que ellos» sonaría algo más digno; aun así, no es un error. La mejora principal es estilística y de precisión: «se abalanzó sobre ellos» comunica mejor el pounce violento de ἐφαλόμενος que «se lanzó sobre ellos». También conviene conservar una nota [c] claramente anclada en «huyeron».'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Espíritu» y «espíritu malo» están bien contextualizados; no hay términos como Yahvé, Mesías, δοῦλος, etc. que requieran ajuste. La decisión de evitar un tecnicismo como «poseído» está alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: La formulación principal de ἐφαλόμενος puede ser más precisa
    rationale: «Se lanzó sobre ellos» es aceptable, pero «se abalanzó sobre ellos» refleja mejor el matiz de irrupción súbita y violenta señalado por la auditoría inglesa ('leaped on', 'jumping on', 'springing on').
  - severity: low
    issue: La nota [a] debe ajustarse al cambio del texto principal
    rationale: Si el texto principal usa «se abalanzó», esa opción no debe quedar como alternativa en la misma nota. Conviene mantener alternativas realmente distintas y plausibles.
  revised_spanish_text: Y el hombre en quien estaba el espíritu malo se abalanzó sobre ellos[a], y después de dominar a ambos[b], pudo más que ellos, de modo que huyeron[c] de aquella casa desnudos y heridos.
  revised_footnotes:
  - marker: a
    text: 'También: «saltó sobre ellos» o «se lanzó sobre ellos».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a ambos». Aunque el contexto más amplio menciona más de dos exorcistas, aquí el texto preserva ese dato numérico.
    reason: alternative_reading
  - marker: c
    text: 'O: «escaparon de aquella casa».'
    reason: lexical_alternative
  revision_rationale: Se hizo un ajuste menor para reflejar con más viveza el valor violento y repentino de ἐφαλόμενος mediante «se abalanzó sobre ellos». También se actualizó la nota léxica correspondiente para evitar repetir la nueva lectura principal y se mantuvo el anclaje de la alternativa de ἐκφυγεῖν en «huyeron». No se requieren cambios doctrinales ni estructurales mayores.
