translation:
  language: es
  text: Y el hombre en quien estaba el espíritu malo se abalanzó sobre ellos[a], y después de dominar a ambos[b], pudo más que ellos, de modo que huyeron[c] de aquella casa desnudos y heridos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «saltó sobre ellos» o «se lanzó sobre ellos».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a ambos». Aunque el contexto más amplio menciona más de dos exorcistas, aquí el texto preserva ese dato numérico.
    reason: alternative_reading
  - marker: c
    text: 'O: «escaparon de aquella casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφαλόμενος
  english_pob_choice: leaped on
  chosen_spanish: se lanzó sobre
  alternatives_spanish:
  - saltó sobre
  - se abalanzó sobre
  lexicon: BDAG
  rationale: El participio aoristo medio expresa un movimiento repentino y violento contra otros. «Se lanzó sobre» comunica el impacto físico de manera natural en español sin perder la fuerza del gesto.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y el contexto narrativo identifica a un varón concreto. «El hombre» respeta el dato gramatical y contextual.
- source_word: ἐν ᾧ ἦν τὸ πνεῦμα τὸ πονηρόν
  english_pob_choice: in whom the evil spirit was
  chosen_spanish: en quien estaba el espíritu malo
  alternatives_spanish:
  - en quien estaba el espíritu maligno
  - quien tenía el espíritu malo
  lexicon: BDAG
  rationale: La cláusula relativa presenta al hombre como el recipiente del espíritu. «Estaba» conserva la idea de presencia/inhabitación sin introducir terminología técnica ajena al griego.
- source_word: τὸ πνεῦμα τὸ πονηρόν
  english_pob_choice: the evil spirit
  chosen_spanish: el espíritu malo
  alternatives_spanish:
  - el espíritu maligno
  - el espíritu perverso
  lexicon: BDAG
  rationale: «Malo» reproduce con claridad el valor de πονηρός en este contexto de exorcismo. «Maligno» es posible, pero puede sonar más interpretativo en español; aquí se conserva una equivalencia directa y comprensible.
- source_word: κατακυριεύσας
  english_pob_choice: after overpowering
  chosen_spanish: después de dominarlos
  alternatives_spanish:
  - después de overpowering
  - después de someterlos
  - tras vencerlos
  lexicon: BDAG
  rationale: El verbo indica obtener dominio o superioridad efectiva sobre alguien. «Dominarlos» expresa esa idea de señorío o control vencido, y el giro temporal reproduce bien la secuencia del griego.
- source_word: ἀμφοτέρων
  english_pob_choice: both of them
  chosen_spanish: a ambos
  alternatives_spanish:
  - a los dos
  - a los dos de ellos
  lexicon: BDAG
  rationale: Se conserva explícitamente el numeral dual/plural del texto griego. «A ambos» refleja la precisión del original, incluso cuando el contexto amplio mencione un grupo mayor.
- source_word: ἴσχυσεν κατ’ αὐτῶν
  english_pob_choice: prevailed against them
  chosen_spanish: pudo más que ellos
  alternatives_spanish:
  - prevaleció contra ellos
  - los venció
  lexicon: BDAG
  rationale: La construcción expresa que resultó más fuerte que ellos o los superó. «Pudo más que ellos» suena natural en español y mantiene la idea de superioridad efectiva sin borrar el matiz de confrontación.
- source_word: γυμνούς
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - sin ropa
  - despojados de sus vestidos
  lexicon: BDAG
  rationale: El adjetivo describe su estado final de desnudez. «Desnudos» es el equivalente directo y mantiene la crudeza del resultado narrado.
- source_word: τετραυματισμένους
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - lastimados
  - malheridos
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica que habían recibido heridas y seguían en ese estado. «Heridos» es claro y suficientemente fuerte en español, sin intensificar más de lo que el griego dice.
- source_word: ἐκφυγεῖν
  english_pob_choice: they fled out
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: BDAG
  rationale: 'El infinitivo de resultado presenta la consecuencia: escaparon/salieron corriendo. «Huyeron» resume de forma natural la fuga resultante; el complemento espacial en la frase posterior mantiene la salida del lugar.'
- source_word: ἐκ τοῦ οἴκου ἐκείνου
  english_pob_choice: out of that house
  chosen_spanish: de aquella casa
  alternatives_spanish:
  - de esa casa
  - fuera de aquella casa
  lexicon: BDAG
  rationale: La frase indica salida desde un lugar concreto ya mencionado. «De aquella casa» conserva la referencia demostrativa y el movimiento de salida sin redundancia innecesaria.
theological_decisions:
- issue: Lenguaje de posesión/inhabitación demoníaca
  english_pob_reading: the man in whom the evil spirit was
  chosen_spanish_reading: el hombre en quien estaba el espíritu malo
  alternative_spanish_readings:
  - el hombre poseído por el espíritu malo
  - el hombre que tenía el espíritu malo
  rationale: El griego describe la presencia del espíritu en el hombre, no usa un tecnicismo posterior. La traducción mantiene esa relación de inhabitación y deja claro el trasfondo demoníaco sin añadir formulaciones doctrinales no explícitas en el texto.
  doctrine_reference: Acts 19:16; Translation philosophy §1, §3, §6
- issue: Alcance de ἀμφοτέρων frente al grupo más amplio del contexto
  english_pob_reading: both of them
  chosen_spanish_reading: a ambos
  alternative_spanish_readings:
  - a los dos
  - a todo el grupo
  rationale: El griego dice literalmente «ambos». Aunque el contexto mayor mencione más personas, la traducción conserva el dato textual y no lo armoniza artificialmente con la narración más amplia.
  doctrine_reference: Acts 19:16; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la secuencia revisada del POB en inglés: acción súbita («se lanzó sobre ellos»), dominio previo («después de dominarlos a ambos») y resultado final («huyeron de aquella casa desnudos y heridos»). Se evita suavizar la tensión del texto respecto al número de personas afectadas y se conserva la crudeza del desenlace.'
  spanish_consistency_notes:
  - Se usa «espíritu malo» de forma consistente con la opción más directa para πνεῦμα τὸ πονηρόν en este contexto.
  - Se mantiene «a ambos» para reflejar la precisión del griego, aun cuando el contexto narrativo más amplio pueda sugerir más participantes.
  - «Huyeron» traduce el resultado de ἐκφυγεῖν de forma natural en español y no contradice la salida explícita «de aquella casa».
