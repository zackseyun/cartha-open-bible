translation:
  language: es
  text: Y cuando Pablo les impuso las manos, el Espíritu Santo vino sobre ellos, y hablaban en lenguas[a] y profetizaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «idiomas». El griego puede significar «lenguas» o «idiomas»; el texto principal conserva la ambigüedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθέντος ... χεῖρας
  english_pob_choice: when Paul laid his hands on them
  chosen_spanish: cuando Pablo les impuso[a] las manos
  alternatives_spanish:
  - cuando Pablo puso sus manos sobre ellos
  - después de que Pablo les impuso las manos
  lexicon: BDAG
  rationale: El participio aoristo con genitivo absoluto se vierte naturalmente en español como una cláusula temporal. «Imponer las manos» conserva el giro idiomático bíblico con claridad y dignidad; «puso sus manos» suena posible, pero menos preciso como término bíblico establecido.
- source_word: ἦλθε ... ἐπ’ αὐτούς
  english_pob_choice: came upon them
  chosen_spanish: vino sobre ellos
  alternatives_spanish:
  - vino sobre ellos
  - vino a ellos
  lexicon: BDAG
  rationale: «Vino sobre ellos» preserva la fuerza direccional de ἐπί y mantiene el lenguaje narrativo de Lucas-Hechos sin sobreexplicar el modo de la venida del Espíritu.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo
  - el Espíritu Sagrado
  lexicon: BDAG
  rationale: La expresión es el referente normal y directo del texto; en español «Espíritu Santo» es la forma clara y reverente, sin perder precisión teológica.
- source_word: ἐλάλουν
  english_pob_choice: they spoke
  chosen_spanish: hablaban
  alternatives_spanish:
  - hablaban
  - hablaron
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; «hablaban» reproduce ese aspecto mejor que un aoristo castellano. Se evita añadir una idea de inicio que el griego no expresa explícitamente.
- source_word: γλώσσαις
  english_pob_choice: in tongues
  chosen_spanish: en lenguas
  alternatives_spanish:
  - en lenguas
  - en idiomas
  lexicon: BDAG
  rationale: «Lenguas» conserva la ambigüedad lexical de γλώσσαις en Hechos. «Idiomas» interpretaría más específicamente el sentido y resolvería una tensión que el texto no resuelve.
- source_word: ἐπροφήτευον
  english_pob_choice: prophesied
  chosen_spanish: profetizaban
  alternatives_spanish:
  - profetizaban
  - hablaban proféticamente
  lexicon: BDAG
  rationale: El verbo denota habla profética directa; «profetizaban» es la equivalencia española más natural y fiel.
theological_decisions:
- issue: Ambigüedad de γλώσσαις en Hechos 19:6
  english_pob_reading: Render as 'tongues' in the main text without specifying whether these were known human languages or ecstatic speech.
  chosen_spanish_reading: Traducir «en lenguas» sin determinar si se trata de idiomas humanos conocidos o de habla extática.
  alternative_spanish_readings:
  - en idiomas
  - con lenguas
  rationale: La forma española «lenguas» preserva la tensión interpretativa presente en el griego y en la tradición POB inglesa. «Idiomas» sería más explicativo que el original y cerraría indebidamente una cuestión debatida.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: La venida del Espíritu Santo
  english_pob_reading: the Holy Spirit came upon them
  chosen_spanish_reading: el Espíritu Santo vino sobre ellos
  alternative_spanish_readings:
  - el Espíritu Santo vino a ellos
  - el Espíritu Santo cayó sobre ellos
  rationale: «Vino sobre ellos» refleja el evento narrado sin introducir una explicación causal posterior ni una formulación más cargada que el texto no exige. Se mantiene el carácter descriptivo de Hechos.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje griego y coincide con la revisión inglesa más reciente al no añadir una idea de «comenzaron»; se mantiene el imperfecto en español («hablaban», «profetizaban») para reflejar la acción en curso sin forzar una inceptividad no expresada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en general, pero este versículo no lo contiene.
  - Se conserva «Espíritu Santo» como forma estable y reverente para τὸ πνεῦμα τὸ ἅγιον.
  - «Lenguas» mantiene la ambigüedad lexical de γλώσσαις y evita una aclaración interpretativa.
  - 'El orden de las acciones sigue el flujo narrativo del griego: imposición de manos, venida del Espíritu, habla en lenguas, profecía.'
