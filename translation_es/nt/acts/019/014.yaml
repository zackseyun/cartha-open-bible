translation:
  language: es
  text: Había siete hijos de un judío llamado Sceva, jefe[a] de los sacerdotes, que hacían esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sumo sacerdote». El término griego puede referirse al sumo sacerdote o, más ampliamente, a una figura sacerdotal principal o de la clase sacerdotal dirigente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν δέ
  english_pob_choice: Now there were
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Entonces había
  lexicon: BDAG
  rationale: El imperfecto con δέ introduce la escena y la continuidad narrativa. «Ahora había» conserva ese valor discursivo en español sin forzar una oposición que el texto no enfatiza.
- source_word: τινος Σκευᾶ
  english_pob_choice: of a ... named Sceva
  chosen_spanish: de un tal Sceva
  alternatives_spanish:
  - de alguien llamado Sceva
  - de un cierto Sceva
  lexicon: BDAG
  rationale: τίνος con nombre propio expresa indefinición. «Un tal Sceva» suena natural en español y mantiene la referencia no identificada.
- source_word: Ἰουδαίου
  english_pob_choice: Jewish
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: BDAG
  rationale: Aquí el rasgo principal es la identidad étnico-religiosa, no solo geográfica. «Judío» conserva ese sentido en español.
- source_word: ἀρχιερέως
  english_pob_choice: chief priest
  chosen_spanish: jefe de sacerdotes
  alternatives_spanish:
  - sumo sacerdote
  - sacerdote principal
  lexicon: BDAG
  rationale: El griego puede referirse al sumo sacerdote o, más ampliamente, a una figura sacerdotal principal. Dado que Sceva no es identificable con el sumo sacerdote histórico singular, «jefe de sacerdotes» evita una afirmación institucional demasiado precisa y preserva la ambigüedad documentada.
- source_word: ἑπτὰ υἱοὶ
  english_pob_choice: seven sons
  chosen_spanish: siete hijos
  alternatives_spanish:
  - siete varones
  - siete descendientes
  lexicon: BDAG
  rationale: Es la correspondencia directa y natural del número con el sustantivo.
- source_word: τοῦτο ποιοῦντες
  english_pob_choice: doing this
  chosen_spanish: que hacían esto
  alternatives_spanish:
  - practicaban esto
  - estaban haciendo esto
  lexicon: BDAG
  rationale: El participio presente describe la acción en curso. «Que hacían esto» es fluido en español y mantiene la referencia inmediata al contexto.
theological_decisions:
- issue: Sentido de ἀρχιερεύς aplicado a Sceva
  english_pob_reading: Rendered as 'chief priest' rather than 'high priest'
  chosen_spanish_reading: Traducido como «jefe de sacerdotes» y no como «sumo sacerdote»
  alternative_spanish_readings:
  - sumo sacerdote
  - jefe sacerdotal
  rationale: La forma griega admite más de una extensión semántica. Como el contexto no identifica a Sceva con el sumo sacerdote oficial, la opción elegida evita importar una función histórica específica que el texto no garantiza. La nota conserva la alternativa tradicional.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el expediente auditado en inglés; no se aplicaron revisiones posteriores relevantes, y el consenso de revisión indicó alta concordancia sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Sceva» como nombre propio transliterado de forma estable.
  - Se prefirió «judío» por el matiz étnico-religioso del contexto en Hechos.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - La nota al pie conserva la ambigüedad de ἀρχιερεύς, alineada con el expediente inglés.
