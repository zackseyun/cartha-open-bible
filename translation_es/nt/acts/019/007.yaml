    issue: Construcción verbal poco natural en español
    rationale: Aunque 'Eran' no es imposible, en este contexto de recuento o existencia de personas presentes el español prefiere claramente la construcción existencial 'había'. Esto refleja mejor el uso contextual de ἦσαν y la filosofía del POB inglés ('There were').
  - severity: low
