lexical_decisions:
- source_word: ἦσαν
  english_pob_choice: There were
  chosen_spanish: Eran
  alternatives_spanish:
  - Había
  - Habían
  lexicon: BDAG
  rationale: El griego usa simplemente el verbo 'ser/estar' en forma imperfecta; el POB inglés lo vuelve existencial para sonar natural. En español, 'Eran' conserva bien la idea de existencia/identificación del grupo sin forzar una construcción impersonal innecesaria.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ es una partícula de enlace leve. En español moderno puede omitirse sin pérdida de sentido ni de relación narrativa fuerte.
- source_word: οἱ πάντες
  english_pob_choice: in all
  chosen_spanish: en total
  alternatives_spanish:
  - todos
  - todos en conjunto
  lexicon: BDAG
  rationale: La expresión articula la suma global del grupo. 'En total' reproduce mejor en español la fuerza de resumen numérico que 'todos' por sí solo.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: ἀνήρ designa varones adultos; 'hombres' es la equivalencia natural y mantiene el valor de género del término.
- source_word: ὡσεὶ
  english_pob_choice: about
  chosen_spanish: como
  alternatives_spanish:
  - aproximadamente
  - unos
  lexicon: BDAG
  rationale: ὡσεὶ marca aproximación. En español, 'como' antes de un número es una forma breve y plenamente natural de expresar esa aproximación.
- source_word: δώδεκα
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - '12'
  lexicon: BDAG
  rationale: Número cardinal directo, sin matiz adicional.
translation_notes:
  revision_awareness: El texto griego es breve y estable; el audit trail inglés no introduce variantes ni notas textuales. La versión española sigue ese mismo nivel de sobriedad y no requiere notas adicionales.
  spanish_consistency_notes:
  - 'Se mantuvo un orden natural en español: ''Eran en total como doce hombres''.'
