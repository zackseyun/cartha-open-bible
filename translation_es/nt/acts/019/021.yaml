revisions:
- from: 'Ahora bien, después de que se cumplieron estas cosas[a], Pablo resolvió en el Espíritu ir a Jerusalén, después de pasar por Macedonia y Acaya, diciendo: «Después de haber estado allí[b], también debo ver Roma».'
  to: 'Ahora bien, cuando se completaron estas cosas, Pablo resolvió en el Espíritu[a] ir a Jerusalén, después de pasar por Macedonia y Acaya, diciendo: «Después de haber estado allí[b], también debo ver Roma».'
  rationale: Se corrige «se cumplieron» a «se completaron» para reflejar la decisión lexical auditada sobre ἐπληρώθη y evitar connotaciones de cumplimiento profético. También se mueve el marcador [a] a «Espíritu», donde realmente está la ambigüedad, y se alinea la razón de la nota [b] con el historial inglés como variante de redacción previa.
