translation:
  language: es
  text: 'Ahora bien, cuando se completaron estas cosas, Pablo resolvió en el Espíritu[a] ir a Jerusalén, después de pasar por Macedonia y Acaya, diciendo: «Después de haber estado allí[b], también debo ver Roma».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su espíritu». La frase griega puede referirse tanto a la resolución interior de Pablo como a la guía del Espíritu Santo.
    reason: alternative_reading
  - marker: b
    text: 'O: «resolvió en el Espíritu, después de pasar por Macedonia y Acaya, ir a Jerusalén».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπληρώθη
  english_pob_choice: were completed
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - se completaron
  - llegaron a su término
  lexicon: BDAG
  rationale: El pasivo de πληρόω aquí señala que los acontecimientos llegaron a su conclusión, no que se cumpliera necesariamente una profecía. «Se cumplieron» mantiene la idea de término consumado con español natural y digno.
- source_word: ἔθετο
  english_pob_choice: resolved
  chosen_spanish: resolvió
  alternatives_spanish:
  - se propuso
  - determinó
  lexicon: BDAG
  rationale: En este giro, τίθημι en voz media expresa una decisión deliberada tomada para sí mismo. «Resolvió» comunica mejor la determinación interna que una forma más débil como «decidió».
- source_word: ἐν τῷ πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en su espíritu
  lexicon: BDAG
  rationale: La expresión es ambigua entre el impulso interior de Pablo y la guía del Espíritu Santo. La traducción principal conserva «Espíritu» para no borrar la posibilidad de guía divina, y la alternativa se preserva en nota.
- source_word: διελθὼν
  english_pob_choice: after passing through
  chosen_spanish: después de pasar por
  alternatives_spanish:
  - habiendo pasado por
  - tras recorrer
  lexicon: BDAG
  rationale: El participio aoristo antecede al infinitivo principal y marca secuencia. «Después de pasar por» expresa esa relación temporal con claridad y de manera idiomática en español.
- source_word: πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - viajar
  - dirigirse
  lexicon: BDAG
  rationale: Es un verbo amplio de movimiento. «Ir» es la opción más natural y suficiente aquí, sin sobrecargar el sentido con matices no explicitados por el griego.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: Μετὰ τὸ γενέσθαι με ἐκεῖ
  english_pob_choice: After I have been there
  chosen_spanish: Después de haber estado allí
  alternatives_spanish:
  - Después de llegar allí
  - Después de estar allí
  lexicon: BDAG
  rationale: La construcción articular con γίνομαι y sujeto en acusativo expresa estar o llegar a encontrarse en un lugar antes del siguiente paso. «Haber estado allí» transmite de forma natural la presencia previa sin añadir más de lo que exige el texto.
- source_word: δεῖ
  english_pob_choice: I must
  chosen_spanish: debo
  alternatives_spanish:
  - tengo que
  - me es necesario
  lexicon: BDAG
  rationale: δεῖ expresa necesidad, a menudo con fuerza de propósito o necesidad divinamente ordenada en Lucas-Hechos. «Debo» conserva esa obligación/necessidad de manera concisa y sobria.
- source_word: Ῥώμην ἰδεῖν
  english_pob_choice: see Rome
  chosen_spanish: ver Roma
  alternatives_spanish:
  - visitar Roma
  lexicon: BDAG
  rationale: ἰδεῖν significa literalmente «ver». En contexto de viaje puede implicar una visita, pero «ver Roma» preserva con fidelidad la formulación griega y sigue siendo comprensible en español.
theological_decisions:
- issue: Referente de ἐν τῷ πνεύματι
  english_pob_reading: in the Spirit
  chosen_spanish_reading: en el Espíritu
  alternative_spanish_readings:
  - en su espíritu
  rationale: El griego no explicita posesivo y admite tanto la resolución interior de Pablo como una orientación del Espíritu Santo. La redacción principal mantiene la mayúscula para no cerrar la lectura teológica, y la nota conserva la alternativa sin resolverla artificialmente.
  doctrine_reference: 'Transparencia POB: preservar tensión lexical/teológica en lugar de eliminarla.'
translation_notes:
  revision_awareness: 'La versión inglesa reciente reordenó la cláusula para que «resolved» se conecte con más naturalidad a «to go», dejando la frase participial después. En español se adoptó un orden igualmente claro: la decisión principal precede a la ruta, y luego se introduce la cita con la secuencia temporal de manera fluida.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Espíritu» con mayúscula por la ambigüedad reconocida en el audit trail.
  - «Jerusalén», «Macedonia», «Acaya» y «Roma» se normalizaron como topónimos españoles estándar.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
  - La puntuación reproduce un registro bíblico moderno y claro, con cita directa marcada por comillas españolas.
