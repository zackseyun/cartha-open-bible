review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: algunos de los asiarcas, que eran amigos de Pablo, enviaron mensaje y le instaban a no entrar/exponerse en el teatro. Sin embargo, dos decisiones requieren ajuste menor: «aun» debe llevar tilde diacrítica como adverbio enfático («aún»), y la nota [a] no coincide con la nota inglesa auditada, que preserva una alternativa léxica para πέμψαντες πρὸς αὐτόν («le enviaron un mensaje»), mientras que la nota cultural sobre «Asiarchs» corresponde a la nota [b] en el rastro inglés. Conviene además suavizar «aviso», que en español puede sonar más a advertencia que a mensaje enviado.'
  spanish_quality_summary: El texto es legible y digno, pero «le enviaron aviso» suena menos natural y preciso que «le enviaron un mensaje» o «mandaron a decirle». «Aún» es la forma ortográfica adecuada aquí. «Le rogaban» es aceptable, aunque «le insistían»/«le instaban» sería más cercano a «urged»; no obstante, no obliga por sí solo una corrección. La frase completa fluye mejor con «le enviaron un mensaje y le rogaban…».
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «Asiarcas» preserva correctamente el título técnico. No hay términos divinos o cristológicos en juego. Se deben realinear las notas al patrón auditado: [a] alternativa léxica de «enviaron un mensaje», [b] nota cultural sobre «asiarcas», [c] alternativas para «no se expusiera… / no se presentara… / no entrara…».'
  issues:
  - severity: medium
    issue: La nota [a] está asignada al término «asiarcas», pero en el rastro inglés [a] corresponde a una alternativa léxica de «sent word to him».
    rationale: Se pierde una decisión léxica auditada y se altera la trazabilidad de las notas del POB inglés.
  - severity: low
    issue: «aun» debería escribirse «aún» en este contexto enfático.
    rationale: Aquí funciona como adverbio equivalente a «incluso/todavía más»; la tilde mejora la corrección ortográfica y evita ambigüedad.
  - severity: low
    issue: «Le enviaron aviso» es menos natural y puede sugerir advertencia más que mensaje.
    rationale: El griego implica que enviaron comunicación a Pablo; «le enviaron un mensaje» expresa eso con mayor claridad en español neutral.
  revised_spanish_text: Y aún algunos de los asiarcas[b], siendo sus amigos, le enviaron un mensaje[a] y le rogaban que no se expusiera al teatro[c].
  revised_footnotes:
  - marker: a
    text: O «le enviaron aviso».
    reason: lexical_alternative
  - marker: b
    text: «Asiarcas» eran funcionarios prominentes asociados con la provincia romana de Asia.
    reason: cultural_note
  - marker: c
    text: O «que no se presentara en el teatro» o «que no entrara en el teatro».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la ortografía de «aún», se mejora la naturalidad de «le enviaron un mensaje», y se reordenan las notas para reflejar fielmente el rastro inglés: alternativa léxica sobre el envío del mensaje, nota cultural sobre «asiarcas», y alternativas para la expresión final.'
