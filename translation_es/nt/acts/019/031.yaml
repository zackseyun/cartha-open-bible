    text: Or "sent a message to him."
    reason: lexical_alternative
  - marker: b
    text: '"Asiarchs" were prominent officials associated with the Roman province of Asia.'
    reason: cultural_note
  - marker: c
    text: Or "not to present himself in the theater" or "not to go into the theater."
    reason: lexical_alternative
