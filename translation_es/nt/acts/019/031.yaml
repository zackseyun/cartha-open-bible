translation:
  language: es
  text: Y aún algunos de los asiarcas[b], siendo sus amigos, le enviaron un mensaje[a] y le rogaban que no se expusiera al teatro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le enviaron aviso».
    reason: lexical_alternative
  - marker: b
    text: «Asiarcas» eran funcionarios prominentes asociados con la provincia romana de Asia.
    reason: cultural_note
  - marker: c
    text: O «que no se presentara en el teatro» o «que no entrara en el teatro».
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: El indefinido plural expresa un subconjunto no especificado; «algunos» mantiene esa indefinición de modo natural en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ continúa la narración con leve transición; «Y» conserva el flujo sin sobrecargar la relación con contraste.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: 'La partícula añade énfasis: resulta llamativo que miembros de este grupo prominente apoyaran a Pablo. «Aun» conserva ese matiz.'
- source_word: Ἀσιαρχῶν
  english_pob_choice: Asiarchs
  chosen_spanish: asiarcas
  alternatives_spanish:
  - funcionarios de Asia
  - líderes provinciales de Asia
  lexicon: BDAG
  rationale: Se mantiene el título técnico por transliteración adaptada al español («asiarcas»), porque el término es específico y no conviene aplanarlo con una paráfrasis genérica.
- source_word: ὄντες αὐτῷ φίλοι
  english_pob_choice: being his friends
  chosen_spanish: siendo sus amigos
  alternatives_spanish:
  - que eran sus amigos
  - siendo amigos de él
  lexicon: BDAG
  rationale: La frase participial funciona como trasfondo descriptivo. «Siendo sus amigos» reproduce bien el sentido relacional de φίλοι con αὐτῷ.
- source_word: πέμψαντες πρὸς αὐτὸν
  english_pob_choice: sent word to him
  chosen_spanish: le enviaron aviso
  alternatives_spanish:
  - le mandaron un mensaje
  - le enviaron recado
  lexicon: BDAG
  rationale: El objeto enviado está implícito; en español conviene explicitarlo con una expresión idiomática. «Aviso» preserva la idea de mensaje urgente sin añadir contenido ajeno.
- source_word: παρεκάλουν
  english_pob_choice: urged
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le instaban
  - le suplicaban
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción insistente o repetida. «Le rogaban» comunica la insistencia con naturalidad y sin endurecer indebidamente el tono.
- source_word: μὴ δοῦναι ἑαυτὸν
  english_pob_choice: not to venture
  chosen_spanish: que no se expusiera
  alternatives_spanish:
  - que no se presentara
  - que no se aventurara
  lexicon: BDAG
  rationale: El giro significa no ponerse a sí mismo en una situación peligrosa. «Expusiera» comunica la idea de ponerse en riesgo sin traducir mecánicamente el griego.
- source_word: εἰς τὸ θέατρον
  english_pob_choice: into the theater
  chosen_spanish: al teatro
  alternatives_spanish:
  - dentro del teatro
  - hacia el teatro
  lexicon: BDAG
  rationale: En español, con verbo de movimiento, «al teatro» es la forma natural. Conserva la referencia al recinto público donde se encontraba la multitud.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió «give himself up to the theater» por «venture into the theater» para captar mejor μὴ δοῦναι ἑαυτόν εἰς τὸ θέατρον. El español sigue esa línea con «que no se expusiera al teatro», evitando una traducción literal que sugeriría entrega o rendición.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Asiarcas» se translitera en forma castellanizada para conservar el título técnico.
  - «Teatro» se entiende como el recinto público, no como la disciplina artística moderna.
