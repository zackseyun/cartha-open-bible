- from: Y aun algunos de los asiarcas[a], siendo sus amigos[b], le enviaron aviso y le rogaban que no se expusiera al teatro[c].
  to: Y aún algunos de los asiarcas[b], siendo sus amigos, le enviaron un mensaje[a] y le rogaban que no se expusiera al teatro[c].
  rationale: 'Se corrige la ortografía de «aún», se mejora la naturalidad de «le enviaron un mensaje», y se reordenan las notas para reflejar fielmente el rastro inglés: alternativa léxica sobre el envío del mensaje, nota cultural sobre «asiarcas», y alternativas para la expresión final.'
