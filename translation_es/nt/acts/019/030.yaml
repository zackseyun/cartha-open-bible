translation:
  language: es
  text: Pero cuando Pablo quería entrar entre la asamblea[a], los discípulos no lo dejaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de la asamblea» o «entre la multitud». El griego δῆμος puede referirse al cuerpo cívico reunido en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παύλου
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Pablo
  lexicon: nombre propio
  rationale: Se translitera el nombre propio Παῦλος con la forma estable en español, sin traducirlo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ introduce contraste narrativo suave; «Pero» conserva mejor ese matiz en español que una simple coordinación.
- source_word: βουλομένου
  english_pob_choice: when Paul wanted
  chosen_spanish: cuando Pablo quería
  alternatives_spanish:
  - cuando Pablo deseaba
  - cuando Pablo intentaba
  lexicon: BDAG
  rationale: El genitivo absoluto con βούλομαι expresa intención o deseo en desarrollo; «quería» reproduce bien ese valor de voluntad/intención en español natural.
- source_word: εἰσελθεῖν
  english_pob_choice: to go in
  chosen_spanish: entrar
  alternatives_spanish:
  - ir adentro
  - meterse
  lexicon: BDAG
  rationale: El infinitivo aoristo de εἰσέρχομαι denota entrada; «entrar» es la forma natural y fiel en español.
- source_word: εἰς τὸν δῆμον
  english_pob_choice: among the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - entre la asamblea
  - en el conjunto del pueblo
  - en la multitud
  lexicon: BDAG
  rationale: δῆμος puede referirse al cuerpo cívico reunido o a la asamblea pública. En este contexto, «asamblea» refleja ese sentido cívico y público; se evita «multitud» porque diluye el matiz institucional del término.
- source_word: οὐκ εἴων
  english_pob_choice: would not let
  chosen_spanish: no se lo permitían
  alternatives_spanish:
  - no le permitían
  - no lo dejaban
  lexicon: BDAG
  rationale: El imperfecto de ἐάω expresa una negativa sostenida o tentativa de impedir; «no se lo permitían» preserva ese valor imperfectivo con naturalidad en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: se lo
  alternatives_spanish:
  - lo
  - le
  lexicon: BDAG
  rationale: El pronombre retoma a Pablo y, unido a la perífrasis «permitían», se expresa naturalmente como complemento pronominal en español.
- source_word: οἱ μαθηταί
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  - los alumnos
  lexicon: BDAG
  rationale: μαθηταί se rinde de manera directa como «discípulos», conservando la relación de aprendizaje y seguimiento sin ampliar indebidamente el sentido.
translation_notes:
  revision_awareness: Se mantuvo la lectura y el sentido del texto base sin cambios sustanciales respecto del audit trail inglés; la principal decisión fue conservar el matiz cívico de δῆμος con «asamblea» y reflejar el imperfecto de ἐάω con una negativa sostenida en español.
  spanish_consistency_notes:
  - Se usa «Pablo» para el nombre propio y «discípulos» para μαθηταί, en línea con la terminología estándar de POB en español.
  - Se evitó «SEÑOR» o equivalentes no pertinentes, ya que no aparecen términos divinos en este versículo.
  - La nota textual se ancla en «asamblea» para preservar la alternativa semántica del griego δῆμος sin sobrecargar el texto principal.
