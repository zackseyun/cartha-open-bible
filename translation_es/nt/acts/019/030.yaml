- from: Pero cuando Pablo quería entrar en la asamblea[a], los discípulos no se lo permitían.
  to: Pero cuando Pablo quería entrar entre la asamblea[a], los discípulos no lo dejaban.
  rationale: Se ajusta la preposición para reflejar mejor el sentido espacial de εἰς τὸν δῆμον según el análisis fuente y el POB inglés («among the assembly»). También se reemplaza «no se lo permitían» por «no lo dejaban» para un español más natural que conserva bien el valor imperfectivo y preventivo del verbo griego. La nota se alinea mejor con las alternativas documentadas en inglés.
