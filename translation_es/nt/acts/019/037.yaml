translation:
  language: es
  text: Porque han traído aquí a estos hombres, que no son ni ladrones de templos ni blasfeman contra nuestra diosa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «nuestro dios»; el referente en contexto es Artemisa, así que «nuestra diosa» comunica mejor el sentido en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάγετε
  english_pob_choice: you have brought
  chosen_spanish: han traído
  alternatives_spanish:
  - trajeron
  - han conducido
  - han llevado
  lexicon: BDAG
  rationale: El aoristo en este contexto expresa una acción ya realizada con efecto presente en la escena. En español, el presente perfecto 'han traído' comunica bien ese valor y suena natural en un discurso público/judicial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: Introduce la razón que apoya la afirmación anterior. 'Porque' conserva la fuerza explicativa de manera clara y formal en español.
- source_word: τοὺς ἄνδρας τούτους
  english_pob_choice: these men here
  chosen_spanish: a estos hombres aquí
  alternatives_spanish:
  - a estos hombres
  - a estas personas
  lexicon: BDAG
  rationale: ἀνήρ normalmente refiere a varones/hombres, por lo que 'hombres' preserva el matiz. 'Aquí' refleja el valor deíctico de τούτους en el contexto de la asamblea.
- source_word: οὔτε ... οὔτε
  english_pob_choice: neither ... nor
  chosen_spanish: ni ... ni
  alternatives_spanish:
  - no ... ni
  - ni ... tampoco
  lexicon: BDAG
  rationale: '''Ni ... ni'' es el correlativo natural en español y reproduce la estructura negativa doble del griego.'
- source_word: ἱεροσύλους
  english_pob_choice: temple robbers
  chosen_spanish: sacrílegos del templo
  alternatives_spanish:
  - ladrones del templo
  - sacrílegos
  - robadores del templo
  lexicon: BDAG
  rationale: El término puede significar quienes roban o profanan lo sagrado. En español, 'sacrílegos del templo' preserva la idea de profanación sagrada sin perder el vínculo concreto con el templo; 'ladrones del templo' sería más literal pero puede estrechar demasiado el sentido.
- source_word: βλασφημοῦντας
  english_pob_choice: blasphemers
  chosen_spanish: blasfemos
  alternatives_spanish:
  - los que blasfeman
  - injuriadores
  - los que hablan mal de
  lexicon: BDAG
  rationale: '''Blasfemos'' condensa bien el participio y funciona naturalmente en un contexto legal. Mantiene el sentido de hablar injuriosamente contra una deidad.'
- source_word: τὴν θεὸν ἡμῶν
  english_pob_choice: our goddess
  chosen_spanish: nuestra diosa
  alternatives_spanish:
  - nuestro dios
  - nuestra divinidad
  lexicon: BDAG
  rationale: Aunque θεός es gramaticalmente masculino/genérico, el referente contextual es Artemisa, una deidad femenina. 'Nuestra diosa' evita una traducción engañosa y sigue la lectura contextual del POB inglés.
theological_decisions:
- issue: Referencia de τὴν θεὸν ἡμῶν a Artemisa
  english_pob_reading: our goddess
  chosen_spanish_reading: nuestra diosa
  alternative_spanish_readings:
  - nuestro dios
  - nuestra divinidad
  rationale: El hablante pagano de Éfeso se refiere a Artemisa. Traducir 'diosa' transmite el referente real del discurso y evita que el lector piense en el Dios verdadero. Es una decisión contextual y no una afirmación doctrinal.
  doctrine_reference: Primacía del texto original y del contexto histórico-discursivo; fidelidad semántica sobre calco formal
- issue: Función discursiva de γὰρ al inicio
  english_pob_reading: For
  chosen_spanish_reading: Porque
  alternative_spanish_readings:
  - Pues
  - Ya que
  rationale: La partícula introduce una explicación o justificación del argumento previo. 'Porque' comunica esa relación con naturalidad en español sin añadir interpretación extra.
  doctrine_reference: Coherencia retórica y correspondencia discursiva
- issue: Matiz legal de ἱεροσύλους y βλασφημοῦντας
  english_pob_reading: temple robbers / blasphemers
  chosen_spanish_reading: sacrílegos del templo / blasfemos
  alternative_spanish_readings:
  - ladrones del templo / los que blasfeman
  - profanadores del templo / injuriadores
  rationale: En un contexto de acusación pública, conviene reflejar tanto la profanación religiosa como la acusación verbal. 'Sacrílegos' conserva el peso religioso-legal del griego y 'blasfemos' mantiene el lenguaje acusatorio.
  doctrine_reference: Precisión léxica en términos de impugnación religiosa
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el texto inglés de referencia permanece estable y el pasaje presenta acuerdo alto entre revisores. La decisión principal en español sigue siendo contextual: θεὸν ἡμῶν se vierte según el referente real de Artemisa, no de forma literal.'
  spanish_consistency_notes:
  - Se mantuvo 'diosa' para el referente de Artemisa, en línea con la decisión contextual del POB inglés.
  - Se evitó 'SEÑOR' u otras sustituciones reverenciales porque el texto no contiene el nombre divino de Israel.
  - '''Ni ... ni'' reproduce la negación correlativa del griego con claridad y naturalidad.'
  - '''Sacrílegos del templo'' conserva mejor el componente sagrado que un simple ''ladrones del templo'' en español, sin abandonar el contexto concreto del templo.'
