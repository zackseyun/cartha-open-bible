    issue: ἱεροσύλους está traducido como 'sacrílegos del templo'
    rationale: El término denota más concretamente a quienes roban templos o saquean bienes sagrados. 'Sacrílegos' conserva algo del campo semántico, pero pierde la concreción de robo presente en la decisión inglesa auditada ('temple robbers') y suena menos natural con 'del templo'.
  - severity: low
    issue: '''blasfemos contra nuestra diosa'' es menos natural que una formulación verbal'
    rationale: Aunque semánticamente aceptable, en español 'ni blasfeman contra nuestra diosa' fluye mejor y representa con claridad el participio βλασφημοῦντας con su objeto.
  - severity: low
    issue: La nota al pie usa 'nuestro dios' en vez de reflejar literalmente la forma griega femenina del artículo con θεόν
    rationale: La nota inglesa ya explica la tensión de forma/sentido; en español conviene mantener la misma idea auditada sin introducir una precisión gramatical confusa. La nota puede simplificarse como alternativa léxica contextual.
  revised_spanish_text: Porque han traído aquí a estos hombres, que no son ni ladrones de templos ni blasfeman contra nuestra diosa[a].
