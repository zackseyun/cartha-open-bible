translation:
  language: es
  text: Pero cuando algunos se endurecían y eran desobedientes[a], hablando mal del Camino[b] delante de la multitud, se apartó de ellos y apartó a los discípulos, y razonaba cada día en la sala de conferencias de Tirano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incrédulos» o «negándose a ser persuadidos» para «desobedientes».
    reason: lexical_alternative
  - marker: b
    text: «El Camino» era una designación temprana del movimiento cristiano en Hechos.
    reason: cultural_note
  - marker: c
    text: O «escuela de Tirano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκληρύνοντο
  english_pob_choice: became hardened
  chosen_spanish: se endurecían
  alternatives_spanish:
  - se volvían tercos
  - se endurecían progresivamente
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo expresa un proceso continuo o un estado en desarrollo. «Se endurecían» conserva esa idea sin añadir una agencia explícita que el griego no exige.
- source_word: ἠπείθουν
  english_pob_choice: disobedient
  chosen_spanish: eran desobedientes
  alternatives_spanish:
  - no creían
  - se negaban a ser persuadidos
  lexicon: BDAG
  rationale: ἀπειθέω puede tener el matiz de desobediencia o de incredulidad. En este contexto de resistencia pública al mensaje, «eran desobedientes» mantiene la fuerza moral y volitiva señalada por la POB inglesa.
- source_word: κακολογοῦντες
  english_pob_choice: speaking evil of
  chosen_spanish: hablando mal de
  alternatives_spanish:
  - maldiciendo
  - injuriando
  - calumniando
  lexicon: BDAG
  rationale: La participio describe una oposición verbal hostil en público. «Hablando mal de» es natural en español y suficientemente amplio para esa denigración sin forzar un sentido técnico de calumnia.
- source_word: τὴν ὁδὸν
  english_pob_choice: the Way
  chosen_spanish: el Camino
  alternatives_spanish:
  - este Camino
  - la vía
  lexicon: BDAG
  rationale: En Hechos, «el Camino» funciona como designación reconocible del movimiento cristiano. Mantener la mayúscula y el artículo definido conserva el valor titular del término.
- source_word: ἐνώπιον τοῦ πλήθους
  english_pob_choice: before the crowd
  chosen_spanish: delante de la multitud
  alternatives_spanish:
  - en presencia de la multitud
  - públicamente delante de la gente
  lexicon: BDAG
  rationale: La frase indica una oposición abierta y pública. «Delante de la multitud» comunica con claridad ese contexto sin sonar excesivamente formal.
- source_word: ἀποστὰς ἀπ’ αὐτῶν
  english_pob_choice: he withdrew from them
  chosen_spanish: se apartó de ellos
  alternatives_spanish:
  - se retiró de ellos
  - se alejó de ellos
  lexicon: BDAG
  rationale: El participio aoristo señala una separación decisiva del grupo hostil. «Se apartó de ellos» comunica esa ruptura relacional de modo idiomático y breve.
- source_word: ἀφώρισεν
  english_pob_choice: set apart
  chosen_spanish: separó
  alternatives_spanish:
  - apartó
  - puso aparte
  lexicon: BDAG
  rationale: ἀφορίζω significa separar o poner aparte. Aquí el contraste con los opositores y los discípulos se entiende bien con «separó», que en español es claro y directo.
- source_word: τοὺς μαθητάς
  english_pob_choice: the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a los seguidores
  - a los aprendices
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente estándar y apropiado para μαθηταί en Hechos, refiriéndose a los seguidores comprometidos de Jesús.
- source_word: καθ’ ἡμέραν
  english_pob_choice: daily
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: BDAG
  rationale: La expresión denota una actividad regular y repetida. «Cada día» es natural en español y conserva la frecuencia indicada.
- source_word: διαλεγόμενος
  english_pob_choice: reasoning
  chosen_spanish: razonando
  alternatives_spanish:
  - dialogando
  - discutiendo
  - explicando
  lexicon: BDAG
  rationale: En Hechos, διαλέγομαι suele implicar un discurso razonado o persuasivo. «Razonando» mantiene ese matiz de argumentación sin volverlo excesivamente técnico.
- source_word: σχολῇ
  english_pob_choice: lecture hall
  chosen_spanish: salón
  alternatives_spanish:
  - escuela
  - aula
  - sala de enseñanza
  lexicon: BDAG
  rationale: El término puede referirse a un lugar de enseñanza o de reunión. «Salón de Tirano» evita la imagen demasiado moderna de una institución escolar y preserva el carácter de un espacio concreto.
- source_word: Τυράννου
  english_pob_choice: of Tyrannus
  chosen_spanish: de Tirano
  alternatives_spanish:
  - de Tirano
  - de Tyranno
  lexicon: BDAG
  rationale: Los nombres propios se transliteran según la convención habitual del proyecto. En español, «Tirano» reproduce el genitivo con naturalidad.
theological_decisions:
- issue: «el Camino» como designación del movimiento cristiano
  english_pob_reading: Capitalized 'the Way' referring to the Christian movement
  chosen_spanish_reading: «el Camino» con valor titular para la comunidad cristiana
  alternative_spanish_readings:
  - «el camino» como vía genérica
  - «la doctrina»
  rationale: En Hechos esta expresión funciona como nombre reconocible del grupo cristiano, no solo como metáfora de una ruta moral. La mayúscula inicial ayuda a percibir ese uso titular sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB. Se preserva la tensión léxica de ἀπειθέω con «desobedientes», la designación titular «el Camino», y la ambigüedad de σχολή mediante una opción principal y nota alternativa. No se detectaron revisiones previas que obliguen a cambios adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando aparezca en el texto fuente; en este versículo no aparece.
  - Se prefirió «el Camino» con mayúscula para reflejar el uso técnico de Hechos.
  - «Razonando» traduce el participio de διαλέγομαι conforme al registro discursivo de Hechos.
  - «Salón de Tirano» busca ser comprensible sin imponer una equivalencia más interpretativa que el griego.
  - Se evitó «siempre» o fórmulas absolutas que el imperfecto no exige.
