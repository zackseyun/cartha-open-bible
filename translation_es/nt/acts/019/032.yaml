- from: Así que unos gritaban una cosa y otros otra[a], porque la asamblea estaba confundida, y la mayoría no sabía por qué se habían reunido.
  to: Así que unos gritaban una cosa y otros otra, porque la asamblea[a] estaba en desorden, y la mayoría no sabía por qué se habían reunido.
  rationale: Se reubica la nota [a] para que ancle correctamente en «asamblea», el término que explica la nota léxica sobre ἐκκλησία. También se ajusta «estaba confundida» a «estaba en desorden» para reflejar mejor el estado de confusión/caos de συγκεχυμένη en español natural y evitar una lectura demasiado psicológica del grupo. No se requieren cambios doctrinales ni adjudicación adicional.
