translation:
  language: es
  text: Así que unos gritaban una cosa y otros otra, porque la asamblea[a] estaba en desorden, y la mayoría no sabía por qué se habían reunido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la reunión» o «la multitud». El griego usa ἐκκλησία, aquí en sentido de asamblea cívica y no de iglesia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι μὲν οὖν ἄλλο τι ἔκραζον
  english_pob_choice: So then some were shouting one thing and some another
  chosen_spanish: Así que unos gritaban una cosa y otros otra
  alternatives_spanish:
  - Entonces unos gritaban una cosa y otros otra
  - Así pues, unos gritaban una cosa y otros algo distinto
  lexicon: BDAG
  rationale: La construcción distributiva ἄλλοι ... ἄλλο τι exige en español una oposición breve y natural. «Gritaban» conserva el valor imperfectivo de ἔκραζον y el tono de ruido confuso. «Así que» representa idiomáticamente μὲν οὖν sin calco rígido.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - congregación
  - multitud
  lexicon: BDAG
  rationale: En este contexto cívico, ἐκκλησία no significa iglesia. «Asamblea» preserva el sentido de reunión pública formal y evita una lectura eclesial ajena al pasaje.
- source_word: συγκεχυμένη
  english_pob_choice: in confusion
  chosen_spanish: confundida
  alternatives_spanish:
  - en confusión
  - desordenada
  lexicon: BDAG
  rationale: El participio perfecto describe un estado resultante de confusión o desorden. «Estaba confundida» suena natural en español y mantiene la idea de estado continuado.
- source_word: οἱ πλείους
  english_pob_choice: most of them
  chosen_spanish: la mayoría
  alternatives_spanish:
  - la mayoría de ellos
  - la mayor parte
  lexicon: BDAG
  rationale: El sustantivado οἱ πλείους funciona como «los más / la mayoría». «La mayoría» es breve y claramente retoma a los reunidos.
- source_word: τίνος ἕνεκα
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - con qué motivo
  lexicon: BDAG
  rationale: La locución idiomática significa «por qué motivo». «Por qué» es la equivalencia natural y directa en español.
- source_word: συνεληλύθεισαν
  english_pob_choice: they had come together
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - habían venido juntos
  - se habían congregado
  lexicon: BDAG
  rationale: El pluscuamperfecto indica una reunión previa ya completada en el relato. «Se habían reunido» comunica bien el aspecto resultativo sin forzar un tecnicismo.
theological_decisions:
- issue: ἐκκλησία en contexto cívico vs. eclesial
  english_pob_reading: assembly; the Greek word is ἐκκλησία, here used for a civic assembly rather than the church
  chosen_spanish_reading: asamblea; aquí ἐκκλησία se usa para una asamblea cívica y no para la iglesia
  alternative_spanish_readings:
  - reunión
  - congregación
  - iglesia
  rationale: El texto griego señala una reunión pública tumultuosa, no la comunidad cristiana. Mantener «asamblea» evita importar un sentido eclesial que el contexto desmiente.
  doctrine_reference: Contexto léxico de ἐκκλησία en Hechos 19; distinción semántica entre asamblea civil e iglesia
- issue: Estado de confusión de la asamblea
  english_pob_reading: the assembly was in confusion
  chosen_spanish_reading: la asamblea estaba confundida
  alternative_spanish_readings:
  - la asamblea estaba en confusión
  - la asamblea estaba desordenada
  rationale: El participio perfecto de συγχέω presenta una condición ya establecida. «Estaba confundida» conserva esa lectura sin añadir interpretación doctrinal.
  doctrine_reference: Semántica verbal de συγχέω; lectura aspectual del perfecto participial
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se respetó la distinción de ἐκκλησία como asamblea cívica, el imperfecto de ἔκραζον, el estado resultante de συγκεχυμένη y el pluscuamperfecto de συνεληλύθεισαν. No hubo revisiones posteriores en el registro inglés, y el cotejo indica alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Asamblea» se mantiene para ἐκκλησία según el contexto cívico del pasaje.
  - Se prefirió «se habían reunido» por naturalidad y fidelidad aspectual al pluscuamperfecto griego.
  - «Confundida» funciona aquí como estado de la asamblea; no se entiende como confusión mental individual.
