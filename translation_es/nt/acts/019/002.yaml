translation:
  language: es
  text: 'Y él les dijo[a]: «¿Recibieron el Espíritu Santo cuando creyeron?» Y ellos le dijeron: «No[b], ni siquiera hemos oído que existiera el Espíritu Santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Recibieron el Espíritu Santo después de haber creído?». El participio griego puede entenderse con un matiz temporal ligeramente distinto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni siquiera hemos oído si hay Espíritu Santo», o, de manera más interpretativa, «ni siquiera hemos oído que el Espíritu Santo ha sido dado».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπέν τε
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces él les dijo
  - Y les dijo
  lexicon: BDAG
  rationale: λέγω se rinde naturalmente como «decir». El enclítico τέ añade continuidad narrativa; en español, la conjunción inicial «Y» transmite bien esa conexión sin sobrecargar el texto.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los hombres
  lexicon: BDAG
  rationale: La relación direccional del griego se expresa de manera idiomática con el dativo/enclítico «les» en español, evitando una repetición pesada de «a ellos».
- source_word: Εἰ πνεῦμα ἅγιον ἐλάβετε πιστεύσαντες
  english_pob_choice: Did you receive the Holy Spirit when you believed?
  chosen_spanish: ¿Recibieron el Espíritu Santo cuando creyeron?
  alternatives_spanish:
  - ¿Recibieron el Espíritu Santo después de haber creído?
  - ¿Recibieron el Espíritu Santo al creer?
  lexicon: BDAG
  rationale: El participio aoristo πιστεύσαντες puede tener matiz temporal. «Cuando creyeron» preserva la relación temporal sin decidir en exceso entre simultaneidad, anterioridad o subsecuencia, y mantiene abierta la tensión doctrinal que el griego no resuelve.
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  lexicon: BDAG
  rationale: Aquí πνεῦμα ἅγιον se refiere a la persona del Espíritu de Dios; por eso en español es natural y fiel usar la forma con artículo «el Espíritu Santo».
- source_word: οἱ δὲ πρὸς αὐτόν
  english_pob_choice: And they said to him
  chosen_spanish: Y ellos le dijeron
  alternatives_spanish:
  - Pero ellos le dijeron
  - Y respondieron
  lexicon: BDAG
  rationale: δέ introduce continuación con leve contraste; «Y» funciona con naturalidad en diálogo narrativo. «Dijeron» mantiene la sencillez del texto griego, sin intensificarlo a «respondieron».
- source_word: Ἀλλ’ οὐδ’
  english_pob_choice: No, not even
  chosen_spanish: No, ni siquiera
  alternatives_spanish:
  - Pero ni siquiera
  - Más aún, ni siquiera
  lexicon: BDAG
  rationale: La combinación refuerza la negación. En español, «No, ni siquiera» reproduce el tono enfático de la réplica sin añadir matices que el griego no exige.
- source_word: οὐδ’ εἰ πνεῦμα ἅγιον ἔστιν ἠκούσαμεν
  english_pob_choice: we have not even heard that there is a Holy Spirit
  chosen_spanish: ni siquiera hemos oído que haya Espíritu Santo
  alternatives_spanish:
  - ni siquiera hemos oído si hay Espíritu Santo
  - ni siquiera hemos oído que el Espíritu Santo existe
  lexicon: BDAG
  rationale: La construcción οὐδὲ εἰ admite un matiz de «si» o de «que». «Que haya Espíritu Santo» conserva el valor directo de la frase y suena natural en español; además evita introducir la expansión interpretativa «ha sido dado», que no está explícita en el griego.
theological_decisions:
- issue: Relación temporal entre creer y recibir el Espíritu Santo
  english_pob_reading: Did you receive the Holy Spirit when you believed?
  chosen_spanish_reading: ¿Recibieron el Espíritu Santo cuando creyeron?
  alternative_spanish_readings:
  - ¿Recibieron el Espíritu Santo después de haber creído?
  - ¿Recibieron el Espíritu Santo al creer?
  rationale: El participio πιστεύσαντες no obliga a una cronología doctrinal precisa. La redacción elegida conserva la pregunta tal como está planteada, sin resolver la discusión sobre subsecuencia o simultaneidad más allá de lo que afirma el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Sentido de la ignorancia sobre el Espíritu Santo
  english_pob_reading: we have not even heard that there is a Holy Spirit
  chosen_spanish_reading: ni siquiera hemos oído que haya Espíritu Santo
  alternative_spanish_readings:
  - ni siquiera hemos oído si hay Espíritu Santo
  - ni siquiera hemos oído que el Espíritu Santo ha sido dado
  rationale: La respuesta es breve y ambigua en el griego. La traducción elegida sigue el sentido más directo sin añadir explicaciones teológicas no presentes en el texto; las alternativas se preservan para dejar visible la ambigüedad.
  doctrine_reference: Primacía del idioma original; preservar la tensión teológica.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «Espíritu Santo» con artículo en el discurso directo, por claridad y naturalidad del español.
  - La negación enfática se conserva con «No, ni siquiera», reflejando el valor intensivo de οὐδ’ sin sobretraducción.
