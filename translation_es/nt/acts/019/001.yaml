translation:
  language: es
  text: Ahora bien, sucedió que, mientras Apolos estaba en Corinto, Pablo, después de pasar por las regiones del interior[a], llegó a Éfeso y halló a algunos discípulos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las regiones altas» o «las regiones interiores»; la expresión probablemente se refiere a la ruta del interior, por las tierras más altas, en contraste con el camino costero.
    reason: lexical_alternative
  - marker: b
    text: «Discípulos» se deja sin precisar aquí; los versículos siguientes muestran que estaban asociados con el bautismo de Juan.
    reason: cross_reference
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Ahora bien, sucedió que
  alternatives_spanish:
  - Y sucedió que
  - Ahora sucedió que
  - Aconteció que
  lexicon: BDAG
  rationale: La fórmula narrativa Ἐγένετο δὲ introduce un nuevo episodio; en español, «sucedió que» conserva el valor de transición sin sonar rígido. «Ahora bien» refleja el matiz discursivo de δέ, manteniendo el cambio de escena de modo natural.
- source_word: ἐν τῷ τὸν Ἀπολλῶ εἶναι ἐν Κορίνθῳ
  english_pob_choice: while Apollos was in Corinth
  chosen_spanish: mientras Apolos estaba en Corinto
  alternatives_spanish:
  - durante la estancia de Apolos en Corinto
  - cuando Apolos estaba en Corinto
  lexicon: BDAG
  rationale: La construcción articular con infinitivo expresa simultaneidad temporal. «Mientras Apolos estaba en Corinto» es idiomático y conserva esa simultaneidad sin sobrecargar la frase.
- source_word: διελθόντα τὰ ἀνωτερικὰ μέρη
  english_pob_choice: passed through the inland regions
  chosen_spanish: después de pasar por las regiones del interior
  alternatives_spanish:
  - después de atravesar las regiones superiores
  - después de pasar por las regiones interiores
  - tras recorrer las regiones del interior
  lexicon: BDAG
  rationale: ἀνωτερικά puede significar «superiores», pero aquí el contexto geográfico favorece la idea de una ruta interior, en contraste con la costera. «Regiones del interior» comunica bien ese sentido y evita un calco poco natural.
- source_word: ἐλθεῖν εἰς Ἔφεσον
  english_pob_choice: came to Ephesus
  chosen_spanish: llegó a Éfeso
  alternatives_spanish:
  - vino a Éfeso
  - arribó a Éfeso
  lexicon: BDAG
  rationale: El infinitivo de movimiento dependiente del marco narrativo se vierte con un pretérito natural en español. «Llegó a Éfeso» es claro, breve y fiel al desplazamiento hacia la ciudad.
- source_word: καὶ εὑρεῖν
  english_pob_choice: and found
  chosen_spanish: y halló
  alternatives_spanish:
  - y encontró
  - y dio con
  lexicon: BDAG
  rationale: «Halló» conserva el hallazgo de εὑρίσκω con un registro bíblico sobrio y natural en español. Evita tanto el calco como una expresión demasiado coloquial.
- source_word: τινας μαθητάς
  english_pob_choice: some disciples
  chosen_spanish: a algunos discípulos
  alternatives_spanish:
  - a ciertos discípulos
  - a unos discípulos
  lexicon: BDAG
  rationale: τινας es indefinido; «algunos discípulos» mantiene esa indefinición. «Discípulos» conserva la precisión lexical del griego y no adelanta la identificación que el contexto posterior aclara.
theological_decisions:
- issue: Identidad de los discípulos hallados por Pablo
  english_pob_reading: Render neutrally as 'disciples' without specifying 'disciples of Jesus' in the main text.
  chosen_spanish_reading: Traducir de forma neutral como «discípulos», sin especificar «discípulos de Jesús» ni «discípulos de Juan» en el texto principal.
  alternative_spanish_readings:
  - discípulos de Jesús
  - discípulos de Juan
  - seguidores
  rationale: El griego solo dice τινας μαθητάς. La aclaración sobre el bautismo de Juan aparece después; por eso la traducción debe preservar la tensión y no resolver anticipadamente la identidad religiosa de este grupo.
  doctrine_reference: Priorizar la evidencia inmediata del texto y dejar que el contexto posterior determine la identificación.
translation_notes:
  revision_awareness: La redacción sigue de cerca la evaluación auditada del inglés POB y su filosofía de equivalencia óptima. Se conserva la secuencia narrativa, la simultaneidad temporal y la indefinición de μαθητάς, sin introducir especificaciones que el texto griego aún no da.
  spanish_consistency_notes:
  - Se usa «Apolos» como forma estándar en español para Ἀπολλῶ.
  - Se mantiene «Éfeso» como topónimo tradicional y claro.
  - «Regiones del interior» preserva la ambigüedad geográfica documentada en el aparato inglés.
  - «Discípulos» no se amplía en el cuerpo del texto para respetar la tensión contextual.
  - La puntuación sigue el ritmo narrativo del griego y del inglés auditado, con una sola oración principal en español.
