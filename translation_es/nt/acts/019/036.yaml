translation:
  language: es
  text: Por tanto[a], ya que estas cosas son indiscutibles[b], es necesario que ustedes mantengan la calma[c] y no hagan nada precipitado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «así pues» o «entonces».
    reason: lexical_alternative
  - marker: b
    text: O «innegables» o «sin posibilidad de contradicción».
    reason: lexical_alternative
  - marker: c
    text: O «permanezcan tranquilos» o «estén serenos».
    reason: lexical_alternative
  - marker: d
    text: O «no hagan nada imprudente» o «no hagan nada apresurado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναντιρρήτων
  english_pob_choice: undeniable
  chosen_spanish: indiscutibles
  alternatives_spanish:
  - innegables
  - irrefutables
  - beyond contradiction
  lexicon: BDAG
  rationale: El adjetivo expresa que no admite contradicción o disputa. En español, «indiscutibles» conserva bien esa fuerza y suena natural en un registro público y formal.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: Marca una inferencia lógica respecto de lo anterior. «Por tanto» mantiene el tono formal y la relación conclusiva del discurso.
- source_word: ὄντων τούτων
  english_pob_choice: since these things are
  chosen_spanish: ya que estas cosas son
  alternatives_spanish:
  - puesto que estas cosas son
  - siendo estas cosas
  - porque estas cosas son
  lexicon: BDAG
  rationale: El genitivo absoluto expresa la base o circunstancia de la exhortación. «Ya que estas cosas son» comunica con naturalidad esa relación causal en español.
- source_word: δέον ἐστίν
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - conviene
  - es preciso
  - es menester
  lexicon: BDAG
  rationale: La construcción impersonal expresa necesidad u obligación. «Es necesario» reproduce ese valor con claridad y sin dureza arcaizante.
- source_word: κατεσταλμένους ὑπάρχειν
  english_pob_choice: to remain calm
  chosen_spanish: permanezcan calmados
  alternatives_spanish:
  - estén tranquilos
  - mantengan la calma
  - estén compuestos
  lexicon: BDAG
  rationale: El participio perfecto de καταστέλλω indica un estado de serenidad o contención ya establecido. «Permanezcan calmados» conserva la idea de un estado continuo y resulta idiomático en español.
- source_word: μηδὲν προπετὲς πράσσειν
  english_pob_choice: to do nothing rash
  chosen_spanish: no hagan nada precipitado
  alternatives_spanish:
  - no hagan nada imprudente
  - no hagan nada temerario
  - no hagan nada rash
  lexicon: BDAG
  rationale: προπετής describe una acción impulsiva o prematura. «Precipitado» transmite bien la advertencia contra actuar con prisa o sin reflexión, sin perder el matiz de imprudencia.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: conserva la inferencia de οὖν, la circunstancia del genitivo absoluto, la necesidad impersonal y el par semántico de serenidad más la prohibición de actuar con precipitación. No se documentan revisiones textuales ni cambios de sentido relevantes en el expediente aportado.'
  spanish_consistency_notes:
  - Se usa «indiscutibles» para ἀναντιρρήτων por su naturalidad y fuerza jurídica/racional.
  - «Permanezcan calmados» refleja el estado durativo de κατεσταλμένους ὑπάρχειν sin reducirlo a silencio exterior.
  - «No hagan nada precipitado» conserva el sentido de μηδὲν προπετὲς πράσσειν como advertencia contra la acción impulsiva.
