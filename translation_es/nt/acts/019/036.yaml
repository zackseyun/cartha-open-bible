review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido general del griego: inferencia lógica (οὖν), base causal (''ya que''), necesidad impersonal (δέον ἐστίν), llamado a la calma (κατεσταλμένους ὑπάρχειν) y prohibición de acción impulsiva (μηδὲν προπετὲς πράσσειν). Sin embargo, dos detalles requieren ajuste: ''permanezcan calmados'' suena menos idiomático que ''mantengan la calma'' en español público natural, y las notas al pie están desalineadas con los anclajes y con los tipos de alternativa del inglés POB.'
  spanish_quality_summary: El español es claro y comprensible, pero 'permanezcan calmados' resulta algo rígido. 'Mantengan la calma' suena más natural y dignificado sin perder el sentido exhortativo. Además, la nota [b] repite el término principal como alternativa y la [c] ofrece alternativas poco paralelas a la frase base; conviene reformularlas para reflejar opciones fraseológicas completas y evitar glosas sueltas.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: ''Por tanto'', ''ya que'', ''es necesario''. Para κατεσταλμένους ὑπάρχειν, ''mantengan la calma'' representa mejor el valor exhortativo y el estado de compostura que una forma pasiva literal. Para ἀναντιρρήτων, ''indiscutibles'' es aceptable; las alternativas deben limpiarse y mantenerse en español. Para μηδὲν προπετές πράσσειν, la frase principal ''no hagan nada precipitado'' es fiel, aunque las alternativas deben formularse como frases completas.'
  issues:
  - severity: medium
    issue: '''permanezcan calmados'' es poco idiomático en este contexto.'
    rationale: Aunque es entendible, en español general suena algo rígido o calcado. 'Mantengan la calma' comunica mejor el llamado a un estado de compostura y corresponde bien al sentido contextual de κατεσταλμένους ὑπάρχειν.
  - severity: medium
    issue: Las notas al pie no corresponden bien a los anclajes ni a la lógica del audit trail inglés.
    rationale: En el inglés, las alternativas documentadas para 'undeniable' pertenecen al término de ἀναντιρρήτων y las de 'remain calm' pertenecen a la exhortación sobre la calma. En el borrador, [a] está anclada en 'Por tanto' pero da alternativas de οὖν; eso es válido, pero faltan notas claras y bien formuladas para la calma, mientras [c] ofrece alternativas de adjetivo suelto en vez de frases completas paralelas a 'no hagan nada precipitado'.
  - severity: low
    issue: Hay alternativas en inglés dentro de las decisiones léxicas españolas.
    rationale: Aparecen elementos como 'beyond contradiction' y 'no hagan nada rash', que no son español natural. No impiden entender el texto final, pero muestran que la documentación necesita limpieza.
