- from: Por tanto[a], ya que estas cosas son indiscutibles[b], es necesario que ustedes permanezcan calmados y no hagan nada precipitado[c].
  to: Por tanto[a], ya que estas cosas son indiscutibles[b], es necesario que ustedes mantengan la calma[c] y no hagan nada precipitado[d].
