translation:
  language: es
  text: de modo que incluso pañuelos o delantales de trabajo[a] eran llevados de su cuerpo[b] a los enfermos, y las enfermedades se apartaban de ellos, y los espíritus malignos salían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “delantales”. El término griego se refiere a prendas de trabajo o de labor.
    reason: lexical_alternative
  - marker: b
    text: O “de su piel”. El griego χρώς indica más literalmente la superficie del cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación de resultado consecutivo en español, manteniendo el valor inferencial de la construcción griega.
- source_word: ἐπὶ τοὺς ἀσθενοῦντας
  english_pob_choice: to the sick
  chosen_spanish: a los enfermos
  alternatives_spanish:
  - para los enfermos
  - hacia los enfermos
  lexicon: BDAG
  rationale: ἀσθενοῦντας significa “los que están enfermos”; en español “a los enfermos” conserva la dirección del movimiento sin volverlo más explicativo de lo que permite el texto.
- source_word: ἀποφέρεσθαι
  english_pob_choice: were carried away
  chosen_spanish: eran llevados
  alternatives_spanish:
  - eran transportados
  - eran traídos
  lexicon: BDAG
  rationale: La idea central es el traslado de los objetos desde la persona de Pablo hacia los enfermos. “Eran llevados” es natural y conserva la pasividad del giro griego.
- source_word: ἀπὸ τοῦ χρωτὸς αὐτοῦ
  english_pob_choice: from his skin
  chosen_spanish: desde su cuerpo
  alternatives_spanish:
  - desde su piel
  - desde su cuerpo
  lexicon: BDAG
  rationale: El audit trail inglés pasó de “skin” a “body” por naturalidad y precisión. En español, “desde su cuerpo” es más idiomático y respeta la nota léxica sin imponer una imagen demasiado técnica de “piel”.
- source_word: σουδάρια
  english_pob_choice: handkerchiefs
  chosen_spanish: pañuelos
  alternatives_spanish:
  - pañuelos de mano
  - paños
  lexicon: BDAG
  rationale: σουδάρια designa piezas de tela pequeñas usadas para secar el sudor o la cara. “Pañuelos” comunica bien la referencia en español sin cargar el texto con una explicación innecesaria.
- source_word: σιμικίνθια
  english_pob_choice: work aprons
  chosen_spanish: delantales de trabajo
  alternatives_spanish:
  - delantales
  - prendas de trabajo
  lexicon: BDAG
  rationale: El término alude a prendas de labor, no a delantales domésticos en sentido moderno. “Delantales de trabajo” preserva el matiz funcional documentado en el audit trail inglés.
- source_word: ἀπαλλάσσεσθαι
  english_pob_choice: left them
  chosen_spanish: se apartaban de ellos
  alternatives_spanish:
  - los dejaban
  - se retiraban de ellos
  lexicon: BDAG
  rationale: Con νόσους como sujeto, la imagen es que las enfermedades se van o se alejan. “Se apartaban de ellos” conserva el movimiento de salida y evita añadir un sujeto posesivo que el griego no expresa explícitamente.
- source_word: νόσους
  english_pob_choice: diseases
  chosen_spanish: enfermedades
  alternatives_spanish:
  - dolencias
  - padecimientos
  lexicon: BDAG
  rationale: “Enfermedades” es el equivalente directo y mantiene el plural concreto del sustantivo griego.
- source_word: πνεύματα τὰ πονηρά
  english_pob_choice: the evil spirits
  chosen_spanish: los espíritus malignos
  alternatives_spanish:
  - los espíritus malos
  - los espíritus perversos
  lexicon: BDAG
  rationale: La frase identifica una clase definida de seres espirituales hostiles. “Malignos” conserva el tono negativo del adjetivo y es más idiomático en español bíblico que una calca pesada.
- source_word: ἐκπορεύεσθαι
  english_pob_choice: went out
  chosen_spanish: salían
  alternatives_spanish:
  - iban fuera
  - se iban
  lexicon: BDAG
  rationale: En contexto de expulsión de espíritus, “salían” es la forma más natural en español y mantiene la idea de salida efectiva.
theological_decisions:
- issue: Naturaleza del fenómeno milagroso mediado por paños y delantales
  english_pob_reading: Translate the event straightforwardly as narrated, without adding explanatory language about relics, sacramental mechanism, or superstition.
  chosen_spanish_reading: Traducir el relato de manera directa, sin introducir lenguaje de reliquias, mecanismo sacramental ni descalificación racionalista del milagro.
  alternative_spanish_readings:
  - Interpretaciones que sugieren veneración de objetos sagrados
  - Redacciones que reducen el episodio a un símbolo
  rationale: El texto presenta una acción extraordinaria como parte de la narración lucana. La traducción debe conservar esa afirmación sin añadir categorías doctrinales posteriores ni suavizar el carácter milagroso del pasaje.
  doctrine_reference: Hechos 19:11–12; principios de fidelidad narrativa y no eiségesis
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos: evita una traducción demasiado literal de χρώς como “piel” cuando en español “cuerpo” resulta más natural en este contexto, y conserva la ausencia de un posesivo explícito en “las enfermedades”, reflejando que el griego dice simplemente que se apartaban de ellos. También mantiene la decisión de traducir πνεύματα τὰ πονηρά como seres espirituales hostiles de modo directo, sin glosa interpretativa.'
  spanish_consistency_notes:
  - Usé “Yahvé” solo cuando el texto lo requiera; aquí no aparece.
  - Mantuve “espíritus malignos” para πνεύματα τὰ πονηρά, en coherencia con el uso contextual de πνεῦμα.
  - No usé “Cristo” ni terminología cristológica porque el verso no la contiene.
  - Evité “SEÑOR” y cualquier sustitución devocional, ya que el pasaje no tiene κύριος ni alusión al nombre divino.
  - El orden de los objetos (“pañuelos o delantales de trabajo”) refleja la disyunción griega ἢ y la forma narrativa del pasaje.
