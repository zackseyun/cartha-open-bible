translation:
  language: es
  text: 'Después de reunirlos[a] y a los obreros dedicados a tales cosas, les dijo: «Hombres, ustedes saben que de este negocio tenemos nuestra prosperidad»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de este oficio obtenemos nuestra riqueza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναθροίσας
  english_pob_choice: After gathering them together
  chosen_spanish: Después de reunirlos a ellos
  alternatives_spanish:
  - después de juntarlos
  - habiéndolos reunido
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal expresa acción previa; en español, 'Después de reunirlos' conserva bien esa relación temporal. 'A ellos' explicita el objeto retomado por el participio y mantiene la referencia del griego.
- source_word: τοὺς περὶ τὰ τοιαῦτα ἐργάτας
  english_pob_choice: the workmen occupied with such things
  chosen_spanish: a los obreros dedicados a tales cosas
  alternatives_spanish:
  - a los trabajadores ocupados en esas cosas
  - a los artesanos relacionados con tales asuntos
  lexicon: BDAG
  rationale: ἐργάτας designa trabajadores/obreros de forma general. 'Obreros' conserva la amplitud del griego sin forzar una precisión artesanal que el texto no impone. 'Dedicados a tales cosas' refleja περὶ τὰ τοιαῦτα con una relación general de ocupación o dedicación.
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Varones
  - Caballeros
  lexicon: BDAG
  rationale: El vocativo plural de ἀνήρ se dirige a los hombres presentes. 'Hombres' es la equivalencia directa y mantiene el tono sobrio del original.
- source_word: ἐπίστασθε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - ustedes entienden
  - ustedes están al tanto
  lexicon: BDAG
  rationale: El verbo expresa conocimiento ya poseído. 'Ustedes saben' es natural en español y conserva la fuerza directa del griego.
- source_word: ἐκ ταύτης τῆς ἐργασίας
  english_pob_choice: from this business
  chosen_spanish: de este negocio
  alternatives_spanish:
  - de este trabajo
  - de esta actividad comercial
  lexicon: BDAG
  rationale: ἐργασία puede significar trabajo, ocupación o negocio; en este contexto económico/comercial, 'negocio' comunica bien la empresa lucrativa implicada. 'De este' reproduce la referencia demostrativa del griego.
- source_word: ἡ εὐπορία ἡμῖν ἐστιν
  english_pob_choice: we have our prosperity
  chosen_spanish: viene nuestra prosperidad
  alternatives_spanish:
  - tenemos nuestra prosperidad
  - de aquí proviene nuestra riqueza
  lexicon: BDAG
  rationale: εὐπορία denota prosperidad, riqueza o bienestar material. La construcción griega afirma que esa prosperidad resulta de la actividad mencionada; 'viene nuestra prosperidad' conserva el sentido resultativo sin sonar forzado. Se evitó 'riqueza' como opción principal para no estrechar el término a una sola implicación económica.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente del inglés POB (sin cambios sustantivos). Se mantuvo la ambigüedad económica de ἐργασία/εὐπορία sin imponer una interpretación más específica que el griego no exige.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'obreros' frente a 'artesanos' para no añadir una precisión ocupacional no explícita en el sustantivo griego.
  - '''Prosperidad'' conserva el campo semántico de εὐπορία sin reducirlo exclusivamente a ''riqueza''.'
