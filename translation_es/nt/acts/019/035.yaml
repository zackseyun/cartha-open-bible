    reason: lexical_alternative
  revision_rationale: Se ajusta νεωκόρον a una expresión española más natural y alineada con la revisión inglesa auditada ('guardiana del templo'), manteniendo la nota léxica alternativa. Se mueve la ambigüedad de διοπετοῦς a la nota y se adopta en el texto principal 'la imagen caída del cielo', conforme a la decisión contextual y teológica del POB. También se mejora la fluidez del inicio y se corrige la puntuación del discurso directo.
