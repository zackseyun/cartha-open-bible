translation:
  language: es
  text: 'Pero, después de que el secretario municipal calmó a la multitud, dijo: «Varones efesios, pues ¿qué hombre hay que no sepa que la ciudad de los efesios es guardiana[a] del templo de la gran Artemisa y de la imagen caída del cielo[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «custodia del templo». El término griego denota una ciudad reconocida como custodio o guardián de un templo o culto.
    reason: lexical_alternative
  - marker: b
    text: O «de lo caído del cielo». El término griego se refiere a algo creído caído del cielo; aquí probablemente alude a la imagen cultual asociada con Artemisa.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστείλας
  english_pob_choice: had quieted
  chosen_spanish: después de haber aquietado
  alternatives_spanish:
  - después de haber calmado
  - habiendo aquietado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa una acción previa. En español, «después de haber aquietado» conserva la secuencia temporal y el sentido de apaciguar un tumulto sin sonar forzado.
- source_word: γραμματεὺς
  english_pob_choice: city clerk
  chosen_spanish: secretario municipal
  alternatives_spanish:
  - clérigo de la ciudad
  - escribano municipal
  lexicon: BDAG
  rationale: El contexto es cívico-administrativo, no religioso ni escriturario. «Secretario municipal» comunica con claridad la función oficial del cargo en Éfeso.
- source_word: ὄχλον
  english_pob_choice: crowd
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - gentío
  lexicon: BDAG
  rationale: «Multitud» es natural en español para un grupo público alterado y conserva el tono narrativo.
- source_word: Ἄνδρες Ἐφέσιοι
  english_pob_choice: Men of Ephesus
  chosen_spanish: Varones efesios
  alternatives_spanish:
  - Hombres efesios
  - Efesios
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino plural del griego. «Varones efesios» suena solemne y conserva la dirección formal del discurso sin neutralizar el género gramatical.
- source_word: τίς γάρ ἐστιν ἀνθρώπων ὃς οὐ γινώσκει
  english_pob_choice: for what man is there who does not know
  chosen_spanish: pues ¿qué hombre hay que no sepa
  alternatives_spanish:
  - pues ¿quién entre los hombres no sabe
  - pues ¿qué persona hay que no sepa
  lexicon: BDAG
  rationale: La pregunta es retórica. «¿Qué hombre hay que no sepa?» reproduce bien la fuerza singular y la generalización humana del original, con español idiomático.
- source_word: τὴν Ἐφεσίων πόλιν
  english_pob_choice: the city of the Ephesians
  chosen_spanish: la ciudad de los efesios
  alternatives_spanish:
  - la ciudad efesia
  - la ciudad de Éfeso
  lexicon: BDAG
  rationale: Se conserva el genitivo de pertenencia de manera transparente. «La ciudad de los efesios» refleja mejor la forma griega que una simplificación a «la ciudad de Éfeso».
- source_word: νεωκόρον
  english_pob_choice: keeper of the temple
  chosen_spanish: custodio[a]
  alternatives_spanish:
  - guardián
  - encargado
  lexicon: BDAG
  rationale: El término designa una ciudad reconocida como custodio de un templo o culto. En español, «custodio» mantiene la función cultual sin sobreexplicar en el cuerpo principal.
- source_word: τῆς μεγάλης Ἀρτέμιδος
  english_pob_choice: of the great Artemis
  chosen_spanish: del templo de la gran Artemisa
  alternatives_spanish:
  - de la gran Artemisa
  - de la magnífica Artemisa
  lexicon: BDAG
  rationale: 'Se conserva el título «la gran Artemisa» como referencia al culto efesio. La relación de pertenencia se integra naturalmente en la frase anterior: «custodio del templo de la gran Artemisa».'
- source_word: τοῦ διοπετοῦς
  english_pob_choice: of the image fallen from heaven
  chosen_spanish: de lo caído del cielo[b]
  alternatives_spanish:
  - de la imagen caída del cielo
  - de lo caído del cielo, es decir, la imagen
  lexicon: BDAG
  rationale: El griego alude a algo «caído del cielo» o «del cielo/Zeus-caído». Se mantiene la ambigüedad léxica sin añadir «imagen» al texto principal, ya que el español puede expresar la forma más abierta del término y la nota aclara el posible referente cultual.
theological_decisions:
- issue: Cómo traducir la afirmación pagana sobre Artemisa y el objeto διοπετές sin aprobarla teológicamente
  english_pob_reading: 'Translate the civic-religious boast straightforwardly without endorsing its truth: ''keeper of the temple of the great Artemis and of the image fallen from heaven.'''
  chosen_spanish_reading: 'Traducir el elogio cívico-religioso de forma directa, sin avalarlo: «custodio del templo de la gran Artemisa y de lo caído del cielo».'
  alternative_spanish_readings:
  - «guardián del templo de la gran Artemisa y de la imagen caída del cielo»
  - «custodio del templo de la gran Artemisa y del objeto caído del cielo»
  rationale: El versículo reporta el discurso de un funcionario pagano, no una afirmación inspirada de la fe bíblica. La traducción debe conservar el contenido y la ambigüedad del objeto cultual sin amplificarlo más de lo que exige el griego.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
- issue: Mantener el vocativo masculino plural Ἄνδρες Ἐφέσιοι
  english_pob_reading: Men of Ephesus
  chosen_spanish_reading: Varones efesios
  alternative_spanish_readings:
  - Hombres efesios
  - Efesios
  rationale: La forma griega es masculina y vocativa. Se preserva su fuerza retórica y formalidad sin neutralizarla indebidamente.
  doctrine_reference: Principio de correspondencia formal con respeto al género gramatical
- issue: Valor de νεωκόρος en contexto efesio
  english_pob_reading: keeper of the temple
  chosen_spanish_reading: custodio
  alternative_spanish_readings:
  - guardián del templo
  - encargado del templo
  rationale: El término describe una ciudad honrada como custodio de un santuario o culto. «Custodio» es breve, claro y conserva el peso institucional-religioso del cargo.
  doctrine_reference: BDAG; nota léxica POB sobre cargos cívico-cultuales
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último pasaje auditado del inglés POB, pero ajusta el núcleo léxico para evitar calco: en vez de «keeper of the temple» se optó por «custodio» en el texto principal, con nota alternativa para mantener la tensión semántica de νεωκόρος. También se preservó la ambigüedad de διοπετοῦς mediante una forma abierta («lo caído del cielo») y una nota que explicita el probable referente cultual. El resto de los cambios se alinean con el audit trail: el orden temporal del participio, el vocativo formal y la pregunta retórica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando corresponda; este versículo no lo requiere.
  - «Artemisa» mantiene la forma española establecida para la diosa.
  - Se evita «SEÑOR» o paraphraseo doctrinal porque el texto es una cita de habla pagana.
  - La puntuación usa comillas españolas y conserva la pregunta retórica con tono formal.
