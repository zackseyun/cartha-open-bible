review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: la acción previa de καταστείλας, el cargo cívico de γραμματεὺς, el vocativo formal Ἄνδρες Ἐφέσιοι, y la afirmación cívico-religiosa sobre Artemisa. Sin embargo, no preserva del todo la decisión auditada del POB sobre τοῦ διοπετοῦς, donde el inglés principal explicitó el referente como ''image fallen from heaven''. El español principal ''de lo caído del cielo'' reintroduce una ambigüedad que el POB resolvió en el texto, no solo en nota. Además, ''custodio'' en singular aplicado a ''la ciudad'' suena menos natural que una formulación que incluya explícitamente ''del templo''.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero hay varios puntos de naturalidad y precisión: falta la palabra ''el secretario municipal'' como sujeto explícito tras el participio, aunque puede inferirse; ''Varones efesios'' es aceptable pero algo más rígido en español contemporáneo; y ''la ciudad de los efesios es custodio'' produce discordancia idiomática, pues una ciudad no suele llamarse ''custodio'' sin complemento expreso. ''Guardiana del templo'' o ''custodia del templo'' armoniza mejor con ''ciudad''. También conviene cerrar correctamente las comillas y la pregunta.'
  glossary_alignment: 'No hay conflictos con terminología de proyecto como Yahvé/Mesías. En nombres propios, ''Artemisa'' es aceptable y ampliamente reconocible en español. La principal desalineación con el rastro léxico-teológico del POB está en διοπετοῦς: el POB prefirió explicitar ''imagen'' en el texto principal por claridad contextual. La nota alternativa debe conservar la opción más literal/abierta, no al revés.'
  issues:
  - severity: high
    issue: τοῦ διοπετοῦς se vertió como 'de lo caído del cielo' en el texto principal
    rationale: 'El rastro auditado del POB decidió ''image fallen from heaven'' como lectura principal contextualizada. El español debería seguir esa decisión: ''de la imagen caída del cielo'' o ''caída del cielo/de los cielos'', dejando la forma más abierta para nota.'
  - severity: medium
    issue: νεωκόρον se vertió como 'custodio[a]' sin complemento en predicación sobre 'la ciudad'
    rationale: Aunque semánticamente apunta a custodia cultual, 'la ciudad ... es custodio' suena menos natural en español por discordancia de género y por omitir el complemento explícito que el POB inglés revisó a 'keeper of the temple'. Conviene 'es guardiana[a] del templo' o 'es custodia[a] del templo'.
  - severity: low
    issue: La puntuación y cierre tipográfico del discurso directo están incompletos
    rationale: El texto mostrado termina con signo de interrogación pero sin comillas de cierre. Debe normalizarse.
  revised_spanish_text: 'Pero, después de que el secretario municipal calmó a la multitud, dijo: «Varones efesios, pues ¿qué hombre hay que no sepa que la ciudad de los efesios es guardiana[a] del templo de la gran Artemisa y de la imagen caída del cielo[b]?».'
  revised_footnotes:
