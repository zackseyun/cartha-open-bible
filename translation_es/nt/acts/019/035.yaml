  text: καταστείλας δὲ ⸂ὁ γραμματεὺς τὸν ὄχλον⸃ φησίν· Ἄνδρες Ἐφέσιοι, τίς γάρ ἐστιν ⸀ἀνθρώπων ὃς οὐ γινώσκει τὴν Ἐφεσίων πόλιν νεωκόρον οὖσαν τῆς ⸀μεγάλης Ἀρτέμιδος καὶ τοῦ διοπετοῦς;
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/035.yaml
  text: But after the city clerk had quieted the crowd[a], he said, “Men of Ephesus[b], for what man is there who does not know that the city of the Ephesians is keeper of the temple of the great Artemis and of the image fallen from heaven?”
  footnotes:
  - marker: a
    text: Or 'guardian of the temple of the great Artemis.' The Greek term denotes a city recognized as custodian of a temple or cult.
    reason: lexical_alternative
  - marker: b
    text: Or 'of the heaven-fallen thing.' The Greek word refers to something believed to have fallen from the sky; here it likely means the cult image associated with Artemis.
    reason: lexical_alternative
