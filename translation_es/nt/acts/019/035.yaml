revisions:
- from: 'Pero, después de haber aquietado a la multitud, el secretario municipal dijo: «Varones efesios, pues ¿qué hombre hay que no sepa que la ciudad de los efesios es custodio[a] del templo de la gran Artemisa y de lo caído del cielo[b]?'
  to: 'Pero, después de que el secretario municipal calmó a la multitud, dijo: «Varones efesios, pues ¿qué hombre hay que no sepa que la ciudad de los efesios es guardiana[a] del templo de la gran Artemisa y de la imagen caída del cielo[b]?».'
  rationale: Se ajusta νεωκόρον a una expresión española más natural y alineada con la revisión inglesa auditada ('guardiana del templo'), manteniendo la nota léxica alternativa. Se mueve la ambigüedad de διοπετοῦς a la nota y se adopta en el texto principal 'la imagen caída del cielo', conforme a la decisión contextual y teológica del POB. También se mejora la fluidez del inicio y se corrige la puntuación del discurso directo.
