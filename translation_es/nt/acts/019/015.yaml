translation:
  language: es
  text: 'Pero el espíritu maligno les respondió[a]: «A Jesús lo conozco, y a Pablo lo reconozco; pero ustedes, ¿quiénes son?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A Jesús lo conozco, y de Pablo sé». El griego usa dos verbos distintos: γινώσκω («conocer») y ἐπίσταμαι, lo que puede sugerir un matiz diferente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθὲν
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo con εἶπεν funciona como introducción idiomática de discurso. «Respondió» conserva la idea de reacción a la escena sin sonar redundante en español.
- source_word: τὸ πνεῦμα τὸ πονηρόν
  english_pob_choice: the evil spirit
  chosen_spanish: el espíritu malo
  alternatives_spanish:
  - el espíritu maligno
  - el espíritu perverso
  lexicon: BDAG
  rationale: πνεῦμα se refiere aquí a un ser espiritual personal; πονηρός puede ser «malo» o «maligno». «Espíritu malo» es claro y fiel, y mantiene el registro sobrio del relato.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: answered them
  chosen_spanish: respondió a ellos
  alternatives_spanish:
  - les dijo
  - contestó a ellos
  lexicon: BDAG
  rationale: En español, «respondió a ellos» expresa bien el destinatario explícito. Aunque «les dijo» sería más natural, aquí se preserva la relación con ἀποκριθὲν sin perder claridad.
- source_word: Τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: A Jesús
  alternatives_spanish:
  - Jesús
  - Al Jesús
  lexicon: BDAG
  rationale: El acusativo griego antepuesto da énfasis. En español, anteponer «A Jesús» reproduce esa prominencia con una construcción natural cuando funciona como objeto directo animado.
- source_word: γινώσκω
  english_pob_choice: I know
  chosen_spanish: lo conozco
  alternatives_spanish:
  - lo sé
  - lo conozco bien
  lexicon: BDAG
  rationale: «Conocer» es la correspondencia más directa para γινώσκω. El objeto clítico «lo» evita repetir el nombre y mantiene la fluidez del discurso directo.
- source_word: ἐπίσταμαι
  english_pob_choice: I recognize
  chosen_spanish: sé
  alternatives_spanish:
  - lo reconozco
  - estoy al tanto de él
  lexicon: BDAG
  rationale: Se conserva la distinción léxica del griego sin forzar una equivalencia artificial. «Sé» aquí puede funcionar como conocimiento informado o reconocimiento relacional en contexto; la nota explica la alternativa si se desea marcar la diferencia con mayor nitidez.
- source_word: ὑμεῖς δὲ τίνες ἐστέ
  english_pob_choice: but who are you
  chosen_spanish: pero ustedes, ¿quiénes son?
  alternatives_spanish:
  - pero vosotros, ¿quiénes son?
  - y ustedes, ¿quiénes son?
  lexicon: BDAG
  rationale: El plural se conserva con «ustedes». La pregunta de identidad se vierte de forma natural en español, manteniendo el contraste con Jesús y Pablo.
theological_decisions:
- issue: Distinguir el valor de γινώσκω y ἐπίσταμαι sin sobreinterpretar la escena
  english_pob_reading: 'Different English verbs: ''Jesus I know, and Paul I recognize'''
  chosen_spanish_reading: «A Jesús lo conozco, y de Pablo sé»
  alternative_spanish_readings:
  - «A Jesús lo conozco, y a Pablo lo reconozco»
  - «A Jesús lo conozco, y de Pablo tengo noticia»
  - «A Jesús lo conozco, y de Pablo sé algo»
  rationale: El griego usa dos verbos distintos, y la traducción española debe mantener esa tensión. «Lo conozco» / «de Pablo sé» conserva la diferencia sin afirmar más de lo que el texto dice sobre el alcance del conocimiento del espíritu.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception); §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo el texto sin cambios; esta versión española sigue el mismo criterio de preservar la diferencia entre γινώσκω y ἐπίσταμαι, pero la expresa con una construcción más natural para el español.
  spanish_consistency_notes:
  - Se mantiene «espíritu» en sentido personal espiritual, no como «viento» o «aliento».
  - Se conserva el contraste entre Jesús y Pablo en el dicho del espíritu, sin suavizar la pregunta retórica final.
  - Se usa «ustedes» para reflejar el plural de ὑμεῖς en español neutro latinoamericano.
