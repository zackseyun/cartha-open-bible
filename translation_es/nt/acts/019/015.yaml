revisions:
- from: 'Pero el espíritu malo respondió[a] a ellos: «A Jesús lo conozco, y de Pablo sé; pero ustedes, ¿quiénes son?»'
  to: 'Pero el espíritu maligno les respondió[a]: «A Jesús lo conozco, y a Pablo lo reconozco; pero ustedes, ¿quiénes son?»'
  rationale: Se ajusta el español para mayor naturalidad y fidelidad al contraste léxico del griego. «Les respondió» mejora la fluidez; «espíritu maligno» suena más idiomático en este contexto; y «a Pablo lo reconozco» mantiene de forma clara la diferencia entre γινώσκω y ἐπίσταμαι, en línea con la decisión documentada en el POB en inglés. La nota conserva la alternativa más literal «de Pablo sé» como posibilidad secundaria, pero fuera del texto principal por su menor naturalidad.
