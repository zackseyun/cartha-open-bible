translation:
  language: es
  text: Y muchos de los que habían practicado artes mágicas[a] reunieron sus libros y los quemaron en presencia de todos; y calcularon su valor, y hallaron que era de cincuenta mil piezas de plata[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prácticas ocultas». La expresión griega, literalmente «cosas curiosas» o «especiales», aquí designa prácticas mágicas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cinco miríadas de plata», es decir, cincuenta mil piezas de plata. El tipo exacto de moneda no se especifica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - bastantes
  - un considerable número de
  lexicon: BDAG
  rationale: ἱκανοί aquí indica un número considerable de personas. «Muchos» es natural en español y mantiene el valor cuantitativo sin exagerarlo.
- source_word: τὰ περίεργα πραξάντων
  english_pob_choice: who had practiced magic arts
  chosen_spanish: que habían practicado artes mágicas
  alternatives_spanish:
  - que habían practicado artes ocultas
  - que habían ejercido prácticas mágicas
  lexicon: BDAG
  rationale: En este contexto efesio la expresión alude a prácticas mágicas u ocultas, no solo a cosas «curiosas». «Artes mágicas» conserva la referencia práctica y el peso histórico-religioso del texto.
- source_word: συνενέγκαντες
  english_pob_choice: brought ... together
  chosen_spanish: trajeron juntos
  alternatives_spanish:
  - reunieron
  - juntaron y trajeron
  lexicon: BDAG
  rationale: El participio expresa que reunieron los libros en un mismo lugar antes de quemarlos. «Trajeron juntos» sigue de cerca la imagen concreta del griego.
- source_word: τὰς βίβλους
  english_pob_choice: their books
  chosen_spanish: sus libros
  alternatives_spanish:
  - los libros de ellos
  - sus volúmenes
  lexicon: BDAG
  rationale: «Libros» es la equivalencia natural para βίβλους; el posesivo se infiere del contexto, como en inglés, porque pertenecían a quienes practicaban esas artes.
- source_word: κατέκαιον
  english_pob_choice: burned
  chosen_spanish: los quemaron
  alternatives_spanish:
  - estaban quemándolos
  - seguían quemándolos
  lexicon: BDAG
  rationale: Aunque el imperfecto griego puede sugerir acción en curso, en español narrativo «los quemaron» comunica bien el hecho, siguiendo la revisión inglesa más reciente y el estilo fluido del pasaje.
- source_word: ἐνώπιον πάντων
  english_pob_choice: in the sight of everyone
  chosen_spanish: en presencia de todos
  alternatives_spanish:
  - delante de todos
  - a la vista de todos
  lexicon: BDAG
  rationale: La frase subraya la publicidad del acto. «En presencia de todos» es natural y solemne en español, y conserva el matiz de testimonio público.
- source_word: συνεψήφισαν
  english_pob_choice: totaled up
  chosen_spanish: calcularon
  alternatives_spanish:
  - sumaron
  - computaron
  lexicon: BDAG
  rationale: El verbo denota calcular o sumar una cantidad. «Calcularon» transmite con claridad la operación de determinar el total sin sonar mecánico.
- source_word: τὰς τιμὰς αὐτῶν
  english_pob_choice: their value
  chosen_spanish: el valor de ellos
  alternatives_spanish:
  - su valor
  - el precio de ellos
  lexicon: BDAG
  rationale: Aquí τιμή se refiere al valor monetario. «El valor de ellos» mantiene la referencia a los libros y evita decidir prematuramente entre «precio» y «valor».
- source_word: ἀργυρίου μυριάδας πέντε
  english_pob_choice: fifty thousand pieces of silver
  chosen_spanish: cincuenta mil piezas de plata
  alternatives_spanish:
  - cinco miríadas de plata
  - cincuenta mil monedas de plata
  lexicon: BDAG
  rationale: μυριάδες πέντε equivale literalmente a cincuenta mil. «Piezas de plata» preserva la generalidad del griego, que no especifica una moneda concreta.
theological_decisions:
- issue: Sentido de τὰ περίεργα en el contexto de Éfeso
  english_pob_reading: Rendered as 'magic arts' without softening to merely 'curious practices.'
  chosen_spanish_reading: «artes mágicas» sin suavizarlo a «prácticas curiosas»
  alternative_spanish_readings:
  - «prácticas ocultas»
  - «artes curiosas»
  rationale: El contexto inmediato habla de libros costosos vinculados con prácticas mágicas; por eso conviene mantener la fuerza religiosa e histórica del término en vez de diluirlo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente en la preferencia por una narración directa («los quemaron») y mantiene el matiz público del acto con una fórmula solemne y natural («en presencia de todos»). También conserva la equivalencia numérica explicada en la nota para evitar especificar una moneda que el griego no nombra.
  spanish_consistency_notes:
  - Se preserva «artes mágicas» para τὰ περίεργα conforme al contexto de Éfeso y la auditable decisión inglesa.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente; no hay términos de YHWH en este versículo.
  - «Piezas de plata» mantiene la vaguedad monetaria del griego y evita imponer una denominación específica.
  - Las notas a y b están ancladas en el texto español exactamente en los lugares correspondientes.
