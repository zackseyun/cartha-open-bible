base_translation:
  language: en
  yaml_path: translation/nt/acts/019/019.yaml
  text: And many of those who had practiced magic arts brought their books together and burned them in the sight of everyone[b][a]; and they totaled up their value and found it to be fifty thousand pieces of silver.
  footnotes:
