    text: Or 'occult practices.' The Greek expression literally refers to 'curious' or 'special' things, but in this context it denotes magical practices.
    reason: lexical_alternative
  - marker: b
    text: Literally 'five myriads of silver,' that is, fifty thousand pieces of silver. The exact coin denomination is not specified.
    reason: lexical_alternative
