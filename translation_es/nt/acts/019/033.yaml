translation:
  language: es
  text: Y de entre la multitud[a] trajeron a Alejandro, puesto que los judíos lo habían empujado hacia delante; y Alejandro, haciendo un gesto con la mano, quería presentar su defensa ante la asamblea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trajeron a Alejandro ... los judíos lo habían puesto al frente». El griego usa dos verbos relacionados para presentar públicamente a Alejandro.
    reason: lexical_alternative
  - marker: b
    text: O «ante el pueblo». El término tiene un sentido cívico-público y se distingue de «multitud» al inicio del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de entre la multitud
  alternatives_spanish:
  - de entre el gentío
  - desde la multitud
  lexicon: BDAG
  rationale: ὄχλος designa la masa reunida; en español, «multitud» mantiene el sentido colectivo y se distingue bien de δῆμος al final del verso. «De entre» expresa mejor la salida de un grupo público hacia el frente de la escena.
- source_word: συνεβίβασαν Ἀλέξανδρον
  english_pob_choice: they brought forward Alexander
  chosen_spanish: trajeron a Alejandro
  alternatives_spanish:
  - presentaron a Alejandro
  - lo pusieron por delante a Alejandro
  lexicon: BDAG
  rationale: El verbo compuesto expresa la acción de sacar o conducir a alguien al frente en un contexto público. «Trajeron» comunica el movimiento hacia el centro de la asamblea sin añadir matices más fuertes que el griego.
- source_word: προβαλόντων αὐτὸν τῶν Ἰουδαίων
  english_pob_choice: since the Jews had pushed him forward
  chosen_spanish: después de que los judíos lo habían empujado hacia delante
  alternatives_spanish:
  - puesto que los judíos lo habían hecho salir al frente
  - después de que los judíos lo habían puesto al frente
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto explica la situación previa. «Empujado hacia delante» conserva la fuerza pública de προβάλλω sin necesariamente implicar violencia física, y refleja la relación entre ambos verbos griegos sin borrarla.
- source_word: κατασείσας τὴν χεῖρα
  english_pob_choice: motioning with his hand
  chosen_spanish: haciendo un gesto con la mano
  alternatives_spanish:
  - señalando con la mano
  - agitando la mano
  lexicon: BDAG
  rationale: El gesto es una señal pública para captar la atención o pedir silencio; el griego no especifica el tipo exacto del gesto. «Haciendo un gesto con la mano» es natural en español y no sobretraduce.
- source_word: ἤθελεν ἀπολογεῖσθαι
  english_pob_choice: wanted to make a defense
  chosen_spanish: quería defenderse
  alternatives_spanish:
  - quería presentar su defensa
  - quería dar una defensa
  lexicon: BDAG
  rationale: Ἀπολογεῖσθαι tiene un matiz forense de responder en defensa propia. En español, «defenderse» comunica esa intención de manera clara y sobria; se evita una frase más técnica que podría sonar artificial en este contexto narrativo.
- source_word: τῷ δήμῳ
  english_pob_choice: to the assembly
  chosen_spanish: ante el pueblo
  alternatives_spanish:
  - a la asamblea
  - ante la asamblea
  - al pueblo
  lexicon: BDAG
  rationale: Δῆμος puede referirse al cuerpo cívico reunido. «Ante el pueblo» conserva el sentido público y evita confundirlo con la «multitud» ya mencionada; además, en español suena natural en un contexto de discurso público.
- source_word: Ἀλέξανδρον / Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_spanish: Alejandro
  alternatives_spanish:
  - Alejandro
  lexicon: conventional transliteration into Spanish
  rationale: El nombre propio se adapta a la forma estándar española «Alejandro», de uso bíblico y reconocible para lectores hispanos.
theological_decisions:
- issue: Distinción entre ὄχλος y δῆμος en una escena de tumulto público
  english_pob_reading: crowd ... assembly / people
  chosen_spanish_reading: multitud ... pueblo
  alternative_spanish_readings:
  - multitud ... asamblea
  - gentío ... pueblo
  rationale: 'Se conserva la distinción léxica del griego: el primer término es la masa indeterminada; el segundo es el cuerpo cívico o público al que Alejandro quería dirigirse. «Pueblo» mantiene esa diferenciación sin volver demasiado técnico el final del verso.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el griego directamente junto con el aparato de auditoría en inglés. Se mantuvo la distinción entre ὄχλος y δῆμος, y se buscó una formulación española natural que no borre la relación entre los dos verbos de presentación pública (συνεβίβασαν / προβαλόντων).
  spanish_consistency_notes:
  - Se mantuvo «Alejandro» como forma española estándar del nombre propio.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay vocabulario divino en este versículo.
  - «Multitud» se reservó para ὄχλος y «pueblo» para δῆμος para preservar la distinción contextual.
