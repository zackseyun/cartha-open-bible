base_translation:
  language: en
  yaml_path: translation/nt/acts/019/033.yaml
  text: And from the crowd they brought forward Alexander[a], since the Jews had pushed him forward; and Alexander, motioning with his hand[b], wanted to make a defense to the assembly.
  footnotes:
  - marker: a
    text: Or 'they put forward Alexander ... the Jews having put him forward.' The Greek uses two related verbs for publicly bringing Alexander to the front.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the people.' The term here has a civic-public sense and is distinct from 'crowd' earlier in the verse.
    reason: lexical_alternative
