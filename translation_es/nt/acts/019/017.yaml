revisions:
- from: Y esto llegó a ser conocido por todos los judíos y los griegos que habitaban en Éfeso[a]; y cayó temor sobre todos ellos[b], y el nombre del Señor Jesús seguía siendo engrandecido.
  to: Y esto se hizo conocido entre todos los judíos y griegos que vivían en Éfeso, y cayó temor sobre todos ellos[a], y el nombre del Señor Jesús era engrandecido[b].
  rationale: Se ajusta la primera cláusula a un español más natural y más fiel al dativo griego; se elimina una nota espuria que no aportaba alternativa real; y se mejora la representación del imperfecto pasivo en la cláusula final sin añadir un matiz de continuidad no explícito. Se conservan las alternativas léxicas documentadas para «cayó temor» y «era engrandecido».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:09:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «esto» retoma el incidente previo; «cayó temor sobre todos ellos» reproduce adecuadamente ἐπέπεσεν φόβος; y «el nombre del Señor Jesús» conserva correctamente τὸ ὄνομα τοῦ κυρίου Ἰησοῦ. Sin embargo, hay dos desajustes relevantes. Primero, «llegó a ser conocido por» suena menos natural y menos preciso para el dativo de destinatario que «llegó a ser conocido por todos»; en español aquí corresponde mejor «se hizo conocido entre/a todos». Segundo, la nota [a] no preserva una alternativa real del inglés ni aclara ambigüedad: repite esencialmente el mismo contenido de «habitaban en Éfeso».'
  spanish_quality_summary: El español es claro y de registro digno, pero hay cierta rigidez calca en «llegó a ser conocido por todos» y en «seguía siendo engrandecido». Una formulación más idiomática y fiel sería «esto se hizo conocido entre todos los judíos y griegos que vivían en Éfeso... y el nombre del Señor Jesús era engrandecido». Además, la puntuación puede simplificarse sin punto y coma para mayor fluidez narrativa.
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: κύριος → «Señor», Ἰησοῦς → «Jesús», φόβος → «temor», τὸ ὄνομα → «el nombre». No hay conflicto con los términos teológicos por defecto. La única corrección léxica importante es preferir una expresión española más natural para ἐγένετο γνωστὸν y eliminar una nota innecesaria.'
  issues:
  - severity: medium
    issue: «llegó a ser conocido por todos» suena poco natural y debilita el valor del dativo
    rationale: ἐγένετο γνωστὸν πᾶσιν expresa que el hecho vino a ser conocido por/entre todos los grupos mencionados. En español bíblico-natural, «se hizo conocido entre todos» o «fue conocido por todos» comunica mejor el sentido que «llegó a ser conocido por todos». Además, «por» puede rozar una lectura agentiva.
  - severity: medium
    issue: La nota [a] no aporta una alternativa significativa y no corresponde al modelo auditado
    rationale: 'La nota inglesa [a]/[b] del expediente está desplazada respecto del borrador; en español la nota [a] actual («O: “habitaban en Éfeso”») repite prácticamente la misma redacción ya usada en el texto y no preserva una variante útil. Debe eliminarse si no hay una alternativa real que justificar.'
  - severity: low
    issue: «seguía siendo engrandecido» añade un matiz de continuidad no explicitado
    rationale: El imperfecto ἐμεγαλύνετο sí expresa acción en curso, pero «seguía siendo» puede sugerir continuación desde antes, no solo proceso imperfectivo. «Era engrandecido» conserva mejor el aspecto sin sobreinterpretar.
  revised_spanish_text: Y esto se hizo conocido entre todos los judíos y griegos que vivían en Éfeso, y cayó temor sobre todos ellos[a], y el nombre del Señor Jesús era engrandecido[b].
  revised_footnotes:
  - marker: a
    text: 'O: «temor vino sobre todos ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el nombre del Señor Jesús era exaltado» o «era tenido en gran honra».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula a un español más natural y más fiel al dativo griego; se elimina una nota espuria que no aportaba alternativa real; y se mejora la representación del imperfecto pasivo en la cláusula final sin añadir un matiz de continuidad no explícito. Se conservan las alternativas léxicas documentadas para «cayó temor» y «era engrandecido».
