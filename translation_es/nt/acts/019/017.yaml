translation:
  language: es
  text: Y esto se hizo conocido entre todos los judíos y griegos que vivían en Éfeso, y cayó temor sobre todos ellos[a], y el nombre del Señor Jesús era engrandecido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «temor vino sobre todos ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el nombre del Señor Jesús era exaltado» o «era tenido en gran honra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - aquello
  - esto mismo
  lexicon: BDAG
  rationale: El demostrativo singular retoma el incidente anterior; «esto» es natural en español y conserva la referencia inmediata sin añadir contenido.
- source_word: ἐγένετο γνωστὸν
  english_pob_choice: became known
  chosen_spanish: llegó a ser conocido
  alternatives_spanish:
  - se hizo conocido
  - se dio a conocer
  lexicon: BDAG
  rationale: La combinación expresa el inicio de un estado público de conocimiento. «Llegó a ser conocido» conserva el matiz inceptivo sin sonar artificial en español.
- source_word: πᾶσιν Ἰουδαίοις τε καὶ Ἕλλησιν
  english_pob_choice: to all the Jews and Greeks
  chosen_spanish: por todos los judíos y los griegos
  alternatives_spanish:
  - a todos los judíos y griegos
  - para todos los judíos y griegos
  lexicon: BDAG
  rationale: En español, el valor de destinatario o alcance del conocimiento se expresa con mayor naturalidad mediante «por todos». Mantiene la amplitud del grupo receptor sin forzar una estructura dativa.
- source_word: τοῖς κατοικοῦσιν τὴν Ἔφεσον
  english_pob_choice: living in Ephesus
  chosen_spanish: que habitaban en Éfeso
  alternatives_spanish:
  - que vivían en Éfeso
  - residentes en Éfeso
  lexicon: BDAG
  rationale: «Habitaban» conserva el sentido de κατοικέω como residir/establecerse en un lugar y mantiene un registro algo más solemne que «vivían».
- source_word: ἐπέπεσεν φόβος ἐπὶ πάντας αὐτούς
  english_pob_choice: fear fell upon them all
  chosen_spanish: cayó temor sobre todos ellos
  alternatives_spanish:
  - vino temor sobre todos ellos
  - les sobrecogió temor a todos
  lexicon: BDAG
  rationale: El giro idiomático se conserva con «cayó temor sobre», que reproduce la imagen de ἐπιπίπτω. «Temor» expresa el afecto con menos carga interpretativa que «terror» o «awe».
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - pavor
  lexicon: BDAG
  rationale: Aquí el contexto sugiere una reacción reverente y alarmada; «temor» es más amplio y bíblicamente sobrio que «miedo», y evita cargarlo con un sentido excesivamente emocional.
- source_word: ἐμεγαλύνετο
  english_pob_choice: was being magnified
  chosen_spanish: seguía siendo engrandecido
  alternatives_spanish:
  - era engrandecido
  - era exaltado
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción en curso; «seguía siendo engrandecido» preserva la duratividad. «Engrandecido» mantiene la imaginería verbal sin reemplazarla por una equivalencia más interpretativa.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la reputación
  - la autoridad
  lexicon: BDAG
  rationale: El texto dice literalmente «el nombre», y conservarlo mantiene la resonancia bíblica y teológica de la expresión.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Maestro Jesús
  lexicon: BDAG
  rationale: «Señor» corresponde al valor de κύριος adoptado por el POB en este contexto cristológico. «Jesús» se mantiene sin añadir artículo innecesario en español.
theological_decisions:
- issue: Tratamiento de κύριος referido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: Se conserva el título cristológico tradicional en el sentido de κύριος, sin diluirlo en una glosa funcional. En español, «Señor» es la forma más fiel y reconocible para este uso.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Conservar «el nombre» en vez de una paráfrasis como «la reputación»
  english_pob_reading: the name of the Lord Jesus was being magnified
  chosen_spanish_reading: el nombre del Señor Jesús seguía siendo engrandecido
  alternative_spanish_readings:
  - la reputación del Señor Jesús era exaltada
  - el honor del Señor Jesús aumentaba
  rationale: 'La expresión bíblica de «nombre» conserva su espesor teológico: honra pública, autoridad y persona. La paráfrasis explicativa reduciría ese campo semántico.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente griego y el audit trail inglés: mantiene el demostrativo singular, el valor inceptivo de γίνομαι + γνωστόν, la imagen idiomática de ἐπιπίπτω, y el imperfecto pasivo de ἐμεγαλύνετο con un giro español natural. No se introdujeron cambios respecto del criterio auditado de la traducción inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original y el contexto lo exijan; en este versículo no aparece.
  - «Señor» se conserva para κύριος en referencia a Jesús, conforme a la terminología del proyecto.
  - «temor» se usa aquí como término amplio y reverente, evitando estrechar el sentido a «miedo» o ampliarlo a «awe».
  - El sujeto plural «los judíos y los griegos» se mantiene explícito para respetar la distribución del conocimiento en el texto.
