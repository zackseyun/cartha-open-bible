review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: πολλοί τε = ''Y muchos'', τῶν πεπιστευκότων = ''de los que habían creído'', ἤρχοντο = ''venían'', y los dos participios coordinados se conservan como ''confesando y declarando''. Sin embargo, ''sus hechos'' suena poco idiomático en este contexto y no refleja tan naturalmente τὰς πράξεις αὐτῶν como una expresión verbal más clara en español. Además, el rastro inglés preserva una alternativa léxica para esta frase, y en español conviene reflejarla con nota.'
  spanish_quality_summary: La redacción es generalmente clara y fiel, pero 'declarando sus hechos' resulta algo rígido y poco natural en español bíblico actual. 'Declarando lo que habían hecho' mantiene mejor la claridad narrativa y el sentido de acciones realizadas, sin estrechar indebidamente el término a 'pecados' o 'prácticas'.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Habían creído' preserva correctamente el valor del perfecto participial. 'Confesando' y 'declarando' son adecuados. El ajuste propuesto mejora la equivalencia de πρᾶξις sin afectar decisiones teológicas.
  issues:
  - severity: medium
    issue: La expresión 'sus hechos' es poco natural en español en esta construcción.
    rationale: Aunque formalmente posible, 'declarando sus hechos' suena forzado y menos claro para lectores contemporáneos. Una formulación verbal como 'lo que habían hecho' comunica mejor el sentido de πράξεις en contexto.
  - severity: low
    issue: Falta una nota que preserve la alternativa léxica documentada para τὰς πράξεις αὐτῶν.
    rationale: El expediente inglés conserva una alternativa explícita ('their deeds' / 'the things they had done'). En español, una nota breve ayuda a mantener esa amplitud semántica sin recargar el texto principal.
