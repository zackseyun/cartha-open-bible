translation:
  language: es
  text: Y muchos de los que habían creído venían, confesando y declarando[a] lo que habían hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hechos' o 'sus prácticas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo y natural en español; conserva la brevedad y el valor general de cantidad del griego.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Ahora
  lexicon: BDAG
  rationale: La partícula enlaza con la narración anterior; 'Y' preserva la continuidad discursiva sin añadir matiz no exigido por el texto.
- source_word: τῶν πεπιστευκότων
  english_pob_choice: of those who had believed
  chosen_spanish: de los que habían creído
  alternatives_spanish:
  - de los creyentes
  - de los que creían
  lexicon: BDAG
  rationale: El participio perfecto indica una acción previa con estado resultante; 'habían creído' mantiene esa referencia temporal mejor que un sustantivo eclesial fijo como 'creyentes'.
- source_word: ἤρχοντο
  english_pob_choice: were coming
  chosen_spanish: venían
  alternatives_spanish:
  - seguían viniendo
  - iban viniendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o repetida en pasado; 'venían' es natural en español y conserva ese aspecto sin sobreinterpretar la frecuencia.
- source_word: ἐξομολογούμενοι
  english_pob_choice: confessing
  chosen_spanish: confesando
  alternatives_spanish:
  - reconociendo abiertamente
  - admitiendo
  lexicon: BDAG
  rationale: El verbo puede implicar confesión o reconocimiento. 'Confesando' es la equivalencia más directa y mantiene abierta la relación con lo que se confiesa, según el contexto.
- source_word: ἀναγγέλλοντες
  english_pob_choice: declaring
  chosen_spanish: declarando
  alternatives_spanish:
  - anunciando
  - dando a conocer
  lexicon: BDAG
  rationale: El verbo significa comunicar o hacer saber. 'Declarando' refleja bien la acción de poner en claro lo que antes estaba oculto, sin duplicar excesivamente el matiz de 'confesando'.
- source_word: τὰς πράξεις αὐτῶν
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus prácticas
  - lo que habían hecho
  lexicon: BDAG
  rationale: πρᾶξις puede referirse a hechos, acciones o prácticas. Aquí 'hechos' es más amplio y fiel al término griego que restringirlo a 'prácticas', aunque el contexto incluya conductas anteriores ocultas.
theological_decisions:
- issue: Whether πεπιστευκότων should be rendered as a settled group label or as a prior act/state.
  english_pob_reading: those who had believed
  chosen_spanish_reading: los que habían creído
  alternative_spanish_readings:
  - los creyentes
  - los que creían
  rationale: El perfecto griego subraya una creencia previa con relevancia continua; la traducción evita convertir el participio en una etiqueta institucional o doctrinal que el texto no emplea.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether τὰς πράξεις αὐτῶν should be narrowed to sins, occult practices, or kept broader.
  english_pob_reading: their deeds
  chosen_spanish_reading: sus hechos
  alternative_spanish_readings:
  - sus prácticas
  - sus pecados
  - lo que habían hecho
  rationale: El sustantivo griego es más amplio que 'pecados' y no obliga por sí mismo a un término técnico. 'Hechos' conserva amplitud semántica y permite que el contexto de la sección especifique el tipo de acciones.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el pasaje ya revisado en inglés, que pasó de una formulación más interpretativa ('disclosing their practices') a una más directa ('declaring their deeds'). En español se optó por 'declarando sus hechos' para reflejar de manera sobria tanto ἀναγγέλλοντες como τὰς πράξεις αὐτῶν, manteniendo el paralelismo con 'confesando'.
  spanish_consistency_notes:
  - Se mantiene 'creído' para reflejar el perfecto participial sin convertirlo en sustantivo de grupo.
  - '''Venían'' conserva el imperfecto narrativo sin forzar una iteración explícita.'
  - '''Confesando'' y ''declarando'' se distinguen para no colapsar dos verbos griegos distintos.'
  - '''Hechos'' se usa como término amplio; si el contexto inmediato de la sección requiriera mayor concreción, podría justificarse ''prácticas'', pero aquí se preserva la amplitud del griego.'
