translation:
  language: es
  text: Y entrando en la sinagoga, hablaba con denuedo durante tres meses, razonando y persuadiendo[b] acerca del reino de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «concerniente al reino de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «razonando y tratando de persuadir acerca del reino de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσελθὼν
  english_pob_choice: entering
  chosen_spanish: Y entrando
  alternatives_spanish:
  - habiendo entrado
  - después de entrar
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial para situar la acción previa a la principal. «Entrando» conserva esa relación circunstancial con español natural y sin sobrecargar la frase.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ introduce la siguiente acción narrativa con una conexión suave. «Y» es suficiente, fluido y fiel al matiz progresivo del contexto.
- source_word: συναγωγήν
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - lugar de reunión
  lexicon: BDAG
  rationale: El término designa de forma específica la sinagoga judía; «sinagoga» es el equivalente preciso y ya establecido en español.
- source_word: ἐπαρρησιάζετο
  english_pob_choice: he spoke boldly
  chosen_spanish: hablaba con denuedo
  alternatives_spanish:
  - hablaba abiertamente
  - hablaba con valentía
  lexicon: BDAG
  rationale: El imperfecto indica habla continua y valiente. «Hablaba con denuedo» comunica bien la franqueza y audacia del verbo, y mantiene el valor durativo que el contexto de «durante tres meses» refuerza.
- source_word: ἐπὶ μῆνας τρεῖς
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  lexicon: BDAG
  rationale: La preposición con acusativo expresa duración; «durante tres meses» es la manera natural y exacta de marcar ese lapso en español.
- source_word: διαλεγόμενος
  english_pob_choice: reasoning
  chosen_spanish: dialogando
  alternatives_spanish:
  - razonando
  - discutiendo
  lexicon: BDAG
  rationale: El participio sugiere conversación argumentativa e interactiva. «Dialogando» evita un tono excesivamente polémico y conserva el carácter de intercambio razonado que Lucas suele presentar en Hechos.
- source_word: πείθων
  english_pob_choice: persuading them
  chosen_spanish: persuadiendo
  alternatives_spanish:
  - tratando de persuadirlos
  - convenciéndolos
  lexicon: BDAG
  rationale: El participio indica esfuerzo persuasivo. En español, el objeto implícito se puede recuperar por el contexto inmediato; por eso «persuadiendo» mantiene la concisión sin añadir una explicitación no exigida por la sintaxis española.
- source_word: περὶ τῆς βασιλείας τοῦ θεοῦ
  english_pob_choice: about the kingdom of God
  chosen_spanish: acerca del reino de Dios
  alternatives_spanish:
  - con respecto al reino de Dios
  - sobre el reino de Dios
  lexicon: BDAG
  rationale: περί con genitivo se traduce de modo directo como «acerca de / sobre». «Reino de Dios» preserva la expresión teológica estándar y fiel al griego.
theological_decisions:
- issue: Cómo expresar el alcance de βασιλεία τοῦ θεοῦ
  english_pob_reading: kingdom of God
  chosen_spanish_reading: reino de Dios
  alternative_spanish_readings:
  - reinado de Dios
  - gobierno de Dios
  rationale: Aunque βασιλεία puede implicar reinado o gobierno, el giro más fiel, reconocible y consistente en español es «reino de Dios». No hay aquí una razón textual para desplazar la formulación a una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: consistency of key terms'
- issue: Objeto implícito de πείθων
  english_pob_reading: 'Included ''them'' in English: ''persuading them about the kingdom of God'''
  chosen_spanish_reading: Objeto implícito no explicitado en el texto principal
  alternative_spanish_readings:
  - persuadiendo a ellos
  - persuadiéndoles
  rationale: En español el participio puede mantenerse sin objeto expreso cuando el contexto lo provee. Dado que el griego no repite un objeto explícito, se preserva esa economía sintáctica y no se introduce una explicitación adicional en el texto principal.
  doctrine_reference: 'Translation philosophy: source transparency'
- issue: Valor aspectual del imperfecto ἐπαρρησιάζετο
  english_pob_reading: he spoke boldly
  chosen_spanish_reading: hablaba con denuedo
  alternative_spanish_readings:
  - habló con denuedo
  - estaba hablando con denuedo
  rationale: El imperfecto presenta una acción continuada o reiterada. «Hablaba con denuedo» refleja ese aspecto mejor que un pasado puntual, y armoniza con la duración temporal del pasaje.
  doctrine_reference: 'Translation philosophy: aspect-sensitive rendering'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete griego SBLGNT y el auditorio inglés de la POB. Se respeta la lectura establecida de «reino de Dios» y se conserva el carácter durativo del imperfecto y de los participios, sin añadir contenido ajeno al griego. No se aplicaron revisiones posteriores en el registro fuente.
  spanish_consistency_notes:
  - Se mantuvo «reino de Dios» como término teológico estándar y consistente.
  - «Con denuedo» se usa para representar la franqueza audaz de παρρησιάζομαι con un registro bíblico claro en español.
  - Se evitó añadir un objeto explícito a «persuadiendo» en el texto principal, porque el griego lo deja implícito y el español lo tolera bien en contexto.
  - La puntuación con comas refleja el encadenamiento participial del original sin fragmentar indebidamente la oración.
