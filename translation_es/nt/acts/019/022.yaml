translation:
  language: es
  text: Después de enviar a Macedonia a dos de los que le servían—Timoteo y Erasto—, él mismo permaneció algún tiempo en Asia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la provincia romana de Asia, en el occidente de Asia Menor, no el continente moderno.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποστείλας
  english_pob_choice: after sending
  chosen_spanish: Después de enviar
  alternatives_spanish:
  - habiendo enviado
  - tras enviar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, una construcción temporal con «después de» expresa con naturalidad la secuencia sin añadir interpretación.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: —
  alternatives_spanish:
  - Y
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Aquí δέ funciona como nexo narrativo suave. En español puede dejarse implícito sin perder sentido, evitando forzar un conector innecesario.
- source_word: εἰς τὴν Μακεδονίαν
  english_pob_choice: into Macedonia
  chosen_spanish: a Macedonia
  alternatives_spanish:
  - hacia Macedonia
  - en Macedonia
  lexicon: BDAG
  rationale: Con verbos de envío, «a Macedonia» transmite bien la dirección del movimiento en español y resulta más natural que un calco como «hacia/into».
- source_word: δύο τῶν διακονούντων αὐτῷ
  english_pob_choice: two of those who were ministering to him
  chosen_spanish: a dos de los que le servían
  alternatives_spanish:
  - a dos de los que le ministraban
  - a dos de sus asistentes
  lexicon: BDAG
  rationale: διακονέω conserva la idea de servicio/ministerio, pero en español «servían» comunica la relación sin sobrerrepresentar un cargo eclesiástico. «Ministraban» es posible, pero suena más eclesiástico y menos transparente.
- source_word: Τιμόθεον καὶ Ἔραστον
  english_pob_choice: Timothy and Erastus
  chosen_spanish: Timoteo y Erasto
  alternatives_spanish:
  - Timoteo y Erastos
  lexicon: Convención onomástica estándar
  rationale: Se siguen las formas castellanas habituales de transliteración, manteniendo inteligibilidad y coherencia bíblica.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático y contrasta con los dos enviados; «él mismo» preserva ese énfasis.
- source_word: ἐπέσχεν χρόνον
  english_pob_choice: stayed for a time
  chosen_spanish: permaneció algún tiempo
  alternatives_spanish:
  - se quedó por algún tiempo
  - se detuvo por un tiempo
  lexicon: BDAG
  rationale: La locución indica permanencia por un periodo; «permaneció algún tiempo» es natural, sobrio y fiel al valor verbal.
- source_word: εἰς τὴν Ἀσίαν
  english_pob_choice: in Asia
  chosen_spanish: en Asia
  alternatives_spanish:
  - en la provincia de Asia
  - a Asia
  lexicon: BDAG
  rationale: 'Aunque εἰς puede ser direccional, con ἐπέσχεν χρόνον el sentido es locativo: permaneció en Asia. En nota se aclara que se trata de la provincia romana.'
theological_decisions:
- issue: Referencia geográfica de «Asia»
  english_pob_reading: Asia refers to the Roman province in western Asia Minor, not the modern continent.
  chosen_spanish_reading: Asia se entiende como la provincia romana de Asia, no como el continente moderno.
  alternative_spanish_readings:
  - Asia (sin aclaración)
  - Asia Menor
  rationale: La aclaración evita una lectura anacrónica y sigue el sentido histórico del texto. «Asia Menor» puede orientar, pero el griego aquí se refiere con más precisión a la provincia romana.
  doctrine_reference: Contexto histórico-geográfico del libro de Hechos; cf. uso provincial de Ἀσία en el NT.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; la versión inglesa más reciente permanece sin cambios y con alta concordancia general.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general, pero este versículo no contiene el nombre divino.
  - Se usa «servían» para διακονέω por fidelidad y fluidez; no se introduce «siervo» porque el contexto no exige una designación formal.
  - «Asia» se conserva en el texto principal por brevedad y naturalidad, con nota explicativa para evitar ambigüedad histórica.
