translation:
  language: es
  text: En aquel tiempo hubo no pequeño alboroto acerca del Camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el camino'. Aquí se refiere al movimiento cristiano, una designación recurrente en Hechos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: there arose
  chosen_spanish: surgió
  alternatives_spanish:
  - hubo
  - se produjo
  - aconteció
  lexicon: BDAG
  rationale: γίνομαι aquí introduce la irrupción de un hecho. En español, 'surgió' conserva bien el valor eventivo y la idea de aparición de una situación nueva, sin volverlo demasiado plano como 'hubo'.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona como enlace narrativo suave. 'Y' mantiene la continuidad del relato en español sin cargar contraste que el contexto inmediato no exige.
- source_word: κατὰ τὸν καιρὸν ἐκεῖνον
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - por aquel tiempo
  - durante aquel tiempo
  lexicon: BDAG
  rationale: La expresión temporal se vierte de modo natural como 'en aquel tiempo', conservando la referencia narrativa sin expansión innecesaria.
- source_word: τάραχος
  english_pob_choice: disturbance
  chosen_spanish: disturbio
  alternatives_spanish:
  - alboroto
  - comoción
  - tumulto
  lexicon: BDAG
  rationale: τάραχος señala desorden o agitación. 'Disturbio' comunica esa perturbación general sin adelantar todavía la especificidad de un motín o revuelta.
- source_word: οὐκ ὀλίγος
  english_pob_choice: no small
  chosen_spanish: no poco
  alternatives_spanish:
  - considerable
  - grande
  - nada pequeño
  lexicon: BDAG
  rationale: La litotes se conserva mejor en español con 'no poco', manteniendo la retórica lucana en vez de suavizarla a una equivalencia explicativa.
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  - en cuanto a
  lexicon: BDAG
  rationale: Con genitivo, περί introduce el tema del conflicto. 'Acerca de' es claro, natural y suficientemente preciso para el registro narrativo.
- source_word: τῆς ὁδοῦ
  english_pob_choice: the Way
  chosen_spanish: el Camino
  alternatives_spanish:
  - el camino
  lexicon: BDAG
  rationale: En Hechos, ἡ ὁδός funciona como designación estable del movimiento cristiano. Se conserva la mayúscula para señalar ese valor titular, no meramente espacial.
theological_decisions:
- issue: ἡ ὁδός como designación del movimiento cristiano
  english_pob_reading: the Way
  chosen_spanish_reading: el Camino
  alternative_spanish_readings:
  - el camino
  rationale: La mayúscula ayuda a que el lector reconozca el uso recurrente en Hechos de una designación fija para la comunidad cristiana, sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Hechos 9:2; 19:9, 23; 22:4; 24:14, 22
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, y se evitó crear notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo la litotes de οὐκ ὀλίγος como 'no poco' para conservar el tono retórico lucano.
  - '''Camino'' va con mayúscula por su valor titular en Hechos, no por uso genérico.'
