translation:
  language: es
  text: 'Pero, cuando reconocieron que era judío[a], se levantó una sola voz de todos ellos, clamando por unas dos horas: «¡Grande es Artemisa de los efesios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeano». El término griego puede denotar tanto a un judío como a alguien de Judea; aquí es más probable el sentido etnorreligioso amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  english_pob_choice: when they recognized
  chosen_spanish: cuando reconocieron
  alternatives_spanish:
  - cuando se dieron cuenta
  - habiendo reconocido
  lexicon: BDAG
  rationale: El participio aoristo expresa una circunstancia previa al clamor; en español, «cuando reconocieron» mantiene la relación temporal sin sonar artificial. «Se dieron cuenta» sería más idiomático pero algo más libre; «habiendo reconocido» conserva más la forma, pero resulta más pesado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Introduce un giro narrativo respecto del contexto inmediato. «Pero» conserva el matiz adversativo y es natural en español.
- source_word: Ἰουδαῖός
  english_pob_choice: a Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judío de Judea
  - judeano
  lexicon: BDAG
  rationale: En este contexto de diáspora, el sentido etnorreligioso es el más probable y el más comunicativo en español. «Judío» preserva la lectura amplia; se evita forzar un matiz geográfico que no es el principal aquí.
- source_word: φωνὴ ἐγένετο μία ἐκ πάντων
  english_pob_choice: one voice arose from them all
  chosen_spanish: se levantó una sola voz de todos ellos
  alternatives_spanish:
  - una sola voz surgió de todos
  - todos clamaron a una sola voz
  lexicon: BDAG
  rationale: La imagen griega enfatiza una voz unificada que emerge del grupo. «Se levantó una sola voz» conserva la singularidad de φωνὴ μία y la idea de irrupción colectiva. «Todos clamaron a una sola voz» es más dinámico, pero diluye un poco la metáfora de «voz» como sujeto singular.
- source_word: ὡς ἐπὶ ὥρας δύο
  english_pob_choice: for about two hours
  chosen_spanish: por cerca de dos horas
  alternatives_spanish:
  - por unas dos horas
  - durante casi dos horas
  lexicon: BDAG
  rationale: ὡς con expresión de medida indica aproximación. «Por cerca de dos horas» comunica bien el valor no exacto y suena natural en español.
- source_word: κραζόντων
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - vociferando
  lexicon: BDAG
  rationale: El participio presente denota acción continua. «Clamando» mantiene el tono solemne y público del alboroto sin caer en un registro demasiado coloquial. «Gritando» sería posible, pero menos digno; «vociferando» es más fuerte de lo necesario.
- source_word: Μεγάλη ἡ Ἄρτεμις Ἐφεσίων
  english_pob_choice: Great is Artemis of the Ephesians!
  chosen_spanish: ¡Grande es Artemisa de los efesios!
  alternatives_spanish:
  - ¡Grande es la Artemisa de los efesios!
  - ¡Artemisa de los efesios es grande!
  lexicon: BDAG
  rationale: Se conserva la exclamación acclamatoria y el orden enfático del griego. «Artemisa» es la forma española usual del nombre; «de los efesios» reproduce adecuadamente el genitivo asociativo.
theological_decisions:
- issue: Ἰουδαῖος como identidad etnorreligiosa en un contexto de acusación pública
  english_pob_reading: a Jew
  chosen_spanish_reading: judío
  alternative_spanish_readings:
  - judeano
  - judío de Judea
  rationale: La escena describe cómo la multitud identifica a Alejandro dentro de una categoría social-religiosa reconocible. En español, «judío» comunica mejor esa pertenencia que una forma geográfica más estrecha, que podría sugerir un matiz no dominante en el pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve ambiguity only where genuine'
translation_notes:
  revision_awareness: El texto inglés auditado fue afinado desde una redacción más literal a una más natural, cambiando «as they were shouting» por «crying out» para reflejar mejor el participio κραζόντων. La versión española adopta esa misma preferencia semántica con «clamando», manteniendo el énfasis en una acción continua y pública. También conserva la imagen singular de «una sola voz» y el valor aproximativo de «por cerca de dos horas».
  spanish_consistency_notes:
  - Se usa «judío» para Ἰουδαῖος, conforme al sentido etnorreligioso indicado por el audit trail.
  - Se mantiene «Artemisa» como forma española del nombre propio.
  - «Una sola voz» conserva el singular del griego y evita deshacer la imagen colectiva.
  - «Por cerca de dos horas» refleja la aproximación de ὡς ἐπὶ ὥρας δύο.
  - El registro es formal y publicable, sin depender de la convención litúrgica de ocultar el nombre divino, que no aparece en este versículo.
