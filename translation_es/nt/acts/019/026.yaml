revisions:
- from: Y ustedes ven y oyen que no solo en Éfeso, sino casi en toda Asia, este Pablo ha persuadido y apartado a una multitud considerable[a], diciendo que los dioses hechos por manos[b] no son dioses.
  to: Y ustedes ven y oyen que no solo en Éfeso, sino casi en toda Asia, este Pablo ha persuadido y apartado a una multitud considerable, diciendo que los dioses hechos por manos humanas[a] no son dioses[b].
  rationale: Se corrige la ubicación y el contenido de las notas para que correspondan al punto exacto del texto y al rastro de auditoría inglés. También se mejora la naturalidad del español cambiando 'hechos por manos' por 'hechos por manos humanas', sin perder el sentido literal-idiomático del griego.
  reviewer_model: gpt-5.4
