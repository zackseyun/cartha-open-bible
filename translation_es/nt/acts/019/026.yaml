review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene la apelación doble ''ven y oyen'', el alcance geográfico ''no solo en Éfeso, sino casi en toda Asia'', el tono despectivo de ''este Pablo'', la secuencia ''ha persuadido y apartado'', y la negación polémica ''no son dioses''. Sin embargo, hay un problema de notas: la nota [a] está anclada a ''multitud considerable'' pero su contenido trata la alternativa ''no son dioses'', y por tanto no preserva fielmente el rastro de auditoría inglés ni la ubicación semántica correcta. Además, ''hechos por manos'' es demasiado literal y suena poco natural en español; conviene ajustar a ''hechos por manos humanas'' o equivalente, conservando la nota cultural.'
  spanish_quality_summary: El español es claro y mayormente natural, pero requiere una reparación menor para legibilidad y consistencia editorial. 'Hechos por manos' resulta forzado en español; 'hechos por manos humanas' mantiene la fuerza antiidolátrica y suena digno y comprensible. También debe corregirse la colocación de la nota [a] para que ancle en la cláusula pertinente.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοὶ se traduce correctamente como ''dioses''. No aparecen términos sensibles como Yahvé, Mesías, esclavo, carne, etc. La decisión sobre οἱ διὰ χειρῶν γινόμενοι debe priorizar español natural sin perder el sentido idiomático de ídolos manufacturados por seres humanos.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota [a] explica la alternativa de traducción para 'no son dioses', pero en el borrador aparece después de 'multitud considerable'. Esto rompe la correspondencia entre texto y nota exigida por el proyecto y desfigura el rastro de auditoría inglés.
  - severity: medium
    issue: La nota [a] además reformula indebidamente la alternativa inglesa.
    rationale: 'El inglés preserva como alternativa ''are no gods'', no una explicación contextual sobre los ídolos. En español corresponde una nota breve del tipo ''O: «no son dioses en absoluto» / «no son dios alguno»'', no una glosa que cambia el foco.'
  - severity: low
    issue: '''Hechos por manos'' suena poco idiomático en español.'
    rationale: Aunque refleja literalmente el griego, en español neutro eclesial suena incompleto. 'Hechos por manos humanas' conserva el contraste entre lo divino y lo manufacturado, y sigue siendo fiel al sentido documentado.
  revised_spanish_text: Y ustedes ven y oyen que no solo en Éfeso, sino casi en toda Asia, este Pablo ha persuadido y apartado a una multitud considerable, diciendo que los dioses hechos por manos humanas[a] no son dioses[b].
  revised_footnotes:
