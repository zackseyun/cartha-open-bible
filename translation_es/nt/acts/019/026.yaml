translation:
  language: es
  text: Y ustedes ven y oyen que no solo en Éfeso, sino casi en toda Asia, este Pablo ha persuadido y apartado a una multitud considerable, diciendo que los dioses hechos por manos humanas[a] no son dioses[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los que llegan a ser por medio de manos», un giro idiomático para los ídolos hechos por artesanía humana.
    reason: cultural_note
  - marker: b
    text: 'O: «no son dios alguno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖτε
  english_pob_choice: you see
  chosen_spanish: ven
  alternatives_spanish:
  - observan
  - contemplan
  lexicon: BDAG
  rationale: Se mantiene el valor de percepción inmediata y pública, coordinado con 'oyen', en un español natural y directo.
- source_word: ἀκούετε
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - están oyendo
  lexicon: BDAG
  rationale: '''Oyen'' preserva la apelación doble a evidencia visible y audible, sin forzar una perífrasis innecesaria.'
- source_word: οὐ μόνον Ἐφέσου ἀλλὰ σχεδὸν πάσης τῆς Ἀσίας
  english_pob_choice: not only in Ephesus but in almost all of Asia
  chosen_spanish: no solo en Éfeso, sino casi en toda Asia
  alternatives_spanish:
  - no solo de Éfeso, sino de casi toda Asia
  - no solo aquí en Éfeso, sino en casi toda Asia
  lexicon: BDAG
  rationale: La construcción genitiva se vierte con sentido locativo natural en español, y σχεδόν se expresa con 'casi'.
- source_word: ὁ Παῦλος οὗτος
  english_pob_choice: this Paul
  chosen_spanish: este Pablo
  alternatives_spanish:
  - este tal Pablo
  - este mismo Pablo
  lexicon: BDAG
  rationale: '''Este'' conserva el matiz despectivo o desestimador del demostrativo sin añadir interpretación excesiva.'
- source_word: πείσας
  english_pob_choice: has persuaded
  chosen_spanish: ha persuadido
  alternatives_spanish:
  - ha convencido
  - habiendo persuadido
  lexicon: BDAG
  rationale: El participio aoristo se refleja con un perfecto español natural que conserva la acusación de haber ganado a la gente por persuasión.
- source_word: μετέστησεν
  english_pob_choice: turned away
  chosen_spanish: apartado
  alternatives_spanish:
  - desviado
  - hecho cambiar de bando
  lexicon: BDAG
  rationale: '''Apartado'' capta el cambio de posición o lealtad implicado por el verbo, sin reducirlo solo a engaño intelectual.'
- source_word: ἱκανὸν ὄχλον
  english_pob_choice: a considerable crowd
  chosen_spanish: una multitud considerable
  alternatives_spanish:
  - una gran multitud
  - un número considerable de personas
  lexicon: BDAG
  rationale: '''Multitud considerable'' reproduce la idea de número importante de manera natural y fiel al matiz de ἱκανός.'
- source_word: λέγων ὅτι
  english_pob_choice: saying that
  chosen_spanish: diciendo que
  alternatives_spanish:
  - al decir que
  - y decía que
  lexicon: BDAG
  rationale: Introducción verbal simple y transparente, equivalente al participio de habla.
- source_word: οὐκ εἰσὶν θεοὶ
  english_pob_choice: are not gods
  chosen_spanish: no son dioses
  alternatives_spanish:
  - no son verdaderos dioses
  - no son dioses en absoluto
  lexicon: BDAG
  rationale: '''No son dioses'' preserva el predicado negado de forma clara y directa, sin añadir intensificadores ajenos al texto.'
- source_word: οἱ διὰ χειρῶν γινόμενοι
  english_pob_choice: made by hands
  chosen_spanish: hechos por manos
  alternatives_spanish:
  - hechos por la mano humana
  - fabricados por manos humanas
  lexicon: BDAG
  rationale: Se conserva la fuerza idiomática del griego con una expresión literal pero comprensible en español; la nota aclara el sentido de ídolos producidos humanamente.
theological_decisions:
- issue: Cómo rendir la negación sobre ídolos fabricados sin suavizar el golpe polémico
  english_pob_reading: gods made by hands are not gods
  chosen_spanish_reading: los dioses hechos por manos no son dioses
  alternative_spanish_readings:
  - los dioses hechos por manos humanas no son dioses
  - los dioses fabricados por manos no son dioses
  rationale: La formulación mantiene la negación directa del estatus divino de los ídolos, sin añadir 'realmente' ni otros elementos interpretativos que no están en el griego.
  doctrine_reference: Principio de primacía del original y de preservación del sentido llano del texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del expediente inglés y conserva las mismas decisiones nucleares: percepción pública (''ven y oyen''), extensión geográfica (''casi en toda Asia''), el deíctico despectivo (''este Pablo''), la acción persuasiva y el ataque a los ídolos hechos por manos. No se introdujeron cambios de sentido respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se mantiene 'Asia' sin artículo en el uso geográfico natural del español, como equivalente de la construcción idiomática griega.
  - '''Dioses'' se usa en minúscula al referirse a deidades falsamente atribuidas, sin alterar la negación predicativa del texto.'
  - La nota de 'hechos por manos' conserva la tensión entre literalidad e idiomatismo; el cuerpo del texto evita una paráfrasis excesiva.
