  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca la auditoría inglesa: «intentaron», «invocar el nombre», «sobre los que tenían espíritus malos» y «por Jesús, a quien Pablo proclama» corresponden adecuadamente a ἐπεχείρησαν, ὀνομάζειν ... τὸ ὄνομα, τοὺς ἔχοντας τὰ πνεύματα τὰ πονηρά y τὸν Ἰησοῦν ὃν Παῦλος κηρύσσει. También conserva correctamente el tono exorcístico de Ὁρκίζω ὑμᾶς con «Yo les conjuro».'
  spanish_quality_summary: 'El texto es natural y legible en español eclesial moderno. Sin embargo, hay dos detalles de calidad editorial: (1) la nota [a] no ofrece realmente una alternativa distinta del texto principal, porque repite «itinerantes»; debería reflejar la alternativa auditada «que iban de un lugar a otro» o equivalente. (2) El anclaje acumulado [c][d][b] al final de «Jesús, a quien Pablo proclama» es poco claro; [b] explica «los que tenían espíritus malos», por lo que debe colocarse allí. También conviene ajustar [a] para que el usuario vea una variante real.'
  glossary_alignment: 'La terminología principal está alineada con el proyecto y con la auditoría: «Señor Jesús» para κύριος Ἰησοῦ, «Jesús», «espíritus» sin explicitar indebidamente posesión, y «proclama» para κηρύσσει. No surge aquí un caso de Yahvé/Mesías ni conflicto doctrinal mayor.'
