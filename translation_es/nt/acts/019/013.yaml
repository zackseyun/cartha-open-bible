translation:
  language: es
  text: 'Pero también algunos de los exorcistas judíos itinerantes[a] intentaron invocar el nombre del Señor Jesús sobre los que tenían espíritus malos[b], diciendo: «Yo les conjuro por Jesús[c], a quien Pablo proclama[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «también algunos de los exorcistas judíos que iban de un lugar a otro».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «los que tenían espíritus malos»; es decir, personas bajo la influencia de espíritus malos.'
    reason: lexical_alternative
  - marker: c
    text: O «Yo les pongo bajo juramento por Jesús» o «Yo les conmino solemnemente por Jesús».
    reason: lexical_alternative
  - marker: d
    text: O «a quien Pablo predica».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεχείρησαν
  english_pob_choice: attempted
  chosen_spanish: intentaron
  alternatives_spanish:
  - trataron de
  - intentaron hacer
  lexicon: BDAG
  rationale: El aoristo de ἐπιχειρέω expresa una acción intentada o emprendida. «Intentaron» comunica bien ese sentido sin añadir éxito ni fracaso.
- source_word: τινες καὶ τῶν περιερχομένων Ἰουδαίων ἐξορκιστῶν
  english_pob_choice: some also of the itinerant Jewish exorcists
  chosen_spanish: algunos de los exorcistas judíos itinerantes
  alternatives_spanish:
  - algunos también de los exorcistas judíos que iban de un lugar a otro
  - algunos de los exorcistas judíos ambulantes
  lexicon: BDAG
  rationale: «Itinerantes» conserva el matiz técnico de περιερχομένων sin alargar demasiado la frase. El orden español natural permite mantener «judíos» como adjetivo y no requiere repetir «también» con la misma fuerza que el inglés.
- source_word: ὀνομάζειν ἐπὶ ... τὸ ὄνομα
  english_pob_choice: to invoke the name ... over
  chosen_spanish: invocar el nombre ... sobre
  alternatives_spanish:
  - nombrar ... sobre
  - invocar ... en
  lexicon: BDAG
  rationale: En este contexto exorcístico, ὀνομάζειν no es solo mencionar un nombre, sino usarlo ritualmente. «Invocar el nombre» es la equivalencia española más clara y fiel.
- source_word: τοὺς ἔχοντας τὰ πνεύματα τὰ πονηρά
  english_pob_choice: those who had evil spirits
  chosen_spanish: los que tenían espíritus malos
  alternatives_spanish:
  - los que tenían espíritus malignos
  - los poseídos por espíritus malos
  lexicon: BDAG
  rationale: La frase griega dice literalmente «los que tienen los espíritus malos». «Tenían espíritus malos» conserva esa forma sin introducir de manera explícita la idea de posesión.
- source_word: τὰ πνεύματα τὰ πονηρά
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus malignos
  - espíritus perversos
  lexicon: BDAG
  rationale: «Malos» reproduce con naturalidad πονηρά en español y evita sobrecargar el texto. También mantiene la relación con el sustantivo «espíritus» sin cambiar el registro.
- source_word: τὸ ὄνομα τοῦ κυρίου Ἰησοῦ
  english_pob_choice: the name of the Lord Jesus
  chosen_spanish: el nombre del Señor Jesús
  alternatives_spanish:
  - el nombre del Señor Jesucristo
  - el nombre del Señor Jesús
  lexicon: BDAG
  rationale: κύριος se vierte como «Señor» en el sintagma cristológico, conforme al antecedente auditado. «Nombre del Señor Jesús» es la fórmula española más natural y fiel.
- source_word: Ὁρκίζω ὑμᾶς
  english_pob_choice: I adjure you
  chosen_spanish: Yo les conjuro
  alternatives_spanish:
  - Yo les pongo bajo juramento
  - Yo les exhorto bajo juramento
  lexicon: BDAG
  rationale: «Conjurar» preserva el tono exorcístico formal de ὁρκίζω mejor que un simple «ordenar». El pronombre de objeto directo plural se expresa con «les» por la idiomaticidad del español en este uso.
- source_word: τὸν Ἰησοῦν ὃν Παῦλος κηρύσσει
  english_pob_choice: by Jesus, whom Paul proclaims
  chosen_spanish: por Jesús, a quien Pablo proclama
  alternatives_spanish:
  - por Jesús, a quien Pablo predica
  - por el Jesús que Pablo proclama
  lexicon: BDAG
  rationale: Tras ὁρκίζω, el acusativo puede expresar la fórmula «por Jesús» en español. «Proclama» sigue la elección auditada de κηρύσσει y evita restringir el verbo a un registro eclesiástico más estrecho.
theological_decisions:
- issue: Valor de κύριος en la frase cristológica τοῦ κυρίου Ἰησοῦ
  english_pob_reading: Lord Jesus
  chosen_spanish_reading: Señor Jesús
  alternative_spanish_readings:
  - Jesús Señor
  - Maestro Jesús
  rationale: Se mantiene «Señor» según la guía doctrinal y el uso auditado; es la forma cristológica estable y no necesita sustitución.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Nivel de explicitud sobre los espíritus en τοὺς ἔχοντας τὰ πνεύματα τὰ πονηρά
  english_pob_reading: those who had evil spirits
  chosen_spanish_reading: los que tenían espíritus malos
  alternative_spanish_readings:
  - los poseídos por espíritus malos
  - los que estaban bajo espíritus malos
  rationale: Se preserva la formulación literal del griego sin introducir una explicación doctrinal más fuerte que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; no importar precisión doctrinal no explicitada'
- issue: Sentido de Ὁρκίζω ὑμᾶς en contexto exorcístico
  english_pob_reading: I adjure you
  chosen_spanish_reading: Yo les conjuro
  alternative_spanish_readings:
  - Yo les adjuro
  - Yo les impongo juramento
  rationale: «Conjuro» conserva la solemnidad ritual y exorcística del mandato, manteniendo la tensión lexical del original.
  doctrine_reference: 'DOCTRINE.md: conservar el registro léxico cuando tiene valor exegético'
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior porque el marcador [a] ahora aparece en el texto principal exactamente donde corresponde. Se mantuvieron los demás marcadores con anclaje explícito en la frase final para evitar notas huérfanas. También se ajustó el orden de [c][d][b] a una secuencia válida y anclada en la misma unidad textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene יהוה y por tanto no aplica.
  - Se usa «Señor» para κύριος conforme al criterio doctrinal auditado en esta frase cristológica.
  - Se conserva la distinción entre «espíritus malos» y una posible interpretación más fuerte como «poseídos», sin imponerla en el texto principal.
  - «Conjuro» y no «siervo»/«esclavo» no introducen terminología ajena; simplemente preservan el registro exorcístico de Ὁρκίζω.
