translation:
  language: es
  text: 'Y Pablo dijo[a]: «Juan bautizó con un bautismo de arrepentimiento, diciéndole al pueblo que creyera en el que viene después de él, es decir, en Jesús».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Juan bautizó un bautismo de arrepentimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ Παῦλος
  english_pob_choice: And Paul said
  chosen_spanish: Y Pablo dijo
  alternatives_spanish:
  - Entonces Pablo dijo
  - Pero Pablo dijo
  lexicon: SBLGNT + POB audit trail
  rationale: «Dijo» conserva el verbo de habla de forma natural en español, y el nombre propio se mantiene sin añadir información. La conjunción inicial «Y» refleja δέ de manera suave, sin sobreinterpretar su valor adversativo.
- source_word: ἐβάπτισεν βάπτισμα μετανοίας
  english_pob_choice: baptized with a baptism of repentance
  chosen_spanish: bautizó con un bautismo de arrepentimiento
  alternatives_spanish:
  - bautizó un bautismo de arrepentimiento
  - administró un bautismo de arrepentimiento
  lexicon: BDAG
  rationale: Se conserva la construcción cognada para transparencia, pero con una preposición natural en español. «Arrepentimiento» traduce μετανοίας en su sentido de cambio/volteo moral y religioso, que aquí es el contenido del bautismo.
- source_word: τῷ λαῷ
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al pueblo de Israel
  lexicon: BDAG
  rationale: «Pueblo» mantiene la referencia colectiva general del griego χωρίς añadir la precisión «de Israel», que el texto no explicita en esta cláusula.
- source_word: λέγων
  english_pob_choice: telling
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decía
  - al decir
  lexicon: BDAG
  rationale: En español, «diciendo» conserva bien el participio de habla que introduce el contenido de su proclamación, sin forzar una construcción más interpretativa.
- source_word: εἰς τὸν ἐρχόμενον μετ’ αὐτὸν
  english_pob_choice: in the one coming after him
  chosen_spanish: en el que venía después de él
  alternatives_spanish:
  - en el que viene después de él
  - en el que venía tras él
  lexicon: BDAG
  rationale: 'Se traduce εἰς con el mismo valor que en el marco de πιστεύω, es decir, como objeto de fe: «creer en». El participio se vierte en imperfecto relativo para una lectura natural del discurso referido.'
- source_word: ἵνα πιστεύσωσιν
  english_pob_choice: to believe
  chosen_spanish: que creyeran
  alternatives_spanish:
  - para que creyeran
  - que debían creer
  lexicon: BDAG
  rationale: Después de un verbo de decir, ἵνα expresa aquí el contenido/intención de la exhortación. «Que creyeran» conserva la fuerza exhortativa sin volverla mecánica.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: BDAG
  rationale: La fórmula explicativa se vierte con una equivalencia española idiomática y formalmente clara.
- source_word: εἰς τὸν Ἰησοῦν
  english_pob_choice: in Jesus
  chosen_spanish: en Jesús
  alternatives_spanish:
  - hacia Jesús
  - para Jesús
  lexicon: BDAG
  rationale: Se mantiene el nombre propio sin añadir «Cristo» o «Mesías», porque el griego aquí solo dice Ἰησοῦν. La preposición preserva la relación de fe con Jesús establecida por el contexto anterior.
theological_decisions:
- issue: Relación entre el bautismo de Juan y la fe en Jesús
  english_pob_reading: John's baptism is characterized as a baptism associated with repentance, accompanied by a call to believe in the coming one, identified as Jesus.
  chosen_spanish_reading: El bautismo de Juan se presenta como un bautismo ligado al arrepentimiento, acompañado por un llamado a creer en el que venía después de él, identificado explícitamente como Jesús.
  alternative_spanish_readings:
  - El bautismo de Juan produjo por sí mismo la fe cristiana
  - El que venía después de él permanece sin identificar
  rationale: La sintaxis distingue el bautismo de Juan del mensaje que lo acompañaba. La traducción conserva esa distinción y no añade ninguna tesis doctrinal sobre eficacia sacramental o sobre el alcance del bautismo más allá de lo que el versículo dice.
  doctrine_reference: Mantener la tensión textual sin resolverla doctrinalmente; no importar conclusiones que el pasaje no formula.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran una equivalencia estable sin revisiones aplicadas; la versión española mantiene esa estabilidad, con ajuste idiomático mínimo para naturalidad y transparencia.
  spanish_consistency_notes:
  - Se mantiene «Jesús» sin añadir «Cristo/Mesías», siguiendo el griego y el audit trail.
  - Se usa «arrepentimiento» para μετανοίας por su valor semántico en contexto de llamado moral/religioso.
  - Se conserva la referencia de fe con «en» para εἰς dentro de la expresión implícita/expresa de creer.
  - La nota al pie marca la alternativa más formal del giro cognado «bautismo de arrepentimiento» sin alterar el texto principal.
