    text: 'O, más formalmente: «Juan bautizó un bautismo de arrepentimiento».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «venía» a «viene» para reflejar mejor ἐρχόμενον; se reemplaza «diciendo al pueblo que creyeran» por «diciéndole al pueblo que creyera» para un español más natural sin perder la fuerza exhortativa; y se suaviza la puntuación de la explicación «es decir». No se requieren cambios doctrinales ni de terminología principal.
