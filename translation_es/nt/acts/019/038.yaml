    rationale: 'El texto principal ya dice ''los tribunales están en sesión[a]''. La nota comienza ''O: «los tribunales están en sesión»'', por lo que no aporta una variante distinta. Debe recoger la alternativa correspondiente, p. ej. ''se celebran sesiones judiciales''.'
