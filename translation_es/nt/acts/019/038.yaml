translation:
  language: es
  text: Si, pues, Demetrio y los artesanos que están con él tienen alguna querella contra alguien, se celebran sesiones judiciales[a], y hay procónsules[b]; que presenten cargos unos contra otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los tribunales están en sesión». La expresión griega ἀγοραῖοι ἄγονται se refiere a procedimientos judiciales convocados oficialmente.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hay procónsules presentes/disponibles». El plural puede aludir al cargo provincial en sentido administrativo general.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ μὲν οὖν
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Si, entonces
  - Si, por lo tanto
  lexicon: BDAG
  rationale: Conserva la fuerza inferencial y transicional de la secuencia de partículas griegas, con una redacción natural en español sin sobrerrepresentar cada matiz por separado.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrius
  lexicon: Transliteración estándar
  rationale: Nombre propio adaptado a la ortografía española usual, manteniendo la identificación histórica del personaje.
- source_word: οἱ σὺν αὐτῷ τεχνῖται
  english_pob_choice: the craftsmen with him
  chosen_spanish: los artesanos que están con él
  alternatives_spanish:
  - los artesanos con él
  - los artesanos que van con él
  - sus compañeros artesanos
  lexicon: BDAG
  rationale: τεχνῖται designa trabajadores hábiles o artesanos; 'artesanos' es natural en español y encaja con el contexto de los plateros de Éfeso. 'Que están con él' conserva σὺν αὐτῷ sin especificar más de lo que dice el griego.
- source_word: ἔχουσιν πρός τινα λόγον
  english_pob_choice: have a complaint against anyone
  chosen_spanish: tienen alguna querella contra alguien
  alternatives_spanish:
  - tienen una queja contra alguien
  - tienen un caso contra alguien
  - tienen una reclamación contra alguien
  lexicon: BDAG
  rationale: La expresión es forense y remite a un conflicto o demanda legal. 'Querella' mantiene mejor ese matiz jurídico que una simple 'queja' y sigue siendo comprensible en español.
- source_word: ἀγοραῖοι ἄγονται
  english_pob_choice: court sessions are being held
  chosen_spanish: los tribunales están en sesión
  alternatives_spanish:
  - se celebran sesiones judiciales
  - los tribunales sesionan
  - hay audiencias públicas
  lexicon: BDAG
  rationale: La frase alude a procedimientos judiciales oficialmente convocados. 'Los tribunales están en sesión' comunica el sentido institucional y evita una traducción demasiado literal de difícil comprensión.
- source_word: ἀνθύπατοί εἰσιν
  english_pob_choice: there are proconsuls
  chosen_spanish: hay procónsules
  alternatives_spanish:
  - están los procónsules
  - hay procónsules presentes
  - los procónsules están disponibles
  lexicon: BDAG
  rationale: ἀνθύπατοι es el cargo romano de 'procónsules'. 'Hay procónsules' reproduce bien el valor existencial y deja abierta la referencia institucional/plural del griego.
- source_word: ἐγκαλείτωσαν
  english_pob_choice: let them bring charges
  chosen_spanish: que se acusen
  alternatives_spanish:
  - que presenten cargos
  - que interpongan cargos
  - que formulen acusación
  lexicon: BDAG
  rationale: 'El verbo es jurídico: iniciar una acusación formal. ''Que se acusen'' mantiene la reciprocidad y la fuerza procesal en español breve y natural.'
- source_word: ἀλλήλοις
  english_pob_choice: against one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - contra los otros
  - los unos contra los otros
  lexicon: BDAG
  rationale: En este contexto recíproco y forense, 'unos a otros' expresa adecuadamente la acción mutua sin añadir demasiado peso explicativo.
translation_notes:
  revision_awareness: 'Coincide con el expediente inglés: no se introducen cambios de sentido ni ajustes textuales adicionales; se conserva la lectura forense y la referencia institucional a los procónsules.'
  spanish_consistency_notes:
  - Se prefirió 'artesanos' sobre 'artífices' porque es más natural en español actual y sigue el valor léxico de τεχνῖται.
  - '''Querella'' conserva mejor el tono jurídico que una mera ''queja'' en este contexto.'
  - Se mantuvo el plural 'procónsules' siguiendo la forma griega, sin forzar una singularización interpretativa.
