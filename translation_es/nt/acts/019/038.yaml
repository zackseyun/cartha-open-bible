base_translation:
  language: en
  yaml_path: translation/nt/acts/019/038.yaml
  text: If[a], then, Demetrius and the craftsmen with him have a complaint against anyone, court sessions are being held and there are proconsuls[b]; let them bring charges against one another.
  footnotes:
  - marker: a
    text: Or, 'the courts are in session.' The Greek expression ἀγοραῖοι ἄγονται refers to officially convened judicial proceedings.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there are proconsuls available/present.' The plural may refer to the provincial office in a general administrative sense.
    reason: lexical_alternative
