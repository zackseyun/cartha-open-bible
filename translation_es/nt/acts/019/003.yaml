translation:
  language: es
  text: 'Y él dijo: «¿En qué, entonces, fueron bautizados?». Y ellos dijeron: «En el bautismo de Juan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «En el bautismo de Juan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τε
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Así que dijo
  lexicon: BDAG
  rationale: λέγω se traduce de manera directa como «decir». El enclítico τε solo enlaza suavemente con el contexto previo; en español, «Y» conserva esa continuidad narrativa sin sobrecargar el matiz.
- source_word: Εἰς τί
  english_pob_choice: Into what
  chosen_spanish: ¿En qué?
  alternatives_spanish:
  - ¿En qué cosa?
  - ¿Hacia qué?
  lexicon: BDAG
  rationale: Aunque el griego repite εἰς de forma literal, en español «¿En qué?» expresa de modo natural la esfera o referencia del bautismo sin sonar forzado. Se mantiene la idea de pertenencia o identificación implícita en el verbo pasivo.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: οὖν añade una inferencia o transición en el diálogo. «Pues» suena natural en una pregunta directa y conserva el valor discursivo sin hacerlo excesivamente formal.
- source_word: ἐβαπτίσθητε
  english_pob_choice: were you baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - recibieron bautismo
  - se bautizaron
  lexicon: BDAG
  rationale: El pasivo aoristo de βαπτίζω se refleja con «fueron bautizados», preservando la forma verbal y evitando una paráfrasis interpretativa.
- source_word: Εἰς τὸ Ἰωάννου βάπτισμα
  english_pob_choice: Into John's baptism
  chosen_spanish: En el bautismo de Juan
  alternatives_spanish:
  - En el bautismo de Juan el Bautista
  - Con el bautismo de Juan
  lexicon: BDAG
  rationale: La respuesta reproduce el mismo campo semántico que la pregunta. En español, «en el bautismo de Juan» comunica la referencia al rito de manera clara y natural, sin perder la relación con el εἰς implícito en la pregunta. «De Juan» conserva el genitivo posesivo/modificador de Ἰωάννου.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - rito de lavado
  - inmersión
  lexicon: BDAG
  rationale: «Bautismo» es el equivalente establecido y fiel para βάπτισμα en este contexto. Evita explicar o redefinir el rito, manteniendo el paralelismo con la pregunta y la respuesta.
theological_decisions:
- issue: Cómo reflejar la preposición repetida εἰς sin sonar artificial en español
  english_pob_reading: Render both clauses with 'into'
  chosen_spanish_reading: Usar «en» / «en el bautismo de Juan» como equivalencia funcional
  alternative_spanish_readings:
  - «¿En qué fueron bautizados?» / «En el bautismo de Juan»
  - «¿En qué fueron bautizados?» / «Hacia el bautismo de Juan»
  rationale: El griego conserva εἰς en pregunta y respuesta para enfatizar el ámbito o identificación bautismal. En español, repetir «en» permite conservar el paralelismo conceptual de forma natural; «hacia» sería demasiado extraño y «en» no borra el vínculo semántico de la expresión.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis auditado del griego y del inglés POB, pero adapta la preposición repetida εἰς a un español más natural. No se detectaron cambios textuales posteriores que obliguen a ajustar la redacción.
  spanish_consistency_notes:
  - Se mantiene «bautismo» de forma consistente para βάπτισμα.
  - Se usa «Juan» sin añadir «el Bautista», porque el genitivo griego ya basta y el POB inglés no lo expandió.
  - Se conserva un tono narrativo sobrio y publicable, sin arcaísmos innecesarios.
