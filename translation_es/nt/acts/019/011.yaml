translation:
  language: es
  text: Y Dios hacía milagros extraordinarios por medio de las manos de Pablo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «obras de poder no las ordinarias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δυνάμεις
  english_pob_choice: miracles
  chosen_spanish: milagros
  alternatives_spanish:
  - obras de poder
  - hechos poderosos
  - poderes
  lexicon: BDAG
  rationale: En Hechos, el plural δύναμεις suele referirse a actos milagrosos. «Milagros» comunica con naturalidad el sentido eventivo en español, mientras que las alternativas conservan la idea literal de acciones de poder.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Ahora bien
  - ', y'
  lexicon: BDAG
  rationale: La partícula enlaza esta afirmación con el contexto inmediato. En español, «Y» es la coordinación más natural al inicio de la frase.
- source_word: οὐ τὰς τυχούσας
  english_pob_choice: extraordinary
  chosen_spanish: extraordinarios
  alternatives_spanish:
  - no ordinarios
  - inusuales
  - no cualquiera
  lexicon: BDAG
  rationale: La expresión idiomática significa literalmente algo como «no los ordinarios» o «no cualquiera». «Extraordinarios» preserva bien el énfasis idiomático en español sin sonar forzado.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: El sujeto explícito es Dios, y el versículo subraya su agencia directa.
- source_word: ἐποίει
  english_pob_choice: was doing
  chosen_spanish: hacía
  alternatives_spanish:
  - estaba haciendo
  - realizaba
  - seguía haciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida en pasado. «Hacía» conserva ese valor aspectual de manera natural en español.
- source_word: διὰ τῶν χειρῶν Παύλου
  english_pob_choice: through the hands of Paul
  chosen_spanish: por medio de las manos de Pablo
  alternatives_spanish:
  - por medio de Pablo
  - por las manos de Pablo
  - a través de las manos de Pablo
  lexicon: BDAG
  rationale: διά con genitivo indica instrumentación mediada. «Por medio de las manos de Pablo» conserva el giro concreto de «manos» y resalta que Pablo fue el instrumento humano mediante el cual Dios actuó.
- source_word: Παύλου
  english_pob_choice: Paul
  chosen_spanish: Pablo
  lexicon: conventional transliteration
  rationale: Nombre propio según la convención estándar en español bíblico.
theological_decisions:
- issue: Agencia en la realización de milagros
  english_pob_reading: God is presented as the one performing the miracles, with Paul as the instrument.
  chosen_spanish_reading: Dios es presentado como quien hace los milagros, y Pablo como el instrumento mediante el cual se manifiestan.
  alternative_spanish_readings:
  - Pablo hacía los milagros
  - Dios hacía milagros por Pablo
  rationale: El griego pone a ὁ θεός como sujeto de ἐποίει y marca a Pablo con una construcción instrumental. La traducción mantiene esa distinción para no atribuir a Pablo una agencia independiente en el obrar milagroso.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés en la lectura de agencia divina e instrumentación por medio de Pablo; no se registran revisiones aplicadas en el contexto proporcionado.
  spanish_consistency_notes:
  - Se mantiene «Dios» como sujeto explícito, evitando ocultarlo tras una pasiva o una forma impersonal.
  - «Milagros extraordinarios» conserva el énfasis del idiomatismo griego sin reemplazarlo por una frase más interpretativa.
  - «Por medio de las manos de Pablo» retiene el concreto «manos» del original, como en el inglés POB.
