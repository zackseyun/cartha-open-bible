translation:
  language: es
  text: Y la ciudad se llenó de confusión[a], y todos juntos se lanzaron hacia el teatro, arrastrando consigo a Gayo y a Aristarco, macedonios, compañeros de viaje de Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “alboroto”, “desorden” o “tumulto”. El griego puede abarcar un estado de caos colectivo; aquí se conserva “confusión” para seguir de cerca el énfasis léxico del texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθη
  english_pob_choice: was filled
  chosen_spanish: se llenó
  alternatives_spanish:
  - fue llenada
  - quedó llena
  lexicon: BDAG
  rationale: El aoristo pasivo de πίμπλημι expresa que la ciudad quedó llena de ese estado. En español, 'se llenó' conserva bien la pasividad y la naturalidad sin añadir agente.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la villa
  lexicon: BDAG
  rationale: '''Ciudad'' es la equivalencia directa y adecuada para la referencia a Éfeso en el contexto narrativo.'
- source_word: συγχύσεως
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - alboroto
  - desorden
  - turmoil
  lexicon: BDAG
  rationale: '''Confusión'' refleja de manera fiel el sentido léxico principal y mantiene la tensión narrativa de caos colectivo. No se reemplaza por una palabra más interpretativa como ''alboroto'' en el texto principal.'
- source_word: ὥρμησάν
  english_pob_choice: rushed
  chosen_spanish: se lanzaron
  alternatives_spanish:
  - se precipitaron
  - corrieron
  - avanzaron con ímpetu
  lexicon: BDAG
  rationale: El verbo sugiere un movimiento súbito e impetuoso. 'Se lanzaron' comunica bien esa fuerza en español moderno y conserva la energía del cuadro.
- source_word: ὁμοθυμαδόν
  english_pob_choice: together
  chosen_spanish: unánimemente
  alternatives_spanish:
  - juntos
  - con un solo impulso
  - a una
  lexicon: BDAG
  rationale: En este contexto de tumulto, la idea no es armonía positiva sino acción conjunta e impulsiva. 'Unánimemente' conserva la idea de acuerdo colectivo sin sonar devocional o suavizar la escena; se prefiere sobre 'con un solo impulso' por claridad.
- source_word: θέατρον
  english_pob_choice: theater
  chosen_spanish: el teatro
  alternatives_spanish:
  - el anfiteatro
  lexicon: BDAG
  rationale: '''Teatro'' corresponde directamente al sustantivo griego y no especifica más de lo que el texto dice.'
- source_word: συναρπάσαντες
  english_pob_choice: dragging along
  chosen_spanish: arrastrando consigo
  alternatives_spanish:
  - llevándose por la fuerza
  - arrebando y llevando
  - arrastrando
  lexicon: BDAG
  rationale: El participio implica una acción violenta de captura o arrastre. 'Arrastrando consigo' conserva tanto la coerción como el movimiento hacia el teatro, en línea con la nota auditada en inglés.
- source_word: Γάϊον
  english_pob_choice: Gaius
  chosen_spanish: Gayo
  alternatives_spanish:
  - Gaio
  lexicon: tradición transliterada al español
  rationale: Se usa la forma española habitual 'Gayo' para el nombre propio, manteniendo la identificación personal sin depender de la grafía inglesa.
- source_word: Ἀρίσταρχον
  english_pob_choice: Aristarchus
  chosen_spanish: Aristarco
  alternatives_spanish:
  - Aristárco
  lexicon: tradición transliterada al español
  rationale: La forma española estable es 'Aristarco', que conserva el nombre propio de manera natural para lectores hispanohablantes.
- source_word: Μακεδόνας
  english_pob_choice: Macedonians
  chosen_spanish: macedonios
  alternatives_spanish:
  - hombres de Macedonia
  - personas de Macedonia
  lexicon: BDAG
  rationale: La designación étnico-geográfica se traduce de forma directa como 'macedonios', que encaja con la apposición del griego.
- source_word: συνεκδήμους Παύλου
  english_pob_choice: Paul’s traveling companions
  chosen_spanish: compañeros de viaje de Pablo
  alternatives_spanish:
  - compañeros que viajaban con Pablo
  - compañeros de camino de Pablo
  lexicon: BDAG
  rationale: El sustantivo indica personas que viajan con otro. 'Compañeros de viaje de Pablo' expresa con claridad la relación sin añadir connotaciones eclesiales ajenas al término.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés. La versión española conserva la estructura narrativa, el valor de los participios y la fuerza del movimiento colectivo. Se mantuvo el sentido de συγχύσεως como 'confusión' en el texto principal, con nota alternativa para las opciones contextuales que el inglés consideró.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde al nombre divino; este versículo no lo requiere.
  - Se prefirió 'Gayo' y 'Aristarco' conforme a la transliteración española usual, en lugar de las formas inglesas.
  - Se mantuvo un registro sobrio y narrativo, evitando añadir explicaciones que no están en el griego.
  - '''Unánimemente'' se eligió para ὁμοθυμαδόν por coherencia con el movimiento colectivo en la escena, no por sentido devocional.'
