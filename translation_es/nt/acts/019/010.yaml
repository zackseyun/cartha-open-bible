translation:
  language: es
  text: Esto continuó durante dos años, de modo que todos los que habitaban en Asia[a] oyeron la palabra del Señor, tanto judíos como griegos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la provincia romana de Asia en Asia Menor occidental, no el continente moderno de Asia.
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτο δὲ ἐγένετο
  english_pob_choice: This continued
  chosen_spanish: Esto continuó
  alternatives_spanish:
  - Esto sucedió
  - Esto tuvo lugar
  lexicon: BDAG
  rationale: El griego puede referirse a un hecho puntual, pero en contexto mira hacia la actividad previa que se prolongó en el tiempo. «Esto continuó» conserva el valor de continuidad que la POB inglesa destacó y suena natural en español.
- source_word: ἐπὶ ἔτη δύο
  english_pob_choice: for two years
  chosen_spanish: durante dos años
  alternatives_spanish:
  - por dos años
  - a lo largo de dos años
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa duración. «Durante dos años» comunica esa duración con claridad en español.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - con el resultado de que
  lexicon: BDAG
  rationale: ὥστε introduce el resultado de la acción anterior. «De modo que» mantiene el valor resultativo sin sonar demasiado interpretativo.
- source_word: πάντας τοὺς κατοικοῦντας τὴν Ἀσίαν
  english_pob_choice: all who lived in Asia
  chosen_spanish: todos los que habitaban en Asia
  alternatives_spanish:
  - todos los que vivían en Asia
  - todos los habitantes de Asia
  lexicon: BDAG
  rationale: El participio sustantivado κατοικοῦντας se expresa bien con «los que habitaban/vivían». «Habitar» conserva el matiz de residencia estable y sigue de cerca la estructura griega.
- source_word: ἀκοῦσαι
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - llegaron a oír
  - escucharon
  lexicon: BDAG
  rationale: 'El infinitivo aoristo depende del resultado introducido por ὥστε: el efecto fue que oyeron. «Oyeron» es directo y fiel; «escucharon» podría sugerir atención no explícita en el griego.'
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: En Hechos, λόγος suele referirse al mensaje proclamado. «La palabra» preserva la terminología recurrente de Lucas y evita añadir explicaciones que el texto no expresa.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: BDAG
  rationale: Aunque en el proyecto YHWH se vierte como «Yahvé», aquí el griego tiene κύριος y la POB inglesa mantiene «Lord». En español, «Señor» reproduce el título cristológico/divino recibido por el texto griego sin forzar una identificación específica que el verso no explicita.
- source_word: Ἰουδαίους τε καὶ Ἕλληνας
  english_pob_choice: both Jews and Greeks
  chosen_spanish: tanto judíos como griegos
  alternatives_spanish:
  - judíos y griegos, ambos
  - judíos y griegos
  lexicon: BDAG
  rationale: La correlación τε καὶ coordina inclusivamente a los dos grupos. «Tanto... como...» expresa bien esa inclusión y mantiene el contraste étnico-religioso del pasaje.
theological_decisions:
- issue: Alcance geográfico de «Asia»
  english_pob_reading: Asia refers to the Roman province of Asia in western Asia Minor, not the modern continent.
  chosen_spanish_reading: Asia se conserva como nombre propio en el texto, con nota para aclarar que se trata de la provincia romana de Asia en Asia Menor occidental.
  alternative_spanish_readings:
  - Asia continental
  - la provincia romana de Asia
  rationale: El contexto de Hechos usa Ἀσία como designación histórica concreta. Mantener «Asia» en el texto principal respeta el nombre propio, y la nota evita una lectura anacrónica sin sobrecargar la traducción.
  doctrine_reference: Hechos 19:10; uso geográfico histórico de Ἀσία en el NT
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura revisada de la POB inglesa: continuidad de la actividad previa, duración de dos años, resultado expresado con ὥστε y conservación del valor técnico de «la palabra del Señor». No se detectan cambios textuales recientes que requieran ajuste adicional.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en concordancia con el griego y con la POB inglesa.
  - Se conserva «Asia» como nombre propio y se desambigua mediante nota cultural.
  - «Judíos» y «griegos» se traducen de forma inclusiva con una correlación natural en español.
  - No se introduce «Cristo» ni «Yahvé» porque este versículo no contiene esos lexemas en el texto griego.
