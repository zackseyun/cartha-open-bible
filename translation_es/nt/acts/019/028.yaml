translation:
  language: es
  text: 'Cuando oyeron esto y se llenaron de ira[a], gritaban, diciendo: «¡Grande es Artemisa de los efesios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «se llenaron de cólera», «se llenaron de furia» o «se enfurecieron». La expresión griega dice literalmente «se llenaron de θυμός», con el sentido de ira intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: When they heard this
  chosen_spanish: Cuando oyeron esto
  alternatives_spanish:
  - Al oír esto
  - Después de oír esto
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia previa a la acción principal. «Cuando oyeron esto» es natural en español y explicita el objeto implícito a partir del contexto sin añadir contenido.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector leve; «y» preserva el flujo narrativo sin cargar una oposición que el contexto no exige.
- source_word: γενόμενοι πλήρεις θυμοῦ
  english_pob_choice: became full of wrath
  chosen_spanish: se llenaron de ira
  alternatives_spanish:
  - se llenaron de cólera
  - se llenaron de furia
  - se enfurecieron
  lexicon: BDAG
  rationale: La construcción expresa literalmente «habiendo llegado a estar llenos de θυμός». En español, «se llenaron de ira» conserva la imagen de llenura y la intensidad de la reacción, mejor que un simple adjetivo como «furiosos».
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  - furia
  lexicon: BDAG
  rationale: θυμός denota enojo intenso, furor o ira vehemente. En este contexto de multitud hostil, «ira» comunica bien la fuerza del término sin sobrerrepresentarlo.
- source_word: ἔκραζον
  english_pob_choice: they were crying out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - seguían gritando
  - daban voces
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. «Gritaban» transmite la idea de un clamor sostenido en español de forma natural y fiel.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: BDAG
  rationale: Participio de manera que introduce el contenido del grito; «diciendo» es la equivalencia directa y transparente.
- source_word: Μεγάλη ἡ Ἄρτεμις Ἐφεσίων
  english_pob_choice: Great is Artemis of the Ephesians!
  chosen_spanish: «¡Grande es Artemisa de los efesios!»
  alternatives_spanish:
  - «¡Grande es la Artemisa de los efesios!»
  - «¡Artemisa de los efesios es grande!»
  lexicon: BDAG
  rationale: Se conserva el tono de aclamación nominal y el orden enfático. «Artemisa» es el nombre propio transliterado en forma española estándar; «de los efesios» reproduce con precisión el genitivo plural que identifica a la diosa asociada con ese pueblo.
- source_word: Ἄρτεμις
  english_pob_choice: Artemis
  chosen_spanish: Artemisa
  alternatives_spanish:
  - Artemis
  lexicon: BDAG
  rationale: Como nombre propio de la diosa, en español estándar se usa «Artemisa». Mantiene la identificación sin trasladar una forma híbrida innecesaria.
- source_word: Ἐφεσίων
  english_pob_choice: of the Ephesians
  chosen_spanish: de los efesios
  alternatives_spanish:
  - de Éfeso
  - de los habitantes de Éfeso
  lexicon: BDAG
  rationale: El genitivo plural funciona sustantivamente y se refiere al pueblo de Éfeso. «De los efesios» es más exacto que «de Éfeso» para reflejar la forma gramatical griega.
theological_decisions:
- issue: Cita de alabanza pagana sin suavizar su contenido idólatra
  english_pob_reading: Great is Artemis of the Ephesians!
  chosen_spanish_reading: «¡Grande es Artemisa de los efesios!»
  alternative_spanish_readings:
  - «¡Artemisa de los efesios es grande!»
  rationale: La traducción mantiene la proclamación tal como la dicen los presentes, sin convertirla en una formulación neutral ni introducir aprobación del narrador. Se preserva el carácter idólatra del grito como reportado en el texto.
  doctrine_reference: Principio de primacía del texto fuente y no añadir afirmaciones doctrinales ajenas al pasaje.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español principal. La nota se ancla en «ira[a]» y coincide con la decisión léxica sobre θυμός.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y natural en español.
  - Se evita la sustitución por «SEÑOR» u այլ masking terminology, ya que el pasaje no contiene el nombre divino.
  - Se conserva el tono de grito colectivo mediante el imperfecto «gritaban».
  - El nombre propio se adapta a la forma española estándar «Artemisa».
