base_translation:
  language: en
  yaml_path: translation/nt/acts/019/028.yaml
  text: When they heard this and became full of wrath[a], they were crying out, saying, “Great is Artemis of the Ephesians!”
  footnotes:
  - marker: a
    text: Or, “became full of anger,” “were filled with rage,” or “became furious.” The Greek expression is literally “became full of θυμός,” denoting intense anger.
    reason: lexical_alternative
