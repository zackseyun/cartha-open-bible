translation:
  language: es
  text: Así, la palabra del Señor crecía poderosamente[a] y prevalecía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crecía poderosamente y prevalecía». La expresión κατὰ κράτος puede entenderse adverbialmente como «poderosamente» o «con fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: Marca una conclusión/resultante del contexto anterior sin añadir contenido nuevo. «Así» suena natural en español y conserva el valor inferencial.
- source_word: κατὰ κράτος
  english_pob_choice: mightily / prevailing
  chosen_spanish: poderosamente
  alternatives_spanish:
  - con poder
  - fuertemente
  - con gran fuerza
  lexicon: BDAG
  rationale: La locución adverbial expresa fuerza eficaz o intensa. «Poderosamente» comunica bien el adverbio y evita una construcción demasiado literal o rígida en español.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: Se mantiene el título «Señor» como en el texto griego y en la pauta del proyecto. En este contexto, la referencia implícita es al Señor Jesús, pero el texto griego no lo explicita aquí.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la Palabra
  lexicon: BDAG
  rationale: «λόγος» aquí alude al mensaje proclamado. «La palabra» conserva el uso lucano recurrente y funciona de manera natural en español.
- source_word: ηὔξανεν
  english_pob_choice: was growing
  chosen_spanish: crecía
  alternatives_spanish:
  - iba creciendo
  - aumentaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua. «Crecía» es breve, natural y conserva la progresión en curso.
- source_word: ἴσχυεν
  english_pob_choice: prevailing
  chosen_spanish: prevalecía
  alternatives_spanish:
  - vencía
  - se imponía
  - cobraba fuerza
  lexicon: BDAG
  rationale: «ἰσχύω» aquí expresa fuerza efectiva y avance victorioso. «Prevalecía» preserva esa idea de eficacia y triunfo sin forzar una explicación doctrinal.
theological_decisions:
- issue: Referencia de «τοῦ κυρίου»
  english_pob_reading: Rendered simply as 'the Lord' without specifying 'Jesus' in the main text.
  chosen_spanish_reading: Se traduce simplemente «del Señor» sin explicitar «Jesús» en el texto principal.
  alternative_spanish_readings:
  - del Señor Jesús
  rationale: El contexto de Hechos apunta claramente al Señor Jesús, pero el griego dice solo «del Señor». Se conserva el título directo para no añadir una identificación que el versículo no formula explícitamente.
  doctrine_reference: Traducir títulos; transliterar nombres. Mantener la tensión teológica cuando el texto la deja implícita.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «with power» a «mightily» para reflejar mejor κατὰ κράτος; la versión española adopta «poderosamente» para conservar el matiz adverbial y el efecto de fuerza, manteniendo explícitos tanto el crecimiento como el prevalecer.
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas para no ocultar el término griego κύριος en la línea principal.
  - 'Se preserva el paralelismo de dos verbos: crecimiento continuo y prevalecer eficazmente.'
  - No se explicita «Jesús» en el texto principal, aunque la referencia contextual sea cristológica.
