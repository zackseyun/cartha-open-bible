translation:
  language: es
  text: Pero si buscan algo adicional, se resolverá en la asamblea legal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la asamblea conforme a la ley» o «en la asamblea regular». El griego se refiere a una reunión cívica constituida legalmente, no a la iglesia.
    reason: lexical_alternative
lexical_decisions:
- source_word: περαιτέρω
  english_pob_choice: further
  chosen_spanish: más
  alternatives_spanish:
  - algo más
  - más adelante
  - más allá de esto
  lexicon: BDAG
  rationale: El adverbio expresa una idea de algo adicional o más allá de lo ya tratado. En español, «más» en combinación con «algo» reproduce con naturalidad esa apertura sin añadir contenido que no está en el griego.
- source_word: ἐπιζητεῖτε
  english_pob_choice: you seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan algo
  - procuran
  - indagan
  lexicon: BDAG
  rationale: El verbo puede abarcar buscar, procurar o inquirir. En este contexto cívico, «buscan» conserva la amplitud de una petición o gestión adicional sin volver la frase excesivamente técnica.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - algo
  - alguna cosa
  - cualquier asunto
  lexicon: BDAG
  rationale: El indefinido en la cláusula condicional apunta a un asunto no especificado. «Algo» fluye bien en español con el verbo «buscar» y mantiene la indefinición del original.
- source_word: ἐννόμῳ
  english_pob_choice: lawful
  chosen_spanish: legal
  alternatives_spanish:
  - legal
  - conforme a la ley
  - legítima
  lexicon: BDAG
  rationale: El adjetivo indica lo que está conforme a la ley. «Legal» comunica claramente el carácter cívico-jurídico del contexto, aunque se deja constancia de que el matiz es de conformidad legal, no de «iglesia» en sentido cristiano.
- source_word: ἐκκλησίᾳ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - asamblea
  - reunión
  - cuerpo cívico
  lexicon: BDAG
  rationale: Aquí ἐκκλησία designa una reunión cívica legalmente constituida, no la comunidad cristiana. «Asamblea» preserva el sentido de cuerpo reunido sin importar la noción de iglesia eclesiástica.
- source_word: ἐπιλυθήσεται
  english_pob_choice: it will be settled
  chosen_spanish: se resolverá
  alternatives_spanish:
  - se resolverá
  - se decidirá
  - se zanjará
  lexicon: BDAG
  rationale: La forma pasiva futura señala que el asunto será resuelto. «Se resolverá» es natural en español y mantiene el valor procedimental del contexto.
theological_decisions:
- issue: Sentido de ἐκκλησία en un contexto cívico, no cristiano
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - iglesia
  - reunión
  rationale: El texto alude a una asamblea cívica legalmente constituida en Éfeso, no a la iglesia cristiana. Por fidelidad al contexto, «asamblea» evita una lectura eclesial ajena al pasaje.
  doctrine_reference: Principio de primacía del idioma original sobre la tradición de traducción; mantener el término clave según su referente contextual.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión auditada en inglés: περαιτέρω = further, ἐπιζητεῖτε = seek, ἐννόμῳ = lawful, ἐκκλησίᾳ = assembly, ἐπιλυθήσεται = it will be settled. No se documentaron revisiones textuales posteriores; el estado más reciente indica estabilidad.'
  spanish_consistency_notes:
  - Se evitó «iglesia» para ἐκκλησία porque el contexto es cívico y no cristiano.
  - Se prefirió «legal»/«asamblea» por claridad contemporánea, manteniendo el matiz de conformidad con la ley.
  - La nota al pie preserva la alternativa semántica y aclara la diferencia entre uso cívico y eclesial.
