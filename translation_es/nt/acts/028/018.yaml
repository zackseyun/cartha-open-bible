- from: quienes[a], después de examinarme, querían soltarme porque no había en mí motivo alguno para la pena de muerte.
  to: quienes[a], después de examinarme, querían liberarme porque no había motivo alguno para la pena de muerte en mi caso.
  rationale: Se ajusta el registro forense de ἀπολῦσαι con 'liberarme' y se vierte ἐν ἐμοί idiomáticamente como 'en mi caso', en línea con la rationale inglesa y con mejor español jurídico y eclesialmente legible. Se conserva la nota alternativa porque refleja bien la opción judicial 'cargo ... contra mí'.
