translation:
  language: es
  text: quienes[a], después de examinarme, querían liberarme porque no había motivo alguno para la pena de muerte en mi caso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque no hallaban ningún cargo digno de muerte contra mí'.
