lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - los cuales
  - quienes precisamente
  lexicon: BDAG
  rationale: El relativo simple conserva la referencia a los que juzgaron a Pablo sin sobrecargar el español; el matiz cualitativo de οἵτινες no exige expansión aquí.
- source_word: ἀνακρίναντές
  english_pob_choice: after examining
  chosen_spanish: después de examinarme
  alternatives_spanish:
  - habiéndome examinado
  - después de interrogarme
  lexicon: BDAG
  rationale: El participio aoristo expresa acción previa respecto del verbo principal. 'Examinarme' conserva el contexto judicial y es más natural que un calco técnico.
- source_word: ἐβούλοντο
  english_pob_choice: wanted
  chosen_spanish: querían
  alternatives_spanish:
  - querían liberar
  - intentaban
  lexicon: BDAG
  rationale: El imperfecto de βούλομαι expresa una intención sostenida en el pasado; 'querían' lo comunica con naturalidad en español.
- source_word: ἀπολῦσαι
  english_pob_choice: to release
  chosen_spanish: soltarme
  alternatives_spanish:
  - liberarme
  - dejarme libre
  lexicon: BDAG
  rationale: En contexto judicial, ἀπολύω puede significar liberar de custodia. 'Soltarme' es menos formal que 'liberarme', pero transmite bien la idea de dejar libre; se mantiene una opción más publica en la frase completa con el contexto forense.
- source_word: διὰ τὸ ... ὑπάρχειν
  english_pob_choice: because there was
  chosen_spanish: porque había
  alternatives_spanish:
  - porque existía
  - ya que había
  lexicon: BDAG
  rationale: La construcción causal con el infinitivo articular se vierte de forma idiomática con 'porque había', preservando la causalidad sin rigidizar la sintaxis española.
- source_word: μηδεμίαν αἰτίαν
  english_pob_choice: no basis
  chosen_spanish: motivo alguno
  alternatives_spanish:
  - ningún cargo
  - ninguna base
  lexicon: BDAG
  rationale: αἰτία en contexto judicial puede significar causa, motivo o cargo. 'Motivo alguno' mantiene la negación enfática y suena natural; en la nota se deja abierta la alternativa jurídica de 'cargo'.
- source_word: θανάτου
  english_pob_choice: for the death penalty
  chosen_spanish: para la pena de muerte
  alternatives_spanish:
  - merecedora de muerte
  - para ejecución
  lexicon: BDAG
  rationale: 'El genitivo con αἰτίαν tiene fuerza forense: no se trata solo de ''muerte'' abstracta, sino de fundamento para una pena capital. ''Pena de muerte'' comunica ese sentido en español actual.'
- source_word: ἐν ἐμοί
  english_pob_choice: in my case
  chosen_spanish: en mí
  alternatives_spanish:
  - contra mí
  - en mi caso
  lexicon: BDAG
  rationale: Se conserva la literalidad 'en mí' porque el español la admite y refleja el giro forense del griego; el contexto ya aclara que se trata del caso judicial de Pablo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'the death penalty' frente a 'a death sentence'; por eso el español usa 'pena de muerte' para reflejar con naturalidad el sentido forense de αἰτίαν θανάτου. También se mantuvo la lectura judicial de 'examinar' y 'soltar'.
  spanish_consistency_notes:
  - Se conservó un registro judicial sobrio, acorde con el contexto de Hechos 28.
  - Se evitó 'SEÑOR' o terminología eclesiástica ajena al versículo.
  - La nota [a] está anclada en 'motivo alguno' y ofrece la alternativa jurídica que la fuente inglesa preserva.
