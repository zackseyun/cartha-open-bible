translation:
  language: es
  text: Después de haber sido puestos a salvo[a], supimos que la isla se llama[c] Malta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «después de haber escapado sanos y salvos» o «después de haber sido salvados». El verbo griego puede destacar la liberación segura a través del peligro.'
    reason: lexical_alternative
  - marker: b
    text: Griego Melité, la isla identificada tradicionalmente como Malta.
    reason: cultural_note
  - marker: c
    text: 'Literalmente: «la isla se llama Malta». El griego usa un presente pasivo para informar el nombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διασωθέντες
  english_pob_choice: after we had been brought safely through
  chosen_spanish: después de haber sido puestos a salvo
  alternatives_spanish:
  - después de haber escapado sanos y salvos
  - después de haber sido salvados
  - después de haber sido llevados a salvo
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una liberación lograda a través del peligro; 'puestos a salvo' conserva la idea de rescate y la voz pasiva sin sonar forzado en español.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata de manera natural en español.
- source_word: ἐπέγνωμεν
  english_pob_choice: we learned
  chosen_spanish: supimos
  alternatives_spanish:
  - aprendimos
  - llegamos a saber
  - reconocimos
  lexicon: BDAG
  rationale: Aquí el verbo indica que llegaron a conocer una información nueva; 'supimos' es breve y natural, manteniendo el valor de conocimiento adquirido.
- source_word: Μελίτη
  english_pob_choice: Malta
  chosen_spanish: Malta
  alternatives_spanish:
  - Melita
  - Melité
  lexicon: BDAG
  rationale: Se usa la forma española estándar del nombre del lugar, identificada tradicionalmente con la isla de Malta.
- source_word: ἡ νῆσος
  english_pob_choice: the island
  chosen_spanish: la isla
  alternatives_spanish:
  - la ínsula
  lexicon: BDAG
  rationale: El sintagma nominal es directo; 'la isla' es la forma clara y contemporánea en español.
- source_word: καλεῖται
  english_pob_choice: was called
  chosen_spanish: se llama
  alternatives_spanish:
  - era llamada
  - es llamada
  - fue llamada
  lexicon: BDAG
  rationale: El presente pasivo griego funciona como información reportada sobre el nombre. En español, 'se llama' comunica de forma natural el dato nominal sin forzar un pasado artificial.
translation_notes:
  revision_awareness: La revisión del inglés aclaró que el participio aoristo antecede a la acción de 'learned'; por eso el español inicia con 'Después de haber sido puestos a salvo' y mantiene la secuencia con 'entonces'. También se preserva la observación del audit trail sobre el presente pasivo de 'καλεῖται' mediante 'se llama'.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Malta' como forma española estándar, sin transliteración innecesaria.
  - '''Puestos a salvo'' conserva el matiz de deliverance through danger señalado en el audit trail inglés.'
  - Se evita 'SEÑOR' u otras convenciones ajenas al pasaje; no hay terminología teológica adicional en este versículo.
