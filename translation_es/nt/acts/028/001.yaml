  glossary_alignment: No hay términos teológicos sensibles en este versículo. El borrador está alineado con las pautas del proyecto. La decisión de usar «Malta» en el texto principal es correcta, pero debe preservarse en nota la forma griega Μελίτη / Melité o Melita, conforme al expediente inglés.
