    reason: cultural_note
  - marker: c
    text: Literally, 'the island is called Malta.' The Greek uses a present passive in reported information.
    reason: lexical_alternative
  - marker: d
    text: Or 'And after we had been brought safely through, then we learned'.
    reason: previous_rendering
