  rationale: Se elimina «entonces» para evitar una secuencia redundante y poco idiomática en español, manteniendo intacta la relación temporal del original. Se conserva «se llama» como una representación natural del presente pasivo καλεῖται. También se restaura la nota cultural sobre Μελίτη/Malta presente en el expediente inglés. Se suprime la nota innecesaria sobre «supimos», ya que no forma parte de las notas preservadas por el POB inglés y no resuelve una ambigüedad nueva en español.
