translation:
  language: es
  text: Y después de arribar a Siracusa[a], nos quedamos allí tres días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de hacer escala en Siracusa» o «después de entrar en puerto en Siracusa». El participio griego tiene sentido náutico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταχθέντες
  english_pob_choice: after putting in
  chosen_spanish: después de arribar
  alternatives_spanish:
  - después de hacer escala
  - después de llegar
  - después de entrar en puerto
  lexicon: BDAG
  rationale: En un contexto náutico, el participio comunica la llegada de una nave a puerto. En español, "arribar" conserva ese matiz marítimo con naturalidad; "hacer escala" agrega un matiz interpretativo más específico, y "llegar" pierde el color náutico.
- source_word: εἰς Συρακούσας
  english_pob_choice: at Syracuse
  chosen_spanish: a Siracusa
  alternatives_spanish:
  - en Siracusa
  - hasta Siracusa
  lexicon: BDAG
  rationale: El griego usa εἰς con dirección de movimiento hacia el lugar. En español, "a Siracusa" expresa esa llegada sin forzar un calco; el nombre propio se adapta a la forma castellana usual Siracusa.
- source_word: ἐπεμείναμεν
  english_pob_choice: we stayed there
  chosen_spanish: nos quedamos allí
  alternatives_spanish:
  - permanecimos allí
  - nos quedamos
  lexicon: BDAG
  rationale: El verbo significa permanecer o quedarse. "Nos quedamos allí" es natural y mantiene la idea locativa del contexto; "permanecimos" es posible, pero más formal y menos idiomático.
- source_word: ἡμέρας τρεῖς
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  - durante tres días
  lexicon: BDAG
  rationale: La construcción expresa duración. En español, el complemento de tiempo queda claro con "tres días" junto al verbo de estancia; añadir "por" o "durante" sería explicativo, pero no necesario.
- source_word: Συρακούσας
  english_pob_choice: Syracuse
  chosen_spanish: Siracusa
  alternatives_spanish:
  - Syracuse
  lexicon: BDAG
  rationale: Se usa la forma española estándar del topónimo, que es más transparente para lectores en español y fiel a la identificación geográfica.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren cambios textuales adicionales. Se ha conservado el matiz náutico de καταχθέντες mediante un verbo español natural que no borra la referencia al arribo por mar.
  spanish_consistency_notes:
  - Se mantuvo "Siracusa" como topónimo estándar en español.
  - Se preservó un registro sobrio y publicable, con vocabulario náutico explícito pero no técnico en exceso.
  - La nota al pie recoge la alternativa interpretativa que el audit trail inglés documenta para el participio.
