review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y la línea de la POB inglesa: conserva el participio introductorio, el tono profético de «este pueblo», la intensificación de las dos cláusulas y la distinción entre oír/ver externamente y entender/percibir interiormente. Sin embargo, hay dos desajustes importantes: «diles» introduce un complemento indirecto plural no explícito y cambia la forma más directa de «di», y la nota [a] está anclada a «diciendo» aunque explica «De oído oiréis», por lo que la ubicación de la nota no corresponde al elemento comentado.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «De oído oiréis» suena más forzado y menos natural que «De cierto oirán / oyendo oirán / ciertamente oirán». Dado que la POB inglesa optó por una forma natural en el texto principal y dejó la literalidad en nota, conviene usar «Ciertamente oirán» en español principal y reservar la forma más literal para la nota. También es preferible usar tratamiento consistente de segunda persona plural moderna con «vayan/dirás» o, más naturalmente en cita profética, infinitivo imperativo indirecto; pero aquí la estructura con imperativo singular a Isaías funciona bien como «Ve ... y di».
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Pueblo», «entender» y «percibir» están bien elegidos. La revisión propuesta mejora la alineación con la filosofía léxica inglesa al evitar un calco innecesario en el texto principal y mantener la alternativa más literal en nota.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «diciendo» pero su contenido explica «De oído oiréis».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante del texto. Tal como está, el lector recibe una explicación textual en un lugar incorrecto.
  - severity: medium
    issue: «diles» añade un referente plural implícito y se aparta de la simplicidad de εἰπόν.
    rationale: El griego dice simplemente «y di». Aunque el destinatario final es el pueblo, «diles» introduce una mediación no necesaria. «di» preserva mejor el paralelismo formal con el original y la POB inglesa.
  - severity: low
    issue: «De oído oiréis» resulta demasiado rígido para el texto principal.
    rationale: La POB inglesa prefirió una expresión natural en el cuerpo del texto y dejó la literalidad semítica en nota. En español, «Ciertamente oirán» o equivalente comunica mejor el énfasis sin sonar artificioso.
  revised_spanish_text: 'diciendo: «Ve a este pueblo y di: Ciertamente oirán[a], pero nunca entenderán; y viendo, ciertamente verán[b], pero nunca percibirán».

