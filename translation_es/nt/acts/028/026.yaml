base_translation:
  language: en
  yaml_path: translation/nt/acts/028/026.yaml
  text: 'saying[a], ‘Go to this people and say: You will indeed hear, but you will never understand; and seeing, you will indeed see[b], but you will never perceive.’'
  footnotes:
  - marker: a
    text: Literally, 'By hearing you will hear,' an emphatic Hebrew-style expression preserved in the Greek quotation from Isaiah.
    reason: lexical_alternative
  - marker: b
    text: Or 'and seeing you will see, and you will certainly not see.' The Greek uses repeated sight-language, but the final verb can imply inward perception in context.
    reason: alternative_reading
