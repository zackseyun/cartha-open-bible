translation:
  language: es
  text: 'diciendo: «Ve a este pueblo y di: Ciertamente oirán[a], pero nunca entenderán; y viendo, ciertamente verán[b], pero nunca percibirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «De oído oirán» o «oyendo oirán», una expresión intensiva de estilo hebreo conservada en la cita griega de Isaías.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y viendo, verán». El griego repite el lenguaje de la vista para mantener el paralelismo enfático; el verbo final puede apuntar a percepción interior en contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo así
  lexicon: BDAG
  rationale: El participio presente introduce la cita y en español se conserva con un gerundio natural, manteniendo la dependencia del discurso anterior sin convertirlo innecesariamente en una forma finita.
- source_word: Πορεύθητι
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: El imperativo de movimiento se expresa de forma directa y natural con «Ve», que preserva el tono breve y formal del mandato.
- source_word: τὸν λαὸν τοῦτον
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo de personas
  lexicon: BDAG
  rationale: «Pueblo» conserva mejor el matiz colectivo y profético de λαός que «gente». «Este» reproduce la cercanía deíctica del griego.
- source_word: εἰπόν
  english_pob_choice: say
  chosen_spanish: diles
  alternatives_spanish:
  - di
  - diga
  lexicon: BDAG
  rationale: Como la cita va dirigida a un destinatario plural en español, «diles» expresa con claridad la orden de comunicar el mensaje al pueblo. El valor de λέγω como mandato de decir se mantiene.
- source_word: Ἀκοῇ ἀκούσετε
  english_pob_choice: You will indeed hear
  chosen_spanish: De oído oiréis
  alternatives_spanish:
  - Oyendo oiréis
  - Ciertamente oiréis
  lexicon: BDAG
  rationale: Se conserva la intensificación semítica con una construcción redundante en español. «De oído oiréis» refleja la repetición cognada del griego sin diluir el paralelismo profético; la naturalidad se apoya en el registro bíblico.
- source_word: συνῆτε
  english_pob_choice: you will never understand
  chosen_spanish: entenderéis
  alternatives_spanish:
  - comprenderéis
  - captaréis
  lexicon: BDAG
  rationale: En el contexto profético, συνίημι apunta a comprensión interior. «Entenderéis» es el equivalente más transparente y digno en español.
- source_word: βλέποντες βλέψετε
  english_pob_choice: and seeing, you will indeed see
  chosen_spanish: y viendo, veréis
  alternatives_spanish:
  - y al ver, veréis
  - y aunque veáis, veréis
  lexicon: BDAG
  rationale: La repetición de ver/viendo preserva el énfasis del griego. Se evita introducir una concesiva que no está en el texto base, respetando la paralela intensificación verbal.
- source_word: ἴδητε
  english_pob_choice: you will never perceive
  chosen_spanish: percibiréis
  alternatives_spanish:
  - veréis
  - discerniréis
  lexicon: BDAG
  rationale: Aunque ὁράω puede traducirse «ver», en este contexto la oposición es entre exposición sensorial y aprehensión interna. «Percibiréis» retiene la fuerza interpretativa de la POB inglesa sin borrar la tensión entre ver externamente y captar internamente.
theological_decisions:
- issue: Tensión entre ver/oir físicamente y entender/percibir interiormente
  english_pob_reading: Use 'understand' and 'perceive' to reflect the inward, not merely physical, failure indicated by συνίημι and ὁράω in context.
  chosen_spanish_reading: Usar «entender» y «percibir» para reflejar el fracaso interior, no solo físico, indicado por συνίημι y ὁράω en contexto.
  alternative_spanish_readings:
  - Usar «comprender» y «ver» para una repetición más literal
  - Usar ambos verbos como simples actos sensoriales
  rationale: La cita de Isaías contrasta la recepción externa con la respuesta interior. Mantener «entender/percibir» preserva la tensión teológica y discursiva que el texto enfatiza, en lugar de resolverla con repetición meramente mecánica de «ver».
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en conservar el paralelismo enfático de dos cláusulas sensoriales: oído/entender y ver/percibir. También atiende el ajuste reciente que prefirió una forma más cercana al griego para la segunda cláusula, sin introducir una lectura concesiva no presente en el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene «pueblo» para λαός, coherente con el uso profético y con la preferencia POB por conservar la fuerza colectiva.
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no hay término cristológico en este pasaje.
  - Se preserva el contraste semántico entre oír/ver externos y entender/percibir internos, sin convertirlo en una simple repetición sensorial.
  - Las comillas y la puntuación siguen el estilo español moderno, con dos puntos tras el mandato introductorio.
