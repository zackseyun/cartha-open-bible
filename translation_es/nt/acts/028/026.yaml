revisions:
- from: 'diciendo[a]: «Ve a este pueblo y diles: De oído oiréis, pero de ningún modo entenderéis; y viendo[b], veréis, pero de ningún modo percibiréis».'
  to: 'diciendo: «Ve a este pueblo y di: Ciertamente oirán[a], pero nunca entenderán; y viendo, ciertamente verán[b], pero nunca percibirán».'
  rationale: Se corrige el anclaje de la nota [a], se reemplaza «diles» por «di» para seguir más de cerca εἰπόν, y se usa una formulación principal más natural en español («Ciertamente oirán») en línea con la filosofía de la POB inglesa, dejando la literalidad semítica en nota. También se hace paralelo «ciertamente verán» para reflejar mejor la intensificación de la segunda cláusula.
