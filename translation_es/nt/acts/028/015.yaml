base_translation:
  language: en
  yaml_path: translation/nt/acts/028/015.yaml
  text: And from there the brothers[a], when they heard about us, came to meet us as far as Appius Forum and Three Taverns. When Paul saw them, he gave thanks to God and took courage.
  footnotes:
