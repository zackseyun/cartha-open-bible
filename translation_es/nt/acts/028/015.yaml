review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: transición espacial, llegada de los creyentes para encontrarse con Pablo, los topónimos, la acción de dar gracias a Dios y el resultado de recibir ánimo. Sin embargo, ''cuando oyeron acerca de nosotros'' suena menos natural en español y puede aflojar el valor idiomático de ἀκούσαντες τὰ περὶ ἡμῶν; una formulación como ''cuando supieron de nosotros'' o ''cuando oyeron de nosotros'' comunica mejor el sentido. También conviene ajustar el orden en ''Al verlos, Pablo...'' con coma para mayor claridad.'
  spanish_quality_summary: El español es claro y digno, pero requiere un pequeño pulido de naturalidad y puntuación. 'Y de allí' funciona, 'vinieron a nuestro encuentro' es bueno, y 'cobró ánimo' es adecuado para ἔλαβε θάρσος. El principal detalle es que 'oyeron acerca de nosotros' suena algo calcado; 'supieron de nosotros' es más idiomático sin añadir contenido. La nota al pie es correcta y útil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' para θεῷ es correcto. La decisión de mantener 'los hermanos' con nota inclusiva sigue el rastro de auditoría inglés. No hay términos doctrinales sensibles adicionales en este versículo.
  issues:
  - severity: medium
    issue: '''cuando oyeron acerca de nosotros'' suena poco idiomático en español bíblico natural'
    rationale: Aunque es comprensible, la construcción calca de forma algo rígida el giro griego/inglés. τὰ περὶ ἡμῶν aquí expresa que supieron de la llegada/situación de Pablo y los suyos; 'cuando supieron de nosotros' preserva el sentido sin sobretraducir.
  - severity: low
    issue: Falta coma en 'Al verlos Pablo'
    rationale: En español, el inciso inicial se lee con mayor claridad como 'Al verlos, Pablo...'. No cambia el sentido, pero mejora la legibilidad.
  revised_spanish_text: Y de allí los hermanos[a], cuando supieron de nosotros, vinieron a nuestro encuentro hasta el Foro de Apio y las Tres Tabernas. Al verlos, Pablo dio gracias a Dios y cobró ánimo.
  revised_footnotes:
  - marker: a
    text: 'O: "los hermanos y hermanas"; el griego dice "hermanos", forma común para creyentes compañeros que en contexto puede incluir mujeres.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de naturalidad y puntuación: ''cuando supieron de nosotros'' expresa mejor en español el valor de ἀκούσαντες τὰ περὶ ἡμῶν sin añadir contenido, y ''Al verlos, Pablo...'' mejora la lectura. Se mantiene ''los hermanos'' con nota inclusiva, así como ''Foro de Apio'', ''Tres Tabernas'' y ''cobró ánimo'', que son fieles al original y al rastro de auditoría.'
