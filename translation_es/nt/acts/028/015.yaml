revisions:
- from: Y de allí los hermanos[a], cuando oyeron acerca de nosotros, vinieron a nuestro encuentro hasta el Foro de Apio y las Tres Tabernas. Al verlos Pablo, dio gracias a Dios y cobró ánimo.
  to: Y de allí los hermanos[a], cuando supieron de nosotros, vinieron a nuestro encuentro hasta el Foro de Apio y las Tres Tabernas. Al verlos, Pablo dio gracias a Dios y cobró ánimo.
  rationale: 'Se hizo una reparación menor de naturalidad y puntuación: ''cuando supieron de nosotros'' expresa mejor en español el valor de ἀκούσαντες τὰ περὶ ἡμῶν sin añadir contenido, y ''Al verlos, Pablo...'' mejora la lectura. Se mantiene ''los hermanos'' con nota inclusiva, así como ''Foro de Apio'', ''Tres Tabernas'' y ''cobró ánimo'', que son fieles al original y al rastro de auditoría.'
