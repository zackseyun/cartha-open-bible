translation:
  language: es
  text: Y de allí los hermanos[a], cuando supieron de nosotros, vinieron a nuestro encuentro hasta el Foro de Apio y las Tres Tabernas. Al verlos, Pablo dio gracias a Dios y cobró ánimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los hermanos y hermanas"; el griego dice "hermanos", forma común para creyentes compañeros que en contexto puede incluir mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y de allí
  alternatives_spanish:
  - Y desde allí
  - Y de aquel lugar
  lexicon: BDAG
  rationale: Conserva el cambio espacial del relato de viaje y el matiz conjuntivo de καί + ἐκεῖθεν sin sonar forzado en español.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Mantiene la forma masculina plural del griego, que la POB inglesa preserva como decisión léxica, sin imponer una neutralización que el texto no expresa de manera explícita.
- source_word: ἀκούσαντες τὰ περὶ ἡμῶν
  english_pob_choice: when they heard about us
  chosen_spanish: cuando oyeron acerca de nosotros
  alternatives_spanish:
  - habiendo oído acerca de nosotros
  - cuando supieron de nosotros
  lexicon: BDAG
  rationale: El participio tiene valor temporal. τὰ περὶ ἡμῶν se rinde de modo directo como 'acerca de nosotros', evitando añadir 'noticias' o 'rumores' que el griego no exige.
- source_word: ἦλθαν εἰς ἀπάντησιν ἡμῖν
  english_pob_choice: came to meet us
  chosen_spanish: vinieron a nuestro encuentro
  alternatives_spanish:
  - vinieron a encontrarnos
  - salieron a nuestro encuentro
  lexicon: BDAG
  rationale: Expresa de forma natural el modismo de ir al encuentro de alguien, conservando la idea de desplazamiento hacia quienes llegan.
- source_word: ἄχρι Ἀππίου Φόρου καὶ Τριῶν Ταβερνῶν
  english_pob_choice: as far as Appius Forum and Three Taverns
  chosen_spanish: hasta el Foro de Apio y las Tres Tabernas
  alternatives_spanish:
  - hasta el Foro de Apio y Tres Tabernas
  - hasta Apio Foro y las Tres Tabernas
  lexicon: BDAG
  rationale: ἄχρι marca límite de alcance, por lo que 'hasta' es la equivalencia más directa. Los topónimos se adaptan a una forma española legible y tradicionalmente reconocible.
- source_word: οὓς ἰδὼν
  english_pob_choice: When Paul saw them
  chosen_spanish: Al verlos Pablo
  alternatives_spanish:
  - Cuando Pablo los vio
  - Y al verlos Pablo
  lexicon: BDAG
  rationale: La cláusula temporal en español se compacta con naturalidad sin perder la referencia a los hermanos mencionados inmediatamente antes.
- source_word: εὐχαριστήσας τῷ θεῷ
  english_pob_choice: he gave thanks to God
  chosen_spanish: dio gracias a Dios
  alternatives_spanish:
  - agradeció a Dios
  - dando gracias a Dios
  lexicon: BDAG
  rationale: '''Dar gracias'' reproduce con precisión el acto expresado por εὐχαριστέω y mantiene el objeto dativo explícito: τῷ θεῷ.'
- source_word: ἔλαβε θάρσος
  english_pob_choice: took courage
  chosen_spanish: cobró ánimo
  alternatives_spanish:
  - tomó valor
  - se animó
  lexicon: BDAG
  rationale: θάρσος es 'ánimo/coraje'; 'cobró ánimo' comunica el resultado interno sin sonar excesivamente literal o coloquial. Se evita una interpretación más fuerte que el texto no demanda.
theological_decisions:
- issue: Alcance inclusivo de οἱ ἀδελφοί
  english_pob_reading: the brothers, with a footnote noting possible inclusion of women
  chosen_spanish_reading: los hermanos[a]
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se preserva la forma masculina plural del griego en el texto principal, siguiendo la decisión documental de la POB inglesa. La posible referencia amplia a la comunidad cristiana se deja en nota, no en una neutralización del cuerpo del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al evitar añadir 'noticias' a τὰ περὶ ἡμῶν y mantiene la secuencia temporal simple del pasaje. También conserva la decisión auditada de traducir ἀδελφοί de forma masculina en el texto principal, con nota inclusiva. Los topónimos se han hecho más legibles en español sin alterar el referente geográfico.
  spanish_consistency_notes:
  - Se emplea 'Dios' para θεῷ, conforme al estándar POB.
  - Se mantiene 'hermanos' en el texto principal y la alternativa inclusiva en nota.
  - '''Foro de Apio'' y ''las Tres Tabernas'' conservan la identificación geográfica del griego con adaptación española natural.'
  - La cláusula final usa un verbo idiomático ('cobró ánimo') para θάρσος sin añadir contenido doctrinal.
