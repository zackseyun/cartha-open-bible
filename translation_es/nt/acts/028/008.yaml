  text: ἐγένετο δὲ τὸν πατέρα τοῦ Ποπλίου πυρετοῖς καὶ ⸀δυσεντερίῳ συνεχόμενον κατακεῖσθαι, πρὸς ὃν ὁ Παῦλος εἰσελθὼν καὶ προσευξάμενος ἐπιθεὶς τὰς χεῖρας αὐτῷ ἰάσατο αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/008.yaml
  text: Now it happened that the father of Publius was lying sick with fevers and dysentery. Paul went in to him[a], and after praying and laying his hands on him, healed him.
  footnotes:
