translation:
  language: es
  text: Entonces sucedió que el padre de Publio estaba enfermo en cama, con fiebres y disentería[a]. Pablo entró a verlo, y después de orar y poner las manos sobre él, lo sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba en cama, sufriendo de fiebres y disentería». El participio griego puede expresar que estaba afligido o aquejado por estas enfermedades.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Entonces sucedió que
  alternatives_spanish:
  - Y sucedió que
  - Ahora bien, sucedió que
  lexicon: BDAG
  rationale: La fórmula introduce un nuevo episodio narrativo en Hechos. «Entonces sucedió que» conserva la función de transición sin sonar rígido ni introducir un matiz ajeno.
- source_word: τὸν πατέρα τοῦ Ποπλίου
  english_pob_choice: the father of Publius
  chosen_spanish: el padre de Publio
  alternatives_spanish:
  - el padre de Publio
  - el padre de Publio
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de manera natural en español. «Publio» es la forma usual del nombre propio en español bíblico.
- source_word: πυρετοῖς
  english_pob_choice: fevers
  chosen_spanish: fiebres
  alternatives_spanish:
  - una fiebre
  - fiebre
  lexicon: BDAG
  rationale: Se preserva el plural explícito del griego. «Fiebres» comunica mejor la idea de episodios febriles recurrentes o intensos que un singular neutralizador.
- source_word: δυσεντερίῳ
  english_pob_choice: dysentery
  chosen_spanish: disentería
  alternatives_spanish:
  - enfermedad intestinal
  - dolencia intestinal
  lexicon: BDAG
  rationale: «Disentería» es el equivalente léxico directo y claro en español moderno, sin suavizar el término médico del original.
- source_word: κατακεῖσθαι
  english_pob_choice: was lying sick
  chosen_spanish: estaba acostado, enfermo
  alternatives_spanish:
  - yacía enfermo
  - estaba postrado
  lexicon: BDAG
  rationale: El verbo describe la postura de estar tendido en enfermedad. «Estaba acostado, enfermo» reproduce el estado físico sin exagerar hacia «postrado».
- source_word: πρὸς ὃν
  english_pob_choice: to him
  chosen_spanish: donde él estaba
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: En español, la relación espacial y narrativa se expresa con más naturalidad como «donde él estaba», manteniendo el movimiento de Pablo hacia el enfermo.
- source_word: εἰσελθὼν
  english_pob_choice: went in to him
  chosen_spanish: entró
  alternatives_spanish:
  - entró a verlo
  - entró donde estaba
  lexicon: BDAG
  rationale: El participio de entrada se integra bien con la frase anterior. El contexto ya especifica el destino por medio de «donde él estaba».
- source_word: προσευξάμενος
  english_pob_choice: after praying
  chosen_spanish: después de orar
  alternatives_spanish:
  - habiendo orado
  - y orando
  lexicon: BDAG
  rationale: Se mantiene la anterioridad temporal del participio aoristo de manera clara y natural en español.
- source_word: ἐπιθεὶς τὰς χεῖρας αὐτῷ
  english_pob_choice: laying his hands on him
  chosen_spanish: poner las manos sobre él
  alternatives_spanish:
  - imponerle las manos
  - colocar las manos sobre él
  lexicon: BDAG
  rationale: Se conserva el gesto de curación con el plural «las manos». «Poner las manos sobre él» es transparente y ampliamente inteligible; «imponer» sería posible, pero puede sonar más litúrgico que el griego narrativo.
- source_word: ἰάσατο αὐτόν
  english_pob_choice: healed him
  chosen_spanish: lo sanó
  alternatives_spanish:
  - lo curó
  - lo curó y sanó
  lexicon: BDAG
  rationale: «Sanó» comunica la acción de sanar de forma natural en español bíblico y contemporáneo. Se evita añadir dobles verbos no presentes en el texto.
theological_decisions:
- issue: Carácter de la sanidad de Pablo
  english_pob_reading: Render the sequence straightforwardly as prayer, laying on of hands, and healing, without specifying whether the healing was immediate, miraculous in a technical sense, or sacramental.
  chosen_spanish_reading: Presentar la secuencia de manera directa como oración, imposición de manos y sanidad, sin añadir etiquetas doctrinales o técnicas.
  alternative_spanish_readings:
  - Subrayar explícitamente un milagro
  - Describirlo como recuperación médica
  rationale: El versículo afirma la sanidad, pero no desarrolla su mecanismo ni la clasifica con terminología confesional. La traducción respeta esa sobriedad narrativa.
  doctrine_reference: Affirmations; filosofía de traducción, fidelidad narrativa
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que prefirió una formulación más directa para πυρετοῖς καὶ δυσεντερίῳ. En español se mantuvo esa línea con «con fiebres y disentería», y se evitó añadir una glosa interpretativa innecesaria. También se preservó la secuencia narrativa simple: entrada, oración, imposición de manos y sanidad.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantuvo «sanó» para ἰάσατο, en coherencia con el vocabulario curativo del Nuevo Testamento.
  - Se prefirió una estructura española natural que conserve el orden lógico del griego sin calco excesivo.
