    reason: lexical_alternative
  revision_rationale: Se mejora la naturalidad y la fidelidad al griego con «estaba enfermo en cama», que recoge mejor la idea de estar tendido por enfermedad. «Entró a verlo» expresa de forma más idiomática el movimiento de Pablo hacia el enfermo. Se conserva una sola nota léxica útil, reformulada en español natural, y se elimina la nota innecesaria sobre «poner las manos».
