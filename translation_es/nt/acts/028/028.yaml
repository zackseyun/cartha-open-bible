translation:
  language: es
  text: Por tanto, les sea conocido que esta salvación de Dios[a] ha sido enviada a los gentiles; ellos también escucharán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta salvación procedente de Dios». El genitivo griego puede entenderse de más de una manera estrechamente relacionada.
    reason: lexical_alternative
  - marker: b
    text: O «ellos también oirán». El verbo puede significar «oír» o «escuchar/responder», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ... ἔστω ὑμῖν
  english_pob_choice: let it be known to you
  chosen_spanish: sepan que
  alternatives_spanish:
  - hágase saber entre ustedes
  - que les quede sabido
  lexicon: BDAG
  rationale: La construcción griega es una fórmula declarativa e imperativa; en español, «sepan que» comunica con naturalidad el anuncio solemne sin sonar forzado. Mantiene la fuerza pública del enunciado mejor que un calco más rígido.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la inferencia lógica respecto del contexto anterior. «Por tanto» conserva ese valor conclusivo con registro formal y bíblico.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En este contexto de contraste judíos/gentiles, el sentido contextual es no judíos. «Gentiles» es preciso y corresponde al uso de Hechos; «naciones» sería más literal, pero menos claro aquí.
- source_word: ἀπεστάλη
  english_pob_choice: has been sent
  chosen_spanish: ha sido enviada
  alternatives_spanish:
  - fue enviada
  lexicon: BDAG
  rationale: El aoristo pasivo indica una acción completada con vigencia en el presente. «Ha sido enviada» conserva ese valor con naturalidad en español.
- source_word: τοῦτο τὸ σωτήριον τοῦ θεοῦ
  english_pob_choice: this salvation of God
  chosen_spanish: esta salvación de Dios
  alternatives_spanish:
  - esta salvación proveniente de Dios
  - esta salvación que viene de Dios
  lexicon: BDAG
  rationale: «Salvación» refleja σωτήριον como sustantivo. El genitivo se mantiene como «de Dios» para no resolver en exceso si expresa origen, pertenencia o cualidad; así se preserva la amplitud del griego.
- source_word: αὐτοὶ καὶ ἀκούσονται
  english_pob_choice: they also will listen
  chosen_spanish: ellos también escucharán
  alternatives_spanish:
  - ellos también oirán
  - ellos también prestarán atención
  lexicon: BDAG
  rationale: ἀκούω puede significar «oír» o «escuchar/responder». En este contexto de recepción favorable, «escucharán» comunica mejor la receptividad esperada que un simple «oirán».
theological_decisions:
- issue: Sentido de σωτήριον
  english_pob_reading: Rendered as 'salvation' rather than 'saving message.'
  chosen_spanish_reading: «salvación» y no «mensaje de salvación»
  alternative_spanish_readings:
  - mensaje de salvación
  - salvación que salva
  rationale: El término griego nombra la realidad de salvación; añadir «mensaje» interpreta el contenido de forma más específica de lo que exige el texto. La traducción conserva el alcance teológico amplio de la salvación de Dios.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: Fuerza de ἀκούσονται
  english_pob_reading: Rendered as receptive 'will listen.'
  chosen_spanish_reading: «escucharán» como recepción atenta
  alternative_spanish_readings:
  - oirán
  - prestarán atención
  rationale: El contexto contrasta rechazo con recepción. «Escucharán» sugiere respuesta receptiva sin añadir explícitamente conversión o fe, manteniendo la tensión del pasaje.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como satisfactorio en la comparación de control.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin capitalización especial adicional.
  - Se usa «gentiles» en minúscula por tratarse de una designación étnico-contextual habitual en español.
  - La decisión verbal «escucharán» conserva la posible ambigüedad auditiva/receptiva señalada por el audit trail inglés.
  - No se introduce «Cristo», «SEÑOR» ni otras formulaciones no presentes en el griego de este versículo.
