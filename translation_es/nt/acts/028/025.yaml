  text: ἀσύμφωνοι δὲ ὄντες πρὸς ἀλλήλους ἀπελύοντο, εἰπόντος τοῦ Παύλου ῥῆμα ἓν ὅτι Καλῶς τὸ πνεῦμα τὸ ἅγιον ἐλάλησεν διὰ Ἠσαΐου τοῦ προφήτου πρὸς τοὺς πατέρας ⸀ὑμῶν
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/025.yaml
  text: 'And disagreeing among themselves[b][a], they were departing after Paul had spoken one final word: “The Holy Spirit spoke rightly through Isaiah the prophet to your fathers'
  footnotes:
  - marker: a
    text: Or “one word” or “one statement.” The Greek literally says “one word,” here functioning as a concluding remark.
    reason: lexical_alternative
  - marker: b
    text: Or “to your ancestors.” The Greek reads “to your fathers,” referring to Israel’s forefathers.
    reason: lexical_alternative
