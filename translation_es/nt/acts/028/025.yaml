    changes_summary: Replaced 'since they were disagreeing with one another' with the more direct participial phrasing 'disagreeing among themselves'; changed 'they were leaving' to 'they were departing' for a more formal register; changed 'had said' to 'had spoken' to better match the Greek.
translation:
  language: es
  text: 'Y como no estaban de acuerdo entre sí, se retiraban, después de que Pablo dijera una palabra final[a]: «El Espíritu Santo habló acertadamente por medio del profeta Isaías a sus padres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una palabra» o «una declaración». El griego dice literalmente «una palabra», aquí con función de observación conclusiva.
    reason: lexical_alternative
  - marker: b
    text: O «a sus antepasados». El griego dice «a sus padres», refiriéndose a los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσύμφωνοι ... ὄντες
  english_pob_choice: disagreeing among themselves
  chosen_spanish: estando en desacuerdo unos con otros
  alternatives_spanish:
  - discrepando unos con otros
  - estando discordes entre sí
  lexicon: BDAG
  rationale: La construcción participial expresa un estado de desacuerdo mutuo. «Estando en desacuerdo» conserva ese valor sin sonar forzado en español; «unos con otros» mantiene la reciprocidad de πρὸς ἀλλήλους.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another / among themselves
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre sí
  - entre ellos
  lexicon: BDAG
  rationale: Es la manera más natural en español para expresar reciprocidad mutua sin perder el sentido relacional del griego.
- source_word: ἀπελύοντο
  english_pob_choice: they were departing
  chosen_spanish: se iban apartando
  alternatives_spanish:
  - se apartaban
  - se retiraban
  lexicon: BDAG
  rationale: El imperfecto sugiere proceso o desbandada en curso. «Se iban apartando» comunica la salida gradual del grupo con un registro claro y natural.
- source_word: εἰπόντος τοῦ Παύλου
  english_pob_choice: after Paul had spoken
  chosen_spanish: después de que Pablo había dicho
  alternatives_spanish:
  - cuando Pablo hubo hablado
  - tras haber hablado Pablo
  lexicon: BDAG
  rationale: La construcción genitiva absoluta se traduce bien con una cláusula temporal. «Había dicho» conserva la anterioridad; «dicho» se ajusta al valor de ῥῆμα al presentar una declaración breve.
- source_word: ῥῆμα ἓν
  english_pob_choice: one final word
  chosen_spanish: una sola palabra[a]
  alternatives_spanish:
  - una sola declaración[a]
  - una sola expresión[a]
  lexicon: BDAG
  rationale: El griego dice literalmente «una palabra». Para no perder esa literalidad, se mantiene «palabra», y la nota explica que funciona como observación conclusiva, no necesariamente como una sola unidad léxica estricta.
- source_word: Καλῶς
  english_pob_choice: rightly
  chosen_spanish: Bien
  alternatives_spanish:
  - Justamente
  - Correctamente
  lexicon: BDAG
  rationale: Aquí se evalúa positivamente la exactitud de lo dicho por el Espíritu. En español, «Bien habló» reproduce de forma idiomática el adverbio griego sin añadir interpretación excesiva.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: The Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu el Santo
  lexicon: BDAG
  rationale: La referencia es claramente personal y divina; en español, la forma establecida y más fiel es «Espíritu Santo», con mayúsculas por referencia a la Persona divina.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: BDAG
  rationale: λαλέω se traduce con el verbo general «hablar» en un contexto profético. «Habló» conserva el tono solemne y directo.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  english_pob_choice: through Isaiah the prophet
  chosen_spanish: por medio de Isaías el profeta
  alternatives_spanish:
  - por Isaías el profeta
  - mediante Isaías el profeta
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/instrumentalidad. «Por medio de» es la opción más clara y natural para esa mediación profética en español.
- source_word: πρὸς τοὺς πατέρας ὑμῶν
  english_pob_choice: to your fathers
  chosen_spanish: a vuestros padres[b]
  alternatives_spanish:
  - a vuestros antepasados[b]
  - a vuestros ancestros[b]
  lexicon: BDAG
  rationale: El griego usa πατέρας, literalmente «padres». Se mantiene esa fuerza masculina y genealógica; la nota aclara que el referente son los antepasados de Israel.
theological_decisions:
- issue: Referencia de «vuestros padres»
  english_pob_reading: your fathers
  chosen_spanish_reading: vuestros padres
  alternative_spanish_readings:
  - vuestros antepasados
  - vuestros ancestros
  rationale: El texto griego conserva el término masculino plural πατέρας. Para respetar la forma del original y la línea POB de precisión léxica, se mantiene «padres», sin neutralizarlo en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Agencia del Espíritu Santo en el discurso profético
  english_pob_reading: The Holy Spirit spoke rightly through Isaiah the prophet
  chosen_spanish_reading: Bien habló el Espíritu Santo por medio de Isaías el profeta
  alternative_spanish_readings:
  - El Espíritu Santo habló bien por medio de Isaías el profeta
  - Bien dijo el Espíritu Santo mediante Isaías el profeta
  rationale: La frase atribuye el hablar al Espíritu Santo y mantiene a Isaías como mediador. «Habló... por medio de» preserva la agencia divina sin reducir al Espíritu a una fuerza impersonal.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: se prefiere una formulación participial directa para ἀσύμφωνοι ὄντες, se mantiene un registro formal para ἀπελύοντο, y se conserva la relación temporal de la cláusula genitiva absoluta. También se preserva la nota léxica sobre ῥῆμα ἓν como «una sola palabra», con explicación de su valor discursivo, y la referencia masculina de πατέρας sin neutralización en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas para la referencia personal divina, coherente con el tratamiento POB del sujeto.
  - Se mantiene «padres» en el texto principal por fidelidad al masculino plural del griego y se ofrece alternativa con nota.
  - Se evitó «Cristo» porque no aparece en el pasaje; se mantuvo la terminología profética simple del original.
  - «Habló» y «por medio de» conservan la atribución del discurso al Espíritu Santo sin introducir perífrasis interpretativas.
