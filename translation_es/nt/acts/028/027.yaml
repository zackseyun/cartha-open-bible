source:
  edition: SBLGNT
  text: ἐπαχύνθη γὰρ ἡ καρδία τοῦ λαοῦ τούτου, καὶ τοῖς ὠσὶν βαρέως ἤκουσαν, καὶ τοὺς ὀφθαλμοὺς αὐτῶν ἐκάμμυσαν· μήποτε ἴδωσιν τοῖς ὀφθαλμοῖς καὶ τοῖς ὠσὶν ἀκούσωσιν καὶ τῇ καρδίᾳ συνῶσιν καὶ ἐπιστρέψωσιν, καὶ ἰάσομαι αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/027.yaml
  text: For the heart of this people has become dull[a], and with their ears they scarcely hear, and they have closed their eyes; otherwise they might see with their eyes and hear with their ears and understand with their heart and turn back[b], and I would heal them.
  footnotes:
  - marker: a
    text: Or 'lest they should see ... hear ... understand ... and turn, and I would heal them.' The Greek conjunction can carry a stronger 'lest/so that not' nuance in this quotation from Isaiah.
    reason: alternative_reading
  - marker: b
    text: '''Turn back'' may also be rendered ''turn,'' ''return,'' or in context ''repent.'''
    reason: lexical_alternative
