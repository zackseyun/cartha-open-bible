review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del audit trail inglés en la mayor parte del versículo: conserva corazón/oídos/ojos/corazón, reproduce bien la secuencia de percepción-entendimiento-retorno, y mantiene la tensión de μήποτε con una formulación válida en español. Sin embargo, la cláusula final ''y yo los sane'' no refleja bien el valor de ἰάσομαι en esta construcción, donde el inglés auditado justificó ''I would heal them'' como consecuencia contingente. En español, ''yo los sane'' suena a subjuntivo dependiente y resulta menos natural y menos fiel a esa lógica.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos puntos mejorables: ''se ha endurecido'' interpreta más de la cuenta frente a la metáfora de ἐπαχύνθη (''se ha vuelto insensible/embotado/torpe''), y ''y yo los sane'' es poco idiomático en este contexto. Además, la nota [a] explica una metáfora de ''espeso/grueso'', pero el texto principal la reemplaza por ''endurecido'', lo que crea cierta tensión entre nota y traducción principal. Una revisión menor puede resolverlo con español natural y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Corazón', 'pueblo', 'oigan', 'entiendan', 'se vuelvan' y 'los sanaría' son adecuados. La decisión sobre μήποτε puede mantenerse como 'no sea que' si se conserva la tensión teológica; no requiere cambio. Conviene ajustar ἐπαχύνθη a una opción más cercana a 'has become dull' y ἰάσομαι a una forma condicional natural en español.
  issues:
  - severity: medium
    issue: '''se ha endurecido'' para ἐπαχύνθη'
    rationale: Aunque comunica insensibilidad espiritual, cambia la imagen de 'hacerse espeso/embotado' hacia la de 'endurecerse'. Dado que el audit trail inglés eligió 'has become dull', en español una opción como 'se ha vuelto insensible' preserva mejor el sentido sin introducir otra metáfora dominante.
  - severity: high
    issue: '''y yo los sane'' para καὶ ἰάσομαι αὐτούς'
    rationale: Esta forma suena gramaticalmente extraña en español y no expresa bien la consecuencia contingente que el audit trail documentó como 'I would heal them'. 'Y yo los sanaría' refleja mejor la lógica y es mucho más natural.
  - severity: low
    issue: La nota [a] no armoniza del todo con el texto principal
    rationale: La nota describe la metáfora de hacerse 'espeso' o 'grueso', pero el texto principal usa 'endurecido'. Al cambiar el texto a 'se ha vuelto insensible', la explicación y la traducción quedan mejor alineadas.
  revised_spanish_text: Porque el corazón de este pueblo se ha vuelto insensible[a], y con los oídos apenas oyen, y han cerrado sus ojos; no sea que vean con los ojos, oigan con los oídos, entiendan con el corazón y se vuelvan[b], y yo los sanaría.
