translation:
  language: es
  text: Porque el corazón de este pueblo se ha vuelto insensible[a], y con los oídos apenas oyen, y han cerrado sus ojos; no sea que vean con los ojos, oigan con los oídos, entiendan con el corazón y se vuelvan[b], y yo los sanaría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se ha embotado'. El griego literalmente alude a hacerse 'espeso' o 'grueso', como metáfora de insensibilidad espiritual.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'regresen', 'vuelvan' o, en contexto, 'se arrepientan'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαχύνθη
  english_pob_choice: has become dull
  chosen_spanish: se ha endurecido
  alternatives_spanish:
  - se ha vuelto insensible
  - se ha embotado
  - se ha hecho torpe
  lexicon: BDAG
  rationale: La imagen griega de hacerse ‘grueso’ o ‘espeso’ se usa metafóricamente para insensibilidad espiritual. En español, ‘se ha endurecido’ comunica esa dureza del corazón con naturalidad y mantiene la fuerza figurada sin reducirla a una explicación interpretativa.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: BDAG
  rationale: ‘Corazón’ conserva el término antropológico bíblico y permite mantener la unidad conceptual con ‘entiendan con el corazón’ al final del verso.
- source_word: λαοῦ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: BDAG
  rationale: ‘Pueblo’ es la forma más natural y fiel para el sustantivo colectivo aquí, y encaja bien con la cita de Isaías en contexto.
- source_word: βαρέως
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - pesadamente
  - torpemente
  lexicon: BDAG
  rationale: El adverbio transmite una manera ‘pesada’ o difícil de oír. ‘Apenas’ expresa bien la limitación del oír sin sonar forzado en español moderno, y conserva la idea de percepción insuficiente.
- source_word: ἤκουσαν
  english_pob_choice: they scarcely hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - han oído
  lexicon: BDAG
  rationale: Aunque el griego es aoristo, el sentido en la cita funciona como descripción de la condición del pueblo. En español, ‘oyen’ dentro de ‘apenas oyen’ expresa esa situación habitual de manera fluida.
- source_word: ἐκάμμυσαν
  english_pob_choice: they have closed their eyes
  chosen_spanish: han cerrado sus ojos
  alternatives_spanish:
  - cerraron sus ojos
  - han entornado sus ojos
  lexicon: BDAG
  rationale: ‘Han cerrado’ refleja mejor la lectura perfectiva observada en el audit trail inglés y mantiene claridad idiomática. ‘Sus ojos’ reproduce el objeto directo explícito del griego.
- source_word: μήποτε
  english_pob_choice: otherwise
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - lest
  - de otro modo
  lexicon: BDAG
  rationale: En esta cita, μήποτε lleva la fuerza de prevención/resultado negativo. ‘No sea que’ preserva mejor esa tensión que ‘de otro modo’ y evita debilitar el matiz de propósito negativo que el inglés audit trail quiso conservar en nota.
- source_word: ἴδωσιν
  english_pob_choice: they might see
  chosen_spanish: vean
  alternatives_spanish:
  - lleguen a ver
  - pudieran ver
  lexicon: BDAG
  rationale: Con ‘no sea que’, el subjuntivo español ‘vean’ expresa de forma natural la posibilidad evitada sin añadir modalización excesiva.
- source_word: ἀκούσωσιν
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oyeran
  lexicon: BDAG
  rationale: ‘Oigan’ mantiene el paralelismo con ‘vean’ y conserva la referencia concreta al oído como órgano, igual que el griego.
- source_word: συνῶσιν
  english_pob_choice: understand
  chosen_spanish: entiendan
  alternatives_spanish:
  - comprendan
  - perciban
  lexicon: BDAG
  rationale: ‘Entiendan’ es la opción más natural y clara en español, y preserva el enlace bíblico entre oír, ver y comprender con el corazón.
- source_word: ἐπιστρέψωσιν
  english_pob_choice: turn back
  chosen_spanish: se vuelvan
  alternatives_spanish:
  - retornen
  - se conviertan
  - se arrepientan
  lexicon: BDAG
  rationale: El verbo puede significar volver/retornar y, en contexto espiritual, conversion to change direction. ‘Se vuelvan’ conserva la metáfora direccional sin imponer la terminología más cargada de ‘arrepientan’ o ‘se conviertan’, que podría sobreespecificar el matiz.
- source_word: ἰάσομαι
  english_pob_choice: I would heal
  chosen_spanish: yo los sane
  alternatives_spanish:
  - yo los curaría
  - los sanaré
  lexicon: BDAG
  rationale: Tras μήποτε, el valor del verbo funciona como consecuencia potencial en la cita. ‘Yo los sane’ mantiene el sentido de sanidad/restauración y conserva la relación lógica del período condicional-preventivo.
theological_decisions:
- issue: Tensión entre juicio divino y responsabilidad humana en la cita de Isaías
  english_pob_reading: Render μήποτε in a way that preserves the judicial-hardening tension without making God the direct efficient cause of unbelief in the English wording.
  chosen_spanish_reading: Traducir μήποτε como ‘no sea que’ para conservar la advertencia y el matiz de resultado prevenido, sin formular a Dios como causa eficiente directa de la incredulidad en la superficie del texto.
  alternative_spanish_readings:
  - de otro modo
  - para que no
  - lest
  rationale: La cita mantiene la tensión bíblica entre juicio y culpa humana. ‘No sea que’ deja intacta la lógica del pasaje y evita resolver la cuestión teológica en la redacción principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Sentido de ἐπιστρέψωσιν en contexto de respuesta a Dios
  english_pob_reading: turn back
  chosen_spanish_reading: se vuelvan
  alternative_spanish_readings:
  - retornen
  - se conviertan
  - se arrepientan
  rationale: ‘Se vuelvan’ conserva el movimiento de regreso implícito en el griego, sin introducir una fórmula doctrinal más estrecha que pudiera cargar el texto con un sentido no explícito.
  doctrine_reference: Evitar imponer una lectura doctrinal estrechada donde el verbo es más amplio.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés actualizado: ‘scarcely hear’ se refleja con ‘apenas oyen’, y el valor perfectivo de ‘they have closed their eyes’ se conserva con ‘han cerrado sus ojos’. También se preserva la alternativa fuerte de μήποτε mediante una nota implícita en el giro ‘no sea que’.'
  spanish_consistency_notes:
  - Se mantiene ‘corazón’ para καρδία, en coherencia con el vocabulario bíblico antropológico.
  - Se usa ‘pueblo’ para λαός y no ‘nación’, por ser más natural y menos cargado.
  - Se evita ‘Cristo’ o terminología cristológica no presente en el verso.
  - La sintaxis reproduce el encadenamiento del griego con claridad española, sin suavizar la cita profética.
  - El pronombre de objeto directo ‘los’ en ‘yo los sane’ conserva la referencia personal y evita ambigüedad.
