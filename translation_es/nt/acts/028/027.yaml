revisions:
- from: Porque el corazón de este pueblo se ha endurecido[a], y con los oídos apenas oyen, y han cerrado sus ojos; no sea que vean con los ojos, oigan con los oídos, entiendan con el corazón y se vuelvan[b], y yo los sane.
  to: Porque el corazón de este pueblo se ha vuelto insensible[a], y con los oídos apenas oyen, y han cerrado sus ojos; no sea que vean con los ojos, oigan con los oídos, entiendan con el corazón y se vuelvan[b], y yo los sanaría.
  rationale: Se ajusta ἐπαχύνθη a 'se ha vuelto insensible' para acercarse mejor al sentido metafórico documentado en el audit trail inglés ('has become dull') sin introducir la imagen distinta de 'endurecerse'. Se cambia 'yo los sane' por 'yo los sanaría' para reflejar con naturalidad en español la consecuencia contingente de la cláusula introducida por μήποτε, en línea con la decisión inglesa 'I would heal them'. Se conservan 'no sea que' y 'se vuelvan' porque preservan adecuadamente la tensión teológica y el matiz direccional del griego.
