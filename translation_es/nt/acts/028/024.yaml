- from: Y algunos eran persuadidos por lo que se decía[a], pero otros no creían.
  to: Y algunos eran convencidos por lo que se decía, pero otros no creían[a].
  rationale: Se reemplaza «eran persuadidos» por «eran convencidos» para lograr un español más natural sin perder el matiz de respuesta progresiva de ἐπείθοντο. Se reubica la nota al término «no creían» para que corresponda correctamente a las alternativas léxicas de ἠπίστουν, y se formula la nota en español más limpio.
