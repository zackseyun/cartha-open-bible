    rationale: Aunque semánticamente cercano, en español suena rígido y menos idiomático que «eran convencidos» o «quedaban convencidos». El proyecto pide evitar calcos de madera cuando el español se vuelve antinatural.
  - severity: medium
    issue: La nota al pie está anclada en «se decía», pero comenta alternativas de «no creían»
    rationale: El marcador debe aparecer en la palabra o frase relevante. La documentación de alternativas léxicas para ἠπίστουν debe ir anclada en «no creían».
