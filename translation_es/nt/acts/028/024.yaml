  source_alignment_summary: El borrador refleja bien la estructura contrastiva de καὶ οἱ μὲν ... οἱ δὲ y el sentido básico de τοῖς λεγομένοις como el contenido del mensaje. Sin embargo, «eran persuadidos» suena poco natural en español y no es la mejor manera de representar ἐπείθοντο; una forma como «eran convencidos» o «quedaban convencidos» preserva mejor el valor imperfectivo sin calco innecesario. También conviene alinear mejor la nota léxica con el término principal de ἠπίστουν.
  spanish_quality_summary: La frase es comprensible, pero «eran persuadidos» resulta forzada y acartonada en español eclesial general. «Eran convencidos» mantiene claridad y dignidad. La nota actual está anclada en «se decía», pero su contenido trata sobre alternativas para «no creían»; eso crea desajuste formal. Debe moverse al término correspondiente.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave aquí son discursivas y léxicas: mantener el contraste entre «eran convencidos» y «no creían», sin convertirlo en una afirmación doctrinal más fuerte. La revisión propuesta conserva esa cautela.'
