lexical_decisions:
- source_word: ἐπείθοντο
  english_pob_choice: were persuaded
  chosen_spanish: eran persuadidos
  alternatives_spanish:
  - eran convencidos
  - quedaban persuadidos
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo expresa una respuesta en curso ante el mensaje. «Eran persuadidos» conserva el matiz de ser ganados por lo dicho sin convertirlo en una formulación más doctrinal como «creían».
- source_word: τοῖς λεγομένοις
  english_pob_choice: by what was being said
  chosen_spanish: por lo que se decía
  alternatives_spanish:
  - por las cosas que se decían
  - por lo dicho
  lexicon: BDAG
  rationale: La frase participial se refiere al contenido del discurso. «Por lo que se decía» suena natural en español y mantiene el aspecto de proceso implícito en el participio presente.
- source_word: ἠπίστουν
  english_pob_choice: disbelieved
  chosen_spanish: no creían
  alternatives_spanish:
  - descreían
  - no daban crédito
  lexicon: BDAG
  rationale: ἀπιστέω admite «discreer/descreer» o «no creer». Aquí se conserva el contraste narrativo con los persuadidos sin añadir una idea más fuerte de rechazo voluntario que el griego no exige de forma explícita.
- source_word: οἱ μὲν ... οἱ δὲ
  english_pob_choice: some ... but others
  chosen_spanish: algunos ... pero otros
  alternatives_spanish:
  - unos ... y otros
  - algunos ... y los demás
  lexicon: Greek grammar
  rationale: La correlación μέν ... δέ marca una división dentro del grupo. «Algunos ... pero otros» reproduce bien el contraste y es idiomático en español.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: La conjunción enlaza directamente con la narración previa. «Y» mantiene la continuidad sin sobreinterpretar la relación discursiva.
theological_decisions:
- issue: Naturaleza de la respuesta al mensaje
  english_pob_reading: The verse distinguishes between those persuaded by the message and those who did not believe, without specifying a fuller doctrinal status for either group.
  chosen_spanish_reading: El versículo distingue entre quienes fueron persuadidos por el mensaje y quienes no creían, sin definir más de lo que el texto dice su estado espiritual final.
  alternative_spanish_readings:
  - los primeros creyeron de verdad y los otros quedaron endurecidos
  - unos aceptaron salvadoramente el mensaje y otros lo rechazaron
  rationale: El griego describe respuestas distintas al discurso de Pablo, pero no desarrolla por sí mismo una conclusión doctrinal completa. La traducción conserva esa tensión narrativa sin resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla interpretativamente.
translation_notes:
  revision_awareness: La versión sigue el último estado revisado del POB inglés al preferir una expresión más directa para ἠπίστουν y evita añadir la fuerza interpretativa de «rechazaban creer».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva un registro bíblico sobrio y contemporáneo, evitando giros arcaizantes no exigidos por el griego.
  - «Persuadidos» refleja la respuesta progresiva del imperfecto sin equipararla automáticamente con fe salvadora.
