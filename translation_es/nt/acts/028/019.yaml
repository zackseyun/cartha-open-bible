translation:
  language: es
  text: Pero, como los judíos objetaron[a][b], me vi obligado a apelar a César, no porque tuviera algo de qué acusar a mi nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras los judíos se oponían» o «porque los judíos me contradecían».
    reason: lexical_alternative
  - marker: b
    text: Aquí «los judíos» se refiere a los opositores judíos de Pablo en este contexto legal, no a todos los judíos en general.
    reason: cultural_note
lexical_decisions:
- source_word: ἀντιλεγόντων
  english_pob_choice: because the Jews objected
  chosen_spanish: se oponían
  alternatives_spanish:
  - objetaban
  - me contradecían
  - se oponían a mí
  lexicon: BDAG
  rationale: El participio presente en genitivo absoluto indica la circunstancia que llevó a la acción de Pablo. «Se oponían» conserva la idea de resistencia y encaja de manera natural en español; «objetaban» también sería posible, pero «se oponían» refleja mejor la oposición verbal y legal del contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un leve giro discursivo respecto de lo anterior. «Pero» comunica adecuadamente esa transición en español.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego dice simplemente «los judíos», y la versión española conserva esa forma sin estrechar indebidamente el referente. El contexto aclara que se trata de los opositores de Pablo en esta situación legal.
- source_word: ἠναγκάσθην
  english_pob_choice: I was compelled
  chosen_spanish: fui obligado
  alternatives_spanish:
  - me vi obligado
  - fui compelido
  - tuve que
  lexicon: BDAG
  rationale: La pasiva expresa presión o necesidad. «Fui obligado» conserva la fuerza formal y jurídica del verbo sin volverse demasiado coloquial.
- source_word: ἐπικαλέσασθαι Καίσαρα
  english_pob_choice: to appeal to Caesar
  chosen_spanish: apelar a César
  alternatives_spanish:
  - interponer apelación ante César
  - acudir a César
  - invocar a César
  lexicon: BDAG
  rationale: Es una expresión técnica de ámbito jurídico en Hechos. «Apelar a César» es la equivalencia más precisa y reconocible en español; se mantiene «César» como título/nombre propio del texto griego.
- source_word: οὐχ ὡς
  english_pob_choice: not because
  chosen_spanish: no porque
  alternatives_spanish:
  - no como si
  - no es que
  lexicon: BDAG
  rationale: Introduce la aclaración del motivo. «No porque» es natural en español y preserva la negación de una intención hostil.
- source_word: τοῦ ἔθνους μου
  english_pob_choice: my nation
  chosen_spanish: mi nación
  alternatives_spanish:
  - mi pueblo
  - mi etnia
  lexicon: BDAG
  rationale: ἔθνος aquí tiene el sentido corporativo de pueblo/nación de Pablo. «Mi nación» mantiene ese alcance y el tono público del enunciado.
- source_word: ἔχων τι κατηγορεῖν
  english_pob_choice: I had anything to accuse ... of
  chosen_spanish: tuviera algo de qué acusar
  alternatives_spanish:
  - tuviera alguna acusación contra
  - tuviera algo que acusar
  lexicon: BDAG
  rationale: La construcción expresa tener fundamento para formular una acusación. «Tuviera algo de qué acusar» conserva el sentido forense con fluidez en español.
theological_decisions:
- issue: Referencia de «los judíos» en un contexto potencialmente sensible
  english_pob_reading: Retain 'the Jews' in the main text as the direct rendering of τῶν Ἰουδαίων, without softening to 'Jewish leaders' or 'Judeans.'
  chosen_spanish_reading: Mantener «los judíos» en el texto principal, sin sustituirlo por «los líderes judíos» ni por «los judeanos».
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: La traducción sigue la primacía del texto original y no restringe ni redefine el referente más allá de lo que dice el griego. En este versículo la expresión se refiere, por contexto, a los opositores judíos de Pablo en un proceso legal; esa precisión se conserva mejor en nota que alterando el texto principal.
  doctrine_reference: Translation philosophy §1 (Original-language primacy) y §6 (Readable modern English)
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y sin cambios necesarios; este borrador mantiene esa lectura y ajusta únicamente la formulación española para fluidez y fidelidad al valor legal del pasaje.
  spanish_consistency_notes:
  - Se conserva «César» como nombre/título conforme al valor técnico de la apelación en Hechos.
  - Se mantiene «los judíos» en el cuerpo del texto, con aclaración contextual en nota para evitar una generalización indebida.
  - Se usa «apelar» por tratarse de un tecnicismo jurídico, no de una simple llamada o invocación.
