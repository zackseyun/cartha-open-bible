revisions:
- from: Pero, como los judíos se oponían[a][b], fui obligado a apelar a César; no porque tuviera algo de qué acusar a mi nación.
  to: Pero, como los judíos objetaron[a][b], me vi obligado a apelar a César, no porque tuviera algo de qué acusar a mi nación.
  rationale: Se ajusta la redacción para reflejar más estrechamente la decisión léxica auditada del POB sobre ἀντιλεγόντων ('objetaron') y para mejorar la naturalidad del español con 'me vi obligado' para ἠναγκάσθην. Se conservan el sentido forense, la aclaración cultural y la referencia corporativa 'mi nación'.
