review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: contraste con δὲ, oposición de τῶν Ἰουδαίων, necesidad legal de apelar a César, y aclaración de que Pablo no tenía acusación contra su propia nación. Sin embargo, ἀντιλεγόντων con la decisión auditada en inglés favorece una causa puntual/legal (''porque ... objetaron'') más que el aspecto progresivo ''se oponían'', y ἠναγκάσθην suena más natural y exacto en español como ''me vi obligado'' que ''fui obligado''.'
  spanish_quality_summary: El español es claro y legible, pero 'fui obligado' suena algo tieso y menos idiomático que 'me vi obligado'. También conviene alinear mejor la primera cláusula con el registro forense del contexto. El punto y coma puede simplificarse con raya para reflejar mejor la estructura del POB en inglés, aunque no es obligatorio.
  glossary_alignment: 'La terminología clave está mayormente alineada: ''los judíos'', ''César'', ''mi nación''. No hay conflictos con los términos doctrinales del proyecto. La nota cultural sobre ''los judíos'' está bien conservada. La nota léxica debe ajustarse para priorizar ''objetaron'' según la decisión auditada.'
  issues:
  - severity: medium
    issue: ἀντιλεγόντων se vierte como 'se oponían' en vez de reflejar la elección auditada 'porque ... objeted'
    rationale: Aunque 'se oponían' es posible y aparece como alternativa en inglés ('while ... were opposing me'), la decisión principal del POB es 'because the Jews objected', por su mejor encaje en el contexto legal. En español, 'como los judíos objetaron' o 'porque los judíos objetaron' preserva mejor ese matiz.
  - severity: medium
    issue: ἠναγκάσθην se traduce 'fui obligado'
    rationale: No es incorrecto, pero en español bíblico-natural y jurídico suena más idiomático 'me vi obligado', que conserva la presión externa sin la rigidez poco natural de 'fui obligado'.
  - severity: low
    issue: La nota léxica de [a] pone primero 'se oponían' en lugar de priorizar la elección principal auditada
    rationale: Para mantener trazabilidad con el English POB, la nota debería presentar como alternativas 'se oponían' o 'me contradecían', dejando 'objetaron' como lectura principal del texto.
  revised_spanish_text: Pero, como los judíos objetaron[a][b], me vi obligado a apelar a César, no porque tuviera algo de qué acusar a mi nación.
  revised_footnotes:
  - marker: a
    text: O «mientras los judíos se oponían» o «porque los judíos me contradecían».
    reason: lexical_alternative
  - marker: b
    text: Aquí «los judíos» se refiere a los opositores judíos de Pablo en este contexto legal, no a todos los judíos en general.
    reason: cultural_note
  revision_rationale: Se ajusta la redacción para reflejar más estrechamente la decisión léxica auditada del POB sobre ἀντιλεγόντων ('objetaron') y para mejorar la naturalidad del español con 'me vi obligado' para ἠναγκάσθην. Se conservan el sentido forense, la aclaración cultural y la referencia corporativa 'mi nación'.
