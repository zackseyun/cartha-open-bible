translation:
  language: es
  text: Cuando entramos en Roma,[a] se le permitió a Pablo quedarse aparte con el soldado que lo custodiaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se le permitió a Pablo vivir aparte con un soldado que lo custodiaba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Ahora cuando
  - Y cuando
  lexicon: BDAG
  rationale: Introducción temporal natural en español para marcar la circunstancia del ingreso a Roma sin añadir matiz innecesario.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como conector leve; en español fluido es mejor no forzarlo con un marcador explícito.
- source_word: εἰσήλθομεν εἰς Ῥώμην
  english_pob_choice: we entered Rome
  chosen_spanish: entramos en Roma
  alternatives_spanish:
  - llegamos a Roma
  - vinimos a Roma
  lexicon: BDAG
  rationale: εἰσέρχομαι con εἰς + acusativo conserva el sentido de entrar; ‘entramos en Roma’ reproduce de forma directa el movimiento sin volverlo más interpretativo.
- source_word: ἐπετράπη τῷ Παύλῳ
  english_pob_choice: Paul was permitted
  chosen_spanish: se le permitió a Pablo
  alternatives_spanish:
  - Pablo fue autorizado
  - a Pablo se le permitió
  lexicon: BDAG
  rationale: La pasiva de ἐπιτρέπω expresa permiso concedido a Pablo; en español, la construcción impersonal pasiva refleja bien ese valor y suena natural.
- source_word: μένειν
  english_pob_choice: to stay
  chosen_spanish: quedarse
  alternatives_spanish:
  - permanecer
  - estar
  lexicon: BDAG
  rationale: El infinitivo complementa la idea de permiso para residir/estar alojado; ‘quedarse’ comunica de forma idiomática la permanencia contextual, sin exigir una noción de residencia técnica.
- source_word: καθ’ ἑαυτόν
  english_pob_choice: by himself
  chosen_spanish: por su cuenta
  alternatives_spanish:
  - solo
  - a solas
  - por sí mismo
  lexicon: BDAG
  rationale: La expresión idiomática indica estar aparte, de manera separada; ‘por su cuenta’ conserva esa independencia sin afirmar aislamiento total, ya que sigue estando con un soldado.
- source_word: σὺν τῷ φυλάσσοντι αὐτὸν στρατιώτῃ
  english_pob_choice: with the soldier guarding him
  chosen_spanish: con el soldado que lo custodiaba
  alternatives_spanish:
  - con el soldado que lo estaba vigilando
  - con un soldado que lo custodiaba
  lexicon: BDAG
  rationale: σύν expresa acompañamiento y el participio describe al soldado asignado; ‘custodiaba’ comunica la vigilancia protectora/carcelaria implícita en el contexto de arresto.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en la palabra correspondiente de la traducción. La redacción sigue el sentido del griego y el audit trail inglés, manteniendo la alternativa lexical documentada en nota.'
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, sin calco rígido de la estructura inglesa.
  - Se preserva la relación sintáctica entre el permiso concedido a Pablo y la compañía del soldado custodiador.
  - La nota [a] está anclada explícitamente en ‘quedarse’, porque allí se concentra la alternativa lexical ‘vivir/permanecer’.
