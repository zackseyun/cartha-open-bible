revisions:
- from: Cuando entramos en Roma, se le permitió a Pablo quedarse[a] por su cuenta con el soldado que lo custodiaba.
  to: Cuando entramos en Roma,[a] se le permitió a Pablo quedarse aparte con el soldado que lo custodiaba.
  rationale: Se cambió 'por su cuenta' por 'aparte' para representar con mayor precisión καθ’ ἑαυτόν en este contexto de arresto domiciliario, evitando una ambigüedad idiomática del español. Se mantuvo la nota léxica del inglés, ajustándola para que corresponda al nuevo anclaje y preserve la alternativa 'vivir'/'un soldado'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: llegada a Roma, permiso concedido a Pablo, residencia separada, y presencia del soldado que lo vigilaba. Sin embargo, el giro español elegido para καθ’ ἑαυτόν (''por su cuenta'') suena algo ambiguo, pues puede sugerir autosuficiencia o iniciativa propia más que alojamiento separado. Además, la nota alternativa puede ajustarse mejor al matiz de μένειν como ''vivir''.'
  spanish_quality_summary: El español es claro y natural, pero 'por su cuenta' no es la mejor opción en un contexto de custodia; 'aparte' o 'separado' comunica con más precisión la idea de estar alojado aparte sin negar la presencia del guardia. El resto del versículo es fluido y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Pablo', 'Roma' y 'soldado' están bien. 'Custodiaba' es aceptable para φυλάσσοντι, aunque 'vigilaba' también sería posible; no requiere cambio.
  issues:
  - severity: medium
    issue: καθ’ ἑαυτόν se tradujo como 'por su cuenta'
    rationale: Aunque idiomático, en español puede sugerir 'por iniciativa propia' o 'independientemente', en vez de la idea espacial/social de vivir aparte o por sí solo. El griego indica que Pablo podía alojarse separado de otros presos, pero acompañado por el soldado asignado.
  - severity: low
    issue: La nota alternativa repite la ambigüedad de 'por su cuenta'
    rationale: Si se revisa el cuerpo del texto para reflejar mejor 'aparte', conviene armonizar la alternativa y conservar la distinción inglesa entre 'stay' y 'live'.
  revised_spanish_text: Cuando entramos en Roma,[a] se le permitió a Pablo quedarse aparte con el soldado que lo custodiaba.
  revised_footnotes:
  - marker: a
    text: 'O: «se le permitió a Pablo vivir aparte con un soldado que lo custodiaba».'
    reason: lexical_alternative
  revision_rationale: Se cambió 'por su cuenta' por 'aparte' para representar con mayor precisión καθ’ ἑαυτόν en este contexto de arresto domiciliario, evitando una ambigüedad idiomática del español. Se mantuvo la nota léxica del inglés, ajustándola para que corresponda al nuevo anclaje y preserve la alternativa 'vivir'/'un soldado'.
