translation:
  language: es
  text: Y cuando hubo dicho[a] estas cosas, los judíos se marcharon, con una gran disputa entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo completo falta en los manuscritos griegos más antiguos, incluidos el Papiro 74 del siglo III, el Sinaítico del siglo IV y el Vaticano del siglo IV, así como en antiguas traducciones coptas. Está presente en la tradición bizantina mayoritaria, así como en antiguas traducciones latinas y siríacas. Probablemente sea una expansión posterior de escriba, añadida para redondear el cierre narrativo de la salida de los judíos.
    reason: textual_critical
lexical_decisions:
- source_word: Καὶ ταῦτα αὐτοῦ εἰπόντος
  english_pob_choice: And when he had said these things
  chosen_spanish: Y cuando hubo dicho estas cosas
  alternatives_spanish:
  - Y cuando dijo estas cosas
  - Y al haber dicho estas cosas
  lexicon: εἰπόντος (aorist participle of λέγω); ταῦτα
  rationale: Mantiene la relación temporal y narrativa del griego con una formulación natural en español. "Hubo dicho" refleja el valor anterior al verbo principal sin volverlo demasiado arcaico.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judíos líderes
  - los judíos presentes
  lexicon: Ἰουδαῖοι
  rationale: El griego dice simplemente "los judíos"; no hay base aquí para restringirlo a líderes o asistentes. Se conserva el referente directo del texto.
- source_word: ἀπῆλθον
  english_pob_choice: departed
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se retiraron
  - salieron
  lexicon: 'BDAG: ἀπέρχομαι'
  rationale: '"Se fueron" comunica de manera natural el movimiento de salida. Se evita sobrecargar el cierre narrativo con un tono demasiado elevado, aunque "partieron" también sería posible.'
- source_word: συζήτησιν
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - discusión
  - debate
  - controversia
  lexicon: 'BDAG: συζήτησις'
  rationale: Se conserva la fuerza de desacuerdo activo que señaló la POB inglesa con "dispute". "Disputa" en español mantiene mejor la tensión que "discusión" en este contexto.
translation_notes:
  revision_awareness: La versión inglesa POB indica que el versículo completo carece de apoyo en los manuscritos griegos más antiguos, aunque está presente en la tradición bizantina y en traducciones antiguas. La traducción española conserva esa advertencia textual en nota y sigue de cerca la estructura del griego sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene "judíos" como reflejo directo de οἱ Ἰουδαῖοι, sin expandir el referente.
  - '"Disputa" preserva la carga de desacuerdo del sustantivo συζήτησις y armoniza con la decisión inglesa.'
  - La nota textual se coloca en el versículo porque el problema afecta a la integridad del texto completo.
