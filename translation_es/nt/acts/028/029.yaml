  - severity: medium
    issue: 'Expresión poco idiomática: ''teniendo entre sí una gran disputa'''
    rationale: Aunque comprensible, suena demasiado literal respecto del participio griego. Un giro más natural en español narrativo preserva mejor la legibilidad sin perder sentido.
  - severity: low
    issue: Uso de 'scribal' en la nota
    rationale: Es un anglicismo innecesario en español; debe reemplazarse por una formulación española natural.
