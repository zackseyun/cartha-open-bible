translation:
  language: es
  text: Entonces, después de sacudirse de encima el animal[a] al fuego, no sufrió ningún daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bestia» o «la criatura»; el término griego es general, aunque el contexto indica que se trata de una serpiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν οὖν
  english_pob_choice: So he
  chosen_spanish: Así que él
  alternatives_spanish:
  - Entonces él
  - Y así él
  - Así pues, él
  lexicon: BDAG
  rationale: La secuencia articula una continuación narrativa leve y resumida. En español, «Así que él» conserva la fuerza transicional de μέν οὖν sin sobrecargar el verso con partículas más fuertes de lo que el griego exige.
- source_word: ἀποτινάξας
  english_pob_choice: after shaking ... off
  chosen_spanish: después de sacudir ... fuera
  alternatives_spanish:
  - habiendo sacudido ... fuera
  - sacudiendo ... fuera
  - tras sacudir ... fuera
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Después de sacudir» expresa esa anterioridad de manera natural en español y mantiene la relación temporal sin forzar una perífrasis más técnica.
- source_word: τὸ θηρίον
  english_pob_choice: the creature
  chosen_spanish: la criatura
  alternatives_spanish:
  - la bestia
  - el animal
  - la víbora
  lexicon: BDAG
  rationale: El griego es genérico y no usa el término específico para «serpiente» o «víbora». «La criatura» preserva esa generalidad, como en la decisión inglesa, y evita estrechar el sentido más de lo que el texto base permite.
- source_word: εἰς τὸ πῦρ
  english_pob_choice: into the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - dentro del fuego
  - en el fuego
  - a las llamas
  lexicon: BDAG
  rationale: La expresión española «al fuego» comunica de forma natural la dirección a un lugar/medio de destino, equivalente a εἰς + acusativo, sin necesidad de un calco pesado.
- source_word: ἔπαθεν
  english_pob_choice: suffered
  chosen_spanish: sufrió
  alternatives_spanish:
  - padeció
  - experimentó
  - resultó afectado
  lexicon: BDAG
  rationale: «Sufrió» reproduce con fidelidad el verbo de experiencia/aflicción y conserva el contraste con la negación siguiente. Es la opción más natural junto con «ningún daño».
- source_word: οὐδὲν κακόν
  english_pob_choice: no harm
  chosen_spanish: ningún daño
  alternatives_spanish:
  - nada malo
  - ningún mal
  - ningún perjuicio
  lexicon: BDAG
  rationale: La expresión es idiomática y denota ausencia de lesión o efecto adverso. «Ningún daño» suena natural en español y conserva el sentido de ausencia total de perjuicio.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones, y el acuerdo externo fue alto. La versión española sigue esa lectura estable, conservando la generalidad léxica de θηρίον y la secuencia narrativa simple del verso.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo, sin necesidad de terminología teológica especial.
  - Se evita «víbora» en el texto principal porque el griego aquí no la nombra de forma explícita; esa precisión queda en la nota.
  - La estructura verbal española conserva la anterioridad del participio sin convertirla en una subordinación excesivamente pesada.
