review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: transición narrativa, participio anterior, objeto general τὸ θηρίον, dirección hacia el fuego y resultado de ausencia de daño. Sin embargo, la formulación «sacudir la criatura fuera al fuego» no representa bien ἀποτινάξας ... εἰς τὸ πῦρ en español natural ni de modo fiel a la construcción ''shake off ... into the fire''.'
  spanish_quality_summary: 'La frase actual es poco idiomática y suena calcada del inglés: «Así que él» es torpe en español narrativo, y «sacudir la criatura fuera al fuego» es gramaticalmente defectuosa. Conviene usar una transición más natural y una construcción verbal española como «sacudirse de encima» o «sacudir ... al fuego».'
  glossary_alignment: No hay términos del glosario doctrinal principal en este versículo. La decisión de mantener la generalidad de τὸ θηρίον es adecuada; en español «la criatura» es posible, aunque en este contexto «el animal» suena más natural y sigue siendo general. La nota léxica debe conservar las alternativas.
  issues:
  - severity: medium
    issue: «Así que él» suena poco natural para ὁ μὲν οὖν
    rationale: Aunque transmite transición, en español bíblico natural se prefiere «Entonces él», «Así que, después de...» o reestructurar la oración sin pronombre explícito innecesario.
  - severity: high
    issue: «después de sacudir la criatura fuera al fuego» es una construcción defectuosa
    rationale: No expresa bien el valor de ἀποτινάξας con complemento desprendido. En español debe decirse algo como «después de sacudirse de encima al animal y echarlo al fuego» o «después de sacudir al animal al fuego».
  - severity: low
    issue: «la criatura» es comprensible pero menos natural que «el animal» en este contexto
    rationale: Ambas preservan la generalidad de θηρίον, pero «el animal» evita matices infantiles o ambiguos que «criatura» puede tener en español actual.
