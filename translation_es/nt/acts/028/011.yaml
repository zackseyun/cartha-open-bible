translation:
  language: es
  text: Después de tres meses, zarpamos en un barco alejandrino que había pasado el invierno en la isla, con los Dióscuros[a] como figura de proa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dióscuros» es el nombre griego de la pareja mítica formada por Cástor y Pólux, hijos gemelos de Zeus en la mitología grecorromana.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega puede entenderse como una insignia o adorno distintivo de la nave; aquí se vierte como «figura de proa» por ser la opción española más natural en este contexto marítimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τρεῖς μῆνας
  english_pob_choice: After three months
  chosen_spanish: Después de tres meses
  alternatives_spanish:
  - Y después de tres meses
  - Ahora, después de tres meses
  lexicon: BDAG
  rationale: μετά con acusativo expresa tiempo transcurrido; en español, «después de tres meses» reproduce con naturalidad el intervalo temporal. δέ se vierte con una leve continuidad implícita sin forzar una conjunción innecesaria.
- source_word: ἀνήχθημεν
  english_pob_choice: we set sail
  chosen_spanish: zarpamos
  alternatives_spanish:
  - navegamos
  - salimos a la mar
  lexicon: BDAG
  rationale: En contexto náutico, ἀνάγω significa poner a navegar o hacerse a la mar. «Zarpamos» es idiomático en español y conserva el movimiento de partida marítima.
- source_word: ἐν πλοίῳ
  english_pob_choice: in an Alexandrian ship
  chosen_spanish: en un barco alejandrino
  alternatives_spanish:
  - en una nave alejandrina
  - a bordo de un barco alejandrino
  lexicon: BDAG
  rationale: πλοῖον designa una embarcación; «barco» es claro y natural. «Alejandrino» conserva el valor adjetival de procedencia o asociación con Alejandría sin explicitar más de lo que el griego permite.
- source_word: παρακεχειμακότι
  english_pob_choice: that had wintered
  chosen_spanish: que había pasado el invierno
  alternatives_spanish:
  - que había invernado
  - que había pasado la estación invernal
  lexicon: BDAG
  rationale: El participio perfecto de παραχειμάζω indica que la embarcación permaneció durante el invierno. «Había pasado el invierno» expresa bien la duración sin sonar técnico o arcaico; se evita forzar un calco como «invernado» si puede sonar menos natural para lectores amplios.
- source_word: ἐν τῇ νήσῳ
  english_pob_choice: on the island
  chosen_spanish: en la isla
  alternatives_spanish:
  - sobre la isla
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «on the island» por idiomatismo, el griego usa ἐν. En español, «en la isla» es la correspondencia natural y más fiel, sin añadir localización específica no presente en el texto.
- source_word: Ἀλεξανδρίνῳ
  english_pob_choice: Alexandrian
  chosen_spanish: alejandrino
  alternatives_spanish:
  - de Alejandría
  lexicon: BDAG
  rationale: El adjetivo modifica a «barco» y señala origen o relación con Alejandría. «Alejandrino» mantiene la relación adjetival de forma directa y sobria.
- source_word: παρασήμῳ
  english_pob_choice: with ... as its figurehead
  chosen_spanish: como figura de proa
  alternatives_spanish:
  - con ... como emblema
  - con ... por insignia
  lexicon: BDAG
  rationale: παράσημος denota una marca distintiva o insignia de la nave; en este contexto marítimo, «figura de proa» comunica el elemento visible asociado al barco. Se prefiere una solución comprensible en español que mantenga el referente naval sin exagerar la precisión técnica.
- source_word: Διοσκούροις
  english_pob_choice: the Dioscuri
  chosen_spanish: los Dióscuros
  alternatives_spanish:
  - Castor y Pólux
  - los Dioscuros
  lexicon: BDAG
  rationale: Διόσκουροι nombra a la pareja mítica conocida como los Dioscuri. Se conserva el nombre propio transliterado en forma española «Dióscuros» para reflejar con precisión el griego y preservar la referencia pagana sin sustituirla por una explicación interpretativa en el texto principal.
theological_decisions:
- issue: Referencia pagana a los Dióscuros como distintivo de la nave
  english_pob_reading: the Dioscuri as its figurehead
  chosen_spanish_reading: con los Dióscuros como figura de proa
  alternative_spanish_readings:
  - con Castor y Pólux como figura de proa
  - con los Dioscuros como figura de proa
  rationale: El versículo describe un signo religioso/pagano de la embarcación, sin aprobarlo ni desarrollarlo. Mantener «Dióscuros» en el texto principal conserva la referencia exacta al original y evita una paráfrasis que borre el dato cultural. La nota puede aclarar la identidad mitológica para lectores no familiarizados.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §6 (legibilidad moderna sin paráfrasis interpretativa)
translation_notes:
  revision_awareness: El inglés POB revisó el texto desde una paráfrasis más interpretativa («Twin Gods») a la forma más precisa «the Dioscuri». En español se sigue esa revisión manteniendo el nombre propio mitológico «Dióscuros» en el texto principal y explicándolo en nota, en lugar de sustituirlo por una traducción interpretativa. También se evita replicar mecánicamente el idiomatismo inglés «on the island» y se ajusta a la naturalidad del español con «en la isla».
  spanish_consistency_notes:
  - Se mantiene «Dióscuros» con tilde, según la adaptación usual al español, para distinguirlo de la transliteración inglesa.
  - «Barco alejandrino» conserva el valor adjetival de procedencia sin convertirlo en una explicación amplia.
  - «Zarpamos» encaja con el contexto náutico de Hechos 27–28 y evita una fórmula demasiado técnica.
  - La puntuación respeta la segmentación del griego con una sola oración narrativa fluida.
