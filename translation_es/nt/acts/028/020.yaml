revisions:
- from: Por esta razón[a], pues, les pedí que me vieran y hablaran conmigo, porque es por la esperanza de Israel que llevo esta cadena.
  to: Por esta razón[a], pues, les pedí verlos y hablar con ustedes, porque es por la esperanza de Israel que llevo esta cadena.
  rationale: 'Se corrige el cambio de sujeto implícito en los infinitivos para ajustarse al griego: Pablo pidió verlos a ellos, no que ellos lo vieran a él. También se repara la nota al pie para que sí preserve la alternativa semántica documentada sobre el genitivo de ''la esperanza de Israel''. No se requiere adjudicación adicional porque la corrección es directa y bien sustentada por el texto fuente y el audit trail.'
