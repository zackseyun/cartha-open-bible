    text: 'O: "la esperanza que pertenece a Israel", probablemente refiriéndose a la esperanza pactual y de resurrección que Pablo proclama.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el cambio de sujeto implícito en los infinitivos para ajustarse al griego: Pablo pidió verlos a ellos, no que ellos lo vieran a él. También se repara la nota al pie para que sí preserve la alternativa semántica documentada sobre el genitivo de ''la esperanza de Israel''. No se requiere adjudicación adicional porque la corrección es directa y bien sustentada por el texto fuente y el audit trail.'
