translation:
  language: es
  text: Después de haber fijado un día con él[a], más de ellos fueron a verlo a su alojamiento. A ellos les exponía, dando solemne testimonio del reino de Dios y persuadiéndolos[b] acerca de Jesús, a partir de la Ley de Moisés y de los Profetas, desde la mañana hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su alojamiento» o «al lugar donde se hospedaba». El término griego se refiere al alojamiento o lugar de hospedaje.
    reason: lexical_alternative
  - marker: b
    text: O «les persuadía»; el participio presente puede reflejar acción en curso, sin implicar necesariamente que todos aceptaran.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταξάμενοι ... ἡμέραν
  english_pob_choice: After they had arranged a day with him
  chosen_spanish: Después de haber fijado un día con él
  alternatives_spanish:
  - Después de haber concertado un día con él
  - Después de haber establecido un día con él
  lexicon: BDAG
  rationale: El aoristo medio con ἡμέραν expresa fijar o concertar una fecha de encuentro. «Fijar un día» es natural en español y conserva la idea de concertación sin sobreexplicar.
- source_word: ἧκον
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  lexicon: BDAG
  rationale: En este contexto narrativo, «llegaron» comunica bien el movimiento hacia el lugar de reunión. «Vinieron» también es posible, pero menos preciso en español actual.
- source_word: εἰς τὴν ξενίαν
  english_pob_choice: at his lodging
  chosen_spanish: en su alojamiento
  alternatives_spanish:
  - a su alojamiento
  - en el lugar donde se hospedaba
  lexicon: BDAG
  rationale: ξενία puede referirse a alojamiento o hospedaje. «En su alojamiento» mantiene la referencia al lugar donde estaba hospedado y evita limitarlo innecesariamente a un cuarto específico.
- source_word: πλείονες
  english_pob_choice: more of them
  chosen_spanish: más de ellos
  alternatives_spanish:
  - muchos más
  - un número mayor de ellos
  lexicon: BDAG
  rationale: El comparativo indica que acudió un grupo mayor que el anterior. «Más de ellos» conserva esa relación comparativa de manera sencilla.
- source_word: ἐξετίθετο
  english_pob_choice: he was explaining
  chosen_spanish: les exponía
  alternatives_spanish:
  - les explicaba
  - les desarrollaba
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción continua de exposición. «Exponer» mantiene la idea de presentar y desplegar un argumento o enseñanza, como en el valor de «setting forth / expounding».
- source_word: διαμαρτυρόμενος
  english_pob_choice: solemnly testifying about
  chosen_spanish: dando solemne testimonio
  alternatives_spanish:
  - testificando solemnemente
  - dando testimonio con solemnidad
  lexicon: BDAG
  rationale: La participio añade la fuerza de testimonio serio y enfático. «Dando solemne testimonio» conserva ese tono sin caer en una formulación demasiado técnica.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: la reina de Dios
  alternatives_spanish:
  - el reino de Dios
  lexicon: BDAG
  rationale: Se mantiene «reina» como decisión terminológica solo si fuera una tradición documentada; aquí, para fidelidad léxica al griego βασιλεία, la forma adecuada es «reino». La opción «reina» no se emplea en el texto final y se señala para evitar confusión con el sustantivo español «reina» que no corresponde al sentido. "reino de Dios" es la traducción idiomática y semánticamente precisa.
- source_word: πείθων τε αὐτοὺς
  english_pob_choice: and persuading them
  chosen_spanish: y persuadiéndolos
  alternatives_spanish:
  - y tratando de persuadirlos
  - e intentando convencerlos
  lexicon: BDAG
  rationale: El participio presente puede sonar a acción en curso. «Persuadiéndolos» preserva la cercanía con el inglés revisado y la continuidad del acto discursivo; no fuerza la idea de éxito consumado.
- source_word: περὶ τοῦ Ἰησοῦ
  english_pob_choice: concerning Jesus
  chosen_spanish: acerca de Jesús
  alternatives_spanish:
  - sobre Jesús
  lexicon: BDAG
  rationale: «Acerca de» corresponde bien al registro formal de la cláusula y mantiene el valor explicativo del tema de la persuasión.
- source_word: ἀπό τε τοῦ νόμου Μωϋσέως καὶ τῶν προφητῶν
  english_pob_choice: from both the Law of Moses and the Prophets
  chosen_spanish: desde la Ley de Moisés y los Profetas
  alternatives_spanish:
  - a partir de la Ley de Moisés y de los Profetas
  - desde el libro de la Ley de Moisés y los Profetas
  lexicon: BDAG
  rationale: ἀπό marca fuente o base del argumento. «Desde» comunica el punto de partida escriturario. Se mantiene la pareja «Ley de Moisés y los Profetas» como referencia al testimonio bíblico judío.
- source_word: ἀπὸ πρωῒ ἕως ἑσπέρας
  english_pob_choice: from morning until evening
  chosen_spanish: desde la mañana hasta la tarde
  alternatives_spanish:
  - desde temprano hasta la tarde
  - desde la mañana hasta la noche
  lexicon: BDAG
  rationale: La expresión denota un lapso amplio del día. «Desde la mañana hasta la tarde» es natural y exacto; no se intensifica innecesariamente πρωῒ como «amanecer».
theological_decisions:
- issue: Relación entre el reino de Dios y Jesús en la exposición de Pablo
  english_pob_reading: Paul is presented as explaining the kingdom of God and persuading them concerning Jesus on the basis of Israel's Scriptures.
  chosen_spanish_reading: Pablo expone el reino de Dios y persuade acerca de Jesús con base en la Ley de Moisés y los Profetas, manteniendo un solo flujo argumental.
  alternative_spanish_readings:
  - Pablo trataba dos temas separados sin relación necesaria entre sí
  - Pablo hablaba solo del reino sin conexión explícita con Jesús
  rationale: La sintaxis une el anuncio del reino y la persuasión acerca de Jesús dentro de una misma actividad de enseñanza. La traducción conserva esa conexión sin añadir una armonización teológica más amplia que el versículo no explicita.
  doctrine_reference: Preservar la tensión textual y la unidad retórica del pasaje.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'trying to persuade them' a 'persuading them' para acercarse más a πείθων. El español sigue esa revisión con un participio continuo («persuadiéndolos») y conserva la relación entre la exposición del reino de Dios y la persuasión acerca de Jesús. También se tuvo en cuenta que ξενία admite 'lodging/accommodations', por lo que se eligió 'alojamiento' como equivalente transparente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; aquí no aparece.
  - Se usa 'reino de Dios' como equivalente terminológicamente correcto de βασιλεία τοῦ θεοῦ.
  - Se preserva 'Ley de Moisés y los Profetas' como fórmula bíblica reconocible y fiel al griego.
  - No se introduce lenguaje eclesiástico no sustentado por el texto; el registro es sobrio y público.
