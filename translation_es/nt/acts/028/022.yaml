revisions:
- from: Pero consideramos apropiado[oír] de ti lo que piensas[a], porque, en cuanto a esta secta[b], nos es conocido que en todas partes se le contradice.
  to: Pero consideramos apropiado oír de ti mismo lo que piensas[a], porque, en cuanto a esta secta[b], nos es conocido que en todas partes se habla en contra de ella.
  rationale: 'Se corrigió un error editorial visible («[oír]»), se mejoró la naturalidad de «παρὰ σοῦ ἀκοῦσαι» con «oír de ti mismo», y se ajustó «ἀντιλέγεται» a una expresión española más fiel e idiomática: «se habla en contra de ella». Se mantuvieron las decisiones centrales sobre «secta» y «lo que piensas».'
