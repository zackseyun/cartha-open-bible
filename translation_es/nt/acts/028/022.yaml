translation:
  language: es
  text: Pero consideramos apropiado oír de ti mismo lo que piensas[a], porque, en cuanto a esta secta[b], nos es conocido que en todas partes se habla en contra de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuál es tu parecer» o «qué opinas»; φρονεῖς expresa aquí la opinión o modo de pensar.
    reason: lexical_alternative
  - marker: b
    text: O «partido» o «movimiento»; αἵρεσις aquí no requiere el sentido técnico posterior de «herejía».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιοῦμεν
  english_pob_choice: we consider it proper
  chosen_spanish: consideramos apropiado
  alternatives_spanish:
  - estimamos conveniente
  - juzgamos oportuno
  - creemos apropiado
  lexicon: BDAG
  rationale: El verbo expresa una evaluación de conveniencia o corrección, no una exigencia. «Consideramos apropiado» conserva el tono cortés y formal del griego y sigue de cerca la decisión inglesa de propriedad.
- source_word: παρὰ σοῦ ἀκοῦσαι
  english_pob_choice: to hear from you
  chosen_spanish: oír de ti
  alternatives_spanish:
  - escucharte directamente
  - oír de tu parte
  - recibir de ti
  lexicon: BDAG
  rationale: La construcción con παρά + genitivo señala que la información venga de Pablo mismo. «Oír de ti» es natural en español y mantiene esa fuente directa sin sobreexplicar.
- source_word: ἃ φρονεῖς
  english_pob_choice: what you think
  chosen_spanish: lo que piensas
  alternatives_spanish:
  - cuáles son tus opiniones
  - lo que tienes en mente
  - cuál es tu parecer
  lexicon: BDAG
  rationale: φρονέω aquí apunta al parecer u opinión. «Lo que piensas» es idiomático y fiel al sentido cognitivo de la expresión.
- source_word: αἱρέσεως
  english_pob_choice: sect
  chosen_spanish: secta
  alternatives_spanish:
  - partido
  - grupo
  - movimiento
  lexicon: BDAG
  rationale: En Hechos, αἵρεσις designa una agrupación o facción reconocible, sin implicar necesariamente el sentido técnico posterior de «herejía». «Secta» conserva esa referencia social-religiosa y evita cargar el texto con un matiz doctrinal posterior.
- source_word: γνωστὸν ἡμῖν ἐστιν
  english_pob_choice: it is known to us
  chosen_spanish: nos es conocido
  alternatives_spanish:
  - lo sabemos
  - es sabido para nosotros
  - nos consta
  lexicon: BDAG
  rationale: La construcción impersonal se refleja en español con una formulación equivalente y formal. «Nos es conocido» preserva la estructura del griego y el tono del pasaje.
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: en todas partes
  alternatives_spanish:
  - por todas partes
  - en todo lugar
  lexicon: BDAG
  rationale: πανταχοῦ tiene un alcance amplio y locativo. «En todas partes» es la equivalencia natural en español y comunica bien la extensión universal del rechazo.
- source_word: ἀντιλέγεται
  english_pob_choice: it is spoken against
  chosen_spanish: se le contradice
  alternatives_spanish:
  - se habla en contra de ella
  - se le opone
  - es contradicha
  lexicon: BDAG
  rationale: El pasivo comunica oposición verbal o refutación. «Se le contradice» conserva el matiz de palabras dichas contra este grupo, sin reducirlo a una oposición abstracta.
theological_decisions:
- issue: Renderización de αἵρεσις
  english_pob_reading: sect
  chosen_spanish_reading: secta
  alternative_spanish_readings:
  - herejía
  - partido
  - movimiento
  rationale: La referencia es al movimiento cristiano visto desde fuera, no al sentido eclesiástico posterior de «herejía». Traducir «secta» mantiene la tensión histórica del término y evita imponer una categoría doctrinal anacrónica.
  doctrine_reference: Principio de primacía del texto original y de no resolver anticipadamente tensiones léxicas o históricas
translation_notes:
  revision_awareness: 'La versión sigue de cerca el consenso del paquete fuente y el control cruzado: no se detectaron revisiones necesarias en el estado más reciente; por eso se mantiene la lectura de αἵρεσις como «secta» y de ἀντιλέγεται como oposición verbal.'
  spanish_consistency_notes:
  - Se evitó «herejía» para αἵρεσις, siguiendo el audit trail y preservando la referencia histórica.
  - Se mantuvo un registro formal y readable en español, sin calcos innecesarios.
  - La frase impersonal «nos es conocido» conserva la estructura griega y el tono diplomático del verso.
