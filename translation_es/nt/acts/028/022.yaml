review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: ἀξιοῦμεν como juicio de conveniencia, ἃ φρονεῖς como opinión/parecer, αἵρεσις como «secta», γνωστὸν ἡμῖν ἐστιν como construcción impersonal formal, πανταχοῦ como alcance amplio, y ἀντιλέγεται como oposición verbal. Sin embargo, «oír de ti» suena poco natural en español en este contexto y además aparece con corchetes indebidos en el texto. También «se le contradice» no representa tan bien el pasivo impersonal de ἀντιλέγεται como «se habla contra ella» o «se habla en contra de ella».'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero tiene dos tropiezos importantes de legibilidad: el segmento «[oír] de ti» es tipográficamente impropio y sintácticamente extraño; y «se le contradice» resulta algo forzado para un colectivo como «secta». Una formulación más natural y fiel sería «oír de ti mismo» o «escuchar de ti» y «se habla en contra de ella».'
  glossary_alignment: Se alinea con la terminología del proyecto al mantener «secta» y evitar «herejía». No hay términos de glosario mayores en juego aparte de esa decisión. La nota sobre αἵρεσις está bien justificada. La nota sobre φρονεῖς también es adecuada.
  issues:
  - severity: high
    issue: Uso de corchetes en «[oír]» dentro del texto principal
    rationale: No hay base en la evidencia fuente ni en las notas para introducir corchetes editoriales aquí; además entorpecen la lectura y parecen un error de edición.
  - severity: medium
    issue: «oír de ti» es poco idiomático en español actual
    rationale: Aunque intenta reflejar παρά + genitivo, en español suena incompleto o calcado. «oír de ti mismo» o «escuchar de ti» preserva mejor la idea de oírlo de labios de Pablo.
  - severity: medium
    issue: «se le contradice» no expresa de la manera más natural «it is spoken against»
    rationale: ἀντιλέγεται aquí apunta a que se habla contra ese grupo en todas partes. «Se le contradice» sugiere más bien refutación directa de una persona o argumento. «Se habla en contra de ella» conserva mejor el matiz verbal y el referente femenino singular «secta».
  revised_spanish_text: Pero consideramos apropiado oír de ti mismo lo que piensas[a], porque, en cuanto a esta secta[b], nos es conocido que en todas partes se habla en contra de ella.
  revised_footnotes:
