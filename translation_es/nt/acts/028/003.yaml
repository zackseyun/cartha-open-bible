base_translation:
  language: en
  yaml_path: translation/nt/acts/028/003.yaml
  text: But when Paul had gathered a bundle of sticks and put them on the fire[b][a], a viper came out because of the heat and fastened onto his hand.
  footnotes:
  - marker: a
    text: 'Or ''from the heat.'' The Greek preposition can be rendered more literally this way, though here it likely expresses cause: the viper came out because of the fire''s heat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'seized his hand' or 'bit his hand.' The Greek verb more broadly means 'fastened to' or 'took hold of.'
    reason: lexical_alternative
