review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: Pablo reúne material combustible, lo pone en el fuego, una víbora sale por el calor y se aferra a su mano. Se preservan correctamente ἔχιδνα = «víbora» y ἀπὸ τῆς θέρμης = «a causa del calor», con nota para la alternativa más literal. Sin embargo, la colocación de las notas en el texto está invertida respecto de su contenido: [b] está anclada en «leña» aunque su nota trata del verbo «se prendió», y [a] queda asociada al lugar equivocado. Además, la secuencia verbal con pluscuamperfecto («había recogido... había puesto») suena menos natural en español narrativo aquí que un pretérito simple secuencial.'
  spanish_quality_summary: La redacción es clara y digna, pero requiere un ajuste menor para mejorar naturalidad y para corregir la correspondencia exacta entre anclas y notas. «Recogió ... y lo puso en el fuego» suena más idiomático en español narrativo que el pluscuamperfecto. «Un montón de leña» es aceptable, aunque «un montón de ramas secas» explicita mejor φρυγάνων; no es obligatorio. «Se prendió de su mano» es fiel, pero la nota correspondiente debe ir anclada allí.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Víbora» refleja bien ἔχιδνα. No aparecen términos sensibles del glosario mayor. La decisión de no usar «mordió» en el texto principal concuerda con la justificación léxica auditada para καθῆψε.
  issues:
  - severity: medium
    issue: Las notas [a] y [b] están ancladas al lugar equivocado en el texto.
    rationale: La nota a explica ἀπὸ τῆς θέρμης («desde el calor» / causal), por lo que debe marcar «calor» o la frase causal; la nota b explica καθῆψε, por lo que debe marcar «se prendió de su mano». Actualmente ambas aparecen junto a «leña», incumpliendo la disciplina de anclaje.
  - severity: low
    issue: El uso del pluscuamperfecto en toda la primera cláusula suena innecesariamente pesado en español.
    rationale: 'Los participios aoristos del griego pueden representarse naturalmente en español narrativo con pretéritos simples coordinados: «recogió... y lo puso...». Esto conserva la secuencia previa sin rigidez.'
  revised_spanish_text: Pero, cuando Pablo recogió un montón de leña y lo puso sobre el fuego, una víbora salió a causa del calor[a] y se prendió de su mano[b].
  revised_footnotes:
  - marker: a
    text: 'O «desde el calor». La preposición griega puede verterse más literalmente así, aunque aquí probablemente expresa causa: la víbora salió a causa del calor del fuego.'
    reason: lexical_alternative
  - marker: b
    text: O «se agarró de su mano» o «lo mordió en la mano». El verbo griego es más amplio y puede significar prenderse, sujetarse o morder.
    reason: lexical_alternative
  revision_rationale: Se corrigen las anclas de las notas para que coincidan con las palabras que explican y se aligera la sintaxis narrativa del español con pretéritos simples, sin cambiar el sentido auditado. El resto de las decisiones léxicas principales se mantienen.
