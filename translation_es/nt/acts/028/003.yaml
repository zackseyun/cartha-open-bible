translation:
  language: es
  text: Pero, cuando Pablo recogió un montón de leña y lo puso sobre el fuego, una víbora salió a causa del calor[a] y se prendió de su mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «desde el calor». La preposición griega puede verterse más literalmente así, aunque aquí probablemente expresa causa: la víbora salió a causa del calor del fuego.'
    reason: lexical_alternative
  - marker: b
    text: O «se agarró de su mano» o «lo mordió en la mano». El verbo griego es más amplio y puede significar prenderse, sujetarse o morder.
    reason: lexical_alternative
lexical_decisions:
- source_word: συστρέψαντος
  english_pob_choice: had gathered
  chosen_spanish: había recogido
  alternatives_spanish:
  - había juntado
  - había reunido
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto expresa una acción previa de Pablo. En español, «había recogido» comunica de forma natural la acción de juntar material para el fuego, sin perder la idea de reunir un conjunto de leña.
- source_word: φρυγάνων τι πλῆθος
  english_pob_choice: a bundle of sticks
  chosen_spanish: un montón de leña
  alternatives_spanish:
  - un haz de ramas
  - una cantidad de ramas secas
  lexicon: BDAG
  rationale: φρύγανα designa ramas secas o leña menuda para combustible. «Un montón de leña» mantiene la imagen concreta y funciona bien en español; «haz» sería posible, pero aquí el sustantivo colectivo del original no exige una forma atada o perfectamente ordenada.
- source_word: ἐπιθέντος ἐπὶ τὴν πυράν
  english_pob_choice: put them on the fire
  chosen_spanish: la había puesto sobre el fuego
  alternatives_spanish:
  - la había echado al fuego
  - la había colocado sobre el fuego
  lexicon: BDAG
  rationale: πυρά es aquí el fuego/brasero/hoguera. «Sobre el fuego» refleja el movimiento hacia la fuente de calor sin volver el español torpe; el objeto implícito («leña») queda retomado naturalmente con «la».
- source_word: ἔχιδνα
  english_pob_choice: a viper
  chosen_spanish: una víbora
  alternatives_spanish:
  - una serpiente venenosa
  - una víbora venenosa
  lexicon: BDAG
  rationale: ἔχιδνα es más específico que «serpiente» y corresponde bien con «víbora» en español. Se conserva la especificidad zoológica del griego sin añadir una glosa innecesaria.
- source_word: ἀπὸ τῆς θέρμης
  english_pob_choice: because of the heat
  chosen_spanish: a causa del calor
  alternatives_spanish:
  - por el calor
  - desde el calor
  lexicon: BDAG
  rationale: Aunque ἀπό puede traducirse literalmente «desde», aquí el contexto favorece una relación causal. «A causa del calor» mantiene la tensión auditada entre la literalidad y el sentido contextual, igual que la nota inglesa sobre «from the heat» frente a causalidad.
- source_word: ἐξελθοῦσα
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - emergió
  lexicon: BDAG
  rationale: El participio aoristo describe la salida de la víbora. «Salió» es la opción más natural en español y preserva el movimiento sin sobrerrefinarlo.
- source_word: καθῆψε τῆς χειρὸς αὐτοῦ
  english_pob_choice: fastened onto his hand
  chosen_spanish: se prendió de su mano
  alternatives_spanish:
  - se agarró de su mano
  - se aferró a su mano
  - se pegó a su mano
  lexicon: BDAG
  rationale: καθάπτω puede significar prenderse, sujetarse o aferrarse. «Se prendió de» conserva la imagen de adhesión o agarre sin decidir de manera cerrada entre «morder» o «agarrar», en línea con la opción inglesa de no especificar demasiado.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el participio causal/genitivo absoluto en forma narrativa natural, mantiene la especificidad de ἔχιδνα como «víbora», y refleja la ambigüedad de καθῆψε con una redacción abierta. No se reportan revisiones aplicadas en el paquete inglés, y el cotejo indica alto acuerdo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se mantuvo «víbora» para ἔχιδνα, evitando el genérico «serpiente» porque el griego es específico.
  - Se eligió una formulación causal para ἀπὸ τῆς θέρμης, coherente con la nota auditada del inglés.
  - Se evitó especificar «mordió» en el texto principal porque el verbo griego admite un campo semántico más amplio.
