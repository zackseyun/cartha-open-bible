translation:
  language: es
  text: 'Cuando los isleños vieron el animal[a] colgando de su mano, se decían unos a otros: «Sin duda, este hombre es un asesino, a quien la Justicia[b] no permitió seguir viviendo[c], aunque había salido a salvo del mar[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los nativos» o, más literalmente, «los bárbaros», es decir, los habitantes locales no griegos.
    reason: lexical_alternative
  - marker: b
    text: «Justicia» traduce el griego dikē, aquí probablemente personificada como justicia retributiva; posiblemente alude, en la comprensión pagana de los isleños, a una figura divina.
    reason: cultural_note
  - marker: c
    text: O «a quien la justicia no permitió vivir, aunque había escapado del mar».
    reason: alternative_reading
  - marker: d
    text: O «desde el mar».
    reason: alternative_reading
lexical_decisions:
- source_word: βάρβαροι
  english_pob_choice: the islanders
  chosen_spanish: los isleños
  alternatives_spanish:
  - los nativos
  - los habitantes locales
  - los bárbaros
  lexicon: BDAG
  rationale: En este contexto se refiere a los habitantes de la isla, no a “bárbaros” en sentido peyorativo. “Los isleños” comunica el referente de manera natural en español y evita una carga negativa ajena al texto.
- source_word: κρεμάμενον
  english_pob_choice: hanging
  chosen_spanish: colgando
  alternatives_spanish:
  - pendiendo
  - suspendido
  - colgado
  lexicon: BDAG
  rationale: El participio describe al animal suspendido de la mano de Pablo. “Colgando” es claro y natural en español, manteniendo la imagen visual sin sobreinterpretarla.
- source_word: τὸ θηρίον
  english_pob_choice: the creature
  chosen_spanish: el animal
  alternatives_spanish:
  - la criatura
  - la bestia
  - la víbora
  lexicon: BDAG
  rationale: El sustantivo es genérico. “El animal” conserva esa generalidad en español; “víbora” sería demasiado específico antes de que el contexto lo exija.
- source_word: πρὸς ἀλλήλους ἔλεγον
  english_pob_choice: they said to one another
  chosen_spanish: se decían unos a otros
  alternatives_spanish:
  - se dijeron unos a otros
  - se decían entre sí
  - hablaban entre sí
  lexicon: BDAG
  rationale: La forma imperfecta sugiere discurso en curso o repetido; “se decían unos a otros” lo refleja bien en español y conserva explícitamente πρὸς ἀλλήλους.
- source_word: Πάντως
  english_pob_choice: Surely
  chosen_spanish: Sin duda
  alternatives_spanish:
  - Ciertamente
  - Seguro que
  - No cabe duda
  lexicon: BDAG
  rationale: Expresa fuerte inferencia desde lo que acababan de ver. “Sin duda” reproduce ese tono con naturalidad en el diálogo.
- source_word: φονεύς
  english_pob_choice: a murderer
  chosen_spanish: un asesino
  alternatives_spanish:
  - un homicida
  - un matador
  - un homicida cruel
  lexicon: BDAG
  rationale: El término designa a quien comete asesinato. “Asesino” es la equivalencia más natural y directa en español actual.
- source_word: διασωθέντα
  english_pob_choice: was brought safely through
  chosen_spanish: había sido librado
  alternatives_spanish:
  - había sido salvado
  - había sido puesto a salvo
  - había pasado a salvo
  lexicon: BDAG
  rationale: El participio enfatiza que salió con vida del peligro del mar. “Había sido librado” conserva la pasiva y evita cargarlo con matices soteriológicos que en español podría sugerir “salvado”.
- source_word: ἡ δίκη
  english_pob_choice: Justice
  chosen_spanish: la Justicia
  alternatives_spanish:
  - la justicia
  - la Venganza
  - la diosa Justicia
  lexicon: BDAG
  rationale: Aquí δίκη está personificada en la comprensión de los isleños. Mantener la mayúscula preserva la personificación sin decidir de antemano si se trata de una divinidad pagana concreta.
- source_word: ζῆν οὐκ εἴασεν
  english_pob_choice: has not allowed to live
  chosen_spanish: no permitió seguir viviendo
  alternatives_spanish:
  - no permitió vivir
  - no le dejó vivir
  - no le permitió seguir con vida
  lexicon: BDAG
  rationale: La idea es que no le concedió continuar con vida. “No permitió seguir viviendo” suena natural y conserva el sentido idiomático del griego.
- source_word: ἐκ τῆς θαλάσσης
  english_pob_choice: from the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - desde el mar
  - fuera del mar
  - de la mar
  lexicon: BDAG
  rationale: Tras el participio de rescate, la frase indica el peligro del que fue librado. “Del mar” es la forma más natural y fiel en español.
theological_decisions:
- issue: Personificación de δίκη
  english_pob_reading: Render as 'Justice' with capitalization to reflect personification in the speakers' worldview, without asserting the narrator's endorsement of a pagan deity.
  chosen_spanish_reading: Mantener «la Justicia» con mayúscula para señalar la personificación, sin convertirla en una afirmación doctrinal del narrador.
  alternative_spanish_readings:
  - la justicia
  - la diosa Justicia
  - la Venganza
  rationale: El texto reporta la conclusión de los isleños. La mayúscula preserva la personificación y la tensión interpretativa sin cerrar el sentido con una identificación más específica de la necesaria.
  doctrine_reference: Preservar la tensión teológica del relato; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: La base inglesa más reciente mantiene la lectura de 'from the sea' y evita la antigua construcción incómoda 'through from the sea'. La traducción española sigue esa revisión y conserva el contraste entre el rescate del mar y el juicio percibido por los isleños.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se mantuvo «la Justicia» capitalizada para reflejar la personificación de δίκη, coherente con el audit trail inglés.
  - «Los isleños» se eligió como equivalente natural de βάρβαροι en este contexto, sin perder el matiz de habitantes no griegos.
