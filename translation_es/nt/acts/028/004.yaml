revisions:
- from: 'Cuando los isleños vieron el animal[a] colgando de su mano, se decían unos a otros: «Sin duda, este hombre es un asesino, a quien la Justicia[b] no permitió seguir viviendo[c], aunque había sido librado del mar[d]».'
  to: 'Cuando los isleños vieron el animal[a] colgando de su mano, se decían unos a otros: «Sin duda, este hombre es un asesino, a quien la Justicia[b] no permitió seguir viviendo[c], aunque había salido a salvo del mar[d]».'
  rationale: Se corrige una formulación española que, aunque entendible, suena más teológica y agentiva de lo que exige el griego. «Había salido a salvo del mar» expresa de manera más natural y fiel la idea de haber sobrevivido al peligro marítimo. El resto del versículo y de las notas se mantiene esencialmente igual por su buena fidelidad al texto fuente y al razonamiento auditado en inglés.
