translation:
  language: es
  text: Allí encontramos hermanos y se nos invitó a quedarnos con ellos siete días[a]. Y así llegamos a Roma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», pero en este contexto probablemente se refiere a creyentes en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Ahí
  - En ese lugar
  lexicon: BDAG
  rationale: El adverbio relativo es locativo y remite al lugar previamente mencionado. «Allí» suena natural en español y conserva la referencia espacial sin introducir una paráfrasis.
- source_word: εὑρόντες
  english_pob_choice: we found
  chosen_spanish: encontramos
  alternatives_spanish:
  - habiendo encontrado
  - hallamos
  lexicon: BDAG
  rationale: El participio aoristo se integra naturalmente en español como verbo finito coordinado con la acción principal, manteniendo la secuencia narrativa sin forzar una construcción participial pesada.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes hermanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina del término griego, como hace la POB en inglés, porque el texto puede referirse a la comunidad de creyentes sin especificar el género. En español, «hermanos» es la forma más fiel y habitual para ese uso comunitario.
- source_word: παρεκλήθημεν
  english_pob_choice: we were invited
  chosen_spanish: se nos invitó
  alternatives_spanish:
  - nos rogaron
  - se nos rogó
  - se nos pidió
  lexicon: BDAG
  rationale: El pasivo de παρακαλέω aquí expresa una solicitud o acogida hospitalaria. «Se nos invitó» comunica bien esa recepción sin perder el matiz pasivo ni volverlo excesivamente formal.
- source_word: παρ’ αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - en su compañía
  - en su casa
  lexicon: BDAG
  rationale: La preposición con dativo expresa asociación y hospedaje. «Con ellos» es la opción más directa y natural en español, y no añade el detalle de lugar físico que el griego no explicita.
- source_word: ἐπιμεῖναι
  english_pob_choice: to stay
  chosen_spanish: quedarnos
  alternatives_spanish:
  - permanecer
  - seguir
  lexicon: BDAG
  rationale: En un contexto de viaje y hospitalidad, el infinitivo expresa la permanencia temporal. «Quedarnos» es idiomático en español y conserva la idea de hospedaje temporal mejor que un calco más rígido.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: BDAG
  rationale: El acusativo marca duración. En español, la duración se entiende naturalmente con «siete días» en este contexto, dado el verbo de estancia.
- source_word: καὶ οὕτως
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de ese modo
  - Y de esta manera
  lexicon: BDAG
  rationale: La transición narrativa se conserva con una fórmula breve y clara. «Y así» mantiene el nexo resultativo sin sonar forzado.
- source_word: εἰς τὴν Ῥώμην ἤλθαμεν
  english_pob_choice: we came to Rome
  chosen_spanish: llegamos a Roma
  alternatives_spanish:
  - fuimos a Roma
  - vinimos a Roma
  lexicon: BDAG
  rationale: ἔρχομαι con εἰς + acusativo puede expresar llegada al destino. «Llegamos a Roma» refleja de forma natural el sentido de arribo, que en español comunica mejor el aspecto narrativo del viaje.
theological_decisions:
- issue: Referente de ἀδελφοὺς en el contexto de Hechos
  english_pob_reading: fellow believers in the local Christian community
  chosen_spanish_reading: creyentes de la comunidad local, expresados como «hermanos»
  alternative_spanish_readings:
  - hermanos biológicos
  - judíos compatriotas en general
  rationale: El contexto de hospitalidad y recepción en una comunidad cristiana favorece la lectura de creyentes. La traducción principal mantiene la forma lexical «hermanos» sin ampliar innecesariamente el sentido, y la nota explica el alcance contextual.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés al eliminar la coma innecesaria y mantener el orden narrativo fluido: encuentro con los hermanos, la invitación para quedarse siete días y la llegada a Roma. Se preserva también la decisión lexical de «brothers» como «hermanos» con una nota explicativa.'
  spanish_consistency_notes:
  - Se mantiene «Roma» como nombre propio sin artículo.
  - Se conserva el nexo narrativo simple «Y así» para reflejar καὶ οὕτως.
  - No se introduce una equivalencia eclesiástica más pesada como «santos» o «creyentes» en el texto principal, para respetar la forma lexical del griego.
