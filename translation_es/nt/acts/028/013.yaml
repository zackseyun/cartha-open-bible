translation:
  language: es
  text: Desde allí[a], después de levar anclas, llegamos a Rhegium. Y después de un día, cuando se levantó un viento del sur, al segundo día llegamos a Puteoli,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zarpando». El participio griego περιελόντες es náutico y puede referirse específicamente a levar anclas o, de manera más general, a hacerse a la mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: BDAG
  rationale: Expresa con naturalidad el valor espacial de transición narrativa y conserva la referencia al punto de salida sin sobretraducir.
- source_word: περιελόντες
  english_pob_choice: after weighing anchor
  chosen_spanish: después de levar anclas
  alternatives_spanish:
  - después de soltar amarras
  - después de zarpar
  - al zarpar
  lexicon: BDAG
  rationale: La imagen náutica admite la idea de quitar lo que mantenía la nave detenida; 'levar anclas' comunica bien el movimiento de partida y corresponde al matiz marítimo documentado.
- source_word: κατηντήσαμεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - arribamos
  - vinimos
  lexicon: BDAG
  rationale: En español, 'llegamos' transmite de forma natural la llegada a un destino explícito y evita una literalidad menos idiomática.
- source_word: Ῥήγιον
  english_pob_choice: Rhegium
  chosen_spanish: Regio
  alternatives_spanish:
  - Rhegium
  - Reggio
  lexicon: transliteración tradicional de topónimo
  rationale: El topónimo se adapta a la forma castellana habitual 'Regio', que resulta más reconocible para lectores en español sin perder la identificación histórica del lugar.
- source_word: μετὰ μίαν ἡμέραν
  english_pob_choice: after one day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - después de un día
  - un día después
  lexicon: BDAG
  rationale: La secuencia narrativa en español suena más natural con 'al día siguiente', sin alterar el valor temporal de avance cronológico.
- source_word: ἐπιγενομένου νότου
  english_pob_choice: when a south wind came up
  chosen_spanish: cuando sopló el viento del sur
  alternatives_spanish:
  - cuando se levantó un viento del sur
  - cuando vino un viento del sur
  lexicon: BDAG
  rationale: Se conserva el evento atmosférico circunstancial del genitivo absoluto; 'sopló' es una forma idiomática y clara en español para indicar que el viento se presentó o se intensificó.
- source_word: δευτεραῖοι
  english_pob_choice: on the second day
  chosen_spanish: al segundo día
  alternatives_spanish:
  - en el segundo día
  - a los dos días
  lexicon: BDAG
  rationale: Mantiene la referencia temporal al segundo día de travesía con una fórmula natural y fiel al adverbial griego.
- source_word: ἤλθομεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - vinimos
  - arribamos
  lexicon: BDAG
  rationale: Repite el mismo valor de llegada a destino con un verbo español transparente y común en narrativa de viaje.
- source_word: Ποτιόλους
  english_pob_choice: Puteoli
  chosen_spanish: Puteoli
  alternatives_spanish:
  - Pozzuoli
  lexicon: transliteración de topónimo
  rationale: Se conserva la forma histórica/transliterada del nombre del lugar, coherente con el tratamiento de nombres propios en el texto base.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el griego SBLGNT y el audit trail inglés POB, manteniendo la lectura náutica de περιελόντες y la secuencia temporal del viaje. Se adopta una solución española natural sin borrar la ambigüedad documentada entre 'levar anclas' y el sentido más general de 'zarpar'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvieron los topónimos como nombres propios geográficos, con adaptación española cuando la forma está asentada ('Regio').
  - Se evitó el calco rígido de la sintaxis inglesa para preservar una lectura fluida en español, sin añadir contenido no presente en el original.
