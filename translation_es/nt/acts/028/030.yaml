    issue: '''recibía'' atenúa el matiz hospitalario de ἀπεδέχετο'
    rationale: El expediente inglés eligió 'welcomed' precisamente para reflejar mejor la nuance de hospitalidad de ἀποδέχομαι. En español, 'recibía' es posible, pero más plano; 'acogía' preserva mejor esa decisión sin sonar forzado.
  - severity: medium
    issue: '''entraban a verlo'' añade una finalidad no explícita'
    rationale: El griego dice literalmente 'los que entraban hacia él / a él', con énfasis espacial en el ingreso al alojamiento. 'A verlo' interpreta el motivo de la visita y va más allá de la evidencia fuente y de la nota inglesa.
  - severity: low
