- from: Y permaneció dos años completos en su propio alojamiento alquilado[a], y recibía a todos los que entraban a verlo[b].
  to: Y permaneció dos años completos en su propio alojamiento alquilado[a], y acogía a todos los que entraban adonde él estaba[b].
  rationale: 'La revisión conserva el buen español del borrador, pero corrige dos puntos importantes: (1) ajusta ἀπεδέχετο a un equivalente más hospitalario (''acogía''), en línea con la decisión auditada del POB; y (2) elimina la expansión interpretativa ''a verlo'', preservando mejor la imagen espacial de εἰσπορευομένους. También se pulen las notas para que reflejen con mayor precisión las alternativas documentadas.'
