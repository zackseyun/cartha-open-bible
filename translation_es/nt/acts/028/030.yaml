translation:
  language: es
  text: Y permaneció dos años completos en su propio alojamiento alquilado[a], y acogía a todos los que entraban adonde él estaba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su propia casa alquilada». El griego μίσθωμα se refiere a alojamiento alquilado; «alojamiento alquilado» es una forma más natural en español contemporáneo.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que venían a él». El griego dice más literalmente «los que entraban hacia él», probablemente aludiendo a visitantes que entraban en su alojamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνέμεινεν
  english_pob_choice: he stayed
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - estuvo
  - vivió
  lexicon: BDAG
  rationale: ἐμμένω en este contexto expresa continuidad de residencia o permanencia en un lugar. «Permaneció» conserva el sentido de residencia continua y suena natural y digno en español narrativo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce aquí una continuación suave del relato, no un contraste fuerte. «Y» refleja bien esa progresión narrativa en español.
- source_word: διετίαν ὅλην
  english_pob_choice: for two whole years
  chosen_spanish: dos años completos
  alternatives_spanish:
  - por dos años enteros
  - durante dos años completos
  - por el período completo de dos años
  lexicon: BDAG
  rationale: La expresión subraya la duración total. «Dos años completos» conserva la fuerza de ὅλην sin sonar forzado.
- source_word: ἐν ἰδίῳ μισθώματι
  english_pob_choice: in his own rented lodging
  chosen_spanish: en su propio alojamiento alquilado
  alternatives_spanish:
  - en su propia vivienda alquilada
  - en sus propias habitaciones alquiladas
  - en su propia casa alquilada
  lexicon: BDAG
  rationale: μίσθωμα se refiere a alojamiento o vivienda alquilada. «Alojamiento alquilado» mantiene el valor lexical sin recurrir a «casa rentada» como calco; «propio» refleja ἰδίῳ, es decir, bajo su propio arreglo.
- source_word: ἀπεδέχετο
  english_pob_choice: he welcomed
  chosen_spanish: recibía
  alternatives_spanish:
  - acogía
  - daba la bienvenida a
  - recibía con gusto
  lexicon: BDAG
  rationale: El imperfecto marca acción habitual o repetida. Aunque ἀποδέχομαι puede incluir hospitalidad, en español «recibía» preserva el sentido básico de recibir a visitantes sin añadir un matiz excesivamente interpretativo.
- source_word: πάντας τοὺς εἰσπορευομένους πρὸς αὐτόν
  english_pob_choice: all who came in to him
  chosen_spanish: a todos los que entraban a verlo
  alternatives_spanish:
  - a todos los que entraban donde él estaba
  - a todos los que llegaban a él
  - a todos los que se acercaban a él
  lexicon: BDAG
  rationale: El participio indica literalmente «los que entraban». En español, «entraban a verlo» conserva la imagen espacial del ingreso a su alojamiento y hace explícito el referente implícito de la visita, como en el contexto de la vivienda de Pablo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el acuerdo de revisión fue alto y no se detectaron objeciones al sentido básico del versículo.
  spanish_consistency_notes:
  - Se mantiene «alojamiento alquilado» para μίσθωμα y «recibía» para ἀπεδέχετο con el fin de conservar la sencillez narrativa.
  - No se introduce terminología eclesiástica ajena al griego; el verso describe residencia y hospitalidad, no un cargo o función ministerial.
