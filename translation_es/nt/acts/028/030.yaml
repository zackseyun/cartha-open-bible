    rationale: 'La formulación ''casa alquilada / casa de alquiler'' es redundante y menos pulida. Conviene una nota más limpia alineada con la nota inglesa: ''casa alquilada'' como alternativa más literal/tradicional.'
  revised_spanish_text: Y permaneció dos años completos en su propio alojamiento alquilado[a], y acogía a todos los que entraban adonde él estaba[b].
  revised_footnotes:
