translation:
  language: es
  text: proclamando el reino de Dios y enseñando lo referente al Señor Jesús Mesías con toda valentía[a], sin estorbo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús Cristo». Χριστός puede funcionar como título («Mesías») o, en algunos contextos, como designación casi nominal («Cristo»).'
    reason: alternative_reading
lexical_decisions:
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: El participio presente describe la actividad continua de Pablo; 'proclamando' conserva el matiz público y declarativo sin reducirlo al acto de predicar en sentido eclesiástico formal.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: '''Reino'' es la opción establecida y natural en español para βασιλεία aquí; mantiene tanto la dimensión concreta como la dinámica del término sin forzar una paráfrasis.'
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  lexicon: BDAG
  rationale: Participio coordinado con κηρύσσων; 'enseñando' es directo, claro y conserva la acción continua del texto.
- source_word: τὰ περὶ
  english_pob_choice: the things concerning
  chosen_spanish: las cosas acerca de
  alternatives_spanish:
  - los asuntos acerca de
  - lo referente a
  lexicon: BDAG
  rationale: La construcción griega es algo idiomática; 'las cosas acerca de' reproduce con transparencia la forma del original y evita suavizar demasiado la estructura.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  lexicon: BDAG
  rationale: En el uso cristológico del NT, κύριος funciona como título; 'Señor' es la equivalencia española normal y más fiel al registro bíblico.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se preserva el valor titulado de Χριστός como 'Mesías', conforme a la política del proyecto y al contexto cristológico de la frase; 'Cristo' se reserva como alternativa de forma fija o cuando el español lo requiera por idiomatismo.
- source_word: μετὰ πάσης παρρησίας
  english_pob_choice: with all boldness
  chosen_spanish: con toda valentía
  alternatives_spanish:
  - con toda franqueza
  - con plena libertad
  lexicon: BDAG
  rationale: παρρησία combina franqueza, apertura y audacia; 'valentía' comunica bien el aspecto de habla sin miedo en español moderno, aunque 'franqueza' queda como matiz alternativo.
- source_word: ἀκωλύτως
  english_pob_choice: unhindered
  chosen_spanish: sin impedimento
  alternatives_spanish:
  - sin estorbo
  - libremente
  lexicon: BDAG
  rationale: Adverbio final enfático que cierra el libro con la idea de no ser detenido; 'sin impedimento' es una formulación natural y precisa en español bíblico contemporáneo.
theological_decisions:
- issue: Renderizado de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La auditoría en inglés restauró 'Messiah' por política del proyecto; en español, 'Mesías' expresa de manera transparente el contenido titulado de Χριστός. 'Cristo' se mantiene como alternativa conocida, pero no como elección principal aquí.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms for Χριστός'
- issue: Tratamiento de παρρησία en el cierre de Hechos
  english_pob_reading: with all boldness
  chosen_spanish_reading: con toda valentía
  alternative_spanish_readings:
  - con toda franqueza
  - con plena libertad
  rationale: Se conserva el componente de audacia pública del término, que en este cierre de Hechos subraya la predicación sin temor. 'Valentía' comunica mejor el efecto pragmático del original que una mera 'franqueza'.
  doctrine_reference: Lexical force of παρρησία in Acts 28:31
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección de revisión: se intentó cambiar ''Messiah'' por ''Christ'' y luego se restauró ''Messiah'' por coherencia doctrinal. La presente versión española sigue esa decisión restaurada y la expresa con ''Mesías''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto base lo exija; aquí no aparece.
  - '''Reino de Dios'' se usa de forma estable para βασιλεία τοῦ θεοῦ.'
  - '''Señor Jesús Mesías'' conserva el orden y la relación cristológica del griego sin añadir artículos innecesarios.'
  - '''Sin impedimento'' preserva la clausura enfática de ἀκωλύτως al final del verso.'
