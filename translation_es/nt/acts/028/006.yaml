translation:
  language: es
  text: Pero ellos esperaban que él se hinchara o cayera muerto de repente. Pero, después de haber esperado mucho tiempo y al ver que nada le sucedía inusual[a], cambiaron de parecer y comenzaron a decir que él era un dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nada fuera de lo común» o «nada extraño» le sucedía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεδόκων
  english_pob_choice: were expecting
  chosen_spanish: esperaban
  alternatives_spanish:
  - estaban esperando
  - seguían esperando
  lexicon: BDAG
  rationale: El imperfecto expresa una expectativa շարունակada; en español, «esperaban» conserva esa duración sin sonar rígido.
- source_word: μέλλειν
  english_pob_choice: to
  chosen_spanish: que él se
  alternatives_spanish:
  - que iba a
  - que estaba por
  lexicon: BDAG
  rationale: Con los infinitivos siguientes, el valor es de inminencia anticipada. En español, se integra de modo natural con «que él se... / que él cayera...» sin forzar una perífrasis pesada.
- source_word: πίμπρασθαι
  english_pob_choice: to swell up
  chosen_spanish: hinchara
  alternatives_spanish:
  - inflamara
  - ardiera
  lexicon: BDAG
  rationale: En el contexto de una mordedura de serpiente, el sentido esperado es hinchazón corporal. «Hinchara» preserva ese matiz y suena natural en español.
- source_word: καταπίπτειν ἄφνω νεκρόν
  english_pob_choice: suddenly fall down dead
  chosen_spanish: cayera muerto de repente
  alternatives_spanish:
  - se desplomara muerto de repente
  - cayera súbitamente muerto
  lexicon: BDAG
  rationale: La expresión combina caída repentina y muerte. «Cayera muerto de repente» mantiene ambos elementos con claridad y sin añadir más que el texto.
- source_word: ἐπὶ πολὺ
  english_pob_choice: after they had waited a long time
  chosen_spanish: después de haber esperado mucho tiempo
  alternatives_spanish:
  - tras esperar mucho tiempo
  - después de esperar largo rato
  lexicon: BDAG
  rationale: La locución marca una duración prolongada. En español, una cláusula temporal expresa mejor el valor idiomático que una traducción demasiado literal.
- source_word: θεωρούντων
  english_pob_choice: saw
  chosen_spanish: ver
  alternatives_spanish:
  - observaban
  - miraban
  lexicon: BDAG
  rationale: Aunque el verbo puede implicar observación atenta, aquí el resultado es perceptivo. «Ver» encaja naturalmente con la secuencia narrativa en español.
- source_word: μηδὲν ἄτοπον
  english_pob_choice: nothing unusual
  chosen_spanish: nada inusual
  alternatives_spanish:
  - nada fuera de lo común
  - nada anormal
  - nada extraño
  lexicon: BDAG
  rationale: ἄτοπος puede abarcar lo extraño, anómalo o impropio. «Inusual» conserva el sentido amplio sin precisar indebidamente daño o culpa.
- source_word: μεταβαλόμενοι
  english_pob_choice: they changed their minds
  chosen_spanish: cambiaron de parecer
  alternatives_spanish:
  - cambiaron de opinión
  - cambiaron
  lexicon: BDAG
  rationale: El participio medio indica un giro de actitud o conclusión. «Cambiar de parecer» transmite ese viraje de forma natural en español.
- source_word: ἔλεγον
  english_pob_choice: began saying
  chosen_spanish: comenzaron a decir
  alternatives_spanish:
  - decían
  - empezaron a decir
  lexicon: BDAG
  rationale: El imperfecto sugiere el inicio de una nueva línea de afirmación. «Comenzaron a decir» reproduce bien ese matiz inceptivo.
- source_word: θεόν
  english_pob_choice: a god
  chosen_spanish: un dios
  alternatives_spanish:
  - dios
  - divino
  lexicon: BDAG
  rationale: El acusativo anartro en un contexto pagano se entiende de manera indefinida. «Un dios» evita imponer una identificación con el Dios único y refleja la conclusión errónea de los isleños.
theological_decisions:
- issue: La afirmación pagana sobre la identidad de Pablo en εἶναι θεόν
  english_pob_reading: that he was a god
  chosen_spanish_reading: que él era un dios
  alternative_spanish_readings:
  - que él era Dios
  - que él era divino
  rationale: El relato presenta la conclusión equivocada de los isleños. La forma indefinida «un dios» respeta el contexto politeísta y evita confundirlo con la confesión cristiana del Dios único.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios sustanciales; se mantiene la decisión de traducir el resultado observado por los isleños como «un dios» y de conservar el matiz inusual de μηδὲν ἄτοπον con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «dios» en minúscula e indefinido para reflejar el anartro θεόν en contexto pagano.
  - Se conserva el contraste temporal de los dos miembros con «Pero... Pero...», siguiendo la progresión del griego y del audit trail inglés.
  - La nota al pie evita sobreinterpretar ἄτοπον como daño físico específico, manteniendo la amplitud semántica documentada.
