revisions:
- from: 'Pero ellos le dijeron[a]: «No hemos recibido cartas sobre ti desde Judea, ni ha venido ninguno de los hermanos[b] y ha informado o hablado algo malo acerca de ti».'
  to: 'Pero ellos le dijeron: «No hemos recibido cartas de Judea acerca de ti, ni ninguno de los hermanos[a] que vino ha informado ni hablado nada malo acerca de ti»'
  rationale: 'Se corrige la sintaxis para que «ninguno de los hermanos que vino» sea el sujeto de «ha informado ni hablado», reflejando con fidelidad el participio griego. Se elimina la nota léxica defectuosa, ya que no aporta una alternativa española útil. También se ajusta la redacción a un español más natural: «de Judea», «acerca de ti» y «nada malo».'
