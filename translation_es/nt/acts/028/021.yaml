translation:
  language: es
  text: 'Pero ellos le dijeron: «No hemos recibido cartas de Judea acerca de ti, ni ninguno de los hermanos[a] que vino ha informado ni hablado nada malo acerca de ti»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» puede referirse a compatriotas judíos de Judea; el texto no los identifica explícitamente como creyentes cristianos.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ... εἶπαν
  english_pob_choice: But they said
  chosen_spanish: Pero ellos le dijeron
  alternatives_spanish:
  - Y ellos le dijeron
  - Entonces le dijeron
  lexicon: BDAG
  rationale: δέ se expresa con valor adversativo suave en español como «Pero»; se mantiene el pronombre explícito «ellos» para reflejar el sujeto enfático del griego y la forma de diálogo.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - en respuesta a él
  lexicon: BDAG
  rationale: En español, el complemento dativo del verbo de decir se naturaliza como «le», que conserva el valor de dirigirse a él sin añadir matiz innecesario.
- source_word: γράμματα
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - escritos
  - mensajes escritos
  lexicon: BDAG
  rationale: En este contexto, γράμματα se refiere a correspondencia; «cartas» es la equivalencia más clara y natural en español.
- source_word: ἀπὸ τῆς Ἰουδαίας
  english_pob_choice: from Judea
  chosen_spanish: desde Judea
  alternatives_spanish:
  - de Judea
  - procedentes de Judea
  lexicon: BDAG
  rationale: «Desde» expresa con naturalidad el origen de la correspondencia. Mantiene el sentido de procedencia sin añadir una glosa territorial.
- source_word: οὔτε ... οὔτε
  english_pob_choice: no ... nor
  chosen_spanish: No ... ni
  alternatives_spanish:
  - Ni ... ni
  - No hemos recibido ... ni
  lexicon: BDAG
  rationale: 'La correlación negativa se conserva con una estructura idiomática en español: «No ... ni».'
- source_word: παραγενόμενός τις
  english_pob_choice: any ... who came
  chosen_spanish: ninguno ... ha venido
  alternatives_spanish:
  - alguien que vino
  - alguno que llegó
  lexicon: BDAG
  rationale: El participio denota llegada o aparición; en español, «ha venido» comunica la llegada sin añadir «aquí» o «a este lugar», que no está explícito en el griego.
- source_word: τῶν ἀδελφῶν
  english_pob_choice: of the brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - de los hermanos judíos
  - de los hermanos de la fe
  lexicon: BDAG
  rationale: Se conserva la forma literal «hermanos» porque el griego no especifica cristianos; el contexto permite una referencia amplia a correligionarios o compatriotas de Judea, y la traducción evita imponer una identificación sectaria.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: ha informado
  alternatives_spanish:
  - ha reportado
  - ha notificado
  lexicon: BDAG
  rationale: ἀπαγγέλλω expresa dar un reporte o informe. «Ha informado» refleja bien ese matiz en español.
- source_word: ἐλάλησέν τι
  english_pob_choice: spoken anything
  chosen_spanish: hablado algo
  alternatives_spanish:
  - dicho algo
  - pronunciado algo
  lexicon: BDAG
  rationale: Se conserva la distinción leve entre «informar» y «hablar» usando dos verbos diferentes en español.
- source_word: πονηρόν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - maligno
  - malvado
  - perjudicial
  lexicon: BDAG
  rationale: El término puede abarcar algo malo, dañino o de mala intención. «Malo» funciona de modo natural en español y permite en nota la alternativa de un sentido más fuerte como «malvado» o «perjudicial».
theological_decisions:
- issue: Referencia de τῶν ἀδελφῶν
  english_pob_reading: Rendered as 'the brothers' without specifying Christian believers.
  chosen_spanish_reading: «los hermanos» sin especificar creyentes cristianos.
  alternative_spanish_readings:
  - «los hermanos judíos»
  - «los hermanos de la fe»
  rationale: El contexto no identifica explícitamente a estos hombres como cristianos; la traducción conserva la ambigüedad del griego y evita una identificación doctrinal no declarada en el texto.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evita añadir una localización implícita como «aquí»; se conserva la estructura negativa del griego y se mantiene la referencia ambigua de «los hermanos» sin clarificarla más allá del texto.'
  spanish_consistency_notes:
  - Se usa «cartas» para γράμματα por el valor epistolar del contexto.
  - Se conserva «hermanos» como traducción de ἀδελφῶν sin neutralizar ni especificar cristianos.
  - «Ha informado» y «hablado» reproducen la ligera distinción entre ἀπήγγειλεν y ἐλάλησεν.
  - Se evitó «SEÑOR» o terminología no pertinente; el versículo no contiene vocabulario divino explícito.
