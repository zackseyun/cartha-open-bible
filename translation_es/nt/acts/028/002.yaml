translation:
  language: es
  text: Y los habitantes locales[a] nos mostraron una bondad extraordinaria[b], pues encendieron un fuego y nos recibieron a todos por la lluvia que se había desatado y por el frío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: βάρβαροι significa literalmente “bárbaros”, es decir, personas no griegas o que no hablaban griego; aquí se refiere a los habitantes de la isla sin implicar necesariamente salvajismo.
    reason: lexical_alternative
  - marker: b
    text: 'O: “no una bondad común”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάρβαροι
  english_pob_choice: the local people
  chosen_spanish: los habitantes locales
  alternatives_spanish:
  - los nativos
  - los isleños
  - los bárbaros
  lexicon: BDAG
  rationale: En este contexto βάρβαροι se refiere a quienes no hablaban griego, no necesariamente a personas incivilizadas. "Habitantes locales" comunica ese sentido etnolingüístico en español natural sin cargar el término con el matiz peyorativo que "bárbaros" tiene hoy.
- source_word: οὐ τὴν τυχοῦσαν φιλανθρωπίαν
  english_pob_choice: extraordinary kindness
  chosen_spanish: una bondad extraordinaria
  alternatives_spanish:
  - ninguna bondad ordinaria
  - una bondad poco común
  - no la bondad que resultara ordinaria
  lexicon: BDAG
  rationale: La expresión griega es idiomática y significa algo como 'no ordinaria' o 'más que común'. "Bondad extraordinaria" conserva la fuerza del giro y suena natural en español. "Bondad" refleja φιλανθρωπία como benevolencia o amabilidad humana.
- source_word: παρεῖχον
  english_pob_choice: showed
  chosen_spanish: mostraron
  alternatives_spanish:
  - ofrecieron
  - proporcionaron
  lexicon: BDAG
  rationale: Con φιλανθρωπίαν, παρέχω expresa la idea de extender o manifestar benevolencia. "Mostraron" es el equivalente natural en español con "bondad".
- source_word: ἅψαντες
  english_pob_choice: lit
  chosen_spanish: encendieron
  alternatives_spanish:
  - prendieron
  - habían encendido
  lexicon: BDAG
  rationale: El participio de ἅπτω con πυράν significa encender o prender fuego. "Encendieron" es claro y fiel en español; el valor participial queda integrado en la cláusula causal que sigue.
- source_word: πυρὰν
  english_pob_choice: a fire
  chosen_spanish: una fogata
  alternatives_spanish:
  - un fuego
  - una hoguera
  lexicon: BDAG
  rationale: πυρά puede referirse a un fuego grande, incluso una hoguera. "Fogata" comunica bien la escena de hospitalidad y calor en español, sin sobreespecificar excesivamente.
- source_word: προσελάβοντο
  english_pob_choice: welcomed
  chosen_spanish: recibieron
  alternatives_spanish:
  - acogieron
  - los recibieron con hospitalidad
  lexicon: BDAG
  rationale: Aquí προσλαμβάνομαι expresa recepción hospitalaria. "Recibieron" mantiene ese sentido de acogida sin añadir más de lo que el texto dice; "acogieron" sería posible, pero "recibieron" es más sobrio y directo.
- source_word: πάντας ἡμᾶς
  english_pob_choice: all of us
  chosen_spanish: a todos nosotros
  alternatives_spanish:
  - a todos
  - a todos nosotros
  lexicon: BDAG
  rationale: La frase enfatiza la inclusión total de los viajeros. "A todos nosotros" preserva esa amplitud de manera natural en español.
- source_word: διὰ τὸν ὑετὸν τὸν ἐφεστῶτα
  english_pob_choice: because of the rain that had set in
  chosen_spanish: por la lluvia que había caído
  alternatives_spanish:
  - por la lluvia que se había desatado
  - por la lluvia que había comenzado
  lexicon: BDAG
  rationale: ὑετός es lluvia, y ἐφεστῶτα señala algo presente o sobrevenido. "Que había caído" comunica una lluvia ya llegada y efectiva; la expresión es algo más breve que la inglesa, pero fiel al hecho de una lluvia persistente en el contexto.
- source_word: διὰ τὸ ψῦχος
  english_pob_choice: because of the cold
  chosen_spanish: por el frío
  alternatives_spanish:
  - a causa del frío
  - por el frío intenso
  lexicon: BDAG
  rationale: ψῦχος significa frío o frialdad atmosférica. "Por el frío" es la forma más natural y suficiente en español.
- source_word: οἵ τε
  english_pob_choice: And the
  chosen_spanish: Y los
  alternatives_spanish:
  - Ahora los
  - Entonces los
  lexicon: BDAG
  rationale: La partícula enlaza con la narración anterior y presenta el sujeto. "Y los" conserva esa conexión sin forzar una interpretación temporal adicional.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa presentan alta concordancia y no registran revisiones aplicadas; el borrador español sigue de cerca esa lectura sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se conservó el valor hospitalario de προσλαμβάνομαι como "recibieron" y no como un verbo más cargado de acomodación.
  - Se evitó "bárbaros" en el cuerpo del texto por su carga peyorativa moderna, pero se documentó en nota la tensión léxica del griego.
  - '"Bondad extraordinaria" mantiene la fuerza idiomática de οὐ τὴν τυχοῦσαν φιλανθρωπίαν sin volverla paraprástica.'
  - '"Por la lluvia que había caído" busca reflejar el trasfondo de una lluvia ya presente y persistente, junto con el frío.'
