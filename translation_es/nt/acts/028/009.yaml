translation:
  language: es
  text: Y después de que esto sucedió, los demás que estaban en la isla y tenían enfermedades[a] también venían y eran sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban enfermos». El griego literalmente dice «tenían enfermedades» o «tenían dolencias».
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου δὲ γενομένου
  english_pob_choice: after this happened
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - cuando esto sucedió
  - después de que esto ocurrió
  lexicon: BDAG
  rationale: La construcción genitiva absoluta con δέ marca transición temporal; en español, «después de esto» comunica con naturalidad la secuencia narrativa sin perder el valor de paso al siguiente episodio. Se omite un verbo explícito porque el contexto ya aporta el evento previo.
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los otros
  lexicon: BDAG
  rationale: «οἱ λοιποὶ» señala a los que quedan aparte del caso ya descrito; «los demás» es idiomático en español y conserva la idea de los restantes sin añadir matices no presentes en el griego.
- source_word: οἱ ἐν τῇ νήσῳ
  english_pob_choice: those on the island
  chosen_spanish: que estaban en la isla
  alternatives_spanish:
  - los que estaban en la isla
  - los de la isla
  lexicon: BDAG
  rationale: El griego identifica al grupo por su ubicación. «Que estaban en la isla» fluye con naturalidad en español y conserva el sentido locativo sin forzar una fórmula nominal pesada.
- source_word: ἔχοντες ἀσθενείας
  english_pob_choice: who had diseases
  chosen_spanish: y tenían enfermedades
  alternatives_spanish:
  - y padecían enfermedades
  - y estaban enfermos
  lexicon: BDAG
  rationale: Se conserva la concreción plural de ἀσθενείας como «enfermedades». «Padecían enfermedades» es posible, pero «tenían enfermedades» refleja de manera más directa el participio ἔχοντες y evita disolver el plural en una generalización como «estaban enfermos».
- source_word: προσήρχοντο
  english_pob_choice: came
  chosen_spanish: se acercaban
  alternatives_spanish:
  - venían
  - se presentaban
  lexicon: BDAG
  rationale: El imperfecto medio sugiere acción repetida o progresiva; «se acercaban» mantiene ese movimiento iterativo mejor que un perfecto puntual, y además recoge la idea básica de acercamiento del verbo sin añadir el destinatario explícito que el griego no expresa aquí.
- source_word: ἐθεραπεύοντο
  english_pob_choice: were healed
  chosen_spanish: eran sanados
  alternatives_spanish:
  - eran curados
  - recibían sanidad
  lexicon: BDAG
  rationale: El pasivo imperfecto indica que iban siendo objeto de sanidad; «eran sanados» preserva el pasivo y la continuidad aspectual. «Curados» sería posible, pero «sanados» encaja mejor con el campo semántico de θεραπεύω en un contexto narrativo de curación divina.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: El segundo καί enlaza esta escena con la anterior; «también» comunica la continuidad y el añadido de otros casos sanados. No se reproduce con un simple «y» porque el valor adverbial resulta relevante en español.
translation_notes:
  revision_awareness: La redacción sigue el audit trail en inglés, que entiende τούτου δὲ γενομένου como una transición temporal, οἱ λοιποί como «the rest», ἔχοντες ἀσθενείας como una expresión concreta de «having diseases», y ἐθεραπεύοντο como pasivo imperfecto («were healed»). No se aplicaron revisiones posteriores al texto base; el pasaje quedó acordado con alta concordancia.
  spanish_consistency_notes:
  - Se usa «enfermedades» para conservar el plural concreto de ἀσθενείας, en línea con la decisión inglesa de no generalizar a «were sick».
  - Se mantiene «sanados» para θεραπεύω, que en este contexto narrativo comunica curación recibida y conserva el pasivo.
  - «Los demás» y «se acercaban» reflejan el movimiento colectivo y repetido del imperfecto griego sin introducir destinatarios explícitos no presentes en el texto.
