translation:
  language: es
  text: Y en los alrededores de aquel lugar había propiedades[a] del hombre principal de la isla[b], llamado Publio, quien nos recibió y nos hospedó cortesmente durante tres días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terrenos» o «fincas» para χωρία, refiriéndose a propiedades de tierra en la cercanía.
    reason: lexical_alternative
  - marker: b
    text: O «el jefe de la isla». El griego τῷ πρώτῳ τῆς νήσου probablemente designa al hombre de mayor rango o prominencia en la isla.
    reason: alternative_reading
  - marker: c
    text: O «nos recibió y nos mostró hospitalidad amablemente durante tres días».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τοῖς περὶ τὸν τόπον ἐκεῖνον
  english_pob_choice: Now in the area around that place
  chosen_spanish: Ahora, en la zona alrededor de aquel lugar
  alternatives_spanish:
  - Y en los alrededores de aquel lugar
  - Ahora, en la región alrededor de aquel lugar
  lexicon: BDAG
  rationale: περὶ con τόπον expresa la zona o el entorno inmediato. «Ahora» refleja el matiz narrativo de δέ, y «aquel lugar» conserva la referencia espacial sin añadir precisión no presente en el griego.
- source_word: ὑπῆρχεν
  english_pob_choice: there were
  chosen_spanish: había
  alternatives_spanish:
  - existían
  - se encontraban
  lexicon: BDAG
  rationale: El verbo introduce existencia o presencia en la zona. En español, «había» es natural y mantiene el valor existencial sin forzar una construcción más técnica.
- source_word: χωρία
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - estancias
  - propiedades rurales
  - haciendas
  lexicon: BDAG
  rationale: χωρία puede referirse a terrenos o propiedades de tierra. «Tierras» conserva el plural y la amplitud semántica sin especificar indebidamente el tipo exacto de propiedad. La nota a mantiene la alternativa «estates»/«estates» como «propiedades» o «terrenos».
- source_word: τῷ πρώτῳ τῆς νήσου
  english_pob_choice: the chief man of the island
  chosen_spanish: el hombre principal de la isla
  alternatives_spanish:
  - el jefe de la isla
  - el primero de la isla
  - el hombre principal de la isla
  lexicon: BDAG
  rationale: πρῶτος aquí funciona como título de rango o prominencia, no como simple ordinal. «Hombre principal» comunica esa posición de autoridad o preeminencia sin añadir un oficio técnico que el texto no explicita.
- source_word: ὀνόματι Ποπλίῳ
  english_pob_choice: named Publius
  chosen_spanish: llamado Publio
  alternatives_spanish:
  - de nombre Publio
  - llamado Publio
  lexicon: BDAG
  rationale: La construcción ὀνόματι introduce el nombre propio. «Publio» es la transliteración habitual de Πόπλιος en español.
- source_word: ἀναδεξάμενος ἡμᾶς
  english_pob_choice: welcomed us
  chosen_spanish: nos recibió
  alternatives_spanish:
  - nos acogió
  - nos dio la bienvenida
  lexicon: BDAG
  rationale: El participio expresa acogida/hospedaje dentro de un contexto de hospitalidad. «Nos recibió» es fiel y natural en español; la siguiente cláusula explicita el hospedaje.
- source_word: φιλοφρόνως
  english_pob_choice: courteously
  chosen_spanish: cortesmente
  alternatives_spanish:
  - amablemente
  - bondadosamente
  - con gentileza
  lexicon: BDAG
  rationale: El adverbio describe una recepción amable, considerada y hospitalaria. «Cortesmente» conserva el tono digno y formal del relato.
- source_word: ἐξένισεν
  english_pob_choice: hosted us
  chosen_spanish: nos hospedó
  alternatives_spanish:
  - nos dio hospedaje
  - nos alojó
  - nos recibió como huéspedes
  lexicon: BDAG
  rationale: ξενίζω aquí significa tratar a alguien como huésped, dar alojamiento. «Nos hospedó» reproduce bien la idea de hospitalidad sin perder el matiz relacional.
theological_decisions:
- issue: Título τῷ πρώτῳ τῆς νήσου
  english_pob_reading: the chief man of the island / title of prominence or rank
  chosen_spanish_reading: el hombre principal de la isla
  alternative_spanish_readings:
  - el jefe de la isla
  - el primero de la isla
  rationale: 'No hay una carga doctrinal directa, pero sí una decisión de rango semántico: el griego puede denotar el principal o más alto en jerarquía local. «Hombre principal» evita sobreinterpretar una oficina específica y preserva la ambigüedad útil del original.'
  doctrine_reference: Hechos 28:7; BDAG sobre πρῶτος como designación de rango
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y toma en cuenta la tradición auditada de la POB inglesa. Se conserva la decisión de no convertir τῷ πρώτῳ τῆς νήσου en un título eclesiástico o administrativo más definido de lo que permite el griego. También se mantiene la distinción entre la acogida inicial (ἀναδεξάμενος) y el hospedaje efectivo (ἐξένισεν).
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - «Mesías/Cristo» no aparece aquí.
  - Se prefirió «tierras» para χωρία, en paralelo con la opción inglesa «lands», manteniendo la amplitud semántica del término.
  - «Hombre principal» se eligió como equivalente neutral y formal de πρῶτος, sin importar un título moderno que el texto no especifica.
  - La división de la hospitalidad en «nos recibió» y «nos hospedó» preserva dos verbos distintos del griego y evita fusionarlos en una sola idea.
