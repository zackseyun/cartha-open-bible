revisions:
- from: Ahora, en la zona alrededor de aquel lugar había tierras[a] del hombre principal de la isla[b], llamado Publio, quien nos recibió y nos hospedó cortesmente durante tres días[c].
  to: Y en los alrededores de aquel lugar había propiedades[a] del hombre principal de la isla[b], llamado Publio, quien nos recibió y nos hospedó cortesmente durante tres días[c].
  rationale: Se ajustó la apertura para un español más natural y narrativo («Y en los alrededores...»), se cambió «tierras» por «propiedades» para reflejar mejor χωρία como posesiones territoriales, y se depuró la nota a eliminando el anglicismo «estates». No se requieren cambios doctrinales ni de estructura mayores.
