  text: Ἐν δὲ τοῖς περὶ τὸν τόπον ἐκεῖνον ὑπῆρχεν χωρία τῷ πρώτῳ τῆς νήσου ὀνόματι Ποπλίῳ, ὃς ἀναδεξάμενος ἡμᾶς ⸂τρεῖς ἡμέρας⸃ φιλοφρόνως ἐξένισεν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/007.yaml
  text: Now in the area around that place there were lands belonging to the chief man of the island[a], named Publius[c][b], who welcomed us and hosted us courteously for three days.
  footnotes:
  - marker: a
    text: Or “estates” for “lands” (χωρία), referring to landed property in the vicinity.
    reason: lexical_alternative
  - marker: b
    text: Or “the chief man of the island.” The Greek title τῷ πρώτῳ τῆς νήσου likely denotes the island’s leading or highest-ranking man.
    reason: alternative_reading
  - marker: c
    text: Or “received us and showed us hospitality kindly for three days.”
    reason: lexical_alternative
