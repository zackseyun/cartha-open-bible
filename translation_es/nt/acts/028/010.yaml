translation:
  language: es
  text: Ellos también nos honraron[a] mucho, y cuando zarpábamos[b], pusieron a bordo lo que necesitábamos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede decirse: «nos mostraron gran honor» o «nos trataron con mucho honor». El griego repite la idea de honor con un sustantivo y un verbo relacionados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando nos hacíamos a la mar». El participio tiene un sentido náutico: iniciar la travesía por barco.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «nos suministraron lo que necesitábamos». El griego dice más literalmente que pusieron a bordo «las cosas para las necesidades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλαῖς τιμαῖς
  english_pob_choice: with many honors / honored us greatly
  chosen_spanish: nos honraron mucho
  alternatives_spanish:
  - nos colmaron de muchos honores
  - nos honraron con muchos honores
  lexicon: BDAG
  rationale: La frase dativa refuerza la idea de honor o estima otorgado en abundancia. En español, "nos honraron mucho" conserva la repetición semántica entre τιμαῖς y ἐτίμησαν sin caer en un giro demasiado literal o redundante.
- source_word: ἐτίμησαν
  english_pob_choice: honored
  chosen_spanish: honraron
  alternatives_spanish:
  - mostraron honor a
  - trataron con honor
  lexicon: BDAG
  rationale: '"Honraron" es el equivalente directo y natural de τιμάω, y mantiene el vínculo léxico con τιμαῖς en la misma oración.'
- source_word: ἀναγομένοις
  english_pob_choice: when we were setting sail
  chosen_spanish: cuando zarpábamos
  alternatives_spanish:
  - cuando nos hacíamos a la mar
  - cuando estábamos zarpando
  lexicon: BDAG
  rationale: En contexto náutico, ἀνάγω se refiere a hacerse a la mar o zarpar. "Zarpábamos" comunica la acción marítima de manera natural en español y preserva el sentido de inicio del viaje por barco.
- source_word: ἐπέθεντο
  english_pob_choice: they put on board
  chosen_spanish: nos cargaron con
  alternatives_spanish:
  - pusieron a bordo
  - nos colocaron a bordo
  lexicon: BDAG
  rationale: El verbo expresa la acción de poner o colocar provisiones para el viaje. "Nos cargaron con" permite expresar de forma idiomática que nos proveyeron y colocaron lo necesario para el trayecto, sin añadir un objeto explícito que el griego deja implícito.
- source_word: τὰ πρὸς τὰς χρείας
  english_pob_choice: what we needed
  chosen_spanish: lo necesario
  alternatives_spanish:
  - las cosas necesarias
  - lo que necesitábamos
  - los suministros necesarios
  lexicon: BDAG
  rationale: La construcción apunta a las cosas relativas a las necesidades, es decir, provisiones. "Lo necesario" mantiene el sentido concreto sin forzar una expansión explicativa que vuelva pesada la línea en español.
translation_notes:
  revision_awareness: 'El inglés POB pasó de una forma demasiado literal («honored us with many honors» / «the things needed for our needs») a una redacción más natural («honored us greatly» / «what we needed»). La propuesta española sigue esa revisión: conserva la intensificación del honor, evita la redundancia y mantiene el matiz náutico de ἀναγομένοις.'
  spanish_consistency_notes:
  - Se mantuvo "honraron" para reflejar la repetición léxica de τιμή/τιμάω.
  - Se tradujo ἀναγομένοις con un verbo náutico natural en español, sin generalizar a "partir" o "salir".
  - '"Lo necesario" conserva la concreción de provisiones sin añadir una perífrasis pesada.'
  - No se introdujo terminología eclesiástica ni doctrinal ajena al versículo.
