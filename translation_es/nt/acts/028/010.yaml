base_translation:
  language: en
  yaml_path: translation/nt/acts/028/010.yaml
  text: They also honored us greatly[a], and when we were setting sail[c][b], they put on board what we needed.
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''They honored us greatly.'' The Greek more literally repeats the honor language: ''with many honors they honored us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'when we were putting out to sea.' The participle is a nautical term for beginning a voyage by ship.
    reason: lexical_alternative
  - marker: c
    text: Or 'they supplied us with what we needed.' The Greek more literally says they 'put on board the things for the needs.'
    reason: lexical_alternative
