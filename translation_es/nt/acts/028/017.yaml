translation:
  language: es
  text: 'Sucedió que, después de tres días, reunió a los principales de los judíos[a]. Y cuando se reunieron, les dijo: «Yo, hermanos[b], aunque no había hecho nada contra el pueblo ni contra las costumbres de nuestros padres[c], fui entregado como prisionero[d] de Jerusalén a manos de los Romanos[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los líderes de los judíos» o «los más prominentes entre los judíos».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el vocativo griego ἀδελφοί. Aquí Pablo se dirige a los principales judíos que había convocado.
    reason: cultural_note
  - marker: c
    text: O «las costumbres ancestrales».
    reason: lexical_alternative
  - marker: d
    text: O «como un prisionero». El griego presenta a Pablo con el matiz de condición legal o custodial.
    reason: lexical_alternative
  - marker: e
    text: O «fui entregado ... a los Romanos». El griego dice más literalmente «fui entregado en manos de los Romanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Sucedió que
  alternatives_spanish:
  - Y sucedió que
  - Ahora bien, sucedió que
  lexicon: BDAG
  rationale: La fórmula introduce un giro narrativo al estilo de Lucas. «Sucedió que» conserva el valor de transición sin sonar demasiado calcado ni excesivamente moderno.
- source_word: μετὰ ἡμέρας τρεῖς
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - al cabo de tres días
  - tres días después
  lexicon: BDAG
  rationale: Expresión temporal directa y natural en español, equivalente al griego sin cambiar el sentido temporal.
- source_word: συγκαλέσασθαι αὐτὸν
  english_pob_choice: he called together
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - llamó a reunir
  lexicon: BDAG
  rationale: El verbo griego destaca la reunión convocada de varios hombres. «Reunió» funciona bien en español y comunica la acción de convocar a un grupo.
- source_word: τοὺς ὄντας τῶν Ἰουδαίων πρώτους
  english_pob_choice: the leading men of the Jews
  chosen_spanish: los principales de los judíos
  alternatives_spanish:
  - los líderes de los judíos
  - los más prominentes entre los judíos
  lexicon: BDAG
  rationale: πρῶτοι aquí expresa prominencia social, no solo orden. «Principales» preserva esa idea de notables/figuras destacadas sin imponer un tono eclesiástico.
- source_word: Ἐγώ, ἄνδρες ἀδελφοί
  english_pob_choice: I, brothers
  chosen_spanish: Yo, hermanos
  alternatives_spanish:
  - Yo, varones hermanos
  - Hermanos
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre «Yo» y el vocativo fraternal. En español, «hermanos» es la forma natural y fiel para el vocativo masculino plural de la escena.
- source_word: οὐδὲν ἐναντίον ποιήσας
  english_pob_choice: though I had done nothing against
  chosen_spanish: no habiendo hecho nada contra
  alternatives_spanish:
  - habiendo hecho nada contrario a
  - sin haber hecho nada contra
  lexicon: BDAG
  rationale: La construcción participial es concesiva en contexto. «No habiendo hecho nada contra» mantiene la negación y la idea de oposición/contrariedad sin sobreexplicar.
- source_word: τῷ λαῷ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - su pueblo
  lexicon: BDAG
  rationale: «Pueblo» conserva el peso colectivo y étnico del griego λαός en este contexto judío.
- source_word: τοῖς ἔθεσι τοῖς πατρῴοις
  english_pob_choice: the customs of our fathers
  chosen_spanish: las costumbres de nuestros padres
  alternatives_spanish:
  - las costumbres ancestrales
  - las tradiciones de nuestros padres
  lexicon: BDAG
  rationale: πατρῷος indica lo heredado de los padres/antepasados. «Costumbres de nuestros padres» sigue de cerca el sentido del texto y mantiene la solidaridad implícita.
- source_word: δέσμιος
  english_pob_choice: as a prisoner
  chosen_spanish: como prisionero
  alternatives_spanish:
  - prisionero
  - encadenado
  lexicon: BDAG
  rationale: La expresión funciona predicativamente para describir su condición al ser entregado. «Como prisionero» refleja ese estatus de custodia sin añadir detalles no presentes.
- source_word: ἐξ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  - salido de Jerusalén
  lexicon: BDAG
  rationale: La preposición permite un matiz de origen o procedencia. «Desde Jerusalén» suena natural en español y conserva el punto de partida.
- source_word: παρεδόθην
  english_pob_choice: was delivered
  chosen_spanish: fui entregado
  alternatives_spanish:
  - fui entregado en manos de
  - me entregaron
  lexicon: BDAG
  rationale: El pasivo conserva el énfasis en la acción sufrida por Pablo. «Fui entregado» es directo y respeta el sentido legal/custodial del verbo.
- source_word: εἰς τὰς χεῖρας τῶν Ῥωμαίων
  english_pob_choice: into the hands of the Romans
  chosen_spanish: en manos de los romanos
  alternatives_spanish:
  - a manos de los romanos
  - en poder de los romanos
  lexicon: BDAG
  rationale: Se mantiene la imagen idiomática de entrega a custodia/autoridad. «En manos de» reproduce bien la metáfora concreta del griego.
theological_decisions:
- issue: ἀδελφοί como vocativo en un discurso dirigido a líderes judíos
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - varones hermanos
  rationale: El contexto indica que Pablo se dirige a los principales varones judíos que había convocado. «Hermanos» conserva la fraternidad retórica y evita añadir un componente no sustentado por el pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: οὐδὲν ἐναντίον ποιήσας como participio concesivo
  english_pob_reading: though I had done nothing against
  chosen_spanish_reading: no habiendo hecho nada contra
  alternative_spanish_readings:
  - aunque no había hecho nada contra
  - sin haber hecho nada contra
  rationale: La frase subraya la injusticia de su entrega pese a su inocencia. La lectura concesiva mantiene esa tensión sin convertirla en comentario interpretativo adicional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail en inglés, con ajustes mínimos para una sintaxis española natural. Se mantuvieron la transición narrativa de Lucas, el valor concesivo del participio y la imagen idiomática de «en manos de» sin suavizar la tensión de la entrega injusta.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Judíos» conserva el referente étnico-histórico de Ἰουδαίων en este contexto.
  - «Principales» traduce πρῶτοι con valor de prominencia social, no de simple orden temporal.
  - «Costumbres de nuestros padres» mantiene la referencia a tradiciones heredadas sin reemplazarla por terminología eclesiástica.
  - La forma «en manos de» conserva la metáfora legal de entrega/custodia del original.
