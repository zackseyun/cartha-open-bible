revisions:
- from: 'Pero Pablo les dijo: «Después de golpearnos públicamente, sin juicio, aunque somos ciudadanos romanos, nos echaron en la cárcel; y ahora, ¿nos despiden en secreto? ¡De ningún modo! Más bien, que vengan ellos mismos y nos saquen[a][b].»'
  to: 'Pero Pablo les dijo: «Después de golpearnos públicamente, sin juicio[a], aunque somos ciudadanos romanos[b], nos echaron en la cárcel; y ahora, ¿nos echan en secreto? ¡De ningún modo! Más bien, que vengan ellos mismos y nos saquen[c].»'
  rationale: 'Se reemplaza ''nos despiden'' por ''nos echan'' para reflejar mejor ἐκβάλλουσιν en contexto de prisión y evitar un sentido laboral ajeno al pasaje. Se reubican las notas en los lugares pertinentes: la nota legal de ἀκατακρίτους en ''sin juicio'', la nota cultural en ''ciudadanos romanos'', y se añade la alternativa léxica del verbo final ἐξαγαγέτωσαν, conforme a la auditoría inglesa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: acción previa (''Después de golpearnos''), publicidad del castigo, ausencia de debido proceso, estatus de ciudadanía romana, encarcelamiento, rechazo enfático y exigencia de que las autoridades vengan personalmente. Sin embargo, ''¿nos despiden en secreto?'' debilita y desubica ἐκβάλλουσιν en contexto carcelario; suena laboral o administrativo más que expulsivo/carcelario. Además, falta en el texto un anclaje para la nota cultural sobre ''ciudadanos romanos'', y se omitió la alternativa auditada para ἐξαγαγέτωσαν (''bring us out/escort us out'').'
  spanish_quality_summary: El español es mayormente natural y digno. 'Sin juicio' y 'aunque somos ciudadanos romanos' funcionan bien. La principal dificultad de legibilidad/precisión es 'nos despiden', que en español contemporáneo se entiende primero como 'dismiss/fire' y no como sacar de prisión. 'Nos echan' o 'nos sacan' comunica mejor la queja. También conviene alinear mejor las notas con sus anclajes reales.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ciudadanos romanos' sigue correctamente la racionalidad auditada para Ῥωμαίους. 'Sin juicio' preserva la decisión para ἀκατακρίτους. 'Nos saquen' para ἐξαγαγέτωσαν es aceptable, pero debe conservarse la nota de alternativa léxica correspondiente; la nota cultural debe anclarse en 'ciudadanos romanos'.
  issues:
  - severity: high
    issue: '''¿nos despiden en secreto?'' no representa bien ἐκβάλλουσιν en este contexto'
    rationale: En español, 'despedir' se asocia fuertemente con empleo o despedida formal. Aquí Pablo protesta por ser sacados/echados de la cárcel de manera encubierta. '¿nos echan en secreto?' o '¿nos sacan en secreto?' refleja mejor el matiz de expulsión/liberación encubierta.
  - severity: medium
    issue: La nota cultural sobre 'siendo hombres romanos' carece de anclaje en el texto
    rationale: Existe la nota b sobre ciudadanía romana, pero en el texto solo aparecen [a][b] al final sobre 'nos saquen'. Según las reglas, el marcador debe aparecer en la frase relevante. Debe anclarse en 'ciudadanos romanos[b]'.
  - severity: medium
    issue: Se omitió la nota alternativa para ἐξαγαγέτωσαν documentada en la auditoría inglesa
    rationale: El inglés conserva 'bring us out' / 'escort us out' como alternativa léxica. Dado que el español usa 'nos saquen', conviene mantener una nota equivalente sobre ese verbo final.
  revised_spanish_text: 'Pero Pablo les dijo: «Después de golpearnos públicamente, sin juicio[a], aunque somos ciudadanos romanos[b], nos echaron en la cárcel; y ahora, ¿nos echan en secreto? ¡De ningún modo! Más bien, que vengan ellos mismos y nos saquen[c].»'
  revised_footnotes:
