translation:
  language: es
  text: 'Pero Pablo les dijo: «Después de golpearnos públicamente, sin juicio[a], aunque somos ciudadanos romanos[b], nos echaron en la cárcel; y ahora, ¿nos echan en secreto? ¡De ningún modo! Más bien, que vengan ellos mismos y nos saquen[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin haber sido condenados» o «sin condena».
    reason: lexical_alternative
  - marker: b
    text: Lit. «siendo hombres romanos»; aquí el sentido es que poseían ciudadanía romana y sus protecciones legales.
    reason: cultural_note
  - marker: c
    text: O «nos hagan salir» o «nos escolten afuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Verbo narrativo estándar en pasado; «les dijo» comunica con naturalidad el habla dirigida a un grupo y conserva el tono sobrio del relato.
- source_word: Δείραντες
  english_pob_choice: After beating
  chosen_spanish: Después de golpearnos
  alternatives_spanish:
  - Después de azotarnos
  - Habiéndonos golpeado
  lexicon: BDAG
  rationale: El aoristo participial expresa acción previa a la principal. «Golpearnos» mantiene el sentido amplio de maltrato físico sin especificar más de lo que el griego exige; «azotarnos» sería más específico de lo necesario.
- source_word: δημοσίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  - ante todos
  lexicon: BDAG
  rationale: Adverbio directo y natural en español para la idea de una acción realizada ante la vista de otros.
- source_word: ἀκατακρίτους
  english_pob_choice: without trial
  chosen_spanish: sin juicio
  alternatives_spanish:
  - sin haber sido condenados
  - sin condena
  lexicon: BDAG
  rationale: El término niega una condena judicial; en este contexto legal, «sin juicio» comunica con claridad la falta de debido proceso. Se preserva la tensión jurídica sin explicitar más de lo que el texto dice.
- source_word: ἀνθρώπους Ῥωμαίους ὑπάρχοντας
  english_pob_choice: though we are Roman citizens
  chosen_spanish: aunque somos ciudadanos romanos
  alternatives_spanish:
  - siendo romanos
  - aunque somos romanos
  - siendo ciudadanos romanos
  lexicon: BDAG
  rationale: El griego tiene fuerza concesiva y apunta al estatus cívico con protección legal; «ciudadanos romanos» hace explícita esa fuerza en español, siguiendo la decisión auditada de la POB en inglés.
- source_word: ἔβαλαν εἰς φυλακήν
  english_pob_choice: they threw us into prison
  chosen_spanish: nos echaron en la cárcel
  alternatives_spanish:
  - nos arrojaron a la cárcel
  - nos pusieron en la cárcel
  lexicon: BDAG
  rationale: βάλλω aquí es enérgico. «Echaron» conserva la violencia del acto con un español natural; «arrojaron» es posible, pero algo más fuerte de lo necesario.
- source_word: λάθρᾳ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: BDAG
  rationale: Adverbio de ocultamiento; «en secreto» es idiomático y claro en español contemporáneo.
- source_word: ἐκβάλλουσιν
  english_pob_choice: are they sending us out
  chosen_spanish: nos despiden
  alternatives_spanish:
  - nos echan
  - nos expulsan
  lexicon: BDAG
  rationale: En el contexto de liberación de prisión, el verbo conserva la idea de sacar/despedir con tono despectivo. «Nos despiden» funciona bien en español como salida pública o formal, aunque el matiz puede rozar expulsión; por eso se apoya con la pregunta retórica.
- source_word: οὐ γάρ
  english_pob_choice: No indeed!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡No, de ninguna manera!
  - ¡Claro que no!
  lexicon: BDAG
  rationale: Expresión enfática de rechazo. «De ningún modo» transmite con fuerza la negativa tajante de Pablo sin sonar antinatural.
- source_word: ἐλθόντες αὐτοὶ
  english_pob_choice: let them come themselves
  chosen_spanish: que vengan ellos mismos
  alternatives_spanish:
  - que vengan en persona
  - que vengan personalmente
  lexicon: BDAG
  rationale: El participio con pronombre enfático subraya la presencia personal de los magistrados. «Ellos mismos» preserva ese énfasis.
- source_word: ἡμᾶς ἐξαγαγέτωσαν
  english_pob_choice: and lead us out
  chosen_spanish: y nos saquen
  alternatives_spanish:
  - y nos conduzcan afuera
  - y nos hagan salir
  lexicon: BDAG
  rationale: ἐξάγω significa literalmente «sacar/llevar afuera». «Nos saquen» es breve, natural y mantiene la acción de hacerlos salir públicamente; la ambigüedad de «sacar» se conserva sin suavizar el mandato.
theological_decisions:
- issue: Estatus romano y fuerza legal de la apelación de Pablo
  english_pob_reading: Render Ῥωμαίους as 'Roman citizens' rather than merely 'Romans'
  chosen_spanish_reading: «ciudadanos romanos»
  alternative_spanish_readings:
  - romanos
  - hombres romanos
  rationale: La escena trata de una violación de protecciones legales romanas. «Ciudadanos romanos» explicita el peso cívico-jurídico del reclamo sin añadir contenido ajeno al texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido jurídico de ἀκατακρίτους
  english_pob_reading: Translate as 'without trial' in the main text
  chosen_spanish_reading: «sin juicio»
  alternative_spanish_readings:
  - sin haber sido condenados
  - sin condena
  rationale: La palabra niega que hubiera condena judicial. En español, «sin juicio» comunica bien la falta de debido proceso y conserva el agravio legal que Pablo denuncia.
  doctrine_reference: Translation philosophy §6
- issue: Mandato final y matiz de ἐξαγαγέτωσαν
  english_pob_reading: '''lead us out'' / ''bring us out'' / ''escort us out'''
  chosen_spanish_reading: «nos saquen»
  alternative_spanish_readings:
  - nos conduzcan afuera
  - nos escolten afuera
  rationale: El griego pide una salida realizada por los mismos magistrados. «Nos saquen» mantiene la literalidad funcional sin introducir formalidad extra ni resolver el matiz en favor de una sola variante interpretativa.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB en inglés: se mantuvo la fuerza concesiva de ἀνθρώπους Ῥωμαίους ὑπάρχοντας como «aunque somos ciudadanos romanos», se preservó la secuencia de agravio legal (golpeados públicamente, sin juicio, encarcelados) y se conservó el cierre imperativo con una salida exigida por Pablo. Se optó por equivalentes españoles naturales que reflejan la lectura auditada sin diluir el tono jurídico ni la brusquedad del reproche.'
  spanish_consistency_notes:
  - Se mantiene «ciudadanos romanos» para el estatus legal de Ῥωμαῖοι, en continuidad con la decisión auditada de la POB en inglés.
  - «Sin juicio» se usa como equivalente funcional de ἀκατακρίτους, con nota alternativa para no perder el matiz de «sin condena».
  - «Nos saquen» conserva la idea de ἐξαγαγέτωσαν como sacar/llevar afuera, evitando suavizarlo en una frase más interpretativa.
  - Se usa puntuación y comillas españolas para un registro bíblico contemporáneo y publicable.
  - No se introduce terminología eclesiástica tradicional donde el griego y la auditoría legal piden precisión cívica y procesal.
