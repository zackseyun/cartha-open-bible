  text: ὁ δὲ Παῦλος ἔφη πρὸς αὐτούς· Δείραντες ἡμᾶς δημοσίᾳ ἀκατακρίτους, ἀνθρώπους Ῥωμαίους ὑπάρχοντας, ἔβαλαν εἰς φυλακήν· καὶ νῦν λάθρᾳ ἡμᾶς ἐκβάλλουσιν; οὐ γάρ, ἀλλὰ ἐλθόντες αὐτοὶ ⸀ἡμᾶς ἐξαγαγέτωσαν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/037.yaml
  text: But Paul said to them[a], “After beating us publicly without trial, though we are Roman citizens, they threw us into prison; and now are they sending us out secretly? No indeed! Rather[c][b], let them come themselves and lead us out.”
  footnotes:
  - marker: a
    text: Or “without being condemned” or “uncondemned.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “men being Romans”; the sense here is that they possessed Roman citizenship and its legal protections.
    reason: cultural_note
  - marker: c
    text: Or “bring us out” or “escort us out.”
    reason: lexical_alternative
