  revision_rationale: La revisión conserva todas las decisiones léxicas principales del original y del English POB, pero mejora la naturalidad y la linealidad del español. «Al pasar por las ciudades» expresa bien el imperfecto narrativo sin pesadez; «les entregaban para que los observaran los decretos decididos...» evita la relativa «los cuales» y reproduce mejor la secuencia griega de entregar para observancia las resoluciones ya decididas. No se requiere adjudicación adicional.
