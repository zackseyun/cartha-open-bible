review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: movimiento continuo por varias ciudades, transmisión de resoluciones autoritativas, propósito de observancia, y procedencia de los apóstoles y ancianos en Jerusalén. Sin embargo, la construcción española «les entregaban los decretos ... para que los observaran, los cuales...» resulta algo pesada y menos fiel al flujo del original que una formulación más directa. También conviene evitar la relativa explicativa «los cuales» cuando el griego simplemente encadena modificadores.'
  spanish_quality_summary: 'El español es generalmente claro y natural, pero hay una mejora de estilo importante: «mientras pasaban» puede simplificarse a «al pasar» o «cuando iban pasando», y «los cuales habían sido decididos» suena burocrático. «Para que los cumplieran» sería posible, pero «para que los observaran» preserva mejor la conexión con φυλάσσειν. La frase gana claridad con una redacción más lineal y menos recargada.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Decretos» para δόγματα concuerda con el rastro de auditoría; «apóstoles» y «ancianos» son adecuados; no aparecen términos del glosario mayor como Yahvé, Mesías, esclavo, etc. La nota alternativa con «decisiones» está bien justificada.
  issues:
  - severity: medium
    issue: Construcción sintáctica recargada en «para que los observaran, los cuales habían sido decididos»
    rationale: Aunque comprensible, esta secuencia no refleja con la máxima naturalidad la estructura del original y produce una frase pesada en español. Reordenar a «los decretos decididos...» mejora fidelidad y legibilidad.
  - severity: low
    issue: «Y mientras pasaban por las ciudades» puede sonar ligeramente redundante o narrativamente flojo
    rationale: El griego ὡς δὲ διεπορεύοντο pide una transición temporal sencilla. «Al pasar por las ciudades» o «mientras iban pasando por las ciudades» suena más natural en español bíblico moderno.
  revised_spanish_text: Al pasar por las ciudades, les entregaban para que los observaran los decretos[a] decididos por los apóstoles y los ancianos en Jerusalén.
