revisions:
- from: Y mientras pasaban por las ciudades, les entregaban los decretos[a] para que los observaran, los cuales habían sido decididos por los apóstoles y los ancianos que estaban en Jerusalén.
  to: Al pasar por las ciudades, les entregaban para que los observaran los decretos[a] decididos por los apóstoles y los ancianos en Jerusalén.
  rationale: La revisión conserva todas las decisiones léxicas principales del original y del English POB, pero mejora la naturalidad y la linealidad del español. «Al pasar por las ciudades» expresa bien el imperfecto narrativo sin pesadez; «les entregaban para que los observaran los decretos decididos...» evita la relativa «los cuales» y reproduce mejor la secuencia griega de entregar para observancia las resoluciones ya decididas. No se requiere adjudicación adicional.
