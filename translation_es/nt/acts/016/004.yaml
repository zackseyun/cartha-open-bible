translation:
  language: es
  text: Al pasar por las ciudades, les entregaban para que los observaran los decretos[a] decididos por los apóstoles y los ancianos en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las decisiones»; griego δόγματα, referido a las resoluciones emitidas por el concilio de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύοντο
  english_pob_choice: went through
  chosen_spanish: pasaban por
  alternatives_spanish:
  - iban por
  - recorrían
  lexicon: BDAG
  rationale: El imperfecto indica acción շարունակada o en curso. «Pasaban por» conserva ese movimiento a través de varias ciudades y suena natural en español sin añadir detalles del trayecto.
- source_word: παρεδίδοσαν
  english_pob_choice: delivered
  chosen_spanish: les entregaban
  alternatives_spanish:
  - les transmitían
  - les daban
  lexicon: BDAG
  rationale: Aquí el verbo expresa transmisión formal de una resolución autorizada. «Les entregaban» conserva la idea de traspasar algo confiado, con un tono administrativo adecuado al contexto.
- source_word: φυλάσσειν
  english_pob_choice: for observance
  chosen_spanish: para que los observaran
  alternatives_spanish:
  - para guardarlos
  - para obedecerlos
  lexicon: BDAG
  rationale: El sentido es observar o cumplir cuidadosamente los decretos, no simplemente guardarlos. «Para que los observaran» comunica adherencia continua y evita un calco rígido.
- source_word: δόγματα
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - decisiones
  - ordenanzas
  lexicon: BDAG
  rationale: En este pasaje se refiere a resoluciones formales del concilio de Jerusalén. «Decretos» preserva el carácter oficial y autoritativo sin cargarlo con un sentido técnico posterior de «dogma».
- source_word: κεκριμένα
  english_pob_choice: had been decided
  chosen_spanish: habían sido decididos
  alternatives_spanish:
  - habían sido determinados
  - habían sido decretados
  lexicon: BDAG
  rationale: El participio perfecto pasivo señala decisiones ya tomadas con validez continuada. «Habían sido decididos» es claro y refleja bien el contexto conciliar.
- source_word: ἀποστόλων καὶ πρεσβυτέρων
  english_pob_choice: the apostles and elders
  chosen_spanish: los apóstoles y los ancianos
  alternatives_spanish:
  - los apóstoles y los presbíteros
  lexicon: BDAG
  rationale: «Ancianos» es la forma natural y transparente en español para πρεσβύτεροι en este contexto de liderazgo de Jerusalén. «Presbíteros» sería más eclesiástico y menos inmediato para el lector general.
- source_word: τῶν ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: que estaban en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - los de Jerusalén
  lexicon: BDAG
  rationale: La frase modifica a los apóstoles y ancianos y los ubica localmente. «Que estaban en Jerusalén» conserva esa especificación relacional en español con naturalidad.
theological_decisions:
- issue: Naturaleza y autoridad de los δόγματα del concilio de Jerusalén
  english_pob_reading: Rendered δόγματα as 'decrees' to reflect formal, communal decisions without implying later ecclesiastical dogma in a technical sense.
  chosen_spanish_reading: Se vierte δόγματα como «decretos» para reflejar resoluciones formales y comunitarias sin introducir el matiz técnico posterior de «dogmas».
  alternative_spanish_readings:
  - decisiones
  - ordenanzas
  rationale: El contexto de Hechos 15-16 muestra que se trata de resoluciones del concilio de Jerusalén transmitidas con autoridad. «Decretos» mantiene ese peso oficial y evita anacronismos doctrinales.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Relación entre transmitir y observar
  english_pob_reading: delivered to them for observance
  chosen_spanish_reading: «Les entregaban» + «para que los observaran» mantiene la doble idea de transmisión y cumplimiento.
  alternative_spanish_readings:
  - les daban para que los cumplieran
  - les transmitían para que los guardaran
  rationale: El griego separa la entrega de la finalidad. La formulación española conserva ambas piezas sin perder la obligación práctica implicada en φυλάσσειν.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no introdujo cambios; por tanto, este borrador mantiene la lectura estable del texto fuente y del seguimiento inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en este versículo.
  - «Ancianos» se usa para πρεσβύτεροι con valor de liderazgo comunitario, no como título litúrgico técnico.
  - La puntuación y el orden verbal buscan reflejar la progresión narrativa del imperfecto griego sin forzar un calco.
