translation:
  language: es
  text: 'Y después de sacarlos fuera, les dijo: «Señores[a], ¿qué debo hacer[b] para ser salvo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí κύριοι es un trato respetuoso; no se refiere al título divino «Señor».
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿qué me es necesario hacer para ser salvo?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προαγαγὼν
  english_pob_choice: after bringing
  chosen_spanish: Y después de sacarlos afuera
  alternatives_spanish:
  - habiéndolos sacado
  - después de llevarlos afuera
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa a la del verbo principal. En español, «después de sacarlos afuera» mantiene esa secuencia natural sin perder el valor aspectual.
- source_word: αὐτοὺς ἔξω
  english_pob_choice: them outside
  chosen_spanish: sacarlos afuera
  alternatives_spanish:
  - sacarlos fuera
  - ponerlos afuera
  lexicon: BDAG
  rationale: La combinación de objeto + adverbio expresa movimiento hacia el exterior. «Afuera» es claro y fluido en español, y conserva el sentido locativo.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - les estaba diciendo
  lexicon: BDAG
  rationale: Aunque el griego usa un imperfecto de introducción de discurso, en español la forma simple «les dijo» es la más natural y fiel como marcador narrativo.
- source_word: Κύριοι
  english_pob_choice: Sirs
  chosen_spanish: Señores
  alternatives_spanish:
  - Caballeros
  - Señores míos
  lexicon: BDAG
  rationale: Aquí κύριοι funciona como vocativo plural de respeto, no como título divino. «Señores» reproduce el trato cortés en español moderno sin cargar la frase con la teología de «Señor».
- source_word: τί με δεῖ ποιεῖν
  english_pob_choice: what must I do
  chosen_spanish: ¿qué me es necesario hacer?
  alternatives_spanish:
  - ¿qué debo hacer?
  - ¿qué tengo que hacer?
  lexicon: BDAG
  rationale: δεῖ expresa necesidad impersonal. «Me es necesario hacer» conserva con mayor transparencia la fuerza del griego que una simple obligación modal, y mantiene la tensión semántica documentada en la nota inglesa.
- source_word: ἵνα σωθῶ
  english_pob_choice: so that I may be saved
  chosen_spanish: para ser salvo
  alternatives_spanish:
  - a fin de ser salvo
  - para que yo sea salvo
  lexicon: BDAG
  rationale: La cláusula de finalidad con ἵνα expresa propósito. En español, «para ser salvo» es breve y natural; conserva el pasivo y el sentido de salvación sin resolver en exceso la amplitud semántica de σώζω.
theological_decisions:
- issue: Sentido de σωθῶ en la pregunta del carcelero
  english_pob_reading: be saved
  chosen_spanish_reading: ser salvo
  alternative_spanish_readings:
  - ser rescatado
  - ser librado
  rationale: En el contexto inmediato de Hechos 16 y la respuesta del evangelio en el v. 31, «ser salvo» preserva el sentido espiritual principal, mientras deja abierta la gama de rescate/libración propia de σώζω.
  doctrine_reference: Mantener la tensión semántica de σώζω sin reducirla a mera liberación física ni forzar una sistematización doctrinal
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente anclado en el texto español: [a] en «afuera[a]» y [b] en «Señores[b]». No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se evitó traducir κύριοι como «Señor» para no borrar la distinción contextual entre un vocativo cortés y el título divino.
  - Se conservó la voz pasiva de σωθῶ mediante «ser salvo», coherente con el audit trail inglés.
  - La secuencia narrativa del participio aoristo se marcó con una construcción temporal natural en español.
  - El registro es sobrio y publicable, con puntuación española y comillas angulares.
  - No se usó una calca rígida de la estructura griega cuando el español requería mayor naturalidad.
