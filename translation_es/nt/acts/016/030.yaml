  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La excepción contextual de κύριοι como «Señores» está bien documentada y debe mantenerse. «Ser salvo» preserva correctamente la decisión teológica de σωθῶ. No intervienen Yahvé/Mesías u otros términos de glosario principal.
