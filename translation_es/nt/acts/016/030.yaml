revisions:
- from: 'Y después de sacarlos afuera[a], les dijo: «Señores[b], ¿qué me es necesario hacer para ser salvo?»'
  to: 'Y después de sacarlos fuera, les dijo: «Señores[a], ¿qué debo hacer[b] para ser salvo?»'
  rationale: Se ajusta la redacción para un español más natural y eclesialmente legible sin perder la fuerza del griego. «Sacarlos fuera» evita la redundancia de «sacarlos afuera». «¿Qué debo hacer?» expresa adecuadamente la necesidad de δεῖ en español idiomático. La nota alternativa se reubica a la pregunta, donde corresponde según el expediente inglés, y se mantiene la aclaración de «Señores» para κύριοι.
