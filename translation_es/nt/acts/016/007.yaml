  rationale: Se ajusta únicamente la cláusula final para eliminar la ambigüedad de «se lo» y reflejar con más claridad que el Espíritu de Jesús no les permitió realizar el viaje intentado. Se conserva el resto porque es fiel al griego, natural en español y coherente con las decisiones léxicas y teológicas documentadas.
