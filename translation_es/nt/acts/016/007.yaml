    issue: Ambigüedad en «no se lo permitió»
    rationale: Aunque gramaticalmente posible, no expresa con tanta claridad como el griego que el Espíritu no les permitió a ellos realizar esa acción. «No les permitió ir» o «no les permitió entrar» comunica mejor αὐτούς + infinitivo implícito.
  - severity: low
    issue: Ligera pérdida del matiz direccional en «ir a Bitinia»
    rationale: εἰς sugiere movimiento hacia dentro de la región. «Ir a Bitinia» es aceptable, pero «ir a Bitinia» combinado con «no les permitió ir» sigue siendo suficientemente fiel; no exige una corrección mayor mientras la sintaxis final sea clara.
