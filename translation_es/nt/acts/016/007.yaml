translation:
  language: es
  text: Pero cuando llegaron a Misia[a], intentaban ir a Bitinia, y el Espíritu de Jesús no les permitió ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de Misia» o «junto a Misia». La frase griega probablemente indica que alcanzaron la región fronteriza de Misia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: when they came
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - después de haber llegado
  - al llegar
  lexicon: BDAG
  rationale: El participio aoristo tiene valor temporal en el contexto. «Cuando llegaron» expresa de forma natural la secuencia narrativa sin perder el sentido de llegada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un desarrollo suave con matiz de transición; «Pero» conserva esa continuidad narrativa en español.
- source_word: κατὰ τὴν Μυσίαν
  english_pob_choice: to Mysia
  chosen_spanish: a Misia
  alternatives_spanish:
  - junto a Misia
  - por Misia
  - cerca de Misia
  lexicon: BDAG
  rationale: Aunque κατά con acusativo puede sugerir cercanía o borde regional, la revisión inglesa reciente favoreció una formulación más natural. En español, «a Misia» mantiene la referencia geográfica sin sobreinterpretar el matiz direccional.
- source_word: ἐπείραζον
  english_pob_choice: they were trying
  chosen_spanish: intentaban
  alternatives_spanish:
  - estaban intentando
  - procuraban
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Intentaban» comunica el esfuerzo iniciado y no concluido, con naturalidad en español contemporáneo.
- source_word: εἰς τὴν Βιθυνίαν πορευθῆναι
  english_pob_choice: to go into Bithynia
  chosen_spanish: ir a Bitinia
  alternatives_spanish:
  - entrar en Bitinia
  - dirigirse a Bitinia
  lexicon: BDAG
  rationale: πορευθῆναι expresa desplazamiento, y εἰς puede señalar movimiento hacia/into. «Ir a Bitinia» es claro y suficientemente fiel; «entrar en» sería más marcado que el griego exige.
- source_word: οὐκ εἴασεν
  english_pob_choice: did not permit
  chosen_spanish: no se lo permitió
  alternatives_spanish:
  - no les permitió
  - no les dio permiso
  lexicon: BDAG
  rationale: ἐάω significa permitir/permitir que algo ocurra. En español, el complemento pronominal «se lo» reproduce bien la relación entre el sujeto («el Espíritu de Jesús») y la acción intentada por ellos.
- source_word: τὸ πνεῦμα Ἰησοῦ
  english_pob_choice: the Spirit of Jesus
  chosen_spanish: el Espíritu de Jesús
  alternatives_spanish:
  - el Espíritu Santo de Jesús
  - el Espíritu de Jesús mismo
  lexicon: BDAG
  rationale: El genitivo se conserva como relación de pertenencia/asociación. Se mantiene la expresión cristológica singular del griego sin reducirla a una formulación más habitual como «el Espíritu Santo».
theological_decisions:
- issue: La expresión cristológica τὸ πνεῦμα Ἰησοῦ
  english_pob_reading: the Spirit of Jesus
  chosen_spanish_reading: el Espíritu de Jesús
  alternative_spanish_readings:
  - el Espíritu Santo
  - el Espíritu
  rationale: El texto griego incluye explícitamente «de Jesús», y la traducción debe preservarlo. Esto mantiene la textura cristológica propia del pasaje y evita armonizarlo con expresiones más comunes que el versículo no usa.
  doctrine_reference: Affirmations; fidelidad al texto base y al principio de no suavizar tensiones lexicológicas
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés POB que prefirió una formulación más natural para κατὰ τὴν Μυσίαν («to Mysia») en lugar de «opposite Mysia», y se mantuvo el resto de la línea con el mismo valor semántico y teológico: movimiento intentado hacia Bitinia y la negativa del Espíritu de Jesús.'
  spanish_consistency_notes:
  - Se mantiene «Misia» y «Bitinia» como topónimos transliterados de forma consistente.
  - Se conserva «Espíritu de Jesús» y no se sustituye por «Espíritu Santo» para respetar la formulación explícita del griego.
  - «Intentaban» reproduce el imperfecto de acción en proceso.
  - La nota al pie marca la ambigüedad geográfica de κατὰ τὴν Μυσίαν sin imponer una interpretación única.
