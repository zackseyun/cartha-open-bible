  text: Ἐγένετο δὲ πορευομένων ἡμῶν εἰς ⸀τὴν προσευχὴν παιδίσκην τινὰ ἔχουσαν πνεῦμα ⸀πύθωνα ⸀ὑπαντῆσαι ἡμῖν, ἥτις ἐργασίαν πολλὴν παρεῖχεν τοῖς κυρίοις αὐτῆς μαντευομένη·
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/016.yaml
  text: And it happened that[a], as we were going to the place of prayer, a certain slave girl having a spirit of Python met us[b], who was bringing much profit to her masters by fortune-telling.
  footnotes:
  - marker: a
    text: Or 'a spirit of divination.' The Greek says 'a python spirit,' using a culturally specific term associated with mantic prediction.
    reason: alternative_reading
  - marker: b
    text: Or 'by practicing divination.'
    reason: lexical_alternative
  ai_draft:
