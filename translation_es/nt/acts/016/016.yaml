    changes_summary: Changed 'who had a python spirit' to 'having a spirit of Python' for closer lexical accuracy to πνεῦμα πύθωνα and more formal register; retained the rest with minor smoothing.
translation:
  language: es
  text: Y sucedió que, mientras íbamos al lugar[a] de oración, cierta esclava, que tenía un espíritu de Pitón[b], nos salió al encuentro; ella daba mucha ganancia a sus amos mediante la adivinación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la oración'. La expresión griega puede referirse a un sitio reconocido de reunión para orar, no solo a la acción de orar.
    reason: alternative_reading
  - marker: b
    text: O 'espíritu de adivinación'. El griego dice literalmente 'espíritu de Pitón', un término culturalmente específico asociado con la predicción mántica.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: And it happened that
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: BDAG
  rationale: Expresa la transición narrativa de Lucas-Hechos sin arcaísmo, conservando el valor introductorio del griego como un giro de evento.
- source_word: πορευομένων ἡμῶν
  english_pob_choice: as we were going
  chosen_spanish: mientras íbamos
  alternatives_spanish:
  - así como íbamos
  - cuando íbamos
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte naturalmente como acción simultánea de fondo. 'Mientras íbamos' conserva el aspecto en progreso y suena fluido en español.
- source_word: εἰς τὴν προσευχὴν
  english_pob_choice: to the place of prayer
  chosen_spanish: a la casa de oración
  alternatives_spanish:
  - al lugar de oración
  - a la oración
  lexicon: BDAG
  rationale: Hechos parece referirse a un sitio reconocido de reunión para orar, no solo al acto de orar. 'Casa de oración' comunica un lugar concreto y es inteligible en español, aunque 'lugar de oración' sigue siendo una alternativa posible.
- source_word: παιδίσκην τινά
  english_pob_choice: a certain slave girl
  chosen_spanish: una cierta esclava
  alternatives_spanish:
  - una cierta esclava joven
  - una cierta sirvienta
  lexicon: BDAG
  rationale: El contexto de 'sus amos' y de lucro económico hace saliente la condición de esclavitud. 'Esclava' preserva esa fuerza; se omite 'girl' porque en español la naturalidad y la carga semántica recaen en el estatus servil.
- source_word: ἔχουσαν πνεῦμα πύθωνα
  english_pob_choice: having a spirit of Python
  chosen_spanish: que tenía un espíritu de Pitón
  alternatives_spanish:
  - que tenía un espíritu pitónico
  - que tenía un espíritu de adivinación
  lexicon: BDAG
  rationale: '''Pitón'' mantiene la especificidad cultural del término griego πύθων y evita diluirlo en una interpretación. La opción interpretativa ''espíritu de adivinación'' queda implícita en la nota como alternativa, siguiendo el audit trail inglés.'
- source_word: ὑπαντῆσαι ἡμῖν
  english_pob_choice: met us
  chosen_spanish: nos salió al encuentro
  alternatives_spanish:
  - nos encontró
  - nos encontró al pasar
  lexicon: BDAG
  rationale: Reproduce el sentido de encuentro inesperado con una expresión idiomática natural en español, sin perder la fuerza narrativa del verbo.
- source_word: ἐργασίαν πολλὴν παρεῖχεν
  english_pob_choice: was bringing much profit
  chosen_spanish: daba mucho lucro
  alternatives_spanish:
  - producía mucho provecho
  - generaba mucha ganancia
  lexicon: BDAG
  rationale: '''Lucro'' refleja el valor económico concreto del sustantivo y su tono comercial; ''daba'' conserva el imperfecto de acción continua. ''Lucro'' es algo más formal que ''ganancia'' y enlaza bien con el contexto de explotación.'
- source_word: τοῖς κυρίοις αὐτῆς
  english_pob_choice: to her masters
  chosen_spanish: a sus amos
  alternatives_spanish:
  - a sus dueños
  - a sus señores
  lexicon: BDAG
  rationale: '''Amos'' corresponde al dominio sobre una esclava y evita la ambigüedad de ''señores'', que podría confundirse con el título divino. ''Sus amos'' mantiene la relación de propiedad/control del original.'
- source_word: μαντευομένη
  english_pob_choice: by fortune-telling
  chosen_spanish: mediante la adivinación
  alternatives_spanish:
  - por medio de la adivinación
  - practicando adivinación
  lexicon: BDAG
  rationale: '''Adivinación'' es el equivalente español más preciso y formal para el campo semántico de μαντεύομαι. ''Mediante'' conserva el valor instrumental de la forma participial.'
theological_decisions:
- issue: Cómo traducir πνεῦμα πύθωνα sin borrar su colorido cultural ni imponer una explicación única
  english_pob_reading: python spirit
  chosen_spanish_reading: espíritu de Pitón
  alternative_spanish_readings:
  - espíritu de adivinación
  rationale: La lectura principal conserva la expresión cultural específica del griego. En español, 'Pitón' mantiene la referencia histórica y mântica; la alternativa interpretativa se preserva en nota para lectores que necesiten aclaración, sin reemplazar el término original en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si παιδίσκη debe reflejar servidumbre o esclavitud
  english_pob_reading: slave girl
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sirvienta
  - esclava joven
  rationale: El relato subraya la relación económica con 'sus amos' y el beneficio que obtenían de ella. 'Esclava' expresa con claridad el estatus de sujeción que el contexto exige, en línea con la preferencia del proyecto por explicitar la condición servil cuando es relevante.
  doctrine_reference: Translation philosophy §1; tabla de términos controvertidos sobre δοῦλος
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que afinó πνεῦμα πύθωνα para acercarse más al valor léxico literal ('a spirit of Python') y mantuvo la referencia cultural específica. También conserva la lectura contextual de παιδίσκη como esclava por la explotación económica y la mención de los amos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - '''Espíritu'' se reserva para la entidad sobrenatural; aquí se usa minúscula porque no se trata del Espíritu Santo.'
  - '''Adivinación'' se mantiene en la frase instrumental para μαντευομένη, evitando un término demasiado coloquial como ''adivinación'' no implica necesariamente ''suerte'' o ''fortuna''.'
  - Se eligió 'esclava'/'amos' para conservar la relación de dominio del contexto, siguiendo la convención del proyecto para términos de servidumbre explícita.
