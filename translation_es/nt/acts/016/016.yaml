revisions:
- from: Y sucedió que, mientras íbamos a la casa[a] de oración, una cierta esclava, que tenía un espíritu de Pitón[b], nos salió al encuentro; ella daba mucho lucro a sus amos mediante la adivinación.
  to: Y sucedió que, mientras íbamos al lugar[a] de oración, cierta esclava, que tenía un espíritu de Pitón[b], nos salió al encuentro; ella daba mucha ganancia a sus amos mediante la adivinación.
  rationale: Se corrige 'casa de oración' a 'lugar de oración' para reflejar con mayor fidelidad εἰς τὴν προσευχὴν según el expediente inglés y evitar especificar un edificio. Se suaviza 'una cierta esclava' a 'cierta esclava' por naturalidad en español, y se reemplaza 'mucho lucro' por 'mucha ganancia' para una lectura más idiomática sin perder el sentido económico. Se mantienen 'espíritu de Pitón', 'amos' y 'mediante la adivinación' por buena fidelidad léxica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:09:30Z'
