translation:
  language: es
  text: 'Y después de llevarlos ante los magistrados[a], dijeron: «Estos hombres están perturbando nuestra ciudad, por ser judíos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pretores», los funcionarios cívicos romanos en una colonia como Filipos.
    reason: cultural_note
  - marker: b
    text: O «judeanos». El término griego puede referirse a los judíos en general o a personas de Judea; aquí «judíos» encaja mejor con la acusación étnico-religiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαγαγόντες
  english_pob_choice: after bringing
  chosen_spanish: después de llevarlos
  alternatives_spanish:
  - habiéndolos llevado
  - llevándolos
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa acción previa. «Después de llevarlos» comunica esa anterioridad con naturalidad en español sin perder el valor temporal del griego.
- source_word: τοῖς στρατηγοῖς
  english_pob_choice: magistrates
  chosen_spanish: los magistrados
  alternatives_spanish:
  - los magistrados principales
  - los pretores
  lexicon: BDAG
  rationale: En Filipos, στρατηγοί designa a las autoridades cívicas romanas. «Magistrados» es claro y fiel; «pretores» sería una alternativa histórica más técnica, pero menos transparente para el lector general.
- source_word: ἐκταράσσουσιν
  english_pob_choice: are disturbing
  chosen_spanish: están alborotando
  alternatives_spanish:
  - están perturbando
  - están causando disturbios en
  lexicon: BDAG
  rationale: El verbo indica agitación o perturbación intensa. «Alborotando» transmite bien la acusación de causar desorden en un contexto urbano y resulta más idiomático en español que una traducción demasiado literal.
- source_word: ἡμῶν τὴν πόλιν
  english_pob_choice: our city
  chosen_spanish: nuestra ciudad
  alternatives_spanish:
  - la ciudad nuestra
  - nuestra urbe
  lexicon: BDAG
  rationale: La posesión es emotiva y retórica. «Nuestra ciudad» reproduce esa apropiación cívica con naturalidad en español.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En este contexto la acusación hostil usa el término étnico-religioso estándar. «Judíos» es la equivalencia normal y mejor se ajusta al sentido del griego en esta escena de Filipos.
- source_word: ὑπάρχοντες
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - puesto que son
  - como son
  lexicon: BDAG
  rationale: El participio aporta la base de la acusación sin una subordinación explícita. «Siendo» preserva la compacta relación griega y el matiz de estado/condición.
- source_word: Οὗτοι οἱ ἄνθρωποι
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - Estas personas
  - Estos individuos
  lexicon: BDAG
  rationale: El plural masculino específico corresponde a Pablo y Silas. «Estos hombres» es natural y mantiene la referencia concreta del original.
theological_decisions:
- issue: Sentido de Ἰουδαῖοι en una acusación hostil
  english_pob_reading: Jews
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  rationale: La escena registra el lenguaje acusatorio de los adversarios, no una evaluación del narrador sobre un pueblo entero. «Judíos» conserva la lectura étnico-religiosa más probable en el contexto de una colonia romana y evita restringir innecesariamente el término a procedencia geográfica.
  doctrine_reference: Principio de primacía del original y de equivalencia funcional controlada
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido ya verificado en el POB inglés y no requiere cambios por la revisión más reciente; se mantienen las decisiones confirmadas sobre el valor administrativo de στρατηγοῖς y la acusación étnico-religiosa de Ἰουδαῖοι.
  spanish_consistency_notes:
  - Se mantiene «magistrados» como término principal para στρατηγοῖς, con «pretores» solo en nota.
  - Se preserva «judíos» para Ἰουδαῖοι, evitando una paráfrasis que atenúe la acusación original.
  - La construcción «después de llevarlos» refleja la anterioridad del participio aoristo sin sonar forzada en español.
  - «Alborotando» se usa para conservar la fuerza de ἐκταράσσουσιν en una acusación pública de desorden.
