translation:
  language: es
  text: y proclaman costumbres que no nos es lícito aceptar ni practicar, siendo romanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «siendo romanos» o «como romanos». La frase participial griega expresa la razón que dan los acusadores para rechazar estas costumbres.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: Conserva la conexión simple con el versículo anterior sin añadir matiz discursivo no presente en el griego.
- source_word: καταγγέλλουσιν
  english_pob_choice: are proclaiming
  chosen_spanish: proclaman
  alternatives_spanish:
  - anuncian
  - declaran
  - predican
  lexicon: BDAG
  rationale: El verbo denota anunciar o proclamar públicamente; «proclaman» reproduce bien el tono de acusación pública sin convertirlo en un término más técnico como «predican».
- source_word: ἔθη
  english_pob_choice: customs
  chosen_spanish: costumbres
  alternatives_spanish:
  - prácticas
  - usos
  lexicon: BDAG
  rationale: ἔθη alude a prácticas establecidas o costumbres; «costumbres» es la equivalencia más natural y transparente en español.
- source_word: οὐκ ἔξεστιν
  english_pob_choice: it is not lawful
  chosen_spanish: no nos es lícito
  alternatives_spanish:
  - no se nos permite
  - no nos está permitido
  lexicon: BDAG
  rationale: La expresión griega tiene un matiz jurídico o de legitimidad. «No nos es lícito» preserva ese registro formal mejor que una formulación más coloquial.
- source_word: παραδέχεσθαι
  english_pob_choice: to accept
  chosen_spanish: aceptar
  alternatives_spanish:
  - recibir
  - adoptar
  lexicon: BDAG
  rationale: Aquí el sentido es recibir o admitir como válido unas costumbres; «aceptar» es idiomático y suficientemente amplio.
- source_word: οὐδὲ ποιεῖν
  english_pob_choice: or practice
  chosen_spanish: ni practicar
  alternatives_spanish:
  - ni hacer
  - ni observar
  lexicon: BDAG
  rationale: Con ἔθη, ποιεῖν significa hacer o llevar a cabo costumbres; «practicar» comunica con naturalidad esa idea en español.
- source_word: Ῥωμαίοις οὖσιν
  english_pob_choice: since we are Romans
  chosen_spanish: siendo romanos
  alternatives_spanish:
  - porque somos romanos
  - como romanos
  lexicon: BDAG
  rationale: El participio dativo expresa la base o razón que los acusadores invocan. «Siendo romanos» conserva esa relación causal sin sobreexplicar la frase. El antecedente implícito de la voz acusadora se entiende por el contexto.
theological_decisions:
- issue: Tono jurídico de la acusación
  english_pob_reading: Render the charge in legal-civic terms ('it is not lawful for us') without endorsing the truth of the claim.
  chosen_spanish_reading: Traducir la acusación en términos jurídico-cívicos («no nos es lícito») sin presentar la afirmación como validada por el narrador.
  alternative_spanish_readings:
  - no está bien que aceptemos
  - no nos está permitido
  rationale: El versículo reporta la protesta de los acusadores; la traducción debe conservar su marco legal y no convertirlo en una evaluación moral del narrador. «No nos es lícito» mantiene la fuerza formal de la queja.
  doctrine_reference: 'Principio de traducción: preservar el sentido del alegato sin añadir juicio narrativo.'
translation_notes:
  revision_awareness: El cotejo con la edición inglesa POB muestra acuerdo alto y ninguna revisión necesaria en el sentido básico del versículo. La redacción española sigue de cerca la estructura griega y el valor jurídico de οὐκ ἔξεστιν, manteniendo la ambigüedad causal de Ῥωμαίοις οὖσιν con una nota breve.
  spanish_consistency_notes:
  - Se conserva «costumbres» para ἔθη, coherente con el campo semántico de prácticas establecidas.
  - Se usa «Yahvé» solo cuando corresponde al nombre divino; aquí no aparece ninguna referencia divina.
  - La voz verbal se mantiene en presente plural para reflejar la acusación directa del texto griego.
  - La nota a pie de página explica la frase participial sin alterar el cuerpo principal del versículo.
