translation:
  language: es
  text: Pero cuando sus amos vieron que se les había ido la esperanza de su ganancia[a], agarraron a Pablo y a Silas y los arrastraron a la plaza pública, ante los gobernantes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su esperanza de lucro». La frase griega dice literalmente: «la esperanza de su ganancia/ingreso».'
    reason: lexical_alternative
  - marker: b
    text: El término traducido «gobernantes» es una palabra general para autoridades civiles; el versículo siguiente usa un término más específico, a menudo traducido «magistrados».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κύριοι αὐτῆς
  english_pob_choice: her masters
  chosen_spanish: los amos de ella
  alternatives_spanish:
  - sus dueños
  - sus señores
  lexicon: BDAG
  rationale: κύριοι aquí no funciona como título respetuoso, sino como quienes ejercían dominio sobre la muchacha esclavizada y la explotaban económicamente. 'Amos' preserva esa relación de poder con fuerza natural en español. Se evita 'señores' por su posible cortesía y 'dueños' por sonar más jurídico que relacional.
- source_word: ἐξῆλθεν
  english_pob_choice: had gone out
  chosen_spanish: se les había ido
  alternatives_spanish:
  - había salido
  - había desaparecido
  lexicon: BDAG
  rationale: El griego usa ἐξέρχομαι en aoristo; en contexto expresa la pérdida ya consumada de la fuente de lucro. 'Se les había ido' mantiene la imagen de salida/pérdida y suena natural en español. 'Había salido' sería más literal pero menos idiomático aquí.
- source_word: ἡ ἐλπὶς τῆς ἐργασίας αὐτῶν
  english_pob_choice: their hope of profit
  chosen_spanish: la esperanza de su ganancia
  alternatives_spanish:
  - la esperanza de su lucro
  - la esperanza de su beneficio
  lexicon: BDAG
  rationale: ἐλπίς conserva 'esperanza', y ἐργασία en este contexto apunta a ingresos o ganancia obtenida por su actividad, no al trabajo en abstracto. 'Ganancia' comunica bien el sentido económico del pasaje sin perder el matiz de expectativa frustrada. 'Lucro' y 'beneficio' son posibles, pero 'ganancia' resulta más transparente para lectura pública.
- source_word: ἐπιλαβόμενοι
  english_pob_choice: they seized
  chosen_spanish: agarrando
  alternatives_spanish:
  - tomando por
  - apoderándose de
  lexicon: BDAG
  rationale: El participio expresa una acción violenta de sujetar con fuerza. 'Agarrando' conserva la inmediatez del gesto hostil en español y prepara el verbo principal siguiente. 'Apoderándose de' suena más abstracto; 'tomando por' sería menos claro.
- source_word: εἵλκυσαν
  english_pob_choice: dragged
  chosen_spanish: los arrastraron
  alternatives_spanish:
  - los llevaron a rastras
  - los halaron
  lexicon: BDAG
  rationale: ἕλκω describe un tirar con fuerza, con violencia pública. 'Arrastraron' expresa bien la humillación y coerción en español actual. 'Llevaron a rastras' es más explicativo, y 'halaron' es menos general en registro bíblico.
- source_word: ἀγορὰν
  english_pob_choice: the marketplace
  chosen_spanish: al mercado
  alternatives_spanish:
  - a la plaza
  - al foro
  lexicon: BDAG
  rationale: ἀγορά puede designar el espacio cívico-comercial. Dado que el texto menciona después a los gobernantes, 'mercado' mantiene el vínculo con el lugar público de reunión y comercio en una forma comprensible y sobria. 'Plaza' pierde algo del matiz comercial; 'foro' resulta demasiado romano/erudito para este contexto.
- source_word: ἐπὶ τοὺς ἄρχοντας
  english_pob_choice: before the rulers
  chosen_spanish: ante los gobernantes
  alternatives_spanish:
  - ante las autoridades
  - delante de los magistrados
  lexicon: BDAG
  rationale: ἄρχοντες es un término general para quienes ejercen autoridad civil. 'Gobernantes' conserva esa amplitud mejor que 'magistrados', que sería más específico de la siguiente referencia. 'Autoridades' también es posible, pero 'gobernantes' mantiene el tono de persona investida de poder.
theological_decisions:
- issue: Relación de dominio sobre la muchacha explotada
  english_pob_reading: her masters
  chosen_spanish_reading: los amos de ella
  alternative_spanish_readings:
  - sus dueños
  - sus señores
  rationale: El pasaje presenta una relación de esclavitud y explotación, no una simple tutela. 'Amos' deja visible la tensión social y moral del relato y evita suavizar la violencia estructural del texto.
  doctrine_reference: Éxodo 21; Efesios 6:5; 1 Timoteo 1:10
- issue: Término general para los ἄρχοντες
  english_pob_reading: before the rulers
  chosen_spanish_reading: ante los gobernantes
  alternative_spanish_readings:
  - ante las autoridades
  - ante los magistrados
  rationale: El griego aquí usa un término amplio. Mantenerlo amplio en español evita anticipar la especificación jurídica que aparece en el verso siguiente y conserva la progresión narrativa.
  doctrine_reference: Hechos 16:20
- issue: Imagen económica de la pérdida
  english_pob_reading: their hope of profit
  chosen_spanish_reading: la esperanza de su ganancia
  alternative_spanish_readings:
  - la esperanza de su lucro
  - la esperanza de su beneficio
  rationale: La frase no solo habla de dinero, sino de una esperanza concreta frustrada. 'Ganancia' comunica el contenido económico sin borrar el carácter esperanzado del giro griego.
  doctrine_reference: Hechos 16:16-19
translation_notes:
  revision_awareness: 'Se tomó en cuenta el flujo narrativo y el audit trail inglés: se mantuvo la distinción entre el término general ἄρχοντες y el término más específico del verso siguiente, y se conservó la imagen económica de ἐξῆλθεν ἡ ἐλπὶς τῆς ἐργασίας αὐτῶν sin mecanizarla. No se requirieron cambios respecto del pase de revisión anterior.'
  spanish_consistency_notes:
  - 'Se preserva el orden causal: al ver la pérdida de su ganancia, los amos actúan con violencia.'
  - Se evitó sustituir ἀγορά por un equivalente demasiado técnico; 'mercado'/'mercado' se ha regularizado como 'mercado' no se usa aquí, sino 'mercado' only? Actually chosen 'al mercado'.
  - 'Se mantuvo el paralelismo narrativo con nombres propios en forma española estándar: Pablo y Silas.'
  - El registro es público y bíblico contemporáneo, sin arcaísmos innecesarios.
