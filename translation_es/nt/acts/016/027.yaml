  yaml_path: translation/nt/acts/016/027.yaml
  text: When the jailer woke up and saw the prison doors standing open[a], he drew his sword and was about to kill himself[b], supposing that the prisoners had escaped.
  footnotes:
  - marker: a
    text: Or, more formally, 'saw that the prison doors had been opened.' The Greek perfect participle emphasizes the doors' opened state.
    reason: lexical_alternative
  - marker: b
    text: μάχαιρα can denote a sword or a shorter bladed weapon such as a dagger; 'sword' is retained as the standard contextual rendering.
    reason: lexical_alternative
