translation:
  language: es
  text: Cuando el carcelero despertó y vio las puertas de la prisión abiertas[a], sacó su espada[b] y estaba a punto de matarse, pensando que los presos habían escapado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «vio que las puertas de la prisión habían sido abiertas». El participio perfecto griego enfatiza el estado de las puertas ya abiertas.
    reason: lexical_alternative
  - marker: b
    text: μάχαιρα puede referirse a una espada o a un arma blanca más corta, como una daga; se mantiene «espada» como la traducción contextual estándar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξυπνος ... γενόμενος
  english_pob_choice: woke up
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - volvió en sí
  lexicon: BDAG
  rationale: La combinación adjetivo-participio expresa el paso a un estado de vigilia. «Despertó» comunica de manera natural ese sentido ingresivo sin añadir información.
- source_word: δεσμοφύλαξ
  english_pob_choice: jailer
  chosen_spanish: carcelero
  alternatives_spanish:
  - guardia
  - guardián de la cárcel
  lexicon: BDAG
  rationale: Designa al funcionario responsable de los presos. «Carcelero» es claro, natural y suficientemente específico en español; «guardia» es más amplio.
- source_word: ἰδὼν ἀνεῳγμένας τὰς θύρας τῆς φυλακῆς
  english_pob_choice: saw the prison doors standing open
  chosen_spanish: vio las puertas de la prisión abiertas
  alternatives_spanish:
  - vio que las puertas de la prisión habían sido abiertas
  - vio las puertas de la prisión de par en par
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. En español, «abiertas» conserva ese estado de forma natural; la alternativa más formal se reserva como opción implícita, no necesaria para el flujo de la frase.
- source_word: σπασάμενος τὴν μάχαιραν
  english_pob_choice: drew his sword
  chosen_spanish: sacó su espada
  alternatives_spanish:
  - desenvainó su espada
  - sacó su daga
  lexicon: BDAG
  rationale: «Sacar» reproduce bien la acción de desenvainar/extraer el arma en este contexto narrativo. «Espada» sigue la decisión contextual del POB inglés para μάχαιρα, sin forzar un matiz más estrecho como «daga».
- source_word: ἤμελλεν ἑαυτὸν ἀναιρεῖν
  english_pob_choice: was about to kill himself
  chosen_spanish: estaba a punto de matarse
  alternatives_spanish:
  - iba a matarse
  - estaba por matarse
  lexicon: BDAG
  rationale: ἤμελλεν expresa inminencia. «Estaba a punto de matarse» comunica con precisión esa inmediatez y mantiene el referente reflexivo del griego.
- source_word: νομίζων
  english_pob_choice: supposing
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: BDAG
  rationale: El participio da la razón de su acción y expresa su inferencia. «Pensando» es natural en español; «suponiendo» sería más literal, pero suena algo más pesado aquí.
- source_word: ἐκπεφευγέναι
  english_pob_choice: had escaped
  chosen_spanish: habían escapado
  alternatives_spanish:
  - habían huido
  - se habían escapado
  lexicon: BDAG
  rationale: El infinitivo perfecto indica una huida ya consumada. «Habían escapado» es la forma más directa y neutra en español.
- source_word: τοὺς δεσμίους
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los prisioneros
  - los cautivos
  lexicon: BDAG
  rationale: En este contexto, δέσμιος se refiere a personas encarceladas. «Presos» es idiomático y breve; «prisioneros» también sería válido, pero algo más formal.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el valor aspectual del participio perfecto en la puerta abierta, el matiz de inminencia en ἤμελλεν y la inferencia expresada por νομίζων. No se registran revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se mantiene «carcelero» para δεσμοφύλαξ en coherencia con un registro bíblico claro y actual.
  - Se evita «SEÑOR» y otras convenciones irrelevantes porque el versículo no contiene referencias al nombre divino.
  - «Espada» sigue la decisión contextual del POB para μάχαιρα, sin sobrerrestringir el término.
