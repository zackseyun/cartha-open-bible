translation:
  language: es
  text: Y después de haberles infligido muchos golpes[a], los echaron en la cárcel[b], ordenando al carcelero que los mantuviera bien asegurados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos azotes», «muchos latigazos» o «muchas palizas». El griego habla de numerosos golpes infligidos sin precisar aquí el instrumento exacto.
    reason: lexical_alternative
  - marker: b
    text: O «prisión» en lugar de «cárcel»; el término griego puede designar de manera más general un lugar de reclusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλάς ... πληγὰς
  english_pob_choice: many blows
  chosen_spanish: muchos azotes
  alternatives_spanish:
  - muchos golpes
  - muchos latigazos
  - muchas heridas
  lexicon: BDAG
  rationale: πληγή puede referirse a un golpe o a una herida producida por un castigo. En este contexto de azotes públicos antes del encarcelamiento, «azotes» comunica con naturalidad el castigo corporal sin precisar indebidamente el instrumento. «Muchos» reproduce πολλάς.
- source_word: ἐπιθέντες
  english_pob_choice: after they had inflicted
  chosen_spanish: después de haberles infligido
  alternatives_spanish:
  - habiendo les dado
  - después de imponerles
  - tras haberles dado
  lexicon: BDAG
  rationale: El participio expresa una acción previa y concomitante al verbo principal. «Después de haberles infligido» conserva ese valor temporal y refleja el sentido idiomático de ἐπιτίθημι con πληγάς.
- source_word: ἔβαλον εἰς φυλακήν
  english_pob_choice: they threw them into prison
  chosen_spanish: los echaron en la cárcel
  alternatives_spanish:
  - los metieron en la cárcel
  - los arrojaron a la cárcel
  - los pusieron en prisión
  lexicon: BDAG
  rationale: βάλλω mantiene el matiz de acción brusca o contundente; «echaron» conserva esa viveza en español. «Cárcel» es un equivalente natural de φυλακή y en este contexto expresa el lugar de reclusión.
- source_word: φυλακήν
  english_pob_choice: prison
  chosen_spanish: la cárcel
  alternatives_spanish:
  - la prisión
  - el calabozo
  - la custodia
  lexicon: BDAG
  rationale: φυλακή puede designar prisión, cárcel o custodia. «Cárcel» es claro y fluido en español moderno, sin perder el sentido general de confinamiento.
- source_word: παραγγείλαντες
  english_pob_choice: ordering
  chosen_spanish: ordenando
  alternatives_spanish:
  - mandando
  - encargando
  - dando instrucciones
  lexicon: BDAG
  rationale: El participio expresa una instrucción autoritativa dada al entregar a los presos. «Ordenando» conserva mejor esa fuerza que una formulación más débil.
- source_word: δεσμοφύλακι
  english_pob_choice: the jailer
  chosen_spanish: al carcelero
  alternatives_spanish:
  - al guardián de la cárcel
  - al guardia de la prisión
  - al jefe de la cárcel
  lexicon: BDAG
  rationale: δεσμοφύλαξ es el funcionario encargado de los presos. «Carcelero» es el término español más idiomático y breve para esta función narrativa.
- source_word: ἀσφαλῶς
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - firmemente
  - de modo seguro
  - bien asegurados
  lexicon: BDAG
  rationale: Aquí ἀσφαλῶς no describe el bienestar de los presos sino la manera de custodiarles para impedir la fuga. «Con seguridad» preserva esa idea de custodia asegurada.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: que los guardara
  alternatives_spanish:
  - que los vigilara
  - que los custodiara
  - que los mantuviera
  lexicon: BDAG
  rationale: τηρέω en este contexto de prisión significa mantener bajo custodia. «Guardara» expresa bien la obligación impuesta al carcelero y suena natural en español.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los dos
  - a los dos
  lexicon: BDAG
  rationale: El pronombre se refiere a Pablo y Silas como objeto directo tanto del encarcelamiento como de la custodia ordenada. En español, el clítico «los» es la forma natural y clara.
translation_notes:
  revision_awareness: Se mantiene el valor narrativo intenso de βάλλω con «echaron» y el sentido amplio de φυλακή con «cárcel», siguiendo el audit trail inglés sin depender mecánicamente de él. No hubo revisiones aplicadas en el paquete de origen; la traducción sigue el texto griego SBLGNT y las decisiones léxicas ya validadas.
  spanish_consistency_notes:
  - Se usa «Y después de haberles infligido» para preservar la anterioridad del participio aoristo.
  - Se evita «SEÑOR» u otras convenciones de ocultamiento, porque no hay aquí referencia al nombre divino.
  - «Carcelero» mantiene coherencia con el valor funcional de δεσμοφύλαξ.
  - «Cárcel» y «prisión» se ofrecen como alternativa de traducción en nota, sin alterar el texto principal.
