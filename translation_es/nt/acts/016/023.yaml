    reason: lexical_alternative
  - marker: b
    text: O «prisión» en lugar de «cárcel»; el término griego puede designar de manera más general un lugar de reclusión.
    reason: lexical_alternative
  revision_rationale: Se ajusta πληγάς a «golpes» para conservar la amplitud semántica documentada por el POB inglés y se refina ἀσφαλῶς τηρεῖν con «mantuviera bien asegurados» para expresar con más claridad la custodia estricta y evitar la ambigüedad de «con seguridad».
