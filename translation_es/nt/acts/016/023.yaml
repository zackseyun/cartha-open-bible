revisions:
- from: Y después de haberles infligido muchos azotes[a], los echaron en la cárcel[b], ordenando al carcelero que los guardara con seguridad.
  to: Y después de haberles infligido muchos golpes[a], los echaron en la cárcel[b], ordenando al carcelero que los mantuviera bien asegurados.
  rationale: Se ajusta πληγάς a «golpes» para conservar la amplitud semántica documentada por el POB inglés y se refina ἀσφαλῶς τηρεῖν con «mantuviera bien asegurados» para expresar con más claridad la custodia estricta y evitar la ambigüedad de «con seguridad».
