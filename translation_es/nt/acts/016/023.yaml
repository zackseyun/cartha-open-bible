  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: acción previa participial (''después de haberles infligido''), encarcelamiento forzoso, y orden al carcelero de mantenerlos bajo custodia segura. Sin embargo, ''muchos azotes'' tiende a especificar más de lo que permite πληγάς, mientras que la nota inglesa preserva la amplitud de ''blows/lashes/beatings''.'
  spanish_quality_summary: El español es claro y natural. No obstante, 'con seguridad' en este contexto puede sonar ambiguo en español, como si hablara de seguridad general o protección; 'bien asegurados' o 'bajo buena custodia' expresa mejor el sentido custodial de ἀσφαλῶς. Además, conviene evitar que el texto principal sobreespecifique el tipo de castigo.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas, salvo que 'azotes' estrecha innecesariamente πολλάς ... πληγὰς. 'Cárcel' para φυλακή y 'carcelero' para δεσμοφύλακι son aceptables y naturales en español.
  issues:
  - severity: medium
    issue: '''muchos azotes'' sobreespecifica πληγάς'
    rationale: El griego habla de numerosos golpes infligidos, pero no identifica instrumento. El rastro POB inglés eligió 'many blows' precisamente para no fijar 'lashes'. En español, 'muchos golpes' preserva mejor esa amplitud, dejando 'azotes/latigazos/palizas' para nota.
  - severity: medium
    issue: '''con seguridad'' no expresa con suficiente precisión ἀσφαλῶς en contexto carcelario'
    rationale: Aquí no significa 'de forma segura' en abstracto ni para beneficio de los presos, sino 'de manera que no escapen'. 'Que los mantuviera bien asegurados' o 'que los custodiara bien' comunica mejor la custodia estricta.
  revised_spanish_text: Y después de haberles infligido muchos golpes[a], los echaron en la cárcel[b], ordenando al carcelero que los mantuviera bien asegurados.
  revised_footnotes:
