    text: El griego dice literalmente «pasando a Macedonia, ayúdanos»; «Pasa» transmite la fuerza idiomática del participio con el imperativo.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes menores para mejorar la naturalidad y alinear mejor el español con las decisiones auditadas del POB: «se le apareció a Pablo» por idiomaticidad, «durante la noche» por fluidez, «un hombre macedonio» para evitar el calco rígido «un cierto», y «instándolo» para reflejar mejor παρακαλῶν como exhortación/apremio más que ruego intenso. También se elimina una nota no necesaria sobre «socórrenos».'
