  text: καὶ ὅραμα ⸀διὰ νυκτὸς ⸂τῷ Παύλῳ ὤφθη⸃, ἀνὴρ ⸂Μακεδών τις ἦν⸃ ἑστὼς ⸀καὶ παρακαλῶν αὐτὸν καὶ λέγων· Διαβὰς εἰς Μακεδονίαν βοήθησον ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/009.yaml
  text: 'And a vision appeared to Paul in the night: a certain Macedonian man was standing and urging him[a], saying[c][b], “Come over into Macedonia and help us.”'
  footnotes:
