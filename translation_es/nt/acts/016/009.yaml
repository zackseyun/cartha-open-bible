translation:
  language: es
  text: 'Y durante la noche[a] una visión se le apareció a Pablo: un hombre macedonio[b] estaba de pie e instándolo, diciendo[c]: «Pasa a Macedonia y ayúdanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la noche» o «de noche».
    reason: lexical_alternative
  - marker: b
    text: O «un hombre de Macedonia».
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente «pasando a Macedonia, ayúdanos»; «Pasa» transmite la fuerza idiomática del participio con el imperativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅραμα
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - visión reveladora
  lexicon: BDAG
  rationale: «Visión» es el equivalente natural y fiel en español para un evento revelatorio como el que describe el texto; mantiene el carácter de experiencia vista sin añadir más contenido que el fuente no explicita.
- source_word: διὰ νυκτὸς
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - durante la noche
  - de noche
  lexicon: BDAG
  rationale: La frase expresa el marco temporal nocturno. «En la noche» comunica con naturalidad el tiempo de la visión, sin volverla arcaica ni perder la referencia cronológica.
- source_word: τῷ Παύλῳ ὤφθη
  english_pob_choice: appeared to Paul
  chosen_spanish: apareció a Pablo
  alternatives_spanish:
  - fue vista por Pablo
  - se le apareció a Pablo
  lexicon: BDAG
  rationale: El pasivo con dativo se rinde de forma idiomática con «apareció a Pablo», que preserva la iniciativa de la visión y evita una pasiva más pesada en español.
- source_word: ἀνὴρ Μακεδών τις
  english_pob_choice: a certain Macedonian man
  chosen_spanish: un cierto hombre macedonio
  alternatives_spanish:
  - un hombre de Macedonia
  - un macedonio
  lexicon: BDAG
  rationale: Se conserva la doble idea de indefinición («un cierto») y de especificación étnica/geográfica («macedonio»). «Hombre» mantiene el valor preciso de ἀνήρ.
- source_word: ἑστὼς
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - estaba en pie
  lexicon: BDAG
  rationale: La expresión describe la postura dentro de la visión. «Estaba de pie» reproduce bien el aspecto descriptivo y es claro en español contemporáneo.
- source_word: παρακαλῶν
  english_pob_choice: urging
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le instaba
  - le imploraba
  lexicon: BDAG
  rationale: En este contexto de petición de auxilio, «rogaba» comunica una apelación insistente y respetuosa, compatible con el matiz amplio de παρακαλέω sin endurecerlo ni hacerlo excesivamente emocional.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Es el participio introductorio normal de discurso directo; «diciendo» conserva esa función sin añadir contenido interpretativo.
- source_word: Διαβὰς εἰς Μακεδονίαν
  english_pob_choice: Come over into Macedonia
  chosen_spanish: Pasa a Macedonia
  alternatives_spanish:
  - Cruza a Macedonia
  - Pasa sobre a Macedonia
  lexicon: BDAG
  rationale: El participio aoristo con imperativo funciona como una apelación idiomática de movimiento hacia Macedonia. «Pasa a Macedonia» conserva la idea de atravesar/ir al otro lado con una formulación natural en español.
- source_word: βοήθησον ἡμῖν
  english_pob_choice: help us
  chosen_spanish: ayúdanos
  alternatives_spanish:
  - socórrenos
  - ayúdenos
  lexicon: BDAG
  rationale: El imperativo directo se traduce con la forma simple y natural «ayúdanos», que preserva la fuerza inmediata de la súplica.
theological_decisions:
- issue: Naturaleza de la experiencia nocturna
  english_pob_reading: Render as an actual vision appearance to Paul without specifying more than the text states.
  chosen_spanish_reading: Traducirla como una visión real que se le apareció a Pablo, sin precisar si fue sueño, impresión interior u otra modalidad.
  alternative_spanish_readings:
  - sueño
  - impresión interior
  - aparición objetiva
  rationale: El griego habla explícitamente de una visión que apareció a Pablo durante la noche. La traducción mantiene ese dato revelatorio sin sobreinterpretar su fenomenología.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador mantiene el mismo sentido global que el texto inglés auditado y conserva las decisiones clave sobre visión nocturna, identidad macedonia y la petición idiomática de ayuda.
  spanish_consistency_notes:
  - Se mantiene «Pablo» para Παύλῳ y no se introduce ninguna paráfrasis adicional.
  - «Visión» y «apareció» preservan el carácter revelatorio sin convertirlo en sueño.
  - «Macedonio» conserva el valor étnico/adjetival del griego, con la alternativa textual «un hombre de Macedonia» en nota.
  - La súplica final usa una forma imperativa breve y natural en español, equivalente al tono directo del original.
