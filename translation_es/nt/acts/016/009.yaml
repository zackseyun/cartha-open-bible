    text: Or “during the night” or “by night.”
    reason: lexical_alternative
  - marker: b
    text: Or “a man of Macedonia.”
    reason: lexical_alternative
  - marker: c
    text: Greek “crossing over into Macedonia, help us”; the English “Come over” conveys the idiomatic force of the participle with the imperative.
    reason: lexical_alternative
