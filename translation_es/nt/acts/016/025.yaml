translation:
  language: es
  text: A eso de la medianoche, Pablo y Silas, mientras oraban, cantaban himnos a Dios, y los prisioneros los escuchaban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los prisioneros los escuchaban atentamente». El verbo griego puede implicar una escucha atenta o ávida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ τὸ μεσονύκτιον
  english_pob_choice: Now about midnight
  chosen_spanish: A eso de la medianoche
  alternatives_spanish:
  - A medianoche
  - Alrededor de la medianoche
  - Cerca de la medianoche
  lexicon: BDAG
  rationale: La construcción con κατά + acusativo de tiempo expresa aproximación a un punto temporal; por eso conviene una fórmula idiomática como «a eso de la medianoche», que conserva la idea de aproximación sin volverla cronométrica. «Ahora» no es necesario en español y puede sonar artificial.
- source_word: Παῦλος καὶ Σιλᾶς
  english_pob_choice: Paul and Silas
  chosen_spanish: Pablo y Silas
  alternatives_spanish:
  - Pablo y Silas
  lexicon: Transliteración tradicional de nombres propios
  rationale: Se mantienen los nombres propios en su forma española usual y transparente. «Pablo» es la forma asentada en español para Παῦλος.
- source_word: προσευχόμενοι
  english_pob_choice: were praying
  chosen_spanish: mientras oraban
  alternatives_spanish:
  - orando
  - mientras estaban orando
  - mientras oraban y
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante con el verbo principal. En español, «mientras oraban» comunica con naturalidad la simultaneidad sin forzar una perífrasis pesada.
- source_word: ὕμνουν
  english_pob_choice: singing hymns
  chosen_spanish: entonaban himnos
  alternatives_spanish:
  - cantaban himnos
  - entonaban alabanzas
  - cantaban alabanzas
  lexicon: BDAG
  rationale: ὑμνέω no es mero «cantar», sino cantar himnos o alabanzas de forma específica. «Entonaban himnos» mantiene esa fuerza y suena natural en registro bíblico. Se evita «Cristo» o lenguaje litúrgico añadido porque el texto dice simplemente «a Dios».
- source_word: τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El objeto de la alabanza es θεός, y en español la preposición natural con «entonar himnos» es «a». Se conserva sin embellecer ni reinterpretar.
- source_word: ἐπηκροῶντο
  english_pob_choice: were listening
  chosen_spanish: los presos los escuchaban
  alternatives_spanish:
  - los presos escuchaban atentamente
  - los presos estaban escuchándolos
  lexicon: BDAG
  rationale: El imperfecto medio indica una escucha en curso. «Los escuchaban» es natural y mantiene la duración; el matiz de atención puede inferirse, pero no se explicita en el texto principal para no sobrecargarlo.
- source_word: οἱ δέσμιοι
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los prisioneros
  - los encarcelados
  lexicon: BDAG
  rationale: δέσμιος designa a personas detenidas o en prisión. «Presos» es una opción clara y bíblicamente comprensible en español contemporáneo, sin perder el sentido narrativo.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto griego y con el audit trail inglés: se conserva la simultaneidad de oración e himnos, y se omite una nota de ‘escucha atenta’ en el cuerpo por no ser obligatoria en la traducción principal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto griego aquí dice θεόν, no κύριος.
  - Se usa «Pablo» como forma española estándar del nombre.
  - No se añade una glosa sobre la intensidad de la escucha en el texto principal; el matiz queda implícito en el imperfecto.
