- from: A eso de la medianoche, Pablo y Silas, mientras oraban, entonaban himnos a Dios, y los presos los escuchaban.
  to: A eso de la medianoche, Pablo y Silas, mientras oraban, cantaban himnos a Dios, y los prisioneros los escuchaban[a].
  rationale: Se conserva la estructura y el sentido del borrador, pero se ajusta la expresión a un español más natural («cantaban himnos», «prisioneros») y se añade la nota léxica requerida para preservar el matiz documentado de ἐπηκροῶντο.
