review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien la escena y el valor temporal aproximado de Κατὰ δὲ τὸ μεσονύκτιον, así como la simultaneidad de la oración y el canto. También conserva correctamente «a Dios». Sin embargo, ἐπηκροῶντο tiene un matiz de escucha atenta que el rastro de auditoría inglés preserva con nota; el español actual lo omite por completo. Además, «entonaban himnos» es aceptable, pero «cantaban himnos» suena más natural y directo en español contemporáneo sin perder la especificidad de ὕμνουν.
  spanish_quality_summary: El texto es claro y digno, pero puede sonar ligeramente más natural con «cantaban himnos» que con «entonaban himnos». «Los presos» es comprensible, aunque «los prisioneros» encaja mejor con el registro narrativo bíblico amplio. La mejora principal es añadir una nota para el matiz de escucha atenta, ya que el inglés auditado lo documenta y el español también puede beneficiarse de esa precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» está bien para θεόν. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, gracia, etc. La decisión entre «presos» y «prisioneros» es estilística más que glosarial; se recomienda «prisioneros» por registro.
  issues:
  - severity: medium
    issue: Falta la nota sobre el matiz de ἐπηκροῶντο
    rationale: El expediente inglés conserva como alternativa documentada que los prisioneros escuchaban atentamente/intensamente. El borrador español no refleja ese matiz ni en el texto ni en nota, perdiendo parte de la evidencia léxica auditada.
  - severity: low
    issue: «Entonaban himnos» es algo menos natural que «cantaban himnos»
    rationale: ὕμνουν significa cantar himnos; «entonaban himnos» es correcto, pero «cantaban himnos» es más idiomático y transparente en español general sin pérdida semántica.
  - severity: low
    issue: «Los presos» puede rebajar ligeramente el registro
    rationale: Aunque correcto, «los prisioneros» suele leerse con más neutralidad y dignidad en traducción bíblica narrativa.
  revised_spanish_text: A eso de la medianoche, Pablo y Silas, mientras oraban, cantaban himnos a Dios, y los prisioneros los escuchaban[a].
  revised_footnotes:
  - marker: a
    text: O «los prisioneros los escuchaban atentamente». El verbo griego puede implicar una escucha atenta o ávida.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se ajusta la expresión a un español más natural («cantaban himnos», «prisioneros») y se añade la nota léxica requerida para preservar el matiz documentado de ἐπηκροῶντο.
