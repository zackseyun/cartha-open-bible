base_translation:
  language: en
  yaml_path: translation/nt/acts/016/039.yaml
  text: And they came and appealed to them[a], and after leading them out[b], they asked them to leave the city.
  footnotes:
  - marker: a
    text: Or 'urged them' or 'entreated them'; the Greek verb can also mean 'comforted' in other contexts, but here it likely carries a conciliatory sense after the magistrates' mistreatment of Paul and Silas.
    reason: lexical_alternative
  - marker: b
    text: 'The verb ''asked'' is imperfect in Greek, which may imply repeated or continued asking: ''they were asking'' or ''they kept asking.'''
    reason: lexical_alternative
