translation:
  language: es
  text: Y vinieron y les rogaron[a], y después de sacarlos, les pidieron[b] que se fueran de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les instaron» o «les hicieron una petición apremiante»; el verbo griego también puede significar «consolar» en otros contextos, pero aquí probablemente lleva un matiz conciliador después del maltrato que Pablo y Silas habían recibido.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo está en imperfecto en griego, lo cual puede sugerir petición repetida o continua: «les pedían» o «seguían pidiéndoles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de los magistrados. «Vinieron» reproduce con naturalidad el movimiento de llegada sin forzar una estructura participial pesada en español.
- source_word: παρεκάλεσαν
  english_pob_choice: appealed to
  chosen_spanish: les rogaron
  alternatives_spanish:
  - les suplicaron
  - les instaron
  - les pidieron con insistencia
  - les apelaron
  lexicon: BDAG
  rationale: En este contexto conciliatorio y deferente, después del maltrato previo a Pablo y Silas, «les rogaron» transmite mejor la fuerza persuasiva y apaciguadora que un simple «pidieron». Mantiene la amplitud semántica de παρακαλέω sin volverlo pastoralmente «consolar».
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Pronombre objeto indirecto natural en español para referirse a Pablo y Silas; evita repetición y conserva la referencia clara.
- source_word: ἐξαγαγόντες
  english_pob_choice: after leading them out
  chosen_spanish: después de sacarlos
  alternatives_spanish:
  - después de llevarlos fuera
  - habiéndolos sacado
  - al sacarlos
  lexicon: BDAG
  rationale: El aoristo participial se vierte de forma temporal con «después de», preservando el orden de acciones. «Sacarlos» comunica el movimiento físico fuera del lugar de custodia de manera idiomática.
- source_word: ἠρώτων
  english_pob_choice: they asked
  chosen_spanish: les pidieron
  alternatives_spanish:
  - les solicitaron
  - les rogaban
  - les pedían
  lexicon: BDAG
  rationale: El imperfecto puede sugerir petición repetida o insistente. «Les pidieron» es claro en español y, en contexto, el matiz de insistencia queda apoyado por el resto de la escena. Alternativamente, «les rogaban» podría reflejar mejor la continuidad verbal, pero aquí se prefiere la transparencia narrativa.
- source_word: ἀπελθεῖν ἀπὸ τῆς πόλεως
  english_pob_choice: to leave the city
  chosen_spanish: que se fueran de la ciudad
  alternatives_spanish:
  - que salieran de la ciudad
  - que abandonaran la ciudad
  - que partieran de la ciudad
  lexicon: BDAG
  rationale: La infinitiva expresa el contenido de la petición. «Que se fueran de la ciudad» es español contemporáneo, natural y fiel al sentido de irse/partir fuera de la ciudad.
translation_notes:
  revision_awareness: Coincide sustancialmente con el inglés POB auditado. Se mantiene la lectura conciliatoria de παρακαλέω, el valor iterativo posible del imperfecto ἠρώτων, y la secuencia participial en español sin sobrecargarla con un calco demasiado rígido.
  spanish_consistency_notes:
  - Se usa «les rogaron» para mantener la fuerza deferente de παρακαλέω en este contexto.
  - Se evita «consolaron» porque, aunque posible léxicamente en otros contextos, aquí desdibujaría la escena judicial y conciliatoria.
  - Se conserva «ciudad» sin especificación adicional, ya que el griego solo dice τῆς πόλεως y el contexto ya identifica la localidad.
