translation:
  language: es
  text: 'Pero Pablo gritó[a] a gran voz, diciendo: «No te hagas ningún mal, porque todos estamos aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te hagas daño». La expresión griega es más amplia literalmente: «No hagas nada malo a ti mismo», pero en contexto se refiere a la autolesión que el carcelero pensaba cometer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφώνησεν
  english_pob_choice: shouted
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El aoristo de φωνέω aquí expresa una llamada fuerte y urgente en una situación crítica. «Gritó» comunica bien esa intensidad en español natural sin diluir la escena.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo inmediato desde la intención del carcelero al llamado de Pablo. «Pero» conserva ese contraste o interrupción.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con voz alta
  lexicon: BDAG
  rationale: 'La frase dativa se vierte de modo natural como manera: «con voz fuerte». Mantiene el matiz concreto de voz elevada sin sonar forzado en español.'
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el contenido del discurso de Pablo. «Diciendo» conserva la relación verbal sin añadir una coordinación que el griego no requiere.
- source_word: Μηδὲν πράξῃς σεαυτῷ κακόν
  english_pob_choice: Do not do yourself any harm
  chosen_spanish: No te hagas ningún mal
  alternatives_spanish:
  - No te dañes
  - No hagas nada malo contra ti
  lexicon: BDAG
  rationale: 'La expresión griega es más amplia literalmente: «no hagas nada malo a/contra ti mismo». En contexto apunta al daño que el carcelero iba a infligirse. «No te hagas ningún mal» preserva el sentido amplio y el reflejo de la acción sobre sí mismo.'
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - todos los que estamos aquí
  lexicon: BDAG
  rationale: ἅπαντες enfatiza totalidad. «Todos» es la equivalencia directa y suficiente en este contexto.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la razón del mandato. En español, «porque» expresa con claridad esa relación explicativa causal.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - aquí mismo
  lexicon: BDAG
  rationale: El adverbio señala ubicación inmediata. «Aquí» es la forma más natural y directa en español.
- source_word: ὁ Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se usa la forma española estándar del nombre propio.
theological_decisions:
- issue: Énfasis en la autolesión del carcelero
  english_pob_reading: Do not do yourself any harm
  chosen_spanish_reading: No te hagas ningún mal
  alternative_spanish_readings:
  - No te dañes
  - No hagas nada malo contra ti
  rationale: La frase no introduce una categoría moral abstracta, sino una intervención urgente ante una autolesión inminente. La opción española conserva tanto la amplitud literal como la aplicación contextual.
  doctrine_reference: Narrative ethics / immediate context
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y el audit trail inglés de la POB, conservando la intensidad de la orden y la explicación causal. No se reportan revisiones aplicadas en el pasaje base; la redacción propuesta ajusta solo la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Pablo» como forma estándar del nombre propio.
  - Se usa «porque» para γάρ según su función explicativa.
  - La nota a pie conserva la tensión entre el sentido literal amplio y la referencia contextual a la autolesión.
  - El texto evita un giro demasiado idiomático que borraría el valor reflexivo de σεαυτῷ.
