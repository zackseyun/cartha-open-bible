    text: También puede entenderse como «por causa de los judíos» o «por los judíos».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «pues todos sabían que su padre era un griego»; el griego puede señalar aquí la identidad no judía del padre de Timoteo.'
    reason: cultural_note
