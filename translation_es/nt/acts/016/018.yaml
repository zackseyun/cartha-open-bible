    reason: lexical_alternative
  revision_rationale: Se ajustó «hacia el espíritu» a «al espíritu» para reflejar con más precisión τῷ πνεύματι y para alinear el texto con la nota léxica y el rastro POB. También se cambió «en aquella misma hora» por «en esa misma hora» para un español más natural que conserve la inmediatez de αὐτῇ τῇ ὥρᾳ.
