  text: τοῦτο δὲ ἐποίει ἐπὶ πολλὰς ἡμέρας. διαπονηθεὶς ⸀δὲ Παῦλος καὶ ἐπιστρέψας τῷ πνεύματι εἶπεν· Παραγγέλλω σοι ⸀ἐν ὀνόματι Ἰησοῦ Χριστοῦ ἐξελθεῖν ἀπ’ αὐτῆς· καὶ ἐξῆλθεν αὐτῇ τῇ ὥρᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/018.yaml
  text: And she kept doing this for many days[a]. But Paul, becoming greatly troubled, turned to the spirit and said[b], “I command you in the name of Jesus Messiah to come out of her.” And it came out that very hour.
  footnotes:
  - marker: a
    text: Or, “in the name of Jesus Christ.” The Greek title Χριστός is rendered “Messiah” here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Greek simply, “to the spirit”; the context identifies it as the spirit afflicting the slave girl.
    reason: lexical_alternative
