translation:
  language: es
  text: 'Y ella seguía haciendo esto por muchos días[a]. Pero Pablo, profundamente turbado, se volvió al espíritu y dijo[b]: «Te ordeno en el nombre de Jesús Mesías que salgas de ella». Y salió en esa misma hora.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguía haciéndolo por muchos días». El imperfecto griego expresa acción continua o repetida.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «al espíritu». El contexto muestra que se trata del espíritu que afligía a la esclava.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίει ἐπὶ πολλὰς ἡμέρας
  english_pob_choice: kept doing this for many days
  chosen_spanish: seguía haciendo esto por muchos días
  alternatives_spanish:
  - estaba haciendo esto por muchos días
  - hacía esto por muchos días
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o շարունակada en el pasado. «Seguía haciendo esto» conserva ese valor iterativo de manera natural en español, sin reducirlo a un simple pretérito puntual.
- source_word: διαπονηθεὶς
  english_pob_choice: becoming greatly troubled
  chosen_spanish: profundamente turbado
  alternatives_spanish:
  - muy molesto
  - sumamente angustiado
  - profundamente afligido
  lexicon: BDAG
  rationale: El participio indica que Pablo llega a un estado de fuerte agitación interior. «Profundamente turbado» transmite la intensidad sin introducir de más una lectura específica de ira o cansancio.
- source_word: ἐπιστρέψας
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - volvió la vista
  lexicon: BDAG
  rationale: El participio aoristo describe una reorientación previa al habla. En español, «se volvió» es conciso y conserva el movimiento físico implícito.
- source_word: τῷ πνεύματι
  english_pob_choice: to the spirit
  chosen_spanish: hacia el espíritu
  alternatives_spanish:
  - al espíritu
  - al espíritu inmundo
  - al demonio
  lexicon: BDAG
  rationale: El griego dice literalmente «al espíritu», sin calificativo. Mantener «el espíritu» preserva la primacía del texto; «hacia» refleja bien el verbo de giro y evita añadir una especificación que el verso no expresa.
- source_word: Παραγγέλλω σοι
  english_pob_choice: I command you
  chosen_spanish: Te ordeno
  alternatives_spanish:
  - Te mando
  - Te comando
  lexicon: BDAG
  rationale: παραγγέλλω es una instrucción con autoridad. «Te ordeno» comunica con claridad el acto directivo y su fuerza imperativa en español.
- source_word: ἐν ὀνόματι Ἰησοῦ Χριστοῦ
  english_pob_choice: in the name of Jesus Messiah
  chosen_spanish: en el nombre de Jesús Mesías
  alternatives_spanish:
  - en el nombre de Jesús Cristo
  - en el nombre de Jesucristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como simple nombre propio. «Mesías» preserva ese valor titular y sigue el criterio POB para evitar ocultar el sentido del término griego.
- source_word: ἐξελθεῖν ἀπ’ αὐτῆς
  english_pob_choice: to come out of her
  chosen_spanish: que salgas de ella
  alternatives_spanish:
  - que salgas fuera de ella
  - que salgas de su interior
  lexicon: BDAG
  rationale: En un contexto de expulsión espiritual, «salir de ella» es idiomático y fiel. Se opta por una subordinada exhortativa natural en español, manteniendo el valor de expulsión.
- source_word: ἐξῆλθεν αὐτῇ τῇ ὥρᾳ
  english_pob_choice: it came out that very hour
  chosen_spanish: salió en aquella misma hora
  alternatives_spanish:
  - salió en esa misma hora
  - salió al instante
  lexicon: BDAG
  rationale: La frase griega indica cumplimiento inmediato. «En aquella misma hora» preserva el matiz temporal y el tono del relato sin exagerar con una fórmula distinta.
theological_decisions:
- issue: Rendering of Χριστοῦ in the authority formula ἐν ὀνόματι Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: Se mantiene el valor de título de Χριστός, conforme al criterio POB para términos en disputa. En español, «Mesías» comunica mejor la referencia mesiánica de Jesús que una forma convertida en nombre fijo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Whether to specify the spirit as demonic in the main text
  english_pob_reading: the spirit
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el espíritu malo
  - el demonio
  - el espíritu inmundo
  rationale: El verso usa πνεῦμα sin adjetivo. Para no añadir contenido no explicitado en la línea inmediata, la traducción conserva «el espíritu»; el contexto narrativo ya permite identificarlo.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve what the source text states'
translation_notes:
  revision_awareness: La redacción española refleja la revisión más reciente del auditorio inglés, especialmente la preferencia por conservar el valor aspectual del participio διαπονηθεὶς y por mantener Χριστός con sentido titular. También se evitó una traducción que ocultara el término πνεῦμα tras una especificación no presente en el griego.
  spanish_consistency_notes:
  - Se mantiene «Jesús Mesías» para Χριστοῦ, en coherencia con el criterio terminológico del proyecto.
  - «Espíritu» no se mayusculiza porque el texto griego no indica explícitamente el Espíritu Santo; aquí se trata del espíritu afligente del relato.
  - La construcción «se volvió hacia el espíritu» conserva el gesto narrativo de ἐπιστρέψας sin introducir una explicación interpretativa en el cuerpo del texto.
