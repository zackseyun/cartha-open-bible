translation:
  language: es
  text: 'Y cuando llegó el día, los magistrados enviaron a los portadores de varas[a], diciendo: «Suelta a aquellos hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lictores», los asistentes oficiales de los magistrados romanos que llevaban varas como símbolos de autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμέρας δὲ γενομένης
  english_pob_choice: And when day came
  chosen_spanish: Y cuando llegó el día
  alternatives_spanish:
  - Cuando fue de día
  - Al amanecer
  - Y cuando amaneció
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca un cambio temporal. «Y cuando llegó el día» conserva el valor temporal y el enlace de δὲ con una frase natural en español.
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω expresa el envío de los funcionarios; «enviaron» es natural y fiel, sin añadir matiz administrativo excesivo.
- source_word: στρατηγοὶ
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - pretores
  - magistrados principales
  lexicon: BDAG
  rationale: En el contexto colonial de Filipos se trata de oficiales cívicos romanos. «Magistrados» reproduce bien la función sin confundirlos con generales militares.
- source_word: ῥαβδούχους
  english_pob_choice: rod-bearers
  chosen_spanish: rabaducos
  alternatives_spanish:
  - lictores
  - portadores de vara
  lexicon: BDAG
  rationale: Se mantiene la imagen concreta de «portadores de vara» mediante un equivalente transliterado funcional, y se documenta la opción histórica precisa «lictores» en la nota.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con este mensaje
  - indicando
  lexicon: BDAG
  rationale: El participio presenta el contenido del mensaje; «diciendo» conserva de manera directa esa relación sintáctica.
- source_word: Ἀπόλυσον
  english_pob_choice: Release
  chosen_spanish: Suelta
  alternatives_spanish:
  - Libera
  - Déjalos ir
  lexicon: BDAG
  rationale: El imperativo se dirige a la liberación de los presos. «Suelta» es breve, imperativo y apropiado para una orden custodial; «libera» también sería posible, pero suena más abstracto.
- source_word: τοὺς ἀνθρώπους ἐκείνους
  english_pob_choice: those men
  chosen_spanish: aquellos hombres
  alternatives_spanish:
  - esas personas
  - aquellos presos
  lexicon: BDAG
  rationale: ἄνθρωποι aquí refiere a Pablo y Silas como varones concretos. «Aquellos hombres» conserva el demostrativo y la precisión de género.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra cambios recientes y el veredicto de revisión es de alta concordancia; por ello, el borrador español sigue de cerca las decisiones léxicas ya estabilizadas, adaptándolas a un español natural y publicable sin introducir variantes interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «magistrados» para στρατηγοί, en armonía con la decisión inglesa y con el contexto romano colonial.
  - Se conserva la concreción de ῥαβδούχους con una forma transliterada en el texto y una nota explicativa con «lictores» como alternativa histórica.
  - «Aquellos hombres» refleja con exactitud el demostrativo ἐκείνους y el valor masculino plural de ἀνθρώπους en este contexto.
