review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: transición temporal, envío de los mensajeros oficiales, y la orden de liberar a Pablo y Silas. «Magistrados», «enviaron», «diciendo» y «aquellos hombres» están alineados con el texto fuente y con el rastro de auditoría en inglés. Sin embargo, la traducción de ῥαβδούχους como «rabaducos» no es español estándar ni una forma reconocible para lectores amplios; además, el anclaje de nota está mal colocado dentro de la palabra.'
  spanish_quality_summary: La frase es generalmente natural y legible, pero «[a]rabaducos» es un problema serio de legibilidad y corrección léxica. En español eclesial general conviene usar una expresión transparente en el texto principal, con la alternativa técnica en nota. «Portadores de varas[a]» conserva la imagen concreta del griego y suena natural. El resto del verso está bien puntuado y fluye con claridad.
  glossary_alignment: No hay términos teológicos sensibles aquí. La decisión principal relevante del glosario/proyecto es preservar el valor léxico de ῥαβδούχους; «portadores de varas[a]» lo mantiene mejor que una transliteración no asentada, y la nota puede conservar «lictores» como alternativa histórica precisa, en línea con el POB inglés.
  issues:
  - severity: high
    issue: «rabaducos» no es una forma española clara ni estable para ῥαβδούχους
    rationale: El POB inglés eligió un equivalente literal accesible ('rod-bearers') y reservó 'lictors' para nota. En español, «rabaducos» no cumple esa función accesible y puede confundir al lector.
  - severity: medium
    issue: El marcador de nota [a] está incrustado dentro de la palabra
    rationale: 'Las instrucciones requieren que el marcador aparezca en la palabra o frase pertinente, pero no debe romper la ortografía. Debe colocarse después de la frase: «portadores de varas[a]».'
  - severity: low
    issue: La nota actual es correcta en contenido, pero debe corresponder a la nueva expresión principal
    rationale: Al cambiar el texto principal a una opción transparente, la nota debe seguir presentando «lictores» como alternativa histórica precisa.
  revised_spanish_text: 'Y cuando llegó el día, los magistrados enviaron a los portadores de varas[a], diciendo: «Suelta a aquellos hombres».'
  revised_footnotes:
