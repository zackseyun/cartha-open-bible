translation:
  language: es
  text: Entonces[a], después de zarpar desde Troas, navegamos en línea recta a Samotracia, y al día siguiente a Neápolis,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de hacernos a la mar desde Troas, navegamos directamente a Samotracia».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχθέντες
  english_pob_choice: after putting out to sea
  chosen_spanish: después de zarpar
  alternatives_spanish:
  - después de poner rumbo al mar
  - después de hacernos a la mar
  lexicon: BDAG
  rationale: El participio de ἀνάγω en contexto náutico significa iniciar la navegación o hacerse a la mar. «Zarpar» comunica naturalmente ese sentido en español sin perder la secuencia participial.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca progreso narrativo; «Así que» suena natural en español actual y conserva la conexión discursiva.
- source_word: ἀπὸ Τρῳάδος
  english_pob_choice: from Troas
  chosen_spanish: desde Troas
  alternatives_spanish:
  - de Troas
  lexicon: BDAG
  rationale: La preposición expresa punto de partida; «desde» lo hace explícito y fluido en español.
- source_word: εὐθυδρομήσαμεν
  english_pob_choice: we sailed straight
  chosen_spanish: navegamos en línea recta
  alternatives_spanish:
  - hicimos una travesía directa
  - zarpamos en curso recto
  lexicon: BDAG
  rationale: El verbo indica navegar con rumbo recto. «Navegamos en línea recta» conserva la idea direccional con claridad, sin tecnicismo innecesario.
- source_word: εἰς Σαμοθρᾴκην
  english_pob_choice: to Samothrace
  chosen_spanish: hasta Samotracia
  alternatives_spanish:
  - a Samotracia
  lexicon: BDAG
  rationale: «Hasta» expresa destino dentro del itinerario y funciona bien en español narrativo; el nombre se translitera como topónimo.
- source_word: τῇ δὲ ἐπιούσῃ
  english_pob_choice: and on the following day
  chosen_spanish: y al día siguiente
  alternatives_spanish:
  - y el día siguiente
  - y al día próximo
  lexicon: BDAG
  rationale: La expresión temporal dativa significa «al día siguiente»; es la formulación más natural en español y mantiene el encadenamiento del viaje.
- source_word: εἰς Νέαν Πόλιν
  english_pob_choice: to Neapolis
  chosen_spanish: hasta Neápolis
  alternatives_spanish:
  - a Neápolis
  - hasta la Ciudad Nueva
  lexicon: BDAG
  rationale: Aunque los elementos griegos significan «Ciudad Nueva», aquí funcionan como nombre propio; se conserva la transliteración establecida «Neápolis».
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca exactamente en el texto español, anclado a «Así que[a]». Se preservó el valor náutico de Ἀναχθέντες y εὐθυδρομήσαμεν sin traducir mecánicamente desde el inglés.
  spanish_consistency_notes:
  - Se usa «Troas», «Samotracia» y «Neápolis» como topónimos transliterados consistentes con el corpus.
  - Se mantiene el ritmo de relato de viajes con conectores breves y naturales en español.
  - No se introducen términos doctrinales ni equivalentes tradicionales no requeridos por el griego.
