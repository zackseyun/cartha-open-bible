translation:
  language: es
  text: 'Y cuando ella y su familia fueron bautizadas, nos rogó, diciendo: «Si me han juzgado fiel[a] al Señor, entren en mi casa y quédense». Y nos persuadió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si me consideran creyente en el Señor». El adjetivo griego puede significar «fiel», «confiable» o «creyente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y después que
  lexicon: BDAG
  rationale: La combinación temporal con δέ se expresa naturalmente en español con «Y cuando», manteniendo la secuencia narrativa sin añadir matices innecesarios.
- source_word: ἐβαπτίσθη καὶ ὁ οἶκος αὐτῆς
  english_pob_choice: she and her household were baptized
  chosen_spanish: ella y su casa fueron bautizadas
  alternatives_spanish:
  - ella y su familia fueron bautizadas
  - ella y su hogar fueron bautizados
  lexicon: BDAG
  rationale: El texto griego usa οἶκος en sentido de grupo doméstico; «casa» conserva ese valor social y narrativo en español. El plural pasivo refleja el alcance de la acción sobre Lydia y su casa, como en la auditable decisión inglesa.
- source_word: παρεκάλεσεν
  english_pob_choice: she urged us
  chosen_spanish: nos rogó
  alternatives_spanish:
  - nos pidió
  - nos insistió
  - nos invitó
  lexicon: BDAG
  rationale: Παρακαλέω aquí implica una súplica insistente en contexto de hospitalidad; «nos rogó» comunica mejor esa mezcla de ruego e insistencia que un simple «pidió».
- source_word: Εἰ κεκρίκατέ με πιστὴν τῷ κυρίῳ εἶναι
  english_pob_choice: If you have judged me to be faithful to the Lord
  chosen_spanish: Si me han juzgado fiel al Señor
  alternatives_spanish:
  - Si me consideran creyente en el Señor
  - Si me han hallado fiel al Señor
  lexicon: BDAG
  rationale: «Han juzgado» preserva el perfecto griego como valoración ya establecida. «Fiel al Señor» conserva πιστή como lealtad/fiabilidad religiosa, evitando cerrar el sentido únicamente a «creyente».
- source_word: πιστὴν
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - creyente
  - confiable
  lexicon: BDAG
  rationale: «Fiel» es la opción española más natural para πιστή en este contexto y mantiene la tensión semántica entre fidelidad y fe profesada, sin reducirla a una sola lectura doctrinal.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Jesús
  - al dueño
  lexicon: BDAG
  rationale: Se conserva «Señor» para κύριος porque el contexto cristiano inmediato y la fórmula relacional con πιστή requieren el título. «Al» expresa adecuadamente la relación dativa en español.
- source_word: εἰσελθόντες εἰς τὸν οἶκόν μου
  english_pob_choice: come into my house
  chosen_spanish: entren en mi casa
  alternatives_spanish:
  - pasen a mi casa
  - vengan a mi casa
  lexicon: BDAG
  rationale: El participio aoristo se vierte como mandato implícito en español, conforme al valor exhortativo de la invitación. «Entren» suena natural y conserva el movimiento hacia dentro del hogar físico.
- source_word: μένετε
  english_pob_choice: stay
  chosen_spanish: quédense
  alternatives_spanish:
  - permanezcan
  - alójense
  lexicon: BDAG
  rationale: «Quédense» es la forma más idiomática en español moderno para la invitación a permanecer en la casa; preserva el sentido de alojamiento sin volverlo demasiado formal.
- source_word: παρεβιάσατο ἡμᾶς
  english_pob_choice: she prevailed upon us
  chosen_spanish: nos insistió con tanta fuerza que cedimos
  alternatives_spanish:
  - nos persuadió
  - nos obligó
  lexicon: BDAG
  rationale: El verbo expresa fuerte presión o insistencia, no mera persuasión suave. La redacción elegida comunica ese empuje sin llegar a «obligó», que sería demasiado fuerte para el contexto.
theological_decisions:
- issue: Alcance del bautismo de la casa de Lydia
  english_pob_reading: Translate the narrative statement straightforwardly without importing implications about the age or faith-status of each household member.
  chosen_spanish_reading: Traducir la afirmación narrativa de forma directa, sin insinuar si hubo bautismo infantil o solo de creyentes profesantes.
  alternative_spanish_readings:
  - Traducir de un modo que sugiera bautismo infantil
  - Traducir de un modo que sugiera solo creyentes adultos
  rationale: El versículo informa que Lydia y su casa fueron bautizadas, pero no define la composición de la casa ni usa el texto para resolver debates sacramentales posteriores. La traducción española mantiene esa neutralidad.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de πιστὴν en la frase de Lydia
  english_pob_reading: faithful to the Lord
  chosen_spanish_reading: fiel al Señor
  alternative_spanish_readings:
  - creyente en el Señor
  - confiable ante el Señor
  rationale: '«Fiel» preserva la amplitud semántica de πιστή: fidelidad, confiabilidad y, por extensión, pertenencia creyente. Así se evita fijar una sola lectura teológica donde el griego permite más de una.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios posteriores; el estado más reciente indica que no se necesitaban modificaciones.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en armonía con la lectura cristológica del contexto.
  - Se usa «casa» para οἶκος en sentido doméstico-colectivo, no como edificio.
  - El texto conserva la distinción entre el bautismo de Lydia y su casa y la presión persuasiva de la última cláusula sin intensificarla indebidamente.
