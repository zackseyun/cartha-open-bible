translation:
  language: es
  text: Entonces[a], pasando por Misia, descendieron a Troas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo pasado por Misia» o «pasando de largo junto a Misia». El participio griego admite varias formulaciones cercanas; el sentido es que siguieron su camino sin detenerse allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρελθόντες
  english_pob_choice: passing by
  chosen_spanish: pasando por
  alternatives_spanish:
  - habiendo pasado por
  - pasando past
  - yendo de paso por
  lexicon: BDAG
  rationale: El participio aoristo aquí expresa que continuaron su ruta sin detenerse en Misia. «Pasando por» comunica ese avance de manera natural en español y conserva el matiz narrativo de desplazamiento continuo.
- source_word: δὲ
  english_pob_choice: So,
  chosen_spanish: Así,
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona como conector suave. «Así» mantiene la continuidad narrativa sin cargar el verso con una adversativa fuerte ni una simple suma mecánica.
- source_word: Μυσίαν
  english_pob_choice: Mysia
  chosen_spanish: Misia
  alternatives_spanish:
  - Mysia
  lexicon: nombre propio geográfico
  rationale: 'Se conserva el nombre propio de la región con transliteración habitual al español bíblico: «Misia». Evita una forma híbrida innecesaria y mantiene identificable el topónimo.'
- source_word: κατέβησαν
  english_pob_choice: they went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  - se dirigieron hacia abajo
  lexicon: BDAG
  rationale: El verbo griego conserva un sentido direccional de descenso. «Descendieron» mantiene ese valor con dignidad estilística; en español resulta más preciso que simplemente «fueron».
- source_word: εἰς Τρῳάδα
  english_pob_choice: to Troas
  chosen_spanish: a Troas
  alternatives_spanish:
  - hacia Troas
  - hasta Troas
  lexicon: BDAG
  rationale: Con un destino geográfico, «a» es la opción natural en español. «Troas» conserva el nombre propio estándar.
