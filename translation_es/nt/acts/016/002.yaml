lexical_decisions:
- source_word: ὃς
  english_pob_choice: He
  chosen_spanish: era
  alternatives_spanish:
  - él era
  - quien era
  lexicon: BDAG
  rationale: El relativo griego retoma a Timoteo del versículo anterior; en español, una cláusula relativa simple suena más natural que repetir un pronombre explícito. «Era» conserva la continuidad referencial del contexto inmediato.
- source_word: ἐμαρτυρεῖτο
  english_pob_choice: was well spoken of
  chosen_spanish: bien hablado
  alternatives_spanish:
  - era bien testificado
  - era bien acreditado
  - tenía buen testimonio
  lexicon: BDAG
  rationale: El imperfecto pasivo de μαρτυρέω expresa que recibía un testimonio favorable. «Bien hablado» reproduce de forma idiomática la idea de buena reputación sin perder la noción de testimonio comunitario.
- source_word: ὑπὸ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - de parte de
  - por parte de
  lexicon: BDAG
  rationale: Con un pasivo y agente personal, ὑπό se traduce naturalmente como «por» en español.
- source_word: τῶν ἐν Λύστροις καὶ Ἰκονίῳ
  english_pob_choice: in Lystra and Iconium
  chosen_spanish: en Listra y en Iconio
  alternatives_spanish:
  - de Listra y de Iconio
  - entre los de Listra y Iconio
  lexicon: BDAG
  rationale: La frase griega identifica a los hermanos ubicados en esas ciudades. Mantener «en» conserva la estructura locativa del original y evita introducir una relación diferente.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes
  - fieles hermanos
  lexicon: BDAG
  rationale: Se conserva el plural masculino griego como «hermanos», de acuerdo con la política de precisión de género. El sentido inclusivo de la comunidad creyente queda implícito y puede aclararse en nota.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφῶν en la comunidad cristiana
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: El griego usa el plural masculino ἀδελφῶν. Se mantiene esa forma en el texto principal, sin neutralizarla, y la nota explica que refiere a los creyentes de ambos sexos en esas ciudades.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; se conserva la lectura óptima ya validada en inglés, con ajuste natural al español y nota para la alternativa inclusiva.
  spanish_consistency_notes:
  - Se conservó «Listra» e «Iconio» como topónimos usuales en español.
  - «Bien hablado» se eligió para expresar la reputación favorable implícita en el pasivo de μαρτυρέω.
  - No se introdujo terminología eclesiástica ajena al texto; «hermanos» mantiene la forma gramatical del original.
