translation:
  language: es
  text: Tenía buen testimonio por parte de los hermanos en Listra y en Iconio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas», refiriéndose a los creyentes en esos lugares.
