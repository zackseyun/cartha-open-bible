translation:
  language: es
  text: Y atravesaron la región de Frigia y Galacia[b], habiéndoles prohibido el Espíritu Santo hablar la palabra en Asia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la provincia romana de Asia en el occidente de Asia Menor, no el continente moderno.
    reason: cultural_note
  - marker: b
    text: 'O posiblemente: «la región frigia y galática». La construcción griega puede entenderse como una sola designación regional.'
    reason: alternative_reading
lexical_decisions:
- source_word: Διῆλθον
  english_pob_choice: passed through
  chosen_spanish: atravesaron
  alternatives_spanish:
  - pasaron por
  - transitaron por
  lexicon: BDAG
  rationale: El aoristo de διέρχομαι expresa desplazamiento a través de una región. «Atravesaron» comunica ese movimiento con naturalidad en español y conserva el sentido direccional sin añadir detalles del itinerario.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Luego
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ introduce el avance narrativo con tono suave. «Y» es el equivalente más neutro y fluido en español.
- source_word: τὴν Φρυγίαν καὶ Γαλατικὴν χώραν
  english_pob_choice: the region of Phrygia and Galatia
  chosen_spanish: la región de Frigia y Galacia
  alternatives_spanish:
  - la región frigia y galática
  - la región frigia y de Galacia
  - la región de Frigia y la Galacia
  lexicon: BDAG
  rationale: χώρα significa «región/territorio». La construcción griega puede entenderse como una sola designación regional o como dos nombres coordinados; «la región de Frigia y Galacia» mantiene la referencia geográfica sin forzar una reconstrucción histórica más precisa de lo que el texto exige.
- source_word: κωλυθέντες
  english_pob_choice: having been forbidden
  chosen_spanish: habiendo sido impedidos
  alternatives_spanish:
  - habiendo sido prohibidos
  - siendo impedidos
  - habiendo sido frenados
  lexicon: BDAG
  rationale: El participio pasivo aoristo de κωλύω indica impedimento previo o concomitante. «Impedidos» evita una formulación demasiado jurídica como «prohibidos» y deja el matiz de restricción activa del Espíritu.
- source_word: ὑπὸ τοῦ ἁγίου πνεύματος
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo de Dios
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: La forma con artículo y adjetivo en Lucas-Hechos señala al Espíritu Santo como agente personal divino. «Espíritu Santo» es la forma idiomática y teológicamente clara en español.
- source_word: λαλῆσαι
  english_pob_choice: to speak
  chosen_spanish: de hablar
  alternatives_spanish:
  - para hablar
  - de anunciar
  - de predicar
  lexicon: BDAG
  rationale: λαλέω es el verbo general «hablar». El infinitivo español con «de hablar» se integra bien con «impedidos» y no estrecha indebidamente el verbo a «predicar».
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  - el evangelio
  lexicon: BDAG
  rationale: λόγος en Hechos suele referirse al mensaje cristiano; sin embargo, la fórmula «la palabra» reproduce el término de manera cercana y conserva la amplitud del original.
- source_word: ἐν τῇ Ἀσίᾳ
  english_pob_choice: in Asia
  chosen_spanish: en Asia
  alternatives_spanish:
  - en la provincia de Asia
  - en Asia Menor
  lexicon: BDAG
  rationale: Ἀσία aquí designa la provincia romana de Asia, no el continente moderno. El texto principal mantiene el nombre breve y reconocible; la aclaración histórica va en nota.
theological_decisions:
- issue: Agencia personal del Espíritu en la prohibición
  english_pob_reading: by the Holy Spirit
  chosen_spanish_reading: por el Espíritu Santo
  alternative_spanish_readings:
  - por el espíritu
  rationale: La lectura con artículo y adjetivo en el griego apoya una referencia al Espíritu Santo como agente personal divino. La traducción conserva esa lectura sin oscurecerla con minúsculas o con una formulación impersonal.
  doctrine_reference: Credo Niceno-Constantinopolitano (381)
- issue: Relación entre el impedimento y la misión apostólica
  english_pob_reading: having been forbidden ... to speak the word in Asia
  chosen_spanish_reading: habiendo sido impedidos ... de hablar la palabra en Asia
  alternative_spanish_readings:
  - siendo impedidos ... de hablar la palabra en Asia
  - habiendo sido prohibidos ... de hablar la palabra en Asia
  rationale: «Impedidos» conserva el hecho de la restricción sin exagerar más allá de lo que el participio exige. No se especifica aquí el modo del impedimento; el texto solo afirma que el Espíritu Santo actuó para impedir ese habla en Asia.
  doctrine_reference: Hechos 16:6; lectura narrativa de la guía del Espíritu
translation_notes:
  revision_awareness: Se revisó el orden de los modificadores para mantener fluidez en español y se prefirió «habiendo sido impedidos» frente a una calca más rígida, sin perder el valor pasivo del participio ni la agencia del Espíritu Santo. La nota geográfica de Asia se mantiene por claridad histórica; la ambigüedad de la sintaxis regional se conserva en nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu Santo» para la tercera persona divina, en consonancia con el criterio del proyecto.
  - Se usó «palabra» para λόγος, siguiendo la opción auditada del inglés POB y sin estrecharla a «evangelio».
  - «Asia» se conserva como nombre propio del texto con aclaración histórica en nota, evitando un reemplazo interpretativo en el cuerpo del versículo.
  - La puntuación y el orden mantienen un registro bíblico claro y publicable en español neutro.
