translation:
  language: es
  text: También llegó a Derbe y a Listra. Y he aquí, cierto discípulo estaba allí[a], llamado Timoteo, hijo de una mujer judía creyente[b], pero de padre griego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había allí un cierto discípulo».
    reason: previous_rendering
  - marker: b
    text: O «el hijo de una mujer judía fiel». El adjetivo griego puede significar tanto «creyente» como «fiel», aunque en Hechos aquí es más probable el sentido «creyente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατήντησεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  - fue hasta
  lexicon: BDAG
  rationale: El verbo καταντάω en este contexto narrativo expresa llegada a un lugar. «Llegó» es natural en español y conserva la idea de arribo sin añadir matices de dirección o progreso que el griego no exige.
- source_word: δὲ καὶ
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  - Y
  lexicon: BDAG
  rationale: La partícula combinada introduce continuidad con adición. «También» reproduce esa continuidad en español de forma fluida.
- source_word: εἰς Δέρβην καὶ εἰς Λύστραν
  english_pob_choice: to Derbe and to Lystra
  chosen_spanish: a Derbe y a Listra
  alternatives_spanish:
  - hacia Derbe y hacia Listra
  - a Derbe y Listra
  lexicon: BDAG
  rationale: Con nombres de lugar en relato de viaje, εἰς se vierte bien con «a». La repetición de la preposición en español sería posible, pero aquí la construcción única mantiene naturalidad sin perder el sentido de destino.
- source_word: ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí
  - Y se vio
  lexicon: BDAG
  rationale: «He aquí» conserva el valor discursivo de atención y vividez del griego. Con la conjunción inicial, «Y he aquí» reproduce el tono enfático del original.
- source_word: μαθητής τις
  english_pob_choice: a certain disciple
  chosen_spanish: cierto discípulo
  alternatives_spanish:
  - un discípulo
  - un cierto discípulo
  - cierto seguidor
  lexicon: BDAG
  rationale: «τις» introduce a una persona específica pero aún no conocida. «Cierto discípulo» mantiene esa indefinición identificadora y evita volver genérico el término μαθητής.
- source_word: ἦν ἐκεῖ
  english_pob_choice: a certain disciple was there
  chosen_spanish: había allí
  alternatives_spanish:
  - estaba allí
  - había allí un discípulo
  lexicon: BDAG
  rationale: La función existencial de ἦν se expresa con naturalidad mediante «había». «Allí» conserva ἐκεῖ, y la construcción evita una repetición innecesaria en español mientras sigue indicando presencia en ese lugar.
- source_word: ὀνόματι Τιμόθεος
  english_pob_choice: named Timothy
  chosen_spanish: llamado Timoteo
  alternatives_spanish:
  - de nombre Timoteo
  - nombrado Timoteo
  lexicon: BDAG
  rationale: La fórmula dativa con ὀνόματι se vierte idiomáticamente como «llamado». Es una solución clara y fiel, de uso natural en español bíblico contemporáneo.
- source_word: υἱὸς γυναικὸς Ἰουδαίας πιστῆς
  english_pob_choice: the son of a believing Jewish woman
  chosen_spanish: hijo de una mujer judía creyente
  alternatives_spanish:
  - hijo de una mujer judía fiel
  - hijo de una mujer judía que creía
  lexicon: BDAG
  rationale: Se conserva el adjetivo πιστῆς con el sentido de fe personal. «Creyente» comunica mejor que «fiel» la pertenencia a la fe en este contexto de Hechos, y «mujer judía» refleja el orden y la relación del genitivo.
- source_word: πιστῆς
  english_pob_choice: believing
  chosen_spanish: creyente
  alternatives_spanish:
  - fiel
  - que cree
  lexicon: BDAG
  rationale: En Hechos, πιστός suele señalar a una persona que cree. «Creyente» mantiene esa lectura y evita debilitar la referencia a la fe cristiana de la madre de Timoteo.
- source_word: πατρὸς δὲ Ἕλληνος
  english_pob_choice: but of a Greek father
  chosen_spanish: pero de padre griego
  alternatives_spanish:
  - pero su padre era griego
  - y de padre griego
  lexicon: BDAG
  rationale: La frase griega es elíptica y contrasta con la cláusula anterior. «Pero de padre griego» conserva la brevedad y el contraste introducido por δέ, sin expandir más de lo que el texto dice.
- source_word: Ἕλληνος
  english_pob_choice: Greek
  chosen_spanish: griego
  alternatives_spanish:
  - heleno
  - gentil
  lexicon: BDAG
  rationale: Ἕλλην aquí designa identidad étnico-cultural griega. «Griego» es la correspondencia directa y evita la categoría más amplia y menos precisa de «gentil».
theological_decisions:
- issue: Sentido de πιστῆς aplicado a la madre de Timoteo
  english_pob_reading: believing Jewish woman
  chosen_spanish_reading: mujer judía creyente
  alternative_spanish_readings:
  - mujer judía fiel
  - mujer judía que creía
  rationale: El contexto de Hechos favorece entender πιστός como pertenencia a la fe, no solo como cualidad moral. «Creyente» preserva esa fuerza teológica y armoniza con la presentación de Timoteo como discípulo.
  doctrine_reference: Acts 16:1; uso de πιστός/πίστις en Hechos
translation_notes:
  revision_awareness: El texto español sigue el paquete griego SBLGNT y toma como contexto auditado la solución inglesa POB (optimal-equivalence), especialmente en la traducción de κατήντησεν, ἰδού, ὀνόματι, πιστῆς y la cláusula elíptica πατρὸς δὲ Ἕλληνος. Se evita una traducción mecánica del inglés cuando el español puede expresar mejor la construcción existencial y el contraste sin perder el contenido.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo.
  - Se mantiene «discípulo» para μαθητής, conforme al uso bíblico estándar.
  - «Creyente» se prefiere sobre «fiel» por el contexto de Hechos y la referencia a la fe.
  - La cláusula existencial se resuelve con «había allí» para sonar natural en español y conservar ἐκεῖ.
  - «Griego» se conserva como identidad étnico-cultural, no como categoría teológica de «gentil».
