revisions:
- from: 'Y el carcelero comunicó estos [a] a Pablo: «Los magistrados han enviado decir que pueden ser liberados. Así que ahora[b], salgan y vayan en paz».'
  to: 'Y el carcelero comunicó estas palabras[a] a Pablo: «Los magistrados[b] han mandado decir que ustedes sean puestos en libertad. Así que ahora, salgan y vayan en paz».'
  rationale: La revisión corrige una construcción agramatical («estos» sin sustantivo), reemplaza una expresión poco idiomática («han enviado decir») por una formulación española natural que conserva el carácter oficial del mensaje («han mandado decir»), y restaura mejor la fuerza de la cláusula pasiva dirigida a Pablo y Silas («que ustedes sean puestos en libertad»). También se mantiene la nota léxica y la nota cultural con anclajes correctos.
