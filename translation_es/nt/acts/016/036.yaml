translation:
  language: es
  text: 'Y el carcelero comunicó estas palabras[a] a Pablo: «Los magistrados[b] han mandado decir que ustedes sean puestos en libertad. Así que ahora, salgan y vayan en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este mensaje». El griego dice literalmente «estas palabras»; en español también puede entenderse como la comunicación completa transmitida por el carcelero.
    reason: lexical_alternative
  - marker: b
    text: «Magistrados» traduce στρατηγοί, las autoridades cívicas de Filipos; más técnicamente, «pretores».
    reason: cultural_note
lexical_decisions:
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: comunicó
  alternatives_spanish:
  - reportó
  - dio aviso
  lexicon: BDAG
  rationale: El verbo griego expresa el acto de relatar o transmitir una noticia. «Comunicó» conserva el sentido de informar con naturalidad en español, sin cargar el tono más de «reportó» ni diluirlo en un simple «dijo».
- source_word: δεσμοφύλαξ
  english_pob_choice: jailer
  chosen_spanish: carcelero
  alternatives_spanish:
  - guardián de la cárcel
  - guarda
  lexicon: BDAG
  rationale: En este contexto se trata del encargado de la prisión. «Carcelero» es preciso, claro y idiomático en español; «guarda» sería demasiado general.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estos [a]
  alternatives_spanish:
  - este mensaje
  - estas palabras
  lexicon: BDAG
  rationale: 'El griego dice literalmente «estas palabras», pero en español el complemento directo necesita un sustantivo explícito para que la frase no suene truncada. Se usa un anclaje de nota para mantener la tensión entre literalidad y claridad: «estos» remite a λόγους τούτους, mientras la nota explica la opción idiomática de entenderlo como mensaje.'
- source_word: πρὸς τὸν Παῦλον
  english_pob_choice: to Paul
  chosen_spanish: a Pablo
  alternatives_spanish:
  - para Pablo
  lexicon: BDAG
  rationale: La preposición πρός con verbo de comunicación introduce dirección hacia el destinatario. «A Pablo» es la equivalencia natural y directa en español.
- source_word: Ἀπέσταλκαν
  english_pob_choice: have sent word
  chosen_spanish: han enviado decir
  alternatives_spanish:
  - han enviado
  - han mandado
  lexicon: BDAG
  rationale: El perfecto indica una acción ya realizada con efecto presente. Como el objeto de «enviar» queda implícito en griego, «han enviado decir» conserva la idea de un mensaje u orden transmitida sin forzar una expansión excesiva. Se evita esconder la implicación oficial del envío.
- source_word: οἱ στρατηγοὶ
  english_pob_choice: the magistrates
  chosen_spanish: los magistrados
  alternatives_spanish:
  - los pretores
  - las autoridades
  lexicon: BDAG
  rationale: En Filipos, στρατηγοί alude a las autoridades cívicas romanas. «Magistrados» es la opción más clara e idiomática en español, manteniendo el rango oficial sin recurrir a un tecnicismo innecesario.
- source_word: ἵνα ἀπολυθῆτε
  english_pob_choice: that you may be released
  chosen_spanish: que pueden ser liberados
  alternatives_spanish:
  - que sean liberados
  - para que sean puestos en libertad
  lexicon: BDAG
  rationale: La cláusula ἵνα expresa el contenido de la orden. Se opta por una formulación española fluida que conserva la idea de liberación. Aunque el griego es segunda persona plural pasiva, en español se traduce de forma natural con un sentido impersonal/plural para mantener la referencia a los prisioneros sin rigidizar el sintagma.
- source_word: νῦν οὖν
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora pues
  - Por tanto, ahora
  lexicon: BDAG
  rationale: La secuencia tiene fuerza inferencial y de transición. «Así que ahora» reproduce bien ese paso lógico en español contemporáneo, con un tono claro y oral.
- source_word: ἐξελθόντες
  english_pob_choice: come out
  chosen_spanish: salgan
  alternatives_spanish:
  - habiendo salido
  - salid
  lexicon: BDAG
  rationale: Aunque formalmente es un participio aoristo, aquí funciona junto con el imperativo siguiente como una exhortación de salida. En español, «salgan» comunica la acción prevista de manera natural y mantiene la fuerza directiva del contexto.
- source_word: πορεύεσθε
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - marchen
  - salgan
  lexicon: BDAG
  rationale: El imperativo presente medio pide desplazarse o partir. «Vayan» es la forma más natural y sobria en español, equivalente a «go» en este contexto.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico común que implica salir sin conflicto, con seguridad y tranquilidad. «En paz» es la forma más establecida y fiel en español.
theological_decisions:
- issue: Preservar el carácter oficial del mandato sin suavizar el contenido de liberación
  english_pob_reading: The magistrates have sent word that you may be released.
  chosen_spanish_reading: Los magistrados han enviado decir que pueden ser liberados.
  alternative_spanish_readings:
  - Los magistrados han mandado que sean liberados.
  - Los magistrados han enviado que sean puestos en libertad.
  rationale: La frase debe dejar claro que se trata de una instrucción oficial transmitida por las autoridades. La versión elegida conserva esa oficialidad y la idea de liberación sin convertirla en una paráfrasis demasiado explicativa.
  doctrine_reference: Hechos 16:36; autoridad civil y liberación providencial sin carga doctrinal adicional
translation_notes:
  revision_awareness: El texto griego y el contexto narrativo concuerdan estrechamente con la lectura inglesa de referencia. La principal decisión de ajuste en español consiste en hacer natural la implicación de Ἀπέσταλκαν y en resolver la secuencia participial ἐξελθόντες + πορεύεσθε como una exhortación fluida. No se detectan revisiones previas que alteren la redacción base.
  spanish_consistency_notes:
  - Se mantiene «Pablo» como forma española de Παῦλος.
  - Se usa «magistrados» para στρατηγοί conforme al registro cívico romano del pasaje.
  - «En paz» conserva el modismo bíblico sin introducir una reinterpretación teológica.
  - La nota [a] sostiene la tensión entre la literalidad de «estas palabras» y el sentido idiomático de «mensaje».
