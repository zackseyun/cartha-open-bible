  text: ἀπήγγειλεν δὲ ὁ δεσμοφύλαξ τοὺς λόγους ⸀τούτους πρὸς τὸν Παῦλον, ὅτι Ἀπέσταλκαν οἱ στρατηγοὶ ἵνα ἀπολυθῆτε· νῦν οὖν ἐξελθόντες πορεύεσθε ἐν εἰρήνῃ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/036.yaml
  text: 'And the jailer reported these words to Paul: “The magistrates have sent word that you may be released[a]. So now[b], come out and go in peace.”'
  footnotes:
  - marker: a
    text: Or “The magistrates have sent that you be released.” The Greek leaves the object of “have sent” implicit; “sent word” makes the sense explicit in English.
    reason: lexical_alternative
  - marker: b
    text: “Magistrates” translates στρατηγοί, the civic authorities of Philippi; more technically, “praetors.”
    reason: cultural_note
