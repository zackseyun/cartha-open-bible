translation:
  language: es
  text: Y de allí a Filipos[a], que es una ciudad principal del distrito de Macedonia, una colonia romana[b]. Y permanecimos en esta ciudad por unos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la primera ciudad del distrito de Macedonia». La frase griega es difícil, y «primera» puede referirse al rango, la prominencia o la secuencia.
    reason: alternative_reading
  - marker: b
    text: 'Es decir, una colonia romana: una ciudad con estatus especial bajo el dominio de Roma.'
    reason: cultural_note
lexical_decisions:
- source_word: κἀκεῖθεν
  english_pob_choice: and from there
  chosen_spanish: y de allí
  alternatives_spanish:
  - y desde allí
  - de allí
  lexicon: BDAG
  rationale: La forma compuesta introduce continuidad con el viaje anterior. «Y de allí» conserva el enlace narrativo sin añadir un verbo que el griego no expresa.
- source_word: εἰς Φιλίππους
  english_pob_choice: to Philippi
  chosen_spanish: a Filipos
  alternatives_spanish:
  - hacia Filipos
  - hasta Filipos
  lexicon: BDAG
  rationale: Con un nombre de ciudad, εἰς en contexto de movimiento se vierte naturalmente como «a». «Filipos» preserva el nombre propio plural del griego.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - la que
  lexicon: BDAG
  rationale: En español, «que» introduce de forma natural la explicación en aposición sin forzar una construcción más marcada. Mantiene el matiz explicativo del relativo griego.
- source_word: πρώτη τῆς μερίδος Μακεδονίας πόλις
  english_pob_choice: a leading city of the district of Macedonia
  chosen_spanish: una ciudad principal del distrito de Macedonia
  alternatives_spanish:
  - la primera ciudad del distrito de Macedonia
  - una ciudad destacada del distrito de Macedonia
  lexicon: BDAG
  rationale: Se conserva la dificultad interpretativa de πρώτη sin resolverla de manera excesiva. «Principal» comunica prominencia y evita imponer una lectura cronológica o administrativa no segura; «distrito» refleja μερίς como subdivisión regional.
- source_word: κολωνία
  english_pob_choice: a Roman colony
  chosen_spanish: una colonia romana
  alternatives_spanish:
  - una colonia
  - una colonia del Imperio romano
  lexicon: BDAG
  rationale: El préstamo griego designa el estatus colonial romano de Filipos. «Romana» explicita el referente histórico sin apartarse del valor léxico.
- source_word: ἦμεν δὲ ἐν ταύτῃ τῇ πόλει διατρίβοντες
  english_pob_choice: And we stayed in this city
  chosen_spanish: Y permanecimos en esta ciudad
  alternatives_spanish:
  - Y estuvimos en esta ciudad
  - Y nos quedamos en esta ciudad
  lexicon: BDAG
  rationale: La construcción perifrástica expresa permanencia o estancia continua. «Permanecimos» es fiel y sobrio; evita añadir la idea coloquial de «nos quedamos» sin necesidad.
- source_word: ἡμέρας τινάς
  english_pob_choice: for some days
  chosen_spanish: por algunos días
  alternatives_spanish:
  - durante algunos días
  - por unos días
  lexicon: BDAG
  rationale: La expresión indica una duración indefinida y relativamente breve. «Por algunos días» es idiomática en español y mantiene la indefinición del griego.
theological_decisions:
- issue: Sentido de πρώτη en la descripción de Filipos
  english_pob_reading: Render as 'a leading city' rather than 'the first city'
  chosen_spanish_reading: «una ciudad principal» en lugar de «la primera ciudad»
  alternative_spanish_readings:
  - la primera ciudad del distrito de Macedonia
  - una ciudad destacada del distrito de Macedonia
  rationale: No se trata de una cuestión doctrinal, sino histórica e interpretativa. «Principal» preserva la idea de prominencia sin afirmar de manera concluyente un orden administrativo o de rango que el texto griego no resuelve de forma inequívoca.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego SBLGNT y conserva la misma decisión de la POB inglesa respecto de πρώτη: evitar una traducción demasiado cerrada y mantener la ambigüedad histórica con una nota alternativa. No hay revisiones posteriores que obliguen a modificar el contenido auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrama.
  - «Filipos» se usa como transliteración estándar en español para Φίλιπποι.
  - «Colonia romana» preserva el trasfondo histórico-cultural señalado por el audit trail inglés.
  - La puntuación sigue el español normativo y conserva la cadencia narrativa del griego.
