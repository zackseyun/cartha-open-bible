review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperativo de fe dirigido al carcelero, objeto de la fe en el Señor Jesús, y promesa futura de salvación para él y su casa. Sin embargo, la nota [a] no preserva fielmente la alternativa inglesa auditada: el inglés documenta «Believe on the Lord Jesus», mientras que el español «Cree sobre el Señor Jesús» es poco natural y no representa una alternativa española aceptable. Además, el español principal «tu casa» es entendible, pero «tu hogar» o «tu casa» con nota aclaratoria puede funcionar; aquí el texto base es defendible.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un pequeño ajuste de naturalidad y fidelidad editorial: conviene eliminar «ellos» en «Y ellos dijeron» para un flujo más natural, y la nota alternativa debe decir «Cree en el Señor Jesús» / «Pon tu fe en el Señor Jesús» o, si se quiere reflejar literalmente el matiz de on, usar una formulación española natural. El resto del versículo lee bien. La nota [b] está bien orientada, aunque «hogar» suena un poco más natural que repetir «casa».'
  glossary_alignment: Se mantiene correctamente «Señor» para κύριον y «Jesús» para Ἰησοῦν. No hay conflicto con las directrices de Yahvé/Mesías. «Serás salvo» corresponde bien a σωθήσῃ. «Tu casa» es aceptable para οἶκος con nota cultural; no obstante, la alternativa en nota [a] debe ajustarse a un español idiomático.
  issues:
  - severity: medium
    issue: La nota [a] usa «Cree sobre el Señor Jesús».
    rationale: Aunque intenta reflejar la alternativa inglesa «Believe on», en español «creer sobre» es antinatural y no sirve como nota léxica útil. Debe reemplazarse por una alternativa española idiomática como «Pon tu fe en el Señor Jesús».
  - severity: low
    issue: «Y ellos dijeron» suena más pesado de lo necesario.
    rationale: El griego οἱ δὲ εἶπαν puede traducirse naturalmente como «Y dijeron». El pronombre explícito no es incorrecto, pero en español narrativo suele omitirse salvo por énfasis.
  revised_spanish_text: 'Y dijeron[a]: «Cree en el Señor Jesús, y serás salvo, tú y tu casa[b]».'
  revised_footnotes:
  - marker: a
    text: O «Pon tu fe en el Señor Jesús».
    reason: lexical_alternative
  - marker: b
    text: «Tu casa» se refiere a los de su hogar, no solo al edificio físico.
    reason: cultural_note
