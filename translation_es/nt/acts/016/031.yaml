translation:
  language: es
  text: 'Y dijeron[a]: «Cree en el Señor Jesús, y serás salvo, tú y tu casa[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pon tu fe en el Señor Jesús».
    reason: lexical_alternative
  - marker: b
    text: «Tu casa» se refiere a los de su hogar, no solo al edificio físico.
    reason: cultural_note
lexical_decisions:
- source_word: Πίστευσον
  english_pob_choice: Believe
  chosen_spanish: Cree
  alternatives_spanish:
  - Ten fe
  - Confía
  lexicon: BDAG
  rationale: El imperativo aoristo pide una respuesta decisiva. En español, «cree» es la forma más directa, natural y fiel para πιστεύω en un contexto evangelístico. «Ten fe» y «confía» son posibles, pero pueden desplazar el énfasis desde el acto de creer hacia una disposición más general.
- source_word: ἐπὶ τὸν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en/comо dependencia en
  lexicon: BDAG
  rationale: Con πιστεύω, ἐπί + acusativo expresa el objeto hacia quien se dirige la fe. En español, «creer en» es la forma idiomática y conserva la relación personal sin volverla rígidamente literal con «sobre».
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto cristológico, «Señor» preserva el valor honorífico y teológico de κύριος. «Dueño» o «Maestro» no comunican con la misma claridad la confesión cristiana implícita.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio de uso estándar en español; no requiere adaptación adicional.
- source_word: σωθήσῃ
  english_pob_choice: you will be saved
  chosen_spanish: serás salvo
  alternatives_spanish:
  - serás rescatado
  - serás librado
  lexicon: BDAG
  rationale: El futuro pasivo de σῴζω en un contexto de salvación evangelística se expresa naturalmente como «serás salvo». Mantiene el alcance soteriológico amplio sin reducirlo a una mera liberación temporal.
- source_word: σὺ καὶ ὁ οἶκός σου
  english_pob_choice: you and your household
  chosen_spanish: tú y tu casa
  alternatives_spanish:
  - tú y tu familia
  - tú y tu hogar
  lexicon: BDAG
  rationale: οἶκος designa aquí el grupo doméstico ligado al jefe de familia, no solo el edificio. «Tu casa» es natural en español bíblico y puede abarcar el sentido familiar/doméstico; «tu familia» aclara, pero estrecha un poco el matiz institucional del término.
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Pero ellos dijeron
  lexicon: BDAG
  rationale: δέ es aquí un conector leve. «Y» reproduce el flujo narrativo sin sobredimensionar contraste alguno.
theological_decisions:
- issue: Alcance de «tú y tu casa»
  english_pob_reading: Render the phrase straightforwardly without implying automatic salvation apart from personal faith.
  chosen_spanish_reading: Traducir la frase de manera directa, sin sugerir salvación automática de la casa aparte de la respuesta al evangelio.
  alternative_spanish_readings:
  - Una lectura de pacto que implique la salvación de la casa por la fe del carcelero בלבד
  - Una lectura individualista que minimice el alcance doméstico
  rationale: El griego incluye al carcelero y a su casa en la promesa, pero el versículo por sí solo no resuelve cómo se relaciona esa inclusión con la fe personal ni con otros actos posteriores. La traducción conserva la amplitud de la frase sin importar una conclusión doctrinal que el texto no formula explícitamente.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto al texto inglés POB; se conserva el valor imperativo de πιστεύω, la fe dirigida a Jesús como Señor, y la amplitud de οἶκος sin resolver de más la cuestión teológica del alcance doméstico.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος y «Jesús» para Ἰησοῦς, conforme al uso POB y a la convención bíblica en español.
  - Se conserva «serás salvo» para σῴζω en contexto salvífico, evitando reducirlo a «rescatado» o «librado».
  - «Tu casa» preserva el alcance doméstico de οἶκος y permite la nota explicativa sin sobretraducir el término.
