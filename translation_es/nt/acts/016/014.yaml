translation:
  language: es
  text: Y una mujer llamada Lidia[a], vendedora de telas de púrpura de la ciudad de Tiatira, que adoraba a Dios, estaba escuchando; el Señor le abrió el corazón para prestar atención a lo que estaba siendo dicho por Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "una adoradora de Dios"; la expresión puede indicar una gentil devota del Dios de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: καί τις γυνὴ
  english_pob_choice: And a certain woman
  chosen_spanish: Y una mujer
  alternatives_spanish:
  - Y cierta mujer
  - Y una mujer cierta
  lexicon: BDAG
  rationale: En español, «una mujer» comunica con naturalidad la indefinición narrativa. «Cierta» suena más pesado y menos idiomático; la fuerza introductoria de τις queda implícita por el contexto sin necesidad de forzar la expresión.
- source_word: ὀνόματι Λυδία
  english_pob_choice: named Lydia
  chosen_spanish: llamada Lidia
  alternatives_spanish:
  - de nombre Lidia
  - nombrada Lidia
  lexicon: BDAG
  rationale: «Llamada Lidia» es la forma más natural y fiel en español para el dativo con ὀνόματι.
- source_word: πορφυρόπωλις
  english_pob_choice: a seller of purple cloth
  chosen_spanish: vendedora de telas de púrpura
  alternatives_spanish:
  - comerciante de púrpura
  - vendedora de púrpura
  - vendedora de paños de púrpura
  lexicon: BDAG
  rationale: El griego indica una comerciante en productos de púrpura; «telas de púrpura» conserva el sentido comercial y evita restringir indebidamente a una sola pieza de ropa. «Vendedora de púrpura» sería más literal pero menos claro en español.
- source_word: πόλεως Θυατείρων
  english_pob_choice: from the city of Thyatira
  chosen_spanish: de la ciudad de Tiatira
  alternatives_spanish:
  - de Tiatira
  - procedente de la ciudad de Tiatira
  lexicon: BDAG
  rationale: «De la ciudad de Tiatira» reproduce con claridad la procedencia indicada por el genitivo sin recargar el estilo.
- source_word: σεβομένη τὸν θεόν
  english_pob_choice: who worshiped God
  chosen_spanish: que adoraba a Dios
  alternatives_spanish:
  - temerosa de Dios
  - que reverenciaba a Dios
  - adoradora de Dios
  lexicon: BDAG
  rationale: El participio expresa a una gentil devota del Dios de Israel. «Adoraba a Dios» mantiene la fuerza religiosa general sin introducir en el texto principal el rótulo técnico «temerosa de Dios», que queda como alternativa interpretativa.
- source_word: ἤκουεν
  english_pob_choice: was listening
  chosen_spanish: estaba escuchando
  alternatives_spanish:
  - escuchaba
  - oyía
  lexicon: BDAG
  rationale: El imperfecto describe acción continua en el relato; «estaba escuchando» conserva mejor esa duración que un pretérito simple.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesús
  - Dios
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del griego. En el contexto de Hechos, la referencia es teológicamente abierta; «el Señor» preserva esa apertura sin resolver el referente más allá de lo explícito.
- source_word: διήνοιξεν τὴν καρδίαν
  english_pob_choice: opened her heart
  chosen_spanish: le abrió el corazón
  alternatives_spanish:
  - abrió su corazón
  - le abrió su corazón
  lexicon: BDAG
  rationale: La metáfora de apertura interior se conserva con naturalidad en español. El dativo implícito se expresa con «le» para claridad y fluidez.
- source_word: προσέχειν
  english_pob_choice: to pay attention
  chosen_spanish: para prestar atención
  alternatives_spanish:
  - para atender
  - para fijarse en
  - para hacer caso
  lexicon: BDAG
  rationale: «Prestar atención» corresponde bien al valor de προσέχειν sin sobreinterpretar como obediencia o respuesta completa.
- source_word: τοῖς λαλουμένοις
  english_pob_choice: to what was being spoken
  chosen_spanish: a lo que Pablo decía
  alternatives_spanish:
  - a lo que se decía
  - a las cosas que se decían
  - a lo que era hablado
  lexicon: BDAG
  rationale: La frase participial apunta al contenido de la predicación de Pablo. En español, «lo que Pablo decía» es más natural y todavía conserva la referencia a las palabras efectivamente pronunciadas.
- source_word: ὑπὸ τοῦ Παύλου
  english_pob_choice: by Paul
  chosen_spanish: por Pablo
  alternatives_spanish:
  - por el apóstol Pablo
  lexicon: BDAG
  rationale: Se traduce la agencia de forma directa y sobria con «por Pablo».
theological_decisions:
- issue: Referencia de ὁ κύριος
  english_pob_reading: Rendered simply as 'the Lord' without specifying 'Jesus' or 'God' in the main text.
  chosen_spanish_reading: «el Señor» sin especificación adicional.
  alternative_spanish_readings:
  - «el Señor Jesús»
  - «Dios»
  rationale: El griego solo dice ὁ κύριος. Dado que Hechos puede usar este término con fuerza cristológica o referirse a Dios, la traducción conserva la ambigüedad textual en vez de resolverla en la línea principal.
  doctrine_reference: Principio de apertura semántica para κύριος; §3 de filosofía de traducción del proyecto
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; esta propuesta mantiene la misma lectura global del inglés POB y adapta sus decisiones léxicas al español con naturalidad y fidelidad al griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera explícitamente; aquí aparece κύριος, por lo que se conserva «el Señor».
  - Se mantiene «Dios» para θεόν y no se introduce una equivalencia confusa con «el Señor».
  - Se evita «Cristo» porque no aparece Χριστός en el versículo.
  - «Púrpura» se conserva como término de color/comercio, pero se explicita como mercancía textil para claridad en español.
  - La nota a pie de página conserva la alternativa interpretativa documentada en el audit trail inglés.
