review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: Lidia, comerciante de púrpura de Tiatira, devota de Dios, escuchaba, y el Señor abrió su corazón para atender al mensaje de Pablo. Sin embargo, hay un desajuste relevante en τοῖς λαλουμένοις ὑπὸ τοῦ Παύλου: el griego expresa pasivamente ''a las cosas dichas / a lo que estaba siendo hablado por Pablo'', mientras que el borrador lo convierte en activo ''a lo que Pablo decía''. Aunque el sentido básico se conserva, conviene reflejar más de cerca la formulación fuente y la decisión auditada del POB.'
  spanish_quality_summary: El español es claro, natural y de registro digno. 'Vendedora de telas de púrpura', 'adoraba a Dios', 'estaba escuchando' y 'el Señor le abrió el corazón' funcionan bien. La única mejora importante es ajustar la última cláusula para alinearla mejor con el participio pasivo griego y con la formulación del POB, sin perder naturalidad en español.
  glossary_alignment: 'La terminología principal está bien alineada: θεόν -> ''Dios'', κύριος -> ''el Señor'', Λυδία -> ''Lidia''. No hay conflicto con los defaults del proyecto. La nota sobre σεβομένη τὸν θεόν preserva adecuadamente la alternativa interpretativa. No se requiere cambio terminológico mayor.'
  issues:
  - severity: medium
    issue: La frase 'a lo que Pablo decía' suaviza y activa τοῖς λαλουμένοις ὑπὸ τοῦ Παύλου.
    rationale: El griego usa participio pasivo con complemento agente explícito ('por Pablo'). El español actual comunica el contenido, pero no preserva tan fielmente la estructura ni la decisión inglesa 'what was being spoken by Paul'. Una formulación como 'a lo que estaba siendo dicho por Pablo' o 'a lo que Pablo estaba diciendo' mejora la correspondencia; la primera preserva mejor el pasivo, aunque requiere cuidado estilístico.
  - severity: low
    issue: La nota al pie empieza con comillas innecesarias y puntuación poco limpia.
    rationale: 'La redacción "''O: «una adoradora de Dios»; ...''" puede normalizarse a una nota española más limpia y consistente: ''O "una adoradora de Dios"; la expresión puede indicar una gentil devota del Dios de Israel.'''
  revised_spanish_text: Y una mujer llamada Lidia[a], vendedora de telas de púrpura de la ciudad de Tiatira, que adoraba a Dios, estaba escuchando; el Señor le abrió el corazón para prestar atención a lo que estaba siendo dicho por Pablo.
  revised_footnotes:
  - marker: a
    text: O "una adoradora de Dios"; la expresión puede indicar una gentil devota del Dios de Israel.
    reason: lexical_alternative
  revision_rationale: Se revisa solo la cláusula final para reflejar con mayor fidelidad el participio pasivo griego τοῖς λαλουμένοις ὑπὸ τοῦ Παύλου y la decisión del POB inglés, manteniendo un español comprensible. También se normaliza la puntuación de la nota al pie.
