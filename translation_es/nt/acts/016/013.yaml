  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Oración' y 'lugar de oración' siguen bien la decisión documentada sobre προσευχή. No hay conflicto con Yahvé/Mesías/Cristo/Espíritu/etc. La revisión propuesta mantiene la terminología del proyecto y mejora la naturalidad del español.
