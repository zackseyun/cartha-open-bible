translation:
  language: es
  text: En el día de descanso salimos fuera de la puerta, junto al río[a], donde pensábamos que había un lugar de oración, y, después de sentarnos, hablábamos a las mujeres que se habían reunido allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "donde pensábamos que había oración". El griego puede referirse tanto a la oración misma como a un lugar apartado para la oración; el contexto aquí favorece "lugar de oración".'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: On the Sabbath day
  chosen_spanish: En el día de reposo
  alternatives_spanish:
  - En el sábado
  - En el día de los sábados
  lexicon: BDAG
  rationale: La expresión griega es un giro idiomático que en contexto señala el día de reposo judío. En español, 'día de reposo' transmite con naturalidad el valor del sabbat sin forzar un calco como 'día de los sábados', que sonaría ajeno y menos claro.
- source_word: ἐξήλθομεν ἔξω τῆς πύλης
  english_pob_choice: we went outside the gate
  chosen_spanish: salimos fuera de la puerta
  alternatives_spanish:
  - salimos fuera de la puerta de la ciudad
  - salimos afuera de la puerta
  lexicon: BDAG
  rationale: El griego intensifica la idea de salir hacia afuera. 'Salimos fuera de la puerta' conserva esa fuerza sin añadir 'de la ciudad', que no está expresado en el texto, aunque pueda estar implícito por el contexto.
- source_word: παρὰ ποταμόν
  english_pob_choice: beside the river
  chosen_spanish: junto al río
  alternatives_spanish:
  - al lado del río
  - a la orilla del río
  lexicon: BDAG
  rationale: La preposición expresa cercanía espacial al río. 'Junto al río' es natural en español y mantiene el valor locativo sin introducir una imagen más específica que la que el griego garantiza.
- source_word: οὗ ἐνομίζομεν προσευχὴν εἶναι
  english_pob_choice: where we supposed there was a place of prayer
  chosen_spanish: donde pensábamos que había un lugar de oración
  alternatives_spanish:
  - donde pensábamos que había oración
  - donde pensábamos que había una casa de oración
  lexicon: BDAG
  rationale: προσευχή puede designar la oración misma o, en ciertos contextos, un sitio dedicado a la oración. El contexto narrativo junto al río favorece la lectura de un lugar. 'Lugar de oración' preserva esa posibilidad sin imponer 'sinagoga', que no aparece en el griego.
- source_word: καὶ καθίσαντες
  english_pob_choice: and after sitting down
  chosen_spanish: y, después de sentarnos
  alternatives_spanish:
  - y, sentándonos
  - y, al sentarnos
  lexicon: BDAG
  rationale: El participio aoristo suele indicar acción previa respecto del verbo principal. 'Después de sentarnos' expresa bien la secuencia en español y conserva el matiz aspectual del original.
- source_word: ἐλαλοῦμεν
  english_pob_choice: we were speaking
  chosen_spanish: hablábamos
  alternatives_spanish:
  - estábamos hablando
  - nos dirigíamos a hablar
  lexicon: BDAG
  rationale: El imperfecto griego marca acción en curso. En español, 'hablábamos' comunica de manera natural esa acción continua sin necesidad de una perífrasis más pesada.
- source_word: ταῖς συνελθούσαις γυναιξίν
  english_pob_choice: to the women who had gathered there
  chosen_spanish: a las mujeres que se habían reunido allí
  alternatives_spanish:
  - a las mujeres que habían venido juntas
  - a las mujeres reunidas allí
  lexicon: BDAG
  rationale: συνελθούσαις indica mujeres que se habían congregado. 'Se habían reunido allí' refleja el resultado previo al habla y mantiene el valor colectivo del participio.
theological_decisions:
- issue: Sentido de προσευχή en este escenario
  english_pob_reading: Rendered as 'a place of prayer' rather than 'prayer' or 'synagogue.'
  chosen_spanish_reading: '''lugar de oración'' en vez de ''oración'' o ''sinagoga'''
  alternative_spanish_readings:
  - '''oración'' como actividad abstracta'
  - '''sinagoga'' como equivalente institucional interpretativo'
  rationale: El griego admite el valor de un lugar dedicado a la oración, y el escenario junto al río favorece esa lectura. Traducir 'sinagoga' iría más allá del término usado, mientras que 'oración' a secas oscurecería el matiz locativo presente en el contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y las decisiones auditadas del inglés POB, especialmente en la expresión idiomática del sábado, la lectura locativa de προσευχή y el aspecto imperfectivo de 'we were speaking'. No se identifican revisiones previas que alteren la presente solución.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece ningún nombre divino en el texto fuente.
  - Se evita 'Cristo/Mesías' porque el versículo no contiene cristología explícita.
  - '''día de reposo'' se usa como equivalente idiomático para σαββάτων, priorizando inteligibilidad y fidelidad contextual.'
  - La nota al pie preserva la alternativa lexical de προσευχή sin imponer una interpretación institucional no expresada en el griego.
