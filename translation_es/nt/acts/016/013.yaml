    rationale: Aunque intenta reflejar ἐξήλθομεν ἔξω, en español esa combinación suena redundante y rígida. El proyecto pide evitar calcos de madera cuando la gramática española se vuelve antinatural.
  - severity: low
    issue: Inicio algo forzado con 'En el día de reposo'
    rationale: Es comprensible y fiel, pero menos natural que 'El día de descanso' o 'En el día de descanso' para español eclesial amplio. No es error grave, pero una leve mejora estilística ayuda a la legibilidad.
