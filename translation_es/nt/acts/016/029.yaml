translation:
  language: es
  text: Entonces[a], pidiendo luces, irrumpió, y quedó temblando[b], y cayó ante Pablo y Silas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se precipitó adentro». El verbo griego expresa un movimiento repentino y enérgico hacia el interior.
    reason: lexical_alternative
  - marker: b
    text: O «tembloroso». La expresión describe al carcelero físicamente sacudido en un estado de alarma.
    reason: lexical_alternative
  - marker: c
    text: O «cayó delante de Pablo y Silas». La expresión señala deferencia o súplica temerosa, no necesariamente adoración.
    reason: alternative_reading
lexical_decisions:
- source_word: αἰτήσας
  english_pob_choice: asking for
  chosen_spanish: pidiendo
  alternatives_spanish:
  - habiendo pedido
  - solicitando
  lexicon: BDAG
  rationale: 'El participio aoristo antecede a la acción principal y en español se expresa con naturalidad como una acción previa: «pidiendo». Conserva la secuencia sin volverla rígida.'
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como avance narrativo, no como contraste fuerte. «Entonces» comunica bien la progresión del relato.
- source_word: φῶτα
  english_pob_choice: lights
  chosen_spanish: luces
  alternatives_spanish:
  - lámparas
  - antorchas
  lexicon: BDAG
  rationale: El plural de φῶς se refiere de forma general a fuentes de iluminación. «Luces» preserva esa amplitud sin especificar un tipo no dado por el griego.
- source_word: εἰσεπήδησεν
  english_pob_choice: he rushed in
  chosen_spanish: se precipitó dentro
  alternatives_spanish:
  - irrupió
  - saltó dentro
  lexicon: BDAG
  rationale: El verbo expresa movimiento súbito e intenso hacia el interior. «Se precipitó dentro» mantiene la fuerza y resulta idiomático en español.
- source_word: ἔντρομος γενόμενος
  english_pob_choice: becoming trembling
  chosen_spanish: quedando tembloroso
  alternatives_spanish:
  - poniéndose tembloroso
  - quedando en temblor
  lexicon: BDAG
  rationale: La construcción participial describe el estado resultante del carcelero. «Quedando tembloroso» refleja el cambio de estado sin añadir explícitamente «miedo», que el griego sugiere pero no nombra aparte en la forma adoptada por el texto base.
- source_word: προσέπεσεν
  english_pob_choice: he fell down before
  chosen_spanish: se postró ante
  alternatives_spanish:
  - cayó delante de
  - se arrodilló ante
  lexicon: BDAG
  rationale: El verbo indica caer ante alguien en gesto de sumisión, ruego o deferencia. «Se postró ante» conserva la fuerza gestual sin afirmar adoración.
- source_word: τῷ Παύλῳ καὶ τῷ Σιλᾷ
  english_pob_choice: before Paul and Silas
  chosen_spanish: ante Pablo y Silas
  alternatives_spanish:
  - delante de Pablo y Silas
  - a los pies de Pablo y Silas
  lexicon: BDAG
  rationale: La dativa tras προσπίπτω se expresa naturalmente con «ante». «A los pies de» sería más interpretativo de lo que exige el griego.
theological_decisions:
- issue: Naturaleza del gesto del carcelero hacia Pablo y Silas
  english_pob_reading: A physical act of fearful supplication/respect, without implying worship.
  chosen_spanish_reading: Un acto físico de súplica o deferencia temerosa, sin implicar adoración.
  alternative_spanish_readings:
  - se postró para adorarlos
  - se arrodilló en adoración ante Pablo y Silas
  - cayó rendido ante ellos
  rationale: El contexto muestra alarma y una respuesta urgente ante el terremoto y la intervención divina, pero el verbo griego no obliga a entender culto religioso. La traducción preserva el gesto sin importar una afirmación doctrinal que el texto no exige.
  doctrine_reference: 'Principio POB: no introducir afirmaciones doctrinales que el texto no hace explícitas; conservar la tensión interpretativa cuando exista.'
translation_notes:
  revision_awareness: 'Esta redacción sigue el texto griego SBLGNT y toma en cuenta el audit trail inglés: δέ como progreso narrativo, φῶτα como plural general de iluminación, εἰσεπήδησεν como movimiento súbito, ἔντρομος γενόμενος como estado resultante y προσέπεσεν como caída ante alguien sin cargarla de culto. Se evitó traducir mecánicamente desde el inglés cuando el español pide una formulación más natural.'
  spanish_consistency_notes:
  - Se mantiene «Pablo» y «Silas» como nombres propios estándar.
  - «Ante» se usa para la dativa con προσπίπτω, reservando «a los pies de» para contextos donde el griego o el contexto lo exijan más claramente.
  - «Tembloroso»/«temblando» conserva la ambigüedad física-emocional del griego sin sobreexplicar el miedo.
