review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: acción continua de seguir, clamor en voz alta, identificación como esclavos del Dios Altísimo y proclamación del camino de salvación. Sin embargo, «Ella seguía a Pablo y a nosotros» debilita κατακολουθοῦσα, que aquí expresa ir detrás/seguir de cerca, no solo ''continuar''. También conviene mejorar la relativa «quienes les proclaman», que suena menos natural con antecedente no humano-personal en este contexto que una construcción más directa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «seguía a Pablo y a nosotros» suena algo incompleto para la idea de ir detrás, y la combinación «gritando y diciendo» puede estilizarse mejor como «gritaba». «Estos hombres … les proclaman» es comprensible, pero más natural y eufónico es «les están proclamando a ustedes» o «les proclaman». La frase final funciona bien como «el camino de salvación».
  glossary_alignment: Alinea bien con la terminología del proyecto en δοῦλοι -> «esclavos» y θεοῦ τοῦ ὑψίστου -> «del Dios Altísimo». No hay conflicto con Yahvé/Mesías. La decisión definida «el camino de salvación» puede mantenerse, con nota que preserve la anartrosis griega.
  issues:
  - severity: medium
    issue: κατακολουθοῦσα se tradujo como «seguía» sin matiz de ir detrás/de cerca.
    rationale: El verbo compuesto sugiere seguir acompañando o yendo detrás de alguien; en este contexto narrativo «iba siguiendo» o «seguía detrás de» preserva mejor el movimiento continuo que el mero «seguía».
  - severity: low
    issue: La nota [a] está anclada en «seguía», pero la alternativa «seguía de cerca» no resuelve del todo la mejor opción idiomática.
    rationale: Si se revisa el texto a «iba siguiendo», la nota puede simplificarse o eliminarse; no hace falta una nota para una decisión léxica tan ordinaria.
  - severity: low
    issue: «quienes les proclaman» es menos natural que una relativa verbal más directa.
    rationale: Con antecedente «Estos hombres», una formulación como «que les proclaman» fluye mejor en español general y conserva el mismo sentido.
  revised_spanish_text: 'Ella iba siguiendo a Pablo y a nosotros, y gritaba: «Estos hombres son esclavos del Dios Altísimo, que les proclaman[a] el camino de salvación».

    '
  revised_footnotes:
  - marker: a
    text: La expresión griega es anártica; literalmente puede entenderse como «un camino de salvación» o «el camino de salvación». En español se eligió la forma idiomática «el camino de salvación».
    reason: alternative_reading
  revision_rationale: 'Se ajustó κατακολουθοῦσα a «iba siguiendo» para expresar mejor la acción continua de ir detrás de Pablo y sus compañeros. Se simplificó «gritando y diciendo» a «gritaba», que recoge bien ἔκραζεν λέγουσα sin pesadez. Se cambió «quienes» por «que» para mejor naturalidad. Se mantuvo «esclavos» y «del Dios Altísimo» conforme al proyecto. Se conservó la nota solo en el punto verdaderamente relevante: la definitud de «camino de salvación».'
