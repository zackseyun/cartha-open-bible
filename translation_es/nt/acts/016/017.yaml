translation:
  language: es
  text: 'Ella iba siguiendo a Pablo y a nosotros, y gritaba: «Estos hombres son esclavos del Dios Altísimo, que les proclaman[a] el camino de salvación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es anártica; literalmente puede entenderse como «un camino de salvación» o «el camino de salvación». En español se eligió la forma idiomática «el camino de salvación».
    reason: alternative_reading
lexical_decisions:
- source_word: κατακολουθοῦσα
  english_pob_choice: kept following
  chosen_spanish: seguía
  alternatives_spanish:
  - venía siguiendo
  - seguía de cerca
  lexicon: BDAG
  rationale: El participio presente con el imperfecto principal expresa acción continua; en español, «seguía» comunica bien esa continuidad sin sonar forzado.
- source_word: ἔκραζεν
  english_pob_choice: crying out
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - exclamando
  lexicon: BDAG
  rationale: El imperfecto indica una acción repetida o sostenida a voz alta; «gritando» preserva esa intensidad de modo natural en español.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Siguiendo la decisión léxica documentada del proyecto, δοῦλος se rinde con «esclavos» cuando la relación de pertenencia es relevante. Aquí se subraya la pertenencia a Dios.
- source_word: τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: of the Most High God
  chosen_spanish: del Dios Altísimo
  alternatives_spanish:
  - del Dios Supremo
  - del Dios, el Altísimo
  lexicon: BDAG
  rationale: «Dios Altísimo» reproduce el título divino de forma idiomática en español y conserva el sentido superlativo de ὕψιστος.
- source_word: καταγγέλλουσιν
  english_pob_choice: are proclaiming
  chosen_spanish: les proclaman
  alternatives_spanish:
  - les anuncian
  - les declaran
  lexicon: BDAG
  rationale: El verbo expresa proclamación pública; en español, el presente simple funciona de manera natural para el valor durativo del griego y el dativo ὑμῖν se expresa con «les».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El destinatario de la proclamación es explícito en español con el clítico dativo «les», que resulta más fluido que repetir «a ustedes» dentro de la oración relativa.
- source_word: ὁδὸν σωτηρίας
  english_pob_choice: the way of salvation
  chosen_spanish: el camino de salvación
  alternatives_spanish:
  - el camino de la salvación
  - un camino de salvación
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo ante ὁδόν, el contexto y la revisión inglesa reciente favorecen una lectura idiomática definida; en español, «el camino de salvación» es natural y conserva la fuerza de la expresión sin introducir una formulación ajena.
theological_decisions:
- issue: Definitud de ὁδὸν σωτηρίας
  english_pob_reading: the way of salvation
  chosen_spanish_reading: el camino de salvación
  alternative_spanish_readings:
  - un camino de salvación
  rationale: La POB inglesa revisó la redacción hacia una formulación definida por razones de naturalidad contextual. En español, «el camino de salvación» comunica esa misma lectura sin forzar una afirmación doctrinal adicional ni borrar la tensión que el anartro griego puede sugerir.
  doctrine_reference: Preservar la tensión textual cuando sea posible, pero permitir una lectura idiomática en la lengua meta si el contexto la favorece.
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente del enunciado de ὁδὸν σωτηρίας, pasando de «a way of salvation» a «the way of salvation» por naturalidad contextual. La presente propuesta sigue esa lectura final y la adapta de forma idiomática al español, manteniendo además la fuerza de δοῦλοι como «esclavos» y el valor durativo de los imperfectos.
  spanish_consistency_notes:
  - Se mantiene «Jesús/Mesías» fuera de este versículo porque no aparece en el texto.
  - «Dios Altísimo» se usa como título divino estable y no como un nombre propio distinto.
  - El clítico dativo «les» integra mejor la relación de destinatario que una repetición perifrástica.
  - Se conserva un registro bíblico claro y moderno, evitando tanto arcaísmos innecesarios como paráfrasis libres.
