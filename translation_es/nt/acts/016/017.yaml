revisions:
- from: 'Ella seguía[a] a Pablo y a nosotros, gritando y diciendo: «Estos hombres son esclavos del Dios Altísimo, quienes les proclaman el camino[b] de salvación».'
  to: 'Ella iba siguiendo a Pablo y a nosotros, y gritaba: «Estos hombres son esclavos del Dios Altísimo, que les proclaman[a] el camino de salvación».'
  rationale: 'Se ajustó κατακολουθοῦσα a «iba siguiendo» para expresar mejor la acción continua de ir detrás de Pablo y sus compañeros. Se simplificó «gritando y diciendo» a «gritaba», que recoge bien ἔκραζεν λέγουσα sin pesadez. Se cambió «quienes» por «que» para mejor naturalidad. Se mantuvo «esclavos» y «del Dios Altísimo» conforme al proyecto. Se conservó la nota solo en el punto verdaderamente relevante: la definitud de «camino de salvación».'
