base_translation:
  language: en
  yaml_path: translation/nt/acts/016/026.yaml
  text: Suddenly there was a great earthquake[a], so that the foundations of the prison were shaken; and immediately all the doors were opened[b], and everyone's chains were unfastened.
  footnotes:
  - marker: a
    text: Or 'everyone's bonds were loosened.' The Greek δεσμά can mean 'bonds' or 'chains,' and ἀνέθη can be rendered 'were loosened' or 'were unfastened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'jail' instead of 'prison' for δεσμωτήριον.
    reason: lexical_alternative
