translation:
  language: es
  text: De repente ocurrió un gran terremoto, de modo que se sacudieron los cimientos de la prisión[b]; e inmediatamente se abrieron todas las puertas, y las cadenas de todos se soltaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ataduras de todos se aflojaron». El griego δεσμά puede significar «ataduras» o «cadenas», y ἀνέθη puede traducirse «se aflojaron» o «se soltaron».
    reason: lexical_alternative
  - marker: b
    text: O «cárcel» en lugar de «prisión» para δεσμωτήριον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφνω
  english_pob_choice: Suddenly
  chosen_spanish: De repente
  alternatives_spanish:
  - Repentinamente
  - De pronto
  lexicon: BDAG
  rationale: Adverbio de brusquedad narrativa. «De repente» conserva el golpe de sorpresa con naturalidad en español actual.
- source_word: σεισμὸς ἐγένετο μέγας
  english_pob_choice: there was a great earthquake
  chosen_spanish: ocurrió un gran terremoto
  alternatives_spanish:
  - hubo un gran terremoto
  - se produjo un gran terremoto
  lexicon: BDAG
  rationale: La construcción γίνομαι + sustantivo admite una redacción natural con «ocurrió». «Gran terremoto» mantiene μέγας sin sobreinterpretarlo como «fuerte» o «severo».
- source_word: ὥστε σαλευθῆναι
  english_pob_choice: so that ... were shaken
  chosen_spanish: de modo que se sacudieron
  alternatives_spanish:
  - de tal manera que se sacudieron
  - con el resultado de que se sacudieron
  lexicon: BDAG
  rationale: ὥστε introduce resultado. En español, la pasiva se vuelve más natural con una construcción intransitiva/refleja («se sacudieron») para los cimientos.
- source_word: τὰ θεμέλια τοῦ δεσμωτηρίου
  english_pob_choice: the foundations of the prison
  chosen_spanish: los cimientos de la prisión
  alternatives_spanish:
  - los fundamentos de la prisión
  - los cimientos de la cárcel
  lexicon: BDAG
  rationale: θεμέλια son elementos estructurales, por eso «cimientos». δεσμωτήριον se rinde como «prisión» siguiendo el registro estándar y transparente del POB inglés.
- source_word: ἠνεῴχθησαν ... αἱ θύραι πᾶσαι
  english_pob_choice: all the doors were opened
  chosen_spanish: se abrieron todas las puertas
  alternatives_spanish:
  - fueron abiertas todas las puertas
  - todas las puertas se abrieron
  lexicon: BDAG
  rationale: El pasivo griego se expresa con naturalidad en español con «se abrieron», sin perder el valor resultativo de la apertura completa de todas las puertas.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: Adverbio temporal de inmediatez; «inmediatamente» es claro, formal y fiel al valor temporal.
- source_word: πάντων
  english_pob_choice: everyone's
  chosen_spanish: de todos
  alternatives_spanish:
  - de cada uno
  - de todos ellos
  lexicon: BDAG
  rationale: El genitivo plural con el sentido posesivo se expresa de forma compacta en español como «de todos», manteniendo la referencia colectiva a los presos.
- source_word: τὰ δεσμὰ
  english_pob_choice: chains
  chosen_spanish: las cadenas
  alternatives_spanish:
  - los lazos
  - los vínculos
  lexicon: BDAG
  rationale: δεσμά puede significar «bonds» o «chains». En este contexto carcelario, «cadenas» es la opción más concreta y comprensible en español.
- source_word: ἀνέθη
  english_pob_choice: were unfastened
  chosen_spanish: se soltaron
  alternatives_spanish:
  - fueron aflojadas
  - se aflojaron
  lexicon: BDAG
  rationale: ἀνίημι aquí comunica aflojar/liberar. «Se soltaron» preserva la imagen de liberación sin añadir más de lo que el texto afirma.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios respecto del estado anterior; por eso esta propuesta sigue de cerca la línea del inglés POB y conserva sus dos ambigüedades léxicas principales: σεισμός como «terremoto» y δεσμωτήριον como «prisión/jail», sin ampliar el sentido de ἀνέθη más allá de «soltarse/desatarse».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras sustituciones teológicas no pertinentes, ya que el versículo no contiene vocabulario divino.
  - «Prisión» se usa con coherencia para δεσμωτήριον, en paralelo con la opción inglesa principal.
  - «Cadenas» traduce δεσμά siguiendo el contexto de encierro; no se opta por «lazos» por claridad narrativa.
  - 'La secuencia verbal mantiene el orden del griego y del POB inglés: evento repentino, efecto sobre los cimientos, apertura de puertas y liberación de cadenas.'
