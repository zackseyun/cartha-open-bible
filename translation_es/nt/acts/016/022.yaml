revisions:
- from: Y la multitud se levantó[a] contra ellos, y los magistrados, después de rasgarles las prendas, ordenaban que fueran azotados con varas.
  to: Y la multitud se levantó en masa contra ellos[a], y los magistrados, después de rasgarles la ropa, ordenaban que fueran golpeados con varas[b].
  rationale: La revisión conserva mejor el matiz colectivo de συνεπέστη, mejora la naturalidad del español en «la ropa», corrige la nota alternativa para que sea idiomática y añade la nota cultural presente en la auditoría inglesa sobre στρατηγοί. También ajusta el castigo a «golpeados con varas» para reflejar con más transparencia ῥαβδίζειν.
