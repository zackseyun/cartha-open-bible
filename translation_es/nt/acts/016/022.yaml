review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: la multitud actúa contra Pablo y Silas, los magistrados les quitan la ropa y ordenan el castigo. Sin embargo, pierde parcialmente la fuerza colectiva de συνεπέστη al omitir «juntamente/en masa», y «las prendas» suena poco natural para αὐτῶν τὰ ἱμάτια en este contexto judicial. La nota alternativa también está mal formulada en español («a ellos»).'
  spanish_quality_summary: El texto es generalmente claro, pero necesita pulido para sonar natural y digno en español eclesial contemporáneo. «Se levantó contra ellos» es aceptable, pero «se levantó en masa contra ellos» conserva mejor el matiz colectivo sin pesadez. «Les rasgaron la ropa» es más idiomático que «rasgarles las prendas». «Azotados con varas» es entendible, aunque «golpeados con varas» evita posible asociación con látigos y se alinea más transparentemente con ῥαβδίζειν.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Magistrados» concuerda con la decisión POB para στρατηγοί. No se requieren ajustes de nombres divinos o títulos mesiánicos. La revisión se centra en precisión léxica y naturalidad española.
  issues:
  - severity: medium
    issue: Se atenúa el matiz colectivo de συνεπέστη
    rationale: El griego y la auditoría inglesa resaltan una acción hostil colectiva de la multitud. «Se levantó contra ellos» comunica hostilidad, pero no expresa tan claramente el elemento conjunto/colectivo como «se levantó en masa contra ellos».
  - severity: medium
    issue: «Las prendas» es poco natural para ἱμάτια en este contexto
    rationale: Aunque semánticamente posible, «prendas» suena más comercial o moderno. En una escena pública de castigo, «la ropa» o «sus ropas» es más natural y fiel al sentido narrativo.
  - severity: low
    issue: La nota alternativa usa una construcción poco idiomática
    rationale: «Se unió a atacar a ellos» debe reformularse como «se unió al ataque contra ellos» o «se unió a atacarlos» para español natural.
  - severity: low
    issue: «Azotados con varas» puede sugerir impropiamente látigos
    rationale: Dado que ῥαβδίζειν especifica golpear con varas, «golpeados con varas» es más transparente; «azotados con varas» no es incorrecto, pero es algo menos preciso.
  revised_spanish_text: Y la multitud se levantó en masa contra ellos[a], y los magistrados, después de rasgarles la ropa, ordenaban que fueran golpeados con varas[b].
