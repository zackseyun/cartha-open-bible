translation:
  language: es
  text: Y la multitud se levantó en masa contra ellos[a], y los magistrados, después de rasgarles la ropa, ordenaban que fueran golpeados con varas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se unió al ataque contra ellos». El verbo griego subraya una acción hostil colectiva de la multitud.
    reason: lexical_alternative
  - marker: b
    text: El término traducido «magistrados» se refiere a las autoridades cívicas romanas de Filipos; más técnicamente, «pretores».
    reason: cultural_note
lexical_decisions:
- source_word: συνεπέστη
  english_pob_choice: rose up together against
  chosen_spanish: se levantó
  alternatives_spanish:
  - se levantó en conjunto contra
  - se alzó junto contra
  - se unió a atacar
  lexicon: BDAG
  rationale: El compuesto expresa una acción hostil colectiva y repentina. En español, «se levantó» comunica bien el inicio de la oposición; el valor colectivo y hostil queda reforzado por «contra ellos». Evité una formulación demasiado pesada que sonara artificial en español.
- source_word: ὄχλος
  english_pob_choice: crowd
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - turba
  - gente
  lexicon: BDAG
  rationale: «Multitud» conserva el referente colectivo sin cargar de antemano una valoración peyorativa. «Turba» sería más interpretativa; «gente» sería demasiado débil.
- source_word: στρατηγοὶ
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - magistrados principales
  - pretores
  lexicon: BDAG
  rationale: El término alude a autoridades cívicas romanas en Filipos. «Magistrados» es claro en español y mantiene la función administrativa; «pretores» es más técnico y requeriría más explicación en el texto principal.
- source_word: περιρήξαντες
  english_pob_choice: after tearing off
  chosen_spanish: después de rasgarles
  alternatives_spanish:
  - después de arrancarles
  - habiéndoles rasgado
  - tras rasgarles
  lexicon: BDAG
  rationale: El participio anterior al verbo principal indica acción previa. «Después de rasgarles» conserva la secuencia sin sobrecargar el ritmo. «Rasgar» es más cercano al gesto violento del griego que un simple «quitar».
- source_word: αὐτῶν τὰ ἱμάτια
  english_pob_choice: their garments
  chosen_spanish: las prendas
  alternatives_spanish:
  - sus vestidos
  - sus ropas
  - sus prendas
  lexicon: BDAG
  rationale: «Prendas» funciona como equivalente formal y amplio para ἱμάτια, evitando especificar más de lo que el texto dice. «Vestidos» podría sugerir una prenda concreta; «ropas» es posible pero menos preciso.
- source_word: ἐκέλευον
  english_pob_choice: were ordering
  chosen_spanish: ordenaban
  alternatives_spanish:
  - estaban ordenando
  - mandaban
  - daban órdenes de
  lexicon: BDAG
  rationale: El imperfecto en español puede expresar acción continua o reiterada sin requerir perífrasis. «Ordenaban» preserva la fuerza del mandato y su desarrollo en la escena mejor que un simple pretérito.
- source_word: ῥαβδίζειν
  english_pob_choice: to be beaten with rods
  chosen_spanish: que fueran azotados con varas
  alternatives_spanish:
  - que los apalearan con varas
  - que recibieran azotes con varas
  - que fueran golpeados con varas
  lexicon: BDAG
  rationale: El verbo denota castigo corporal con varas, no necesariamente con látigos. «Azotados con varas» transmite la pena romana con suficiente claridad en español; «golpeados» sería más general y menos preciso.
theological_decisions:
- issue: Autoridades romanas en Filipos
  english_pob_reading: magistrates refers to the Roman civic authorities in Philippi; more technically, praetors.
  chosen_spanish_reading: magistrados
  alternative_spanish_readings:
  - pretores
  - autoridades civiles
  rationale: No hay una cuestión doctrinal en sentido estricto, pero sí una decisión histórico-administrativa. «Magistrados» preserva la referencia institucional sin introducir una equivalencia técnica innecesaria en el texto principal.
  doctrine_reference: Contexto histórico de Hechos 16; administración romana en una colonia
- issue: Carácter colectivo y hostil de la acción de la multitud
  english_pob_reading: The Greek verb emphasizes collective hostile action by the crowd.
  chosen_spanish_reading: se levantó contra ellos
  alternative_spanish_readings:
  - se levantó en conjunto contra ellos
  - se unió para atacarlos
  rationale: La redacción española conserva el movimiento colectivo y la hostilidad sin agregar elementos no presentes en el griego. La fuerza adversativa queda suficientemente marcada por «contra ellos».
  doctrine_reference: No aplica; observación léxico-aspectual del relato
translation_notes:
  revision_awareness: El audit trail inglés no mostró cambios aplicados en la última revisión y fue calificado como de acuerdo mayoritario con observaciones menores. En español se mantuvo la decisión principal de reflejar la hostilidad colectiva de συνεπέστη y la referencia histórica de στρατηγοί, adaptando el registro para que suene natural y publicable en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «magistrados» por coherencia con el audit trail inglés; no se sustituyó por «pretores» en el texto principal.
  - «Varas» se eligió para ῥαβδίζειν porque comunica el castigo corporal específico sin confundirlo con azotes de látigo.
  - La nota de pie de página conserva una alternativa de lectura para el verbo colectivo, dado que el griego permite enfatizar el ataque hostil conjunto.
