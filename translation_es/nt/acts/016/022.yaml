    reason: cultural_note
  revision_rationale: La revisión conserva mejor el matiz colectivo de συνεπέστη, mejora la naturalidad del español en «la ropa», corrige la nota alternativa para que sea idiomática y añade la nota cultural presente en la auditoría inglesa sobre στρατηγοί. También ajusta el castigo a «golpeados con varas» para reflejar con más transparencia ῥαβδίζειν.
