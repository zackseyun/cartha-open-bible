  glossary_alignment: No hay conflictos con la terminología del proyecto. «Iglesias», «fe» y el resto del vocabulario se alinean bien con las decisiones del POB. La cuestión principal es de fidelidad de la nota alternativa y de naturalidad verbal en español.
