translation:
  language: es
  text: Así, pues, las iglesias se fortalecían en la fe[a] y aumentaban en número cada día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en fe». La frase griega puede referirse ya sea a ser fortalecidas en la fe cristiana como cuerpo compartido de creencias y vida, o más generalmente a ser fortalecidas en fe.
    reason: alternative_reading
lexical_decisions:
- source_word: αἱ μὲν οὖν
  english_pob_choice: So
  chosen_spanish: Así, pues
  alternatives_spanish:
  - Entonces
  - Por tanto
  - Así
  lexicon: BDAG
  rationale: La combinación de partículas marca una transición inferencial de resumen. «Así, pues» conserva ese enlace discursivo de manera natural en español sin sobrecargar el texto.
- source_word: ἐκκλησίαι
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - congregaciones
  - asambleas
  lexicon: BDAG
  rationale: En Hechos, el término se refiere a comunidades cristianas locales. «Iglesias» es claro, natural y mantiene la correspondencia histórica y eclesial del término.
- source_word: ἐστερεοῦντο
  english_pob_choice: were being strengthened
  chosen_spanish: eran fortalecidas
  alternatives_spanish:
  - estaban siendo fortalecidas
  - eran afirmadas
  - eran consolidadas
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa acción շարունակada en pasado. «Eran fortalecidas» preserva la pasividad y el carácter progresivo con un español más fluido que el calco más explícito «estaban siendo fortalecidas».
- source_word: τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - en la fe que profesaban
  - en la fe
  lexicon: BDAG
  rationale: 'Se mantiene «fe» como traducción base de πίστις. La presencia del artículo favorece aquí el sentido objetivo/comunitario: la fe como ámbito o contenido compartido, no solo confianza subjetiva.'
- source_word: ἐπερίσσευον
  english_pob_choice: were increasing
  chosen_spanish: aumentaban
  alternatives_spanish:
  - crecían
  - se multiplicaban
  - abundaban
  lexicon: BDAG
  rationale: El verbo indica crecimiento continuo. «Aumentaban» expresa bien el incremento numérico en un español natural; las opciones más fuertes como «se multiplicaban» exceden el matiz del griego.
- source_word: τῷ ἀριθμῷ
  english_pob_choice: in number
  chosen_spanish: en número
  alternatives_spanish:
  - numéricamente
  - en cantidad
  lexicon: BDAG
  rationale: El dativo de relación o medida se expresa de forma idiomática con «en número», que comunica con claridad el ámbito del aumento.
- source_word: καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - diariamente
  lexicon: BDAG
  rationale: La expresión distributiva denota repetición continua. «Cada día» es natural y conserva la idea de crecimiento cotidiano.
theological_decisions:
- issue: Sentido de πίστις con artículo
  english_pob_reading: the faith = the Christian faith/community belief in which the churches were strengthened
  chosen_spanish_reading: la fe = la fe cristiana compartida, como ámbito en que las iglesias eran fortalecidas
  alternative_spanish_readings:
  - la fe = la confianza personal de los creyentes
  - la fe = fidelidad
  rationale: El artículo y el contexto eclesial favorecen una referencia objetiva/comunitaria. La redacción española mantiene la tensión sin reducirla a mera confianza subjetiva, aunque esa lectura sigue siendo posible.
  doctrine_reference: 'DOCTRINE.md: πίστις se traduce por defecto «fe»; conservar la ambigüedad teológica cuando el contexto la sostenga'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje fuente; el estado más reciente indica alta concordancia y que no se requieren cambios. La versión española sigue de cerca la decisión inglesa establecida y conserva la ambigüedad documentada de πίστις.
  spanish_consistency_notes:
  - Se mantiene «iglesias» para ἐκκλησίαι, en coherencia con el uso eclesial de Hechos.
  - Se conserva «fe» como traducción base de πίστις, con nota para la alternativa objetiva/subjetiva.
  - El paralelismo imperfecto pasivo/activo se refleja con «eran fortalecidas» / «aumentaban».
  - «Cada día» reproduce el valor distributivo de καθ’ ἡμέραν de forma natural en español.
