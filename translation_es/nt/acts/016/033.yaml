    text: Or 'at that hour of the night.' The phrase highlights how late and immediate the response was.
    reason: lexical_alternative
  - marker: b
    text: Literally 'washed [them] from the wounds'; that is, he washed their injuries.
    reason: lexical_alternative
  - marker: c
    text: Or 'all his family.' The Greek more broadly denotes his household, those belonging to his domestic sphere.
    reason: alternative_reading
