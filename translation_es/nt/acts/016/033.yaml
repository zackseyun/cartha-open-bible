translation:
  language: es
  text: Y tomándolos en aquella hora de la noche[a], les lavó las heridas[b], y enseguida fue bautizado él, y toda su casa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a aquella hora de la noche». La frase destaca cuán tarde fue y cuán inmediata fue la respuesta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lavó [de] las heridas»; es decir, lavó sus heridas o las limpió.
    reason: lexical_alternative
  - marker: c
    text: O «toda su familia». El griego denota más ampliamente a su casa, los que pertenecían a su esfera doméstica.
    reason: alternative_reading
lexical_decisions:
- source_word: παραλαβὼν
  english_pob_choice: taking
  chosen_spanish: tomándolos
  alternatives_spanish:
  - habiéndolos tomado
  - tomando a los dos
  - llevándolos consigo
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa del carcelero. «Tomándolos» mantiene la secuencia narrativa y suena natural en español sin añadir un destino o detalle que el griego no especifica.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ τῆς νυκτός
  english_pob_choice: in that hour of the night
  chosen_spanish: en aquella hora de la noche
  alternatives_spanish:
  - a aquella hora de la noche
  - en esa misma hora de la noche
  - a esa hora de la noche
  lexicon: BDAG
  rationale: La frase subraya la hora tardía y la respuesta inmediata. «En aquella hora de la noche» conserva la construcción temporal y el matiz enfático del griego.
- source_word: ἔλουσεν
  english_pob_choice: washed
  chosen_spanish: lavó
  alternatives_spanish:
  - lavó cuidadosamente
  - limpió
  - bañó
  lexicon: BDAG
  rationale: λούω aquí se refiere a lavar a Pablo y Silas en relación con sus heridas. «Lavó» es la opción más directa y fiel; «bañó» sonaría menos preciso en este contexto.
- source_word: ἀπὸ τῶν πληγῶν
  english_pob_choice: their wounds
  chosen_spanish: las heridas
  alternatives_spanish:
  - de las heridas
  - de sus heridas
  - las llagas
  lexicon: BDAG
  rationale: La construcción con ἀπό después de λούω indica lavar a causa de las heridas o limpiar lo relacionado con ellas. «Les lavó las heridas» comunica de manera natural el sentido del giro idiomático sin volverlo opaco.
- source_word: ἐβαπτίσθη
  english_pob_choice: was baptized
  chosen_spanish: fue bautizado
  alternatives_spanish:
  - recibió el bautismo
  - se bautizó
  lexicon: BDAG
  rationale: El pasivo expresa que recibió el bautismo. «Fue bautizado» preserva la voz pasiva y evita introducir una lectura denominacional sobre el modo o la agencia del acto.
- source_word: οἱ αὐτοῦ πάντες
  english_pob_choice: all his household
  chosen_spanish: todos los de su casa
  alternatives_spanish:
  - toda su casa
  - todos los suyos
  - toda su familia
  lexicon: BDAG
  rationale: La expresión abarca a quienes pertenecen al ámbito doméstico del carcelero. «Todos los de su casa» es claro en español y mantiene un alcance más amplio que «familia» en sentido restringido.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: enseguida
  alternatives_spanish:
  - al instante
  - de inmediato
  - en seguida
  lexicon: BDAG
  rationale: El adverbio marca inmediatez. «Enseguida» es natural, breve y transmite bien la rapidez del hecho.
theological_decisions:
- issue: Alcance de «οἱ αὐτοῦ πάντες» en relación con el bautismo
  english_pob_reading: Rendered as 'all his household' without specifying age, personal profession, or mode of baptism.
  chosen_spanish_reading: Se traduce como «todos los de su casa» sin precisar edades, profesión de fe ni modo del bautismo.
  alternative_spanish_readings:
  - toda su familia
  - todos los suyos
  rationale: El versículo afirma que fueron bautizados el carcelero y todos los suyos, pero no resuelve por sí mismo debates posteriores sobre bautismo de casa, bautismo infantil o el modo del bautismo. La traducción conserva la afirmación narrativa sin importar conclusiones doctrinales no explicitadas en el griego.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta redacción mantiene la misma decisión de fondo y solo la expresa en español con equivalencias naturales y auditables.
  spanish_consistency_notes:
  - Se conserva «bautizado» para el pasivo de ἐβαπτίσθη, evitando sustituirlo por «sumergido» o «inmerso».
  - «Casa» se usa en sentido doméstico amplio, no como sinónimo restringido de parentesco nuclear.
  - La temporalidad de «en aquella hora de la noche» mantiene el énfasis narrativo de urgencia y hora tardía.
  - Se evita «stripes»/«azotes» en el texto principal porque el griego aquí se centra en las heridas resultantes; la nota conserva la alternativa literal implícita.
