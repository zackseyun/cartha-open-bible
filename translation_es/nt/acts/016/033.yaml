    reason: lexical_alternative
  - marker: c
    text: O «toda su familia». El griego denota más ampliamente a su casa, los que pertenecían a su esfera doméstica.
    reason: alternative_reading
  revision_rationale: Se ajusta la ubicación de «enseguida» para que modifique de forma más clara la acción de ser bautizado, en línea con παραχρῆμα y con la auditoría inglesa. También se cambia «todos los de su casa» por «toda su casa» por mayor naturalidad e idiomaticidad sin perder el matiz de household.
