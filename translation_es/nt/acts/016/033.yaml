revisions:
- from: Y tomándolos en aquella hora de la noche[a], les lavó las heridas[b], y fue bautizado él mismo, y todos los de su casa[c], enseguida.
  to: Y tomándolos en aquella hora de la noche[a], les lavó las heridas[b], y enseguida fue bautizado él, y toda su casa[c].
  rationale: Se ajusta la ubicación de «enseguida» para que modifique de forma más clara la acción de ser bautizado, en línea con παραχρῆμα y con la auditoría inglesa. También se cambia «todos los de su casa» por «toda su casa» por mayor naturalidad e idiomaticidad sin perder el matiz de household.
