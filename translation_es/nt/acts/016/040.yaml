translation:
  language: es
  text: Después de salir de la cárcel, fueron a ver a Lidia, y al ver a los hermanos[a], los animaron y se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas». El término griego está en masculino plural, pero puede referirse a un grupo mixto de creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  english_pob_choice: After they came out
  chosen_spanish: Después de salir
  alternatives_spanish:
  - Habiendo salido
  - Cuando salieron
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente en español con una cláusula temporal. «Después de salir» conserva la secuencia narrativa sin forzar una construcción demasiado literal.
- source_word: ἀπὸ τῆς φυλακῆς
  english_pob_choice: from the prison
  chosen_spanish: de la cárcel
  alternatives_spanish:
  - de la prisión
  - fuera de la cárcel
  lexicon: BDAG
  rationale: φυλακή designa aquí el lugar de detención concreto. «Cárcel» es natural en español moderno y mantiene la referencia específica al lugar del que salen.
- source_word: εἰσῆλθον πρὸς τὴν Λυδίαν
  english_pob_choice: they went to Lydia
  chosen_spanish: fueron a ver a Lidia
  alternatives_spanish:
  - fueron a Lidia
  - entraron adonde estaba Lidia
  lexicon: BDAG
  rationale: La expresión πρός con persona suele implicar ir a visitarla. En español, «fueron a ver a Lidia» comunica ese sentido de visita sin añadir innecesariamente «casa», siguiendo la cautela del POB en inglés.
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo se vierte como complemento temporal breve y natural en español. «Al ver» enlaza bien con la acción siguiente.
- source_word: παρεκάλεσαν
  english_pob_choice: they encouraged them
  chosen_spanish: los animaron
  alternatives_spanish:
  - los exhortaron
  - los consolaron
  lexicon: BDAG
  rationale: παρακαλέω puede significar animar, exhortar o consolar. En este contexto narrativo, tras la liberación, «los animaron» preserva el sentido pastoral amplio sin estrecharlo solo a exhortación formal o consuelo emocional.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos[a]
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego en el texto principal, pero en español la nota aclara que puede incluir un grupo mixto de creyentes. Esto conserva la forma del original sin ocultar su alcance inclusivo.
- source_word: ἐξῆλθαν
  english_pob_choice: departed
  chosen_spanish: se fueron
  alternatives_spanish:
  - salieron
  - partieron
  lexicon: BDAG
  rationale: Como cierre narrativo, «se fueron» suena natural en español y evita repetir de manera rígida la idea de «salir» que ya apareció antes.
theological_decisions:
- issue: Alcance de ἀδελφοί en una reunión cristiana posiblemente mixta
  english_pob_reading: the brothers
  chosen_spanish_reading: a los hermanos[a]
  alternative_spanish_readings:
  - a los hermanos y hermanas
  - a los creyentes
  rationale: Se conserva la forma gramatical masculina plural como en el griego y como en la opción inglesa del POB. La nota protege el sentido probable de grupo mixto sin reemplazar el término fuente en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: evita añadir «casa» a la referencia a Lidia y mantiene una formulación breve y directa para el movimiento narrativo. También conserva la tensión lexical de ἀδελφοί mediante nota, en lugar de neutralizarla en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Lidia» como forma española estándar del nombre propio.
  - Se prefiere «cárcel» por naturalidad, sin perder la referencia concreta a φυλακή.
  - «Los animaron» mantiene el valor amplio de παρακαλέω sin sobreinterpretar el matiz.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación.
  - No se introduce «casa» ni otra expansión no presente en el griego.
