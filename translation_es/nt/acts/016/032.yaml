translation:
  language: es
  text: Les hablaron[a] la palabra del Señor[b] a él[c], junto con todos los que estaban en su casa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablaron». El griego puede expresarse en español con o sin pronombre de objeto indirecto.
    reason: previous_rendering
  - marker: b
    text: O «la palabra acerca del Señor». La expresión griega «la palabra del Señor» puede denotar el mensaje que pertenece al Señor, que proviene del Señor o que trata del Señor.
    reason: alternative_reading
  - marker: c
    text: Es decir, al carcelero.
    reason: clarification
  - marker: d
    text: O «con todos los de su casa» o «con todos los que estaban en su hogar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: les hablaron
  alternatives_spanish:
  - hablaron
  - les dijeron
  - proclamaron
  lexicon: BDAG
  rationale: λαλέω aquí introduce comunicación directa del mensaje; en español, «hablaron» conserva el registro natural y no exagera el matiz heraldico. Se añade el dativo léxico «les» para reflejar el destinatario de la acción.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: les
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El contexto inmediato identifica al carcelero como receptor, pero la construcción española fluye mejor con el destinatario implícito en «les hablaron»; el sentido de dative receptor queda preservado por el verbo.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra del mensaje
  lexicon: BDAG
  rationale: λόγος en este contexto designa el mensaje cristiano; «la palabra» mantiene el giro neotestamentario y deja transparente la relación con «de Yahvé».
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - acerca de Yahvé
  - de el Señor
  lexicon: BDAG
  rationale: Aunque el inglés conserva «of the Lord», el texto griego con κύριος puede remitir al nombre divino. Conforme al criterio del proyecto, se usa «Yahvé» cuando el trasfondo es el nombre divino; así se evita ocultar el referente y se mantiene la tensión del genitivo sin resolverlo como «acerca de».
- source_word: σὺν πᾶσι τοῖς ἐν τῇ οἰκίᾳ αὐτοῦ
  english_pob_choice: together with all who were in his house
  chosen_spanish: junto con todos los que estaban en su casa
  alternatives_spanish:
  - con todos los de su casa
  - junto con toda su casa
  - junto con todos los de su hogar
  lexicon: BDAG
  rationale: σύν con dativo significa «con / junto con». En español, «junto con todos los que estaban en su casa» conserva la inclusión del grupo presente sin forzar una repetición de «a»; «casa» mantiene la imagen concreta de οἰκία, mientras la cláusula relacional explica que se trata de personas presentes.
theological_decisions:
- issue: Sentido de λόγος τοῦ κυρίου
  english_pob_reading: '''the word of the Lord'' without specifying whether the genitive is subjective or objective.'
  chosen_spanish_reading: «la palabra de Yahvé» sin especificar si es palabra que viene de Yahvé, que pertenece a Yahvé o que trata de Yahvé.
  alternative_spanish_readings:
  - la palabra acerca de Yahvé
  - el mensaje de Yahvé
  - la palabra procedente de Yahvé
  rationale: El griego permite varias relaciones del genitivo con λόγος. La traducción conserva esa amplitud al no resolverla en una sola paráfrasis; el lector puede entender tanto el mensaje que proviene de Yahvé como el mensaje referente a él.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms: κύριος -> Yahvé'
- issue: Alcance de σὺν πᾶσι τοῖς ἐν τῇ οἰκίᾳ αὐτοῦ
  english_pob_reading: together with all who were in his house
  chosen_spanish_reading: «junto con todos los que estaban en su casa» como inclusión del grupo entero en la audiencia inmediata.
  alternative_spanish_readings:
  - y a todos los que estaban en su casa
  - junto con toda su casa
  - con todos los de su casa
  rationale: La frase griega puede leerse como acompañamiento y, por el contexto, también como participación en la escucha del mensaje. El español elegido mantiene la estructura de acompañamiento sin borrar esa posibilidad de que todo el grupo recibiera la palabra.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Acts 16 context
translation_notes:
  revision_awareness: El inglés POB pasó por ajustes menores para reflejar con más claridad la frase con σύν, alternando entre «together with» y «and to all». La versión española sigue la solución final que preserva el valor de «junto con» sin duplicar indebidamente la preposición de destinatario.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para κύριος cuando el trasfondo remite al nombre divino.
  - Se mantiene «casa» en el texto principal para reflejar οἰκία, con «los que estaban en su casa» para explicitar el referente humano sin imponer «hogar» como única lectura.
  - «La palabra» conserva el eco bíblico y permite que el genitivo quede abierto, sin resolver prematuramente el alcance teológico del mensaje.
