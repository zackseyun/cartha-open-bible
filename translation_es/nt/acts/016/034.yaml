revisions:
- from: Y después de subirlos a la casa[a], les puso la mesa y se alegró mucho con toda su casa[b], habiendo creído en Dios.
  to: Y después de subirlos a la casa[a], les sirvió una comida y se alegró mucho con toda su casa[b], habiendo creído en Dios.
  rationale: Se reemplaza «les puso la mesa» por «les sirvió una comida» para expresar con claridad el sentido idiomático de παρέθηκεν τράπεζαν, en línea con el análisis fuente y el English POB. Se mantiene «la casa», «con toda su casa» y «habiendo creído en Dios» porque reflejan adecuadamente el griego y preservan la tensión exegética documentada. También se ajusta la nota a para que la alternativa literal sea más natural en español.
