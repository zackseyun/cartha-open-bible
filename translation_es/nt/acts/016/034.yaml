    issue: «les puso la mesa» para παρέθηκεν τράπεζαν
    rationale: El griego es un modismo que en contexto significa proveer una comida. En español, «poner la mesa» normalmente significa disponer cubiertos/platos, no necesariamente servir alimento. Esto debilita la fidelidad semántica y la claridad.
  - severity: low
