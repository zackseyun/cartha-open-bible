translation:
  language: es
  text: Y después de subirlos a la casa[a], les sirvió una comida y se alegró mucho con toda su casa[b], habiendo creído en Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les puso la mesa delante»; el giro griego es idiomático y se refiere a proporcionar una comida.'
    reason: lexical_alternative
  - marker: b
    text: El griego también puede entenderse como que el gozo involucró a toda su casa; algunos toman la cláusula como indicio de que la casa también participó en la fe.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναγαγών
  english_pob_choice: after bringing ... up
  chosen_spanish: después de subirlos
  alternatives_spanish:
  - habiéndolos subido
  - después de haberlos llevado arriba
  lexicon: BDAG
  rationale: El participio aoristo conserva una secuencia previa a los verbos principales. «Subirlos» comunica el movimiento hacia arriba de manera natural en español y mantiene el valor espacial del verbo.
- source_word: οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - su casa
  - el hogar
  lexicon: BDAG
  rationale: «La casa» es la equivalencia más directa del artículo con el contexto del carcelero. «Su casa» sería más explícito, pero añade una posesión que el griego no expresa aquí de forma abierta en la frase.
- source_word: παρέθηκεν τράπεζαν
  english_pob_choice: he set a meal before them
  chosen_spanish: les puso la mesa
  alternatives_spanish:
  - les sirvió una comida
  - les preparó una mesa
  lexicon: BDAG
  rationale: La expresión griega es idiomática y alude a ofrecer hospitalidad/comida. «Les puso la mesa» conserva el giro idiomático sin volverlo rígidamente literal ni perder el sentido de provisión de alimento.
- source_word: ἠγαλλιάσατο
  english_pob_choice: rejoiced greatly
  chosen_spanish: se alegró mucho
  alternatives_spanish:
  - se regocijó
  - exultó
  lexicon: BDAG
  rationale: El verbo expresa gozo intenso. «Se alegró mucho» es claro y digno en español moderno; «se regocijó» o «exultó» serían más marcados, pero menos naturales para lectura pública continuada.
- source_word: πανοικεὶ
  english_pob_choice: with his whole household
  chosen_spanish: con toda su casa
  alternatives_spanish:
  - con toda su familia
  - con todo su hogar
  lexicon: BDAG
  rationale: La forma adverbial apunta al conjunto doméstico/ familiar. «Toda su casa» refleja bien el alcance colectivo y conserva el lenguaje bíblico sin exigir una explicación adicional en el texto principal.
- source_word: πεπιστευκὼς τῷ θεῷ
  english_pob_choice: having believed in God
  chosen_spanish: habiendo creído en Dios
  alternatives_spanish:
  - después de haber creído en Dios
  - porque había creído en Dios
  lexicon: BDAG
  rationale: El participio perfecto indica una acción completada con estado resultante. «Habiendo creído en Dios» sigue de cerca la construcción sin añadir una causalidad explícita que el griego no formula de modo directo. «Creído en Dios» mantiene la selección verbal con dative de objeto de fe.
theological_decisions:
- issue: Relación entre el gozo del carcelero y el alcance de «toda su casa»
  english_pob_reading: The main text presents the jailer as rejoicing with his whole household, with the cause stated as his having believed in God.
  chosen_spanish_reading: 'El texto principal presenta al carcelero como quien se alegró con toda su casa, y la causa se expresa con el participio: «habiendo creído en Dios».'
  alternative_spanish_readings:
  - Toda la casa se alegró porque todos habían creído en Dios
  - Se alegró por toda su casa, la cual había creído en Dios
  rationale: La sintaxis griega deja abierta la discusión sobre si πανοικεὶ modifica solo el gozo o si insinúa además la participación de la casa en la fe. Como el participio perfecto singular se refiere más directamente al carcelero, el español mantiene ese referente singular y no resuelve en exceso la tensión.
  doctrine_reference: Preservar la tensión exegética sin sobre-interpretar el alcance de la fe doméstica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa al conservar la construcción participial «habiendo creído en Dios» en lugar de introducir una causalidad explícita. También mantiene el matiz idiomático de παρέθηκεν τράπεζαν con una expresión española natural.
  spanish_consistency_notes:
  - Se usa «Dios» para θεῷ conforme al estándar del proyecto.
  - Se mantiene «casa» para el conjunto doméstico, evitando una resolución interpretativa excesiva en el texto principal.
  - 'Se preserva el paralelismo verbal del original: movimiento previo, provisión de comida, gozo intenso y participio final de fe.'
