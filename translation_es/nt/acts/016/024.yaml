translation:
  language: es
  text: Él, habiendo recibido tal orden, los arrojó en la prisión interior[a] y les aseguró los pies en el cepo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la prisión más interior».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «en el madero»; en contexto se refiere a un dispositivo de madera para inmovilizar, es decir, un cepo.
    reason: cultural_note
lexical_decisions:
- source_word: παραγγελίαν τοιαύτην
  english_pob_choice: such an order
  chosen_spanish: tal orden
  alternatives_spanish:
  - tal mandato
  - tal instrucción
  lexicon: BDAG
  rationale: παραγγελία puede denotar una orden o mandato de autoridad. «Orden» conserva bien el carácter oficial y suena natural en español moderno; «tal» reproduce τοιαύτην con una referencia cualitativa semejante a «such».
- source_word: λαβὼν
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - después de recibir
  - cuando recibió
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Habiendo recibido» mantiene esa relación temporal sin añadir interpretación.
- source_word: ἔβαλεν
  english_pob_choice: threw
  chosen_spanish: los arrojó
  alternatives_spanish:
  - los puso
  - los echó
  lexicon: BDAG
  rationale: βάλλω puede significar «arrojar» o «poner» según el contexto. Aquí conviene conservar la fuerza brusca del verbo, que en la narración expresa trato severo.
- source_word: ἐσωτέραν φυλακὴν
  english_pob_choice: the inner prison
  chosen_spanish: la prisión interior
  alternatives_spanish:
  - la prisión más interior
  - la celda interior
  lexicon: BDAG
  rationale: ἐσωτέραν es comparativo de interioridad. «Prisión interior» refleja con naturalidad el lugar más adentro de la cárcel; «interior» evita forzar un superlativo que el griego no exige.
- source_word: ἠσφαλίσατο
  english_pob_choice: secured
  chosen_spanish: les aseguró
  alternatives_spanish:
  - los sujetó
  - los fijó con seguridad
  lexicon: BDAG
  rationale: ἀσφαλίζω significa asegurar o hacer firme/seguro. «Les aseguró» funciona bien con el objeto siguiente y mantiene la idea de sujeción firme.
- source_word: τοὺς πόδας αὐτῶν
  english_pob_choice: their feet
  chosen_spanish: los pies
  alternatives_spanish:
  - sus pies
  - las piernas
  lexicon: BDAG
  rationale: πούς significa literalmente «pie». El español permite omitir el posesivo cuando el contexto ya lo da por entendido; en la segunda mitad de la frase se entiende que se trata de sus pies.
- source_word: εἰς τὸ ξύλον
  english_pob_choice: in the stocks
  chosen_spanish: en el cepo
  alternatives_spanish:
  - en el madero
  - en los cepos
  lexicon: BDAG
  rationale: ξύλον significa literalmente «madera» o «madero», pero en este contexto carcelario alude a un aparato de madera para inmovilizar los pies. «Cepo» comunica ese dispositivo de forma idiomática en español; la nota conserva el sentido literal y cultural.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y mantiene el valor aspectual del participio aoristo, la fuerza de βάλλω y la referencia cultural de ξύλον según el audit trail inglés. Se adoptó una solución española natural sin perder el contraste entre la prisión interior y el cepo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se conserva el tono narrativo sobrio y judicial del contexto.
  - «Cépo» se prefiere aquí por ser el equivalente idiomático más claro de un artefacto de inmovilización de madera en contexto carcelario.
