revisions:
- from: Así que los portadores de las varas[a][b] comunicaron estos hechos[c] a los magistrados[d], y se asustaron al oír que eran romanos[e].
  to: Así que los portadores de las varas[b] comunicaron estas palabras a los magistrados[c], y se asustaron al oír que eran romanos[a].
  rationale: La revisión corrige la fidelidad léxica de τὰ ῥήματα ταῦτα con «estas palabras», reubica correctamente la nota sobre «romanos» al término relevante y elimina notas no necesarias o mal orientadas. Se conserva el resto del estilo porque sigue siendo natural y suficientemente preciso para el contexto narrativo.
