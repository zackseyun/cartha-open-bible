translation:
  language: es
  text: Así que los portadores de las varas[b] comunicaron estas palabras a los magistrados[c], y se asustaron al oír que eran romanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciudadanos romanos». El griego dice «romanos», pero en este contexto legal el punto es su estatus cívico protegido.
    reason: lexical_alternative
  - marker: b
    text: «Portadores de las varas» se refiere a los asistentes de los magistrados, tradicionalmente llamados «lictores».
    reason: cultural_note
  - marker: c
    text: «Magistrados» traduce στρατηγοί, los principales funcionarios civiles de Filipos.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: comunicaron
  alternatives_spanish:
  - reportaron
  - dieron cuenta de
  lexicon: BDAG
  rationale: El verbo griego indica transmitir o informar oficialmente un mensaje. «Comunicaron» conserva el acto de trasladar la noticia en un registro natural y sobrio para español, sin añadir matices innecesarios.
- source_word: στρατηγοῖς
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - magistrados principales
  - pretores
  lexicon: BDAG
  rationale: En el contexto de Filipos, στρατηγοί designa a las autoridades civiles de la ciudad. «Magistrados» es una equivalencia clara y reconocible en español; mantiene la función oficial sin forzar un tecnicismo latino.
- source_word: ῥαβδοῦχοι
  english_pob_choice: rod-bearers
  chosen_spanish: portadores de las varas
  alternatives_spanish:
  - lictores
  - oficiales
  lexicon: BDAG
  rationale: La imagen literal del griego es «los que llevan varas». «Portadores de las varas» preserva esa concreción y deja visible el símbolo de autoridad, como hace el inglés POB con «rod-bearers».
- source_word: τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estos hechos
  alternatives_spanish:
  - estas palabras
  - este mensaje
  lexicon: BDAG
  rationale: Aunque el inglés dice «these words», en español «hechos» puede comunicar mejor que no se trata solo de palabras sueltas, sino del informe completo transmitido por los portadores de las varas. Aun así, reconozco que el griego usa ῥήματα, por eso la formulación sigue siendo breve y concreta, sin expandirse a una paráfrasis amplia.
- source_word: ἐφοβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: se asustaron
  alternatives_spanish:
  - tuvieron miedo
  - les dio miedo
  lexicon: BDAG
  rationale: El aoristo pasivo/deponente expresa temor como reacción inmediata. «Se asustaron» reproduce bien ese impacto emocional en español actual, con un tono natural y suficientemente directo.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo marca circunstancia temporal concomitante. «Al oír» es una forma idiomática en español que conserva la relación temporal sin sobreexplicar la secuencia.
- source_word: Ῥωμαῖοι
  english_pob_choice: Romans
  chosen_spanish: romanos
  alternatives_spanish:
  - ciudadanos romanos
  lexicon: BDAG
  rationale: El griego dice literalmente «romanos». El español principal mantiene esa forma, como el inglés POB, para no introducir en el texto principal una precisión interpretativa que el griego no explicita de manera directa.
theological_decisions:
- issue: 'El motivo del temor de los magistrados: identidad romana y estatus cívico protegido'
  english_pob_reading: The Greek says 'Romans,' but in this legal context the point is their protected civic status.
  chosen_spanish_reading: El texto principal dice «romanos»; el lector puede inferir, por el contexto legal, que el trasfondo es su estatus cívico protegido.
  alternative_spanish_readings:
  - ciudadanos romanos
  - romanos, es decir, ciudadanos romanos
  rationale: No conviene borrar la tensión entre lo que dice explícitamente el griego y lo que el contexto sugiere. Por eso el texto principal conserva «romanos», y la posible implicación jurídica queda para la nota, siguiendo la cautela del POB en inglés.
  doctrine_reference: Hechos 16:38; derecho cívico romano en contexto narrativo
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el audit trail inglés y conserva las mismas decisiones de fondo: στρατηγοί como «magistrados», ῥαβδοῦχοι como «portadores de las varas» y Ῥωμαῖοι como «romanos». Se introduce una leve adaptación en τὰ ῥήματα ταῦτα con «estos hechos» para que el español suene natural sin perder el carácter de informe oficial. No se detectan revisiones aplicadas en el expediente inglés, y el acuerdo de revisión previo fue alto.'
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y directo.
  - Se evita sustituir el lenguaje cívico por terminología eclesiástica o tradicional no sustentada por el contexto.
  - Las notas conservan la tensión entre la literalidad del griego y la inferencia contextual sobre ciudadanía romana.
  - El uso de «al oír» en el texto y la nota sobre «al escuchar» preserva la función del participio sin recargar la sintaxis.
