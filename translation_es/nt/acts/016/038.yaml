    text: «Portadores de las varas» se refiere a los asistentes de los magistrados, tradicionalmente llamados «lictores».
    reason: cultural_note
  - marker: c
    text: «Magistrados» traduce στρατηγοί, los principales funcionarios civiles de Filipos.
    reason: cultural_note
  revision_rationale: La revisión corrige la fidelidad léxica de τὰ ῥήματα ταῦτα con «estas palabras», reubica correctamente la nota sobre «romanos» al término relevante y elimina notas no necesarias o mal orientadas. Se conserva el resto del estilo porque sigue siendo natural y suficientemente preciso para el contexto narrativo.
