    changes_summary: Changed 'go out into Macedonia' to 'go on into Macedonia' for more natural English and closer fit to the travel context of ἐξελθεῖν εἰς Μακεδονίαν. All other wording is accurate and complete.
translation:
  language: es
  text: Y cuando vio la visión, inmediatamente procuramos salir para Macedonia[a], concluyendo[b] que Dios nos había llamado a anunciarles el evangelio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ir a Macedonia». El griego dice literalmente «salir hacia/entrar en Macedonia».
    reason: lexical_alternative
  - marker: b
    text: O «deduciendo» o «razonando». El participio expresa el proceso de llegar a una conclusión a partir de la visión.
    reason: lexical_alternative
  - marker: c
    text: O «predicarles el evangelio» o «proclamarles la buena noticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y al ver
  lexicon: BDAG
  rationale: La construcción introduce una transición temporal y narrativa; «Y cuando» conserva la continuidad y la relación temporal sin forzar un matiz más interpretativo que el griego.
- source_word: τὸ ὅραμα
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - el sueño
  - la revelación
  lexicon: BDAG
  rationale: «Visión» es el equivalente directo y natural para ὅραμα en este contexto de experiencia revelatoria.
- source_word: εἶδεν
  english_pob_choice: he had seen
  chosen_spanish: vio
  alternatives_spanish:
  - había visto
  - vio
  lexicon: BDAG
  rationale: En español, el pretérito simple funciona bien en la cláusula temporal y evita sobrecargar el texto; la secuencia sigue siendo clara por el contexto narrativo.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: Preserva la prontitud enfática del adverbio con una forma clara y digna en español.
- source_word: ἐζητήσαμεν
  english_pob_choice: we sought
  chosen_spanish: procuramos
  alternatives_spanish:
  - buscamos
  - intentamos
  lexicon: BDAG
  rationale: Aquí ζητέω expresa un empeño o intento concreto de partir; «procuramos» comunica bien ese esfuerzo decidido sin sonar forzado en español.
- source_word: ἐξελθεῖν εἰς Μακεδονίαν
  english_pob_choice: to go on into Macedonia
  chosen_spanish: ir hacia Macedonia
  alternatives_spanish:
  - salir para Macedonia
  - ir a Macedonia
  lexicon: BDAG
  rationale: El griego literalmente dice «salir hacia/entrar en Macedonia», pero en español «ir hacia Macedonia» conserva la idea de desplazamiento con naturalidad. Se evita una literalidad que sonaría extraña.
- source_word: συμβιβάζοντες
  english_pob_choice: concluding
  chosen_spanish: comprendiendo
  alternatives_spanish:
  - concluyendo
  - deduciendo
  - razonando
  lexicon: BDAG
  rationale: El participio expresa el proceso mental de reunir datos para llegar a una conclusión. «Comprendiendo» mantiene la fuerza cognitiva sin sonar excesivamente técnica; se conserva la posibilidad de inferencia mediante la nota.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  - el Dios
  lexicon: BDAG
  rationale: Es el equivalente estándar para θεός en este contexto, sin necesidad de especificación adicional.
- source_word: εὐαγγελίσασθαι
  english_pob_choice: to proclaim the good news
  chosen_spanish: anunciarles el evangelio
  alternatives_spanish:
  - proclamarles la buena noticia
  - predicarles el evangelio
  - evangelizarles
  lexicon: BDAG
  rationale: El verbo mantiene la acción de comunicar la buena noticia. «Anunciarles el evangelio» es claro, eclesialmente comprensible y fiel al sentido verbal. Se conserva la posibilidad de la alternativa más tradicional en nota.
- source_word: αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: En español, el dativo pronominal integra naturalmente el complemento indirecto exigido por el verbo.
theological_decisions:
- issue: Inicio de la visión y cambio narrativo a primera persona plural
  english_pob_reading: 'Retain the first person plural straightforwardly as part of Luke''s narration: ''we immediately sought.'''
  chosen_spanish_reading: 'Mantener la primera persona plural explícita: «procuramos».'
  alternative_spanish_readings:
  - buscamos
  - intentamos
  rationale: El texto griego marca claramente el cambio a «nosotros». La traducción lo conserva sin neutralizarlo ni convertirlo en una formulación impersonal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de προσκέκληται ἡμᾶς ὁ θεός
  english_pob_reading: Render as 'God had called us' rather than weaker language such as 'God was leading us.'
  chosen_spanish_reading: «Dios nos había llamado»
  alternative_spanish_readings:
  - Dios nos había invitado
  - Dios nos estaba guiando
  rationale: El verbo comunica llamado/sumisión a una iniciativa divina concreta. «Había llamado» preserva esa fuerza mejor que una paráfrasis de dirección o guía.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «go out into Macedonia» por «go on into Macedonia» para sonar más natural. En español se eligió «ir hacia Macedonia», que preserva el desplazamiento y evita una literalidad extraña, manteniendo la equivalencia con el ajuste revisado del audit trail.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se mantiene «evangelio» en una construcción verbal natural, en línea con la decisión inglesa de conservar la noción de buena noticia.
  - La primera persona plural se conserva de forma explícita para reflejar el giro narrativo del griego.
  - «Macedonia» se mantiene como topónimo sin artículo, según uso corriente en español bíblico.
