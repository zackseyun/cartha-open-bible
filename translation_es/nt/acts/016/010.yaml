    text: O «ir a Macedonia». El griego dice literalmente «salir hacia/entrar en Macedonia».
    reason: lexical_alternative
  - marker: b
    text: O «deduciendo» o «razonando». El participio expresa el proceso de llegar a una conclusión a partir de la visión.
    reason: lexical_alternative
  - marker: c
    text: O «predicarles el evangelio» o «proclamarles la buena noticia».
    reason: lexical_alternative
  revision_rationale: Se ajusta «ir hacia Macedonia» a «salir para Macedonia» para reflejar mejor ἐξελθεῖν εἰς Μακεδονίαν en español natural, y «comprendiendo» a «concluyendo» para preservar el valor inferencial de συμβιβάζοντες según la evidencia griega y la auditoría inglesa. Lo demás queda sustancialmente fiel y legible.
