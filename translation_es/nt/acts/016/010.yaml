revisions:
- from: Y cuando vio la visión, inmediatamente procuramos ir hacia Macedonia[a], comprendiendo[b] que Dios nos había llamado a anunciarles el evangelio[c].
  to: Y cuando vio la visión, inmediatamente procuramos salir para Macedonia[a], concluyendo[b] que Dios nos había llamado a anunciarles el evangelio[c].
  rationale: Se ajusta «ir hacia Macedonia» a «salir para Macedonia» para reflejar mejor ἐξελθεῖν εἰς Μακεδονίαν en español natural, y «comprendiendo» a «concluyendo» para preservar el valor inferencial de συμβιβάζοντες según la evidencia griega y la auditoría inglesa. Lo demás queda sustancialmente fiel y legible.
