  text: ὡς δὲ τὸ ὅραμα εἶδεν, εὐθέως ἐζητήσαμεν ἐξελθεῖν ⸀εἰς Μακεδονίαν, συμβιβάζοντες ὅτι προσκέκληται ἡμᾶς ὁ ⸀θεὸς εὐαγγελίσασθαι αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/016/010.yaml
  text: And when he had seen the vision[a], we immediately sought to go on into Macedonia[c][b], concluding that God had called us to proclaim the good news to them.
  footnotes:
  - marker: a
    text: Or 'to depart for Macedonia.' The Greek literally says 'to go out into Macedonia.'
    reason: lexical_alternative
  - marker: b
    text: Or 'inferring' or 'reasoning.' The participle conveys drawing a conclusion from the vision.
    reason: lexical_alternative
  - marker: c
    text: Or 'to preach the gospel to them.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
