translation:
  language: es
  text: Claudio Lisias[a], al excelentísimo gobernador Félix, saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Su Excelencia, el gobernador Félix». El honorífico griego κρατίστῳ es un título formal de respeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κλαύδιος Λυσίας
  english_pob_choice: Claudius Lysias
  chosen_spanish: Claudio Lisias
  alternatives_spanish:
  - Claudio Lisías
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio al español de forma estándar. «Claudio» y «Lisias» preservan el referente histórico sin añadir interpretación.
- source_word: τῷ κρατίστῳ
  english_pob_choice: to the most excellent
  chosen_spanish: al excelentísimo
  alternatives_spanish:
  - a su Excelencia
  - al excelentísimo señor
  lexicon: BDAG
  rationale: κρατίστῳ es un título honorífico formal de cortesía. «Excelentísimo» comunica el tono oficial y respetuoso en español moderno, y evita una formulación demasiado inglesa o demasiado eclesiástica.
- source_word: ἡγεμόνι
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - prefecto
  lexicon: BDAG
  rationale: En este contexto romano provincial, «gobernador» es la equivalencia más clara y natural en español. «Prefecto» sería más técnico de lo que exige el verso.
- source_word: Φήλικι
  english_pob_choice: Felix
  chosen_spanish: Félix
  alternatives_spanish:
  - Felix
  lexicon: transliteración de nombre propio
  rationale: 'Se adapta el nombre al uso español común con tilde aguda: «Félix».'
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - te saluda
  lexicon: BDAG
  rationale: En encabezados epistolares, χαίρειν funciona como saludo convencional. «Saludos» reproduce bien el sentido idiomático sin volverlo un mandato literal de «alegrarse».
translation_notes:
  revision_awareness: El texto griego es breve y de acuerdo alto con el audit trail inglés; no hay revisiones aplicadas. La principal decisión de estilo fue reflejar el saludo epistolar con un español natural y conservar el honorífico oficial sin diluirlo.
  spanish_consistency_notes:
  - Se mantiene el patrón de transliterar nombres propios.
  - Se usa «excelentísimo» para κρατίστῳ, en línea con el valor honorífico documentado.
  - Se usa «gobernador» para ἡγεμών por claridad contextual en español.
  - Se conserva el saludo convencional como «saludos» para χαίρειν.
