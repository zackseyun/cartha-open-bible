translation:
  language: es
  text: 'Pero Pablo, al saber que una parte era de saduceos y la otra de fariseos, gritó en el concilio[a]: «Hombres, hermanos, yo soy fariseo, hijo de fariseos[b]. Por la esperanza y la resurrección de los muertos[c] soy juzgado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en el Sanedrín”. El término griego puede referirse específicamente al consejo judío gobernante.
    reason: lexical_alternative
  - marker: b
    text: O “hijo de padres fariseos” o “descendiente de fariseos”.
    reason: alternative_reading
  - marker: c
    text: O “por la esperanza de la resurrección de los muertos”.
    reason: alternative_reading
lexical_decisions:
- source_word: Γνοὺς
  english_pob_choice: knowing
  chosen_spanish: al saber
  alternatives_spanish:
  - sabiendo
  - al conocer
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia de la acción de Pablo. ‘Al saber’ conserva esa relación temporal y causal en español sin sonar forzado.
- source_word: τὸ ἓν μέρος ... τὸ δὲ ἕτερον
  english_pob_choice: one part ... the other
  chosen_spanish: una parte ... la otra
  alternatives_spanish:
  - un grupo ... el otro
  - una facción ... la otra
  lexicon: BDAG
  rationale: μέρος aquí señala una división dentro del consejo. ‘Parte’ mantiene la imagen del griego y resulta natural en español.
- source_word: Σαδδουκαίων / Φαρισαίων
  english_pob_choice: Sadducees / Pharisees
  chosen_spanish: saduceos / fariseos
  alternatives_spanish:
  - saduceos / fariseos
  lexicon: BDAG
  rationale: Se usan las transliteraciones establecidas en español para los nombres de estos grupos judíos.
- source_word: ἔκραζεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó en voz alta
  lexicon: BDAG
  rationale: κράζω expresa una proclamación fuerte y pública. ‘Gritó’ conserva bien la fuerza del verbo sin perder claridad.
- source_word: ἐν τῷ συνεδρίῳ
  english_pob_choice: in the council
  chosen_spanish: en el consejo[b]
  alternatives_spanish:
  - en el Sanedrín
  - ante el consejo
  lexicon: BDAG
  rationale: συνέδριον puede referirse específicamente al consejo judío gobernante. ‘Consejo’ traduce el término de forma transparente; la nota preserva la posible referencia específica al Sanedrín.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Men, brothers
  chosen_spanish: Hombres, hermanos
  alternatives_spanish:
  - Hermanos
  - Hombres y hermanos
  lexicon: BDAG
  rationale: El vocativo incluye tanto ἄνδρες como ἀδελφοί. ‘Hombres, hermanos’ preserva ambos elementos sin diluir la forma del llamado.
- source_word: Φαρισαῖός εἰμι
  english_pob_choice: I am a Pharisee
  chosen_spanish: yo soy fariseo
  alternatives_spanish:
  - soy fariseo
  - yo soy un fariseo
  lexicon: BDAG
  rationale: La autoidentificación en presente se expresa de modo directo en español. Se mantiene el énfasis de la primera persona con ‘yo’.
- source_word: υἱὸς Φαρισαίων
  english_pob_choice: a son of Pharisees
  chosen_spanish: hijo de fariseos[c]
  alternatives_spanish:
  - hijo de padres fariseos
  - descendiente de fariseos
  lexicon: BDAG
  rationale: El plural Φαρισαίων se conserva con ‘de fariseos’. La frase retiene la ambigüedad entre filiación parental, ancestral o de linaje, como en el griego.
- source_word: περὶ ἐλπίδος καὶ ἀναστάσεως νεκρῶν
  english_pob_choice: concerning the hope and resurrection of the dead
  chosen_spanish: Por la esperanza y la resurrección de los muertos[d]
  alternatives_spanish:
  - Con respecto a la esperanza y la resurrección de los muertos
  - Por la esperanza de la resurrección de los muertos
  lexicon: BDAG
  rationale: περί introduce el asunto en disputa. ‘Por la esperanza y la resurrección de los muertos’ conserva la coordinación del griego y deja visible la tensión entre dos nociones estrechamente ligadas o una sola esperanza enfocada en la resurrección.
- source_word: κρίνομαι
  english_pob_choice: I am being judged
  chosen_spanish: soy juzgado
  alternatives_spanish:
  - estoy siendo juzgado
  - estoy en juicio
  lexicon: BDAG
  rationale: El presente pasivo indica la situación judicial actual de Pablo. ‘Soy juzgado’ es breve y fiel; la alternativa más idiomática se mantiene como posibilidad implícita.
theological_decisions:
- issue: Sentido de 'hijo de fariseos'
  english_pob_reading: Retained as 'a son of Pharisees' without resolving whether it refers to Pharisaic parentage, ancestry, or party affiliation.
  chosen_spanish_reading: Se mantiene ‘hijo de fariseos’ sin decidir si alude a padres fariseos, a ascendencia o a pertenencia de linaje.
  alternative_spanish_readings:
  - hijo de padres fariseos
  - descendiente de fariseos
  rationale: El plural griego permite más de una lectura. La traducción conserva la expresión ambigua sin cerrar indebidamente el sentido.
  doctrine_reference: Preservar la tensión interpretativa del texto sin resolverla artificialmente.
- issue: Relación entre 'esperanza' y 'resurrección'
  english_pob_reading: Rendered as 'the hope and resurrection of the dead' rather than collapsing to 'the hope of the resurrection of the dead.'
  chosen_spanish_reading: 'Se mantiene la coordinación: ‘la esperanza y la resurrección de los muertos’, en vez de fundirla en ‘la esperanza de la resurrección de los muertos’.'
  alternative_spanish_readings:
  - la esperanza de la resurrección de los muertos
  rationale: El griego coordina ἐλπίδος y ἀναστάσεως con καί. La redacción principal conserva esa coordinación y deja abierta la posibilidad de una sola esperanza centrada en la resurrección.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla.
translation_notes:
  revision_awareness: Se revisó el pasaje y no se identificaron cambios necesarios respecto del estado previo; se conserva la solución de alta concordancia con el audit trail en inglés y se adapta al español con ambigüedad controlada.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce συνέδριον como ‘consejo’ en el texto principal y se conserva ‘Sanedrín’ como alternativa anotada.
  - ‘Fariseos’ y ‘saduceos’ se presentan con la grafía española estándar y sin mayúsculas innecesarias dentro de la oración.
  - La estructura directa del discurso de Pablo se conserva con puntuación española y comillas angulares implícitas en estilo editorial simple.
  - Se evitó resolver la ambigüedad de ‘hijo de fariseos’ y de la relación entre ‘esperanza’ y ‘resurrección’.
