base_translation:
  language: en
  yaml_path: translation/nt/acts/023/006.yaml
  text: But Paul[a], knowing that one part were Sadducees and the other Pharisees, cried out in the council, “Men, brothers, I am a Pharisee, a son of Pharisees[c][b]. It is concerning the hope and resurrection of the dead that I am being judged.”
  footnotes:
  - marker: a
    text: Or “in the Sanhedrin.” The Greek word can refer specifically to the Jewish ruling council.
    reason: lexical_alternative
  - marker: b
    text: Or “a son of Pharisee parents” or “a descendant of Pharisees.”
    reason: alternative_reading
  - marker: c
    text: Or “for the hope of the resurrection of the dead I am being judged.”
    reason: alternative_reading
