  text: Καὶ προσκαλεσάμενός ⸂τινας δύο⸃ τῶν ἑκατονταρχῶν εἶπεν· Ἑτοιμάσατε στρατιώτας διακοσίους ὅπως πορευθῶσιν ἕως Καισαρείας, καὶ ἱππεῖς ἑβδομήκοντα καὶ δεξιολάβους διακοσίους, ἀπὸ τρίτης ὥρας τῆς νυκτός,
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/023.yaml
  text: And calling two of the centurions to him[a], he said, “Prepare two hundred soldiers to go as far as Caesarea, and seventy horsemen and two hundred spearmen[b], at the third hour of the night.”
  footnotes:
  - marker: a
    text: Or “two hundred right-hand guards”; the precise sense of the rare term translated “spearmen” is uncertain.
    reason: lexical_alternative
  - marker: b
    text: That is, about the third hour after nightfall, roughly 9 p.m. by Jewish reckoning.
    reason: cultural_note
