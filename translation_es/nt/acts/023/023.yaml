translation:
  language: es
  text: 'Y llamando a dos de los centuriones, les dijo: «Preparen doscientos soldados para ir hasta Cesarea, y setenta jinetes y doscientos lanceros[a], a partir de la tercera hora de la noche[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doscientos guardias del lado derecho»; el sentido preciso del término raro traducido aquí «lanceros» es incierto.
    reason: lexical_alternative
  - marker: b
    text: Es decir, alrededor de la tercera hora después del anochecer, aproximadamente las 9 p. m. según el cómputo judío.
    reason: cultural_note
lexical_decisions:
- source_word: προσκαλεσάμενός
  english_pob_choice: calling ... to him
  chosen_spanish: llamando a ...
  alternatives_spanish:
  - llamando a dos de los centuriones a su presencia
  - convocando a dos de los centuriones
  lexicon: BDAG
  rationale: El participio aoristo medio introduce la acción principal; en español, «llamando a» comunica la convocatoria sin forzar una perífrasis más pesada. Se mantiene la relación con los centuriones como destinatarios de la llamada.
- source_word: τινας δύο τῶν ἑκατονταρχῶν
  english_pob_choice: two of the centurions
  chosen_spanish: a dos de los centuriones
  alternatives_spanish:
  - a ciertos dos de los centuriones
  - a dos centuriones
  lexicon: BDAG
  rationale: El griego usa un giro idiomático que en inglés POB se simplifica a «two of the centurions»; en español, «a dos de los centuriones» es natural y preserva que son dos dentro de ese grupo.
- source_word: Ἑτοιμάσατε
  english_pob_choice: Prepare
  chosen_spanish: Preparen
  alternatives_spanish:
  - Dispongan
  - Tengan listos
  lexicon: BDAG
  rationale: El imperativo plural encaja con la dirección a los centuriones. «Preparen» conserva el tono militar y directo del mandato.
- source_word: στρατιώτας διακοσίους
  english_pob_choice: two hundred soldiers
  chosen_spanish: doscientos soldados
  alternatives_spanish:
  - doscientos militares
  - doscientos hombres de guerra
  lexicon: BDAG
  rationale: «Soldados» es el equivalente más directo y claro para στρατιώτας en este contexto militar.
- source_word: ἕως Καισαρείας
  english_pob_choice: as far as Caesarea
  chosen_spanish: hasta Cesarea
  alternatives_spanish:
  - hasta llegar a Cesarea
  - tan lejos como Cesarea
  lexicon: BDAG
  rationale: La preposición y el genitivo expresan extensión hasta un destino; en español, «hasta Cesarea» conserva la dirección y suena natural. La matización de extensión queda implícita.
- source_word: ἱππεῖς ἑβδομήκοντα
  english_pob_choice: seventy horsemen
  chosen_spanish: setenta jinetes
  alternatives_spanish:
  - setenta hombres de a caballo
  - setenta caballeros
  lexicon: BDAG
  rationale: «Jinetes» comunica tropas montadas en español actual con claridad y dignidad; evita ambigüedad con el uso literario de «caballeros».
- source_word: δεξιολάβους διακοσίους
  english_pob_choice: two hundred spearmen
  chosen_spanish: doscientos [a]
  alternatives_spanish:
  - doscientos lanceros
  - doscientos guardias diestros
  - doscientos hombres armados
  lexicon: BDAG
  rationale: El término δεξιολάβος es raro y su sentido preciso es incierto; para no fingir certeza, el texto español deja una marca de nota donde se explicará la alternativa léxica, en línea con el audit trail inglés que preserva la incertidumbre.
- source_word: ἀπὸ τρίτης ὥρας τῆς νυκτός
  english_pob_choice: at the third hour of the night
  chosen_spanish: desde la tercera hora de la noche
  alternatives_spanish:
  - a la tercera hora de la noche
  - desde la tercera hora tras el anochecer
  lexicon: BDAG
  rationale: ἀπό marca origen temporal; por eso se traduce «desde». Se conserva la expresión antigua del tiempo nocturno sin convertirla en equivalencia moderna dentro del texto principal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la construcción de finalidad para reflejar mejor el infinitivo. En español, la solución natural es una cláusula de propósito con «para ir», que preserva el valor intencional sin sobreexplicarlo. También se conservó la ambigüedad léxica de δεξιολάβος mediante nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no la contiene.
  - Se usa «Cesarea» como forma hispana estable del topónimo.
  - Se emplea «jinetes» para ἱππεῖς por claridad contemporánea.
  - La nota [a] queda anclada en la frase de los doscientos, donde aparece la incertidumbre léxica.
