translation:
  language: es
  text: 'Y Pablo, fijando la vista en el consejo, dijo: «Hermanos, he vivido[a] ante Dios con toda buena conciencia hasta este día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me he comportado como ciudadano ante Dios», conservando el posible matiz cívico del verbo griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίσας
  english_pob_choice: looking intently
  chosen_spanish: fijando la vista
  alternatives_spanish:
  - mirando fijamente
  - con la vista puesta en
  lexicon: BDAG
  rationale: El participio aoristo expresa una mirada dirigida y sostenida. «Fijando la vista» conserva esa fuerza en un español natural y digno, sin volverlo demasiado literal ni más intenso de lo que el griego exige.
- source_word: τῷ συνεδρίῳ
  english_pob_choice: the council
  chosen_spanish: el concilio
  alternatives_spanish:
  - el consejo
  - el Sanedrín
  lexicon: BDAG
  rationale: En este contexto se trata del órgano judío de deliberación y juicio. «Concilio» mantiene la referencia institucional sin transliterar ni introducir una capitalización interpretativa. «Sanedrín» sería más específico, pero también más transliterado.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y padres
  - Varones, hermanos
  lexicon: BDAG
  rationale: Es una fórmula de apelación directa. «Hermanos» comunica de forma natural el vocativo y conserva el tono fraternal del griego sin forzar una duplicación literal poco idiomática.
- source_word: πάσῃ συνειδήσει ἀγαθῇ
  english_pob_choice: with an entirely good conscience
  chosen_spanish: con toda buena conciencia
  alternatives_spanish:
  - con una conciencia enteramente buena
  - en toda buena conciencia
  lexicon: BDAG
  rationale: La frase dativa expresa modo/esfera; πάσῃ intensifica la afirmación. «Con toda buena conciencia» conserva el alcance total de la expresión y mantiene el peso moral de la declaración, aunque suene algo más enfática que una simple «buena conciencia».
- source_word: πεπολίτευμαι
  english_pob_choice: I have lived before God
  chosen_spanish: me he conducido delante de Dios
  alternatives_spanish:
  - he vivido delante de Dios
  - me he comportado como ciudadano delante de Dios
  lexicon: BDAG
  rationale: El perfecto medio de πολιτεύομαι puede incluir matiz cívico, pero aquí la afirmación principal es ética y relacional. «Me he conducido» preserva la idea de conducta habitual; «delante de Dios» traduce bien el dativo con el sentido de vivir bajo su mirada. Evita debilitar el verbo a un mero «vivido» y, a la vez, no impone en el texto principal una lectura técnica de ciudadanía.
- source_word: τῷ θεῷ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - para Dios
  lexicon: BDAG
  rationale: Con πολιτεύομαι, el dativo apunta a la esfera o referencia de la conducta. «Delante de Dios» es una manera española clara de expresar esa relación de rendición de cuentas y presencia divina.
- source_word: ἄχρι ταύτης τῆς ἡμέρας
  english_pob_choice: up to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: BDAG
  rationale: La frase temporal expresa continuidad desde el pasado hasta el momento presente. «Hasta este día» es una equivalencia sobria y precisa en español.
theological_decisions:
- issue: Alcance de la afirmación de Pablo sobre su conciencia y conducta
  english_pob_reading: A general claim about his manner of life before God, not a technical assertion of civic status or sinless perfection.
  chosen_spanish_reading: Una afirmación general sobre su conducta delante de Dios, no una declaración técnica de ciudadanía ni una pretensión de perfección moral absoluta.
  alternative_spanish_readings:
  - Una referencia primaria a su estatus cívico como ciudadano
  - Una afirmación de inocencia moral absoluta
  rationale: El verbo πολιτεύομαι puede resonar con lenguaje cívico, pero en este pasaje la finalidad retórica es apelar a su integridad de conciencia ante Dios. La versión española mantiene esa tensión sin resolverla a favor de una lectura jurídica o de una impecabilidad que el texto no afirma explícitamente.
  doctrine_reference: Fil. 1:27; Hch. 24:16; 2 Co. 1:12
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés, que eliminó «my life» para no añadir palabras no explícitas en el griego, manteniendo «have lived» como traducción de πεπολίτευμαι. En español se optó por «me he conducido» para reflejar ese valor verbal sin introducir un complemento equivalente a «mi vida».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «delante de Dios» para el dativo relacional.
  - Se usa «concilio» como equivalente transparente de συνέδριον, evitando «Sanedrín» en el cuerpo principal.
  - No se traduce la expresión con «siervo» ni con una paráfrasis moralizante; se conserva la fuerza ética del perfecto de πολιτεύομαι.
  - El vocativo «Hermanos» reproduce el tono directo y masculino del original sin duplicación innecesaria.
