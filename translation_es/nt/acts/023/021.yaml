translation:
  language: es
  text: Así que no te dejes persuadir por ellos[a], porque más de cuarenta hombres de entre ellos le están tendiendo una emboscada; quienes se han puesto bajo maldición[b] de no comer ni beber hasta matarlo. Y ahora están listos[c], esperando tu promesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no les creas». El pasivo de πείθω conserva la idea de dejarse ganar por la persuasión de ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se han puesto bajo un juramento». La expresión griega incluye una autoimprecación: invocan una maldición sobre sí mismos si fracasan.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, están esperando tu acuerdo o autorización.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πεισθῇς αὐτοῖς
  english_pob_choice: be persuaded by them
  chosen_spanish: no te dejes persuadir por ellos
  alternatives_spanish:
  - no les creas
  - no cedas ante ellos
  - no te convenzas por ellos
  lexicon: BDAG
  rationale: πεισθῇς es pasivo y expresa ser ganado por la persuasión ajena; en español, «dejarse persuadir» conserva esa idea sin convertirlo en mera incredulidad o simple obediencia.
- source_word: ἐνεδρεύουσιν
  english_pob_choice: are lying in ambush
  chosen_spanish: están al acecho
  alternatives_spanish:
  - están tendiendo una emboscada
  - están esperando en emboscada
  - están emboscados
  lexicon: BDAG
  rationale: El verbo apunta a emboscada o acecho hostil. «Al acecho» mantiene la imagen concreta y funciona con naturalidad en español; el contexto ya hace claro el carácter violento.
- source_word: ἐξ αὐτῶν ἄνδρες πλείους τεσσεράκοντα
  english_pob_choice: more than forty men among them
  chosen_spanish: más de cuarenta hombres de entre ellos
  alternatives_spanish:
  - más de cuarenta hombres entre ellos
  - más de cuarenta hombres de su grupo
  - más de cuarenta hombres de ellos
  lexicon: BDAG
  rationale: La construcción indica procedencia dentro del mismo grupo. «De entre ellos» refleja mejor ese matiz que un simple «entre ellos» en un registro bíblico claro.
- source_word: ἀνεθεμάτισαν ἑαυτοὺς
  english_pob_choice: have bound themselves under a curse
  chosen_spanish: se han impuesto una maldición
  alternatives_spanish:
  - se han puesto bajo maldición
  - se han ligado con un juramento maldito
  - se han maldecido a sí mismos
  lexicon: BDAG
  rationale: La expresión griega combina juramento y autoimprecación. En español, «imponerse una maldición» comunica la idea de cargarse voluntariamente con una sanción si incumplen; se ancla en la nota para no perder la tensión lexical.
- source_word: μήτε φαγεῖν μήτε πιεῖν
  english_pob_choice: neither to eat nor to drink
  chosen_spanish: de no comer ni beber
  alternatives_spanish:
  - para no comer ni beber
  - ni comer ni beber
  - sin comer ni beber
  lexicon: BDAG
  rationale: Se conserva la correlación μήτε...μήτε con una subordinación natural en español, manteniendo el voto formal y la absoluta abstinencia prometida.
- source_word: ἕως οὗ ἀνέλωσιν αὐτόν
  english_pob_choice: until they have killed him
  chosen_spanish: hasta matarlo
  alternatives_spanish:
  - hasta que lo hayan matado
  - hasta que lo maten
  - hasta darle muerte
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar. «Hasta matarlo» es breve y fiel; evita sobrecargar con perífrasis y conserva el sentido homicida explícito del contexto.
- source_word: εἰσιν ἕτοιμοι
  english_pob_choice: they are ready
  chosen_spanish: están listos
  alternatives_spanish:
  - están preparados
  - están prontos
  - están dispuestos
  lexicon: BDAG
  rationale: ἕτοιμοι describe disponibilidad inmediata. «Están listos» es natural en español y conserva la sencillez del copulativo más adjetivo.
- source_word: προσδεχόμενοι
  english_pob_choice: waiting
  chosen_spanish: esperando
  alternatives_spanish:
  - aguardando
  - a la espera de
  - expectantes
  lexicon: BDAG
  rationale: El participio expresa espera activa. «Esperando» es claro y idiomático; se mantiene la idea de expectativa contenida en el texto.
- source_word: τὴν ἀπὸ σοῦ ἐπαγγελίαν
  english_pob_choice: the promise from you
  chosen_spanish: la promesa de parte de ti
  alternatives_spanish:
  - tu promesa
  - la promesa de tu parte
  - la autorización de parte de ti
  lexicon: BDAG
  rationale: ἐπαγγελία suele ser «promesa», pero aquí el contexto apunta a la respuesta o autorización esperada del tribuno. «De parte de ti» preserva la construcción griega y deja abierta la relación entre promesa y autorización, como en el audit trail inglés.
theological_decisions:
- issue: Naturaleza de la autoimprecación/juramento en ἀνεθεμάτισαν ἑαυτοὺς
  english_pob_reading: The Greek expression includes the idea of invoking a curse upon themselves if they fail.
  chosen_spanish_reading: Se entiende como una autoimprecación voluntaria, no solo como un juramento neutral.
  alternative_spanish_readings:
  - simplemente se comprometieron con un juramento
  - se maldijeron a sí mismos sin referencia al juramento
  rationale: 'El griego no es un juramento desnudo: incluye la idea de llamar maldición sobre sí en caso de incumplimiento. La redacción española y la nota conservan esa tensión para no rebajar la fuerza de la expresión.'
  doctrine_reference: Lexical theology of oaths/self-imprecation; cf. biblical oath formulas and self-imprecatory vows.
- issue: Sentido de τὴν ἀπὸ σοῦ ἐπαγγελίαν en contexto narrativo
  english_pob_reading: they are waiting for your agreement or authorization
  chosen_spanish_reading: «la promesa de parte de ti» se deja abierta para abarcar tanto promesa como autorización/agreement del tribuno.
  alternative_spanish_readings:
  - tu promesa
  - tu autorización
  - tu asentimiento
  rationale: El contexto sugiere que esperan que el tribuno confirme el traslado/medida para consumar la emboscada. La versión española mantiene el término «promesa» del griego y permite, mediante nota, la lectura contextual de autorización, sin eliminar la ambigüedad documentada.
  doctrine_reference: Narrative pragmatics; no doctrinal issue beyond preserving contextual sense.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, incorporando la revisión que prefirió «among them» para ἐξ αὐτῶν. En español se optó por «de entre ellos», que conserva el matiz de procedencia interna sin sonar forzado. También se preservó la tensión lexical de ἀνεθεμάτισαν ἑαυτοὺς y la lectura contextual de ἐπαγγελία como promesa/autoridad esperada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - «Mesías/Cristo» no aparece en el texto.
  - Se mantiene un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - Las notas a pie de página señalan alternativas léxicas donde el griego o el contexto admiten más de una matización.
