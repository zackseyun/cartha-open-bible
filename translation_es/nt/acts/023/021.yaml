  text: σὺ οὖν μὴ πεισθῇς αὐτοῖς, ἐνεδρεύουσιν γὰρ αὐτὸν ἐξ αὐτῶν ἄνδρες πλείους τεσσεράκοντα, οἵτινες ἀνεθεμάτισαν ἑαυτοὺς μήτε φαγεῖν μήτε πιεῖν ἕως οὗ ἀνέλωσιν αὐτόν, καὶ νῦν ⸂εἰσιν ἕτοιμοι⸃ προσδεχόμενοι τὴν ἀπὸ σοῦ ἐπαγγελίαν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/021.yaml
  text: So do not be persuaded by them[a], for more than forty men among them are lying in ambush for him, who have bound themselves under a curse neither to eat nor to drink until they have killed him. And now they are ready[b], waiting for the promise from you.
  footnotes:
  - marker: a
    text: Or 'have put themselves under an oath'; the Greek expression includes the idea of invoking a curse upon themselves if they fail.
    reason: lexical_alternative
  - marker: b
    text: That is, they are waiting for your agreement or authorization.
    reason: lexical_alternative
