translation:
  language: es
  text: Encontré que se le acusaba acerca de cuestiones de su propia ley[a], pero que no tenía ningún cargo que mereciera la muerte o la prisión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre cuestiones litigiosas de su propia ley».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «nada digno de muerte o de cadenas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαλούμενον
  english_pob_choice: was being accused
  chosen_spanish: se le acusaba
  alternatives_spanish:
  - estaba siendo acusado
  - se le estaba acusando
  lexicon: BDAG
  rationale: El participio pasivo imperfectivo expresa una acción de acusación en curso. En español, la pasiva refleja impersonal mantiene bien ese sentido sin volverse pesada.
- source_word: περὶ ζητημάτων
  english_pob_choice: concerning questions
  chosen_spanish: acerca de cuestiones
  alternatives_spanish:
  - sobre disputas
  - con respecto a asuntos en disputa
  lexicon: BDAG
  rationale: ζητήματα remite a cuestiones debatidas o disputadas. «Cuestiones» conserva el matiz formal y abierto del término, y «acerca de» reproduce bien περὶ.
- source_word: τοῦ νόμου αὐτῶν
  english_pob_choice: of their law
  chosen_spanish: de su ley
  alternatives_spanish:
  - de su propia ley
  - concerniente a su ley
  lexicon: BDAG
  rationale: El posesivo αὐτῶν se conserva naturalmente con «su». «Ley» evita introducir una paráfrasis más amplia y sigue la referencia al ámbito legal/religioso judío.
- source_word: μηδὲν ... ἄξιον θανάτου ἢ δεσμῶν
  english_pob_choice: nothing deserving death or imprisonment
  chosen_spanish: ninguna acusación digna de muerte o de cadenas
  alternatives_spanish:
  - nada digno de muerte o de prisión
  - ninguna falta merecedora de muerte o de cadenas
  lexicon: BDAG
  rationale: ἄξιον con genitivo expresa algo «digno/meritorio de» una pena. «Digna de muerte o de cadenas» conserva el paralelismo literal; «cadenas» mantiene el valor más cercano de δεσμῶν, evitando suavizarlo a «prisión».
- source_word: ἔχοντα ἔγκλημα
  english_pob_choice: charged with
  chosen_spanish: acusación
  alternatives_spanish:
  - cargo
  - imputación
  lexicon: BDAG
  rationale: La combinación compacta ἔχοντα ἔγκλημα comunica que había una acusación/cargo en su contra. En español, integrar la idea como «ninguna acusación» transmite el sentido sin añadir una valoración de culpabilidad que el griego no exige.
- source_word: εὗρον
  english_pob_choice: I found
  chosen_spanish: Encontré
  alternatives_spanish:
  - Hallé
  - Descubrí
  lexicon: BDAG
  rationale: El aoristo reporta la conclusión del comandante tras la investigación. «Encontré» es directo, natural y conserva el carácter de informe oficial.
theological_decisions:
- issue: 'δεσμῶν: cadenas vs. prisión'
  english_pob_reading: nothing deserving death or imprisonment
  chosen_spanish_reading: ninguna acusación digna de muerte o de cadenas
  alternative_spanish_readings:
  - ninguna acusación digna de muerte o de prisión
  - nada digno de muerte o de cadenas
  rationale: El griego dice literalmente «cadenas», no un término general para prisión. Mantener «cadenas» preserva la severidad jurídica concreta del texto y evita suavizarla por una equivalencia más interpretativa.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó περὶ de «about» a «concerning»; la traducción española refleja ya ese matiz con «acerca de», sin cambios doctrinales o textuales adicionales. Se mantuvo el valor literal de δεσμῶν como «cadenas» para no perder la concreción judicial del griego.
  spanish_consistency_notes:
  - Se usa «acusación» para ἔγκλημα y el pasivo reflejo «se le acusaba» para ἐγκαλούμενον, preservando la diferencia entre el acto de acusar y el objeto de la acusación.
  - Se prefiere «cuestiones» para ζητήματα en coherencia con la decisión inglesa POB y con español formal natural.
  - Se mantiene «cadenas» en lugar de «prisión» por fidelidad al genitivo de pena y porque el contexto romano-judicial admite el sentido literal.
  - No se introduce «Mesías», «Yahvé» ni otra terminología teológica no presente en el versículo.
