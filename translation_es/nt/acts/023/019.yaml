- from: 'Así que el comandante lo tomó de la mano[a] y, apartándose en privado, comenzó a preguntarle[b]: «¿Qué es lo que tienes que informarme?»'
  to: 'Entonces el comandante lo tomó de la mano[a] y, llevándolo aparte en privado, comenzó a preguntarle[b]: «¿Qué es lo que tienes que informarme?»'
