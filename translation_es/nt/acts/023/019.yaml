    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Qué es lo que tienes que decirme?».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para que el participio ἀναχωρήσας κατ’ ἰδίαν suene natural en español y refleje mejor la escena de llevar al joven aparte. También se corrige la nota b para que conserve la alternativa lexical auditada por el inglés POB en el segmento de la pregunta, no una variante distinta del verbo introductorio. El resto del versículo se mantiene sustancialmente igual.
