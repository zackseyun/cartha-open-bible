translation:
  language: es
  text: 'Entonces el comandante lo tomó de la mano[a] y, llevándolo aparte en privado, comenzó a preguntarle[b]: «¿Qué es lo que tienes que informarme?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apartándose en privado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Qué es lo que tienes que decirme?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλαβόμενος ... τῆς χειρὸς αὐτοῦ
  english_pob_choice: took him by the hand
  chosen_spanish: lo tomó de la mano
  alternatives_spanish:
  - tomó su mano
  - lo asió de la mano
  lexicon: BDAG
  rationale: La construcción griega expresa tomar a alguien por la mano; en español natural, «lo tomó de la mano» conserva la acción concreta sin sobrecargarla con fuerza no indicada por el texto.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca avance narrativo; «Así que» comunica bien la progresión en español sin sonar mecánico.
- source_word: ὁ χιλίαρχος
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el tribuno
  - el oficial romano
  - el jefe militar
  lexicon: BDAG
  rationale: χιλίαρχος designa a un oficial militar romano. «Comandante» es claro y funcional en español, y mantiene el valor narrativo sin usar un término menos transparente como «tribuno».
- source_word: ἀναχωρήσας κατ’ ἰδίαν
  english_pob_choice: drawing aside in private
  chosen_spanish: apartándose en privado
  alternatives_spanish:
  - llevándolo aparte en privado
  - retirándose aparte
  - se apartó en privado
  lexicon: BDAG
  rationale: El participio describe retirarse aparte con carácter privado; «apartándose en privado» reproduce ese doble matiz de separación y privacidad sin añadir más de lo que el griego exige.
- source_word: ἐπυνθάνετο
  english_pob_choice: began asking
  chosen_spanish: comenzó a preguntarle
  alternatives_spanish:
  - preguntó
  - estaba preguntándole
  - empezó a inquirir
  lexicon: BDAG
  rationale: El imperfecto sugiere proceso o inicio de la acción. «Comenzó a preguntarle» refleja bien ese matiz en español natural.
- source_word: Τί ἐστιν
  english_pob_choice: What is it
  chosen_spanish: ¿Qué es lo que
  alternatives_spanish:
  - ¿Qué es esto
  - ¿Qué es
  - ¿Qué ocurre
  lexicon: BDAG
  rationale: La pregunta griega es idiomática y prepara la cláusula relativa siguiente. «¿Qué es lo que» conserva la estructura sin resultar forzado.
- source_word: ὃ ἔχεις ἀπαγγεῖλαί μοι
  english_pob_choice: that you have to report to me
  chosen_spanish: tienes que informarme
  alternatives_spanish:
  - tienes que contarme
  - tienes que reportarme
  - tienes que comunicarme
  lexicon: BDAG
  rationale: La construcción ἔχεις + infinitivo expresa algo que uno tiene que hacer; ἀπαγγέλλω aquí apunta a comunicar o informar. «Informarme» es claro en español y encaja bien en un contexto oficial.
theological_decisions:
- issue: No hay un término doctrinalmente cargado, pero sí una decisión sobre el estatus de χιλίαρχος
  english_pob_reading: the commander
  chosen_spanish_reading: el comandante
  alternative_spanish_readings:
  - el tribuno
  - el oficial romano
  rationale: La elección evita sobretraducir con un título histórico poco transparente y mantiene el sentido funcional del oficio romano en la narrativa de Hechos.
  doctrine_reference: Ninguna
- issue: El valor de ἀπαγγεῖλαί μοι dentro del contexto narrativo/oficial
  english_pob_reading: What is it that you have to report to me?
  chosen_spanish_reading: ¿Qué es lo que tienes que informarme?
  alternative_spanish_readings:
  - ¿Qué es lo que tienes que contarme?
  - ¿Qué es lo que tienes que comunicarme?
  rationale: El griego puede sonar más como «informar/relatar» que como simplemente «decir». En un contexto de autoridad, «informarme» preserva el matiz de reporte sin forzar un tecnicismo militar.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «comandante» para χιλίαρχος conforme al criterio POB en inglés y se evita «tribuno» por menor transparencia moderna.
  - Se usa «informarme» para ἀπαγγεῖλαί μοι, manteniendo el matiz de reporte/entrega de información en un contexto oficial.
  - La puntuación reproduce una sola oración narrativa con diálogo directo, adecuada para español bíblico moderno y digno.
