translation:
  language: es
  text: Y mientras decía esto, se produjo una disputa[a] entre los fariseos y los saduceos, y la asamblea quedó dividida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se produjo una disensión entre los fariseos y los saduceos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la multitud se dividió» o «la multitud quedó partida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ αὐτοῦ λαλοῦντος
  english_pob_choice: And as he was saying this
  chosen_spanish: Y mientras él decía esto
  alternatives_spanish:
  - Y cuando él dijo esto
  - Y al decir esto
  lexicon: BDAG
  rationale: El participio presente genitivo indica acción simultánea. «Mientras él decía esto» conserva esa simultaneidad con español natural y evita convertir indebidamente el matiz durativo en un cierre puntual.
- source_word: ἐγένετο
  english_pob_choice: arose
  chosen_spanish: se produjo
  alternatives_spanish:
  - surgió
  - se levantó
  - hubo
  lexicon: BDAG
  rationale: Con στάσις, el verbo expresa el comienzo de una situación de conflicto. «Se produjo» mantiene el sentido de irrupción o aparición del conflicto sin forzar un modismo específico que en español podría sonar demasiado interpretativo.
- source_word: στάσις
  english_pob_choice: a dispute
  chosen_spanish: una disputa
  alternatives_spanish:
  - una dissensión
  - un conflicto
  - una división
  lexicon: BDAG
  rationale: στάσις puede abarcar disputa, disensión o conflicto. «Disputa» comunica bien el choque inmediato en el contexto narrativo y mantiene la tensión léxica sin reducirla a una mera opinión diferente.
- source_word: τῶν Φαρισαίων καὶ Σαδδουκαίων
  english_pob_choice: between the Pharisees and Sadducees
  chosen_spanish: entre los fariseos y los saduceos
  alternatives_spanish:
  - de los fariseos y de los saduceos
  - en medio de los fariseos y los saduceos
  lexicon: BDAG
  rationale: Aunque el griego usa genitivo, en español la oposición entre grupos se expresa naturalmente con «entre». Esto hace explícita la relación de contraste sin añadir contenido ajeno al texto.
- source_word: ἐσχίσθη
  english_pob_choice: was divided
  chosen_spanish: quedó dividida
  alternatives_spanish:
  - fue dividida
  - se dividió
  - se partió
  lexicon: BDAG
  rationale: El pasivo de σχίζω conserva la imagen de división. «Quedó dividida» mantiene esa idea en español y suena natural en referencia a la asamblea, sin perder el matiz de ruptura visible en el griego.
- source_word: τὸ πλῆθος
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la multitud
  - el pueblo reunido
  lexicon: BDAG
  rationale: Aquí no se trata de una muchedumbre indefinida, sino del grupo reunido para escuchar. «Asamblea» refleja mejor ese carácter colectivo y formal que «multitud», en continuidad con la decisión inglesa documentada.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «when he said this» a «as he was saying this» para reflejar mejor la simultaneidad del participio presente. La redacción española sigue esa revisión con «mientras él decía esto», evitando un sentido puntual que no expresa bien el original.
  spanish_consistency_notes:
  - Se mantuvo «fariseos» y «saduceos» como nombres transliterados ya establecidos en español bíblico.
  - Se prefirió «asamblea» en lugar de «multitud» para conservar el matiz de grupo reunido en contexto judicial/narrativo.
  - Se evitó «SEÑOR» o cualquier sustitución de nombre divino porque este versículo no contiene referencia al Tetragrámaton.
  - Se usó «disputa» como equivalente principal de στάσις, pero se dejó una nota con «disensión» para preservar la alternativa semántica documentada.
