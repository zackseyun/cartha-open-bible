translation:
  language: es
  text: Así que los soldados, conforme a lo que se les había ordenado[a], tomaron a Pablo y lo llevaron de noche[b] a Antípatris.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según las órdenes que se les habían dado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «durante la noche».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ μὲν οὖν στρατιῶται
  english_pob_choice: So the soldiers
  chosen_spanish: Así que los soldados
  alternatives_spanish:
  - Entonces los soldados
  - Por tanto, los soldados
  - Así pues, los soldados
  lexicon: BDAG
  rationale: οὖν expresa continuidad/inferencia narrativa; en español, «Así que» mantiene ese avance del relato con naturalidad. Se omite un equivalente explícito de μέν, como en el inglés POB, porque su función es estructural más que léxica en esta posición.
- source_word: κατὰ τὸ διατεταγμένον αὐτοῖς
  english_pob_choice: according to what had been ordered them
  chosen_spanish: conforme a lo que se les había ordenado
  alternatives_spanish:
  - según las órdenes que se les habían dado
  - de acuerdo con lo que se les había mandado
  - según lo mandado a ellos
  lexicon: BDAG
  rationale: El participio perfecto pasivo sustantivado de διατάσσω conserva la idea de una orden previa recibida. «Conforme a lo que se les había ordenado» mantiene ese matiz pasivo y evita reducirlo solo a un sustantivo plural («órdenes»), que podría sonar menos fiel al giro griego.
- source_word: ἀναλαβόντες
  english_pob_choice: took
  chosen_spanish: tomaron a Pablo
  alternatives_spanish:
  - habiendo tomado a Pablo
  - tomando a Pablo
  - recogieron a Pablo
  lexicon: BDAG
  rationale: Como participio aoristo que antecede al verbo principal, expresa acción previa. En español, «tomaron a Pablo» reproduce con concisión el movimiento de hacerse cargo de él sin añadir un matiz no explicitado como «escoltarlo».
- source_word: ἤγαγον
  english_pob_choice: brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  - lo llevaron consigo
  lexicon: BDAG
  rationale: ἄγω admite «llevar», «conducir» o «traer». En contexto de traslado bajo custodia hacia un destino señalado, «lo llevaron» es natural y suficientemente amplio; evita una precisión direccional que el griego no exige aquí.
- source_word: διὰ νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  - en la noche
  lexicon: BDAG
  rationale: La expresión idiomática con διά + genitivo indica tiempo nocturno. «De noche» es una equivalencia idiomática clara en español y no implica necesariamente la duración completa del trayecto.
- source_word: Ἀντιπατρίδα
  english_pob_choice: Antipatris
  chosen_spanish: Antípatris
  alternatives_spanish:
  - Antipatris
  lexicon: BDAG
  rationale: Se translitera el topónimo al español como «Antípatris», manteniendo la referencia geográfica y la pronunciación usual en español bíblico.
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el auditable inglés POB sin cambios sustantivos: se mantuvo la progresión narrativa, la obediencia a la orden previa, el traslado de Pablo y el tiempo nocturno. La principal adaptación al español fue idiomática («Así que», «de noche») sin alterar el contenido semántico.'
  spanish_consistency_notes:
  - Se usó «Pablo» como nombre propio estable.
  - Se transliteró el topónimo como «Antípatris» para adecuarlo al español.
  - Se evitó «Cristo/SEÑOR» u այլ terminología no pertinente.
  - Los corchetes de notas se colocaron solo donde había alternativa real de traducción en español.
