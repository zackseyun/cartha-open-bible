translation:
  language: es
  text: Ahora pues, ustedes, junto con el concilio, hagan saber[a] al comandante para que lo baje hasta ustedes[b], como si fueran a examinar[c] con más cuidado los asuntos acerca de él. Pero nosotros estamos listos para matarlo antes de que se acerque[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «den aviso». El griego ἐμφανίσατε expresa comunicar formalmente un asunto a una autoridad; «hagan saber» preserva mejor ese matiz.
    reason: lexical_alternative
  - marker: b
    text: O «lo traiga ante ustedes». El verbo griego incluye literalmente la idea de hacerlo bajar.
    reason: lexical_alternative
  - marker: c
    text: O «investigar» o «determinar». El verbo griego admite la idea de una revisión judicial más formal; «examinar» deja abierta esa gama sin sobrecargarla.
    reason: lexical_alternative
  - marker: d
    text: O «antes de que llegue». El verbo ἐγγίζω puede expresar acercarse o llegar, pero aquí la imagen espacial de «acercarse» queda más cerca del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμφανίσατε
  english_pob_choice: make it known
  chosen_spanish: den aviso
  alternatives_spanish:
  - hagan saber
  - informen
  lexicon: BDAG
  rationale: El imperativo aoristo aquí expresa una comunicación formal a una autoridad. «Den aviso» conserva esa fuerza pragmática en español sin sonar mecánico; «hagan saber» es más literal, pero menos natural en el registro del discurso.
- source_word: τῷ χιλιάρχῳ
  english_pob_choice: commander
  chosen_spanish: al comandante
  alternatives_spanish:
  - al tribuno
  - al oficial comandante
  lexicon: BDAG
  rationale: χιλίαρχος designa al jefe romano de la guarnición. «Comandante» es claro y sobrio en español; «tribuno» sería más técnico y menos transparente para el lector general.
- source_word: σὺν τῷ συνεδρίῳ
  english_pob_choice: together with the council
  chosen_spanish: junto con el consejo
  alternatives_spanish:
  - junto con el sanedrín
  - con el consejo
  lexicon: BDAG
  rationale: σύν indica asociación. συνέδριον puede referirse al órgano judío de gobierno; «consejo» mantiene la referencia institucional sin imponer una transliteración más interpretativa como «sanedrín».
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» expresa de manera natural el valor final en español y conserva la relación lógica del griego.
- source_word: καταγάγῃ αὐτὸν εἰς ὑμᾶς
  english_pob_choice: he may bring him down to you
  chosen_spanish: lo baje hasta ustedes
  alternatives_spanish:
  - lo traiga hasta ustedes
  - lo haga bajar hasta ustedes
  lexicon: BDAG
  rationale: κατάγω incluye la idea direccional de «bajar/traer hacia abajo». «Lo baje hasta ustedes» preserva esa imagen espacial; la nota en pie de página recoge la alternativa más natural «lo traiga hasta ustedes».
- source_word: ὡς μέλλοντας
  english_pob_choice: as though you were about to
  chosen_spanish: como si estuvieran por
  alternatives_spanish:
  - como si fueran a
  - como si tuvieran intención de
  lexicon: BDAG
  rationale: La construcción expresa una pretensión o simulación de intención futura. «Como si estuvieran por» conserva el matiz de inminencia y la apariencia engañosa del contexto.
- source_word: διαγινώσκειν
  english_pob_choice: examine
  chosen_spanish: examinar
  alternatives_spanish:
  - investigar
  - determinar
  lexicon: BDAG
  rationale: En contexto judicial, el verbo apunta a examinar o decidir tras una revisión. «Examinar» encaja bien en español y mantiene la neutralidad del proceso que aparentan.
- source_word: ἀκριβέστερον
  english_pob_choice: more carefully
  chosen_spanish: con más cuidado
  alternatives_spanish:
  - más cuidadosamente
  - con mayor exactitud
  lexicon: BDAG
  rationale: El comparativo expresa mayor precisión o minuciosidad. «Con más cuidado» suena natural y refleja el sentido de una revisión más atenta sin perder la idea de exactitud subyacente.
- source_word: τὰ περὶ αὐτοῦ
  english_pob_choice: the things concerning him
  chosen_spanish: las cosas concernientes a él
  alternatives_spanish:
  - los asuntos acerca de él
  - su caso
  lexicon: BDAG
  rationale: Se mantiene una traducción bastante literal de la idiomática griega. «Las cosas concernientes a él» conserva la auditabilidad del texto, aunque suene más formal que «su caso».
- source_word: πρὸ τοῦ ἐγγίσαι αὐτὸν
  english_pob_choice: before he comes near
  chosen_spanish: antes de que se acerque
  alternatives_spanish:
  - antes de que llegue
  - antes de que se aproxime
  lexicon: BDAG
  rationale: πρὸ τοῦ + infinitivo indica anterioridad temporal; ἐγγίζω significa acercarse. «Antes de que se acerque» preserva la imagen espacial y el valor temporal del griego.
- source_word: ἕτοιμοί ἐσμεν
  english_pob_choice: we are ready
  chosen_spanish: estamos listos
  alternatives_spanish:
  - estamos preparados
  - estamos dispuestos
  lexicon: BDAG
  rationale: La construcción copulativa con adjetivo predicativo se expresa de forma natural con «estar listos». Es clara y directa, y conserva el valor de disponibilidad inmediata.
- source_word: τοῦ ἀνελεῖν αὐτόν
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para asesinarlo
  - para quitarle la vida
  lexicon: BDAG
  rationale: En este contexto ἀναιρέω significa matar. «Matarlo» reproduce el hecho sin añadir una valoración moral más fuerte que la del griego; «asesinarlo» sería interpretativo.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «more accurately» por «more carefully» para hacer más natural el inglés formal sin alterar ἀκριβέστερον. En español se eligió «con más cuidado», que conserva esa misma naturalidad y el matiz de mayor minuciosidad.
  spanish_consistency_notes:
  - Se preservó «comandante» para χιλίαρχος, en línea con la opción inglesa transparente y no técnica.
  - Se mantuvo «consejo» para συνέδριον, evitando imponer «Sanedrín» como glosa interpretativa en el texto principal.
  - Se usó un valor espacial en «baje» / «se acerque» para reflejar κατάγω y ἐγγίζω sin perder legibilidad.
  - No se tradujo κύριος ni θεός en este versículo, por lo que no aplica la terminología de Yahvé/Dios aquí.
