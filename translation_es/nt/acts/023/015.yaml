review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la secuencia y el sentido general del griego: exhortación a informar al comandante, propósito de hacer bajar a Pablo ante el consejo bajo pretexto de un examen más cuidadoso, y emboscada para matarlo antes de que se acerque. Sin embargo, hay pequeños desajustes léxicos y de naturalidad: «consejo» para συνέδριον suena menos preciso en contexto bíblico que «concilio», y «den aviso» reduce un poco el matiz formal de ἐμφανίσατε frente a «hagan saber». También falta la nota alternativa documentada en inglés para la idea direccional de «bring him before you / bring him down to you».'
  spanish_quality_summary: 'El texto es legible y digno, pero presenta algunos giros algo duros o poco idiomáticos: «las cosas concernientes a él» es auditable pero muy tieso en español; «los asuntos acerca de él» conserva el sentido con mejor lectura. «Como si estuvieran por examinar» funciona, aunque «como si fueran a examinar» suena más natural. En conjunto requiere solo una reparación menor, no una reescritura profunda.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Comandante» está bien para χιλίαρχος. Conviene preferir «concilio» para συνέδριον en este contexto, ya que «consejo» puede sonar administrativo y menos identificable como cuerpo judicial. No hay conflicto con la terminología base del proyecto.
  issues:
