    issue: «junto con el consejo» para σὺν τῷ συνεδρίῳ
    rationale: Aunque posible, «consejo» suena menos preciso en español bíblico para el cuerpo judicial judío; «concilio» mantiene cercanía al griego y mejor reconocibilidad sin imponer «sanedrín».
  - severity: medium
    issue: «den aviso» para ἐμφανίσατε
    rationale: Expresa comunicación, pero en este contexto formal «hagan saber» refleja mejor el matiz de comunicar oficialmente un asunto al comandante y se alinea mejor con el POB inglés.
  - severity: low
    issue: «las cosas concernientes a él»
    rationale: Es muy literal, pero poco natural en español contemporáneo. «Los asuntos acerca de él» conserva la amplitud semántica sin caer en una paráfrasis fuerte como «su caso».
  - severity: low
    issue: Falta una nota para la alternativa de καταγάγῃ αὐτὸν εἰς ὑμᾶς
    rationale: El rastro de auditoría inglés preserva la alternativa «bring him before you» además del matiz literal de bajar. El español debería reflejar esa alternativa con una nota equivalente.
