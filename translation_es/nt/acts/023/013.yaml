translation:
  language: es
  text: Había más de cuarenta[a] los que habían formado esta conspiración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más de cuarenta personas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δὲ
  english_pob_choice: There were
  chosen_spanish: Había
  alternatives_spanish:
  - Había ahora
  - Y había
  lexicon: BDAG
  rationale: El griego introduce la existencia del grupo; en español, una construcción existencial con 'había' transmite con naturalidad ese valor. Se omite una conjunción explícita porque δέ solo aporta una transición leve.
- source_word: πλείους τεσσεράκοντα
  english_pob_choice: more than forty
  chosen_spanish: más de cuarenta
  alternatives_spanish:
  - más de cuarenta hombres
  - sobre cuarenta
  lexicon: BDAG
  rationale: La comparación con el numeral expresa cantidad superior a cuarenta. 'Más de cuarenta' conserva la fuerza cuantitativa sin añadir un sustantivo inexistente en el griego.
- source_word: οἱ ταύτην τὴν συνωμοσίαν ποιησάμενοι
  english_pob_choice: who had formed this conspiracy
  chosen_spanish: que habían formado esta conspiración
  alternatives_spanish:
  - los que habían formado esta conspiración
  - que habían hecho esta conspiración
  lexicon: BDAG
  rationale: El artículo con participio funciona de modo sustantivo y se rinde bien con una relativa en español. 'Habían formado' refleja el matiz de 'haber hecho/formado' una conspiración con idioma natural y sin perder precisión.
- source_word: συνωμοσίαν
  english_pob_choice: conspiracy
  chosen_spanish: conspiración
  alternatives_spanish:
  - trama
  - complot
  lexicon: BDAG
  rationale: '''Conspiración'' es el equivalente más directo y formal en español para συνωμοσία. ''Complot'' es posible, pero ''conspiración'' mantiene mejor el registro y la formalidad del término.'
- source_word: ποιησάμενοι
  english_pob_choice: had formed
  chosen_spanish: habían formado
  alternatives_spanish:
  - habían hecho
  - habían entablado
  lexicon: BDAG
  rationale: El aoristo medio de ποιέω con συνωμοσίαν se traduce naturalmente como 'habían formado' en español. Esta opción conserva la acción realizada sin introducir una interpretación adicional como 'habían entrado en'.
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable: mantiene el valor existencial de ἦσαν δὲ, la cuantificación idiomática de πλείους τεσσεράκοντα y el sentido de ''formed this conspiracy'' para ποιησάμενοι. No se requieren cambios textuales ni de lectura.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras convenciones no pertinentes, ya que no hay términos divinos en este versículo.
  - '''Conspiración'' se mantiene de forma consistente con el valor léxico documentado de συνωμοσία.'
  - La estructura española conserva el carácter impersonal/existencial del original sin añadir sujetos explícitos que no están en el griego.
