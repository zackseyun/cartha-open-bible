translation:
  language: es
  text: 'Entonces Pablo llamó a uno de los centuriones y dijo[a]: «Lleva a este joven al comandante, porque tiene algo que informarle».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decirle». El verbo griego puede significar informar, anunciar o decir; se escogió «informar» por el contexto de transmitir una información urgente.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó aparte
  - hizo llamar
  - convocó
  lexicon: BDAG
  rationale: El participio aoristo medio presenta la acción inicial de Pablo al llamar a un centurión antes de hablar. «Llamó» es natural en español y conserva la secuencia narrativa sin añadir matices excesivos; «convocó» o «hizo llamar» sonarían más interpretativos.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pues
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo. «Entonces» reproduce bien la progresión temporal y discursiva del relato en español sin cargar el contraste.
- source_word: ἕνα τῶν ἑκατονταρχῶν
  english_pob_choice: one of the centurions
  chosen_spanish: uno de los centuriones
  alternatives_spanish:
  - uno de los capitanes de cien
  - uno de los centuriones romanos
  lexicon: BDAG
  rationale: ἑκατοντάρχης corresponde al rango romano de centurión. «Centuriones» es el equivalente histórico y ya establecido en español bíblico moderno; no hace falta una paráfrasis técnica adicional.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - habló
  - respondió
  lexicon: BDAG
  rationale: φημί es un verbo de habla general. «Dijo» es la forma más directa y sobria en diálogo narrativo.
- source_word: νεανίαν
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - jovencito
  - joven hombre
  lexicon: BDAG
  rationale: νεανίας designa a un varón joven. «Joven» es claro, idiomático y evita una especificación más marcada que el griego no exige.
- source_word: ἄπαγε
  english_pob_choice: Take
  chosen_spanish: Lleva
  alternatives_spanish:
  - Tráelo
  - Conduce
  - Toma
  lexicon: BDAG
  rationale: El imperativo de ἀπάγω significa llevar o conducir a alguien a otro lugar/persona. «Lleva» comunica bien la orden en español y mantiene la dirección hacia el comandante.
- source_word: πρὸς τὸν χιλίαρχον
  english_pob_choice: to the commander
  chosen_spanish: ante el comandante
  alternatives_spanish:
  - al comandante
  - al tribuno
  - ante el tribuno
  lexicon: BDAG
  rationale: χιλίαρχος es el oficial romano al mando, equivalente funcional a «comandante». Añadir «ante» ayuda a reflejar la idea de presentarlo ante esa autoridad, no solo moverlo físicamente hacia él.
- source_word: ἔχει γὰρ ἀπαγγεῖλαί τι αὐτῷ
  english_pob_choice: for he has something to report to him
  chosen_spanish: porque tiene algo que reportarle
  alternatives_spanish:
  - porque tiene algo que decirle
  - porque tiene un mensaje que darle
  - pues tiene algo que anunciarle
  lexicon: BDAG
  rationale: La construcción ἔχει + infinitivo expresa tener algo que hacer/decir, y ἀπαγγέλλω puede significar informar o reportar. «Reportarle» conserva la idea de transmitir información relevante, siguiendo la decisión auditada del POB en inglés.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del borrador auditado en inglés; este español sigue la misma decisión óptima-equivalente y conserva la lectura contextual de ἀπαγγέλλω como ‘reportar’.
  spanish_consistency_notes:
  - Se mantiene «centuriones» para ἑκατοντάρχων, en armonía con el equivalente histórico estándar.
  - Se usa «comandante» para χιλίαρχος, coherente con el POB en inglés y natural en español moderno.
  - Se conserva «reportarle» para ἀπαγγεῖλαί τι αὐτῷ, evitando suavizar el matiz informativo del verbo griego.
  - La puntuación y el orden narrativo siguen el flujo del texto griego sin introducir contenido extra.
