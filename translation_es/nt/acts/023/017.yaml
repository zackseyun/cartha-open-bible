revisions:
- from: 'Entonces Pablo llamó a uno de los centuriones y dijo[a]: «Lleva a este joven ante el comandante, porque tiene algo que reportarle».'
  to: 'Entonces Pablo llamó a uno de los centuriones y dijo[a]: «Lleva a este joven al comandante, porque tiene algo que informarle».'
  rationale: Se ajusta «reportarle» a «informarle» por mayor naturalidad y fidelidad estilística en español, manteniendo la alternativa documentada en nota. También se simplifica «ante el comandante» a «al comandante» para reflejar πρὸς de manera más directa y natural.
