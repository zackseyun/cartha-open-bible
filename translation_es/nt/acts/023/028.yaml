translation:
  language: es
  text: Y queriendo saber cuál era el cargo[a] por el que lo acusaban, lo hice bajar ante su consejo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la acusación» o «la causa». El griego αἰτία puede referirse aquí a la base de la acusación en sentido jurídico.
    reason: lexical_alternative
  - marker: b
    text: O «su Sanedrín». El griego συνέδριον se refiere a un consejo; en este contexto probablemente designa al consejo gobernante judío de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενός
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo saber
  - intentando
  lexicon: BDAG
  rationale: El participio expresa la motivación de Lisias. «Queriendo» comunica la voluntad o intención de forma natural en español y conserva el valor volitivo sin sobrecargar el texto.
- source_word: ἐπιγνῶναι
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - enterarse plenamente
  - llegar a saber
  lexicon: BDAG
  rationale: En este contexto forense, el infinitivo expresa el propósito de averiguar con precisión. «Conocer» mantiene la idea de obtener conocimiento sobre el caso sin forzar una paráfrasis.
- source_word: τὴν αἰτίαν
  english_pob_choice: the charge
  chosen_spanish: la acusación
  alternatives_spanish:
  - el cargo
  - la causa
  - el motivo
  lexicon: BDAG
  rationale: Aquí αἰτία tiene sentido jurídico. «La acusación» refleja mejor el valor forense que un mero «motivo» o «causa», y en español conserva la relación con el verbo siguiente.
- source_word: δι’ ἣν
  english_pob_choice: for which
  chosen_spanish: por la cual
  alternatives_spanish:
  - debido a la cual
  - a causa de la cual
  - por el cual
  lexicon: BDAG
  rationale: La construcción relativa explica la acusación. «Por la cual» es la forma natural en español y mantiene la relación causal/legal con la acusación.
- source_word: ἐνεκάλουν
  english_pob_choice: they were accusing
  chosen_spanish: lo acusaban
  alternatives_spanish:
  - presentaban cargos contra él
  - lo estaban acusando
  - lo denunciaban
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso o reiterada. En español, «lo acusaban» comunica bien esa duratividad y evita una forma demasiado pesada.
- source_word: κατήγαγον
  english_pob_choice: I brought down
  chosen_spanish: lo hice bajar
  alternatives_spanish:
  - lo bajé
  - lo llevé abajo
  - lo traje abajo
  lexicon: BDAG
  rationale: El verbo conserva la idea espacial de descenso. En español, «lo hice bajar» expresa con naturalidad que Lisias ordenó o procuró el descenso al recinto del consejo, sin perder el matiz direccional.
- source_word: συνέδριον
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - Sanedrín
  - asamblea
  - tribunal
  lexicon: BDAG
  rationale: La palabra griega designa un consejo; el audit trail inglés prefirió esa traducción sin imponer el nombre técnico. «Consejo» es fiel y claro; «Sanedrín» queda como alternativa histórica posible en nota.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: de ellos
  alternatives_spanish:
  - su
  - propio
  - de ellos mismos
  lexicon: BDAG
  rationale: El pronombre posesivo se refiere al consejo de sus adversarios. «De ellos» suena natural en español y mantiene la referencia relacional sin añadir énfasis interpretativo.
theological_decisions:
- issue: Identificación de συνέδριον en un contexto judío de Jerusalén
  english_pob_reading: council, with a note that it likely denotes the Jewish ruling council in Jerusalem; 'Sanhedrin' is a lexical alternative
  chosen_spanish_reading: consejo, con nota que admite «Sanedrín» como alternativa lexical
  alternative_spanish_readings:
  - Sanedrín
  - consejo de ellos
  rationale: El texto griego significa literalmente «consejo». En este contexto probablemente alude al consejo gobernante judío de Jerusalén, pero la forma base no exige introducir el término técnico como única opción. Por eso se mantiene «consejo» en el texto principal y se documenta la alternativa tradicional en nota.
  doctrine_reference: Hechos 23:28; uso histórico-jurídico de συνέδριον
translation_notes:
  revision_awareness: 'Se mantuvo el sentido y la estructura del griego con la misma línea interpretativa del POB inglés: propósito de averiguar la acusación, causalidad de la relativa, aspecto imperfectivo de «acusaban», y traducción base de συνέδριον como «consejo» con alternativa histórica documentada. No se introdujeron cambios doctrinales ni expansiones innecesarias.'
  spanish_consistency_notes:
  - Se prefirió un registro moderno y sobrio, apto para lectura pública.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto.
  - «Consejo» se conserva como traducción principal consistente con el audit trail inglés.
  - Los corchetes de nota se colocaron solo donde hay una alternativa lexical documentada.
