revisions:
- from: «Lo oiré —dijo—, cuando también hayan llegado tus acusadores». Y mandó que fuera custodiado en el pretorio[a] de Herodes.
  to: «Oiré tu caso —dijo— cuando también lleguen tus acusadores». Y mandó que fuera puesto bajo custodia en el pretorio[a] de Herodes.
  rationale: Se reemplazó «Lo oiré» por «Oiré tu caso» para hacer explícito en español el sentido judicial que el contexto exige y evitar ambigüedad pronominal. Se simplificó «hayan llegado» a «lleguen» para una contingencia futura más natural. Se ajustó «fuera custodiado» a «fuera puesto bajo custodia» para reflejar mejor la idea de detención vigilada de φυλάσσεσθαι. La nota sobre «pretorio» se conserva sin cambios sustanciales.
