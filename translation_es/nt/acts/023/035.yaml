review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: decisión judicial futura, llegada de los acusadores, y orden de custodia en el pretorio de Herodes. Sin embargo, «Lo oiré» no representa con claridad el sentido forense de Διακούσομαί σου en este contexto, y «cuando también hayan llegado» suena menos natural que una forma simple de futuro contingente en español.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Lo oiré» resulta ambiguo y poco idiomático en un contexto judicial, pues el pronombre «lo» no tiene antecedente claro. «cuando también hayan llegado tus acusadores» es gramatical, pero más pesado de lo necesario. «fuera custodiado» es aceptable, aunque «fuera puesto bajo custodia» expresa mejor la idea custodial continua.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Pretorio» está bien y la nota cultural está bien formulada. La revisión propuesta mantiene el término técnico administrativo y mejora la precisión legal de διακούω/φυλάσσεσθαι.
  issues:
  - severity: high
    issue: «Lo oiré» es ambiguo y no comunica bien el sentido judicial de Διακούσομαί σου.
    rationale: En español, el objeto pronominal neutro «lo» queda sin referente claro y puede sonar como si Félix dijera simplemente «eso lo escucharé». En este contexto legal, «oiré tu caso» o «escucharé tu caso» transmite mejor la fuerza procesal sin exceder el sentido del griego.
  - severity: medium
    issue: «cuando también hayan llegado tus acusadores» es menos natural que «cuando también lleguen tus acusadores».
    rationale: ὅταν con subjuntivo marca contingencia futura. En español bíblico natural, el presente de subjuntivo tras «cuando» expresa esto de manera más fluida que el pretérito perfecto de subjuntivo.
  - severity: medium
    issue: «fuera custodiado» es correcto, pero no expresa tan claramente la idea de custodia detentiva como el inglés auditado.
    rationale: φυλάσσεσθαι aquí no es solo vigilancia momentánea, sino mantenerlo bajo resguardo/custodia. «Fuera puesto bajo custodia» o «fuera mantenido bajo custodia» refleja mejor el matiz sin introducir prisión punitiva.
  revised_spanish_text: «Oiré tu caso —dijo— cuando también lleguen tus acusadores». Y mandó que fuera puesto bajo custodia en el pretorio[a] de Herodes.
  revised_footnotes:
  - marker: a
    text: Pretorio traduce el griego πραιτώριον, término para la residencia o sede oficial del gobernador romano; aquí, probablemente el palacio de Herodes en Cesarea.
    reason: cultural_note
  revision_rationale: Se reemplazó «Lo oiré» por «Oiré tu caso» para hacer explícito en español el sentido judicial que el contexto exige y evitar ambigüedad pronominal. Se simplificó «hayan llegado» a «lleguen» para una contingencia futura más natural. Se ajustó «fuera custodiado» a «fuera puesto bajo custodia» para reflejar mejor la idea de detención vigilada de φυλάσσεσθαι. La nota sobre «pretorio» se conserva sin cambios sustanciales.
