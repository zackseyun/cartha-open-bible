translation:
  language: es
  text: «Oiré tu caso —dijo— cuando también lleguen tus acusadores». Y mandó que fuera puesto bajo custodia en el pretorio[a] de Herodes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pretorio traduce el griego πραιτώριον, término para la residencia o sede oficial del gobernador romano; aquí, probablemente el palacio de Herodes en Cesarea.
    reason: cultural_note
lexical_decisions:
- source_word: Διακούσομαί
  english_pob_choice: I will hear your case
  chosen_spanish: Lo oiré
  alternatives_spanish:
  - Oiré tu causa
  - Escucharé tu caso
  lexicon: BDAG
  rationale: El verbo griego expresa oír hasta el final o escuchar en contexto judicial. En español, «lo oiré» conserva brevedad y permite que el contexto forense del pasaje determine el objeto implícito; «tu caso» sería una ampliación interpretativa posible, pero no obligatoria aquí.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: lo
  alternatives_spanish:
  - te
  - tu caso
  lexicon: BDAG
  rationale: El genitivo con διακούω puede entenderse como el asunto o causa del interlocutor. Para no añadir explícitamente «caso» donde el griego no lo dice, se dejó el objeto implícito en «lo oiré».
- source_word: ὅταν καὶ οἱ κατήγοροί σου παραγένωνται
  english_pob_choice: when your accusers also arrive
  chosen_spanish: cuando también hayan llegado tus acusadores
  alternatives_spanish:
  - cuando también lleguen tus acusadores
  - cuando también arriben tus acusadores
  lexicon: BDAG
  rationale: ὅταν con subjuntivo marca contingencia futura; en español, el pluscuamperfecto de subjuntivo no es necesario aquí, pero «hayan llegado» transmite bien la llegada previa al acto judicial. κατήγοροι se vierte como «acusadores», término legal natural y fiel.
- source_word: κελεύσας
  english_pob_choice: And he ordered
  chosen_spanish: Y mandó
  alternatives_spanish:
  - Y ordenó
  - Entonces mandó
  lexicon: BDAG
  rationale: El participio aoristo acompañante se expresa como verbo finito en español para mantener fluidez narrativa. «Mandó» es idiomático y suficientemente fuerte para κελεύω sin perder el matiz de instrucción oficial.
- source_word: πραιτωρίῳ
  english_pob_choice: praetorium
  chosen_spanish: pretorio
  alternatives_spanish:
  - praetorio
  - residencia del gobernador
  lexicon: BDAG
  rationale: Se conserva el término técnico administrativo en una forma castellanizada y reconocible. «Pretorio» mantiene el valor histórico sin exigir una glosa interpretativa en el texto principal.
- source_word: τοῦ Ἡρῴδου
  english_pob_choice: Herod’s
  chosen_spanish: de Herodes
  alternatives_spanish:
  - herodiano
  - de Herodes
  lexicon: BDAG
  rationale: El genitivo posesivo se vierte de forma directa como «de Herodes». Esto preserva la relación del edificio con Herodes sin forzar una identificación interpretativa adicional en el cuerpo del texto.
- source_word: φυλάσσεσθαι
  english_pob_choice: be kept under guard
  chosen_spanish: fuera custodiado
  alternatives_spanish:
  - fuera guardado
  - estuviera bajo custodia
  lexicon: BDAG
  rationale: El infinitivo pasivo en este contexto es custodial. «Fuera custodiado» comunica detención vigilada de manera natural en español, sin añadir la connotación punitiva de prisión.
- source_word: αὐτόν
  english_pob_choice: he
  chosen_spanish: se
  alternatives_spanish:
  - a él
  - él
  lexicon: BDAG
  rationale: 'En la pasiva impersonal española, el referente se expresa mejor con una construcción refleja: «fuera custodiado». Así se mantiene la naturalidad sintáctica y el sujeto paciente sigue siendo el acusado.'
translation_notes:
  revision_awareness: La revisión inglesa eliminó «fully» porque no estaba explícitamente representado por Διακούσομαί σου. La versión española evita añadir un intensificador equivalente y se mantiene en el valor básico de «oir»/«escuchar», conservando el tono judicial del texto sin sobreinterpretarlo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma para el nombre divino, pero este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto de un nombre divino que no aparece aquí.
  - «Pretorio» se mantiene como término técnico consistente con el registro histórico-administrativo del NT.
  - La sintaxis procura ser natural en español sin perder la secuencia narrativa del participio aoristo griego.
