base_translation:
  language: en
  yaml_path: translation/nt/acts/023/035.yaml
  text: “I will hear your case,” he said[b][a], “when your accusers also arrive.” And he ordered that he be kept under guard in Herod’s praetorium.
  footnotes:
  - marker: a
    text: Or, “I will hear you fully.” The Greek verb can mean to hear someone out completely; in this legal context, “hear your case fully” makes the judicial sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Praetorium refers to the official residence or headquarters of the Roman governor; here, likely Herod’s palace in Caesarea.
    reason: cultural_note
