revisions:
- from: 'Y Pablo dijo[a]: «Yo no sabía, hermanos, que era el sumo sacerdote; porque escrito está: “No hablarás mal[b] de un gobernante de tu pueblo”».'
  to: 'Y Pablo dijo: «Yo no sabía, hermanos, que era el sumo sacerdote; porque está escrito: “No hablarás mal[a] de un gobernante de tu pueblo”».'
  rationale: Se simplifica el versículo para ajustarlo mejor al estilo español moderno del proyecto, eliminando una nota innecesaria en «dijo» y reemplazando «porque escrito está» por «porque está escrito». También se conserva una sola nota léxica útil en la prohibición final, afinada para representar mejor la alternativa documentada en inglés sin estrechar indebidamente el sentido.
