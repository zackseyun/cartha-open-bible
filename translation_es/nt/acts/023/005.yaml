translation:
  language: es
  text: 'Y Pablo dijo: «Yo no sabía, hermanos, que era el sumo sacerdote; porque está escrito: “No hablarás mal[a] de un gobernante de tu pueblo”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No insultarás»; también puede entenderse como «no hablarás injuriosamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη τε
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  - Y ... estaba diciendo
  lexicon: BDAG
  rationale: La partícula τέ es un conector suave, y ἔφη introduce discurso directo. «Y Pablo dijo» conserva el flujo narrativo sin sobrerrepresentar la partícula.
- source_word: Οὐκ ᾔδειν
  english_pob_choice: I did not know
  chosen_spanish: Yo no sabía
  alternatives_spanish:
  - Yo no sabía de ello
  - Yo no me daba cuenta
  lexicon: BDAG
  rationale: La forma de οἶδα aquí funciona con sentido de conocimiento en pasado. En español, «no sabía» es natural y conserva el valor directo del griego.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, compatriotas
  lexicon: BDAG
  rationale: El vocativo plural es masculino. Dado el auditorio al que Pablo se dirige, «hermanos» es fiel, natural y coherente con el criterio de precisión de género del proyecto.
- source_word: ὅτι ἐστὶν ἀρχιερεύς
  english_pob_choice: that he was the high priest
  chosen_spanish: que era el sumo sacerdote
  alternatives_spanish:
  - que es el sumo sacerdote
  - que era sumo sacerdote
  lexicon: BDAG
  rationale: Aunque el griego usa presente, en discurso indirecto pasado el español suele preferir imperfecto. «Sumo sacerdote» reproduce el cargo con claridad; el artículo no requiere forzarse en español.
- source_word: γέγραπται γὰρ
  english_pob_choice: for it is written
  chosen_spanish: porque escrito está
  alternatives_spanish:
  - porque está escrito
  - pues escrito está
  lexicon: BDAG
  rationale: La fórmula bíblica se conserva con una construcción natural en español. «Escrito está» mantiene el tono reverente y la función autoritativa de la cita.
- source_word: Ἄρχοντα
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un ruler
  - un líder
  - una autoridad
  lexicon: BDAG
  rationale: El acusativo anartro se entiende genéricamente. «Gobernante» comunica mejor que «ruler» en español moderno y cubre el matiz de ἄρχων en este contexto ético-legal.
- source_word: τοῦ λαοῦ σου
  english_pob_choice: of your people
  chosen_spanish: de tu pueblo
  alternatives_spanish:
  - de tu gente
  - de tu nación
  - de tu propio pueblo
  lexicon: BDAG
  rationale: «Pueblo» conserva el lenguaje comunitario/covenantal de λαός. «Tu pueblo» sigue de cerca la cita y suena natural en español bíblico contemporáneo.
- source_word: οὐκ ἐρεῖς κακῶς
  english_pob_choice: You shall not speak evil
  chosen_spanish: No hablarás mal
  alternatives_spanish:
  - No hablarás mal de
  - No maldecirás
  - No denigrarás
  lexicon: BDAG
  rationale: La forma futura con valor imperativo se expresa en español de manera directa. «Hablar mal» refleja bien κακῶς sin estrechar indebidamente el sentido a «calumniar» o «insultar».
theological_decisions:
- issue: Cómo presentar ἀδελφοί en un discurso dirigido a una autoridad colectiva
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - colegas
  rationale: Se conserva la referencia masculina plural del vocativo, y el contexto de un consejo gobernante hace natural el trato directo «hermanos».
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Cómo reflejar la cita de Escritura y su fuerza normativa
  english_pob_reading: for it is written, ‘You shall not speak evil of a ruler of your people.’
  chosen_spanish_reading: 'porque escrito está: “No hablarás mal de un gobernante de tu pueblo”'
  alternative_spanish_readings:
  - 'porque está escrito: “No hablarás mal de un gobernante de tu pueblo”'
  - 'pues escrito está: “No hablarás mal de un gobernante de tu pueblo”'
  - 'porque escrito está: “No revilearás a un gobernante de tu pueblo”'
  rationale: La formulación mantiene la autoridad de la cita y el valor imperativo de la ley citada, sin introducir un tecnicismo más fuerte que el griego ni un arcaísmo innecesario.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió solo el tiempo verbal de «he is» a «he was» por naturalidad narrativa; la presente redacción española ya adopta el imperfecto («era») por concordancia idiomática con el discurso indirecto pasado, manteniendo intacto el resto de la estructura y la fuerza de la cita.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca explícitamente el nombre divino; aquí no aplica.
  - Se conserva «sumo sacerdote» para el cargo ἀρχιερεύς, sin sustituirlo por fórmulas litúrgicas más tradicionales.
  - «Gobernante» se eligió para ἄρχων por claridad moderna y porque no requiere una nota doctrinal adicional.
  - La cita bíblica se mantiene con tono formal y directamente reconocible en español, sin cargarla de arcaísmos.
  - El marcador de nota [a] se aplica al verbo de apertura del discurso; [b] al término del mandato negativo para preservar la alternativa léxica del griego.
