review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: Pablo responde, niega haber sabido que se trataba del sumo sacerdote y apoya su conducta con una cita de la Escritura. Sin embargo, hay dos detalles mejorables para mayor fidelidad y naturalidad: «porque escrito está» suena más rígido que el español natural «porque está escrito», y la nota [a] introduce una alternativa innecesaria que no pertenece al rastro principal del POB en inglés.'
  spanish_quality_summary: El texto es claro y mayormente legible, con buen registro bíblico moderno. «Yo no sabía, hermanos, que era el sumo sacerdote» funciona bien. La principal mejora estilística es preferir «porque está escrito» frente a «porque escrito está», que evita un giro arcaizante innecesario sin perder dignidad. La puntuación y la cita están bien resueltas.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «hermanos», «sumo sacerdote», «gobernante» y «pueblo» están bien alineados con el griego y con las decisiones documentadas. La alternativa «un ruler» en las decisiones léxicas internas es claramente errónea como español, pero no afecta el texto principal; aun así, confirma que conviene una limpieza editorial.
  issues:
  - severity: medium
    issue: «porque escrito está» es menos natural que «porque está escrito»
    rationale: Ambas opciones son posibles, pero el proyecto pide español moderno y ampliamente legible. El rastro inglés eligió una fórmula bíblica familiar no arcaizante; «porque está escrito» la refleja mejor en español actual.
  - severity: low
    issue: La nota [a] sobre «Y Pablo estaba diciendo» no es necesaria
    rationale: El POB en inglés no conservó una nota para ἔφη τε; la alternativa no aporta una ambigüedad importante para el lector español y recarga el versículo sin necesidad.
  - severity: low
    issue: La nota [b] puede afinarse para reflejar mejor la alternativa inglesa «revile»
    rationale: «Difamar» es más estrecho que el griego y que la alternativa inglesa. «Insultar» o «injuriar» representan mejor la opción léxica alternativa sin introducir la idea específica de calumnia.
  revised_spanish_text: 'Y Pablo dijo: «Yo no sabía, hermanos, que era el sumo sacerdote; porque está escrito: “No hablarás mal[a] de un gobernante de tu pueblo”».'
  revised_footnotes:
  - marker: a
    text: 'O: «No insultarás»; también puede entenderse como «no hablarás injuriosamente».'
    reason: lexical_alternative
  revision_rationale: Se simplifica el versículo para ajustarlo mejor al estilo español moderno del proyecto, eliminando una nota innecesaria en «dijo» y reemplazando «porque escrito está» por «porque está escrito». También se conserva una sola nota léxica útil en la prohibición final, afinada para representar mejor la alternativa documentada en inglés sin estrechar indebidamente el sentido.
