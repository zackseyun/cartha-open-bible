translation:
  language: es
  text: Y cuando se produjo[a] una gran disputa, el comandante, temiendo que Pablo fuera despedazado[b] por ellos, ordenó a las tropas que bajaran, lo arrebataran de en medio de ellos y lo llevaran al cuartel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Se produjo» traduce la idea de γινομένης como evento que llega a ocurrir en esa situación. Alternativas posibles: «surgió», «se levantó», «estalló».'
    reason: lexical_alternative
  - marker: b
    text: O «hecho pedazos» o «rasgado por ellos» para «despedazado» (διασπασθῇ), preservando la fuerza vívida del griego.
    reason: lexical_alternative
  - marker: c
    text: «Cuartel» traduce παρεμβολή; más literalmente puede significar «campamento», pero aquí se refiere a las dependencias militares romanas en Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: πολλῆς ... γινομένης στάσεως
  english_pob_choice: when a great dispute arose
  chosen_spanish: cuando se produjo una gran disputa
  alternatives_spanish:
  - cuando surgió una gran disensión
  - cuando se levantó un gran tumulto
  - cuando se desarrollaba una gran contienda
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto pide una cláusula circunstancial en español. στάσις puede ser disensión, tumulto o conflicto; aquí el contexto inmediato es la fuerte controversia en el consejo, no una rebelión formal. «Disputa» conserva el conflicto verbal y «gran» transmite πολλῆς.
- source_word: φοβηθεὶς
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - estando atemorizado
  - porque temía
  - al temer
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera natural como participio de motivo en español. «Temiendo» conserva la relación causal con la orden siguiente y suena natural en registro bíblico moderno.
- source_word: ὁ χιλίαρχος
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el tribuno
  - el chiliarca
  lexicon: BDAG
  rationale: El término designa a un oficial militar romano al mando de una cohorte. «Comandante» es claro para el lector español y evita una transliteración opaca; «tribuno» sería posible, pero menos transparente.
- source_word: μὴ διασπασθῇ ὁ Παῦλος ὑπ’ αὐτῶν
  english_pob_choice: that Paul might be torn apart by them
  chosen_spanish: que Pablo fuera despedazado por ellos
  alternatives_spanish:
  - que Pablo fuera hecho pedazos por ellos
  - que Pablo fuera arrancado en pedazos por ellos
  - que Pablo fuera rasgado por ellos
  lexicon: BDAG
  rationale: διασπάω es muy vívido y expresa una separación violenta. «Despedazado» preserva esa fuerza con buena naturalidad en español. Se mantiene el subjuntivo de posibilidad/temor introducido por μή.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes a
  lexicon: BDAG
  rationale: Es el verbo principal de la acción militar. «Ordenó» reproduce con precisión el matiz de autoridad y resulta idiomático en español.
- source_word: τὸ στράτευμα
  english_pob_choice: the troops
  chosen_spanish: las tropas
  alternatives_spanish:
  - los soldados
  - la fuerza militar
  lexicon: BDAG
  rationale: στράτευμα designa el cuerpo de soldados bajo mando. «Las tropas» conserva el valor colectivo y encaja bien con el contexto militar.
- source_word: καταβὰν
  english_pob_choice: to go down
  chosen_spanish: que bajaran
  alternatives_spanish:
  - que descendieran
  - que fueran abajo
  lexicon: BDAG
  rationale: El infinitivo aoristo se expresa en español como parte de la orden coordinada. «Bajaran» refleja el movimiento espacial desde la zona superior hacia el lugar del consejo.
- source_word: ἁρπάσαι αὐτὸν ἐκ μέσου αὐτῶν
  english_pob_choice: seize him from among them
  chosen_spanish: lo sacaran de en medio de ellos
  alternatives_spanish:
  - lo arrebataran de en medio de ellos
  - lo tomaran de entre ellos
  - lo arrancaran de entre ellos
  lexicon: BDAG
  rationale: ἁρπάζω implica una remoción enérgica. «Sacar de en medio de ellos» comunica la extracción forzosa sin sonar excesivamente duro; la preposición ἐκ μέσου queda bien representada por «de en medio».
- source_word: ἄγειν τε
  english_pob_choice: and bring him
  chosen_spanish: y lo llevaran
  alternatives_spanish:
  - y lo condujeran
  - y lo guiaran
  - y lo llevaran consigo
  lexicon: BDAG
  rationale: ἄγω aquí expresa llevar/transportar bajo custodia. «Llevaran» es el equivalente más natural en esta secuencia de acciones coordinadas.
- source_word: παρεμβολήν
  english_pob_choice: the barracks
  chosen_spanish: los barracones
  alternatives_spanish:
  - el campamento
  - la fortaleza
  - los cuarteles
  lexicon: BDAG
  rationale: En Hechos, παρεμβολή se refiere a las dependencias militares romanas en Jerusalén. «Barracones» comunica ese espacio de custodia de forma clara; «campamento» podría resultar engañoso en un entorno urbano. Se preserva la decisión contextual del inglés POB.
theological_decisions:
- issue: La fuerza de διασπασθῇ en una escena de conflicto violento
  english_pob_reading: that Paul might be torn apart by them
  chosen_spanish_reading: que Pablo fuera despedazado por ellos
  alternative_spanish_readings:
  - que Pablo fuera hecho pedazos por ellos
  - que Pablo fuera rasgado por ellos
  rationale: No hay una disputa doctrinal aquí, pero sí una decisión de intensidad verbal. Se conserva el carácter brutal del temor del comandante, sin suavizarlo a un mero «molestar» o «dañar» a Pablo.
  doctrine_reference: Hechos 23:10; correspondencia semántica del verbo διασπάω
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y se mantuvo alta concordancia con el inglés POB auditado: στάσις como conflicto/disputa, διασπασθῇ con fuerza violenta, y παρεμβολή en su sentido contextual de cuarteles militares en Jerusalén. No hubo revisiones aplicadas al pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo «Pablo» para Παῦλος y «el comandante» para χιλίαρχος, evitando transliteraciones no explicadas.
  - Se prefirió un español contemporáneo y reverente, con verbos en imperfecto/subjuntivo acorde a la secuencia narrativa.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo; la principal decisión de tensión léxica es la intensidad de διασπασθῇ.
