  text: πολλῆς δὲ ⸀γινομένης στάσεως ⸀φοβηθεὶς ὁ χιλίαρχος μὴ διασπασθῇ ὁ Παῦλος ὑπ’ αὐτῶν ἐκέλευσεν τὸ στράτευμα ⸀καταβὰν ἁρπάσαι αὐτὸν ἐκ μέσου αὐτῶν, ἄγειν ⸀τε εἰς τὴν παρεμβολήν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/010.yaml
  text: And when a great dispute arose[a], the commander, fearing that Paul might be torn apart by them, ordered the troops to go down, seize him from among them[c][b], and bring him into the barracks.
  footnotes:
  - marker: a
    text: Or 'dissension' or 'uproar' for 'dispute' (στάσις), a term that can denote sharp internal conflict and, in some contexts, civil unrest.
    reason: lexical_alternative
  - marker: b
    text: Or 'torn to pieces by them' for 'torn apart by them' (διασπασθῇ), preserving the vivid force of the Greek.
    reason: lexical_alternative
  - marker: c
    text: '''Barracks'' translates παρεμβολή, which can more literally mean ''camp''; here it refers to the Roman military quarters in Jerusalem.'
    reason: cultural_note
