translation:
  language: es
  text: Entonces el comandante despidió al joven, instruyéndole que no le dijera a nadie que le había informado[a] de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le había dado a conocer estas cosas» o «le había hecho saber estas cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: χιλίαρχος
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - tribuno
  - comandante militar
  - jefe militar
  lexicon: BDAG
  rationale: En este contexto se trata de un oficial romano de alto rango. «Comandante» comunica la autoridad y la función militar con naturalidad en español, sin introducir un tecnicismo histórico que entorpezca la lectura.
- source_word: ἀπέλυσε
  english_pob_choice: dismissed
  chosen_spanish: despidió
  alternatives_spanish:
  - lo soltó
  - lo dejó ir
  - lo envió
  lexicon: BDAG
  rationale: El verbo expresa que el oficial concluye la entrevista y lo deja marchar. «Despidió» funciona bien en español para una salida formal y no sugiere necesariamente liberación de custodia, aunque puede incluirla según el contexto.
- source_word: νεανίσκον
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - jovencito
  - mozo
  lexicon: BDAG
  rationale: El término designa a un varón joven. «Joven» es natural y respetuoso en español, y mantiene el valor amplio del griego sin rebajarlo a «muchacho» o infantilizarlo.
- source_word: παραγγείλας
  english_pob_choice: instructing
  chosen_spanish: ordenándole
  alternatives_spanish:
  - instruyéndole
  - mandándole
  - encargándole
  lexicon: BDAG
  rationale: La idea es una directiva dada por una autoridad. «Ordenándole» preserva con claridad el matiz imperativo que el contexto requiere, sin perder la relación jerárquica.
- source_word: μηδενὶ ἐκλαλῆσαι
  english_pob_choice: Tell no one
  chosen_spanish: No digas a nadie
  alternatives_spanish:
  - No hables a nadie
  - No reveles a nadie
  - No cuentes a nadie
  lexicon: BDAG
  rationale: La prohibición de divulgar la información queda bien expresada con una forma idiomática y breve. «No digas a nadie» conserva el sentido de secreto público que el griego implica.
- source_word: ἐνεφάνισας
  english_pob_choice: have reported
  chosen_spanish: me has informado
  alternatives_spanish:
  - me has reportado
  - me has dado a conocer
  - me has hecho saber
  lexicon: BDAG
  rationale: El verbo significa hacer saber o informar a una autoridad. En este contexto español, «me has informado» refleja bien que el joven comunicó algo al comandante, sin forzar un registro administrativo ajeno al pasaje.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos asuntos
  - estas noticias
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural se conserva con «estas cosas», que sigue de cerca la referencia a los elementos recién comunicados y mantiene la pluralidad del griego.
- source_word: πρὸς ἐμέ
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: BDAG
  rationale: 'Tras «me has informado», el complemento en español queda más natural sin repetir la preposición: «me has informado». Esto preserva el sentido direccional de πρός + acusativo hacia la persona receptora.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés. No hubo cambios de revisión aplicados en el paquete; la redacción española intenta conservar el tono formal y la relación jerárquica del original sin calcos innecesarios.
  spanish_consistency_notes:
  - Se usa «comandante» para χιλίαρχος, conforme a la decisión inglesa auditada.
  - Se mantiene «joven» para νεανίσκον, evitando un tono infantil o peyorativo.
  - La cita directa conserva la prohibición breve y el contenido reportado al oficial.
  - Se evitó «SEÑOR» y otros sustitutos no pertinentes porque el versículo no contiene vocabulario divino.
