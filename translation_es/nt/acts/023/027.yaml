translation:
  language: es
  text: Este hombre fue capturado por los judíos[a] y estaba a punto de ser muerto por ellos, y yo me presenté con las tropas y lo rescaté, al enterarme de que es romano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El término griego puede designar a judíos en sentido étnico-religioso o a habitantes de Judea en sentido geográfico; aquí probablemente se refiere al grupo judío opositor en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: συλλημφθέντα
  english_pob_choice: was seized
  chosen_spanish: fue prendido
  alternatives_spanish:
  - fue arrestado
  - fue tomado preso
  lexicon: BDAG
  rationale: El participio pasivo de συλλαμβάνω aquí expresa que lo aprehendieron de manera hostil. «Fue prendido» conserva esa fuerza sin sugerir necesariamente un arresto formal; «fue arrestado» suena más técnico-jurídico de lo que exige el contexto.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: BDAG
  rationale: En Hechos el término puede referirse a judíos en sentido etnorreligioso o, en algunos contextos, a judeanos geográficos. Aquí la referencia más natural es al grupo judío opositor en Jerusalén, por lo que se mantiene «los judíos»; la alternativa geográfica queda como posibilidad contextual, no como traducción principal.
- source_word: μέλλοντα ἀναιρεῖσθαι
  english_pob_choice: was about to be killed
  chosen_spanish: estaba a punto de ser muerto
  alternatives_spanish:
  - estaba a punto de ser asesinado
  - estaba por ser muerto
  lexicon: BDAG
  rationale: 'μέλλω con infinitivo indica inminencia, y ἀναιρέω en este contexto significa matar. «Estaba a punto de ser muerto» sigue de cerca el valor del griego y evita introducir una intensificación interpretativa como «asesinado». '
- source_word: ἐπιστὰς
  english_pob_choice: I came
  chosen_spanish: me presenté
  alternatives_spanish:
  - intervine
  - me acerqué
  lexicon: BDAG
  rationale: El participio aoristo de ἐφίστημι comunica llegada súbita o intervención. En español, «me presenté» comunica bien la irrupción del tribuno en escena y encaja con el complemento «con las tropas» sin añadir más contenido del que permite el texto.
- source_word: σὺν τῷ στρατεύματι
  english_pob_choice: with the troops
  chosen_spanish: con las tropas
  alternatives_spanish:
  - con la tropa
  - con la fuerza
  lexicon: BDAG
  rationale: στράτευμα designa un cuerpo militar o destacamento. «Con las tropas» es natural en español y preserva el sentido militar sin precisar indebidamente el tamaño o la estructura del contingente.
- source_word: ἐξειλάμην
  english_pob_choice: rescued him
  chosen_spanish: lo rescaté
  alternatives_spanish:
  - lo libré
  - lo saqué de allí
  lexicon: BDAG
  rationale: El medio de ἐξαιρέω aquí expresa rescatar o librar de peligro. «Lo rescaté» comunica bien la acción de salvamento y mantiene el matiz de extracción de una situación amenazante.
- source_word: μαθὼν
  english_pob_choice: having learned
  chosen_spanish: habiendo sabido
  alternatives_spanish:
  - después de saber
  - al saber
  lexicon: BDAG
  rationale: El participio aoristo de μανθάνω expresa acción previa o concomitante. «Habiendo sabido» conserva esa relación temporal y sigue el orden lógico del griego, sin forzar una reescritura narrativa.
- source_word: Ῥωμαῖός ἐστιν
  english_pob_choice: he is a Roman
  chosen_spanish: es romano
  alternatives_spanish:
  - es un romano
  - es ciudadano romano
  lexicon: BDAG
  rationale: Ῥωμαῖος significa «romano»; en este contexto jurídico implica ciudadanía romana, pero el griego no la explicita. «Es romano» mantiene la equivalencia léxica directa y deja la implicación legal al contexto.
theological_decisions:
- issue: Tensión narrativa/rétorica en la carta del tribuno
  english_pob_reading: Translate the tribune's claim straightforwardly without harmonizing it to the fuller narrative in Acts 21–22.
  chosen_spanish_reading: Traducir la afirmación del tribuno de manera directa, sin suavizar ni armonizar la secuencia para resolver la tensión con el relato más amplio.
  alternative_spanish_readings:
  - Marcar en la traducción que conoció antes su condición de romano
  - Parafrasear para resolver la aparente discrepancia con el contexto narrativo
  rationale: El versículo reproduce las propias palabras de Claudio Lisias y presenta su actuación de manera favorable. La traducción debe reflejar el griego tal como está, sin insertar una solución narrativa que el texto no ofrece.
  doctrine_reference: Principios de traducción POB §1, §3
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: la coordinación final se mantuvo con «y» en lugar de «pero», porque el griego καί no introduce contraste explícito. También se preservó el tono directo de la afirmación del tribuno, sin resolver la tensión histórica que se percibe en el relato más amplio de Hechos.'
  spanish_consistency_notes:
  - Se mantuvo «los judíos» en el texto principal y se dejó constancia de la alternativa «los judeanos» en nota, conforme al debate lexical del griego Ἰουδαίων.
  - Se eligió un español claro y digno, evitando el calco excesivo, pero sin añadir interpretaciones como «ciudadano» donde el griego solo dice Ῥωμαῖος.
  - La coordinación con «y» refleja la revisión del texto fuente y evita introducir una adversativa inexistente en el original.
