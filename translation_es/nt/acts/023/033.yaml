translation:
  language: es
  text: Cuando entraron en Cesarea y entregaron la carta al gobernador[a], también se lo presentaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'le entregaron la carta al gobernador'.
    reason: lexical_alternative
  - marker: b
    text: O 'lo llevaron ante él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: they
  chosen_spanish: Cuando entraron
  alternatives_spanish:
  - ellos entraron
  - quienes entraron
  lexicon: BDAG
  rationale: El relativo griego retoma al destacamento del versículo anterior, pero en español resulta más natural abrir con una cláusula temporal explícita. Así se preserva la referencia sin forzar un relativo innecesario en la oración principal.
- source_word: εἰσελθόντες
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - ingresaron
  - entraron en
  lexicon: BDAG
  rationale: El aoristo participial indica una acción previa a la principal; 'entraron' comunica bien ese valor narrativo en español y es idiomático con una ciudad como complemento.
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesarea Marítima
  lexicon: BDAG
  rationale: Se conserva el topónimo usual en español. No se amplía en el texto principal porque el griego no lo especifica y el contexto ya identifica la ciudad.
- source_word: ἀναδόντες
  english_pob_choice: delivered
  chosen_spanish: entregaron
  alternatives_spanish:
  - remitieron
  - pusieron en manos de
  lexicon: BDAG
  rationale: En un contexto oficial, 'entregaron' transmite la acción formal de pasar un documento a una autoridad. Mantiene la sobriedad del griego sin volverse demasiado técnico.
- source_word: ἐπιστολήν
  english_pob_choice: letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el escrito
  - el despacho
  lexicon: BDAG
  rationale: '''Carta'' es la forma natural y fiel para una comunicación escrita oficial en español. No se añade especificación interpretativa en el cuerpo del texto.'
- source_word: ἡγεμόνι
  english_pob_choice: governor
  chosen_spanish: al gobernador
  alternatives_spanish:
  - al prefecto
  - al mandatario
  lexicon: BDAG
  rationale: '''Gobernador'' es la equivalencia clara y ampliamente comprensible para el funcionario romano al que se refiere el contexto. ''Prefecto'' sería más técnico de lo necesario en el texto principal.'
- source_word: παρέστησαν
  english_pob_choice: presented
  chosen_spanish: presentaron... ante él
  alternatives_spanish:
  - pusieron... delante de él
  - lo llevaron ante él
  lexicon: BDAG
  rationale: 'El verbo tiene un matiz oficial/jurídico: introducir a alguien ante una autoridad. ''Presentaron... ante él'' conserva esa fuerza y evita reducir el acto a una mera llegada física.'
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y además
  - asimismo
  lexicon: BDAG
  rationale: El segundo καί es aditivo; 'también' expresa que, además de la carta, hicieron otra acción con Pablo.
- source_word: Παῦλον
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: Se usa la forma normal del nombre propio en español bíblico.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - delante de él
  lexicon: BDAG
  rationale: Aunque el dativo puede leerse como 'a él', el contexto oficial del verbo παρέστησαν favorece 'ante él', que en español comunica mejor la idea de comparecencia sin perder el referente al gobernador.
translation_notes:
  revision_awareness: 'El texto griego presenta una secuencia narrativa simple: un participio aoristo de entrada, otro de entrega de la carta, y el verbo principal de presentación. La traducción española mantiene esa progresión y la relación aditiva entre la carta y Pablo, conforme al auditorío inglés que entiende παρέστησαν como un acto formal de comparecencia.'
  spanish_consistency_notes:
  - Se mantiene 'gobernador' para ἡγεμών, en línea con el criterio POB auditado, evitando términos más técnicos en el texto principal.
  - Se conserva 'Cesarea' como topónimo estándar, sin expandir a 'Cesarea Marítima' en el cuerpo del versículo.
  - Se traduce el segundo καί con 'también' para reflejar la adición explícita del griego.
  - La construcción 'presentaron a Pablo ante él' preserva el valor formal de παρέστησαν y deja abierta la alternativa de comparecencia jurídica en la nota.
