review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo, la identidad de «el Señor», la correspondencia entre el testimonio en Jerusalén y el futuro en Roma, y la fuerza de necesidad en δεῖ. Sin embargo, falla en un punto importante de alineación con el griego y con el rastro de auditoría inglés: ἐπιστὰς αὐτῷ significa «estando junto a él / poniéndose a su lado / stood by him», no «se le apareció». Además, la nota [a] no corresponde a la nota inglesa, que ofrece alternativa para Θάρσει, no para «la noche siguiente».'
  spanish_quality_summary: El español es mayormente claro y digno. «Ten ánimo» y «dar testimonio» son naturales y eclesialmente legibles. No obstante, «se le apareció» introduce una formulación más interpretativa que el original y pierde el matiz de presencia cercana y fortalecedora. «Se puso junto a él» o «estando junto a él» suenan naturales en este contexto. También conviene reubicar las notas para que anclen donde realmente corresponde el matiz léxico.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «el Señor», «Jerusalén», «Roma» y el campo léxico de «testimonio» están bien encaminados. La principal desviación no es terminológica sino semántica: ἐπιστὰς αὐτῷ debe conservar la idea de proximidad, no de mera aparición.'
  issues:
  - severity: high
    issue: «se le apareció» para ἐπιστὰς αὐτῷ
    rationale: El participio de ἐφίστημι aquí expresa ponerse junto a alguien / estar a su lado. El inglés POB documenta explícitamente «stood by him» frente a la alternativa más interpretativa «appeared to him». La versión española actual cambia el sentido narrativo y el matiz pastoral de cercanía.
  - severity: medium
    issue: La nota [a] está anclada en «la noche siguiente» pero su contenido corresponde a Θάρσει
    rationale: El rastro inglés pone la nota alternativa en «Take courage». En español, «O “Ten valor”» debe anclarse en «Ten ánimo», no en la frase temporal.
  - severity: low
    issue: La nota [b] usa «has testificado» como alternativa
    rationale: No es incorrecto, pero en español general «dar testimonio» / «testificar» funciona mejor que «has testificado» como alternativa aislada. Aun así, puede mantenerse si se desea destacar la conexión léxica; se recomienda una formulación más natural.
  revised_spanish_text: 'Pero en la noche siguiente, el Señor se puso junto a él y dijo: «Ten ánimo[a], pues así como has dado testimonio acerca de mí en Jerusalén[b], así también te es necesario dar testimonio en Roma».'
  revised_footnotes:
  - marker: a
    text: O «Ten valor».
    reason: lexical_alternative
  - marker: b
    text: O «has testificado»; ambos verbos del pasado y del futuro pertenecen al mismo grupo léxico de testimonio en griego.
    reason: lexical_alternative
  revision_rationale: Se corrige ἐπιστὰς αὐτῷ a «se puso junto a él» para preservar el sentido de presencia cercana del Señor, en conformidad con el griego y la decisión auditada del POB inglés. También se mueve la nota [a] a «Ten ánimo», donde realmente corresponde la alternativa léxica de Θάρσει. El resto del versículo puede conservarse, ya que comunica bien la secuencia, el paralelismo del testimonio y la necesidad expresada por δεῖ.
