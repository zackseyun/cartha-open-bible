translation:
  language: es
  text: 'Pero en la noche siguiente, el Señor se puso junto a él y dijo: «Ten ánimo[a], pues así como has dado testimonio acerca de mí en Jerusalén[b], así también te es necesario dar testimonio en Roma».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ten valor».
    reason: lexical_alternative
  - marker: b
    text: O «has testificado»; ambos verbos del pasado y del futuro pertenecen al mismo grupo léxico de testimonio en griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπιούσῃ νυκτί
  english_pob_choice: But on the following night
  chosen_spanish: Pero en la noche siguiente
  alternatives_spanish:
  - Y en la noche siguiente
  - Ahora bien, en la noche siguiente
  lexicon: BDAG
  rationale: ἐπιούσῃ con νυκτί indica la noche siguiente o la siguiente noche; en español, «en la noche siguiente» conserva la secuencia narrativa con naturalidad. El δέ introduce avance narrativo leve, bien reflejado por «Pero».
- source_word: ἐπιστὰς αὐτῷ
  english_pob_choice: stood by him
  chosen_spanish: se le apareció
  alternatives_spanish:
  - estando junto a él
  - se puso junto a él
  lexicon: BDAG
  rationale: El griego expresa la llegada/presencia súbita del Señor junto a Pablo. En español, «se le apareció» comunica esa presencia personal de manera idiomática y reverente, sin perder el sentido de intervención directa; la alternativa más literal «se puso junto a él» resulta menos natural en este contexto narrativo.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesús
  - el Dueño
  lexicon: BDAG
  rationale: La forma articular κύριος se vierte de modo natural como «el Señor». El contexto de Hechos y la frase «acerca de mí» permiten entender la referencia cristológica sin añadir «Jesús» al texto principal.
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Toma valor
  - Ten valor
  lexicon: BDAG
  rationale: El imperativo exhorta a la fortaleza interior. «Ten ánimo» es un equivalente español claro y bíblicamente digno; conserva el tono de aliento sin sonar artificial. Se mantiene abierta la alternativa semántica de «Take heart» que el inglés POB anotó.
- source_word: διεμαρτύρω
  english_pob_choice: you have testified
  chosen_spanish: has dado testimonio
  alternatives_spanish:
  - has testificado
  - has dado solemne testimonio
  lexicon: BDAG
  rationale: El verbo de la familia μαρτυρ- se traduce con una forma que preserve la conexión léxica con μαρτυρῆσαι más adelante. «Has dado testimonio» es natural en español y retiene el valor de testificación; «has testificado» sería posible, pero suena algo más técnico.
- source_word: τὰ περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - las cosas acerca de mí
  lexicon: BDAG
  rationale: La expresión refiere al contenido del testimonio de Pablo respecto de Jesús. «Acerca de mí» conserva la relación de referencia personal sin volverla pesada con «las cosas».
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - para Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele significar «hacia/para», con ciudades puede funcionar idiomáticamente como ubicación. En español, «en Jerusalén» expresa con naturalidad el lugar donde ya se dio el testimonio.
- source_word: οὕτω
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: BDAG
  rationale: οὕτω marca correspondencia entre el testimonio pasado y el futuro. «Así» conserva la simetría con claridad y economía.
- source_word: σε δεῖ
  english_pob_choice: you must
  chosen_spanish: te es necesario
  alternatives_spanish:
  - debes
  - es necesario que tú
  lexicon: BDAG
  rationale: δεῖ expresa necesidad, a menudo de origen divino, pero sin convertirla en una formulación fatalista. «Te es necesario» mantiene el peso de obligación/necesidad con un registro más cercano al griego y a la tradición bíblica.
- source_word: καὶ εἰς Ῥώμην
  english_pob_choice: also in Rome
  chosen_spanish: también en Roma
  alternatives_spanish:
  - y en Roma también
  - incluso en Roma
  lexicon: BDAG
  rationale: καί suma Roma como esfera adicional de testimonio. «También en Roma» es la solución más natural en español y conserva el valor aditivo.
- source_word: μαρτυρῆσαι
  english_pob_choice: testify
  chosen_spanish: dar testimonio
  alternatives_spanish:
  - testificar
  - ser testigo
  lexicon: BDAG
  rationale: Para mantener la conexión léxica con διεμαρτύρω, se usa el mismo campo semántico de testimonio. «Dar testimonio» es idiomático en español y refleja bien la acción futura encomendada.
theological_decisions:
- issue: Identidad de ὁ κύριος en el relato
  english_pob_reading: Rendered as 'the Lord,' understood in context as the risen Jesus speaking of 'me' and commissioning Paul.
  chosen_spanish_reading: Se traduce «el Señor» y se entiende en contexto como el Jesús resucitado que habla de «mí» y encomienda a Pablo.
  alternative_spanish_readings:
  - «el Señor Jesús» en el texto principal
  - mantener una referencia más abierta sin comentario
  rationale: El texto griego dice simplemente «el Señor», y la traducción debe respetar ese nivel de explicitud. El contexto de Hechos y el pronombre de primera persona apoyan la identificación cristológica, pero sin añadir una glosa innecesaria al versículo.
  doctrine_reference: Afirmaciones cristológicas de Hechos; política de no sobrerinterpretar κύριος
- issue: Fuerza de δεῖ
  english_pob_reading: Expressed as necessity ('you must') without specifying the mechanism beyond what the text states.
  chosen_spanish_reading: 'Se expresa como necesidad: «te es necesario», sin especificar más el mecanismo.'
  alternative_spanish_readings:
  - «debes»
  - «estás destinado a»
  rationale: Hechos usa δεῖ para una necesidad que suele ser divina, pero la traducción no debe convertirla en fatalismo ni en una formulación doctrinal más fuerte de lo que el griego exige. «Te es necesario» preserva la tensión y el matiz de obligación.
  doctrine_reference: Filosofía de traducción del POB; uso de δεῖ en Hechos
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés mantiene una equivalencia óptima y conserva la conexión léxica μεταξύ διεμαρτύρω y μαρτυρῆσαι; la versión española sigue esa misma decisión con «dar testimonio» en ambos miembros, y no se documentaron revisiones posteriores aplicadas.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος, coherente con el estándar POB, sin añadir «Jesús» al texto principal.
  - Se conserva la pareja léxica de testimonio con «dar testimonio» para reflejar la relación entre διεμαρτύρω y μαρτυρῆσαι.
  - «Roma» y «Jerusalén» se mantienen como nombres propios sin artículos, conforme al uso español normal.
  - La puntuación dialogal y las comillas españolas se adaptan a norma tipográfica en español.
  - No se introducen términos eclesiásticos tradicionales no sustentados por el griego, como «Señor» sigue siendo la opción estándar y no un sustituto eufemístico.
