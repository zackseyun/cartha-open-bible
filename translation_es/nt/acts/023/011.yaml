revisions:
- from: 'Pero en la noche siguiente[a], el Señor se le apareció y dijo: «Ten ánimo, pues así como has dado testimonio acerca de mí en Jerusalén[b], así también te es necesario dar testimonio en Roma».'
  to: 'Pero en la noche siguiente, el Señor se puso junto a él y dijo: «Ten ánimo[a], pues así como has dado testimonio acerca de mí en Jerusalén[b], así también te es necesario dar testimonio en Roma».'
  rationale: Se corrige ἐπιστὰς αὐτῷ a «se puso junto a él» para preservar el sentido de presencia cercana del Señor, en conformidad con el griego y la decisión auditada del POB inglés. También se mueve la nota [a] a «Ten ánimo», donde realmente corresponde la alternativa léxica de Θάρσει. El resto del versículo puede conservarse, ya que comunica bien la secuencia, el paralelismo del testimonio y la necesidad expresada por δεῖ.
  reviewer_model: gpt-5.4
