translation:
  language: es
  text: Cuando llegó el día, los judíos[a] formaron una conspiración y se pusieron bajo maldición[b], diciendo que no comerían ni beberían hasta matar a Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los judíos»; aquí se refiere a un grupo particular de judíos implicados en el complot, no al pueblo judío en su conjunto.'
    reason: cultural_note
  - marker: b
    text: 'O: «se ligaron bajo maldición». La expresión alude a un juramento autoimprecatorio, con juicio invocado sobre sí mismos si fallaban.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένης δὲ ἡμέρας
  english_pob_choice: When day came
  chosen_spanish: Cuando llegó el día
  alternatives_spanish:
  - Cuando amaneció
  - Cuando fue de día
  - Al llegar el día
  lexicon: SBLGNT; BDAG
  rationale: La construcción de genitivo absoluto indica transición temporal. «Cuando llegó el día» conserva esa transición en un español natural y digno, sin forzar un calco.
- source_word: ποιήσαντες συστροφὴν
  english_pob_choice: formed a conspiracy
  chosen_spanish: formaron una conspiración
  alternatives_spanish:
  - trazaron un complot
  - hicieron una conjura
  - se confabularon
  lexicon: BDAG
  rationale: El sentido apunta a coordinación deliberada y secreta para matar a Pablo. «Conspiración» comunica mejor esa intención que «multitud» o una mera reunión.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - algunos judíos
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: El griego dice literalmente «los judíos». Se conserva esa referencia en el texto principal y no se restringe indebidamente a líderes. La precisión de que se trata de un grupo particular queda en nota.
- source_word: ἀνεθεμάτισαν ἑαυτοὺς
  english_pob_choice: bound themselves under a curse
  chosen_spanish: se ligaron bajo maldición
  alternatives_spanish:
  - se pusieron bajo maldición
  - se maldijeron a sí mismos
  - se comprometieron con una maldición
  lexicon: BDAG
  rationale: La expresión tiene fuerza de juramento autoimprecatorio. «Se ligaron bajo maldición» intenta conservar tanto la idea de obligarse como la de invocar juicio sobre sí mismos. Se evita suavizarla a un simple compromiso.
- source_word: λέγοντες μήτε φαγεῖν μήτε πιεῖν
  english_pob_choice: saying that they would neither eat nor drink
  chosen_spanish: diciendo que no comerían ni beberían
  alternatives_spanish:
  - 'diciendo: «No comer ni beber»'
  - declarando que no comerían ni beberían
  - diciendo que no habrían de comer ni beber
  lexicon: BDAG
  rationale: La infinitiva de contenido se vierte de forma idiomática en español como discurso indirecto futuro en pasado. Se conserva el paralelismo negativo «ni... ni...».
- source_word: ἕως οὗ ἀποκτείνωσιν τὸν Παῦλον
  english_pob_choice: until they had killed Paul
  chosen_spanish: hasta haber matado a Pablo
  alternatives_spanish:
  - hasta que mataran a Pablo
  - hasta que hubieran matado a Pablo
  - hasta matar a Pablo
  lexicon: BDAG
  rationale: La cláusula marca el término del juramento. «Hasta haber matado a Pablo» mantiene la anterioridad respecto del fin del ayuno y evita una paráfrasis excesiva; también conserva el resultado buscado por el juramento.
theological_decisions:
- issue: Alcance de «los judíos» frente a una generalización étnica
  english_pob_reading: the Jews, with a footnote clarifying that this refers to a particular group among the Jews involved in the plot, not to the Jewish people as a whole
  chosen_spanish_reading: los judíos, con nota que aclara que se trata de un grupo particular implicado en el complot, no del pueblo judío en general
  alternative_spanish_readings:
  - algunos judíos
  - los líderes judíos
  rationale: Se mantiene la lectura literal del texto griego, pero se evita una lectura antijudía o totalizante mediante nota explicativa, como en el audit trail inglés.
  doctrine_reference: Hechos 23:12; nota cultural sobre referencia grupal
- issue: Naturaleza del juramento autoimprecatorio
  english_pob_reading: bound themselves under a curse; or 'put themselves under a curse.' The expression refers to a self-imposed oath invoking judgment on themselves if they failed
  chosen_spanish_reading: se ligaron bajo maldición; la nota explica que se trata de un juramento autoimprecatorio
  alternative_spanish_readings:
  - se pusieron bajo maldición
  - se maldijeron a sí mismos
  - se comprometieron con una maldición
  rationale: La frase debe reflejar que no es solo una promesa, sino una autoimprecación ritualizada. «Maldición» conserva la dimensión de juicio invocado sobre sí mismos si no cumplen.
  doctrine_reference: Hechos 23:12; sentido léxico de ἀναθεματίζω
translation_notes:
  revision_awareness: 'Sin cambios sustantivos respecto del último pase en inglés: el contexto y la puntuación narrativa se mantienen, y la versión española sigue la misma lectura óptima-equivalente sin introducir variantes textuales nuevas.'
  spanish_consistency_notes:
  - Se preserva «Pablo» como nombre propio estándar.
  - Se mantiene el contraste temporal simple y fluido («Cuando llegó el día»).
  - «Conspiración» y «maldición» se usan de forma coherente con el acto secreto y autoimprecatorio del pasaje.
  - La nota sobre «los judíos» evita generalizar más allá del grupo concreto del relato.
