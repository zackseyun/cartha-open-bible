  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. Se mantiene correctamente «los judíos» en el texto principal con nota contextual, en línea con el audit trail. La decisión sobre ἀνεθεμάτισαν ἑαυτοὺς debe seguir el razonamiento documentado: no suavizar a simple promesa, sino expresar un juramento autoimprecatorio; en español esto se logra mejor con «se pusieron bajo maldición» que con «se ligaron bajo maldición».'
