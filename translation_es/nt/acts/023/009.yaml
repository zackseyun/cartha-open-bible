source:
  edition: SBLGNT
  text: ἐγένετο δὲ κραυγὴ μεγάλη, καὶ ἀναστάντες ⸂τινὲς τῶν γραμματέων⸃ τοῦ μέρους τῶν Φαρισαίων διεμάχοντο λέγοντες· Οὐδὲν κακὸν εὑρίσκομεν ἐν τῷ ἀνθρώπῳ τούτῳ· εἰ δὲ πνεῦμα ἐλάλησεν αὐτῷ ἢ ⸀ἄγγελος—
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/009.yaml
  text: Then a great outcry arose[a], and some of the scribes of the party of the Pharisees stood up and contended, saying, “We find nothing wrong in this man[b]. But if a spirit or an angel has spoken to him—”
  footnotes:
  - marker: a
    text: 'Greek: ''But if a spirit spoke to him, or an angel—'' The sentence breaks off abruptly in the Greek text.'
    reason: textual_variant
  - marker: b
    text: Or 'a spirit' could be understood more generally as a spiritual being; some readers take it as 'the Spirit,' but the contrast with 'angel' favors the more general sense here.
    reason: alternative_reading
