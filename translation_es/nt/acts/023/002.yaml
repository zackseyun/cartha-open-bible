translation:
  language: es
  text: Pero el sumo sacerdote Ananías ordenó a los que estaban junto a él que lo golpearan en la boca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abofetearlo en la boca». El verbo griego puede significar golpear en general; «abofetear» es una posibilidad más específica, pero menos amplia que el original.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Se conserva el matiz adversativo/continuativo breve del contexto narrativo. «Pero» reproduce bien el giro abrupto de la reacción de Ananías sin volver el español artificial.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - jefe de los sacerdotes
  lexicon: BDAG
  rationale: Es el equivalente español establecido y claro para el oficio singular ἀρχιερεύς. «Sumo sacerdote» mantiene la precisión funcional sin introducir terminología eclesiástica ajena al pasaje.
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Ananías
  lexicon: Convención transliterativa
  rationale: Nombre propio transliterado de forma estándar al español bíblico.
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: BDAG
  rationale: «Ordenó» expresa la autoridad del mandato de manera natural en español y conserva el peso de una instrucción oficial.
- source_word: τοῖς παρεστῶσιν αὐτῷ
  english_pob_choice: those standing by him
  chosen_spanish: a los que estaban junto a él
  alternatives_spanish:
  - a los que estaban a su lado
  - a los que le asistían
  lexicon: BDAG
  rationale: La forma participial indica personas presentes junto a él; «estaban junto a él» preserva la cercanía espacial sin forzar una relación de servicio que el griego no exige aquí.
- source_word: τύπτειν
  english_pob_choice: to strike
  chosen_spanish: golpearan
  alternatives_spanish:
  - lo golpearan
  - lo abofetearan
  - lo hirieran
  lexicon: BDAG
  rationale: τύπτω admite un golpe general. En español, el infinitivo con valor de mandato se vierte con subjuntivo («que lo golpearan»). Se evita «abofetear» porque especifica más de lo que el verbo griego exige.
- source_word: αὐτοῦ τὸ στόμα
  english_pob_choice: him on the mouth
  chosen_spanish: en la boca
  alternatives_spanish:
  - en su boca
  - en el rostro
  lexicon: BDAG
  rationale: El griego dice literalmente «su boca». En español, con el verbo «golpear» resulta natural y claro decir «en la boca», preservando el punto de impacto sin calcar una construcción menos idiomática.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no registran revisiones aplicadas. La traducción española sigue esa línea estable, manteniendo la fuerza narrativa y la amplitud semántica de τύπτειν sin añadir especificaciones interpretativas innecesarias.
  spanish_consistency_notes:
  - Se prefirió «sumo sacerdote» como término bíblico estándar y transparente en español.
  - Se mantuvo un registro sobrio y narrativo, acorde con un relato histórico breve.
  - La nota al pie conserva la alternativa semántica relevante donde el griego permite tanto «golpear» como una acción más específica.
