review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: cláusula circunstancial inicial, noticia de una ἐπιβουλή contra Pablo, envío inmediato a Félix, y orden a los acusadores de presentar el caso ante la autoridad. Sin embargo, «había de haber» suena forzado en español moderno y no mejora la fidelidad frente a una opción más natural como «iba a haber». Además, la nota actual en [a] se desvía del rastro inglés, que preserva la alternativa judicial de λέγειν πρὸς αὐτὸν, no una alternativa para ἐπιβουλή.'
  spanish_quality_summary: 'El texto es claro y digno, pero tiene dos puntos mejorables: 1) «había de haber» resulta poco natural y algo rígido; 2) la nota al pie está anclada en «conspiración», cuando la nota auditada corresponde mejor a «expusieran su caso», donde el griego literalmente dice «hablar a/contra él» en contexto forense. «Contra el hombre» es fiel, aunque algo tieso; puede mantenerse por su tono epistolar formal.'
  glossary_alignment: No hay términos de glosario mayor en disputa. El borrador mantiene buen registro jurídico. La principal corrección es alinear la nota léxica con la decisión documentada para λέγειν πρὸς αὐτὸν, conservando la alternativa más literal en español.
  issues:
  - severity: medium
    issue: «había de haber» suena antinatural para ἔσεσθαι
    rationale: Aunque intenta reflejar el futuro, en español actual «iba a haber» o «habría» comunican mejor la inminencia sin rigidez innecesaria.
  - severity: high
    issue: La nota al pie está aplicada al término equivocado
    rationale: El rastro inglés conserva una nota para λέγειν πρὸς αὐτὸν (‘to speak to/against him’), no para ἐπιβουλή. La nota española actual sobre «conspiración/complot» no preserva esa decisión auditada.
  - severity: low
    issue: La nota actual menciona «complot», pero esa alternativa no es necesaria si no se documenta en el mismo lugar del rastro inglés
    rationale: No es incorrecta léxicamente, pero desplaza una nota más importante y mejor sustentada por la evidencia auditada.
  revised_spanish_text: Y cuando se me informó que iba a haber una conspiración contra el hombre, te lo envié de inmediato, ordenando también a sus acusadores que expusieran su caso[a] ante ti.
  revised_footnotes:
  - marker: a
    text: O «que presentaran sus cargos contra él ante ti». El griego literalmente dice «hablar a/contra él ante ti», usando lenguaje judicial.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la fidelidad general del borrador, pero se hace un ajuste menor de naturalidad en ἔσεσθαι («iba a haber») y se corrige la nota al pie para que siga el rastro auditado del inglés: la alternativa significativa está en λέγειν πρὸς αὐτὸν, no en ἐπιβουλή. No se requiere adjudicación adicional.'
