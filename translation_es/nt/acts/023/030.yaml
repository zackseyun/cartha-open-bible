revisions:
- from: Y cuando se me informó que había de haber una conspiración[a] contra el hombre, te lo envié de inmediato, ordenando también a sus acusadores que expusieran su caso ante ti.
  to: Y cuando se me informó que iba a haber una conspiración contra el hombre, te lo envié de inmediato, ordenando también a sus acusadores que expusieran su caso[a] ante ti.
  rationale: 'Se conserva la fidelidad general del borrador, pero se hace un ajuste menor de naturalidad en ἔσεσθαι («iba a haber») y se corrige la nota al pie para que siga el rastro auditado del inglés: la alternativa significativa está en λέγειν πρὸς αὐτὸν, no en ἐπιβουλή. No se requiere adjudicación adicional.'
