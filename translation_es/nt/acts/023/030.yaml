translation:
  language: es
  text: Y cuando se me informó que iba a haber una conspiración contra el hombre, te lo envié de inmediato, ordenando también a sus acusadores que expusieran su caso[a] ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que presentaran sus cargos contra él ante ti». El griego literalmente dice «hablar a/contra él ante ti», usando lenguaje judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηνυθείσης
  english_pob_choice: when I was informed
  chosen_spanish: cuando se me informó
  alternatives_spanish:
  - cuando me avisaron
  - después de ser informado
  lexicon: BDAG
  rationale: El participio aoristo pasivo en genitivo absoluto funciona mejor en español como una cláusula temporal-circunstancial. «Se me informó» conserva la pasiva y el tono oficial sin volver la frase pesada.
- source_word: ἐπιβουλῆς
  english_pob_choice: a plot
  chosen_spanish: una conspiración
  alternatives_spanish:
  - un complot
  - una trama
  lexicon: BDAG
  rationale: El sustantivo puede abarcar un plan hostil o una maquinación. «Conspiración» mantiene el sentido de hostilidad organizada y suena natural en un registro judicial. Se deja abierta la posibilidad de un matiz de «complot» en nota implícita por el contexto.
- source_word: εἰς τὸν ἄνδρα
  english_pob_choice: against the man
  chosen_spanish: contra el hombre
  alternatives_spanish:
  - contra este hombre
  - contra él
  lexicon: BDAG
  rationale: La preposición expresa dirección hostil. «El hombre» reproduce el artículo y mantiene el tono formal del escrito; evita anticipar el pronombre, que en español puede sonar menos documental.
- source_word: ἔσεσθαι
  english_pob_choice: there would be
  chosen_spanish: había de haber
  alternatives_spanish:
  - iba a haber
  - habría
  lexicon: BDAG
  rationale: El infinitivo futuro de εἰμί comunica existencia inminente. «Había de haber» refleja la expectativa de acontecimiento futuro sin sonar mecánico, y preserva el matiz de que el plan estaba por existir o presentarse.
- source_word: ἐξαυτῆς
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - sin demora
  lexicon: BDAG
  rationale: Adverbio de inmediatez. «De inmediato» es preciso, claro y suficientemente formal para una carta administrativa.
- source_word: ἔπεμψα πρὸς σέ
  english_pob_choice: I sent him to you
  chosen_spanish: te lo envié
  alternatives_spanish:
  - te lo remití
  - lo envié a ti
  lexicon: BDAG
  rationale: El objeto directo no está explícito en griego, pero el contexto lo fija en Pablo. En español, «te lo envié» evita una adición interpretativa excesiva como «a él» en una frase donde el referente ya es evidente por el contexto narrativo y el género epistolar.
- source_word: παραγγείλας
  english_pob_choice: also ordering
  chosen_spanish: ordenando también
  alternatives_spanish:
  - e instruyendo también
  - y ordené también
  lexicon: BDAG
  rationale: El participio aoristo indica acción concomitante con el envío. «Ordenando también» conserva la relación participial y el valor aditivo de καί.
- source_word: κατηγόροις
  english_pob_choice: his accusers
  chosen_spanish: a sus acusadores
  alternatives_spanish:
  - a los acusadores
  - a quienes lo acusaban
  lexicon: BDAG
  rationale: El contexto judicial determina el referente. «Sus acusadores» hace explícito que son los acusadores de Pablo, manteniendo el tono forense.
- source_word: λέγειν πρὸς αὐτὸν
  english_pob_choice: to state their case
  chosen_spanish: que expusieran su caso
  alternatives_spanish:
  - que hablaran contra él
  - que presentaran sus cargos
  lexicon: BDAG
  rationale: Literalmente, el griego dice «hablar a/contra él», con lenguaje de tribunal. «Exponer su caso» preserva la esfera judicial en español y evita una paráfrasis demasiado amplia; mantiene la tensión entre hablar y acusar.
- source_word: ἐπὶ σοῦ
  english_pob_choice: before you
  chosen_spanish: ante ti
  alternatives_spanish:
  - en tu presencia
  - delante de ti
  lexicon: BDAG
  rationale: 'La preposición con genitivo tiene matiz forense: comparecer ante la autoridad. «Ante ti» conserva la formalidad jurídica y la relación de audiencia judicial.'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y se armonizó con el audit trail inglés. El punto principal de decisión fue conservar el matiz judicial de λέγειν πρὸς αὐτόν ἐπὶ σοῦ sin perder naturalidad en español, manteniendo además la inmediatez de ἐξαυτῆς y la relación del genitivo absoluto como cláusula temporal.
  spanish_consistency_notes:
  - Se usó un registro formal y administrativo coherente con una carta oficial romana.
  - Se evitó traducir mecánicamente desde el inglés donde el español exigía reestructuración sintáctica, especialmente en el genitivo absoluto y el infinitivo futuro.
  - Se mantuvo la terminología forense con «ante ti» y «exponer su caso», sin convertirla en lenguaje eclesiástico o devocional.
