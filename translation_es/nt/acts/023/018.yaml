translation:
  language: es
  text: 'Entonces él lo tomó y lo llevó al comandante[b], y dijo: «El prisionero Pablo me mandó llamar y me pidió[a] que te trajera a este joven, porque tiene algo que decirte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me pidió que trajera a este joven a ti».
    reason: lexical_alternative
  - marker: b
    text: Griego χιλίαρχος, un oficial militar romano; tradicionalmente «tribuno».
    reason: cultural_note
lexical_decisions:
- source_word: παραλαβὼν
  english_pob_choice: took
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo recibió
  - lo tomó aparte
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa de acompañarlo; «lo tomó» es natural en español y conserva la secuencia narrativa sin añadir matices no presentes en el griego.
- source_word: ἤγαγεν
  english_pob_choice: brought
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo condujo
  - lo trajo
  lexicon: BDAG
  rationale: ἄγω aquí expresa movimiento hacia una persona de autoridad. «Lo llevó» comunica de forma clara y digna el traslado hasta el comandante.
- source_word: χιλίαρχον
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - tribuno
  - comandante militar
  lexicon: BDAG
  rationale: El término designa a un oficial militar romano. «Comandante» es claro para el lector moderno; «tribuno» es histórico pero menos transparente, y se evita el tecnicismo transliterado.
- source_word: φησίν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo normal se vierte al pasado para mantener fluidez y naturalidad.
- source_word: δέσμιος
  english_pob_choice: prisoner
  chosen_spanish: el preso
  alternatives_spanish:
  - el prisionero
  - el cautivo
  lexicon: BDAG
  rationale: El término indica a alguien bajo custodia. «Preso» es breve, claro y adecuado al contexto de encarcelamiento; mantiene el valor concreto del original.
- source_word: προσκαλεσάμενός με
  english_pob_choice: called me to him
  chosen_spanish: me llamó
  alternatives_spanish:
  - me mandó llamar
  - me hizo venir
  lexicon: BDAG
  rationale: El matiz central es que Pablo hizo venir al soldado. En español, «me llamó» resulta natural dentro del discurso indirecto; la dirección hacia Pablo queda implícita por el contexto inmediato, como en el original.
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: me pidió
  alternatives_spanish:
  - me preguntó
  - me solicitó
  lexicon: BDAG
  rationale: Aquí el verbo expresa una petición, no una pregunta informativa. «Me pidió» refleja mejor esa fuerza ilocutiva que «me preguntó».
- source_word: νεανίαν
  english_pob_choice: young man
  chosen_spanish: este joven
  alternatives_spanish:
  - este muchacho
  - este joven hombre
  lexicon: BDAG
  rationale: «Joven» reproduce bien νεανίας y suena natural en español; se mantiene el deíctico «este» para conservar la referencia del discurso.
- source_word: ἔχοντά τι λαλῆσαί σοι
  english_pob_choice: because he has something to say to you
  chosen_spanish: porque tiene algo que decirte
  alternatives_spanish:
  - pues tiene algo que hablarte
  - ya que tiene algo que decirte
  lexicon: BDAG
  rationale: La frase participial explica la petición. «Porque tiene algo que decirte» conserva la relación explicativa y traduce de manera idiomática el infinitivo de habla sin sobreinterpretarlo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión del POB inglés, que prefirió «because» frente a «since» para ἔχοντά τι λαλῆσαί σοι. En español se conserva esa relación causal con «porque», manteniendo el registro formal y la claridad narrativa. También se respeta la resolución del audit trail: ὁ δέσμιος Παῦλος se vierte de modo concreto como «el preso Pablo», y χιλίαρχος se explica con nota cultural para evitar la pérdida del referente romano.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no la requiere.
  - Se evita «SEÑOR» como sustituto encubridor, ya que aquí χιλίαρχος no es un título divino.
  - «Preso» conserva la fuerza de δέσμιος sin suavizarlo a «siervo» o «cautivo».
  - La puntuación y las comillas siguen el uso español moderno, con discurso directo claro y legible.
