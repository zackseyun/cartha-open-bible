base_translation:
  language: en
  yaml_path: translation/nt/acts/023/018.yaml
  text: So he took him and brought him to the commander and said[a], “The prisoner Paul called me to him and asked me to bring this young man to you[b], because he has something to say to you.”
  footnotes:
