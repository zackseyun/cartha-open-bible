translation:
  language: es
  text: 'Los que estaban allí cerca dijeron[a]: «¿Estás insultando al sumo sacerdote de Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Estás ultrajando al sumo sacerdote de Dios?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ παρεστῶτες
  english_pob_choice: Those standing nearby
  chosen_spanish: Los que estaban presentes
  alternatives_spanish:
  - Los que estaban allí
  - Los que estaban de pie junto a él
  - Los presentes
  lexicon: BDAG
  rationale: El participio sustantivado funciona como un grupo de personas presentes en la escena. En español, «los que estaban presentes» conserva el sentido referencial sin sonar forzado; «presentes» es una opción más breve, pero la forma completa evita ambigüedad y mantiene la idea de circunstantes.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte naturalmente con pretérito simple en español. «Dijeron» mantiene el avance puntual de la narración.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - jefe de los sacerdotes
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente bíblico normal en español y comunica con precisión el cargo judío. «Pontífice» es menos directo para lectores generales, y «jefe de los sacerdotes» sería demasiado explicativo.
- source_word: τοῦ θεοῦ
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: 'El genitivo se conserva como relación de pertenencia o asociación: «el sumo sacerdote de Dios». Esta forma mantiene la referencia al oficio sin sugerir aprobación moral adicional.'
- source_word: λοιδορεῖς
  english_pob_choice: are you insulting
  chosen_spanish: insultando
  alternatives_spanish:
  - ultrajando
  - vituperando
  - hablando mal de
  lexicon: BDAG
  rationale: λοιδορέω denota lenguaje injurioso o de reproche verbal. «Insultando» es claro y actual en español. «Ultrajando» o «vituperando» son posibles, pero menos transparentes para lectura pública.
theological_decisions:
- issue: Fuerza de τοῦ θεοῦ aplicado al sumo sacerdote
  english_pob_reading: ‘God’s high priest’ without implying divine approval of the individual’s conduct beyond the office named in the text.
  chosen_spanish_reading: «el sumo sacerdote de Dios» identifica el cargo en relación con Dios, sin añadir una aprobación moral o espiritual del individuo.
  alternative_spanish_readings:
  - «el sumo sacerdote de Dios» como posesión directa
  - «el sumo sacerdote de parte de Dios»
  rationale: La frase griega señala la relación del oficio con Dios. En español, la traducción debe preservar esa relación sin convertirla en una declaración sobre la conducta del hombre ni en una explicación interpretativa que el texto no da.
  doctrine_reference: Principio de primacía del texto original; evitar añadir afirmaciones doctrinales no explícitas en el verso.
translation_notes:
  revision_awareness: 'Coincide con el pase de revisión más reciente: no se requieren cambios respecto al sentido auditado en el contexto inglés. Se mantiene la equivalencia funcional para φυσικό español bíblico, con la relación genitiva de ‘Dios’ explícita y sin sobreinterpretación.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al criterio general del proyecto.
  - Se usa «sumo sacerdote» para ἀρχιερεύς, que es la forma bíblica estable en español.
  - Se evita «SEÑOR» o paráfrasis doctrinales ajenas al griego.
  - La nota alternativa refleja la misma tensión léxica que el audio textual inglés entre ‘insultar’ y ‘ultrajar’.
