translation:
  language: es
  text: 'Entonces Pablo le dijo: «Dios está a punto de golpearte[a], ¡pared blanqueada! ¿Y tú te sientas a juzgarme conforme a la ley, y mandas que me golpeen, violando la ley?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios te va a golpear». El griego dice literalmente: «Dios está a punto de golpearte», lo cual puede enfatizar la inminencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε ὁ Παῦλος πρὸς αὐτὸν εἶπεν
  english_pob_choice: Then Paul said to him
  chosen_spanish: Entonces Pablo le dijo
  alternatives_spanish:
  - Entonces Pablo le respondió
  - Entonces Pablo le dijo en respuesta
  lexicon: SBLGNT / contextual narrative flow
  rationale: La introducción narrativa se vierte de forma directa y natural en español sin añadir énfasis no presente en el griego.
- source_word: Τύπτειν σε μέλλει ὁ θεός
  english_pob_choice: God is about to strike you
  chosen_spanish: Dios está a punto de golpearte
  alternatives_spanish:
  - Dios te va a golpear
  - Dios te golpeará
  lexicon: BDAG / μέλλω + infinitivo
  rationale: Se conserva la inminencia de μέλλει con una construcción española natural. 'Golpear' mantiene la fuerza de τύπτω mejor que una fórmula más suave.
- source_word: τοῖχε κεκονιαμένε
  english_pob_choice: you whitewashed wall
  chosen_spanish: pared blanqueada
  alternatives_spanish:
  - muro blanqueado
  - pared encalada
  lexicon: BDAG / insulto metafórico
  rationale: Se mantiene la metáfora insultante de una superficie exteriormente limpia pero engañosa. En español, 'pared blanqueada' conserva la imagen sin sonar tan idiomáticamente inglesa como 'whitewashed wall'.
- source_word: κάθῃ
  english_pob_choice: do you sit
  chosen_spanish: te sientas
  alternatives_spanish:
  - estás sentado
  - te sientas allí
  lexicon: BDAG
  rationale: El presente conserva la vividez retórica del reclamo de Pablo sin convertirlo en una descripción estática.
- source_word: κρίνων με κατὰ τὸν νόμον
  english_pob_choice: judging me according to the law
  chosen_spanish: a juzgarme conforme a la ley
  alternatives_spanish:
  - juzgándome conforme a la ley
  - juzgándome según la ley
  lexicon: BDAG
  rationale: '''Conforme a la ley'' expresa bien el estándar legal del texto. El infinitivo español después de ''te sientas'' hace la pregunta retórica más fluida.'
- source_word: παρανομῶν
  english_pob_choice: in violation of the law
  chosen_spanish: violando la ley
  alternatives_spanish:
  - actuando contra la ley
  - en violación de la ley
  lexicon: BDAG
  rationale: Se conserva el contraste con 'conforme a la ley' y el tono acusatorio del participio presente.
- source_word: κελεύεις με τύπτεσθαι
  english_pob_choice: command me to be struck
  chosen_spanish: mandas que me golpeen
  alternatives_spanish:
  - ordenas que me golpeen
  - mandas que me azoten
  lexicon: BDAG
  rationale: '''Mandas'' reproduce κελεύεις con un verbo claro y natural. Se opta por una pasiva perifrástica española que expresa bien el infinitivo pasivo griego.'
theological_decisions:
- issue: La amenaza de juicio divino en 'Dios está a punto de golpearte'
  english_pob_reading: Rendered as a prophetic/judicial declaration without softening or expanding it
  chosen_spanish_reading: Se mantiene como declaración profética/judicial, sin suavizarla ni convertirla en deseo.
  alternative_spanish_readings:
  - Que Dios te golpee
  - Dios te golpeará
  rationale: La construcción con μέλλει + infinitivo comunica inminencia. En español conviene preservar esa fuerza sin introducir una forma optativa que el griego no exige. Se deja intacta la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la presente redacción sigue de cerca el acuerdo alto del revisor y conserva las decisiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός de manera consistente con el estándar del proyecto.
  - Se traduce τύπτω como 'golpear' por su fuerza verbal concreta en este contexto.
  - Se conserva el contraste jurídico entre 'conforme a la ley' y 'violando la ley'.
  - Se mantiene el tono de reproche insultante de 'pared blanqueada' sin neutralizarlo.
  - La puntuación respeta el discurso directo en español con comillas angulares y la nota al pie anclada en la frase de inminencia.
