lexical_decisions:
- source_word: κτήνη
  english_pob_choice: mounts
  chosen_spanish: monturas
  alternatives_spanish:
  - animales
  - bestias de carga
  - cabalgaduras
  lexicon: BDAG
  rationale: κτῆνος designa un animal de carga o de monta sin especificar especie. «Monturas» conserva la función práctica y evita precisar indebidamente qué clase de animal era.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - asimismo
  lexicon: BDAG
  rationale: Aquí enlaza la orden con la instrucción previa. En español, «y» reproduce con naturalidad ese valor conectivo.
- source_word: παραστῆσαι
  english_pob_choice: provide
  chosen_spanish: disponer
  alternatives_spanish:
  - proveer
  - preparar
  - poner a disposición
  lexicon: BDAG
  rationale: El infinitivo expresa la acción de tener listos los animales. «Disponer» comunica bien la idea de hacerlos disponibles o preparados sin sobretraducir.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma natural en español para esa relación de propósito.
- source_word: ἐπιβιβάσαντες
  english_pob_choice: after putting ... on them
  chosen_spanish: después de poner ... sobre ellas
  alternatives_spanish:
  - habiendo subido ...
  - montando a ...
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa de hacer subir a Pablo. «Después de poner a Pablo sobre ellas» conserva la secuencia y resulta claro en español.
- source_word: διασώσωσι
  english_pob_choice: they may bring him safely
  chosen_spanish: lo llevaran con seguridad
  alternatives_spanish:
  - lo condujeran con seguridad
  - lo llevaran a salvo
  - lo trasladaran con seguridad
  lexicon: BDAG
  rationale: διασῴζω enfatiza llegar sano y salvo a destino, no solo rescatar. «Llevar ... con seguridad» mantiene el matiz de transporte protegido en el contexto de escolta.
- source_word: πρὸς
  english_pob_choice: to
  chosen_spanish: ante
  alternatives_spanish:
  - a
  - hacia
  lexicon: BDAG
  rationale: Con una persona concreta y un oficial como destino, «ante» expresa mejor el movimiento hacia su presencia que un simple «a».
- source_word: ἡγεμόνα
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el gobernante
  lexicon: BDAG
  rationale: ἡγεμών se refiere a una autoridad gobernante romana. «Gobernador» es la equivalencia más clara y natural en este contexto.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido funcional del griego y del POB inglés: κτήνη como animales de monta/carga no especificados, παραστῆσαι como disponer/proveer, y el participio ἐπιβιβάσαντες integrado en una cláusula natural en español sin perder la secuencia de acción. Se evita una traducción mecánica que suene áspera, pero se mantiene la referencia concreta a Félix el gobernador.'
  spanish_consistency_notes:
  - Se eligió «monturas» en el texto principal para conservar la función de κτήνη sin especificar especie; la nota aclara la alternativa más literal «animales»/«bestias de carga».
  - «Lo llevaran con seguridad» intenta reproducir el valor de διασώσωσι en un contexto de escolta, más que un sentido técnico de «salvar».
  - «Ante Félix» enfatiza la llegada a su presencia; si se prefiere una lectura más simple, la nota ofrece la posibilidad de entenderlo como «a Félix».
  - Se conserva «el gobernador» como equivalencia administrativa estándar para ἡγεμών en este contexto romano.
