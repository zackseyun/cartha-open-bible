translation:
  language: es
  text: y disponer monturas[a], para que pongan a Pablo sobre ellas y lo lleven a salvo a Félix, el gobernador[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «animales» o «bestias de carga»; el griego no especifica qué tipo de montura se debía proveer.
    reason: lexical_alternative
  - marker: b
    text: O «para que, después de poner a Pablo sobre ellas, lo lleven a salvo».
