translation:
  language: es
  text: Pues los saduceos dicen que no hay resurrección[a], ni ángel ni espíritu; pero los fariseos afirman las dos cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los fariseos afirman las tres», es decir, resurrección, ángel y espíritu. El griego dice «las dos», lo que apunta más directamente a «ángel» y «espíritu»; sin embargo, algunos lo entienden de manera más amplia por el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: Σαδδουκαῖοι
  english_pob_choice: the Sadducees
  chosen_spanish: los saduceos
  alternatives_spanish:
  - saduceos
  lexicon: BDAG
  rationale: Se conserva el nombre de la secta por transliteración usual en español bíblico, con artículo definido por la referencia específica del contexto.
- source_word: μὲν γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  - En efecto
  lexicon: BDAG
  rationale: La combinación introduce explicación o fundamento del contraste; en español, 'Porque' comunica con naturalidad ese valor causal-explicativo sin forzar una traducción demasiado literal de las partículas.
- source_word: λέγουσιν
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - afirman
  - sostienen
  lexicon: BDAG
  rationale: '''Dicen'' reproduce el verbo de reporte de manera directa y neutral, adecuada para una afirmación general sobre su postura.'
- source_word: μὴ εἶναι ἀνάστασιν
  english_pob_choice: there is no resurrection
  chosen_spanish: que no hay resurrección
  alternatives_spanish:
  - que no existe resurrección
  - que no hay una resurrección
  lexicon: BDAG
  rationale: En español, la cláusula infinitiva después de 'decir' se expresa con una subordinada con 'que'. 'Resurrección' conserva el valor doctrinal del sustantivo griego sin añadir artículos innecesarios.
- source_word: ἀνάστασιν
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento de los muertos
  - levantarse de nuevo
  lexicon: BDAG
  rationale: Es el término estándar y fiel al ámbito escatológico-doctrinal del pasaje. Las alternativas son más perifrásticas y menos precisas.
- source_word: μήτε ἄγγελον μήτε πνεῦμα
  english_pob_choice: nor angel nor spirit
  chosen_spanish: ni ángel ni espíritu
  alternatives_spanish:
  - ni un ángel ni un espíritu
  - ni ángel ni un espíritu
  lexicon: BDAG
  rationale: Se mantiene la correlación negativa del griego con 'ni ... ni ...'. 'Espíritu' conserva el término abierto del original sin resolverlo prematuramente como 'Espíritu Santo'.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Se conserva la transliteración usual del grupo religioso con artículo definido por referencia específica.
- source_word: ὁμολογοῦσιν
  english_pob_choice: acknowledge
  chosen_spanish: afirman
  alternatives_spanish:
  - reconocen
  - confiesan
  lexicon: BDAG
  rationale: '''Afirman'' expresa que dan por verdadero lo que sigue, sin cargar en español la resonancia penitencial que puede tener ''confiesan''.'
- source_word: τὰ ἀμφότερα
  english_pob_choice: both
  chosen_spanish: ambas cosas
  alternatives_spanish:
  - las dos
  - ambos
  lexicon: BDAG
  rationale: '''Ambas cosas'' permite conservar la ambigüedad del griego tal como fue preservada en la POB inglesa: puede referirse primariamente a los dos elementos inmediatos (''ángel'' y ''espíritu''), sin impedir la lectura contextual más amplia.'
theological_decisions:
- issue: Alcance de τὰ ἀμφότερα en la afirmación de los fariseos
  english_pob_reading: The Pharisees acknowledge both angel and spirit, in contrast to the Sadducees' denial of those two items.
  chosen_spanish_reading: Los fariseos afirman ambas cosas, manteniendo abierta la posibilidad de que se refiera de modo inmediato a ángel y espíritu, sin cerrar la lectura contextual más amplia.
  alternative_spanish_readings:
  - 'Los fariseos afirman las dos cosas mencionadas inmediatamente: ángel y espíritu.'
  - 'Los fariseos afirman las tres realidades del contexto: resurrección, ángel y espíritu.'
  rationale: El griego dice 'las dos', no 'las tres'. La redacción española conserva esa tensión textual y evita resolverla en el cuerpo principal, como hace la POB inglesa, permitiendo al lector ver el alcance más probable sin excluir la interpretación ampliada del contexto.
  doctrine_reference: Preservar la tensión textual y contextual; no resolverla de forma dogmática en la línea principal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la decisión auditada de la POB inglesa, especialmente en la explicación causal inicial, la subordinación de la cláusula de negación y la preservación de la ambigüedad de τὰ ἀμφότερα. No se introdujeron cambios doctrinales respecto del pasaje ni se suavizó la negación doble del original.
  spanish_consistency_notes:
  - Se usó 'saduceos' y 'fariseos' como transliteraciones estándar y reconocibles en español bíblico.
  - Se mantuvo 'resurrección' como término doctrinal central sin paráfrasis.
  - '''Espíritu'' se dejó sin especificar para no resolver prematuramente si el referente es genérico o pneumatológico.'
  - La nota al pie conserva la alternativa importante del contexto, en línea con la POB inglesa.
