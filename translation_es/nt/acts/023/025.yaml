lexical_decisions:
- source_word: γράψας
  english_pob_choice: He wrote
  chosen_spanish: habiendo escrito
  alternatives_spanish:
  - escribió
  - después de escribir
  lexicon: γράφω
  rationale: El participio aoristo introduce la acción previa de redactar la carta. En español, 'habiendo escrito' conserva la anterioridad y el vínculo participial sin perder naturalidad narrativa; 'escribió' sería más fluido, pero borra la forma original, y 'después de escribir' explica de más.
- source_word: ἐπιστολήν
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una epístola
  lexicon: ἐπιστολή
  rationale: En este contexto narrativo, 'carta' comunica con claridad una comunicación escrita ordinaria. 'Epístola' es posible, pero en español suena más literario o eclesiástico y no refleja tan bien el registro del pasaje.
- source_word: ἔχουσαν
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - que llevaba
  - con
  lexicon: ἔχω
  rationale: El participio presente modifica a 'carta'. 'Que tenía' reproduce de manera natural la idea de posesión/tenencia en español y evita una construcción rígida; 'con' sería más idiomático pero menos cercano a la estructura griega.
- source_word: τύπον
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - modelo
  - tenor
  - contenido
  - redacción
  lexicon: τύπος
  rationale: Aquí τύπος se refiere al patrón o formato de la carta. 'Forma' es la equivalencia más directa y conserva la amplitud semántica sin limitarlo indebidamente a contenido o redacción.
- source_word: τοῦτον
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - la siguiente
  lexicon: οὗτος
  rationale: El demostrativo apunta a la carta que sigue. 'Esta' mantiene la referencia proximal y funciona bien en español; 'la siguiente' sería una expansión idiomática aceptable, pero no necesaria en el texto principal.
translation_notes:
  revision_awareness: El texto griego conserva la estructura participial y el deíctico ‘este’; la versión española mantiene esa relación sin convertir la frase en una paráfrasis más libre. La nota recoge la alternativa idiomática que el audit trail inglés también preserva.
  spanish_consistency_notes:
  - Se evitó 'epístola' por el tono narrativo del pasaje.
  - Se mantuvo 'forma' en correspondencia con la decisión inglesa y con el valor amplio de τύπος.
  - La nota al pie preserva la alternativa idiomática sin desplazar la lectura principal.
