review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente los elementos básicos del griego: γράψας + ἐπιστολήν + ἔχουσαν τὸν τύπον τοῦτον. Sin embargo, la combinación ''habiendo escrito una carta que tenía esta forma'' resulta menos fiel al flujo narrativo que la opción finita o una formulación más natural en español. El sentido prospectivo de τοῦτον hacia la carta que sigue también se expresa mejor con ''como sigue'' en la nota, no ''de esta manera''.'
  spanish_quality_summary: La frase actual es comprensible, pero suena algo forzada y poco natural en español bíblico contemporáneo. 'Habiendo escrito' y 'que tenía esta forma' juntos producen una construcción pesada. Una redacción como 'Escribió una carta[a] que tenía esta forma:' conserva bien el sentido y mejora la legibilidad. La nota también necesita ajuste idiomático.
  glossary_alignment: No hay términos del glosario teológicamente sensibles en este versículo. 'Carta' y 'forma' concuerdan bien con las decisiones del proyecto. La excepción necesaria es preferir 'Escribió' sobre 'habiendo escrito' por naturalidad narrativa, en línea con la auditoría inglesa.
  issues:
  - severity: medium
    issue: '''habiendo escrito'' suena demasiado literal y poco natural en la narración'
    rationale: Aunque γράψας es un participio aoristo, la auditoría inglesa ya documenta que en narrativa puede verterse con verbo finito para flujo natural. En español, 'habiendo escrito' aquí suena rígido y subordinado innecesariamente.
  - severity: medium
    issue: La nota dice 'de esta manera' en vez de una alternativa idiomática mejor
    rationale: El inglés auditado ofrece 'as follows'. En español, la equivalencia idiomática natural es 'como sigue', no 'de esta manera', que puede sonar menos precisa para introducir el texto de una carta.
  - severity: low
    issue: La capitalización inicial del texto no está normalizada
    rationale: Como inicio de oración narrativa, debe comenzar con mayúscula en español editorial estándar.
  revised_spanish_text: 'Escribió una carta[a] que tenía esta forma:'
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Escribió una carta como sigue».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el participio aoristo a un verbo finito ('Escribió') para mejor español narrativo, conforme a la justificación del POB en inglés. Se mantiene 'carta' y 'forma' por fidelidad léxica. La nota se corrige a 'como sigue', que expresa mejor el valor introductorio de τοῦτον en español idiomático.
