  to: 'Él dijo[a]: «Los judíos se han puesto de acuerdo para pedirte que mañana hagas bajar a Pablo al Sanedrín, como si fueran a indagar[b] con mayor precisión acerca de él».'
  rationale: 'Se corrige el error tipográfico grave en escritura no española y se ajusta la cláusula final para un español más natural sin perder el sentido del griego: μέλλον + infinitivo como intención próxima («fueran a»), πυνθάνεσθαι como «indagar/averiguar», y ἀκριβέστερον como investigación «con mayor precisión». Se conservan «Los judíos» y «Sanedrín» conforme al audit trail inglés y a las decisiones léxicas documentadas.'
