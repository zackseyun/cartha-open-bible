  - severity: medium
    issue: «algo más exactamente» suena poco natural en español
    rationale: Aunque intenta reflejar ἀκριβέστερον, en español eclesial y general resulta mejor «con mayor precisión» o «más cuidadosamente», especialmente junto con «averiguar/indagar».
  - severity: low
