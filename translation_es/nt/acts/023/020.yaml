translation:
  language: es
  text: 'Él dijo[a]: «Los judíos se han puesto de acuerdo para pedirte que mañana hagas bajar a Pablo al Sanedrín, como si fueran a indagar[b] con mayor precisión acerca de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo». El griego introduce de manera simple el discurso.
    reason: lexical_alternative
  - marker: b
    text: O «averiguar algo más exactamente acerca de él» o «indagar más cuidadosamente acerca de él». La cláusula griega expresa el pretexto de investigar el caso con mayor exactitud.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν δὲ ὅτι
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: BDAG
  rationale: Se conserva la simple introducción narrativa del discurso. En español, «Él dijo» evita añadir matices no presentes y encaja con el flujo del relato.
- source_word: Οἱ Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: Los judíos
  alternatives_spanish:
  - Los líderes judíos
  - Los judeanos
  lexicon: BDAG
  rationale: Se mantiene la referencia directa del griego sin estrecharla más de lo que el texto dice. El contexto narrativo aclara que se trata del grupo implicado en el plan contra Pablo.
- source_word: συνέθεντο
  english_pob_choice: have agreed
  chosen_spanish: se han puesto de acuerdo
  alternatives_spanish:
  - han acordado
  - han conspirado
  lexicon: BDAG
  rationale: «Se han puesto de acuerdo» reproduce el valor de convenio/plan conjunto sin cargar de entrada la palabra con una intensificación conspirativa que el verbo por sí solo no exige, aunque el contexto sí muestra mala intención.
- source_word: τοῦ ἐρωτῆσαί σε
  english_pob_choice: to ask you
  chosen_spanish: para pedirte
  alternatives_spanish:
  - para preguntarte
  - para solicitarte
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. En español, «pedirte» refleja bien la finalidad de la solicitud y suena natural; «preguntarte» podría sonar más amplio o ambiguo que el plan concreto del pasaje.
- source_word: καταγάγῃς
  english_pob_choice: bring ... down
  chosen_spanish: hagas bajar
  alternatives_spanish:
  - lleves abajo
  - traigas abajo
  lexicon: BDAG
  rationale: «Hagas bajar» conserva la dirección descendente del verbo κατάγω y funciona con naturalidad en español dentro de la construcción con subjuntivo final.
- source_word: εἰς τὸ συνέδριον
  english_pob_choice: to the Sanhedrin
  chosen_spanish: al Sanedrín
  alternatives_spanish:
  - al consejo
  - al concilio
  lexicon: BDAG
  rationale: En Hechos, συνέδριον designa aquí el consejo gobernante judío; «Sanedrín» comunica esa referencia institucional de manera específica y reconocible. Se evita «consejo» por su mayor vaguedad.
- source_word: ὡς
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera
  - con el pretexto de que
  lexicon: BDAG
  rationale: «Como si» expresa la apariencia fingida o pretextada que introduce la cláusula sin sobretraducir el griego.
- source_word: μέλλον τι ἀκριβέστερον πυνθάνεσθαι
  english_pob_choice: were going to inquire more accurately
  chosen_spanish: estuvieran por averiguar algo más exactamente
  alternatives_spanish:
  - iban a averiguar algo con más precisión
  - estuvieran por indagar con mayor exactitud
  lexicon: BDAG
  rationale: Se mantiene la idea de intención inminente de μέλλω + infinitivo y el sentido de πυνθάνομαι como averiguar/inquirir. «Algo más exactamente» conserva el valor de ἀκριβέστερον, aunque suena algo más literal que «con mayor precisión».
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - de él
  lexicon: BDAG
  rationale: Es una equivalencia directa y natural del complemento preposicional.
theological_decisions:
- issue: Referencia de «los judíos» en un contexto hostil
  english_pob_reading: Retain 'The Jews' as the direct translation of Οἱ Ἰουδαῖοι
  chosen_spanish_reading: Mantener «los judíos» como traducción directa
  alternative_spanish_readings:
  - «los líderes judíos»
  - «los judeanos»
  rationale: Se conserva la primacía del original sin restringir el referente más allá de lo explícito. El contexto narrativo evita una lectura universalizante; la frase señala al grupo concreto involucrado en el complot.
  doctrine_reference: Translation philosophy §1, §6
- issue: Uso de Sanedrín frente a consejo
  english_pob_reading: The Greek συνέδριον here likely refers specifically to the Sanhedrin, the Jewish ruling council.
  chosen_spanish_reading: Usar «Sanedrín»
  alternative_spanish_readings:
  - «consejo»
  - «concilio»
  rationale: La identificación institucional es la misma que en el audit trail inglés. «Sanedrín» es la forma más precisa y evita la vaguedad de «consejo» en un contexto judicial-político judío.
  doctrine_reference: Lexical specificity / historical referent
translation_notes:
  revision_awareness: El texto sigue el último ajuste del audit trail inglés, que refinó la cláusula final para reflejar mejor πυνθάνεσθαι (‘inquirir/averiguar’) y ἀκριβέστερον (‘más exactamente / con mayor precisión’). En español se priorizó una formulación natural que conserve esa precisión sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «Sanedrín» para συνέδριον, siguiendo la identificación específica del consejo gobernante judío.
  - Se evitó sustituir «los judíos» por una expresión más interpretativa; el contexto narrativo delimita el referente.
  - La estructura «como si» conserva el matiz de pretexto o apariencia sin añadir explicación no presente en el griego.
  - «Hagas bajar» preserva la dirección de κατάγω mejor que un verbo meramente neutral como «traigas».
