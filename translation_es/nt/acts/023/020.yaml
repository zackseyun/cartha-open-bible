  text: εἶπεν δὲ ὅτι Οἱ Ἰουδαῖοι συνέθεντο τοῦ ἐρωτῆσαί σε ὅπως αὔριον ⸂τὸν Παῦλον καταγάγῃς εἰς τὸ συνέδριον⸃ ὡς ⸀μέλλον τι ἀκριβέστερον πυνθάνεσθαι περὶ αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/020.yaml
  text: He said[a], “The Jews have agreed to ask you to bring Paul down to the Sanhedrin tomorrow[b], as though they were going to inquire more accurately about him.”
  footnotes:
  - marker: a
    text: Or 'council.' The Greek συνέδριον here likely refers specifically to the Sanhedrin, the Jewish ruling council.
    reason: lexical_alternative
  - marker: b
    text: Or 'as if they were going to inquire more carefully about him.'
    reason: alternative_reading
