review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del griego: el sobrino de Pablo oye del plan, llega, entra al recinto militar y se lo comunica a Pablo. También conserva correctamente el sentido más concreto de ἐνέδρα como ''emboscada'' y de παρεμβολή como instalación militar, con nota alternativa para ''campamento''. Sin embargo, hay dos desajustes de auditoría: las notas a y b quedaron invertidas respecto de sus anclajes, y ''oyó de la emboscada'' suena poco natural en español para ἀκούω con este objeto; conviene ''se enteró de la emboscada'' o ''oyó hablar de la emboscada''.'
  spanish_quality_summary: La frase es generalmente clara y digna, pero 'oyó de la emboscada' es un giro forzado en español general. 'Barracones' es comprensible, aunque en este contexto narrativo bíblico 'cuartel' o 'barracas' podría sonar más idiomático; con todo, dado el rastro POB y la nota explicativa, puede mantenerse. 'Se lo informó a Pablo' es aceptable, aunque algo pesado; 'se lo comunicó a Pablo' fluye mejor.
  glossary_alignment: No hay términos teológicos sensibles aquí. Se respeta la preferencia por preservar relaciones familiares explícitas ('el hijo de la hermana de Pablo') en vez de simplificarlas en el texto principal. 'Emboscada' sigue bien la decisión léxica inglesa para ἐνέδρα. La nota sobre παρεμβολή también está alineada.
  issues:
  - severity: medium
    issue: Las notas a y b están asociadas al segmento equivocado.
    rationale: En el texto, [a][b] aparecen tras 'emboscada', pero la nota a explica la relación familiar y la b explica 'emboscada' en el inglés auditado. En español también deben corresponder a sus anclajes reales y mantener orden coherente.
  - severity: medium
    issue: '''Oyó de la emboscada'' es poco natural en español.'
    rationale: Aunque refleja literalmente 'heard of', en español neutral suena forzado. 'Se enteró de la emboscada' o 'oyó hablar de la emboscada' preserva el sentido de Ἀκούσας con mejor legibilidad.
  - severity: low
    issue: '''Se lo informó a Pablo'' es algo pesado estilísticamente.'
    rationale: Es comprensible y fiel, pero 'se lo comunicó a Pablo' o 'se lo reportó a Pablo' resulta más fluido en español bíblico moderno.
