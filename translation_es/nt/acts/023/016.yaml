base_translation:
  language: en
  yaml_path: translation/nt/acts/023/016.yaml
  text: But when Paul’s sister’s son heard of the ambush[c][b][a], he came and entered the barracks and reported it to Paul.
  footnotes:
  - marker: a
    text: Or 'the son of Paul’s sister'; that is, Paul’s nephew.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plot' or 'the conspiracy.' The Greek more specifically refers to an ambush or lying in wait.
    reason: lexical_alternative
  - marker: c
    text: Or 'entered the camp.' In this context the term likely refers to the Roman barracks.
    reason: lexical_alternative
