translation:
  language: es
  text: Pero cuando el hijo de la hermana de Pablo[a] se enteró de la emboscada[b], llegó, entró en los barracones[c] y se lo comunicó a Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el sobrino de Pablo”. Lit. “el hijo de la hermana de Pablo”.
    reason: lexical_alternative
  - marker: b
    text: O “el complot” o “la conspiración”. El griego se refiere más específicamente a una emboscada o acecho.
    reason: lexical_alternative
  - marker: c
    text: O “el campamento”. En este contexto, el término probablemente se refiere a los barracones romanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσας
  english_pob_choice: when ... heard
  chosen_spanish: oyó
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, 'oyó' mantiene la secuencia narrativa de modo natural; el valor temporal queda claro por el contexto y por 'cuando' en la traducción completa implícita de la oración.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce avance narrativo con un matiz leve de contraste. 'Pero' conserva mejor ese giro respecto del complot descubierto.
- source_word: ὁ υἱὸς τῆς ἀδελφῆς Παύλου
  english_pob_choice: Paul’s sister’s son
  chosen_spanish: el hijo de la hermana de Pablo
  alternatives_spanish:
  - el sobrino de Pablo
  - el hijo de la hermana de Pablo
  lexicon: BDAG
  rationale: El griego expresa de forma literal la relación familiar; por eso se conserva 'el hijo de la hermana de Pablo'. 'Sobrino' sería correcto interpretativamente, pero borra la forma explícita del original.
- source_word: τὴν ἐνέδραν
  english_pob_choice: the ambush
  chosen_spanish: la emboscada
  alternatives_spanish:
  - el complot
  - la conspiración
  lexicon: BDAG
  rationale: ἐνέδρα denota una emboscada o acecho; 'emboscada' preserva el sentido concreto y evita generalizarlo a 'complot' o 'conspiración'.
- source_word: παραγενόμενος
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio indica llegada/presencia previa al siguiente acto. 'Llegó' suena natural en español y refleja bien el avance narrativo.
- source_word: εἰσελθὼν εἰς τὴν παρεμβολὴν
  english_pob_choice: entered the barracks
  chosen_spanish: entró en los barracones
  alternatives_spanish:
  - entró en el campamento
  - entró en la guarnición
  lexicon: BDAG
  rationale: παρεμβολή puede significar campamento o barracones. En este contexto militar romano de custodia, 'barracones' comunica con precisión el lugar al que entra sin volverlo demasiado genérico.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported it
  chosen_spanish: se lo informó
  alternatives_spanish:
  - lo reportó
  - se lo comunicó
  - le informó
  lexicon: BDAG
  rationale: ἀπαγγέλλω implica transmitir o reportar información. 'Se lo informó' conserva la idea de comunicar la noticia y hace explícito en español el objeto implícito del relato; el 'lo' retoma la emboscada.
- source_word: τῷ Παύλῳ
  english_pob_choice: to Paul
  chosen_spanish: a Pablo
  alternatives_spanish:
  - a Pablo
  lexicon: BDAG
  rationale: Dativo simple de destinatario; se traduce directamente con la preposición 'a'.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el rastro auditado en inglés. La traducción española conserva la secuencia narrativa, la relación familiar explícita y el sentido concreto de ἐνέδρα y παρεμβολή, manteniendo las alternativas relevantes en notas.
  spanish_consistency_notes:
  - Se prefirió 'Pablo' frente a cualquier forma tradicional abreviada o litúrgica.
  - Se usó 'emboscada' para ἐνέδρα, en continuidad con la decisión inglesa auditada.
  - Se usó 'barracones' para παρεμβολή por el contexto militar romano; 'campamento' queda como alternativa.
  - No se añadió ningún término doctrinal ajeno al versículo.
