revisions:
- from: Pero cuando el hijo de la hermana de Pablo oyó de la emboscada[a][b], llegó y entró en los barracones[c], y se lo informó a Pablo.
  to: Pero cuando el hijo de la hermana de Pablo[a] se enteró de la emboscada[b], llegó, entró en los barracones[c] y se lo comunicó a Pablo.
  rationale: Se corrigieron los anclajes de notas para que coincidan con las palabras relevantes en el texto, se sustituyó el giro poco idiomático 'oyó de la emboscada' por 'se enteró de la emboscada', y se aligeró 'se lo informó' a 'se lo comunicó' sin perder el matiz de reportar información. Se mantuvieron 'el hijo de la hermana de Pablo', 'emboscada' y 'barracones' por fidelidad al griego y al rastro léxico POB.
