translation:
  language: es
  text: 'Estos hombres fueron a los principales sacerdotes y a los ancianos, y dijeron[a]: «Nos hemos puesto bajo maldición a no probar nada hasta que matemos a Pablo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Nos hemos puesto bajo un anatema/maldición». El griego expresa un juramento autoimprecatorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - quienes
  - ellos
  lexicon: BDAG
  rationale: El relativo con matiz cualitativo/indefinido retoma a los conspiradores del versículo anterior. En español, “Estos hombres” hace explícito el referente sin perder la referencia narrativa.
- source_word: προσελθόντες
  english_pob_choice: came to
  chosen_spanish: se acercaron a
  alternatives_spanish:
  - fueron a
  - se presentaron ante
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción anterior a “dijeron”. “Se acercaron a” conserva el sentido de aproximación y funciona bien en español narrativo.
- source_word: τοῖς ἀρχιερεῦσιν
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español, “principales sacerdotes” comunica el plural colectivo de liderazgo religioso con naturalidad; “sumos sacerdotes” puede sonar más fijo litúrgicamente pero menos transparente aquí.
- source_word: τοῖς πρεσβυτέροις
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: BDAG
  rationale: En este contexto institucional, el término designa a dirigentes reconocidos, no solo a personas de mayor edad. “Ancianos” es la equivalencia más estable y comprensible.
- source_word: Ἀναθέματι ἀνεθεματίσαμεν ἑαυτοὺς
  english_pob_choice: We have bound ourselves under a curse
  chosen_spanish: Nos hemos comprometido bajo maldición
  alternatives_spanish:
  - Nos hemos puesto bajo anatema
  - Nos hemos atado con una maldición
  lexicon: BDAG
  rationale: La expresión es un juramento autoinfligido de carácter imprecatorio. “Comprometido bajo maldición” conserva la seriedad del acto sin introducir el tecnicismo eclesiástico posterior de “anatema” como término doctrinal.
- source_word: μηδενὸς γεύσασθαι
  english_pob_choice: to taste nothing
  chosen_spanish: a no probar nada
  alternatives_spanish:
  - a no comer nada
  - a no tomar nada
  lexicon: BDAG
  rationale: γεύομαι significa literalmente “probar/tastar” y, por extensión, abstenerse de alimento. “Probar nada” mantiene de cerca el griego y su alcance idiomático.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - mientras no
  - antes de que
  lexicon: BDAG
  rationale: Conjunción temporal estándar que marca el límite del juramento.
- source_word: ἀποκτείνωμεν
  english_pob_choice: we kill
  chosen_spanish: matemos
  alternatives_spanish:
  - hayamos matado
  - asesinemos
  lexicon: BDAG
  rationale: El subjuntivo aoristo en una cláusula de finalidad/tiempo futura se expresa de forma natural en español con subjuntivo presente. “Matemos” es directo; “asesinemos” añadiría una carga más interpretativa.
- source_word: τὸν Παῦλον
  english_pob_choice: Paul
  chosen_spanish: a Pablo
  alternatives_spanish:
  - a Pablo el apóstol
  lexicon: BDAG
  rationale: Nombre propio transliterado según uso español estándar.
theological_decisions:
- issue: Sentido de Ἀναθέματι / ἀνεθεματίσαμεν ἑαυτοὺς
  english_pob_reading: We have bound ourselves under a curse
  chosen_spanish_reading: Nos hemos comprometido bajo maldición
  alternative_spanish_readings:
  - Nos hemos puesto bajo anatema
  - Nos hemos ligado con una maldición
  rationale: El griego describe una autoimprecación, no el uso eclesiástico posterior de “anatema” como condena formal. La redacción elegida preserva la gravedad del juramento y evita cargar el texto con un tecnicismo que podría oscurecer el sentido original.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el informe auditado en inglés y la lectura del griego: conserva el sujeto explícito, la secuencia temporal del participio aoristo, el valor idiomático de γεύσασθαι y la fuerza autoimprecatoria de Ἀναθέματι ἀνεθεματίσαμεν ἑαυτοὺς. No se registraron revisiones posteriores con cambios.'
  spanish_consistency_notes:
  - Se mantiene “Pablo” para Παῦλος en todo el versículo.
  - Se usa “principales sacerdotes” y “ancianos” para los grupos de liderazgo judío, siguiendo el contexto narrativo.
  - Se evita “SEÑOR” o terminología litúrgica no presente en el texto.
  - La nota al pie marca la alternativa literal sin reemplazar la traducción principal.
