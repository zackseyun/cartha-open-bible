translation:
  language: es
  text: Pero al día siguiente, después de dejar que los jinetes continuaran el viaje con él, regresaron al cuartel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "al campamento". El término griego puede designar un campamento o unas instalaciones militares; aquí probablemente se refiere al cuartel romano en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  english_pob_choice: But on the next day
  chosen_spanish: Pero al día siguiente
  alternatives_spanish:
  - Y al día siguiente
  - Entonces, al día siguiente
  - Al día siguiente
  lexicon: BDAG
  rationale: La expresión idiomática temporal se vierte de forma natural como "al día siguiente". "Pero" conserva el matiz narrativo leve de δέ sin forzar una oposición fuerte.
- source_word: ἐάσαντες
  english_pob_choice: after letting
  chosen_spanish: después de dejar que
  alternatives_spanish:
  - habiendo permitido que
  - después de permitir
  - dejando
  lexicon: BDAG
  rationale: 'El participio aoristo se entiende mejor en español como acción previa a la principal: "después de dejar que". Mantiene el valor de permiso/cesión de ἐάω sin volverlo más libre de lo que permite el griego.'
- source_word: τοὺς ἱππεῖς
  english_pob_choice: the horsemen
  chosen_spanish: los jinetes
  alternatives_spanish:
  - la caballería
  - los soldados de a caballo
  - los caballeros
  lexicon: BDAG
  rationale: '"ἱππεῖς" designa tropa montada. "Jinetes" comunica bien el sentido militar en español y evita una terminología más técnica o más ambigua.'
- source_word: ἀπέρχεσθαι σὺν αὐτῷ
  english_pob_choice: go on with him
  chosen_spanish: siguieran con él
  alternatives_spanish:
  - fueran con él
  - continuaran con él
  - acompañaran con él
  lexicon: BDAG
  rationale: En este contexto de escolta, la idea es que los jinetes continúen el trayecto con Pablo. "Siguieran con él" refleja el valor de irse/seguir adelante y la compañía implícita de σύν + dativo.
- source_word: ὑπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - dieron la vuelta y regresaron
  lexicon: BDAG
  rationale: '"Regresaron" es una traducción natural de ὑποστρέφω en narración. Evita redundancia y conserva el movimiento de vuelta.'
- source_word: εἰς τὴν παρεμβολήν
  english_pob_choice: to the barracks
  chosen_spanish: al cuartel
  alternatives_spanish:
  - al campamento
  - a los cuarteles
  - a la fortaleza
  lexicon: BDAG
  rationale: Aunque παρεμβολή puede significar "campamento", aquí el contexto militar en Jerusalén favorece el referente concreto de los alojamientos militares. "Cuartel" mantiene esa concreción en español sin perder la posibilidad contextual documentada.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de forma alta; no se requieren cambios de contenido. Se ajustó la redacción española para sonar natural y fiel al valor narrativo del participio, manteniendo la decisión contextual sobre παρεμβολή como "cuartel".
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y formal, adecuado para una traducción pública.
  - '"Jinetes" se usa para ἱππεῖς por claridad y fluidez en español.'
  - '"Cuartel" conserva la concreción militar contextual; la nota preserva la alternativa "campamento".'
  - No se introdujeron términos eclesiásticos ni paráfrasis interpretativas ajenas al griego.
