translation:
  language: es
  text: Y nosotros somos testigos de todo lo que hizo, tanto en la tierra[a] de los judíos como en Jerusalén. A él también lo mataron, colgándolo en un madero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la región» o «en el territorio». χῶρα puede referirse al país, región o territorio, y «tierra» conserva ese alcance sin precisar más de lo que el griego dice.
    reason: lexical_alternative
  - marker: b
    text: O «en un árbol» o, más literalmente, «sobre madera»; interpretivamente, «en una cruz». El griego dice ξύλον («árbol», «madera», «madero»), y probablemente evoca Deuteronomio 21:23.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testificadores
  lexicon: BDAG
  rationale: En contexto forense y testimonial, μάρτυρες se refiere a quienes dan testimonio de hechos observados. «Testigos» es el equivalente natural y claro en español, y conserva el valor jurídico-apostólico del término mejor que una forma más literal pero menos idiomática.
- source_word: πάντων ὧν ἐποίησεν
  english_pob_choice: of all that he did
  chosen_spanish: de todo lo que hizo
  alternatives_spanish:
  - de todas las cosas que hizo
  - de todo cuanto hizo
  lexicon: BDAG
  rationale: La construcción griega expresa totalidad con una cláusula relativa. «De todo lo que hizo» mantiene la amplitud sin sonar forzado en español y evita añadir matices que el texto no exige.
- source_word: ἔν τε τῇ χώρᾳ τῶν Ἰουδαίων
  english_pob_choice: in the land of the Jews
  chosen_spanish: en la tierra de los judíos
  alternatives_spanish:
  - en la tierra de Judea
  - en la región de los judíos
  lexicon: BDAG
  rationale: χώρᾳ puede significar país, región o territorio. Dado el paralelo con Jerusalén y la decisión inglesa de preservar la referencia geográfica amplia, «tierra» conserva bien el alcance territorial sin convertirlo en una referencia técnica a la provincia de Judea.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: BDAG
  rationale: En este contexto, Ἰουδαίων puede leerse étnica y religiosamente. «Los judíos» es la forma más directa y transparente en español; la opción regional ya queda sugerida por «tierra» para χώρα.
- source_word: Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: BDAG
  rationale: Aunque el griego no repite la preposición, el español la requiere para la sintaxis natural de la frase, por lo que se explicita sin alterar el sentido.
- source_word: ἀνεῖλαν
  english_pob_choice: put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo quitaron de en medio
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar o ejecutar. «Lo mataron» es más directo y fiel al hecho narrado; el contexto ya deja claro que se trata de una muerte violenta y pública.
- source_word: κρεμάσαντες
  english_pob_choice: by hanging him
  chosen_spanish: colgándolo
  alternatives_spanish:
  - después de colgarlo
  - habiéndolo colgado
  lexicon: BDAG
  rationale: El participio aoristo se integra mejor en español con un gerundio de modo/medio. «Colgándolo» comunica la relación instrumental con el verbo principal y mantiene la secuencia causal del griego.
- source_word: ἐπὶ ξύλου
  english_pob_choice: on a tree
  chosen_spanish: de un madero
  alternatives_spanish:
  - en un árbol
  - en un cruz
  - en un madero de madera
  lexicon: BDAG
  rationale: ξύλον significa literalmente «madera», «árbol» o «madero», y en este contexto evoca la fórmula deuteronómica del maldito colgado en un madero. En español, «madero» preserva la ambigüedad fuente sin forzar inmediatamente la interpretación «cruz».
theological_decisions:
- issue: ξύλον en contexto de crucifixión y posible eco de Deuteronomio 21:23
  english_pob_reading: on a tree, with footnote noting 'tree,' likely echoing Deuteronomy 21:23
  chosen_spanish_reading: de un madero
  alternative_spanish_readings:
  - en un árbol
  - en una cruz
  rationale: La fuente griega usa ξύλον, no σταυρός. «Madero» permite conservar la tensión lexical y el eco bíblico sin resolver interpretivamente la frase hacia «cruz». Mantiene abierta la relación con el lenguaje de maldición/colgamiento que la forma griega sugiere.
  doctrine_reference: Principio de primacía del idioma original; conservar tensión textual y alusiones bíblicas sin sobreexplicarlas.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el rastro auditado en inglés, pero ajusta la geografía para un español natural («en la tierra de los judíos») y conserva la tensión lexical de ξύλον con «madero», evitando resolverla hacia «cruz» sin base explícita en el texto.
  spanish_consistency_notes:
  - Se mantuvo «testigos» para μάρτυρες por su uso natural en contextos de testimonio.
  - Se evitó «Cristo» o «Mesías» porque el versículo no contiene Χριστός.
  - Se eligió «madero» en lugar de «cruz» para ξύλον, en consonancia con la nota textual y la primacía del griego.
  - Se usó «los judíos» para Ἰουδαίων, mientras «tierra» preserva el alcance territorial de χώρα.
