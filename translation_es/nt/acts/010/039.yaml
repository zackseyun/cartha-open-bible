review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: «nosotros somos testigos», «de todo lo que hizo», el doble ámbito geográfico, y la muerte por colgamiento. Sin embargo, hay dos problemas de fidelidad léxica/formal: (1) la nota [a] está anclada a «tierra» pero ofrece como alternativa la misma palabra, además contiene un error tipográfico grave («ξώρα» por «χώρα»); (2) «colgándolo de un madero» no representa bien ἐπὶ ξύλου, que aquí corresponde mejor a «en/sobre un madero» o «en un árbol», no «de un madero».'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. «Testigos» y «de todo lo que hizo» funcionan bien. «La tierra de los judíos» es comprensible, aunque «la tierra» puede sonar algo menos idiomática que «la región»; aun así, es aceptable dado el rastro de auditoría inglés. La principal reparación de estilo-fidelidad está en «de un madero», que en español sugiere procedencia más que localización/instrumento de suspensión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles. La decisión de evitar «cruz» en el texto principal y preservar ξύλον con «madero» está bien alineada con la filosofía POB, pero debe expresarse con la preposición correcta y con una nota limpia.
  issues:
  - severity: medium
    issue: La preposición en «colgándolo de un madero» no corresponde bien a ἐπὶ ξύλου.
    rationale: El griego expresa la superficie/soporte de suspensión («sobre/en un madero/árbol»), no procedencia. En español bíblico-natural, «colgándolo en un madero» o «colgándolo en un árbol» representa mejor la construcción.
  - severity: medium
    issue: La nota [a] está mal formulada y contiene un error tipográfico en el griego.
    rationale: La nota dice «O ‘en la tierra’» cuando el texto ya tiene «tierra», por lo que no ofrece una alternativa real. Además escribe «ξώρα» en vez de «χώρα», lo cual debe corregirse.
  - severity: low
    issue: La nota [b] podría ajustarse para reflejar mejor la alternativa principal del inglés POB.
    rationale: El inglés destaca «tree» como equivalente principal, con «wood» y, de modo interpretativo, «cross» como alternativas. En español, si el texto principal usa «madero», conviene mencionar también «árbol» explícitamente como alternativa literal relevante.
  revised_spanish_text: Y nosotros somos testigos de todo lo que hizo, tanto en la tierra[a] de los judíos como en Jerusalén. A él también lo mataron, colgándolo en un madero[b].
  revised_footnotes:
