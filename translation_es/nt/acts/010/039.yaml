    text: O «en la región» o «en el territorio». χῶρα puede referirse al país, región o territorio, y «tierra» conserva ese alcance sin precisar más de lo que el griego dice.
    reason: lexical_alternative
  - marker: b
    text: O «en un árbol» o, más literalmente, «sobre madera»; interpretivamente, «en una cruz». El griego dice ξύλον («árbol», «madera», «madero»), y probablemente evoca Deuteronomio 21:23.
    reason: lexical_alternative
