translation:
  language: es
  text: 'Ellos dijeron: «Cornelio, centurión, hombre justo y temeroso de Dios, y de buena reputación[a] ante toda la nación de los judíos[b], recibió instrucción divina[c] por medio de un ángel santo para mandarte llamar[d] a su casa y oír palabras de parte tuya[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien testificado». El griego indica que recibía testimonio favorable.
    reason: lexical_alternative
  - marker: b
    text: O «por todo el pueblo judío». El griego dice «por toda la nación de los judíos», donde «nación» se refiere a un pueblo/grupo étnico, no necesariamente a un estado político moderno.
    reason: lexical_alternative
  - marker: c
    text: O «recibió una advertencia» o «recibió un mensaje divino». El verbo griego indica una comunicación procedente de Dios.
    reason: lexical_alternative
  - marker: d
    text: O «para convocarte» o «para mandar por ti para que fueras a su casa».
    reason: lexical_alternative
  - marker: e
    text: O «para oír un mensaje de parte tuya». Literalmente, «para oír palabras de parte tuya».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - comandante de cien
  - oficial de cien
  lexicon: BDAG
  rationale: Es el término histórico estándar para un oficial romano al mando de alrededor de cien soldados. En español, 'centurión' comunica con precisión esa función y conserva el valor técnico del título.
- source_word: ἀνὴρ δίκαιος
  english_pob_choice: a righteous man
  chosen_spanish: hombre justo
  alternatives_spanish:
  - hombre recto
  - hombre justo y recto
  lexicon: BDAG
  rationale: δίκαιος aquí describe la calidad moral/religiosa de Cornelio. 'Justo' preserva el sentido de rectitud reconocida, y 'hombre' traduce naturalmente ἀνήρ en este contexto personal.
- source_word: φοβούμενος τὸν θεόν
  english_pob_choice: one who fears God
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - uno que teme a Dios
  - piadoso hacia Dios
  lexicon: BDAG
  rationale: La expresión funciona como un rasgo idiomático para un gentil reverente del Dios de Israel. 'Temeroso de Dios' conserva el giro bíblico y la fuerza verbal del participio sin sobreexplicar.
- source_word: μαρτυρούμενός
  english_pob_choice: who is well spoken of
  chosen_spanish: bien testificado
  alternatives_spanish:
  - bien hablado
  - de buena reputación
  - atestiguado favorablemente
  lexicon: BDAG
  rationale: El participio pasivo indica que recibía testimonio favorable. 'Bien testificado' mantiene la relación con μαρτυρέω y conserva la idea de testimonio público; aunque suena un poco más formal, es fiel al matiz del texto.
- source_word: ὑπὸ ὅλου τοῦ ἔθνους τῶν Ἰουδαίων
  english_pob_choice: by the whole nation of the Jews
  chosen_spanish: por toda la nación de los judíos
  alternatives_spanish:
  - por todo el pueblo judío
  - por todo el pueblo de los judíos
  lexicon: BDAG
  rationale: ἔθνος aquí designa un pueblo/grupo étnico, no un estado moderno. 'Nación de los judíos' reproduce de cerca la estructura del griego y, en la nota, puede aclararse el valor étnico-colectivo de 'nación'.
- source_word: ἐχρηματίσθη
  english_pob_choice: was divinely instructed
  chosen_spanish: recibió instrucción divina
  alternatives_spanish:
  - fue advertido
  - recibió un mensaje divino
  - fue instruido por Dios
  lexicon: BDAG
  rationale: En este contexto χρηματίζω se refiere a una comunicación procedente de lo divino. 'Recibió instrucción divina' conserva la pasiva y la procedencia celestial, sin restringirlo solo a una advertencia.
- source_word: ἀγγέλου ἁγίου
  english_pob_choice: by a holy angel
  chosen_spanish: por medio de un ángel santo
  alternatives_spanish:
  - por un ángel santo
  - por un ángel
  lexicon: BDAG
  rationale: El adjetivo ἁγίου debe quedar expresado. 'Por medio de' refleja bien el agente de la comunicación y 'ángel santo' conserva el calificativo explícito del original.
- source_word: μεταπέμψασθαί σε
  english_pob_choice: to summon you
  chosen_spanish: para mandarte llamar
  alternatives_spanish:
  - para convocarte
  - para llamarte
  - para enviarte a llamar
  lexicon: BDAG
  rationale: μεταπέμπομαι significa enviar a buscar o mandar llamar. 'Mandarte llamar' es una fórmula española natural y precisa, y evita añadir innecesariamente la idea de movimiento ya implicada en el contexto.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su casa,
  - a su vivienda
  lexicon: BDAG
  rationale: Con el infinitivo de mandato, la dirección natural en español es 'a su casa'. 'Casa' mantiene el sentido concreto de οἶκος y su fluidez es mejor que una traducción más literal como 'a la casa de él'.
- source_word: ἀκοῦσαι ῥήματα παρὰ σοῦ
  english_pob_choice: to hear words from you
  chosen_spanish: oír palabras de ti
  alternatives_spanish:
  - escuchar palabras de ti
  - oír un mensaje de ti
  - oír lo que tienes que decir
  lexicon: BDAG
  rationale: ῥήματα significa literalmente 'palabras' o 'dichos'. 'Oír palabras de ti' mantiene la cercanía al griego y no especifica de más el contenido como si fuera un sermón formal.
theological_decisions:
- issue: Cómo presentar la valoración moral y religiosa de Cornelio sin resolver su estado salvífico
  english_pob_reading: a righteous man and one who fears God
  chosen_spanish_reading: hombre justo y temeroso de Dios
  alternative_spanish_readings:
  - hombre piadoso
  - hombre justo y devoto de Dios
  rationale: El versículo lo describe en términos morales y religiosos reconocidos por los judíos, pero no define aquí su situación de salvación o pertenencia plena al pacto. La traducción conserva el elogio sin introducir conclusiones doctrinales ajenas al texto.
  doctrine_reference: Conservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El audit trail inglés mantuvo 'well spoken of' como equilibrio para μαρτυρούμενος, aunque la revisión señaló que la redacción inglesa podía compactarse a 'summon you to his house'. En español se optó por 'mandarte llamar a su casa', que conserva la relación semántica con μεταπέμψασθαί y evita redundancia. También se respetó el matiz de ἔθνος como pueblo/grupo, y de χρηματίζω como comunicación divina, no solo advertencia.
  spanish_consistency_notes:
  - Se emplea 'Dios' y no una forma velada, conforme al uso del nombre común θεός en el texto.
  - '''Ángel santo'' conserva el adjetivo ἁγίου sin suavizarlo.'
  - '''Temeroso de Dios'' mantiene el giro idiomático para φοβούμενος τὸν θεόν.'
  - '''Bien testificado'' refleja el pasivo de μαρτυρούμενος con matiz de testimonio público.'
  - '''Oír palabras de ti'' conserva la literalidad de ῥήματα παρὰ σοῦ sin añadir contenido interpretativo.'
  - Se usa puntuación española con comillas angulares y coma vocativa natural para un registro bíblico moderno.
