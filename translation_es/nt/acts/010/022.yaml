    rationale: Eso cambia el sentido de μεταπέμψασθαί σε; no es ‘enviarte’, sino ‘mandarte llamar / hacerte venir / enviar por ti’.
  - severity: medium
    issue: «bien testificado» es un calco poco natural.
    rationale: Aunque refleja μαρτυρούμενος, en español eclesial general suena forzado. «de buena reputación» o «de quien hablan bien» transmite mejor el sentido reputacional.
  - severity: medium
    issue: «oír palabras de ti» suena antinatural en español.
    rationale: Puede conservarse la cercanía al griego con «oír palabras de parte tuya» o bien usar una nota para explicar el literal.
