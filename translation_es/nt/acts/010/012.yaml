  - Se mantuvo el referente singular implícito de ἐν ᾧ con "En él", coherente con el contexto narrativo de la visión.
  - Se preservó la enumeración inclusiva con "todos" y la coordinación repetida "y ... y" para reflejar la estructura griega.
  - Se evitó "SEÑOR" o terminología no pertinente, dado que el versículo no contiene referencias directas al nombre divino ni a títulos cristológicos.
