lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In it
  chosen_spanish: En él
  alternatives_spanish:
  - en la cual
  - en lo cual
  lexicon: BDAG
  rationale: El relativo remite al lienzo/recipiente de la visión de Pedro. En español, "en él" conserva el valor locativo y suena natural sin perder el referente implícito.
- source_word: ὑπῆρχεν
  english_pob_choice: were
  chosen_spanish: había
  alternatives_spanish:
  - eran
  - estaban
  - contenía
  lexicon: BDAG
  rationale: El imperfecto expresa existencia/presencia dentro del recipiente; "había" comunica mejor esa presencia que "eran" y evita reforzar interpretativamente "contenía".
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las clases de
  - todo tipo de
  lexicon: BDAG
  rationale: '"Todos" preserva el alcance global de la lista sin añadir la interpretación de "cada clase".'
- source_word: τὰ τετράποδα
  english_pob_choice: the four-footed animals
  chosen_spanish: los animales de cuatro patas
  alternatives_spanish:
  - cuadrúpedos
  - las bestias de cuatro patas
  lexicon: BDAG
  rationale: '"Animales de cuatro patas" es claro y natural en español; evita el tecnicismo de "cuadrúpedos" y mantiene el rasgo descriptivo del griego.'
- source_word: ἑρπετὰ τῆς γῆς
  english_pob_choice: reptiles of the earth
  chosen_spanish: reptiles de la tierra
  alternatives_spanish:
  - seres que se arrastran de la tierra
  - animales que se arrastran de la tierra
  lexicon: BDAG
  rationale: '"Reptiles" sigue la decisión lexical del POB en inglés y es idiomático en español; "de la tierra" conserva el genitivo y la clasificación terrestre.'
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: birds of the sky
  chosen_spanish: aves del cielo
  alternatives_spanish:
  - aves del cielo
  - aves de los cielos
  lexicon: BDAG
  rationale: '"Aves" es el equivalente natural de πετεινά; "del cielo" refleja τοῦ οὐρανοῦ y funciona bien en español bíblico contemporáneo.'
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  - y también ... y
  lexicon: BDAG
  rationale: La coordinación repetida se conserva con "y ... y", reflejando la estructura enumerativa del griego sin sobreformalizarla.
translation_notes:
