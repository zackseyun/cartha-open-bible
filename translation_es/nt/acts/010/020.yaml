    issue: La nota [a] sobre «levántate» es innecesaria.
    rationale: El English POB no preserva una nota para ἀναστὰς, y «ponte de pie» no representa una ambigüedad exegética o teológica relevante aquí. Mantenerla sobrecarga el texto sin beneficio claro.
  - severity: low
    issue: «sin dudar» atenúa ligeramente el μηδὲν del griego.
    rationale: El participio con μηδὲν expresa más plenamente «sin dudar de nada» o «no dudando nada». Añadir «de nada» mejora la correspondencia con el original sin sonar forzado.
  revised_spanish_text: Pero levántate, baja y ve con ellos, sin dudar de nada[a], porque yo los he enviado.
  revised_footnotes:
  - marker: a
    text: 'O: «sin hacer distinción»; el participio griego también puede significar no hacer distinción, lo que puede aludir al tema judío-gentil de este capítulo.'
    reason: alternative_reading
