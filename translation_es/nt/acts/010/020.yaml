- from: Pero levántate[a], baja y ve con ellos, sin dudar[b], porque yo los he enviado.
  to: Pero levántate, baja y ve con ellos, sin dudar de nada[a], porque yo los he enviado.
  rationale: Se elimina una nota no necesaria sobre ἀναστὰς y se refuerza la precisión de μηδὲν con «de nada». Se conserva la ambigüedad teológicamente significativa de διακρινόμενος en una sola nota clara, alineada con el English POB.
