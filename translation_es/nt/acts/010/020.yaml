translation:
  language: es
  text: Pero levántate, baja y ve con ellos, sin dudar de nada[a], porque yo los he enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin hacer distinción»; el participio griego también puede significar no hacer distinción, lo que puede aludir al tema judío-gentil de este capítulo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sino que
  lexicon: BDAG
  rationale: Introduce una transición adversativa natural en español, marcando el contraste con la vacilación previa de Pedro sin añadir matiz interpretativo extra.
- source_word: ἀναστὰς
  english_pob_choice: get up
  chosen_spanish: levántate
  alternatives_spanish:
  - ponte de pie
  - alza(te)
  lexicon: BDAG
  rationale: El participio aoristo funciona como mandato previo a los imperativos siguientes. 'Levántate' es idiomático y conserva la urgencia de la acción inmediata.
- source_word: κατάβηθι
  english_pob_choice: go down
  chosen_spanish: baja
  alternatives_spanish:
  - desciende
  - ven abajo
  lexicon: BDAG
  rationale: Desde la ubicación elevada de Pedro, 'baja' expresa de forma natural el movimiento descendente sin perder la dirección espacial del griego.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - camina
  - ponte en camino
  lexicon: BDAG
  rationale: Verbo de desplazamiento en mandato; 've' es breve, claro y suficiente para acompañar 'con ellos'.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - acompañado de ellos
  lexicon: BDAG
  rationale: Expresa acompañamiento directo en español sin ampliación innecesaria.
- source_word: μηδὲν διακρινόμενος
  english_pob_choice: doubting nothing
  chosen_spanish: sin dudar
  alternatives_spanish:
  - sin vacilar
  - sin hacer distinción
  - sin dudar de nada
  lexicon: BDAG
  rationale: El participio puede significar 'dudar/vacilar' o 'hacer distinción'. En el contexto inmediato, la orden subraya que Pedro no debe titubear al ir con los mensajeros; 'sin dudar' preserva ese sentido primario y deja abierta la lectura alternativa del tema judío-gentil.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce de manera clara y natural la razón dada por el mensajero.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis del griego sin sobrecargar el español.
- source_word: ἀπέσταλκα
  english_pob_choice: have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  - los he mandado
  lexicon: BDAG
  rationale: El perfecto griego señala una acción completada con vigencia presente; el pretérito perfecto compuesto español la refleja bien.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Retoma de forma directa a los mensajeros. En español, el objeto directo con referencia masculina plural se expresa naturalmente con 'los'.
theological_decisions:
- issue: Sentido de μηδὲν διακρινόμενος en el contexto de Hechos 10
  english_pob_reading: Main text renders the phrase as 'doubting nothing,' while a footnote preserves 'making no distinction' because of the Jew-Gentile theme.
  chosen_spanish_reading: El texto principal dice 'sin dudar' y la nota preserva 'sin hacer distinción'.
  alternative_spanish_readings:
  - sin vacilar
  - sin hacer distinción
  - sin dudar de nada
  rationale: La escena inmediata enfatiza la obediencia sin titubeo ante la instrucción del Espíritu. Al mismo tiempo, Hechos 10 desarrolla de modo importante la cuestión de la inclusión de gentiles; por eso conviene mantener viva la ambigüedad semántica en una nota en lugar de resolverla del todo en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada del inglés: no se requieren cambios adicionales respecto del sentido, y se preserva la tensión semántica de διακρινόμενος mediante una nota alternativa en español.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para referencias divinas generales y no aparece aquí otra terminología conflictiva.
  - Se conserva un registro sobrio y bíblico, sin calcos innecesarios ni arcaísmos fuertes.
  - 'La forma verbal española refleja la secuencia de imperativos del griego: ''levántate, baja y ve''.'
  - La nota sobre 'sin hacer distinción' evita cerrar prematuramente la posible lectura teológica del pasaje.
