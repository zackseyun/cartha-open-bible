translation:
  language: es
  text: 'Jesús de Nazaret[a]: que Dios lo ungió con el Espíritu Santo y con poder; anduvo haciendo el bien y sanando a todos los oprimidos por el diablo, porque Dios estaba con él[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús de Nazaret».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pues Dios estaba con él».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦν τὸν ἀπὸ Ναζαρέθ
  english_pob_choice: Jesus of Nazareth / Jesus from Nazareth
  chosen_spanish: Jesús de Nazaret
  alternatives_spanish:
  - Jesús desde Nazaret
  - Jesús, el que es de Nazaret
  lexicon: BDAG
  rationale: La construcción identifica a Jesús por su procedencia. En español, «de Nazaret» es la forma natural e idiomática para ἀπό + topónimo, y conserva la función identificadora sin sobreexplicar.
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  - como
  lexicon: BDAG
  rationale: 'Aquí introduce el contenido explicativo de la acción divina: «cómo Dios lo ungió». «Cómo» conserva el valor narrativo-explicativo del griego mejor que un simple «que».'
- source_word: ἔχρισεν
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - consagró
  - designó
  lexicon: BDAG
  rationale: χρίω significa literalmente «ungir». Mantener «ungió» preserva la resonancia mesiánica y pneumatológica del texto sin convertirla en una paráfrasis doctrinal.
- source_word: πνεύματι ἁγίῳ
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - espíritu santo
  lexicon: BDAG
  rationale: La frase se refiere a la persona divina, no a una cualidad abstracta. En español, el artículo es natural y comunica referencia personal clara.
- source_word: καὶ δυνάμει
  english_pob_choice: and with power
  chosen_spanish: y con poder
  alternatives_spanish:
  - y poder
  - y con poder milagroso
  lexicon: BDAG
  rationale: El valor instrumental se expresa bien con «con». «Poder» es suficientemente amplio y evita restringir el sentido a lo milagroso solamente.
- source_word: διῆλθεν
  english_pob_choice: went about
  chosen_spanish: pasó
  alternatives_spanish:
  - anduvo
  - recorrió
  lexicon: BDAG
  rationale: 'En este contexto, el verbo describe la actividad itinerante de Jesús. «Pasó» en español bíblico y actual funciona de manera natural junto con el participio siguiente: «pasó haciendo el bien».'
- source_word: εὐεργετῶν
  english_pob_choice: doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - beneficiando a otros
  - obrando el bien
  lexicon: BDAG
  rationale: El participio expresa acción benéfica. «Haciendo el bien» es claro, idiomático y no estrecha indebidamente el sentido.
- source_word: ἰώμενος
  english_pob_choice: healing
  chosen_spanish: sanando
  alternatives_spanish:
  - curando
  - restaurando
  lexicon: BDAG
  rationale: El participio tiene sentido de sanar/curar. «Sanando» es directo y natural en español para este contexto de ministerio curativo.
- source_word: πάντας τοὺς καταδυναστευομένους
  english_pob_choice: all who were oppressed
  chosen_spanish: a todos los oprimidos
  alternatives_spanish:
  - a todos los que eran oprimidos
  - a todos los tiranizados
  lexicon: BDAG
  rationale: El participio pasivo describe a personas sometidas a dominio duro. «Oprimidos» es claro y abarca la opresión espiritual y existencial que el contexto sugiere.
- source_word: ὑπὸ τοῦ διαβόλου
  english_pob_choice: by the devil
  chosen_spanish: por el diablo
  alternatives_spanish:
  - por Satanás
  - por el acusador
  lexicon: BDAG
  rationale: διάβολος designa aquí al ser personal maligno. «El diablo» es la equivalencia clara y estándar en español.
- source_word: ὅτι ὁ θεὸς ἦν μετ’ αὐτοῦ
  english_pob_choice: because God was with him
  chosen_spanish: porque Dios estaba con él
  alternatives_spanish:
  - pues Dios estaba con él
  - ya que Dios estaba con él
  lexicon: BDAG
  rationale: ὅτι expresa la razón o fundamento de lo anterior. «Porque» comunica de manera natural la relación causal sin debilitarla.
theological_decisions:
- issue: Sentido de la unción de Jesús
  english_pob_reading: Retain 'anointed' language without paraphrasing it into a doctrinal explanation.
  chosen_spanish_reading: Conservar el lenguaje de unción («ungió») sin convertirlo en una explicación doctrinal añadida.
  alternative_spanish_readings:
  - «designó»
  - «consagró»
  rationale: El texto afirma que Dios ungió a Jesús con el Espíritu Santo y con poder. «Ungió» preserva la carga bíblico-teológica del verbo y evita diluirla en una explicación más abstracta.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Referencia de «el Espíritu Santo»
  english_pob_reading: Translate as the personal divine Holy Spirit.
  chosen_spanish_reading: Traducir como la persona divina del Espíritu Santo.
  alternative_spanish_readings:
  - «espíritu santo» en minúscula
  - «espíritu santo» como fuerza impersonal
  rationale: En Hechos, πνεῦμα ἅγιον remite de manera regular al Espíritu Santo personal. Mantener esa referencia evita convertirlo en una mera energía o cualidad.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Cláusula causal final sobre la presencia de Dios
  english_pob_reading: Preserve the statement as a causal explanation of Jesus' ministry without diminishing his divinity.
  chosen_spanish_reading: 'Preservar la cláusula como explicación causal de su ministerio: «porque Dios estaba con él».'
  alternative_spanish_readings:
  - «pues Dios estaba con él»
  - «ya que Dios estaba con él»
  rationale: La frase da la razón de su obrar benéfico y sanador. La traducción mantiene el peso causal del griego sin añadir ni quitar contenido cristológico que el versículo no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que favorece una estructura clara con dos cláusulas descriptivas unidas por punto y coma. También mantiene la lectura causal final de ὅτι y el valor literal de χρίω como «ungir».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece, por lo que se mantiene «Dios».
  - Se conserva «Espíritu Santo» con artículo por naturalidad y para expresar referencia personal.
  - «Oprimidos» refleja el participio pasivo plural y evita trivializar la violencia del verbo compuesto griego.
  - No se introduce «Cristo» porque el griego no contiene Χριστός en este versículo y la auditoría inglesa preserva «anointed» sin glosa doctrinal.
