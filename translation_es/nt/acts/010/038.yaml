    rationale: Aunque el inglés auditado usa «how», en español después de «Jesús de Nazaret:» la formulación más natural y equivalente es «que Dios lo ungió...». «Cómo» puede leerse como interrogativo indirecto o sonar forzado.
  - severity: low
    issue: «pasó haciendo el bien» es aceptable pero menos idiomático que «anduvo haciendo el bien»
    rationale: διῆλθεν describe actividad itinerante. «Anduvo haciendo el bien» transmite mejor ese matiz en español ampliamente legible.
  - severity: medium
    issue: La nota [a] añade explicación teológica en vez de preservar una alternativa relevante del expediente inglés
    rationale: 'Las notas deben conservar alternativas significativas o resolver ambigüedad real. Aquí la nota doctrinal no es necesaria y desplaza una alternativa útil: «Jesús de Nazaret» / «Jesús de Nazaret» como formulación independiente.'
  revised_spanish_text: 'Jesús de Nazaret[a]: que Dios lo ungió con el Espíritu Santo y con poder; anduvo haciendo el bien y sanando a todos los oprimidos por el diablo, porque Dios estaba con él[b].'
