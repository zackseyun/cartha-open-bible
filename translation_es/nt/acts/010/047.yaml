translation:
  language: es
  text: ¿Acaso puede alguien impedir el agua[a] para que estas personas no sean bautizadas[b]? Porque han recibido el Espíritu Santo igual que nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prohibir el agua» o «impedir que estas personas sean bautizadas».
    reason: lexical_alternative
  - marker: b
    text: O «¿puede?».
    reason: previous_rendering
lexical_decisions:
- source_word: Μήτι
  english_pob_choice: Surely ... can he?
  chosen_spanish: ¿Acaso ... puede ...?
  alternatives_spanish:
  - ¿No será que ...?
  - ¿Puede ser que ...?
  lexicon: BDAG
  rationale: Μήτι introduce una pregunta retórica que espera respuesta negativa. En español, «¿Acaso ...?» conserva bien ese matiz sin volverlo declarativo ni excesivamente interpretativo.
- source_word: τὸ ὕδωρ
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - el agua del bautismo
  - el agua
  lexicon: BDAG
  rationale: El artículo y el objeto definido se conservan. En contexto se trata del agua para el bautismo, pero el texto no explicita más que «el agua».
- source_word: δύναται κωλῦσαί τις
  english_pob_choice: no one can withhold
  chosen_spanish: alguien puede impedir
  alternatives_spanish:
  - alguien puede prohibir
  - alguien puede estorbar
  lexicon: BDAG
  rationale: La construcción expresa si alguien tiene la capacidad de obstaculizar. «Impedir» cubre bien el sentido de κωλύω en un español natural, sin cargar el verso con una formulación más técnica de la necesaria.
- source_word: τοῦ μὴ βαπτισθῆναι
  english_pob_choice: so that these people should not be baptized
  chosen_spanish: para que estos no sean bautizados
  alternatives_spanish:
  - para que no reciban el bautismo
  - para impedir que estos sean bautizados
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa prevención. En español, «para que ... no sean bautizados» reproduce esa fuerza de propósito/resultado negativo con claridad.
- source_word: τούτους
  english_pob_choice: these people
  chosen_spanish: estos
  alternatives_spanish:
  - estas personas
  - estos hombres
  lexicon: BDAG
  rationale: El referente está claro por el contexto; en español, el demostrativo solo evita sobreespecificar el género y sigue siendo natural.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: ellos que
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: BDAG
  rationale: 'La relativa añade la razón identificadora: son los que ya recibieron el Espíritu. «Ellos que» suena menos elegante que «quienes», pero mantiene la referencia personal explícita y la conexión causal del contexto narrativo.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  - el Espíritu Santo
  lexicon: BDAG
  rationale: Se mantiene la forma estable en español para la tercera persona divina; además, «Espíritu Santo» preserva el valor personal y teológico de la expresión.
- source_word: ἔλαβον
  english_pob_choice: have received
  chosen_spanish: recibieron
  alternatives_spanish:
  - han recibido
  - obtuvieron
  lexicon: BDAG
  rationale: El aoristo señala un hecho ya ocurrido. En español, el pretérito simple funciona bien para el evento completado dentro de la narración.
- source_word: ὡς καὶ ἡμεῖς
  english_pob_choice: just as we have
  chosen_spanish: como también nosotros
  alternatives_spanish:
  - igual que nosotros
  - así como nosotros
  lexicon: BDAG
  rationale: La comparación deja claro que la experiencia de ellos coincide con la de los creyentes judíos presentes. «Como también nosotros» conserva la equivalencia sin añadir énfasis no presente en el griego.
theological_decisions:
- issue: Relación entre la recepción del Espíritu y el bautismo en agua
  english_pob_reading: The verse states that these people have already received the Holy Spirit, and on that basis Peter argues that water baptism should not be withheld.
  chosen_spanish_reading: El versículo afirma que estos ya recibieron el Espíritu Santo, y sobre esa base Pedro razona que no debe impedírseles el bautismo en agua.
  alternative_spanish_readings:
  - Una redacción que haga parecer simultáneos Espíritu y bautismo
  - Una formulación que reduzca el peso argumentativo de la recepción previa del Espíritu
  rationale: 'La secuencia del griego y del argumento narrativo deben mantenerse: la recepción del Espíritu precede al bautismo en agua y sirve de fundamento para no retenerlo. No se resuelve la tensión teológica con una fórmula confesional ajena al texto.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción se ajusta a la revisión del inglés que separó la cláusula explicativa y precisó el sentido de τοῦ μὴ βαπτισθῆναι; en español se reflejó con una cláusula final negativa natural y una segunda proposición que explica la base del argumento.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» por consistencia con la terminología POB para πνεῦμα τὸ ἅγιον.
  - Se usa «bautizados» en lugar de una glosa más amplia para no desdibujar el acto concreto del texto.
  - Se evitó «SEÑOR» o «Cristo», pues no aparecen en este versículo.
  - La pregunta retórica se conserva con «¿Acaso ...?» para reproducir el μήτι sin forzar una traducción literal inglesa.
