translation:
  language: es
  text: 'Entonces Pedro abrió la boca y dijo[b][a]: «En verdad comprendo que Dios no hace acepción de personas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En verdad entiendo» o «A decir verdad, percibo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no hace acepción de personas», es decir, no muestra favoritismo ni parcialidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνοίξας ... τὸ στόμα
  english_pob_choice: opened his mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - comenzó a hablar
  - abrió la boca
  lexicon: BDAG
  rationale: La expresión griega es idiomática y marca una declaración solemne. En español, «abrió su boca» conserva el valor retórico y la cercanía formal del original mejor que una paráfrasis más libre, aunque «comenzó a hablar» sería una equivalencia idiomática posible.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ avanza la narración. «Entonces» mantiene el flujo discursivo con naturalidad en español y conserva la relación narrativa sin volverla enfática de más.
- source_word: Ἐπ’ ἀληθείας
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - De veras
  - Ciertamente
  lexicon: BDAG
  rationale: La frase expresa afirmación genuina y reconocimiento real. «En verdad» reproduce bien la fuerza afirmativa sin sonar forzado y deja abierta la misma gama de matices que el inglés POB indicó.
- source_word: καταλαμβάνομαι
  english_pob_choice: I understand
  chosen_spanish: comprendo
  alternatives_spanish:
  - entiendo
  - me doy cuenta
  - capto
  lexicon: BDAG
  rationale: El contexto muestra una percepción o reconocimiento recién asentado. «Comprendo» comunica bien esa toma de conciencia; «entiendo» también sería posible, pero «comprendo» suena ligeramente más solemne y adecuado al tono del pasaje.
- source_word: προσωπολήμπτης
  english_pob_choice: one who shows partiality
  chosen_spanish: hace acepción de personas
  alternatives_spanish:
  - muestra favoritismo
  - hace favoritismos
  - es parcial
  lexicon: BDAG
  rationale: El griego describe a alguien que trata a las personas con favoritismo o parcialidad. La locución española «hacer acepción de personas» es un equivalente tradicional y preciso para este concepto bíblico, y conserva el matiz personal del sustantivo mejor que una mera adjetivación.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  - Dios mismo
  lexicon: BDAG
  rationale: Renderizamos θεός como «Dios» de forma directa y estándar. La construcción predicativa española fluye naturalmente como «Dios no hace acepción de personas».
theological_decisions:
- issue: Imparcialidad divina sin suavizar la afirmación bíblica
  english_pob_reading: God is not one who shows partiality
  chosen_spanish_reading: Dios no hace acepción de personas
  alternative_spanish_readings:
  - Dios no muestra favoritismo
  - Dios no es parcial
  - Dios no es un respetador de personas
  rationale: La frase bíblica afirma que Dios recibe a las personas sin favoritismo. Se preserva el enunciado clásico «acepción de personas», porque en español bíblico transmite con precisión la idea de favoritismo personal sin borrar la tensión lexical del original.
  doctrine_reference: Hechos 10:34; imparcialidad de Dios en la recepción de las personas
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el audit trail inglés POB. Se mantuvo la apertura solemne de la frase inicial y se conservó la expresión bíblica tradicional «acepción de personas» por su precisión semántica y su transparencia respecto del original. No se introdujeron expansiones doctrinales ni paráfrasis no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, conforme al estándar del proyecto.
  - Se prefirió una equivalencia idiomática bíblica para προσωπολήμπτης, preservando el matiz de parcialidad personal.
  - «En verdad» y «comprendo» reflejan el valor de reconocimiento genuino indicado en el audit trail inglés.
  - La puntuación y el tono buscan ser publicables y reverentes sin arcaísmo innecesario.
