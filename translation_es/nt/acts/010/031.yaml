translation:
  language: es
  text: 'Y dijo: «Cornelio, tu oración ha sido escuchada, y tus limosnas[a] han sido recordadas delante de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus dádivas caritativas» o «tus actos de misericordia»; el término griego se refiere a dádivas o acciones misericordiosas para con los necesitados.
