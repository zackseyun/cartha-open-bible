lexical_decisions:
- source_word: φησί
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo natural conviene el pretérito simple. «Dijo» conserva el valor reportativo sin forzar un presente artificial.
- source_word: Κορνήλιε
  english_pob_choice: Cornelius
  chosen_spanish: Cornelio
  alternatives_spanish:
  - Cornelius
  lexicon: Transliteración estándar del nombre propio
  rationale: 'El nombre se adapta a la forma española usual y eclesiásticamente inteligible: «Cornelio».'
- source_word: εἰσηκούσθη
  english_pob_choice: has been heard
  chosen_spanish: ha sido escuchada
  alternatives_spanish:
  - ha sido oída
  - fue escuchada
  lexicon: BDAG
  rationale: El aoristo pasivo comunica que la oración recibió respuesta/atención. «Ha sido escuchada» preserva el resultado vigente y suena natural en español.
- source_word: προσευχὴ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - petición
  - plegaria
  lexicon: BDAG
  rationale: «Oración» es el equivalente normal y adecuado para προσευχή en este contexto, y conserva el singular del griego.
- source_word: ἐλεημοσύναι
  english_pob_choice: alms
  chosen_spanish: limosnas
  alternatives_spanish:
  - almosnas
  - obras de misericordia
  - donativos caritativos
  lexicon: BDAG
  rationale: ἐλεημοσύναι denota dádivas o acciones de misericordia para con los necesitados. «Limosnas» retiene la referencia concreta a dádivas de ayuda y sigue la precisión más formal adoptada en la revisión inglesa.
- source_word: ἐμνήσθησαν
  english_pob_choice: have been remembered
  chosen_spanish: han sido recordadas
  alternatives_spanish:
  - fueron recordadas
  - han venido a memoria
  lexicon: BDAG
  rationale: El pasivo aoristo plural expresa que esas limosnas quedaron en memoria/consideración. «Han sido recordadas» mantiene la pasiva y el sentido relacional sin añadir matices no presentes.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: «Delante de Dios» reproduce bien ἐνώπιον con valor espacial y evaluativo. Mantiene la formulación sobria y formal del POB sin perder la fuerza teológica del reconocimiento divino.
theological_decisions:
- issue: Sentido de las limosnas de Cornelio
  english_pob_reading: Rendered ἐλεημοσύναι as 'alms' for a more precise and formal register, while not turning the verse into a statement of merit.
  chosen_spanish_reading: «limosnas» conserva el gesto concreto de dar a los necesitados sin convertir el texto en una afirmación doctrinal de mérito.
  alternative_spanish_readings:
  - obras de misericordia
  - donativos caritativos
  rationale: El texto elogia actos concretos de misericordia; la traducción debe preservar esa concreción sin sobrecargar el pasaje con inferencias soteriológicas.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Lenguaje de recuerdo divino
  english_pob_reading: Retained 'have been remembered before God' as covenantal/relational language rather than paraphrasing to 'God has noticed.'
  chosen_spanish_reading: «han sido recordadas delante de Dios» conserva el idiomа bíblico de memoria/recordación con peso relacional y evaluativo.
  alternative_spanish_readings:
  - Dios las ha notado
  - Dios se ha fijado en ellas
  rationale: «Recordadas» preserva la imagen bíblica sin reducirla a mera observación. Así se mantiene la gravedad del reconocimiento divino y la tensión idiomática del pasivo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente optó por «alms» en lugar de «acts of charity» para dar mayor precisión y un registro más formal. La presente versión española sigue esa preferencia con «limosnas», manteniendo el valor concreto de ἐλεημοσύναι y la pasiva perfecta en las acciones descritas.
  spanish_consistency_notes:
  - 'Se mantuvo la relación entre las dos cláusulas con paralelismo simple: oración/limosnas, escuchada/recordadas.'
  - Se eligió un registro formal y bíblico, pero con sintaxis española natural.
  - Se preservó la referencia a Dios con «delante de Dios», evitando sustituirla por paráfrasis explicativa.
  - La nota al pie se ancla en «limosnas» porque en español también puede percibirse una diferencia entre «limosnas» y «obras de misericordia».
