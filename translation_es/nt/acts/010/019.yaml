translation:
  language: es
  text: 'Mientras Pedro meditaba sobre la visión, el Espíritu le dijo: «He aquí, hombres te buscan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te están buscando».
    reason: lexical_alternative
lexical_decisions:
- source_word: διενθυμουμένου
  english_pob_choice: was pondering
  chosen_spanish: meditaba
  alternatives_spanish:
  - estaba ponderando
  - estaba reflexionando sobre
  - consideraba
  lexicon: BDAG
  rationale: El participio expresa una reflexión interior continua. En español, «meditaba» comunica bien ese proceso mental sostenido sin sonar forzado; mantiene el sentido deliberado de la acción.
- source_word: περὶ τοῦ ὁράματος
  english_pob_choice: the vision
  chosen_spanish: sobre la visión
  alternatives_spanish:
  - acerca de la visión
  - de la visión
  lexicon: BDAG
  rationale: La construcción griega indica el contenido de la reflexión. En español, «meditaba sobre la visión» es natural y conserva el objeto de la meditación.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto narrativo de Hechos, se trata del Espíritu divino que guía a Pedro. «El Espíritu» conserva la cercanía al griego, que no añade ἅγιον.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le contó
  lexicon: BDAG
  rationale: Es una equivalencia directa, breve y natural en español para el verbo de decir con dativo indirecto.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Fíjate
  lexicon: BDAG
  rationale: «Ἰδού» funciona como marcador discursivo de atención. «Mira» preserva ese impulso apelativo en un español actual y digno.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: unos hombres
  alternatives_spanish:
  - hombres
  - unos varones
  lexicon: BDAG
  rationale: El griego usa ἄνδρες, que puede señalar varones adultos. En español, «unos hombres» transmite el dato narrativo de manera natural; se evita neutralizarlo a «personas».
- source_word: ζητοῦντές σε
  english_pob_choice: are seeking you
  chosen_spanish: te buscan
  alternatives_spanish:
  - te están buscando
  - te andan buscando
  lexicon: BDAG
  rationale: ζητέω puede significar «buscar» o «buscar a alguien»; en español, «te buscan» es idiomático y mantiene la idea de que están en tu busca. La nota de alternativa lexical preserva la posibilidad de «buscarte» frente a «buscarte» en sentido más solemne.
theological_decisions:
- issue: Referente de τὸ πνεῦμα
  english_pob_reading: the Spirit refers to the Holy Spirit speaking to Peter
  chosen_spanish_reading: el Espíritu se refiere al Espíritu divino que habla a Pedro
  alternative_spanish_readings:
  - un impulso espiritual indefinido
  - un espíritu no especificado
  rationale: En Hechos 10, el hablante es el Espíritu que dirige la misión. Traducir «el Espíritu» conserva esa afirmación sin añadir «Santo» donde el griego no lo dice explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: Valor de ἄνδρες
  english_pob_reading: men
  chosen_spanish_reading: hombres varones adultos
  alternative_spanish_readings:
  - personas
  - visitantes
  rationale: El término griego es masculino específico. La versión española mantiene el referente masculino sin despersonalizarlo ni convertirlo en un genérico neutro.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó «still» porque no está explícito en el griego y prefirió un registro más formal para Ἰδοὺ. En español se optó por no añadir un equivalente de «todavía» y por usar «Mira» como marcador de atención natural; no se incluyó nota de variante porque la frase principal ya recoge la fuerza discursiva sin tensionar el texto.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por el contexto personal/divino de Hechos 10.
  - Se evita «Señor» como sustituto de YHWH porque este versículo no contiene el nombre divino.
  - Se mantiene un registro sobrio y contemporáneo, sin arcaísmos innecesarios.
  - No se incluyeron notas al pie porque la redacción final no deja una alternativa obligatoria que deba anclarse en el texto.
