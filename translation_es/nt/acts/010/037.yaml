revisions:
- from: Ustedes mismos saben lo que sucedió[a] por toda Judea, comenzando desde Galilea, después del bautismo que proclamó Juan[b],
  to: Ustedes mismos saben lo que sucedió[a] por toda Judea, comenzando en Galilea, después del bautismo que proclamó Juan[b],
