  text: ὑμεῖς οἴδατε τὸ γενόμενον ῥῆμα καθ’ ὅλης τῆς Ἰουδαίας, ⸀ἀρξάμενος ἀπὸ τῆς Γαλιλαίας μετὰ τὸ βάπτισμα ὃ ἐκήρυξεν Ἰωάννης,
base_translation:
  language: en
  yaml_path: translation/nt/acts/010/037.yaml
  text: You yourselves know the thing that happened throughout all Judea[a], beginning from Galilee after the baptism that John proclaimed[b],
  footnotes:
  - marker: a
    text: Or 'the word/message that spread throughout all Judea.' The Greek ῥῆμα can mean 'word,' 'message,' or 'matter.'
    reason: lexical_alternative
  - marker: b
    text: The Greek participle 'beginning' is syntactically awkward but clearly marks the starting point of the matter in Galilee.
    reason: lexical_alternative
