translation:
  language: es
  text: Ustedes mismos saben lo que sucedió[a] por toda Judea, comenzando en Galilea, después del bautismo que proclamó Juan[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra / mensaje que se difundió por toda Judea». El griego ῥῆμα puede significar «palabra», «mensaje» o «asunto».
    reason: lexical_alternative
  - marker: b
    text: El participio griego «comenzando» es sintácticamente irregular, pero señala con claridad el punto de partida de lo sucedido en Galilea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes
  - Ustedes mismos lo saben
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis; «ustedes mismos» conserva esa fuerza enfática de manera natural en español.
- source_word: οἴδατε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - están enterados de
  lexicon: BDAG
  rationale: Aunque la forma griega es perfecta, aquí funciona con sentido presente. «Saben» es la equivalencia más natural y clara en español.
- source_word: τὸ γενόμενον ῥῆμα
  english_pob_choice: the thing that happened
  chosen_spanish: lo que sucedió
  alternatives_spanish:
  - el asunto que ocurrió
  - la cosa que sucedió
  - el hecho que sucedió
  lexicon: BDAG
  rationale: ῥῆμα puede abarcar «palabra», «mensaje» o «asunto», pero con γενόμενον y la extensión geográfica el sentido apunta al acontecimiento conocido públicamente. En español, «lo que sucedió» preserva ese alcance sin forzar un sustantivo demasiado estrecho.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας
  english_pob_choice: throughout all Judea
  chosen_spanish: por toda Judea
  alternatives_spanish:
  - a lo largo de toda Judea
  - en toda Judea
  - por toda la región de Judea
  lexicon: BDAG
  rationale: La preposición con genitivo expresa extensión por una región. «Por toda Judea» es idiomático y conserva la idea de difusión amplia.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la tierra de Judea
  lexicon: BDAG
  rationale: Como topónimo en Hechos, se mantiene la forma geográfica estándar.
- source_word: ἀρξάμενος
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - habiendo comenzado
  - empezando
  lexicon: BDAG
  rationale: El participio es sintácticamente algo suelto, pero marca claramente el punto de inicio. «Comenzando» preserva la relación temporal sin sobredeterminar la gramática.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  - en Galilea
  lexicon: BDAG
  rationale: ἀπό indica origen o punto de partida. «Desde Galilea» refleja bien ese valor.
- source_word: μετὰ τὸ βάπτισμα
  english_pob_choice: after the baptism
  chosen_spanish: después del bautismo
  alternatives_spanish:
  - tras el bautismo
  - luego del bautismo
  lexicon: BDAG
  rationale: μετά con acusativo es temporal aquí. «Después del bautismo» es claro, natural y fiel.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - inmersión
  lexicon: BDAG
  rationale: «Bautismo» es la equivalencia estable y contextualmente adecuada en español bíblico; «inmersión» sería más interpretativa y menos idiomática.
- source_word: ὃ ἐκήρυξεν Ἰωάννης
  english_pob_choice: that John proclaimed
  chosen_spanish: que proclamó Juan
  alternatives_spanish:
  - que predicó Juan
  - que anunció Juan
  lexicon: BDAG
  rationale: κηρύσσω tiene fuerza de proclamación/heraldo. «Proclamó» conserva mejor ese matiz que «predicó», sin volverlo específicamente eclesiástico.
theological_decisions:
- issue: Valor de ῥῆμα en el resumen de Pedro
  english_pob_reading: Rendered as 'thing' to encompass the public events/message concerning Jesus.
  chosen_spanish_reading: Se traduce como «lo que sucedió», para abarcar el acontecimiento público y su resonancia conocida.
  alternative_spanish_readings:
  - la palabra
  - el mensaje
  - el hecho
  rationale: En el contexto, Pedro resume una realidad ampliamente conocida en Judea y la vincula con un inicio en Galilea. No se trata solo de una palabra aislada, sino del complejo de evento y anuncio; la formulación elegida conserva esa amplitud sin añadir interpretación doctrinal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Participio ἀρξάμενος con antecedente neutro
  english_pob_reading: Taken with the preceding 'matter' as a neuter sense construction in English.
  chosen_spanish_reading: 'Se deja como una construcción natural en español: «comenzando desde Galilea», ligada al hecho mencionado.'
  alternative_spanish_readings:
  - comenzó desde Galilea
  - el cual comenzó desde Galilea
  rationale: 'El griego presenta una tensión sintáctica conocida: un participio masculino que apunta al hecho neutro anterior. El español suaviza la construcción sin borrar la relación de inicio ni imponer una corrección textual que no está en el manuscrito base.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «matter» a «thing» para ῥῆμα, manteniendo la interpretación de un acontecimiento/mensaje ampliamente conocido. La propuesta española sigue esa revisión al optar por «lo que sucedió», que conserva la amplitud semántica sin estrecharlo a «palabra».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - «Bautismo» se conserva como término bíblico estándar; no se introduce «inmersión» porque el contexto narrativo no exige esa explicitación.
  - «Proclamó» preserva la fuerza heraldicoproclamativa de κηρύσσω sin desplazarlo hacia un registro eclesiástico más cerrado.
  - La estructura con dos comas reproduce la relación sintáctica del participio y la pausa narrativa del original.
