translation:
  language: es
  text: 'Y les dijo: «Ustedes mismos[a] saben cuán ilícito es para un hombre judío asociarse con o visitar a un extranjero[b]; pero Dios me ha mostrado que no llame común[c] ni impuro a ningún ser humano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El pronombre explícito de Ὑμεῖς añade énfasis: «ustedes mismos».'
    reason: lexical_alternative
  - marker: b
    text: O «a un gentil» para «a un extranjero» (ἀλλοφύλῳ), literalmente alguien de otro pueblo.
    reason: lexical_alternative
  - marker: c
    text: «Común» traduce κοινόν, un término distinto de «impuro» (ἀκάθαρτον); la pareja preserva categorías del lenguaje judío de pureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη τε
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y les dijo
  lexicon: BDAG
  rationale: La partícula τε es ligeramente conectiva; «Y dijo» mantiene el flujo narrativo sin añadir una marca temporal más fuerte de la que el griego exige. Se omitió el pronombre explícito porque el objeto indirecto «a ellos» ya está presente en español.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - hacia ellos
  lexicon: BDAG
  rationale: La construcción normal en español para introducir el destinatario del habla es «a ellos». «Les» sería más breve, pero el sustantivo explícito ayuda a la claridad en una frase de discurso directo.
- source_word: Ὑμεῖς ἐπίστασθε
  english_pob_choice: You yourselves know
  chosen_spanish: Ustedes mismos saben
  alternatives_spanish:
  - Ustedes saben
  - Bien saben ustedes
  lexicon: BDAG
  rationale: El pronombre enfático ὑμεῖς se refleja con «ustedes mismos», que preserva el énfasis del original. «Saben» expresa el valor de ἐπίστασθε como conocimiento consciente o bien sabido.
- source_word: ὡς ἀθέμιτόν ἐστιν
  english_pob_choice: how unlawful it is
  chosen_spanish: cuán ilícito es
  alternatives_spanish:
  - qué tan prohibido es
  - cuán no permitido es
  lexicon: BDAG
  rationale: ἀθέμιτος denota lo que no está permitido conforme a ley o norma aceptada. «Ilícito» preserva mejor ese peso jurídico/convencional que «impropio», y suena natural en español bíblico contemporáneo.
- source_word: ἀνδρὶ Ἰουδαίῳ
  english_pob_choice: for a Jewish man
  chosen_spanish: para un hombre judío
  alternatives_spanish:
  - para un judío
  - para un varón judío
  lexicon: BDAG
  rationale: El griego es singular y masculino. «Hombre judío» conserva ese dato sin volver la frase artificial; además mantiene el contraste de la norma social referida a un varón israelita/judío.
- source_word: κολλᾶσθαι
  english_pob_choice: to associate with
  chosen_spanish: asociarse
  alternatives_spanish:
  - unirse
  - pegarse a
  - mantener compañía con
  lexicon: BDAG
  rationale: El verbo implica adherirse o unirse socialmente. «Asociarse» transmite bien la relación interpersonal en un español digno y claro, sin perder la idea de cercanía relacional.
- source_word: ἢ προσέρχεσθαι
  english_pob_choice: or visit
  chosen_spanish: o acercarse
  alternatives_spanish:
  - o visitar
  - o ir a
  lexicon: BDAG
  rationale: En este contexto el punto no es solo «ir» sino acercarse en el marco de trato social restringido. «Acercarse» conserva el valor espacial/relacional del verbo sin introducir la interpretación doméstica que puede tener «visitar».
- source_word: ἀλλοφύλῳ
  english_pob_choice: a foreigner
  chosen_spanish: a un extranjero
  alternatives_spanish:
  - a un gentil
  - a alguien de otro pueblo
  lexicon: BDAG
  rationale: ἀλλόφυλος significa literalmente alguien de otro pueblo/raza. «Extranjero» es natural y conciso en español; en este contexto puede abarcar la distancia étnica y social señalada por el texto. La alternativa «gentil» queda como lectura interpretativa posible.
- source_word: κἀμοὶ
  english_pob_choice: but ... me
  chosen_spanish: pero a mí
  alternatives_spanish:
  - y a mí
  - sin embargo, a mí
  lexicon: BDAG
  rationale: La crasis une «y a mí», pero la contraposición del argumento en español se expresa mejor con «pero a mí». Se conserva la transición desde la norma conocida al caso personal de Pedro.
- source_word: ὁ θεὸς ἔδειξεν
  english_pob_choice: God has shown me
  chosen_spanish: Dios me ha mostrado
  alternatives_spanish:
  - Dios me mostró
  - Dios me ha enseñado
  lexicon: BDAG
  rationale: El aoristo griego puede traducirse de forma natural con presente perfecto en español para subrayar la vigencia de la revelación para la acción presente. «Ha mostrado» mantiene el matiz de revelación recibida sin sobreexplicar.
- source_word: μηδένα ... ἄνθρωπον
  english_pob_choice: no person
  chosen_spanish: a ningún ser humano
  alternatives_spanish:
  - a ninguna persona
  - a ningún hombre
  lexicon: BDAG
  rationale: ἄνθρωπος aquí es humano en sentido general, no masculino exclusivo. «Ser humano» preserva esa amplitud y evita restringir indebidamente el referente.
- source_word: κοινὸν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - profano
  - ordinario
  - impuro
  lexicon: BDAG
  rationale: En el léxico de pureza judío, κοινός designa lo común en el sentido de no consagrado o ritualmente ordinario/profanado. «Común» mantiene la distinción con ἀκάθαρτος sin fusionar ambas categorías.
- source_word: ἢ ἀκάθαρτον
  english_pob_choice: or unclean
  chosen_spanish: ni impuro
  alternatives_spanish:
  - ni inmundo
  - ni no limpio
  lexicon: BDAG
  rationale: ἀκάθαρτος es el término estándar de impureza ritual. Se traduce «impuro» para conservar la categoría de pureza/impureza. Se prefiere «ni» al segundo miembro para reflejar naturalmente la coordinación negativa del español tras «no llame».},{
theological_decisions:
- issue: Conservar la distinción entre «común» e «impuro» en el lenguaje de pureza
  english_pob_reading: The pair preserves Jewish purity-language categories.
  chosen_spanish_reading: Mantener «común» e «impuro» como categorías distintas.
  alternative_spanish_readings:
  - Unificar ambos términos como «impuro»
  - Explicar ambos solo como «prohibido»
  rationale: El versículo distingue κοινός de ἀκάθαρτος. La traducción española debe conservar esa tensión semántica, porque el texto no usa dos sinónimos exactos sino dos categorías relacionadas pero diferentes dentro del vocabulario de pureza judía.
  doctrine_reference: Hechos 10:28; léxico de pureza en la lectura tradicional del pasaje
- issue: Alcance humano de la prohibición divina
  english_pob_reading: no person
  chosen_spanish_reading: a ningún ser humano
  alternative_spanish_readings:
  - a ninguna persona
  - a ningún hombre
  rationale: El mandato revelado por Dios no se limita a varones adultos; se aplica a seres humanos en general. «Ser humano» expresa con claridad el alcance universal del objeto directo sin borrar el contexto histórico de la conversación de Pedro.
  doctrine_reference: Hechos 10:28; universalidad de la inclusión de las naciones en el relato de Cornelio
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés, pero se ajustó el ritmo para español natural: «Y dijo a ellos» > «Y dijo a ellos», con énfasis explícito en «ustedes mismos»; se mantuvo la distinción de pureza «común / impuro» y se eligió «ser humano» para μηδένα ... ἄνθρωπον. No se añadieron notas para κοινός/ἀκάθαρτος porque la distinción se preserva ya en la línea principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto griego o hebreo alude al nombre divino; aquí aparece ὁ θεός, por lo que corresponde «Dios».
  - Se prefirió «Mesías» solo cuando el título aparece en el original; este versículo no lo contiene.
  - Se mantuvo un registro bíblico moderno y digno, evitando tanto arcaísmos innecesarios como paráfrasis explicativas excesivas.
  - La negación final se reformuló con una construcción natural en español («que no llame...»), sin perder el sentido resultativo del infinitivo griego λέγειν.
