    rationale: El marcador aparece tras «ellos», pero la nota explica el pronombre enfático Ὑμεῖς («ustedes mismos»). Los marcadores deben aparecer donde pertenece la nota.
  - severity: medium
    issue: Falta la nota léxica sobre «común» frente a «impuro».
    rationale: El English POB preserva explícitamente la distinción entre κοινόν y ἀκάθαρτον. Como el español también usa dos términos distintos, conviene mantener esa nota para resguardar la racionalidad léxica documentada.
  - severity: low
    issue: «Y dijo a ellos» es menos idiomático que «Y les dijo».
    rationale: No es infiel, pero suena más forzado en español general. «Les dijo» conserva el sentido con mejor legibilidad.
  - severity: low
    issue: «Asociarse o acercarse a un extranjero» suena menos natural y menos contextual que «asociarse con o visitar a un extranjero».
    rationale: La propia auditoría inglesa justifica «visit» por el contexto de entrar o ir a la compañía/casa de un no judío. En español, «acercarse» puede sonar demasiado espacial y menos relacional.
