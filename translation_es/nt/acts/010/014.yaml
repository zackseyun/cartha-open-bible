translation:
  language: es
  text: 'Pero Pedro dijo[a]: «De ningún modo, Señor, pues nunca he comido nada común o impuro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nada contaminado e impuro». El griego distingue κοινόν («común») de ἀκάθαρτον («impuro»), por eso el texto principal conserva ambos términos por separado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδαμῶς
  english_pob_choice: By no means
  chosen_spanish: De ningún modo
  alternatives_spanish:
  - De ninguna manera
  - En absoluto
  lexicon: BDAG
  rationale: Expresa la negación enfática e idiomática de Pedro en un español natural y solemne, sin debilitar la fuerza del rechazo.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En este contexto de dirección reverente, 'Señor' conserva el peso de la vocación y coincide con el uso bíblico habitual sin perder dignidad.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la negativa de Pedro; 'porque' es la opción más clara y natural en español.
- source_word: οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  lexicon: BDAG
  rationale: Sostiene la negación absoluta de experiencia pasada que comunica el griego.
- source_word: ἔφαγον
  english_pob_choice: I have never eaten
  chosen_spanish: he comido
  alternatives_spanish:
  - he probado
  - comí
  lexicon: BDAG
  rationale: El aoristo aquí resume la experiencia vital hasta el presente; el pretérito perfecto compuesto en español transmite bien esa idea de 'nunca en mi vida'.
- source_word: πᾶν κοινὸν
  english_pob_choice: anything common
  chosen_spanish: nada común
  alternatives_spanish:
  - cosa común
  - algo común
  lexicon: BDAG
  rationale: El neutro sustantivado pide una expresión idiomática en español. 'Nada común' evita el calco y mantiene la distinción lexical entre 'común' y 'impuro'.
- source_word: ἀκάθαρτον
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - ritualmente impuro
  lexicon: BDAG
  rationale: En el marco de pureza judía, 'impuro' comunica bien ἀκάθαρτον en español contemporáneo y conserva la diferencia con κοινόν.
theological_decisions:
- issue: Distinción entre κοινόν y ἀκάθαρτον
  english_pob_reading: Render both terms distinctly as 'common and unclean'
  chosen_spanish_reading: Mantener la distinción como 'común' e 'impuro'
  alternative_spanish_readings:
  - Fusionar ambos términos como 'impuro'
  - Traducir ambos como 'contaminado'
  rationale: El griego presenta dos calificativos coordinados; traducirlos por separado evita resolver la tensión semántica y preserva el trasfondo de pureza ritual del discurso de Pedro.
  doctrine_reference: Preservar la tensión léxica y teológica del texto fuente sin simplificar categorías de pureza.
translation_notes:
  revision_awareness: Este borrador sigue el último pasaje revisado del inglés POB y adopta la solución que conserva dos términos distintos de pureza, trasladándolos al español con una formulación natural y publicable. Se evita depender mecánicamente del inglés y se atiende al valor aspectual del aoristo griego en un perfecto compuesto español.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριε conforme al uso devocional y al contexto de dirección reverente.
  - Se usa 'impuro' para ἀκάθαρτον y 'común' para κοινόν para no colapsar la distinción léxica del griego.
  - La negación enfática se vierte con 'De ningún modo' para conservar el tono de rechazo absoluto.
  - El marcador [a] aparece en el texto principal y está anclado a la glosa alternativa correspondiente.
