  glossary_alignment: '''Señor'' para κύριε está bien. La elección ''común'' para κοινόν y ''impuro'' para ἀκάθαρτον mantiene la distinción teológica requerida, aunque ''inmundo'' sería también posible; ''impuro'' encaja mejor con el español contemporáneo. No hay conflicto con la terminología de proyecto.'
