    text: O 'al firmamento'; la palabra griega puede significar tanto 'cielo' como 'cielo visible', aunque 'cielo' encaja mejor en el contexto de la visión.
    reason: alternative_reading
  revision_rationale: 'La revisión conserva la estructura del borrador pero corrige tres puntos: (1) ''la vasija'' se acerca más al valor léxico de σκεῦος que ''el objeto'', manteniendo en nota la alternativa contextual ''el lienzo''; (2) ''fue llevada hacia arriba'' refleja mejor ἀνελήμφθη que un simple ''fue llevada''; y (3) la nota sobre οὐρανός ahora ofrece una alternativa real (''al firmamento'') en vez de repetir el texto principal. También se ajusta ''enseguida'' a ''inmediatamente'' para mayor cercanía al registro y a la auditoría inglesa.'
