translation:
  language: es
  text: Esto sucedió tres veces[b], y inmediatamente la vasija[a] fue llevada hacia arriba al cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lienzo'; el griego dice 'la vasija' o 'el recipiente', pero el contexto más amplio lo identifica como algo con forma de lienzo.
    reason: lexical_alternative
  - marker: b
    text: O 'al firmamento'; la palabra griega puede significar tanto 'cielo' como 'cielo visible', aunque 'cielo' encaja mejor en el contexto de la visión.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esto mismo
  - Este hecho
  lexicon: BDAG
  rationale: El demostrativo neutro remite al episodio previamente narrado; 'Esto' preserva esa referencia anafórica sin añadir sustantivo innecesario.
- source_word: ἐγένετο
  english_pob_choice: happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - ocurrió
  - tuvo lugar
  lexicon: BDAG
  rationale: Expresa un evento narrativo de manera natural en español moderno y mantiene el matiz eventivo de γίνομαι.
- source_word: ἐπὶ τρίς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - por tres veces
  - trice
  lexicon: BDAG
  rationale: La expresión indica repetición exacta; 'tres veces' es la forma clara y natural en español.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Conserva la rapidez de la transición narrativa con un español vivo y digno; 'enseguida' suena natural sin perder fuerza.
- source_word: ἀνελήμφθη
  english_pob_choice: was taken up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue levantado
  - fue arrebatado
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀναλαμβάνω describe el movimiento ascendente del objeto. 'Fue llevado' transmite bien la dirección sin forzar una imagen excesiva.
- source_word: τὸ σκεῦος
  english_pob_choice: the vessel
  chosen_spanish: el objeto
  alternatives_spanish:
  - el recipiente
  - la vasija
  - el lienzo
  lexicon: BDAG
  rationale: σκεῦος es amplio y el contexto visionario muestra que no se trata de una vasija común. 'El objeto' evita decidir prematuramente entre 'vessel' y 'sheet', preservando la tensión lexical documentada.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo del todo
  - al cielo/la morada celestial
  lexicon: BDAG
  rationale: En español, 'cielo' comunica de modo natural el ámbito superior del que procede y al que vuelve la visión. Mantiene la posibilidad semántica de 'sky' y 'heaven' sin imponer una lectura demasiado teológica en el texto principal.
theological_decisions:
- issue: Alcance de οὐρανός en la visión de Pedro
  english_pob_reading: heaven, with a footnoted alternative 'sky'
  chosen_spanish_reading: cielo, con la alternativa implícita de 'cielo/atmósfera' indicada en nota
  alternative_spanish_readings:
  - cielo
  - cielo/atmósfera
  - firmamento
  rationale: El contexto visionario favorece una referencia al ámbito celestial, pero el término griego también puede designar el cielo visible. 'Cielo' funciona de manera sobria en español y permite conservar la ambigüedad contextual en la nota.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it beyond the text'
- issue: Identificación del τὸ σκεῦος en la escena
  english_pob_reading: the vessel, with footnote 'the sheet' as broader context
  chosen_spanish_reading: el objeto, con nota que señala 'el lienzo' como alternativa contextual
  alternative_spanish_readings:
  - el recipiente
  - la vasija
  - el lienzo
  rationale: La palabra griega es más amplia que 'lienzo' y la escena posterior esclarece la forma del objeto, pero no conviene sobreespecificar en el texto principal. 'Objeto' retiene la imprecisión lexical del original y deja que la nota conserve la alternativa contextual.
  doctrine_reference: 'Translation philosophy: keep lexical breadth where the Greek is broader than a single Spanish equivalent'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; la versión española conserva esa estabilidad, adaptando solo la elección léxica al natural español sin alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene 'cielo' para οὐρανός y 'objeto' para σκεῦος, preservando la amplitud semántica del griego.
  - '''Enseguida'' reproduce la inmediatez narrativa de εὐθὺς sin elevar demasiado el registro.'
  - El orden de la cláusula sigue de cerca el griego y el inglés auditado para sostener la claridad narrativa.
