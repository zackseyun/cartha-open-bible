revisions:
- from: Y cuando Pedro entró, Cornelio salió a su encuentro y, cayendo a sus pies, le rindió homenaje[a].
  to: Y cuando Pedro entró, Cornelio lo encontró, cayó a sus pies y le rindió homenaje[a].
  rationale: Se corrige una sobreinterpretación de συναντήσας αὐτῷ eliminando «salió», y se suaviza la secuencia narrativa con verbos finitos más naturales en español. Se conserva «le rindió homenaje» y la nota alternativa «lo adoró» conforme a la justificación léxica y teológica del POB.
