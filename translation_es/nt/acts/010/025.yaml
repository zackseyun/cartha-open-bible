review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: circunstancia temporal inicial, encuentro de Cornelio con Pedro, caída a sus pies y acto de προσκυνέω con nota alternativa. Sin embargo, «salió a su encuentro» añade un matiz de movimiento de salida que no está en συναντήσας αὐτῷ, que solo dice que lo encontró/se encontró con él. También «cayendo a sus pies» es menos directo que el aoristo participial narrativo, donde en español suena mejor «cayó a sus pies».'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para evitar expansión innecesaria y para sonar más natural narrativamente. «Cornelio lo encontró y cayó a sus pies» es más limpio y más pegado al texto que «salió a su encuentro y, cayendo...». «Le rindió homenaje» funciona bien en registro y sentido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de «le rindió homenaje» para προσεκύνησεν sigue correctamente la auditoría inglesa, y la nota con «lo adoró» preserva la alternativa léxica. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «salió a su encuentro» sobretraduce συναντήσας αὐτῷ
    rationale: El griego expresa el encuentro, no explícitamente que Cornelio saliera. La formulación actual añade una acción no exigida por la fuente.
  - severity: low
    issue: «cayendo a sus pies» es menos natural que un pretérito coordinado
    rationale: Aunque refleja el participio, en español narrativo «cayó a sus pies» preserva mejor la secuencia de acciones y la fuerza del gesto.
  revised_spanish_text: Y cuando Pedro entró, Cornelio lo encontró, cayó a sus pies y le rindió homenaje[a].
