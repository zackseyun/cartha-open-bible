translation:
  language: es
  text: Y cuando Pedro entró, Cornelio lo encontró, cayó a sus pies y le rindió homenaje[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoró». El verbo griego puede significar adoración o un acto de postración/homenaje, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἐγένετο τοῦ εἰσελθεῖν
  english_pob_choice: And when ... entered
  chosen_spanish: Y cuando ... entró
  alternatives_spanish:
  - Ahora, cuando ... entró
  - Y al entrar ...
  lexicon: BDAG
  rationale: La expresión introductoria marca la circunstancia temporal de modo narrativo. «Y cuando» conserva esa función y el valor conectivo de δέ sin forzar una construcción más literal pero menos natural en español.
- source_word: εἰσελθεῖν τὸν Πέτρον
  english_pob_choice: Peter entered
  chosen_spanish: Pedro entró
  alternatives_spanish:
  - Pedro vino adentro
  - Pedro estaba entrando
  lexicon: BDAG
  rationale: El infinitivo aoristo señala un evento completo; «entró» lo expresa con naturalidad y claridad en español, manteniendo a Pedro como sujeto explícito.
- source_word: συναντήσας αὐτῷ
  english_pob_choice: met him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - lo encontró
  - fue a recibirlo
  lexicon: BDAG
  rationale: El participio comunica el acto de encontrarse con Pedro. En español, «salió a su encuentro» refleja mejor la iniciativa de Cornelio que un simple «lo encontró», y sigue siendo fiel al encuentro personal del texto.
- source_word: πεσὼν ἐπὶ τοὺς πόδας
  english_pob_choice: fell at his feet
  chosen_spanish: cayendo a sus pies
  alternatives_spanish:
  - cayó a sus pies
  - postrándose a sus pies
  lexicon: BDAG
  rationale: La imagen corporal se conserva con «a sus pies». Se eligió la forma progresiva para enlazar con la acción principal y reflejar el valor participial del griego, sin perder la fuerza de abatimiento del gesto.
- source_word: προσεκύνησεν
  english_pob_choice: paid him homage
  chosen_spanish: le rindió homenaje
  alternatives_spanish:
  - lo adoró
  - se postró ante él
  lexicon: BDAG
  rationale: προσκυνέω puede abarcar adoración o un acto de reverencia/prostración según el contexto. Aquí, dado que Pedro rechazará ese gesto en el versículo siguiente porque también es hombre, «le rindió homenaje» preserva la reverencia sin afirmar que se trate necesariamente de adoración divina. Se mantiene abierta la alternativa más fuerte en nota.
theological_decisions:
- issue: Sentido de προσκυνέω dirigido a Pedro
  english_pob_reading: paid him homage
  chosen_spanish_reading: le rindió homenaje
  alternative_spanish_readings:
  - lo adoró
  - se postró ante él
  rationale: El contexto inmediato sugiere un acto de excesiva reverencia o postración, no una afirmación doctrinal de adoración divina a Pedro. La traducción debe conservar la ambigüedad lexical y dejar que el v. 26 aclare por qué el gesto resulta inapropiado.
  doctrine_reference: Hechos 10:26; filosofía de traducción §§1, 3, 6
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide en alto grado con la lectura disponible del griego: la cláusula temporal se entiende naturalmente como un evento narrativo, y προσκυνέω admite tanto «adorar» como un gesto de reverencia. No se requieren revisiones adicionales respecto del paso anterior del proyecto en inglés.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Pedro» se conserva como nombre propio estándar.
  - «Homenaje» se usa para mantener la tensión lexical de προσκυνέω sin adelantar una lectura doctrinal más fuerte de la que el contexto exige.
  - La puntuación española separa correctamente las acciones sucesivas y mantiene el ritmo narrativo del griego.
