translation:
  language: es
  text: 'Por eso también vine sin poner objeción cuando fui mandado a llamar[a]. Así que pregunto[b]: ¿por qué razón me mandaron a llamar?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sin vacilación’. El griego, más literalmente, significa ‘sin objeción’ o ‘sin disputar’.
    reason: lexical_alternative
  - marker: b
    text: 'O ‘¿por qué me mandaron a llamar?’. Más literalmente: ‘¿por qué razón me mandaron a llamar?’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa la relación inferencial inmediata con el contexto previo de manera natural en español, conservando el valor conclusivo del griego.
- source_word: καὶ
  english_pob_choice: —
  chosen_spanish: también
  alternatives_spanish:
  - —
  - además
  lexicon: BDAG
  rationale: El καί aquí añade énfasis junto a διό; en español conviene reflejar esa intensificación con 'también', sin volver la frase pesada.
- source_word: ἀναντιρρήτως
  english_pob_choice: without objection
  chosen_spanish: sin oponerme
  alternatives_spanish:
  - sin objeción
  - sin protestar
  - sin disputar
  lexicon: BDAG
  rationale: El adverbio señala ausencia de resistencia o réplica. 'Sin oponerme' comunica bien la idea de no resistirse ni discutir, con naturalidad idiomática en español.
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - yo vine
  - llegué
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se traduce de forma directa como 'vine'; mantiene la sencillez verbal del original.
- source_word: μεταπεμφθείς
  english_pob_choice: when I was sent for
  chosen_spanish: cuando fui mandado a llamar
  alternatives_spanish:
  - habiendo sido mandado a llamar
  - cuando fui llamado
  lexicon: BDAG
  rationale: El pasivo de μεταπέμπομαι indica que alguien envió por él. 'Mandado a llamar' conserva esa idea de convocatoria/summons y es idiomático en español.
- source_word: πυνθάνομαι
  english_pob_choice: I ask
  chosen_spanish: pregunto
  alternatives_spanish:
  - inquiero
  - consulto
  lexicon: BDAG
  rationale: El verbo introduce la pregunta que sigue. 'Pregunto' es el equivalente natural y mantiene la función discursiva del griego.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca transición a la pregunta siguiente; 'Así que' suena natural en español y conserva el valor inferencial/discursivo.
- source_word: τίνι λόγῳ
  english_pob_choice: for what reason
  chosen_spanish: por qué razón
  alternatives_spanish:
  - por qué
  - con qué motivo
  - por qué motivo
  lexicon: BDAG
  rationale: Literalmente, '¿por qué razón?'. 'Por qué razón' conserva más explícitamente el matiz de λόγος como motivo/razón, sin perder fluidez.
- source_word: μετεπέμψασθέ με
  english_pob_choice: did you send for me
  chosen_spanish: me mandaron a llamar
  alternatives_spanish:
  - me llamaron
  - me enviaron a llamar
  lexicon: BDAG
  rationale: El verbo medio indica que lo hicieron venir por medio de una convocatoria. 'Mandaron a llamar' es la forma más natural en español para reproducir el sentido de 'send for/summon'.
translation_notes:
  revision_awareness: Se revisó la sintaxis para conservar el enlace inferencial de διὸ / οὖν y la relación pasiva de μεταπεμφθείς sin traducir mecánicamente desde el inglés. Se prefirió una formulación española natural que mantiene el sentido de convocatoria y la apertura a una pregunta formal sobre la razón del llamado.
  spanish_consistency_notes:
  - 'Se mantiene una distinción clara entre ''vine'' y ''me mandaron a llamar'' para reflejar la voz del griego: llegada personal y acción de otro que lo convocó.'
  - '''Sin oponerme'' preserva la fuerza de resistencia/objeción de ἀναντιρρήτως, evitando suavizarlo a ''sin dudar'' sin apoyo textual.'
  - '''Por qué razón'' conserva el carácter más analítico de τίνι λόγῳ frente al simple ''por qué''.'
  - La frase completa suena natural en español de lectura pública y conserva el tono breve y formal del interlocutor en Hechos 10:29.
