translation:
  language: es
  text: Él está hospedado con cierto Simón[a], un curtidor, cuya casa está junto al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está quedándose con cierto Simón, un curtidor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: He
  chosen_spanish: Éste
  alternatives_spanish:
  - Él
  - Este hombre
  lexicon: BDAG
  rationale: En el contexto, οὗτος retoma a Pedro. En español, «Éste» mantiene la referencia demostrativa sin sonar tan repetitivo como un nombre propio y evita añadir información no presente en el griego.
- source_word: ξενίζεται
  english_pob_choice: is lodging
  chosen_spanish: está hospedado
  alternatives_spanish:
  - está alojado
  - está quedándose
  - está siendo recibido como huésped
  lexicon: BDAG
  rationale: El presente pasivo/medio de ξενίζω expresa que alguien está recibiendo hospedaje o siendo alojado. «Está hospedado» conserva esa idea de estancia en casa ajena con una forma natural en español.
- source_word: παρά τινι
  english_pob_choice: with a certain
  chosen_spanish: con un cierto
  alternatives_spanish:
  - con un tal
  - en casa de un cierto
  - junto a un cierto
  lexicon: BDAG
  rationale: παρά con dativo indica cercanía o asociación con una persona; aquí la relación se expresa bien con «con». «Un cierto» preserva la indefinición de τις sin precisar más de lo que el texto dice.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simón
  lexicon: Nombre propio
  rationale: El nombre propio se vierte de manera estándar al español como «Simón».
- source_word: βυρσεῖ
  english_pob_choice: a tanner
  chosen_spanish: un curtidor
  alternatives_spanish:
  - un peletero
  - un trabajador del cuero
  lexicon: BDAG
  rationale: βυρσεύς designa específicamente a quien trabaja las pieles; en español «curtidor» comunica con precisión el oficio y es más exacto que el término más amplio «trabajador del cuero».
- source_word: ᾧ ἐστιν οἰκία
  english_pob_choice: whose house is
  chosen_spanish: en cuya casa hay
  alternatives_spanish:
  - cuya casa está
  - que tiene casa
  - en cuya casa está
  lexicon: BDAG
  rationale: La construcción relativa con ἐστιν οἰκία funciona idiomáticamente como localización de la casa de esa persona. «En cuya casa hay» reproduce la referencia relacional y enlaza naturalmente con la ubicación que sigue.
- source_word: παρὰ θάλασσαν
  english_pob_choice: by the sea
  chosen_spanish: una junto al mar
  alternatives_spanish:
  - cerca del mar
  - junto al mar
  - por el mar
  lexicon: BDAG
  rationale: παρά con acusativo expresa proximidad. En español, la combinación con «hay» pide una formulación natural; «una junto al mar» conserva la locación sin forzar un calco demasiado rígido.
translation_notes:
  revision_awareness: Se siguió de cerca el griego SBLGNT y el auditable sentido de la POB inglesa. La principal decisión de estilo fue traducir ξενίζεται con una forma española natural de hospedaje y ajustar la relativa final para que la ubicación «junto al mar» quede idiomática sin perder la relación del griego.
  spanish_consistency_notes:
  - Se mantiene «Simón» como transliteración estándar del nombre propio.
  - Se eligió «curtidor» por precisión léxica frente a opciones más generales.
  - No se introdujo vocabulario eclesiástico ni se ocultó la indefinición de τις.
  - La referencia locativa se expresó de forma natural en español, conservando la proximidad de παρά con acusativo.
