revisions:
- from: Éste está hospedado con un cierto Simón[a], un curtidor, en cuya casa hay una junto al mar.
  to: Él está hospedado con cierto Simón[a], un curtidor, cuya casa está junto al mar.
  rationale: Se corrige la cláusula relativa para expresar fielmente «cuya casa está junto al mar», se mejora la naturalidad de οὗτος con «Él» y de παρά τινι con «cierto Simón», y se conserva la nota léxica alternativa para ξενίζεται.
