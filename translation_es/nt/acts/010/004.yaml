translation:
  language: es
  text: 'Pero él lo miró fijamente y, llenándose de temor, dijo: «¿Qué es, Señor?». Y él le dijo: «Tus oraciones y tus obras de misericordia[a] han subido como memorial delante de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limosnas». El término griego se refiere especialmente a dar a los necesitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίσας
  english_pob_choice: stared at
  chosen_spanish: lo miró fijamente
  alternatives_spanish:
  - lo observó con atención
  - fijó la vista en él
  lexicon: BDAG
  rationale: ἀτενίζω expresa una mirada fija e intensa. En español, «lo miró fijamente» comunica esa intensidad con naturalidad y sin volverlo demasiado arcaico.
- source_word: ἔμφοβος γενόμενος
  english_pob_choice: becoming afraid
  chosen_spanish: llenándose de temor
  alternatives_spanish:
  - poniéndose muy temeroso
  - habiéndose llenado de miedo
  lexicon: BDAG
  rationale: La construcción participial marca ingreso a un estado de temor. «Llenándose de temor» conserva el valor inceptivo sin exagerar a «aterrorizado».
- source_word: Τί ἐστιν
  english_pob_choice: What is it
  chosen_spanish: ¿Qué sucede?
  alternatives_spanish:
  - ¿Qué es?
  - ¿Qué pasa?
  lexicon: BDAG
  rationale: Aquí la pregunta funciona como reacción reverente ante la aparición y pide saber qué ocurre. «¿Qué sucede?» es idiomático en español y mantiene la apertura semántica del griego.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: Se preserva el tratamiento reverente del griego con «Señor». En este contexto no se fuerza una confesión cristológica plena, pero sí se mantiene el registro elevado que el inglés POB también conservó con «Lord».
- source_word: προσευχαί
  english_pob_choice: prayers
  chosen_spanish: oraciones
  alternatives_spanish:
  - plegarias
  - súplicas
  lexicon: BDAG
  rationale: «Oraciones» es la equivalencia más natural y estable para προσευχαί en español bíblico contemporáneo.
- source_word: ἐλεημοσύναι
  english_pob_choice: acts of mercy
  chosen_spanish: obras de misericordia
  alternatives_spanish:
  - limosnas
  - actos de misericordia
  lexicon: BDAG
  rationale: El griego se refiere especialmente a dar a los necesitados. «Obras de misericordia» conserva el componente de misericordia y suena natural en español; se evita reducirlo solo a «limosnas» porque el audit trail inglés destaca la amplitud de la expresión.
- source_word: ἀνέβησαν
  english_pob_choice: have gone up
  chosen_spanish: han subido
  alternatives_spanish:
  - han ascendido
  - subieron
  lexicon: BDAG
  rationale: El verbo mantiene la imagen ascendente asociada con lenguaje de oración/ofrenda. «Han subido» reproduce la metáfora de forma clara y directa.
- source_word: εἰς μνημόσυνον
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recuerdo
  - para memorial
  lexicon: BDAG
  rationale: «Memorial» reproduce el valor de μνημόσυνον con un matiz de acto recordatorio delante de Dios, sin introducir una especificación cultual no explícita en el texto.
- source_word: ἔμπροσθεν τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: «Delante de Dios» conserva la imagen espacial del griego y es natural en registro bíblico español. Mantiene además la relación con el «memorial» sin volverla abstracta.
theological_decisions:
- issue: Valor de κύριε en el discurso al mensajero
  english_pob_reading: Rendered as 'Lord' as a respectful address to a heavenly messenger, without implying a full christological confession.
  chosen_spanish_reading: «Señor» como tratamiento reverente al mensajero, sin implicar por sí mismo una confesión cristológica plena.
  alternative_spanish_readings:
  - señor
  - amo
  rationale: En el relato, la palabra funciona como vocativo de respeto. Traducirla «Señor» preserva la forma lexical elevada que también mantuvo el POB inglés, sin resolver indebidamente la cuestión cristológica en este versículo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al pasaje fuente griego y el audit trail inglés; no se introdujeron cambios sustantivos respecto de la lectura aprobada, y se mantuvieron la metáfora ascendente, el tratamiento reverente κύριε → Señor y la equivalencia amplia de ἐλεημοσύναι.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y no se usa ninguna convención de mayúsculas para el nombre divino porque el texto griego aquí dice θεοῦ, no el tetragrámaton.
  - Se eligió «memorial» para μνημόσυνον para conservar la resonancia de recuerdo/recordación delante de Dios.
  - «Obras de misericordia» se usó como equivalente principal de ἐλεημοσύναι; la nota aclara la alternativa «limosnas» por la posible restricción semántica.
  - La puntuación y el tratamiento de comillas siguen el uso editorial en español bíblico contemporáneo.
