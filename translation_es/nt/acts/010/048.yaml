translation:
  language: es
  text: Así que les ordenó que fueran bautizados en el nombre de Jesús Mesías[a]. Entonces le pidieron que se quedara algunos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «Jesús Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: El aoristo de προστάσσω expresa una instrucción con autoridad. «Ordenó» conserva ese tono en español sin sonar más fuerte de lo que el contexto exige.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - entonces
  - ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo. «Así que» fluye de manera natural en español y mantiene la continuidad inferencial del relato.
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - por la autoridad de
  - sobre la base de
  lexicon: BDAG
  rationale: La expresión idiomática se conserva de forma directa porque en español bíblico es comprensible y no estrecha indebidamente el sentido a solo autoridad o solo invocación.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como apellido fijo. Por la pauta del proyecto, se traduce el título como «Mesías»; se mantiene «Jesús» para Ἰησοῦς.
- source_word: βαπτισθῆναι
  english_pob_choice: to be baptized
  chosen_spanish: bautizarse
  alternatives_spanish:
  - ser bautizados
  - sumergirse
  lexicon: BDAG
  rationale: El infinitivo pasivo se vierte de manera natural con la forma media/reflexiva española en mandato indirecto. «Bautizarse» comunica el hecho sin añadir una interpretación distinta.
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - después
  - luego
  lexicon: BDAG
  rationale: Marca secuencia temporal inmediata; «Entonces» es claro, sobrio y fiel.
- source_word: ἠρώτησαν
  english_pob_choice: asked
  chosen_spanish: le pidieron
  alternatives_spanish:
  - le preguntaron
  - le solicitaron
  lexicon: BDAG
  rationale: En este contexto la petición es que permanezca con ellos, por lo que en español «le pidieron» expresa mejor el acto de solicitud que un simple «preguntaron», sin abandonar el valor de petición del verbo.
- source_word: ἐπιμεῖναι
  english_pob_choice: to remain
  chosen_spanish: que se quedara
  alternatives_spanish:
  - que permaneciera
  - que continuara con ellos
  lexicon: BDAG
  rationale: El infinitivo indica quedarse por un tiempo. «Que se quedara» es natural en español y conserva la duración implícita sin volverlo más solemne de lo necesario.
- source_word: ἡμέρας τινάς
  english_pob_choice: for some days
  chosen_spanish: algunos días
  alternatives_spanish:
  - unos días
  - por varios días
  lexicon: BDAG
  rationale: La expresión es indefinida. «Algunos días» preserva esa vaguedad de manera idiomática y cercana al griego.
theological_decisions:
- issue: Título Χριστός en la fórmula bautismal
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La política del proyecto es traducir Χριστός como título cuando el contexto lo permite. En esta fórmula, el valor confesional del título se conserva mejor con «Mesías», mientras que «Cristo» queda como alternativa tradicional.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El historial inglés muestra una oscilación editorial entre «Jesus Christ» y «Jesus Messiah», con restitución final de «Messiah» por política del proyecto. La versión española sigue esa decisión final y la explicita con nota alternativa tradicional.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Mesías» para Χριστός en la línea principal.
  - Se conserva el valor narrativo de δέ con una transición fluida («Así que»).
  - La petición final se expresa como «le pidieron que se quedara», porque el contexto es una solicitud de permanencia, no una simple pregunta.
