translation:
  language: es
  text: y ve el cielo[a] abierto, y algo[b] como una gran sábana descendiendo, bajada por sus cuatro extremos[c] a la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el firmamento». El griego οὐρανός puede referirse al «cielo» o al ámbito celestial; aquí «cielo» se mantiene porque el contexto es visionario y revelatorio.
    reason: lexical_alternative
  - marker: b
    text: O «algún objeto» o «un recipiente». La expresión griega σκεῦός τι es deliberadamente indefinida.
    reason: lexical_alternative
  - marker: c
    text: O «por sus cuatro puntas» o «por sus cuatro esquinas». El griego ἀρχαῖς señala extremos o puntas.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - contempla
  lexicon: BDAG
  rationale: El verbo narrativo en presente se expresa de forma natural y vívida con «ve», manteniendo la inmediatez del relato sin sonar arcaico.
- source_word: τὸν οὐρανὸν ἀνεῳγμένον
  english_pob_choice: heaven opened
  chosen_spanish: el cielo abierto
  alternatives_spanish:
  - el cielo del abierto
  - el cielo que se abrió
  lexicon: BDAG
  rationale: En este contexto de visión, οὐρανός puede referirse a «cielo» o «cielo/heaven». En español, «el cielo abierto» conserva la imagen y evita una formulación innecesariamente abstracta; el sentido visionario queda explícito por el contexto sin imponer terminología eclesiástica ajena al pasaje.
- source_word: καταβαῖνον
  english_pob_choice: descending
  chosen_spanish: que descendía
  alternatives_spanish:
  - descendiendo
  - que bajaba
  lexicon: BDAG
  rationale: Se eligió una forma relativa que hace fluida la relación con «algo», reflejando el participio presente de movimiento sin perder naturalidad en español.
- source_word: σκεῦός τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - algún objeto
  - un recipiente
  lexicon: BDAG
  rationale: σκεῦος es deliberadamente indefinido. «Algo» preserva esa indeterminación y evita especificar función o forma más de lo que permite el texto; «un recipiente» sería demasiado concreto.
- source_word: ὡς ὀθόνην μεγάλην
  english_pob_choice: like a large sheet
  chosen_spanish: como una gran sábana
  alternatives_spanish:
  - como una gran sábana de lino
  - como una gran tela
  lexicon: BDAG
  rationale: ὀθόνη puede significar una lona, sábana o tela extensa. «Sábana» comunica con claridad la apariencia amplia y flexible del objeto en un español contemporáneo, sin sobreespecificar el material.
- source_word: τέσσαρσιν ἀρχαῖς
  english_pob_choice: by its four corners
  chosen_spanish: por sus cuatro extremos
  alternatives_spanish:
  - por sus cuatro puntas
  - por sus cuatro esquinas
  lexicon: BDAG
  rationale: ἀρχαῖς alude a extremos o puntas. «Extremos» conserva el sentido más amplio y evita fijarlo exclusivamente en «esquinas», que puede ser demasiado concreto para una tela o lona.
- source_word: καθιέμενον
  english_pob_choice: being lowered
  chosen_spanish: siendo bajada
  alternatives_spanish:
  - siendo descendida
  - siendo dejada caer
  lexicon: BDAG
  rationale: El participio pasivo describe el movimiento hacia abajo del objeto. «Siendo bajada» es una forma clara y fiel en español; mantiene el valor pasivo sin añadir matices no presentes.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - sobre la tierra
  - hasta la tierra
  lexicon: BDAG
  rationale: Con un verbo de descenso, ἐπί señala movimiento hacia el destino. «A la tierra» mantiene el registro elevado del pasaje y reproduce bien el complemento de dirección.
theological_decisions:
- issue: οὐρανός en una visión revelatoria
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielo abierto
  - los cielos
  rationale: La POB inglesa opta por «heaven» por el carácter visionario. En español, «cielo» preserva esa amplitud semántica sin forzar una personificación teológica ni sonar a simple meteorología. El contexto ya indica la dimensión revelatoria.
  doctrine_reference: Translation philosophy §1 (original-language primacy) y §6 (readability)
- issue: Indefinición de σκεῦός τι
  english_pob_reading: something
  chosen_spanish_reading: algo
  alternative_spanish_readings:
  - algún objeto
  - un utensilio
  rationale: El texto evita precisar qué clase de objeto es. Mantener «algo» respeta esa tensión lexical y evita interpretar prematuramente la figura antes de que el contexto la aclare.
  doctrine_reference: Principio de no sobreespecificación textual
- issue: Imagen de una gran tela/sábana en descenso
  english_pob_reading: like a large sheet
  chosen_spanish_reading: como una gran sábana
  alternative_spanish_readings:
  - como una gran tela
  - como una gran lona
  rationale: La comparación describe forma y tamaño más que función. «Sábana» transmite bien la imagen de una pieza grande y flexible; no introduce un significado doctrinal, solo un equivalente visual idiomático.
  doctrine_reference: Lectura semántica de ὀθόνη
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del texto inglés que reordenó la frase para mantener juntos «something like a large sheet» y el matiz de indefinición de σκεῦός τι. El español sigue esa misma relación sintáctica: «algo como una gran sábana» antes de «que descendía», evitando separar indebidamente la comparación del sustantivo indefinido.'
  spanish_consistency_notes:
  - Se usó «cielo» en vez de «cielo/heaven» o «firmamento» porque el contexto es visionario y la forma española más natural conserva la amplitud del griego.
  - «Algo» mantiene la indefinición de σκεῦός τι sin convertirlo en un objeto funcional específico.
  - «Por sus cuatro extremos» respeta ἀρχαῖς como extremidades, evitando una fijación innecesaria en «esquinas».
  - La secuencia verbal «ve... abierto... que descendía, siendo bajada» sigue la progresión del griego sin endurecerla con un calco excesivo.
