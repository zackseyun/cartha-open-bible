review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: la secuencia temporal, el verbo singular «entró», la expectativa continua de Cornelio y la convocatoria previa de parientes y amigos. También preserva correctamente la tensión singular/plural entre «entró» y «ellos». Sin embargo, «a aquellos» para αὐτούς no es la mejor equivalencia en español, porque suena distante y menos natural que el simple plural personal; además, el matiz de δέ en «Cornelio, por su parte» es aceptable pero algo más contrastivo de lo necesario.'
  spanish_quality_summary: El español es claro y digno, pero necesita un ajuste menor para sonar más natural y fiel al registro narrativo. «Estaba esperando a ellos» sería incorrecto, pero «los estaba esperando» tampoco encaja bien con el énfasis del texto principal; la solución más natural es reformular como «los esperaba». También conviene suavizar «por su parte» a una transición más narrativa. El resto —«Al día siguiente», «Cesarea», «había convocado», «parientes», «amigos íntimos»— es plenamente legible y adecuado.
  glossary_alignment: No hay términos del glosario teológico principal en juego. «Cesarea» está bien en español. «Amigos íntimos» transmite correctamente τοὺς ἀναγκαίους φίλους, aunque «amigos cercanos» también sería posible. No hay conflicto con terminología del proyecto.
  issues:
  - severity: medium
    issue: «a aquellos» para αὐτούς
    rationale: Aunque preserva el plural, en español suena innecesariamente distante y poco idiomático. El griego simplemente dice «them»; en español conviene expresarlo de forma natural, por ejemplo «los esperaba», manteniendo el plural sin forzar un demostrativo.
  - severity: low
    issue: «Cornelio, por su parte» carga demasiado δέ
    rationale: δὲ aquí marca una transición narrativa suave, no un contraste fuerte. «Ahora bien, Cornelio» o simplemente «Cornelio» seguido de la cláusula resulta más natural y más cercano al valor discursivo del original.
  - severity: low
    issue: Nota al pie usa «aquellos»
    rationale: La nota debe acompañar la redacción revisada del texto principal y explicar el contraste singular/plural sin depender de una elección poco natural en español.
  revised_spanish_text: Al día siguiente entró en Cesarea[a]. Ahora bien, Cornelio los esperaba, y había convocado a sus parientes y a sus amigos íntimos.
  revised_footnotes:
  - marker: a
    text: El griego tiene el verbo singular «entró», aunque después aparece el pronombre plural implícito en «los esperaba»; probablemente el relato enfoca a Pedro como figura principal sin excluir a sus acompañantes.
    reason: textual_variant
  revision_rationale: 'Se corrige un problema de naturalidad y fidelidad en español: αὐτούς debe conservarse como plural, pero «a aquellos» no es idiomático aquí. «Los esperaba» mantiene el plural de forma natural. También se ajusta la transición discursiva para reflejar mejor el valor suave de δέ con «Ahora bien, Cornelio». No se requiere adjudicación adicional porque son ajustes menores y claros.'
