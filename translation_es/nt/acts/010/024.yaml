translation:
  language: es
  text: Al día siguiente entró en Cesarea[a]. Ahora bien, Cornelio los esperaba, y había convocado a sus parientes y a sus amigos íntimos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene el verbo singular «entró», aunque después aparece el pronombre plural implícito en «los esperaba»; probablemente el relato enfoca a Pedro como figura principal sin excluir a sus acompañantes.
    reason: textual_variant
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: BDAG
  rationale: La expresión griega es un giro temporal idiomático. «Al día siguiente» es natural en español y conserva la secuencia narrativa sin calcar la estructura gramatical del inglés.
- source_word: εἰσῆλθεν
  english_pob_choice: he entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - ingresó
  lexicon: BDAG
  rationale: El verbo aoristo singular se traduce con una forma simple y directa. En español, «entró en Cesarea» reproduce bien el movimiento de entrada sin forzar una perífrasis innecesaria.
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesárea
  lexicon: BDAG
  rationale: Se usa la transliteración tradicional en español bíblico sin acento, clara y reconocible para lectores de iglesia.
- source_word: ὁ δὲ Κορνήλιος
  english_pob_choice: Now Cornelius
  chosen_spanish: Cornelio, por su parte
  alternatives_spanish:
  - Y Cornelio
  - Ahora bien, Cornelio
  lexicon: BDAG
  rationale: «δέ» introduce un cambio suave de foco. «Por su parte» comunica esa transición narrativa en español sin cargarla de contraste fuerte.
- source_word: ἦν προσδοκῶν
  english_pob_choice: was expecting
  chosen_spanish: estaba esperando
  alternatives_spanish:
  - estaba aguardando
  - seguía esperando
  lexicon: BDAG
  rationale: El imperfecto perifrástico expresa acción continua. «Estaba esperando» conserva la duratividad y la expectativa anticipada mejor que un simple «esperaba» aislado.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: a aquellos
  alternatives_spanish:
  - a ellos
  - a los que venían con él
  lexicon: BDAG
  rationale: El pronombre plural se mantiene explícito. Como el referente plural no queda marcado en la frase inmediata en español, «a aquellos» evita introducir un referente no señalado en el verso y deja abierta la referencia plural presente en el griego.
- source_word: συγκαλεσάμενος
  english_pob_choice: had called together
  chosen_spanish: había convocado
  alternatives_spanish:
  - había reunido
  - había llamado juntos
  lexicon: BDAG
  rationale: El participio aoristo medio antecede al verbo principal y señala una acción ya completada. «Había convocado» expresa adecuadamente el sentido de reunir por llamado previo, con un registro digno y natural.
- source_word: τοὺς συγγενεῖς αὐτοῦ
  english_pob_choice: his relatives
  chosen_spanish: a sus parientes
  alternatives_spanish:
  - a sus familiares
  - a sus parientes consanguíneos
  lexicon: BDAG
  rationale: «συγγενεῖς» designa parientes o familiares por parentesco. «Parientes» es preciso, sobrio y suficientemente amplio para el contexto.
- source_word: τοὺς ἀναγκαίους φίλους
  english_pob_choice: close friends
  chosen_spanish: a sus amigos íntimos
  alternatives_spanish:
  - a sus amigos cercanos
  - a sus amigos de confianza
  lexicon: BDAG
  rationale: La expresión idiomática no debe traducirse literalmente como «necesarios». El griego apunta a amigos estrechos o íntimos; «amigos íntimos» preserva esa fuerza relacional de manera clara en español.
translation_notes:
  revision_awareness: 'El texto griego presenta alta concordancia con el contexto auditado en inglés. Se conservó la tensión señalada por el POB: verbo singular con pronombre plural posterior, reflejando el foco narrativo principal sin armonizarlo artificialmente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» fuera del versículo porque no aparecen en el texto.
  - Se preservó el nombre propio de lugar «Cesarea» con grafía española habitual.
  - Se evitó «SEÑOR» por no corresponder a este pasaje.
  - La secuencia verbal en pretérito/imperfecto refleja la relación entre la entrada puntual y la expectativa continua de Cornelio.
