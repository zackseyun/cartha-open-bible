revisions:
- from: Al día siguiente entró en Cesarea[a]. Cornelio, por su parte, estaba esperando a aquellos y había convocado a sus parientes y a sus amigos íntimos.
  to: Al día siguiente entró en Cesarea[a]. Ahora bien, Cornelio los esperaba, y había convocado a sus parientes y a sus amigos íntimos.
  rationale: 'Se corrige un problema de naturalidad y fidelidad en español: αὐτούς debe conservarse como plural, pero «a aquellos» no es idiomático aquí. «Los esperaba» mantiene el plural de forma natural. También se ajusta la transición discursiva para reflejar mejor el valor suave de δέ con «Ahora bien, Cornelio». No se requiere adjudicación adicional porque son ajustes menores y claros.'
