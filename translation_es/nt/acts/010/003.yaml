    rationale: La alternativa inglesa 'Or plainly' explica φανερῶς ('claramente'), no καὶ εἰπόντα αὐτῷ ('y diciendo/le decía'). En español, la nota debe ir sobre 'claramente'.
  - severity: low
    issue: La redacción 'que entraba donde él estaba' es algo expansiva.
    rationale: Comunica bien la escena, pero añade 'donde él estaba' como explicitación interpretativa. 'Entrando a donde él estaba' mantiene mejor el valor de εἰσελθόντα πρὸς αὐτόν y sigue siendo natural en español.
  - severity: low
    issue: La nota léxica española agrega alternativas no reflejadas en el rastro inglés.
    rationale: El inglés preserva específicamente 'plainly' como alternativa. 'Abiertamente' y 'de manera patente' pueden ser defendibles, pero aquí conviene ceñirse a la alternativa auditada.
