translation:
  language: es
  text: 'Vio claramente[b] en una visión[a], como a la hora novena del día, a un ángel de Dios entrando a donde él estaba y diciéndole: «Cornelio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, aproximadamente a las tres de la tarde según el cómputo moderno.
    reason: cultural_note
  - marker: b
    text: 'O: «claramente» puede entenderse también como «de manera manifiesta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: He saw
  chosen_spanish: Vio
  alternatives_spanish:
  - percibió
  - vio
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω pide un pasado simple natural en español. «Vio» conserva la concreción de la experiencia visionaria sin añadir matices interpretativos.
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - en una visión extática
  - en una revelación visionaria
  lexicon: BDAG
  rationale: ὅραμα se traduce de modo directo como «visión». Se evita especificar más de lo que el texto dice; «en una visión» mantiene transparencia y fluidez.
- source_word: φανερῶς
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - abiertamente
  - visiblemente
  - en forma patente
  lexicon: BDAG
  rationale: El adverbio subraya que la visión fue nítida e inequívoca. «Claramente» reproduce esa fuerza con naturalidad moderna; «abiertamente» sería menos preciso aquí.
- source_word: ὡσεὶ περὶ ὥραν ἐνάτην τῆς ἡμέρας
  english_pob_choice: about the ninth hour of the day
  chosen_spanish: como a la hora novena del día
  alternatives_spanish:
  - aproximadamente a la hora novena del día
  - como a las tres de la tarde
  lexicon: BDAG
  rationale: Se conserva la cronología judía del texto con «hora novena» para transparencia de fuente. «Como» expresa el valor aproximativo de ὡσεὶ/περὶ. La equivalencia moderna puede explicitarse en nota, no en el cuerpo.
- source_word: ἄγγελον τοῦ θεοῦ
  english_pob_choice: an angel of God
  chosen_spanish: un ángel de Dios
  alternatives_spanish:
  - un mensajero de Dios
  - un ángel procedente de Dios
  lexicon: BDAG
  rationale: En este contexto visionario, ἄγγελος designa un ser celestial, no un mensajero humano. «De Dios» preserva la construcción del genitivo y la referencia divina sin suavizar el término.
- source_word: εἰσελθόντα πρὸς αὐτόν
  english_pob_choice: coming in to him
  chosen_spanish: que entraba donde él estaba
  alternatives_spanish:
  - que entraba hacia él
  - que se acercaba a él
  lexicon: BDAG
  rationale: El participio de εἰσέρχομαι expresa entrada. En español, «entraba donde él estaba» comunica el movimiento espacial con naturalidad y sin forzar un calco torpe.
- source_word: καὶ εἰπόντα αὐτῷ
  english_pob_choice: and saying to him
  chosen_spanish: y le decía
  alternatives_spanish:
  - y le habló
  - y le dijo
  lexicon: BDAG
  rationale: Se mantiene la secuencia participial narrativa con un imperfecto que fluye bien en español. «Le decía» conserva la continuidad de la acción verbal sin convertir prematuramente el participio en una frase más rígida.
- source_word: Κορνήλιε
  english_pob_choice: Cornelius
  chosen_spanish: Cornelio
  alternatives_spanish:
  - Cornelius
  lexicon: BDAG
  rationale: El vocativo griego se adapta al nombre usual en español. «Cornelio» es la forma reconocible y apropiada en lengua eclesial española.
theological_decisions:
- issue: Naturaleza de ἄγγελος en el contexto de la visión
  english_pob_reading: heavenly angelic being
  chosen_spanish_reading: ser celestial/angelical de origen divino
  alternative_spanish_readings:
  - mensajero humano
  - mensajero de Dios
  rationale: La visión y la frase «de Dios» apuntan al sentido angelical sobrenatural. No se introduce una expansión doctrinal; simplemente se conserva el sentido obvio del relato.
  doctrine_reference: Primacía del sentido léxico-contextual sobre una normalización eclesiástica
- issue: Expresión temporal judía «la hora novena»
  english_pob_reading: about the ninth hour of the day
  chosen_spanish_reading: como a la hora novena del día
  alternative_spanish_readings:
  - como a las tres de la tarde
  - aproximadamente a la hora novena del día
  rationale: La traducción conserva el sistema horario del texto fuente para no ocultar su marco judío. La equivalencia moderna puede ir en nota; el cuerpo mantiene la forma fuente-transparente.
  doctrine_reference: Transparencia histórica y cultural del texto bíblico
translation_notes:
  revision_awareness: Se siguió el pasaje griego de SBLGNT y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se mantuvieron la hora judía, el participio narrativo y el sentido angelológico contextual, con una nota cultural para la equivalencia horaria moderna.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός y «ángel de Dios» para ἄγγελον τοῦ θεοῦ, manteniendo la relación genitiva sin sustitución devocional.
  - Se prefirió «visión» para ὅραμα y no se añadió «éxtasis» porque el texto no lo exige.
  - Se conservó la expresión «hora novena» para transparencia, con aclaración en nota.
  - El nombre propio se adaptó a la forma española «Cornelio», acorde con el uso bíblico en español.
