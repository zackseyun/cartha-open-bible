translation:
  language: es
  text: devoto y que teme a Dios, con toda su familia[a], haciendo muchas obras de caridad para el pueblo y orando a Dios continuamente[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diostemeroso». La expresión puede funcionar también como una descripción reconocible de un gentil que adoraba al Dios de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «muchas limosnas». El término griego suele referirse de manera específica a dádivas para los necesitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσεβὴς
  english_pob_choice: devout
  chosen_spanish: devoto
  alternatives_spanish:
  - piadoso
  - pío
  lexicon: BDAG
  rationale: εὐσεβής describe una conducta de reverencia visible en la vida religiosa. «Devoto» es natural en español actual, conserva el matiz de piedad práctica y evita el tono más arcaico o eclesiástico de «piadoso/pío».
- source_word: φοβούμενος τὸν θεόν
  english_pob_choice: fearing God
  chosen_spanish: que teme a Dios
  alternatives_spanish:
  - temiendo a Dios
  - temeroso de Dios
  - diostemeroso
  lexicon: BDAG
  rationale: La participial griega se conserva con una estructura verbal en español. «Que teme a Dios» mantiene el valor literal de φοβούμενος y deja abierta la posible lectura técnica de un gentil asociado al culto del Dios de Israel, sin imponerla como glosa principal.
- source_word: σὺν παντὶ τῷ οἴκῳ αὐτοῦ
  english_pob_choice: with all his household
  chosen_spanish: con toda su casa
  alternatives_spanish:
  - junto con toda su casa
  - con toda su familia
  lexicon: BDAG
  rationale: οἶκος aquí señala la unidad doméstica completa, no solo el edificio. «Toda su casa» reproduce bien el alcance social y familiar del término en español bíblico actual.
- source_word: ποιῶν
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - practicando
  - realizando
  lexicon: BDAG
  rationale: Se conserva el participio descriptivo con «haciendo», siguiendo la cadena verbal del griego y evitando introducir una paráfrasis más interpretativa.
- source_word: ἐλεημοσύνας πολλὰς
  english_pob_choice: many acts of charity
  chosen_spanish: muchas obras de caridad
  alternatives_spanish:
  - muchas limosnas
  - muchos actos de caridad
  lexicon: BDAG
  rationale: ἐλεημοσύνη suele referirse a dádivas para los necesitados. «Obras de caridad» comunica con claridad el sentido benefactor en español moderno; «limosnas» conservaría más el sabor lexical, pero puede sonar más restringido o menos natural.
- source_word: τῷ λαῷ
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - al pueblo
  - en favor del pueblo
  lexicon: BDAG
  rationale: El dativo expresa a los beneficiarios de su generosidad. «Para el pueblo» transmite esa relación beneficiaria de forma natural en español.
- source_word: δεόμενος τοῦ θεοῦ
  english_pob_choice: praying to God
  chosen_spanish: orando a Dios
  alternatives_spanish:
  - rogando a Dios
  - suplicando a Dios
  - orando a Dios continuamente
  lexicon: BDAG
  rationale: δέομαι puede significar pedir, rogar u orar. En este contexto de piedad, «orando a Dios» es claro y solemne en español; evita reducir el matiz a una sola petición ocasional.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - siempre
  - constantemente
  lexicon: BDAG
  rationale: El idiomatismo indica continuidad o regularidad sostenida. «Continuamente» conserva ese valor sin exagerar necesariamente una acción ininterrumpida.
theological_decisions:
- issue: Término de 'teme a Dios' y la posible categoría de 'God-fearer'
  english_pob_reading: fearing God
  chosen_spanish_reading: que teme a Dios
  alternative_spanish_readings:
  - diostemeroso
  - temeroso de Dios
  rationale: 'Se preserva la expresión verbal y su posible doble carga: reverencia genuina y posible identificación histórico-social de un gentil que veneraba al Dios de Israel. No se resuelve la tensión con una etiqueta técnica en el texto principal.'
  doctrine_reference: Primacía del texto fuente y mantenimiento de la tensión léxica sin sobredeterminarla.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios en el flujo auditado en inglés; la versión española conserva la misma línea de decisión léxica y teológica, adaptada al español con equivalencia óptima.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al criterio del proyecto.
  - Se conserva la cadena participial con «devoto... que teme... haciendo... orando» para reflejar el carácter descriptivo del versículo.
  - «Obras de caridad» se usa como equivalente funcional de ἐλεημοσύνας, con nota para la alternativa más literal «limosnas».
