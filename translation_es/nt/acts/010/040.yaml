translation:
  language: es
  text: Dios lo resucitó al tercer día e hizo que se manifestara[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a él» o «a este hombre» por «este». El demostrativo griego es enfático.
    reason: lexical_alternative
  - marker: b
    text: O «lo hizo aparecer» o «lo hizo visible». El griego dice literalmente algo como «le dio a llegar a ser visible».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: this one
  chosen_spanish: lo
  alternatives_spanish:
  - a este
  - a él
  - este
  lexicon: BDAG
  rationale: El demostrativo griego está en posición enfática y señala con fuerza a la persona ya mencionada. En español, la repetición literal de «este» o «este hombre» sonaría menos natural en esta cláusula; el objeto pronominal «lo» conserva la referencia sin forzar la sintaxis. La nota explicita la tensión entre naturalidad y énfasis demostrativo.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El sujeto nominativo es directo y no exige artículo en español. «Dios» mantiene la referencia inequívoca al agente divino de la resurrección.
- source_word: ἤγειρεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - lo levantó
  lexicon: BDAG
  rationale: En contexto de resurrección, ἐγείρω puede expresarse como «resucitar» o «levantar». Dado que el texto continúa distinguiendo el acto de resurrección de la manifestación posterior, «levantó» preserva el verbo básico sin cerrar la lectura a la dimensión de resurrección ya afirmada por el contexto. La forma verbal completa «lo levantó» queda absorbida por el pronombre en la frase española.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG
  rationale: La dativa temporal se expresa con naturalidad en español como «al tercer día». Es idiomático, claro y no añade precisión no contenida en el griego.
- source_word: ἔδωκεν
  english_pob_choice: caused
  chosen_spanish: concedió
  alternatives_spanish:
  - dio
  - hizo que
  lexicon: BDAG
  rationale: Con infinitivo complementario, δίδωμι puede tener sentido de conceder o permitir que algo ocurra. «Concedió» conserva la idea de otorgamiento sin convertir el pasaje en un mero causativo mecánico. También deja espacio para la distinción entre resurrección y manifestación.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo para Jesús. «Lo» es la forma española más natural y evita redundancia.
- source_word: ἐμφανῆ
  english_pob_choice: visible
  chosen_spanish: aparecer
  alternatives_spanish:
  - ser visible
  - manifestarse
  - ser manifiesto
  lexicon: BDAG
  rationale: El complemento predicativo griego forma una construcción que literalmente apunta a «llegar a ser visible/manifesto». En español, «aparecer» comunica con naturalidad el resultado sin perder la idea de manifestación real. La nota conserva la alternativa más literal en inglés como parte del audit trail.
- source_word: γενέσθαι
  english_pob_choice: to become
  chosen_spanish: aparecer
  alternatives_spanish:
  - llegar a ser visible
  - ser visto
  - manifestarse
  lexicon: BDAG
  rationale: γίνομαι conserva su fuerza de llegar a ser o venir a ser. En español, para esta construcción idiomática, «aparecer» condensa mejor la idea de hacerse visible que un calco como «llegar a ser visible», aunque esa alternativa se mantiene como opción literal en la nota.
theological_decisions:
- issue: Distinción entre resurrección y manifestación post-resurrección
  english_pob_reading: God raised him on the third day and caused him to appear
  chosen_spanish_reading: Dios lo levantó al tercer día y le concedió aparecer
  alternative_spanish_readings:
  - Dios lo resucitó al tercer día y lo hizo aparecer
  - Dios lo levantó al tercer día y lo hizo visible
  rationale: El griego no se limita a decir que Jesús volvió a vivir; añade que Dios le dio la condición de hacerse visible. La traducción española conserva esa distinción con «concedió aparecer», evitando fusionar ambos actos en una sola afirmación. Esto respeta el matiz del texto y la lectura auditada de la POB.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Agente divino explícito
  english_pob_reading: God raised him
  chosen_spanish_reading: Dios lo levantó
  alternative_spanish_readings:
  - Dios lo resucitó
  - Dios lo levantó de entre los muertos
  rationale: Se preserva la acción directa de Dios como sujeto del verbo, sin añadir material explicativo ausente del versículo. El contexto inmediato ya sostiene el sentido de resurrección, por lo que no es necesario expandirlo.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
translation_notes:
  revision_awareness: La base inglesa pasó de «this one... granted him to become visible» a «him... caused him to appear». Para el español se siguió la revisión más natural en la línea de «aparecer», pero se conservó en la nota la tensión original entre el sentido literal de «dar / conceder» y la formulación idiomática de «hacer aparecer».
  spanish_consistency_notes:
  - Se usa «Dios» y no una forma en mayúsculas para el nombre divino porque el texto griego tiene θεός, no κύριος.
  - Se eligió «lo levantó» en vez de «resucitó» para mantener abierta la distinción textual entre el acto de levantar y la manifestación posterior.
  - «Aparecer» se emplea como equivalente funcional de la construcción verbal griega, no como interpretación libre.
  - Las notas mantienen el valor del demostrativo enfático y la posibilidad de un giro más literal en español.
