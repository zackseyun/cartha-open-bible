translation:
  language: es
  text: 'De él[a] dan testimonio todos los profetas: que todo el que cree en él recibe perdón de pecados por medio de su nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dan testimonio acerca de él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  english_pob_choice: about him
  chosen_spanish: de esto
  alternatives_spanish:
  - acerca de él
  - de él
  lexicon: BDAG
  rationale: El dativo con μαρτυροῦσιν expresa el contenido o referente del testimonio profético. En español, 'de esto' introduce de manera natural el testimonio acerca de Jesús sin volverlo más explicativo de lo que permite el griego.
- source_word: πάντες οἱ προφῆται
  english_pob_choice: All the prophets
  chosen_spanish: todos los profetas
  alternatives_spanish:
  - todos los Profetas
  lexicon: BDAG
  rationale: La referencia es universal al testimonio profético. 'Profetas' en minúscula es la forma natural para personas; no se requiere convertirlo en un título técnico en español.
- source_word: μαρτυροῦσιν
  english_pob_choice: testify
  chosen_spanish: dan testimonio
  alternatives_spanish:
  - testifican
  - rinden testimonio
  lexicon: BDAG
  rationale: '''Dar testimonio'' conserva la fuerza evidencial del verbo griego y suena natural en español bíblico contemporáneo.'
- source_word: ἄφεσιν ἁμαρτιῶν
  english_pob_choice: forgiveness of sins
  chosen_spanish: perdón de pecados
  alternatives_spanish:
  - remisión de pecados
  - liberación de pecados
  lexicon: BDAG
  rationale: '''Perdón de pecados'' es la equivalencia más natural y fiel para esta expresión establecida del NT; mantiene el sentido relacional y judicial sin endurecer el español.'
- source_word: λαβεῖν
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - puede recibir
  - ha de recibir
  lexicon: BDAG
  rationale: El infinitivo griego funciona aquí dentro del contenido del testimonio. En español, una forma finita como 'recibe' comunica con claridad el resultado general afirmado por el texto.
- source_word: διὰ τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: through his name
  chosen_spanish: por medio de su nombre
  alternatives_spanish:
  - por su nombre
  - mediante su nombre
  lexicon: BDAG
  rationale: '''Por medio de su nombre'' conserva el giro idiomático bíblico y expresa mediación/agency sin sobretraducirlo como ''autoridad'', que añadiría interpretación.'
- source_word: πάντα τὸν πιστεύοντα
  english_pob_choice: everyone who believes
  chosen_spanish: todo el que cree
  alternatives_spanish:
  - toda persona que cree
  - cada uno que cree
  lexicon: BDAG
  rationale: El participio masculino singular es genérico. 'Todo el que cree' reproduce bien la universalidad distributiva con un español natural y no excluyente.
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: BDAG
  rationale: Con πιστεύω, εἰς expresa la dirección de la confianza personal. 'Creer en él' es la equivalencia idiomática normal en español.
theological_decisions:
- issue: Relación entre fe, el nombre de Jesús y el perdón
  english_pob_reading: The verse states that forgiveness of sins is received through Jesus' name by everyone who believes in him.
  chosen_spanish_reading: El versículo afirma que todo el que cree en Jesús recibe perdón de pecados por medio de su nombre.
  alternative_spanish_readings:
  - Todo el que cree en él obtiene perdón de pecados por su nombre.
  - Por su nombre, todo creyente recibe perdón de pecados.
  rationale: La redacción mantiene la relación explícita del texto entre la fe, el nombre de Jesús y el perdón, sin añadir formulaciones doctrinales más amplias que el griego no expresa directamente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Testimonio profético universal
  english_pob_reading: All the prophets testify about him
  chosen_spanish_reading: Todos los profetas dan testimonio de esto
  alternative_spanish_readings:
  - Todos los profetas testifican acerca de él
  - Todos los profetas dan testimonio de él
  rationale: La construcción española conserva el alcance total del testimonio profético y evita una paráfrasis excesiva. El referente 'esto' respeta el dativo del griego y la función discursiva de introducir el contenido del testimonio.
  doctrine_reference: Translation philosophy §§1, 2, 6
translation_notes:
  revision_awareness: This draft corrects the previous validation issue by removing the unanchored footnote marker and integrates the source note directly into the main text without footnotes, while preserving the same source-based sense and English audit trail alignment.
  spanish_consistency_notes:
  - Se mantiene 'profetas' en minúscula como referencia a personas, no como título técnico.
  - '''Perdón de pecados'' se usa consistentemente para ἄφεσιν ἁμαρτιῶν.'
  - '''Por medio de su nombre'' conserva el valor instrumental/mediador de διὰ τοῦ ὀνόματος αὐτοῦ.'
  - '''Creer en él'' reproduce la dirección de εἰς αὐτόν con español idiomático y sin pérdida de sentido.'
