revisions:
- from: 'De esto dan testimonio todos los profetas: que todo el que cree en él recibe perdón de pecados por medio de su nombre.'
  to: 'De él[a] dan testimonio todos los profetas: que todo el que cree en él recibe perdón de pecados por medio de su nombre.'
  rationale: Se corrige el referente de τούτῳ para preservar el sentido personal 'de él/acerca de él' que exige el contexto y documenta la auditoría inglesa. Se mantiene el resto del versículo porque es fiel, natural y teológicamente sobrio. Se añade una nota breve para conservar la alternativa léxica asociada a μαρτυροῦσιν/τούτῳ.
