  rationale: Se ajusta el imperativo principal a «Ponte de pie» para reflejar con más precisión y naturalidad el contexto de postración e incorporación física. Se corrige la nota alternativa eliminando «Levantaos», que no concuerda con el singular griego ni con el español meta neutral. El resto del versículo se mantiene porque es fiel al sentido fuente y al razonamiento léxico documentado.
