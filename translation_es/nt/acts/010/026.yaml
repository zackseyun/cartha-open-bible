translation:
  language: es
  text: 'Pero Pedro lo levantó[a], diciendo: «Ponte de pie[b]; yo también soy un hombre[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo alzó» o «lo ayudó a ponerse de pie».
    reason: lexical_alternative
  - marker: b
    text: O «Levántate» o «Levántese».
    reason: lexical_alternative
  - marker: c
    text: O «yo mismo también soy un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una leve contraposición con la acción anterior de Cornelio; «Pero» comunica con naturalidad el giro correctivo de Pedro en español.
- source_word: ἤγειρεν αὐτὸν
  english_pob_choice: raised him up
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo ayudó a ponerse de pie
  lexicon: BDAG
  rationale: ἐγείρω aquí describe una acción física inmediata sobre Cornelio. «Lo levantó» conserva la fuerza verbal y suena natural en español; «lo ayudó a ponerse de pie» explicita más de lo que el griego exige.
- source_word: Ἀνάστηθι
  english_pob_choice: Stand up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levantate
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀνίστημι es una orden directa de incorporarse. En español, «Levántate» expresa de forma natural el movimiento físico exigido por el contexto.
- source_word: καὶ ἐγὼ αὐτὸς
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - yo mismo también
  - yo también mismo
  lexicon: BDAG
  rationale: 'La combinación enfatiza la inclusión de Pedro: él también es solo humano. «Yo también» transmite bien esa fuerza enfática sin sobrecargar el español con una repetición poco natural.'
- source_word: ἄνθρωπός εἰμι
  english_pob_choice: am a man
  chosen_spanish: soy un hombre
  alternatives_spanish:
  - soy humano
  - soy solo un hombre
  lexicon: BDAG
  rationale: ἄνθρωπος aquí contrasta a Pedro con alguien que mereciera postración reverencial. «Soy un hombre» es directo y mantiene el contraste; «soy humano» suena más abstracto, y «solo un hombre» añade interpretación no explícita.
theological_decisions:
- issue: La respuesta de Pedro ante la postración reverencial
  english_pob_reading: The verse is rendered to show Peter rejecting an act implying undue honor, grounding the refusal in his shared humanity.
  chosen_spanish_reading: El versículo queda traducido para mostrar que Pedro rechaza un gesto de reverencia indebida, fundando su negativa en que él comparte la misma condición humana.
  alternative_spanish_readings:
  - La frase podría leerse solo como una muestra de humildad personal sin implicación más amplia.
  rationale: 'La redacción conserva la tensión del texto: no suaviza el rechazo de Pedro ni añade una doctrina desarrollada sobre culto a personas. «Yo también soy un hombre» mantiene la base argumental del pasaje.'
  doctrine_reference: Conservar la tensión teológica; no importar afirmaciones doctrinales que el texto no formula.
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego y el rastro de auditoría en inglés sin depender mecánicamente de la traducción inglesa. No hay revisiones aplicadas en el pasaje fuente más reciente, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se conserva el contraste narrativo entre la acción física de Pedro y su corrección verbal inmediata.
  - Se usa «Levántate» por naturalidad oral y correspondencia con el imperativo griego en contexto de ayuda física.
  - «Soy un hombre» mantiene la equivalencia directa con ἄνθρωπός εἰμι sin añadir «solo», que sería interpretativo.
  - Los marcadores de nota al pie siguen el orden del expediente inglés y aparecen anclados en el texto donde corresponde.
