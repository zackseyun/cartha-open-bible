  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: Pedro corrige la postración de Cornelio, lo levanta y le ordena ponerse en pie, fundamentándolo en su humanidad compartida. Las elecciones principales («Pero», «lo levantó», «yo también soy un hombre») siguen de cerca la evidencia fuente y el rastro de auditoría inglés.'
  spanish_quality_summary: 'El español es claro y natural, pero hay dos detalles que conviene reparar: en la nota b, «Levantaos» introduce un plural peninsular ajeno al singular griego y al registro meta; además, para un español neutral y más preciso en este contexto físico, «Ponte de pie» funciona mejor como texto principal que «Levántate», ya que evita la leve ambigüedad de simplemente levantarse sin quedar de pie. También debe corregirse la alternativa mal acentuada implícita «Levantate» en las decisiones léxicas, aunque eso no afecta el texto final.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «hombre» para ἄνθρωπος está bien justificado aquí frente a «humano». No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
