translation:
  language: es
  text: Le dio mucha hambre y quería comer[a]; pero, mientras se lo preparaban, le sobrevino un trance[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quería probar algo»; el verbo griego puede significar literalmente «probar», pero aquí se refiere a comer.
    reason: lexical_alternative
  - marker: b
    text: O «un trance se apoderó de él»; el término griego denota un estado alterado asociado aquí con una revelación visionaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: He became
  chosen_spanish: Llegó a tener
  alternatives_spanish:
  - se puso
  - se hizo
  lexicon: BDAG
  rationale: El aoristo de γίνομαι introduce un cambio de estado. En español, «llegó a tener» conserva ese valor ingresivo con naturalidad narrativa, sin sonar demasiado rígido.
- source_word: πρόσπεινος
  english_pob_choice: very hungry
  chosen_spanish: mucha hambre
  alternatives_spanish:
  - muy hambriento
  - hambriento
  lexicon: BDAG
  rationale: El adjetivo intensifica la hambre; «mucha hambre» comunica bien la fuerza del término en español actual y evita un giro poco natural como «muy hambriento» en este contexto.
- source_word: ἤθελεν
  english_pob_choice: wanted
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - quería comer
  lexicon: BDAG
  rationale: «Quería» es el equivalente más natural de θέλω en una narración simple. Se mantiene el sentido de voluntad inmediata sin elevar innecesariamente el registro.
- source_word: γεύσασθαι
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - probar
  - gustar
  lexicon: BDAG
  rationale: Aunque literalmente puede ser «probar», aquí el contexto indica tomar alimento. «Comer» refleja el sentido idiomático señalado por el audito inglés sin introducir ambigüedad innecesaria.
- source_word: παρασκευαζόντων
  english_pob_choice: while they were preparing it
  chosen_spanish: mientras se lo preparaban
  alternatives_spanish:
  - mientras preparaban la comida
  - mientras hacían los preparativos
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción contemporánea. En español, «se lo preparaban» recupera el objeto implícito del alimento de forma fluida y coherente con el contexto.
- source_word: ἐγένετο ἐπ’ αὐτὸν
  english_pob_choice: came over him
  chosen_spanish: le sobrevino
  alternatives_spanish:
  - vino sobre él
  - lo sobrecogió
  lexicon: BDAG
  rationale: La construcción marca la irrupción de una experiencia que afecta a Pedro. «Le sobrevino» conserva el matiz de llegada repentina y evita interpretar demasiado el fenómeno.
- source_word: ἔκστασις
  english_pob_choice: a trance
  chosen_spanish: un trance
  alternatives_spanish:
  - éxtasis
  - asombro
  lexicon: BDAG
  rationale: En Hechos el término describe un estado alterado asociado con una visión reveladora. «Un trance» sigue de cerca la decisión auditada en inglés y preserva el valor experiencial del vocablo.
theological_decisions:
- issue: Naturaleza de la experiencia denotada por ἔκστασις
  english_pob_reading: a trance
  chosen_spanish_reading: un trance
  alternative_spanish_readings:
  - éxtasis
  - asombro
  rationale: El contexto inmediato introduce una visión reveladora, por lo que conviene reflejar el estado alterado sin reducirlo a emoción ordinaria ni cargarlo con terminología mística posterior. Se conserva así la tensión del texto fuente.
  doctrine_reference: Primacía del idioma original y preservación de la función narrativa de la experiencia visionaria.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la auditoría inglesa: mantiene el sentido ingresivo de γίνομαι, el valor idiomático de γεύσασθαι como comer, la contemporaneidad del genitivo absoluto y la decisión de traducir ἔκστασις como trance en sentido visionario.'
  spanish_consistency_notes:
  - Se usa «trance» de manera consistente con la terminología POB para ἔκστασις en contextos visionarios.
  - Se evita «SEÑOR» u այլ masking conventions porque no aparecen en este versículo.
  - Se mantiene un registro bíblico moderno y legible, sin depender de fórmulas tradicionales innecesarias.
