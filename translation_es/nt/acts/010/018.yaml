translation:
  language: es
  text: Y llamaron y preguntaron si Simón, llamado Pedro, se hospedaba[a] aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «estaba alojado» o «estaba siendo hospedado». El verbo griego transmite la idea de permanecer como huésped.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσαντες
  english_pob_choice: called out
  chosen_spanish: llamando
  alternatives_spanish:
  - habiendo llamado
  - llamaron
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción antecedente o concomitante con la pregunta. En español, «llamando» mantiene la relación de manera y evita una construcción demasiado pesada; «llamaron» también es posible, pero pierde algo del matiz participial.
- source_word: ἐπυνθάνοντο
  english_pob_choice: asked
  chosen_spanish: preguntaban
  alternatives_spanish:
  - preguntaron
  - inquirían
  lexicon: BDAG
  rationale: El imperfecto medio sugiere una acción en curso. «Preguntaban» conserva mejor esa duratividad que un pretérito puntual. «Inquirían» es más formal, pero menos natural para este contexto narrativo.
- source_word: εἰ
  english_pob_choice: whether
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  lexicon: BDAG
  rationale: Introduce una pregunta indirecta; en español, «si» es la equivalencia natural y precisa.
- source_word: Σίμων ὁ ἐπικαλούμενος Πέτρος
  english_pob_choice: Simon, who is called Peter
  chosen_spanish: Simón, llamado Pedro
  alternatives_spanish:
  - Simón, que es llamado Pedro
  - Simón, también llamado Pedro
  lexicon: BDAG
  rationale: La frase identificatoria se vierte de forma natural con un participio pasivo adjetival en español. «Llamado Pedro» preserva el valor descriptivo sin sobrecargar la sintaxis.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: El adverbio de lugar se traduce directamente con «aquí», la opción más natural y transparente.
- source_word: ξενίζεται
  english_pob_choice: was staying
  chosen_spanish: se hospeda[a]
  alternatives_spanish:
  - está alojado
  - se aloja
  lexicon: BDAG
  rationale: El verbo puede implicar hospedaje como huésped. «Se hospeda» comunica mejor que un simple «está» la idea de estar alojado como invitado; la nota recoge la alternativa semántica de alojarse o ser hospedado.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador de nota [a] aparece exactamente en el texto español en la palabra «hospeda[a]». La redacción también ajusta el valor del imperfecto y mantiene la nota léxica sobre ξενίζεται.'
  spanish_consistency_notes:
  - Se mantiene «Pedro» como forma fija del nombre, de acuerdo con el audit trail en inglés.
  - Se usa «si» para la pregunta indirecta, evitando una literalidad innecesaria.
  - La nota [a] se ancla al verbo principal para señalar la alternativa de hospedaje sin duplicar marcadores.
