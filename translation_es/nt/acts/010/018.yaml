revisions:
- from: Y llamando, preguntaban si Simón, llamado Pedro, se hospeda[a] aquí.
  to: Y llamaron y preguntaron si Simón, llamado Pedro, se hospedaba[a] aquí.
  rationale: Se reemplaza «llamando» por «llamaron» para lograr un español natural sin perder la secuencia de acciones del participio griego, y «se hospeda» por «se hospedaba» para reflejar mejor la situación consultada en el marco narrativo pasado. La nota se ajusta a alternativas españolas más idiomáticas para ξενίζεται.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego: φωνήσαντες + ἐπυνθάνοντο se refleja como una llamada previa seguida de una pregunta; εἰ se vierte correctamente como «si»; y Σίμων ὁ ἐπικαλούμενος Πέτρος se identifica adecuadamente. Sin embargo, «llamando» suena incompleto y menos idiomático que una forma finita o una construcción con «después de». Además, ξενίζεται en presente dentro del discurso indirecto se entiende mejor en español como imperfecto de estado («se hospedaba» / «estaba alojado») que como presente («se hospeda»), ya que la pregunta reporta si Pedro estaba allí hospedándose en ese momento.'
  spanish_quality_summary: El texto es comprensible, pero «Y llamando, preguntaban...» resulta poco natural en español narrativo bíblico moderno. «Llamaron y preguntaron...» o «Llamando desde afuera, preguntaron...» serían más fluidos. También «se hospeda aquí» suena algo rígido y menos natural en una pregunta indirecta pasada; «se hospedaba aquí» mejora la legibilidad y encaja mejor con el marco narrativo.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La nota léxica sobre ξενίζεται es apropiada. La revisión propuesta mantiene el matiz de hospedaje como huésped y mejora la naturalidad española sin perder el sentido fuente.
  issues:
  - severity: medium
    issue: «Y llamando» es una construcción poco idiomática en español en este contexto.
    rationale: 'Aunque reproduce de manera formal el participio φωνήσαντες, en español suena truncado. El sentido narrativo se expresa mejor con una forma finita coordinada: «llamaron y preguntaron».'
  - severity: medium
    issue: «se hospeda aquí» no encaja del todo con la pregunta indirecta enmarcada en pasado.
    rationale: El griego pregunta si Pedro estaba alojándose allí; en español narrativo, «se hospedaba aquí» o «estaba alojado aquí» expresa mejor esa situación contemporánea al acto de preguntar.
  - severity: low
    issue: La nota al pie puede ajustarse para armonizar con la forma verbal revisada.
    rationale: Si el texto principal cambia a «se hospedaba», conviene que la nota ofrezca alternativas temporales equivalentes y naturales en español.
  revised_spanish_text: Y llamaron y preguntaron si Simón, llamado Pedro, se hospedaba[a] aquí.
  revised_footnotes:
  - marker: a
    text: O, «estaba alojado» o «estaba siendo hospedado». El verbo griego transmite la idea de permanecer como huésped.
    reason: lexical_alternative
