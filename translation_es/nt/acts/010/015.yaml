translation:
  language: es
  text: 'Y una voz se le dirigió de nuevo, por segunda vez: «Lo que Dios ha limpiado[a], tú no lo llames común».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no lo llames impuro» o «no lo trates como impuro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - la voz
  lexicon: BDAG
  rationale: En español, el sustantivo anarthrous se traduce naturalmente con artículo indefinido. Mantiene el foco en la nueva intervención celestial sin identificarla por título.
- source_word: πάλιν ἐκ δευτέρου
  english_pob_choice: again a second time
  chosen_spanish: de nuevo por segunda vez
  alternatives_spanish:
  - otra vez por segunda vez
  - nuevamente una segunda vez
  lexicon: BDAG
  rationale: La duplicación es enfática en griego; en español conviene conservar ambas ideas sin sonar tautológico en exceso. 'De nuevo' y 'por segunda vez' reflejan la repetición doble.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le habló
  alternatives_spanish:
  - se dirigió a él
  - habló a él
  lexicon: BDAG
  rationale: La dirección del habla a Pedro se expresa de forma natural con dativo ético en español. 'Le habló' comunica la orientación del discurso sin forzar una construcción literal.
- source_word: Ἃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Las cosas que
  - Aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural funciona de manera colectiva y general. 'Lo que' conserva esa referencia genérica y es idiomático en español.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En español bíblico normal, el artículo se omite al referirse al único Dios verdadero. Se conserva la referencia directa sin recargar el estilo.
- source_word: ἐκαθάρισεν
  english_pob_choice: has made clean
  chosen_spanish: ha limpiado
  alternatives_spanish:
  - ha hecho limpio
  - ha purificado
  lexicon: BDAG
  rationale: El verbo καθαρίζω admite en español 'limpiar' o 'purificar'. 'Ha limpiado' mantiene la decisión inglesa de 'made clean' y deja visible la categoría de pureza sin introducir un término más técnico que no sea necesario en el verso.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - tú mismo
  lexicon: BDAG
  rationale: El pronombre explícito enfatiza la prohibición dirigida a Pedro. En español, 'tú' conserva esa fuerza y suena natural en la cita directa.
- source_word: μὴ κοίνου
  english_pob_choice: must not call common
  chosen_spanish: no lo llames común
  alternatives_spanish:
  - no lo trates como común
  - no lo declares común
  - no lo llames impuro
  lexicon: BDAG
  rationale: κοινόω en este contexto es clasificar algo como común, es decir, no consagrado/ritualmente profanado. 'Común' preserva la oposición con 'limpiado' y evita sustituirla por 'impuro', que estrecha indebidamente el matiz lexical.
theological_decisions:
- issue: Lenguaje de pureza en la visión de Pedro
  english_pob_reading: Retain 'common' rather than replacing it with 'unclean' in the main text.
  chosen_spanish_reading: Mantener 'común' en el texto principal, no 'impuro'.
  alternative_spanish_readings:
  - no lo llames impuro
  - no lo consideres impuro
  - no lo trates como profano
  rationale: El contraste de la visión depende de la relación entre καθαρίζω y κοινόω. 'Común' preserva la categoría específica de pureza ritual y evita borrar la distinción entre 'común' e 'impuro/ritualmente inmundo'.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la concordancia revisora fue alta y no hubo cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin artículo, conforme al uso bíblico natural en español.
  - Se conserva 'común' como término técnico de pureza, en paralelo al contraste con 'ha limpiado'.
  - La cita directa usa 'tú' para reflejar el pronombre enfático σὺ sin añadir énfasis artificial.
