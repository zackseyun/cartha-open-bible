    issue: '''le habló'' añade un verbo de habla no explícito en el griego'
    rationale: πρὸς αὐτόν solo marca dirección hacia Pedro; el predicado explícito es 'φωνὴ' con sentido elíptico de irrupción/dirigirse. 'Le habló' no distorsiona gravemente, pero explicita más de lo necesario. 'Se le dirigió' conserva mejor el valor de πρὸς αὐτόν y suena natural en español.
  - severity: low
    issue: La secuencia 'de nuevo por segunda vez' es algo pesada en español
    rationale: Aunque la redundancia refleja bien πάλιν ἐκ δευτέρου, conviene una formulación más fluida como 'de nuevo, por segunda vez', con pausa, para conservar el énfasis sin sonar descuidada.
