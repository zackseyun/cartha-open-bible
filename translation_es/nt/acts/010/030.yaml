translation:
  language: es
  text: 'Entonces Cornelio dijo[a]: «Hace cuatro días, hasta esta hora, estaba orando a la hora novena en mi casa, y he aquí, un hombre se puso delante de mí con ropa resplandeciente»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, alrededor de las tres de la tarde.
    reason: cultural_note
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - estaba diciendo
  lexicon: BDAG
  rationale: El aoristo narrativo introductorio del discurso se vierte naturalmente con ‘dijo’, sin añadir matices progresivos que no están en el griego.
- source_word: Ἀπὸ τετάρτης ἡμέρας μέχρι ταύτης τῆς ὥρας
  english_pob_choice: Four days ago, until this hour
  chosen_spanish: Desde hace cuatro días, hasta esta hora
  alternatives_spanish:
  - Hace cuatro días, hasta esta hora
  - Desde el cuarto día hasta esta hora
  lexicon: BDAG
  rationale: La expresión idiomática marca un lapso contado desde cuatro días antes hasta el momento presente. ‘Desde hace cuatro días’ comunica el valor temporal de duración/antigüedad, y ‘hasta esta hora’ conserva la referencia al mismo punto horario.
- source_word: ἤμην ... προσευχόμενος
  english_pob_choice: I was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - estaba orando continuamente
  - había estado orando
  lexicon: BDAG
  rationale: La construcción perifrástica imperfecta expresa acción en curso en el pasado. ‘Estaba orando’ es la equivalencia natural en español y mantiene el aspecto progresivo sin sobretraducir.
- source_word: τὴν ἐνάτην
  english_pob_choice: at the ninth hour
  chosen_spanish: en la hora novena
  alternatives_spanish:
  - a la hora novena
  - a las tres de la tarde
  lexicon: BDAG
  rationale: Se preserva la designación cultural y bíblica de tiempo en el texto principal. ‘En la hora novena’ es una forma publicada, clara y fiel al orden conceptual del griego; la equivalencia moderna se deja como alternativa implícita de lectura, no en el cuerpo.
- source_word: ἐν τῷ οἴκῳ μου
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - en mi hogar
  - en mi vivienda
  lexicon: BDAG
  rationale: οἶκος aquí denota la ubicación física. ‘Casa’ es la equivalencia directa, transparente y sobria.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - de pronto
  lexicon: BDAG
  rationale: La partícula introduce vividez y sorpresa. ‘He aquí’ conserva mejor la fuerza deíctica y solemne que una paráfrasis moderna.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombrecito
  lexicon: BDAG
  rationale: El sustantivo es masculino y personal; en el contexto de la visión, ‘un hombre’ reproduce la forma humana de la aparición sin añadir interpretación.
- source_word: ἔστη ἐνώπιόν μου
  english_pob_choice: stood before me
  chosen_spanish: se puso delante de mí
  alternatives_spanish:
  - estuvo delante de mí
  - se mantuvo delante de mí
  lexicon: BDAG
  rationale: Aunque el inglés auditado usa ‘stood before me’, en español ‘se puso delante de mí’ comunica con naturalidad el establecimiento de presencia frente al hablante. Mantiene el valor posicional del verbo griego sin sonar forzado.
- source_word: ἐν ἐσθῆτι λαμπρᾷ
  english_pob_choice: in bright clothing
  chosen_spanish: con un vestido resplandeciente
  alternatives_spanish:
  - con ropa resplandeciente
  - con vestiduras resplandecientes
  lexicon: BDAG
  rationale: ἐσθής puede referirse a una prenda/atuendo; en español, ‘vestido’ funciona como vestidura singular de apariencia. ‘Resplandeciente’ expresa mejor que ‘brillante’ el matiz de luz/splendor de λαμπρός, y evita ambigüedad con color o simple luminosidad.
theological_decisions:
- issue: Expresión temporal de la hora judía/romana
  english_pob_reading: at the ninth hour
  chosen_spanish_reading: en la hora novena
  alternative_spanish_readings:
  - a las tres de la tarde
  - a la novena hora
  rationale: Se conserva en el texto principal la designación histórica del tiempo, conforme a la primacía del original. La equivalencia moderna puede añadirse como nota para accesibilidad sin reemplazar la expresión fuente.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el audit trail inglés: introducción narrativa con ‘dijo’, lapso de cuatro días expresado idiomáticamente, oración continua, hora novena preservada en el texto principal y visión repentina de un hombre con vestidura resplandeciente. Se evitó una calca rígida de ‘stood before me’ porque en español resultaba más natural ‘se puso delante de mí’, sin perder el valor posicional del griego.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; en este versículo no hay ocurrencia.
  - ‘Orando’ se mantiene para προσευχόμενος, no ‘rezando’, por continuidad terminológica y neutralidad confesional.
  - ‘Hora novena’ conserva el registro bíblico; la nota ofrece el equivalente moderno para lectura pública.
  - ‘He aquí’ preserva la vividez discursiva asociada a ἰδοὺ.
