translation:
  language: es
  text: 'Entonces Pedro bajó adonde estaban los hombres y dijo[a]: «Miren, yo soy a quien ustedes buscan. ¿Por qué están aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuál es la razón por la que están aquí?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβὰς
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - bajó de allí
  lexicon: BDAG
  rationale: El participio aoristo de καταβαίνω indica descenso real. «Bajó» comunica ese movimiento de manera natural y fiel en español, sin forzar una construcción participial pesada.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca continuación narrativa. «Entonces» conserva la progresión del relato en español con fluidez.
- source_word: πρὸς τοὺς ἄνδρας
  english_pob_choice: to the men
  chosen_spanish: hacia los hombres
  alternatives_spanish:
  - a los hombres
  - ante los hombres
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento/dirección hacia esas personas. «Hacia los hombres» retiene el matiz direccional mejor que un simple «a», aunque «a los hombres» también sería posible por estilo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Mira
  - Vean
  - Miren bien
  lexicon: BDAG
  rationale: Ἰδού funciona como marcador discursivo para llamar la atención. En plural, «Miren» es natural y transmite bien la interpelación directa.
- source_word: ἐγώ εἰμι ὃν ζητεῖτε
  english_pob_choice: I am the one you are looking for
  chosen_spanish: yo soy a quien ustedes buscan
  alternatives_spanish:
  - yo soy el que ustedes buscan
  - yo soy quien ustedes buscan
  lexicon: BDAG
  rationale: La cláusula identifica a Pedro como la persona buscada. «Yo soy a quien ustedes buscan» conserva el referente relativo sin añadir un pronombre inexistente en el griego y suena natural en español.
- source_word: τίς ἡ αἰτία δι’ ἣν πάρεστε
  english_pob_choice: Why are you here?
  chosen_spanish: ¿Por qué están aquí?
  alternatives_spanish:
  - ¿Cuál es la razón por la que están aquí?
  - ¿Con qué motivo están aquí?
  lexicon: BDAG
  rationale: αἰτία significa causa/razón, y πάρεστε señala presencia/estar aquí. En español, «¿Por qué están aquí?» expresa de forma natural el conjunto de la pregunta, como reflejo del sentido ya reconocido en la POB inglesa.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación más literal («For what reason are you here?») a la más natural «Why are you here?». La presente redacción española sigue esa misma decisión de equivalencia óptima, manteniendo el sentido de τίς ἡ αἰτία δι’ ἣν πάρεστε sin rigidizar la frase.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo; no hay términos divinos aquí.
  - Se usó «hacia» para πρὸς con acusativo por su valor direccional, aunque el contexto permite «a».
  - No se introdujo un tono arcaico; la pregunta final queda natural en español actual, coherente con la revisión inglesa.
  - La nota al pie conserva la alternativa semántica de αἰτία como «razón»/«motivo» sin cambiar el sentido principal.
