    issue: «hacia los hombres» para πρὸς τοὺς ἄνδρας
    rationale: Aunque πρός puede marcar dirección, en esta escena Pedro efectivamente baja y se dirige a ellos para hablarles. En español, «bajó a los hombres» funciona mal, pero «bajó adonde estaban los hombres» o «bajó a donde estaban los hombres» expresa mejor el sentido contextual que «hacia los hombres», que puede sonar incompleto o no idiomático.
