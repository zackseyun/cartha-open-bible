translation:
  language: es
  text: Y ahora envía hombres a Jope y manda llamar a cierto Simón, que es llamado Pedro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «manda llamar a un hombre llamado Simón, conocido como Pedro»'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - manda a
  lexicon: BDAG
  rationale: El imperativo aoristo singular pide una orden directa. «Envía» conserva la fuerza simple y natural de send sin añadir matices de envío oficial que «despacha» podría insinuar.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  - mensajeros
  lexicon: BDAG
  rationale: ἀνήρ es masculino plural explícito; «hombres» reproduce ese rasgo con claridad. «Mensajeros» sería interpretativo y no está en el griego.
- source_word: εἰς Ἰόππην
  english_pob_choice: to Joppa
  chosen_spanish: a Jope
  alternatives_spanish:
  - hacia Jope
  - hasta Jope
  lexicon: BDAG
  rationale: Con un nombre de lugar, εἰς funciona de manera direccional; «a Jope» es la equivalencia española más natural y fiel.
- source_word: μετάπεμψαι
  english_pob_choice: summon
  chosen_spanish: manda llamar
  alternatives_spanish:
  - llama
  - haz venir
  - convoca
  lexicon: BDAG
  rationale: El matiz es «enviar a buscar» a alguien para que venga. «Manda llamar» preserva esa idea sin exagerar la coerción que podría sugerir «convoca».
- source_word: Σίμωνά τινα
  english_pob_choice: a certain Simon
  chosen_spanish: a un cierto Simón
  alternatives_spanish:
  - a cierto Simón
  - a un hombre llamado Simón
  - a alguien llamado Simón
  lexicon: BDAG
  rationale: τινα introduce a una persona identificable pero aún no especificada. «Un cierto Simón» mantiene el giro narrativo griego; se evita expandirlo a «llamado» porque eso pertenece a la cláusula siguiente.
- source_word: ὃς ἐπικαλεῖται Πέτρος
  english_pob_choice: who is called Peter
  chosen_spanish: que es llamado Pedro
  alternatives_spanish:
  - conocido como Pedro
  - apodado Pedro
  - que lleva por nombre Pedro
  lexicon: BDAG
  rationale: ἐπικαλεῖται indica el nombre por el que es invocado/llamado. «Es llamado» conserva la pasiva y el hecho nominal sin modernizarlo en exceso.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; la presente redacción sigue de cerca el griego y el audit trail inglés, manteniendo la alternativa de traducción del nombre en una nota.
  spanish_consistency_notes:
  - Se usa «Jope» para el topónimo tradicional en español y «Pedro» para Πέτρος, conforme al uso bíblico estable.
  - 'Se mantiene la progresión imperativa doble: «envía» / «manda llamar», reflejando πέμψον y μετάπεμψαι sin fusionarlos.'
