  rationale: Se cambia «nombrado» por «designado» para reflejar con mayor precisión ὁ ὡρισμένος y alinearlo con «appointed» del POB en inglés. Se ajusta la nota para conservar una alternativa léxica real, «ordenado», correspondiente al audit trail.
