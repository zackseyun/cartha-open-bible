review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: una orden autoritativa, proclamación al pueblo, testimonio solemne y la afirmación de que Jesús es el designado por Dios como juez universal. Sin embargo, ὁ ὡρισμένος se vierte mejor como «designado» o «appointed» que como «nombrado», ya que «nombrado» puede sonar algo administrativo y menos preciso para una designación divina estable. Además, la nota alternativa debe corresponder al rango léxico documentado en inglés, donde la alternativa principal es «ordained», no «designated».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Nos mandó anunciar al pueblo y dar testimonio solemne» fluye bien. El principal ajuste recomendado es léxico: «ha sido designado» suena más exacto y teológicamente más estable que «ha sido nombrado». También conviene alinear la nota con la decisión principal para evitar redundancia y conservar una alternativa real.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «juez», «los vivos y los muertos» y el tono general están bien. La revisión propuesta mejora la alineación con la rationale del POB para ὁ ὡρισμένος.
  issues:
  - severity: medium
    issue: «ha sido nombrado» debilita la fuerza de ὁ ὡρισμένος
    rationale: El participio perfecto pasivo de ὁρίζω expresa designación/establecimiento con estado resultante. «Nombrado» puede entenderse, pero «designado» conserva mejor el matiz de appointment sin connotación burocrática.
  - severity: low
    issue: La nota alternativa no sigue la alternativa auditada en inglés
    rationale: El inglés preserva «ordained» como alternativa léxica. La nota española ofrece «designado» mientras el texto principal ya podría usar esa forma; así pierde valor como alternativa real y se aparta del rastro de auditoría.
  revised_spanish_text: Y nos mandó anunciar al pueblo y dar testimonio solemne de que este es el que ha sido designado por Dios como juez de los vivos y de los muertos[a].
  revised_footnotes:
  - marker: a
    text: O «el que ha sido ordenado por Dios como juez de los vivos y de los muertos».
    reason: lexical_alternative
  revision_rationale: Se cambia «nombrado» por «designado» para reflejar con mayor precisión ὁ ὡρισμένος y alinearlo con «appointed» del POB en inglés. Se ajusta la nota para conservar una alternativa léxica real, «ordenado», correspondiente al audit trail.
