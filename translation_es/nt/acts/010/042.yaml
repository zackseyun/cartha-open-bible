translation:
  language: es
  text: Y nos mandó anunciar al pueblo y dar testimonio solemne de que este es el que ha sido designado por Dios como juez de los vivos y de los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que ha sido ordenado por Dios como juez de los vivos y de los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλεν
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó encargo
  lexicon: BDAG
  rationale: El verbo expresa una orden con autoridad. «Mandó» comunica bien esa fuerza en español sin sonar excesivamente duro o arcaico; «ordenó» también sería posible, pero «mandó» resulta más natural en este contexto narrativo.
- source_word: κηρύξαι
  english_pob_choice: to proclaim
  chosen_spanish: anunciar
  alternatives_spanish:
  - proclamar
  - predicar
  lexicon: BDAG
  rationale: El verbo subraya una proclamación pública. «Anunciar» conserva la idea de dar a conocer públicamente de manera clara y general; «proclamar» también es viable, pero «anunciar» fluye mejor en español actual.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - al pueblo
  lexicon: BDAG
  rationale: El griego dice simplemente «al pueblo». «Al pueblo» mantiene la restricción textual y evita introducir «Israel» sin una explicitación que el versículo no da.
- source_word: διαμαρτύρασθαι
  english_pob_choice: to testify solemnly
  chosen_spanish: dar testimonio solemne
  alternatives_spanish:
  - testificar solemnemente
  - dar testimonio
  lexicon: BDAG
  rationale: La forma media refuerza un testimonio enfático y serio. «Dar testimonio solemne» preserva tanto el contenido de testimonio como el matiz de seriedad; la alternativa «testificar solemnemente» es más literal, pero menos natural.
- source_word: οὗτός
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - él
  lexicon: BDAG
  rationale: El demostrativo señala enfáticamente a Jesús. «Este» conserva esa referencia directa y breve, y el relativo posterior deja claro el referente.
- source_word: ὁ ὡρισμένος
  english_pob_choice: the one appointed
  chosen_spanish: el que ha sido nombrado
  alternatives_spanish:
  - el que ha sido designado
  - el que ha sido ordenado
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una designación estable por parte de Dios. «Ha sido nombrado» transmite esa idea de manera clara; «designado» sería igualmente posible, y «ordenado» puede sonar teológicamente más cargado en español.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios
  lexicon: BDAG
  rationale: Construcción pasiva normal de agente. «Por Dios» es la equivalencia directa y natural.
- source_word: κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez
  lexicon: BDAG
  rationale: El predicativo nominal requiere el sustantivo «juez». Es la traducción más directa y transparente.
- source_word: ζώντων καὶ νεκρῶν
  english_pob_choice: of the living and the dead
  chosen_spanish: de los vivos y de los muertos
  alternatives_spanish:
  - de los que viven y de los que han muerto
  lexicon: BDAG
  rationale: La pareja genitiva se expresa de forma estable en español como «de los vivos y de los muertos». Mantiene el alcance universal y la solemnidad del original.
theological_decisions:
- issue: Alcance de la autoridad judicial de Jesús
  english_pob_reading: appointed by God as judge of the living and the dead
  chosen_spanish_reading: nombrado por Dios como juez de los vivos y de los muertos
  alternative_spanish_readings:
  - designado por Dios como juez de los vivos y de los muertos
  - ordenado por Dios como juez de los vivos y de los muertos
  rationale: El texto afirma una designación divina de Jesús para el juicio universal. «Nombrado» comunica bien la acción divina sin añadir formulaciones doctrinales ajenas al versículo; la nota conserva la alternativa «designado/ordenado» porque el griego ὡρισμένος admite ese rango semántico.
  doctrine_reference: Actas 10:42; Traducción POB, principio de equivalencia óptima
translation_notes:
  revision_awareness: El inglés POB ya fijó una traducción de equivalencia óptima con nota alternativa para ὡρισμένος («appointed» / «ordained»). La versión española mantiene esa misma tensión léxica con «nombrado» en el texto principal y una alternativa en nota. No se requieren revisiones textuales adicionales frente al paquete fuente proporcionado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin sustituirlo por una máscara reverencial.
  - 'Se conserva la estructura activa-pasiva del original: mandato + anuncio + testimonio + afirmación de designación divina.'
  - «Vivos y muertos» sigue la fórmula solemne establecida en español bíblico, sin añadir explicaciones interpretativas.
  - «Juez» se usa como sustantivo predicativo directo, conforme al griego y al inglés auditado.
