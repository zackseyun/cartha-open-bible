translation:
  language: es
  text: 'Porque los oían hablar en lenguas[a] y glorificar a Dios. Entonces respondió Pedro:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en idiomas». La palabra griega puede referirse a lenguas o idiomas; aquí se mantiene amplia la expresión sin resolver la naturaleza exacta del habla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουον
  english_pob_choice: they were hearing
  chosen_spanish: los oían
  alternatives_spanish:
  - los escuchaban
  - oían
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; en español, 'los oían' comunica bien esa continuidad sin volver pesado el texto. 'Escuchaban' es posible, pero puede sonar más interpretativo; 'oían' mantiene el valor aspectual con naturalidad.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: BDAG
  rationale: '''γάρ'' introduce la razón o explicación de lo anterior; ''Porque'' es un enlace claro y fiel en español. ''Pues'' también sería posible, pero ''Porque'' resulta más transparente aquí.'
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas personas
  lexicon: BDAG
  rationale: El pronombre griego remite a los mismos sujetos del contexto inmediato. En español, 'los' preserva esa referencia anafórica de forma natural y directa.
- source_word: λαλούντων
  english_pob_choice: speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - hablando
  - pronunciar
  lexicon: BDAG
  rationale: '''λαλέω'' se traduce de manera directa por ''hablar''. Al estar en una construcción de participio con ''oían'', ''hablar'' reproduce el sentido sin recargar la frase con una perífrasis innecesaria.'
- source_word: γλώσσαις
  english_pob_choice: in tongues
  chosen_spanish: en lenguas
  alternatives_spanish:
  - en idiomas
  - en lenguas extáticas
  lexicon: BDAG
  rationale: '''γλῶσσα'' puede significar ''lengua'' o ''idioma''. En español, ''en lenguas'' conserva el giro bíblico y deja abierta la cuestión de si se trata de lenguas humanas conocidas o de habla extática, tal como el inglés POB mantiene la tensión con su nota.'
- source_word: μεγαλυνόντων
  english_pob_choice: magnifying
  chosen_spanish: glorificar
  alternatives_spanish:
  - magnificar
  - exaltar
  - alabar
  lexicon: BDAG
  rationale: '''μεγαλύνω'' significa engrandecer, magnificar, exaltar. En español, ''glorificar a Dios'' comunica con naturalidad la idea de alabanza y preserva el acto de hacer grande a Dios, sin sonar artificioso. ''Magnificar'' sería más literal, pero menos idiomático para la mayoría de lectores.'
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El objeto directo de 'glorificar' en español requiere la preposición personal 'a'. 'Dios' es la equivalencia estándar y no necesita mayor especificación.
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: '''τότε'' marca secuencia temporal; ''Entonces'' es la correspondencia natural y clara en español.'
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dijo
  lexicon: BDAG
  rationale: '''ἀποκρίνομαι'' suele significar ''responder'' o ''contestar''. ''Respondió'' suena más natural en español que ''contestó'' en este registro, y evita añadir una pregunta explícita que el griego no menciona.'
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: γλώσσαις en un contexto carismático/pentecostal
  english_pob_reading: in tongues
  chosen_spanish_reading: en lenguas
  alternative_spanish_readings:
  - en idiomas
  - en lenguas (si se entiende como idiomas conocidos)
  rationale: 'Se conserva la ambigüedad del griego y la tensión interpretativa: el texto puede referirse a lenguas/idiomas o a habla carismática. ''En lenguas'' mantiene el giro tradicional bíblico en español sin resolver la cuestión, en línea con la prudencia del POB en inglés.'
  doctrine_reference: Preservar la tensión lexical y teológica; no decidir el fenómeno más allá del texto
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés están de alto acuerdo. La principal decisión interpretativa es γλώσσαις, donde el POB inglés conserva la ambigüedad con 'in tongues' y una nota alternativa; la versión española sigue la misma estrategia con 'en lenguas' y una nota equivalente. También se ha respetado el valor aspectual del imperfecto de ἤκουον y el sentido de μεγαλυνόντων como alabanza/exaltación de Dios.
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin artículo, de acuerdo con el objeto directo de la acción verbal.
  - '''Respondió Pedro'' conserva el orden narrativo y el registro bíblico natural en español.'
  - La nota al pie se ancla en 'lenguas' para preservar la alternativa léxica sin introducir una resolución doctrinal.
