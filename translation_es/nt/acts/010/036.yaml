    unchanged: false
    changes_summary: 'Changed ''Jesus the Messiah'' to ''Jesus Christ'' for closer lexical correspondence and more standard formal register; changed ''this one is Lord of all'' to ''he is Lord of all'' for more natural English while preserving the Greek sense. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: el mensaje que envió a los hijos de Israel[a], proclamando paz por medio de Jesús el Mesías[b]—este es Señor de todos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la palabra que envió a los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Jesús Cristo»; se vierte «Jesús el Mesías» porque Χριστός funciona aquí como título.'
    reason: alternative_reading
  - marker: c
    text: 'O, «él es Señor de todos». El griego usa un demostrativo enfático: «este es Señor de todos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν λόγον
  english_pob_choice: message
  chosen_spanish: mensaje
  alternatives_spanish:
  - palabra
  lexicon: BDAG
  rationale: En este contexto λόγος se refiere al contenido comunicado por Dios, no a una sola ‘palabra’ aislada. ‘Mensaje’ conserva la idea de proclamación recibida y enviada, y suena natural en español.
- source_word: ὃν ἀπέστειλεν
  english_pob_choice: that he sent
  chosen_spanish: que envió
  alternatives_spanish:
  - que mandó
  - que remitió
  lexicon: BDAG
  rationale: La relativa enlaza directamente con ‘mensaje’. ‘Envió’ refleja bien el verbo ἀποστέλλω sin sobrerreformular ni añadir matices no presentes en el griego.
- source_word: τοῖς υἱοῖς Ἰσραήλ
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - al pueblo de Israel
  lexicon: BDAG
  rationale: El griego dice literalmente ‘hijos’, y el español ‘hijos de Israel’ reproduce esa designación tradicional sin neutralizarla. ‘A’ expresa el destinatario del mensaje.
- source_word: εὐαγγελιζόμενος
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - anunciando la buena noticia
  - evangelizando
  lexicon: BDAG
  rationale: El participio comunica anuncio de buena noticia. ‘Proclamando’ funciona con fluidez en español y mantiene el carácter declarativo del verbo sin perder el matiz evangelizador del contexto.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  - paz y reconciliación
  lexicon: BDAG
  rationale: ‘Paz’ es el equivalente directo y suficientemente amplio en español bíblico. En este contexto puede incluir reconciliación, pero el texto no requiere explicitarla.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus the Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por medio de Jesús Cristo
  - por medio de Jesús el Mesías
  lexicon: BDAG
  rationale: Se mantiene la política de traducir Χριστός como ‘Mesías’ cuando funciona como título. En español, ‘Jesús Mesías’ es más compacto que ‘Jesús el Mesías’ y conserva el sentido titular.
- source_word: οὗτός
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - él
  - este mismo
  lexicon: BDAG
  rationale: El demostrativo griego es enfático. En español, ‘este’ conserva esa deixis de manera natural; ‘este es Señor de todos’ preserva la fuerza referencial sin sonar forzado.
- source_word: πάντων κύριος
  english_pob_choice: Lord of all
  chosen_spanish: Señor de todos
  alternatives_spanish:
  - Señor sobre todos
  - Señor de todo
  lexicon: BDAG
  rationale: ‘Señor’ corresponde al valor doctrinal habitual de κύριος. ‘De todos’ expresa de forma directa el genitivo πάντων y afirma su señorío universal sin alterar la construcción.
theological_decisions:
- issue: Cómo renderizar Χριστοῦ en Jesús Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesús el Mesías
  rationale: Se conserva la decisión auditable de traducir el título Χριστός como ‘Mesías’ cuando su valor titular es claro. Esto evita diluir el trasfondo mesiánico del texto y sigue la norma de traducir títulos en vez de transliterarlos por defecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
- issue: Si οὗτός ἐστιν πάντων κύριος debe intensificarse en español
  english_pob_reading: he is Lord of all
  chosen_spanish_reading: este es Señor de todos
  alternative_spanish_readings:
  - él es Señor de todos
  - este mismo es Señor de todos
  rationale: El demostrativo griego es enfático. ‘Este’ conserva esa señalización sin sobrecargar el español; evita reducir el énfasis a un simple pronombre y mantiene la afirmación cristológica directa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Si κύριος debe suavizarse como ‘dueño’ o ‘maestro’
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - dueño
  - maestro
  rationale: ‘Señor’ es el equivalente doctrinal y litúrgico adecuado en este contexto cristológico. ‘Dueño’ o ‘maestro’ estrecharían o desplazarían el alcance de la afirmación sobre Jesús.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
translation_notes:
  revision_awareness: El borrador sigue el último estado revisado del audit trail, pero corrige la oscilación inglesa entre ‘Christ’ y ‘Messiah’ volviendo al valor titular de Χριστός. También conserva el énfasis del demostrativo οὗτός con una solución española natural (‘este’), manteniendo la tensión retórica del griego sin volverlo demasiado marcado.
  spanish_consistency_notes:
  - Uso de ‘Mesías’ para Χριστός conforme a la política del proyecto y al registro del pasaje.
  - Uso de ‘Señor’ para κύριος por consistencia cristológica y terminológica.
  - ‘Hijos de Israel’ preserva la designación tradicional del texto base sin neutralización.
  - ‘Paz’ se mantiene simple y directa; no se expande a una paráfrasis explicativa.
  - Los marcadores de nota a, b y c aparecen exactamente en el texto donde corresponde.
