  text: τὸν λόγον ⸀ὃν ἀπέστειλεν τοῖς υἱοῖς Ἰσραὴλ εὐαγγελιζόμενος εἰρήνην διὰ Ἰησοῦ Χριστοῦ· οὗτός ἐστιν πάντων κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/acts/010/036.yaml
  text: the message that he sent to the sons of Israel[c][b][a], proclaiming peace through Jesus Messiah—he is Lord of all.
  footnotes:
