translation:
  language: es
  text: Había en Cesarea[a] un hombre llamado Cornelio, centurión de la llamada cohorte Italiana[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cierto hombre en Cesarea». El griego emplea una expresión indefinida para introducir a un nuevo personaje.
    reason: lexical_alternative
  - marker: b
    text: Una «cohorte» era una unidad militar romana. «Italiana» probablemente indica una unidad asociada con Italia o compuesta por soldados italianos.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre cierto
  lexicon: BDAG
  rationale: ἀνήρ designa a un varón adulto; en una apertura narrativa, «un hombre» es natural en español y conserva la referencia masculina sin añadir dureza ni tecnicismo innecesario.
- source_word: δέ
  english_pob_choice: Now
  alternatives_spanish:
  - Y
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa suave. En español, el flujo se mantiene mejor sin partícula explícita, evitando una sobretraducción que suene forzada.
- source_word: τις
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - un cierto
  - existía
  lexicon: BDAG
  rationale: τις introduce un personaje nuevo de manera indefinida. «Había» comunica esa indefinición de forma idiomática, sin perder el valor de introducción narrativa.
- source_word: ἐν Καισαρείᾳ
  english_pob_choice: in Caesarea
  chosen_spanish: en Cesarea
  alternatives_spanish:
  - en Cesarea
  - en la ciudad de Cesarea
  lexicon: BDAG
  rationale: Topónimo locativo directo. «Cesarea» es la forma usual en español y conserva la referencia geográfica sin expansión interpretativa.
- source_word: ὀνόματι Κορνήλιος
  english_pob_choice: named Cornelius
  chosen_spanish: llamado Cornelio
  alternatives_spanish:
  - de nombre Cornelio
  - cuyo nombre era Cornelio
  lexicon: BDAG
  rationale: El dativo con ὄνομα se vierte de manera natural como «llamado». «Cornelio» mantiene el nombre propio en forma española estándar.
- source_word: ἑκατοντάρχης
  english_pob_choice: a centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - comandante de cien hombres
  - oficial romano
  lexicon: BDAG
  rationale: «Centurión» es el término histórico preciso y reconocido en español para este rango militar romano; evita una paráfrasis explicativa en el texto principal.
- source_word: ἐκ σπείρης
  english_pob_choice: from the cohort
  chosen_spanish: de la cohorte
  alternatives_spanish:
  - de la cohorte
  - procedente de la cohorte
  lexicon: BDAG
  rationale: σπεῖρα se refiere a una unidad militar romana; «cohorte» es el equivalente histórico adecuado en español. La preposición «de» refleja naturalmente la pertenencia o adscripción militar.
- source_word: τῆς καλουμένης Ἰταλικῆς
  english_pob_choice: called the Italian Cohort
  chosen_spanish: llamada Italiana
  alternatives_spanish:
  - llamada la cohorte Italiana
  - conocida como la Italiana
  lexicon: BDAG
  rationale: El participio καλουμένης se expresa con «llamada». Dado que en español «cohorte» ya está presente, «Italiana» funciona como nombre distintivo de la unidad; la mayúscula sigue el uso de denominaciones militares específicas.
translation_notes:
  revision_awareness: La versión sigue de cerca el griego SBLGNT y es coherente con el auditable inglés POB. Se preserva la introducción indefinida de νέος personaje mediante «había» y se mantiene la terminología militar histórica («centurión», «cohorte») sin ampliación interpretativa.
  spanish_consistency_notes:
  - Se usa «Cesarea» como topónimo estándar en español.
  - Se conserva la capitalización en «Italiana» por tratarse del nombre distintivo de la cohorte.
  - No se añade artículo antes de «centurión» para respetar la estructura nominal griega y la fluidez española.
  - La nota [a] cubre la alternativa indefinida documentada en el inglés POB; la nota [b] preserva el trasfondo cultural militar sin sobreinterpretar.
