translation:
  language: es
  text: Así que envié por ti de inmediato[a], y hiciste bien en venir. Ahora bien, todos nosotros estamos delante de Dios para oír todo lo que te ha sido mandado por el Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inmediatamente» o «sin demora».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el Señor». En el contexto probablemente se refiere a Jesús, aunque algunos lo entienden de modo más general como Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξαυτῆς
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  - sin demora
  lexicon: BDAG
  rationale: El adverbio expresa prontitud. «De inmediato» conserva esa urgencia en español natural sin suavizarla.
- source_word: ἔπεμψα πρὸς σέ
  english_pob_choice: I sent for you
  chosen_spanish: envié por ti
  alternatives_spanish:
  - te envié a llamar
  - te mandé buscar
  - envié hacia ti
  lexicon: BDAG
  rationale: El contexto es la convocatoria de Pedro; «envié por ti» comunica el matiz idiomático de llamar o mandar a buscar sin perder la referencia al envío.
- source_word: σύ τε
  english_pob_choice: and you
  chosen_spanish: y
  alternatives_spanish:
  - y tú
  - y por tu parte
  - así que tú
  lexicon: BDAG
  rationale: La coordinación en español funciona mejor sin repetir innecesariamente el pronombre; el valor correlativo se entiende por el contexto.
- source_word: καλῶς ἐποίησας παραγενόμενος
  english_pob_choice: you did well to come
  chosen_spanish: hiciste bien en venir
  alternatives_spanish:
  - obraste bien al venir
  - fue bueno que vinieras
  - has hecho bien al llegar
  lexicon: BDAG
  rationale: La combinación expresa aprobación de la llegada de Pedro. «Hiciste bien en venir» es idiomática y fiel a la valoración positiva.
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Ahora entonces
  - Pues ahora
  - Así que ahora
  lexicon: BDAG
  rationale: La fórmula marca transición discursiva hacia el propósito de la reunión. «Ahora pues» conserva el enlace lógico sin sonar artificial.
- source_word: πάντες ἡμεῖς
  english_pob_choice: we are all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos estamos nosotros
  - nosotros todos
  - todos los presentes
  lexicon: BDAG
  rationale: El grupo reunido queda enfatizado. «Todos nosotros» mantiene el énfasis colectivo de manera clara y natural.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: «Delante de Dios» reproduce bien la solemnidad de estar en su presencia. «Ante Dios» sería igualmente posible, pero aquí «delante de» suena más solemne y transparente.
- source_word: πάρεσμεν
  english_pob_choice: are here
  chosen_spanish: estamos
  alternatives_spanish:
  - estamos aquí
  - estamos presentes
  - nos hallamos
  lexicon: BDAG
  rationale: El verbo denota presencia. En español, «estamos delante de Dios» ya comunica presencia; repetir «aquí» sería redundante.
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - a fin de oír
  - para prestar oído a
  lexicon: BDAG
  rationale: El infinitivo expresa finalidad. «Oír» conserva la relación directa con el contenido que será comunicado; «escuchar» añadiría una matización de atención que no está explícita.
- source_word: πάντα τὰ προστεταγμένα
  english_pob_choice: everything that has been commanded
  chosen_spanish: todo lo que te ha sido mandado
  alternatives_spanish:
  - todo lo que se te ha ordenado
  - todas las cosas que te han sido mandadas
  - todo lo que se te ha encargado
  lexicon: BDAG
  rationale: El participio pasivo perfecto indica mandatos recibidos con fuerza autoritativa. «Te ha sido mandado» preserva ese pasivo y evita diluir el peso de la orden.
- source_word: ὑπὸ τοῦ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - por el Señor Jesús
  - por el Maestro
  - por el Dueño
  lexicon: BDAG
  rationale: Se mantiene «el Señor» para respetar el término griego κύριος y la decisión auditada del POB. En español, la forma estándar de este título es «Señor».
theological_decisions:
- issue: Referente de κύριος / «el Señor»
  english_pob_reading: The main text keeps 'the Lord' without specifying Jesus, while the note acknowledges that in context it likely refers to Jesus.
  chosen_spanish_reading: Se conserva «el Señor» en el texto principal sin explicitar «Jesús».
  alternative_spanish_readings:
  - «el Señor Jesús»
  - «Dios»
  - «el Dueño»
  rationale: El griego nombra solo κύριος. En el contexto narrativo puede aludir a Jesús resucitado, pero la traducción debe preservar la ambigüedad documentada y no resolverla por expansión interpretativa.
  doctrine_reference: 'Contested terms: κύριος → Señor; preservar la tensión teológica sin cerrarla'
- issue: Alcance de «delante de Dios»
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - ante Dios
  - en presencia de Dios
  rationale: La expresión señala una presencia solemne y consciente, no solo una localización física. «Delante de Dios» conserva ese matiz reverente sin añadir explicaciones.
  doctrine_reference: Teología de la presencia divina en el discurso narrativo
- issue: Fuerza de «ha sido mandado»
  english_pob_reading: everything that has been commanded
  chosen_spanish_reading: todo lo que te ha sido mandado
  alternative_spanish_readings:
  - todo lo que se te ha ordenado
  - todo lo que se te ha encargado
  rationale: La pasiva mantiene la autoridad del mandamiento y deja claro que la instrucción viene de una instancia superior, acorde con el griego pasivo perfecto.
  doctrine_reference: Autoridad del mandato divino en la comisión apostólica
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española conserva la misma estructura discursiva, la prontitud de ἐξαυτῆς, la fórmula de transición νῦν οὖν y la ambigüedad teológica de τοῦ κυρίου.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, coherente con la terminología POB y con el matiz titular del griego.
  - Se eligió una sintaxis española natural («envié por ti», «hiciste bien en venir») sin perder el sentido causal y discursivo del original.
  - «Delante de Dios» y «para oír» conservan la solemnidad y finalidad del enunciado sin añadir material interpretativo.
