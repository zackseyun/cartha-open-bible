base_translation:
  language: en
  yaml_path: translation/nt/acts/010/032.yaml
  text: Therefore send to Joppa and summon Simon[a], who is called Peter. He is lodging in the house of Simon, a tanner[b], by the sea.
  footnotes:
  - marker: a
    text: Or 'send for Simon' instead of 'summon Simon'; the Greek verb means to have someone called to oneself.
    reason: lexical_alternative
  - marker: b
    text: Or 'is lodging' for 'is staying'; the Greek indicates that Peter is being hosted as a guest.
    reason: lexical_alternative
