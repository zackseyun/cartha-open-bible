    changes_summary: Changed 'is staying' to 'is lodging' to more directly reflect ξενίζεται ('is being hosted/lodging') while keeping the rest of the verse natural and formal.
translation:
  language: es
  text: Por tanto, envía a Jope y manda llamar a Simón[a], que es llamado Pedro. Este se hospeda en la casa de Simón, un curtidor, junto al mar.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haz venir a Simón»; el griego μετακάλεσαι implica hacer venir a alguien o pedir su presencia.
    reason: lexical_alternative
  - marker: b
    text: O «está hospedado»; ξενίζεται indica que recibe hospitalidad como huésped, no solo que permanece allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - manda a
  lexicon: BDAG
  rationale: El aoristo imperativo pide una acción directa. «Envía» es natural en español y conserva la orden de mandar a alguien con una misión.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca una consecuencia de la instrucción previa. «Por tanto» preserva bien la conexión lógica sin sonar excesivamente coloquial.
- source_word: εἰς Ἰόππην
  english_pob_choice: to Joppa
  chosen_spanish: a Jope
  alternatives_spanish:
  - hacia Jope
  - para Jope
  lexicon: BDAG
  rationale: La preposición de dirección se expresa de forma idiomática con «a» en español. Se mantiene el nombre geográfico tradicional «Jope».
- source_word: μετακάλεσαι
  english_pob_choice: summon
  chosen_spanish: llama
  alternatives_spanish:
  - haz venir
  - manda llamar
  - convoca
  lexicon: BDAG
  rationale: El verbo expresa hacer venir a alguien. «Llama» es breve y natural; en este contexto conserva el sentido de pedir su presencia sin añadir matices burocráticos.
- source_word: Σίμωνα ὃς ἐπικαλεῖται Πέτρος
  english_pob_choice: Simon, who is called Peter
  chosen_spanish: a Simón, que es llamado Pedro
  alternatives_spanish:
  - a Simón, llamado Pedro
  - a Simón, a quien llaman Pedro
  lexicon: BDAG
  rationale: «Que es llamado Pedro» sigue de cerca la función identificadora de ὃς ἐπικαλεῖται. Se conserva la tensión entre nombre propio y nombre conocido, sin convertirlo en un apodo libre.
- source_word: ξενίζεται
  english_pob_choice: is lodging
  chosen_spanish: se hospeda
  alternatives_spanish:
  - está alojado
  - está hospedándose
  - se aloja
  lexicon: BDAG
  rationale: El verbo sugiere recibir hospitalidad como huésped. «Se hospeda» comunica bien esa idea en español y evita la impresión de simple permanencia neutral.
- source_word: ἐν οἰκίᾳ Σίμωνος βυρσέως
  english_pob_choice: in the house of Simon, a tanner
  chosen_spanish: en la casa de Simón, un curtidor
  alternatives_spanish:
  - en la casa de Simón, el curtidor
  - en casa de Simón, un curtidor
  lexicon: BDAG
  rationale: «Casa» conserva οἰκία y «curtidor» traduce βυρσεύς con precisión ocupacional. La aposición mantiene visible tanto el nombre como el oficio.
- source_word: παρὰ ⸀θάλασσαν
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - cerca del mar
  - a la orilla del mar
  - junto al mar
  lexicon: BDAG
  rationale: παρά con acusativo indica proximidad lateral. «Junto al mar» es claro y reproduce bien la localización junto a la costa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que ajustó ξενίζεται de «is staying» a «is lodging» para reflejar mejor la hospitalidad implícita; por eso se eligió «se hospeda» y se anotó la alternativa más literal «está hospedado/está hospedándose» en la nota. También se preservó la relación lógica de οὖν con «Por tanto» y se mantuvo la identificación doble de Simón con Pedro.
  spanish_consistency_notes:
  - Se usó «Yope/Jope» como forma geográfica tradicional en español bíblico, pero se eligió «Jope» para adecuación editorial y consistencia con otros nombres bíblicos en español de esta serie.
  - Se mantuvo «Pedro» como nombre fijo, no como transliteración de Πέτρος.
  - «Curtidor» conserva el oficio específico de βυρσεύς y evita generalizaciones como «trabajador del cuero».
  - La localización final «junto al mar» conserva la sencillez del griego y el sentido espacial de παρά con acusativo.
