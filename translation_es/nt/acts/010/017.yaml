review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del audit trail inglés en casi todo: Pedro está en perplejidad interna, busca el significado de la visión, los hombres fueron enviados por Cornelio, preguntaron por la casa de Simón y llegaron al acceso de la casa. Sin embargo, dos elecciones debilitan la precisión: «se detuvieron» no refleja tan bien como «estaban/pararon/se presentaron» la idea de ἐπέστησαν como ponerse en ese lugar, y «en la puerta» es comprensible pero menos adecuado que «en el portón» o «en la entrada» para πυλών, que suele señalar el portal/gate/gateway más que una puerta cualquiera.'
  spanish_quality_summary: El español es claro y natural, con tono digno y legible. «He aquí» funciona, aunque es algo elevado. La sintaxis general es buena. La mejora principal es hacer más exacta y visual la escena final con una expresión más idiomática y específica para el acceso exterior de la casa.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La decisión «visión» para ὅραμα y «significar» para τί ἂν εἴη está bien alineada con la rationale auditada. La nota sobre πυλών debe conservar la alternativa semántica puerta/entrada/portón, pero el texto principal conviene ajustarlo a «portón» para aproximarse mejor al campo semántico de gate/gateway.
  issues:
  - severity: medium
    issue: «se detuvieron» para ἐπέστησαν
    rationale: El verbo en contexto no enfatiza solo una pausa, sino que los hombres llegaron y quedaron apostados en ese punto. «Se detuvieron» puede sugerir meramente que dejaron de caminar, perdiendo el matiz locativo de presentarse/estar allí.
  - severity: medium
    issue: «en la puerta» para ἐπὶ τὸν πυλῶνα
    rationale: πυλών normalmente apunta al portón, portal o entrada exterior, no a una puerta interior o genérica. «Puerta» es posible pero menos preciso y puede reducir la imagen espacial que el inglés auditado preserva con «gate/gateway».
  - severity: low
    issue: Anclaje de la nota [a] en «perplejo»
    rationale: La nota [a] explica ἐν ἑαυτῷ, no διηπόρει. Conviene anclarla en «en su interior» para mayor correspondencia entre texto y nota.
  revised_spanish_text: Mientras Pedro estaba perplejo en su interior[a] acerca de qué podría significar la visión que había visto, he aquí, los hombres que habían sido enviados por Cornelio, después de haber pedido indicaciones para la casa de Simón, llegaron al portón[b].
  revised_footnotes:
  - marker: a
    text: 'O: «interiormente» o «dentro de sí». El griego expresa que la perplejidad de Pedro era interna.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a la entrada». El griego πυλών puede referirse al portón o a la zona de acceso de la casa.'
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la escena final para reflejar mejor el griego: «llegaron al portón» representa con más precisión ἐπέστησαν ἐπὶ τὸν πυλῶνα que «se detuvieron en la puerta». También se movió la nota [a] al segmento que realmente traduce ἐν ἑαυτῷ.'
