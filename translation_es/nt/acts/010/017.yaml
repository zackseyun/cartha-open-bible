revisions:
- from: Mientras Pedro estaba perplejo[a] en su interior acerca de qué podría significar la visión que había visto, he aquí, los hombres que habían sido enviados por Cornelio, después de haber pedido indicaciones para la casa de Simón[b], se detuvieron en la puerta.
  to: Mientras Pedro estaba perplejo en su interior[a] acerca de qué podría significar la visión que había visto, he aquí, los hombres que habían sido enviados por Cornelio, después de haber pedido indicaciones para la casa de Simón, llegaron al portón[b].
  rationale: 'Se ajustó la escena final para reflejar mejor el griego: «llegaron al portón» representa con más precisión ἐπέστησαν ἐπὶ τὸν πυλῶνα que «se detuvieron en la puerta». También se movió la nota [a] al segmento que realmente traduce ἐν ἑαυτῷ.'
