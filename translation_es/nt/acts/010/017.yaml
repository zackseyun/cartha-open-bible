source:
  edition: SBLGNT
  text: Ὡς δὲ ἐν ἑαυτῷ διηπόρει ὁ Πέτρος τί ἂν εἴη τὸ ὅραμα ὃ εἶδεν, ⸀ἰδοὺ οἱ ἄνδρες οἱ ἀπεσταλμένοι ⸀ὑπὸ τοῦ Κορνηλίου διερωτήσαντες τὴν οἰκίαν ⸀τοῦ Σίμωνος ἐπέστησαν ἐπὶ τὸν πυλῶνα,
base_translation:
  language: en
  yaml_path: translation/nt/acts/010/017.yaml
  text: Now while Peter was inwardly perplexed as to what the vision that he had seen might mean[a], behold, the men who had been sent by Cornelius, having asked directions to Simon’s house[b], stood at the gate.
  footnotes:
  - marker: a
    text: Or, 'what the vision he had seen might be.' The Greek can be rendered more literally this way, but here it likely refers to the vision’s meaning or significance.
    reason: lexical_alternative
  - marker: b
    text: Or, 'at the gateway.' The Greek term can refer to the gate or entrance area of a house.
    reason: lexical_alternative
