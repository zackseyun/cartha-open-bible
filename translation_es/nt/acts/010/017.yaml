    changes_summary: 'Adjusted phrasing for closer lexical accuracy and more natural formal English: changed ''about what the vision he had seen might mean'' to ''as to what the vision that he had seen might mean''; rendered ἀπεσταλμένοι more explicitly as ''who had been sent''; and translated διερωτήσαντες as ''having asked directions to'' rather than simply ''having asked for.'''
translation:
  language: es
  text: Mientras Pedro estaba perplejo en su interior[a] acerca de qué podría significar la visión que había visto, he aquí, los hombres que habían sido enviados por Cornelio, después de haber pedido indicaciones para la casa de Simón, llegaron al portón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «interiormente» o «dentro de sí». El griego expresa que la perplejidad de Pedro era interna.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a la entrada». El griego πυλών puede referirse al portón o a la zona de acceso de la casa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: Now while
  chosen_spanish: Mientras
  alternatives_spanish:
  - Y mientras
  - Ahora mientras
  - Y cuando
  lexicon: BDAG
  rationale: Introduce el trasfondo temporal con fluidez narrativa en español; 'mientras' conserva la simultaneidad y hace natural el enlace discursivo de δέ sin sobrecargar el verso.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: inwardly
  chosen_spanish: en su interior
  alternatives_spanish:
  - dentro de sí
  - interiormente
  - en sí mismo
  lexicon: BDAG
  rationale: La expresión apunta a una reflexión interna de Pedro. 'En su interior' preserva la idea idiomática sin sonar forzado en español.
- source_word: διηπόρει
  english_pob_choice: was ... perplexed
  chosen_spanish: estaba perplejo
  alternatives_spanish:
  - estaba confundido
  - estaba muy perplejo
  - estaba sin saber qué pensar
  lexicon: BDAG
  rationale: El imperfecto indica un estado continuo de desconcierto. 'Perplejo' retiene mejor la fuerza de la incertidumbre que opciones más débiles como 'confundido'.
- source_word: τί ἂν εἴη
  english_pob_choice: what ... might mean
  chosen_spanish: qué podría significar
  alternatives_spanish:
  - qué podría ser
  - qué era
  - qué significaba
  lexicon: BDAG
  rationale: En contexto Pedro busca el sentido de la visión, no solo su identidad literal. 'Podría significar' reproduce bien la fuerza interpretativa sin alejarse del griego.
- source_word: τὸ ὅραμα ὃ εἶδεν
  english_pob_choice: the vision that he had seen
  chosen_spanish: la visión que había visto
  alternatives_spanish:
  - la visión que vio
  - la visión que había contemplado
  lexicon: BDAG
  rationale: La relativa simple es natural en español; el pluscuamperfecto mantiene la secuencia narrativa y corresponde al inglés auditado.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - he aquí que
  - de pronto
  lexicon: BDAG
  rationale: Se conserva el valor discursivo de introducción súbita de un hecho notable. 'He aquí' mantiene el tono elevado del marcador sin perder inteligibilidad.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los hombres enviados
  - aquellos hombres
  lexicon: BDAG
  rationale: '''Hombres'' es la correspondencia directa y natural para ἄνδρες en este contexto narrativo.'
- source_word: οἱ ἀπεσταλμένοι ὑπὸ τοῦ Κορνηλίου
  english_pob_choice: the men who had been sent by Cornelius
  chosen_spanish: que habían sido enviados por Cornelio
  alternatives_spanish:
  - enviados por Cornelio
  - comisionados por Cornelio
  - mandados por Cornelio
  lexicon: BDAG
  rationale: La pasiva explícita mantiene el matiz de misión recibida. 'Habían sido enviados' refleja con claridad la relación agentiva y el envío previo.
- source_word: διερωτήσαντες
  english_pob_choice: having asked directions to
  chosen_spanish: después de haber pedido indicaciones para
  alternatives_spanish:
  - después de preguntar por
  - tras haber averiguado
  - habiendo pedido direcciones para
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, 'después de haber pedido indicaciones para' comunica bien la secuencia y el resultado de la indagación.
- source_word: τὴν οἰκίαν τοῦ Σίμωνος
  english_pob_choice: Simon’s house
  chosen_spanish: la casa de Simón
  alternatives_spanish:
  - la casa de Simón
  - el hogar de Simón
  - la vivienda de Simón
  lexicon: BDAG
  rationale: '''Casa'' corresponde directamente a οἰκία en este contexto narrativo. Se evita ''hogar'' para no introducir un matiz afectivo no exigido por el texto.'
- source_word: ἐπέστησαν
  english_pob_choice: stood
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se quedaron
  - se presentaron
  - se pusieron de pie
  lexicon: BDAG
  rationale: En la construcción con ἐπὶ τὸν πυλῶνα el verbo expresa llegar y situarse en un punto. 'Se detuvieron' preserva la idea de quedar colocados allí sin forzar una equivalencia demasiado literal.
- source_word: ἐπὶ τὸν πυλῶνα
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en el portal
  - en la entrada
  - en el portón
  lexicon: BDAG
  rationale: πυλών puede referirse a la puerta o zona de acceso. 'Puerta' es claro y natural en español; conserva la referencia al acceso de la casa sin requerir una nota extensa en el texto principal.
theological_decisions:
- issue: Valor de la visión y su significado interpretativo
  english_pob_reading: Peter was perplexed as to what the vision might mean.
  chosen_spanish_reading: Pedro estaba perplejo acerca de qué podría significar la visión.
  alternative_spanish_readings:
  - Pedro estaba perplejo sobre qué era la visión.
  - Pedro estaba perplejo de la visión
  rationale: La cuestión no es solo la existencia de la visión, sino su sentido. La redacción española mantiene la ambigüedad interpretativa que el griego y el audit trail inglés preservan.
  doctrine_reference: Hechos 10:17; principio de sentido contextual frente a literalismo rígido
- issue: Alcance de πυλών
  english_pob_reading: at the gate / gateway
  chosen_spanish_reading: en la puerta
  alternative_spanish_readings:
  - en el portón
  - en el portal
  - en la entrada
  rationale: El término griego puede abarcar puerta o zona de acceso. 'Puerta' mantiene la tensión semántica entre acceso físico y umbral de la casa sin imponer una arquitectura específica.
  doctrine_reference: Hechos 10:17; nota lexical sobre πυλών
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que precisó Ὡς δὲ como 'Now while', hizo más explícito 'who had been sent' para ἀπεσταλμένοι y ajustó διερωτήσαντες a 'having asked directions to'. La redacción española refleja esas precisiones con 'Mientras', 'que habían sido enviados' y 'después de haber pedido indicaciones para', manteniendo el orden narrativo y la fuerza semántica del original.
  spanish_consistency_notes:
  - Se mantiene 'Cornelio' como forma española del nombre propio.
  - Se usa 'Simón' para Σίμων, coherente con el resto del texto bíblico en español.
  - Se conserva el marcador discursivo 'he aquí' para ἰδοὺ, alineado con el énfasis narrativo del original.
  - '''Casa'' y ''puerta'' se usan de forma coherente para οἰκία y πυλών respectivamente, con nota para la posible ambigüedad de acceso.'
