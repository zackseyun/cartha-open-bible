translation:
  language: es
  text: pero en toda nación, el que le teme y hace lo recto[a] es aceptable para él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obra justicia» / «practica la justicia». Griego δικαιοσύνην, comúnmente «justicia»; en algunos contextos también puede traducirse «rectitud».'
    reason: lexical_alternative
