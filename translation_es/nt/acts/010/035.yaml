    rationale: El POB inglés sólo conserva una alternativa de traducción para δεκτός αὐτῷ ἐστιν ('is accepted by him'). La nota explicativa adicional sobre ambigüedad teológica excede lo necesario y puede sobreinterpretar.
  revised_spanish_text: pero en toda nación, el que le teme y hace lo recto[a] es aceptable para él[b].
