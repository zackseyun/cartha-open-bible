lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: Marca contraste directo con la afirmación anterior; en español, «pero» es la adversativa más natural y fiel aquí.
- source_word: ἐν παντὶ ἔθνει
  english_pob_choice: in every nation
  chosen_spanish: en toda nación
  alternatives_spanish:
  - entre toda nación
  - en cada nación
  lexicon: BDAG
  rationale: Conserva el sentido distributivo de παντί y ἔθνει sin sobrecargarlo con una formulación étnica moderna; «nación» refleja bien ἔθνος en este contexto.
- source_word: ὁ φοβούμενος αὐτὸν
  english_pob_choice: the one who fears him
  chosen_spanish: el que le teme
  alternatives_spanish:
  - el que teme a él
  - quien le teme
  lexicon: BDAG
  rationale: La participio articulado funciona sustantivamente; «el que» conserva la fuerza representativa singular. «Le teme» comunica la reverencia debida a Dios en español natural.
- source_word: ἐργαζόμενος δικαιοσύνην
  english_pob_choice: does what is right
  chosen_spanish: practica la justicia
  alternatives_spanish:
  - hace lo recto
  - obra justicia
  - practica la rectitud
  lexicon: BDAG
  rationale: Se preserva el valor activo de ἐργάζομαι junto con δικαιοσύνην. «Practica la justicia» mantiene la relación léxica con δικαιοσύνη y suena natural en español bíblico contemporáneo.
- source_word: δικαιοσύνην
  english_pob_choice: what is right
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo justo
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por una paráfrasis idiomática, en español «la justicia» conserva mejor la correspondencia semántica del término y permite mantener la nota sobre la posible amplitud de sentido hacia «justicia/rectitud».
- source_word: δεκτὸς αὐτῷ ἐστιν
  english_pob_choice: is acceptable to him
  chosen_spanish: es aceptable para él
  alternatives_spanish:
  - es aceptado por él
  - es recibido favorablemente por él
  - le es agradable
  lexicon: BDAG
  rationale: «Aceptable para él» refleja καλά/δεκτός como estado de aceptación o favor sin imponer más de lo que dice la frase griega. Se mantiene la apertura de posible voz pasiva/resultado sin resolverla de forma interpretativa.
theological_decisions:
- issue: Relación entre temor a Dios, práctica de justicia y aceptación divina
  english_pob_reading: The verse states that in every nation the person who fears God and does what is right is acceptable to him, without importing a doctrinal explanation beyond the verse itself.
  chosen_spanish_reading: El versículo afirma que, en toda nación, el que teme a Dios y practica la justicia es aceptable para él, sin añadir una explicación doctrinal que el texto no explicita.
  alternative_spanish_readings:
  - 'una lectura más meritocrática: ‘gana la aceptación de Dios’'
  - 'una lectura más interpretativa: ‘muestra evidencia de fe salvadora’'
  rationale: 'La traducción conserva la tensión teológica del texto: describe una condición de aceptación en el marco de la imparcialidad divina, pero no resuelve el debate sobre mérito, evidencia o pacto. «Aceptable para él» deja abierta la relación exacta sin exagerarla.'
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Posible matiz de δικαιοσύνην entre justicia y rectitud
  english_pob_reading: Greek δικαιοσύνην, commonly 'righteousness'; in some contexts the term can also be rendered 'justice.'
  chosen_spanish_reading: «Justicia» como traducción principal, con la posibilidad semántica de «rectitud» preservada en la nota.
  alternative_spanish_readings:
  - rectitud
  - lo justo
  rationale: En español, «justicia» es el equivalente bíblico más estable de δικαιοσύνη y permite retener el vínculo con el campo semántico legal/moral sin diluirlo en una expresión demasiado libre. La nota cubre la alternativa semántica legítima.
  doctrine_reference: Mantener la amplitud semántica del término.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «does what is righteous» a «does what is right» por naturalidad idiomática. En español, se prefirió volver al equivalente léxico más directo de δικαιοσύνην («justicia») para preservar mejor la correspondencia con el original y la nota semántica existente.
  spanish_consistency_notes:
  - Se usa «Dios» en la formulación implícita por el referente del pronombre él, conforme al contexto del pasaje.
  - Se preserva «justicia» para δικαιοσύνην, evitando reemplazarla automáticamente por una paráfrasis más libre.
  - «Aceptable para él» mantiene la posibilidad de lectura relacional sin forzar una explicación soteriológica.
  - La puntuación sigue el orden natural del español, con coma tras el complemento inicial de marco temporal/espacial.
