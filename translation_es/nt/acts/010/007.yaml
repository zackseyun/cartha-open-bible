translation:
  language: es
  text: Cuando el ángel que le hablaba se había ido, llamó a dos de sus siervos de la casa[a] y a un soldado piadoso de entre los que lo atendían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos de los esclavos de su casa». El griego οἰκέται se refiere a miembros del hogar en servicio servil; «siervos de la casa» se usa aquí para un español más natural sin perder el marco doméstico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Y al
  lexicon: BDAG
  rationale: Introduce la secuencia temporal de manera natural en español y conserva el avance narrativo sin sobrecargar el valor de δέ.
- source_word: ἀπῆλθεν
  english_pob_choice: had gone away
  chosen_spanish: se había ido
  alternatives_spanish:
  - había partido
  - se había marchado
  lexicon: BDAG
  rationale: El aoristo marca una acción completada previa a la acción principal; el pluscuamperfecto español expresa bien esa anterioridad.
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En Hechos 10 el contexto es una visión con un ser celestial, así que «ángel» refleja mejor el referente que «mensajero».
- source_word: ὁ λαλῶν αὐτῷ
  english_pob_choice: who was speaking to him
  chosen_spanish: que le hablaba
  alternatives_spanish:
  - que estaba hablándole
  - que le estaba hablando
  lexicon: BDAG
  rationale: El participio presente identifica al ángel como el que se dirigía a Cornelio; en español una relativa simple conserva la referencia con naturalidad.
- source_word: φωνήσας
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - hizo llamar
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción principal que continúa en la siguiente unidad narrativa; «llamó» es directo y fiel al movimiento del texto.
- source_word: δύο τῶν οἰκετῶν
  english_pob_choice: two of his household servants
  chosen_spanish: dos de sus siervos domésticos
  alternatives_spanish:
  - dos de sus servidores de la casa
  - dos de su servidumbre doméstica
  lexicon: BDAG
  rationale: οἰκέτης denota una persona de servicio vinculada al hogar, con fuerza servil. Se evita suavizarlo a «sirvientes» porque el contexto y el audit trail preservan esa tensión lexical; «siervos domésticos» comunica la relación doméstica y el carácter servil.
- source_word: στρατιώτην
  english_pob_choice: a soldier
  chosen_spanish: un soldado
  alternatives_spanish:
  - un militar
  lexicon: BDAG
  rationale: Traducción directa del sustantivo singular; «soldado» es la opción natural y exacta en español.
- source_word: εὐσεβῆ
  english_pob_choice: devout
  chosen_spanish: piadoso
  alternatives_spanish:
  - devoto
  - temeroso de Dios
  lexicon: BDAG
  rationale: εὐσεβής describe reverencia y piedad. «Piadoso» conserva esa cualidad sin introducir el matiz específico de «temeroso de Dios» que no está explícito en el adjetivo.
- source_word: τῶν προσκαρτερούντων αὐτῷ
  english_pob_choice: from among those attending him
  chosen_spanish: de entre los que lo atendían
  alternatives_spanish:
  - de entre los que le servían constantemente
  - de entre sus asistentes
  lexicon: BDAG
  rationale: El participio genitivo plural expresa personas que permanecían al servicio o atención constante de Cornelio. «Lo atendían» mantiene el sentido de asistencia continua sin volver el español pesado.
theological_decisions:
- issue: Naturaleza de ἄγγελος en contexto
  english_pob_reading: Rendered as a heavenly 'angel' rather than the generic 'messenger.'
  chosen_spanish_reading: «ángel» y no «mensajero»
  alternative_spanish_readings:
  - mensajero
  rationale: El contexto inmediato de la visión de Cornelio exige el sentido celestial. Traducir «ángel» preserva la identificación narrativa y evita diluir el elemento sobrenatural.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Fuerza servil de οἰκέται
  english_pob_reading: '''household servants'' with a footnote noting ''household slaves'''
  chosen_spanish_reading: «siervos domésticos» con nota alternativa sobre «esclavos de la casa»
  alternative_spanish_readings:
  - esclavos domésticos
  - sirvientes domésticos
  rationale: El término griego conserva una tensión entre pertenencia al hogar y estatus servil. En español, «siervos domésticos» permite publicar un texto legible sin borrar esa fuerza; la nota mantiene abierta la alternativa lexical más dura.
  doctrine_reference: Principio POB de transparencia lexical y preservación de tensiones significativas
translation_notes:
  revision_awareness: 'El texto sigue de cerca el análisis auditado en inglés, sin depender mecánicamente de él: conserva la anterioridad del aoristo con pluscuamperfecto, mantiene «ángel» por el contexto visionario de Hechos 10 y refleja la tensión de οἰκέται con una opción española legible y una nota alternativa.'
  spanish_consistency_notes:
  - Se mantuvo «ángel» conforme al criterio POB para el ser celestial del contexto.
  - Se evitó «Cristo»/«SEÑOR» porque no aparecen en este versículo.
  - «Piadoso» traduce εὐσεβῆ sin convertirlo en una fórmula más específica que el griego.
  - La nota de οἰκέται preserva la alternativa fuerte «esclavos domésticos» para no borrar el matiz servil documentado.
