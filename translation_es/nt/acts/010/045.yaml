translation:
  language: es
  text: Y los creyentes de la circuncisión que habían venido con Pedro quedaron asombrados[c][b][a], porque incluso sobre los gentiles se había derramado el don del Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los creyentes circuncisos». Literalmente, «los creyentes de la circuncisión».
    reason: lexical_alternative
  - marker: b
    text: 'O «también sobre los gentiles»; el griego puede expresar adición, pero aquí probablemente comunica sorpresa: «incluso sobre los gentiles».'
    reason: lexical_alternative
  - marker: c
    text: O «ha sido derramado». El perfecto griego destaca una acción completada con resultado continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέστησαν
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se maravillaron
  - quedaron atónitos
  lexicon: BDAG
  rationale: El aoristo expresa una reacción intensa de sorpresa. «Quedaron asombrados» es natural en español y conserva la fuerza del evento sin sonar forzado.
- source_word: οἱ ἐκ περιτομῆς πιστοὶ
  english_pob_choice: the believers from the circumcision
  chosen_spanish: los creyentes de la circuncisión
  alternatives_spanish:
  - los creyentes circuncisos
  - los creyentes procedentes de la circuncisión
  lexicon: BDAG
  rationale: La construcción griega identifica a un grupo de creyentes por su pertenencia a la circuncisión; «de la circuncisión» preserva esa marca grupal mejor que suavizarla solo como adjetivo.
- source_word: ὅσοι συνῆλθαν τῷ Πέτρῳ
  english_pob_choice: who had come with Peter
  chosen_spanish: que habían venido con Pedro
  alternatives_spanish:
  - que acompañaron a Pedro
  - que se habían reunido con Pedro
  lexicon: BDAG
  rationale: La frase especifica qué creyentes se tienen en vista. «Habían venido con Pedro» transmite la idea de acompañamiento de modo idiomático en español.
- source_word: καὶ ἐπὶ τὰ ἔθνη
  english_pob_choice: even on the Gentiles
  chosen_spanish: también sobre los gentiles
  alternatives_spanish:
  - incluso sobre los gentiles
  - también a los gentiles
  lexicon: BDAG
  rationale: Aquí καὶ puede tener valor aditivo o de sorpresa. En español, «también» deja abierta la relación semántica y mantiene la posibilidad de asombro sin sobredeterminarla. «Gentiles» es el referente contextual en Hechos 10.
- source_word: ἡ δωρεὰ
  english_pob_choice: the gift
  chosen_spanish: el don
  alternatives_spanish:
  - el regalo
  - la dádiva
  lexicon: BDAG
  rationale: «Don» es un equivalente digno y bíblicamente claro en español para δωρεά. Conserva la idea de algo otorgado gratuitamente sin añadir explicación innecesaria.
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo de Dios
  lexicon: BDAG
  rationale: La expresión estable en español eclesial es «Espíritu Santo». Aquí el genitivo se conserva de forma directa y natural.
- source_word: ἐκκέχυται
  english_pob_choice: had been poured out
  chosen_spanish: se había derramado
  alternatives_spanish:
  - había sido derramado
  - se ha derramado
  lexicon: BDAG
  rationale: El perfecto pasivo destaca una acción ya cumplida con resultado vigente. En español, «se había derramado» reproduce bien la imagen de efusión y funciona con fluidez en el contexto narrativo.
theological_decisions:
- issue: Identificación de τὰ ἔθνη
  english_pob_reading: Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  - los pueblos
  rationale: En Hechos 10 el contraste es entre creyentes judíos y no judíos; «gentiles» comunica de forma precisa el referente salvífico-histórico sin diluirlo en un sentido más general.
  doctrine_reference: Hechos 10; uso contextual de ἔθνη en narrativa lucana
- issue: Valor aspectual de ἐκκέχυται
  english_pob_reading: had been poured out
  chosen_spanish_reading: se había derramado
  alternative_spanish_readings:
  - se ha derramado
  - había sido derramado
  rationale: 'El perfecto griego subraya una acción completa con efecto presente. El pluscuamperfecto español encaja con la secuencia narrativa: el asombro ocurre porque el derramamiento ya había tenido lugar.'
  doctrine_reference: Aspecto verbal griego; equivalencia narrativa en español
- issue: Conservación del grupo «de la circuncisión»
  english_pob_reading: the believers from the circumcision
  chosen_spanish_reading: los creyentes de la circuncisión
  alternative_spanish_readings:
  - los creyentes circuncisos
  - los de la circuncisión
  rationale: La formulación conserva la etiqueta grupal del griego y evita normalizarla prematuramente. Esto mantiene visible la tensión histórica entre judíos creyentes y la inclusión de los gentiles.
  doctrine_reference: Hechos 10; identidad del pueblo de Dios y la inclusión de los gentiles
translation_notes:
  revision_awareness: Se siguió de cerca el paquete original griego y el rastro de auditoría en inglés. No hubo revisiones aplicadas en el texto de referencia; la versión española conserva la tensión lexical de «de la circuncisión», el valor contextual de ἔθνη como «gentiles» y el matiz aspectual del perfecto en ἐκκέχυται mediante el pluscuamperfecto español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponda al nombre divino; este versículo no contiene el tetragrámaton.
  - Se mantuvo «Espíritu Santo» como forma estable y clara para πνεῦμα ἅγιον en este contexto.
  - «Gentiles» se conserva por consistencia con la lectura salvífico-histórica de Hechos 10.
  - La construcción «de la circuncisión» retiene la etiqueta grupal del texto griego sin reinterpretarla como simple adjetivo.
