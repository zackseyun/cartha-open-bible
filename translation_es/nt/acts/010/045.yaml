base_translation:
  language: en
  yaml_path: translation/nt/acts/010/045.yaml
  text: And the believers from the circumcision who had come with Peter were astonished[c][b][a], because the gift of the Holy Spirit had been poured out even on the Gentiles.
  footnotes:
