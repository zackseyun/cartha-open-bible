    reason: lexical_alternative
  - marker: c
    text: O «ha sido derramado». El perfecto griego destaca una acción completada con resultado continuo.
    reason: lexical_alternative
  revision_rationale: 'Se revisa solo lo necesario: «incluso» reemplaza «también» para reflejar mejor la sorpresa implicada por καὶ en este contexto y para alinearse con la decisión léxica inglesa auditada. Además, se ajusta la nota c para que ofrezca una alternativa genuina al tiempo/aspecto del verbo en español, ya que la versión anterior repetía la redacción del texto principal.'
