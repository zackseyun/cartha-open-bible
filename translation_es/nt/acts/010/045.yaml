- from: Y los creyentes de la circuncisión que habían venido con Pedro quedaron asombrados[c][b][a], porque también sobre los gentiles se había derramado el don del Espíritu Santo.
  to: Y los creyentes de la circuncisión que habían venido con Pedro quedaron asombrados[c][b][a], porque incluso sobre los gentiles se había derramado el don del Espíritu Santo.
