translation:
  language: es
  text: no a todo el pueblo[a], sino a testigos que habían sido escogidos de antemano por Dios—a nosotros[b], los que comimos y bebimos con él después de que resucitó de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que habían sido designados de antemano por Dios».
    reason: lexical_alternative
  - marker: b
    text: O, «después de que fue resucitado de entre los muertos». El griego aquí se traduce naturalmente «después de que resucitó de entre los muertos», aunque una formulación pasiva aparece en otros lugares del Nuevo Testamento.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ παντὶ τῷ λαῷ
  english_pob_choice: not to all the people
  chosen_spanish: no a todo el pueblo
  alternatives_spanish:
  - no a todo el pueblo en general
  - no a toda la gente
  lexicon: BDAG
  rationale: El dativo con παντὶ y λαῷ expresa el alcance de las personas a quienes se apareció Jesús. «Pueblo» conserva el contraste de alcance limitado frente a un grupo selecto de testigos, y suena natural en español bíblico contemporáneo.
- source_word: μάρτυσι
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testificadores
  lexicon: BDAG
  rationale: En Hechos, μάρτυς alude a quienes dan testimonio de lo que han visto. «Testigos» es la equivalencia más clara y usual en español, sin perder el matiz jurídico-testimonial.
- source_word: προκεχειροτονημένοις
  english_pob_choice: who had been chosen beforehand
  chosen_spanish: habían sido escogidos de antemano
  alternatives_spanish:
  - habían sido designados de antemano
  - habían sido nombrados de antemano
  lexicon: BDAG
  rationale: El participio perfecto pasivo señala una elección previa con efecto vigente. «Escogidos de antemano» conserva la idea de selección anterior de manera natural en español, sin forzar una terminología eclesiástica ajena al griego.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por el Dios
  lexicon: BDAG
  rationale: La construcción pasiva con ὑπό + genitivo expresa agente. En español, «por Dios» es directo y suficiente; no requiere expansión.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - es decir, a nosotros
  lexicon: BDAG
  rationale: 'El dativo funciona en aposición explicativa a «testigos», identificando al grupo apostólico. En español, el inciso con raya reproduce bien esa aclaración: «a nosotros».'
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  lexicon: BDAG
  rationale: La relativa cualitativa introduce una descripción del grupo de testigos. «Los que» fluye mejor en español y mantiene la referencia a quienes comparten la experiencia descrita.
- source_word: συνεφάγομεν καὶ συνεπίομεν αὐτῷ
  english_pob_choice: ate and drank with him
  chosen_spanish: comimos y bebimos con él
  alternatives_spanish:
  - compartimos comida y bebida con él
  - comimos y bebimos junto con él
  lexicon: BDAG
  rationale: Los verbos compuestos con συν- enfatizan participación compartida. «Comimos y bebimos con él» es concreto, idiomático y conserva la realidad corporal de la convivencia posresurrección.
- source_word: μετὰ τὸ ἀναστῆναι αὐτὸν ἐκ νεκρῶν
  english_pob_choice: after he rose from the dead
  chosen_spanish: después de que resucitó de entre los muertos
  alternatives_spanish:
  - después de que fue resucitado de entre los muertos
  - después de su resurrección de entre los muertos
  lexicon: BDAG
  rationale: La construcción temporal con μετά + infinitivo articular se traduce naturalmente como «después de que». Aunque ἀναστῆναι puede rendirse de forma intransitiva como «resucitó»/«resucitó de entre los muertos», esta formulación mantiene la naturalidad del español y sigue de cerca el sentido del griego en este contexto.
theological_decisions:
- issue: Forma de expresar la resurrección en ἀναστῆναι αὐτὸν ἐκ νεκρῶν
  english_pob_reading: after he rose from the dead
  chosen_spanish_reading: después de que resucitó de entre los muertos
  alternative_spanish_readings:
  - después de que fue resucitado de entre los muertos
  - después de su resurrección de entre los muertos
  rationale: El griego usa ἀναστῆναι con αὐτόν en una construcción que puede traducirse de modo intransitivo en español. «Resucitó de entre los muertos» sigue esa forma sin negar la agencia divina afirmada en otros pasajes; simplemente refleja la manera en que este versículo lo enuncia.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje base; la traducción sigue el acuerdo alto del control cruzado y conserva las decisiones léxicas y teológicas ya auditadas en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «de entre los muertos» para ἐκ νεκρῶν, en línea con la terminología POB.
  - «Testigos» conserva el valor testimonial de μάρτυς sin introducir terminología técnica no requerida por el contexto.
  - Se prefirió «resucitó» en lugar de «fue resucitado» para respetar la forma verbal del griego en esta cláusula temporal, con la alternativa documentada en nota.
  - La raya en «—a nosotros» reproduce la aposición explicativa del dativo ἡμῖν sin añadir contenido interpretativo.
