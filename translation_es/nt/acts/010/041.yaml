  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés: mantiene el contraste «no ... sino ...», identifica correctamente a los «testigos» previamente escogidos por Dios, conserva la aposición «a nosotros» y refleja de manera concreta la comida y bebida compartidas con Jesús después de su resurrección. La principal desalineación está en la nota b: «fue resucitado» no es español natural ni refleja bien la alternativa inglesa «was raised».'
  spanish_quality_summary: El texto principal es claro, digno y ampliamente legible. Solo conviene un ajuste menor de puntuación para usar raya de inciso sin espacios, más natural en español. La nota b necesita corrección idiomática; «fue resucitado» suena forzado, y «fue levantado» tampoco sería adecuado aquí. La forma natural para la alternativa pasiva es «fue levantado de entre los muertos» solo en sentido muy literal, pero teológicamente y en español bíblico común la mejor alternativa equivalente a English POB es «fue resucitado» no es ideal. Por ello conviene reformular la nota para hablar de «fue resucitado» como alternativa posible pero menos natural, o mejor «después de que Dios lo resucitó de entre los muertos» si se quisiera explicitar agente; sin embargo eso añadiría contenido. La reparación mínima más fiel al audit trail es conservar la alternativa pasiva pero en nota explicativa mejor redactada.
  glossary_alignment: No aparecen términos del glosario sensible como Yahvé/Mesías/esclavo. «Dios», «testigos» y «resucitó de entre los muertos» concuerdan con las decisiones del proyecto y con la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: La nota b usa «fue resucitado», formulación poco idiomática en español.
    rationale: Aunque intenta reflejar la alternativa inglesa «was raised», en español suena forzada. La nota debe preservar la alternativa sin degradar la legibilidad ni crear una expresión extraña.
  - severity: low
    issue: Espaciado de la raya de inciso en el texto principal.
    rationale: En español es preferible «Dios—a nosotros[b], ...» o con rayas de inciso «Dios—a nosotros[b]—, ...» según la estructura. Un ajuste menor mejora naturalidad tipográfica.
  revised_spanish_text: no a todo el pueblo[a], sino a testigos que habían sido escogidos de antemano por Dios—a nosotros[b], los que comimos y bebimos con él después de que resucitó de entre los muertos.
