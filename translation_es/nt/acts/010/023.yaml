base_translation:
  language: en
  yaml_path: translation/nt/acts/010/023.yaml
  text: So he invited them in and gave them lodging[a]. The next day he got up and went out with them[b], and some of the brothers from Joppa went with him.
  footnotes:
  - marker: a
    text: Or "hosted them" or "received them as guests"; the Greek specifically refers to extending hospitality by lodging them.
    reason: lexical_alternative
  - marker: b
    text: '"Brothers" translates the masculine plural ἀδελφῶν; in early Christian usage this can sometimes include fellow believers more broadly, that is, "brothers and sisters."'
    reason: lexical_alternative
