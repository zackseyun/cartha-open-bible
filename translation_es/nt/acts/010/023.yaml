translation:
  language: es
  text: Así que los invitó a pasar y les dio alojamiento[a]. Al día siguiente se levantó y salió con ellos[b], y algunos de los hermanos de Jope fueron con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hospedó» o «los recibió como huéspedes»; el griego se refiere específicamente a extender hospitalidad mediante alojamiento.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφῶν; en el uso cristiano primitivo esto a veces puede incluir también a otras creyentes, es decir, «hermanos y hermanas».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσκαλεσάμενος
  english_pob_choice: invited ... in
  chosen_spanish: los invitó a pasar
  alternatives_spanish:
  - los llamó para entrar
  - los recibió dentro
  lexicon: BDAG
  rationale: El participio medio expresa que Pedro les hizo entrar en su hospedaje. «Los invitó a pasar» comunica bien la acción hospitable sin sonar mecánico.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca consecuencia narrativa. «Así que» suena natural en español moderno y conserva la relación con lo anterior.
- source_word: ἐξένισεν
  english_pob_choice: gave them lodging
  chosen_spanish: les dio alojamiento
  alternatives_spanish:
  - los hospedó
  - los recibió como huéspedes
  lexicon: BDAG
  rationale: El verbo indica hospitalidad concreta mediante hospedaje. «Les dio alojamiento» explicita esa idea de modo claro y fiel.
- source_word: Τῇ δὲ ἐπαύριον
  english_pob_choice: The next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - A la mañana siguiente
  lexicon: BDAG
  rationale: Es el equivalente temporal natural en español para introducir la secuencia narrativa.
- source_word: ἀναστὰς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: BDAG
  rationale: El participio significa literalmente habiendo surgido/levantado. «Se levantó» es directo y no añade más que el movimiento indicado.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: Con ἀναστὰς, el verbo expresa el inicio del desplazamiento. «Salió» es breve y natural; no fuerza un sentido más específico que el griego.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: Simple acompañamiento en el viaje; «con ellos» es suficiente y idiomático.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  lexicon: BDAG
  rationale: Indefinido plural narrativo. «Algunos» es el equivalente natural en español.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - de los hermanos y hermanas
  - de los creyentes
  lexicon: BDAG
  rationale: Se mantiene el plural masculino del texto griego, como en el audit trail inglés. En este contexto puede abarcar a la comunidad cristiana, pero la forma fuente sigue siendo «hermanos».
- source_word: τῶν ἀπὸ Ἰόππης
  english_pob_choice: from Joppa
  chosen_spanish: de Jope
  alternatives_spanish:
  - que eran de Jope
  lexicon: BDAG
  rationale: La frase identifica procedencia geográfica. «De Jope» es conciso y fiel.
- source_word: συνῆλθον αὐτῷ
  english_pob_choice: went with him
  chosen_spanish: fueron con él
  alternatives_spanish:
  - lo acompañaron
  - se unieron a él en el viaje
  lexicon: BDAG
  rationale: En contexto significa acompañar a Pedro en el trayecto. «Fueron con él» conserva la sencillez y la idea de desplazamiento compartido.
theological_decisions:
- issue: Valor de ἀδελφῶν en contexto eclesial temprano
  english_pob_reading: brothers; masculine plural retained, with inclusive interpretive possibility noted in footnote
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: Se conserva la forma masculina plural del griego, como decisión de fidelidad formal y de precisión textual. El español puede entenderlo como referencia a miembros varones de la comunidad o, por extensión contextual, a la fraternidad cristiana; por eso se anota la posible amplitud sin reemplazar la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el griego: mantiene la secuencia narrativa, explicita la hospitalidad de ξενίζω, y conserva el masculino plural de ἀδελφῶν con nota aclaratoria. No se detectaron revisiones previas que exigieran ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Jope» para Ἰόππη, siguiendo la forma geográfica habitual en español bíblico.
  - Se prefirió «salió» sobre «partió» porque la combinación con «se levantó» reproduce con naturalidad el movimiento secuencial del griego.
  - La voz de hospitalidad se mantiene con «les dio alojamiento» para reflejar el valor concreto de ξενίζω sin recurrir a una paráfrasis amplia.
