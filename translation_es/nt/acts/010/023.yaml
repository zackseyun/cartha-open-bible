review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del griego: εἰσκαλεσάμενος…ἐξένισεν = invitarlos a entrar y darles hospedaje; Τῇ δὲ ἐπαύριον…ἐξῆλθεν σὺν αὐτοῖς = al día siguiente se levantó y salió con ellos; τινες τῶν ἀδελφῶν…συνῆλθον αὐτῷ = algunos de los hermanos de Jope fueron con él. La única corrección necesaria es en la nota b, donde el español introduce «otras creyentes», alterando el alcance del inglés auditado, que habla más ampliamente de «brothers and sisters».'
  spanish_quality_summary: El texto principal suena natural, claro y digno en español general. «Así que», «los invitó a pasar», «les dio alojamiento» y «al día siguiente» funcionan bien. La redacción de la nota b, sin embargo, es poco natural y sesga innecesariamente la explicación; conviene ajustarla a un español más claro y fiel al razonamiento auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos» preserva adecuadamente ἀδελφῶν en el texto principal, con alternativa inclusiva solo en nota. Los demás términos no activan glosario sensible.
  issues:
  - severity: medium
    issue: La nota b traduce de forma inexacta la alternativa inclusiva de ἀδελφῶν
    rationale: El audit trail inglés dice que el uso puede incluir a «fellow believers more broadly, that is, brothers and sisters». El borrador español dice «otras creyentes», lo cual restringe y distorsiona la explicación, además de sonar menos natural.
  revised_spanish_text: Así que los invitó a pasar y les dio alojamiento[a]. Al día siguiente se levantó y salió con ellos[b], y algunos de los hermanos de Jope fueron con él.
  revised_footnotes:
  - marker: a
    text: O «los hospedó» o «los recibió como huéspedes»; el griego se refiere específicamente a extender hospitalidad mediante alojamiento.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφῶν; en el uso cristiano primitivo esto a veces puede incluir más ampliamente a otros creyentes, es decir, «hermanos y hermanas».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota b para reflejar con precisión la justificación léxica y teológica del inglés auditado y mejorar la claridad del español.
