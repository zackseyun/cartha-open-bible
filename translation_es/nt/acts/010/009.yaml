translation:
  language: es
  text: Al día siguiente[a], mientras aquellos hombres viajaban y se acercaban a la ciudad, Pedro subió a la azotea para orar, hacia la hora sexta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, cerca del mediodía según el cómputo diurno judío.
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  english_pob_choice: Now on the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - Y al día siguiente
  - Luego, al día siguiente
  lexicon: BDAG
  rationale: La expresión dativa temporal con ἐπαύριον se vierte de manera natural como una referencia cronológica directa. Se omite un equivalente explícito de δέ como 'ahora' o 'pues' porque en español bastan la pausa narrativa y el orden de la frase.
- source_word: ὁδοιπορούντων ἐκείνων
  english_pob_choice: while those men were traveling
  chosen_spanish: mientras aquellos hombres viajaban
  alternatives_spanish:
  - mientras ellos viajaban
  - cuando aquellos hombres iban de camino
  lexicon: BDAG
  rationale: El genitivo absoluto indica acción simultánea; 'mientras' expresa bien la contemporaneidad. 'Aquellos hombres' conserva el referente a los mensajeros ya mencionados, sin volverlo vago.
- source_word: τῇ πόλει ἐγγιζόντων
  english_pob_choice: and drawing near to the city
  chosen_spanish: y se acercaban a la ciudad
  alternatives_spanish:
  - y se aproximaban a la ciudad
  - y iban acercándose a la ciudad
  lexicon: BDAG
  rationale: El segundo participio del genitivo absoluto se traduce con un verbo progresivo natural en español. 'Se acercaban' conserva el movimiento hacia la ciudad sin forzar una formulación demasiado literal.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió hacia arriba
  - ascendió
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa con el verbo simple 'subió', más idiomático en español que una perífrasis redundante.
- source_word: ἐπὶ τὸ δῶμα
  english_pob_choice: on the housetop
  chosen_spanish: a la azotea
  alternatives_spanish:
  - al terrado
  - sobre la azotea
  lexicon: BDAG
  rationale: δῶμα designa la azotea o techo plano accesible de la casa. 'Azotea' comunica con claridad la realidad arquitectónica al lector español; se evita 'techo' solo, que podría sugerir una cubierta inclinada.
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para orar
  - a fin de orar
  lexicon: BDAG
  rationale: El infinitivo aoristo de propósito se vuelve una construcción final natural en español. 'Orar' mantiene el matiz devocional sin añadir contenido ajeno.
- source_word: περὶ ὥραν ἕκτην
  english_pob_choice: about the sixth hour
  chosen_spanish: como a la hora sexta
  alternatives_spanish:
  - aproximadamente a la hora sexta
  - alrededor de la hora sexta
  lexicon: BDAG
  rationale: Se conserva la expresión cultural 'hora sexta' en vez de sustituirla por 'mediodía' en el texto principal. 'Como a' refleja la aproximación de περί y mantiene el tono narrativo.
theological_decisions:
- issue: Referencia temporal judía de 'la hora sexta'
  english_pob_reading: about the sixth hour
  chosen_spanish_reading: como a la hora sexta
  alternative_spanish_readings:
  - mediodía
  - aproximadamente al mediodía
  rationale: La lectura principal conserva la forma histórica del texto y su sistema horario. La explicación del valor aproximado queda en nota, evitando perder el dato cultural del original.
  doctrine_reference: Hechos 10:9; uso judío de la hora del día
translation_notes:
  revision_awareness: 'La versión sigue de cerca el griego SBLGNT y coincide sustancialmente con el juicio de la POB en inglés: mantiene la secuencia temporal, el genitivo absoluto simultáneo, el movimiento hacia la azotea y la expresión cultural de la hora sexta. Se optó por ''a la azotea'' en lugar de ''en la azotea'' para reflejar mejor el ascenso de ἀνέβη y el valor de ἐπὶ τὸ δῶμα.'
  spanish_consistency_notes:
  - Se mantiene 'orar' para προσεύξασθαι, coherente con lenguaje devocional bíblico en español.
  - '''Azotea'' se usa como equivalente funcional de δῶμα en un contexto de casa con techo plano.'
  - '''Hora sexta'' se conserva para mantener el marcador cultural judío del pasaje.'
