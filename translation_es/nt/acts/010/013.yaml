translation:
  language: es
  text: 'Y una voz le dijo: «Levántate, Pedro; mata[a] y come».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrifica». El verbo traducido «mata» también puede significar «sacrificar», pero aquí lo más probable es que se refiera a matar un animal para comerlo, en el contexto de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se oyó
  lexicon: γίνομαι
  rationale: Con φωνή como sujeto, la construcción expresa la irrupción o llegada de una voz; «vino» conserva ese sentido eventivo de manera natural en español y evita un giro más abstracto como «hubo».
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: φωνή
  rationale: En este contexto visionario se trata de una voz articulada, no simplemente de un ruido; «una voz» refleja bien el valor del sustantivo.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  lexicon: πρός + acusativo
  rationale: Con habla dirigida a una persona, la idea es de dirección o destinatario; «a él» es la expresión natural en español.
- source_word: Ἀναστάς
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: ἀνίστημι
  rationale: El participio aoristo funciona de manera imperativa en la secuencia de mandatos. «Levántate» reproduce el impulso inmediato y es idiomático en español.
- source_word: Πέτρε
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro
  lexicon: Πέτρος
  rationale: Es el nombre propio estándar en español para Πέτρος; mantiene la identificación clara y reconocible del apóstol.
- source_word: θῦσον
  english_pob_choice: kill
  chosen_spanish: mata
  alternatives_spanish:
  - sacrifica
  - sacrifica y mata
  - sacrifica/degüella
  lexicon: θύω
  rationale: En el contexto inmediato de la visión, el mandato apunta a preparar animales para comer. «Mata» transmite el sentido práctico mejor que una formulación cultual, pero sin borrar la posible resonancia sacrificial documentada en la nota.
- source_word: φάγε
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - come
  lexicon: ἐσθίω
  rationale: Imperativo directo de comer; «come» es la correspondencia simple y fiel en español.
theological_decisions:
- issue: Si θῦσον debe sonar sacrificialmente en el texto principal
  english_pob_reading: Rendered as 'kill' in the main text, with a footnote preserving 'sacrifice' as an alternative
  chosen_spanish_reading: «mata» en el texto principal, con nota que preserva «sacrifica» como alternativa
  alternative_spanish_readings:
  - «sacrifica»
  - «degüella»
  - «mata»
  rationale: El contexto inmediato es una visión sobre animales y alimento; hacer que el verbo principal suene a rito sacrificial podría sobreinterpretar la escena. Aun así, la polisemia de θύω merece conservarse en una nota para no borrar la tensión léxica.
  doctrine_reference: 'Principio POB: primacía de la fuente original y preservación de tensiones semánticas genuinas sin resolverlas artificialmente.'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente SBLGNT y con el auditoría inglesa vigente; no se registran revisiones posteriores ni cambios aplicados en el último pase.
  spanish_consistency_notes:
  - Se conservó el tono narrativo directo del griego con una puntuación clara en español.
  - Se usó «Y» inicial para mantener la continuidad narrativa del καί.
  - Se prefirió «Levántate» como equivalente natural de Ἀναστάς en un mandato secuencial.
  - Se mantuvo la ambigüedad léxica de θύω en la nota, sin imponer lenguaje sacrificial en el cuerpo principal.
