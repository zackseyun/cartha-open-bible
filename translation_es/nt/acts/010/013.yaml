    issue: «una voz vino a él» es poco idiomático en español
    rationale: Aunque calca de cerca el inglés auditado, en español suena rígido y algo antinatural. El griego ἐγένετο φωνὴ πρὸς αὐτόν se expresa mejor aquí como «le dijo una voz» o similar, manteniendo el carácter eventivo y el hecho de que la voz se dirige a él.
  - severity: medium
    issue: La nota [a] está anclada al final de la oración en vez de al verbo relevante
    rationale: La alternativa léxica solo corresponde a θῦσον / «mata», no a toda la cita. Según las instrucciones, el marcador exacto debe aparecer en la palabra o frase pertinente.
