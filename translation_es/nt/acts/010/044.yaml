translation:
  language: es
  text: Mientras Pedro aún hablaba estas palabras[a], el Espíritu Santo cayó sobre todos los que oían la palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mientras Pedro todavía hablaba estas palabras, el Espíritu Santo cayó sobre todos los que oían la palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  lexicon: BDAG
  rationale: Ἔτι indica que la acción de hablar seguía en curso al momento del verbo principal. «Aún» conserva esa simultaneidad natural en español.
- source_word: λαλοῦντος τοῦ Πέτρου
  english_pob_choice: While Peter was still speaking
  chosen_spanish: Mientras Pedro aún hablaba
  alternatives_spanish:
  - Mientras Pedro todavía hablaba
  - Cuando Pedro aún hablaba
  lexicon: BDAG
  rationale: El genitivo absoluto funciona como una cláusula temporal de simultaneidad. «Mientras» expresa bien la acción en desarrollo sin forzar la sintaxis española.
- source_word: τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas palabras dichas
  - estas cosas
  lexicon: BDAG
  rationale: ῥήματα se refiere aquí a palabras habladas o dichos. «Palabras» es el equivalente directo y claro en español.
- source_word: ἐπέπεσε
  english_pob_choice: fell upon
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - descendió sobre
  lexicon: BDAG
  rationale: El verbo ἐπιπίπτω conserva una imagen concreta de caída o irrupción. «Cayó sobre» mantiene esa fuerza verbal en español y refleja el uso narrativo de Lucas.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  lexicon: BDAG
  rationale: 'La frase articular se traduce de forma estándar como nombre propio-teológico en español: «Espíritu Santo».'
- source_word: ἐπὶ πάντας
  english_pob_choice: upon all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - sobre todos ellos
  - sobre todos los presentes
  lexicon: BDAG
  rationale: ἐπί con acusativo después de ἐπέπεσε se traduce naturalmente con «sobre». «Todos» conserva el alcance universal del grupo presente.
- source_word: τοὺς ἀκούοντας
  english_pob_choice: those hearing
  chosen_spanish: los que oían
  alternatives_spanish:
  - los que estaban oyendo
  - los oyentes
  lexicon: BDAG
  rationale: El participio presente subraya la acción en progreso de escuchar en ese momento. «Los que oían» refleja la simultaneidad sin añadir más de lo que dice el texto.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra hablada
  lexicon: BDAG
  rationale: En este contexto de proclamación, λόγος puede referirse al mensaje anunciado, pero la revisión inglesa volvió a «the word» para mayor correspondencia léxica. En español, «la palabra» mantiene esa proximidad y la resonancia de discurso proclamado.
theological_decisions:
- issue: Acción del Espíritu Santo con ἐπέπεσε
  english_pob_reading: the Holy Spirit fell upon all those hearing the word
  chosen_spanish_reading: el Espíritu Santo cayó sobre todos los que oían la palabra
  alternative_spanish_readings:
  - el Espíritu Santo vino sobre todos los que oían la palabra
  - el Espíritu Santo se posó sobre todos los que oían la palabra
  rationale: Se preserva la imagen concreta de irrupción/caída del verbo griego sin reinterpretarla dentro de un esquema doctrinal posterior. La formulación deja intacta la fuerza narrativa del texto.
  doctrine_reference: Hechos 10:44; filosofía de traducción §§1, 3, 6
- issue: τὸν λόγον como término de proclamación
  english_pob_reading: the word
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - el mensaje
  - la palabra proclamada
  rationale: Se evita sustituir el término por una paráfrasis más explicativa. «La palabra» conserva la correspondencia formal con λόγος y permite que el contexto determine su contenido proclamado.
  doctrine_reference: Hechos 10:44; filosofía de traducción §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó τὸν λόγον de «the message» a «the word» por correspondencia más cercana con el griego. La redacción española sigue esa decisión con «la palabra» y conserva el resto de la estructura narrativa sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» de forma consistente para τὸ πνεῦμα τὸ ἅγιον.
  - Se conserva «la palabra» para λόγος, alineado con la revisión auditada en inglés.
  - Se mantiene un estilo moderno y digno, con sintaxis natural en español y sin reemplazar la imagen verbal de ἐπέπεσε.
