translation:
  language: es
  text: Y, después de explicarles todo, los envió a Jope.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξηγησάμενος
  english_pob_choice: after explaining
  chosen_spanish: después de explicarles
  alternatives_spanish:
  - después de relatarles
  - después de contarles
  - después de exponerles
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción anterior a la del verbo principal. «Después de explicarles» conserva esa anterioridad y refleja el sentido de dar un informe detallado, con un español natural y claro. «Explicarles» también preserva mejor el matiz de desarrollo completo que opciones más genéricas como «contarles».
- source_word: ἅπαντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo sucedido
  - todas las cosas
  - todo el asunto
  lexicon: BDAG
  rationale: ἅπαντα en neutro plural comunica totalidad. En español, «todo» es la forma más natural y suficiente para transmitir esa comprehensividad sin añadir explicaciones no presentes en el griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: BDAG
  rationale: El dativo funciona como objeto indirecto de ἐξηγησάμενος. En español, el clítico dativo «les» reproduce de manera natural esa relación sin sobrecargar la frase.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: ἀποστέλλω significa «enviar» o «despachar». «Envió» es la equivalencia más directa y fluida en español. «Mandó» puede sonar más coloquial o autoritativo de lo que exige el contexto; «despachó» suena demasiado administrativo.
- source_word: εἰς τὴν Ἰόππην
  english_pob_choice: to Joppa
  chosen_spanish: a Jope
  alternatives_spanish:
  - hacia Jope
  - hasta Jope
  lexicon: BDAG
  rationale: εἰς con un nombre de lugar indica movimiento hacia un destino. «A Jope» es la equivalencia natural en español. Se mantiene la transliteración tradicional del topónimo en español bíblico como «Jope».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran una correspondencia estable y sin notas textuales; no hay revisión aplicada ni variante que deba reflejarse en español.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo sobrio y directo.
  - Se conserva el topónimo bíblico «Jope» conforme al uso español corriente.
  - No se introduce mayúscula innecesaria en «envió», porque no alude a un título divino ni a una fórmula litúrgica.
