translation:
  language: es
  text: Y al ver que esto agradaba a los judíos[a], procedió a prender también a Pedro[b]. (Eran los días de los panes sin levadura.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los judeanos» o, por restricción contextual, «a los líderes judíos». El término griego puede abarcar esos sentidos en algunos contextos, pero aquí el texto dice simplemente «a los judíos».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el período festivo posterior a la Pascua, marcado por el consumo de panes sin levadura.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: And when he saw
  chosen_spanish: Y al ver
  alternatives_spanish:
  - Y cuando vio
  - Y viendo
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción temporal previa al siguiente acto. «Al ver» es natural en español y conserva la relación temporal; la conjunción «Y» refleja el matiz de continuación de δέ sin sobrecargar el estilo.
- source_word: ἀρεστόν ἐστιν
  english_pob_choice: it was pleasing
  chosen_spanish: agradaba
  alternatives_spanish:
  - era agradable
  - era aceptable
  - le parecía bien
  lexicon: BDAG
  rationale: La construcción impersonal de «era agradable» suena menos natural en este contexto narrativo. «Agradaba» mantiene la idea de algo que resulta agradable o satisfactorio, con una fluidez adecuada en español.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judeanos
  - a los líderes judíos
  lexicon: BDAG
  rationale: El griego dice de manera explícita «a los judíos». Se conserva ese alcance amplio, sin restringirlo a líderes o a una lectura geográfica no expresada por el texto.
- source_word: προσέθετο
  english_pob_choice: he proceeded
  chosen_spanish: procedió
  alternatives_spanish:
  - se puso a
  - continuó
  - pasó a
  lexicon: BDAG
  rationale: Con infinitivo, προστίθημι expresa el comienzo o avance hacia una acción. «Procedió a» reproduce ese valor idiomático en español con claridad y sin literalidad mecánica.
- source_word: συλλαβεῖν
  english_pob_choice: to arrest
  chosen_spanish: prender
  alternatives_spanish:
  - arrestar
  - aprehender
  - capturar
  lexicon: BDAG
  rationale: En un contexto narrativo-político, «prender» comunica la acción de detener a una persona con un registro bíblico y comprensible. «Arrestar» sería posible, pero «prender» evita un tecnicismo moderno demasiado judicial y conserva fuerza verbal.
- source_word: καὶ Πέτρον
  english_pob_choice: Peter also
  chosen_spanish: también a Pedro
  alternatives_spanish:
  - a Pedro también
  - Pedro también
  lexicon: BDAG
  rationale: El καί aditivo marca que Pedro es añadido a la lista de objetivos. En español, «también a Pedro» preserva ese añadido con sintaxis natural y clara.
- source_word: ἦσαν δὲ ἡμέραι τῶν ἀζύμων
  english_pob_choice: Now these were the days of Unleavened Bread
  chosen_spanish: Y eran los días de los Panes sin levadura
  alternatives_spanish:
  - Y eran los días de los Panes Ázimos
  - Y eran los días de la Fiesta de los Panes sin levadura
  lexicon: BDAG
  rationale: Se conserva la referencia festiva específica del griego. «Panes sin levadura» es transparente en español y evita sustituir la designación por una paráfrasis más interpretativa como «fiesta» o por un tecnicismo menos familiar como «ázimos» en el texto principal.
theological_decisions:
- issue: Alcance de τοῖς Ἰουδαίοις en Hechos
  english_pob_reading: the Jews
  chosen_spanish_reading: a los judíos
  alternative_spanish_readings:
  - a los judeanos
  - a los líderes judíos
  rationale: La traducción mantiene el referente amplio que ofrece el griego, sin insertar una restricción sociopolítica que el texto no expresa. Esto preserva la tensión contextual entre el dato lingüístico y la posible inferencia narrativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómputo festivo de τῶν ἀζύμων
  english_pob_reading: Unleavened Bread
  chosen_spanish_reading: los Panes sin levadura
  alternative_spanish_readings:
  - la Fiesta de los Panes sin levadura
  - los Panes Ázimos
  rationale: El griego nombra los días de los panes sin levadura, no simplemente la Pascua. Se mantiene la precisión del período festivo y se evita fusionar observancias relacionadas pero no idénticas.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca el griego de SBLGNT y conserva la lectura auditada del POB en inglés: temporalidad del participio, valor aditivo de καί, y designación festiva específica de ἡμέραι τῶν ἀζύμων. No se registran revisiones aplicadas en el paquete fuente, y el borrador refleja el estado más reciente aprobado.'
  spanish_consistency_notes:
  - Se mantiene «judíos» en el cuerpo principal y se reserva la alternativa «judeanos» solo en nota.
  - Se usa «Panes sin levadura» como equivalente festivo directo, coherente con la preferencia del POB en inglés por «Unleavened Bread».
  - «Prender» conserva un matiz narrativo-legal natural en español y evita oscilar entre varios verbos de detención sin necesidad textual.
