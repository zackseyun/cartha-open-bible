revisions:
- from: Así que Pedro era mantenido en la prisión[a], pero una oración intensa[b] era hecha a Dios por la iglesia en favor de él.
  to: Así que Pedro estaba siendo custodiado en la prisión, pero la iglesia hacía oración ferviente[a] a Dios por él.
  rationale: Se revisa para mantener el sentido del griego con un español natural y digno. 'Estaba siendo custodiado' refleja mejor el imperfecto pasivo en contexto carcelario. 'La iglesia hacía oración ferviente' evita el calco 'era hecha' pero conserva la acción continua de la construcción perifrástica. 'Por él' expresa de forma idiomática la intercesión de περὶ αὐτοῦ. Se conserva una sola nota léxica relevante para ἐκτενῶς, ajustada al español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica y el sentido general del griego: Pedro estaba en custodia, y la iglesia oraba a Dios por él. Sin embargo, varias formulaciones españolas son demasiado calcadas y no representan bien el valor aspectual ni la naturalidad exigida por el proyecto. En particular, ἐτηρεῖτο se expresa mejor como ''estaba siendo custodiado'' o similar, no ''era mantenido''; y προσευχὴ ... ἦν ... γινομένη requiere una formulación idiomática continua en español, no ''una oración ... era hecha''.'
  spanish_quality_summary: 'La legibilidad del borrador es insuficiente en varios puntos: ''era mantenido'', ''una oración intensa era hecha'' y ''en favor de él'' suenan forzados o poco naturales en español bíblico actual. Una revisión a ''Pedro estaba siendo custodiado en la prisión, pero la iglesia hacía oración ferviente[a] a Dios por él'' mejora notablemente la fluidez sin perder el contenido ni el aspecto continuo. También conviene eliminar la nota sobre ''la prisión'', que no refleja una verdadera alternativa preservada por el inglés y además es redundante.'
  glossary_alignment: La terminología principal está bien alineada en 'Dios' e 'iglesia'. No hay términos doctrinales sensibles fuera de ἐκκλησία, que está correctamente como 'iglesia'. Para ἐκτενῶς, 'ferviente' encaja mejor en español e integra la alternativa documentada por el inglés ('earnest' / 'fervently') sin perder la nota sobre intensidad o persistencia. No hay conflicto con las directrices de Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: '''era mantenido'' para ἐτηρεῖτο'
    rationale: Aunque intenta reflejar el pasivo imperfecto, en español suena poco idiomático y semánticamente débil en contexto carcelario. 'Estaba siendo custodiado' o 'estaba bajo custodia' comunica mejor el sentido de vigilancia/confinamiento.
  - severity: high
    issue: '''una oración intensa ... era hecha'' para προσευχὴ ... ἦν ... γινομένη'
    rationale: Es un calco poco natural del griego. El proyecto pide evitar formulaciones de madera cuando el español se vuelve antinatural. 'La iglesia hacía oración ferviente' o 'se hacía oración ferviente' conserva el carácter continuo con español digno y claro.
  - severity: medium
    issue: '''en favor de él'' para περὶ αὐτοῦ'
    rationale: Es comprensible, pero suena pesado. En contexto de intercesión, 'por él' es la forma natural y fiel en español.
  - severity: low
    issue: Nota [a] sobre 'la prisión' innecesaria y mal enfocada
    rationale: El inglés no preserva aquí una alternativa en nota, y la nota española no añade una ambigüedad real; más bien introduce confusión al sugerir una alternativa igual al texto principal.
  revised_spanish_text: Así que Pedro estaba siendo custodiado en la prisión, pero la iglesia hacía oración ferviente[a] a Dios por él.
  revised_footnotes:
  - marker: a
    text: O «intensamente»; el adverbio griego puede enfatizar intensidad o persistencia en la oración.
    reason: lexical_alternative
  revision_rationale: Se revisa para mantener el sentido del griego con un español natural y digno. 'Estaba siendo custodiado' refleja mejor el imperfecto pasivo en contexto carcelario. 'La iglesia hacía oración ferviente' evita el calco 'era hecha' pero conserva la acción continua de la construcción perifrástica. 'Por él' expresa de forma idiomática la intercesión de περὶ αὐτοῦ. Se conserva una sola nota léxica relevante para ἐκτενῶς, ajustada al español.
