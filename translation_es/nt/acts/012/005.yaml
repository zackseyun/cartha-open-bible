translation:
  language: es
  text: Así que Pedro estaba siendo custodiado en la prisión, pero la iglesia hacía oración ferviente[a] a Dios por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intensamente»; el adverbio griego puede enfatizar intensidad o persistencia en la oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτηρεῖτο
  english_pob_choice: was being kept
  chosen_spanish: era mantenido
  alternatives_spanish:
  - era guardado
  - seguía bajo custodia
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa acción շարունակada; «era mantenido» conserva la pasividad y la duración sin especificar más de lo que exige el contexto. «Era guardado» también es posible, pero puede sonar más interpretativo en español.
- source_word: φυλακῇ
  english_pob_choice: the prison
  chosen_spanish: la prisión
  alternatives_spanish:
  - la cárcel
  - el calabozo
  lexicon: BDAG
  rationale: Con artículo, el sustantivo señala el lugar de confinamiento. «Prisión» es la opción más natural y sobria en español para este contexto narrativo.
- source_word: προσευχὴ ... ἦν ... γινομένη
  english_pob_choice: prayer was being made
  chosen_spanish: una oración ... era hecha
  alternatives_spanish:
  - se hacía una oración
  - se estaba haciendo oración
  lexicon: BDAG
  rationale: La construcción perifrástica indica acción en curso. «Era hecha» conserva de manera directa la fuerza verbal de γινομένη y el aspecto continuo; aunque en español suena menos idiomático, mantiene mejor la cercanía formal al griego.
- source_word: ἐκτενῶς
  english_pob_choice: earnest
  chosen_spanish: intensa
  alternatives_spanish:
  - ferviente
  - constante
  - apremiante
  lexicon: BDAG
  rationale: El adverbio puede señalar intensidad o persistencia. «Intensa» comunica bien esa fuerza en español sin forzar una sola matización devocional. Se preserva la alternativa de «ferviente» en nota.
- source_word: ὑπὸ τῆς ἐκκλησίας
  english_pob_choice: by the church
  chosen_spanish: por la iglesia
  alternatives_spanish:
  - por la asamblea
  - por la congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία designa la comunidad cristiana reunida. «Iglesia» es la equivalencia estable y adecuada, sin imponer un sentido institucional posterior.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  lexicon: BDAG
  rationale: Con objeto personal en contexto de oración, πρός expresa dirección. «A Dios» es la forma natural en español para este movimiento orante.
- source_word: περὶ αὐτοῦ
  english_pob_choice: for him
  chosen_spanish: en favor de él
  alternatives_spanish:
  - por él
  - acerca de él
  lexicon: BDAG
  rationale: En contexto intercesor, περί con genitivo expresa beneficio o referencia en nombre de otra persona. «En favor de él» explicita la intercesión sin perder el sentido básico; «por él» es más breve y también posible.
- source_word: μὲν οὖν ... δὲ
  english_pob_choice: So ... but ...
  chosen_spanish: Así que ... pero ...
  alternatives_spanish:
  - Entonces ... pero ...
  - Por lo tanto ... mas ...
  lexicon: BDAG
  rationale: Los marcadores articulan avance narrativo y contraste leve. «Así que ... pero ...» reproduce bien el flujo discursivo en español.
theological_decisions:
- issue: Renderización de ἐκκλησία
  english_pob_reading: church
  chosen_spanish_reading: iglesia
  alternative_spanish_readings:
  - asamblea
  - congregación
  rationale: El término se refiere a la comunidad cristiana que ora por Pedro. «Iglesia» es la opción más fiel y reconocible en el contexto de Hechos, sin añadir una lectura denominacional ajena al pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Fuerza de ἐκτενῶς en la oración
  english_pob_reading: earnest prayer
  chosen_spanish_reading: oración intensa
  alternative_spanish_readings:
  - oración ferviente
  - oración persistente
  rationale: La frase griega comunica intensidad o persistencia en la intercesión. «Intensa» conserva esa amplitud semántica; las alternativas se mantienen abiertas porque el adverbio admite más de un matiz válido.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el audit trail inglés, manteniendo el contraste μὲν οὖν ... δὲ, la pasividad durativa de ἐτηρεῖτο, la perífrasis verbal de προσευχὴ ἦν γινομένη, y la dirección intercesora de πρὸς τὸν θεόν / περὶ αὐτοῦ. No se requieren revisiones respecto del contexto auditado; la presente formulación prioriza fidelidad source-grounded con español publicable.
  spanish_consistency_notes:
  - Se usa «iglesia» para ἐκκλησία conforme al uso de Hechos y al POB inglés auditado.
  - Se conserva «Dios» para θεόν y no se introduce ninguna convención de máscara nominal.
  - «Era mantenido» y «era hecha» preservan aspecto durativo; aunque menos idiomáticos que alternativas reflexivas, ayudan a reflejar la sintaxis griega.
  - La nota sobre ἐκτενῶς mantiene abierta la tensión entre intensidad y persistencia, como en el audit trail inglés.
