revisions:
- from: Ahora bien, cuando Herodes estaba a punto de sacarlo[a], aquella misma noche Pedro estaba durmiendo entre dos soldados, sujeto con dos cadenas[b], y unos guardias, delante de la puerta, vigilaban la cárcel.
  to: Ahora bien, cuando Herodes estaba a punto de sacarlo[a], aquella misma noche Pedro estaba durmiendo entre dos soldados, atado con dos cadenas, y guardias delante de la puerta vigilaban la cárcel[b].
  rationale: 'Se corrigen las notas para que preserven fielmente las alternativas léxicas documentadas en el POB inglés y se aplica un pulido mínimo al texto principal: «atado» expresa con más concreción δεδεμένος, y se elimina «unos» para una narración más natural en español. No se requiere cambio doctrinal ni adjudicación compleja.'
  reviewer_model: gpt-5.4
