translation:
  language: es
  text: Ahora bien, cuando Herodes estaba a punto de sacarlo[a], aquella misma noche Pedro estaba durmiendo entre dos soldados, atado con dos cadenas, y guardias delante de la puerta vigilaban la cárcel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presentarlo». El verbo griego puede referirse a sacar a alguien para una comparecencia pública o para juicio.
    reason: lexical_alternative
  - marker: b
    text: O «custodiaban la cárcel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤμελλεν
  english_pob_choice: was about to
  chosen_spanish: estaba a punto de
  alternatives_spanish:
  - iba a
  - estaba por
  lexicon: BDAG
  rationale: μέλλω expresa inminencia; «estaba a punto de» comunica bien la acción inminente sin volverla más fuerte de lo que pide el griego.
- source_word: προαγαγεῖν αὐτόν
  english_pob_choice: bring him out
  chosen_spanish: sacarlo
  alternatives_spanish:
  - hacerlo salir
  - presentarlo
  lexicon: BDAG
  rationale: En este contexto carcelario, el verbo apunta al acto de llevarlo afuera desde su custodia. «Sacarlo» es natural en español y preserva el movimiento de salida; se mantiene la nota por la alternativa de «sacarlo/sacarlo afuera» como posible lectura de uso público o judicial.
- source_word: τῇ νυκτὶ ἐκείνῃ
  english_pob_choice: on that very night
  chosen_spanish: aquella misma noche
  alternatives_spanish:
  - esa misma noche
  - esa noche
  lexicon: BDAG
  rationale: El demostrativo enfatiza la especificidad del momento; «aquella misma noche» conserva ese énfasis narrativo.
- source_word: κοιμώμενος
  english_pob_choice: was sleeping
  chosen_spanish: estaba durmiendo
  alternatives_spanish:
  - dormía
  - estaba dormido
  lexicon: BDAG
  rationale: El participio expresa estado/acción en curso; «estaba durmiendo» mantiene el aspecto verbal mejor que la opción más estática «estaba dormido».
- source_word: μεταξὺ δύο στρατιωτῶν
  english_pob_choice: between two soldiers
  chosen_spanish: entre dos soldados
  alternatives_spanish:
  - en medio de dos soldados
  lexicon: BDAG
  rationale: «Entre dos soldados» es la equivalencia espacial más natural y precisa en español.
- source_word: δεδεμένος
  english_pob_choice: bound
  chosen_spanish: sujeto
  alternatives_spanish:
  - atado
  - encadenado
  lexicon: BDAG
  rationale: El participio perfecto pasivo presenta la condición ya existente de Pedro. «Sujeto» comunica esa restricción de manera sobria; además evita duplicar la imagen de cadenas inmediatamente expresada después.
- source_word: ἁλύσεσιν δυσίν
  english_pob_choice: with two chains
  chosen_spanish: con dos cadenas
  alternatives_spanish:
  - por dos cadenas
  - atado con dos cadenas
  lexicon: BDAG
  rationale: «Con dos cadenas» expresa el medio de su sujeción de forma directa y clara en español.
- source_word: φύλακές
  english_pob_choice: guards
  chosen_spanish: unos guardias
  alternatives_spanish:
  - guardias
  - centinelas
  lexicon: BDAG
  rationale: En un marco de prisión, «guardias» es el equivalente más claro y natural; el artículo indefinido plural refleja bien el valor del griego sin sobrerrepetir.
- source_word: πρὸ τῆς θύρας
  english_pob_choice: before the door
  chosen_spanish: delante de la puerta
  alternatives_spanish:
  - frente a la puerta
  - ante la puerta
  lexicon: BDAG
  rationale: La preposición con genitivo indica posición delante/de cara a. «Delante de la puerta» mantiene el sentido espacial con buena naturalidad española.
- source_word: ἐτήρουν τὴν φυλακήν
  english_pob_choice: were keeping watch over the prison
  chosen_spanish: vigilaban la cárcel
  alternatives_spanish:
  - guardaban la cárcel
  - hacían guardia sobre la cárcel
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, vigilar, custodiar. Como ya se mencionan los φύλακες, «vigilaban» evita repetición y conserva la idea de custodia; «cárcel» traduce aquí φυλακή como el lugar de detención, no solo la acción de vigilar.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo de revisión muestra alto acuerdo; por ello, esta versión sigue de cerca la lectura inglesa auditada y el griego, sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este texto.
  - Se evitó «Cristo/Mesías» porque no corresponde a este versículo.
  - Se prefirió un español sobrio y literal en la escena narrativa, con ajuste idiomático mínimo para claridad.
  - La nota a conserva la ambigüedad léxica de προαγαγεῖν; la nota b conserva la alternativa de φυλακή como «cárcel».
