review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: inminencia de la acción de Herodes, la especificidad de «aquella misma noche», Pedro durmiendo entre dos soldados, su condición de estar atado con dos cadenas, y los guardias apostados junto a la puerta vigilando la cárcel. Sin embargo, hay dos desajustes menores con el expediente inglés: la nota [a] usa «sacarlo adelante», que en español no expresa bien la alternativa léxica de προαγαγεῖν; y la nota [b] repite la traducción principal en vez de preservar la alternativa documentada en inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «Ahora bien» funciona, aunque no es indispensable; la sintaxis general fluye bien. «Sujeto con dos cadenas» es aceptable, pero «atado con dos cadenas» suena un poco más concreto para δεδεμένος. «Unos guardias» introduce una indefinición algo innecesaria; «los guardias» o simplemente «guardias» encaja mejor con el cuadro narrativo. La reparación necesaria es pequeña y principalmente afecta las notas y un leve pulido estilístico.
  glossary_alignment: 'No hay términos de glosario mayor en juego. Las decisiones léxicas principales están alineadas con el POB: «estaba a punto de», «aquella misma noche», «entre dos soldados», «con dos cadenas», «guardias», «la cárcel». La única divergencia real del rastro auditado está en la alternativa de nota para προαγαγεῖν αὐτόν, que debe reflejar «presentarlo» o «hacerlo comparecer», no «sacarlo adelante».'
  issues:
  - severity: medium
    issue: La nota [a] dice «sacarlo adelante».
    rationale: No es una alternativa idiomática adecuada en español para προαγαγεῖν en contexto de comparecencia pública o juicio. Puede sonar opaca o equivocada. La alternativa documentada debe expresar «presentarlo» o «hacerlo comparecer».
  - severity: medium
    issue: La nota [b] no ofrece una alternativa real.
    rationale: El texto principal ya dice «vigilaban la cárcel». La nota del POB inglés preserva la alternativa «were guarding the prison»; en español conviene distinguir con «custodiaban la cárcel» o «guardaban la cárcel».
  - severity: low
    issue: «Unos guardias» añade una indefinición no exigida por el griego.
    rationale: φύλακες no requiere artículo indefinido aquí. Omitir «unos» mejora la naturalidad y la viveza narrativa sin alterar el sentido.
  - severity: low
    issue: «Sujeto con dos cadenas» es correcto pero algo menos concreto que otras opciones.
    rationale: δεδεμένος describe a Pedro atado/ligado. «Atado con dos cadenas» suena más directo y visual en español, aunque la lectura actual no es errónea.
  revised_spanish_text: Ahora bien, cuando Herodes estaba a punto de sacarlo[a], aquella misma noche Pedro estaba durmiendo entre dos soldados, atado con dos cadenas, y guardias delante de la puerta vigilaban la cárcel[b].
  revised_footnotes:
  - marker: a
    text: O «presentarlo». El verbo griego puede referirse a sacar a alguien para una comparecencia pública o para juicio.
    reason: lexical_alternative
  - marker: b
    text: O «custodiaban la cárcel».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para que preserven fielmente las alternativas léxicas documentadas en el POB inglés y se aplica un pulido mínimo al texto principal: «atado» expresa con más concreción δεδεμένος, y se elimina «unos» para una narración más natural en español. No se requiere cambio doctrinal ni adjudicación compleja.'
