translation:
  language: es
  text: Pero Pedro seguía llamando[a], y cuando abrieron la puerta[b], lo vieron y quedaron asombrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «continuaba llamando» o «persistía en llamar».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «habiendo abierto, lo vieron y quedaron asombrados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέμενεν
  english_pob_choice: kept on
  chosen_spanish: seguía
  alternatives_spanish:
  - continuaba
  - persistía
  lexicon: BDAG
  rationale: El imperfecto de ἐπιμένω expresa acción continua o repetida. «Seguía» comunica bien esa persistencia en español natural, sin perder el valor durativo.
- source_word: κρούων
  english_pob_choice: knocking
  chosen_spanish: tocando
  alternatives_spanish:
  - golpeando
  - llamando
  lexicon: BDAG
  rationale: En este contexto κρούω se refiere a tocar a una puerta. «Tocando» es la forma más natural en español para un llamado en la puerta; «golpeando» suena más fuerte y menos preciso.
- source_word: ἀνοίξαντες
  english_pob_choice: when they opened the door
  chosen_spanish: cuando abrieron la puerta
  alternatives_spanish:
  - después de abrir
  - habiendo abierto
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente en la narración. En español, «cuando abrieron la puerta» hace clara la secuencia. La mención de «la puerta» se sobreentiende del contexto del toque.
- source_word: εἶδαν
  english_pob_choice: they saw him
  chosen_spanish: lo vieron
  alternatives_spanish:
  - lo divisaron
  - lo vieron a él
  lexicon: BDAG
  rationale: Es una traducción directa de ὁράω en relato narrativo. El objeto directo clítico «lo» conserva naturalidad y precisión.
- source_word: ἐξέστησαν
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se quedaron asombrados
  - quedaron atónitos
  lexicon: BDAG
  rationale: ἐξίστημι expresa fuerte asombro o desconcierto. «Quedaron asombrados» mantiene la intensidad y suena claro en español actual.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: El primer δέ marca contraste con la escena anterior; «Pero» reproduce bien ese giro discursivo en español.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  lexicon: Nombre propio estándar
  rationale: 'Los nombres propios se adaptan a la forma habitual en español: Pedro.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la lectura auditada en inglés: acción continua de Pedro, apertura temporal de la puerta, visión de Pedro y reacción de asombro. Se preserva la alternancia narrativa con δέ sin sobrerregularizarla.'
  spanish_consistency_notes:
  - Se prefiere «Pedro» por convención estándar en español.
  - Se mantiene «asombrados» para reflejar el fuerte impacto de ἐξέστησαν sin añadir una interpretación más amplia.
  - «Tocando» se usa en sentido de tocar una puerta, no de golpear físicamente.
