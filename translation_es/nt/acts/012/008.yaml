translation:
  language: es
  text: 'Y el ángel le dijo[a]: «Cíñete y calza tus sandalias». Y así lo hizo. Y le dice[b]: «Ponte tu manto[c] y sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ciñe tu cinturón». El imperativo griego usa una imagen concreta de prepararse para actuar.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «dice», presente histórico usado para dar viveza a la narración.'
    reason: lexical_alternative
  - marker: c
    text: O «Échate el manto encima». El griego puede expresar la acción de ponerse la prenda exterior alrededor del cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto narrativo de Hechos, el referente es un ser celestial que aparece en la prisión; por eso «ángel» comunica mejor el sentido contextual que el más general «mensajero».
- source_word: Ζῶσαι
  english_pob_choice: Tie on your belt
  chosen_spanish: Cíñete
  alternatives_spanish:
  - Átate el cinturón
  - Ciñe tu cinturón
  lexicon: BDAG
  rationale: El imperativo medio aoristo de ζώννυμι expresa ajustar o ceñir el cinturón para estar listo. «Cíñete» mantiene la fuerza verbal y sugiere la preparación inmediata; en nota se puede explicar la alternativa más explícita.
- source_word: ὑπόδησαι τὰ σανδάλιά σου
  english_pob_choice: put on your sandals
  chosen_spanish: calza tus sandalias
  alternatives_spanish:
  - ponte tus sandalias
  - átate tus sandalias
  lexicon: BDAG
  rationale: ὑποδέομαι indica ponerse el calzado. «Calza tus sandalias» es natural y conserva el objeto concreto σανδάλια; «ponte tus sandalias» también sería posible, pero «calza» refleja mejor la acción con el calzado.
- source_word: ἐποίησεν δὲ οὕτως
  english_pob_choice: And he did so
  chosen_spanish: Y lo hizo así
  alternatives_spanish:
  - Y así lo hizo
  - Y lo hizo
  lexicon: BDAG
  rationale: οὕτως resume la obediencia a los dos mandatos previos. «Y lo hizo así» es conciso y claro en español, con el mismo valor resumidor que el inglés POB.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El presente histórico de λέγει aporta vivacidad narrativa. «Le dice» preserva ese rasgo discursivo en español; «le dijo» perdería la tensión del cambio verbal.
- source_word: Περιβαλοῦ τὸ ἱμάτιόν σου
  english_pob_choice: Put on your cloak
  chosen_spanish: Ponte tu manto
  alternatives_spanish:
  - Póntelo
  - Cubre tu cuerpo con tu manto
  - Envuélvete en tu manto
  lexicon: BDAG
  rationale: ἱμάτιον designa una prenda exterior, aquí un manto o capa. La revisión inglesa prefirió una forma más directa («Put on your cloak»); en español, «Ponte tu manto» mantiene naturalidad y evita expandir innecesariamente el verbo περιβάλλω.
- source_word: ἀκολούθει μοι
  english_pob_choice: follow me
  chosen_spanish: sígueme
  alternatives_spanish:
  - ven conmigo
  lexicon: BDAG
  rationale: ἀκολουθέω significa «seguir». «Sígueme» preserva el vínculo léxico con el uso común del NT y evita debilitarlo con un mero «ven conmigo».
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se mantuvo el presente histórico de λέγει y se evitó expandir περιβαλοῦ a una perífrasis tipo «envuélvete»; en español se optó por «Ponte tu manto», equivalente natural y directo a la forma revisada «Put on your cloak».'
  spanish_consistency_notes:
  - Se mantuvo «ángel» y no «mensajero» por el contexto de aparición celestial en prisión.
  - Se eligió «manto» para ἱμάτιον como prenda exterior; no se usó «ropa» o «vestido» por ser demasiado genéricos.
  - Se conservó la diferencia entre el aoristo narrativo «hizo así» y el presente histórico «le dice».
  - Se evitó el calco rígido «cíñete los lomos» por ser menos transparente en español moderno.
