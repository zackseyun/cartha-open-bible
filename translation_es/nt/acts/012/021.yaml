translation:
  language: es
  text: Ahora bien, en un día señalado, Herodes, habiéndose vestido con ropa real[a] y habiendo tomado asiento en el tribunal, les dirigía un discurso público.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestiduras reales». El término griego puede referirse, en general, a ropa espléndida.
    reason: lexical_alternative
lexical_decisions:
- source_word: τακτῇ ... ἡμέρᾳ
  english_pob_choice: on an appointed day
  chosen_spanish: en un día señalado
  alternatives_spanish:
  - en un día nombrado
  - en un día designado
  - en un día fijado
  lexicon: BDAG
  rationale: τακτός con ἡμέρα indica un día fijado o designado con anterioridad. «Señalado» comunica bien la idea de una ocasión establecida y suena natural en español bíblico contemporáneo.
- source_word: ἐνδυσάμενος
  english_pob_choice: having put on
  chosen_spanish: habiéndose vestido
  alternatives_spanish:
  - habiéndose puesto
  - habiéndose revestido
  - habiendo vestido
  lexicon: BDAG
  rationale: El participio aoristo medio expresa la acción de vestirse a sí mismo. «Habiéndose vestido» mantiene la secuencia participial sin forzar una construcción poco natural.
- source_word: ἐσθῆτα βασιλικὴν
  english_pob_choice: royal clothing
  chosen_spanish: ropa real
  alternatives_spanish:
  - vestiduras reales
  - atuendo real
  - ropa de rey
  lexicon: BDAG
  rationale: ἐσθής puede referirse de manera amplia a ropa o vestimenta, no necesariamente a varias prendas. «Ropa real» conserva esa amplitud y evita precisar más de lo que el griego exige.
- source_word: καθίσας
  english_pob_choice: having sat down
  chosen_spanish: habiéndose sentado
  alternatives_spanish:
  - habiendo tomado asiento
  - sentándose
  lexicon: BDAG
  rationale: El participio aoristo marca una acción posterior dentro de la narración. «Habiéndose sentado» conserva ese avance secuencial de forma natural en español.
- source_word: ἐπὶ τοῦ βήματος
  english_pob_choice: on the tribunal
  chosen_spanish: en el tribunal
  alternatives_spanish:
  - en el estrado
  - en la plataforma
  - en el tribunal de juicio
  lexicon: BDAG
  rationale: βῆμα puede referirse a un asiento o estrado oficial. Dado el contexto de una comparecencia pública de un gobernante, «tribunal» mantiene el matiz oficial sin añadir innecesariamente la idea de un juicio formal completo. La decisión sigue la revisión inglesa que optó por «tribunal» por naturalidad y fidelidad.
- source_word: ἐδημηγόρει
  english_pob_choice: was delivering a public address
  chosen_spanish: les dirigía un discurso público
  alternatives_spanish:
  - estaba pronunciando un discurso público
  - les hablaba públicamente
  - estaba dirigiéndose al público
  lexicon: BDAG
  rationale: δημηγορέω se refiere a hablar ante una asamblea o audiencia pública. El imperfecto expresa acción en desarrollo; «les dirigía un discurso público» conserva el carácter público y la continuidad aspectual.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: BDAG
  rationale: πρός con acusativo indica dirección hacia la audiencia. En español, el complemento indirecto «les» es la forma más natural y concisa para esta relación.
theological_decisions:
- issue: βῆμα y el alcance del escenario de Herodes
  english_pob_reading: tribunal / tribunal seat rather than a generic platform
  chosen_spanish_reading: tribunal
  alternative_spanish_readings:
  - estrado
  - plataforma
  - tribunal de juicio
  rationale: La escena presenta una exhibición pública de autoridad; βῆμα tiene un trasfondo oficial y a veces judicial. «Tribunal» preserva ese peso institucional sin imponer detalles que el texto no especifica. No se resuelve aquí si Herodes estaba en un acto puramente judicial o más bien ceremonial; la ambigüedad se conserva de forma responsable.
  doctrine_reference: No doctrinal issue; lexical-historical setting only.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «tribunal» en lugar de «tribunal seat» por naturalidad, manteniendo el matiz oficial de βῆμα. También se conserva la secuencia participial del griego y la referencia a un discurso público sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «discurso público» para reflejar δημηγορέω, evitando traducirlo simplemente como «habló», porque el verbo griego es más específico.
  - «Ropa real» mantiene la amplitud de ἐσθῆτα sin sobreinterpretar como múltiples «vestiduras»; la nota al pie preserva la alternativa tradicional.
  - «Tribunal» se emplea en sentido de estrado o sede oficial, no necesariamente como sala judicial moderna.
