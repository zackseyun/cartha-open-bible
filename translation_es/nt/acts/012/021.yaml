    text: Or 'royal robes.' The Greek term can refer generally to splendid attire.
    reason: lexical_alternative
  - marker: b
    text: Or 'judgment seat' or 'platform' for 'tribunal seat.' The Greek βῆμα often denotes an official seat or raised dais.
    reason: lexical_alternative
