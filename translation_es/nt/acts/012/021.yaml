- from: Ahora bien, en un día señalado, Herodes, habiéndose vestido con ropa real y habiéndose sentado en el tribunal[a], les dirigía un discurso público.
  to: Ahora bien, en un día señalado, Herodes, habiéndose vestido con ropa real[a] y habiendo tomado asiento en el tribunal, les dirigía un discurso público.
