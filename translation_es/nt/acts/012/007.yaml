translation:
  language: es
  text: 'Y he aquí[a], un ángel de Yahvé se puso cerca, y una luz brilló en la celda[b]. Golpeando a Pedro en el costado, lo despertó, diciendo: “Levántate rápidamente”. Y las cadenas se le cayeron de las manos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “apareció de repente”. El verbo griego puede enfatizar presencia súbita además de cercanía física.
    reason: lexical_alternative
  - marker: b
    text: O “habitación” o “cuarto”; el término griego es más general, pero el contexto de prisión favorece “celda”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - de pronto
  lexicon: BDAG
  rationale: He aquí conserva el valor de llamado de atención y la vivacidad narrativa del marcador griego sin reducirlo a simple transición.
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  lexicon: BDAG
  rationale: Se sigue el convenio del proyecto para יהוה/YHWH → Yahvé. Aunque el inglés POB usa Lord por κύριος, en esta construcción la referencia es al nombre divino y no se debe enmascarar en español.
- source_word: ἐπέστη
  english_pob_choice: stood near
  chosen_spanish: se puso cerca
  alternatives_spanish:
  - estuvo cerca
  - se presentó repentinamente
  - se puso de pie junto a
  lexicon: BDAG
  rationale: La forma griega puede expresar presencia súbita y cercanía. ‘Se puso cerca’ comunica esa llegada repentina con proximidad, manteniendo la escena natural en español.
- source_word: φῶς ἔλαμψεν
  english_pob_choice: a light shone
  chosen_spanish: una luz brilló
  alternatives_spanish:
  - una luz resplandeció
  - una luz alumbró
  lexicon: BDAG
  rationale: Brilló reproduce de modo directo el verbo de luz y conserva la imagen narrativa sin sobrecargarla.
- source_word: ἐν τῷ οἰκήματι
  english_pob_choice: in the cell
  chosen_spanish: en la celda
  alternatives_spanish:
  - en la habitación
  - en el cuarto
  - en la estancia
  lexicon: BDAG
  rationale: Aunque el término griego es más general, el contexto carcelario exige ‘celda’, como hizo el POB inglés, para no debilitar la escena.
- source_word: πατάξας
  english_pob_choice: striking
  chosen_spanish: golpeando
  alternatives_spanish:
  - dándole un golpe
  - pegándole
  lexicon: BDAG
  rationale: El participio expresa una acción física real; ‘golpeando’ mantiene la fuerza del gesto sin introducir una interpretación adicional.
- source_word: τὴν πλευρὰν
  english_pob_choice: on the side
  chosen_spanish: en el costado
  alternatives_spanish:
  - en la costilla
  - en el lado
  lexicon: BDAG
  rationale: ‘Costado’ es natural en español y conserva el sentido corporal concreto del griego mejor que una formulación más abstracta.
- source_word: ἤγειρεν αὐτὸν
  english_pob_choice: he woke him
  chosen_spanish: lo despertó
  alternatives_spanish:
  - lo levantó
  - lo espabiló
  - lo hizo despertar
  lexicon: BDAG
  rationale: En contexto, ἐγείρω se refiere al acto de sacar a Pedro del sueño. ‘Lo despertó’ es la equivalencia más clara y fiel en español.
- source_word: Ἀνάστα
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzaos
  - Levantate
  lexicon: BDAG
  rationale: Es el imperativo natural y exacto en español para el mandato a Pedro, manteniendo el tono directo del original.
- source_word: ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - sin demora
  - enseguida
  lexicon: BDAG
  rationale: ‘Rápidamente’ reproduce la urgencia del adverbio sin sonar arcaico. ‘Sin demora’ sería más interpretativo.
- source_word: ἐξέπεσαν ... αἱ ἁλύσεις
  english_pob_choice: his chains fell off
  chosen_spanish: sus cadenas se cayeron
  alternatives_spanish:
  - sus cadenas cayeron
  - se le cayeron las cadenas
  - sus cadenas se soltaron
  lexicon: BDAG
  rationale: La imagen es de caída súbita y total de las cadenas. ‘Se cayeron’ mantiene el movimiento y la pasiva implícita del evento.
- source_word: ἐκ τῶν χειρῶν
  english_pob_choice: from his hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de sus muñecas
  - de sus manos y muñecas
  lexicon: BDAG
  rationale: ‘Manos’ sigue el lexema griego χείρ y evita precisar ‘muñecas’, que sería más interpretativo que el texto.
theological_decisions:
- issue: Rendición de κυρίου en ἄγγελος κυρίου
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel de Yahvé
  alternative_spanish_readings:
  - un ángel del Señor
  - un ángel del Señor Dios
  rationale: 'Aunque el inglés POB conserva Lord por el uso editorial del NT, aquí el griego remite al nombre divino en una fórmula que en español debe respetar la convención del proyecto: Yahvé. No se pierde el sentido de procedencia divina del mensajero.'
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé; κύριος en alusiones al nombre divino'
translation_notes:
  revision_awareness: El texto sigue de cerca el packet griego y el audit trail inglés. Se adoptó la decisión del POB de leer οἰκήματι en clave carcelaria, pero en español se ajustó la formulación para mantener naturalidad. También se explicitó la decisión editorial del nombre divino, que en el inglés aparece como Lord, pero en este proyecto se rinde como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó la secuencia narrativa y la fuerza del imperativo breve del griego.
  - ‘Cadenas’ y ‘manos’ conservan el léxico concreto del original sin precisar más allá del texto.
