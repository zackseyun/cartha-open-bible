translation:
  language: es
  text: 'Y la multitud seguía gritando[a]: «¡La voz de un dios, y no de un hombre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La voz de Dios, y no de un hombre». El griego también puede leerse así, pero en el contexto el sentido más probable es «de un dios», reflejando la aclamación pagana de Herodes.'
    reason: alternative_reading
lexical_decisions:
- source_word: δῆμος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el pueblo
  - la muchedumbre
  lexicon: BDAG
  rationale: δῆμος aquí designa al grupo reunido que aclamaba públicamente, no un cuerpo político formal. «La multitud» conserva ese valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: ἐπεφώνει
  english_pob_choice: kept shouting
  chosen_spanish: seguía gritando
  alternatives_spanish:
  - gritaba
  - no dejaba de gritar
  - seguía clamando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. «Seguía gritando» comunica bien esa duratividad sin perder la fuerza de la aclamación pública.
- source_word: Θεοῦ
  english_pob_choice: of a god
  chosen_spanish: de un dios
  alternatives_spanish:
  - de Dios
  - divina
  - de un ser divino
  lexicon: BDAG
  rationale: 'En este contexto de honores paganos a Herodes, el genitivo anartro se entiende más naturalmente como referencia indefinida: «de un dios». Así se preserva el contraste retórico con «de un hombre».'
- source_word: φωνὴ
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - una voz
  - el sonido
  lexicon: BDAG
  rationale: La frase griega es nominal y exclamativa. «La voz» conserva la construcción directa del original y el carácter de proclamación.
- source_word: ἀνθρώπου
  english_pob_choice: of a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - humana
  - de hombre
  lexicon: BDAG
  rationale: El singular mantiene el contraste inmediato con «de un dios». «De un hombre» reproduce esa oposición de forma clara y formalmente cercana al griego.
theological_decisions:
- issue: Si Θεοῦ debe entenderse como «de Dios» o «de un dios»
  english_pob_reading: of a god
  chosen_spanish_reading: de un dios
  alternative_spanish_readings:
  - de Dios
  rationale: El contexto narrativo es una aclamación pagana dirigida a Herodes; el griego no lleva artículo y permite un valor indefinido. Traducir «de Dios» podría sugerir una confesión del Dios de Israel que el contexto no respalda. «De un dios» preserva mejor la tensión histórica y religiosa del pasaje.
  doctrine_reference: Primacía del texto original y preservación de la ambigüedad contextual sin suavizarla por tradición.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no se registraron cambios posteriores y el consenso de control cruzado fue de alta concordancia. La redacción española mantiene esa misma decisión contextual sobre Θεοῦ.'
  spanish_consistency_notes:
  - Se conserva el contraste directo «de un dios / de un hombre», como en el griego y en la decisión auditada del inglés.
  - «Multitud» y «seguía gritando» reflejan bien el valor colectivo e imperfectivo sin introducir explicaciones interpretativas.
  - La nota al pie preserva la lectura alternativa teológica («de Dios») sin convertirla en la opción principal.
