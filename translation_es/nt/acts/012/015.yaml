translation:
  language: es
  text: 'Pero ellos le dijeron: «Estás loca». Pero ella insistía en que así era. Y ellos seguían diciendo: «Es su ángel».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «su ángel de la guarda», «su ángel representante» o, según algunos intérpretes, «su espíritu/fantasma». El griego dice simplemente «su ángel».
    reason: alternative_reading
lexical_decisions:
- source_word: Μαίνῃ
  english_pob_choice: You are out of your mind
  chosen_spanish: Estás fuera de tu mente
  alternatives_spanish:
  - Estás loco
  - Estás loca
  - Estás loco de remate
  lexicon: BDAG
  rationale: El verbo griego es una acusación idiomática de locura. «Fuera de tu mente» conserva la fuerza natural y contemporánea en español sin volverse clínico ni excesivamente coloquial; además evita fijar género cuando el referente inmediato no lo exige en la forma española del diálogo.
- source_word: διϊσχυρίζετο
  english_pob_choice: she kept insisting
  chosen_spanish: insistía
  alternatives_spanish:
  - seguía insistiendo
  - afirmaba con firmeza
  - seguía afirmando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o reiterada. En español, «insistía» comunica bien la duración y el énfasis sin sobrecargar la frase; el contexto ya hace evidente la persistencia.
- source_word: οὕτως ἔχειν
  english_pob_choice: that it was so
  chosen_spanish: que así era
  alternatives_spanish:
  - que eso era verdad
  - que era así
  - que tal era la situación
  lexicon: BDAG
  rationale: La expresión es idiomática y significa que la afirmación de ella era correcta. «Que así era» reproduce de manera natural la idea de «that it was so» en español.
- source_word: ἔλεγον
  english_pob_choice: they kept saying
  chosen_spanish: seguían diciendo
  alternatives_spanish:
  - decían
  - seguían hablando
  - repetían
  lexicon: BDAG
  rationale: El imperfecto expresa repetición o continuidad. «Seguían diciendo» conserva ese valor aspectual mejor que un pretérito simple.
- source_word: ἄγγελός
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En este contexto, la referencia más probable es a un ser angelical asociado con Pedro. «Ángel» mantiene la lectura literal del griego y la tensión interpretativa sin añadir explicación al texto principal.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El genitivo posesivo en español se expresa naturalmente con «su». Aunque puede dejar ambigüedad de referente, esa ambigüedad ya está presente en el griego y conviene no resolverla en el texto principal.
theological_decisions:
- issue: Sentido de «su ángel»
  english_pob_reading: Rendered straightforwardly as 'his angel' without interpretive expansion.
  chosen_spanish_reading: Se traduce de manera literal como «su ángel», sin expandir a «ángel de la guarda» ni a otra explicación.
  alternative_spanish_readings:
  - ángel de la guarda
  - ángel representante
  - su espíritu/fantasma
  rationale: El griego dice simplemente «su ángel» y no especifica la creencia subyacente. Para preservar la tensión teológica y no importar una interpretación posterior, el texto principal permanece literal; las opciones interpretativas quedan reservadas para la nota.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: La revisión más reciente indicó alto grado de acuerdo y sin cambios necesarios; por ello se mantiene la solución literal para «su ángel» y la equivalencia óptima para las expresiones idiomáticas y el valor durativo de los imperfectos.
  spanish_consistency_notes:
  - Se mantiene «ángel» y no «mensajero», conforme al contexto y al audit trail en inglés.
  - Se conserva el matiz durativo de los imperfectos con «insistía» y «seguían diciendo».
  - La puntuación usa comillas españolas y un tono publicable, claro y digno.
  - La nota al pie contiene las alternativas interpretativas preservadas en el inglés POB, sin resolver la ambigüedad en el texto principal.
