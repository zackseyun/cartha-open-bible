translation:
  language: es
  text: Estaba muy airado[a] con los tirios y sidonios. Pero ellos acudieron a él de común acuerdo y, después de convencer a Blasto, el chambelán del rey[b], pedían paz, porque su territorio era abastecido desde el dominio del rey[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba hostil hacia los tirios y sidonios». El griego θυμομαχῶν expresa ira intensa u hostilidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el que está sobre el aposento del rey»; probablemente un funcionario de la corte con acceso a los aposentos privados del rey.
    reason: cultural_note
  - marker: c
    text: O «su región recibía su abastecimiento del dominio del rey».
    reason: lexical_alternative
  - marker: d
    text: O «del territorio del rey».
    reason: previous_rendering
lexical_decisions:
- source_word: θυμομαχῶν
  english_pob_choice: was very angry with
  chosen_spanish: estaba muy airado
  alternatives_spanish:
  - estaba muy enojado
  - estaba hostil hacia
  - combatía airadamente con
  lexicon: BDAG
  rationale: El participio expresa una disposición de fuerte ira u hostilidad activa. En español, «estaba muy airado» comunica con dignidad esa intensidad sin volverse mecánico. «Hostil hacia» conserva la alternativa semántica documentada; «combatía airadamente con» sería más literal pero menos natural.
- source_word: Τυρίοις καὶ Σιδωνίοις
  english_pob_choice: the Tyrians and Sidonians
  chosen_spanish: los tirios y sidonios
  alternatives_spanish:
  - los habitantes de Tiro y Sidón
  - los de Tiro y Sidón
  lexicon: BDAG
  rationale: Se trata de etnónimos. En español, los gentilicios plurales «tirios y sidonios» son concisos y naturales, y preservan el valor de pueblos o poblaciones asociadas a Tiro y Sidón.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: de común acuerdo
  alternatives_spanish:
  - unánimemente
  - con un mismo propósito
  - con una sola voz
  lexicon: BDAG
  rationale: La idea es de unidad de intención y acción. «De común acuerdo» expresa bien esa convergencia, de forma clara para lectores modernos; «unánimemente» y «con un mismo propósito» son alternativas válidas pero menos idiomáticas aquí.
- source_word: παρῆσαν πρὸς αὐτόν
  english_pob_choice: came to him
  chosen_spanish: acudieron a él
  alternatives_spanish:
  - vinieron a él
  - se presentaron ante él
  - se acercaron a él
  lexicon: BDAG
  rationale: El giro indica que se acercaron o comparecieron ante Herodes para tratar el asunto. «Acudieron a él» mantiene la dirección del movimiento y su tono formal.
- source_word: πείσαντες
  english_pob_choice: after persuading
  chosen_spanish: después de convencer
  alternatives_spanish:
  - habiéndolo persuadido
  - tras persuadir
  - después de haber convencido
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal indica acción previa. «Después de convencer» reproduce esa secuencia con naturalidad en español.
- source_word: Βλάστον
  english_pob_choice: Blastus
  chosen_spanish: Blasto
  alternatives_spanish:
  - Blastus
  lexicon: Transliteración del nombre propio según uso español
  rationale: En español bíblico es más natural adaptar el nombre a «Blasto», conservando su identificación como nombre propio sin una terminación extraña para el lector hispano.
- source_word: τὸν ἐπὶ τοῦ κοιτῶνος τοῦ βασιλέως
  english_pob_choice: the king’s chamberlain
  chosen_spanish: el chambelán del rey
  alternatives_spanish:
  - el encargado de la cámara del rey
  - el oficial sobre el aposento del rey
  - el mayordomo del rey
  lexicon: BDAG
  rationale: La expresión alude a un funcionario de la corte vinculado al aposento/cámara real. «Chambelán» comunica esa función cortesana con concisión; las alternativas explican más literalmente la imagen griega, pero suenan más pesadas.
- source_word: ᾐτοῦντο εἰρήνην
  english_pob_choice: they were asking for peace
  chosen_spanish: pedían paz
  alternatives_spanish:
  - solicitaban paz
  - pedían reconciliación
  - buscaban paz
  lexicon: BDAG
  rationale: El imperfecto expresa petición insistente o en curso. «Pedían paz» es breve y preserva el sentido diplomático de una súplica continua.
- source_word: διὰ τὸ τρέφεσθαι
  english_pob_choice: because ... was fed
  chosen_spanish: porque ... era abastecido
  alternatives_spanish:
  - porque ... era alimentado
  - porque ... recibía su suministro
  - porque ... era sostenido
  lexicon: BDAG
  rationale: Aquí el verbo pasivo se refiere a ser provisto/sostenido por suministros alimentarios. «Era abastecido» capta ese carácter de provisión económica y material mejor que un simple «alimentado».
- source_word: αὐτῶν τὴν χώραν
  english_pob_choice: their country
  chosen_spanish: su territorio
  alternatives_spanish:
  - su región
  - su tierra
  - su país
  lexicon: BDAG
  rationale: χώρα puede significar región, territorio o país. En este contexto de dependencia económica y abastecimiento, «territorio» es claro y suficientemente amplio.
- source_word: ἀπὸ τῆς βασιλικῆς
  english_pob_choice: from the king’s domain
  chosen_spanish: desde la región real
  alternatives_spanish:
  - desde el dominio del rey
  - desde el territorio real
  - desde la esfera real
  lexicon: BDAG
  rationale: El adjetivo sustantivado βασιλικῆς remite a lo perteneciente al rey, probablemente su territorio o dominio. «Región real» evita repetir «territorio» y mantiene el vínculo con la provisión proveniente de lo real.
theological_decisions:
- issue: 'Sentido de θυμομαχῶν: ira intensa o hostilidad'
  english_pob_reading: was very angry with / Or 'was hostile toward the Tyrians and Sidonians.'
  chosen_spanish_reading: estaba muy airado
  alternative_spanish_readings:
  - estaba hostil hacia los tirios y sidonios
  - estaba muy enojado con los tirios y sidonios
  rationale: El término griego admite tanto ira intensa como hostilidad. En español se conserva la tensión con una forma que no reduce el matiz a simple molestia. La nota preserva la alternativa de hostilidad porque el texto griego la permite.
  doctrine_reference: Lexical semantics; no doctrinal issue
- issue: 'τὸν ἐπὶ τοῦ κοιτῶνος τοῦ βασιλέως: cargo cortesano exacto'
  english_pob_reading: the king’s chamberlain, literally 'the one over the king’s bedchamber'
  chosen_spanish_reading: el chambelán del rey
  alternative_spanish_readings:
  - el encargado de la cámara del rey
  - el oficial sobre el aposento del rey
  rationale: No es necesario especificar más allá de lo que el texto permite. «Chambelán» es el equivalente funcional más natural y conserva la referencia a un funcionario de acceso real; la nota puede aclarar la imagen literal si el lector desea verla.
  doctrine_reference: Historical/cultural reference; no doctrinal issue
- issue: 'διὰ τὸ τρέφεσθαι αὐτῶν τὴν χώραν ἀπὸ τῆς βασιλικῆς: dependencia económica y política'
  english_pob_reading: because their country was fed from the king’s domain / region
  chosen_spanish_reading: porque su territorio era abastecido desde la región real
  alternative_spanish_readings:
  - porque su territorio era alimentado desde el dominio del rey
  - porque su región recibía provisiones del dominio real
  rationale: La frase expresa que la tierra de Tiro y Sidón dependía de suministros procedentes del ámbito real. «Abastecido» mantiene la imagen de provisión material sin limitarla a comida literal, y «región real» conserva el matiz territorial de βασιλικῆς.
  doctrine_reference: Historical/cultural reference; no doctrinal issue
translation_notes:
  revision_awareness: Tomé en cuenta el ajuste editorial del inglés desde 'from the king’s country' a 'from the king’s domain' para evitar repetición. En español resolví la misma tensión con 'desde la región real', manteniendo la relación territorial sin duplicar 'territorio'. También preservé la decisión auditada de traducir θυμομαχῶν con fuerza afectiva/hostil, y la de expresar el imperfecto ᾐτοῦντο como petición continua ('pedían').
  spanish_consistency_notes:
  - Usé «Yahvé» como norma del proyecto no aplicable en este versículo.
  - Mantuve «chambelán» como equivalente funcional de un cargo cortesano, con nota que preserva la imagen literal del griego.
  - Elegí etnónimos («tirios y sidonios») por claridad y naturalidad en español.
  - Conservé la distinción entre petición continua («pedían») y una acción previa («después de convencer»).
