base_translation:
  language: en
  yaml_path: translation/nt/acts/012/020.yaml
  text: Now he was very angry with the Tyrians and Sidonians[a]. But they came to him with one accord, and after persuading Blastus, the king’s chamberlain, they were asking for peace[d][c][b], because their country was fed from the king’s domain.
  footnotes:
  - marker: a
    text: Or 'was hostile toward the Tyrians and Sidonians.' The Greek θυμομαχῶν expresses intense anger or hostility.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the one over the king’s bedchamber,' likely a court official with access to the king’s private quarters.
    reason: cultural_note
  - marker: c
    text: Or 'because their region received its food supply from the king’s domain.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from the king’s country'.
    reason: previous_rendering
