  to: Estaba muy airado[a] con los tirios y sidonios. Pero ellos acudieron a él de común acuerdo y, después de convencer a Blasto, el chambelán del rey[b], pedían paz, porque su territorio era abastecido desde el dominio del rey[c][d].
