translation:
  language: es
  text: Después de arrestarlo, lo puso en prisión, entregándolo a cuatro destacamentos de soldados[a] para custodiarlo, con la intención de sacarlo ante el pueblo después de la Pascua[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cuatro tetradios de soldados», es decir, cuatro grupos de cuatro soldados.
    reason: lexical_alternative
  - marker: b
    text: El griego πάσχα significa «Pascua»; algunas versiones antiguas lo traducen como «Easter» aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: πιάσας
  english_pob_choice: after arresting
  chosen_spanish: Después de arrestarlo
  alternatives_spanish:
  - después de prenderlo
  - tras apresarlo
  - habiéndolo arrestado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa una acción previa; en español, 'después de arrestarlo' conserva esa secuencia natural sin perder el sentido de captura/custodia.
- source_word: ἔθετο εἰς φυλακήν
  english_pob_choice: he put him in prison
  chosen_spanish: lo puso en prisión
  alternatives_spanish:
  - lo colocó en prisión
  - lo puso en la cárcel
  lexicon: BDAG
  rationale: La expresión es idiomática para encierro. 'Prisión' mantiene el registro narrativo formal y evita un giro demasiado coloquial.
- source_word: παραδοὺς
  english_pob_choice: handing him over
  chosen_spanish: entregándolo
  alternatives_spanish:
  - entregándolo a cargo de
  - poniéndolo bajo custodia
  lexicon: BDAG
  rationale: El participio señala transferencia de custodia. 'Entregándolo' conserva el valor de cesión a otros encargados y suena natural en español.
- source_word: τέσσαρσιν τετραδίοις στρατιωτῶν
  english_pob_choice: to four squads of soldiers
  chosen_spanish: a cuatro destacamentos de soldados
  alternatives_spanish:
  - a cuatro grupos de cuatro soldados
  - a cuatro cuadrillas de soldados
  lexicon: BDAG
  rationale: '''Destacamentos'' comunica la división de guardia de manera clara en español. La expresión griega literalmente implica cuatro grupos de cuatro; se mantiene la idea general en el texto principal y se documenta la precisión en nota.'
- source_word: φυλάσσειν αὐτόν
  english_pob_choice: to guard him
  chosen_spanish: para custodiarlo
  alternatives_spanish:
  - para guardarlo
  - para vigilarlo
  - para mantenerlo bajo guardia
  lexicon: BDAG
  rationale: '''Custodiarlo'' expresa bien la función de vigilancia armada y preserva el matiz formal de vigilancia continua.'
- source_word: βουλόμενος
  english_pob_choice: intending
  chosen_spanish: con la intención de
  alternatives_spanish:
  - queriendo
  - planeando
  - con el propósito de
  lexicon: BDAG
  rationale: El participio de voluntad expresa propósito deliberado; 'con la intención de' conserva esa intención resoluta sin añadir matiz emocional.
- source_word: μετὰ τὸ πάσχα
  english_pob_choice: after the Passover
  chosen_spanish: después de la Pascua
  alternatives_spanish:
  - después de la Pascua judía
  - tras la Pascua
  lexicon: BDAG
  rationale: πάσχα se refiere a la Pascua; en español 'Pascua' es la forma estándar y fiel. Se evita 'Easter' por no corresponder al sentido léxico primario del término griego.
- source_word: ἀναγαγεῖν αὐτὸν τῷ λαῷ
  english_pob_choice: to bring him out to the people
  chosen_spanish: sacarlo al pueblo
  alternatives_spanish:
  - presentarlo al pueblo
  - llevarlo ante el pueblo
  - sacarlo para el pueblo
  lexicon: BDAG
  rationale: En este contexto judicial-público, ἀνάγω puede equivaler a sacar o presentar para comparecer. 'Sacarlo al pueblo' conserva la dirección hacia la exposición pública sin inferir más formalidad que la del texto.
- source_word: λαῷ
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - ante el pueblo
  lexicon: BDAG
  rationale: En Hechos, λαός suele designar al pueblo como cuerpo público. 'Al pueblo' conserva esa referencia amplia y directa.
theological_decisions:
- issue: πάσχα y la tradición de traducirlo como 'Easter'
  english_pob_reading: Passover
  chosen_spanish_reading: Pascua
  alternative_spanish_readings:
  - Pascua judía
  - Pascua
  rationale: El término griego πάσχα designa la Pascua. La traducción principal mantiene la correspondencia léxica original y evita depender de una tradición posterior que no refleja el sentido inmediato del griego.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
- issue: Alcance de ἀναγαγεῖν en una escena pública/judicial
  english_pob_reading: to bring him out to the people
  chosen_spanish_reading: sacarlo al pueblo
  alternative_spanish_readings:
  - presentarlo al pueblo
  - llevarlo ante el pueblo
  rationale: La escena indica una presentación pública posterior a la Pascua. 'Sacarlo al pueblo' preserva el movimiento de salida hacia una comparecencia pública sin añadir un juicio formal explícito que el griego no menciona.
  doctrine_reference: Principio POB de no sobreespecificar lo que el texto no afirma
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: sin cambios necesarios, con alto grado de acuerdo entre revisores. La redacción española mantiene la secuencia aspectual del griego, la custodia militar, y el sentido de πάσχα como Pascua, sin adoptar la traducción tradicional ''Easter''.'
  spanish_consistency_notes:
  - Se usó 'Pascua' para πάσχα conforme a la primacía del original y al uso estándar en español.
  - Se prefirió 'custodiarlo' para φυλάσσειν por claridad formal y coherencia con la custodia armada.
  - Se mantuvo el tono narrativo formal con verbos simples y una sola subordinación de propósito.
  - La nota b conserva la precisión estructural del griego sin sobrecargar el texto principal.
