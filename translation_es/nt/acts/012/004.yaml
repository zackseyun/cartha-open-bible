    text: Literalmente, «cuatro tetradios de soldados», es decir, cuatro grupos de cuatro soldados.
    reason: lexical_alternative
  - marker: b
    text: El griego πάσχα significa «Pascua»; algunas versiones antiguas lo traducen como «Easter» aquí.
    reason: alternative_reading
  revision_rationale: Se corrigen y realinean las notas con el audit trail inglés, se elimina el error léxico 'tetrarquías', y se mejora 'sacarlo al pueblo' a 'sacarlo ante el pueblo' para mayor naturalidad y precisión semántica en español.
