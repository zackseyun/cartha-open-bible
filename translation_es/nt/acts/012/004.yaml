review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego: arresto previo, encarcelamiento, entrega a guardias, propósito de custodia y plan de presentarlo después de la Pascua. Sin embargo, las notas están invertidas respecto al rastro inglés auditado: la nota [a] en inglés corresponde a los ''cuatro tetradios'' y la [b] a πάσχα, pero en español [a] se ancla en ''arrestarlo'' y [b] en ''custodiarlo''. Además, la nota [b] usa ''tetrarquías'', que es léxicamente erróneo para τετραδίοις. También ''sacarlo al pueblo'' es comprensible pero menos natural y preciso que ''sacarlo ante el pueblo'' o ''presentarlo ante el pueblo'' para ἀναγαγεῖν αὐτὸν τῷ λαῷ.'
  spanish_quality_summary: El texto es generalmente claro y de buen registro. 'Después de arrestarlo' y 'lo puso en prisión' funcionan bien. 'Entregándolo a cuatro destacamentos de soldados' es natural, y 'para custodiarlo' es adecuado. La principal mejora de estilo y precisión es cambiar 'sacarlo al pueblo' por 'sacarlo ante el pueblo', que suena más idiomático en español para una comparecencia pública. Las notas necesitan corrección terminológica y realineación con sus anclajes.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Pascua' para πάσχα está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión léxica sobre τετραδίοις debe reflejar 'grupos de cuatro' y no 'tetrarquías'.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a los mismos puntos semánticos que en el audit trail inglés.
    rationale: El inglés documenta [a] para 'four tetrads of soldiers' y [b] para πάσχα/Passover; el español actual asigna [a] a πιάσας y [b] a τετραδίοις, omitiendo la nota sobre Pascua.
  - severity: high
    issue: La nota española usa 'tetrarquías' para τετραδίοις.
    rationale: τετράδιον significa grupo de cuatro, no 'tetrarquía'. La nota actual introduce un falso equivalente histórico-político.
  - severity: medium
    issue: '''sacarlo al pueblo'' es menos natural/preciso que una formulación con ''ante''.'
    rationale: Para ἀναγαγεῖν αὐτὸν τῷ λαῷ en contexto público/judicial, 'sacarlo ante el pueblo' preserva mejor la idea de comparecencia pública sin sobreespecificar juicio formal.
  revised_spanish_text: Después de arrestarlo, lo puso en prisión, entregándolo a cuatro destacamentos de soldados[a] para custodiarlo, con la intención de sacarlo ante el pueblo después de la Pascua[b].
  revised_footnotes:
