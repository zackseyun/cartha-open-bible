translation:
  language: es
  text: 'Pero, haciéndoles señas con la mano para que callaran, les relató cómo el Señor lo había sacado de la prisión. Y dijo: «Informen esto a Jacobo y a los hermanos[a]». Luego salió y se fue a otro lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y las hermanas»; el griego dice «los hermanos», que en contexto puede referirse a la comunidad amplia de creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατασείσας
  english_pob_choice: motioning
  chosen_spanish: haciéndoles señas
  alternatives_spanish:
  - gesticulando
  - señalándoles
  lexicon: BDAG
  rationale: El participio describe un gesto con la mano para pedir silencio. «Haciéndoles señas» conserva la acción física de forma natural en español sin precisar demasiado el tipo exacto de gesto.
- source_word: τῇ χειρὶ σιγᾶν
  english_pob_choice: with his hand to be silent
  chosen_spanish: con la mano para que callaran
  alternatives_spanish:
  - con la mano para guardar silencio
  - con la mano para silencio
  lexicon: BDAG
  rationale: La construcción expresa el propósito del gesto. En español, «para que callaran» comunica con claridad la intención y mantiene el vínculo entre la mano y el silencio.
- source_word: διηγήσατο
  english_pob_choice: he explained
  chosen_spanish: les relató
  alternatives_spanish:
  - les explicó
  - les contó detalladamente
  - les narró
  lexicon: BDAG
  rationale: El verbo implica una narración de lo ocurrido. «Les relató» preserva ese matiz narrativo sin perder naturalidad; «les explicó» es posible, pero menos marcado como relato.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor
  lexicon: BDAG
  rationale: Se conserva «el Señor» porque el texto griego usa κύριος como título teológico sin especificar más el referente. En esta frase puede aludir al agente divino que lo liberó, y la traducción no resuelve esa tensión.
- source_word: ἐξήγαγεν
  english_pob_choice: had brought him out
  chosen_spanish: lo había sacado
  alternatives_spanish:
  - lo había sacado afuera
  - lo había conducido fuera
  - lo había librado
  lexicon: BDAG
  rationale: El verbo significa sacar o conducir fuera. «Lo había sacado» es la forma más directa en español y conserva el sentido de liberación desde la prisión.
- source_word: φυλακή
  english_pob_choice: the prison
  chosen_spanish: la prisión
  alternatives_spanish:
  - la cárcel
  - el calabozo
  lexicon: BDAG
  rationale: «Prisión» es neutral y formal, acorde con el registro narrativo. «Cárcel» también sería posible, pero «prisión» se ajusta mejor al tono del pasaje.
- source_word: Ἀπαγγείλατε
  english_pob_choice: Report
  chosen_spanish: Informen
  alternatives_spanish:
  - Reporten
  - Digan
  - Anuncien
  lexicon: BDAG
  rationale: El imperativo pide transmitir un mensaje con exactitud. «Informen» expresa bien la obligación de comunicar noticias importantes y suena natural en español actual.
- source_word: Ἰακώβῳ
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - James
  lexicon: BDAG
  rationale: Se conserva «Jacobo» como forma tradicional del nombre griego en este contexto bíblico. Es una opción reconocible y evita introducir una equivalencia distinta sin necesidad textual.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se mantiene «los hermanos» porque el plural masculino griego es el que aparece en el texto. En el contexto puede abarcar a la comunidad creyente; esa amplitud se preserva en nota en vez de neutralizar el término en el cuerpo.
- source_word: ἐξελθὼν ἐπορεύθη
  english_pob_choice: he departed and went
  chosen_spanish: Luego salió y se fue
  alternatives_spanish:
  - Luego partió y fue
  - Luego salió y partió
  lexicon: BDAG
  rationale: Los dos verbos marcan salida y desplazamiento. «Salió y se fue» reproduce ambas acciones con fluidez natural en español.
- source_word: εἰς ἕτερον τόπον
  english_pob_choice: to another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a un lugar diferente
  lexicon: BDAG
  rationale: «Otro lugar» refleja la indefinición del griego sin añadir detalles. Es la forma más directa y natural para el cierre del versículo.
theological_decisions:
- issue: Referente de κύριος en la liberación de Pedro
  english_pob_reading: Rendered as 'the Lord,' referring to the divine agent who delivered Peter, while not specifying whether this is the risen Jesus or God more generally.
  chosen_spanish_reading: Se traduce «el Señor» sin precisar más el referente.
  alternative_spanish_readings:
  - «Jesús»
  - «Dios»
  - «el Señor Jesús»
  rationale: El griego usa κύριος de modo no especificado. Mantener «el Señor» preserva la ambigüedad teológica del pasaje y evita resolver una identificación que el texto no explicita.
  doctrine_reference: 'DOCTRINE.md: contested terms; preserve theological tension rather than resolve it.'
- issue: Alcance de τοῖς ἀδελφοῖς
  english_pob_reading: '''the brothers'' may refer to the wider community of believers depending on context.'
  chosen_spanish_reading: «a los hermanos» en el texto, con posible sentido ampliado a la comunidad creyente.
  alternative_spanish_readings:
  - «a los hermanos y hermanas»
  - «a los creyentes»
  rationale: El plural masculino es lo que ofrece el griego. En vez de sustituirlo en el cuerpo por una forma neutral, se conserva y se explica su posible alcance comunitario en nota.
  doctrine_reference: 'DOCTRINE.md: gender-accurate rendering policy and contextual inclusiveness.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; este borrador mantiene ese perfil, preservando la estructura narrativa, el referente teológico abierto de κύριος y la nota sobre τοῖς ἀδελφοῖς.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al criterio del proyecto y al audit trail inglés.
  - Se evita «SEÑOR» como convención de ocultamiento del nombre divino, ya que aquí el griego emplea κύριος y no el tetragrámaton explícito.
  - Se conserva «hermanos» como plural masculino del texto, con nota para su posible alcance inclusivo.
  - Se mantiene un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - «Informen» y «relató» se coordinan para reflejar el carácter comunicativo del mandato y del relato.
