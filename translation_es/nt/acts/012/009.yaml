translation:
  language: es
  text: Y salió y lo siguió[a], y no sabía que lo que estaba ocurriendo por medio del ángel era real, sino que pensaba que veía una visión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «por el ángel». El griego permite agencia mediada con διά + genitivo; se eligió «por medio del ángel» para preservar ese matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español narrativo, un verbo finito coordinado con el siguiente expresa con naturalidad la secuencia sin forzar un gerundio pesado.
- source_word: ἠκολούθει
  english_pob_choice: followed
  chosen_spanish: lo siguió
  alternatives_spanish:
  - iba siguiendo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso, pero en español el pretérito perfecto simple funciona bien en la narración seguida por la acción anterior de salir. Se mantiene la relación de seguimiento sin perder claridad.
- source_word: οὐκ ᾔδει
  english_pob_choice: he did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no se daba cuenta
  - no conocía
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento o conciencia; 'no sabía' es la formulación más directa y transparente en español.
- source_word: ἀληθές
  english_pob_choice: real
  chosen_spanish: real
  alternatives_spanish:
  - verdadero
  - genuino
  lexicon: BDAG
  rationale: El contraste es con una experiencia visionaria; 'real' comunica mejor la actual eficacia del hecho que 'verdadero', que en español puede sonar más abstracto.
- source_word: τὸ γινόμενον
  english_pob_choice: what was happening
  chosen_spanish: lo que estaba ocurriendo
  alternatives_spanish:
  - lo que estaba pasando
  - lo que sucedía
  lexicon: BDAG
  rationale: El participio articular apunta a un evento en desarrollo. 'Lo que estaba ocurriendo' conserva el sentido progresivo y suena natural en español.
- source_word: διὰ τοῦ ἀγγέλου
  english_pob_choice: through the angel
  chosen_spanish: por medio del ángel
  alternatives_spanish:
  - a través del ángel
  - por el ángel
  lexicon: BDAG
  rationale: διά con genitivo puede marcar agencia mediada. 'Por medio del ángel' preserva esa mediación sin reducirla a una simple instrumentalidad ni imponer una formulación más fuerte que el griego.
- source_word: ἐδόκει
  english_pob_choice: thought
  chosen_spanish: pensaba
  alternatives_spanish:
  - creía
  - supuso
  lexicon: BDAG
  rationale: Aquí el verbo expresa la percepción o suposición de Pedro; 'pensaba' encaja bien con la cláusula siguiente y mantiene el matiz de impresión subjetiva.
- source_word: ὅραμα
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - una visión sobrenatural
  lexicon: BDAG
  rationale: Término estándar para una experiencia reveladora; 'visión' es suficiente y fiel al uso neotestamentario.
- source_word: βλέπειν
  english_pob_choice: was seeing
  chosen_spanish: veía
  alternatives_spanish:
  - estaba viendo
  lexicon: BDAG
  rationale: Con ἐδόκει, el infinitivo expresa lo que Pedro creía experimentar. En español, 'veía' resulta natural y mantiene la percepción continua sin recargar la frase.
theological_decisions:
- issue: Naturaleza de la acción angelical expresada por διά + genitivo
  english_pob_reading: through the angel
  chosen_spanish_reading: por medio del ángel
  alternative_spanish_readings:
  - por el ángel
  - a través del ángel
  rationale: La formulación conserva la agencia mediada del griego sin afirmar más de lo que el texto dice sobre la acción del ángel. Evita tanto borrar al ángel como convertirlo en agente autónomo con lenguaje más interpretativo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el dictamen de alta concordancia del repaso inglés: mantiene la secuencia narrativa, la conciencia limitada de Pedro y la mediación expresada por διά con genitivo. No se detectaron revisiones aplicadas en el pasaje inglés, así que no se incorporan cambios de última hora.'
  spanish_consistency_notes:
  - Se usa 'ángel' en masculino por concordancia natural con τοῦ ἀγγέλου.
  - Se prefiere 'visión' sin adjetivos añadidos para no ampliar el alcance del sustantivo griego.
  - Se mantiene 'real' para ἀληθές, conservando el contraste con la experiencia visionaria.
