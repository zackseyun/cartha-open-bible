translation:
  language: es
  text: Ahora bien, cuando amaneció[a], hubo no poca conmoción entre los soldados por lo que había sido de Pedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hubo no poca agitación entre los soldados acerca de lo que había sucedido con Pedro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένης δὲ ἡμέρας
  english_pob_choice: Now when day came
  chosen_spanish: Ahora bien, cuando amaneció
  alternatives_spanish:
  - Cuando llegó el día
  - Al hacerse de día
  - Cuando empezó a clarear
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con δέ marca transición temporal. «Cuando amaneció» expresa de manera natural en español la llegada del día y conserva la relación temporal sin forzar un calco.
- source_word: τάραχος οὐκ ὀλίγος
  english_pob_choice: no small disturbance
  chosen_spanish: no poca conmoción
  alternatives_spanish:
  - gran conmoción
  - considerable conmoción
  - no poca agitación
  lexicon: BDAG
  rationale: Se conserva la litotes οὐκ ὀλίγος con una formulación española igualmente marcada. «Conmoción» comunica bien el sentido de alteración o perturbación colectiva y evita suavizar el énfasis retórico.
- source_word: ἐν τοῖς στρατιώταις
  english_pob_choice: among the soldiers
  chosen_spanish: entre los soldados
  alternatives_spanish:
  - entre los guardias
  - en medio de los soldados
  - entre la tropa
  lexicon: BDAG
  rationale: «Entre» reproduce bien la relación grupal de ἐν aquí. Se mantiene «soldados» porque el término griego es amplio; «guardias» sería interpretativo por contexto y no se impone en el texto español principal.
- source_word: τί ἄρα
  english_pob_choice: over what
  chosen_spanish: por lo que
  alternatives_spanish:
  - acerca de qué
  - sobre qué
  - por qué razón
  lexicon: BDAG
  rationale: El giro indirecto de pregunta e inferencia se vuelve en español una frase natural de causa o asunto. «Por lo que» permite expresar el objeto de la inquietud sin volverlo artificial.
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro el apóstol
  lexicon: standard transliteration
  rationale: Nombre propio en forma española usual y claramente reconocible para la lectura eclesial.
- source_word: ἐγένετο
  english_pob_choice: had become
  chosen_spanish: había llegado a ser
  alternatives_spanish:
  - había sucedido
  - había pasado con
  - había llegado a ser de
  lexicon: BDAG
  rationale: En la pregunta idiomática τί ... ἐγένετο con persona, el sentido es «qué fue de» / «qué había pasado con». «Había llegado a ser de» mantiene la fuerza idiomática de devenir o resultar respecto de Pedro, sin simplificarla demasiado.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en alto grado; no se registraron revisiones sustanciales en el pase más reciente. La única decisión relevante para el español fue conservar la litotes y resolver el giro τί ἄρα ὁ Πέτρος ἐγένετο con una expresión idiomática natural.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la litotes negativa («no poca») para reflejar el énfasis del original.
  - No se sustituye «soldados» por «guardias» en el texto principal para no introducir una interpretación contextual no explicitada por el griego.
  - La nota al pie ofrece una alternativa más cercana al sentido idiomático común en español, análoga a la alternativa inglesa auditable.
