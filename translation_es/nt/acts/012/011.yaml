revisions:
- from: 'Y Pedro, [a]volviendo en sí, dijo: «Ahora sé de verdad que Yahvé envió a su ángel y me libró de la mano de Herodes y de toda la expectativa del pueblo judío».[b]'
  to: 'Y Pedro, volviendo en sí[a], dijo: «Ahora sé verdaderamente que el Señor envió a su ángel y me libró de la mano de Herodes[b] y de toda la expectativa del pueblo judío[c]».'
  rationale: Se corrigió «Yahvé» a «el Señor» para seguir la decisión teológica auditada y no resolver indebidamente el referente de κύριος. Se restauró la nota cultural sobre «la mano de Herodes», presente en el inglés POB. También se mejoró el anclaje de notas y se elevó ligeramente el registro con «verdaderamente».
