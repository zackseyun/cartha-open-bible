translation:
  language: es
  text: 'Y Pedro, volviendo en sí[a], dijo: «Ahora sé verdaderamente que el Señor envió a su ángel y me libró de la mano de Herodes[b] y de toda la expectativa del pueblo judío[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recobrando el sentido» o «habiendo vuelto en sí».
    reason: lexical_alternative
  - marker: b
    text: La expresión «de la mano de Herodes» significa de su poder o control.
    reason: cultural_note
  - marker: c
    text: O «de todo lo que el pueblo judío esperaba».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἑαυτῷ γενόμενος
  english_pob_choice: coming to himself
  chosen_spanish: volviendo en sí
  alternatives_spanish:
  - recobrando el sentido
  - habiendo vuelto en sí
  lexicon: BDAG
  rationale: La expresión griega es idiomática y señala que Pedro recupera plenamente la conciencia tras la experiencia visionaria. «Volviendo en sí» conserva la imagen y suena natural en español; «recobrando el sentido» explicita más la idea, pero suaviza la imagen del texto.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: de verdad
  alternatives_spanish:
  - verdaderamente
  - ciertamente
  lexicon: BDAG
  rationale: Pedro expresa reconocimiento enfático. «De verdad» comunica bien esa certeza en español actual sin perder solemnidad; «verdaderamente» es más formal, y «ciertamente» enfatiza más la conclusión que la vivencia de certeza.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El verbo compuesto puede reducirse a «envió» en este contexto, como hace el inglés POB con «sent». «Mandó» sería más directivo y «despachó» suena menos natural aquí.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: BDAG
  rationale: En este pasaje la acción de enviar al ángel y librar a Pedro remite a la agencia divina; por la norma del proyecto, cuando κύριος alude al nombre divino se traduce «Yahvé» en el texto principal. Mantiene la transparencia respecto del término subyacente y evita el enmascaramiento por «Señor».
- source_word: ἄγγελον
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: El contexto narrativo exige una entidad celestial, no un mensajero humano. «Ángel» es la única opción fiel y clara.
- source_word: ἐξείλατό με
  english_pob_choice: rescued me
  chosen_spanish: me libró
  alternatives_spanish:
  - me rescató
  - me entregó
  lexicon: BDAG
  rationale: El verbo expresa liberación de un peligro o poder. «Me libró» es una solución española muy natural y suficientemente fuerte; «me rescató» también es posible, pero «libró» preserva mejor el tono bíblico sin forzar una interpretación técnica.
- source_word: ἐκ χειρὸς Ἡρῴδου
  english_pob_choice: from the hand of Herod
  chosen_spanish: de la mano de Herodes
  alternatives_spanish:
  - del poder de Herodes
  - del control de Herodes
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de «la mano» porque el inglés POB la mantiene y la nota auditiva indica que significa poder o control. En español, la forma literal es comprensible y deja visible la imagen del original.
- source_word: πάσης τῆς προσδοκίας
  english_pob_choice: all the expectation
  chosen_spanish: toda la expectativa
  alternatives_spanish:
  - todo lo que se esperaba
  - toda la esperanza
  lexicon: BDAG
  rationale: 'προσδοκία denota expectativa o anticipación. «Toda la expectativa» sigue de cerca la forma griega y respeta la tensión semántica: puede aludir a lo que el pueblo esperaba que ocurriera.'
- source_word: τοῦ λαοῦ τῶν Ἰουδαίων
  english_pob_choice: of the Jewish people
  chosen_spanish: del pueblo judío
  alternatives_spanish:
  - del pueblo de los judíos
  - de la gente judía
  lexicon: BDAG
  rationale: «Pueblo judío» es una forma natural en español y mantiene el valor étnico-colectivo. Es más fluida que una calca del genitivo y conserva el sentido del contexto sin añadir interpretaciones.
theological_decisions:
- issue: Identificación de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Jesús
  rationale: El contexto de liberación por medio del ángel se atribuye a la acción divina. Como la política del proyecto prioriza «Yahvé» cuando κύριος remite al nombre divino, se evita la máscara «Señor». El texto no necesita identificar explícitamente a Jesús aquí, y mantener «Yahvé» conserva la transparencia del testimonio original.
  doctrine_reference: 'DOCTRINE.md: Nombre divino y términos contestados; usar Yahvé para יהוה / κύριος cuando el contexto apunta al nombre divino.'
- issue: Alcance de τῆς προσδοκίας
  english_pob_reading: all the expectation
  chosen_spanish_reading: toda la expectativa
  alternative_spanish_readings:
  - todo lo que el pueblo esperaba
  - toda la esperanza
  rationale: El griego deja abierto si se trata de lo que el pueblo esperaba sobre el destino de Pedro o de la expectativa misma del pueblo como realidad colectiva. La traducción conserva esa ambigüedad en lugar de resolverla, coherente con el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than over-resolve lexical ambiguity.'
translation_notes:
  revision_awareness: 'Se integró la revisión auditada del inglés POB: se preservó la forma literal de «from the hand of Herod» como «de la mano de Herodes» y se mantuvo la naturalidad de «the Jewish people» como «el pueblo judío». También se evitó añadir notas sin anclaje textual y se ajustó el nombre divino conforme a la norma editorial del proyecto para κύριος con sentido divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para κύριος en el texto principal, de acuerdo con la política editorial del proyecto.
  - Se mantiene «ángel» y no «mensajero» por el contexto narrativo.
  - La metáfora «de la mano de Herodes» se conserva para reflejar la imagen del original.
  - «Pueblo judío» se eligió por naturalidad y fidelidad semántica.
  - Las notas al pie están ancladas exactamente en las marcas [a] y [b] presentes en el texto.
