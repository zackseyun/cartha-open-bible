  text: καὶ ὁ Πέτρος ⸂ἐν ἑαυτῷ γενόμενος⸃ εἶπεν· Νῦν οἶδα ἀληθῶς ὅτι ἐξαπέστειλεν ⸀ὁ κύριος τὸν ἄγγελον αὐτοῦ καὶ ἐξείλατό με ἐκ χειρὸς Ἡρῴδου καὶ πάσης τῆς προσδοκίας τοῦ λαοῦ τῶν Ἰουδαίων.
base_translation:
  language: en
  yaml_path: translation/nt/acts/012/011.yaml
  text: And Peter[a], coming to himself, said[c][b], “Now I truly know that the Lord sent his angel and rescued me from the hand of Herod and from all the expectation of the Jewish people.”
  footnotes:
