review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Pedro recupera plena conciencia, reconoce con certeza la intervención divina, y afirma haber sido librado del poder de Herodes y de lo que el pueblo judío esperaba. También conserva adecuadamente la imagen de «la mano de Herodes» y la ambigüedad básica de προσδοκία mediante una nota alternativa.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere pequeños ajustes. La colocación del marcador [a] antes de «volviendo» es torpe; debe anclarse sobre la frase misma. Además, «de verdad» es comprensible, pero «verdaderamente» suena más natural y elevado en este registro bíblico. «Toda la expectativa del pueblo judío» es fiel, aunque algo rígido; puede mantenerse con nota aclaratoria, pero conviene pulir la puntuación y el anclaje de notas.
  glossary_alignment: 'Hay un problema de alineación terminológica importante: el borrador traduce κύριος como «Yahvé», pero la evidencia auditada en inglés subraya que aquí debe preservarse la tensión teológica con «the Lord», no resolverse como «God» ni como «the risen Jesus». Dado que el término fuente es κύριος, no יהוה, y la decisión doctrinal documentada pide no especificar más de lo que el texto permite, en español debe ser «el Señor», no «Yahvé». El resto de la terminología principal está bien alineado.'
  issues:
  - severity: high
    issue: κύριος se tradujo como «Yahvé» en lugar de «el Señor».
    rationale: El audit trail inglés documenta expresamente que en este pasaje debe conservarse «the Lord» para no resolver una referencia teológicamente abierta. Traducir «Yahvé» sobreinterpreta el referente y no sigue la decisión teológica específica del registro.
  - severity: medium
    issue: Falta la nota cultural sobre «de la mano de Herodes».
    rationale: El inglés POB conserva una nota explicando que «la mano» significa poder o control. Como el español mantiene la metáfora, también conviene preservar esa aclaración para auditabilidad y claridad.
  - severity: low
    issue: Ubicación poco natural del marcador [a] y registro algo coloquial en «de verdad».
    rationale: El marcador debe ir pegado a la palabra o frase anotada sin interrumpir la lectura. «Verdaderamente» encaja mejor con el tono moderno-digno solicitado.
  revised_spanish_text: 'Y Pedro, volviendo en sí[a], dijo: «Ahora sé verdaderamente que el Señor envió a su ángel y me libró de la mano de Herodes[b] y de toda la expectativa del pueblo judío[c]».'
