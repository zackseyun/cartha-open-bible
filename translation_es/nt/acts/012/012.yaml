translation:
  language: es
  text: Y cuando se dio cuenta de esto[a], fue a la casa de María, la madre de Juan, a quien llamaban Marcos, donde muchos se habían reunido y estaban orando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando lo comprendió». El griego expresa que Pedro llegó a plena conciencia de su situación; «se dio cuenta de esto» hace más explícito ese matiz contextual.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιδών
  english_pob_choice: when he realized this
  chosen_spanish: cuando lo comprendió
  alternatives_spanish:
  - cuando se dio cuenta de esto
  - cuando lo entendió
  - cuando advirtió esto
  lexicon: BDAG / συνοράω
  rationale: El participio aoristo expresa el momento en que Pedro llega a plena conciencia de su situación. En español, «lo comprendió» conserva esa toma de conciencia sin sonar excesivamente literal. Se mantiene el referente implícito («lo») a partir del contexto inmediato, como en el inglés auditado.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG / τέ
  rationale: La partícula τέ solo enlaza narrativamente. «Y» preserva la transición suave sin añadir una relación temporal o inferencial más fuerte de la que exige el griego.
- source_word: ἦλθεν ἐπὶ τὴν οἰκίαν
  english_pob_choice: he went to the house
  chosen_spanish: fue a la casa
  alternatives_spanish:
  - fue a la casa de
  - se dirigió a la casa
  lexicon: BDAG / ἔρχομαι + ἐπί
  rationale: La dirección hacia un lugar se expresa naturalmente con «fue a». «Casa» conserva el sentido espacial primario de οἰκία en este contexto narrativo, donde la ubicación física es lo relevante.
- source_word: τῆς Μαρίας
  english_pob_choice: of Mary
  chosen_spanish: de María
  alternatives_spanish:
  - de María
  lexicon: BDAG / Μαρία
  rationale: Se usa el nombre propio en forma española establecida, «María», de acuerdo con la práctica del proyecto para nombres personales.
- source_word: τῆς μητρὸς Ἰωάννου
  english_pob_choice: the mother of John
  chosen_spanish: la madre de Juan
  alternatives_spanish:
  - la madre de Juan
  lexicon: BDAG / μήτηρ + genitivo
  rationale: La relación genitiva se vuelve con claridad por «la madre de Juan». «Juan» es la forma española normal de Ἰωάννης.
- source_word: τοῦ ἐπικαλουμένου Μάρκου
  english_pob_choice: who was called Mark
  chosen_spanish: llamado Marcos
  alternatives_spanish:
  - que era llamado Marcos
  - apodado Marcos
  - también llamado Marcos
  lexicon: BDAG / ἐπικαλέω
  rationale: El participio identifica a Juan por un segundo nombre. En español, «llamado Marcos» es breve y fiel. Se evita «también» en el texto principal porque, como nota la auditoría inglesa, el griego no exige ese adverbio.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en cuya casa
  - en casa de la cual
  lexicon: BDAG / οὗ
  rationale: El relativo apunta a la ubicación de la casa de María. «Donde» es la solución natural en español para continuar la referencia locativa sin pesadez sintáctica.
- source_word: ἱκανοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - bastantes
  - un buen número de
  lexicon: BDAG / ἱκανός
  rationale: En plural, el adjetivo puede indicar un número considerable. «Muchos» refleja bien la cantidad sin forzar un matiz numérico más preciso que el griego no da.
- source_word: συνηθροισμένοι
  english_pob_choice: had gathered together
  chosen_spanish: estaban reunidos
  alternatives_spanish:
  - se habían reunido
  - habían sido congregados
  lexicon: BDAG / συναθροίζω
  rationale: El griego combina «eran/estaban» con participio perfecto, marcando un estado resultante de reunión previa. «Estaban reunidos» transmite ese estado en español con naturalidad y sin perder el sentido comunitario.
- source_word: καὶ προσευχόμενοι
  english_pob_choice: and were praying
  chosen_spanish: y orando
  alternatives_spanish:
  - y estaban orando
  - y estaban orando en oración
  lexicon: BDAG / προσεύχομαι
  rationale: El participio describe la acción concurrente de la asamblea. En español, el gerundio «orando» conserva el valor durativo sin necesidad de un auxiliar explícito.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de SBLGNT y el razonamiento auditado en la versión inglesa de POB. No se observaron cambios posteriores en la revisión inglesa; por eso la redacción propuesta mantiene el mismo sentido base y solo ajusta la expresión al español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se emplean nombres propios españoles usuales: María, Juan y Marcos.'
  - Se preserva la diferencia entre un estado resultante («estaban reunidos») y la acción concurrente («orando»), acorde con la construcción perifrástica griega.
  - No se añade «también» a Marcos, porque la auditoría inglesa nota que el adverbio no es requerido por el griego.
