review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: Pedro va a la casa de María, madre de Juan llamado Marcos, donde muchos estaban reunidos y orando. Sin embargo, hay dos ajustes de fidelidad recomendables: (1) Συνιδών se expresa mejor como toma de conciencia situacional que como simple comprensión de un objeto implícito; en español suena más natural y más cercano al matiz contextual «cuando se dio cuenta de esto». (2) La secuencia «la madre de Juan, llamado Marcos» puede leerse en español como si «llamado Marcos» modificara a María o quedar algo suelta; conviene explicitar «de Juan, a quien llamaban Marcos» o equivalente para reflejar claramente que el segundo nombre pertenece a Juan.'
  spanish_quality_summary: El texto es legible y digno, pero «cuando lo comprendió» suena algo menos idiomático que «cuando se dio cuenta de esto» en este contexto narrativo, y «donde muchos estaban reunidos y orando» se puede pulir a «donde muchos se habían reunido y estaban orando» para reflejar mejor el perfecto perifrástico griego y mejorar la fluidez española. La revisión propuesta mantiene un español natural y claro, sin caer en paráfrasis.
  glossary_alignment: No hay términos del glosario mayor en juego. Los nombres propios «María», «Juan» y «Marcos» están bien en español. La decisión sobre ἐπικαλουμένου debe preservar que Marcos es un nombre adicional de Juan; «a quien llamaban Marcos» lo hace con claridad y sigue la rationale inglesa de no imponer «también» en el texto principal.
  issues:
  - severity: medium
    issue: «cuando lo comprendió» para Συνιδών
    rationale: Aunque no es incorrecto, en este contexto narrativo Pedro llega a percatarse plenamente de su situación. «Se dio cuenta de esto» reproduce mejor el matiz contextual y evita un pronombre «lo» algo impreciso en español.
  - severity: medium
    issue: Posible ambigüedad en «la madre de Juan, llamado Marcos»
    rationale: La aposición participial modifica a Juan, no a María. En español, «a quien llamaban Marcos» o «que era llamado Marcos» lo deja inequívoco.
  - severity: low
    issue: «estaban reunidos y orando» atenúa el valor resultativo de συνηθροισμένοι
    rationale: El griego ἦσαν + participio perfecto sugiere un estado de reunión ya formado. «Se habían reunido y estaban orando» refleja mejor la relación aspecto/tiempo, aunque «estaban reunidos» no es una falla grave.
  revised_spanish_text: Y cuando se dio cuenta de esto[a], fue a la casa de María, la madre de Juan, a quien llamaban Marcos, donde muchos se habían reunido y estaban orando.
  revised_footnotes:
  - marker: a
    text: O «cuando lo comprendió». El griego expresa que Pedro llegó a plena conciencia de su situación; «se dio cuenta de esto» hace más explícito ese matiz contextual.
    reason: lexical_alternative
  revision_rationale: 'La revisión mejora la naturalidad y precisión del español sin apartarse del griego ni de la auditoría inglesa: hace explícita la toma de conciencia de Συνιδών, elimina una posible ambigüedad sobre quién era llamado Marcos y refleja mejor el estado resultante de la reunión con una formulación española más fluida.'
