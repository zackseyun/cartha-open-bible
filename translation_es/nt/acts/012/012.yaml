- from: Y cuando lo comprendió[a], fue a la casa de María, la madre de Juan, llamado Marcos, donde muchos estaban reunidos y orando.
  to: Y cuando se dio cuenta de esto[a], fue a la casa de María, la madre de Juan, a quien llamaban Marcos, donde muchos se habían reunido y estaban orando.
  rationale: 'La revisión mejora la naturalidad y precisión del español sin apartarse del griego ni de la auditoría inglesa: hace explícita la toma de conciencia de Συνιδών, elimina una posible ambigüedad sobre quién era llamado Marcos y refleja mejor el estado resultante de la reunión con una formulación española más fluida.'
