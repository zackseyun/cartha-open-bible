revisions:
- from: Por aquel tiempo, el rey Herodes extendió las manos para maltratar[a] a algunos de los que eran de la iglesia[b].
  to: Por[a] aquel tiempo, el rey Herodes les echó mano[b] a algunos de la iglesia para maltratarlos[c].
  rationale: Se ajusta el modismo principal para que el español exprese una acción hostil real y natural, en línea con el análisis del griego y la decisión inglesa. También se aligera la referencia a los miembros de la iglesia y se restaura la nota alternativa para κακῶσαί. Aunque «les echó mano» puede en algunos contextos sugerir aprehensión, aquí conserva mejor que «extendió las manos» la fuerza idiomática de la expresión; la cláusula final «para maltratarlos» impide una lectura demasiado estrecha.
