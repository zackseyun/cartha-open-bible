    text: O «En aquel tiempo» o «Más o menos por ese tiempo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «echó las manos sobre». La expresión denota una acción hostil contra algunos de la iglesia.
    reason: lexical_alternative
  - marker: c
    text: O «hacer daño».
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo principal para que el español exprese una acción hostil real y natural, en línea con el análisis del griego y la decisión inglesa. También se aligera la referencia a los miembros de la iglesia y se restaura la nota alternativa para κακῶσαί. Aunque «les echó mano» puede en algunos contextos sugerir aprehensión, aquí conserva mejor que «extendió las manos» la fuerza idiomática de la expresión; la cláusula final «para maltratarlos» impide una lectura demasiado estrecha.
