translation:
  language: es
  text: Por[a] aquel tiempo, el rey Herodes les echó mano[b] a algunos de la iglesia para maltratarlos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En aquel tiempo» o «Más o menos por ese tiempo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «echó las manos sobre». La expresión denota una acción hostil contra algunos de la iglesia.
    reason: lexical_alternative
  - marker: c
    text: O «hacer daño».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατ’ ἐκεῖνον δὲ τὸν καιρόν
  english_pob_choice: Now about that time
  chosen_spanish: Por aquel tiempo
  alternatives_spanish:
  - En aquel tiempo
  - Más o menos por ese tiempo
  lexicon: BDAG
  rationale: La frase temporal idiomática pide en español una equivalencia natural. «Por aquel tiempo» conserva el valor aproximado de κατά con acusativo temporal y mantiene el matiz narrativo sin sonar demasiado literal.
- source_word: Ἡρῴδης ὁ βασιλεύς
  english_pob_choice: Herod the king
  chosen_spanish: el rey Herodes
  alternatives_spanish:
  - Herodes el rey
  - el rey Herodes
  lexicon: BDAG
  rationale: En español, «el rey Herodes» es la forma más natural y clara para un apposición titulada. Mantiene la identificación sin perder el valor de título.
- source_word: ἐπέβαλεν ... τὰς χεῖρας
  english_pob_choice: laid hands on
  chosen_spanish: extendió las manos
  alternatives_spanish:
  - puso las manos sobre
  - echó mano a
  lexicon: BDAG
  rationale: La imagen literal de «poner/extender las manos» preserva el modismo griego y deja que el infinitivo siguiente explique la intención hostil. Evita reducir prematuramente el sentido a «arrestó».
- source_word: κακῶσαί
  english_pob_choice: to mistreat
  chosen_spanish: maltratar
  alternatives_spanish:
  - hacer daño a
  - perjudicar
  lexicon: BDAG
  rationale: «Maltratar» comunica acción hostil y dañina de manera directa, sin cargar innecesariamente con un término técnico como «perseguir». Respeta el alcance general de κακόω en este contexto.
- source_word: τινας τῶν ἀπὸ τῆς ἐκκλησίας
  english_pob_choice: some from the church
  chosen_spanish: a algunos de los que eran de la iglesia
  alternatives_spanish:
  - a algunos de la iglesia
  - a algunos pertenecientes a la iglesia
  lexicon: BDAG
  rationale: La construcción griega identifica a ciertas personas asociadas con la comunidad cristiana. «De la iglesia» es posible, pero «de los que eran de la iglesia» explicita mejor la pertenencia sin añadir interpretación ajena.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία se refiere normalmente a la comunidad cristiana. «Iglesia» es la opción estándar y más clara en español eclesial contemporáneo; «asamblea» sería más formalmente transparente pero menos natural aquí.
theological_decisions:
- issue: Naturaleza de ἐπέβαλεν τὰς χεῖρας
  english_pob_reading: laid hands on some from the church to mistreat them
  chosen_spanish_reading: extendió las manos para maltratar a algunos de los que eran de la iglesia
  alternative_spanish_readings:
  - puso las manos sobre algunos de la iglesia para maltratarlos
  - los arrestó para maltratarlos
  rationale: El griego usa un modismo de acción hostil, no necesariamente un simple arresto. La traducción conserva la imagen corporal y deja que el propósito expresado por κακῶσαί determine el matiz de violencia o abuso.
  doctrine_reference: 'Principio POB: preservar el alcance lexical sin estrecharlo indebidamente; coherencia con la lectura contextual del texto griego.'
- issue: Uso de «iglesia» para ἐκκλησία
  english_pob_reading: church
  chosen_spanish_reading: iglesia
  alternative_spanish_readings:
  - asamblea
  - congregación
  rationale: En este contexto narrativo de Hechos, ἐκκλησία designa la comunidad cristiana. «Iglesia» comunica adecuadamente esa referencia en español actual y mantiene consistencia terminológica.
  doctrine_reference: Consistencia terminológica POB para ἐκκλησία en contexto cristiano; evitar sustituciones innecesarias por vocablos más genéricos.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la versión inglesa auditada y no requiere cambios sustanciales. La principal decisión en español fue conservar el modismo de acción hostil («extendió las manos») sin convertirlo en una interpretación cerrada como «arrestó», y mantener ἐκκλησία como «iglesia».
  spanish_consistency_notes:
  - Se usa «iglesia» para ἐκκλησία, coherente con el uso estándar de Hechos en la tradición POB española.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay término divino en este versículo.
  - El tiempo narrativo «Por aquel tiempo» mantiene el matiz aproximado del griego sin rigidizarlo.
