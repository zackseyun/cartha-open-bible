review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el marco temporal, identifica correctamente a Herodes como rey, traduce κακῶσαί con un verbo adecuado («maltratar») y mantiene «iglesia» para ἐκκλησία. Sin embargo, «extendió las manos» no refleja bien el modismo ἐπέβαλεν ... τὰς χεῖρας en este contexto; en español suena poco idiomático y además pierde el valor hostil que el inglés POB preserva con «laid hands on». También faltó trasladar la nota alternativa correspondiente a κακῶσαί («o “hacer daño”»), presente en el rastro inglés.
  spanish_quality_summary: El español es generalmente claro, pero «extendió las manos para maltratar» resulta forzado y poco natural. «Les echó mano» o «puso las manos sobre» serían opciones más idiomáticas; la primera puede estrecharse hacia arresto en algunos contextos, por lo que conviene una formulación que conserve la hostilidad sin reducir demasiado el sentido. «A algunos de la iglesia» es más natural que «a algunos de los que eran de la iglesia» y sigue siendo fiel.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Iglesia» concuerda con ἐκκλησία. No aparecen términos con defaults especiales como Yahvé/Mesías/esclavo. La revisión propuesta mejora la fidelidad al modismo griego sin apartarse de la filosofía POB.
  issues:
  - severity: high
    issue: «extendió las manos» traduce inadecuadamente ἐπέβαλεν ... τὰς χεῖρας
    rationale: El griego es un modismo de acción hostil contra personas. «Extendió las manos» en español no comunica naturalmente «echó mano de / puso las manos sobre» y puede sonar como mero gesto físico, debilitando el sentido contextual.
  - severity: medium
    issue: Falta una nota para la alternativa de κακῶσαί
    rationale: El inglés POB conserva la alternativa «to harm». En español conviene preservar esa posibilidad con una nota como «O “hacer daño”».
  - severity: low
    issue: «a algunos de los que eran de la iglesia» es innecesariamente pesado
    rationale: La frase es fiel pero menos natural en español. «A algunos de la iglesia» conserva el sentido de pertenencia con mejor fluidez.
  revised_spanish_text: Por[a] aquel tiempo, el rey Herodes les echó mano[b] a algunos de la iglesia para maltratarlos[c].
  revised_footnotes:
