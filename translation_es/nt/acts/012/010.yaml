  text: διελθόντες δὲ πρώτην φυλακὴν καὶ δευτέραν ἦλθαν ἐπὶ τὴν πύλην τὴν σιδηρᾶν τὴν φέρουσαν εἰς τὴν πόλιν, ἥτις αὐτομάτη ἠνοίγη αὐτοῖς, καὶ ἐξελθόντες προῆλθον ῥύμην μίαν, καὶ εὐθέως ἀπέστη ὁ ἄγγελος ἀπ’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/012/010.yaml
  text: After they had passed the first guard and the second[a], they came to the iron gate leading into the city, which opened to them by itself; and after they went out, they went along one street[b], and immediately the angel departed from him.
  footnotes:
