translation:
  language: es
  text: Después de haber pasado la primera guardia y la segunda, llegaron a la puerta de hierro que daba a la ciudad, que se les abrió por sí sola; y, después de salir, avanzaron una calle[a], e inmediatamente el ángel se alejó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Una calle» probablemente significa que avanzaron la distancia de una sola calle antes de que el ángel lo dejara.
    reason: cultural_note
lexical_decisions:
- source_word: διελθόντες
  english_pob_choice: After they had passed
  chosen_spanish: Después de haber pasado
  alternatives_spanish:
  - habiendo pasado
  - cuando habían pasado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «después de haber pasado» conserva la anterioridad narrativa de forma natural y fiel.
- source_word: φυλακήν
  english_pob_choice: guard
  chosen_spanish: guardia
  alternatives_spanish:
  - puesto de guardia
  - vigilia
  - prisión
  lexicon: BDAG
  rationale: En este contexto narrativo de escape, el sustantivo singular con ordinales señala puestos de custodia, no una prisión; «guardia» comunica bien esa función sin forzar el sentido.
- source_word: πύλην τὴν σιδηρᾶν
  english_pob_choice: the iron gate
  chosen_spanish: la puerta de hierro
  alternatives_spanish:
  - la puerta de hierro forjado
  - la puerta de hierro
  lexicon: BDAG
  rationale: «Puerta» es el equivalente más natural de πύλη en español, y «de hierro» preserva el énfasis material sin calco artificial.
- source_word: τὴν φέρουσαν εἰς τὴν πόλιν
  english_pob_choice: leading into the city
  chosen_spanish: que conducía a la ciudad
  alternatives_spanish:
  - que llevaba a la ciudad
  - que daba acceso a la ciudad
  lexicon: BDAG
  rationale: El participio expresa la función direccional de la puerta; «conducía a la ciudad» reproduce esa relación de manera clara y sobria.
- source_word: ἥτις αὐτομάτη ἠνοίγη αὐτοῖς
  english_pob_choice: which opened to them by itself
  chosen_spanish: la cual se les abrió por sí sola
  alternatives_spanish:
  - la cual se abrió sola para ellos
  - la cual se les abrió de suyo
  lexicon: BDAG
  rationale: «Por sí sola» comunica bien el carácter milagroso y evita el matiz técnico de «automáticamente», que en español moderno puede sonar mecánico.
- source_word: ἐξελθόντες
  english_pob_choice: after they went out
  chosen_spanish: después de salir
  alternatives_spanish:
  - habiendo salido
  - cuando salieron
  lexicon: BDAG
  rationale: Mantiene la secuencia de acciones sin sobrecargar la frase; el valor aspectual del participio queda reflejado por la relación temporal.
- source_word: προῆλθον ῥύμην μίαν
  english_pob_choice: they went along one street
  chosen_spanish: avanzaron una calle[a]
  alternatives_spanish:
  - siguieron una calle
  - caminaron por una sola calle
  lexicon: BDAG
  rationale: «Avanzaron» expresa el desplazamiento hacia adelante, y «una calle» refleja la medida de distancia. La nota aclara la posible idea de un tramo concreto de calle antes de la separación del ángel.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: Adverbio de secuencia rápida y directa; «inmediatamente» es preciso y de registro neutral.
- source_word: ἀπέστη
  english_pob_choice: departed
  chosen_spanish: se apartó
  alternatives_spanish:
  - se alejó
  - se retiró
  lexicon: BDAG
  rationale: El verbo puede expresar retirarse o separarse; «se apartó» conserva la sobriedad narrativa y la idea de separación del ángel respecto de Pedro.
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En este contexto se trata claramente de un ser celestial; «ángel» es la equivalencia adecuada y convencional en español.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - apartándose de él
  - alejándose de él
  lexicon: BDAG
  rationale: El referente es Pedro de manera individual después de las acciones en plural; «de él» mantiene la referencia simple y precisa.
theological_decisions:
- issue: Naturaleza del acceso milagroso por la puerta
  english_pob_reading: which opened to them by itself
  chosen_spanish_reading: la cual se les abrió por sí sola
  alternative_spanish_readings:
  - la cual se abrió sola para ellos
  - la cual se les abrió de suyo
  rationale: La formulación conserva el milagro sin añadir mecanismos ni explicaciones; «por sí sola» expresa la autoapertura de manera idiomática en español.
  doctrine_reference: Hechos 12:10; filosofía de traducción del POB §1, §6
- issue: Sentido de φυλακή en la escena
  english_pob_reading: first guard and the second
  chosen_spanish_reading: la primera guardia y la segunda
  alternative_spanish_readings:
  - la primera vigilancia y la segunda
  - la primera posta y la segunda
  rationale: El contexto es la fuga de Pedro a través de puntos sucesivos de custodia; por eso se entiende como guardias/puestos, no como prisiones. «Guardia» evita una lectura inverosímil y sigue la intención del texto.
  doctrine_reference: Hechos 12:10; filosofía de traducción del POB §1, §6
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el auditor inglés con acuerdo alto; no se documentaron revisiones textuales ni cambios posteriores que afecten la redacción española.
  spanish_consistency_notes:
  - Se mantuvo «ángel» para ὁ ἄγγελος conforme al contexto celeste del relato.
  - Se prefirió «guardia» para φυλακή en coherencia con la lectura contextual del POB inglés.
  - Se evitó «Señor» o «Cristo» porque no aparecen en este versículo.
  - Se usó un español neutro y publicable, con orden sintáctico natural pero sin perder la secuencia temporal del griego.
