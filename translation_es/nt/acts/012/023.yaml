review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: inmediatez, agente angélico, causa del juicio, condición de estar comido por gusanos y muerte. Sin embargo, introduce dos matices no ideales: «Yahvé» para κυρίου en «ἄγγελος κυρίου» va más allá de la evidencia inmediata griega y del propio rastro inglés, que documenta «Lord» como título aquí; y «no había dado» añade un pluscuamperfecto no exigido por ἔδωκεν. También «habiéndose vuelto» suena más interpretativo y menos natural que una forma simple participial o coordinada.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «carcomido por gusanos» suena algo extraño porque «carcomido» suele asociarse a madera, óxido o deterioro interno más que a cuerpos humanos. «Por cuanto» es posible, pero «porque» suena más natural sin pérdida de solemnidad. Las notas a y c no corresponden bien a las alternativas preservadas en el audit trail inglés: a desplaza la alternativa al adverbio y c añade «expiró», no documentado allí como principal alternativa inglesa conservada.'
  glossary_alignment: Buena alineación en «Dios», «murió» y la preservación de «la gloria». No obstante, el uso por defecto de «Yahvé» no debe imponerse automáticamente a κύριος griego cuando la evidencia inmediata no exige identificarlo como sustituto directo del Tetragrámaton; aquí conviene «del Señor» y explicar la excepción por fidelidad a la fuente griega y al audit trail. También conviene mantener la alternativa documentada «comido por gusanos» y «exhaló el último suspiro».
  issues:
  - severity: high
    issue: «un ángel de Yahvé» para ἄγγελος κυρίου
    rationale: La fuente inmediata es griega y dice κύριος, no el Tetragrámaton. El audit trail inglés eligió explícitamente «an angel of the Lord». El estándar del proyecto sobre «Yahvé» es un valor por defecto contextual, no una sustitución ciega. Aquí «del Señor» preserva mejor la evidencia fuente y la decisión auditada.
  - severity: medium
    issue: «no había dado la gloria a Dios» usa pluscuamperfecto
    rationale: ἔδωκεν es aoristo indicativo simple. El pluscuamperfecto español introduce una relación temporal más marcada de la que el griego no exige. «No dio la gloria a Dios» o «no dio a Dios la gloria» es más fiel.
  - severity: medium
    issue: «habiéndose vuelto carcomido por gusanos» suena poco natural y algo interpretativo
    rationale: γενόμενος pide algo como «quedando/volviéndose/llegando a estar», pero «habiéndose vuelto» es pesado. «Carcomido por gusanos» tampoco es la opción más idiomática para un cuerpo humano. «y quedó comido por gusanos» o «y, al quedar comido por gusanos» es más claro.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa auditada
    rationale: La nota inglesa [a] preserva la alternativa para «did not give the glory to God» («did not give God the glory»), no para «struck/immediately». La nota española debe anclarse en la frase de la gloria, no en «lo hirió».
  - severity: low
    issue: La nota [c] añade «expiró»
    rationale: El audit trail inglés conserva como alternativa «he breathed his last». En español, «exhaló el último suspiro» basta y se alinea mejor; «expiró» no es incorrecto, pero no reproduce exactamente la alternativa documentada.
  revised_spanish_text: Al instante, un ángel del Señor lo hirió, porque no dio la gloria a Dios[a], y, quedando comido por gusanos[b], murió[c].
  revised_footnotes:
  - marker: a
    text: 'O: «no dio a Dios la gloria».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «carcomido por gusanos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «exhaló el último suspiro».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «κύριος» a «Señor» por fidelidad a la evidencia griega inmediata y al audit trail inglés; se elimina el pluscuamperfecto no exigido; se mejora la naturalidad de la construcción participial y se reordenan las notas para que coincidan con las alternativas significativas documentadas.
