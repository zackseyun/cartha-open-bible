translation:
  language: es
  text: Al instante, un ángel del Señor lo hirió, porque no dio la gloria a Dios[a], y, quedando comido por gusanos[b], murió[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dio a Dios la gloria».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «carcomido por gusanos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «exhaló el último suspiro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  english_pob_choice: Immediately
  chosen_spanish: Al instante
  alternatives_spanish:
  - Inmediatamente
  - De inmediato
  lexicon: BDAG
  rationale: El adverbio expresa falta de demora. «Al instante» conserva la rapidez súbita con un español natural y digno.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de muerte
  - lo golpeó
  lexicon: BDAG
  rationale: El verbo significa golpear o herir. «Hirió» mantiene la fuerza del acto sin adelantar por sí mismo el resultado final, que se expresa después con «murió».
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  - el ángel de Yahvé
  lexicon: BDAG
  rationale: Aunque κύριος puede traducirse «Señor», el proyecto distingue el nombre divino subyacente y usa «Yahvé» en el texto principal. El griego carece de artículo, por eso se conserva «un ángel».
- source_word: ἀνθ’ ὧν
  english_pob_choice: because
  chosen_spanish: por cuanto
  alternatives_spanish:
  - porque
  - debido a que
  lexicon: BDAG
  rationale: La expresión introduce la causa o razón del juicio. «Por cuanto» refleja ese valor causal en un registro bíblico claro sin volverlo mecánico.
- source_word: ἔδωκεν τὴν δόξαν τῷ θεῷ
  english_pob_choice: did not give the glory to God
  chosen_spanish: no había dado la gloria a Dios
  alternatives_spanish:
  - no había dado gloria a Dios
  - no había dado a Dios la gloria
  lexicon: BDAG
  rationale: Se conserva el artículo con «la gloria» para reflejar τὴν δόξαν, y el pluscuamperfecto español ayuda a mostrar que la negativa explica el juicio ya narrado.
- source_word: γενόμενος
  english_pob_choice: becoming
  chosen_spanish: habiéndose vuelto
  alternatives_spanish:
  - y volviéndose
  - al volverse
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción participial española que mantiene la secuencia sin imponer un matiz temporal más preciso de lo que el griego exige.
- source_word: σκωληκόβρωτος
  english_pob_choice: worm-eaten
  chosen_spanish: carcomido por gusanos
  alternatives_spanish:
  - comido por gusanos
  - devorado por gusanos
  lexicon: BDAG
  rationale: La palabra significa literalmente «comido por gusanos». «Carcomido por gusanos» preserva la imagen gráfica con un español comprensible y menos áspero que una glosa literal rígida.
- source_word: ἐξέψυξεν
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - expiró
  - exhaló el último suspiro
  lexicon: BDAG
  rationale: El verbo idiomáticamente significa morir o expirar. «Murió» es la forma más natural y directa en español, sin sobreexplicar el modo.
theological_decisions:
- issue: Origen del juicio y referencia al nombre divino
  english_pob_reading: The verse presents an angel of the Lord as the agent of divine judgment; the English audit trail keeps the title 'Lord' while noting the lack of article in Greek.
  chosen_spanish_reading: El texto presenta a un ángel de Yahvé como agente del juicio divino, manteniendo el valor del nombre divino subyacente en κύριος.
  alternative_spanish_readings:
  - un ángel del Señor
  - el ángel del Señor
  rationale: Dado el estándar del proyecto para יהוה/YHWH, «Yahvé» evita enmascarar el nombre divino. No obstante, se conserva la mediación angélica y no se especifica más de lo que el verso afirma.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Relación entre la herida del ángel, la descomposición y la muerte
  english_pob_reading: The verse presents Herod's death as an act of divine judgment mediated by an angel, without adding further doctrinal explanation.
  chosen_spanish_reading: La frase mantiene el juicio divino mediado por un ángel, y no fuerza una reconstrucción médica o cronológica más precisa que la que da Lucas.
  alternative_spanish_readings:
  - La muerte fue inmediata al golpe del ángel.
  - La descomposición por gusanos describe una fase previa a la muerte.
  rationale: El griego une el golpe, la condición de «carcomido por gusanos» y la muerte, pero no obliga a definir si la descomposición fue instantánea, concomitante o narrativa. La traducción preserva esa tensión.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y el audit trail inglés sin depender mecánicamente de la formulación inglesa. Se conservan las decisiones ya aprobadas: inmediatez del adverbio, fuerza de πατάσσω sin sobretraducir el resultado, causalidad de ἀνθ’ ὧν, artículo de δόξαν, participio secuencial de γενόμενος, imagen gráfica de σκωληκόβρωτος y sentido idiomático de ἐξέψυξεν. No se añadieron glosas doctrinales extrañas al verso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene «la gloria» para reflejar el artículo griego.
  - 'La secuencia verbal respeta el orden narrativo: golpe, estado de corrupción, muerte.'
  - Las notas al pie preservan alternativas reales sin multiplicar matices no atestiguados.
  - El registro es bíblico moderno, no arcaizante, y evita calcos innecesarios.
