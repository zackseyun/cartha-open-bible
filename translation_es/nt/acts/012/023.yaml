revisions:
- from: Al instante, un ángel de Yahvé lo hirió[a], por cuanto no había dado la gloria a Dios, y, habiéndose vuelto carcomido por gusanos[b], murió[c].
  to: Al instante, un ángel del Señor lo hirió, porque no dio la gloria a Dios[a], y, quedando comido por gusanos[b], murió[c].
  rationale: Se ajusta «κύριος» a «Señor» por fidelidad a la evidencia griega inmediata y al audit trail inglés; se elimina el pluscuamperfecto no exigido; se mejora la naturalidad de la construcción participial y se reordenan las notas para que coincidan con las alternativas significativas documentadas.
