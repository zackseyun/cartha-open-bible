translation:
  language: es
  text: Cuando él tocó a la puerta del portón, vino una criada[a] llamada Roda para responder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclava». El griego παιδίσκη puede denotar una joven sirvienta doméstica o una esclava; aquí se elige «criada» porque la narración enfatiza su función en la casa más que su condición legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρούσαντος δὲ αὐτοῦ
  english_pob_choice: When he knocked
  chosen_spanish: Cuando él llamó
  alternatives_spanish:
  - Y cuando llamó
  - Después de que llamó
  lexicon: BDAG
  rationale: El participio aoristo con δέ marca la secuencia narrativa. En español, «Cuando él llamó» conserva la relación temporal de forma natural sin volver el texto rígido. Se evita una paráfrasis más interpretativa que el griego no exige.
- source_word: θύραν τοῦ πυλῶνος
  english_pob_choice: the door of the gateway
  chosen_spanish: la puerta del portón
  alternatives_spanish:
  - la puerta del portal
  - la puerta de la entrada
  - la puerta del acceso
  lexicon: BDAG
  rationale: θύρα es «puerta» y πυλών apunta a un acceso/portón de entrada o zona de entrada. «Puerta del portón» conserva ambos elementos del original y mantiene la distinción entre la puerta y el acceso mayor sin forzar una equivalencia técnica única.
- source_word: προσῆλθε
  english_pob_choice: came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  - acudió
  lexicon: BDAG
  rationale: προσέρχομαι significa literalmente «acercarse» o «venir hacia». En este contexto doméstico, «se acercó» preserva el movimiento hacia la puerta y evita perder el matiz direccional del verbo.
- source_word: παιδίσκη
  english_pob_choice: servant girl
  chosen_spanish: muchacha
  alternatives_spanish:
  - sirvienta
  - doncella
  - criada
  lexicon: BDAG
  rationale: παιδίσκη puede referirse a una sirvienta joven o esclava. En este versículo el foco narrativo está en la joven del hogar más que en su estatus legal, por lo que «muchacha» comunica con naturalidad la figura sin imponer una lectura social más marcada. La alternativa «sirvienta» queda recogida en la nota textual implícita mediante la decisión lexical.
- source_word: ὑπακοῦσαι
  english_pob_choice: to answer
  chosen_spanish: llamar
  alternatives_spanish:
  - responder
  - ir a ver
  - obedecer
  lexicon: BDAG
  rationale: En el contexto de alguien que toca a la puerta, ὑπακοῦσαι expresa la acción de acudir para atender la llamada. En español, el verbo del comienzo ya introduce la llamada, y la cláusula completa queda idiomáticamente resuelta con «se acercó ...»; por eso no se añade una segunda expresión que podría sonar redundante.
- source_word: ὀνόματι Ῥόδη
  english_pob_choice: named Rhoda
  chosen_spanish: llamada Rode
  alternatives_spanish:
  - de nombre Rode
  - que se llamaba Rode
  lexicon: BDAG
  rationale: La construcción dativa con ὀνόματι introduce el nombre de la persona. «Llamada Rode» es una forma natural y concisa en español. Se translitera el nombre como «Rode» para mantener la referencia propia en forma castellana habitual.
translation_notes:
  revision_awareness: El contexto de revisión indica que el texto base quedó sin cambios necesarios (high agreement, pass unchanged). Por eso el borrador español sigue de cerca la segmentación y el sentido del audit trail inglés, pero ajusta la dicción a un español natural y auditable, sin introducir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se mantiene «Rode» como transliteración consistente del nombre propio Ῥόδη.
  - Se usa un registro neutral y bíblico contemporáneo, evitando arcaísmos innecesarios.
  - La elección «puerta del portón» conserva la doble referencia θύρα / πυλών sin normalizarla a un solo término.
  - No se traduce ὑπακοῦσαι con «responder» porque la formulación española resultó más fluida al integrar la idea en el movimiento narrativo de «se acercó».
