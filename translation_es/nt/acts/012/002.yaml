translation:
  language: es
  text: Y mató a Jacobo[a], el hermano de Juan, con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio muerte a» o «ejecutó». El griego simplemente afirma que causó la muerte de Jacobo; el contexto más amplio puede sugerir una ejecución oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεῖλεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - hizo matar a
  - ejecutó
  lexicon: BDAG
  rationale: ἀναιρέω aquí indica causar la muerte. «Mató» es la forma más natural y directa en español para reflejar ese valor sin introducir por sí sola una lectura jurídica más específica que el griego no explicita.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como conector narrativo. «Y» mantiene el avance simple del relato sin cargar el vínculo con contraste o secuencia más fuerte de lo que exige el texto.
- source_word: Ἰάκωβον
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: nombre propio tradicional
  rationale: Se conserva la identificación del personaje con un nombre bíblico reconocido en español. «Jacobo» es la forma tradicional correspondiente al griego Ἰάκωβος; se prefiere aquí para seguir el valor del nombre en el texto fuente y evitar una sustitución por una forma eclesiástica distinta sin base en este versículo.
- source_word: τὸν ἀδελφὸν Ἰωάννου
  english_pob_choice: the brother of John
  chosen_spanish: el hermano de Juan
  alternatives_spanish:
  - hermano de Juan
  - el hermano de Juan
  lexicon: BDAG
  rationale: La frase appositiva identifica a cuál Jacobo se refiere el texto. «El hermano de Juan» sigue de cerca la estructura griega y suena natural en español.
- source_word: μαχαίρῃ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: BDAG
  rationale: μάχαιρα designa una espada o daga corta; en este contexto, «espada» comunica el instrumento concreto de manera clara en español. «Con la espada» reproduce el valor instrumental del dativo sin añadir matices interpretativos.
theological_decisions:
- issue: Naturaleza de la muerte de Jacobo
  english_pob_reading: The verse states that he killed James; the Greek does not explicitly foreground a legal execution, though the broader context may suggest it.
  chosen_spanish_reading: Se traduce como un acto directo de matar, sin especificar en el texto principal que se trate de una ejecución judicial.
  alternative_spanish_readings:
  - ejecutó a Jacobo
  - mandó ejecutar a Jacobo
  rationale: ἀνεῖλεν comunica la muerte causada; el contexto puede sugerir una acción oficial, pero el versículo por sí solo no obliga a precisarla. Esta redacción preserva esa tensión y evita resolverla en una dirección que el griego no exige.
  doctrine_reference: 'Translation philosophy: primacía del original; preservar la tensión textual en vez de resolverla sin necesidad.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y el criterio POB en inglés: verbo de muerte directo, conector narrativo simple y frase instrumental concreta. Se conserva la ambigüedad del tipo de muerte en la nota, sin introducir en el cuerpo una especificación jurídica no explícita.'
  spanish_consistency_notes:
  - Se usa «Y» para δέ como conector narrativo neutral.
  - Se emplea «Jacobo» para Ἰάκωβος, manteniendo consistencia nominal con la forma tradicional correspondiente al griego.
  - «Con la espada» preserva el valor instrumental del dativo de μαχαίρῃ.
  - La nota mantiene la alternativa de ejecución porque el audit trail inglés la documenta como posibilidad contextual.
