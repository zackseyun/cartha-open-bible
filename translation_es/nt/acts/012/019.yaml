translation:
  language: es
  text: Pero Herodes, después de buscarlo y no encontrarlo, examinó a los guardias y ordenó que fueran llevados[a] a la ejecución. Luego descendió de Judea a Cesarea y permaneció allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «ordenó que fueran llevados». En este contexto, probablemente significa que fueron llevados para ejecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιζητήσας
  english_pob_choice: after searching for
  chosen_spanish: después de buscarlo
  alternatives_spanish:
  - después de buscarlo intensamente
  - habiéndolo buscado
  lexicon: BDAG
  rationale: El aoristo participial expresa una acción previa a la principal. En español, «después de buscarlo» comunica la secuencia y el esfuerzo de la búsqueda sin volver más fuerte de lo que el griego exige.
- source_word: μὴ εὑρὼν
  english_pob_choice: not finding
  chosen_spanish: y no encontrarlo
  alternatives_spanish:
  - y no habiéndolo encontrado
  - y al no encontrarlo
  lexicon: BDAG
  rationale: La coordinación con el participio anterior se conserva con una construcción natural en español. «No encontrarlo» mantiene el fracaso de la búsqueda con claridad y sobriedad.
- source_word: ἀνακρίνας
  english_pob_choice: examined
  chosen_spanish: examinó
  alternatives_spanish:
  - interrogó
  - cuestionó
  lexicon: BDAG
  rationale: «Examinó» conserva el sentido de indagación oficial o judicial sin reducirlo necesariamente a una simple conversación; en este contexto Herodes investiga a los guardias como responsables.
- source_word: φύλακας
  english_pob_choice: guards
  chosen_spanish: a los guardias
  alternatives_spanish:
  - a los vigilantes
  - a los centinelas
  lexicon: BDAG
  rationale: «Guardias» es el equivalente más claro y natural en español para quienes custodiaban a Pedro, y mantiene el tono narrativo sin tecnicismos innecesarios.
- source_word: ἐκέλευσεν ἀπαχθῆναι
  english_pob_choice: ordered them to be led away to execution
  chosen_spanish: ordenó que fueran llevados para ejecución
  alternatives_spanish:
  - ordenó que los llevaran para ejecución
  - ordenó que fueran llevados
  - ordenó que fueran conducidos a la muerte
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «ser llevados/arrastrados», pero el contexto implica una pena capital. «Para ejecución» explicita ese sentido idiomático sin perder la imagen básica del ser llevados.
- source_word: κατελθὼν
  english_pob_choice: he went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo conserva el idioma geográfico de desplazamiento desde Judea hacia la costa. «Descendió» mantiene la dirección implícita del griego y suena natural en español bíblico contemporáneo.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  lexicon: BDAG
  rationale: Nombre geográfico estándar. No requiere adaptación adicional.
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesarea Marítima
  lexicon: BDAG
  rationale: Se usa el topónimo convencional en español. «Cesarea Marítima» sería más descriptivo, pero el griego y el inglés POB usan la forma breve.
- source_word: διέτριβεν
  english_pob_choice: stayed there
  chosen_spanish: permaneció allí
  alternatives_spanish:
  - se quedó allí
  - pasó allí un tiempo
  lexicon: BDAG
  rationale: El imperfecto indica permanencia continua. «Permaneció allí» refleja bien la duración sin introducir matices extra no presentes en el texto.
theological_decisions:
- issue: Si explicitar o no la pena implícita en ἀπαχθῆναι
  english_pob_reading: ordered them to be led away to execution
  chosen_spanish_reading: ordenó que fueran llevados para ejecución
  alternative_spanish_readings:
  - ordenó que fueran llevados
  - ordenó que los llevaran a la muerte
  rationale: El griego no usa un verbo común de matar, pero en el marco narrativo la consecuencia probable es la ejecución de los guardias. La traducción hace explícito ese sentido idiomático para evitar ambigüedad, manteniendo el verbo de movimiento subyacente.
  doctrine_reference: Translation philosophy §1, §6
- issue: Conservar el idiomático «descendió de Judea» en vez de normalizarlo demasiado
  english_pob_reading: he went down from Judea to Caesarea
  chosen_spanish_reading: descendió de Judea a Cesarea
  alternative_spanish_readings:
  - bajó de Judea a Cesarea
  - partió de Judea hacia Cesarea
  rationale: La geografía bíblica y el verbo griego expresan un movimiento de descenso desde el interior montañoso hacia la costa. Se mantiene la imagen espacial para preservar la textura del original.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se cotejó el griego SBLGNT, la tabla morfológica y la auditoría inglesa POB. La redacción española sigue la lectura óptima ya validada por el control de revisión, sin cambios sustantivos respecto al sentido identificado en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - «Judea» y «Cesarea» se conservan como topónimos estándar.
  - Se prefiere «examinó» para ἀνακρίνας por su amplitud judicial y «guardias» para φύλακας por claridad contemporánea.
  - La nota al pie marca la ambigüedad idiomática de ἀπαχθῆναι sin sobrescribirla en el texto principal.
