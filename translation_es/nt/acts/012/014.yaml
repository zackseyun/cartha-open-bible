review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa del griego: reconoce la voz, no abre por alegría, entra corriendo e informa que Pedro está al otro lado de la entrada. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría POB: πυλών se ha aplanado como «puerta» en vez de una entrada exterior tipo «portón/puerta exterior», y las notas al pie quedaron invertidas respecto del modelo inglés: la nota inglesa a trata de πυλών, mientras que la b trata de la construcción literal «reportó a Pedro estar de pie delante del portón».'
  spanish_quality_summary: El español es claro y legible, pero «por causa de su alegría» suena algo rígido; «de tanta alegría» o «a causa de su alegría» sería más natural. «Anunció» no es incorrecto, pero «informó» o «avisó» refleja mejor ἀπήγγειλεν en este contexto narrativo. «Estaba de pie» es fiel al valor estativo, aunque en español bíblico natural también cabe «estaba allí».
  glossary_alignment: 'No hay términos teológicos sensibles en juego. Sí hay una cuestión léxica de proyecto: πυλών en este contexto debe conservar la idea de acceso exterior a la propiedad. «Portón» encaja mejor que «puerta». También deben preservarse las alternativas significativas en notas con anclajes correctos y sin crear notas nuevas ambiguas.'
  issues:
  - severity: high
    issue: πυλών / πυλῶνος se tradujo como «puerta»
    rationale: La auditoría inglesa documenta explícitamente «gate» con alternativas «gateway/outer door», es decir, la entrada exterior a la propiedad. «Puerta» en español puede sonar a puerta interior y pierde el matiz espacial del acceso desde la calle.
  - severity: high
    issue: Las notas al pie no corresponden a los mismos puntos semánticos que en la auditoría inglesa
    rationale: La nota [a] del inglés explica πυλών, pero en el borrador español [a] se puso sobre «voz». La nota [b] del inglés da la alternativa literal «reported Peter to be standing before the gate», pero en el borrador español [b] se usa para πυλών. Esto rompe la trazabilidad de la auditoría.
  - severity: medium
    issue: «por causa de su alegría» suena poco idiomático
    rationale: Es fiel al valor causal de ἀπὸ τῆς χαρᾶς, pero en español más natural conviene «de tanta alegría» o «a causa de su alegría».
  - severity: medium
    issue: «anunció» es menos preciso que «informó/avisó» para ἀπήγγειλεν
    rationale: ἀπαγγέλλω aquí es reportar o informar dentro de la narración; «anunció» puede sonar más solemne o proclamatorio de lo que pide el contexto doméstico.
  revised_spanish_text: Y al reconocer la voz de Pedro, de tanta alegría no abrió el portón[a], sino que entró corriendo e informó[b] que Pedro estaba de pie delante del portón.
  revised_footnotes:
  - marker: a
    text: O «entrada» o «puerta exterior» para πυλών, refiriéndose al acceso desde la calle a la propiedad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «informó que Pedro estaba de pie delante del portón».
    reason: lexical_alternative
  revision_rationale: Se corrigió πυλών a «portón» para preservar la idea de entrada exterior; se recolocaron y rehicieron las notas para que coincidan con la auditoría POB; se mejoró la naturalidad de la causa con «de tanta alegría» y se ajustó ἀπήγγειλεν a «informó», más adecuado al contexto narrativo sin perder dignidad.
