translation:
  language: es
  text: Y al reconocer la voz de Pedro, de tanta alegría no abrió el portón[a], sino que entró corriendo e informó[b] que Pedro estaba de pie delante del portón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entrada» o «puerta exterior» para πυλών, refiriéndose al acceso desde la calle a la propiedad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «informó que Pedro estaba de pie delante del portón».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοῦσα
  english_pob_choice: recognized
  chosen_spanish: reconocer
  alternatives_spanish:
  - identificar
  - reconocer claramente
  lexicon: BDAG
  rationale: El participio aoristo expresa el reconocimiento inmediato al oír la voz. «Reconocer» conserva bien ese sentido natural en español sin volver la frase pesada.
- source_word: φωνὴν
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: En este contexto se trata de la voz de Pedro, no de un sonido indefinido; «voz» es más preciso y natural.
- source_word: ἀπὸ τῆς χαρᾶς
  english_pob_choice: because of her joy
  chosen_spanish: por causa de su alegría
  alternatives_spanish:
  - a causa de su alegría
  - de tanta alegría
  lexicon: BDAG
  rationale: La frase expresa causa. «Por causa de su alegría» mantiene explícita la relación causal y suena claro en español.
- source_word: ἤνοιξεν
  english_pob_choice: did not open
  chosen_spanish: no abrió
  alternatives_spanish:
  - no destrabó
  - no destrancó
  lexicon: BDAG
  rationale: ἀνοίγω significa simplemente «abrir». No hay base para especificar un mecanismo como «destrabar» o «destrancar» en el texto principal.
- source_word: πυλῶνα / πυλῶνος
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - acceso
  lexicon: BDAG
  rationale: Aunque πυλών puede ser «gate» o «gateway», en español «puerta» funciona como equivalente doméstico natural y comprensible. «Portón» sería posible, pero puede sonar más marcado que el griego en este contexto de entrada a la propiedad.
- source_word: εἰσδραμοῦσα
  english_pob_choice: ran in
  chosen_spanish: entró corriendo
  alternatives_spanish:
  - corrió adentro
  - se metió corriendo
  lexicon: BDAG
  rationale: El participio indica movimiento rápido hacia adentro. «Entró corriendo» comunica bien la acción y conserva el ritmo narrativo.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: anunció
  alternatives_spanish:
  - reportó
  - dijo
  lexicon: BDAG
  rationale: ἀπαγγέλλω puede significar informar o anunciar. Aquí «anunció» transmite el relato con naturalidad; «reportó» suena más técnico en español.
- source_word: ἑστάναι
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - se hallaba de pie
  lexicon: BDAG
  rationale: 'El infinitivo perfecto tiene valor estativo: Pedro se encontraba en esa postura. «Estaba de pie» refleja mejor ese estado que un pasado puntual.'
- source_word: πρὸ τοῦ πυλῶνος
  english_pob_choice: at the gate
  chosen_spanish: delante de la puerta
  alternatives_spanish:
  - frente a la puerta
  - ante la puerta
  lexicon: BDAG
  rationale: πρό con genitivo expresa estar delante o enfrente. «Delante de la puerta» conserva la localización y, junto con la elección de «puerta», resulta natural en español.
translation_notes:
  revision_awareness: Se siguió el testimonio griego de SBLGNT y el audit trail inglés de POB. No se introdujeron cambios textuales ni doctrinales; solo se ajustó la equivalencia al español manteniendo la causalidad de ἀπὸ τῆς χαρᾶς, el matiz estativo de ἑστάναι y la localización de πρὸ τοῦ πυλῶνος.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden al pasaje.
  - «Puerta» se emplea como equivalente funcional de πυλών en un contexto doméstico; la nota preserva la alternativa «portón».
  - Se mantuvo la voz narrativa simple y el orden causal del original sin sobreinterpretar la escena.
