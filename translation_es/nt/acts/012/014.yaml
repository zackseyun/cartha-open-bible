- from: Y al reconocer la voz de Pedro[a], por causa de su alegría no abrió la puerta[b], sino que entró corriendo y anunció que Pedro estaba de pie delante de la puerta.
  to: Y al reconocer la voz de Pedro, de tanta alegría no abrió el portón[a], sino que entró corriendo e informó[b] que Pedro estaba de pie delante del portón.
  rationale: Se corrigió πυλών a «portón» para preservar la idea de entrada exterior; se recolocaron y rehicieron las notas para que coincidan con la auditoría POB; se mejoró la naturalidad de la causa con «de tanta alegría» y se ajustó ἀπήγγειλεν a «informó», más adecuado al contexto narrativo sin perder dignidad.
