    text: Or 'gateway' or 'outer door' for 'gate' (πυλών), referring to the entrance from the street into the property.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'reported Peter to be standing before the gate.'
    reason: lexical_alternative
