translation:
  language: es
  text: Pero Bernabé y Saulo regresaron a Jerusalén[a], después de haber cumplido el ministerio, llevando consigo a Juan, llamado Marcos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «de Jerusalén» en lugar de «a Jerusalén».
    reason: textual_variant
lexical_decisions:
- source_word: Βαρναβᾶς ... καὶ Σαῦλος
  english_pob_choice: Barnabas and Saul
  chosen_spanish: Bernabé y Saulo
  alternatives_spanish:
  - Barnabas y Saulo
  - Bernabé y Pablo
  lexicon: BDAG; nombres propios en tradición bíblica
  rationale: Se conserva el nombre hebraico-araméico españolizado 'Bernabé' y el nombre 'Saulo' como en el griego y en el audit trail inglés. No se adelanta la forma 'Pablo' porque aquí el texto base dice Σαῦλος.
- source_word: ὑπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: '''Regresaron'' expresa con naturalidad el valor de retorno de ὑποστρέφω en español moderno y suena adecuado en estilo bíblico formal.'
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - a Jerusalén desde
  - de Jerusalén
  lexicon: BDAG
  rationale: El texto griego dado lee εἰς, que normalmente significa 'a/para'. En español, la frase principal se mantiene así; el posible valor alterno del testimonio manuscrito se documenta en nota textual.
- source_word: πληρώσαντες τὴν διακονίαν
  english_pob_choice: after completing the ministry
  chosen_spanish: después de haber cumplido el ministerio
  alternatives_spanish:
  - después de haber terminado el servicio
  - habiendo cumplido el servicio
  lexicon: BDAG
  rationale: 'Se conserva el participio aoristo con una subordinada temporal: ''después de haber cumplido''. ''Ministerio'' refleja διακονία, como en el audit trail inglés, sin reducirlo a una mera tarea.'
- source_word: διακονίαν
  english_pob_choice: the ministry
  chosen_spanish: el ministerio
  alternatives_spanish:
  - el servicio
  - la ayuda
  lexicon: BDAG
  rationale: '''Ministerio'' es el equivalente más natural en español eclesial para διακονία en este contexto, manteniendo la amplitud del término sin especificarlo más de lo que el griego exige.'
- source_word: συμπαραλαβόντες
  english_pob_choice: taking along
  chosen_spanish: llevando consigo
  alternatives_spanish:
  - tomando consigo
  - trayendo consigo
  lexicon: BDAG
  rationale: '''Llevando consigo'' reproduce el matiz de acompañamiento y de incorporación al viaje o traslado de manera idiomática en español.'
- source_word: τὸν ἐπικληθέντα Μᾶρκον
  english_pob_choice: who was called Mark
  chosen_spanish: llamado Marcos
  alternatives_spanish:
  - a quien llamaban Marcos
  - que era llamado Marcos
  lexicon: BDAG
  rationale: El participio pasivo de ἐπικαλέω se vierte con 'llamado'. Se evita ampliar con 'también' porque no está explícito en el griego.
theological_decisions:
- issue: Variación textual en la dirección del desplazamiento
  english_pob_reading: The English audit trail noted the manuscript variant 'from Jerusalem' but the source packet supplied εἰς Ἰερουσαλήμ ('to Jerusalem').
  chosen_spanish_reading: a Jerusalén, con nota sobre la variante 'de Jerusalén'
  alternative_spanish_readings:
  - de Jerusalén
  - desde Jerusalén
  rationale: Dado que el paquete de fuente primaria entregado aquí contiene εἰς Ἰερουσαλήμ, la redacción principal sigue el griego proporcionado. Para no borrar la tensión textual documentada por el audit trail, se añade una nota que registra la variante manuscrita contraria.
  doctrine_reference: §1 Primacía del original y documentación transparente de variantes textuales; §3 preservar tensiones textuales relevantes en vez de resolverlas silenciosamente.
translation_notes:
  revision_awareness: El audit trail inglés tuvo una revisión posterior que cambió 'to Jerusalem' por 'from Jerusalem' para reflejar la lectura probablemente original y el contexto narrativo. Sin embargo, el paquete fuente aquí entregado presenta εἰς Ἰερουσαλήμ; por eso esta versión española sigue el texto griego provisto y documenta la variante manuscrita en nota, sin ocultar la divergencia del historial editorial.
  spanish_consistency_notes:
  - Se mantiene 'Bernabé' como forma española estándar del nombre Βαρναβᾶς.
  - '''Ministerio'' conserva el valor amplio de διακονία y evita especificar innecesariamente el tipo de servicio.'
  - Se evita introducir 'Pablo' por coherencia con Σαῦλος en el texto fuente.
  - La nota textual usa una formulación breve y clara, acorde con el estilo transparente del proyecto.
