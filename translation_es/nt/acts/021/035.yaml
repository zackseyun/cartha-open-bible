  source_alignment_summary: 'El borrador refleja bien la estructura temporal y causal del griego: «Cuando llegó…» para ὅτε δὲ + ἐγένετο ἐπὶ, y «debido a la violencia de la multitud» para διὰ τὴν βίαν τοῦ ὄχλου. Sin embargo, «los soldados lo llevaban» debilita un rasgo importante de βαστάζεσθαι αὐτὸν ὑπὸ τῶν στρατιωτῶν: el griego expresa que él era cargado/llevado por los soldados, no simplemente acompañado o conducido. En español, «lo llevaban» puede sonar demasiado amplio. Conviene explicitar «tenía que ser llevado» o «era llevado/cargado» para preservar mejor la pasiva resultante y la fuerza contextual señalada por la nota inglesa.'
  spanish_quality_summary: El español es natural y claro, pero puede afinarse. «Escalones» es entendible, aunque «gradas» o «escalera» suena más idiomático para una subida a un cuartel; no obstante, «escalones» sigue siendo aceptable con nota. El principal problema de legibilidad/fidelidad es «los soldados lo llevaban», que en español moderno no comunica con suficiente claridad que lo iban cargando por la presión violenta de la multitud.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La terminología general está alineada. La única decisión léxica relevante es mantener una expresión española que represente adecuadamente la pasiva de βαστάζεσθαι y la necesidad implícita documentada por el POB inglés.
