    rationale: βαστάζεσθαι indica que Pablo estaba siendo llevado/cargado por los soldados; «lo llevaban» puede entenderse como simplemente conducirlo. El contexto y la nota inglesa permiten una formulación que exprese mejor la necesidad resultante.
  - severity: low
    issue: La nota [a] combina dos funciones distintas
    rationale: La evidencia inglesa separa la alternativa lexical/gramatical sobre «had to be carried» y la nota contextual sobre «the steps». En español conviene conservar una nota contextual sobre «los escalones» y una nota aparte para la alternativa de necesidad.
  revised_spanish_text: Cuando llegó a los escalones[a], sucedió que tenía que ser llevado por los soldados debido a la violencia de la multitud.
