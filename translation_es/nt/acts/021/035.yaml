translation:
  language: es
  text: Cuando llegó a los escalones[a], sucedió que tenía que ser llevado por los soldados debido a la violencia de la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la escalera». El griego puede referirse al tramo de escalones o escalinata que subía al cuartel romano (cf. Hch 21:34, 37).'
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅτε introduce una cláusula temporal; δέ añade una transición suave. En español, «Cuando» conserva la relación temporal sin recargar el estilo.
- source_word: ἐγένετο ἐπὶ τοὺς ἀναβαθμούς
  english_pob_choice: he came to the steps
  chosen_spanish: llegó a los escalones
  alternatives_spanish:
  - llegó a los peldaños
  - subió hasta los escalones
  - llegó a la escalera
  lexicon: BDAG
  rationale: γίνομαι con ἐπί + acusativo expresa llegada o alcance de un lugar. «Llegó a» comunica bien esa idea en español. «Escalones» refleja el sentido de ἀναβαθμοί como peldaños o tramo de escaleras, en un registro natural.
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió que
  alternatives_spanish:
  - ocurrió que
  - pasó que
  lexicon: BDAG
  rationale: συμβαίνω introduce aquí una circunstancia resultante. «Sucedió que» mantiene el valor narrativo y el matiz de acontecimiento.
- source_word: βαστάζεσθαι
  english_pob_choice: was being carried
  chosen_spanish: lo llevaban
  alternatives_spanish:
  - era llevado
  - estaba siendo llevado
  - tenían que llevarlo
  lexicon: BDAG
  rationale: El infinitivo pasivo presente indica acción en curso. En español, «lo llevaban» conserva la idea de proceso y evita una forma excesivamente pesada. No se pierde el trasfondo de necesidad, que el contexto ya sugiere.
- source_word: ὑπὸ τῶν στρατιωτῶν
  english_pob_choice: by the soldiers
  chosen_spanish: los soldados
  alternatives_spanish:
  - por los soldados
  - por la tropa
  lexicon: BDAG
  rationale: La pasiva en español admite un orden natural donde el agente puede aparecer como sujeto léxico en una construcción activa. Aquí «los soldados lo llevaban» es más fluido que una pasiva explícita y mantiene el agente claramente identificado.
- source_word: διὰ τὴν βίαν
  english_pob_choice: because of the violence
  chosen_spanish: debido a la violencia
  alternatives_spanish:
  - a causa de la violencia
  - por la fuerza
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Violencia» es la mejor equivalencia contextual para βία en este episodio de disturbio; «fuerza» quedaría más ambigua en español.
- source_word: τοῦ ὄχλου
  english_pob_choice: of the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - de la gente
  - de la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «Multitud» es claro, neutral y suficientemente cercano al griego; deja que «violencia» exprese el carácter hostil del grupo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail en inglés: conserva la secuencia temporal, la llegada a los ἀναβαθμοί, el carácter resultativo de συνέβη y la causa expresada por διὰ τὴν βίαν. No se observaron cambios en la última revisión del POB inglés; el pasaje fue considerado de alta concordancia con solo matices menores.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras convenciones no pertinentes; no hay términos divinos en este versículo.
  - Se prefirió «multitud» sobre «muchedumbre» para mantener un registro natural y neutral.
  - La voz pasiva griega se resolvió con una construcción activa española para mayor fluidez, sin alterar el sentido de que los soldados eran el agente de la acción.
