translation:
  language: es
  text: Y algunos de los discípulos de Cesarea también fueron con nosotros[a], llevándonos a un tal Mnasón de Chipre, un discípulo de larga data[b], con quien nos hospedaríamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acompañándonos», «conduciéndonos a Mnasón …», o «llevándonos a la casa de Mnasón». El participio griego y el verbo de hospedaje pueden entenderse de maneras ligeramente distintas pero estrechamente relacionadas.
    reason: lexical_alternative
  - marker: b
    text: O «uno de los primeros discípulos». La expresión puede significar que Mnasón era discípulo desde hacía mucho tiempo, quizá desde los primeros días del movimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆλθον
  english_pob_choice: went with
  chosen_spanish: fueron con nosotros
  alternatives_spanish:
  - acompañaron
  - vinieron con nosotros
  lexicon: BDAG
  rationale: El verbo expresa acompañamiento en el viaje; «fueron con nosotros» conserva el movimiento sin forzar una calca. Mantiene el tono narrativo de desplazamiento conjunto.
- source_word: τῶν μαθητῶν
  english_pob_choice: the disciples
  chosen_spanish: de los discípulos
  alternatives_spanish:
  - de los seguidores
  - de los alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal de μαθηταί en el NT y conserva la referencia técnica del grupo cristiano.
- source_word: ἀπὸ Καισαρείας
  english_pob_choice: from Caesarea
  chosen_spanish: de Cesarea
  alternatives_spanish:
  - procedentes de Cesarea
  lexicon: BDAG
  rationale: La frase de origen/lugar se reproduce de manera directa y natural en español.
- source_word: σὺν ἡμῖν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: BDAG
  rationale: Equivale de forma simple y transparente a la idea de acompañamiento.
- source_word: ἄγοντες
  english_pob_choice: bringing us to
  chosen_spanish: llevándonos a
  alternatives_spanish:
  - guiándonos a
  - conduciéndonos a
  lexicon: BDAG
  rationale: El participio describe la acción mediante la cual nos acompañaban hasta la casa del hospedador; «llevándonos a» comunica bien la idea de conducción hacia un destino de hospedaje.
- source_word: παρ’ ᾧ ξενισθῶμεν
  english_pob_choice: with whom we were to stay
  chosen_spanish: con quien nos hospedaríamos
  alternatives_spanish:
  - en cuya casa nos alojaríamos
  - con quien debíamos alojarnos
  lexicon: BDAG
  rationale: ξενίζω aquí tiene el sentido de recibir como huésped/proveer hospedaje. «Hospedarnos» es español natural y preserva la relación de hospitalidad sin imponer una formulación más interpretativa.
- source_word: Μνάσωνί τινι
  english_pob_choice: a certain Mnason
  chosen_spanish: Mnasón, un cierto hombre
  alternatives_spanish:
  - Mnasón, una persona
  - Mnasón, un hombre
  lexicon: BDAG
  rationale: Se conserva el matiz indefinido de τινι. «Un cierto hombre» refleja el valor aproximado de «a certain» sin perder la referencia a una persona concreta. Se usa nombre propio adaptado a la ortografía española.
- source_word: Κυπρίῳ
  english_pob_choice: Cypriot
  chosen_spanish: de Chipre
  alternatives_spanish:
  - chipriota
  lexicon: BDAG
  rationale: Aunque «chipriota» sería posible, «de Chipre» reproduce con más transparencia la procedencia y suena más natural junto al nombre propio en este contexto.
- source_word: ἀρχαίῳ μαθητῇ
  english_pob_choice: an early disciple
  chosen_spanish: un discípulo antiguo
  alternatives_spanish:
  - un discípulo de larga data
  - un discípulo desde antiguo
  lexicon: BDAG
  rationale: ἀρχαῖος puede indicar antigüedad/longa data. «Discípulo antiguo» conserva la tensión temporal sin decidir demasiado entre «de los primeros» y «de larga data». Se mantiene el sentido descriptivo, no doctrinal.
theological_decisions:
- issue: Sentido de ἀρχαίῳ μαθητῇ
  english_pob_reading: an early disciple
  chosen_spanish_reading: un discípulo antiguo
  alternative_spanish_readings:
  - un discípulo de larga data
  - uno de los primeros discípulos
  rationale: La frase no carga una afirmación doctrinal; describe la antigüedad de la condición de discípulo de Mnasón. «Discípulo antiguo» preserva la ambigüedad entre antigüedad cronológica y pertenencia temprana al movimiento, sin resolverla en exceso.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión cuando el griego permite más de una lectura compatible'
translation_notes:
  revision_awareness: El contexto inglés revisado prefirió «a certain Mnason of Cyprus» sobre una colocación más rígida, manteniendo «early disciple» y la idea de hospedaje; el español sigue esa alineación sintáctica y conserva la misma ambigüedad temporal en ἀρχαίῳ μαθητῇ.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί conforme al uso del NT.
  - «Hospedarnos» traduce el campo semántico de ξενίζω sin recurrir a un giro arcaizante.
  - Se eligió «de Chipre» para Κυπρίῳ por naturalidad española y claridad de procedencia.
  - «Discípulo antiguo» preserva la tensión entre antigüedad y pertenencia temprana, en línea con la política de no resolver de más el griego.
