  text: συνῆλθον δὲ καὶ τῶν μαθητῶν ἀπὸ Καισαρείας σὺν ἡμῖν, ἄγοντες παρ’ ᾧ ξενισθῶμεν Μνάσωνί τινι Κυπρίῳ, ἀρχαίῳ μαθητῇ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/016.yaml
  text: And some of the disciples from Caesarea also went with us[a], bringing us to a certain Mnason of Cyprus, an early disciple[b], with whom we were to stay.
  footnotes:
  - marker: a
    text: Or 'leading us to Mnason … with whom we might lodge' or 'taking us to the house of Mnason.' The Greek participle and lodging verb can be understood in slightly different but closely related ways.
    reason: lexical_alternative
  - marker: b
    text: Or 'a longtime disciple.' The phrase may mean that Mnason had been a disciple for a long time, possibly from the early days of the movement.
    reason: lexical_alternative
