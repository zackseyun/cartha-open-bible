translation:
  language: es
  text: 'Cuando oyeron esto[a], glorificaron a Dios, y le dijeron: «Ves, hermano, cuántas miríadas[b] hay entre los judíos[c] que han creído, y todos son celosos de la ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al oír esto».
    reason: lexical_alternative
  - marker: b
    text: O «cuántas decenas de millares». El griego μυριάδες puede designar unidades de diez mil o, de manera más general, un número muy grande.
    reason: lexical_alternative
  - marker: c
    text: O «entre los judeanos», si se toma en sentido geográfico más que étnico-religioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: Cuando oyeron esto
  alternatives_spanish:
  - Al oír esto
  - Cuando lo oyeron
  lexicon: BDAG
  rationale: El participio aoristo expresa acción temporal previa; en español, «cuando» reproduce bien la relación temporal. «Esto» conserva el objeto implícito del contexto inmediato, como en el audit trail inglés.
- source_word: ἐδόξαζον
  english_pob_choice: they glorified
  chosen_spanish: glorificaban
  alternatives_spanish:
  - glorificaron
  - daban gloria a
  lexicon: BDAG
  rationale: «Glorificar» mantiene el peso teológico de δοξάζω respecto de Dios. El imperfecto español «glorificaban» puede reflejar el valor imperfectivo narrativo del griego en este contexto.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - a Dios
  lexicon: BDAG
  rationale: Objeto directo de ἐδόξαζον; «Dios» es la equivalencia directa y natural en español.
- source_word: εἶπόν τε
  english_pob_choice: and they said
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y dijeron
  - entonces le dijeron
  lexicon: BDAG
  rationale: La coordinación narrativa se expresa de forma natural con «y». El dativo αὐτῷ se vierte con «le» para mantener la referencia a Pablo sin añadir más de lo que el griego demanda.
- source_word: Θεωρεῖς
  english_pob_choice: You see
  chosen_spanish: Ves
  alternatives_spanish:
  - Observas
  - Ya ves
  lexicon: BDAG
  rationale: El presente indicativo retórico dirige la atención de Pablo; «Ves» es idiomático y cercano al valor del griego.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano mío
  - amigo
  lexicon: BDAG
  rationale: Vocativo fraternal cristiano; «hermano» conserva la forma de dirección y el tono de camaradería del texto.
- source_word: πόσαι μυριάδες
  english_pob_choice: how many myriads
  chosen_spanish: cuántas miríadas
  alternatives_spanish:
  - cuántos millares
  - cuántas decenas de millares
  lexicon: BDAG
  rationale: Se conserva el valor enfático de μυριάδες con «miríadas», como hizo la revisión inglesa al preferir la cercanía formal. «Cuántas miríadas» preserva el término de gran número sin reducirlo a una cifra más interpretativa.
- source_word: ἐν τοῖς Ἰουδαίοις
  english_pob_choice: among the Jews
  chosen_spanish: entre los judíos
  alternatives_spanish:
  - entre los judeanos
  lexicon: BDAG
  rationale: El contexto apunta al grupo étnico-religioso judío; «entre los judíos» reproduce esa referencia de manera clara y corriente en español. Se mantiene la posibilidad alternativa «judeanos» como matiz contextual, pero no es necesaria aquí.
- source_word: τῶν πεπιστευκότων
  english_pob_choice: who have believed
  chosen_spanish: que han creído
  alternatives_spanish:
  - que son creyentes
  - que han llegado a creer
  lexicon: BDAG
  rationale: El participio perfecto indica personas que llegaron a creer y siguen en ese estado; «que han creído» preserva bien el valor verbal sin convertirlo en un sustantivo.
- source_word: ζηλωταὶ
  english_pob_choice: zealous
  chosen_spanish: celosos
  alternatives_spanish:
  - zelosos
  - ardientes
  lexicon: BDAG
  rationale: En español bíblico, «celosos» puede expresar fervor intenso por algo; aquí reproduce el sustantivo/adjetivo de compromiso fuerte con la ley. «Zelosos» sería más cercano etimológicamente, pero menos natural para muchos lectores.
- source_word: τοῦ νόμου
  english_pob_choice: for the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - por la ley
  - de la Ley
  - de la Torá
  lexicon: BDAG
  rationale: El genitivo griego admite la relación de pertenencia/adhesión; en español «celosos de la ley» expresa bien la orientación del celo. Se evita introducir «Torá» sin necesidad textual.
- source_word: ὑπάρχουσιν
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - se hallan
  lexicon: BDAG
  rationale: ὑπάρχω funciona aquí casi como cópula; «son» conserva la afirmación simple del predicado sin añadir matices ajenos.
theological_decisions:
- issue: Valor de μυριάδες
  english_pob_reading: how many myriads
  chosen_spanish_reading: cuántas miríadas
  alternative_spanish_readings:
  - cuántas decenas de millares
  - cuántos millares
  rationale: El griego μυριάδες puede señalar la unidad de diez mil o, más ampliamente, un número enorme. En español, «miríadas» preserva mejor la fuerza cuantitativa enfática y la tensión lexical que la versión inglesa decidió mantener en la revisión.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia de ἐν τοῖς Ἰουδαίοις
  english_pob_reading: among the Jews
  chosen_spanish_reading: entre los judíos
  alternative_spanish_readings:
  - entre los judeanos
  rationale: El pasaje habla de creyentes dentro del pueblo judío, no meramente de habitantes de Judea. «Judíos» conserva la identidad social y religiosa del grupo tal como lo entendió el audit trail inglés.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente revirtió una paráfrasis de «thousands» a «myriads» para acercarse a μυριάδες; esta propuesta española sigue esa decisión manteniendo «miríadas» y evitando rebajar el término a una cifra más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν, conforme al estándar del proyecto.
  - Se conserva «ley» para νόμος, sin sustituirla por «Torá», porque el contexto de Hechos 21:20 enfatiza la observancia mosaica de manera comprensible para lectores generales.
  - El plural verbal «glorificaban» refleja el imperfecto griego y su valor narrativo continuo, mientras que el resto de la cláusula sigue una sintaxis española natural.
  - Se evita «SEÑOR» o equivalentes de máscara para el nombre divino, porque aquí el texto griego usa θεόν y no κύριος.
