  text: οἱ δὲ ἀκούσαντες ἐδόξαζον τὸν ⸀θεόν, ⸂εἶπόν τε⸃ αὐτῷ· Θεωρεῖς, ἀδελφέ, πόσαι μυριάδες εἰσὶν ⸂ἐν τοῖς Ἰουδαίοις⸃ τῶν πεπιστευκότων, καὶ πάντες ζηλωταὶ τοῦ νόμου ὑπάρχουσιν·
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/020.yaml
  text: When they heard this[a], they glorified God, and they said to him, “You see, brother, how many myriads there are among the Jews who have believed[b], and they are all zealous for the law.”
  footnotes:
  - marker: a
    text: Or “how many tens of thousands.” The Greek μυριάδες can denote units of ten thousand or, more generally, a very large number.
    reason: lexical_alternative
  - marker: b
    text: Or “among the Judeans,” if taken geographically rather than ethnically/religiously.
    reason: lexical_alternative
