translation:
  language: es
  text: Después de despedirnos unos de otros[a], subimos al barco, y ellos regresaron a sus casas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos despedimos unos de otros». La expresión griega puede denotar saludo o despedida; el contexto de partida favorece el sentido de despedida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a sus propias cosas/lugares», un modismo que puede significar «a sus casas» o «a su propio lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπησπασάμεθα ἀλλήλους
  english_pob_choice: had said farewell to one another
  chosen_spanish: despedirnos unos de otros
  alternatives_spanish:
  - tomamos leave unos de otros
  - nos saludamos unos a otros
  - nos despedimos unos de otros
  lexicon: BDAG
  rationale: El contexto es de partida, así que el valor de despedida debe quedar claro. En español, 'despedirnos unos de otros' comunica ese matiz de separación mutua de manera natural y fiel, sin reducirlo a un simple saludo.
- source_word: ἐνέβημεν
  english_pob_choice: we boarded
  chosen_spanish: subimos
  alternatives_spanish:
  - abordamos
  - subimos a bordo
  - entramos
  lexicon: BDAG
  rationale: El verbo en este contexto expresa subir o embarcar en una embarcación. 'Subimos al barco' es idiomático en español y conserva el movimiento narrativo sin forzar una terminología demasiado técnica.
- source_word: πλοῖον
  english_pob_choice: ship
  chosen_spanish: barco
  alternatives_spanish:
  - navío
  - barca
  - buque
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por 'ship' por el contexto de viaje marítimo, en español 'barco' funciona bien como término general y natural. 'Buque' sería más técnico; 'barca' podría sonar demasiado pequeño o específico.
- source_word: ὑπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: El verbo significa volver o regresar. 'Regresaron' mantiene la simpleza narrativa y es claro en español contemporáneo.
- source_word: εἰς τὰ ἴδια
  english_pob_choice: to their own homes
  chosen_spanish: a lo suyo
  alternatives_spanish:
  - a sus propias casas
  - a sus lugares
  - a su casa
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente apunta a 'las cosas/lugares propios'. El inglés POB preserva la ambigüedad con una explicación a pie de página. En español, 'a lo suyo' conserva esa amplitud idiomática mejor que concretar demasiado 'a sus casas', aunque necesita nota para aclarar el sentido posible.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios respecto al estado de alta concordancia; esta propuesta mantiene ese criterio y solo adapta la redacción al español con claridad idiomática y fidelidad al griego.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y moderno, adecuado para el texto bíblico.
  - Se evita traducir mecánicamente desde el inglés cuando el español pide una construcción más natural.
  - La nota sobre εἰς τὰ ἴδια preserva la tensión entre literalidad idiomática y explicitación contextual, sin eliminar la ambigüedad documentada.
