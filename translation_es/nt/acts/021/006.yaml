    rationale: La nota inglesa principal sobre lexical_alternative en este versículo se centra en la despedida y en εἰς τὰ ἴδια, no en ἐνέβημεν. La nota actual sobre «entramos en el barco» es posible, pero no necesaria, y distrae del contraste más importante.
  - severity: medium
    issue: Las alternativas léxicas del registro incluyen formas poco naturales
    rationale: «tomamos leave unos de otros» es incorrecto; conviene alinear las decisiones léxicas y notas con español idiomático y con la lógica de la auditoría inglesa.
