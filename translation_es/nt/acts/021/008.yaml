translation:
  language: es
  text: Al día siguiente partimos y llegamos a Cesarea[a], y al entrar en la casa de Felipe el evangelista, que era uno de los siete, nos quedamos con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, uno de los siete hombres designados antes para el servicio en Jerusalén (véase Hechos 6:3–6).
    reason: cross_reference
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al día siguiente, entonces
  lexicon: BDAG
  rationale: La expresión griega es idiomática; en español, «Al día siguiente» transmite con naturalidad la secuencia narrativa sin volverla rígida ni excesivamente literal.
- source_word: ἐξελθόντες
  english_pob_choice: departed
  chosen_spanish: partimos
  alternatives_spanish:
  - salimos
  - nos fuimos
  lexicon: BDAG
  rationale: El participio marca que dejaron el lugar previo dentro del relato de viaje. «Partimos» conserva el movimiento y la primera persona plural del verbo principal griego de manera natural en español.
- source_word: ἤλθομεν εἰς Καισάρειαν
  english_pob_choice: came to Caesarea
  chosen_spanish: llegamos a Cesarea
  alternatives_spanish:
  - fuimos a Cesarea
  - arribamos a Cesarea
  lexicon: BDAG
  rationale: Con εἰς + acusativo, el sentido es de llegada al destino. «Llegamos a Cesarea» es la opción más clara y idiomática en español.
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesarea Marítima
  lexicon: BDAG
  rationale: Se conserva el nombre geográfico estándar en español. No se amplía en el texto principal porque el griego y el audit trail no requieren especificación adicional.
- source_word: εἰσελθόντες εἰς τὸν οἶκον
  english_pob_choice: entering the house
  chosen_spanish: al entrar en la casa
  alternatives_spanish:
  - habiendo entrado en la casa
  - cuando entramos en la casa
  lexicon: BDAG
  rationale: La construcción participial se vierte con una subordinación natural en español que mantiene la secuencia de acciones. «Casa» conserva el valor concreto de οἶκος sin neutralizarlo como «hogar».
- source_word: Φιλίππου
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: BDAG
  rationale: El nombre propio bíblico se adapta al uso español habitual como «Felipe», forma inteligible y estable en la tradición cristiana en español.
- source_word: τοῦ εὐαγγελιστοῦ
  english_pob_choice: the evangelist
  chosen_spanish: el evangelista
  alternatives_spanish:
  - el proclamador de las buenas noticias
  - el predicador del evangelio
  lexicon: BDAG
  rationale: «Evangelista» es el equivalente directo y reconocido de εὐαγγελιστής como designación ministerial/titular. Preserva el matiz de oficio o función sin expandir el término.
- source_word: ὄντος ἐκ τῶν ἑπτὰ
  english_pob_choice: who was one of the seven
  chosen_spanish: que era uno de los siete
  alternatives_spanish:
  - siendo uno de los siete
  - que pertenecía a los siete
  lexicon: BDAG
  rationale: La frase identifica a Felipe como perteneciente al grupo conocido como «los siete». «Que era uno de los siete» es claro, directo y no introduce un término eclesiástico no explicitado por el texto.
- source_word: ἐμείναμεν παρ’ αὐτῷ
  english_pob_choice: we stayed with him
  chosen_spanish: nos quedamos con él
  alternatives_spanish:
  - permanecimos con él
  - nos alojamos con él
  lexicon: BDAG
  rationale: En un contexto de hospitalidad y viaje, «nos quedamos con él» suena natural en español y preserva el sentido relacional de παρά + dativo sin añadir una precisión como «alojamos» que el griego no exige.
theological_decisions:
- issue: Identificación de Felipe como integrante de «los siete»
  english_pob_reading: Retain the historical designation 'who was one of the seven' without expanding its ecclesial significance.
  chosen_spanish_reading: Mantener «que era uno de los siete» sin desarrollar una lectura institucional o eclesiástica adicional.
  alternative_spanish_readings:
  - que era uno de los Siete
  - que pertenecía al grupo de los siete
  rationale: El texto remite históricamente a los siete nombrados en Hechos 6, pero el versículo no obliga a convertir la expresión en un título técnico ni a capitalizarla. La traducción conserva la referencia histórica sin resolver más de lo que el pasaje dice.
  doctrine_reference: Preservar la tensión histórica/textual sin importar afirmaciones doctrinales o eclesiológicas que el versículo no explicita.
translation_notes:
  revision_awareness: 'El texto se ajusta al patrón ya auditado en inglés: secuencia de viaje, identificación de Felipe como evangelista y referencia histórica a «los siete», sin añadir expansión interpretativa no requerida por el griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «evangelista» como término funcional establecido, en línea con la decisión inglesa auditada.
  - Se conserva la referencia histórica a «los siete» sin convertirla en un título eclesial formal.
  - La puntuación y el ritmo buscan naturalidad contemporánea sin perder la estructura narrativa del griego.
