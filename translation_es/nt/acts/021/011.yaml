    text: O «Así dice el Espíritu Santo» podría traducirse «Esto es lo que dice el Espíritu Santo».
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «cuyo cinturón es este».
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo reflexivo para expresar atadura real y preservar el acto profético del griego; se reemplazan las notas por las dos alternativas documentadas en el POB inglés y se anclan donde corresponde; se mejora la naturalidad con ‘los gentiles’ sin alterar el sentido.
