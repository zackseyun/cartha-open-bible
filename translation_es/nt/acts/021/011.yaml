  to: 'Y llegando a nosotros, y tomando el cinturón de Pablo, se ató los pies y las manos, y dijo[a]: «Así dice el Espíritu Santo[a]: “Al hombre de quien es este cinturón[b], así lo atarán en Jerusalén los judíos y lo entregarán en manos de los gentiles”».'
  rationale: Se corrige el verbo reflexivo para expresar atadura real y preservar el acto profético del griego; se reemplazan las notas por las dos alternativas documentadas en el POB inglés y se anclan donde corresponde; se mejora la naturalidad con ‘los gentiles’ sin alterar el sentido.
