translation:
  language: es
  text: 'Y llegando a nosotros, y tomando el cinturón de Pablo, se ató los pies y las manos, y dijo[a]: «Así dice el Espíritu Santo[a]: “Al hombre de quien es este cinturón[b], así lo atarán en Jerusalén los judíos y lo entregarán en manos de los gentiles”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así dice el Espíritu Santo» podría traducirse «Esto es lo que dice el Espíritu Santo».
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «cuyo cinturón es este».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν πρὸς ἡμᾶς
  english_pob_choice: And coming to us
  chosen_spanish: Y llegando a nosotros
  alternatives_spanish:
  - Y vino a nosotros
  - Y al venir a nosotros
  lexicon: BDAG
  rationale: Conserva el participio de movimiento con una formulación natural en español. 'A nosotros' mantiene la dirección hacia el grupo narrador sin añadir sentido no presente.
- source_word: ζώνην
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - faja
  lexicon: BDAG
  rationale: ζώνη designa una banda usada a la cintura; 'cinturón' es la equivalencia más clara y actual en español. 'Faja' puede sonar más específica o ambigua según el contexto, y 'cinto' es menos usual.
- source_word: δήσας ἑαυτοῦ τοὺς πόδας καὶ τὰς χεῖρας
  english_pob_choice: he bound his own feet and hands
  chosen_spanish: se ciñó los pies y las manos
  alternatives_spanish:
  - se ató los pies y las manos
  - se vendó los pies y las manos
  lexicon: BDAG
  rationale: δέω exige la idea de atar o sujetar. 'Se ató' sería la opción más directa, pero 'se ciñó' puede transmitir con sobriedad el acto simbólico y mantener un registro más natural en español para una acción profética visible. El reflexivo conserva que el sujeto realiza la acción sobre sí mismo.
- source_word: Τάδε λέγει
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: BDAG
  rationale: La fórmula profética en español se expresa con naturalidad y solemnidad como 'Así dice'. Mantiene el registro bíblico sin mecanicismo.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu el Santo
  - el Espíritu Santificado
  lexicon: BDAG
  rationale: La forma establecida y fiel en español para la tercera persona divina es 'Espíritu Santo'. Mantiene mayúsculas reverenciales y el orden natural del idioma.
- source_word: Τὸν ἄνδρα
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al varón
  - a ese hombre
  lexicon: BDAG
  rationale: ἀνήρ aquí apunta al individuo masculino concreto mencionado por la señal profética. 'Al hombre' conserva el artículo y funciona con naturalidad en español.
- source_word: οὗ ἐστιν ἡ ζώνη αὕτη
  english_pob_choice: to whom this belt belongs / whose belt this is
  chosen_spanish: de quien es este cinturón
  alternatives_spanish:
  - cuyo cinturón es este
  - a quien pertenece este cinturón
  lexicon: BDAG
  rationale: El genitivo relativo se rinde de manera directa y transparente. 'De quien es' conserva el sentido posesivo sin forzar una construcción demasiado literaria.
- source_word: οὕτως
  english_pob_choice: In this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: BDAG
  rationale: Remite al acto simbólico recién realizado y queda naturalmente integrado en español.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego dice simplemente 'los judíos'. Se conserva sin ampliar ni restringir el referente.
- source_word: παραδώσουσιν
  english_pob_choice: will hand him over
  chosen_spanish: lo entregarán
  alternatives_spanish:
  - lo pondrán en manos de
  - lo traicionarán
  lexicon: BDAG
  rationale: '''Entregarán'' reproduce con fidelidad παραδίδωμι como pasar a alguien a otra autoridad o poder. ''Traicionarán'' añadiría una valoración no explícita aquí.'
- source_word: εἰς χεῖρας ἐθνῶν
  english_pob_choice: into the hands of the Gentiles
  chosen_spanish: en manos de gentiles
  alternatives_spanish:
  - en manos de las naciones
  - a manos de gentiles
  lexicon: BDAG
  rationale: Se preserva la imagen idiomática de 'manos' como poder o dominio. 'Gentiles' refleja ἐθνῶν en contraste con judíos, como en la audición inglesa.
theological_decisions:
- issue: Fórmula profética y voz del Espíritu Santo
  english_pob_reading: Thus says the Holy Spirit
  chosen_spanish_reading: Así dice el Espíritu Santo
  alternative_spanish_readings:
  - Esto dice el Espíritu Santo
  - Así ha dicho el Espíritu Santo
  rationale: La frase conserva el tono profético solemne y presenta la declaración como habla directa del Espíritu, sin expandir la doctrina más allá del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido reflexivo de ἑαυτοῦ
  english_pob_reading: he bound his own feet and hands
  chosen_spanish_reading: se ciñó los pies y las manos
  alternative_spanish_readings:
  - se ató los pies y las manos
  - ató sus propios pies y manos
  rationale: El griego indica que la acción recae sobre el mismo sujeto que llega y toma el cinturón. La traducción mantiene el carácter de señal profética autoejecutada.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando cada nota al texto con su marcador exacto. También se ajustó el español para que la construcción de la frase fluya de modo natural y conserve el paralelismo con la predicción futura.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' como término fijo y reverencial.
  - Se conserva 'judíos' y 'gentiles' para reflejar el contraste étnico del griego.
  - '''Entregarán en manos de gentiles'' preserva la imagen idiomática bíblica de autoridad/poder.'
  - El reflexivo en 'se ciñó' intenta reflejar la acción sobre sí mismo sin perder legibilidad en español.
