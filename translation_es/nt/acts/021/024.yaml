translation:
  language: es
  text: Toma a estos hombres[a], purifícate con ellos y paga sus gastos para que se rasuren la cabeza. Entonces todos sabrán que no hay nada de cierto en lo que se les ha dicho acerca de ti, sino que tú mismo también vives conforme a la ley, guardándola[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a estos [varones]». El contexto inmediato identifica a los cuatro hombres mencionados en el versículo anterior.
    reason: source_note
  - marker: b
    text: Literalmente, «andas en línea», es decir, vives de una manera consistente con guardar la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτους παραλαβὼν
  english_pob_choice: Take these men
  chosen_spanish: Toma a estos hombres[a]
  alternatives_spanish:
  - Toma a estos
  - Toma a estos hombres contigo
  lexicon: BDAG
  rationale: παραλαμβάνω, unido al participio previo, funciona aquí con fuerza imperativa dentro del mandato. En español, «toma» comunica bien esa orden. Se añade «hombres» para hacer explícito el referente contextual de los cuatro varones del versículo anterior, como hace el inglés POB con «men».
- source_word: ἁγνίσθητι σὺν αὐτοῖς
  english_pob_choice: purify yourself along with them
  chosen_spanish: purifícate con ellos
  alternatives_spanish:
  - purifícate junto con ellos
  - sé purificado con ellos
  lexicon: BDAG
  rationale: ἁγνίζω aquí alude a entrar en una purificación ritual. El reflexivo español «purifícate» conserva la participación personal; «con ellos» expresa σύν de forma natural y evita una calca pesada.
- source_word: δαπάνησον ἐπ’ αὐτοῖς
  english_pob_choice: pay their expenses
  chosen_spanish: paga sus gastos
  alternatives_spanish:
  - costea sus gastos
  - paga por ellos
  lexicon: BDAG
  rationale: δαπανάω significa gastar o sufragar un costo. Con ἐπί + dativo, la idea es asumir el gasto en favor de otros; «paga sus gastos» es la forma más clara y fiel en español.
- source_word: ἵνα ⸀ξυρήσονται τὴν κεφαλήν
  english_pob_choice: so that they may shave their heads
  chosen_spanish: para que se rasuren la cabeza
  alternatives_spanish:
  - para que se rapen la cabeza
  - para que se afeiten la cabeza
  lexicon: BDAG
  rationale: El futuro medio tras ἵνα expresa propósito o resultado previsto. «Para que» lo refleja de modo natural. «Se rasuren la cabeza» conserva el valor literal del gesto ritual; en español el singular griego se entiende distributivamente y no requiere ajustar a plural en la formulación principal.
- source_word: γνώσονται πάντες
  english_pob_choice: Then everyone will know
  chosen_spanish: Entonces todos sabrán
  alternatives_spanish:
  - y todos sabrán
  - entonces todos llegarán a saber
  lexicon: BDAG
  rationale: γινώσκω en futuro medio es directo aquí. «Entonces» recoge la consecuencia del encadenamiento argumental y «todos sabrán» es la forma más natural y transparente.
- source_word: ὧν κατήχηνται περὶ σοῦ
  english_pob_choice: the things they have been told about you
  chosen_spanish: que no hay nada en lo que se les ha dicho acerca de ti[b]
  alternatives_spanish:
  - que lo que se les ha enseñado acerca de ti no es nada
  - que nada de lo que han sido informados acerca de ti es cierto
  lexicon: BDAG
  rationale: κατηχέω puede significar instruir o informar. En este contexto de rumores sobre Pablo, la idea es que les han llegado reportes acerca de él. El español «se les ha dicho acerca de ti» preserva la pasiva y mantiene abierta la alternativa semántica sin resolverla de manera excesiva.
- source_word: οὐδέν ἐστιν
  english_pob_choice: there is nothing to
  chosen_spanish: no hay nada en
  alternatives_spanish:
  - es nada
  - no tiene base
  lexicon: BDAG
  rationale: La construcción griega expresa que lo alegado carece de sustancia. «No hay nada en» reproduce bien el valor idiomático de nulidad o falta de base, sin convertirlo en una paráfrasis interpretativa más fuerte.
- source_word: ἀλλὰ στοιχεῖς
  english_pob_choice: but that you yourself also are living in observance
  chosen_spanish: sino que tú mismo también andas ordenadamente
  alternatives_spanish:
  - sino que tú mismo también vives conforme
  - sino que tú también te conduces
  lexicon: BDAG
  rationale: στοιχέω significa caminar en línea, seguir un orden o vivir de acuerdo con una norma. «Andas ordenadamente» intenta conservar la imagen de conducta alineada sin imponer de entrada una formulación técnica posterior. El adverbio «también» y «tú mismo» preservan el énfasis de καὶ αὐτός.
- source_word: καὶ αὐτὸς
  english_pob_choice: you yourself also
  chosen_spanish: tú mismo también
  alternatives_spanish:
  - tú también
  - incluso tú
  lexicon: BDAG
  rationale: 'La combinación es enfática: no solo otros, sino Pablo personalmente. «Tú mismo también» conserva la insistencia personal y la adición.'
- source_word: φυλάσσων τὸν νόμον
  english_pob_choice: of the law
  chosen_spanish: guardando la ley
  alternatives_spanish:
  - observando la ley
  - cumpliendo la ley
  lexicon: BDAG
  rationale: φυλάσσω con νόμος significa guardar u observar. Dado que «andas ordenadamente» ya traduce la idea de conducta alineada, «guardando la ley» conserva el segundo verbo sin redundancia excesiva y mantiene el registro bíblico natural en español.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley de Moisés
  lexicon: BDAG
  rationale: En contexto se trata de la ley judía. «La ley» sigue de cerca el griego y evita añadir una especificación interpretativa que el texto no exige.
theological_decisions:
- issue: Relación de Pablo con la ley en esta escena narrativa
  english_pob_reading: 'Rendered the statement as describing Paul''s observable conduct: ''you yourself also are living in observance of the law.'''
  chosen_spanish_reading: 'La frase se vierte como una descripción observable de la conducta de Pablo: «tú mismo también andas ordenadamente, guardando la ley».'
  alternative_spanish_readings:
  - tú mismo también guardas la ley
  - tú mismo también andas conforme a la ley
  rationale: El versículo presenta lo que otros sabrán o concluirán a partir de la participación de Pablo en la purificación y el costo del rito. La traducción debe reflejar esa afirmación narrativa sin resolver la tensión teológica más amplia sobre la relación de Pablo con la ley en otros pasajes.
  doctrine_reference: Conservar la tensión teológica sin armonizarla de antemano.
translation_notes:
  revision_awareness: La base auditada coincide ampliamente con la versión inglesa POB final; no se documentan revisiones sustantivas posteriores. La redacción española conserva las mismas decisiones semánticas y la misma tensión sobre κατηχέω/στοιχέω sin introducir armonizaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se traduce δοῦλος/siervo no aplica aquí; no se introduce terminología eclesiástica ajena al texto.
  - «Ley» se usa de forma consistente para νόμος, sin añadir «Mosaica» en el texto principal.
  - 'Se conserva el paralelismo de dos verbos de conducta: «andar ordenadamente» y «guardar la ley», para no colapsar las dos ideas griegas en una sola.'
