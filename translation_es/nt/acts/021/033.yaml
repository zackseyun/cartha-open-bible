translation:
  language: es
  text: Entonces el comandante se acercó[a], lo agarró, ordenó que lo ataran con dos cadenas[b], y preguntaba quién era y qué había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aproximó». El participio griego ἐγγίσας expresa que el oficial se acercó antes de la acción principal.
    reason: lexical_alternative
  - marker: b
    text: «Dos cadenas» puede evocar la profecía de Hechos 21:11 sobre Pablo atado en Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: χιλίαρχος
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - tribuno
  - comandante militar
  - comandante de mil
  lexicon: BDAG
  rationale: El término griego designa a un oficial romano de alto rango; «comandante» comunica con claridad la autoridad militar sin cargar el texto con un tecnicismo arcaico. «Tribuno» sería posible, pero menos transparente para el lector general.
- source_word: ἐγγίσας
  english_pob_choice: came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  lexicon: BDAG
  rationale: El participio aoristo expresa que el oficial se aproxima antes de la acción principal. «Se acercó» es natural en español narrativo y conserva ese movimiento previo.
- source_word: ἐπελάβετο αὐτοῦ
  english_pob_choice: seized him
  chosen_spanish: se apoderó de él
  alternatives_spanish:
  - lo sujetó
  - lo agarró
  lexicon: BDAG
  rationale: La forma media indica un acto físico de tomarlo con fuerza. «Se apoderó de él» refleja bien la contundencia del arresto; «lo sujetó» suavizaría demasiado el gesto.
- source_word: ἐκέλευσε δεθῆναι
  english_pob_choice: ordered him to be bound
  chosen_spanish: ordenó que lo ataran
  alternatives_spanish:
  - mandó que lo sujetaran
  - dio orden de atarlo
  lexicon: BDAG
  rationale: La construcción expresa una orden con infinitivo pasivo. En español, la pasiva perifrástica puede sonar rígida; «ordenó que lo ataran» mantiene el sentido de autoridad y el resultado de sujeción.
- source_word: ἁλύσεσι δυσί
  english_pob_choice: with two chains
  chosen_spanish: con dos cadenas
  alternatives_spanish:
  - con dos grilletes
  - con dos esposas
  lexicon: BDAG
  rationale: ἅλυσις es «cadena» en contextos de custodia. «Con dos cadenas» conserva la imagen literal y deja abierta la posible resonancia con la profecía previa sin explicitarla en el cuerpo del texto.
- source_word: ἐπυνθάνετο
  english_pob_choice: was asking
  chosen_spanish: preguntaba
  alternatives_spanish:
  - inquiría
  - seguía preguntando
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción en curso. «Preguntaba» reproduce ese valor progresivo de manera natural; «seguía preguntando» sería más interpretativo.
- source_word: τίς εἴη
  english_pob_choice: who he was
  chosen_spanish: quién era
  alternatives_spanish:
  - quién pudiera ser
  - quién fuese
  lexicon: BDAG
  rationale: En discurso indirecto tras un verbo en pasado, la forma natural en español es «quién era». Mantiene el sentido interrogativo sin forzar una literalidad artificial.
- source_word: τί ἐστιν πεποιηκώς
  english_pob_choice: what he had done
  chosen_spanish: qué había hecho
  alternatives_spanish:
  - qué estaba haciendo
  - qué había realizado
  lexicon: BDAG
  rationale: El perfecto perifrástico apunta a una acción ya cumplida con relevancia presente. En español, «qué había hecho» expresa con claridad el resultado de esa acción dentro del relato.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar un segundo 'he' antes de 'was asking' y así reflejar mejor el flujo griego; en español, la coordinación con «y preguntaba» ya expresa ese avance narrativo sin necesidad de un sujeto repetido.
  spanish_consistency_notes:
  - Se mantiene «comandante» para χιλίαρχος, coherente con el enfoque POB de claridad moderna y con la referencia a un oficial romano.
  - Se conserva «cadenas» en plural para ἁλύσεσι δυσί, sin neutralizar la imaginería concreta del texto.
  - Se usa «preguntaba» para el imperfecto, preservando el aspecto durativo del griego.
  - No se introduce terminología eclesiástica tradicional ajena al pasaje, y no hay elementos textuales que requieran notas teológicas.
