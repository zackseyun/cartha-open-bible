    text: Or 'tribune.' The Greek χιλίαρχος refers to a Roman military officer, literally 'commander of a thousand.'
    reason: lexical_alternative
  - marker: b
    text: '''Two chains'' may echo the prophecy in Acts 21:11 about Paul being bound in Jerusalem.'
    reason: cross_reference
