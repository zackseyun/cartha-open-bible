revisions:
- from: Entonces el comandante se acercó[a], se apoderó de él y ordenó que lo ataran con dos cadenas[b]; y preguntaba quién era y qué había hecho.
  to: Entonces el comandante se acercó[a], lo agarró, ordenó que lo ataran con dos cadenas[b], y preguntaba quién era y qué había hecho.
  rationale: Se reemplazó «se apoderó de él» por «lo agarró» para reflejar con más precisión el acto físico de prenderlo en el contexto de arresto. También se suavizó la puntuación para un flujo narrativo más natural en español, sin cambiar el sentido. Se mantuvieron las dos notas al pie porque siguen siendo pertinentes y están correctamente ancladas.
