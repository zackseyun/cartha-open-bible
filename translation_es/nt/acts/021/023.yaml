translation:
  language: es
  text: 'Por tanto, haz lo que te decimos: tenemos cuatro hombres que están bajo un voto[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tienen un voto» o «que han hecho un voto». El griego dice literalmente «teniendo un voto».
    reason: lexical_alternative
  - marker: b
    text: El contexto más amplio puede sugerir un voto de tipo nazareo, pero este versículo solo dice «un voto».
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτο οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por consiguiente
  lexicon: BDAG
  rationale: οὖν marca consecuencia lógica; «Por tanto» conserva ese enlace inferencial con tono natural en español.
- source_word: ποίησον
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - cumple
  - haz esto
  lexicon: BDAG
  rationale: 'El imperativo aoristo de ποιέω se expresa con un mandato directo y natural en español: «haz».'
- source_word: ὅ σοι λέγομεν
  english_pob_choice: what we tell you
  chosen_spanish: lo que te decimos
  alternatives_spanish:
  - lo que te estamos diciendo
  - lo que te decimos ahora
  lexicon: BDAG
  rationale: La relativa con λέγομεν funciona como complemento del mandato; en español «lo que te decimos» comunica el contenido sin calco excesivo.
- source_word: εἰσὶν ἡμῖν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - hay para nosotros
  - hay entre nosotros
  lexicon: BDAG
  rationale: 'La construcción existencial con dativo se vierte idiomáticamente como posesión: «tenemos».'
- source_word: ἄνδρες τέσσαρες
  english_pob_choice: four men
  chosen_spanish: cuatro hombres
  alternatives_spanish:
  - cuatro varones
  lexicon: BDAG
  rationale: ἀνήρ designa varones adultos; «hombres» es el equivalente natural y digno en español.
- source_word: εὐχὴν ἔχοντες
  english_pob_choice: who have a vow upon themselves
  chosen_spanish: que tienen un voto sobre sí
  alternatives_spanish:
  - que están bajo un voto
  - que han hecho un voto
  lexicon: BDAG
  rationale: Mantengo la idea de un voto vigente sin especificar más de lo que dice el griego. «Sobre sí» refleja la relación de ἀφ’ ἑαυτῶν sin sobreinterpretar.
- source_word: ἀφ’ ἑαυτῶν
  english_pob_choice: upon themselves
  chosen_spanish: sobre sí
  alternatives_spanish:
  - por su propia cuenta
  - de su propia parte
  lexicon: BDAG
  rationale: La frase indica que el voto recae sobre ellos mismos; «sobre sí» preserva esa imagen de manera breve y comprensible.
theological_decisions:
- issue: Naturaleza del voto en contexto
  english_pob_reading: Render generically as 'a vow' without specifying Nazirite in the main text.
  chosen_spanish_reading: Traducir de forma genérica como «un voto» sin añadir «nazareo» o «nazareo/nazirita» en el texto principal.
  alternative_spanish_readings:
  - un voto nazareo
  - un voto de nazareo
  rationale: Aunque el contexto amplio puede sugerir un voto de tipo nazareo, el versículo solo dice εὐχήν. La versión principal no debe importar una identificación más específica que la fuente explícita.
  doctrine_reference: Primacía del texto original; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al evitar una formulación que suene posesiva de manera extraña y al mantener explícita la relación del voto con los hombres mismos, sin convertirla en una interpretación técnica no atestiguada por el griego.
  spanish_consistency_notes:
  - Se usa «voto» para εὐχή, coherente con el registro bíblico y con la decisión inglesa de no especificar Nazareo en el texto principal.
  - «Sobre sí» conserva la relación semántica de ἀφ’ ἑαυτῶν sin volverla más interpretativa de lo necesario.
  - 'Se mantiene el orden lógico del griego con una apertura inferencial en español: «Por tanto».'
