  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Voto» es correcto para εὐχήν. La revisión propuesta mejora la naturalidad española mientras mantiene la cautela teológica documentada: no introducir «nazareo» en el texto principal.'
  issues:
