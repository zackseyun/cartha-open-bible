revisions:
- from: 'Por tanto, haz lo que te decimos: tenemos cuatro hombres que tienen un voto sobre sí[a][b].'
  to: 'Por tanto, haz lo que te decimos: tenemos cuatro hombres que están bajo un voto[a][b].'
  rationale: Se reemplaza «que tienen un voto sobre sí» por «que están bajo un voto» para lograr un español natural y eclesialmente legible, mientras se mantiene el sentido de un voto vigente que recae sobre ellos. La nota a conserva tanto la alternativa más literal como la alternativa verbal ya documentada en inglés.
