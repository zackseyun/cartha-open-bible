translation:
  language: es
  text: Al día siguiente[a], Pablo entró con nosotros adonde Jacobo, y todos los ancianos estaban presentes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al siguiente día».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los ancianos vinieron» o «todos los ancianos llegaron». El verbo griego puede enfatizar ya sea la llegada o la presencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐπιούσῃ
  english_pob_choice: On the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: BDAG
  rationale: La expresión dativa participial funciona como un modismo temporal que señala el día inmediato posterior. «Al día siguiente» es natural en español y conserva ese valor sin endurecer la frase.
- source_word: εἰσῄει
  english_pob_choice: went in
  chosen_spanish: fue
  alternatives_spanish:
  - entró
  - iba
  lexicon: BDAG
  rationale: El imperfecto comunica desplazamiento hacia dentro o entrada. En español, «fue» con el complemento de destino mantiene el movimiento hacia la reunión y suena natural; «entró» sería más literal, pero menos idiomático en esta construcción.
- source_word: σὺν ἡμῖν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - juntamente con nosotros
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento. «Con nosotros» es la equivalencia directa y clara en español.
- source_word: πρὸς Ἰάκωβον
  english_pob_choice: to James
  chosen_spanish: a ver a Jacobo
  alternatives_spanish:
  - a Jacobo
  - hacia Jacobo
  lexicon: BDAG
  rationale: La preposición πρός con acusativo puede señalar movimiento hacia una persona. En español, «a ver a Jacobo» explicita el sentido de visita que el contexto sugiere sin añadir una identificación no presente en el verso. Se usa «Jacobo» como forma tradicional y reconocible del nombre en español bíblico, aunque el referente es el mismo nombre propio Ἰάκωβος.
- source_word: πάντες τε
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y todos también
  - e igualmente todos
  lexicon: BDAG
  rationale: La partícula τέ añade una conexión suave. «Y todos» transmite esa coordinación de manera sobria sin sobretraducir la partícula.
- source_word: παρεγένοντο
  english_pob_choice: were present
  chosen_spanish: estuvieron presentes
  alternatives_spanish:
  - vinieron
  - llegaron
  - se hicieron presentes
  lexicon: BDAG
  rationale: παραγίνομαι puede significar llegar o estar presente. Dado que el foco está en la asistencia a la reunión, «estuvieron presentes» conserva el matiz de presencia sin perder la posible idea de llegada.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los líderes
  lexicon: BDAG
  rationale: πρεσβύτεροι designa a los líderes reconocidos de la comunidad. «Ancianos» es el equivalente transparente en español y evita imponer terminología denominacional posterior.
theological_decisions:
- issue: Identificación de Ἰάκωβος
  english_pob_reading: Render simply as the personal name 'James' without appositional expansion.
  chosen_spanish_reading: Se conserva solo el nombre propio, sin ampliar con títulos o identificaciones.
  alternative_spanish_readings:
  - Jacobo el hermano del Señor
  - Jacobo, líder de la iglesia de Jerusalén
  rationale: El verso no añade identificación; por eso la traducción no debe importarla desde el contexto más amplio. Mantener solo el nombre respeta la primacía del texto fuente y evita aclaraciones interpretativas no explicitadas aquí.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; no importar afirmaciones que el texto no hace.'
- issue: Sentido eclesial de οἱ πρεσβύτεροι
  english_pob_reading: Translate as 'the elders' in a church-governance sense without denominational specification.
  chosen_spanish_reading: «Los ancianos» como designación de los líderes de la comunidad, sin precisar estructura denominacional.
  alternative_spanish_readings:
  - los presbíteros
  - los líderes de la iglesia
  rationale: El término apunta a dirigentes reconocidos de la iglesia de Jerusalén. «Ancianos» conserva el valor léxico y mantiene neutralidad eclesiológica; «presbíteros» sería más técnico y «líderes» más interpretativo.
  doctrine_reference: 'Affirmations; Translation philosophy: no privilegia una estructura denominacional posterior salvo apoyo inequívoco del texto.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el registro y las decisiones auditadas del POB inglés: conserva el valor idiomático temporal de τῇ δὲ ἐπιούσῃ, el matiz de movimiento/presencia de εἰσῄει y παρεγένοντο, y mantiene la neutralidad en la identificación de Jacobo y en οἱ πρεσβύτεροι. No se detectaron revisiones posteriores que exigieran ajuste.'
  spanish_consistency_notes:
  - Se mantiene «Pablo» y no «Saulo», en continuidad con el contexto inmediato de Hechos.
  - Se usa «Jacobo» como forma española bíblica tradicional para Ἰάκωβος, sin añadir identificación extra.
  - «Ancianos» se emplea en sentido eclesial neutral, evitando «presbíteros» para no introducir tecnicismo innecesario.
  - La construcción «fue con nosotros a ver a Jacobo» busca equilibrio entre naturalidad española y el sentido direccional de πρός + acusativo.
