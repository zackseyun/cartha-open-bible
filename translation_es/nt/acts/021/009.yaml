lexical_decisions:
- source_word: τούτῳ
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - A él
  - Este hombre
  lexicon: BDAG
  rationale: El dativo remite a Felipe en el contexto inmediato. En español, un pronombre sujeto explícito conserva la referencia personal sin volver la frase pesada o artificial.
- source_word: ἦσαν
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - había
  - eran
  lexicon: BDAG
  rationale: La construcción existencial con posesión se expresa de manera natural en español como 'tenía hijas', manteniendo la relación posesiva implícita del griego.
- source_word: θυγατέρες
  english_pob_choice: daughters
  chosen_spanish: hijas
  alternatives_spanish:
  - hijas mujeres
  - hijas hembra
  lexicon: BDAG
  rationale: Es el equivalente familiar normal y preciso en español.
- source_word: τέσσαρες
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: BDAG
  rationale: Número cardinal directo que modifica 'hijas'.
- source_word: παρθένοι
  english_pob_choice: virgin
  chosen_spanish: vírgenes
  alternatives_spanish:
  - solteras
  - doncellas
  lexicon: BDAG
  rationale: '''Vírgenes'' refleja de modo más directo el valor léxico de παρθένος y preserva la tensión textual entre estado sexual/social y actividad profética. ''Solteras'' sería más interpretativo y perdería fuerza léxica.'
- source_word: προφητεύουσαι
  english_pob_choice: who were prophesying
  chosen_spanish: que profetizaban
  alternatives_spanish:
  - que estaban profetizando
  - profetizando
  lexicon: BDAG
  rationale: El participio presente femenino plural se comunica bien en español con una relativa de acción continua o característica. 'Profetizaban' mantiene la naturalidad sin perder el aspecto progresivo/contextual.
theological_decisions:
- issue: Relación entre παρθένοι y el ministerio profético de las hijas
  english_pob_reading: virgin daughters
  chosen_spanish_reading: hijas vírgenes
  alternative_spanish_readings:
  - hijas solteras
  - hijas doncellas
  rationale: 'El texto afirma ambas cosas sin explicarlas: su condición de vírgenes y su actividad de profetizar. Mantener ''vírgenes'' evita suavizar o reinterpretar el término y conserva la posible tensión narrativa. No se añade ninguna conclusión doctrinal sobre virginidad y profecía.'
  doctrine_reference: Principio de preservar la tensión léxica sin armonización teológica indebida.
translation_notes:
  revision_awareness: La base inglesa pasó de 'unmarried daughters' a 'virgin daughters' en la revisión más reciente, para reflejar con mayor literalidad παρθένοι. La redacción española sigue esa revisión y conserva el participio presente con una relativa natural.
  spanish_consistency_notes:
  - Se mantiene 'vírgenes' para παρθένοι, en línea con la revisión inglesa más reciente y con el valor más directo del griego.
  - Se usa 'profetizaban' para conservar naturalidad en español y el sentido durativo del participio presente.
  - No se introduce 'Mesías', 'Señor' ni otros términos no presentes en el versículo.
