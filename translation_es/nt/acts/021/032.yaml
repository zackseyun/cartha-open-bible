translation:
  language: es
  text: En seguida tomó soldados y centuriones, y corrió hacia ellos. Y cuando vieron al tribuno[a] y a los soldados, dejaron de golpear a Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comandante» o «tribuno militar»; χιλίαρχος designa al oficial romano al mando de una cohorte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαυτῆς
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: La expresión adverbial indica acción inmediata. «De inmediato» es natural en español moderno y conserva la rapidez del movimiento.
- source_word: παραλαβὼν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - llevó consigo
  lexicon: BDAG
  rationale: En este contexto el participio introduce que el oficial se hizo cargo de soldados y centuriones antes de avanzar. «Tomó» mantiene la concisión del griego y de la POB en inglés; «tomó consigo» explicita el acompañamiento pero añade peso innecesario.
- source_word: στρατιώτας
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: BDAG
  rationale: El sentido ordinario es el de individuos soldados. «Soldados» es preciso y directo en español.
- source_word: ἑκατοντάρχας
  english_pob_choice: centurions
  chosen_spanish: centuriones
  alternatives_spanish:
  - capitanes de cien
  lexicon: BDAG
  rationale: Es el título militar romano estándar. «Centuriones» es el equivalente histórico más claro y reconocido en español.
- source_word: κατέδραμεν ἐπ’ αὐτούς
  english_pob_choice: ran down to them
  chosen_spanish: corrió hacia ellos
  alternatives_spanish:
  - corrió contra ellos
  - se precipitó sobre ellos
  lexicon: BDAG
  rationale: El verbo con ἐπί expresa movimiento rápido en dirección al grupo; el contexto sugiere descenso desde una posición elevada. «Corrió hacia ellos» preserva la rapidez sin forzar un matiz hostil que el griego no exige de forma explícita.
- source_word: χιλίαρχον
  english_pob_choice: tribune
  chosen_spanish: tribuno
  alternatives_spanish:
  - comandante militar
  - tribuno militar
  lexicon: BDAG
  rationale: Designa al oficial romano al mando de una cohorte. «Tribuno» es el equivalente histórico breve y natural en español; se evita imponer una expansión innecesaria en el texto principal.
- source_word: ἐπαύσαντο
  english_pob_choice: stopped
  chosen_spanish: dejaron de
  alternatives_spanish:
  - cesaron de
  - se detuvieron
  lexicon: BDAG
  rationale: El verbo medio indica que interrumpieron su acción. «Dejaron de» resulta claro y fluido, y funciona bien con el participio siguiente.
- source_word: τύπτοντες
  english_pob_choice: beating
  chosen_spanish: golpear
  alternatives_spanish:
  - pegar
  - azotar
  lexicon: BDAG
  rationale: El participio presente describe golpes reiterados. «Golpear» conserva la acción violenta sin añadir una imagen más específica que el griego no obliga a precisar.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés POB y el griego SBLGNT. El inglés traduce χιλίαρχος como «tribune» y ἐπ’ αὐτούς como «ran down to them». En español se mantuvo la misma relación semántica, con adaptación idiomática: «tribuno» para el cargo romano y «corrió hacia ellos» para el movimiento rápido. No se introdujeron matices doctrinales, y no hay variantes textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Pablo» para Παῦλος.
  - Se evita «SEÑOR» u otras convenciones de sustitución porque no aparece el nombre divino aquí.
  - «Tribuno» conserva la terminología histórica romana sin sobrecargar el verso.
  - El pasado narrativo en español sigue el flujo de las cláusulas griegas con una oración principal y una subordinada temporal.
