revisions:
- from: Él tomó de inmediato soldados y centuriones, y corrió hacia ellos[a]. Pero, cuando vieron al tribuno[b] y a los soldados, dejaron de golpear a Pablo.
  to: En seguida tomó soldados y centuriones, y corrió hacia ellos. Y cuando vieron al tribuno[a] y a los soldados, dejaron de golpear a Pablo.
  rationale: Se corrige la nota defectuosa sobre el movimiento, se elimina el pronombre sujeto innecesario, y se suaviza la transición narrativa para reflejar mejor el griego y mejorar la naturalidad del español. Se conserva «tribuno» con una nota léxica útil y fiel al expediente inglés.
  reviewer_model: gpt-5.4
