translation:
  language: es
  text: Pero unos en la multitud gritaban una cosa, y otros otra. Como él no podía averiguar lo cierto[a] debido al alboroto, ordenó que lo llevaran al cuartel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la verdad del asunto» o «lo que era seguro».'
    reason: lexical_alternative
  - marker: b
    text: «Cuartel» aquí se refiere a los alojamientos militares romanos, probablemente dentro del complejo fortificado junto al área del templo.
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλοι δὲ ἄλλο τι ἐπεφώνουν
  english_pob_choice: some in the crowd were shouting one thing, and others another
  chosen_spanish: unos en la multitud gritaban una cosa, y otros otra
  alternatives_spanish:
  - algunos en la multitud gritaban una cosa, y otros otra
  - unos clamaban una cosa, y otros otra
  lexicon: BDAG
  rationale: Conserva el contraste distributivo de ἄλλοι...ἄλλο τι y el aspecto imperfectivo de las proclamaciones en curso. «Gritaban» comunica bien la fuerza sonora; «multitud» refleja ὄχλος sin cargarlo innecesariamente como turba.
- source_word: ἐν τῷ ὄχλῳ
  english_pob_choice: in the crowd
  chosen_spanish: en la multitud
  alternatives_spanish:
  - en el gentío
  - entre la multitud
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «gentío». Aquí «multitud» mantiene neutralidad y es natural en español bíblico contemporáneo.
- source_word: μὴ δυναμένου δὲ αὐτοῦ γνῶναι τὸ ἀσφαλές
  english_pob_choice: Since he was not able to learn the facts
  chosen_spanish: Como él no podía conocer lo cierto
  alternatives_spanish:
  - Como él no podía averiguar la verdad del asunto
  - Puesto que no podía saber qué era cierto
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia causal. τὸ ἀσφαλές apunta a lo seguro/cierto; «lo cierto» preserva la ambigüedad entre «los hechos» y «la verdad del asunto» sin imponer una sola formulación.
- source_word: διὰ τὸν θόρυβον
  english_pob_choice: because of the uproar
  chosen_spanish: debido al alboroto
  alternatives_spanish:
  - por el alboroto
  - a causa del tumulto
  lexicon: BDAG
  rationale: θόρυβος es más que ruido; implica desorden tumultuoso. «Alboroto» comunica ese carácter perturbador en español actual sin sobretraducir a una imagen más fuerte de la que exige el contexto.
- source_word: ἐκέλευσεν ἄγεσθαι αὐτὸν
  english_pob_choice: he ordered him to be brought
  chosen_spanish: ordenó que lo llevaran
  alternatives_spanish:
  - mandó que lo llevaran
  - ordenó que fuera llevado
  lexicon: BDAG
  rationale: El verbo κελεύω expresa una orden directa. El infinitivo pasivo ἄγεσθαι se vierte de manera natural en español con una pasiva de sentido; «lo llevaran» mantiene la idea sin forzar una construcción pesada.
- source_word: εἰς τὴν παρεμβολήν
  english_pob_choice: into the barracks
  chosen_spanish: al cuartel
  alternatives_spanish:
  - al campamento
  - a la fortaleza
  lexicon: BDAG
  rationale: En Hechos se trata de los alojamientos militares romanos vinculados al complejo fortificado. «Cuartel» es el equivalente más claro y natural para lectores modernos; evita «campamento», que suena temporal, y «fortaleza», que describe el edificio más que el destino.
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del texto inglés auditado, que colocó «in the crowd» con quienes gritaban para hacer más natural la sintaxis sin cambiar el sentido. En español se reflejó esa relación colocando «en la multitud» con «gritaban» y manteniendo la secuencia causal del genitivo absoluto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto, aunque este versículo no la contiene.
  - Se prefiere «cuartel» para παρεμβολή conforme al criterio contextual del POB, con nota cultural para lectores hispanos.
  - Se evita «verdad» como única solución para τὸ ἀσφαλές para no borrar la tensión entre verdad, certeza y hechos observables.
