translation:
  language: es
  text: 'Porque la multitud del pueblo lo seguía[a], gritando: «¡Llévenselo!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Fuera con él!».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - lo estaba siguiendo
  - seguía tras él
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua en pasado; en español, «lo seguía» comunica ese trasfondo progresivo de manera natural y fiel. Evita una perífrasis más pesada sin perder el valor durativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula explica la escena anterior; «Porque» conserva la relación causal/expositiva en español bíblico claro.
- source_word: τὸ πλῆθος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el gentío
  lexicon: BDAG
  rationale: «Multitud» mantiene el sentido colectivo del sustantivo griego con un registro digno y natural.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de la población
  lexicon: BDAG
  rationale: El genitivo describe a qué multitud se refiere; «pueblo» refleja bien λαός sin cargar el texto con un matiz peyorativo como «turba».
- source_word: κράζοντες
  english_pob_choice: shouting
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - vociferando
  lexicon: BDAG
  rationale: El participio indica el modo en que iban siguiendo; «gritando» reproduce la fuerza y la hostilidad de la escena en español corriente.
- source_word: Αἶρε αὐτόν
  english_pob_choice: Take him away!
  chosen_spanish: ¡Llévenselo!
  alternatives_spanish:
  - ¡Fuera con él!
  - ¡Arrástrenlo!
  - ¡Quítenlo de en medio!
  lexicon: BDAG
  rationale: αἴρω aquí es una orden idiomática de remoción, no solo de levantamiento. «Llévenselo» comunica la demanda hostil con naturalidad en español y evita una calca mecánica.
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa están en alta concordancia; no se registraron revisiones aplicadas. La versión española sigue el mismo valor aspectual del imperfecto y la misma fuerza idiomática del imperativo, adaptadas a una sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» o «turba» porque el griego y el audit trail inglés no los requieren.
  - Se conserva un registro bíblico actual, no arcaizante, con puntuación española estándar.
