    issue: El imperfecto ἐπλέομεν se reduce demasiado en 'navegamos hacia Siria'.
    rationale: El expediente inglés justificó 'sailed on to' para conservar la idea de continuación del trayecto. En español, 'seguimos navegando hacia Siria' o 'navegábamos hacia Siria' representa mejor ese matiz que el pretérito simple.
  - severity: low
    issue: La frase principal 'dejarla a la izquierda' suena menos natural e idiomática que 'dejándola a nuestra izquierda'.
    rationale: El griego expresa que Chipre quedó del lado izquierdo del barco durante la navegación. Añadir 'nuestra' aclara el punto de referencia y mejora la fluidez sin sobretraducir.
  - severity: medium
    issue: 'La nota a contiene un calco poco natural: ''entrar en vista de Chipre''.'
    rationale: Aunque intenta reflejar 'came in sight of Cyprus', en español natural conviene 'cuando Chipre entró en vista' o 'después de divisar Chipre'. La nota actual suena forzada.
