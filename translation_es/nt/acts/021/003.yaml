base_translation:
  language: en
  yaml_path: translation/nt/acts/021/003.yaml
  text: After sighting Cyprus and leaving it on our left[a], we sailed on to Syria and came down to Tyre[d][c][b], for there the ship was unloading its cargo.
  footnotes:
  - marker: a
    text: Or 'came in sight of Cyprus.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'leaving it on the left'; that is, Cyprus remained on the ship's left side as they sailed.
    reason: cultural_note
  - marker: c
    text: Or 'arrived at Tyre.' The Greek more literally says 'came down to Tyre.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the ship was being unloaded' or 'was discharging its cargo.'
    reason: lexical_alternative
