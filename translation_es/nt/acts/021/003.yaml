translation:
  language: es
  text: Después de avistar Chipre y dejarla a nuestra izquierda[a], seguimos navegando hacia Siria y llegamos a Tiro[d][c][b], porque allí el barco estaba descargando su carga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'dejándola a la izquierda'; es decir, Chipre quedó al lado izquierdo del barco mientras navegaban. O 'después de que Chipre entró en vista'.
    reason: combined_lexical_alternative_and_cultural_note
  - marker: b
    text: El griego dice más literalmente 'descendimos a Tiro' o 'bajamos a Tiro'.
    reason: lexical_alternative
  - marker: c
    text: O 'arribamos a Tiro'.
    reason: lexical_alternative
  - marker: d
    text: O 'el barco estaba siendo descargado' o 'estaba descargando su cargamento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναφάναντες
  english_pob_choice: after sighting
  chosen_spanish: después de avistar
  alternatives_spanish:
  - después de ver
  - después de divisar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y describe el momento en que la isla entra en vista. 'Avistar' conserva el matiz náutico de percibir algo a lo lejos y suena natural en español.
- source_word: καταλιπόντες αὐτὴν εὐώνυμον
  english_pob_choice: leaving it on our left
  chosen_spanish: dejarla a la izquierda
  alternatives_spanish:
  - dejarla a babor
  - pasarla por la izquierda
  lexicon: BDAG
  rationale: El griego expresa que Chipre quedó del lado izquierdo de la nave al seguir la ruta. 'A la izquierda' reproduce el sentido sin tecnicismo excesivo; 'a babor' sería más náutico, pero menos general.
- source_word: ἐπλέομεν εἰς Συρίαν
  english_pob_choice: we sailed on to Syria
  chosen_spanish: navegamos hacia Siria
  alternatives_spanish:
  - seguimos navegando hacia Siria
  - zarpamos hacia Siria
  lexicon: BDAG
  rationale: El imperfecto presenta el viaje en curso. 'Navegamos hacia Siria' mantiene el movimiento continuado sin forzar un equivalente aspectual artificial en español.
- source_word: κατήλθομεν εἰς Τύρον
  english_pob_choice: came down to Tyre
  chosen_spanish: llegamos a Tiro
  alternatives_spanish:
  - descendimos a Tiro
  - bajamos a Tiro
  lexicon: BDAG
  rationale: El verbo griego literalmente dice 'bajar/llegar abajo', pero en español una formulación como 'descendimos' sonaría extraña. 'Llegamos a Tiro' comunica la acción central con claridad, conservando el cambio de destino señalado por el contexto.
- source_word: ἐκεῖσε
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: BDAG
  rationale: Adverbio locativo que remite a Tiro como punto de parada. 'Allí' es la equivalencia natural y breve en español.
- source_word: ἀποφορτιζόμενον
  english_pob_choice: was unloading
  chosen_spanish: estaba descargando
  alternatives_spanish:
  - era descargado
  - estaba siendo descargado
  lexicon: BDAG
  rationale: La construcción perifrástica con ἦν + participio describe una acción en curso. En español, 'estaba descargando' reproduce bien la escena y evita una pasiva demasiado pesada.
- source_word: τὸν γόμον
  english_pob_choice: its cargo
  chosen_spanish: su carga
  alternatives_spanish:
  - su cargamento
  - el cargamento
  lexicon: BDAG
  rationale: γόμος denota la carga/flete del barco. 'Carga' es la opción más natural y fiel; 'cargamento' también sería posible, pero algo más marcado.
translation_notes:
  revision_awareness: Se siguió de cerca el griego SBLGNT y el audit trail inglés de POB. No se detectaron cambios editoriales previos que alteren la decisión de fondo; se conservó la secuencia narrativa, la referencia náutica y las alternativas lexicales principales del original.
  spanish_consistency_notes:
  - Se usa 'Chipre' y 'Tiro' como topónimos estándar en español.
  - Se mantuvo un registro náutico natural sin introducir tecnicismos innecesarios.
  - Se evitó 'SEÑOR' u այլ sustituciones porque el versículo no contiene lenguaje divino directo.
  - Se preservó la ambigüedad de la descarga del barco mediante nota, sin forzar pasiva o activa exclusivamente.
