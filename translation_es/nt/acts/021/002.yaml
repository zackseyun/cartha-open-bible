translation:
  language: es
  text: Y después de encontrar un barco que cruzaba a Fenicia[a], subimos a bordo y zarpamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un barco destinado a Fenicia». El griego describe literalmente un barco «que cruzaba a Fenicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρόντες
  english_pob_choice: after finding
  chosen_spanish: después de encontrar
  alternatives_spanish:
  - habiendo encontrado
  - al encontrar
  lexicon: BDAG
  rationale: El participio aoristo indica una acción anterior a la principal. «Después de encontrar» expresa bien la secuencia temporal en español y conserva el valor previo del participio sin volverlo forzosamente causal.
- source_word: πλοῖον
  english_pob_choice: a ship
  chosen_spanish: un barco
  alternatives_spanish:
  - una nave
  - un navío
  lexicon: BDAG
  rationale: En este contexto marítimo, «barco» es natural y claro en español. «Nave» o «navío» serían posibles, pero suenan más marcados o menos corrientes para lectura pública.
- source_word: διαπερῶν
  english_pob_choice: crossing over
  chosen_spanish: que cruzaba
  alternatives_spanish:
  - que iba de paso
  - que atravesaba
  lexicon: BDAG
  rationale: El participio presente modifica al barco y describe su trayecto. «Que cruzaba» conserva la idea verbal de atravesar hacia otro lugar sin introducir la interpretación más libre de «destinado a».
- source_word: εἰς Φοινίκην
  english_pob_choice: to Phoenicia
  chosen_spanish: hacia Fenicia
  alternatives_spanish:
  - a Fenicia
  - para Fenicia
  lexicon: BDAG
  rationale: «εἰς» marca dirección o destino. «Hacia Fenicia» refleja bien el movimiento del viaje y evita una formulación demasiado estática.
- source_word: ἐπιβάντες
  english_pob_choice: we went aboard
  chosen_spanish: subimos a bordo
  alternatives_spanish:
  - embarcardos
  - habiendo subido a bordo
  lexicon: BDAG
  rationale: En contexto náutico, ἐπιβαίνω significa abordar una embarcación. «Subimos a bordo» es idiomático en español y mantiene el orden narrativo del pasaje.
- source_word: ἀνήχθημεν
  english_pob_choice: set sail
  chosen_spanish: zarpamos
  alternatives_spanish:
  - nos hicimos a la mar
  - partimos por mar
  lexicon: BDAG
  rationale: En uso marítimo, ἀνάγω significa hacerse a la mar o zarpar. «Zarpamos» es la equivalencia natural y concisa en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones sustantivas; la versión española sigue de cerca la secuencia participial y la imagen marítima sin añadir matices ajenos al original.
  spanish_consistency_notes:
  - Se prefirió «Fenicia» como forma española estándar del topónimo.
  - Se mantuvo un ritmo narrativo simple, acorde con el relato de viajes de Hechos.
  - No se usó «Cristo», «Señor» ni otra terminología teológica porque el versículo no la contiene.
