review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido del griego: τί οὖν ἐστιν; se entiende idiomáticamente como una pregunta práctica, πάντως intensifica la certeza, ἀκούσονται es futuro plural activo en sentido, ὅτι introduce el contenido, y ἐλήλυθας se refleja adecuadamente con perfecto. Sin embargo, hay pequeños ajustes para un español más natural y ortográficamente correcto.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero ''¿Qué pues hay que hacer?'' suena calcada y poco natural en español contemporáneo; ''Entonces, ¿qué hay que hacer?'' o ''¿Qué hay que hacer, entonces?'' fluye mejor sin perder el matiz. Además, falta tilde en ''oirán'' → ''oirán'' debe ser ''oirán''? En español actual la forma correcta es ''oirán'' sin h? No, la forma correcta es ''oirán'' con tilde sobre la i: ''oirán''.'
  glossary_alignment: No hay términos del glosario principal especialmente implicados en este versículo. Las decisiones léxicas principales son coherentes con el audit trail inglés. Conviene ajustar solo la idiomaticidad de τί οὖν ἐστιν; en español.
  issues:
  - severity: medium
    issue: La frase inicial '¿Qué pues hay que hacer?' suena poco natural en español.
    rationale: Aunque intenta reflejar el orden discursivo griego, 'pues' en esa posición resulta forzado en español moderno. El audit trail inglés ya interpreta la expresión como idiomática; por eso una formulación natural como 'Entonces, ¿qué hay que hacer?' preserva mejor la fuerza pragmática.
  - severity: low
    issue: La nota al pie conserva una alternativa demasiado literal con puntuación mejorable en español.
    rationale: 'La nota debe sonar natural y clara: ''O, más literalmente: «¿Qué, entonces, es?»'' o una formulación equivalente. También conviene quitar comillas simples innecesarias y mejorar la puntuación española.'
  revised_spanish_text: Entonces, ¿qué hay que hacer? Ciertamente oirán[a] que has venido.
