translation:
  language: es
  text: Entonces, ¿qué hay que hacer? Ciertamente oirán[a] que has venido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué, entonces, es?» La expresión griega es idiomática y pregunta qué debe hacerse ante la situación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν ἐστιν;
  english_pob_choice: What then is to be done?
  chosen_spanish: ¿Qué pues hay que hacer?
  alternatives_spanish:
  - ¿Qué pues es?
  - ¿Qué hay que hacer, entonces?
  - ¿Qué pues?
  lexicon: BDAG
  rationale: La pregunta griega es idiomática y, en contexto, no pide una definición sino una conclusión práctica ante la situación. En español, '¿Qué pues hay que hacer?' conserva ese valor de consejo/acción sin volverlo demasiado explicativo.
- source_word: πάντως
  english_pob_choice: certainly
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Seguro
  - De todos modos
  lexicon: BDAG
  rationale: El adverbio intensifica la certeza de la reacción esperada; 'ciertamente' reproduce bien ese matiz predictivo en un registro natural.
- source_word: ἀκούσονται
  english_pob_choice: they will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - se enterarán
  - oirán hablar
  lexicon: BDAG
  rationale: El futuro de ἀκούω aquí apunta a recepción de la noticia. 'Oirán' mantiene la forma verbal simple y la previsión del texto; en español el complemento siguiente aclara qué será oído.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que se oirá, no una causa. 'Que' conserva la subordinación declarativa.
- source_word: ἐλήλυθας
  english_pob_choice: you have come
  chosen_spanish: has venido
  alternatives_spanish:
  - has llegado
  - viniste
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι resalta el estado resultante de la llegada de Pablo. 'Has venido' conserva mejor ese valor que un pretérito simple, y es plenamente natural en español.
translation_notes:
  revision_awareness: Texto alineado con la lectura inglesa POB y el griego SBLGNT; se mantuvo la fuerza idiomática de la pregunta inicial y el perfecto de ἐλήλυθας sin añadir matices ajenos al pasaje. No hubo revisiones aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se usa 'Ciertamente' para πάντως, coherente con el valor de certeza del adverbio.
  - '''Has venido'' conserva el perfecto griego y el resultado presente de la llegada.'
  - Se evitó 'SEÑOR' u otra terminología no pertinente; el verso no contiene vocabulario teológico especializado.
