translation:
  language: es
  text: Porque antes habían visto a Trófimo, el efesio, en la ciudad con él, y supusieron que Pablo lo había llevado al templo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν puede referirse al complejo o recinto del templo, no solo al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν γὰρ ... προεωρακότες
  english_pob_choice: For they had previously seen
  chosen_spanish: Porque antes habían visto
  alternatives_spanish:
  - Porque ya habían visto
  - Pues lo habían visto antes
  lexicon: BDAG
  rationale: La construcción perifrástica expresa anterioridad respecto del momento del supuesto. «Antes habían visto» conserva el valor de tiempo previo sin sonar forzado en español.
- source_word: Τρόφιμον τὸν Ἐφέσιον
  english_pob_choice: Trophimus the Ephesian
  chosen_spanish: a Trófimo, el efesio
  alternatives_spanish:
  - a Trófimo, el de Éfeso
  - a Trófimo, efesio
  lexicon: BDAG
  rationale: El adjetivo sustantivado Ἐφέσιον identifica el origen de Trófimo. «El efesio» preserva la estructura appositiva del griego y es natural en español bíblico moderno.
- source_word: ἐν τῇ πόλει
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en la urbe
  - en la población
  lexicon: BDAG
  rationale: «Ciudad» reproduce el sentido urbano general de πόλις y mantiene la referencia al ámbito de Jerusalén frente al templo.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - en su compañía
  - junto a él
  lexicon: BDAG
  rationale: «Con él» es la traslación directa y clara de σύν con dativo. El antecedente contextual es Pablo.
- source_word: ἐνόμιζον
  english_pob_choice: they supposed
  chosen_spanish: supusieron
  alternatives_spanish:
  - pensaron
  - imaginaron
  lexicon: BDAG
  rationale: El verbo expresa una inferencia no verificada. «Supusieron» conserva mejor esa conjetura que «pensaron» y evita intensificar indebidamente el matiz.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: into the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al recinto del templo
  - a los atrios del templo
  lexicon: BDAG
  rationale: En español, «al templo» comunica con naturalidad la acusación. No se pierde el matiz amplio de ἱερόν, que en este contexto puede abarcar el complejo sagrado; ese detalle se preserva en la nota.
- source_word: εἰσήγαγεν
  english_pob_choice: had brought
  chosen_spanish: lo había llevado
  alternatives_spanish:
  - lo había introducido
  - lo había metido
  lexicon: BDAG
  rationale: «Había llevado» expresa el acto de introducir a alguien en un lugar restringido sin sonar artificial. «Lo» retoma a Trófimo.
theological_decisions:
- issue: Sentido de ἱερόν
  english_pob_reading: Rendered as 'the temple' in the main text, with a footnote clarifying that the Greek term denotes the temple complex/precincts rather than the inner sanctuary specifically.
  chosen_spanish_reading: Se traduce «al templo» en el texto principal y se aclara en nota que el griego puede referirse al complejo o los atrios del templo, no necesariamente al santuario interior.
  alternative_spanish_readings:
  - al recinto del templo
  - a los atrios del templo
  - al complejo del templo
  rationale: La acusación en el contexto histórico apunta al espacio sagrado en sentido amplio. «Al templo» es suficientemente claro para la lectura pública, mientras la nota preserva la precisión lexical del término griego.
  doctrine_reference: Precisión histórica y lexical del pasaje; cf. la distinción entre ἱερόν y ναός en el NT.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que prefirió «supposed» sobre «assumed»; por eso se optó por «supusieron» para conservar el matiz de conjetura. También se mantuvo la nota sobre ἱερόν del audit trail en forma natural para español.
  spanish_consistency_notes:
  - Se mantiene «Pablo» para el nombre propio conforme al estándar español.
  - Se usa «trófimo, el efesio» para conservar la identificación geográfica sin paraphrasear.
  - El tono es formal y bíblico contemporáneo, sin caer en calcos innecesarios.
  - La nota se ancla en «templo» porque allí está la decisión lexical relevante en español.
