  to: Entonces, ¿no eres tú el egipcio que hace algunos días provocó una revuelta y llevó al desierto[a] a los cuatro mil hombres de los asesinos?[b]
  rationale: Se cambia «de los sicarios» por «de los asesinos» para seguir la decisión principal del POB inglés y evitar una lectura moderna equívoca en español. La nota [b] preserva la alternativa histórica «sicarios» y la más literal «hombres de la daga». Se ajusta [a] para que ofrezca una alternativa real al sentido de ἔρημος. También se mejora «sacó» a «llevó», que refleja mejor el valor de ἐξαγαγών en este contexto de conducción de un grupo.
