  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. La cuestión léxica clave es τῶν σικαρίων: para alinearse con la decisión documentada del POB inglés, el texto principal en español debe usar «de los asesinos» y reservar «de los sicarios» / «de los hombres de la daga» para nota. Para ἔρημον, la mejor alineación con «the wilderness» es «la región despoblada» o «el desierto». En español bíblico legible, «el desierto» es aceptable como principal si la nota ofrece «la región despoblada» o equivalente; lo actual debe corregirse porque la nota duplica el texto.'
