  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: pregunta inferencial, identificación de «el egipcio», referencia temporal reciente, agitación política, conducción de un grupo definido al lugar despoblado, y mención de los σικάριοι. Sin embargo, se aparta del audit trail inglés en dos puntos relevantes: pone «de los sicarios» en el texto principal donde el POB inglés eligió el sentido transparente «assassins», y además invierte la nota, dejando «asesinos» solo como alternativa. También hay una inconsistencia entre el texto principal («al desierto») y la nota, que presenta «el desierto» como alternativa cuando ya es la lectura usada; el inglés prioriza «the wilderness» como texto principal y deja «desert» como alternativa.'
