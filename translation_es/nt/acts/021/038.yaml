translation:
  language: es
  text: Entonces, ¿no eres tú el egipcio que hace algunos días provocó una revuelta y llevó al desierto[a] a los cuatro mil hombres de los asesinos?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una región despoblada». El griego ἔρημος puede referirse al desierto o, más ampliamente, a un lugar deshabitado.
    reason: lexical_alternative
  - marker: b
    text: O «de los hombres de la daga»; griego «de los sicarios», un grupo conocido por ataques con cuchillos ocultos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἄρα
  english_pob_choice: Then ... not
  chosen_spanish: Entonces ... no
  alternatives_spanish:
  - Así que ... no
  - Por tanto ... no
  lexicon: BDAG
  rationale: La combinación introduce una inferencia en forma de pregunta. «Entonces» conserva bien ese matiz inferencial en español natural, sin volver la frase pesada con «por tanto».
- source_word: Αἰγύπτιος
  english_pob_choice: the Egyptian
  chosen_spanish: el egipcio
  alternatives_spanish:
  - ese egipcio
  - aquel egipcio
  lexicon: BDAG
  rationale: El artículo señala una figura conocida para el hablante. «El egipcio» es la forma más directa y mantiene esa referencia definida.
- source_word: πρὸ τούτων τῶν ἡμερῶν
  english_pob_choice: some days ago
  chosen_spanish: hace algunos días
  alternatives_spanish:
  - unos días antes
  - recientemente
  lexicon: BDAG
  rationale: La expresión idiomática indica un tiempo breve anterior al presente. «Hace algunos días» suena natural y no precisa más de lo que el griego dice.
- source_word: ἀναστατώσας
  english_pob_choice: stirred up a revolt
  chosen_spanish: provocó una revuelta
  alternatives_spanish:
  - causó un levantamiento
  - alteró el orden
  lexicon: BDAG
  rationale: En este contexto histórico-político, el verbo apunta a agitación pública e insurrección. «Provocó una revuelta» expresa esa fuerza con claridad sin diluirla en mera confusión.
- source_word: ἐξαγαγὼν
  english_pob_choice: led ... out
  chosen_spanish: sacó ...
  alternatives_spanish:
  - condujo ...
  - llevó ...
  lexicon: BDAG
  rationale: El participio describe que alguien saca o conduce a otros de un lugar a otro. «Sacó» funciona con naturalidad en español y deja implícito el liderazgo del sujeto.
- source_word: ἔρημον
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - la región desierta
  - el desierto inhóspito
  lexicon: BDAG
  rationale: Aunque el término puede abarcar una región despoblada, en español «desierto» comunica bien el lugar apartado. Aquí se conserva la sencillez del original y de la tradición bíblica sin sobreespecificar.
- source_word: τετρακισχιλίους ἄνδρας
  english_pob_choice: the four thousand men
  chosen_spanish: a los cuatro mil hombres
  alternatives_spanish:
  - a cuatro mil hombres
  - a los cuatro mil varones
  lexicon: BDAG
  rationale: El numeral y el sustantivo se traducen de forma directa. Mantener el artículo concuerda con la referencia a un grupo definido.
- source_word: τῶν σικαρίων
  english_pob_choice: of the assassins
  chosen_spanish: de los sicarios
  alternatives_spanish:
  - de los asesinos
  - de los hombres de la daga
  lexicon: BDAG
  rationale: Se preserva el nombre histórico «sicarios», que en español ya funciona como término reconocido y conserva la conexión con el grupo del texto. No se reemplaza por un término más interpretativo en el texto principal.
theological_decisions:
- issue: Referencia a un personaje histórico identificado por el comandante
  english_pob_reading: the Egyptian refers to a known notorious figure; the wording is a question drawing an inference from Paul's speech.
  chosen_spanish_reading: el egipcio se presenta como una figura conocida, en una pregunta inferencial del comandante.
  alternative_spanish_readings:
  - aquel egipcio
  - ese egipcio
  rationale: No hay carga doctrinal directa en el versículo, pero sí una inferencia narrativa. Se conserva el carácter identificador del artículo sin añadir información no presente en el griego.
  doctrine_reference: N/A
- issue: Identificación del grupo σικάριοι
  english_pob_reading: '''of the Sicarii,'' a group known for concealed-knife attacks; English main text uses ''assassins'' with footnote alternative.'
  chosen_spanish_reading: el texto principal usa «sicarios», y la nota ofrece la alternativa histórica y explicativa.
  alternative_spanish_readings:
  - los asesinos
  - los hombres de la daga
  rationale: En español, «sicarios» es un préstamo histórico ya disponible que preserva el nombre del grupo. Para no perder la transparencia lexical, la nota explica que el término alude a hombres de la daga / asesinos, como en el audit trail inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el sentido inferencial de οὐκ ἄρα con «Entonces ... no», alineado con el audit trail inglés. Se mantuvo la figura definida «el egipcio», el valor temporal breve de πρὸ τούτων τῶν ἡμερῶν, y la fuerza política de ἀναστατώσας como «provocó una revuelta». Se preservó el nombre histórico «sicarios» en el texto principal para transparencia léxica, con nota alternativa explicativa. No hubo revisiones aplicadas en el ciclo más reciente, y el pasaje mostró acuerdo mayoritario con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton solo cuando aparezca; este versículo no lo contiene.
  - Se mantiene «desierto» para ἔρημος, con nota que reconoce la alternativa espacial más amplia.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - Se conserva un registro bíblico contemporáneo y readable, sin calco sintáctico innecesario.
