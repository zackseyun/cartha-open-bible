review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: «Cuando oímos estas cosas» refleja ὡς δὲ ἠκούσαμεν ταῦτα; «nosotros y los habitantes del lugar» transmite ἡμεῖς τε καὶ οἱ ἐντόπιοι; y «que no subiera a Jerusalén» preserva correctamente el idiomatismo de ἀναβαίνειν. Sin embargo, «le rogábamos» eleva παρακαλέω hacia súplica más intensa que la decisión auditada principal «urged», y además la nota al pie en «oímos» introduce una alternativa menos pertinente que la nota inglesa, que se centra en la fuerza de παρακαλέω.'
  spanish_quality_summary: El español es natural y claro, pero puede afinarse para ajustarse mejor al equilibrio entre fidelidad y legibilidad. «Le insistíamos que» suena menos idiomático; una construcción como «le insistíamos en que» o mejor «le suplicábamos/rogábamos» sería fluida, pero eso sobretraduce el matiz principal documentado. La mejor solución es «le insistíamos en que no subiera» o «le pedíamos que no subiera»; de ellas, «insistíamos en que» conserva mejor el imperfecto y la presión continua sin cargar tanto la emoción como «rogábamos».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Se conserva bien «subiera a Jerusalén» para el idiomatismo de ἀναβαίνειν. El ajuste recomendado es léxico-estilístico en παρακαλέω y en la ubicación de la nota alternativa, moviéndola a ese verbo para reflejar la auditoría inglesa.
  issues:
  - severity: medium
    issue: «Le rogábamos» sobreintensifica la elección principal para παρακαλέω
    rationale: La auditoría inglesa escogió «urged» como lectura principal y dejó «begged» como alternativa en nota. «Rogábamos» se acerca más a «begged» que a «urged», por lo que conviene una opción española más equilibrada.
  - severity: medium
    issue: La nota al pie está anclada en «oímos» en vez de en παρακαλέω
    rationale: La nota inglesa preserva una alternativa léxica para παρεκαλοῦμεν («begged»). La nota española actual introduce una alternativa para ἠκούσαμεν que no corresponde al rastro de auditoría principal.
  - severity: low
    issue: La construcción verbal puede sonar más idiomática
    rationale: Si se usa «insistíamos», en español pide naturalmente «insistíamos en que no subiera». Esto mejora la fluidez sin apartarse del sentido.
  revised_spanish_text: Cuando oímos estas cosas, nosotros y los habitantes del lugar le insistíamos[a] en que no subiera a Jerusalén.
  revised_footnotes:
  - marker: a
    text: O «le rogábamos que no subiera a Jerusalén». El verbo también puede expresar una súplica insistente.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear mejor παρακαλέω con la decisión principal auditada («urged») y trasladar la nota alternativa al verbo correcto. «Le insistíamos en que» conserva la idea de apremio repetido del imperfecto y evita sobrecargar el tono emocional, mientras que la nota preserva la posibilidad de una súplica más intensa.
