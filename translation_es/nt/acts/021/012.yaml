translation:
  language: es
  text: Cuando oímos estas cosas, nosotros y los habitantes del lugar le insistíamos[a] en que no subiera a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le rogábamos que no subiera a Jerusalén». El verbo también puede expresar una súplica insistente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: Introduce la circunstancia temporal de manera natural en español; δέ queda implícito como transición suave, sin necesidad de sobrecargar la frase.
- source_word: ἠκούσαμεν
  english_pob_choice: we heard
  chosen_spanish: oímos
  alternatives_spanish:
  - escuchamos
  - habíamos oído
  lexicon: BDAG
  rationale: El aoristo aquí marca el hecho de oír lo que se dijo antes; «oímos» es directo y idiomático en español, con valor de pasado simple.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural remite al contenido profético anterior; «estas cosas» conserva el plural sin especificar más de lo que el texto dice.
- source_word: παρεκαλοῦμεν
  english_pob_choice: urged
  chosen_spanish: le rogábamos
  alternatives_spanish:
  - le instábamos
  - le suplicábamos
  - le insistíamos
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar rogar, instar o apelar. En este contexto de intensa persuasión, «rogábamos» refleja bien el matiz de súplica continua del imperfecto y el objeto indirecto implícito de la petición.
- source_word: ἡμεῖς τε καὶ οἱ ἐντόπιοι
  english_pob_choice: we and the local people
  chosen_spanish: nosotros y los habitantes del lugar
  alternatives_spanish:
  - nosotros y los locales
  - nosotros y la gente del lugar
  - nosotros y los residentes del lugar
  lexicon: BDAG
  rationale: La construcción coordina dos grupos que se unen en la petición. «Habitantes del lugar» expresa ἐντόπιοι de forma clara, neutra y fiel al sentido de personas del mismo sitio.
- source_word: τοῦ μὴ ἀναβαίνειν
  english_pob_choice: not to go up
  chosen_spanish: que no subiera
  alternatives_spanish:
  - que no fuera a Jerusalén
  - que no ascendiera
  - que no subiese
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa el contenido de la súplica. «Subiera» preserva el idiomatismo bíblico de ἀναβαίνειν para Jerusalén, sin volverlo artificial.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El pronombre se refiere a Pablo como destinatario de la súplica. En español, el dativo de persona se expresa mejor con «le» dentro de la perífrasis verbal.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - hacia Jerusalén
  lexicon: BDAG
  rationale: La preposición de destino se traduce con «a»; el nombre propio se adapta a la forma española común «Jerusalén».
theological_decisions:
- issue: Idiomático de «subir» a Jerusalén
  english_pob_reading: go up to Jerusalem
  chosen_spanish_reading: subiera a Jerusalén
  alternative_spanish_readings:
  - fuera a Jerusalén
  - ascendiera a Jerusalén
  rationale: Se conserva el giro convencional de viaje a Jerusalén porque corresponde al verbo ἀναβαίνειν y al uso bíblico heredado; no se sustituye por un verbo más genérico salvo para evitar pesadez sintáctica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo inglés y quedó sin cambios; la versión española mantiene esa lectura alta en la que la petición es una súplica insistente y la dirección hacia Jerusalén se expresa con el idiomatismo bíblico de «subir».
  spanish_consistency_notes:
  - Se usa «Yahvé» según la pauta general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la tensión entre «rogar» e «instar» de παρακαλέω mediante «rogábamos», que en español puede abarcar súplica insistente sin perder naturalidad.
  - «Subiera a Jerusalén» mantiene el valor direccional de ἀναβαίνειν sin añadir interpretación adicional.
