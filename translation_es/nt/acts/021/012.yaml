revisions:
- from: Cuando oímos[a] estas cosas, nosotros y los habitantes del lugar le rogábamos que no subiera a Jerusalén.
  to: Cuando oímos estas cosas, nosotros y los habitantes del lugar le insistíamos[a] en que no subiera a Jerusalén.
  rationale: Se revisa para alinear mejor παρακαλέω con la decisión principal auditada («urged») y trasladar la nota alternativa al verbo correcto. «Le insistíamos en que» conserva la idea de apremio repetido del imperfecto y evita sobrecargar el tono emocional, mientras que la nota preserva la posibilidad de una súplica más intensa.
