  text: ἐκινήθη τε ἡ πόλις ὅλη καὶ ἐγένετο συνδρομὴ τοῦ λαοῦ, καὶ ἐπιλαβόμενοι τοῦ Παύλου εἷλκον αὐτὸν ἔξω τοῦ ἱεροῦ, καὶ εὐθέως ἐκλείσθησαν αἱ θύραι.
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/030.yaml
  text: And the whole city was stirred up[a], and a crowd of the people formed; and after seizing Paul, they dragged him outside the temple[c][b], and immediately the doors were shut.
  footnotes:
  - marker: a
    text: Or 'the people rushed together.' The Greek expression describes a sudden convergence of the crowd.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'the gates were shut,' since the word can refer to access doors/gates in this temple setting.
    reason: lexical_alternative
