    issue: «lo arrastraban» y su nota [b] contradicen la evidencia y la revisión POB auditada
    rationale: El expediente muestra que εἷλκον fue adjudicado en la revisión vigente como «they dragged», y además la nota española afirma incorrectamente que aquí el griego expresa imperfecto en curso. Esa explicación no debe conservarse.
  - severity: medium
    issue: «prender a Pablo» no es la opción más natural ni más físicamente concreta para ἐπιλαβόμενοι
    rationale: Aunque puede entenderse, «prender» suele sonar a arresto formal o regionalismo. El participio describe agarrarlo físicamente; «agarrar» o «apoderarse de» comunica mejor la acción corporal.
  - severity: low
    issue: «enseguida» podría elevarse a «inmediatamente»
    rationale: Ambas son válidas, pero «inmediatamente» refleja con más precisión y dignidad narrativa el εὐθέως y armoniza con el POB inglés.
