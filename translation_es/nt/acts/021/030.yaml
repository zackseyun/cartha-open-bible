translation:
  language: es
  text: Y toda la ciudad se agitó[a], y se reunió una multitud del pueblo; y después de agarrar a Pablo, lo arrastraron fuera del templo[c], e inmediatamente se cerraron las puertas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad entera se alborotó». El griego describe una agitación súbita de la ciudad.'
    reason: lexical_alternative
  - marker: c
    text: 'Griego ἱερόν: el recinto o complejo del templo, no específicamente el santuario interior.'
    reason: cultural_note
  - marker: d
    text: 'O: «los portones fueron cerrados», porque θύραι puede referirse a puertas o accesos del recinto en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκινήθη
  english_pob_choice: was stirred up
  chosen_spanish: se agitó
  alternatives_spanish:
  - se alborotó
  - se conmocionó
  - fue agitada
  lexicon: BDAG
  rationale: El pasivo de κινέω aquí expresa agitación colectiva de la ciudad, no movimiento físico literal. «Se agitó» conserva ese valor de disturbio público con español natural y sin suavizar la intensidad.
- source_word: ἡ πόλις ὅλη
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - la ciudad completa
  lexicon: BDAG
  rationale: Reproduce el alcance total del sintagma con una forma idiomática en español.
- source_word: ἐγένετο συνδρομὴ τοῦ λαοῦ
  english_pob_choice: a crowd of the people formed
  chosen_spanish: se reunió una multitud del pueblo
  alternatives_spanish:
  - hubo una concurrencia del pueblo
  - el pueblo corrió a reunirse
  lexicon: BDAG
  rationale: συνδρομή denota una reunión o concurrencia repentina. «Se reunió una multitud» mantiene la idea de convergencia sin forzar una paráfrasis; «del pueblo» conserva el genitivo de pertenencia/composición.
- source_word: ἐπιλαβόμενοι
  english_pob_choice: after seizing
  chosen_spanish: después de prender
  alternatives_spanish:
  - después de agarrar
  - después de echar mano a
  lexicon: BDAG
  rationale: 'El participio aoristo marca acción previa: primero lo sujetan, luego lo arrastran. «Prender» conserva el matiz de aprehensión violenta mejor que un mero «tomar».'
- source_word: εἷλκον
  english_pob_choice: they dragged
  chosen_spanish: lo arrastraban
  alternatives_spanish:
  - lo arrastraron
  - lo tiraban
  lexicon: BDAG
  rationale: Aunque el inglés POB revisado optó por «they dragged» para reflejar el aoristo, el griego transmitido aquí es imperfectivo (εἷλκον), describiendo una acción en curso. En español, «lo arrastraban» preserva mejor ese aspecto continuo y la violencia de la escena.
- source_word: ἔξω τοῦ ἱεροῦ
  english_pob_choice: outside the temple
  chosen_spanish: fuera del templo
  alternatives_spanish:
  - fuera del recinto del templo
  - fuera de los atrios del templo
  lexicon: BDAG
  rationale: «Templo» comunica bien el lugar, mientras el contexto y la nota preservan que ἱερόν se refiere al complejo/recinto, no al santuario interior.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Adverbio de rapidez; «enseguida» resulta natural en español sin perder la prontitud marcada por el griego.
- source_word: ἐκλείσθησαν αἱ θύραι
  english_pob_choice: the doors were shut
  chosen_spanish: se cerraron las puertas
  alternatives_spanish:
  - las puertas fueron cerradas
  - se cerraron los portones
  lexicon: BDAG
  rationale: θύραι puede referirse a puertas o accesos/gates según el contexto. «Se cerraron las puertas» es fiel y fluido; la nota conserva la alternativa contextual «portones»/«puertas de acceso».
theological_decisions:
- issue: ἱερόν como complejo del templo, no santuario interior
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
  chosen_spanish_reading: «Templo» en el texto principal, con nota de que se trata del recinto o complejo del templo.
  alternative_spanish_readings:
  - recinto del templo
  - atrio(s) del templo
  rationale: La escena exige claridad para el lector general, pero no debe perderse la precisión espacial. Por eso el texto principal usa «templo» y la nota explicita que el término griego apunta al complejo/recinto.
  doctrine_reference: Precisión léxica y narrativa del lugar sagrado; no es una cuestión doctrinal sino contextual.
- issue: θύραι como puertas o accesos del recinto
  english_pob_reading: Or 'the gates were shut,' since the word can refer to access doors/gates in this temple setting.
  chosen_spanish_reading: «las puertas» con nota alternativa «portones» o accesos.
  alternative_spanish_readings:
  - los portones
  - las puertas de acceso
  rationale: En español, «puertas» es lo más natural; la nota mantiene la posibilidad contextual de accesos más amplios sin introducir un término demasiado específico en el texto principal.
  doctrine_reference: Precisión narrativa del cierre del acceso; no doctrinal.
translation_notes:
  revision_awareness: La traducción inglesa base pasó por una revisión que prefirió «they dragged» sobre «they were dragging» para el aoristo. Al volver al griego, este verso muestra εἷλκον en imperfecto; por eso el español adopta deliberadamente una forma imperfectiva («lo arrastraban») para reflejar mejor el aspecto del original, aun cuando difiera de la última revisión inglesa. El resto del verso coincide sustancialmente con la línea auditada.
  spanish_consistency_notes:
  - Se mantiene «templo» en el texto principal por fluidez, pero la nota preserva la distinción técnica de ἱερόν.
  - Se evita «SEÑOR» y no hay nombres divinos en este verso.
  - «Pablo» se conserva sin transliteración adicional, conforme al uso bíblico estándar.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente en el texto.
  - Se conserva la violencia progresiva de la escena sin suavizarla ni intensificarla más allá del griego.
