translation:
  language: es
  text: 'Pero Pablo dijo[a]: «Yo soy, en verdad, judío, ciudadano de Tarso en Cilicia, de una ciudad nada insignificante. Y te ruego que me permitas hablar al pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy un judío, un tarseo de Cilicia, ciudadano de una ciudad nada insignificante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: Conserva la autoidentificación masculina singular de Pablo y suena natural en español. “Persona” sería posible, pero diluye el matiz del original y no refleja tan directamente la formulación del griego ni la elección inglesa de “man”.
- source_word: Ἰουδαῖος
  english_pob_choice: Jewish
  chosen_spanish: judío
  alternatives_spanish:
  - judeo
  - de Judea
  lexicon: BDAG
  rationale: El contexto presenta la identidad étnico-religiosa de Pablo, no solo un origen regional. En español, “judío” funciona de modo natural como adjetivo y mantiene la misma distinción que la opción inglesa “Jewish” frente a “a Jew” o “Judean”.
- source_word: Ταρσεὺς τῆς Κιλικίας
  english_pob_choice: a citizen of Tarsus in Cilicia
  chosen_spanish: ciudadano de Tarso en Cilicia
  alternatives_spanish:
  - tarseo de Cilicia
  - originario de Tarso en Cilicia
  lexicon: BDAG
  rationale: La estructura española mantiene la identidad cívica y geográfica sin forzar un giro poco natural. “Tarseo” existe, pero resulta más marcado; “ciudadano de Tarso” comunica bien la idea de pertenencia cívica que el audit trail inglés resalta.
- source_word: οὐκ ἀσήμου πόλεως
  english_pob_choice: of no insignificant city
  chosen_spanish: de una ciudad nada insignificante
  alternatives_spanish:
  - de una ciudad importante
  - de una ciudad nada común
  - de una ciudad no insignificante
  lexicon: BDAG
  rationale: Se conserva la litotes del griego, igual que la versión inglesa, sin convertirla de inmediato en una afirmación simple como “importante”. “Nada insignificante” suena natural en español y preserva la tensión retórica.
- source_word: πολίτης
  english_pob_choice: citizen
  chosen_spanish: ciudadano
  alternatives_spanish:
  - habitante
  lexicon: BDAG
  rationale: “Ciudadano” expresa estatus cívico, no solo residencia, y corresponde a la fuerza de la palabra griega y a la decisión inglesa. “Habitante” perdería esa carga jurídica/cívica.
- source_word: δέομαι
  english_pob_choice: I beg you
  chosen_spanish: te ruego
  alternatives_spanish:
  - te suplico
  - te imploro
  lexicon: BDAG
  rationale: En español, “te ruego” transmite una súplica respetuosa y fuerte sin sonar tan enfático como “te suplico” o tan elevado como “te imploro”. Mantiene la intensidad del ruego que el audit trail inglés señala.
- source_word: ἐπίτρεψόν μοι
  english_pob_choice: permit me
  chosen_spanish: me permitas
  alternatives_spanish:
  - me concedas
  - me dejes
  lexicon: BDAG
  rationale: La forma verbal en español conserva el tono de solicitud formal del original y se acomoda con naturalidad al régimen de “ruego que…”. “Me permitas” refleja bien la relación de autorización del griego.
- source_word: λαλῆσαι
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - dirigirme
  - hablarles
  lexicon: BDAG
  rationale: En este contexto público y directo, “hablar” es el equivalente más natural y fiel. “Dirigirme” añade interpretación; “hablarles” ya especifica el objeto de modo no requerido por el griego.
- source_word: πρὸς τὸν λαόν
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  lexicon: BDAG
  rationale: “Pueblo” preserva el valor colectivo de λαός mejor que “multitud”, que suena más circunstancial. También evita reducir el alcance a un mero grupo presente, manteniendo la opción inglesa “the people”.
- source_word: μέν
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - en efecto
  lexicon: BDAG
  rationale: La partícula enfatiza la autoafirmación de Pablo. “En verdad” reproduce ese énfasis de manera idiomática y evita sobreinterpretar la función de μέν más allá de su valor enfático aquí.
theological_decisions:
- issue: Valor de Ἰουδαῖος en la autoidentificación de Pablo
  english_pob_reading: Jewish / Jew rather than Judean
  chosen_spanish_reading: judío, no “de Judea”
  alternative_spanish_readings:
  - judeano
  - de Judea
  rationale: El contexto contrapone la identidad de Pablo con su lugar de origen cívico (Tarso en Cilicia). Traducirlo como “judío” preserva la identidad étnico-religiosa que el texto comunica antes al comandante romano, sin sugerir erróneamente que procede de Judea.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el griego: conserva la litotes de “of no insignificant city”, mantiene la fuerza de la súplica de δέομαι y deja explícita la identidad judía de Pablo sin convertirla en un origen regional. No se introdujeron cambios doctrinales ni armonizaciones con formulaciones tradicionales ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo “pueblo” para λαός por consistencia con el valor colectivo del sustantivo en el NT, evitando “gente” o “multitud” salvo cuando el contexto lo exija.
  - Se prefirió “Tarso” como nombre propio y “ciudadano” para πολίτης, conservando la distinción entre origen geográfico y estatus cívico.
  - Se preservó la litotes mediante “nada insignificante”, en línea con la solución inglesa y con la retórica griega.
