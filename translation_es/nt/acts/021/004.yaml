translation:
  language: es
  text: Después de encontrar a los discípulos[a], nos quedamos allí siete días. Ellos seguían diciéndole a Pablo, por medio del Espíritu, que no subiera a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu». La frase puede indicar que el Espíritu reveló el sufrimiento que le esperaba a Pablo, y que los discípulos dedujeron de eso que él no debía seguir hacia Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνευρόντες
  english_pob_choice: After finding
  chosen_spanish: Después de encontrar
  alternatives_spanish:
  - habiendo encontrado
  - cuando encontramos
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción anterior a la principal. «Después de encontrar» conserva la relación temporal de forma natural en español sin sobreexplicar.
- source_word: μαθητάς
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los creyentes
  - los discípulos allí
  lexicon: BDAG
  rationale: «Discípulos» mantiene el término técnico de Lucas-Hechos y refleja mejor el vocablo griego que una generalización como «creyentes».
- source_word: ἐπεμείναμεν αὐτοῦ
  english_pob_choice: we stayed there
  chosen_spanish: nos quedamos allí
  alternatives_spanish:
  - permanecimos allí
  - nos quedamos con ellos allí
  lexicon: BDAG
  rationale: El verbo expresa permanecer/quedarse; αὐτοῦ funciona idiomáticamente como «allí». «Nos quedamos allí» es natural y fiel.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  lexicon: BDAG
  rationale: El acusativo expresa duración. En español, la duración queda clara con «siete días» sin necesidad de añadir una preposición.
- source_word: ἔλεγον
  english_pob_choice: kept telling
  chosen_spanish: seguían diciéndole
  alternatives_spanish:
  - le decían
  - insistían en decirle
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o continua. «Seguían diciéndole» conserva ese matiz mejor que un simple pretérito.
- source_word: διὰ τοῦ πνεύματος
  english_pob_choice: through the Spirit
  chosen_spanish: por medio del Espíritu
  alternatives_spanish:
  - por el Espíritu
  - a través del Espíritu
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa medio/mediación. «Por medio del Espíritu» suena claro en español y preserva el valor instrumental sin decidir de más si se trata de canal, impulso o mediación profética.
- source_word: μὴ ἐπιβαίνειν
  english_pob_choice: not to go up
  chosen_spanish: que no subiera
  alternatives_spanish:
  - que no fuera
  - que no pusiera rumbo
  lexicon: BDAG
  rationale: En el contexto de viajar a Jerusalén, ἐπιβαίνειν puede funcionar como ir hacia una meta; «subiera» conserva además la dirección tradicional asociada con Jerusalén en el lenguaje bíblico.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: La meta del movimiento se expresa con «a Jerusalén», opción natural para destino de viaje en español.
theological_decisions:
- issue: Relación entre la advertencia «por medio del Espíritu» y el mandato de no subir a Jerusalén
  english_pob_reading: through the Spirit
  chosen_spanish_reading: por medio del Espíritu
  alternative_spanish_readings:
  - por el Espíritu
  - a través del Espíritu
  rationale: 'La traducción mantiene la ambigüedad interpretativa del pasaje: el texto afirma que el mensaje fue comunicado por mediación del Espíritu, pero no fuerza a resolver si el Espíritu mandó directamente a Pablo no ir, o si reveló sufrimientos futuros y los discípulos concluyeron la advertencia. Así se conserva la tensión textual documentada en la nota inglesa.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el trazado auditado del inglés POB. Se conserva el valor aspectual del imperfecto, la mediación de διά con genitivo y la tensión interpretativa sobre la advertencia espiritual sin introducir «Espíritu Santo» donde el griego solo dice πνεῦμα.
  spanish_consistency_notes:
  - Se usa «discípulos» de manera consistente como equivalente de μαθηταί en Hechos.
  - Se evita «SEÑOR» o añadidos litúrgicos no presentes en el verso.
  - Se mantiene «Espíritu» con mayúscula por el contexto, pero sin ampliar innecesariamente a «Espíritu Santo».
  - «Subiera» preserva el sentido direccional asociado a Jerusalén y la forma idiomática del pasaje.
