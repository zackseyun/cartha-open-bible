translation:
  language: es
  text: Después de arrancarnos de ellos y zarpar[a], navegamos en línea recta y llegamos a Cos, al día siguiente a Rodas, y de allí a Pátara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cos» también puede transliterarse «Kos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἐγένετο
  english_pob_choice: After
  chosen_spanish: Después de que
  alternatives_spanish:
  - Cuando
  - Luego que
  lexicon: BDAG
  rationale: La construcción temporal introduce el siguiente episodio narrativo; «Después de que» transmite esa transición de modo natural en español sin forzar una calca.
- source_word: ἀναχθῆναι
  english_pob_choice: put out to sea
  chosen_spanish: zarpamos
  alternatives_spanish:
  - salimos al mar
  - levamos anclas
  lexicon: BDAG
  rationale: El verbo náutico pide una expresión española igualmente marítima. «Zarpamos» comunica bien el movimiento de partida por mar y es idiomático para lectores actuales.
- source_word: ἀποσπασθέντας ἀπ’ αὐτῶν
  english_pob_choice: had torn ourselves away from them
  chosen_spanish: nos separamos de ellos
  alternatives_spanish:
  - nos arrancamos de ellos
  - nos apartamos de ellos
  lexicon: BDAG
  rationale: El griego puede sugerir una separación afectiva o difícil, pero en español «nos separamos de ellos» conserva el hecho de la despedida sin sonar artificial. Se evita intensificar más allá de lo que la frase española soporta de forma natural.
- source_word: εὐθυδρομήσαντες
  english_pob_choice: ran a straight course
  chosen_spanish: navegamos en línea recta
  alternatives_spanish:
  - seguimos un rumbo directo
  - navegamos directamente
  lexicon: BDAG
  rationale: La idea es de navegación directa. «Navegamos en línea recta» preserva la imagen de rumbo recto y funciona con claridad en español.
- source_word: ἤλθομεν εἰς
  english_pob_choice: came to
  chosen_spanish: llegamos a
  alternatives_spanish:
  - fuimos a
  - arribamos a
  lexicon: BDAG
  rationale: En un relato de viaje, «llegamos a» es la equivalencia natural de ἤλθομεν εἰς y mantiene fluidez narrativa.
- source_word: Κῶ
  english_pob_choice: Cos
  chosen_spanish: Cos
  alternatives_spanish:
  - Kos
  lexicon: BDAG
  rationale: Se conserva la forma tradicional en español para el topónimo, acorde con el uso bíblico habitual y legible para el público hispano.
- source_word: τῇ δὲ ἑξῆς
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - a la jornada siguiente
  lexicon: BDAG
  rationale: La locución temporal se vierte de manera idiomática con «al día siguiente».
- source_word: Ῥόδον
  english_pob_choice: Rhodes
  chosen_spanish: Rodas
  alternatives_spanish:
  - Rodas (Rhodes)
  lexicon: BDAG
  rationale: Se usa la forma castellana «Rodas», usual y transparente para lectores en español.
- source_word: κἀκεῖθεν
  english_pob_choice: from there
  chosen_spanish: y de allí
  alternatives_spanish:
  - y desde allí
  - de allí
  lexicon: BDAG
  rationale: La crasis aporta continuidad en la secuencia del viaje; «y de allí» mantiene el encadenamiento narrativo con naturalidad.
- source_word: Πάταρα
  english_pob_choice: Patara
  chosen_spanish: Pátara
  alternatives_spanish:
  - Patara
  lexicon: BDAG
  rationale: Se adapta el topónimo a la grafía española más natural, con acento ortográfico para la pronunciación.
translation_notes:
  revision_awareness: El texto inglés reciente no cambió y la revisión fue marcada como unchanged; por eso se mantiene la misma comprensión narrativa del viaje, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se prefiere «zarpamos» para el verbo náutico y «llegamos a» para el movimiento narrativo.
  - 'Los topónimos se adaptan al uso español cuando existe forma tradicional clara: Cos, Rodas, Pátara.'
  - Se conserva una nota de alternativa para Cos/Kos porque el inglés auditado la documenta explícitamente.
