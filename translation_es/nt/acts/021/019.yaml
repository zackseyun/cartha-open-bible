translation:
  language: es
  text: Y después de saludarlos, comenzó a relatar[a] uno por uno lo que Dios había hecho entre los gentiles[b] por medio de su ministerio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «explicó» o «narró». El verbo griego sugiere un informe amplio, contado elemento por elemento.
    reason: lexical_alternative
  - marker: b
    text: O «entre las naciones». En este contexto, la expresión se refiere a los gentiles, es decir, a los pueblos no judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασάμενος
  english_pob_choice: after greeting
  chosen_spanish: después de saludarlos
  alternatives_spanish:
  - habiéndolos saludado
  - tras saludarlos
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal, por lo que en español conviene expresarlo como acción previa. «Saludarlos» conserva el sentido básico de ἀσπάζομαι y suena natural en español moderno.
- source_word: ἐξηγεῖτο
  english_pob_choice: he began to relate
  chosen_spanish: comenzó a relatar
  alternatives_spanish:
  - explicó
  - narró
  - fue relatando
  lexicon: BDAG
  rationale: El imperfecto medio sugiere una acción en curso o desarrollada. «Comenzó a relatar» comunica el inicio de un informe extenso sin forzar un matiz técnico que el contexto no exige.
- source_word: καθ’ ἓν ἕκαστον
  english_pob_choice: one by one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - en detalle
  - cada cosa individualmente
  - una por una
  lexicon: BDAG
  rationale: La expresión distributiva enfatiza un recuento elemento por elemento. «Uno por uno» es una equivalencia natural en español y preserva la fuerza iterativa del giro griego.
- source_word: ὧν ἐποίησεν ὁ θεός
  english_pob_choice: the things that God had done
  chosen_spanish: lo que Dios había hecho
  alternatives_spanish:
  - las cosas que Dios había hecho
  - lo que Dios hizo
  lexicon: BDAG
  rationale: El relativo con verbo aoristo refiere actos concretos de Dios. «Lo que Dios había hecho» mantiene a Dios como agente principal y funciona bien dentro de la sintaxis española del informe.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  - entre los no judíos
  lexicon: BDAG
  rationale: En este contexto de Hechos, ἔθνη designa a los gentiles, no a naciones en sentido político. «Entre los gentiles» es claro y respeta el uso neotestamentario.
- source_word: διὰ τῆς διακονίας αὐτοῦ
  english_pob_choice: through his ministry
  chosen_spanish: por medio de su ministerio
  alternatives_spanish:
  - por medio de su servicio
  - a través de su ministerio
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por medio de su ministerio» conserva la idea instrumental y evita cargar la palabra con un matiz eclesiástico no explicitado por el texto.
theological_decisions:
- issue: Agencia divina y mediación humana en el informe de Pablo
  english_pob_reading: God is presented as the one who acted, with Paul as the instrumental servant through whose ministry those acts occurred.
  chosen_spanish_reading: Dios aparece como el actor principal, y el ministerio de Pablo como el medio por el cual se dieron esos hechos.
  alternative_spanish_readings:
  - Pablo hizo esas obras entre los gentiles
  - Dios actuó, pero Pablo queda en segundo plano
  rationale: La cláusula ὧν ἐποίησεν ὁ θεός atribuye la acción a Dios, mientras que διὰ τῆς διακονίας αὐτοῦ señala el ministerio de Pablo como medio. La redacción española mantiene ambas dimensiones sin diluir ni la acción divina ni la instrumentalidad humana.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue de cerca el trazado del audit trail en inglés y no requiere revisiones adicionales según el registro más reciente, que quedó sin cambios y con concordancia alta.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἔθνη en este contexto, conforme al uso contextual del griego y al criterio POB.
  - Se conserva la agencia de Dios explícita en «lo que Dios había hecho».
  - «Ministerio» traduce διακονία en sentido de labor apostólica, no como cargo eclesiástico técnico.
  - La nota a evita una equivalencia rígida con «naciones» sin negar esa posibilidad semántica general en otros contextos.
