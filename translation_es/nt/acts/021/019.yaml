review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica y la agencia divina del griego: Pablo saluda, luego informa detalladamente lo que Dios hizo entre los gentiles por medio de su ministerio. También conserva adecuadamente el valor distributivo de καθ’ ἓν ἕκαστον con «uno por uno». Sin embargo, la colocación de las notas no sigue fielmente el rastro de auditoría inglés: la nota sobre ἐξηγεῖτο debe anclarse al verbo de relatar, y la nota sobre ἐν τοῖς ἔθνεσιν debe anclarse a «gentiles», no a «saludarlos».'
  spanish_quality_summary: 'El texto es natural y claro en español eclesial contemporáneo. «Y después de saludarlos, comenzó a relatar uno por uno…» suena idiomático y digno. La principal deficiencia es editorial: una nota está anclada al lugar equivocado y otra contiene un error de codificación/mezcla de escritura («اليهودíos»), lo cual afecta la legibilidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. θεός se traduce correctamente como «Dios»; ἔθνεσιν se vierte adecuadamente como «gentiles» con alternativa «naciones» en nota; διακονίας como «ministerio» es aceptable en este contexto. No aparecen términos de glosario sensible como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a palabras equivocadas en el texto español.
    rationale: La nota a en inglés explica ἐν τοῖς ἔθνεσιν («entre los gentiles / entre las naciones»), pero en español fue colocada tras «saludarlos». La nota b explica ἐξηγεῖτο («relató/explicó en detalle»), pero en español fue colocada tras «uno por uno». Deben moverse para reflejar correctamente la evidencia fuente y el rastro POB.
  - severity: high
    issue: 'La nota al pie a contiene un error tipográfico/codificación: «no اليهودíos».'
    rationale: La mezcla de caracteres árabes con español hace inaceptable la nota tal como está y requiere corrección a «no judíos».
  revised_spanish_text: Y después de saludarlos, comenzó a relatar[a] uno por uno lo que Dios había hecho entre los gentiles[b] por medio de su ministerio.
  revised_footnotes:
  - marker: a
    text: O «explicó» o «narró». El verbo griego sugiere un informe amplio, contado elemento por elemento.
    reason: lexical_alternative
  - marker: b
    text: O «entre las naciones». En este contexto, la expresión se refiere a los gentiles, es decir, a los pueblos no judíos.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto base español porque es fiel y natural, pero se corrigen dos problemas: (1) se reubican las notas al pie para que correspondan a las expresiones fuente correctas, según el expediente inglés; y (2) se corrige el error de codificación en la nota sobre «gentiles».'
