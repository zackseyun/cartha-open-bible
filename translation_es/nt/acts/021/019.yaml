  rationale: 'Se mantiene el texto base español porque es fiel y natural, pero se corrigen dos problemas: (1) se reubican las notas al pie para que correspondan a las expresiones fuente correctas, según el expediente inglés; y (2) se corrige el error de codificación en la nota sobre «gentiles».'
