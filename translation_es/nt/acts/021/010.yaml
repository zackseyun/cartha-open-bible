translation:
  language: es
  text: Mientras permanecíamos allí varios días, bajó de Judea un profeta llamado Agabo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιμενόντων
  english_pob_choice: while we were staying there
  chosen_spanish: Mientras permanecíamos allí
  alternatives_spanish:
  - mientras estábamos allí
  - mientras nos quedábamos allí
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa acción continua y marco temporal. «Permanecíamos» conserva la idea de seguir en el mismo lugar sin volverlo demasiado coloquial; el sujeto implícito del contexto narrativo es inclusivo y en español natural corresponde a «nosotros». «Allí» reproduce la referencia anafórica al lugar ya mencionado.
- source_word: ἡμέρας πλείους
  english_pob_choice: for several days
  chosen_spanish: varios días
  alternatives_spanish:
  - muchos días
  - más días
  lexicon: BDAG
  rationale: El acusativo expresa duración de tiempo. «Varios días» comunica de forma natural la extensión temporal y evita el calco incómodo de «más días», que en español suena poco idiomático en este contexto narrativo.
- source_word: κατῆλθέν
  english_pob_choice: came down
  chosen_spanish: bajó
  alternatives_spanish:
  - vino
  - descendió
  lexicon: BDAG
  rationale: El verbo conserva la dirección espacial desde Judea hacia el lugar donde estaban los viajeros. «Bajó» mantiene la imagen direccional del original sin sobrecargar el español; «descendió» sería más literal pero menos natural.
- source_word: ἀπὸ τῆς Ἰουδαίας
  english_pob_choice: from Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - desde Judea
  - procedente de Judea
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo introduce procedencia. «De Judea» es la forma directa y natural en español; «desde Judea» enfatiza más el punto de origen, pero aquí no es necesario.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un profeta inspirado
  - uno que profetizaba
  lexicon: BDAG
  rationale: «Profeta» es la equivalencia normal y fiel del término. El texto identifica a Agabo por su función profética, sin necesidad de ampliación explicativa.
- source_word: ὀνόματι Ἅγαβος
  english_pob_choice: named Agabus
  chosen_spanish: llamado Agabo
  alternatives_spanish:
  - de nombre Agabo
  - nombrado Agabo
  lexicon: BDAG
  rationale: La construcción dativa idiomática ὀνόματι significa «llamado/named». En español, «llamado Agabo» fluye mejor que un calco como «de nombre Agabo», aunque esta última sigue siendo posible. Se conserva el nombre propio en su forma castellana habitual, Agabo.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto griego y con la lectura auditada en inglés: un marco temporal de permanencia continua, seguido por la llegada de un profeta desde Judea. No se detectan tensiones lexicoteológicas que requieran nota.'
  spanish_consistency_notes:
  - Se mantiene el sujeto inclusivo de la narración con «permanecíamos», coherente con el «we» del contexto.
  - No se introduce vocabulario eclesiástico ajeno al griego; «profeta» y «llamado» siguen de cerca la estructura original.
  - La dirección espacial se expresa con un verbo simple y natural en español, sin perder el valor de movimiento descendente.
