revisions:
- from: Y mientras procuraban matarlo, subió un informe al comandante[a] de la cohorte, diciendo que toda Jerusalén estaba en un alboroto.
  to: Y mientras procuraban matarlo, subió un informe al comandante de la cohorte de que toda Jerusalén estaba en un alboroto[a].
  rationale: Se elimina 'diciendo' para no añadir formulación innecesaria al ὅτι griego, y se corrige el anclaje de la nota léxica para que aparezca en la frase que traduce συγχύννεται. Se mantiene el resto por fidelidad al rastro POB y claridad suficiente en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: acción simultánea (''mientras procuraban matarlo''), recepción del aviso por el oficial, y el estado de agitación de Jerusalén. Sin embargo, añade ''diciendo'', que no está en el texto y hace más explícita la relación de contenido de ὅτι de manera menos natural. Además, la nota al pie está mal anclada: la nota léxica sobre συγχύννεται aparece en ''comandante'' en vez de en la expresión de agitación.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'subió un informe' suena algo rígido; aun así, puede mantenerse por transparencia formal al griego. La reparación principal es quitar 'diciendo' y colocar la nota donde corresponde. 'Estaba en un alboroto' es comprensible, pero 'estaba alborotada' o 'estaba en agitación' serían más naturales; no obstante, 'en un alboroto' sigue siendo aceptable si se conserva la alternativa en nota.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'Comandante' para χιλίαρχος y 'cohorte' para σπεῖρα concuerdan con el rastro auditado. No se requiere ajuste de nombres divinos o títulos mesiánicos.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'comandante' pero su contenido explica alternativas para 'estaba en un alboroto'.
    rationale: Las instrucciones exigen que el marcador exacto aparezca en la palabra o frase pertinente. Aquí la nota léxica corresponde a συγχύννεται, no a τῷ χιλιάρχῳ.
  - severity: medium
    issue: Se añadió 'diciendo' en la cláusula de contenido.
    rationale: El griego tiene ὅτι para introducir el contenido del informe, pero 'diciendo que' no es necesario y añade una formulación no presente en el original. '... al comandante de la cohorte que...' basta y es más fiel y natural.
  - severity: low
    issue: '''Estaba en un alboroto'' suena algo menos natural en español que otras opciones.'
    rationale: Aunque transmite bien el sentido de disturbio, en español eclesial general podría sonar más idiomático 'estaba alborotada' o 'estaba en agitación'. No obstante, no es un error de fidelidad.
  revised_spanish_text: Y mientras procuraban matarlo, subió un informe al comandante de la cohorte de que toda Jerusalén estaba en un alboroto[a].
  revised_footnotes:
  - marker: a
    text: O «estaba en confusión» o «estaba en tumulto».
    reason: lexical_alternative
  revision_rationale: Se elimina 'diciendo' para no añadir formulación innecesaria al ὅτι griego, y se corrige el anclaje de la nota léxica para que aparezca en la frase que traduce συγχύννεται. Se mantiene el resto por fidelidad al rastro POB y claridad suficiente en español.
