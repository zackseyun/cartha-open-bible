translation:
  language: es
  text: Y mientras procuraban matarlo, subió un informe al comandante de la cohorte de que toda Jerusalén estaba en un alboroto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba en confusión» o «estaba en tumulto».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητούντων τε
  english_pob_choice: And as they were seeking
  chosen_spanish: Y mientras procuraban
  alternatives_spanish:
  - Y mientras buscaban
  - Y al estar buscando
  lexicon: BDAG
  rationale: El participio en genitivo absoluto expresa acción contemporánea en desarrollo; «mientras procuraban» conserva esa simultaneidad y evita introducir un matiz de intención más fuerte que el griego no exige. «Procuraban» comunica bien el esfuerzo por lograr algo, aquí matar a Pablo.
- source_word: αὐτὸν ἀποκτεῖναι
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - darle muerte
  lexicon: BDAG
  rationale: ἀποκτείνω es el verbo común para matar. «Matarlo» es el equivalente natural y directo en español, sin elevar artificialmente el registro.
- source_word: ἀνέβη φάσις
  english_pob_choice: a report went up
  chosen_spanish: subió un informe
  alternatives_spanish:
  - llegó un informe
  - subió la noticia
  lexicon: BDAG
  rationale: El giro idiomático griego conserva la imagen de un informe que «sube» hacia la autoridad militar. «Subió un informe» mantiene esa transparencia formal y respeta la metáfora espacial del original.
- source_word: τῷ χιλιάρχῳ
  english_pob_choice: to the commander
  chosen_spanish: al comandante
  alternatives_spanish:
  - al tribuno
  - al jefe militar
  lexicon: BDAG
  rationale: χιλίαρχος designa un oficial militar de alto rango, aproximadamente un tribuno. «Comandante» ofrece claridad moderna en español. Se evita transliterar el título y también se evita «tribuno» como forma más técnica pero menos accesible.
- source_word: τῆς σπείρης
  english_pob_choice: of the cohort
  chosen_spanish: de la cohorte
  alternatives_spanish:
  - de la cohorte romana
  - del regimiento
  lexicon: BDAG
  rationale: σπεῖρα se refiere a una unidad militar romana. «Cohorte» es el término más exacto y suficientemente reconocible en español. No se añade «romana» al texto principal porque no aparece explícitamente en esta cláusula.
- source_word: ὅτι ὅλη Ἰερουσαλήμ
  english_pob_choice: that all Jerusalem
  chosen_spanish: que toda Jerusalén
  alternatives_spanish:
  - que Jerusalén entera
  - que toda la ciudad de Jerusalén
  lexicon: BDAG
  rationale: El griego usa una expresión compacta y metonímica. «Toda Jerusalén» preserva esa fuerza sin expandirla innecesariamente.
- source_word: συγχύννεται
  english_pob_choice: was in an uproar
  chosen_spanish: estaba en un alboroto
  alternatives_spanish:
  - estaba en confusión
  - estaba en conmoción
  - estaba en tumulto
  lexicon: BDAG
  rationale: El verbo puede expresar confusión, agitación o trastorno público. En el contexto narrativo de una multitud violenta, «alboroto» comunica bien la perturbación colectiva en español. Se conserva la tensión léxica entre «confusión» y «tumulto/alboroto» mediante una alternativa en nota.
translation_notes:
  revision_awareness: La versión inglesa POB mantiene la imagen de «a report went up» y la ambigüedad léxica de συγχύννεται con alternativas en nota; esta propuesta conserva la metáfora ascendente con «subió un informe» y ofrece una nota española para el rango semántico de la última cláusula. No se documentan revisiones sustantivas en el estado auditado más reciente.
  spanish_consistency_notes:
  - Se usa «comandante» para χιλίαρχος, coherente con la decisión inglesa de evitar el tecnicismo «tribune/chiliarch» en el cuerpo principal.
  - Se mantiene «cohorte» sin añadir «romana» en el texto principal, siguiendo la cautela del audit trail inglés.
  - «Toda Jerusalén» preserva la metonimia compacta del griego y evita una expansión explicativa.
  - El marcador de nota [a] se coloca en «alboroto» para señalar la alternativa semántica documentada para συγχύννεται.
