translation:
  language: es
  text: Cuando llegó el tiempo de completar aquellos días, salimos y seguimos nuestro camino, mientras todos ellos[a], con esposas e hijos, nos acompañaban hasta fuera de la ciudad. Y, después de arrodillarnos en la playa[b], oramos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todos nos despedían”. El verbo griego puede denotar acompañar a alguien al partir como acto de despedida.
    reason: lexical_alternative
  - marker: b
    text: O “en la orilla” o “en la costa”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ ἐγένετο ⸂ἐξαρτίσαι ἡμᾶς⸃ τὰς ἡμέρας
  english_pob_choice: When it came time for us to complete those days
  chosen_spanish: Cuando llegó el tiempo de completar aquellos días
  alternatives_spanish:
  - cuando se cumplieron aquellos días
  - cuando se completaron nuestros días
  - cuando llegó el momento de terminar aquellos días
  lexicon: BDAG
  rationale: Conservo la estructura temporal del griego ἐγένετο + infinitivo con una fórmula natural en español (“llegó el tiempo”), y mantengo la idea de terminar/completar un período definido con “aquellos días”, que refleja el artículo y la referencia concreta al tiempo de estancia.
- source_word: ἐξελθόντες ἐπορευόμεθα
  english_pob_choice: we departed and went on our way
  chosen_spanish: salimos y seguimos nuestro camino
  alternatives_spanish:
  - partimos y seguimos nuestro camino
  - salimos y nos fuimos
  - partimos y fuimos andando
  lexicon: BDAG
  rationale: El participio aoristo más el imperfecto expresa salida seguida de desplazamiento continuo. “Salimos y seguimos nuestro camino” reproduce bien esa secuencia sin sonar forzado en español.
- source_word: προπεμπόντων ἡμᾶς πάντων
  english_pob_choice: they all ... were accompanying us
  chosen_spanish: mientras todos ellos ... nos acompañaban
  alternatives_spanish:
  - mientras todos ellos nos despedían
  - mientras todos ellos nos escoltaban
  - mientras todos ellos nos veían salir
  lexicon: BDAG
  rationale: Prefiero “acompañaban” porque puede incluir el sentido de escoltar/despedir al partir sin restringirlo demasiado. En esta escena, el valor de acto de despedida queda suficientemente insinuado por el contexto.
- source_word: σὺν γυναιξὶ καὶ τέκνοις
  english_pob_choice: with wives and children
  chosen_spanish: con esposas e hijos
  alternatives_spanish:
  - con mujeres e hijos
  - con sus esposas e hijos
  lexicon: BDAG
  rationale: Aquí γυναιξί se entiende mejor como “esposas” que como “mujeres”, porque πάντων es masculino plural y el contexto describe hogares completos acompañando la despedida. “Esposas” comunica con precisión esa relación familiar.
- source_word: ἕως ἔξω τῆς πόλεως
  english_pob_choice: as far as outside the city
  chosen_spanish: hasta fuera de la ciudad
  alternatives_spanish:
  - hasta las afueras de la ciudad
  - hasta afuera de la ciudad
  - hasta más allá de la ciudad
  lexicon: BDAG
  rationale: “Hasta fuera de la ciudad” mantiene la fuerza direccional del griego sin convertirlo en una interpretación más específica como “las afueras”. Es una equivalencia clara y fiel.
- source_word: θέντες τὰ γόνατα
  english_pob_choice: after kneeling down
  chosen_spanish: después de arrodillarnos
  alternatives_spanish:
  - después de poner las rodillas en tierra
  - habiendo doblado las rodillas
  - después de doblar las rodillas
  lexicon: BDAG
  rationale: La expresión es idiomática para “arrodillarse”. Uso “arrodillarnos” porque en español suena natural y conserva el valor anterior a la oración.
- source_word: ἐπὶ τὸν αἰγιαλὸν
  english_pob_choice: on the beach
  chosen_spanish: en la playa
  alternatives_spanish:
  - en la orilla
  - en la costa
  - en el litoral
  lexicon: BDAG
  rationale: αἰγιαλός puede significar playa/orilla. “Playa” es la opción más clara en español moderno; además encaja bien con el contexto de un desembarco o despedida junto al mar. Se conserva la alternativa más amplia en la nota.
- source_word: προσευξάμενοι
  english_pob_choice: we prayed
  chosen_spanish: oramos
  alternatives_spanish:
  - hicimos oración
  - rezamos
  lexicon: BDAG
  rationale: Mantengo un verbo simple y directo para la acción final de la escena. “Oramos” es adecuado al registro bíblico actual y evita una formulación más pesada.
translation_notes:
  revision_awareness: 'El pasaje presenta acuerdo general con el control de revisión: no se requieren cambios sustantivos respecto del sentido del griego ni del criterio auditado en la POB inglesa. La única tensión menor es la elección entre “acompañaban” y “se despedían / escoltaban”; se mantiene “acompañaban” por su amplitud semántica y por la continuidad narrativa.'
  spanish_consistency_notes:
  - 'Se conserva el registro narrativo de primera persona plural con verbos en plural: “salimos”, “seguimos”, “nos acompañaban”, “nos arrodillarnos”, “oramos”.'
  - Se evita sustituir el término concreto por una paráfrasis más interpretativa cuando el griego permite una opción directa y clara.
  - El uso de “esposas” responde al contexto de familias que acompañan a los viajeros, no a una generalización de “mujeres”.
  - “Playa” se usa como equivalente natural de αἰγιαλός, con nota que preserva la alternativa semántica “orilla/costa”.
