base_translation:
  language: en
  yaml_path: translation/nt/acts/021/037.yaml
  text: As Paul was about to be brought into the barracks[a], he said to the tribune, “Is it permitted for me to say something to you?” And he said[c][b], “Do you know Greek?”
  footnotes:
  - marker: a
    text: Or more idiomatically, “May I say something to you?”
    reason: lexical_alternative
  - marker: b
    text: Or “commander.” The Greek term refers to a Roman military officer, traditionally rendered “tribune.”
    reason: cultural_note
  - marker: c
    text: “Barracks” refers to the Roman military quarters, likely within the fortress complex.
    reason: cultural_note
