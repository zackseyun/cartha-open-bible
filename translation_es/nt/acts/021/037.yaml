translation:
  language: es
  text: 'Cuando Pablo estaba a punto de ser introducido en el cuartel[a], dijo al tribuno[b]: «¿Me está permitido decirte algo?». Y él dijo: «¿Sabes griego?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuartel» traduce aquí la zona militar romana a la que se alude en el contexto; el término griego puede referirse al recinto militar o a las dependencias dentro de la fortaleza.
    reason: cultural_note
  - marker: b
    text: «Tribuno» es el equivalente histórico del oficial romano designado por χιλίαρχος; también podría expresarse como «comandante», pero eso es menos específico.
    reason: cultural_note
lexical_decisions:
- source_word: Μέλλων τε εἰσάγεσθαι
  english_pob_choice: was about to be brought in
  chosen_spanish: estando a punto de ser introducido
  alternatives_spanish:
  - estando a punto de ser llevado
  - a punto de ser llevado
  lexicon: BDAG
  rationale: μέλλω expresa inminencia, y εἰσάγεσθαι conserva el matiz pasivo de ser introducido/traído. En español, «estando a punto de ser introducido» mantiene la cercanía temporal y la pasividad sin sonar forzado.
- source_word: παρεμβολή
  english_pob_choice: barracks
  chosen_spanish: cuartel
  alternatives_spanish:
  - barracas
  - fortaleza
  - barracón militar
  lexicon: BDAG
  rationale: En este contexto militar romano, el término alude a las dependencias militares, no a un «campamento» genérico. «Cuartel» comunica bien esa realidad en español moderno y conserva la referencia cultural.
- source_word: χιλίαρχος
  english_pob_choice: tribune
  chosen_spanish: tribuno
  alternatives_spanish:
  - comandante
  - oficial romano
  - tribuno militar
  lexicon: BDAG
  rationale: «Tribuno» es el equivalente histórico tradicional para el oficial romano de este rango. Mantiene la especificidad del término griego sin reemplazarlo por una designación más vaga.
- source_word: Εἰ ἔξεστίν μοι εἰπεῖν τι πρὸς σέ
  english_pob_choice: Is it permitted for me to say something to you?
  chosen_spanish: ¿Me está permitido decirte algo?
  alternatives_spanish:
  - ¿Puedo decirte algo?
  - ¿Se me permite decirte algo?
  lexicon: BDAG
  rationale: ἔξεστιν expresa permiso o autorización. La pregunta griega es formal y cortés; «¿Me está permitido decirte algo?» preserva el sentido de permiso. La alternativa más idiomática se deja implícita en la fluidez del español, pero no se adopta como principal para no suavizar demasiado el matiz.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - una cosa
  - algo que decir
  lexicon: BDAG
  rationale: El pronombre indefinido se expresa naturalmente con «algo» en español, sin necesidad de añadir contenido no presente en el griego.
- source_word: Ἑλληνιστί
  english_pob_choice: Greek
  chosen_spanish: griego
  alternatives_spanish:
  - en griego
  - la lengua griega
  lexicon: BDAG
  rationale: En combinación con γινώσκεις, la idea natural es «¿Sabes griego?». «Griego» reproduce la referencia a la lengua de manera idiomática en español.
- source_word: γινώσκεις
  english_pob_choice: do you know
  chosen_spanish: sabes
  alternatives_spanish:
  - entiendes
  - hablas
  lexicon: BDAG
  rationale: γινώσκω en este contexto de lengua puede implicar conocer, entender o poder usar un idioma. «Sabes» es la opción más directa y natural, y mantiene la amplitud semántica sin forzar una especificación inexistente en el texto.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés auditado, que convirtió la forma condicional a una pregunta directa en inglés («Is it permitted…?»). En español se reflejó directamente como pregunta de permiso, evitando una calca condicional y conservando el tono cortés del griego.
  spanish_consistency_notes:
  - Se mantiene «Jesús/Mesías/Yahvé» según las reglas del proyecto, aunque este versículo no contiene esos términos.
  - Se evita «SEÑOR» como sustituto, porque el pasaje no contiene el nombre divino.
  - «Tribuno» conserva la terminología histórica romana del audit trail en inglés.
  - El orden sintáctico se ajusta al español natural sin perder el valor temporal de la participial griega.
