base_translation:
  language: en
  yaml_path: translation/nt/acts/021/026.yaml
  text: Then Paul took the men[a], and on the next day, having purified himself with them, he entered the temple, giving notice of the completion of the days of purification[b], until the offering was presented for each one of them.
  footnotes:
