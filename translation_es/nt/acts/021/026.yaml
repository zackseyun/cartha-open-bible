  to: Entonces Pablo tomó a los hombres, y al día siguiente, habiéndose purificado con ellos, entró en el templo[a], dando aviso de la culminación de los días de purificación, hasta que fue presentada la ofrenda[b] por cada uno de ellos.
  rationale: Se corrigió la ubicación de la nota sobre ἱερόν para anclarla en «templo[a]», se reemplazó la alternativa incorrecta de la nota [b] por la opción léxica fiel «fue ofrecida», y se ajustó «entraba» a «entró» para una narrativa española más natural y en línea con la revisión final del POB inglés.
