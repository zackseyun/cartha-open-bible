translation:
  language: es
  text: Entonces Pablo tomó a los hombres, y al día siguiente, habiéndose purificado con ellos, entró en el templo[a], dando aviso de la culminación de los días de purificación, hasta que fue presentada la ofrenda[b] por cada uno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los atrios del templo’; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O ‘fue ofrecida’ para ‘fue presentada’.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαβὼν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - llevó consigo
  lexicon: BDAG
  rationale: El participio aoristo indica que Pablo asumió a los hombres para la acción que sigue. «Tomó» es natural en español y conserva la sencillez del verbo sin añadir una relación más explícita de compañía que el griego ya deja entender por el contexto.
- source_word: τῇ ἐχομένῃ ἡμέρᾳ
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: BDAG
  rationale: Es una expresión temporal idiomática de continuidad inmediata. «Al día siguiente» comunica bien el sentido natural y moderno en español.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: La preposición expresa acompañamiento. «Con ellos» es la opción más directa y transparente; «junto con ellos» sería una ampliación estilística innecesaria.
- source_word: ἁγνισθεὶς
  english_pob_choice: having purified himself
  chosen_spanish: habiéndose purificado
  alternatives_spanish:
  - después de purificarse
  - habiéndose sometido a la purificación
  lexicon: BDAG
  rationale: En contexto ritual, el participio tiene fuerza reflexiva/medio. «Habiéndose purificado» conserva esa relación sin volverla pasiva ni introducir una paráfrasis explicativa.
- source_word: εἰσῄει
  english_pob_choice: he entered
  chosen_spanish: entraba
  alternatives_spanish:
  - entró
  - iba entrando
  lexicon: BDAG
  rationale: Aunque el inglés final optó por el pasado simple por fluidez, el imperfecto griego sugiere acción en curso o reiterada. «Entraba» preserva mejor ese matiz aspectual sin sonar forzado en español.
- source_word: εἰς τὸ ἱερόν
  english_pob_choice: the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - al templo
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: Ἱερόν se refiere al complejo del templo, no al santuario interior. «En el templo» es la traducción más clara y general; el sentido de recinto queda suficientemente cubierto sin sobreespecificar.
- source_word: διαγγέλλων
  english_pob_choice: giving notice
  chosen_spanish: dando aviso
  alternatives_spanish:
  - anunciando
  - declarando
  - comunicando
  lexicon: BDAG
  rationale: El participio describe una comunicación formal relacionada con el proceso ritual. «Dando aviso» refleja bien ese carácter procedimental, equivalente a «giving notice».
- source_word: τὴν ἐκπλήρωσιν τῶν ἡμερῶν τοῦ ἁγνισμοῦ
  english_pob_choice: of the completion of the days of purification
  chosen_spanish: de la culminación de los días de purificación
  alternatives_spanish:
  - del cumplimiento de los días de purificación
  - de la finalización de los días de purificación
  lexicon: BDAG
  rationale: ἐκπλήρωσις aquí alude al término o consumación del período ritual. «Culminación» comunica el cierre del período sin sonar tan técnico como «cumplimiento», que en español podría sugerir otras asociaciones.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: Marca el límite temporal de la secuencia. «Hasta que» es la forma natural en español cuando sigue una cláusula verbal.
- source_word: προσηνέχθη
  english_pob_choice: was presented
  chosen_spanish: fue presentada
  alternatives_spanish:
  - fue ofrecida
  - se presentó
  lexicon: BDAG
  rationale: El pasivo de προσφέρω en este contexto cultual puede entenderse como presentación u ofrecimiento. «Fue presentada» preserva la forma más neutral y formal, como en el inglés POB.
- source_word: ὑπὲρ ἑνὸς ἑκάστου αὐτῶν
  english_pob_choice: for each one of them
  chosen_spanish: por cada uno de ellos
  alternatives_spanish:
  - a favor de cada uno de ellos
  - por cada uno de ellos individualmente
  lexicon: BDAG
  rationale: ὑπέρ expresa relación en beneficio o representación. «Por cada uno de ellos» es idiomático en español y mantiene la idea de aplicación individual sin agregar explicación.
- source_word: ἡ προσφορά
  english_pob_choice: the offering
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la ofrenda sacrificial
  - la ofrenda/oblación
  lexicon: BDAG
  rationale: El término es cultual y general. «Ofrenda» es claro y natural en español; «sacrificio» sería demasiado específico y podría estrechar el sentido del sustantivo griego.
theological_decisions:
- issue: Naturaleza de la participación de Pablo en el rito de purificación
  english_pob_reading: Render the verse straightforwardly as describing Paul's participation in Jewish purification procedures without adding explanatory theological framing.
  chosen_spanish_reading: Presentar el hecho de manera directa, como participación de Pablo en un procedimiento ritual judío, sin añadir juicios doctrinales sobre su validez continua o su significado para los cristianos.
  alternative_spanish_readings:
  - Introducir una nota interpretativa que sugiera aprobación o rechazo del rito para la iglesia.
  - Reformular el texto para evitar toda referencia a una práctica ceremonial judía.
  rationale: El versículo narra un hecho y no resuelve por sí mismo debates teológicos más amplios. La traducción debe dejar el relato tal como está, sin importar conclusiones doctrinales ajenas al pasaje.
  doctrine_reference: 'Principios de traducción: transparencia al texto y no importación de conclusiones doctrinales no explícitas.'
- issue: Aspecto verbal de εἰσῄει
  english_pob_reading: Preserve the imperfect nuance with 'he entered.'
  chosen_spanish_reading: Conservar el matiz imperfectivo con «entraba», aun cuando en español sea posible una forma más simple como «entró».
  alternative_spanish_readings:
  - entró
  - iba entrando
  rationale: El imperfecto griego sugiere acción en desarrollo o repetida. «Entraba» mantiene mejor esa apertura aspectual; «entró» sería más fluido, pero menos transparente al valor verbal del original.
  doctrine_reference: 'Principios de traducción: fidelidad al aspecto verbal del original.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde una redacción más aspectualmente explícita ('he was entering') a una forma más natural ('he entered'); en español se optó por conservar la transparencia aspectual del imperfecto con «entraba», manteniendo el resto de las decisiones léxicas y cultuales alineadas con el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «templo» para ἱερόν, con nota alternativa sobre el complejo o recinto del templo, siguiendo la distinción del audit trail.
  - 'Se mantiene vocabulario cultual sobrio: «purificado», «purificación», «ofrenda», evitando estrechar el sentido a una formulación más dogmática.'
  - Se prefirió «entraba» para reflejar el imperfecto griego, aun con el texto inglés final en pasado simple, porque la transparencia al aspecto original es relevante en este caso.
