translation:
  language: es
  text: 'Entonces Pablo respondió: «¿Qué están haciendo, llorando y rompiéndome[a] el corazón? Porque estoy preparado no solo para ser atado, sino aun para morir en Jerusalén por el nombre[b] del Señor Jesús».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quebrantándome el corazón». El verbo griego es más fuerte que una tristeza simple y describe un quebranto interior.
    reason: lexical_alternative
  - marker: b
    text: O «por causa del nombre del Señor Jesús». «El nombre» es una manera bíblica de referirse a Jesús mismo, a su autoridad y a la causa identificada con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: Verbo narrativo natural para una réplica en discurso directo. «Respondió» conserva la función de ἀπεκρίθη sin sonar pesado en español.
- source_word: Τί ποιεῖτε
  english_pob_choice: What are you doing
  chosen_spanish: ¿Qué están haciendo?
  alternatives_spanish:
  - ¿Por qué hacen esto?
  - ¿Qué hacen?
  lexicon: BDAG
  rationale: La pregunta directa preserva el tono de protesta emocional del griego sin introducir una paráfrasis causal que no está explícita en el texto.
- source_word: κλαίοντες
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  - llorando
  lexicon: BDAG
  rationale: En español «llorando» comunica el participio con naturalidad y mantiene el pathos de la escena. «Sollozando» sería más específico de la forma de llorar, pero el griego no exige esa precisión.
- source_word: συνθρύπτοντές μου τὴν καρδίαν
  english_pob_choice: breaking my heart
  chosen_spanish: quebrantándome el corazón
  alternatives_spanish:
  - rompiéndome el corazón
  - aplastándome el corazón
  - quebrándome el corazón
  lexicon: BDAG
  rationale: El verbo expresa una acción de romper/aplastar con fuerza intensa. «Quebrantar» conserva mejor la fuerza metafórica y el matiz de acción violenta que una simple tristeza; «rompiéndome el corazón» es posible, pero «quebrantándome» resalta más el golpe interior.
- source_word: δεθῆναι
  english_pob_choice: to be bound
  chosen_spanish: ser atado
  alternatives_spanish:
  - ser ligado
  - ser encarcelado
  lexicon: BDAG
  rationale: «Ser atado» reproduce con mayor proximidad el sentido básico de δέω. «Ser encarcelado» sería más interpretativo y amplio que el valor léxico inmediato.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - perecer
  - morir
  lexicon: BDAG
  rationale: Infinitivo simple y directo; no requiere expansión en español.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - en Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele significar «a/ hacia», en este contexto la ubicación del sufrimiento se expresa con naturalidad en español como «en Jerusalén» para evitar una construcción artificial.
- source_word: ἑτοίμως ἔχω
  english_pob_choice: I am ready
  chosen_spanish: estoy listo
  alternatives_spanish:
  - estoy preparado
  - estoy dispuesto
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma breve y clara. «Estoy listo» comunica bien la prontitud declarada por Pablo.
- source_word: ὑπὲρ τοῦ ὀνόματος
  english_pob_choice: for the name
  chosen_spanish: por el nombre
  alternatives_spanish:
  - por causa del nombre
  - por el nombre
  lexicon: BDAG
  rationale: Se preserva el idioma bíblico de «el nombre» sin resolverlo en una explicación más larga en el texto principal. «Por» mantiene el valor de causa/relación asumido por el contexto.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Señor Jesús
  - de Jesús el Señor
  lexicon: BDAG
  rationale: «Señor» es la traducción estable de κύριος en referencia a Jesús. Se conserva la forma cristológica reconocible y fiel al audit trail en inglés.
theological_decisions:
- issue: Título κύριος aplicado a Jesús
  english_pob_reading: the Lord Jesus
  chosen_spanish_reading: el Señor Jesús
  alternative_spanish_readings:
  - el Maestro Jesús
  - el Señor Jesús
  rationale: En este contexto κύριος funciona como título cristológico y debe mantenerse como «Señor», no suavizarse. La frase conserva la referencia reverente y doctrinalmente significativa a Jesús.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Idiomático «for the name»
  english_pob_reading: for the name of the Lord Jesus
  chosen_spanish_reading: por el nombre del Señor Jesús
  alternative_spanish_readings:
  - por causa del Señor Jesús
  - por la autoridad del Señor Jesús
  rationale: Se preserva la imagen bíblica de «el nombre», que abarca persona, autoridad y causa. No se expande en el texto principal para no borrar la tensión idiomática documentada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #6'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y coincide sustancialmente con el audit trail inglés revisado más reciente, sin cambios detectados en la última pasada. Se conservan tanto la fuerza de συνθρύπτω como el idiomático «el nombre».
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero aquí el griego cita κύριος referido a Jesús, por lo que corresponde «Señor» en la expresión cristológica.
  - «Jesús» se conserva sin transliteración adicional por ser nombre propio estándar.
  - La puntuación con comillas y dos puntos sigue el uso editorial en español bíblico moderno.
  - Se prefirió «quebrantándome el corazón» en la nota, mientras el texto principal usa «quebrantándome el corazón» para mantener un nivel de intensidad fiel y comprensible.
