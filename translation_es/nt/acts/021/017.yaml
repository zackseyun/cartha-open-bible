translation:
  language: es
  text: Cuando llegamos a Jerusalén, los hermanos[a] nos recibieron con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas»; el griego dice «hermanos», que también puede referirse más ampliamente a los creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένων δὲ ἡμῶν
  english_pob_choice: When we arrived
  chosen_spanish: Cuando llegamos
  alternatives_spanish:
  - Después de que llegamos
  - Cuando vinimos
  lexicon: BDAG
  rationale: El genitivo absoluto con γίνομαι funciona aquí de manera circunstancial y temporal. En español, «Cuando llegamos» comunica de forma natural la llegada sin recurrir a una construcción forzada.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: in Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - hacia Jerusalén
  lexicon: BDAG
  rationale: Con el verbo de llegada implícito en la cláusula, εἰς indica destino. En español, «a Jerusalén» conserva ese sentido direccional de llegada mejor que una localización estática.
- source_word: ἀσμένως
  english_pob_choice: gladly
  chosen_spanish: con alegría
  alternatives_spanish:
  - gozosamente
  - con gusto
  lexicon: BDAG
  rationale: El adverbio expresa recepción gozosa o con agrado. «Con alegría» mantiene ese matiz de bienvenida afectuosa en un español claro y natural.
- source_word: ἀπεδέξαντο
  english_pob_choice: welcomed
  chosen_spanish: nos recibieron
  alternatives_spanish:
  - nos acogieron
  - nos aceptaron
  lexicon: BDAG
  rationale: ἀποδέχομαι aquí se refiere a recibir personas con hospitalidad. «Nos recibieron» reproduce bien el sentido interpersonal de bienvenida.
- source_word: οἱ ἀδελφοί
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego. En el uso cristiano primitivo puede abarcar a la comunidad creyente en sentido más amplio, pero el texto principal mantiene la forma fuente y la posible amplitud se deja implícita.
theological_decisions:
- issue: Renderización de ἀδελφοί en la comunidad cristiana de Jerusalén
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: La lectura principal sigue la forma gramatical del griego. Aunque el referente puede incluir mujeres, no hay razón suficiente en este versículo para sustituir la expresión por una forma neutral en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto queda sin marcas de nota porque no se requiere ninguna alternativa textual en esta línea.
  spanish_consistency_notes:
  - Se usó «Jerusalén» con artículo implícito, como es natural en español para este topónimo.
  - Se mantuvo la concordancia masculina plural «los hermanos» para reflejar ἀδελφοί sin expansión interpretativa en el texto principal.
  - La preposición «a» conserva mejor el valor de llegada/destino de εἰς en este contexto narrativo.
