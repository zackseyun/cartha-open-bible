  glossary_alignment: No hay términos del glosario mayor en juego excepto ἀδελφοί, que está bien como «hermanos» en el texto principal según la política de género exacto. Debe añadirse la nota con la alternativa inclusiva («hermanos y hermanas») tal como en el POB inglés.
