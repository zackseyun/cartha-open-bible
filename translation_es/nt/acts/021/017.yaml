  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: la cláusula temporal de llegada, el destino Jerusalén, la recepción por parte de los hermanos y el matiz positivo de ἀσμένως. Sin embargo, no preserva por completo el rastro auditado del POB, porque omite la nota léxica/teológica sobre οἱ ἀδελφοί que el inglés conservó explícitamente.'
