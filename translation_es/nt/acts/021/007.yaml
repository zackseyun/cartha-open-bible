translation:
  language: es
  text: Nosotros, después de terminar la travesía desde Tiro, llegamos a Ptolemaida, y después de saludar a los hermanos[a], nos quedamos con ellos un día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas»; el griego dice «los hermanos», un masculino plural que puede referirse a la comunidad de creyentes en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς δὲ
  english_pob_choice: We
  chosen_spanish: Nosotros
  alternatives_spanish:
  - Y nosotros
  - Entonces nosotros
  lexicon: BDAG
  rationale: El pronombre explícito se conserva como sujeto narrativo. El matiz de δέ se integra en el flujo de la frase sin forzar una conjunción pesada; «Nosotros» es natural en español y mantiene la transición del relato.
- source_word: τὸν πλοῦν διανύσαντες
  english_pob_choice: having finished the voyage
  chosen_spanish: habiendo terminado la travesía
  alternatives_spanish:
  - habiendo completado el viaje
  - tras concluir la travesía
  lexicon: BDAG
  rationale: διανύω expresa completar o llevar a término un recorrido; πλοῦς se refiere a una travesía por mar. «Habiendo terminado la travesía» preserva el participio anterior al verbo principal y su sentido de recorrido concluido.
- source_word: ἀπὸ Τύρου
  english_pob_choice: from Tyre
  chosen_spanish: desde Tiro
  alternatives_spanish:
  - de Tiro
  - partiendo de Tiro
  lexicon: BDAG
  rationale: ἀπό marca el punto de salida. «Desde Tiro» es la equivalencia más directa y natural en español.
- source_word: κατηντήσαμεν
  english_pob_choice: arrived
  chosen_spanish: llegamos
  alternatives_spanish:
  - arribamos
  - alcanzamos
  lexicon: BDAG
  rationale: En contexto de viaje, καταντάω significa llegar a un destino. «Llegamos» es idiomático y preciso en español; evita una dureza innecesaria.
- source_word: εἰς Πτολεμαΐδα
  english_pob_choice: at Ptolemais
  chosen_spanish: a Ptolemaida
  alternatives_spanish:
  - en Ptolemaida
  - hasta Ptolemaida
  lexicon: BDAG
  rationale: Con verbo de movimiento, εἰς señala destino. En español, «llegamos a Ptolemaida» expresa con claridad la llegada al lugar.
- source_word: ἀσπασάμενοι
  english_pob_choice: after greeting
  chosen_spanish: después de saludar
  alternatives_spanish:
  - habiendo saludado
  - tras saludar
  lexicon: BDAG
  rationale: ἀσπάζομαι significa saludar o dar la bienvenida. «Después de saludar» conserva la anterioridad de la acción respecto a la estancia posterior.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: ἀδελφοί está en masculino plural y en el uso cristiano primitivo puede abarcar a la comunidad de creyentes. Se mantiene «los hermanos» en el texto principal, siguiendo la precisión morfológica y la práctica de no neutralizar sin necesidad.
- source_word: ἐμείναμεν
  english_pob_choice: we stayed
  chosen_spanish: nos quedamos
  alternatives_spanish:
  - permanecimos
  - nos alojamos
  lexicon: BDAG
  rationale: μένω puede significar permanecer o quedarse. En un contexto de hospitalidad y viaje, «nos quedamos» es la forma más natural y comprensible en español.
- source_word: ἡμέραν μίαν
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - por un día
  - durante un día
  lexicon: BDAG
  rationale: El acusativo de tiempo de duración se expresa naturalmente como «un día» en español, ya que el contexto de estancia deja clara la duración.
- source_word: παρ’ αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - en su compañía
  lexicon: BDAG
  rationale: παρά con dativo indica presencia o compañía. «Con ellos» es la forma más directa y relacional en español.
theological_decisions:
- issue: El alcance inclusivo de ἀδελφοί en una comunidad cristiana
  english_pob_reading: the brothers; the Greek says 'brothers,' a masculine plural that can refer to fellow believers more broadly.
  chosen_spanish_reading: los hermanos; el griego dice «hermanos», un masculino plural que puede referirse a creyentes en general.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se conserva la forma masculina plural en el texto principal por fidelidad morfológica y porque el original no especifica mujeres. La posible referencia más amplia a la comunidad creyente se deja como alternativa léxica, sin borrar la tensión entre forma gramatical y referente comunitario.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios posteriores y el control cruzado informó alta concordancia. La redacción española busca mantener esa misma lectura, con adaptación natural al español y sin suavizar las decisiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Los hermanos» conserva el plural masculino del griego sin neutralización innecesaria.
  - Se usa pasado narrativo sencillo («llegamos», «nos quedamos») para reproducir el avance histórico del relato.
  - «Ptolemaida» sigue la forma castellana habitual del topónimo.
