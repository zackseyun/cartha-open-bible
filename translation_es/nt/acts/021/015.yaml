translation:
  language: es
  text: Después de estos días[a], después de hacer los preparativos, subimos a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo empacado» o «habiéndonos alistado». El participio griego puede referirse en general a prepararse para el viaje, no solo a empacar el equipaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰς ἡμέρας ταύτας
  english_pob_choice: After these days
  chosen_spanish: Después de estos días
  alternatives_spanish:
  - Después de aquellos días
  - Tras estos días
  lexicon: BDAG
  rationale: μετά con acusativo expresa secuencia temporal. «Después de estos días» conserva esa relación temporal de manera natural en español y sigue de cerca la referencia inmediata del contexto.
- source_word: ἐπισκευασάμενοι
  english_pob_choice: having packed up
  chosen_spanish: habiéndonos preparado
  alternatives_spanish:
  - habiendo hecho los preparativos
  - habiéndonos puesto listos
  - habiendo empacado
  lexicon: BDAG
  rationale: El participio puede referirse de modo general a prepararse para el viaje, no solo a empacar. En español, «habiéndonos preparado» mantiene esa amplitud semántica sin reducirla indebidamente a equipaje o maletas.
- source_word: ἀνεβαίνομεν
  english_pob_choice: we went up
  chosen_spanish: subimos
  alternatives_spanish:
  - íbamos subiendo
  - fuimos subiendo
  lexicon: BDAG
  rationale: El imperfecto narra la acción en curso en el pasado; «subimos» comunica de forma natural el desplazamiento hacia Jerusalén y conserva la dirección ascendente implícita en el verbo.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a la ciudad de Jerusalén
  lexicon: BDAG
  rationale: εἰς indica movimiento hacia un destino. En español, «a Jerusalén» es la forma más directa y idiomática para el viaje narrado.
translation_notes:
  revision_awareness: El registro inglés se mantuvo sin cambios en la revisión más reciente; no se detectaron ajustes pendientes en el texto de base, y la versión española conserva esa misma lectura con una decisión léxica amplia para ἐπισκευασάμενοι.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio geográfico estándar en español.
  - No se usa una formulación litúrgica o tradicionalizante que altere el sentido de viaje del pasaje.
  - La nota al pie preserva la ambigüedad documentada en el audit trail inglés sobre ἐπισκευασάμενοι.
