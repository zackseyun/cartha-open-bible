- from: Después de estos días[a], habiéndonos preparado, subimos a Jerusalén.
  to: Después de estos días[a], después de hacer los preparativos, subimos a Jerusalén.
  rationale: Se revisa ἐπισκευασάμενοι a 'después de hacer los preparativos' para conservar mejor la amplitud semántica documentada en la auditoría inglesa y producir un español más natural en contexto de viaje. Se mantiene la nota para preservar la alternativa más concreta ('empacado') y otra formulación general ('alistado'). El resto del versículo es fiel y claro.
