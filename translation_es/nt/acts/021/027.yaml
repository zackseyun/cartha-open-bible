translation:
  language: es
  text: Cuando estaban por cumplirse[a] los siete días, los judíos de Asia, al verlo en el templo[c], alborotaron a toda la multitud y le echaron mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estaban a punto de cumplirse'. El griego expresa inminencia y un proceso de llegada a término.
    reason: lexical_alternative
  - marker: b
    text: O 'se apoderaron de él'. La expresión es un modismo para agarrarlo o tomarlo por la fuerza.
    reason: lexical_alternative
  - marker: c
    text: '''Templo'' traduce aquí el término griego para el complejo o recinto del templo, no específicamente el santuario interior.'
    reason: cultural_note
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: As
  chosen_spanish: Cuando ya
  alternatives_spanish:
  - Y cuando
  - Como
  lexicon: BDAG
  rationale: En español, la combinación temporal resulta más natural como una subordinada con 'Cuando ya', que conserva la inminencia del contexto sin volver rígida la frase. δέ queda implícito, como en la versión inglesa.
- source_word: ἔμελλον ... συντελεῖσθαι
  english_pob_choice: were about to be completed
  chosen_spanish: estaban por cumplirse
  alternatives_spanish:
  - iban a cumplirse
  - estaban a punto de terminar
  lexicon: BDAG
  rationale: '''Estaban por cumplirse'' reproduce bien la idea de inminencia de μέλλω y la noción de ''ser llevados a su cumplimiento'' de συντελεῖσθαι, sin perder naturalidad en español.'
- source_word: αἱ ἑπτὰ ἡμέραι
  english_pob_choice: the seven days
  chosen_spanish: los siete días
  alternatives_spanish:
  - el período de siete días
  lexicon: BDAG
  rationale: Se mantiene la referencia directa a la duración mencionada en el contexto. La forma simple es clara y no añade explicación interpretativa al texto principal.
- source_word: οἱ ἀπὸ τῆς Ἀσίας Ἰουδαῖοι
  english_pob_choice: the Jews from Asia
  chosen_spanish: los judíos de Asia
  alternatives_spanish:
  - los judíos procedentes de Asia
  - los judíos de la provincia de Asia
  lexicon: BDAG
  rationale: '''De Asia'' refleja el origen/asociación con la provincia romana de Asia y evita la ambigüedad moderna de ''asiáticos''. Se conserva la sencillez del rótulo étnico-geográfico.'
- source_word: θεασάμενοι
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - habiéndolo visto
  - cuando lo vieron
  lexicon: BDAG
  rationale: La forma participial se vierte con una construcción temporal participial natural en español. 'Al verlo' expresa la observación que desencadena la reacción.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: '''Templo'' reproduce el uso de ἱερόν como complejo o recinto del templo, no necesariamente el santuario interior. Es la opción más clara y sobria para el cuerpo del texto.'
- source_word: συνέχεον πάντα τὸν ὄχλον
  english_pob_choice: stirred up the whole crowd
  chosen_spanish: alborotaron a toda la multitud
  alternatives_spanish:
  - pusieron a toda la multitud en confusión
  - agitaron a toda la multitud
  lexicon: BDAG
  rationale: '''Alborotaron'' recoge bien el valor de συγχέω en un contexto de tumulto: provocar desorden, excitación y confusión. ''Multitud'' es un equivalente natural de ὄχλος en español bíblico contemporáneo.'
- source_word: ἐπέβαλον ⸂ἐπ’ αὐτὸν τὰς χεῖρας⸃
  english_pob_choice: laid hands on him
  chosen_spanish: echaron mano sobre él
  alternatives_spanish:
  - lo agarraron
  - pusieron las manos sobre él
  lexicon: BDAG
  rationale: La expresión española 'echar mano sobre él' conserva el carácter idiomático de tomarlo por la fuerza, sin estrechar indebidamente el grado exacto de coerción. Mantiene la tensión lexical del griego entre el gesto y el arresto/agarre físico.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del testimonio inglés auditado: mantiene la inminencia de ''were about to be completed'', el valor idiomático de ''laid hands on him'' y la referencia a ἱερόν como recinto del templo. No se requieren revisiones adicionales según el historial proporcionado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - '''Judíos de Asia'' evita ''asiáticos'', que en español moderno sería engañoso.'
  - '''Multitud'' y ''alborotaron'' conservan el tono narrativo de disturbio sin sobrerinterpretar.'
  - Las notas a pie preservan alternativas léxicas relevantes donde el griego permite más de una solución válida.
