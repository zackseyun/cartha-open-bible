  text: Ὡς δὲ ἔμελλον αἱ ἑπτὰ ἡμέραι συντελεῖσθαι, οἱ ἀπὸ τῆς Ἀσίας Ἰουδαῖοι θεασάμενοι αὐτὸν ἐν τῷ ἱερῷ συνέχεον πάντα τὸν ὄχλον καὶ ἐπέβαλον ⸂ἐπ’ αὐτὸν τὰς χεῖρας⸃,
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/027.yaml
  text: As the seven days were about to be completed[a], the Jews from Asia, seeing him in the temple, stirred up the whole crowd and laid hands on him[c][b],
  footnotes:
  - marker: a
    text: Or 'threw the whole crowd into confusion.' The Greek verb can emphasize either stirring up or confusing the crowd.
    reason: lexical_alternative
  - marker: b
    text: Or 'seized him.' The expression 'laid hands on him' is an idiom for taking hold of someone forcibly.
    reason: lexical_alternative
  - marker: c
    text: '''Temple'' here translates the Greek term for the temple complex or precincts, not specifically the inner sanctuary.'
    reason: cultural_note
