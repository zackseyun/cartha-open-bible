lexical_decisions:
- source_word: μὴ πειθομένου δὲ αὐτοῦ
  english_pob_choice: since he would not be persuaded
  chosen_spanish: como él no quería ser persuadido
  alternatives_spanish:
  - puesto que no se dejaba persuadir
  - ya que no cedía a ser persuadido
  - como no se dejaba convencer
  lexicon: BDAG
  rationale: El participio genitivo absoluto con μή comunica la circunstancia de la negativa de Pablo a ceder ante sus ruegos. «Quería ser persuadido» conserva la idea de πείθω con voz pasiva/média sin reducirla a «escuchar». «Como» expresa la conexión causal/narrativa de manera natural en español.
- source_word: ἡσυχάσαμεν
  english_pob_choice: we became quiet
  chosen_spanish: callamos
  alternatives_spanish:
  - nos quedamos callados
  - guardamos silencio
  - nos aquietamos
  lexicon: BDAG
  rationale: Aquí ἡσυχάζω indica que dejaron de insistir y se aquietaron. «Callamos» es natural en español y mantiene el valor inceptivo del aoristo, sin sobreexplicar.
- source_word: εἰπόντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decíamos
  - al decir
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte bien con una construcción participial en español ligada al verbo principal: se callaron y, al mismo tiempo, dijeron las palabras que siguen.'
- source_word: Τοῦ κυρίου
  english_pob_choice: The Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  - del Kyrios
  lexicon: BDAG
  rationale: Se mantiene «Señor» conforme al criterio del proyecto para κύριος. El genitivo se expresa de forma posesiva natural en español.
- source_word: τὸ θέλημα
  english_pob_choice: will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el querer
  - el propósito
  - el deseo
  lexicon: BDAG
  rationale: Θέλημα suele referirse a la voluntad o intención de alguien. «Voluntad» es el equivalente más directo y estable en una frase de sumisión o petición.
- source_word: γινέσθω
  english_pob_choice: be done
  chosen_spanish: sea hecha
  alternatives_spanish:
  - hágase
  - que se haga
  - sea cumplida
  lexicon: BDAG
  rationale: El imperativo medio/pasivo de γίνομαι en esta fórmula se puede expresar como «sea hecha» para preservar el tono de sometimiento a la voluntad del Señor. «Hágase» es una alternativa válida, pero «sea hecha» mantiene con claridad la pasividad/resultado implícito.
theological_decisions:
- issue: Rendering of κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor Jesús
  rationale: La guía del proyecto para κύριος indica «Señor» como opción por defecto. En este contexto narrativo puede referirse al Señor Jesús, pero el texto español conserva el nivel de explicitación del griego sin añadir identificación interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'Revisión coherente con el expediente inglés: se preservan la relación causal del genitivo absoluto, el valor ingresivo de ἡσυχάσαμεν y la fórmula de sumisión final. El pie de nota se ancla correctamente en «persuadido[a]».'
  spanish_consistency_notes:
  - Se usó «Señor» de manera consistente con el tratamiento del término κύριος en el proyecto.
  - «Voluntad» reproduce la terminología bíblica habitual para θέλημα sin perder fidelidad.
  - 'La nota alternativa se ancla al punto léxico donde el español ofrece una opción natural distinta: callar / quedarse callados.'
