translation:
  language: es
  text: Pero les han informado acerca de ti que enseñas a todos los judíos entre los gentiles a abandonar a Moisés[a][b], diciéndoles que no circunciden a sus hijos ni anden según las costumbres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que enseñas apostasía de Moisés». El griego usa el sustantivo ἀποστασία, que significa defección o abandono.
    reason: lexical_alternative
  - marker: b
    text: «Moisés» funciona aquí como metonimia de la ley mosaica y de la práctica judía ancestral; por eso no se expande en el texto principal.
    reason: cultural_note
  - marker: c
    text: O «ni vivan según las costumbres». El griego περιπατεῖν puede referirse literalmente a «andar» o, de modo figurado, a la manera de vivir.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηχήθησαν
  english_pob_choice: have been informed
  chosen_spanish: les han informado
  alternatives_spanish:
  - les dijeron
  - han sido informados
  lexicon: BDAG
  rationale: El pasivo griego expresa un reporte recibido; en español, «les han informado» comunica con naturalidad esa noticia sin añadir una instrucción formal ni perder el matiz de información oral.
- source_word: ἀποστασίαν
  english_pob_choice: to forsake
  chosen_spanish: apostatar de
  alternatives_spanish:
  - abandonar
  - apartarse de
  - desertar de
  lexicon: BDAG
  rationale: El sustantivo ἀποστασία denota defeción o abandono. En español, el verbo «apostatar de» conserva con fuerza la idea de ruptura/abandono del referente, y evita diluir la acusación en una formulación demasiado genérica.
- source_word: Μωϋσέως
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - la ley de Moisés
  - la práctica ancestral de Moisés
  lexicon: BDAG
  rationale: Sigo el nombre propio como en el griego y en la auditoría inglesa; el sentido metonímico queda implícito en el contexto y se explica mejor en nota que expandiéndolo en el texto principal.
- source_word: τοὺς κατὰ τὰ ἔθνη πάντας Ἰουδαίους
  english_pob_choice: all the Jews among the Gentiles
  chosen_spanish: a todos los judíos entre los gentiles
  alternatives_spanish:
  - a todos los judíos entre las naciones
  - a todos los judíos que viven entre los gentiles
  lexicon: BDAG
  rationale: «Entre los gentiles» reproduce con claridad el valor contextual de κατὰ τὰ ἔθνη y es idiomático en español bíblico sin forzar una paráfrasis explicativa en el texto.
- source_word: λέγων
  english_pob_choice: telling them
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - y les decía
  - al decirles
  lexicon: BDAG
  rationale: El participio introduce el contenido de la acusación; «diciéndoles» mantiene la relación sintáctica de modo y resulta natural en español.
- source_word: μὴ περιτέμνειν αὐτοὺς τὰ τέκνα
  english_pob_choice: not to circumcise their children
  chosen_spanish: que no circunciden a sus hijos
  alternatives_spanish:
  - que no circunciden a sus niños
  - que no circunciden a sus hijos varones
  lexicon: BDAG
  rationale: Aunque τέκνα es literalmente «hijos/niños», el español exige una cláusula más natural con subjuntivo tras «diciéndoles que». «Sus hijos» conserva el alcance amplio del griego sin estrecharlo a «varones».
- source_word: μηδὲ τοῖς ἔθεσιν περιπατεῖν
  english_pob_choice: nor to walk according to the customs
  chosen_spanish: ni anden según las costumbres
  alternatives_spanish:
  - ni vivan según las costumbres
  - ni sigan las costumbres
  lexicon: BDAG
  rationale: «Anden según» conserva la metáfora de περιπατέω y es comprensible en español; «costumbres» refleja ἔθεσιν como prácticas heredadas. La forma verbal en subjuntivo encaja con el discurso indirecto.
theological_decisions:
- issue: Cómo presentar la acusación sobre Moisés sin convertirla en una afirmación doctrinal del narrador
  english_pob_reading: Render the accusation as 'teaching ... to forsake Moses' without endorsing its truth or expanding it into a doctrinal statement about the law.
  chosen_spanish_reading: Presentar la acusación como «enseñas ... a apostatar de Moisés» sin afirmar que esa acusación sea verdadera ni convertirla en explicación doctrinal del texto.
  alternative_spanish_readings:
  - enseñas ... a abandonar la ley de Moisés
  - enseñas ... a desertar de Moisés
  rationale: El versículo reporta lo que otros dicen de Pablo; no conviene añadir un juicio narrativo ni resolver la tensión teológica. «Moisés» mantiene la metonimia del texto fuente y deja abierta la relación con la ley mosaica, como en el original y en la auditoría inglesa.
  doctrine_reference: Preservar la tensión narrativa y la primacía del texto original; no dogmatizar una acusación reportada.
translation_notes:
  revision_awareness: La redacción sigue de cerca la auditoría inglesa aprobada y no introduce revisiones adicionales; mantiene la tensión lexical de ἀποστασίαν y la metonimia de Moisés, con ajuste natural al español en el discurso indirecto.
  spanish_consistency_notes:
  - Se conserva «gentiles» para mantener la correspondencia con la terminología bíblica del pasaje y con el griego τὰ ἔθνη.
  - Se usa «Moisés» en vez de «la ley de Moisés» en el texto principal, siguiendo la decisión auditada de conservar la metonimia en la línea principal.
  - Se mantiene «costumbres» para ἔθεσιν, evitando sustituirlo por una formulación más interpretativa.
