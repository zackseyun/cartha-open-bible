translation:
  language: es
  text: 'Y cuando él le dio permiso, Pablo, de pie sobre los escalones, hizo señas con la mano al pueblo. Y cuando se hizo un gran silencio, les habló en la lengua hebrea[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en arameo». El griego dice «en el dialecto/lengua hebrea», expresión que en este contexto puede referirse a la lengua semítica local comúnmente llamada arameo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτρέψαντος δὲ αὐτοῦ
  english_pob_choice: And when he had given permission
  chosen_spanish: Y cuando le dieron permiso
  alternatives_spanish:
  - Y cuando él había dado permiso
  - Y después de que le permitió
  lexicon: BDAG
  rationale: El genitivo absoluto remite al tribuno/comandante del contexto previo. En español, la pasiva impersonal con 'le dieron permiso' comunica con naturalidad la relación temporal-causal sin forzar una subordinada pesada.
- source_word: ἑστὼς ἐπὶ τῶν ἀναβαθμῶν
  english_pob_choice: standing on the steps
  chosen_spanish: de pie sobre los escalones
  alternatives_spanish:
  - de pie en los escalones
  - estando sobre los escalones
  lexicon: BDAG
  rationale: '''De pie'' expresa el participio descriptivo de manera natural. ''Escalones'' preserva la referencia a la escalera o grada física del lugar; ''escalones'' resulta más idiomático que un calco rígido.'
- source_word: κατέσεισε τῇ χειρὶ τῷ λαῷ
  english_pob_choice: motioned with his hand to the people
  chosen_spanish: hizo una señal con la mano al pueblo
  alternatives_spanish:
  - gesticuló con la mano al pueblo
  - hizo señas con la mano a la gente
  lexicon: BDAG
  rationale: κατασείω aquí denota un gesto público de señalamiento o llamada a guardar atención. 'Hizo una señal con la mano' conserva la acción sin sobreinterpretarla como simple saludo o como 'llamar'. 'Pueblo' sigue de cerca λαός.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  lexicon: BDAG
  rationale: '''Pueblo'' traduce λαός de modo más directo y mantiene el valor lexical sin introducir un matiz meramente sociológico como ''multitud''.'
- source_word: πολλῆς δὲ σιγῆς γενομένης
  english_pob_choice: And when a great silence had come
  chosen_spanish: Y cuando se hizo un gran silencio
  alternatives_spanish:
  - Y cuando cayó un gran silencio
  - Y cuando hubo un gran silencio
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto indica la llegada de la quietud. 'Se hizo un gran silencio' es natural en español y conserva el valor eventivo de γίνομαι.
- source_word: προσεφώνησεν
  english_pob_choice: he addressed them
  chosen_spanish: les habló
  alternatives_spanish:
  - se dirigió a ellos
  - los dirigió la palabra
  lexicon: BDAG
  rationale: El verbo introduce una alocución pública. 'Les habló' es sobrio y fiel; 'se dirigió a ellos' sería posible, pero menos directo en español.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  english_pob_choice: in the Hebrew language
  chosen_spanish: en la lengua hebrea
  alternatives_spanish:
  - en el dialecto hebreo
  - en arameo
  lexicon: BDAG
  rationale: La expresión griega dice literalmente 'en la dialecto/lengua hebrea'. La forma principal mantiene el vocabulario del texto; 'arameo' queda como alternativa por la nota textual-lingüística del pasaje, pero no reemplaza el término del original en el texto principal.
- source_word: λέγων
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  lexicon: BDAG
  rationale: Participio introduciendo el discurso directo. 'Diciendo:' es la fórmula más transparente y estándar en español para enlazar con la cita siguiente.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustanciales. Se mantuvo la lectura principal de ''lengua hebrea'' con nota alternativa para reflejar la ambigüedad lingüística del griego, y se conservó el sentido público y narrativo del gesto y del silencio.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino en esta traducción según norma del proyecto, pero este versículo no contiene ninguna referencia directa al nombre divino.
  - Se evitó 'Señor' como sustituto no pertinente; tampoco aparece 'Cristo/Mesías' en este verso.
  - '''Pueblo'' se mantuvo para λαός, en coherencia con el valor lexical del griego y con el registro narrativo del pasaje.'
