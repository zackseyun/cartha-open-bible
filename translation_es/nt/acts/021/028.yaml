translation:
  language: es
  text: 'gritando: “¡Varones israelitas, ayuden! Este es el hombre que enseña a todos en todas partes contra el pueblo, la ley y este lugar. Y además, hasta ha introducido griegos en el templo[a] y ha profanado este lugar santo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo del templo o a sus atrios, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: κράζοντες
  english_pob_choice: shouting
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - vociferando
  lexicon: BDAG
  rationale: El participio introduce el modo del clamor de la multitud. “Gritando” transmite la acción pública e intensa sin sonar artificioso en español.
- source_word: Ἄνδρες Ἰσραηλῖται
  english_pob_choice: Men of Israel
  chosen_spanish: Varones israelitas
  alternatives_spanish:
  - Hombres de Israel
  - Israelitas
  lexicon: BDAG
  rationale: “Varones israelitas” conserva el vocativo masculino del griego y mantiene una fórmula solemne y claramente dirigida a un grupo masculino.
- source_word: βοηθεῖτε
  english_pob_choice: help!
  chosen_spanish: ¡ayuden!
  alternatives_spanish:
  - ¡ayuda!
  - ¡auxilien!
  lexicon: BDAG
  rationale: El imperativo plural pide auxilio de manera directa. “Ayuden” es natural en español y preserva el mandato breve del original.
- source_word: οὗτός ἐστιν ὁ ἄνθρωπος
  english_pob_choice: This is the man
  chosen_spanish: Este es el hombre
  alternatives_spanish:
  - Este es ese hombre
  - Aquí está el hombre
  lexicon: BDAG
  rationale: La frase es identificatoria y acusatoria. “Este es el hombre” reproduce con claridad el valor de señalamiento del griego.
- source_word: ὁ κατὰ τοῦ λαοῦ καὶ τοῦ νόμου καὶ τοῦ τόπου τούτου
  english_pob_choice: against the people and the law and this place
  chosen_spanish: contra el pueblo, la ley y este lugar
  alternatives_spanish:
  - contra el pueblo, la Ley y este lugar
  - en oposición al pueblo, la ley y este lugar
  lexicon: BDAG
  rationale: La preposición κατά con genitivo expresa oposición. “Contra” conserva la fuerza acusatoria. Se eligió “ley” en minúscula por ajuste más natural al español y por concordar con la revisión del POB en inglés; el contexto sigue apuntando a la ley mosaica.
- source_word: πάντας πανταχῇ διδάσκων
  english_pob_choice: who teaches everyone everywhere
  chosen_spanish: que enseña a todos en todas partes
  alternatives_spanish:
  - que enseña a todos por todas partes
  - que instruye a todos en todas partes
  lexicon: BDAG
  rationale: La acumulación de πᾶς + πανταχῇ pide una expresión amplia y enfática. “A todos en todas partes” preserva el alcance total sin forzar un giro idiomático extraño.
- source_word: ἔτι τε καὶ
  english_pob_choice: And besides that
  chosen_spanish: Y además, hasta
  alternatives_spanish:
  - Y además
  - Y todavía más
  lexicon: BDAG
  rationale: La combinación añade una acusación suplementaria con refuerzo retórico. “Y además, hasta” conserva ese escalamiento acusatorio.
- source_word: Ἕλληνας
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - helenos
  - gentiles
  lexicon: BDAG
  rationale: El término es específicamente “griegos”, no la categoría más amplia “gentiles”. En español se mantiene el etnónimo directo para no diluir la acusación.
- source_word: εἰσήγαγεν εἰς τὸ ἱερὸν
  english_pob_choice: has even brought Greeks into the temple
  chosen_spanish: ha introducido griegos en el templo
  alternatives_spanish:
  - ha llevado griegos al templo
  - ha metido griegos en el templo
  lexicon: BDAG
  rationale: “Introducido” refleja bien la idea de llevar dentro e implica la transgresión acusada. “Templo” funciona como equivalente natural de ἱερόν en el cuerpo principal.
- source_word: κεκοίνωκεν
  english_pob_choice: has defiled
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha contaminado
  - ha hecho impuro
  lexicon: BDAG
  rationale: En contexto cultual, κοινόω significa volver profano o ritualmente contaminado. “Profanado” comunica bien la ofensa religiosa en español.
- source_word: τὸν ἅγιον τόπον τοῦτον
  english_pob_choice: this holy place
  chosen_spanish: este lugar santo
  alternatives_spanish:
  - este lugar sagrado
  - este sitio santo
  lexicon: BDAG
  rationale: Se conserva la deixis y la cualidad cultual. “Lugar santo” suena natural en español y mantiene la referencia al recinto del templo.
theological_decisions:
- issue: Referencia de τοῦ νόμου
  english_pob_reading: the law, understood as the Mosaic Law
  chosen_spanish_reading: la ley, entendida como la Ley mosaica
  alternative_spanish_readings:
  - la Ley
  - la ley
  rationale: En este contexto jerusalemita la acusación apunta a la Ley de Moisés, no a la ley en abstracto. En el texto principal se mantiene “ley” por naturalidad; la identificación mosaica queda preservada en la decisión documental.
  doctrine_reference: 'Translation philosophy: original-language primacy with context-sensitive readability.'
- issue: Valor de ἱερόν
  english_pob_reading: temple, with note that it refers to the temple complex or courts, not the inner sanctuary
  chosen_spanish_reading: templo, entendiendo el complejo o los atrios del templo
  alternative_spanish_readings:
  - patio del templo
  - complejo del templo
  - atrio(s) del templo
  rationale: ἱερόν designa el complejo del templo, no específicamente el santuario interior (ναός). En el texto principal se deja “templo” por fluidez; la nota aclara la extensión espacial precisa.
  doctrine_reference: 'Translation philosophy: preserve significant lexical nuance while keeping publication-readable Spanish.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió lowercase 'law' por naturalidad y concordancia con νόμου; en español se reflejó con “ley” en minúscula. También se preservó la precisión de ἱερόν mediante una nota de alcance espacial sin trasladar mecánicamente el inglés.
  spanish_consistency_notes:
  - Se mantuvo “griegos” para Ἕλληνας, ya que el griego es específico y no debe ampliarse a “gentiles”.
  - Se evitó “SEÑOR” o formulaciones eclesiásticas no presentes; el verso es una acusación pública y debe sonar directa.
  - Se eligió “profanado” para κεκοίνωκεν por su fuerza cultual en español.
  - La puntuación reproduce una voz de multitud con comillas directas y exclamaciones naturales en español.
