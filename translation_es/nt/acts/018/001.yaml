translation:
  language: es
  text: Después de esto[a], salió de Atenas y fue a Corinto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Después de estas cosas, habiendo salido de Atenas, llegó a Corinto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de estas cosas
  - Luego de esto
  - Más tarde
  lexicon: BDAG
  rationale: La expresión griega marca transición temporal narrativa. «Después de esto» conserva la secuencia y suena natural en español bíblico contemporáneo sin añadir contenido.
- source_word: χωρισθεὶς
  english_pob_choice: he left
  chosen_spanish: salió
  alternatives_spanish:
  - se apartó
  - habiendo partido
  - habiéndose separado
  lexicon: BDAG
  rationale: Aunque el participio pasivo de χωρίζω puede leerse más literalmente como «separado», aquí funciona idiomáticamente como partida desde un lugar. «Salió» transmite el movimiento con naturalidad y evita un pasivo artificial en español.
- source_word: ἐκ τῶν Ἀθηνῶν
  english_pob_choice: Athens
  chosen_spanish: de Atenas
  alternatives_spanish:
  - desde Atenas
  lexicon: BDAG
  rationale: El ἐκ indica procedencia. En español, con «salió», la procedencia se expresa con «de». Mantiene el valor semántico de salida desde Atenas.
- source_word: ἦλθεν
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: ἔρχομαι en narración de desplazamiento se vierte naturalmente como «fue» en español cuando se describe el traslado a otra ciudad. «Vino» podría sonar perspectivalmente inadecuado aquí.
- source_word: εἰς Κόρινθον
  english_pob_choice: to Corinth
  chosen_spanish: a Corinto
  alternatives_spanish:
  - hacia Corinto
  - hasta Corinto
  lexicon: BDAG
  rationale: εἰς marca dirección/movimiento hacia una meta. «A Corinto» es la forma natural y fiel en español para destino geográfico.
translation_notes:
  revision_awareness: 'La versión en español sigue el sentido y la economía del griego SBLGNT, atendiendo al audit trail inglés: se conservó la transición temporal, el participio de salida se naturalizó como verbo de movimiento y se mantuvo el destino geográfico sin añadir interpretaciones.'
  spanish_consistency_notes:
  - Se mantiene «Atenas» y «Corinto» como topónimos estándar en español bíblico.
  - Se prefirió un registro moderno y digno, evitando el calco «habiendo sido separado» por ser poco natural y no aportar claridad adicional.
  - La nota a pie conserva la alternativa más formal equivalente al inglés auditado.
