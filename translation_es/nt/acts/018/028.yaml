  text: εὐτόνως γὰρ τοῖς Ἰουδαίοις διακατηλέγχετο δημοσίᾳ ἐπιδεικνὺς διὰ τῶν γραφῶν εἶναι τὸν χριστὸν Ἰησοῦν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/028.yaml
  text: For he powerfully refuted the Jews in public[b][a], demonstrating through the Scriptures that Jesus is the Messiah.
  footnotes:
  - marker: a
    text: Or, 'that the Messiah is Jesus.' The Greek infinitive clause may be represented with either English word order.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Christ'; here rendered 'the Messiah' because the term functions as a title.
    reason: alternative_reading
