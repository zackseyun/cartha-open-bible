    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek term χριστός more directly and maintain formal consistency with the source wording. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque con gran vigor refutaba públicamente a los judíos, demostrando por las Escrituras que Jesús es el Mesías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐτόνως
  english_pob_choice: powerfully
  chosen_spanish: con gran vigor
  alternatives_spanish:
  - poderosamente
  - con fuerza
  - vigorosamente
  lexicon: BDAG
  rationale: El adverbio expresa intensidad y eficacia. En español, "con gran vigor" conserva la fuerza argumentativa sin sonar artificial, y evita una lectura meramente física de la energía.
- source_word: διακατηλέγχετο
  english_pob_choice: refuted
  chosen_spanish: refutaba
  alternatives_spanish:
  - confutaba
  - rebatía
  - probaba que estaban equivocados
  lexicon: BDAG
  rationale: El imperfecto medio indica una acción շարունակada en curso. "Refutaba" comunica bien la réplica sostenida y el carácter evidencial de la disputa sin excesiva tecnicidad.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - al pueblo judío
  - a los judíos interlocutores
  - a los opositores judíos
  lexicon: BDAG
  rationale: La forma griega es una referencia directa al grupo de interlocutores; en este contexto de sinagoga, "a los judíos" mantiene la literalidad y el referente del texto.
- source_word: δημοσίᾳ
  english_pob_choice: in public
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  lexicon: BDAG
  rationale: El adverbio señala el ámbito de la refutación. "Públicamente" es la forma más natural en español y conserva el sentido adverbial del griego.
- source_word: ἐπιδεικνὺς
  english_pob_choice: demonstrating
  chosen_spanish: demostrando
  alternatives_spanish:
  - mostrando
  - probando
  lexicon: BDAG
  rationale: El participio explica el medio de la refutación. "Demostrando" conserva el matiz razonado y probatorio del argumento.
- source_word: διὰ τῶν γραφῶν
  english_pob_choice: through the Scriptures
  chosen_spanish: por las Escrituras
  alternatives_spanish:
  - a través de las Escrituras
  - mediante las Escrituras
  - desde las Escrituras
  lexicon: BDAG
  rationale: διά con genitivo expresa medio. "Por las Escrituras" es natural en español y mantiene el valor instrumental sin añadir ideas ajenas.
- source_word: τὸν χριστὸν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre propio. En español, "Mesías" preserva mejor el trasfondo escriturario y la decisión doctrinal del POB.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
- source_word: εἶναι τὸν χριστὸν Ἰησοῦν
  english_pob_choice: that Jesus is the Messiah
  chosen_spanish: que Jesús es el Mesías
  alternatives_spanish:
  - que el Mesías es Jesús
  lexicon: BDAG
  rationale: El infinitivo puede ordenarse en español de dos maneras. Se eligió la forma más natural y directa, manteniendo el sentido identificador del original.
theological_decisions:
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La palabra funciona aquí como título mesiánico derivado de las Escrituras. "Mesías" conserva la referencia histórica y teológica sin convertirla en un nombre litúrgico fijo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → ''Messiah'' where title; ''Christ'' where name-like'
translation_notes:
  revision_awareness: La versión inglesa más reciente osciló entre "Christ" y "Messiah"; se siguió la corrección doctrinal restaurando el valor titular de Χριστός como "Mesías". También se evitó una nota al pie porque no era necesaria ninguna alternativa textual adicional en español.
  spanish_consistency_notes:
  - Se mantiene "Mesías" para Χριστός en coherencia con la política terminológica del proyecto.
  - Se tradujo el adverbio y el participio con expresiones naturales en español sin perder el matiz argumentativo.
  - No se introdujo nota textual porque la sintaxis española admite una sola solución clara y sin ambigüedad relevante.
