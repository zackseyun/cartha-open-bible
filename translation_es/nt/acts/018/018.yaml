translation:
  language: es
  text: Pero Pablo, después de quedarse todavía muchos días, se despidió de los hermanos[a] y zarpó rumbo a Siria, con Priscila y Aquila[b]. En Cencrea se había rapado la cabeza[c][b][d], porque tenía un voto[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Hermanos" probablemente se refiere a la comunidad de creyentes, incluyendo mujeres además de varones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "y con él estaban Priscila y Aquila".'
    reason: previous_rendering
  - marker: c
    text: 'O: "se había cortado el cabello". El verbo griego puede referirse más generalmente a cortar o esquilar el cabello, no necesariamente a un rapado completo.'
    reason: lexical_alternative
  - marker: d
    text: Algunos intérpretes entienden que el corte del cabello y el voto se refieren a Aquila y no a Pablo, aunque la gramática griega apunta de manera más natural a Pablo.
    reason: alternative_reading
  - marker: e
    text: El texto dice solo "un voto". Muchos lo relacionan con un voto nazareo, pero eso no se expresa de manera explícita aquí.
    reason: cultural_note
lexical_decisions:
- source_word: ἔτι προσμείνας ἡμέρας ἱκανὰς
  english_pob_choice: had remained many more days
  chosen_spanish: después de quedarse todavía muchos días
  alternatives_spanish:
  - después de permanecer todavía muchos días
  - habiéndose quedado muchos días más
  lexicon: BDAG
  rationale: La idea central es la permanencia prolongada previa al verbo principal. En español, 'quedarse' comunica bien la estancia continuada, y 'todavía muchos días' conserva el matiz de ἔτι + ἱκανάς sin sobreexplicar la duración.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: the brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - de los hermanos y hermanas
  - de los creyentes
  lexicon: BDAG
  rationale: Se conserva el término fraterno masculino del griego. El contexto eclesial puede incluir a mujeres, pero la redacción principal mantiene la forma del texto fuente.
- source_word: ἀποταξάμενος
  english_pob_choice: he said farewell to
  chosen_spanish: se despidió de
  alternatives_spanish:
  - tomó leave de
  - se despidió de ellos
  lexicon: BDAG
  rationale: El verbo medio expresa despedida o toma de leave. 'Se despidió de' es natural y fiel en español sin perder el valor de separarse al partir.
- source_word: ἐξέπλει εἰς τὴν Συρίαν
  english_pob_choice: sailed away for Syria
  chosen_spanish: zarpó rumbo a Siria
  alternatives_spanish:
  - zarpó para Siria
  - salió navegando hacia Siria
  lexicon: BDAG
  rationale: ἐκπλέω indica partida por mar. 'Zarpó' es idiomático y 'rumbo a Siria' preserva la orientación de destino.
- source_word: σὺν αὐτῷ Πρίσκιλλα καὶ Ἀκύλας
  english_pob_choice: with him were Priscilla and Aquila
  chosen_spanish: con Priscila y Aquila
  alternatives_spanish:
  - y con él estaban Priscila y Aquila
  - acompañado de Priscila y Aquila
  lexicon: BDAG
  rationale: La frase funciona mejor en español como complemento de compañía unido al verbo de navegación. Se evita una cláusula pesada y se preserva la continuidad del período griego.
- source_word: κειράμενος
  english_pob_choice: he had his head shaved
  chosen_spanish: se había cortado el cabello
  alternatives_spanish:
  - se había rapado la cabeza
  - se había afeitado la cabeza
  - se había cortado el cabello o rapado
  lexicon: BDAG
  rationale: El verbo κείρω puede significar cortar o esquilar el cabello, no necesariamente afeitar por completo. Dado que el propio texto permite más de una intensidad, 'se había cortado el cabello' evita imponer una especificación más fuerte que la fuente no exige.
- source_word: ἐν Κεγχρεαῖς
  english_pob_choice: In Cenchreae
  chosen_spanish: En Cencrea
  alternatives_spanish:
  - En Céncreas
  - En Cenchreas
  lexicon: BDAG
  rationale: Se usa la transliteración habitual al español bíblico. La preposición local se conserva de manera directa y natural.
- source_word: τὴν κεφαλήν
  english_pob_choice: his head
  chosen_spanish: el cabello
  alternatives_spanish:
  - la cabeza
  - su cabeza
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'la cabeza', el acto referido es el de cortar el cabello. En español, 'cortarse el cabello' expresa con claridad la acción sin forzar una imagen más extrema.
- source_word: εὐχήν
  english_pob_choice: a vow
  chosen_spanish: un voto
  alternatives_spanish:
  - un voto religioso
  - una promesa solemne
  lexicon: BDAG
  rationale: εὐχή denota voto o promesa hecha a Dios. 'Voto' es la opción más directa y reconocible en español eclesial, sin añadir la identificación específica de nazareo que el texto no menciona.
theological_decisions:
- issue: Referente de κειράμενος
  english_pob_reading: The haircut action is attributed to Paul, the grammatically controlling masculine singular subject.
  chosen_spanish_reading: La acción del corte se atribuye a Pablo.
  alternative_spanish_readings:
  - La acción podría referirse a Aquila en algunas interpretaciones.
  - El texto deja una ambigüedad interpretativa sobre quién realizó el voto.
  rationale: El participio es masculino singular y concuerda de forma natural con Pablo. La traducción principal mantiene esa lectura, mientras que la nota preserva la discusión interpretativa sin debilitar la gramática del pasaje.
  doctrine_reference: Preservar la tensión interpretativa cuando el texto y la tradición exegética ofrecen una discusión real.
- issue: Naturaleza de εὐχή
  english_pob_reading: '''for he had a vow'' without specifying a Nazirite vow.'
  chosen_spanish_reading: '''porque tenía un voto'' sin especificarlo como nazareo.'
  alternative_spanish_readings:
  - porque había hecho un voto nazareo
  - porque estaba bajo un voto
  rationale: El texto solamente afirma la existencia del voto. Traducir de manera genérica evita importar una categoría ritual no expresada explícitamente en el versículo.
  doctrine_reference: No añadir al texto una precisión ritual que no está declarada por la fuente.
translation_notes:
  revision_awareness: Tomé en cuenta el pasaje griego SBLGNT, la tabla morfológica y el audit trail inglés. Evité importar 'there' o una especificación ritual como 'nazareo'; también mantuve la atribución principal del participio a Pablo, mientras preservé las alternativas interpretativas en notas. La redacción española evita el giro pesado 'and with him were' mediante una frase de compañía integrada al verbo de viaje, manteniendo la fluidez del período griego.
  spanish_consistency_notes:
  - '''Yahvé'' no aplica en este versículo.'
  - '''Mesías/Cristo'' no aparece aquí.'
  - Se mantuvo un español bíblico moderno, con 'hermanos', 'zarpar', 'voto' y transliteración 'Cencrea'.
  - No se usó 'SEÑOR' ni vocabulario eclesiástico que no esté motivado por el texto.
  - Los marcadores de nota [a]-[e] aparecen exactamente en el texto principal y corresponden uno a uno con las notas.
