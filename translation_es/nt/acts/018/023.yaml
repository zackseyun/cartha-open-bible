translation:
  language: es
  text: Y después de pasar algún tiempo allí, partió y fue recorriendo[a] la región de Galacia y Frigia, fortaleciendo a todos los discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasando sucesivamente por» la región de Galacia y Frigia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας χρόνον τινά
  english_pob_choice: after spending some time there
  chosen_spanish: después de pasar algún tiempo allí
  alternatives_spanish:
  - después de permanecer algún tiempo allí
  - después de hacer una estancia allí
  lexicon: BDAG
  rationale: La expresión griega idiomática σημαίνει 'pasar/emplear tiempo'. En español, 'pasar algún tiempo' reproduce con naturalidad el valor temporal sin sobretraducir. 'Allí' se añade por contexto narrativo, como en el audit trail inglés.
- source_word: ἐξῆλθεν
  english_pob_choice: he departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: En este contexto narrativo de viaje, ἐξέρχομαι funciona como salida o partida desde un lugar. 'Salió' es breve, natural y suficientemente fiel al movimiento narrativo.
- source_word: διερχόμενος
  english_pob_choice: traveled
  chosen_spanish: recorrió
  alternatives_spanish:
  - viajó por
  - pasó por
  lexicon: BDAG
  rationale: El participio expresa desplazamiento continuo por regiones. 'Recorrió' comunica bien el trayecto a través de una zona, sin perder el matiz de paso por distintos lugares.
- source_word: καθεξῆς
  english_pob_choice: from place to place
  chosen_spanish: sucesivamente
  alternatives_spanish:
  - de lugar en lugar
  - en sucesión
  lexicon: BDAG
  rationale: Aquí el adverbio señala progreso ordenado/secuencial por la ruta. 'Sucesivamente' conserva el sentido de secuencia del griego; el texto principal lo integra con 'recorrió' para que el español siga siendo legible.
- source_word: τὴν Γαλατικὴν χώραν
  english_pob_choice: the Galatian region
  chosen_spanish: la región de Galacia
  alternatives_spanish:
  - la región galática
  - el territorio de Galacia
  lexicon: BDAG
  rationale: χώρα puede significar región, territorio o país. 'Región de Galacia' es claro en español y mantiene la referencia geográfica amplia sin tecnicismo innecesario.
- source_word: καὶ Φρυγίαν
  english_pob_choice: and Phrygia
  chosen_spanish: y Frigia
  alternatives_spanish:
  - y la región de Frigia
  lexicon: BDAG
  rationale: Frigia se translitera como nombre propio geográfico. No es necesario repetir 'región' porque ya fue expresado con Galacia y la coordinación mantiene el paralelo del griego.
- source_word: στηρίζων
  english_pob_choice: strengthening
  chosen_spanish: fortaleciendo
  alternatives_spanish:
  - afirmando
  - confirmando
  lexicon: BDAG
  rationale: στηρίζω puede significar fortalecer, establecer o hacer firme. En el contexto de discípulos, 'fortaleciendo' conserva el sentido pastoral de afianzar a las personas sin imponer una lectura más doctrinal de lo que exige el texto.
- source_word: πάντας τοὺς μαθητάς
  english_pob_choice: all the disciples
  chosen_spanish: a todos los discípulos
  alternatives_spanish:
  - a todos los aprendices
  - a todos los seguidores
  lexicon: BDAG
  rationale: μαθηταί es el término establecido para los seguidores de Jesús. 'Discípulos' es la forma más fiel y reconocible en español; el 'a' personal se usa naturalmente con destinatarios humanos.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español junto a la expresión que la nota alternativas glosa.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Cristo'/'Mesías' porque el versículo no contiene esa referencia.
  - '''Fortaleciendo'' conserva el valor dinámico de στηρίζων sin convertirlo en una paráfrasis doctrinal.'
