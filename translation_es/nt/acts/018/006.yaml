translation:
  language: es
  text: 'Pero cuando se opusieron y blasfemaron[a], sacudió sus vestidos y les dijo: «Su sangre caiga sobre sus propias cabezas[b]. Soy inocente. Desde ahora iré a los gentiles[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablaron injuriosamente». El verbo griego puede denotar blasfemia o habla abusiva; aquí probablemente se refiere a discurso hostil y abusivo contra Pablo y su mensaje.
    reason: lexical_alternative
  - marker: b
    text: «Su sangre caiga sobre sus propias cabezas» es un modismo que significa que la responsabilidad por las consecuencias recae sobre ellos.
    reason: cultural_note
  - marker: c
    text: «Gentiles» también podría traducirse «las naciones»; en este contexto se refiere a los no judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιτασσομένων
  english_pob_choice: opposed
  chosen_spanish: se opusieron
  alternatives_spanish:
  - resistieron
  - se enfrentaron
  lexicon: BDAG
  rationale: El participio expresa oposición activa al mensaje de Pablo; «se opusieron» comunica con naturalidad esa fuerza adversativa sin ampliar el texto.
- source_word: βλασφημούντων
  english_pob_choice: blasphemed
  chosen_spanish: blasfemaron
  alternatives_spanish:
  - hablaron injuriosamente
  - lo vituperaron
  lexicon: BDAG
  rationale: Se conserva el valor verbal directo del griego y la opción del POB inglés en su revisión más reciente. En este contexto puede abarcar habla injuriosa contra Pablo y su mensaje, pero el español mantiene la tensión entre blasfemia y revile.
- source_word: ἐκτιναξάμενος τὰ ἱμάτια
  english_pob_choice: he shook out his garments
  chosen_spanish: sacudió sus vestidos
  alternatives_spanish:
  - sacudió sus ropas
  - sacudió sus vestiduras
  lexicon: BDAG
  rationale: La imagen gestual se preserva en español con una formulación natural. «Vestidos»/«vestiduras» ambas son posibles; «vestidos» suena más fluido, mientras que «vestiduras» sería más solemne.
- source_word: Τὸ αἷμα ὑμῶν ἐπὶ τὴν κεφαλὴν ὑμῶν
  english_pob_choice: Your blood be on your own heads
  chosen_spanish: Su sangre caiga sobre sus propias cabezas
  alternatives_spanish:
  - Su sangre sea sobre sus propias cabezas
  - La sangre de ustedes recaiga sobre sus cabezas
  lexicon: BDAG
  rationale: Se conserva el dicho idiomático de responsabilidad/consecuencia sin convertirlo en una paráfrasis explicativa. El subjuntivo «caiga» expresa bien el matiz formular y judicial del griego y del inglés POB.
- source_word: καθαρὸς ἐγώ
  english_pob_choice: I am innocent
  chosen_spanish: Yo soy inocente
  alternatives_spanish:
  - Estoy limpio
  - Soy inocente
  lexicon: BDAG
  rationale: El adjetivo expresa exención de culpa o responsabilidad; «yo soy inocente» refleja el sentido idiomático mejor que «limpio», que podría sonar físico y menos claro.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - De aquí en adelante
  - Desde este momento
  lexicon: BDAG
  rationale: Es una equivalencia temporal natural y precisa para marcar el cambio decisivo en el enfoque ministerial.
- source_word: εἰς τὰ ἔθνη
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  - a los no judíos
  lexicon: BDAG
  rationale: En Hechos, ἔθνη en contraste con la audiencia judía se refiere a los no judíos; «gentiles» es el término más claro y reconocible en español bíblico actual.
- source_word: πορεύσομαι
  english_pob_choice: I will go
  chosen_spanish: iré
  alternatives_spanish:
  - me dirigiré
  - proseguiré
  lexicon: BDAG
  rationale: El futuro de movimiento/ministerio queda bien expresado con «iré», que es natural y directo en español.
theological_decisions:
- issue: Fórmula de responsabilidad en «Su sangre caiga sobre sus propias cabezas»
  english_pob_reading: A declaration that responsibility for the consequences of rejecting the message rests on the hearers, not on Paul.
  chosen_spanish_reading: Una declaración de que la responsabilidad por las consecuencias del rechazo recae sobre los oyentes, no sobre Pablo.
  alternative_spanish_readings:
  - Una maldición imprecatoria más fuerte
  - Una simple advertencia moral
  rationale: La traducción conserva el idioma solemne y judicial sin intensificarlo más allá de lo que el texto exige ni reducirlo a una mera moraleja. Esto mantiene la tensión interpretativa del original y del POB inglés.
  doctrine_reference: Preservar la tensión teológica; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El POB inglés pasó por una revisión reciente que prefirió 'blasphemed' para reflejar más directamente el griego y evitar añadir 'him'. La versión española sigue esa línea al usar 'blasfemaron' sin objeto explícito, manteniendo también el sentido de habla hostil en contexto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo.
  - Se evitó el calco excesivo, pero se conservaron las imágenes idiomáticas clave.
  - «Gentiles» se traduce como «gentiles» por precisión contextual en Hechos.
  - No se añadieron notas sin anclaje textual, conforme a la validación requerida.
