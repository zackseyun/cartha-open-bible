translation:
  language: es
  text: Y después de bajar a Cesarea[a], subió y saludó a la iglesia, y luego bajó a Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente la iglesia en Jerusalén; muchas traducciones hacen explícita a Jerusalén aquí, pero no aparece nombrada en el griego.
    reason: alternative_reading
lexical_decisions:
- source_word: κατελθὼν
  english_pob_choice: after going down
  chosen_spanish: después de bajar
  alternatives_spanish:
  - habiendo bajado
  - después de haber bajado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. «Después de bajar» conserva la dirección espacial y el orden temporal sin introducir la interpretación de «llegar».
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Cesarea Marítima
  lexicon: BDAG
  rationale: Es el nombre propio usual en español. Se mantiene la forma breve porque el texto griego no añade el especificador «Marítima».
- source_word: ἀναβὰς
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - habiendo subido
  - subió a Jerusalén
  lexicon: BDAG
  rationale: Se conserva el sentido direccional de «subió». No se explicita «a Jerusalén» en el texto principal porque el griego no lo dice de manera expresa.
- source_word: ἀσπασάμενος
  english_pob_choice: greeted
  chosen_spanish: saludó
  alternatives_spanish:
  - dio saludos a
  - visitó
  lexicon: BDAG
  rationale: «Saludó» reproduce de forma natural y directa el valor de saludar/greet in a travel narrative. «Visitó» sería más interpretativo.
- source_word: τὴν ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία designa normalmente la comunidad cristiana; «iglesia» es el equivalente español más claro y estándar en este contexto.
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - viajó hacia abajo
  lexicon: BDAG
  rationale: Mantiene la imagen topográfica del griego y el paralelismo con «subió». «Bajó» es natural en español contemporáneo.
- source_word: Ἀντιόχειαν
  english_pob_choice: Antioch
  chosen_spanish: Antioquía
  alternatives_spanish:
  - Antioquía de Siria
  lexicon: BDAG
  rationale: Forma española estándar del topónimo. Se deja breve en el cuerpo del texto, como en la tradición textual griega.
theological_decisions:
- issue: Identificación implícita del destino de «subió»
  english_pob_reading: Leave the destination implicit in the main text
  chosen_spanish_reading: Dejar implícito el destino en el texto principal, con nota sobre la probable referencia a Jerusalén
  alternative_spanish_readings:
  - subió a Jerusalén
  - subió y saludó a la iglesia en Jerusalén
  rationale: La secuencia narrativa sugiere Jerusalén, pero el griego no la nombra. La traducción principal preserva esa reserva y la nota aclara la lectura probable sin convertirla en afirmación explícita.
  doctrine_reference: Primacía del texto original; preservar la tensión histórica sin resolverla por ampliación interpretativa
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y mantiene sin expansión la referencia implícita a Jerusalén; no se requieren cambios según la última revisión y el control cruzado.
  spanish_consistency_notes:
  - Se usa «subió»/«bajó» para conservar el paralelismo direccional del griego.
  - Se prefiere «iglesia» para ἐκκλησία conforme al uso de Hechos.
  - Se mantiene «Antioquía» y «Cesarea» como topónimos estándar en español.
  - La nota al pie marca la lectura probable sin introducirla en el texto principal.
