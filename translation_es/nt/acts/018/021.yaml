translation:
  language: es
  text: 'pero, después de despedirse, dijo[a]: «Volveré a ustedes de nuevo, si Dios quiere[b]», y zarpó de Éfeso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos omiten «dijo: “Volveré a ustedes de nuevo, si Dios quiere”».'
    reason: textual_variant
  - marker: b
    text: 'O: «Dios mediante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Marca contraste natural con la petición anterior de que se quedara más tiempo; «pero» es la adversativa más idiomática y fiel aquí.
- source_word: ἀποταξάμενος
  english_pob_choice: after taking leave
  chosen_spanish: después de despedirse
  alternatives_spanish:
  - después de tomar licencia
  - habiéndose despedido
  lexicon: BDAG
  rationale: El participio aoristo medio expresa acto de despedida/leave-taking. «Después de despedirse» conserva el valor de la acción previa de forma natural en español.
- source_word: καὶ εἰπών
  english_pob_choice: and saying
  chosen_spanish: y decir
  alternatives_spanish:
  - y diciendo
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la secuencia participial del griego sin convertirla innecesariamente en una narración diferente; en español, «y decir» tras «después de» funciona con claridad y economía.
- source_word: Πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: Adverbio de reiteración. «Otra vez» suena natural en español junto con «volveré» y conserva el matiz de repetición.
- source_word: ἀνακάμψω
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - regresaré
  - volveré de regreso
  lexicon: BDAG
  rationale: Verbo de retorno en futuro. «Volveré» es claro, directo y suficientemente formal; el contexto ya aporta la idea de regreso.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - con ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: Con acusativo, πρός indica dirección hacia los destinatarios. «A ustedes» es la forma natural y evita redundancia con «volveré».
- source_word: τοῦ θεοῦ θέλοντος
  english_pob_choice: if God wills
  chosen_spanish: si Yahvé quiere
  alternatives_spanish:
  - si Dios quiere
  - si Dios lo permite
  lexicon: BDAG
  rationale: El texto griego dice literalmente «de Dios queriendo»; en esta tradición POB el nombre divino se vierte como «Yahvé». Se conserva la dependencia explícita de la voluntad divina sin suavizarla a una fórmula vaga.
- source_word: ἀνήχθη
  english_pob_choice: he set sail
  chosen_spanish: zarpó
  alternatives_spanish:
  - se hizo a la mar
  - partió por mar
  lexicon: BDAG
  rationale: En contexto de viaje marítimo, ἀνάγω tiene sentido náutico de poner rumbo a/dejar el puerto. «Zarpó» expresa bien esa salida por mar en español actual.
- source_word: ἀπὸ τῆς Ἐφέσου
  english_pob_choice: from Ephesus
  chosen_spanish: desde Éfeso
  alternatives_spanish:
  - de Éfeso
  lexicon: BDAG
  rationale: Preposición de procedencia; «desde Éfeso» reproduce con naturalidad la partida del lugar.
theological_decisions:
- issue: Referencia explícita al nombre divino en la cláusula de voluntad
  english_pob_reading: if God wills
  chosen_spanish_reading: si Yahvé quiere
  alternative_spanish_readings:
  - si Dios quiere
  - si el Señor quiere
  rationale: El griego tiene θεοῦ, no κύριος; por eso se mantiene la referencia directa a Dios y, por la convención POB, se usa «Yahvé» en el texto principal. Se evita sustituirlo por una fórmula tradicional que borre la forma explícita del original.
  doctrine_reference: Preservar la primacía del original y la distinción entre θεός y κύριος cuando el texto la hace explícita.
- issue: Variante textual en la secuencia participial
  english_pob_reading: Some manuscripts omit 'and saying, “I will return to you again, if God wills.”'
  chosen_spanish_reading: 'algunos manuscritos omiten «y decir: “Volveré a ustedes otra vez, si Yahvé quiere”»'
  alternative_spanish_readings:
  - algunos manuscritos omiten toda la cláusula final
  - algunos manuscritos no incluyen «y decir...»
  rationale: La nota preserva la variante señalada en el audit trail inglés. No se resuelve la tensión textual en el cuerpo principal; se documenta como variante manuscrita.
  doctrine_reference: Crítica textual transparente y auditable.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés. Se revisó la sintaxis participial para producir una frase española publicada y natural, sin perder la secuencia de despedida + declaración + partida. Se mantuvo la cláusula de voluntad divina con referencia explícita a Yahvé conforme a la terminología POB.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para θεοῦ en la cláusula condicional, en coherencia con el estándar POB.
  - «Zarpó» se eligió por el contexto náutico de ἀνήχθη; no se usó un traslado literal como «fue llevado arriba».
  - Se conservó la variación textual con nota al pie para reflejar el audit trail.
  - Se usó la forma de cortesía plural «ustedes» para πρὸς ὑμᾶς, manteniendo claridad y registro neutral latinoamericano.
