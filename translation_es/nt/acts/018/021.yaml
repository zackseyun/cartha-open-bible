- from: 'pero, después de despedirse y decir[a]: «Volveré a ustedes otra vez[b], si Yahvé quiere», zarpó desde Éfeso.'
  to: 'pero, después de despedirse, dijo[a]: «Volveré a ustedes de nuevo, si Dios quiere[b]», y zarpó de Éfeso.'
  rationale: Se corrige «Yahvé» a «Dios» por fidelidad a θεοῦ y a la política terminológica del proyecto. Se reubica y reescribe la nota [b] para que corresponda a la cláusula de voluntad divina. Se mejora la naturalidad del español con «dijo» y «de nuevo», sin perder la secuencia ni el sentido del original. También se ajusta «de Éfeso» como salida más directa y natural tras «zarpó».
