    issue: La nota al pie está mal anclada.
    rationale: El marcador [a] aparece en 'se quedara[a]', pero la nota comenta la frase 'por más tiempo aún'. Esto incumple la disciplina de anclar cada nota exactamente en la palabra o frase pertinente.
  - severity: low
    issue: La nota al pie no sigue la prioridad del rastro inglés.
    rationale: La nota inglesa preserva alternativas para οὐκ ἐπένευσεν ('did not agree' / 'he declined'). La nota española actual introduce una alternativa secundaria sobre duración que no es necesaria y omite la alternativa léxica principal documentada.
  - severity: low
    issue: '''Como ellos le pedían'' es aceptable pero menos nítido narrativamente.'
    rationale: Puede leerse con matiz causal. En este genitivo absoluto temporal, 'cuando le pidieron' o 'cuando le pedían' suena más directo y natural en español bíblico moderno.
  revised_spanish_text: Pero, cuando le pidieron que se quedara por más tiempo, no accedió[a].
