translation:
  language: es
  text: Pero, cuando le pidieron que se quedara por más tiempo, no accedió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no consintió», «no estuvo de acuerdo» o «declinó». El verbo griego significa asentir o consentir a una petición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτώντων
  english_pob_choice: when they asked
  chosen_spanish: como ellos le pedían
  alternatives_spanish:
  - cuando ellos le pedían
  - mientras le pedían
  - al pedirle
  lexicon: BDAG
  rationale: El genitivo absoluto introduce una circunstancia temporal/causal. En español, 'como' comunica bien la situación de petición en curso y evita un calco pesado; 'pedían' conserva el valor progresivo del participio presente.
- source_word: ἐπὶ πλείονα χρόνον
  english_pob_choice: for a longer time
  chosen_spanish: por más tiempo
  alternatives_spanish:
  - por un tiempo más largo
  - por más tiempo aún
  - durante más tiempo
  lexicon: BDAG
  rationale: La expresión indica duración extendida. 'Por más tiempo' es natural y conserva la idea comparativa de πλείονα sin sobreexplicar.
- source_word: μεῖναι
  english_pob_choice: to stay
  chosen_spanish: se quedara
  alternatives_spanish:
  - permaneciera
  - quedara
  - se mantuviera
  lexicon: BDAG
  rationale: El infinitivo aoristo complementa la petición; en español, 'quedarse' es el equivalente más natural en un contexto de viaje, y el subjuntivo refleja la intención pedida.
- source_word: οὐκ ἐπένευσεν
  english_pob_choice: he did not consent
  chosen_spanish: no accedió
  alternatives_spanish:
  - no consintió
  - no accedió a ello
  - no aceptó
  lexicon: BDAG
  rationale: ἐπινεύω aquí significa asentir o consentir a una solicitud. 'No accedió' preserva la idea de consentimiento sin volverla tan fuerte como 'se negó'.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés están en alto acuerdo; no se observan revisiones aplicadas. La versión española sigue de cerca el valor temporal del genitivo absoluto y la fuerza de consentimiento de ἐπινεύω, manteniendo una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma editorial general, aunque este versículo no contiene el nombre divino.
  - Se evita 'se negó' porque el griego documenta una idea de no asentir/no consentir, no necesariamente una negativa enfática.
  - '''Se quedara'' reproduce en español la finalidad/petición implícita del infinitivo complementario.'
