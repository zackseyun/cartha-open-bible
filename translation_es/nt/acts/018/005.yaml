translation:
  language: es
  text: Pero cuando Silas y Timoteo bajaron de Macedonia, Pablo estaba ocupado[a] con la palabra, dando solemne testimonio a los judíos de que Jesús es el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estaba constreñido por la palabra' o 'estaba absorbido por el mensaje'. El verbo griego puede sugerir estar tomado por algo, presionado por ello o dedicado a ello.
    reason: lexical_alternative
  - marker: b
    text: Griego 'Cristo'. Aquí el término es un título, por eso se usa 'Mesías' para preservar el sentido mesiánico.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: Mantiene la transición de δέ y el valor temporal de ὡς con una fórmula natural en español.
- source_word: κατῆλθον ἀπὸ τῆς Μακεδονίας
  english_pob_choice: came down from Macedonia
  chosen_spanish: bajaron de Macedonia
  alternatives_spanish:
  - vinieron de Macedonia
  - regresaron de Macedonia
  lexicon: BDAG
  rationale: Conserva la imagen direccional de 'descender' sin forzar un calco pesado; en español 'bajar' reproduce bien el giro viajero del griego.
- source_word: ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος
  english_pob_choice: Silas and Timothy
  chosen_spanish: Silas y Timoteo
  alternatives_spanish:
  - ambos Silas y Timoteo
  lexicon: BDAG
  rationale: La correlación τε...καί se expresa de forma natural en español con 'y', sin perder el sujeto conjunto.
- source_word: συνείχετο
  english_pob_choice: was occupied
  chosen_spanish: estaba ocupado
  alternatives_spanish:
  - estaba constreñido
  - estaba absorbido
  - estaba dedicado
  lexicon: BDAG
  rationale: '''Estaba ocupado'' recoge la idea de estar intensamente tomado por algo, como en la nota inglesa; evita cargar el verbo con una lectura causal más fuerte de lo que exige el contexto inmediato.'
- source_word: τῷ λόγῳ
  english_pob_choice: with the word
  chosen_spanish: con la palabra
  alternatives_spanish:
  - por la palabra
  - con el mensaje
  lexicon: BDAG
  rationale: Se conserva λόγος como 'palabra', entendida aquí en el uso lucano del anuncio/gospel, y se sigue la sintaxis más natural en español con 'con'.
- source_word: διαμαρτυρόμενος
  english_pob_choice: solemnly testifying
  chosen_spanish: dando solemne testimonio
  alternatives_spanish:
  - testificando solemnemente
  - dando testimonio con solemnidad
  lexicon: BDAG
  rationale: '''Dar solemne testimonio'' preserva el matiz forense y enfático de διαμαρτύρομαι, con un español culto y claro.'
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judíos
  lexicon: BDAG
  rationale: En Hechos el término remite normalmente al grupo etnorreligioso; 'judíos' es directo y fiel al contexto.
- source_word: εἶναι τὸν χριστὸν Ἰησοῦν
  english_pob_choice: that Jesus is the Messiah
  chosen_spanish: que Jesús es el Mesías
  alternatives_spanish:
  - que Jesús es el Cristo
  - que el Mesías es Jesús
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título; por la norma del proyecto se traduce 'Mesías' para conservar el sentido mesiánico explícito ante oyentes judíos.
theological_decisions:
- issue: Χριστός como título mesiánico o como nombre fijo
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El sintagma predicativo ('Jesús es el...') y el contexto de proclamación a judíos favorecen el valor titular de Χριστός, no un uso meramente onomástico. 'Mesías' expresa mejor esa afirmación teológica en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías when title; Cristo where name-like'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: no se requieren revisiones nuevas; se mantiene la equivalencia óptima y la decisión titular de Χριστός. La redacción española evita mecanicismos, pero conserva la secuencia narrativa, el matiz de συνέχω y la proclamación cristológica explícita.'
  spanish_consistency_notes:
  - '''Palabra'' mantiene el uso lucano para λόγος, en armonía con el proyecto.'
  - '''Mesías'' se reserva para Χριστός cuando funciona como título, conforme al criterio documental del POB.'
  - La formulación 'dando solemne testimonio' conserva el tono enfático sin sonar arcaico.
  - '''Bajaron de Macedonia'' respeta la imagen espacial del griego y resulta natural en español.'
