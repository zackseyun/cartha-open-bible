  text: Ὡς δὲ κατῆλθον ἀπὸ τῆς Μακεδονίας ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος, συνείχετο τῷ ⸀λόγῳ ὁ Παῦλος, διαμαρτυρόμενος τοῖς Ἰουδαίοις ⸀εἶναι τὸν χριστὸν Ἰησοῦν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/005.yaml
  text: But when Silas and Timothy came down from Macedonia[a], Paul was occupied with the word[b], solemnly testifying to the Jews that Jesus is the Messiah.
  footnotes:
  - marker: a
    text: Or 'was constrained by the word' or 'was engrossed in the message.' The Greek verb can suggest being taken up with, pressed by, or devoted to something.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ.' Here the term is a title, so 'Messiah' is used to preserve the messianic sense.
    reason: alternative_reading
