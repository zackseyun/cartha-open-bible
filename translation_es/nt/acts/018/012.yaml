translation:
  language: es
  text: Pero, mientras Galión era procónsul de Acaya, los judíos[a] se levantaron juntos[b] contra Pablo y lo llevaron ante el tribunal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los judíos»; aquí se refiere al grupo judío local que actuaba contra Pablo, no a todos los judíos en sentido universal.'
    reason: cultural_note
  - marker: b
    text: 'O: «con un mismo ánimo», «de común acuerdo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ante el estrado» o «ante el asiento de juicio». El término griego designa la plataforma o tribunal judicial oficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γαλλίωνος
  english_pob_choice: Gallio
  chosen_spanish: Galión
  alternatives_spanish:
  - Gallio
  lexicon: nombre propio griego
  rationale: Se translitera el nombre propio al uso español normal. «Galión» mantiene la forma histórica y es plenamente legible en español bíblico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: partícula adversativa/conectora
  rationale: La partícula marca transición narrativa con un matiz adversativo leve; «Pero» comunica bien el giro hacia la oposición sin sobreinterpretarlo.
- source_word: ἀνθυπάτου ὄντος
  english_pob_choice: while ... was proconsul
  chosen_spanish: mientras ... era procónsul
  alternatives_spanish:
  - cuando ... era procónsul
  - durante el proconsulado de
  lexicon: genitivo absoluto
  rationale: El genitivo absoluto establece el marco temporal. «Mientras ... era procónsul» preserva el valor temporal de forma natural en español.
- source_word: ἀνθύπατος
  english_pob_choice: proconsul
  chosen_spanish: procónsul
  alternatives_spanish:
  - gobernador
  lexicon: título romano provincial
  rationale: «Procónsul» reproduce con precisión el cargo romano específico, mejor que un genérico como «gobernador».
- source_word: Ἀχαΐας
  english_pob_choice: Achaia
  chosen_spanish: Acaya
  alternatives_spanish:
  - Acaia
  lexicon: topónimo romano
  rationale: Se usa la forma española habitual del nombre de la provincia.
- source_word: κατεπέστησαν
  english_pob_choice: rose up against
  chosen_spanish: se levantaron ... contra
  alternatives_spanish:
  - se alzaron contra
  - se abalanzaron contra
  - hicieron un ataque conjunto contra
  lexicon: verbo de acción hostil
  rationale: El verbo expresa acción hostil concertada. «Se levantaron ... contra» conserva el sentido de oposición sin añadir violencia física no explicitada.
- source_word: ὁμοθυμαδὸν
  english_pob_choice: together
  chosen_spanish: a una
  alternatives_spanish:
  - juntos
  - con un mismo ánimo
  - de común acuerdo
  lexicon: adverbio de unidad
  rationale: «A una» es una expresión española natural y compacta para acción unánime; conserva la idea de actuar concertadamente.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: etnónimo
  rationale: La expresión griega dice literalmente «los judíos», y se mantiene esa referencia directa. El contexto narrativo limita el alcance a un grupo local opositor, sin universalizarlo.
- source_word: τῷ Παύλῳ
  english_pob_choice: against Paul
  chosen_spanish: contra Pablo
  alternatives_spanish:
  - a Pablo
  lexicon: dativo de hostilidad
  rationale: Con κατεπέστησαν el dativo funciona como blanco de hostilidad; en español se expresa naturalmente con «contra Pablo».
- source_word: ἤγαγον αὐτὸν
  english_pob_choice: brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: verbo de traslado
  rationale: «Llevaron» comunica el traslado hacia una comparecencia judicial sin añadir la dureza de «arrastraron» ni la literalidad rígida de «condujeron».
- source_word: ἐπὶ τὸ βῆμα
  english_pob_choice: before the tribunal
  chosen_spanish: ante el tribunal
  alternatives_spanish:
  - ante el estrado
  - ante el tribunal de justicia
  - al tribunal
  lexicon: término judicial
  rationale: En este contexto βῆμα designa la plataforma/tribunal oficial. «Ante el tribunal» comunica bien la comparecencia judicial en español actual.
theological_decisions:
- issue: Alcance de «los judíos» en un relato de conflicto
  english_pob_reading: the Jews; here this refers to the local Jewish group acting against Paul, not to all Jewish people universally.
  chosen_spanish_reading: los judíos; aquí se refiere al grupo judío local que actuaba contra Pablo, no a todo el pueblo judío en sentido universal.
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se conserva la referencia textual directa, pero se aclara su alcance contextual para evitar una generalización indebida. La nota sigue el criterio de primacía del original y de precisión histórica.
  doctrine_reference: 'Principio de traducción: no ampliar el alcance semántico más allá del texto; evitar lecturas antijudías por generalización indebida.'
translation_notes:
  revision_awareness: Se revisó la coherencia con el audit trail en inglés y no hubo cambios sustantivos respecto del pase más reciente; se mantuvo la lectura histórica y judicial precisa, con una aclaración sobre el alcance de «los judíos».
  spanish_consistency_notes:
  - Se usó «Galión» como transliteración española estándar del nombre propio.
  - Se mantuvo «procónsul» para el título romano específico.
  - Se eligió «Acaya» como forma española habitual del topónimo.
  - Se conservó la fuerza de oposición de κατεπέστησαν con «se levantaron ... contra».
  - Se tradujo ὁμοθυμαδόν con la locución idiomática «a una» para expresar unidad de acción.
  - Se mantuvo la distinción judicial de βῆμα con «tribunal».
