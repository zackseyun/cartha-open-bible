translation:
  language: es
  text: Entonces todos agarraron a Sóstenes[a], el dirigente de la sinagoga, y lo golpearon delante del tribunal. Pero a Galión no le importó nada de esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «todos los griegos» en lugar de simplemente «todos». El texto más antiguo es más breve y deja sin especificar la identidad del grupo.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιλαβόμενοι
  english_pob_choice: seized
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - tomaron por la fuerza
  - agarraron
  - se sujetaron a
  lexicon: BDAG
  rationale: El verbo griego expresa acción de tomar o asir con fuerza; en este contexto hostil, «se apoderaron de» comunica bien la iniciativa violenta sin sonar demasiado mecánico. Evita un calco duro y mantiene la fuerza del acto.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la multitud entera
  lexicon: BDAG
  rationale: La forma griega es un adjetivo sustantivado plural sin identificar explícitamente al grupo. «Todos» preserva esa indeterminación en español, igual que el texto fuente.
- source_word: ἀρχισυνάγωγον
  english_pob_choice: synagogue ruler
  chosen_spanish: dirigente de la sinagoga
  alternatives_spanish:
  - jefe de la sinagoga
  - rabino principal
  - líder de la sinagoga
  lexicon: BDAG
  rationale: El término designa al funcionario principal de la sinagoga. «Dirigente» conserva la función de liderazgo sin introducir un cargo eclesiástico ajeno ni sonar demasiado arcaico.
- source_word: ἔτυπτον
  english_pob_choice: beat
  chosen_spanish: lo golpeaban
  alternatives_spanish:
  - lo golpearon
  - lo estaban golpeando
  - lo azotaban
  lexicon: BDAG
  rationale: Aunque el inglés POB revisó a un pasado simple por naturalidad y por el aoristo, el imperfecto griego sugiere una acción en curso o repetida. En español, «lo golpeaban» conserva mejor ese valor durativo.
- source_word: ἔμπροσθεν τοῦ βήματος
  english_pob_choice: in front of the tribunal
  chosen_spanish: delante del tribunal
  alternatives_spanish:
  - ante el tribunal
  - frente al tribunal
  - delante del estrado judicial
  lexicon: BDAG
  rationale: βῆμα se refiere al tribunal o plataforma judicial de Galión. «Delante del tribunal» es claro y natural en español, y mantiene el sentido espacial y judicial del original.
- source_word: οὐδὲν τούτων
  english_pob_choice: no attention to these things
  chosen_spanish: nada de esto
  alternatives_spanish:
  - ninguna de estas cosas
  - esto no le importó en nada
  - nada de esas cosas
  lexicon: BDAG
  rationale: La expresión funciona con μέλει como una unidad idiomática de indiferencia. En español, conviene expresarla de modo natural junto con el verbo, para evitar un giro forzado o incompleto.
- source_word: ἔμελεν
  english_pob_choice: paid no attention
  chosen_spanish: no le importó
  alternatives_spanish:
  - no le preocupó
  - no tuvo interés por
  - le fue indiferente
  lexicon: BDAG
  rationale: μέλει significa ‘ser asunto de cuidado/interés’. «No le importó» comunica bien la indiferencia de Galión en un español contemporáneo y sobrio, sin cargarlo emocionalmente de más.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  - Pues
  lexicon: BDAG
  rationale: δὲ introduce el avance narrativo. «Entonces» reproduce ese movimiento en español de forma fluida.
- source_word: καί
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Además
  - Sin embargo
  lexicon: BDAG
  rationale: Aquí καί introduce contraste entre la violencia de la turba y la indiferencia de Galión. «Pero» explicita ese contraste con naturalidad en español.
theological_decisions:
- issue: Identidad del grupo implicado en πάντες
  english_pob_reading: The main text leaves the group unspecified as 'they all,' without identifying it as Jews or Greeks; a footnote notes the manuscript variant.
  chosen_spanish_reading: El texto principal dice simplemente «todos», sin precisar el grupo.
  alternative_spanish_readings:
  - todos los judíos
  - todos los griegos
  rationale: La base griega no nombra al grupo, y el audit trail en inglés preserva esa ambigüedad. El español debe mantenerla en el cuerpo del texto y explicarla en nota, en lugar de resolverla por tradición.
  doctrine_reference: Primacía del texto fuente; preservar tensiones interpretativas cuando el original no las resuelve.
translation_notes:
  revision_awareness: El texto griego presenta un imperfecto en ἔτυπτον, por lo que el español mantiene una forma imperfectiva («lo golpeaban») donde el último inglés revisado optó por pasado simple para reflejar el aoristo. También se preserva la indeterminación de πάντες con «todos», siguiendo la decisión auditada de no identificar al grupo en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; aquí no aplica.
  - «Mesías/Cristo» no aparece en este versículo.
  - «tribunal» se conserva para βῆμα, coherente con el proyecto.
  - La nota textual se vincula al marcador [a] en el nombre propio, siguiendo el formato requerido.
