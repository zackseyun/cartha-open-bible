translation:
  language: es
  text: Este hombre había sido instruido en el camino del Señor, y, ardiente en espíritu[a], hablaba y enseñaba con exactitud las cosas referentes a Jesús, conociendo solamente el bautismo de Juan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ardiente en el Espíritu», lo cual puede entenderse como una referencia al Espíritu Santo más que al espíritu propio de Apolos.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατηχημένος
  english_pob_choice: had been instructed
  chosen_spanish: había sido instruido
  alternatives_spanish:
  - había sido enseñado
  - había sido catequizado
  lexicon: BDAG
  rationale: El participio perfecto pasivo pide una acción previa con efecto continuo. «Había sido instruido» suena natural en español y conserva la idea de haber recibido enseñanza oral sin introducir de forma innecesaria el matiz técnico eclesiástico de «catequizado».
- source_word: τὴν ὁδὸν τοῦ κυρίου
  english_pob_choice: the way of the Lord
  chosen_spanish: el camino del Señor
  alternatives_spanish:
  - el camino del Dueño
  - la manera de vivir del Señor
  lexicon: BDAG
  rationale: «Camino» reproduce el idiomático ὁδός y mantiene la expresión cristiana primitiva. «Señor» corresponde a κύριος; no se reemplaza por una formulación más interpretativa.
- source_word: ζέων τῷ πνεύματι
  english_pob_choice: being fervent in spirit
  chosen_spanish: ardiente en espíritu
  alternatives_spanish:
  - ferviente en espíritu
  - ardiendo en espíritu
  lexicon: BDAG
  rationale: ζέων comunica la imagen de calor/ebullición aplicada al celo interior. «Ardiente» transmite bien esa intensidad en español. Se conserva «espíritu» en minúscula para no resolver de antemano si el dativo alude al espíritu humano o al Espíritu Santo.
- source_word: ἐλάλει καὶ ἐδίδασκεν
  english_pob_choice: he was speaking and teaching
  chosen_spanish: hablaba y enseñaba
  alternatives_spanish:
  - estaba hablando y enseñando
  - hablaba y estaba enseñando
  lexicon: BDAG
  rationale: Los imperfectos expresan actividad continua o habitual. En español, la serie «hablaba y enseñaba» suena más natural que una perífrasis excesiva, sin perder la duratividad del griego.
- source_word: ἀκριβῶς
  english_pob_choice: accurately
  chosen_spanish: con exactitud
  alternatives_spanish:
  - con precisión
  - exactamente
  lexicon: BDAG
  rationale: El adverbio describe corrección y precisión en la enseñanza. «Con exactitud» es fiel y elegante en español; evita ambigüedad con una mera idea de diligencia.
- source_word: τὰ περὶ τοῦ Ἰησοῦ
  english_pob_choice: the things concerning Jesus
  chosen_spanish: las cosas referentes a Jesús
  alternatives_spanish:
  - las cosas acerca de Jesús
  - lo referente a Jesús
  lexicon: BDAG
  rationale: La expresión griega es amplia y no debe estrecharse demasiado. «Las cosas referentes a Jesús» conserva el alcance del objeto enseñado y la formalidad del original sin paraphrasear más de la cuenta.
- source_word: ἐπιστάμενος μόνον τὸ βάπτισμα Ἰωάννου
  english_pob_choice: knowing only the baptism of John
  chosen_spanish: conociendo solamente el bautismo de Juan
  alternatives_spanish:
  - sabiendo solo el bautismo de Juan
  - conociendo solo el bautismo de Juan
  lexicon: BDAG
  rationale: El participio actualiza la limitación de su conocimiento sin añadir una concesión explícita que el griego no marca en forma verbal. «Conociendo solamente» sigue de cerca la construcción y evita sobreinterpretar.
theological_decisions:
- issue: Posible referencia del dativo τῷ πνεύματι al espíritu humano o al Espíritu Santo
  english_pob_reading: human spirit / inward fervor, with a footnoted alternative for the Holy Spirit
  chosen_spanish_reading: espíritu humano / fervor interior, con alternativa en nota para el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - el Espíritu
  rationale: El griego permite ambas lecturas. En el texto principal se conserva «espíritu» en minúscula para no decidir más de lo que el pasaje dice. La nota mantiene viva la alternativa pneumatológica sin borrar la tensión interpretativa.
  doctrine_reference: Preservar la tensión exegética sin resolverla indebidamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió reflejar con más directitud el participio final «knowing only» sin añadir un matiz concesivo no explicitado. Por eso se evita una subordinada concesiva en español y se conserva una estructura participial natural («conociendo solamente»).
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el valor cristológico del texto y con el estándar POB para κύριος referido al Señor.
  - Se evita «Cristo» porque el versículo nombra a Jesús y no presenta aquí el título Χριστός.
  - La puntuación separa con comas las participiales para reflejar el encadenamiento del griego y facilitar lectura en español.
  - «Espíritu» se escribe en minúscula en el cuerpo principal para conservar la ambigüedad del original; la capitalización alternativa queda reservada a la nota.
