translation:
  language: es
  text: 'Pero, mientras Pablo estaba a punto de abrir la boca[a], Galión dijo a los judíos: «Si fuera algún agravio o un delito grave[b], oh judíos, con razón los habría soportado[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba a punto de hablar». El griego dice literalmente «abrir la boca», un modismo para comenzar a hablar.
    reason: lexical_alternative
  - marker: b
    text: O «un crimen perverso» o «un delito malvado». La expresión griega combina un término de conducta delictiva con un adjetivo que significa «malvado» o «perverso».
    reason: lexical_alternative
  - marker: c
    text: O «razonablemente los habría soportado». La expresión indica que Galión tendría buena razón para tolerar su reclamo si se tratara de un verdadero agravio civil o delito.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλοντος δὲ τοῦ Παύλου ἀνοίγειν τὸ στόμα
  english_pob_choice: But as Paul was about to open his mouth
  chosen_spanish: Pero, cuando Pablo estaba a punto de abrir la boca
  alternatives_spanish:
  - Pero, cuando Pablo estaba a punto de hablar
  - Y cuando Pablo estaba por abrir la boca
  lexicon: BDAG
  rationale: La construcción de infinitivo con μέλλω expresa inminencia. En español, «estar a punto de» comunica bien esa cercanía. Conservo la imagen idiomática «abrir la boca» porque el audit trail inglés la retuvo por transparencia al griego, aunque «hablar» sería una alternativa dinámica legítima.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca transición narrativa con leve contraste, ya que Pablo iba a hablar, pero Galión interviene primero. «Pero» refleja ese giro de manera natural en español.
- source_word: Γαλλίων
  english_pob_choice: Gallio
  chosen_spanish: Galión
  alternatives_spanish:
  - Gallio
  lexicon: Nombre propio transliterado
  rationale: Se usa la forma española habitual del nombre propio, manteniendo la transliteración transparente.
- source_word: πρὸς τοὺς Ἰουδαίους
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judíos acusadores
  - ante los judíos
  lexicon: BDAG
  rationale: La preposición πρὸς introduce discurso dirigido a ellos. «A los judíos» sigue de cerca el griego sin añadir especificaciones interpretativas.
- source_word: ἀδίκημά τι
  english_pob_choice: some wrongdoing
  chosen_spanish: alguna injusticia
  alternatives_spanish:
  - algún agravio
  - algún delito
  lexicon: BDAG
  rationale: ἀδίκημα puede denotar injusticia, agravio o falta legal. Dado el marco judicial de Galión, «injusticia» conserva la amplitud del término y su posible matiz legal.
- source_word: ῥᾳδιούργημα πονηρόν
  english_pob_choice: a serious crime
  chosen_spanish: un delito grave
  alternatives_spanish:
  - un crimen malvado
  - un acto criminal perverso
  lexicon: BDAG
  rationale: La expresión combina una palabra de conducta delictiva con un adjetivo de maldad. «Delito grave» comunica con naturalidad el peso moral y jurídico sin sonar arcaico. Se evita suavizar la fuerza del compuesto.
- source_word: ὦ Ἰουδαῖοι
  english_pob_choice: O Jews
  chosen_spanish: oh judíos
  alternatives_spanish:
  - judíos
  lexicon: BDAG
  rationale: Se conserva el vocativo con «oh» para reproducir el tono de apelación directa del griego.
- source_word: κατὰ λόγον
  english_pob_choice: reasonably
  chosen_spanish: razonablemente
  alternatives_spanish:
  - con razón
  - con buen motivo
  lexicon: BDAG
  rationale: El idioma expresa la idea de actuar «con razón» o «justificadamente». «Razonablemente» sigue la revisión inglesa que privilegia esta lectura y suena natural en español.
- source_word: ἀνεσχόμην ὑμῶν
  english_pob_choice: I would reasonably put up with you
  chosen_spanish: les habría aguantado
  alternatives_spanish:
  - les habría soportado
  - habría tolerado escucharlos
  lexicon: BDAG
  rationale: ἀνέχομαι puede significar soportar, tolerar o aguantar. «Aguantado» preserva el matiz algo despectivo de Galión y su tono judicial-cortante; en español es más vivo que «soportado».
theological_decisions:
- issue: Cómo verter el vocativo y el tono de Galión sin suavizarlo
  english_pob_reading: O Jews ... I would reasonably put up with you
  chosen_spanish_reading: oh judíos ... razonablemente les habría aguantado
  alternative_spanish_readings:
  - oh judíos ... les habría soportado
  - oh judíos ... habría tolerado escucharlos
  rationale: 'El texto no enseña una doctrina, pero sí un tono retórico importante. Se mantiene la aspereza del hablante y su sentido legal: solo habría tolerado la causa si realmente tratara de un daño civil o delito.'
  doctrine_reference: Hechos 18:14; tono narrativo y judicial del pasaje
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail inglés, que ajustó la cláusula de κατὰ λόγον desde una idea de mera posesión de razón hacia el valor adverbial de «razonablemente / con buen motivo». También conserva la transparencia idiomática de «abrir la boca» y el tono abrupto de ἀνέχομαι.
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαῖοι, siguiendo el texto griego y el audit trail inglés, sin añadir glosa interpretativa.
  - Se preserva la imagen idiomática de «abrir la boca» porque el inglés auditado la retuvo por fidelidad al griego.
  - «Delito grave» se usa para expresar la combinación legal-moral de ῥᾳδιούργημα πονηρόν sin recurrir a un arcaísmo.
  - El vocativo «oh» se conserva para reflejar la apelación directa del original.
