    rationale: Aunque οὗτός retoma a Apolos, en español neutral moderno 'Y este' suena marcado y algo rígido. 'Y él comenzó' preserva la referencia sin calco innecesario.
  - severity: medium
    issue: La nota al pie no conserva plenamente las alternativas léxicas auditadas para προσελάβοντο
    rationale: El rastro inglés preserva explícitamente 'they took him with them' además de 'they welcomed him'. La nota española debería incluir 'lo tomaron consigo' para reflejar esa alternativa semántica importante.
  - severity: low
    issue: '''Le expusieron'' es algo menos natural que ''le explicaron'''
    rationale: ἐξέθεντο aquí significa explicar/poner en claro. 'Le explicaron' suena más claro y natural para lectores generales sin pérdida semántica.
