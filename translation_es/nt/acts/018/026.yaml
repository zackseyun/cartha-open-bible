translation:
  language: es
  text: Y él comenzó a hablar con valentía en la sinagoga. Pero cuando Priscila y Aquila lo oyeron[a], lo tomaron aparte y le explicaron con mayor precisión el camino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo tomaron consigo' o 'lo recibieron'. El verbo griego puede implicar tanto recibir a alguien como tomarlo aparte.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός τε
  english_pob_choice: And he
  chosen_spanish: Y este
  alternatives_spanish:
  - Y él
  - Y aquel
  lexicon: BDAG
  rationale: El griego retoma a Apolos con un demostrativo de enlace. En español, "este" conserva mejor ese retome textual que un simple "él", mientras que "Y" representa la fuerza conectiva de τέ sin sobrecargar el estilo.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: BDAG
  rationale: El aoristo con infinitivo expresa inicio de una acción. "Comenzó" es natural y plenamente fiel al valor inceptivo.
- source_word: παρρησιάζεσθαι
  english_pob_choice: to speak boldly
  chosen_spanish: hablar con valentía
  alternatives_spanish:
  - hablar abiertamente
  - hablar con audacia
  lexicon: BDAG
  rationale: παρρησιάζομαι denota hablar con franqueza y audacia pública. "Con valentía" transmite bien la osadía del hablar sin perder la claridad idiomática en español.
- source_word: ἐν τῇ συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - dentro de la sinagoga
  lexicon: BDAG
  rationale: La expresión es directa y no requiere ajuste interpretativo; "sinagoga" es el equivalente normal y preciso.
- source_word: ἀκούσαντες δὲ αὐτοῦ
  english_pob_choice: But when ... heard him
  chosen_spanish: Pero cuando ... lo oyeron
  alternatives_spanish:
  - Y cuando ... lo oyeron
  - Al oírlo ...
  lexicon: BDAG
  rationale: El participio temporal se vierte naturalmente con "cuando". El pronombre objeto directo "lo" sigue la fuerza del genitivo αὐτοῦ en este contexto.
- source_word: Πρίσκιλλα καὶ Ἀκύλας
  english_pob_choice: Priscilla and Aquila
  chosen_spanish: Priscila y Aquila
  alternatives_spanish:
  - Prisca y Aquila
  lexicon: BDAG
  rationale: El griego usa Πρίσκιλλα, pero en español la forma corriente y reconocible es "Priscila". Se conserva el nombre propio habitual sin alterar el referente.
- source_word: προσελάβοντο αὐτὸν
  english_pob_choice: they took him aside
  chosen_spanish: lo tomaron aparte
  alternatives_spanish:
  - lo recibieron
  - lo acogieron
  - lo tomaron consigo
  lexicon: BDAG
  rationale: προσλαμβάνομαι puede significar recibir, tomar consigo o apartar para tratar en privado. El contexto inmediato de la explicación más precisa favorece "lo tomaron aparte", que preserva la lectura principal sin excluir el matiz de acogida documentado en la nota inglesa.
- source_word: ἀκριβέστερον
  english_pob_choice: more accurately
  chosen_spanish: con mayor precisión
  alternatives_spanish:
  - más exactamente
  - con más exactitud
  lexicon: BDAG
  rationale: El comparativo indica un grado mayor de exactitud. "Con mayor precisión" suena natural en español y mantiene el matiz comparativo.
- source_word: ἐξέθεντο
  english_pob_choice: explained
  chosen_spanish: le expusieron
  alternatives_spanish:
  - le explicaron
  - le expusieron detalladamente
  lexicon: BDAG
  rationale: ἐκτίθημι aquí es "explicar / exponer" algo a alguien. "Le expusieron" conserva la idea de presentar ordenadamente el contenido, sin perder el tono de instrucción.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  english_pob_choice: the way of God
  chosen_spanish: el camino de Dios
  alternatives_spanish:
  - la senda de Dios
  - la vía de Dios
  lexicon: BDAG
  rationale: La metáfora de ὁδός se puede verter por "camino" en español con gran naturalidad. Se conserva el genitivo "de Dios" para no sustituir la expresión del texto por una paráfrasis posesiva.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con el clítico "le" en español. En el sintagma verbal, "le expusieron" resulta más idiomático que repetir "a él".
theological_decisions:
- issue: Naturaleza de la acción de Priscila y Aquila hacia Apolos
  english_pob_reading: they took him aside for fuller private instruction
  chosen_spanish_reading: lo tomaron aparte y le expusieron con mayor precisión
  alternative_spanish_readings:
  - lo recibieron
  - lo acogieron en su compañía
  rationale: El contexto favorece una instrucción más exacta en privado, no una corrección pública ni una mera hospitalidad. "Tomaron aparte" mantiene la posibilidad de trato personal y respetuoso que la forma verbal admite, sin forzar una estructura eclesial no explicitada en el versículo.
  doctrine_reference: Preservar la tensión teológica y narrativa del texto; primacía del griego sobre la tradición interpretativa.
- issue: Sentido de 'el camino de Dios'
  english_pob_reading: an early Christian expression for God's redemptive way/message, explained with greater precision
  chosen_spanish_reading: el camino de Dios
  alternative_spanish_readings:
  - el camino del Señor
  - el camino divino
  rationale: La frase se conserva abierta como expresión cristiana temprana sin concretarla más de lo que el versículo dice. "Camino de Dios" preserva la imagen y evita resolver por anticipado si se trata de un término técnico o de una descripción más amplia.
  doctrine_reference: Mantener la amplitud semántica del texto original y no sobreespecificar el contenido doctrinal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del control cruzado: no se requiere revisión adicional respecto del texto base inglés ni de la lectura griega. Se conservó la ambigüedad útil de προσλαμβάνομαι mediante una nota alternativa, mientras que el flujo narrativo se mantuvo natural en español.'
  spanish_consistency_notes:
  - Se usa "Dios" para θεός, en consonancia con los defaults del proyecto.
  - Se traduce παρρησιάζεσθαι por una expresión de audacia verbal, no por un término eclesiástico técnico.
  - Se mantiene "camino" para ὁδός, preservando la metáfora y evitando una paráfrasis doctrinal.
  - El pronombre objeto en español se ajusta a la sintaxis natural sin perder el referente masculino singular.
  - Se respeta el estilo neutral latinoamericano, con puntuación y ritmo publicables.
