translation:
  language: es
  text: Así permaneció allí un año y seis meses, enseñando entre ellos la palabra de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάθισεν
  english_pob_choice: stayed there
  chosen_spanish: permaneció allí
  alternatives_spanish:
  - se quedó allí
  - estuvo allí
  - se estableció allí
  lexicon: BDAG
  rationale: Aunque el verbo griego literalmente puede significar ‘sentarse’, en este contexto narrativo expresa residencia o permanencia por un tiempo. ‘Permaneció allí’ conserva ese valor durativo de manera natural en español y evita un calco literal que sonaría extraño.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona como enlace suave de continuidad. ‘Así’ refleja la conexión con la exhortación previa y con la acción resultante, sin introducir contraste fuerte ni añadir contenido no presente en el griego.
- source_word: ἐνιαυτὸν καὶ μῆνας ἓξ
  english_pob_choice: a year and six months
  chosen_spanish: un año y seis meses
  alternatives_spanish:
  - un año y seis meses más
  - un año y medio
  lexicon: BDAG
  rationale: La frase griega expresa una duración directa. ‘Un año y seis meses’ reproduce con fidelidad la medida temporal y mantiene la precisión del texto fuente.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñaba
  - y enseñaba
  lexicon: BDAG
  rationale: El participio presente indica acción concurrente durante su permanencia. ‘Enseñando’ conserva ese aspecto continuo de forma concisa y fluida en español.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - con ellos
  - en medio de ellos
  lexicon: BDAG
  rationale: La construcción con ἐν y dativo aquí tiene sentido locativo/social. ‘Entre ellos’ comunica la idea de su actividad dentro del grupo de forma natural en español, equivalente a ‘among them’.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra divina
  lexicon: BDAG
  rationale: λόγος en Hechos suele referirse al mensaje proclamado de Dios. ‘La palabra de Dios’ preserva la expresión bíblica establecida y su resonancia teológica, sin forzar una paráfrasis.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa auditada coinciden en el sentido básico: permanencia prolongada de Pablo y su labor docente continua. No se requieren notas textuales ni alternativas doctrinales especiales para este versículo.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεοῦ conforme al estándar del proyecto.
  - Se evita ‘SEÑOR’ porque aquí el término no aparece en el texto fuente.
  - ‘Permaneció’ se usa como equivalente idiomático de ἐκάθισεν en este contexto narrativo, no como traducción literal de ‘sentarse’.
  - ‘Entre ellos’ conserva la relación social del dativo con ἐν αὐτοῖς sin cargar la frase con una imagen más fuerte que la del griego.
