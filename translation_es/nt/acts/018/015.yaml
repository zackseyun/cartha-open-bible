translation:
  language: es
  text: Pero si estas son cuestiones acerca de una palabra[a] y de nombres y de su propia ley, ustedes mismos se encargarán de eso; yo no quiero ser juez de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre un mensaje» o «sobre doctrina». El griego λόγος es amplio y puede referirse a enseñanza discutida o a una formulación o expresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήματά
  english_pob_choice: questions
  chosen_spanish: cuestiones
  alternatives_spanish:
  - preguntas
  - controversias
  - asuntos
  lexicon: BDAG
  rationale: ζήτημα denota un asunto discutido o investigado. «Cuestiones» conserva el tono de tema debatido sin volverlo más hostil de lo que exige el griego, y suena natural en español jurídico o forense.
- source_word: περὶ λόγου
  english_pob_choice: about a word
  chosen_spanish: acerca de una palabra
  alternatives_spanish:
  - acerca de un mensaje
  - acerca de una doctrina
  - acerca de una enseñanza
  lexicon: BDAG
  rationale: λόγος es amplio y aquí puede referirse a una formulación, dicho o contenido enseñado. «Una palabra» sigue de cerca el griego y mantiene la ambigüedad documentada por la POB inglesa; se evita precisar indebidamente como «doctrina».
- source_word: ὀνομάτων
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - títulos
  - designaciones
  lexicon: BDAG
  rationale: El plural πιθανamente alude a nombres o títulos discutidos. «Nombres» es la equivalencia más directa y conserva la apertura del original.
- source_word: νόμου τοῦ καθ’ ὑμᾶς
  english_pob_choice: your own law
  chosen_spanish: de la ley de ustedes
  alternatives_spanish:
  - de su propia ley
  - de la ley que les concierne
  - de la ley entre ustedes
  lexicon: BDAG
  rationale: καθ’ ὑμᾶς señala una ley pertinente a la parte judía y fuera de la jurisdicción romana. «De la ley de ustedes» comunica con naturalidad la distancia de Galión; se evita «su propia ley» porque en español puede sonar ambiguo en número o demasiado interpretativo en este contexto.
- source_word: ὄψεσθε αὐτοί
  english_pob_choice: you yourselves will see to it
  chosen_spanish: ustedes mismos verán
  alternatives_spanish:
  - ustedes mismos se encargarán
  - ustedes mismos lo verán
  - ustedes mismos se ocuparán
  lexicon: BDAG
  rationale: El futuro medio de ὁράω puede funcionar idiomáticamente como «ver por» o «encargarse de». «Ustedes mismos verán» conserva la fuerza directa y el énfasis de αὐτοί, sin añadir más explicitación de la que el griego asegura.
- source_word: κριτὴς
  english_pob_choice: a judge
  chosen_spanish: juez
  alternatives_spanish:
  - árbitro
  - juez en este caso
  lexicon: BDAG
  rationale: Como predicado nominal sin artículo, el español admite «juez» sin artículo en esta construcción. Se mantiene el sentido legal de la negativa de Galión a asumir ese papel.
- source_word: τούτων
  english_pob_choice: of these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de estos asuntos
  - de estas cuestiones
  lexicon: BDAG
  rationale: El demostrativo remite a los temas mencionados antes. «De estas cosas» es amplio y transparente, y reproduce la indefinición del griego.
- source_word: οὐ βούλομαι εἶναι
  english_pob_choice: I do not want to be
  chosen_spanish: no quiero ser
  alternatives_spanish:
  - no deseo ser
  - no estoy dispuesto a ser
  - no me propongo ser
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o disposición. «No quiero ser» es natural, directo y conserva la negativa personal de Galión sin endurecerla como una fórmula jurídica técnica.
theological_decisions:
- issue: Alcance de λόγος en la negativa de Galión
  english_pob_reading: Rendered generically as 'a word' rather than specifying 'doctrine' or 'the message.'
  chosen_spanish_reading: Se traduce genéricamente como «una palabra», sin precisar «doctrina» ni «mensaje».
  alternative_spanish_readings:
  - un mensaje
  - una doctrina
  - una enseñanza
  rationale: El pasaje muestra la negativa del gobernador romano a dirimir una disputa interna judía; el texto no define más el alcance de λόγος. Mantener la ambigüedad preserva la tensión lexical documentada en la POB inglesa y evita cargar el versículo con una lectura teológica más específica de la que el griego exige.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente de la POB inglesa, que prefirió una construcción plural natural para ζητήματα («these are questions») en lugar de una paráfrasis más pesada. Aquí se reflejó ese ajuste con «si se trata de cuestiones», manteniendo el plural y el tono forense. También se conservó la ambigüedad de λόγος y la negativa personal de Galión, sin intensificarla a una recusación jurídica más fuerte.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - «Juez» se mantuvo con valor legal y sin ampliar a «árbitro» en el texto principal, para no suavizar el sentido.
  - Se prefirió «ustedes» para el plural explícito de αὐτοί y ὑμᾶς, conservando el énfasis.
  - «De la ley de ustedes» refleja la distancia contextual de καθ’ ὑμᾶς sin convertirla en una glosa interpretativa.
