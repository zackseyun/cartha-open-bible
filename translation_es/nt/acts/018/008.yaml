translation:
  language: es
  text: Pero Crispo, el jefe de la sinagoga, creyó en el Señor junto con toda su casa, y muchos de los corintios, al oír[a], creían y eran bautizados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «muchos de los corintios, cuando oyeron, creyeron y fueron bautizados». El griego usa formas de presente e imperfecto que presentan la respuesta como un proceso en desarrollo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κρίσπος
  english_pob_choice: Crispus
  chosen_spanish: Crispo
  alternatives_spanish:
  - Crispus
  lexicon: nombre propio transliterado
  rationale: Se adapta el nombre propio al uso español más natural, manteniendo la identificación del personaje sin añadir explicación.
- source_word: ἀρχισυνάγωγος
  english_pob_choice: synagogue ruler
  chosen_spanish: el principal de la sinagoga
  alternatives_spanish:
  - el jefe de la sinagoga
  - el líder de la sinagoga
  - el oficial de la sinagoga
  lexicon: BDAG
  rationale: La expresión transmite la idea de una autoridad principal dentro de la sinagoga. 'Principal' conserva la función sin forzar una terminología eclesiástica ajena al contexto.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe
  - llegó a creer
  - puso su fe
  lexicon: BDAG
  rationale: El aoristo narrativo se rinde de manera directa con 'creyó', que en español expresa con claridad el acto de confiar/creer sin ampliar el sentido.
- source_word: τῷ κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - al Señor
  - en el Señor Jesús
  lexicon: BDAG
  rationale: Aunque el contexto de Hechos apunta a Jesús, el griego dice simplemente 'al Señor' en dativo. 'En el Señor' conserva la formulación y el valor de πιστεύω con dativo, sin explicitar más de lo que el texto dice.
- source_word: σὺν ὅλῳ τῷ οἴκῳ αὐτοῦ
  english_pob_choice: together with his whole household
  chosen_spanish: junto con toda su casa
  alternatives_spanish:
  - junto con toda su familia
  - con toda su casa
  - junto con toda su casa
  lexicon: BDAG
  rationale: '''Casa'' reproduce el valor social de οἶκος mejor que ''familia'' y mantiene la amplitud de la referencia; ''toda'' conserva ὅλῳ.'
- source_word: πολλοὶ τῶν Κορινθίων
  english_pob_choice: many of the Corinthians
  chosen_spanish: muchos de los corintios
  alternatives_spanish:
  - muchos corintios
  lexicon: BDAG
  rationale: Se mantiene el genitivo partitivo con una construcción natural en español, reflejando que no fueron todos, sino muchos entre ellos.
- source_word: ἀκούοντες
  english_pob_choice: hearing
  chosen_spanish: al oír
  alternatives_spanish:
  - oyendo
  - cuando oyeron
  - al escuchar
  lexicon: BDAG
  rationale: En español, el participio presente simple 'oyendo' resulta menos natural aquí; 'al oír' conserva la relación temporal concomitante sin perder la fuerza del original.
- source_word: ἐπίστευον
  english_pob_choice: were believing
  chosen_spanish: creían
  alternatives_spanish:
  - estaban creyendo
  - seguían creyendo
  - venían a creer
  lexicon: BDAG
  rationale: El imperfecto comunica un proceso o respuesta en desarrollo. 'Creían' es la forma más natural en español y preserva el aspecto imperfectivo mejor que un pretérito puntual.
- source_word: ἐβαπτίζοντο
  english_pob_choice: were being baptized
  chosen_spanish: eran bautizados
  alternatives_spanish:
  - estaban siendo bautizados
  - se bautizaban
  lexicon: BDAG
  rationale: El imperfecto pasivo se traduce con una pasiva perifrástica breve y natural en español. 'Eran bautizados' mantiene la voz pasiva y el aspecto continuado.
theological_decisions:
- issue: Referente de 'el Señor'
  english_pob_reading: Translate κύριος as 'Lord' without expanding to 'the Lord Jesus' in the main text.
  chosen_spanish_reading: Traducir κύριος como 'el Señor' sin especificar 'Jesús' en el texto principal.
  alternative_spanish_readings:
  - el Señor Jesús
  - el Cristo
  rationale: El contexto narrativo de Hechos sugiere a Jesús, pero el texto griego usa solo κύριος. La redacción española conserva esa sobriedad y no resuelve en el texto principal una identificación que el original no explicita aquí.
  doctrine_reference: 'Términos disputados: κύριος → Señor'
- issue: Alcance de 'junto con toda su casa'
  english_pob_reading: Render the phrase straightforwardly without specifying whether every individual exercised personal faith in the same manner or whether the phrase is a household summary.
  chosen_spanish_reading: Mantener la frase sin ampliar si cada miembro creyó de la misma manera o si se trata de un resumen corporativo de la casa.
  alternative_spanish_readings:
  - Toda la casa creyó personalmente de la misma forma
  - La casa funciona solo como resumen colectivo sin fe individual
  rationale: El griego presenta la relación entre Crispo y su casa, pero no explica el mecanismo interno de la respuesta de la casa. La traducción evita sobreinterpretaciones doctrinales y conserva la tensión textual.
  doctrine_reference: Mantener la tensión teológica; no resolverla por paráfrasis
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin depender mecánicamente de él: se preservó la progresión aspectual de los imperfectos griegos, pero se optó por una solución española más natural en la cláusula participial (''al oír'') que la glosa inglesa ''hearing''. No se introdujeron ampliaciones doctrinales; se mantuvo la ambigüedad respecto de la fe bautismal de la casa y respecto del referente implícito de ''el Señor''.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, coherente con el término disputado del proyecto cuando el texto no explicita 'Jesús'.
  - Se usó 'casa' para οἶκος, siguiendo el valor social/familiar y no el sentido de edificio.
  - Se conservó el imperfecto narrativo en 'creían' y 'eran bautizados' para reflejar el aspecto continuo del griego.
  - Se prefirió 'Crispo' como adaptación castellana de un nombre propio sin alterar la identificación textual.
