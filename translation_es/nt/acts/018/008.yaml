  spanish_quality_summary: 'El texto es mayormente natural y claro, pero tiene dos puntos mejorables: 1) la nota al pie está anclada en ''Crispo'', aunque su contenido explica la cláusula final; debe anclarse donde corresponde; 2) ''toda su casa'' es comprensible, pero ''toda su familia'' estrecharía demasiado οἶκος, mientras que ''toda su casa'' en español puede sonar algo literal. ''Toda su casa'' sigue siendo aceptable; no obstante, conviene ajustar solo la ubicación de la nota para fidelidad editorial. También ''el principal de la sinagoga'' es entendible, aunque ''el jefe de la sinagoga'' suena un poco más natural.'
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. κύριος se mantiene como 'Señor', sin expandir a 'Señor Jesús', en línea con la evidencia y la política. No aparecen Yahvé/Mesías/otros términos sensibles. La decisión sobre οἶκος como 'casa' es defendible para no reducirlo a parentesco biológico.
