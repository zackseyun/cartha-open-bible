translation:
  language: es
  text: 'Y el Señor le dijo a Pablo de noche por medio de una visión[a]: «No tengas miedo, sino sigue hablando y no calles»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una visión». La frase griega dice literalmente «por medio de una visión».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el dueño
  - el maestro
  lexicon: BDAG
  rationale: κύριος conserva su valor reverencial y cristológico en este contexto narrativo de revelación a Pablo. En español, «Señor» es la forma natural y eclesialmente legible para mantener ese peso sin explicitar más de lo que el texto griego dice.
- source_word: ἐν νυκτὶ
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - durante la noche
  lexicon: BDAG
  rationale: La expresión temporal griega se vierte de forma natural en español como «de noche», que comunica el momento sin sonar rígido. Mantiene el valor temporal del original.
- source_word: δι’ ὁράματος
  english_pob_choice: through a vision
  chosen_spanish: por medio de una visión[a]
  alternatives_spanish:
  - en una visión
  - mediante una visión
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. «Por medio de» hace visible esa mediación mejor que una simple localización («en una visión»), aunque ambas son posibles; por eso se conserva la alternativa en nota.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  lexicon: BDAG
  rationale: La prohibición se expresa en español con una fórmula natural y directa. «No tengas miedo» reproduce bien el mandato sin arcaísmo, mientras que «No temas» queda como alternativa más breve y tradicional.
- source_word: ἀλλὰ λάλει
  english_pob_choice: but keep speaking
  chosen_spanish: sino sigue hablando
  alternatives_spanish:
  - pero habla
  - pero sigue hablando
  lexicon: BDAG
  rationale: El imperativo presente sugiere continuidad. «Sigue hablando» conserva mejor esa fuerza aspectual que un simple «habla»; «sino» refleja con precisión la corrección adversativa del griego tras una prohibición.
- source_word: καὶ μὴ σιωπήσῃς
  english_pob_choice: and do not be silent
  chosen_spanish: y no calles
  alternatives_spanish:
  - y no guardes silencio
  - y no te calles
  lexicon: BDAG
  rationale: El aoristo subjuntivo prohibitivo se traduce de manera natural con «no calles». Esta opción preserva la exhortación breve y enfática del griego; «no guardes silencio» explicita el matiz idiomáticamente, pero es más largo.
theological_decisions:
- issue: Referente de ὁ κύριος
  english_pob_reading: The speaker is rendered simply as 'the Lord,' leaving the title intact rather than paraphrasing as 'Jesus.'
  chosen_spanish_reading: Se traduce «el Señor» sin añadir «Jesús»
  alternative_spanish_readings:
  - el Señor Jesús
  - Jesús
  rationale: El texto griego dice ὁ κύριος. En Hechos suele aludir a Jesús resucitado, pero aquí la traducción no debe resolver explícitamente una identificación que el griego no formula. Mantener «el Señor» conserva la tensión cristológica y la fidelidad narrativa.
  doctrine_reference: 'DOCTRINE.md: contested terms; mantener κύριος como ''Señor'' sin sobreexplicación cristológica'
- issue: Valor de δι’ ὁράματος
  english_pob_reading: The Greek phrase literally says “through a vision.”
  chosen_spanish_reading: Se refleja el medio con «por medio de una visión» y se deja nota de la alternativa «en una visión»
  alternative_spanish_readings:
  - en una visión
  - mediante una visión
  rationale: La construcción con διά + genitivo puede indicar medio. En español, «por medio de» hace más visible ese valor sin negar que la escena ocurra en una visión. La nota conserva la alternativa legítima para no borrar la ambigüedad textual.
  doctrine_reference: Principio POB de no borrar alternativas léxicas cuando el griego permite más de una lectura
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del inglés POB: no se introducen cambios adicionales y se mantiene el valor de κύριος, la temporalidad de νυκτί y la mediación de δι’ ὁράματος, con una nota que preserva la alternativa legítima.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, consistente con el tratamiento POB de la tensión cristológica.
  - «Visión» se usa de manera literal y no se sustituye por una paráfrasis más interpretativa.
  - 'La prohibición se expresa con imperativos naturales en español, conservando la secuencia: no miedo / seguir hablando / no callar.'
