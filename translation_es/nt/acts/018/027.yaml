translation:
  language: es
  text: Y cuando quiso pasar a Acaya, los hermanos[b] lo animaron y escribieron a los discípulos para que lo recibieran. Cuando llegó, ayudó mucho a los que habían creído por medio de la gracia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ayudó mucho por medio de la gracia a los que habían creído». El griego puede leerse también de ese modo.'
    reason: alternative_reading
  - marker: b
    text: «Los hermanos» puede referirse a la comunidad creyente más amplia, incluidas mujeres, aunque el griego usa la forma masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλομένου δὲ αὐτοῦ
  english_pob_choice: when he wanted
  chosen_spanish: y cuando quiso
  alternatives_spanish:
  - y cuando quería
  - y cuando deseaba
  - y cuando intentó
  lexicon: BDAG
  rationale: El genitivo absoluto introduce una circunstancia de intención sobre Apolos. «Quiso» comunica de forma natural y fiel la voluntad expresada, sin volverla más fuerte que el griego ni usar una perífrasis demasiado pesada.
- source_word: διελθεῖν εἰς τὴν Ἀχαΐαν
  english_pob_choice: to go across to Achaia
  chosen_spanish: pasar a Acaya
  alternatives_spanish:
  - cruzar a Acaya
  - ir a Acaya
  - pasar a la región de Acaya
  lexicon: BDAG
  rationale: «Pasar a» conserva la idea de desplazamiento hacia la región y evita una literalidad rígida como «ir de través». «Acaya» respeta el topónimo del original y del uso histórico del texto.
- source_word: προτρεψάμενοι
  english_pob_choice: encouraged him
  chosen_spanish: lo animaron
  alternatives_spanish:
  - lo exhortaron
  - lo instaron
  - lo alentaron
  lexicon: BDAG
  rationale: El verbo tiene matiz de impulso favorable. «Lo animaron» transmite bien el tono positivo y comunitario, mejor que «exhortaron», que en español suena más duro o formal.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  - la comunidad de creyentes
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego. En este contexto puede abarcar a la comunidad creyente más amplia, pero la traducción mantiene la forma fuente sin neutralizarla.
- source_word: ἔγραψαν τοῖς μαθηταῖς
  english_pob_choice: wrote to the disciples
  chosen_spanish: escribieron a los discípulos
  alternatives_spanish:
  - mandaron una carta a los discípulos
  - escribieron a los creyentes
  - escribieron a los alumnos
  lexicon: BDAG
  rationale: «Escribieron a» reproduce directamente el verbo con dativo. «Discípulos» es el equivalente natural y bíblicamente preciso de μαθηταῖς.
- source_word: ἀποδέξασθαι αὐτόν
  english_pob_choice: to welcome him
  chosen_spanish: para que lo recibieran
  alternatives_spanish:
  - para que lo acogieran
  - para que lo aceptaran
  - para darle la bienvenida
  lexicon: BDAG
  rationale: ἀποδέχομαι aquí implica recepción favorable. «Recibieran» en este contexto comunica esa acogida sin perder sobriedad ni introducir una paráfrasis demasiado interpretativa.
- source_word: ὃς παραγενόμενος
  english_pob_choice: When he arrived
  chosen_spanish: Cuando llegó
  alternatives_spanish:
  - Al llegar
  - Cuando se presentó
  - Después de llegar
  lexicon: BDAG
  rationale: La secuencia relativa + participio funciona temporalmente. «Cuando llegó» es natural en español y mantiene la transición narrativa.
- source_word: συνεβάλετο πολὺ
  english_pob_choice: he greatly helped
  chosen_spanish: ayudó mucho
  alternatives_spanish:
  - contribuyó mucho
  - prestó gran ayuda
  - fue de gran ayuda
  lexicon: BDAG
  rationale: El verbo en este contexto expresa ayuda o beneficio considerable. «Ayudó mucho» es claro, idiomático y suficientemente cercano al valor de συμβάλλω aquí.
- source_word: τοῖς πεπιστευκόσιν
  english_pob_choice: those who had believed
  chosen_spanish: a los que habían creído
  alternatives_spanish:
  - a los creyentes
  - a los que creían
  - a los que habían puesto su fe
  lexicon: BDAG
  rationale: El participio perfecto conserva la idea de una fe ya establecida. «Habían creído» respeta mejor ese aspecto que «creían» o el sustantivo «creyentes».
- source_word: διὰ τῆς χάριτος
  english_pob_choice: through grace
  chosen_spanish: por medio de la gracia
  alternatives_spanish:
  - por gracia
  - mediante la gracia
  - a través de la gracia
  lexicon: BDAG
  rationale: Se conserva χάρις como «gracia». «Por medio de» mantiene la preposición instrumental del griego y deja abierta la cuestión de si la frase modifica la fe de los creyentes o la ayuda de Apolos.
theological_decisions:
- issue: A qué se une διὰ τῆς χάριτος
  english_pob_reading: The phrase modifies 'those who had believed,' yielding 'those who had believed through grace.'
  chosen_spanish_reading: 'La frase modifica a «los que habían creído», produciendo: «a los que habían creído por medio de la gracia».'
  alternative_spanish_readings:
  - «ayudó mucho por medio de la gracia a los que habían creído»
  rationale: En el flujo del griego, la frase preposicional encaja de modo más natural con los creyentes y con el hecho de haber creído. La redacción principal conserva esa lectura, pero la posibilidad alternativa permanece reconocida porque la ambigüedad sintáctica es real.
  doctrine_reference: Mantener una tensión sintáctica y teológica cuando el texto permite más de una relación gramatical, sin eliminar la referencia a la gracia divina.
- issue: Alcance de «los hermanos»
  english_pob_reading: The brothers may refer to the wider community of believers, including women, though the Greek uses the masculine form.
  chosen_spanish_reading: Se traduce «los hermanos» como forma masculina del original, con posible referencia amplia a la comunidad creyente.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - la comunidad de creyentes
  rationale: La forma del texto griego es masculina plural y no debe neutralizarse en el cuerpo de la traducción sin base textual. La nota permite reconocer el alcance comunitario posible sin borrar la forma fuente.
  doctrine_reference: Respeto por la forma lingüística original y por la posible referencia inclusiva contextual, sin imponerla en la línea principal.
translation_notes:
  revision_awareness: Se mantuvo la lectura principal del audit trail inglés y se trasladó al español la misma ambigüedad sobre la frase διὰ τῆς χάριτος, conservando una redacción natural y publicable sin resolver artificialmente la relación sintáctica. No hubo revisiones posteriores que alteraran el juicio de traducción.
  spanish_consistency_notes:
  - Se conserva «Acaya» como topónimo estándar en español bíblico.
  - Se usa «gracia» para χάρις, sin añadir especificación de «de Dios» que no está explícita en el texto.
  - Se mantiene «los hermanos» en concordancia con el original masculino plural y con la política de no neutralizar sin base textual.
  - «Discípulos» traduce μαθηταῖς de manera estable y reconocible en el contexto de Hechos.
