  text: βουλομένου δὲ αὐτοῦ διελθεῖν εἰς τὴν Ἀχαΐαν προτρεψάμενοι οἱ ἀδελφοὶ ἔγραψαν τοῖς μαθηταῖς ἀποδέξασθαι αὐτόν· ὃς παραγενόμενος συνεβάλετο πολὺ τοῖς πεπιστευκόσιν διὰ τῆς χάριτος·
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/027.yaml
  text: And when he wanted to go across to Achaia[a], the brothers encouraged him and wrote to the disciples to welcome him. When he arrived[b], he greatly helped those who had believed through grace.
  footnotes:
  - marker: a
    text: Or, 'he greatly helped through grace those who had believed.' The Greek phrase 'through grace' may be taken with Apollos's help rather than with the believers' having believed.
    reason: alternative_reading
  - marker: b
    text: '''The brothers'' may refer to the wider community of believers, including women, though the Greek uses the masculine form.'
    reason: lexical_alternative
