review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia narrativa y el sentido general del griego: Pablo sale de allí, entra en una casa, el hombre es devoto de Dios, y la casa está contigua a la sinagoga. Sin embargo, no preserva fielmente el nombre propio atestiguado en la fuente y en la auditoría POB: Τιτίου Ἰούστου corresponde a «Ticio Justo», no «Tito Justo». Además, la nota [a] está anclada al nombre cuando en realidad explica σεβομένου τὸν θεόν; debe moverse a la expresión correspondiente. El cambio de una construcción relativa a punto y coma es aceptable en español, pero puede conservarse mejor la relación con «cuya casa».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Después de salir de allí», «entró en la casa» y «estaba junto a la sinagoga» funcionan bien. No obstante, la ubicación de la nota [a] es confusa para el lector porque parece comentar el nombre propio. También conviene mejorar ligeramente la cohesión sintáctica con «cuya casa» en vez de separar con punto y coma.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Dios» y «sinagoga» están bien. La decisión «adoraba a Dios» para σεβομένου τὸν θεόν es defendible y consistente con la auditoría inglesa, con alternativas en nota. El problema principal de alineación léxica es el nombre propio: el proyecto indicó «Titius Justus», que en español debe reflejarse como «Ticio Justo», no «Tito Justo».'
  issues:
  - severity: high
    issue: 'Nombre propio mal representado: «Tito Justo»'
    rationale: La fuente griega tiene Τιτίου Ἰούστου, y la auditoría inglesa usa «Titius Justus». «Tito» corresponde normalmente a Titus, no a Titius. Esto altera la identificación del personaje.
  - severity: high
    issue: La nota [a] está anclada al nombre en vez de a «que adoraba a Dios»
    rationale: El contenido de la nota explica σεβομένου τὸν θεόν, no el nombre propio. La ancla actual induce a error y no cumple la disciplina de notas.
  - severity: medium
    issue: La relación relativa «οὗ ἡ οἰκία» se resolvió con punto y coma y «su casa»
    rationale: No es incorrecto, pero «cuya casa» refleja de forma más directa y elegante el relativo genitivo «οὗ», manteniendo mejor la estructura del original sin perder naturalidad.
  revised_spanish_text: Y después de salir de allí, entró en la casa de un hombre llamado Ticio Justo, que adoraba a Dios[a], cuya casa estaba junto a la sinagoga[b].
