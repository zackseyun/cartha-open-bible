translation:
  language: es
  text: Y después de salir de allí, entró en la casa de un hombre llamado Ticio Justo, que adoraba a Dios[a], cuya casa estaba junto a la sinagoga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que temía a Dios» o «un adorador de Dios». El griego describe a un gentil devoto del Dios de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «colindaba con» o «era contigua a» la sinagoga.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταβὰς ἐκεῖθεν
  english_pob_choice: after leaving there
  chosen_spanish: después de salir de allí
  alternatives_spanish:
  - habiendo salido de allí
  - tras salir de allí
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento de salida respecto del lugar anterior. En español, «después de salir de allí» conserva la secuencia temporal/narrativa sin sonar forzado; «habiendo salido» es más literal, pero menos natural en este contexto narrativo.
- source_word: εἰσῆλθεν
  english_pob_choice: he entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - se metió en
  lexicon: BDAG
  rationale: «Entró» reproduce con claridad el verbo de ingreso y encaja con el tono narrativo. Se mantiene el complemento «en la casa» para reflejar el movimiento hacia un lugar concreto.
- source_word: οἰκίαν
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: BDAG
  rationale: Aquí se trata del edificio, no del concepto afectivo de hogar. «La casa» es la opción más fiel y natural; además, la referencia posterior a su ubicación junto a la sinagoga confirma el sentido espacial.
- source_word: τινὸς ὀνόματι Τιτίου Ἰούστου
  english_pob_choice: of a man named Titius Justus
  chosen_spanish: de un hombre llamado Tito Justo
  alternatives_spanish:
  - de cierto hombre llamado Tito Justo
  - de un hombre de nombre Tito Justo
  lexicon: BDAG
  rationale: El genitivo indefinido τινός se vierte de forma natural como «de un hombre». «Llamado Tito Justo» refleja adecuadamente ὀνόματι. Se usa «Tito» como transliteración española del nombre propio, manteniendo el valor identificador del nombre romano.
- source_word: σεβομένου τὸν θεόν
  english_pob_choice: who worshiped God
  chosen_spanish: que adoraba a Dios
  alternatives_spanish:
  - que temía a Dios
  - que reverenciaba a Dios
  - un adorador de Dios
  lexicon: BDAG
  rationale: El participio de σέβομαι indica devoción reverente al Dios de Israel. «Adoraba a Dios» comunica esa devoción de manera clara y pública en español. Se evita importar la etiqueta técnica «temeroso de Dios» como lectura principal, aunque queda como alternativa posible.
- source_word: οὗ ἡ οἰκία
  english_pob_choice: whose house
  chosen_spanish: su casa
  alternatives_spanish:
  - cuya casa
  - la casa del cual
  lexicon: BDAG
  rationale: El relativo genitivo se resuelve de forma natural con «su casa». «Cuya casa» sería más literal pero menos fluido en español. El antecedente es Tito Justo, así que la referencia posesiva es inequívoca.
- source_word: συνομοροῦσα τῇ συναγωγῇ
  english_pob_choice: was next to the synagogue
  chosen_spanish: estaba junto a la sinagoga
  alternatives_spanish:
  - era adyacente a la sinagoga
  - colindaba con la sinagoga
  - estaba contigua a la sinagoga
  lexicon: BDAG
  rationale: El participio expresa contigüidad o lindero compartido. «Estaba junto a» conserva la relación espacial de forma clara y digna; «colindaba» sería más exacto técnicamente, pero menos transparente para lectura pública.
- source_word: συναγωγῇ
  english_pob_choice: the synagogue
  chosen_spanish: la sinagoga
  alternatives_spanish:
  - la congregación judía
  lexicon: BDAG
  rationale: En este contexto narrativo, συναγωγή designa el lugar de reunión judío. «La sinagoga» es la equivalencia estándar y más clara en español.
theological_decisions:
- issue: Cómo renderizar σεβομένου τὸν θεόν sin convertirlo en una categoría socioreligiosa técnica
  english_pob_reading: who worshiped God rather than the quasi-technical label 'God-fearer'
  chosen_spanish_reading: que adoraba a Dios
  alternative_spanish_readings:
  - que temía a Dios
  - un temeroso de Dios
  - un adorador de Dios
  rationale: El griego describe a un gentil devoto del Dios de Israel, pero el versículo no exige explícitamente el rótulo técnico «temeroso de Dios» en el texto principal. «Adoraba a Dios» mantiene la devoción real sin sobreespecificar la categoría histórica. La tensión lexical se conserva en las alternativas.
  doctrine_reference: Acts 18:7; POB translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB en inglés al preferir una relación espacial más formal y precisa que «al lado de» o «junto a la puerta»: se mantiene la contigüidad con «estaba junto a la sinagoga», en línea con la decisión revisada de «next to». También se preserva la traducción descriptiva de σεβομένου τὸν θεόν sin convertirla en un tecnicismo en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεόν conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el griego aquí dice θεόν, no κύριος.
  - Se translitera el nombre propio como «Tito Justo» para una forma española natural y reconocible.
  - 'La puntuación divide la oración en dos miembros: llegada a la casa y localización contigua a la sinagoga, reflejando la estructura narrativa del griego.'
