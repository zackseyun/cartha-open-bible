  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «judíos» y «griegos» están bien alineados; «griegos» preserva correctamente Ἕλληνας sin sobreinterpretar «gentiles». La decisión clave a ajustar es διελέγετο: mejor «razonaba» que «discutía» para seguir la preferencia documentada de «was reasoning».'
