translation:
  language: es
  text: Y razonaba en la sinagoga cada sábado y persuadía a judíos y griegos[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «discutía» o «debatía». El verbo griego puede denotar diálogo razonado o argumentación.
    reason: lexical_alternative
  - marker: b
    text: 'O «persuadía». El imperfecto puede destacar un esfuerzo continuo: «trataba de persuadir».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, griegos asociados con la sinagoga; algunos entienden esto más ampliamente como «gentiles».
    reason: alternative_reading
lexical_decisions:
- source_word: διελέγετο
  english_pob_choice: was reasoning
  chosen_spanish: discutía
  alternatives_spanish:
  - razonaba
  - debatía
  - dialogaba
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. En español, «discutía» comunica un intercambio razonado, argumentativo y sostenido sin sonar tan técnico como «dialogaba» ni tan fuerte como «debatía» en todos los contextos.
- source_word: ἐν τῇ συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - en la congregación
  - en el lugar de reunión
  lexicon: BDAG
  rationale: La expresión es locativa y directa; «en la sinagoga» conserva con claridad el referente institucional y cultual del texto.
- source_word: κατὰ πᾶν σάββατον
  english_pob_choice: every Sabbath
  chosen_spanish: cada sábado
  alternatives_spanish:
  - en cada sábado
  - sábado tras sábado
  lexicon: BDAG
  rationale: La construcción distributiva expresa repetición habitual. En español, «cada sábado» es natural y preserva la idea de recurrencia semanal.
- source_word: ἔπειθέν
  english_pob_choice: was persuading
  chosen_spanish: persuadía
  alternatives_spanish:
  - intentaba persuadir
  - convencía
  - buscaba persuadir
  lexicon: BDAG
  rationale: El imperfecto señala esfuerzo en curso, pero la revisión inglesa decidió no añadir «trying to». «Persuadía» mantiene la acción continua sin sobrerrepresentar un matiz de intento explícito.
- source_word: Ἰουδαίους
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judíos
  - judeanos
  - pueblo judío
  lexicon: BDAG
  rationale: En Hechos, el término suele referirse al grupo étnico-religioso judío. «Judíos» es la equivalencia más clara y estándar en español.
- source_word: Ἕλληνας
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - griegos
  - gentiles
  - griegos helenistas
  lexicon: BDAG
  rationale: El texto griego conserva Ἕλληνας; por fidelidad léxica se traduce «griegos». En este contexto sinagogal puede aludir a griegos o griegos asociados con la sinagoga, pero el versículo no especifica más.
theological_decisions:
- issue: Alcance de Ἕλληνας en contexto sinagogal
  english_pob_reading: Rendered as 'Greeks' without narrowing further.
  chosen_spanish_reading: «griegos», sin restringirlo a «gentiles» ni añadir una categoría social-religiosa más específica.
  alternative_spanish_readings:
  - gentiles
  - griegos piadosos
  - griegos asociados con la sinagoga
  rationale: El texto dice simplemente Ἕλληνας. Traducir «griegos» preserva la forma explícita del original y evita importar una identificación más precisa que no está en el versículo.
  doctrine_reference: Principio de primacía del texto original y de no introducir precisiones teológicas o sociológicas no expresadas por el autor.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que eliminó «trying to» y dejó «was persuading»; por eso se prefirió «persuadía» y no una fórmula explícita de intento. También se mantuvo la coordinación simple entre los dos verbos, evitando sobrecargar el segundo miembro.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo verbal del griego con dos imperfectos en español: «discutía» / «persuadía».'
  - Se usó «cada sábado» para expresar la recurrencia distributiva de κατὰ πᾶν σάββατον de manera natural en español.
  - Se evitó sustituir «griegos» por «gentiles» en el texto principal para respetar la forma del original y la decisión auditada del POB inglés.
