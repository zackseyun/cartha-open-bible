translation:
  language: es
  text: Y halló a un judío llamado Áquila, natural de Ponto, recién llegado de Italia con Priscila, su esposa, porque Claudio había ordenado que todos los judíos salieran[a] de Roma; y fue a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego más literal: «que todos los judíos se separaran de Roma». También puede entenderse como «que todos los judíos fueran expulsados de Roma», pero eso expresa una interpretación más fuerte que el griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρών
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - halló
  lexicon: BDAG
  rationale: El participio aoristo introduce la siguiente acción narrativa. En español, «halló» mantiene el sentido directo de encontrar y conserva un tono bíblico sobrio sin forzar la sintaxis.
- source_word: τινα Ἰουδαῖον
  english_pob_choice: a Jew
  chosen_spanish: a un judío
  alternatives_spanish:
  - a un judío
  - a un hombre judío
  lexicon: BDAG
  rationale: La expresión identifica a una persona por su pertenencia étnico-religiosa. «Judío» reproduce bien el valor del griego en este contexto.
- source_word: ὀνόματι Ἀκύλαν
  english_pob_choice: named Aquila
  chosen_spanish: llamado Aquila
  alternatives_spanish:
  - llamado Aquila
  - de nombre Aquila
  lexicon: BDAG
  rationale: Es una fórmula idiomática para presentar el nombre propio. «Llamado Aquila» es natural y fiel al giro griego.
- source_word: Ποντικὸν τῷ γένει
  english_pob_choice: a native of Pontus
  chosen_spanish: natural de Ponto
  alternatives_spanish:
  - originario de Ponto
  - natural de Ponto
  lexicon: BDAG
  rationale: El dativo de relación indica origen geográfico. «Natural de Ponto» es claro, actual y suficientemente cercano al original.
- source_word: προσφάτως ἐληλυθότα ἀπὸ τῆς Ἰταλίας
  english_pob_choice: recently come from Italy
  chosen_spanish: recién llegado de Italia
  alternatives_spanish:
  - recién venido de Italia
  - recién llegado de Italia
  lexicon: BDAG
  rationale: El participio perfecto con προσφάτως expresa una llegada reciente con resultado presente. «Recién llegado» comunica esa fuerza de manera natural en español.
- source_word: καὶ Πρίσκιλλαν γυναῖκα αὐτοῦ
  english_pob_choice: with Priscilla his wife
  chosen_spanish: con Priscila, su esposa
  alternatives_spanish:
  - con Priscila, su esposa
  - junto con Priscila, su esposa
  lexicon: BDAG
  rationale: Aunque el griego enlaza a Priscila con la cláusula de procedencia, en español la coordinación con «con» expresa mejor que ella acompañaba a Aquila en la llegada, sin añadir contenido ajeno.
- source_word: διὰ τὸ διατεταχέναι Κλαύδιον
  english_pob_choice: because Claudius had ordered
  chosen_spanish: porque Claudio había ordenado
  alternatives_spanish:
  - porque Claudio había ordenado
  - a causa de que Claudio había ordenado
  lexicon: BDAG
  rationale: διά con el infinitivo articular expresa causa. «Porque» preserva la relación causal de forma directa; «había ordenado» refleja el valor perfecto anterior al acto narrado.
- source_word: χωρίζεσθαι πάντας τοὺς Ἰουδαίους ἀπὸ τῆς Ῥώμης
  english_pob_choice: all the Jews to depart from Rome
  chosen_spanish: que todos los judíos se apartaran de Roma
  alternatives_spanish:
  - que todos los judíos se apartaran de Roma
  - que todos los judíos salieran de Roma
  - que todos los judíos fueran expulsados de Roma
  lexicon: BDAG
  rationale: χωρίζεσθαι significa separarse apartarse. La traducción principal conserva esa fuerza sin convertirla en una expulsión explícita; «se apartaran» mantiene la tensión del griego y la lectura publicada en inglés, que evitó «expelled» como lectura principal.
- source_word: προσῆλθεν αὐτοῖς
  english_pob_choice: he went to them
  chosen_spanish: y fue a ellos
  alternatives_spanish:
  - y fue a ellos
  - y se acercó a ellos
  - y se les unió
  lexicon: BDAG
  rationale: προσέρχομαι indica acercarse o ir hacia alguien. «Fue a ellos» es simple y narrativo, y conserva el movimiento sin sobreinterpretarlo.
theological_decisions:
- issue: 'Valor de χωρίζεσθαι / ἀπὸ τῆς Ῥώμης: separación vs. expulsión'
  english_pob_reading: The main text uses the natural English "leave Rome"; the footnote preserves the more literal idea of being separated from Rome, with "expelled" as an alternative.
  chosen_spanish_reading: se apartaran de Roma
  alternative_spanish_readings:
  - salieran de Roma
  - fueran expulsados de Roma
  rationale: El griego habla literalmente de separación de Roma, no de expulsión en términos estrictos. La lectura española principal conserva esa ambigüedad histórica y semántica; «expulsados» queda como alternativa fuerte pero no principal, porque intensifica más allá del verbo.
  doctrine_reference: 'Principio POB: primacía del original y preservación de tensiones léxicas sin suavizarlas ni exagerarlas.'
- issue: Traducción de Ἰουδαῖος / Ἰουδαίους
  english_pob_reading: Jew / Jews
  chosen_spanish_reading: judío / judíos
  alternative_spanish_readings:
  - judeo / judeos
  - judío / judíos
  rationale: En este contexto el referente es étnico-religioso y no meramente geográfico. «Judío» es la forma natural y fiel en español para el sentido del pasaje.
  doctrine_reference: Decisión léxica de identidad étnico-religiosa basada en el contexto narrativo de Hechos 18.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa al preferir una estructura participial breve («recién llegado») y al reflejar más de cerca χωρίζεσθαι con una formulación de separación, no con una expulsión explícita. También conserva la secuencia narrativa del original griego: hallazgo, identificación, procedencia, causa y acercamiento final.'
  spanish_consistency_notes:
  - Se mantiene «Aquila» y «Priscila» como formas castellanas estándar de los nombres propios.
  - Se usa «judío» de manera consistente para Ἰουδαῖος/Ἰουδαίους, sin sustituirlo por términos geográficos.
  - «Ponto» sigue la convención española habitual para Πόντος.
  - La puntuación reproduce la estructura de una sola oración con cláusula causal y cierre narrativo final.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino.
