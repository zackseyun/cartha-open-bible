revisions:
- from: Y halló a un judío llamado Aquila[a], natural de Ponto, recién llegado de Italia con Priscila, su esposa, porque Claudio había ordenado que todos los judíos se apartaran[b] de Roma; y fue a ellos.
  to: Y halló a un judío llamado Áquila, natural de Ponto, recién llegado de Italia con Priscila, su esposa, porque Claudio había ordenado que todos los judíos salieran[a] de Roma; y fue a ellos.
  rationale: Se corrige el nombre propio a la forma española «Áquila», se elimina una nota innecesaria, y se reemplaza «se apartaran de Roma» por «salieran de Roma» para lograr mejor fidelidad semántica y mayor naturalidad en español, mientras la nota conserva la alternativa más literal y la opción interpretativa más fuerte.
