review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: Pablo encuentra a un judío llamado Aquila, natural de Ponto, recién venido de Italia con Priscila su esposa, a causa del edicto de Claudio, y luego va a ellos. Sin embargo, hay dos desajustes relevantes: (1) «Aquila» no sigue la forma española convencional del nombre que corresponde al griego Ἀκύλαν, mejor «Áquila»; y la nota a sobre ese nombre no preserva una alternativa significativa. (2) «se apartaran de Roma» suena poco natural en español para χωρίζεσθαι ... ἀπὸ τῆς Ῥώμης y puede sugerir distanciamiento voluntario más que salida forzada o partida; el inglés POB documenta como principal «depart from Rome», y en español «salieran de Roma» o «partieran de Roma» conserva mejor el sentido sin sobrerinterpretar como «expulsados».'
  spanish_quality_summary: El texto es legible, pero tiene rasgos mejorables para un español bíblico moderno y natural. «Halló» es aceptable, aunque algo más literario; no exige cambio. En cambio, «fue a ellos» es comprensible pero menos idiomático que «fue a verlos» o «fue a donde estaban ellos»; aun así puede mantenerse por cercanía formal. La mejora más necesaria es cambiar «se apartaran de Roma» por una formulación más natural. También conviene eliminar la nota innecesaria sobre el nombre propio y conservar solo una nota léxica real sobre la alternativa más literal.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «judío/judíos», «Claudio», «Roma» y demás están bien encaminados. La principal cuestión léxica es χωρίζεσθαι: en español «apartarse de Roma» no representa tan bien la decisión documentada como «salir de Roma» en texto principal, con nota que preserve «separarse de Roma» y la alternativa más fuerte «ser expulsados de Roma».'
  issues:
  - severity: medium
    issue: Nombre propio «Aquila» en vez de «Áquila»
    rationale: El griego Ἀκύλαν corresponde naturalmente en español bíblico a «Áquila». Mantener la forma latina/inglesa no es imposible, pero es menos propio en una traducción española y la nota asociada no aporta una alternativa léxica real.
  - severity: high
    issue: «Se apartaran de Roma» es poco natural y semánticamente impreciso
    rationale: χωρίζεσθαι ἀπὸ τῆς Ῥώμης expresa separación/salida respecto de Roma. «Apartarse de Roma» en español suena extraño y puede leerse como distanciarse, no necesariamente salir de la ciudad. «Salieran de Roma» preserva mejor el sentido principal documentado por el POB, dejando la literalidad para nota.
  - severity: low
