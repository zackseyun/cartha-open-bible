translation:
  language: es
  text: porque yo estoy contigo, y nadie te atacará[a] para hacerte daño, porque tengo muchas personas en esta ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nadie pondrá la mano sobre ti para hacerte daño».'
    reason: lexical_alternative
  - marker: b
    text: «Tengo muchas personas en esta ciudad» probablemente significa que hay en Corinto muchos que pertenecen al Señor, incluidos los que todavía creerán.
    reason: cross_reference
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Conserva la relación causal clara que introduce la razón de la promesa; «porque» es la forma natural y directa en español contemporáneo.
- source_word: ἐγώ εἰμι μετὰ σοῦ
  english_pob_choice: I am with you
  chosen_spanish: yo estoy contigo
  alternatives_spanish:
  - estoy contigo
  - yo estoy con ustedes
  lexicon: BDAG
  rationale: El griego explicita ἐγώ para énfasis; el pronombre «yo» lo conserva en español sin volver la frase pesada. «Estoy contigo» expresa la presencia prometida de manera fiel y natural.
- source_word: οὐδεὶς ἐπιθήσεταί σοι
  english_pob_choice: no one will attack you
  chosen_spanish: nadie te atacará
  alternatives_spanish:
  - nadie pondrá la mano sobre ti
  - nadie se te echará encima
  lexicon: BDAG
  rationale: En este contexto, ἐπιτίθημι con dativo comunica acción hostil contra Pablo. «Atacar» reproduce bien la fuerza del acto en español sin imponer una imagen más concreta de la que exige el griego.
- source_word: τοῦ κακῶσαί σε
  english_pob_choice: to harm you
  chosen_spanish: para hacerte daño
  alternatives_spanish:
  - para perjudicarte
  - para dañarte
  - para maltratarte
  lexicon: BDAG
  rationale: 'El infinitivo articular expresa propósito: la agresión no logrará su fin de hacerle daño. «Para hacerte daño» mantiene amplitud semántica y suena idiomático en español.'
- source_word: λαός ἐστί μοι πολὺς
  english_pob_choice: I have many people
  chosen_spanish: tengo mucha gente
  alternatives_spanish:
  - tengo muchas personas
  - hay para mí mucha gente
  - me pertenece mucha gente
  lexicon: BDAG
  rationale: El dativo posesivo μοι con εἰμί se expresa naturalmente en español como posesión con «tener». «Gente» reproduce el valor colectivo de λαός sin forzar una construcción artificial como «un pueblo» o «muchos pueblos».
- source_word: ἐν τῇ πόλει ταύτῃ
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - en esta urbe
  - en esta población
  lexicon: BDAG
  rationale: πόλις se traduce de forma normal por «ciudad» en el marco urbano de Corinto; el demostrativo queda bien reflejado con «esta».
theological_decisions:
- issue: Sentido de «many people» en la ciudad
  english_pob_reading: The phrase refers to people in Corinth who belong to the Lord and will come to faith, grounding Paul's safety and continued ministry there.
  chosen_spanish_reading: La frase puede entenderse como personas en Corinto que pertenecen al Señor y que llegarán a la fe, fundamento de la seguridad de Pablo y de su استمرار/continuación ministerial allí.
  alternative_spanish_readings:
  - Puede leerse más generalmente como muchas personas ya favorables a Pablo en la ciudad.
  rationale: En Hechos, el lenguaje de un «pueblo» del Señor suele apuntar a pertenencia pactal más que a simple conteo demográfico. Aun así, el texto griego permite una formulación amplia; por eso la traducción principal conserva la ambigüedad de «tengo mucha gente».
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios respecto del estado auditado, y la redacción española conserva la fuerza causal, la presencia prometida, la amenaza frustrada y la ambigüedad teológica de «mucha gente».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se evitó «señor»/«Señor» como sustituto, porque el texto griego no usa κύριος aquí.
  - Se preservó la tensión de λαός con una opción colectiva natural en español («gente») sin resolverla interpretativamente en el cuerpo principal.
  - La nota textual/lexical de la posibilidad «poner la mano» se mantuvo como alternativa, ya que el griego permite ese matiz aunque la redacción principal prefiera «atacar».
