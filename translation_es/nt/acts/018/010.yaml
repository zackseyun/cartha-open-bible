review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal doble de διότι, la promesa de presencia ('yo estoy contigo'), la idea de ataque hostil (οὐδεὶς ἐπιθήσεταί σοι) y el propósito 'para hacerte daño' (τοῦ κακῶσαί σε). También conserva correctamente la posesión idiomática de λαός ἐστί μοι πολὺς como 'tengo ...'. Sin embargo, 'mucha gente' en español suena más cuantitativo/coloquial y atenúa el matiz de λαός como colectivo de personas pertenecientes al Señor, especialmente dado el razonamiento teológico documentado. 'Muchas personas' preserva mejor el sentido sin imponer 'pueblo'.
  spanish_quality_summary: 'El texto es claro y natural, pero requiere un ajuste menor para un registro más digno y más preciso semánticamente. Además, las notas están desancladas: la nota léxica sobre ''nadie pondrá la mano sobre ti...'' corresponde al segmento de ataque, no a ''contigo''; y la nota explicativa sobre ''tengo mucha gente...'' debe anclarse a esa frase, no a ''hacerte daño''.'
  glossary_alignment: 'No hay conflicto con los términos clave del proyecto (no aparecen Yahvé, Mesías, esclavo, etc.). El punto principal es léxico-estilístico: para λαός, ''muchas personas'' alinea mejor con la decisión inglesa ''many people'' y con la rationale teológica, evitando el tono coloquial de ''mucha gente''.'
  issues:
  - severity: medium
    issue: '''mucha gente'' para λαός ἐστί μοι πολὺς'
    rationale: Aunque idiomático, 'gente' en español puede sonar demasiado coloquial e impersonal aquí. 'Muchas personas' mantiene la colectividad y encaja mejor con la idea de personas que pertenecen al Señor, sin forzar 'pueblo'.
  - severity: medium
    issue: Anclaje incorrecto de las notas [a] y [b]
    rationale: La nota [a] ofrece la alternativa de ἐπιθήσεταί σοι ('nadie pondrá la mano sobre ti'), pero está colocada tras 'contigo'. La nota [b] explica 'tengo ... en esta ciudad', pero está colocada tras 'hacerte daño'. Las notas deben anclarse al segmento pertinente.
  - severity: low
    issue: Registro ligeramente coloquial
    rationale: Con el pequeño cambio a 'muchas personas', el versículo gana dignidad y legibilidad eclesial sin perder naturalidad.
