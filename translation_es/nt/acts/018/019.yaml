translation:
  language: es
  text: Y llegaron a Éfeso[a], y los dejó allí[b]; pero él mismo entró en la sinagoga y razonó[c] con los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arribaron a Éfeso».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, dejó allí a sus compañeros, Priscila y Aquila, mencionados en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: 'O: «discutió con» o «dialogó con». El griego sugiere conversación razonada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατήντησαν
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: BDAG
  rationale: El verbo expresa llegada a un destino. «Llegaron» suena natural en español y conserva el sentido de alcanzar Éfeso sin añadir matices no presentes en el griego.
- source_word: εἰς Ἔφεσον
  english_pob_choice: Ephesus
  chosen_spanish: Éfeso
  alternatives_spanish:
  - a Éfeso
  lexicon: BDAG
  rationale: La preposición εἰς ya se expresa en español con el verbo de movimiento; por eso no es necesario repetir «a» en el texto principal, aunque el sentido direccional queda claro.
- source_word: κἀκείνους
  english_pob_choice: them
  chosen_spanish: a aquellos
  alternatives_spanish:
  - a ellos
  - a los dos
  lexicon: BDAG
  rationale: El griego retoma a los compañeros anteriores. «Aquellos» conserva la referencia anafórica sin introducir nombres en el versículo; el objeto directo se marca con la preposición «a».
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - abandonó
  lexicon: BDAG
  rationale: «Dejó» reproduce bien la acción de quedar a otros en un lugar. «Dejó atrás» sería más explicativo de lo que el griego exige; «abandonó» sería demasiado fuerte.
- source_word: αὐτοῦ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: El genitivo adverbial indica ubicación. «Allí» es la forma más natural en español para conservar la referencia local a Éfeso.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - el mismo Pablo
  lexicon: BDAG
  rationale: Se mantiene el énfasis del pronombre griego, que contrasta su acción personal con la permanencia de sus acompañantes.
- source_word: εἰσελθὼν
  english_pob_choice: entered into
  chosen_spanish: entrando
  alternatives_spanish:
  - habiendo entrado
  - entró
  lexicon: BDAG
  rationale: El participio marca acción previa o concomitante antes del verbo principal implícito en el contexto narrativo. «Entrando» conserva la secuencia sin volver el español pesado.
- source_word: συναγωγήν
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - sinagoga judía
  - asamblea
  lexicon: BDAG
  rationale: En este contexto histórico-religioso, «sinagoga» es la correspondencia directa y clara en español.
- source_word: διελέξατο
  english_pob_choice: reasoned with
  chosen_spanish: razonó
  alternatives_spanish:
  - discutió con
  - dialogó con
  lexicon: BDAG
  rationale: «Razonó» preserva el carácter de discurso argumentativo y reflexivo del verbo, como en la decisión inglesa «reasoned with», sin volverlo polémico de más.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: con los judíos
  alternatives_spanish:
  - a los judíos
  - con el pueblo judío
  lexicon: BDAG
  rationale: En español, la construcción verbal con «razonó con» pide complemento con «con». Se conserva la designación étnico-religiosa del griego sin ampliarla o suavizarla.
theological_decisions:
- issue: Referencia de κἀκείνους a los acompañantes previos
  english_pob_reading: That is, he left his companions there, namely Priscilla and Aquila from the previous verse.
  chosen_spanish_reading: Se entiende que dejó allí a sus compañeros, es decir, a Priscila y Aquila del versículo anterior.
  alternative_spanish_readings:
  - dejó allí a aquellos
  - dejó allí a sus acompañantes
  rationale: La nota aclara la referencia pronominal implícita sin incorporar esos nombres al texto principal. Esto mantiene la transparencia del versículo y su dependencia del contexto inmediato.
  doctrine_reference: Contexto narrativo inmediato; coherencia intratextual (Hechos 18:18-19).
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el control previo y no requiere cambios sustanciales. Se mantiene la estructura narrativa y la fuerza del participio inicial, con una opción verbal española más natural («llegaron», «razonó») y una nota aclaratoria para la referencia de κἀκείνους.
  spanish_consistency_notes:
  - Se mantiene «Éfeso» como topónimo estándar en español.
  - Se evita traducir θεολογicamente con términos eclesiásticos no presentes; el sentido es narrativo y relacional.
  - «Razonó» conserva la decisión POB de evitar tanto «discutió» como una lectura meramente conversacional.
  - La referencia de los acompañantes queda en nota para no sobrecargar el texto principal.
