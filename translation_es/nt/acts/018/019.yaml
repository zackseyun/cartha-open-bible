revisions:
- from: Y llegaron a Éfeso[a], y dejó allí[b] a aquellos; pero él mismo[c], entrando en la sinagoga, razonó[d] con los judíos.
  to: Y llegaron a Éfeso[a], y los dejó allí[b]; pero él mismo entró en la sinagoga y razonó[c] con los judíos.
  rationale: 'La revisión hace el español más natural sin perder ninguna distinción del griego: «los dejó allí» expresa mejor κἀκείνους + κατέλιπεν αὐτοῦ en español corriente; se elimina una nota estilística innecesaria; y se corrige la nota léxica redundante para que ofrezca una alternativa auténtica. También se simplifica «entrando en la sinagoga» a «entró en la sinagoga», que transmite con naturalidad la relación del participio con el verbo principal en narrativa española.'
