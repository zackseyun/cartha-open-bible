review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del griego: causa (διὰ τὸ ... εἶναι), residencia con ellos (ἔμενεν παρ’ αὐτοῖς), trabajo (ἠργάζετο) y explicación del oficio (ἦσαν γὰρ σκηνοποιοὶ τῇ τέχνῃ). También conserva correctamente la nota léxica alternativa para σκηνοποιοί. Sin embargo, la frase final ''por oficio'' suena poco idiomática en español, y ''fabricantes de tiendas de campaña'' es entendible pero algo pesada.'
  spanish_quality_summary: El español es claro pero mejorable en naturalidad y fluidez. 'Porque' en vez de 'como' refleja más directamente el valor causal, aunque ambas opciones son posibles. 'Hacedores de tiendas' no sería natural; el borrador evita eso, pero 'fabricantes de tiendas de campaña' resulta largo. 'Fabricantes de tiendas' o 'fabricantes de carpas' serían más naturales; para registro bíblico amplio, 'fabricantes de tiendas' funciona bien, especialmente con la nota sobre posible sentido más amplio. La expresión 'por oficio' debe cambiarse por 'de oficio', que es la formulación idiomática estándar.
  glossary_alignment: No hay términos teológicos de alto riesgo aquí. La decisión principal 'σκηνοποιοί -> fabricantes de tiendas' respeta la preferencia de la POB por el sentido principal 'tentmakers', y la nota conserva la alternativa 'trabajadores del cuero'. Las demás decisiones léxicas concuerdan con el expediente inglés y con un español eclesial legible.
  issues:
  - severity: medium
    issue: La expresión 'por oficio' es poco idiomática para τῇ τέχνῃ.
    rationale: El griego indica la ocupación o artesanía habitual; en español natural se expresa mejor con 'de oficio' o 'ese era su oficio'. 'Por oficio' suena forzado.
  - severity: low
    issue: '''Fabricantes de tiendas de campaña'' es correcto pero algo pesado y redundante en este contexto.'
    rationale: El español bíblico-natural suele preferir una formulación más compacta. 'Fabricantes de tiendas' comunica bien el oficio sin perder sentido, especialmente con la nota aclaratoria.
  - severity: low
    issue: '''Y como era del mismo oficio'' es aceptable, pero ''porque era del mismo oficio'' calca más directamente la causalidad explícita del griego.'
    rationale: No es un error de fidelidad, pero 'porque' es la conjunción causal más directa y transparente aquí.
  revised_spanish_text: Y porque era del mismo oficio, se quedó con ellos y trabajó, porque eran fabricantes de tiendas[a] de oficio.
  revised_footnotes:
  - marker: a
    text: O posiblemente 'trabajadores del cuero'; el término griego puede referirse de manera más amplia a quienes fabricaban tiendas o trabajaban en el oficio relacionado.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'como' a 'porque' para reflejar de manera más directa la relación causal de διά + infinitivo articular; se sustituye 'fabricantes de tiendas de campaña' por la forma más natural y compacta 'fabricantes de tiendas'; y se corrige 'por oficio' a 'de oficio', que es el giro idiomático español que mejor expresa τῇ τέχνῃ.
