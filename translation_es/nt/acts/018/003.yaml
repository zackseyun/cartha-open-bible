revisions:
- from: Y como era del mismo oficio[a], se quedó con ellos y trabajó, porque eran fabricantes de tiendas de campaña por oficio.
  to: Y porque era del mismo oficio, se quedó con ellos y trabajó, porque eran fabricantes de tiendas[a] de oficio.
  rationale: Se ajusta 'como' a 'porque' para reflejar de manera más directa la relación causal de διά + infinitivo articular; se sustituye 'fabricantes de tiendas de campaña' por la forma más natural y compacta 'fabricantes de tiendas'; y se corrige 'por oficio' a 'de oficio', que es el giro idiomático español que mejor expresa τῇ τέχνῃ.
