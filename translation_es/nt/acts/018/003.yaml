translation:
  language: es
  text: Y porque era del mismo oficio, se quedó con ellos y trabajó, porque eran fabricantes de tiendas[a] de oficio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'trabajadores del cuero'; el término griego puede referirse de manera más amplia a quienes fabricaban tiendas o trabajaban en el oficio relacionado.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ ὁμότεχνον εἶναι
  english_pob_choice: because he was of the same trade
  chosen_spanish: porque era del mismo oficio
  alternatives_spanish:
  - porque tenía el mismo oficio
  - porque era un colega de oficio
  - porque compartía el mismo oficio
  lexicon: BDAG
  rationale: El giro causal con διά + articular infinitive se expresa naturalmente con 'porque'. ὁμότεχνος comunica la idea de compartir el mismo oficio o arte; 'del mismo oficio' conserva esa relación laboral sin forzar una paráfrasis más libre.
- source_word: ἔμενεν παρ’ αὐτοῖς
  english_pob_choice: he stayed with them
  chosen_spanish: se quedó con ellos
  alternatives_spanish:
  - permaneció con ellos
  - se alojó con ellos
  - se hospedó con ellos
  lexicon: BDAG
  rationale: μένω en este contexto narrativo indica permanecer o quedarse en un lugar con otras personas. 'Se quedó con ellos' es natural en español y conserva el sentido de residencia compartida.
- source_word: ἠργάζετο
  english_pob_choice: worked
  chosen_spanish: trabajó
  alternatives_spanish:
  - estaba trabajando
  - laboraba
  - hacía ese trabajo
  lexicon: BDAG
  rationale: ἐργάζομαι aquí se refiere a realizar trabajo manual u ocupacional. El aoristo/imperfecto narrativo queda bien expresado con el pretérito simple 'trabajó' en español.
- source_word: σκηνοποιοὶ
  english_pob_choice: tentmakers
  chosen_spanish: fabricantes de tiendas de campaña
  alternatives_spanish:
  - tenderos de tiendas
  - hacedores de tiendas
  - fabricantes de carpas
  lexicon: BDAG
  rationale: La decisión principal de la POB en inglés es 'tentmakers', con una nota sobre la posible amplitud hacia 'leatherworkers'. En español, 'fabricantes de tiendas de campaña' mantiene el sentido principal de forma clara y pública sin introducir un tecnicismo menos transparente.
- source_word: τῇ τέχνῃ
  english_pob_choice: by trade
  chosen_spanish: por oficio
  alternatives_spanish:
  - como oficio
  - en su oficio
  - por su oficio
  lexicon: BDAG
  rationale: τέχνη denota oficio, arte o habilidad; el dativo aquí funciona de manera adverbial. 'Por oficio' comunica que esa era su ocupación habitual y reproduce bien la función idiomática de la frase.
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con la edición fuente y con el informe de revisión: no se detectaron cambios aplicados ni tensiones textuales adicionales. La traducción sigue la lectura de alta concordancia del audito en inglés, preservando la ambigüedad lexical indicada en la nota.'
  spanish_consistency_notes:
  - Se usa 'oficio' para traducir τέχνη de forma consistente con el valor ocupacional del contexto.
  - '''Tiendas de campaña'' evita una lectura demasiado estrecha o demasiado moderna de σκηνοποιοί.'
  - La nota al pie mantiene la alternativa léxica documentada en el audit trail en lugar de resolverla dogmáticamente.
