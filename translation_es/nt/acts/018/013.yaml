translation:
  language: es
  text: 'diciendo[a][b]: «Este hombre persuade a la gente a adorar a Dios, en contra de la ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra la ley» o «en violación de la ley».
    reason: lexical_alternative
  - marker: b
    text: Los acusadores probablemente se refieren a la ley judía, aunque el griego simplemente dice «la ley».
    reason: cultural_note
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - afirmando
  lexicon: BDAG
  rationale: El participio introduce el contenido de la acusación; en español, «diciendo» conserva la relación sintáctica sin añadir matices no presentes en el griego.
- source_word: Παρὰ τὸν νόμον
  english_pob_choice: contrary to the law
  chosen_spanish: en contra de la ley
  alternatives_spanish:
  - contrario a la ley
  - en violación de la ley
  lexicon: BDAG
  rationale: παρά con acusativo expresa oposición/contrariedad. «En contra de la ley» suena natural en español y mantiene el tono acusatorio sin sobreinterpretar.
- source_word: ἀναπείθει
  english_pob_choice: is persuading
  chosen_spanish: persuade
  alternatives_spanish:
  - está persuadiendo
  - está ganando para sí
  - está induciendo
  lexicon: BDAG
  rationale: El valor básico es influir o convencer; «persuade» es directo y fiel. El presente puede funcionar en español como presente de valor actual en una acusación.
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - éste
  - este individuo
  lexicon: BDAG
  rationale: El demostrativo tiene fuerza deíctica y algo acusatoria; «Este hombre» conserva ese señalamiento sin coloquialidad excesiva.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico; «la gente» expresa bien el conjunto de personas sin volverlo masculino ni demasiado formal.
- source_word: σέβεσθαι τὸν θεόν
  english_pob_choice: to worship God
  chosen_spanish: reverenciar a Dios
  alternatives_spanish:
  - adorar a Dios
  - rendir culto a Dios
  - venerar a Dios
  lexicon: BDAG
  rationale: σέβομαι aquí puede abarcar reverencia/devoción religiosa. Elegí «reverenciar» para no forzar «adorar» si el contexto subraya respeto religioso general, aunque mantiene una lectura devocional.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: θεός se traduce como «Dios» según el criterio del proyecto; el complemento directo con «a» corresponde al uso personal en español.
theological_decisions:
- issue: Sentido de σέβεσθαι
  english_pob_reading: to worship God
  chosen_spanish_reading: reverenciar a Dios
  alternative_spanish_readings:
  - adorar a Dios
  - rendir culto a Dios
  rationale: La forma griega puede señalar devoción religiosa en general. «Reverenciar» mantiene el respeto culto sin afirmar más de lo que exige la forma verbal, aunque deja abierta la dimensión de culto que el contexto puede implicar.
  doctrine_reference: BDAG; translation philosophy §§1, 5
- issue: Referente de τὸν νόμον
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la ley judía
  - nuestra ley
  rationale: El griego dice simplemente «la ley». Como el inglés POB retiene esa formulación genérica, el español también la conserva sin explicitar «judía» en el texto principal.
  doctrine_reference: translation philosophy §§1, 5
- issue: Valor de τοὺς ἀνθρώπους
  english_pob_reading: people
  chosen_spanish_reading: la gente
  alternative_spanish_readings:
  - las personas
  - los hombres
  rationale: El plural masculino griego es genérico. «La gente» evita un sesgo masculino y comunica el alcance colectivo de la acusación.
  doctrine_reference: translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y toma como guía el trayecto auditado del inglés POB. Se preserva la acusación como contenido directo del discurso, se mantiene la referencia genérica a “la ley” sin ampliar el texto principal, y se conserva el sentido genérico de ἄνθρωποι como colectivo humano. No se detectaron revisiones previas aplicadas en el paquete de origen.
  spanish_consistency_notes:
  - Se usa «Dios» y no una sustitución litúrgica diferente, conforme al estándar del proyecto.
  - Se mantiene la frase acusatoria con puntuación española y comillas angulares para legibilidad.
  - El tono es formal y eclesialmente legible, sin calco rígido del inglés.
