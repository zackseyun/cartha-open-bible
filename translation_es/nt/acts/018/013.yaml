  glossary_alignment: 'No hay conflicto con terminología de proyecto en «Dios» ni en «la ley». El problema principal es léxico-semántico: σέβομαι en este contexto debe alinearse con «adorar»/«rendir culto», no con «reverenciar», para preservar la fuerza religiosa de worship documentada en el POB inglés.'
