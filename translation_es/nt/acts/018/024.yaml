revisions:
- from: Y un judío llamado Apolos[a], alejandrino por su origen, hombre elocuente, llegó a Éfeso, siendo poderoso en las Escrituras.
  to: Había un judío llamado Apolos[a], alejandrino de nacimiento, hombre elocuente, que llegó a Éfeso, siendo poderoso en las Escrituras.
  rationale: Se ajusta el arranque narrativo para reflejar mejor la función de δέ + τις en español natural, y se reemplaza 'por su origen' por 'de nacimiento' para una expresión más idiomática y fiel a τῷ γένει. Se conserva 'elocuente' con nota alternativa, y también 'poderoso en las Escrituras' por su cercanía a δυνατὸς ὢν y a la decisión inglesa.
