translation:
  language: es
  text: Había un judío llamado Apolos[a], alejandrino de nacimiento, hombre elocuente, que llegó a Éfeso, siendo poderoso en las Escrituras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «erudito» para «elocuente»; λόγιος puede describir tanto la elocuencia como el aprendizaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: BDAG
  rationale: En este contexto narrativo identifica a Apolos por su pertenencia étnico-religiosa, no principalmente por procedencia geográfica. 'Judío' transmite mejor esa identificación en español.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: En español, 'Y' funciona como transición narrativa natural al introducir un nuevo personaje sin añadir contraste fuerte.
- source_word: τις
  english_pob_choice: a certain
  chosen_spanish: un
  alternatives_spanish:
  - un cierto
  - alguien
  lexicon: BDAG
  rationale: La indefinición ya queda suficientemente expresada en español con el artículo indefinido; 'un cierto' sonaría más pesado sin aportar una distinción necesaria.
- source_word: Ἀπολλῶς ὀνόματι
  english_pob_choice: named Apollos
  chosen_spanish: llamado Apolos
  alternatives_spanish:
  - de nombre Apolos
  - nombrado Apolos
  lexicon: BDAG
  rationale: '''Llamado'' reproduce de manera natural la fórmula de introducción del nombre y evita un calco poco idiomático.'
- source_word: Ἀλεξανδρεὺς τῷ γένει
  english_pob_choice: an Alexandrian by birth
  chosen_spanish: alejandrino por su origen
  alternatives_spanish:
  - alejandrino de nacimiento
  - alejandrino por nacimiento
  - natural de Alejandría
  lexicon: BDAG
  rationale: La frase griega indica procedencia/descentencia. 'Por su origen' conserva esa idea sin forzar la expresión inglesa 'by birth' y sin introducir una nota de 'raza' que el español actual podría malinterpretar.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: BDAG
  rationale: El sustantivo es masculino y refiere a Apolos como individuo. 'Hombre' es la equivalencia directa y natural en español.
- source_word: λόγιος
  english_pob_choice: eloquent
  chosen_spanish: elocuente
  alternatives_spanish:
  - erudito
  - instruido
  - sabio
  lexicon: BDAG
  rationale: Aquí se mantiene la lectura de 'eloquent' de la POB inglesa, que encaja bien con el retrato de Apolos y con el paralelismo implícito con su dominio de las Escrituras.
- source_word: κατήντησεν
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - arrivó
  - alcanzó
  lexicon: BDAG
  rationale: El verbo expresa la llegada a un destino; 'llegó' es la forma más natural y directa en español.
- source_word: εἰς Ἔφεσον
  english_pob_choice: in Ephesus
  chosen_spanish: a Éfeso
  alternatives_spanish:
  - en Éfeso
  lexicon: BDAG
  rationale: Con 'llegó', el español normalmente usa 'a' para marcar destino. 'En Éfeso' sería posible, pero menos preciso con el verbo de movimiento.
- source_word: δυνατὸς ὢν
  english_pob_choice: being mighty
  chosen_spanish: siendo poderoso
  alternatives_spanish:
  - siendo fuerte
  - siendo capaz
  - siendo muy versado
  lexicon: BDAG
  rationale: Se conserva el matiz de capacidad/intensidad de δυνατός con una formulación bíblica clara en español. 'Poderoso' mantiene el énfasis fuerte de la POB inglesa sin reducirlo a mera habilidad técnica.
- source_word: ἐν ταῖς γραφαῖς
  english_pob_choice: in the Scriptures
  chosen_spanish: en las Escrituras
  alternatives_spanish:
  - en las Sagradas Escrituras
  - en las Escrituras santas
  - en los escritos
  lexicon: BDAG
  rationale: En este contexto judío-cristiano, γραφαί remite a las Escrituras reconocidas. 'Escrituras' con mayúscula es la forma natural y precisa en español.
theological_decisions:
- issue: Sentido de λόγιος entre 'elocuente' y 'erudito'
  english_pob_reading: eloquent; footnote preserves 'learned man' as an alternative
  chosen_spanish_reading: elocuente; con nota que deja abierta la alternativa 'erudito'
  alternative_spanish_readings:
  - erudito
  - instruido
  rationale: El griego admite tanto fluidez verbal como formación aprendida. La traducción principal sigue la lectura de la POB inglesa, pero la nota conserva la tensión semántica para no cerrar indebidamente el rango del término.
  doctrine_reference: Lexical semantics; no doctrinal dispute.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto fuente y con la decisión inglesa; no se registran revisiones aplicadas en el audit trail más reciente, así que la redacción española sigue de cerca la lectura estable.
  spanish_consistency_notes:
  - Se usa 'Apolos' para uniformidad con la tradición castellana y por adaptación del nombre griego.
  - Se prefiere 'Escrituras' con mayúscula para reflejar el referente bíblico reconocido en el contexto.
  - '''Poderoso'' se mantiene como eco de la intensidad de δυνατός, evitando suavizar el rasgo descriptivo.'
