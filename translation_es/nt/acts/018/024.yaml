review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: introduce a Apolos como judío, alejandrino de origen, hombre λόγιος, llegado a Éfeso y destacado en las Escrituras. También preserva correctamente la alternativa léxica de λόγιος mediante nota. Sin embargo, hay dos detalles mejorables para una fidelidad más precisa al matiz y a la legibilidad: δέ + τις queda algo más natural en español como ''Había/Judío llamado...'' o ''Ahora bien, había...'', y ''por su origen'' suena menos idiomático que ''de nacimiento'' o ''natural de Alejandría'' para τῷ γένει.'
  spanish_quality_summary: El texto es claro y comprensible, pero 'Y un judío...' suena algo rígido como arranque de versículo en español, y 'alejandrino por su origen' resulta poco natural. 'Siendo poderoso en las Escrituras' es entendible, aunque 'muy versado en las Escrituras' o 'poderoso en las Escrituras' ambos son posibles; aquí puede mantenerse 'poderoso' por cercanía al proyecto, pero conviene suavizar el inicio y la frase de procedencia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'judío', 'Escrituras' y el nombre 'Apolos' están bien. La decisión principal sobre λόγιος como 'elocuente' con nota 'erudito' está bien alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: Inicio con 'Y un judío'
    rationale: Aunque δέ marca transición narrativa, en español bíblico-natural 'Y un judío...' suena torpe. 'Había un judío...' o 'Ahora bien, un judío...' comunica mejor la función discursiva sin pérdida de sentido.
  - severity: medium
    issue: '''alejandrino por su origen'' es poco idiomático'
    rationale: τῷ γένει indica origen/nacimiento. La formulación actual es comprensible pero no natural. 'alejandrino de nacimiento' conserva el sentido auditado y lee mejor en español.
  revised_spanish_text: Había un judío llamado Apolos[a], alejandrino de nacimiento, hombre elocuente, que llegó a Éfeso, siendo poderoso en las Escrituras.
  revised_footnotes:
  - marker: a
    text: O «erudito» para «elocuente»; λόγιος puede describir tanto la elocuencia como el aprendizaje.
    reason: lexical_alternative
  revision_rationale: Se ajusta el arranque narrativo para reflejar mejor la función de δέ + τις en español natural, y se reemplaza 'por su origen' por 'de nacimiento' para una expresión más idiomática y fiel a τῷ γένει. Se conserva 'elocuente' con nota alternativa, y también 'poderoso en las Escrituras' por su cercanía a δυνατὸς ὢν y a la decisión inglesa.
