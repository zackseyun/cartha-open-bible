translation:
  language: es
  text: Y los expulsó del tribunal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estrado judicial» o «banco»; el griego βῆμα se refiere aquí al asiento oficial de juicio o a la plataforma judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción solo enlaza la acción con la narración previa; «Y» conserva esa continuidad simple sin añadir matiz interpretativo.
- source_word: ἀπήλασεν
  english_pob_choice: drove ... away
  chosen_spanish: los expulsó
  alternatives_spanish:
  - los echó
  - los hizo salir
  - los despidió
  lexicon: BDAG
  rationale: El aoristo de ἀπελαύνω expresa expulsión o alejamiento con autoridad. «Los expulsó» preserva mejor la fuerza forzosa del verbo que una opción más suave como «despidió».
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - aquellos hombres
  lexicon: BDAG
  rationale: El pronombre se refiere a los acusadores o a las partes presentes ante Galión. En español, el clítico de objeto directo «los» es natural y no sobreespecifica el referente.
- source_word: βήματος
  english_pob_choice: judgment seat
  chosen_spanish: tribunal
  alternatives_spanish:
  - asiento de juicio
  - estrado judicial
  - banco
  lexicon: BDAG
  rationale: En este contexto judicial, βῆμα nombra el lugar oficial de audiencia o decisión. «Tribunal» comunica ese marco forense de forma clara y idiomática en español, sin depender de la metáfora de un «asiento».
- source_word: ἀπὸ τοῦ βήματος
  english_pob_choice: from the judgment seat
  chosen_spanish: de delante del tribunal
  alternatives_spanish:
  - del tribunal
  - de la presencia del tribunal
  - del estrado judicial
  lexicon: BDAG
  rationale: La preposición ἀπό marca alejamiento o separación. «De delante del tribunal» refleja no solo el origen espacial sino la expulsión de la audiencia judicial, manteniendo la idea de alejamiento del lugar de comparecencia.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones sustantivas; la versión española sigue de cerca el valor narrativo y jurídico del griego, conservando la fuerza de ἀπήλασεν y el sentido forense de βῆμα.
  spanish_consistency_notes:
  - Se mantiene «tribunal» para βῆμα en contexto judicial, consistente con un registro bíblico claro y contemporáneo.
  - Se eligió «expulsó» para reflejar la acción enérgica del verbo griego, evitando suavizarla con «despidió».
  - «De delante del tribunal» intenta captar el alejamiento desde el lugar de audiencia, no solo desde la presencia personal de Galión.
