translation:
  language: es
  text: 'Y se quedaban atónitos y asombrados, diciendo: «Miren[a], ¿no son galileos todos estos que están hablando?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vean» o «He aquí» para «Miren».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  english_pob_choice: were astonished
  chosen_spanish: se quedaban atónitos
  alternatives_spanish:
  - estaban asombrados
  - quedaban fuera de sí
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción continua o en desarrollo. «Se quedaban atónitos» conserva ese matiz dinámico y refleja bien el asombro intenso sin sonar rígido en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza la narración de forma suave; «Y» es el equivalente más natural en español.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: Coordina los dos verbos imperfectos y presenta la reacción acumulada; «y» mantiene la simpleza y la fuerza del paralelismo.
- source_word: ἐθαύμαζον
  english_pob_choice: were amazed
  chosen_spanish: asombrados
  alternatives_spanish:
  - maravillados
  - admirados
  lexicon: BDAG
  rationale: «Asombrados» transmite la sorpresa intensa de θαυμάζω y se ajusta bien al giro con el verbo anterior, evitando un término demasiado arcaico.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del discurso; «diciendo» es la equivalencia directa y clara en español.
- source_word: Οὐχ ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¿No son...
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: BDAG
  rationale: La partícula interrogativa con ἰδού funciona como un llamado de atención que introduce una pregunta con respuesta esperada afirmativa. En español, la forma interrogativa negativa comunica mejor ese efecto retórico que un simple «Miren».
- source_word: πάντες οὗτοί
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - estos todos
  - todos estos hombres
  lexicon: BDAG
  rationale: La referencia es al grupo presente; «todos estos» conserva la deixis sin añadir «hombres», que no aparece explícitamente en el griego.
- source_word: οἱ λαλοῦντες
  english_pob_choice: who are speaking
  chosen_spanish: los que hablan
  alternatives_spanish:
  - quienes hablan
  - los hablantes
  lexicon: BDAG
  rationale: El participio sustantivado identifica a los hablantes. «Los que hablan» es natural en español y conserva la acción en curso sin forzar una perífrasis innecesaria.
- source_word: Γαλιλαῖοι
  english_pob_choice: Galileans
  chosen_spanish: galileos
  alternatives_spanish:
  - galileos de Galilea
  - gente de Galilea
  lexicon: BDAG
  rationale: Se trata de la designación regional/étnica. «Galileos» reproduce de manera directa el valor del sustantivo-adjetivo griego y preserva el impacto de la sorpresa por su procedencia.
theological_decisions:
- issue: Alcance de la sorpresa ante la identidad regional
  english_pob_reading: Retained the bare regional term without importing an explanatory gloss about accent, education, or status.
  chosen_spanish_reading: Se mantiene el término regional desnudo («galileos») sin añadir explicaciones sobre acento, educación o condición social.
  alternative_spanish_readings:
  - galileos del norte
  - galileos ignorantes
  rationale: El versículo expresa asombro por la identidad de los hablantes, pero no explica la causa. Traducir sin glosas preserva la reserva del texto y evita introducir inferencias no explícitas.
  doctrine_reference: 'Principio de fidelidad textual: no incorporar interpretaciones que el versículo no formula.'
translation_notes:
  revision_awareness: El texto griego presenta dos verbos imperfectos coordinados (ἐξίσταντο / ἐθαύμαζον), y el cierre interrogativo retórico con οὐχ ἰδοὺ. La redacción española conserva esa progresión aspectual y evita añadir una explicación del motivo del asombro que el versículo no da.
  spanish_consistency_notes:
  - Se usa «galileos» como término regional sin mayúscula, conforme al uso común en español cuando funciona como gentilicio sustantivado.
  - «Atónitos» y «asombrados» se mantienen juntos para reflejar la doble reacción del texto griego.
  - La pregunta se mantiene entre signos de interrogación españoles y comillas angulares para el discurso directo.
