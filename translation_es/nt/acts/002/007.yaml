review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: dos imperfectos coordinados, el participio «diciendo», la pregunta negativa que espera respuesta afirmativa y la referencia a «galileos». Sin embargo, omite el valor explícito de ἰδού («Miren/Vean/He aquí»), y la pregunta española actual «¿No son todos estos los que hablan galileos?» suena ambigua y poco natural, como si «galileos» pudiera modificar «hablan» en vez de predicarse de «estos».'
  spanish_quality_summary: El texto es comprensible, pero «los que hablan galileos» resulta gramaticalmente torpe en español. Una formulación más natural y fiel es «todos estos que están hablando» o «todos estos que hablan», seguida de «galileos». También conviene reubicar la nota al lugar correcto si se conserva una nota sobre «Miren».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Galileos» es correcto. La principal cuestión léxica es preservar ἰδού con un equivalente español explícito («Miren»), tal como el inglés POB preservó «Look» con nota de alternativa.
  issues:
  - severity: high
    issue: Se omite ἰδού en el texto principal.
    rationale: El griego incluye una partícula deíctica/llamativa («ἰδού») y el English POB la preserva como «Look». El borrador absorbe su efecto en la sola pregunta negativa, pero eso pierde un elemento léxico del original.
  - severity: high
    issue: «los que hablan galileos» es una construcción española deficiente y potencialmente ambigua.
    rationale: En español, la secuencia puede leerse como si «galileos» calificara la manera de hablar. El griego σημαίνει «los que están hablando» + predicado «son galileos». Debe aclararse la sintaxis.
  - severity: medium
    issue: La nota al pie actual no corresponde al elemento que el English POB anota.
    rationale: La nota española comenta «¿No son...?», pero la nota inglesa documenta alternativas para «Look» («Behold/See»). Si se mantiene nota, debe anclarse en «Miren» o equivalente.
  revised_spanish_text: 'Y se quedaban atónitos y asombrados, diciendo: «Miren[a], ¿no son galileos todos estos que están hablando?»'
  revised_footnotes:
  - marker: a
    text: O «Vean» o «He aquí» para «Miren».
    reason: lexical_alternative
  revision_rationale: La revisión restaura explícitamente ἰδού con «Miren», corrige la sintaxis española para que «galileos» se predique claramente de «todos estos», y alinea la nota al pie con el audit trail inglés, que registra alternativas para el llamado de atención y no para la mera forma interrogativa.
