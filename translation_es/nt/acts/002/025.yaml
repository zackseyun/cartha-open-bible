revisions:
- from: 'Pues David dice acerca de él[a]: «Vi al Señor continuamente delante de mí, porque está a mi derecha[b], para que no sea sacudido».'
  to: 'Pues David dice acerca de él[a]: «Vi al Señor continuamente delante de mí, porque está a mi derecha[b], para que yo no sea sacudido».'
  rationale: 'Se hizo una reparación mínima para que la cláusula final refleje con claridad la primera persona del griego y suene natural en español: «para que yo no sea sacudido». También se ajustó la nota b para evitar una referencia innecesariamente anglocéntrica y hacerla más útil en español, sin cambiar su contenido esencial.'
