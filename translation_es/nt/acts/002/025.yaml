base_translation:
  language: en
  yaml_path: translation/nt/acts/002/025.yaml
  text: For David says concerning him[a], ‘I saw the Lord continually before me, because he is at my right hand[b], so that I may not be shaken.’
  footnotes:
  - marker: a
    text: Or 'I foresaw the Lord before me always.' The Greek verb can, in some contexts, carry the sense 'foresee,' but here the surrounding phrases favor the sense of continually keeping the Lord before oneself.
    reason: lexical_alternative
  - marker: b
    text: Peter is quoting Psalm 16:8. In its Hebrew form, the underlying title is the divine name rendered in English translations as 'the LORD.'
    reason: cross_reference
