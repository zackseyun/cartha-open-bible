translation:
  language: es
  text: 'Pues David dice acerca de él[a]: «Vi al Señor continuamente delante de mí, porque está a mi derecha[b], para que yo no sea sacudido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preví al Señor delante de mí continuamente». El verbo griego puede, en algunos contextos, significar «prever», pero aquí el contexto favorece la idea de tener al Señor siempre delante de uno.'
    reason: lexical_alternative
  - marker: b
    text: Pedro está citando el Salmo 16:8. En su forma hebrea, el título subyacente es el nombre divino, que en muchas traducciones se vierte como «el SEÑOR».
    reason: cross_reference
lexical_decisions:
- source_word: λέγει εἰς αὐτόν
  english_pob_choice: says concerning him
  chosen_spanish: dice acerca de él
  alternatives_spanish:
  - dice de él
  - dice con respecto a él
  lexicon: BDAG
  rationale: 'La expresión griega es una fórmula de cita con referencia a una persona, no necesariamente de dirección literal. «Acerca de él» comunica bien la referencia y mantiene el valor del contexto: David habla de alguien, entendido aquí en el discurso de Pedro como el Mesías.'
- source_word: Προορώμην
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - veía
  - vi de antemano
  - preví
  lexicon: BDAG
  rationale: El imperfecto medio tiene fuerza durativa o habitual en el Salmo citado. En español, «vi» con el adverbio «continuamente» reproduce de manera natural la escena de tener al Señor delante de sí de forma constante, sin introducir una paráfrasis excesiva.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - al Señor
  lexicon: BDAG
  rationale: Se conserva «Señor» como equivalente de κύριος en la cita griega, sin sustituirlo por «Yahvé» en el cuerpo del texto porque el pasaje cita la Septuaginta y el énfasis inmediato es la forma griega de la cita. El artículo y la función objeto se expresan naturalmente con «al Señor».
- source_word: ἐνώπιόν μου
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: BDAG
  rationale: «Delante de mí» es la manera más natural en español de conservar la imagen espacial-relacional del hebreo/griego sin perder el matiz devocional de tener al Señor presente ante uno.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: «Continuamente» expresa bien la duración constante de la acción y mantiene el ritmo de la cláusula.
- source_word: ἐκ δεξιῶν μού
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi diestra
  - a mi lado derecho
  lexicon: BDAG
  rationale: La locución idiomática se vierte con una expresión española clara y natural. «A mi derecha» conserva la idea de posición de apoyo y protección sin sonar arcaica.
- source_word: ἵνα μὴ σαλευθῶ
  english_pob_choice: so that I may not be shaken
  chosen_spanish: para que no sea sacudido
  alternatives_spanish:
  - para que no vacile
  - para que no me conmueva
  lexicon: BDAG
  rationale: «Sacudido» conserva la imagen de inestabilidad del verbo σαλεύω. «Para que» expresa el valor de finalidad/resultad o de ἵνα, y la pasiva en español refleja adecuadamente la voz del griego.
theological_decisions:
- issue: Referencia de κύριος en la cita de Salmo 16:8
  english_pob_reading: Retain 'the Lord' without specifying further in the translation text
  chosen_spanish_reading: Mantener «el Señor» sin identificarlo explícitamente como Yahvé o como el Mesías en el texto principal
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  - el Mesías
  rationale: El griego cita κύριον; traducirlo como «Señor» conserva la forma del texto fuente y deja intacta la tensión interpretativa. En la predicación de Pedro el salmo se aplica cristológicamente, pero la traducción del versículo no debe resolver por adelantado la identificación que el discurso desarrolla.
  doctrine_reference: 'Tensión teológica preservada: κύριος → Señor; cita salmódica en contexto cristológico.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se descartó una lectura demasiado anticipatoria de Προορώμην y se mantuvo la idea durativa con «continuamente». También se preservó la decisión de no resolver interpretativamente el referente de κύριος dentro del texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al criterio del proyecto en citas griegas.
  - Se usó «para que no sea sacudido» para conservar la imagen de inestabilidad sin cambiar el sentido a una paráfrasis doctrinal.
  - La puntuación y comillas siguen el uso editorial español y mantienen la estructura de cita introducida por Pablo/Pedro.
