review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB en inglés: «dice acerca de él» refleja adecuadamente λέγει εἰς αὐτόν; «vi… continuamente delante de mí» preserva la combinación de Προορώμην + διὰ παντός + ἐνώπιόν μου; y «a mi derecha» comunica bien ἐκ δεξιῶν μού. Sin embargo, «para que no sea sacudido» introduce una pasiva impersonal menos natural en español donde el sujeto del verbo es claramente el hablante del salmo; conviene explicitarlo como «yo no sea sacudido» o mejor «no sea sacudido». Además, por claridad estilística, el orden «siempre delante de mí»/«continuamente delante de mí» puede mantenerse, pero el cierre debe sonar más idiomático en español.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero hay un detalle de naturalidad importante: «para que no sea sacudido» suena algo rígido y ambiguo al omitir el sujeto en una construcción pasiva final. «Para que yo no sea sacudido» o «para que no me sacudan» sería más claro, pero para conservar la voz pasiva del griego y la formalidad del registro, «para que yo no sea sacudido» es la mejor reparación mínima. El resto del español es legible y apropiado.'
  glossary_alignment: Buena alineación general con la terminología del proyecto. Mantener «Señor» para κύριον es defendible aquí por tratarse de una cita griega de un salmo, y la nota b conserva la referencia al nombre divino subyacente. No hace falta forzar «Yahvé» en el texto principal en este caso, dado el razonamiento teológico ya documentado. No hay conflicto con Mesías/Cristo ni otras entradas del glosario.
  issues:
  - severity: medium
    issue: 'Construcción final poco natural: «para que no sea sacudido»'
    rationale: Aunque formalmente posible, en español suena ambigua y algo rígida porque la pasiva queda sin sujeto expreso, mientras que el griego σαλευθῶ es primera persona singular. Añadir «yo» conserva la voz pasiva y aclara el referente.
  - severity: low
    issue: Nota b conserva una referencia específica al inglés
    rationale: La frase «en muchas traducciones al inglés» proviene del audit trail inglés. No es incorrecta, pero en una edición española sería más natural formularla sin centrarla en el inglés. Aun así, puede aceptarse si se busca fidelidad al aparato del POB en inglés.
  revised_spanish_text: 'Pues David dice acerca de él[a]: «Vi al Señor continuamente delante de mí, porque está a mi derecha[b], para que yo no sea sacudido».'
  revised_footnotes:
  - marker: a
    text: 'O: «preví al Señor delante de mí continuamente». El verbo griego puede, en algunos contextos, significar «prever», pero aquí el contexto favorece la idea de tener al Señor siempre delante de uno.'
    reason: lexical_alternative
  - marker: b
    text: Pedro está citando el Salmo 16:8. En su forma hebrea, el título subyacente es el nombre divino, que en muchas traducciones se vierte como «el SEÑOR».
    reason: cross_reference
  revision_rationale: 'Se hizo una reparación mínima para que la cláusula final refleje con claridad la primera persona del griego y suene natural en español: «para que yo no sea sacudido». También se ajustó la nota b para evitar una referencia innecesariamente anglocéntrica y hacerla más útil en español, sin cambiar su contenido esencial.'
