translation:
  language: es
  text: Dios resucitó a este Jesús[a], de quien todos nosotros somos testigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios levantó a este Jesús». El verbo griego aquí se refiere a la resurrección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον τὸν Ἰησοῦν
  english_pob_choice: this Jesus
  chosen_spanish: este Jesús
  alternatives_spanish:
  - Jesús, este
  - este mismo Jesús
  lexicon: BDAG
  rationale: El demostrativo τοῦτον es enfático y señala a Jesús como el mismo mencionado previamente. «Este Jesús» conserva esa deixis de manera natural en español sin añadir explicación.
- source_word: ἀνέστησεν
  english_pob_choice: raised up
  chosen_spanish: resucitó
  alternatives_spanish:
  - levantó
  - hizo resucitar
  lexicon: BDAG
  rationale: En este contexto ἀνίστημι se refiere a la resurrección. En español, «resucitó» comunica directamente el valor de resurrección que la nota inglesa explicita, sin perder la acción atribuida a Dios.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: El sujeto explícito del verbo se mantiene como «Dios». No hace falta artículo en español.
- source_word: οὗ
  english_pob_choice: of whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de quien él
  - del cual
  lexicon: BDAG
  rationale: El genitivo relativo con μάρτυρες se expresa con naturalidad en español como «de quien», que mantiene la relación semántica de testimonio respecto de Jesús.
- source_word: πάντες ἡμεῖς
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - nosotros todos
  - todos
  lexicon: BDAG
  rationale: La combinación es enfática. «Todos nosotros» preserva ese énfasis y suena más natural en español que un orden calcado.
- source_word: ἐσμεν μάρτυρες
  english_pob_choice: are witnesses
  chosen_spanish: somos testigos
  alternatives_spanish:
  - estamos como testigos
  - damos testimonio
  lexicon: BDAG
  rationale: μάρτυρες es un sustantivo, así que «somos testigos» refleja la estructura griega y el sentido de quienes dan testimonio de la resurrección.
theological_decisions:
- issue: Formulación de la resurrección
  english_pob_reading: God raised up this Jesus
  chosen_spanish_reading: Dios resucitó a este Jesús
  alternative_spanish_readings:
  - Dios levantó a este Jesús
  - Dios hizo resucitar a este Jesús
  rationale: La frase afirma de manera directa que Dios es el agente de la resurrección de Jesús. «Resucitó» conserva esa afirmación sin ambigüedad y corresponde a la nota inglesa que aclara el valor resurreccional del verbo.
  doctrine_reference: 'Acts 2:32; Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: 'El contexto auditado del inglés no requiere revisión adicional: la nota sobre ἀνέστησεν se preserva en español como una alternativa legítima («levantó») con aclaración de resurrección. No hay cambios textuales respecto del sentido aprobado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Jesús» para Ἰησοῦς conforme a los estándares del proyecto.
  - Se conserva un estilo bíblico moderno y claro, evitando la sustitución por formulaciones eclesiásticas tradicionales sin base textual.
  - La nota al pie se ancla en «resucitó» para preservar la alternativa de traducción y la tensión léxica entre «resucitar» y «levantar».
