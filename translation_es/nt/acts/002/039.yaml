  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: «promesa» para ἐπαγγελία, «hijos» para τέκνοις, «Señor» para κύριος y «Dios» para θεός. No hay conflicto con las preferencias de Yahvé/Mesías/espíritu, ya que no aplican aquí. La decisión de no sobreinterpretar la llamada divina también está correctamente preservada.'
