translation:
  language: es
  text: Porque la promesa es para ustedes, para sus hijos y para todos los que están lejos[a], para cuantos[b] el Señor nuestro Dios llame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los que están lejos». La frase puede referirse a quienes están distantes geográficamente, a quienes están distantes en sentido pactal, o a ambos.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que el Señor nuestro Dios llame». El griego literalmente dice «cuantos el Señor nuestro Dios llame».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαγγελία
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - el don prometido
  lexicon: BDAG
  rationale: El sustantivo designa aquí la promesa misma, no el contenido explicativo de manera explícita. «La promesa» mantiene la transparencia léxica y la conexión con el contexto inmediato.
- source_word: τέκνοις
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  lexicon: BDAG
  rationale: En este contexto familiar y relacional, «hijos» reproduce de manera natural el alcance de τέκνον y conserva la referencia a la descendencia de los oyentes.
- source_word: πᾶσι τοῖς εἰς μακράν
  english_pob_choice: all who are far off
  chosen_spanish: todos los que están lejos
  alternatives_spanish:
  - todos los que están a distancia
  - todos los alejados
  lexicon: BDAG
  rationale: La expresión conserva el sentido idiomático de lejanía sin restringirla a una sola clase de distancia. «Están lejos» suena natural en español y mantiene la amplitud del griego.
- source_word: ὅσους ἂν προσκαλέσηται
  english_pob_choice: as many as ... calls
  chosen_spanish: cuantos ... llame
  alternatives_spanish:
  - tantos como ... llame
  - todos los que ... llame
  lexicon: BDAG
  rationale: «Cuantos» comunica bien el valor de ὅσους ἂν como grupo indefinido pero abarcador. «Llame» conserva el matiz de llamada divina sin añadir especificaciones doctrinales no explícitas.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor soberano
  - Dueño
  lexicon: BDAG
  rationale: Se mantiene la equivalencia habitual para κύριος en referencia a Dios, en un registro bíblico claro y reverente.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: BDAG
  rationale: La frase apposicional se vierte de manera directa para conservar el sujeto identificado como «nuestro Dios» y mantener la naturalidad sintáctica del español.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: «Porque» transmite de forma natural la conexión discursiva con la declaración anterior, equivalente al valor explicativo de γάρ.
theological_decisions:
- issue: Alcance de «los que están lejos»
  english_pob_reading: Rendered broadly as 'all who are far off' without restricting the phrase to either diaspora Jews or Gentiles alone.
  chosen_spanish_reading: «Todos los que están lejos» se deja amplio, sin cerrar si la distancia es geográfica, pactal o ambas.
  alternative_spanish_readings:
  - solo los judíos de la diáspora
  - solo los gentiles
  - los que están lejos en sentido geográfico y pactal
  rationale: El griego admite esa amplitud semántica y el contexto no obliga a una identificación única. La traducción conserva la tensión interpretativa en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica donde el texto no la resuelve explícitamente.
- issue: Implicación de la llamada divina en ὅσους ἂν προσκαλέσηται
  english_pob_reading: Translated without importing a specific soteriological system.
  chosen_spanish_reading: «Cuantos ... llame» mantiene la idea de llamados por Dios sin especificar el mecanismo de esa llamada.
  alternative_spanish_readings:
  - a quienes el Señor llame eficazmente
  - todos los que el Señor invite
  rationale: El texto afirma la llamada del Señor, pero no define aquí su modo operativo. La redacción evita imponer una lectura confesional no exigida por el griego.
  doctrine_reference: No sobreespecificar la mecánica de la llamada divina donde el texto no lo hace.
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del POB en inglés, que simplifica la cláusula final a «as many as the Lord our God calls» y elimina el añadido «to himself». En español se conserva esa misma sobriedad, manteniendo el valor de grupo indefinido de ὅσους ἂν sin introducir matices no explícitos.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente o la pauta del proyecto lo requiera; aquí κύριος en la frase fija «el Señor nuestro Dios» se mantiene como «Señor» por la lectura establecida del audit trail.
  - «Promesa» se conserva como término técnico transparente, evitando convertirla en «don prometido» sin necesidad textual.
  - La puntuación usa coma antes de la cláusula final para reproducir la relación explicativa sin añadir una ruptura más fuerte que la del griego.
