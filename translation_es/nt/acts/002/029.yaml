review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés: preserva la doble apelación vocativa, la idea de permiso/libertad para hablar, la referencia al patriarca David, la muerte y sepultura, y la permanencia de su tumba hasta el momento presente. Sin embargo, dos elecciones debilitan la naturalidad y exactitud retórica del español: ''Varones, hermanos'' suena algo rígido y menos idiomático que ''Hombres, hermanos'', y ''que tanto murió como fue sepultado'' introduce una construcción correlativa poco natural tras ''que''.'
  spanish_quality_summary: El texto es claro y digno, pero presenta leve rigidez calquística. 'Me es permitido hablarles' es aceptable aunque algo pesada; 'con valentía' comunica bien παρρησία. La principal mejora es hacer más natural la correlación verbal en español y suavizar el vocativo inicial sin perder el doble masculino explícito.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. 'Patriarca', 'sepultado' y 'sepulcro' son compatibles con el estilo previsto. Se conserva correctamente la decisión teológica de no neutralizar Ἄνδρες ἀδελφοί.
  issues:
  - severity: medium
    issue: 'Vocativo inicial algo forzado: ''Varones, hermanos'''
    rationale: Aunque es defendible, 'varones' en español contemporáneo suena más marcado y menos natural como apelación pública que 'hombres'. El griego ἄνδρες se puede reflejar fielmente con 'Hombres' sin perder el valor masculino explícito ni la doble vocación.
  - severity: medium
    issue: Construcción 'que tanto murió como fue sepultado' poco idiomática
    rationale: Busca reproducir el correlativo καὶ ... καὶ, pero en español suena artificiosa después de 'que'. Una forma como 'que murió y también fue sepultado' conserva mejor la fuerza aditiva y la fluidez natural.
  revised_spanish_text: Hombres, hermanos[a], me es permitido hablarles con valentía acerca del patriarca David, que murió y también fue sepultado, y su sepulcro está entre nosotros hasta el día de hoy.
