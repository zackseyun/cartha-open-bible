translation:
  language: es
  text: Hombres, hermanos[a], me es permitido hablarles con valentía acerca del patriarca David, que murió y también fue sepultado, y su sepulcro está entre nosotros hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Hermanos’; el griego dice literalmente ‘Hombres, hermanos’, una forma de apelación formal a los israelitas reunidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Men, brothers
  chosen_spanish: Varones, hermanos
  alternatives_spanish:
  - Hermanos
  - Hermanos y hermanas
  - Varones y hermanos
  lexicon: BDAG
  rationale: ἄνδρες conserva el matiz masculino y vocativo de 'varones'; ἀδελφοί se rinde como 'hermanos'. Mantener ambos elementos evita neutralizar la doble apelación del griego. 'Varones, hermanos' es natural en español bíblico contemporáneo y preserva la fuerza retórica.
- source_word: ἐξὸν εἰπεῖν
  english_pob_choice: I may speak
  chosen_spanish: me es permitido hablarles
  alternatives_spanish:
  - puedo hablarles
  - me es lícito hablarles
  - tengo libertad de hablarles
  lexicon: BDAG
  rationale: El participio idiomático expresa permiso o libertad para hablar; 'me es permitido' refleja bien esa idea. Se añade 'les' para que el complemento directo/indirecto quede claro en español. 'Puedo' sería más breve, pero puede inclinarse hacia capacidad y no tanto a licencia o libertad.
- source_word: μετὰ παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con valentía
  alternatives_spanish:
  - con denuedo
  - con confianza
  - abiertamente
  lexicon: BDAG
  rationale: παρρησία denota franqueza abierta y libre, con una dimensión de osadía pública. 'Con valentía' comunica bien esa franqueza audaz en español moderno. 'Con denuedo' sería más tradicional, pero menos inmediato; 'abiertamente' pierde la nota de coraje.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - ante ustedes
  lexicon: BDAG
  rationale: La relación personal del discurso se expresa de forma natural en español con el dativo 'les' dentro de 'hablarles'. 'A ustedes' sería igualmente posible, pero menos fluido en esta construcción.
- source_word: περὶ τοῦ πατριάρχου Δαυίδ
  english_pob_choice: about the patriarch David
  chosen_spanish: acerca del patriarca David
  alternatives_spanish:
  - sobre el patriarca David
  - en cuanto al patriarca David
  - respecto del patriarca David
  lexicon: BDAG
  rationale: περί se expresa de modo natural con 'acerca de'. 'Patriarca' se conserva porque el título está explícito en el griego y tiene valor honorífico e histórico. No se añade 'nuestro' porque no está en el texto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a saber, que
  - pues que
  lexicon: BDAG
  rationale: Introduce el contenido del discurso; 'que' es la equivalencia normal y clara en español.
- source_word: καὶ ἐτελεύτησεν καὶ ἐτάφη
  english_pob_choice: he both died and was buried
  chosen_spanish: que tanto murió como fue sepultado
  alternatives_spanish:
  - que murió y fue sepultado
  - que murió y fue enterrado
  lexicon: BDAG
  rationale: Se conserva la correlación de καὶ ... καὶ con 'tanto ... como'. 'Fue sepultado' reproduce un registro bíblico digno y preciso para ἐτάφη. 'Murió' evita una paráfrasis demasiado libre.
- source_word: τὸ μνῆμα αὐτοῦ
  english_pob_choice: his tomb
  chosen_spanish: su sepulcro
  alternatives_spanish:
  - su tumba
  - su monumento
  lexicon: BDAG
  rationale: μνῆμα puede referirse a tumba o monumento funerario. 'Sepulcro' preserva un término bíblico amplio y digno, adecuado al contexto de un lugar funerario conocido. 'Tumba' sería más coloquial; 'monumento' sería demasiado específico.
- source_word: ἔστιν ἐν ἡμῖν
  english_pob_choice: is among us
  chosen_spanish: está entre nosotros
  alternatives_spanish:
  - está con nosotros
  - está en medio de nosotros
  lexicon: BDAG
  rationale: La preposición ἐν con dativo comunitario se expresa bien como 'entre nosotros'. En español mantiene la idea de presencia local entre los oyentes sin sonar forzado.
- source_word: ἄχρι τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta este día
  - hasta hoy
  lexicon: BDAG
  rationale: Es la manera más natural y fiel de reproducir el valor temporal del modismo griego. 'Hasta hoy' sería válido, pero 'hasta el día de hoy' conserva mejor la solemnidad del registro.
theological_decisions:
- issue: Apelación vocativa masculina e implicación inclusiva
  english_pob_reading: Men, brothers
  chosen_spanish_reading: Varones, hermanos
  alternative_spanish_readings:
  - Hermanos
  - Hermanos y hermanas
  rationale: El griego usa dos vocativos masculinos explícitos. Se preserva esa forma para no borrar la señal lingüística del texto. Aunque el grupo puede incluir mujeres, el original no lo dice explícitamente; por eso no se introduce una inclusión no documentada en el cuerpo principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió la lectura del texto griego SBLGNT y se tuvieron en cuenta las decisiones auditadas del English POB. No se incorporaron revisiones posteriores porque el expediente indica que no hubo cambios en la última pasada. Se conservó la doble apelación vocativa y la estructura correlativa 'tanto ... como'.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' como norma de proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que requiera decisión al respecto.
  - Se mantuvo 'patriarca' y no se reemplazó por un término eclesiástico tradicional alternativo.
  - '''Sepulcro'' se usó para μνῆμα por adecuación de registro; ''tumba'' queda como alternativa lexical.'
  - La construcción 'me es permitido hablarles' conserva la idea de permiso/libertad de hablar sin perder naturalidad en español.
