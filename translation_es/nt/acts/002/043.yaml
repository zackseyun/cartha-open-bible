    text: 'O «asombro». El griego dice literalmente: «temor vino a toda alma».'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad léxica y el tono solemne del borrador, pero se reemplaza «eran hechas» por «se hacían» para lograr un español más natural y claro, manteniendo el imperfecto y la idea de acciones realizadas mediante los apóstoles. También se normaliza la puntuación de la nota.
