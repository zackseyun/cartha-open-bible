translation:
  language: es
  text: Y sobrevino temor[a] a toda alma, y muchas maravillas y señales se hacían por medio de los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «asombro». El griego dice literalmente: «temor vino a toda alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγίνετο ... φόβος
  english_pob_choice: fear came
  chosen_spanish: sobrevino temor
  alternatives_spanish:
  - vino temor
  - llegó temor
  - hubo temor
  lexicon: BDAG
  rationale: El imperfecto de γίνομαι con φόβος como predicado expresa un surgimiento o irrupción del temor. «Sobrevino temor» conserva ese matiz de acontecimiento que aparece sobre la comunidad, sin reducirlo al mero estado «había temor».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como continuidad narrativa, no como contraste fuerte. «Y» reproduce esa conexión de manera natural en español.
- source_word: πάσῃ ψυχῇ
  english_pob_choice: upon every soul
  chosen_spanish: a toda alma
  alternatives_spanish:
  - sobre cada alma
  - sobre toda persona
  - en cada alma
  lexicon: BDAG
  rationale: La expresión griega es literalmente «a cada alma». «A toda alma» conserva la imagen semítica y el tono solemne del original mejor que una simplificación como «a todos».
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - awe
  - reverencia temerosa
  - asombro
  lexicon: BDAG
  rationale: φόβος puede abarcar temor y reverencia ante la acción divina. «Temor» mantiene esa tensión sin resolverla en una sola dirección interpretativa.
- source_word: πολλά
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo; «muchas» es la equivalencia natural en español.
- source_word: τέρατα
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - portentos
  - prodigios
  - milagros
  lexicon: BDAG
  rationale: En la pareja fija τέρατα καὶ σημεῖα, τέρατα destaca el carácter asombroso de las obras. «Maravillas» preserva ese matiz y mantiene la distinción frente a «señales».
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: BDAG
  rationale: σημεῖα subraya la función indicativa o evidencial. «Señales» conserva esa fuerza y encaja con la pareja «maravillas y señales».
- source_word: διὰ τῶν ἀποστόλων
  english_pob_choice: through the apostles
  chosen_spanish: por medio de los apóstoles
  alternatives_spanish:
  - a través de los apóstoles
  - por los apóstoles
  - mediante los apóstoles
  lexicon: BDAG
  rationale: διά con genitivo suele indicar agencia o instrumento. «Por medio de» expresa bien que los apóstoles son el instrumento, sin perder la idea de que Dios es el actor último implícito.
- source_word: ἐγίνετο
  english_pob_choice: were being done
  chosen_spanish: eran hechas
  alternatives_spanish:
  - se hacían
  - sucedían
  - ocurrían
  lexicon: BDAG
  rationale: El segundo imperfecto de γίνομαι señala la ocurrencia continuada de las señales y prodigios. «Eran hechas» es una forma sobria y clásica en español bíblico para expresar que tales obras estaban realizándose.
theological_decisions:
- issue: Nuance of φόβος in response to apostolic signs
  english_pob_reading: fear
  chosen_spanish_reading: temor
  alternative_spanish_readings:
  - awe
  - reverencia temerosa
  - asombro reverente
  rationale: La escena describe la respuesta de la comunidad ante la actividad divina. Traducir φόβος como «temor» preserva la ambigüedad reverente/temerosa del término y no decide por adelantado el matiz hacia «awe».
  doctrine_reference: Preservar la tensión léxica y teológica del original sin explicitarla en exceso.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la tensión de φόβος con «fear» y distingue τέρατα de σημεῖα con «wonders and signs». La versión española sigue esa misma distinción, optando por «temor» y por la pareja «maravillas y señales», sin introducir una lectura interpretativa que resuelva la ambivalencia del término griego.
  spanish_consistency_notes:
  - 'Se conservó la estructura coordinada del versículo: respuesta de la comunidad primero, luego la actividad de los apóstoles.'
  - «Alma» traduce ψυχή de forma transparente y concordante con el registro solemne del pasaje.
  - «Por medio de» se eligió para reflejar agencia instrumental en διά con genitivo, evitando atribuir causalidad directa a los apóstoles.
  - «Eran hechas» mantiene el valor imperfectivo del verbo griego y sugiere acción continuada.
