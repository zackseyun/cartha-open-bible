translation:
  language: es
  text: Y todos fueron llenos del Espíritu Santo y comenzaron a hablar en otras lenguas[a], según el Espíritu les daba que se expresaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «idiomas». La palabra griega puede significar «lenguas» o «idiomas»; el contexto siguiente muestra que el habla fue entendida como lenguas humanas reales por quienes escuchaban.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθησαν
  english_pob_choice: were filled
  chosen_spanish: fueron llenos
  alternatives_spanish:
  - quedaron llenos
  - fueron colmados
  lexicon: BDAG
  rationale: El aoristo pasivo de πίμπλημι expresa aquí ser llenados o dotados. En español, «fueron llenos» conserva la imagen verbal y suena natural en este contexto de capacitación por el Espíritu.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos ellos
  lexicon: BDAG
  rationale: El plural nominativo subraya la totalidad del grupo presente. «Todos» reproduce esa totalidad de forma breve y clara.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - de espíritu santo
  - del santo Espíritu
  lexicon: BDAG
  rationale: En Hechos, πνεῦμα ἅγιον designa al Espíritu divino. En español, la forma estable y reverente es «Espíritu Santo», manteniendo la referencia personal y específica.
- source_word: ἤρξαντο λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzaron a hablar
  alternatives_spanish:
  - empezaron a hablar
  - comenzaron a decir
  lexicon: BDAG
  rationale: La construcción ingresiva con ἄρχομαι + infinitivo se refleja bien con «comenzaron a hablar», que conserva el inicio de la acción sin cargarla de interpretación adicional.
- source_word: ἑτέραις γλώσσαις
  english_pob_choice: in other tongues
  chosen_spanish: en otras lenguas
  alternatives_spanish:
  - en otras lenguas/tongues
  - en otras lenguas humanas
  - en otros idiomas
  lexicon: BDAG
  rationale: γλῶσσαι puede significar «lenguas» o «idiomas». Se conserva «lenguas» para mantener la ambigüedad léxica del griego; el contexto posterior de Hechos 2 aclara que se trata de habla comprensible para los oyentes.
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: según
  alternatives_spanish:
  - como
  - así como
  lexicon: BDAG
  rationale: Aquí καθώς introduce la medida o el modo conforme al cual hablaban. «Según» comunica bien la idea de conformidad con lo que el Espíritu les iba dando.
- source_word: ἐδίδου
  english_pob_choice: was giving
  chosen_spanish: les daba
  alternatives_spanish:
  - les estaba dando
  - continuaba dándoles
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o progresiva. En español, «les daba» transmite esa continuidad de manera natural y sobria.
- source_word: ἀποφθέγγεσθαι
  english_pob_choice: utterance
  chosen_spanish: que hablaran
  alternatives_spanish:
  - para que hablasen
  - a expresarse
  lexicon: BDAG
  rationale: El infinitivo sugiere hablar con soltura o con fuerza pública. En esta estructura, «les daba que hablaran» preserva el sentido de capacidad concedida sin añadir una noción específica de profecía que el texto no exige aquí.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con el complemento indirecto «les». Mantiene fluidez en español y refleja la relación de destinatario de la acción del Espíritu.
theological_decisions:
- issue: Referencia de πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  rationale: En el contexto narrativo de Hechos, la referencia es al Espíritu divino prometido por Jesús y actuante en la escena. La mayúscula y la forma definida en español expresan esa referencia personal sin añadir contenido doctrinal extra.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Ambigüedad de γλώσσαις
  english_pob_reading: other tongues
  chosen_spanish_reading: otras lenguas
  alternative_spanish_readings:
  - otros idiomas
  rationale: El griego permite ambas opciones. Se mantiene «lenguas» para no resolver prematuramente la tensión lexical; el contexto inmediato de Hechos 2:6–11 orienta al lector hacia lenguas humanas reconocibles.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas. La redacción española sigue esa lectura estable, conservando la ambigüedad de γλώσσαις y la progresividad del imperfecto ἐδίδου sin sobreespecificar el fenómeno.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas por referencia personal divina en el contexto de Hechos.
  - Se conserva «lenguas» en el texto principal para reflejar la ambigüedad léxica del griego, con nota aclaratoria sobre «idiomas».
  - La estructura «les daba que hablaran» intenta reproducir la idea de habilitación continua del Espíritu de manera idiomática en español.
  - Se evita sustituir «lenguas» por «idiomas» en el cuerpo principal para no eliminar la tensión léxica presente en el original.
