revisions:
- from: A este hombre[a], entregado conforme al plan determinado y al conocimiento previo de Dios, ustedes lo mataron[b] al clavarlo en una cruz por medio de manos de inicuos.
  to: A este hombre[a], entregado conforme al plan determinado y al conocimiento previo de Dios, ustedes lo mataron[b] al clavarlo en una cruz por medio de hombres sin ley.
  rationale: Se corrigió la frase final para que refleje de manera natural y fiel la agencia mediada de διὰ χειρὸς ἀνόμων, preservando además el matiz de «sin ley» documentado en la auditoría inglesa. También se corrigió la nota alternativa de ἀνείλατε para mantener el objeto singular y una equivalencia válida en español.
