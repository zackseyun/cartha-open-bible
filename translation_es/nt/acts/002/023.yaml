translation:
  language: es
  text: A este hombre[a], entregado conforme al plan determinado y al conocimiento previo de Dios, ustedes lo mataron[b] al clavarlo en una cruz por medio de hombres sin ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este», si se prefiere conservar más literalmente el demostrativo sin explicitar «hombre».
    reason: lexical_alternative
  - marker: b
    text: O «le dieron muerte» o «lo pusieron a muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - a este
  - a él
  lexicon: BDAG
  rationale: El demostrativo apunta a Jesús con fuerza deíctica. «A este hombre» conserva esa referencia concreta y resulta natural en español; la preposición mantiene la relación con el participio pasivo y evita una formulación demasiado vaga.
- source_word: τῇ ὡρισμένῃ βουλῇ
  english_pob_choice: according to the determined plan
  chosen_spanish: conforme al plan determinado
  alternatives_spanish:
  - según el plan determinado
  - conforme al propósito fijado
  - según el designio establecido
  lexicon: BDAG
  rationale: La dativa expresa base o conformidad. «Plan determinado» comunica bien ὡρισμένῃ βουλῇ sin perder la idea de algo fijado por Dios. «Conforme a» refleja mejor la relación sintáctica que un simple «por».
- source_word: καὶ προγνώσει
  english_pob_choice: and foreknowledge
  chosen_spanish: y al conocimiento previo
  alternatives_spanish:
  - y a la presciencia
  - y a la foreconocimiento
  lexicon: BDAG
  rationale: «Prognosis» admite «conocimiento previo» en español claro y digno. Mantiene la prioridad temporal/relacional sin cargar innecesariamente el término técnico «presciencia», aunque esa opción permanece posible.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Genitivo posesivo que modifica tanto «plan» como «conocimiento previo». Se traduce de forma directa y sin ambigüedad.
- source_word: ἔκδοτον
  english_pob_choice: delivered up
  chosen_spanish: entregado
  alternatives_spanish:
  - entregado en manos
  - dado
  lexicon: BDAG
  rationale: ἔκδοτος expresa ser entregado o puesto en manos de otro. «Entregado» preserva la pasiva y el matiz judicial sin sobreexplicar el agente más allá del contexto.
- source_word: διὰ χειρὸς ἀνόμων
  english_pob_choice: through the hands of lawless men
  chosen_spanish: por medio de manos de inicuos
  alternatives_spanish:
  - por medio de la mano de hombres inicuos
  - por manos de hombres sin ley
  lexicon: BDAG
  rationale: διά con genitivo indica mediación/agencia. Se conserva la imagen de «manos» porque el griego usa singular de manera idiomática, y se traduce ἄνομος con «inicuos» para un registro bíblico claro que retiene la nota de impiedad/ilegitimidad. «Sin ley» sería demasiado literal y menos idiomático.
- source_word: προσπήξαντες
  english_pob_choice: by nailing him to a cross
  chosen_spanish: al clavarlo en una cruz
  alternatives_spanish:
  - al fijarlo en una cruz
  - al crucificarlo
  lexicon: BDAG
  rationale: El participio describe clavar/asegurar con clavos. «Al clavarlo en una cruz» hace explícito el contexto de crucifixión que el verbo supone, sin agregar un verbo interpretativo que sustituya la imagen concreta del texto.
- source_word: ἀνείλατε
  english_pob_choice: you killed
  chosen_spanish: ustedes lo mataron
  alternatives_spanish:
  - ustedes lo asesinaron
  - ustedes lo dieron muerte
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar o dar muerte. «Lo mataron» es directo y reproduce la acusación frontal de Pedro; el plural explícito «ustedes» corresponde al vocativo implícito del discurso.
theological_decisions:
- issue: Relación entre soberanía divina y responsabilidad humana
  english_pob_reading: Jesus was delivered up according to God's determined plan and foreknowledge, yet the hearers are still blamed for killing him.
  chosen_spanish_reading: Jesús fue entregado conforme al plan determinado y al conocimiento previo de Dios, y aun así ustedes lo mataron.
  alternative_spanish_readings:
  - Jesús fue entregado por el plan determinado de Dios, y ustedes lo mataron
  - Jesús fue entregado conforme al plan de Dios, mientras otros lo mataron
  rationale: La redacción conserva simultáneamente el designio divino y la culpa humana sin resolver la tensión. No se atenúa la acción de Dios ni se diluye la acusación directa de Pedro.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: el cambio de «by» a «according to» se reflejó con «conforme a», y la preferencia por «hands» en plural se preservó con «manos». La formulación también mantiene el valor acusatorio directo de «you killed».'
  spanish_consistency_notes:
  - Se usa «Dios» sin mayúsculas especiales en los genitivos.
  - Se conserva «plan determinado» para ὡρισμένῃ βουλῇ en continuidad con el audit trail inglés.
  - Se evita «Cristo» porque el texto griego no lo usa aquí.
  - Se mantiene el registro bíblico sobrio, evitando paráfrasis expansivas.
  - La nota de pie de página a se ancla en «A este hombre[a]» y la b en «mataron[b]» para cumplir la validación.
