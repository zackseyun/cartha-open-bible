review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva fielmente varios puntos clave del griego y del rastro POB en inglés. αἰνοῦντες está mal escrito en el texto español; τοὺς σῳζομένους fue aplanado hacia un estado ('eran salvos') en vez de mantener el proceso pasivo presente; y ἐπὶ τὸ αὐτό fue desplazado a una nota sin anclaje correcto, además de omitirse en el texto principal. El sentido general de alabanza, favor ante el pueblo, acción continua del Señor y repetición diaria sí está presente, pero requiere corrección.
  spanish_quality_summary: 'La legibilidad general es aceptable, pero hay un error ortográfico grave (''pabresando'') y dos expresiones poco logradas: ''teniendo favor con todo el pueblo'' suena calcada, y ''a los que eran salvos'' no refleja bien el español natural ni el aspecto verbal griego. Una revisión breve puede producir un texto claro, digno y fiel.'
  glossary_alignment: 'No hay conflicto mayor con la glosa doctrinal de ''Señor'' para κύριος ni con ''Dios''. Sin embargo, la política de preservar el matiz procesual de σῳζομένους no se cumplió. También debe respetarse la disciplina de notas: si se conserva una nota para ἐπὶ τὸ αὐτό, el marcador debe aparecer exactamente en el lugar correspondiente del texto español.'
  issues:
  - severity: high
    issue: Error ortográfico en 'pabresando'
    rationale: No corresponde a ninguna forma española válida y distorsiona αἰνοῦντες, que debe reflejarse como 'alabando' o equivalente.
  - severity: high
    issue: Omisión funcional de ἐπὶ τὸ αὐτό en el texto principal
    rationale: El borrador pone una nota [a] tras 'pueblo', pero la nota explica ἐπὶ τὸ αὐτό, que pertenece al segmento final con προσετίθει. Esto rompe la correspondencia entre texto y nota y deja sin representación explícita el complemento final.
  - severity: high
    issue: Aplanamiento aspectual de τοὺς σῳζομένους como 'los que eran salvos'
    rationale: El participio presente pasivo apunta a una acción en proceso ('los que estaban siendo salvados' / 'los que iban siendo salvados'), no simplemente a un estado de personas 'salvas'.
  - severity: medium
    issue: '''Teniendo favor con todo el pueblo'' suena poco idiomático en español'
    rationale: Aunque cercano al griego, en español eclesial general suena mejor 'gozando del favor de todo el pueblo', que comunica la relación de buena voluntad que el giro griego suele expresar.
  - severity: medium
    issue: La nota alternativa está incompleta respecto al rastro inglés
    rationale: La auditoría inglesa conserva también la posibilidad contextual de 'juntos' o 'en el mismo lugar' para ἐπὶ τὸ αὐτό en relación con el complemento final; la nota española debe anclarse allí y formularse como alternativa de esa frase.
  revised_spanish_text: alabando a Dios y gozando del favor de todo el pueblo. Y el Señor iba añadiendo día tras día a ellos[a] a los que estaban siendo salvados.
  revised_footnotes:
  - marker: a
    text: O «juntos» o «en el mismo lugar» para ἐπὶ τὸ αὐτό.
    reason: alternative_reading
  revision_rationale: Se corrige el error ortográfico grave, se mejora la naturalidad de ἔχοντες χάριν πρὸς ὅλον τὸν λαόν con una expresión idiomática española, se restituye el complemento final ἐπὶ τὸ αὐτό en el lugar correcto mediante 'a ellos[a]', y se preserva el valor procesual de τοὺς σῳζομένους con 'los que estaban siendo salvados'. La nota se mantiene, pero ahora anclada correctamente en el segmento que realmente traduce ἐπὶ τὸ αὐτό.
