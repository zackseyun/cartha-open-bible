translation:
  language: es
  text: alabando a Dios y gozando del favor de todo el pueblo. Y el Señor iba añadiendo día tras día a ellos[a] a los que estaban siendo salvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juntos» o «en el mismo lugar» para ἐπὶ τὸ αὐτό.
    reason: alternative_reading
lexical_decisions:
- source_word: αἰνοῦντες
  english_pob_choice: praising
  chosen_spanish: pabresando
  alternatives_spanish:
  - alabando
  - dando alabanza a
  lexicon: BDAG
  rationale: 'El participio presente describe una acción continua de la comunidad. En español, "alabando" o "pabresando" no sería adecuado; corrijo a una forma natural y fiel: "alabando", que preserva el valor durativo del participio sin añadir contenido.'
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Objeto directo de αἰνοῦντες; "Dios" es la equivalencia normal y clara en español.
- source_word: ἔχοντες χάριν πρὸς ὅλον τὸν λαόν
  english_pob_choice: having favor with all the people
  chosen_spanish: teniendo favor con todo el pueblo
  alternatives_spanish:
  - gozando del favor de todo el pueblo
  - teniendo la buena voluntad de todo el pueblo
  lexicon: BDAG
  rationale: El giro ἔχειν χάριν πρὸς suele expresar gozar de favor o buena voluntad en relación con alguien. "Teniendo favor con todo el pueblo" sigue de cerca el griego y mantiene la relación amplia con λαός.
- source_word: ὁ δὲ κύριος
  english_pob_choice: And the Lord
  chosen_spanish: Y el Señor
  alternatives_spanish:
  - Pero el Señor
  lexicon: BDAG
  rationale: κύριος se traduce aquí como "Señor" según el valor habitual de Kyrios en el NT. La partícula δέ queda suavemente representada con "Y" para conservar el flujo narrativo.
- source_word: προσετίθει
  english_pob_choice: was adding
  chosen_spanish: iba añadiendo
  alternatives_spanish:
  - seguía añadiendo
  - añadía
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. "Iba añadiendo" comunica bien ese aspecto en español y evita reducirlo a un pasado puntual.
- source_word: τοὺς σῳζομένους
  english_pob_choice: those who were being saved
  chosen_spanish: a los que eran salvos
  alternatives_spanish:
  - a los que estaban siendo salvos
  - a los salvos
  lexicon: BDAG
  rationale: El participio presente pasivo conserva un sentido procesual. En español, "a los que eran salvos" mantiene la acción divina en curso; "estaban siendo salvos" sería más explícito pero más pesado.
- source_word: καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: BDAG
  rationale: Expresión idiomática de repetición distribuida en el tiempo. "Día tras día" es natural y conserva el énfasis iterativo.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: to their number
  chosen_spanish: a ellos
  alternatives_spanish:
  - juntos
  - en el mismo lugar
  - a su número
  lexicon: BDAG
  rationale: 'Sigo la revisión inglesa más reciente, que evitó "their number" por ser interpretativo. En este contexto, la frase puede entenderse como complemento de adición: "a ellos". Mantengo en nota las posibles lecturas alternativas del giro idiomático.'
theological_decisions:
- issue: Aspecto y estado en τοὺς σῳζομένους
  english_pob_reading: those who were being saved
  chosen_spanish_reading: a los que eran salvos
  alternative_spanish_readings:
  - a los que estaban siendo salvos
  - a los salvos
  rationale: El participio presente pasivo favorece una lectura de proceso, no de estado terminado. "A los que eran salvos" intenta preservar esa tensión sin sobreexplicarla, dejando abierto el alcance teológico del verbo.
  doctrine_reference: Preservar la tensión aspectual del griego; no resolver debates doctrinales sobre la salvación.
- issue: Sentido de ἐπὶ τὸ αὐτό
  english_pob_reading: to them
  chosen_spanish_reading: a ellos
  alternative_spanish_readings:
  - juntos
  - en el mismo lugar
  - a su número
  rationale: La revisión inglesa reciente evita añadir "number" porque no está explícito en el griego. En español, "a ellos" funciona como complemento de destinación sin forzar un sustantivo interpretativo. Se preserva la ambigüedad del giro mediante nota.
  doctrine_reference: Primacía del original y preservación de ambigüedad genuina.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una interpretación más explícita de ἐπὶ τὸ αὐτό ('to their number') y la reemplazó por una traducción más directa ('to them'). El español sigue esa revisión evitando 'a su número' y manteniendo abierta la ambigüedad del giro, con nota alternativa. También se respetó el aspecto imperfectivo de προσετίθει y el valor procesual de σῳζομένους.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Señor' para κύριος según el uso estándar del NT.
  - Se evitó 'Cristo' porque el versículo no contiene Χριστός.
  - Se prefirió una construcción natural en español para el participio presente pasivo ('a los que eran salvos') sin borrar la idea de proceso.
  - La nota solo se ancla a ἐπὶ τὸ αὐτό, donde la ambigüedad idiomática lo requiere.
