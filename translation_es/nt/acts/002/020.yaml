translation:
  language: es
  text: El sol se volverá oscuridad, y la luna en sangre, antes de que venga el gran y glorioso[a] día del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manifiesto» o «notable» para «glorioso» (griego ἐπιφανῆ).
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστραφήσεται
  english_pob_choice: will be turned
  chosen_spanish: será convertido
  alternatives_spanish:
  - será cambiado
  - será transformado
  lexicon: BDAG
  rationale: El pasivo futuro comunica una acción sufrida por el sol. «Será convertido» conserva la imagen de transformación pasiva sin añadir matices técnicos que el griego no exige. En español, «convertido» funciona de manera natural en un registro profético.
- source_word: εἰς σκότος
  english_pob_choice: into darkness
  chosen_spanish: en oscuridad
  alternatives_spanish:
  - en tinieblas
  - a oscuridad
  lexicon: BDAG
  rationale: La preposición εἰς con acusativo expresa resultado o estado. «En oscuridad» refleja ese cambio de estado de forma clara y sobria; «tinieblas» es posible, pero «oscuridad» mantiene mejor la transparencia léxica del sustantivo σκότος.
- source_word: εἰς αἷμα
  english_pob_choice: into blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - a sangre
  - sangre roja
  lexicon: BDAG
  rationale: El griego es literal y abrupto. «En sangre» preserva la imaginería profética sin suavizarla ni explicarla. Se evita una paráfrasis como «sangre roja», que interpretaría indebidamente el giro.
- source_word: πρὶν ⸀ἢ ⸀ἐλθεῖν
  english_pob_choice: before ... comes
  chosen_spanish: antes de que venga
  alternatives_spanish:
  - antes que venga
  - antes de la venida de
  lexicon: BDAG
  rationale: La construcción temporal señala que un evento ocurre antes de otro. «Antes de que venga» es natural en español y conserva la referencia a la llegada del acontecimiento escatológico.
- source_word: ἡμέραν κυρίου
  english_pob_choice: the day of the Lord
  chosen_spanish: el día del Señor
  alternatives_spanish:
  - el día de Yahvé
  - el día del Señor
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה cuando el texto lo señala directamente, aquí el griego dice κυρίου. «El día del Señor» respeta el dato griego y la expresión profética tradicional sin ocultar la relación intertextual con Joel.
- source_word: μεγάλην
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: BDAG
  rationale: μέγας es simplemente «grande». En español, «gran» antes de un sustantivo mantiene la solemnidad profética y suena más natural que «grande» en esta colocación.
- source_word: ἐπιφανῆ
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - manifiesto
  - notable
  - resplandeciente
  lexicon: BDAG
  rationale: El adjetivo admite el sentido de visible/conspicuo o espléndido. «Glorioso» conserva el tono elevado del pasaje y reproduce bien la elección inglesa, mientras que las alternativas recuerdan el rango semántico que el texto deja abierto.
theological_decisions:
- issue: Cómo rendir ἡμέραν κυρίου en un contexto de cita profética que alude al juicio divino
  english_pob_reading: the day of the Lord
  chosen_spanish_reading: el día del Señor
  alternative_spanish_readings:
  - el día de Yahvé
  - el día del Señor
  rationale: Se mantiene la expresión escatológica tradicional porque el texto griego usa κύριος y la formulación apunta al día de intervención/jucio divino. No se sustituye por una paráfrasis más explicativa, a fin de conservar el eco profético del original.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy: original-language primacy over translation tradition'
- issue: Cómo traducir ἐπιφανῆ sin borrar su posible tensión semántica entre 'manifesto/conspicuo' y 'glorioso'
  english_pob_reading: glorious
  chosen_spanish_reading: glorioso
  alternative_spanish_readings:
  - manifiesto
  - notable
  rationale: «Glorioso» comunica adecuadamente la carga escatológica del contexto y mantiene la lectura del POB en inglés. Las alternativas siguen siendo relevantes porque el adjetivo griego puede describir algo visible, conspicuo o espléndido; no se reduce esa gama a una sola noción técnica.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el rastro de auditoría inglés: mantiene la imaginería profética literal («convertido en oscuridad», «en sangre»), respeta la construcción temporal con «antes de que», y preserva la fórmula «el día del Señor» sin introducir lenguaje eclesial posterior. No se registran revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Señor» para κυρίου porque el texto griego emplea κύριος, no יהוה escrito en hebreo.
  - Se mantiene un registro profético sobrio y bíblico, sin añadir explicaciones interpretativas al texto principal.
  - La nota de pie conserva la alternativa semántica de ἐπιφανῆ para no borrar la tensión léxica documentada en el audit trail.
