review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica bien la estructura del griego: transformación cósmica, relación temporal con «antes de que venga», y la expresión profética «el día del Señor». También conserva la nota léxica sobre ἐπιφανῆ. Sin embargo, el anclaje de la nota [a] está mal colocado en «oscuridad» cuando la nota corresponde a «glorioso». Además, «será convertido en oscuridad» es comprensible pero menos natural y menos fiel al matiz de μεταστραφήσεται que una formulación como «se volverá oscuridad» o «será vuelto en oscuridad».'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos problemas de calidad: la nota está anclada en el lugar incorrecto, creando confusión semántica; y «será convertido en oscuridad» suena algo forzado en español bíblico natural. «Se volverá oscuridad» mejora la fluidez sin perder la pasividad/resultatividad del contexto profético. El resto del versículo lee bien.'
  glossary_alignment: La elección «Señor» para κυρίου es aceptable aquí conforme al rastro auditado del POB inglés, dado que el griego cita «κυρίου» y la decisión teológica documentada favorece «el día del Señor» frente a «el día de Yahvé» en este pasaje. «Glorioso» para ἐπιφανῆ también está alineado con el POB, siempre que la nota alternativa permanezca y se ancle correctamente.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «oscuridad» pero comenta «glorioso».
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce al lector a pensar que la nota explica «oscuridad» en vez de ἐπιφανῆ.
  - severity: medium
    issue: «Será convertido en oscuridad» suena poco natural en español.
    rationale: Aunque transmite el pasivo, en español moderno y bíblico legible resulta más idiomático «se volverá oscuridad». Esto mantiene el cambio de estado de εἰς σκότος sin un calco pesado.
  revised_spanish_text: El sol se volverá oscuridad, y la luna en sangre, antes de que venga el gran y glorioso[a] día del Señor.
  revised_footnotes:
  - marker: a
    text: O «manifiesto» o «notable» para «glorioso» (griego ἐπιφανῆ).
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a «glorioso», y se reemplaza «será convertido en oscuridad» por «se volverá oscuridad», que suena más natural en español y sigue reflejando el cambio de estado del griego sin paráfrasis excesiva.
