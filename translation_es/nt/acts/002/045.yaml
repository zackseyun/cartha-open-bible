translation:
  language: es
  text: Y vendían sus propiedades y posesiones, y las distribuían a todos[a], según lo que cada uno necesitaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "terrenos y posesiones". Los dos términos griegos probablemente distinguen tipos de bienes poseídos: κτήματα suele referirse a propiedades o terrenos, y ὑπάρξεις a posesiones en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κτήματα
  english_pob_choice: property
  chosen_spanish: propiedades
  alternatives_spanish:
  - bienes raíces
  - posesiones
  - terrenos
  lexicon: BDAG
  rationale: κτήματα suele referirse a bienes adquiridos, a menudo propiedad inmueble o posesiones patrimoniales. En español, 'propiedades' preserva ese sentido amplio y mantiene la distinción con ὑπάρξεις.
- source_word: ὑπάρξεις
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - pertenencias
  - posesiones materiales
  lexicon: BDAG
  rationale: ὑπάρξεις apunta a lo que una persona posee en general. 'Posesiones' conserva el matiz de bienes poseídos y diferencia bien el segundo término del primero.
- source_word: ἐπίπρασκον
  english_pob_choice: were selling
  chosen_spanish: vendían
  alternatives_spanish:
  - estaban vendiendo
  - vendían continuamente
  - iban vendiendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o en curso en el pasado. 'Vendían' comunica naturalmente ese aspecto sin recargar el estilo español.
- source_word: διεμέριζον
  english_pob_choice: distributing
  chosen_spanish: distribuían
  alternatives_spanish:
  - repartían
  - asignaban
  - dividían
  lexicon: BDAG
  rationale: Aquí el verbo describe el reparto de lo obtenido entre la comunidad. 'Distribuían' es idiomático en español y refleja el acto de asignar o repartir sin añadir detalles no explícitos.
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos ellos
  - entre todos
  lexicon: BDAG
  rationale: El dativo plural indica los receptores dentro del grupo. 'A todos' es claro y fiel al alcance general del término.
- source_word: καθότι ἄν τις χρείαν εἶχεν
  english_pob_choice: as anyone had need
  chosen_spanish: según la necesidad de cada uno
  alternatives_spanish:
  - según la necesidad que cualquiera tuviera
  - conforme alguien tuviera necesidad
  - según lo que cada uno necesitara
  lexicon: BDAG
  rationale: La cláusula expresa distribución proporcionada a la necesidad individual. 'Según la necesidad de cada uno' conserva esa proporcionalidad y suena natural en español, sin especificar más de lo que el griego dice.
theological_decisions:
- issue: Alcance social de la venta y distribución de bienes
  english_pob_reading: The verse describes voluntary, ongoing sale and distribution of property according to need, without specifying abolition of private ownership as a formal doctrine.
  chosen_spanish_reading: El versículo describe una venta y distribución continuas de bienes según la necesidad, sin afirmar explícitamente la abolición de la propiedad privada como doctrina obligatoria.
  alternative_spanish_readings:
  - El versículo enseña la propiedad comunitaria total como norma para todos los cristianos.
  - El texto exige que toda posesión privada desaparezca en la iglesia.
  rationale: Los verbos en imperfecto presentan una práctica repetida, pero el texto no formula una norma doctrinal de abolición de la propiedad privada. La traducción debe describir la acción sin resolver una tensión social que el versículo no resuelve por sí mismo.
  doctrine_reference: Preservar la tensión teológica; no importar una doctrina socioeconómica que el texto no enuncia.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto de traducción. No se modificó la sustancia exegética del renglón; solo se aseguró la correspondencia entre el texto y la nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque no aparece el Tetragrámaton ni una cita divina directa.
  - Se evitó 'Cristo'/'Mesías' porque el versículo no contiene ese título.
  - Se eligieron verbos en imperfecto ('vendían', 'distribuían') para reflejar el aspecto iterativo del griego.
  - '''Propiedades'' y ''posesiones'' conservan la distinción léxica entre κτήματα y ὑπάρξεις sin sobreinterpretar el mecanismo de reparto.'
