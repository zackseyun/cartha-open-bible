translation:
  language: es
  text: 'Hombres de Israel[a], escuchen estas palabras: Jesús el Nazareno, un hombre atestiguado ante ustedes por Dios con milagros[b] y prodigios y señales que Dios hizo por medio de él en medio de ustedes, tal como ustedes mismos saben—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Varones de Israel» o «varones israelitas»; el griego Ἄνδρες Ἰσραηλῖται es una forma de dirección explícitamente masculina.
    reason: lexical_alternative
  - marker: b
    text: O «obras poderosas»; δυνάμεσι puede rendirse más literalmente como «poderes», pero aquí la serie de actos divinos se expresa de forma natural como «milagros».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες Ἰσραηλῖται
  english_pob_choice: Men of Israel
  chosen_spanish: ¡Varones israelitas!
  alternatives_spanish:
  - Hombres de Israel
  - Varones de Israel
  lexicon: BDAG
  rationale: Ἄνδρες es un vocativo masculino plural; «varones» conserva mejor ese rasgo que una forma neutralizada. «Israelitas» mantiene el identificador étnico y la dirección directa del llamado.
- source_word: ἀκούσατε τοὺς λόγους τούτους
  english_pob_choice: hear these words
  chosen_spanish: escuchen estas palabras
  alternatives_spanish:
  - oigan estas palabras
  - escuchen este mensaje
  lexicon: BDAG
  rationale: El imperativo aoristo pide atención. «Escuchen estas palabras» es natural en español y se mantiene más cerca de λόγους que «mensaje».
- source_word: Ἰησοῦν τὸν Ναζωραῖον
  english_pob_choice: Jesus the Nazarene
  chosen_spanish: Jesús el Nazareno
  alternatives_spanish:
  - Jesús de Nazaret
  - Jesús el Nazoreo
  lexicon: BDAG
  rationale: Ναζωραῖος admite varias formas naturales. «El Nazareno» conserva el valor titular/descriptivo del griego y es idiomático en español.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: BDAG
  rationale: El sustantivo significa literalmente «hombre». Se conserva para no suavizar la afirmación de la humanidad real de Jesús en el texto.
- source_word: ἀποδεδειγμένον ἀπὸ τοῦ θεοῦ
  english_pob_choice: attested to you by God
  chosen_spanish: acreditado para ustedes por Dios
  alternatives_spanish:
  - atestiguado por Dios ante ustedes
  - aprobado por Dios para ustedes
  - demostrado por Dios ante ustedes
  lexicon: BDAG
  rationale: ἀποδεδειγμένον comunica la idea de mostrar/validar públicamente como auténtico. «Acreditado» recoge bien la validación divina sin introducir lenguaje eclesiástico posterior; «para ustedes» refleja εἰς ὑμᾶς como presentación dirigida a la audiencia.
- source_word: δυνάμεσι καὶ τέρασι καὶ σημείοις
  english_pob_choice: with miracles and wonders and signs
  chosen_spanish: con milagros y prodigios y señales
  alternatives_spanish:
  - con obras poderosas y prodigios y señales
  - con poderes y prodigios y señales
  lexicon: BDAG
  rationale: La tríada es formulaica. «Milagros» expresa bien el sentido contextual de δυνάμεις, mientras «prodigios» y «señales» conservan la paralela secuencia nominal.
- source_word: οἷς ἐποίησεν δι’ αὐτοῦ ὁ θεὸς
  english_pob_choice: that God did through him
  chosen_spanish: que Dios hizo por medio de él
  alternatives_spanish:
  - que Dios realizó por medio de él
  - que Dios obró por medio de él
  lexicon: BDAG
  rationale: El griego pone a Dios como sujeto y a Jesús como medio. «Por medio de él» preserva la agencia mediada sin borrarla ni sustituirla.
- source_word: ἐν μέσῳ ὑμῶν
  english_pob_choice: in your midst
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - en su medio
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma natural en español. «En medio de ustedes» mantiene la imagen espacial sin volverla artificial.
- source_word: καθὼς αὐτοὶ οἴδατε
  english_pob_choice: just as you yourselves know
  chosen_spanish: como ustedes mismos saben
  alternatives_spanish:
  - tal como ustedes mismos saben
  - como ustedes saben
  lexicon: BDAG
  rationale: «Como» reproduce καλάς/καθώς de manera fluida; «ustedes mismos» conserva el énfasis de αὐτοὶ.
theological_decisions:
- issue: Afirmación de la humanidad de Jesús en ἄνδρα
  english_pob_reading: Retain 'a man' in the main text
  chosen_spanish_reading: Retener «un hombre» en el texto principal
  alternative_spanish_readings:
  - una persona
  - uno
  rationale: El griego dice explícitamente ἄνδρα. Mantener «un hombre» evita diluir una afirmación concreta de humanidad que el versículo sí enuncia.
  doctrine_reference: Credo Niceno; Definición de Calcedonia
- issue: Agencia divina en la cláusula de los milagros
  english_pob_reading: 'Make God the subject of the works: ''that God did through him'''
  chosen_spanish_reading: 'Hacer de Dios el sujeto: «que Dios hizo por medio de él»'
  alternative_spanish_readings:
  - que él hizo entre ustedes
  - que Dios hizo mediante él
  rationale: El griego nombra a ὁ θεός como sujeto y a Jesús como agente mediador mediante δι’ αὐτοῦ. La traducción conserva esa estructura sin armonizarla con otras formulaciones bíblicas.
  doctrine_reference: Preservar la tensión teológica del texto; Translation philosophy §1
translation_notes:
  revision_awareness: 'Se revisó el pasaje y no se requirieron cambios respecto del último pase: la versión fuente en griego, el texto inglés auditado y la decisión de mantener la agencia divina en la cláusula de los signos permanecen consistentes.'
  spanish_consistency_notes:
  - Se mantiene «Jesús el Nazareno» como forma natural y fiel para Ναζωραῖος.
  - Se conserva la secuencia triádica «milagros y prodigios y señales» para reflejar el paralelismo del griego.
  - Se evita «Señor» o «SEÑOR» porque el versículo dice explícitamente ὁ θεός como sujeto de la acción.
  - Se usa «ustedes» de manera uniforme para la audiencia plural.
  - Se conserva el vocativo inicial con exclamación para reflejar la fuerza del llamado directo.
