revisions:
- from: '¡Varones israelitas[a], escuchen estas palabras: Jesús el Nazareno, un hombre acreditado para ustedes por Dios con milagros[b] y prodigios y señales que Dios hizo por medio de él en medio de ustedes, como ustedes mismos saben—'
  to: 'Hombres de Israel[a], escuchen estas palabras: Jesús el Nazareno, un hombre atestiguado ante ustedes por Dios con milagros[b] y prodigios y señales que Dios hizo por medio de él en medio de ustedes, tal como ustedes mismos saben—'
  rationale: Se ajusta el vocativo a una forma más natural y ampliamente legible en español («Hombres de Israel») sin perder el masculino explícito del griego. También se reemplaza «acreditado para ustedes» por «atestiguado ante ustedes», que representa mejor ἀποδεδειγμένον ἀπὸ τοῦ θεοῦ εἰς ὑμᾶς y evita una resonancia burocrática. «Tal como ustedes mismos saben» expresa bien καθώς αὐτοὶ οἴδατε con buena fluidez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría en los puntos principales: mantiene el vocativo masculino, conserva «un hombre» para ἄνδρα, hace a Dios sujeto de las obras y a Jesús medio de ellas, y distingue bien εἰς ὑμᾶς de ἐν μέσῳ ὑμῶν. También preserva la alternativa léxica sobre Ναζωραῖος y δυνάμεσι. Sin embargo, «acreditado para ustedes por Dios» no refleja con suficiente naturalidad ni precisión el valor de εἰς ὑμᾶς como ‘ante/a ustedes’; y «¡Varones israelitas!» suena menos natural que una formulación equivalente más idiomática en español e introduce un matiz algo redundante frente al inglés auditado.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero contiene dos roces de estilo/idiomaticidad importantes para el proyecto: «Varones israelitas» suena rígido y menos eclesialmente natural que «Hombres de Israel» o «Varones de Israel»; y «acreditado para ustedes» resulta poco idiomático en este contexto, con resonancia burocrática. El resto fluye bien y mantiene un registro moderno y reverente.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto: Ἰησοῦς -> «Jesús», θεός -> «Dios». No aplica Yahvé/Mesías aquí. La decisión «un hombre» está correctamente alineada con la justificación teológica auditada. «Milagros» para δυνάμεσι es aceptable con nota alternativa.'
  issues:
  - severity: medium
    issue: «acreditado para ustedes por Dios» es poco idiomático y no vierte bien εἰς ὑμᾶς
    rationale: El griego expresa que Jesús fue públicamente atestiguado/mostrado a la audiencia; en español, «acreditado para ustedes» suena burocrático y puede sugerir beneficio o destino, no presentación ante ellos. «atestiguado ante ustedes por Dios» o «acreditado ante ustedes por Dios» refleja mejor el sentido.
  - severity: medium
    issue: «¡Varones israelitas!» suena rígido y menos natural que otras opciones fieles
    rationale: Aunque conserva el masculino, la combinación no es la más idiomática en español bíblico contemporáneo. «Hombres de Israel» preserva mejor la fuerza vocativa y coincide con la nota alternativa ya reconocida en el expediente.
  - severity: low
    issue: La nota de «milagros» omite una de las alternativas del expediente inglés
    rationale: El audit trail inglés menciona también «powers/poderes». La nota actual lo alude, así que no es un error grave, pero conviene mantener la formulación más completa y cuidada.
