  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: ἐγκαταλείψεις = «abandonarás», ψυχήν = «alma», εἰς ᾅδην = «al Hades», y δώσεις + infinitivo = «permitirás que». También preserva correctamente la identificación cristológica de τὸν ὅσιόν σου como «tu Santo». Sin embargo, en ἰδεῖν διαφθοράν el texto base y la auditoría inglesa favorecen el sentido físico de descomposición corporal; «vea corrupción» es posible por tradición, pero en español actual introduce ambigüedad moral y no sigue de cerca la decisión documentada de priorizar «decay».'
