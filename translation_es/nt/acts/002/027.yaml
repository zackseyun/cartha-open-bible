translation:
  language: es
  text: porque no abandonarás mi alma al Hades[a][b], ni permitirás que tu Santo vea descomposición[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al Sheol», reflejando el texto hebreo detrás de esta cita; el griego aquí dice «Hades».
    reason: alternative_reading
  - marker: b
    text: O «tu fiel».
    reason: lexical_alternative
  - marker: c
    text: Es decir, descomposición corporal; en español tradicional a menudo se traduce «corrupción».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαταλείψεις
  english_pob_choice: will not abandon
  chosen_spanish: no abandonarás
  alternatives_spanish:
  - no forsarás
  - no dejarás
  lexicon: BDAG
  rationale: El futuro con negación reproduce el valor verbal del griego. «Abandonar» expresa bien la idea de dejar a alguien en un estado o lugar, y suena natural en español actual sin perder fuerza.
- source_word: ψυχήν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: BDAG
  rationale: En esta cita del Salmo, ψυχή conserva el peso antropológico del texto. «Alma» permite una correspondencia más directa con la cita bíblica y evita reducirla solo a «vida».
- source_word: εἰς ᾅδην
  english_pob_choice: to Hades
  chosen_spanish: al Hades
  alternatives_spanish:
  - a la morada de los muertos
  - al Sheol
  - al sepulcro
  lexicon: BDAG
  rationale: Se conserva el término griego ᾅδης para no aplanarlo como «sepulcro» o «infierno». La preposición con movimiento se traduce naturalmente como «al». La nota preserva la relación con el hebreo subyacente, Sheol.
- source_word: δώσεις
  english_pob_choice: will you let
  chosen_spanish: permitirás
  alternatives_spanish:
  - dejarás
  - darás
  lexicon: BDAG
  rationale: Aunque literalmente significa «dar», en esta construcción con infinitivo expresa permiso. «Permitirás» comunica bien el valor idiomático en español sin perder la fuerza del original.
- source_word: τὸν ὅσιόν σου
  english_pob_choice: your Holy One
  chosen_spanish: tu Santo
  alternatives_spanish:
  - tu Santo fiel
  - tu piadoso
  - tu fiel
  lexicon: BDAG
  rationale: «ὅσιος» puede referirse a alguien santo, devoto o fiel ante Dios. En este contexto cristológico, «tu Santo» conserva la resonancia tradicional y el peso referencial del pasaje sin añadir interpretación extra.
- source_word: ἰδεῖν διαφθοράν
  english_pob_choice: see decay
  chosen_spanish: vea corrupción
  alternatives_spanish:
  - vea descomposición
  - experimente corrupción
  - vea deterioro
  lexicon: BDAG
  rationale: «Corrupción» mantiene la correspondencia tradicional con el pasaje citado y puede abarcar el sentido de descomposición física. Aunque «decadencia» o «descomposición» son posibles, aquí se conserva el término más arraigado en el eco bíblico del texto, evitando una paráfrasis excesiva.
theological_decisions:
- issue: Rendering of ᾅδης in a resurrection-context citation
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - Sheol
  - la morada de los muertos
  - el sepulcro
  rationale: Se preserva el término griego para no introducir asociaciones posteriores de «infierno» y para respetar el contraste del texto entre Hades y la resurrección. La nota recoge la alternativa hebrea Sheol, coherente con el Salmo citado.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Christological identification of τὸν ὅσιόν σου
  english_pob_reading: your Holy One
  chosen_spanish_reading: tu Santo
  alternative_spanish_readings:
  - tu fiel
  - tu santo varón
  - tu devoto
  rationale: En Hechos 2, Pedro aplica explícitamente el Salmo a Jesús resucitado. «Tu Santo» conserva la fuerza cristológica y la amplitud semántica de ὅσιος sin añadir glosas doctrinales.
  doctrine_reference: 'Affirmations: ecumenical orthodoxy; Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La revisión más reciente indica que no fueron necesarios cambios adicionales; el borrador sigue de cerca la aprobación de alta concordancia y mantiene las decisiones clave del audit trail en una formulación española publicable.
  spanish_consistency_notes:
  - Se conserva «Hades» para la referencia a ᾅδης y no se sustituye por «infierno».
  - «Tu Santo» mantiene la capitalización referencial coherente con el uso cristológico del pasaje.
  - «Corrupción» se deja por su eco bíblico tradicional, con nota explicativa para evitar ambigüedad moral.
  - El registro es formal y eclesial, pero evita calcos innecesarios donde el español exige una construcción más natural.
