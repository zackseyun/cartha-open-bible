  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: «Hades» se conserva correctamente y no se reemplaza por «infierno»; «alma» mantiene el peso de ψυχή; «tu Santo» concuerda con la decisión cristológica de «Holy One». La principal desalineación está en διαφθοράν: el inglés POB optó por «decay» precisamente para evitar la ambigüedad de «corruption/corrupción», por lo que el español debe seguir ese criterio con «descomposición» o equivalente físico.'
