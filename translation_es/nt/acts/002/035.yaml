translation:
  language: es
  text: hasta que ponga a tus enemigos en estrado para tus pies[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta que ponga a tus enemigos como estrado de tus pies».'
    reason: lexical_alternative
  - marker: b
    text: Esta línea hace eco del Salmo 110:1, un texto real y mesiánico de entronización.
    reason: cross_reference
lexical_decisions:
- source_word: ἕως ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: La construcción expresa un límite temporal futuro; en español, «hasta que» comunica con naturalidad esa idea sin expandir el sentido.
- source_word: θῶ
  english_pob_choice: I make
  chosen_spanish: ponga
  alternatives_spanish:
  - coloque
  - ponga yo
  lexicon: BDAG
  rationale: τίθημι aquí conserva el valor de «poner/colocar» dentro de la cita del salmo; en español, el subjuntivo «ponga» reproduce mejor la subordinación temporal que una traducción más literal y pesada.
- source_word: τοὺς ἐχθρούς σου
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te son contrarios
  - los hostiles a ti
  lexicon: BDAG
  rationale: «Enemigos» es la equivalencia directa y preserva la fuerza personal y real de la expresión griega y del eco del Salmo 110:1.
- source_word: ὑποπόδιον
  english_pob_choice: a footstool
  chosen_spanish: estrado
  alternatives_spanish:
  - banquillo
  - apoyo para los pies
  lexicon: BDAG
  rationale: El término designa el apoyo bajo los pies y, en la cita real, la imagen de humillación/subyugación; «estrado» es una opción digna y bíblica en español, sin perder la metáfora.
- source_word: τῶν ποδῶν σου
  english_pob_choice: for your feet
  chosen_spanish: de tus pies
  alternatives_spanish:
  - para tus pies
  - bajo tus pies
  lexicon: BDAG
  rationale: La genitiva fija la imagen del estrado relacionado con los pies; «de tus pies» refleja con mayor cercanía la construcción del griego, mientras que «para tus pies» suavizaría el vínculo formal.
theological_decisions:
- issue: Imagen real y mesiánica del Salmo 110:1 citada en Hechos 2:35
  english_pob_reading: Retain the concrete image 'a footstool for your feet' rather than paraphrasing it as total defeat or subjugation.
  chosen_spanish_reading: Conservar la imagen concreta de «estrado de tus pies» en vez de explicarla como derrota total o sometimiento completo.
  alternative_spanish_readings:
  - hasta que someta completamente a tus enemigos bajo tus pies
  - hasta que haga quedar a tus enemigos bajo tus pies
  rationale: La cita remite directamente al Salmo 110:1 y mantiene la tensión mesiánica y de entronización; la metáfora debe quedar visible en el texto principal para no resolver interpretivamente lo que el original deja imagístico.
  doctrine_reference: 'Principio POB: primacía del texto original; conservar la tensión teológica y la intertextualidad.'
translation_notes:
  revision_awareness: El texto griego y el auditorio inglés coinciden de forma alta; no se registran revisiones aplicadas y el sentido se mantiene estable en la cita. La versión española sigue ese estado estable, conservando la metáfora y el valor temporal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal del proyecto cuando aparezca el nombre divino; aquí no se expresa explícitamente.
  - «Estrado» conserva el campo semántico de subyugación sin sustituirlo por una paráfrasis explicativa.
  - «Hasta que» reproduce con naturalidad la cláusula temporal de ἕως ἂν.
  - No se introduce «Cristo» porque el versículo citado aquí no lo requiere; la carga mesiánica proviene del eco de Salmo 110:1.
