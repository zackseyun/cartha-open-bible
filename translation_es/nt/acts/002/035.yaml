  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. La decisión clave es ὑποπόδιον: «estrado» es aceptable en registro bíblico, pero debe construirse de manera idiomática en español. Se mantiene la metáfora de subyugación sin parafrasearla.'
