- from: Por tanto, siendo profeta[a] y sabiendo que Dios le había jurado con juramento poner a uno del fruto de sus lomos[b] sobre su trono,
  to: Por tanto, siendo profeta y sabiendo que Dios le había jurado con juramento sentar a uno del fruto de sus lomos[a] en su trono,
  rationale: Se reemplaza «poner» por «sentar» para reflejar mejor el matiz causativo de καθίσαι en contexto de entronización. Se elimina la nota [a] original por ser explicativa pero no necesaria; se conserva solo la alternativa léxica significativa para «fruto de sus lomos». También se ajusta «sobre su trono» a «en su trono», que en español suena más natural con «sentar».
