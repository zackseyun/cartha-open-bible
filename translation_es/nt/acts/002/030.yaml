translation:
  language: es
  text: Por tanto, siendo profeta y sabiendo que Dios le había jurado con juramento sentar a uno del fruto de sus lomos[a] en su trono,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendiente»; literalmente, «del fruto de sus lomos».
    reason: lexical_alternative
lexical_decisions:
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero profético
  lexicon: BDAG
  rationale: «Profeta» es el equivalente normal y directo para προφήτης; conserva el oficio revelatorio sin añadir matices ajenos al texto.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - entonces
  lexicon: BDAG
  rationale: Mantiene la inferencia lógica desde el argumento anterior y suena natural en español bíblico actual.
- source_word: ὑπάρχων
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - puesto que era
  - como era
  lexicon: BDAG
  rationale: El participio circunstancial se refleja mejor con «siendo», preservando la estructura participial sin volverla demasiado explicativa.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - porque sabía
  lexicon: BDAG
  rationale: «Sabiendo» conserva el segundo participio coordinado y la relación de conocimiento previo sin forzar una subordinación causal explícita.
- source_word: ὅρκῳ ὤμοσεν
  english_pob_choice: had sworn to him with an oath
  chosen_spanish: le había jurado con juramento
  alternatives_spanish:
  - le había prometido con juramento
  - había jurado a él con juramento
  lexicon: BDAG
  rationale: Se conserva la duplicación enfática del juramento (sustantivo + verbo). En español, «jurar con juramento» suena redundante pero refleja la solemnidad del griego; «le había jurado» mantiene la fuerza verbal y el dativo indirecto.
- source_word: ἐκ καρποῦ τῆς ὀσφύος αὐτοῦ
  english_pob_choice: one from the fruit of his loins
  chosen_spanish: a uno del fruto de sus lomos
  alternatives_spanish:
  - a uno de la descendencia de sus lomos
  - a uno de su linaje
  lexicon: BDAG
  rationale: Se conserva la imagen corporal y genealógica del griego. «Lomos» retiene la concreción idiomática; «fruto de sus lomos» reproduce la metáfora sin sustituirla por un término más abstracto como «descendencia».
- source_word: καθίσαι
  english_pob_choice: to seat
  chosen_spanish: poner
  alternatives_spanish:
  - sentar
  - instalar
  - hacer sentar
  lexicon: BDAG
  rationale: Aunque «sentar» sería una opción más literal, en español «poner a uno sobre su trono» expresa con naturalidad la acción causativa de instalar/reinar. Se evita interpretar más de lo que el contexto exige, pero se conserva el sentido de entronización.
- source_word: ἐπὶ τὸν θρόνον αὐτοῦ
  english_pob_choice: on his throne
  chosen_spanish: sobre su trono
  alternatives_spanish:
  - en su trono
  - en el trono de él
  lexicon: BDAG
  rationale: «Sobre su trono» corresponde bien a la imagen de entronización y evita una formulación menos idiomática en español.
theological_decisions:
- issue: Promesa dinástica davídica sin introducir una identificación explícita con el Mesías en el versículo
  english_pob_reading: Retained the dynastic and enthronement language without importing 'Messiah' into the verse itself.
  chosen_spanish_reading: Se conserva el lenguaje dinástico y de entronización sin introducir «Mesías» en el versículo.
  alternative_spanish_readings:
  - el Mesías se sentaría en su trono
  - un descendiente mesiánico se sentaría en su trono
  rationale: El contexto inmediato aplica la promesa a Jesús, pero este versículo en sí formula el juramento de Dios a David en términos de descendencia y trono. La traducción mantiene esa tensión textual y no resuelve en el versículo una identificación que el contexto desarrolla después.
  doctrine_reference: 'Principio POB: no importar afirmaciones doctrinales que el versículo no formule explícitamente; preservar la precisión textual y la tensión interpretativa.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió la estructura participial («being ... knowing ...») por mayor cercanía al griego. En español se imitó esa cercanía con «siendo ... sabiendo ...», conservando la fluidez y la carga lógica del texto. También se mantuvo la imagen concreta de «fruit of his loins» mediante «fruto de sus lomos», en lugar de aplanarla a «descendencia», porque el audit trail documenta explícitamente esa preferencia lexical.
  spanish_consistency_notes:
  - Se emplea «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se evita «Cristo»/«Mesías» porque el versículo no lo dice; la aplicación cristológica pertenece al contexto, no a esta cláusula.
  - «Lomos» se conserva como término bíblico tradicional en español cuando reproduce mejor la imagen genealógica concreta del griego.
  - La puntuación y el orden buscan una lectura pública natural sin perder la subordinación participial del original.
