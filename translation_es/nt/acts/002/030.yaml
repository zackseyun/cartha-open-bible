  - severity: low
    issue: Nota [a] no necesaria
    rationale: La nota sobre «porque era» comenta una posibilidad gramatical, pero el inglés auditado no la conservó como nota y no parece necesaria para evitar ambigüedad en español. Puede omitirse para mantener economía y enfoque en las alternativas significativas.
