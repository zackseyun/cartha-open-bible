translation:
  language: es
  text: 'Al oír esto[a], fueron traspasados en el corazón, y dijeron a Pedro y a los demás apóstoles: «¿Qué debemos hacer, hermanos[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortados de corazón». La expresión griega describe una convicción o angustia interior aguda.
    reason: lexical_alternative
  - marker: b
    text: Griego «hombres, hermanos»; un tratamiento convencional que puede funcionar como «hermanos» o, según el contexto, «hermanos y hermanas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: Al oír esto
  alternatives_spanish:
  - Cuando oyeron esto
  - Después de oír esto
  lexicon: BDAG
  rationale: El participio aoristo introduce la reacción inmediata al discurso anterior. En español, «Al oír esto» conserva la relación temporal sin añadir demasiada explicación y evita una construcción más pesada.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo más que contraste fuerte. En español puede omitirse sin pérdida de sentido, manteniendo el ritmo natural del relato.
- source_word: κατενύγησαν τὴν καρδίαν
  english_pob_choice: they were pierced to the heart
  chosen_spanish: fueron traspasados de corazón
  alternatives_spanish:
  - fueron heridos de corazón
  - se sintieron profundamente conmovidos
  - fueron cortados de corazón
  lexicon: BDAG
  rationale: La imagen griega es intensa y corporalmente figurada; «traspasados» conserva la fuerza de una penetración aguda. «De corazón» expresa el centro interior afectado, sin diluir la metáfora ni convertirla en mera emoción.
- source_word: εἶπόν τε
  english_pob_choice: and they said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y preguntaron
  - entonces dijeron
  lexicon: BDAG
  rationale: τε enlaza la respuesta con la cláusula anterior; «y dijeron» traduce directamente λέγω sin interpretar el acto como una petición o una pregunta independiente.
- source_word: πρὸς τὸν Πέτρον καὶ τοὺς λοιποὺς ἀποστόλους
  english_pob_choice: to Peter and the rest of the apostles
  chosen_spanish: a Pedro y a los demás apóstoles
  alternatives_spanish:
  - a Pedro y a los otros apóstoles
  - a Pedro y al resto de los apóstoles
  lexicon: BDAG
  rationale: «τοὺς λοιποὺς» señala a los restantes dentro del grupo apostólico. «Los demás apóstoles» conserva bien la distinción entre Pedro y el resto, con naturalidad en español.
- source_word: Τί ποιήσωμεν
  english_pob_choice: What should we do
  chosen_spanish: ¿Qué haremos?
  alternatives_spanish:
  - ¿Qué deberíamos hacer?
  - ¿Qué vamos a hacer?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo expresa la búsqueda de la acción adecuada. En español, la forma interrogativa simple «¿Qué haremos?» comunica esa deliberación con sobriedad y evita introducir un matiz modal no necesario en el contexto.
- source_word: ἄνδρες ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos, hombres
  - hermanos y hermanas
  lexicon: BDAG
  rationale: La expresión funciona como vocativo convencional. «Hermanos» preserva el vínculo fraternal central y evita la duplicación pesada; el posible valor inclusivo queda implícito en el uso contextual, como en el audit trail inglés.
theological_decisions:
- issue: Alcance del vocativo ἄνδρες ἀδελφοί en una audiencia posiblemente mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hombres, hermanos
  rationale: La forma griega es masculina gramaticalmente, pero puede funcionar como tratamiento convencional para el grupo. En el texto principal se mantiene «hermanos» por fidelidad al giro vocativo y por fluidez; la posibilidad inclusiva queda indicada en nota, sin borrar la forma marcada del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensidad de κατενύγησαν τὴν καρδίαν
  english_pob_reading: they were pierced to the heart
  chosen_spanish_reading: fueron traspasados de corazón
  alternative_spanish_readings:
  - fueron traspasados en el corazón
  - fueron cortados de corazón
  - quedaron profundamente conmovidos
  rationale: La frase no debe suavizarse a una emoción genérica; comunica convicción dolorosa o punzante. «Traspasados de corazón» conserva la imagen de impacto interior fuerte y deja abierta la tensión entre herida, convicción y aflicción que el inglés POB también preserva.
  doctrine_reference: DOCTRINE.md §Lexical accuracy and figurative force
translation_notes:
  revision_awareness: El paso de revisión más reciente indica que no hubo cambios respecto del estado anterior; el control de concordancia fue alto y el dictamen del revisor fue de acuerdo total. Esta versión española sigue de cerca el sentido del texto griego y el audit trail inglés sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según norma general del proyecto; este versículo no contiene esas formas.
  - Se mantiene un español neutral y eclesialmente legible, con puntuación moderna y sin calcos innecesarios.
  - La metáfora de impacto interior se conserva en el verbo principal y no se reduce a un comentario psicológico.
  - «Hermanos» se deja en el texto principal por fidelidad al vocativo convencional y se aclara la posible amplitud inclusiva en nota.
