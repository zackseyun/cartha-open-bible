    issue: «fueron traspasados de corazón» es poco idiomático en español
    rationale: Aunque intenta preservar la metáfora de κατενύγησαν τὴν καρδίαν, la construcción «de corazón» suena extraña en español bíblico actual. «En el corazón» reproduce mejor el complemento y mantiene la fuerza figurada documentada por el POB.
  - severity: medium
    issue: «¿Qué haremos?» no comunica suficientemente el deliberativo de ποιήσωμεν
    rationale: El griego pregunta por la acción apropiada, no simplemente por una acción futura. El audit trail inglés justificó ‘What should we do’. En español, «¿Qué debemos hacer?» o «¿Qué deberíamos hacer?» lo refleja con mayor precisión y naturalidad.
