translation:
  language: es
  text: Y cuando el día de Pentecostés había llegado plenamente[a], todos estaban juntos en un mismo lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se estaba cumpliendo el día de Pentecostés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμπληροῦσθαι
  english_pob_choice: had fully come
  chosen_spanish: se estaba cumpliendo
  alternatives_spanish:
  - había llegado plenamente
  - había llegado
  - estaba llegando a su cumplimiento
  lexicon: BDAG
  rationale: El infinitivo presente pasivo con ἐν τῷ expresa una construcción temporal con matiz de proceso o cumplimiento en desarrollo. En español, «se estaba cumpliendo» conserva ese valor aspectual mejor que una forma meramente resultativa, y sigue siendo natural en lectura pública.
- source_word: πεντηκοστῆς
  english_pob_choice: Pentecost
  chosen_spanish: Pentecostés
  alternatives_spanish:
  - la Fiesta de las Semanas
  lexicon: BDAG
  rationale: «Pentecostés» es el equivalente establecido en español para la fiesta judía señalada por el término griego. Mantiene la referencia histórica y litúrgica reconocible sin sustituir el nombre del texto.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  lexicon: BDAG
  rationale: El adjetivo enfatiza la totalidad del grupo ya mencionado. «Todos» reproduce esa fuerza de manera concisa y natural en español.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en compañía
  - reunidos
  lexicon: BDAG
  rationale: El adverbio señala simultaneidad o compañía. «Juntos» expresa bien esa idea sin carga interpretativa adicional.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: in one place
  chosen_spanish: en un mismo lugar
  alternatives_spanish:
  - en el mismo lugar
  - juntos
  lexicon: BDAG
  rationale: El giro idiomático puede significar «en el mismo lugar» o «juntos». Como «juntos» ya está expresado por ὁμοῦ, «en un mismo lugar» evita repetición y conserva el matiz locativo.
theological_decisions:
- issue: Sujeto implícito de ἦσαν
  english_pob_reading: they were all together in one place
  chosen_spanish_reading: todos estaban juntos en un mismo lugar
  alternative_spanish_readings:
  - ellos estaban todos juntos en un mismo lugar
  - estaban todos juntos en un mismo lugar
  rationale: El griego no repite explícitamente el sujeto; se infiere del contexto previo. En español, omitir «ellos» mantiene la naturalidad y no añade contenido doctrinal.
  doctrine_reference: Narrative continuity / readable modern Spanish
- issue: Valor temporal-aspectual de συμπληροῦσθαι
  english_pob_reading: had fully come
  chosen_spanish_reading: se estaba cumpliendo
  alternative_spanish_readings:
  - había llegado plenamente
  - había llegado
  rationale: El texto griego puede leerse con énfasis en cumplimiento en curso. La redacción española preserva esa tensión aspectual sin borrar la opción resultativa que la tradición inglesa adoptó en su revisión.
  doctrine_reference: Translation philosophy § aspect and temporal constructions
translation_notes:
  revision_awareness: La base inglesa pasó de «was being fulfilled» a «had fully come» en una revisión posterior por naturalidad. Para el español se optó por mantener la tensión aspectual del presente pasivo infinitivo griego con una forma natural («se estaba cumpliendo»), sin depender mecánicamente de la revisión inglesa ni perder la alternativa resultativa.
  spanish_consistency_notes:
  - Se usa «Pentecostés» de manera consistente como nombre de la fiesta, no como perífrasis explicativa.
  - Se evita «SEÑOR» u otras convenciones de máscara divina porque el versículo no contiene el Tetragrámaton.
  - «juntos» y «en un mismo lugar» separan la idea de compañía de la idea locativa, reflejando ὁμοῦ y ἐπὶ τὸ αὐτό sin redundancia excesiva.
