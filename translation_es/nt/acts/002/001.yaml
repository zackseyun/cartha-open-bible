  glossary_alignment: ‘Pentecostés’ está bien y coincide con la terminología del proyecto. No hay términos teológicos problemáticos. La única desalineación relevante es aspectual/estilística en συμπληροῦσθαι respecto de la decisión final del POB inglés.
