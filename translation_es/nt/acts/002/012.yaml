translation:
  language: es
  text: 'Y todos estaban asombrados y perplejos[a], diciéndose unos a otros: «¿Qué quiere decir esto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué pretende ser esto?»; literalmente, «¿Qué quiere esto ser?». Es un giro idiomático que pregunta por el sentido o la significación del acontecimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  english_pob_choice: were amazed
  chosen_spanish: estaban asombrados
  alternatives_spanish:
  - estaban maravillados
  - quedaban atónitos
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción continua o en curso; «estaban asombrados» conserva ese matiz y suena natural en español actual. Evita un giro demasiado literal como «se salían de sí», que en español puede sonar extraño o sugerir otra cosa.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza el relato con suavidad, sin oposición fuerte. «Y» reproduce mejor ese avance narrativo.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los presentes
  lexicon: BDAG
  rationale: El sujeto se entiende por el contexto. «Todos» mantiene el énfasis distributivo del griego sin sobrecargar la frase.
- source_word: διηπόρουν
  english_pob_choice: were perplexed
  chosen_spanish: perplejos
  alternatives_spanish:
  - desconcertados
  - sin saber qué pensar
  lexicon: BDAG
  rationale: El verbo expresa desconcierto, duda o incertidumbre continuada. «Perplejos» conserva ese campo semántico y se combina bien con «asombrados».
- source_word: ἄλλος πρὸς ἄλλον
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: Es la forma recíproca idiomática en español para expresar conversación mutua.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciéndose
  alternatives_spanish:
  - diciendo
  - hablando
  lexicon: BDAG
  rationale: El participio introduce el discurso directo; «diciéndose» comunica mejor la acción recíproca de ἄλλος πρὸς ἄλλον que un simple «diciendo».
- source_word: Τί θέλει τοῦτο εἶναι;
  english_pob_choice: What does this mean?
  chosen_spanish: ¿Qué quiere decir esto?
  alternatives_spanish:
  - ¿Qué significa esto?
  - ¿Qué pretende ser esto?
  lexicon: BDAG
  rationale: La expresión griega es idiomática. «¿Qué quiere decir esto?» preserva el sentido comunicativo del texto sin forzar una traducción mecánica como «¿Qué quiere esto ser?». «¿Qué significa esto?» también es posible, pero la formulación elegida mantiene mejor la vivacidad interrogativa del original.
translation_notes:
  revision_awareness: 'El texto griego presenta un imperfecto doble que describe una reacción sostenida: ἐξίσταντο y διηπόρουν. La revisión inglesa reciente mantuvo la lectura óptima-equivalente «were amazed and perplexed» sin cambios; esta propuesta española conserva ambos valores aspectuales con «estaban asombrados y perplejos».'
  spanish_consistency_notes:
  - Se mantiene «Y» como conector narrativo suave, coherente con δέ en este contexto.
  - Se evita «Cristo/Mesías» y cualquier terminología teológica ajena al versículo, porque el texto solo registra la reacción de la multitud.
  - La nota al pie preserva la alternativa idiomática del inglés POB y añade una forma española más natural como equivalente literal/semiliteral.
