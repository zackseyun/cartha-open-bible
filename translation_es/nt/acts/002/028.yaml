translation:
  language: es
  text: Me diste a conocer las sendas de la vida[a]; me llenarás de alegría con tu presencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los caminos de la vida».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con tu rostro»; es decir, «con tu presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώρισάς
  english_pob_choice: you made known
  chosen_spanish: me hiciste conocer
  alternatives_spanish:
  - me diste a conocer
  - me hiciste saber
  lexicon: BDAG
  rationale: El aoristo activo de γνωρίζω expresa una acción puntual de dar a conocer. «Me hiciste conocer» conserva ese valor causativo y suena natural en español bíblico contemporáneo.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo indirecto se integra con naturalidad en español como complemento átono («me»), sin perder el sentido de destinatario de la revelación.
- source_word: ὁδοὺς ζωῆς
  english_pob_choice: the paths of life
  chosen_spanish: los caminos de la vida
  alternatives_spanish:
  - las sendas de la vida
  - los caminos vitales
  lexicon: BDAG
  rationale: ὁδός puede ser «camino» o «sendero». «Caminos de la vida» mantiene el plural y la imagen concreta. Se evita «formas de vida», que en español puede sonar a estilos de vida.
- source_word: πληρώσεις
  english_pob_choice: you will fill
  chosen_spanish: me llenarás
  alternatives_spanish:
  - me colmarás
  - me completarás
  lexicon: BDAG
  rationale: El futuro activo se traduce directamente con futuro simple. «Llenarás» conserva la idea de plenitud sin añadir matices no presentes en el griego.
- source_word: εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: de alegría
  alternatives_spanish:
  - de gozo
  - de regocijo
  lexicon: BDAG
  rationale: εὐφροσύνη designa alegría jubilosa o deleite festivo. En español, «alegría» comunica bien el contenido del sustantivo dentro de la construcción de complemento de contenido con llenar.
- source_word: μετὰ τοῦ προσώπου σου
  english_pob_choice: with your presence
  chosen_spanish: con tu presencia
  alternatives_spanish:
  - ante tu rostro
  - frente a tu rostro
  lexicon: BDAG
  rationale: La expresión literal «con tu rostro» sería extraña en español; «tu presencia» reproduce el sentido idiomático de cercanía personal que el inglés POB también documenta. Se conserva «con» para reflejar la preposición griega y la revisión auditada que destaca esa literalidad relativa.
theological_decisions:
- issue: Idiom de la presencia divina en una cita de salmo aplicada en el discurso de Pedro
  english_pob_reading: with your presence
  chosen_spanish_reading: con tu presencia
  alternative_spanish_readings:
  - ante tu presencia
  - en tu presencia
  rationale: El griego literalmente dice «con tu rostro», pero el uso semítico apunta a presencia personal. «Con tu presencia» mantiene el eco literal de μετά y comunica claramente la relación con Dios sin resolver la tensión idiomática mediante una paráfrasis excesiva.
  doctrine_reference: Salmo citado en Hechos 2; traducción de expresiones idiomáticas teofánicas con equivalencia óptima
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión final que movió la frase desde «in your presence» a «with your presence» para reflejar con más cercanía μετὰ τοῦ προσώπου σου. La versión española sigue esa misma decisión, manteniendo «con tu presencia» y no neutralizándola como «en tu presencia».
  spanish_consistency_notes:
  - Se mantiene un español neutral, bíblico y publicable, sin calcos innecesarios.
  - «Me hiciste conocer» preserva mejor el valor causativo del aoristo que una simple forma de conocimiento pasivo.
  - Se conserva el paralelo sintáctico entre ambas mitades del versículo con verbo futuro en la segunda cláusula.
  - «Alegría» es la opción más natural en español para εὐφροσύνη dentro de esta construcción.
  - Las notas al pie distinguen la alternativa léxica de ὁδοὺς ζωῆς y la literalidad de μετὰ τοῦ προσώπου σου.
