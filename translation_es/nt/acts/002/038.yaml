    changes_summary: 'Changed “Jesus Messiah” to “Jesus Christ” for more natural formal English and closer consistency with standard rendering of Ἰησοῦ Χριστοῦ in this context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y Pedro les dijo: «Arrepiéntanse, y que cada uno de ustedes sea bautizado en el nombre de Jesús Mesías[a] para el perdón de sus pecados[b], y recibirán el don del Espíritu Santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». Χριστός puede verterse como «Mesías» o «Cristo»; aquí se emplea «Mesías» para conservar el sentido titular en la proclamación de Pedro.
    reason: alternative_reading
  - marker: b
    text: La frase «para el perdón de sus pecados» traduce el griego de forma directa. La traducción no resuelve la discusión sobre cómo se relaciona aquí el bautismo con el perdón.
    reason: theological_note
lexical_decisions:
- source_word: Μετανοήσατε
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Hagan arrepentimiento
  - Cambien de mente
  lexicon: BDAG
  rationale: El imperativo aoristo plural exige una respuesta decisiva. En español, «arrepiéntanse» conserva bien el llamado moral y volitivo sin volverlo explicativo de más. «Cambien de mente» sería demasiado interpretativo en este contexto.
- source_word: βαπτισθήτω
  english_pob_choice: let each of you be baptized
  chosen_spanish: que cada uno de ustedes sea bautizado
  alternatives_spanish:
  - bautícese cada uno de ustedes
  - que se bautice cada uno
  lexicon: BDAG
  rationale: La forma singular distributiva ἕκαστος pide un equivalente individualizante. «Que cada uno de ustedes sea bautizado» mantiene el valor pasivo e imperativo de manera natural en español.
- source_word: ἕκαστος ὑμῶν
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno
  - cada uno de vosotros
  lexicon: BDAG
  rationale: La expresión griega enfatiza la respuesta individual dentro del grupo. «Cada uno de ustedes» es claro, neutral y conserva el matiz distributivo.
- source_word: ἐπὶ τῷ ὀνόματι
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - sobre el nombre de
  - en base al nombre de
  lexicon: BDAG
  rationale: En este contexto bautismal, la preposición se expresa de forma idiomática como «en el nombre de». Es la equivalencia más clara en español y no fuerza una precisión ajena al texto.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título y no solo como parte fija del nombre. «Jesucristo» es natural en español, pero borra con más facilidad la fuerza titulal y proclamativa del pasaje.
- source_word: εἰς ἄφεσιν
  english_pob_choice: for the forgiveness
  chosen_spanish: para el perdón
  alternatives_spanish:
  - para el perdón de
  - con miras al perdón
  lexicon: BDAG
  rationale: ἄφεσις denota liberación/perdón. «Para el perdón» reproduce bien el valor final de εἰς sin resolver la discusión teológica sobre relación causal o sacramental.
- source_word: τῶν ἁμαρτιῶν ὑμῶν
  english_pob_choice: of your sins
  chosen_spanish: de sus pecados
  alternatives_spanish:
  - de sus pecados
  - de su pecado
  lexicon: BDAG
  rationale: El plural griego se conserva en plural. En español, el pronombre de tratamiento «ustedes» hace más natural «sus pecados» que una forma singularizada.
- source_word: λήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - van a recibir
  - habrán de recibir
  lexicon: BDAG
  rationale: El futuro indicativo expresa promesa. «Recibirán» es directo, formal y suficientemente natural.
- source_word: δωρεὰν
  english_pob_choice: gift
  chosen_spanish: el don
  alternatives_spanish:
  - el regalo
  - la dádiva
  lexicon: BDAG
  rationale: «Don» es un equivalente digno y bíblico en español para una concesión divina, y funciona muy bien con «Espíritu Santo».
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - del espíritu santo
  lexicon: BDAG
  rationale: Se capitaliza «Espíritu Santo» porque en este contexto se trata de la persona divina, no de un uso genérico de «espíritu».
theological_decisions:
- issue: Relación entre el bautismo y el perdón en εἰς ἄφεσιν τῶν ἁμαρτιῶν ὑμῶν
  english_pob_reading: Render the phrase transparently as 'for the forgiveness of your sins' without adding explanatory wording that would settle denominational debates about sacramental efficacy, sequence, or symbolism.
  chosen_spanish_reading: «para el perdón de sus pecados» se traduce de manera transparente, sin añadir aclaraciones que resuelvan el debate teológico sobre la relación entre bautismo y perdón.
  alternative_spanish_readings:
  - «para que sus pecados sean perdonados»
  - «a causa del perdón de sus pecados»
  rationale: La frase griega se deja con su fuerza directa y teleológica. Así se preserva la tensión interpretativa del texto en lugar de imponer una lectura doctrinal desde la traducción.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Traducción de Χριστοῦ
  english_pob_reading: Translate as 'Messiah' rather than retain 'Christ' in the main text.
  chosen_spanish_reading: Se traduce como «Mesías» en el texto principal.
  alternative_spanish_readings:
  - Cristo
  - Jesucristo
  rationale: La política doctrinal del proyecto favorece «Mesías» cuando Χριστός funciona como título. En este anuncio de Pedro, la dimensión mesiánica está activa y debe conservarse.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ where name-like).'
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación entre «Jesus Messiah» y «Jesus Christ», con restauración final de «Messiah» por coherencia doctrinal. Para el español se sigue esa lectura final: «Jesús Mesías». También se mantiene la decisión de no explicar ni suavizar la relación entre bautismo y perdón.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Mesías» se usa como título, no como nombre fijo.
  - «Espíritu Santo» se capitaliza por referencia personal divina.
  - Se evita «SEÑOR» porque no hay aquí κύριος ni cita directa del nombre divino.
  - Se conserva el plural de «pecados» y el tratamiento plural de segunda persona en español latino neutral.
