revisions:
- from: Y de repente vino del cielo[a] un sonido como de un viento violento en movimiento, y llenó toda la casa donde estaban sentados.
  to: Y de repente vino del cielo un sonido como de un viento impetuoso[a], y llenó toda la casa donde estaban sentados.
  rationale: Se ajusta la frase comparativa para lograr un español más natural y digno, manteniendo la cautela teológica del griego. 'Impetuoso' comunica mejor la fuerza de βιαίας en esta imagen, y la nota conserva la alternativa que refleja el matiz de φερομένης como aire/viento en movimiento sin afirmar que hubiera un viento literal. Se elimina además la nota innecesaria sobre 'del cielo', ya que no había ambigüedad que requiriera anclaje allí.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:21Z'
