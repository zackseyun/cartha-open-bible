translation:
  language: es
  text: Y de repente vino del cielo un sonido como de un viento impetuoso[a], y llenó toda la casa donde estaban sentados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un sonido como de un viento fuerte que avanza'. El griego compara el sonido con aire en movimiento y con fuerza; no dice explícitamente que hubiera un viento real presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there came
  chosen_spanish: vino
  alternatives_spanish:
  - hubo
  - aconteció
  - se oyó
  lexicon: BDAG
  rationale: El griego introduce un acontecimiento que irrumpe en la escena. En español, 'vino' comunica mejor la aparición repentina del sonido que un impersonal más abstracto como 'hubo', y evita la rigidez de 'aconteció'.
- source_word: ἄφνω
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  lexicon: BDAG
  rationale: '''De repente'' expresa bien la brusquedad del evento en español contemporáneo, con un tono natural y digno.'
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del firmamento
  lexicon: BDAG
  rationale: Aquí 'οὐρανοῦ' funciona claramente como el ámbito celestial de procedencia. 'Del cielo' es la forma más natural en español y conserva la fuerza de origen divino.
- source_word: ἦχος
  english_pob_choice: a sound
  chosen_spanish: un sonido
  alternatives_spanish:
  - un ruido
  - una voz
  - un estruendo
  lexicon: BDAG
  rationale: '''Sonido'' es el equivalente general y preciso. ''Ruido'' puede sonar valorativo; ''estruendo'' interpretaría más de lo que el griego dice.'
- source_word: ὥσπερ
  english_pob_choice: like that of
  chosen_spanish: como de
  alternatives_spanish:
  - como
  - cual si fuera
  - parecido a
  lexicon: BDAG
  rationale: '''Como de'' mantiene la comparación sin convertirla en identidad. Es una solución natural para la metáfora auditiva del pasaje.'
- source_word: φερομένης
  english_pob_choice: rushing
  chosen_spanish: en movimiento
  alternatives_spanish:
  - arrastrado
  - que venía
  - impelido
  lexicon: BDAG
  rationale: El participio describe aire 'llevado' o 'impelido'. En español, 'en movimiento' conserva la idea de aire que se desplaza con fuerza sin afirmar explícitamente que había un viento literal.
- source_word: πνοῆς
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aliento
  - soplo
  - respiro
  lexicon: BDAG
  rationale: En este contexto, πνοή se refiere al movimiento del aire. 'Viento' es el equivalente más claro, pero se mantiene dentro de la comparación del versículo.
- source_word: βιαίας
  english_pob_choice: violent
  chosen_spanish: violento
  alternatives_spanish:
  - fuerte
  - poderoso
  - mighty
  lexicon: BDAG
  rationale: '''Violento'' reproduce el valor de fuerza/ímpetu del adjetivo. En español suena fuerte, pero sigue siendo fiel al tenor del griego.'
- source_word: ἐπλήρωσεν
  english_pob_choice: it filled
  chosen_spanish: llenó
  alternatives_spanish:
  - colmó
  - llenó por completo
  lexicon: BDAG
  rationale: '''Llenó'' es el verbo directo y natural. Conserva la imagen de plenitud espacial sin añadir intensificación innecesaria.'
- source_word: ὅλον τὸν οἶκον
  english_pob_choice: the whole house
  chosen_spanish: toda la casa
  alternatives_spanish:
  - la casa entera
  - toda la vivienda
  lexicon: BDAG
  rationale: '''Casa'' es el equivalente idiomático de οἶκος aquí. ''Toda la casa'' refleja de manera clara la totalidad expresada por ὅλον.'
- source_word: οὗ ἦσαν καθήμενοι
  english_pob_choice: where they were sitting
  chosen_spanish: donde estaban sentados
  alternatives_spanish:
  - donde se hallaban sentados
  - donde estaban sentándose
  lexicon: BDAG
  rationale: La perífrasis imperfecta se expresa de manera natural con 'estaban sentados'. 'Sentados' conserva la escena sin sobreinterpretar el estado como un acto puntual.
theological_decisions:
- issue: ¿El texto describe un viento literal o solo una comparación sonora?
  english_pob_reading: 'The main text preserves the simile: a sound like that of a violent rushing wind.'
  chosen_spanish_reading: 'El texto principal conserva la comparación: un sonido como de un viento violento en movimiento.'
  alternative_spanish_readings:
  - un viento violento llenó la casa
  - un sonido de viento violento
  rationale: El griego usa ὥσπερ para comparar, no para identificar. Por eso la redacción española mantiene la similitud y no la convierte en una afirmación literal sobre un viento presente.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje griego y el trazado auditado en inglés. No se aplicaron revisiones posteriores al texto base en el paquete, y el control cruzado reporta alta concordancia sin objeciones.
  spanish_consistency_notes:
  - Se mantiene 'cielo' para οὐρανός en contexto de origen celestial/divino.
  - Se conserva la comparación con 'como de' para no convertir ὥσπερ en una afirmación literal.
  - '''Viento violento en movimiento'' busca reflejar tanto βιαίας como la idea verbal de φερομένης sin forzar una interpretación de viento físico.'
  - '''Casa'' traduce οἶκος en sentido locativo doméstico; no se usó ''hogar'' para evitar connotación afectiva no explícita en el texto.'
