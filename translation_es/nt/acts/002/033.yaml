revisions:
- from: Por tanto[a], exaltado a la diestra de Dios, y habiendo recibido del Padre la promesa del Espíritu Santo[b], derramó esto, lo cual ustedes mismos ven y oyen.
  to: Por tanto[a], exaltado a la diestra de Dios, y habiendo recibido del Padre la promesa del Espíritu Santo[b], ha derramado esto que ustedes mismos ven y oyen.
  rationale: Se ajusta el verbo principal a «ha derramado» para reflejar mejor el resultado presente destacado en el contexto y en el POB inglés; se cambia «lo cual» por «que» para una sintaxis española más natural y más cercana al nexo compacto del griego; y se mejora la nota b para explicar una alternativa real en vez de repetir la frase del texto.
