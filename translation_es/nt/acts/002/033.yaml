translation:
  language: es
  text: Por tanto[a], exaltado a la diestra de Dios, y habiendo recibido del Padre la promesa del Espíritu Santo[b], ha derramado esto que ustedes mismos ven y oyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la diestra de Dios». El dativo griego puede entenderse como ubicación («a la diestra») o como instrumento («por la diestra»).
    reason: alternative_reading
  - marker: b
    text: O «la promesa acerca del Espíritu Santo». El griego puede entenderse como el Espíritu mismo dado como don prometido, o como la promesa referente al Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δεξιᾷ
  english_pob_choice: to the right hand
  chosen_spanish: a la diestra
  alternatives_spanish:
  - a la derecha
  - por la diestra
  lexicon: BDAG
  rationale: La forma dativa con ὑψωθείς permite un sentido locativo o instrumental. En español, 'a la diestra' comunica de manera natural la entronización/exaltación junto a Dios, sin borrar la alternativa instrumental, que se mantiene en nota.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Conserva la fuerza inferencial del argumento de Pedro. 'Por tanto' es claro, solemne y plenamente natural en español bíblico contemporáneo.
- source_word: ὑψωθεὶς
  english_pob_choice: having been exalted
  chosen_spanish: exaltado
  alternatives_spanish:
  - habiendo sido exaltado
  - levantado
  lexicon: BDAG
  rationale: El aoristo pasivo participial expresa la exaltación de Jesús en sentido de entronización. 'Exaltado' mantiene ese valor teológico con naturalidad en español.
- source_word: ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  - la promesa concedida
  lexicon: BDAG
  rationale: Se conserva la relación nominal más cercana al griego. En combinación con el genitivo, 'la promesa' deja abierta la lectura de promesa referente al Espíritu o del don prometido.
- source_word: τοῦ πνεύματος τοῦ ἁγίου
  english_pob_choice: Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo prometido
  - del Espíritu Santo, que es la promesa
  lexicon: BDAG
  rationale: La frase genitiva se traduce de forma estándar y reverente como 'Espíritu Santo'. La nota preserva la ambigüedad entre la promesa acerca del Espíritu y el Espíritu como el don prometido, sin imponer una explicación no explícita del texto.
- source_word: λαβὼν παρὰ τοῦ πατρὸς
  english_pob_choice: having received from the Father
  chosen_spanish: habiendo recibido del Padre
  alternatives_spanish:
  - después de recibir del Padre
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. 'Habiendo recibido' reproduce bien la secuencia y 'del Padre' conserva el valor de παρά con genitivo como fuente.
- source_word: πατρὸς
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  lexicon: BDAG
  rationale: El artículo permite el uso titular 'el Padre', idiomático y teológicamente preciso en el contexto lucano.
- source_word: ἐξέχεεν
  english_pob_choice: he has poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - ha derramado
  - vertió
  lexicon: BDAG
  rationale: En español bíblico, 'derramó' expresa con fuerza y naturalidad la acción de derramar el don/espíritu. Se evita el perfecto compuesto para no forzar un valor aspectual no necesario en español; el contexto ya deja claro el resultado presente.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este don
  - este
  lexicon: BDAG
  rationale: Se mantiene el demostrativo compacto del griego. 'Esto' deja que el contexto identifique el referente como el derramamiento visible del Espíritu, sin añadir una interpretación explícita.
- source_word: ὃ
  english_pob_choice: that
  chosen_spanish: lo cual
  alternatives_spanish:
  - que
  - el cual
  lexicon: BDAG
  rationale: Introduce de manera fluida la cláusula relativa en español y conserva la referencia al acto/don señalado por 'esto'.
- source_word: ὑμεῖς
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis del griego. 'Ustedes mismos' reproduce esa fuerza sin sonar forzado.
- source_word: βλέπετε καὶ ἀκούετε
  english_pob_choice: are seeing and hearing
  chosen_spanish: ven y oyen
  alternatives_spanish:
  - están viendo y oyendo
  - ven y escuchan
  lexicon: BDAG
  rationale: El presente indicativo simple funciona de forma natural en español y transmite la percepción inmediata del auditorio. 'Ver' y 'oír' mantienen el paralelismo del texto griego.
theological_decisions:
- issue: 'τῇ δεξιᾷ τοῦ θεοῦ: exaltación ''a la diestra'' o acción ''por la diestra'' de Dios'
  english_pob_reading: to the right hand of God
  chosen_spanish_reading: a la diestra de Dios
  alternative_spanish_readings:
  - por la diestra de Dios
  rationale: El contexto cercano trata de la exaltación y entronización de Jesús. 'A la diestra de Dios' preserva ese sentido. La posibilidad instrumental sigue siendo real en el griego y se mantiene en nota para no borrar la tensión interpretativa.
  doctrine_reference: Preservar la tensión textual; entronización mesiánica
- issue: 'τὴν ἐπαγγελίαν τοῦ πνεύματος τοῦ ἁγίου: promesa del Espíritu o Espíritu prometido'
  english_pob_reading: the promise of the Holy Spirit
  chosen_spanish_reading: la promesa del Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu Santo prometido
  - la promesa acerca del Espíritu Santo
  rationale: La sintaxis griega admite más de una relación genitiva. En español, 'la promesa del Espíritu Santo' refleja fielmente la forma y deja abierta la interpretación. La nota recoge la alternativa semántica sin fijarla de manera indebida.
  doctrine_reference: Preservar la ambigüedad legítima del genitivo; pneumatología lucana
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del archivo en inglés, que cambió una redacción más interpretativa por una más ajustada al griego en torno a τὴν ἐπαγγελίαν τοῦ πνεύματος τοῦ ἁγίου. Por eso se evita traducir como 'Espíritu Santo prometido' y se conserva la forma nominal 'la promesa del Espíritu Santo', manteniendo abierta la ambigüedad del genitivo. También se respeta el valor de exaltación de ὑψωθεὶς y la posibilidad alternativa de lectura en τῇ δεξιᾷ τοῦ θεοῦ.
  spanish_consistency_notes:
  - Se usa 'Dios' y 'Padre' con mayúscula para los títulos divinos.
  - Se conserva 'Espíritu Santo' como forma estable y reverente, sin convertirla en paráfrasis.
  - '''A la diestra'' mantiene el tono bíblico y la imagen de entronización sin recurrir a ''SEÑOR''.'
  - El español usa 'ustedes' como equivalente plural directo del pronombre enfático griego.
