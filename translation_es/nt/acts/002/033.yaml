  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura griega principal: inferencia con «Por tanto», exaltación «a la diestra de Dios» con nota para la lectura instrumental, recepción «del Padre», y la ambigüedad de «la promesa del Espíritu Santo». Sin embargo, «derramó» pierde el matiz de resultado presente que el inglés POB preserva con «he has poured out», y «lo cual» después de «esto» suena menos natural y menos ajustado a la compactación griega que una construcción con «que».'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión idiomática. «Exaltado a la diestra de Dios» funciona bien. La secuencia «derramó esto, lo cual ustedes mismos ven y oyen» suena algo rígida; «ha derramado esto que ustedes mismos ven y oyen» fluye mejor y conserva mejor el vínculo con la evidencia presente. La nota b es redundante tal como está formulada, porque repite literalmente la frase del texto como alternativa en lugar de aclarar la ambigüedad semántica.
  glossary_alignment: 'Alineado con la terminología del proyecto: «Dios», «Espíritu Santo», «Padre». No hay conflicto con los defaults de Yahvé/Mesías/etc. La decisión de mantener «la promesa del Espíritu Santo» concuerda con la revisión auditada en inglés y con la necesidad de preservar la ambigüedad del genitivo.'
  issues:
  - severity: medium
    issue: Tiempo verbal de ἐξέχεεν
    rationale: Aunque el aoristo griego puede verterse con pretérito en español, aquí el inglés POB documenta un matiz de efecto presente. «Ha derramado» comunica mejor que el resultado del derramamiento está manifiesto en lo que la audiencia ve y oye.
  - severity: medium
    issue: Construcción «esto, lo cual»
    rationale: «Lo cual» es gramatical, pero después de «esto» resulta más pesado y menos idiomático que «esto que». La revisión mejora la legibilidad sin apartarse del griego.
  - severity: low
    issue: Nota b poco informativa en su primera frase
    rationale: 'La supuesta alternativa repite exactamente la redacción principal («la promesa del Espíritu Santo»). Conviene reformular la nota para explicar la ambigüedad real: promesa acerca del Espíritu o el Espíritu como don prometido.'
  revised_spanish_text: Por tanto[a], exaltado a la diestra de Dios, y habiendo recibido del Padre la promesa del Espíritu Santo[b], ha derramado esto que ustedes mismos ven y oyen.
  revised_footnotes:
