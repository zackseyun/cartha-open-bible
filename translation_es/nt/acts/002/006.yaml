translation:
  language: es
  text: Y al producirse este sonido, la multitud se reunió y quedó desconcertada[a], porque cada uno los oía hablar en su propio dialecto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedó confusa» o «se confundió». El griego indica desorientación o confusión de la multitud.
    reason: lexical_alternative
  - marker: b
    text: O «en su propia lengua». El griego διάλεκτος puede referirse de manera más amplia a una lengua, pero «dialecto» refleja más de cerca la palabra que usa Lucas.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης δὲ τῆς φωνῆς ταύτης
  english_pob_choice: when this sound occurred
  chosen_spanish: Y cuando ocurrió este sonido
  alternatives_spanish:
  - Y cuando este sonido sucedió
  - Y cuando se produjo este sonido
  - Y cuando llegó este sonido
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca circunstancia temporal. En español, «ocurrió» comunica bien la aparición del fenómeno audible sin forzar una paráfrasis. «Sonido» conserva el valor de φωνή en este contexto, sin decidir de antemano por «voz» o «ruido».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona como enlace narrativo suave. «Y» mantiene la continuidad del relato en español natural.
- source_word: συνῆλθε τὸ πλῆθος
  english_pob_choice: the crowd came together
  chosen_spanish: la multitud se reunió
  alternatives_spanish:
  - la multitud se juntó
  - la multitud se congregó
  - la multitud se congregó
  lexicon: BDAG
  rationale: συνέρχομαι indica que el grupo se movió y quedó reunido en un mismo lugar. «Se reunió» es claro y fiel; «multitud» refleja mejor πλῆθος que un término más técnico o eclesiástico.
- source_word: συνεχύθη
  english_pob_choice: was bewildered
  chosen_spanish: quedó confusa
  alternatives_spanish:
  - se confundió
  - quedó desconcertada
  - se perturbó
  lexicon: BDAG
  rationale: El pasivo de συγχέω puede expresar confusión o desconcierto. «Quedó confusa» preserva el estado resultante sin exagerar la intensidad y suena natural en español.
- source_word: ἤκουον
  english_pob_choice: was hearing
  chosen_spanish: los oía
  alternatives_spanish:
  - los escuchaba
  - los estaba oyendo
  - les oía
  lexicon: BDAG
  rationale: El imperfecto sugiere percepción continua o repetida. «Los oía» conserva ese matiz sin volverse pesado. En español, «oír» mantiene mejor la idea de recepción auditiva que «escuchar».
- source_word: εἷς ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  - uno por uno
  lexicon: BDAG
  rationale: La fuerza distributiva del griego se expresa de forma natural con «cada uno». Mantiene el énfasis individual sin introducir un giro menos idiomático.
- source_word: τῇ ἰδίᾳ διαλέκτῳ
  english_pob_choice: in his own dialect
  chosen_spanish: en su propia lengua
  alternatives_spanish:
  - en su propio dialecto
  - en su propia habla
  - en su idioma
  lexicon: BDAG
  rationale: διάλεκτος puede abarcar lengua o dialecto. Aunque «dialecto» refleja más de cerca la palabra griega, en español «lengua» comunica mejor el sentido en este contexto y evita una restricción artificial que podría sonar técnica o extraña para el lector general. La nota conserva la alternativa más cercana al término griego.
- source_word: λαλούντων αὐτῶν
  english_pob_choice: them speaking
  chosen_spanish: los oía hablar
  alternatives_spanish:
  - los oía hablando
  - los oía mientras hablaban
  - los oía al hablar
  lexicon: BDAG
  rationale: El participio presente indica acción en curso de los hablantes ya mencionados. «Los oía hablar» reproduce con naturalidad la relación entre el acto de oír y la acción de hablar, sin añadir un referente más específico que el texto no explicita.
theological_decisions:
- issue: How to render διάλεκτος without erasing Luke's lexical precision
  english_pob_reading: in his own dialect
  chosen_spanish_reading: en su propia lengua
  alternative_spanish_readings:
  - en su propio dialecto
  - en su idioma
  rationale: 'La traducción española prioriza la inteligibilidad pública, pero no quiere borrar la tensión lexical: Luke usa διάλεκτος, término que puede abarcar lengua o dialecto. Por eso el texto principal dice «lengua», mientras la nota conserva que una opción más literal sería «dialecto».'
  doctrine_reference: DOCTRINE.md §Translation philosophy 2; §Lexical precision
- issue: Distributive singular expression in Spanish
  english_pob_reading: each one was hearing them speaking in his own dialect
  chosen_spanish_reading: cada uno los oía hablar en su propia lengua
  alternative_spanish_readings:
  - cada uno los oía hablar en su propio dialecto
  - cada uno los oía hablando en su propia lengua
  rationale: El griego usa formas singulares distributivas. En español, «cada uno» preserva esa distribución. El posesivo singular «su» mantiene la referencia individual sin necesidad de pluralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se revisó el pasaje con atención al genitivo absoluto inicial, al valor aspectual del imperfecto ἤκουον y a la ambigüedad de διάλεκτος. La versión final mantiene la lectura de un fenómeno audible que reúne a la multitud y conserva en nota la alternativa lexical más cercana al griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» y otras terminologías no presentes en el texto.
  - Se preservó la distribución singular con «cada uno» y el posesivo singular «su», coherente con el griego.
  - Se eligió «lengua» en el texto principal por naturalidad, sin borrar la alternativa «dialecto» en nota.
