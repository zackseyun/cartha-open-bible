translation:
  language: es
  text: Incluso sobre mis esclavos[a] y mis esclavas[a], en aquellos días derramaré de mi Espíritu[b], y profetizarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis siervos ... mis siervas». Los términos griegos pueden denotar siervos o esclavos; aquí se usa «esclavos» para preservar el énfasis del pasaje en su bajo estatus social.
    reason: lexical_alternative
  - marker: b
    text: O «derramaré de mi Espíritu». El griego dice más literalmente «de mi Espíritu», con sentido de procedencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: καί γε
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - Y además
  - Sí, incluso
  lexicon: BDAG
  rationale: La combinación añade énfasis y culminación al anuncio previo. «Incluso» comunica esa fuerza enfática de modo natural en español sin descomponer innecesariamente ambas partículas.
- source_word: ἐπὶ τοὺς δούλους μου
  english_pob_choice: on my male slaves
  chosen_spanish: sobre mis esclavos varones
  alternatives_spanish:
  - sobre mis siervos
  - sobre mis esclavos
  lexicon: BDAG
  rationale: δοῦλος puede significar siervo o esclavo, pero el contexto del texto auditado conserva la carga social de bajo estatus. «Esclavos» preserva mejor esa fuerza; «varones» refleja el contraste explícito con el femenino.
- source_word: ἐπὶ τὰς δούλας μου
  english_pob_choice: on my female slaves
  chosen_spanish: y mis esclavas
  alternatives_spanish:
  - y mis siervas
  - y mis mujeres esclavas
  lexicon: BDAG
  rationale: δούλη es el femenino de δοῦλος. «Esclavas» mantiene la distinción de género y el matiz social del pasaje. Se omite repetir «sobre» en español por economía y fluidez, sin alterar la relación verbal del hebraísmo subyacente.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  - en esos días
  lexicon: BDAG
  rationale: Es una expresión temporal directa. «Aquellos días» conserva el valor demostrativo y resulta idiomático en español.
- source_word: ἐκχεῶ
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - derramaré abundantemente
  - vaciaré
  lexicon: BDAG
  rationale: El verbo transmite la metáfora de un derramamiento abundante. «Derramaré» es la forma natural y fiel en español; el complemento «de mi Espíritu» conserva el movimiento de origen.
- source_word: ἀπὸ τοῦ πνεύματός μου
  english_pob_choice: from my Spirit
  chosen_spanish: de mi Espíritu
  alternatives_spanish:
  - desde mi Espíritu
  - a partir de mi Espíritu
  lexicon: BDAG
  rationale: La preposición ἀπό tiene un matiz de procedencia. En español, «de mi Espíritu» refleja con naturalidad esa procedencia y mantiene la imagen de derramamiento. Se capitaliza «Espíritu» por referencia al Espíritu divino en contexto profético.
- source_word: προφητεύσουσιν
  english_pob_choice: they will prophesy
  chosen_spanish: profetizarán
  alternatives_spanish:
  - hablarán proféticamente
  - anunciarán profecías
  lexicon: BDAG
  rationale: El verbo denota directamente la acción de profetizar. «Profetizarán» es claro, bíblico y no añade paráfrasis.
theological_decisions:
- issue: δοῦλος/δούλη en un anuncio del derramamiento del Espíritu
  english_pob_reading: male slaves / female slaves
  chosen_spanish_reading: esclavos varones / esclavas
  alternative_spanish_readings:
  - siervos varones / siervas
  - siervos / siervas
  rationale: El expediente auditado preserva «slave» para retener la fuerza de bajo estatus social y la sorpresa de que el Espíritu se derrame sobre quienes ocupan ese lugar. «Esclavos» mantiene esa tensión mejor que «siervos».
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; translation philosophy points 1 and 4'
- issue: ἀπὸ τοῦ πνεύματός μου y la procedencia del derramamiento
  english_pob_reading: from my Spirit
  chosen_spanish_reading: de mi Espíritu
  alternative_spanish_readings:
  - desde mi Espíritu
  - de parte de mi Espíritu
  rationale: La lectura no pretende explicar el mecanismo del don, sino conservar la imagen bíblica de un derramamiento procedente del Espíritu de Dios. «De mi Espíritu» comunica esa procedencia sin doctrinalizar más allá del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy point 1'
translation_notes:
  revision_awareness: El auditoría inglesa muestra una ida y vuelta entre «servants» y «slaves», con restauración final de «slaves» por política doctrinal. La redacción española sigue esa decisión final y mantiene la distinción masculina/femenina sin suavizar el valor social de δοῦλος/δούλη. También conserva la procedencia literal de ἀπό mediante «de mi Espíritu», evitando la simplificación a una forma más genérica.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia al Espíritu divino en contexto profético.
  - Se mantiene «esclavos/esclavas» para δοῦλος/δούλη conforme al criterio POB de no sustituirlo por «siervos» sin justificación contextual.
  - «Aquellos días» reproduce el demostrativo del griego y es consistente con el estilo bíblico del proyecto.
  - No se añade nota textual porque el pasaje no presenta variante importante en el paquete fuente dado.
