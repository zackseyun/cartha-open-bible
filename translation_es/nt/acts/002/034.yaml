translation:
  language: es
  text: 'Porque David no subió a los cielos[a], sino que él mismo dice: «Dijo el Señor a mi Señor: “Siéntate a mi derecha”»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Salmo 110:1. En el texto hebreo, el primer «Señor» representa el nombre divino Yahvé; compárese: «Dijo Yahvé a mi Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: did not ascend
  chosen_spanish: no subió
  alternatives_spanish:
  - no ascendió
  - no fue elevado
  lexicon: BDAG
  rationale: El verbo ἀναβαίνω aquí expresa subir o ascender; en español, «subió» es natural y fiel. «Ascendió» conserva mejor el registro elevado, pero «subió» comunica con claridad el movimiento sin endurecer el estilo.
- source_word: τοὺς οὐρανούς
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos celestiales
  lexicon: BDAG
  rationale: El griego está en plural y el POB inglés preserva esa pluralidad con «the heavens». «Los cielos» mantiene la forma del original y la resonancia bíblica, evitando la singularización de «el cielo».
- source_word: λέγει δὲ αὐτός
  english_pob_choice: but he himself says
  chosen_spanish: pero él mismo dice
  alternatives_spanish:
  - y él mismo dice
  - pero dice
  lexicon: BDAG
  rationale: «Pero» refleja el contraste suave de δέ, y «él mismo» conserva el énfasis de αὐτός. «Dice» preserva el presente introductorio de la cita, como en el POB inglés.
- source_word: ὁ κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor
  lexicon: BDAG
  rationale: En el texto griego de esta cita de Salmo 110:1, ambos términos aparecen como κύριος. Por eso el cuerpo principal sigue el griego con «el Señor». El trasfondo hebreo del primer término como Yahvé se conserva en la nota, no en la línea principal.
- source_word: τῷ κυρίῳ μου
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi maestro
  - a mi Señor
  lexicon: BDAG
  rationale: El segundo κύριος conserva su valor de título elevado y mesiánico; en español, «mi Señor» reproduce esa relación de honra mejor que «mi maestro». La preposición «a» refleja el dativo introduciendo el destinatario del dicho.
- source_word: Κάθου
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Siéntate tú
  - Toma asiento
  lexicon: BDAG
  rationale: El imperativo idiomático se expresa con «siéntate», que transmite la orden directa de entronización. «Siéntate» es natural en español y mantiene el tono solemne de la cita.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi mano derecha
  - a mi lado derecho
  lexicon: BDAG
  rationale: La expresión es un modismo de honor y autoridad. En español, «a mi derecha» comunica ese sentido de manera idiomática y más natural que una calca literal; el valor de posición privilegiada queda preservado.
theological_decisions:
- issue: Cómo reflejar la cita de Salmo 110:1 en los dos κύριος
  english_pob_reading: 'Both are rendered ''Lord'' in the main text: ''The Lord said to my Lord.'''
  chosen_spanish_reading: 'Ambos se traducen como «Señor» en el cuerpo principal: «Dijo el Señor a mi Señor».'
  alternative_spanish_readings:
  - «Dijo Yahvé a mi Señor» para reflejar el nombre divino del primer término hebreo
  - «Dijo el Señor a mi Señor»
  rationale: El griego citado por Lucas/Hechos usa κύριος en ambos lugares, así que la línea principal sigue el texto griego con «Señor» dos veces. A la vez, el antecedente hebreo del primer término en Salmo 110:1 es Yahvé; esa tensión se preserva en una nota para no borrar el trasfondo del pasaje.
  doctrine_reference: Tratamiento de κύριος; Salmo 110:1; prioridad del texto fuente griego con trasfondo hebreo preservado
- issue: Conservar la alusión intertextual sin suavizarla
  english_pob_reading: For David did not ascend into the heavens, but he himself says...
  chosen_spanish_reading: Porque David no subió a los cielos, pero él mismo dice...
  alternative_spanish_readings:
  - Pues David no ascendió a los cielos, pero él mismo dice...
  - Porque David no ascendió a los cielos, sino que él mismo dice...
  rationale: 'La formulación mantiene el enlace con el argumento de Pedro: David no es quien ocupa el lugar descrito en el salmo. «Subió a los cielos» conserva el contraste y no introduce una paráfrasis explicativa que atenúe la cita.'
  doctrine_reference: Lectura intertextual de Hechos 2:34 en relación con Salmo 110:1
translation_notes:
  revision_awareness: No se detectaron cambios necesarios respecto del último pase de revisión; la propuesta conserva la alta concordancia con el texto fuente griego y con el rastro de auditoría en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo en la nota, conforme al trasfondo hebreo documentado, mientras el cuerpo principal sigue el griego con «Señor».
  - Se preservó el plural de «los cielos» para reflejar τοὺς οὐρανούς.
  - Se usó «a mi derecha» como equivalente idiomático de ἐκ δεξιῶν μου, sin perder la idea de honor y autoridad.
  - Se evitó «Cristo» porque en este versículo no aparece Χριστός ni una fórmula fija que lo requiera.
