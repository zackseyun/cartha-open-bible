translation:
  language: es
  text: 'Pero Pedro, puesto en pie con los once, alzó su voz y les declaró: «Varones de Judea y todos los que habitan en Jerusalén, sea esto conocido por ustedes[a], y den oído a mis palabras[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que esto les sea conocido».
    reason: lexical_alternative
  - marker: b
    text: O «escuchen atentamente mis palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σταθεὶς
  english_pob_choice: standing
  chosen_spanish: puesto en pie
  alternatives_spanish:
  - estando en pie
  - de pie
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial para situar la acción. En español, «puesto en pie» conserva el matiz de ponerse/estar levantado sin sonar rígido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición desde el versículo anterior; «Pero» refleja mejor el giro discursivo en este contexto.
- source_word: σὺν τοῖς ἕνδεκα
  english_pob_choice: with the eleven
  chosen_spanish: junto con los once
  alternatives_spanish:
  - con los once
  - en compañía de los once
  lexicon: BDAG
  rationale: σύν con dativo indica compañía. «Junto con» es natural en español y conserva la idea de acompañamiento público.
- source_word: ἐπῆρεν τὴν φωνὴν αὐτοῦ
  english_pob_choice: raised his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - elevó su voz
  lexicon: BDAG
  rationale: La expresión es idiomática para hablar en voz alta de manera pública. «Alzó su voz» es la forma española más natural y fiel al giro idiomático.
- source_word: ἀπεφθέγξατο
  english_pob_choice: declared
  chosen_spanish: les declaró
  alternatives_spanish:
  - les habló
  - les dirigió la palabra
  lexicon: BDAG
  rationale: El verbo puede señalar una declaración pública y solemne. «Declaró» sigue de cerca la decisión del POB inglés y mantiene el tono formal sin añadir interpretación extra.
- source_word: Ἄνδρες Ἰουδαῖοι
  english_pob_choice: Men of Judea
  chosen_spanish: Varones judíos
  alternatives_spanish:
  - Hombres judíos
  - Judíos
  lexicon: BDAG
  rationale: Ἄνδρες conserva la vocación masculina; «varones» refleja ese rasgo con un registro digno. «Judíos» traduce Ἰουδαῖοι de forma más directa que «de Judea» en este saludo vocativo.
- source_word: οἱ κατοικοῦντες Ἰερουσαλὴμ πάντες
  english_pob_choice: all who dwell in Jerusalem
  chosen_spanish: todos los que habitan en Jerusalén
  alternatives_spanish:
  - todos los que viven en Jerusalén
  - todos los residentes de Jerusalén
  lexicon: BDAG
  rationale: El participio presente indica a los que residen allí. «Habitan» conserva la idea de residencia y el tono elevado del discurso.
- source_word: τοῦτο ὑμῖν γνωστὸν ἔστω
  english_pob_choice: let this be known to you
  chosen_spanish: sepa esto para ustedes[a]
  alternatives_spanish:
  - esto les sea conocido
  - que esto les quede claro
  lexicon: BDAG
  rationale: La frase es una exhortación/mandato formal con valor declarativo. «Sepa esto para ustedes» intenta reflejar el sentido impersonal y direccional del dativo, aunque en español resulte algo marcado; por eso se acompaña de una nota con alternativa más natural.
- source_word: ἐνωτίσασθε
  english_pob_choice: give ear
  chosen_spanish: den oído
  alternatives_spanish:
  - escuchen atentamente
  - presten atención
  lexicon: BDAG
  rationale: El verbo implica escuchar con atención. «Den oído» es una expresión castellana formal que preserva el matiz idiomático más que un simple «escuchen».
- source_word: τὰ ῥήματά μου
  english_pob_choice: my words
  chosen_spanish: mis palabras[b]
  alternatives_spanish:
  - lo que digo
  - mi mensaje
  lexicon: BDAG
  rationale: ῥήματα se refiere a las palabras dichas. «Mis palabras» es la equivalencia más directa y no interpreta el término como «mensaje».
theological_decisions:
- issue: Tratamiento del vocativo masculino Ἄνδρες
  english_pob_reading: Men of Judea
  chosen_spanish_reading: Varones judíos
  alternative_spanish_readings:
  - Hombres judíos
  - Judíos
  rationale: Se conserva la especificidad masculina del vocativo ἄνδρες, en coherencia con una traducción que no neutraliza sin necesidad. «Varones» mantiene esa marca con dignidad y claridad.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (gender-accurate over gender-neutral)'
- issue: Valor de ἀπεφθέγξατο en un discurso público
  english_pob_reading: declared
  chosen_spanish_reading: les declaró
  alternative_spanish_readings:
  - les habló
  - les dirigió la palabra
  rationale: El verbo puede denotar una proclamación solemne. «Declaró» conserva la solemnidad pública sin forzar todavía un matiz profético que no está explícito en el verbo por sí solo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 y §3'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del auditable inglés POB: se mantiene la transición con «Pero», la escena de postura con «puesto en pie», la voz elevada con «alzó su voz», el verbo discursivo con «declaró», y la apelación final con «den oído». Se ajustó «Men of Judea» a una forma española que preserve el vocativo masculino y la referencia étnico-geográfica, y se evitó traducir de manera mecánica desde el inglés cuando el español exigía reordenamiento.'
  spanish_consistency_notes:
  - Se usa «Pedro» sin artículo, conforme al estilo bíblico castellano corriente y al griego con artículo definido.
  - «Varones» conserva la marca masculina del vocativo; no se neutraliza a «personas».
  - «Jerusalén» se mantiene como topónimo establecido en español.
  - «Mis palabras» sigue de cerca ῥήματα y evita ampliar a «mensaje».
  - Las notas alternativas se limitan a opciones reales en español y no introducen glosas doctrinales.
