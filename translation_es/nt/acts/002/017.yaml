review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego y preserva las elecciones clave: «los últimos días», «dice Dios», «mi Espíritu», «toda carne», «profetizarán», «verán visiones» y «soñarán sueños». Sin embargo, no mantiene con suficiente precisión dos decisiones auditadas: ἀπὸ τοῦ πνεύματός μου debe reflejar mejor «from my Spirit» en nota o formulación, y οἱ νεανίσκοι ὑμῶν es masculino específico («sus jóvenes» lo neutraliza). Además, la nota [b] está anclada a «toda carne», pero su contenido trata sobre «de mi Espíritu», lo cual desajusta el aparato.'
  spanish_quality_summary: El texto es legible y digno, pero tiene pequeñas imprecisiones de claridad y fidelidad. «Sus jóvenes» y «sus ancianos» suenan naturales, pero el primero pierde el contraste masculino específico con «sus hijos y sus hijas»; «sus ancianos» puede mantenerse por edad, aunque «sus hombres mayores» o «sus viejos» serían menos naturales. La puntuación con punto y coma es aceptable. Las notas necesitan reubicación y ajuste para que correspondan a los lugares correctos y para preservar la alternativa de «toda carne».
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: θεός -> «Dios», πνεῦμα -> «Espíritu», σάρξ -> «carne». No hay conflicto con Yahvé/Mesías. Sí hay desalineación menor con la decisión documentada sobre ἀπό («de/desde» como procedencia explícita) y con la precisión de género en νεανίσκοι («jóvenes» no basta aquí).'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «toda carne», pero explica «de mi Espíritu».
    rationale: Las notas deben corresponder exactamente al punto del texto que comentan. Aquí el lector entiende erróneamente que la observación se refiere a «toda carne».
  - severity: medium
    issue: Falta una nota para la alternativa interpretativa de «toda carne».
    rationale: El inglés POB preserva explícitamente la alternativa «all people». Dado que el español mantiene «toda carne», conviene conservar la alternativa «todas las personas» o similar en nota.
  - severity: medium
    issue: «Sus jóvenes» neutraliza el masculino específico de οἱ νεανίσκοι ὑμῶν.
    rationale: La decisión auditada en inglés fue «your young men», no un término inclusivo. En este versículo el texto ya nombra «hijos e hijas», por lo que aquí conviene mantener el matiz masculino y el contraste etario.
  - severity: low
    issue: La nota [b] formula el contraste como mayúscula/minúscula más que como el valor de ἀπό.
    rationale: La decisión principal documentada no era solo capitalizar «Espíritu», sino preservar la preposición «from/de». La nota debe reflejar eso con más exactitud.
  revised_spanish_text: Y sucederá en los últimos días[a], dice Dios, que derramaré de mi Espíritu[b] sobre toda carne[c]; y sus hijos y sus hijas profetizarán, y sus jóvenes varones verán visiones, y sus ancianos soñarán sueños.
  revised_footnotes:
