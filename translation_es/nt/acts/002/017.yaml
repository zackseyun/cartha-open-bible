translation:
  language: es
  text: Y sucederá en los últimos días[a], dice Dios, que derramaré de mi Espíritu[b] sobre toda carne[c]; y sus hijos y sus hijas profetizarán, y sus jóvenes varones verán visiones, y sus ancianos soñarán sueños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los días finales». La expresión griega conserva el modismo profético de «los últimos días».
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente se ha traducido «derramaré de mi Espíritu»; el griego usa ἀπό, es decir, «de/desde mi Espíritu», indicando procedencia.
    reason: lexical_alternative
  - marker: c
    text: O «sobre todas las personas». El griego dice «sobre toda carne», preservando el modismo profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἐσχάταις ἡμέραις
  english_pob_choice: in the last days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los días finales
  - en los postreros días
  lexicon: BDAG
  rationale: Se mantiene el idiomatismo escatológico natural en español y la referencia temporal sin explicar de más el alcance profético.
- source_word: λέγει ὁ θεός
  english_pob_choice: says God
  chosen_spanish: dice Dios
  alternatives_spanish:
  - Dios dice
  lexicon: BDAG
  rationale: Conserva la fórmula de cita profética en presente y resulta natural en español sin perder el tono oracular.
- source_word: ἐκχεῶ
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - vaciaré
  - derramaré por completo
  lexicon: BDAG
  rationale: En español bíblico, 'derramar' reproduce bien la metáfora de efusión del verbo griego y su uso profético.
- source_word: ἀπὸ τοῦ πνεύματός μου
  english_pob_choice: from my Spirit
  chosen_spanish: de mi Espíritu
  alternatives_spanish:
  - desde mi Espíritu
  - de mi espíritu
  lexicon: BDAG
  rationale: '''De'' refleja mejor la preposición griega ἀπό que un genitivo simple y conserva el matiz de procedencia. Se mantiene ''Espíritu'' con mayúscula porque el referente es el Espíritu de Dios.'
- source_word: ἐπὶ πᾶσαν σάρκα
  english_pob_choice: on all flesh
  chosen_spanish: sobre toda carne
  alternatives_spanish:
  - sobre todas las personas
  - sobre toda la humanidad
  lexicon: BDAG
  rationale: Se conserva la imaginería profética de σάρξ como 'carne' y la amplitud inclusiva de la promesa, sin sustituirla en el texto principal por una paráfrasis interpretativa.
- source_word: προφητεύσουσιν
  english_pob_choice: will prophesy
  chosen_spanish: profetizarán
  alternatives_spanish:
  - hablarán proféticamente
  lexicon: BDAG
  rationale: '''Profetizar'' es el equivalente directo y mantiene el lenguaje técnico profético sin diluirlo.'
- source_word: οἱ υἱοὶ ὑμῶν καὶ αἱ θυγατέρες ὑμῶν
  english_pob_choice: your sons and your daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - vuestros hijos y vuestras hijas
  - sus hijos e hijas
  lexicon: BDAG
  rationale: En un registro bíblico amplio y publicable, 'sus' resulta natural para dirigirse al colectivo citado; se conserva el paralelismo masculino/femenino explícito del griego.
- source_word: οἱ νεανίσκοι ὑμῶν
  english_pob_choice: your young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus varones jóvenes
  lexicon: BDAG
  rationale: '''Jóvenes'' comunica el contraste generacional de forma fluida en español. Aunque el griego es masculino plural, el contexto de pares generacionales hace que ''jóvenes'' sea la opción más natural y clara.'
- source_word: ὁράσεις ὄψονται
  english_pob_choice: will see visions
  chosen_spanish: verán visiones
  alternatives_spanish:
  - contemplarán visiones
  - tendrán visiones
  lexicon: BDAG
  rationale: Se conserva la construcción cognada y el paralelismo poético de la frase con el menor grado de interpretación posible.
- source_word: οἱ πρεσβύτεροι ὑμῶν
  english_pob_choice: your old men
  chosen_spanish: sus ancianos
  alternatives_spanish:
  - sus mayores
  - sus viejos
  lexicon: BDAG
  rationale: Aquí el contraste es con 'sus jóvenes', por lo que 'ancianos' comunica edad avanzada mejor que 'líderes' o 'presbíteros', que introducirían un sentido institucional ajeno al contexto.
- source_word: ἐνυπνίοις ἐνυπνιασθήσονται
  english_pob_choice: will dream dreams
  chosen_spanish: soñarán sueños
  alternatives_spanish:
  - tendrán sueños
  - soñarán por medio de sueños
  lexicon: BDAG
  rationale: Se mantiene el paralelismo figurado del griego con una expresión española natural. 'Soñarán sueños' reproduce la estructura de repetición del original; 'tendrán sueños' sería más neutro pero menos cercano al ritmo del texto.
theological_decisions:
- issue: Alcance de πᾶσαν σάρκα
  english_pob_reading: Retain the literal phrase 'all flesh' in the main text while understanding it as a broad-humanity idiom in context.
  chosen_spanish_reading: Mantener 'toda carne' en el texto principal, entendida como un modismo amplio de humanidad.
  alternative_spanish_readings:
  - todas las personas
  - toda la humanidad
  rationale: La literalidad preserva la imagen profética y la conexión intertextual con Joel; el sentido inclusivo se entiende por el contexto sin necesidad de reemplazar la metáfora en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5; contested term σάρξ
- issue: Referencia de πνεῦμα en el derramamiento
  english_pob_reading: Translate as 'my Spirit' with capital 'S'.
  chosen_spanish_reading: Traducir como 'mi Espíritu' con mayúscula.
  alternative_spanish_readings:
  - mi espíritu
  rationale: El referente es el Espíritu de Dios, no un simple estado interior. La mayúscula ayuda a comunicar ese referente divino sin añadir contenido extraño al texto.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §6
- issue: Valor de la fórmula profética "dice Dios"
  english_pob_reading: says God
  chosen_spanish_reading: dice Dios
  alternative_spanish_readings:
  - Dios dice
  rationale: Se conserva la inmediatez de la proclamación profética y el presente enunciativo del griego, sin reordenar la cita de forma innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 2
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto griego SBLGNT y el auditrastro inglés de la POB. No se detectaron cambios textuales recientes en la versión inglesa de referencia; la decisión principal fue conservar la metáfora profética («toda carne») y la procedencia explícita («de mi Espíritu») en un español natural.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en contexto; aquí el texto dice θεός, por lo que corresponde «Dios».
  - Se usa 'Espíritu' con mayúscula cuando el contexto indica al Espíritu de Dios.
  - Se preserva el paralelismo sonoro y sintáctico del original con verbos futuros en serie.
  - Se evita 'presbíteros' o 'ancianos' en sentido eclesiástico; aquí el contraste es generacional.
