    text: O «en los días finales». La expresión griega conserva el modismo profético de «los últimos días».
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente se ha traducido «derramaré de mi Espíritu»; el griego usa ἀπό, es decir, «de/desde mi Espíritu», indicando procedencia.
    reason: lexical_alternative
  - marker: c
    text: O «sobre todas las personas». El griego dice «sobre toda carne», preservando el modismo profético.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de las notas, restituye la alternativa documentada para «toda carne» y hace más precisa la referencia a ἀπό en «de mi Espíritu». También ajusta «sus jóvenes» a «sus jóvenes varones» para conservar el masculino específico de νεανίσκοι sin sonar excesivamente rígido. Se mantiene «sus ancianos» por naturalidad y por su sentido etario en contraste con los jóvenes.
