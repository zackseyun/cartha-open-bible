revisions:
- from: Y sucederá en los últimos días[a], dice Dios, que derramaré de mi Espíritu sobre toda carne[b]; y sus hijos y sus hijas profetizarán, y sus jóvenes verán visiones, y sus ancianos soñarán sueños.
  to: Y sucederá en los últimos días[a], dice Dios, que derramaré de mi Espíritu[b] sobre toda carne[c]; y sus hijos y sus hijas profetizarán, y sus jóvenes varones verán visiones, y sus ancianos soñarán sueños.
  rationale: La revisión corrige el anclaje de las notas, restituye la alternativa documentada para «toda carne» y hace más precisa la referencia a ἀπό en «de mi Espíritu». También ajusta «sus jóvenes» a «sus jóvenes varones» para conservar el masculino específico de νεανίσκοι sin sonar excesivamente rígido. Se mantiene «sus ancianos» por naturalidad y por su sentido etario en contraste con los jóvenes.
