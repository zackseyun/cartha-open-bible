translation:
  language: es
  text: tanto judíos como prosélitos, cretenses y árabes, los oímos hablar en nuestras propias lenguas[a] las maravillas de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «idiomas». El término griego puede significar «lenguas» o «idiomas»; aquí el contexto favorece idiomas humanos reconocibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖοί
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En Hechos 2 el referente es el pueblo judío entre la multitud de Pentecostés, no solo habitantes de Judea. «Judíos» comunica de forma natural el sentido etnorreligioso que el contexto exige.
- source_word: τε καὶ
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - y
  - así como
  lexicon: BDAG
  rationale: La correlación de τε καί se refleja mejor con una construcción correlativa en español. «Tanto ... como» preserva la pareja retórica entre judíos y prosélitos.
- source_word: προσήλυτοι
  english_pob_choice: proselytes
  chosen_spanish: prosélitos
  alternatives_spanish:
  - convertidos
  lexicon: BDAG
  rationale: «Prosélitos» es el término técnico y preciso para gentiles adheridos al judaísmo. «Convertidos» es posible, pero pierde especificidad histórica y religiosa.
- source_word: Κρῆτες
  english_pob_choice: Cretans
  chosen_spanish: cretenses
  alternatives_spanish:
  - habitantes de Creta
  lexicon: BDAG
  rationale: Se mantiene el etnónimo normal en español para los habitantes de Creta.
- source_word: Ἄραβες
  english_pob_choice: Arabs
  chosen_spanish: árabes
  alternatives_spanish:
  - arabios
  lexicon: BDAG
  rationale: «Árabes» es la forma natural y actual en español; conserva el referente étnico/geográfico sin arcaísmo.
- source_word: ἀκούομεν
  english_pob_choice: we hear
  chosen_spanish: oímos
  alternatives_spanish:
  - estamos oyendo
  lexicon: BDAG
  rationale: El presente indicativo expresa la experiencia inmediata del grupo. «Oímos» suena natural en español y conserva el valor directo del verbo.
- source_word: λαλούντων αὐτῶν
  english_pob_choice: them speaking
  chosen_spanish: que ellos hablan
  alternatives_spanish:
  - a ellos hablar
  - mientras hablan
  lexicon: BDAG
  rationale: El participio genitivo se vierte de modo idiomático como una subordinada de percepción. «Hablan» mantiene el contenido amplio de λαλέω sin añadir matices no dados por el texto.
- source_word: ταῖς ἡμετέραις γλώσσαις
  english_pob_choice: in our own languages
  chosen_spanish: en nuestras propias lenguas
  alternatives_spanish:
  - en nuestras propias lenguas habladas
  - en nuestras propias lenguas/tongues
  lexicon: BDAG
  rationale: En este contexto γλῶσσαι apunta a idiomas humanos reconocibles. «Lenguas» conserva la imagen literal, y «nuestras propias» mantiene el énfasis de ἡμετέραις.
- source_word: τὰ μεγαλεῖα
  english_pob_choice: the mighty works
  chosen_spanish: las grandes obras
  alternatives_spanish:
  - las obras poderosas
  - los hechos poderosos
  lexicon: BDAG
  rationale: El término designa actos grandes o majestuosos de Dios. «Grandes obras» es una traducción sobria y clara en español; evita sobrecargar con un equivalente demasiado interpretativo.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo posesivo directo y transparente.
theological_decisions:
- issue: Sentido de γλώσσαις en el contexto de Pentecostés
  english_pob_reading: recognizable human languages
  chosen_spanish_reading: lenguas humanas reconocibles
  alternative_spanish_readings:
  - lenguas extáticas
  - hablas en éxtasis
  rationale: El contexto inmediato presenta una audiencia multinacional oyendo el mensaje en sus idiomas propios. Por eso, «lenguas» se entiende aquí como idiomas humanos, sin adelantar debates posteriores sobre glosolalia; la traducción mantiene esa tensión contextual y no la resuelve artificialmente.
  doctrine_reference: Hechos 2:6–11; primacía del contexto narrativo sobre presuposiciones doctrinales posteriores.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y el audit trail inglés. Se conserva la correlación entre grupos étnicos y la escena auditiva del Pentecostés, con una decisión explícita sobre γλώσσαις conforme al contexto narrativo.
  spanish_consistency_notes:
  - Se usó «judíos» en sentido etnorreligioso, coherente con el listado de la multitud de Pentecostés.
  - «Prosélitos» se mantuvo como término técnico para evitar una pérdida de precisión histórica.
  - «Lenguas» queda anclado en la nota para reflejar la alternativa semántica de γλῶσσαι sin introducir ambigüedad en el cuerpo principal.
  - «Grandes obras» conserva el tono reverente de τὰ μεγαλεῖα sin convertirlo en paráfrasis extensa.
