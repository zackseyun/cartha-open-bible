revisions:
- from: tanto judíos como prosélitos[a], cretenses y árabes, oímos que ellos hablan en nuestras propias lenguas las grandes obras de Dios.
  to: tanto judíos como prosélitos, cretenses y árabes, los oímos hablar en nuestras propias lenguas[a] las maravillas de Dios.
  rationale: Se ajusta la construcción verbal para reflejar mejor la percepción directa del griego y mejorar la naturalidad del español («los oímos hablar»). Se refuerza τὰ μεγαλεῖα con «las maravillas de Dios», que comunica mejor el sentido de actos grandes o poderosos y suena más idiomático en español bíblico contemporáneo. Se mantiene «lenguas» en el texto por cercanía léxica y se conserva la aclaración contextual en nota.
