review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la lista de pueblos y regiones de Hechos 2:9 y mantiene bien el sentido sustantival de οἱ κατοικοῦντες como «los que habitan». También preserva adecuadamente la nota cultural sobre «Asia» como provincia romana. Sin embargo, la puntuación y la colocación de las notas no reflejan bien el anclaje semántico del original y del rastro inglés: la nota sobre Asia debe anclarse a «Asia», mientras que la nota alternativa sobre el alcance sintáctico de «los que habitan» debe anclarse a esa frase, no al cierre del versículo. Además, «en el Ponto y en Asia» añade dos preposiciones que no son necesarias en español y rompen la simetría de la enumeración geográfica del original.'
  spanish_quality_summary: El español es mayormente natural y claro, con un registro digno y legible. «Partos, medos y elamitas» y «los que habitan en Mesopotamia» funcionan bien. No obstante, la secuencia «Capadocia, en el Ponto y en Asia» suena menos fluida que una lista simple de regiones paralelas. También conviene limpiar la redacción de la nota b, que empieza con una comilla sobrante y puede expresarse con mejor español editorial.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Los etnónimos y topónimos siguen formas españolas aceptables: «partos», «medos», «elamitas», «Mesopotamia», «Judea», «Capadocia», «el Ponto», «Asia». La decisión de mantener «Asia» en el texto principal con nota aclaratoria concuerda con el expediente inglés. «Los que habitan» refleja bien κατοικοῦντες.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de las notas [a] y [b]
    rationale: La nota cultural sobre «Asia» debe marcarse en «Asia», mientras que la nota sobre la alternativa sintáctica debe marcarse donde aparece «los que habitan», porque trata del alcance de esa frase y de la coordinación posterior.
  - severity: medium
    issue: Preposiciones añadidas en «en el Ponto y en Asia»
    rationale: El griego enumera regiones en serie sin exigir repetir preposición aquí. En español, la lista fluye mejor y más fielmente como «Judea y Capadocia, el Ponto y Asia».
  - severity: low
    issue: Redacción mejorable de la nota b
    rationale: La nota actual tiene comilla inicial sobrante y una formulación algo torpe. Puede expresarse con mayor claridad y corrección editorial en español.
