translation:
  language: es
  text: Partos, medos y elamitas, y los que habitan[a] en Mesopotamia, Judea y Capadocia, el Ponto y Asia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que viven en Mesopotamia ... y Judea y Capadocia». La construcción τε καί también puede verterse simplemente como «y».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la provincia romana de Asia en el occidente de Asia Menor, no el continente moderno.
    reason: cultural_note
lexical_decisions:
- source_word: Πάρθοι
  english_pob_choice: Parthians
  chosen_spanish: partos
  alternatives_spanish:
  - partianos
  lexicon: BDAG
  rationale: Es un etnónimo propio; en español la forma usual y transparente es «partos», que conserva el valor de nombre de pueblo sin paraphrasear.
- source_word: Μῆδοι
  english_pob_choice: Medes
  chosen_spanish: medos
  alternatives_spanish:
  - medas
  lexicon: BDAG
  rationale: Corresponde al gentilicio histórico en español; mantiene la serie de pueblos del texto griego.
- source_word: Ἐλαμῖται
  english_pob_choice: Elamites
  chosen_spanish: elamitas
  alternatives_spanish:
  - habitantes de Elam
  lexicon: BDAG
  rationale: La transliteración estable en español es «elamitas»; conserva el vínculo étnico/geográfico sin expandir el texto.
- source_word: οἱ κατοικοῦντες
  english_pob_choice: those living in
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los que viven en
  - los residentes de
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. «Los que habitan» preserva el sentido de residencia y suena natural en español formal.
- source_word: τὴν Μεσοποταμίαν
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - la Mesopotamia
  lexicon: BDAG
  rationale: Se conserva el nombre geográfico conocido. El artículo griego no exige reproducirse de modo rígido en español con nombres propios.
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - Judea
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español. Se mantiene como región, no como paráfrasis étnica o religiosa.
- source_word: τε καὶ
  english_pob_choice: also and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - así como
  lexicon: BDAG
  rationale: En esta lista, la combinación se traduce de forma natural con una simple coordinación. El valor aditivo se conserva por la estructura enumerativa, sin forzar un «también» innecesario.
- source_word: Καππαδοκίαν
  english_pob_choice: Cappadocia
  chosen_spanish: Capadocia
  alternatives_spanish:
  - Cappadocia
  lexicon: BDAG
  rationale: Forma usual en español del topónimo.
- source_word: Πόντον
  english_pob_choice: Pontus
  chosen_spanish: el Ponto
  alternatives_spanish:
  - Ponto
  lexicon: BDAG
  rationale: En español bíblico y geográfico, «el Ponto» es la forma natural para este nombre regional; se conserva el artículo como en el uso habitual del topónimo.
- source_word: τὴν Ἀσίαν
  english_pob_choice: Asia
  chosen_spanish: Asia
  alternatives_spanish:
  - la provincia de Asia
  lexicon: BDAG
  rationale: El griego alude a la provincia romana de Asia en Asia Menor, no al continente moderno. El texto principal mantiene el topónimo breve, con aclaración en nota.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que eliminó «also» tras Judea para reflejar mejor la coordinación natural de τε καί. Por eso el español usa una lista simple y fluida, sin añadir un equivalente innecesario a «también».
  spanish_consistency_notes:
  - Se mantuvo el orden de la enumeración del griego y del POB inglés.
  - Se prefirieron formas geográficas y étnicas usuales en español bíblico contemporáneo.
  - Se conservó «Asia» en el texto principal con nota aclaratoria sobre su referencia provincial.
  - La coordinación final se resolvió con puntuación española natural, sin duplicar conectores.
