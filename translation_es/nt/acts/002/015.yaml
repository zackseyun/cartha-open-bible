lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Ya que ... no
  lexicon: γάρ; οὐ
  rationale: γάρ introduce explicación o fundamentación del rechazo de Pedro; en español, «Porque» conserva bien esa relación argumentativa. «No» refleja la negación explícita de οὐ sin suavizarla.
- source_word: ὡς ὑμεῖς ὑπολαμβάνετε
  english_pob_choice: as you suppose
  chosen_spanish: como vosotros suponéis
  alternatives_spanish:
  - como pensáis
  - como imagináis
  lexicon: ὑπολαμβάνω
  rationale: ὑπολαμβάνετε expresa la suposición o inferencia de los oyentes; «suponéis» mantiene esa fuerza sin volverlo más fuerte de lo que el griego dice. Se conserva el plural directo de ὑμεῖς.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estas personas
  - estos hombres
  lexicon: οὗτος
  rationale: El demostrativo apunta al grupo acusado de embriaguez. «Estos» es la correspondencia más directa y no añade un sustantivo que el griego no explicita.
- source_word: μεθύουσιν
  english_pob_choice: are drunk
  chosen_spanish: están borrachos
  alternatives_spanish:
  - están ebrios
  - se han embriagado
  lexicon: μεθύω
  rationale: El verbo describe el estado de embriaguez atribuido a ellos. «Están borrachos» es natural en español y conserva la acusación sin atenuarla.
- source_word: ἔστιν γὰρ ὥρα τρίτη τῆς ἡμέρας
  english_pob_choice: for it is the third hour of the day
  chosen_spanish: pues es la tercera hora del día
  alternatives_spanish:
  - porque es la tercera hora del día
  - ya que es la tercera hora del día
  lexicon: ὥρα τρίτη; ἡμέρα
  rationale: Se conserva la expresión temporal judía «la tercera hora del día» en el texto principal, siguiendo el enfoque formal del registro auditado. «Pues» refleja el valor explicativo de γάρ y mantiene el flujo lógico del argumento.
theological_decisions:
- issue: Referente temporal judío sin convertirlo en hora moderna en el texto principal
  english_pob_reading: about nine in the morning by Jewish reckoning
  chosen_spanish_reading: la tercera hora del día, con nota explicativa
  alternative_spanish_readings:
  - las nueve de la mañana
  - aproximadamente las nueve de la mañana
  rationale: El griego conserva la medida temporal judía; traducirla directamente a una hora moderna en el cuerpo del texto borraría esa huella cultural. La nota explica el equivalente aproximado para el lector actual sin sustituir la expresión original.
  doctrine_reference: Hechos 2:15; uso judío de las horas diurnas
translation_notes:
  revision_awareness: La revisión inglesa cambió 'since' por 'for' para reflejar con más precisión γάρ y preservar el flujo argumentativo. La versión española sigue ese mismo ajuste con «pues», que mantiene la relación explicativa sin sonar forzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un registro claro y eclesial, evitando una paráfrasis explicativa dentro del versículo principal.
  - La nota se reserva para el equivalente cultural de la expresión horaria, siguiendo el antecedente del aparato inglés.
