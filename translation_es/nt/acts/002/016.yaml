translation:
  language: es
  text: Pero esto es lo que fue dicho[a] por medio del profeta Joel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por el profeta Joel”. El griego puede expresar agencia, pero “por medio de” preserva mejor el papel de Joel como instrumento profético del mensaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción adversativa introduce corrección del malentendido previo; 'Pero' es el equivalente natural y claro en español para este giro discursivo.
- source_word: τοῦτό
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este hecho
  lexicon: BDAG
  rationale: El demostrativo neutro se refiere al fenómeno presente. 'Esto' conserva la referencia inmediata sin añadir interpretación.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - significa
  - consiste en
  lexicon: BDAG
  rationale: Copulativo simple; en español no requiere ampliación interpretativa.
- source_word: τὸ εἰρημένον
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo hablado
  - lo que ha sido dicho
  lexicon: BDAG
  rationale: El participio pasivo sustantivado se rinde de forma natural con una pasiva impersonal. 'Lo que fue dicho' mantiene el sentido pasivo sin forzar un giro demasiado idiomático o demasiado libre.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - a través de
  lexicon: BDAG
  rationale: Con genitivo y agente humano, διά puede expresar mediación/instrumentalidad. 'Por medio de' preserva con claridad la función mediadora del profeta sin borrar la agencia divina implícita.
- source_word: τοῦ προφήτου
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de
  - el profeta Joel
  lexicon: BDAG
  rationale: Se conserva la designación del oficio profético, que en el contexto subraya a Joel como mediador del mensaje.
- source_word: Ἰωήλ
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio en español bíblico.
theological_decisions:
- issue: Mediación profética en διὰ τοῦ προφήτου Ἰωήλ
  english_pob_reading: through the prophet Joel
  chosen_spanish_reading: por medio del profeta Joel
  alternative_spanish_readings:
  - por el profeta Joel
  rationale: '''Por medio de'' mantiene la mediación del profeta como instrumento del mensaje, sin convertirlo en la fuente última. Esto sigue de cerca el valor de διά con genitivo y conserva la tensión teológica de habla profética mediada.'
  doctrine_reference: 'Principio de traducción POB: preservar el sentido llano del texto fuente sin imponer teorías de dictado ni diluir la mediación profética.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no registran revisiones aplicadas; la redacción española sigue esa lectura estable y conserva la misma decisión lexical sobre διά con genitivo.
  spanish_consistency_notes:
  - Se mantiene 'Joel' como transliteración estándar, en paralelo al inglés auditado.
  - Se evita 'SEÑOR' o formulación interpretativa no presente en este versículo.
  - '''Por medio de'' es consistente con el valor de mediación que el audit trail inglés preserva para διά.'
  - La pasiva impersonal 'lo que fue dicho' refleja el participio perfecto pasivo sin añadir matices no evidentes.
