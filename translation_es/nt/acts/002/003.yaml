translation:
  language: es
  text: Y se les aparecieron lenguas divididas[a], como de fuego, y se posó sobre cada uno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lenguas que se dividían, como de fuego» o «lenguas, como si fueran de fuego». El griego resalta tanto la apariencia visible como su distribución entre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθησαν
  english_pob_choice: appeared
  chosen_spanish: aparecieron
  alternatives_spanish:
  - fueron vistas
  - se hicieron visibles
  lexicon: BDAG
  rationale: 'El aoristo pasivo funciona aquí de modo intransitivo: algo se hizo visible a ellos. «Aparecieron» es natural en español y conserva la manifestación visible sin forzar una pasiva extraña.'
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: La referencia es a los destinatarios de la visión. En español, «ante ellos» comunica mejor la aparición visible del fenómeno, sin perder la idea de dirección hacia los discípulos.
- source_word: διαμεριζόμεναι
  english_pob_choice: being divided
  chosen_spanish: divididas
  alternatives_spanish:
  - siendo divididas
  - distribuidas
  lexicon: BDAG
  rationale: El participio femenino plural modifica a «lenguas». «Divididas» refleja el valor descriptivo del participio y evita una construcción pesada; conserva la idea de una distribución entre los presentes.
- source_word: γλῶσσαι
  english_pob_choice: tongues
  chosen_spanish: lenguas
  alternatives_spanish:
  - llamas
  - lenguas de fuego
  lexicon: BDAG
  rationale: En español, «lenguas» mantiene la imagen literal del sustantivo griego y su enlace con el tema del habla del contexto, sin adelantar una interpretación de «llamas» que estrecharía el campo semántico.
- source_word: ὡσεὶ πυρός
  english_pob_choice: like fire
  chosen_spanish: como de fuego
  alternatives_spanish:
  - como fuego
  - cual fuego
  lexicon: BDAG
  rationale: ὡσεὶ expresa comparación, no identidad. «Como de fuego» conserva la similitūd y sugiere el matiz visible de la semejanza sin convertir el signo en fuego literal.
- source_word: ἐκάθισεν
  english_pob_choice: it came to rest
  chosen_spanish: se posó
  alternatives_spanish:
  - reposó
  - se asentó
  lexicon: BDAG
  rationale: Aunque el verbo es singular, el sentido colectivo permite en español una imagen de asentarse sobre cada persona. «Se posó» comunica bien el movimiento de alight/rest upon y mantiene la vividez de la escena.
- source_word: ἐφ’ ἕνα ἕκαστον αὐτῶν
  english_pob_choice: on each one of them
  chosen_spanish: sobre cada uno de ellos
  alternatives_spanish:
  - en cada uno de ellos
  - sobre todos y cada uno de ellos
  lexicon: BDAG
  rationale: La expresión distribuye el fenómeno individualmente a cada persona. «Sobre cada uno de ellos» es claro, natural y conserva la fuerza distributiva.
theological_decisions:
- issue: Naturaleza de la manifestación de Pentecostés
  english_pob_reading: Render the phenomenon as 'tongues like fire' rather than literal fire or merely metaphorical speech.
  chosen_spanish_reading: Traducir el signo como «lenguas divididas, como de fuego», sin convertirlo en fuego literal ni reducirlo solo a lenguas humanas.
  alternative_spanish_readings:
  - llamas de fuego
  - lenguas como fuego
  - lenguas de lenguaje
  rationale: 'El griego une la imagen visible con la comparación ὡσεὶ y con γλῶσσαι. La traducción debe conservar esa tensión: no afirmar literalidad, pero tampoco vaciar el valor visual del signo ni anticipar demasiado su interpretación.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Esta redacción toma en cuenta la revisión más reciente del inglés POB, que ajustó el orden para reflejar mejor διαμεριζόμεναι como modificador de «tongues», prefirió una comparación más precisa para ὡσεὶ πυρός y entendió el verbo final en sentido distributivo sobre cada persona. La versión española procura mantener esa misma estructura y tensión semántica.
  spanish_consistency_notes:
  - Se usa «lenguas» y no «llamas» para conservar la relación con el vocabulario del pasaje.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; este versículo no contiene el nombre divino.
  - «Como de fuego» mantiene la comparación y no fuerza una identificación literal.
  - La colocación «sobre cada uno de ellos» preserva el reparto individual del signo.
