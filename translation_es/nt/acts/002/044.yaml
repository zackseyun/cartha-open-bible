translation:
  language: es
  text: Y todos los creyentes estaban juntos[a] y tenían todo en común.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reunidos» o «en el mismo lugar». La expresión griega puede denotar estar juntos o reunidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los creyentes
  lexicon: BDAG
  rationale: Mantiene el valor distributivo de πάντες y funciona naturalmente con el participio sustantivado que sigue.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Marca continuidad narrativa simple sin cargar el conector con contraste fuerte.
- source_word: οἱ πιστεύοντες
  english_pob_choice: the believers
  chosen_spanish: los creyentes
  alternatives_spanish:
  - los que creían
  - los que estaban creyendo
  lexicon: BDAG
  rationale: El participio presente sustantivado designa al grupo de los creyentes; 'los creyentes' es natural en español y conserva la referencia colectiva.
- source_word: ἦσαν ἐπὶ τὸ αὐτό
  english_pob_choice: were together
  chosen_spanish: estaban juntos
  alternatives_spanish:
  - estaban en el mismo lugar
  - estaban reunidos
  lexicon: BDAG
  rationale: La expresión idiomática puede indicar estar juntos o reunidos; 'estaban juntos' preserva la idea comunitaria sin especificar más de lo que el griego exige.
- source_word: εἶχον
  english_pob_choice: had
  chosen_spanish: tenían
  alternatives_spanish:
  - poseían
  - habían
  lexicon: BDAG
  rationale: El imperfecto se vierte de modo natural en pasado imperfectivo; 'tenían' conserva la continuidad de la acción.
- source_word: ἅπαντα κοινά
  english_pob_choice: all things in common
  chosen_spanish: todo en común
  alternatives_spanish:
  - todas las cosas en común
  - todo compartido
  lexicon: BDAG
  rationale: En español, 'todo en común' expresa con claridad la posesión compartida y evita una literalidad pesada, manteniendo el sentido del idioma griego.
theological_decisions:
- issue: Descripción de la vida comunitaria versus prescripción universal
  english_pob_reading: The verse reports that the believers shared their possessions in common, without explicitly commanding a universal economic system.
  chosen_spanish_reading: El versículo describe la vida de la comunidad creyente y su posesión compartida, sin convertirlo en una norma económica universal.
  alternative_spanish_readings:
  - Este versículo enseña un sistema económico obligatorio para toda la iglesia.
  - Este versículo prescribe la comunión de bienes como mandato general.
  rationale: El griego presenta un relato descriptivo de lo que hacían los creyentes. La traducción no debe convertir la descripción en mandato normativo ni resolver la tensión teológica que el texto deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la línea auditada en inglés; no se introducen revisiones textuales ni cambios de sentido respecto del consenso del pasaje.
  spanish_consistency_notes:
  - Se prefirió 'creyentes' para reflejar el participio sustantivado οἱ πιστεύοντες.
  - '''Estaban juntos'' sigue la decisión inglesa de no sobreespecificar el lugar, pero la nota preserva la alternativa espacial documentada.'
  - '''Todo en común'' conserva el valor idiomático y es compatible con el estilo bíblico en español sin caer en calco duro.'
