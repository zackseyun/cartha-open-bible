  text: προϊδὼν ἐλάλησεν περὶ τῆς ἀναστάσεως τοῦ χριστοῦ ὅτι ⸂οὔτε ἐγκατελείφθη⸃ εἰς ⸀ᾅδην ⸀οὔτε ἡ σὰρξ αὐτοῦ εἶδεν διαφθοράν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/031.yaml
  text: 'Foreseeing this[a], he spoke about the resurrection of the Messiah: that he was neither abandoned to Hades[d][c][b], nor did his flesh see decay.'
  footnotes:
  - marker: a
    text: Or 'he was not left in Hades.' The Greek phrase can be rendered with either 'to' or 'in' in English; the sense is that he was not abandoned to the realm of the dead.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christos'; here rendered 'Messiah' because the title sense is prominent in Peter's appeal to Scripture. Traditionally, 'Christ.'
    reason: alternative_reading
  - marker: c
    text: '''Hades'' refers to the realm of the dead, not specifically to the final place of judgment.'
    reason: cultural_note
  - marker: d
    text: Or 'see corruption.'
    reason: lexical_alternative
