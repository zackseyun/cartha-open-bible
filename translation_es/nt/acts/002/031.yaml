translation:
  language: es
  text: 'Habiendo previsto esto[a], habló acerca de la resurrección del Mesías[b]: que no fue abandonado al Hades[c], ni su carne[d] vio corrupción[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al prever esto». El participio griego expresa una anticipación previa respecto de lo que iba a ocurrir.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «Cristo». Aquí se traduce «Mesías» porque el título es central en el argumento escriturario de Pedro; tradicionalmente, «Cristo».'
    reason: alternative_reading
  - marker: c
    text: 'O: «en el Hades». El griego puede traducirse con valor direccional o locativo; el sentido es que no fue abandonado al ámbito de los muertos. «Hades» se refiere al reino de los muertos, no específicamente al lugar final de juicio.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «su cuerpo». Se conserva «carne» para mantener el paralelismo léxico con la cita y la referencia corporal concreta.'
    reason: lexical_alternative
  - marker: e
    text: 'O: «descomposición». La frase griega es idiomática y alude a la descomposición física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προϊδὼν
  english_pob_choice: Foreseeing this
  chosen_spanish: Previniendo esto
  alternatives_spanish:
  - Habiendo previsto esto
  - Viendo de antemano esto
  lexicon: BDAG
  rationale: El participio aoristo expresa una percepción previa respecto de lo que iba a suceder. En español, "Previniendo esto" mantiene la prioridad temporal y suena natural en una frase introductoria de discurso citado. "Esto" se añade por el contexto del versículo, como en el inglés auditado.
- source_word: ἐλάλησεν
  english_pob_choice: he spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se expresó
  lexicon: BDAG
  rationale: λαλέω enfatiza el acto de hablar más que el contenido puntual de "decir". "Habló" conserva el matiz formal de una cita escrituraria.
- source_word: περὶ τῆς ἀναστάσεως
  english_pob_choice: about the resurrection
  chosen_spanish: acerca de la resurrección
  alternatives_spanish:
  - sobre la resurrección
  - con respecto a la resurrección
  lexicon: BDAG
  rationale: περί con genitivo significa "acerca de/con respecto a". "Acerca de" es natural en español moderno y respeta la relación temática del texto.
- source_word: τοῦ χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como simple nombre propio. Siguiendo la pauta del proyecto, "Mesías" conserva el valor titular y la referencia al ungido prometido en las Escrituras.
- source_word: οὔτε ἐγκατελείφθη
  english_pob_choice: he was neither abandoned
  chosen_spanish: no fue abandonado
  alternatives_spanish:
  - no fue dejado
  - no fue desamparado
  lexicon: BDAG
  rationale: El pasivo de ἐγκαταλείπω puede significar "abandonar/dejar/forsake". "No fue abandonado" reproduce bien la fuerza del verbo y encaja con la construcción negativa coordinada.
- source_word: εἰς ᾅδην
  english_pob_choice: to Hades
  chosen_spanish: al Hades
  alternatives_spanish:
  - en Hades
  - al reino de los muertos
  lexicon: BDAG
  rationale: ᾅδης nombra el ámbito de los muertos. En español, "Hades" preserva el término griego; con el movimiento sugerido por εἰς, "al Hades" es la forma más directa y natural.
- source_word: ἡ σὰρξ αὐτοῦ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  lexicon: BDAG
  rationale: σάρξ se rinde normalmente como "carne" en contextos literales. Aunque "cuerpo" sería más explicativo, "carne" mantiene el enlace léxico con el salmo citado y la concreción corporal del enunciado.
- source_word: εἶδεν διαφθοράν
  english_pob_choice: did see decay
  chosen_spanish: vio corrupción
  alternatives_spanish:
  - vio decaimiento
  - sufrió corrupción
  lexicon: BDAG
  rationale: La expresión idiomática griega equivale literalmente a "ver corrupción/decadencia". Dado que el audit trail admite "corruption" y en español bíblico "corrupción" es claro y fiel, se mantiene ese sustantivo para respetar el eco escritural.
theological_decisions:
- issue: Rendering of Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El pasaje argumenta desde la Escritura sobre el ungido prometido; por eso conviene conservar el sentido titular de Χριστός. "Mesías" evita una forma ya lexicalizada como nombre propio y preserva la carga mesiánica del argumento de Pedro.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Rendering of ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el reino de los muertos
  - el lugar de los muertos
  rationale: La opción "Hades" mantiene precisión terminológica y evita confundir el texto con el juicio final. En un contexto de resurrección, el énfasis está en el dominio de los muertos, no en el castigo escatológico.
  doctrine_reference: 'DOCTRINE.md Contested terms: ᾅδης → Hades / realm of the dead'
- issue: Rendering of σάρξ
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  rationale: El contexto es corporal y literal, no ético ni metafórico. "Carne" conserva la fuerza del término original y el enlace con la cita del Salmo, donde el contraste es entre el cadáver y la corrupción.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical)'
translation_notes:
  revision_awareness: Basado en el texto griego SBLGNT y en el audit trail inglés de POB, con concordancia alta y sin cambios requeridos en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en sentido titular, conforme a la política terminológica del proyecto.
  - Se conserva «Hades» como préstamo transliterado para ᾅδης, evitando su equiparación con «infierno».
  - «Carne» se usa en sentido literal para σάρξ, no como equivalente de naturaleza pecaminosa.
  - La sintaxis española procura reflejar la estructura de una cita bíblica sin calco excesivo del inglés.
