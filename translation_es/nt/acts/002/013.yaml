translation:
  language: es
  text: 'Pero otros[b], burlándose, decían: «Están llenos de vino dulce».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «vino dulce» traduce con más precisión γλεῦκος; la traducción tradicional «vino nuevo» es posible, pero en español puede sugerir solo reciente elaboración y no la cualidad dulce del término griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - algunos otros
  - los demás
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado para referirse a otro grupo dentro de la multitud. «Otros» expresa con naturalidad esa distinción sin añadir matiz inexistente.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: El valor adversativo del contexto inmediato se conserva mejor con «Pero».
- source_word: διαχλευάζοντες
  english_pob_choice: mocking
  chosen_spanish: burlándose
  alternatives_spanish:
  - mofándose
  - ridiculizándolos
  - escarneciendo
  lexicon: BDAG
  rationale: El participio expresa burla despectiva. «Burlándose» es natural en español y mantiene el tono de desprecio sin exagerar el registro.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - iban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego indica habla en curso o repetida. En español, «decían» comunica ese valor de forma fluida y suficiente en este contexto.
- source_word: Γλεύκους
  english_pob_choice: sweet wine
  chosen_spanish: vino dulce
  alternatives_spanish:
  - vino nuevo
  - mosto dulce
  lexicon: BDAG
  rationale: γλεῦκος se refiere a vino dulce o mosto fermentado, no simplemente a vino reciente. «Vino dulce» conserva mejor la precisión léxica que la opción tradicional «vino nuevo».
- source_word: μεμεστωμένοι
  english_pob_choice: filled
  chosen_spanish: llenos
  alternatives_spanish:
  - colmados
  - llenos hasta rebosar
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe el estado resultante de estar lleno. En español, «llenos» reproduce de modo idiomático esa condición.
- source_word: εἰσίν
  english_pob_choice: are
  chosen_spanish: están
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: La cópula completa la construcción perifrástica. «Están» es la forma natural con un estado resultante en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y mantiene la fuerza despectiva y la progresión verbal del imperfecto. Se adoptó «vino dulce» por precisión léxica, en continuidad con el audit trail inglés que ya señaló la alternativa tradicional «new wine».
  spanish_consistency_notes:
  - Se mantuvo «otros» para ἕτεροι, como sustantivo colectivo natural en español.
  - Se evitó «Cristo», «SEÑOR» o terminología teológica no presente en el versículo.
  - La cita directa se abrió con dos puntos y comillas angulares españolas para reflejar el discurso directo del griego.
