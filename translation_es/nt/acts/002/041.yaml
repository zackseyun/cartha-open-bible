    issue: «en aquel día» es poco idiomático para la expresión temporal
    rationale: Aunque refleja de cerca ἐν τῇ ἡμέρᾳ ἐκείνῃ, en español natural se diría «ese día» o «aquel día». «En aquel día» suena más a calco que a español claro y digno.
  - severity: low
    issue: El enlace inicial «Así que» puede sonar algo coloquial
    rationale: No es incorrecto, pero en registro bíblico moderno-digno «Así pues» encaja mejor con οἱ μὲν οὖν y con la fluidez del pasaje.
  - severity: low
    issue: El orden final puede mejorarse para fluidez
    rationale: «Y ese día fueron añadidas como tres mil almas» suena más natural que dejar el complemento temporal al final con «en aquel día», y sigue fiel al griego y al POB.
  revised_spanish_text: Así pues, los que recibieron su palabra fueron bautizados[a], y ese día fueron añadidas como tres mil almas.
