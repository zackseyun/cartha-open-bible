revisions:
- from: Así que los que recibieron su palabra fueron bautizados[a], y como tres mil almas fueron añadidas en aquel día.
  to: Así pues, los que recibieron su palabra fueron bautizados[a], y ese día fueron añadidas como tres mil almas.
  rationale: Se ajusta la expresión temporal a un español más natural («ese día») y se mejora ligeramente el conector discursivo («Así pues») y el orden sintáctico, sin cambiar ninguna decisión léxica o teológica del original ni del POB inglés. Se conserva «almas» con su nota, y se mantiene implícito el objeto de «fueron añadidas».
