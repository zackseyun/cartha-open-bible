translation:
  language: es
  text: Así pues, los que recibieron su palabra fueron bautizados[a], y ese día fueron añadidas como tres mil almas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» o «gente». El griego «almas» es una manera común de contar seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν οὖν
  english_pob_choice: So those who
  chosen_spanish: Así que los que
  alternatives_spanish:
  - Entonces los que
  - Por tanto, los que
  lexicon: BDAG
  rationale: La combinación de partículas introduce continuidad narrativa e inferencia. «Así que» comunica ese avance con naturalidad en español sin endurecer el tono ni añadir una conclusión más fuerte que la del griego.
- source_word: ἀποδεξάμενοι
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - acogieron
  lexicon: BDAG
  rationale: El participio expresa una recepción positiva del mensaje. «Recibieron» conserva amplitud semántica y resulta idiomático en español, sin cargar demasiado hacia una adhesión más interpretativa como «aceptaron».
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - palabra hablada
  lexicon: BDAG
  rationale: En este contexto λόγος se refiere a la proclamación de Pedro. «Palabra» mantiene la cercanía al original y funciona bien en español bíblico contemporáneo.
- source_word: ἐβαπτίσθησαν
  english_pob_choice: were baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - se bautizaron
  lexicon: BDAG
  rationale: El pasivo aoristo se refleja con una pasiva española directa. «Fueron bautizados» preserva el hecho sin introducir precisión denominacional sobre modo o eficacia.
- source_word: προσετέθησαν
  english_pob_choice: were added
  chosen_spanish: fueron añadidas
  alternatives_spanish:
  - fueron agregadas
  - fueron incorporadas
  lexicon: BDAG
  rationale: La pasiva indica incorporación a un grupo creciente. «Fueron añadidas» reproduce con fidelidad el verbo y evita especificar un objeto que el griego no expresa explícitamente aquí.
- source_word: ψυχαὶ
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - personas
  - gente
  lexicon: BDAG
  rationale: ψυχή puede significar personas o vidas, pero «almas» conserva la forma más transparente respecto del griego. La nota mantiene disponibles los sentidos idiomáticos sin resolver indebidamente la carga antropológica.
- source_word: ὡσεὶ τρισχίλιαι
  english_pob_choice: about three thousand
  chosen_spanish: como tres mil
  alternatives_spanish:
  - aproximadamente tres mil
  - unos tres mil
  lexicon: BDAG
  rationale: ὡσεὶ indica aproximación. «Como tres mil» es una forma natural y fiel en español; mantiene el matiz no exacto sin sobreexplicarlo.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: BDAG
  rationale: La construcción temporal se conserva de forma directa. «En aquel día» suena natural en español bíblico y refleja bien la referencia puntual del griego.
theological_decisions:
- issue: Objeto implícito de 'were added'
  english_pob_reading: Left implicit as 'were added'
  chosen_spanish_reading: Se dejó implícito como «fueron añadidas»
  alternative_spanish_readings:
  - fueron añadidas a ellos
  - fueron añadidas a la iglesia
  - fueron incorporadas a la comunidad
  rationale: El griego no expresa el objeto de la pasiva. Aunque el contexto sugiere la comunidad de creyentes, la traducción conserva la falta de explicitud para no ampliar el alcance eclesiológico más allá del versículo.
  doctrine_reference: 'Hechos 2:41; filosofía de traducción: transparencia y contención inferencial'
- issue: Alcance antropológico de ψυχαί
  english_pob_reading: Rendered 'souls' in the main text with footnote preserving 'persons/people'
  chosen_spanish_reading: «Almas» en el texto principal, con nota para «personas/gente»
  alternative_spanish_readings:
  - personas
  - gente
  rationale: El griego usa ψυχαί, y «almas» es la equivalencia formal más transparente. La nota evita que el lector imponga una lectura técnica de sustancia inmaterial cuando el uso idiomático aquí es contar seres humanos.
  doctrine_reference: 'Hechos 2:41; BDAG ψυχή; filosofía de traducción: equivalencia formal controlada'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión inglesa: se mantiene la progresión narrativa, la pasiva de «bautizados» y «añadidas», la aproximación numérica y la ambigüedad controlada de ψυχαί. No se introdujeron ampliaciones eclesiológicas ni ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se eligió «palabra» para λόγος, coherente con el uso del POB en contextos apostólicos.
  - La nota sobre «almas» preserva la alternativa semántica sin desplazar el texto principal a una paráfrasis.
  - La pasiva española evita añadir un agente no expresado en el griego.
  - «Así que» y «en aquel día» mantienen un registro bíblico claro, pero en español moderno.
