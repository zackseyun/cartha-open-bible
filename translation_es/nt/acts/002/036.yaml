base_translation:
  language: en
  yaml_path: translation/nt/acts/002/036.yaml
  text: Therefore let all the house of Israel know for certain that God has made him both Lord and Messiah—this Jesus whom you crucified[a][b].
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos), here rendered 'Messiah' to preserve its title sense in Peter's address to Israel.
    reason: alternative_reading
  - marker: b
    text: '''Has made him both Lord and Messiah'' speaks of God''s exaltation and public installation of Jesus in these roles, not of a change in his divine nature.'
    reason: lexical_alternative
