translation:
  language: es
  text: Por tanto, sepa con certeza toda la casa de Israel que Dios ha hecho Señor y Mesías[a][b] a este Jesús, a quien ustedes crucificaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». El título griego es Χριστός (Christós), aquí vertido como «Mesías» para conservar su sentido titular en el discurso de Pedro a Israel.
    reason: alternative_reading
  - marker: b
    text: «Ha hecho Señor y Mesías» habla de la exaltación e instalación pública de Jesús en esos roles, no de un cambio en su naturaleza divina.
    reason: theological_note
lexical_decisions:
- source_word: ἀσφαλῶς
  english_pob_choice: for certain
  chosen_spanish: con certeza
  alternatives_spanish:
  - ciertamente
  - sin duda
  - con toda certeza
  lexicon: BDAG
  rationale: El adverbio refuerza la seguridad de la exhortación. «Con certeza» suena natural en español moderno y conserva la fuerza enfática sin volverlo redundante.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca consecuencia lógica del argumento anterior. «Por tanto» preserva bien el enlace inferencial con un registro bíblico claro.
- source_word: γινωσκέτω
  english_pob_choice: let ... know
  chosen_spanish: sepa
  alternatives_spanish:
  - debe saber
  - deje saber
  lexicon: BDAG
  rationale: El imperativo de tercera persona funciona como exhortación colectiva. «Sepa» transmite esa fuerza sin forzar una perífrasis poco natural en español.
- source_word: πᾶς οἶκος Ἰσραήλ
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo el pueblo de Israel
  - todo Israel
  lexicon: BDAG
  rationale: La expresión conserva el idiomatismo bíblico y su alcance corporativo. «Casa de Israel» mantiene la fórmula del original, y «toda» reproduce πᾶς.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente estándar y adecuado para κύριος en este contexto exaltado; «amo» o «maestro» debilitarían el peso cristológico.
- source_word: χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí el título tiene sentido mesiánico dirigido a Israel, por lo que «Mesías» preserva mejor la función titular que la forma litúrgica «Cristo».
- source_word: ἐποίησεν
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha constituido
  - ha designado
  lexicon: BDAG
  rationale: El aoristo se vierte de modo natural con presente perfecto en español. «Ha hecho» mantiene la fuerza lexical de ποιέω sin sustituirla por una glosa interpretativa.
- source_word: τοῦτον τὸν Ἰησοῦν
  english_pob_choice: this Jesus
  chosen_spanish: a este Jesús
  alternatives_spanish:
  - este Jesús
  - a este mismo Jesús
  lexicon: BDAG
  rationale: El demostrativo es enfático y apunta al Jesús histórico ya mencionado; el clítico de objeto directo en español hace más natural la sintaxis con «ha hecho».
- source_word: ὃν ὑμεῖς ἐσταυρώσατε
  english_pob_choice: whom you crucified
  chosen_spanish: a quien ustedes crucificaron
  alternatives_spanish:
  - a quien ustedes clavaron en la cruz
  - a quien ustedes crucificaron en la cruz
  lexicon: BDAG
  rationale: La relativa debe conservar el señalamiento directo y la acusación del discurso de Pedro. «Crucificaron» es fiel e idiomático; «ustedes» mantiene el énfasis del pronombre griego.
theological_decisions:
- issue: Sentido de «Dios le ha hecho Señor y Mesías»
  english_pob_reading: God's exaltation and public installation of Jesus in these roles, not a change in his divine nature.
  chosen_spanish_reading: La frase se entiende como exaltación e investidura pública de Jesús en esos roles, no como un cambio en su naturaleza divina.
  alternative_spanish_readings:
  - Dios lo convirtió en Señor y Mesías
  - Dios lo hizo Señor y Mesías en esencia
  rationale: La traducción conserva «ha hecho/ha hecho Señor y Mesías» sin suavizar el verbo, pero la nota aclara que el contexto habla de entronización y declaración pública, no de adopción ni cambio ontológico.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Rendición de Χριστός como título
  english_pob_reading: '''Messiah'' to preserve its title sense in Peter''s address to Israel.'
  chosen_spanish_reading: «Mesías» se usa como título, especialmente apropiado en el discurso de Pedro a Israel.
  alternative_spanish_readings:
  - Cristo
  - ungido
  rationale: En español, «Mesías» comunica mejor el valor titular y el trasfondo judío del pasaje; «Cristo» puede sonar más como nombre fijo eclesial que como título en este contexto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo textual con revisiones previas; la lectura final mantiene el valor de ἐποίησεν como «ha hecho» y la distinción titularde Χριστός como «Mesías», con aclaración teológica en nota para evitar una lectura adopcionista.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Señor» se conserva para κύριος por su peso cristológico; no se reemplaza por un término más débil.
  - La sintaxis española ajusta el orden para sonar natural sin perder el énfasis del original griego.
  - La acusación directa de «ustedes crucificaron» se mantiene para reflejar el pronombre enfático ὑμεῖς.
