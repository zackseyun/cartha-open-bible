translation:
  language: es
  text: 'Y con muchas otras palabras daba testimonio solemnemente y seguía exhortándolos[a], diciendo: «Sean salvados de esta generación torcida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sálvense de esta generación torcida». El verbo griego está en pasivo («sean salvados»), pero algunas traducciones lo vuelven más activo para reflejar la respuesta que se espera de los oyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑτέροις τε λόγοις πλείοσιν
  english_pob_choice: with many other words
  chosen_spanish: con muchas otras palabras
  alternatives_spanish:
  - con muchas más palabras
  - con otras, más numerosas palabras
  lexicon: BDAG
  rationale: La frase dativa funciona de manera instrumental/associativa, introduciendo la manera y el contenido de la exhortación continua. En español, «con muchas otras palabras» conserva el valor de «otras» y de la abundancia expresada por πλείοσιν, con naturalidad idiomática.
- source_word: διεμαρτύρατο
  english_pob_choice: he solemnly testified
  chosen_spanish: daba solemne testimonio
  alternatives_spanish:
  - testificaba solemnemente
  - daba un testimonio solemne
  - atestiguaba con solemnidad
  lexicon: BDAG
  rationale: διαμαρτύρομαι expresa testimonio enfático o solemne. «Daba solemne testimonio» conserva ese peso formal en español sin reducirlo a un simple «testificaba» ni convertirlo indebidamente en una mera advertencia.
- source_word: παρεκάλει
  english_pob_choice: kept urging
  chosen_spanish: los seguía exhortando
  alternatives_spanish:
  - los exhortaba continuamente
  - insistía con ellos
  - los animaba a seguir
  lexicon: BDAG
  rationale: El imperfecto comunica acción continua o repetida. «Los seguía exhortando» preserva esa duratividad y el sentido exhortativo de παρακαλέω en un español natural y claro.
- source_word: Σώθητε
  english_pob_choice: Be saved
  chosen_spanish: Sean salvos
  alternatives_spanish:
  - Salvense ustedes mismos
  - Sean rescatados
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo de σῴζω se refleja mejor con una pasiva en español. «Sean salvos» preserva la voz pasiva y mantiene la tensión teológica entre la llamada real a responder y la forma gramatical del griego.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - lejos de
  lexicon: BDAG
  rationale: El valor separativo se expresa de manera natural en español con «de» en este contexto exhortativo.
- source_word: γενεᾶς
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - edad
  lexicon: BDAG
  rationale: «Generación» conserva el campo semántico y el eco bíblico del término, sin paraphrasear hacia «gente» o «edad».
- source_word: σκολιᾶς
  english_pob_choice: crooked
  chosen_spanish: torcida
  alternatives_spanish:
  - perversa
  - retorcida
  lexicon: BDAG
  rationale: «Torcida» reproduce la imagen moral directa de σκολιός en un español contemporáneo y fiel, equivalente al inglés POB «crooked».
theological_decisions:
- issue: Voz y agencia en Σώθητε
  english_pob_reading: Be saved
  chosen_spanish_reading: Sean salvos
  alternative_spanish_readings:
  - Sálvense
  - Sean rescatados
  rationale: Se preserva la forma pasiva del griego para no convertir la frase en una afirmación de autosalvación. A la vez, el imperativo mantiene la fuerza de la llamada real a responder.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y mantiene las decisiones auditadas del POB en cuanto a la fuerza de διαμαρτύρομαι, el imperfecto de παρεκάλει y la pasiva de Σώθητε. Se ha ajustado el español para que suene natural y publicable sin perder la tensión lexical y teológica documentada.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en el proyecto; este versículo no contiene esos términos.
  - «Sean salvos» preserva la pasiva griega; la nota ofrece la alternativa activa ya documentada por el POB en inglés.
  - «Generación torcida» mantiene el paralelismo con el inglés auditado «crooked generation» y evita suavizar el juicio moral.
