translation:
  language: es
  text: Frigia y Panfilia, Egipto y las regiones de Libia hacia Cirene[a], y los romanos visitantes[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las regiones de Libia alrededor de Cirene».
    reason: lexical_alternative
  - marker: b
    text: O «los romanos que estaban allí temporalmente» o «romanos de visita».
    reason: lexical_alternative
lexical_decisions:
- source_word: Φρυγίαν
  english_pob_choice: Phrygia
  chosen_spanish: Frigia
  alternatives_spanish:
  - Frygia
  lexicon: BDAG
  rationale: Es un nombre geográfico propio; en español bíblico estándar se adapta como «Frigia», que comunica naturalmente el topónimo sin añadir interpretación.
- source_word: τε καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - tanto ... como
  - y también
  lexicon: BDAG
  rationale: En una enumeración geográfica, «y» reproduce con naturalidad la simple conexión coordinante del griego sin sobrecargar el ritmo.
- source_word: Παμφυλίαν
  english_pob_choice: Pamphylia
  chosen_spanish: Panfilia
  alternatives_spanish:
  - Pamfilia
  lexicon: BDAG
  rationale: Topónimo propio; «Panfilia» es la forma usual y clara en español, fiel a la transliteración del nombre griego.
- source_word: Αἴγυπτον
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: BDAG
  rationale: Nombre propio convencional en español.
- source_word: τὰ μέρη
  english_pob_choice: the parts
  chosen_spanish: las regiones
  alternatives_spanish:
  - las partes
  - los distritos
  lexicon: BDAG
  rationale: «Regiones» preserva el sentido territorial de μέρη en un español natural. «Las partes» sería más literal, pero suena poco idiomático en esta lista geográfica.
- source_word: τῆς Λιβύης
  english_pob_choice: of Libya
  chosen_spanish: de Libia
  lexicon: BDAG
  rationale: Genitivo de pertenencia; se mantiene de forma directa como «de Libia».
- source_word: τῆς κατὰ Κυρήνην
  english_pob_choice: toward Cyrene
  chosen_spanish: cerca de Cirene
  alternatives_spanish:
  - alrededor de Cirene
  - hacia Cirene
  - en la zona de Cirene
  lexicon: BDAG
  rationale: La expresión κατά con topónimo señala la zona vinculada a Cirene. «Cerca de Cirene» es breve y natural en español, sin fijar con excesiva precisión una delimitación política que el griego no explicita.
- source_word: οἱ ἐπιδημοῦντες
  english_pob_choice: the visiting
  chosen_spanish: los romanos visitantes
  alternatives_spanish:
  - los que estaban allí temporalmente
  - los romanos que se hallaban de visita
  - los romanos residentes temporalmente
  lexicon: BDAG
  rationale: El participio expresa presencia temporal o visita; «visitantes» conserva esa idea sin convertirla en residencia permanente. Se antepone al sustantivo «romanos» para mantener la referencia grupal del original.
- source_word: Ῥωμαῖοι
  english_pob_choice: Romans
  chosen_spanish: romanos
  alternatives_spanish:
  - Romanos
  lexicon: BDAG
  rationale: Adjetivo sustantivado étnico/geográfico; en español se traduce naturalmente como «romanos».
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés fueron revisados como una lista geográfica con dos expresiones potencialmente ambiguas: τὰ μέρη τῆς Λιβύης τῆς κατὰ Κυρήνην y οἱ ἐπιδημοῦντες Ῥωμαῖοι. La versión española sigue la lectura inglesa principal, pero mantiene las alternativas relevantes en notas para transparentar la ambigüedad territorial y la idea de presencia temporal. No se detectaron cambios textuales posteriores que alteren la decisión.'
  spanish_consistency_notes:
  - Se usa «Panfilia» y no «Pamfilia» por ser la forma más asentada en español.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita que lo requiera.
  - Se conserva el orden de la enumeración geográfica del griego y se mantiene el cierre con coma, conforme al estilo de lista del pasaje.
