translation:
  language: es
  text: ¿Y cómo es que cada uno de nosotros oye en nuestra propia lengua[a], en la que nacimos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en nuestro propio dialecto, en el que nacimos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: how is it that
  chosen_spanish: ¿y cómo es que... ?
  alternatives_spanish:
  - ¿cómo...?
  - ¿cómo puede ser que...?
  lexicon: BDAG
  rationale: La expresión griega introduce una pregunta de asombro. En español, «¿y cómo es que…?» conserva ese matiz idiomático con naturalidad y sin endurecer la frase.
- source_word: ἡμεῖς
  english_pob_choice: us
  chosen_spanish: nosotros / de nosotros
  alternatives_spanish:
  - nosotros
  - a nosotros
  lexicon: BDAG
  rationale: 'Aunque el pronombre es nominativo en griego, en español la construcción distributiva exige un giro natural: «cada uno de nosotros». Así se mantiene el énfasis inclusivo del sujeto.'
- source_word: ἀκούομεν
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - oímos
  - escucha
  lexicon: BDAG
  rationale: El inglés POB hizo singularidad distributiva con «each of us hears». En español, «cada uno de nosotros oye» refleja mejor el valor distributivo de ἕκαστος sin forzar la sintaxis.
- source_word: ἕκαστος
  english_pob_choice: each of us
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - cada uno
  - todo uno de nosotros
  lexicon: BDAG
  rationale: ἕκαστος marca a cada persona individualmente. La forma elegida conserva ese valor distributivo y suena idiomática en español.
- source_word: τῇ ἰδίᾳ διαλέκτῳ ἡμῶν
  english_pob_choice: in our own native language
  chosen_spanish: en su propia lengua
  alternatives_spanish:
  - en nuestro propio dialecto
  - en nuestro propio idioma
  lexicon: BDAG
  rationale: διάλεκτος puede significar «lengua/idioma» o «dialecto». Dado el contexto explicativo de «en la que nacimos», «lengua» comunica bien el sentido para el lector moderno sin sobrecargarlo con tecnicismos; «su propia» mantiene el posesivo distributivo de ἰδίᾳ.
- source_word: διαλέκτῳ
  english_pob_choice: language
  chosen_spanish: lengua
  alternatives_spanish:
  - idioma
  - dialecto
  lexicon: BDAG
  rationale: «Lengua» es una opción bíblica y comprensible en español para el campo semántico de διάλεκτος. Evita la posible estrechez sociolingüística de «dialecto» y conserva el contraste de lenguas en el contexto de Pentecostés.
- source_word: ἐν ᾗ ἐγεννήθημεν
  english_pob_choice: native
  chosen_spanish: en la que nacimos
  alternatives_spanish:
  - en la cual nacimos
  - en que nacimos
  lexicon: BDAG
  rationale: La cláusula relativa especifica la lengua asociada con el nacimiento. Traducirla explícitamente como «en la que nacimos» preserva el contenido de la fuente griega sin convertirlo en un adjetivo más abstracto como «nativa».
translation_notes:
  revision_awareness: El texto inglés POB mantiene una equivalencia óptima con «native language» y deja en nota la alternativa «dialect». En español se optó por «lengua» en el cuerpo del texto y se explicitó la cláusula relativa «en la que nacimos» para no perder el matiz de origen señalado por el griego y por la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo y claro, evitando «dialecto» en el texto principal porque en español puede sonar demasiado técnico o restringido.
  - Se preservó el efecto distributivo de ἕκαστος mediante «cada uno de nosotros», en armonía con la lectura inglesa auditada.
  - No se introdujeron términos eclesiásticos tradicionales que el griego no exige.
