revisions:
- from: Ahora había judíos que habitaban en Jerusalén, hombres piadosos[a] de toda nación bajo el cielo[b].
  to: En Jerusalén vivían judíos[a], hombres devotos, de toda nación bajo el cielo[b].
  rationale: La revisión mejora la naturalidad del español narrativo, mantiene con mayor claridad la fuerza de residencia de κατοικοῦντες con «vivían», alinea εὐλαβεῖς con «devotos», y añade la nota necesaria sobre «judíos/judeanos» que el rastro de auditoría inglés considera significativa. Se conserva «bajo el cielo» con nota por fidelidad al modismo bíblico.
