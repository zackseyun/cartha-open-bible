translation:
  language: es
  text: En Jerusalén vivían judíos[a], hombres devotos, de toda nación bajo el cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeanos» por «judíos»; aquí el contexto favorece el sentido étnico-religioso más amplio, porque se dice que eran de toda nación bajo el cielo.
    reason: alternative_reading
  - marker: b
    text: Expresión bíblica idiomática que significa por toda la tierra o por todo el mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  english_pob_choice: Now there were
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Ahora había
  lexicon: BDAG
  rationale: δέ aquí solo conecta y avanza la narración; en español, «Ahora había» transmite ese inicio discursivo sin sobrecargar con contraste.
- source_word: ἐν Ἰερουσαλὴμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: BDAG
  rationale: Es una frase locativa directa; se mantiene el nombre propio usual en español.
- source_word: κατοικοῦντες
  english_pob_choice: living
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - residían
  lexicon: BDAG
  rationale: El participio expresa residencia continua. «Habitaban» conserva mejor ese valor durativo que una fórmula puntual como «estaban de paso».
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En este contexto, por venir «de toda nación bajo el cielo», el sentido más natural es el étnico-religioso amplio. «Judeanos» es posible, pero aquí sería demasiado estrecho.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: BDAG
  rationale: El sustantivo es masculino y no genérico. «Hombres» preserva la referencia masculina explícita del griego.
- source_word: εὐλαβεῖς
  english_pob_choice: devout
  chosen_spanish: piadosos
  alternatives_spanish:
  - devotos
  - reverentes
  lexicon: BDAG
  rationale: El término expresa reverencia y piedad hacia Dios. En español, «piadosos» suena natural y mantiene ese matiz religioso.
- source_word: ἀπὸ παντὸς ἔθνους
  english_pob_choice: from every nation
  chosen_spanish: de toda nación
  alternatives_spanish:
  - de cada nación
  - de todas las naciones
  lexicon: BDAG
  rationale: El singular colectivo «nación» reproduce bien el griego y encaja con el giro idiomático del versículo.
- source_word: τῶν ὑπὸ τὸν οὐρανόν
  english_pob_choice: under heaven
  chosen_spanish: bajo el cielo
  alternatives_spanish:
  - debajo del cielo
  - en toda la tierra
  lexicon: BDAG
  rationale: Se conserva la imagen idiomática con una equivalencia natural en español. «Bajo el cielo» es la forma más cercana al griego; aquí «bajo el cielo» se mantiene como expresión bíblica reconocible.
theological_decisions:
- issue: Sentido de Ἰουδαῖοι en el contexto de Pentecostés
  english_pob_reading: Jews
  chosen_spanish_reading: judíos
  alternative_spanish_readings:
  - judeanos
  rationale: El contexto de personas reunidas en Jerusalén procedentes de múltiples regiones favorece el sentido étnico-religioso amplio, no solo el geográfico. Por eso se traduce «judíos».
  doctrine_reference: Translation philosophy §1, §5
- issue: Sexo gramatical de ἄνδρες
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  rationale: El griego usa un masculino explícito. Para no neutralizarlo indebidamente, se conserva con «hombres».
  doctrine_reference: Translation philosophy §4
- issue: Expresión idiomática «ὑπὸ τὸν οὐρανόν»
  english_pob_reading: under heaven
  chosen_spanish_reading: bajo el cielo
  alternative_spanish_readings:
  - en todo el mundo
  - sobre la tierra
  rationale: La frase es un modismo bíblico que significa extensión universal o general. «Bajo el cielo» preserva la imagen original sin perder inteligibilidad; el contexto comunica la amplitud mundial.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir un orden natural en español equivalente a «Now there were Jews living in Jerusalem...». También conserva la amplitud de «Jews» frente a «Judeans» y mantiene el valor idiomático de «under heaven» sin convertirlo en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαῖοι, en línea con el criterio contextual del POB en este versículo.
  - Se conserva el masculino explícito «hombres» para ἄνδρες, sin neutralización.
  - «Bajo el cielo» conserva el idiomatismo bíblico y permite una nota aclaratoria sin sustituir el texto principal por una paráfrasis.
