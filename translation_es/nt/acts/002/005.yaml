review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: presencia de judíos en Jerusalén, carácter devoto, y procedencia universal. También mantiene correctamente «judíos» frente a «judeanos» y «hombres» frente a una neutralización. Sin embargo, omite la alternativa contextual importante documentada en el inglés para Ἰουδαῖοι y la construcción «que habitaban en Jerusalén» suena algo menos natural que «que vivían en Jerusalén» en este contexto narrativo.'
  spanish_quality_summary: El español es claro y digno, pero «Ahora había» resulta algo tieso en narrativa bíblica; «En Jerusalén vivían» fluye mejor y evita un arranque poco idiomático. «Piadosos» es aceptable, pero «devotos» se alinea mejor con el inglés POB y con εὐλαβεῖς en este pasaje. «Bajo el cielo» es comprensible, aunque «bajo el cielo» en español puede sonar más físico que idiomático; la nota lo aclara adecuadamente.
  glossary_alignment: No hay términos del glosario maestro en tensión aquí salvo la decisión contextual sobre Ἰουδαῖοι, que está bien resuelta como «judíos». Conviene añadir la nota alternativa «judeanos», porque el rastro de auditoría inglés la conserva. No hay conflicto con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: Falta la nota alternativa para «judíos» / «judeanos».
    rationale: El inglés POB conserva explícitamente esta alternativa por sensibilidad léxica-contextual de Ἰουδαῖοι. El español debe preservar esa información auditada.
  - severity: low
    issue: «Ahora había» es menos natural que una reestructuración narrativa en español.
    rationale: Aunque no es incorrecto, suena calcado del inglés. El griego permite una formulación más natural en español sin pérdida de sentido.
  - severity: low
    issue: «Habitaban» es correcto pero menos idiomático aquí que «vivían».
    rationale: La revisión inglesa ya prefirió «living» por naturalidad. En español, «vivían en Jerusalén» suena más fluido y mantiene el valor de residencia.
  - severity: low
    issue: La nota de «piadosos» no refleja la elección principal del inglés «devout».
    rationale: «Piadosos» puede quedarse corto o sonar algo eclesiástico-tradicional; «devotos» comunica bien reverencia religiosa en español moderno y se alinea mejor con la auditoría.
  revised_spanish_text: En Jerusalén vivían judíos[a], hombres devotos, de toda nación bajo el cielo[b].
