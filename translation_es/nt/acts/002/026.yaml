translation:
  language: es
  text: Por esto se alegró mi corazón, y se regocijó mi lengua; además, aun mi carne[a] habitará en esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi cuerpo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Porque de esto
  - Por esta razón
  - Por lo cual
  lexicon: BDAG
  rationale: La expresión causal se conserva de forma natural en español con 'Por esto'. Mantiene la relación de causa o base sin volverla más inferencial que el griego.
- source_word: ηὐφράνθη
  english_pob_choice: was glad
  chosen_spanish: se alegró
  alternatives_spanish:
  - se gozó
  - fue alegrado
  lexicon: BDAG
  rationale: El aoristo pasivo funciona idiomáticamente como estado o experiencia del sujeto. 'Se alegró' suena natural en español y preserva el tono del paralelismo.
- source_word: ἡ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi alma
  - mi interior
  lexicon: BDAG
  rationale: '''Corazón'' conserva el antropologismo bíblico del ser interior sin reinterpretarlo psicológicamente.'
- source_word: ἠγαλλιάσατο
  english_pob_choice: rejoiced
  chosen_spanish: se regocijó
  alternatives_spanish:
  - exultó
  - se alegró mucho
  lexicon: BDAG
  rationale: El verbo expresa gozo exuberante. 'Se regocijó' preserva mejor esa intensidad que un simple 'se alegró'.
- source_word: ἡ γλῶσσά μου
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi boca
  lexicon: BDAG
  rationale: Se mantiene el término literal 'lengua', que en este contexto poético funciona como órgano de alabanza hablada.
- source_word: ἔτι δὲ καὶ
  english_pob_choice: moreover, even
  chosen_spanish: además, aun
  alternatives_spanish:
  - y además
  - más aún, incluso
  lexicon: BDAG
  rationale: '''Además, aun'' reproduce la acumulación y el énfasis del griego con naturalidad en español.'
- source_word: ἡ σάρξ μου
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: BDAG
  rationale: Se conserva 'carne' por fidelidad lexical y porque el contexto es literal/antropológico, no ético. 'Cuerpo' queda como alternativa interpretativa, pero menos precisa para la terminología del texto.
- source_word: κατασκηνώσει
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - reposará
  - acampará
  lexicon: BDAG
  rationale: '''Habitará'' transmite la idea de morar con seguridad y resulta idiomático en español. Evita reducir la metáfora a ''descansará'' y conserva mejor el valor de permanencia.'
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con esperanza
  - sobre esperanza
  lexicon: BDAG
  rationale: La construcción se vierte con una preposición natural en español y preserva la esfera o base de la confianza sin añadir explicaciones interpretativas.
theological_decisions:
- issue: σάρξ en una cita de resurrección
  english_pob_reading: my flesh
  chosen_spanish_reading: mi carne
  alternative_spanish_readings:
  - mi cuerpo
  rationale: Se mantiene el término literal para no borrar la tensión entre la fragilidad corporal y la esperanza que el contexto posterior aplica a la resurrección. 'Cuerpo' sería comprensible, pero atenúa la fuerza del vocablo griego.
  doctrine_reference: 'DOCTRINE.md: contested terms — σάρξ (''flesh'' literal / ''sinful nature'' metaphorical)'
- issue: κατασκηνώσει ἐπ’ ἐλπίδι como imagen de permanencia confiada
  english_pob_reading: will dwell in hope
  chosen_spanish_reading: habitará en esperanza
  alternative_spanish_readings:
  - reposará en esperanza
  - morará en esperanza
  rationale: '''Habitará'' conserva la imagen de morar/dwelling y no la reduce a una mera emoción. La formulación deja intacta la tensión poética del versículo y no fuerza explícitamente la interpretación cristológica en la frase misma.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
