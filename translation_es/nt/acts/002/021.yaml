translation:
  language: es
  text: Y sucederá que todo el que invoque el nombre del Señor[a] será salvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien invoque el nombre del Señor». La frase remite a Joel 2:32, donde «el Señor» se refiere a Yahvé; en Hechos, Pedro aplica la cita dentro de su proclamación sobre Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσται
  english_pob_choice: it shall be
  chosen_spanish: sucederá
  alternatives_spanish:
  - será
  - ocurrirá
  lexicon: BDAG
  rationale: La fórmula griega introduce una declaración solemne y escritural. En español, «sucederá» conserva el matiz formular y profético sin sonar artificial como un calco de «será».
- source_word: πᾶς ὃς ἐὰν
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - quienquiera que
  - cada uno que
  lexicon: BDAG
  rationale: La construcción expresa una condición universal indefinida. «Todo el que» comunica bien el alcance inclusivo y mantiene un registro bíblico natural en español.
- source_word: ἐπικαλέσηται
  english_pob_choice: calls on
  chosen_spanish: invoque
  alternatives_spanish:
  - llame sobre
  - clame a
  - llame al
  lexicon: BDAG
  rationale: En esta expresión bíblica, ἐπικαλέω con «el nombre» implica invocar con dependencia reverente. «Invoque» preserva mejor esa fuerza cultual y devocional que un simple «llame».
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - el nombre invocado
  - su nombre
  lexicon: BDAG
  rationale: Se mantiene la frase literal porque «invocar el nombre» es una expresión bíblica fija con resonancias de pacto, adoración y apelación confiada. Parafrasearla debilitaría esa carga.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: BDAG
  rationale: El griego dice κυρίου, y la traducción española estándar aquí es «el Señor». Se preserva la tensión teológica entre la cita de Joel, donde el referente es Yahvé, y su uso en Hechos, donde Pedro la aplica dentro de una proclamación centrada en Jesús, sin resolverla en el texto principal.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será rescatado
  - obtendrá salvación
  lexicon: BDAG
  rationale: El futuro pasivo de σῴζω se traduce de manera directa con «será salvo». Esta forma conserva tanto el sentido de rescate/liberación como el de salvación en el contexto de la cita.
theological_decisions:
- issue: Referente de «el Señor» en la cita de Joel usada en Hechos
  english_pob_reading: Render κύριος as 'the Lord' without specifying the referent in the main text.
  chosen_spanish_reading: Traducir κύριος como «el Señor» sin identificar explícitamente en el texto principal si se trata de Yahvé o de Jesús.
  alternative_spanish_readings:
  - Yahvé
  - Jesús
  - el Señor Yahvé
  rationale: El griego no especifica el referente en la forma textual misma, y la traducción no debe resolver una tensión interpretativa que el uso lucano mantiene viva. En Joel, el referente es Yahvé; en Hechos, la cita queda integrada en el anuncio acerca de Jesús. Por eso el texto principal conserva «el Señor» y deja la aclaración para nota.
  doctrine_reference: Mantener la tensión teológica y la referencia intertextual; κύριος se traduce normalmente «Señor».
translation_notes:
  revision_awareness: 'El contexto auditado en inglés muestra acuerdo alto y sin revisiones aplicadas en la última pasada. La versión española sigue de cerca esa lectura, con una sola decisión interpretativa explicada en nota: mantener «el Señor» para preservar la tensión entre la cita de Joel y su uso en Hechos.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico solemne sin arcaísmos innecesarios.
  - «Invoque el nombre» conserva la expresión fija del original y evita una paráfrasis excesiva.
  - «El Señor» se usa como renderización estable de κύριος, con aclaración intertextual en nota.
  - «Será salvo» refleja el pasivo futuro de σῴζω sin añadir precisión doctrinal que el texto no explicita.
