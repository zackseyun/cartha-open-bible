translation:
  language: es
  text: a quien Dios levantó, habiendo soltado los dolores[a] de la muerte, porque no era posible que fuera retenido por ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las punzadas de la muerte»; el término griego también puede significar «dolores de parto», conservando la imagen de que el dominio de la muerte fue roto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «por ello», con el pronombre refiriéndose más naturalmente a la muerte: «ser retenido por la muerte».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a él
  - quien
  lexicon: BDAG
  rationale: El relativo retoma a Jesús del contexto inmediato. «A quien» conserva la relación sintáctica y suena natural en español formal.
- source_word: ἀνέστησεν
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - levantó de nuevo
  lexicon: BDAG
  rationale: El aoristo de ἀνίστημι aquí se refiere a la acción de Dios al sacar a Jesús de la muerte. «Levantó» es breve y fiel; «resucitó» sería posible, pero introduce una formulación más técnica que el griego no exige en esta cláusula.
- source_word: λύσας
  english_pob_choice: having loosed
  chosen_spanish: habiendo soltado
  alternatives_spanish:
  - habiendo desatado
  - habiendo liberado
  - rompiendo
  lexicon: BDAG
  rationale: El participio aoristo expresa acción acompañante o instrumental. «Habiendo soltado» mantiene la imagen concreta de λύω (aflojar, soltar, desatar) sin sobreexplicar el modo.
- source_word: τὰς ὠδῖνας τοῦ θανάτου
  english_pob_choice: the pains of death
  chosen_spanish: las penas de la muerte
  alternatives_spanish:
  - los dolores de la muerte
  - los padecimientos de la muerte
  - las contracciones de la muerte
  lexicon: BDAG
  rationale: «Ὠδῖνας» puede referirse a dolores intensos, incluso dolores de parto. En español, «penas» conserva el valor de sufrimiento intenso y deja abierta la imagen sin imponer «parto» como sentido principal en el texto base.
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la acción divina. «Porque» es la opción más directa y clara en español.
- source_word: οὐκ ἦν δυνατὸν
  english_pob_choice: it was not possible
  chosen_spanish: no era posible
  alternatives_spanish:
  - era imposible
  - no podía ser
  lexicon: BDAG
  rationale: La construcción impersonal se conserva de forma natural en español con «no era posible».
- source_word: κρατεῖσθαι
  english_pob_choice: to be held
  chosen_spanish: ser retenido
  alternatives_spanish:
  - ser sujetado
  - mantenerse preso
  - ser detenido
  lexicon: BDAG
  rationale: El pasivo infinitivo de κρατέω comunica ser sujetado o retenido con poder. «Ser retenido» expresa bien la idea sin añadir matices ajenos.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - por la muerte
  - por él
  lexicon: BDAG
  rationale: El antecedente más natural es «la muerte» (θανάτου), femenino en español. Esto permite una versión fluida y a la vez refleja la lectura sintáctica más probable.
theological_decisions:
- issue: Referencia de ὑπ’ αὐτοῦ
  english_pob_reading: The pronoun refers to death, not to God or another masculine personal referent.
  chosen_spanish_reading: El pronombre se entiende como referido a la muerte.
  alternative_spanish_readings:
  - por la muerte
  - por él
  rationale: 'La construcción explica por qué Dios levantó a Jesús: la muerte no podía seguir reteniéndolo. En español se traduce «por ella» para reflejar el antecedente conceptual sin perder la transparencia del pasaje; la nota conserva la alternativa literal.'
  doctrine_reference: Preservar la ambigüedad sintáctica y documentar el antecedente probable sin resolverlo dogmáticamente.
- issue: Sentido de ὠδῖνας
  english_pob_reading: '''pains'' rather than ''birth pains'' in the main text'
  chosen_spanish_reading: «penas» en el texto principal, con posibilidad de «dolores de parto» en nota
  alternative_spanish_readings:
  - dolores
  - dolores de parto
  - padecimientos
  rationale: Aunque ὠδίν puede designar dolores de parto, el contexto inmediato destaca el poder de la muerte. «Penas» mantiene la amplitud semántica y el tono sobrio del pasaje; la nota deja constancia de la posibilidad alternativa.
  doctrine_reference: Primacía del original griego y conservación de tensiones léxicas reales.
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego y el audit trail inglés, pero ajusta la sintaxis para que resulte natural en español. Se preserva la ambigüedad de ὠδῖνας con una nota léxica y se refleja el antecedente probable de αὐτοῦ con un pronombre femenino acorde con «la muerte».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «levantó» en el cuerpo principal por fidelidad sobria al aoristo, evitando sobrerinterpretación.
  - Se conserva «por ella» para la referencia a la muerte, en continuidad con la decisión del audit trail de mantener el antecedente probable sin forzar una explicitación innecesaria.
  - «Penas de la muerte» busca claridad contemporánea sin abandonar el campo semántico de dolor intenso asociado a ὠδῖνας.
