  to: a quien Dios levantó, habiendo soltado los dolores[a] de la muerte, porque no era posible que fuera retenido por ella[b].
  rationale: 'Se corrigen las notas para que sigan el expediente auditado del POB inglés: la nota léxica relevante se ancla en «dolores», no en «levantó», y se añade la nota sobre el pronombre final. También se mejora la naturalidad y precisión del español cambiando «penas» por «dolores», sin apartarse del sentido fuente. El texto principal mantiene «levantó» por fidelidad al matiz menos técnico de ἀνέστησεν.'
