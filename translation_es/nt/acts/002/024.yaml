    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «por ello», con el pronombre refiriéndose más naturalmente a la muerte: «ser retenido por la muerte».'
    reason: alternative_reading
  revision_rationale: 'Se corrigen las notas para que sigan el expediente auditado del POB inglés: la nota léxica relevante se ancla en «dolores», no en «levantó», y se añade la nota sobre el pronombre final. También se mejora la naturalidad y precisión del español cambiando «penas» por «dolores», sin apartarse del sentido fuente. El texto principal mantiene «levantó» por fidelidad al matiz menos técnico de ἀνέστησεν.'
