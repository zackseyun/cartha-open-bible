translation:
  language: es
  text: Y día tras día, perseverando con un mismo propósito en el templo[a], y partiendo el pan de casa en casa[b], compartían comida[c] con alegría y sencillez de corazón[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo». El término griego se refiere al complejo del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: «Partiendo el pan» puede referirse a comidas ordinarias compartidas, aunque algunos entienden que incluye la Cena del Señor.
    reason: alternative_reading
  - marker: c
    text: O «alimento».
    reason: lexical_alternative
  - marker: d
    text: O «sinceridad de corazón» o «generosidad de corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: BDAG
  rationale: La expresión distributiva pide una equivalencia iterativa natural en español. «Día tras día» conserva la repetición continua sin sonar rígida ni demasiado interpretativa.
- source_word: προσκαρτεροῦντες
  english_pob_choice: continuing
  chosen_spanish: perseverando
  alternatives_spanish:
  - continuando
  - dedicándose
  - persistiendo
  lexicon: BDAG
  rationale: El participio expresa una acción sostenida. «Perseverando» comunica continuidad activa y encaja bien con la frase siguiente, sin añadir una devoción más fuerte de la que exige el texto.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one purpose
  chosen_spanish: con un mismo propósito
  alternatives_spanish:
  - unánimes
  - de común acuerdo
  - con una sola mente
  lexicon: BDAG
  rationale: La idea es de unidad de intención y disposición. «Con un mismo propósito» preserva esa fuerza común con español natural; evita restringir el sentido a mera unanimidad externa.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple courts
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en los recintos del templo
  lexicon: BDAG
  rationale: El griego ἱερόν señala el complejo del templo, no específicamente el santuario interior. En español, «en el templo» es la forma más transparente y natural; la nota aclara el matiz del complejo templario.
- source_word: κλῶντές ... ἄρτον
  english_pob_choice: breaking bread
  chosen_spanish: partiendo el pan
  alternatives_spanish:
  - rompiendo el pan
  - al partir el pan
  lexicon: BDAG
  rationale: Se conserva la expresión idiomática de Lucas-Hechos sin convertirla explícitamente en lenguaje sacramental. «Partiendo el pan» mantiene la posible resonancia de mesa compartida y eucarística.
- source_word: κατ’ οἶκον
  english_pob_choice: from house to house
  chosen_spanish: de casa en casa
  alternatives_spanish:
  - en las casas
  - por las casas
  - en los hogares
  lexicon: BDAG
  rationale: El valor distributivo de κατά se expresa naturalmente en español como movimiento repetido entre varias casas. «De casa en casa» refleja mejor esa repetición que un simple «en casa».
- source_word: μετελάμβανον τροφῆς
  english_pob_choice: they were sharing food
  chosen_spanish: compartían alimento
  alternatives_spanish:
  - participaban de alimento
  - tomaban alimento
  - compartían comida
  lexicon: BDAG
  rationale: La forma imperfecta sugiere una práctica continua y comunitaria. «Compartían alimento» conserva el carácter de participación común y sigue de cerca el matiz de τροφῆς sin volverlo pesado.
- source_word: τροφῆς
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimentos
  lexicon: BDAG
  rationale: Aunque literalmente significa «comida/food», «alimento» funciona bien en registro bíblico y puede abarcar la idea general de sustento comido en común. La alternativa «comida» sería más coloquial.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con regocijo
  - con júbilo
  lexicon: BDAG
  rationale: El sustantivo indica gozo intenso o exultante. «Con alegría» es natural y suficientemente amplio; no fuerza un tono demasiado elevado en español.
- source_word: ἀφελότητι καρδίας
  english_pob_choice: simplicity of heart
  chosen_spanish: sencillez de corazón
  alternatives_spanish:
  - sinceridad de corazón
  - generosidad de corazón
  - pureza de corazón
  lexicon: BDAG
  rationale: La expresión puede abarcar sencillez, franqueza y ausencia de doblez. «Sencillez de corazón» preserva esa amplitud mejor que reducirla solo a sinceridad o generosidad.
theological_decisions:
- issue: Si «partiendo el pan» debe interpretarse de manera explícitamente sacramental
  english_pob_reading: Retain the broader expression 'breaking bread' within the description of shared meals, without making it explicitly sacramental in the main text.
  chosen_spanish_reading: Mantener «partiendo el pan» dentro del marco de la comida compartida, sin convertirlo en una referencia sacramental explícita en el texto principal.
  alternative_spanish_readings:
  - Interpretarlo solo como comidas ordinarias compartidas
  - Interpretarlo como una referencia explícita a la Cena del Señor
  rationale: En Hechos, la expresión puede referirse a la mesa compartida ordinaria y también puede resonar con la práctica cristiana de la Cena del Señor. Como el contexto inmediato menciona τροφῆς, el sentido de comida común es fuerte; pero para preservar la tensión teológica documentada, el texto principal conserva la expresión idiomática y no la resuelve de forma unilateral.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del audio-trazado inglés: se evitó un redundante equivalente de «together» al traducir ὁμοθυμαδόν; además, se reflejó τροφῆς con una formulación más cercana al sustantivo («alimento») en vez de una frase más interpretativa. La redacción española mantiene el equilibrio entre fluidez y cercanía al griego, sin perder la tensión entre comida ordinaria y posible resonancia sacramental en «partiendo el pan».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva el paralelismo de participios con «perseverando» y «partiendo», coherente con el flujo narrativo del griego.
  - No se introdujo vocabulario eclesiástico posterior; la escena sigue siendo doméstica y comunitaria, acorde con el contexto de Hechos.
  - Las notas mantienen las ambigüedades relevantes en torno a ἱερόν, κλῶντες y τροφῆς sin sobreexplicarlas en el cuerpo del texto.
