revisions:
- from: Y perseveraban en la enseñanza de los apóstoles, en la comunión[a], en el partimiento del pan[b] y en las oraciones[c].
  to: Y perseveraban en la enseñanza de los apóstoles, en la fraternidad[a], en la fracción del pan[b] y en las oraciones[c].
  rationale: La revisión ajusta dos puntos léxicos para acercarse mejor al sentido del griego y a la intención documentada por el POB. «Fraternidad» comunica mejor el carácter amplio y comunitario de κοινωνία sin arrastrar tan fuertemente la lectura sacramental de «comunión» en español. «Fracción del pan» mejora la naturalidad y la reconocibilidad bíblica actual frente a «partimiento del pan», manteniendo la ambigüedad deliberada sobre comidas compartidas y posible referencia a la Cena del Señor. El resto del versículo está bien logrado y no requiere cambios.
