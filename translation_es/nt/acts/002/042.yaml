translation:
  language: es
  text: Y perseveraban en la enseñanza de los apóstoles, en la fraternidad[a], en la fracción del pan[b] y en las oraciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «participación», «compartir» o «comunión».'
    reason: lexical_alternative
  - marker: b
    text: La expresión puede referirse a comidas compartidas en general, aunque muchos entienden aquí que incluye la Cena del Señor.
    reason: alternative_reading
  - marker: c
    text: 'O: «las oraciones establecidas»; el artículo puede sugerir tiempos o formas reconocidas de oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δὲ προσκαρτεροῦντες
  english_pob_choice: they were devoting themselves
  chosen_spanish: perseveraban
  alternatives_spanish:
  - se dedicaban continuamente
  - se mantenían firmes
  - continuaban perseverando
  lexicon: BDAG
  rationale: La perífrasis imperfecta expresa una acción continua y habitual en el pasado. «Perseveraban» conserva la idea de constancia y entrega sostenida sin sonar forzado en español; «se dedicaban continuamente» es más explícito, pero menos natural.
- source_word: τῇ διδαχῇ
  english_pob_choice: the apostles' teaching
  chosen_spanish: la enseñanza de los apóstoles
  alternatives_spanish:
  - la doctrina de los apóstoles
  - la instrucción de los apóstoles
  lexicon: BDAG
  rationale: «Enseñanza» refleja bien διδαχή como actividad y contenido comunicado. «Doctrina» sería posible, pero en español suena más sistemática o eclesiástica que el contexto inmediato.
- source_word: τῶν ἀποστόλων
  english_pob_choice: the apostles'
  chosen_spanish: de los apóstoles
  alternatives_spanish:
  - apostólica
  - de los enviados
  lexicon: BDAG
  rationale: El genitivo indica la enseñanza impartida por los apóstoles. El posesivo español es natural y evita una paráfrasis innecesaria.
- source_word: κοινωνίᾳ
  english_pob_choice: the fellowship
  chosen_spanish: la comunión
  alternatives_spanish:
  - la comunión fraterna
  - la participación
  - la compartición
  lexicon: BDAG
  rationale: En español, «comunión» conserva la amplitud de κοινωνία como vida compartida y participación mutua. «Comunión fraterna» aclara, pero estrecha el término; «participación» y «compartición» son posibles, aunque menos idiomáticas aquí.
- source_word: κλάσει τοῦ ἄρτου
  english_pob_choice: the breaking of bread
  chosen_spanish: el partimiento del pan
  alternatives_spanish:
  - la fracción del pan
  - el quebrantamiento del pan
  lexicon: BDAG
  rationale: «Partimiento del pan» es una forma tradicional y clara en español bíblico para mantener la expresión fija sin convertirla en una interpretación sacramental explícita. «Fracción del pan» es más literal, pero menos natural para la lectura pública.
- source_word: ταῖς προσευχαῖς
  english_pob_choice: the prayers
  chosen_spanish: las oraciones
  alternatives_spanish:
  - las oraciones establecidas
  - las plegarias
  lexicon: BDAG
  rationale: El plural con artículo puede sugerir prácticas reconocidas de oración. «Las oraciones» respeta esa posibilidad sin añadir más de lo que el texto exige; «plegarias» es correcto, pero menos directo.
theological_decisions:
- issue: Cómo renderizar κοινωνία sin reducirla a una sola práctica concreta
  english_pob_reading: Rendered as 'the fellowship' with broader communal sense
  chosen_spanish_reading: «la comunión» con sentido amplio de vida compartida y participación
  alternative_spanish_readings:
  - la comunión fraterna
  - la participación
  - el compartir
  rationale: El contexto enumera prácticas fundamentales de la comunidad naciente. «Comunión» preserva la amplitud de κοινωνία sin limitarla a bienes materiales ni a un uso sacramental técnico. La nota permite reconocer otras posibilidades semánticas sin resolverlas prematuramente.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Si κλάσει τοῦ ἄρτου debe explicitar la Cena del Señor
  english_pob_reading: Rendered more broadly as 'the breaking of bread'
  chosen_spanish_reading: «el partimiento del pan» sin especificar sacramento
  alternative_spanish_readings:
  - la Cena del Señor
  - la Eucaristía
  - la mesa del Señor
  rationale: La expresión en Lucas-Hechos puede abarcar comidas compartidas y, en contexto cristiano, también puede incluir la Cena del Señor. Como el texto no obliga a una identificación técnica, la traducción conserva la frase amplia y evita cargarla con una lectura confesional no demostrada por el verso mismo.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Si ταῖς προσευχαῖς implica oraciones establecidas o solo oración en general
  english_pob_reading: the prayers; the article may suggest recognized times or forms of prayer
  chosen_spanish_reading: «las oraciones» con posible matiz de prácticas conocidas
  alternative_spanish_readings:
  - las oraciones fijadas
  - las plegarias
  - los tiempos de oración
  rationale: El artículo plural puede señalar oraciones reconocidas o momentos concretos de oración. «Las oraciones» conserva esa ambigüedad productiva en vez de convertirla en una precisión que el griego no exige.
  doctrine_reference: Translation philosophy item 3
translation_notes:
  revision_awareness: Este borrador sigue de cerca el griego de SBLGNT y el expediente auditado en inglés, sin cambios de revisión previos registrados. Se preserva la amplitud semántica de κοινωνία, κλάσις τοῦ ἄρτου y ταῖς προσευχαῖς, evitando sobreespecificar la práctica comunitaria.
  spanish_consistency_notes:
  - Se usa «apóstoles» para τῶν ἀποστόλων de manera uniforme y natural.
  - Se mantiene «comunión» como equivalente principal de κοινωνία, en línea con el matiz amplio documentado.
  - «Partimiento del pan» conserva la fórmula bíblica estable sin imponer una lectura sacramental.
  - El plural «las oraciones» reproduce la posible referencia a formas reconocidas de oración.
  - La traducción adopta un estilo formal pero idiomático para lectura pública.
