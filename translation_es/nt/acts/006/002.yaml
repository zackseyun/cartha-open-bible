revisions:
- from: 'Entonces los Doce reunieron[a] a todo el grupo de los discípulos y dijeron[b]: «No es conveniente para nosotros dejar la palabra de Dios para servir a las mesas[c]».'
  to: 'Entonces los Doce convocaron a todo el grupo[a] de los discípulos y dijeron: «No es apropiado[b] que nosotros abandonemos la palabra de Dios para servir a las mesas[c]».'
  rationale: Se ajusta «reunieron» a «convocaron» para reflejar mejor προσκαλεσάμενοι, y «dejar» a «abandonemos» para conservar la fuerza de καταλείψαντας según la auditoría inglesa. Se mejora «No es conveniente» a «No es apropiado» para expresar mejor la idea de propiedad/adecuación de ἀρεστόν en este contexto. También se corrigen los anclajes y el idioma de las notas para que coincidan exactamente con los elementos textuales pertinentes.
