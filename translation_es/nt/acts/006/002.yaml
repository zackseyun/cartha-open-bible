review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: los Doce convocan al conjunto de los discípulos y expresan que no corresponde dejar la palabra de Dios para atender el servicio de mesas. Sin embargo, hay dos desajustes importantes con el matiz fuente y con el rastro POB en inglés: «reunieron a» debilita el sentido de προσκαλεσάμενοι como convocar/llamar a comparecer, y «dejar» suaviza demasiado καταλείψαντας, donde el inglés auditado eligió «abandon».'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse en precisión y fluidez bíblica. «Convocaron» suena más exacto que «reunieron a», y «abandonar» refleja mejor la gravedad de la prioridad apostólica. Además, el anclaje de notas está mal ubicado: la nota [b] corresponde a «No es conveniente», no a «dijeron». La nota [a] debe seguir anclada a la expresión sobre el conjunto de discípulos.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Dios», «la palabra de Dios», «servir» y «los Doce» están bien. No aplica aquí ninguna sustitución de Yahvé/Mesías. La decisión entre «conveniente» y «correcto/apropiado» es contextual; «apropiado» o «correcto» se alinea mejor con ἀρεστόν como cuestión de propiedad, pero «conveniente» no es totalmente inválido. El cambio principal requerido es lexical y de fidelidad semántica, no de glosario.'
  issues:
