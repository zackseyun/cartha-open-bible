translation:
  language: es
  text: 'Entonces los Doce convocaron a todo el grupo[a] de los discípulos y dijeron: «No es apropiado[b] que nosotros abandonemos la palabra de Dios para servir a las mesas[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «la multitud de los discípulos» o «el pleno número de los discípulos».
    reason: lexical_alternative
  - marker: b
    text: O bien, «No es correcto», «No es aceptable para nosotros» o «No es conveniente».
    reason: lexical_alternative
  - marker: c
    text: Es decir, encargarse de la distribución práctica vinculada con las comidas y los recursos de la comunidad.
    reason: cultural_note
lexical_decisions:
- source_word: προσκαλεσάμενοι
  english_pob_choice: called together
  chosen_spanish: reunieron
  alternatives_spanish:
  - llamaron juntos
  - convocaron
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción principal de convocar al grupo. «Reunieron» expresa con naturalidad en español la idea de convocar sin forzar una construcción pesada.
- source_word: οἱ δώδεκα
  english_pob_choice: the Twelve
  chosen_spanish: los Doce
  alternatives_spanish:
  - los doce apóstoles
  lexicon: BDAG
  rationale: La expresión funciona como designación estable del grupo apostólico. «Los Doce» sigue de cerca el griego y evita añadir «apóstoles», que aquí no está explícito.
- source_word: τὸ πλῆθος τῶν μαθητῶν
  english_pob_choice: the whole group of the disciples
  chosen_spanish: todo el grupo de los discípulos
  alternatives_spanish:
  - la multitud de los discípulos
  - el pleno número de los discípulos
  lexicon: BDAG
  rationale: πλῆθος puede referirse a una multitud o conjunto amplio. «Todo el grupo» comunica bien el sentido colectivo y evita el matiz algo arcaico de «multitud».
- source_word: Οὐκ ἀρεστόν ἐστιν
  english_pob_choice: It is not right
  chosen_spanish: No es conveniente
  alternatives_spanish:
  - No es correcto
  - No es aceptable
  - No es apropiado
  lexicon: BDAG
  rationale: ἀρεστόν puede significar agradable, aceptable o conveniente. En este contexto expresa adecuación y prioridad ministerial; «No es conveniente» conserva esa valoración sin volverla más dura de lo que el texto requiere.
- source_word: ἡμᾶς καταλείψαντας
  english_pob_choice: for us to abandon
  chosen_spanish: para nosotros dejar
  alternatives_spanish:
  - para nosotros abandonar
  - para nosotros descuidar
  lexicon: BDAG
  rationale: El infinitivo con acusativo se vierte de manera idiomática en español. Aquí «dejar» transmite la idea de apartarse de esa tarea para atender otra; el contexto ya aporta la fuerza de abandono implícita en la comparación de prioridades.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Yahvé
  lexicon: BDAG
  rationale: La expresión es estándar y transparente. «La palabra de Dios» conserva el sentido de proclamación y enseñanza divina en Hechos.
- source_word: διακονεῖν
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - ministrar
  - atender
  lexicon: BDAG
  rationale: El infinitivo denota servicio práctico. «Servir» es la equivalencia natural y evita imponer matices eclesiásticos posteriores a «ministrar».
- source_word: τραπέζαις
  english_pob_choice: tables
  chosen_spanish: a las mesas
  alternatives_spanish:
  - en las mesas
  - a la mesa
  - al servicio de mesas
  lexicon: BDAG
  rationale: La traducción literal mantiene la imagen del griego. En contexto se refiere al servicio práctico relacionado con comidas y distribución; por eso conviene conservar «mesas» en el texto principal.
theological_decisions:
- issue: Prioridad apostólica frente al servicio práctico
  english_pob_reading: Render the statement as a matter of propriety and calling ('It is not right for us to abandon the word of God to serve tables') rather than as a denigration of service work.
  chosen_spanish_reading: Presentar la frase como una cuestión de conveniencia y prioridad ministerial, no como un menosprecio del servicio a las mesas.
  alternative_spanish_readings:
  - No es correcto para nosotros...
  - No es aceptable para nosotros...
  - No es apropiado para nosotros...
  rationale: El versículo contrasta responsabilidades; no jerarquiza la dignidad espiritual del servicio práctico. «No es conveniente» conserva la tensión entre tareas sin rebajar el valor del trabajo de mesa.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el audit trail en inglés; se mantuvo la estructura y la tensión semántica del original sin añadir interpretaciones ajenas. No hubo cambios de última revisión en el antecedente inglés.
  spanish_consistency_notes:
  - Se mantuvo «los Doce» como designación fija del grupo apostólico.
  - Se usó «la palabra de Dios» de forma consistente con la terminología POB para λόγος τοῦ θεοῦ.
  - Se preservó la imagen concreta de «mesas» y se aclaró su alcance práctico en nota, sin reemplazarla por una paráfrasis abstracta.
