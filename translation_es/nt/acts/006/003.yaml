    text: O «bien testimoniados» para «de buena reputación».
    reason: lexical_alternative
  - marker: b
    text: O «llenos del Espíritu Santo y de sabiduría». El griego dice «llenos del Espíritu y de sabiduría».
    reason: alternative_reading
  - marker: c
    text: Esta tarea se refiere al asunto práctico de la distribución diaria mencionado en el contexto inmediato.
    reason: cross_reference
  revision_rationale: Se reubicó la nota léxica para que ancle correctamente en la traducción de μαρτυρουμένους. Además, se reemplazó «pondremos al frente de este asunto» por «designaremos para esta tarea» para reflejar mejor el sentido formal de καταστήσομεν y el valor contextual de χρεία como responsabilidad práctica. Se mantuvo «Pero», «hermanos», «hombres» y «Espíritu» por fidelidad al griego y a la auditoría del POB.
