  text: ἐπισκέψασθε ⸀δέ, ἀδελφοί, ἄνδρας ἐξ ὑμῶν μαρτυρουμένους ἑπτὰ πλήρεις ⸀πνεύματος καὶ σοφίας, οὓς ⸀καταστήσομεν ἐπὶ τῆς χρείας ταύτης·
base_translation:
  language: en
  yaml_path: translation/nt/acts/006/003.yaml
  text: But brothers[a], select from among yourselves seven men who are well attested, full of the Spirit and wisdom[d][c][b], whom we will appoint over this duty.
  footnotes:
  - marker: a
    text: Or 'of good reputation' for 'well attested.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' translates the masculine Greek form; the address may include the wider believing community.'
    reason: cultural_note
  - marker: c
    text: Or 'full of the Holy Spirit and wisdom.' The Greek reads 'full of the Spirit and wisdom.'
    reason: alternative_reading
  - marker: d
    text: '''This duty'' refers to the practical matter of the daily distribution mentioned in the surrounding context.'
    reason: cross_reference
