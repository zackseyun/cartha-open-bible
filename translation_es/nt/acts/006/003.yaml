translation:
  language: es
  text: Pero, hermanos, escojan de entre ustedes siete hombres de buena reputación[a], llenos del Espíritu[b] y de sabiduría, a quienes designaremos para esta tarea[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien testimoniados» para «de buena reputación».
    reason: lexical_alternative
  - marker: b
    text: O «llenos del Espíritu Santo y de sabiduría». El griego dice «llenos del Espíritu y de sabiduría».
    reason: alternative_reading
  - marker: c
    text: Esta tarea se refiere al asunto práctico de la distribución diaria mencionado en el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισκέψασθε
  english_pob_choice: select
  chosen_spanish: escojan
  alternatives_spanish:
  - elijan
  - seleccionen
  lexicon: BDAG
  rationale: El imperativo medio pide a la comunidad que identifique y designe a los varones adecuados. «Escojan» es natural en español y conserva la idea deliberativa de una selección comunitaria.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: La partícula marca transición y contraste suave con la propuesta anterior. «Pero» refleja bien ese giro discursivo sin exagerarlo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, creyentes
  lexicon: BDAG
  rationale: La forma griega es masculina vocativa; se mantiene «hermanos» como en el texto inglés auditado, sin neutralizarlo en la línea principal.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: ἄνδρας designa varones adultos de manera específica. «Hombres» conserva esa referencia de género de forma natural en español.
- source_word: ἐξ ὑμῶν
  english_pob_choice: from among yourselves
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de entre ustedes mismos
  - de su propio grupo
  lexicon: BDAG
  rationale: La frase indica elección dentro de la misma comunidad. «De entre ustedes» expresa bien ese sentido inclusivo y comunitario.
- source_word: μαρτυρουμένους
  english_pob_choice: well attested
  chosen_spanish: de buena reputación
  alternatives_spanish:
  - bien testimoniados
  - bien acreditados
  lexicon: BDAG
  rationale: El participio implica testimonio favorable sobre su carácter. En español, «de buena reputación» comunica de manera natural ese valor testimonial; se conserva una alternativa más cercana al campo semántico de «testimoniado» en la nota.
- source_word: ἑπτὰ
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Numeral directo y sin dificultad especial.
- source_word: πλήρεις πνεύματος καὶ σοφίας
  english_pob_choice: full of the Spirit and wisdom
  chosen_spanish: llenos del Espíritu y de sabiduría
  alternatives_spanish:
  - llenos del Espíritu Santo y de sabiduría
  - llenos de espíritu y sabiduría
  lexicon: BDAG
  rationale: Se conserva la mayúscula en «Espíritu» por el contexto personal y activo en Hechos. No se añade «Santo» en el texto principal porque el griego no lo explicita; se mantiene la tensión lexical con la alternativa disponible.
- source_word: οὓς
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  - que
  lexicon: BDAG
  rationale: El relativo enlaza a los hombres elegidos con la acción futura de los apóstoles. «A quienes» fluye bien en español y conserva la referencia personal.
- source_word: καταστήσομεν
  english_pob_choice: we will appoint
  chosen_spanish: pondremos al frente
  alternatives_spanish:
  - nombraremos
  - designaremos
  lexicon: BDAG
  rationale: El verbo apunta a establecer formalmente a alguien en una función. «Pondremos al frente» capta la idea de asignación responsable con un español natural, sin reducirlo a un simple nombramiento administrativo.
- source_word: ἐπὶ τῆς χρείας ταύτης
  english_pob_choice: over this duty
  chosen_spanish: de este asunto
  alternatives_spanish:
  - sobre esta tarea
  - para esta necesidad
  - de esta responsabilidad
  lexicon: BDAG
  rationale: χρεία puede referirse a una necesidad o asunto práctico que requiere atención. Dado el contexto inmediato de la distribución diaria, «de este asunto» mantiene la referencia concreta sin forzar una lectura demasiado abstracta.
theological_decisions:
- issue: 'Sentido de πνεύματος: ¿espíritu genérico o el Espíritu de Dios?'
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - espíritu
  - el Espíritu Santo
  rationale: En Hechos, la combinación con sabiduría y la función ministerial sugieren la acción del Espíritu de Dios. Se mantiene «Espíritu» con mayúscula para señalar ese referente sin añadir «Santo» en el texto principal, respetando que el griego no lo dice explícitamente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente cambió la lectura discursiva de δέ de «Therefore» a «But»; por eso el español usa «Pero». También se conservó la decisión revisada de traducir μαρτυρουμένους con una expresión de reputación favorable, y de evitar añadir «Santo» al Espíritu en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «hermanos» como vocativo masculino, coherente con la política de forma gramatical.
  - Se preservó la distinción entre «Espíritu» y «sabiduría» sin fusionar sentidos.
  - La expresión «de este asunto» deja abierta la referencia concreta al reparto diario, sin sobreexplicar en el texto principal.
  - Se evitó el calco «bien atestiguados» por considerarse menos natural en español público; se documenta la alternativa en nota.
