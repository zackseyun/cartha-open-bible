translation:
  language: es
  text: Y la propuesta agradó a toda la multitud, y escogieron a Esteban, un hombre lleno de fe[a] y del Espíritu Santo, Felipe, Procoro, Nicanor, Timón, Parmenas y Nicolás[b], prosélito de Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''fidelidad''. El griego πίστις puede denotar fe, confianza o fidelidad; aquí el texto principal sigue la traducción por defecto del proyecto, ''fe''.'
    reason: lexical_alternative
  - marker: b
    text: Un prosélito era un gentil convertido al judaísmo.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ λόγος
  english_pob_choice: the proposal
  chosen_spanish: la propuesta
  alternatives_spanish:
  - la declaración
  - el asunto
  - la palabra
  lexicon: BDAG
  rationale: En este contexto λόγος se refiere a la propuesta concreta que acababan de presentar los apóstoles, no a 'palabra' en sentido abstracto. 'Propuesta' conserva ese referente y suena natural en español.
- source_word: ἤρεσεν
  english_pob_choice: pleased
  chosen_spanish: agradó
  alternatives_spanish:
  - fue agradable
  - les pareció bien
  - gozó de aprobación
  lexicon: BDAG
  rationale: El verbo expresa que la propuesta obtuvo aceptación. 'Agradó' reproduce bien esa idea en español sin añadir matices ajenos.
- source_word: ἐνώπιον παντὸς τοῦ πλήθους
  english_pob_choice: the whole multitude
  chosen_spanish: a toda la multitud
  alternatives_spanish:
  - ante toda la multitud
  - a la congregación entera
  - a todo el pueblo reunido
  lexicon: BDAG
  rationale: La expresión comunica aprobación por parte del grupo reunido. 'Toda la multitud' mantiene el sustantivo colectivo πλῆθος y el giro 'a' funciona bien con 'agradar' en español.
- source_word: ἐξελέξαντο
  english_pob_choice: they chose
  chosen_spanish: escogieron
  alternatives_spanish:
  - eligieron
  - seleccionaron
  lexicon: BDAG
  rationale: El verbo medio indica que eligieron para sí. 'Escogieron' es natural y conserva el sentido directo del texto.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una persona
  lexicon: BDAG
  rationale: ἀνήρ identifica a Esteban como 'hombre'. 'Un hombre' es claro y fiel al valor léxico del término.
- source_word: πλήρης πίστεως
  english_pob_choice: full of faith
  chosen_spanish: lleno de fe
  alternatives_spanish:
  - lleno de fidelidad
  - lleno de confianza
  lexicon: BDAG
  rationale: POB preserva 'faith' como renderizado principal para πίστις. En español, 'fe' es el equivalente natural y mantiene abierta la posible tensión con 'fidelidad' sin resolverla prematuramente.
- source_word: πνεύματος ἁγίου
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del espíritu santo
  lexicon: BDAG
  rationale: En Hechos, la expresión remite al Espíritu Santo divino. La mayúscula y la forma establecida 'Espíritu Santo' son apropiadas y transparentes en español.
- source_word: Στέφανον, Φίλιππον, Πρόχορον, Νικάνορα, Τίμωνα, Παρμενᾶν, Νικόλαον
  english_pob_choice: Stephen, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus
  chosen_spanish: Esteban, Felipe, Procoro, Nicanor, Timón, Parmenas y Nicolás
  alternatives_spanish:
  - Esteban, Felipe, Prócoro, Nicanor, Timón, Pármenas y Nicolás
  lexicon: LSJ
  rationale: Los nombres propios se transliteran con la convención habitual en español bíblico. 'Procoro' y 'Parmenas' evitan acentos no necesarios y siguen la forma más reconocible en español.
- source_word: προσήλυτον
  english_pob_choice: a proselyte
  chosen_spanish: prosélito
  alternatives_spanish:
  - convertido
  - adherente
  lexicon: BDAG
  rationale: προσήλυτος designa a un gentil convertido al judaísmo. 'Prosélito' es preciso y conserva el matiz histórico-religioso del término.
- source_word: Ἀντιοχέα
  english_pob_choice: of Antioch
  chosen_spanish: de Antioquía
  alternatives_spanish:
  - antioqueño
  - procedente de Antioquía
  lexicon: BDAG
  rationale: El adjetivo de procedencia se rinde de modo natural con 'de Antioquía', que encaja bien en aposición con 'prosélito'.
theological_decisions:
- issue: Renderización de πίστις en la caracterización de Esteban
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  rationale: La base inglesa mantiene 'faith' como lectura principal y deja 'faithfulness' en nota. En español, 'fe' es la equivalencia más directa y estándar; 'fidelidad' queda como posible matiz, pero no desplaza el texto principal.
  doctrine_reference: 'DOCTRINE.md: πίστις; traducción por defecto ''faith'' con alternativa contextual.'
- issue: Referencia a πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  rationale: En Hechos la referencia es a la persona divina del Espíritu Santo, no a una disposición genérica. La capitalización y la forma fijada en español reflejan ese valor.
  doctrine_reference: Hechos; uso doctrinal estándar de 'Espíritu Santo'.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB que prefiere presentar a los siete varones como un solo grupo seleccionado, sin separar indebidamente a Esteban del resto. Por eso se evita una segunda conjunción innecesaria tras la descripción de Esteban y se usa una lista fluida con comas y una sola 'y' final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; en este versículo no aplica.
  - '''Mesías/Cristo'' no aparece aquí.'
  - Se conserva 'Espíritu Santo' con mayúsculas por referencia personal divina.
  - Los nombres propios siguen formas corrientes y legibles en español bíblico.
  - Se usa 'prosélito' como término técnico, con nota explicativa para lectores generales.
