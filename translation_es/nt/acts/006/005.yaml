  text: καὶ ἤρεσεν ὁ λόγος ἐνώπιον παντὸς τοῦ πλήθους, καὶ ἐξελέξαντο Στέφανον, ἄνδρα ⸀πλήρης πίστεως καὶ πνεύματος ἁγίου, καὶ Φίλιππον καὶ Πρόχορον καὶ Νικάνορα καὶ Τίμωνα καὶ Παρμενᾶν καὶ Νικόλαον προσήλυτον Ἀντιοχέα,
base_translation:
  language: en
  yaml_path: translation/nt/acts/006/005.yaml
  text: And the proposal pleased the whole multitude[a], and they chose Stephen, a man full of faith and of the Holy Spirit, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus[c][b], a proselyte of Antioch.
  footnotes:
  - marker: a
    text: Or 'full of faithfulness.' The Greek word can denote faith, trust, or faithfulness; here the main text follows the project's default rendering 'faith.'
    reason: lexical_alternative
  - marker: b
    text: A 'proselyte' was a Gentile convert to Judaism.
    reason: cultural_note
  - marker: c
    text: Or 'Stephen, a man full of faith and of the Holy Spirit, and Philip and Prochorus and Nicanor and Timon and Parmenas and Nicolaus'.
    reason: previous_rendering
