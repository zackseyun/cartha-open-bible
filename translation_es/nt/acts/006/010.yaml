  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: incapacidad continuada («no podían»), infinitivo de oposición, artículo en «la sabiduría», lectura principal de πνεύματι como el Espíritu, y aspecto imperfectivo en «hablaba». También conserva correctamente la nota de lectura alternativa sobre «el espíritu».'
  spanish_quality_summary: La redacción es clara y natural, pero «oponerse a la sabiduría y al Espíritu» no transmite tan bien como el griego/POB la idea de no poder hacer frente o resistir eficazmente al discurso de Esteban. «Resistir» o «hacer frente a» encaja mejor con ἀντιστῆναι en este contexto. Además, «por medio del cual» es aceptable, pero «por el cual» suena más directo y natural en español bíblico contemporáneo sin perder el valor instrumental.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Espíritu» está bien capitalizado para la lectura principal, y la nota preserva la alternativa «espíritu». No intervienen otros términos sensibles del glosario.'
  issues:
