    rationale: El verbo aquí no es solo estar en desacuerdo, sino resistir o hacer frente con éxito. «No podían resistir» preserva mejor la fuerza contextual y la elección inglesa «withstand».
  - severity: low
    issue: «por medio del cual» es algo pesado
    rationale: Aunque fiel, resulta menos natural que «por el cual» en español bíblico moderno. La construcción más breve mantiene el sentido instrumental/relacional del dativo relativo.
  revised_spanish_text: Y no podían resistir la sabiduría y al Espíritu[a] por el cual hablaba.
