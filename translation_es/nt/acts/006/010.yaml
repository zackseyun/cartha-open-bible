translation:
  language: es
  text: Y no podían resistir la sabiduría y al Espíritu[a] por el cual hablaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el espíritu por el cual hablaba», si πνεύματι se toma como referencia al espíritu propio de Esteban y no al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἴσχυον
  english_pob_choice: were not able
  chosen_spanish: no podían
  alternatives_spanish:
  - no eran capaces de
  - no tenían fuerza para
  lexicon: BDAG
  rationale: El imperfecto de ἰσχύω expresa incapacidad en la escena. En español, «no podían» comunica de forma natural esa imposibilidad sin añadir matices ajenos al griego.
- source_word: ἀντιστῆναι
  english_pob_choice: to withstand
  chosen_spanish: oponerse
  alternatives_spanish:
  - resistir
  - hacer frente a
  lexicon: BDAG
  rationale: En este contexto ἀνθίστημι transmite la idea de resistir con éxito o mantenerse en contra. «Oponerse» conserva ese valor de enfrentamiento y suena más natural que un calco rígido en español.
- source_word: σοφίᾳ
  english_pob_choice: the wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: BDAG
  rationale: Se mantiene el artículo porque el griego apunta a una sabiduría concreta, la que se manifestaba en el discurso de Esteban. El español lo refleja con «la sabiduría».
- source_word: πνεύματι
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: Por el contexto inmediato de Hechos y la asociación con la sabiduría como fuente del hablar de Esteban, la referencia más probable es al Espíritu Santo. En español se capitaliza como «Espíritu» para señalar esa lectura interpretativa.
- source_word: ᾧ ἐλάλει
  english_pob_choice: by which he was speaking
  chosen_spanish: por medio del cual hablaba
  alternatives_spanish:
  - por el cual hablaba
  - con el cual hablaba
  lexicon: BDAG
  rationale: El relativo griego es neutro y se ajusta formalmente a πνεύματι; en español, «por medio del cual» expresa bien la relación instrumental/mediadora. «Hablaba» preserva el imperfecto, indicando acción continua.
theological_decisions:
- issue: Si πνεύματι se refiere al Espíritu Santo o al espíritu humano de Esteban
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: 'El contexto de Hechos 6 favorece la referencia al Espíritu Santo: Esteban ya había sido descrito como lleno del Espíritu Santo, y la pareja «sabiduría y Espíritu» presenta la fuente de su discurso. Se conserva la tensión hermenéutica mediante nota.'
  doctrine_reference: Preservar la ambigüedad documentada cuando el contexto la permite; no eliminar una lectura alternativa atestiguada.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el consenso del audit trail inglés: incapacidad («no podían»), oposición eficaz («oponerse»), artículos definidos para la sabiduría y el Espíritu, y un relativo instrumental que en español se expresa naturalmente como «por medio del cual». Se conserva la lectura principal del Espíritu Santo, pero se documenta la alternativa antropológica en nota, como hace la tradición auditada en inglés.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula para la lectura del Espíritu Santo; la nota mantiene «espíritu» en minúscula para la alternativa.
  - «Sabiduría» se traduce sin artículo indefinido para reflejar la especificidad del griego.
  - Se evita «SEÑOR» u այլ máscara terminológica, pues no aparece el nombre divino en este versículo.
  - «Hablaba» conserva el imperfecto, coherente con ἐλάλει y con la escena de oposición continua.
