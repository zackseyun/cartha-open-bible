review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la secuencia temporal («Entonces»), la inducción encubierta de testigos, el contenido citado, el perfecto «Hemos oído», y la acusación de «palabras blasfemas contra Moisés y Dios». Sin embargo, «que él hablaba» después de «Hemos oído» suena menos natural y menos cercano a la construcción de ἀκούω + participio que una forma como «hablar» o «hablando».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad. «Hemos oído que él hablaba» en discurso citado puede percibirse como estilo indirecto dentro de una cita y suena algo pesado; «Hemos oído que habla» cambiaría el tiempo, y «lo hemos oído hablar» o «lo hemos oído hablando» preserva mejor el sentido. El resto del versículo está bien formulado.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» y «Moisés» están correctos; no aparecen términos sensibles adicionales. La nota sobre ὑπέβαλον está bien alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: Construcción española poco natural en «Hemos oído que él hablaba»
    rationale: Aunque transmite el sentido básico, esta formulación no representa con la mejor naturalidad el griego Ἀκηκόαμεν αὐτοῦ λαλοῦντος («hemos oído de él hablando / lo hemos oído hablar»). En español bíblico-natural, «lo hemos oído hablar» preserva mejor la percepción auditiva directa y evita una subordinada más interpretativa.
  revised_spanish_text: 'Entonces indujeron secretamente a hombres para que dijeran[a]: «Lo hemos oído hablar palabras blasfemas contra Moisés y contra Dios».

