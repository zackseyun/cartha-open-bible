translation:
  language: es
  text: 'Entonces indujeron secretamente a hombres para que dijeran[a]: «Lo hemos oído hablar palabras blasfemas contra Moisés y contra Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instigaron a hombres» o «subornaron a hombres». El verbo griego tiene un matiz encubierto de inducir o mover clandestinamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta de manera natural la secuencia narrativa y conserva el valor temporal de introducción de una nueva acción.
- source_word: ὑπέβαλον
  english_pob_choice: they secretly induced
  chosen_spanish: indujeron secretamente
  alternatives_spanish:
  - instigaron secretamente
  - subornaron secretamente
  - movieron en secreto
  lexicon: BDAG
  rationale: ὑποβάλλω aquí implica una incitación encubierta; «indujeron secretamente» comunica la acción causal y el matiz clandestino sin volverlo más fuerte de lo que exige el contexto.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - algunos hombres
  - varones
  lexicon: BDAG
  rationale: El acusativo plural de ἀνήρ se refiere a varones concretos; «hombres» conserva la referencia masculina de forma natural en español.
- source_word: λέγοντας
  english_pob_choice: to say
  chosen_spanish: para que dijeran
  alternatives_spanish:
  - diciendo
  - a decir
  lexicon: BDAG
  rationale: La construcción participial se vierte con infinitivo de finalidad o contenido en español para expresar con naturalidad el acto inducido.
- source_word: Ἀκηκόαμεν
  english_pob_choice: We have heard
  chosen_spanish: Hemos oído
  alternatives_spanish:
  - Hemos escuchado
  - Oímos
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción con relevancia actual; «hemos oído» preserva mejor ese matiz que un pasado simple.
- source_word: αὐτοῦ λαλοῦντος
  english_pob_choice: him speaking
  chosen_spanish: que él hablaba
  alternatives_spanish:
  - mientras hablaba
  - al hablar
  lexicon: BDAG
  rationale: La construcción de reporte tras ἀκούω admite en español una subordinada con «que él hablaba»; se mantiene el contenido del testimonio sin forzar una estructura extraña.
- source_word: ῥήματα βλάσφημα
  english_pob_choice: blasphemous words
  chosen_spanish: palabras blasfemas
  alternatives_spanish:
  - palabras blasfemas
  - blasfemias
  lexicon: BDAG
  rationale: La frase es literalmente «palabras blasfemas»; se conserva el sustantivo y el adjetivo para reflejar la acusación verbal concreta.
- source_word: εἰς Μωϋσῆν καὶ τὸν θεόν
  english_pob_choice: against Moses and God
  chosen_spanish: contra Moisés y contra Dios
  alternatives_spanish:
  - contra Moisés y Dios
  - respecto de Moisés y de Dios
  lexicon: BDAG
  rationale: En este contexto hostil, εἰς expresa dirección ofensiva; repetir «contra» en español hace explícita la fuerza acusatoria y evita suavizarla.
theological_decisions:
- issue: Carácter de la acusación contra Esteban
  english_pob_reading: Render the charge as an accusation of speaking 'blasphemous words against Moses and God' without softening or endorsing the accusation.
  chosen_spanish_reading: Presentar la denuncia como acusación de que él habló «palabras blasfemas contra Moisés y contra Dios», sin atenuarla ni asumir que sea verdadera.
  alternative_spanish_readings:
  - «palabras injuriosas» contra Moisés y Dios
  - «blasfemias» contra Moisés y Dios
  rationale: El relato informa lo que los testigos falsos fueron inducidos a decir. «Palabras blasfemas» conserva la carga jurídico-religiosa de βλάσφημα y mantiene la tensión narrativa sin validar la acusación.
  doctrine_reference: Preservar la tensión textual y la primacía del original; no resolver la acusación en la traducción.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue de cerca ese juicio, manteniendo la fuerza de «induced secretly» y la acusación de «blasphemous words» sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν y no se introduce «Señor», porque el texto griego no usa κύριος aquí.
  - Se conserva la repetición de «contra» para reflejar con claridad la doble dirección de la acusación.
  - Se usa «palabras blasfemas» en lugar de «blasfemias» para preservar la forma verbal concreta del griego ῥήματα βλάσφημα.
