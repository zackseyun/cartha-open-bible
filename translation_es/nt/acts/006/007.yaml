translation:
  language: es
  text: Y la palabra de Dios seguía creciendo, y el número de los discípulos en Jerusalén se multiplicaba grandemente, y una gran multitud de los sacerdotes se hacía obediente[a] a la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedecía a la fe» o «se hacía obediente a fe». La frase griega puede denotar obediencia al mensaje cristiano, no solo un acto interior de confianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra que viene de Dios
  lexicon: BDAG
  rationale: λόγος aquí designa la proclamación divina en curso. «Palabra de Dios» preserva el idiomatismo bíblico y comunica con naturalidad el contenido proclamado sin especificar en exceso si el énfasis recae en mensaje, discurso o anuncio.
- source_word: ηὔξανεν
  english_pob_choice: kept increasing
  chosen_spanish: seguía creciendo
  alternatives_spanish:
  - iba creciendo
  - continuaba aumentando
  - crecía
  lexicon: BDAG
  rationale: El imperfecto señala una acción en desarrollo. «Seguía creciendo» expresa continuidad de manera natural en español y conserva el matiz progresivo que la POB inglesa captó con «kept increasing».
- source_word: ἐπληθύνετο
  english_pob_choice: kept multiplying
  chosen_spanish: aumentaba mucho
  alternatives_spanish:
  - se multiplicaba
  - seguía multiplicándose
  - aumentaba en gran manera
  lexicon: BDAG
  rationale: El verbo aporta la idea de expansión cuantitativa. En español, «aumentaba mucho» mantiene la fuerza de crecimiento sin forzar una repetición mecánica de «crecer» y sin perder la diferencia semántica respecto de ηὔξανεν.
- source_word: ὁ ἀριθμὸς τῶν μαθητῶν
  english_pob_choice: the number of the disciples
  chosen_spanish: el número de los discípulos
  alternatives_spanish:
  - la cantidad de los discípulos
  - el número de los seguidores
  lexicon: BDAG
  rationale: La construcción es formal y debe conservarse. «Discípulos» refleja μαθηταί con precisión en el uso lucano y evita diluir el término en «seguidores».
- source_word: ἐν Ἰερουσαλὴμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: BDAG
  rationale: Traslado locativo directo y transparente.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - grandemente
  - sumamente
  lexicon: BDAG
  rationale: El adverbio intensifica el verbo previo. «Mucho» es natural y sobrio en español; la idea de intensificación ya queda reforzada por el contexto y por «aumentaba».
- source_word: πολύς τε ὄχλος
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - mucha gente
  lexicon: BDAG
  rationale: ὄχλος denota una masa colectiva de personas. «Gran multitud» conserva mejor el registro bíblico y el sentido de conjunto que una formulación más abstracta.
- source_word: τῶν ἱερέων
  english_pob_choice: of the priests
  chosen_spanish: de los sacerdotes
  alternatives_spanish:
  - de los sacerdotes del templo
  lexicon: BDAG
  rationale: ἱερεύς se refiere a los sacerdotes judíos. «Sacerdotes» es el equivalente español más transparente y preciso en este contexto.
- source_word: ὑπήκουον
  english_pob_choice: were becoming obedient
  chosen_spanish: iba siendo obediente
  alternatives_spanish:
  - obedecía
  - iba obedeciendo
  - se sometía
  lexicon: BDAG
  rationale: El imperfecto indica proceso continuo. «Iba siendo obediente» intenta reflejar ese desarrollo, manteniendo la relación con el objeto dativo y evitando reducirlo a una obediencia meramente puntual o externa.
- source_word: τῇ πίστει
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe cristiana
  - la creencia
  - la fidelidad
  lexicon: BDAG
  rationale: 'La presencia del artículo puede dar a πίστις un sentido objetivo: la fe como contenido confesional o mensaje recibido. «La fe» conserva la ambigüedad útil del griego y permite oír tanto la adhesión confiada como la obediencia a la confesión cristiana.'
theological_decisions:
- issue: Sentido de πίστις en τῇ πίστει
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fe cristiana
  - la creencia
  - la fidelidad
  rationale: La POB inglesa opta por «the faith» para preservar el posible sentido objetivo de πίστις. En español, «la fe» mantiene esa ambigüedad sin imponer una paráfrasis doctrinal. Dado que el contexto habla de personas que pasan a obedecer, la expresión puede entenderse como adhesión al contenido cristiano y no solo como acto interior de confianza.
  doctrine_reference: 'DOCTRINE.md: πίστις (faith) — sentidos subjetivo y objetivo; Translation philosophy #3 y #5'
translation_notes:
  revision_awareness: Se revisó el matiz verbal imperfectivo de ηὔξανεν, ἐπληθύνετο y ὑπήκουον para conservar el aspecto progresivo en español sin volver la frase pesada. La lectura de πίστις se mantuvo deliberadamente abierta con «la fe», en línea con la ambigüedad objetiva/subjetiva preservada por la POB inglesa.
  spanish_consistency_notes:
  - Se usó «palabra de Dios» para λόγος τοῦ θεοῦ, coherente con el idiomatismo bíblico y con el estándar POB.
  - Se prefirió «sacerdotes» para ἱερεῖς, no una glosa eclesiástica posterior.
  - «La fe» mantiene la tensión semántica de πίστις sin añadir «cristiana» en el texto principal.
  - 'La cadencia de los tres verbos imperfectos se conservó con formas continuas en español: «seguía creciendo», «aumentaba mucho», «iba siendo obediente».'
