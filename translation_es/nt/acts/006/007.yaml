revisions:
- from: Y la palabra de Dios seguía creciendo[a], y el número de los discípulos en Jerusalén aumentaba mucho, y una gran multitud de los sacerdotes iba siendo obediente a la fe.
  to: Y la palabra de Dios seguía creciendo, y el número de los discípulos en Jerusalén se multiplicaba grandemente, y una gran multitud de los sacerdotes se hacía obediente[a] a la fe.
  rationale: Se revisa para reflejar mejor los dos verbos griegos de crecimiento y para reemplazar una construcción española forzada por una formulación natural y fiel al sentido de ὑπήκουον τῇ πίστει. Se traslada la nota al pie al punto donde la ambigüedad léxica es más importante según el rastro POB inglés.
