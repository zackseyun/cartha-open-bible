translation:
  language: es
  text: En aquellos días, al multiplicarse los discípulos, surgió una queja de los helenistas[a] contra los hebreos, porque sus viudas eran pasadas por alto[b] en la distribución diaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente judíos de habla griega, en contraste con los «hebreos», probablemente judíos de habla aramea o hebrea.
    reason: cultural_note
  - marker: b
    text: O «eran descuidadas» en la distribución diaria; o «en el servicio diario».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ ταῖς ἡμέραις ταύταις
  english_pob_choice: Now in those days
  chosen_spanish: En aquellos días[a]
  alternatives_spanish:
  - Ahora, en aquellos días
  - En esos días
  lexicon: BDAG
  rationale: La expresión marca el encuadre temporal narrativo; en español, «En aquellos días» es natural y conserva la referencia temporal sin forzar un contraste innecesario. Se omite un equivalente explícito de «Now» porque en español no añade claridad y podría sonar pesado.
- source_word: πληθυνόντων τῶν μαθητῶν
  english_pob_choice: as the disciples were increasing in number
  chosen_spanish: al multiplicarse los discípulos
  alternatives_spanish:
  - mientras los discípulos aumentaban en número
  - cuando los discípulos se multiplicaban
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia de fondo. «Al multiplicarse» es conciso y fiel al incremento numérico de πληθύνω, sin perder el matiz de crecimiento comunitario.
- source_word: ἐγένετο γογγυσμός
  english_pob_choice: a complaint arose
  chosen_spanish: surgió una queja
  alternatives_spanish:
  - hubo una murmuración
  - se levantó una queja
  lexicon: BDAG
  rationale: γογγυσμός puede ser «murmuración» o «queja». Aquí el contexto inmediato concreta un reclamo; «queja» es más natural en español y mantiene el carácter de descontento que emerge.
- source_word: τῶν Ἑλληνιστῶν
  english_pob_choice: the Hellenists
  chosen_spanish: de los helenistas
  alternatives_spanish:
  - de los judíos de habla griega
  - de los griegoparlantes
  lexicon: BDAG
  rationale: Se conserva el rótulo histórico en el texto principal para no borrar la distinción intrajudía del pasaje. El término «helenistas» permite mantener la etiqueta del original con una nota explicativa implícita en el aparato.
- source_word: πρὸς τοὺς Ἑβραίους
  english_pob_choice: against the Hebrews
  chosen_spanish: contra los hebreos
  alternatives_spanish:
  - hacia los hebreos
  - contra los judíos de habla hebrea
  lexicon: BDAG
  rationale: πρός aquí introduce el blanco de la queja. «Contra» reproduce bien la tensión social del contexto; «hebreos» se conserva como paralelo de «helenistas».
- source_word: παρεθεωροῦντο
  english_pob_choice: were being overlooked
  chosen_spanish: eran pasadas por alto
  alternatives_spanish:
  - eran descuidadas
  - eran ignoradas
  lexicon: BDAG
  rationale: El imperfecto pasivo indica una acción continua. «Eran pasadas por alto» es una expresión idiomática y fiel en español; mantiene la idea de no recibir la debida atención sin afirmar más de lo que el verbo exige.
- source_word: ἐν τῇ διακονίᾳ τῇ καθημερινῇ
  english_pob_choice: in the daily distribution
  chosen_spanish: en el servicio diario
  alternatives_spanish:
  - en la distribución diaria
  - en el ministerio diario
  lexicon: BDAG
  rationale: διακονία es amplio y puede abarcar servicio o ministerio; en este contexto, por las viudas y la provisión material, «servicio diario» conserva la amplitud semántica sin restringir prematuramente a «distribución». La alternativa «distribución» se mantiene viable, pero «servicio» evita un encierro interpretativo excesivo.
- source_word: αἱ χῆραι αὐτῶν
  english_pob_choice: their widows
  chosen_spanish: sus viudas
  alternatives_spanish:
  - las viudas de ellos
  - las viudas entre ellos
  lexicon: BDAG
  rationale: El posesivo remite naturalmente al grupo de los helenistas; «sus viudas» es la formulación más directa y natural en español, preservando la relación social del reclamo.
theological_decisions:
- issue: Identidad de los grupos Ἑλληνισταί y Ἑβραῖοι
  english_pob_reading: Retain the labels as 'Hellenists' and 'Hebrews' in the main text, with explanatory footnote.
  chosen_spanish_reading: Conservar «helenistas» y «hebreos» en el texto principal, con una nota aclaratoria sobre su sentido lingüístico-cultural.
  alternative_spanish_readings:
  - judíos de habla griega y judíos de habla hebrea
  - griegoparlantes y hebreoparlantes
  rationale: No se trata de una cuestión doctrinal, sino histórica e interpretativa. Mantener los rótulos evita diluir la distinción del pasaje; la aclaración puede precisarse en nota sin eliminar la tensión social intrajudía que el texto presenta.
  doctrine_reference: Principio de primacía del texto original; preservar etiquetas históricas cuando el sentido exacto exige explicación adicional.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la versión española sigue ese consenso, manteniendo las etiquetas históricas y resolviendo διακονία con una formulación amplia y natural en español.
  spanish_consistency_notes:
  - Se mantiene «helenistas» como transliteración histórica, coherente con el tratamiento del inglés POB.
  - «Hebreos» conserva el paralelismo del original; no se sustituye por una paráfrasis etnolingüística en el texto principal.
  - «Eran pasadas por alto» refleja el imperfecto pasivo sin intensificar el verbo.
  - «Servicio diario» conserva la amplitud de διακονία, aunque se reconoce como alternativa contextual válida «distribución diaria».
