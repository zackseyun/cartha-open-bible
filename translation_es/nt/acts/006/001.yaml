  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: marco temporal, crecimiento de los discípulos, surgimiento de una queja, grupos en tensión y viudas desatendidas. Sin embargo, se aparta del rastro auditado del POB en un punto importante: ἐν τῇ διακονίᾳ τῇ καθημερινῇ fue decidido en el inglés como ''in the daily distribution'', con ''service/ministry'' solo como alternativa en nota. El español principal usa ''servicio diario'', lo que debilita el anclaje contextual de provisión material a viudas que el POB ya juzgó preferible en este contexto.'
  spanish_quality_summary: 'El español es claro y natural, pero conviene ajustar dos detalles. Primero, ''distribución diaria'' comunica mejor el contexto y suena igual de natural que ''servicio diario''. Segundo, la colocación de las notas está invertida respecto al contenido: la nota cultural corresponde a ''helenistas'', no a ''aquellos días'', y la nota léxica alternativa corresponde al verbo ''pasadas por alto'', no a ''hebreos''. Reanclar las notas mejora precisión y legibilidad editorial.'
  glossary_alignment: No hay conflicto con los términos doctrinales globales del proyecto. 'helenistas' y 'hebreos' preservan bien las etiquetas del original y del POB. 'discípulos', 'viudas' y 'queja' son adecuados. El único ajuste terminológico relevante es preferir 'distribución diaria' en línea con la decisión léxica inglesa documentada para διακονία en este versículo.
  issues:
  - severity: medium
    issue: '''servicio diario'' en vez de ''distribución diaria'''
    rationale: Aunque διακονία puede ser amplio, el English POB ya documentó que aquí el contexto de viudas y provisión material favorece 'distribution' como la expresión específica del servicio. 'Servicio diario' reabre una amplitud que el rastro auditado resolvió de manera más contextual.
  - severity: medium
    issue: Notas al pie mal ancladas
    rationale: La nota [a] sobre los helenistas está colocada en 'En aquellos días', y la nota [b] con alternativa para παρεθεωροῦντο está colocada en 'hebreos'. Las notas deben aparecer en la palabra o frase pertinente para mantener coherencia editorial y semántica.
