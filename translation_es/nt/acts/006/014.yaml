    reason: cultural_note
  - marker: c
    text: O «las tradiciones que Moisés nos transmitió».
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción general del borrador, pero se sustituye «entregó» por «transmitió» para reflejar mejor el sentido de παραδίδωμι como transmisión heredada de costumbres o tradiciones, no una entrega puntual. También se ajusta la nota alternativa para mantener coherencia léxica con el texto revisado.
