translation:
  language: es
  text: Porque lo oímos decir que este Jesús el Nazareno[a] destruirá este lugar[b] y cambiará las costumbres[c] que Moisés nos transmitió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este Jesús de Nazaret».
    reason: lexical_alternative
  - marker: b
    text: «Este lugar» se refiere al templo.
    reason: cultural_note
  - marker: c
    text: O «las tradiciones que Moisés nos transmitió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκηκόαμεν
  english_pob_choice: we heard
  chosen_spanish: lo oímos
  alternatives_spanish:
  - lo hemos oído
  lexicon: BDAG
  rationale: El perfecto griego puede expresar una noticia recibida con vigencia presente; en español, «lo oímos» conserva la acusación como algo oído directamente y suena natural en el marco de un testimonio forense.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene el valor explicativo o causal de la partícula sin forzar un calco incómodo al inicio de la réplica.
- source_word: αὐτοῦ λέγοντος
  english_pob_choice: him saying
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - mientras decía
  lexicon: BDAG
  rationale: En español, la construcción natural tras «oír» es infinitivo o cláusula de contenido; «lo oímos decir» conserva la relación de objeto con el discurso reportado.
- source_word: Ἰησοῦς ὁ Ναζωραῖος οὗτος
  english_pob_choice: this Jesus the Nazarene
  chosen_spanish: este Jesús el Nazareno
  alternatives_spanish:
  - este Jesús de Nazaret
  - este Nazareno Jesús
  lexicon: BDAG
  rationale: «El Nazareno» preserva el valor designativo/titular de ὁ Ναζωραῖος y permite conservar el demostrativo enfático «este». «De Nazaret» es una alternativa válida pero menos cercana al matiz titular del griego.
- source_word: καταλύσει
  english_pob_choice: will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - derribará
  - demolerá
  lexicon: BDAG
  rationale: En el contexto de «este lugar», el verbo expresa destrucción o derribo; «destruirá» es claro y suficientemente fuerte sin sobretraducir a un campo técnico específico.
- source_word: τὸν τόπον τοῦτον
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este templo
  - este recinto
  lexicon: BDAG
  rationale: El griego dice literalmente «este lugar». En la nota se explicita que el referente es el templo, pero el texto principal conserva la formulación exacta de los acusadores.
- source_word: ἀλλάξει
  english_pob_choice: will change
  chosen_spanish: cambiará
  alternatives_spanish:
  - alterará
  lexicon: BDAG
  rationale: «Cambiará» reproduce de manera natural el futuro de ἀλλάσσω y comunica el sentido sin arcaísmo.
- source_word: τὰ ἔθη
  english_pob_choice: the customs
  chosen_spanish: las costumbres
  alternatives_spanish:
  - las tradiciones
  - las prácticas
  lexicon: BDAG
  rationale: «Costumbres» refleja bien ἔθη como prácticas heredadas de la comunidad. «Tradiciones» sería posible, pero en español puede sonar más técnico o eclesiástico de lo que aquí exige el contexto.
- source_word: παρέδωκεν
  english_pob_choice: handed down
  chosen_spanish: entregó
  alternatives_spanish:
  - transmitió
  - dio
  lexicon: BDAG
  rationale: Para el valor de transmisión recibida, «entregó» funciona en español, aunque «transmitió» o «dejó» también podrían expresar mejor la idea de tradición heredada; se mantiene la sencillez de la acusación.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
theological_decisions:
- issue: Referente de «este lugar»
  english_pob_reading: Rendered as 'this place' in the main text, leaving the temple reference implicit.
  chosen_spanish_reading: Se mantiene «este lugar» y se aclara en nota que se refiere al templo.
  alternative_spanish_readings:
  - este templo
  - este santuario
  rationale: El griego usa τόπος, no un término explícito para templo. La nota conserva la referencia contextual sin sustituir la formulación concreta de la acusación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Matiz de hostilidad en «este Jesús el Nazareno»
  english_pob_reading: Preserved the hostile demonstrative in 'this Jesus the Nazarene.'
  chosen_spanish_reading: Se conserva el demostrativo despectivo/enfático «este» y el título «el Nazareno».
  alternative_spanish_readings:
  - Jesús de Nazaret
  - ese Jesús de Nazaret
  rationale: La forma mantiene la carga retórica del discurso indirecto de los acusadores sin suavizarla ni explicar de más.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y se contrastó con el audit trail inglés POB. No hubo revisiones aplicadas en la última pasada, y la correspondencia general con el texto fuente y las decisiones léxicas auditadas es alta.
  spanish_consistency_notes:
  - Se usa «Moisés» con acento ortográfico español estándar.
  - Se conserva el demostrativo «este» para reflejar el tono acusatorio del original.
  - Se emplea «el Nazareno» como equivalente más natural de ὁ Ναζωραῖος en un registro bíblico contemporáneo.
  - La nota de «este lugar» evita reemplazar el término del texto por «templo» en el cuerpo principal.
