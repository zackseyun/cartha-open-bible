revisions:
- from: Porque lo oímos decir que este Jesús el Nazareno[a] destruirá este lugar[b] y cambiará las costumbres[c] que Moisés nos entregó.
  to: Porque lo oímos decir que este Jesús el Nazareno[a] destruirá este lugar[b] y cambiará las costumbres[c] que Moisés nos transmitió.
  rationale: Se conserva la redacción general del borrador, pero se sustituye «entregó» por «transmitió» para reflejar mejor el sentido de παραδίδωμι como transmisión heredada de costumbres o tradiciones, no una entrega puntual. También se ajusta la nota alternativa para mantener coherencia léxica con el texto revisado.
