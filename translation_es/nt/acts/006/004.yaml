translation:
  language: es
  text: Pero nosotros nos dedicaremos a la oración y al ministerio[a] de la palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «servicio de la palabra». El término griego puede significar «servicio» o «ministerio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito se conserva naturalmente con «nosotros». En español, el contraste con la propuesta anterior queda bien marcado por «Pero» sin añadir una forma enfática innecesaria.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: La partícula adversativa expresa contraste con la tarea de servir a las mesas en el contexto inmediato. «Pero» transmite mejor ese giro en español.
- source_word: τῇ προσευχῇ
  english_pob_choice: to prayer
  chosen_spanish: en la oración
  alternatives_spanish:
  - a la oración
  - dedicados a la oración
  lexicon: BDAG
  rationale: El dativo con προσκαρτερέω señala la esfera de la dedicación perseverante. «En la oración» suena natural en español y preserva la idea de permanencia en esa práctica.
- source_word: τῇ διακονίᾳ
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - servicio ministerial
  lexicon: BDAG
  rationale: Aunque διακονία puede significar «servicio» o «ministerio», aquí el contraste con el servicio material de las mesas favorece «ministerio» para la tarea apostólica de proclamación, sin imponer una distinción rígida ajena al texto.
- source_word: τοῦ λόγου
  english_pob_choice: of the word
  chosen_spanish: de la palabra
  alternatives_spanish:
  - del mensaje
  - de la proclamación
  lexicon: BDAG
  rationale: «La palabra» conserva el giro cristiano temprano y refleja con transparencia λόγος en este contexto de anuncio. «De la palabra» mantiene la relación genitiva sin sobreexplicar.
- source_word: προσκαρτερήσομεν
  english_pob_choice: will devote ourselves
  chosen_spanish: persistiremos
  alternatives_spanish:
  - nos dedicaremos
  - perseveraremos
  - nos mantendremos constantes
  lexicon: BDAG
  rationale: El verbo expresa persistencia continua y adherencia firme. «Persistiremos» recoge bien la idea de mantenerse constantes en una tarea, y evita forzar una reflexividad que el griego no exige de manera explícita.
theological_decisions:
- issue: Cómo reflejar διακονία sin importar una distinción eclesial no explicitada
  english_pob_reading: ministry of the word
  chosen_spanish_reading: ministerio de la palabra
  alternative_spanish_readings:
  - servicio de la palabra
  rationale: El contexto contrasta esta labor con el servicio de las mesas, así que «ministerio» funciona en español como el equivalente más claro para la tarea de proclamación. Al mismo tiempo, el término sigue remitiendo a una forma de servicio, evitando convertir el versículo en una afirmación sobre una estructura clerical específica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without importing doctrinal claims.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y mantiene la decisión auditada del inglés POB de traducir προσκαρτερέω con una expresión de dedicación persistente. La única nota reproduce la alternativa lexical documentada para διακονία, adaptada al español.
  spanish_consistency_notes:
  - Se mantiene «palabra» para λόγος, en continuidad con la terminología cristiana temprana y con el audit trail en inglés.
  - Se evita «SEÑOR» o cualquier sustitución innecesaria, porque el versículo no contiene el nombre divino.
  - «Ministerio» se usa aquí por contraste contextual con el servicio de las mesas, no como importación doctrinal.
  - La nota a pie de página marca la alternativa «servicio» para conservar la tensión lexical de διακονία.
