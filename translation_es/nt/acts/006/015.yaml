translation:
  language: es
  text: Y todos los que estaban sentados en el consejo[a], al fijar la mirada en él, vieron su rostro como el rostro de un ángel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Sanedrín». El término griego designa al consejo gobernante judío.
    reason: cultural_note
lexical_decisions:
- source_word: ἀτενίσαντες
  english_pob_choice: fixing their eyes on
  chosen_spanish: fijando la mirada en
  alternatives_spanish:
  - mirándolo atentamente
  - clavando los ojos en él
  - mirándolo fijamente
  lexicon: BDAG
  rationale: El participio expresa una atención visual sostenida e intensa. «Fijando la mirada en» conserva esa fuerza sin sonar rígido en español y comunica mejor la intención narrativa que un simple «mirando».
- source_word: πάντες οἱ καθεζόμενοι
  english_pob_choice: all who were sitting
  chosen_spanish: todos los que estaban sentados
  alternatives_spanish:
  - todos los sentados
  - todos los que se hallaban sentados
  lexicon: BDAG
  rationale: La combinación subraya totalidad y estado de asiento. «Todos los que estaban sentados» mantiene ambas ideas con naturalidad en español.
- source_word: συνεδρίῳ
  english_pob_choice: the council
  chosen_spanish: el consejo
  alternatives_spanish:
  - el concilio
  - el Sanedrín
  - la asamblea
  lexicon: BDAG
  rationale: En español, «consejo» traduce directamente συνέδριον y evita imponer como texto principal un nombre técnico más interpretativo. «Sanedrín» queda como alternativa cultural válida, pero no se fuerza en el cuerpo principal.
- source_word: πρόσωπον
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - semblante
  lexicon: BDAG
  rationale: «Rostro» es natural y dignificado en español bíblico contemporáneo. Conserva el sentido visible y evita una coloquialidad excesiva de «cara».
- source_word: ὡσεὶ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - casi como
  lexicon: BDAG
  rationale: «Como» reproduce la comparación sin añadir matices que el griego no exige. Es la equivalencia más directa y clara en español.
- source_word: ἀγγέλου
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: En este contexto narrativo, ἄγγελος se entiende en su sentido sobrenatural habitual. «Un ángel» comunica adecuadamente la comparación sin desdibujarla con «mensajero».
theological_decisions:
- issue: Naturaleza de la semejanza en «como el rostro de un ángel»
  english_pob_reading: A simile describing Stephen's appearance as resembling that of an angel, without specifying the exact quality of resemblance.
  chosen_spanish_reading: Una comparación abierta del aspecto de Esteban con el de un ángel, sin precisar si la semejanza se refiere a resplandor, serenidad, autoridad celestial o una combinación de estos rasgos.
  alternative_spanish_readings:
  - Una referencia específica al resplandor glorioso
  - Una referencia a inocencia calma o majestad celestial
  rationale: El griego afirma semejanza, pero no define su calidad. La traducción conserva esa tensión teológica en vez de cerrarla con una explicación interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia; no se registran revisiones aplicadas y el sentido central permanece estable.
  spanish_consistency_notes:
  - Se mantuvo «consejo» en el texto principal para συνέδριον, con «Sanedrín» reservado a la nota cultural.
  - Se eligió «rostro» para πρόσωπον por naturalidad reverente en español.
  - La comparación final se dejó abierta con «como», sin intensificarla ni explicarla más allá del griego.
  - Se conservó el tono narrativo sobrio y la estructura de una sola oración coordinada.
