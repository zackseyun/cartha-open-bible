translation:
  language: es
  text: A estos[a] los presentaron ante los apóstoles, y después de orar, les impusieron[b] las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estos los pusieron delante de los apóstoles'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'impusieron las manos' puede indicar comisión pública, bendición u otro gesto ritual; el griego nombra la acción sin precisar aquí su alcance eclesial.
    reason: theological_note
lexical_decisions:
- source_word: οὓς
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - a quienes
  - a estos
  - esos
  lexicon: BDAG
  rationale: El relativo griego retoma a los siete hombres del contexto inmediato. En español, 'estos' conserva la referencia deíctica y evita añadir un sustantivo no presente en el texto.
- source_word: ἔστησαν
  english_pob_choice: set
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - presentaron
  - establecieron
  lexicon: BDAG
  rationale: El verbo causativo de ἵστημι admite la idea de poner o colocar delante de una autoridad. 'Pusieron delante' expresa el movimiento sin sobreinterpretar el acto.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: La preposición indica ubicación ante alguien. 'Delante de' es claro y natural en español, y conserva el sentido relacional de la escena.
- source_word: ἀποστόλων
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los emisarios
  lexicon: BDAG
  rationale: En Hechos, ἀπόστολοι designa al grupo apostólico reconocido. 'Apóstoles' mantiene el título establecido y evita desdibujar su función narrativa.
- source_word: προσευξάμενοι
  english_pob_choice: after praying
  chosen_spanish: después de orar
  alternatives_spanish:
  - habiendo orado
  - una vez que oraron
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. 'Después de orar' comunica con naturalidad la secuencia temporal en español.
- source_word: ἐπέθηκαν
  english_pob_choice: laid
  chosen_spanish: impusieron
  alternatives_spanish:
  - pusieron
  - colocaron
  lexicon: BDAG
  rationale: Con χεῖρας, la expresión idiomática bíblica habitual en español es 'imponer las manos'. 'Impusieron' conserva la fuerza ritual de la acción sin explicarla más de lo que el griego permite.
- source_word: αὐτοῖς
  english_pob_choice: on them
  chosen_spanish: les
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: BDAG
  rationale: En español, el dativo con 'imponer las manos' se expresa mejor mediante el pronombre indirecto 'les'. Es la forma idiomática que refleja el objeto de la acción.
- source_word: τὰς χεῖρας
  english_pob_choice: their hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  lexicon: BDAG
  rationale: El griego usa el artículo donde el español puede prescindir del posesivo. 'Las manos' es la formulación estable de la locución y mantiene la referencia al gesto ritual.
theological_decisions:
- issue: Significado del gesto de imposición de manos
  english_pob_reading: The Greek names the action without further defining its ecclesial meaning here.
  chosen_spanish_reading: El texto nombra la acción sin definir aquí su sentido eclesial pleno.
  alternative_spanish_readings:
  - los ordenaron
  - los comisionaron
  - les transmitieron autoridad
  rationale: El pasaje describe un gesto litúrgico o público, pero no especifica por sí mismo si se trata de ordenación, comisión o bendición. La traducción preserva esa tensión sin resolverla por adelantado.
  doctrine_reference: Mantener la tensión interpretativa; no imponer una lectura denominacional donde el griego no la explicita.
translation_notes:
  revision_awareness: Sigue la revisión inglesa más reciente al mantener una formulación breve y directa, sin añadir explicaciones interpretativas como 'los hombres' ni expandir el sentido del gesto. La decisión española conserva esa sobriedad y usa una locución bíblica natural ('imponer las manos') para el acto ritual.
  spanish_consistency_notes:
  - Se mantiene 'apóstoles' como término técnico del relato de Hechos.
  - Se prefiere la secuencia temporal explícita 'después de orar' para reflejar el participio aoristo.
  - Se evita traducir mecánicamente el relativo griego con un calco pesado; 'estos' funciona de manera natural en español.
  - No se introduce 'Cristo', 'Señor' ni otros términos no presentes en el versículo.
