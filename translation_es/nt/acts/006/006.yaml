revisions:
- from: Estos los pusieron delante de los apóstoles, y después de orar, les impusieron[a] las manos.
  to: A estos[a] los presentaron ante los apóstoles, y después de orar, les impusieron[b] las manos.
  rationale: Se ajusta la primera cláusula para un español más natural y eclesialmente legible ('A estos los presentaron ante los apóstoles'), sin perder el sentido de ἔστησαν ἐνώπιον. Además, se restaura en nota la alternativa léxica preservada por el POB en inglés. Se mantiene la nota sobre la imposición de manos y la secuencia 'después de orar' por fidelidad al participio aoristo antecedente.
