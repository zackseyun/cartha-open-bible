translation:
  language: es
  text: Así que agitaron[a] al pueblo y a los ancianos y a los escribas, y abalanzándose sobre él, lo apresaron y lo llevaron ante el Sanedrín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'incitaron'. El verbo griego συνεκίνησάν puede traducirse más específicamente como provocar o incitar, pero 'agitaron' conserva bien el matiz de mover y perturbar a la gente.
    reason: lexical_alternative
  - marker: b
    text: O 'consejo'. El griego συνέδριον puede verterse de manera más general, pero aquí probablemente se refiere de forma específica al consejo gobernante judío, el Sanedrín.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεκίνησάν
  english_pob_choice: stirred up
  chosen_spanish: agitaron
  alternatives_spanish:
  - incitaron
  - exasperaron
  - excitaron
  lexicon: BDAG
  rationale: συγκινέω aquí expresa provocar o poner en movimiento a personas en el plano social/emocional. 'Agitaron' conserva la idea de perturbar y mover a la multitud sin cargar el verbo con un matiz jurídico más fuerte que el contexto no exige. 'Incitaron' sería posible, pero en español puede sonar más deliberadamente legal o violento.
- source_word: τε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - entonces
  - —
  lexicon: BDAG
  rationale: La partícula τέ funciona como enlace suave. En español conviene reproducirla con una transición natural del relato, no de forma mecánica. 'Así que' expresa continuidad narrativa y resultado de modo idiomático.
- source_word: λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  - a la población
  lexicon: BDAG
  rationale: λαός suele significar 'pueblo' y en este contexto de Hechos refiere al público o la población. 'Al pueblo' mantiene la referencia más directa y amplia, sin estrecharla a una multitud específica.
- source_word: πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: a los ancianos
  alternatives_spanish:
  - a los líderes
  - a los mayores
  lexicon: BDAG
  rationale: En este marco judicial de Jerusalén, πρεσβύτεροι alude a dirigentes judíos reconocidos. 'Ancianos' conserva la designación tradicional y el valor institucional del término, más que una simple referencia etaria.
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: a los escribas
  alternatives_spanish:
  - a los maestros de la ley
  - a los doctores de la ley
  lexicon: BDAG
  rationale: γραμματεῖς designa a los escribas o expertos en la Escritura y la ley. 'Escribas' conserva el término histórico y la transparencia lexical mejor que una paráfrasis explicativa.
- source_word: ἐπιστάντες
  english_pob_choice: coming upon him
  chosen_spanish: acercándose sobre él
  alternatives_spanish:
  - presentándose de repente ante él
  - sorprendiéndolo
  - acometiéndolo
  lexicon: BDAG
  rationale: El participio de ἐφίστημι sugiere irrupción o acercamiento repentino. 'Acercándose sobre él' intenta preservar la abrupta acción previa al arresto; aunque suene algo enfático, mantiene la fuerza del original sin añadir violencia no explícita.
- source_word: συνήρπασαν
  english_pob_choice: seized
  chosen_spanish: lo apresaron
  alternatives_spanish:
  - lo sujetaron
  - lo agarraron
  - lo capturaron
  lexicon: BDAG
  rationale: συναρπάζω denota tomar por la fuerza. 'Apresaron' comunica una captura brusca y natural en español, manteniendo el carácter coercitivo del verbo sin introducir detalles de arrastre que pertenecen mejor al siguiente movimiento.
- source_word: ἤγαγον
  english_pob_choice: brought
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  - lo guiaron
  lexicon: BDAG
  rationale: ἄγω es un verbo amplio de llevar/conducir. 'Lo llevaron' es la opción más natural en español y sigue bien la secuencia después de la toma forzosa. 'Condujeron' podría sonar más formal, pero menos directo.
- source_word: συνέδριον
  english_pob_choice: the Sanhedrin
  chosen_spanish: el Sanedrín
  alternatives_spanish:
  - el consejo
  - el tribunal
  lexicon: BDAG
  rationale: En Hechos, συνέδριον suele referirse al consejo gobernante judío. 'Sanedrín' conserva la identificación histórica específica que el audit trail inglés decidió mantener. 'Consejo' es una alternativa válida, pero menos precisa aquí.
theological_decisions:
- issue: Identificación de συνέδριον en el contexto de Jerusalén
  english_pob_reading: the Sanhedrin
  chosen_spanish_reading: el Sanedrín
  alternative_spanish_readings:
  - el consejo
  rationale: La cuestión es histórica e institucional más que doctrinal. Dado el contexto de Hechos y la presencia de ancianos y escribas, el referente es el consejo gobernante judío. Mantener 'Sanedrín' evita neutralizar la especificidad del texto.
  doctrine_reference: Contexto judicial-histórico de Hechos 6; identificación del consejo judío supremo.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que corrigió 'before the Sanhedrin' frente a 'into the Sanhedrin'. Por eso en español usé 'ante el Sanedrín', que refleja correctamente la idea de comparecer delante del consejo, no de entrar en él.
  spanish_consistency_notes:
  - Mantuve 'Sanedrín' para συνέδριον siguiendo la decisión inglesa documentada y la especificidad histórica del pasaje.
  - Usé 'ancianos' para πρεσβύτεροι y 'escribas' para γραμματεῖς, preservando la terminología institucional habitual en Hechos.
  - Elegí 'apresaron' para συνήρπασαν para sostener el matiz de captura forzosa sin sobretraducir el verbo.
  - La frase 'ante el Sanedrín' sigue la revisión inglesa y evita una calca inexacta como 'en el Sanedrín'.
