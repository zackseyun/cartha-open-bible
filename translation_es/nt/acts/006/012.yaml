  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Escribas', 'ancianos' y 'Sanedrín' están alineados con las decisiones auditadas. La nota sobre 'Sanedrín' está bien planteada. No se requieren cambios teológicos ni de glosario, solo una mejora léxica/sintáctica en ἐπιστάντες.
