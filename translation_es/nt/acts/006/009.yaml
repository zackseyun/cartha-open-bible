  text: ἀνέστησαν δέ τινες τῶν ἐκ τῆς συναγωγῆς τῆς λεγομένης Λιβερτίνων καὶ Κυρηναίων καὶ Ἀλεξανδρέων καὶ τῶν ἀπὸ Κιλικίας καὶ Ἀσίας συζητοῦντες τῷ Στεφάνῳ,
base_translation:
  language: en
  yaml_path: translation/nt/acts/006/009.yaml
  text: But some of those from the synagogue called the Synagogue of the Freedmen[a], and of the Cyrenians and Alexandrians, and of those from Cilicia and Asia[b], stood up and began arguing with Stephen.
  footnotes:
  - marker: a
    text: Or 'the Libertines.' The Greek refers to freedmen, likely former slaves or descendants of such people; 'Freedmen' avoids the misleading modern sense of 'libertines.'
    reason: lexical_alternative
  - marker: b
    text: '''Asia'' here refers to the Roman province in western Asia Minor, not the continent of Asia in the modern sense.'
    reason: cultural_note
