translation:
  language: es
  text: Pero algunos de entre los de la sinagoga llamada la sinagoga de los Libertos[a], y de los cirenenses y alejandrinos, y de los de Cilicia y Asia[b], se levantaron y comenzaron a discutir con Esteban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los Libertinos». El griego se refiere a libertos, probablemente antiguos esclavos o descendientes de ellos; «Libertos» evita el sentido moderno engañoso de «libertinos».
    reason: lexical_alternative
  - marker: b
    text: «Asia» aquí se refiere a la provincia romana en el occidente de Asia Menor, no al continente de Asia en el sentido moderno.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέστησαν
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: BDAG
  rationale: El aoristo de ἀνίστημι aquí introduce una acción de oposición. En español, «se levantaron» conserva la imagen concreta y el matiz adversarial sin sonar rígido.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo con contraste respecto a lo anterior; «Pero» reproduce bien esa transición en español natural.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos hombres
  - algunas personas
  lexicon: BDAG
  rationale: Plural indefinido para un grupo no especificado; «algunos» es natural y fiel.
- source_word: τῶν ἐκ τῆς συναγωγῆς
  english_pob_choice: of those from the synagogue
  chosen_spanish: de los que eran de la sinagoga
  alternatives_spanish:
  - de los de la sinagoga
  - de los procedentes de la sinagoga
  lexicon: BDAG
  rationale: La construcción partitiva se expresa con claridad en español. «De los que eran de la sinagoga» mantiene la pertenencia/origen implícito sin forzar una paráfrasis.
- source_word: συναγωγῆς
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: Término estándar para el lugar o comunidad judía de reunión; no hay motivo para variar.
- source_word: τῆς λεγομένης
  english_pob_choice: called
  chosen_spanish: llamada
  alternatives_spanish:
  - conocida como
  - llamada la así denominada
  lexicon: BDAG
  rationale: Participio identificador; «llamada» es idiomático y transparente.
- source_word: Λιβερτίνων
  english_pob_choice: the Freedmen
  chosen_spanish: los Libertos
  alternatives_spanish:
  - los Freedmen
  - los libertinos
  lexicon: BDAG
  rationale: El griego refiere a libertos, no al sentido moderno de «libertinos». En español, «Libertos» comunica el grupo histórico y evita la confusión moral del término tradicional.
- source_word: Κυρηναίων
  english_pob_choice: the Cyrenians
  chosen_spanish: los cirenenses
  alternatives_spanish:
  - los de Cirene
  - los cirenos
  lexicon: BDAG
  rationale: Gentilicio de personas de Cirene; «cirenenses» es claro y español natural.
- source_word: Ἀλεξανδρέων
  english_pob_choice: Alexandrians
  chosen_spanish: los alejandrinos
  alternatives_spanish:
  - los de Alejandría
  lexicon: BDAG
  rationale: Gentilicio de personas de Alejandría; «alejandrinos» es la forma natural en español.
- source_word: τῶν ἀπὸ Κιλικίας καὶ Ἀσίας
  english_pob_choice: those from Cilicia and Asia
  chosen_spanish: de los de Cilicia y Asia
  alternatives_spanish:
  - de los procedentes de Cilicia y de Asia
  - de los cilicios y asiáticos
  lexicon: BDAG
  rationale: ἀπό con nombres de lugar expresa origen. «De los de...» conserva la construcción partitiva del griego. «Asia» se mantiene como topónimo histórico.
- source_word: συζητοῦντες
  english_pob_choice: began arguing with
  chosen_spanish: comenzaron a discutir con
  alternatives_spanish:
  - discutían con
  - se pusieron a debatir con
  lexicon: BDAG
  rationale: En contexto la acción es contenciosa, no neutral. «Comenzaron a discutir con» refleja bien el inicio de la oposición verbal y es idiomático en español.
- source_word: τῷ Στεφάνῳ
  english_pob_choice: Stephen
  chosen_spanish: Esteban
  alternatives_spanish:
  - con Esteban
  lexicon: BDAG
  rationale: Nombre propio estándar en español; el dativo se expresa naturalmente con «con» en la construcción verbal de «discutir con».
theological_decisions:
- issue: 'Sentido de Λιβερτίνων: grupo histórico vs. connotación moral moderna'
  english_pob_reading: Freedmen; avoids the misleading modern sense of 'libertines.'
  chosen_spanish_reading: Libertos; evita la idea moderna de «libertinos».
  alternative_spanish_readings:
  - Libertinos
  - Freedmen
  rationale: El griego apunta a personas manumitidas o descendientes de ellas. «Libertos» preserva ese dato histórico y evita una lectura moral ajena al texto.
  doctrine_reference: Lexical-historical note; no doctrinal claim.
- issue: Identificación de Ἀσία
  english_pob_reading: Roman province in western Asia Minor, not the continent of Asia.
  chosen_spanish_reading: Asia como provincia romana, no como el continente moderno.
  alternative_spanish_readings:
  - Asia
  - la provincia de Asia
  rationale: El texto alude a la provincia romana. La forma breve en el texto principal se mantiene, y la nota aclara el referente histórico para evitar anacronismo.
  doctrine_reference: Historical-geographical note; no doctrinal claim.
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto griego y del auditoría inglesa: se mantuvo el valor adversarial de ἀνέστησαν/συζητοῦντες, se evitó el falso amigo de «libertinos», y se conservó «Asia» con aclaración histórica. No se requirieron cambios de revisión adicionales.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y sobrio, con giros naturales en español.
  - Se prefirió «Esteban» como forma española usual del nombre propio.
  - Se conservó la estructura acumulativa del grupo mencionado sin simplificarla excesivamente.
  - No se introdujo terminología eclesiástica no sustentada por el griego.
