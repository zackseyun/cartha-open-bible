    issue: No se conservaron en español las notas léxicas opcionales presentes en el inglés.
    rationale: Las notas inglesas son principalmente alternativas estilísticas («el lugar santo», «no cesa de hablar», «hablando/diciendo cosas»). Su omisión no afecta la fidelidad del texto principal ni crea una ambigüedad nueva en español, por lo que no exige revisión.
