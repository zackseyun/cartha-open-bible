translation:
  language: es
  text: 'También presentaron falsos testigos que dijeron: «Este hombre no deja de hablar contra este lugar santo y la ley».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔστησάν
  english_pob_choice: set up
  chosen_spanish: presentaron
  alternatives_spanish:
  - pusieron
  - trajeron adelante
  lexicon: BDAG
  rationale: En este contexto forense, el verbo expresa que los testigos fueron puestos en escena o traídos para apoyar la acusación. En español, «presentaron» comunica la acción hostil y preparada sin sonar forzado.
- source_word: τε
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: La partícula añade otra acción al relato; «también» preserva el valor aditivo con naturalidad en español.
- source_word: μάρτυρας ψευδεῖς
  english_pob_choice: false witnesses
  chosen_spanish: falsos testigos
  alternatives_spanish:
  - testigos mentirosos
  lexicon: BDAG
  rationale: Es la expresión jurídica normal para testigos que dan falso testimonio. «Falsos testigos» conserva ese sentido legal y narrativo.
- source_word: λέγοντας
  english_pob_choice: who said
  chosen_spanish: que dijeron
  alternatives_spanish:
  - diciendo
  lexicon: BDAG
  rationale: En español, una subordinada con «que dijeron» suena más natural y mantiene el contenido de la declaración reportada.
- source_word: Ὁ ἄνθρωπος οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este tipo
  - Esta persona
  lexicon: BDAG
  rationale: La forma griega es despectiva en el contexto acusatorio, pero no exige un coloquialismo más fuerte en español. «Este hombre» es directo y fiel.
- source_word: οὐ παύεται
  english_pob_choice: does not stop
  chosen_spanish: no deja de
  alternatives_spanish:
  - no cesa de
  - nunca deja de
  lexicon: BDAG
  rationale: El valor aspectual expresa persistencia continua. «No deja de» comunica bien esa duración en español actual.
- source_word: λαλῶν
  english_pob_choice: speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - hablando
  lexicon: BDAG
  rationale: El participio se integra naturalmente como verbo en español. La revisión inglesa retiró «words» para evitar literalismo innecesario; por eso el español conserva el sentido idiomático de «hablar».
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en oposición a
  - acerca de
  lexicon: BDAG
  rationale: Con genitivo en una acusación hostil, κατά indica oposición dirigida contra el objeto mencionado.
- source_word: τοῦ τόπου τοῦ ἁγίου
  english_pob_choice: this holy place
  chosen_spanish: este lugar santo
  alternatives_spanish:
  - el lugar santo
  - este santo lugar
  lexicon: BDAG
  rationale: La expresión apunta al recinto sagrado, específicamente el templo en este contexto. «Lugar santo» evita imponer «templo» en el texto principal, pero mantiene la referencia cultual.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: En el trasfondo judío del pasaje, se refiere a la ley mosaica. «La ley» es claro y conserva el nivel de generalidad del griego.
theological_decisions:
- issue: Referencia de «este lugar santo»
  english_pob_reading: The accusation concerns the Jerusalem temple and the Mosaic law.
  chosen_spanish_reading: La acusación apunta al templo de Jerusalén y a la ley de Moisés, sin explicitarlo dentro del versículo.
  alternative_spanish_readings:
  - Una referencia más general a un lugar sagrado
  - Una alusión directa al templo
  rationale: El contexto narrativo da esa referencia, pero el griego del versículo dice literalmente «el lugar santo». Mantener «lugar santo» preserva la tensión entre la forma y el referente contextual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tono de la acusación falsa
  english_pob_reading: Retain the hostile legal tone without intensifying it beyond the Greek.
  chosen_spanish_reading: Conservar el tono hostil y judicial sin añadir calificativos interpretativos más fuertes.
  alternative_spanish_readings:
  - «blasfemando contra»
  - «hablando mal de»
  rationale: El griego reporta que hablaba contra el lugar santo y la ley, no usa aquí un verbo más fuerte. La traducción española sigue esa misma fuerza verbal.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que eliminó el literalismo innecesario de «words» y dejó el sentido idiomático de «speaking against». Por eso el español usa «hablar contra» sin añadir un objeto equivalente a «palabras».
  spanish_consistency_notes:
  - Se mantuvo «lugar santo» para respetar el griego y la nota contextual sobre el templo.
  - Se evitó «templo» en el texto principal, porque el POB inglés lo trató como glosa contextual, no como el término del versículo.
  - Se prefirió «ley» en minúscula para seguir el referente mosaico sin imponer mayúscula interpretativa.
