translation:
  language: es
  text: Esteban[a], lleno de gracia y de poder, hacía grandes prodigios y señales entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen 'lleno de fe y de poder' en lugar de 'lleno de gracia y de poder'.
    reason: textual_variant
lexical_decisions:
- source_word: Στέφανος
  english_pob_choice: Stephen
  chosen_spanish: Esteban
  alternatives_spanish:
  - Stephen
  lexicon: Nombre propio griego adaptado al español
  rationale: El nombre propio se vierte en la forma española establecida y reconocible en lectura eclesial, sin cambiar la referencia histórica del texto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: En español, el conector inicial puede omitirse sin pérdida de sentido para mantener un flujo natural; δέ aquí solo enlaza el relato y no exige una marca adversativa.
- source_word: πλήρης χάριτος καὶ δυνάμεως
  english_pob_choice: full of grace and power
  chosen_spanish: lleno de gracia y de poder
  alternatives_spanish:
  - lleno de favor y poder
  - colmado de gracia y poder
  lexicon: BDAG
  rationale: πλήρης con genitivos expresa una cualidad dominante; 'lleno de' reproduce bien esa construcción. Se conserva 'gracia' para χάρις, siguiendo el valor teológico y léxico principal en Hechos, y 'poder' para δύναμις en contexto de milagros.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: El griego leído por el texto base es χάριτος, no πίστεως. 'Gracia' traduce de forma directa y preserva la resonancia lucana; 'favor' queda como alternativa posible, pero menos fuerte para este contexto.
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - misterio
  lexicon: BDAG
  rationale: En Hechos, δύναμις suele referirse al poder divino operativo en señales y milagros. 'Poder' es la equivalencia más natural y fiel en español bíblico contemporáneo.
- source_word: ἐποίει
  english_pob_choice: was doing
  chosen_spanish: hacía
  alternatives_spanish:
  - estaba haciendo
  - realizaba
  lexicon: BDAG
  rationale: El imperfecto griego señala acción continuada o habitual en el pasado. 'Hacía' conserva esa duratividad sin sonar forzado en español; 'estaba haciendo' es posible pero más pesado.
- source_word: τέρατα καὶ σημεῖα μεγάλα
  english_pob_choice: great wonders and signs
  chosen_spanish: grandes prodigios y señales
  alternatives_spanish:
  - grandes maravillas y señales
  - grandes milagros y señales
  lexicon: BDAG
  rationale: '''Prodigios'' refleja bien τέρατα, con el matiz de hechos portentosos que causan asombro, y ''señales'' mantiene σημεῖα como actos con función indicativa. Se antepone ''grandes'' a ambos términos en sentido natural español, preservando el alcance del adjetivo.'
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en medio del pueblo
  lexicon: BDAG
  rationale: '''Entre el pueblo'' comunica el ámbito social del ministerio de Esteban de manera idiomática y cercana al uso bíblico; ''pueblo'' conserva la referencia colectiva del λαός.'
theological_decisions:
- issue: Variación textual χάριτος / πίστεως
  english_pob_reading: grace
  chosen_spanish_reading: gracia
  alternative_spanish_readings:
  - fe
  rationale: Se sigue el texto griego SBLGNT dado en el expediente, que lee χάριτος. La variante 'fe' se preserva como posibilidad textual significativa, pero no se incorpora al texto principal.
  doctrine_reference: Primacía del texto fuente y preservación de variantes textuales relevantes en nota
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios; la redacción española sigue directamente el texto griego SBLGNT y conserva en nota la variante textual relevante ya documentada en el expediente inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio en forma española estándar: Esteban.'
  - Se evitó traducir mecánicamente δέ con un conector inicial innecesario en español.
  - Se conservó la pareja lucana 'prodigios y señales' para respetar el paralelismo semántico de τέρατα καὶ σημεῖα.
  - La nota textual reproduce en español la variante documentada en el audit trail inglés.
  - '''Pueblo'' traduce λαός con valor colectivo, no como simple ''gente'' coloquial.'
