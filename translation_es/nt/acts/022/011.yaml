translation:
  language: es
  text: Y como no podía ver a causa del resplandor de aquella luz[a], guiado de la mano por los que estaban conmigo, llegué a Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a causa de la gloria de aquella luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And since
  chosen_spanish: Y como
  alternatives_spanish:
  - Y cuando
  - Pero como
  lexicon: BDAG
  rationale: En este contexto ὡς introduce la circunstancia que explica lo sucedido; en español, «y como» comunica bien la relación causal/circunstancial sin forzar una simple secuencia temporal.
- source_word: ἐνέβλεπον
  english_pob_choice: could not see
  chosen_spanish: no podía ver
  alternatives_spanish:
  - no podía mirar
  - no veía con claridad
  lexicon: BDAG
  rationale: El imperfecto de ἐμβλέπω puede referirse a mirar o ver. Aquí el efecto práctico de la luz es la imposibilidad de ver, y «no podía ver» expresa naturalmente ese resultado.
- source_word: ἀπὸ τῆς δόξης τοῦ φωτὸς ἐκείνου
  english_pob_choice: because of the brightness of that light
  chosen_spanish: a causa del resplandor de aquella luz
  alternatives_spanish:
  - a causa de la gloria de aquella luz
  - a causa del esplendor de aquella luz
  lexicon: BDAG
  rationale: δόξα suele ser «gloria», pero aquí describe el fulgor visible que ocasiona la ceguera temporal. «Resplandor» conserva la fuerza visual y evita imponer un matiz más abstracto de «gloria» en el cuerpo principal.
- source_word: χειραγωγούμενος
  english_pob_choice: being led by the hand
  chosen_spanish: siendo conducido de la mano
  alternatives_spanish:
  - siendo guiado de la mano
  - tomado de la mano
  lexicon: BDAG
  rationale: El participio contiene la idea concreta de guía manual. «Conducido de la mano» mantiene esa imagen de forma natural en español.
- source_word: ὑπὸ τῶν συνόντων μοι
  english_pob_choice: by those who were with me
  chosen_spanish: por los que estaban conmigo
  alternatives_spanish:
  - por mis acompañantes
  - por los que me acompañaban
  lexicon: BDAG
  rationale: La frase griega enfatiza simplemente la presencia/compañía de quienes estaban con Pablo. «Los que estaban conmigo» preserva esa relación sin añadir una categoría más formal.
- source_word: ἦλθον εἰς Δαμασκόν
  english_pob_choice: I came into Damascus
  chosen_spanish: llegué a Damasco
  alternatives_spanish:
  - entré en Damasco
  - vine a Damasco
  lexicon: BDAG
  rationale: Aunque εἰς puede reproducirse con «a/ en/ dentro de», en español «llegué a Damasco» comunica con naturalidad el movimiento de llegada sin perder el destino.
theological_decisions:
- issue: δόξα en un contexto teofánico y físico
  english_pob_reading: brightness
  chosen_spanish_reading: resplandor
  alternative_spanish_readings:
  - gloria
  - esplendor
  rationale: El texto refiere la luz que cegó a Pablo; por eso el cuerpo del verso debe expresar el efecto visible inmediato. «Resplandor» sostiene la referencia al carácter extraordinario de la luz, mientras la nota preserva la lectura más literal «gloria».
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y la solución auditada en inglés, pero adapta la sintaxis al español para mantener naturalidad sin perder la relación causal de ὡς δὲ, la concreción de χειραγωγούμενος y el matiz físico de δόξα en este contexto.
  spanish_consistency_notes:
  - Se mantiene «Damasco» como topónimo usual en español.
  - Se usa «luz» en femenino, concordando con el referente español de φῶς en este contexto traducido.
  - Se preserva la imagen concreta de guía manual con «de la mano».
