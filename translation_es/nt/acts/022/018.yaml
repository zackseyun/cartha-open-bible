revisions:
- from: 'y vi que él me decía[a]: «Apresúrate y sal pronto de Jerusalén, porque no aceptarán tu testimonio acerca de mí».'
  to: 'y lo vi diciéndome: «Apresúrate y sal pronto de Jerusalén, porque no aceptarán[a] tu testimonio acerca de mí».'
  rationale: Se ajusta la apertura a «y lo vi diciéndome» para reflejar mejor la construcción griega καὶ ἰδεῖν αὐτὸν λέγοντά μοι con español natural, sin añadir el «que» ni el sujeto explícito innecesario. Se reubica la nota al pie al verbo «aceptarán» para preservar la alternativa léxica relevante del rastro inglés («receive» → «recibirán»). No se requieren cambios doctrinales ni adjudicación adicional.
