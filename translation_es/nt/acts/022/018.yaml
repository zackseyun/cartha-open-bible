translation:
  language: es
  text: 'y lo vi diciéndome: «Apresúrate y sal pronto de Jerusalén, porque no aceptarán[a] tu testimonio acerca de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibirán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδεῖν
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - veí
  - miré y vi
  lexicon: BDAG
  rationale: El infinitivo aoristo en esta construcción narrativa funciona idiomáticamente como continuación del relato de la visión. En español, el pretérito simple «vi» comunica de modo natural la percepción visionaria sin introducir una paráfrasis innecesaria.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - a él
  - el Señor
  lexicon: BDAG
  rationale: El pronombre remite al personaje visto en la visión previa. «Él» conserva la referencia pronominal sin resolver interpretativamente el referente dentro del versículo.
- source_word: λέγοντά μοι
  english_pob_choice: saying to me
  chosen_spanish: me decía
  alternatives_spanish:
  - diciéndome
  - me hablaba
  lexicon: BDAG
  rationale: El participio presente se vierte con un imperfecto narrativo en español para expresar acción en curso dentro de la visión. «Me decía» conserva el valor verbal y suena natural en español contemporáneo.
- source_word: Σπεῦσον
  english_pob_choice: Hurry
  chosen_spanish: Apresúrate
  alternatives_spanish:
  - Date prisa
  - Date prisa enseguida
  lexicon: BDAG
  rationale: El aoristo imperativo expresa urgencia. «Apresúrate» mantiene el tono imperativo y la inmediatez sin caer en un calco rígido.
- source_word: ἔξελθε
  english_pob_choice: get out
  chosen_spanish: sal
  alternatives_spanish:
  - sal de allí
  - vete
  lexicon: BDAG
  rationale: El imperativo de ἐξέρχομαι indica salir de un lugar. «Sal» es la forma más directa y fiel en español; el complemento posterior ya precisa el punto de partida.
- source_word: ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - con premura
  - sin demora
  lexicon: BDAG
  rationale: La frase adverbial intensifica la urgencia de la orden. En combinación con «Apresúrate», «pronto» evita una duplicación excesivamente pesada de adverbios y preserva la rapidez exigida por el griego.
- source_word: ἐξ Ἰερουσαλήμ
  english_pob_choice: out of Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - fuera de Jerusalén
  - sal de Jerusalén
  lexicon: BDAG
  rationale: La preposición ἐξ marca salida desde el lugar. En español, con el verbo «sal» ya presente, «de Jerusalén» comunica el punto de partida de manera natural y suficiente.
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la causa de la orden. «Porque» es la conjunción causal más natural y transparente en español.
- source_word: οὐ παραδέξονταί
  english_pob_choice: they will not accept
  chosen_spanish: no aceptarán
  alternatives_spanish:
  - no recibirán
  - no admitirán
  lexicon: BDAG
  rationale: El futuro medio de παραδέχομαι aquí expresa no aceptar o no recibir favorablemente. «No aceptarán» reproduce bien el sentido y el registro del enunciado.
- source_word: σου μαρτυρίαν
  english_pob_choice: your testimony
  chosen_spanish: tu testimonio
  alternatives_spanish:
  - tu testimonio o testificación
  - tu testimonio como testigo
  lexicon: BDAG
  rationale: μαρτυρία tiene sentido legal/proclamatorio. «Testimonio» es el equivalente natural en español y mantiene el matiz de declaración dada como testigo.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: περί con genitivo indica referencia temática. «Acerca de mí» preserva ese valor relacional con un español claro y digno.
theological_decisions:
- issue: Identidad del interlocutor en la visión
  english_pob_reading: The verse retains the pronoun 'him' rather than supplying 'the Lord' or 'Jesus' in the main text.
  chosen_spanish_reading: Se conserva «él» sin añadir «el Señor» o «Jesús» al cuerpo del versículo.
  alternative_spanish_readings:
  - «y vi al Señor diciéndome…»
  - «y vi a Jesús diciéndome…»
  rationale: El griego usa un pronombre, y el contexto anterior identifica al hablante. Para respetar la primacía del texto fuente y no resolver de antemano una referencia que el versículo no explicita, se mantiene la forma pronominal.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve tension rather than resolve it
translation_notes:
  revision_awareness: El texto griego y el informe inglés muestran alta concordancia y no registran revisiones aplicadas; por tanto, la propuesta española sigue de cerca la lectura estable del audit trail, conservando la referencia pronominal y la doble idea de urgencia.
  spanish_consistency_notes:
  - Se mantuvo «testimonio» para μαρτυρία, en línea con la decisión inglesa, por su naturalidad legal y proclamatoria en español.
  - Se evitó introducir «Cristo» o «Señor» donde el griego sólo tiene pronombres, para no resolver interpretativamente el referente.
  - La urgencia del doble imperativo se reproduce con «Apresúrate» y «pronto», cuidando que el español no suene redundante pero sí enfático.
  - Se prefirió «acerca de mí» para περὶ ἐμοῦ por ser una preposición de referencia clara y idiomática en español.
