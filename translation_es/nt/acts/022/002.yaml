translation:
  language: es
  text: 'Pero cuando oyeron que les hablaba en lengua hebrea[a], guardaron aún más silencio. Y dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en arameo»; el griego dice «en la lengua hebrea», lo cual en este contexto puede referirse a la lengua semítica local de Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Cuando oyeron» conserva esa relación de tiempo de forma natural en español y evita un calco pesado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo leve. «Pero» comunica bien el cambio en la reacción de la multitud, en línea con el valor discursivo de δέ.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  english_pob_choice: in the Hebrew language
  chosen_spanish: en lengua hebrea
  alternatives_spanish:
  - en el dialecto hebreo
  - en arameo
  lexicon: BDAG
  rationale: La expresión griega dice literalmente «en el dialecto/lengua hebrea». «Lengua hebrea» conserva el término del texto base sin forzar una decisión interpretativa en el cuerpo principal. «Arameo» es una posibilidad contextual, pero se mantiene en nota porque el griego no la explicita.
- source_word: προσεφώνει
  english_pob_choice: was addressing
  chosen_spanish: les hablaba
  alternatives_spanish:
  - les estaba hablando
  - se dirigía a ellos
  lexicon: BDAG
  rationale: El imperfecto indica una acción en curso. «Les hablaba» transmite el habla dirigida a la multitud con naturalidad en español; «se dirigía a ellos» sería más formal, pero menos directo.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se integra naturalmente con el verbo español. «Les» conserva la referencia al destinatario sin añadir redundancia innecesaria.
- source_word: μᾶλλον
  english_pob_choice: even more
  chosen_spanish: aún más
  alternatives_spanish:
  - todavía más
  - más
  lexicon: BDAG
  rationale: El adverbio comparativo intensifica el efecto de la escena. «Aún más» reproduce esa intensificación de manera idiomática.
- source_word: παρέσχον ἡσυχίαν
  english_pob_choice: they became even more quiet
  chosen_spanish: guardaron aún más silencio
  alternatives_spanish:
  - se callaron aún más
  - mostraron aún más silencio
  - quedaron aún más quietos
  lexicon: BDAG
  rationale: La expresión griega literalmente implica «proporcionar silencio». En español, «guardar silencio» expresa el resultado con naturalidad y mantiene la intensificación comparativa; «guardaron aún más silencio» conserva mejor la imagen idiomática que una paráfrasis más libre.
- source_word: καὶ φησίν
  english_pob_choice: 'And he said:'
  chosen_spanish: 'Y dijo:'
  alternatives_spanish:
  - 'Y dice:'
  - 'Entonces dijo:'
  lexicon: BDAG
  rationale: El presente histórico φησίν suele verterse con pasado en narrativa española por claridad y fluidez. «Y dijo:» introduce correctamente el discurso directo.
theological_decisions:
- issue: Sentido de «lengua hebrea» en contexto
  english_pob_reading: Retain 'Hebrew' in the main text
  chosen_spanish_reading: Mantener «lengua hebrea» en el texto principal
  alternative_spanish_readings:
  - Entenderlo como «arameo» en el texto principal
  rationale: Es una cuestión histórica/lingüística más que doctrinal. El griego nombra explícitamente la lengua hebrea, así que el cuerpo principal conserva esa designación. La posibilidad de arameo se señala en nota como inferencia contextual, no como sustitución del texto.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
translation_notes:
  revision_awareness: El expediente inglés no muestra revisiones aplicadas y la última pasada de revisión indica que no se necesitaban cambios; este borrador sigue esa lectura estable, preservando la misma decisión principal sobre «lengua hebrea» y la nota alternativa contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - Se evita «Cristo», «SEÑOR» y otros términos no pertinentes para no introducir material ajeno al versículo.
  - «Silencio» se eligió para reflejar la locución idiomática griega sin perder la intensidad comparativa de μᾶλλον.
  - El estilo mantiene un registro bíblico moderno y claro, sin arcaísmos innecesarios.
