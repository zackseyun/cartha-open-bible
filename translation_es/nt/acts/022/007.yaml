review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: caída al suelo, oír una voz, doble vocativo y pregunta directa con ''me''. Sin embargo, la decisión de traducir διώκεις como ''persigues'' no preserva adecuadamente la decisión léxica auditada del POB en este contexto, donde el sentido contextual preciso es ''perseguir'' en el sentido de hostigar/perseguir religiosamente, es decir, ''perseguir'' como ''persecución'' en español se expresa mejor con ''perseguir'' no siempre basta; aquí ''perseguir'' puede sonar demasiado físico o neutral. ''Perseguir'' en la frase interrogativa también pierde la fuerza teológica contextual de hostility toward believers identified with Jesús. ''¿Por qué me persigues?'' es entendible, pero ''¿por qué me persigues?'' en español puede funcionar; aun así, dado el rastro inglés y la rationale, la forma más fiel y clara es ''¿por qué me persigues?'' versus ''¿por qué me persigues?''. El problema real mayor es la elección de ''Saulo''
    frente al inglés auditado ''Saul'' y al griego Σαούλ: en español bíblico y eclesial para este pasaje la forma más reconocible y fiel a la transliteración tradicional del nombre aquí es ''Saulo'', así que esto no exige cambio. La revisión necesaria se centra en mejorar la precisión contextual de διώκεις a ''persigues'' -> ''persigues'' o ''persigues con persecución'' no. La mejor corrección es ''¿por qué me persigues?''? No, el término español estándar para persecución religiosa es precisamente ''persigues''. Por tanto la alineación fuente es mayormente buena, pero hay una pequeña cuestión de naturalidad en ''que me decía'' frente a la inmediatez de λεγούσης; ''que me decía'' es aceptable. La reparación más justificada es estilística mínima: ''oí una voz que me decía'' puede conservarse.'
  spanish_quality_summary: 'El español es natural, claro y de registro digno. ''Caí al suelo'' y ''oí una voz que me decía'' son fluidos. El principal punto mejorable es la consistencia interna de la justificación léxica de διώκεις: la traducción del texto es legible, pero la rationale del borrador genera ambigüedad innecesaria sobre una opción que en español sí comunica bien el sentido contextual. También conviene corregir el pequeño defecto tipográfico en la decisión léxica de τί, donde falta cerrar la expresión ''¿por qué?''. No se requieren notas.'
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La forma 'Saulo' es aceptable en español eclesial para Σαούλ en Hechos, aunque el inglés use 'Saul'. Se preserva el 'me' teológicamente importante sin expansión. La única mejora recomendada es ajustar el verbo a 'persigues' con rationale que explicite que en español esa forma ya puede abarcar persecución hostil según el contexto; no hace falta introducir 'persigues' -> 'persigues' cambio textual mayor.
  issues:
  - severity: medium
    issue: La rationale de διώκεις no refleja con suficiente claridad la decisión contextual del POB sobre 'persecute'.
    rationale: El texto español 'persigues' puede mantenerse, pero la explicación dada vacila entre un sentido general y el especializado de persecución hostil. En este contexto conviene explicitar que 'persigues' en español, dentro de Hechos, comunica persecución religiosa por el contexto, o considerar 'persigues' como texto final con rationale más nítida.
  - severity: low
    issue: Pequeño defecto tipográfico en la decisión léxica de τί.
    rationale: La forma elegida aparece como '¿por qué' sin cierre, lo que debe corregirse en la documentación.
  revised_spanish_text: 'Caí al suelo y oí una voz que me decía: «Saulo, Saulo, ¿por qué me persigues?»'
  revision_rationale: 'El texto principal puede conservarse tal como está porque es fiel, natural y teológicamente preciso. Se marca ''revise'' por una reparación menor de calidad editorial/documental: aclarar la rationale de διώκεις para alinearla mejor con la decisión contextual del POB y corregir el pequeño detalle tipográfico en la documentación léxica de τί. No se requieren cambios en el texto bíblico ni notas al pie.'
