translation:
  language: es
  text: 'Caí al suelo y oí una voz que me decía: «Saulo, Saulo, ¿por qué me persigues?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔπεσά
  english_pob_choice: I fell
  chosen_spanish: Caí
  alternatives_spanish:
  - Caí al suelo
  - Me caí
  lexicon: πίπτω
  rationale: El aoristo de πίπτω se vierte naturalmente con pasado simple en español. “Caí” conserva la acción puntual y evita añadir una repetición innecesaria de la caída; el complemento siguiente ya especifica el lugar. “Me caí” es posible, pero introduce un matiz reflexivo no exigido por el griego.
- source_word: εἰς τὸ ἔδαφος
  english_pob_choice: to the ground
  chosen_spanish: al suelo
  alternatives_spanish:
  - a tierra
  - a la tierra
  lexicon: ἔδαφος
  rationale: La frase expresa el destino del movimiento y en español se dice con naturalidad “al suelo”. “A tierra” o “a la tierra” son posibles, pero suenan menos idiomáticas en este contexto narrativo.
- source_word: ἤκουσα
  english_pob_choice: heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: ἀκούω
  rationale: El aoristo de ἀκούω se traduce aquí con un pretérito simple. “Oí” es la opción más directa y sobria; “escuché” puede sugerir una acción más intencional que el griego no requiere.
- source_word: φωνῆς λεγούσης μοι
  english_pob_choice: a voice saying to me
  chosen_spanish: una voz que me decía
  alternatives_spanish:
  - una voz hablándome
  - una voz diciendo
  lexicon: φωνή / λέγω
  rationale: 'La construcción participial se vierte con relativa natural en español: “una voz que me decía”. Esto conserva tanto la voz como el acto simultáneo de hablar. “Diciendo” sería más literal pero menos natural; “hablándome” desplaza el foco del contenido verbal.'
- source_word: Σαοὺλ Σαούλ
  english_pob_choice: Saul, Saul
  chosen_spanish: «Saulo, Saulo»
  alternatives_spanish:
  - «Saúl, Saúl»
  lexicon: Σαούλ
  rationale: Se mantiene la repetición enfática de la vocación directa. Se elige “Saulo” porque es una transliteración más estable en español para el nombre del perseguidor antes de su cambio narrativo posterior. “Saúl” también es posible y más tradicional, pero “Saulo” ayuda a distinguir el nombre semita del rey bíblico homónimo.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué
  - ¿a qué fin
  lexicon: τίς
  rationale: En esta pregunta con verbo de acción, τί se entiende naturalmente como indagación de causa. “¿Por qué?” reproduce bien el sentido idiomático y la fuerza interrogativa.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: ἐγώ
  rationale: El pronombre de objeto directo se conserva sin expansión para mantener la identificación directa del interlocutor con la acción de perseguir.
- source_word: διώκεις
  english_pob_choice: are you persecuting
  chosen_spanish: persigues
  alternatives_spanish:
  - persecutes
  - acosas
  lexicon: διώκω
  rationale: διώκω admite el sentido general de “perseguir” y, en contexto de hostilidad religiosa, el de “perseguir/perseguir con violencia” o “perseguir” en sentido de persecución. En español, “persigues” preserva el verbo sin anticipar demasiado una lectura interpretativa. Se deja la tensión semántica para el contexto inmediato, donde la persecución queda claramente cargada de hostilidad.
theological_decisions:
- issue: Relación entre la persecución a los discípulos y la identificación del hablante con “me”
  english_pob_reading: Retain the direct first-person 'me' without explanatory expansion.
  chosen_spanish_reading: 'Conservar el “me” directo: “¿por qué me persigues?”'
  alternative_spanish_readings:
  - ¿por qué persigues a mis seguidores?
  - ¿por qué persigues a mi pueblo?
  rationale: El texto griego formula la identificación de manera inmediata y deliberadamente breve. El español debe mantener esa tensión teológica sin aclararla. Expandir a “mis seguidores” o “mi pueblo” suavizaría la afirmación explícita del hablante.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Valor aspectual de διώκεις en discurso directo
  english_pob_reading: are you persecuting
  chosen_spanish_reading: persigues
  alternative_spanish_readings:
  - estás persiguiendo
  - perseguías
  rationale: El presente griego en discurso directo puede sonar durativo o actual. En español, el presente simple “persigues” comunica bien la acción vigente sin forzar un progresivo que no pertenece al sistema normal del idioma ni diluir el valor verbal del original.
  doctrine_reference: Aspecto verbal y traducción del presente histórico/directo
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el registro narrativo del inglés POB auditado. No se observan revisiones previas aplicadas en el paquete; se mantiene una solución estable, idiomática y fuente‑congruente.
  spanish_consistency_notes:
  - Se usa “al suelo” para εἰς τὸ ἔδαφος, en armonía con el español narrativo natural.
  - Se prefiere “Saulo” como forma transliterada coherente en este registro, sin alterar el contenido del nombre propio.
  - Se conserva “persigues” para διώκεις, manteniendo la fuerza de la acusación sin añadir paráfrasis.
  - La puntuación reproduce una cita directa clara y publicable en español.
