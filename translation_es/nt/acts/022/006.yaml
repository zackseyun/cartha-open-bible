translation:
  language: es
  text: Ahora bien, sucedió que, mientras yo viajaba y me acercaba a Damasco, como al mediodía, de repente una luz[a] intensa del cielo resplandeció alrededor de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran luz». La expresión griega puede enfatizar la magnitud o la intensidad de la luz.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δέ
  english_pob_choice: Now it happened that
  chosen_spanish: Entonces ocurrió que
  alternatives_spanish:
  - Y sucedió que
  - Ahora bien, sucedió que
  lexicon: γίνομαι; δέ
  rationale: Expresa la fuerza introductoria narrativa de ἐγένετο y la conexión suave de δέ sin sonar forzado en español. «Entonces» mantiene el avance del relato; «ocurrió» conserva el sentido eventivo.
- source_word: πορευομένῳ
  english_pob_choice: as I was traveling
  chosen_spanish: mientras yo viajaba
  alternatives_spanish:
  - mientras iba
  - mientras yo iba viajando
  lexicon: πορεύομαι
  rationale: El participio presente indica acción en curso; «mientras yo viajaba» comunica el movimiento continuo de manera natural y clara.
- source_word: ἐγγίζοντι τῇ Δαμασκῷ
  english_pob_choice: and drawing near to Damascus
  chosen_spanish: y me acercaba a Damasco
  alternatives_spanish:
  - y me aproximaba a Damasco
  - y al acercarme a Damasco
  lexicon: ἐγγίζω
  rationale: La construcción participial con dativo señala acercamiento a un destino; «me acercaba a Damasco» reproduce bien esa dirección sin calco rígido.
- source_word: περὶ μεσημβρίαν
  english_pob_choice: about noon
  chosen_spanish: como al mediodía
  alternatives_spanish:
  - hacia el mediodía
  - aproximadamente al mediodía
  lexicon: μεσημβρία
  rationale: «Como al mediodía» conserva el valor aproximado de περὶ y es idiomático en español.
- source_word: ἐξαίφνης
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - de pronto
  lexicon: ἐξαίφνης
  rationale: «De repente» es una equivalencia natural que preserva la irrupción inesperada del evento.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo, desde el cielo abierto
  lexicon: οὐρανός
  rationale: En español, «cielo» mantiene la imagen vertical y la posible referencia trascendente del contexto; «cielo» evita que la frase suene artificial. En esta línea no se introduce «señor» ni una sustitución devocional, porque el griego dice literalmente «del cielo».
- source_word: περιαστράψαι
  english_pob_choice: flashed around
  chosen_spanish: brilló alrededor de mí
  alternatives_spanish:
  - resplandeció alrededor de mí
  - relampagueó alrededor de mí
  lexicon: περιαστράπτω
  rationale: El compuesto expresa un resplandor súbito que rodea al sujeto; «brilló alrededor de mí» conserva el efecto envolvente y evita exagerar con una imagen meteorológica si el español lo hiciera sonar menos natural.
- source_word: φῶς ἱκανὸν
  english_pob_choice: a bright light
  chosen_spanish: una luz intensa
  alternatives_spanish:
  - una luz grande
  - una luz brillante
  lexicon: φῶς; ἱκανός
  rationale: La frase puede señalar magnitud o intensidad. «Intensa» comunica bien el impacto del resplandor sin cerrar indebidamente la posibilidad semántica de «grande»; por eso se añade nota textual sobre la alternativa.
- source_word: περὶ ἐμέ
  english_pob_choice: around me
  chosen_spanish: alrededor de mí
  alternatives_spanish:
  - en torno a mí
  lexicon: περί
  rationale: Equivale de forma directa y natural al valor espacial de περί con el acusativo.
theological_decisions:
- issue: οὐρανός en ἐκ τοῦ οὐρανοῦ
  english_pob_reading: from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - desde el cielo (o desde el cielo, con sentido de procedencia divina)
  - del cielo
  rationale: En Hechos, la expresión puede señalar no solo procedencia espacial sino también origen trascendente. «Desde el cielo» conserva ambas posibilidades sin domesticar el texto como mero fenómeno atmosférico. No se añade una afirmación doctrinal extra; se deja la ambigüedad reverente del contexto.
  doctrine_reference: Hechos 22:6; nota contextual de tradición lexical POB sobre οὐρανός
translation_notes:
  revision_awareness: Se siguió el análisis y la conclusión de alta concordancia del expediente inglés; no se detectaron revisiones aplicadas en el pass más reciente. La redacción española conserva la secuencia narrativa, el valor aspectual de los participios y la ambigüedad léxica de φῶς ἱκανὸν mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Damasco» como nombre propio sin preposición añadida innecesaria.
  - Se prefirió «cielo» para οὐρανός por contexto trascendente, no «SEÑOR» ni otra paráfrasis.
  - «Luz intensa» deja abierta la alternativa «luz grande», conforme al expediente.
  - El orden de los complementos intenta sonar natural en español sin perder la progresión del griego.
