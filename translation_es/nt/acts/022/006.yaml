revisions:
- from: Entonces ocurrió que, mientras yo viajaba y me acercaba a Damasco, como al mediodía, de repente una luz[a] intensa desde el cielo brilló alrededor de mí.
  to: Ahora bien, sucedió que, mientras yo viajaba y me acercaba a Damasco, como al mediodía, de repente una luz[a] intensa del cielo resplandeció alrededor de mí.
  rationale: Se ajusta la transición narrativa a un español más natural y digno; se cambia 'desde el cielo' por 'del cielo' para alinearlo mejor con la decisión auditada 'from heaven' y con el matiz trascendente del contexto; y se fortalece el verbo a 'resplandeció' para reflejar mejor el destello envolvente de περιαστράψαι. También se mejora la alternativa de nota a 'gran luz', más idiomática que 'luz grande' en español.
  reviewer_model: gpt-5.4
