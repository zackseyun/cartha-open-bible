translation:
  language: es
  text: Pero al día siguiente, queriendo saber con certeza de qué era acusado por los judíos[a], lo desató, y ordenó que se reunieran los principales sacerdotes y todo el consejo[b]; y, después de bajar a Pablo, lo puso delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los dirigentes judíos» o «por los judeanos». El griego dice «por los judíos»; en este contexto se refiere a los acusadores de Pablo, no a toda persona judía sin distinción.
    reason: lexical_alternative
  - marker: b
    text: «Consejo» se refiere al Sanedrín, el cuerpo gobernante judío de Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  english_pob_choice: But on the next day
  chosen_spanish: Pero al día siguiente
  alternatives_spanish:
  - Y al día siguiente
  - Ahora, al día siguiente
  lexicon: BDAG
  rationale: La expresión temporal idiomática se rinde naturalmente como «al día siguiente». «Pero» conserva el matiz secuencial/adversativo ligero de δέ sin exagerarlo.
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  - queriendo saber
  lexicon: BDAG
  rationale: El participio expresa propósito o intención del oficial. «Queriendo» suena natural en español y mantiene la relación con el infinitivo siguiente.
- source_word: γνῶναι τὸ ἀσφαλές
  english_pob_choice: to know for certain
  chosen_spanish: saber con certeza
  alternatives_spanish:
  - conocer con certeza
  - saber con seguridad
  - averiguar con certeza
  lexicon: BDAG
  rationale: La construcción comunica certeza verificable; «saber con certeza» es fiel y claro en español contemporáneo.
- source_word: τὸ τί κατηγορεῖται
  english_pob_choice: what he was being accused of
  chosen_spanish: de qué lo acusaban
  alternatives_spanish:
  - de qué era acusado
  - cuál era la acusación contra él
  lexicon: BDAG
  rationale: El pasivo griego se expresa de forma natural en español con una subordinada interrogativa indirecta. «De qué lo acusaban» conserva el contenido acusatorio sin forzar el pasivo.
- source_word: ὑπὸ τῶν Ἰουδαίων
  english_pob_choice: by the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los líderes judíos
  - los judeanos
  lexicon: BDAG
  rationale: Se conserva el referente lexical del griego. En este contexto, la nota puede aclarar que se trata de los acusadores de Pablo, sin estrechar indebidamente la forma del texto principal.
- source_word: ἔλυσεν αὐτόν
  english_pob_choice: he released him
  chosen_spanish: lo soltó
  alternatives_spanish:
  - lo liberó
  - lo desató
  lexicon: BDAG
  rationale: λύω puede significar desatar, soltar o liberar. En este contexto de custodia romana, «lo soltó» comunica la acción de forma breve y natural; la opción «lo liberó» también sería posible, pero «soltó» mantiene mejor la imagen de liberar de la sujeción inmediata.
- source_word: ἐκέλευσεν συνελθεῖν
  english_pob_choice: ordered ... to assemble
  chosen_spanish: ordenó que se reunieran
  alternatives_spanish:
  - mandó que se reunieran
  - dio orden de que se reunieran
  lexicon: BDAG
  rationale: κελεύω con infinitivo expresa orden autoritativa. «Ordenó que se reunieran» es idiomático y adecuado para el contexto oficial.
- source_word: τοὺς ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los sacerdotes principales
  lexicon: BDAG
  rationale: «Principales sacerdotes» refleja el plural de autoridad del griego sin imponer una terminología eclesiástica posterior. «Sumos sacerdotes» puede sonar más tradicional, pero en plural puede sugerir múltiples titulares; por eso se mantiene una forma más descriptiva.
- source_word: πᾶν τὸ συνέδριον
  english_pob_choice: the whole council
  chosen_spanish: todo el consejo
  alternatives_spanish:
  - todo el Sanedrín
  - todo el concilio
  lexicon: BDAG
  rationale: «Consejo» traduce συνέδριον de manera legible; «todo» refleja πᾶν. Se evita transliterar innecesariamente en el texto principal, aunque el término histórico puede aclararse en nota.
- source_word: καταγαγὼν τὸν Παῦλον
  english_pob_choice: bringing Paul down
  chosen_spanish: y, después de bajar a Pablo
  alternatives_spanish:
  - y trayendo a Pablo abajo
  - y, habiendo bajado a Pablo
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una subordinada temporal participial natural en español. «Bajar a Pablo» preserva el movimiento descendente del original, probablemente desde la fortaleza o cuartel.
- source_word: ἔστησεν εἰς αὐτούς
  english_pob_choice: he set him before them
  chosen_spanish: lo puso delante de ellos
  alternatives_spanish:
  - lo colocó delante de ellos
  - lo presentó ante ellos
  lexicon: BDAG
  rationale: La construcción expresa presentar a alguien en presencia de otros. «Puso delante de ellos» es idiomático y refleja el acto formal de comparecencia.
theological_decisions:
- issue: Renderizado de Ἰουδαίων en contexto polémico
  english_pob_reading: by the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Se mantiene la forma léxica del griego en el texto principal. Dado el contexto narrativo, la referencia apunta a los acusadores de Pablo, no a todo el pueblo judío sin distinción; esa precisión puede explicarse en nota, preservando tanto la literalidad como la sensibilidad contextual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identificación de συνέδριον
  english_pob_reading: the whole council
  chosen_spanish_reading: todo el consejo
  alternative_spanish_readings:
  - todo el Sanedrín
  - todo el concilio
  rationale: El griego designa el cuerpo dirigente judío de Jerusalén. Se traduce de forma comprensible como «consejo», y la nota puede aclarar que se trata del Sanedrín. Así se evita imponer una transliteración en el texto principal mientras se conserva la referencia histórica.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se mantiene la lectura óptima ya acordada con alta coincidencia en la auditoría inglesa.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término base del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» como máscara del nombre divino, en coherencia con las pautas del proyecto.
  - Se mantiene un registro formal y narrativo, con orden sintáctico natural para español bíblico contemporáneo.
