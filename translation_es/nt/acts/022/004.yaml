  - severity: medium
    issue: «a la cárcel» pierde el plural de εἰς φυλακὰς
    rationale: El texto griego tiene plural explícito «into prisons». Aunque el singular genérico puede sonar idiomático, aquí la auditoría inglesa preserva el plural y no hay necesidad fuerte de neutralizarlo.
