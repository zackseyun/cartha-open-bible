translation:
  language: es
  text: Yo perseguí este Camino[a] hasta la muerte[b], atando y entregando en cárceles tanto a hombres como a mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este camino» o «este movimiento». El griego dice literalmente «este camino», pero en Hechos a menudo funciona como nombre del movimiento cristiano.
    reason: lexical_alternative
  - marker: b
    text: O «hasta morir». La frase señala el alcance mortal de la persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην τὴν ὁδὸν
  english_pob_choice: this Way
  chosen_spanish: este Camino
  alternatives_spanish:
  - este camino
  - esta vía
  - este movimiento
  lexicon: BDAG
  rationale: ὁδός significa literalmente «camino/ruta», pero en Hechos funciona como designación reconocible del movimiento cristiano. En español, «Camino» con mayúscula conserva ese posible valor titular sin abandonar la cercanía al griego. «Este Camino» mantiene el demostrativo del original y evita una paráfrasis explicativa excesiva.
- source_word: ἐδίωξα
  english_pob_choice: I persecuted
  chosen_spanish: perseguí
  alternatives_spanish:
  - acosé
  - di caza a
  lexicon: BDAG
  rationale: En este contexto διώκω expresa persecución hostil contra creyentes, no una simple búsqueda. «Perseguí» es el equivalente natural y fiel en español para conservar el sentido violento del verbo.
- source_word: ἄχρι θανάτου
  english_pob_choice: to the death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta la muerte misma
  - hasta el extremo de la muerte
  lexicon: BDAG
  rationale: La expresión indica la extensión extrema de la persecución. «Hasta la muerte» reproduce bien la fuerza idiomática en español y deja abierto si se trata del alcance mortal de la violencia o de una persecución llevada al límite.
- source_word: δεσμεύων
  english_pob_choice: binding
  chosen_spanish: encadenando
  alternatives_spanish:
  - atando
  - aprisionando
  lexicon: BDAG
  rationale: El participio denota literalmente el acto de atar o sujetar. «Encadenando» conserva la imagen física de restricción y suena natural en español en una secuencia narrativa de arresto y custodia. Se prefiere esta opción para evitar un término demasiado general como «arrestando».
- source_word: παραδιδοὺς
  english_pob_choice: delivering
  chosen_spanish: entregando
  alternatives_spanish:
  - entregando en custodia
  - poniendo en manos de
  lexicon: BDAG
  rationale: Aquí παραδίδωμι tiene el sentido de poner personas bajo custodia o autoridad. «Entregando» mantiene la relación con el verbo griego y, junto con «a la cárcel», comunica el traspaso a la detención sin recargar la frase.
- source_word: εἰς φυλακὰς
  english_pob_choice: into prisons
  chosen_spanish: a la cárcel
  alternatives_spanish:
  - a las cárceles
  - en prisiones
  - a prisión
  lexicon: BDAG
  rationale: El plural φυλακάς puede expresarse naturalmente en español con un singular genérico cuando el foco recae en la custodia carcelaria. «A la cárcel» resulta idiomático y claro; se conserva la idea direccional de εἰς mediante «a».
- source_word: ἄνδρας τε καὶ γυναῖκας
  english_pob_choice: both men and women
  chosen_spanish: tanto a hombres como a mujeres
  alternatives_spanish:
  - hombres y mujeres por igual
  - hombres y mujeres
  lexicon: BDAG
  rationale: La construcción destaca explícitamente ambos sexos. «Tanto... como...» reproduce esa amplitud inclusiva con naturalidad en español y mantiene el énfasis retórico del texto.
theological_decisions:
- issue: 'Cómo traducir ἡ ὁδός en Hechos: nombre del movimiento cristiano o simple metáfora de un camino'
  english_pob_reading: Render as 'this Way' with capitalization to preserve the quasi-title for the Christian movement
  chosen_spanish_reading: «este Camino» con mayúscula como designación reconocible del movimiento cristiano
  alternative_spanish_readings:
  - este camino
  - esta vía
  - este movimiento
  rationale: En Hechos, ἡ ὁδός suele funcionar como una denominación estable del cristianismo primitivo. La mayúscula en «Camino» ayuda a señalar ese valor titular sin introducir terminología eclesiástica posterior ni borrar la ambigüedad productiva del griego.
  doctrine_reference: Principio de primacía del idioma fuente; evitar sobrerreformulación tradicional
- issue: 'Cómo entender ἄχρι θανάτου: intensificación de la persecución o resultado literal de muerte'
  english_pob_reading: '''to the death'' with a note that the phrase indicates the deadly extent of the persecution'
  chosen_spanish_reading: «hasta la muerte» con nota sobre el alcance mortal de la persecución
  alternative_spanish_readings:
  - hasta morir
  - hasta el extremo de la muerte
  - hasta la muerte misma
  rationale: La frase puede indicar intensidad extrema sin exigir que Pablo haya matado personalmente. «Hasta la muerte» conserva esa tensión y evita cerrar indebidamente el sentido.
  doctrine_reference: Lectura contextual de διώκω y de la frase preposicional en Hechos
translation_notes:
  revision_awareness: Se siguió el patrón del POB en inglés y no se introdujeron cambios de sentido respecto del audit trail; la principal adaptación fue hacer idiomática la secuencia verbal en español sin perder la imagen concreta de «atar»/«entregar» ni la ambigüedad controlada de ἄχρι θανάτου.
  spanish_consistency_notes:
  - Se mantuvo «Camino» con mayúscula para reflejar el uso titular documentado en Hechos.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el versículo, ya que no hay aquí referencia al nombre divino.
  - Se eligió «encadenando» para preservar la concreción del participio; si se quisiera una versión más literal, «atando» sería posible, pero menos expresiva en español.
  - Se optó por un singular genérico «a la cárcel» por naturalidad española, aunque el griego usa plural; la nota deja abierta la equivalencia con «prisiones».
