translation:
  language: es
  text: Como también el sumo sacerdote y todo el consejo de ancianos pueden dar testimonio a mi favor. De ellos también recibí cartas a los hermanos en Damasco[a], y me encaminaba allá para traer también a los que estaban allí, atados, a Jerusalén, para que fueran castigados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hermanos y hermanas». El griego dice «hermanos», pero en algunos contextos puede referirse a una comunidad más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς καὶ
  english_pob_choice: as also
  chosen_spanish: Así también
  alternatives_spanish:
  - como también
  - así como también
  lexicon: BDAG
  rationale: La expresión introduce corroboración de lo que Pablo afirma. «Así también» conserva ese valor confirmatorio en un español natural, sin endurecer la sintaxis.
- source_word: ἀρχιερεύς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el alto sacerdote
  lexicon: BDAG
  rationale: Es el título histórico y bíblico normal en español para la máxima autoridad sacerdotal. «Sumo sacerdote» es claro y fiel al cargo singular.
- source_word: μαρτυρεῖ μοι
  english_pob_choice: can testify for me
  chosen_spanish: pueden dar testimonio a mi favor
  alternatives_spanish:
  - pueden testificar por mí
  - dan testimonio de mí
  lexicon: BDAG
  rationale: El dativo μοι aquí tiene fuerza de apoyo o respaldo a la declaración de Pablo. «A mi favor» expresa bien esa corroboración en español y evita una ambigüedad de «de mí».
- source_word: πᾶν τὸ πρεσβυτέριον
  english_pob_choice: the whole council of elders
  chosen_spanish: todo el consejo de ancianos
  alternatives_spanish:
  - todo el cuerpo de ancianos
  - la totalidad del consejo de ancianos
  lexicon: BDAG
  rationale: πρεσβυτέριον designa un cuerpo deliberativo de ancianos, no solo personas mayores. «Consejo de ancianos» es claro y evita el tecnicismo eclesiástico «presbiterio».
- source_word: παρ’ ὧν
  english_pob_choice: From them
  chosen_spanish: De ellos
  alternatives_spanish:
  - De parte de ellos
  - De quienes
  lexicon: BDAG
  rationale: Remite conjuntamente al sumo sacerdote y al consejo. «De ellos» mantiene la referencia colectiva y fluida.
- source_word: ἐπιστολάς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas de autorización
  - escritos
  lexicon: BDAG
  rationale: El sentido básico es «cartas». El carácter oficial se deduce del contexto y no exige expandirse en el texto principal.
- source_word: πρὸς τοὺς ἀδελφοὺς
  english_pob_choice: to the brothers
  chosen_spanish: para los hermanos
  alternatives_spanish:
  - a los hermanos
  - para los hermanos y hermanas
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἀδελφούς. En español, «hermanos» conserva el término sin neutralizarlo, y «para» refleja bien la finalidad del envío de las cartas.
- source_word: Δαμασκὸν
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: BDAG
  rationale: Es el topónimo estándar en español bíblico.
- source_word: ἐπορευόμην
  english_pob_choice: I was traveling there
  chosen_spanish: me encaminaba allá
  alternatives_spanish:
  - iba
  - viajaba allá
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso en el pasado. «Me encaminaba allá» suena natural y conserva la idea de desplazamiento hacia Damasco.
- source_word: ἄξων
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - para conducir
  lexicon: BDAG
  rationale: El participio de futuro expresa propósito con un verbo de movimiento. «Para traer» comunica bien la intención de conducirlos de vuelta sin añadir matices no explicitados.
- source_word: τοὺς ἐκεῖσε ὄντας
  english_pob_choice: those who were there
  chosen_spanish: a los que estaban allí
  alternatives_spanish:
  - a los allí presentes
  - a los que se hallaban allí
  lexicon: BDAG
  rationale: La frase substantivada se refiere a personas localizadas en Damasco. «Los que estaban allí» es transparente en español.
- source_word: δεδεμένους
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - encadenados
  - presos
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe su condición de cautivos. «Atados» es fiel y suficientemente general; no exige el detalle de cadenas que el griego no menciona.
- source_word: Ἰερουσαλὴμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalen
  lexicon: BDAG
  rationale: Topónimo bíblico estándar en español.
- source_word: τιμωρηθῶσιν
  english_pob_choice: they might be punished
  chosen_spanish: fueran castigados
  alternatives_spanish:
  - recibieran castigo
  - fueran punidos
  lexicon: BDAG
  rationale: El verbo denota trato punitivo. «Fueran castigados» es natural y preserva el sentido de sanción sin especificar una pena concreta.
theological_decisions:
- issue: Alcance de ἀδελφοί en el contexto
  english_pob_reading: to the brothers
  chosen_spanish_reading: para los hermanos
  alternative_spanish_readings:
  - para los hermanos y hermanas
  - para los hermanos, es decir, la comunidad
  rationale: Se conserva el plural masculino del griego, siguiendo la política de no neutralizarlo sin necesidad. La posible amplitud del referente queda implícita sin incorporarla al texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Testimonio corroborativo de autoridades judías
  english_pob_reading: can testify for me
  chosen_spanish_reading: pueden dar testimonio a mi favor
  alternative_spanish_readings:
  - pueden testificar por mí
  - pueden corroborar mi dicho
  rationale: La frase funciona como respaldo de la afirmación de Pablo. «A mi favor» expresa ese apoyo testimonial y evita reducir el matiz a simple declaración factual.
  doctrine_reference: Acts narrative/legal context; POB consistency on testimonial language
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, incorporando la revisión que añade explícitamente el segundo καί con «también» en «traer también». Se evitó trasladar al español una formulación más eclesiástica para πρεσβυτέριον y se mantuvo la referencia masculina plural de ἀδελφοί con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Sumo sacerdote» y «consejo de ancianos» mantienen el registro histórico del pasaje.
  - «Atados» conserva el estado de detención sin sobreespecificar.
  - La puntuación separa las dos acciones principales con coma antes de la finalidad final.
  - El marcador de nota [a] aparece solo junto a «hermanos» y corresponde a una única nota alternativa.
