revisions:
- from: Así también el sumo sacerdote y todo el consejo de ancianos pueden dar testimonio a mi favor. De ellos también recibí cartas para los hermanos en Damasco[a], y me encaminaba allá para traer también a los que estaban allí, atados, a Jerusalén, para que fueran castigados.
  to: Como también el sumo sacerdote y todo el consejo de ancianos pueden dar testimonio a mi favor. De ellos también recibí cartas a los hermanos en Damasco[a], y me encaminaba allá para traer también a los que estaban allí, atados, a Jerusalén, para que fueran castigados.
  rationale: Se ajusta «Así también» a «Como también» para reflejar con más naturalidad e idiomaticidad ὡς καὶ, y «para los hermanos» a «a los hermanos» para expresar mejor que las cartas iban dirigidas a ellos. Se conserva el resto porque representa bien el sentido fuente y la decisión lexical auditada.
