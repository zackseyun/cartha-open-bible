lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Varones
  alternatives_spanish:
  - Hombres
  - Señores
  lexicon: BDAG
  rationale: Vocativo plural masculino. «Varones» conserva el tono público y formal del discurso sin perder la referencia masculina explícita del griego.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - compañeros
  lexicon: BDAG
  rationale: Mantiene el parentesco espiritual/fraternal del vocativo griego. Aquí no conviene expandir a inclusivo explícito porque el conjunto del saludo permanece masculino en la forma griega.
- source_word: πατέρες
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - ancianos
  - padres de la nación
  lexicon: BDAG
  rationale: La forma literal «padres» preserva el matiz de respeto o paternidad social del vocativo sin interpretarlo como un cargo técnico.
- source_word: ἀκούσατέ
  english_pob_choice: hear
  chosen_spanish: oíd
  alternatives_spanish:
  - escuchad
  - oigan
  lexicon: BDAG
  rationale: Imperativo plural de segunda persona. «Oíd» conserva la fuerza directa y solemne del llamado público, con registro digno en español bíblico.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa naturalmente en español como «mi defensa».
- source_word: ἀπολογίας
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - alegato
  - respuesta
  - apología
  lexicon: BDAG
  rationale: En este contexto forense y de discurso público, «defensa» es el equivalente moderno más claro para ἀπολογία, evitando el sentido moderno de «apología» como elogio o justificación.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: ante vosotros
  alternatives_spanish:
  - para vosotros
  - dirigida a vosotros
  lexicon: BDAG
  rationale: La preposición πρός con acusativo puede indicar dirección o referencia al auditorio. «Ante vosotros» refleja mejor el marco de defensa pública y mantiene la relación directa con los oyentes.
- source_word: νυνὶ
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ahora mismo
  lexicon: BDAG
  rationale: Añade inmediatez al ruego; «ahora» es la opción natural y fiel en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anclando la nota al texto con [a]. Además, se mantuvo la relación entre πρὸς ὑμᾶς y una formulación de audiencia pública («ante vosotros») para no perder el matiz forense del griego, mientras que la nota ofrece la alternativa más literal «la defensa que ahora hago ante vosotros».
  spanish_consistency_notes:
  - Se usa «varones» para conservar el vocativo masculino del griego, en lugar de un vocativo más genérico.
  - «Defensa» se mantiene como término forense principal para ἀπολογία.
  - «Oíd» preserva el registro solemne y directo del imperativo plural.
  - La nota alternativa explica la posible lectura de πρὸς ὑμᾶς sin duplicar un marcador no anclado.
