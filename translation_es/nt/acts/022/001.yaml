  - severity: medium
    issue: Uso de «oíd ... vosotros»
    rationale: El objetivo de estilo pide español neutral latinoamericano / ampliamente legible. «Oíd» y «vosotros» son marcadamente peninsulares y reducen la adecuación estilística del borrador.
  - severity: medium
    issue: «ante vosotros» para πρὸς ὑμᾶς
    rationale: La auditoría inglesa revisó explícitamente esta frase hacia «to you» en lugar de «before you». «Ante ustedes» reintroduce la lectura previa más interpretativa; «a ustedes» o «dirigida a ustedes» preserva mejor la relación direccional al auditorio.
  revised_spanish_text: «Hombres[a], hermanos y padres, oigan ahora mi defensa a ustedes.»
