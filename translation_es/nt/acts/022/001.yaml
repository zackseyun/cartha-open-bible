review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un vocativo triple masculino seguido del mandato de oír una defensa presente dirigida al auditorio. Sin embargo, introduce dos desajustes frente a la evidencia y al rastro POB: «Varones» suena más arcaico y menos natural que el llano «Hombres» para Ἄνδρες, y «ante vosotros» interpreta πρὸς ὑμᾶς como presencia pública cuando la revisión inglesa auditada prefirió el sentido más directo «to you», mejor dado en español como «a ustedes».'
  spanish_quality_summary: 'El texto es comprensible, pero mezcla registro arcaizante peninsular («oíd», «vosotros», «varones») con el objetivo de español neutral latinoamericano y legibilidad eclesial amplia. Conviene modernizar a un registro digno pero natural: «Hombres, hermanos y padres, oigan ahora mi defensa ante ustedes / a ustedes». Además, «a ustedes» sigue mejor la decisión auditada para πρὸς ὑμᾶς.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. La principal cuestión terminológica es de estilo y fidelidad léxica local: Ἄνδρες → «Hombres» concuerda mejor con la decisión POB «Men» que «Varones»; ἀκούσατέ puede verterse como «oigan» en español neutral sin pérdida de solemnidad; πρὸς ὑμᾶς debe evitar una sobreinterpretación como «ante vosotros».'
  issues:
