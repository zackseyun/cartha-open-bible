translation:
  language: es
  text: «Hombres[a], hermanos y padres, oigan ahora mi defensa a ustedes.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oigan la defensa que ahora les presento».'
