translation:
  language: es
  text: Porque serás testigo para él[a][b] ante todas las personas de lo que has visto y oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de él». El dativo griego puede entenderse aquí de más de una manera estrechamente relacionada.
    reason: alternative_reading
  - marker: b
    text: O «ante todos». El plural masculino del griego funciona de manera genérica para seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto de comisión, ὅτι introduce el contenido o la explicación de la misión; «porque» conserva bien la fuerza explicativa en español sin volver la frase rígida.
- source_word: ἔσῃ
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - estarás
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa naturalmente con «serás» en una comisión vocacional como esta; «estarás» no transmite igual de bien el estado o rol asignado.
- source_word: μάρτυς
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo ocular
  - mártir
  lexicon: BDAG
  rationale: «Testigo» reproduce el valor básico de μάρτυς como quien da testimonio. «Mártir» no corresponde aquí, y «testigo ocular» sería más específico de lo que el griego exige.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: de él
  alternatives_spanish:
  - para él
  - a él
  lexicon: BDAG
  rationale: El dativo con μάρτυς permite una relación de referencia o ventaja. En español, «testigo de él» comunica de manera natural que el testimonio trata de Jesús; «para él» resaltaría más la representación a su favor, pero aquí suena menos idiomático. Se preserva la tensión del original sin cerrarla del todo.
- source_word: πρὸς πάντας ἀνθρώπους
  english_pob_choice: to all people
  chosen_spanish: ante todos los hombres
  alternatives_spanish:
  - ante todas las personas
  - a todas las personas
  - ante todos
  lexicon: BDAG
  rationale: πρός con acusativo puede expresar orientación hacia la audiencia. «Ante» comunica bien la idea de dar testimonio en presencia de una audiencia. Se conserva «hombres» para reflejar la forma masculina plural del griego, como en la nota inglesa, aunque en sentido genérico incluye a la humanidad.
- source_word: ὧν
  english_pob_choice: of what
  chosen_spanish: de lo que
  alternatives_spanish:
  - acerca de lo que
  - sobre lo que
  lexicon: BDAG
  rationale: El relativo en genitivo introduce el contenido del testimonio; «de lo que» es la forma más natural en español tras «testigo».
- source_word: ἑώρακας
  english_pob_choice: you have seen
  chosen_spanish: has visto
  alternatives_spanish:
  - has contemplado
  - viste
  lexicon: BDAG
  rationale: El perfecto griego expresa experiencia adquirida con relevancia presente; el presente perfecto español «has visto» lo refleja bien.
- source_word: ἤκουσας
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - escuchado
  - has oído
  lexicon: BDAG
  rationale: La coordinación natural con «has visto» en español exige «oído»; la forma elíptica mantiene fluidez y el mismo contenido experiencial de la pareja verbal griega.
theological_decisions:
- issue: Referencia de αὐτῷ en la comisión de Pablo
  english_pob_reading: The pronoun refers to the Lord/Jesus as the one for whom Paul will bear witness.
  chosen_spanish_reading: El pronombre se entiende como referencia a Jesús, de quien Pablo dará testimonio.
  alternative_spanish_readings:
  - El pronombre puede leerse de modo más neutro como «a él».
  - El pronombre puede expresarse como «para él», destacando la comisión en su favor.
  rationale: El contexto inmediato de Hechos 22 presenta a Ananías relatando la comisión recibida del Jesús resucitado. «De él» permite entender que el testimonio versa sobre Jesús, sin convertir la frase en una resolución doctrinal más fuerte de la que el griego exige.
  doctrine_reference: Preservar la tensión textual y la primacía del original sobre una tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; este borrador mantiene esa lectura alta de acuerdo y conserva las decisiones léxicas ya validadas por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa «Jesús» implícitamente en la referencia del pronombre, coherente con el contexto narrativo de Hechos 22.
  - Se conserva el masculino plural «hombres» solo por fidelidad a la forma griega y con nota explicativa; en el texto principal sigue siendo genérico.
