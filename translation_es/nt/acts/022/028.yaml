translation:
  language: es
  text: 'Pero el tribuno respondió[a]: «Yo adquirí esta ciudadanía por una gran suma». Pero Pablo dijo[b]: «Pero yo hasta nací con ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una gran cantidad de dinero».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «Pero yo hasta he nacido»; la ciudadanía se sobreentiende por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χιλίαρχος
  english_pob_choice: tribune
  chosen_spanish: tribuno
  alternatives_spanish:
  - comandante
  - comandante militar
  lexicon: BDAG
  rationale: χιλίαρχος designa a un oficial militar romano de alto rango. En español, «tribuno» es el equivalente histórico más preciso y natural en este contexto, y mantiene la referencia institucional romana sin sobreexplicar.
- source_word: πολλοῦ κεφαλαίου
  english_pob_choice: for a large sum
  chosen_spanish: por una gran suma
  alternatives_spanish:
  - con mucho dinero
  - por una gran cantidad de dinero
  lexicon: BDAG
  rationale: La frase expresa un pago considerable para obtener la ciudadanía. «Por una gran suma» conserva el valor monetario idiomático sin volver demasiado pesada la redacción.
- source_word: πολιτείαν
  english_pob_choice: citizenship
  chosen_spanish: ciudadanía
  alternatives_spanish:
  - estatus cívico
  - derechos de ciudadanía
  lexicon: BDAG
  rationale: En este pasaje πολιτεία se refiere al estatus legal de ciudadano romano. «Ciudadanía» es la forma más clara y fiel en español contemporáneo.
- source_word: ἐκτησάμην
  english_pob_choice: I acquired
  chosen_spanish: adquirí
  alternatives_spanish:
  - obtuve
  - compré
  lexicon: BDAG
  rationale: El verbo medio indica adquirir para sí. «Adquirí» refleja bien la acción sin imponer por sí mismo la idea de compra, que ya está sugerida por «gran suma».
- source_word: καὶ γεγέννημαι
  english_pob_choice: I was even born with it
  chosen_spanish: yo también nací con ella
  alternatives_spanish:
  - yo también nací ciudadano
  - yo nací en ella
  lexicon: BDAG
  rationale: El griego dice literalmente «también he nacido», con la ciudadanía entendida por el contexto. En español, «nací con ella» comunica la posesión por nacimiento y mantiene el contraste con la ciudadanía comprada del tribuno.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero / Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ funciona como transición adversativa o continuativa en diálogo. Se vierte con «Pero» en la respuesta del tribuno y «Entonces» en la respuesta de Pablo para reflejar el cambio de hablante y la secuencia discursiva con fluidez natural.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - declaró
  lexicon: BDAG
  rationale: Verbo común de habla. «Dijo» es la opción más natural y directa en español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, este borrador sigue de cerca el texto griego y el criterio léxico del POB en inglés, especialmente en la equivalencia histórica de χιλίαρχος = «tribuno» y en la lectura idiomática de πολιτεία como «ciudadanía».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «ciudadanía» para πολιτεία en su sentido jurídico-romano, no «conducta» ni «vida cívica».
  - Se preserva el contraste entre la ciudadanía comprada del tribuno y la ciudadanía por nacimiento de Pablo.
  - «También nací con ella» intenta reflejar el perfecto griego sin introducir una formulación demasiado técnica en el texto principal.
