revisions:
- from: 'Pero el tribuno respondió[a]: «Yo adquirí esta ciudadanía por una gran suma». Entonces Pablo dijo[b]: «Pues yo también nací con ella».'
  to: 'Pero el tribuno respondió[a]: «Yo adquirí esta ciudadanía por una gran suma». Pero Pablo dijo[b]: «Pero yo hasta nací con ella».'
  rationale: Se sustituyó «Entonces» por «Pero» para conservar el valor adversativo de δέ en la respuesta de Pablo, y «también» por «hasta» para reflejar mejor el énfasis de καί documentado en el expediente inglés como «even». Se mantuvieron «tribuno», «ciudadanía» y «adquirí» por ser fieles al griego y naturales en español.
