translation:
  language: es
  text: Y cuando se derramaba la sangre de tu testigo Esteban[a], yo mismo estaba allí y aprobando, y guardando los mantos de los que lo mataban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mártir»; el término griego puede significar «testigo», y en el uso cristiano llegó a asociarse especialmente con quien muere por ese testimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεχύννετο
  english_pob_choice: was being poured out
  chosen_spanish: se derramaba
  alternatives_spanish:
  - era derramada
  - se estaba derramando
  lexicon: BDAG
  rationale: El imperfecto pasivo de ἐκχέω pide en español una forma progresiva o durativa. «Se derramaba» conserva la imagen de sangre vertida con continuidad y suena natural; evita tanto el calco rígido como una simplificación excesiva.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  lexicon: BDAG
  rationale: Es la equivalencia directa y normal en español; no requiere paráfrasis.
- source_word: μάρτυρός
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - mártir
  lexicon: BDAG
  rationale: El sentido léxico primario de μάρτυς es «testigo». «Testigo» preserva la primacía del sentido original; «mártir» se reserva en nota por la asociación histórica y contextual con la muerte de Esteban.
- source_word: ἐφεστὼς
  english_pob_choice: standing by
  chosen_spanish: estaba presente
  alternatives_spanish:
  - estaba de pie
  - estaba al lado
  lexicon: BDAG
  rationale: El participio expresa presencia/estar al lado de la escena. En español, «estaba presente» comunica esa cercanía sin forzar una imagen espacial demasiado literal; la continuidad del relato mantiene el matiz de observación cercana.
- source_word: συνευδοκῶν
  english_pob_choice: approving
  chosen_spanish: aprobando
  alternatives_spanish:
  - consintiendo
  - estando de acuerdo
  lexicon: BDAG
  rationale: El participio implica aprobación activa o consentimiento. «Aprobando» es claro, natural y conserva la fuerza de respaldo moral sin debilitarla a una mera coincidencia de opinión.
- source_word: φυλάσσων
  english_pob_choice: guarding
  chosen_spanish: guardando
  alternatives_spanish:
  - custodiando
  - vigilando
  lexicon: BDAG
  rationale: «Guardando» reproduce el acto concreto de custodiar los mantos. Es fiel y transparente en español; «custodiando» sería más formal, pero no más preciso aquí.
- source_word: ἱμάτια
  english_pob_choice: cloaks
  chosen_spanish: los mantos
  alternatives_spanish:
  - las capas
  - los vestidos
  lexicon: BDAG
  rationale: ἱμάτια se refiere a prendas exteriores. «Mantos» comunica bien esa idea en español bíblico contemporáneo sin sonar técnico ni demasiado genérico.
- source_word: ἀναιρούντων
  english_pob_choice: killing
  chosen_spanish: los que lo mataban
  alternatives_spanish:
  - los que lo estaban matando
  - los que lo quitaban de en medio
  lexicon: BDAG
  rationale: En este contexto ἀναιρέω significa matar o dar muerte. «Los que lo mataban» es natural y directo; evita introducir un juicio moral más fuerte que el del término léxico, y mantiene la acción narrativa.
- source_word: αὐτὸς
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo personalmente
  - yo
  lexicon: BDAG
  rationale: El pronombre es enfático. «Yo mismo» conserva ese énfasis de primera persona de manera idiomática en español.
theological_decisions:
- issue: Cómo renderizar μάρτυς aplicado a Esteban
  english_pob_reading: witness, with 'martyr' preserved in footnote
  chosen_spanish_reading: testigo, con 'mártir' preservado en nota
  alternative_spanish_readings:
  - mártir
  - testigo y mártir
  rationale: La traducción principal sigue el valor léxico de μάρτυς como 'testigo', evitando importar de entrada la terminología eclesiástica posterior. La nota conserva 'mártir' porque el contexto de la muerte de Esteban hace que esa asociación sea históricamente y teológicamente pertinente.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Tensión entre presencia física y consentimiento moral de Pablo
  english_pob_reading: standing by and approving
  chosen_spanish_reading: estaba presente y aprobando
  alternative_spanish_readings:
  - estaba allí y aprobando
  - estaba presente y consintiendo
  rationale: 'Se mantienen ambos aspectos: la cercanía a la escena y el asentimiento culpable. «Aprobando» conserva la intensidad ética del participio griego sin suavizarlo en una mera observación pasiva.'
  doctrine_reference: Responsabilidad moral personal en el relato autobiográfico de Pablo
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo 'witness' en el texto principal y explicó en nota la alternativa 'martyr'. No hubo revisiones posteriores ni cambios sugeridos en el control cruzado; la presente redacción española conserva esa decisión lexical y la adapta a un español natural, con el mismo equilibrio entre primacía del sentido original y reconocimiento de la lectura tradicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'testigo' en el texto principal y 'mártir' solo en la nota, siguiendo la primacía del valor léxico de μάρτυς.
  - Se evita 'Cristo' porque no aparece en el versículo ni hay una variante terminológica pertinente aquí.
  - «Mantos» traduce de manera más específica ἱμάτια que el genérico 'vestidos' o 'ropa'.
