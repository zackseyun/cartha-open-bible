    text: O «mártir»; el término griego puede significar «testigo», y en el uso cristiano llegó a asociarse especialmente con quien muere por ese testimonio.
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden de la frase para reflejar con más naturalidad en español la cadena genitiva del griego («de tu testigo Esteban») y se cambia «estaba presente» por «estaba allí» para conservar mejor el matiz concreto de ἐφεστὼς. Se mantiene la nota léxica sobre «mártir», que está bien justificada por el expediente inglés.
