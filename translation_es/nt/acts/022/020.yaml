review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: el imperfecto pasivo ἐξεχύννετο se capta con «se derramaba», μάρτυρός se vierte correctamente como «testigo» con nota para «mártir», αὐτὸς con «yo mismo», y los participios de presencia, aprobación y custodia están conservados. Sin embargo, la colocación «Esteban, tu testigo» suena menos natural en español que la relación posesiva directa del griego («Stephen your witness»), y «estaba presente» atenúa un poco el matiz más concreto de ἐφεστὼς (‘estar allí / al lado / presente en la escena’).'
  spanish_quality_summary: El texto es claro y legible, pero puede mejorarse para sonar más natural y preciso en español eclesial contemporáneo. La aposición «Esteban, tu testigo» es comprensible, aunque «Esteban, tu testigo» después del nombre interrumpe la fluidez; «Esteban, tu testigo» también puede leerse como vocativo explicativo más que como genitivo dependiente de «sangre». Reordenar a «la sangre de tu testigo Esteban» resuelve esto y sigue mejor la sintaxis. «Estaba allí» o «estaba al lado» reflejaría mejor la escena que «estaba presente».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Testigo» para μάρτυς está bien conforme a la decisión auditada, con «mártir» en nota. «Guardando» y «mantos» son opciones defendibles y naturales. No se activan términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Orden poco natural en «la sangre de Esteban, tu testigo»
    rationale: El griego τοῦ μάρτυρός σου modifica a Στεφάνου dentro de la misma cadena genitiva. En español, «la sangre de tu testigo Esteban» expresa de forma más natural y precisa esa relación posesiva sin pausa innecesaria.
  - severity: low
    issue: «Estaba presente» suaviza ligeramente el matiz escénico de ἐφεστὼς
    rationale: Aunque es aceptable, ἐφεστὼς comunica más vivamente que Pablo estaba allí, junto a la escena. «Estaba allí» conserva mejor la inmediatez sin sobreinterpretar.
  revised_spanish_text: Y cuando se derramaba la sangre de tu testigo Esteban[a], yo mismo estaba allí y aprobando, y guardando los mantos de los que lo mataban.
  revised_footnotes:
