revisions:
- from: Y cuando se derramaba la sangre de Esteban, tu testigo[a], yo mismo estaba presente y aprobando, y guardando los mantos de los que lo mataban.
  to: Y cuando se derramaba la sangre de tu testigo Esteban[a], yo mismo estaba allí y aprobando, y guardando los mantos de los que lo mataban.
  rationale: Se ajusta el orden de la frase para reflejar con más naturalidad en español la cadena genitiva del griego («de tu testigo Esteban») y se cambia «estaba presente» por «estaba allí» para conservar mejor el matiz concreto de ἐφεστὼς. Se mantiene la nota léxica sobre «mártir», que está bien justificada por el expediente inglés.
