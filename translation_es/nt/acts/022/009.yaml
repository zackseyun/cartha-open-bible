translation:
  language: es
  text: Ahora bien, los que estaban conmigo vieron la luz[a], pero no oyeron la voz del que me hablaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no entendieron la voz'. Compárese con Hechos 9:7, donde los compañeros de Pablo son descritos como oyendo el sonido/voz; la diferencia puede estar entre oír un sonido y comprender al que hablaba.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ σὺν ἐμοὶ ὄντες
  english_pob_choice: those who were with me
  chosen_spanish: los que estaban conmigo
  alternatives_spanish:
  - los que iban conmigo
  - los que me acompañaban
  lexicon: BDAG
  rationale: 'La construcción articular con participio se expresa de forma natural en español como una relativa: ''los que estaban conmigo''. ''Iban conmigo'' o ''me acompañaban'' también son posibles, pero ''estaban conmigo'' conserva la referencia amplia sin añadir la idea de desplazamiento o de acompañamiento formal.'
- source_word: τὸ μὲν φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la luz brillante
  - la claridad
  lexicon: BDAG
  rationale: φῶς significa de manera directa 'luz'. En el texto español se mantiene el sustantivo simple, porque el matiz de intensidad ya queda sugerido por el contexto narrativo y no está explícito en este versículo.
- source_word: ἐθεάσαντο
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - divisaron
  lexicon: BDAG
  rationale: θεάομαι aquí se rinde con el verbo común 'ver'. 'Contemplaron' sería más elevado y 'divisaron' introduciría un matiz de percepción a distancia que no se exige por el griego.
- source_word: τὴν δὲ φωνὴν
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: BDAG
  rationale: φωνή puede significar 'voz' o 'sonido'. Se elige 'voz' porque el participio genitivo 'del que me hablaba' identifica a un hablante personal, y la voz conserva esa relación directa. 'Sonido' sigue siendo una alternativa posible, especialmente por la tensión con Hechos 9:7.
- source_word: οὐκ ἤκουσαν
  english_pob_choice: did not hear
  chosen_spanish: no oyeron
  alternatives_spanish:
  - no escucharon
  - no entendieron
  lexicon: BDAG
  rationale: ἀκούω normalmente significa 'oír'. En español, 'no oyeron' conserva ese valor directo. 'No entendieron' sería interpretativo y solo debe aparecer como posibilidad de sentido, no en la línea principal.
- source_word: τοῦ λαλοῦντός μοι
  english_pob_choice: of the one speaking to me
  chosen_spanish: del que me hablaba
  alternatives_spanish:
  - del que me estaba hablando
  - del que hablaba conmigo
  lexicon: BDAG
  rationale: El participio presente λαλοῦντος expresa acción en curso. En español, 'me hablaba' comunica bien esa continuidad y suena natural. 'Del que me estaba hablando' es más explícito, pero menos fluido; 'hablaba conmigo' cambia el foco relacional.
theological_decisions:
- issue: Tensión aparente con Hechos 9:7 sobre si los compañeros de Pablo oyeron la voz
  english_pob_reading: they did not hear the voice of the one speaking to me
  chosen_spanish_reading: no oyeron la voz del que me hablaba
  alternative_spanish_readings:
  - no entendieron la voz del que me hablaba
  - oyeron el sonido, pero no entendieron la voz
  rationale: El griego de este versículo se lee de manera más directa como 'no oyeron la voz'. Sin embargo, por la relación con Hechos 9:7 y por el rango semántico de φωνή y ἀκούω, puede entenderse que no captaron la voz como mensaje comprensible. La traducción principal conserva la tensión textual en vez de resolverla en el cuerpo del versículo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y textual en vez de resolverla de antemano.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el control de revisión más reciente: no se documentan revisiones pendientes ni cambios necesarios respecto del análisis inglés auditado.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene la tensión semántica de φωνή/ἀκούω sin armonizarla prematuramente en el texto principal.
  - '''Los que estaban conmigo'' evita añadir ''hombres'' o ''varones'', que no están presentes en el griego.'
  - El ritmo del contraste μέν...δέ queda reflejado con 'vieron... pero no oyeron'.
