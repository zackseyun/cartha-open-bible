translation:
  language: es
  text: El tribuno ordenó que lo llevaran al cuartel[a], diciendo que debía ser examinado mediante azotes[b], para averiguar por qué razón gritaban así contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el campamento’ o ‘la fortaleza’. Aquí el término se refiere al cuartel militar romano en Jerusalén.
    reason: cultural_note
  - marker: b
    text: O ‘ser interrogado mediante azotes’. El griego combina lenguaje de examen con el medio explícito del azote.
    reason: lexical_alternative
lexical_decisions:
- source_word: χιλίαρχος
  english_pob_choice: tribune
  chosen_spanish: tribuno
  alternatives_spanish:
  - comandante
  - oficial romano
  lexicon: BDAG
  rationale: χιλίαρχος designa aquí al oficial romano de alto rango equivalente al tribuno. ‘Tribuno’ conserva el valor histórico y militar del cargo con precisión y naturalidad en español bíblico.
- source_word: παρεμβολή
  english_pob_choice: barracks
  chosen_spanish: cuartel
  alternatives_spanish:
  - campamento
  - fortaleza
  lexicon: BDAG
  rationale: En este contexto de Jerusalén, la palabra refiere a los alojamientos militares romanos. ‘Cuartel’ comunica bien la función del lugar sin depender de una traducción demasiado técnica o ambigua.
- source_word: εἰσάγεσθαι
  english_pob_choice: to be brought into
  chosen_spanish: que lo llevaran
  alternatives_spanish:
  - que lo introdujeran
  - que lo condujeran
  lexicon: BDAG
  rationale: El infinitivo pasivo indica que Pablo debía ser llevado por otros. ‘Que lo llevaran’ conserva la pasiva implícita y suena natural en español.
- source_word: εἴπας
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: BDAG
  rationale: El participio aoristo introduce la manera o el contenido de la orden del tribuno. ‘Diciendo’ preserva esa relación discursiva sin sobretraducirla.
- source_word: μάστιξιν
  english_pob_choice: by scourging
  chosen_spanish: mediante azotes
  alternatives_spanish:
  - por medio de flagelación
  - con azotes
  lexicon: BDAG
  rationale: El dativo plural expresa el medio de examen. ‘Azotes’ mantiene la fuerza física del término y ‘mediante’ hace clara la idea instrumental. Evito ‘flagelación’ por ser más técnico y menos natural.
- source_word: ἀνετάζεσθαι
  english_pob_choice: be examined
  chosen_spanish: ser examinado
  alternatives_spanish:
  - ser interrogado
  - ser preguntado
  lexicon: BDAG
  rationale: El verbo puede significar examinar o interrogar; en este contexto va unido al medio coercitivo. ‘Ser examinado’ conserva el núcleo léxico, dejando que ‘mediante azotes’ exprese la violencia del procedimiento.
- source_word: ἐπιγνῷ
  english_pob_choice: he might find out
  chosen_spanish: para saber
  alternatives_spanish:
  - para averiguar
  - para conocer
  lexicon: BDAG
  rationale: La cláusula final expresa la intención de descubrir la causa. ‘Para saber’ es una equivalencia natural que mantiene el sentido investigativo del verbo.
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: for what reason
  chosen_spanish: por qué razón
  alternatives_spanish:
  - por qué
  - por cuál causa
  lexicon: BDAG
  rationale: La frase pregunta por la causa o motivo. ‘Por qué razón’ conserva la claridad causal sin añadir un matiz jurídico que el griego no explicita por sí solo.
- source_word: οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - tan fuertemente
  lexicon: BDAG
  rationale: El adverbio señala el modo o la intensidad del grito hostil. ‘Así’ reproduce con concisión la fuerza demostrativa del griego.
- source_word: ἐπεφώνουν αὐτῷ
  english_pob_choice: they were shouting against him
  chosen_spanish: le gritaban
  alternatives_spanish:
  - clamaban contra él
  - le gritaban en contra
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua y el verbo indica un clamor hostil. ‘Le gritaban’ es natural en español; el sentido adversativo queda reforzado por ‘así’ y por el contexto, aunque no se explicita con una preposición adicional que sonaría pesada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y concuerda con la solución del POB en inglés para χιλίαρχος, παρεμβολή, μάστιξιν y ἀνετάζεσθαι, manteniendo además la relación final de propósito. Se evita una calca excesiva del inglés y se conserva la tensión léxica entre ‘examinar’ e ‘interrogar’ mediante la nota al pie.
  spanish_consistency_notes:
  - Se usa ‘tribuno’ para χιλίαρχος, en línea con el valor histórico romano del cargo.
  - ‘Cuartel’ se emplea por su naturalidad contextual; la nota preserva las alternativas ‘campamento’ y ‘fortaleza’.
  - ‘Mediante azotes’ conserva el medio de la acción y permite mantener ‘ser examinado’ sin suavizar el trasfondo coercitivo.
  - ‘Le gritaban así’ reproduce la hostilidad continua sin añadir una carga interpretativa no requerida por el griego.
