base_translation:
  language: en
  yaml_path: translation/nt/acts/022/024.yaml
  text: The tribune ordered him to be brought into the barracks[a], saying that he should be examined by scourging[b], so that he might find out for what reason they were shouting against him like this.
  footnotes:
  - marker: a
    text: Or 'be interrogated by flogging.' The Greek combines examination language with the explicit means of scourging.
    reason: lexical_alternative
  - marker: b
    text: Or 'the camp' or 'the fortress.' Here the term refers to the Roman military quarters in Jerusalem.
    reason: cultural_note
