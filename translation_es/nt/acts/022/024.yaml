  - severity: low
    issue: ‘para saber’ es algo menos preciso que ‘para averiguar’ para ἐπιγνῷ
    rationale: Aunque ‘para saber’ no es incorrecto, ἐπιγνῷ expresa el propósito de descubrir o averiguar la causa. ‘Para averiguar’ mantiene mejor la idea investigativa sin sonar forzado.
