  to: El tribuno ordenó que lo llevaran al cuartel[a], diciendo que debía ser examinado mediante azotes[b], para averiguar por qué razón gritaban así contra él.
  rationale: Se conserva la buena base del borrador, pero se ajusta ‘le gritaban’ a ‘gritaban así contra él’ para reflejar con más fidelidad el sentido hostil de ἐπεφώνουν αὐτῷ, y se cambia ‘para saber’ por ‘para averiguar’ para expresar mejor el propósito investigativo de ἐπιγνῷ.
