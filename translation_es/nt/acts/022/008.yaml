translation:
  language: es
  text: 'Yo respondí[a]: «¿Quién eres, Señor?» Y me dijo: «Yo soy Jesús el Nazareno[b], a quien tú persigues».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε puede funcionar como una forma respetuosa de tratamiento, además del título «Señor».
    reason: alternative_reading
  - marker: b
    text: O «Jesús de Nazaret» o «Jesús el Nazoreo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθην
  english_pob_choice: I answered
  chosen_spanish: respondí
  alternatives_spanish:
  - contesté
  - respondí
  lexicon: BDAG
  rationale: El aoristo de ἀποκρίνομαι se entiende naturalmente como una respuesta directa. En español, «respondí» suena más inmediato y vivo en este diálogo que «contesté», sin añadir contenido ajeno al griego.
- source_word: Τίς εἶ
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Quién eres tú?
  lexicon: BDAG
  rationale: La pregunta es simple y directa; el español natural conserva la inversión interrogativa sin sobrecargarla. Se omite el pronombre explícito porque el verbo ya lo expresa.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - Maestro
  lexicon: BDAG
  rationale: 'Se conserva la lectura principal de κύριος como título reverencial en el texto, siguiendo la opción del POB en inglés. «Señor» mantiene la tensión teológica: Saulo se dirige al hablante con respeto, aunque todavía no comprenda plenamente su identidad.'
- source_word: εἶπέν τε πρὸς ἐμέ
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y dijo a mí
  lexicon: BDAG
  rationale: La construcción idiomática con πρὸς ἐμέ se vierte de manera natural como «me dijo». El enlace con τε queda bien reflejado con «Y», sin forzar una secuencia más pesada.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  lexicon: BDAG
  rationale: La autoidentificación directa se expresa con «Yo soy» para reproducir con claridad el énfasis del griego sin ampliar el sentido.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ὁ Ναζωραῖος
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - Jesús de Nazaret
  - el Nazoreo
  lexicon: BDAG
  rationale: «El Nazareno» reproduce con fidelidad el epíteto griego con artículo, y es más idiomático en español que una perífrasis explicativa. Se preserva la posibilidad de las alternativas documentadas en la nota.
- source_word: ὃν σὺ διώκεις
  english_pob_choice: whom you are persecuting
  chosen_spanish: a quien tú persigues
  alternatives_spanish:
  - a quien persigues
  - a quien estás persiguiendo
  lexicon: BDAG
  rationale: διώκω aquí expresa persecución hostil, no simple seguir o buscar. «Persigues» conserva la fuerza verbal del presente y suena natural en español; el pronombre explícito «tú» mantiene el énfasis del original.
theological_decisions:
- issue: κύριε como tratamiento respetuoso y posible título cristológico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  rationale: 'Se mantiene «Señor» en la línea del POB para no aplanar el término a un simple tratamiento civil. Al mismo tiempo, la forma española conserva la ambigüedad narrativa: puede ser un trato respetuoso en el momento, pero también resuena con el título que el lector conoce por el contexto posterior.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete inglés; la versión española sigue de cerca el texto griego y preserva la tensión léxica documentada en κύριε y ὁ Ναζωραῖος.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε en el texto principal, coherente con el valor proyectado por el POB, y se deja la alternativa «señor» en nota.
  - Se usa «el Nazareno» para ὁ Ναζωραῖος, evitando la paráfrasis «de Nazaret» en el cuerpo del texto, pero conservando la alternativa documentada.
  - Se mantiene el pronombre explícito «tú» en la segunda persona para reflejar el énfasis del griego.
  - La puntuación con comillas angulares se ajusta al uso editorial en español.
