translation:
  language: es
  text: 'Y dije: «Señor, ellos mismos saben que en cada sinagoga[a] yo estaba encarcelando y golpeando a los que creen en ti[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sinagoga en sinagoga»; la frase griega tiene valor distributivo, indicando una acción repetida en varias sinagogas.
    reason: lexical_alternative
  - marker: b
    text: O «los que confían en ti» o «los que ponen su fe en ti».
    reason: alternative_reading
lexical_decisions:
- source_word: κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Y dije
  lexicon: BDAG
  rationale: La forma contracta κἀγώ une la continuidad del relato con un matiz leve de énfasis. En español, el énfasis ya queda suficientemente marcado por el contexto y por la apertura discursiva «Y dije», que mantiene la naturalidad narrativa sin perder la conexión con la frase anterior.
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - respondí
  - hablé
  lexicon: BDAG
  rationale: El aoristo de λέγω en discurso directo se vierte naturalmente como «dije». Es la opción más directa y fiel al valor narrativo del verbo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el contexto de Hechos 22, el vocativo se dirige a Jesús resucitado. «Señor» preserva el valor reverencial y cristológico del término, conforme al uso POB para κύριος.
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  - ellos personalmente
  lexicon: BDAG
  rationale: El pronombre es enfático. «Ellos mismos» conserva ese relieve, indicando que los oyentes ya conocen la conducta anterior de Pablo.
- source_word: ἐπίστανται
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - están al tanto
  lexicon: BDAG
  rationale: ἐπίσταμαι aquí significa saber o estar al tanto. «Saben» es la forma más idiomática y clara en español, sin debilitar el sentido.
- source_word: ἤμην φυλακίζων καὶ δέρων
  english_pob_choice: I was imprisoning and beating
  chosen_spanish: yo estaba encarcelando y golpeando
  alternatives_spanish:
  - yo solía encarcelar y golpear
  - yo estaba metiendo en la cárcel y golpeando
  lexicon: BDAG
  rationale: La construcción imperfecto + participios expresa acción habitual o en curso en el pasado. «Yo estaba encarcelando y golpeando» conserva ese valor aspectual de modo relativamente transparente en español.
- source_word: φυλακίζων
  english_pob_choice: imprisoning
  chosen_spanish: encarcelando
  alternatives_spanish:
  - aprisionando
  - metiendo en la cárcel
  lexicon: BDAG
  rationale: φυλακίζω significa encarcelar o poner en prisión. «Encarcelando» es claro, formal y natural en español bíblico actual.
- source_word: δέρων
  english_pob_choice: beating
  chosen_spanish: golpeando
  alternatives_spanish:
  - azotando
  - pegando
  lexicon: BDAG
  rationale: δέρω designa golpear físicamente. «Golpeando» es suficientemente amplio y no introduce de manera innecesaria la idea técnica de azotes judiciales.
- source_word: κατὰ τὰς συναγωγάς
  english_pob_choice: in every synagogue
  chosen_spanish: en cada sinagoga
  alternatives_spanish:
  - en todas las sinagogas
  - de sinagoga en sinagoga
  lexicon: BDAG
  rationale: κατά con acusativo tiene aquí valor distributivo. «En cada sinagoga» refleja bien la repetición a través de múltiples sinagogas y coincide con la corrección revisada del audit trail en inglés.
- source_word: τοὺς πιστεύοντας ἐπὶ σέ
  english_pob_choice: those who believe in you
  chosen_spanish: a los que creen en ti
  alternatives_spanish:
  - a los que confían en ti
  - a los que ponen su fe en ti
  lexicon: BDAG
  rationale: El participio presente con ἐπί + acusativo expresa fe dirigida hacia Jesús. «Creen en ti» es la manera más natural en español y mantiene el sentido de confianza/belief sin sobreexplicar.
theological_decisions:
- issue: Vocativo κύριε dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La escena forma parte del testimonio de Pablo sobre su encuentro con el Cristo resucitado. «Señor» conserva la carga reverencial y cristológica del vocativo sin añadir interpretación extra.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Aspecto de la persecución previa de Pablo
  english_pob_reading: I was imprisoning and beating
  chosen_spanish_reading: yo estaba encarcelando y golpeando
  alternative_spanish_readings:
  - yo solía encarcelar y golpear
  - encarcelaba y golpeaba
  rationale: La forma griega imperfecto-perifrástica destaca una acción repetida o en desarrollo en el pasado. «Estaba encarcelando y golpeando» preserva mejor ese valor que una simple pretérita puntual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés revisado cambió «throughout the synagogues» por «in every synagogue» para reflejar más directamente el valor distributivo de κατὰ τὰς συναγωγάς. La versión española sigue ese mismo ajuste con «en cada sinagoga».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio POB, dado que el hablante se dirige a Jesús resucitado.
  - Se usa «creen en ti» para πιστεύοντας ἐπὶ σέ, dejando en nota las alternativas de confianza/fe para no ocultar el matiz de dirección personal de la fe.
  - «En cada sinagoga» conserva el valor distributivo de κατά + acusativo y evita una localización demasiado estática.
