translation:
  language: es
  text: Soy un hombre judío, nacido en Tarso de Cilicia, pero criado en esta ciudad a los pies de Gamaliel[a], instruido conforme al rigor de la ley de nuestros padres[b], lleno de celo por Dios, como todos ustedes lo están hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a los pies de Gamaliel», un modismo para decir que fue formado como discípulo de un maestro.
    reason: cultural_note
  - marker: b
    text: O «la ley ancestral».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ Ἰουδαῖος
  english_pob_choice: a Jewish man
  chosen_spanish: un hombre judío
  alternatives_spanish:
  - un judío
  - un varón judío
  lexicon: BDAG
  rationale: ἀνήρ señala a un hombre adulto, y Ἰουδαῖος identifica su pertenencia judía. «Un hombre judío» conserva ambos rasgos con naturalidad en español y evita reducirlo al etnónimo solo («un judío») o sonar demasiado técnico («varón judío»).
- source_word: γεγεννημένος ἐν Ταρσῷ τῆς Κιλικίας
  english_pob_choice: born in Tarsus of Cilicia
  chosen_spanish: nacido en Tarso de Cilicia
  alternatives_spanish:
  - habido nacido en Tarso de Cilicia
  - nacido en Tarso, de Cilicia
  lexicon: BDAG
  rationale: El participio perfecto expresa el hecho de nacimiento; «nacido» es la manera más natural y fiel en español. «De Cilicia» conserva el genitivo geográfico breve del griego.
- source_word: ἀνατεθραμμένος δὲ ἐν τῇ πόλει ταύτῃ
  english_pob_choice: but brought up in this city
  chosen_spanish: pero criado en esta ciudad
  alternatives_spanish:
  - pero criado aquí
  - pero educado en esta ciudad
  lexicon: BDAG
  rationale: El verbo apunta a la crianza/formación, no solo al mantenimiento físico. «Criado» comunica el contraste con «nacido» y suena natural en español; se mantiene el contraste marcado por δέ con «pero».
- source_word: παρὰ τοὺς πόδας Γαμαλιήλ
  english_pob_choice: at the feet of Gamaliel
  chosen_spanish: a los pies de Gamaliel
  alternatives_spanish:
  - bajo la enseñanza de Gamaliel
  - bajo Gamaliel
  lexicon: BDAG
  rationale: Se conserva el modismo literal porque en español sigue siendo transparente como imagen de discipulado e instrucción. «A los pies de» preserva mejor el valor histórico y retórico que una paráfrasis más interpretativa.
- source_word: πεπαιδευμένος
  english_pob_choice: educated
  chosen_spanish: educado
  alternatives_spanish:
  - instruido
  - formado
  lexicon: BDAG
  rationale: El término remite a formación/instrucción formal. «Educado» encaja con el entorno rabínico-académico y permite continuar la frase de manera fluida en español.
- source_word: κατὰ ἀκρίβειαν
  english_pob_choice: according to the strictness
  chosen_spanish: con toda exactitud
  alternatives_spanish:
  - según la exactitud
  - con rigor
  - con toda rigurosidad
  lexicon: BDAG
  rationale: ἀκρίβεια comunica exactitud rigurosa. En español, «con toda exactitud» expresa bien la idea de esmero preciso sin sonar forzado con la preposición «según» repetida.
- source_word: τοῦ πατρῴου νόμου
  english_pob_choice: the law of our fathers
  chosen_spanish: según la ley de nuestros padres
  alternatives_spanish:
  - según la ley ancestral
  - según la ley de los padres
  lexicon: BDAG
  rationale: πατρῷος significa ancestral/paterno. «Nuestros padres» mantiene la solidaridad retórica con la audiencia y reproduce de forma natural el sentido heredado del término, sin perder el matiz de tradición recibida.
- source_word: ζηλωτὴς ὑπάρχων τοῦ θεοῦ
  english_pob_choice: being zealous for God
  chosen_spanish: celoso de Dios
  alternatives_spanish:
  - lleno de celo por Dios
  - apasionado por Dios
  lexicon: BDAG
  rationale: ζηλωτής denota a alguien caracterizado por celo; en español «celoso de Dios» conserva la idea de fervor sin importar el sentido político posterior de «celote». Se prefirió una formulación breve que no diluya la fuerza del término.
- source_word: καθὼς πάντες ὑμεῖς ἐστε σήμερον
  english_pob_choice: just as all of you are today
  chosen_spanish: como todos ustedes son hoy
  alternatives_spanish:
  - tal como todos ustedes son hoy
  - así como ustedes todos son hoy
  lexicon: BDAG
  rationale: καθώς introduce comparación. «Como todos ustedes son hoy» mantiene el paralelismo retórico y une naturalmente σήμερον con el estado presente de los oyentes.
theological_decisions:
- issue: Cómo rendir πατρῴου νόμου sin borrar el vínculo de herencia judía en el discurso de Pablo
  english_pob_reading: the law of our fathers
  chosen_spanish_reading: la ley de nuestros padres
  alternative_spanish_readings:
  - la ley ancestral
  - la ley de los padres
  rationale: En este contexto Pablo se identifica con sus oyentes y presenta la ley como herencia compartida. «Nuestros padres» hace explícita esa solidaridad retórica sin cambiar el referente ni introducir una lectura sectaria.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Cómo preservar el valor idiomático de παρὰ τοὺς πόδας Γαμαλιήλ
  english_pob_reading: at the feet of Gamaliel
  chosen_spanish_reading: a los pies de Gamaliel
  alternative_spanish_readings:
  - bajo la enseñanza de Gamaliel
  - bajo Gamaliel
  rationale: La imagen maestro-discípulo es importante para la memoria histórica del pasaje. La versión literal sigue siendo comprensible en español y evita perder esa forma concreta de aprendizaje.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y coincide sustancialmente con la solución ya auditada en inglés: mantiene el contraste nacido/criado, conserva el modismo «a los pies de Gamaliel», y traduce ἀκρίβεια, πατρῷος y ζηλωτής con decisiones explicadas. No se detectaron cambios sustantivos en la última revisión, por lo que la propuesta española refleja el estado estable del expediente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en el proyecto, pero aquí el texto griego usa θεοῦ en una expresión genérica y por eso se traduce «Dios».
  - Se usa «Jesús/Mesías» según corresponda en el proyecto; este versículo no contiene esos términos.
  - «A los pies de Gamaliel» se deja en forma idiomática literal porque el español la entiende y conserva el color histórico.
  - «Celoso de Dios» se eligió por su brevedad y porque no introduce el tecnicismo «celote» como sustantivo identitario.
