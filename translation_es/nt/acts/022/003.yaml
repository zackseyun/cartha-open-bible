  language: en
  yaml_path: translation/nt/acts/022/003.yaml
  text: I am a Jewish man[a], born in Tarsus of Cilicia, but brought up in this city at the feet of Gamaliel, educated according to the strictness of the law of our fathers[b], being zealous for God just as all of you are today.
  footnotes:
