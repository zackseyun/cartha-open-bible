translation:
  language: es
  text: 'Cuando el centurión oyó esto, se acercó al comandante y le informó, diciendo: «¿Qué vas a hacer[a]? Pues este hombre es un ciudadano romano[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué estás a punto de hacer?». La expresión griega puede indicar una acción inminente o una acción intencionada.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «este hombre es un romano». En el contexto, el sentido es que posee ciudadanía romana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: When the centurion heard this
  chosen_spanish: Cuando el centurión oyó esto
  alternatives_spanish:
  - Después de oír esto
  - Al oír esto
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia previa a la acción principal. «Cuando ... oyó esto» conserva la relación temporal y suena natural en español.
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  - oficial
  lexicon: BDAG
  rationale: «Centurión» es el equivalente histórico y militar más preciso para ἑκατοντάρχης, y es claro para el lector español.
- source_word: προσελθὼν
  english_pob_choice: he went to
  chosen_spanish: se acercó
  alternatives_spanish:
  - fue hasta
  - se presentó ante
  lexicon: BDAG
  rationale: El participio describe movimiento hacia un superior. «Se acercó» transmite el desplazamiento de forma natural y evita una construcción demasiado literal.
- source_word: χιλιάρχῳ
  english_pob_choice: the commander
  chosen_spanish: al comandante
  alternatives_spanish:
  - al tribuno
  - al chiliarca
  lexicon: BDAG
  rationale: χίλιαρχος designa un oficial militar romano de alto rango. «Comandante» comunica bien la función en español sin recurrir a un tecnicismo menos transparente.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported it
  chosen_spanish: le informó
  alternatives_spanish:
  - lo reportó
  - le comunicó
  lexicon: BDAG
  rationale: El verbo expresa transmitir una noticia o información. «Le informó» encaja con el contexto narrativo y militar, y hace explícito el destinatario implícito.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Conserva el vínculo participial con la acción de informar y mantiene el estilo narrativo directo.
- source_word: Τί μέλλεις ποιεῖν;
  english_pob_choice: What are you about to do?
  chosen_spanish: ¿Qué vas a hacer?
  alternatives_spanish:
  - ¿Qué estás a punto de hacer?
  - ¿Qué piensas hacer?
  lexicon: BDAG
  rationale: μέλλω + infinitivo puede expresar inminencia o acción intencionada. «¿Qué vas a hacer?» es la opción más natural en español y puede abarcar ambas posibilidades sin perder el matiz de inminencia.
- source_word: ὁ γὰρ ἄνθρωπος οὗτος
  english_pob_choice: For this man
  chosen_spanish: Porque este hombre
  alternatives_spanish:
  - Pues este hombre
  - Porque este individuo
  lexicon: BDAG
  rationale: «Ἄνθρωπος» aquí se refiere a un varón concreto; «hombre» mantiene esa referencia natural en español. La partícula γάρ se vierte con «porque» para dar la razón de la advertencia.
- source_word: Ῥωμαῖός ἐστιν
  english_pob_choice: is a Roman citizen
  chosen_spanish: es un ciudadano romano
  alternatives_spanish:
  - es romano
  - tiene ciudadanía romana
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «es un romano», el contexto legal exige que se entienda como ciudadanía romana. «Ciudadano romano» hace explícito ese valor contextual, como en la auditoría inglesa.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios pendientes respecto del consenso alto del inglés POB. La versión española sigue de cerca el griego y conserva la ambigüedad de μέλλω mediante una formulación natural en español, con nota explicativa.'
  spanish_consistency_notes:
  - Se mantiene «centurión» para ἑκατοντάρχης y «comandante» para χιλίαρχος, siguiendo la diferenciación militar del pasaje.
  - Se traduce Ῥωμαῖός ἐστιν como «ciudadano romano» por el contexto jurídico, mientras la nota preserva el literal «romano».
  - Se usa «porque» para γάρ en sentido explicativo, coherente con el flujo narrativo en español.
  - No se emplea «SEÑOR» ni terminología teológica no presente en el texto.
