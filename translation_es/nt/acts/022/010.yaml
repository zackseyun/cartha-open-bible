translation:
  language: es
  text: 'Entonces dije[a]: «¿Qué debo hacer, Señor?» Y el Señor me dijo: «Levántate y ve a Damasco, y allí se te dirá acerca de todo lo que te ha sido asignado para hacer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué haré, Señor?»
    reason: lexical_alternative
  - marker: b
    text: O «acerca de todo lo que ha sido dispuesto para que hagas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί ποιήσω
  english_pob_choice: What should I do
  chosen_spanish: ¿Qué debo hacer?
  alternatives_spanish:
  - ¿Qué haré?
  - ¿Qué tengo que hacer?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo expresa la búsqueda de la acción correcta o indicada. «Debo» conserva bien la idea de dirección/obligación implícita en español natural, sin reducirla a un futuro simple.
- source_word: κύριε / ὁ ... κύριος
  english_pob_choice: Lord / the Lord
  chosen_spanish: Señor / el Señor
  alternatives_spanish:
  - señor / el Señor
  - Maestro / el Señor
  lexicon: BDAG
  rationale: Se mantiene «Señor» por la decisión del POB inglés y por la fuerza cristológica del contexto de camino a Damasco. «Señor» en español es la forma reverente y más fiel aquí; «señor» en minúscula bajaría indebidamente el tono.
- source_word: Ἀναστὰς
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate y anda
  lexicon: BDAG
  rationale: El participio funciona como mandato secuencial. «Levántate» es una orden idiomática y natural en español, manteniendo la idea de incorporarse antes de ir.
- source_word: πορεύου εἰς Δαμασκόν
  english_pob_choice: go into Damascus
  chosen_spanish: ve a Damasco
  alternatives_spanish:
  - ve hacia Damasco
  - entra en Damasco
  lexicon: BDAG
  rationale: En español, «ve a Damasco» comunica de modo natural el movimiento hacia la ciudad. Se evita forzar «entra en» porque el matiz de εἰς no exige esa literalidad en una orden común de desplazamiento.
- source_word: κἀκεῖ
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y allí mismo
  - y en ese lugar
  lexicon: BDAG
  rationale: La forma contraída se vierte con la coordinación simple «y allí», preservando la secuencia espacial y narrativa sin añadir énfasis innecesario.
- source_word: λαληθήσεται
  english_pob_choice: you will be told
  chosen_spanish: se te dirá
  alternatives_spanish:
  - te hablarán
  - te informarán
  lexicon: BDAG
  rationale: El futuro pasivo con dativo se expresa de manera natural en español con pasiva refleja impersonal. «Se te dirá» conserva el contenido comunicado sin volverlo demasiado interpretativo.
- source_word: περὶ πάντων
  english_pob_choice: about everything
  chosen_spanish: acerca de todo
  alternatives_spanish:
  - sobre todo
  - acerca de todas las cosas
  lexicon: BDAG
  rationale: «Acerca de todo» reproduce el valor de περί con genitivo como contenido de lo que será comunicado. Es claro y no sobrecarga la frase.
- source_word: τέτακταί σοι ποιῆσαι
  english_pob_choice: has been appointed for you to do
  chosen_spanish: te ha sido asignado para hacer
  alternatives_spanish:
  - te ha sido dispuesto para hacer
  - te ha sido ordenado para hacer
  - ha sido designado para que lo hagas
  lexicon: BDAG
  rationale: Se conserva la idea de algo ya establecido/ordenado por otra instancia, reflejando τάσσω sin resolver la tensión entre designación, asignación u orden. «Asignado» es suficientemente amplio y evita imponer una lectura más fuerte que el texto mismo.
theological_decisions:
- issue: Fuerza de τέτακταί en relación con vocación y dirección divina
  english_pob_reading: has been appointed for you to do
  chosen_spanish_reading: te ha sido asignado para hacer
  alternative_spanish_readings:
  - te ha sido ordenado para hacer
  - te ha sido dispuesto para hacer
  - ha sido designado para que lo hagas
  rationale: La redacción debe mantener que la acción futura de Pablo está fijada por Dios o por la instancia divina que habla, pero sin convertir el versículo en una formulación doctrinal más precisa de lo que exige el griego. «Asignado» preserva la tensión entre llamado, disposición y orden.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el griego SBLGNT. No se detectaron revisiones aplicadas en el contexto; por ello la propuesta mantiene la lectura estable: mandato secuencial, pasiva impersonal y el valor abierto de τέτακταί.'
  spanish_consistency_notes:
  - Se usa «Señor» de manera consistente para κύριος, acorde con el contexto cristológico de Hechos.
  - Se mantiene una sintaxis española natural sin perder el orden lógico del griego.
  - Se preserva la ambigüedad controlada de τέτακταί con «asignado», evitando sobreinterpretación doctrinal.
  - Las notas al pie recogen alternativas léxicas reales, sin duplicar marcadores.
