    rationale: El marcador [b] aparece tras «Damasco», pero el contenido de la nota explica la alternativa de τέτακταί σοι ποιῆσαι («lo que te ha sido asignado...»). Esto induce a error y no cumple la disciplina de anclar la nota exactamente en la frase relevante.
