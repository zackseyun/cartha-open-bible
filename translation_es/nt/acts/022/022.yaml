    issue: Orden antinatural en «¡Fuera de la tierra a un hombre así!»
    rationale: Aunque intenta reflejar «Away with ... from the earth», en español esta construcción resulta forzada y poco idiomática. Puede dificultar la comprensión inmediata del mandato de removerlo de entre los vivos.
  - severity: medium
    issue: La nota [a] no funciona como alternativa útil
    rationale: La nota dice «O, de manera más idiomática...» pero repite esencialmente la formulación principal defectuosa. Una nota de alternativa debe aportar una opción real y mejor justificada.
  revised_spanish_text: 'Lo escuchaban hasta esta expresión[a], y alzaron la voz, diciendo: «¡Quiten de la tierra a un hombre así, porque no debe vivir!»[b]'
