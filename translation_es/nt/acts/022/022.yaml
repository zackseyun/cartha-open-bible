  to: 'Lo escuchaban hasta esta expresión[a], y alzaron la voz, diciendo: «¡Quiten de la tierra a un hombre así, porque no debe vivir!»[b]'
  rationale: Se reemplazó «¡Fuera de la tierra a un hombre así!» por «¡Quiten de la tierra a un hombre así!» para lograr un español natural que conserve el sentido de remoción hostil de Αἶρε ἀπὸ τῆς γῆς τὸν τοιοῦτον. Se mantuvo «porque no debe vivir» como una forma clara y fiel de οὐ γὰρ καθῆκεν αὐτὸν ζῆν. También se corrigieron las notas para que presenten alternativas genuinas y útiles, con anclajes válidos en el texto.
