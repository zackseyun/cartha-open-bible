translation:
  language: es
  text: 'Lo escuchaban hasta esta expresión[a], y alzaron la voz, diciendo: «¡Quiten de la tierra a un hombre así, porque no debe vivir!»[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hasta esta declaración».
    reason: lexical_alternative
  - marker: b
    text: Es decir, pedían su muerte; también puede traducirse «¡Fuera de la tierra con un hombre así!»
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουον
  english_pob_choice: were listening
  chosen_spanish: lo escuchaban
  alternatives_spanish:
  - estaban escuchándolo
  - seguían escuchándolo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continuada en pasado; «lo escuchaban» conserva ese valor durativo de modo natural en español.
- source_word: ἄχρι τούτου τοῦ λόγου
  english_pob_choice: up to this statement
  chosen_spanish: hasta esta expresión
  alternatives_spanish:
  - hasta esta declaración
  - hasta esta palabra
  - hasta este punto de su discurso
  lexicon: BDAG
  rationale: λόγος aquí señala la unidad concreta del discurso que provocó la reacción. «Expresión» funciona bien en español y evita reducirlo a una sola «palabra».
- source_word: ἐπῆραν τὴν φωνὴν αὐτῶν
  english_pob_choice: they raised their voices
  chosen_spanish: alzaron la voz
  alternatives_spanish:
  - levantaron la voz
  - gritaron
  lexicon: BDAG
  rationale: Es una frase idiomática de protesta en voz alta. «Alzaron la voz» mantiene la imagen sin volverlo excesivamente libre.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - clamando
  lexicon: BDAG
  rationale: Introduce directamente el contenido del clamor y corresponde de manera transparente al participio.
- source_word: Αἶρε
  english_pob_choice: Away with
  chosen_spanish: ¡Fuera de
  alternatives_spanish:
  - ¡Llévense de
  - ¡Quiten de
  lexicon: BDAG
  rationale: En este contexto hostil, el imperativo exige expulsión o remoción. «¡Fuera de...» refleja la fuerza idiomática del griego con naturalidad en español.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra y del mundo
  - de la tierra
  lexicon: BDAG
  rationale: γῆ puede ser «tierra» o «tierra/país». Aquí el clamor apunta a quitarlo de entre los vivos; «de la tierra» conserva esa amplitud sin explicitar más de lo que el texto dice.
- source_word: τὸν τοιοῦτον
  english_pob_choice: such a man
  chosen_spanish: a un hombre así
  alternatives_spanish:
  - a un tal hombre
  - a uno así
  - a ese hombre
  lexicon: BDAG
  rationale: El adjetivo es despectivo. «Un hombre así» conserva el desdén sin añadir palabras que el griego no exige.
- source_word: οὐ γὰρ καθῆκεν αὐτὸν ζῆν
  english_pob_choice: for he ought not to live
  chosen_spanish: porque no debe vivir
  alternatives_spanish:
  - pues no le corresponde vivir
  - porque no debería vivir
  lexicon: BDAG
  rationale: καθήκω expresa lo que es adecuado o debido. En español, «no debe vivir» comunica el juicio normativo de la turba y reproduce bien el sentido práctico que la POB inglesa preserva.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al preferir una fórmula idiomática de expulsión («¡Fuera de...») para Αἶρε y una formulación normativa breve para οὐ γὰρ καθῆκεν αὐτὸν ζῆν («no debe vivir»), en lugar de una traducción más explicativa.
  spanish_consistency_notes:
  - Se mantiene «tierra» para γῆ en consonancia con la fuerza universal del clamor, no «país» o «suelo».
  - Se evita «Cristo/SEÑOR» porque no aparecen en el verso.
  - «Escuchaban» conserva el imperfecto aspectual sin forzar una perífrasis más pesada.
