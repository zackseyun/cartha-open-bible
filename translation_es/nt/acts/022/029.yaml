revisions:
- from: Por tanto, los que iban a examinarlo se retiraron de él en seguida[a][b], y el tribuno también tuvo miedo al darse cuenta de que era ciudadano romano y de que lo había atado.
  to: Por tanto, los que iban a examinarlo[a] se retiraron de él enseguida, y el tribuno[b] también se atemorizó al darse cuenta de que era ciudadano romano y de que lo había atado.
  rationale: Se reubicaron las notas en los términos pertinentes para ajustarse al rastro auditado y a la disciplina de marcadores. Se mejoró 'tuvo miedo' a 'se atemorizó' para reflejar mejor el valor ingresivo de ἐφοβήθη. También se normalizó 'enseguida' para mayor fluidez en español moderno.
