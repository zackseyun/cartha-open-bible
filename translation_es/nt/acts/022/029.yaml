review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: retirada inmediata de quienes iban a examinar a Pablo, y luego el temor del tribuno al reconocer su ciudadanía romana y que ya lo había hecho atar. Sin embargo, la colocación de las notas no sigue bien el rastro inglés: la nota cultural sobre χιλίαρχος debe anclarse en ''tribuno'', no en ''en seguida''; y conviene mejorar la fuerza aspectual de ἐφοβήθη con ''se atemorizó'' o equivalente más ingresivo que ''tuvo miedo''.'
  spanish_quality_summary: 'El español es claro y natural, con tono digno y legible. Hay un detalle de estilo mejorable: ''en seguida'' puede preferirse como una sola palabra (''enseguida'') o reemplazarse por ''de inmediato''; además, el anclaje de notas actual resulta confuso. ''Lo había atado'' es comprensible, pero en este contexto judicial ''lo había puesto bajo ataduras'' suena algo más preciso; aun así, ''lo había atado'' no es erróneo.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Tribuno' concuerda con la decisión documentada para χιλίαρχος. 'Ciudadano romano' preserva correctamente el valor legal de Ῥωμαῖός ἐστιν. No aparecen términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota cultural
    rationale: La nota [b] explica 'tribuno' (χιλίαρχος), pero en el borrador está colocada junto a 'en seguida', lo cual no corresponde al término anotado y dificulta la lectura.
  - severity: medium
    issue: Matiz aspectual de ἐφοβήθη subrepresentado
    rationale: '''Tuvo miedo'' es natural, pero no expresa tan claramente la irrupción de la reacción como la decisión inglesa ''became afraid''. En español ''se atemorizó'' o ''se llenó de temor'' representa mejor el inicio del temor.'
  - severity: low
    issue: Forma adverbial mejorable
    rationale: '''En seguida'' es aceptable, pero ''enseguida'' o ''de inmediato'' fluye mejor en español moderno y evita vacilación ortográfica.'
  revised_spanish_text: Por tanto, los que iban a examinarlo[a] se retiraron de él enseguida, y el tribuno[b] también se atemorizó al darse cuenta de que era ciudadano romano y de que lo había atado.
  revised_footnotes:
  - marker: a
    text: En este contexto, ἀνετάζειν puede implicar un examen oficial más específico, incluso por azotes, según el versículo anterior. Se conserva 'examinar' para no sobrecargar el texto principal.
    reason: lexical_alternative
  - marker: b
    text: ‘Tribuno’ traduce el cargo romano χιλίαρχος; también puede decirse ‘comandante’, pero el título romano es más preciso aquí.
    reason: cultural_note
  revision_rationale: Se reubicaron las notas en los términos pertinentes para ajustarse al rastro auditado y a la disciplina de marcadores. Se mejoró 'tuvo miedo' a 'se atemorizó' para reflejar mejor el valor ingresivo de ἐφοβήθη. También se normalizó 'enseguida' para mayor fluidez en español moderno.
