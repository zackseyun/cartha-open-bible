translation:
  language: es
  text: Por tanto, los que iban a examinarlo[a] se retiraron de él enseguida, y el tribuno[b] también se atemorizó al darse cuenta de que era ciudadano romano y de que lo había atado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En este contexto, ἀνετάζειν puede implicar un examen oficial más específico, incluso por azotes, según el versículo anterior. Se conserva 'examinar' para no sobrecargar el texto principal.
    reason: lexical_alternative
  - marker: b
    text: ‘Tribuno’ traduce el cargo romano χιλίαρχος; también puede decirse ‘comandante’, pero el título romano es más preciso aquí.
    reason: cultural_note
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: at once
  chosen_spanish: en seguida
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: Expresa la rapidez inmediata del griego con naturalidad en español moderno, sin perder el valor adverbial de urgencia.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Mantiene la relación inferencial/secuencial con el versículo anterior de forma clara y formal.
- source_word: ἀπέστησαν ἀπ’ αὐτοῦ
  english_pob_choice: withdrew from him
  chosen_spanish: se retiraron de él
  alternatives_spanish:
  - se apartaron de él
  - retrocedieron de él
  lexicon: BDAG
  rationale: La combinación expresa la retirada física y el dejar de acercarse; 'se retiraron' funciona bien en español narrativo y conserva la idea de apartarse.
- source_word: οἱ μέλλοντες αὐτὸν ἀνετάζειν
  english_pob_choice: those who were about to examine him
  chosen_spanish: los que iban a examinarlo
  alternatives_spanish:
  - los que estaban a punto de examinarlo
  - los que iban a interrogarlo
  lexicon: BDAG
  rationale: El participio de intención inminente se expresa naturalmente con 'iban a'. 'Examinarlo' sigue de cerca el verbo griego y preserva la amplitud del término en el contexto.
- source_word: χιλίαρχος
  english_pob_choice: tribune
  chosen_spanish: el tribuno
  alternatives_spanish:
  - el comandante
  - el tribuno militar
  lexicon: BDAG
  rationale: '''Tribuno'' reproduce el cargo romano con precisión histórica y coincide con el valor del término en el contexto narrativo.'
- source_word: ἐφοβήθη
  english_pob_choice: became afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - se asustó
  - temió
  lexicon: BDAG
  rationale: En español, 'tuvo miedo' expresa con naturalidad el comienzo de la reacción de temor que marca el aoristo en este contexto.
- source_word: ἐπιγνοὺς
  english_pob_choice: when he realized
  chosen_spanish: al darse cuenta de
  alternatives_spanish:
  - cuando reconoció
  - al comprender
  lexicon: BDAG
  rationale: La construcción participial causal-temporal se vuelve idiomática con 'al darse cuenta de', conservando la secuencia de percepción que motiva su temor.
- source_word: Ῥωμαῖός ἐστιν
  english_pob_choice: he was a Roman citizen
  chosen_spanish: era ciudadano romano
  alternatives_spanish:
  - era romano
  - era un ciudadano romano
  lexicon: BDAG
  rationale: El punto del contexto es el estatus legal, no solo la etnicidad; 'ciudadano romano' explicita el valor jurídico que motiva el miedo del tribuno.
- source_word: δεδεκώς
  english_pob_choice: had bound him
  chosen_spanish: lo había atado
  alternatives_spanish:
  - lo había sujetado
  - lo había encadenado
  lexicon: BDAG
  rationale: La acción completada se expresa de manera directa y natural. 'Atado' mantiene la sobriedad del texto sin introducir una especificación no dada por el griego.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y toma como guía la solución auditada de la POB inglesa: inferencia con ''Por tanto'', inmediatez con ''en seguida'', retirada con ''se retiraron'', y el estatus jurídico con ''ciudadano romano''. No se registraron revisiones aplicadas en el pasaje inglés, y el acuerdo de revisión fue alto con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene 'tribuno' para χιλίαρχος, coherente con el término romano del contexto.
  - Se usa 'ciudadano romano' para explicitar el valor jurídico de Ῥωμαῖός ἐστιν, como en la decisión auditada inglesa.
  - '''Examinarlo'' conserva la amplitud semántica del verbo griego sin convertirlo explícitamente en ''interrogar'' en el texto principal.'
  - 'La secuencia verbal conserva el matiz narrativo del griego: retirada inmediata, percepción, temor, y referencia a la detención previa.'
