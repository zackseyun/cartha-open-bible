translation:
  language: es
  text: 'Vino a mí[a] y, estando junto a mí, me dijo: «Hermano Saulo, recobra la vista[b]». Y en aquella misma hora recobré la vista y lo miré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo venido a mí». El griego ἐλθὼν πρὸς ἐμέ enfatiza el movimiento hacia Pablo.
    reason: lexical_alternative
  - marker: b
    text: O «ve otra vez» / «vuelve a ver». ἀναβλέπω también puede significar «mirar hacia arriba», pero aquí el contexto de ceguera y sanidad favorece «recobrar la vista».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν πρὸς ἐμέ
  english_pob_choice: He came to me
  chosen_spanish: Vino a mí
  alternatives_spanish:
  - Llegó a mí
  - Vino hacia mí
  lexicon: BDAG
  rationale: El participio aoristo con πρός + acusativo expresa movimiento hacia la persona. «Vino a mí» conserva la idea de llegada sin forzar una estructura participial pesada en español.
- source_word: ἐπιστάς
  english_pob_choice: standing by me
  chosen_spanish: poniéndose de pie junto a mí
  alternatives_spanish:
  - estando de pie junto a mí
  - quedándose junto a mí
  - parándose junto a mí
  lexicon: BDAG
  rationale: El participio comunica colocarse al lado de Pablo. «Poniéndose de pie junto a mí» expresa la cercanía espacial con naturalidad en español y mantiene el matiz del acto de situarse junto a él.
- source_word: Σαοὺλ
  english_pob_choice: Saul
  chosen_spanish: Saulo
  alternatives_spanish:
  - Saúl
  lexicon: Transliteración estándar
  rationale: En español bíblico es natural la forma «Saulo» para el nombre personal, aunque «Saúl» también es posible. Aquí se prefirió «Saulo» para armonía con el uso cristiano hispano y evitar confusión con el rey bíblico homónimo.
- source_word: ἀδελφέ
  english_pob_choice: Brother
  chosen_spanish: hermano
  alternatives_spanish:
  - Hermano
  lexicon: BDAG
  rationale: Es un vocativo de cercanía fraterna/fellowship. En español, «hermano» es la forma natural y fiel para el trato directo.
- source_word: ἀνάβλεψον
  english_pob_choice: receive your sight
  chosen_spanish: recobra la vista
  alternatives_spanish:
  - recibe la vista
  - ve otra vez
  - vuelve a ver
  lexicon: BDAG
  rationale: En el contexto de ceguera y sanidad, ἀναβλέπω significa recuperar la vista. «Recobra la vista» reproduce esa fuerza restaurativa mejor que un simple «mira hacia arriba».
- source_word: αὐτῇ τῇ ὥρᾳ
  english_pob_choice: in that very hour
  chosen_spanish: en aquella misma hora
  alternatives_spanish:
  - a esa misma hora
  - en esa misma hora
  - en aquel mismo momento
  lexicon: BDAG
  rationale: La expresión idiomática marca precisión temporal. «En aquella misma hora» preserva el énfasis del original y coincide con el valor narrativo del inglés POB.
- source_word: ἀνέβλεψα
  english_pob_choice: I received my sight
  chosen_spanish: recobré la vista
  alternatives_spanish:
  - recibí la vista
  - volví a ver
  - volví a recibir la vista
  lexicon: BDAG
  rationale: Se mantiene la coherencia con ἀνάβλεψον. En español, «recobré la vista» comunica de forma natural la restauración de la visión.
- source_word: εἰς αὐτόν
  english_pob_choice: looked at him
  chosen_spanish: lo miré
  alternatives_spanish:
  - lo vi
  - miré hacia él
  - lo observé
  lexicon: BDAG
  rationale: Tras recuperar la vista, la dirección hacia la persona se entiende de modo natural como «lo miré». Esta opción conserva la intención visual sin sonar forzada en español.
theological_decisions:
- issue: Conservar la tensión lexical de ἀναβλέπω entre ‘ver otra vez’ y ‘recobrar/recibir la vista’ en un contexto de sanidad
  english_pob_reading: receive your sight / I received my sight
  chosen_spanish_reading: recobra la vista / recobré la vista
  alternative_spanish_readings:
  - ve otra vez / volví a ver
  - recibe la vista / recibí la vista
  rationale: El contexto inmediato es la curación de la ceguera, por lo que la lectura de restauración de la vista es la más adecuada. Aun así, se conserva en las notas la posibilidad semántica de ‘ver otra vez’ para no borrar la amplitud léxica del verbo.
  doctrine_reference: Hechos 22:13; cf. el uso narrativo de sanidad ocular en el NT
translation_notes:
  revision_awareness: La versión inglesa auditada añadió explícitamente «to me» después de «said» para reflejar μοι; en español se conserva ese dativo con «me dijo». También se mantuvo la decisión revisada de entender ambos usos de ἀναβλέπω como restauración de la vista, no como mera acción de mirar hacia arriba.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo, pues no hay teónimo explícito.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una alusión necesaria al nombre divino.
  - «Saulo» se usa como nombre propio estable en este contexto narrativo.
  - «hermano» conserva el vocativo fraterno sin carga eclesiástica añadida.
