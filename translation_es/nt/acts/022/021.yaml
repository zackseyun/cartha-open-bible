review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «me dijo», el imperativo «Ve», la causalidad de ὅτι con «porque», y el futuro «te enviaré». Sin embargo, no sigue el rastro auditado del POB en el punto más significativo: εἰς ἔθνη en este contexto misionero de Hechos fue decidido como «to the Gentiles», con «to the nations» solo como alternativa léxica en nota. El español invierte esa prioridad y además cambia el alcance de μακρὰν al modificar «naciones» como «lejanas», cuando el griego expresa que Pablo será enviado lejos, no necesariamente que las naciones sean ‘lejanas’ como atributo.'
  spanish_quality_summary: El español es claro y natural, pero «a las naciones lejanas» suena algo menos idiomático y desplaza el énfasis de distancia desde el envío hacia las naciones mismas. «A los gentiles que están lejos» o mejor «lejos, a los gentiles» preserva mejor el sentido. También la llamada de nota debe anclarse en la palabra o frase correspondiente dentro del texto, no quedar solo al final de la oración.
  glossary_alignment: 'Alineación parcial. No hay conflicto con términos base como Yahvé, Mesías, etc. El problema principal es terminológico-contextual: ἔθνη en Hechos 22:21 debe ir normalmente como «gentiles» en el texto principal según la decisión léxica y teológica auditada del POB, dejando «naciones» como alternativa en nota. Eso además encaja mejor con el uso eclesial legible en español.'
  issues:
  - severity: high
    issue: La traducción principal de εἰς ἔθνη como «a las naciones» contradice la decisión auditada del POB para este contexto.
    rationale: El English POB fijó «to the Gentiles» en contexto misional apostólico, preservando «to the nations» solo como alternativa léxica. El borrador invierte indebidamente texto principal y nota.
  - severity: medium
    issue: «Lejanas» atribuye la distancia a «naciones» en vez de al acto de enviar.
    rationale: 'μακρὰν funciona adverbialmente con ἐξαποστελῶ: «te enviaré lejos». Aunque la idea general se mantiene, la sintaxis española actual desplaza el énfasis semántico.'
  - severity: medium
    issue: La nota al pie no está anclada en la frase pertinente dentro del texto.
    rationale: Las instrucciones requieren que el marcador exacto aparezca en el lugar relevante de `spanish_text`. Poner «.[a]» al final de toda la cita es menos preciso que anclarlo a «gentiles» o a la frase equivalente.
  revised_spanish_text: 'Y me dijo: «Ve, porque yo te enviaré lejos, a los gentiles[a]».'
