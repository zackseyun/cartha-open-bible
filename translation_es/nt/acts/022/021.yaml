- from: 'Y me dijo: «Ve, porque yo te enviaré a las naciones lejanas».[a]'
  to: 'Y me dijo: «Ve, porque yo te enviaré lejos, a los gentiles[a]».'
  rationale: Se corrige εἰς ἔθνη para seguir la decisión contextual del POB («gentiles» en el texto principal, «naciones» en nota), y se reubica «lejos» para reflejar mejor la función de μακρὰν con «te enviaré». También se coloca el marcador de nota junto al término al que aplica.
