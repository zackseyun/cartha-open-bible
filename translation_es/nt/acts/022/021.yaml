translation:
  language: es
  text: 'Y me dijo: «Ve, porque yo te enviaré lejos, a los gentiles[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρός με
  english_pob_choice: he said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me dijo a mí
  lexicon: BDAG
  rationale: La construcción narrativa con λέγω + πρός + acusativo introduce discurso directo dirigido a una persona. «Me dijo» conserva esa relación sin sobrecargar el español; el clítico ya marca el destinatario.
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  - Parta
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι funciona como orden de ir o partir. «Ve» es natural en español y reproduce el mandato breve y directo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón del mandato. «Porque» expresa de forma clara la relación causal que el inglés POB también hizo explícita.
- source_word: εἰς ἔθνη
  english_pob_choice: to the Gentiles
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  - a las naciones gentiles
  lexicon: BDAG
  rationale: En este contexto, ἔθνη puede leerse como referencia a los no judíos. En español, «naciones» conserva la amplitud léxica y mantiene abierta la alternativa contextual, mientras «gentiles» se reserva para la nota por ser una interpretación contextual legítima pero no la única posible.
- source_word: μακρὰν
  english_pob_choice: far away
  chosen_spanish: lejanas
  alternatives_spanish:
  - a distancia
  - muy lejos
  - lejos
  lexicon: BDAG
  rationale: El adverbio/adjetivo μακράν subraya distancia. En español, «lejanas» se integra naturalmente con «naciones» y preserva la idea de lejanía geográfica.
- source_word: ἐξαποστελῶ
  english_pob_choice: I will send
  chosen_spanish: te enviaré
  alternatives_spanish:
  - te mandaré
  - te enviaré fuera
  - te mandaré lejos
  lexicon: BDAG
  rationale: ἐξαποστέλλω significa enviar o enviar fuera. «Te enviaré» es la forma más natural y fiel; el matiz de envío hacia afuera queda implícito en el contexto sin forzar la frase.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Complemento directo de segunda persona singular, expresado de manera idiomática por el clítico «te» en español.
theological_decisions:
- issue: ἔθνη en contexto misional apostólico
  english_pob_reading: Gentiles
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: El contexto de Hechos presenta la misión de Pablo hacia los no judíos. El texto principal mantiene el término más literal y abierto («las naciones»), mientras la nota recoge la lectura contextual «gentiles» para no resolver de antemano una tensión léxica real.
  doctrine_reference: Primacía del texto fuente; conservar ambigüedad léxica cuando el original lo permite
- issue: Relación causal de ὅτι
  english_pob_reading: because
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - que
  - pues
  rationale: 'La causalidad forma parte del argumento del versículo: se le ordena ir porque será enviado. «Porque» comunica esa lógica sin debilitar la fuerza del mandato.'
  doctrine_reference: Claridad sintáctica sin alterar el contenido semántico
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el análisis auditado de la POB en inglés. Se conserva la estructura narrativa breve, el mandato directo y la causa explícita introducida por ὅτι. Se optó por una solución española natural («las naciones») en el cuerpo, manteniendo la alternativa contextual «gentiles» en nota para respetar la tensión léxica de ἔθνη en Hechos.
  spanish_consistency_notes:
  - Se usa «naciones» en el texto principal para preservar la amplitud del griego ἔθνη y evitar imponer de inmediato una equivalencia interpretativa cerrada.
  - «Ve» reproduce el mandato breve de Πορεύου con registro natural y reverente.
  - Se evitó «SEÑOR» o sustitutos no presentes, porque el versículo no contiene el nombre divino ni κύριος.
  - «Te enviaré» conserva el valor de ἐξαποστέλλω sin añadir explícitamente una glosa de comisión que el texto no verbaliza.
