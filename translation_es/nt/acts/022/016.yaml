translation:
  language: es
  text: ¿Y ahora qué esperas? Levántate[a], bautízate y quita el lavado de tus pecados[b], invocando su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿por qué te demoras?»'
    reason: lexical_alternative
  - marker: b
    text: El griego también puede entenderse más explícitamente con el participio como «invocando su nombre» o «por invocar su nombre»; la traducción conserva la ambigüedad.
    reason: alternative_reading
lexical_decisions:
- source_word: τί μέλλεις
  english_pob_choice: why are you waiting
  chosen_spanish: ¿y ahora qué esperas?
  alternatives_spanish:
  - ¿por qué te demoras?
  - ¿qué esperas ahora?
  lexicon: BDAG
  rationale: El giro con μέλλω + interrogativo expresa aquí amonestación por la demora, no una consulta neutral sobre el futuro. En español, «¿y ahora qué esperas?» comunica con naturalidad esa reprensión urgente sin añadir contenido ajeno.
- source_word: ἀναστὰς
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - Alzándote
  lexicon: BDAG
  rationale: El participio aoristo acompaña las órdenes siguientes con valor de acción inmediata. «Levántate» conserva el impulso breve e imperativo del griego en un español natural.
- source_word: βάπτισαι
  english_pob_choice: be baptized
  chosen_spanish: bautízate
  alternatives_spanish:
  - sé bautizado
  - hazte bautizar
  lexicon: BDAG
  rationale: El aoristo medio imperativo de βαπτίζω se refleja bien con una forma media/reflexiva en español. «Bautízate» mantiene la fuerza del mandato sin volverlo excesivamente técnico.
- source_word: ἀπόλουσαι
  english_pob_choice: wash away
  chosen_spanish: lava
  alternatives_spanish:
  - lava tus pecados
  - lávate de tus pecados
  - lava tus pecados y quítalos
  lexicon: BDAG
  rationale: El verbo ἀπολούομαι tiene sentido de lavar/limpiar quitando una mancha. En español, «lava tus pecados» sigue el paralelismo del original y permite que el complemento objeto conserve la tensión bíblica de la expresión sin interpretarla de más.
- source_word: τὰς ἁμαρτίας σου
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus faltas
  - tus actos pecaminosos
  lexicon: BDAG
  rationale: «Pecados» es la equivalencia directa y habitual de ἁμαρτίας. Evita suavizar el término con perífrasis y conserva el valor ordinario del sustantivo griego.
- source_word: ἐπικαλεσάμενος
  english_pob_choice: calling on
  chosen_spanish: invocando
  alternatives_spanish:
  - llamando a
  - clamando a
  - invocando al
  lexicon: BDAG
  rationale: El participio medio de ἐπικαλέω se entiende naturalmente como invocar/llamar sobre alguien el nombre divino. «Invocando» es más idiomático y reverente en español que una calca literal, y conserva la relación estrecha con el mandato anterior.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  - el nombre de ese mismo
  lexicon: BDAG
  rationale: El pronombre αὐτοῦ exige «su nombre»; el referente queda contextualizado, y el español evita introducir un título no expresado en el texto griego. Se mantiene así la referencia pronominal abierta del original.
theological_decisions:
- issue: Relación entre bautismo, lavado de pecados e invocación del nombre
  english_pob_reading: The translation preserves the Greek sequence and leaves the precise theological relation between the commands and participle unstated beyond the grammar.
  chosen_spanish_reading: La traducción conserva la secuencia gramatical griega y no resuelve si el bautismo, el lavado de los pecados o la invocación del nombre explican causalmente la remisión.
  alternative_spanish_readings:
  - El bautismo mismo es el medio por el que se lavan los pecados
  - La invocación de su nombre es el medio por el que se lavan los pecados, y el bautismo la acompaña
  - La frase entera forma un complejo de iniciación sin aislar un solo elemento
  rationale: El pasaje es doctrinalmente discutido. Para respetar la tensión registrada en el audio-trail inglés, la redacción española mantiene la coordinación del mandato y el participio sin convertir el verso en una tesis sacramental explícita que el griego no obliga a formular.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el pase más reciente marcó el texto como unchanged. El control cruzado indicó alta concordancia con observación menor, por lo que esta versión mantiene la estructura y las decisiones principales del audit trail inglés.
  spanish_consistency_notes:
  - 'Se preservó la secuencia breve e imperativa del original: pregunta de urgencia, levantarse, bautizarse, lavar los pecados e invocar el nombre.'
  - Se evitó sustituir el pronombre de tercera persona por un título explícito, porque el griego dice αὐτοῦ.
  - Se mantuvo «pecados» en lugar de una paráfrasis moralizante para conservar el sustantivo ordinario ἁμαρτίας.
  - La puntuación reproduce el tono urgente y coordinado del griego con comas sucesivas.
  - El texto usa español neutral y eclesialmente legible, sin depender de formulaciones tradicionales ajenas al audit trail.
