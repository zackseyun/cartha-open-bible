translation:
  language: es
  text: Ananías[a], cierto hombre devoto conforme a la ley, de quien todos los judíos que vivían allí daban buen testimonio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos», si se toma como término étnico-geográfico y no como designación religioso-comunitaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Ananías
  lexicon: nombre propio transliterado
  rationale: Nombre propio; se translitera de forma estándar al español.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: En español puede omitirse para evitar un conector artificial; el flujo narrativo queda natural con la continuidad del relato.
- source_word: τις ἀνὴρ
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - un hombre determinado
  lexicon: BDAG
  rationale: La indefinición de τις se conserva con el artículo indefinido; en español 'un hombre' ya puede introducir una figura previamente no especificada sin recargar el texto.
- source_word: εὐλαβής
  english_pob_choice: devout
  chosen_spanish: devoto
  alternatives_spanish:
  - piadoso
  - reverente
  lexicon: BDAG
  rationale: '''Devoto'' comunica reverencia y observancia religiosa de modo natural en español moderno, sin el matiz algo arcaico o ambiguo de ''piadoso''.'
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - de acuerdo con la ley
  - en conformidad con la ley
  lexicon: BDAG
  rationale: '''Conforme a la ley'' preserva el marco legal judío y suena natural en español; evita el calco más pesado de ''según la ley'' si se busca mayor fluidez.'
- source_word: μαρτυρούμενος
  english_pob_choice: well spoken of
  chosen_spanish: bien hablado
  alternatives_spanish:
  - con buena reputación
  - recomendado
  - de quien daban buen testimonio
  lexicon: BDAG
  rationale: La pasiva expresa que otros daban testimonio favorable de él. 'Bien hablado' reproduce esa valoración pública de forma breve y publicable.
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos ellos
  - por todos
  lexicon: BDAG
  rationale: Se mantiene la fuerza inclusiva del agente colectivo.
- source_word: τῶν κατοικούντων Ἰουδαίων
  english_pob_choice: the Jews living there
  chosen_spanish: los judíos que vivían allí
  alternatives_spanish:
  - los judíos residentes allí
  - los judíos que habitaban allí
  - los judíos que moraban allí
  lexicon: BDAG
  rationale: '''Que vivían allí'' expresa el participio de residencia de manera natural en español y conserva la referencia local sin añadir más de lo que el contexto exige.'
theological_decisions:
- issue: Ἰουδαίων y la decisión entre 'judíos' y 'judeanos'
  english_pob_reading: the Jews living there
  chosen_spanish_reading: los judíos que vivían allí
  alternative_spanish_readings:
  - los judeanos que vivían allí
  rationale: El contexto inmediato apunta a la comunidad judía residente en Damasco y a su testimonio favorable sobre Ananías. 'Judíos' preserva la lectura comunitario-religiosa del pasaje, que es la elección auditada del POB inglés.
  doctrine_reference: identidad etnorreligiosa en el contexto lucano
- issue: Valor del testimonio público en μαρτυρούμενος
  english_pob_reading: well spoken of
  chosen_spanish_reading: bien hablado
  alternative_spanish_readings:
  - de buena reputación
  - de quien daban buen testimonio
  rationale: La frase no afirma santidad absoluta, sino reconocimiento favorable por parte de la comunidad. Mantener la valoración pública evita sobreinterpretar el adjetivo.
  doctrine_reference: testimonio comunitario y reputación moral
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal. La redacción mantiene la misma decisión auditada para Ἰουδαίων, pero ahora la alternativa queda visible donde corresponde.
  spanish_consistency_notes:
  - Se conservó el nombre propio Ananías sin traducir.
  - Se evitó 'SEÑOR' o equivalentes no presentes en el verso.
  - '''Ley'' refleja τὸν νόμον en sentido mosaico/judío, no una ley genérica abstracta.'
  - '''Bien hablado'' mantiene la pasiva de reputación pública sin convertirla en mera autoevaluación.'
  - La nota [a] está anclada en 'judíos' para ofrecer la alternativa etnogeográfica documentada.
