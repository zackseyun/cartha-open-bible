base_translation:
  language: en
  yaml_path: translation/nt/acts/022/025.yaml
  text: But when they had stretched him out with the straps[a], Paul said to the centurion standing there, “Is it lawful for you to flog a Roman citizen who is uncondemned?”
  footnotes:
