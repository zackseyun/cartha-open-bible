translation:
  language: es
  text: 'Pero cuando lo habían extendido con las correas, Pablo dijo al centurión que estaba allí: «¿Les es lícito azotar a un ciudadano romano[a] que no ha sido condenado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre romano». El griego dice literalmente «un hombre romano», pero en este contexto legal el punto es el estatus protegido de Pablo como ciudadano romano.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέτειναν ... τοῖς ἱμᾶσιν
  english_pob_choice: had stretched him out with the straps
  chosen_spanish: lo habían extendido con las correas
  alternatives_spanish:
  - lo habían atado con correas de cuero
  - lo habían sujetado con correas
  lexicon: BDAG
  rationale: El verbo griego expresa preparar a Pablo para el azote extendiéndolo/tensándolo, y ἱμᾶσιν son correas o tiras. «Extendido con las correas» conserva la imagen física y evita añadir un matiz no explícito como «atar».
- source_word: ἑστῶτα
  english_pob_choice: standing there
  chosen_spanish: que estaba allí
  alternatives_spanish:
  - de pie allí
  - que estaba de pie allí
  lexicon: BDAG
  rationale: El participio describe al centurión presente en la escena. En español, «que estaba allí» fluye con naturalidad; el estado de presencia queda preservado sin forzar una redundancia.
- source_word: ἑκατόνταρχον
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  - oficial
  lexicon: BDAG
  rationale: «Centurión» es el equivalente preciso del rango militar romano y mantiene la referencia histórica y narrativa.
- source_word: ἄνθρωπον Ῥωμαῖον
  english_pob_choice: a Roman citizen
  chosen_spanish: un ciudadano romano
  alternatives_spanish:
  - un romano
  - un hombre romano
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «un hombre romano», el contexto jurídico hace que el punto sea el estatus protegido de ciudadanía romana. Siguiendo la nota del POB en inglés, se explicita esa implicación en español.
- source_word: ἀκατάκριτον
  english_pob_choice: uncondemned
  chosen_spanish: que no ha sido condenado
  alternatives_spanish:
  - incondenado
  - sin condena
  lexicon: BDAG
  rationale: El adjetivo significa que no ha recibido condena judicial. «Que no ha sido condenado» es claro, jurídico y natural en español contemporáneo.
- source_word: ἔξεστιν
  english_pob_choice: Is it lawful for you
  chosen_spanish: ¿Les es lícito
  alternatives_spanish:
  - ¿Tienen derecho
  - ¿Les está permitido
  lexicon: BDAG
  rationale: ἔξεστιν plantea si algo es legal o permitido. «Les es lícito» mantiene el tono jurídico del pasaje y funciona bien en registro bíblico.
- source_word: μαστίζειν
  english_pob_choice: to flog
  chosen_spanish: azotar
  alternatives_spanish:
  - flagelar
  - dar latigazos
  lexicon: BDAG
  rationale: El verbo se refiere a un castigo corporal severo. «Azotar» es claro y suficientemente fuerte en español; conserva la violencia del acto sin sonar arcaico.
theological_decisions:
- issue: ἄνθρωπον Ῥωμαῖον y el alcance de la protección legal
  english_pob_reading: The Greek says “a Roman man,” but in this legal context the point is Paul's protected status as a Roman citizen.
  chosen_spanish_reading: un ciudadano romano
  alternative_spanish_readings:
  - un romano
  - un hombre romano
  rationale: 'No hay una tensión doctrinal, sino una decisión de precisión contextual: el texto griego usa ἄνθρωπον Ῥωμαῖον de forma literal, pero la escena apela al estatus legal de Pablo. La traducción española sigue la lectura contextual documentada por el POB.'
  doctrine_reference: Hechos 22:25; contexto legal romano y ciudadanía de Pablo.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «Roman man» por «Roman citizen» para reflejar mejor el valor contextual de ἄνθρωπον Ῥωμαῖον. La redacción española adopta esa decisión revisada y conserva el resto del sentido auditado: la preparación física para el azote, la presencia del centurión y la pregunta sobre la legalidad del castigo.'
  spanish_consistency_notes:
  - Se usó «centurión» para ἑκατόνταρχον por consistencia con la terminología militar romana usual en el POB.
  - Se prefirió «azotar» para μαστίζειν como equivalente claro y fuerte en español.
  - Se mantuvo el registro jurídico con «lícito» para ἔξεστιν.
  - El anclaje de nota [a] se colocó en «correas» porque ahí se concentra la alternativa léxica relevante.
