review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena de agitación simultánea: gritar, arrojar las prendas y lanzar polvo al aire. Sin embargo, «mientras ellos» añade una subordinación temporal que no es necesaria, y «arrojaban sus mantos» sin más puede sonar como simple lanzamiento de prendas, mientras que el inglés auditado y la nota explican también la posible idea de quitárselas o echarlas fuera en agitación. La nota española además introduce «sacudirlas», matiz que no está respaldado por la evidencia presentada.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse para sonar más idiomático y más cercano a la estructura narrativa: «Y como ellos gritaban...» o «Y mientras gritaban...»; además, omitir «ellos» evita pesadez. «Mantos» es aceptable, pero «capas» suena más natural para prendas exteriores en este contexto narrativo. La nota necesita ajustarse para no sobreinterpretar.'
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Las decisiones léxicas clave están mayormente alineadas con el POB, pero conviene afinar ἱμάτια como «capas» y mantener una nota que preserve la alternativa «prendas/vestidos» y la posibilidad de «echar fuera/quitarse» las prendas sin introducir el sentido de «sacudir».
  issues:
  - severity: medium
    issue: «mientras ellos» suena algo pesado y no reproduce de la manera más natural la construcción participial coordinada.
    rationale: El griego presenta acciones simultáneas de la multitud; en español narrativo es más fluido «Y como gritaban...» o «Y mientras gritaban...» sin pronombre explícito.
  - severity: medium
    issue: La nota al pie introduce «sacudirlas», sentido no sustentado por la evidencia léxica proporcionada.
    rationale: La auditoría inglesa habla de lanzar las prendas o echarlas fuera en agitación, no de sacudirlas.
  - severity: low
    issue: «Mantos» es posible, pero «capas» encaja mejor con el valor de prendas exteriores y con un español más natural aquí.
    rationale: ἱμάτια se refiere a prendas exteriores; «capas» comunica mejor esa imagen sin sonar arcaico ni demasiado genérico.
  revised_spanish_text: Y como gritaban y arrojaban sus capas[a] y lanzaban polvo al aire,
  revised_footnotes:
  - marker: a
    text: O «sus prendas» o «sus vestidos». El griego puede referirse tanto al acto de arrojar las prendas como al de echarlas fuera en medio de la agitación.
