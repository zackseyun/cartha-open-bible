  revision_rationale: Se ajusta la sintaxis para un español narrativo más natural y más fiel a la construcción participial; se cambia «mantos» por «capas» para reflejar mejor prendas exteriores; y se corrige la nota para conservar las alternativas léxicas documentadas sin añadir el matiz no respaldado de «sacudirlas».
