translation:
  language: es
  text: Y como gritaban y arrojaban sus capas[a] y lanzaban polvo al aire,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus prendas» o «sus vestidos». El griego puede referirse tanto al acto de arrojar las prendas como al de echarlas fuera en medio de la agitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: κραυγαζόντων
  english_pob_choice: were shouting
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - vociferaban
  lexicon: BDAG
  rationale: El participio describe una acción simultánea y continua de la multitud. «Gritaban» comunica el clamor público con naturalidad en español y conserva el tono de agitación sin añadir matices no presentes en el griego.
- source_word: ῥιπτούντων
  english_pob_choice: throwing off
  chosen_spanish: arrojaban
  alternatives_spanish:
  - tiraban
  - echaban
  - se quitaban y arrojaban
  lexicon: BDAG
  rationale: El verbo puede significar arrojar o lanzar; en este contexto, unido a τὰ ἱμάτια, el POB inglés opta por una acción de desprender/arrojar las prendas en agitación. «Arrojaban» mantiene ese movimiento violento sin imponer demasiado una lectura específica de «quitarse».
- source_word: τὰ ἱμάτια
  english_pob_choice: their cloaks
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus prendas
  - sus vestidos
  - sus capas
  lexicon: BDAG
  rationale: ἱμάτια suele referirse a prendas exteriores. «Mantos» es una opción bíblica natural en español y suficientemente concreta sin restringir innecesariamente el tipo de prenda. Se evita «cloques» o formas poco naturales.
- source_word: κονιορτόν
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - polvareda
  lexicon: BDAG
  rationale: El sustantivo significa polvo. «Polvo» es la correspondencia directa y funciona bien en la imagen de protesta violenta.
- source_word: εἰς τὸν ἀέρα
  english_pob_choice: into the air
  chosen_spanish: al aire
  alternatives_spanish:
  - en el aire
  - hacia el aire
  lexicon: BDAG
  rationale: La preposición expresa movimiento hacia el aire. «Al aire» suena natural en español y conserva la imagen idiomática del gesto.
translation_notes:
  revision_awareness: El texto base en inglés no muestra cambios recientes y el estado de revisión indica alto acuerdo; por ello la redacción española sigue de cerca el valor aspectual y léxico del griego sin introducir explicaciones añadidas.
  spanish_consistency_notes:
  - Se mantiene una sintaxis continua con tres participios coordinados para reflejar la simultaneidad del griego.
  - «Mantos» se usa como equivalente bíblico natural de ἱμάτια, en línea con el valor de prendas exteriores señalado por la auditoría en inglés.
  - La nota al pie conserva la tensión léxica entre «arrojar» y «desprender/echando», sin fijar una sola interpretación donde el griego admite más de una.
