translation:
  language: es
  text: Y me ocurrió que, después de haber regresado a Jerusalén y mientras oraba en el templo[a], caí en trance[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: O «en un éxtasis». La expresión griega dice literalmente «llegar a estar en un trance», un giro idiomático para entrar en un estado visionario.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δέ
  english_pob_choice: And it happened
  chosen_spanish: Y me ocurrió que
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: BDAG
  rationale: La fórmula impersonal ἐγένετο δέ introduce un nuevo episodio narrativo. En español, «me ocurrió que» conserva el valor de acontecimiento que le sucede al hablante sin sonar demasiado forzado o arcaico.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: BDAG
  rationale: El dativo expresa la experiencia personal del evento. En esta construcción, «me ocurrió» integra naturalmente ese matiz experiencial.
- source_word: ὑποστρέψαντι εἰς Ἰερουσαλήμ
  english_pob_choice: after I had returned to Jerusalem
  chosen_spanish: después de haber regresado a Jerusalén
  alternatives_spanish:
  - cuando regresé a Jerusalén
  - al regresar a Jerusalén
  lexicon: BDAG
  rationale: El participio aoristo antecede al evento principal; «después de haber regresado» expresa con claridad la secuencia temporal y mantiene la relación verbal del griego.
- source_word: καὶ προσευχομένου μου
  english_pob_choice: and while I was praying
  chosen_spanish: y mientras oraba
  alternatives_spanish:
  - y mientras estaba orando
  - y al orar
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca simultaneidad. «Mientras oraba» comunica esa acción en curso de forma natural en español.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo o recinto del templo, no el santuario interior. «Templo» es la equivalencia principal; el matiz más preciso queda indicado en la nota.
- source_word: γενέσθαι με
  english_pob_choice: I fell
  chosen_spanish: caí
  alternatives_spanish:
  - llegué a estar
  - entré
  lexicon: BDAG
  rationale: Con ἐν ἐκστάσει, γίνομαι describe la entrada en un estado. «Caí» funciona en español como una forma idiomática breve para ese ingreso en un estado alterado, en paralelo con la decisión inglesa de expresar el cambio de estado de manera natural.
- source_word: ἐν ἐκστάσει
  english_pob_choice: into a trance
  chosen_spanish: en un éxtasis
  alternatives_spanish:
  - en trance
  - en un estado de trance
  lexicon: BDAG
  rationale: ἔκστασις puede expresarse como «éxtasis» o «trance». Aquí se mantiene «éxtasis» por cercanía formal al sustantivo griego y porque el contexto de visión/prayer sostiene un estado extraordinario; la nota preserva la alternativa «trance».
theological_decisions:
- issue: Naturaleza del estado visionario de Pablo
  english_pob_reading: Render as 'trance' without importing claims beyond the text
  chosen_spanish_reading: Traducir como «éxtasis» sin definir más de lo que el versículo afirma
  alternative_spanish_readings:
  - trance
  - estado visionario
  rationale: 'El texto narra un estado alterado durante la oración, pero no lo explica doctrinalmente. Se preserva la tensión: el versículo describe la experiencia sin convertirla en una afirmación técnica sobre su mecánica o alcance.'
  doctrine_reference: Mantener la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se mantuvo la secuencia temporal clara entre el regreso a Jerusalén y la oración en el templo, y se reflejó la experiencia visionaria con una expresión natural en español sin agregar detalles no presentes en el griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece ninguna referencia al tetragrámaton.
  - Se mantiene «templo» para ἱερόν y se aclara su alcance en nota.
  - Se conserva la simultaneidad de la oración con «mientras oraba», en línea con el genitivo absoluto.
  - «Éxtasis» traduce el estado visionario sin introducir lenguaje eclesiástico posterior.
  - Se evita sustituir el matiz experiencial del dativo por una formulación impersonal más débil.
