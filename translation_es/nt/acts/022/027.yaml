translation:
  language: es
  text: 'Entonces el tribuno se acercó y le dijo: «Dime, ¿eres tú romano[a]?». Y él respondió: «Sí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comandante». El griego χιλίαρχος se refiere a un oficial romano; «tribuno» es una traducción histórica usual, pero «comandante» también expresa la función.
    reason: lexical_alternative
  - marker: b
    text: Aquí «romano» significa ciudadano romano en sentido legal, como deja claro el contexto inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino hacia él
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento hacia Pablo antes de hablarle. «Se acercó» es natural en español y conserva la acción de aproximarse sin calco excesivo.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo, no contraste fuerte. «Entonces» comunica bien la progresión de la escena en español.
- source_word: χιλίαρχος
  english_pob_choice: tribune
  chosen_spanish: tribuno
  alternatives_spanish:
  - comandante
  - jefe militar
  - tribuno romano
  lexicon: BDAG
  rationale: En este contexto el término designa al oficial romano al mando de una cohorte. «Tribuno» es el equivalente histórico más preciso y readable en español; «comandante» sería más general.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo a él
  lexicon: BDAG
  rationale: La fórmula directa de introducción de discurso se expresa de forma natural con «le dijo», que preserva el objeto indirecto sin rigidez.
- source_word: Λέγε μοι
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Háblame
  - Dígame
  lexicon: BDAG
  rationale: El imperativo con dativo funciona idiomáticamente como petición directa. «Dime» es la equivalencia natural y conserva la fuerza interrogativa.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - usted
  lexicon: BDAG
  rationale: 'El pronombre explícito aporta énfasis. En español conviene mantenerlo con la inversión normal de la pregunta: «¿eres tú...?».'
- source_word: Ῥωμαῖος
  english_pob_choice: a Roman
  chosen_spanish: romano
  alternatives_spanish:
  - ciudadano romano
  - romano ciudadano
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. Dado el contexto legal, «romano» comunica de manera natural la pertenencia/categoría que aquí se presupone.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro
  - Así es
  lexicon: BDAG
  rationale: 'La respuesta afirmativa simple se vierte con la forma más directa y breve del español: «Sí».'
theological_decisions:
- issue: Sentido legal de «romano»
  english_pob_reading: “A Roman” here means a Roman citizen in the legal sense, as the surrounding context makes clear.
  chosen_spanish_reading: «Romano» aquí se entiende como ciudadano romano en sentido legal, según deja claro el contexto inmediato.
  alternative_spanish_readings:
  - «romano» en sentido étnico o cultural
  - «ciudadano del Imperio romano»
  rationale: El texto no añade la palabra «ciudadano», pero el episodio posterior aclara que se trata de un estatus legal. Mantener «romano» en el versículo y explicarlo en nota evita sobretraducción y conserva la tensión contextual.
  doctrine_reference: Hechos 22:25-29; cf. Hechos 16:37-39
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requiere ajuste respecto del acuerdo alto de la traducción inglesa auditada.'
  spanish_consistency_notes:
  - Se mantiene «tribuno» para χιλίαρχος conforme al valor histórico del cargo.
  - Se usa «romano» sin expandir a «ciudadano romano» en el cuerpo para no añadir información no explícita en el griego.
  - La puntuación y las comillas siguen convenciones del español moderno y mantienen la división directa del discurso.
