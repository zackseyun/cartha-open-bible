base_translation:
  language: en
  yaml_path: translation/nt/acts/022/027.yaml
  text: So the tribune came up and said to him[a], “Tell me, are you a Roman?” And he said[b], “Yes.”
  footnotes:
  - marker: a
    text: Or “commander.” The Greek χιλίαρχος refers to a Roman officer, traditionally rendered “tribune” or more generally “commander.”
    reason: lexical_alternative
  - marker: b
    text: “A Roman” here means a Roman citizen in the legal sense, as the surrounding context makes clear.
    reason: cultural_note
