revisions:
- from: de modo que incluso los llevaban a las calles[a] y los ponían sobre camillas y esteras[b], para que, al pasar Pedro[c], siquiera su sombra llegara a cubrir a alguno de ellos.
  to: de modo que incluso sacaban a los enfermos a las calles[a] y los ponían sobre catres y esteras[b], para que, al pasar Pedro[c], siquiera su sombra cayera sobre alguno de ellos.
  rationale: Se revisa para restaurar explícitamente 'los enfermos', que el griego sí nombra; para usar 'sacaban' como equivalente más natural de ἐκφέρειν en este contexto de sacar desde dentro hacia afuera; para cambiar 'camillas' por 'catres', menos clínico y más acorde al matiz de κλιναρίων; y para ajustar ἐπισκιάσῃ a 'cayera sobre', que refleja mejor la imagen de la sombra pasando sobre alguien sin afirmar sanidad automática. Se conserva la nota teológica de cautela y la distinción entre dos tipos de lecho.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien la estructura consecutiva y de finalidad del griego, así como la cautela teológica de que el versículo expresa la intención del pueblo. También mantiene la distinción entre dos tipos de superficies para recostar a los enfermos. Sin embargo, omite explícitamente el referente de τοὺς ἀσθενεῖς ('los enfermos') en el texto principal, y 'llegara a cubrir' suaviza demasiado ἐπισκιάσῃ, que se refiere más específicamente a que la sombra cayera sobre alguien/sombreara a alguien.
  spanish_quality_summary: El español es fluido y digno, pero la frase inicial queda incompleta semánticamente al decir 'incluso los llevaban' sin nombrar a quiénes. Además, 'camillas y esteras' es entendible pero puede sugerir transporte médico moderno; 'catres y esteras' o 'camas y esteras' suena más neutral-bíblico. 'Siquiera su sombra llegara a cubrir' es comprensible, aunque menos directo que una formulación como 'siquiera su sombra cayera sobre'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas clave son mayormente fieles. La principal corrección necesaria es hacer explícito 'los enfermos' y ajustar ἐπισκιάσῃ a una expresión española más cercana al sentido de 'hacer sombra sobre / caer sobre'.
  issues:
  - severity: high
    issue: Falta el referente explícito de τοὺς ἀσθενεῖς en el texto principal.
    rationale: El borrador dice 'incluso los llevaban a las calles', pero el griego especifica 'a los enfermos'. En español, el pronombre sin antecedente explícito en el versículo produce ambigüedad y pierde contenido semántico del original.
  - severity: medium
    issue: La decisión léxica para τοὺς ἀσθενεῖς está mal registrada.
    rationale: En las lexical_decisions, el campo chosen_spanish para τοὺς ἀσθενεῖς aparece como 'los llevaban' en vez de 'los enfermos'. Aunque esto no afecta directamente el texto publicado, muestra inconsistencia en la auditoría.
  - severity: medium
    issue: '''llegara a cubrir'' atenúa demasiado ἐπισκιάσῃ.'
    rationale: El verbo apunta a que la sombra hiciera sombra sobre alguien o cayera sobre alguien. 'Llegara a cubrir' introduce un matiz más amplio y menos visual que el original.
  - severity: low
    issue: '''camillas'' puede sonar demasiado moderno o clínico para κλιναρίων.'
    rationale: Aunque posible, 'camillas' puede evocar equipo médico. Una opción como 'catres' preserva mejor la idea de una superficie sencilla para recostarse y mantiene la distinción con 'esteras'.
