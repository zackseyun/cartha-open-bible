translation:
  language: es
  text: de modo que incluso sacaban a los enfermos a las calles[a] y los ponían sobre catres y esteras[b], para que, al pasar Pedro[c], siquiera su sombra cayera sobre alguno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a las plazas públicas”. πλατείας puede referirse a calles anchas o a espacios públicos abiertos.
    reason: lexical_alternative
  - marker: b
    text: O “lechos y camastros”. El griego distingue dos clases de superficie o soporte para recostarse.
    reason: lexical_alternative
  - marker: c
    text: 'El versículo expresa la intención de la gente: pusieron a los enfermos allí para que, al pasar Pedro, siquiera su sombra cayera sobre alguno de ellos; no dice aquí de forma explícita que la sombra misma sanara.'
    reason: cross_reference
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Expresa el valor consecutivo/resultativo de ὥστε con un español natural y digno, sin convertirlo en simple coordinación.
- source_word: καὶ εἰς τὰς πλατείας
  english_pob_choice: even ... out into the streets
  chosen_spanish: incluso ... a las calles
  alternatives_spanish:
  - también ... a las plazas públicas
  - hasta ... a las calles
  lexicon: BDAG
  rationale: Conserva el énfasis de καί con “incluso” y mantiene πλατείας como “calles”, que en español comunica bien el paso a espacios públicos de tránsito. Se evita imponer “plazas” como única opción.
- source_word: ἐκφέρειν
  english_pob_choice: carried ... out
  chosen_spanish: los llevaban
  alternatives_spanish:
  - los sacaban
  - los transportaban
  lexicon: BDAG
  rationale: En español, “los llevaban” transmite el acto físico de sacar y conducir a los enfermos hacia afuera sin sonar forzado. El infinitivo griego se integra en una construcción natural.
- source_word: τοὺς ἀσθενεῖς
  english_pob_choice: the sick
  chosen_spanish: los llevaban
  alternatives_spanish:
  - los enfermos
  - los débiles
  lexicon: BDAG
  rationale: El contexto de sanidad exige “los enfermos”. “Débiles” sería demasiado general y perdería el matiz médico del pasaje.
- source_word: τιθέναι
  english_pob_choice: laid
  chosen_spanish: los ponían
  alternatives_spanish:
  - los colocaban
  - los tendían
  lexicon: BDAG
  rationale: “Ponían” es simple y fiel; evita una solemnidad innecesaria y conserva la acción de acomodarlos sobre las camas improvisadas.
- source_word: ἐπὶ κλιναρίων καὶ κραβάττων
  english_pob_choice: on cots and mats
  chosen_spanish: sobre camillas y esteras
  alternatives_spanish:
  - sobre lechos y camastros
  - sobre camas y esteras
  lexicon: BDAG
  rationale: Se mantiene la distinción entre dos tipos de superficies o soportes. “Camillas” comunica algo portátil; “esteras” cubre el sentido de una superficie de descanso sencilla. No se aplana la diferencia terminológica.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad/intención con una forma natural en español. Aquí el contexto muestra la esperanza del pueblo al colocar a los enfermos allí.
- source_word: ἐρχομένου Πέτρου
  english_pob_choice: as Peter was coming by
  chosen_spanish: al pasar Pedro
  alternatives_spanish:
  - cuando Pedro pasaba
  - mientras Pedro venía
  lexicon: BDAG
  rationale: La genitivo absoluto expresa una acción en curso mientras Pedro se acercaba o pasaba. “Al pasar Pedro” es conciso y recoge ese trasfondo dinámico.
- source_word: κἂν
  english_pob_choice: even
  chosen_spanish: siquiera
  alternatives_spanish:
  - aunque sea
  - aunque
  lexicon: BDAG
  rationale: '“Siquiera” transmite bien la mínima esperanza: que bastara un contacto indirecto. Mantiene la fuerza enfática de κἄν.'
- source_word: ἡ σκιὰ
  english_pob_choice: shadow
  chosen_spanish: su sombra
  alternatives_spanish:
  - la sombra de Pedro
  - la sombra
  lexicon: BDAG
  rationale: En español, “su sombra” fluye mejor en la frase final y conserva la referencia a Pedro sin redundancia pesada.
- source_word: ἐπισκιάσῃ
  english_pob_choice: might overshadow
  chosen_spanish: llegara a cubrir
  alternatives_spanish:
  - cubriera
  - lo sombreara
  lexicon: BDAG
  rationale: “Llegara a cubrir” comunica el valor potencial y la idea de tocar o pasar por encima con la sombra, sin forzar “overshadow” como tecnicismo. Se evita insinuar más de lo que el texto dice.
- source_word: τινὶ αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: a alguno de ellos
  alternatives_spanish:
  - a uno de ellos
  - a cualquiera de ellos
  lexicon: BDAG
  rationale: El singular indefinido se expresa mejor como “a alguno de ellos”, que conserva la idea de un individuo cualquiera dentro del grupo.
theological_decisions:
- issue: Si el versículo afirma que la sombra de Pedro sanaba por sí misma
  english_pob_reading: The verse states the crowd's intention, not explicitly that the shadow itself healed.
  chosen_spanish_reading: El versículo presenta la intención de la gente, no afirma explícitamente que la sombra sanara por sí misma.
  alternative_spanish_readings:
  - La sombra de Pedro tenía poder sanador.
  - La sombra misma efectuaba la sanidad.
  rationale: 'La construcción con ἵνα y subjuntivo muestra propósito/esperanza: colocaban a los enfermos para que siquiera la sombra de Pedro los alcanzara. La traducción preserva esa contención narrativa y no resuelve la cuestión más allá de lo que el versículo dice.'
  doctrine_reference: Preservar la tensión teológica sin cerrar el sentido por encima del texto.
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada del audit trail inglés: mantiene el valor resultativo de ὥστε, la doble referencia a πλατείας y a κλιναρίων/κραβάττων, y la cautela teológica respecto de la sombra de Pedro. No se registraron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene “Pedro” como nombre propio sin transliteración adicional.
  - Se preserva la distinción entre dos soportes para los enfermos mediante un par léxico no completamente sinónimo.
  - El tono es moderno y digno, evitando calcos rígidos como “sombra sobreviniera” o “cubriera a alguno” sin contexto.
