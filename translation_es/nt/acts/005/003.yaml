translation:
  language: es
  text: 'Pero Pedro dijo: «Ananías[c], ¿por qué ha llenado Satanás tu corazón para mentir[a] al Espíritu Santo y para retener[b] parte del precio del terreno[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engañar al Espíritu Santo». El verbo griego puede implicar hablar falsamente a alguien, pero en este contexto «mentir a» expresa más directamente el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «retener parte del producto» o «del precio de la venta».
    reason: lexical_alternative
  - marker: c
    text: «Terreno» también puede traducirse «propiedad» o «campo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ ὁ Πέτρος
  english_pob_choice: But Peter said
  chosen_spanish: Pero Pedro dijo
  alternatives_spanish:
  - Y Pedro dijo
  - Entonces Pedro dijo
  lexicon: BDAG
  rationale: δέ introduce una transición leve; «Pero» comunica bien el giro confrontativo del discurso de Pedro sin volverlo más fuerte de lo que el griego exige.
- source_word: διὰ τί
  english_pob_choice: why
  chosen_spanish: ¿por qué?
  alternatives_spanish:
  - ¿por qué razón?
  - ¿para qué?
  lexicon: BDAG
  rationale: Es la forma idiomática natural en español para la pregunta directa del texto.
- source_word: ἐπλήρωσεν ὁ Σατανᾶς τὴν καρδίαν σου
  english_pob_choice: has Satan filled your heart
  chosen_spanish: ha llenado Satanás tu corazón
  alternatives_spanish:
  - Satanás llenó tu corazón
  - Satanás ha llenado tu corazón
  lexicon: BDAG
  rationale: Se conserva la metáfora de «llenar el corazón» sin interpretarla como posesión o coacción. El perfecto compuesto español funciona bien en discurso directo y mantiene la tensión teológica del enunciado.
- source_word: ψεύσασθαί σε τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: to lie to the Holy Spirit
  chosen_spanish: para que mientas al Espíritu Santo
  alternatives_spanish:
  - para mentir al Espíritu Santo
  - para que le mientas al Espíritu Santo
  lexicon: BDAG
  rationale: El infinitivo griego se vierte de manera natural con una subordinada final en español para expresar resultado o propósito. «Mentir al Espíritu Santo» preserva el valor personal y directo del objeto con verbo de habla falsa.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Divino
  lexicon: BDAG
  rationale: Es el equivalente normal y fiel en español contemporáneo; conserva la referencia personal y teológica del texto.
- source_word: νοσφίσασθαι
  english_pob_choice: to keep back some
  chosen_spanish: retengas parte de
  alternatives_spanish:
  - te quedes con parte de
  - ocultes parte de
  lexicon: BDAG
  rationale: El verbo implica sustraer o reservar ocultamente para uno mismo una porción de lo debido. «Retener parte de» expresa bien esa acción fraudulenta en español sin exagerar el término.
- source_word: ἀπὸ τῆς τιμῆς
  english_pob_choice: some of the price
  chosen_spanish: parte del precio
  alternatives_spanish:
  - parte del producto
  - parte del valor
  lexicon: BDAG
  rationale: ἀπό con genitivo señala una porción tomada de un todo; «parte del precio» es claro y reproduce la idea de retención parcial.
- source_word: τοῦ χωρίου
  english_pob_choice: of the land
  chosen_spanish: del terreno
  alternatives_spanish:
  - del campo
  - de la propiedad
  lexicon: BDAG
  rationale: χωρίον puede referirse a un terreno, un campo o una propiedad. «Terreno» es natural en español y suficientemente amplio para no estrechar indebidamente el sentido.
theological_decisions:
- issue: Agencia de Satanás en el corazón de Ananías
  english_pob_reading: Retain the literal expression 'has Satan filled your heart' without paraphrasing it as possession or coercion.
  chosen_spanish_reading: Mantener «ha llenado Satanás tu corazón» sin convertirlo en posesión, control total o mera influencia psicológica.
  alternative_spanish_readings:
  - Satanás te dominó
  - dejaste que Satanás llenara tu corazón
  - Satanás tomó control de tu corazón
  rationale: El griego presenta a Satanás como sujeto de la acción de llenar y, al mismo tiempo, deja intacta la responsabilidad moral de Ananías. La traducción conserva esa tensión sin resolverla doctrinalmente.
  doctrine_reference: Translation philosophy §3; preservación de tensión teológica.
- issue: Lying to the Holy Spirit
  english_pob_reading: Translate directly as 'lie to the Holy Spirit.'
  chosen_spanish_reading: Traducir directamente «mentir al Espíritu Santo».
  alternative_spanish_readings:
  - engañar al Espíritu Santo
  - mentir delante del Espíritu Santo
  rationale: La formulación directa mantiene el tono personal y fuerte del griego, sin añadir explicaciones doctrinales al texto traducido.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que prefirió una construcción más idiomática para el segundo infinitivo en inglés. En español, se optó por una subordinada final («para que mientas») para reproducir con naturalidad la relación de propósito o resultado del infinitivo griego, manteniendo el paralelismo con «retengas parte de» sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» de forma consistente como equivalente de τὸ πνεῦμα τὸ ἅγιον.
  - Se conserva «Satanás» como nombre propio transliterado, acorde con el uso establecido.
  - «Terreno» se eligió por claridad moderna, pero se deja constancia de las alternativas «campo» y «propiedad» por la amplitud semántica de χωρίον.
  - La puntuación reproduce el discurso directo con comillas angulares y respeta el tono de confrontación del versículo.
