translation:
  language: es
  text: 'Pero Pedro y los apóstoles respondieron[a]: «Debemos obedecer a Dios antes que a los hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» o «seres humanos». El griego dice literalmente «hombres», en contraste con Dios y con la autoridad humana en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron diciendo
  lexicon: BDAG
  rationale: La combinación participial + verbo finito funciona como fórmula narrativa de respuesta. En español, «respondieron» comunica la función discursiva sin duplicar de manera pesada la idea de hablar; «respondieron diciendo» sería más explícito pero menos natural.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ introduce un giro suave desde la situación anterior. «Pero» conserva el matiz contrastivo que el contexto exige.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro
  lexicon: uso estándar propio
  rationale: Nombre propio con forma española estándar y ampliamente reconocida en contexto bíblico.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: and the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los emisarios
  lexicon: BDAG
  rationale: ἀπόστολοι designa aquí al grupo apostólico reconocido. «Apóstoles» conserva el valor técnico del término mejor que equivalentes más genéricos.
- source_word: Πειθαρχεῖν
  english_pob_choice: obey
  chosen_spanish: obedecer
  alternatives_spanish:
  - acatar
  - ser obedientes a
  lexicon: BDAG
  rationale: πειθαρχέω significa obedecer a una autoridad. «Obedecer» es el equivalente directo, claro y fiel al sentido.
- source_word: δεῖ
  english_pob_choice: We must
  chosen_spanish: Debemos
  alternatives_spanish:
  - Es necesario que obedezcamos
  - Hay que obedecer
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. «Debemos» conserva esa fuerza obligativa de manera natural en español.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El dativo con el verbo de obediencia se expresa naturalmente en español con la preposición «a».
- source_word: μᾶλλον ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en lugar de
  lexicon: BDAG
  rationale: La comparación contrapone dos objetos de obediencia. «Antes que» reproduce bien la preferencia normativa y suena natural en español bíblico contemporáneo.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: El griego usa ἄνθρωποι en plural masculino con fuerza representativa y contraste retórico con Dios. «Hombres» preserva ese contraste tradicional y la forma del original, sin borrar la tensión de género del término.
theological_decisions:
- issue: Contraste entre obediencia a Dios y obediencia a autoridades humanas
  english_pob_reading: We must obey God rather than men.
  chosen_spanish_reading: Debemos obedecer a Dios antes que a los hombres.
  alternative_spanish_readings:
  - Debemos obedecer a Dios más que a las personas.
  - Debemos obedecer a Dios en lugar de a los hombres.
  rationale: El texto contrapone la autoridad divina con la humana de forma general. «Antes que a los hombres» mantiene la concisión y el filo retórico del griego, sin diluir la oposición ni convertirla en una formulación abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El contexto de revisión final indica alta concordancia y ningún cambio aplicado; por eso la versión española mantiene una equivalencia óptima estable, con una sola nota lexical para el valor representativo de ἀνθρώποις.
  spanish_consistency_notes:
  - Se mantiene «Dios» sin máscara litúrgica, conforme a la pauta del proyecto.
  - Se usa «apóstoles» como término técnico estable.
  - «Antes que» conserva el contraste comparativo sin sobreexplicar.
  - La nota lexical preserva la alternativa semántica de ἀνθρώποις sin neutralizar el género del original.
