translation:
  language: es
  text: El Dios de nuestros padres levantó a Jesús[a][b], a quien ustedes mataron colgándolo en un madero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «resucitó». El verbo puede referirse aquí a la resurrección, aunque el griego no dice explícitamente «de entre los muertos» en este versículo.
    reason: lexical_alternative
  - marker: b
    text: O «en una cruz». El griego dice «en un árbol/madero», probablemente con eco de Deuteronomio 21:23.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ θεὸς
  english_pob_choice: The God
  chosen_spanish: El Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: 'En español, el artículo definido mantiene el valor formal y enfático de la construcción griega en esta fórmula covenantal: «El Dios de nuestros padres». Aunque «Dios» sin artículo sería posible, aquí el artículo ayuda a conservar el tono identificador del texto fuente.'
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: BDAG
  rationale: «Padres» reproduce directamente πατέρων y conserva el eco bíblico de la fórmula ancestral de Israel. «Antepasados» es más explicativo, pero atenúa la resonancia tradicional del giro.
- source_word: ἤγειρεν
  english_pob_choice: raised up
  chosen_spanish: resucitó
  alternatives_spanish:
  - levantó
  - hizo surgir
  - levantó de entre los muertos
  lexicon: BDAG
  rationale: 'Aunque el inglés POB preserva la ambigüedad productiva de ἐγείρω con «raised up», en español «resucitó» expresa con claridad el sentido que el contexto inmediato exige y que la nota inglesa deja abierto: el acto divino respecto de Jesús tras su muerte. «Resucitó de entre los muertos» sería más explícito de lo que el griego dice aquí.'
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: διεχειρίσασθε
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: BDAG
  rationale: El verbo comunica acción violenta con resultado de muerte. «Mataron» es directo y fiel al registro del inglés POB revisado. «Dieron muerte a» es posible, pero más perifrástico; «asesinaron» añade una valoración legal que el griego no explicita.
- source_word: κρεμάσαντες
  english_pob_choice: by hanging
  chosen_spanish: colgándolo
  alternatives_spanish:
  - después de colgarlo
  - al colgarlo
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de manera instrumental: el modo en que lo mataron fue colgándolo. «Colgándolo» conserva la relación verbal y el tono sobrio del original.'
- source_word: ἐπὶ ξύλου
  english_pob_choice: on a tree
  chosen_spanish: de un madero
  alternatives_spanish:
  - en un árbol
  - en una cruz
  lexicon: BDAG
  rationale: «ξύλον» puede significar madera, árbol o madero. En español, «madero» comunica el material y mantiene el eco de Deuteronomio 21:23 sin imponer de entrada la interpretación de «cruz». «Árbol» sería más literal pero menos natural en este contexto; «cruz» resolvería la tensión interpretativa demasiado pronto.
theological_decisions:
- issue: Si ἤγειρεν debe explicitarse como resurrección o dejarse más general
  english_pob_reading: raised up
  chosen_spanish_reading: resucitó
  alternative_spanish_readings:
  - lo levantó
  - lo levantó de entre los muertos
  - lo hizo surgir
  rationale: El griego permite una gama de sentidos, pero el contexto de los Hechos y la referencia a Jesús después de su muerte hacen que el sentido resurreccional sea el más natural en español. La nota inglesa conserva la tensión lexical; el texto español puede decir «resucitó» sin traicionar el pasaje.
  doctrine_reference: Mantener la afirmación de resurrección sin añadir palabras ajenas al verso.
- issue: Si ξύλου debe traducirse interpretativamente como «cruz» o conservar la imagen de «madero/árbol»
  english_pob_reading: on a tree
  chosen_spanish_reading: de un madero
  alternative_spanish_readings:
  - en un árbol
  - en una cruz
  rationale: La decisión sigue la primacía del término griego ξύλον y su posible eco deuteronómico. «Madero» preserva la imagen material y deja abierta la relación con la crucifixión sin sustituir la metáfora por la terminología posterior más interpretativa.
  doctrine_reference: Primacía del léxico original sobre la tradición eclesial cuando el original conserva una resonancia específica.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió «killed» para διεχειρίσασθε, pero en español se eligió el equivalente natural «mataron» para conservar la fuerza directa del verbo. También se mantuvo la tensión del participio κρεμάσαντες y de ξύλου mediante «colgándolo de un madero», sin resolver el texto hacia «cruz».
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio.
  - «Padres» conserva la fórmula bíblica establecida.
  - «Resucitó» expresa el sentido resurreccional del verbo sin expandirlo a «de entre los muertos» en el cuerpo del texto.
  - «Madero» conserva la resonancia de ξύλον y evita una interpretación prematura como «cruz».
  - 'El orden de las cláusulas sigue el flujo del griego: sujeto divino, acción sobre Jesús, luego la acusación contra los oyentes.'
