revisions:
- from: Y él ocultó parte del precio[a], con conocimiento también de su esposa, y trayendo una cierta parte[b], la puso a los pies de los apóstoles.
  to: Y él retuvo en secreto parte del precio[a], sabiéndolo también su esposa, y trayendo una parte, la puso a los pies[b] de los apóstoles.
  rationale: Se ajustó νοσφίζομαι a «retuvo en secreto parte del precio» para reflejar mejor la idea de retención engañosa para sí mismo. Se reemplazó «con conocimiento también de su esposa» por «sabiéndolo también su esposa» para una sintaxis más natural y fiel al genitivo absoluto. También se simplificó «una cierta parte» a «una parte» para mejorar la fluidez sin pérdida material de sentido, y se reubicó la nota [b] sobre «pies» para que ancle exactamente el elemento explicado.
