  spanish_quality_summary: 'El texto es comprensible y digno, pero tiene leves rigideces: «con conocimiento también de su esposa» y «una cierta parte» suenan algo calcados. Una pequeña revisión mejora la naturalidad sin perder precisión. «Sabiéndolo también su esposa» y «una parte» o «cierta parte» leen mejor en español bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. Los términos clave están bien encaminados, pero para νοσφίζομαι conviene una forma española que mantenga explícitamente la idea de retener fraudulentamente para sí, mejor que «ocultó».
  issues:
  - severity: medium
    issue: «ocultó parte del precio» no es la mejor equivalencia de ἐνοσφίσατο
    rationale: El verbo griego implica quedarse fraudulentamente con parte de algo, no solo esconderlo. «Retuvo en secreto parte del precio» o «se quedó con parte del precio» preserva mejor la fuerza moral documentada en el audit trail.
  - severity: low
    issue: «con conocimiento también de su esposa» suena poco natural en español
    rationale: Aunque semánticamente correcto, es una formulación pesada. «Sabiéndolo también su esposa» comunica mejor la circunstancia acompañante del genitivo absoluto y mantiene la claridad.
  - severity: low
    issue: «una cierta parte» suena algo forzado
    rationale: En español natural, «cierta parte» o simplemente «una parte» expresa mejor la indefinición de μέρος τι sin sonar traducido palabra por palabra.
  revised_spanish_text: Y él retuvo en secreto parte del precio[a], sabiéndolo también su esposa, y trayendo una parte, la puso a los pies[b] de los apóstoles.
