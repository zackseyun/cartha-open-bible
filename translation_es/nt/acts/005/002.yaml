translation:
  language: es
  text: Y él retuvo en secreto parte del precio[a], sabiéndolo también su esposa, y trayendo una parte, la puso a los pies[b] de los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se quedó con parte del precio»; el verbo griego implica retenerlo para sí de manera engañosa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a los pies de los apóstoles», una expresión concreta para indicar que lo puso delante de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνοσφίσατο
  english_pob_choice: kept back some of
  chosen_spanish: ocultó parte de
  alternatives_spanish:
  - retuvo parte de
  - guardó para sí parte de
  - se apropió de parte de
  lexicon: BDAG
  rationale: El verbo νοσφίζομαι expresa apartar o reservar para uno mismo de manera encubierta y con matiz deshonesto. «Ocultó parte de» conserva ese forcejo moral sin volver el texto más jurídico de lo que exige el griego.
- source_word: ἀπὸ τῆς τιμῆς
  english_pob_choice: of the price
  chosen_spanish: del precio
  alternatives_spanish:
  - del precio de venta
  - de lo obtenido por la venta
  - de los ingresos
  lexicon: BDAG
  rationale: τιμή aquí alude a la suma recibida por la venta. «Precio» es la correspondencia más directa y mantiene la conexión con la nota del inglés POB; en español evita la abstracción de «ingresos».
- source_word: συνειδυίης καὶ τῆς γυναικός
  english_pob_choice: with his wife also knowing it
  chosen_spanish: con conocimiento también de su esposa
  alternatives_spanish:
  - sabiéndolo también su esposa
  - con su esposa también al tanto
  - porque su esposa también lo sabía
  lexicon: BDAG
  rationale: 'El genitivo absoluto comunica circunstancia acompañante: la esposa estaba al tanto del acto. «Con conocimiento también de su esposa» preserva la participación consciente y evita añadir un posesivo no explícito en el sustantivo griego, aunque es claro por el contexto narrativo.'
- source_word: ἐνέγκας
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - habiendo traído
  - después de traer
  - y trajo
  lexicon: BDAG
  rationale: El participio aoristo se puede reproducir en español con una forma participial que anticipe la acción principal. «Trayendo» mantiene la fluidez narrativa y el vínculo temporal con la acción siguiente.
- source_word: μέρος τι
  english_pob_choice: a certain part
  chosen_spanish: una cierta parte
  alternatives_spanish:
  - una parte
  - alguna parte
  - una porción
  lexicon: BDAG
  rationale: La expresión es indefinida. «Una cierta parte» refleja bien el griego y conserva la ambigüedad numérica sin precisar más de lo que dice el texto.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων ἔθηκεν
  english_pob_choice: he laid it at the apostles’ feet
  chosen_spanish: la puso a los pies de los apóstoles
  alternatives_spanish:
  - la colocó delante de los apóstoles
  - la depositó ante los apóstoles
  - la puso delante de los pies de los apóstoles
  lexicon: BDAG
  rationale: La imagen concreta del griego se conserva con la expresión idiomática «a los pies de los apóstoles», que en español mantiene tanto el gesto físico como su sentido narrativo de entrega ante su autoridad.
theological_decisions:
- issue: Fuerza moral del acto de Ananías
  english_pob_reading: Render the act as deceptive withholding rather than neutral retention.
  chosen_spanish_reading: «ocultó parte del precio» presenta el acto como retención engañosa, no como simple reserva legítima.
  alternative_spanish_readings:
  - retuvo parte del precio
  - guardó parte del precio
  - reservó parte del precio
  rationale: El verbo griego y el contexto inmediato describen una acción deshonesta. La traducción debe conservar esa tensión moral sin añadir interpretación externa ni lenguaje doctrinal adicional.
  doctrine_reference: Hechos 5:1–11; cf. traducción POB de νοσφίζομαι
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «proceeds» a «price» para ajustar mejor τῆς τιμῆς. La presente versión sigue ese ajuste con «precio» y mantiene la nota sobre el carácter encubierto del verbo ἐνοσφίσατο, además de conservar la imagen concreta de poner la ofrenda a los pies de los apóstoles.
  spanish_consistency_notes:
  - Se usó «apóstoles» sin mayúscula por estilo castellano habitual en referencia común.
  - Se evitó «SEÑOR» o fórmulas tradicionales no pertinentes, pues el versículo no contiene el nombre divino.
  - «Conocimiento también de su esposa» reproduce la circunstancia del genitivo absoluto sin sobrecargar el español con una subordinada artificial.
  - Se mantuvo el orden narrativo con participios para reflejar la secuencia griega sin perder naturalidad.
