translation:
  language: es
  text: 'Y les dijo[a]: «Hombres de Israel, tengan cuidado con lo que están por hacer con estos hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pongan atención a ustedes mismos respecto de estos hombres: qué están por hacer»'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τε
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo
  lexicon: BDAG
  rationale: La partícula τε solo enlaza suavemente con la narración previa; en español, 'Y él les dijo' conserva esa continuidad narrativa sin forzar una relación más fuerte de la que da el griego.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - hacia ellos
  lexicon: BDAG
  rationale: Con λέγω, πρός + acusativo marca a los destinatarios del habla. En español, el dativo de objeto indirecto 'les' transmite naturalmente ese destinatario.
- source_word: Ἄνδρες Ἰσραηλῖται
  english_pob_choice: Men of Israel
  chosen_spanish: Varones israelitas
  alternatives_spanish:
  - Hombres de Israel
  - Israelitas
  lexicon: BDAG
  rationale: '''Varones israelitas'' conserva el vocativo masculino representativo del griego y suena más formal y bíblico que una paráfrasis moderna. ''Hombres de Israel'' también es posible, pero ''varones'' refleja mejor el registro del llamado.'
- source_word: προσέχετε ἑαυτοῖς
  english_pob_choice: be careful
  chosen_spanish: cuídense
  alternatives_spanish:
  - presten atención a ustedes mismos
  - tengan cuidado
  lexicon: BDAG
  rationale: El imperativo con reflexivo expresa advertencia y autocautela. 'Cuídense' comunica en español moderno la misma idea de vigilancia sobre sí mismos sin perder el tono exhortativo.
- source_word: ἐπὶ τοῖς ἀνθρώποις τούτοις
  english_pob_choice: with these men
  chosen_spanish: de lo que están por hacer con هؤلاء hombres
  alternatives_spanish:
  - con estos hombres
  - acerca de estos hombres
  lexicon: BDAG
  rationale: La construcción ἐπί con dativo, tras un verbo de cautela, apunta al asunto en cuestión. En español, 'con estos hombres' refleja mejor el referente práctico del contexto, pero en la frase final se prioriza la advertencia sobre la acción que se va a tomar respecto de ellos.
- source_word: τί μέλλετε πράσσειν
  english_pob_choice: what you are about to do
  chosen_spanish: lo que están por hacer
  alternatives_spanish:
  - lo que van a hacer
  - lo que intentan hacer
  lexicon: BDAG
  rationale: μέλλω + infinitivo indica inminencia o acción próxima. 'Están por hacer' conserva esa cercanía temporal y el tono de advertencia mejor que un futuro simple.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español, anclado en el vocativo inicial. La redacción mantiene la advertencia cautelar del griego y evita sobreinterpretar la relación semántica de ἐπί con un matiz más hostil de lo que el contexto exige.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Varones israelitas'' mantiene el vocativo directo y el registro formal del pasaje.'
  - La nota [a] ofrece una alternativa lexical real sin duplicar marcadores ni dejar notas sin ancla.
