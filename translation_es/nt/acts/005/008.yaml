translation:
  language: es
  text: 'Pero Pedro le respondió: «Dime, ¿vendieron ustedes el terreno[a] por este precio?» Y ella dijo: «Sí, por este precio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la propiedad» o «el campo» para χωρίον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη δὲ
  english_pob_choice: But ... answered
  chosen_spanish: Pero ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Entonces ... respondió
  lexicon: BDAG
  rationale: δέ marca el giro narrativo; en español, «Pero» conserva bien la transición y el contraste implícito. ἀποκρίνομαι se expresa naturalmente con «respondió» en el diálogo.
- source_word: πρὸς αὐτὴν
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: BDAG
  rationale: El griego dice literalmente «a ella», pero en español la construcción idiomática es «le respondió», que mantiene el dativo indirecto sin resultar forzada.
- source_word: Εἰπέ μοι
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Háblame
  - Dime esto
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω con dativo se vierte de modo natural como «Dime», preservando la franqueza del interrogatorio.
- source_word: εἰ
  english_pob_choice: did
  chosen_spanish: ¿vendieron... ?
  alternatives_spanish:
  - si vendieron...
  - si acaso vendieron...
  lexicon: BDAG
  rationale: Aquí εἰ introduce una pregunta indirecta de sí/no. En español se expresa con interrogativa directa para conservar naturalidad y claridad.
- source_word: τοσούτου
  english_pob_choice: for this much
  chosen_spanish: por este precio
  alternatives_spanish:
  - por esa cantidad
  - por tanto
  lexicon: BDAG
  rationale: τοσοῦτος apunta a la cantidad mencionada. «Por este precio» conserva la referencia deíctica y comunica bien el valor monetario implícito en el contexto de una venta.
- source_word: τὸ χωρίον
  english_pob_choice: the land
  chosen_spanish: el terreno
  alternatives_spanish:
  - la propiedad
  - el campo
  lexicon: BDAG
  rationale: χωρίον puede significar terreno, propiedad o campo. En este contexto de una venta, «el terreno» es una opción natural y suficientemente precisa sin estrechar indebidamente el sentido.
- source_word: ἀπέδοσθε
  english_pob_choice: did you sell
  chosen_spanish: vendieron
  alternatives_spanish:
  - ¿lo vendieron?
  - ¿lo dieron en venta?
  lexicon: BDAG
  rationale: ἀποδίδωμι en contexto comercial significa «vender». El español directo «vendieron» reproduce el valor del verbo sin rodeos.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro
  - Así es
  lexicon: BDAG
  rationale: Respuesta afirmativa simple en discurso directo; «Sí» es la equivalencia más natural.
- source_word: τοσούτου
  english_pob_choice: for this much
  chosen_spanish: por este precio
  alternatives_spanish:
  - por esa cantidad
  - por tanto
  lexicon: BDAG
  rationale: La repetición al final reafirma la misma cantidad; se mantiene la correspondencia deíctica con «este precio» para preservar la coherencia del intercambio.
translation_notes:
  revision_awareness: Se siguió de cerca el griego SBLGNT y el criterio POB en inglés para el valor de ἀποκρίνομαι, εἰ, τοσοῦτος y χωρίον, manteniendo una redacción española natural y transparente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece en el versículo.
  - Se mantuvo la repetición de la expresión de cantidad en ambas réplicas para reflejar el griego.
  - Se prefirió «terreno» por su amplitud semántica en este contexto de venta.
