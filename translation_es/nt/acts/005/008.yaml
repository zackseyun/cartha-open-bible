    text: O «la propiedad» o «el campo» para χωρίον.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para alinearla con la alternativa léxica documentada para χωρίον, se mejora la naturalidad y precisión del español con «vendieron ustedes» para reflejar el plural del griego en una pregunta dirigida a una sola persona sobre una acción conjunta, y se ajusta la puntuación de la cita interrogativa.
