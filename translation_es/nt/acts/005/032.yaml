translation:
  language: es
  text: Y nosotros somos testigos de estas cosas[a], y también es testigo el Espíritu Santo[c][b], a quien Dios ha dado a los que le obedecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas palabras» o «estos asuntos».
    reason: lexical_alternative
  - marker: b
    text: 'La segunda cláusula griega queda sin verbo explícito y comparte el predicado de la primera: «y [es testigo] el Espíritu Santo».'
    reason: alternative_reading
  - marker: c
    text: El relativo griego es neutro en forma porque concuerda con πνεῦμα, un sustantivo neutro; en español se refleja la referencia personal con «a quien».
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testigos presenciales
  - atestiguadores
  lexicon: BDAG
  rationale: «Testigos» es el equivalente natural y directo en español para μάρτυρες en un contexto testimonial/jurídico. Conserva la fuerza de testimonio apostólico sin volverlo técnico o forzado.
- source_word: τῶν ῥημάτων τούτων
  english_pob_choice: things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - estos asuntos
  lexicon: BDAG
  rationale: En español, «estas cosas» comunica de forma natural el contenido global de lo atestiguado. Mantiene la amplitud semántica de ῥήματα sin reducirlo solo a «palabras» ni hacerlo demasiado abstracto como «asuntos».
- source_word: πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  - el Espíritu Santo
  lexicon: BDAG
  rationale: La forma estable y fiel en español para el referente personal es «el Espíritu Santo». Mantiene la referencia divina personal sin introducir una paráfrasis innecesaria.
- source_word: ὃ
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  lexicon: Greek grammar / BDAG
  rationale: Aunque el relativo griego es neutro por concordar con πνεῦμα, en español conviene reflejar la referencia personal con «a quien». Así se conserva la personificación referencial del Espíritu Santo sin perder la relación sintáctica con «ha dado».
- source_word: ἔδωκεν
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El pretérito perfecto compuesto («ha dado») expresa bien el acto ya realizado con relevancia presente para la comunidad obediente. Es una opción natural en español y coherente con la lectura auditada.
- source_word: πειθαρχοῦσιν
  english_pob_choice: obey
  chosen_spanish: obedecen
  alternatives_spanish:
  - se someten
  - cumplen
  lexicon: BDAG
  rationale: «Obedecen» es la traducción más clara y directa de πειθαρχοῦσιν en este contexto. Mantiene el contraste implícito de Hechos 5 entre obedecer a Dios y a las autoridades humanas.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Dios
  lexicon: Greek grammar
  rationale: El dativo personal se expresa naturalmente en español con «le». Se preserva la cohesión pronominal y la referencia a Dios sin sobrecargar la frase.
theological_decisions:
- issue: La segunda cláusula carece de verbo explícito y presenta al Espíritu Santo como co-testigo junto a los apóstoles.
  english_pob_reading: '"and so is the Holy Spirit" makes explicit the implied predicate "is [a witness]".'
  chosen_spanish_reading: «y también el Espíritu Santo» deja implícito el predicado compartido «es testigo», como en el griego.
  alternative_spanish_readings:
  - y el Espíritu Santo [es testigo]
  - y también es testigo el Espíritu Santo
  rationale: El griego coordina una segunda cláusula elíptica que comparte el predicado de la primera. En español, mantener la elipsis con «y también el Espíritu Santo» respeta la forma breve del original; el sentido de co-testimonio queda claro por el contexto inmediato.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referencia personal del Espíritu Santo mediante el relativo.
  english_pob_reading: Use personal English 'whom' for the Holy Spirit.
  chosen_spanish_reading: «a quien» expresa en español la referencia personal al Espíritu Santo.
  alternative_spanish_readings:
  - que
  - el cual
  rationale: Aunque el griego usa un relativo neutro por concordancia formal con πνεῦμα, el referente es personal. «A quien» comunica esa referencia sin cambiar el contenido ni añadir doctrina ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: El texto español sigue de cerca el pacto textual SBLGNT y refleja la elipsis de la segunda cláusula sin sobre-explicarla. También conserva la tensión gramatical del relativo neutro griego mediante una referencia personal natural en español.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» como designación estándar del referente personal divino.
  - Se usa «testigos» para μάρτυρες en coherencia con el contexto de testimonio en Hechos.
  - Se opta por «estas cosas» para τῶν ῥημάτων τούτων, preservando una amplitud semántica equivalente a la del griego.
  - Se emplea «ha dado» y no una perífrasis más interpretativa para respetar el hecho ya realizado con vigencia presente.
  - Se usa «obedecen» para πειθαρχοῦσιν, evitando diluir la idea de obediencia debida a Dios.
