translation:
  language: es
  text: Y echaron mano de los apóstoles y los pusieron en custodia pública.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέβαλον τὰς χεῖρας ἐπὶ
  english_pob_choice: laid hands on
  chosen_spanish: echaron mano de
  alternatives_spanish:
  - pusieron las manos sobre
  - aprehendieron
  - se apoderaron de
  lexicon: BDAG
  rationale: La expresión griega es idiomática y en este contexto indica captura hostil, no imposición de manos para bendición o envío. En español, «echaron mano de» conserva la fuerza de aprehensión sin sonar tan mecánico como una traducción literal de «pusieron las manos sobre».
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En Hechos, el término funciona como designación estable de los enviados comisionados por Jesús, no como «mensajeros» genéricos. «Apóstoles» preserva ese valor titular.
- source_word: ἔθεντο
  english_pob_choice: put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - metieron
  lexicon: BDAG
  rationale: τίθημι aquí se traduce con un verbo español directo y natural. «Pusieron» mantiene la relación con el complemento preposicional siguiente sin recargar el estilo.
- source_word: ἐν τηρήσει δημοσίᾳ
  english_pob_choice: in public custody
  chosen_spanish: en custodia pública
  alternatives_spanish:
  - bajo custodia pública
  - en detención pública
  - en prisión pública
  lexicon: BDAG
  rationale: τήρησις puede referirse a custodia, guarda o confinamiento, y δημοσίᾳ modifica el carácter público del lugar o estado de detención. «Custodia pública» sigue de cerca la revisión inglesa más reciente y evita precisar indebidamente un edificio de cárcel.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «the public jail» por «public custody» para reflejar mejor τηρήσει δημοσίᾳ como detención/retención pública más que como un edificio de cárcel. La redacción española adopta esa misma preferencia semántica con «custodia pública».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o términos de reverencia ajenos al versículo, pues no aparece vocabulario divino aquí.
  - «Apóstoles» se mantiene como título eclesial establecido dentro de Hechos.
  - «Custodia pública» preserva la ambigüedad relativa del griego entre estado de detención y lugar de confinamiento sin forzar «cárcel».
