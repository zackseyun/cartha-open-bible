translation:
  language: es
  text: Y cada día, en el templo y de casa en casa, no cesaban de enseñar y de anunciar la buena noticia de que Jesús es el Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «anunciando la buena noticia de Jesús el Mesías» / «anunciando a Jesús como el Mesías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσάν τε ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: BDAG
  rationale: El acusativo de extensión temporal expresa continuidad habitual. «Cada día» reproduce bien esa frecuencia constante en español sin sonar forzado.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el santuario interior. «En el templo» es natural y suficientemente preciso; las otras opciones son más explicativas.
- source_word: κατ’ οἶκον
  english_pob_choice: from house to house
  chosen_spanish: de casa en casa
  alternatives_spanish:
  - casa por casa
  - en las casas
  lexicon: BDAG
  rationale: La fuerza distributiva de κατά con οἶκον se expresa mejor en español con una construcción repetitiva. «De casa en casa» comunica actividad extendida por diversos hogares.
- source_word: οὐκ ἐπαύοντο
  english_pob_choice: they did not stop
  chosen_spanish: no cesaban
  alternatives_spanish:
  - no dejaban de
  - no se detenían
  lexicon: BDAG
  rationale: El imperfecto medio indica acción continua sin interrupción. «No cesaban» conserva bien esa duración continua y mantiene un registro digno.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: de enseñar
  alternatives_spanish:
  - enseñando
  - de instruir
  lexicon: BDAG
  rationale: El participio expresa actividad simultánea y continua. En español, tras «no cesaban de», el infinitivo funciona con naturalidad y mantiene el sentido de instrucción apostólica.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the good news
  chosen_spanish: de anunciar la buena noticia
  alternatives_spanish:
  - de proclamar la buena noticia
  - de evangelizar
  lexicon: BDAG
  rationale: El verbo significa anunciar buenas nuevas o proclamar el evangelio. «Anunciar la buena noticia» es claro y evita un verbo demasiado técnico en este contexto narrativo.
- source_word: τὸν χριστὸν Ἰησοῦν
  english_pob_choice: that Jesus is the Messiah
  chosen_spanish: que Jesús es el Mesías
  alternatives_spanish:
  - a Jesús como el Mesías
  - que Jesús es Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: 'La guía doctrinal del proyecto favorece traducir Χριστός como «Mesías» cuando funciona como título. Aquí el sentido del anuncio es confesional: la identidad proclamada de Jesús como el Mesías.'
theological_decisions:
- issue: Cómo renderizar Χριστός
  english_pob_reading: Messiah rather than Christ
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός funciona como título mesiánico, no como nombre fijo. «Mesías» preserva el valor semántico y sigue la norma del proyecto de traducir títulos cristológicos cuando es posible.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: Valor sintáctico de εὐαγγελιζόμενοι τὸν χριστὸν Ἰησοῦν
  english_pob_reading: proclaiming the good news that Jesus is the Messiah
  chosen_spanish_reading: anunciar la buena noticia de que Jesús es el Mesías
  alternative_spanish_readings:
  - anunciar la buena noticia acerca de Jesús, el Mesías
  - proclamar a Jesús como el Mesías
  rationale: El griego permite entender el acusativo como contenido del anuncio. La redacción española explicita ese contenido sin añadir información ajena al texto.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source plain sense without paraphrase'
translation_notes:
  revision_awareness: El texto español sigue la última restauración de la auditoría, que volvió a «Messiah/Mesías» desde la variante «Christ/Cristo» para respetar la política del proyecto sobre Χριστός. También conserva el ajuste de estilo que hace explícito el contenido de εὐαγγελιζόμενοι, sin perder la relación entre el anuncio y la identidad mesiánica de Jesús.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en coherencia con la terminología por defecto del proyecto.
  - «De casa en casa» conserva la fuerza distributiva de κατ’ οἶκον sin volverlo una paráfrasis excesiva.
  - La puntuación y la sintaxis buscan ser publicables en español contemporáneo, con registro eclesial amplio.
