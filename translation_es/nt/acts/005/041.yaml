  to: Así que ellos se fueron de la presencia del consejo[a], regocijándose porque habían sido considerados dignos de ser deshonrados por el Nombre.
  rationale: Se reordena la oración para que «de la presencia del consejo» modifique claramente el movimiento de salida, se usa «regocijándose» para reflejar mejor el participio concurrente χαίροντες, y se ajusta «ser deshonrados» para acercarse más al pasivo infinitivo ἀτιμασθῆναι. Se conserva «el Nombre» y la nota alternativa conforme al rastro de auditoría inglés.
