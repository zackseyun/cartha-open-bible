review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego: los apóstoles se alejan del consejo con gozo porque fueron tenidos por dignos de padecer deshonra por el Nombre. También preserva correctamente la fórmula reverente absoluta «el Nombre» y la nota alternativa. Sin embargo, hay un desajuste sintáctico importante en «de la presencia del consejo», que en español suena como complemento mal unido a «llenos de gozo» en vez de modificar el movimiento de salida. Además, «llenos de gozo» debilita el valor verbal concurrente de χαίροντες.'
  spanish_quality_summary: El español es generalmente claro, pero la secuencia «siguieron su camino, llenos de gozo, de la presencia del consejo» resulta poco natural y ambigua. Una formulación como «se fueron de la presencia del consejo, regocijándose» o «salieron de la presencia del consejo llenos de gozo» resuelve la sintaxis y refleja mejor la relación entre el desplazamiento y el participio. «Consejo» es aceptable, y «el Nombre» está bien capitalizado para la fórmula reverente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no introduce «Señor» ni «Cristo», mantiene «el Nombre» en vez de expandirlo a «el nombre de Jesús», y evita transliterar συνέδριον como «Sanedrín» en el texto principal. La decisión sobre ἀτιμασθῆναι puede expresarse mejor con un pasivo más cercano al griego («ser deshonrados»), aunque «sufrir deshonra» no es inaceptable.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en «de la presencia del consejo»
    rationale: En griego, ἀπὸ προσώπου τοῦ συνεδρίου modifica claramente el verbo de movimiento. En el borrador, la frase queda separada por comas y parece depender de «llenos de gozo», produciendo ambigüedad y español forzado.
  - severity: low
    issue: «Llenos de gozo» atenúa el carácter verbal de χαίροντες
    rationale: El participio presente expresa una acción/modalidad concurrente. Aunque el sentido se entiende, «regocijándose» o «gozosos» ligado al verbo principal refleja mejor la estructura del original.
  - severity: low
    issue: «Sufrir deshonra» es menos cercano al pasivo infinitivo del griego
    rationale: 'ἀτιμασθῆναι es pasivo: «ser deshonrados». La redacción actual conserva el campo semántico de honor/vergüenza, pero una forma pasiva reproduce con más fidelidad la construcción fuente.'
  revised_spanish_text: Así que ellos se fueron de la presencia del consejo[a], regocijándose porque habían sido considerados dignos de ser deshonrados por el Nombre.
  revised_footnotes:
  - marker: a
    text: O «el nombre de Jesús». El griego dice literalmente «el Nombre», una abreviatura reverente que queda implícita en el texto.
    reason: alternative_reading
  revision_rationale: Se reordena la oración para que «de la presencia del consejo» modifique claramente el movimiento de salida, se usa «regocijándose» para reflejar mejor el participio concurrente χαίροντες, y se ajusta «ser deshonrados» para acercarse más al pasivo infinitivo ἀτιμασθῆναι. Se conserva «el Nombre» y la nota alternativa conforme al rastro de auditoría inglés.
