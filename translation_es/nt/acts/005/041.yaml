translation:
  language: es
  text: Así que ellos se fueron de la presencia del consejo[a], regocijándose porque habían sido considerados dignos de ser deshonrados por el Nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nombre de Jesús». El griego dice literalmente «el Nombre», una abreviatura reverente que queda implícita en el texto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπορεύοντο
  english_pob_choice: went on their way
  chosen_spanish: siguieron su camino
  alternatives_spanish:
  - se fueron
  - iban
  - partieron
  lexicon: BDAG
  rationale: El imperfecto describe un desplazamiento en curso; «siguieron su camino» mantiene ese valor procesual y suena natural en español narrativo, sin volverlo demasiado puntual como «partieron».
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: llenos de gozo
  alternatives_spanish:
  - regocijándose
  - con gozo
  - alegres
  lexicon: BDAG
  rationale: El participio expresa modo concurrente con la salida. «Llenos de gozo» conserva el contenido afectivo y resulta idiomático en español bíblico contemporáneo; «regocijándose» sería más verbal, pero algo más pesado aquí.
- source_word: ἀπὸ προσώπου τοῦ συνεδρίου
  english_pob_choice: from the presence of the council
  chosen_spanish: de la presencia del consejo
  alternatives_spanish:
  - de delante del consejo
  - desde la presencia del consejo
  - ante el consejo
  lexicon: BDAG
  rationale: La expresión literalmente dice «de la cara/presencia». En español, «de la presencia del consejo» preserva la imagen formal sin sonar forzada; se evita a propósito simplificarlo a un mero «ante».
- source_word: συνεδρίου
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - Sanedrín
  - concilio
  lexicon: BDAG
  rationale: Se sigue la decisión inglesa de traducir el título por su sentido común en vez de transliterarlo. «Consejo» comunica el cuerpo gobernante sin introducir una forma más técnica que el texto griego no exige en esta línea.
- source_word: κατηξιώθησαν
  english_pob_choice: had been counted worthy
  chosen_spanish: habían sido considerados dignos
  alternatives_spanish:
  - habían sido tenidos por dignos
  - fueron considerados dignos
  - habían sido juzgados dignos
  lexicon: BDAG
  rationale: El aoristo pasivo comunica que fueron estimados/valorados como dignos. «Habían sido considerados dignos» reproduce bien la evaluación pasiva y encaja con la construcción española del participio de resultado.
- source_word: ὑπὲρ τοῦ ὀνόματος
  english_pob_choice: for the Name
  chosen_spanish: por el Nombre
  alternatives_spanish:
  - por el nombre
  - por el nombre de Jesús
  - por su Nombre
  lexicon: BDAG
  rationale: Se conserva la forma reverente absoluta «el Nombre», como en el texto griego y en la decisión inglesa. «Por» refleja aquí la relación de causa/referencia del sufrimiento, y evita expandir el referente explícito que el griego deja implícito.
- source_word: ἀτιμασθῆναι
  english_pob_choice: to be dishonored
  chosen_spanish: sufrir deshonra
  alternatives_spanish:
  - ser deshonrados
  - ser avergonzados
  - padecer deshonra
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa recibir trato deshonroso. «Sufrir deshonra» conserva el campo honor/vergüenza y suena natural en español; «ser deshonrados» también sería posible, pero aquí la formulación nominal conserva mejor el matiz de padecimiento.
theological_decisions:
- issue: El referente implícito de «el Nombre»
  english_pob_reading: Retain 'the Name' without expanding it to 'the name of Jesus' in the main text.
  chosen_spanish_reading: Mantener «el Nombre» sin explicitar «de Jesús» en el texto principal.
  alternative_spanish_readings:
  - el nombre de Jesús
  - su Nombre
  - el nombre
  rationale: El griego usa la expresión absoluta τοῦ ὀνόματος, que funciona como fórmula reverente y deja el referente implícito. En español, conservar «el Nombre» preserva esa carga teológica y evita añadir una aclaración que el versículo no formula explícitamente.
  doctrine_reference: Principios POB sobre fidelidad al texto y preservación de fórmulas reverenciales implícitas
translation_notes:
  revision_awareness: Se siguió la última pasada de revisión, que indicó que no hacían falta cambios adicionales y mostró alto acuerdo con la evaluación externa; por eso se mantiene la solución reverente «el Nombre» y una sintaxis española sobria y directa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto de Yahvé, porque este versículo no contiene el nombre divino.
  - Se conserva el registro bíblico formal sin calcos innecesarios; «siguieron su camino» y «de la presencia del consejo» mantienen claridad y fidelidad.
  - La nota del pie de página preserva la ambigüedad reverencial del original sin imponer una identificación explícita en el cuerpo del texto.
