translation:
  language: es
  text: 'Pero un ángel del Señor abrió las puertas de la cárcel durante la noche, los sacó y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - el ángel
  - un mensajero
  lexicon: BDAG
  rationale: 'El griego carece de artículo, así que en español corresponde mantener la indefinición: ''un ángel''. En el contexto narrativo de Hechos, la referencia es claramente a un ser celestial, no a un mensajero humano.'
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: BDAG
  rationale: La expresión fija 'ángel del Señor' refleja fielmente κύριος en esta construcción y coincide con el uso bíblico establecido. En este contexto no hace falta explicitar 'Yahvé' en el texto principal, porque la frase funciona como designación tradicional del mensajero divino.
- source_word: διὰ νυκτός
  english_pob_choice: during the night
  chosen_spanish: durante la noche
  alternatives_spanish:
  - de noche
  - por la noche
  lexicon: BDAG
  rationale: La preposición con genitivo aquí es temporal; 'durante la noche' conserva el valor de tiempo continuo y suena natural en español actual.
- source_word: ἤνοιξε
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desbloqueó
  - destapó
  lexicon: BDAG
  rationale: ἀνοίγω significa simplemente 'abrir'. 'Abrió' transmite el hecho sin añadir la idea de 'desbloquear', que no está expresada en el griego.
- source_word: τὰς θύρας τῆς φυλακῆς
  english_pob_choice: the doors of the prison
  chosen_spanish: las puertas de la cárcel
  alternatives_spanish:
  - las puertas de la prisión
  - las puertas del calabozo
  lexicon: BDAG
  rationale: θύραι son 'puertas' y φυλακή aquí designa el lugar de detención. 'Cárcel' es una equivalencia clara y natural para el lector español; 'prisión' también sería posible, pero 'cárcel' suena más fluido en narrativa.
- source_word: ἐξαγαγών
  english_pob_choice: brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los llevó fuera
  - los hizo salir
  lexicon: BDAG
  rationale: El participio aoristo expresa que los hizo salir de allí. 'Los sacó' es una manera breve y natural de reproducir ese movimiento sin sobreexplicar la relación entre el ángel y los presos.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - también
  lexicon: BDAG
  rationale: τέ enlaza la acción participial con el verbo principal; en español, 'y' es la coordinación más simple y fiel.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: λέγω en narración aorística se traduce de forma natural como 'dijo'. El contenido del discurso continúa en el versículo siguiente.
theological_decisions:
- issue: Naturaleza de ἄγγελος en contexto
  english_pob_reading: heavenly angel
  chosen_spanish_reading: ángel celestial
  alternative_spanish_readings:
  - mensajero humano
  rationale: La apertura sobrenatural de las puertas y la liberación de los presos indican un ser angelical, no un enviado humano. Por eso el texto español conserva 'ángel' sin atenuar el carácter sobrenatural del episodio.
  doctrine_reference: Hechos 5:19; uso narrativo de ἄγγελος en contextos sobrenaturales
- issue: Traducción de κύριος en la expresión fija
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En la expresión bíblica 'ángel del Señor', 'Señor' es la forma idiomática natural en español y mantiene la correspondencia con el uso tradicional de κύριος en esta construcción.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El texto se ajusta al auditorio español sin necesidad de notas, y corrige el problema previo eliminando marcas de pie de nota no ancladas en el versículo. Se mantiene la secuencia narrativa del griego: apertura de puertas, salida de los presos, y palabra final del ángel.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB para κύριος como 'Señor' en la frase fija 'ángel del Señor'.
  - Se evita añadir información no expresada, como 'desbloqueó' o 'prisión' si no mejora la naturalidad; 'cárcel' conserva el sentido de φυλακή.
  - La coordinación final 'y dijo' respeta el valor narrativo de τε + εἶπεν sin forzar una mayor explicitación.
