translation:
  language: es
  text: Pero un hombre llamado Ananías[a], con Safira, su esposa, vendió una propiedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente «propiedad»; el término griego puede referirse de manera amplia a una posesión o a una propiedad inmueble.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un marido
  - un cierto hombre
  lexicon: BDAG
  rationale: ἀνήρ introduce aquí a un individuo en la narración. «Un hombre» comunica con naturalidad el valor discursivo y mantiene el paralelo con la traducción inglesa auditada. «Marido» sería prematuro porque la relación conyugal ya se expresa después con τῇ γυναικὶ αὐτοῦ.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ marca aquí un giro contrastivo respecto del ejemplo anterior. «Pero» preserva mejor esa oposición narrativa que una simple continuidad.
- source_word: τις
  english_pob_choice: a
  chosen_spanish: un
  alternatives_spanish:
  - un cierto
  lexicon: BDAG
  rationale: τις funciona como indefinido. En español se expresa de manera natural con el artículo indefinido «un», sin necesidad de «un cierto».
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Ananias
  lexicon: convención onomástica
  rationale: 'Se translitera el nombre propio según la convención habitual en español bíblico, con acento gráfico: «Ananías».'
- source_word: ὀνόματι
  english_pob_choice: named
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  - de nombre
  lexicon: BDAG
  rationale: 'El dativo ὀνόματι es idiomático: «by name / named». En español, «llamado» resulta natural y fiel.'
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - en compañía de
  lexicon: BDAG
  rationale: σύν con dativo expresa acompañamiento. «Junto con» conserva bien ese matiz y evita ambigüedad con una mera coordinación.
- source_word: Σαπφίρῃ
  english_pob_choice: Sapphira
  chosen_spanish: Safira
  alternatives_spanish:
  - Sapphira
  lexicon: convención onomástica
  rationale: 'Se adapta el nombre propio a la forma usual en español bíblico: «Safira».'
- source_word: τῇ γυναικὶ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa y
  lexicon: BDAG
  rationale: γυνή en esta construcción posesiva significa «esposa». «Su esposa» es claro y digno en español moderno; «su mujer» sería posible pero menos preciso y menos neutral en registro.
- source_word: ἐπώλησεν
  english_pob_choice: sold
  chosen_spanish: vendió
  alternatives_spanish:
  - enajenó
  - subastó
  lexicon: BDAG
  rationale: 'Aoristo de πωλέω: en narración se traduce naturalmente por «vendió».'
- source_word: κτῆμα
  english_pob_choice: a piece of property
  chosen_spanish: una propiedad
  alternatives_spanish:
  - un bien
  - un terreno
  - una posesión
  lexicon: BDAG
  rationale: κτῆμα denota una posesión o propiedad vendible. La versión inglesa preserva la amplitud semántica con «a piece of property»; en español, «una propiedad» mantiene esa amplitud sin sobredeterminar si era terreno, inmueble o posesión.
theological_decisions:
- issue: Fuerza contrastiva de δέ frente al relato anterior
  english_pob_reading: Render δέ as 'But' to preserve the contrastive force.
  chosen_spanish_reading: Renderizar δέ como «Pero» para conservar la fuerza contrastiva.
  alternative_spanish_readings:
  - «Ahora bien» para una transición más suave
  - «Y» para una simple continuación
  rationale: El contexto inmediato contrapone el ejemplo generoso previo con el caso de Ananías y Safira. «Pero» deja visible ese contraste sin añadir interpretación extrínseca.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El paso de revisión más reciente indica que no hubo cambios necesarios; por tanto, esta propuesta sigue de cerca el texto fuente y el consenso auditado en inglés, ajustándolo a un español natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo la estructura narrativa breve del griego con sujeto explícito y predicado simple.
  - Se usó «Ananías» y «Safira» según la convención española bíblica, evitando transliteraciones inglesas innecesarias.
  - «Una propiedad» preserva la amplitud de κτῆμα y queda enlazado con la nota a para reflejar la alternativa lexical documentada.
  - No se introdujo una marca de nota en nombres propios, porque la nota auditada corresponde solo a κτῆμα.
