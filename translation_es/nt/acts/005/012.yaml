  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Pórtico de Salomón' encaja con στοά. 'Señales y prodigios' es una buena equivalencia. No se detectan conflictos con Yahvé/Mesías/etc. La principal cuestión es de correspondencia entre decisiones léxicas y anclajes de notas, más la preferencia de estilo para ὁμοθυμαδόν.
