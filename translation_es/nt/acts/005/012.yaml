translation:
  language: es
  text: Ahora se hacían muchas señales y prodigios entre el pueblo por medio de las manos de los apóstoles, y estaban todos juntos[a] en el Pórtico de Salomón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de común acuerdo'. El griego enfatiza tanto la unidad compartida como el hecho de estar reunidos.
    reason: lexical_alternative
  - marker: b
    text: O 'la Columnata de Salomón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ ... τῶν χειρῶν τῶν ἀποστόλων
  english_pob_choice: through the hands of the apostles
  chosen_spanish: por medio de las manos de los apóstoles
  alternatives_spanish:
  - por medio de los apóstoles
  - a través de las manos de los apóstoles
  lexicon: διά + genitivo; χείρ
  rationale: Conservo el valor instrumental concreto del giro griego. 'Por medio de las manos' mantiene la imaginería de agencia mediada sin borrar el matiz corporal que el inglés POB decidió preservar.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa. 'Ahora' comunica el avance del relato en un español natural, sin convertirlo en contraste fuerte.
- source_word: ἐγίνετο
  english_pob_choice: were being done
  chosen_spanish: se hacían
  alternatives_spanish:
  - eran hechas
  - estaban siendo hechas
  lexicon: BDAG
  rationale: El imperfecto indica actividad continua en el pasado. 'Se hacían' conserva esa duratividad y suena natural en español, manteniendo la voz pasiva implícita del griego.
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - señales milagrosas y prodigios
  lexicon: BDAG
  rationale: '''Señales y prodigios'' es una equivalencia idiomática fiel del par lucano. ''Prodigios'' preserva el registro bíblico y el carácter extraordinario del término τέρατα sin añadir explicación interpretativa.'
- source_word: πολλὰ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  - muchos
  lexicon: BDAG
  rationale: El adjetivo concuerda naturalmente con 'señales y prodigios' y refleja que la abundancia modifica a ambos sustantivos.
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en medio del pueblo
  - entre la gente
  lexicon: BDAG
  rationale: '''Entre el pueblo'' conserva el sentido de esfera o ámbito social sin restringir innecesariamente el referente.'
- source_word: ὁμοθυμαδὸν
  english_pob_choice: together
  chosen_spanish: unánimemente
  alternatives_spanish:
  - de común acuerdo
  - juntos
  lexicon: BDAG
  rationale: La adverbio griego incluye unidad de mente y disposición compartida. 'Unánimemente' expresa mejor esa cohesión que el simple 'juntos', y en español sigue siendo claro y digno.
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad
  lexicon: BDAG
  rationale: '''Todos'' traduce la fuerza inclusiva de ἅπαντες de forma natural. Mantiene abierta la referencia del grupo sin resolverla más de lo que permite el griego.'
- source_word: Στοᾷ Σολομῶντος
  english_pob_choice: Solomon’s Portico
  chosen_spanish: el Pórtico de Salomón
  alternatives_spanish:
  - la Columnata de Salomón
  - el Portico de Salomón
  lexicon: BDAG
  rationale: '''Pórtico'' comunica bien la estructura arquitectónica de στοά en español culto y bíblico. Se mantiene el nombre propio sin sustituirlo por una paráfrasis.'
theological_decisions:
- issue: Alcance de 'todos unánimemente'
  english_pob_reading: The phrase refers to the gathered body associated with the apostles, without narrowing it to apostles alone in translation.
  chosen_spanish_reading: La frase queda abierta al grupo reunido en torno a los apóstoles, sin reducirla en la traducción solo a los apóstoles ni solo a todos los creyentes.
  alternative_spanish_readings:
  - estaban todos los apóstoles unánimemente
  - estaban todos los creyentes unánimemente
  rationale: El griego deja implícito el antecedente de 'ellos'. La traducción preserva esa ambigüedad genuina en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no fue necesario cambiar el pasaje. Este borrador sigue de cerca el texto griego SBLGNT y el criterio ya confirmado en el audit trail inglés, conservando el giro instrumental 'por medio de las manos', el imperfecto durativo y la ambigüedad del sujeto de 'todos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Mesías/Cristo'' no aparece aquí; no se introduce terminología cristológica ajena al texto.'
  - '''Prodigios'' se usa para τέρατα, reservando ''milagros'' para contextos donde el registro lo exija más claramente.'
  - La puntuación y el orden oracional siguen un español bíblico moderno y legible, sin calcos innecesarios.
