translation:
  language: es
  text: Después de llevarlos, los pusieron ante[a] el consejo, y el sumo sacerdote los interrogó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Sanedrín». El término griego συνέδριον se refiere al consejo gobernante judío.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀγαγόντες
  english_pob_choice: After bringing them in
  chosen_spanish: Después de llevarlos
  alternatives_spanish:
  - Habiéndolos llevado
  - Cuando los llevaron
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente anterior a la acción principal. En español, «Después de llevarlos» conserva la secuencia narrativa sin sonar artificial.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los a ellos
  lexicon: BDAG
  rationale: El pronombre acusativo se expresa naturalmente con el objeto directo «los» en español.
- source_word: ἔστησαν ἐν τῷ συνεδρίῳ
  english_pob_choice: they set them before the council
  chosen_spanish: los llevaron ante el concilio
  alternatives_spanish:
  - los pusieron ante el concilio
  - los presentaron ante el concilio
  - los colocaron ante el concilio
  lexicon: BDAG
  rationale: El griego usa «poner de pie / hacer poner» en sentido transitivo para presentarlos en un contexto judicial. En español, «llevar ante» comunica de forma natural la presentación ante una instancia judicial sin perder la idea de comparecencia pública.
- source_word: συνεδρίῳ
  english_pob_choice: the council
  chosen_spanish: el concilio
  alternatives_spanish:
  - el consejo
  - el Sanedrín
  lexicon: BDAG
  rationale: «Concilio» mantiene el sentido de cuerpo deliberativo/judicial y evita reemplazar el término por un nombre tradicional no exigido por el griego. «Sanedrín» se reserva como posible nota alternativa.
- source_word: ἐπηρώτησεν
  english_pob_choice: questioned
  chosen_spanish: los interrogó
  alternatives_spanish:
  - los preguntó
  - los cuestionó
  lexicon: BDAG
  rationale: En un contexto formal de juicio, «interrogó» refleja mejor la fuerza judicial de ἐπερωτάω que un simple «preguntó», sin excederla con «interpeló» o «investigó».
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el principal sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia estable y precisa para ἀρχιερεύς en este contexto judío.
theological_decisions:
- issue: Rendering of συνέδριον
  english_pob_reading: the council, with footnote noting the Jewish ruling council / Sanhedrin
  chosen_spanish_reading: el concilio, con nota que identifica la instancia como el consejo gobernante judío / Sanedrín
  alternative_spanish_readings:
  - el consejo
  - el Sanedrín
  rationale: Se conserva en el texto principal una traducción transparente del sustantivo griego, y se deja en nota la identificación histórica del cuerpo judicial para no ocultar el referente, siguiendo la primacía del término fuente.
  doctrine_reference: Principio de transparencia léxica y equivalencia óptima
- issue: Judicial force of ἐπηρώτησεν
  english_pob_reading: questioned
  chosen_spanish_reading: los interrogó
  alternative_spanish_readings:
  - los preguntó
  - los examinó
  rationale: El contexto es de audiencia formal ante autoridad religiosa; «interrogó» preserva la dimensión procesal sin convertir el verbo en una acusación que el griego no expresa por sí mismo.
  doctrine_reference: Contextual semantics in judicial narrative
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al entender ἔστησαν como un acto de presentación/colocación ante la autoridad judicial, optando en español por una construcción natural («los llevaron ante el concilio») que conserva la escena de comparecencia. También se reflejó la decisión auditada de traducir συνέδριον de manera transparente en el texto principal y señalar su identificación histórica en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Concilio» se usa aquí como equivalente funcional de συνέδριον, no como referencia eclesiástica.
  - El nivel de formalidad es narrativo-jurídico, acorde con el contexto de audiencia ante autoridades judías.
