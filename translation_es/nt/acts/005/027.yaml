revisions:
- from: Después de llevarlos ante[a] el concilio, el sumo sacerdote los interrogó.
  to: Después de llevarlos, los pusieron ante[a] el consejo, y el sumo sacerdote los interrogó.
  rationale: 'Se restituye la secuencia completa del griego con dos acciones distintas: llevarlos y luego ponerlos/presentarlos ante el consejo. Se cambia «concilio» por «consejo» para alinearse mejor con el término fuente y con la decisión del POB en inglés. Se conserva la nota alternativa sobre «Sanedrín».'
