review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador omite un verbo principal del griego. Ἀγαγόντες ... ἔστησαν requiere dos acciones: primero los llevaron, luego los pusieron/presentaron ante el consejo. «Después de llevarlos ante el concilio, el sumo sacerdote los interrogó» fusiona Ἀγαγόντες con ἔστησαν y elimina la acción de colocarlos/presentarlos ante el συνέδριον. Además, el sujeto de ἔστησαν desaparece implícitamente al saltar directamente a «el sumo sacerdote los interrogó».'
  spanish_quality_summary: El español es claro, pero «concilio» suena menos natural y menos preciso en este contexto que «consejo», y la redacción actual comprime demasiado la escena judicial. «Después de llevarlos, los pusieron/presentaron ante el consejo» preserva mejor la secuencia y suena natural en español eclesial general.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. La decisión clave es συνέδριον: el inglés POB usa «the council» con nota alternativa «Sanhedrin». En español, «el consejo» se alinea mejor con esa decisión que «el concilio», dejando «el Sanedrín» en nota. «El sumo sacerdote» está bien.'
  issues:
  - severity: high
    issue: Falta la acción principal de ἔστησαν
    rationale: El texto griego dice que, después de llevarlos, los pusieron/presentaron ante el consejo. El borrador reduce todo a «llevarlos ante», perdiendo una acción narrativamente importante.
  - severity: medium
    issue: «Concilio» no es la mejor equivalencia de συνέδριον aquí
    rationale: Aunque posible, «concilio» en español suele evocar un concilio eclesiástico; «consejo» refleja mejor el valor léxico y se ajusta al inglés auditado.
  - severity: low
    issue: «Interrogó» es algo más fuerte que el inglés auditado «questioned»
    rationale: No es una desviación grave, porque el contexto es judicial, pero «preguntó» o «cuestionó» serían más suaves. Aun así, «interrogó» puede mantenerse por el contexto formal.
  revised_spanish_text: Después de llevarlos, los pusieron ante[a] el consejo, y el sumo sacerdote los interrogó.
  revised_footnotes:
  - marker: a
    text: O «el Sanedrín». El término griego συνέδριον se refiere al consejo gobernante judío.
    reason: alternative_reading
  revision_rationale: 'Se restituye la secuencia completa del griego con dos acciones distintas: llevarlos y luego ponerlos/presentarlos ante el consejo. Se cambia «concilio» por «consejo» para alinearse mejor con el término fuente y con la decisión del POB en inglés. Se conserva la nota alternativa sobre «Sanedrín».'
