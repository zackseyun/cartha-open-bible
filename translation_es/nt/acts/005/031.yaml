translation:
  language: es
  text: Dios exaltó a este hombre a su diestra como Líder y Salvador[a], para dar arrepentimiento a Israel y perdón de pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su diestra». La frase griega también puede leerse de modo instrumental, aunque aquí probablemente se refiere a la exaltación al lugar de máximo honor a la diestra de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - a este
  - él
  lexicon: BDAG
  rationale: El demostrativo griego es enfático y apunta de forma marcada a Jesús. En español, «este» conserva esa deixis sin sonar tan forzado como una perífrasis más pesada; «a este» sería posible, pero menos fluido en el inicio de la cláusula.
- source_word: ἀρχηγὸν
  english_pob_choice: Leader
  chosen_spanish: Líder
  alternatives_spanish:
  - Príncipe
  - Autor
  - Fundador
  - Pionero
  lexicon: BDAG
  rationale: El campo semántico incluye idea de cabeza, iniciador y quien va al frente. «Líder» comunica bien la autoridad y la función directiva en un contexto de exaltación real, sin cargar con el tono arcaico o ambiguo de «Príncipe».
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  lexicon: BDAG
  rationale: En este contexto cristológico, «Salvador» es el equivalente natural y teológicamente preciso para σωτήρ. «Libertador» enfatiza rescate político o social, lo cual sería más estrecho que el griego aquí.
- source_word: ὕψωσεν
  english_pob_choice: exalted
  chosen_spanish: exaltó
  alternatives_spanish:
  - levantó
  - levantó en alto
  lexicon: BDAG
  rationale: El verbo se refiere a la elevación de Jesús a honor y autoridad, no solo a un levantamiento físico. «Exaltó» preserva ese sentido entronizatorio mejor que «levantó».
- source_word: τῇ δεξιᾷ αὐτοῦ
  english_pob_choice: to his right hand
  chosen_spanish: a su diestra
  alternatives_spanish:
  - a su derecha
  - por su diestra
  lexicon: BDAG
  rationale: La expresión idiomática de entronización en español se expresa con naturalidad como «a su diestra». Mantiene el valor locativo/relacional de la frase y conserva el tono bíblico sin depender de un disfraz eufemístico.
- source_word: τοῦ δοῦναι
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - a fin de dar
  - con el fin de dar
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para dar» es natural en español y comunica la finalidad sin sobrecargar la frase.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - penitencia
  lexicon: BDAG
  rationale: El contexto exige una respuesta de retorno a Dios, no solo un cambio cognitivo. «Arrepentimiento» mantiene la fuerza bíblica y evita reducir μετάνοια a mera revisión mental.
- source_word: τῷ Ἰσραὴλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  lexicon: BDAG
  rationale: Con δοῦναι, el dativo receptor se expresa naturalmente con «a». Esto preserva la relación de donación directa del texto griego.
- source_word: ἄφεσιν ἁμαρτιῶν
  english_pob_choice: forgiveness of sins
  chosen_spanish: perdón de los pecados
  alternatives_spanish:
  - remisión de los pecados
  - liberación de los pecados
  lexicon: BDAG
  rationale: «Perdón de los pecados» es claro, idiomático y fiel al valor forense/salvífico de ἄφεσις en este contexto. «Remisión» es posible, pero menos transparente para lectura pública general.
theological_decisions:
- issue: Sentido de la exaltación de Jesús a la diestra de Dios
  english_pob_reading: The verse speaks of God's exalting Jesus to the position of highest honor and authority at his right hand.
  chosen_spanish_reading: El versículo presenta a Dios exaltando a Jesús a la posición de máximo honor y autoridad a su diestra.
  alternative_spanish_readings:
  - Dios lo exaltó por su diestra.
  - Dios lo exaltó mediante su diestra.
  rationale: La sintaxis del griego y el patrón de entronización del NT favorecen leer la frase como ubicación/relación de honor en la diestra de Dios. Se conserva, sin embargo, la posibilidad instrumental en la nota porque el dativo griego la permite.
  doctrine_reference: Hechos 2:33; Hebreos 1:3; Credo niceno-constantinopolitano (381)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la traducción de μετάνοιαν desde una paráfrasis cognitiva a «repentance»; en español se siguió esa corrección con «arrepentimiento». También se respetó la decisión revisada de mantener el sentido entronizatorio de ὕψωσεν y la alternativa instrumental de τῇ δεξιᾷ αὐτοῦ en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el referente es «Dios», por lo que no aplica.
  - Se usó «Salvador» y no «libertador» para preservar el alcance soteriológico del término.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «A su diestra» conserva el registro bíblico común en español y el sentido de honor real del pasaje.
  - Se eligió «arrepentimiento» para μετάνοιαν, siguiendo el consenso auditado y evitando una reducción a mero cambio mental.
