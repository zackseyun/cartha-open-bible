review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego: τότε ἀπελθὼν = «Entonces ... fue», στρατηγός = «capitán», ὑπηρέταις = «oficiales», ἤγαγεν αὐτούς = «los trajo», οὐ μετὰ βίας = «no con violencia», ἐφοβοῦντο γὰρ τὸν λαόν = «porque temían al pueblo». La principal desviación está en μὴ λιθασθῶσιν, que es pasivo («para que no fueran apedreados / no fuera que fueran apedreados»). El borrador usa activa con agente implícito («no fuera que los apedrearan»), lo cual comunica bien el sentido, pero no preserva tan de cerca la voz pasiva que el inglés POB decidió mantener.'
  spanish_quality_summary: El español es claro, natural y digno. «Capitán» y «oficiales» funcionan bien en contexto. «No con violencia» es comprensible, aunque «no por la fuerza» o «sin usar la fuerza» suenan algo más idiomáticos; sin embargo, no exige cambio. La reparación necesaria es ajustar la cláusula final para reflejar mejor el pasivo griego sin perder fluidez.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos como Yahvé, Mesías, Espíritu, etc. Las decisiones «capitán» para στρατηγός y «oficiales» para ὑπηρέταις concuerdan con la justificación del POB. La nota léxica inglesa sobre στρατηγός debería preservarse también en español como nota, porque el inglés la mantuvo y ayuda a evitar una lectura militar romana demasiado específica.
  issues:
  - severity: medium
    issue: La cláusula final cambia el pasivo griego a una activa impersonal.
    rationale: μὴ λιθασθῶσιν significa literalmente «para que no fueran apedreados / no fuera que fueran apedreados». «No fuera que los apedrearan» expresa el sentido general, pero pierde la decisión sintáctica del POB de conservar el pasivo y dejar implícitos a los agentes.
  - severity: low
    issue: Falta la nota léxica correspondiente a στρατηγός.
    rationale: 'El English POB preservó una nota: «Or ''commander.'' ... temple captain». Dado que en español «capitán» también podría leerse de modo demasiado militar o genérico, conviene conservar una nota equivalente.'
  revised_spanish_text: Entonces el capitán[a] fue con los oficiales y los trajo, no con violencia, porque temían al pueblo, no fuera que fueran apedreados.
  revised_footnotes:
  - marker: a
    text: O «comandante». El griego στρατηγός aquí se refiere al capitán del templo, el funcionario encargado de mantener el orden en el templo.
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador por ser fiel y natural. Se revisa únicamente la cláusula final para reflejar mejor la voz pasiva de μὴ λιθασθῶσιν («fueran apedreados») y se añade la nota léxica ya documentada en el English POB para στρατηγός.
