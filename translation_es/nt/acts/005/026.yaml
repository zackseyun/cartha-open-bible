translation:
  language: es
  text: Entonces el capitán[a] fue con los oficiales y los trajo, no con violencia, porque temían al pueblo, no fuera que fueran apedreados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comandante». El griego στρατηγός aquí se refiere al capitán del templo, el funcionario encargado de mantener el orden en el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατηγὸς
  english_pob_choice: captain
  chosen_spanish: capitán
  alternatives_spanish:
  - comandante
  lexicon: BDAG
  rationale: En Hechos este término se refiere al oficial del templo encargado del orden, no a un general militar romano. «Capitán» conserva bien la idea de una autoridad principal y es natural en español; «comandante» es una alternativa posible, pero menos ajustada al cargo concreto del templo.
- source_word: ὑπηρέταις
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - servidores
  - guardias
  - policías del templo
  lexicon: BDAG
  rationale: El contexto es institucional y de custodia del templo. «Oficiales» comunica mejor una función subordinada de autoridad que «servidores»; «guardias» o «policías del templo» serían más específicos, pero el griego permite un término más amplio.
- source_word: ἤγαγεν αὐτούς
  english_pob_choice: brought them
  chosen_spanish: los trajo
  alternatives_spanish:
  - los llevó
  - los condujo
  lexicon: BDAG
  rationale: ἄγω puede significar «llevar» o «traer» según el punto de vista. Aquí, en una escena de escolta hacia una autoridad, «los trajo» reproduce de forma natural el movimiento sin añadir «adentro», que no está en el griego.
- source_word: οὐ μετὰ βίας
  english_pob_choice: not with force
  chosen_spanish: no con violencia
  alternatives_spanish:
  - no por la fuerza
  - sin violencia
  lexicon: BDAG
  rationale: La expresión denota la manera en que fueron conducidos, con ausencia de coacción violenta. «No con violencia» mantiene el sentido concreto de βία; «no por la fuerza» también sería posible, pero en español puede sonar menos directo.
- source_word: ἐφοβοῦντο
  english_pob_choice: they were afraid
  chosen_spanish: temían
  alternatives_spanish:
  - tenían miedo
  - estaban temerosos
  lexicon: BDAG
  rationale: El imperfecto expresa una disposición o estado de temor en la situación. «Temían» es más sobrio y fiel al matiz narrativo; «tenían miedo» sería más explícito, pero algo más coloquial.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  lexicon: BDAG
  rationale: Aquí λαός designa al pueblo reunido, con carga colectiva y social. «Al pueblo» conserva mejor ese valor que «a la gente»; «a la multitud» puede funcionar, pero enfatiza más el tamaño del grupo que su condición de pueblo.
- source_word: μὴ λιθασθῶσιν
  english_pob_choice: lest they be stoned
  chosen_spanish: no fuera que los apedrearan
  alternatives_spanish:
  - para que no los apedrearan
  - por temor a que los apedrearan
  lexicon: BDAG
  rationale: μή con subjuntivo después de un verbo de temor expresa un resultado temido. En español, «no fuera que los apedrearan» conserva bien esa finalidad temida y evita sonar excesivamente explicativo; «para que no» suaviza demasiado la relación causal y «por temor a que» es correcto pero más interpretativo.
- source_word: τότε ἀπελθὼν
  english_pob_choice: Then ... went
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Entonces ... se fue
  - Luego ... fue
  lexicon: BDAG
  rationale: El participio acompañante introduce la secuencia narrativa. «Entonces» refleja bien τότε, y «fue» mantiene un español claro y directo; «se fue» podría sugerir una retirada voluntaria, algo no requerido por el contexto.
theological_decisions:
- issue: Cómo expresar el temor al pueblo sin diluir la fuerza del pasaje
  english_pob_reading: for they were afraid of the people
  chosen_spanish_reading: porque temían al pueblo
  alternative_spanish_readings:
  - porque tenían miedo del pueblo
  - pues tenían temor del pueblo
  rationale: 'No hay un matiz doctrinal complejo, pero sí una tensión interpretativa: el texto muestra una autoridad que actúa con cautela por el poder social del pueblo. «Temían al pueblo» conserva la fuerza narrativa sin suavizarla ni exagerarla.'
  doctrine_reference: Hechos 5:26; temor humano y presión social en la narrativa de Hechos
- issue: Cómo reflejar la cláusula final de temor con μή + subjuntivo
  english_pob_reading: lest they be stoned
  chosen_spanish_reading: no fuera que los apedrearan
  alternative_spanish_readings:
  - para que no los apedrearan
  - por temor a que los apedrearan
  rationale: El griego expresa un resultado temido. La opción elegida mantiene ese valor y evita convertirlo en una simple finalidad negativa. Así se preserva la relación sintáctica y el tono narrativo del relato.
  doctrine_reference: Sintaxis griega de temor/resulto temido en Hechos 5:26
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y la última revisión inglesa, especialmente al no añadir ninguna explicación equivalente a «in» después de «brought them». Se mantuvo la idea de escolta sin sobreespecificar el destino o el modo más allá de lo que el griego expresa.
  spanish_consistency_notes:
  - Se usó «capitán» para στρατηγός, coherente con el cargo del templo y con la terminología POB auditada en inglés.
  - Se prefirió «oficiales» para ὑπηρέταις, evitando reducir el término a «siervos» o a un equivalente militar demasiado técnico.
  - «Los trajo» conserva la sencillez de ἤγαγεν αὐτούς sin insertar un complemento no presente en el griego.
  - Se tradujo βία con «violencia» para preservar la fuerza concreta de la coerción.
  - 'Se eligió un giro español natural para μή + subjuntivo: «no fuera que los apedrearan», manteniendo el temor implícito en la sintaxis griega.'
