translation:
  language: es
  text: Entonces los jóvenes[a] se levantaron, lo envolvieron, lo sacaron y lo enterraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los más jóvenes». El griego νεώτεροι es comparativo en la forma y puede significar tanto «jóvenes» como, de manera más literal, «más jóvenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: BDAG
  rationale: El participio aoristo aquí marca la acción inicial de disponerse a actuar. En español, «se levantaron» comunica bien ese movimiento narrativo sin sonar forzado.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce avance narrativo; «Entonces» conserva ese progreso temporal de forma natural en español.
- source_word: οἱ νεώτεροι
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los más jóvenes
  lexicon: BDAG
  rationale: νεώτεροι es comparativo en forma y puede significar «más jóvenes» o, de modo general, «jóvenes». «Los jóvenes» es natural en español y mantiene la referencia grupal sin sobrecargar el texto.
- source_word: συνέστειλαν
  english_pob_choice: wrapped him up
  chosen_spanish: lo envolvieron
  alternatives_spanish:
  - lo prepararon para el entierro
  - lo vendaron
  lexicon: BDAG
  rationale: En este contexto συστέλλω se refiere a recoger o envolver el cuerpo. «Lo envolvieron» es la equivalencia más clara y cercana en español sin interpretar de más.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Ananías; «lo» es la forma natural en español.
- source_word: ἐξενέγκαντες
  english_pob_choice: carried him out
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo llevaron afuera
  - lo extrajeron
  lexicon: BDAG
  rationale: El participio de ἐκφέρω indica sacar el cuerpo del lugar. «Lo sacaron» es la forma más idiomática y fiel en español.
- source_word: ἔθαψαν
  english_pob_choice: buried him
  chosen_spanish: lo enterraron
  alternatives_spanish:
  - lo sepultaron
  lexicon: BDAG
  rationale: θάπτω significa enterrar. «Lo enterraron» es claro y común en español; «lo sepultaron» sería más formal.
translation_notes:
  revision_awareness: La revisión inglesa cambió «the younger men» por «the young men» por naturalidad, sin alterar el sentido. La versión española sigue esa misma preferencia, conservando la posibilidad de una nota alternativa porque la forma griega es comparativa.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo simple y directo, acorde con el griego breve de una sola oración.
  - Se evitó «sepultaron» para no elevar innecesariamente el registro; «enterraron» corresponde bien a θάπτω.
  - 'Se preservó la secuencia verbal del original: levantarse, envolver, sacar, enterrar.'
