translation:
  language: es
  text: Mientras permanecía sin vender, ¿no seguía siendo tuyo? Y después de haber sido vendido, ¿no estaba bajo tu autoridad[a]? ¿Por qué has puesto este asunto en tu corazón? No has mentido a los hombres[b], sino a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estaba a tu disposición' o 'estaba en tu poder' para 'estaba bajo tu autoridad'.
    reason: lexical_alternative
  - marker: b
    text: '''Los hombres'' aquí significa seres humanos en general, no varones solamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μένον / ἔμενεν
  english_pob_choice: remained / remain
  chosen_spanish: permanecía / seguía siendo
  alternatives_spanish:
  - permanecía
  - seguía siendo
  - continuaba siendo
  lexicon: BDAG
  rationale: El participio y el imperfecto destacan el estado continuo del bien antes de la venta. En español, 'permanecía' conserva la idea de continuidad, y 'seguía siendo' expresa con naturalidad la posesión implícita en el contexto.
- source_word: σοὶ
  english_pob_choice: yours
  chosen_spanish: tuyo
  alternatives_spanish:
  - de ti
  - propio tuyo
  lexicon: BDAG
  rationale: El dativo con μένω comunica posesión o pertenencia. 'Tuyo' evita un giro literal incómodo y mantiene el sentido idiomático de propiedad.
- source_word: πραθὲν
  english_pob_choice: was sold
  chosen_spanish: había sido vendido
  alternatives_spanish:
  - fue vendido
  - habiendo sido vendido
  lexicon: BDAG
  rationale: El aoristo participial pasivo se vierte de modo natural con una construcción pasiva compuesta en español, preservando el hecho consumado previo al segundo momento de la pregunta.
- source_word: ἐν τῇ σῇ ἐξουσίᾳ ὑπῆρχεν
  english_pob_choice: was ... under your authority
  chosen_spanish: estaba bajo tu autoridad
  alternatives_spanish:
  - estaba a tu disposición
  - estaba en tu poder
  - quedaba bajo tu control
  lexicon: BDAG
  rationale: ἐξουσία aquí expresa autoridad o derecho de control. 'Bajo tu autoridad' conserva la fuerza de decisión legítima sin diluirla en una mera posesión material.
- source_word: τί ὅτι
  english_pob_choice: Why is it that
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Cómo es que
  - ¿Por qué es que
  lexicon: BDAG
  rationale: La frase introduce una reprensión interrogativa. En español, '¿Por qué' comunica con claridad esa fuerza, aunque se pierda la redundancia analítica del griego.
- source_word: ἔθου ἐν τῇ καρδίᾳ σου
  english_pob_choice: you have set ... in your heart
  chosen_spanish: has puesto ... en tu corazón
  alternatives_spanish:
  - has concebido ... en tu corazón
  - has planeado ... en tu corazón
  lexicon: BDAG
  rationale: La expresión mantiene el lenguaje del 'corazón' como centro interior de intención. 'Has puesto' es la forma más natural para reproducir el giro verbal sin perder la idea de resolución interna.
- source_word: τὸ πρᾶγμα τοῦτο
  english_pob_choice: this matter
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  - este plan
  lexicon: BDAG
  rationale: πρᾶγμα es amplio ('cosa, asunto, hecho, negocio'). 'Esta cosa' refleja la amplitud semántica del término y conserva el tono directo y acusatorio del pasaje; 'asunto' sería más interpretativo.
- source_word: οὐκ ἐψεύσω ἀνθρώποις ἀλλὰ τῷ θεῷ
  english_pob_choice: You have not lied to men but to God
  chosen_spanish: No has mentido a los hombres, sino a Dios.
  alternatives_spanish:
  - No has mentido a la gente, sino a Dios.
  - No has mentido a los seres humanos, sino a Dios.
  lexicon: BDAG
  rationale: ψεύδομαι con dativo significa 'mentir a'. 'Los hombres' reproduce el contraste del griego entre seres humanos y Dios sin borrar la forma breve y antitética de la acusación. 'A los hombres' mantiene la dative force in Spanish.
theological_decisions:
- issue: Alcance de ἐξουσία sobre la propiedad vendida
  english_pob_reading: Translate to emphasize Ananias's real authority over the property and proceeds.
  chosen_spanish_reading: Traducir de modo que se vea que Ananías sí tenía autoridad real sobre el bien y sobre el producto de la venta.
  alternative_spanish_readings:
  - Traducir de manera más débil, como mera posesión sin libertad de decisión.
  - Atenuar la idea de autoridad legítima sobre lo vendido.
  rationale: El punto de Pedro no es que Ananías estuviera obligado a entregar el dinero, sino que mintió acerca de lo que estaba haciendo. 'Bajo tu autoridad' preserva esa responsabilidad moral y la libertad de decisión implícita en el texto.
  doctrine_reference: 'Hechos 5:4; filosofía de traducción #1 y #6'
- issue: Relación entre 'a Dios' y el contexto inmediato de Hechos 5:3–4
  english_pob_reading: Render the clause straightforwardly as 'to God' without adding explanatory wording.
  chosen_spanish_reading: Traducir simplemente 'a Dios', sin añadir una glosa explícita en el texto principal.
  alternative_spanish_readings:
  - '''a Dios, es decir, al Espíritu Santo'''
  - '''a Dios, esto es, al Espíritu Santo'''
  rationale: El versículo dice 'a Dios'. El contexto inmediato sostiene la identificación teológica con el Espíritu, pero esa explicación pertenece al conjunto canónico y no debe insertarse en el texto principal.
  doctrine_reference: 'Hechos 5:3–4; afirmaciones doctrinales; filosofía de traducción #1 y #3'
- issue: Valor de ἀνθρώποις en el contraste 'hombres ... Dios'
  english_pob_reading: Use 'men' in the main text.
  chosen_spanish_reading: Usar 'los hombres' en el texto principal.
  alternative_spanish_readings:
  - '''las personas'''
  - '''los seres humanos'''
  rationale: El griego contrapone de modo breve y enfático a los seres humanos con Dios. 'Los hombres' conserva ese contraste retórico; la expresión incluye genéricamente a la humanidad y no pretende excluir a las mujeres.
  doctrine_reference: 'Filosofía de traducción #4'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no requirió cambios sustanciales; este borrador mantiene la línea del audit trail inglés, conservando la tensión entre la libertad de Ananías sobre el bien y la gravedad de haber mentido a Dios.
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin glosa añadida, en armonía con el texto griego y con la nota teológica del contexto inmediato.
  - '''Autoridad'' traduce ἐξουσία de forma consistente con la política POB y evita reducirla a simple posesión.'
  - Se conserva el contraste directo 'los hombres ... Dios' para no diluir la acusación retórica.
  - '''Corazón'' se conserva como sede interior de intención, sin sustituirlo por ''mente'' o ''pensamiento''.'
