base_translation:
  language: en
  yaml_path: translation/nt/acts/005/004.yaml
  text: While it remained unsold[a], did it not remain yours? And after it was sold[b], was it not under your authority? Why is it that you have set this matter in your heart? You have not lied to men but to God.
