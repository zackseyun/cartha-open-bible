revisions:
- from: Mientras permanecía sin vender[a], ¿no seguía siendo tuyo? Y después de haber sido vendido[b], ¿no estaba bajo tu autoridad? ¿Por qué has puesto esta cosa en tu corazón? No has mentido a los hombres, sino a Dios.
  to: Mientras permanecía sin vender, ¿no seguía siendo tuyo? Y después de haber sido vendido, ¿no estaba bajo tu autoridad[a]? ¿Por qué has puesto este asunto en tu corazón? No has mentido a los hombres[b], sino a Dios.
  rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las expresiones comentadas en el rastro POB, y se reemplaza 'esta cosa' por 'este asunto' para mejorar la naturalidad y la dignidad del español sin apartarse del sentido amplio de πρᾶγμα.
