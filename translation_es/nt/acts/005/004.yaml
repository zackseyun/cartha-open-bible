    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] explica la alternativa de 'bajo tu autoridad', pero está colocada en 'sin vender'. La nota [b] aclara 'los hombres', pero está colocada en 'vendido'. Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: '''Esta cosa'' suena poco natural en español y reduce la dignidad estilística.'
    rationale: Aunque πρᾶγμα puede significar 'cosa', en este contexto de reprensión 'este asunto' preserva mejor la neutralidad semántica del original y suena más idiomático en español bíblico moderno.
  - severity: low
    issue: La formulación 'después de haber sido vendido' es correcta pero algo más pesada de lo necesario.
    rationale: No es infiel, pero 'después de vendido' o mantener la forma actual son ambas aceptables. No requiere cambio obligatorio si se conserva la claridad.
  revised_spanish_text: Mientras permanecía sin vender, ¿no seguía siendo tuyo? Y después de haber sido vendido, ¿no estaba bajo tu autoridad[a]? ¿Por qué has puesto este asunto en tu corazón? No has mentido a los hombres[b], sino a Dios.
