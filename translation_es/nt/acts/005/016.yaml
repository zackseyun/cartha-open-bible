translation:
  language: es
  text: Y también la multitud de las ciudades cercanas a Jerusalén se reunía[a], trayendo a los enfermos y a los afligidos por espíritus inmundos[b], y todos eran sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la multitud de las ciudades cercanas a Jerusalén se congregaba».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los atormentados por espíritus inmundos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήρχετο
  english_pob_choice: was coming together
  chosen_spanish: se reunía
  alternatives_spanish:
  - se congregaba
  - venía reuniéndose
  - se juntaba
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo expresa acción continua o repetida en pasado. «Se reunía» conserva la idea durativa de movimiento/convergencia sin sonar forzado en español.
- source_word: τὸ πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - la multitud
  - el gentío
  - la masa de gente
  lexicon: BDAG
  rationale: En este contexto narrativo formal, «multitud» refleja mejor πλῆθος que «gentío». El añadido de «gran» explicita la fuerza colectiva del término sin alterar el sentido.
- source_word: τῶν πέριξ πόλεων Ἰερουσαλήμ
  english_pob_choice: from the towns around Jerusalem
  chosen_spanish: de las ciudades de alrededor de Jerusalén
  alternatives_spanish:
  - de las poblaciones cercanas a Jerusalén
  - de los pueblos de alrededor de Jerusalén
  - de las ciudades circundantes de Jerusalén
  lexicon: BDAG
  rationale: πέριξ con πόλεων señala asentamientos del entorno de Jerusalén. «Ciudades de alrededor de Jerusalén» conserva el alcance geográfico del original y evita una localización más estrecha que no está en el texto.
- source_word: φέροντες
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - conduciendo
  - presentando
  lexicon: BDAG
  rationale: El participio describe la manera en que la multitud acudía. «Trayendo» es natural en español para personas que llevan enfermos ante los apóstoles y mantiene la relación con el siguiente complemento.
- source_word: ἀσθενεῖς
  english_pob_choice: the sick
  chosen_spanish: a los enfermos
  alternatives_spanish:
  - a los débiles
  - a los dolientes
  - a los inválidos
  lexicon: BDAG
  rationale: En contextos de sanidad, ἀσθενής se refiere a enfermedad física. «Enfermos» comunica ese valor de manera directa y idiomática.
- source_word: ὀχλουμένους
  english_pob_choice: those troubled
  chosen_spanish: a los atormentados
  alternatives_spanish:
  - a los afligidos
  - a los molestados
  - a los turbados
  lexicon: BDAG
  rationale: El participio puede abarcar aflicción, molestia o tormento. «Atormentados» conserva la intensidad que en este contexto se relaciona con la influencia espiritual, y queda respaldado por la alternativa textual inglesa documentada.
- source_word: ὑπὸ πνευμάτων ἀκαθάρτων
  english_pob_choice: by unclean spirits
  chosen_spanish: por espíritus inmundos
  alternatives_spanish:
  - por espíritus impuros
  - por espíritus no limpios
  lexicon: BDAG
  rationale: La expresión es el giro bíblico habitual para espíritus demoníacos. «Espíritus inmundos» preserva el idioma bíblico tradicional y la connotación moral/ritual de ἀκάθαρτος.
- source_word: οἵτινες
  english_pob_choice: and they
  chosen_spanish: y
  alternatives_spanish:
  - quienes
  - los cuales
  - y estos
  lexicon: BDAG
  rationale: El relativo resume los dos grupos anteriores e introduce el resultado. En español, el enlace con «y» seguido de la cláusula final expresa con fluidez la consecuencia sin forzar un relativo pesado.
- source_word: ἐθεραπεύοντο
  english_pob_choice: were all being healed
  chosen_spanish: eran sanados
  alternatives_spanish:
  - estaban siendo sanados
  - fueron sanados
  - recibían sanidad
  lexicon: BDAG
  rationale: El imperfecto pasivo comunica sanidad repetida o en proceso. «Eran sanados» conserva la voz pasiva y el valor imperfectivo de forma más natural que un giro perifrástico más largo.
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno de ellos
  - absolutamente todos
  lexicon: BDAG
  rationale: El término refuerza el carácter total de la sanidad. «Todos» comunica esa totalidad de manera directa y sobria en español.
theological_decisions:
- issue: Naturaleza de πνευμάτων ἀκαθάρτων
  english_pob_reading: unclean spirits
  chosen_spanish_reading: espíritus inmundos
  alternative_spanish_readings:
  - espíritus impuros
  - espíritus no limpios
  rationale: En Lucas-Hechos la expresión se refiere a espíritus personales malignos, no solo a una descripción psicológica o metafórica. «Espíritus inmundos» conserva el valor bíblico y no diluye la referencia demonológica.
  doctrine_reference: 'Affirmations; Translation philosophy #1 y #6'
- issue: Alcance de ἅπαντες
  english_pob_reading: they were all being healed
  chosen_spanish_reading: todos eran sanados
  alternative_spanish_readings:
  - todos fueron sanados
  - eran sanados todos
  rationale: La afirmación presenta una sanidad integral de todos los que fueron traídos en esta escena. La traducción mantiene la totalidad sin agregar explicación doctrinal extra al versículo.
  doctrine_reference: 'Translation philosophy #1 y #3'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «multitude» sobre «crowd» para reflejar mejor τὸ πλῆθος en este contexto narrativo formal. La versión española siguió esa decisión con «una gran multitud». También se mantuvo la equivalencia óptima del aspecto imperfecto en los verbos principales y la formulación bíblica tradicional de «espíritus inmundos».
  spanish_consistency_notes:
  - Se usa «Jerusalén» como topónimo invariable y «espíritus inmundos» para mantener coherencia con la terminología POB en pasajes afines.
  - Se preserva el pasivo imperfectivo de ἐθεραπεύοντο con «eran sanados», evitando convertirlo en un perfecto puntual.
  - «Atormentados» se emplea aquí por la fuerza contextual del texto y no debe confundirse con un simple malestar emocional.
