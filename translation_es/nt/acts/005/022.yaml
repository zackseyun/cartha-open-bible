  text: Pero cuando llegaron los oficiales, no los hallaron en la prisión; así que regresaron y dieron el informe,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραγενόμενοι
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - vinieron
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio indica la llegada de los oficiales al lugar. «Llegaron» comunica bien la acción puntual y resulta natural en español sin perder el valor temporal de la forma griega.
- source_word: ὑπηρέται
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - servidores
  - asistentes
  - policías del templo
  lexicon: BDAG
  rationale: En Hechos, el término designa funcionarios subordinados a la autoridad de los líderes judíos. «Oficiales» conserva el matiz institucional y evita rebajar el cargo a «servidores» o añadir una especificación más interpretativa como «policías del templo».
- source_word: οὐχ εὗρον
  english_pob_choice: did not find
  chosen_spanish: no los hallaron
  alternatives_spanish:
  - no los encontraron
  - no los descubrieron
  lexicon: BDAG
  rationale: «Hallaron» refleja con naturalidad el verbo de encontrar en un registro narrativo formal. El objeto directo «los» mantiene explícita la referencia a los apóstoles, como en el griego.
- source_word: ἐν τῇ φυλακῇ
  english_pob_choice: in the prison
  chosen_spanish: en la prisión
  alternatives_spanish:
  - en la cárcel
  - en el calabozo
  - en prisión
  lexicon: BDAG
  rationale: La presencia del artículo sugiere una prisión concreta ya mencionada en el contexto. «La prisión» preserva esa especificidad mejor que una forma más general o idiomática como «en prisión».
- source_word: ἀναστρέψαντες
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - dieron la vuelta y regresaron
  lexicon: BDAG
  rationale: El participio expresa que volvieron desde la prisión a quienes los enviaron. «Regresaron» es claro, natural y conserva el sentido de retorno.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - anunciaron
  - dieron parte
  lexicon: BDAG
  rationale: El verbo denota llevar un informe o dar noticia. «Informaron» conserva el tono oficial y es suficientemente literal sin sonar forzado en español.
- source_word: δέ
  english_pob_choice: But / so
  chosen_spanish: Pero / así que
  alternatives_spanish:
  - Y / entonces
  - Mas / por eso
  lexicon: BDAG
  rationale: 'El primer δέ introduce contraste: «Pero». El segundo enlaza con la consecuencia narrativa: «así que». En español, esa combinación reproduce bien la relación discursiva sin duplicar conectores innecesarios.'
