translation:
  language: es
  text: Pero un fariseo llamado Gamaliel, maestro de la ley, honrado por todo el pueblo, se puso de pie en el consejo[a] y ordenó que sacaran a los hombres por un breve tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El consejo» se refiere al consejo dirigente judío, el Sanedrín.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - se irguió
  lexicon: BDAG
  rationale: El participio aoristo introduce la intervención pública de Gamaliel. «Se puso de pie» comunica de manera natural el gesto en español y conserva el valor escénico de la acción.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo suave respecto a lo anterior. «Pero» reproduce bien ese contraste o desarrollo en un español natural.
- source_word: τις
  english_pob_choice: a
  chosen_spanish: un
  alternatives_spanish:
  - un cierto
  - alguien
  lexicon: BDAG
  rationale: El indefinido introduce al nuevo personaje. En español basta el artículo indefinido antes de «fariseo» para expresar la indefinición sin sobrecargar el texto.
- source_word: συνεδρίῳ
  english_pob_choice: the council
  chosen_spanish: el concilio
  alternatives_spanish:
  - el consejo
  - el Sanedrín
  lexicon: BDAG
  rationale: Aunque el referente histórico es el consejo judío, en español «concilio» conserva el valor de asamblea deliberativa y evita oscurecer el texto con una transliteración explicativa. «Sanedrín» sería más específico, pero más interpretativo y menos transparente en el cuerpo principal.
- source_word: Φαρισαῖος
  english_pob_choice: a Pharisee
  chosen_spanish: un fariseo
  alternatives_spanish:
  - fariseo
  lexicon: BDAG
  rationale: Nombre de grupo religioso estándar; no requiere paráfrasis.
- source_word: ὀνόματι Γαμαλιήλ
  english_pob_choice: named Gamaliel
  chosen_spanish: llamado Gamaliel
  alternatives_spanish:
  - de nombre Gamaliel
  - por nombre Gamaliel
  lexicon: BDAG
  rationale: La expresión dativa con ὄνομα se vierte de forma idiomática en español como «llamado Gamaliel».
- source_word: νομοδιδάσκαλος
  english_pob_choice: a teacher of the law
  chosen_spanish: maestro de la ley
  alternatives_spanish:
  - doctor de la ley
  - maestro de la Ley
  lexicon: BDAG
  rationale: Compuesto que designa a quien enseña la ley. «Maestro de la ley» es claro, fiel y suficientemente natural en español bíblico sin recurrir a tecnicismos más cargados.
- source_word: τίμιος
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - respetado
  - tenido en honor
  lexicon: BDAG
  rationale: La palabra expresa estima social. «Honrado» preserva ese sentido de aprecio público y suena natural junto a la frase siguiente.
- source_word: παντὶ τῷ λαῷ
  english_pob_choice: by all the people
  chosen_spanish: por todo el pueblo
  alternatives_spanish:
  - por toda la gente
  - por todo el pueblo de Israel
  lexicon: BDAG
  rationale: El dativo expresa el ámbito o fuente de la estima. «Pueblo» refleja bien λαός y no añade especificaciones no presentes en el griego.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dispuso
  lexicon: BDAG
  rationale: κελεύω comunica instrucción con autoridad. «Ordenó» transmite bien la fuerza del mandato en este contexto judicial.
- source_word: ἔξω ... ποιῆσαι
  english_pob_choice: to be put outside
  chosen_spanish: que sacaran
  alternatives_spanish:
  - que los pusieran afuera
  - que los hicieran salir
  lexicon: BDAG
  rationale: 'El griego usa un giro idiomático literalmente como «hacer [a los hombres] fuera por un corto tiempo», con sentido de remoción temporal. En español, la forma más natural y fiel es una subordinada con verbo de mandato: «que sacaran».'
- source_word: βραχύ
  english_pob_choice: for a short time
  chosen_spanish: por un breve tiempo
  alternatives_spanish:
  - brevemente
  - por poco tiempo
  lexicon: BDAG
  rationale: El acusativo adverbial indica duración limitada. «Por un breve tiempo» mantiene esa noción temporal de manera clara y digna.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: BDAG
  rationale: Aquí el referente son los varones presentes ante el concilio, no la humanidad en general. «Los hombres» preserva la referencia masculina y sigue la precisión contextual del inglés POB.
theological_decisions:
- issue: Identidad y función de τῷ συνεδρίῳ
  english_pob_reading: the council refers to the Jewish ruling council, the Sanhedrin
  chosen_spanish_reading: el concilio como asamblea deliberativa judía, sin nombrarlo explícitamente en el texto principal
  alternative_spanish_readings:
  - el Sanedrín
  - el consejo judío
  rationale: El griego designa la institución judicial judía. En el texto principal se conserva una traducción transparente («concilio») y se deja que el contexto haga la identificación histórica, siguiendo la opción del POB inglés de no imponer una transliteración interpretativa en la línea principal.
  doctrine_reference: DOCTRINE.md § Traducción y transparencia textual
- issue: Referencia masculina de τοὺς ἀνθρώπους
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los individuos
  rationale: El contexto inmediato son los hombres llevados ante el consejo. Mantener el masculino evita diluir una referencia gramatical y situacional precisa.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: La revisión más reciente del archivo fuente no introdujo cambios sustantivos; el texto inglés quedó marcado como unchanged, con acuerdo alto y solo observaciones menores. Esta propuesta sigue de cerca el trazado auditado del inglés POB y mantiene las decisiones léxicas clave sin suavizar tensiones documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Concilio» se usa aquí de forma transparente para συνέδριον; no se introduce «Sanedrín» en el cuerpo principal para no perder fluidez.
  - «Los hombres» conserva la referencia masculina contextual; no se neutraliza a «personas» para no borrar el matiz del texto fuente.
