  text: ἀναστὰς δέ τις ἐν τῷ συνεδρίῳ Φαρισαῖος ὀνόματι Γαμαλιήλ, νομοδιδάσκαλος τίμιος παντὶ τῷ λαῷ, ἐκέλευσεν ἔξω ⸀βραχὺ τοὺς ⸀ἀνθρώπους ποιῆσαι,
base_translation:
  language: en
  yaml_path: translation/nt/acts/005/034.yaml
  text: But a Pharisee named Gamaliel stood up in the council[a], a teacher of the law honored by all the people[b], and ordered the men to be put outside for a short time.
  footnotes:
  - marker: a
    text: Or “to send the men outside briefly.” The Greek literally says “to make the men outside for a short time,” an idiom meaning to have them removed temporarily.
    reason: lexical_alternative
  - marker: b
    text: “The council” refers to the Jewish ruling council, the Sanhedrin.
    reason: cultural_note
