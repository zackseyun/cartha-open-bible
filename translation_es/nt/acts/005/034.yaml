revisions:
- from: Pero un fariseo llamado Gamaliel, maestro de la ley, honrado por todo el pueblo, se puso de pie en el concilio[a] y ordenó que sacaran a los hombres[b] por un breve tiempo.
  to: Pero un fariseo llamado Gamaliel, maestro de la ley, honrado por todo el pueblo, se puso de pie en el consejo[a] y ordenó que sacaran a los hombres por un breve tiempo.
  rationale: 'Se reemplaza «concilio» por «consejo» para reflejar con mayor fidelidad y naturalidad el referente de συνεδρίῳ en español contemporáneo y eclesial amplio. También se simplifican las notas: se conserva solo la nota cultural necesaria, ya que «los hombres» ya es suficientemente claro en español y no requiere una alternativa adicional aquí.'
