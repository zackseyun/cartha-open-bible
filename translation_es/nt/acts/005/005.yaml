translation:
  language: es
  text: Pero, al oír Ananías estas palabras, cayó y murió[a]. Y gran temor vino sobre todos los que oyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «expiró» o «exhaló su último aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούων
  english_pob_choice: when ... heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - oyendo
  lexicon: BDAG
  rationale: El participio presente se vierte naturalmente como una acción temporal previa o concomitante. «Al oír» conserva el orden narrativo sin sonar forzado en español y evita un gerundio ambiguo.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca transición narrativa con leve contraste tras las palabras de Pedro. «Pero» transmite bien ese giro en español bíblico contemporáneo.
- source_word: λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: BDAG
  rationale: λόγοι aquí se refiere al discurso pronunciado. «Palabras» es la equivalencia más natural y precisa en español.
- source_word: πεσὼν
  english_pob_choice: he fell down
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - cayó al suelo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción acompañante antes del verbo principal. «Cayó» conserva la imagen física con sobriedad; el contexto hace innecesario añadir «al suelo».
- source_word: ἐξέψυξεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - expiró
  - exhaló su último aliento
  lexicon: BDAG
  rationale: El verbo puede sugerir «expirar» o «exhalar el último aliento», pero en el contexto narrativo significa muerte. «Murió» es claro y fiel, y deja abierta la posible tensión lexical.
- source_word: ἐγένετο φόβος μέγας
  english_pob_choice: great fear came upon
  chosen_spanish: gran temor cayó sobre
  alternatives_spanish:
  - hubo gran temor
  - gran temor vino sobre
  lexicon: BDAG
  rationale: La construcción idiomática expresa la irrupción del temor. «Cayó sobre» mantiene la fuerza de ἐπί y el carácter abrumador del temor sin sonar artificial.
- source_word: ἐπὶ πάντας τοὺς ἀκούοντας
  english_pob_choice: upon all who heard
  chosen_spanish: sobre todos los que oyeron
  alternatives_spanish:
  - sobre todos los oyentes
  - sobre todos los que escuchaban
  lexicon: BDAG
  rationale: El participio funciona sustantivamente para quienes oyen el relato o las noticias. «Los que oyeron» es una forma natural en español y suficientemente amplia para no especificar más de lo que el griego exige.
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Ananías
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado según convención habitual en español bíblico.
theological_decisions:
- issue: Mecanismo de la muerte de Ananías
  english_pob_reading: Render the event straightforwardly as immediate death without specifying divine mechanism beyond the narrative.
  chosen_spanish_reading: Presentar el hecho como muerte inmediata sin explicar el mecanismo causal.
  alternative_spanish_readings:
  - Dios lo mató de inmediato
  - murió naturalmente del susto
  rationale: El griego afirma que cayó y murió, y luego describe el gran temor resultante; no explicita el mecanismo. La traducción debe preservar esa tensión sin añadir una interpretación causal no dicha.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el pasaje mantiene alta concordancia con el auditorío inglés y la lectura griega base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa «temor» para φόβος con valor de reacción reverente/impactante, en consonancia con el contexto narrativo.
  - No se fuerza una interpretación doctrinal sobre la causa de la muerte; el español conserva la sobriedad del griego.
