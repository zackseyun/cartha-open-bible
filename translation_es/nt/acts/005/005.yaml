revisions:
- from: Pero, al oír Ananías[a] estas palabras, cayó y murió. Y gran temor cayó sobre todos los que oyeron.
  to: Pero, al oír Ananías estas palabras, cayó y murió[a]. Y gran temor vino sobre todos los que oyeron.
  rationale: Se ajusta una frase poco idiomática («cayó sobre») a una formulación natural y fiel en español («vino sobre»), y se reubica la nota léxica al verbo «murió», que es el término al que realmente explica. No se altera el sentido ni la tensión teológica del pasaje.
