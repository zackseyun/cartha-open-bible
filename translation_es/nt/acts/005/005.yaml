review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: marco temporal con ἀκούων, caída seguida de muerte para πεσὼν ἐξέψυξεν, y la reacción colectiva posterior. También preserva correctamente la nota léxica de ἐξέψυξεν sin imponer un mecanismo teológico para la muerte. Sin embargo, «gran temor cayó sobre» para ἐγένετο φόβος μέγας ἐπὶ no suena natural en español y no representa tan bien la construcción idiomática como «vino sobre» o «se apoderó de».'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero tiene una rigidez idiomática en «gran temor cayó sobre todos»; en español bíblico moderno resulta más natural «vino sobre todos» o «se apoderó de todos». Además, conviene quitar la nota al nombre Ananías y anclarla a «murió», que es donde corresponde la alternativa léxica «expiró / exhaló su último aliento».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios, el registro y la decisión teológica están bien. La única corrección necesaria es de naturalidad/ubicación de nota, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «gran temor cayó sobre todos»'
    rationale: Aunque intenta reflejar la fuerza de ἐγένετο ... ἐπὶ, en español esta combinación suena dura y menos idiomática. «Vino sobre todos» preserva mejor el sentido de irrupción del temor con buena legibilidad.
  - severity: medium
    issue: La nota [a] está anclada a «Ananías» en vez de al verbo de muerte
    rationale: La nota explica una alternativa léxica para ἐξέψυξεν («expiró» / «exhaló su último aliento»), por lo que debe aparecer junto a «murió», no junto al nombre propio.
  revised_spanish_text: Pero, al oír Ananías estas palabras, cayó y murió[a]. Y gran temor vino sobre todos los que oyeron.
  revised_footnotes:
