revisions:
- from: Y sobre toda la iglesia y sobre todos los que oían estas cosas hubo gran temor.
  to: Y vino gran temor sobre toda la iglesia[a] y sobre todos los que oyeron estas cosas.
  rationale: Se ajusta el verbo a 'vino ... sobre' para reflejar mejor ἐγένετο + ἐπί con acusativo, se cambia 'oían' por 'oyeron' para seguir la decisión auditada sobre ἀκούοντας en este contexto narrativo, y se añade la nota léxica requerida para ἐκκλησία.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: φόβος μέγας = ''gran temor'' y ἐκκλησία = ''iglesia'' están bien resueltos. Sin embargo, la estructura española desplaza indebidamente el foco del verbo ἐγένετο al frente preposicional (''Y sobre toda la iglesia... hubo gran temor''), y ''oían'' no refleja tan bien como ''oyeron''/''escucharon'' la referencia eventiva posterior al aoristo principal que la auditoría inglesa justificó como ''who heard''. Además, falta la nota léxica preservada por la POB inglesa para ἐκκλησία.'
  spanish_quality_summary: El texto es comprensible, pero suena algo invertido y menos natural de lo necesario en español moderno digno. Una redacción como 'Y vino gran temor sobre toda la iglesia y sobre todos los que oyeron estas cosas' conserva mejor el flujo narrativo, la fuerza eventiva y la relación preposicional del original.
  glossary_alignment: '''Iglesia'' concuerda con la decisión teológica y terminológica del proyecto para ἐκκλησία en Hechos. No hay términos del glosario mayor en conflicto. Debe conservarse en nota la alternativa léxica ''asamblea''/''congregación'', ya que el inglés la documentó explícitamente.'
  issues:
  - severity: medium
    issue: Orden y giro verbal poco fieles al énfasis del original
    rationale: El griego presenta 'y ocurrió/vino gran temor sobre...', mientras que 'sobre toda la iglesia... hubo gran temor' reordena la cláusula de manera menos natural y atenúa la idea de que el temor sobrevino.
  - severity: medium
    issue: '''oían'' debilita la referencia aspectual/narrativa'
    rationale: 'Aunque el participio presente puede flexibilizarse en español, aquí la auditoría inglesa justificó un valor idiomático de anterioridad relativa tras el aoristo principal: ''all who heard''. ''Los que oyeron'' refleja mejor el sentido de quienes llegaron a enterarse de estos hechos.'
  - severity: low
    issue: Falta la nota léxica para ἐκκλησία
    rationale: La POB inglesa preservó la alternativa 'assembly/congregation'. Debe mantenerse una nota equivalente en español para transparencia léxica.
  revised_spanish_text: Y vino gran temor sobre toda la iglesia[a] y sobre todos los que oyeron estas cosas.
  revised_footnotes:
  - marker: a
    text: O 'asamblea' o 'congregación' para 'iglesia' (ἐκκλησία).
    reason: lexical_alternative
