translation:
  language: es
  text: Y vino gran temor sobre toda la iglesia[a] y sobre todos los que oyeron estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'asamblea' o 'congregación' para 'iglesia' (ἐκκλησία).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: came upon
  chosen_spanish: hubo
  alternatives_spanish:
  - vino sobre
  - sobrevino
  lexicon: BDAG
  rationale: En español, con φόβος como sujeto, la construcción idiomática más natural y fiel al valor eventivo es 'hubo gran temor'. Evita un calco extraño y conserva la idea de que el temor se produjo como resultado del hecho narrado.
- source_word: φόβος μέγας
  english_pob_choice: great fear
  chosen_spanish: gran temor
  alternatives_spanish:
  - gran miedo
  - temor grande
  lexicon: BDAG
  rationale: '''Temor'' expresa mejor que ''miedo'' la gravedad reverente del contexto en Hechos 5. ''Gran'' reproduce la intensificación de μέγας con naturalidad en español.'
- source_word: ἐφ’ ὅλην τὴν ἐκκλησίαν
  english_pob_choice: upon the whole church
  chosen_spanish: sobre toda la iglesia
  alternatives_spanish:
  - sobre toda la asamblea
  - sobre toda la congregación
  lexicon: BDAG
  rationale: '''Iglesia'' mantiene el referente comunitario cristiano que la POB inglesa decidió con ''church''. ''Toda'' conserva la fuerza de ὅλην y ''sobre'' expresa bien la preposición con acusativo en este giro idiomático.'
- source_word: πάντας τοὺς ἀκούοντας ταῦτα
  english_pob_choice: all who heard these things
  chosen_spanish: todos los que oían estas cosas
  alternatives_spanish:
  - todos los que escuchaban estas cosas
  - todos los que oyeron estas cosas
  lexicon: BDAG
  rationale: El participio presente ἀκούοντας puede verterse en español con un imperfecto relativo ('oían') para reflejar a los oyentes en general sin forzar el español. 'Estas cosas' preserva el plural de ταῦτα.
theological_decisions:
- issue: ἐκκλησία como comunidad cristiana
  english_pob_reading: church
  chosen_spanish_reading: iglesia
  alternative_spanish_readings:
  - asamblea
  - congregación
  rationale: En Hechos, ἐκκλησία se refiere a la comunidad de creyentes. 'Iglesia' es la opción más estable y reconoce ese referente sin añadir contenido ajeno al texto. Se evita sustituirla por 'asamblea' o 'congregación' como equivalentes automáticos, aunque siguen siendo posibles matices léxicos.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada en el texto. La redacción se ajusta al griego y al uso español natural, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo el orden paratáctico básico del griego con 'Y ... y ...' para conservar la secuencia narrativa.
  - Se eligió 'iglesia' en coherencia con el tratamiento POB de ἐκκλησία en Hechos.
  - No se introdujeron notas al pie porque no hay una marca [a] en el texto final y no era necesario documentar una alternativa aquí.
