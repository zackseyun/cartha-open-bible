translation:
  language: es
  text: Vayan y preséntense en el templo[a], y hablen al pueblo todas las palabras de esta vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los atrios del templo» o «en el recinto del templo»; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «acerca de esta vida» o «de este modo de vida». La frase puede referirse a la vida proclamada en el evangelio.
    reason: alternative_reading
lexical_decisions:
- source_word: Πορεύεσθε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan de camino
  - Procedan
  lexicon: BDAG
  rationale: El imperativo plural de πορεύομαι expresa movimiento/comisión; en español, «Vayan» es el mandato más natural y directo, conservando el impulso de salida.
- source_word: σταθέντες
  english_pob_choice: standing
  chosen_spanish: pónganse
  alternatives_spanish:
  - estando de pie
  - habiendo quedado de pie
  - permanezcan de pie
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción acompañante a la orden principal. «Pónganse» preserva la secuencia imperativa y suena más natural que una construcción participial literal, sin perder la idea de colocarse de pie allí.
- source_word: λαλεῖτε
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - hablen con
  - digan
  - proclamen
  lexicon: BDAG
  rationale: λαλέω indica hablar, decir, dirigirse. «Hablen» mantiene ese valor amplio; «proclamen» sería más interpretativo y añade énfasis no explícito en el verbo.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  - en los patios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no el santuario interior. «En el templo» es la forma más clara y fiel en español, y deja abierta la amplitud del lugar.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al pueblo de Israel
  - a la multitud
  lexicon: BDAG
  rationale: λαός aquí apunta al pueblo reunido, en contexto judío. «Al pueblo» reproduce bien el destinatario colectivo sin precisar más de lo que el texto da.
- source_word: πάντα τὰ ῥήματα
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo lo que dicen
  - el mensaje completo
  - todas las expresiones
  lexicon: BDAG
  rationale: La combinación πᾶς + ῥῆμα se refleja con «todas las palabras», conservando tanto la totalidad como el sustantivo concreto del griego. «Mensaje» sería más interpretativo.
- source_word: τῆς ζωῆς ταύτης
  english_pob_choice: of this life
  chosen_spanish: de esta vida
  alternatives_spanish:
  - acerca de esta vida
  - de esta nueva vida
  - de este modo de vida
  lexicon: BDAG
  rationale: 'La frase genitiva es breve y teológicamente cargada. «De esta vida» conserva la ambigüedad del griego: puede apuntar a la vida anunciada en el evangelio, a la vida nueva en el Mesías o al mensaje que da vida.'
theological_decisions:
- issue: Alcance de «esta vida» (τῆς ζωῆς ταύτης)
  english_pob_reading: Retain the phrase 'this life' without interpretive expansion.
  chosen_spanish_reading: Mantener «esta vida» sin ampliar el sentido en el cuerpo del texto.
  alternative_spanish_readings:
  - esta nueva vida
  - este modo de vida
  - el mensaje que da vida
  rationale: El griego mantiene una expresión compacta y abierta. La traducción española conserva esa tensión para no resolver prematuramente si se trata de la vida del evangelio, la vida nueva en Jesús o la palabra vivificante.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de una redacción más literal y algo áspera a una forma más fluida: «Go and stand in the temple, and speak to the people all the words of this life.» En español se siguió esa misma intención, manteniendo la serie de mandatos (ir, ponerse de pie, hablar) con una sintaxis natural y sin perder la fuerza del participio aoristo ni la ambigüedad de «esta vida».'
  spanish_consistency_notes:
  - Se usó «templo» para ἱερόν, no «santuario», por la referencia al complejo entero.
  - Se prefirió «pueblo» para λαός, siguiendo el destinatario colectivo del texto.
  - Se mantuvo «esta vida» sin expansión interpretativa en el texto principal.
  - 'La secuencia verbal conserva el carácter de comisión: ir, ponerse de pie, hablar.'
