translation:
  language: es
  text: Y después de llamar a los apóstoles[a], los golpearon, les ordenaron que no hablaran en el nombre de Jesús y los dejaron en libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acerca del nombre de Jesús' o 'sobre la base del nombre de Jesús'. El giro griego puede incluir hablar con referencia a Jesús y bajo su autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενοι
  english_pob_choice: after summoning
  chosen_spanish: habiendo llamado a
  alternatives_spanish:
  - después de convocar a
  - después de llamar a
  lexicon: BDAG
  rationale: El participio aoristo marca una acción previa a la principal. En español, 'habiendo llamado a' conserva esa secuencia sin sonar forzado y mantiene el matiz de una citación formal.
- source_word: τοὺς ἀποστόλους
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los emisarios
  - los mensajeros
  lexicon: BDAG
  rationale: '''Apóstoles'' es el equivalente establecido y más preciso en este contexto de Hechos; los otros términos resultan demasiado generales.'
- source_word: δείραντες
  english_pob_choice: they beat them
  chosen_spanish: después de azotarlos
  alternatives_spanish:
  - después de golpearlos
  - después de flagelarlos
  lexicon: BDAG
  rationale: El verbo δέρω significa golpear con violencia, y en este contexto judicial puede implicar azotes. 'Azotarlos' comunica bien la severidad del castigo sin afirmar más de lo que el verbo exige; 'golpearlos' sería más amplio pero menos específico.
- source_word: παρήγγειλαν
  english_pob_choice: ordered
  chosen_spanish: les ordenaron
  alternatives_spanish:
  - les mandaron
  - les dieron órdenes
  lexicon: BDAG
  rationale: παραγγέλλω expresa mandar u ordenar. 'Les ordenaron' es natural, directo y conserva la fuerza de la prohibición.
- source_word: μὴ λαλεῖν
  english_pob_choice: not to speak
  chosen_spanish: que no hablaran
  alternatives_spanish:
  - que no siguieran hablando
  - que no dijeran nada
  lexicon: BDAG
  rationale: La construcción con infinitivo expresa el contenido de la orden. En español, la subordinada con 'que no hablaran' suena más natural que un infinitivo dependiente y conserva la prohibición formal.
- source_word: ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  english_pob_choice: in the name of Jesus
  chosen_spanish: en el nombre de Jesús
  alternatives_spanish:
  - acerca del nombre de Jesús
  - sobre la base del nombre de Jesús
  lexicon: BDAG
  rationale: 'La preposición ἐπί con dativo admite un rango de matices: referencia a Jesús, hablar bajo su autoridad, o en relación con su nombre. ''En el nombre de Jesús'' preserva la amplitud idiomática y el peso teológico reconocido por la POB en inglés.'
- source_word: ἀπέλυσαν
  english_pob_choice: released them
  chosen_spanish: los soltaron
  alternatives_spanish:
  - los liberaron
  - los dejaron ir
  lexicon: BDAG
  rationale: ἀπολύω aquí significa dejar ir o liberar de custodia. 'Los soltaron' es idiomático en español y comunica la acción sin sobrecargarla con un matiz jurídico demasiado técnico.
theological_decisions:
- issue: El alcance de ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  english_pob_reading: in the name of Jesus
  chosen_spanish_reading: en el nombre de Jesús
  alternative_spanish_readings:
  - acerca del nombre de Jesús
  - bajo la autoridad del nombre de Jesús
  rationale: Se conserva la formulación tradicional y bíblica porque permite incluir a la vez referencia a Jesús, invocación de su autoridad y testimonio público acerca de él. No se reduce el sentido a una sola paráfrasis.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: Coincide con el pasaje griego SBLGNT y con la auditoría inglesa POB. Se mantiene la secuencia narrativa del participio aoristo, la fuerza judicial de la orden y la amplitud idiomática de 'en el nombre de Jesús' sin introducir glosas innecesarias.
  spanish_consistency_notes:
  - Se usa 'Jesús' conforme al estándar del proyecto para Ἰησοῦς.
  - Se conserva 'apóstoles' por precisión contextual.
  - '''Azotarlos'' refleja mejor la violencia del verbo que un simple ''golpearlos'' y evita especificar un tipo de castigo no exigido por la forma verbal.'
  - La nota[a] se ancla solo en la frase con posible ambigüedad idiomática.
