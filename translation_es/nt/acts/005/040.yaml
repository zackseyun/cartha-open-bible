revisions:
- from: Y habiendo llamado a los apóstoles[a], después de azotarlos, les ordenaron que no hablaran en el nombre de Jesús y los soltaron.
  to: Y después de llamar a los apóstoles[a], los golpearon, les ordenaron que no hablaran en el nombre de Jesús y los dejaron en libertad.
  rationale: 'Se revisa para ajustarse mejor al sentido fuente y al rastro auditado de la POB: ''los golpearon'' preserva la amplitud de δείραντες sin estrecharlo a ''azotarlos''; ''los dejaron en libertad'' refleja mejor ἀπέλυσαν en contexto de custodia; y ''después de llamar a'' mejora la naturalidad del español sin perder la secuencia del participio aoristo. La nota se alinea más de cerca con las alternativas documentadas en inglés (''about'' / ''on the basis of'') evitando introducir un matiz más interpretativo como alternativa principal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia básica del griego: convocatoria previa de los apóstoles, castigo, orden de no hablar y liberación. También conserva adecuadamente el modismo ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ mediante ''en el nombre de Jesús'' con nota alternativa. Sin embargo, dos elecciones se apartan del rastro auditado: δείραντες fue auditado en inglés como ''beat them'' precisamente para no estrecharlo a un castigo judicial específico, mientras que ''azotarlos'' sí lo estrecha; y ἀπέλυσαν en este contexto encaja mejor con ''los dejaron en libertad''/''los liberaron'' que con el más coloquial ''los soltaron''.'
  spanish_quality_summary: El español es claro y legible, pero 'Y habiendo llamado...' suena algo más pesado de lo necesario, y la combinación 'habiendo llamado... después de azotarlos' duplica la marcación temporal. Una redacción más fluida y fiel sería 'Y después de llamar a los apóstoles[a], los golpearon, les ordenaron...' Mantiene la dignidad del registro y evita un calco participial menos natural.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Jesús'' y ''apóstoles'' están bien. La decisión ''en el nombre de Jesús'' concuerda con la preferencia POB y preserva la amplitud teológica documentada. El ajuste principal es léxico-contextual: evitar ''azotarlos'' por excesiva especificación y preferir una liberación menos coloquial que ''los soltaron''.'
  issues:
  - severity: medium
    issue: '''azotarlos'' especifica demasiado δείραντες'
    rationale: El expediente inglés eligió deliberadamente 'beat them' y descartó 'having flogged them' porque δέρω no exige por sí solo un castigo judicial de azotes. 'Azotarlos' reduce indebidamente la amplitud del verbo.
  - severity: low
    issue: '''los soltaron'' resulta algo coloquial para ἀπέλυσαν en este marco'
    rationale: Aunque comprensible, en un contexto de custodia/autoridad suena mejor 'los dejaron en libertad' o 'los liberaron', más cercano al matiz de release.
  - severity: low
    issue: La apertura 'Y habiendo llamado... después de azotarlos' suena algo trabada
    rationale: 'La doble marcación adverbial/participial de anterioridad no es incorrecta, pero en español fluye mejor una sola estructura temporal: ''después de llamar...''.'
  revised_spanish_text: Y después de llamar a los apóstoles[a], los golpearon, les ordenaron que no hablaran en el nombre de Jesús y los dejaron en libertad.
  revised_footnotes:
  - marker: a
    text: O 'acerca del nombre de Jesús' o 'sobre la base del nombre de Jesús'. El giro griego puede incluir hablar con referencia a Jesús y bajo su autoridad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para ajustarse mejor al sentido fuente y al rastro auditado de la POB: ''los golpearon'' preserva la amplitud de δείραντες sin estrecharlo a ''azotarlos''; ''los dejaron en libertad'' refleja mejor ἀπέλυσαν en contexto de custodia; y ''después de llamar a'' mejora la naturalidad del español sin perder la secuencia del participio aoristo. La nota se alinea más de cerca con las alternativas documentadas en inglés (''about'' / ''on the basis of'') evitando introducir un matiz más interpretativo como alternativa principal.'
