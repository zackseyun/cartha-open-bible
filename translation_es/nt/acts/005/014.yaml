review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: crecimiento continuo de personas que llegan a la fe, con gran número de hombres y mujeres. Sin embargo, «creyentes al Señor» no suena natural ni reproduce tan bien como debería el valor de πιστεύοντες τῷ κυρίῳ, que en la auditoría inglesa se entendió como «believers in the Lord». Además, el léxico registrado para ἀνδρῶν τε καὶ γυναικῶν no coincide exactamente con el texto español presentado.'
  spanish_quality_summary: El español es claro en casi todo, y «se iban añadiendo» funciona bien para el imperfecto progresivo con matiz pasivo. Pero «creyentes al Señor» resulta poco idiomático en español eclesial general; «creyentes en el Señor» o una reestructuración equivalente es más natural y fiel. También conviene ajustar «aun» a «aún» en uso adverbial estándar.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: κύριος como «Señor» se mantiene correctamente y no hay términos doctrinales mayores desviados. La revisión propuesta solo mejora la sintaxis idiomática de πιστεύοντες τῷ κυρίῳ y la ortografía de «aún».'
  issues:
  - severity: medium
    issue: «creyentes al Señor» es poco idiomático
    rationale: Aunque intenta reflejar la dirección de la fe, en español natural la combinación sustantiva «creyentes al Señor» suena forzada. Para πιστεύοντες τῷ κυρίῳ, «creyentes en el Señor» preserva mejor el sentido de fe puesta en él y coincide con la auditoría inglesa.
  - severity: low
    issue: Falta de tilde en «aún»
    rationale: En este contexto adverbial intensivo/comparativo, «aún más» es la grafía preferible en español estándar y mejora la presentación del texto.
  - severity: low
    issue: Desajuste entre texto y decisión léxica sobre hombres y mujeres
    rationale: El texto dice «multitudes de hombres y mujeres», mientras la nota léxica registra «de hombres y de mujeres». No altera mucho el sentido, pero conviene unificar la formulación editada.
  revised_spanish_text: Y aún más se iban añadiendo creyentes en el Señor[a]—multitudes de hombres y mujeres.
  revised_footnotes:
