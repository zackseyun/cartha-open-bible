translation:
  language: es
  text: Y aún más se iban añadiendo creyentes en el Señor[a]—multitudes de hombres y mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se iban uniendo» o «eran añadidos». El verbo griego puede entenderse como un aumento continuo en número, con un sentido pasivo que puede implicar a Dios como quien los añadía.
    reason: lexical_alternative
lexical_decisions:
- source_word: μᾶλλον
  english_pob_choice: even more
  chosen_spanish: aun más
  alternatives_spanish:
  - más y más
  - todavía más
  lexicon: BDAG
  rationale: Expresa bien el valor comparativo e intensivo del adverbio sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  - —
  lexicon: BDAG
  rationale: Aquí δέ es conectivo y continúa la narración; «Y» conserva esa fluidez.
- source_word: προσετίθεντο
  english_pob_choice: were being added
  chosen_spanish: se iban añadiendo
  alternatives_spanish:
  - eran añadidos
  - se añadían
  - iban siendo añadidos
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción continua; «se iban añadiendo» comunica el crecimiento progresivo y mantiene la idea pasiva sin sonar artificial.
- source_word: πιστεύοντες
  english_pob_choice: believers
  chosen_spanish: creyentes
  alternatives_spanish:
  - los que creían
  - personas que creían
  lexicon: BDAG
  rationale: El participio funciona sustantivamente; «creyentes» es natural y fiel a la caracterización de quienes creen.
- source_word: τῷ κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - en el Señor
  - para el Señor
  lexicon: BDAG
  rationale: Con πιστεύω, el dativo expresa el objeto de la fe. En español, «creer al Señor» no es idiomático, por lo que «al Señor» preserva el movimiento relacional de la fe dirigida a él, sin perder el título cristológico.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título reverencial y cristológico tradicional, equivalente directo de «Lord» en la auditoría inglesa.
- source_word: πλήθη
  english_pob_choice: multitudes
  chosen_spanish: multitudes
  alternatives_spanish:
  - grandes números
  - muchedumbres
  lexicon: BDAG
  rationale: Conserva la escala masiva del sustantivo plural neutro sin diluirlo en una paráfrasis.
- source_word: ἀνδρῶν τε καὶ γυναικῶν
  english_pob_choice: of both men and women
  chosen_spanish: de hombres y de mujeres
  alternatives_spanish:
  - de hombres y mujeres
  - tanto de hombres como de mujeres
  lexicon: BDAG
  rationale: Los genitivos dependen de πλήθη; repetir «de» en español refleja con claridad la estructura del griego y mantiene el paralelismo de ambos grupos.
theological_decisions:
- issue: Referencia de «el Señor»
  english_pob_reading: '''the Lord'' refers to Jesus, and the phrase expresses people coming to faith in him.'
  chosen_spanish_reading: «el Señor» se conserva como título cristológico, dejando implícito que la fe está dirigida a Jesús sin explicitarlo en el texto principal.
  alternative_spanish_readings:
  - «Jesús»
  - «el Señor Jesús»
  rationale: La auditoría inglesa prefiere no expandir interpretivamente el referente en el texto principal. En español, mantener «el Señor» respeta esa cautela y la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor pasivo/progresivo de προσετίθεντο
  english_pob_reading: 'Passive-progressive sense: people were being added.'
  chosen_spanish_reading: Se refleja con «se iban añadiendo», que conserva el aumento continuo y la pasividad implícita.
  alternative_spanish_readings:
  - «eran añadidos»
  - «se añadían»
  rationale: La forma elegida reproduce mejor el aspecto imperfectivo y la sugerencia de que el crecimiento ocurre como proceso sostenido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto griego SBLGNT, la tabla morfológica y la auditoría inglesa. La versión anterior en inglés fue confirmada sin cambios en la revisión más reciente; no se documentaron revisiones aplicadas al contenido base.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto y a la lectura cristológica del contexto.
  - «Creyentes» traduce el participio sustantivado sin añadir contenido ajeno al griego.
  - La nota de pie de página conserva la alternativa lexical y el matiz pasivo/progresivo del verbo griego.
