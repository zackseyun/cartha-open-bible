    text: O «se iban uniendo» o «eran añadidos». El verbo griego puede entenderse como un aumento continuo en número, con un sentido pasivo que puede implicar a Dios como quien los añadía.
    reason: lexical_alternative
  revision_rationale: Se ajusta «al Señor» a «en el Señor» para reflejar de manera idiomática y fiel el sentido de πιστεύοντες τῷ κυρίῳ según la auditoría inglesa. Se corrige además «aún» con tilde. Se conserva «se iban añadiendo» por su buen valor progresivo-pasivo y «multitudes de hombres y mujeres» por su claridad natural en español.
