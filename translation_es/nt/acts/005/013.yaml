translation:
  language: es
  text: Pero ninguno de los demás se atrevía a unirse a ellos, y el pueblo los tenía en alta estima.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῶν λοιπῶν
  english_pob_choice: of the rest
  chosen_spanish: de los demás
  alternatives_spanish:
  - de los otros
  - del resto
  lexicon: BDAG
  rationale: El genitivo partitivo expresa un grupo restante distinto de ellos. «De los demás» comunica con naturalidad esa distinción en español sin precisar más de lo que el griego dice.
- source_word: οὐδεὶς
  english_pob_choice: none
  chosen_spanish: ninguno
  alternatives_spanish:
  - nadie
  lexicon: BDAG
  rationale: «Ninguno» encaja bien con la construcción partitiva «de los demás» y mantiene el sentido de ausencia total de personas dispuestas.
- source_word: ἐτόλμα
  english_pob_choice: dared
  chosen_spanish: se atrevía
  alternatives_spanish:
  - se atrevió
  - osaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o habitual; «se atrevía» conserva mejor ese valor durativo que un perfecto puntual.
- source_word: κολλᾶσθαι
  english_pob_choice: to join
  chosen_spanish: unirse a
  alternatives_spanish:
  - adherirse a
  - asociarse con
  - pegarse a
  lexicon: BDAG
  rationale: El verbo literalmente es «unirse/pegarse». En este contexto de asociación con la comunidad apostólica, «unirse a» es la opción más clara y natural en español, sin perder la idea de adhesión.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - con ellos
  lexicon: BDAG
  rationale: El dativo gobernado por κολλᾶσθαι se expresa de forma natural con «a ellos» después de «unirse a».
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - más bien
  lexicon: BDAG
  rationale: La partícula introduce contraste simple. «Pero» reproduce ese valor adversativo de manera directa y sobria.
- source_word: ἐμεγάλυνεν
  english_pob_choice: held them in high esteem
  chosen_spanish: los tenía en alta estima
  alternatives_spanish:
  - los consideraba grandes
  - los honraba mucho
  - los exaltaba
  lexicon: BDAG
  rationale: μεγαλύνω puede significar «agrandar, exaltar, ensalzar». En este contexto, la idea es que el pueblo los valoraba o honraba altamente. «Los tenía en alta estima» transmite bien esa fuerza idiomática sin sonar arcaico.
- source_word: ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: «El pueblo» es la equivalencia estándar y conserva la referencia colectiva general del griego.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Como objeto directo de «tener en alta estima», el español natural usa el pronombre átono «los».
theological_decisions:
- issue: Referencia de «los demás» y de «ellos»
  english_pob_reading: '''The rest'' refers to those outside the core apostolic/believing group, and ''them'' refers to that group, likely especially the apostles in context.'
  chosen_spanish_reading: «Los demás» se refiere a quienes estaban fuera del grupo apostólico o creyente central, y «ellos» a ese grupo, probablemente en especial a los apóstoles por el contexto.
  alternative_spanish_readings:
  - «Los demás» podría referirse solo a creyentes no apostólicos
  - «Ellos» podría limitarse estrictamente a los apóstoles
  rationale: El griego no define explícitamente ambos grupos. La traducción conserva esa amplitud contextual sin sobreespecificar los referentes.
  doctrine_reference: Preservar la tensión contextual sin resolverla de manera interpretativa excesiva.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefiere el contraste simple de ἀλλ’ con «pero» y se mantuvo la fuerza idiomática de μεγαλύνω en una expresión española natural. No se añadieron notas al pie porque no hubo una ambigüedad léxica que requiriera anclaje explícito en el texto final.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y digno, evitando calcos innecesarios.
  - «Se atrevía a unirse a ellos» conserva el imperfecto aspectual del griego.
  - No se empleó «Cristo» ni terminología ajena al versículo.
  - La construcción con dos cláusulas unidas por «pero» refleja de forma directa el ἀλλ’ griego.
