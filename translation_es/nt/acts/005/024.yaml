translation:
  language: es
  text: Y cuando el capitán del templo y los principales sacerdotes oyeron estas palabras[a], estaban perplejos acerca de ellas, preguntándose en qué iba a parar esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué resultaría de esto». La expresión griega pregunta por el desenlace o resultado de la situación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: Now when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Pero cuando
  - Y al oír
  lexicon: BDAG
  rationale: La combinación introduce un nuevo desarrollo narrativo con valor temporal y conectivo. «Y cuando» conserva el enlace de δέ y el sentido temporal de ὡς sin sonar forzado en español.
- source_word: ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: En este contexto narrativo, «oyeron» comunica la recepción del mensaje de manera natural y fiel al sentido básico de ἀκούω.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este informe
  - estas cosas
  lexicon: BDAG
  rationale: λόγοι aquí se refiere al mensaje o reporte recibido. «Estas palabras» mantiene la cercanía formal del griego y es idiomático en español.
- source_word: ὅ τε στρατηγὸς τοῦ ἱεροῦ
  english_pob_choice: the captain of the temple
  chosen_spanish: el capitán del templo
  alternatives_spanish:
  - el comandante del templo
  - el jefe del templo
  lexicon: BDAG
  rationale: στρατηγός designa a un oficial con autoridad de mando; «capitán» es una equivalencia tradicional y comprensible para un lector general, y «del templo» conserva la especificación de esfera.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los sacerdotes principales
  lexicon: BDAG
  rationale: Aunque «chief priests» es el valor normal en inglés, en español «principales sacerdotes» conserva el sentido plural de la élite sacerdotal sin sugerir varios sumos sacerdotes individuales. «Sumos sacerdotes» puede sonar más fijo litúrgicamente, pero aquí el plural del contexto favorece la designación de liderazgo sacerdotal.
- source_word: διηπόρουν
  english_pob_choice: they were perplexed
  chosen_spanish: quedaron perplejos
  alternatives_spanish:
  - estaban perplejos
  - quedaron desconcertados
  - se hallaban en gran incertidumbre
  lexicon: BDAG
  rationale: διαπορέω expresa confusión e incertidumbre seria. «Quedaron perplejos» reproduce bien el estado resultante en la narración; la alternativa imperfectiva «estaban perplejos» es posible, pero el español fluye mejor con el cambio de situación.
- source_word: περὶ αὐτῶν
  english_pob_choice: about them
  chosen_spanish: acerca de ellas
  alternatives_spanish:
  - sobre ellas
  - acerca de esto
  lexicon: BDAG
  rationale: El antecedente inmediato son «estas palabras», por eso el pronombre en español puede concordar naturalmente con ese referente implícito. «Acerca de ellas» evita sobreeinterpretar el pronombre y mantiene la referencia al reporte recibido.
- source_word: τί ἂν γένοιτο τοῦτο
  english_pob_choice: what this might come to
  chosen_spanish: en qué iba a parar esto
  alternatives_spanish:
  - qué resultaría de esto
  - qué podría resultar de esto
  - qué iba a llegar a ser esto
  lexicon: BDAG
  rationale: La expresión pregunta por el desenlace o resultado de la situación. «En qué iba a parar esto» es un español natural que conserva la incertidumbre prospectiva; no debe reducirse solo a «qué pasaría», porque el griego enfatiza el resultado o desenlace.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el criterio inglés de la POB, especialmente en el valor temporal-conectivo de ὡς δέ, el referente implícito de περὶ αὐτῶν y la pregunta sobre el desenlace en τί ἂν γένοιτο τοῦτο. Se evitó un calco rígido de «what this might come to» y se optó por una formulación española natural que conserva la incertidumbre sobre el resultado.
  spanish_consistency_notes:
  - Se mantuvo «Y cuando» para la transición narrativa, coherente con el estilo POB en pasajes históricos.
  - «Principales sacerdotes» preserva el plural del griego y la distinción contextual respecto de «sumos sacerdotes».
  - «Capitán del templo» mantiene la terminología institucional sin sustituirla por un título eclesiástico ajeno al contexto judío del Segundo Templo.
  - La nota al pie conserva la alternativa de desenlace/resultados, como en el audit trail inglés.
