translation:
  language: es
  text: 'Y ahora les digo: apártense de estos hombres y déjenlos en paz; porque si este plan o esta obra es de hombres[a], será derribado[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de origen humano» o «de seres humanos».
    reason: lexical_alternative
  - marker: b
    text: O «será destruido» o «quedará en nada».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ νῦν
  english_pob_choice: now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - en este momento
  lexicon: BDAG
  rationale: La expresión introduce la exhortación inmediata de Gamaliel. «Y ahora» conserva el valor discursivo temporal y suena natural en español sin volverlo rígido.
- source_word: ἀπόστητε
  english_pob_choice: keep away from
  chosen_spanish: apártense de
  alternatives_spanish:
  - aléjense de
  - sepárense de
  lexicon: BDAG
  rationale: El imperativo comunica separación práctica y no involucrarse más con ellos. «Apártense de» mantiene el sentido exhortativo y la dirección hacia la distancia.
- source_word: ἄφετε αὐτούς
  english_pob_choice: leave them alone
  chosen_spanish: déjenlos en paz
  alternatives_spanish:
  - déjenlos
  - déjenlos tranquilos
  lexicon: BDAG
  rationale: La frase pide no interferir más con ellos. «Déjenlos en paz» expresa bien la fuerza idiomática del mandato en español contemporáneo y evita una literalidad extraña.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de origen humano
  - de seres humanos
  lexicon: BDAG
  rationale: Se conserva la oposición de origen con el versículo siguiente. «De hombres» es una equivalencia directa y refleja la formulación breve del griego; las alternativas explicitan la idea de procedencia humana.
- source_word: βουλή
  english_pob_choice: plan
  chosen_spanish: plan
  alternatives_spanish:
  - propósito
  - consejo
  lexicon: BDAG
  rationale: «Plan» es claro y natural en español, y mantiene la relación con «obra» como el proyecto o intención del movimiento.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - acción
  - empresa
  lexicon: BDAG
  rationale: «Obra» conserva el campo semántico amplio de ἔργον y funciona bien junto a «plan» en el contraste del pasaje.
- source_word: καταλυθήσεται
  english_pob_choice: it will be overthrown
  chosen_spanish: será derribado
  alternatives_spanish:
  - será destruido
  - quedará en nada
  lexicon: BDAG
  rationale: El futuro pasivo expresa que el asunto se vendrá abajo o será deshecho. «Será derribado» conserva la idea de caída/ruina de manera idiomática en español.
theological_decisions:
- issue: ἐξ ἀνθρώπων como contraste de origen humano frente a origen divino implícito
  english_pob_reading: from men
  chosen_spanish_reading: de hombres
  alternative_spanish_readings:
  - de origen humano
  - de seres humanos
  rationale: La frase debe conservar la tensión entre procedencia humana y la posibilidad, desarrollada en el contexto inmediato, de procedencia divina. «De hombres» mantiene la literalidad y el contraste; se ofrecen alternativas más explícitas para lectores que prefieran clarificar la noción de origen.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El pasaje se mantiene en alta concordancia con el auditor de la versión inglesa; no se registran revisiones sustantivas en el pasaje de referencia, así que la traducción española sigue de cerca las decisiones léxicas validadas.
  spanish_consistency_notes:
  - Se usa «Dios» y no se requiere aquí el tratamiento de Yahvé o Mesías.
  - Se mantiene «hombres» para conservar el contraste de origen del argumento, sin neutralizarlo en el texto principal.
  - «Obra» se elige por coherencia con el paralelo de «plan» y por su amplitud semántica en español bíblico moderno.
