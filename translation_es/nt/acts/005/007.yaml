translation:
  language: es
  text: Entonces, después de un intervalo de unas tres horas,[a] su esposa entró, sin saber lo que había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Un intervalo de unas tres horas" mantiene el sentido de duración aproximada del griego; la alternativa más literal sería "después de unas tres horas".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now ... after
  chosen_spanish: Entonces, después de
  alternatives_spanish:
  - Y sucedió que
  - Luego, después de
  - Entonces
  lexicon: BDAG
  rationale: La construcción introduce un nuevo episodio narrativo con un matiz de transición temporal. En español, "Entonces, después de" conserva el avance del relato sin forzar un calco arcaico como "y aconteció".
- source_word: ὡς ὡρῶν τριῶν διάστημα
  english_pob_choice: after an interval of about three hours
  chosen_spanish: un intervalo de unas tres horas
  alternatives_spanish:
  - aproximadamente tres horas después
  - tras un lapso de unas tres horas
  - después de unas tres horas
  lexicon: BDAG
  rationale: El griego expresa un lapso transcurrido con valor aproximado. "Un intervalo de unas tres horas" mantiene la idea de duración y la aproximación implícita en ὡς, con español natural y preciso.
- source_word: γυνὴ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: BDAG
  rationale: Aquí γυνή designa claramente a la esposa de Ananías. "Esposa" evita ambigüedad en español y refleja mejor la relación matrimonial que el contexto narra.
- source_word: μὴ εἰδυῖα
  english_pob_choice: not knowing
  chosen_spanish: sin saber
  alternatives_spanish:
  - no sabiendo
  - sin estar al tanto de
  lexicon: BDAG
  rationale: El participio describe el estado de ella al entrar. "Sin saber" transmite de forma natural la carencia de conocimiento simultánea a la acción, sin perder el valor aspectual del participio.
- source_word: τὸ γεγονὸς
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - lo ocurrido
  - el hecho sucedido
  - lo que había pasado
  lexicon: BDAG
  rationale: El participio perfecto sustantivado apunta al hecho ya ocurrido. "Lo que había sucedido" conserva la anterioridad y resulta idiomático en español; "sucedido" evita banalizar el tono narrativo de la escena.
- source_word: εἰσῆλθεν
  english_pob_choice: came in
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - pasó adentro
  lexicon: BDAG
  rationale: El verbo σημαίνει entrar. "Entró" es la equivalencia directa y más sobria en español; expresa el movimiento hacia el interior sin añadir matices innecesarios.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la traducción inglesa opta por una transición narrativa natural (''Now ... after'') y por una duración aproximada (''about three hours''). La propuesta española sigue esa misma línea de equivalencia óptima, sin depender mecánicamente del inglés y preservando la secuencia temporal y el estado de desconocimiento de la esposa al entrar.'
  spanish_consistency_notes:
  - Se usa "esposa" para γυνή en este contexto narrativo matrimonial.
  - Se evita "SEÑOR" u otros sustitutos porque no hay aquí referencia al nombre divino.
  - No se introduce una nota teológica porque el versículo es narrativo y no presenta una tensión doctrinal explícita.
