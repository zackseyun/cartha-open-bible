revisions:
- from: Después de este[a], Judas el Galileo se levantó en los días del censo y atrajo a gente tras de sí. Él también pereció[b], y todos los que eran persuadidos por él fueron dispersados.
  to: Después de esto[a], Judas el Galileo se levantó en los días del censo y atrajo a gente tras de sí[b]. Él también pereció, y todos los que se habían dejado persuadir por él fueron dispersados.
  rationale: Se corrige «Después de este» a «Después de esto» para reflejar mejor el valor temporal natural de μετὰ τοῦτον en español. Se mueve la nota [b] al verbo que realmente comenta, y se reemplaza «eran persuadidos por él» por «se habían dejado persuadir por él» para conservar la idea de πείθω sin producir un español rígido o poco idiomático. El resto del versículo puede mantenerse.
