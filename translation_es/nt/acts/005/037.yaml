translation:
  language: es
  text: Después de esto[a], Judas el Galileo se levantó en los días del censo y atrajo a gente tras de sí[b]. Él también pereció, y todos los que se habían dejado persuadir por él fueron dispersados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el tiempo del registro». El término griego puede referirse a un censo o a un registro oficial.
    reason: lexical_alternative
  - marker: b
    text: O «hizo que la gente se apartara y lo siguiera». El verbo puede llevar la idea de apartar a personas de su lealtad anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τοῦτον
  english_pob_choice: After this
  chosen_spanish: Después de este
  alternatives_spanish:
  - Después de él
  - Después de este hombre
  lexicon: BDAG
  rationale: El valor temporal de μετά con acusativo aquí señala sucesión en el relato. En español, «Después de este» conserva esa relación temporal sin forzar un antecedente personal explícito; «de este» deja la referencia discursiva abierta, como en el griego y en la audición inglesa.
- source_word: ἀνέστη
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - apareció
  - surgió
  lexicon: BDAG
  rationale: En este contexto histórico, ἀνίστημι describe la aparición de un líder o figura que surge en la escena, no lenguaje de resurrección. «Se levantó» es una forma natural y sobria en español que mantiene la vivacidad del giro sin añadir interpretación.
- source_word: Ἰούδας ὁ Γαλιλαῖος
  english_pob_choice: Judas the Galilean
  chosen_spanish: Judas el Galileo
  alternatives_spanish:
  - Judas de Galilea
  lexicon: BDAG
  rationale: Se conserva el nombre propio con el gentilicio/adjetivo apposicional. «El Galileo» sigue de cerca la forma griega y la decisión inglesa; «de Galilea» es posible, pero pierde un poco la construcción titulativa.
- source_word: ἐν ταῖς ἡμέραις τῆς ἀπογραφῆς
  english_pob_choice: in the days of the census
  chosen_spanish: en los días del censo
  alternatives_spanish:
  - durante el censo
  - en los días de la inscripción
  lexicon: BDAG
  rationale: ἀπογραφή puede abarcar censo o registro oficial. «Censo» es la opción más natural y breve en español, y mantiene la misma amplitud semántica general que la decisión inglesa; «inscripción» podría sonar más técnico y menos transparente.
- source_word: ἀπέστησε λαὸν ὀπίσω αὐτοῦ
  english_pob_choice: drew away people after him
  chosen_spanish: atrajo a gente tras de sí
  alternatives_spanish:
  - hizo que gente se apartara tras él
  - llevó a gente tras de sí
  - desvió a gente tras de sí
  lexicon: BDAG
  rationale: ἀφίστημι aquí expresa la idea de apartar o arrastrar personas tras uno. «Atrajo a gente tras de sí» conserva el movimiento de atracción/separación que la nota inglesa resalta, y «gente» refleja bien el λαός anartro colectivo sin convertirlo en «el pueblo».
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - personas
  - un pueblo
  - el pueblo
  lexicon: BDAG
  rationale: El singular anartro λαός funciona colectivamente. «Gente» suena natural en español y no sugiere que se trate de una entidad nacional completa; mantiene la indefinición colectiva del original.
- source_word: κἀκεῖνος
  english_pob_choice: He also
  chosen_spanish: Él también
  alternatives_spanish:
  - Y él también
  - Y aquel también
  lexicon: BDAG
  rationale: 'κἀκεῖνος añade continuidad enfática: «y aquel también». «Él también» transmite esa continuidad de manera fluida en español. Se prefirió una forma sobria para no cargar el versículo con un matiz demonstrativo excesivo.'
- source_word: ἀπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - fue destruido
  - se perdió
  - murió
  lexicon: BDAG
  rationale: El verbo aquí indica ruina, pérdida o muerte sin especificar el modo. «Pereció» preserva esa amplitud y evita concretar indebidamente si fue muerte violenta o simple fallecimiento.
- source_word: πάντες ὅσοι ἐπείθοντο αὐτῷ
  english_pob_choice: all who were persuaded by him
  chosen_spanish: todos los que eran persuadidos por él
  alternatives_spanish:
  - todos los que le seguían
  - todos los que lo obedecían
  - todos los que creían en él
  lexicon: BDAG
  rationale: El imperfecto pasivo de πείθω expresa personas que estaban siendo persuadidas o ganadas para su causa. «Eran persuadidos por él» conserva la voz y el aspecto del griego; «le seguían» sería más idiomático, pero diluiría la diferencia semántica respecto de la cláusula anterior.
- source_word: διεσκορπίσθησαν
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - fueron esparcidos
  - se dispersaron
  lexicon: BDAG
  rationale: El pasivo aoristo de διασκορπίζω significa ser dispersado/esparcido. «Fueron dispersados» mantiene el pasivo y la acción completada con suficiente naturalidad en español; «se dispersaron» podría sonar más medio/reflexivo que el griego.
theological_decisions:
- issue: Descripción histórica sin sobrerlectura política
  english_pob_reading: Rendered the verse as describing Judas as an insurgent leader who attracted followers, without importing evaluative theological language beyond the text.
  chosen_spanish_reading: Se describe a Judas como una figura histórica que atrajo seguidores, sin introducir un lenguaje de rebelión más fuerte que el que exige el texto.
  alternative_spanish_readings:
  - lideró una rebelión
  - encabezó una revuelta
  rationale: El griego afirma que se levantó y apartó gente tras de sí, pero no usa un sustantivo explícito para «rebelión». La traducción mantiene la sobriedad del relato y evita cargar el pasaje con una especificidad política no verbalizada aquí.
  doctrine_reference: 'Principio de fidelidad semántica: no ampliar la carga interpretativa más allá de lo que el texto fuente dice explícitamente.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa final y no requiere cambios detectados en la última pasada; se mantuvo la equivalencia óptima con atención a las notas léxicas sobre ἀπογραφή, ἀφίστημι, πείθω y διασκορπίζω.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera sistemática en el proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece aquí; no hay decisión terminológica que aplicar.
  - 'Se mantiene la voz pasiva donde el griego la tiene: «fueron dispersados».'
  - «Gente» y «personas» se evitaron en la línea principal cuando «gente» reflejaba mejor el colectivo anartro de λαός.
