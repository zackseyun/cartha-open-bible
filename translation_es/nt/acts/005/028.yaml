revisions:
- from: 'diciendo[a]: «Por una orden estricta les ordenamos que no enseñaran en este nombre, y miren, han llenado a Jerusalén con su enseñanza, y quieren traer sobre nosotros la sangre de este hombre».'
  to: 'diciendo[a]: «Les dimos una orden estricta de no enseñar en este nombre, y miren, han llenado Jerusalén con su enseñanza, y quieren traer sobre nosotros la sangre de este hombre»'
  rationale: La revisión corrige un calco poco natural del griego, mejora la fluidez idiomática en español y ajusta la nota al sentido exacto de la acusación, sin cambiar las decisiones semánticas y teológicas del POB.
