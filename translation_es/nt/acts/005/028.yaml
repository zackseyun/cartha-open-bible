translation:
  language: es
  text: 'diciendo[a]: «Les dimos una orden estricta de no enseñar en este nombre, y miren, han llenado Jerusalén con su enseñanza, y quieren traer sobre nosotros la sangre de este hombre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «hacernos responsables de la muerte de este hombre». El griego habla de traer «la sangre de este hombre» sobre ellos, un modismo de culpa por sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγγελίᾳ παρηγγείλαμεν
  english_pob_choice: We strictly ordered
  chosen_spanish: Por una orden estricta les ordenamos
  alternatives_spanish:
  - Les dimos una orden estricta
  - Les mandamos con toda severidad
  lexicon: BDAG
  rationale: La construcción dativo + verbo cognado intensifica la orden. En español, «por una orden estricta» conserva la fuerza enfática del original, y «les ordenamos» reproduce el acto de mandar sin volver la frase pesada o artificial.
- source_word: μὴ διδάσκειν
  english_pob_choice: not to teach
  chosen_spanish: que no enseñaran
  alternatives_spanish:
  - que no siguieran enseñando
  - que no estuvieran enseñando
  lexicon: BDAG
  rationale: 'El infinitivo de prohibición se expresa naturalmente en español como contenido de la orden: «que no enseñaran». Evita sobreinterpretar con «dejar de enseñar», que iría más allá del matiz básico del texto.'
- source_word: ἐπὶ τῷ ὀνόματι τούτῳ
  english_pob_choice: in this name
  chosen_spanish: en este nombre
  alternatives_spanish:
  - sobre este nombre
  - con autoridad de este nombre
  lexicon: BDAG
  rationale: En Hechos, hablar o enseñar «en el nombre» comunica la esfera o autoridad ligada a ese nombre. «En este nombre» es la forma más natural y fiel en español; «con autoridad de» explicita demasiado y rompe la concisión del griego.
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - vean
  - he aquí
  lexicon: BDAG
  rationale: «Miren» conserva el valor deíctico y el tono acusatorio en un español actual y reverente. «He aquí» sería más arcaico de lo necesario.
- source_word: πεπληρώκατε τὴν Ἰερουσαλὴμ
  english_pob_choice: you have filled Jerusalem
  chosen_spanish: han llenado a Jerusalén
  alternatives_spanish:
  - han saturado a Jerusalén
  - han llenado Jerusalén
  lexicon: BDAG
  rationale: El perfecto griego indica una acción completada con efecto presente. «Han llenado a Jerusalén» mantiene la metáfora sin añadir explicaciones. El objeto con «a» es idiomático en español por tratarse de una ciudad personificada en el discurso.
- source_word: τῆς διδαχῆς ὑμῶν
  english_pob_choice: with your teaching
  chosen_spanish: con su enseñanza
  alternatives_spanish:
  - con su doctrina
  - con lo que enseñan
  lexicon: BDAG
  rationale: «Enseñanza» traduce bien διδαχή sin cargar el verso con un término más técnico como «doctrina». El posesivo «su» sigue el referente plural de ὑμῶν y se adapta al español oratorio.
- source_word: βούλεσθε
  english_pob_choice: you intend
  chosen_spanish: quieren
  alternatives_spanish:
  - pretenden
  - tienen intención de
  lexicon: BDAG
  rationale: El verbo medio expresa volición. Aquí «quieren» comunica esa intención en un tono directo y acusatorio, manteniendo la naturalidad del habla citada. «Pretenden» sería posible, pero más interpretativo.
- source_word: ἐπαγαγεῖν ἐφ’ ἡμᾶς
  english_pob_choice: to bring upon us
  chosen_spanish: traer sobre nosotros
  alternatives_spanish:
  - hacer recaer sobre nosotros
  - poner sobre nosotros
  lexicon: BDAG
  rationale: La preposición con el verbo expresa traer algo sobre alguien, con sentido de imputación o carga. «Traer sobre nosotros» preserva la idiomaticidad del griego y deja abierto el matiz de culpa sin resolverlo en exceso.
- source_word: τὸ αἷμα τοῦ ἀνθρώπου τούτου
  english_pob_choice: this man's blood
  chosen_spanish: la sangre de este hombre
  alternatives_spanish:
  - la sangre de este hombre, es decir, su muerte
  - la culpa de la muerte de este hombre
  lexicon: BDAG
  rationale: «Sangre» reproduce el idiomático semitismo del texto. «De este hombre» conserva la distancia hostil del griego. En la nota se explicita el sentido de sangre culpable sin sustituirlo por una paráfrasis en el cuerpo principal.
- source_word: ἀνθρώπου
  english_pob_choice: man's
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: BDAG
  rationale: El griego es masculino singular y señala a un individuo concreto, Jesús. «Hombre» es la forma más directa y mantiene la referencia personal sin neutralizar el género ni diluir la identidad del acusado.
theological_decisions:
- issue: Idiom of bloodguilt in «la sangre de este hombre»
  english_pob_reading: Render as an accusation of assigning bloodguilt/responsibility for Jesus' death, without making the implication explicit in the main text.
  chosen_spanish_reading: Mantener la imagen de «la sangre de este hombre» en el texto principal y explicar en nota que el sentido es responsabilidad por su muerte.
  alternative_spanish_readings:
  - hacer recaer sobre nosotros la culpa de la muerte de este hombre
  - hacernos responsables de la muerte de este hombre
  rationale: El griego usa el modismo de traer sangre sobre alguien, un giro de culpabilidad por derramamiento de sangre. Para no resolver la tensión interpretativa dentro del versículo, se conserva la imagen bíblica y se documenta el sentido idiomático en una nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it beyond the source text.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y mantiene la decisión auditada del POB inglés: «in this name» como «en este nombre», el intensivo de la orden en «por una orden estricta», y el modismo de sangre culpable sin explicitarlo en el cuerpo principal. No se requieren revisiones adicionales respecto del contexto inglés auditado.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» como norma del proyecto solo cuando el texto lo exija; aquí no aparece.
  - Se conserva «enseñanza» para διδαχή, coherente con el POB inglés y más natural que «doctrina» en este contexto.
  - El posesivo plural de ὑμῶν se adapta a «su» por concordancia natural en español, manteniendo la referencia plural.
  - La nota a[ a ] se ancla en «diciendo» para reflejar el participio inicial sin sobrecargar la cita directa.
