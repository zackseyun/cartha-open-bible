review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: el informe de los oficiales, la prisión hallada cerrada y segura, los guardias en las puertas, y la ausencia de personas dentro al abrir. Sin embargo, «cerrada con toda seguridad» suena poco idiomático en español y no expresa con suficiente naturalidad el matiz de estado asegurado de κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ. Además, el anclaje de la nota en «diciendo[a]» no corresponde al término al que explica la nota léxica.'
  spanish_quality_summary: El español es claro y mayormente natural, pero la locución «cerrada con toda seguridad» resulta algo forzada y ambigua, porque en español puede oírse como adverbio epistémico («seguramente»), no como descripción de seguridad física. «Bien asegurada» o «cerrada de forma segura» comunica mejor el sentido. También conviene mover la nota al sintagma relevante. El resto —«a los guardias de pie a las puertas», «al abrirla», «no hallamos a nadie dentro»— es legible y fiel.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Prisión» para δεσμωτήριον y «guardias» para φύλακες son adecuados. No intervienen términos del glosario teológico mayor. La revisión propuesta solo mejora la naturalidad y la colocación de la nota léxica.
  issues:
  - severity: medium
    issue: La frase «cerrada con toda seguridad» es poco idiomática en español.
    rationale: Aunque intenta reflejar ἐν πάσῃ ἀσφαλείᾳ, en español moderno suena rígida y puede interpretarse como comentario de certeza, no como seguridad física del encierro. «Bien asegurada» preserva mejor el énfasis griego de una prisión plenamente asegurada.
  - severity: medium
    issue: La nota [a] está anclada en «diciendo» pero explica la expresión sobre la seguridad de la prisión.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí la alternativa léxica corresponde al segmento que traduce κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ, no al verbo introductorio λέγοντες.
  revised_spanish_text: 'diciendo: «Encontramos la prisión bien asegurada[a], y a los guardias de pie a las puertas; pero, al abrirla, no hallamos a nadie dentro».'
  revised_footnotes:
  - marker: a
    text: O «cerrada con completa seguridad». El griego enfatiza que la prisión fue hallada plenamente asegurada.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «cerrada con toda seguridad» por «bien asegurada» para expresar de manera más natural y precisa el sentido de κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ en español contemporáneo. También se mueve la nota al segmento correcto, ya que la alternativa léxica explica el estado seguro de la prisión, no «diciendo».
