translation:
  language: es
  text: 'diciendo: «Encontramos la prisión bien asegurada[a], y a los guardias de pie a las puertas; pero, al abrirla, no hallamos a nadie dentro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerrada con completa seguridad». El griego enfatiza que la prisión fue hallada plenamente asegurada.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμωτήριον
  english_pob_choice: prison
  chosen_spanish: prisión
  alternatives_spanish:
  - cárcel
  - presidio
  lexicon: BDAG
  rationale: En este contexto narrativo, δεσμωτήριον designa el lugar de detención. «Prisión» es la equivalencia más natural y neutra en español contemporáneo, sin perder el valor de confinamiento institucional.
- source_word: κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ
  english_pob_choice: securely locked
  chosen_spanish: cerrada con toda seguridad
  alternatives_spanish:
  - cerrada con total seguridad
  - asegurada por completo
  - cerrada de manera totalmente segura
  lexicon: BDAG
  rationale: La expresión griega combina el estado resultante («cerrado») con énfasis en la seguridad. «Cerrada con toda seguridad» conserva esa intensificación sin forzar un calco poco natural como «con completa seguridad».
- source_word: φύλακας ἑστῶτας
  english_pob_choice: the guards standing
  chosen_spanish: a los guardias de pie
  alternatives_spanish:
  - a los guardias parados
  - a los guardias en pie
  - a los guardias apostados
  lexicon: BDAG
  rationale: φύλακας ἑστῶτας describe a los custodios en posición de pie. «De pie» mantiene la imagen física explícita; no se optó por «apostados» porque añade una interpretación más formal que el griego no exige aquí.
- source_word: ἐπὶ τῶν θυρῶν
  english_pob_choice: at the doors
  chosen_spanish: a las puertas
  alternatives_spanish:
  - junto a las puertas
  - ante las puertas
  - en las puertas
  lexicon: BDAG
  rationale: Con ἐπί + genitivo, la idea es de ubicación en relación con las puertas. «A las puertas» es idiomático en español y conserva la proximidad espacial de los guardias.
- source_word: ἀνοίξαντες
  english_pob_choice: when we opened it
  chosen_spanish: al abrirla
  alternatives_spanish:
  - cuando la abrimos
  - después de abrirla
  - abierta
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente. El objeto singular se expresa con «la», en concordancia con «la prisión», siguiendo la revisión del POB inglés que precisó el referente singular.
- source_word: ἔσω
  english_pob_choice: inside
  chosen_spanish: dentro
  alternatives_spanish:
  - adentro
  - en el interior
  lexicon: BDAG
  rationale: ἔσω funciona adverbialmente indicando el interior del lugar. «Dentro» es la opción más directa y natural en español.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - nadie
  - ninguna persona
  - a ninguna persona
  lexicon: BDAG
  rationale: Como objeto directo de «hallar», «a nadie» suena más natural en español que un simple «nadie» en esta cláusula negativa.
- source_word: λέγοντες ὅτι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - informando
  - reportando
  - diciendo que
  lexicon: BDAG
  rationale: La construcción participial introduce el contenido del informe. «Diciendo» conserva la conexión narrativa con el discurso directo; se omitió «que» para mantener fluidez en español con comillas.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó el referente singular en «opened it» para concordar con «the prison». En español, ese ajuste se reflejó con «al abrirla», manteniendo el antecedente singular «la prisión» y evitando un plural implícito.
  spanish_consistency_notes:
  - Se preservó «prisión» en lugar de «cárcel» para seguir la elección léxica del POB inglés y el tono narrativo formal.
  - Se evitó «SEÑOR» u otras terminologías no presentes; no hay vocabulario teológico específico en este versículo.
  - Se mantuvo la imagen concreta de los guardias «de pie» para no sustituirla por una interpretación más técnica como «apostados».
  - La puntuación con comillas angulares y dos puntos respeta el estilo publicable en español y la introducción de discurso directo.
