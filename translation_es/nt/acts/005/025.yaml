  text: παραγενόμενος δέ τις ἀπήγγειλεν αὐτοῖς ὅτι Ἰδοὺ οἱ ἄνδρες οὓς ἔθεσθε ἐν τῇ φυλακῇ εἰσὶν ἐν τῷ ἱερῷ ἑστῶτες καὶ διδάσκοντες τὸν λαόν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/005/025.yaml
  text: But someone came and reported to them[a], “Look, the men whom you put in prison are standing in the temple and teaching the people.”
  footnotes:
