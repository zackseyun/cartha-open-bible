translation:
  language: es
  text: 'Pero alguien llegó y les informó: “¡Miren! Los hombres que ustedes pusieron en la prisión están de pie en el templo[a] y enseñando al pueblo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en el recinto del templo”; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se presentó
  - arribó
  lexicon: BDAG
  rationale: El participio aoristo introduce la llegada del mensajero antes del verbo principal. “Llegó” suena natural en español moderno y conserva la secuencia narrativa sin añadir contenido extra.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro suave en la narración tras la escena previa. “Pero” reproduce bien ese cambio de desarrollo.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - un hombre
  - uno
  lexicon: BDAG
  rationale: Sujeto indefinido sin necesidad de precisar género o identidad. “Alguien” es idiomático y suficientemente indefinido.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: informó
  alternatives_spanish:
  - anunció
  - dijo
  - notificó
  lexicon: BDAG
  rationale: En contexto judicial/oficial, ἀπαγγέλλω implica transmitir un informe. “Informó” conserva un registro formal sin sonar tan técnico como “notificó”.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren ustedes!
  - ¡Vean!
  - ¡He aquí!
  lexicon: BDAG
  rationale: Partícula deíctica que llama la atención sobre una noticia sorprendente. “¡Miren!” mantiene la vivacidad y evita el arcaísmo de “He aquí”.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - esos hombres
  lexicon: BDAG
  rationale: Referencia a los apóstoles previamente encarcelados. “Los hombres” es la traducción directa y natural de ἄνδρες en este contexto.
- source_word: οὓς ἔθεσθε
  english_pob_choice: whom you put
  chosen_spanish: que ustedes pusieron
  alternatives_spanish:
  - a quienes ustedes pusieron
  - que ustedes colocaron
  - a quienes ustedes colocaron
  lexicon: BDAG
  rationale: τίθημι aquí conserva la idea básica de poner/colocar. En español, “pusieron” refleja bien la acusación directa y la estructura relativa resulta más natural que un relativo con preposición obligatoria.
- source_word: ἐν τῇ φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en la prisión
  alternatives_spanish:
  - en prisión
  - en la cárcel
  lexicon: BDAG
  rationale: El artículo griego sugiere un lugar concreto de confinamiento. “La prisión” preserva esa especificidad; se mantiene el matiz institucional más que el uso idiomático sin artículo.
- source_word: εἰσὶν
  english_pob_choice: are
  chosen_spanish: están
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: Copulativo en presente. “Están” comunica la situación actual y enlaza bien con el participio siguiente.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el complejo del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el santuario interior. “En el templo” es la forma más natural; la precisión espacial queda explicada en nota.
- source_word: ἑστῶτες
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - parados
  - en pie
  lexicon: BDAG
  rationale: 'Participio perfecto con fuerza presente: indica una postura actual. “De pie” suena natural en español y conserva la imagen visual de permanencia.'
- source_word: καὶ διδάσκοντες
  english_pob_choice: and teaching
  chosen_spanish: y enseñando
  alternatives_spanish:
  - e instruyendo
  lexicon: BDAG
  rationale: El participio coordinado describe actividad continua. “Enseñando” es el equivalente normal de διδάσκω y preserva el sentido didáctico del texto.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: BDAG
  rationale: En Hechos, λαός suele referirse al pueblo en sentido colectivo y, a menudo, con carga comunitaria/covenantal. “Al pueblo” mantiene esa referencia pública y bíblica sin sobreexplicarla.
theological_decisions:
- issue: Alcance de ἱερόν
  english_pob_reading: '''temple'' with a footnote noting ''temple courts'' as lexical alternative'
  chosen_spanish_reading: '''templo'' con nota que aclara el complejo o recinto del templo'
  alternative_spanish_readings:
  - recinto del templo
  - atrios del templo
  - complejo del templo
  rationale: El griego ἱερόν nombra el conjunto del templo, no específicamente el santuario interior. El texto principal puede decir 'templo' por naturalidad, pero la nota preserva la precisión lexical sin desplazar la lectura pública.
  doctrine_reference: Precisión lexical del término del templo en el relato histórico de Hechos.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó solo la naturalidad de 'in the prison' a 'in prison' sin cambiar el sentido. En español, 'en la prisión' conserva la especificidad del artículo griego y sigue siendo natural; no requiere un ajuste equivalente. Se mantuvo el valor descriptivo de la escena y la sucesión narrativa del participio aoristo + verbo principal.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'pueblo' para λαός, conforme al uso frecuente de Hechos y para conservar el tono comunitario del pasaje.
  - Se tradujo δοῦλος no aplica aquí; no hubo decisión al respecto.
  - Se evitó 'Cristo'/'Mesías' porque no aparece en el versículo.
  - La puntuación y el estilo buscan una lectura pública clara, manteniendo la relación entre llegada, informe y contenido citado.
