  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave aquí (“templo”, “pueblo”) están bien resueltos. La explicación de ἱερόν como complejo/recinto del templo es correcta, pero debe anclarse a “templo”. La nota adicional sobre λαός no está exigida por la evidencia ni por el rastro de auditoría inglés.
