review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura general: δέ como giro adversativo («Pero»), ἀκούσαντες como temporal («al oír esto»), ἐβούλοντο ἀνελεῖν αὐτούς como intención de matarlos («querían matarlos»). Sin embargo, el punto principal διεπρίοντο no sigue ya la decisión auditada del POB inglés tras la revisión, que volvió a una formulación más cercana al griego: «were cut to the heart». El español «se enfurecieron» transmite bien la hostilidad contextual, pero reduce la imaginería léxica de “ser cortados/atravesados” que el inglés final decidió conservar y que además está respaldada por la nota.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse con una formulación que conserve la fuerza idiomática sin perder legibilidad. «Se les partió el corazón» sería engañoso por sugerir tristeza; «fueron cortados en el corazón» suena torpe. «Se sintieron heridos hasta el corazón» es demasiado suave. Una opción más fiel y legible en registro bíblico moderno es «se sintieron traspasados hasta el corazón», junto con la continuación «y querían matarlos», que deja claro el sentido hostil por el contexto inmediato.
  glossary_alignment: 'No hay términos de glosario mayor comprometidos en este versículo. La única desviación relevante es léxico-semántica: διεπρίοντο debe reflejar mejor la imaginería de corte/traspaso preservada en la revisión inglesa, no solo el resultado emocional «se enfurecieron».'
  issues:
  - severity: medium
    issue: «se enfurecieron» para διεπρίοντο pierde la imagen léxica principal del verbo
    rationale: Aunque comunica el efecto hostil, no preserva la decisión auditada final del POB inglés («were cut to the heart») ni la nota sobre el matiz más literal de ser “cortados”. El español debería retener esa metáfora en una forma natural.
  - severity: low
    issue: La nota al pie queda algo desconectada del texto principal actual
    rationale: El texto principal usa «se enfurecieron», pero la nota explica alternativas literales de corte. Si el texto principal se acerca más a «traspasados hasta el corazón», la relación entre texto y nota queda mejor integrada.
  revised_spanish_text: Pero al oír esto[a], se sintieron traspasados hasta el corazón y querían matarlos.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «fueron cortados» o «cortados hasta lo vivo», expresión de una agitación hostil intensa.
    reason: lexical_alternative
