translation:
  language: es
  text: Pero al oír esto[a], se sintieron traspasados hasta el corazón y querían matarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «fueron cortados» o «cortados hasta lo vivo», expresión de una agitación hostil intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo con fuerza adversativa leve; en español, «Pero» marca bien la reacción del consejo frente al discurso anterior sin añadir información.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - cuando oyeron esto
  - al escuchar esto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente; «al oír esto» es natural en español y permite suplir el objeto implícito del contexto.
- source_word: διεπρίοντο
  english_pob_choice: were cut to the heart
  chosen_spanish: se enfurecieron
  alternatives_spanish:
  - se irritaron profundamente
  - fueron atravesados por un dolor agudo
  - quedaron cortados por dentro
  lexicon: BDAG
  rationale: El verbo sugiere una agitación emocional intensa. En este contexto de hostilidad, la fuerza idiomática se comunica con «se enfurecieron»; se evita una versión literal que en español podría sonar a convicción interior más que a furia.
- source_word: ἐβούλοντο
  english_pob_choice: wanted
  chosen_spanish: querían
  alternatives_spanish:
  - deseaban
  - pretendían
  - estaban determinados a
  lexicon: BDAG
  rationale: El imperfecto expresa volición continua o intención en curso; «querían» es claro, natural y suficiente para el matiz del pasaje.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matarlos
  alternatives_spanish:
  - darles muerte
  - hacerlos morir
  - quitarlos de en medio
  lexicon: BDAG
  rationale: ἀναιρέω aquí denota quitar la vida. «Matarlos» es directo y fiel al sentido, sin eufemismo ni exceso de formalidad.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: BDAG
  rationale: El pronombre se refiere a los apóstoles; en español el objeto directo exige «los» ante el infinitivo enclítico «matarlos».
translation_notes:
  revision_awareness: 'El texto español sigue la lectura revisada del audit trail inglés, que prefirió una expresión más cercana a διεπρίοντο aunque con naturalidad idiomática. Aquí se conservó el mismo equilibrio: una traducción comunicativa que no pierde la imagen de agitación intensa del verbo griego.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» y «Mesías» como normas del proyecto, aunque este versículo no contiene esos términos.
  - Se usa un tono sobrio y bíblico contemporáneo, evitando calcos como «cortados al corazón» que en español podrían sugerir arrepentimiento en vez de hostilidad.
  - La nota textual/lexical se ancla en el verbo principal para preservar la tensión semántica del original.
