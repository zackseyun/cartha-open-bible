translation:
  language: es
  text: Entonces ella cayó inmediatamente a sus pies y expiró[a]. Cuando entraron los jóvenes, la encontraron muerta[b], y la sacaron y la sepultaron junto a su marido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'exhaló su último aliento' o 'dio su último suspiro'; el griego puede reflejar ese matiz para 'murió'.
    reason: lexical_alternative
  - marker: b
    text: O 'con su marido'; el griego puede expresar una relación espacial respecto del lugar de sepultura de su marido.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: Expresa la idea de ocurrir sin demora y mantiene la rapidez repentina del juicio narrado.
- source_word: πρὸς τοὺς πόδας αὐτοῦ
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - ante sus pies
  - junto a sus pies
  lexicon: BDAG
  rationale: En español, la construcción natural para esta imagen es 'a sus pies'; conserva el valor espacial sin volverse rígida.
- source_word: ἐξέψυξεν
  english_pob_choice: breathed her last
  chosen_spanish: expiró
  alternatives_spanish:
  - respiró por última vez
  - murió
  lexicon: BDAG
  rationale: '''Expiró'' reproduce con mayor cercanía la fuerza literal de ''exhalar el aliento'' y conserva el matiz más formal que la revisión inglesa decidió destacar, sin añadir explicación interpretativa.'
- source_word: οἱ νεανίσκοι
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes hombres
  lexicon: BDAG
  rationale: '''Jóvenes'' es la opción más natural y amplia en español; evita una especificación innecesaria que podría sonar extraña en este contexto narrativo.'
- source_word: νεκράν
  english_pob_choice: dead
  chosen_spanish: muerta
  alternatives_spanish:
  - sin vida
  - cadáver
  lexicon: BDAG
  rationale: Como adjetivo predicativo, 'muerta' corresponde directamente a la condición en que la hallaron y preserva la sencillez del griego.
- source_word: ἐξενέγκαντες
  english_pob_choice: carried her out
  chosen_spanish: la sacaron
  alternatives_spanish:
  - la llevaron fuera
  - la retiraron
  lexicon: BDAG
  rationale: En este contexto de entierro, 'la sacaron' comunica de modo natural la acción de retirar el cuerpo del lugar antes del sepulcro.
- source_word: ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: la sepultaron
  alternatives_spanish:
  - la enterraron
  - la inhumaron
  lexicon: BDAG
  rationale: '''Sepultaron'' es claro, digno y fiel al acto funerario; conserva el registro más formal del pasaje sin perder intelligibilidad.'
- source_word: πρὸς τὸν ἄνδρα αὐτῆς
  english_pob_choice: beside her husband
  chosen_spanish: junto a su marido
  alternatives_spanish:
  - al lado de su marido
  - con su marido
  lexicon: BDAG
  rationale: La preposición en contexto funerario admite una relación espacial con el lugar del entierro; 'junto a su marido' deja abierta esa relación sin forzar una paráfrasis explicativa. 'Marido' refleja adecuadamente la relación conyugal.
theological_decisions:
- issue: Sentido de ἐξέψυξεν y posible causalidad divina
  english_pob_reading: Render as straightforward physical death without adding interpretive explanation about divine causation in the translation itself.
  chosen_spanish_reading: Traducirlo de forma directa como 'expiró', sin añadir una explicación explícita de juicio divino en el texto.
  alternative_spanish_readings:
  - '''murió'''
  - '''falleció'''
  - '''expiró por juicio divino'''
  rationale: El contexto narrativo sugiere juicio, pero el verbo por sí mismo solo narra la muerte. Mantener una traducción sobria evita resolver la tensión teológica dentro del versículo.
  doctrine_reference: 'Translation philosophy: preserve the narrative claim without importing interpretive theology beyond the source wording.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'died' a 'breathed her last' para reflejar más de cerca ἐξέψυξεν. En español se siguió esa misma intención revisional con 'expiró', que conserva el matiz verbal de expiración y resulta natural en un registro bíblico formal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Los jóvenes'' conserva el referente de οἱ νεανίσκοι sin introducir una edad más precisa de la que ofrece el griego.'
  - '''Junto a su marido'' preserva la ambigüedad espacial del griego y no la resuelve del todo como ''con su marido''.'
