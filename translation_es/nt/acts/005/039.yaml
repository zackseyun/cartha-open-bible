translation:
  language: es
  text: Pero si es de Dios, no podrán derribarlos[a]. Tal vez incluso sean hallados luchando contra Dios[b]. Así fueron persuadidos por él[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'destruirlos' o 'hacerlos caer'.
    reason: lexical_alternative
  - marker: b
    text: O 'oponentes de Dios'; literalmente, 'combatientes contra Dios'.
    reason: lexical_alternative
  - marker: c
    text: El pronombre 'los' se entiende más naturalmente de los apóstoles, aunque algunos lo aplican de manera más amplia a su movimiento o su obra.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: En este contexto, la construcción expresa origen o fuente. Como el texto griego habla de una procedencia divina, y el proyecto español distingue Yahvé para el nombre divino, 'de Yahvé' comunica ese origen con claridad y mantiene la referencia teológica sin sustituirla por una máscara impersonal.
- source_word: δυνήσεσθε
  english_pob_choice: you will be able
  chosen_spanish: no podrán
  alternatives_spanish:
  - no serán capaces de
  - no podrán ustedes
  lexicon: BDAG
  rationale: El futuro de δύναμαι expresa capacidad futura. 'No podrán' es natural en español y conserva el valor de posibilidad/capacidad futura que tiene el original.
- source_word: καταλῦσαι
  english_pob_choice: to overthrow
  chosen_spanish: derribarlos
  alternatives_spanish:
  - destruirlos
  - derrocarlos
  - anularlos
  lexicon: BDAG
  rationale: La POB inglesa opta por 'overthrow' para el sentido de deshacer o hacer caer una obra/movimiento. En español, 'derribar' mantiene la imagen de hacer caer algo establecido y evita endurecer el sentido a una destrucción absoluta que el contexto no exige.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: El pronombre masculino plural apunta más naturalmente a las personas implicadas, es decir, los apóstoles, y no de manera abstracta solo a la obra. En español, 'los' preserva el objeto personal y la referencia plural.
- source_word: μήποτε
  english_pob_choice: You may even
  chosen_spanish: Tal vez incluso
  alternatives_spanish:
  - no sea que
  - quizá incluso
  lexicon: BDAG
  rationale: μήποτε introduce una advertencia sobre un resultado indeseable. 'Tal vez incluso' conserva la posibilidad advertida y su tono cauteloso sin forzar una construcción demasiado arcaica en español.
- source_word: θεομάχοι
  english_pob_choice: fighting against God
  chosen_spanish: luchando contra Dios
  alternatives_spanish:
  - oponeros de Dios
  - peleando contra Dios
  lexicon: BDAG
  rationale: El término es literalmente 'combatientes contra Dios'. 'Luchando contra Dios' reproduce la fuerza verbal y la seriedad teológica de forma natural en español.
- source_word: εὑρεθῆτε
  english_pob_choice: be found to be
  chosen_spanish: sean hallados
  alternatives_spanish:
  - se descubra que son
  - resulten ser
  lexicon: BDAG
  rationale: El pasivo de εὑρίσκω comunica ser descubierto o resultar en cierto estado. 'Sean hallados' mantiene ese matiz y encaja bien con la advertencia precedente.
- source_word: ἐπείσθησαν δὲ αὐτῷ
  english_pob_choice: So they were persuaded by him
  chosen_spanish: Así fueron persuadidos por él
  alternatives_spanish:
  - Y quedaron persuadidos por él
  - Así le hicieron caso
  lexicon: BDAG
  rationale: El pasivo de πείθω indica que aceptaron el consejo de Gamaliel. 'Fueron persuadidos' conserva la pasiva y la aceptación del consejo; 'Así' expresa de modo natural el valor inferencial de δέ en este contexto.
theological_decisions:
- issue: Referent of αὐτούς in the warning about what cannot be overthrown
  english_pob_reading: The pronoun refers to the apostles/the men before the council, not merely to the plan or movement in the abstract.
  chosen_spanish_reading: El pronombre se entiende como referencia directa a los apóstoles / a los hombres ante el concilio, no solo al plan o movimiento en abstracto.
  alternative_spanish_readings:
  - El pronombre podría referirse al plan o a la obra mencionados antes.
  - El pronombre podría abarcar más ampliamente el movimiento o la causa.
  rationale: El plural masculino de αὐτούς favorece una referencia personal. Mantener esa referencia evita borrar la tensión textual que deja abierta la aplicación del dicho sin convertirlo en una promesa general sobre todo movimiento religioso.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas para que cada marcador aparezca exactamente en el texto español y corresponda a una sola nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para ἐκ θεοῦ en coherencia con el estándar del proyecto cuando la referencia es al origen divino.
  - Se mantuvo la distinción entre un referente personal plural ('los') y la posible referencia más amplia al movimiento en la nota.
  - Se evitó 'Cristo/Mesías' porque no aparece en este versículo.
  - Se preservó el pasivo ('fueron persuadidos') para reflejar πείθω sin añadir un sujeto distinto.
