translation:
  language: es
  text: 'Pero Pedro le dijo: «¿Por qué se pusieron de acuerdo[a] para poner a prueba al Espíritu del Señor? Mira, los pies de los que enterraron a tu esposo están a la puerta, y te sacarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conspiraron para poner a prueba».
    reason: alternative_reading
lexical_decisions:
- source_word: συνεφωνήθη
  english_pob_choice: did you agree together
  chosen_spanish: se pusieron de acuerdo
  alternatives_spanish:
  - conspiraron
  - acordaron entre ustedes
  lexicon: BDAG συμφωνέω
  rationale: El verbo expresa acuerdo mutuo; el pasivo idiomático con ὑμῖν apunta a una acción entre varios, no a un simple consentimiento individual. «Se pusieron de acuerdo» conserva la idea de colusión sin imponer un matiz más fuerte que el griego no exige lexicalmente.
- source_word: πειράσαι
  english_pob_choice: to test
  chosen_spanish: poner a prueba
  alternatives_spanish:
  - tentar
  - probar
  lexicon: BDAG πειράζω
  rationale: En este contexto, el objeto es el Espíritu del Señor, por lo que «poner a prueba» reproduce la fuerza de evaluación/desafío y evita el falso sentido de «tentar» en español religioso.
- source_word: τὸ πνεῦμα κυρίου
  english_pob_choice: the Spirit of the Lord
  chosen_spanish: el Espíritu del Señor
  alternatives_spanish:
  - el Espíritu de Yahvé
  - el espíritu del Señor
  lexicon: BDAG πνεῦμα + κύριος
  rationale: La construcción genitiva se traduce de forma natural como «el Espíritu del Señor». En este pasaje, la referencia probable es al Espíritu Santo, pero el español conserva la misma formulación sin expandirla interpretativamente.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG κύριος
  rationale: Se mantiene el valor estándar de κύριος como «Señor», coherente con el uso bíblico y con el referente divino implicado por el contexto.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: BDAG ἰδού
  rationale: Es un marcador discursivo de atención. «Mira» suena natural en español y conserva la inmediatez sin el tono arcaico de «he aquí» o «he aquí que».
- source_word: οἱ πόδες
  english_pob_choice: the feet
  chosen_spanish: los pies
  alternatives_spanish:
  - las pisadas
  - los pasos
  lexicon: BDAG πούς
  rationale: Se conserva la imagen literal del griego. Aunque en español pudiera decirse «los que vienen» o «las pisadas», el texto enfatiza la presencia visible y cercana con una imagen concreta.
- source_word: τῶν θαψάντων
  english_pob_choice: of those who buried
  chosen_spanish: de los que enterraron
  alternatives_spanish:
  - de quienes sepultaron
  - de los que dieron sepultura a
  lexicon: BDAG θάπτω
  rationale: «Enterrar» es el equivalente más directo y natural en español. «Sepultar» también sería posible, pero «enterrar» mantiene la transparencia del acto descrito y la cercanía idiomática del pasaje.
- source_word: τὸν ἄνδρα σου
  english_pob_choice: your husband
  chosen_spanish: tu esposo
  alternatives_spanish:
  - tu marido
  - tu hombre
  lexicon: BDAG ἀνήρ
  rationale: Aquí ἀνήρ se refiere claramente a Ananías como cónyuge de Safira. «Esposo» es amplio y digno en español; «marido» sería también posible, pero «esposo» suena más neutral y literario.
- source_word: ἐπὶ τῇ θύρᾳ
  english_pob_choice: at the door
  chosen_spanish: a la puerta
  alternatives_spanish:
  - junto a la puerta
  - en la puerta
  lexicon: BDAG θύρα + ἐπί
  rationale: La preposición indica proximidad inmediata al acceso. «A la puerta» es una solución natural en español que comunica la ubicación sin recargar el giro.
- source_word: ἐξοίσουσίν σε
  english_pob_choice: they will carry you out
  chosen_spanish: te sacarán
  alternatives_spanish:
  - te llevarán afuera
  - te cargarán y te sacarán
  lexicon: BDAG ἐκφέρω
  rationale: El verbo significa sacar o llevar fuera. En español, «te sacarán» preserva la concisión y la fuerza ominosa del anuncio, sin añadir explícitamente «tu cuerpo», que el griego no nombra.
theological_decisions:
- issue: Referente de «el Espíritu del Señor»
  english_pob_reading: A reference to the Holy Spirit in relation to the Lord, rendered without interpretive expansion.
  chosen_spanish_reading: Una referencia al Espíritu Santo en relación con el Señor, sin ampliar la expresión en la traducción.
  alternative_spanish_readings:
  - una referencia al espíritu del Señor como presencia divina general
  - una expansión explícita a «el Espíritu Santo» en el texto principal
  rationale: El contexto de Hechos 5:3–9 favorece la referencia al Espíritu Santo, pero el texto griego dice «el Espíritu del Señor». La versión española mantiene esa formulación para no adelantar una glosa interpretativa, dejando la identificación teológica implícita pero clara.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Fuerza de la acusación de Pedro
  english_pob_reading: Mutual agreement to test God/the Lord's Spirit is expressed as 'agree together' rather than the more interpretive 'conspire.'
  chosen_spanish_reading: La acusación se expresa como acuerdo mutuo para poner a prueba al Espíritu del Señor, sin traducir el verbo con un juicio más fuerte que el que exige el griego.
  alternative_spanish_readings:
  - conspiraron para poner a prueba
  - tramaron poner a prueba
  rationale: El contexto es severo, pero συμφωνέω significa acordar o ponerse de acuerdo. La traducción conserva la gravedad por el contexto narrativo y no por una intensificación léxica no documentada.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'El contexto auditado muestra acuerdo alto y sin cambios recientes; la redacción española sigue la decisión inglesa establecida, manteniendo la equivalencia óptima y las mismas tensiones léxicas: συμφωνέω como acuerdo mutuo, πειράζω como prueba, πνεῦμα κυρίου como Espíritu del Señor, y ἐκφέρω con un verbo breve y ominoso.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar del proyecto.
  - Se usa «Espíritu» con mayúscula por referencia divina contextual.
  - Se prefiere «esposo» para ἄνδρα por claridad contextual en español.
  - «Te sacarán» conserva la concisión del griego y permite la nota alternativa.
  - No se introduce «Cristo» ni «Yahvé» porque el versículo no lo exige directamente.
