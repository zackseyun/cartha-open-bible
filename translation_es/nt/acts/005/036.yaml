revisions:
- from: Porque antes de estos días se levantó Teudas[a], diciendo ser alguien, y se le unió un número de hombres, como de cuatrocientos. Él fue matado[c][b], y todos los que habían sido persuadidos por él fueron dispersados y llegaron a nada.
  to: Porque antes de estos días se levantó Teudas[a], afirmando ser alguien, y se le unió un número de hombres, como cuatrocientos. Lo mataron[c][b], y todos los que habían sido persuadidos por él se dispersaron y quedaron en nada.
  rationale: 'La revisión mantiene todas las decisiones semánticas principales del griego y de la auditoría inglesa, pero sustituye varios calcos poco naturales por español más claro y digno: «afirmando ser alguien», «como cuatrocientos», «lo mataron», «se dispersaron» y «quedaron en nada». No se introducen cambios teológicos ni interpretativos; solo se mejora la idiomaticidad y legibilidad.'
