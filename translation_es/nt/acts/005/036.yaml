translation:
  language: es
  text: Porque antes de estos días se levantó Teudas[a], afirmando ser alguien, y se le unió un número de hombres, como cuatrocientos. Lo mataron[c][b], y todos los que habían sido persuadidos por él se dispersaron y quedaron en nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afirmando ser alguien importante». El giro griego expresa que se presentó como una persona de importancia.
    reason: lexical_alternative
  - marker: b
    text: O «se le adhirieron» o «se agruparon con él».
    reason: lexical_alternative
  - marker: c
    text: O «todos los que lo seguían». Más literalmente, «todos los que habían sido persuadidos por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ γὰρ τούτων τῶν ἡμερῶν
  english_pob_choice: For before these days
  chosen_spanish: Porque antes de estos días
  alternatives_spanish:
  - Antes de estos días
  - Porque antes de estos tiempos
  lexicon: BDAG
  rationale: πρό con genitivo indica anterioridad temporal; γάρ conserva el valor explicativo de la argumentación de Gamaliel como «Porque». «Estos días» refleja naturalmente el demostrativo sin añadir interpretación.
- source_word: ἀνέστη
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - surgió
  - se alzó
  lexicon: BDAG
  rationale: Aquí ἀνίστημι señala la aparición o irrupción de una figura o movimiento, no resurrección literal. «Se levantó» es una equivalencia natural en español que conserva el tono idiomático de inicio de liderazgo.
- source_word: Θευδᾶς
  english_pob_choice: Theudas
  chosen_spanish: Teudas
  alternatives_spanish:
  - Theudas
  lexicon: Convención transliterada
  rationale: Nombre propio transliterado al uso habitual en español bíblico. «Teudas» mantiene la identificación histórica y la pronunciación esperable en español.
- source_word: λέγων εἶναί τινα ἑαυτόν
  english_pob_choice: claiming to be somebody
  chosen_spanish: diciendo ser alguien
  alternatives_spanish:
  - afirmando ser alguien
  - diciendo ser una persona importante
  lexicon: BDAG
  rationale: La expresión es idiomática y marca autoafirmación de importancia. «Diciendo ser alguien» conserva la fuerza del giro sin convertirlo en explicación interpretativa. La alternativa más explícita queda implícita en nota.
- source_word: ᾧ προσεκλίθη
  english_pob_choice: joined him
  chosen_spanish: se le unió
  alternatives_spanish:
  - se adhirió a él
  - se sumó a él
  lexicon: BDAG
  rationale: El pasivo de προσκλίνομαι expresa alineación o adhesión a un líder. «Se le unió» es natural en español y conserva la idea de unirse a su causa sin sobreespecificar.
- source_word: ἀνδρῶν ἀριθμὸς ὡς τετρακοσίων
  english_pob_choice: a number of men, about four hundred
  chosen_spanish: un número de hombres, como de cuatrocientos
  alternatives_spanish:
  - unos cuatrocientos hombres
  - un grupo de unos cuatrocientos hombres
  lexicon: BDAG
  rationale: ἀριθμός con genitivo funciona como «un número de»; ὡς marca aproximación. Se conserva «hombres» para reflejar ἀνδρῶν y «como de» para mantener el matiz aproximativo sin endurecerlo.
- source_word: ὃς ἀνῃρέθη
  english_pob_choice: He was killed
  chosen_spanish: Él fue matado
  alternatives_spanish:
  - fue asesinado
  - fue muerto
  lexicon: BDAG
  rationale: ἀναιρέω aquí significa matar o hacer desaparecer. «Fue matado» preserva la pasiva y la crudeza del acto, aunque suene menos idiomático que otras opciones; se evita suavizarlo con una versión más interpretativa.
- source_word: πάντες ὅσοι ἐπείθοντο αὐτῷ
  english_pob_choice: all who had been persuaded by him
  chosen_spanish: todos los que habían sido persuadidos por él
  alternatives_spanish:
  - todos los que lo seguían
  - todos los que habían sido convencidos por él
  lexicon: BDAG
  rationale: πείθω en imperfecto pasivo/medio aquí conserva el sentido de haber sido persuadidos o ganados para su causa, más específico que «seguir». Se mantiene la relación causal con Teudas.
- source_word: διελύθησαν
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - se dispersaron
  - fueron deshechos
  lexicon: BDAG
  rationale: διαλύω describe la disolución del grupo. «Fueron dispersados» conserva el pasivo y la imagen de desintegración del movimiento.
- source_word: ἐγένοντο εἰς οὐδέν
  english_pob_choice: came to nothing
  chosen_spanish: llegaron a nada
  alternatives_spanish:
  - vinieron a nada
  - quedaron en nada
  lexicon: BDAG
  rationale: El modismo expresa fracaso y desaparición efectiva del movimiento. «Llegaron a nada» es una equivalencia española comprensible que mantiene la fuerza del giro sin añadir elementos ajenos.
theological_decisions:
- issue: Relación entre el ejemplo de Teudas y el argumento de Gamaliel
  english_pob_reading: Render the statement straightforwardly as part of Gamaliel's argument without attempting to harmonize or correct the historical reference in translation.
  chosen_spanish_reading: Presentar la afirmación de forma directa como parte del argumento de Gamaliel, sin intentar armonizar ni corregir la referencia histórica en la traducción.
  alternative_spanish_readings:
  - Introducir matices que sugieran duda histórica
  - Reescribir la frase para alinearla con reconstrucciones externas
  rationale: El verso ofrece un ejemplo dentro del discurso de Gamaliel. La traducción debe reflejar el griego recibido y preservar la tensión histórica/documental sin importar una solución externa al texto.
  doctrine_reference: Principio de primacía del idioma original; preservar tensiones textuales y teológicas en vez de resolverlas en traducción.
