  glossary_alignment: No hay conflicto con la terminología base del proyecto. Este versículo no activa términos como Yahvé, Mesías, Espíritu, etc. La decisión «facción» para αἵρεσις es aceptable como equivalente contextual de «party», pero la nota debe anclarse a esa palabra. También conviene conservar la alternativa contextual para ζῆλος («envidia»; y potencialmente «celo» en nota explicativa) porque el audit trail inglés la documenta.
