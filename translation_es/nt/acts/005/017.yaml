translation:
  language: es
  text: Pero el sumo sacerdote se levantó, y todos los que estaban con él —es decir, la facción[a] de los saduceos— se llenaron de celos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la secta de los saduceos". El griego αἵρεσις puede denotar un partido, escuela o secta.
    reason: lexical_alternative
  - marker: b
    text: O "envidia". El griego también puede significar "celo", pero aquí el contexto favorece un sentido hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστὰς
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción decisiva en la narración. En español, "se levantó" comunica ese inicio de acción de forma natural y evita un giro demasiado literal o arcaizante.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δώ marca un contraste leve con el contexto anterior; "Pero" conserva mejor ese giro adversativo en español.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el principal sacerdote
  lexicon: BDAG
  rationale: La expresión designa el cargo singular. "Sumo sacerdote" es el equivalente español directo, claro y fiel al referente institucional.
- source_word: πάντες οἱ σὺν αὐτῷ
  english_pob_choice: all those with him
  chosen_spanish: todos los que estaban con él
  alternatives_spanish:
  - todos los que lo acompañaban
  - todos los de su grupo
  lexicon: BDAG
  rationale: La frase indica asociación y apoyo alrededor del sumo sacerdote. La forma elegida conserva la relación personal sin sobreespecificar su estatus.
- source_word: ἡ οὖσα αἵρεσις τῶν Σαδδουκαίων
  english_pob_choice: that is, the party of the Sadducees
  chosen_spanish: es decir, la facción de los saduceos
  alternatives_spanish:
  - la secta de los saduceos
  - el partido de los saduceos
  lexicon: BDAG
  rationale: αἵρεσις aquí nombra un grupo o facción dentro del judaísmo, no "herejía". "Facción" preserva el matiz grupal y evita una carga eclesiástica posterior; el inciso explicativo se mantiene con "es decir".
- source_word: ἐπλήσθησαν
  english_pob_choice: were filled
  chosen_spanish: se llenaron
  alternatives_spanish:
  - quedaron llenos
  - fueron llenados
  lexicon: BDAG
  rationale: La pasiva de πίμπλημι con complemento genitivo se conserva de modo idiomático en español como "se llenaron de".
- source_word: ζήλου
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celos resentidos
  lexicon: BDAG
  rationale: En este contexto hostil, ζῆλος expresa una reacción negativa de rivalidad. "Celos" comunica bien esa carga en español; "envidia" es posible, pero algo más estrecha.
theological_decisions:
- issue: Valor de αἵρεσις en contexto judío
  english_pob_reading: party
  chosen_spanish_reading: facción
  alternative_spanish_readings:
  - secta
  - partido
  rationale: La palabra describe un grupo reconocido dentro del judaísmo de la época; no conviene leerla con el sentido doctrinal posterior de "herejía". "Facción" conserva el matiz social y político sin anacronismo.
  doctrine_reference: Principio de primacía del texto original y de evitar cargar el verso con polémica eclesiástica posterior.
- issue: Sentido de ζῆλος en un contexto de oposición
  english_pob_reading: jealousy
  chosen_spanish_reading: celos
  alternative_spanish_readings:
  - envidia
  - celo
  rationale: Aunque ζῆλος puede significar "celo" o "zeal", el contexto narrativo es de resistencia a los apóstoles, por lo que predomina el sentido hostil. "Celos" mantiene esa lectura negativa sin convertirla en un término demasiado técnico.
  doctrine_reference: Consistencia contextual de términos clave según el pasaje.
translation_notes:
  revision_awareness: La forma final elimina cualquier sujeto repetido antes de "se llenaron", en línea con la revisión del texto inglés auditado. También evita traducir αἵρεσις como "herejía" y ζῆλος como "celo" para no perder el sentido hostil del contexto.
  spanish_consistency_notes:
  - Se mantiene "sumo sacerdote" como término institucional estándar en español.
  - '"Facción" se usa para αἵρεσις por coherencia con el valor grupal del contexto.'
  - '"Celos" conserva el matiz negativo de ζῆλος en esta escena de oposición.'
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto donde corresponden.
