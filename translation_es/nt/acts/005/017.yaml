  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: δὲ = «Pero», ὁ ἀρχιερεὺς = «el sumo sacerdote», πάντες οἱ σὺν αὐτῷ = «todos los que estaban con él», ἐπλήσθησαν = «se llenaron», y ζήλου en sentido negativo = «celos». Sin embargo, hay un problema en el aparato de notas: la nota [b] está anclada a «es decir», pero su contenido explica αἵρεσις («facción/secta/partido»), no el inciso explicativo. Además, la nota [a] para Ἀναστὰς no corresponde al patrón del inglés, mientras que falta una nota para ζήλου, que sí está documentada en el audit trail inglés.'
