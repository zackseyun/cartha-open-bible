review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: oír → entrar al ἱερόν al amanecer → enseñar; luego la llegada del sumo sacerdote y sus acompañantes, la convocatoria del Sanedrín y de toda la γερουσία de los hijos de Israel, y el envío a la prisión para hacer traer a los apóstoles. Sin embargo, hay dos desajustes relevantes: ἱερόν fue documentado en el POB inglés como ''temple courts'' y en español conviene explicitar ''los atrios del templo'' o equivalente; además, el marcador de nota [a] está anclado a ''esto'' aunque la nota explica una alternativa para ''todo el consejo de los hijos de Israel''.'
  spanish_quality_summary: El español es claro y natural, pero 'entraron al templo' pierde una distinción contextual importante, y 'calabozo' suena más estrecho y concreto que el más estándar 'prisión/cárcel' para δεσμωτήριον. También mejora la fluidez mover la nota al sintagma relevante y simplificar 'y los que estaban con él' sin coma innecesaria.
  glossary_alignment: No hay conflictos con terminología doctrinal principal. 'Sanedrín' está bien. 'Los hijos de Israel' preserva la decisión del POB sobre τῶν υἱῶν Ἰσραήλ y la alternativa idiomática debe mantenerse en nota, pero anclada correctamente. La preferencia contextual para ἱερόν pide 'atrios del templo' o 'recinto del templo' más que solo 'templo'.
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota ofrece alternativas para πᾶσαν τὴν γερουσίαν τῶν υἱῶν Ἰσραήλ, pero en el borrador aparece en 'esto[a]'. Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: '''el templo'' no refleja suficientemente ἱερόν según la documentación del POB.'
    rationale: El audit trail inglés distingue explícitamente entre ἱερόν y ναός con 'temple courts'. En español, 'los atrios del templo' preserva mejor esa precisión sin sonar forzado.
  - severity: medium
    issue: '''calabozo'' es más específico y menos neutral que δεσμωτήριον.'
    rationale: El término griego y la decisión inglesa favorecen 'prisión'. 'Calabozo' puede sugerir una celda o mazmorra más que el lugar de reclusión en general.
  revised_spanish_text: Cuando oyeron esto, entraron en los atrios del templo al amanecer y enseñaban. Pero cuando llegó el sumo sacerdote y los que estaban con él, convocaron al Sanedrín y a todo el consejo[a] de los hijos de Israel, y enviaron a la prisión para que los trajeran.
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «todo el consejo de Israel» o «todo el cuerpo de ancianos de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al sintagma que explica; se ajusta ἱερόν a 'los atrios del templo' para mantener la distinción documentada en el POB; y se cambia 'calabozo' por 'prisión' para reflejar mejor δεσμωτήριον en español neutral y formal. El resto del texto es fiel y legible, por lo que basta una revisión menor.
