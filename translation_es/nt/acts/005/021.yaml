translation:
  language: es
  text: Cuando oyeron esto, entraron en los atrios del templo al amanecer y enseñaban. Pero cuando llegó el sumo sacerdote y los que estaban con él, convocaron al Sanedrín y a todo el consejo[a] de los hijos de Israel, y enviaron a la prisión para que los trajeran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «todo el consejo de Israel» o «todo el cuerpo de ancianos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: When they heard this
  chosen_spanish: Cuando oyeron esto
  alternatives_spanish:
  - Después de oír esto
  - Al oír esto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente y remite al mandato inmediato anterior; «Cuando oyeron esto» conserva la secuencia sin recargar la frase.
- source_word: ὑπὸ τὸν ὄρθρον
  english_pob_choice: at daybreak
  chosen_spanish: al amanecer
  alternatives_spanish:
  - a la aurora
  - muy temprano
  lexicon: BDAG
  rationale: La expresión señala las horas tempranas de la madrugada. «Al amanecer» es natural en español y transmite ese valor temporal.
- source_word: ἱερὸν
  english_pob_choice: the temple courts
  chosen_spanish: el templo
  alternatives_spanish:
  - los atrios del templo
  - el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el santuario interno. En español, «el templo» es una forma clara y digna; el matiz del recinto queda implícito por el contexto, sin forzar una perífrasis.
- source_word: ἐδίδασκον
  english_pob_choice: were teaching
  chosen_spanish: enseñaban
  alternatives_spanish:
  - estaban enseñando
  - seguían enseñando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Enseñaban» preserva ese valor durativo en español de manera natural.
- source_word: Παραγενόμενος
  english_pob_choice: when the high priest arrived
  chosen_spanish: cuando llegó el sumo sacerdote
  alternatives_spanish:
  - al llegar el sumo sacerdote
  - habiendo llegado el sumo sacerdote
  lexicon: BDAG
  rationale: El participio aoristo introduce el siguiente evento. «Cuando llegó» comunica bien el giro temporal y evita una calca rígida.
- source_word: οἱ σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus acompañantes
  - los de su comitiva
  lexicon: BDAG
  rationale: La expresión es amplia y no precisa identidad más allá de la compañía del sumo sacerdote. «Los que estaban con él» conserva esa indefinición.
- source_word: συνεκάλεσαν
  english_pob_choice: they called together
  chosen_spanish: convocaron
  alternatives_spanish:
  - llamaron juntos
  - reunieron
  lexicon: BDAG
  rationale: El verbo implica convocar una asamblea. «Convocaron» es exacto y suficientemente formal para este contexto.
- source_word: συνέδριον
  english_pob_choice: the Sanhedrin
  chosen_spanish: el Sanedrín
  alternatives_spanish:
  - el consejo
  lexicon: BDAG
  rationale: Aquí se trata del órgano judicial judío conocido históricamente como el Sanedrín. Mantener el nombre propio evita perder especificidad.
- source_word: πᾶσαν τὴν γερουσίαν τῶν υἱῶν Ἰσραήλ
  english_pob_choice: the whole council of the sons of Israel
  chosen_spanish: todo el consejo de los hijos de Israel
  alternatives_spanish:
  - todo el consejo de Israel
  - todo el cuerpo de ancianos de Israel
  lexicon: BDAG
  rationale: γερουσία alude a un cuerpo de ancianos/consejo. Se conserva «los hijos de Israel» por su fuerza literal y porque el paquete inglés preserva esa formulación, con una alternativa más idiomática posible en nota.
- source_word: δεσμωτήριον
  english_pob_choice: the prison
  chosen_spanish: el calabozo
  alternatives_spanish:
  - la prisión
  - la cárcel
  lexicon: BDAG
  rationale: Aunque «prison» es el equivalente general, en este contexto narrativo «calabozo» comunica bien el lugar de custodia de presos y mantiene el tono concreto del relato. Se deja también la alternativa más neutral en español.
- source_word: ἀχθῆναι αὐτούς
  english_pob_choice: to have them brought
  chosen_spanish: para que los trajeran
  alternatives_spanish:
  - para que fueran llevados
  - para hacerlos traer
  lexicon: BDAG
  rationale: 'El infinitivo pasivo con ἀπέστειλαν expresa finalidad: enviaron a alguien para que los llevaran. «Para que los trajeran» reproduce ese sentido causativo en español idiomático.'
theological_decisions:
- issue: La expresión explícita «los hijos de Israel» frente a una neutralización idiomática
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - Israel
  - los israelitas
  rationale: El texto griego es explícito y masculino en la fórmula nacional. Se mantiene la formulación literal para no borrar el rasgo lexical que el POB inglés también conservó en su lectura principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Identificación de συνέδριον
  english_pob_reading: the Sanhedrin
  chosen_spanish_reading: el Sanedrín
  alternative_spanish_readings:
  - el consejo
  rationale: En este contexto el término no es un consejo genérico, sino el tribunal judío específico. La transliteración histórica preserva la referencia institucional.
  doctrine_reference: BDAG / contexto histórico-jurídico de Hechos 5
translation_notes:
  revision_awareness: El paquete inglés marca el versículo como sin cambios en la última revisión y con acuerdo alto entre evaluaciones; por eso no se introducen innovaciones interpretativas, solo ajustes de naturalidad en español manteniendo los mismos anclajes léxicos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Sanedrín» se usa como nombre histórico fijo, no como mera traducción funcional.
  - Se mantiene el paralelismo narrativo con verbos en pretérito simple e imperfecto según el valor aspectual del griego.
