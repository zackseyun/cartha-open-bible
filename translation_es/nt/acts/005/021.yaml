- from: Cuando oyeron esto[a], entraron al templo al amanecer y enseñaban. Pero cuando llegó el sumo sacerdote, y los que estaban con él, convocaron al Sanedrín y a todo el consejo de los hijos de Israel, y enviaron al calabozo para que los trajeran.
  to: Cuando oyeron esto, entraron en los atrios del templo al amanecer y enseñaban. Pero cuando llegó el sumo sacerdote y los que estaban con él, convocaron al Sanedrín y a todo el consejo[a] de los hijos de Israel, y enviaron a la prisión para que los trajeran.
