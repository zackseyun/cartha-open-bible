lexical_decisions:
- source_word: δυναμένου σου ἐπιγνῶναι
  english_pob_choice: as you are able to ascertain
  chosen_spanish: al examinarlo
  alternatives_spanish:
  - al verificarlo
  - al poder comprobarlo
  - como puedes ascertainirlo
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con δύναμαι + infinitivo expresa la capacidad del gobernador para determinar los hechos. En español, «al examinarlo» conserva el valor circunstancial y el matiz forense de «ascertain» sin sonar forzado. Se evita «saber» por ser demasiado general y «conocer» por no reflejar la idea de verificación.
- source_word: ἐπιγνῶναι
  english_pob_choice: ascertain
  chosen_spanish: examinarlo
  alternatives_spanish:
  - verificarlo
  - comprobarlo
  - determinarlo
  lexicon: BDAG
  rationale: El verbo apunta aquí a reconocer o verificar con conocimiento informado. «Examinarlo» comunica la acción de evaluar los hechos en un marco legal; «verificarlo» y «comprobarlo» son posibles, pero «examinarlo» encaja mejor con el tono de audiencia judicial.
- source_word: οὐ πλείους εἰσίν μοι ἡμέραι δώδεκα
  english_pob_choice: it has been no more than twelve days
  chosen_spanish: no han pasado más de doce días
  alternatives_spanish:
  - no son más de doce días para mí
  - ha habido no más de doce días
  lexicon: BDAG
  rationale: El griego es idiomático para expresar tiempo transcurrido. «No han pasado más de doce días» refleja con naturalidad el valor temporal sin introducir una glosa excesiva. Se conserva la restricción cuantitativa de πλείους/οὐ.
- source_word: ἀφ’ ἧς
  english_pob_choice: since
  chosen_spanish: desde que
  alternatives_spanish:
  - a partir de cuando
  - desde el día en que
  lexicon: BDAG
  rationale: La preposición con relativo marca el punto de inicio del lapso. «Desde que» es el equivalente español más natural y preciso para un intervalo temporal iniciado en un evento pasado.
- source_word: ἀνέβην
  english_pob_choice: I went up
  chosen_spanish: subí
  alternatives_spanish:
  - subí a
  - fui a subir
  lexicon: BDAG
  rationale: Se conserva el idiomatismo bíblico de ir/subir a Jerusalén. «Subí» reproduce el movimiento ascendente implícito en ἀναβαίνω y mantiene la perspectiva semítica del original.
- source_word: προσκυνήσων
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para rendir culto
  - para adorar a Dios
  lexicon: BDAG
  rationale: El participio de futuro expresa propósito. «Para adorar» traduce de forma fiel y sobria el acto de προσκυνέω. No se añade «a Dios» porque el objeto no está explicitado en el texto griego y eso introduciría una determinación interpretativa.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - hacia Jerusalén
  lexicon: BDAG
  rationale: Con un nombre de ciudad, εἰς se vierte naturalmente como «a». Mantiene el destino sin calco innecesario.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que ajustó la cláusula temporal a una formulación más natural («it has been no more than twelve days since I went up») sin cambiar el contenido. Por eso se opta por una solución temporal idiomática en español («no han pasado más de doce días desde que subí»), manteniendo el tono forense y la economía del original.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como topónimo estándar en español.
  - Se preserva el matiz forense de ἐπιγνῶναι con un verbo de comprobación/examen, no con un simple «saber».
  - No se introduce un objeto explícito para «adorar», porque el griego no lo expresa.
  - La nota[a] ofrece una alternativa más fluida, paralela a la nota del POB en inglés.
