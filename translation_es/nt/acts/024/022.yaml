    text: Or “postponed the proceedings”; the Greek verb can mean to defer or adjourn judicial action.
    reason: lexical_alternative
  - marker: b
    text: “The Way” was an early designation for the Christian movement.
    reason: cultural_note
  - marker: c
    text: Or “I will determine the matters concerning you.”
    reason: lexical_alternative
