base_translation:
  language: en
  yaml_path: translation/nt/acts/024/022.yaml
  text: But Felix[a], having a more accurate knowledge concerning the Way, put them off, saying, “When Lysias the commander comes down[c][b], I will decide your case.”
  footnotes:
