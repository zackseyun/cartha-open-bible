translation:
  language: es
  text: 'Pero Félix, teniendo un conocimiento más exacto acerca del Camino[a], aplazó el asunto[b], diciendo: «Cuando descienda el comandante Lisias, decidiré[c] su caso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Camino» era una designación temprana del movimiento cristiano.
    reason: cultural_note
  - marker: b
    text: O «los dejó para otro momento» o «aplazó las actuaciones»; el verbo griego puede significar diferir o aplazar una acción judicial.
    reason: lexical_alternative
  - marker: c
    text: O «determinaré los asuntos relativos a ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνεβάλετο
  english_pob_choice: put them off
  chosen_spanish: los dejó para otro momento
  alternatives_spanish:
  - pospuso el asunto
  - aplazó la audiencia
  - los dejó en suspenso
  lexicon: BDAG
  rationale: El verbo puede significar diferir o aplazar una acción judicial. En español, “los dejó para otro momento” conserva la referencia personal a αὐτούς y comunica con naturalidad la dilación sin forzar una terminología procesal no explícita en el griego.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - el caso
  - el proceso
  lexicon: BDAG
  rationale: El pronombre se refiere directamente a las personas ante Félix. “Los” mantiene esa referencia personal y deja que el contexto judicial lo precise.
- source_word: ἀκριβέστερον εἰδὼς
  english_pob_choice: having a more accurate knowledge
  chosen_spanish: teniendo un conocimiento más exacto
  alternatives_spanish:
  - sabiendo con mayor exactitud
  - estando mejor informado
  lexicon: BDAG
  rationale: La frase participial expresa la razón de su demora. “Conocimiento más exacto” conserva el comparativo ἀκριβέστερον y el valor cognitivo de εἰδώς, con un español natural y digno.
- source_word: τὰ περὶ τῆς ὁδοῦ
  english_pob_choice: concerning the Way
  chosen_spanish: acerca del Camino
  alternatives_spanish:
  - concerniente al Camino
  - acerca de esta Vía
  - sobre el Camino
  lexicon: BDAG
  rationale: En Hechos, ἡ ὁδός funciona como designación del movimiento cristiano primitivo. Se conserva “Camino” con mayúscula para reflejar ese uso semi-técnico; “acerca de” refleja bien περὶ sin calco rígido.
- source_word: χιλίαρχος
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el tribuno
  - el oficial al mando
  - el jefe de mil
  lexicon: BDAG
  rationale: El término designa un comandante militar romano. “Comandante” es claro en español moderno; “tribuno” sería más técnico, pero menos accesible sin nota explicativa.
- source_word: διαγνώσομαι
  english_pob_choice: I will decide
  chosen_spanish: decidiré
  alternatives_spanish:
  - determinaré
  - examinaré y decidiré
  - resolveré
  lexicon: BDAG
  rationale: En contexto judicial, el verbo implica decidir tras examinar. “Decidiré” comunica de forma natural la resolución del caso sin añadir una perífrasis más pesada.
- source_word: τὰ καθ’ ὑμᾶς
  english_pob_choice: your case
  chosen_spanish: su caso
  alternatives_spanish:
  - los asuntos que les conciernen
  - las cuestiones relativas a ustedes
  - los asuntos sobre ustedes
  lexicon: BDAG
  rationale: La expresión idiomática se refiere a los asuntos concernientes a los acusados. En español, “su caso” es la forma más idiomática en contexto judicial y mantiene el sentido legal del original.
theological_decisions:
- issue: La designación “el Camino” como nombre del movimiento cristiano primitivo
  english_pob_reading: The Way was an early designation for the Christian movement.
  chosen_spanish_reading: el Camino es un nombre del movimiento cristiano primitivo
  alternative_spanish_readings:
  - el Camino era una forma temprana de designar a los cristianos
  - el Camino era una denominación temprana de la comunidad cristiana
  rationale: Se conserva la mayúscula en “Camino” para mantener el valor denominativo del griego en Hechos y evitar reducirlo a una mera metáfora de trayecto.
  doctrine_reference: Hechos 9:2; 19:9, 23; 22:4; 24:14, 22
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que afinó περὶ como “concerning”. En español se refleja con “acerca de”, que suena natural y formal. También se preserva la ambigüedad judicial del verbo ἀνεβάλετο mediante una expresión idiomática que no fuerza “proceso” en el texto principal.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - “Camino” se conserva con mayúscula como término técnico narrativo de Hechos.
  - Se evita “SEÑOR” o una paraphrase eclesiástica no presente en el griego.
  - El registro es formal y publicable, pero no arcaizante.
