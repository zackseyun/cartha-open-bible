translation:
  language: es
  text: Al mismo tiempo, esperaba que Pablo le diera dinero[a]; por eso también lo mandaba llamar con más frecuencia y conversaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en contexto, «esperaba un soborno de Pablo». El griego dice simplemente «dinero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα καὶ
  english_pob_choice: At the same time
  chosen_spanish: Al mismo tiempo
  alternatives_spanish:
  - Mientras tanto
  - A la vez
  lexicon: BDAG
  rationale: La expresión señala simultaneidad con lo narrado antes. «Al mismo tiempo» conserva ese valor temporal en español natural y claro, sin forzar la duplicación de partículas.
- source_word: ἐλπίζων
  english_pob_choice: he was hoping
  chosen_spanish: él esperaba
  alternatives_spanish:
  - él tenía la esperanza
  - él seguía esperando
  lexicon: BDAG
  rationale: El participio presente expresa una expectativa continua concurrente con sus acciones. «Él esperaba» comunica bien esa continuidad en español narrativo y evita una construcción demasiado pesada.
- source_word: χρήματα
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - una suma de dinero
  - soborno
  lexicon: BDAG
  rationale: El término griego dice simplemente «dinero». Aunque el contexto sugiere corrupción, el lexema no especifica «soborno», por lo que «dinero» es la opción más fiel y restringida.
- source_word: δοθήσεται αὐτῷ ὑπὸ τοῦ Παύλου
  english_pob_choice: would be given to him by Paul
  chosen_spanish: se le diera dinero por parte de Pablo
  alternatives_spanish:
  - le fuera dado por Pablo
  - Pablo le diera dinero
  lexicon: BDAG
  rationale: La construcción pasiva futura con ὑπό + genitivo presenta a Pablo como fuente esperada del dinero. «Se le diera» conserva el matiz pasivo y la expectativa en español, y «por parte de Pablo» expresa el agente sin endurecer la sintaxis.
- source_word: διὸ καὶ
  english_pob_choice: therefore he also
  chosen_spanish: por eso también
  alternatives_spanish:
  - por esta razón también
  - así que también
  lexicon: BDAG
  rationale: διό introduce consecuencia o inferencia. «Por eso» reproduce bien la relación causal; «también» refleja καί y mantiene el enlace con la acción repetida.
- source_word: πυκνότερον
  english_pob_choice: more often
  chosen_spanish: con más frecuencia
  alternatives_spanish:
  - más a menudo
  - más frecuentemente
  lexicon: BDAG
  rationale: El comparativo indica mayor frecuencia. «Con más frecuencia» es idiomático en español moderno y conserva la idea de repetición intensificada.
- source_word: μεταπεμπόμενος
  english_pob_choice: sent for him
  chosen_spanish: lo mandaba llamar
  alternatives_spanish:
  - lo hacía venir
  - lo convocaba
  lexicon: BDAG
  rationale: El participio medio suele significar enviar por alguien o convocarlo. «Lo mandaba llamar» es natural en este contexto de custodia y comunica la acción repetida.
- source_word: ὡμίλει αὐτῷ
  english_pob_choice: talked with him
  chosen_spanish: conversaba con él
  alternatives_spanish:
  - hablaba con él
  - se entretenía hablando con él
  lexicon: BDAG
  rationale: Aquí ὁμιλέω denota trato conversacional. «Conversaba con él» mantiene el matiz de interacción personal y sostenida.
theological_decisions:
- issue: Si hacer explícito en el texto principal el motivo corrupto de Félix como «soborno»
  english_pob_reading: Keep the main text at 'money' and allow the implication to arise from context
  chosen_spanish_reading: Mantener «dinero» en el texto principal y dejar que el contexto sugiera la corrupción
  alternative_spanish_readings:
  - esperaba un soborno de Pablo
  - esperaba que Pablo lo sobornara
  rationale: La implicación del pasaje es clara, pero el griego usa χρήματα, no un término específico para «soborno». Por fidelidad al texto fuente, la redacción principal conserva el término general y no adelanta una especificación que el original no da.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; el consenso de revisión es alto y sin objeciones, así que el borrador español sigue de cerca la solución auditada sin introducir cambios no motivados.
  spanish_consistency_notes:
  - Se mantiene «Pablo» como nombre propio sin adaptación adicional.
  - Se conserva el valor pasivo de la construcción con «se le diera» para reflejar la forma griega sin volverla activa innecesariamente.
  - «Dinero» se usa de forma consistente para χρήματα, dejando la lectura de «soborno» solo en nota.
  - La progresión temporal y causal del verso queda marcada con «Al mismo tiempo» y «por eso también», en paralelo con ἅμα καὶ y διὸ καὶ.
  - El registro es sobrio y público, evitando giros arcaizantes.
