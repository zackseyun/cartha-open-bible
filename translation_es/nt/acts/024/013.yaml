translation:
  language: es
  text: Ni tampoco pueden probarte aquello de lo que ahora me acusan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presentar ante ti» o «demostrarte»; el verbo griego puede significar presentar o establecer algo, aquí en el sentido de sustentar una acusación legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor
  chosen_spanish: Ni tampoco
  alternatives_spanish:
  - Y tampoco
  - Ni
  lexicon: BDAG
  rationale: Conserva la continuidad negativa de la defensa anterior. En español, "ni tampoco" reproduce bien el enlace enfático sin sonar demasiado rígido al inicio de la frase.
- source_word: παραστῆσαι
  english_pob_choice: prove
  chosen_spanish: demostrar
  alternatives_spanish:
  - probar
  - presentar
  - establecer
  lexicon: BDAG
  rationale: En este contexto forense, el verbo apunta a sustentar o acreditar una acusación ante el juez. "Demostrar" comunica esa fuerza jurídica de modo natural en español moderno, sin perder la idea de substanciación.
- source_word: δύνανταί
  english_pob_choice: can
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  lexicon: BDAG
  rationale: Expresa de manera directa la capacidad o posibilidad. "Pueden" es la equivalencia más natural y concisa.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - delante de ti
  lexicon: BDAG
  rationale: La forma de segunda persona singular oblicua en español funciona con naturalidad en el registro directo. Dado el marco judicial, el destinatario sigue siendo Felix; el contexto ya suple la implicación de comparecencia ante él.
- source_word: περὶ ὧν
  english_pob_choice: of which
  chosen_spanish: de las que
  alternatives_spanish:
  - sobre las cuales
  - acerca de las cuales
  lexicon: BDAG
  rationale: La revisión inglesa prefirió una construcción más formal cercana al griego. En español, "de las que" conserva bien la relación relativa sin forzar un calco pesado.
- source_word: νυνὶ
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: Marca el contraste temporal del proceso judicial presente. "Ahora" es la forma más natural y breve.
- source_word: κατηγοροῦσίν μου
  english_pob_choice: they are now accusing me
  chosen_spanish: me acusan
  alternatives_spanish:
  - me están acusando
  - presentan acusaciones contra mí
  lexicon: BDAG
  rationale: 'El verbo es técnico en sentido legal: formular cargos o acusar. En español, "me acusan" mantiene esa fuerza sin necesidad de un progresivo, que puede sonar innecesario en una línea legal concisa.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de "about which" a "of which" para acercarse más a la construcción griega. En español se optó por "de las que", que mantiene esa relación formal y el matiz forense del texto, sin depender mecánicamente del inglés anterior.
  spanish_consistency_notes:
  - Se mantuvo un registro jurídico claro y sobrio acorde con el contexto de defensa ante un gobernador.
  - Se evitó "Cristo/Mesías" y otras terminologías no pertinentes al versículo.
  - El pronombre de segunda persona se tradujo con tratamiento informal singular porque el griego usa σοι; el contexto histórico permite la referencia directa a Félix.
