translation:
  language: es
  text: 'Y cuando fue citado, Tértulo comenzó a acusarlo, diciendo: «Puesto que por ti gozamos de mucha paz, y se están haciendo reformas[a] para esta nación por tu previsión[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mejoras» o «medidas correctivas» para «reformas» (διορθωμάτων).
    reason: lexical_alternative
  - marker: b
    text: O «por tu providencia» o «por tu prudencia» para «por tu previsión». Aquí πρόνοια se refiere a la previsión o administración de un gobernante, no necesariamente a la providencia divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: κληθέντος δὲ αὐτοῦ
  english_pob_choice: And when he had been summoned
  chosen_spanish: Y cuando él fue citado
  alternatives_spanish:
  - Y cuando fue llamado
  - Y cuando fue convocado
  lexicon: BDAG
  rationale: El genitivo absoluto introduce la circunstancia previa a la acusación. En el contexto legal, "citado" comunica mejor la idea de comparecencia oficial que "llamado", y evita una calca rígida.
- source_word: ἤρξατο κατηγορεῖν
  english_pob_choice: began to accuse
  chosen_spanish: comenzó a acusarlo
  alternatives_spanish:
  - empezó a acusarlo
  - comenzó a acusar
  lexicon: BDAG
  rationale: La construcción inceptiva se vierte de manera natural con "comenzó a". "Acusarlo" conserva el objeto implícito de la acusación y mantiene el tono jurídico del pasaje.
- source_word: ὁ Τέρτυλλος
  english_pob_choice: Tertullus
  chosen_spanish: Tértulo
  alternatives_spanish:
  - Tertulo
  - Tertulio
  lexicon: convención onomástica
  rationale: El nombre propio se translitera de forma estable al español. "Tértulo" es la forma más asentada y legible en español bíblico.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido del discurso. "Diciendo" conserva la relación sintáctica del griego sin añadir información.
- source_word: Πολλῆς εἰρήνης τυγχάνοντες
  english_pob_choice: Since through you we are enjoying much peace
  chosen_spanish: Puesto que por ti gozamos de mucha paz
  alternatives_spanish:
  - Ya que por ti disfrutamos de mucha paz
  - Puesto que por tu medio gozamos de mucha paz
  lexicon: BDAG
  rationale: τυγχάνω con genitivo expresa el hecho de experimentar/obtener algo. "Gozamos de mucha paz" es idiomático en español y conserva el tono adulador de Tértulo. "Puesto que" refleja bien el matiz causal-rhetórico del original y del POB inglés.
- source_word: διὰ σοῦ
  english_pob_choice: through you
  chosen_spanish: por ti
  alternatives_spanish:
  - a través de ti
  - mediante ti
  lexicon: BDAG
  rationale: Con genitivo, διά indica medio o agencia. En español, "por ti" suena natural y mantiene la idea de que el beneficio llega por medio de Félix.
- source_word: διορθωμάτων
  english_pob_choice: reforms
  chosen_spanish: reformas
  alternatives_spanish:
  - mejoras
  - correcciones
  - medidas correctivas
  lexicon: BDAG
  rationale: διόρθωμα puede referirse a medidas de corrección o mejora. "Reformas" encaja mejor en el contexto político-administrativo y reproduce la decisión del POB inglés sin perder fuerza.
- source_word: γινομένων
  english_pob_choice: are being made
  chosen_spanish: se están haciendo
  alternatives_spanish:
  - se están realizando
  - se están llevando a cabo
  - están ocurriendo
  lexicon: BDAG
  rationale: El participio con διορθωμάτων comunica acciones en proceso. "Se están haciendo" es la forma más directa y natural en español para una acción administrativa en curso, sin añadir agentes no expresados.
- source_word: τῷ ἔθνει τούτῳ
  english_pob_choice: for this nation
  chosen_spanish: para esta nación
  alternatives_spanish:
  - para este pueblo
  - a esta nación
  - para este pueblo
  lexicon: BDAG
  rationale: ἔθνος aquí designa al pueblo/nación judía en un marco político. "Nación" conserva el alcance colectivo y el tono forense del pasaje.
- source_word: διὰ τῆς σῆς προνοίας
  english_pob_choice: through your foresight
  chosen_spanish: por tu previsión
  alternatives_spanish:
  - por tu providencia
  - por tu prudencia
  lexicon: BDAG
  rationale: πρόνοια en este contexto no debe sugerir de manera automática la providencia divina. "Previsión" expresa bien la idea de previsión administrativa o antelación prudente, y evita importar un sentido teológico que el discurso de Tértulo no pretende aquí.
theological_decisions:
- issue: Sentido de πρόνοια en un discurso político y no teológico
  english_pob_reading: through your foresight
  chosen_spanish_reading: por tu previsión
  alternative_spanish_readings:
  - por tu providencia
  - por tu prudencia
  rationale: El griego puede admitir "providencia", pero en español esa palabra suele sonar teológicamente cargada. Dado que Tértulo halaga la administración de un gobernante humano, "previsión" comunica el valor de la frase sin atribuirle un matiz doctrinal ajeno al contexto.
  doctrine_reference: Evitar importar teología no presente; mantener el sentido histórico-retórico del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del POB en inglés: mantiene la estructura del genitivo absoluto, la inceptiva "began to accuse", y la cláusula final con "reforms" y "foresight", ajustando solo lo necesario para un español natural y auditable. No se introdujeron ampliaciones interpretativas fuera del alcance del griego ni del expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene "reformas" para διορθωμάτων por consistencia con la decisión inglesa documentada y por adecuación al contexto político-administrativo.
  - Se conserva la distinción entre "paz" y "previsión" para evitar confundir πρόνοια con la "providencia" divina.
  - El nombre propio se normaliza como "Tértulo" para uso bíblico en español.
  - La puntuación y las comillas angulares siguen la norma editorial del español, con los marcadores de nota pegados a la palabra o frase correspondiente.
