  text: κληθέντος δὲ αὐτοῦ ἤρξατο κατηγορεῖν ὁ Τέρτυλλος λέγων· Πολλῆς εἰρήνης τυγχάνοντες διὰ σοῦ καὶ ⸀διορθωμάτων γινομένων τῷ ἔθνει τούτῳ διὰ τῆς σῆς προνοίας
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/002.yaml
  text: 'And when he had been summoned[a], Tertullus began to accuse him, saying: “Since through you we are enjoying much peace[b], and reforms are being made for this nation through your foresight,”'
  footnotes:
  - marker: a
    text: Or 'improvements' or 'corrective measures' for 'reforms' (διορθωμάτων).
    reason: lexical_alternative
  - marker: b
    text: Or 'through your providence' or 'through your prudence' for 'through your foresight.' The Greek πρόνοια here refers to a ruler’s forethought or administration, not necessarily divine providence.
    reason: lexical_alternative
