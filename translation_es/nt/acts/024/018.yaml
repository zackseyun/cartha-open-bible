translation:
  language: es
  text: En estas cosas me hallaron purificado[a] en el templo, no con multitud ni con alboroto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Purificado» se refiere a una purificación ritual o ceremonial.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν αἷς
  english_pob_choice: In these things
  chosen_spanish: En estas cosas
  alternatives_spanish:
  - En las cuales
  - Durante las cuales
  lexicon: BDAG; SBLGNT
  rationale: El relativo femenino plural mira hacia los hechos mencionados antes. ‘En estas cosas’ conserva esa referencia anafórica de forma más directa que una perífrasis explicativa, y sigue de cerca la revisión inglesa más reciente.
- source_word: εὗρόν με
  english_pob_choice: they found me
  chosen_spanish: me hallaron
  alternatives_spanish:
  - me encontraron
  lexicon: BDAG
  rationale: ‘Hallaron’ reproduce bien el valor narrativo de εὑρίσκω y suena natural en español bíblico sin perder precisión. ‘Encontraron’ es posible, pero ‘hallaron’ mantiene mejor el registro del relato forense.
- source_word: ἡγνισμένον
  english_pob_choice: purified
  chosen_spanish: purificado
  alternatives_spanish:
  - habiendo sido purificado
  - ritualmente purificado
  - ceremonialmente purificado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἁγνίζω expresa un estado resultante de purificación ritual. ‘Purificado’ conserva ese sentido cultual de manera concisa; las ampliaciones ‘ritualmente’ o ‘ceremonialmente’ explicitan la clase de purificación, pero van más allá de la forma breve del griego.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no necesariamente el santuario interior. ‘En el templo’ es la equivalencia más natural y fiel; las expansiones son interpretativas y no exigidas por el texto.
- source_word: οὐ μετὰ ὄχλου
  english_pob_choice: not with a crowd
  chosen_spanish: no con multitud
  alternatives_spanish:
  - no con una multitud
  - no con gente
  lexicon: BDAG
  rationale: ‘Multitud’ conserva el valor de ὄχλος y mantiene el tono jurídico de la defensa. ‘Gente’ sería demasiado vago; ‘muchedumbre’ es posible, pero suena menos directo en español actual.
- source_word: οὐδὲ μετὰ θορύβου
  english_pob_choice: nor with an uproar
  chosen_spanish: ni con alboroto
  alternatives_spanish:
  - ni con disturbio
  - ni con tumulto
  lexicon: BDAG
  rationale: θόρυβος puede referir ruido, conmoción o desorden público. ‘Alboroto’ transmite bien la idea de disturbio público en este contexto, con un registro natural en español. ‘Tumulto’ es más fuerte y ‘disturbio’ es correcto, pero menos idiomático aquí.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el ajuste reciente del audit trail inglés, que prefirió una forma más directa para ἐν αἷς. Se conservan la referencia anafórica, el participio perfecto pasivo y el contraste legal entre ausencia de multitud y de alboroto.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se conserva el registro bíblico sobrio con vocabulario de uso eclesial ampliamente comprensible.
  - ‘Purificado’ se usa en sentido ritual, no moral, y queda aclarado en nota.
  - ‘Multitud’ y ‘alboroto’ preservan el paralelo negativo del griego sin intensificarlo indebidamente.
