  - severity: low
    issue: La redacción de la nota [a] puede sonar un poco rígida.
    rationale: '«O: “En las cuales...”» es aceptable, pero «O bien: “Durante las cuales...”» o una formulación similar sería algo más natural; no obstante, esto no afecta gravemente la fidelidad.'
