translation:
  language: es
  text: Y los judíos también se sumaron a la acusación[a], afirmando que estas cosas eran así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los judíos también se unieron, alegando que estas cosas eran así»'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέθεντο
  english_pob_choice: joined in the charge
  chosen_spanish: se unieron
  alternatives_spanish:
  - se unieron en la acusación
  - se sumaron a la acusación
  - se aliaron en la imputación
  lexicon: BDAG
  rationale: En este contexto forense, el verbo expresa que los judíos se sumaron a la línea acusatoria ya presentada. En español, «se unieron» comunica la participación conjunta sin volver la frase demasiado pesada; el complemento «en la acusación» queda implícito por el contexto judicial y por el participio siguiente.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo suave. «Y» reproduce bien el avance de la narración sin introducir contraste fuerte.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: καί añade a los judíos al grupo que participa en la acusación. «También» es la forma natural en español para marcar esa adición.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeos
  - los judeanos
  - los judíos presentes
  lexicon: BDAG
  rationale: La referencia es al grupo étnico-religioso presente en la audiencia. «Los judíos» es la equivalencia directa, clara y estándar en español.
- source_word: φάσκοντες
  english_pob_choice: asserting
  chosen_spanish: afirmando
  alternatives_spanish:
  - sosteniendo
  - alegando
  - asegurando
  lexicon: BDAG
  rationale: El participio introduce el contenido de lo que decían. «Afirmando» conserva la función declarativa sin cargar el texto con una evaluación más fuerte de la credibilidad.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas acusaciones
  - esto
  lexicon: BDAG
  rationale: El demostrativo retoma las acusaciones previas, pero la forma griega es amplia. «Estas cosas» mantiene la cercanía formal al texto fuente sin interpretar de más.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: BDAG
  rationale: Con ἔχειν forma una expresión idiomática que significa que algo está o resulta de cierta manera. «Así» es la opción más natural y fiel en español.
- source_word: ἔχειν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - estaban
  - se hallaban
  - resultaban
  lexicon: BDAG
  rationale: En la construcción ταῦτα οὕτως ἔχειν, el infinitivo expresa que las cosas «son así» o «están así». En español, «eran así» reproduce de forma natural el valor idiomático sin volverlo demasiado literal.
translation_notes:
  revision_awareness: Se siguió el último estado revisado del contexto inglés, que sustituyó «attack» por «charge» para ajustar el tono forense. En español se evitó una imagen de violencia física y se optó por un verbo de adhesión a la acusación, con una frase final que conserva la afirmación del contenido.
  spanish_consistency_notes:
  - Se mantuvo el registro judicial y sobrio del pasaje.
  - Se prefirió «los judíos» por consistencia con el referente del texto griego y el contexto procesal.
  - No se añadió una glosa explicativa en el cuerpo principal para no sobreinterpretar las acusaciones.
