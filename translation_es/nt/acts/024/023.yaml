translation:
  language: es
  text: Y dio órdenes al centurión de que lo mantuviera bajo custodia, pero que le concediera cierta libertad[a], y que no impidiera a ninguno de los suyos[b] atender sus necesidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo dejara tener algo de alivio» o «alguna libertad». El término griego puede indicar alivio, descanso o una medida de libertad frente a una restricción estricta.
    reason: lexical_alternative
  - marker: b
    text: Lit., «a ninguno de los suyos». Probablemente se refiere a los asociados o simpatizantes de Pablo que podían ayudarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαταξάμενος
  english_pob_choice: he ordered
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - ordenó
  - había dado órdenes
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Félix hacia el centurión. En español, «dio órdenes» conserva el valor directivo sin forzar una estructura participial pesada.
- source_word: ἑκατοντάρχῃ
  english_pob_choice: the centurion
  chosen_spanish: al centurión
  alternatives_spanish:
  - al capitán
  lexicon: BDAG
  rationale: «Centurión» es el equivalente preciso para el oficial romano al mando de cien soldados y es claro en español bíblico contemporáneo.
- source_word: τηρεῖσθαι αὐτόν
  english_pob_choice: to keep him in custody
  chosen_spanish: lo mantuviera bajo custodia
  alternatives_spanish:
  - lo vigilara
  - lo mantuviera guardado
  lexicon: BDAG
  rationale: Aquí τηρέω tiene sentido custodial/legal, no solo de vigilar. «Bajo custodia» expresa mejor esa restricción sin perder la idea de detención.
- source_word: ἔχειν τε ἄνεσιν
  english_pob_choice: yet to let him have some freedom
  chosen_spanish: le concediera cierta libertad
  alternatives_spanish:
  - le diera algo de alivio
  - le permitiera algún descanso
  - le concediera alguna libertad
  lexicon: BDAG
  rationale: Ἄνεσις puede denotar alivio, descanso o una medida de libertad. En este contexto, «cierta libertad» comunica una leniencia real pero limitada, acorde con la custodia.
- source_word: μηδένα κωλύειν
  english_pob_choice: to prevent none
  chosen_spanish: que no impidiera a ninguno
  alternatives_spanish:
  - que no estorbara a nadie
  - que no prohibiera a nadie
  - que no impidiera a ninguno
  lexicon: BDAG
  rationale: La construcción negativa universal debe conservarse. «No impidiera a ninguno» reproduce bien la fuerza de μηδένα κωλύειν en español natural.
- source_word: τῶν ἰδίων αὐτοῦ
  english_pob_choice: of his own people
  chosen_spanish: a ninguno de los suyos
  alternatives_spanish:
  - a ninguno de sus propios [gente]
  - a ninguno de sus allegados
  - a ninguno de sus compañeros
  lexicon: BDAG
  rationale: La frase es amplia y probablemente se refiere a los asociados o simpatizantes de Pablo. «De los suyos» preserva esa amplitud sin precisar indebidamente familia u otra relación específica.
- source_word: ὑπηρετεῖν αὐτῷ
  english_pob_choice: from attending to his needs
  chosen_spanish: atenderlo
  alternatives_spanish:
  - servirlo
  - ayudarlo
  - atender sus necesidades
  lexicon: BDAG
  rationale: En este contexto carcelario, ὑπηρετέω apunta a asistencia práctica. «Atenderlo» transmite esa ayuda sin introducir en español un matiz eclesiástico de «ministerio».
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y conserva la tensión entre custodia y lenidad; se ajusta la sintaxis para español natural sin suavizar la restricción legal ni la posibilidad de asistencia personal. La nota de libertad recoge la amplitud semántica de ἄνεσις, y la de «los suyos» mantiene la referencia abierta de τῶν ἰδίων αὐτοῦ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «centurión» como término técnico romano.
  - «Bajo custodia» se emplea para el valor custodial de τηρέω en este contexto.
  - «Atenderlo» evita imponer un matiz litúrgico a ὑπηρετεῖν.
