  text: ⸀διαταξάμενος τῷ ἑκατοντάρχῃ τηρεῖσθαι ⸀αὐτὸν ἔχειν τε ἄνεσιν καὶ μηδένα κωλύειν τῶν ἰδίων αὐτοῦ ⸀ὑπηρετεῖν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/023.yaml
  text: And he ordered the centurion to keep him in custody[a], yet to let him have some freedom[b], and to prevent none of his own people from attending to his needs.
  footnotes:
  - marker: a
    text: Or 'to let him have some ease' or 'to have liberty.' The Greek term can denote relief, ease, or a measure of freedom from strict confinement.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'none of his own [people].' This likely refers to Paul's associates or supporters who were permitted to assist him.
    reason: lexical_alternative
