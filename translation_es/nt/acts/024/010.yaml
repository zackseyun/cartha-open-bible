translation:
  language: es
  text: 'Entonces Pablo respondió, después de que el gobernador le hizo una seña para hablar: «Sabiendo que desde hace muchos años has sido juez sobre esta nación, con buen ánimo[a] hago mi defensa respecto de mí mismo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con confianza hago mi defensa». El adverbio puede transmitir disposición, valentía o buen ánimo, no solo alegría emocional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπεκρίθη τε
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Así ... respondió
  lexicon: BDAG
  rationale: ἀποκρίνομαι se traduce naturalmente como «responder». El matiz enlazante de τε se refleja con «Entonces», que mantiene la progresión narrativa sin forzar una coordinación más pesada.
- source_word: νεύσαντος αὐτῷ τοῦ ἡγεμόνος λέγειν
  english_pob_choice: after the governor had nodded to him to speak
  chosen_spanish: después de que el gobernador le hizo una señal para hablar
  alternatives_spanish:
  - cuando el gobernador le hizo una seña para hablar
  - después de que el gobernador le asintió para hablar
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte como subordinada temporal en español. νεύω puede ser un gesto de asentir o de hacer señas; «le hizo una señal» conserva el gesto sin sonar artificial en español.
- source_word: ἡγεμόνος
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - prefecto
  lexicon: BDAG
  rationale: En Hechos, el referente es la autoridad provincial romana. «Gobernador» es el equivalente más claro y natural en español contemporáneo.
- source_word: Ἐκ πολλῶν ἐτῶν
  english_pob_choice: for many years
  chosen_spanish: desde hace muchos años
  alternatives_spanish:
  - por muchos años
  - hace muchos años
  lexicon: BDAG
  rationale: ἐκ con expresión temporal expresa duración a partir del pasado. «Desde hace muchos años» reproduce bien esa idea en español y suena natural.
- source_word: ὄντα σε κριτὴν
  english_pob_choice: you have been a judge
  chosen_spanish: eres juez
  alternatives_spanish:
  - has sido juez
  - has ejercido como juez
  lexicon: BDAG
  rationale: El participio con ἐπιστάμενος presenta el conocimiento de Pablo sobre el cargo estable de Félix. En español, «eres juez» funciona mejor con «desde hace muchos años» y mantiene la observación del oficio en curso sin sobrecargar la frase.
- source_word: κριτὴν
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  - juez de causa
  lexicon: BDAG
  rationale: κριτής significa literalmente «juez». En el contexto judicial, «juez» conserva tanto el sentido léxico como el registro forense.
- source_word: τῷ ἔθνει τούτῳ
  english_pob_choice: over this nation
  chosen_spanish: sobre esta nación
  alternatives_spanish:
  - para esta nación
  - sobre este pueblo
  lexicon: BDAG
  rationale: La relación con κριτήν pide un complemento que indique jurisdicción. «Nación» preserva el tono formal del griego y del inglés POB; «pueblo» queda como alternativa de matiz más étnico.
- source_word: ἐπιστάμενος
  english_pob_choice: Knowing
  chosen_spanish: Sabiendo
  alternatives_spanish:
  - Conociendo
  - Puesto que sé
  lexicon: BDAG
  rationale: El participio expresa la base de la confianza de Pablo al hablar. «Sabiendo» mantiene el enlace participial y el tono conciso del original.
- source_word: εὐθύμως
  english_pob_choice: gladly
  chosen_spanish: con buen ánimo
  alternatives_spanish:
  - gustosamente
  - con confianza
  - alegremente
  lexicon: BDAG
  rationale: εὐθύμως puede implicar disposición, ánimo valiente o buen talante. «Con buen ánimo» conserva esa amplitud sin reducirlo solo a alegría emocional. La alternativa de «confidently» queda reflejada en la nota.
- source_word: τὰ περὶ ἐμαυτοῦ
  english_pob_choice: concerning myself
  chosen_spanish: respecto de mí mismo
  alternatives_spanish:
  - acerca de mí mismo
  - sobre mí mismo
  - en cuanto a mí
  lexicon: BDAG
  rationale: La expresión señala los asuntos que conciernen a Pablo. «Respecto de mí mismo» es formal, claro y apropiado al lenguaje forense.
- source_word: ἀπολογοῦμαι
  english_pob_choice: make my defense
  chosen_spanish: hago mi defensa
  alternatives_spanish:
  - presento mi defensa
  - me defiendo
  lexicon: BDAG
  rationale: ἀπολογέομαι es un término jurídico. «Hago mi defensa» preserva el registro forense mejor que una paráfrasis más general, y sigue de cerca la formulación de la POB en inglés.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la revisión inglesa más reciente, que permanece sin cambios, y conserva el mismo análisis léxico principal: la señal del gobernador, el matiz jurisdiccional de κριτής/ἔθνος, y la amplitud de εὐθύμως. La única decisión marcada es la misma ambigüedad léxica señalada en la nota inglesa para εὐθύμως.'
  spanish_consistency_notes:
  - Se mantiene «gobernador» para ἡγεμών, coherente con el registro legal de Hechos.
  - Se usa «nación» para ἔθνος en contexto forense-político.
  - Se conserva «juez» para κριτής y «hago mi defensa» para ἀπολογοῦμαι, evitando suavizar el lenguaje jurídico.
  - La nota a pie de página marca la alternativa de lectura de εὐθύμως sin duplicar marcadores.
