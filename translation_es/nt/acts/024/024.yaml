source:
  edition: SBLGNT
  text: Μετὰ δὲ ἡμέρας τινὰς παραγενόμενος ὁ Φῆλιξ σὺν Δρουσίλλῃ τῇ ⸀ἰδίᾳ γυναικὶ οὔσῃ Ἰουδαίᾳ μετεπέμψατο τὸν Παῦλον καὶ ἤκουσεν αὐτοῦ περὶ τῆς εἰς Χριστὸν ⸀Ἰησοῦν πίστεως.
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/024.yaml
  text: Now after some days[a], Felix came with Drusilla, his own wife, who was Jewish[b], and sent for Paul and heard him concerning faith in Messiah Jesus.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title rather than merely a name.
    reason: alternative_reading
  - marker: b
    text: Or 'trust in Messiah Jesus.' The noun πίστις can also carry the sense of 'trust,' though 'faith' is the default rendering.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 6dcd43cb84d2a18f3283a66e93f894dd7cc046cc87beabdba77887dfa3bd43ac
    timestamp: '2026-04-18T22:25:57Z'
    output_hash: 1ca8a214a2dd51fe7a9f50e0881f1dd6c2d8fccceaf555402efd0e3320fc9868
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:41:45Z'
    unchanged: false
    changes_summary: 'Changed ''about the faith in Messiah Jesus'' to ''concerning faith in Christ Jesus'' for more natural English and closer rendering of περὶ τῆς εἰς Χριστὸν Ἰησοῦν πίστεως without adding ''the'' before faith. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Después de algunos días, Félix vino con Drusila, su propia esposa, que era judía, y mandó llamar a Pablo y lo oyó acerca de la fe[a] en Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza». El sustantivo griego πίστις también puede tener el sentido de «confianza», aunque «fe» es la traducción por defecto aquí.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo Jesús». Aquí Χριστός se traduce como «Mesías» porque funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: Μετὰ δὲ ἡμέρας τινὰς
  english_pob_choice: Now after some days
  chosen_spanish: Ahora, después de algunos días
  alternatives_spanish:
  - Después de algunos días
  - Ahora, al cabo de algunos días
  lexicon: BDAG
  rationale: La expresión temporal indica secuencia narrativa sin precisar número; «después de algunos días» conserva el valor básico. Añadir «Ahora» refleja el matiz discursivo de δέ sin sobrecargar el texto.
- source_word: παραγενόμενος
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: BDAG
  rationale: El participio funciona de manera circunstancial con Félix como sujeto. «Vino» es natural en español narrativo y preserva el movimiento/presencia sin exagerar el aspecto de llegada.
- source_word: σὺν Δρουσίλλῃ
  english_pob_choice: with Drusilla
  chosen_spanish: con Drusila
  alternatives_spanish:
  - junto con Drusila
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento directo. «Con» es la opción más transparente y natural.
- source_word: τῇ ἰδίᾳ γυναικὶ
  english_pob_choice: his own wife
  chosen_spanish: su propia esposa
  alternatives_spanish:
  - su esposa
  - su misma esposa
  lexicon: BDAG
  rationale: ἴδιος añade énfasis posesivo. «Su propia esposa» conserva ese refuerzo mejor que simplemente «su esposa», sin sonar artificial.
- source_word: οὔσῃ Ἰουδαίᾳ
  english_pob_choice: who was Jewish
  chosen_spanish: que era judía
  alternatives_spanish:
  - siendo judía
  - que era una mujer judía
  lexicon: BDAG
  rationale: El participio con adjetivo describe a Drusila. «Que era judía» expresa la identificación étnico-religiosa de forma clara y contemporánea.
- source_word: μετεπέμψατο
  english_pob_choice: sent for
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - llamó
  - hizo llamar
  lexicon: BDAG
  rationale: El verbo medio tiene el sentido de enviar por alguien para traerlo/convocarlo. «Mandó llamar» comunica bien la acción sin introducir tecnicismos innecesarios.
- source_word: ἤκουσεν αὐτοῦ
  english_pob_choice: heard him
  chosen_spanish: lo oyó
  alternatives_spanish:
  - lo escuchó
  - oyó de él
  lexicon: BDAG
  rationale: Con el genitivo, el verbo puede expresar que oía a la persona. «Lo oyó» es breve y fiel; el complemento siguiente precisa el tema.
- source_word: περὶ τῆς εἰς Χριστὸν Ἰησοῦν πίστεως
  english_pob_choice: concerning faith in Messiah Jesus
  chosen_spanish: acerca de la fe en Mesías Jesús
  alternatives_spanish:
  - con respecto a la fe en Jesús el Mesías
  - acerca de la fe en Cristo Jesús
  lexicon: BDAG
  rationale: περί introduce el tema del discurso. «Fe» mantiene πίστις como término doctrinal estándar. «Mesías» traduce Χριστός como título, conforme a la pauta del proyecto; el orden «Mesías Jesús» conserva la relación titular, aunque en español también cabe «Jesús el Mesías» por naturalidad.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre fijo. Por la pauta del proyecto, se mantiene «Mesías» para evitar la forma eclesial tradicional cuando no es la preferida por la política de traducción.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: πίστις se traduce por defecto como «fe». El artículo se refleja naturalmente en español con «la fe»; la alternativa semántica de confianza queda implícita y se documenta en nota.
theological_decisions:
- issue: Rendering of Χριστός as a title
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesús el Cristo
  rationale: La lectura auditada trata Χριστός como título. Para mantener esa decisión en español, se usa «Mesías» en vez de la forma eclesial fija «Cristo».
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
- issue: Meaning of πίστις in the clause περὶ τῆς εἰς Χριστὸν Ἰησοῦν πίστεως
  english_pob_reading: faith in Messiah Jesus
  chosen_spanish_reading: la fe en Mesías Jesús
  alternative_spanish_readings:
  - la confianza en Mesías Jesús
  - la fidelidad de Mesías Jesús
  rationale: La construcción con εἰς + acusativo apunta a fe dirigida hacia Jesús. «Fe en» preserva esa dirección de manera natural en español. Se mantiene la alternativa «confianza» como posibilidad semántica cercana, sin reemplazar el término base.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; contested terms table for πίστις'
translation_notes:
  revision_awareness: 'El borrador sigue la última lectura inglesa restaurada en la auditoría: Χριστός se mantiene como «Messiah/Mesiah» y no como «Christ». También conserva el matiz de πίστις sin convertirlo en una paráfrasis doctrinal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero no aparece en este versículo.
  - «Mesías» se usa para Χριστός conforme a la política terminológica; no se sustituye por «Cristo».
  - «Fe» se conserva para πίστις por defecto; no se añade artículo superfluo donde el español ya lo exige naturalmente.
  - El estilo evita arcaísmos innecesarios y conserva la secuencia narrativa con conectores simples.
