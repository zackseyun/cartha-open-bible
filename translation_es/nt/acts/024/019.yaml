revisions:
- from: Pero hay algunos judíos de Asia, que deberían haber estado presentes delante de ti y acusarme[a][b], si tuvieran algo contra mí.
  to: Pero hay algunos judíos de Asia, que deberían estar presentes ante ti y acusarme[a][b], si tienen algo contra mí.
  rationale: Se ajustó la línea verbal para reflejar mejor la formulación directa del griego y de la auditoría inglesa revisada, evitando una condicional demasiado remota en español. También se cambió «delante de ti» por «ante ti» para un registro judicial más natural, sin alterar el sentido.
