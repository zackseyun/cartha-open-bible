translation:
  language: es
  text: Pero hay algunos judíos de Asia, que deberían estar presentes ante ti y acusarme[a][b], si tienen algo contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asia» aquí se refiere a la provincia romana de Asia en Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: O «presentar cargos contra mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  lexicon: BDAG
  rationale: El griego introduce un grupo indefinido y no específico; «algunos» comunica bien ese carácter sin añadir precisión no presente en el texto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: La partícula marca contraste con la afirmación anterior; «Pero» conserva la fuerza adversativa de forma natural en español.
- source_word: ἀπὸ τῆς Ἀσίας
  english_pob_choice: from Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - de la provincia de Asia
  lexicon: BDAG
  rationale: Se mantiene la forma breve del texto; el sentido provincial romano puede aclararse en nota sin cargar el cuerpo del verso.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - hombres judíos
  - personas judías
  lexicon: BDAG
  rationale: El sustantivo/adjetivo sustantivado designa al pueblo judío; «judíos» es la correspondencia directa y natural.
- source_word: ἔδει
  english_pob_choice: ought to be
  chosen_spanish: deberían haber estado
  alternatives_spanish:
  - era necesario que estuvieran
  - tenían que haber estado
  lexicon: BDAG
  rationale: El imperfecto de necesidad expresa lo que correspondía en este marco judicial. En español, la perífrasis en pasado imperfectivo reproduce mejor el matiz de obligación no cumplida que un simple presente.
- source_word: ἐπὶ σοῦ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: BDAG
  rationale: En contexto forense, la expresión alude a comparecer ante la autoridad. «Delante de ti» conserva la imagen espacial y es idiomática en español.
- source_word: παρεῖναι
  english_pob_choice: been present
  chosen_spanish: haber estado presentes
  alternatives_spanish:
  - comparecer
  - estar presentes
  lexicon: BDAG
  rationale: El infinitivo de presencia/comparecencia se traduce aquí con un perfecto de infinitivo para reflejar que esa presencia debía haberse dado ya en la audiencia.
- source_word: κατηγορεῖν
  english_pob_choice: to accuse me
  chosen_spanish: acusarme
  alternatives_spanish:
  - presentar cargos contra mí
  - formular acusación contra mí
  lexicon: BDAG
  rationale: El verbo es forense y puede significar acusar o formular cargos. «Acusarme» es conciso y suficiente; se preserva la posibilidad jurídica en nota.
- source_word: εἴ τι ἔχοιεν πρὸς ἐμέ
  english_pob_choice: if they have anything against me
  chosen_spanish: si tuvieran algo contra mí
  alternatives_spanish:
  - si tuvieran alguna acusación contra mí
  - si tuvieran algo que decir contra mí
  lexicon: BDAG
  rationale: La cláusula condicional expresa la existencia de una queja o acusación. «Algo contra mí» mantiene la amplitud del griego sin restringirla solo a un cargo formal.
theological_decisions:
- issue: Sin tema doctrinal explícito; conservación del tono jurídico del discurso de Pablo
  english_pob_reading: Direct forensic statement without doctrinal elaboration
  chosen_spanish_reading: Declaración forense directa, sin ampliación interpretativa
  alternative_spanish_readings:
  - Afirmación legal más explicativa
  - Paráfrasis más retórica
  rationale: El versículo pertenece a un contexto judicial. La traducción conserva la estructura argumentativa y evita añadir énfasis teológico o narrativo no presente en el griego.
  doctrine_reference: Hechos 24:19; contexto judicial de la defensa de Pablo
translation_notes:
  revision_awareness: La versión inglesa revisada cambió formas pasadas por presentes para reflejar más de cerca el griego directo. En español, el contraste se reproduce mejor con una construcción modal en pasado («deberían haber estado») y un condicional implícito en la segunda cláusula («si tuvieran»), manteniendo la fuerza legal y la relación temporal del original.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» fuera del verso porque no aparecen en el texto; no se introdujo terminología eclesiástica ajena al contexto.
  - Se preservó el registro forense con verbos de comparecencia y acusación, en lugar de suavizarlo a una formulación general.
  - La nota sobre «Asia» aclara el referente provincial sin recargar el cuerpo principal.
  - La nota alternativa sobre «acusarme» conserva la posible equivalencia jurídica de κατηγορεῖν.
