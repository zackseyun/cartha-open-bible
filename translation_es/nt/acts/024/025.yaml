base_translation:
  language: en
  yaml_path: translation/nt/acts/024/025.yaml
  text: But as he was discussing righteousness and self-control and the coming judgment[a], Felix became afraid and answered, “For the present, go away. When I get an opportunity[b], I will summon you.”
  footnotes:
