    issue: δικαιοσύνη se tradujo como «justicia» en el texto principal
    rationale: El expediente inglés documenta como elección principal ‘righteousness’, con ‘justice’ solo como alternativa de nota. En este contexto de exhortación moral ante Félix, «rectitud» preserva mejor la fuerza ética principal y mantiene «justicia» como alternativa judicial en nota.
  - severity: low
    issue: Pronombre explícito innecesario en «mientras él hablaba»
    rationale: El griego solo requiere el referente; en español suena más natural «Mientras hablaba» sin pérdida de claridad.
  - severity: low
    issue: «Se atemorizó» suena algo tieso
    rationale: No es incorrecto, pero una formulación más idiomática como «se llenó de temor» podría sonar más natural. Aun así, no es imprescindible cambiarla si se prefiere mínima intervención.
