translation:
  language: es
  text: 'Pero mientras hablaba acerca de rectitud[a], dominio propio y del juicio venidero[b], Félix se atemorizó y respondió: «Por el momento, vete; cuando tenga oportunidad, te haré llamar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» para «rectitud» (δικαιοσύνη). El término griego puede abarcar tanto la rectitud moral como la justicia en sentido judicial.
    reason: lexical_alternative
  - marker: b
    text: O «el juicio que viene».
    reason: alternative_reading
lexical_decisions:
- source_word: διαλεγομένου
  english_pob_choice: was discussing
  chosen_spanish: hablaba acerca de
  alternatives_spanish:
  - discurría acerca de
  - dialogaba acerca de
  lexicon: BDAG
  rationale: El participio expresa discurso en curso; «hablaba acerca de» conserva la continuidad del intercambio sin sonar forzado en español y mantiene un registro natural y digno.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: BDAG
  rationale: Aunque el POB inglés privilegia «righteousness», en español «justicia» comunica mejor el campo semántico de δικαιοσύνη en este contexto y preserva su alcance moral y judicial. Se mantiene la tensión lexical sin cerrarla a una sola dimensión.
- source_word: ἐγκρατείας
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  lexicon: BDAG
  rationale: «Dominio propio» es una expresión clara, natural y suficientemente amplia para ἐγκράτεια. «Templanza» es tradicional pero más restringida; «autocontrol» es válida, pero menos idiomática en registro bíblico formal.
- source_word: τοῦ κρίματος τοῦ μέλλοντος
  english_pob_choice: the coming judgment
  chosen_spanish: el juicio venidero
  alternatives_spanish:
  - el juicio que viene
  - el juicio futuro
  lexicon: BDAG
  rationale: «Juicio venidero» conserva la idea de un juicio aún por venir y su tono escatológico. «Juicio que viene» es más coloquial; «juicio futuro» suena más abstracto y menos natural en español bíblico.
- source_word: ἔμφοβος γενόμενος
  english_pob_choice: became afraid
  chosen_spanish: se atemorizó
  alternatives_spanish:
  - tuvo miedo
  - se asustó
  lexicon: BDAG
  rationale: El giro verbal expresa entrada en un estado de temor. «Se atemorizó» refleja con precisión ese cambio de estado y conserva la gravedad del momento.
- source_word: Τὸ νῦν ἔχον
  english_pob_choice: For the present
  chosen_spanish: Por el momento
  alternatives_spanish:
  - por ahora
  - por el presente
  lexicon: BDAG
  rationale: La expresión idiomática señala una postergación temporal. «Por el momento» suena natural y formal en español, y corresponde bien al valor de «for the present» del POB revisado.
- source_word: πορεύου
  english_pob_choice: go away
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - retírate
  lexicon: BDAG
  rationale: El imperativo funciona como una desestimación inmediata del interlocutor. «Vete» transmite esa fuerza de manera breve y directa; «retírate» sería más formal, pero menos espontáneo aquí.
- source_word: καιρὸν ... μεταλαβὼν
  english_pob_choice: When I get an opportunity
  chosen_spanish: cuando tenga oportunidad
  alternatives_spanish:
  - cuando encuentre un momento oportuno
  - cuando tenga una ocasión favorable
  lexicon: BDAG
  rationale: La combinación expresa la obtención de un tiempo favorable. «Cuando tenga oportunidad» conserva la idea de una ocasión conveniente sin recargar el texto.
- source_word: μετακαλέσομαί σε
  english_pob_choice: I will summon you
  chosen_spanish: te haré llamar
  alternatives_spanish:
  - te llamaré
  - te mandaré llamar
  lexicon: BDAG
  rationale: En un contexto judicial, la futura llamada de regreso se expresa con naturalidad mediante «te haré llamar». Preserva la iniciativa de Félix sin sonar demasiado técnico o administrativo.
theological_decisions:
- issue: δικαιοσύνη en un contexto moral y judicial
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El POB inglés deja constancia de la alternativa «justice» para δικαιοσύνη. En español, «justicia» conserva mejor esa doble resonancia moral/judicial sin perder la gravedad ética del discurso de Pablo.
  doctrine_reference: 'DOCTRINE.md — contested terms: δικαιοσύνη; preserve moral and judicial overtones'
- issue: τοῦ κρίματος τοῦ μέλλοντος y su alcance escatológico
  english_pob_reading: the coming judgment
  chosen_spanish_reading: el juicio venidero
  alternative_spanish_readings:
  - el juicio que viene
  - el juicio futuro
  rationale: Se mantiene el sentido de un juicio todavía por venir, no simplemente una evaluación abstracta. La formulación elegida conserva la carga escatológica del texto y su función retórica en la reacción de Félix.
  doctrine_reference: BDAG / contexto lucano-escatológico
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del POB inglés para Τὸ νῦν ἔχον: «For the present». También conserva la decisión del audit trail de mantener «the coming judgment» como lectura principal, mientras se documenta la alternativa «the judgment to come».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra sustitución devocional porque no aparece el nombre divino en este versículo.
  - «Justicia» se usa aquí con su doble alcance moral/judicial; la nota preserva la alternativa «rectitud» para no borrar la tensión lexical.
  - «Juicio venidero» mantiene el valor de futuro inminente del participio μέλλοντος.
  - El tono de «te haré llamar» refleja un contexto forense sin introducir formalismos ajenos al español bíblico actual.
