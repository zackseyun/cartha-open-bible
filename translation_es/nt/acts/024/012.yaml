  text: καὶ οὔτε ἐν τῷ ἱερῷ εὗρόν με πρός τινα διαλεγόμενον ἢ ⸀ἐπίστασιν ποιοῦντα ὄχλου οὔτε ἐν ταῖς συναγωγαῖς οὔτε κατὰ τὴν πόλιν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/012.yaml
  text: And they found me neither in the temple arguing with anyone nor stirring up a crowd[b][a], neither in the synagogues nor throughout the city.
  footnotes:
  - marker: a
    text: Or 'disputing with anyone' or 'discussing with anyone.' The Greek verb can denote reasoning or debating; here the context favors a more adversarial sense because Paul is denying charges of public disturbance.
    reason: lexical_alternative
  - marker: b
    text: Or 'causing a crowd to gather.' The Greek expression refers to creating a public disturbance, but does not necessarily imply a full riot.
    reason: lexical_alternative
