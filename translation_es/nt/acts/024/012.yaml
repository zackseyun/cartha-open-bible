translation:
  language: es
  text: Y no me hallaron ni en el templo discutiendo con nadie[a] ni alborotando a una multitud[b], ni en las sinagogas ni por toda la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disputando con nadie» o «conversando con nadie». El verbo griego puede denotar razonar o debatir; aquí el contexto favorece un sentido más adversarial porque Pablo está negando cargos de alteración pública.
    reason: lexical_alternative
  - marker: b
    text: O «causando que se reuniera una multitud». La expresión griega se refiere a producir una perturbación pública, pero no necesariamente implica un motín completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερῷ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - recinto del templo
  - santuario
  lexicon: BDAG
  rationale: ἱερόν en este contexto se refiere al complejo del templo, no al Lugar Santísimo. «Templo» es el equivalente natural y más transparente en español, y conserva el alcance amplio del término.
- source_word: εὗρόν με
  english_pob_choice: they found me
  chosen_spanish: me hallaron
  alternatives_spanish:
  - me encontraron
  - me descubrieron
  lexicon: BDAG
  rationale: El aoristo con complemento de objeto en un contexto forense pide una formulación directa. «Me hallaron» es idiomático en español bíblico actual y conserva la idea de constatación/ubicación por parte de los acusadores.
- source_word: πρός τινα διαλεγόμενον
  english_pob_choice: arguing with anyone
  chosen_spanish: discutiendo con nadie
  alternatives_spanish:
  - disputando con nadie
  - conversando con nadie
  - debatiendo con nadie
  lexicon: BDAG
  rationale: διαλέγομαι puede significar conversar, razonar o debatir; aquí, por el contexto de defensa contra cargos de alteración pública, la fuerza es polémica. En español, «discutiendo» expresa bien esa tensión sin volver más fuerte de lo que el griego exige. «Con nadie» refleja la negativa de οὔτε ... πρός τινα en estilo natural.
- source_word: ἐπίστασιν ποιοῦντα ὄχλου
  english_pob_choice: stirring up a crowd
  chosen_spanish: provocando una agitación de gente
  alternatives_spanish:
  - causando que se reuniera una multitud
  - incitando a una turba
  - levantando a la gente
  lexicon: BDAG
  rationale: La expresión denota producir una agitación o disturbio de carácter público. «Agitación de gente» conserva el sustantivo de acción y evita intensificarlo indebidamente como «motín» o «turba». «Provocando» refleja bien el aspecto causativo de ποιοῦντα.
- source_word: ὄχλου
  english_pob_choice: a crowd
  chosen_spanish: gente
  alternatives_spanish:
  - una multitud
  - una muchedumbre
  - una turba
  lexicon: BDAG
  rationale: Aunque ὄχλος suele ser «multitud» o «gente», en esta construcción el énfasis recae en la agitación pública más que en la masa como tal. «Gente» mantiene naturalidad en español y evita añadir un matiz demasiado violento como «turba».
- source_word: συναγωγαῖς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  lexicon: BDAG
  rationale: Equivalente estándar y claro para συναγωγή en este marco judío.
- source_word: κατὰ τὴν πόλιν
  english_pob_choice: throughout the city
  chosen_spanish: por toda la ciudad
  alternatives_spanish:
  - en toda la ciudad
  - a lo largo de la ciudad
  - por la ciudad
  lexicon: BDAG
  rationale: κατά con acusativo puede expresar distribución o extensión por un área. «Por toda la ciudad» reproduce esa dispersión espacial de forma natural en español.
theological_decisions:
- issue: Alcance de ἱερῷ
  english_pob_reading: temple = temple complex/precincts, not the inner sanctuary specifically
  chosen_spanish_reading: templo = complejo o recinto del templo, no el santuario interior
  alternative_spanish_readings:
  - santuario
  - recinto del templo
  rationale: No hay base para restringir ἱερόν al espacio más interior. El español «templo» permite el alcance amplio que exige el contexto procesal y narrativo.
  doctrine_reference: Ninguna; decisión léxico-contextual
- issue: Fuerza de la conducta negada
  english_pob_reading: arguing / stirring up a crowd = public disturbance, but not necessarily full riot
  chosen_spanish_reading: discutiendo con nadie ni provocando una agitación de gente = disputa pública sin afirmar motín
  alternative_spanish_readings:
  - debatiendo con nadie ni incitando a una multitud
  - disputando con nadie ni causando disturbio
  rationale: El griego y el audit trail inglés apuntan a una acusación de perturbación pública, pero sin exigir la idea plena de motín. La versión española conserva esa tensión sin sobrerretraducir hacia «motín» o «rebelión».
  doctrine_reference: Ninguna; decisión forense-contextual
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del audit trail inglés. La redacción española sigue la lectura forense de la negación acumulativa (ni... ni... ni...) y conserva la distinción entre discusión polémica y agitación pública, sin intensificar indebidamente ἐπίστασις a «motín».
  spanish_consistency_notes:
  - Se mantuvo la secuencia negativa reforzada por «ni ... ni ... ni ...» para reflejar οὔτε ... οὔτε ... οὔτε ...
  - Se prefirió «templo» por el alcance amplio de ἱερόν en Hechos.
  - «Sinagogas» y «ciudad» se conservaron en plural/singular conforme al griego y al uso español natural.
  - La expresión «por toda la ciudad» preserva la idea distributiva de κατὰ τὴν πόλιν.
