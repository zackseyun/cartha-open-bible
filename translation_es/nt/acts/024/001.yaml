translation:
  language: es
  text: Después de cinco días, el sumo sacerdote Ananías bajó con algunos ancianos y cierto orador[a] llamado Tértulo, y ellos presentaron cargos contra Pablo ante el gobernador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abogado llamado Tértulo»; la palabra griega puede referirse a un orador público o a un portavoz legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ πέντε ἡμέρας
  english_pob_choice: Now after five days
  chosen_spanish: Al cabo de cinco días
  alternatives_spanish:
  - Después de cinco días
  - Cinco días después
  lexicon: BDAG
  rationale: μετά con acusativo expresa tiempo transcurrido; en español, «al cabo de» comunica bien el lapso cumplido sin sonar rígido. Se omite un equivalente explícito de δέ porque el giro narrativo queda natural con la apertura temporal.
- source_word: κατέβη
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino
  lexicon: BDAG
  rationale: καταβαίνω conserva la idea espacial de descender. «Descendió» mantiene ese sentido y funciona en español culto; además, armoniza con el movimiento desde Jerusalén hacia Cesarea implícito en el contexto.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: BDAG
  rationale: ἀρχιερεύς designa el oficio judío específico del sumo sacerdote. En español bíblico actual, «sumo sacerdote» es el equivalente más claro y fiel.
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  lexicon: Transliteration
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: μετὰ πρεσβυτέρων τινῶν
  english_pob_choice: with some elders
  chosen_spanish: con algunos ancianos
  alternatives_spanish:
  - con ciertos ancianos
  - con algunos de los ancianos
  lexicon: BDAG
  rationale: πρεσβύτεροι aquí refiere a líderes judíos de edad/estatus, no necesariamente a «ancianos» eclesiales. «Ancianos» conserva el valor lexical y es natural en español; τινῶν se refleja con «algunos».
- source_word: ῥήτορος Τερτύλλου τινός
  english_pob_choice: a certain orator named Tertullus
  chosen_spanish: un cierto orador llamado Tértulo
  alternatives_spanish:
  - un abogado llamado Tértulo
  - un defensor llamado Tértulo
  - un cierto retórico llamado Tértulo
  lexicon: BDAG
  rationale: ῥήτωρ puede referirse a un orador público o a un portavoz jurídico. Se mantiene «orador» para conservar la amplitud léxica documentada por el POB en inglés; «llamado» vuelve natural la aposición. τινός se vierte con «un cierto» para reproducir la indefinición.
- source_word: οἵτινες
  english_pob_choice: and they
  chosen_spanish: y ellos
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: BDAG
  rationale: La relativa griega introduce al grupo como sujeto de la acción siguiente. «Y ellos» es claro en español narrativo y mantiene el referente plural sin sobrecargar la sintaxis.
- source_word: ἐνεφάνισαν
  english_pob_choice: brought charges
  chosen_spanish: presentaron acusaciones
  alternatives_spanish:
  - formularon cargos
  - denunciaron
  - presentaron el caso
  lexicon: BDAG
  rationale: En contexto legal, ἐμφανίζω implica hacer una denuncia formal o presentar cargos. «Presentaron acusaciones» comunica bien la acción judicial sin introducir un tecnicismo demasiado estrecho.
- source_word: τῷ ἡγεμόνι
  english_pob_choice: before the governor
  chosen_spanish: ante el gobernador
  alternatives_spanish:
  - al gobernador
  - delante del gobernador
  lexicon: BDAG
  rationale: ἡγεμών se refiere al gobernador romano. El dativo con verbo judicial en español se expresa naturalmente con «ante», que conserva la escena forense mejor que un simple «al».
- source_word: κατὰ τοῦ Παύλου
  english_pob_choice: against Paul
  chosen_spanish: contra Pablo
  alternatives_spanish:
  - en contra de Pablo
  - respecto de Pablo
  lexicon: BDAG
  rationale: κατά con genitivo en contexto judicial significa oposición o acusación contra alguien. «Contra Pablo» es la forma más directa y fiel en español.
translation_notes:
  revision_awareness: 'Se mantuvo el sentido del texto griego y la opción inglesa del POB para el marco legal: llegada del sumo sacerdote, acompañantes, y formulación de acusaciones ante el gobernador. No se observaron revisiones aplicadas en el pasaje fuente; el borrador español sigue el mismo contenido y decisiones léxicas principales con adaptación natural al español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó traducir ῥήτωρ como «abogado» para no estrechar indebidamente el alcance léxico documentado por el POB inglés.
  - «Ancianos» se mantiene por el valor histórico-judicial del contexto judío, no como terminología eclesial técnica.
