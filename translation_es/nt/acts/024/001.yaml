review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: marco temporal, descenso a Cesarea, identificación de Ananías como sumo sacerdote, acompañamiento de algunos ancianos y de Tértulo, y acción judicial contra Pablo ante el gobernador. Sin embargo, ἐνεφάνισαν κατὰ τοῦ Παύλου en contexto forense se expresa mejor en español con una formulación más idiomática como «presentaron cargos contra Pablo» que con «presentaron acusaciones».'
  spanish_quality_summary: El español es claro y digno, pero tiene pequeñas asperezas de naturalidad. «Descendió» suena algo calcado en este contexto narrativo; «bajó» es más natural. «Un cierto orador» es comprensible, pero en español bíblico general suena menos idiomático que «cierto orador». Además, el punto y coma antes de «y ellos» es innecesario. La frase puede fluir mejor sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sumo sacerdote», «Ananías», «Pablo» y «gobernador» están bien. «Ancianos» es aceptable para πρεσβυτέρων en este contexto judío no eclesial. «Orador» preserva la decisión léxica del POB, con nota alternativa adecuada hacia «abogado/portavoz legal».
  issues:
  - severity: medium
    issue: «presentaron acusaciones» es poco idiomático para ἐνεφάνισαν ... κατὰ τοῦ Παύλου
    rationale: El verbo griego tiene fuerza judicial de presentar un caso o cargos. En español jurídico-natural, «presentaron cargos contra Pablo» o «acusaron a Pablo» comunica mejor esa fuerza que «presentaron acusaciones».
  - severity: low
    issue: «descendió» suena algo rígido o calcado
    rationale: Aunque conserva el matiz de κατέβη, en español narrativo «bajó» suele sonar más natural sin perder el sentido direccional.
  - severity: low
    issue: «un cierto orador» es menos idiomático que «cierto orador»
    rationale: τινός puede reflejarse naturalmente en español con «cierto», sin necesidad del artículo indefinido duplicando la indefinición.
  - severity: low
    issue: La nota [a] no preserva la alternativa principal del inglés auditado
    rationale: La nota inglesa ofrece una alternativa léxica para ῥήτωρ («advocate»), pero la nota española actual se concentra en la frase temporal. La ambigüedad léxica más relevante a preservar aquí es la de «orador/abogado».
  revised_spanish_text: Después de cinco días, el sumo sacerdote Ananías bajó con algunos ancianos y cierto orador[a] llamado Tértulo, y ellos presentaron cargos contra Pablo ante el gobernador.
  revised_footnotes:
  - marker: a
    text: O «abogado llamado Tértulo»; la palabra griega puede referirse a un orador público o a un portavoz legal.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para mejorar la naturalidad y reflejar mejor las decisiones léxicas auditadas: «Después de cinco días» simplifica el arranque temporal; «bajó» mantiene κατέβη con español más natural; «cierto orador» expresa mejor τινός; y «presentaron cargos contra Pablo» comunica con más precisión la fuerza judicial de ἐνεφάνισαν κατὰ τοῦ Παύλου. La nota se traslada a «orador» para preservar la alternativa léxica documentada en el POB inglés.'
