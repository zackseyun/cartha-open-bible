translation:
  language: es
  text: Pero, para no detenerlo[a] por más tiempo, le ruego que nos escuche brevemente con su cortesía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «retenerlo por más tiempo». El verbo griego puede significar impedir, demorar o retener; aquí se refiere a no prolongar más el tiempo del gobernador.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «con su clemencia» o «con su benignidad». El término griego puede denotar cortesía, moderación o indulgencia, especialmente en un contexto judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ μὴ
  english_pob_choice: But, so that ... not
  chosen_spanish: Pero, para no ...
  alternatives_spanish:
  - Pero, a fin de no ...
  - Mas, para no ...
  lexicon: BDAG
  rationale: Conserva el giro consecutivo/perspectivo del griego y el leve contraste de δέ. En español, «para no» expresa con naturalidad la finalidad negativa sin forzar un calco como «para que no» cuando sigue un infinitivo.
- source_word: ἐπὶ πλεῖόν
  english_pob_choice: any further / any longer
  chosen_spanish: más tiempo
  alternatives_spanish:
  - por más tiempo
  - más allá
  - todavía más
  lexicon: BDAG
  rationale: El contexto es judicial y se trata de no prolongar la audiencia. «Más tiempo» comunica el valor idiomático de prolongación con naturalidad en español y mantiene la idea de duración, no de cantidad abstracta.
- source_word: σε ἐγκόπτω
  english_pob_choice: I may not detain you
  chosen_spanish: detenerlo
  alternatives_spanish:
  - retenerlo
  - estorbarlo
  - interrumpirlo
  lexicon: BDAG
  rationale: ἐγκόπτω aquí no es «interrumpir» sino causar demora o retención del tiempo del gobernador. «Detenerlo» reproduce ese sentido de forma clara y formal en español.
- source_word: παρακαλῶ
  english_pob_choice: I beg you
  chosen_spanish: le ruego
  alternatives_spanish:
  - le pido
  - le suplico
  - le imploro
  lexicon: BDAG
  rationale: En el contexto forense y deferente, παρακαλῶ expresa una súplica respetuosa. «Le ruego» conserva el tono formal sin sonar artificial.
- source_word: ἀκοῦσαί σε ἡμῶν
  english_pob_choice: to hear us
  chosen_spanish: que nos escuche
  alternatives_spanish:
  - que nos oiga
  - que nos conceda escucharnos
  - que nos atienda
  lexicon: BDAG
  rationale: El infinitivo de propósito con objeto en genitivo se expresa de manera natural en español como petición indirecta. «Nos escuche» preserva el sentido legal de audiencia sin añadir más de lo que el griego dice.
- source_word: συντόμως
  english_pob_choice: briefly
  chosen_spanish: brevemente
  alternatives_spanish:
  - en breve
  - con brevedad
  - en pocas palabras
  lexicon: BDAG
  rationale: «Brevemente» es el equivalente más directo y idiomático para la duración limitada de la exposición.
- source_word: τῇ σῇ ἐπιεικείᾳ
  english_pob_choice: in your courtesy / in your graciousness
  chosen_spanish: con su cortesía[c]
  alternatives_spanish:
  - con su clemencia
  - con su benignidad
  - según su equidad
  lexicon: BDAG
  rationale: ἐπιείκεια puede abarcar cortesía, moderación, clemencia o indulgencia. En esta petición a un gobernador, «con su cortesía» reproduce el tono deferente y natural del español moderno; la alternativa judicial de «clemencia» se preserva en nota por ser plausible en el contexto forense.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego y el auditable inglés POB, incorporando la revisión que prefirió un matiz de retención/demora para ἐγκόπτω y una fórmula más natural para ἐπιείκεια en un encabezamiento judicial respetuoso. Se optó por una formulación española directa y publicable, sin cargarla con tecnicismos innecesarios.
  spanish_consistency_notes:
  - Se mantiene «Pero» para reflejar el leve contraste de δέ, en vez de un conector más fuerte.
  - «Le ruego» conserva el tono deferente de παρακαλῶ en un discurso ante autoridad.
  - «Nos escuche» mantiene la fuerza de petición de audiencia sin convertirla en una paráfrasis explicativa.
  - «Cortesía» preserva el matiz relacional y social de ἐπιείκεια; la nota ofrece «clemencia» como alternativa judicial relevante.
