review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la circunstancia temporal de Διετίας ... πληρωθείσης, el relevo administrativo de ἔλαβεν διάδοχον, la motivación causal de θέλων, y la acción final de κατέλιπε ... δεδεμένον. También conserva correctamente la ambigüedad de χάριτα καταθέσθαι mediante nota. Sin embargo, «encadenado» es más específico que δεδεμένον, que significa de modo más general «atado / sujeto / preso en ligaduras» y el rastro inglés eligió «bound» precisamente para evitar esa sobredeterminación.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis funciona bien y la nota es útil. Aun así, «dejó a Pablo encadenado» introduce una imagen concreta de cadenas que el griego no exige; «dejó a Pablo atado» o «dejó a Pablo preso» evitarían ese exceso, pero «atado» se acerca mejor al valor léxico de δεδεμένον manteniendo sobriedad. También conviene simplificar un poco la puntuación alrededor de «como Félix quería».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien en español («Félix», «Porcio Festo»). La decisión sobre χάρις como «favor» está alineada con el POB auditado y la nota preserva la alternativa semántica. La única desalineación relevante es que δεδεμένον no debe concretarse como «encadenado» sin evidencia contextual adicional.
  issues:
  - severity: medium
    issue: «encadenado» sobretraduce δεδεμένον
    rationale: El participio perfecto pasivo δεδεμένον significa «atado/bound» y el audit trail inglés escogió «bound» para no especificar más de lo que dice el texto. «Encadenado» añade la idea concreta de cadenas, más estrecha que el griego.
  - severity: low
    issue: Puntuación algo cargada en «y, como Félix quería»
    rationale: La coma tras «y» no es necesaria y puede sentirse pesada en español bíblico fluido. «Y como Félix quería...» o simplemente «y, como quería Félix...» serían más naturales; la primera es la opción más sencilla.
  revised_spanish_text: Pero cuando se cumplieron dos años, Félix fue sucedido por Porcio Festo; y como Félix quería hacerles un favor a los judíos[a], dejó a Pablo atado.
  revised_footnotes:
  - marker: a
    text: O «ganarse la buena voluntad de los judíos». El giro griego puede significar tanto hacerles un favor como buscar su favor.
    reason: lexical_alternative
  revision_rationale: Se ajusta δεδεμένον de «encadenado» a «atado» para no especificar más de lo que afirma el griego y para alinearse con la decisión auditada «bound». También se aligera la puntuación quitando la coma tras «y».
