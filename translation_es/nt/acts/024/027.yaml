  text: Διετίας δὲ πληρωθείσης ἔλαβεν διάδοχον ὁ Φῆλιξ Πόρκιον Φῆστον· θέλων τε ⸀χάριτα καταθέσθαι τοῖς Ἰουδαίοις ὁ Φῆλιξ κατέλιπε τὸν Παῦλον δεδεμένον.
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/027.yaml
  text: But when two years had been completed[a], Felix was succeeded by Porcius Festus; and because Felix wanted to do the Jews a favor, he left Paul bound.
  footnotes:
