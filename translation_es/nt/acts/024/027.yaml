revisions:
- from: Pero cuando se cumplieron dos años, Félix fue sucedido por Porcio Festo; y, como Félix quería hacerles un favor a los judíos[a], dejó a Pablo encadenado.
  to: Pero cuando se cumplieron dos años, Félix fue sucedido por Porcio Festo; y como Félix quería hacerles un favor a los judíos[a], dejó a Pablo atado.
  rationale: Se ajusta δεδεμένον de «encadenado» a «atado» para no especificar más de lo que afirma el griego y para alinearse con la decisión auditada «bound». También se aligera la puntuación quitando la coma tras «y».
  reviewer_model: gpt-5.4
