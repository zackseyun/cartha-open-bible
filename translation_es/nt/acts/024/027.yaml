translation:
  language: es
  text: Pero cuando se cumplieron dos años, Félix fue sucedido por Porcio Festo; y como Félix quería hacerles un favor a los judíos[a], dejó a Pablo atado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ganarse la buena voluntad de los judíos». El giro griego puede significar tanto hacerles un favor como buscar su favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διετίας ... πληρωθείσης
  english_pob_choice: when two years had been completed
  chosen_spanish: cuando se cumplieron dos años
  alternatives_spanish:
  - después de que pasaron dos años
  - cuando se cumplió un período de dos años
  lexicon: BDAG
  rationale: El genitivo absoluto señala una circunstancia temporal. En español, «se cumplieron dos años» conserva la idea de duración completada con una construcción natural y fiel al griego.
- source_word: ἔλαβεν διάδοχον
  english_pob_choice: was succeeded by
  chosen_spanish: fue sucedido por
  alternatives_spanish:
  - recibió como sucesor a
  - tuvo como sucesor a
  lexicon: BDAG
  rationale: El valor idiomático del griego expresa cambio de cargo o administración. «Fue sucedido por» mantiene ese sentido de manera clara y sobria en español.
- source_word: Πόρκιον Φῆστον
  english_pob_choice: Porcius Festus
  chosen_spanish: Porcio Festo
  alternatives_spanish:
  - Porcio Festo
  - Pórcio Festo
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran siguiendo la convención usual en español bíblico. «Porcio Festo» es transparente y legible para el lector.
- source_word: θέλων
  english_pob_choice: because Felix wanted
  chosen_spanish: como Félix quería
  alternatives_spanish:
  - porque Félix quería
  - Félix, queriendo
  lexicon: BDAG
  rationale: El participio expresa la motivación de la acción principal. «Como Félix quería» comunica esa relación causal sin forzar una estructura demasiado literal.
- source_word: χάριτα καταθέσθαι
  english_pob_choice: to do the Jews a favor
  chosen_spanish: hacerles un favor
  alternatives_spanish:
  - concederles un favor
  - ganarse el favor de ellos
  lexicon: BDAG
  rationale: La expresión es idiomática y admite más de una lectura. En español, «hacerles un favor» refleja bien el sentido adoptado por la revisión inglesa reciente, sin perder la posibilidad de que la frase también apunte a buscar su buena voluntad.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - con los judíos
  - para los judíos
  lexicon: BDAG
  rationale: 'El dativo encaja naturalmente con la construcción española de beneficio indirecto: «hacerles un favor a los judíos».'
- source_word: κατέλιπε
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - lo dejó
  lexicon: BDAG
  rationale: El verbo indica que Félix dejó a Pablo en la misma condición al finalizar su mandato. «Dejó» es suficiente y fiel al contexto.
- source_word: δεδεμένον
  english_pob_choice: bound
  chosen_spanish: encadenado
  alternatives_spanish:
  - atado
  - preso
  lexicon: BDAG
  rationale: El participio perfecto pasivo destaca el estado continuado de Pablo. «Encadenado» expresa con naturalidad ese estado de sujeción física en español; «atado» sería más general, pero menos preciso.
theological_decisions:
- issue: 'χάριτα καταθέσθαι: favor otorgado o favor buscado'
  english_pob_reading: The Greek expression can mean either to bestow a favor on them or to secure their goodwill.
  chosen_spanish_reading: La frase puede significar tanto hacerles un favor como ganarse su buena voluntad.
  alternative_spanish_readings:
  - ganarse el favor de los judíos
  - darles un beneficio a los judíos
  rationale: La expresión griega es semánticamente ambigua y la revisión inglesa mantuvo esa tensión. En español se conserva en el texto principal con «hacerles un favor», y la nota preserva la alternativa de «ganarse su buena voluntad» para no cerrar indebidamente el sentido.
  doctrine_reference: Hechos 24:27; BDAG χάρις, κατατίθημι
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió la lectura natural «do the Jews a favor» para χάριτα καταθέσθαι, pero conserva en español la ambigüedad útil del griego mediante una nota alternativa. También mantiene el sentido temporal completado, el cambio de autoridad y el estado continuo de Pablo.
  spanish_consistency_notes:
  - Se usa «Félix» y «Porcio Festo» como transliteraciones consistentes con español bíblico.
  - Se prefirió «judíos» en minúscula por tratarse del pueblo en sentido etnorreligioso, no de una fiesta ni nombre propio.
  - «Encadenado» mantiene el estado de sujeción sin sobreinterpretar la forma exacta de la restricción.
