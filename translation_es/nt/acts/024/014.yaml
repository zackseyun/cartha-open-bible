translation:
  language: es
  text: 'Pero te confieso esto: que, según el Camino, que ellos llaman secta[a], así adoro al Dios de nuestros padres[b], creyendo todo lo que está escrito en la Ley y en los Profetas,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «partido». El término griego puede denotar una facción o secta; «herejía» sería engañoso y anacrónico aquí.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el Dios ancestral/paterno»; el sentido es el Dios adorado por los padres de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογῶ
  english_pob_choice: I confess
  chosen_spanish: confieso
  alternatives_spanish:
  - admito
  - reconozco
  lexicon: BDAG
  rationale: «Confieso» conserva el tono formal y forense del verbo en contexto judicial, sin sugerir una admisión de culpa que «admito» podría insinuar en español.
- source_word: κατὰ τὴν ὁδόν
  english_pob_choice: according to the Way
  chosen_spanish: según el Camino
  alternatives_spanish:
  - de acuerdo con el Camino
  - siguiendo el Camino
  lexicon: BDAG
  rationale: Se mantiene «el Camino» como designación histórica del movimiento cristiano primitivo. «Según» comunica bien la idea de conformidad o alineación del griego κατά en este contexto.
- source_word: αἵρεσιν
  english_pob_choice: sect
  chosen_spanish: secta
  alternatives_spanish:
  - partido
  - herejía
  lexicon: BDAG
  rationale: Aquí αἵρεσις describe la etiqueta polémica aplicada por los opositores, no la noción técnica posterior de «herejía». «Secta» es el equivalente más natural y evita anacronismo.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: BDAG
  rationale: «Así» conserva la relación adverbial de modo entre la mención del Camino y la acción de servir.
- source_word: λατρεύω
  english_pob_choice: I worship
  chosen_spanish: sirvo
  alternatives_spanish:
  - adoro
  - rindo culto
  lexicon: BDAG
  rationale: El verbo griego incluye servicio cultual a Dios. En español, «sirvo» preserva el sentido de culto/servicio religioso y evita restringirlo demasiado a una sola emoción devocional; el contexto ya expresa el contenido religioso.
- source_word: τῷ πατρῴῳ θεῷ
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - el Dios ancestral
  - el Dios de nuestros padres
  lexicon: BDAG
  rationale: La expresión griega es literalmente «el Dios paterno/ancestral». En español, «el Dios de mis padres» comunica con claridad la continuidad con la fe de Israel y refleja el trasfondo comunitario/judío del enunciado. «Mis» se ajusta al habla directa de Pablo en primera persona.
- source_word: πιστεύων
  english_pob_choice: believing
  chosen_spanish: creyendo
  alternatives_spanish:
  - al creer
  - mientras creo
  lexicon: BDAG
  rationale: El participio presente explica el modo de su servicio. «Creyendo» reproduce esa relación participial sin recargar la sintaxis.
- source_word: πᾶσι τοῖς ... γεγραμμένοις
  english_pob_choice: everything written
  chosen_spanish: todo lo que está escrito
  alternatives_spanish:
  - todo lo escrito
  - todas las cosas escritas
  lexicon: BDAG
  rationale: La construcción abarca el conjunto de lo que permanece escrito. «Todo lo que está escrito» es natural en español y mantiene la amplitud totalizante del griego.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - según la Ley
  - de acuerdo con la Ley
  lexicon: BDAG
  rationale: Aquí κατά funciona de manera relacional respecto al corpus escriturario; «en la Ley» refleja la referencia al contenido dentro del Pentateuco o la Torá como corpus.
- source_word: τοῖς ἐν τοῖς προφήταις γεγραμμένοις
  english_pob_choice: in the Prophets
  chosen_spanish: en los Profetas
  alternatives_spanish:
  - en los escritos proféticos
  - entre los Profetas
  lexicon: BDAG
  rationale: Se conserva la división escrituraria judía convencional «la Ley y los Profetas», y «en los Profetas» corresponde al paralelismo con «en la Ley».
theological_decisions:
- issue: Relación de Pablo con el judaísmo y el movimiento del Camino
  english_pob_reading: Paul presents worship 'according to the Way' as continuous with worship of Israel's ancestral God and belief in the Law and the Prophets.
  chosen_spanish_reading: Pablo presenta su culto «según el Camino» como continuo con el culto al Dios de sus padres y con la fe en la Ley y en los Profetas.
  alternative_spanish_readings:
  - Pablo contrapone el cristianismo al judaísmo como una religión separada.
  - Pablo se distancia de la fe de Israel al nombrar una secta distinta.
  rationale: 'El versículo afirma continuidad: el Camino no aparece como ruptura con el Dios ancestral de Israel ni con sus Escrituras. La traducción preserva esa tensión histórica sin resolverla hacia una separación posterior entre judaísmo y cristianismo.'
  doctrine_reference: 'Translation philosophy: primacía del texto original sobre la tradición de traducción; preservar la tensión teológica en vez de nivelarla.'
translation_notes:
  revision_awareness: La redacción sigue la revisión que sustituyó la puntuación explicativa por «que» para reflejar con más precisión ὅτι. También conserva la lectura de continuidad entre el Camino y la fe de Israel, con términos españoles naturales y auditablemente vinculados al griego.
  spanish_consistency_notes:
  - Se mantiene «Camino» con mayúscula como título del movimiento.
  - «Ley y Profetas» preserva la división escrituraria judía tradicional sin añadir glosas al texto principal.
  - «Sirvo» se usa para la carga cultual de λατρεύω en este contexto.
  - Los corchetes de notas aparecen solo donde hay notas ancladas en el texto.
