  text: ὁμολογῶ δὲ τοῦτό σοι ὅτι κατὰ τὴν ὁδὸν ἣν λέγουσιν αἵρεσιν οὕτως λατρεύω τῷ πατρῴῳ θεῷ, πιστεύων πᾶσι τοῖς κατὰ τὸν νόμον καὶ ⸂τοῖς ἐν⸃ τοῖς προφήταις γεγραμμένοις,
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/014.yaml
  text: But I confess this to you[a], that according to the Way, which they call a sect, so I worship the God of our fathers, believing everything written in the Law and in the Prophets[b],
  footnotes:
  - marker: a
    text: Or 'party.' The Greek word can denote a faction or sect; later English 'heresy' would be misleading here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the ancestral God'; the sense is the God worshiped by the fathers of Israel.
    reason: lexical_alternative
