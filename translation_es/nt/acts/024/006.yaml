translation:
  language: es
  text: Él incluso trató de profanar el templo[a], y lo apresamos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos añaden aquí una lectura más larga, incluyendo que querían juzgar a Pablo conforme a su ley y que Lisias, el comandante, lo sacó de sus manos.
    reason: textual_variant
lexical_decisions:
- source_word: ὃς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - quien
  lexicon: BDAG
  rationale: En español, como en el inglés POB, el relativo funciona mejor reexpresado con un pronombre retomador para una acusación forense breve. «Él» evita la rigidez de «quien» al inicio de la cláusula.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - y
  lexicon: BDAG
  rationale: El griego añade énfasis acusatorio. «Incluso» conserva ese matiz intensificador de forma natural en español.
- source_word: τὸ ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el recinto del templo
  - el santuario
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no solo el interior sagrado. «El templo» es la equivalencia más clara y fiel para una lectura pública; el sentido de complejo cultual queda suficientemente implicado.
- source_word: ἐπείρασεν
  english_pob_choice: tried
  chosen_spanish: trató de
  alternatives_spanish:
  - intentó
  - se propuso
  lexicon: BDAG
  rationale: El aoristo de πειράζω aquí expresa intento. «Trató de» reproduce bien ese valor verbal en español y combina naturalmente con el infinitivo siguiente.
- source_word: βεβηλῶσαι
  english_pob_choice: to defile
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - deshonrar
  lexicon: BDAG
  rationale: βεβηλόω significa profanar o hacer impuro lo sagrado. «Profanar» preserva mejor la fuerza religiosa y cultual que «contaminar» o «deshonrar».
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo retoma al mismo referente de manera directa. En español, «lo» es la forma más fluida y natural en esta construcción.
- source_word: ἐκρατήσαμεν
  english_pob_choice: we seized
  chosen_spanish: apresamos
  alternatives_spanish:
  - lo tomamos preso
  - lo arrestamos
  lexicon: BDAG
  rationale: κρατέω aquí tiene el sentido de sujetar o tomar bajo control. «Apresamos» conserva el matiz de acción directa y coercitiva, más cercano a «seized» que el más procedimental «arrestamos».
theological_decisions:
- issue: Lectura textual breve frente a la expansión bizantina en Hechos 24:6
  english_pob_reading: Translate only the SBLGNT clause ending with 'and we seized him,'
  chosen_spanish_reading: 'Traducir solo la cláusula breve del texto crítico: «... y lo apresamos,»'
  alternative_spanish_readings:
  - 'Añadir la expansión tradicional: «... y quisimos juzgarlo conforme a nuestra ley; pero Lisias, el comandante, vino y lo quitó de nuestras manos con gran fuerza»'
  rationale: La base griega proporcionada es la lectura breve. La expansión posterior no debe incorporarse al texto principal, aunque puede reconocerse como variante textual por transparencia auditiva y para orientar a lectores familiarizados con la tradición más larga.
  doctrine_reference: Crítica textual del Nuevo Testamento; prioridad del testimonio griego dado en el paquete fuente
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT proporcionado y mantiene la misma estructura acusatoria breve que la lectura inglesa auditada. No se incorporó la expansión textual más larga en el cuerpo principal; se conservó como nota textual.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν conforme al uso estándar y al alcance del término en el contexto.
  - «Profanar» conserva la tensión cultual de βεβηλόω sin suavizarla.
  - «Apresamos» reproduce un acto violento o coercitivo acorde con κρατέω en esta acusación.
  - La puntuación con coma final refleja que la cláusula queda abierta en el versículo siguiente.
