revisions:
- from: o acerca de esta sola declaración que proclamé[a] mientras estaba en medio de ellos, que es por la resurrección de los muertos que hoy se me juzga delante de ustedes[b].
  to: 'o acerca de esta sola afirmación[a] que grité mientras estaba entre ellos: «Por la resurrección de los muertos se me juzga hoy ante ustedes».[b]'
  rationale: Se corrige «proclamé» a «grité» para reflejar con fidelidad κράζω. Se reubica y reescribe la nota [a] para que corresponda a φωνῆς y preserve las alternativas documentadas sin mezclar términos distintos. También se mejora la naturalidad del español con una cita bien introducida y con «ante ustedes» como formulación judicial más idiomática.
