review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y mantiene el sentido judicial y doctrinal del griego, incluyendo el alcance general de «la resurrección de los muertos». Sin embargo, dos decisiones léxicas debilitan la fidelidad: ἐκέκραξα («grité/clamé») fue suavizado a «proclamé», y la nota [a] mezcla indebidamente alternativas para φωνῆς con alternativas verbales de ἐκέκραξα. También conviene ajustar la sintaxis española para que la cita suene más natural y clara.'
  spanish_quality_summary: El español es legible y digno, pero «esta sola declaración» suena algo forzado; «esta sola afirmación» o «esta sola declaración» puede funcionar, pero la combinación con «que proclamé» crea una elevación semántica no presente en el griego. «Hoy se me juzga delante de ustedes» es comprensible, aunque «hoy estoy siendo juzgado ante ustedes» o «hoy se me juzga ante ustedes» fluye mejor. La frase citada necesita mejor puntuación en español.
  glossary_alignment: No hay conflictos con los términos base del proyecto (Dios, Mesías, Yahvé, etc.). La decisión teológica de no restringir ἀναστάσεως νεκρῶν a la resurrección de Jesús está bien preservada. El principal desajuste está en el campo semántico de κράζω, donde debe mantenerse la fuerza de «gritar/clamar» más que «proclamar».
  issues:
  - severity: high
    issue: ἐκέκραξα fue traducido como «proclamé»
    rationale: κράζω denota un grito o clamor público y fuerte. «Proclamé» cambia el modo de emisión y atenúa la fuerza vocal explícita del original y del audit trail inglés («I shouted»).
  - severity: high
    issue: La nota [a] combina indebidamente alternativas de dos términos griegos distintos
    rationale: La nota está anclada tras «proclamé», pero habla también de «voz» como alternativa para φωνή. Según la disciplina del proyecto, las notas deben corresponder con precisión al punto anclado y no mezclar φωνῆς con ἐκέκραξα de manera confusa.
  - severity: medium
    issue: La puntuación de la cita es poco natural en español
    rationale: Después de «que» conviene introducir la cita con dos puntos o comillas españolas, para reflejar claramente el contenido del clamor de Pablo.
  - severity: low
    issue: «delante de ustedes» puede mejorarse a «ante ustedes»
    rationale: Ambas opciones son válidas, pero «ante ustedes» suena más natural en registro judicial y más conciso en español bíblico moderno.
  revised_spanish_text: 'o acerca de esta sola afirmación[a] que grité mientras estaba entre ellos: «Por la resurrección de los muertos se me juzga hoy ante ustedes».[b]'
