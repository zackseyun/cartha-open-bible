translation:
  language: es
  text: 'o acerca de esta sola afirmación[a] que grité mientras estaba entre ellos: «Por la resurrección de los muertos se me juzga hoy ante ustedes».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declaración», «clamor» o «voz»; el término griego puede referirse al enunciado mismo o a la voz/clamor con que fue expresado.
    reason: lexical_alternative
  - marker: b
    text: O «resurrección de entre los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῆς
  english_pob_choice: statement
  chosen_spanish: declaración
  alternatives_spanish:
  - proclamación
  - voz
  - grito
  lexicon: BDAG
  rationale: En este contexto, φωνή no describe simplemente un sonido, sino la expresión concreta que Pablo emitió. «Declaración» mantiene el valor de un dicho específico y suena natural en español, sin perder la referencia al acto de hablar.
- source_word: ἐκέκραξα
  english_pob_choice: I shouted
  chosen_spanish: proclamé
  alternatives_spanish:
  - grité
  - clamé
  - exclamé
  lexicon: BDAG
  rationale: κράζω implica una alocución fuerte y pública. «Proclamé» conserva el carácter abierto y solemne del dicho en un contexto forense, aunque «grité» también sería posible para enfatizar la intensidad vocal.
- source_word: ἐν αὐτοῖς ἑστὼς
  english_pob_choice: while standing among them
  chosen_spanish: mientras estaba en medio de ellos
  alternatives_spanish:
  - estando entre ellos
  - mientras estaba entre ellos
  - en medio de ellos, de pie
  lexicon: BDAG
  rationale: La frase participial indica la postura y ubicación de Pablo al hablar. «En medio de ellos» transmite con naturalidad el sentido espacial de ἐν αὐτοῖς, y «mientras estaba» preserva el valor circunstancial del participio.
- source_word: ἀναστάσεως νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de entre los muertos
  - resurrección de los muertos
  lexicon: BDAG
  rationale: La construcción genitiva expresa la resurrección perteneciente al ámbito de los muertos; en español, «resurrección de los muertos» es la forma más directa y fiel. Se conserva el alcance general del enunciado, sin restringirlo a la resurrección de Jesús.
- source_word: κρίνομαι
  english_pob_choice: I am being judged
  chosen_spanish: se me juzga
  alternatives_spanish:
  - estoy siendo juzgado
  - estoy en juicio
  - se me está juzgando
  lexicon: BDAG
  rationale: El presente pasivo señala una acción judicial en curso. «Se me juzga» mantiene la pasiva con naturalidad en español y encaja bien con el marco legal del pasaje.
- source_word: ἐφ’ ὑμῶν
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - en presencia de ustedes
  - por ustedes
  lexicon: BDAG
  rationale: En lenguaje judicial, ἐπί con genitivo puede señalar comparecencia ante una autoridad. «Delante de ustedes» comunica el matiz forense sin sugerir que solo ellos ejecutan el juicio.
- source_word: ἤ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - o más bien
  lexicon: BDAG
  rationale: La partícula enlaza este giro con la defensa previa. «O» preserva la simple conexión lógica sin introducir una interpretación más fuerte que la del griego.
- source_word: μιᾶς ταύτης
  english_pob_choice: this one
  chosen_spanish: esta sola
  alternatives_spanish:
  - esta única
  - esta sola y particular
  lexicon: BDAG
  rationale: El conjunto intensifica la singularidad y especificidad del elemento mencionado. «Esta sola» refleja bien ese énfasis en español.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: BDAG
  rationale: Adverbio temporal directo; «hoy» es la equivalencia normal y clara en español.
theological_decisions:
- issue: Alcance de la acusación disputada
  english_pob_reading: Paul frames the issue as the resurrection of the dead, without narrowing it to Jesus' resurrection alone in the main text.
  chosen_spanish_reading: Pablo presenta el asunto como la resurrección de los muertos, sin reducirlo en el texto principal a la resurrección de Jesús solamente.
  alternative_spanish_readings:
  - Pablo alude implícitamente solo a la resurrección de Jesús.
  - Pablo habla de la esperanza general de la resurrección, fundada en Cristo.
  rationale: La frase griega περὶ ἀναστάσεως νεκρῶν es general. La traducción debe conservar ese alcance amplio y no introducir una especificación cristológica que el versículo no expresa de forma explícita, aunque el conjunto de Hechos sí relacione el mensaje de Pablo con la resurrección de Jesús.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla anticipadamente.
translation_notes:
  revision_awareness: El texto sigue la lectura griega de SBLGNT y el audit trail inglés, sin cambios recientes indicados en la revisión más reciente; se conserva la formulación general del asunto judicial y del término sobre la resurrección.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «resurrección de los muertos» como formulación general, no «Cristo» ni una especificación a Jesús, porque el griego es genérico.
  - Se evita «siervo»/«esclavo» porque no hay δοῦλος en este pasaje.
  - La pasiva española «se me juzga» conserva mejor el matiz forense de κρίνομαι que una paráfrasis más libre.
