  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Pablo expresa una esperanza en Dios, compartida por sus interlocutores, de una futura resurrección de justos e injustos. También conserva adecuadamente la alternativa léxica de προσδέχονται en nota. Sin embargo, la formulación española introduce una expansión no necesaria con ''de que'', y ''va a haber'' suena algo coloquial para el registro buscado; además, ''estos mismos hombres'' es fiel pero puede simplificarse a ''estos mismos'' sin perder el referente forense ya claro en contexto.'
  spanish_quality_summary: 'El español es claro y comprensible, pero puede ganar dignidad y naturalidad bíblica con una leve revisión: ''que habrá una resurrección'' suena más sobrio que ''de que va a haber una resurrección''. También conviene suavizar ''la cual'' en una oración más fluida con ''la esperanza que''.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεόν se traduce correctamente como ''Dios''; ἀνάστασιν como ''resurrección''; δικαίων/ἀδίκων como ''justos/injustos''. La decisión de mantener ''aceptan'' con nota para ''aguardan'' está bien alineada con la auditoría inglesa.'
