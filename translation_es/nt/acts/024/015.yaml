translation:
  language: es
  text: teniendo esperanza en Dios, la esperanza que estos mismos también aceptan, que habrá una resurrección tanto de los justos como de los injustos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que estos mismos también aguardan'. El verbo puede significar 'aceptar' o 'aguardar/esperar con expectativa'; aquí probablemente subraya una expectativa compartida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίδα ἔχων
  english_pob_choice: having hope
  chosen_spanish: teniendo esperanza
  alternatives_spanish:
  - teniendo una esperanza
  - esperando
  lexicon: BDAG
  rationale: Mantiene la construcción participial y el sustantivo ἐλπίς sin volverla innecesariamente finita. 'Teniendo esperanza' suena natural en español y conserva la relación sintáctica con el contexto de Pablo.
- source_word: εἰς τὸν θεόν
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - hacia Dios
  - con respecto a Dios
  lexicon: BDAG
  rationale: Con ἐλπίς, εἰς indica dirección u objeto de la esperanza. 'En Dios' es la forma más idiomática en español y comunica bien la confianza dirigida a Dios.
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El relativo retoma 'esperanza'. 'La cual' permite conservar el vínculo anafórico con mayor claridad en una frase larga y juridicamente marcada.
- source_word: καὶ αὐτοὶ οὗτοι
  english_pob_choice: these men themselves also
  chosen_spanish: estos mismos hombres también
  alternatives_spanish:
  - ellos mismos también
  - aun estos hombres
  lexicon: BDAG
  rationale: 'Conserva los dos énfasis del griego: αὐτοὶ (''mismos'') y οὗτοι (''estos''). ''Hombres'' hace explícito el referente forense del pasaje y encaja con el tono del proceso.'
- source_word: προσδέχονται
  english_pob_choice: accept
  chosen_spanish: aceptan
  alternatives_spanish:
  - aguardan
  - esperan
  - aceptan y aguardan
  lexicon: BDAG
  rationale: En este contexto Pablo afirma una expectativa compartida; 'aceptan' refleja el matiz de reconocer o admitir esa esperanza. Se conserva en nota la alternativa 'aguardan', porque el verbo también puede significar esperar con expectativa.
- source_word: ἀνάστασιν
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - resurgimiento
  lexicon: BDAG
  rationale: Es el equivalente normal y preciso para el acontecimiento corporal de levantarse de entre los muertos en este contexto.
- source_word: μέλλειν ⸀ἔσεσθαι
  english_pob_choice: there is going to be
  chosen_spanish: va a haber
  alternatives_spanish:
  - habrá
  - está por haber
  lexicon: BDAG
  rationale: La construcción perifrástica expresa una futura realidad cierta. 'Va a haber' reproduce bien el valor prospectivo sin sugerir una inmediatez engañosa.
- source_word: δικαίων τε καὶ ἀδίκων
  english_pob_choice: of both the righteous and the unrighteous
  chosen_spanish: tanto de los justos como de los injustos
  alternatives_spanish:
  - de los justos y de los injustos
  - 'de ambos: los justos y los injustos'
  lexicon: BDAG
  rationale: '''Tanto... como...'' refleja τε καὶ y su equilibrio coordinado. ''Justos/injustos'' preserva la oposición moral del griego con español claro y reverente.'
theological_decisions:
- issue: Alcance moral de la resurrección
  english_pob_reading: a resurrection of both the righteous and the unrighteous
  chosen_spanish_reading: una resurrección tanto de los justos como de los injustos
  alternative_spanish_readings:
  - una resurrección general
  - una resurrección de justos e injustos
  rationale: El griego nombra explícitamente dos grupos. La traducción conserva esa amplitud sin armonizarla con sistemas doctrinales posteriores ni resolver el orden temporal o judicial del evento.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de προσδέχονται
  english_pob_reading: these men themselves also accept
  chosen_spanish_reading: estos mismos hombres también aceptan
  alternative_spanish_readings:
  - estos mismos hombres también aguardan
  - estos mismos hombres también esperan
  rationale: '''Aceptan'' sigue la lectura de la POB inglesa, que resalta la coincidencia de expectativa entre Pablo y sus interlocutores. Se preserva la tensión lexical, ya que el verbo también puede implicar aguardar con expectativa.'
  doctrine_reference: Lexical tension preserved via footnote.
translation_notes:
  revision_awareness: La versión española sigue de cerca la auditoría inglesa reciente sin calcarla mecánicamente. Se mantuvo la estructura participial, el doble énfasis de αὐτοὶ οὗτοι y la ambigüedad controlada de προσδέχονται mediante nota. No se añadieron elementos doctrinales ajenos al texto, y la formulación de la resurrección conserva el paralelismo moral explícito del griego.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεόν conforme al criterio general del proyecto.
  - Se usa 'resurrección' como término técnico estándar y transparente.
  - Se optó por 'justos/injustos' por claridad actual, manteniendo el contraste moral del original.
  - La puntuación con rayas largas reproduce la incisión explicativa del griego y del inglés auditado.
