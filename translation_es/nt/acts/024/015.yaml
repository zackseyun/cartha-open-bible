  - severity: low
    issue: '''la cual'' resulta algo rígido en español actual'
    rationale: Aunque fiel al relativo ἣν, en español eclesial moderno suena más natural 'la esperanza que...' o una construcción equivalente, manteniendo claridad anafórica.
