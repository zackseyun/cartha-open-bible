- from: teniendo esperanza en Dios—la cual estos mismos hombres también aceptan—de que va a haber una resurrección tanto de los justos como de los injustos[a].
  to: teniendo esperanza en Dios, la esperanza que estos mismos también aceptan, que habrá una resurrección tanto de los justos como de los injustos[a].
  rationale: La revisión preserva todas las decisiones exegéticas principales, pero mejora el registro y la naturalidad del español. Se reemplaza 'de que va a haber' por 'que habrá', más digno y directo. Se rehace el relativo para evitar la rigidez de 'la cual' sin perder la referencia a la esperanza compartida. La nota léxica se conserva con el mismo contraste entre 'aceptan' y 'aguardan'.
