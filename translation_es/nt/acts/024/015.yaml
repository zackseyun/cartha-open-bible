  revision_rationale: La revisión preserva todas las decisiones exegéticas principales, pero mejora el registro y la naturalidad del español. Se reemplaza 'de que va a haber' por 'que habrá', más digno y directo. Se rehace el relativo para evitar la rigidez de 'la cual' sin perder la referencia a la esperanza compartida. La nota léxica se conserva con el mismo contraste entre 'aceptan' y 'aguardan'.
