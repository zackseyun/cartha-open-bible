translation:
  language: es
  text: Pero[a] Lisias, el comandante, vino y lo sacó de nuestras manos con gran fuerza,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo, junto con el final del versículo 6 y el comienzo del versículo 8, falta en los manuscritos griegos más antiguos (incluidos el papiro 74 del siglo III y los códices Sinaítico y Vaticano del siglo IV) y en antiguas traducciones coptas. Se conserva en la tradición mayoritaria bizantina, en la tradición latina y en manuscritos griegos posteriores. Parece una expansión editorial temprana que narra la intervención del comandante romano antes de Félix.
    reason: textual_variant
lexical_decisions:
- source_word: παρελθὼν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  - vino y
  lexicon: BDAG
  rationale: El participio aoristo aquí introduce la intervención de Lisias en la narración; «vino» mantiene el avance narrativo natural en español sin volver demasiado pesado el giro verbal.
- source_word: χιλίαρχος
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - tribuno
  - capitán
  - oficial
  lexicon: BDAG
  rationale: «Comandante» comunica de forma clara la autoridad militar romana que el término designa, sin depender de un tecnicismo menos transparente para lectores modernos.
- source_word: βίας
  english_pob_choice: force
  chosen_spanish: fuerza
  alternatives_spanish:
  - violencia
  - coacción
  - poder
  lexicon: BDAG
  rationale: La combinación con πολλῆς apunta a una extracción enérgica y coercitiva; «fuerza» conserva esa idea sin cargar necesariamente el término con la connotación moral de «violencia».
- source_word: ἀπήγαγεν
  english_pob_choice: took away
  chosen_spanish: lo sacó
  alternatives_spanish:
  - lo llevó
  - lo apartó
  - lo condujo
  lexicon: BDAG
  rationale: En español, el contexto de rescatar a alguien de una multitud se expresa con naturalidad como «sacó de nuestras manos». Refleja la idea de retirar/capturar a alguien desde el control de otros, como en la auditoría inglesa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura griega bizantina proporcionada y el audit trail inglés: se conserva la secuencia narrativa de la intervención de Lisias, el matiz militar de χιλίαρχος y la fuerza coercitiva expresada por βία/πολλῆς. No se aplicaron revisiones posteriores al registro inglés, y el versículo mantiene la nota textual crítica documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Comandante» se prefirió sobre «tribuno» por claridad contemporánea; no cambia el referente militar romano documentado.
  - «Fuerza» conserva el campo semántico de βία sin intensificarlo automáticamente a «violencia».
  - La cláusula final reproduce el sentido de extracción desde el control de otros, de acuerdo con el contexto narrativo y la solución inglesa auditable.
