translation:
  language: es
  text: ¿O que ellos mismos digan qué delito[a] encontraron cuando comparecí ante el consejo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Delito» traduce aquí ἀδίκημα en sentido acusatorio o forense; también puede entenderse más ampliamente como «falta» u «ofensa», no solo como un tecnicismo penal estricto.
    reason: lexical_alternative
  - marker: b
    text: «Consejo» traduce συνέδριον; el término puede referirse específicamente al Sanedrín judío.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  - ¿O bien?
  lexicon: BDAG
  rationale: La partícula introduce una alternativa retórica en el contexto forense. En español, «¿O» conserva la fuerza directa sin añadir matiz innecesario.
- source_word: αὐτοὶ οὗτοι
  english_pob_choice: these men themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - estos mismos hombres
  - estos hombres mismos
  lexicon: BDAG
  rationale: El énfasis de la combinación se mantiene con «ellos mismos». En español suena más natural que repetir «hombres» si el referente ya está claro en el discurso.
- source_word: εἰπάτωσαν
  english_pob_choice: let ... say
  chosen_spanish: digan
  alternatives_spanish:
  - que digan
  - declaren
  lexicon: BDAG
  rationale: El imperativo de tercera persona en contexto judicial se expresa de manera idiomática con «digan»; el sentido exhortativo queda implícito en la construcción interrogativa-retórica.
- source_word: τί εὗρον
  english_pob_choice: what ... they found
  chosen_spanish: qué ... hallaron
  alternatives_spanish:
  - qué encontraron
  - qué descubrieron
  lexicon: BDAG
  rationale: '«Hallaron» reproduce bien el valor de εὗρον en una acusación formal: pedir que señalen qué delito encontraron. «Encontraron» también sería válido, pero «hallaron» tiene un registro ligeramente más jurídico.'
- source_word: ἀδίκημα
  english_pob_choice: wrongdoing
  chosen_spanish: injusticia
  alternatives_spanish:
  - delito
  - agravio
  - mal hecho
  lexicon: BDAG
  rationale: El término griego puede abarcar una falta o acto injusto, no necesariamente un delito técnico. «Injusticia» conserva esa amplitud y evita estrechar demasiado el sentido a una categoría legal moderna.
- source_word: στάντος μου
  english_pob_choice: when I stood
  chosen_spanish: cuando yo estaba
  alternatives_spanish:
  - cuando estuve
  - mientras yo estaba
  lexicon: BDAG
  rationale: El participio aoristo con valor circunstancial se vierte con una cláusula temporal natural en español. «Cuando yo estaba» comunica la escena ante el consejo sin sonar forzado; el pronombre explícito ayuda a la claridad.
- source_word: ἐπὶ τοῦ συνεδρίου
  english_pob_choice: before the council
  chosen_spanish: ante el consejo
  alternatives_spanish:
  - ante el Sanedrín
  - delante del consejo
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo indica comparecencia ante una autoridad. «Ante el consejo» refleja la relación espacial/jurídica; se evita «Sanedrín» en el texto principal para no cerrar demasiado el referente, aunque sigue siendo una alternativa válida.
translation_notes:
  revision_awareness: Alineado con el inglés POB de referencia y su nota sobre συνέδριον; no se observan revisiones adicionales en el pasaje. Se preserva el tono forense y la ambigüedad lexical de ἀδίκημα sin endurecerla a un tecnicismo legal.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantuvo un registro judicial claro y sobrio, compatible con el estilo POB en español.
  - Se evitó «Cristo»/«Mesías» por no ser pertinente en este versículo.
