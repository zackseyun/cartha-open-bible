    issue: «Injusticia» para ἀδίκημα
    rationale: ἀδίκημα aquí apunta a una falta/agravio/ofensa en contexto acusatorio. «Injusticia» en español suele denotar una cualidad o situación injusta, no tanto el acto imputado que Pablo desafía a que identifiquen.
  - severity: medium
    issue: «cuando yo estaba» para στάντος μου
    rationale: El participio aoristo expresa el hecho de presentarse/estar de pie ante el concilio. «Cuando yo estaba» suena imperfectivo y menos puntual; «cuando comparecí» o «cuando estuve» representa mejor la acción.
  - severity: low
    issue: Construcción «¿O ellos mismos digan…?»
    rationale: Aunque inteligible, en español resulta menos idiomática que «O que ellos mismos digan…» para reproducir el valor exhortativo del imperativo de tercera persona.
