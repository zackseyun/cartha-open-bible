    changes_summary: Changed 'riots' to 'unrest' for better lexical accuracy with στάσεις, which refers more broadly to disturbances or dissensions rather than specifically riots. Retained the rest as accurate and natural.
translation:
  language: es
  text: Porque hemos hallado que este hombre es una plaga, que provoca disturbios entre todos los judíos por todo el mundo[a], y además cabecilla de la secta de los nazarenos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por todo el mundo habitado'; οἰκουμένη puede referirse al mundo habitado, y a menudo al mundo romano en su contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'partido' o 'facción'; αἵρεσις aquí significa un grupo sectario, no necesariamente 'herejía' en el sentido técnico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρόντες
  english_pob_choice: we have found
  chosen_spanish: hemos hallado
  alternatives_spanish:
  - hemos encontrado
  - hallamos
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí como base de una acusación formulada con valor resultativo; en español, el perfecto compuesto comunica mejor el hallazgo presentado como hecho vigente en la acusación que un gerundio más mecánico.
- source_word: λοιμὸν
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - un azote
  - un peste
  - un malhechor
  lexicon: BDAG
  rationale: El término es insultante y metafórico, no una afirmación médica. 'Una plaga' conserva la fuerza despectiva y la idea de amenaza pública sin añadir un matiz ajeno al texto.
- source_word: κινοῦντα
  english_pob_choice: stirring up
  chosen_spanish: provoca
  alternatives_spanish:
  - incita
  - alborota
  - agita
  lexicon: BDAG
  rationale: El participio presente indica acción en curso. 'Provoca disturbios' transmite el sentido de causar agitación de manera natural en español, sin exagerar hacia un lenguaje más técnico o más coloquial de lo que exige el contexto legal.
- source_word: στάσεις
  english_pob_choice: unrest
  chosen_spanish: disturbios
  alternatives_spanish:
  - desórdenes
  - alborotos
  - discordias
  lexicon: BDAG
  rationale: La palabra griega puede abarcar disturbios, disensiones o sedición. 'Disturbios' es suficientemente amplio para no reducirla a 'riots' ni diluirla en una mera discusión interna.
- source_word: πᾶσι τοῖς Ἰουδαίοις
  english_pob_choice: among all the Jews
  chosen_spanish: entre todos los judíos
  alternatives_spanish:
  - entre todos los judíos
  - en medio de todos los judíos
  - para todos los judíos
  lexicon: BDAG
  rationale: El dativo expresa la esfera o el grupo afectado por la agitación. 'Entre todos los judíos' comunica la distribución del conflicto dentro de las comunidades judías mejor que un objeto indirecto literal.
- source_word: κατὰ τὴν οἰκουμένην
  english_pob_choice: throughout the inhabited world
  chosen_spanish: por todo el mundo habitado
  alternatives_spanish:
  - por todo el mundo
  - por todo el mundo romano
  lexicon: BDAG
  rationale: Se preserva el sentido básico de οἰκουμένη como 'mundo habitado' sin forzar en el texto principal la precisión histórica de 'mundo romano', que el contexto puede sugerir pero no exige de forma explícita.
- source_word: πρωτοστάτην
  english_pob_choice: a ringleader
  chosen_spanish: cabecilla
  alternatives_spanish:
  - líder
  - jefe
  - promotor principal
  lexicon: BDAG
  rationale: En una acusación hostil, el término es pejorativo y sugiere quien encabeza un movimiento de forma perturbadora. 'Cabecilla' conserva ese tono acusatorio mejor que 'líder'.
- source_word: αἱρέσεως
  english_pob_choice: sect
  chosen_spanish: secta
  alternatives_spanish:
  - partido
  - facción
  - grupo
  lexicon: BDAG
  rationale: Aquí el término designa un grupo religioso-social desde la perspectiva de los acusadores, sin implicar automáticamente la carga técnica posterior de 'herejía'. 'Secta' refleja esa clasificación sin sobreinterpretarla.
- source_word: Ναζωραίων
  english_pob_choice: the Nazarenes
  chosen_spanish: los nazarenos
  alternatives_spanish:
  - los seguidores del Nazareno
  - la secta nazarena
  lexicon: BDAG
  rationale: Se mantiene el apelativo de grupo usado por los opositores. 'Nazarenos' reproduce de modo directo la etiqueta histórica y permite la conexión con Jesús de Nazaret sin explicitarla en el texto principal.
- source_word: τε
  english_pob_choice: and also
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La partícula agrega una acusación más a la anterior. 'Y además' suena natural en español y conserva el valor aditivo de τε.
theological_decisions:
- issue: αἵρεσις como etiqueta polémica para el movimiento cristiano primitivo
  english_pob_reading: sect
  chosen_spanish_reading: secta
  alternative_spanish_readings:
  - herejía
  - partido
  - facción
  rationale: En este contexto, el hablante está usando un calificativo jurídico-polemico, no una categoría doctrinal técnica posterior. 'Secta' mantiene la distancia del acusador y evita imponer la carga eclesiástica de 'herejía'.
  doctrine_reference: Hechos 24:5; uso del término αἵρεσις en contexto del siglo I.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y tiene en cuenta la revisión inglesa que ajustó στάσεις de 'riots' a 'unrest'; por eso se eligió 'disturbios' como término español amplio y no 'motines' ni 'revueltas'. También se preserva el tono acusatorio de λοιμὸν y πρωτοστάτην sin suavizarlo en exceso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino en el texto fuente; aquí no aplica.
  - Se mantiene 'secta' para αἵρεσις en coherencia con el criterio POB de no anticipar la carga técnica de 'herejía'.
  - '''Nazarenos'' conserva el nombre grupal histórico y no se sustituye por una paráfrasis explicativa en el cuerpo del texto.'
  - La puntuación reproduce la cadencia acusatoria del original con una sola oración larga, apta para lectura pública.
