  text: εὑρόντες γὰρ τὸν ἄνδρα τοῦτον λοιμὸν καὶ κινοῦντα ⸀στάσεις πᾶσι τοῖς Ἰουδαίοις τοῖς κατὰ τὴν οἰκουμένην πρωτοστάτην τε τῆς τῶν Ναζωραίων αἱρέσεως,
base_translation:
  language: en
  yaml_path: translation/nt/acts/024/005.yaml
  text: For we have found this man to be a plague[a], stirring up unrest among all the Jews throughout the inhabited world, and also a ringleader of the sect of the Nazarenes[b],
  footnotes:
  - marker: a
    text: Or 'throughout the world'; the Greek οἰκουμένη can refer to the inhabited world, often the Roman world in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'party' or 'faction'; the Greek αἵρεσις here means a sectarian group, not necessarily 'heresy' in the later technical sense.
    reason: lexical_alternative
