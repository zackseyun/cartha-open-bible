translation:
  language: es
  text: 'Pero Simón respondió[a]: «Rueguen ustedes al Señor por mí, para que no me sobrevenga nada de lo que han dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nada de las cosas que han dicho me sobrevenga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona aquí como fórmula introductoria de respuesta junto con εἶπεν. En español, «respondió» transmite bien la idea de reacción discursiva sin la redundancia de repetir «dijo» de manera pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave y contrastiva desde la reprensión anterior hacia la petición de Simón. «Pero» reproduce adecuadamente ese giro discursivo.
- source_word: Δεήθητε
  english_pob_choice: pray
  chosen_spanish: Rueguen
  alternatives_spanish:
  - oren
  - hagan petición
  lexicon: BDAG
  rationale: El imperativo de δέομαι/δέω aquí expresa petición intercesora. «Rueguen» es natural en español y conserva el valor de suplicar o interceder, sin volverlo mecánicamente técnico.
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: 'El pronombre explícito da énfasis: Simón pide que sean ellos, no él, quienes oren. «Ustedes» conserva ese énfasis de forma clara en español.'
- source_word: ὑπὲρ ἐμοῦ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en favor de mí
  - a mi favor
  lexicon: BDAG
  rationale: ὑπέρ con genitivo indica representación/intercesión. «Por mí» es la equivalencia española más natural y suficientemente precisa.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Maestro
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo, tras un verbo de oración, marca dirección hacia el destinatario. En español, «al Señor» expresa esa dirección de modo idiomático.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aunque el proyecto usa «Yahvé» para יהוה, aquí el texto griego dice κύριος y el contexto no obliga a identificar de forma más específica al referentе. Mantener «Señor» preserva la ambigüedad teológica del original.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la finalidad o contenido deseado de la oración. «Para que» es la forma más natural y clara en español.
- source_word: μηδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: BDAG
  rationale: El neutro singular sustantivado se expresa de manera natural con «nada».
- source_word: ἐπέλθῃ ἐπ’ ἐμὲ
  english_pob_choice: may come upon me
  chosen_spanish: me sobrevenga
  alternatives_spanish:
  - venga sobre mí
  - caiga sobre mí
  lexicon: BDAG
  rationale: ἐπέρχομαι con ἐπί puede implicar que algo adverso cae o sobreviene sobre alguien. «Me sobrevenga» conserva esa fuerza de acontecimiento que recae sobre la persona, sin sonar forzado.
- source_word: ὧν εἰρήκατε
  english_pob_choice: of what you have said
  chosen_spanish: de lo que han dicho
  alternatives_spanish:
  - de las cosas que han dicho
  - de lo que ustedes han hablado
  lexicon: BDAG
  rationale: La construcción relativa en genitivo depende de μηδέν y equivale a «nada de lo que han dicho». «De lo que han dicho» mantiene bien la referencia global y la naturalidad en español.
theological_decisions:
- issue: Referent of τὸν κύριον / κύριον
  english_pob_reading: Rendered simply as 'the Lord' without specifying further.
  chosen_spanish_reading: «al Señor» sin precisar más el referente.
  alternative_spanish_readings:
  - «a Dios»
  - «al Señor Jesús»
  rationale: El griego solo dice κύριος/τὸν κύριον. En este contexto, el referente puede permanecer abierto; traducir «Señor» preserva la misma especificidad del original y evita resolver una tensión que el texto no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica; κύριος no se estrecha innecesariamente.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente inglés, que indica que no hubo cambios aplicados en la última revisión y que el pasaje presenta alto acuerdo entre revisores. No se introdujeron ajustes no respaldados por el texto griego o el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene la preferencia del proyecto por traducir κύριος como «Señor» en lugar de sustituirlo por «Dios» o por una aclaración doctrinal no exigida por el texto.
  - El verbo de petición se renderiza con un registro natural y reverente («Rueguen») acorde con una intercesión dirigida a Dios.
  - La nota textual conserva la alternativa lexical documentada en el inglés POB, sin expandir indebidamente el sentido del genitivo relativo.
