base_translation:
  language: en
  yaml_path: translation/nt/acts/008/026.yaml
  text: Now an angel of the Lord spoke to Philip[a], saying[b], “Get up and go south to the road that goes down from Jerusalem to Gaza.” This is a deserted road.
  footnotes:
