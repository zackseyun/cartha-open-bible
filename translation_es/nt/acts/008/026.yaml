translation:
  language: es
  text: 'Ahora un ángel de Yahvé habló a Felipe, diciendo: «Levántate y ve al sur[a], al camino que baja de Jerusalén a Gaza». Este es un camino desierto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al mediodía». La expresión griega puede indicar dirección («al sur») o tiempo («al mediodía»).
    reason: alternative_reading
  - marker: b
    text: O «Esto es desierto», posiblemente queriendo decir que la ruta pasa por una región desértica más que enfatizar que el camino mismo está desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - el ángel
  - mensajero
  lexicon: BDAG
  rationale: El griego carece de artículo y la lectura natural en español es indefinida. «Ángel» conserva el sentido narrativo de un mensajero celestial; «mensajero» sería más general de lo que el contexto permite.
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: Siguiendo el estándar del proyecto, se explicita el nombre divino como «Yahvé» en lugar de enmascararlo con «Señor». El contexto de agencia divina en Lucas-Hechos sostiene esta identificación.
- source_word: ἐλάλησεν πρὸς Φίλιππον
  english_pob_choice: spoke to Philip
  chosen_spanish: habló a Felipe
  alternatives_spanish:
  - dijo a Felipe
  - se dirigió a Felipe
  lexicon: BDAG
  rationale: «Habló a» refleja bien λαλέω con πρός y mantiene el matiz de comunicación directa sin volverlo demasiado formal o mecánico.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: La forma de participio se conserva de manera fluida en español con «diciendo», manteniendo la vinculación narrativa del discurso.
- source_word: Ἀνάστηθι
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate y anda
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción inmediata. «Levántate» es idiomático en español y corresponde al valor de ponerse en pie para actuar.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - ponte en camino
  - viaja
  lexicon: BDAG
  rationale: «Ve» es la orden natural en español y conserva la simpleza del verbo griego sin añadir matices de viaje que el texto no exige.
- source_word: κατὰ μεσημβρίαν
  english_pob_choice: south
  chosen_spanish: al sur
  alternatives_spanish:
  - al mediodía
  - hacia el sur
  lexicon: BDAG
  rationale: La expresión griega admite una ambigüedad real entre dirección y tiempo. Por el contexto de movimiento hacia un camino, la lectura direccional es la principal; por eso se traduce «al sur» y se conserva la alternativa temporal en nota.
- source_word: ἐπὶ τὴν ὁδὸν
  english_pob_choice: to the road
  chosen_spanish: al camino
  alternatives_spanish:
  - a la carretera
  - sobre el camino
  lexicon: BDAG
  rationale: «Camino» suena natural en español y mantiene el valor de ruta o vía. Se evita un tecnicismo innecesario como «carretera».
- source_word: τὴν καταβαίνουσαν ἀπὸ Ἰερουσαλὴμ εἰς Γάζαν
  english_pob_choice: that goes down from Jerusalem to Gaza
  chosen_spanish: que baja de Jerusalén a Gaza
  alternatives_spanish:
  - que desciende de Jerusalén a Gaza
  lexicon: BDAG
  rationale: «Baja» reproduce la metáfora geográfica de descender desde Jerusalén sin sonar rígida. Conserva la imagen topográfica del griego.
- source_word: αὕτη ἐστὶν ἔρημος
  english_pob_choice: This is a deserted road
  chosen_spanish: Este es un camino desierto[a].
  alternatives_spanish:
  - Este es un desierto
  - Este camino está desierto
  - Este es un camino solitario
  lexicon: BDAG
  rationale: La forma femenina de αὕτη probablemente remite a ὁδός, por lo que en español se explicita «camino». «Desierto» conserva la ambigüedad del griego entre camino deshabitado y región desértica; la nota preserva la alternativa semántica documentada.
theological_decisions:
- issue: Identidad de κυρίου en «ángel de Yahvé»
  english_pob_reading: The phrase is rendered straightforwardly as divine agency without specifying more than the text states.
  chosen_spanish_reading: La frase se traduce como agencia divina sin añadir más identificación de la que el texto exige.
  alternative_spanish_readings:
  - un ángel enviado por Dios
  - el ángel de Yahvé como figura revelatoria más específica
  rationale: Hechos presenta al mensajero como perteneciente a Yahvé; el español puede decirlo con claridad sin desarrollar una cristología o angelología más allá de la evidencia inmediata.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Ambigüedad de κατὰ μεσημβρίαν
  english_pob_reading: The phrase can indicate either direction (“south”) or time (“at noon/noon”).
  chosen_spanish_reading: Se conserva la lectura direccional principal y se anota la alternativa temporal.
  alternative_spanish_readings:
  - al mediodía
  - hacia el sur
  - al sur
  rationale: La ambigüedad es real en el griego. El contexto de desplazamiento favorece la dirección; la nota evita borrar la tensión lexical documentada.
  doctrine_reference: BDAG; English POB footnote a
- issue: Sentido de ἔρημος
  english_pob_reading: This is a deserted road / possibly meaning the route passes through a desert region rather than emphasizing that the road itself is deserted.
  chosen_spanish_reading: «Camino desierto» mantiene la posibilidad de que el texto describa un camino solitario o un trayecto por región desértica.
  alternative_spanish_readings:
  - camino deshabitado
  - desierto
  - camino solitario
  rationale: El griego permite tanto una cualidad del camino como una referencia al terreno. El español debe conservar esa tensión en vez de fijarla prematuramente.
  doctrine_reference: BDAG; English POB footnote b
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se detectaron cambios aplicados en la última pasada; la solución española sigue la lectura principal ya estabilizada, preservando las dos ambigüedades documentadas: κατὰ μεσημβρίαν y ἔρημος.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se usa «camino» en lugar de «ruta» para conservar la naturalidad y la relación con ὁδός.
  - «Desierto» se deja sin normalizar a «desértico» para no perder la ambigüedad léxica del griego.
  - El participio final no se expande en paráfrasis; la nota explica la alternativa semántica en vez de resolverla en el cuerpo del texto.
