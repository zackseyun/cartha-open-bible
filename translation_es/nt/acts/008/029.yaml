translation:
  language: es
  text: 'Entonces el Espíritu le dijo a Felipe[a]: «Acércate y mantente junto a este carruaje».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acércate y pégate a este carruaje»; o «Acércate y mantente cerca de este carruaje».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa de manera natural con «dijo» en discurso narrativo. Mantiene la relación directa con el habla que sigue sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δώ aquí marca avance narrativo. «Entonces» reproduce bien la secuencia y es idiomático en español bíblico moderno.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  - el espíritu
  lexicon: BDAG
  rationale: En Hechos, τὸ πνεῦμα en contextos de guía reveladora normalmente refiere al Espíritu Santo. Se conserva la forma breve del griego («el Espíritu») sin expandirla en el texto principal, para respetar la redacción fuente y el referente probable.
- source_word: τῷ Φιλίππῳ
  english_pob_choice: to Philip
  chosen_spanish: a Felipe
  alternatives_spanish:
  - para Felipe
  lexicon: BDAG
  rationale: Dativo de destinatario directo. «A Felipe» es la construcción natural en español para el destinatario del habla.
- source_word: Πρόσελθε
  english_pob_choice: Go over
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven cerca
  - Aproximate
  lexicon: BDAG
  rationale: El imperativo aoristo de προσέρχομαι pide movimiento hacia el carro. En español, «Acércate» conserva el valor espacial y encaja mejor que una paráfrasis como «ve hacia».
- source_word: κολλήθητι
  english_pob_choice: join
  chosen_spanish: júntate
  alternatives_spanish:
  - pégate
  - mantente cerca
  lexicon: BDAG
  rationale: El imperativo de κολλάομαι expresa adherirse o unirse estrechamente. «Júntate» comunica la cercanía y unión pedidas sin sobrerreligiosizar el verbo ni volverlo demasiado técnico.
- source_word: τῷ ἅρματι τούτῳ
  english_pob_choice: this chariot
  chosen_spanish: a este carro
  alternatives_spanish:
  - a este carruaje
  - a este carro de guerra
  lexicon: BDAG
  rationale: ἅρμα designa un carro o vehículo de ruedas; en el contexto narrativo, «carro» es claro y adecuado. Se mantiene «este» para reflejar el demostrativo proximal del griego.
theological_decisions:
- issue: Referente de τὸ πνεῦμα
  english_pob_reading: the Spirit refers to the Holy Spirit
  chosen_spanish_reading: el Espíritu se entiende como el Espíritu Santo, aunque el texto conserve la forma breve
  alternative_spanish_readings:
  - el espíritu como impulso interno o guía no especificada
  - el Espíritu como referencia genérica a un ser espiritual
  rationale: En Hechos, la guía dada a los creyentes por «el Espíritu» se entiende de forma consistente como la acción del Espíritu Santo. El español principal mantiene la misma sobriedad del griego y no añade «Santo» en el cuerpo del texto, preservando tanto el referente probable como la formulación original.
  doctrine_reference: Afirmaciones; filosofía de traducción §1 y §3
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del griego SBLGNT y del registro auditado en inglés. No hubo revisiones textuales posteriores en el contexto fuente; la redacción española conserva la progresión narrativa, el referente de «el Espíritu» y la fuerza espacial/relacional de los imperativos.
  spanish_consistency_notes:
  - Se conserva «Espíritu» con mayúscula por su valor personal/divino en el contexto de Hechos.
  - «Felipe» sigue la forma española estándar del nombre propio.
  - «Carro» mantiene el campo semántico de ἅρμα sin introducir una especificación que el griego no exige.
  - La nota al pie preserva la alternativa lexical auditada entre cercanía física y adhesión relacional.
