revisions:
- from: 'Entonces el Espíritu le dijo a Felipe[a]: «Acércate y júntate a este carro».'
  to: 'Entonces el Espíritu le dijo a Felipe[a]: «Acércate y mantente junto a este carruaje».'
  rationale: Se ajusta κολλήθητι a una expresión española más fiel y natural en registro bíblico («mantente junto a») y se sustituye «carro» por «carruaje» para evitar ambigüedad moderna y reflejar mejor ἅρμα. Se conserva la nota con alternativas que preservan el matiz de adhesión/cercanía estrecha presente en el griego.
