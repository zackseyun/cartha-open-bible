    issue: «júntate» debilita el matiz de κολλήθητι
    rationale: κολλήθητι comunica adherirse o mantenerse pegado/cerca, no solo unirse de manera general. La alternativa en nota («mantente cerca») capta mejor el valor léxico que el texto principal actual.
  - severity: medium
    issue: «carro» puede sonar demasiado moderno o ambiguo en español bíblico general
    rationale: Aunque léxicamente posible, en español neutro eclesial «carro» suele evocar automóvil. «Carruaje» conserva mejor la referencia a un vehículo antiguo sin introducir un tipo demasiado específico.
  - severity: low
    issue: Error tipográfico en la justificación léxica de δὲ
    rationale: La nota dice «δώ aquí» en lugar de «δέ aquí» o una formulación española correcta. No afecta el texto bíblico, pero sí la calidad del registro documental.
