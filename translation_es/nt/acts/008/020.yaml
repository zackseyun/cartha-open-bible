translation:
  language: es
  text: 'Pero Pedro le dijo: «Que tu plata perezca contigo[a], porque pensaste que podías adquirir el don de Dios con dinero[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu dinero perezca contigo». El griego usa «plata» aquí, una forma común de referirse al dinero.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «obtener» o «comprar». La idea es que Simón consideró el don de Dios como algo que podía conseguirse pagando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πέτρος δὲ εἶπεν πρὸς αὐτόν
  english_pob_choice: But Peter said to him
  chosen_spanish: Pero Pedro le dijo
  alternatives_spanish:
  - Y Pedro le dijo
  - Entonces Pedro le dijo
  lexicon: SBLGNT / BDAG
  rationale: «Pero» conserva el giro adversativo de δέ; «le dijo» mantiene el dativo personal πρὸς αὐτόν de forma natural en español sin añadir énfasis innecesario.
- source_word: Τὸ ἀργύριόν σου
  english_pob_choice: your silver
  chosen_spanish: tu plata
  alternatives_spanish:
  - tu dinero
  - tu plata y dinero
  lexicon: BDAG
  rationale: ἀργύριον puede referirse literalmente a plata o a dinero acuñado. «Plata» preserva la imagen concreta del griego y el tono retórico de la maldición; en español, el contexto ya deja claro que se trata de dinero.
- source_word: σὺν σοὶ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto contigo
  lexicon: BDAG
  rationale: «Contigo» expresa de manera idiomática la unión de la suerte de la plata con la de Simón, manteniendo el paralelismo del pronunciamiento.
- source_word: εἴη εἰς ἀπώλειαν
  english_pob_choice: may ... perish
  chosen_spanish: perezca
  alternatives_spanish:
  - vaya a destrucción
  - se arruine
  - sea para destrucción
  lexicon: BDAG
  rationale: El optativo εἴη expresa deseo o imprecación. «Perezca» reproduce esa fuerza en español con tono solemne y sin introducir una formulación doctrinal más específica que el texto no afirma.
- source_word: τὴν δωρεὰν τοῦ θεοῦ
  english_pob_choice: the gift of God
  chosen_spanish: el don de Dios
  alternatives_spanish:
  - el regalo de Dios
  - la dádiva de Dios
  lexicon: BDAG
  rationale: «Don» es la equivalencia natural y digna de δωρεά en este contexto; conserva la idea de algo concedido gratuitamente por Dios, en contraste con suponer que puede comprarse.
- source_word: ἐνόμισας
  english_pob_choice: you thought
  chosen_spanish: pensaste
  alternatives_spanish:
  - supusiste
  - consideraste
  lexicon: BDAG
  rationale: «Pensaste» es claro y directo para el reproche de Pedro, y conserva el sentido de estimar o suponer de νομίζω.
- source_word: διὰ χρημάτων κτᾶσθαι
  english_pob_choice: could acquire ... with money
  chosen_spanish: adquirir ... con dinero
  alternatives_spanish:
  - obtener ... con dinero
  - comprar ... con dinero
  lexicon: BDAG
  rationale: El infinitivo κτᾶσθαι significa adquirir/obtener. «Adquirir» mantiene el matiz de obtener algo como posesión; «con dinero» refleja διά con genitivo como medio. Se evita «comprar» porque puede estrechar innecesariamente el sentido, aunque siga siendo una posibilidad semántica.
- source_word: δωρεά / χρημάτων
  english_pob_choice: gift / money
  chosen_spanish: don / dinero
  alternatives_spanish:
  - regalo / plata
  - dádiva / plata
  lexicon: BDAG
  rationale: Se conserva el contraste entre lo que Dios da gratuitamente y el dinero como medio de adquisición. «Dinero» es más natural que repetir «plata» en la segunda mitad del versículo, donde el griego cambia a χρημάτων.
theological_decisions:
- issue: Naturaleza de la imprecación de Pedro
  english_pob_reading: An imprecatory wish of destruction/ruin, rendered 'May your silver perish with you'
  chosen_spanish_reading: 'Una imprecación: «Que tu plata perezca contigo»'
  alternative_spanish_readings:
  - 'Una predicción: «Tu plata perecerá contigo»'
  - 'Una condena más fuerte: «Ve a la perdición con tu plata»'
  rationale: El optativo griego expresa deseo o maldición pronunciada, no simplemente una afirmación futura. La traducción española mantiene la dureza del juicio sin convertirlo en una formulación más definitiva de condenación eterna que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica del texto; no añadir una doctrina de condenación final que el versículo no enuncia.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audito inglés: se mantuvo la equivalencia óptima, el tono de imprecación del optativo, y la alternancia léxica entre ἀργύριον («plata») y χρημάτων («dinero») sin borrar el contraste retórico.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando corresponde; este versículo no contiene el tetragrámaton.
  - Se prefirió «don de Dios» como equivalente estable de δωρεά en este contexto.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - Se conservó una sintaxis natural en español («le dijo», «contigo», «con dinero») sin perder la fuerza del griego.
