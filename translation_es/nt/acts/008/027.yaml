revisions:
- from: Así que se levantó y se fue[a]. Y he aquí, un hombre etíope, un eunuco, un alto funcionario de Candace, reina de los etíopes, que estaba sobre todo su tesoro, había venido a Jerusalén para adorar[b].
  to: Así que se levantó y se fue. Y he aquí, un hombre etíope, un eunuco[a], un alto funcionario de Candace, reina de los etíopes, que estaba a cargo de toda su tesorería, había venido a Jerusalén para adorar[b].
  rationale: Se corrige el anclaje de la nota léxica para que recaiga sobre «eunuco», que es el término comentado por la evidencia fuente y el audit trail inglés. También se reemplaza la construcción calcada «sobre todo su tesoro» por «a cargo de toda su tesorería», que mantiene el sentido de supervisión administrativa de ἐπὶ + γάζα con mejor español.
  reviewer_model: gpt-5.4
