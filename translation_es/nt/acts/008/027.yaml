  text: καὶ ἀναστὰς ἐπορεύθη, καὶ ἰδοὺ ἀνὴρ Αἰθίοψ εὐνοῦχος δυνάστης ⸀Κανδάκης βασιλίσσης Αἰθιόπων, ὃς ἦν ἐπὶ πάσης τῆς γάζης αὐτῆς, ὃς ἐληλύθει προσκυνήσων εἰς Ἰερουσαλήμ,
base_translation:
  language: en
  yaml_path: translation/nt/acts/008/027.yaml
  text: So he got up and went[a]. And behold, an Ethiopian man, a eunuch, a high official of Candace, queen of the Ethiopians, who was over all her treasury, had come to Jerusalem to worship[b],
  footnotes:
