translation:
  language: es
  text: Así que se levantó y se fue. Y he aquí, un hombre etíope, un eunuco[a], un alto funcionario de Candace, reina de los etíopes, que estaba a cargo de toda su tesorería, había venido a Jerusalén para adorar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficial de la corte» para εὐνοῦχος; el término griego puede referirse en algunos contextos a un funcionario real, aunque aquí probablemente se pretende el sentido literal.
    reason: lexical_alternative
  - marker: b
    text: «Candace» puede funcionar como título dinástico para la reina y no solo como nombre personal.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y marca secuencia narrativa; en español, «se levantó» comunica con naturalidad el inicio de la acción sin perder el valor aspectual.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - viajó
  - se encaminó
  lexicon: BDAG
  rationale: En contexto narrativo, el movimiento se expresa con naturalidad como «se fue»; conserva la progresión de la acción sin sobrecargar el estilo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he ahí
  - y vio
  lexicon: BDAG
  rationale: Se mantiene el marcador narrativo de atención con una fórmula castellana solemne y reconocible, equivalente funcional de «behold».
- source_word: ἀνὴρ Αἰθίοψ
  english_pob_choice: an Ethiopian man
  chosen_spanish: un hombre etíope
  alternatives_spanish:
  - un etíope
  - un hombre de Etiopía
  lexicon: BDAG
  rationale: Ἀνήρ incluye explícitamente la idea de «hombre», así que se conserva en español. «Etíope» reproduce el etnónimo sin diluirlo en una sola designación gentilicia.
- source_word: εὐνοῦχος
  english_pob_choice: a eunuch
  chosen_spanish: un eunuco
  alternatives_spanish:
  - un oficial de la corte
  lexicon: BDAG
  rationale: Se mantiene el sentido literal principal de εὐνοῦχος en el texto, porque el relato parece querer conservar esa designación social/corporal. La alternativa administrativa queda implícitamente disponible por el contexto, pero no reemplaza el término.
- source_word: δυνάστης
  english_pob_choice: a high official
  chosen_spanish: un alto funcionario
  alternatives_spanish:
  - un oficial importante
  - un dignatario
  - un gobernante
  lexicon: BDAG
  rationale: El término denota autoridad o rango; «alto funcionario» expresa con claridad esa función sin insinuar soberanía política plena.
- source_word: Κανδάκης βασιλίσσης Αἰθιόπων
  english_pob_choice: of Candace, queen of the Ethiopians
  chosen_spanish: de Candace, reina de los etíopes
  alternatives_spanish:
  - de Candace, reina de Etiopía
  lexicon: BDAG
  rationale: Se translitera «Candace» y se conserva la referencia a «reina de los etíopes», siguiendo de cerca el plural étnico griego. «De los etíopes» es más literal que la forma territorial singular.
- source_word: ἐπὶ πάσης τῆς γάζης αὐτῆς
  english_pob_choice: over all her treasury
  chosen_spanish: sobre todo su tesoro
  alternatives_spanish:
  - encargado de todo su tesoro
  - sobre toda su tesorería
  - a cargo de todas sus riquezas
  lexicon: BDAG
  rationale: γάζα remite al tesoro/tesorería. «Sobre todo su tesoro» conserva la construcción de supervisión de ἐπί y evita reducir el término a mera riqueza abstracta.
- source_word: ἐληλύθει
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - había llegado
  - vino
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja bien la anterioridad respecto a la escena narrativa.
- source_word: προσκυνήσων
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para postrarse en adoración
  - para rendir culto
  lexicon: BDAG
  rationale: El participio de propósito se vierte con una finalidad natural en español. «Adorar» es el equivalente más directo y amplio en este contexto de peregrinación religiosa.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La dirección del movimiento se expresa de manera idiomática con «a Jerusalén».
theological_decisions:
- issue: 'Renderización de εὐνοῦχος: literalidad frente a generalización administrativa'
  english_pob_reading: Rendered literally as 'eunuch' in the main text
  chosen_spanish_reading: Se mantiene «eunuco» en el texto principal
  alternative_spanish_readings:
  - oficial de la corte
  - funcionario de palacio
  rationale: La lectura principal conserva la tensión lexical del término griego, importante para el marco narrativo y canónico. Aunque en ciertos contextos puede designar a un funcionario cortesano, aquí se prefiere la forma literal; el rango oficial ya está expresado por δυνάστης.
  doctrine_reference: Principios de traducción POB §§1, 4, 5
- issue: Posible valor dinástico de «Candace»
  english_pob_reading: '''Candace'' may function as a dynastic title for the queen rather than a personal name.'
  chosen_spanish_reading: «Candace» se conserva como designación transliterada sin decidir en el texto si es nombre propio o título dinástico
  alternative_spanish_readings:
  - Candace, título real
  - Candace, nombre propio
  rationale: 'El griego solo ofrece la forma Κανδάκη y el audit trail en inglés advierte la posible función dinástica. En español conviene mantener la misma cautela: transliterar y no sobreexplicar en el cuerpo del versículo.'
  doctrine_reference: Criterios de nota cultural y prudencia textual de POB
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios en el borrador inglés: se mantuvo la lectura literal de εὐνοῦχος, la referencia a Candace como posible título dinástico y la secuencia narrativa simple. El español sigue esa pauta sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo exija; en este versículo no aparece.
  - Se usa «eunuco» de manera coherente con el valor lexical principal del término, sin sustituirlo por una paráfrasis administrativa en el texto principal.
  - «Alt[o] funcionario» traduce el rango de δυνάστης sin convertirlo en un título monárquico.
  - «Tesoro» mantiene la idea de γάζα como tesorería/tesoro institucional, no como riqueza genérica solamente.
  - Se mantiene el orden narrativo simple del griego con dos oraciones breves para reflejar la progresión de la escena.
