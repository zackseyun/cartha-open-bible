review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y las decisiones principales del griego: «se levantó», «he aquí», «un hombre etíope», «un eunuco», «alto funcionario», «había venido» y «para adorar» preservan adecuadamente el sentido. También mantiene correctamente la nota sobre «Candace» y la alternativa léxica de εὐνοῦχος. Sin embargo, «se fue[a]» ancla mal la nota [a], que en realidad corresponde a «eunuco», no a ἐπορεύθη. Además, «que estaba sobre todo su tesoro» suena poco natural en español y no comunica tan bien el sentido administrativo de ἐπὶ πάσης τῆς γάζης αὐτῆς como una formulación más idiomática.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos problemas de calidad: el anclaje de la nota [a] está colocado en la frase equivocada, y «estaba sobre todo su tesoro» es una construcción demasiado calcada del griego/inglés. Una leve revisión mejora naturalidad y precisión: «un eunuco[a]» para la nota, y «que estaba a cargo de toda su tesorería» para un español más idiomático y administrativamente claro.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Eunuco» preserva correctamente εὐνοῦχος en el texto principal, con alternativa en nota. No aparecen términos sensibles como Yahvé/Mesías. «Adorar» para προσκυνήσων es aceptable en este contexto.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «se fue» en vez de a «eunuco».
    rationale: La nota explica una alternativa léxica para εὐνοῦχος («oficial de la corte»), por lo que debe marcar el término español correspondiente. El anclaje actual induce a entender erróneamente que la nota comenta ἐπορεύθη.
  - severity: medium
    issue: «Que estaba sobre todo su tesoro» es poco natural en español.
    rationale: Aunque intenta reflejar ἐπὶ πάσης τῆς γάζης αὐτῆς, la expresión suena calcada. «A cargo de toda su tesorería» o equivalente comunica mejor la función administrativa del cargo y sigue siendo fiel al griego.
  revised_spanish_text: Así que se levantó y se fue. Y he aquí, un hombre etíope, un eunuco[a], un alto funcionario de Candace, reina de los etíopes, que estaba a cargo de toda su tesorería, había venido a Jerusalén para adorar[b].
  revised_footnotes:
  - marker: a
    text: O «oficial de la corte» para εὐνοῦχος; el término griego puede referirse en algunos contextos a un funcionario real, aunque aquí probablemente se pretende el sentido literal.
    reason: lexical_alternative
  - marker: b
    text: «Candace» puede funcionar como título dinástico para la reina y no solo como nombre personal.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota léxica para que recaiga sobre «eunuco», que es el término comentado por la evidencia fuente y el audit trail inglés. También se reemplaza la construcción calcada «sobre todo su tesoro» por «a cargo de toda su tesorería», que mantiene el sentido de supervisión administrativa de ἐπὶ + γάζα con mejor español.
