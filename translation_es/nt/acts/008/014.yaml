  - severity: low
    issue: «los apóstoles que estaban en Jerusalén» es algo pesado frente a una opción más directa.
    rationale: «Los apóstoles en Jerusalén» o «los apóstoles de Jerusalén» sería más conciso; no obstante, es un asunto de estilo menor y no de fidelidad.
