translation:
  language: es
  text: Ahora bien, cuando los apóstoles en Jerusalén oyeron que Samaria había recibido la palabra de Dios, enviaron a Pedro y a Juan hacia ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyeron
  alternatives_spanish:
  - al oír
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia previa a la acción principal. En español, «cuando ... oyeron» conserva la relación temporal de manera natural y clara, sin volver la frase pesada.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: δώ marca avance narrativo suave, no contraste fuerte. «Ahora bien» funciona como transición sobria en español y conserva ese matiz discursivo.
- source_word: οἱ ἐν Ἱεροσολύμοις ἀπόστολοι
  english_pob_choice: the apostles in Jerusalem
  chosen_spanish: los apóstoles que estaban en Jerusalén
  alternatives_spanish:
  - los apóstoles en Jerusalén
  - los apóstoles de Jerusalén
  lexicon: BDAG
  rationale: La construcción griega identifica a los apóstoles ubicados en Jerusalén. En español, la relativa explícita evita ambigüedad y suena más natural que un genitivo de procedencia.
- source_word: δέδεκται
  english_pob_choice: had received
  chosen_spanish: había recibido
  alternatives_spanish:
  - ha recibido
  - había aceptado
  - había acogido
  lexicon: BDAG
  rationale: El perfecto medio/pasivo de δέχομαι expresa una recepción completa con resultado vigente. En narración pasada, el pluscuamperfecto español reproduce bien esa anterioridad sin perder el valor de «recibir».
- source_word: ἡ Σαμάρεια
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - los samaritanos
  - la región de Samaria
  lexicon: BDAG
  rationale: El griego usa el topónimo de manera metonímica. Mantener «Samaria» sigue de cerca el texto fuente y deja que el contexto determine que se trata de sus habitantes.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Yahvé
  - el mensaje de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» es el equivalente directo de λόγος τοῦ θεοῦ y preserva el peso bíblico de la expresión. No se reemplaza por una paráfrasis más interpretativa.
- source_word: ἀπέστειλαν
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: El aoristo simple pide un verbo simple. «Enviaron» es natural en español y mantiene la direccionalidad del acto sin exceso de tecnicismo.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - para ellos
  lexicon: BDAG
  rationale: La preposición πρὸς con acusativo indica movimiento o dirección hacia las personas mencionadas. «A ellos» conserva el sentido relacional y espacial de forma idiomática.
- source_word: Πέτρον καὶ Ἰωάννην
  english_pob_choice: Peter and John
  chosen_spanish: Pedro y Juan
  lexicon: BDAG
  rationale: Los nombres propios se transliteran según el uso castellano establecido en el ámbito bíblico, sin añadir adaptaciones innecesarias.
theological_decisions:
- issue: Uso metonímico de «Samaria»
  english_pob_reading: Retain 'Samaria had received the word of God' rather than replacing it with 'the Samaritans had received.'
  chosen_spanish_reading: Conservar «Samaria había recibido la palabra de Dios»
  alternative_spanish_readings:
  - los samaritanos habían recibido la palabra de Dios
  - la región de Samaria había recibido la palabra de Dios
  rationale: El texto griego nombra la región como sujeto colectivo. En español, mantener el topónimo evita introducir una identificación interpretativa más estrecha que la del original, y el contexto aclara el referente humano.
  doctrine_reference: Translation philosophy §1, §5
- issue: Expresión λόγος τοῦ θεοῦ
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - el mensaje de Dios
  - la palabra divina
  rationale: La fórmula conserva el valor teológico y bíblico de la expresión sin debilitarla a una paráfrasis. En este pasaje, «palabra» es más fiel a la fórmula establecida y al registro del NT.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y está alineado con la decisión inglesa auditada: transición narrativa suave con δὲ, participio temporal rendido naturalmente, perfecto de δέχομαι como pluscuamperfecto español, y mantenimiento del topónimo metonímico «Samaria». No se detectan revisiones pendientes en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «apóstoles» para οἱ ... ἀπόστολοι, sin expansión innecesaria.
  - Se usa «palabra de Dios» en lugar de «mensaje» para conservar la fórmula bíblica común y el peso lexical del λόγος.
  - «Enviaron a Pedro y a Juan» conserva el orden directo y el movimiento hacia los destinatarios.
  - No se emplea «SEÑOR» ni «Cristo» porque este versículo no contiene esas formas.
  - La puntuación española refleja una sola oración compleja, con coma antes de la cláusula principal, de acuerdo con el flujo griego.
