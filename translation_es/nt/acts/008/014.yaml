  source_alignment_summary: 'El borrador refleja bien el sentido del griego: la secuencia temporal de Ἀκούσαντες, el sujeto «los apóstoles en Jerusalén», el metonímico «Samaria», «la palabra de Dios» y el envío de Pedro y Juan. Sin embargo, la realización española de πρὸς αὐτοὺς como «les enviaron a Pedro y a Juan» suena menos natural y puede sugerir dativo de destinatario más que movimiento hacia ellos; conviene explicitar «enviaron a Pedro y a Juan a ellos / hacia ellos», mejor aún «les enviaron a Pedro y a Juan» puede pasar, pero en español bíblico natural es preferible reestructurar toda la cláusula.'
  spanish_quality_summary: El texto es claro y digno, pero «los apóstoles que estaban en Jerusalén» es algo más pesado de lo necesario, y «les enviaron a Pedro y a Juan» resulta menos idiomático que «enviaron a Pedro y a Juan a Samaria» o «enviaron a Pedro y a Juan hacia ellos». Para conservar el referente de πρὸς αὐτούς sin ambigüedad y mantener fluidez, conviene una leve revisión sintáctica.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Dios», «la palabra de Dios», «Pedro», «Juan». No hay conflicto con las directrices sobre Yahvé/Mesías. Se conserva correctamente «Samaria» según la decisión teológica documentada.'
