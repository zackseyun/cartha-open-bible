translation:
  language: es
  text: Porque todavía no había caído[a] sobre ninguno de ellos; solamente habían sido bautizados en[b] el nombre del Señor Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «había venido sobre ninguno de ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «dentro del nombre» o «hacia el nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδέπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  - todavía no había ocurrido
  lexicon: BDAG
  rationale: La partícula temporal indica que la acción no había sucedido hasta ese momento. En español, «todavía no» expresa con naturalidad ese valor de expectativa no cumplida.
- source_word: ἐπ’ οὐδενὶ αὐτῶν
  english_pob_choice: upon any of them
  chosen_spanish: sobre ninguno de ellos
  alternatives_spanish:
  - sobre alguno de ellos
  - en ninguno de ellos
  lexicon: BDAG
  rationale: La preposición con dativo conserva la imagen espacial de venir «sobre» personas. «Sobre ninguno de ellos» mantiene esa metáfora y suena natural en español bíblico contemporáneo.
- source_word: ἐπιπεπτωκός
  english_pob_choice: fallen
  chosen_spanish: había caído
  alternatives_spanish:
  - había venido sobre
  - había descendido sobre
  lexicon: BDAG
  rationale: El perfecto de ἐπιπίπτω en Hechos se usa para la venida del Espíritu. «Había caído» preserva la imagen verbal que la traducción inglesa retiene con «fallen».
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: BDAG
  rationale: 'Marca contraste y limitación: habían recibido el bautismo, pero no todavía la venida del Espíritu. «Solamente» es claro y sobrio.'
- source_word: βεβαπτισμένοι ὑπῆρχον
  english_pob_choice: they had been baptized
  chosen_spanish: habían sido bautizados
  alternatives_spanish:
  - estaban bautizados
  - habían sido sumergidos
  lexicon: BDAG
  rationale: La construcción perifrástica expresa un estado resultante anterior. En español, el pluscuamperfecto pasivo «habían sido bautizados» comunica bien la anterioridad sin perder naturalidad.
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: into the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - dentro del nombre
  - hacia el nombre
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente «hacia/into», en la fórmula bautismal el español idiomático y eclesialmente comprensible es «en el nombre». Mantiene la referencia al acto bautismal sin forzar una construcción extraña.
- source_word: κυρίου Ἰησοῦ
  english_pob_choice: the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - de Jesucristo
  - del Señor Jesucristo
  lexicon: BDAG
  rationale: κύριος se rinde como «Señor» según la política del proyecto. Se conserva la titulación cristológica con una forma natural y reverente en español.
theological_decisions:
- issue: Sujetos implícitos y referencia al Espíritu Santo
  english_pob_reading: The implied subject of 'had not yet fallen' is the Holy Spirit, made clear by the previous verse.
  chosen_spanish_reading: Se mantiene la referencia implícita mediante el verbo en pluscuamperfecto, sin añadir un sujeto explícito que no está en el griego.
  alternative_spanish_readings:
  - Porque el Espíritu Santo todavía no había caído sobre ninguno de ellos
  - Porque él todavía no había caído sobre ninguno de ellos
  rationale: El griego omite el sujeto; el contexto inmediato lo identifica como el Espíritu Santo. En español, evitar un sujeto explícito aquí conserva la forma del original y no introduce un pronombre interpretativo innecesario.
  doctrine_reference: 'Translation philosophy #1'
- issue: Fórmula bautismal y preposición εἰς
  english_pob_reading: Rendered idiomatically as 'into the name,' while preserving the literal option in the audit trail.
  chosen_spanish_reading: Se traduce «en el nombre» para una lectura natural en español, sin pretender resolver debates doctrinales sobre la fórmula bautismal.
  alternative_spanish_readings:
  - bautizados hacia el nombre
  - bautizados dentro del nombre
  rationale: La frase describe el bautismo asociado con el nombre de Jesús. «En el nombre» comunica fielmente el uso cristiano establecido en español, mientras que la nota lexical preserva la alternativa más literal del griego.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: 'El borrador corrige la validación anterior anclando ambas notas al texto español. También ajusta el orden de las cláusulas para reflejar la relación de contraste del griego: primero la ausencia de la venida del Espíritu, luego la sola realidad del bautismo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, aunque este verso no lo contiene.
  - Se mantiene «Señor» para κύριος según la política terminológica del POB en español.
  - Se usa «bautizados» y no «sumergidos», porque el contexto eclesial y la audición del texto piden la forma convencional sin perder el valor técnico del bautismo.
  - No se explicita «Espíritu Santo» en el texto principal porque el griego depende del contexto inmediato; la decisión se documenta en las notas teológicas.
