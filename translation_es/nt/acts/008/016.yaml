  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: οὐδέπω γὰρ ἦν ἐπ’ οὐδενὶ αὐτῶν ἐπιπεπτωκός se comunica adecuadamente con «todavía no había caído sobre ninguno de ellos», preservando la imaginería de ἐπιπίπτω en Hechos y dejando implícito el sujeto desde el contexto. También βεβαπτισμένοι ὑπῆρχον está bien representado por «habían sido bautizados». La principal falla no está en el cuerpo del texto sino en las notas: están invertidas respecto de los puntos reales de variación y una de ellas introduce inglés («into»), lo cual no es aceptable en una edición española.'
  spanish_quality_summary: 'El español principal es claro, natural y de registro eclesial digno. «Porque todavía no había caído sobre ninguno de ellos; solamente habían sido bautizados en el nombre del Señor Jesús» es legible y fiel. Sin embargo, el anclaje de notas es incorrecto: [a] está puesto en «bautizados» aunque la alternativa relevante concierne a la preposición de εἰς τὸ ὄνομα, y [b] está al final aunque debería acompañar «caído sobre ninguno de ellos» si se quiere preservar la alternativa «venido sobre». Además, las dos notas repiten o contradicen el contenido y una mezcla español con inglés.'
  glossary_alignment: 'Alineado con la terminología del proyecto: «Señor Jesús» para κυρίου Ἰησοῦ, «bautizados» para βεβαπτισμένοι, y ninguna infracción de políticas mayores. No aplica aquí la política de «Yahvé». El manejo de κύριος como «Señor» es correcto en este contexto cristológico.'
