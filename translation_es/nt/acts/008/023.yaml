translation:
  language: es
  text: Porque veo que estás en la hiel de amargura[a] y en la atadura de injusticia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La hiel de amargura» preserva la metáfora vívida del griego y probablemente evoca lenguaje veterotestamentario sobre una amargura venenosa o corrosiva; compárese Deuteronomio 29:18 LXX.
    reason: cross_reference
  - marker: b
    text: O «la cadena de injusticia» o «el grillete de maldad». Se eligió «atadura» para conservar la idea de aquello que sujeta o mantiene cautivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - en medio de
  lexicon: BDAG
  rationale: En esta construcción idiomática con ὁρῶ σε ὄντα, εἰς expresa estado o condición. «En» conserva la idea de esfera/estado sin volverlo demasiado explicativo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la reprensión previa. «Porque» es natural en español y mantiene la fuerza causal de γάρ.
- source_word: χολὴν πικρίας
  english_pob_choice: the gall of bitterness
  chosen_spanish: la hiel de amargura
  alternatives_spanish:
  - la hiel amarga
  - la amargura de la hiel
  lexicon: BDAG
  rationale: «Hiel» conserva la metáfora vívida y semítica; «amargura» reproduce πικρίας sin reducir la expresión a una simple cualidad abstracta. «Amargura» resulta más natural y transparente en español que «bitterness» literalizado como «amargor».
- source_word: σύνδεσμον ἀδικίας
  english_pob_choice: the bond of unrighteousness
  chosen_spanish: el lazo de injusticia
  alternatives_spanish:
  - la cadena de injusticia
  - el vínculo de injusticia
  lexicon: BDAG
  rationale: σύνδεσμος puede ser algo que ata; «lazo» conserva la imagen de atadura en un español claro. Para ἀδικία, «injusticia» es la equivalencia más directa y no suaviza el matiz moral.
- source_word: ὁρῶ
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - percibo
  - discierno
  lexicon: BDAG
  rationale: ὁράω aquí expresa discernimiento espiritual. «Veo» mantiene la literalidad básica y funciona de forma natural en español para ese tipo de percepción.
- source_word: σε ὄντα
  english_pob_choice: that you are
  chosen_spanish: estás
  alternatives_spanish:
  - que eres
  - que estás siendo
  lexicon: BDAG
  rationale: La construcción acusativo + participio se vuelve en español una cláusula de contenido. «Estás» comunica el estado presente de forma fluida y fiel.
theological_decisions:
- issue: Metáforas de condición moral y esclavitud/bondage
  english_pob_reading: 'Rendered the two phrases as present moral/spiritual bondage: ''in the gall of bitterness and the bond of unrighteousness.'''
  chosen_spanish_reading: 'Conservé ambas metáforas como descripciones del estado actual de Simón: ''en la hiel de amargura y en el lazo de injusticia''.'
  alternative_spanish_readings:
  - '''lleno de amarga hiel y sujeto a injusticia'''
  - '''envenenado por la amargura y atado por la injusticia'''
  rationale: El griego usa expresiones compactas y figuradas; traducirlas con imágenes equivalentes preserva la severidad y la ambigüedad del texto sin explicitar más de lo que dice.
  doctrine_reference: 'Translation philosophy: preservación de metáfora y cautela ante sobreexplicación doctrinal'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando marcas de nota visibles en el texto principal ([a] y [b]) exactamente donde corresponden, y se mantuvo la traducción de las metáforas sin reemplazarlas por una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usó «hiel» para conservar el color figurado del original y de la POB inglesa.
  - Se prefirió «injusticia» frente a «injusticia»/«impiedad» para no desplazar el énfasis moral del sustantivo ἀδικία.
  - Se evitó «Cristo», «SEÑOR» u otros términos no pertinentes al versículo.
  - La puntuación sigue el español moderno con una sola oración que reproduce el tono de la observación de Pedro.
