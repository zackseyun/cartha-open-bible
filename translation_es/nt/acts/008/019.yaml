translation:
  language: es
  text: 'diciendo: «Dame también esta autoridad[a], para que cualquiera sobre quien imponga las manos reciba el Espíritu Santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder» para ἐξουσίαν. El término puede denotar autoridad delegada, derecho o poder para actuar; se eligió «autoridad» para conservar la distinción léxica frente a otras palabras griegas que significan más directamente «poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio presente introduce el discurso de Simón; en español narrativo, «diciendo» conserva la conexión con la cláusula anterior sin añadir una coordinación o una subordinación que el griego no exige.
- source_word: Δότε
  english_pob_choice: Give
  chosen_spanish: Dad
  alternatives_spanish:
  - Denme
  - Dadme
  lexicon: BDAG
  rationale: El imperativo plural aoristo de δίδωμι se puede verter de forma directa como una petición imperativa. «Dadme» mantiene la fuerza del verbo y el destinatario plural implícito en el plural griego, con tono natural en español bíblico.
- source_word: κἀμοί
  english_pob_choice: me also
  chosen_spanish: también a mí
  alternatives_spanish:
  - a mí también
  - me también
  lexicon: BDAG
  rationale: 'La crasis enfatiza inclusión: Simón pide para sí lo mismo que ha observado. «También a mí» conserva ese énfasis de manera natural en español y evita endurecer el orden de palabras.'
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - facultad
  lexicon: BDAG
  rationale: Se conserva «autoridad» para mantener la distinción léxica observada en la POB inglesa frente a δύναμις. Aunque «poder» sería posible, aquí puede borrar la diferencia entre autoridad delegada y poder en sentido más general.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: BDAG
  rationale: El demostrativo señala una autoridad concreta, la que Simón acaba de ver. «Esta» reproduce esa referencia específica sin sobrecarga interpretativa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: La conjunción introduce finalidad. «Para que» es la forma española más natural y preserva el valor teleológico del griego.
- source_word: ᾧ ἐὰν
  english_pob_choice: anyone on whom
  chosen_spanish: a cualquiera sobre quien
  alternatives_spanish:
  - sobre quienquiera que
  - a quienquiera que
  lexicon: BDAG
  rationale: La construcción relativa indefinida expresa generalidad condicionada. «A cualquiera sobre quien» comunica con claridad el alcance distributivo sin forzar una forma arcaizante.
- source_word: ἐπιθῶ τὰς χεῖρας
  english_pob_choice: I lay my hands
  chosen_spanish: ponga mis manos
  alternatives_spanish:
  - imponga mis manos
  - extienda mis manos
  lexicon: BDAG
  rationale: La expresión griega alude al acto concreto de la imposición de manos. «Ponga mis manos» sigue de cerca la imagen verbal del original; «imponga» sería idiomático teológicamente, pero puede sonar más técnico de lo que exige el griego aquí.
- source_word: λαμβάνῃ
  english_pob_choice: may receive
  chosen_spanish: reciba
  alternatives_spanish:
  - pueda recibir
  - reciba así
  lexicon: BDAG
  rationale: 'En español, el subjuntivo presente tras «para que» ya expresa finalidad y posibilidad: «reciba» conserva la relación de propósito sin añadir modalización excesiva.'
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - un espíritu santo
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo, el contexto en Hechos señala claramente al Espíritu divino personal. En español, el referente se expresa naturalmente como «el Espíritu Santo», evitando la lectura indefinida que el contexto no permite.
theological_decisions:
- issue: Referencia de πνεῦμα ἅγιον sin artículo
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - un espíritu santo
  rationale: La ausencia de artículo en griego no obliga a una indefinición en español. En el contexto narrativo de Hechos, se trata del Espíritu divino prometido, no de «un espíritu santo» genérico. La forma con artículo es la más precisa y natural en español.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Valor de ἐξουσίαν como autoridad frente a poder
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - poder
  - facultad
  rationale: La petición de Simón distingue la capacidad/competencia para actuar de la noción más amplia de poder. «Autoridad» preserva esa distinción y evita confundir el término con δύναμις, sin negar que en contexto la autoridad tenga efectos efectivos.
  doctrine_reference: Lexical distinction between ἐξουσία and δύναμις
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide con la solución auditada en inglés para la estructura participial, la petición de finalidad y la referencia al Espíritu Santo. No se introdujeron revisiones textuales ni variantes; la única decisión destacable es mantener la distinción de ἐξουσίαν como «autoridad» y expresar πνεῦμα ἅγιον como «el Espíritu Santo» por contexto.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverente y bíblico de los términos teológicos principales: «autoridad», «Espíritu Santo», «imponer/ponga mis manos».'
  - Se evita «poder» en el texto principal para no borrar la distinción lexical preservada por la POB inglesa.
  - La sintaxis española usa «para que» con subjuntivo para reflejar el propósito del ἵνα griego de manera natural y fiel.
