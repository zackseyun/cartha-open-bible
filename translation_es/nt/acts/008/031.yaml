translation:
  language: es
  text: 'Y dijo: «¿Cómo podría yo,[a] si alguien no me guía[b]?». Entonces le rogó[c] a Felipe que subiera y se sentara con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Cómo puedo yo?». El griego expresa incapacidad potencial sin esa ayuda.
    reason: lexical_alternative
  - marker: b
    text: O «si alguien no me conduce». El verbo griego puede referirse tanto a la guía literal como a la orientación del entendimiento.
    reason: lexical_alternative
  - marker: c
    text: O «lo invitó». El verbo puede denotar una petición apremiante o una invitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πῶς γὰρ ἂν δυναίμην
  english_pob_choice: How could I
  chosen_spanish: ¿Cómo podría yo
  alternatives_spanish:
  - ¿Cómo puedo yo
  - ¿Cómo habría de poder yo
  lexicon: BDAG
  rationale: El optativo con ἄν expresa posibilidad potencial o incapacidad condicionada. «¿Cómo podría yo?» conserva esa fuerza modal en español mejor que un presente simple, y suena natural en un diálogo.
- source_word: ἐὰν μή τις ὁδηγήσει με
  english_pob_choice: unless someone guides me
  chosen_spanish: si alguien no me guía
  alternatives_spanish:
  - a menos que alguien me guíe
  - si alguien no me conduce
  - si alguien no me lleva
  lexicon: BDAG
  rationale: ὁδηγέω puede abarcar guiar o conducir, y en este contexto también orienta el entendimiento. «Si alguien no me guía» mantiene esa amplitud sin reducirlo a «explicarme».
- source_word: παρεκάλεσέν τε
  english_pob_choice: Then he urged
  chosen_spanish: Entonces invitó
  alternatives_spanish:
  - Entonces le rogó
  - Entonces le pidió
  - Y además le urgió
  lexicon: BDAG
  rationale: παρακαλέω aquí puede ser una petición cortés o una invitación insistente. En español, «invitó» refleja bien el contexto de subir al carro; la nota preserva la alternativa de petición más enérgica documentada por el inglés POB.
- source_word: ἀναβάντα
  english_pob_choice: to come up
  chosen_spanish: a subir
  alternatives_spanish:
  - a subir allí
  - a venir arriba
  - a ascender
  lexicon: BDAG
  rationale: ἀναβαίνω significa literalmente subir/ir arriba. «A subir» conserva la imagen espacial del movimiento hacia el carro sin sobreinterpretar.
- source_word: καθίσαι σὺν αὐτῷ
  english_pob_choice: sit with him
  chosen_spanish: sentarse con él
  alternatives_spanish:
  - sentarse junto a él
  - sentarse con él
  lexicon: BDAG
  rationale: καθίζω con σύν + dativo comunica sentarse con alguien. «Sentarse con él» es claro y natural en español; «junto a él» sería posible pero añade una precisión espacial no explícita en el griego.
- source_word: Φίλιππον
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Fílipo
  lexicon: convención onomástica
  rationale: Se sigue la forma castellana establecida del nombre propio en el texto bíblico.
theological_decisions:
- issue: El alcance de ὁδηγέω en un contexto de comprensión bíblica
  english_pob_reading: The Greek verb can refer both to literal guidance and to directed understanding.
  chosen_spanish_reading: «Guía» mantiene tanto la guía literal como la orientación del entendimiento.
  alternative_spanish_readings:
  - «Conduce» enfatiza el traslado físico
  - «Me explica» reduce el verbo a interpretación verbal
  rationale: No conviene estrechar el verbo a una sola dimensión. El español «guiar» permite conservar la tensión entre conducción y comprensión, como en el audit trail inglés.
  doctrine_reference: Hermenéutica bíblica; sentido léxico contextual.
- issue: El valor pragmático de παρακαλέω en la escena
  english_pob_reading: The verb can denote an earnest request or invitation.
  chosen_spanish_reading: «Invitó» conserva una solicitud real y atenta, sin volverla demasiado formal ni demasiado intensa.
  alternative_spanish_readings:
  - «Rogó» intensifica demasiado
  - «Pidió» debilita el matiz
  - «Suplicó» exagera la fuerza
  rationale: La escena describe una petición cortés pero decidida. «Invitó» es la mejor equivalencia funcional en español, aunque la nota deja abierta la lectura de solicitud insistente.
  doctrine_reference: Pragmática del discurso; no doctrinal en sentido estricto.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios sustantivos; se mantiene la ambigüedad léxica de ὁδηγέω y παρακαλέω en español sin forzar una paráfrasis. La única adaptación relevante es onomástica: Philip se rinde como Felipe por convención castellana.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Guiar» preserva la doble posibilidad de conducción física y dirección del entendimiento.
  - «Invitó» en la línea principal refleja la cortesía del contexto; la nota deja constancia de la alternativa «rogó».
