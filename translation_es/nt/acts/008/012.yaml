translation:
  language: es
  text: Pero cuando creyeron a Felipe, mientras proclamaba las buenas noticias acerca del reino de Dios y del nombre de Jesús Mesías[a], iban siendo bautizados, tanto hombres como mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del nombre de Jesús Cristo». El título griego Χριστός se ha traducido aquí «Mesías» para conservar su sentido titular.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅτε introduce la cláusula temporal; δέ añade una leve transición narrativa. «Pero cuando» conserva ese giro discursivo sin cargarlo demasiado.
- source_word: ἐπίστευσαν τῷ Φιλίππῳ
  english_pob_choice: they believed Philip
  chosen_spanish: creyeron a Felipe
  alternatives_spanish:
  - creyeron en Felipe
  - creyeron lo que Felipe decía
  - confiaron en Felipe
  lexicon: BDAG
  rationale: Con un dativo personal, πιστεύω puede significar creer a una persona como testigo o portavoz. En español, «creyeron a Felipe» expresa esa confianza en su testimonio sin convertir el objeto en contenido abstracto ni sugerir fe salvadora en su persona.
- source_word: εὐαγγελιζομένῳ
  english_pob_choice: as he proclaimed the good news
  chosen_spanish: que proclamaba las buenas noticias
  alternatives_spanish:
  - predicaba
  - anunciaba el evangelio
  - traía buenas noticias
  lexicon: BDAG
  rationale: El participio presente medio modifica a Felipe y explica el contexto de la creencia. «Que proclamaba las buenas noticias» mantiene el valor verbal evangelizador de εὐαγγελίζω y su función circunstancial.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema del anuncio. «Acerca de» suena natural en español y conserva esa relación temática.
- source_word: τῆς βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino divino
  lexicon: BDAG
  rationale: «Reino de Dios» es la forma transparente y estable para esta expresión; no es necesario desplazarla a «reinado» aquí.
- source_word: τοῦ ὀνόματος Ἰησοῦ Χριστοῦ
  english_pob_choice: the name of Jesus Messiah
  chosen_spanish: del nombre de Jesús Mesías
  alternatives_spanish:
  - del nombre de Jesús Cristo
  - del nombre de Jesús el Mesías
  lexicon: BDAG
  rationale: Se conserva «nombre de» por el peso semítico de ὄνομα como identidad/autoridad/revelación personal. Χριστοῦ se rinde como «Mesías» para preservar su valor titular y evitar aplanarlo a un nombre propio cristiano fijo.
- source_word: ἐβαπτίζοντο
  english_pob_choice: they were being baptized
  chosen_spanish: eran bautizados
  alternatives_spanish:
  - estaban siendo bautizados
  - fueron bautizados
  - seguían siendo bautizados
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa acción en desarrollo en el pasado. «Eran bautizados» mantiene ese aspecto de manera más natural en español que una perífrasis más pesada.
- source_word: ἄνδρες τε καὶ γυναῖκες
  english_pob_choice: both men and women
  chosen_spanish: tanto hombres como mujeres
  alternatives_spanish:
  - hombres y mujeres
  - ambos, hombres y mujeres
  lexicon: BDAG
  rationale: La coordinación inclusiva τε ... καὶ se refleja bien con «tanto ... como ...», que suena natural y conserva la explicitación de ambos sexos.
theological_decisions:
- issue: Χριστοῦ en Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesús el Mesías
  rationale: Aquí Χριστός funciona como título mesiánico, no simplemente como parte fosilizada del nombre. En español, «Mesías» preserva mejor ese sentido titular y evita perder la carga bíblico-hebrea del término.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando el título está en vista'
translation_notes:
  revision_awareness: 'El contexto inglés muestra una oscilación editorial entre «Jesus Christ» y «Jesus Messiah», con una corrección posterior que restablece «Messiah» por política doctrinal. Esta versión española sigue la lectura final auditada: Χριστός como título, rendido por «Mesías», y conserva la estructura narrativa, el imperfecto pasivo y la coordinación inclusiva del griego.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Mesías» para Χριστοῦ en coherencia con la política POB.
  - «Creyeron a Felipe» conserva el dativo personal sin convertirlo en una paráfrasis explicativa.
  - «Eran bautizados» refleja el imperfecto pasivo sin sobreinterpretar duración exacta.
  - «Tanto hombres como mujeres» reproduce la inclusión explícita de ambos grupos.
