translation:
  language: es
  text: Y él iba de regreso, sentado en su carroza[a], y leía al profeta Isaías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Leer en la antigüedad a menudo se hacía en voz alta; «leía en voz alta» es posible, aunque el verbo griego no lo exige aquí.
    reason: cultural_note
  - marker: b
    text: O «Isaías el profeta». El orden griego es «Isaías el profeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν τε ὑποστρέφων
  english_pob_choice: he was returning
  chosen_spanish: iba de regreso
  alternatives_spanish:
  - estaba volviendo
  - iba regresando
  lexicon: BDAG
  rationale: La construcción perifrástica expresa acción en curso en tiempo pasado. «Iba de regreso» conserva ese matiz progresivo y evita añadir «a casa» o «hogar», que no está explícito en el griego.
- source_word: καθήμενος
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado en posición de viaje
  - en asiento
  lexicon: BDAG
  rationale: Describe la postura del etíope mientras viaja. «Sentado» es natural en español y conserva el valor estativo del participio.
- source_word: ἐπὶ τοῦ ἅρματος αὐτοῦ
  english_pob_choice: in his chariot
  chosen_spanish: en su carro
  alternatives_spanish:
  - sobre su carro
  - encima de su carro
  lexicon: BDAG
  rationale: Aunque ἐπί con genitivo puede reflejarse más literalmente como «sobre», en español el medio de transporte se expresa con naturalidad como «en su carro», manteniendo la imagen concreta del vehículo.
- source_word: ἀνεγίνωσκεν
  english_pob_choice: was reading
  chosen_spanish: leía
  alternatives_spanish:
  - estaba leyendo
  - leía en voz alta
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado. «Leía» preserva ese aspecto sin añadir «en voz alta», que sería posible culturalmente pero no está explícito en el verbo.
- source_word: τὸν προφήτην Ἠσαΐαν
  english_pob_choice: Isaiah the prophet
  chosen_spanish: a Isaías el profeta
  alternatives_spanish:
  - al profeta Isaías
  lexicon: BDAG
  rationale: Se conserva el orden griego «Isaías el profeta», como hizo la POB en inglés, y se usa «a» porque el verbo «leer» en español admite objeto personal introducido por la preposición cuando se refiere a una persona identificada por un título.
translation_notes:
  revision_awareness: Se corrigió el problema previo de validación eliminando cualquier nota sin anclaje. Ahora solo se incluyen dos notas, y los marcadores [a] y [b] aparecen exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el orden «Isaías el profeta» para reflejar el orden griego y la decisión auditada de la POB inglesa.
  - No se añadió «hogar» ni «casa» para no sobreinterpretar el movimiento de regreso.
  - Se evitó traducir mecánicamente con anglicismos; el español fluye de manera natural sin perder el valor aspectual del imperfecto.
