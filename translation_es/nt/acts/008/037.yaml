translation:
  language: es
  text: 'Y Felipe[a] dijo: «Si crees de todo corazón, puedes». Y él respondió y dijo: «Creo que Jesús es el Mesías, el Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos papiros del siglo III y los códices Sinaítico y Vaticano del siglo IV) y en antiguas traducciones coptas. Está presente en la mayoría bizantina y en la tradición latina, y fue citado por padres de la iglesia antiguos como Ireneo y Cipriano a fines del siglo II. A menudo se lo describe como una fórmula litúrgica bautismal temprana que después se incorporó al texto narrativo de Hechos.
    reason: textual_variant
lexical_decisions:
- source_word: ἔξεστιν
  english_pob_choice: you may
  chosen_spanish: puedes
  alternatives_spanish:
  - te está permitido
  - es lícito
  - se te permite
  lexicon: BDAG
  rationale: El griego impersonal ἔξεστιν expresa permiso o posibilidad. En español, «puedes» comunica de forma natural la autorización implícita sin introducir un matiz jurídico más fuerte que el del contexto bautismal.
- source_word: ἐξ ὅλης τῆς καρδίας
  english_pob_choice: with all your heart
  chosen_spanish: de todo corazón
  alternatives_spanish:
  - con todo tu corazón
  - con plena convicción
  - con toda tu alma
  lexicon: BDAG
  rationale: La frase idiomática se conserva en sentido. «De todo corazón» es una equivalencia idiomática natural en español y mantiene la idea de sinceridad y entrega completa.
- source_word: Πιστεύω
  english_pob_choice: I believe
  chosen_spanish: Creo
  alternatives_spanish:
  - Yo creo
  - Confieso creer
  - Tengo fe
  lexicon: BDAG
  rationale: En una confesión directa, «Creo» reproduce bien el valor verbal de asentimiento y confesión. «Tengo fe» o «confieso creer» alteran innecesariamente el tono y la forma breve del griego.
- source_word: τὸν υἱὸν τοῦ θεοῦ εἶναι τὸν Ἰησοῦν Χριστόν
  english_pob_choice: that Jesus is the Messiah, the Son of God
  chosen_spanish: que Jesús es el Mesías, el Hijo de Dios
  alternatives_spanish:
  - que Jesús es Cristo, el Hijo de Dios
  - que Jesús es el Ungido, el Hijo de Dios
  lexicon: POB consistency / Χριστός
  rationale: El audit trail inglés cambió Christos a «Messiah» para reflejar el griego y la consistencia POB. En español, «Mesías» es el equivalente natural y más transparente de Χριστός en este contexto confesional; «Cristo» podría sonar más como nombre propio litúrgico que como título.
theological_decisions:
- issue: 'Variante textual: inclusión de Hechos 8:37'
  english_pob_reading: The verse is absent from the earliest Greek manuscripts... present in the Byzantine majority tradition and the Latin tradition... possibly an early baptismal liturgical formula.
  chosen_spanish_reading: El versículo se presenta con una nota textual, reconociendo que falta en los manuscritos griegos más antiguos y que sí está atestiguado en la tradición bizantina y latina.
  alternative_spanish_readings:
  - Incluir el versículo sin nota textual
  - Omitir el versículo del texto principal
  rationale: La tradición POB en inglés conserva el versículo con advertencia crítica. El español debe hacer lo mismo para no borrar la tensión textual documentada ni presentar como indiscutida una lectura disputada.
  doctrine_reference: crítica textual / transmisión del texto
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB, que ajustó Χριστός a «Messiah» para mantener la consistencia con el griego y afinó la confesión para reflejar mejor el orden y contenido del original.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, conforme al criterio POB y al uso confesional del pasaje.
  - 'Se conserva la estructura narrativa breve del griego: declaración de Felipe, respuesta condicional y confesión de fe.'
  - El marcador textual [a] acompaña al nombre de Felipe, como en el audit trail inglés, para señalar la variante crítica sin interrumpir el flujo del versículo.
