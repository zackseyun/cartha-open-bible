translation:
  language: es
  text: Y las multitudes, de común acuerdo,[a] prestaban mucha atención a lo que decía Felipe,[b] al oírlo y ver las señales que hacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una» o «unánimemente»; el griego enfatiza una respuesta unida y compartida.
    reason: lexical_alternative
  - marker: b
    text: O «a lo que estaba siendo dicho por Felipe».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεῖχον
  english_pob_choice: paid close attention
  chosen_spanish: prestaba mucha atención
  alternatives_spanish:
  - estaba muy atenta
  - ponía mucha atención
  - prestaba close atención
  lexicon: BDAG
  rationale: προσέχω expresa dirigir la atención con constancia; en imperfecto sugiere atención sostenida. «Prestaba mucha atención» comunica esa perseverancia de modo natural en español sin debilitar la fuerza del verbo.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: la multitud
  alternatives_spanish:
  - las multitudes
  - la gente
  lexicon: BDAG
  rationale: El griego usa un plural; en español, «la multitud» funciona como sustantivo colectivo natural y conserva la idea de un grupo reunido. Se evita «la gente», que pierde algo de la imagen de masa reunida.
- source_word: τοῖς λεγομένοις
  english_pob_choice: to what was being said
  chosen_spanish: a lo que decía
  alternatives_spanish:
  - a lo que se decía
  - a las cosas que se decían
  - al mensaje que daba
  lexicon: BDAG
  rationale: El participio articular neutro plural apunta al contenido del discurso. En español, «a lo que decía» evita una paráfrasis más interpretativa como «mensaje», y mantiene el enfoque en el acto de hablar de Felipe.
- source_word: ὑπὸ τοῦ Φιλίππου
  english_pob_choice: by Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - por Felipe
  - de parte de Felipe
  lexicon: BDAG
  rationale: La agencia ya queda implícita en «lo que decía Felipe»; no hace falta repetir «por Felipe». Esta decisión evita pesadez en español y conserva el agente claramente identificado.
- source_word: ὁμοθυμαδὸν
  english_pob_choice: with one accord
  chosen_spanish: unánimemente
  alternatives_spanish:
  - de común acuerdo
  - con un mismo sentir
  - con una sola voz
  lexicon: BDAG
  rationale: ὁμοθυμαδόν enfatiza unidad de respuesta y propósito compartido. «Unánimemente» expresa esa convergencia de forma breve y digna. No se usa «juntos» porque sería más débil.
- source_word: ἐν τῷ ἀκούειν αὐτοὺς καὶ βλέπειν
  english_pob_choice: as they heard him and saw
  chosen_spanish: al oírles y ver
  alternatives_spanish:
  - mientras lo oían y veían
  - al escucharlo y ver
  - cuando lo oían y veían
  lexicon: BDAG
  rationale: La construcción temporal-circunstancial se vierte con un infinitivo sustantivado español. «Al oírles y ver» conserva la simultaneidad. Se mantiene el plural del sujeto pronominal del griego, aunque el referente contextual sea Felipe, porque el pasaje presenta la acción de los oyentes.
- source_word: τὰ σημεῖα
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - los signos milagrosos
  - las señales milagrosas
  lexicon: BDAG
  rationale: «σημεῖα» puede ser «signos» o «señales». Aquí «señales» suena más natural en español bíblico contemporáneo y comunica el carácter indicativo de los hechos sin añadir «milagrosas», que interpretaría más de lo que el texto dice.
- source_word: ἃ ἐποίει
  english_pob_choice: that he was doing
  chosen_spanish: que hacía
  alternatives_spanish:
  - que estaba haciendo
  - que realizaba
  - que él hacía
  lexicon: BDAG
  rationale: El imperfecto ἐποίει expresa acción continua. «Que hacía» conserva esa continuidad de manera sencilla y fiel, evitando una perífrasis más pesada.
theological_decisions:
- issue: Unidad de respuesta de la multitud
  english_pob_reading: with one accord
  chosen_spanish_reading: unánimemente
  alternative_spanish_readings:
  - de común acuerdo
  - con un mismo sentir
  rationale: No se diluye la fuerza corporativa de ὁμοθυμαδόν. «Unánimemente» mantiene el énfasis en una respuesta compartida, coherente con la observación del texto griego y la decisión inglesa de situar la frase de modo prominente.
  doctrine_reference: Hechos 8:6; unidad comunitaria en la recepción del testimonio apostólico
- issue: Carácter de las σημεῖα
  english_pob_reading: the signs
  chosen_spanish_reading: las señales
  alternative_spanish_readings:
  - los signos milagrosos
  - las señales milagrosas
  rationale: 'Se evita imponer explícitamente «milagrosas» aunque el contexto lo sugiera, para no sobretraducir el término. «Señales» conserva la ambigüedad teológica del griego: hechos que autentican el mensaje sin definirlos dogmáticamente en la traducción.'
  doctrine_reference: Hechos 8:6; lenguaje de señales como autenticación divina
translation_notes:
  revision_awareness: La versión inglesa auditada movió «with one accord» antes de «paid close attention» para reflejar mejor el griego. En español se reproduce ese mismo orden con «unánimemente» antepuesto a «prestaba mucha atención», manteniendo el énfasis corporativo y el flujo narrativo natural.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Felipe» para Φίλιππος.
  - Se usa «señales» en lugar de «signos» por fluidez en español, sin añadir calificativos interpretativos.
  - El imperfecto griego se refleja con imperfecto español («prestaba», «hacía») para conservar la acción continua.
  - No se emplea «SEÑOR» ni terminología eclesiástica añadida, porque el versículo no lo requiere.
