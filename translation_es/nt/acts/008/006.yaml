revisions:
- from: Y la multitud, unánimemente, prestaba mucha atención a lo que decía Felipe, al oírles y ver las señales que hacía.
  to: Y las multitudes, de común acuerdo,[a] prestaban mucha atención a lo que decía Felipe,[b] al oírlo y ver las señales que hacía.
  rationale: Se corrige el referente de αὐτούς con «al oírlo», se preserva mejor el plural οἱ ὄχλοι con «las multitudes», y se sustituye «unánimemente» por «de común acuerdo» para reflejar mejor ὁμοθυμαδόν en español natural y eclesialmente legible. Se añaden notas donde el inglés preservó alternativas significativas.
