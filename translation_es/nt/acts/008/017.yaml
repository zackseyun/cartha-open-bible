translation:
  language: es
  text: Entonces les imponían las manos[a], y recibían el Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con aspecto más explícito: «Entonces les estaban imponiendo las manos, y estaban recibiendo el Espíritu Santo». Ambos verbos griegos están en imperfecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal y narrativo que marca la secuencia de la acción anterior. «Entonces» es natural en español y conserva la progresión del relato sin añadir matices.
- source_word: ἐπετίθεσαν
  english_pob_choice: they laid
  chosen_spanish: les imponían
  alternatives_spanish:
  - les imponían las manos
  - ponían sus manos sobre ellos
  lexicon: BDAG
  rationale: La construcción griega con χεῖρας forma el modismo «imponer las manos». En español, «imponían las manos» comunica el gesto ritual con claridad y evita una calca extraña.
- source_word: τὰς χεῖρας
  english_pob_choice: their hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - las manos de ellos
  lexicon: BDAG
  rationale: El artículo griego es idiomático en esta expresión. En español, el posesivo no es necesario porque el verbo y el contexto ya indican de quiénes son las manos.
- source_word: ἐπ’ αὐτούς
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - en ellos
  - encima de ellos
  lexicon: BDAG
  rationale: Preposición de dirección o contacto físico. «Sobre ellos» mantiene el sentido espacial del gesto de imposición de manos con registro formal y natural.
- source_word: ἐλάμβανον
  english_pob_choice: they received / they were receiving
  chosen_spanish: recibían
  alternatives_spanish:
  - recibieron
  - estaban recibiendo
  lexicon: BDAG
  rationale: 'El imperfecto puede reflejarse en español con imperfecto: la recepción ocurre en curso, acompañando la imposición de manos. Esto preserva la tensión aspectual que el griego documenta.'
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En Hechos, la expresión designa al Espíritu divino prometido. En español, la forma natural y teológicamente precisa es «el Espíritu Santo».
theological_decisions:
- issue: ¿Debe πνεῦμα ἅγιον entenderse como entidad divina personal o como un sentido indefinido?
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - un espíritu santo
  rationale: El contexto de Hechos indica la recepción del don del Espíritu prometido por Dios, no un espíritu indefinido. «El Espíritu Santo» preserva el referente personal-divino sin sobreexplicar.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: ¿Cómo reflejar el imperfecto de ambos verbos griegos?
  english_pob_reading: laid ... and received / were receiving
  chosen_spanish_reading: imponían ... y recibían
  alternative_spanish_readings:
  - impusieron ... y recibieron
  - estaban imponiendo ... y estaban recibiendo
  rationale: El imperfecto de ambos verbos puede conservarse en español para mostrar la acción en desarrollo o concomitante. Esta opción mantiene la señal aspectual del griego sin forzar una perífrasis.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La redacción española sigue el texto griego de SBLGNT y toma como apoyo el expediente inglés, pero no copia mecánicamente la solución final inglesa. En particular, se conserva el imperfecto de ambos verbos para reflejar mejor el aspecto verbal documentado por la nota inglesa, y se mantiene la referencia definida al Espíritu Santo conforme al contexto de Hechos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantiene «Espíritu Santo» con artículo definido por el referente divino del contexto.
  - Se elige «imponer las manos» como equivalente idiomático de la acción ritual griega.
  - Se preserva el imperfecto español («imponían», «recibían») para reflejar la aspectualidad del griego.
