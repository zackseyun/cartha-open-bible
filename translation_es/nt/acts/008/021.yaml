translation:
  language: es
  text: No tienes parte ni suerte en este asunto[a][b], porque tu corazón no es recto delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porción» o «participación» en vez de «parte». El griego empareja dos casi sinónimos («parte» y «suerte/lote») para subrayar que Simón no tiene ninguna participación en este asunto.
    reason: lexical_alternative
  - marker: b
    text: O «en esta palabra» o «en este mensaje». La palabra griega λόγος puede significar «palabra», «mensaje» o «asunto»; aquí probablemente se refiere al tema que se está tratando.
    reason: lexical_alternative
lexical_decisions:
- source_word: μερὶς
  english_pob_choice: part
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - participación
  lexicon: BDAG
  rationale: μερὶς denota una parte, porción o participación. «Parte» conserva bien la pareja con κλῆρος y comunica exclusión de una participación real en lo que se discute.
- source_word: κλῆρος
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - herencia
  lexicon: BDAG
  rationale: κλῆρος puede significar «suerte», «lote» o «herencia». En esta pareja con μερὶς, «suerte» mantiene el paralelismo tradicional de «parte ni suerte» y su fuerza idiomática en español, sin perder el matiz de asignación o participación.
- source_word: ἐν τῷ λόγῳ τούτῳ
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en esta palabra
  - en este mensaje
  - en este asunto
  lexicon: BDAG
  rationale: λόγος abarca «palabra», «mensaje» y también «asunto» o «materia». Aquí el contexto apunta a la situación concreta en discusión; «asunto» resulta natural en español y evita una traducción demasiado literal que oscurezca el sentido.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - interior
  lexicon: BDAG
  rationale: «Corazón» preserva el uso bíblico del centro interior de la persona, incluyendo intención y disposición moral.
- source_word: εὐθεῖα
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - upright
  lexicon: BDAG
  rationale: εὐθεῖα significa literalmente «recta»; «recto» es la forma más natural en español para una evaluación moral y conserva la imagen de alineación con la norma de Dios.
- source_word: ἔναντι τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: ἔναντι con genitivo significa «delante de» o «en presencia de». «Delante de Dios» es claro, sobrio y conserva el matiz evaluativo y judicial de la expresión.
theological_decisions:
- issue: 'Alcance de la exclusión de Simón: salvación, ministerio o el asunto específico'
  english_pob_reading: 'The translation leaves the scope at the level of the Greek: Simon has no part or share ''in this matter,'' without expanding it to a doctrinal conclusion about his final salvation status.'
  chosen_spanish_reading: 'La traducción mantiene el alcance en el nivel del griego: Simón no tiene parte ni suerte en este asunto, sin ampliar el texto a una conclusión doctrinal sobre su estado final de salvación.'
  alternative_spanish_readings:
  - Simón está totalmente excluido de la salvación
  - La frase se limita solo a negar su participación en la autoridad apostólica
  rationale: El griego especifica exclusión «en este asunto» y la fundamenta en la condición del corazón de Simón delante de Dios. Conviene preservar esa tensión sin imponer una conclusión denominacional que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «share» por «lot» para reflejar mejor κλῆρος y preservar la pareja distinta «part nor lot». En español se decidió por la expresión idiomática estable «parte ni suerte», que conserva el paralelismo y la fuerza semítica del original, mientras el resto del versículo sigue de cerca la revisión auditada.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, conforme al estándar del proyecto.
  - Se eligió «corazón» para καρδία por su valor bíblico habitual.
  - «Recto» se usa para εὐθεῖα, evitando una paráfrasis moral excesiva.
  - «Delante de Dios» conserva el matiz forense y relacional de ἔναντι τοῦ θεοῦ.
  - La nota sobre λόγος conserva la ambigüedad documentada entre «palabra», «mensaje» y «asunto».
