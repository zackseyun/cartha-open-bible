  text: οὐκ ἔστιν σοι μερὶς οὐδὲ κλῆρος ἐν τῷ λόγῳ τούτῳ, ἡ γὰρ καρδία σου οὐκ ἔστιν εὐθεῖα ⸀ἔναντι τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/008/021.yaml
  text: You have neither part nor lot in this matter[c][b][a], because your heart is not right before God.
  footnotes:
  - marker: a
    text: Or 'lot' instead of 'share'; the Greek pairs two near-synonyms ('part' and 'lot/share') to stress that Simon has no stake in this matter.
    reason: lexical_alternative
  - marker: b
    text: Or 'in this word/message.' The Greek word can mean 'word,' 'message,' or 'matter'; here it likely refers to the issue under discussion.
    reason: lexical_alternative
  - marker: c
    text: Literally 'straight before God.'
    reason: lexical_alternative
