translation:
  language: es
  text: Y cuando salieron del agua, el Espíritu del Señor arrebató[a] a Felipe, y el eunuco no lo vio más, pues seguía su camino regocijándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se llevó a Felipe». El verbo griego puede enfatizar una remoción repentina y enérgica; también, «lo arrebató».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν ἐκ τοῦ ὕδατος
  english_pob_choice: came up out of the water
  chosen_spanish: subieron del agua
  alternatives_spanish:
  - salieron del agua
  - subieron de las aguas
  lexicon: BDAG
  rationale: ἀναβαίνω con ἐκ expresa movimiento ascendente desde el agua. «Subieron del agua» conserva la imagen espacial de salida sin añadir detalles sobre el modo del bautismo.
- source_word: πνεῦμα κυρίου
  english_pob_choice: the Spirit of the Lord
  chosen_spanish: el Espíritu del Señor
  alternatives_spanish:
  - el espíritu del Señor
  lexicon: BDAG
  rationale: En Lucas-Hechos, la expresión normalmente se refiere al Espíritu Santo actuando con agencia personal. Se mantiene la mayúscula por esa lectura, y «Señor» sigue el valor usual de κύριος en el proyecto.
- source_word: ἥρπασεν
  english_pob_choice: carried Philip away
  chosen_spanish: arrebató a Felipe
  alternatives_spanish:
  - lo arrebató
  - se llevó a Felipe
  - raptó a Felipe
  lexicon: BDAG
  rationale: ἁρπάζω denota una remoción súbita y enérgica. «Arrebatar» conserva mejor esa fuerza en español que un simple «llevar», sin cerrar innecesariamente la forma concreta del evento.
- source_word: οὐκ εἶδεν αὐτὸν οὐκέτι
  english_pob_choice: saw him no longer
  chosen_spanish: ya no lo vio más
  alternatives_spanish:
  - no lo vio más
  - no volvió a verlo
  lexicon: BDAG
  rationale: La construcción negativa con οὐκέτι comunica que, desde ese momento, no lo volvió a ver. «Ya no lo vio más» reproduce esa idea de manera natural en español.
- source_word: ὁ εὐνοῦχος
  english_pob_choice: the eunuch
  chosen_spanish: el eunuco
  alternatives_spanish:
  - el funcionario castrado
  - el eunuco real
  lexicon: BDAG
  rationale: El sustantivo es explícito en el griego y se conserva con el equivalente directo. Otras opciones introducen información no garantizada por el texto inmediato.
- source_word: ἐπορεύετο
  english_pob_choice: went on
  chosen_spanish: seguía su camino
  alternatives_spanish:
  - iba por su camino
  - continuaba su viaje
  lexicon: BDAG
  rationale: El imperfecto presenta la acción en curso. «Seguía su camino» refleja continuidad y suena natural en español narrativo.
- source_word: τὴν ὁδὸν αὐτοῦ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su ruta
  - su viaje
  lexicon: BDAG
  rationale: En este contexto ὁδός se refiere al trayecto/jornada. «Camino» mantiene la expresión idiomática y evita restringirla a una carretera literal.
- source_word: χαίρων
  english_pob_choice: rejoicing
  chosen_spanish: gozoso
  alternatives_spanish:
  - regocijándose
  - con gozo
  lexicon: BDAG
  rationale: El participio expresa el modo en que continuaba viajando. «Gozoso» comunica el estado resultante de manera fluida; se preserva así la alegría continua indicada por el griego.
theological_decisions:
- issue: Naturaleza de πνεῦμα κυρίου
  english_pob_reading: 'Personal divine agency: ''the Spirit of the Lord'''
  chosen_spanish_reading: 'Agencia personal divina: «el Espíritu del Señor»'
  alternative_spanish_readings:
  - un espíritu del Señor
  rationale: En Hechos, la frase ordinariamente designa la acción personal del Espíritu de Dios. La traducción conserva esa lectura sin añadir explicaciones doctrinales al texto.
  doctrine_reference: 'Hechos; término controvertido: κύριος → Señor'
- issue: Fuerza de ἁρπάζω en el relato
  english_pob_reading: A miraculous removal is implied by 'carried Philip away'
  chosen_spanish_reading: Una remoción milagrosa e súbita queda implícita en «arrebató a Felipe»
  alternative_spanish_readings:
  - «lo arrebató» para enfatizar más la fuerza
  - «se llevó a Felipe» para suavizar la imagen
  rationale: El contexto narrativo presenta intervención divina. «Arrebatar» mantiene la idea de acción repentina y poderosa, sin forzar una paráfrasis más explícita que el original.
  doctrine_reference: 'Filosofía de traducción: equivalencia óptima; preservar la tensión teológica'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; la versión inglesa más reciente se mantuvo sin cambios, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «Espíritu» con mayúscula por la lectura personal/divina de πνεῦμα κυρίου.
  - Se conserva «eunuco» como equivalente directo del sustantivo griego.
  - «Camino» traduce ὁδός en sentido de trayecto, no de camino literal solamente.
  - La puntuación española ajusta la coordinación narrativa sin alterar la secuencia verbal del griego.
