- from: Y cuando subieron del agua[a], el Espíritu del Señor arrebató a Felipe, y el eunuco ya no lo vio más; pues seguía su camino gozoso.
  to: Y cuando salieron del agua, el Espíritu del Señor arrebató[a] a Felipe, y el eunuco no lo vio más, pues seguía su camino regocijándose.
  rationale: 'Se corrigen detalles de fidelidad editorial y estilo español sin cambiar el sentido: se reubica la nota al verbo que realmente explica, se mejora la naturalidad de «subieron del agua» a «salieron del agua», se elimina la redundancia de «ya no... más», y se conserva mejor el valor participial de χαίρων con «regocijándose».'
