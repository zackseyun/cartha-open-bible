review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: relativa referida a Pedro y Juan, secuencia de descenso y oración, intercesión por los samaritanos, propósito de que recibieran el Espíritu Santo. Sin embargo, «después de bajar» suena menos natural y algo ambiguo en español porque puede sugerir simplemente un movimiento descendente físico sin anclar claramente el sujeto; además, el inglés POB final suavizó la subordinación a una coordinación más fluida. Una formulación como «bajaron y oraron» preserva adecuadamente la secuencia del participio aoristo y mejora la legibilidad.'
  spanish_quality_summary: La frase es clara y doctrinalmente correcta, pero «quienes, después de bajar, oraron...» resulta un poco trabada. En español bíblico natural, «quienes bajaron y oraron por ellos» fluye mejor y evita un infinitivo preposicional algo rígido. El resto de la redacción («por ellos», «para que recibieran», «el Espíritu Santo») es idiomática y digna.
  glossary_alignment: 'El borrador se alinea con la terminología del proyecto: «Espíritu Santo» para πνεῦμα ἅγιον es correcto en este contexto de Hechos. No hay conflicto con otros términos de glosario.'
  issues:
  - severity: medium
    issue: Construcción «después de bajar» poco natural en esta relativa
    rationale: Aunque es semánticamente defendible para καταβάντες, en español suena más rígida que la coordinación simple y puede introducir una ligera ambigüedad sobre el referente. La coordinación «bajaron y oraron» conserva la secuencia y mejora la lectura.
  revised_spanish_text: quienes bajaron y oraron por ellos para que recibieran el Espíritu Santo.
  revision_rationale: Se ajusta únicamente la representación de καταβάντες para un español más natural y fluido, manteniendo el mismo sentido temporal previo al verbo principal sin añadir ni quitar contenido. No hacen falta notas porque las alternativas del inglés no crean una ambigüedad nueva en español.
