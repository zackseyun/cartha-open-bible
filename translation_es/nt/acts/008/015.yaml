translation:
  language: es
  text: quienes bajaron y oraron por ellos para que recibieran el Espíritu Santo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - los cuales
  - quienes mismos
  lexicon: BDAG
  rationale: La relativa se refiere a Pedro y Juan del versículo anterior; «quienes» suena natural en español y conserva bien la referencia sin añadir énfasis innecesario.
- source_word: καταβάντες
  english_pob_choice: after they came down
  chosen_spanish: después de bajar
  alternatives_spanish:
  - habiendo bajado
  - cuando bajaron
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa a la principal. «Después de bajar» comunica con claridad la secuencia temporal en español y evita una construcción demasiado pesada.
- source_word: προσηύξαντο
  english_pob_choice: prayed
  chosen_spanish: oraron
  alternatives_spanish:
  - oraron en favor de ellos
  - hicieron oración
  lexicon: BDAG
  rationale: El verbo indica simplemente que hicieron oración; «oraron» es la forma natural y fiel. El matiz intercesor se desarrolla con la frase siguiente.
- source_word: περὶ αὐτῶν
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a favor de ellos
  - acerca de ellos
  lexicon: BDAG
  rationale: Con προσεύχομαι, περί con genitivo expresa oración en favor de alguien. «Por ellos» es idiomático y transmite bien ese valor intercesor.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Marca propósito. «Para que» es la equivalencia más natural en español y preserva la fuerza final de la cláusula.
- source_word: λάβωσιν
  english_pob_choice: they might receive
  chosen_spanish: recibieran
  alternatives_spanish:
  - reciban
  - llegaran a recibir
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ὅπως expresa propósito; en español, el imperfecto de subjuntivo en una subordinada final suena natural y mantiene el sentido prospectivo.
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En Hechos la referencia es al Espíritu divino personal, no a un espíritu genérico. En español, la forma consagrada y clara para este referente es «el Espíritu Santo».
theological_decisions:
- issue: 'Referencia de πνεῦμα ἅγιον: Espíritu personal divino o espíritu genérico'
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - Espíritu Santo
  - un espíritu santo
  rationale: El contexto narrativo de Hechos se refiere al don prometido del Espíritu a los creyentes. La traducción con artículo definido conserva el referente personal y evita una lectura genérica que el contexto no apoya.
  doctrine_reference: Hechos 1:5; 2:4; Declaraciones doctrinales del proyecto sobre el Espíritu Santo
translation_notes:
  revision_awareness: Se evitó repetir el fallo anterior de anclar notas sin marcadores en el texto. Esta versión suprime las notas para no introducir marcadores no usados y mantiene una traducción fluida y fiel al griego, con el orden temporal expresado de forma natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu Santo» conforme al uso establecido en el proyecto para πνεῦμα ἅγιον en contexto personal-divino.
  - Se eligió una construcción temporal explícita («después de bajar») para reflejar el participio aoristo sin depender de calco sintáctico.
  - No se introdujo vocabulario eclesiástico tradicionalizante ajeno al texto; el registro es bíblico, moderno y comprensible.
