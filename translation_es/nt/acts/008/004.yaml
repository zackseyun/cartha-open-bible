  - severity: low
    issue: '''anunciando'' para εὐαγγελιζόμενοι'
    rationale: Aunque es aceptable, 'anunciando' puede sonar más débil o genérico. 'Proclamando' comunica mejor la idea de difusión pública del mensaje y se alinea más estrechamente con la decisión inglesa revisada 'proclaiming the word'.
  revised_spanish_text: Entonces los que habían sido esparcidos recorrieron la región proclamando la palabra.
