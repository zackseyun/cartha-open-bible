translation:
  language: es
  text: Entonces los que habían sido esparcidos recorrieron la región proclamando la palabra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οἱ μὲν οὖν
  english_pob_choice: So those
  chosen_spanish: Así que los
  alternatives_spanish:
  - Entonces los
  - Ahora bien, los
  lexicon: BDAG
  rationale: La combinación introduce una transición inferencial desde el contexto previo. «Así que» conserva el valor de οὖν de manera natural en español y no exige traducir mecánicamente μέν.
- source_word: διασπαρέντες
  english_pob_choice: who had been scattered
  chosen_spanish: los que habían sido esparcidos
  alternatives_spanish:
  - los que fueron esparcidos
  - los dispersados
  lexicon: BDAG
  rationale: El participio aoristo pasivo alude a creyentes esparcidos por la persecución. «Habían sido esparcidos» refleja anterioridad respecto al verbo principal y mantiene la pasiva; «esparcidos» resulta más natural que «dispersados» en este contexto.
- source_word: διῆλθον
  english_pob_choice: went through the region
  chosen_spanish: recorrieron la región
  alternatives_spanish:
  - fueron de un lugar a otro
  - pasaron por la región
  lexicon: BDAG
  rationale: διέρχομαι aquí indica movimiento itinerante de un lugar a otro. «Recorrieron la región» comunica ese ir y venir de forma idiomática en español y evita que suene meramente momentáneo.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the word
  chosen_spanish: anunciando
  alternatives_spanish:
  - proclamando
  - predicando
  lexicon: BDAG
  rationale: El participio expresa la actividad acompañante de evangelizar. En español, «anunciando» conserva el sentido verbal sin sobrecargar el texto con terminología eclesiástica; «proclamando» también sería posible, pero «anunciando» resulta más fluido aquí.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  lexicon: BDAG
  rationale: λόγος se refiere aquí al mensaje cristiano ya en vista. «La palabra» preserva la brevedad del griego y su uso lucano; «el mensaje» explicita interpretativamente lo que está implícito, y «la palabra de Dios» añade palabras no presentes en el versículo.
theological_decisions:
- issue: Relación entre εὐαγγελιζόμενοι y τὸν λόγον
  english_pob_reading: proclaiming the word
  chosen_spanish_reading: anunciando la palabra
  alternative_spanish_readings:
  - proclamando la palabra
  - predicando el evangelio
  rationale: El griego une el verbo de evangelizar con el objeto directo «la palabra». La traducción principal mantiene ambos elementos sin convertir el objeto en una frase explicativa. «Anunciando la palabra» deja que el contexto haga explícito que esa palabra es el mensaje salvador sobre Jesús.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión que consideró y descartó una expansión como «proclaiming the good news of the word» por ser poco idiomática y por oscurecer la sintaxis griega. La presente redacción española sigue esa corrección al mantener una frase breve y directa, sin añadir una glosa innecesaria.
  spanish_consistency_notes:
  - Se mantiene «palabra» como equivalente de λόγος para conservar coherencia con el uso lucano.
  - No se introduce «Cristo» ni «Jesús» porque este versículo no los menciona explícitamente.
  - «Anunciando» evita un giro eclesiástico más cargado y sigue siendo plenamente compatible con el campo semántico de εὐαγγελίζω.
