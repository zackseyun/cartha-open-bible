  to: 'Y mientras iban por el camino[a], llegaron a agua, y el eunuco dijo: «¡Mira[b], agua! ¿Qué impide que sea bautizado?»'
  rationale: 'La revisión corrige el principal problema semántico: «agua» sin artículo ni cuantificador reproduce mejor el indefinido griego sin sugerir una cantidad pequeña. La nota alternativa se rehízo para ofrecer una opción natural en español que preserve la indeterminación del original. También se mejoró la puntuación de la exclamación deíctica y se suavizó «que yo sea» a «que sea» por naturalidad, manteniendo la voz pasiva y la neutralidad doctrinal sobre el bautismo.'
