translation:
  language: es
  text: 'Y mientras iban por el camino[a], llegaron a agua, y el eunuco dijo: «¡Mira[b], agua! ¿Qué impide que sea bautizado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se encontraron con agua». El griego no especifica el tamaño ni la clase de agua.
    reason: lexical_alternative
  - marker: b
    text: O «¿Qué me impide ser bautizado?»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  english_pob_choice: were going along
  chosen_spanish: iban por el camino
  alternatives_spanish:
  - estaban yendo por el camino
  - iban avanzando por el camino
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; «iban» preserva ese aspecto progresivo sin sonar forzado en español.
- source_word: κατὰ τὴν ὁδόν
  english_pob_choice: along the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - a lo largo del camino
  - por la ruta
  lexicon: BDAG
  rationale: La expresión de dirección se vierte naturalmente con «por el camino», manteniendo la idea de desplazamiento sin sobreespecificar la vía.
- source_word: ἦλθον ἐπί τι ὕδωρ
  english_pob_choice: they came to some water
  chosen_spanish: llegaron a un poco de agua
  alternatives_spanish:
  - llegaron a cierta agua
  - se encontraron con algo de agua
  lexicon: BDAG
  rationale: «A un poco de agua» refleja el indefinido τι y el simple hallazgo sin precisar tamaño o clase de agua, como en el POB inglés.
- source_word: φησιν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el presente histórico es posible, en español narrativo «dijo» es más natural y conserva el sentido del relato sin introducir extrañeza temporal.
- source_word: εὐνοῦχος
  english_pob_choice: the eunuch
  chosen_spanish: el eunuco
  alternatives_spanish:
  - el oficial
  - el cortesano
  lexicon: BDAG
  rationale: «Eunuco» es la correspondencia directa y precisa del sustantivo griego; no hay base en el texto para suavizarlo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, he aquí
  - Observa
  lexicon: BDAG
  rationale: Como interjección deíctica, «Mira» transmite la llamada inmediata de atención de modo natural en español.
- source_word: τί κωλύει με
  english_pob_choice: What prevents me
  chosen_spanish: ¿Qué impide que yo sea
  alternatives_spanish:
  - ¿Qué me impide ser
  - ¿Qué me estorba para ser
  lexicon: BDAG
  rationale: «Impide» recoge κωλύω como obstaculizar/prevenir. La estructura con subjuntivo en español comunica bien la relación del infinitivo pasivo griego con «prevent».
- source_word: βαπτισθῆναι
  english_pob_choice: from being baptized
  chosen_spanish: bautizado
  alternatives_spanish:
  - ser bautizado
  lexicon: BDAG
  rationale: Se usa la pasiva perifrástica implícita con «ser bautizado» en la oración completa; la forma elegida mantiene la voz pasiva y la neutralidad doctrinal sobre el modo del bautismo.
theological_decisions:
- issue: Modo o teología del bautismo
  english_pob_reading: Render the request neutrally as 'being baptized' without implying a particular mode or denominational understanding.
  chosen_spanish_reading: «ser bautizado» sin implicar modo, fórmula ni presupuesto denominacional.
  alternative_spanish_readings:
  - «ser sumergido»
  - «recibir el bautismo»
  rationale: El griego solo menciona el bautismo; la traducción española debe conservar esa neutralidad y no añadir una interpretación sobre la forma o eficacia del rito.
  doctrine_reference: 'Affirmations; Translation philosophy: do not advocate denominational distinctives unless the Greek unambiguously supports one reading over another.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del POB inglés: mantiene el movimiento progresivo del camino y la llegada a agua indefinida, pero adapta el discurso directo a un estilo narrativo natural en español. También conserva la neutralidad doctrinal del bautismo y evita especificar modo o alcance del agua.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; aquí no aparece ningún nombre divino.
  - «Eunuco» se conserva de forma precisa y consistente con el valor lexical del griego.
  - La expresión «ser bautizado» mantiene la voz pasiva y evita introducir un modo bautismal específico.
  - Las notas [a] y [b] están ancladas en el texto y marcan alternativas reales, no glosas libres.
