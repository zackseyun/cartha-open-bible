translation:
  language: es
  text: Pero hombres piadosos sepultaron a Esteban[a] e hicieron gran lamentación por él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prepararon a Esteban para el entierro» o «se llevaron a Esteban para el entierro»; el verbo griego puede enfatizar tanto el manejo del cuerpo como el entierro mismo.
    reason: lexical_alternative
  - marker: b
    text: «Gran lamentación» puede incluir expresiones audibles y públicas de dolor, no solo tristeza interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεκόμισαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - prepararon para el entierro
  - llevaron para el entierro
  lexicon: BDAG
  rationale: El verbo compuesto puede enfocarse en recoger, llevar o hacerse cargo del cuerpo. En este contexto, el resultado natural en español es «sepultaron», que expresa el acto funerario sin volver opaca la escena.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa con leve contraste respecto a la muerte violenta de Esteban; «Pero» conserva mejor ese giro que una simple coordinación.
- source_word: ἄνδρες εὐλαβεῖς
  english_pob_choice: devout men
  chosen_spanish: hombres piadosos
  alternatives_spanish:
  - hombres devotos
  - hombres reverentes
  lexicon: BDAG
  rationale: ἄνδρες es explícitamente masculino plural, por eso se mantiene «hombres». εὐλαβεῖς expresa reverencia o piedad; «piadosos» es natural en español y fiel al sentido religioso.
- source_word: ἐποίησαν
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - expresaron
  - realizaron
  lexicon: BDAG
  rationale: El verbo es semánticamente ligero y forma una expresión fija con κοπετὸν; en español, «hicieron gran lamento» reproduce bien el giro idiomático.
- source_word: κοπετὸν μέγαν
  english_pob_choice: great lamentation
  chosen_spanish: gran lamento
  alternatives_spanish:
  - gran duelo
  - gran llanto
  lexicon: BDAG
  rationale: κοπετός denota duelo o lamentación con manifestaciones exteriores de dolor. «Gran lamento» conserva la intensidad de μέγαν y su tono público o audible.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - por él
  - sobre su muerte
  lexicon: BDAG
  rationale: Con lenguaje de duelo, ἐπί con dativo indica lamento dirigido a la persona; «sobre él» es la equivalencia más directa y natural en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto traducido, y se omitió la segunda nota para evitar marcadores sin anclaje. La redacción sigue el sentido del griego y el auditable inglés POB sin añadir elementos no sustentados.
  spanish_consistency_notes:
  - Se preserva la referencia masculina explícita de ἄνδρες con «hombres».
  - «Sepultaron» traduce el resultado funerario del verbo compuesto sin perder el matiz de manejo del cuerpo.
  - «Gran lamento» mantiene el valor público/intenso de κοπετός.
  - La preposición «sobre él» conserva el complemento de duelo del griego y coincide con el patrón inglés auditado.
