translation:
  language: es
  text: Pero cuando Simón vio que el Espíritu se daba[a] por medio de la imposición de las manos de los apóstoles, les ofreció dinero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Espíritu Santo». El griego dice simplemente «el Espíritu», pero en este contexto el referente es el Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - habiendo visto
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente en el contexto narrativo. En español, «cuando vio» expresa con naturalidad la secuencia de hechos sin forzar una construcción participial menos idiomática.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo suave; «Pero» conserva el matiz de contraste o desarrollo respecto de lo anterior y es natural en español bíblico actual.
- source_word: διὰ τῆς ἐπιθέσεως τῶν χειρῶν
  english_pob_choice: through the laying on of the apostles’ hands
  chosen_spanish: por medio de la imposición de las manos
  alternatives_spanish:
  - por la imposición de las manos
  - mediante la imposición de las manos
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. «Por medio de» comunica claramente ese valor causal-instrumental y evita calcos rígidos. «Imposición de las manos» es la fórmula estable y fiel para ἐπίθεσις χειρῶν.
- source_word: τῶν ἀποστόλων
  english_pob_choice: the apostles’
  chosen_spanish: de los apóstoles
  alternatives_spanish:
  - apostólica
  - de los enviados
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de posesión o procedencia mediante «de los apóstoles», forma natural y precisa en español.
- source_word: δίδοται
  english_pob_choice: was given
  chosen_spanish: era dado
  alternatives_spanish:
  - era concedido
  - se daba
  lexicon: BDAG
  rationale: El presente pasivo griego en narración puede expresarse en español con imperfecto pasivo/estativo para mantener la continuidad del relato. «Era dado» conserva el hecho de la acción sin añadir un matiz doctrinal no explicitado. Se evita «fue dado» para no perder el aspecto narrativo presente del griego.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: El griego dice simplemente τὸ πνεῦμα. En el contexto inmediato el referente es el Espíritu Santo, pero la traducción principal preserva la forma breve del texto griego. En español, «el Espíritu» es claro y reverente; la alternativa doctrinal se documenta en nota.
- source_word: προσήνεγκεν
  english_pob_choice: offered
  chosen_spanish: les ofreció
  alternatives_spanish:
  - les presentó
  - les llevó
  lexicon: BDAG
  rationale: προσφέρω aquí implica presentar u ofrecer algo. «Les ofreció» comunica con precisión la acción de proponer dinero a los apóstoles en el contexto.
- source_word: χρήματα
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - fondos
  lexicon: BDAG
  rationale: χρήματα denota dinero o sumas de dinero. «Dinero» es la equivalencia más directa y clara en español contemporáneo, sin especificar metal o cantidad.
theological_decisions:
- issue: Referente de τὸ πνεῦμα
  english_pob_reading: the Spirit, referring to the Holy Spirit
  chosen_spanish_reading: el Espíritu, con referencia al Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu Santo
  rationale: La formulación principal sigue de cerca el griego y evita añadir una expansión innecesaria al texto base. Dado el contexto de Hechos, el referente es inequívocamente el Espíritu Santo; esa identificación se preserva en la nota, no en la redacción principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Agencia en la recepción del Espíritu
  english_pob_reading: the Spirit was given through the laying on of the apostles’ hands
  chosen_spanish_reading: el Espíritu era dado por medio de la imposición de las manos de los apóstoles
  alternative_spanish_readings:
  - el Espíritu fue dado por la imposición de las manos de los apóstoles
  - el Espíritu se daba por la imposición de las manos de los apóstoles
  rationale: «Por medio de» conserva la idea de medio/instrumento sin convertir a los apóstoles en la fuente última del don. La redacción evita sacar conclusiones sacramentales o anti-sacramentales que el versículo por sí solo no formula.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y coincide en lo esencial con el audit trail inglés: valor temporal de ἰδών, contraste suave de δέ, medio instrumental de διά con genitivo, pasivo narrativo de δίδοται, y referencia contextual de τὸ πνεῦμα al Espíritu Santo. No se requieren revisiones respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula por tratarse del referente divino en contexto.
  - Se evita «SEÑOR» o sustituciones litúrgicas ajenas al texto; el versículo no contiene κύριος ni יהוה.
  - «Imposición de las manos» se conserva como término técnico bíblico estable.
  - «Dinero» traduce χρήματα sin sobreespecificar moneda o metal.
  - La nota al pie marca únicamente la alternativa de traducción para τὸ πνεῦμα y está anclada en el texto con [a].
