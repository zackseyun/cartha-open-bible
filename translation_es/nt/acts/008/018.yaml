- from: Pero cuando Simón vio que el Espíritu era dado[a] por medio de la imposición de las manos de los apóstoles, les ofreció dinero.
  to: Pero cuando Simón vio que el Espíritu se daba[a] por medio de la imposición de las manos de los apóstoles, les ofreció dinero.
