translation:
  language: es
  text: 'Entonces Felipe corrió hacia él y lo oyó leyendo Isaías, el profeta, y dijo: «¿De veras[a] entiendes lo que estás leyendo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿De veras entiendes lo que lees?». Las partículas griegas añaden énfasis a la pregunta de Felipe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδραμὼν
  english_pob_choice: ran up
  chosen_spanish: corrió hacia él
  alternatives_spanish:
  - se acercó corriendo
  - corrió hasta él
  lexicon: BDAG
  rationale: El participio aoristo expresa movimiento rápido hacia la persona. En español, «corrió hacia él» conserva la vivacidad narrativa sin sonar forzado.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo. «Entonces» funciona de manera natural en español y mantiene la progresión de la escena.
- source_word: ἤκουσεν αὐτοῦ ἀναγινώσκοντος
  english_pob_choice: heard him reading
  chosen_spanish: lo oyó leyendo
  alternatives_spanish:
  - lo oyó mientras leía
  - lo oyó leer
  lexicon: BDAG
  rationale: La construcción con ἀκούω + participio genitivo indica que Felipe lo oyó en el acto de leer. «Lo oyó leyendo» reproduce bien esa simultaneidad en español.
- source_word: Ἠσαΐαν τὸν προφήτην
  english_pob_choice: Isaiah the prophet
  chosen_spanish: Isaías, el profeta
  alternatives_spanish:
  - el profeta Isaías
  lexicon: BDAG
  rationale: Ambos órdenes son posibles en español. Se eligió una estructura con coma para reflejar la aposición del griego y conservar naturalidad.
- source_word: Ἆρά γε
  english_pob_choice: Do you really
  chosen_spanish: ¿De veras... ?
  alternatives_spanish:
  - ¿De verdad... ?
  - ¿Acaso... ?
  - ¿Realmente... ?
  lexicon: BDAG
  rationale: La combinación de partículas introduce una pregunta con énfasis y tono expectante. «¿De veras... ?» transmite bien esa fuerza interrogativa en español.
- source_word: γινώσκεις
  english_pob_choice: understand
  chosen_spanish: entiendes
  alternatives_spanish:
  - comprendes
  - sabes
  lexicon: BDAG
  rationale: En este contexto γινώσκω se refiere a captar el sentido de lo leído, no solo a tener información. «Entiendes» es la opción más natural y fiel.
- source_word: ἃ ἀναγινώσκεις
  english_pob_choice: what you are reading
  chosen_spanish: lo que estás leyendo
  alternatives_spanish:
  - las cosas que estás leyendo
  - lo que lees
  lexicon: BDAG
  rationale: El relativo neutro plural se refiere al contenido de la lectura. El presente progresivo español expresa bien la acción en curso.
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado al final de la pregunta. Se mantuvo la lectura de alta concordancia con el texto griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se preservó el orden narrativo del griego con una conectiva inicial natural en español.
  - Se evitó «leer en voz alta» porque el griego no lo explicita, aunque la lectura pública era culturalmente común.
  - Se mantuvo «el profeta» como aposición para reflejar la estructura del original sin recargar el estilo.
