    rationale: El contraste documentado en el material fuente es «the city of Samaria» / «a city of Samaria», no una duda léxica sobre πόλις en aislamiento. En español, el marcador debe señalar la frase completa para representar fielmente el problema de interpretación.
  - severity: low
    issue: Falta la segunda nota del audit trail inglés sobre la formulación alternativa completa.
    rationale: 'El expediente inglés conserva dos notas distintas: una de lectura alternativa y otra de formulación previa. No es doctrinalmente crucial, pero conviene preservarla también en español para mantener transparencia editorial.'
