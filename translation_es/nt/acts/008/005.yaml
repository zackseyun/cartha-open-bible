translation:
  language: es
  text: Ahora Felipe bajó a la ciudad de Samaria[a][b] y les proclamó al Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una ciudad de Samaria». El griego puede entenderse como referencia a una ciudad concreta de Samaria o, más generalmente, a una ciudad dentro de la región samaritana.'
    reason: alternative_reading
  - marker: b
    text: 'Otra posible traducción: «a la ciudad de Samaria».'
    reason: previous_rendering
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Marca la continuidad narrativa sin cargar una oposición fuerte. «Ahora» funciona como conector discursivo natural en español y conserva el avance del relato.
- source_word: κατελθὼν
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - había bajado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa acompañante; en español, «bajó» conserva el movimiento direccional de manera natural y directa.
- source_word: τὴν πόλιν τῆς Σαμαρείας
  english_pob_choice: the city of Samaria
  chosen_spanish: la ciudad de Samaria
  alternatives_spanish:
  - una ciudad de Samaria
  - la ciudad samaritana
  lexicon: BDAG
  rationale: Sigo de cerca la forma griega con artículo y genitivo. En español, «la ciudad de Samaria» es natural y transparente; no cierro la posible lectura regional, pero tampoco la impongo en el texto principal.
- source_word: ἐκήρυσσεν
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - predicó
  - anunció
  lexicon: BDAG
  rationale: «Proclamó» conserva el sentido de anuncio público y solemne de κηρύσσω, sin restringirlo al registro eclesiástico de «predicó».
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - entre ellos
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con el pronombre átono «les» en español.
- source_word: τὸν χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  - al Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico, no como nombre propio. «Mesías» preserva mejor el valor titulado y el trasfondo judío que el uso eclesiástico fijo de «Cristo».
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: al Mesías
  alternative_spanish_readings:
  - a Cristo
  - al Cristo
  rationale: La predicación de Felipe presenta a Jesús bajo su identidad mesiánica. En español, «Mesías» expresa con más claridad el valor de título y evita una lectura meramente nominativa de «Cristo».
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Posible alcance de «la ciudad de Samaria»
  english_pob_reading: the city of Samaria / a city of Samaria
  chosen_spanish_reading: la ciudad de Samaria
  alternative_spanish_readings:
  - una ciudad de Samaria
  rationale: La forma con artículo puede leerse como una ciudad específica o como una referencia más general a una ciudad dentro de Samaria. Dejo esa tensión resuelta solo parcialmente en el texto principal y la explicito en nota.
  doctrine_reference: Revisión textual y criterio de transparencia POB
translation_notes:
  revision_awareness: 'Tomé en cuenta el historial inglés: la revisión más reciente reafirma la correspondencia más cercana con el artículo griego, mientras que la tradición previa había preferido «the Messiah». En español mantengo la decisión doctrinal ya documentada de traducir Χριστός como «Mesías», y conservo la tensión textual de πόλιν τῆς Σαμαρείας mediante una nota alternativa.'
  spanish_consistency_notes:
  - Uso «Mesías» para Χριστός según la pauta doctrinal del proyecto, evitando el calco litúrgico «Cristo» cuando el término funciona como título.
  - Mantengo un registro narrativo natural con «Ahora» y «bajó», sin forzar una estructura participial.
  - «Les proclamó» expresa el dativo de destinatario de forma idiomática.
  - La nota solo trata la ambigüedad de «la ciudad de Samaria»; no añado otras notas porque el resto del versículo no presenta una tensión lexical adicional significativa.
