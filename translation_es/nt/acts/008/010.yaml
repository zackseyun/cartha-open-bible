review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego: «Todos», «le prestaban atención», el merismo «desde el más pequeño hasta el más grande», y la cita atribuida a la multitud. Sin embargo, la frase final no preserva bien la concordancia ni la forma titular del original. En griego, ἡ Δύναμις... ἡ καλουμένη Μεγάλη es claramente femenina y modifica «Δύναμις»; por eso «el llamado Grande» desajusta género y puede hacer que «Grande» parezca un apodo masculino de Simón en vez del epíteto de «poder».'
  spanish_quality_summary: El español es en general claro y natural, pero «el llamado Grande» suena forzado e incorrectamente alineado con el referente inmediato. Una formulación como «el poder de Dios que es llamado Grande» o «el poder de Dios llamado Grande» es más clara y fiel. También conviene ajustar la nota al pie para reflejar la alternativa documentada en inglés, no una paráfrasis menos útil.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ = «Dios» está bien. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La principal cuestión léxica es mantener «poder» para δύναμις y expresar καλουμένη de manera que modifique a «poder» y no a «hombre».'
  issues:
  - severity: high
    issue: «el llamado Grande» rompe la concordancia semántica con «Δύναμις» y puede leerse como título de Simón
    rationale: El griego tiene artículo y participio femeninos (ἡ... ἡ καλουμένη) que retoman «Δύναμις» (femenino). En español, «el llamado Grande» queda masculino y desplaza el epíteto hacia «este hombre», alterando el sentido.
  - severity: medium
    issue: La nota al pie no refleja la alternativa principal del audit trail inglés
    rationale: 'La nota inglesa preserva una lectura alternativa de estructura compacta/titular: «This is what is called the Great Power of God». La nota española actual sobre «le daban su atención» no corresponde a la alternativa más relevante documentada para este versículo.'
  - severity: low
    issue: «desde el más pequeño hasta el más grande» es entendible, pero «desde el menor hasta el mayor» sería más idiomático para el merismo social
    rationale: No es un error de fidelidad, pero la alternativa suena más natural en español eclesial general. Aun así, no es necesario cambiarla si se prefiere conservar la formulación actual.
  revised_spanish_text: 'Todos le prestaban atención, desde el más pequeño hasta el más grande, diciendo: «Este hombre es el poder de Dios que es llamado Grande».[a]'
  revised_footnotes:
  - marker: a
    text: 'O: «Este es lo que se llama el Gran Poder de Dios». El griego también puede expresarse de manera más compacta, casi como un título.'
    reason: alternative_reading
  revision_rationale: Se corrige la parte final para que «que es llamado Grande» modifique claramente «el poder de Dios», en línea con la gramática griega y la decisión del POB inglés. Se elimina la nota sobre «prestaban atención», porque no refleja una alternativa significativa del audit trail, y se reemplaza por la alternativa titulada documentada en inglés.
