revisions:
- from: 'Todos le prestaban atención[a], desde el más pequeño hasta el más grande, diciendo: «Este hombre es el poder de Dios, el llamado Grande».'
  to: 'Todos le prestaban atención, desde el más pequeño hasta el más grande, diciendo: «Este hombre es el poder de Dios que es llamado Grande».[a]'
  rationale: Se corrige la parte final para que «que es llamado Grande» modifique claramente «el poder de Dios», en línea con la gramática griega y la decisión del POB inglés. Se elimina la nota sobre «prestaban atención», porque no refleja una alternativa significativa del audit trail, y se reemplaza por la alternativa titulada documentada en inglés.
