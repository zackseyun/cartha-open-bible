translation:
  language: es
  text: 'Todos le prestaban atención, desde el más pequeño hasta el más grande, diciendo: «Este hombre es el poder de Dios que es llamado Grande».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es lo que se llama el Gran Poder de Dios». El griego también puede expresarse de manera más compacta, casi como un título.'
    reason: alternative_reading
lexical_decisions:
- source_word: ᾧ προσεῖχον
  english_pob_choice: paid attention to him
  chosen_spanish: le prestaban atención
  alternatives_spanish:
  - le hacían caso
  - le daban atención
  - ponían atención en él
  lexicon: BDAG
  rationale: προσέχω aquí expresa dirigir la atención con interés sostenido. «Le prestaban atención» conserva ese matiz de atención enfocada sin añadir obediencia o devoción que el contexto no exige.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos ellos
  - La gente toda
  lexicon: BDAG
  rationale: El griego enfatiza la totalidad del grupo. En español, «Todos» es natural y mantiene la amplitud del sujeto implícito.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  - de pequeño a grande
  lexicon: BDAG
  rationale: La expresión es un merismo que abarca todo el rango social. «El más pequeño... el más grande» comunica la escala completa de manera clara y idiomática en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio circunstancial se vierte de forma directa con «diciendo», preservando la simultaneidad con el verbo principal.
- source_word: Οὗτός
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo apunta a Simón como persona concreta. «Este hombre» es explícito y natural en español, sin perder el señalamiento de proximidad.
- source_word: ἡ Δύναμις τοῦ θεοῦ
  english_pob_choice: the power of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - la potencia de Dios
  - el poder divino
  lexicon: BDAG
  rationale: «Δύναμις» se traduce aquí por «poder», que es la forma más directa y transparente en español. Se conserva la estructura nominal del griego y la atribución a Dios.
- source_word: ἡ καλουμένη Μεγάλη
  english_pob_choice: that is called Great
  chosen_spanish: el llamado Grande
  alternatives_spanish:
  - la llamada Grande
  - el que es llamado Grande
  - el llamado el Grande
  lexicon: BDAG
  rationale: El participio pasivo de nombre puede funcionar de modo casi titular. En español, «el llamado Grande» mantiene la fuerza de denominación y deja abierta la lectura compacta que el POB inglés documenta, sin imponer una expansión interpretativa.
- source_word: Μεγάλη
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - la Grande
  - el Grande
  lexicon: BDAG
  rationale: «Μεγάλη» funciona como epíteto/título. «Grande» reproduce el calificativo sin añadir un artículo interpretativo; la mayúscula se conserva en el estilo de cita para reflejar su posible carácter de nombre/título.
theological_decisions:
- issue: Si la frase final debe sonar como un título divino afirmado por el narrador o como una atribución de la multitud
  english_pob_reading: Render as the crowd's claim, 'This man is the power of God that is called Great,' without endorsing the claim or capitalizing beyond what the quoted speech itself warrants.
  chosen_spanish_reading: Se presenta como lo que la gente decía de Simón, no como una afirmación del narrador. La redacción mantiene la atribución sin convertirla en una aclamación teológica del texto narrativo.
  alternative_spanish_readings:
  - «Este hombre es el poder de Dios, llamado Grande»
  - «Este es el Gran Poder de Dios»
  - «Este hombre es lo que se llama el Gran Poder de Dios»
  rationale: 'El griego reporta una identificación hecha por la multitud. La traducción debe preservar esa tensión: el contenido del dicho sin suavizarlo ni convertirlo en una afirmación narrativa. Por eso se evita una formulación que parezca una fórmula doctrinal establecida.'
  doctrine_reference: Conservar la tensión textual; no resolverla por interpretación implícita.
translation_notes:
  revision_awareness: Sin cambios frente al control más reciente del POB inglés; se conserva la lectura óptima y la tensión textual documentada sobre la frase final.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «poder» para Δύναμις, en coherencia con el léxico POB.
  - Se conserva el estilo de cita directa con puntuación española y comillas angulares.
  - No se introduce «Mesías», «SEÑOR» ni terminología eclesiástica no presente en el pasaje.
  - La mayúscula en «Grande» refleja el posible valor titulativo del epíteto, siguiendo la ambigüedad documentada en el audit trail.
