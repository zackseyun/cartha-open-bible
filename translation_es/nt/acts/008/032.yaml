    reason: lexical_alternative
  revision_rationale: Se ajusta «ἐπὶ σφαγὴν» a «al degüello» para evitar la imagen demasiado concreta de «matadero» y acercarse al sentido documentado por el POB. Se reemplaza «callado» por «permanece en silencio» para reflejar con español natural la función predicativa de ἄφωνος. Se elimina la nota [c] porque deja de ser necesaria y se alinea la nota [a] con las alternativas realmente preservadas en el audit trail inglés.
