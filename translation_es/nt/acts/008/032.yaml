translation:
  language: es
  text: 'Ahora, el pasaje de la Escritura que él leía era este: «Como oveja fue llevado al degüello[a], y como cordero delante del que lo trasquila[b] permanece en silencio, así no abre su boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la matanza».
    reason: lexical_alternative
  - marker: b
    text: O «delante del esquilador»; el griego dice literalmente «delante del que lo trasquila».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιοχὴ
  english_pob_choice: passage
  chosen_spanish: pasaje
  alternatives_spanish:
  - sección
  - extracto
  lexicon: BDAG
  rationale: En este contexto, περιοχὴ designa una porción concreta de la Escritura que está siendo leída. «Pasaje» es natural en español actual y conserva el sentido de un tramo bíblico específico.
- source_word: γραφή
  english_pob_choice: Scripture
  chosen_spanish: Escritura
  alternatives_spanish:
  - escrito
  - escritura
  lexicon: BDAG
  rationale: Aquí γραφή se refiere a la Escritura sagrada, no a cualquier escrito. La mayúscula en español marca el referente bíblico reconocido sin añadir interpretación extratextual.
- source_word: ἀνεγίνωσκεν
  english_pob_choice: was reading
  chosen_spanish: leía
  alternatives_spanish:
  - estaba leyendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso en el pasado. En español, «leía» comunica esa continuidad de modo natural y fiel.
- source_word: Ὡς πρόβατον
  english_pob_choice: Like a sheep
  chosen_spanish: Como oveja
  alternatives_spanish:
  - Como un cordero
  - Así como oveja
  lexicon: BDAG
  rationale: ὡς introduce comparación. «Como oveja» mantiene la imagen general del griego y evita mezclarla con ἀμνός, que ya introduce la distinción «cordero».
- source_word: ἐπὶ σφαγὴν
  english_pob_choice: to slaughter
  chosen_spanish: al matadero
  alternatives_spanish:
  - para ser sacrificado
  - a la matanza
  lexicon: BDAG
  rationale: La frase indica movimiento hacia la muerte violenta. «Al matadero» es una forma clara y natural en español, sin perder el sentido de destino fatal.
- source_word: ἤχθη
  english_pob_choice: was led
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue conducido
  - fue guiado
  lexicon: BDAG
  rationale: El pasivo de ἄγω aquí comunica ser llevado/arrastrado hacia un destino. «Fue llevado» refleja bien la construcción y conserva la fuerza del texto citado.
- source_word: ἀμνὸς
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - lamb
  lexicon: BDAG
  rationale: ἀμνός designa específicamente un cordero, distinto de πρόβατον («oveja»). En español, «cordero» preserva esa distinción léxica.
- source_word: ἐναντίον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: BDAG
  rationale: Aquí ἐναντίον marca posición frente a alguien. «Delante de» es la opción más natural y breve en español, y mantiene el paralelo con el texto citado de Isaías.
- source_word: κείραντος
  english_pob_choice: the one shearing
  chosen_spanish: el que lo trasquila
  alternatives_spanish:
  - el trasquilador
  - el que lo esquila
  lexicon: BDAG
  rationale: El participio describe a la persona que esquila/trasquila. «El que lo trasquila» conserva la forma participial sin convertirla en un título más libre; «trasquilar» también suena suficientemente claro en español bíblico.
- source_word: ἄφωνος
  english_pob_choice: is silent
  chosen_spanish: callado
  alternatives_spanish:
  - mudo
  - silencioso
  lexicon: BDAG
  rationale: Aunque literalmente puede aludir a «sin voz», en la comparación la idea es que el cordero no responde. «Callado» expresa la escena con naturalidad y evita un tecnicismo poco idiomático.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - por eso
  lexicon: BDAG
  rationale: «Así» reproduce la conclusión comparativa del griego y funciona bien en la cadencia poética de la cita.
- source_word: οὐκ ἀνοίγει τὸ στόμα αὐτοῦ
  english_pob_choice: he does not open his mouth
  chosen_spanish: no abre su boca
  alternatives_spanish:
  - no abre la boca
  - no la abre
  lexicon: BDAG
  rationale: El presente de ἀνοίγει se conserva con «abre». «Su boca» mantiene el paralelo bíblico y el tono del texto citado, sin volverlo interpretativo.
theological_decisions:
- issue: Cita mesiánica de Isaías 53 aplicada al contexto de Jesús
  english_pob_reading: Retained the quotation in its literal simile form without making the Christological identification explicit in the verse itself.
  chosen_spanish_reading: Se conserva la cita en su forma literal, sin explicitar dentro del versículo la identificación cristológica.
  alternative_spanish_readings:
  - Una versión más interpretativa que subraye al Siervo sufriente como Jesús
  rationale: El contexto narrativo mayor identifica el pasaje en clave cristológica, pero el versículo mismo presenta la Escritura citada. Para no introducir explicación doctrinal no presente en la frase, la traducción se mantiene cercana al griego y deja la conexión al contexto canónico.
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el auditorial inglés, sin cambios de revisión pendientes; la formulación española busca conservar la simetría poética y las distinciones léxicas oveja/cordero y trasquilar/guardar silencio.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece.
  - Se mantiene la distinción léxica entre «oveja» (πρόβατον) y «cordero» (ἀμνός).
  - Se opta por «trasquila» para κείραντος, evitando «esquila» por el registro algo más técnico y menos bíblico en este contexto.
  - Se conserva el presente de la cita final («no abre») siguiendo el griego y el audit trail inglés.
  - La puntuación de la cita respeta el ritmo poético del pasaje y el cierre con comillas españolas.
