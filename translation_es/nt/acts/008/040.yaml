translation:
  language: es
  text: Pero Felipe fue hallado en Azoto[a], y al pasar por allí proclamaba la buena noticia a todas las ciudades hasta que llegó a Cesarea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apareció en Azoto». El griego dice más literalmente «fue hallado en Azoto», lo que en contexto puede implicar una traslación divina repentina, aunque no lo expresa de manera explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca una transición narrativa suave desde el versículo anterior. «Pero» conserva el matiz adversativo o de continuación contrastiva de δὲ de manera natural en español.
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: fue hallado
  alternatives_spanish:
  - apareció
  - fue encontrado
  lexicon: BDAG
  rationale: El pasivo aoristo de εὑρίσκω se vierte de forma directa. «Fue hallado» mantiene la formulación sobria del griego sin explicitar como hecho la posible traslación milagrosa.
- source_word: εἰς Ἄζωτον
  english_pob_choice: at Azotus
  chosen_spanish: en Azoto
  alternatives_spanish:
  - a Azoto
  - en Asdod
  lexicon: BDAG
  rationale: En este contexto, εἰς con un verbo de hallazgo indica localización resultante más que dirección. «En Azoto» es la manera más natural en español para expresar el lugar donde Felipe fue hallado.
- source_word: διερχόμενος
  english_pob_choice: as he passed through
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaba
  - pasando por allí
  lexicon: BDAG
  rationale: El participio contemporáneo se expresa con una construcción breve y fluida en español. «Al pasar» conserva la simultaneidad con el verbo principal sin recargar el texto.
- source_word: εὐηγγελίζετο
  english_pob_choice: he was proclaiming the good news
  chosen_spanish: anunciaba el evangelio
  alternatives_spanish:
  - predicaba el evangelio
  - proclamaba la buena noticia
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. «Anunciaba el evangelio» comunica bien la actividad evangelizadora con un registro digno y comprensible; «evangelio» conserva la terminología cristiana establecida sin perder la relación con εὐαγγελίζω.
- source_word: τὰς πόλεις πάσας
  english_pob_choice: to all the cities
  chosen_spanish: a todas las ciudades
  alternatives_spanish:
  - a todas las poblaciones
  - a todas las ciudades de la región
  lexicon: BDAG
  rationale: La frase distributiva se mantiene en forma directa. «A todas las ciudades» refleja el alcance total del recorrido y encaja con el movimiento implícito de la cláusula.
- source_word: ἕως τοῦ ἐλθεῖν αὐτὸν
  english_pob_choice: until he came
  chosen_spanish: hasta llegar
  alternatives_spanish:
  - hasta que llegó
  - hasta que él llegó
  lexicon: BDAG
  rationale: La construcción con ἕως + infinitivo marca el límite temporal de la acción continua. «Hasta llegar» reproduce ese valor de manera natural en español y evita una redundancia innecesaria con el sujeto ya claro.
- source_word: εἰς Καισάρειαν
  english_pob_choice: to Caesarea
  chosen_spanish: a Cesarea
  alternatives_spanish:
  - hasta Cesarea
  - en Cesarea
  lexicon: BDAG
  rationale: Con ἔρχομαι, εἰς señala destino. «A Cesarea» es idiomático y conserva el movimiento hacia el lugar de llegada.
theological_decisions:
- issue: Si εὑρέθη debe interpretarse como una aparición o traslado milagroso explícito
  english_pob_reading: Retain the neutral passive 'was found' in the main text
  chosen_spanish_reading: Mantener «fue hallado» en el texto principal
  alternative_spanish_readings:
  - apareció en Azoto
  - fue trasladado a Azoto
  rationale: El contexto narrativo sugiere una acción extraordinaria de Dios, pero el griego mismo dice simplemente que Felipe «fue hallado». La traducción debe respetar esa neutralidad verbal y dejar que el contexto haga el trabajo interpretativo sin añadir una afirmación que el texto no formula explícitamente.
  doctrine_reference: Principios de equivalencia óptima y sobriedad exegética del POB
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no hubo cambios en la última pasada, y la decisión principal se mantiene en la lectura neutral de εὑρέθη. Se conserva también la equivalencia funcional para διερχόμενος y εὐηγγελίζετο sin sobreinterpretar el modo de llegada de Felipe.'
  spanish_consistency_notes:
  - Se usa «Azoto» de forma coherente con el nombre propio del lugar en español bíblico; la nota recoge la alternativa interpretativa «apareció».
  - «Evangelio» se mantiene como término estable para εὐαγγελίζω, mientras que el verbo «anunciaba» conserva el aspecto imperfectivo del griego.
  - La preposición «a» en «a todas las ciudades» y «a Cesarea» refleja mejor el movimiento del recorrido que una simple localización estática.
