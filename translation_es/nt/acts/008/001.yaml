revisions:
- from: Ahora Saulo aprobaba su ejecución. Y aquel día se desató una gran persecución contra la iglesia[a] que estaba en Jerusalén, y todos fueron dispersados por las regiones de Judea y Samaria, excepto los apóstoles.
  to: Ahora Saulo aprobaba su ejecución[a]. Y aquel día surgió una gran persecución contra la iglesia en Jerusalén, y todos fueron dispersados por las regiones de Judea y Samaria, excepto los apóstoles.
  rationale: Se reubicó la nota al pie en la frase correcta ('su ejecución') para alinearla con la evidencia léxica. Se cambió 'se desató' por 'surgió' para reflejar mejor Ἐγένετο y el inglés auditado 'arose' sin intensificación innecesaria. Se simplificó 'que estaba en Jerusalén' a 'en Jerusalén' por naturalidad y fidelidad suficiente.
