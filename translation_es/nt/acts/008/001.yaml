  text: Σαῦλος δὲ ἦν συνευδοκῶν τῇ ἀναιρέσει αὐτοῦ. Ἐγένετο δὲ ἐν ἐκείνῃ τῇ ἡμέρᾳ διωγμὸς μέγας ἐπὶ τὴν ἐκκλησίαν τὴν ἐν Ἱεροσολύμοις· πάντες δὲ διεσπάρησαν κατὰ τὰς χώρας τῆς Ἰουδαίας καὶ Σαμαρείας πλὴν τῶν ἀποστόλων.
base_translation:
  language: en
  yaml_path: translation/nt/acts/008/001.yaml
  text: Now Saul was approving of his execution. And on that day a great persecution arose against the church in Jerusalem[a], and they were all scattered throughout the regions of Judea and Samaria, except the apostles.
  footnotes:
  - marker: a
    text: Or 'his execution,' 'his death,' or more interpretively, 'his murder.' The Greek refers to the act of putting him to death.
    reason: lexical_alternative
