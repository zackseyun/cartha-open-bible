review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: Saulo aprueba la muerte de Esteban, surge una gran persecución contra la iglesia en Jerusalén, y todos son dispersados salvo los apóstoles. Sin embargo, hay dos ajustes de fidelidad/estilo recomendables: 1) Ἐγένετο se refleja mejor con ''surgió'' o ''hubo'' que con ''se desató'', ya que este último añade un matiz más vívido que el verbo griego no exige; 2) el anclaje de la nota al pie en ''iglesia'' es incorrecto, pues la nota documenta ἀναιρέσει αὐτοῦ (''su ejecución'').'
  spanish_quality_summary: El español es claro y natural, pero 'fueron dispersados' suena algo pesado frente a la alternativa más idiomática 'fueron esparcidos' o 'se dispersaron'. Aun así, puede conservarse por cercanía al pasivo del griego. El problema principal de calidad editorial es la nota al pie mal colocada. También conviene simplificar 'que estaba en Jerusalén' a 'en Jerusalén' para mayor naturalidad sin pérdida de sentido.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Saulo', 'iglesia', 'Judea', 'Samaria' y 'apóstoles' están bien. La elección 'su ejecución' es aceptable por alineación con la revisión inglesa auditada, aunque el expediente léxico reconoce que 'el acto de darle muerte' sería más neutral. No requiere adjudicación adicional.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a 'iglesia' en vez de a 'su ejecución'.
    rationale: La nota explica alternativas para τῇ ἀναιρέσει αὐτοῦ, no para ἐκκλησίαν. Esto rompe la trazabilidad léxica y la disciplina de notas requerida.
  - severity: medium
    issue: '''Se desató'' para Ἐγένετο añade intensidad interpretativa.'
    rationale: Ἐγένετο en este contexto introduce que la persecución surgió/ocurrió; 'se desató' puede sonar más dramático que el original y que el inglés auditado 'arose'.
  - severity: low
    issue: '''Que estaba en Jerusalén'' es más pesado de lo necesario.'
    rationale: La frase atributiva τὴν ἐν Ἱεροσολύμοις se expresa con naturalidad en español como 'en Jerusalén' sin pérdida semántica.
  revised_spanish_text: Ahora Saulo aprobaba su ejecución[a]. Y aquel día surgió una gran persecución contra la iglesia en Jerusalén, y todos fueron dispersados por las regiones de Judea y Samaria, excepto los apóstoles.
  revised_footnotes:
  - marker: a
    text: O 'su ejecución', 'su muerte' o, de manera más interpretativa, 'su asesinato'. El griego se refiere al acto de darle muerte.
    reason: alternative_reading
  revision_rationale: Se reubicó la nota al pie en la frase correcta ('su ejecución') para alinearla con la evidencia léxica. Se cambió 'se desató' por 'surgió' para reflejar mejor Ἐγένετο y el inglés auditado 'arose' sin intensificación innecesaria. Se simplificó 'que estaba en Jerusalén' a 'en Jerusalén' por naturalidad y fidelidad suficiente.
