translation:
  language: es
  text: Ahora Saulo aprobaba su ejecución[a]. Y aquel día surgió una gran persecución contra la iglesia en Jerusalén, y todos fueron dispersados por las regiones de Judea y Samaria, excepto los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su ejecución', 'su muerte' o, de manera más interpretativa, 'su asesinato'. El griego se refiere al acto de darle muerte.
    reason: alternative_reading
lexical_decisions:
- source_word: Σαῦλος
  english_pob_choice: Saul
  chosen_spanish: Saulo
  alternatives_spanish:
  - Saúl
  lexicon: BDAG
  rationale: Nombre propio transliterado. En español bíblico, 'Saulo' es la forma estable y reconocible para el personaje de Hechos.
- source_word: συνευδοκῶν
  english_pob_choice: was approving of
  chosen_spanish: aprobaba
  alternatives_spanish:
  - estaba de acuerdo con
  - consentía en
  - aprobaba de
  lexicon: BDAG
  rationale: El participio con ἦν expresa una aprobación continua o concomitante. 'Aprobaba' comunica esa actitud sin añadir participación física ni endurecer el matiz.
- source_word: τῇ ἀναιρέσει αὐτοῦ
  english_pob_choice: his execution
  chosen_spanish: su ejecución
  alternatives_spanish:
  - su muerte
  - su asesinato
  - su matanza
  lexicon: BDAG
  rationale: La base léxica apunta al acto de quitarle la vida. 'Ejecución' sigue la decisión auditada en inglés y mantiene el acto de dar muerte sin traducirlo como 'muerte' genérica ni imponer 'asesinato' como juicio más fuerte.
- source_word: Ἐγένετο
  english_pob_choice: arose
  chosen_spanish: se desató
  alternatives_spanish:
  - surgió
  - ocurrió
  - comenzó
  lexicon: BDAG
  rationale: En un contexto de persecución que irrumpe y se expande, 'se desató' conserva la idea de irrupción de manera natural en español.
- source_word: διωγμὸς μέγας
  english_pob_choice: a great persecution
  chosen_spanish: una gran persecución
  alternatives_spanish:
  - una persecución severa
  - una persecución muy grande
  lexicon: BDAG
  rationale: Traducción directa y natural del sintagma; mantiene el énfasis de μέγας sin sobrerrepresentarlo.
- source_word: ἐπὶ τὴν ἐκκλησίαν
  english_pob_choice: against the church
  chosen_spanish: contra la iglesia
  alternatives_spanish:
  - sobre la iglesia
  - en contra de la iglesia
  lexicon: BDAG
  rationale: En contexto hostil, ἐπί expresa dirección adversativa; 'contra' es la opción más idiomática y fiel.
- source_word: τὴν ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: que estaba en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - la de Jerusalén
  lexicon: BDAG
  rationale: La frase atributiva identifica a la iglesia por su ubicación. 'Que estaba en Jerusalén' conserva el vínculo descriptivo sin sonar mecánico.
- source_word: πάντες
  english_pob_choice: they were all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los creyentes
  lexicon: BDAG
  rationale: El referente contextual es la comunidad afectada; el español permite omitir el pronombre sujeto explícito sin perder el alcance distributivo.
- source_word: διεσπάρησαν
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - fueron esparcidos
  - se dispersaron
  lexicon: BDAG
  rationale: Pasivo que conserva la idea de dispersión forzada. 'Fueron dispersados' es claro y formal en español bíblico contemporáneo.
- source_word: κατὰ τὰς χώρας
  english_pob_choice: throughout the regions
  chosen_spanish: por las regiones
  alternatives_spanish:
  - a través de las regiones
  - por los territorios
  lexicon: BDAG
  rationale: χώρας se refiere a regiones/territorios; 'por las regiones' mantiene el sentido geográfico sin sobrecargar la frase.
- source_word: τῆς Ἰουδαίας καὶ Σαμαρείας
  english_pob_choice: of Judea and Samaria
  chosen_spanish: de Judea y Samaria
  alternatives_spanish:
  - de la Judea y la Samaria
  - de Judá y Samaria
  lexicon: BDAG
  rationale: Se conservan los topónimos tradicionales en forma reconocible y estable en español.
- source_word: πλὴν τῶν ἀποστόλων
  english_pob_choice: except the apostles
  chosen_spanish: excepto los apóstoles
  alternatives_spanish:
  - salvo los apóstoles
  - menos los apóstoles
  lexicon: BDAG
  rationale: πλήν marca excepción; 'excepto' es directo e idiomático.
theological_decisions:
- issue: Alcance de ἀναιρέσει αὐτοῦ en relación con la muerte de Esteban
  english_pob_reading: his execution
  chosen_spanish_reading: su ejecución
  alternative_spanish_readings:
  - su asesinato
  - su muerte
  rationale: La redacción evita convertir el término en una valoración jurídica más fuerte ('asesinato') o en una mera constatación de fallecimiento ('muerte'). 'Ejecución' preserva el acto de darle muerte, coherente con la decisión auditada en inglés.
  doctrine_reference: Principio de primacía del texto original y de no importar juicio interpretativo más allá de lo que el léxico y el contexto sostienen.
- issue: Alcance de πάντες en el marco de la dispersión
  english_pob_reading: they were all scattered ... except the apostles
  chosen_spanish_reading: todos fueron dispersados ... excepto los apóstoles
  alternative_spanish_readings:
  - todos los creyentes fueron dispersados
  - fueron dispersados todos
  rationale: Se mantiene el énfasis retórico de 'todos' sin convertirlo en universal absoluto, ya que el propio texto añade la excepción de los apóstoles. La lectura contextual es la comunidad de Jerusalén.
  doctrine_reference: 'Principio de equivalencia óptima: respetar la fuerza literaria sin sobreexplicar ni diluir el alcance contextual.'
translation_notes:
  revision_awareness: La base inglesa revisó 'his killing' a 'his execution' en el pase final por considerarlo más natural y preciso para ἀναιρέσει. La versión española sigue esa decisión auditada y conserva la alternativa de 'muerte' y 'asesinato' en nota para no borrar la tensión léxica entre acto de dar muerte y valoración jurídica/moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Iglesia'' se usa en sentido histórico-concreto para la comunidad de Jerusalén, no como institución posterior desarrollada.'
  - '''Apóstoles'' se conserva como término técnico estable.'
  - 'Se evita suavizar la persecución: ''gran persecución'' y ''fueron dispersados'' preservan la fuerza del pasivo y la hostilidad del contexto.'
