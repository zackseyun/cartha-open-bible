review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: los dos participios iniciales (''después de haber dado solemne testimonio y hablado...'') y los dos imperfectos principales (''volvían... y proclamaban...''). También preserva correctamente el sujeto implícito. Sin embargo, las notas al pie están invertidas respecto al contenido: la nota [a] se ancla en ''volvían'' pero da una alternativa léxica adecuada; la nota [b] se ancla en ''Jerusalén'' pero en realidad contiene una alternativa de segmentación/orden para la cláusula final tomada del historial inglés. Esa nota no corresponde al lugar anclado ni añade claridad útil en español.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Dar solemne testimonio'' y ''aldeas samaritanas'' funcionan bien. La frase general es legible. El único problema real es paratextual: la nota [b] está mal ubicada y resulta confusa para el lector. Además, conviene ajustar la razón de esa nota o suprimirla; en español no hace falta conservar una nota heredada del inglés cuando no aporta una alternativa textual o semántica real.'
  glossary_alignment: 'La terminología está bien alineada con las pautas del proyecto: ''Señor'' para κύριος aquí es aceptable porque no se trata del tetragrámaton en la fuente; ''evangelio'' para εὐηγγελίζοντο es una opción válida y eclesialmente clara; no hay conflicto con ''Mesías'', ''Yahvé'' u otros términos de control. No se detectan desviaciones teológicas significativas.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'Jerusalén' pero su contenido corresponde a la cláusula final 'y proclamaban...'.
    rationale: Esto rompe la correspondencia obligatoria entre marcador y nota, y puede confundir al lector sobre qué elemento del texto está siendo explicado.
  - severity: low
    issue: La nota [b] hereda una alternativa de redacción inglesa que no resulta necesaria en español.
    rationale: La diferencia entre repetir o no el auxiliar en inglés no genera una ambigüedad equivalente en español; por tanto, la nota no añade valor exegético ni léxico.
  revised_spanish_text: Así que, después de haber dado solemne testimonio y hablado la palabra del Señor, volvían[a] a Jerusalén, y proclamaban el evangelio en muchas aldeas samaritanas.
