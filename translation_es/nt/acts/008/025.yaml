translation:
  language: es
  text: Así que, después de haber dado solemne testimonio y hablado la palabra del Señor, volvían[a] a Jerusalén, y proclamaban el evangelio en muchas aldeas samaritanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresaban».
    reason: lexical_alternative
lexical_decisions:
- source_word: διαμαρτυράμενοι
  english_pob_choice: had solemnly testified
  chosen_spanish: haber dado solemne testimonio
  alternatives_spanish:
  - haber testificado solemnemente
  - haber dado testimonio con solemnidad
  - haber advertido solemnemente
  lexicon: BDAG
  rationale: La forma participial expresa un testimonio serio y enfático. «Dar solemne testimonio» conserva esa fuerza sin convertirlo en «advertencia», que sería una restricción no exigida por el contexto.
- source_word: λαλήσαντες
  english_pob_choice: spoken
  chosen_spanish: hablado
  alternatives_spanish:
  - declarado
  - hablado acerca de
  lexicon: BDAG
  rationale: El verbo es general y su complemento inmediato, «la palabra del Señor», ya concreta el contenido. «Hablado» mantiene la sencillez del griego sin sobreinterpretar el acto.
- source_word: τὸν λόγον τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - el mensaje del Señor
  - la palabra de Yahvé
  lexicon: BDAG
  rationale: «Palabra» es la correspondencia directa de λόγος en este contexto de proclamación. «Señor» conserva el valor reverente de κύριος aquí, sin reemplazarlo por una paráfrasis.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En el uso neotestamentario, «Señor» es la forma natural y teológicamente cargada para κύριος. En este versículo no hay base suficiente para desviarlo a «Maestro».
- source_word: ὑπέστρεφον
  english_pob_choice: were returning
  chosen_spanish: volvían
  alternatives_spanish:
  - regresaban
  - iban de vuelta
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso. «Volvían» reproduce mejor ese valor aspectual que un pretérito simple como «volvieron».
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalém
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y moderno.
- source_word: πολλάς τε κώμας τῶν Σαμαριτῶν
  english_pob_choice: in many Samaritan villages
  chosen_spanish: en muchas aldeas samaritanas
  alternatives_spanish:
  - en muchas aldeas de los samaritanos
  - por muchas aldeas samaritanas
  lexicon: BDAG
  rationale: El griego señala aldeas asociadas a los samaritanos. «Aldeas samaritanas» es natural en español y conserva la referencia étnica sin añadir una relación posesiva artificial.
- source_word: εὐηγγελίζοντο
  english_pob_choice: were proclaiming the good news
  chosen_spanish: proclamaban el evangelio
  alternatives_spanish:
  - anunciaban la buena noticia
  - evangelizaban
  lexicon: BDAG
  rationale: El verbo tiene el sentido de anunciar las buenas nuevas. «Proclamaban el evangelio» es claro en español bíblico y conserva la fuerza kerygmática sin depender de un calco técnico.
theological_decisions:
- issue: Referencia del sujeto implícito
  english_pob_reading: The subject is left as 'they,' referring contextually to the apostles/missionaries in the narrative without specifying names in the translation.
  chosen_spanish_reading: Se conserva el sujeto implícito «volvían / proclamaban» sin añadir nombres.
  alternative_spanish_readings:
  - Pedro y Juan volvían...
  - ellos, es decir, los apóstoles, volvían...
  rationale: El griego no nombra al sujeto en este versículo. El español puede mantener esa misma economía, evitando introducir identificaciones no expresadas en el texto.
  doctrine_reference: Primacía del texto original; no resolver en traducción lo que el versículo deja implícito.
- issue: κύριος en «la palabra del Señor»
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Jesús
  rationale: El contexto inmediato habla de la palabra del Señor; el término κύριος mantiene una referencia reverente y suficientemente abierta. Traducir aquí como «Yahvé» o especificar «el Señor Jesús» iría más allá de lo que el versículo formula explícitamente.
  doctrine_reference: Mantener la ambigüedad reverente del texto cuando el referente no está explicitado de forma inequívoca.
translation_notes:
  revision_awareness: 'La auditoría inglesa preserva el imperfecto con «were returning» y, tras revisión, unió de forma más natural el segundo imperfecto con la primera acción. La versión española sigue esa misma coordinación aspectual: «volvían... y proclamaban», manteniendo la progresión continua y la simultaneidad del texto griego. También se adopta la naturalización revisada de la frase final como «aldeas samaritanas», en lugar de una construcción posesiva más pesada.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el tratamiento habitual del NT en este proyecto.
  - Se usa «evangelio» como equivalente contextual de εὐαγγελίζοντο, sin forzar el verbo técnico «evangelizar» cuando el español corriente permite una formulación más clara.
  - Se conserva el plural implícito sin identificar sujetos por nombre, respetando la sobriedad narrativa del griego.
