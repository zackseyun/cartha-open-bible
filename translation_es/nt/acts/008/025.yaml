    reason: lexical_alternative
  revision_rationale: Se elimina la nota [b] porque estaba mal anclada y no corresponde a una alternativa útil en español. Se conserva la nota léxica sobre 'volvían/regresaban', que sí refleja una variante de formulación legítima para ὑπέστρεφον sin alterar el sentido.
