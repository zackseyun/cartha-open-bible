translation:
  language: es
  text: Y Simón también creyó[a], y después de ser bautizado permanecía con Felipe, y viendo las señales y las grandes obras de poder[b] que sucedían, quedaba asombrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tuvo fe». El verbo griego puede expresar tanto creer como confiar; aquí se mantiene «creyó» por ser la forma más directa y neutral.
    reason: lexical_alternative
  - marker: b
    text: O «grandes milagros». El término griego puede abarcar manifestaciones de poder y obras milagrosas; se opta por una formulación más cercana a la fuerza literal del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτὸς
  english_pob_choice: himself also
  chosen_spanish: mismo también
  alternatives_spanish:
  - también él
  - él mismo también
  lexicon: BDAG
  rationale: La combinación griega añade énfasis a Simón y también valor aditivo. «Mismo también» conserva ese doble efecto sin sonar forzado en español.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe
  - llegó a creer
  lexicon: BDAG
  rationale: El aoristo de πιστεύω se expresa de manera natural con «creyó», sin añadir una conclusión teológica que el verbo por sí solo no formula.
- source_word: βαπτισθεὶς
  english_pob_choice: after being baptized
  chosen_spanish: después de ser bautizado
  alternatives_spanish:
  - habiendo sido bautizado
  - y fue bautizado
  lexicon: BDAG
  rationale: El participio aoristo pasivo antecede a la acción principal; «después de ser bautizado» aclara la secuencia en español de forma idiomática.
- source_word: ἦν προσκαρτερῶν
  english_pob_choice: he continued with
  chosen_spanish: permanecía con
  alternatives_spanish:
  - seguía con
  - se mantenía junto a
  lexicon: BDAG
  rationale: La perífrasis imperfecta expresa acción continua. «Permanecía con» comunica la permanencia junto a Felipe con naturalidad y sin sobreinterpretar el matiz.
- source_word: θεωρῶν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - observando
  - mirando
  lexicon: BDAG
  rationale: 'El participio presente se conserva con un gerundio que muestra acción concomitante: Simón observa mientras ocurren los hechos.'
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  lexicon: BDAG
  rationale: «Señales» es el equivalente más claro y conserva el valor evidencial/revelador del término en Hechos.
- source_word: δυνάμεις μεγάλας
  english_pob_choice: great works of power
  chosen_spanish: los grandes actos de poder
  alternatives_spanish:
  - las grandes obras de poder
  - los grandes hechos poderosos
  lexicon: BDAG
  rationale: Se mantiene la fuerza semántica de δυνάμεις como manifestaciones de poder, evitando reducirlo prematuramente a «milagros» y preservando la ambigüedad útil del original.
- source_word: γινομένας
  english_pob_choice: being done
  chosen_spanish: que sucedían
  alternatives_spanish:
  - que se hacían
  - que estaban ocurriendo
  lexicon: BDAG
  rationale: El participio presente pasivo indica hechos en desarrollo delante de él. «Que sucedían» es natural en español y mantiene el carácter procesual.
- source_word: ἐξίστατο
  english_pob_choice: he was amazed
  chosen_spanish: quedaba asombrado
  alternatives_spanish:
  - estaba maravillado
  - se pasmaba
  lexicon: BDAG
  rationale: El imperfecto expresa asombro continuado; «quedaba asombrado» refleja ese estado sostenido con un registro digno y claro.
theological_decisions:
- issue: Si el «creyó» de Simón debe cualificarse como fe genuina o superficial
  english_pob_reading: Render ἐπίστευσεν simply as 'believed' without qualifying it as genuine or false faith
  chosen_spanish_reading: Traducir simplemente «creyó», sin añadir calificativos sobre la autenticidad de su fe
  alternative_spanish_readings:
  - creyó de verdad
  - solo profesó creer
  - creyó superficialmente
  rationale: El versículo afirma que Simón creyó y fue bautizado, pero el contexto posterior deja una tensión interpretativa. La traducción conserva esa tensión y no resuelve de antemano el juicio teológico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail: se conservó la relación participial de θεωρῶν mediante «viendo», y se evitó traducir δυνάμεις directamente como «milagros», prefiriendo una formulación más abierta («actos de poder») para no cerrar la ambigüedad léxica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «creyó» para πιστεύω, sin introducir lenguaje doctrinal adicional.
  - «Señales» se reserva para σημεῖα y «actos de poder» para δυνάμεις cuando el contexto requiere distinguir ambos términos.
  - El gerundio «viendo» conserva la simultaneidad del participio presente sin sobrecargar la sintaxis española.
