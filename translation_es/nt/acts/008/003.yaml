  - severity: medium
    issue: ‘A la prisión’ suena menos natural en español bíblico general
    rationale: Aunque comprensible, ‘a prisión’ es más idiomático y suficientemente literal para εἰς φυλακήν. Mejora la fluidez sin pérdida semántica.
  revised_spanish_text: Pero Saulo devastaba[a] a la iglesia, entrando casa tras casa[b]; arrastrando tanto a hombres como a mujeres, los entregaba a prisión.
