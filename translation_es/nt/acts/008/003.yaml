  source_alignment_summary: 'El borrador español capta bien la estructura básica del griego: Saulo como sujeto, acción continua e intensa contra la iglesia, entrada repetida en múltiples casas, arrastre forzado de hombres y mujeres, y entrega a encarcelamiento. Sin embargo, los marcadores de notas están mal anclados: [a] aparece sobre ‘devastaba’ aunque la nota trata de κατὰ τοὺς οἴκους (‘casa tras casa’), y [b] aparece sobre ‘mujeres’ aunque la nota trata de ἐλυμαίνετο (‘devastaba/asolaba’). Además, la nota b actual está mal formulada en español (‘la estaba devastando la iglesia’), invirtiendo la sintaxis.'
