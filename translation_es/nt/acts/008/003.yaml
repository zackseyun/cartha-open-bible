translation:
  language: es
  text: Pero Saulo devastaba[a] a la iglesia, entrando casa tras casa[b]; arrastrando tanto a hombres como a mujeres, los entregaba a prisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘asolaba a la iglesia’ / ‘estaba asolando a la iglesia’. El griego puede entenderse con un matiz de devastación violenta.
    reason: lexical_alternative
  - marker: b
    text: O ‘de casa en casa’. La expresión griega puede verterse de ambas maneras; ‘casa tras casa’ destaca el sentido distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλυμαίνετο
  english_pob_choice: was ravaging
  chosen_spanish: devastaba
  alternatives_spanish:
  - asolaba
  - arruinaba
  - destruía
  lexicon: BDAG
  rationale: El imperfecto griego presenta una acción en curso, y λυμαίνομαι expresa daño violento o devastación, más fuerte que un simple ‘perseguir’. En español, ‘devastaba’ conserva la fuerza del verbo y el aspecto progresivo con naturalidad.
- source_word: τὴν ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία se refiere a la comunidad de creyentes. ‘Iglesia’ es el equivalente establecido y claro en español, sin perder el referente comunitario del texto.
- source_word: κατὰ τοὺς οἴκους
  english_pob_choice: house after house
  chosen_spanish: casa tras casa
  alternatives_spanish:
  - de casa en casa
  - casa por casa
  - a través de las casas
  lexicon: BDAG
  rationale: La construcción distributiva con κατά y plural expresa repetición e intensidad. ‘Casa tras casa’ reproduce bien ese sentido en español y mantiene la idea de entrada sucesiva en múltiples hogares.
- source_word: εἰσπορευόμενος
  english_pob_choice: entering
  chosen_spanish: entrando
  alternatives_spanish:
  - metiéndose
  - al entrar
  lexicon: BDAG
  rationale: El participio describe el modo de su acción. ‘Entrando’ es conciso y enlaza naturalmente con la expresión distributiva anterior.
- source_word: σύρων
  english_pob_choice: dragging off
  chosen_spanish: arrastrando
  alternatives_spanish:
  - llevando arrastrados
  - halando
  lexicon: BDAG
  rationale: σύρω implica arrastre forzado. ‘Arrastrando’ preserva esa violencia; el complemento posterior hace explícito que se trata de personas removidas de sus casas.
- source_word: ἄνδρας καὶ γυναῖκας
  english_pob_choice: both men and women
  chosen_spanish: tanto a hombres como a mujeres
  alternatives_spanish:
  - hombres y mujeres
  - a hombres y mujeres
  lexicon: BDAG
  rationale: La fórmula destaca el alcance indiscriminado de la acción. ‘Tanto... como...’ reproduce esa amplitud de manera natural en español.
- source_word: παρεδίδου
  english_pob_choice: he was handing them over
  chosen_spanish: los entregaba
  alternatives_spanish:
  - los ponía en manos de
  - los remitía
  lexicon: BDAG
  rationale: El imperfecto vuelve a señalar acción repetida o continua. ‘Los entregaba’ conserva el valor de entrega a custodia o autoridad sin sobreespecificar más allá del contexto.
- source_word: εἰς φυλακήν
  english_pob_choice: to prison
  chosen_spanish: a la prisión
  alternatives_spanish:
  - a la cárcel
  - a prisión
  - a la custodia
  lexicon: BDAG
  rationale: φυλακή aquí indica encarcelamiento o custodia. ‘A la prisión’ es natural después de ‘los entregaba’ y mantiene el destino concreto indicado por el griego.
theological_decisions:
- issue: Intensidad de la violencia contra la iglesia
  english_pob_reading: Use strong language ('was ravaging the church') rather than a softened term like 'was persecuting the church.'
  chosen_spanish_reading: Usar un verbo fuerte como ‘devastaba’ en vez de suavizarlo con ‘perseguía’
  alternative_spanish_readings:
  - perseguía a la iglesia
  - asolaba a la iglesia
  rationale: El texto presenta daño violento y sistemático. ‘Devastaba’ conserva esa fuerza sin introducir una interpretación ajena ni atenuar la crudeza del verbo griego.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios y quedó en alta concordancia con el texto inglés auditado. No hubo revisiones aplicadas al versículo en el paquete disponible.
  spanish_consistency_notes:
  - Se mantiene ‘iglesia’ para ἐκκλησία en coherencia con Hechos.
  - Se conserva el imperfecto español (‘devastaba’, ‘entregaba’) para reflejar la acción continua del griego.
  - Se usa ‘a la prisión’ como destino concreto, paralelo a ‘to prison’ en la auditoría inglesa.
  - La nota sobre ‘casa tras casa’ preserva la ambigüedad distributiva del griego sin perder fluidez en español.
