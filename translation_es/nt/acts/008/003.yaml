  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘La iglesia’ para ἐκκλησίαν es adecuado. La decisión fuerte para ἐλυμαίνετο (‘devastaba’) está alineada con la auditoría inglesa. No aparecen términos del glosario mayor como Yahvé, Mesías, esclavo, etc.
