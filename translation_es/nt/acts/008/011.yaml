translation:
  language: es
  text: Y le prestaban atención, porque desde hacía bastante tiempo[a] los había asombrado con sus artes mágicas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde hacía mucho tiempo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con sus hechicerías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεῖχον
  english_pob_choice: paid attention to
  chosen_spanish: le prestaban atención
  alternatives_spanish:
  - le hacían caso
  - lo escuchaban con atención
  - le prestaban oído
  lexicon: BDAG
  rationale: προσέχω aquí expresa dirigir la atención o prestar oído a alguien. El imperfecto se refleja con «prestaban» para conservar la acción շարունակada en el pasado sin sonar forzado.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: 'El dativo con προσέχω se vierte naturalmente en español con complemento indirecto: «le». Mantiene fluidez y la dirección de la atención hacia Simón.'
- source_word: διὰ τὸ ἱκανῷ χρόνῳ
  english_pob_choice: because for a considerable time
  chosen_spanish: porque por bastante tiempo
  alternatives_spanish:
  - porque por un largo tiempo
  - porque por bastante tiempo
  - porque desde hacía mucho
  lexicon: BDAG
  rationale: διά con el infinitivo articular expresa causa. ἱκανός con χρόνος señala una duración considerable; «por bastante tiempo» conserva esa idea en español natural. Se evita endurecerlo con una fórmula excesivamente literal.
- source_word: ταῖς μαγείαις
  english_pob_choice: with his magic arts
  chosen_spanish: con sus artes mágicas
  alternatives_spanish:
  - con su magia
  - con sus hechicerías
  - con sus artes de magia
  lexicon: BDAG
  rationale: μαγεία refiere a prácticas mágicas. «Artes mágicas» sigue de cerca la valoración léxica del inglés POB y suena natural en español, sin decidir más de lo que el griego declara sobre la naturaleza exacta de esas prácticas.
- source_word: ἐξεστακέναι
  english_pob_choice: had amazed
  chosen_spanish: los había asombrado
  alternatives_spanish:
  - los había dejado asombrados
  - los había atónito
  - los había maravillado
  lexicon: BDAG
  rationale: El perfecto de ἐξίστημι aquí comunica el efecto duradero de asombro. «Había asombrado» refleja mejor ese resultado que opciones que sugerirían otra causalidad como «hechizado».
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: Es el objeto directo de ἐξεστακέναι y se refiere a la gente mencionada antes; en español, el clítico «los» resulta más natural que repetir el pronombre fuerte.
theological_decisions:
- issue: Naturaleza de las μαγείαις de Simón
  english_pob_reading: Rendered as 'magic arts' without specifying whether the practices were fraudulent tricks, occult activity, or both.
  chosen_spanish_reading: «artes mágicas» sin precisar si se trataba de trucos fraudulentos, actividad oculta o ambas cosas.
  alternative_spanish_readings:
  - hechicerías
  - magia
  - artes de magia
  rationale: El versículo nombra μαγεία y su efecto en la multitud, pero no define por sí mismo la naturaleza metafísica o moral de esas prácticas. La traducción conserva esa tensión en lugar de resolverla con una etiqueta más fuerte de la que el texto exige.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla prematuramente.
translation_notes:
  revision_awareness: Revisado a la luz del texto griego SBLGNT y del audit trail inglés; no se introdujeron cambios doctrinales ni ampliaciones interpretativas más allá de lo que el griego y la decisión inglesa ya sostienen.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva «artes mágicas» para μαγείαις, evitando sustituirlo por un término tradicional más cargado sin necesidad textual.
  - Se refleja el imperfecto con una forma progresiva/iterativa española natural («prestaban atención»).
  - Se preserva la ambigüedad de μαγεία sin convertirla en una acusación más específica que el griego.
  - El clítico «los» recoge el objeto directo plural de manera idiomática en español.
