translation:
  language: es
  text: Por tanto, arrepiéntete de esta maldad tuya, y ruega al Señor, si acaso te sea perdonada la intención[a] de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pensamiento de tu corazón te sea perdonado».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετανόησον
  english_pob_choice: repent
  chosen_spanish: arrepiéntete
  alternatives_spanish:
  - cámbiate de mente
  - vuélvete atrás
  lexicon: BDAG
  rationale: El imperativo exige un llamado decisivo al arrepentimiento; «arrepiéntete» conserva mejor la fuerza moral y espiritual que una paráfrasis cognitiva más débil.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Expresa con claridad la consecuencia lógica de la reprensión previa, en un español natural y solemne.
- source_word: ἀπὸ τῆς κακίας σου ταύτης
  english_pob_choice: of this wickedness of yours
  chosen_spanish: de esta maldad tuya
  alternatives_spanish:
  - de este mal tuyo
  - de esta perversidad tuya
  lexicon: BDAG
  rationale: κακία aquí denota maldad moral, no solo mala voluntad. «Maldad» conserva la carga ética; «tuya» mantiene el énfasis posesivo del griego.
- source_word: δεήθητι
  english_pob_choice: pray
  chosen_spanish: ruega
  alternatives_spanish:
  - ora
  - implora
  lexicon: BDAG
  rationale: δέομαι implica pedir con insistencia. En este contexto, «ruega» suena natural en español y conserva el matiz de súplica respetuosa dirigido a Dios.
- source_word: τοῦ κυρίου
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  lexicon: BDAG
  rationale: La forma tradicional y reconocible en español es «Señor». Aquí funciona bien como destinatario de la súplica sin forzar una aclaración adicional.
- source_word: εἰ ἄρα
  english_pob_choice: if perhaps
  chosen_spanish: si acaso
  alternatives_spanish:
  - si quizá
  - si tal vez
  lexicon: BDAG
  rationale: La combinación expresa posibilidad incierta y cautelosa. «Si acaso» comunica bien esa reserva sin convertirla en certeza ni en negación.
- source_word: ἀφεθήσεταί σοι
  english_pob_choice: may be forgiven you
  chosen_spanish: te sea perdonada
  alternatives_spanish:
  - te será perdonada
  - te pueda ser perdonada
  lexicon: BDAG
  rationale: El futuro pasivo queda mejor en español con una construcción de posibilidad en subjuntivo, para reflejar la esperanza condicionada del pasaje.
- source_word: ἡ ἐπίνοια
  english_pob_choice: the intent
  chosen_spanish: la intención
  alternatives_spanish:
  - el pensamiento
  - el propósito
  - el designio
  lexicon: BDAG
  rationale: ἐπίνοια puede abarcar pensamiento, intención o designio; aquí la idea interna de propósito/intención encaja mejor que «pensamiento» y suena más natural en español.
- source_word: τῆς καρδίας σου
  english_pob_choice: of your heart
  chosen_spanish: de tu corazón
  alternatives_spanish:
  - en tu corazón
  lexicon: BDAG
  rationale: «De tu corazón» reproduce con mayor formalidad la relación genitiva del griego y conserva la antropología bíblica del corazón como centro interior.
theological_decisions:
- issue: Grado de certeza sobre el perdón
  english_pob_reading: 'Peter speaks conditionally: Simon is told to repent and pray in hope that forgiveness may be granted, without guaranteeing the outcome.'
  chosen_spanish_reading: 'Pedro habla con reserva: se ordena a Simón arrepentirse y rogar al Señor con la esperanza de que le sea concedido el perdón, sin prometerlo como seguro.'
  alternative_spanish_readings:
  - Pedro garantiza el perdón si hay arrepentimiento.
  - Pedro sugiere que el perdón es improbable o imposible.
  rationale: La expresión εἰ ἄρα mantiene una posibilidad incierta. La traducción conserva esa tensión y evita resolverla hacia una garantía o una desesperación que el texto no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés POB, que ajustó la expresión de contingencia de 'that, if possible' a 'if perhaps' para reflejar más de cerca εἰ ἄρα. La redacción española usa «si acaso» para reproducir esa cautela y mantener la estructura directa del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma para el nombre divino cuando corresponda, pero aquí el griego κύριος se vierte naturalmente como «Señor» según el contexto de súplica.
  - Se conserva un tono moderno y digno, evitando arcaísmos innecesarios y sin suavizar la fuerza moral de μετανόησον y κακία.
  - La construcción «te sea perdonada» sostiene el matiz pasivo y condicional del original sin volverlo excesivamente interpretativo.
