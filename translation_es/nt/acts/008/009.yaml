translation:
  language: es
  text: Ahora bien, cierto hombre llamado Simón ya estaba en la ciudad, practicando magia[a] y asombrando al pueblo de Samaria, diciendo que él mismo era alguien grande[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'practicando hechicería'. El verbo griego se refiere a la práctica de artes mágicas.
    reason: lexical_alternative
  - marker: b
    text: O 'que él era alguien grande'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνὴρ δέ τις
  english_pob_choice: Now a certain man
  chosen_spanish: Ahora un cierto hombre
  alternatives_spanish:
  - Pero un cierto hombre
  - Ahora había un hombre
  lexicon: BDAG
  rationale: ἀνήρ exige un sustantivo masculino específico; 'hombre' conserva la referencia de género. δέ introduce transición narrativa y 'Ahora' mantiene el flujo natural del relato. τις añade indefinición, por eso 'un cierto'.
- source_word: ὀνόματι Σίμων
  english_pob_choice: named Simon
  chosen_spanish: llamado Simón
  alternatives_spanish:
  - de nombre Simón
  - llamado de nombre Simón
  lexicon: BDAG
  rationale: La dación con ὀνόματι se expresa de forma idiomática en español con 'llamado'. Se conserva el nombre propio como transliteración directa.
- source_word: προϋπῆρχεν
  english_pob_choice: had previously been
  chosen_spanish: había estado antes
  alternatives_spanish:
  - ya estaba
  - había estado allí antes
  lexicon: BDAG
  rationale: El imperfecto indica presencia previa respecto de la acción narrada. 'Había estado antes' comunica anterioridad sin añadir duración ni matices no explícitos.
- source_word: μαγεύων
  english_pob_choice: practicing magic
  chosen_spanish: practicando magia
  alternatives_spanish:
  - practicando hechicería
  - usando hechicería
  - practicando artes mágicas
  lexicon: BDAG
  rationale: Se eligió 'magia' para reflejar el campo léxico sin cargar el término con una etiqueta doctrinal posterior que el verso no explicita. 'Hechicería' es una alternativa posible, pero en español suele sonar más interpretativa y más fuertemente valorativa.
- source_word: ἐξιστάνων
  english_pob_choice: astonishing
  chosen_spanish: asombrando
  alternatives_spanish:
  - atónando
  - sorprendiendo
  - dejando perplejo
  lexicon: BDAG
  rationale: El participio expresa el efecto continuado de causar asombro. 'Asombrando' mantiene el aspecto progresivo y es natural en español contemporáneo.
- source_word: τὸ ἔθνος τῆς Σαμαρείας
  english_pob_choice: the people of Samaria
  chosen_spanish: el pueblo de Samaria
  alternatives_spanish:
  - la gente de Samaria
  - la nación de Samaria
  - el pueblo samaritano
  lexicon: BDAG
  rationale: ἔθνος puede significar 'pueblo' o 'nación'; aquí el contexto narrativo habla de la población colectiva, no de una entidad política, por eso 'el pueblo de Samaria' expresa bien el sentido. Se evita 'nación' por sonar demasiado político en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - declarando
  - diciendo que
  lexicon: BDAG
  rationale: El participio introduce el contenido de la autodescripción de Simón. 'Diciendo' conserva la relación sintáctica sin añadir interpretación.
- source_word: εἶναί τινα ἑαυτὸν μέγαν
  english_pob_choice: that he himself was someone great
  chosen_spanish: que él mismo era alguien grande
  alternatives_spanish:
  - que él era alguien grande
  - que él mismo era una persona grande
  - que él mismo era un gran personaje
  lexicon: BDAG
  rationale: τινα se rinde como 'alguien' y μέγαν como 'grande'. 'Él mismo' refleja ἑαυτόν y conserva el énfasis en la autoexaltación. Se evita 'gran personaje' por ser demasiado interpretativo.
theological_decisions:
- issue: Caracterización de la actividad de Simón
  english_pob_reading: Rendered μαγεύων as 'practicing magic' without importing later theological labels such as 'demonic' or 'occultic fraud.'
  chosen_spanish_reading: Se traduce μαγεύων como 'practicando magia' sin añadir una etiqueta teológica posterior que el verso no explicita.
  alternative_spanish_readings:
  - practicando hechicería
  - usando hechicería
  - practicando artes mágicas
  rationale: El texto presenta la actividad como magia y el efecto como asombro público, pero no desarrolla en este versículo una evaluación metafísica completa. La redacción en español debe preservar esa tensión y no anticipar conclusiones que pertenecen al contexto más amplio.
  doctrine_reference: Translation philosophy items 1, 3, and 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail en inglés: conserva la anterioridad de προϋπῆρχεν, el valor de participio de los verbos en -ων, y la autoproclamación enfática de Simón sin sobrerinterpretar la actividad mágica ni diluir el contraste lexical entre ἔθνος y ''pueblo''. No se registran revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Dios / Yahvé / Mesías' según los defaults del proyecto; este versículo no los activa.
  - '''magia'' se usa aquí por fidelidad léxica; la nota ofrece ''hechicería'' como alternativa, preservando la tensión semántica.'
  - '''alguien grande'' conserva la indefinición de τινα y el énfasis de ἑαυτόν sin convertirlo en un título.'
