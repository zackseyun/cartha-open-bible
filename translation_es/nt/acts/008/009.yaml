- from: Ahora un cierto hombre llamado Simón había estado antes en la ciudad practicando magia[a] y asombrando al pueblo de Samaria, diciendo que él mismo era alguien grande[b].
  to: Ahora bien, cierto hombre llamado Simón ya estaba en la ciudad, practicando magia[a] y asombrando al pueblo de Samaria, diciendo que él mismo era alguien grande[b].
  rationale: Se ajusta el inicio para evitar el calco 'Ahora un cierto hombre' y lograr un español más natural sin perder la transición narrativa ni la indefinición del griego. También se mejora 'había estado antes' a 'ya estaba' para expresar la presencia previa de forma más idiomática. Se conservan las decisiones léxicas principales y las notas del rastro POB.
