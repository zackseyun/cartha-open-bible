review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia principal del griego: ordenó detener el vehículo, ambos bajaron, y luego Felipe bautizó al eunuco. Sin embargo, suaviza indebidamente εἰς τὸ ὕδωρ como «al agua», cuando el expediente inglés documenta que el valor normal es direccional hacia dentro («into the water»), preservado con nota alternativa. También «carro» es menos fiel que «carroza» o «carruaje/chariot», pero no es un error grave; el punto principal a corregir es la preposición.'
  spanish_quality_summary: 'El español es legible y digno, pero «Y mandó detener el carro[a]» suena algo elíptico respecto del sujeto implícito del vehículo; «que se detuviera la carroza» o similar fluye mejor. Además, «ambos, Felipe y el eunuco» es comprensible, pero la construcción puede pulirse para reflejar mejor la explicitud del griego: «ambos, Felipe y el eunuco». La frase «descendieron al agua» es natural, pero no suficientemente precisa para la decisión léxica documentada.'
  glossary_alignment: 'No hay conflicto con términos teológicos principales del proyecto. «eunuco» y «bautizó» están bien. La divergencia relevante es la decisión léxica sobre εἰς: el borrador adopta la alternativa como texto principal y relega la lectura preferida a nota, al revés de lo auditado. También conviene usar una nota en español que ofrezca la alternativa «al agua» solo como posibilidad secundaria.'
  issues:
  - severity: high
    issue: εἰς τὸ ὕδωρ se tradujo como «al agua» en el texto principal
    rationale: El expediente fuente y la nota inglesa establecen «into the water» como la mejor representación del valor normal de εἰς, dejando «to the water» como alternativa secundaria en nota. El español debe reflejar eso con «al interior del agua» o más naturalmente «al agua» en nota, no al revés.
  - severity: medium
    issue: La nota al pie invierte la prioridad léxica documentada
    rationale: La nota actual dice «O “al agua”», pero el texto principal ya tiene «al agua». La alternativa preservada debe ser la forma más débil, mientras el texto principal debe expresar el movimiento hacia dentro.
  - severity: low
    issue: «carro» puede sonar demasiado genérico o moderno en varias regiones
    rationale: Aunque no falsea el sentido, para un registro bíblico ampliamente legible «carroza» comunica mejor un vehículo de este relato sin recurrir a un castellano arcaico excesivo. También evita asociaciones modernas de automóvil en algunos lectores.
  revised_spanish_text: Y mandó que se detuviera la carroza, y ambos, Felipe y el eunuco, descendieron al agua[a], y lo bautizó.
  revised_footnotes:
  - marker: a
    text: O «hacia el agua»; sin embargo, la preposición griega normalmente indica movimiento hacia el interior.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear mejor el español con la evidencia fuente y el expediente POB. La corrección principal es restablecer en el texto una formulación que exprese mejor el movimiento de εἰς sin sobreinterpretar el modo del bautismo. También se mejora la naturalidad de la primera cláusula con «mandó que se detuviera la carroza». Aunque «descendieron al agua» sigue siendo algo menos fuerte que «entraron en el agua», en conjunto, con la nota, preserva mejor la dirección que el borrador original y mantiene una lectura eclesialmente neutral.
