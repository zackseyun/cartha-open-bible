translation:
  language: es
  text: Y mandó que se detuviera la carroza, y ambos, Felipe y el eunuco, descendieron al agua[a], y lo bautizó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el agua»; sin embargo, la preposición griega normalmente indica movimiento hacia el interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio órdenes de
  lexicon: BDAG
  rationale: κέλευω expresa dar una orden o mandato. En español, «mandó» conserva bien la fuerza directiva y suena natural sin perder autoridad; «ordenó» también es posible, pero «mandó» encaja mejor en un relato narrativo breve.
- source_word: στῆναι
  english_pob_choice: to stop
  chosen_spanish: detener
  alternatives_spanish:
  - parar
  - hacer que se detuviera
  - quedara inmóvil
  lexicon: BDAG
  rationale: Con τὸ ἅρμα como objeto, el infinitivo indica hacer que el carro se detenga. «Detener» comunica esa acción de manera clara en español y evita una formulación demasiado literal como «estar de pie».
- source_word: ἅρμα
  english_pob_choice: chariot
  chosen_spanish: carro
  alternatives_spanish:
  - carro de guerra
  - carroza
  - carro tirado por animales
  lexicon: BDAG
  rationale: Aunque «chariot» en inglés es la elección convencional del POB, en español «carro» resulta más natural para un vehículo de este tipo en el relato. Se evita «carroza», que suena más anacrónico o ambiguo, y no se añade especificación que el texto griego no exige.
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: BDAG
  rationale: καταβαίνω significa bajar o descender. «Descendieron» mantiene con dignidad el movimiento descendente común a ambos sujetos y suena más sobrio que «bajaron» en este contexto.
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos juntos
  lexicon: BDAG
  rationale: El griego marca explícitamente la participación de las dos personas. «Ambos» preserva esa simultaneidad de forma precisa y concisa.
- source_word: εἰς τὸ ὕδωρ
  english_pob_choice: into the water
  chosen_spanish: al agua
  alternatives_spanish:
  - dentro del agua
  - hacia el agua
  - a la agua
  lexicon: BDAG
  rationale: εἰς normalmente señala movimiento hacia el interior de un espacio o sustancia. En español, «al agua» conserva la dirección sin forzar una expresión pesada. La frase mantiene la tensión lexical sobre el modo del bautismo sin resolverla interpretativamente.
- source_word: ὅ τε Φίλιππος καὶ ὁ εὐνοῦχος
  english_pob_choice: both Philip and the eunuch
  chosen_spanish: Felipe y el eunuco
  alternatives_spanish:
  - Felipe, así como el eunuco
  - Felipe junto con el eunuco
  lexicon: BDAG
  rationale: La construcción correlativa identifica a los dos participantes. Dado que «ambos» ya expresa la dualidad, «Felipe y el eunuco» es suficiente en español y evita redundancia innecesaria.
- source_word: εὐνοῦχος
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial eunuco
  - funcionario de la corte
  lexicon: BDAG
  rationale: En Hechos 8 el personaje ya viene caracterizado por este término. Mantener «eunuco» conserva la continuidad léxica y no sustituye el término por una explicación que el texto no añade aquí.
- source_word: ἐβάπτισεν
  english_pob_choice: baptized
  chosen_spanish: bautizó
  alternatives_spanish:
  - sumergió en el bautismo
  - bautizó por inmersión
  lexicon: BDAG
  rationale: βαπτίζω se traduce con el término establecido «bautizó» en español. Eso preserva el valor narrativo del acto sin introducir una conclusión sobre el modo del bautismo que el versículo no formula explícitamente.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre objeto directo en español concuerda con el referente, el eunuco. «Lo» es la forma natural y concisa en este registro.
theological_decisions:
- issue: Si el versículo debe resolver el modo del bautismo
  english_pob_reading: Retain the directional phrase 'went down into the water' and the verb 'baptized' without adding interpretive language about immersion or sprinkling.
  chosen_spanish_reading: Conservar el movimiento «al agua» y el verbo «bautizó» sin añadir explicaciones sobre inmersión o aspersión.
  alternative_spanish_readings:
  - «dentro del agua» con una nota interpretativa más fuerte
  - «lo sumergió» como traducción explicativa de βαπτίζω
  - «al agua» pero con una nota que niegue cualquier implicación
  rationale: El griego afirma que ambos descendieron hacia el agua y que Felipe lo bautizó. La traducción debe preservar esos datos, manteniendo la tensión lexical sobre el modo sin resolverla confesionalmente ni debilitar la dirección expresada por εἰς.
  doctrine_reference: 'Principio de traducción: preservar la tensión textual y no imponer una conclusión denominacional cuando el griego no la formula de manera inequívoca.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; el texto inglés final fue verificado como estable y de alta concordancia, así que la propuesta española sigue de cerca esas decisiones léxicas sin introducir ajustes doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Bautizó» se conserva como término técnico establecido, en paralelo al inglés «baptized».
  - «Eunuco» se traduce de forma consistente con el uso narrativo del pasaje.
  - La nota al pie marca solo la alternativa preposicional relevante y no reinterpreta el acto bautismal.
