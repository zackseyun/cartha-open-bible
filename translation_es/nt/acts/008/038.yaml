revisions:
- from: Y mandó detener el carro[a], y ambos, Felipe y el eunuco, descendieron al agua, y lo bautizó.
  to: Y mandó que se detuviera la carroza, y ambos, Felipe y el eunuco, descendieron al agua[a], y lo bautizó.
  rationale: Se revisa para alinear mejor el español con la evidencia fuente y el expediente POB. La corrección principal es restablecer en el texto una formulación que exprese mejor el movimiento de εἰς sin sobreinterpretar el modo del bautismo. También se mejora la naturalidad de la primera cláusula con «mandó que se detuviera la carroza». Aunque «descendieron al agua» sigue siendo algo menos fuerte que «entraron en el agua», en conjunto, con la nota, preserva mejor la dirección que el borrador original y mantiene una lectura eclesialmente neutral.
  reviewer_model: gpt-5.4
