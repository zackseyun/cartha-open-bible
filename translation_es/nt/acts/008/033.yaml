translation:
  language: es
  text: En su humillación, la justicia[a] le fue quitada[b]. ¿Quién contará su generación[c]? Porque su vida es quitada de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio»; el griego κρίσις puede significar también decisión o juicio judicial.
    reason: lexical_alternative
  - marker: b
    text: O «le fue retirada».
    reason: lexical_alternative
  - marker: c
    text: O «su descendencia» o «sus contemporáneos»; el griego «generación» preserva la ambigüedad de la cita de Isaías 53.
    reason: alternative_reading
lexical_decisions:
- source_word: ταπεινώσει
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - abatimiento
  - humillación
  lexicon: BDAG
  rationale: El sustantivo expresa una condición de abatimiento o humillación. «Humillación» comunica de forma natural la idea de degradación injusta y conserva el tono de Isaías 53 sin suavizar el sufrimiento.
- source_word: κρίσις
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: BDAG
  rationale: En este contexto pasivo de padecimiento, la idea no es solo una decisión judicial, sino la privación de un trato justo. «Justicia» mantiene la fuerza legal y moral de la frase en español.
- source_word: ἤρθη
  english_pob_choice: was taken away
  chosen_spanish: le fue quitada
  alternatives_spanish:
  - fue quitada
  - le fue retirada
  - le fue arrebatada
  lexicon: BDAG
  rationale: El pasivo de αἴρω indica remoción o privación. «Le fue quitada» expresa con naturalidad en español que algo le fue privado a él, conservando el sentido de pérdida.
- source_word: γενεὰν
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - descendencia
  - posteridad
  - contemporáneos
  lexicon: BDAG
  rationale: El término es semánticamente amplio y el texto de Isaías mantiene la ambigüedad. «Generación» preserva esa tensión interpretativa sin resolverla prematuramente.
- source_word: διηγήσεται
  english_pob_choice: will recount
  chosen_spanish: contará
  alternatives_spanish:
  - relatará
  - narrará
  - contará en detalle
  lexicon: BDAG
  rationale: El verbo significa relatar o narrar con detalle. «Contará» es breve, idiomático y funciona bien en la pregunta retórica del versículo.
- source_word: αἴρεται
  english_pob_choice: is taken
  chosen_spanish: es quitada
  alternatives_spanish:
  - es tomada
  - es removida
  - es retirada
  lexicon: BDAG
  rationale: El presente pasivo conserva un matiz de acción en curso. En español, «es quitada» comunica la remoción de manera clara y mantiene la repetición verbal con «le fue quitada».
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - tierra
  - suelo
  - mundo
  lexicon: BDAG
  rationale: En la expresión «de la tierra», «tierra» es la opción más natural y reproduce bien el idioma bíblico sin cargar el sentido más allá de la fuente.
- source_word: ζωὴ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  - existencia
  lexicon: BDAG
  rationale: El sentido es la vida física de la persona, en concordancia con el contexto de muerte del Siervo. «Vida» es la equivalencia directa y más transparente.
theological_decisions:
- issue: Ambigüedad de «su generación»
  english_pob_reading: Retain the formally ambiguous 'his generation' in the main text.
  chosen_spanish_reading: Mantener «su generación» en el texto principal.
  alternative_spanish_readings:
  - su descendencia
  - sus contemporáneos
  rationale: La frase de Isaías 53 es interpretativamente difícil y puede referirse a descendencia, contemporáneos o al conjunto de su época. Se preserva la ambigüedad para no resolver una tensión que el texto no resuelve explícitamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it).
- issue: Sentido de κρίσις
  english_pob_reading: Render as 'justice' rather than 'judgment.'
  chosen_spanish_reading: Traducir como «justicia» y no como «juicio».
  alternative_spanish_readings:
  - juicio
  - sentencia
  rationale: Aquí el énfasis está en que se le negó un trato justo. «Justicia» expresa mejor la privación moral y judicial que solo «juicio», sin añadir una lectura doctrinal ajena al pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §6.
translation_notes:
  revision_awareness: El análisis auditado en inglés muestra acuerdo alto y no registra revisiones posteriores; por eso se ha conservado la misma solución semántica principal, ajustando la redacción al español natural sin perder la ambigüedad de «generación» ni la fuerza legal de κρίσις.
  spanish_consistency_notes:
  - Se mantiene «justicia» para κρίσις, en línea con la decisión inglesa, evitando el calco rígido «juicio» en el cuerpo principal.
  - «Generación» conserva la ambigüedad heredada de Isaías 53 y del texto griego; no se explicita ninguna de las alternativas en el texto principal.
  - El orden y la puntuación se adaptan al español moderno, pero sin expandir el contenido más allá de la fuente.
  - Se evita «SEÑOR» o terminología tradicional no pertinente, porque el versículo no contiene el nombre divino ni su cita directa.
  - «Tierra» reproduce el valor idiomático de γῆς de manera natural en español bíblico contemporáneo.
