revisions:
- from: Porque muchos que tenían espíritus inmundos[a] salían, clamando con voz fuerte; y muchos paralíticos y cojos fueron sanados.
  to: Porque de muchos que tenían espíritus inmundos[a], estos salían gritando con voz fuerte; y muchos paralíticos y cojos fueron sanados.
  rationale: Se reestructuró la primera cláusula para eliminar la ambigüedad del sujeto y dejar claro que los espíritus inmundos son los que salían y gritaban. «De muchos que tenían» refleja mejor la relación del griego τῶν ἐχόντων, mientras que «estos salían» hace explícito el referente sin añadir contenido doctrinal nuevo. Se conservó el sentido del pie léxico, ajustando el texto principal a un español más claro y fiel.
