translation:
  language: es
  text: Porque de muchos que tenían espíritus inmundos[a], estos salían gritando con voz fuerte; y muchos paralíticos y cojos fueron sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clamando con voz fuerte»; el participio griego describe con más naturalidad a los espíritus inmundos al salir.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ γὰρ
  english_pob_choice: For many
  chosen_spanish: Porque muchos
  alternatives_spanish:
  - Pues muchos
  - Porque un gran número
  lexicon: BDAG
  rationale: γάρ expresa relación explicativa con lo anterior; en español, «Porque» conserva bien esa conexión. πολλοί se mantiene como «muchos» sin intensificar innecesariamente el cuantificador.
- source_word: τῶν ἐχόντων
  english_pob_choice: of those who had
  chosen_spanish: que tenían
  alternatives_spanish:
  - de los que tenían
  - de quienes tenían
  lexicon: BDAG
  rationale: La construcción de participio genitivo se vierte de manera natural en español como una relativa («que tenían»), manteniendo la referencia a las personas afectadas.
- source_word: πνεύματα ἀκάθαρτα
  english_pob_choice: unclean spirits
  chosen_spanish: espíritus inmundos
  alternatives_spanish:
  - espíritus impuros
  lexicon: BDAG
  rationale: «Inmundos» refleja el uso bíblico y narrativo de πνεύματα ἀκάθαρτα en contextos de opresión demoníaca; «impuros» es posible, pero menos idiomático en español bíblico.
- source_word: βοῶντα φωνῇ μεγάλῃ
  english_pob_choice: crying out with a loud voice
  chosen_spanish: clamando con voz fuerte
  alternatives_spanish:
  - gritando con voz fuerte
  - clamando a gran voz
  lexicon: BDAG
  rationale: El participio describe la acción al salir; «clamando» comunica bien el grito/clamor y «con voz fuerte» conserva el valor instrumental de φωνῇ μεγάλῃ sin forzar una estructura poco natural. Se evita «a gran voz» por sonar más tradicional que necesario, aunque sería viable.
- source_word: ἐξήρχοντο
  english_pob_choice: they came out
  chosen_spanish: salían
  alternatives_spanish:
  - salían fuera
  - salían de ellos
  lexicon: BDAG
  rationale: El imperfecto se expresa de forma natural con «salían», que preserva el aspecto de acción en curso dentro de la narración. El contexto de expulsión/exorcismo hace claro el movimiento de salida.
- source_word: παραλελυμένοι
  english_pob_choice: who were paralyzed
  chosen_spanish: paralíticos
  alternatives_spanish:
  - que estaban paralizados
  - los que estaban paralizados
  lexicon: BDAG
  rationale: El participio perfecto pasivo denota una condición resultante; «paralíticos» comunica la condición de manera breve y clara en español. La alternativa más explícita es posible, pero menos concisa.
- source_word: χωλοὶ
  english_pob_choice: lame
  chosen_spanish: cojos
  alternatives_spanish:
  - lisiados
  - cojos
  lexicon: BDAG
  rationale: «Cojos» es el equivalente común y directo de χωλός en este contexto físico de dificultad para caminar. «Lisiados» sería más general, pero menos preciso aquí.
- source_word: ἐθεραπεύθησαν
  english_pob_choice: were healed
  chosen_spanish: fueron sanados
  alternatives_spanish:
  - fueron curados
  - fueron sanados
  lexicon: BDAG
  rationale: θεραπεύω en este contexto de milagro de sanidad se traduce naturalmente como «sanar»; el pasivo español mantiene el hecho de la sanidad sin explicitar el agente en la cláusula.
theological_decisions:
- issue: Referente de «clamando» y de la salida
  english_pob_reading: The unclean spirits are the ones crying out with a loud voice and coming out of the afflicted people.
  chosen_spanish_reading: Los espíritus inmundos son los que salen, clamando con voz fuerte, de las personas afectadas.
  alternative_spanish_readings:
  - Las personas poseídas son las que claman mientras los espíritus salen.
  - Los espíritus inmundos salen de las personas mientras estas claman en voz fuerte.
  rationale: El participio neutro plural βοῶντα concuerda naturalmente con πνεύματα ἀκάθαρτα, de modo que el grito se atribuye a los espíritus, no a las personas. El español mantiene la misma lectura sin necesidad de reordenar de forma que oscurezca el sujeto.
  doctrine_reference: Exorcismos en los Evangelios y Hechos; lectura gramatical del participio concordante.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la auditoría inglesa revisó la frase para hacer más clara la referencia de los espíritus inmundos como sujetos que claman y salen. En español se preserva esa claridad sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usó «espíritus inmundos» de manera consistente con el registro bíblico del pasaje y con el valor de πνεύματα ἀκάθαρτα.
  - Se prefirió una sintaxis española natural («salían, clamando…») que conserva el orden de acciones del griego sin mecanicismo.
  - Se optó por «sanados» en lugar de «curados» para mantener el tono habitual de sanidad milagrosa en Hechos.
