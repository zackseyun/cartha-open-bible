    rationale: En el griego, los que «salían» son los espíritus inmundos, no las personas. La redacción española actual hace que el sujeto aparente de «salían» sean «muchos» (las personas), lo cual desfigura el sentido.
  - severity: medium
    issue: La primera cláusula no refleja con suficiente claridad el valor partitivo de τῶν ἐχόντων
    rationale: «Muchos que tenían...» es posible, pero en esta construcción, «de los que tenían» o una reformulación equivalente ayuda a expresar que de entre las personas afectadas salían los espíritus.
  - severity: low
    issue: «clamando con voz fuerte» es entendible, pero menos idiomático que «gritando a gran voz» o «gritando con voz fuerte»
    rationale: No es incorrecto, y el pie ya preserva la alternativa. El problema principal no es léxico sino de claridad sintáctica.
  revised_spanish_text: Porque de muchos que tenían espíritus inmundos[a], estos salían gritando con voz fuerte; y muchos paralíticos y cojos fueron sanados.
