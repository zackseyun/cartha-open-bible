translation:
  language: es
  text: 'Entonces el eunuco respondió a Felipe y dijo[a]: «Te ruego, ¿de quién dice esto el profeta? ¿De sí mismo o de algún otro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te suplico». La expresión griega transmite una petición respetuosa y puede llevar un matiz de mayor urgencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - le respondió
  lexicon: BDAG
  rationale: El participio aoristo funciona idiomáticamente con el verbo de habla siguiente. En español, «respondió» comunica la función discursiva de manera natural y precisa sin cargar el texto con un participio artificial.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo, no contraste fuerte. «Entonces» conserva la progresión de la escena de forma natural en español.
- source_word: εὐνοῦχος
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial
  lexicon: BDAG
  rationale: El sustantivo designa específicamente a un eunuco; no hay razón contextual para generalizarlo como «oficial». Mantener «eunuco» preserva el término y la identidad del personaje.
- source_word: τῷ Φιλίππῳ
  english_pob_choice: Philip
  chosen_spanish: a Felipe
  alternatives_spanish:
  - Felipe
  lexicon: BDAG
  rationale: 'El dativo marca destinatario de la respuesta. En español es natural explicitar la preposición con el verbo de habla: «respondió a Felipe».'
- source_word: Δέομαί σου
  english_pob_choice: I ask you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Te pido
  - Te suplico
  - Te imploro
  lexicon: BDAG
  rationale: δέομαι expresa una petición respetuosa y puede tener mayor intensidad que un simple «pedir». «Te ruego» conserva el tono deferente y la urgencia potencial sin sonar excesivo.
- source_word: περὶ τίνος
  english_pob_choice: about whom
  chosen_spanish: ¿de quién
  alternatives_spanish:
  - ¿sobre quién
  - ¿acerca de quién
  lexicon: BDAG
  rationale: Con περί + genitivo, la pregunta trata del referente. «¿De quién?» suena idiomático en español y reproduce el alcance interrogativo sin calco pesado.
- source_word: ὁ προφήτης
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Isaías
  lexicon: BDAG
  rationale: El texto griego dice solo «el profeta». Aunque el contexto apunta a Isaías, el español debe conservar la forma del original y no especificar más de lo que el versículo dice.
- source_word: λέγει τοῦτο
  english_pob_choice: say this
  chosen_spanish: dice esto
  alternatives_spanish:
  - habla de esto
  - se refiere a esto
  lexicon: BDAG
  rationale: «Dice esto» sigue de cerca el objeto directo del griego y mantiene la referencia al pasaje recién leído.
- source_word: περὶ ἑαυτοῦ
  english_pob_choice: about himself
  chosen_spanish: de sí mismo
  alternatives_spanish:
  - acerca de sí mismo
  lexicon: BDAG
  rationale: La construcción reflexiva se expresa con naturalidad en español como «de sí mismo», conservando la referencia al posible sujeto del texto profético.
- source_word: περὶ ἑτέρου τινός
  english_pob_choice: about someone else
  chosen_spanish: o de algún otro
  alternatives_spanish:
  - o de otra persona
  - o de alguien más
  lexicon: BDAG
  rationale: ἕτερος τις significa «otro/alguien distinto». «Algún otro» mantiene el contraste con «sí mismo» y reproduce el indefinido del griego sin sobredeterminar la identidad.
translation_notes:
  revision_awareness: El texto griego y el auditorio inglés están en alta concordancia; se conservó la estructura interrogativa y la alternancia entre petición respetuosa y posible urgencia reflejada en la nota inglesa. No se añadieron interpretaciones contextuales ajenas al versículo.
  spanish_consistency_notes:
  - Se mantuvo «eunuco» conforme al valor léxico específico del griego.
  - Se prefirió «Te ruego» para δέομαι, con nota alternativa para reflejar la intensidad posible del término.
  - Se conservó la forma indefinida «algún otro» para ἕτερου τινός, evitando precisar indebidamente.
  - La pregunta indirecta se expresó con un español natural sin perder el paralelismo «de sí mismo / de algún otro».
