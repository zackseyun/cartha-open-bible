translation:
  language: es
  text: Entonces Felipe abrió la boca[a] y, comenzando desde esta Escritura[b], le anunció las buenas nuevas acerca de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzó a hablar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «comenzando con esta Escritura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  lexicon: BDAG
  rationale: Marca progreso narrativo. «Entonces» comunica ese avance de manera natural en español sin añadir matiz explicativo fuerte.
- source_word: ἀνοίξας ... τὸ στόμα αὐτοῦ
  english_pob_choice: opened his mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - comenzó a hablar
  - habló
  lexicon: BDAG
  rationale: Es un giro idiomático de apertura solemne para comenzar a hablar. Conservar la imagen verbal respeta la forma griega y mantiene el tono narrativo.
- source_word: ἀρξάμενος ἀπὸ τῆς γραφῆς ταύτης
  english_pob_choice: beginning from this Scripture
  chosen_spanish: comenzando desde esta Escritura
  alternatives_spanish:
  - comenzando con esta Escritura
  - partiendo de esta Escritura
  lexicon: BDAG
  rationale: ἀπό señala punto de partida; «desde» reproduce bien ese valor. «Escritura» refleja γραφή como escrito sagrado, no solo un pasaje cualquiera.
- source_word: γραφῆς
  english_pob_choice: Scripture
  chosen_spanish: Escritura
  alternatives_spanish:
  - Escrito
  - pasaje de la Escritura
  lexicon: BDAG
  rationale: En contexto neotestamentario, γραφή remite a la Escritura sagrada. Mantener «Escritura» conserva ese sentido reconocido.
- source_word: εὐηγγελίσατο
  english_pob_choice: proclaimed the good news about
  chosen_spanish: anunció las buenas nuevas acerca de
  alternatives_spanish:
  - predicó
  - evangelizó acerca de
  lexicon: BDAG
  rationale: El verbo expresa anunciar la buena noticia. «Anunció las buenas nuevas» preserva el núcleo semántico en español sin sonar técnico o eclesiástico en exceso.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre dativo se expresa naturalmente en español con clítico dativo, manteniendo la referencia directa al oficial etíope sin añadir un sustantivo ausente.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - al Señor Jesús
  - el mensaje acerca de Jesús
  lexicon: BDAG
  rationale: En esta construcción, Jesús es el contenido central de la proclamación. «Jesús» mantiene el foco del texto griego sin explicitar de más.
theological_decisions:
- issue: Sentido de εὐηγγελίσατο αὐτῷ τὸν Ἰησοῦν
  english_pob_reading: Philip proclaimed the good news about Jesus, making Jesus the content and center of the gospel proclamation.
  chosen_spanish_reading: Felipe le anunció las buenas nuevas acerca de Jesús, presentando a Jesús como el contenido y centro del anuncio.
  alternative_spanish_readings:
  - Felipe predicó a Jesús
  - Felipe le evangelizó a Jesús
  rationale: El griego permite entender que Jesús es el contenido del evangelio proclamado. La forma elegida conserva esa relación sin reducirla a una fórmula ni volverla ambigua en español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; fidelidad a la sintaxis y claridad idiomática en español.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del texto base en inglés: no se registraron cambios posteriores que afecten la lectura de este versículo. La redacción española sigue la misma decisión auditada sobre el inicio narrativo, el punto de partida escritural y el contenido cristológico del anuncio.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde hubiera nombre divino explícito; aquí no aparece.
  - Se evitó «Cristo» porque el texto griego usa Ἰησοῦν, no un título cristológico en esta posición.
  - «Buenas nuevas» conserva la fuerza evangelística de εὐαγγελίζω sin sustituirla por una formulación eclesiástica más cargada.
  - La puntuación conserva el ritmo narrativo y la coordinación del griego, con una pausa natural en español.
