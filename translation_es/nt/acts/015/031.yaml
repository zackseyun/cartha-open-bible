translation:
  language: es
  text: Y al leerla, se alegraron por su aliento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «se alegraron por el aliento», con παρακλήσει también posible en el sentido de «exhortación» o «consuelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνόντες
  english_pob_choice: when they had read it
  chosen_spanish: al leerla
  alternatives_spanish:
  - cuando la hubieron leído
  - después de leerla
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, "al leerla" expresa con naturalidad esa secuencia sin añadir más peso del que da el griego. El objeto está implícito por el contexto inmediato, como en el inglés POB.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave. "Y" conserva la conexión narrativa sin forzar contraste ni una relación temporal más fuerte de la que el texto exige.
- source_word: ἐχάρησαν
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - estuvieron contentos
  lexicon: BDAG
  rationale: El verbo χαίρω en aoristo tiene sentido activo. En español, "se alegraron" comunica bien la reacción emocional y suena natural y sobrio; "se regocijaron" sería más intensivo y menos corriente.
- source_word: ἐπὶ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con dativo, ἐπί expresa base o causa del gozo. "Por" es la forma más natural en español para esta relación causal y evita una construcción pesada.
- source_word: τῇ παρακλήσει
  english_pob_choice: its encouragement
  chosen_spanish: su exhortación
  alternatives_spanish:
  - su consuelo
  - su ánimo
  - su aliento
  lexicon: BDAG
  rationale: παράκλησις puede abarcar exhortación, consuelo o aliento. En este contexto, el contenido de la carta fortalece y anima a los creyentes; "exhortación" conserva mejor la amplitud de una palabra que no debe reducirse solo a consuelo. Se mantiene el valor relacional con el posesivo "su", como en el inglés POB, dejando abierta la referencia al mensaje recibido.
translation_notes:
  revision_awareness: La versión inglesa de referencia no presenta revisiones aplicadas ni cambios pendientes; el pasaje muestra alta concordancia entre auditoría y texto base.
  spanish_consistency_notes:
  - Se evitó "Cristo"/"Mesías" porque el versículo no contiene esa referencia.
  - Se prefirió "exhortación" como equivalente principal de παράκλησις, pero se dejó nota de alternativas para preservar la tensión semántica documentada en el audit trail.
  - '"Al leerla" conserva la dependencia contextual del objeto implícito sin añadirlo explícitamente en español.'
