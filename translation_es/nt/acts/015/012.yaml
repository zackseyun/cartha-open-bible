    changes_summary: 'Reordered the final clause to reflect the Greek more accurately: God did the signs and wonders among the Gentiles through Barnabas and Paul. Also removed ''all that'' to avoid making ''signs and wonders'' appositional to a broader unspecified set of acts not clearly expressed in English.'
translation:
  language: es
  text: Entonces toda la asamblea guardó silencio, y escuchó a Bernabé y a Pablo mientras relataban las señales y prodigios que Dios había hecho entre los gentiles[a] por medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “entre las naciones”. Aquí ἔθνεσιν se refiere específicamente a los gentiles en el contexto del concilio de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐσίγησεν
  english_pob_choice: fell silent
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - se quedó en silencio
  - enmudeció
  - se calló
  lexicon: BDAG
  rationale: El aoristo ingrésivo expresa el paso a la quietud; en español, 'guardó silencio' comunica bien ese cambio de estado en un registro natural y digno, sin endurecerlo con una literalidad torpe.
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: the whole assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la multitud
  - todo el conjunto
  - todo el pueblo reunido
  lexicon: BDAG
  rationale: El contexto es la reunión de Jerusalén, así que 'asamblea' refleja mejor el carácter deliberativo del grupo que 'multitud'.
- source_word: ἤκουον
  english_pob_choice: they listened
  chosen_spanish: escuchaban
  alternatives_spanish:
  - oyeron
  - estaban escuchando
  - prestaban atención
  lexicon: BDAG
  rationale: El imperfecto indica atención continua; 'escuchaban' conserva esa duración mejor que un simple 'oyeron'.
- source_word: ἐξηγουμένων
  english_pob_choice: as they related
  chosen_spanish: mientras relataban
  alternatives_spanish:
  - mientras explicaban
  - mientras narraban
  - al dar cuenta de
  lexicon: BDAG
  rationale: El participio describe una exposición o recuento detallado. 'Relataban' evita sugerir una explicación interpretativa que el verbo no exige.
- source_word: ὅσα
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - todo lo que
  - cuánto
  - las cosas que
  lexicon: BDAG
  rationale: En esta construcción interrogativo-indefinida, 'qué' funciona de manera natural en español para introducir el contenido narrado, sin ampliar indebidamente el alcance.
- source_word: ἐποίησεν ὁ θεός
  english_pob_choice: God had done
  chosen_spanish: había hecho Dios
  alternatives_spanish:
  - Dios hizo
  - Dios había realizado
  - Dios había obrado
  lexicon: BDAG
  rationale: Se mantiene a Dios como sujeto agente directo. El pluscuamperfecto ayuda a situar los hechos referidos antes del momento del relato, como en la opción inglesa revisada.
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - señales milagrosas y prodigios
  - milagros y prodigios
  lexicon: BDAG
  rationale: '''Señales y prodigios'' es una pareja reconocible y fiel al binomio lucano. Se evita añadir ''milagros'' para no introducir una interpretación no expresada por el griego.'
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  - entre los no judíos
  lexicon: BDAG
  rationale: En el contexto de Hechos 15 el referente son claramente los no judíos. 'Gentiles' conserva esa fuerza contextual y la terminología técnica habitual del pasaje.
- source_word: δι’ αὐτῶν
  english_pob_choice: through them
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - a través de ellos
  - mediante ellos
  - por ellos
  lexicon: BDAG
  rationale: La preposición expresa instrumentación. 'Por medio de ellos' deja claro que Dios es el agente principal y Bernabé y Pablo los instrumentos de su obra.
theological_decisions:
- issue: Agencia divina en los signos y prodigios
  english_pob_reading: God is presented as the one who performed the signs and wonders, working through Barnabas and Paul.
  chosen_spanish_reading: Dios es presentado como quien hizo las señales y prodigios, obrando por medio de Bernabé y Pablo.
  alternative_spanish_readings:
  - Bernabé y Pablo hicieron las señales y prodigios como agentes principales
  - las señales y prodigios fueron atribuidos principalmente a Bernabé y Pablo
  rationale: El sujeto explícito del verbo es Dios, y δι’ αὐτῶν marca a Bernabé y Pablo como instrumentos. La traducción preserva esa prioridad teológica sin borrar la participación real de los apóstoles.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: mantiene el énfasis en que Dios hizo las señales y prodigios entre los gentiles por medio de Bernabé y Pablo, y evita ampliar el alcance con expresiones como ''todo lo que'' que no están exigidas por el griego. También conserva la relación temporal y discursiva del relato con un imperfecto español natural (''escuchaban'', ''relataban'').'
  spanish_consistency_notes:
  - Se usó 'Dios' como traducción de θεός y se mantuvo como sujeto de la acción principal.
  - Se prefirió 'gentiles' para ἔθνη en coherencia con el contexto de Hechos 15 y con el tratamiento del expediente inglés.
  - '''Señales y prodigios'' conserva el par fijo σημεῖα καὶ τέρατα sin sobretraducirlo.'
  - '''Por medio de ellos'' preserva la instrumentalidad de δι’ αὐτῶν y la prioridad divina en la acción.'
  - Se eligió 'asamblea' para πλῆθος por adecuación contextual al concilio de Jerusalén.
