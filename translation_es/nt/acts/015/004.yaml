translation:
  language: es
  text: Al llegar a Jerusalén, fueron recibidos por la iglesia, por los apóstoles y por los ancianos, e informaron todo lo que Dios había hecho con ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de ellos» o «entre ellos». El griego dice literalmente «con ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: παραγενόμενοι
  english_pob_choice: when they arrived
  chosen_spanish: al llegar
  alternatives_spanish:
  - cuando llegaron
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal previa a los verbos principales. «Al llegar» expresa bien esa relación en español sin perder naturalidad.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: in Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: BDAG
  rationale: Con un verbo de llegada, el español suele preferir el movimiento hacia el lugar. La forma «a Jerusalén» conserva mejor el valor de dirección del griego.
- source_word: παρεδέχθησαν
  english_pob_choice: they were welcomed
  chosen_spanish: fueron recibidos
  alternatives_spanish:
  - fueron acogidos
  - fueron aceptados
  lexicon: BDAG
  rationale: El pasivo de παραδέχομαι indica recepción hospitalaria. «Fueron recibidos» es fiel y natural; «acogidos» sería posible, pero algo más interpretativo.
- source_word: ἀπὸ τῆς ἐκκλησίας καὶ τῶν ἀποστόλων καὶ τῶν πρεσβυτέρων
  english_pob_choice: by the church and the apostles and the elders
  chosen_spanish: por la iglesia, por los apóstoles y por los ancianos
  alternatives_spanish:
  - por la iglesia, los apóstoles y los ancianos
  - de parte de la iglesia, de los apóstoles y de los ancianos
  lexicon: BDAG
  rationale: Aunque ἀπό puede significar «de/desde», con un pasivo de recepción marca fuente o agencia. «Por» comunica mejor en español que fueron ellos quienes los recibieron. «Iglesia» mantiene el sentido de ἐκκλησία como comunidad cristiana; «ancianos» preserva el cargo sin imponer terminología denominacional.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία designa la comunidad cristiana reunida. «Iglesia» es la equivalencia más natural y reconocible en español.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - dirigentes
  lexicon: BDAG
  rationale: El término se refiere a líderes reconocidos de la comunidad, no solo a personas mayores. «Ancianos» preserva la referencia institucional sin cargarla con una opción confesional específica.
- source_word: ἀνήγγειλάν τε
  english_pob_choice: and they reported
  chosen_spanish: y les contaron
  alternatives_spanish:
  - y reportaron
  - y anunciaron
  lexicon: BDAG
  rationale: El verbo significa dar noticia o relatar. «Les contaron» funciona bien en español y mantiene el carácter de informe; el objeto indirecto está implícito en el contexto de la recepción por la comunidad y sus líderes.
- source_word: ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - cuanto
  lexicon: BDAG
  rationale: La expresión introduce el contenido del informe. «Todo lo que» es natural y reproduce bien el alcance total del pronombre relativo.
- source_word: ὁ θεὸς ἐποίησεν
  english_pob_choice: God had done
  chosen_spanish: Dios había hecho
  alternatives_spanish:
  - Dios había realizado
  - Dios había obrado
  lexicon: BDAG
  rationale: El aoristo se vierte con pluscuamperfecto porque las acciones ya habían ocurrido antes del relato. «Había hecho» es amplio y corresponde bien a ποιέω.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - por medio de ellos
  - entre ellos
  lexicon: BDAG
  rationale: Con μετά + genitivo, el griego dice literalmente «con ellos». Se conserva esa formulación para no resolver de antemano la tensión teológica entre la acción divina y la participación humana.
theological_decisions:
- issue: Relación entre la acción de Dios y la participación de los misioneros en μετ’ αὐτῶν
  english_pob_reading: God had done with them
  chosen_spanish_reading: Dios había hecho con ellos
  alternative_spanish_readings:
  - Dios había hecho por medio de ellos
  - Dios había hecho entre ellos
  rationale: La frase griega es deliberadamente abierta. «Con ellos» mantiene a Dios como actor principal y, a la vez, conserva la asociación de Pablo y Bernabé con la obra divina sin forzar una interpretación instrumental o local específica.
  doctrine_reference: Preservar la tensión textual sobre la agencia divina y humana.
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto del análisis auditado y no requiere cambios textuales adicionales respecto del sentido base. Se mantuvo la ambigüedad teológica de μετ’ αὐτῶν mediante «con ellos», como en el registro inglés.
  spanish_consistency_notes:
  - Se usa «iglesia» para ἐκκλησία y «ancianos» para πρεσβυτέρων, en línea con el uso eclesial del pasaje.
  - Se evita «SEÑOR» porque aquí aparece θεός, que se traduce «Dios».
  - Se mantiene «con ellos» para no sustituir la relación gramatical por una explicación interpretativa.
  - 'La puntuación coordina claramente los tres destinatarios de la recepción: la iglesia, los apóstoles y los ancianos.'
