review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: llegada a Jerusalén, recepción por la iglesia/apóstoles/ancianos, y reporte de lo que Dios hizo. Sin embargo, «y les contaron» añade explícitamente un objeto indirecto no presente en el griego; aunque inferible por contexto, es más fiel mantener un verbo sin ese complemento. Además, la nota sobre Jerusalén no preserva la nota de auditoría inglesa, que en realidad documenta alternativas para μετ’ αὐτῶν, no para εἰς Ἱεροσόλυμα.'
  spanish_quality_summary: El español es claro y natural. «Al llegar a Jerusalén» y «fueron recibidos» funcionan bien. No obstante, «les contaron» suena más coloquial y menos formal que el contexto de informe; «informaron» o «reportaron» encaja mejor y evita añadir destinatario. También conviene reemplazar la nota actual por una nota en «con ellos», ya que esa expresión puede sonar algo abierta en español y requiere la misma aclaración que en inglés.
  glossary_alignment: «Dios», «iglesia» y «ancianos» están alineados con las pautas del proyecto. No hay conflictos con Yahvé/Mesías/etc. La decisión teológica de conservar «con ellos» para μετ’ αὐτῶν está bien encaminada, pero debe reflejarse también en la nota correcta.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en Jerusalén en lugar de en «con ellos».
    rationale: La evidencia auditada en inglés documenta una alternativa de traducción para μετ’ αὐτῶν («with/through/among them»), no para εἰς Ἱεροσόλυμα. La nota actual desvía la atención a una cuestión no destacada por la auditoría y omite la ambigüedad teológica/lexical realmente relevante.
  - severity: medium
    issue: «y les contaron» añade un objeto indirecto no expresado en el griego.
    rationale: Aunque el contexto implica a quién reportaron, ἀνήγγειλαν simplemente expresa que informaron o relataron. En una revisión fuente-orientada conviene no introducir ese complemento si no es necesario.
  - severity: low
    issue: Registro algo coloquial en «contaron».
    rationale: El verbo es comprensible, pero «informaron» preserva mejor el tono de reporte formal presente en ἀνήγγειλαν.
  revised_spanish_text: Al llegar a Jerusalén, fueron recibidos por la iglesia, por los apóstoles y por los ancianos, e informaron todo lo que Dios había hecho con ellos[a].
  revised_footnotes:
  - marker: a
    text: O «por medio de ellos» o «entre ellos». El griego dice literalmente «con ellos».
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación y el contenido de la nota al pie para alinearla con la decisión lexical y teológica documentada para μετ’ αὐτῶν. También se reemplaza «les contaron» por «informaron» para evitar añadir un destinatario no explícito en el griego y para mantener un tono más formal y fiel al contexto.
