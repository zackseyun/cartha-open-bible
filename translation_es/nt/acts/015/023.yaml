revisions:
- from: 'Habiendo escrito por medio de su propia mano[a]: «Los apóstoles y los hermanos mayores[b], a los hermanos de entre los gentiles en Antioquía, Siria y Cilicia, saludos»[c].'
  to: 'Habiendo escrito por su mano[a]: «Los apóstoles y los hermanos ancianos[b], a los hermanos[c] de entre los gentiles en Antioquía y Siria y Cilicia, saludos».'
  rationale: 'La revisión corrige dos puntos principales: (1) reemplaza «por medio de su propia mano» por «por su mano», que conserva el idiomático griego sin añadir «propia»; y (2) sustituye «hermanos mayores» por «hermanos ancianos», una opción más inteligible en español eclesial y más fiel a la lectura appositiva documentada por la auditoría inglesa. También se reubica la nota inclusiva sobre «hermanos» en el término pertinente dentro del texto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:09:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta la estructura general del versículo y conserva bien «Habiendo escrito», «apóstoles», «de entre los gentiles» y «saludos». Sin embargo, «por medio de su propia mano» no refleja bien el idiomatismo griego διὰ χειρὸς αὐτῶν y añade «propia», ausente del texto. Además, «hermanos mayores» en español se entiende naturalmente como hermanos de más edad dentro de una familia, y no comunica con claridad la fuerza de πρεσβύτεροι ἀδελφοί como «hermanos ancianos» o «hermanos mayores/dirigentes»; en este contexto resulta mejor «los hermanos ancianos» para preservar la lectura appositiva sin convertirla en un grupo separado de «ancianos».
  spanish_quality_summary: 'El español es mayormente claro, pero «por medio de su propia mano» suena forzado e incluso físicamente literal de manera extraña. «Hermanos mayores» es natural en español cotidiano, pero aquí induce una lectura familiar y puede desviar del sentido eclesial. También conviene mantener la puntuación del saludo con mayor fluidez: «en Antioquía y Siria y Cilicia» reproduce mejor la coordinación fuente que la coma en serie, aunque esto es secundario. El texto revisado suena más natural y fiel.'
  glossary_alignment: No hay conflictos con los términos doctrinales principales del proyecto. Se mantiene «hermanos» para ἀδελφοί con nota inclusiva, en línea con la política. «Apóstoles» y «gentiles» están alineados. La revisión evita un calco español poco idiomático para διὰ χειρὸς αὐτῶν y mejora la representación de πρεσβύτεροι ἀδελφοί sin romper la decisión auditada de no leer tres grupos separados.
  issues:
  - severity: high
    issue: «por medio de su propia mano» añade un matiz no presente y suena antinatural
    rationale: διὰ χειρὸς αὐτῶν significa literalmente «por su mano» y funciona idiomáticamente como agencia/mediación («por medio de ellos», «enviada por ellos»). «Propia» no está en el griego, y la frase española propuesta resulta rígida.
  - severity: high
    issue: «los hermanos mayores» comunica mal πρεσβύτεροι ἀδελφοί en español
    rationale: Aunque intenta seguir la lectura «elder brothers», en español normalmente significa hermanos de más edad dentro de una familia. Eso oscurece el contexto eclesial y puede malinterpretarse. «Los hermanos ancianos» preserva mejor la aposición y el matiz de mayores/ancianos dentro de la comunidad.
  - severity: low
    issue: La nota b repite una justificación válida, pero la alternativa española principal puede afinarse
    rationale: La nota refleja bien la discusión gramatical; solo conviene armonizarla con la nueva formulación principal para no dejar «hermanos mayores» como opción preferida.
  revised_spanish_text: 'Habiendo escrito por su mano[a]: «Los apóstoles y los hermanos ancianos[b], a los hermanos[c] de entre los gentiles en Antioquía y Siria y Cilicia, saludos».'
  revised_footnotes:
  - marker: a
    text: 'O más idiomáticamente: «por medio de ellos» o «enviada por medio de ellos»; el griego dice literalmente: «por su mano».'
    reason: lexical_alternative
  - marker: b
    text: 'O «los ancianos, hermanos»; muchas traducciones entienden «los apóstoles y los ancianos, hermanos», pero el griego se lee más naturalmente como una sola expresión: «los hermanos ancianos».'
    reason: alternative_reading
  - marker: c
    text: «Hermanos» aquí puede referirse inclusivamente a los creyentes, es decir, a toda la comunidad, incluidas las mujeres.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos principales: (1) reemplaza «por medio de su propia mano» por «por su mano», que conserva el idiomático griego sin añadir «propia»; y (2) sustituye «hermanos mayores» por «hermanos ancianos», una opción más inteligible en español eclesial y más fiel a la lectura appositiva documentada por la auditoría inglesa. También se reubica la nota inclusiva sobre «hermanos» en el término pertinente dentro del texto.'
