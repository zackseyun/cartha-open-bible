base_translation:
  language: en
  yaml_path: translation/nt/acts/015/023.yaml
  text: 'Having written by their hand: “The apostles and the elder brothers[a], to the brothers from among the Gentiles in Antioch and Syria and Cilicia[c][b], greetings.”'
  footnotes:
