translation:
  language: es
  text: 'Habiendo escrito por su mano[a]: «Los apóstoles y los hermanos ancianos[b], a los hermanos[c] de entre los gentiles en Antioquía y Siria y Cilicia, saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «por medio de ellos» o «enviada por medio de ellos»; el griego dice literalmente: «por su mano».'
    reason: lexical_alternative
  - marker: b
    text: 'O «los ancianos, hermanos»; muchas traducciones entienden «los apóstoles y los ancianos, hermanos», pero el griego se lee más naturalmente como una sola expresión: «los hermanos ancianos».'
    reason: alternative_reading
  - marker: c
    text: «Hermanos» aquí puede referirse inclusivamente a los creyentes, es decir, a toda la comunidad, incluidas las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: γράφψαντες
  english_pob_choice: Having written
  chosen_spanish: Habiendo escrito
  alternatives_spanish:
  - Después de escribir
  - Escribiendo
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa de redactar la carta; «Habiendo escrito» conserva esa relación antecedente sin volverla más libre de lo que permite el griego.
- source_word: διὰ χειρὸς αὐτῶν
  english_pob_choice: by their hand
  chosen_spanish: por medio de su propia mano
  alternatives_spanish:
  - por su mano
  - por medio de ellos
  lexicon: BDAG
  rationale: La frase idiomática expresa agencia o mediación. En español, «por medio de su propia mano» conserva la literalidad básica y sugiere que la carta fue enviada por sus mensajeros/representantes, sin perder claridad.
- source_word: ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  lexicon: BDAG
  rationale: «Apóstoles» es el equivalente directo y normal del término en este contexto de la iglesia de Jerusalén.
- source_word: πρεσβύτεροι ἀδελφοί
  english_pob_choice: the elder brothers
  chosen_spanish: los hermanos mayores
  alternatives_spanish:
  - los ancianos, hermanos
  - los ancianos y hermanos
  lexicon: BDAG
  rationale: 'El griego no añade una segunda partícula articulada antes de ἀδελφοί, de modo que la lectura más natural es apposicional: «ancianos/hermanos mayores». En español, «hermanos mayores» preserva esa relación, aunque suene menos técnico que «ancianos».'
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma léxica masculina plural del griego. En este saludo epistolar el término probablemente incluye a toda la comunidad creyente, pero el texto base sigue diciendo «hermanos».
- source_word: τοῖς ἐξ ἐθνῶν
  english_pob_choice: from among the Gentiles
  chosen_spanish: de entre los gentiles
  alternatives_spanish:
  - de los gentiles
  - que son gentiles
  lexicon: BDAG
  rationale: «De entre» reproduce bien ἐξ + genitivo con valor de procedencia/extracción desde un grupo mayor.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - saludar
  - regocijaos
  lexicon: BDAG
  rationale: En encabezamientos de carta, χαίρειν funciona como saludo epistolar fijo. «Saludos» es la equivalencia natural en español.
- source_word: κατὰ τὴν Ἀντιόχειαν καὶ Συρίαν καὶ Κιλικίαν
  english_pob_choice: in Antioch and Syria and Cilicia
  chosen_spanish: en Antioquía, Siria y Cilicia
  alternatives_spanish:
  - a través de Antioquía, Siria y Cilicia
  - por Antioquía, Siria y Cilicia
  lexicon: BDAG
  rationale: El valor distributivo/local de κατά con acusativo se vierte con «en», que resulta lo más natural para la dirección de la carta.
theological_decisions:
- issue: Sentido inclusivo de ἀδελφοί en el saludo
  english_pob_reading: brothers; may refer inclusively to fellow believers, that is, the whole community including women.
  chosen_spanish_reading: hermanos; puede referirse inclusivamente a los creyentes, es decir, a toda la comunidad, incluidas las mujeres.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se conserva el masculino plural del original en el texto principal, pero se explicita en nota que el saludo probablemente abarca a toda la comunidad creyente. Así no se borra la forma léxica del griego ni su posible alcance inclusivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación sintáctica de πρεσβύτεροι con ἀδελφοί
  english_pob_reading: the elder brothers; many translations take this as 'the apostles and the elders, brothers,' while the Greek most naturally reads 'the elder brothers.'
  chosen_spanish_reading: los hermanos mayores
  alternative_spanish_readings:
  - los ancianos, hermanos
  - los ancianos y hermanos
  rationale: La puntuación y la falta de un segundo artículo favorecen una lectura en aposición. La forma española mantiene esa tensión sin imponer de entrada la lectura más eclesiástica de «ancianos» como grupo separado.
  doctrine_reference: BDAG; auditoría gramatical del sintagma
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. También se ajustó la puntuación para anclar [a], [b] y [c] en el lugar correspondiente del enunciado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este texto.
  - Se prefirió «gentiles» para ἐξ ἐθνῶν, coherente con la terminología POB.
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en el griego de este versículo.
  - Se conservó el estilo epistolar con «saludos» para χαίρειν.
