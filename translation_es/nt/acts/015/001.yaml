review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: algunos hombres vinieron de Judea, enseñaban a los hermanos, y afirmaban que la circuncisión según la práctica mosaica era necesaria para la salvación. Sin embargo, dos elecciones debilitan la fidelidad óptimo-equivalente al expediente inglés y al matiz del griego: ''Si no'' es menos idiomático y preciso que ''A menos que'' para Ἐὰν μὴ, y ''uso de Moisés'' suena menos natural y menos claro que ''costumbre de Moisés'' para τῷ ἔθει τῷ Μωϋσέως.'
  spanish_quality_summary: El español es claro y comprensible, pero 'conforme al uso de Moisés' suena algo rígido y poco natural en registro bíblico contemporáneo. 'A menos que sean circuncidados según la costumbre de Moisés' mejora la fluidez, la dignidad y la legibilidad, y evita una construcción condicional más tosca. El resto del verso está bien formulado.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Ser salvos'' preserva correctamente la fuerza soteriológica de σωθῆναι. ''Hermanos'' con nota inclusiva sigue la política documentada. La revisión propuesta solo ajusta elecciones léxicas y sintácticas para mayor fidelidad y naturalidad: ἔθος -> ''costumbre'' y Ἐὰν μὴ -> ''A menos que''.'
  issues:
  - severity: medium
    issue: La frase 'Si no se circuncidan' no vierte de la mejor manera Ἐὰν μὴ.
    rationale: Aunque entendible, 'Si no' es menos idiomático en español para una condición exceptiva general. 'A menos que' refleja mejor el valor de 'unless' documentado en el POB inglés y la fuerza condicional de Ἐὰν μὴ.
  - severity: medium
    issue: '''Conforme al uso de Moisés'' es poco natural para τῷ ἔθει τῷ Μωϋσέως.'
    rationale: ἔθος en este contexto se entiende mejor como 'costumbre' o 'práctica establecida'. 'Uso' en español suena menos claro y menos eclesialmente legible. 'Según la costumbre de Moisés' es más fiel al expediente léxico y más natural.
  - severity: low
    issue: La pasiva refleja 'se circuncidan' funciona, pero 'sean circuncidados' se alinea mejor con el pasivo del griego en esta formulación revisada.
    rationale: No es un error grave, pero al pasar a 'A menos que', la forma 'sean circuncidados' suena más natural y explícita en español formal, manteniendo mejor el matiz pasivo de περιτμηθῆτε.
  revised_spanish_text: 'Y algunos hombres que habían bajado de Judea enseñaban a los hermanos[a]: «A menos que sean circuncidados según la costumbre[b] de Moisés, no pueden ser salvos».'
  revised_footnotes:
