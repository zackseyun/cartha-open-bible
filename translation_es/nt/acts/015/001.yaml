translation:
  language: es
  text: 'Y algunos hombres que habían bajado de Judea enseñaban a los hermanos[a]: «A menos que sean circuncidados según la costumbre[b] de Moisés, no pueden ser salvos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hermanos y hermanas'; el griego dice 'hermanos' y probablemente se refiere de manera inclusiva a la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O 'uso'; ἔθος puede significar una práctica establecida o una costumbre tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  lexicon: BDAG
  rationale: Conecta narrativamente la escena siguiente con una coordinación simple, sin añadir transición interpretativa.
- source_word: τινες
  english_pob_choice: some men
  chosen_spanish: algunos hombres
  alternatives_spanish:
  - algunas personas
  - ciertos hombres
  lexicon: BDAG
  rationale: Ἄνθρωποι/τινες aquí refiere a personas específicas; 'hombres' conserva el matiz masculino plural del griego sin generalizar indebidamente.
- source_word: κατελθόντες
  english_pob_choice: came down
  chosen_spanish: que habían bajado
  alternatives_spanish:
  - habiendo bajado
  - que bajaron
  lexicon: BDAG
  rationale: El participio aoristo de movimiento se expresa de forma natural en español con una relativa temporal; 'habían bajado' conserva el valor anterior al enseñar.
- source_word: ἀπὸ τῆς Ἰουδαίας
  english_pob_choice: from Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - desde Judea
  lexicon: BDAG
  rationale: La procedencia geográfica se expresa de manera directa con 'de Judea'; 'desde' también es posible, pero 'de' es más sobrio y fluido en este contexto narrativo.
- source_word: ἐδίδασκον
  english_pob_choice: were teaching
  chosen_spanish: enseñaban
  alternatives_spanish:
  - estaban enseñando
  - seguían enseñando
  lexicon: BDAG
  rationale: El imperfecto griego marca acción continua o reiterada; en español, el imperfecto simple 'enseñaban' comunica esa duración sin sobrecargar la frase.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se mantiene el plural masculino del griego, con sentido comunitario eclesial. El dativo de destinatario se vuelve objeto directo introducido con 'a' en español.
- source_word: Ἐὰν μὴ
  english_pob_choice: Unless
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  lexicon: BDAG
  rationale: La condición negativa se puede verter naturalmente como 'Si no' en español; 'A menos que' sería más idiomático en tono subestilizado, pero 'Si no' mantiene la estructura condicional inmediata.
- source_word: περιτμηθῆτε
  english_pob_choice: you are circumcised
  chosen_spanish: se circuncidan
  alternatives_spanish:
  - se hagan circuncidar
  - sean circuncidados
  lexicon: BDAG
  rationale: El griego usa pasivo subjuntivo. En español, la pasiva refleja 'se circuncidan' evita un giro forzado y conserva la idea de recibir la circuncisión.
- source_word: τῷ ἔθει τῷ Μωϋσέως
  english_pob_choice: according to the custom of Moses
  chosen_spanish: conforme al uso de Moisés
  alternatives_spanish:
  - según la costumbre de Moisés
  - conforme a la costumbre mosaica
  lexicon: BDAG
  rationale: ἔθος puede rendirse como 'costumbre' o 'uso'; aquí 'uso' conserva la idea de práctica establecida sin sonar excesivamente técnico. 'De Moisés' se mantiene de forma literal, sin expandir a una paráfrasis como 'transmitido por Moisés'.
- source_word: οὐ δύνασθε
  english_pob_choice: you cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no les es posible
  lexicon: BDAG
  rationale: Se conserva la imposibilidad expresada por δύνασθε con un presente natural en español dentro de la condición general.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvos
  alternatives_spanish:
  - salvarse
  - ser rescatados
  lexicon: BDAG
  rationale: En este debate sobre los términos de inclusión y salvación, σῴζω mantiene su fuerza soteriológica. 'Ser salvos' es la forma más transparente y eclesialmente inteligible en español.
theological_decisions:
- issue: Sentido de σωθῆναι en la controversia de Hechos 15
  english_pob_reading: be saved
  chosen_spanish_reading: ser salvos
  alternative_spanish_readings:
  - salvarse
  - ser rescatados
  rationale: El conflicto no es meramente sobre rescate temporal, sino sobre si la circuncisión es necesaria para la salvación. 'Ser salvos' preserva ese peso teológico sin imponer una formulación confesional ajena al texto.
  doctrine_reference: Acts 15:1; Translation philosophy §1, §3
- issue: Alcance inclusivo de ἀδελφοὺς
  english_pob_reading: the brothers; likely refers to the believing community inclusively
  chosen_spanish_reading: a los hermanos
  alternative_spanish_readings:
  - a los hermanos y hermanas
  - a los creyentes
  rationale: Se conserva el masculino plural del griego como lectura base, y el posible alcance inclusivo queda documentado en nota para no borrar la forma léxica del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión en inglés fue revisada sin cambios, con alto acuerdo entre revisores. La traducción española sigue la misma lectura base y no introduce reinterpretaciones nuevas; se ajusta únicamente a la sintaxis natural del español y a los criterios terminológicos del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías'' no aparece aquí; no aplica decisión terminológica.'
  - '''esclavo/siervo'' no aplica en este versículo.'
  - La pasiva refleja 'se circuncidan' preserva mejor la estructura del pasivo griego que un giro más libre.
