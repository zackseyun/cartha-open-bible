    text: O 'los hermanos y hermanas'; el griego dice 'hermanos' y probablemente se refiere de manera inclusiva a la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O 'uso'; ἔθος puede significar una práctica establecida o una costumbre tradicional.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del borrador pero mejora la fidelidad al griego y al expediente inglés: ''A menos que'' representa mejor Ἐὰν μὴ, ''según la costumbre de Moisés'' es más natural y preciso para τῷ ἔθει τῷ Μωϋσέως, y ''sean circuncidados'' expresa con mayor claridad el pasivo del verbo griego.'
