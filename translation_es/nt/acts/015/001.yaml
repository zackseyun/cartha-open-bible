revisions:
- from: 'Y algunos hombres que habían bajado de Judea enseñaban a los hermanos[a]: «Si no se circuncidan conforme al uso[b] de Moisés, no pueden ser salvos».'
  to: 'Y algunos hombres que habían bajado de Judea enseñaban a los hermanos[a]: «A menos que sean circuncidados según la costumbre[b] de Moisés, no pueden ser salvos».'
  rationale: 'La revisión conserva el sentido del borrador pero mejora la fidelidad al griego y al expediente inglés: ''A menos que'' representa mejor Ἐὰν μὴ, ''según la costumbre de Moisés'' es más natural y preciso para τῷ ἔθει τῷ Μωϋσέως, y ''sean circuncidados'' expresa con mayor claridad el pasivo del verbo griego.'
