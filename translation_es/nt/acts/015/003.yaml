translation:
  language: es
  text: Así pues, después de haber sido enviados en su camino por la iglesia, pasaban tanto por Fenicia como por Samaria, narrando en detalle la conversión de los gentiles[a], y causaban gran gozo a todos los hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el volverse de los gentiles'.
    reason: lexical_alternative
  - marker: b
    text: '''Hermanos'' aquí probablemente se refiere a creyentes en general, incluidas mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προπεμφθέντες
  english_pob_choice: having been sent on their way
  chosen_spanish: después de haber sido enviados
  alternatives_spanish:
  - después de haber sido acompañados en su camino
  - después de haber sido despedidos para el viaje
  lexicon: BDAG
  rationale: El participio de προπέμπω puede incluir la idea de apoyar o acompañar al viajero al partir. En español, «haber sido enviados» conserva el sentido de despido para el viaje sin añadir información no explícita sobre una escolta.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: BDAG
  rationale: En Hechos, el término se refiere a la comunidad cristiana. «Iglesia» es el equivalente natural y fiel en español contemporáneo.
- source_word: διήρχοντο
  english_pob_choice: they passed through
  chosen_spanish: atravesaban
  alternatives_spanish:
  - pasaban por
  - recorrían
  lexicon: BDAG
  rationale: El imperfecto describe un desplazamiento continuo por regiones. «Atravesaban» mantiene el movimiento en curso con buena naturalidad en español.
- source_word: τε ... καὶ
  english_pob_choice: both ... and
  chosen_spanish: y
  alternatives_spanish:
  - tanto ... como
  - así como
  lexicon: Greek grammar
  rationale: El griego correlativo une estrechamente Fenicia y Samaria. En español, una simple coordinación con «y» transmite de forma natural esa unión sin forzar la sintaxis.
- source_word: Φοινίκην
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenicia (región)
  lexicon: BDAG
  rationale: «Fenicia» es la transliteración estándar en español para la región.
- source_word: Σαμάρειαν
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español.
- source_word: ἐκδιηγούμενοι
  english_pob_choice: describing in detail
  chosen_spanish: narrando en detalle
  alternatives_spanish:
  - relatando con amplitud
  - contando detalladamente
  lexicon: BDAG
  rationale: El compuesto intensifica la acción de relatar. «Narrando en detalle» conserva el matiz de exposición cuidadosa y completa.
- source_word: ἐπιστροφὴν
  english_pob_choice: conversion
  chosen_spanish: conversión
  alternatives_spanish:
  - vuelta
  - el volverse
  lexicon: BDAG
  rationale: En este contexto se trata del giro de los gentiles hacia Dios como respuesta al evangelio. «Conversión» comunica bien el sentido religioso y comunitario en español. La alternativa más literal se mantiene como posibilidad lexical.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En Hechos 15 el contraste es entre judíos y no judíos incorporados al pueblo de Dios. «Gentiles» es la forma contextualmente más clara en español.
- source_word: ἐποίουν χαρὰν μεγάλην
  english_pob_choice: they brought great joy
  chosen_spanish: causaban gran gozo
  alternatives_spanish:
  - producían gran alegría
  - traían gran gozo
  lexicon: BDAG
  rationale: La construcción ποιέω + sustantivo admite un sentido causativo. «Causaban gran gozo» conserva ese valor y suena natural en español; «gozo» mantiene un registro más bíblico y preciso que «alegría» aquí.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego, como en la práctica del proyecto, pero en español «los hermanos» puede incluir al conjunto de la comunidad creyente según el contexto.
theological_decisions:
- issue: Sentido de ἐπιστροφή aplicado a los gentiles
  english_pob_reading: conversion
  chosen_spanish_reading: conversión
  alternative_spanish_readings:
  - vuelta
  - volverse
  rationale: El versículo informa de la respuesta de los gentiles al evangelio. «Conversión» expresa adecuadamente el cambio religioso sin desplazar el énfasis narrativo del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de ἀδελφοῖς en una comunidad mixta
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se preserva la forma del original y la política del proyecto de no sustituir automáticamente el masculino plural por un neutro inclusivo en el texto principal. El contexto comunitario permite entender el grupo como la hermandad cristiana en general.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se mantuvo el contenido del pasaje sin cambios sustantivos respecto del análisis auditado en inglés; no se identificaron revisiones previas aplicadas. La redacción española sigue de cerca las decisiones léxicas ya validadas (προπεμφθέντες, ἐκδιηγούμενοι, ἐπιστροφὴ, ἀδελφοί) y conserva las dos notas alternativas del expediente inglés en forma equivalente.
  spanish_consistency_notes:
  - Se usó «iglesia» para ἐκκλησία, en coherencia con Hechos.
  - Se mantuvo «gentiles» para τῶν ἐθνῶν, consistente con el contexto de Hechos 15.
  - Se optó por «gozo» en vez de «alegría» para reflejar el registro bíblico y el valor causativo de la construcción.
  - 'Los topónimos se normalizaron al uso español estándar: Fenicia y Samaria.'
  - La estructura inicial «Así que» traduce con naturalidad el valor inferencial de οὖν sin sobrerrepresentar la partícula.
  - Se evitó introducir ‘Cristo’ o términos eclesiásticos adicionales que no aparecen en el griego del versículo.
