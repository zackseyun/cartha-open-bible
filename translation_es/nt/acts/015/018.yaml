lexical_decisions:
- source_word: γνωστὰ
  english_pob_choice: known
  chosen_spanish: conocido
  alternatives_spanish:
  - conocido
  - sabido
  - hecho conocido
  lexicon: BDAG
  rationale: El adjetivo neutro plural funciona aquí predicativamente en una cláusula elíptica. En español, "conocido" conserva la brevedad y el valor resultativo de "known" sin introducir una verbalización ajena al griego. "Sabido" es posible, pero suena menos natural en una fórmula tan concisa.
- source_word: ἀπ’
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - desde
  - de
  - a partir de
  lexicon: BDAG
  rationale: La preposición temporal expresa punto de origen. "Desde" comunica mejor en español el inicio temporal de la expresión y mantiene la compacidad del griego.
- source_word: αἰῶνος
  english_pob_choice: of old
  chosen_spanish: tiempos antiguos
  alternatives_spanish:
  - antiguamente
  - desde antiguo
  - desde la eternidad
  - tiempos remotos
  lexicon: BDAG
  rationale: En este giro temporal, αἰών puede referirse a una duración pasada o a la antigüedad. "Tiempos antiguos" expresa con naturalidad la lectura breve del texto base; "desde la eternidad" se reserva como alternativa textual más amplia, no como traducción principal del SBLGNT.
theological_decisions:
- issue: Alcance temporal de la frase
  english_pob_reading: known from of old, with a footnote preserving the stronger textual alternative 'known from eternity' or 'who makes these things known from of old.'
  chosen_spanish_reading: conocido desde tiempos antiguos, sin expandir el texto a una afirmación doctrinal más fuerte sobre eternidad.
  alternative_spanish_readings:
  - conocido desde la eternidad
  - el que hace conocer estas cosas desde antiguo
  rationale: El texto griego SBLGNT es extremadamente breve y no contiene explícitamente las ampliaciones de algunas tradiciones textuales. La traducción principal debe reflejar esa brevedad; la nota conserva la variante más amplia para no borrar la tensión textual.
  doctrine_reference: 'Philosophy of translation: fidelidad al texto base, distinción entre lectura principal y variante textual, y prudencia doctrinal al no inferir más de lo escrito.'
translation_notes:
  revision_awareness: Se siguió la lectura breve del SBLGNT y se evitó ampliar la cláusula con formulaciones de la tradición textual más extensa.
  spanish_consistency_notes:
  - Se mantuvo un español natural y breve, acorde con la concisión del original griego.
  - No se usó «SEÑOR» ni otros términos de sustitución, porque este versículo no los contiene.
  - La nota al pie preserva la variante textual relevante sin incorporar esa expansión al texto principal.
