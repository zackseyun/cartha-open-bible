  source_alignment_summary: El borrador refleja correctamente la cláusula brevísima γνωστὰ ἀπ’ αἰῶνος y preserva la decisión del POB de no expandirla a una afirmación más fuerte. La nota textual también conserva bien las variantes más largas. Sin embargo, el singular español «conocido» no refleja plenamente el neutro plural γνωστὰ, que en una cláusula elíptica se entiende mejor en español como plural impersonal («conocidas» / «son conocidas»).
  spanish_quality_summary: El español es claro y natural, pero «conocido desde tiempos antiguos» suena algo rígido y levemente incongruente por el singular aislado. «Conocidas desde antiguo» mantiene la concisión del griego, suena más idiomático en español bíblico moderno y evita una frase nominal extraña.
