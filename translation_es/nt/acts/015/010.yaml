translation:
  language: es
  text: Ahora bien, ¿por qué están poniendo a prueba[a] a Dios, al imponer un yugo[b] sobre el cuello de los discípulos, que ni nuestros padres[c] ni nosotros hemos podido llevar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿por qué ponen a Dios a prueba?»
    reason: lexical_alternative
  - marker: b
    text: El «yugo» es una metáfora de una obligación impuesta; en este contexto, se refiere a requisitos que se colocan sobre los discípulos.
    reason: cultural_note
  - marker: c
    text: O, «ni nuestros antepasados ni nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Pues ahora
  - Así pues
  lexicon: BDAG
  rationale: Expresa en español la fuerza inferencial y de transición de νῦν οὖν con naturalidad contemporánea, sin sonar rígido ni arcaico.
- source_word: τί πειράζετε τὸν θεόν
  english_pob_choice: why are you testing God
  chosen_spanish: ¿por qué están poniendo a prueba a Dios?
  alternatives_spanish:
  - ¿por qué están tentando a Dios?
  - ¿por qué prueban a Dios?
  lexicon: BDAG
  rationale: «Poner a prueba» conserva el sentido de πειράζω en este contexto retórico y evita que «tentar» introduzca una resonancia moral menos precisa en español.
- source_word: ἐπιθεῖναι
  english_pob_choice: by putting
  chosen_spanish: al imponer
  alternatives_spanish:
  - al poner
  - al colocar
  lexicon: BDAG
  rationale: El infinitivo explica el modo de la acción; «imponer» comunica mejor en español la idea de cargar una exigencia sobre otros que un simple «poner».
- source_word: ζυγὸν
  english_pob_choice: a yoke
  chosen_spanish: un yugo
  alternatives_spanish:
  - una carga
  - una obligación
  lexicon: BDAG
  rationale: Se conserva la metáfora central del texto. «Yugo» mantiene la imagen de una obligación gravosa sin desactivar su fuerza figurativa.
- source_word: ἐπὶ τὸν τράχηλον
  english_pob_choice: on the neck
  chosen_spanish: sobre el cuello
  alternatives_spanish:
  - en el cuello
  - sobre la nuca
  lexicon: BDAG
  rationale: «Cuello» es la correspondencia directa de τράχηλος y preserva la imagen vívida del yugo colocado sobre la persona.
- source_word: τῶν μαθητῶν
  english_pob_choice: of the disciples
  chosen_spanish: de los discípulos
  alternatives_spanish:
  - de los aprendices
  - de estos discípulos
  lexicon: BDAG
  rationale: «Discípulos» es la traducción establecida de μαθηταί en este contexto y en Hechos, y mantiene la continuidad terminológica.
- source_word: οὔτε οἱ πατέρες ἡμῶν οὔτε ἡμεῖς
  english_pob_choice: neither our fathers nor we
  chosen_spanish: ni nuestros padres ni nosotros
  alternatives_spanish:
  - ni nuestros antepasados ni nosotros
  - ni nuestros mayores ni nosotros
  lexicon: BDAG
  rationale: «Padres» reproduce el valor genealógico e histórico de πατέρες en español bíblico y mantiene la referencia a las generaciones previas del pueblo.
- source_word: ἰσχύσαμεν βαστάσαι
  english_pob_choice: have been able to bear
  chosen_spanish: hemos podido llevar
  alternatives_spanish:
  - hemos podido soportar
  - hemos tenido fuerza para cargar
  lexicon: BDAG
  rationale: «Poder llevar» comunica la capacidad de cargar una obligación figurada de modo natural en español; «soportar» podría debilitar la imagen del yugo, mientras que «cargar» refuerza el peso metafórico.
theological_decisions:
- issue: El sentido del «yugo»
  english_pob_reading: Retained as a metaphor for the imposed obligation being placed on Gentile believers, without specifying more than the verse itself states.
  chosen_spanish_reading: Se conserva como metáfora de una obligación impuesta, sin precisar más de lo que el versículo dice.
  alternative_spanish_readings:
  - Identificar el yugo explícitamente con toda la ley mosaica
  - Entenderlo de forma más estrecha como la circuncisión y exigencias asociadas
  rationale: El versículo, en sí mismo, usa una imagen metafórica. La traducción mantiene esa imagen para no resolver en el texto principal una tensión teológica que el contexto desarrolla, pero que aquí no se explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla prematuramente.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con el audit trail inglés; no hubo cambios aplicados en la revisión más reciente. Se mantuvo la metáfora del yugo y la relación inferencial de νῦν οὖν, con ajustes naturales para español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; aquí el texto dice θεόν y se traduce «Dios».
  - Se mantuvo «discípulos» para μαθηταί por consistencia terminológica en Hechos.
  - Se prefirió «padres» para πατέρες por su valor histórico-genealógico en este contexto.
  - Se preservó la metáfora de «yugo» sin interpretarla en el cuerpo principal.
  - La puntuación sigue la norma española con interrogación de apertura y cierre.
