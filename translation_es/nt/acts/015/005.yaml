translation:
  language: es
  text: Pero algunos de los del partido[a] de los fariseos que habían creído se levantaron, diciendo que es necesario circuncidarlos y mandarles que guarden la ley de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secta de los fariseos». El griego aquí denota un grupo o escuela reconocido, no necesariamente «herejía» en el sentido técnico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστησαν
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: BDAG
  rationale: En este contexto deliberativo, el verbo expresa que tomaron la palabra o se pusieron en pie para hablar. 'Se levantaron' es natural en español y conserva la acción narrativa sin añadir una interpretación más fuerte.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: El pronombre indefinido plural se rinde con 'algunos', la opción más directa y natural en español sin añadir especificidad no presente en el griego.
- source_word: τῶν ἀπὸ τῆς αἱρέσεως τῶν Φαρισαίων
  english_pob_choice: those from the party of the Pharisees
  chosen_spanish: de la facción de los fariseos
  alternatives_spanish:
  - del partido de los fariseos
  - de la secta de los fariseos
  lexicon: BDAG
  rationale: αἵρεσις aquí señala un grupo o partido reconocido, no 'herejía' en el sentido técnico posterior. 'Facción' comunica pertenencia grupal sin cargar el término con una connotación anacrónica demasiado fuerte.
- source_word: πεπιστευκότες
  english_pob_choice: who had believed
  chosen_spanish: que habían creído
  alternatives_spanish:
  - que eran creyentes
  - que habían llegado a creer
  lexicon: BDAG
  rationale: El participio perfecto conserva una acción ya ocurrida con estado resultante. 'Que habían creído' mantiene ese valor verbal y evita convertirlo en una simple etiqueta nominal.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - declarando
  lexicon: BDAG
  rationale: Participio presente que introduce el contenido de su বক্তব্য; 'diciendo' es neutral y fiel al valor introductorio del griego.
- source_word: δεῖ
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - hay que
  - debe
  lexicon: BDAG
  rationale: La impersonalidad de δεῖ se conserva con 'es necesario', que refleja la fuerza de obligación sin especificar su fuente.
- source_word: περιτέμνειν αὐτούς
  english_pob_choice: to circumcise them
  chosen_spanish: circuncidarlos
  alternatives_spanish:
  - que sean circuncidados
  - hacerlos circuncidar
  lexicon: BDAG
  rationale: La construcción infinitiva se expresa de forma natural y directa en español con 'circuncidarlos', manteniendo el objeto personal del griego.
- source_word: παραγγέλλειν
  english_pob_choice: to command
  chosen_spanish: mandarles
  alternatives_spanish:
  - ordenarles
  - darles la orden de
  lexicon: BDAG
  rationale: El verbo implica autoridad; 'mandarles' preserva esa fuerza en español común y bíblico sin sonar excesivamente duro o técnico.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - cumplan
  lexicon: BDAG
  rationale: Aquí τηρέω se refiere a mantener obediencia respecto de una norma. 'Guarden' conserva el uso bíblico y jurídico de observar/guardar una ley.
- source_word: τὸν νόμον Μωϋσέως
  english_pob_choice: the law of Moses
  chosen_spanish: la ley de Moisés
  alternatives_spanish:
  - la ley mosaica
  lexicon: BDAG
  rationale: La expresión genitiva se vierte de forma transparente y familiar en español. 'La ley de Moisés' preserva la formulación directa del original y del audit trail inglés.
theological_decisions:
- issue: αἵρεσις en un contexto judío precristiano
  english_pob_reading: party
  chosen_spanish_reading: facción
  alternative_spanish_readings:
  - secta
  - partido
  rationale: El término identifica un grupo dentro del judaísmo de la época, no necesariamente una 'secta' en el sentido peyorativo o técnico posterior. 'Facción' evita importar la carga eclesiástica posterior y mantiene el matiz grupal.
  doctrine_reference: 'Translation philosophy: preservar el sentido histórico del término y evitar anacronismos de traducción.'
- issue: Participio perfecto πεπιστευκότες y la tensión entre fe profesada y postura posterior
  english_pob_reading: who had believed
  chosen_spanish_reading: que habían creído
  alternative_spanish_readings:
  - creyentes
  - que eran creyentes
  rationale: 'La frase conserva que estos fariseos efectivamente habían creído, sin suavizar la tensión teológica del pasaje: aun así exigen circuncisión y obediencia a la ley para otros. Mantener el verbo evita resolver la tensión con una etiqueta estática.'
  doctrine_reference: 'Translation philosophy: preservar tensiones teológicas del texto en vez de armonizarlas artificialmente.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, conservando el valor deliberativo de ἐξανέστησαν, el matiz grupal de αἵρεσις y la tensión de πεπιστευκότες. No se requiere una revisión adicional respecto al pase más reciente; la propuesta coincide con el consenso alto del control cruzado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene 'ley de Moisés' y no 'ley mosaica' en el texto principal para conservar la formulación transparente y familiar.
  - '''Facción'' se emplea como equivalente funcional de ''party'' para αἵρεσις; la nota ofrece ''secta'' como alternativa documentada.'
  - Se evita 'SEÑOR' o sustituciones tradicionales no pertinentes, ya que el versículo no contiene κύριος ni una cita del nombre divino.
