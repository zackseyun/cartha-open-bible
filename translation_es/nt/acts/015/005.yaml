revisions:
- from: Pero algunos de los que eran de la[a] facción de los fariseos que habían creído se levantaron, diciendo que es necesario circuncidarlos y mandarles que guarden la ley de Moisés.
  to: Pero algunos de los del partido[a] de los fariseos que habían creído se levantaron, diciendo que es necesario circuncidarlos y mandarles que guarden la ley de Moisés.
  rationale: Se ajusta αἵρεσις a «partido» para alinearlo mejor con la decisión léxica y teológica documentada en el POB inglés, se limpia la colocación del marcador de nota y se corrige ligeramente la redacción de la nota al pie para mayor naturalidad en español.
