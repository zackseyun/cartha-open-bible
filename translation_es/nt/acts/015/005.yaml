review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca el audit trail inglés: algunos fariseos que habían creído se levantan en la asamblea y afirman la necesidad de circuncidar a los gentiles y ordenarles guardar la ley de Moisés. Se preservan correctamente ἐξανέστησαν, πεπιστευκότες, δεῖ, περιτέμνειν, παραγγέλλειν y τὸν νόμον Μωϋσέως. La principal reserva es αἱρέσεως: «facción» no es imposible, pero en español bíblico actual sugiere más división partidista o bando interno conflictivo, mientras que el razonamiento documentado pide un grupo/escuela/partido reconocido, con «secta» como alternativa explícita. Además, la secuencia «de la[a] facción» coloca el anclaje de nota de forma poco natural.'
  spanish_quality_summary: 'La oración es generalmente clara y natural, pero puede mejorarse en dos puntos: 1) «partido» suena más neutral y más cercano al rationale documentado que «facción»; 2) la nota debe anclarse al sustantivo completo de manera más limpia. El resto del español es legible y digno, con sintaxis natural: «se levantaron, diciendo que es necesario circuncidarlos y mandarles que guarden la ley de Moisés».'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión clave es αἵρεσις: para este contexto, «partido» alinea mejor con la decisión inglesa «party» y con la explicación teológica/lexical; «secta» puede conservarse en nota como alternativa. «Que habían creído» preserva correctamente la tensión teológica documentada.'
  issues:
  - severity: medium
    issue: «facción» para αἵρεσις no refleja de la mejor manera la decisión auditada «party»
    rationale: Aunque posible, «facción» en español suele insinuar división interna o bandería, y puede sonar más negativo de lo que exige αἵρεσις aquí. «Partido» comunica mejor un grupo reconocido dentro del judaísmo, en línea con la nota inglesa.
  - severity: low
    issue: Ubicación poco natural del marcador de nota en «de la[a] facción»
    rationale: El marcador debe anclarse de manera clara al término o frase relevante. «partido[a]» o «facción[a]» es más limpio que interrumpir el artículo.
  - severity: low
    issue: La nota al pie dice «grupo o escuela reconocidos»
    rationale: Con «grupo» como núcleo singular, la concordancia más natural es «reconocido»; también conviene evitar comillas simples anglicadas alrededor de herejía en una nota española formal.
  revised_spanish_text: Pero algunos de los del partido[a] de los fariseos que habían creído se levantaron, diciendo que es necesario circuncidarlos y mandarles que guarden la ley de Moisés.
  revised_footnotes:
