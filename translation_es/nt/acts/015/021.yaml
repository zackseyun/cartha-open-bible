revisions:
- from: Porque Moisés, desde antiguas generaciones, tiene en cada ciudad a los que lo proclaman en las sinagogas, siendo leído cada sábado[a].
  to: Porque Moisés, desde generaciones antiguas, tiene en cada ciudad a quienes lo proclaman, siendo leído[a] en las sinagogas cada sábado.
  rationale: Se reordenó la oración para que «en las sinagogas» modifique correctamente «siendo leído», como en el griego. También se ajustó «desde antiguas generaciones» a «desde generaciones antiguas» para una expresión más natural, manteniendo el plural y el sentido temporal prolongado. Se conservó la metonimia de «Moisés» en el texto principal con nota explicativa.
