review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la metonimia de «Moisés» y el valor distributivo de «en cada ciudad / cada sábado». Sin embargo, la sintaxis española desplaza indebidamente «en las sinagogas» para que modifique a «los que lo proclaman» en vez de a «siendo leído», mientras que en el griego ἐν ταῖς συναγωγαῖς va con ἀναγινωσκόμενος. También conviene mejorar la fluidez de «desde antiguas generaciones».
  spanish_quality_summary: El texto es generalmente claro, pero la colocación de complementos produce una lectura ambigua y algo torpe. Reordenar la frase restaura la relación sintáctica correcta y mejora la naturalidad sin perder cercanía al griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Moisés», «sinagogas» y la metonimia están bien conservados. «Proclaman» es adecuado para κηρύσσω. La nota metonímica es pertinente y puede mantenerse con redacción más natural.
  issues:
  - severity: high
    issue: 'Adjunto sintáctico mal colocado: «en las sinagogas»'
    rationale: En el griego, ἐν ταῖς συναγωγαῖς modifica ἀναγινωσκόμενος («siendo leído en las sinagogas»), no a «los que lo proclaman». El borrador español sugiere que los proclamadores están en las sinagogas, alterando la estructura y el énfasis del original.
  - severity: medium
    issue: «desde antiguas generaciones» suena poco idiomático
    rationale: Aunque es comprensible y cercano al original, en español más natural y digno conviene «desde generaciones antiguas» o «desde tiempos antiguos». Se puede mantener el plural para reflejar mejor el griego.
  - severity: low
    issue: Nota al pie con redacción algo rígida
    rationale: La explicación es correcta, pero puede pulirse para sonar más natural en español sin cambiar el contenido.
  revised_spanish_text: Porque Moisés, desde generaciones antiguas, tiene en cada ciudad a quienes lo proclaman, siendo leído[a] en las sinagogas cada sábado.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «Moisés ... tiene a quienes lo proclaman ... siendo leído». «Moisés» funciona aquí como metonimia de los escritos o de la ley asociados con Moisés.'
    reason: lexical_alternative
  revision_rationale: Se reordenó la oración para que «en las sinagogas» modifique correctamente «siendo leído», como en el griego. También se ajustó «desde antiguas generaciones» a «desde generaciones antiguas» para una expresión más natural, manteniendo el plural y el sentido temporal prolongado. Se conservó la metonimia de «Moisés» en el texto principal con nota explicativa.
