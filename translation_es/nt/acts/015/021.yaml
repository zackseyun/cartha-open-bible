translation:
  language: es
  text: Porque Moisés, desde generaciones antiguas, tiene en cada ciudad a quienes lo proclaman, siendo leído[a] en las sinagogas cada sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Moisés ... tiene a quienes lo proclaman ... siendo leído». «Moisés» funciona aquí como metonimia de los escritos o de la ley asociados con Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Se conserva el nombre propio como transliteración estándar en español, siguiendo la práctica del POB y sin convertir el nombre en una paráfrasis interpretativa.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la razón o explicación del argumento previo; 'Porque' transmite con naturalidad ese valor explicativo en español.
- source_word: ἐκ γενεῶν ἀρχαίων
  english_pob_choice: from ancient generations
  chosen_spanish: desde antiguas generaciones
  alternatives_spanish:
  - desde generaciones antiguas
  - desde tiempos antiguos
  lexicon: BDAG
  rationale: Se conserva el plural 'generaciones' y el matiz de antigüedad prolongada. 'Desde antiguas generaciones' suena natural y mantiene el paralelo semántico con el griego sin volverlo demasiado libre.
- source_word: κατὰ πόλιν
  english_pob_choice: in every city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - ciudad por ciudad
  - en toda ciudad
  lexicon: BDAG
  rationale: La construcción distributiva se expresa mejor en español con 'en cada ciudad', que conserva la idea de distribución por ciudades sin forzar un giro calco.
- source_word: τοὺς κηρύσσοντας αὐτὸν
  english_pob_choice: those who proclaim him
  chosen_spanish: a los que lo proclaman
  alternatives_spanish:
  - a los que lo predican
  - a los que lo anuncian
  lexicon: BDAG
  rationale: 'κηρύσσω pide lenguaje de proclamación; ''proclaman'' preserva ese campo semántico. Se mantiene el pronombre masculino ''lo'' para respetar la metonimia del texto: Moisés representa sus escritos o la ley asociada con él.'
- source_word: ἔχει
  english_pob_choice: has had
  chosen_spanish: tiene
  alternatives_spanish:
  - ha tenido
  - ha tenido desde hace mucho
  lexicon: BDAG
  rationale: En español, el presente 'tiene' puede expresar con naturalidad el estado durativo en contexto, sin necesidad de recargar la frase. La duración ya queda sugerida por 'desde antiguas generaciones'.
- source_word: ἐν ταῖς συναγωγαῖς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - en las sinagogas
  lexicon: BDAG
  rationale: Se mantiene el referente institucional 'sinagogas' de forma directa y transparente.
- source_word: κατὰ πᾶν σάββατον
  english_pob_choice: every Sabbath
  chosen_spanish: cada sábado
  alternatives_spanish:
  - en cada sábado
  - todos los sábados
  lexicon: BDAG
  rationale: El griego usa un distributivo temporal. 'Cada sábado' es la forma más natural en español y conserva la recurrencia periódica.
- source_word: ἀναγινωσκόμενος
  english_pob_choice: being read
  chosen_spanish: siendo leído
  alternatives_spanish:
  - al ser leído
  - mientras se lee
  lexicon: BDAG
  rationale: Se reproduce el participio pasivo sin añadir una relación causal explícita que no está en la forma griega. 'Siendo leído' conserva la construcción y la pasividad del original.
theological_decisions:
- issue: Moisés como metonimia de la ley o los escritos mosaicos
  english_pob_reading: Retain the personal reference 'Moses'/'him' rather than explicitly substituting 'the law of Moses' or 'the writings of Moses.'
  chosen_spanish_reading: Mantener 'Moisés' y 'lo' en el texto principal, con nota explicativa sobre la metonimia.
  alternative_spanish_readings:
  - la ley de Moisés
  - los escritos de Moisés
  rationale: El griego dice literalmente 'Moisés' y 'a él'. Para no introducir una expansión interpretativa en el cuerpo del texto, se conserva la metonimia y se explica en nota que Moisés representa sus escritos o la ley asociada con él.
  doctrine_reference: Principio de primacía del texto original; evitar paráfrasis que excedan lo que el griego warrants.
- issue: Relación entre la lectura del pasivo participial y la cláusula principal
  english_pob_reading: being read in the synagogues every Sabbath
  chosen_spanish_reading: siendo leído cada sábado
  alternative_spanish_readings:
  - mientras es leído cada sábado
  - puesto que es leído cada sábado
  rationale: La revisión inglesa retiró un matiz causal explícito para adherirse más directamente al participio. El español sigue esa decisión con una forma participial simple, sin añadir 'puesto que' o 'ya que'.
  doctrine_reference: Fidelidad sintáctica al participio griego; evitar inferencias causales no marcadas explícitamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que cambió 'since he is read' a 'being read' para reflejar más directamente el participio griego y evitar una causalidad explícita. La redacción española sigue esa corrección con 'siendo leído', sin introducir 'ya que' o 'puesto que'.
  spanish_consistency_notes:
  - Se mantuvo 'Moisés' como nombre propio y no 'Cristo' ni otro término tradicional no pertinente al pasaje.
  - Se evitó 'Señor' u otras sustituciones teológicas no presentes en el texto.
  - '''Cada sábado'' conserva el distributivo de κατὰ πᾶν σάββατον de manera natural en español.'
  - El orden de la frase procura ser publicable y claro sin perder la estructura del original.
