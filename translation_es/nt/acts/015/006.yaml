translation:
  language: es
  text: Entonces los apóstoles y los ancianos se reunieron para considerar este asunto[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se congregaron' o 'se juntaron'. El verbo griego está formalmente en pasiva ('fueron reunidos'), pero en contexto suele funcionar con el sentido de que el grupo se reunió o se convocó.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'para ver acerca de esta palabra'. Aquí 'palabra' significa el asunto o la cuestión en discusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνήχθησάν
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  - se juntaron
  lexicon: BDAG
  rationale: El aoristo pasivo de συνάγω funciona aquí de manera intransitiva para expresar una reunión convocada. En español, 'se reunieron' comunica con naturalidad el hecho de juntarse como grupo sin forzar una pasiva artificial.
- source_word: τε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - entonces
  lexicon: BDAG
  rationale: La partícula τε enlaza la escena con el contexto previo. 'Así que' conserva la progresión discursiva y el matiz consecutivo que la POB inglesa expresó con 'So'.
- source_word: ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG
  rationale: En Hechos el término designa a los líderes apostólicos reconocidos; 'apóstoles' es la forma estable y precisa en español.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: '''Ancianos'' es el equivalente idiomático normal en contexto eclesial y conserva el valor de liderazgo comunitario. ''Presbíteros'' sería más técnico y menos transparente para lectura pública.'
- source_word: ἰδεῖν
  english_pob_choice: to consider
  chosen_spanish: para considerar
  alternatives_spanish:
  - para ver
  - para examinar
  - para mirar
  lexicon: BDAG
  rationale: Aunque literalmente significa 'ver', aquí expresa una toma deliberativa de la cuestión. 'Para considerar' reproduce bien la función idiomática sin exagerar el resultado del encuentro.
- source_word: περὶ τοῦ λόγου τούτου
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - este tema
  - esta cuestión
  - esta palabra
  lexicon: BDAG
  rationale: λόγος puede significar 'palabra', 'mensaje' o 'asunto'. En este contexto de consejo y discusión, 'asunto' comunica mejor la referencia al punto debatido, como también hizo la POB inglesa con 'this matter'.
theological_decisions:
- issue: Naturaleza de πρεσβύτεροι como liderazgo de la iglesia primitiva
  english_pob_reading: Rendered as 'elders' without importing later denominational office structures.
  chosen_spanish_reading: Traducido como 'ancianos', sin imponer una estructura eclesiástica posterior.
  alternative_spanish_readings:
  - presbíteros como oficio técnico posterior
  - obispos
  rationale: El texto identifica a líderes reconocidos en la comunidad de Jerusalén, pero no exige proyectar categorías eclesiásticas posteriores. 'Ancianos' mantiene el sentido histórico y lexical con neutralidad confesional.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Valor deliberativo de ἰδεῖν en la reunión
  english_pob_reading: The leaders gathered 'to consider this matter,' expressing a process of examination rather than a predetermined doctrinal verdict.
  chosen_spanish_reading: Se reunieron 'para considerar este asunto', expresando un proceso de deliberación y no un veredicto ya cerrado.
  alternative_spanish_readings:
  - para decidir este asunto
  - para ver este asunto
  rationale: El infinitivo sugiere examinar la cuestión. 'Considerar' evita sobrecargar el versículo con una resolución que el texto todavía no presenta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el trazado auditado de la POB inglesa. Se mantiene la conexión discursiva de τε con 'Así que', el valor colectivo de συνήχθησάν con una pasiva natural en español, y el sentido deliberativo de ἰδεῖν sin convertirlo en una decisión ya tomada. No se detectaron revisiones previas aplicadas en el expediente fuente, por lo que el borrador se ajusta al consenso de alta concordancia.
  spanish_consistency_notes:
  - Se usa 'ancianos' para πρεσβύτεροι, consistente con un registro bíblico amplio y comprensible.
  - '''Asunto'' para λόγος en este contexto evita una traducción demasiado literal (''palabra'') que en español sería opaca.'
  - La partícula inicial se resuelve con 'Así que' para reflejar continuidad narrativa sin añadir contenido nuevo.
  - Se conserva el tono sobrio y público, apto para lectura congregacional.
