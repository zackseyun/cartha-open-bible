translation:
  language: es
  text: Así que, después de haber sido enviados[a], descendieron a Antioquía, y después de reunir a la multitud[b][c], entregaron la carta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despedidos» o «liberados». El participio griego puede denotar que fueron enviados formalmente, despedidos o dejados ir.
    reason: lexical_alternative
  - marker: b
    text: «Descendieron» conserva la dirección geográfica del verbo griego, probablemente desde Jerusalén, situada a mayor altura, hacia Antioquía.
    reason: cultural_note
  - marker: c
    text: O «la asamblea» o «la congregación». La expresión se refiere al grupo reunido en Antioquía.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολυθέντες
  english_pob_choice: after being sent off
  chosen_spanish: después de haber sido despedidos
  alternatives_spanish:
  - después de haber sido enviados
  - después de haber sido dejados ir
  - después de haber sido liberados
  lexicon: BDAG
  rationale: El participio puede expresar una salida formal tras ser despedidos o enviados. En español, 'despedidos' conserva la idea de una salida autorizada y naturaliza mejor la construcción que un calco como 'enviados' o 'liberados', que podría sonar menos preciso en este contexto.
- source_word: κατῆλθον
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  - vinieron
  lexicon: BDAG
  rationale: El verbo conserva una dirección geográfica descendente. 'Descendieron' mantiene esa fuerza sin sobreexplicar la topografía; 'bajaron' es posible, pero 'descendieron' resulta más sobrio y compatible con el registro bíblico.
- source_word: συναγαγόντες
  english_pob_choice: after gathering
  chosen_spanish: después de reunir
  alternatives_spanish:
  - habiendo reunido
  - después de congregar
  - tras convocar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; 'después de reunir' expresa bien la secuencia. 'Congregar' puede sonar demasiado eclesiástico en español moderno; 'reunir' es más directo y fiel.
- source_word: τὸ πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la asamblea
  - la congregación
  - la gente reunida
  lexicon: BDAG
  rationale: '''Multitud'' conserva la literalidad del sustantivo griego y evita fijar de antemano un término técnico eclesial. En este contexto puede aludir al grupo reunido en Antioquía, pero el griego no exige más precisión aquí.'
- source_word: ἐπέδωκαν
  english_pob_choice: they delivered
  chosen_spanish: entregaron
  alternatives_spanish:
  - les presentaron
  - les dieron
  - pusieron en sus manos
  lexicon: BDAG
  rationale: El verbo apunta a una entrega formal de la carta al grupo reunido. 'Entregaron' conserva ese valor oficial sin sonar más administrativo de lo que el texto exige; 'dieron' sería demasiado genérico.
- source_word: ἐπιστολήν
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - la epístola
  - el escrito
  - la misiva
  lexicon: BDAG
  rationale: '''Carta'' es el equivalente natural y fiel en español moderno. ''Epístola'' introduce un matiz más literario o eclesiástico que el griego aquí no obliga a adoptar.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el control de revisión más reciente, que no introdujo cambios. La redacción española mantiene la secuencia aspectual del griego, la dirección descendente de κατῆλθον y la ambigüedad controlada de τὸ πλῆθος sin imponer un término eclesial no necesario.
  spanish_consistency_notes:
  - Se preserva el uso de «carta» en lugar de «epístola» para evitar una formalización innecesaria.
  - Se mantiene una traducción verbal y directa del participio griego con una estructura natural en español.
  - No se introdujo «SEÑOR» ni terminología teológica ajena al versículo.
  - Los corchetes de notas aparecen junto a los términos con alternativa léxica o nota cultural, y los marcadores no se reutilizan.
