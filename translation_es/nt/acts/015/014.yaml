translation:
  language: es
  text: Simeón[a] ha relatado cómo Dios primero visitó a los gentiles[b] para tomar de entre ellos un pueblo para su nombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Simón». Santiago usa aquí la forma «Simeón».
    reason: lexical_alternative
  - marker: b
    text: O «de entre las naciones».
    reason: lexical_alternative
  - marker: c
    text: Es decir, un pueblo que le pertenece, identificado con su nombre.
    reason: cultural_note
lexical_decisions:
- source_word: Συμεὼν
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: BDAG
  rationale: Se conserva la forma griega distintiva del nombre, que en este versículo aparece como Συμεών y no se armoniza con la forma más conocida 'Simón'.
- source_word: ἐξηγήσατο
  english_pob_choice: has recounted
  chosen_spanish: ha recapitulado
  alternatives_spanish:
  - ha recuentado
  - ha relatado
  - ha explicado
  lexicon: BDAG
  rationale: El verbo aquí introduce el contenido del informe de Simeón ante la asamblea. 'Ha recapitulado' comunica de manera natural que ha expuesto un relato resumido, sin volverlo una explicación técnica.
- source_word: καθὼς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  - de qué manera
  lexicon: BDAG
  rationale: En esta construcción tras un verbo de relato, καθώς introduce el contenido reportado; 'cómo' mantiene esa función de manera idiomática en español.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - por primera vez
  - en primer lugar
  lexicon: BDAG
  rationale: Colocado con la acción de Dios, señala la fase inicial de su obrar entre los gentiles. 'Primero' es la opción más directa y natural en español.
- source_word: ἐπεσκέψατο
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - miró con favor
  - atendió
  - vino a ayudar
  lexicon: BDAG
  rationale: '''Visitó'' conserva el idioma bíblico de intervención atenta y benévola de Dios, sin explicitar más de lo que el texto dice.'
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: para tomar
  alternatives_spanish:
  - para recibir
  - para recoger
  lexicon: BDAG
  rationale: El infinitivo expresa finalidad. 'Para tomar' es una rendición directa de λαβεῖν y evita añadir ideas interpretativas.
- source_word: ἐξ ἐθνῶν
  english_pob_choice: from the Gentiles
  chosen_spanish: de entre los gentiles
  alternatives_spanish:
  - de las naciones
  - entre los gentiles
  lexicon: BDAG
  rationale: En Hechos, ἔθνη se refiere normalmente a no judíos; 'gentiles' expresa mejor ese contraste. 'De entre' refleja con más precisión la idea de extracción desde un conjunto.
- source_word: λαὸν
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - un pueblo propio
  lexicon: BDAG
  rationale: '''Pueblo'' conserva el peso bíblico y comunitario de λαός, sin reducirlo a un simple grupo étnico.'
- source_word: τῷ ὀνόματι αὐτοῦ
  english_pob_choice: for his name
  chosen_spanish: para su nombre
  alternatives_spanish:
  - en favor de su nombre
  - perteneciente a su nombre
  - para él
  lexicon: BDAG
  rationale: Se preserva la expresión nominalmente fuerte del griego. 'Para su nombre' mantiene la ambigüedad bíblica entre pertenencia, identificación y orientación al honor de Dios, sin aplanarla a 'para sí mismo'.
theological_decisions:
- issue: Cómo entender la visita de Dios a los gentiles
  english_pob_reading: visited
  chosen_spanish_reading: visitó
  alternative_spanish_readings:
  - miró con favor
  - atendió
  rationale: La elección conserva la noción de intervención divina providente y misericordiosa sin convertirla en paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir τῷ ὀνόματι αὐτοῦ sin diluir su carga teológica
  english_pob_reading: for his name
  chosen_spanish_reading: para su nombre
  alternative_spanish_readings:
  - para él
  - para el honor de su nombre
  rationale: La frase mantiene el lenguaje de pertenencia y de identificación con el nombre de Dios, importante en el contexto de pacto y pueblo de Dios.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: no se incluyeron notas al pie sin anclaje en el texto. El versículo se entrega ahora sin marcadores de nota, para evitar inconsistencias formales.'
  spanish_consistency_notes:
  - Se usa 'gentiles' para ἔθνη conforme al contexto de Hechos 15.
  - Se conserva 'Yahvé' no aplica aquí porque el texto griego dice θεός, traducido como 'Dios'.
  - '''Pueblo'' mantiene la resonancia bíblica de λαός.'
  - '''Simeón'' preserva la forma griega presente en el texto fuente.'
