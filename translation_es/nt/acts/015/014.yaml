  - marker: b
    text: O «de entre las naciones».
    reason: lexical_alternative
  - marker: c
    text: Es decir, un pueblo que le pertenece, identificado con su nombre.
    reason: cultural_note
  revision_rationale: Se reemplaza «ha recapitulado» por «ha relatado» para reflejar mejor ἐξηγήσατο en español natural y fiel. Se conservan y adaptan al español las tres notas del audit trail inglés, ya que preservan alternativas léxicas y el matiz teológico de «para su nombre». El resto del texto puede mantenerse.
