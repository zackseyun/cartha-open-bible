translation:
  language: es
  text: Y surgió un desacuerdo tan agudo[a] que se separaran el uno del otro, y Bernabé tomó a Marcos y zarpó a Chipre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguda contienda». El término griego puede denotar una provocación fuerte o un choque intenso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there arose
  chosen_spanish: surgió
  alternatives_spanish:
  - hubo
  - se produjo
  lexicon: BDAG
  rationale: γίνομαι introduce aquí un nuevo estado o acontecimiento; «surgió» conserva mejor el arranque narrativo que un simple «hubo».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como un conector narrativo leve; «Y» mantiene el flujo sin forzar contraste.
- source_word: παροξυσμὸς
  english_pob_choice: sharp disagreement
  chosen_spanish: fuerte discordia
  alternatives_spanish:
  - agudo conflicto
  - fuerte contienda
  - provocación intensa
  lexicon: BDAG
  rationale: El término puede expresar choque intenso o irritación/provocación. En este contexto, «fuerte discordia» comunica bien la intensidad del desacuerdo sin resolver la tensión lexical hacia una sola paráfrasis.
- source_word: ὥστε
  english_pob_choice: such ... that
  chosen_spanish: de modo que
  alternatives_spanish:
  - tan ... que
  - con el resultado de que
  lexicon: BDAG
  rationale: La construcción de resultado se expresa naturalmente en español con «de modo que», manteniendo la relación causa-resultado.
- source_word: ἀποχωρισθῆναι
  english_pob_choice: they separated
  chosen_spanish: se separaron
  alternatives_spanish:
  - se apartaron
  - quedaron separados
  lexicon: BDAG
  rationale: El infinitivo de resultado se vierte con una cláusula finita natural en español; «se separaron» refleja el resultado directo.
- source_word: ἀπ’ ἀλλήλων
  english_pob_choice: from one another
  chosen_spanish: uno de otro
  alternatives_spanish:
  - unos de otros
  - entre sí
  lexicon: BDAG
  rationale: «Uno de otro» preserva el valor recíproco de forma clara y sobria en español narrativo.
- source_word: τὸν τε Βαρναβᾶν
  english_pob_choice: and Barnabas
  chosen_spanish: y Bernabé
  alternatives_spanish:
  - entonces Bernabé
  - Bernabé, por su parte
  lexicon: BDAG
  rationale: El griego introduce al segundo miembro de la acción dividida; «y Bernabé» mantiene la progresión narrativa sin sobreinterpretar τε.
- source_word: παραλαβόντα
  english_pob_choice: took
  chosen_spanish: tomando a
  alternatives_spanish:
  - llevando consigo a
  - habiendo tomado a
  lexicon: BDAG
  rationale: El participio circunstancial se expresa de forma natural con «tomando a», que comunica el sentido de llevar consigo sin añadir material ajeno.
- source_word: τὸν Μᾶρκον
  english_pob_choice: Mark
  chosen_spanish: Marcos
  alternatives_spanish:
  - Juan Marcos
  lexicon: BDAG
  rationale: El texto griego dice simplemente «Marcos»; no se introduce el nombre completo porque el versículo no lo exige.
- source_word: ἐκπλεῦσαι
  english_pob_choice: sailed away
  chosen_spanish: zarpó
  alternatives_spanish:
  - zarpó y partió
  - navegó
  lexicon: BDAG
  rationale: ἐκπλέω implica partir por mar; «zarpó» conserva el matiz de salida marítima de manera breve y natural.
- source_word: εἰς Κύπρον
  english_pob_choice: to Cyprus
  chosen_spanish: hacia Chipre
  alternatives_spanish:
  - a Chipre
  - para Chipre
  lexicon: BDAG
  rationale: La dirección de destino se puede expresar con «hacia» en español para mantener el movimiento y la llegada prevista.
theological_decisions:
- issue: Tensión narrativa entre colaboradores apostólicos
  english_pob_reading: Render the dispute in straightforward terms as a 'sharp disagreement' without softening or moralizing it.
  chosen_spanish_reading: Traducir la disputa con un término fuerte pero sobrio, sin suavizarla ni convertirla en una reconciliación implícita.
  alternative_spanish_readings:
  - aguda contienda
  - serio altercado
  - provocación intensa
  rationale: El versículo presenta un conflicto real y fuerte entre Bernabé y Pablo. La traducción debe conservar esa tensión sin minimizarla ni exagerarla más allá del valor léxico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece anclado en el texto principal junto a «discordia», para que la nota léxica quede exactamente referenciada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Bernabé» y «Marcos» por concordancia con el texto griego simple, sin ampliar a «Juan Marcos».
  - Se prefirió una solución narrativa natural en español («surgió», «se separaron», «zarpó») que sigue fielmente el flujo del griego sin calco excesivo.
