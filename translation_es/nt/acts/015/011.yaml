  spanish_quality_summary: El español es claro y mayormente natural, pero la frase final suena truncada. «Así como ellos también» es entendible, aunque poco idiomático como cierre de oración. Una redacción como «así como ellos también lo serán» o «tal como ellos también serán salvados» mejora la fluidez. Además, en registro bíblico amplio «seremos salvos» suele sonar más natural que «seremos salvados», aunque ambos son correctos; aquí basta una reparación mínima.
