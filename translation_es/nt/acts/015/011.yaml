translation:
  language: es
  text: Pero por la gracia[a] del Señor Jesús creemos que seremos salvados, así como ellos también lo serán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por la gracia del Señor Jesús creemos ser salvados, de la misma manera que ellos también».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un contraste fuerte y natural en español con la afirmación anterior; «Pero» conserva bien el valor adversativo sin sonar forzado.
- source_word: διὰ τῆς χάριτος
  english_pob_choice: through the grace
  chosen_spanish: por la gracia
  alternatives_spanish:
  - por medio de la gracia
  - a través de la gracia
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento; «por la gracia» es idiomático en español y mantiene la idea de mediación.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gracioso
  lexicon: BDAG
  rationale: El sentido teológico normal aquí es la gracia divina como base y medio de la salvación; «gracia» es el equivalente más preciso y reconocido.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Señor Jesucristo
  - de nuestro Señor Jesús
  lexicon: BDAG
  rationale: 'κύριος se traduce con el equivalente doctrinal y natural «Señor». El genitivo se entiende como pertenencia o procedencia: la gracia del Señor Jesús.'
- source_word: πιστεύομεν
  english_pob_choice: we believe
  chosen_spanish: creemos
  alternatives_spanish:
  - confiamos
  - estamos convencidos
  lexicon: BDAG
  rationale: La forma verbal expresa la convicción confesional del grupo; «creemos» es la traducción directa y más natural en español.
- source_word: σωθῆναι
  english_pob_choice: that we will be saved
  chosen_spanish: seremos salvados
  alternatives_spanish:
  - ser salvados
  - seremos rescatados
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo después de «creemos» se vierte en español como una cláusula finita más natural. «Salvados» conserva el valor soteriológico sin añadir matices no presentes.
- source_word: καθ’ ὃν τρόπον
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: BDAG
  rationale: La expresión idiomática de comparación y manera se expresa con naturalidad mediante «así como», que mantiene el paralelismo sin sobreexplicar.
- source_word: κἀκεῖνοι
  english_pob_choice: they also will
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - aquellos también
  lexicon: BDAG
  rationale: El griego significa «también ellos». En español, el futuro ya queda implicado por «seremos salvados»; por eso se evita repetir un verbo auxiliar innecesario y se conserva el énfasis comparativo con «también».
theological_decisions:
- issue: Dirección de la comparación entre judíos y gentiles
  english_pob_reading: The main text preserves the Greek emphasis that 'we' (Jewish believers) are saved in the same way as 'they also' (Gentiles), not vice versa.
  chosen_spanish_reading: El texto mantiene que «nosotros» somos salvados de la misma manera que «ellos también», preservando el movimiento comparativo del griego.
  alternative_spanish_readings:
  - Ellos también serán salvados como nosotros
  - Seremos salvados como ellos
  rationale: La estructura griega coloca primero a «nosotros» como sujeto de «creemos» y luego compara la salvación de ambos grupos por la misma gracia. La versión española conserva ese orden lógico y la implicación contextual de igualdad entre judíos y gentiles.
  doctrine_reference: Hechos 15:11 en su contexto; principio de igualdad en la salvación por la gracia de Cristo
- issue: Salvación por gracia sin fórmulas añadidas
  english_pob_reading: The verse is rendered to state salvation comes through the grace of the Lord Jesus, without importing later denominational formulations about faith, works, or ordo salutis.
  chosen_spanish_reading: La frase afirma que la salvación viene por la gracia del Señor Jesús, sin añadir fórmulas doctrinales posteriores que el versículo no enuncia.
  alternative_spanish_readings:
  - salvos por gracia solamente
  - salvos por gracia mediante la fe
  rationale: El versículo menciona gracia y creer, pero no desarrolla una consigna sistemática. La traducción debe permanecer atada al texto y no ampliar la afirmación más allá de su formulación.
  doctrine_reference: Principio de suficiencia textual; afirmación de la gracia en el evangelio apostólico
translation_notes:
  revision_awareness: Se tomó como base la lectura griega de SBLGNT y el recorrido auditado en inglés. Se mantuvo el contraste de ἀλλὰ con «Pero», la mediación de διὰ τῆς χάριτος con «por la gracia», y la comparación de καθ’ ὃν τρόπον κἀκεῖνοι con «así como ellos también», evitando una paráfrasis más libre. La cláusula infinitiva σωθῆναι se volvió una forma española natural («seremos salvados») para conservar el sentido futuro y pasivo sin dureza sintáctica.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, en armonía con el uso cristiano estándar y el contexto de Jesús.
  - Se eligió «gracia» como término teológico central, sin reemplazarlo por «favor» para no debilitar el sentido soteriológico.
  - Se mantuvo un registro digno y claro, apto para lectura pública e iglesia, evitando arcaísmos innecesarios.
