translation:
  language: es
  text: Pero Pablo, habiendo escogido a Silas, partió,[b] encomendado[a] a la gracia del Señor por los hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habiendo sido confiado' o 'habiendo sido encomendado a la gracia del Señor'.
    reason: lexical_alternative
  - marker: b
    text: '''Hermanos'' puede referirse más ampliamente a la comunidad creyente, incluyendo a las mujeres, según el contexto.'
    reason: cultural_note
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Pablo
  lexicon: nombre propio
  rationale: Nombre propio estándar en español; no requiere variación.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Conserva el matiz adversativo leve frente al episodio anterior, en línea con el valor de contraste documentado.
- source_word: ἐπιλεξάμενος
  english_pob_choice: chose
  chosen_spanish: habiendo escogido
  alternatives_spanish:
  - habiendo elegido
  - escogió
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción previa a la partida; 'habiendo escogido' mantiene el valor participial y la iniciativa personal de Pablo sin sobrerreproducir la voz media.
- source_word: Σιλᾶν
  english_pob_choice: Silas
  chosen_spanish: Silas
  alternatives_spanish:
  - Silas
  lexicon: nombre propio
  rationale: Transliteración estándar del nombre propio.
- source_word: ἐξῆλθεν
  english_pob_choice: departed
  chosen_spanish: partió
  alternatives_spanish:
  - salió
  - partió de allí
  lexicon: BDAG
  rationale: En un relato de viaje, 'partió' comunica naturalmente el sentido de salir para emprender camino, equivalente funcional de 'departed'.
- source_word: παραδοθεὶς
  english_pob_choice: having been commended
  chosen_spanish: encomendado
  alternatives_spanish:
  - habiendo sido encomendado
  - entregado
  - confiado
  lexicon: BDAG
  rationale: El participio pasivo de παραδίδωμι aquí expresa ser puesto bajo la custodia o cuidado divino por la comunidad. 'Encomendado' es la forma española más natural y eclesialmente comprensible, sin perder el sentido de commended/entrusted.
- source_word: τῇ χάριτι
  english_pob_choice: to the grace
  chosen_spanish: a la gracia
  alternatives_spanish:
  - a la gracia
  - al favor
  lexicon: BDAG
  rationale: El dativo tras παραδίδωμι se vierte con 'a'; se conserva el sustantivo teológico 'gracia' porque el texto no permite reducirlo con seguridad a mero 'favor'.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: Se mantiene 'Señor' conforme al uso del NT y al auditorio eclesial; el griego no especifica más el referente, por lo que no se resuelve en la traducción.
- source_word: ὑπὸ τῶν ἀδελφῶν
  english_pob_choice: by the brothers
  chosen_spanish: por los hermanos
  alternatives_spanish:
  - por los hermanos y hermanas
  - por los creyentes
  lexicon: BDAG
  rationale: Conserva el plural masculino del original y la fórmula comunitaria. En español, 'hermanos' puede abarcar a la comunidad creyente sin necesidad de expandir el texto principal.
theological_decisions:
- issue: Referente de 'el Señor'
  english_pob_reading: Rendered simply as 'the Lord' without specifying Jesus or God the Father.
  chosen_spanish_reading: Se vierte simplemente como 'el Señor' sin precisar si se trata de Jesús o del Padre.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego usa κύριος como título cristiano convencional, pero sin especificación. Para respetar la indeterminación del texto y evitar una resolución doctrinal no marcada, se conserva la misma apertura semántica.
  doctrine_reference: Preservar la tensión teológica del texto; κύριος → Señor
- issue: Alcance de 'los hermanos'
  english_pob_reading: Main text keeps 'brothers' with a footnote noting likely inclusive communal sense.
  chosen_spanish_reading: El texto principal conserva 'los hermanos' sin ampliar el término.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: La forma gramatical del original es masculina plural. Se mantiene la correspondencia lexical en el texto principal y se deja la posible inclusividad comunitaria para una nota, si se desea, en lugar de desplazarla al cuerpo del versículo.
  doctrine_reference: Fidelidad lexical al plural masculino; nota de alcance comunitario
translation_notes:
  revision_awareness: El inglés auditado ya resolvió ἐπιλεξάμενος como 'chose', ἐξῆλθεν como 'departed', παραδοθεὶς como 'having been commended', y dejó 'the Lord' sin especificar referente. La presente versión sigue esas decisiones con equivalentes naturales en español, sin introducir una paráfrasis más interpretativa que la del testigo inglés revisado.
  spanish_consistency_notes:
  - '''Pablo'' y ''Silas'' se mantienen como nombres propios estándar.'
  - 'Se conserva la estructura narrativa: contraste (''Pero''), selección previa (''habiendo escogido''), salida (''partió'') y comisión comunitaria (''encomendado a la gracia del Señor por los hermanos'').'
  - No se introducen notas al pie porque el record no requiere variantes textuales o ambigüedades adicionales en español más allá de las decisiones registradas en los campos de traducción y teología.
