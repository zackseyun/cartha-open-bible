  glossary_alignment: No hay conflictos con la terminología del proyecto. κύριος como 'Señor' es correcto aquí; no corresponde usar 'Yahvé'. χάρις como 'gracia' está bien preservado. ἀδελφῶν como 'hermanos' en el texto principal concuerda con la política de fidelidad de género del POB, pero debe recuperarse la nota de inclusividad contextual.
