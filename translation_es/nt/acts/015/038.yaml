revisions:
- from: Pero Pablo insistía en que no debían llevar consigo a este hombre[a], que se había apartado de ellos desde Panfilia y no había ido con ellos a la obra.
  to: Pero Pablo insistía en que no debían llevar con ellos a este hombre[a], que se había apartado de ellos en Panfilia y no había ido con ellos a la obra.
  rationale: Se ajusta 'desde Panfilia' a 'en Panfilia' para un español natural que exprese claramente el lugar de la separación en este contexto narrativo. Se corrige la nota al pie, reemplazando la forma no idiomática 'se había desertado' por 'los había desertado'. También se aligera la frase principal con 'llevar con ellos', manteniendo el mismo sentido de συμπαραλαμβάνειν.
