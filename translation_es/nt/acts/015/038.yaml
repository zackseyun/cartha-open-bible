translation:
  language: es
  text: Pero Pablo insistía en que no debían llevar con ellos a este hombre[a], que se había apartado de ellos en Panfilia y no había ido con ellos a la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los había desertado en Panfilia'. El participio griego puede traducirse con más fuerza, pero el texto principal conserva 'se había apartado de' para no sobreinterpretar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος δὲ ἠξίου
  english_pob_choice: But Paul insisted
  chosen_spanish: Pero Pablo insistía
  alternatives_spanish:
  - Pero Pablo insistió
  - Pero Pablo consideraba oportuno
  lexicon: BDAG
  rationale: ἠξίου es imperfecto y, en este contexto de desacuerdo, expresa una postura firme y sostenida. 'Insistía' conserva esa insistencia continua mejor que un simple 'dijo' o 'pensó'.
- source_word: τὸν ἀποστάντα ἀπ’ αὐτῶν ἀπὸ Παμφυλίας
  english_pob_choice: this man, who had withdrawn from them from Pamphylia
  chosen_spanish: a este hombre, que se había apartado de ellos desde Panfilia
  alternatives_spanish:
  - a este hombre, que se había retirado de ellos en Panfilia
  - a este hombre, que los había abandonado desde Panfilia
  lexicon: BDAG
  rationale: ἀποστάντα puede ser simplemente 'apartarse/retirarse', pero en este contexto también puede insinuar una ruptura más fuerte. 'Se había apartado' mantiene la tensión sin decidir de antemano por 'abandonado'.
- source_word: μὴ συνελθόντα αὐτοῖς
  english_pob_choice: had not gone with them
  chosen_spanish: no había ido con ellos
  alternatives_spanish:
  - no los había acompañado
  - no había salido con ellos
  lexicon: BDAG
  rationale: En español, 'ir con ellos' conserva con naturalidad el sentido de acompañamiento en un viaje misionero. 'Acompañado' es posible, pero más interpretativo en el flujo de la frase.
- source_word: εἰς τὸ ἔργον
  english_pob_choice: to the work
  chosen_spanish: a la obra
  alternatives_spanish:
  - al trabajo
  - a la misión
  lexicon: BDAG
  rationale: '''ἔργον'' aquí designa la tarea concreta del viaje y ministerio; ''obra'' es una opción bíblica y pública en español que conserva la concreción sin convertirla en ''misión'', que sería más interpretativo.'
- source_word: μὴ συμπαραλαμβάνειν τοῦτον
  english_pob_choice: they should not take along this man
  chosen_spanish: no debían llevar consigo a este hombre
  alternatives_spanish:
  - no debían tomar con ellos a este hombre
  - no debían llevar a este hombre con ellos
  lexicon: BDAG
  rationale: συμπαραλαμβάνειν expresa llevar o tomar consigo a alguien en compañía de otros. 'Llevar consigo' reproduce bien la idea de inclusión en el grupo sin sonar forzado.
theological_decisions:
- issue: La fuerza negativa de la evaluación sobre la conducta anterior de Juan Marcos / el hombre en cuestión
  english_pob_reading: had withdrawn from them
  chosen_spanish_reading: se había apartado de ellos
  alternative_spanish_readings:
  - se había retirado de ellos
  - los había abandonado
  rationale: La POB inglesa preserva la menor carga interpretativa en el texto principal y deja 'deserted' como alternativa de nota. En español, 'se había apartado' mantiene esa misma cautela y evita fijar un juicio moral que el griego permite pero no exige en la línea principal.
  doctrine_reference: Principio de prudencia lexical; no hay afirmación doctrinal, sino una decisión de matiz histórico-narrativo.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail al preferir una relación más exacta para ἀπὸ Παμφυλίας: ''desde Panfilia'' en lugar de ''en Panfilia''. También se mantuvo la opción menos interpretativa para ἀποστάντα, coherente con la nota inglesa.'
  spanish_consistency_notes:
  - Se usa 'Panfilia' como forma española estándar del topónimo.
  - '''la obra'' mantiene el sustantivo concreto del original y evita expandir prematuramente a ''la misión''.'
  - Se conserva el registro sobrio y narrativo propio de Hechos, sin añadir nombres ni aclaraciones no presentes en el versículo.
