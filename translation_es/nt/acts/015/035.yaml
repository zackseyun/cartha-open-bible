  text: Παῦλος δὲ καὶ Βαρναβᾶς διέτριβον ἐν Ἀντιοχείᾳ διδάσκοντες καὶ εὐαγγελιζόμενοι μετὰ καὶ ἑτέρων πολλῶν τὸν λόγον τοῦ κυρίου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/035.yaml
  text: But Paul and Barnabas stayed in Antioch[a], teaching and proclaiming the good news of the word of the Lord[c][b], with many others also.
  footnotes:
  - marker: a
    text: Or 'spent some time in Antioch.' The Greek verb can emphasize remaining there for a period.
    reason: lexical_alternative
  - marker: b
    text: Or 'preaching the gospel.' The Greek means announcing or proclaiming good news.
    reason: lexical_alternative
  - marker: c
    text: '''The word of the Lord'' is a common expression in Acts for the Lord''s message; ''message of the Lord'' is a possible English alternative.'
    reason: lexical_alternative
