    changes_summary: Reordered the final phrase for natural English and to reflect that 'the word of the Lord' is the content being taught and proclaimed. Kept 'stayed' for διέτριβον and retained 'proclaiming the good news' for εὐαγγελιζόμενοι.
translation:
  language: es
  text: Pero Pablo y Bernabé se quedaron en Antioquía[a], enseñando y proclamando la buena noticia de la palabra del Señor[c][b], con muchos otros también.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasaron algún tiempo en Antioquía». El verbo griego puede enfatizar que permanecieron allí durante un período.
    reason: lexical_alternative
  - marker: b
    text: O «predicando el evangelio». El griego significa anunciar o proclamar buenas noticias.
    reason: lexical_alternative
  - marker: c
    text: «La palabra del Señor» es una expresión común en Hechos para el mensaje del Señor; «el mensaje del Señor» también sería posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβον
  english_pob_choice: stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - estuvieron por algún tiempo
  lexicon: BDAG
  rationale: El imperfecto de διατρίβω expresa permanencia o estancia continua en un lugar. «Se quedaron» comunica bien esa duración de forma natural en español, sin volver la frase rígida. Mantiene abierta la posibilidad de una estancia prolongada sin añadir más de lo que el griego dice.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  lexicon: BDAG
  rationale: El participio expresa una actividad en curso acompañando su estancia. «Enseñando» es la forma más directa y natural en español para conservar ese valor durativo.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the good news
  chosen_spanish: proclamando la buena noticia
  alternatives_spanish:
  - predicando el evangelio
  - anunciando la buena noticia
  lexicon: BDAG
  rationale: El verbo significa anunciar buenas noticias. «Proclamando la buena noticia» conserva el sentido evangelizador sin imponer un registro eclesiástico más técnico que el griego no exige. En español, «proclamar» mantiene fuerza pública y anunciativa.
- source_word: μετὰ καὶ ἑτέρων πολλῶν
  english_pob_choice: with many others also
  chosen_spanish: con muchos otros también
  alternatives_spanish:
  - también con muchos otros
  - con muchas otras personas también
  lexicon: BDAG
  rationale: La frase indica compañía y cooperación ministerial. «Con muchos otros también» reproduce la adición de καὶ y el sentido de ἕτεροι como «otros» en este contexto, en un orden natural para el español.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: Aunque λόγος puede significar «mensaje», «palabra» conserva la expresión lucana «la palabra del Señor», que tiene continuidad literaria y teológica en Hechos. En español suena natural y respetuosa del uso bíblico.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Se traduce κύριος como «Señor» para preservar el título bíblico. En la construcción genitiva, «la palabra del Señor» refleja fielmente la frase griega sin aclarar de más su referente.
theological_decisions:
- issue: Referente de «el Señor» en «la palabra del Señor»
  english_pob_reading: Rendered neutrally as 'the Lord' without specifying beyond the Greek expression.
  chosen_spanish_reading: Se mantiene «el Señor» sin precisar si el énfasis recae específicamente en Jesús o en una referencia divina más amplia.
  alternative_spanish_readings:
  - la palabra del Señor Jesús
  - el mensaje del Señor en un sentido más amplio
  rationale: Hechos emplea «Señor» de manera teológicamente rica y a veces deliberadamente abierta. La traducción no debe resolver esa tensión donde el griego no la resuelve. «La palabra del Señor» preserva la fórmula establecida y deja intacta la posible amplitud referencial.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB en inglés, que colocó «of the word of the Lord» como contenido de la enseñanza y la proclamación, y mantuvo el valor durativo de διέτριβον mediante «stayed». La versión española refleja ese mismo orden y esa misma relación sintáctica: Pablo y Bernabé se quedaron en Antioquía, enseñando y proclamando la buena noticia de la palabra del Señor. También conserva la apertura interpretativa de κύριος sin expandirla más allá del texto.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος y «palabra» para λόγος, siguiendo la terminología POB y la expresión lucana estable.
  - «Buena noticia» se usa para εὐαγγελιζόμενοι, evitando sustituirlo por una fórmula más eclesiástica si no es necesaria.
  - La puntuación conserva la coordinación participial en español con una estructura clara y publicable.
  - Las notas a pie de página distinguen entre alternativa lexical y nota de matiz, sin introducir interpretaciones no sustentadas.
