translation:
  language: es
  text: Puesto que hemos oído que algunos de entre nosotros han salido y los han perturbado con palabras, trastornando sus almas[a], aunque no les dimos instrucciones[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “trastornando sus mentes”; la expresión “sus almas” traduce el griego “sus almas/vidas” y se refiere a su ser interior, no solo a sus emociones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “a quienes no mandamos”.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: Since
  chosen_spanish: Puesto que
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base de la declaración con causalidad natural en español, sin sonar rígido ni meramente temporal.
- source_word: ἠκούσαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - oímos
  lexicon: BDAG
  rationale: El perfecto compuesto mantiene la relevancia presente de un informe recibido, como en el inglés POB.
- source_word: τινὲς ἐξ ἡμῶν
  english_pob_choice: some from among us
  chosen_spanish: algunos de entre nosotros
  alternatives_spanish:
  - algunos de los nuestros
  - algunos de nuestro grupo
  lexicon: BDAG
  rationale: Reproduce el matiz de procedencia interna del grupo sin sobretraducir ni añadir pertenencia institucional.
- source_word: ἐξελθόντες
  english_pob_choice: have gone out
  chosen_spanish: han salido
  alternatives_spanish:
  - han ido
  - salieron
  lexicon: BDAG
  rationale: Conserva la idea de partida desde el grupo de origen; en español, 'han salido' es natural y compatible con el participio aoristo.
- source_word: ἐτάραξαν
  english_pob_choice: troubled
  chosen_spanish: los han perturbado
  alternatives_spanish:
  - los han turbado
  - los han inquietado
  lexicon: BDAG
  rationale: '''Perturbar'' comunica causar trastorno o aflicción de modo claro y pastoral, cercano a ''troubled'' sin perder fuerza.'
- source_word: λόγοις
  english_pob_choice: with words
  chosen_spanish: con palabras
  alternatives_spanish:
  - con lo que dijeron
  - con su mensaje
  lexicon: BDAG
  rationale: Mantiene el instrumento verbal del griego de forma transparente y evita precisar indebidamente el contenido.
- source_word: ἀνασκευάζοντες
  english_pob_choice: unsettling
  chosen_spanish: trastornando
  alternatives_spanish:
  - desconcertando
  - alterando
  lexicon: BDAG
  rationale: '''Trastornar'' refleja el efecto perturbador y el sentido de desbaratar o poner en desorden, conservando la tensión lexical del original.'
- source_word: τὰς ψυχὰς ὑμῶν
  english_pob_choice: your souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - su interior
  lexicon: BDAG
  rationale: Se mantiene 'almas' por transparencia lexical y por la correspondencia bíblica tradicional, sin reducirlo solo a emociones.
- source_word: οἷς οὐ διεστειλάμεθα
  english_pob_choice: although we gave them no instructions
  chosen_spanish: aunque no les dimos instrucciones
  alternatives_spanish:
  - a quienes no les dimos instrucciones
  - aunque no los mandamos
  lexicon: BDAG
  rationale: Preserva la negación de autorización apostólica y aclara que la falta de instrucciones recae sobre esos hombres, no sobre los destinatarios.
theological_decisions:
- issue: Autorización apostólica de los que perturbaron a los creyentes
  english_pob_reading: although we gave them no instructions
  chosen_spanish_reading: aunque no les dimos instrucciones
  alternative_spanish_readings:
  - a quienes no les dimos instrucciones
  - aunque no los mandamos
  rationale: El texto niega que los emisarios actuaran con mandato de Jerusalén; el español conserva esa implicación institucional sin añadir explicación extratextual.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, incorporando la aclaración de que la falta de instrucciones se refiere a los hombres que salieron de entre ellos, y manteniendo el paralelismo entre 'have gone out' / 'han salido' y 'gave them no instructions' / 'no les dimos instrucciones'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'almas' para ψυχάς por transparencia y por continuidad con la auditoría inglesa.
  - Se evita 'mandamos' en el texto principal para no endurecer indebidamente el matiz de autorización; se deja como alternativa en nota.
  - La puntuación reproduce una sola cláusula causal con comas, adecuada al tono epistolar del versículo.
