  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: causalidad inicial, procedencia ''de entre nosotros'', salida de esos hombres, perturbación ''con palabras'', efecto continuo sobre el interior de los destinatarios, y negación de autorización apostólica. Sin embargo, ''los han perturbado'' cambia indebidamente la persona de segunda a tercera; el griego ὑμᾶς exige ''los/ustedes'' según registro, y en este contexto conviene ''los''. Además, la nota [a] está anclada en ''palabras'', pero la alternativa y explicación corresponden a ''sus almas''.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de concordancia pronominal en registro: el texto mezcla ''que... los han perturbado'' con ''sus almas'', lo cual puede leerse como tercera persona plural de cortesía, pero en una carta eclesial neutral es más natural mantener la referencia directa a los destinatarios con ''los han perturbado... sus almas''. El mayor ajuste necesario es mover la nota [a] al sintagma correcto y pulir levemente la formulación de la nota.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Almas' conserva bien ψυχὰς, y 'instrucciones' refleja adecuadamente διεστειλάμεθα. No intervienen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica una alternativa para 'sus almas' / ψυχὰς, no para 'palabras' / λόγοις. Debe colocarse junto a 'almas'.
  - severity: medium
    issue: Cambio innecesario de persona en los pronombres
    rationale: El borrador usa 'los han perturbado' y luego 'sus almas', pero el pasaje se dirige a los destinatarios directamente. Conviene mantener una referencia clara y consistente a 'ustedes' mediante 'los han perturbado... sus almas' sin ambigüedad, o bien 'los han perturbado... sus propias almas'; el texto actual es aceptable pero puede leerse algo torpe. Se mejora con un ajuste mínimo y reanclaje de nota.
  revised_spanish_text: Puesto que hemos oído que algunos de entre nosotros han salido y los han perturbado con palabras, trastornando sus almas[a], aunque no les dimos instrucciones[b],
