  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: cláusula final «para que», «remanente» para κατάλοιποι, «gentiles» por el contexto de ἔθνη, la fórmula «dice el Señor» y la relativa «que hace estas cosas». Sin embargo, la anotación está mal anclada y parcialmente duplicada: la nota [a] aparece sobre «humanidad» aunque corresponde a ἔθνη/gentiles, y se han creado dos notas para la misma alternativa de ἔθνη. Además, la decisión española «ha sido invocado mi nombre» desplaza ligeramente el sentido de identificación/pertenencia de «ha sido llamado mi nombre sobre ellos», por lo que conviene ajustar el texto principal a una formulación más fiel.'
  spanish_quality_summary: El español es claro y digno, pero la distribución de notas confunde al lector y afecta la legibilidad editorial. «Sobre quienes ha sido invocado mi nombre» es comprensible, aunque suena algo menos natural y un poco más interpretativo que «sobre quienes ha sido llamado mi nombre», con alternativa idiomática en nota. El resto del verso fluye bien en español eclesial contemporáneo.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Señor» para κύριος en esta cita griega está razonado; «gentiles» sigue la decisión contextual del POB; «humanidad» respeta el valor genérico de ἀνθρώπων. La única tensión importante es lexical: para ἐπικέκληται ... τὸ ὄνομά μου, «invocado» introduce el matiz de invocación más que el de ser identificados por el nombre. También debe preservarse una sola nota sobre «gentiles/naciones» y otra sobre el modismo del nombre.'
