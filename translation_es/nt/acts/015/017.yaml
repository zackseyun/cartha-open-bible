translation:
  language: es
  text: para que el remanente de la humanidad busque al Señor, y también todos los gentiles[a] sobre quienes ha sido llamado mi nombre[b], dice el Señor[c], que hace estas cosas
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las naciones». El griego ἔθνη puede significar «gentiles» o «naciones»; aquí se elige «gentiles» porque el Concilio de Jerusalén trata la inclusión de no judíos.
    reason: alternative_reading
  - marker: b
    text: O «que son llamados por mi nombre». El modismo griego dice literalmente «sobre quienes ha sido llamado mi nombre».
    reason: lexical_alternative
  - marker: c
    text: Esta línea hace eco de Amós 9:12 en una forma reflejada en las Escrituras griegas, donde el énfasis recae en las naciones/gentiles que llevan el nombre del Señor.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπως ἂν
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Expresa de manera natural en español el valor final de la cláusula con subjuntivo, sin añadir énfasis innecesario.
- source_word: ἐκζητήσωσιν
  english_pob_choice: may seek
  chosen_spanish: busque
  alternatives_spanish:
  - busque diligentemente
  - quiera buscar
  lexicon: BDAG
  rationale: El verbo español «buscar» comunica bien el sentido básico; el prefijo intensivo de ἐκζητέω no obliga aquí a una expansión en el texto principal.
- source_word: οἱ κατάλοιποι τῶν ἀνθρώπων
  english_pob_choice: the remnant of mankind
  chosen_spanish: el remanente de la humanidad
  alternatives_spanish:
  - el remanente de los hombres
  - el resto de la humanidad
  lexicon: BDAG
  rationale: «Remanente» conserva el matiz profético de los restantes; «humanidad» reproduce el valor genérico de τῶν ἀνθρώπων sin restringirlo a varones.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: BDAG
  rationale: 'Se conserva el artículo implícito del griego en la forma natural española con objeto directo personal: «al Señor».'
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the Gentiles
  chosen_spanish: todos los gentiles
  alternatives_spanish:
  - todas las naciones
  lexicon: BDAG
  rationale: En el contexto de Hechos 15, el tema es la inclusión de no judíos; por eso «gentiles» comunica mejor la fuerza contextual. Se mantiene la alternativa «naciones» en nota por el trasfondo profético.
- source_word: ἐφ’ οὓς ἐπικέκληται τὸ ὄνομά μου ἐπ’ αὐτούς
  english_pob_choice: on whom my name has been called
  chosen_spanish: sobre quienes ha sido invocado mi nombre
  alternatives_spanish:
  - sobre quienes se ha llamado mi nombre
  - que son llamados por mi nombre
  lexicon: BDAG
  rationale: La pasiva perfecta idiomática se vierte con naturalidad como «ha sido invocado mi nombre», conservando la idea de pertenencia/identificación por el nombre divino. «Sobre quienes» refleja el ἐπί repetido sin volver el español forzado.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - dice el Señor
  lexicon: BDAG
  rationale: Se mantiene la fórmula profética breve y directa. En este contexto, el griego κύριος cita la fórmula de escritura; el español conserva la voz profética con «dice el Señor».
- source_word: ποιῶν ταῦτα
  english_pob_choice: who does these things
  chosen_spanish: que hace estas cosas
  alternatives_spanish:
  - que realiza estas cosas
  - que obra estas cosas
  lexicon: BDAG
  rationale: El participio presente se expresa de forma relativa y continua en español, manteniendo la agencia divina sin cargar el estilo.
theological_decisions:
- issue: ἔθνη en contexto de inclusión judío-gentil
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: El debate de Hechos 15 trata de la incorporación de no judíos al pueblo de Dios; «gentiles» transmite mejor esa referencia inmediata. La alternativa «naciones» se conserva porque el eco de Amós también puede sentirse en ese nivel más amplio.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nombre divino y fórmula citacional en λέγει κύριος
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה en el texto principal, aquí el griego citado funciona como fórmula profética de la Escritura recibida. En español, «dice el Señor» reproduce esa fórmula con claridad y sin forzar la cita en una sola dirección textual.
  doctrine_reference: Project terminology defaults; Acts 15:17 citation practice
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios, y se respetó el alto nivel de acuerdo del control cruzado. La redacción española mantiene el valor de cita profética, la referencia a la inclusión de gentiles y el modismo de pertenencia por el nombre.
  spanish_consistency_notes:
  - Se mantuvo «gentiles» en el cuerpo principal por coherencia con el uso contextual de Hechos 15, con nota para «naciones».
  - Se evitó «SEÑOR» como máscara tipográfica y se usó «Señor» en una fórmula profética natural en español.
  - «Remanente» conserva el matiz de los restantes y armoniza con el trasfondo profético de la cita.
  - El objeto directo personal se expresó con «al Señor» y el pasivo idiomático con «ha sido invocado mi nombre» para conservar claridad y fidelidad.
