translation:
  language: es
  text: Por tanto, hemos enviado a Judas y a Silas, quienes personalmente les comunicarán lo mismo de viva voz.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «por palabra»; es decir, por comunicación hablada, además de la carta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεστάλκαμεν
  english_pob_choice: we have sent
  chosen_spanish: hemos enviado
  alternatives_spanish:
  - enviamos
  lexicon: BDAG
  rationale: El perfecto griego conserva la relevancia presente del envío; en español, «hemos enviado» comunica naturalmente ese resultado vigente sin perder la fuerza epistolar.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Expresa con claridad la relación inferencial con lo anterior, manteniendo el valor conclusivo del conector griego.
- source_word: Ἰούδαν καὶ Σιλᾶν
  english_pob_choice: Judas and Silas
  chosen_spanish: Judas y Silas
  alternatives_spanish:
  - Judas y Silas
  lexicon: transliteración estándar
  rationale: Se conservan los nombres propios de manera directa, conforme al uso bíblico en español.
- source_word: αὐτοὺς
  english_pob_choice: who themselves
  chosen_spanish: quienes ellos mismos
  alternatives_spanish:
  - quienes mismos
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre griego añade énfasis; «quienes ellos mismos» mantiene esa explicitación y su función de reforzar que estos mensajeros confirmarán personalmente el contenido.
- source_word: διὰ λόγου
  english_pob_choice: by word of mouth
  chosen_spanish: por palabra de boca
  alternatives_spanish:
  - de viva voz
  - oralmente
  - por medio de la palabra
  lexicon: BDAG
  rationale: La expresión griega contrasta con la carta escrita y se refiere a comunicación oral. «Por palabra de boca» refleja de manera transparente la imagen literal subyacente, sin borrar el contraste con lo escrito.
- source_word: ἀπαγγέλλοντας
  english_pob_choice: will report
  chosen_spanish: comunicarán
  alternatives_spanish:
  - informarán
  - dirán
  - anunciarán
  lexicon: BDAG
  rationale: Aunque formalmente es participio presente, en esta construcción describe la acción esperada de los enviados. «Comunicarán» expresa adecuadamente la función de transmitir el contenido del mensaje.
- source_word: τὰ αὐτά
  english_pob_choice: the same things
  chosen_spanish: las mismas cosas
  alternatives_spanish:
  - el mismo mensaje
  - lo mismo
  lexicon: BDAG
  rationale: La referencia apunta al contenido ya expresado en la carta. «Las mismas cosas» sigue de cerca el griego y evita interpretar el referente como «mensaje» más de lo que el texto exige.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La traducción mantiene el valor del perfecto, el énfasis del pronombre y el contraste entre comunicación escrita y oral sin requerir marcadores de nota.
  spanish_consistency_notes:
  - Se mantuvo «Judas» y «Silas» como nombres propios sin adaptar a formas eclesiásticas.
  - Se evitó «SEÑOR» o terminología teológica ajena al versículo, porque aquí no aparecen términos divinos directos.
  - «Por palabra de boca» conserva la oralidad del contraste con la carta, aunque suene más literal que una paráfrasis idiomática; se eligió por fidelidad al rastro de decisión del POB en inglés.
