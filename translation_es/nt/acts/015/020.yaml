translation:
  language: es
  text: sino escribirles que se abstengan de las contaminaciones de los ídolos[a], de la inmoralidad sexual[b], de lo estrangulado[c] y de la sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contaminaciones asociadas con los ídolos»; algunas traducciones lo restringen a «lo sacrificado a los ídolos», pero el griego aquí es más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «fornicación»; el término griego puede denotar inmoralidad sexual en general, y algunos lo entienden aquí más específicamente como uniones sexuales prohibidas.
    reason: alternative_reading
  - marker: c
    text: Literalmente, «lo estrangulado», referido a carne de un animal no desangrado debidamente.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπιστεῖλαι
  english_pob_choice: to write
  chosen_spanish: escribirles
  alternatives_spanish:
  - darles instrucciones por carta
  - enviarles un mensaje escrito
  lexicon: BDAG
  rationale: El infinitivo aoristo de ἐπιστέλλω en este contexto de un concilio y una carta se refiere a comunicar una directriz por escrito. «Escribirles» es natural en español y conserva el sentido epistolar.
- source_word: ἀπέχεσθαι
  english_pob_choice: to abstain from
  chosen_spanish: se abstuvieran de
  alternatives_spanish:
  - se mantuvieran alejados de
  - se refrenaran de
  lexicon: BDAG
  rationale: El verbo medio expresa abstenerse o apartarse de algo. «Abstenerse de» es la equivalencia más clara y usual en este contexto moral y normativo.
- source_word: ἀλισγημάτων
  english_pob_choice: pollutions
  chosen_spanish: contaminaciones
  alternatives_spanish:
  - impurezas
  - profanaciones
  lexicon: BDAG
  rationale: ἀλίσγημα tiene un matiz de contaminación o profanación ritual/cultual. «Contaminaciones» conserva ese campo semántico sin reducirlo indebidamente a una sola práctica alimentaria.
- source_word: τῶν εἰδώλων
  english_pob_choice: of idols
  chosen_spanish: de los ídolos
  alternatives_spanish:
  - relacionadas con los ídolos
  - procedentes de los ídolos
  lexicon: BDAG
  rationale: El genitivo puede entenderse como pertenencia, relación o procedencia cultual. «De los ídolos» sigue de cerca el griego y deja abierta la amplitud del vínculo idolátrico sin estrecharlo a una sola clase de comida.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - relaciones sexuales ilícitas
  lexicon: BDAG
  rationale: πορνεία tiene un alcance amplio que no conviene estrechar con un término arcaico o demasiado específico. «Inmoralidad sexual» comunica bien su amplitud en español contemporáneo y mantiene el peso moral del término.
- source_word: τοῦ πνικτοῦ
  english_pob_choice: what has been strangled
  chosen_spanish: lo estrangulado
  alternatives_spanish:
  - lo asfixiado
  - la carne estrangulada
  lexicon: BDAG
  rationale: πνικτός designa lo sacrificado/killed by strangling, con la idea de un animal no desangrado correctamente. «Lo estrangulado» preserva la forma sustantivada del griego sin añadir «carne» donde el texto no la expresa explícitamente.
- source_word: τοῦ αἵματος
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre
  - el consumo de sangre
  lexicon: BDAG
  rationale: El sustantivo se traduce de forma directa como «sangre». Aunque el contexto apunta a abstenerse de ingerirla o usarla ritualmente, el español no debe especificar más allá del griego en el texto principal.
theological_decisions:
- issue: Alcance de la prohibición ligada a los ídolos
  english_pob_reading: Rendered literally as 'the pollutions of idols' rather than interpreting more narrowly as only 'food sacrificed to idols.'
  chosen_spanish_reading: «las contaminaciones de los ídolos»
  alternative_spanish_readings:
  - «lo sacrificado a los ídolos»
  - «los alimentos ofrecidos a los ídolos»
  - «las cosas contaminadas por los ídolos»
  rationale: El griego usa ἀλισγημάτων τῶν εἰδώλων, no el término más específico para comida ofrecida a ídolos. La traducción mantiene la amplitud cultual y no introduce una restricción que el texto no formula.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de πορνεία en el decreto apostólico
  english_pob_reading: Translated broadly as 'sexual immorality' without resolving whether the reference is general sexual sin or specifically prohibited unions under Levitical/Jewish categories.
  chosen_spanish_reading: «inmoralidad sexual»
  alternative_spanish_readings:
  - «fornicación»
  - «uniones sexuales prohibidas»
  - «relaciones sexuales ilícitas»
  rationale: El término puede abarcar inmoralidad sexual en general o, en este contexto, prácticas sexuales prohibidas bajo categorías judías/levíticas. El texto español conserva esa amplitud sin cerrar la discusión interpretativa.
  doctrine_reference: Translation philosophy §3
- issue: Alcance normativo de la lista apostólica
  english_pob_reading: Kept the list as abstentions without implying whether these are temporary table-fellowship measures or universally binding moral commands.
  chosen_spanish_reading: La lista queda como abstenciones, sin precisar su duración o función teológica.
  alternative_spanish_readings:
  - Mandatos temporales para la comunión entre judíos y gentiles
  - Mandatos morales permanentes para todos los creyentes
  rationale: El versículo en sí enumera prohibiciones, pero no explica su duración ni el marco teológico completo. La traducción evita imponer una conclusión doctrinal que el texto no desarrolla.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés POB, sin cambios adicionales respecto a la última revisión aprobada. Se preserva la amplitud de ἀλισγημάτων τῶν εἰδώλων, el alcance de πορνεία y la literalidad sustantivada de πνικτοῦ.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Jesús»/«Espíritu» según el uso estándar del proyecto; este versículo no contiene esos términos.
  - Se usa una sintaxis natural en español («escribirles que se abstuvieran de…») para reflejar el infinitivo final griego sin sobre-interpretarlo.
  - «La sangre» se conserva sin glosa en el texto principal para no estrechar el mandato más allá del griego.
