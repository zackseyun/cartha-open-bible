  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: carta/directriz escrita, abstenerse, contaminación idolátrica en sentido amplio, πορνεία como categoría amplia, lo estrangulado y la sangre. También preserva adecuadamente las notas del English POB sobre la amplitud de ἀλισγήματα y de πορνεία.'
  spanish_quality_summary: 'La redacción es clara y natural, pero hay un problema gramatical importante: «escribirles que se abstuvieran» desplaza el infinitivo griego dependiente y suena como estilo indirecto pasado, menos fiel al texto base. En español es mejor «escribirles que se abstengan de…» o «escribirles que se abstuvieran» solo en un marco narrativo distinto; aquí el infinitivo complementario del decreto se refleja mejor con presente de subjuntivo. El resto es legible y digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Inmoralidad sexual» refleja bien πορνεία; «contaminaciones de los ídolos» mantiene la amplitud documentada; «lo estrangulado» conserva el valor sustantivado; «la sangre» es aceptable en español.
  issues:
  - severity: medium
    issue: «se abstuvieran» no refleja bien la construcción infinitiva del griego en este contexto
    rationale: El griego tiene ἐπιστεῖλαι… τοῦ ἀπέχεσθαι, 'escribir… que se abstengan / para que se abstengan'. En español, «escribirles que se abstuvieran» introduce un imperfecto de subjuntivo que suena retrospectivo o de estilo indirecto dependiente de un verbo en pasado no presente aquí. «Escribirles que se abstengan» es más natural y más fiel al valor directivo del texto.
