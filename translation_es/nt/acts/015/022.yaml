translation:
  language: es
  text: 'Entonces pareció bien a los apóstoles y a los ancianos, junto con toda la iglesia, elegir hombres de entre ellos y enviarlos a Antioquía con Pablo y Bernabé: Judas, llamado Barsabás, y Silas, hombres destacados[a] entre los hermanos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres que eran dirigentes entre los hermanos».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí probablemente se refiere a la comunidad de creyentes en sentido amplio, incluyendo mujeres.
    reason: cultural_note
lexical_decisions:
- source_word: ἔδοξε
  english_pob_choice: it seemed good
  chosen_spanish: pareció bien
  alternatives_spanish:
  - se decidió
  - gustó
  lexicon: BDAG
  rationale: En un contexto deliberativo, ‘pareció bien’ conserva el matiz de juicio colectivo sin convertirlo en una orden formal más fuerte de lo que el griego exige.
- source_word: πρεσβυτέροις
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  lexicon: BDAG
  rationale: ‘Ancianos’ es el equivalente natural y eclesialmente inteligible en español; ‘presbíteros’ sería más técnico y menos directo para lectores generales.
- source_word: σὺν ὅλῃ τῇ ἐκκλησίᾳ
  english_pob_choice: together with the whole church
  chosen_spanish: junto con toda la iglesia
  alternatives_spanish:
  - con toda la asamblea
  - junto con toda la congregación
  lexicon: BDAG
  rationale: ‘Iglesia’ refleja el uso de ἐκκλησία en Hechos para la comunidad cristiana reunida, y ‘junto con’ conserva la fuerza de σύν.
- source_word: ἐκλεξαμένους ἄνδρας
  english_pob_choice: to choose men
  chosen_spanish: elegir hombres
  alternatives_spanish:
  - escoger hombres
  - seleccionar hombres
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa de modo natural en español como ‘elegir’; ‘hombres’ mantiene el valor masculino explícito de ἄνδρας.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de su propio grupo
  - de entre los suyos
  lexicon: BDAG
  rationale: ‘De entre ellos’ comunica con claridad que los delegados salieron del mismo grupo de la iglesia de Jerusalén.
- source_word: πέμψαι
  english_pob_choice: send
  chosen_spanish: enviarlos
  alternatives_spanish:
  - mandarlos
  - remitirlos
  lexicon: BDAG
  rationale: ‘Enviar’ es el verbo natural para la comisión de delegados; en español se integra bien con el infinitivo de propósito implícito.
- source_word: σὺν τῷ Παύλῳ καὶ Βαρναβᾷ
  english_pob_choice: with Paul and Barnabas
  chosen_spanish: con Pablo y Bernabé
  alternatives_spanish:
  - junto con Pablo y Bernabé
  lexicon: BDAG
  rationale: Se conserva el sentido de acompañamiento con la forma estándar de los nombres propios en español.
- source_word: καλούμενον
  english_pob_choice: who was called
  chosen_spanish: llamado
  alternatives_spanish:
  - conocido como
  - que era llamado
  lexicon: BDAG
  rationale: ‘Llamado’ reproduce de modo fiel y fluido el participio descriptivo aplicado a Judas/Barsabás.
- source_word: ἄνδρας ἡγουμένους ἐν τοῖς ἀδελφοῖς
  english_pob_choice: leading men among the brothers
  chosen_spanish: hombres que eran dirigentes entre los hermanos
  alternatives_spanish:
  - hombres principales entre los hermanos
  - hombres que guiaban entre los hermanos
  lexicon: BDAG
  rationale: ‘Dirigentes’ expresa el valor de ἡγουμένους como personas con liderazgo reconocido sin imponer un cargo técnico específico; la frase mantiene la relación con ἐν τοῖς ἀδελφοῖς. ‘Hermanos’ conserva la forma del texto griego y su uso comunitario.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los creyentes
  - los hermanos y hermanas
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego, que en el contexto puede representar a la comunidad creyente; el texto principal no se neutraliza, pero el valor inclusivo queda explicado en nota.
theological_decisions:
- issue: Participación de toda la iglesia en la decisión
  english_pob_reading: The wording includes the whole church alongside the apostles and elders in approving the selection and sending of delegates.
  chosen_spanish_reading: La decisión aparece tomada con la participación conjunta de apóstoles, ancianos y toda la iglesia.
  alternative_spanish_readings:
  - Solo los apóstoles y los ancianos decidieron formalmente, y la iglesia solo estuvo presente
  rationale: La frase σὺν ὅλῃ τῇ ἐκκλησίᾳ se preserva de manera directa, sin reducir la participación de la iglesia ni imponer un modelo eclesiológico que el versículo no explicita.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Alcance de ἀδελφοῖς
  english_pob_reading: brothers in the main text, with inclusive sense preserved in a footnote
  chosen_spanish_reading: hermanos en el texto principal, con la posibilidad de sentido inclusivo señalada en nota
  alternative_spanish_readings:
  - hermanos y hermanas
  - miembros
  rationale: El griego usa plural masculino y el POB inglés conserva esa forma por precisión lexical. En español se mantiene ‘hermanos’ y se anota su posible referencia amplia a la comunidad creyente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: This draft follows the latest audited English revision, including the final phrasing ‘leading men among the brothers,’ and preserves the deliberative force of δοκέω without overstating institutional decree. It also retains the masculine plural form where the source does, while making the inclusivity issue explicit in a Spanish note rather than flattening it in the main text.
  spanish_consistency_notes:
  - ‘Yahvé’ no aparece en este versículo; no se requiere decisión sobre el nombre divino.
  - Se mantiene la terminología eclesial básica como ‘iglesia’, ‘ancianos’ y ‘apóstoles’ de forma consistente con el registro de Hechos.
  - Se evitó ‘siervos’ para δοῦλος porque no aparece en el texto; no se introdujo terminología ajena al versículo.
  - La puntuación con dos puntos antes de la lista nominal refleja bien la estructura explicativa del griego y la práctica editorial del POB.
