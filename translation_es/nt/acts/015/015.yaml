translation:
  language: es
  text: 'Y con esto concuerdan las palabras de los profetas[a], tal como está escrito:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a esto concuerdan las palabras de los profetas». El dativo griego puede representarse en español de más de una manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y además
  lexicon: BDAG
  rationale: Conecta de manera natural con el argumento precedente de Santiago; en español, «Y» conserva la continuidad discursiva sin añadir matiz no presente en el griego.
- source_word: τούτῳ
  english_pob_choice: with this
  chosen_spanish: con esto
  alternatives_spanish:
  - a esto
  - con ello
  lexicon: BDAG
  rationale: El dativo demostrativo es amplio y remite a lo dicho o al asunto inmediato; «con esto» preserva esa referencia abierta sin especificarla más allá de la evidencia.
- source_word: συμφωνοῦσιν
  english_pob_choice: agree
  chosen_spanish: concuerdan
  alternatives_spanish:
  - están de acuerdo
  - armonizan
  lexicon: BDAG
  rationale: «Concuerdan» expresa mejor en español la idea de concordancia con algo anterior y evita una construcción forzada con «acordar» o una paráfrasis excesiva.
- source_word: οἱ λόγοι
  english_pob_choice: the words
  chosen_spanish: los dichos
  alternatives_spanish:
  - las palabras
  - los dichos proféticos
  lexicon: BDAG
  rationale: Aquí λόγοι se refiere a enunciados proféticos en forma textual. «Dichos» mantiene el sentido de pronunciaciones o declaraciones y suena más natural que «palabras» en este contexto.
- source_word: τῶν προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - de los profetas de antaño
  lexicon: BDAG
  rationale: 'Genitivo de pertenencia/origen: son los enunciados pertenecientes a los profetas. Se conserva la forma simple y directa.'
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: Introducción comparativa de cita escrituraria. «Tal como» preserva la correspondencia entre el argumento de Santiago y la Escritura con un español claro y digno.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: Fórmula habitual de citación bíblica; «está escrito» es fiel, idiomática y mantiene la fuerza de autoridad de la referencia escrita.
theological_decisions:
- issue: Referente amplio de τούτῳ
  english_pob_reading: A neuter demonstrative referring to the preceding claim/event, rendered impersonally as 'this' rather than specifying a doctrinal interpretation.
  chosen_spanish_reading: Un demostrativo neutro que remite al asunto inmediatamente anterior, traducido de forma abierta como «esto».
  alternative_spanish_readings:
  - la conversión de los gentiles
  - la declaración de Pedro
  - este plan de Dios
  rationale: El griego no precisa el referente en una sola fórmula doctrinal. La traducción conserva la amplitud semántica y evita cerrar la interpretación.
  doctrine_reference: Preservar la tensión interpretativa donde el texto no la resuelve explícitamente.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece exactamente en el texto base, anclado en «profetas[a]». Se mantuvo la equivalencia óptima y la amplitud del referente sin estrechar el sentido.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes, porque este versículo no contiene el nombre divino.
  - «Profetas» se mantiene en plural con sentido genitivo de pertenencia/origen.
  - «Está escrito» conserva la fórmula escritural estándar sin añadir contenido interpretativo.
  - La elección de «dichos» para λόγοι evita un calco rígido y mantiene el tono profético del contexto.
