lexical_decisions:
- source_word: Βαρναβᾶς
  english_pob_choice: Barnabas
  chosen_spanish: Bernabé
  alternatives_spanish:
  - Barnabas
  lexicon: BDAG
  rationale: Nombre propio. En español bíblico, «Bernabé» es la forma usual y reconocible; se mantiene la referencia al mismo personaje sin forzar una transliteración menos natural.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: La partícula introduce contraste con el contexto inmediato, así que «Pero» reproduce mejor el matiz adversativo suave que una simple coordinación.
- source_word: ἐβούλετο
  english_pob_choice: wanted
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - pretendía
  lexicon: BDAG
  rationale: El imperfecto de βούλομαι expresa la disposición o intención de Bernabé en el relato. «Quería» es natural en español y conserva el sentido volitivo sin añadir deliberación excesiva.
- source_word: συμπαραλαβεῖν
  english_pob_choice: to take along
  chosen_spanish: llevar consigo
  alternatives_spanish:
  - llevar con él
  - tomar consigo
  - llevar junto con ellos
  lexicon: BDAG
  rationale: El compuesto indica tomar a alguien en compañía. «Llevar consigo» comunica de manera idiomática que Juan acompañaría al grupo, sin perder la relación de compañía del verbo griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: El adverbio/p partícula aporta suma enfática junto al objeto. «También» conserva la fuerza aditiva con fluidez natural en español.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan Marcos
  lexicon: BDAG
  rationale: Nombre propio; se traduce con la forma española habitual «Juan».
- source_word: τὸν καλούμενον Μᾶρκον
  english_pob_choice: who was called Mark
  chosen_spanish: llamado Marcos
  alternatives_spanish:
  - que era llamado Marcos
  - también llamado Marcos
  - conocido como Marcos
  lexicon: BDAG
  rationale: El participio presente pasivo identifica a Juan por su otro nombre. «Llamado Marcos» es conciso y fiel; el pronombre relativo implícito en español puede omitirse sin pérdida de sentido.
- source_word: Μᾶρκον
  english_pob_choice: Mark
  chosen_spanish: Marcos
  alternatives_spanish:
  - Marco
  lexicon: BDAG
  rationale: Nombre propio en su forma española tradicional y ampliamente reconocida.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa auditada coinciden en el sentido general: la adversativa de δὲ, la intención de ἐβούλετο, la acción de συμπαραλαβεῖν y la identificación de Juan con el nombre Marcos. La versión española conserva esa relación sin añadir elementos interpretativos.'
  spanish_consistency_notes:
  - Se emplea «Bernabé» y «Marcos», formas usuales en español bíblico, sin alterar la identificación del personaje.
  - «También» se coloca cerca del objeto para reflejar la posición enfática de καὶ en el griego.
  - La nota al pie preserva la alternativa de ordenamiento nominal que el audit trail inglés consideró válida.
