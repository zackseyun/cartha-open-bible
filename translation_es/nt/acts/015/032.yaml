translation:
  language: es
  text: Judas y Silas[a], quienes también eran profetas, animaron largamente a los hermanos y los fortalecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hermanos y hermanas'; el griego dice 'hermanos' y puede referirse a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: BDAG
  rationale: Es la transliteración usual del nombre propio en Hechos; 'Judá' sugeriría el patriarca o la tribu, no esta persona.
- source_word: Σιλᾶς
  english_pob_choice: Silas
  chosen_spanish: Silas
  lexicon: BDAG
  rationale: Nombre propio con forma estable en español bíblico.
- source_word: καὶ αὐτοὶ προφῆται ὄντες
  english_pob_choice: who were themselves prophets
  chosen_spanish: que eran ellos mismos profetas
  alternatives_spanish:
  - siendo ellos mismos profetas
  - pues ellos mismos eran profetas
  lexicon: BDAG
  rationale: La construcción participial explica quiénes eran Judas y Silas; 'ellos mismos' conserva el énfasis de αὐτοὶ, y 'eran' comunica con naturalidad el trasfondo descriptivo.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  lexicon: BDAG
  rationale: Término directo y transparente; no hay motivo para suavizarlo o sustituirlo.
- source_word: διὰ λόγου πολλοῦ
  english_pob_choice: at length
  chosen_spanish: durante mucho tiempo
  alternatives_spanish:
  - con muchas palabras
  - en un largo mensaje
  - por mucho hablar
  lexicon: BDAG
  rationale: La expresión señala una exhortación prolongada. En español, 'durante mucho tiempo' comunica la extensión temporal sin sonar mecánico; se mantiene la idea de ministerio verbal abundante.
- source_word: παρεκάλεσαν
  english_pob_choice: encouraged
  chosen_spanish: exhortaron
  alternatives_spanish:
  - animaron
  - alentaron
  - consolaron
  lexicon: BDAG
  rationale: Aquí παρακαλέω tiene fuerza de exhortación/ánimo pastoral en contexto profético. 'Exhortaron' conserva mejor la intensidad de la apelación que un mero 'animaron'.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego. En el contexto de la comunidad creyente, el masculino puede ser representativo; la nota de pie preserva la posible inclusión del grupo entero.
- source_word: ἐπεστήριξαν
  english_pob_choice: strengthened them
  chosen_spanish: los fortalecieron
  alternatives_spanish:
  - los confirmaron
  - los afianzaron
  lexicon: BDAG
  rationale: Verbo de hacer firme/fortalecer. 'Los fortalecieron' conserva el sentido y enlaza naturalmente con 'exhortaron' como segunda acción distinta.
theological_decisions:
- issue: Alcance de 'los hermanos' en un contexto comunitario mixto
  english_pob_reading: the brothers; may refer to the whole believing community
  chosen_spanish_reading: a los hermanos[a]
  alternative_spanish_readings:
  - a los hermanos y hermanas
  - a los creyentes
  rationale: Se conserva el masculino plural del texto griego y el lenguaje del POB en la línea principal. La nota hace explícito que puede referirse a toda la comunidad de fe.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se corrigió la omisión del marcador de nota: la marca [a] aparece ahora en el texto principal junto a ''hermanos''. La redacción mantiene la distinción de dos acciones verbales en el verso y conserva el énfasis de αὐτοί.'
  spanish_consistency_notes:
  - Se usa 'Judas' y 'Silas' como nombres propios estables en español bíblico.
  - '''Exhortaron'' refleja mejor la fuerza pastoral de παρακαλέω en este contexto que un simple ''animaron''.'
  - Se conserva el masculino plural 'hermanos' con nota inclusiva, conforme al auditoría inglesa.
  - '''Los fortalecieron'' mantiene la segunda acción verbal como complemento distinto de la primera.'
