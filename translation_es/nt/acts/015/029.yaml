- from: Abstenerse de lo sacrificado a los ídolos[a], de la sangre, de lo estrangulado[b] y de la inmoralidad sexual[c]. Si se guardan de estas cosas, harán bien. ¡Que les vaya bien![d]
  to: abstenerse de lo sacrificado a los ídolos[a], de la sangre, de lo estrangulado[b] y de la inmoralidad sexual[c]. Si se guardan de estas cosas, harán bien. Adiós.[d]
  rationale: 'Se hicieron ajustes menores pero importantes para alinear mejor el español con el registro y las decisiones auditadas del POB inglés: se reemplazó «¡Que les vaya bien!» por «Adiós.» como despedida epistolar más fiel; se eliminó la nota textual problemática sobre πνικτῶν y se restauró la alternativa léxica documentada; y se normalizó la minúscula inicial de «abstenerse».'
