translation:
  language: es
  text: abstenerse de lo sacrificado a los ídolos[a], de la sangre, de lo estrangulado[b] y de la inmoralidad sexual[c]. Si se guardan de estas cosas, harán bien. Adiós.[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas sacrificadas a los ídolos».
    reason: lexical_alternative
  - marker: b
    text: O «la carne estrangulada» o «las cosas estranguladas».
    reason: lexical_alternative
  - marker: c
    text: El término griego πορνεία puede entenderse en sentido amplio, aunque algunos intérpretes lo toman aquí de manera más específica a la luz de las prohibiciones de Levítico.
    reason: alternative_reading
  - marker: d
    text: O «Manténganse bien». El griego es una fórmula convencional de cierre epistolar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχεσθαι
  english_pob_choice: to abstain
  chosen_spanish: abstenerse de
  alternatives_spanish:
  - mantenerse alejados de
  - apartarse de
  - no tomar parte en
  lexicon: BDAG
  rationale: 'El infinitivo presente medio ἀπέχεσθαι expresa el contenido de la instrucción: deben abstenerse de ciertas prácticas. ''Abstenerse de'' es el equivalente castellano más preciso y digno, igual de conciso que el inglés ''to abstain'', y preserva la fuerza formal del infinitivo en el contexto de la carta.'
- source_word: εἰδωλοθύτων
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - las cosas sacrificadas a los ídolos
  - la carne ofrecida a los ídolos
  - los sacrificios de ídolos
  lexicon: BDAG
  rationale: El adjetivo sustantivado εἰδωλόθυτον en genitivo plural neutro abarca todo aquello ofrecido en culto a ídolos, especialmente alimentos. La locución neutra 'lo sacrificado a los ídolos' refleja mejor el sustantivo griego amplio (no solo carne) y evita el calco más torpe 'sacrificios de ídolos'. La variante 'las cosas sacrificadas' se preserva en nota.
- source_word: αἵματος
  english_pob_choice: blood
  chosen_spanish: la sangre
  lexicon: BDAG
  rationale: Genitivo neutro singular de αἷμα tras ἀπέχεσθαι. 'La sangre' es la traducción directa y sin ambigüedad. El contexto es prohibitorio-alimentario, pero el griego simplemente dice 'sangre', por lo que la traducción mantiene esa concisión.
- source_word: πνικτῶν
  english_pob_choice: what has been strangled
  chosen_spanish: lo estrangulado
  alternatives_spanish:
  - la carne estrangulada
  - las cosas estranguladas
  - lo ahogado
  lexicon: BDAG
  rationale: El adjetivo πνικτός usado como sustantivo en genitivo plural neutro designa animales matados por estrangulamiento, es decir, sin sangrar adecuadamente. 'Lo estrangulado' reproduce la forma sustantival neutra amplia del griego con igual economía de palabras que el inglés 'what has been strangled'. El SBLGNT marca este término con ⸀ indicando una variante textual (posiblemente en la forma o el contexto de la transmisión), lo que se consigna en nota.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: la inmoralidad sexual
  alternatives_spanish:
  - la fornicación
  - la inmoralidad sexual en sentido amplio
  - la conducta sexual ilícita
  lexicon: BDAG
  rationale: πορνεία tiene un campo semántico más amplio que la simple relación prematrimonial y en castellano contemporáneo se representa mejor con 'inmoralidad sexual'. 'Fornicación' es demasiado restringido y arcaico según la filosofía de traducción por equivalencia óptima. Se preserva la tensión teológica sobre el alcance del término en la decisión teológica correspondiente.
- source_word: ἐξ ὧν
  english_pob_choice: from these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de las cuales
  - de lo cual
  lexicon: BDAG
  rationale: La frase relativa ἐξ ὧν remite a las cuatro prohibiciones listadas. 'De estas cosas' explicita el antecedente de manera natural en español, siguiendo la misma decisión del POB inglés, y evita la ambigüedad de género y número que introduce 'de las cuales' con un referente mixto.
- source_word: διατηροῦντες ἑαυτούς
  english_pob_choice: If you keep yourselves
  chosen_spanish: si se guardan
  alternatives_spanish:
  - guardándose
  - manteniéndose apartados
  - al guardarse
  lexicon: BDAG
  rationale: El participio presente activo nominativo plural διατηροῦντες con el reflexivo ἑαυτούς expresa la condición de observancia de las prohibiciones. Aunque la construcción es formalmente participial ('guardándose de estas cosas'), el sentido es condicional, por lo que 'si se guardan' preserva esa fuerza en español sin sacrificar claridad. Se adopta el español neutro latinoamericano (se guardan) en lugar del peninsular (se guardan / os guardáis).
- source_word: εὖ πράξετε
  english_pob_choice: you will do well
  chosen_spanish: harán bien
  alternatives_spanish:
  - obrarán bien
  - procederán correctamente
  - saldrán bien
  lexicon: BDAG
  rationale: El adverbio εὖ con el futuro indicativo de πράσσω forma un modismo que expresa que el cumplimiento es la conducta correcta y encomiable. 'Harán bien' es el equivalente castellano más natural y directo, y encaja perfectamente con el tono epistolar de la carta.
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Que les vaya bien!
  alternatives_spanish:
  - ¡Sean fuertes!
  - ¡Que estén bien!
  - ¡Saludos!
  - Adiós
  lexicon: BDAG
  rationale: El perfecto medio imperativo ἔρρωσθε (de ῥώννυμι, 'fortalecer') funciona en los cierres de cartas antiguas como fórmula epistolar convencional equivalente a 'Farewell' en inglés. En español neutro latinoamericano, '¡Que les vaya bien!' reproduce ese cierre convencional de modo natural y digno, sin el arcaísmo de 'Adiós' ni la literalidad forzada de '¡Sean fuertes!'.
theological_decisions:
- issue: Alcance de πορνεία en el decreto apostólico
  english_pob_reading: Rendered broadly as 'sexual immorality' without narrowing it to one specific sexual offense.
  chosen_spanish_reading: la inmoralidad sexual
  alternative_spanish_readings:
  - la fornicación
  - las uniones ilícitas (conforme a Lev 18)
  - la inmoralidad sexual en sentido específico levítico
  rationale: El término πορνεία puede entenderse en sentido amplio (toda inmoralidad sexual) o, en el contexto específico del Concilio de Jerusalén, de modo más acotado como alusión a las uniones prohibidas en Levítico 18 que afectaban a los gentiles en contacto con la comunidad judía. El versículo en sí no estrecha explícitamente el término, por lo que la traducción preserva el valor léxico amplio en el texto principal y consigna la tensión interpretativa en nota (marcador [c]), siguiendo el principio del POB de preservar la tensión teológica antes que resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Variante textual ⸀πνικτῶν en SBLGNT
  english_pob_reading: what has been strangled (translating πνικτῶν as present in the SBLGNT text)
  chosen_spanish_reading: lo estrangulado
  alternative_spanish_readings:
  - omisión del término (tradición occidental)
  - la carne estrangulada
  rationale: El SBLGNT señala con ⸀ una variante en torno a πνικτῶν. El texto occidental (Códice Beza y aliados) omite este término y reemplaza las cuatro prohibiciones por tres más la Regla de Oro. El POB inglés sigue el texto SBLGNT que incluye πνικτῶν, y la traducción española hace lo mismo, consignando la cuestión textual en nota [b] para que el lector pueda auditar la decisión.
  doctrine_reference: Transparencia textual; el POB sigue la edición SBLGNT como texto base declarado.
translation_notes:
  revision_awareness: 'El paso de revisión más reciente del POB inglés (modelo gpt-5.4, 2026-04-23) concluyó que no se necesitaban cambios, y la verificación cruzada arrojó acuerdo pleno (1.0). Este borrador español parte del texto griego SBLGNT como fuente primaria, empleando la pista de auditoría del POB inglés como contexto de referencia, no como texto base de traducción mecánica. No se registran revisiones previas aplicadas (applied_revisions: []).'
  spanish_consistency_notes:
  - El nombre divino Yahvé no aparece en este versículo; la terminología del proyecto para YHWH no requiere aplicación aquí.
  - 'Se usa español neutro latinoamericano a lo largo del texto (verbos en tercera persona plural formal: ''se guardan'', ''harán'', ''les vaya bien'') en lugar de las formas peninsulares de segunda persona plural.'
  - '''Inmoralidad sexual'' se adopta como equivalente de πορνεία conforme a los valores léxicos por defecto del proyecto, evitando el arcaísmo ''fornicación''.'
  - Los marcadores de nota ([a]–[d]) se posicionan en el texto español en los términos fuente correspondientes, corrigiendo la agrupación de marcadores que aparece al final de la frase en el POB inglés.
  - 'Se mantiene la puntuación española convencional: punto y coma implícito sustituido por punto entre las dos cláusulas principales; signos de admiración de apertura en el cierre epistolar conforme a la norma ortográfica española.'
