translation:
  language: es
  text: 'Después de algunos días, Pablo le dijo a Bernabé: «Volvamos ahora y visitemos a los hermanos[a] en cada ciudad donde proclamamos la palabra del Señor, y veamos cómo están».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hermanos y hermanas»; el griego dice «hermanos» y puede usar el término masculino de manera representativa para todo el grupo de creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δέ τινας ἡμέρας
  english_pob_choice: After some days
  chosen_spanish: Después de algunos días
  alternatives_spanish:
  - Luego de algunos días
  - Pasados algunos días
  lexicon: BDAG
  rationale: Con μετά + acusativo de tiempo, el sentido es un intervalo posterior e indefinido. «Después de algunos días» conserva ese valor sin precisar más de lo que dice el griego.
- source_word: εἶπεν πρὸς Βαρναβᾶν Παῦλος
  english_pob_choice: Paul said to Barnabas
  chosen_spanish: Pablo le dijo a Bernabé
  alternatives_spanish:
  - Pablo dijo a Bernabé
  - Pablo habló a Bernabé
  lexicon: BDAG
  rationale: El griego presenta a Pablo como hablante dirigido a Bernabé; «le dijo a Bernabé» es natural en español y refleja la relación verbal sin añadir matices ajenos.
- source_word: Ἐπιστρέψαντες
  english_pob_choice: Let us return
  chosen_spanish: Volvamos
  alternatives_spanish:
  - Regresemos
  - Volvamos de nuevo
  lexicon: BDAG
  rationale: Aunque formalmente es un participio aoristo, funciona junto con el subjuntivo exhortativo como una invitación. «Volvamos» comunica bien la fuerza exhortativa en español.
- source_word: δὴ
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - pues
  lexicon: BDAG
  rationale: δή añade inmediatez o urgencia práctica. «Ahora» reproduce de modo natural esa fuerza discursiva en español.
- source_word: ἐπισκεψώμεθα
  english_pob_choice: visit
  chosen_spanish: visitemos
  alternatives_spanish:
  - vayamos a ver
  - hagamos una visita a
  lexicon: BDAG
  rationale: En este contexto implica ir a ver a personas con interés por su estado. «Visitemos» mantiene la sencillez y el matiz de cuidado pastoral sin sobredeterminarlo.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  lexicon: BDAG
  rationale: Se conserva el término masculino del griego como forma representativa, tal como en la POB inglesa. En español «hermanos» es fiel y puede abarcar a la comunidad mixta sin reemplazar el término de base.
- source_word: κατὰ πόλιν πᾶσαν
  english_pob_choice: in every city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - en toda ciudad
  - ciudad por ciudad
  lexicon: BDAG
  rationale: La construcción distributiva indica cada ciudad del recorrido. «En cada ciudad» transmite bien esa distribución en un español más natural que una repetición más literal.
- source_word: ἐν αἷς κατηγγείλαμεν
  english_pob_choice: where we proclaimed
  chosen_spanish: donde proclamamos
  alternatives_spanish:
  - en las que proclamamos
  - donde anunciamos
  lexicon: BDAG
  rationale: καταγγέλλω implica proclamación pública. «Proclamamos» sigue esa fuerza mejor que opciones más débiles como «anunciamos».
- source_word: τὸν λόγον τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra de Yahvé
  - el mensaje del Señor
  lexicon: BDAG
  rationale: Aunque el valor subyacente de κύριος puede tocar el nombre divino, aquí el contexto de cita cristiana y el uso establecido de la expresión favorecen «Señor» como equivalente de κύριος en esta locución fija. «Palabra» mantiene λόγος como mensaje proclamado.
- source_word: πῶς ἔχουσιν
  english_pob_choice: and see how they are
  chosen_spanish: y veamos cómo están
  alternatives_spanish:
  - y ver cómo están
  - y veamos cómo les va
  lexicon: BDAG
  rationale: La pregunta idiomática apunta a su condición o estado. «Cómo están» es una equivalencia natural y digna en español, y «veamos» conserva la coordinación con la exhortación anterior.
theological_decisions:
- issue: Renderización de ἀδελφοί para una comunidad probablemente mixta
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se preserva la forma masculina del griego, siguiendo la decisión de la POB inglesa de no neutralizar el término en el texto principal. En español, «hermanos» puede funcionar representativamente para la comunidad cristiana sin borrar la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Renderización de κύριος en la expresión τὸν λόγον τοῦ κυρίου
  english_pob_reading: the word of the Lord
  chosen_spanish_reading: la palabra del Señor
  alternative_spanish_readings:
  - la palabra de Yahvé
  - la palabra del Amo
  rationale: Se mantiene «Señor» como correspondencia estable de κύριος, conforme a la guía doctrinal del proyecto y al uso cristiano de la expresión. No se introduce «Yahvé» aquí porque la locución fijada «palabra del Señor» es la forma más transparente y cohesionada con el contexto narrativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la lectura auditada en inglés, incorporando la revisión que coordina la segunda cláusula con «y veamos» en lugar de una estructura infinitiva. Se conserva el sentido distributivo de κατὰ πόλιν πᾶσαν con «en cada ciudad» y la fuerza exhortativa de Ἐπιστρέψαντες δὴ ἐπισκεψώμεθα con «Volvamos ahora y visitemos».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con la terminología por defecto del proyecto.
  - Se conserva «hermanos» como término representativo, con nota de alternativa inclusiva.
  - Se usa el tuteo inclusivo litúrgico de primera persona plural («volvamos», «visitemos», «veamos») para reflejar la exhortación griega.
