    text: Or “after they fell silent.” The Greek expression marks the point after the previous speakers had stopped speaking.
    reason: lexical_alternative
  - marker: b
    text: The address is literally “Men, brothers,” a formal masculine vocative. In context it addresses the assembled brothers, though the wider gathering included others as well.
    reason: cultural_note
