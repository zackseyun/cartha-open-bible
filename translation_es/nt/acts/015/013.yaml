    text: 'El griego dice literalmente: «Varones, hermanos». Es un vocativo masculino formal; en contexto se dirige a los hermanos reunidos, aunque la asamblea más amplia incluía también a otros.'
    reason: cultural_note
  revision_rationale: Se conserva el sentido del borrador, pero se corrige la colocación de las notas para cumplir el formato requerido y se elimina «ellos» para una redacción española más natural.
