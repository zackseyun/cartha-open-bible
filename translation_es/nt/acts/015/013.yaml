translation:
  language: es
  text: 'Y después de que callaron[a], Jacobo respondió diciendo: «Hermanos[b], escúchenme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de que quedaron en silencio». La expresión griega marca el momento posterior en que los hablantes anteriores dejaron de hablar.
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «Varones, hermanos». Es un vocativo masculino formal; en contexto se dirige a los hermanos reunidos, aunque la asamblea más amplia incluía también a otros.'
    reason: cultural_note
lexical_decisions:
- source_word: μετὰ δὲ τὸ σιγῆσαι αὐτοὺς
  english_pob_choice: And after they became silent
  chosen_spanish: Y después de que ellos callaron
  alternatives_spanish:
  - Y después de que quedaron en silencio
  - Y después de que cesaron de hablar
  lexicon: BDAG; σιγάω
  rationale: 'La construcción con μετά + infinitivo articular expresa tiempo subsecuente: “después de”. σιγάω aquí señala el cese del habla; en español, “callaron” mantiene la secuencia narrativa de forma natural y conserva el valor de silencio posterior sin añadir interpretación.'
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: BDAG; ἀποκρίνομαι
  rationale: En un contexto de debate público, “respondió” comunica bien la entrada de Jacobo en el diálogo y evita una repetición excesivamente formal. Conserva el valor de reacción verbal de ἀποκρίνομαι.
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: BDAG; convención onomástica
  rationale: Se elige “Jacobo” como forma española transparente del nombre griego, en línea con una transliteración directa y auditable. “Santiago” es la forma tradicional en español, pero introduce una convención eclesial/histórica que no se desprende del griego inmediato.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG; λέγω
  rationale: El participio introduce el discurso directo; “diciendo” reproduce esa relación de manera cercana y natural en español, sin sobrecargar la frase con una coordinación innecesaria.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Varones, hermanos
  - Hermanos, varones
  lexicon: BDAG; ἀνήρ, ἀδελφός
  rationale: El griego contiene un doble vocativo masculino, pero en español “Hermanos” comunica la apelación comunitaria con naturalidad. Se preserva la dimensión formal y masculina del original en una nota, sin forzar un giro poco idiomático en el texto principal.
- source_word: ἀκούσατέ μου
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen lo que les digo
  lexicon: BDAG; ἀκούω
  rationale: El imperativo aoristo pide atención inmediata. “Escúchenme” es una orden clara y natural en español moderno, y conserva la fuerza exhortativa sin expandir el contenido del mandato.
theological_decisions:
- issue: Vocativo masculino doble en discurso público
  english_pob_reading: Retain the explicitly masculine address in sense, while rendering naturally as “Brothers” in English with contextual explanation
  chosen_spanish_reading: Traducir naturalmente como “Hermanos” y explicar en nota que el griego dice literalmente “Varones, hermanos”
  alternative_spanish_readings:
  - Varones, hermanos
  - Hermanos y varones
  - Hermanos y hermanas
  rationale: El original usa dos vocativos masculinos. En español, la fórmula literal suena poco natural, pero el sentido de apelación fraterna y el matiz masculino formal pueden preservarse mediante una nota. Así se evita borrar la tensión de género documentada por el texto fuente, sin sacrificar la legibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Nombre propio Ἰάκωβος en español
  english_pob_reading: James
  chosen_spanish_reading: Jacobo
  alternative_spanish_readings:
  - Santiago
  rationale: La elección de “Jacobo” mantiene una relación más transparente con el griego Ἰάκωβος y evita depender de una forma tradicional que, aunque establecida, no es evidente para el lector desde la forma original. No afecta la identificación del personaje.
  doctrine_reference: Project onomastics convention; source-transparent naming
translation_notes:
  revision_awareness: El texto inglés del POB pasó de una versión demasiado literal (“Men, brothers”) a una forma más natural (“Brothers”). Aquí se siguió ese criterio de naturalidad en español, conservando el dato de que el griego es literalmente masculino en la nota. También se mantuvo la secuencia temporal y el valor de σιγάω sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y digno, evitando calcos duros como “Después de que ellos se silenciaron”.
  - Se usó “Hermanos” en el texto principal para fluidez, pero se preservó la precisión del vocativo griego en la nota.
  - Se eligió “Jacobo” por transparencia al original griego y coherencia con una traducción auditable.
  - La puntuación de comillas y signos sigue el uso español; el marcador de nota se colocó al final de la cláusula citada.
