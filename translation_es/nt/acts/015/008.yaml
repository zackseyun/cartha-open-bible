revisions:
- from: Y Dios[a], que conoce el corazón, les dio testimonio al darles el Espíritu Santo, así como también a nosotros.
  to: Y Dios[a], que conoce el corazón, dio testimonio en favor de ellos al darles el Espíritu Santo, tal como también lo hizo con nosotros.
  rationale: Se ajusta μαρτυρέω a una expresión más idiomática y precisa en español («dio testimonio en favor de ellos») y se explicita la elipsis final para que la comparación sea natural y clara sin añadir contenido interpretativo. Se conserva la nota léxica alternativa sobre καρδιογνώστης.
