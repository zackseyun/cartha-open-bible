translation:
  language: es
  text: Y Dios[a], que conoce el corazón, dio testimonio en favor de ellos al darles el Espíritu Santo, tal como también lo hizo con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios, conocedor de los corazones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδιογνώστης
  english_pob_choice: who knows the heart
  chosen_spanish: que conoce el corazón
  alternatives_spanish:
  - conocedor de los corazones
  - que conoce los corazones
  lexicon: BDAG
  rationale: El compuesto griego expresa a Dios como el que conoce el interior de la persona. En español, la cláusula relativa resulta natural y fiel; ‘corazón’ conserva el valor bíblico del centro interior sin forzar un tecnicismo extraño.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: 'La forma simple ‘Dios’ es la equivalencia normal y mantiene la construcción appositiva con καρδιογνώστης: ‘Y Dios, que conoce el corazón’.'
- source_word: ἐμαρτύρησεν
  english_pob_choice: bore witness
  chosen_spanish: les dio testimonio
  alternatives_spanish:
  - dio testimonio
  - testificó
  lexicon: BDAG
  rationale: ‘Dar testimonio’ conserva el valor evidencial de μαρτυρέω y suena natural en español bíblico contemporáneo. Se mantiene el sujeto divino como agente de la confirmación.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa con el clítico indirecto ‘les’, que en español es la forma más fluida para el destinatario del testimonio divino.
- source_word: δοὺς
  english_pob_choice: by giving
  chosen_spanish: al darles
  alternatives_spanish:
  - dándoles
  - por darles
  - habiéndoles dado
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte como circunstancia de medio: Dios les dio testimonio ‘al darles’ el Espíritu. Así se conserva la relación instrumental sin sobreinterpretar el matiz temporal.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el santo Espíritu
  lexicon: BDAG
  rationale: La expresión fija del título divino en español es ‘Espíritu Santo’. La mayúscula en ‘Espíritu’ respeta el uso teológico cuando se refiere a la persona divina.
- source_word: καθὼς καὶ ἡμῖν
  english_pob_choice: just as he did to us
  chosen_spanish: así como también a nosotros
  alternatives_spanish:
  - tal como también a nosotros
  - igual que a nosotros
  lexicon: BDAG
  rationale: El griego omite el verbo repetido; en español la comparación queda clara sin añadir explícitamente ‘lo hizo’. ‘También’ refleja el καί enfático y preserva la simetría con ‘a nosotros’.
theological_decisions:
- issue: Imparcialidad divina evidenciada por el don del Espíritu a los destinatarios del relato
  english_pob_reading: The verse shows God’s testimony by giving the Holy Spirit to them in the same way as to us, without making the referent more explicit than the context requires.
  chosen_spanish_reading: El versículo presenta el testimonio de Dios en el hecho de darles el Espíritu Santo del mismo modo que a nosotros, sin identificar dentro del versículo a los destinatarios con más precisión de la que ofrece el contexto.
  alternative_spanish_readings:
  - darles el Espíritu Santo a los gentiles
  - darles el Espíritu Santo a ellos, es decir, a los gentiles
  rationale: El pronombre αὐτοῖς no nombra a los destinatarios; esa identificación pertenece al contexto narrativo. La traducción conserva la referencia abierta y evita añadir una glosa interpretativa al texto principal.
  doctrine_reference: Hechos 15:8; evitar resolver en la traducción una identificación contextual que el griego no explicita.
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado más reciente del texto inglés de POB (sin cambios sustanciales en la revisión más reciente), conservando su estructura y su decisión de presentar καρδιογνώστης como una descripción relacional de Dios. La principal adaptación al español es usar una cláusula relativa natural en lugar de un compuesto nominal poco idiomático.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ y ‘Espíritu Santo’ según la terminología base del proyecto.
  - Se evita ‘Señor’ para el nombre divino porque aquí el griego dice θεός.
  - ‘Les dio testimonio’ conserva el sentido forense/evidencial de μαρτυρέω.
  - No se explicita ‘gentiles’ en el texto principal para respetar el alcance del pronombre griego y el contexto inmediato.
