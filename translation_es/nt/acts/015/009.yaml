- from: Y no hizo ninguna distinción entre nosotros y ellos[a], purificando sus corazones por la fe.
  to: Y no hizo ninguna distinción entre nosotros y ellos, habiendo purificado sus corazones por la fe[a].
  rationale: Se corrige la nota para reflejar una alternativa real al valor instrumental de τῇ πίστει y se ajusta καθαρίσας a «habiendo purificado», que representa mejor el participio aoristo que el gerundio «purificando». No se requiere adjudicación adicional porque el sentido fuente y la corrección española son suficientemente claros.
