translation:
  language: es
  text: Y no hizo ninguna distinción entre nosotros y ellos, habiendo purificado sus corazones por la fe[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante la fe». El dativo griego puede expresar medio o instrumento.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐθὲν
  english_pob_choice: 'no'
  chosen_spanish: ninguna
  alternatives_spanish:
  - nada
  lexicon: BDAG
  rationale: En español, dentro de la expresión con διέκρινεν, «ninguna distinción» reproduce con naturalidad el valor idiomático de negación total sin volverla opaca. Mantiene el enlace con el verbo de diferenciación, tal como el inglés POB expresa «made no distinction».
- source_word: διέκρινεν
  english_pob_choice: made no distinction
  chosen_spanish: hizo ninguna distinción
  alternatives_spanish:
  - distinguió
  - discriminó entre
  - separó
  lexicon: BDAG
  rationale: El verbo griego aquí significa diferenciar o establecer una distinción entre grupos. «No hizo ninguna distinción» es idiomático en español y conserva la fuerza del aoristo afirmando la imparcialidad de la acción divina.
- source_word: μεταξὺ ἡμῶν τε καὶ αὐτῶν
  english_pob_choice: between us and them
  chosen_spanish: entre nosotros y ellos
  alternatives_spanish:
  - entre ambos nosotros y ellos
  lexicon: BDAG
  rationale: La frase preposicional se expresa de manera estándar como «entre nosotros y ellos». La pareja τε ... καὶ no requiere una reproducción artificial en español para mantener el sentido.
- source_word: τῇ πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  - a través de la fe
  lexicon: BDAG
  rationale: El dativo puede ser instrumental; en español, «por la fe» comunica bien el medio o instrumento sin forzar la sintaxis. «Por» conserva la lectura de agencia/instrumentalidad que el inglés POB nota como alternativa posible con «through faith».
- source_word: καθαρίσας
  english_pob_choice: having cleansed
  chosen_spanish: purificando
  alternatives_spanish:
  - habiendo purificado
  - después de purificar
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción antecedente o concomitante respecto del verbo principal. «Purificando» mantiene la relación verbal y evita una formulación demasiado pesada, aunque «habiendo purificado» sigue siendo una alternativa válida.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interior
  - ser interior
  lexicon: BDAG
  rationale: «Corazones» es la equivalencia normal y teológicamente cargada para καρδία, refiriéndose a la persona interior y no solo a emociones.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: BDAG
  rationale: El posesivo plural concuerda naturalmente con «corazones» en español. El referente es el grupo gentil en el contexto inmediato.
theological_decisions:
- issue: Valor instrumental de πίστις
  english_pob_reading: by faith
  chosen_spanish_reading: por la fe
  alternative_spanish_readings:
  - mediante la fe
  - a través de la fe
  rationale: La guía doctrinal del proyecto favorece «fe» para πίστις. Aquí el dativo admite sentido instrumental; «por la fe» conserva ese valor sin introducir una glosa interpretativa adicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Imparcialidad divina en διέκρινεν
  english_pob_reading: made no distinction between us and them
  chosen_spanish_reading: no hizo ninguna distinción entre nosotros y ellos
  alternative_spanish_readings:
  - no discriminó entre nosotros y ellos
  - no separó entre nosotros y ellos
  rationale: La frase afirma que Dios no favoreció a un grupo sobre otro en la recepción de la purificación. «No hizo ninguna distinción» preserva la imparcialidad sin añadir un matiz social moderno que podría sobrecargar el pasaje.
  doctrine_reference: Hechos 10:34-35; 15:8-11
- issue: Participio aoristo καθαρίσας
  english_pob_reading: having cleansed
  chosen_spanish_reading: purificando
  alternative_spanish_readings:
  - habiendo purificado
  - después de purificar
  rationale: El español permite un gerundio que, aunque menos explícito que el participio inglés, mantiene la relación de acción concomitante/antecedente. Se evita convertirlo en una cláusula más interpretativa de lo que el griego exige.
  doctrine_reference: Gramática aspectual del participio aoristo en el NT
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del fuente griega y con la línea auditada en inglés POB: negación de distinción, referencia a «nosotros y ellos», y dativo instrumental de πίστει. Se conserva la tensión habitual entre «por» y «mediante/por medio de» en la nota, sin resolverla de forma excesivamente cerrada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «fe» para πίστις en lugar de «fidelidad», conforme al criterio doctrinal del proyecto.
  - «Corazones» conserva el uso bíblico de καρδία como centro interior de la persona.
  - La nota se ancla en el sintagma «por la fe» para preservar la alternativa instrumental documentada.
