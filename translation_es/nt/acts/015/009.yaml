    issue: La nota al pie no preserva la alternativa léxica correcta para τῇ πίστει.
    rationale: El inglés POB dice «Or 'through faith.'»; el borrador español pone «O «por la fe»», que repite la lectura principal y elimina la alternativa significativa de medio/instrumento.
  - severity: medium
    issue: «Purificando» no refleja bien el participio aoristo καθαρίσας.
    rationale: El gerundio español tiende a presentar acción simultánea o progresiva, mientras que aquí el participio aoristo apunta mejor a una acción antecedente o al menos completa respecto de «no hizo distinción». «Habiendo purificado» preserva mejor la relación verbal documentada en el audit trail.
  revised_spanish_text: Y no hizo ninguna distinción entre nosotros y ellos, habiendo purificado sus corazones por la fe[a].
  revised_footnotes:
