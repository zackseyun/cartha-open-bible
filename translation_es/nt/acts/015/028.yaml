    text: O 'fue decidido por el Espíritu Santo y por nosotros'. El giro griego ἔδοξεν ... καὶ ἡμῖν también puede traducirse de manera más formal como una fórmula de decisión.
    reason: lexical_alternative
  - marker: b
    text: O 'estas cosas indispensables' o 'estos requisitos necesarios'.
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña pero mejora la correspondencia con el griego y con la auditoría inglesa: ''poner sobre ustedes'' refleja mejor ἐπιτίθεσθαι ὑμῖν, y ''carga mayor'' preserva con más claridad el comparativo μηδὲν πλέον. Se mantiene ''pareció bien'' como giro deliberativo. La nota alternativa se ajusta para sonar natural en español sin perder la observación sobre la fórmula de decisión.'
