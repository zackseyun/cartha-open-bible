translation:
  language: es
  text: Porque pareció bien al Espíritu Santo y a nosotros no poner sobre ustedes ninguna carga mayor que estas cosas necesarias[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue decidido por el Espíritu Santo y por nosotros'. El giro griego ἔδοξεν ... καὶ ἡμῖν también puede traducirse de manera más formal como una fórmula de decisión.
    reason: lexical_alternative
  - marker: b
    text: O 'estas cosas indispensables' o 'estos requisitos necesarios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  english_pob_choice: it seemed good
  chosen_spanish: pareció bien
  alternatives_spanish:
  - se decidió
  - pareció mejor
  lexicon: BDAG
  rationale: El aoristo impersonal de δοκέω admite tanto la idea de 'parecer bien' como la de 'ser decidido'. 'Pareció bien' conserva el giro idiomático del griego y el tono deliberativo del concilio, sin volverlo demasiado técnico en español.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  english_pob_choice: to the Holy Spirit
  chosen_spanish: al Espíritu Santo
  alternatives_spanish:
  - al Espíritu Santo
  lexicon: BDAG
  rationale: La dativa con ἔδοξεν se expresa naturalmente en español con 'al'. 'Espíritu Santo' es la forma normal y fiel para un referente personal divino, no una fuerza impersonal.
- source_word: καὶ ἡμῖν
  english_pob_choice: and to us
  chosen_spanish: y a nosotros
  alternatives_spanish:
  - y nosotros
  lexicon: BDAG
  rationale: La dativa coordinada con 'al Espíritu Santo' se mantiene explícita como 'a nosotros' para conservar el paralelismo y la participación conjunta en la decisión.
- source_word: μηδὲν πλέον
  english_pob_choice: no greater
  chosen_spanish: ninguna carga más
  alternatives_spanish:
  - nada más
  - ninguna carga mayor
  lexicon: BDAG
  rationale: En español, la combinación con 'carga' se expresa con naturalidad como 'ninguna carga más'. Conserva la idea comparativa de πλέον sin sonar forzado.
- source_word: ἐπιτίθεσθαι
  english_pob_choice: to place on
  chosen_spanish: imponer
  alternatives_spanish:
  - poner sobre
  - cargar
  lexicon: BDAG
  rationale: En este contexto de obligaciones para creyentes gentiles, 'imponer' comunica con precisión la acción de colocar una carga normativa sobre ellos. Es un equivalente natural y acorde con el uso eclesial del pasaje.
- source_word: βάρος
  english_pob_choice: burden
  chosen_spanish: carga
  alternatives_spanish:
  - peso
  - burden
  lexicon: BDAG
  rationale: Aunque 'peso' es posible, 'carga' transmite mejor en español la metáfora de obligaciones exigidas. Mantiene el sentido figurado del texto.
- source_word: πλὴν
  english_pob_choice: than
  chosen_spanish: más que
  alternatives_spanish:
  - excepto
  - aparte de
  lexicon: BDAG
  rationale: Tras la negación, la relación concesiva/exclusiva de πλήν se expresa con 'más que', que fluye de manera natural en español y preserva la excepción.
- source_word: τούτων τῶν ἐπάναγκες
  english_pob_choice: these necessary things
  chosen_spanish: estas cosas necesarias
  alternatives_spanish:
  - estos elementos necesarios
  - estos requisitos necesarios
  - estas esenciales
  lexicon: BDAG
  rationale: La frase apunta a las estipulaciones concretas del versículo siguiente. 'Estas cosas necesarias' sigue de cerca el griego y evita precisar indebidamente la naturaleza de los requisitos.
theological_decisions:
- issue: Autoridad compartida entre el Espíritu Santo y la asamblea apostólica
  english_pob_reading: The text presents the decision as jointly affirmed by the Holy Spirit and the apostolic assembly.
  chosen_spanish_reading: 'El texto presenta la decisión como afirmada conjuntamente por el Espíritu Santo y por nosotros: ''al Espíritu Santo y a nosotros''.'
  alternative_spanish_readings:
  - Una simple opinión humana
  - Una influencia impersonal del Espíritu
  rationale: La estructura coordinada debe mantenerse para no reducir la frase a mero consenso humano ni diluir la agencia personal del Espíritu Santo.
  doctrine_reference: Credo Niceno-Constantinopolitano (381)
- issue: Alcance de la carga impuesta a los creyentes gentiles
  english_pob_reading: The verse speaks of not placing an additional burden beyond specified necessary requirements.
  chosen_spanish_reading: El versículo habla de no imponer una carga adicional fuera de las cosas necesarias especificadas.
  alternative_spanish_readings:
  - Rechazo total de toda obligación
  - Imposición completa de la ley mosaica
  rationale: La redacción conserva el límite del decreto sin resolver la tensión entre libertad y obligación; no amplía ni reduce indebidamente el alcance de la decisión.
  doctrine_reference: 'Principio POB: preservar la tensión teológica del texto'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta estabilidad textual y lexical, sin revisiones aplicadas en la última pasada. La traducción mantiene esa lectura estable y conserva la alternativa formal de decisión en la nota a.
  spanish_consistency_notes:
  - Se usó 'Espíritu Santo' conforme al estándar cristiano y al paralelismo del dative with ἡμῖν.
  - Se prefirió 'carga' para βάρος por ser la metáfora más natural en español, manteniendo el sentido de obligación impuesta.
  - Se evitó resolver en exceso el valor de πλήν y de τούτων τῶν ἐπάναγκες; la nota preserva alternativas legítimas.
  - La frase principal mantiene un tono sobrio y publicable, sin depender de calcos excesivos del inglés.
