revisions:
- from: Porque pareció bien al Espíritu Santo y a nosotros no imponerles ninguna carga más que estas cosas necesarias[a][b].
  to: Porque pareció bien al Espíritu Santo y a nosotros no poner sobre ustedes ninguna carga mayor que estas cosas necesarias[a][b].
  rationale: 'La revisión es pequeña pero mejora la correspondencia con el griego y con la auditoría inglesa: ''poner sobre ustedes'' refleja mejor ἐπιτίθεσθαι ὑμῖν, y ''carga mayor'' preserva con más claridad el comparativo μηδὲν πλέον. Se mantiene ''pareció bien'' como giro deliberativo. La nota alternativa se ajusta para sonar natural en español sin perder la observación sobre la fórmula de decisión.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: mantiene la fórmula deliberativa conjunta entre el Espíritu Santo y la asamblea, conserva la idea de no añadir una carga mayor, y apunta correctamente a las exigencias enumeradas en el versículo siguiente. Sin embargo, ''no imponerles'' introduce un cambio de persona/nivel de explicitación respecto de ὑμῖν (''a ustedes'') y rompe el paralelismo más directo con ''poner sobre ustedes''. Además, ''ninguna carga más que'' es comprensible, pero ''ninguna carga mayor que'' preserva mejor el matiz comparativo de μηδὲν πλέον.'
  spanish_quality_summary: 'El español es claro y eclesialmente natural. No obstante, una leve revisión mejora la fidelidad y la fluidez: ''no poner sobre ustedes ninguna carga mayor que...'' mantiene mejor la imagen de βάρος y el complemento ὑμῖν, sin volver el texto rígido. También conviene ajustar la nota a para que el español alternativo suene más natural: ''se decidió por el Espíritu Santo y por nosotros'' es menos idiomático que ''el Espíritu Santo y nosotros hemos decidido'' o ''fue decidido por el Espíritu Santo y por nosotros''; pero para seguir la nota inglesa basta una formulación más directa.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Espíritu Santo' está bien; no aparece Yahvé/Mesías/esclavo u otros términos sensibles del glosario. La decisión de usar 'carga' para βάρος y 'cosas necesarias' para τούτων τῶν ἐπάναγκες concuerda con la auditoría inglesa. La única mejora léxica importante es hacer explícito el comparativo con 'mayor'.
  issues:
  - severity: medium
    issue: El comparativo μηδὲν πλέον queda algo debilitado en 'ninguna carga más que'.
    rationale: El griego expresa 'ninguna carga mayor/further burden'. En español, 'carga mayor que' refleja con más precisión el comparativo ligado a βάρος.
  - severity: low
    issue: '''imponerles'' explicita el objeto indirecto como clítico en vez de conservar más directamente ''sobre ustedes''.'
    rationale: No es una mala traducción, pero 'poner sobre ustedes' sigue mejor la metáfora del texto y mantiene más visible ὑμῖν.
  - severity: low
    issue: 'La nota a usa una alternativa española poco idiomática: ''se decidió por el Espíritu Santo y por nosotros''.'
    rationale: La alternativa inglesa describe una fórmula de decisión; en español conviene una redacción más natural que no sugiera agencia instrumental extraña.
  revised_spanish_text: Porque pareció bien al Espíritu Santo y a nosotros no poner sobre ustedes ninguna carga mayor que estas cosas necesarias[a][b].
  revised_footnotes:
