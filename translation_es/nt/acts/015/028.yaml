  text: ἔδοξεν γὰρ τῷ ⸂πνεύματι τῷ ἁγίῳ⸃ καὶ ἡμῖν μηδὲν πλέον ἐπιτίθεσθαι ὑμῖν βάρος πλὴν ⸂τούτων τῶν ἐπάναγκες⸃,
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/028.yaml
  text: For it seemed good to the Holy Spirit and to us to place on you no greater burden than these necessary things:[a][b]
  footnotes:
