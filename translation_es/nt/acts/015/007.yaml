translation:
  language: es
  text: 'Y después de que se había suscitado mucha discusión, Pedro se levantó y les dijo: «Hermanos[a], ustedes saben que desde tiempos antiguos[b] Dios escogió entre ustedes que por mi boca los gentiles[c] oyeran la palabra del evangelio y creyeran».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hombres, hermanos». El vocativo griego es masculino plural; «Hermanos» preserva la forma y el tono fraternal, aunque la audiencia pudo haber incluido a otros representados por esta fórmula convencional.
    reason: lexical_alternative
  - marker: b
    text: O «desde los primeros días».
    reason: lexical_alternative
  - marker: c
    text: O «las naciones». Aquí el sentido es el de pueblos no judíos; por eso se traduce «los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλῆς ... ζητήσεως γενομένης
  english_pob_choice: after much debate had taken place
  chosen_spanish: después de que se había suscitado mucha discusión
  alternatives_spanish:
  - después de que había habido mucho debate
  - después de que se había producido mucha controversia
  lexicon: ζήτησις (BDAG)
  rationale: La construcción de genitivo absoluto expresa una circunstancia previa. En español, «se había suscitado» conserva la idea de un proceso ya en curso, y «discusión» comunica bien el sentido de deliberación intensa sin cargar innecesariamente el texto con hostilidad.
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: ἀνίστημι (BDAG)
  rationale: El participio aoristo introduce la acción de Pedro antes de hablar. «Se levantó» es natural en español y conserva el gesto concreto de ponerse en pie.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hombres, hermanos
  - Hermanos y hermanas
  lexicon: ἀνήρ; ἀδελφός (BDAG)
  rationale: La forma vocativa masculina plural se preserva con «Hermanos». En español es una fórmula de trato eclesial inteligible y fiel; no se expande a «hermanos y hermanas» porque el griego no lo explicita.
- source_word: ἐπίστασθε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - ustedes conocen
  - ustedes están al tanto
  lexicon: ἐπίσταμαι (BDAG)
  rationale: El verbo expresa conocimiento ya poseído por los oyentes. «Saben» es la equivalencia más directa y fluida en español.
- source_word: ἀφ’ ἡμερῶν ἀρχαίων
  english_pob_choice: from ancient days
  chosen_spanish: desde hace tiempos antiguos
  alternatives_spanish:
  - desde tiempos antiguos
  - desde tiempos de antaño
  lexicon: ἡμέρα; ἀρχαῖος (BDAG)
  rationale: La expresión apunta a un período anterior ya conocido en el contexto. «Desde hace tiempos antiguos» mantiene la formalidad del griego y evita reducir el alcance temporal a una simple paráfrasis.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - de entre ustedes
  lexicon: ἐν + pronombre personal (BDAG)
  rationale: Aquí la frase indica una elección dentro del grupo presente o representado. «Entre ustedes» es natural y conserva la idea relacional sin sobreinterpretar el matiz.
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: ἐκλέγομαι (BDAG)
  rationale: «Escogió» expresa bien el acto electivo divino y es plenamente idiomático en español bíblico actual.
- source_word: διὰ τοῦ στόματός μου
  english_pob_choice: through my mouth
  chosen_spanish: por mi boca
  alternatives_spanish:
  - a través de mi boca
  - por medio de mi boca
  lexicon: στόμα (BDAG)
  rationale: La imagen instrumental se conserva en español con «por mi boca». Es breve, natural y mantiene la fuerza retórica de que Pedro fue el medio de la proclamación.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: ἔθνος (BDAG)
  rationale: Aunque el contexto de Hechos 15 contrasta judíos y no judíos, el griego usa literalmente «naciones». En español, «las naciones» preserva la tensión léxica del término; se deja una nota para aclarar que el sentido referencial es el de pueblos no judíos.
- source_word: τὸν λόγον τοῦ εὐαγγελίου
  english_pob_choice: the word of the gospel
  chosen_spanish: la palabra del evangelio
  alternatives_spanish:
  - el mensaje del evangelio
  - la palabra de la buena noticia
  lexicon: λόγος; εὐαγγέλιον (BDAG)
  rationale: «Palabra» reproduce el valor de λόγος sin forzar una paráfrasis, y «evangelio» es el equivalente natural y eclesialmente claro de εὐαγγέλιον.
- source_word: πιστεῦσαι
  english_pob_choice: believe
  chosen_spanish: creyeran
  alternatives_spanish:
  - creyeran en él
  - llegaran a creer
  lexicon: πιστεύω (BDAG)
  rationale: El infinitivo coordinado con ἀκοῦσαι expresa el propósito de oír y creer. En español, «creyeran» mantiene el paralelismo verbal y suena natural en una subordinada final.
theological_decisions:
- issue: Alcance de Ἄνδρες ἀδελφοί en una asamblea posiblemente representativa y mixta
  english_pob_reading: Brothers
  chosen_spanish_reading: Hermanos
  alternative_spanish_readings:
  - Hombres, hermanos
  - Hermanos y hermanas
  rationale: Se conserva la forma masculina plural sin ampliarla. La opción española mantiene la convención vocativa y evita introducir inclusividad no explicitada por el griego, dejando el matiz representativo para la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referencia de τὰ ἔθνη en el contexto salvífico de Hechos 15
  english_pob_reading: the Gentiles
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los pueblos
  rationale: Aunque el sentido contextual apunta a los no judíos, el POB en inglés preservó la alternativa lexicográfica. En español se mantiene «las naciones» para reflejar la forma del griego y se añade nota explicativa sobre el referente étnico-religioso.
  doctrine_reference: Actos 15; doctrina de inclusión de los gentiles en el pueblo de Dios
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios sustantivos: el texto base mostró alta concordancia y solo observaciones menores. La decisión española mantiene el perfil óptimo-equivalente del POB inglés, conservando la tensión entre literalidad griega y claridad moderna.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo usa θεός, por lo que corresponde «Dios».
  - Se preservó el vocativo masculino plural «Hermanos» por fidelidad formal; la posible inclusividad se trató en nota, no en el cuerpo.
  - Se optó por «las naciones» en el texto para sostener la tensión léxica de ἔθνη; la lectura contextual no judía queda explicada en la nota.
  - Se conservó la metáfora instrumental de «por mi boca» en lugar de reducirla a «por medio de mí», para respetar la imagen del griego.
