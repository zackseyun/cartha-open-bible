  rationale: Se revisa para alinear el español con la decisión principal auditada del POB en τὰ ἔθνη («los gentiles»), mejorar la naturalidad de ἀφ’ ἡμερῶν ἀρχαίων con «desde tiempos antiguos», y ordenar las notas para que presenten alternativas reales y pertinentes sin duplicación innecesaria. El resto de la redacción se conserva porque refleja fielmente el griego y es bien legible en español eclesial contemporáneo.
