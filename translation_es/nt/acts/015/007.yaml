review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego y conserva la mayoría de las decisiones léxicas clave: la circunstancia previa del genitivo absoluto, el gesto de Pedro al levantarse, el vocativo fraternal, la elección divina, la imagen instrumental «por mi boca», y la coordinación «oyeran ... y creyeran». Sin embargo, se aparta de manera significativa del rastro auditado del POB en dos puntos: (1) el inglés eligió «the Gentiles» como lectura principal de τὰ ἔθνη, mientras que el español puso «las naciones» en el texto principal y relegó «los gentiles» a nota; (2) la nota y el anclaje de «desde hace tiempos antiguos[c]» no reflejan bien la alternativa inglesa, porque la nota repite casi la misma frase y el giro «desde hace tiempos antiguos» suena menos natural que «desde tiempos antiguos».'
  spanish_quality_summary: 'El español es claro y digno, pero tiene pequeños problemas de naturalidad y economía: «desde hace tiempos antiguos» suena torpe; «se había suscitado mucha discusión» es aceptable, aunque «hubo mucho debate» o «se había producido mucho debate» encaja mejor con el tono. Lo más importante es que «las naciones» en este contexto puede inducir una lectura geopolítica menos precisa que «los gentiles», que en Hechos 15 comunica mejor el contraste judíos/no judíos y además coincide con la decisión principal del POB inglés.'
  glossary_alignment: 'No hay conflicto con terminología mayor del proyecto en este versículo. «Dios», «evangelio» y «Pedro» están bien. La desviación importante es de política contextual para τὰ ἔθνη: aquí debe preferirse «los gentiles» en el texto principal, manteniendo «las naciones» como alternativa en nota, conforme al expediente inglés y a la rationale teológica documentada.'
  issues:
  - severity: high
    issue: τὰ ἔθνη se tradujo como «las naciones» en el texto principal
    rationale: El expediente inglés decidió explícitamente «the Gentiles» como lectura principal por el contexto del concilio de Jerusalén. «Las naciones» es léxicamente posible, pero no preserva la decisión contextual auditada ni la claridad salvífico-histórica central del pasaje.
  - severity: medium
    issue: «desde hace tiempos antiguos» suena poco natural y no refleja bien la nota alternativa
    rationale: La expresión griega ἀφ’ ἡμερῶν ἀρχαίων se vierte mejor como «desde tiempos antiguos» o «desde tiempos antiguos/desde los primeros días». El uso de «hace» introduce una construcción menos idiomática aquí, y la nota actual no ofrece una alternativa claramente distinta.
  - severity: low
    issue: La nota [c] casi duplica el texto principal
    rationale: Si el texto principal se ajusta a «desde tiempos antiguos», la nota debe preservar una alternativa real como «desde los primeros días», siguiendo el POB inglés.
