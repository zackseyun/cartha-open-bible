translation:
  language: es
  text: Y después de que surgió no poca disensión y debate entre Pablo y Bernabé y ellos[a], designaron a Pablo y a Bernabé y a algunos otros de entre ellos para que subieran[b] a Jerusalén, a los apóstoles y a los ancianos, acerca de este asunto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una no pequeña disensión y debate». El griego usa una litotes («no poca» / «no pequeña») para enfatizar la seriedad de la disputa.
    reason: lexical_alternative
  - marker: b
    text: «Subieran» es el modismo griego común para viajar a Jerusalén.
    reason: cultural_note
  - marker: c
    text: O «acerca de esta cuestión» o «acerca de esta materia».
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης δὲ
  english_pob_choice: And after ... had arisen
  chosen_spanish: Y después de que se levantó
  alternatives_spanish:
  - Y cuando surgió
  - Y después de que hubo surgido
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto introduce una circunstancia previa a la acción principal. «Después de que se levantó» conserva el valor temporal y el matiz de surgimiento del conflicto sin sonar rígido en español.
- source_word: στάσεως
  english_pob_choice: dissension
  chosen_spanish: disensión
  alternatives_spanish:
  - conflicto
  - discordia
  - contienda
  lexicon: BDAG
  rationale: En este contexto στάσις señala oposición seria, no solo desacuerdo. «Disensión» conserva esa fuerza y encaja bien con el registro bíblico en español.
- source_word: ζητήσεως
  english_pob_choice: debate
  chosen_spanish: debate
  alternatives_spanish:
  - discusión
  - disputa
  - argumento
  lexicon: BDAG
  rationale: Junto con στάσις, ζητήσις apunta a controversia verbal activa. «Debate» mantiene el contraste con «disensión» y comunica la contención de palabras sin exagerar.
- source_word: οὐκ ὀλίγης
  english_pob_choice: no small
  chosen_spanish: una no pequeña
  alternatives_spanish:
  - considerable
  - no poca
  lexicon: BDAG
  rationale: La litote se conserva de forma transparente con «una no pequeña», reproduciendo el énfasis retórico del griego en vez de suavizarlo a «considerable».
- source_word: τῷ Παύλῳ καὶ τῷ Βαρναβᾷ πρὸς αὐτούς
  english_pob_choice: between Paul and Barnabas and them
  chosen_spanish: entre Pablo y Bernabé y ellos
  alternatives_spanish:
  - entre Pablo y Bernabé con ellos
  - Pablo y Bernabé tuvieron ... con ellos
  lexicon: BDAG
  rationale: La frase señala a las partes implicadas en la disputa. «Entre ... y ellos» refleja la construcción relacional sin añadir un matiz más hostil del que exige el texto.
- source_word: ἔταξαν
  english_pob_choice: they appointed
  chosen_spanish: determinaron
  alternatives_spanish:
  - designaron
  - nombraron
  - acordaron
  lexicon: BDAG
  rationale: Aquí τάσσω expresa una decisión ordenada de la comunidad respecto de los representantes. «Determinaron» comunica ese acto formal de disposición, sin convertirlo en una explicación eclesiológica más amplia que la del texto.
- source_word: ἀναβαίνειν
  english_pob_choice: to go up
  chosen_spanish: subieran
  alternatives_spanish:
  - fueran hacia arriba
  - subieran a
  - fueran
  lexicon: BDAG
  rationale: «Subieran» conserva el idiomático «subir» asociado a Jerusalén. En español, el verbo se integra de manera natural en una cláusula subordinada de propósito.
- source_word: τινας ἄλλους ἐξ αὐτῶν
  english_pob_choice: some others from among them
  chosen_spanish: algunos otros de entre ellos
  alternatives_spanish:
  - otros más de entre ellos
  - algunos otros de ellos
  lexicon: BDAG
  rationale: La expresión deja claro que los delegados adicionales fueron escogidos dentro del mismo grupo. «De entre ellos» explicita el valor representativo de ἐξ αὐτῶν.
- source_word: τοὺς ἀποστόλους καὶ πρεσβυτέρους
  english_pob_choice: the apostles and elders
  chosen_spanish: a los apóstoles y a los ancianos
  alternatives_spanish:
  - a los apóstoles y a los presbíteros
  - a los enviados y a los ancianos
  lexicon: BDAG
  rationale: «Apóstoles» conserva el título reconocido; «ancianos» traduce πρεσβύτεροι en lenguaje claro y bíblico. Se evita «presbíteros» porque, aunque posible, suena más técnico en español contemporáneo.
- source_word: περὶ τοῦ ζητήματος τούτου
  english_pob_choice: about this issue
  chosen_spanish: acerca de este asunto
  alternatives_spanish:
  - sobre este tema
  - acerca de esta cuestión
  lexicon: BDAG
  rationale: ζήτημα designa el punto controvertido. «Asunto» es claro y natural en español, y mantiene el matiz de una cuestión en disputa sin endurecerla a «problema».
theological_decisions:
- issue: Naturaleza de la disputa en la congregación primitiva
  english_pob_reading: The verse describes a serious dissension and debate without adding doctrinal evaluation beyond the narrative fact.
  chosen_spanish_reading: El verso describe una disensión y debate serios sin añadir una valoración doctrinal ajena al relato.
  alternative_spanish_readings:
  - El verso describe una pelea doctrinal
  - El verso describe una discusión menor
  rationale: «Disensión» y «debate» conservan la tensión narrativa sin convertir el conflicto en violencia física ni minimizarlo como desacuerdo leve. La formulación española sigue el peso del griego y del audit trail inglés.
  doctrine_reference: Hechos 15:1-2; principios de traducción POB sobre transparencia y no sobreinterpretación
- issue: Alcance de ἔταξαν
  english_pob_reading: Rendered 'they appointed' to reflect a communal designation of delegates rather than a mere private decision.
  chosen_spanish_reading: «Determinaron» refleja una resolución comunitaria de enviar delegados, sin imponer una estructura eclesiástica más precisa de la que el texto expresa.
  alternative_spanish_readings:
  - nombraron
  - designaron
  - acordaron
  rationale: La elección mantiene la iniciativa ordenada de la comunidad. En español, «determinaron» comunica bien el acto de decidir con intención formal, mientras deja abierta la forma exacta de esa decisión.
  doctrine_reference: Hechos 15:2; traducción de descripciones narrativas sin sobrecargar la política eclesial
- issue: Idiomática de 'go up' hacia Jerusalén
  english_pob_reading: Go up is the Greek idiom commonly used for travel to Jerusalem.
  chosen_spanish_reading: «Subieran» conserva el modismo direccional hacia Jerusalén en una forma natural para el español.
  alternative_spanish_readings:
  - fueran a Jerusalén
  - subieran a Jerusalén
  rationale: El español puede expresar el viaje sin perder el eco del idioma bíblico. Aquí el verbo «subir» conserva la señal geográfica/cultual que el POB inglés preserva.
  doctrine_reference: Hechos 15:2; uso bíblico tradicional de Jerusalén como destino ascendente
translation_notes:
  revision_awareness: 'El contexto de revisión indica alto acuerdo y sin cambios sustanciales en la última pasada. La versión española mantiene esa lectura estable: conserva la litote de «no pequeña», el valor idiomático de «subir» a Jerusalén y la resolución comunitaria de ἔταξαν sin ampliar indebidamente el texto.'
  spanish_consistency_notes:
  - Se mantiene «Pablo» y «Bernabé» para los nombres propios, según el uso estándar en español bíblico.
  - Se traduce πρεσβυτέρους como «ancianos», no como «presbíteros», para conservar claridad y consistencia con Hechos 15.
  - Se usa «disensión» para στάσις y «debate» para ζητήσις, manteniendo la distinción semántica del par griego.
  - Se conserva la litote con «una no pequeña» para reflejar el énfasis retórico del original.
  - Se evita «SEÑOR» o vocabulario de sustitución porque este versículo no contiene el nombre divino.
