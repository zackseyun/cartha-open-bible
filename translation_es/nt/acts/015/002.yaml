  yaml_path: translation/nt/acts/015/002.yaml
  text: And after no small dissension and debate had arisen between Paul and Barnabas and them[c][b][a], they appointed Paul and Barnabas and some others from among them to go up to the apostles and elders in Jerusalem about this issue.
