revisions:
- from: Y después de que se levantó una no pequeña disensión y debate entre Pablo y Bernabé y ellos[a], determinaron que Pablo y Bernabé y algunos otros de entre ellos subieran[b] a los apóstoles y a los ancianos en Jerusalén acerca de este asunto[c].
  to: Y después de que surgió no poca disensión y debate entre Pablo y Bernabé y ellos[a], designaron a Pablo y a Bernabé y a algunos otros de entre ellos para que subieran[b] a Jerusalén, a los apóstoles y a los ancianos, acerca de este asunto[c].
  rationale: 'La revisión mantiene el sentido del griego y del POB inglés, pero mejora la naturalidad del español y ajusta dos puntos clave del audit trail: ἔταξαν se vierte como «designaron» para reflejar nombramiento de delegados, y la litotes οὐκ ὀλίγης se expresa con «no poca», más idiomático que «una no pequeña». También se ordena la frase de destino para que «subieran» suene natural en español sin perder el modismo hacia Jerusalén.'
