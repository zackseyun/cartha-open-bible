  text: But[a] it seemed good to Silas to remain there.
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the 3rd-century Papyrus 74, and the 4th-century Sinaiticus and Vaticanus) and early Coptic translations. It is present in the Byzantine majority tradition, some later Alexandrian and Western manuscripts, and the Latin and Syriac traditions. It was likely added by a later scribe to explain how Silas was still in Antioch to join Paul in verse 40, despite verse 33 stating that he and Judas had departed.
    reason: textual_critical
