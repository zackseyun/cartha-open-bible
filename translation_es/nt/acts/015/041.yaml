translation:
  language: es
  text: Y recorría Siria y Cilicia, fortaleciendo a las iglesias.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διήρχετο
  english_pob_choice: went through
  chosen_spanish: recorría
  alternatives_spanish:
  - iba por
  - pasaba por
  lexicon: BDAG
  rationale: El imperfecto de διέρχομαι expresa desplazamiento en curso a través de regiones. «Recorría» conserva ese valor aspectual y suena natural en español, sin introducir una idea demasiado puntual o meramente momentánea.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona aquí como conector narrativo suave. «Y» reproduce ese avance del relato de manera sobria y fluida en español.
- source_word: Συρίαν
  english_pob_choice: Syria
  chosen_spanish: Siria
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español, equivalente directo y transparente.
- source_word: Κιλικίαν
  english_pob_choice: Cilicia
  chosen_spanish: Cilicia
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español, equivalente directo y transparente.
- source_word: ἐπιστηρίζων
  english_pob_choice: strengthening
  chosen_spanish: fortaleciendo
  alternatives_spanish:
  - animando
  - confirmando
  - estableciendo
  lexicon: BDAG
  rationale: El participio expresa la acción acompañante de afirmar y robustecer a los creyentes. «Fortaleciendo» preserva ese sentido de hacer firmes, sin reducirlo a consuelo emocional ni a una formulación demasiado técnica.
- source_word: τὰς ἐκκλησίας
  english_pob_choice: the churches
  chosen_spanish: las iglesias
  alternatives_spanish:
  - las congregaciones
  - las asambleas
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία se refiere normalmente a las comunidades cristianas locales. «Iglesias» es la forma más clara y natural en español, y mantiene la referencia comunitaria del término.
translation_notes:
  revision_awareness: El texto base inglés y la evaluación de revisión coinciden sin cambios requeridos; la versión española sigue de cerca la lectura griega y la equivalencia óptima del POB, sin añadir notas porque no hay variantes textuales ni tensiones léxicas documentadas en este versículo.
  spanish_consistency_notes:
  - Se mantiene la terminología habitual del POB para ἐκκλησία como «iglesias».
  - Se preserva el aspecto progresivo del imperfecto con un verbo en español que sugiera acción en curso.
  - No se introducen mayúsculas teológicas innecesarias, ya que el versículo no contiene vocabulario divino explícito.
