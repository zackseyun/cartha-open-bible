translation:
  language: es
  text: Después de estas cosas, volveré[a] y reedificaré la tienda caída de David; reedificaré sus ruinas y la restauraré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresaré». El verbo griego puede significar «volver» o «regresar».
    reason: lexical_alternative
  - marker: b
    text: «La tienda de David» conserva la metáfora del griego; puede aludir a la restauración asociada con la línea o el reino de David.
    reason: cross_reference
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de esto
  lexicon: BDAG
  rationale: La forma plural del demostrativo y el giro temporal del texto griego se reflejan mejor con «Después de estas cosas», que sigue de cerca la secuencia original sin sonar forzado en español.
- source_word: ἀναστρέψω
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - regresaré
  - volveré de nuevo
  lexicon: BDAG
  rationale: En este contexto profético-citacional, el verbo expresa retorno. «Volveré» es natural en español y conserva la promesa en primera persona futura.
- source_word: ἀνοικοδομήσω
  english_pob_choice: I will rebuild
  chosen_spanish: reedificaré
  alternatives_spanish:
  - reconstruiré
  - volveré a edificar
  lexicon: BDAG
  rationale: El compuesto indica edificar de nuevo. «Reedificaré» mantiene el valor de restauración del verbo y es claro en español bíblico moderno.
- source_word: σκηνὴν Δαυὶδ
  english_pob_choice: the tent of David
  chosen_spanish: la tienda de David
  alternatives_spanish:
  - el tabernáculo de David
  - la casa de David
  lexicon: BDAG
  rationale: σκηνή significa literalmente «tienda» o «tabernáculo». Se mantiene «tienda» para no desplazar el lenguaje metafórico del griego ni introducir una interpretación más explícita que la del texto.
- source_word: τὴν πεπτωκυῖαν
  english_pob_choice: the fallen
  chosen_spanish: la caída
  alternatives_spanish:
  - que ha caído
  - la derribada
  lexicon: BDAG
  rationale: El participio perfecto describe el estado resultante de haber caído. En español, «la caída» funciona como adjetivación sustantiva breve y conserva la imagen de ruina/restauración.
- source_word: τὰ κατεσκαμμένα αὐτῆς
  english_pob_choice: its ruins
  chosen_spanish: sus ruinas
  alternatives_spanish:
  - las cosas derribadas de ella
  - sus escombros
  lexicon: BDAG
  rationale: El plural neutro perfecto pasivo apunta a lo demolido. «Sus ruinas» expresa de manera natural el conjunto de restos sin perder la idea de destrucción.
- source_word: ἀνορθώσω
  english_pob_choice: I will restore
  chosen_spanish: la restauraré
  alternatives_spanish:
  - la levantaré
  - la restableceré
  lexicon: BDAG
  rationale: El verbo puede significar enderezar, levantar o restaurar. En paralelo con reedificar, «restauraré» comunica bien el resultado final sin forzar una metáfora técnica en español.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la misma
  - ella
  lexicon: BDAG
  rationale: El pronombre retoma σκηνή, femenino en griego. En español, el antecedente estructural es femenino y «la» mantiene la referencia.
theological_decisions:
- issue: La metáfora de «la tienda de David»
  english_pob_reading: Retain the metaphor as 'the tent of David' rather than interpret it directly as 'David's dynasty/kingdom.'
  chosen_spanish_reading: Conservar la metáfora como «la tienda de David» sin explicitar en el cuerpo del texto «dinastía» o «reino».
  alternative_spanish_readings:
  - la casa de David
  - la dinastía caída de David
  rationale: El texto griego preserva la imagen metafórica y la POB inglesa evita resolverla de forma interpretativa. Mantenerla en español respeta la tensión profética y deja abierta la referencia al trasfondo bíblico sin añadirla al versículo.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada no introdujo cambios respecto del último pase; por eso la propuesta española sigue de cerca el texto auditado y mantiene la misma solución metafórica y verbal.
  spanish_consistency_notes:
  - Se prefiere «reedificar» para mantener el paralelismo con «reconstrucción/restauración» sin sustituir el matiz de ἀνοικοδομέω por un verbo más general.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita donde sea necesario decidir entre κύριος y Yahvé.
  - Se conserva el singular femenino de referencia («la») para σκηνή, aunque en español la imagen completa sea una construcción inanimada.
