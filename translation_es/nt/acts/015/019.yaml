translation:
  language: es
  text: Por tanto, yo juzgo que no debemos molestar a los que de entre los gentiles[a] se vuelven a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre las naciones». El término griego puede significar «naciones», pero aquí se refiere a gentiles, es decir, a personas no judías que se vuelven a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «yo concluyo que no debemos molestar» o «es mi juicio no molestar».
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la inferencia lógica desde la argumentación previa, manteniendo el valor conclusivo del griego.
- source_word: ἐγὼ κρίνω
  english_pob_choice: I judge that
  chosen_spanish: yo juzgo
  alternatives_spanish:
  - yo concluyo
  - es mi juicio
  lexicon: BDAG
  rationale: Conserva la primera persona explícita y el matiz de decisión o juicio ponderado de κρίνω en este contexto deliberativo.
- source_word: μὴ παρενοχλεῖν
  english_pob_choice: we should not trouble
  chosen_spanish: que no debemos molestar
  alternatives_spanish:
  - que no debemos causar dificultades a
  - que no debemos perturbar
  lexicon: BDAG
  rationale: El infinitivo con μή depende de κρίνω y expresa el contenido de la decisión. 'Molestar' comunica en español actual la idea de causar carga o dificultad sin suavizar demasiado el verbo griego.
- source_word: τοῖς ἀπὸ τῶν ἐθνῶν
  english_pob_choice: those from among the Gentiles
  chosen_spanish: a los que, procedentes de entre las naciones
  alternatives_spanish:
  - a los que vienen de entre los gentiles
  - a los de entre las naciones
  lexicon: BDAG
  rationale: La frase marca personas originadas 'de entre' las naciones; 'procedentes de entre las naciones' preserva el matiz relacional sin convertirlo en una simple categoría abstracta.
- source_word: ἐθνῶν
  english_pob_choice: Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: '''ἔθνη'' puede significar ''naciones'', y aquí esa opción permite mantener la tensión histórica del término, con resonancia judía frente a no judíos. En el flujo español, la expresión se entiende como referencia a personas no judías por el contexto.'
- source_word: ἐπιστρέφουσιν
  english_pob_choice: are turning
  chosen_spanish: se están volviendo
  alternatives_spanish:
  - están volviendo
  - se convierten
  lexicon: BDAG
  rationale: El participio presente indica un proceso en curso; 'se están volviendo' conserva esa imagen de movimiento hacia Dios sin imponer un tecnicismo posterior.
- source_word: ἐπὶ τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  lexicon: BDAG
  rationale: Con el verbo de retorno, el complemento expresa dirección hacia Dios. 'A Dios' resulta idiomático y fiel; 'hacia Dios' habría explicitado más el movimiento, pero no es necesario.
theological_decisions:
- issue: Si traducir la frase como una decisión personal de Jacobo o como una recomendación para la asamblea
  english_pob_reading: 'James states his own judgment in a form that implies a recommendation for the assembly: ''I judge that we should not trouble...'''
  chosen_spanish_reading: Yo juzgo que no debemos molestar...
  alternative_spanish_readings:
  - Yo juzgo no molestar...
  - Es mi juicio que no debemos molestar...
  - Yo decido que no debemos molestar...
  rationale: La primera persona singular queda visible y el contenido de la resolución suena naturalmente comunitario en español. 'Debemos' reproduce bien el valor práctico de la decisión sin diluir el juicio personal de Jacobo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si ἔθνη debe reflejarse como 'naciones' o como 'gentiles' en este contexto
  english_pob_reading: The Greek term can mean 'nations,' but here refers to Gentiles turning to God.
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - las naciones, es decir, los gentiles
  rationale: En español, 'naciones' mantiene la posibilidad semántica del término griego y evita cerrar demasiado pronto la opción léxica. El contexto de personas que se vuelven a Dios hace inequívoco que se trata de no judíos.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión registrada que añadió 'among' para reflejar con mayor precisión τοῖς ἀπὸ τῶν ἐθνῶν. Por eso el español usa 'procedentes de entre las naciones', que conserva el matiz de procedencia interna sin reducirlo a una categoría genérica. También se atendió al estatus final de alta concordancia del cotejo, sin introducir expansiones interpretativas no sustentadas por el griego.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεόν según el estándar del proyecto.
  - Se evitó 'SEÑOR' porque el texto griego dice θεόν, no el nombre divino ni κύριος.
  - Se prefirió una construcción que conserve la voz personal de ἐγώ κρίνω y el alcance comunitario de la decisión.
  - El marcador [a] aparece en el texto junto a 'las naciones', y [b] junto a la cláusula de juicio, sin reutilizar marcadores.
