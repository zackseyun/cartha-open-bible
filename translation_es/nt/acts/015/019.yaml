- from: Por tanto, yo juzgo que no debemos molestar a los que, procedentes de entre las naciones, se están volviendo a Dios[a][b].
  to: Por tanto, yo juzgo que no debemos molestar a los que de entre los gentiles[a] se vuelven a Dios[b].
  rationale: Se corrige el término principal para ἐθνῶν a «gentiles», en línea con el sentido contextual y la auditoría inglesa, dejando «naciones» como alternativa en nota. También se aligera la frase preposicional a «de entre» y se mejora la naturalidad verbal con «se vuelven a Dios».
