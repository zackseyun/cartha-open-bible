review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: διὸ = «Por tanto», ἐγὼ κρίνω = «yo juzgo», y refleja adecuadamente la fuerza deliberativa de μὴ παρενοχλεῖν con «no debemos…». También conserva el matiz progresivo de ἐπιστρέφουσιν. Sin embargo, la decisión principal sobre ἐθνῶν no sigue el sentido contextual ni la auditoría inglesa: en este contexto se refiere a «gentiles», y el inglés POB dejó «nations» solo como alternativa en nota, no como texto principal.'
  spanish_quality_summary: El español es claro y digno, pero «procedentes de entre las naciones» suena más pesado y menos natural en este contexto eclesial que «de entre los gentiles». Además, «se están volviendo a Dios» es comprensible, aunque «se vuelven a Dios» fluye mejor y sigue siendo fiel al participio presente. El conjunto necesita un ajuste menor, no una reescritura mayor.
  glossary_alignment: 'Hay desalineación con la decisión léxica documentada para ἔθνη/ἐθνῶν en este versículo: el texto principal debe reflejar «gentiles», mientras «naciones» puede preservarse en nota como alternativa. No hay conflictos con otros términos del glosario del proyecto.'
  issues:
  - severity: medium
    issue: «las naciones» en el texto principal para ἐθνῶν
    rationale: La evidencia contextual y la auditoría inglesa indican que aquí ἔθνη se refiere a no judíos/gentiles. En español bíblico actual, «las naciones» puede sonar demasiado literal y menos preciso en este contexto.
  - severity: low
    issue: «procedentes de entre» suena pesado
    rationale: Aunque es defendible, resulta menos natural que «de entre» y no aporta una precisión adicional necesaria.
  - severity: low
    issue: «se están volviendo» puede simplificarse
    rationale: «Se vuelven a Dios» preserva bien la idea de conversión en curso sin la perífrasis progresiva, que en español aquí suena algo forzada.
  revised_spanish_text: Por tanto, yo juzgo que no debemos molestar a los que de entre los gentiles[a] se vuelven a Dios[b].
  revised_footnotes:
  - marker: a
    text: O «de entre las naciones». El término griego puede significar «naciones», pero aquí se refiere a gentiles, es decir, a personas no judías que se vuelven a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «yo concluyo que no debemos molestar» o «es mi juicio no molestar».
    reason: alternative_reading
  revision_rationale: Se corrige el término principal para ἐθνῶν a «gentiles», en línea con el sentido contextual y la auditoría inglesa, dejando «naciones» como alternativa en nota. También se aligera la frase preposicional a «de entre» y se mejora la naturalidad verbal con «se vuelven a Dios».
