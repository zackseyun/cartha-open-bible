review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: permanencia por un tiempo, despedida pacífica y retorno a sus comisionadores. Sin embargo, dos preposiciones se han resuelto de forma poco fiel en español: ἀπὸ τῶν ἀδελφῶν debe reflejar origen procedente de los hermanos (''de los hermanos''), no agencia (''por los hermanos''); y πρὸς τοὺς ἀποστείλαντας αὐτούς se expresa mejor como destino directo (''a los que los habían enviado'') que ''hacia'', que suena menos natural aquí.'
  spanish_quality_summary: El texto es mayormente claro, pero 'fueron despedidos en paz por los hermanos, hacia los que...' suena algo forzado en español bíblico natural. 'De los hermanos' y 'a los que los habían enviado' mejoran tanto fidelidad como fluidez. La nota al pie está bien formulada y el anclaje [a] es correcto.
  glossary_alignment: No hay términos del glosario mayor implicados. La decisión sobre ἀδελφοί como 'hermanos' en texto principal con nota inclusiva concuerda con la filosofía del proyecto. 'En paz' también está bien alineado.
  issues:
  - severity: medium
    issue: Uso de 'por los hermanos' para ἀπὸ τῶν ἀδελφῶν
    rationale: ἀπό marca procedencia/origen, no agencia. 'Por los hermanos' en español cambia el matiz a agente de la acción; 'de los hermanos' o 'de parte de los hermanos' conserva mejor el sentido.
  - severity: medium
    issue: Uso de 'hacia los que los habían enviado' para πρὸς τοὺς ἀποστείλαντας αὐτούς
    rationale: '''Hacia'' es gramaticalmente posible pero menos idiomático en este contexto de envío a destinatarios concretos. ''A los que los habían enviado'' refleja mejor el destino personal indicado por πρός.'
  - severity: low
    issue: Anclaje de la nota [a] en 'allí' en vez de 'hermanos'
    rationale: La nota explica el alcance inclusivo de 'hermanos', por lo que el marcador debe ir sobre 'hermanos', no sobre 'allí', para evitar ambigüedad.
  revised_spanish_text: Y después de pasar algún tiempo allí, fueron despedidos en paz de los hermanos[a] a los que los habían enviado.
  revised_footnotes:
  - marker: a
    text: O «de los hermanos y hermanas»; el griego dice «hermanos», pero en este contexto probablemente se refiere de manera inclusiva a la comunidad creyente.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las preposiciones para reflejar mejor el griego y mejorar la naturalidad en español: ''de los hermanos'' por ἀπὸ τῶν ἀδελφῶν y ''a los que los habían enviado'' por πρὸς τοὺς ἀποστείλαντας αὐτούς. También se reubica la nota al pie sobre ''hermanos'', que es el término al que realmente comenta.'
