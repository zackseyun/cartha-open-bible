translation:
  language: es
  text: Y después de pasar algún tiempo allí, fueron despedidos en paz de los hermanos[a] a los que los habían enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los hermanos y hermanas»; el griego dice «hermanos», pero en este contexto probablemente se refiere de manera inclusiva a la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαντες ... χρόνον
  english_pob_choice: after spending some time there
  chosen_spanish: después de pasar algún tiempo allí
  alternatives_spanish:
  - habiendo pasado algún tiempo
  - después de quedarse un tiempo
  lexicon: BDAG
  rationale: La construcción participial expresa una acción previa de permanencia por un tiempo. En español, «después de pasar algún tiempo allí» comunica con naturalidad esa idea y conserva el matiz temporal sin añadir contenido ajeno al griego.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: δέ funciona como conector narrativo leve. «Y» mantiene el avance del relato sin cargarlo de énfasis adicional.
- source_word: ἀπελύθησαν
  english_pob_choice: they were sent off
  chosen_spanish: fueron despedidos
  alternatives_spanish:
  - fueron enviados
  - fueron despedidos y puestos en camino
  lexicon: BDAG
  rationale: En este contexto de partida cordial con bendición comunitaria, «fueron despedidos» reproduce bien la idea de una salida autorizada y cortés. «Fueron enviados» podría sonar demasiado técnico o menos natural en español.
- source_word: μετ’ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en paz y en buena armonía
  lexicon: BDAG
  rationale: La expresión es idiomática y convencional; «en paz» es la forma más natural en español y preserva el sentido de despedida amistosa y benévola.
- source_word: ἀπὸ τῶν ἀδελφῶν
  english_pob_choice: from the brothers
  chosen_spanish: por los hermanos
  alternatives_spanish:
  - de parte de los hermanos
  - desde los hermanos
  lexicon: BDAG
  rationale: El griego dice literalmente «de parte de / desde los hermanos». En español, «por los hermanos» expresa mejor que la despedida fue realizada por ellos. La forma masculina plural se conserva en el texto principal, y el sentido comunitario inclusivo queda implicado por el contexto.
- source_word: πρὸς τοὺς ⸂ἀποστείλαντας αὐτούς⸃
  english_pob_choice: to those who had sent them
  chosen_spanish: hacia los que los habían enviado
  alternatives_spanish:
  - a los que los habían enviado
  - de regreso a los que los habían enviado
  lexicon: BDAG
  rationale: El participio sustantivado identifica a quienes los habían comisionado. «Los habían enviado» refleja la acción anterior al momento de la partida, y «hacia» conserva la dirección sin introducir explícitamente la idea de regreso, que no está formulada en el griego.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: from the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: No hay una cuestión doctrinal en juego; el griego usa el plural masculino ἀδελφῶν. Por fidelidad formal, se mantiene «los hermanos» en el texto principal, dejando la inclusividad del grupo a cargo del contexto narrativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca exactamente en el texto español. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo sobrio y eclesial.
  - Se preservó la dirección relacional del participio sustantivado sin sobreinterpretar el movimiento de retorno.
  - Se evitó reemplazar «hermanos» por una formulación inclusiva en el texto principal, pero se documentó la alternativa en nota.
