translation:
  language: es
  text: excepto que el Espíritu Santo me da testimonio en ciudad tras ciudad[a], diciendo que me esperan cadenas[b] y aflicciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ciudad en ciudad» o «en cada ciudad». El giro griego es distributivo y señala un testimonio repetido en ciudades sucesivas.
    reason: lexical_alternative
  - marker: b
    text: O «ataduras». «Cadenas» conserva la imagen concreta del griego; «ataduras» refleja una versión más tradicional y algo más amplia.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos presentan una leve diferencia en la colocación o presencia de «me» con «aflicciones», pero el sentido sigue siendo que cadenas y aflicciones aguardan a Pablo.
    reason: textual_variant
lexical_decisions:
- source_word: πλὴν ὅτι
  english_pob_choice: except that
  chosen_spanish: salvo que
  alternatives_spanish:
  - excepto que
  - solo que
  - más bien
  lexicon: BDAG
  rationale: La frase introduce una salvedad frente a lo dicho antes. «Salvo que» reproduce bien el valor exceptivo sin sonar forzado en español, y mantiene el matiz de excepción de la cláusula griega.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  - el Espíritu
  lexicon: BDAG
  rationale: La referencia es al agente divino personal que habla y da testimonio. «Espíritu Santo» es la forma natural y doctrinalmente clara en español, sin perder la identificación específica.
- source_word: κατὰ πόλιν
  english_pob_choice: in city after city
  chosen_spanish: en ciudad tras ciudad
  alternatives_spanish:
  - de ciudad en ciudad
  - en cada ciudad
  lexicon: BDAG
  rationale: El griego usa un distributivo que indica repetición por localidades sucesivas. «En ciudad tras ciudad» conserva ese valor iterativo sin sobretraducirlo como universalidad absoluta.
- source_word: διαμαρτύρεταί μοι
  english_pob_choice: testifies to me
  chosen_spanish: da testimonio de mí
  alternatives_spanish:
  - testifica de mí
  - me da testimonio
  - me advierte
  lexicon: BDAG
  rationale: «Da testimonio de mí» expresa el sentido de dar testimonio solemne y suena natural en español bíblico. Evita reducirlo a mera advertencia, que sería más interpretativo que el griego.
- source_word: λέγον
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  - afirmando
  lexicon: BDAG
  rationale: Introduce el contenido del testimonio del Espíritu. «Diciendo» es la traducción más directa y transparente del participio.
- source_word: δεσμὰ
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - prisiones
  - ataduras
  lexicon: BDAG
  rationale: El término griego es concreto; «cadenas» preserva esa imagen material mejor que un equivalente más abstracto. En español, además, comunica bien la idea de prisión o cautiverio sin perder fuerza.
- source_word: θλίψεις
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - tribulaciones y angustias
  - penas
  lexicon: BDAG
  rationale: «Aflicciones» mantiene el peso de θλίψεις como presiones o sufrimientos que vienen encima. Es más preciso y digno que «problemas» o «dificultades», y menos técnico que «tribulaciones».
- source_word: μένουσιν
  english_pob_choice: await
  chosen_spanish: me esperan
  alternatives_spanish:
  - están reservadas para mí
  - han de venir sobre mí
  - me aguardan
  lexicon: BDAG
  rationale: En contexto, el verbo comunica que esas realidades están por delante de Pablo. «Me esperan» expresa bien la fuerza prospectiva en español y encaja naturalmente con «cadenas y aflicciones».
theological_decisions:
- issue: Referencia al Espíritu Santo como agente personal que habla y testimonia
  english_pob_reading: A personal divine agent who bears witness to Paul
  chosen_spanish_reading: El Espíritu Santo aparece como sujeto personal que da testimonio y comunica contenido profético a Pablo.
  alternative_spanish_readings:
  - una influencia espiritual impersonal
  - una inspiración interna sin habla personal
  rationale: El verbo de testimonio y el participio de habla presentan al Espíritu como agente personal. La traducción conserva esa lectura sin añadir formulaciones doctrinales ajenas al versículo.
  doctrine_reference: Credo Niceno-Constantinopolitano (381)
translation_notes:
  revision_awareness: Se mantuvo el sentido del texto griego y la auditoría inglesa sin depender mecánicamente del inglés. No se introdujeron cambios doctrinales nuevos; se conservó el valor distributivo de κατὰ πόλιν, el matiz concreto de δεσμά y la fuerza prospectiva de μένουσιν.
  spanish_consistency_notes:
  - Se usó «Espíritu Santo» de forma consistente con la terminología de la serie para τὸ πνεῦμα τὸ ἅγιον.
  - Se prefirió «cadenas» en lugar de «prisiones» para respetar la imagen concreta del original.
  - Se evitó «tribulaciones» porque, aunque posible, «aflicciones» refleja mejor el registro general y la auditoría inglesa.
  - La colocación de las notas sigue los puntos donde el español necesita una alternativa explicativa o donde existe variante textual relevante.
