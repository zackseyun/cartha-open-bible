revisions:
- from: salvo que el Espíritu Santo da testimonio de mí en ciudad tras ciudad[a], diciendo que me esperan cadenas y aflicciones[b][c].
  to: excepto que el Espíritu Santo me da testimonio en ciudad tras ciudad[a], diciendo que me esperan cadenas[b] y aflicciones[c].
  rationale: Se corrige un error de sentido importante en διαμαρτύρεταί μοι, cambiando «da testimonio de mí» por «me da testimonio». También se mejora la naturalidad de πλὴν ὅτι con «excepto que» y se ajusta la nota léxica sobre δεσμὰ para reflejar mejor la alternativa documentada sin alejarse de la imagen concreta del griego.
