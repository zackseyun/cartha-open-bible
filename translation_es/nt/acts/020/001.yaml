translation:
  language: es
  text: Después de que cesó el alboroto, Pablo mandó llamar a los discípulos, y después de animarlos y despedirse[a] de ellos, partió para ir a Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saludarlos»; el griego puede denotar tanto un saludo como, en un contexto de partida, una despedida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὸ παύσασθαι
  english_pob_choice: After the uproar had ceased
  chosen_spanish: Después de que cesó
  alternatives_spanish:
  - Cuando cesó
  - Después de que terminó
  lexicon: SBLGNT; BDAG
  rationale: La construcción temporal con μετά + infinitivo articular se vierte de manera natural con «Después de que...», manteniendo la relación de anterioridad sin añadir un pasado perfecto obligatorio en español.
- source_word: τὸν θόρυβον
  english_pob_choice: the uproar
  chosen_spanish: el alboroto
  alternatives_spanish:
  - la algarabía
  - el tumulto
  lexicon: BDAG
  rationale: En este contexto narrativo de disturbio público, «alboroto» comunica bien la idea de agitación colectiva de forma natural en español, sin sonar demasiado técnico.
- source_word: μεταπεμψάμενος
  english_pob_choice: sent for
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió a llamar
  - llamó
  lexicon: BDAG
  rationale: El medio participio indica que Pablo hizo venir a los discípulos hacia sí. «Mandó llamar» conserva esa dirección causativa con naturalidad idiomática en español.
- source_word: τοὺς μαθητὰς
  english_pob_choice: the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a los discípulos de allí
  - a los seguidores
  lexicon: BDAG
  rationale: «Discípulos» preserva el término del texto y su uso característico en Hechos, en vez de sustituirlo por un equivalente más general.
- source_word: παρακαλέσας
  english_pob_choice: after encouraging them
  chosen_spanish: después de animarlos
  alternatives_spanish:
  - después de exhortarlos
  - después de consolarlos
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar exhortar, animar o consolar; aquí, en un contexto de despedida y fortalecimiento, «animarlos» es amplio y fiel, sin estrechar indebidamente el matiz.
- source_word: ἀσπασάμενος
  english_pob_choice: saying farewell
  chosen_spanish: despedirse de ellos
  alternatives_spanish:
  - saludarlos
  - tomar despedida de ellos
  lexicon: BDAG
  rationale: Aunque literalmente puede significar «saludar», en un contexto de salida expresa el acto de despedirse. «Despedirse de ellos» refleja esa fuerza situacional.
- source_word: ἐξῆλθεν
  english_pob_choice: he departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: El verbo básico es «salir»; en este contexto de desplazamiento, el español «salió» mantiene la concreción del movimiento sin forzar una fórmula más interpretativa.
- source_word: πορεύεσθαι εἰς Μακεδονίαν
  english_pob_choice: to go to Macedonia
  chosen_spanish: para ir a Macedonia
  alternatives_spanish:
  - a ir a Macedonia
  - para viajar a Macedonia
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con claridad en español mediante «para ir a Macedonia», conservando la dirección del viaje sin añadir información.
translation_notes:
  revision_awareness: Se corrigió la validación eliminando cualquier nota no anclada; el versículo se presenta sin notas al pie porque la ambigüedad de ἀσπασάμενος queda resuelta en la traducción principal como contexto de despedida.
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término narrativo estable de Hechos.
  - Se eligió «alboroto» para θόρυβος en coherencia con el episodio precedente de disturbio público.
  - Se evitó «Cristo» o vocabulario teológico no presente en el versículo.
  - La sintaxis española sigue de cerca la secuencia verbal del griego sin calcos innecesarios.
