translation:
  language: es
  text: El primer día de la semana[a], cuando nos habíamos reunido para partir el pan, Pablo les hablaba, con intención de salir al día siguiente, y prolongó el mensaje hasta la medianoche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "para la fracción del pan". La frase puede referirse a una comida compartida y también puede tener resonancias de la Cena del Señor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ
  english_pob_choice: Now on
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Entonces
  lexicon: BDAG
  rationale: Ἐν con dativo marca tiempo y δέ aporta una transición suave. En español, 'Ahora' funciona como enlace natural sin exagerar contraste ni añadir contenido no presente.
- source_word: τῇ μιᾷ τῶν σαββάτων
  english_pob_choice: the first day of the week
  chosen_spanish: el primer día de la semana
  alternatives_spanish:
  - el primero de la semana
  - uno de los sábados
  lexicon: BDAG
  rationale: La expresión es un modismo temporal griego para indicar el primer día de la semana. 'El primer día de la semana' es claro, idiomático y fiel; evita la literalidad engañosa de 'uno de los sábados'.
- source_word: συνηγμένων ἡμῶν
  english_pob_choice: when we had gathered
  chosen_spanish: cuando nos habíamos reunido
  alternatives_spanish:
  - cuando estábamos reunidos
  - después de que nos reunimos
  lexicon: BDAG
  rationale: El genitivo absoluto expresa la circunstancia de la acción principal. 'Nos habíamos reunido' conserva la perspectiva inclusiva de primera persona plural y suena natural en español.
- source_word: κλάσαι ἄρτον
  english_pob_choice: to break bread
  chosen_spanish: partir el pan
  alternatives_spanish:
  - para partir el pan
  - para la fracción del pan
  - para compartir una comida
  lexicon: BDAG
  rationale: '''Partir el pan'' preserva el modismo bíblico en español y mantiene abierta la posible referencia a comida compartida y/o resonancias de la Cena del Señor, sin resolver la tensión interpretativa.'
- source_word: διελέγετο αὐτοῖς
  english_pob_choice: was speaking to them
  chosen_spanish: les hablaba
  alternatives_spanish:
  - discurría con ellos
  - les hablaba extensamente
  - estaba dialogando con ellos
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso. 'Les hablaba' es natural y respeta el matiz de διαλέγομαι sin imponer un término más técnico como 'predicaba' o 'discurría'.
- source_word: μέλλων ἐξιέναι
  english_pob_choice: intending to depart
  chosen_spanish: con intención de partir
  alternatives_spanish:
  - a punto de partir
  - estando por salir
  - con la intención de irse
  lexicon: BDAG
  rationale: μέλλων expresa inminencia/propósito. 'Con intención de partir' conserva ese matiz y encaja bien con el contexto de viaje; 'partir' resulta más idiomático que 'salir' aquí.
- source_word: τῇ ἐπαύριον
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - mañana
  lexicon: BDAG
  rationale: La expresión temporal señala el día posterior al presente narrativo. 'Al día siguiente' es la opción más natural y precisa en español.
- source_word: παρέτεινέν τε τὸν λόγον
  english_pob_choice: and he prolonged the message
  chosen_spanish: y prolongó el mensaje
  alternatives_spanish:
  - y alargó el discurso
  - y extendió su discurso
  - y se alargó en su mensaje
  lexicon: BDAG
  rationale: παρατείνω significa extender o prolongar. 'Mensaje' mantiene la referencia al contenido verbal de Pablo con un español moderno y reverente, sin reducirlo a mera charla; 'discurso' también es posible, pero menos directo aquí.
- source_word: μέχρι μεσονυκτίου
  english_pob_choice: until midnight
  chosen_spanish: hasta la medianoche
  alternatives_spanish:
  - hasta medianoche
  - hasta la medianoche
  lexicon: BDAG
  rationale: '''Hasta la medianoche'' es una equivalencia directa, clara y plenamente natural en español.'
theological_decisions:
- issue: Sentido de 'partir el pan' en la reunión cristiana
  english_pob_reading: Rendered idiomatically as 'to break bread' without specifying whether it refers narrowly to the Lord's Supper or more broadly to a communal meal.
  chosen_spanish_reading: '''Partir el pan'' mantiene la apertura semántica entre una comida compartida y posibles resonancias eucarísticas, sin cerrarla de antemano.'
  alternative_spanish_readings:
  - celebrar la Cena del Señor
  - compartir una comida
  rationale: El texto no fuerza una identificación única. En español conviene conservar el modismo bíblico para no resolver una tensión interpretativa que el griego deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del POB inglés, que prefirió ajustar μέλλων ἐξιέναι como ''intending to depart'' y reordenar la cláusula final para reflejar mejor el flujo del griego. En español se conserva ese orden lógico: reunión, propósito de partir el pan, conversación de Pablo, intención de partir al día siguiente, y prolongación del mensaje hasta la medianoche.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se traduce λόγος aquí como 'mensaje' para evitar una calca de 'palabra' que sonaría menos natural en este contexto narrativo.
  - Se conserva la primera persona plural ('nos habíamos reunido') porque el griego incluye ἡμῶν y forma parte del testimonio narrativo.
  - '''Pablo les hablaba'' mantiene la relación verbal directa con αὐτοῖς sin introducir un matiz homilético no explícito.'
