revisions:
- from: Ahora, el primer día de la semana[a], cuando nos habíamos reunido para partir el pan, Pablo les hablaba, con intención de partir al día siguiente, y prolongó el mensaje hasta la medianoche.
  to: El primer día de la semana[a], cuando nos habíamos reunido para partir el pan, Pablo les hablaba, con intención de salir al día siguiente, y prolongó el mensaje hasta la medianoche.
  rationale: Se corrigió la nota al pie para que preserve una alternativa real y útil, en línea con la auditoría inglesa. También se reemplazó el segundo 'partir' por 'salir' para evitar una repetición ambigua en español, sin alterar el sentido de μέλλων ἐξιέναι. Se eliminó 'Ahora' por naturalidad estilística; el matiz conectivo de δέ no requiere un equivalente explícito aquí.
