translation:
  language: es
  text: Después de pasar allí tres meses, cuando se tramó una conspiración[b] contra él por los judíos[a], al estar por zarpar hacia Siria[c], decidió regresar por Macedonia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "los judíos"; en Hechos, esta expresión suele referirse en contexto a un grupo concreto que se opone a Pablo, no a todo el pueblo judío sin distinción.'
    reason: cultural_note
  - marker: b
    text: 'O: "cuando surgió una conspiración contra él".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "al estar por hacerse a la mar hacia Siria".'
    reason: lexical_alternative
  - marker: d
    text: 'O: "decidió volver por Macedonia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας τε μῆνας τρεῖς
  english_pob_choice: After spending three months there
  chosen_spanish: Después de pasar allí tres meses
  alternatives_spanish:
  - habiendo pasado tres meses
  - después de haber pasado tres meses
  lexicon: BDAG
  rationale: El participio aoristo con expresión de tiempo funciona idiomáticamente como 'pasar' un período. 'Después de pasar' conserva la secuencia temporal natural en español. 'Allí' refleja el contexto inmediato del lugar de la estancia, aunque no aparezca explícitamente en este versículo.
- source_word: γενομένης ἐπιβουλῆς αὐτῷ
  english_pob_choice: when a plot was made against him
  chosen_spanish: cuando se tramó una conspiración
  alternatives_spanish:
  - cuando surgió una conspiración contra él
  - cuando hubo una conspiración contra él
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa una circunstancia temporal. ἐπιβουλή denota un plan hostil; en español, 'conspiración' transmite bien esa idea. 'Se tramó' conserva el matiz de acción deliberada y hostil.
- source_word: ὑπὸ τῶν Ἰουδαίων
  english_pob_choice: by the Jews
  chosen_spanish: por parte de los judíos
  alternatives_spanish:
  - por los judíos
  - por algunos judíos
  lexicon: BDAG
  rationale: El griego dice literalmente 'por los judíos'. 'Por parte de' mantiene el referente sin sugerir que se trata de todo el pueblo judío, y ayuda a preservar el matiz contextual señalado en la nota inglesa.
- source_word: μέλλοντι ἀνάγεσθαι
  english_pob_choice: as he was about to sail
  chosen_spanish: al estar por zarpar
  alternatives_spanish:
  - cuando estaba por zarpar
  - estando por hacerse a la mar
  lexicon: BDAG
  rationale: μέλλω expresa inminencia. ἀνάγεσθαι, en contexto de viaje marítimo, significa 'zarpar' o 'hacerse a la mar'. 'Al estar por zarpar' es natural y preciso.
- source_word: εἰς τὴν Συρίαν
  english_pob_choice: for Syria
  chosen_spanish: hacia Siria
  alternatives_spanish:
  - a Siria
  - para Siria
  lexicon: BDAG
  rationale: El destino expresado por εἰς se puede verter de manera natural como 'hacia'. Dado el contexto de navegación, 'hacia Siria' comunica dirección sin forzar un giro poco usual en español.
- source_word: ἐγένετο γνώμης
  english_pob_choice: he decided
  chosen_spanish: decidió
  alternatives_spanish:
  - tomó la decisión
  - resolvió
  lexicon: BDAG
  rationale: La expresión idiomática indica llegar a una resolución. 'Decidió' es la forma más clara y directa en español, sin perder el valor deliberativo.
- source_word: τοῦ ὑποστρέφειν
  english_pob_choice: to return
  chosen_spanish: regresar
  alternatives_spanish:
  - volver
  - retornar
  lexicon: BDAG
  rationale: El infinitivo articular expresa el contenido de la decisión. 'Regresar' es una equivalencia natural y elegante en español moderno para el movimiento de vuelta.
- source_word: διὰ Μακεδονίας
  english_pob_choice: through Macedonia
  chosen_spanish: por Macedonia
  alternatives_spanish:
  - a través de Macedonia
  - por vía de Macedonia
  lexicon: BDAG
  rationale: διά con genitivo indica ruta. 'Por Macedonia' es la forma más natural en español para una ruta de viaje y conserva la idea de pasar por esa región.
theological_decisions:
- issue: Referencia de 'los judíos' en un relato de conflicto
  english_pob_reading: Retain the literal phrase 'the Jews' in the main text, with contextual clarification in a footnote that this refers to a particular hostile group in context, not the Jewish people as a whole.
  chosen_spanish_reading: Mantener 'los judíos' en la nota y en el sentido contextual, con una aclaración que indique que se refiere a un grupo hostil en ese momento, no al pueblo judío en general.
  alternative_spanish_readings:
  - judíos adversarios
  - algunos judíos
  rationale: El texto griego usa explícitamente τῶν Ἰουδαίων. Para no suavizar indebidamente el enunciado, se conserva el referente, pero la nota evita una generalización étnica que el contexto no exige.
  doctrine_reference: Principio de primacía del original y de precisión contextual; evitar imputar al texto una generalización que no afirma.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el archivo auditado en inglés. La redacción española mantiene la secuencia temporal, la pasiva/mediación de la conspiración, la inminencia del zarpe y la decisión de retorno por ruta macedónica, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo.'
  - Se prefirió 'conspiración' para ἐπιβουλή por su fuerza hostil y su naturalidad en español.
  - '''Por Macedonia'' conserva la función de ruta de διά con genitivo.'
  - La nota sobre 'los judíos' preserva el matiz contextual sin alterar el texto principal.
