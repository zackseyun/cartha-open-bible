  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: estancia de tres meses, complot contra Pablo, inminencia de zarpar a Siria y decisión de regresar por Macedonia. Sin embargo, la distribución de notas al pie no preserva fielmente la auditoría inglesa: la nota cultural sobre ''los judíos'' está anclada en ''tres meses'' en vez de en ''los judíos'', y las notas b/c están intercambiadas respecto a sus referentes. Además, la decisión léxica documentada para ὑπὸ τῶν Ἰουδαίων requiere conservar literalmente ''los judíos'' en el texto principal; ''por parte de los judíos'' introduce un matiz suavizador no presente en la fuente.'
