  glossary_alignment: No hay términos del glosario mayor en juego salvo la referencia a 'los judíos'. Debe mantenerse en el texto principal exactamente como equivalente de τῶν Ἰουδαίων, con aclaración contextual en nota, no mitigado mediante una perífrasis en el cuerpo del texto.
