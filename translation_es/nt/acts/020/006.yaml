translation:
  language: es
  text: Pero nosotros zarpamos[a] después de los días de los Panes sin Levadura, de Filipos, y llegamos a ellos en Troas en cinco días, donde nos quedamos siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de cinco días». La expresión griega marca la duración del viaje hasta la llegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλεύσαμεν
  english_pob_choice: sailed away
  chosen_spanish: zarpamos
  alternatives_spanish:
  - navegamos
  - salimos por mar
  lexicon: BDAG
  rationale: El verbo griego indica partida por barco desde un punto de salida. «Zarpamos» comunica con naturalidad esa salida marítima en español y conserva la idea de partir, sin añadir matices ajenos.
- source_word: μετὰ τὰς ἡμέρας τῶν ἀζύμων
  english_pob_choice: after the days of Unleavened Bread
  chosen_spanish: después de los días de los Panes sin Levadura
  alternatives_spanish:
  - después de la Fiesta de los Panes sin Levadura
  - después de los días de los Ázimos
  lexicon: BDAG
  rationale: El griego alude literalmente a «los días de los ázimos», es decir, el período festivo judío. «Panes sin Levadura» mantiene la imagen del texto y resulta claro en español; «Fiesta» sería una explicación válida pero más interpretativa.
- source_word: ἀπὸ Φιλίππων
  english_pob_choice: from Philippi
  chosen_spanish: desde Filipos
  alternatives_spanish:
  - de Filipos
  lexicon: BDAG
  rationale: La preposición ἀπό aquí expresa punto de partida. «Desde Filipos» reproduce mejor la relación de origen que un simple «de» y suena natural en español.
- source_word: ἤλθομεν πρὸς αὐτοὺς
  english_pob_choice: came to them
  chosen_spanish: llegamos a ellos
  alternatives_spanish:
  - fuimos hacia ellos
  - vinimos a ellos
  lexicon: BDAG
  rationale: En este contexto de viaje, el movimiento hacia las personas se expresa con naturalidad como «llegamos a ellos». Conserva la referencia a personas específicas y evita añadir el matiz de «unirse» que no está explícito en el griego.
- source_word: εἰς τὴν Τρῳάδα
  english_pob_choice: at Troas
  chosen_spanish: en Troas
  alternatives_spanish:
  - a Troas
  - hasta Troas
  lexicon: BDAG
  rationale: Aunque el griego usa εἰς, el resultado del movimiento se entiende como llegada a un lugar. «En Troas» es la forma más natural en español una vez descrita la llegada.
- source_word: ἄχρι ἡμερῶν πέντε
  english_pob_choice: within five days
  chosen_spanish: dentro de cinco días
  alternatives_spanish:
  - en cinco días
  - al cabo de cinco días
  lexicon: BDAG
  rationale: La construcción temporal indica el tiempo transcurrido hasta la llegada. «Dentro de cinco días» expresa bien ese lapso; «en cinco días» también sería posible, pero puede sonar menos explícito respecto del límite temporal.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - allí
  lexicon: BDAG
  rationale: El relativo apunta a Troas y funciona naturalmente como «donde» en español, manteniendo la conexión sintáctica sin rigidez.
- source_word: διετρίψαμεν ἡμέρας ἑπτά
  english_pob_choice: we stayed seven days
  chosen_spanish: nos quedamos siete días
  alternatives_spanish:
  - pasamos siete días
  - permanecimos siete días
  lexicon: BDAG
  rationale: En contexto de viaje, διατρίβω significa permanecer o pasar tiempo en un lugar. «Nos quedamos» es una opción natural y fiel al sentido de estancia.
translation_notes:
  revision_awareness: Coincide con el pasaje griego SBLGNT de Hechos 20:6 y con el audit trail inglés de la POB; se mantiene la secuencia narrativa de salida, llegada y estancia, sin introducir explicaciones históricas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Filipos» y «Troas» como topónimos estándar en español.
  - «Panes sin Levadura» conserva la referencia festiva judía sin sustituirla por una formulación más eclesiástica.
  - Se eligió un español natural de viaje («zarpamos», «llegamos», «nos quedamos») para reflejar el carácter narrativo del versículo.
  - No se usó «Señor» ni otros términos teológicos porque el versículo no los contiene.
