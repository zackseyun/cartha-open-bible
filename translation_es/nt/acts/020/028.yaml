    text: O «Vigilen cuidadosamente».
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos leen «la iglesia del Señor» en lugar de «la iglesia de Dios».
    reason: textual_variant
  - marker: c
    text: O «por medio de la sangre de su propio Hijo»; tradicionalmente, «con su propia sangre».
    reason: alternative_reading
  revision_rationale: Se corrigió la naturalidad del español ('Presten cuidadosa atención'), se reubicó la nota textual en 'iglesia de Dios', y se simplificó/reordenó el aparato de notas para que cada una corresponda a su ancla real. La cláusula final se revisó a 'la sangre del suyo propio' para preservar la ambigüedad de τοῦ ἰδίου sin añadir 'Hijo' en el texto principal ni dejar una expresión española truncada.
