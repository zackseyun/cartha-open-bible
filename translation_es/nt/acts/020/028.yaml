translation:
  language: es
  text: Presten cuidadosa atención[a] a ustedes mismos y a todo el rebaño, en el cual el Espíritu Santo los ha puesto como supervisores, para pastorear la iglesia de Dios[b], la cual obtuvo por medio de la sangre del suyo propio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vigilen cuidadosamente».
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos leen «la iglesia del Señor» en lugar de «la iglesia de Dios».
    reason: textual_variant
  - marker: c
    text: O «por medio de la sangre de su propio Hijo»; tradicionalmente, «con su propia sangre».
    reason: alternative_reading
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: Pay careful attention
  chosen_spanish: Presten atención cuidadosa
  alternatives_spanish:
  - Estén atentos
  - Vigilen cuidadosamente
  lexicon: BDAG
  rationale: El imperativo presente pide vigilancia continua. En español, «presten atención cuidadosa» comunica bien el sentido exhortativo y sostenido sin endurecer el tono ni volverlo excesivamente técnico.
- source_word: παντὶ τῷ ποιμνίῳ
  english_pob_choice: all the flock
  chosen_spanish: todo el rebaño
  alternatives_spanish:
  - todo el rebaño completo
  - todo el grupo de ovejas
  lexicon: BDAG
  rationale: ποιμνίον conserva la metáfora pastoral; «rebaño» la mantiene de forma natural en español. «Todo» expresa παντί de manera directa.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: en el cual
  alternatives_spanish:
  - entre el cual
  - dentro del cual
  lexicon: BDAG
  rationale: Con un sustantivo colectivo, «en el cual» sigue de cerca el griego y resulta más sobrio que una paráfrasis idiomática mayor.
- source_word: ἔθετο
  english_pob_choice: has appointed
  chosen_spanish: ha puesto como
  alternatives_spanish:
  - ha nombrado
  - ha establecido como
  lexicon: BDAG
  rationale: τίθημι aquí tiene valor de asignar a una función. «Ha puesto como» conserva la idea de colocación/nombramiento sin cargar de matiz eclesiástico posterior a «obispos».
- source_word: ἐπισκόπους
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - obispos
  - vigilantes
  lexicon: BDAG
  rationale: El término señala responsables de supervisión. «Supervisores» comunica la función con claridad en español y evita importar el título eclesiástico más cargado de «obispos».
- source_word: ποιμαίνειν
  english_pob_choice: to shepherd
  chosen_spanish: pastorear
  alternatives_spanish:
  - apacentar
  - cuidar como pastor
  lexicon: BDAG
  rationale: Se conserva la metáfora pastoral. «Pastorear» es el equivalente verbal más natural y fiel en español contemporáneo.
- source_word: ἐκκλησίαν
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: En este contexto cristiano, «iglesia» es el equivalente más claro y reconocido para el pueblo de Dios reunido.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - del Señor
  lexicon: NA28 textual tradition / BDAG
  rationale: El texto base lee θεοῦ; por eso la traducción sigue «de Dios». La variante «del Señor» se refleja en nota textual.
- source_word: περιεποιήσατο
  english_pob_choice: obtained
  chosen_spanish: obtuvo
  alternatives_spanish:
  - adquirió
  - compró para sí
  - ganó para sí
  lexicon: BDAG
  rationale: El verbo en medio expresa apropiación/obtención para sí. «Obtuvo» es claro y natural en español sin forzar aún la metáfora comercial.
- source_word: διὰ τοῦ αἵματος
  english_pob_choice: through the blood
  chosen_spanish: por medio de la sangre
  alternatives_spanish:
  - con la sangre
  - mediante la sangre
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por medio de» conserva bien el valor instrumental y el peso sacrificial de «sangre».
- source_word: τοῦ ἰδίου
  english_pob_choice: of his own
  chosen_spanish: de su propio
  alternatives_spanish:
  - de lo suyo propio
  - de su propia [persona]
  lexicon: BDAG
  rationale: La frase griega es compacta y ambigua. «De su propio» preserva la tensión textual sin añadir explícitamente «Hijo»; el ancla en nota permite explicar la alternativa interpretativa.
theological_decisions:
- issue: Referente de τοῦ αἵματος τοῦ ἰδίου
  english_pob_reading: which he obtained through the blood of his own
  chosen_spanish_reading: la cual obtuvo por medio de la sangre de su propio
  alternative_spanish_readings:
  - la cual obtuvo por medio de la sangre de su propio Hijo
  - la cual obtuvo con su propia sangre
  rationale: El griego no explicita el sustantivo elidido detrás de ἰδίου. La traducción principal conserva esa ambigüedad para no resolver por adelantado una cuestión interpretativa; a la vez, la nota puede registrar la lectura tradicional y la posibilidad de entender una referencia implícita al Hijo.
  doctrine_reference: Preservar la tensión textual y cristológica sin sobretraducir.
- issue: Variantes textuales en 'la iglesia de Dios'
  english_pob_reading: church of God[c][b]
  chosen_spanish_reading: iglesia de Dios
  alternative_spanish_readings:
  - iglesia del Señor
  rationale: La lectura de base sigue el texto griego dado. La variante conocida se documenta en nota textual para mantener la transparencia del aparato crítico.
  doctrine_reference: Crítica textual / NA28.
translation_notes:
  revision_awareness: 'La versión inglesa revisó primero una formulación más interpretativa («of his own Son») hacia la más literal y ambigua («of his own») para ajustarse mejor al griego y no añadir un referente no explícito. Esta propuesta española sigue esa revisión: mantiene la ambigüedad de τοῦ ἰδίου, pero usa una nota para dejar constancia de la lectura tradicional/interpretativa. También conserva la lectura griega base «de Dios» y documenta la variante textual «del Señor».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por una fórmula eclesiástica más interpretativa.
  - Se usa «rebaño» para ποιμνίον y «pastorear» para ποιμαίνειν para conservar la metáfora pastoral.
  - «Supervisores» traduce ἐπισκόπους por su función, evitando cargar el texto con el título eclesiástico histórico de «obispos» como equivalente obligatorio.
  - La nota c se ancla en «su propio» porque allí reside la ambigüedad de τοῦ ἰδίου.
  - La puntuación y mayúsculas siguen el estilo bíblico en español contemporáneo y mantienen la claridad del período griego largo.
