translation:
  language: es
  text: Afligidos especialmente por la palabra que había dicho[a], que ya no verían su rostro[b][d]. Y lo acompañaban hasta el barco[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a causa de lo que había dicho». El griego dice más literalmente: «por la palabra que había dicho».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «ya no verían su rostro», una expresión personal para decir que no lo volverían a ver.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo estaban despidiendo» o «lo estaban escoltando». El verbo puede implicar acompañar a alguien como gesto de honor al despedirlo.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «que ya no iban a ver su rostro».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὀδυνώμενοι
  english_pob_choice: grieving
  chosen_spanish: afligidos
  alternatives_spanish:
  - entristecidos
  - dolidos
  - angustiados
  lexicon: BDAG
  rationale: El participio expresa dolor emocional o angustia. «Afligidos» comunica bien ese padecimiento en español sin cargar más intensidad de la que exige el griego, y funciona naturalmente en el contexto de despedida.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - sobre todo
  - principalmente
  - más que nada
  lexicon: BDAG
  rationale: Marca la causa principal de la aflicción. «Especialmente» es claro, natural y fiel al valor de énfasis del adverbio.
- source_word: ἐπὶ τῷ λόγῳ
  english_pob_choice: over the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - a causa de la palabra
  - sobre la palabra
  - por lo que había dicho
  lexicon: BDAG
  rationale: El griego usa λόγος de forma relativamente formal, y la construcción puede expresar causa o motivo. «Por la palabra» conserva la imagen de la fuente del dolor, mientras que la nota explica la alternativa causal más explícita.
- source_word: εἰρήκει
  english_pob_choice: he had spoken
  chosen_spanish: había dicho
  alternatives_spanish:
  - había hablado
  - había expresado
  lexicon: BDAG
  rationale: El pluscuamperfecto debe reflejarse en español. «Había dicho» es el equivalente más natural, y evita sonar más solemne de lo que el contexto requiere.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: BDAG
  rationale: La partícula indica cese futuro desde el punto de vista del relato. «Ya no» es idiomático en español y conserva la idea de discontinuidad sin intensificarla a «nunca más».
- source_word: μέλλουσιν
  english_pob_choice: would no longer / were about to
  chosen_spanish: verían más
  alternatives_spanish:
  - iban a ver
  - estaban por ver
  - verían
  lexicon: BDAG
  rationale: El verbo con infinitivo expresa expectativa inminente o futura desde el pasado. En español, la construcción con futuro simple en contexto retrospectivo comunica bien esa perspectiva sin sonar forzada. El «más» recoge el sentido de οὐκέτι.
- source_word: τὸ πρόσωπον αὐτοῦ θεωρεῖν
  english_pob_choice: see his face
  chosen_spanish: verían más su rostro
  alternatives_spanish:
  - verían más su cara
  - volverían a verlo
  - contemplarían su rostro
  lexicon: BDAG
  rationale: Se conserva la expresión concreta «rostro» porque el griego la usa de manera vívida y personal. «Rostro» suena más digno y bíblico que «cara» en español contemporáneo, y mantiene la fuerza relacional de la frase.
- source_word: προέπεμπον
  english_pob_choice: were accompanying him
  chosen_spanish: lo acompañaban
  alternatives_spanish:
  - lo escoltaban
  - lo despedían acompañándolo
  - lo iban acompañando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso. «Lo acompañaban» reproduce de manera natural la idea de ir con él; la nota preserva la posibilidad de un matiz honorífico de despedida que el verbo puede llevar.
- source_word: εἰς τὸ πλοῖον
  english_pob_choice: to the ship
  chosen_spanish: hasta el barco
  alternatives_spanish:
  - al barco
  - hasta la nave
  - hasta la embarcación
  lexicon: BDAG
  rationale: Πλοῖον puede ser «barco» o «nave». En español actual, «barco» es más natural y comprensible que «navío» o «nave» para este contexto. «Hasta» refleja el movimiento acompañando a alguien hasta el punto de partida.
theological_decisions:
- issue: Expresión idiomática «ver su rostro» sin suavizarla a «verlo»
  english_pob_reading: Literally, 'see his face no longer,' a personal expression for not seeing him again.
  chosen_spanish_reading: «verían más su rostro» conserva la imagen personal y no la reduce a «volverían a verlo».
  alternative_spanish_readings:
  - volverían a verlo
  - no lo verían más
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica importante: el griego nombra el «rostro» como forma personal de despedida. Mantener esa imagen preserva la coloración afectiva del texto y evita borrar un rasgo visible del original.'
  doctrine_reference: Énfasis narrativo y semántico del texto, no una doctrina específica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que suavizó la frase desde «they were about to see his face no longer» a «they would no longer see his face». La versión española adopta una solución natural con «ya no verían más su rostro», que integra el valor de οὐκέτι y el matiz futuro-desde-el-pasado de μέλλω sin sonar forzada.
  spanish_consistency_notes:
  - Se mantiene «rostro» para πρόσωπον, en coherencia con la preferencia del proyecto por conservar la imagen corporal concreta cuando el original la usa de modo expresivo.
  - «Barco» se usa para πλοῖον por naturalidad en español; no se fuerza «nave» o «navío» sin necesidad contextual.
  - El tono es sobrio y público, acorde con un registro bíblico moderno pero digno.
  - Se conserva una sintaxis cercana al griego solo donde ayuda a reflejar la imagen del texto; en lo demás se prioriza la fluidez del español.
