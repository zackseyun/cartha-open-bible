    reason: lexical_alternative
  - marker: d
    text: 'O: «que ya no iban a ver su rostro».'
    reason: previous_rendering
  revision_rationale: 'La revisión es pequeña pero necesaria: elimina la redundancia de ''ya no ... más'', reubica la nota sobre ''acompañaban'' en el verbo correcto y mejora la alternativa asociada con μέλλουσιν para que suene natural en español. El resto del borrador preserva bien el sentido y la dignidad del original.'
