translation:
  language: es
  text: 'Pero Pablo bajó y se echó sobre él[a], y abrazándolo dijo: «No se alarmen[b], porque su vida está en él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se echó sobre él». El griego ἐπέπεσεν puede expresar una acción física de arrojarse o echarse encima, con posible eco de gestos proféticos de restauración.
    reason: lexical_alternative
  - marker: b
    text: Las palabras de Pablo pueden entenderse como que el joven no estaba muerto después de todo, o como que su vida le había sido devuelta; la forma griega no decide explícitamente la cuestión.
    reason: alternative_reading
lexical_decisions:
- source_word: καταβὰς
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue bajando
  lexicon: BDAG
  rationale: El participio aoristo expresa el movimiento de descenso de Pablo desde el nivel superior; «bajó» conserva la dirección con naturalidad en español, sin volver torpe la construcción participial.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz de contraste suave respecto del relato anterior; «Pero» comunica bien el giro narrativo en español.
- source_word: ἐπέπεσεν αὐτῷ
  english_pob_choice: fell upon him
  chosen_spanish: se echó sobre él
  alternatives_spanish:
  - cayó sobre él
  - se lanzó sobre él
  lexicon: BDAG
  rationale: La expresión es física e idiomática; «se echó sobre él» mantiene el movimiento corporal y su posible resonancia bíblica sin sonar extraña en español.
- source_word: συμπεριλαβὼν
  english_pob_choice: embracing him
  chosen_spanish: abrazándolo
  alternatives_spanish:
  - tomándolo en sus brazos
  - teniéndolo entre sus brazos
  lexicon: BDAG
  rationale: El participio indica un acto de envolver o abrazar; «abrazándolo» es conciso, natural y refleja la cercanía corporal del gesto.
- source_word: Μὴ θορυβεῖσθε
  english_pob_choice: Do not be alarmed
  chosen_spanish: No se alarmen
  alternatives_spanish:
  - No se perturben
  - No se turben
  - No hagan alboroto
  lexicon: BDAG
  rationale: θορυβέω puede abarcar agitación, conmoción o alarma; «No se alarmen» reproduce bien la reacción emocional de los presentes ante la caída del joven.
- source_word: ἡ γὰρ ψυχὴ αὐτοῦ
  english_pob_choice: for his life
  chosen_spanish: porque su vida
  alternatives_spanish:
  - porque su alma
  - porque su ser
  lexicon: BDAG
  rationale: ψυχή puede significar «vida», «alma» o «yo mismo»; aquí el contexto inmediato trata de si el joven está muerto o vivo, por lo que «vida» es la opción más ajustada y evita una carga antropológica innecesaria.
- source_word: ἐν αὐτῷ ἐστιν
  english_pob_choice: is in him
  chosen_spanish: está en él
  alternatives_spanish:
  - permanece en él
  - sigue en él
  lexicon: BDAG
  rationale: 'La frase se vierte de manera directa para conservar la ambigüedad del griego: Pablo afirma que la vida está en él, sin precisar más si no murió o si fue restaurado.'
theological_decisions:
- issue: Sentido de ψυχή en un contexto de vida y muerte
  english_pob_reading: Rendered as 'life' rather than 'soul.'
  chosen_spanish_reading: Traducido como «vida» y no como «alma».
  alternative_spanish_readings:
  - «alma»
  - «vida-aliento»
  rationale: El pasaje se centra en la condición física del joven tras la caída. «Vida» refleja el uso común de ψυχή en este contexto y evita introducir una afirmación doctrinal que el verso no explicita.
  doctrine_reference: Mantener la tensión teológica sin resolverla; primacía del original sobre la tradición de traducción.
- issue: Si la declaración de Pablo implica que Eutico nunca murió o que fue restaurado
  english_pob_reading: 'Main text remains neutral: ''his life is in him.'''
  chosen_spanish_reading: 'El texto principal permanece neutral: «su vida está en él».'
  alternative_spanish_readings:
  - «está vivo»
  - «su vida le ha vuelto»
  rationale: El griego afirma que su vida está en él, pero no aclara de modo explícito si Pablo está diciendo que no murió o que Dios le devolvió la vida. La traducción debe preservar esa apertura.
  doctrine_reference: Mantener la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios en el texto inglés de referencia y el cotejo cruzado informó alta concordancia (acuerdo total).'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «vida» para ψυχή, conforme a la decisión léxica auditada, y no «alma» en el cuerpo principal.
  - Se preserva una traducción natural y reverente, sin suavizar la tensión interpretativa sobre el estado de Eutico.
