    issue: Falta 'de nadie' en el texto principal.
    rationale: 'οὐδενός expresa posesión: Pablo niega haber codiciado bienes pertenecientes a cualquier persona. En el borrador, esa idea solo aparece en la nota, no en la traducción principal.'
  - severity: medium
    issue: '''Vestido'' no es la mejor opción para ἱματισμοῦ en este contexto.'
    rationale: En español general, 'vestido' puede entenderse como una sola prenda o incluso específicamente femenina. ἱματισμός aquí significa ropa/vestimenta en general; 'ropa' es más natural y exacto.
  - severity: low
    issue: La nota alternativa no está bien paralela con el texto principal ni con la sintaxis más natural del español.
    rationale: Si la alternativa es 'deseado', conviene mantener también la estructura posesiva y la lista natural de bienes en español.
