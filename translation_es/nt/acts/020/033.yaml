translation:
  language: es
  text: No he codiciado la plata, ni el oro, ni la ropa[a] de nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'No he deseado la plata, ni el oro, ni la ropa de nadie'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργυρίου
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - moneda
  lexicon: BDAG
  rationale: El griego nombra el metal precioso de forma concreta; en el contexto de una lista de bienes materiales junto con oro y ropa, 'plata' conserva el paralelismo tangible mejor que una abstracción como 'dinero'.
- source_word: χρυσίου
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: BDAG
  rationale: La correspondencia directa con el sustantivo griego y su coordinación con 'plata' favorecen 'oro', que mantiene la imagen de objetos valiosos sin añadir matices no presentes en el texto.
- source_word: ἱματισμοῦ
  english_pob_choice: clothing
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - vestiduras
  - indumentaria
  lexicon: BDAG
  rationale: El término puede abarcar prendas o ropa en general. 'Vestido' es una forma natural en español bíblico para un bien material concreto; 'ropa' sería más coloquial, mientras que 'vestiduras' suena más tradicional y puede sugerir un registro más elevado de lo que exige el verso.
- source_word: οὐδενὸς
  english_pob_choice: no one's
  chosen_spanish: de nadie
  alternatives_spanish:
  - de ninguna persona
  - de ninguno
  lexicon: BDAG
  rationale: La fuerza posesiva del genitivo se expresa en español con 'de nadie', que comunica con claridad que Pablo niega haber codiciado bienes pertenecientes a cualquier persona.
- source_word: ἐπεθύμησα
  english_pob_choice: coveted
  chosen_spanish: he codiciado
  alternatives_spanish:
  - deseé
  - anhelé
  - quise
  lexicon: BDAG
  rationale: En este contexto moral sobre bienes ajenos, 'codiciar' reproduce mejor la carga ética del verbo que un simple 'desear'. El perfecto 'he codiciado' en español da una negación directa y natural del comportamiento confesado por Pablo.
- source_word: ἢ ... ἢ ... ἢ
  english_pob_choice: or ... or ... or
  chosen_spanish: ni ... ni ... ni
  alternatives_spanish:
  - o ... o ... o
  lexicon: BDAG
  rationale: Aunque el griego usa coordinación disyuntiva, en español una serie negativa con 'ni' tras 'no he codiciado' resulta idiomática y preserva el sentido enumerativo de la lista sin perder la negación global.
theological_decisions:
- issue: Matiz moral de ἐπιθυμέω aplicado a bienes materiales
  english_pob_reading: Render with the ethically charged 'coveted' rather than the more neutral 'desired.'
  chosen_spanish_reading: Traducir con 'codiciado' en lugar de un verbo más neutral como 'deseado'.
  alternative_spanish_readings:
  - he deseado
  - he ansiado
  rationale: El contexto es la defensa de la integridad de Pablo frente a la sospecha de avaricia. 'Codiciar' refleja mejor la dimensión ética negativa del verbo en esta cláusula, sin exceder lo que el griego permite.
  doctrine_reference: Actos 20:33; traducción basada en el sentido moral del verbo dentro del discurso de despedida de Pablo.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en mantener la lista concreta de bienes valiosos y en dar a ἐπιθυμέω un matiz ético fuerte. No se detectaron revisiones aplicadas en el contexto inglés, por lo que no se introducen cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene una estructura breve y directa, adecuada para una declaración paulina.
  - '''Plata, oro y vestido'' conserva la concreción material del original y evita abstracciones.'
  - La negación con 'ni' en español hace natural la enumeración negativa sin alterar el alcance del griego.
