lexical_decisions:
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  - de qué manera
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la recordación de Pablo; «cómo» es natural en español y conserva el valor interrogativo-retórico del contexto sin volver la frase más rígida de lo necesario.
- source_word: ὑπεστειλάμην
  english_pob_choice: did not shrink back
  chosen_spanish: no me contuve
  alternatives_spanish:
  - no retrocedí
  - no rehuí
  - no me eché atrás
  lexicon: BDAG
  rationale: El verbo medio expresa no retraerse ni reservarse ante una acción. En español, «no me contuve» comunica bien la idea de no guardarse ni frenarse en el ministerio; se prefiere por claridad natural, sin perder la fuerza de la negación.
- source_word: τῶν συμφερόντων
  english_pob_choice: anything that was profitable
  chosen_spanish: nada que era provechoso
  alternatives_spanish:
  - nada beneficioso
  - nada útil
  - nada que fuera beneficioso
  lexicon: BDAG
  rationale: El participio expresa lo que resulta útil o beneficioso. «Provechoso» mantiene la idea de beneficio real y suena más natural que «profitable» o «ventajoso» en español bíblico contemporáneo.
- source_word: τοῦ μὴ ἀναγγεῖλαι
  english_pob_choice: from declaring
  chosen_spanish: de anunciarles
  alternatives_spanish:
  - de declararles
  - de proclamarles
  - de comunicarles
  lexicon: BDAG
  rationale: El infinitivo articular con μή indica el contenido de aquello de lo que Pablo no se abstuvo. «Anunciarles» transmite bien la acción de hacer saber de manera pública y solemne, y el dativo implícito se expresa con «les».
- source_word: ἀναγγεῖλαι
  english_pob_choice: declaring
  chosen_spanish: anunciar
  alternatives_spanish:
  - declarar
  - proclamar
  - dar a conocer
  lexicon: BDAG
  rationale: ἀναγγέλλω puede significar anunciar o reportar. «Anunciar» funciona bien junto con «enseñar» y conserva el matiz de comunicar contenido de forma directa.
- source_word: διδάξαι
  english_pob_choice: teaching
  chosen_spanish: enseñarles
  alternatives_spanish:
  - instruirles
  - darles enseñanza
  lexicon: BDAG
  rationale: διδάσκω es «enseñar». Se mantiene el paralelismo con el infinitivo anterior y se explicita el complemento pronominal para una lectura natural en español.
- source_word: δημοσίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  - abiertamente
  lexicon: BDAG
  rationale: El adverbio indica un contexto abierto y público; «públicamente» es la equivalencia más directa y natural.
- source_word: κατ’ οἴκους
  english_pob_choice: from house to house
  chosen_spanish: de casa en casa
  alternatives_spanish:
  - de hogar en hogar
  - casa por casa
  - en las casas
  lexicon: BDAG
  rationale: La construcción distributiva se conserva con la expresión idiomática «de casa en casa», que transmite la repetición y la proximidad personal del ministerio.
theological_decisions:
- issue: Alcance de «provechoso»
  english_pob_reading: spiritually beneficial to the hearers
  chosen_spanish_reading: beneficioso en sentido espiritual y pastoral para los oyentes
  alternative_spanish_readings:
  - útil en sentido práctico general
  - ventajoso en términos generales
  rationale: El contexto es el ministerio de Pablo entre creyentes; por eso se entiende un beneficio principalmente espiritual y pastoral. La frase principal conserva el término amplio «provechoso» y no lo estrecha a una paráfrasis doctrinal.
  doctrine_reference: Primacía del texto original; no introducir precisiones doctrinales ajenas al contexto inmediato.
- issue: Relación entre «anunciar» y «enseñar»
  english_pob_reading: declaring ... and teaching
  chosen_spanish_reading: anunciar ... y enseñar
  alternative_spanish_readings:
  - declarar ... y enseñar
  - proclamar ... e instruir
  rationale: Los dos infinitivos coordinados distinguen dos actos ministeriales relacionados pero no idénticos. Mantener ambos evita fusionarlos indebidamente y preserva la estructura del griego.
  doctrine_reference: Respeto de las distinciones léxicas del texto fuente.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura revisada del POB inglés que une bajo un solo verbo negado los dos infinitivos coordinados, evitando repetir una preposición equivalente antes de «enseñar». Se preservan además las elecciones semánticas estables: ὑπεστειλάμην = no me contuve / no me guardé; τῶν συμφερόντων = provechoso/beneficioso; δημοσίᾳ = públicamente; κατ’ οἴκους = de casa en casa.'
  spanish_consistency_notes:
  - Se emplea «Dios»/«Yahvé» según corresponda, aunque no aparezcan en este versículo.
  - Se evita «SEÑOR» como sustituto automático, en consonancia con el proyecto.
  - «de casa en casa» conserva la fórmula idiomática ya usada en español bíblico claro, sin volverla más literal de lo necesario.
  - La nota al pie ofrece la alternativa léxica principal preservada por el audit trail inglés.
