  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son apropiadas salvo ὑπεστειλάμην, para el cual conviene «no rehuí» en vez de «no me contuve». La nota alternativa puede conservar «beneficioso» como opción de τῶν συμφερόντων.
