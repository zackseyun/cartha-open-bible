translation:
  language: es
  text: Y ahora, he aquí[a], sé que ninguno de ustedes, entre quienes anduve proclamando el reino, no volverá a ver mi rostro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren»; el griego introduce un marcador enfático de atención.
    reason: alternative_reading
  - marker: b
    text: 'También posible: «ya no verá mi rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Y en este momento
  lexicon: uso discursivo del griego koiné
  rationale: Conserva la transición discursiva y el cambio de escena con una formulación natural en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: '''He aquí'' preserva el tono enfático y algo formal del marcador de atención sin caer en una expresión demasiado coloquial.'
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - estoy seguro
  lexicon: BDAG
  rationale: Expresa conocimiento cierto y asentado de forma natural en español.
- source_word: ὑμεῖς πάντες
  english_pob_choice: none of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - ninguno de vosotros
  - todos ustedes, ninguno
  lexicon: BDAG
  rationale: En español, la negación distributiva se expresa con naturalidad como 'ninguno de ustedes', conservando el alcance universal de 'todos ustedes' bajo la negación.
- source_word: ἐν οἷς
  english_pob_choice: among whom
  chosen_spanish: entre quienes
  alternatives_spanish:
  - entre los cuales
  - en medio de quienes
  lexicon: BDAG
  rationale: Mantiene la referencia al grupo dentro del cual Pablo ministró, con un español claro y relacional.
- source_word: διῆλθον
  english_pob_choice: I went about
  chosen_spanish: anduve
  alternatives_spanish:
  - recorrí
  - anduve entre
  lexicon: BDAG
  rationale: '''Anduve'' comunica el movimiento ministerial entre personas y lugares sin reducirlo a un simple ''pasé por''.'
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: '''Proclamando'' conserva el sentido público de anunciar como heraldo, evitando restringirlo al uso eclesiástico de ''predicando''.'
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino de Dios
  lexicon: BDAG
  rationale: El griego dice simplemente 'el reino'; se mantiene la forma breve sin añadir 'de Dios' en el texto principal.
- source_word: τὸ πρόσωπόν μου
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: BDAG
  rationale: '''Rostro'' conserva el valor concreto y personal de πρόσωπον con un registro digno en español.'
theological_decisions:
- issue: Expansión implícita de 'el reino' a 'el reino de Dios'
  english_pob_reading: the kingdom
  chosen_spanish_reading: el reino
  alternative_spanish_readings:
  - el reino de Dios
  rationale: Se conserva la lectura breve del texto griego, sin armonizarla con fórmulas contextualmente cercanas que no están expresas aquí.
  doctrine_reference: Primacía del texto original; coherencia con la auditable source policy
- issue: Matiz de οὐκέτι en español
  english_pob_reading: will see my face again
  chosen_spanish_reading: volverá a ver mi rostro
  alternative_spanish_readings:
  - ya no verá mi rostro
  - no volverá a ver mi rostro
  rationale: '''Volverá a ver'' reproduce la idea de repetición futura negada que el inglés POB resolvió con ''again'', manteniendo naturalidad y sin perder la fuerza de la negación.'
  doctrine_reference: Equivalencia óptima con control semántico
- issue: Tono enfático de ἰδοὺ
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - miren
  - véanlo
  rationale: '''He aquí'' preserva el registro solemne del original y del audit trail inglés, sin imponer una paráfrasis explicativa.'
  doctrine_reference: Registro retórico y marcador discursivo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que elevó 'look' a 'behold' por un registro más formal; por eso se eligió 'he aquí' y se mantuvo una correspondencia de tono. También se respetó la decisión de no expandir 'the kingdom' a 'the kingdom of God' en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con español contemporáneo y comprensible.
  - Se conservaron las imágenes concretas 'rostro' y 'reino' sin reducirlas a explicaciones abstractas.
  - Las negaciones y los marcadores discursivos se formularon de modo natural en español sin perder la estructura del griego.
