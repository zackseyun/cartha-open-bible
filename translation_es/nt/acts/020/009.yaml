base_translation:
  language: en
  yaml_path: translation/nt/acts/020/009.yaml
  text: And a certain young man named Eutychus[a], sitting in the window, was sinking into a deep sleep while Paul was speaking at length; and being overcome by sleep, he fell down from the third story and was picked up dead.
  footnotes:
