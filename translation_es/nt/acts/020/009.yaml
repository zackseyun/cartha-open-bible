translation:
  language: es
  text: Y cierto joven llamado Eutico[a], sentado en la ventana, se iba hundiendo en un sueño profundo mientras Pablo hablaba largamente; y, vencido por el sueño, cayó del tercer piso y lo recogieron muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue levantado muerto'. El verbo griego puede significar 'recoger' o 'levantar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεζόμενος
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sentándose
  - estando sentado
  lexicon: BDAG
  rationale: El participio presente describe el estado/postura de Eutico al inicio de la escena. 'Sentado' es la forma natural en español y conserva el valor de estado continuo sin volver la frase artificial.
- source_word: τις νεανίας
  english_pob_choice: a certain young man
  chosen_spanish: un cierto joven
  alternatives_spanish:
  - un joven
  - un muchacho
  lexicon: BDAG
  rationale: τις aporta indefinición; 'cierto' refleja esa indefinición de manera más cercana al valor del griego. νεανίας se rinde mejor aquí como 'joven' que como 'muchacho', por registro y claridad narrativa.
- source_word: ὀνόματι Εὔτυχος
  english_pob_choice: named Eutychus
  chosen_spanish: llamado Eutico
  alternatives_spanish:
  - de nombre Eutico
  - por nombre Eutico
  lexicon: BDAG
  rationale: La construcción dativa con ὀνόματι se expresa de modo idiomático en español con 'llamado'. Se conserva el nombre propio sin añadidos innecesarios.
- source_word: ἐπὶ τῆς θυρίδος
  english_pob_choice: in the window
  chosen_spanish: en la ventana
  alternatives_spanish:
  - en el vano de la ventana
  - junto a la ventana
  lexicon: BDAG
  rationale: θυρίς señala una ventana o abertura. 'En la ventana' es la expresión más natural en español y comunica la posición desde la cual ocurre la caída.
- source_word: καταφερόμενος ὕπνῳ βαθεῖ
  english_pob_choice: was sinking into a deep sleep
  chosen_spanish: iba siendo vencido por un sueño profundo
  alternatives_spanish:
  - se iba quedando profundamente dormido
  - era arrastrado por un sueño profundo
  lexicon: BDAG
  rationale: El verbo transmite ser abatido o llevado hacia abajo por el sueño; la imagen de 'iba siendo vencido' conserva el proceso gradual. 'Sueño profundo' reproduce βαθεῖ sin reducirlo a simple cansancio.
- source_word: διαλεγομένου τοῦ Παύλου ἐπὶ πλεῖον
  english_pob_choice: while Paul was speaking at length
  chosen_spanish: mientras Pablo hablaba por largo rato
  alternatives_spanish:
  - mientras Pablo seguía hablando largamente
  - mientras Pablo prolongaba su discurso
  lexicon: BDAG
  rationale: διαλέγομαι aquí funciona como hablar/discurrir; 'hablaba' evita forzar una idea de diálogo. ἐπὶ πλεῖον se expresa bien con 'por largo rato', preservando la duración prolongada.
- source_word: κατενεχθεὶς ἀπὸ τοῦ ὕπνου
  english_pob_choice: being overcome by sleep
  chosen_spanish: vencido por el sueño
  alternatives_spanish:
  - abatido por el sueño
  - arrastrado por el sueño
  lexicon: BDAG
  rationale: El participio aoristo intensifica el proceso previo y señala el momento decisivo. 'Vencido por el sueño' es idiomático y mantiene la fuerza de la imagen sin perder el vínculo con la frase anterior.
- source_word: ἔπεσεν ἀπὸ τοῦ τριστέγου κάτω
  english_pob_choice: he fell down from the third story
  chosen_spanish: cayó desde el tercer piso hasta abajo
  alternatives_spanish:
  - cayó desde el tercer piso al suelo
  - se precipitó desde el tercer piso
  lexicon: BDAG
  rationale: τρίστεγον se entiende como un nivel de tercer piso; 'tercer piso' es claro para el lector español. 'Hasta abajo' preserva κάτω con un matiz enfático de descenso completo.
- source_word: ἤρθη νεκρός
  english_pob_choice: was picked up dead
  chosen_spanish: fue levantado muerto
  alternatives_spanish:
  - fue alzado muerto
  - fue recogido muerto
  lexicon: BDAG
  rationale: αἴρω en pasivo puede significar levantar o recoger. Se mantiene la ambigüedad del griego con 'fue levantado', sin suavizar νεκρός. 'Muerto' conserva la afirmación narrativa directa; no se introduce 'aparentemente'.}],
- source_word: νεκρός
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - difunto
  - sin vida
  lexicon: BDAG
  rationale: El texto griego declara el estado con claridad. 'Muerto' reproduce la afirmación sin atenuarla ni interpretarla como mera apariencia.
theological_decisions:
- issue: Si ἤρθη νεκρός debe interpretarse como 'levantado muerto' o como 'aparentemente muerto'
  english_pob_reading: was picked up dead
  chosen_spanish_reading: fue levantado muerto
  alternative_spanish_readings:
  - fue recogido muerto
  - aparentemente muerto
  rationale: El griego no añade ningún indicador de incertidumbre; por eso conviene conservar la formulación directa. La pasiva de αἴρω deja la acción algo abierta, pero νεκρός permanece sin suavizarse. Se evita importar una cautela no expresada en el texto.
  doctrine_reference: Principio de primacía del original; conservar la tensión narrativa sin resolverla mediante explicación interpretativa.
translation_notes:
  revision_awareness: La versión inglesa reciente mantuvo el valor directo de νεκρός ('dead') y prefirió 'picked up dead' sobre una lectura atenuada. El borrador español sigue esa misma línea, conserva la ambigüedad de αἴρω con 'fue levantado' y no introduce 'aparentemente muerto'.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la continuación narrativa del contexto.
  - '''Pablo'' y ''Eutico'' se conservan como nombres propios sin adaptación adicional.'
  - '''Sueño profundo'' preserva la intensidad de ὕπνῳ βαθεῖ.'
  - '''Tercer piso'' traduce de forma natural τρίστεγον para lector español contemporáneo.'
