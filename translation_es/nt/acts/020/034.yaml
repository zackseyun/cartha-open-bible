translation:
  language: es
  text: Ustedes mismos saben que estas manos[a] atendieron mis necesidades y las de los que estaban conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «proveyeron para mis necesidades y para las necesidades de los que estaban conmigo». El verbo griego puede destacar un servicio práctico que resultó en apoyo material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos personalmente
  lexicon: BDAG
  rationale: El pronombre es enfático; «ustedes mismos» conserva esa fuerza sin sonar forzado en español.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - están al tanto
  lexicon: BDAG
  rationale: Aquí el presente expresa conocimiento directo y comprobable de la conducta de Pablo; «saben» es natural y fiel.
- source_word: ταῖς χρείαις μου
  english_pob_choice: my needs
  chosen_spanish: mis necesidades
  alternatives_spanish:
  - mis necesidades materiales
  - mis menesteres
  lexicon: BDAG
  rationale: χρεία denota necesidades prácticas o materiales; «mis necesidades» comunica bien el sentido sin excesiva interpretación.
- source_word: τοῖς οὖσι μετ’ ἐμοῦ
  english_pob_choice: those who were with me
  chosen_spanish: los que estaban conmigo
  alternatives_spanish:
  - mis compañeros
  - los que estaban a mi lado
  lexicon: BDAG
  rationale: El participio articular se refiere a las personas que estaban con él; «los que estaban conmigo» preserva el referente sin añadir una relación no explicitada.
- source_word: ὑπηρέτησαν
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - prestaron servicio
  - atendieron
  - proveyeron
  lexicon: BDAG
  rationale: El verbo puede abarcar servicio práctico con ayuda material; «sirvieron» mantiene la amplitud del término, dejando que el contexto precise el tipo de servicio.
- source_word: αἱ χεῖρες αὗται
  english_pob_choice: these hands
  chosen_spanish: estas manos
  alternatives_spanish:
  - estas mismas manos
  - mis propias manos
  lexicon: BDAG
  rationale: La construcción demostrativa es enfática y apunta al trabajo manual de Pablo; «estas manos» es directo y natural en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que completó la segunda parte del sintagma con «the needs of» antes de «those who were with me», entendiendo que el dativo se aplica a ambos miembros de la coordinación. En español, eso se refleja con «a mis necesidades y a las de los que estaban conmigo».
  spanish_consistency_notes:
  - Se mantiene «ustedes mismos» para reflejar el énfasis del pronombre explícito.
  - Se evita «SEÑOR» o vocabulario eclesiástico no presente en el versículo; no hay referencia directa a Yahvé, Mesías o Espíritu Santo.
  - El verbo «sirvieron» conserva la imagen de servicio y permite la nota que recoge la alternativa más interpretativa «proveyeron».
  - «Los que estaban conmigo» reproduce el participio sustantivado sin convertirlo en una categoría más específica como «compañeros».
