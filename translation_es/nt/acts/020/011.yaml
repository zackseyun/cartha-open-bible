    reason: alternative_reading
  - marker: b
    text: O «probó» o «tomó alimento».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras adecuadas del texto fuente auditado. Se reemplazó la cláusula final «partió» por «así se fue» para reflejar mejor οὕτως ἐξῆλθεν y evitar la ambigüedad creada por repetir «partió». También se ajustó «subió» a «subió de nuevo» para mayor claridad contextual y «hasta el alba» a «hasta el amanecer» por naturalidad amplia en español.
