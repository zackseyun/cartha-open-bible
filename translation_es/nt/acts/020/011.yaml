revisions:
- from: Entonces subió[a], partió el pan y comió; y después de hablar durante mucho tiempo, hasta el alba[b], partió.
  to: Entonces subió de nuevo, partió el pan[a] y comió[b]; y después de hablar durante mucho tiempo, hasta el amanecer, así se fue.
  rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras adecuadas del texto fuente auditado. Se reemplazó la cláusula final «partió» por «así se fue» para reflejar mejor οὕτως ἐξῆλθεν y evitar la ambigüedad creada por repetir «partió». También se ajustó «subió» a «subió de nuevo» para mayor claridad contextual y «hasta el alba» a «hasta el amanecer» por naturalidad amplia en español.
