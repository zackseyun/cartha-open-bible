review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: subir, partir el pan, comer, hablar por largo tiempo hasta el amanecer y luego salir. Sin embargo, falla en dos puntos importantes del rastro de auditoría POB: el anclaje de las notas está mal colocado y la última cláusula «partió» no es fiel al valor contextual de οὕτως ἐξῆλθεν, que aquí significa que salió/se fue, no que volvió a ''partir'' en el sentido de dividir o emprender viaje. También conviene hacer explícito «a la habitación de arriba» para preservar mejor ἀναβὰς en este contexto narrativo.'
  spanish_quality_summary: El español es generalmente legible y digno, pero «partió» al final crea ambigüedad innecesaria por repetición con «partió el pan». La nota [a] está colocada sobre «subió» cuando en realidad corresponde a «partió el pan», y la nota [b] está anclada a «alba» aunque documenta una alternativa para γευσάμενος («comió»). «Hasta el alba» es aceptable, pero «hasta el amanecer» suena más natural en español general.
  glossary_alignment: 'No hay conflicto con la terminología de proyecto en esta frase. «partió el pan» preserva la neutralidad teológica requerida para κλάσας τὸν ἄρτον. «Comió» para γευσάμενος coincide con la decisión POB. El ajuste principal es léxico-contextual para οὕτως ἐξῆλθεν: mejor «se fue» o «salió».'
  issues:
  - severity: high
    issue: La nota [a] está anclada al segmento equivocado.
    rationale: La nota explica la alternativa de κλάσας τὸν ἄρτον («partió el pan / broke bread»), pero en el texto español actual [a] aparece en «subió». Esto rompe la trazabilidad del rastro POB.
  - severity: high
    issue: La nota [b] está anclada al segmento equivocado.
    rationale: La nota [b] documenta alternativas para γευσάμενος («comió»), pero está colocada en «alba». Debe marcar «comió».
  - severity: medium
    issue: «partió» al final no representa bien οὕτως ἐξῆλθεν.
    rationale: ἐξῆλθεν significa 'salió / se fue / partió' en sentido de departure, pero en español aquí «partió» suena confuso por la repetición inmediata con «partió el pan». «Así se fue» o «entonces se fue» comunica mejor el cierre narrativo.
  - severity: low
    issue: «subió» podría quedar algo escueto frente al contexto narrativo.
    rationale: Dado que ἀναβὰς alude a volver arriba tras haber bajado, «subió de nuevo» o «subió otra vez» mejora la claridad sin añadir interpretación excesiva.
  - severity: low
    issue: La redacción de la nota [a] puede sonar poco natural en español.
    rationale: «como inclusión de la Cena del Señor» es menos idiomático que «como una referencia que incluye la Cena del Señor» o «como referencia a la Cena del Señor».
  revised_spanish_text: Entonces subió de nuevo, partió el pan[a] y comió[b]; y después de hablar durante mucho tiempo, hasta el amanecer, así se fue.
  revised_footnotes:
