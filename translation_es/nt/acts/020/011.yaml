translation:
  language: es
  text: Entonces subió de nuevo, partió el pan[a] y comió[b]; y después de hablar durante mucho tiempo, hasta el amanecer, así se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «partió el pan». La expresión griega puede referirse simplemente a compartir una comida, aunque algunos la entienden aquí como una referencia a la Cena del Señor.
    reason: alternative_reading
  - marker: b
    text: O «probó» o «tomó alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβὰς
  english_pob_choice: went upstairs
  chosen_spanish: subió
  alternatives_spanish:
  - subió de nuevo
  - volvió a subir
  - subió a la habitación de arriba
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento ascendente en el contexto narrativo. En español, «subió» comunica con naturalidad el ascenso y evita una formulación demasiado explicativa. La referencia concreta a una habitación superior puede deducirse del contexto, pero no es necesaria en el texto principal.
- source_word: κλάσας τὸν ἄρτον
  english_pob_choice: broke the bread
  chosen_spanish: partió el pan
  alternatives_spanish:
  - rompió el pan
  - partió el pan compartido
  - partió el pan en la mesa
  lexicon: BDAG
  rationale: 'La construcción griega con artículo permite mantener una referencia concreta: «el pan». «Partió el pan» es la expresión española más natural y conserva la acción material sin decidir si se trata de una comida ordinaria o de una referencia técnica a la Cena del Señor.'
- source_word: γευσάμενος
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - probó
  - tomó alimento
  - participó de comida
  lexicon: BDAG
  rationale: En contexto de comida, el verbo griego puede extenderse de 'gustar' a 'comer/participar'. «Comió» evita la impresión de una degustación mínima y refleja bien el sentido contextual de la acción.
- source_word: ἐφ’ ἱκανόν
  english_pob_choice: for a long time
  chosen_spanish: durante mucho tiempo
  alternatives_spanish:
  - por bastante tiempo
  - por un buen rato
  - durante un tiempo considerable
  lexicon: BDAG
  rationale: El modismo expresa duración prolongada. «Durante mucho tiempo» es claro, natural y suficientemente fiel al valor de la expresión.
- source_word: ὁμιλήσας
  english_pob_choice: after talking
  chosen_spanish: después de hablar
  alternatives_spanish:
  - después de conversar
  - tras hablar
  - tras conversar
  lexicon: BDAG
  rationale: El verbo tiene el sentido de conversar o sostener un discurso prolongado. «Después de hablar» mantiene la amplitud del término griego sin forzar una precisión que el texto no exige.
- source_word: ἄχρι αὐγῆς
  english_pob_choice: until dawn
  chosen_spanish: hasta el alba
  alternatives_spanish:
  - hasta el amanecer
  - hasta el alba
  - hasta el día claro
  lexicon: BDAG
  rationale: «αὐγή» se refiere al amanecer o la primera luz del día. «Hasta el alba» es una equivalencia digna y comprensible en español bíblico actual.
- source_word: οὕτως ἐξῆλθεν
  english_pob_choice: he departed
  chosen_spanish: partió
  alternatives_spanish:
  - se fue
  - salió
  - así partió
  lexicon: BDAG
  rationale: El cierre narrativo puede expresarse de forma breve. «Partió» conserva la salida/departida final sin sobrecargar el español con una glosa como «se fue» o «salió».
theological_decisions:
- issue: Posible lectura sacramental de κλάσας τὸν ἄρτον
  english_pob_reading: Rendered neutrally as 'broke the bread' without sacramental specification.
  chosen_spanish_reading: «partió el pan» sin especificar si se trata de una comida ordinaria o de la Cena del Señor.
  alternative_spanish_readings:
  - «partió el pan» entendido sacramentalmente
  - «compartió una comida»
  - «celebró la Cena del Señor»
  rationale: El griego admite una lectura eucarística en algunos contextos de Hechos, pero este versículo por sí solo no la obliga. La traducción conserva la tensión interpretativa en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el expediente auditado en inglés. No se introdujeron ampliaciones interpretativas; se preservó la ambigüedad sobre κλάσας τὸν ἄρτον y el valor contextual de γευσάμενος.
  spanish_consistency_notes:
  - Se mantuvo «pan» con artículo para reflejar τὸν ἄρτον.
  - Se evitó «SEÑOR» o una glosa litúrgica, porque no hay en este versículo una referencia explícita al nombre divino ni una necesidad textual de sacramentalizar la frase.
  - «Hasta el alba» conserva el registro bíblico sin arcaísmo excesivo.
  - «Partió» al final funciona como equivalente breve de ἐξῆλθεν en este contexto narrativo.
