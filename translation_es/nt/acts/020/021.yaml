    issue: 'Construcción coordinada torpe: «y de la fe»'
    rationale: El griego coordina dos objetos paralelos sin exigir repetir la preposición en español. «Acerca del arrepentimiento para con Dios y la fe en nuestro Señor Jesús» es más natural y más cercano a la estructura fuente.
  - severity: low
    issue: «testificando solemnemente» suena algo poco idiomático
    rationale: Aunque comprensible y bastante fiel, en español bíblico natural «dando solemne testimonio» o «testificando de manera solemne» fluye mejor. Es un ajuste de estilo, no de sentido.
