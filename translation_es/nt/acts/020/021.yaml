translation:
  language: es
  text: dando solemne testimonio a judíos y griegos acerca del arrepentimiento para con Dios y la fe en nuestro Señor Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza en nuestro Señor Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: διαμαρτυρόμενος
  english_pob_choice: solemnly testifying
  chosen_spanish: testificando solemnemente
  alternatives_spanish:
  - testificando
  - dando testimonio solemnemente
  - amonestando solemnemente
  lexicon: BDAG
  rationale: El participio comunica testimonio enfático y con peso. «Testificando solemnemente» conserva tanto la idea de testimonio como el tono serio del original, sin volverlo una paráfrasis más interpretativa.
- source_word: Ἰουδαίοις τε καὶ Ἕλλησιν
  english_pob_choice: to both Jews and Greeks
  chosen_spanish: a judíos y griegos
  alternatives_spanish:
  - a judíos y a griegos
  - a judíos y gentiles
  - a judíos y griegos también
  lexicon: BDAG
  rationale: «Griegos» preserva el par lexical del griego y la amplitud de destinatarios de Lucas. En español, el dativo se expresa naturalmente con «a».
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - cambio de pensamiento
  - conversión
  lexicon: BDAG
  rationale: La revisión del POB en inglés ya corrigió la tendencia a «change of mind» para reflejar mejor la fuerza moral-espiritual de μετάνοια. En español, «arrepentimiento» es la equivalencia más fiel y entendible.
- source_word: εἰς θεόν
  english_pob_choice: toward God
  chosen_spanish: para con Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  - orientado a Dios
  lexicon: BDAG
  rationale: La preposición expresa dirección/orientación del arrepentimiento. «Para con Dios» suena natural en español bíblico contemporáneo y conserva la relación dirigida a Dios sin reducirla a mero movimiento espacial.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  - creencia
  lexicon: BDAG
  rationale: La POB inglesa adoptó «faith» en el texto principal. En español, «fe» es la correspondencia más directa y registra bien la referencia religiosa sin introducir una glosa interpretativa.
- source_word: εἰς τὸν κύριον ἡμῶν Ἰησοῦν
  english_pob_choice: in our Lord Jesus
  chosen_spanish: en nuestro Señor Jesús
  alternatives_spanish:
  - en nuestro Señor Jesucristo
  - en el Señor Jesús que es nuestro
  - para con nuestro Señor Jesús
  lexicon: BDAG
  rationale: Con πίστις, el griego expresa el objeto de la fe; en español, «fe en» es la forma idiomática y fiel. «Señor» sigue el valor cristológico de κύριος, y «Jesús» conserva el nombre propio.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: BDAG
  rationale: Aunque el proyecto privilegia «Yahvé» para el nombre divino cuando corresponde, aquí κύριος es el título aplicado a Jesús. «Señor» es la forma española estable y más fiel al uso cristológico del texto.
theological_decisions:
- issue: Relación entre μετάνοια y πίστις en la cláusula final
  english_pob_reading: repentance toward God and faith in our Lord Jesus
  chosen_spanish_reading: arrepentimiento para con Dios y de la fe en nuestro Señor Jesús
  alternative_spanish_readings:
  - arrepentimiento hacia Dios y fe en nuestro Señor Jesús
  - arrepentimiento para Dios y fe en nuestro Señor Jesús
  rationale: 'El texto distingue dos respuestas: arrepentimiento orientado a Dios y fe dirigida a Jesús. El español conserva esa distinción sin fundir ambas ideas en una sola expresión.'
  doctrine_reference: 'DOCTRINE.md: mantener la distinción léxica entre μετάνοια y πίστις; usar equivalentes claros y evitar neutralizaciones excesivas.'
- issue: Valor de κύριος aplicado a Jesús
  english_pob_reading: our Lord Jesus
  chosen_spanish_reading: nuestro Señor Jesús
  alternative_spanish_readings:
  - nuestro Maestro Jesús
  - nuestro Dueño Jesús
  rationale: «Señor» mantiene el peso cristológico del título sin trasladarlo a un registro social más débil o más duro. No se usa «Yahvé» porque el griego no está citando el nombre divino aquí, sino titulando a Jesús como Señor.
  doctrine_reference: 'DOCTRINE.md: κύριος normalmente → Señor; reservar Yahvé para el nombre divino cuando el texto lo exija.'
translation_notes:
  revision_awareness: Tomé como guía la revisión más reciente del audit trail inglés, que corrigió «change of mind» a «repentance» y «trust» a «faith». La redacción española sigue esa corrección y conserva el tono solemne del participio inicial.
  spanish_consistency_notes:
  - Mantener «fe» como equivalente principal de πίστις en contextos similares, salvo que una nota justifique «confianza».
  - Mantener «Señor» para κύριος aplicado a Jesús, y no sustituirlo por «Maestro» o por un nombre divino en este pasaje.
  - Conservar la distinción entre «arrepentimiento» y «fe» cuando ambas nociones aparezcan coordinadas.
