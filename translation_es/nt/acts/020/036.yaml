translation:
  language: es
  text: Y después de decir estas cosas, se arrodilló con todos ellos y oró.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva la coordinación narrativa sin añadir una relación temporal más fuerte de la que exige el griego. En español, 'Y' mantiene la continuidad del relato de forma natural.
- source_word: ταῦτα εἰπὼν
  english_pob_choice: after saying these things
  chosen_spanish: después de decir estas cosas
  alternatives_spanish:
  - habiendo dicho estas cosas
  - cuando hubo dicho estas cosas
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad respecto al verbo principal. 'Después de decir estas cosas' reproduce esa secuencia de modo natural en español, sin sobrecargar el estilo.
- source_word: θεὶς τὰ γόνατα αὐτοῦ
  english_pob_choice: he knelt down
  chosen_spanish: se arrodilló
  alternatives_spanish:
  - habiendo puesto sus rodillas
  - dobló las rodillas
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática: literalmente ''habiendo puesto sus rodillas''. En español, ''se arrodilló'' comunica el gesto con fidelidad y claridad, sin forzar un calco poco natural.'
- source_word: σὺν πᾶσιν αὐτοῖς
  english_pob_choice: with them all
  chosen_spanish: junto con todos ellos
  alternatives_spanish:
  - con todos ellos
  - con ellos todos
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento. 'Junto con todos ellos' conserva la idea de compañía y refleja bien el énfasis de πᾶσιν en la totalidad del grupo.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró en oración
  - hizo oración
  lexicon: BDAG
  rationale: El verbo es el término normal para 'orar'. 'Oró' es natural y digno en español, y mantiene la fuerza verbal directa del original.
translation_notes:
  revision_awareness: El griego presenta una secuencia narrativa breve con un participio anterior y un verbo principal; la versión española conserva esa relación temporal sin añadir matices no presentes en el texto. La elección de 'se arrodilló' sigue el valor idiomático de 'poner las rodillas', ya reconocido en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con coordinación simple y sin amplificación interpretativa.
  - Se evitó 'Cristo', 'SEÑOR' u otro término doctrinal no presente en el verso.
  - '''Oró'' se usa como equivalente natural de προσηύξατο; no se introdujeron notas porque no hay ambigüedad textual relevante en este versículo.'
