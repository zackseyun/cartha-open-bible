translation:
  language: es
  text: Estos hombres se adelantaron y nos esperaban en Troas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Estos, habiéndose adelantado, nos esperaban en Troas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - Estos
  - Estos mismos
  lexicon: BDAG
  rationale: El demostrativo masculino plural se refiere a los compañeros ya mencionados; en español, "estos hombres" hace explícito el referente sin sobrecargar la frase.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona como conector leve y no requiere una marca explícita en español para conservar la fluidez narrativa.
- source_word: προσελθόντες
  english_pob_choice: went on ahead
  chosen_spanish: se adelantaron
  alternatives_spanish:
  - habiendo ido delante
  - después de adelantarse
  - fueron delante
  lexicon: BDAG
  rationale: En este contexto de viaje, el participio indica que iban delante del grupo narrador; "se adelantaron" comunica el sentido natural del desplazamiento previo sin perder la relación temporal implícita.
- source_word: ἔμενον
  english_pob_choice: were waiting for
  chosen_spanish: nos esperaban
  alternatives_spanish:
  - se quedaban para
  - permanecían para
  - nos aguardaban
  lexicon: BDAG
  rationale: Aunque el verbo básico es "permanecer/quedarse", con objeto personal en un contexto de viaje expresa la idea de esperar la llegada del grupo; "nos esperaban" conserva el imperfecto y el matiz contextual.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre objeto de primera persona plural; en español se integra naturalmente como clítico verbal.
- source_word: ἐν Τρῳάδι
  english_pob_choice: in Troas
  chosen_spanish: en Troas
  alternatives_spanish:
  - en Troade
  - en la región de Troas
  lexicon: BDAG
  rationale: La preposición locativa con el topónimo se rinde de forma directa y natural como "en Troas".
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto principal, anclado en "Troas[a]". No hubo cambios doctrinales ni textuales de fondo; solo ajuste de anclaje de la nota.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento narrativo simple y sobrio, acorde con Hechos.
  - '"Nos esperaban" preserva el valor imperfectivo del griego mejor que un pretérito puntual.'
  - Se evitó "permanecían" porque en este contexto podía sonar menos natural y perder la idea de espera personal.
