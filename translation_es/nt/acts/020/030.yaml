revisions:
- from: y de entre ustedes mismos se levantarán hombres que hablarán cosas torcidas[a], para arrastrar a los discípulos tras sí.
  to: y de entre ustedes mismos se levantarán hombres, hablando cosas torcidas[a], para apartar a los discípulos tras sí.
  rationale: Se ajusta «arrastrar» a «apartar» para reflejar mejor ἀποσπᾶν sin intensificación indebida, y se cambia «que hablarán» por «hablando» para conservar mejor el participio λαλοῦντες y el flujo del original. La nota léxica sobre «cosas torcidas» se mantiene porque preserva las alternativas documentadas.
