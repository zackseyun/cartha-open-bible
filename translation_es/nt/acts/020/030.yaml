translation:
  language: es
  text: y de entre ustedes mismos se levantarán hombres, hablando cosas torcidas[a], para apartar a los discípulos tras sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas perversas» o «cosas distorsionadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ὑμῶν αὐτῶν
  english_pob_choice: from among your own selves
  chosen_spanish: de entre ustedes mismos
  alternatives_spanish:
  - de entre ustedes
  - de su propio grupo
  lexicon: BDAG
  rationale: 'La frase griega subraya un origen interno y enfático: el peligro surge desde dentro de la misma comunidad. «De entre ustedes mismos» conserva esa fuerza de interioridad mejor que una formulación más plana.'
- source_word: ἀναστήσονται
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - aparecerán
  - surgirán
  lexicon: BDAG
  rationale: El futuro de ἀνίστημι aquí expresa que tales hombres emergerán. «Se levantarán» comunica bien ese movimiento de aparición sin añadir matices ajenos.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: BDAG
  rationale: El griego usa ἄνδρες, término masculino específico. «Hombres» preserva esa precisión y evita neutralizar el referente.
- source_word: λαλοῦντες
  english_pob_choice: speaking
  chosen_spanish: hablarán
  alternatives_spanish:
  - estarán hablando
  - dirán
  lexicon: BDAG
  rationale: El participio describe su actividad verbal continua. En español, «hablarán» da una forma natural y clara que mantiene la idea de discurso activo.
- source_word: διεστραμμένα
  english_pob_choice: twisted things
  chosen_spanish: cosas torcidas
  alternatives_spanish:
  - cosas perversas
  - cosas distorsionadas
  lexicon: BDAG
  rationale: El participio plural sustantivado indica cosas desviadas de lo recto. «Cosas torcidas» conserva la imagen de desviación y evita restringirla demasiado a lo meramente moral o doctrinal.
- source_word: τοῦ ἀποσπᾶν
  english_pob_choice: to draw away
  chosen_spanish: para arrastrar
  alternatives_spanish:
  - para apartar
  - para atraer lejos
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Arrastrar» transmite la idea de separar con fuerza a los discípulos del grupo anterior; aunque es más vívido que «apartar», sigue siendo fiel a la noción de alejamiento.
- source_word: τοὺς μαθητὰς
  english_pob_choice: the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a los aprendices
  - a los seguidores
  lexicon: BDAG
  rationale: En Hechos, μαθηταί es el término habitual para los discípulos de Jesús. «Discípulos» conserva ese uso canónico y la claridad contextual.
- source_word: ὀπίσω ἑαυτῶν
  english_pob_choice: after themselves
  chosen_spanish: tras sí
  alternatives_spanish:
  - después de sí
  - detrás de sí
  lexicon: BDAG
  rationale: La expresión idiomática señala la formación de un seguimiento personal. «Tras sí» comunica de forma natural en español que quieren llevar discípulos detrás de ellos como adherentes.
theological_decisions:
- issue: Alcance de las palabras desviadas
  english_pob_reading: speaking twisted things
  chosen_spanish_reading: hablarán cosas torcidas
  alternative_spanish_readings:
  - hablarán cosas perversas
  - hablarán cosas distorsionadas
  rationale: El texto advierte una desviación doctrinal o moral sin precisar una herejía concreta. Se conserva esa amplitud, sin cerrar el sentido a una sola categoría.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Marcación de género en ἄνδρες
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - gente
  rationale: El griego es específico en género. La traducción mantiene esa precisión, coherente con una política de fidelidad gramatical.
  doctrine_reference: Precisión de género gramatical
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios, con alta concordancia entre evaluaciones. Este borrador mantiene esa línea y refleja las decisiones léxicas ya auditadas sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «ustedes» para la segunda persona plural, en registro neutral latinoamericano.
  - Se conserva «discípulos» como término técnico bíblico.
  - Se mantiene «hombres» por la especificidad del griego ἄνδρες.
  - La nota [a] queda anclada en «cosas torcidas» para recoger alternativas léxicas documentadas.
