translation:
  language: es
  text: Y ahora, he aquí[a], atado por el Espíritu, voy a Jerusalén, sin saber qué me acontecerá allí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atado en el espíritu»; la frase griega puede referirse tanto al espíritu de Pablo como al Espíritu Santo. También puede entenderse como «impulsado por el Espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ νῦν ἰδοὺ
  english_pob_choice: And now, behold
  chosen_spanish: Y ahora, mirad[a]
  alternatives_spanish:
  - Y ahora, ved
  - Y ahora, he aquí
  lexicon: BDAG
  rationale: Conserva la transición enfática de νῦν + ἰδοὺ. «Mirad» comunica la llamada de atención en un español natural y solemne; «he aquí» sería más tradicional, pero menos vivo para lectura pública. Se mantiene la fuerza discursiva sin omitir el marcador.
- source_word: δεδεμένος
  english_pob_choice: bound
  chosen_spanish: atado
  alternatives_spanish:
  - ligado
  - constreñido
  - obligado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de δέω conserva una imagen de sujeción. «Atado» reproduce mejor la metáfora que «obligado» o «constreñido», y deja abierta la tensión interpretativa sobre si la atadura es interna o divina.
- source_word: τῷ πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - por mi espíritu
  lexicon: BDAG
  rationale: 'La lectura del inglés revisado favorece una relación instrumental/agencial: «por el Espíritu». En español suena más claro que «por el Espíritu» en vez de «en el Espíritu» para esta construcción; aun así, se conserva la ambigüedad del referente de πνεύμα al no especificar si es el Espíritu Santo o el espíritu humano.'
- source_word: πορεύομαι
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me dirijo
  lexicon: BDAG
  rationale: Expresa movimiento en curso con naturalidad y sin sobrecargar la frase. «Voy» es suficiente y fiel al valor verbal del presente.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Transliteración habitual en español bíblico y geográfico.
- source_word: τὰ ἐν αὐτῇ συναντήσοντά μοι
  english_pob_choice: what will happen to me there
  chosen_spanish: qué me acontecerá allí
  alternatives_spanish:
  - lo que me saldrá al encuentro allí
  - qué cosas me aguardan allí
  lexicon: BDAG
  rationale: El griego es literalmente «las cosas que me saldrán al encuentro allí», pero en español «qué me acontecerá allí» comunica el sentido de eventos futuros sin perder la referencia a lo que espera a Pablo en Jerusalén. Se evita una literalidad incómoda que oscurecería el sentido.
- source_word: μὴ εἰδώς
  english_pob_choice: not knowing
  chosen_spanish: sin saber
  alternatives_spanish:
  - no sabiendo
  - desconociendo
  lexicon: BDAG
  rationale: Mantiene el valor participial con un español fluido y conciso. «Sin saber» encaja mejor en la estructura de la oración que un calco más rígido.
theological_decisions:
- issue: Referente de τῷ πνεύματι
  english_pob_reading: The Holy Spirit is the likely referent, rendered as 'by the Spirit,' while preserving ambiguity about the dative construction.
  chosen_spanish_reading: «por el Espíritu» mantiene abierta la posibilidad de que se trate del Espíritu Santo o del espíritu humano, sin resolver la tensión.
  alternative_spanish_readings:
  - «en el espíritu»
  - «por mi espíritu»
  rationale: El texto griego permite más de una lectura, y el audit trail inglés también preserva esa tensión. La formulación elegida en español deja espacio para ambas interpretaciones sin forzar una resolución dogmática o psicológica.
  doctrine_reference: Preservar la tensión textual y teológica sin cerrarla artificialmente.
translation_notes:
  revision_awareness: El borrador inglés pasó de «in the Spirit» a «by the Spirit» en una revisión posterior para reflejar mejor la relación del dativo τῷ πνεύματι con δεδεμένος. La versión española refleja esa decisión revisada, pero conserva la ambigüedad semántica documentada en la nota.
  spanish_consistency_notes:
  - Se prefirió «Espíritu» con mayúscula en la nota porque la ambigüedad afecta al posible Espíritu Santo; en el texto principal la mayúscula depende de la lectura teológica implícita.
  - Se evitó «SEÑOR» u otra sustitución convencional, porque aquí no aparece el tetragrámaton ni κύριος.
  - La traducción principal mantiene un registro sobrio y público, con una nota que preserva la alternativa interpretativa del audit trail inglés.
