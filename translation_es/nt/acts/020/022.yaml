    issue: «mirad[a]» para ἰδοὺ
    rationale: ἰδοὺ funciona aquí como partícula de atención/discurso («he aquí», «miren», «fíjense»), no como un imperativo plural natural dentro de una declaración en primera persona. «Mirad» introduce un tono peninsular y una discordancia pragmática en español latinoamericano neutral.
  - severity: low
    issue: La nota alternativa usa «al propio espíritu de Pablo»
    rationale: Es inteligible, pero «al espíritu de Pablo» suena más limpio. No es un error, solo una mejora estilística menor.
