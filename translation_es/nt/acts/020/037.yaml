translation:
  language: es
  text: Y hubo mucho llanto entre todos, y, echándose sobre el cuello de Pablo, lo besaban[a] con cariño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'seguían besándolo'; el imperfecto griego puede enfatizar una acción repetida o prolongada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανὸς
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - considerable
  - gran
  lexicon: BDAG
  rationale: Con κλαυθμός, ἱκανός funciona idiomáticamente como intensificador de abundancia. En español, 'mucho llanto' comunica naturalidad y la intensidad del dolor sin perder el valor cuantitativo/intensivo del griego.
- source_word: κλαυθμὸς ἐγένετο
  english_pob_choice: there was ... weeping
  chosen_spanish: hubo ... llanto
  alternatives_spanish:
  - se produjo ... llanto
  - surgió ... llanto
  lexicon: BDAG
  rationale: La construcción idiomática expresa que el llanto llegó a darse entre ellos. 'Hubo ... llanto' es fluido en español y conserva el foco en la manifestación del duelo.
- source_word: πάντων
  english_pob_choice: among them all
  chosen_spanish: entre todos
  alternatives_spanish:
  - de todos
  - por todos
  lexicon: BDAG
  rationale: '''Entre todos'' expresa que la participación fue colectiva, manteniendo el alcance del genitivo sin forzar una preposición más rígida en español.'
- source_word: ἐπιπεσόντες ἐπὶ τὸν τράχηλον
  english_pob_choice: falling on Paul's neck
  chosen_spanish: echándose sobre el cuello
  alternatives_spanish:
  - arrojándose sobre el cuello
  - cayendo sobre el cuello
  lexicon: BDAG
  rationale: '''Echarse sobre'' reproduce el gesto físico intenso del participio con ἐπί + acusativo. ''Cuello'' preserva τράχηλος con concreción corporal, como en el inglés auditado.'
- source_word: τράχηλον
  english_pob_choice: neck
  chosen_spanish: cuello
  alternatives_spanish:
  - garganta
  - nuca
  lexicon: BDAG
  rationale: El sentido básico es 'cuello'. 'Cuello' es el equivalente más directo y natural en español, evitando una imagen menos precisa como 'garganta' o 'nuca'.
- source_word: κατεφίλουν
  english_pob_choice: were kissing him affectionately
  chosen_spanish: lo besaban con cariño
  alternatives_spanish:
  - lo seguían besando
  - lo besaban efusivamente
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continuada o repetida; 'lo besaban' lo refleja. 'Con cariño' transmite el matiz afectivo del verbo compuesto sin exagerar hacia una interpretación sentimental añadida.
- source_word: δὲ καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Ahora ... y
  lexicon: BDAG
  rationale: La secuencia narrativa se refleja con la conjunción simple 'Y', manteniendo el avance del relato sin introducir contraste fuerte.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la lectura óptima-equivalente con el mismo contenido semántico y con una nota que preserva la alternativa aspectual del imperfecto griego.
  spanish_consistency_notes:
  - Se conserva 'Pablo' como forma del nombre propio conforme al texto fuente.
  - Se evita 'SEÑOR' o equivalentes no presentes, porque el versículo no contiene vocabulario divino.
  - El tono mantiene la imagen corporal concreta del griego ('cuello', 'besaban') sin suavizarla hacia una paráfrasis más general.
