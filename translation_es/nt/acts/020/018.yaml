- from: 'Cuando llegaron a él[a], les dijo[b]: «Ustedes mismos saben cómo he vivido entre ustedes todo el tiempo desde el primer día en que puse pie en Asia[c]»'
  to: 'Cuando llegaron a él, les dijo: «Ustedes mismos saben cómo viví entre ustedes todo el tiempo desde el primer día en que puse pie en Asia[a][b]»'
  rationale: Se corrigió el tiempo verbal principal a «viví» para reflejar mejor el aoristo griego en una recapitulación narrativa. Se reubicó la nota cultural al término «Asia», donde realmente corresponde, y se eliminó la nota redundante sobre «en Asia». Se conservó una nota léxica sobre la alternativa de ἐγενόμην, anclándola al final de la frase pertinente.
