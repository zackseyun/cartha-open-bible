  text: ὡς δὲ παρεγένοντο πρὸς αὐτὸν εἶπεν αὐτοῖς· Ὑμεῖς ἐπίστασθε ἀπὸ πρώτης ἡμέρας ἀφ’ ἧς ἐπέβην εἰς τὴν Ἀσίαν πῶς μεθ’ ὑμῶν τὸν πάντα χρόνον ἐγενόμην,
base_translation:
  language: en
  yaml_path: translation/nt/acts/020/018.yaml
  text: When they came to him[a], he said to them[b], “You yourselves know how I lived among you the whole time from the first day that I set foot in Asia,”
  footnotes:
