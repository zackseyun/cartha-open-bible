translation:
  language: es
  text: 'Cuando llegaron a él, les dijo: «Ustedes mismos saben cómo viví entre ustedes todo el tiempo desde el primer día en que puse pie en Asia[a][b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Asia aquí se refiere a la provincia romana de Asia, en el occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: O «cómo estuve con ustedes todo el tiempo». La expresión griega puede enfatizar tanto la manera de vivir de Pablo como su presencia continua entre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: BDAG
  rationale: En este contexto, el verbo indica que los ancianos efesios se acercaron y estuvieron ante Pablo; «llegaron» comunica de forma natural la idea de arribar a su presencia sin volver la frase pesada.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: BDAG
  rationale: La preposición con acusativo expresa movimiento hacia Pablo. «A él» es directo y fiel al movimiento indicado por el griego.
- source_word: Ὑμεῖς
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes
  - Ustedes mismos, precisamente
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. «Ustedes mismos» preserva esa fuerza mejor que un simple «ustedes».
- source_word: ἐπίστασθε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - están bien enterados
  lexicon: BDAG
  rationale: El verbo expresa conocimiento personal y seguro. «Saben» es la equivalencia más natural y clara en español.
- source_word: ἀπὸ πρώτης ἡμέρας
  english_pob_choice: from the first day
  chosen_spanish: desde el primer día
  alternatives_spanish:
  - a partir del primer día
  - desde el primer día de
  lexicon: BDAG
  rationale: La frase marca el punto de inicio de la conducta de Pablo entre ellos. «Desde el primer día» reproduce bien el valor temporal y suena natural en español.
- source_word: ἀφ’ ἧς ἐπέβην
  english_pob_choice: that I set foot
  chosen_spanish: en que puse pie
  alternatives_spanish:
  - que entré
  - que llegué
  lexicon: BDAG
  rationale: La imagen literal de ἐπιβαίνω es la de poner el pie sobre un lugar. «Puse pie» conserva esa vividez; se evita una paráfrasis más plana como «llegué».
- source_word: εἰς τὴν Ἀσίαν
  english_pob_choice: in Asia
  chosen_spanish: en Asia
  alternatives_spanish:
  - a Asia
  - en la provincia de Asia
  lexicon: BDAG
  rationale: El griego nombra Asia sin expandirla en el texto principal. Se mantiene «Asia» y se deja la precisión histórica para la nota.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - en qué forma
  lexicon: BDAG
  rationale: 'Introduce el contenido del conocimiento de ellos: el modo de vida de Pablo entre ellos. «Cómo» es la forma natural y fiel en español.'
- source_word: μεθ’ ὑμῶν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - con ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: Aquí el sentido es comunitario y de convivencia en medio del grupo, no solo acompañamiento individual. «Entre ustedes» refleja mejor esa presencia en su medio.
- source_word: τὸν πάντα χρόνον
  english_pob_choice: the whole time
  chosen_spanish: todo el tiempo
  alternatives_spanish:
  - durante todo ese tiempo
  - todo el tiempo
  lexicon: BDAG
  rationale: La expresión indica duración continua. «Todo el tiempo» es idiomática y preserva la idea de totalidad temporal.
- source_word: ἐγενόμην
  english_pob_choice: I lived
  chosen_spanish: he vivido
  alternatives_spanish:
  - he sido
  - me conduje
  lexicon: BDAG
  rationale: Aunque γίνομαι puede significar «llegar a ser» o «ser», aquí se refiere al modo de vida de Pablo entre ellos. El perfecto español «he vivido» comunica su conducta continua con naturalidad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la solución auditada en inglés. Se mantuvo la ambigüedad válida de ἐγενόμην con un español natural («he vivido»), y se preservó la referencia geográfica «Asia» con nota aclaratoria. No hubo revisiones previas aplicadas en el expediente.
  spanish_consistency_notes:
  - Se usa «Ustedes» para concordar con español neutro y conservar el énfasis del pronombre griego.
  - Se mantiene «Asia» en el texto principal y se explica en nota que se trata de la provincia romana.
  - Se eligió una forma verbal de experiencia continua («he vivido») para reflejar el sentido de conducta prolongada en el tiempo.
  - Se prefirió «entre ustedes» frente a «con ustedes» para transmitir la dimensión comunitaria de μεθ’ ὑμῶν.
