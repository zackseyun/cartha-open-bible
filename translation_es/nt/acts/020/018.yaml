    text: Asia here refers to the Roman province of Asia in western Asia Minor, not the modern continent.
    reason: cultural_note
  - marker: b
    text: Or “how I was with you the whole time.” The Greek expression can emphasize either Paul’s manner of life or his continual presence among them.
