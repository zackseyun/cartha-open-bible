translation:
  language: es
  text: Y de allí, después de zarpar, al día siguiente llegamos frente a Quíos[a]; al día siguiente hicimos escala en Samos[b]; y al día siguiente de ese llegamos a Mileto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al otro lado de Quíos» o «frente a la costa de Quíos». El griego indica una posición opuesta a la isla, no necesariamente que desembarcaran allí.
    reason: lexical_alternative
  - marker: b
    text: O «tocamos puerto en Samos». El verbo es un término náutico para poner la nave junto a un puerto o hacer una breve parada.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y de allí
  alternatives_spanish:
  - Y desde allí
  - De allí
  lexicon: BDAG
  rationale: La crasis aporta tanto la conexión narrativa como el punto de partida. «Y de allí» conserva ambos elementos con naturalidad en español.
- source_word: ἀποπλεύσαντες
  english_pob_choice: after setting sail
  chosen_spanish: habiendo zarpado
  alternatives_spanish:
  - después de zarpar
  - partiendo por mar
  lexicon: BDAG
  rationale: El participio aoristo se traduce como acción previa a la principal. «Habiendo zarpado» conserva el sentido náutico y el valor temporal sin sonar mecánico.
- source_word: τῇ ἐπιούσῃ
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: BDAG
  rationale: La dativa temporal se expresa de forma natural en español con «al día siguiente».
- source_word: κατηντήσαμεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - arribamos
  - alcanzamos
  lexicon: BDAG
  rationale: En relato de viaje, el verbo marca llegada a un punto del trayecto. «Llegamos» es claro y mantiene el flujo narrativo.
- source_word: ἄντικρυς Χίου
  english_pob_choice: opposite Chios
  chosen_spanish: frente a Quíos
  alternatives_spanish:
  - al otro lado de Quíos
  - en oposición a Quíos
  lexicon: BDAG
  rationale: «ἄντικρυς» indica posición enfrente o a la vista de un lugar, no necesariamente desembarco. «Frente a Quíos» preserva ese matiz náutico.
- source_word: τῇ δὲ ἑτέρᾳ
  english_pob_choice: on the following day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - y al día siguiente
  - en el otro día
  lexicon: BDAG
  rationale: La secuencia cronológica sigue avanzando; en español puede repetirse «al día siguiente» sin perder claridad, aunque el griego marque literalmente «el otro día».
- source_word: παρεβάλομεν εἰς Σάμον
  english_pob_choice: we touched at Samos
  chosen_spanish: tocamos en Samos
  alternatives_spanish:
  - hicimos escala en Samos
  - atracamos en Samos
  lexicon: BDAG
  rationale: «Παραβάλλω» es un término náutico para acercarse, hacer escala o tocar puerto. «Tocamos en Samos» es idiomático y mantiene la posible brevedad de la parada.
- source_word: τῇ δὲ ἐχομένῃ
  english_pob_choice: on the day after that
  chosen_spanish: al día después
  alternatives_spanish:
  - al día siguiente
  - en el día siguiente
  lexicon: BDAG
  rationale: La expresión sigue la serie cronológica. «Al día después» es menos elegante que otras opciones, pero reproduce con bastante literalidad la progresión del original sin borrar su secuencia paso a paso.
- source_word: ἤλθομεν εἰς Μίλητον
  english_pob_choice: we came to Miletus
  chosen_spanish: llegamos a Mileto
  alternatives_spanish:
  - fuimos a Mileto
  - arribamos a Mileto
  lexicon: BDAG
  rationale: El verbo de movimiento con εἰς expresa llegada al destino. «Llegamos a Mileto» es consistente con la primera ocurrencia y fluye en castellano.
- source_word: Χίου / Σάμον / Μίλητον
  english_pob_choice: Chios / Samos / Miletus
  chosen_spanish: Quíos / Samos / Mileto
  alternatives_spanish:
  - Quio / Samos / Mileto
  - Quíos / Samo / Mileto
  lexicon: LSJ
  rationale: Son topónimos griegos; se emplean las formas castellanas habituales y reconocibles.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación asegurando que cada marcador de nota aparezca explícitamente en el texto español: [a] junto a «de allí» y [b] junto a «Samos». No se añadieron notas sin anclaje textual.'
  spanish_consistency_notes:
  - Se mantiene la secuencia temporal del relato con marcadores repetidos pero idiomáticos en español.
  - Se conserva el matiz náutico de los verbos sin sobreexplicar el trayecto.
  - 'Los topónimos se castellanizan de manera estándar: Quíos, Samos, Mileto.'
