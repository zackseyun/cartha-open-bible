    reason: lexical_alternative
  - marker: b
    text: O «tocamos puerto en Samos». El verbo es un término náutico para poner la nave junto a un puerto o hacer una breve parada.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda al sintagma que explica. Se reemplaza «habiendo zarpado» por «después de zarpar» para un español más natural sin pérdida de sentido. Se cambia «tocamos en Samos» por «hicimos escala en Samos», que comunica mejor el valor náutico de παραβάλλω en español contemporáneo. Se sustituye «al día después» por «al día siguiente de ese», que preserva la progresión cronológica de τῇ δὲ ἐχομένῃ y suena idiomático.
