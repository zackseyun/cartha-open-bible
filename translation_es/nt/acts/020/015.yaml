base_translation:
  language: en
  yaml_path: translation/nt/acts/020/015.yaml
  text: And from there[a], after setting sail, on the next day we came opposite Chios; on the following day we touched at Samos[b]; and on the day after that we came to Miletus.
  footnotes:
  - marker: a
    text: Or 'across from Chios' or 'off Chios.' The Greek indicates a position opposite the island rather than necessarily landing there.
    reason: lexical_alternative
  - marker: b
    text: Or 'we put in at Samos.' The verb is a nautical term for bringing the ship alongside or making a stop.
    reason: lexical_alternative
