translation:
  language: es
  text: Y se llevaron al muchacho vivo, y fueron consolados no poco[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no fueron consolados poco»; es decir, recibieron gran consuelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγον
  english_pob_choice: took ... away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - lo llevaron
  - lo sacaron
  lexicon: BDAG
  rationale: ἄγω puede significar llevar, conducir o sacar. En este contexto narrativo, después de la restauración de Eutico, «se llevaron» expresa de manera natural que lo retiraron de allí con vida, sin cargarlo con un matiz innecesario de dirección o autoridad.
- source_word: παῖδα
  english_pob_choice: boy
  chosen_spanish: muchacho
  alternatives_spanish:
  - niño
  - joven
  - criado
  lexicon: BDAG
  rationale: παῖς puede significar niño, muchacho o siervo según el contexto. Aquí se refiere a Eutico, ya llamado νεανίας en el versículo anterior; «muchacho» comunica bien la edad aproximada sin introducir la idea de servidumbre.
- source_word: ζῶντα
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - vivo y sano
  lexicon: BDAG
  rationale: El participio funciona en forma predicativa con τὸν παῖδα, indicando el estado en que lo llevaron. «Vivo» es la equivalencia española más directa y natural en este contexto de restauración.
- source_word: παρεκλήθησαν
  english_pob_choice: were comforted
  chosen_spanish: fueron consolados
  alternatives_spanish:
  - recibieron consuelo
  - quedaron consolados
  - fueron animados
  lexicon: BDAG
  rationale: παρακαλέω abarca animar, exhortar, consolar y confortar. Dado el contraste con la aparente muerte y la recuperación de Eutico, «fueron consolados» conserva el sentido afectivo principal y evita debilitar la reacción emotiva del grupo.
- source_word: οὐ μετρίως
  english_pob_choice: not a little
  chosen_spanish: no poco
  alternatives_spanish:
  - grandemente
  - en gran manera
  - muchísimo
  lexicon: BDAG
  rationale: 'La expresión es un litote: literalmente «no moderadamente» / «no poco», con sentido enfático. En español, «no poco» preserva con mayor fidelidad la forma idiomática y la tensión retórica que una simplificación como «grandemente».'
theological_decisions:
- issue: Modo de expresar la intensidad emocional de la comunidad
  english_pob_reading: were not a little comforted
  chosen_spanish_reading: no poco fueron consolados
  alternative_spanish_readings:
  - fueron muy consolados
  - quedaron grandemente consolados
  rationale: 'No hay un problema doctrinal, pero sí una decisión de estilo y exégesis: mantener el litote griego sin convertirlo en una paráfrasis plana. «No poco» deja visible la forma original y su fuerza enfática.'
  doctrine_reference: No aplica; decisión retórica/semántica del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés POB, que volvió de una paráfrasis explicativa («beyond measure») a una forma más literal e idiomática del litote («not a little»). Por eso el español conserva «no poco» en lugar de suavizarlo a «muchísimo» o «grandemente».
  spanish_consistency_notes:
  - Se usa «muchacho» para παῖς siguiendo el contexto inmediato de Eutico y evitando «siervo».
  - Se prefiere «vivo» por naturalidad castellana y fidelidad al participio predicativo.
  - La nota al pie preserva la alternativa idiomática, equivalente al margen inglés.
  - No se introduce «Cristo», «Señor» ni otra terminología no presente en el versículo.
