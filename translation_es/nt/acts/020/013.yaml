translation:
  language: es
  text: Pero nosotros, habiendo ido delante a la nave, zarpamos para Asón, con la intención de tomar a Pablo a bordo desde allí, porque así él lo había dispuesto[a], ya que él mismo tenía intención de ir por tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque así había sido dispuesto». La forma griega διατεταγμένος ἦν es formalmente pasiva, pero en contexto probablemente se refiere a un arreglo o instrucción previa de Pablo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «ya que él mismo tenía intención de viajar a pie». El verbo griego πεζεύειν contrasta específicamente el viaje por tierra con la travesía del grupo por barco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προελθόντες
  english_pob_choice: having gone ahead
  chosen_spanish: habiendo ido delante
  alternatives_spanish:
  - habiendo ido primero
  - habiendo adelantado el paso
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa respecto del verbo principal. «Habiendo ido delante» conserva esa secuencia temporal y la idea de que el grupo precedió a Pablo.
- source_word: ἐπὶ τὸ πλοῖον
  english_pob_choice: to the ship
  chosen_spanish: hasta la nave
  alternatives_spanish:
  - a la nave
  - a bordo de la nave
  lexicon: BDAG
  rationale: Con verbo de movimiento, la expresión apunta al desplazamiento hacia la embarcación. «Hasta la nave» suena natural en español y mantiene la dirección sin forzar un tecnicismo náutico.
- source_word: ἀνήχθημεν
  english_pob_choice: set sail
  chosen_spanish: partimos
  alternatives_spanish:
  - zarpamos
  - nos hicimos a la mar
  lexicon: BDAG
  rationale: En contexto náutico, el verbo indica el inicio de la travesía por mar. «Partimos» comunica el movimiento de salida de modo claro y digno en español, sin añadir una imagen demasiado idiomática que desplace el foco narrativo.
- source_word: ἐπὶ τὴν Ἆσσον
  english_pob_choice: for Assos
  chosen_spanish: para Asón
  alternatives_spanish:
  - a Asón
  - rumbo a Asón
  lexicon: BDAG
  rationale: Con un verbo de navegación, la preposición de destino puede expresarse con «para» en español. Se conserva el topónimo transliterado de forma breve y reconocible.
- source_word: μέλλοντες ἀναλαμβάνειν
  english_pob_choice: intending to take ... on board
  chosen_spanish: con intención de recoger allí a Pablo
  alternatives_spanish:
  - con intención de tomar allí a Pablo a bordo
  - dispuestos a recibir allí a Pablo en la nave
  lexicon: BDAG
  rationale: Aquí μέλλω expresa intención, no mera inmediatez. ἀναλαμβάνειν en este contexto de viaje puede rendirse como «recoger», que en español comunica bien tomar a alguien nuevamente consigo en el trayecto marítimo.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: allí
  alternatives_spanish:
  - desde allí
  - de allí
  lexicon: BDAG
  rationale: El adverbio indica el punto de partida para recoger a Pablo. «Allí» funciona naturalmente en la frase española, con el sentido de procedencia ya implícito por el contexto.
- source_word: διατεταγμένος ἦν
  english_pob_choice: he had arranged
  chosen_spanish: había sido dispuesto
  alternatives_spanish:
  - él había dispuesto
  - había sido arreglado
  lexicon: BDAG
  rationale: La forma es pasiva en griego, pero el contexto sugiere una instrucción o arreglo previo relacionado con Pablo. «Había sido dispuesto» preserva la tensión pasiva sin decidir de forma cerrada por el sujeto, dejando visible la posibilidad de la lectura impersonal.
- source_word: μέλλων αὐτὸς πεζεύειν
  english_pob_choice: since he himself intended to go by land
  chosen_spanish: pues él mismo tenía intención de ir por tierra
  alternatives_spanish:
  - porque él mismo pensaba ir por tierra
  - ya que él mismo iba a viajar por tierra
  lexicon: BDAG
  rationale: πεζεύειν contrasta el viaje terrestre con la navegación del grupo. «Ir por tierra» es una forma natural en español y conserva el contraste; «él mismo» refleja el énfasis de αὐτός.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una leve transición contrastiva. «Pero» reproduce mejor ese matiz que una simple coordinación neutra.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje tal como está atestiguado en SBLGNT y armoniza con la solución inglesa auditada: mantiene el contraste marítimo/terrestre, conserva la ambigüedad pasiva de διατεταγμένος ἦν con nota explicativa, y traduce el participio de intención de modo natural en español sin perder la secuencia narrativa.'
  spanish_consistency_notes:
  - Se usa «Pablo» como forma estable del nombre propio.
  - Se prefiere «nave» frente a «barco» para evitar una rusticidad innecesaria y mantener un registro bíblico sobrio.
  - «Por tierra» mantiene la oposición con el viaje por mar implícita en πεζεύειν.
  - No se introduce terminología eclesiástica ajena al texto; la redacción se ciñe al relato de viaje.
