  to: Pero nosotros, habiendo ido delante a la nave, zarpamos para Asón, con la intención de tomar a Pablo a bordo desde allí, porque así él lo había dispuesto[a], ya que él mismo tenía intención de ir por tierra[b].
  rationale: 'Se corrigen varios puntos para reflejar mejor el griego y el expediente inglés: «a la nave» en vez de «hasta la nave»; «zarpamos» para el verbo náutico; «desde allí» para ἐκεῖθεν; «tomar a Pablo a bordo» para hacer explícito el contexto marítimo; y una redacción principal personal («él lo había dispuesto») para la perífrasis pasiva contextualizada, dejando la alternativa formal pasiva en nota. También se reubican los marcadores de notas a los segmentos que realmente comentan.'
