translation:
  language: es
  text: Por tanto, les testifico en este día que soy inocente de la sangre de todos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpio de la sangre de todos»; el giro griego se refiere a estar libre de culpa o responsabilidad respecto de otros.
    reason: lexical_alternative
  - marker: b
    text: Esta expresión probablemente evoca la imagen del centinela y la culpa de sangre en Ezequiel (p. ej., Ez 3:18–19; 33:6–9).
    reason: cross_reference
lexical_decisions:
- source_word: διότι
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Introduce una conclusión inferida del contexto anterior. «Por tanto» conserva el vínculo discursivo y el tono solemne sin sonar mecánico.
- source_word: μαρτύρομαι
  english_pob_choice: I testify
  chosen_spanish: les doy testimonio
  alternatives_spanish:
  - testifico a ustedes
  - doy testimonio ante ustedes
  lexicon: BDAG
  rationale: Expresa una declaración solemne y personal. En español, «dar testimonio» suena natural y conserva la fuerza casi jurídica del verbo.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - ante ustedes
  lexicon: BDAG
  rationale: El dativo receptor se expresa de manera natural con el objeto indirecto plural «les», manteniendo la referencia directa a los oyentes.
- source_word: ἐν τῇ σήμερον ἡμέρᾳ
  english_pob_choice: on this day
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - en este mismo día
  lexicon: BDAG
  rationale: El idiomatismo semítico/solemne puede sonar forzado como «en este día»; «hoy» comunica el valor temporal actual con naturalidad en español, sin perder el énfasis testimonial.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Tras «doy testimonio», el español suele introducir el contenido con «de que»; evita dureza sintáctica y sigue fielmente la subordinación del griego.
- source_word: καθαρός
  english_pob_choice: innocent
  chosen_spanish: limpio
  alternatives_spanish:
  - inocente
  - libre de culpa
  lexicon: BDAG
  rationale: 'Se preserva la imagen lexical que el audit trail inglés dejó abierta: el sentido básico de «limpio» y la posible lectura idiomática de ausencia de culpa. En español, «limpio de la sangre» reproduce mejor la ambigüedad controlada del griego que «inocente», que interpretaría más explícitamente el valor forense.'
- source_word: ἀπὸ τοῦ αἵματος
  english_pob_choice: of the blood
  chosen_spanish: de la sangre
  alternatives_spanish:
  - libre de la sangre
  - sin culpa de la sangre
  lexicon: BDAG
  rationale: Se mantiene el giro idiomático de sangre/guilt sin explicitar demasiado el significado. «De la sangre» conserva la construcción y permite que el lector perciba la resonancia bíblica.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todos los hombres
  - de todos ellos
  lexicon: BDAG
  rationale: La amplitud del genitivo plural se conserva con «todos», sin restringir el alcance más de lo que exige el texto.
theological_decisions:
- issue: Idiom of bloodguilt / watchman responsibility
  english_pob_reading: An idiom of freedom from guilt/responsibility for others because Paul fully discharged his duty to warn and teach them.
  chosen_spanish_reading: Un modismo de limpieza/liberación de culpa o responsabilidad respecto de otros, sin reducirlo a una simple referencia a muerte física.
  alternative_spanish_readings:
  - Una inocencia literal respecto de derramamiento de sangre
  - Una pureza moral general sin relación con responsabilidad
  rationale: La redacción «estoy limpio de la sangre de todos» conserva la alusión a sangre/culpa y deja visible la conexión con el lenguaje profético de responsabilidad del centinela, sin convertirlo en paráfrasis explicativa.
  doctrine_reference: Ezequiel 3:18–19; 33:6–9
- issue: Solemne testimonial force of the sentence
  english_pob_reading: Paul speaks with a formal, accountable declaration before his hearers.
  chosen_spanish_reading: La frase suena a declaración solemne y responsable ante los oyentes.
  alternative_spanish_readings:
  - Una afirmación meramente informativa
  - Una protesta defensiva
  rationale: «Les doy testimonio hoy» mantiene el carácter declarativo y forense del pasaje, evitando rebajar la solemnidad del original.
  doctrine_reference: Hechos 20:20–27
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando un único marcador de nota en el texto principal, anclado exactamente en la frase correspondiente. No se incluyen notas sueltas ni marcadores no utilizados.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene un registro sobrio y público, adecuado para discurso apostólico.
  - La nota a pie de página evita perder la tensión entre «limpio» e «inocente» presente en el audit trail inglés.
