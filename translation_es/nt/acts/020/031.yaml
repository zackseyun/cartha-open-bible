translation:
  language: es
  text: Por tanto, manténganse alerta[a], recordando que por tres años, noche y día, no cesé de amonestar con lágrimas a cada uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «advertir a cada uno». El verbo griego puede destacar tanto la advertencia correctiva como la instrucción exhortativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Introduce una conclusión inferencial a partir de la advertencia anterior. «Por tanto» comunica bien la relación lógica y suena natural en español bíblico contemporáneo sin perder el valor conclusivo.
- source_word: γρηγορεῖτε
  english_pob_choice: stay alert
  chosen_spanish: manténganse alerta
  alternatives_spanish:
  - estén vigilantes
  - permanezcan vigilantes
  - manténganse despiertos
  lexicon: BDAG
  rationale: El imperativo presente exige vigilancia continua. «Manténganse alerta» preserva la idea de atención sostenida y evita un calco demasiado literal o demasiado coloquial.
- source_word: μνημονεύοντες
  english_pob_choice: remembering
  chosen_spanish: recordando
  alternatives_spanish:
  - teniendo presente
  - recordando en la mente
  - acuérdense
  lexicon: BDAG
  rationale: 'El participio expresa la manera o medio por el cual deben permanecer alerta: al traer a la memoria el ejemplo de Pablo. «Recordando» mantiene la relación participial y es natural en español.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que deben recordar. «Que» es la equivalencia más directa y clara en español.
- source_word: τριετίαν
  english_pob_choice: for three years
  chosen_spanish: por tres años
  alternatives_spanish:
  - durante tres años
  - por un período de tres años
  lexicon: BDAG
  rationale: Es un acusativo de duración. «Por tres años» expresa con naturalidad la extensión temporal de la acción.
- source_word: νύκτα καὶ ἡμέραν
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - día y noche
  lexicon: BDAG
  rationale: Se conserva el orden griego para mantener el énfasis e idiomatismo de actividad continua.
- source_word: οὐκ ἐπαυσάμην
  english_pob_choice: I did not stop
  chosen_spanish: no cesé
  alternatives_spanish:
  - no dejé de
  - nunca cesé
  - no me detuve
  lexicon: BDAG
  rationale: El aoristo medio con negación indica que Pablo no interrumpió esa actividad. «No cesé» es breve, fiel y compatible con el tono solemne del pasaje.
- source_word: μετὰ δακρύων
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - entre lágrimas
  - llorando
  lexicon: BDAG
  rationale: La preposición con genitivo expresa acompañamiento. «Con lágrimas» conserva la imagen concreta y la carga emocional del ministerio de Pablo.
- source_word: νουθετῶν
  english_pob_choice: admonishing
  chosen_spanish: amonestar
  alternatives_spanish:
  - advertir
  - amonestar y corregir
  - dar advertencias
  lexicon: BDAG
  rationale: νουθετέω incluye exhortación correctiva y advertencia pastoral. «Amonestar» transmite mejor ese sentido que un simple «instruir»; además, en español conserva el peso moral del verbo sin diluir la corrección implícita.
- source_word: ἕνα ἕκαστον
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a cada uno de ellos
  - a cada individuo
  lexicon: BDAG
  rationale: La expresión distributiva subraya atención individual. «A cada uno» comunica esa distribución con naturalidad; se evita sobreespecificar con «de ustedes» porque el griego no lo explicita en la frase.
theological_decisions:
- issue: Alcance pastoral de νουθετῶν
  english_pob_reading: admonishing
  chosen_spanish_reading: amonestar
  alternative_spanish_readings:
  - advertir
  - instruir
  rationale: El pasaje presenta el ministerio de Pablo como una exhortación personal, afectuosa y correctiva, no solo informativa. «Amonestar» conserva tanto la dimensión pastoral como la corrección moral implícita.
  doctrine_reference: 'Principio de la POB: preservar el sentido llano del texto fuente sin aplanar su peso pastoral.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto inglés: no se requieren cambios textuales respecto al sentido auditado, y se mantiene la fuerza exhortativa y afectiva del versículo.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se mantuvo «amonestar» para νουθετέω, en línea con la decisión inglesa de preservar el valor correctivo del verbo.
  - «Manténganse alerta» traduce el imperativo de vigilancia continua sin introducir matices ajenos al griego.
  - «Con lágrimas» conserva la imagen física y emocional del texto sin reformularla como adverbio abstracto.
