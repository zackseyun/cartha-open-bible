translation:
  language: es
  text: sirviendo al Señor con toda humildad, con lágrimas y con pruebas que me sobrevinieron por las conspiraciones de los judíos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tentaciones' o 'pruebas'; aquí el sentido es de adversidades externas surgidas por la oposición.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las conspiraciones de opositores judíos concretos contra Pablo, no una afirmación acerca de todos los judíos.
    reason: cultural_note
lexical_decisions:
- source_word: δουλεύων
  english_pob_choice: serving
  chosen_spanish: sirviendo
  alternatives_spanish:
  - esclavizado
  - siendo siervo
  - prestando servicio
  lexicon: BDAG
  rationale: El participio presente describe la manera continua de su ministerio. En este contexto, 'sirviendo' comunica servicio dedicado de forma natural en español, sin perder la idea de entrega que contiene el verbo griego.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  lexicon: BDAG
  rationale: κύριος se vierte con el equivalente reverente y natural 'Señor'. En Hechos, esto encaja con el habla paulina sobre su ministerio, sin sobreespecificar en el texto español.
- source_word: μετὰ πάσης ταπεινοφροσύνης
  english_pob_choice: with all humility
  chosen_spanish: con toda humildad
  alternatives_spanish:
  - con completa humildad
  - con toda bajeza
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento o manera, y πάσης intensifica el sustantivo. 'Con toda humildad' conserva bien la fuerza totalizadora y suena natural en español.
- source_word: δακρύων
  english_pob_choice: tears
  chosen_spanish: lágrimas
  alternatives_spanish:
  - llanto
  lexicon: BDAG
  rationale: El plural concreto se traduce literalmente como 'lágrimas' para mantener la vividez emocional del texto griego.
- source_word: πειρασμῶν
  english_pob_choice: trials
  chosen_spanish: pruebas
  alternatives_spanish:
  - tentaciones
  - ensayos
  lexicon: BDAG
  rationale: Aquí el contexto apunta a adversidades externas ligadas a oposición hostil, no a incitación interna al pecado. 'Pruebas' comunica bien ese sentido en español, aunque 'tentaciones' siga siendo una alternativa semántica posible.
- source_word: τῶν συμβάντων μοι
  english_pob_choice: that happened to me
  chosen_spanish: que me sobrevinieron
  alternatives_spanish:
  - que me sucedieron
  - que me acontecieron
  lexicon: BDAG
  rationale: El participio con artículo especifica las pruebas como las que le ocurrieron a Pablo. 'Que me sobrevinieron' refleja con precisión y naturalidad la idea de eventos que le tocaron o le vinieron encima.
- source_word: ἐν ταῖς ἐπιβουλαῖς
  english_pob_choice: through the plots
  chosen_spanish: por las conspiraciones
  alternatives_spanish:
  - por las intrigas
  - a causa de las conspiraciones
  - en medio de las conspiraciones
  lexicon: BDAG
  rationale: En este contexto, ἐν puede tener fuerza instrumental o de circunstancia. 'Por las conspiraciones' comunica con claridad en español que esas maquinaciones fueron el medio/circunstancia de las pruebas.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los líderes judíos
  - de los judeanos
  lexicon: BDAG
  rationale: Se conserva el etnónimo directo del griego. No se amplía ni se restringe en el texto principal más allá de lo que el pasaje dice; la referencia contextual queda aclarada en la nota.
theological_decisions:
- issue: Posible lectura antijudía de 'de los judíos'
  english_pob_reading: Retain 'the Jews' as the direct rendering of τῶν Ἰουδαίων, understood contextually as the particular Jewish opponents plotting against Paul.
  chosen_spanish_reading: Mantener 'de los judíos' como traducción directa, entendida en contexto como los opositores concretos que tramaban contra Pablo.
  alternative_spanish_readings:
  - de los líderes judíos
  - de los judeanos
  rationale: El griego nombra explícitamente a Ἰουδαίων, y la equivalencia óptima favorece conservar ese término en el texto principal. La nota aclara que se trata de un grupo específico implicado en conspiraciones contra Pablo, no de todos los judíos.
  doctrine_reference: Principio de primacía del idioma original y rechazo de inferencias que el texto no afirma
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al coordinar explícitamente las tres circunstancias con 'con' delante de 'lágrimas', manteniendo la relación de acompañamiento y la fuerza del original griego.
  spanish_consistency_notes:
  - Se eligió 'Señor' para κύριος conforme al uso reverente estándar y al registro bíblico en español.
  - '''Pruebas'' se usa para πειρασμῶν por el contexto de hostilidad externa; se preserva en nota la alternativa ''tentaciones''.'
  - '''De los judíos'' mantiene el etnónimo sin generalizar; la nota limita el referente al grupo opositor concreto.'
  - El orden de los complementos busca claridad en español sin alterar la secuencia semántica del griego.
