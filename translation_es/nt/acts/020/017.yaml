translation:
  language: es
  text: Ahora, desde Mileto, envió a Éfeso y mandó llamar[a] a los ancianos de la iglesia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envió por los ancianos de la iglesia». El griego combina «envió a Éfeso» con «mandó llamar», indicando que despachó un mensaje o mensajeros para pedir su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς Μιλήτου
  english_pob_choice: Now from Miletus
  chosen_spanish: Ahora, desde Mileto
  alternatives_spanish:
  - Y desde Mileto
  - Desde Mileto
  lexicon: BDAG
  rationale: Ἀπό con genitivo indica procedencia o punto de partida; «desde» conserva mejor ese valor en español. Δέ es una partícula leve de conexión, y «Ahora» comunica el flujo discursivo natural sin forzar contraste.
- source_word: πέμψας
  english_pob_choice: he sent to
  chosen_spanish: envió
  alternatives_spanish:
  - habiendo enviado
  - mandó
  lexicon: BDAG
  rationale: El participio aoristo se integra en español dentro de la acción principal para mantener naturalidad. El contexto exige que Pablo despachó un mensaje o mensajeros a Éfeso; «envió» conserva esa relación sin sobrecargar la sintaxis.
- source_word: εἰς Ἔφεσον
  english_pob_choice: to Ephesus
  chosen_spanish: a Éfeso
  alternatives_spanish:
  - hacia Éfeso
  - para Éfeso
  lexicon: BDAG
  rationale: Con nombre de ciudad, εἰς expresa destino. «A Éfeso» es la forma más natural y fiel en español.
- source_word: μετεκαλέσατο
  english_pob_choice: called for
  chosen_spanish: llamó
  alternatives_spanish:
  - mandó llamar
  - convocó
  - llamó para sí
  lexicon: BDAG
  rationale: El medio de μετακαλέομαι puede implicar pedir que alguien venga o enviar por él. En español, «llamó» mantiene la brevedad del griego y, con el contexto, deja abierta la idea de que pidió su presencia. La nota explica la alternativa más explícita.
- source_word: τοὺς πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los mayores
  lexicon: BDAG
  rationale: En Hechos, πρεσβύτεροι designa líderes reconocidos de la comunidad; «ancianos» preserva el sentido léxico y evita una transliteración técnica innecesaria. «Presbíteros» suena más eclesiástico-tradicional que el griego y menos transparente para lectores generales.
- source_word: τῆς ἐκκλησίας
  english_pob_choice: of the church
  chosen_spanish: de la iglesia
  alternatives_spanish:
  - de la asamblea
  - de la congregación
  lexicon: BDAG
  rationale: ἐκκλησία en Lucas-Hechos suele referirse a la comunidad cristiana; «iglesia» es la equivalencia española estable y clara. No se introduce una estructura denominacional ajena al texto.
theological_decisions:
- issue: Valor de πρεσβύτεροι como cargo o función comunitaria
  english_pob_reading: church leaders designated as 'elders'
  chosen_spanish_reading: líderes de la comunidad designados como «ancianos»
  alternative_spanish_readings:
  - hombres mayores de la congregación
  - presbíteros como término técnico
  rationale: El contexto narrativo muestra que Pablo se dirige a responsables de la iglesia de Éfeso, no simplemente a hombres de mayor edad. «Ancianos» preserva el vínculo con el término griego y mantiene la tensión con posibles lecturas más descriptivas o más técnicas.
  doctrine_reference: Translation philosophy §§1, 5; uso de πρεσβύτεροι en Hechos
- issue: Relación entre πέμψας y μετεκαλέσατο
  english_pob_reading: The Greek combines 'sent to Ephesus' with 'called for,' indicating that he dispatched a message or messengers requesting their presence.
  chosen_spanish_reading: «envió a Éfeso» y «llamó» como acciones relacionadas en una sola secuencia narrativa
  alternative_spanish_readings:
  - «mandó llamar»
  - «envió a Éfeso y convocó»
  - «habiendo enviado a Éfeso, llamó»
  rationale: El griego combina un participio aoristo con el verbo principal; el español puede reproducir la secuencia con naturalidad sin perder la idea de que se trató de una gestión de convocatoria. La nota de pie de página conserva la alternativa interpretativa de «mandó llamar» o «envió por».
  doctrine_reference: Principios de equivalencia óptima y transparencia lexical
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del audit trail: mantiene la secuencia verbal del griego, conserva el valor relacional de ἀπό/εἰς con un español natural, y evita suavizar πρεσβύτεροι o ἐκκλησία con términos menos transparentes. No se detectaron revisiones pendientes en el registro inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - «Iglesia» se reserva para ἐκκλησία en contexto cristiano, en línea con el estándar del proyecto.
  - «Ancianos» se prefiere aquí a «presbíteros» por transparencia léxica y por coherencia con el audit trail inglés.
