translation:
  language: es
  text: Y Sópater, hijo de Pirro, de Berea, lo acompañaba; y Aristarco y Segundo, de Tesalónica[a]; y Gayo, de Derbe, y Timoteo; y Tíquico y Trófimo, de Asia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de entre los tesalonicenses» para Aristarco y Segundo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, de la provincia romana de Asia, no del continente moderno.
    reason: cultural_note
lexical_decisions:
- source_word: συνείπετο
  english_pob_choice: accompanied
  chosen_spanish: lo acompañaba
  alternatives_spanish:
  - acompañaba
  - iba con él
  lexicon: BDAG
  rationale: El imperfecto medio indica acción acompañante en curso. En español, «lo acompañaba» comunica bien la relación de viaje y conserva el matiz progresivo sin forzar una paráfrasis.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - con él
  lexicon: BDAG
  rationale: El dativo se entiende naturalmente como complemento de «acompañaba»; el clítico en español da una construcción fluida y directa.
- source_word: Σώπατρος Πύρρου Βεροιαῖος
  english_pob_choice: Sopater son of Pyrrhus, a Berean
  chosen_spanish: Sopater, hijo de Pirro, bereano
  alternatives_spanish:
  - Sopater, hijo de Pirro, de Berea
  - Sopater el bereano, hijo de Pirro
  lexicon: BDAG
  rationale: Πύρρου es con naturalidad un patronímico, por eso «hijo de Pirro». Βεροιαῖος señala procedencia o identidad regional; «bereano» es la forma más breve y clara en español.
- source_word: Θεσσαλονικέων
  english_pob_choice: from Thessalonica / from the Thessalonians
  chosen_spanish: de Tesalónica
  alternatives_spanish:
  - de los tesalonicenses
  - entre los tesalonicenses
  lexicon: BDAG
  rationale: El genitivo plural agrupa a Aristarco y Segundo por origen. En español, «de Tesalónica» es la forma más natural y mantiene la referencia geográfica sin ambigüedad.
- source_word: Γάϊος Δερβαῖος
  english_pob_choice: Gaius of Derbe
  chosen_spanish: Gayo, de Derbe
  alternatives_spanish:
  - Gayo el derbeño
  - Gayo de la ciudad de Derbe
  lexicon: BDAG
  rationale: Δερβαῖος funciona como descriptor geográfico/étnico. «De Derbe» conserva la procedencia y evita un neologismo menos transparente.
- source_word: Ἀσιανοὶ
  english_pob_choice: from Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - asiáticos
  - de la provincia de Asia
  lexicon: BDAG
  rationale: Aquí se refiere a la provincia romana de Asia, no al continente moderno. «De Asia» reproduce la designación del texto con una nota aclaratoria para evitar malentendidos.
- source_word: Τυχικὸς καὶ Τρόφιμος
  english_pob_choice: Tychicus and Trophimus
  chosen_spanish: Tíquico y Trófimo
  alternatives_spanish:
  - Tíquico y Trophimo
  lexicon: BDAG
  rationale: Se usan transliteraciones usuales en español bíblico para estos nombres propios.
theological_decisions:
- issue: Referencia geográfica de «Asia»
  english_pob_reading: That is, from the Roman province of Asia, not the modern continent.
  chosen_spanish_reading: «De Asia» se entiende como la provincia romana de Asia, no el continente moderno.
  alternative_spanish_readings:
  - «asiáticos»
  - «de la provincia de Asia»
  rationale: La nota evita una lectura anacrónica y preserva el dato histórico-geográfico del texto fuente.
  doctrine_reference: Hechos 20:4; geografía histórica del NT
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al colocar las frases de procedencia después de los nombres para mayor fluidez («Aristarco y Segundo, de Tesalónica»; «Tíquico y Trófimo, de Asia»), manteniendo todos los elementos del griego y la distinción geográfica de Ἀσιανοὶ.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial como coordinación narrativa equivalente al δέ sucesivo del griego.
  - Se usa «Sopater» como forma estándar del nombre propio, con patronímico «hijo de Pirro».
  - «Bereano» se conserva como adjetivo de procedencia/identidad regional, en línea con el griego Βεροιαῖος.
  - No se traduce «Asia» por «asiáticos» para evitar una lectura continental indebida.
