  yaml_path: translation/nt/acts/020/004.yaml
  text: And Sopater son of Pyrrhus[a], a Berean, accompanied him; and Aristarchus and Secundus from Thessalonica; and Gaius of Derbe, and Timothy[b]; and Tychicus and Trophimus from Asia.
