  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Lobos feroces», «partida» y «rebaño» están bien alineados con las decisiones léxicas y teológicas documentadas. El ajuste propuesto para μὴ φειδόμενοι mejora la fidelidad semántica sin afectar ninguna convención glosaria.
