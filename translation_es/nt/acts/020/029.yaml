translation:
  language: es
  text: Sé que después de mi partida[a] entrarán entre ustedes lobos feroces[b], sin perdonar al rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «después de mi llegada/venida»; en el contexto, el sentido es «después de mi partida».
    reason: lexical_alternative
  - marker: b
    text: O «salvajes». El adjetivo griego puede transmitir severidad violenta, opresiva o brutal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Yo sé
  - Estoy seguro
  lexicon: BDAG
  rationale: El verbo expresa conocimiento cierto y personal. En español, «sé» es la forma más natural y directa, sin añadir énfasis innecesario.
- source_word: εἰσελεύσονται
  english_pob_choice: will come in
  chosen_spanish: entrarán entre ustedes
  alternatives_spanish:
  - vendrán entre ustedes
  - entrarán en medio de ustedes
  lexicon: BDAG
  rationale: La idea es de intrusión en la comunidad. «Entrarán entre ustedes» conserva el movimiento hacia adentro y suena natural en español bíblico contemporáneo.
- source_word: μετὰ τὴν ἄφιξίν μου
  english_pob_choice: after my departure
  chosen_spanish: después de mi partida
  alternatives_spanish:
  - después de que yo me vaya
  - después de mi salida
  lexicon: BDAG
  rationale: Aunque ἄφιξις puede significar llegada o venida, el contexto exige el momento en que Pablo ya no esté con ellos. «Partida» refleja esa fuerza contextual en español.
- source_word: λύκοι βαρεῖς
  english_pob_choice: fierce wolves
  chosen_spanish: lobos feroces
  alternatives_spanish:
  - lobos salvajes
  - lobos crueles
  - lobos fieros
  lexicon: BDAG
  rationale: βαρεῖς puede llevar la idea de severidad violenta u opresiva. «Feroces» comunica bien la imagen depredadora sin explicarla en exceso ni suavizarla.
- source_word: εἰς ὑμᾶς
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - a ustedes
  lexicon: BDAG
  rationale: La preposición con la imagen de lobos que invaden un rebaño indica penetración en la comunidad. «Entre ustedes» comunica esa intrusión de manera clara en español.
- source_word: μὴ φειδόμενοι
  english_pob_choice: not sparing
  chosen_spanish: no teniendo compasión
  alternatives_spanish:
  - sin perdonar
  - no perdonando
  - sin piedad
  lexicon: BDAG
  rationale: El participio describe una conducta despiadada hacia el rebaño. «No teniendo compasión» comunica la falta de misericordia en un español natural; mantiene la severidad del griego.
- source_word: τοῦ ποιμνίου
  english_pob_choice: the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - del rebaño de ovejas
  - de la grey
  lexicon: BDAG
  rationale: ποίμνιον es la imagen pastoral del grupo cuidado por el pastor. «Rebaño» preserva la metáfora bíblica y resulta claro para lectores actuales.
theological_decisions:
- issue: Preservación de la metáfora de los lobos
  english_pob_reading: Retain the metaphor 'fierce wolves' rather than interpret it in the main text as false teachers or persecutors.
  chosen_spanish_reading: Conservar la metáfora «lobos feroces» sin explicarla en el texto principal.
  alternative_spanish_readings:
  - falsos maestros
  - hombres destructores
  - perseguidores
  rationale: El griego usa la imagen de lobos y no identifica explícitamente a las figuras dentro de este versículo. Mantener la metáfora preserva su fuerza retórica y evita estrechar indebidamente el sentido.
  doctrine_reference: Translation philosophy items 1 y 3
- issue: Sentido contextual de ἄφιξις
  english_pob_reading: Translate as 'departure' rather than the more common lexical sense 'arrival.'
  chosen_spanish_reading: Traducir como «partida» y no como «llegada».
  alternative_spanish_readings:
  - llegada
  - venida
  - salida
  rationale: Aunque la palabra puede significar llegada, el contexto habla de lo que ocurrirá cuando Pablo ya no esté presente. «Partida» expresa ese sentido contextual con naturalidad y precisión.
  doctrine_reference: Translation philosophy item 1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y coincide con la decisión revisada del POB en inglés: conservar la metáfora de los lobos, traducir ἄφιξις según el contexto como ''departure/partida'', y mantener la intrusión en la comunidad con un verbo de entrada natural en español. No hay cambios aplicados en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
  - «Entre ustedes» conserva la imagen de intrusión comunitaria mejor que un simple «a ustedes».
  - «Rebaño» sostiene la metáfora pastoral sin cambiar a un término más técnico o eclesiástico.
  - Las notas a y b se anclan en el segmento correspondiente para preservar la trazabilidad textual.
