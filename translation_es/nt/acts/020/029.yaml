- from: Sé que después de mi partida entrarán entre ustedes lobos feroces[a][b], no teniendo compasión del rebaño.
  to: Sé que después de mi partida[a] entrarán entre ustedes lobos feroces[b], sin perdonar al rebaño.
  rationale: Se conserva la estructura y las decisiones principales del borrador, pero se sustituye «no teniendo compasión» por «sin perdonar» para representar mejor μὴ φειδόμενοι y producir un español más natural y más cercano al POB inglés («not sparing»). También se reubican los marcadores de nota para que cada uno quede anclado al término correspondiente.
