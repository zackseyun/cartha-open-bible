source:
  edition: SBLGNT
  text: πάντα ὑπέδειξα ὑμῖν ὅτι οὕτως κοπιῶντας δεῖ ἀντιλαμβάνεσθαι τῶν ἀσθενούντων, μνημονεύειν τε τῶν λόγων τοῦ κυρίου Ἰησοῦ ὅτι αὐτὸς εἶπεν Μακάριόν ἐστιν μᾶλλον διδόναι ἢ λαμβάνειν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/020/035.yaml
  text: In everything I showed you that by laboring in this way it is necessary to help the weak[a], and to remember the words of the Lord Jesus, that he himself said, ‘It is more blessed to give than to receive.’
  footnotes:
