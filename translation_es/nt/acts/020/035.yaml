translation:
  language: es
  text: 'En todo les mostré que, trabajando así, es necesario ayudar a los débiles[a], y recordar las palabras del Señor Jesús, que él mismo dijo: «Es más bienaventurado dar que recibir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sostener a los débiles». El verbo griego puede implicar una asistencia sostenida, no solo una ayuda momentánea.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: In everything
  chosen_spanish: En todo
  alternatives_spanish:
  - En todas las cosas
  - En todo sentido
  lexicon: BDAG
  rationale: Se toma adverbialmente con ὑπέδειξα, como en la base inglesa. «En todo» es natural en español y conserva la amplitud de la declaración sin convertirlo en objeto directo.
- source_word: ὑπέδειξα
  english_pob_choice: I showed
  chosen_spanish: les mostré
  alternatives_spanish:
  - les demostré
  - les puse como ejemplo
  lexicon: BDAG
  rationale: El verbo comunica mostrar o señalar por ejemplo. «Les mostré» es directo y fluido; la idea ejemplar queda reforzada por el contexto de la conducta de Pablo.
- source_word: κοπιῶντας
  english_pob_choice: by laboring
  chosen_spanish: trabajando
  alternatives_spanish:
  - esforzándome
  - trabajando con empeño
  - fatigándome
  lexicon: BDAG
  rationale: El participio expresa esfuerzo intenso. «Trabajando» es el equivalente más natural; el adverbio «así» mantiene el modo descrito por el griego.
- source_word: δεῖ
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - se debe
  - es preciso
  lexicon: BDAG
  rationale: Expresa necesidad u obligación sin añadir sujeto explícito. «Es necesario» conserva esa fuerza normativa de forma clara en español.
- source_word: ἀντιλαμβάνεσθαι
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - sostener
  - apoyar
  - venir en ayuda de
  lexicon: BDAG
  rationale: En este contexto el verbo implica asistir o sostener a otros. «Ayudar» es claro y natural; se conserva la posibilidad de una asistencia más sostenida en la nota.
- source_word: τῶν ἀσθενούντων
  english_pob_choice: the weak
  chosen_spanish: a los débiles
  alternatives_spanish:
  - a los que son débiles
  - a los necesitados
  - a los frágiles
  lexicon: BDAG
  rationale: El participio puede abarcar debilidad física, material o social. «Los débiles» mantiene esa amplitud y evita restringir el alcance del texto.
- source_word: μνημονεύειν τε
  english_pob_choice: and to remember
  chosen_spanish: y recordar
  alternatives_spanish:
  - y tener presentes
  - y no olvidar
  lexicon: BDAG
  rationale: El infinitivo coordinado se traduce con una coordinación simple. «Recordar» preserva el llamado a mantener viva la enseñanza de Jesús.
- source_word: τῶν λόγων
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las expresiones
  lexicon: BDAG
  rationale: λόγοι aquí remite a la formulación recordada de Jesús. «Palabras» es la opción más directa y comprensible en español.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Señor Jesús Cristo
  - de Jesús, el Señor
  lexicon: BDAG
  rationale: Se conserva «Señor» para κύριος y el nombre propio Jesús. Esta combinación refleja el título cristológico sin reemplazarlo por una formulación más eclesiástica que el griego no exige.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - el mismo
  lexicon: BDAG
  rationale: El pronombre es enfático. «Él mismo» preserva ese énfasis, subrayando que la cita viene directamente de Jesús.
- source_word: Μακάριόν ἐστιν
  english_pob_choice: It is more blessed
  chosen_spanish: Más bienaventurado es
  alternatives_spanish:
  - Es más bendecido
  - Más feliz es
  lexicon: BDAG
  rationale: μακάριος expresa bienaventuranza/estado de bendición, no simple felicidad emocional. «Bienaventurado» mantiene ese peso bíblico y teológico en español.
- source_word: μᾶλλον
  english_pob_choice: more
  chosen_spanish: Más
  alternatives_spanish:
  - más bien
  - antes
  lexicon: BDAG
  rationale: Se usa en la comparación entre dar y recibir. «Más» conserva la estructura comparativa de forma natural.
- source_word: διδόναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - obsequiar
  lexicon: BDAG
  rationale: Verbo básico y exacto para el infinitivo griego. «Dar» es la equivalencia más directa en español.
- source_word: ἢ λαμβάνειν
  english_pob_choice: than to receive
  chosen_spanish: que recibir
  alternatives_spanish:
  - que tomar
  - que aceptar
  lexicon: BDAG
  rationale: En este dicho ético, λαμβάνειν contrasta mejor como «recibir» que como «tomar». La comparación queda natural en español y respeta el sentido del original.
theological_decisions:
- issue: Alcance de «los débiles»
  english_pob_reading: Rendered broadly as 'the weak' without specifying physical weakness, poverty, or spiritual weakness.
  chosen_spanish_reading: Se mantiene «los débiles» sin precisar si se trata de debilidad física, material o social.
  alternative_spanish_readings:
  - los pobres
  - los enfermos
  - los débiles espirituales
  rationale: El participio griego es semánticamente amplio. Traducirlo de manera general preserva la tensión interpretativa y evita imponer una concreción que el texto no exige.
  doctrine_reference: Conservar la amplitud semántica del original sin resolverla prematuramente.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el paquete inglés; la lectura permanece estable en la última pasada, con acuerdo moderado y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Señor Jesús» para κύριος Ἰησοῦς, coherente con la terminología del proyecto.
  - Se usa «bienaventurado» para μακάριος, preservando su sentido bíblico-teológico y evitando reducirlo a felicidad psicológica.
  - «Ayudar a los débiles» refleja la lectura amplia de ἀσθενούντων y deja visible la alternativa de apoyo sostenido indicada por la nota.
