translation:
  language: es
  text: Porque no rehuí declararles[a] todo el consejo de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el propósito de Dios», «todo el plan de Dios» o «toda la voluntad de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ ὑπεστειλάμην
  english_pob_choice: For I did not shrink back
  chosen_spanish: Porque no rehuí
  alternatives_spanish:
  - Porque no retrocedí
  - Porque no me eché atrás
  - Porque no me contuve
  lexicon: BDAG
  rationale: ὑποστέλλω en este contexto expresa retirarse, replegarse o evitar una acción. En español, «rehuí» comunica bien la idea de no apartarse por temor o cautela indebida y conserva la fuerza directa del verbo sin sonar artificial. Se evita una paráfrasis más débil como «hesité».
- source_word: τοῦ μὴ ἀναγγεῖλαι
  english_pob_choice: from declaring
  chosen_spanish: de declararos
  alternatives_spanish:
  - de anunciaros
  - de proclamaros
  - para no declararos
  lexicon: BDAG
  rationale: La construcción infinitiva articular con μή funciona como complemento de la acción evitada. En español, «de declararos» reproduce de forma natural el complemento verbal y mantiene el sentido solemne de ἀναγγέλλω como declarar/ anunciar. El dativo ὑμῖν se integra con el pronombre enclítico «-os» para conservar la dirección personal.
- source_word: πᾶσαν
  english_pob_choice: the whole
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - completo
  - la totalidad de
  lexicon: BDAG
  rationale: Con βουλήν en singular, πᾶσαν intensifica la totalidad. «Todo el» es la forma española más natural para expresar la plenitud del contenido comunicado.
- source_word: βουλὴν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - propósito
  - plan
  - voluntad
  lexicon: BDAG
  rationale: Se conserva «consejo» para reflejar la elección POB de counsel y evitar reducir βουλή a una sola noción teológica como «plan» o «voluntad». En español bíblico, «todo el consejo de Dios» es claro y preserva el alcance completo del término.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: 'Genitivo simple de pertenencia/origen: «de Dios» comunica de manera directa que el consejo pertenece a Dios o procede de él, sin introducir matices no requeridos por el texto.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - para vosotros
  lexicon: BDAG
  rationale: El dativo plural de segunda persona se expresa de manera natural en español con el pronombre enclítico de destinatario dentro del infinitivo, manteniendo la segunda persona plural y la cercanía discursiva del discurso paulino.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación previa. «Porque» es una correspondencia natural y clara en español, adecuada para un discurso directo solemne.
theological_decisions:
- issue: 'βουλή τοῦ θεοῦ: consejo / propósito / plan / voluntad'
  english_pob_reading: the whole counsel of God
  chosen_spanish_reading: todo el consejo de Dios
  alternative_spanish_readings:
  - todo el propósito de Dios
  - todo el plan de Dios
  - toda la voluntad de Dios
  rationale: Se conserva «consejo» para mantener la amplitud semántica de βουλή sin resolverla prematuramente hacia decreto, propósito o voluntad. Esto preserva la tensión teológica documentada por la POB y evita un estrechamiento doctrinal no exigido por el griego.
  doctrine_reference: Preservar la amplitud semántica de βουλή; no fijar una lectura confesional específica donde el griego permite varias.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta propuesta sigue el mismo sentido auditado en la POB inglesa y mantiene la decisión léxica principal sobre βουλή como «consejo».
  spanish_consistency_notes:
  - Se mantiene el registro bíblico solemne y contemporáneo.
  - Se evita «SEÑOR» para θεός, siguiendo el texto fuente.
  - No se introduce una paráfrasis explicativa que reduzca la amplitud de βουλή.
  - El pronombre de segunda persona plural queda conservado de forma natural en español con «-os».
