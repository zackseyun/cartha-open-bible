    issue: Falta la preposición en la construcción con «rehuir»
    rationale: El griego expresa «no retrocedí de anunciar/declarar». En español, «rehuir» normalmente pide un complemento claro; «no rehuí declararos» suena elíptico y menos natural que «no rehuí declararles» o «no me eché atrás de declararles».
  - severity: medium
    issue: Uso de «-os» no neutral para el objetivo latinoamericano amplio
    rationale: Aunque comprensible, «declararos» pertenece al registro de segunda persona plural peninsular. Para un español neutral latinoamericano y eclesialmente amplio, «declararles» o «a ustedes» es preferible.
  revised_spanish_text: Porque no rehuí declararles[a] todo el consejo de Dios.
