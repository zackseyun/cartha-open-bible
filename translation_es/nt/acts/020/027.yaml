  source_alignment_summary: 'El borrador refleja bien el sentido griego general: γάρ = «Porque», οὐ ὑπεστειλάμην = «no rehuí», ἀναγγεῖλαι = «declarar», y πᾶσαν τὴν βουλὴν τοῦ θεοῦ = «todo el consejo de Dios». También conserva correctamente la nota léxica sobre βουλή. Sin embargo, la redacción principal omite en la superficie la preposición/complemento «de» exigido por «rehuir» en esta construcción, aunque sí aparece en las decisiones léxicas. Además, «declararos» con «os» introduce un registro peninsular que no encaja del todo con el objetivo de español neutral latinoamericano.'
  spanish_quality_summary: «Porque no rehuí declararos todo el consejo de Dios» suena algo trabado e incompleto en español estándar; la forma más natural y fiel es «Porque no rehuí declararles[a] todo el consejo de Dios». Esto preserva el contenido, mejora la gramática y alinea el pronombre con un registro panhispánico eclesial más neutral. «Consejo» es claro y dignificado.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Dios» y «consejo» están bien elegidos. El ajuste recomendado es estilístico-gramatical y de registro: sustituir «declararos» por «declararles[a]» para mejor neutralidad y naturalidad.'
  issues:
