base_translation:
  language: en
  yaml_path: translation/nt/acts/020/024.yaml
  text: 'But I do not count my life as of any value to myself[c][b][a], if only I may finish my course and the ministry that I received from the Lord Jesus: to testify to the gospel of the grace of God.'
  footnotes:
  - marker: a
    text: Or 'my soul as precious to myself.' Here 'life' is preferred because the context is Paul's willingness to face death in order to complete his mission.
    reason: lexical_alternative
  - marker: b
    text: Or 'finish my race.' The Greek δρόμος is a course or race run to completion.
    reason: lexical_alternative
  - marker: c
    text: Or 'to bear witness' or 'to solemnly testify' to the gospel of God's grace.
    reason: lexical_alternative
