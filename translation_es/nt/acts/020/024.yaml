translation:
  language: es
  text: 'Pero yo no considero mi vida de ningún valor para mí[a][b], con tal de que termine mi carrera y el ministerio que recibí del Señor Jesús: dar testimonio[c] del evangelio de la gracia de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma como preciosa para mí». Aquí se prefiere «vida» porque el contexto muestra a Pablo dispuesto a enfrentar la muerte para completar su misión.
    reason: lexical_alternative
  - marker: b
    text: O «mi recorrido» o «mi curso». El griego δρόμος puede referirse a un recorrido o a una carrera que se completa.
    reason: lexical_alternative
  - marker: c
    text: O «testificar» o «dar solemne testimonio» del evangelio de la gracia de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδενὸς λόγου ποιοῦμαι
  english_pob_choice: I do not count ... as of any value
  chosen_spanish: no considero ... como de ningún valor
  alternatives_spanish:
  - no hago caso de ...
  - no estimo ... en nada
  - no tengo mi ... por valiosa
  lexicon: BDAG
  rationale: La expresión griega es idiomática y evalúa el valor que Pablo asigna a su propia vida. En español, «no considero ... como de ningún valor» transmite bien ese juicio de valoración sin volverlo mecánico ni excesivamente libre.
- source_word: ψυχὴν
  english_pob_choice: life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  lexicon: BDAG
  rationale: En este contexto Pablo habla de su existencia terrenal frente a sufrimiento y muerte. «Mi vida» evita imponer un contraste alma/cuerpo que el contexto no enfatiza y sigue la decisión auditada del inglés.
- source_word: τιμίαν ἐμαυτῷ
  english_pob_choice: as of any value to myself
  chosen_spanish: como de ningún valor para mí
  alternatives_spanish:
  - como preciosa para mí
  - como valiosa para mí
  lexicon: BDAG
  rationale: El adjetivo τιμίαν señala valor/estima, y el dativo ἐμαυτῷ marca la valoración personal. En español, «para mí» comunica esa referencia personal de modo natural y conserva el matiz evaluativo negativo del conjunto.
- source_word: ὡς τελειῶσαι
  english_pob_choice: if only I may finish
  chosen_spanish: con tal de que termine
  alternatives_spanish:
  - para terminar
  - a fin de terminar
  - si tan solo terminara
  lexicon: BDAG
  rationale: La construcción expresa la prioridad dominante de Pablo. «Con tal de que termine» preserva esa idea de única condición o meta gobernante en un español fluido, sin convertir la frase en un mero propósito lógico.
- source_word: δρόμον
  english_pob_choice: course
  chosen_spanish: carrera
  alternatives_spanish:
  - curso
  - carrera corrida
  - recorrido
  lexicon: BDAG
  rationale: El término conserva una imagen de trayectoria que puede ser atlética o de recorrido. «Carrera» es natural en español bíblico actual y mantiene la metáfora sin forzarla a una sola imagen.
- source_word: διακονίαν
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - tarea
  lexicon: BDAG
  rationale: Aquí el término se refiere al servicio comisionado de Pablo. «Ministerio» es el equivalente más claro y reconocido en español eclesial, y refleja la función apostólica sin perder la carga vocacional del término.
- source_word: παρὰ τοῦ κυρίου Ἰησοῦ
  english_pob_choice: from the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - de parte del Señor Jesús
  - de Jesús, el Señor
  lexicon: BDAG
  rationale: La preposición expresa procedencia/origen. «Del Señor Jesús» es la forma más natural en español y conserva el título κύριος como «Señor» según el estándar del proyecto.
- source_word: διαμαρτύρασθαι
  english_pob_choice: to testify
  chosen_spanish: dar testimonio
  alternatives_spanish:
  - testificar
  - dar solemne testimonio
  lexicon: BDAG
  rationale: El verbo implica testimonio serio y solemne. «Dar testimonio» es una solución española idiomática que recoge la fuerza testimonial sin sobrerrepresentar el matiz jurídico en el cuerpo principal.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es el término cristiano establecido y comunica adecuadamente la proclamación sin diluir su peso teológico.
- source_word: τῆς χάριτος τοῦ θεοῦ
  english_pob_choice: of the grace of God
  chosen_spanish: de la gracia de Dios
  alternatives_spanish:
  - acerca de la gracia de Dios
  - del favor de Dios
  lexicon: BDAG
  rationale: La cadena genitiva se conserva de forma transparente. «De la gracia de Dios» mantiene tanto la relación del evangelio con la gracia como el lenguaje doctrinal recibido en español.
theological_decisions:
- issue: Sentido de ψυχή en la autoevaluación de Pablo
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El pasaje trata de la disposición de Pablo a enfrentar peligro y muerte para completar su misión. Traducir ψυχή como «vida» evita introducir una antropología alma/cuerpo no requerida por el contexto inmediato.
  doctrine_reference: Hechos 20:24; prioridad del contexto narrativo sobre un contraste técnico inexistente aquí
- issue: Fuerza de ὡς τελειῶσαι
  english_pob_reading: if only I may finish
  chosen_spanish_reading: con tal de que termine
  alternative_spanish_readings:
  - para que termine
  - a fin de terminar
  rationale: La cláusula no es solo un objetivo neutro; expresa la prioridad total de Pablo. «Con tal de que termine» conserva esa tensión retórica y su sentido de condición suprema sin volverla más doctrinal de lo que el griego permite.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
- issue: Relación entre «evangelio» y la gracia de Dios
  english_pob_reading: the gospel of the grace of God
  chosen_spanish_reading: el evangelio de la gracia de Dios
  alternative_spanish_readings:
  - el evangelio acerca de la gracia de Dios
  - la buena noticia de la gracia de Dios
  rationale: La estructura puede entenderse como evangelio caracterizado por la gracia de Dios o como evangelio que anuncia esa gracia. La forma elegida preserva esa amplitud sin cerrar la tensión semántica.
  doctrine_reference: Genitivos relacionales en griego koiné; mantener ambigüedad legítima
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; por eso este borrador sigue de cerca el texto griego y la línea auditada del inglés POB, ajustando únicamente la formulación española para naturalidad y claridad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; en este versículo no aparece el tetragrámaton, así que se conserva «Dios» y «Señor Jesús».
  - «Señor» se usa como título para κύριος, en coherencia con el marco del proyecto.
  - Se prefirió «evangelio» sobre «buena noticia» para conservar el término cristiano establecido.
  - La metáfora de δρόμος se conserva con «carrera» y se explica en nota, sin resolverla solo en sentido atlético o solo en sentido vital.
  - «Ministerio» refleja el servicio comisionado de Pablo y es consistente con el uso eclesial español cuando el contexto es vocacional/apostólico.
