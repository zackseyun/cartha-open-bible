  text: ⸀κεκρίκει γὰρ ὁ Παῦλος παραπλεῦσαι τὴν Ἔφεσον, ὅπως μὴ γένηται αὐτῷ χρονοτριβῆσαι ἐν τῇ Ἀσίᾳ, ἔσπευδεν γὰρ εἰ δυνατὸν ⸀εἴη αὐτῷ τὴν ἡμέραν τῆς πεντηκοστῆς γενέσθαι εἰς Ἱεροσόλυμα.
base_translation:
  language: en
  yaml_path: translation/nt/acts/020/016.yaml
  text: For Paul had decided to sail past Ephesus[a], so that he might not have to spend time in Asia; for he was hurrying to be in Jerusalem, if possible[b], on the day of Pentecost.
  footnotes:
  - marker: a
    text: '''Asia'' here refers to the Roman province of Asia in western Asia Minor, not the modern continent.'
    reason: cultural_note
  - marker: b
    text: Or 'to arrive in Jerusalem on the day of Pentecost.' The Greek expression can emphasize either being present there by that day or arriving there then.
    reason: alternative_reading
