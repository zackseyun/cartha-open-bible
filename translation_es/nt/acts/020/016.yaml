translation:
  language: es
  text: Pues Pablo había decidido pasar de largo junto a Éfeso[a], para no tener que detenerse en Asia; porque se apresuraba, si le era posible[b], a estar en Jerusalén el día de Pentecostés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asia» aquí se refiere a la provincia romana de Asia en el occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: 'O: «a llegar a Jerusalén el día de Pentecostés». La expresión griega puede enfatizar tanto estar allí para ese día como llegar ese mismo día.'
    reason: alternative_reading
lexical_decisions:
- source_word: κεκρίκει
  english_pob_choice: had decided
  chosen_spanish: había decidido
  alternatives_spanish:
  - había resuelto
  - había determinado
  lexicon: BDAG
  rationale: El pluscuamperfecto expresa una decisión ya tomada antes del movimiento narrado; «había decidido» conserva bien ese valor temporal y volitivo.
- source_word: παραπλεῦσαι
  english_pob_choice: to sail past
  chosen_spanish: pasar de largo
  alternatives_spanish:
  - pasar navegando junto a
  - bordear
  lexicon: BDAG
  rationale: En español, «pasar de largo» comunica de manera natural la idea de no detenerse en Éfeso; el contexto náutico queda implícito por el verbo y el relato de viaje, sin forzar un calco extraño.
- source_word: ὅπως μὴ γένηται αὐτῷ χρονοτριβῆσαι
  english_pob_choice: so that he might not have to spend time
  chosen_spanish: para no tener que detenerse
  alternatives_spanish:
  - para no tener que pasar tiempo allí
  - para que no le ocurriera demorar(se)
  lexicon: BDAG
  rationale: La construcción griega es idiomática y el verbo χρονοτριβέω apunta a emplear tiempo o demorarse. «No tener que detenerse» transmite la idea práctica de evitar una estancia prolongada sin endurecer innecesariamente la frase.
- source_word: ἐν τῇ Ἀσίᾳ
  english_pob_choice: in Asia
  chosen_spanish: en Asia
  alternatives_spanish:
  - en la provincia de Asia
  lexicon: BDAG
  rationale: Se mantiene el nombre geográfico breve en el texto principal; el referente provincial romano puede explicitarse en nota, como en el audit trail inglés.
- source_word: ἔσπευδεν
  english_pob_choice: he was hurrying
  chosen_spanish: se apresuraba
  alternatives_spanish:
  - iba con prisa
  - se daba prisa
  lexicon: BDAG
  rationale: El imperfecto muestra una acción continua; «se apresuraba» refleja bien el matiz de prisa sostenida en el contexto del viaje.
- source_word: εἰ δυνατὸν εἴη αὐτῷ
  english_pob_choice: if possible
  chosen_spanish: si le era posible
  alternatives_spanish:
  - si fuera posible para él
  - si podía
  lexicon: BDAG
  rationale: La expresión condicional se vierte de modo natural en español como una posibilidad real condicionante. «Si le era posible» conserva la referencia personal del dativo sin sobrecargar la frase.
- source_word: τὴν ἡμέραν τῆς πεντηκοστῆς
  english_pob_choice: on the day of Pentecost
  chosen_spanish: el día de Pentecostés
  alternatives_spanish:
  - para el día de Pentecostés
  - en el día de Pentecostés
  lexicon: BDAG
  rationale: La expresión festiva se naturaliza en español con el nombre establecido «Pentecostés»; el sentido temporal se expresa con «el día de».
- source_word: γενέσθαι εἰς Ἱεροσόλυμα
  english_pob_choice: to be in Jerusalem
  chosen_spanish: a estar en Jerusalén
  alternatives_spanish:
  - a llegar a Jerusalén
  - a presentarse en Jerusalén
  lexicon: BDAG
  rationale: El infinitivo griego apunta a llegar a estar presente allí para esa fecha. «A estar en Jerusalén» mantiene ese valor de presencia objetivo sin imponer solo el matiz de llegada.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: BDAG
  rationale: Se usa la forma española estándar del topónimo, acorde con la tradición bíblica y la legibilidad contemporánea.
- source_word: πεντηκοστῆς
  english_pob_choice: Pentecost
  chosen_spanish: Pentecostés
  alternatives_spanish:
  - Fiesta de las Semanas
  lexicon: BDAG
  rationale: En el período del NT λειτουργa como nombre festivo establecido; «Pentecostés» es la forma reconocible y fiel en español.
theological_decisions:
- issue: Referencia geográfica de «Asia»
  english_pob_reading: '''Asia'' here refers to the Roman province of Asia in western Asia Minor, not the modern continent.'
  chosen_spanish_reading: «Asia» se entiende como la provincia romana de Asia, no como el continente moderno.
  alternative_spanish_readings:
  - «Asia Menor»
  - «la provincia de Asia»
  rationale: El texto español conserva «Asia» para no sobrecargar la línea principal, pero la nota permite fijar el referente histórico exacto como en el audit trail inglés.
  doctrine_reference: contexto histórico-geográfico del Nuevo Testamento
- issue: Alcance de la finalidad de la cláusula final
  english_pob_reading: The Greek expression can emphasize either being present there by that day or arriving there then.
  chosen_spanish_reading: La frase final puede entenderse como meta de presencia en Jerusalén para ese día, o como llegada en ese día.
  alternative_spanish_readings:
  - «llegar a Jerusalén el día de Pentecostés»
  - «estar en Jerusalén el día de Pentecostés»
  rationale: 'El español principal («a estar en Jerusalén») deja abierta la misma tensión interpretativa que documenta el inglés: presencia por esa fecha frente a llegada en esa fecha.'
  doctrine_reference: precisión semántica del griego koiné
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; el pasaje presenta alta concordancia con la revisión más reciente y no requiere cambios respecto del sentido base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Pentecostés» se conserva como nombre festivo establecido, coherente con el uso del NT y con el audit trail inglés.
  - «Asia» queda sin expansión en el texto principal para preservar fluidez, pero la nota fija el sentido provincial.
  - La construcción «a estar en Jerusalén» preserva la ambigüedad documentada sin forzar solo una de las dos lecturas posibles.
