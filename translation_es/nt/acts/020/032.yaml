translation:
  language: es
  text: Y ahora los encomiendo[a] a Dios y a la palabra de su gracia, que[b] puede edificar y dar la herencia entre todos los que han sido santificados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los confío a Dios» o «los pongo al cuidado de Dios». El verbo también puede expresarse como poner a alguien bajo el cuidado y la protección de otro.
    reason: lexical_alternative
  - marker: b
    text: O «quien puede», tomando la frase principalmente como referida a Dios más que a «la palabra de su gracia».
    reason: alternative_reading
lexical_decisions:
- source_word: παρατίθεμαι
  english_pob_choice: I entrust
  chosen_spanish: encomiendo
  alternatives_spanish:
  - confío
  - entrego
  lexicon: BDAG
  rationale: El medio de παρατίθεμαι expresa el acto de poner a alguien bajo el cuidado de otro. En español, «encomendar» comunica bien esa entrega confiada sin sonar forzado, y mantiene un registro digno y eclesial.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: La construcción dativa señala el destinatario de la encomienda. «A Dios» es la forma natural y fiel en español.
- source_word: τῷ λόγῳ τῆς χάριτος αὐτοῦ
  english_pob_choice: to the word of his grace
  chosen_spanish: a la palabra de su gracia
  alternatives_spanish:
  - al mensaje de su gracia
  - a su palabra de gracia
  lexicon: BDAG
  rationale: «Palabra» conserva el valor de λόγος como mensaje proclamado y también su peso teológico. «De su gracia» reproduce la estructura genitiva sin suavizarla indebidamente.
- source_word: τῷ δυναμένῳ
  english_pob_choice: which is able
  chosen_spanish: la cual puede
  alternatives_spanish:
  - que puede
  - el cual puede
  lexicon: BDAG
  rationale: 'Se mantiene la ambigüedad auditada: el participio puede referirse principalmente a «la palabra de su gracia» o, secundariamente, a Dios. «La cual puede» sigue de cerca el antecedente inmediato en español y preserva la tensión interpretativa.'
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build up
  chosen_spanish: edificar
  alternatives_spanish:
  - edificaros
  - fortalecer
  lexicon: BDAG
  rationale: El verbo se usa con sentido metafórico de edificación espiritual. En español, «edificar» es claro, bíblico y suficientemente literal; se evita añadir un objeto no expresado en el griego.
- source_word: δοῦναι τὴν κληρονομίαν
  english_pob_choice: to give the inheritance
  chosen_spanish: dar la herencia
  alternatives_spanish:
  - conceder la herencia
  - dar la herencia prometida
  lexicon: BDAG
  rationale: «Herencia» refleja κληρονομίαν con su resonancia bíblica. «Dar» conserva la sencillez directa del griego; «conceder» sería posible, pero menos inmediato.
- source_word: κληρονομίαν
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la herencia recibida
  lexicon: BDAG
  rationale: «Herencia» es el equivalente estándar y mantiene la carga escatológica y comunitaria del término.
- source_word: ἐν τοῖς ἡγιασμένοις πᾶσιν
  english_pob_choice: among all those who have been sanctified
  chosen_spanish: entre todos los santificados
  alternatives_spanish:
  - entre todos los que han sido santificados
  - con todos los santificados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἁγιάζω se expresa de forma verbal con «santificados», que suena natural en español y conserva el resultado permanente del acto. «Entre» reproduce adecuadamente el sentido distributivo/comunitario de ἐν.
theological_decisions:
- issue: Referente de τῷ δυναμένῳ
  english_pob_reading: 'The phrase is rendered with reference to ''the word of his grace'' in the main text: ''which is able.'''
  chosen_spanish_reading: 'La cláusula relativa se refiere en el texto principal a «la palabra de su gracia»: «la cual puede».'
  alternative_spanish_readings:
  - «el cual puede», referido principalmente a Dios
  - «que puede», dejando la referencia indeterminada
  rationale: La sintaxis permite más de una lectura. La cercanía inmediata de «la palabra de su gracia» hace natural tomarla como antecedente, pero la capacidad de edificar y dar la herencia pertenece en última instancia a Dios. La redacción española conserva esa ambigüedad sin resolverla excesivamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador inglés revisado eliminó el objeto explícito tras «build up» porque el griego no lo expresa. La versión española sigue esa corrección y no añade un «los/ustedes» que no esté en el texto fuente. También mantiene la ambigüedad auditada de τῷ δυναμένῳ sin resolverla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece.
  - Se mantuvo «gracia» para χάρις y «herencia» para κληρονομίαν, siguiendo la terminología POB.
  - No se añadió objeto explícito a «edificar» para respetar la revisión del texto fuente.
  - La fórmula «entre todos los santificados» conserva el participio perfecto pasivo sin reducirlo a una simple etiqueta eclesial.
