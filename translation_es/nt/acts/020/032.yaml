review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: «los encomiendo a Dios y a la palabra de su gracia» refleja correctamente παρατίθεμαι + doble dativo; «puede edificar y dar la herencia» conserva el infinitivo complementario; y «entre todos los santificados» capta ἐν τοῖς ἡγιασμένοις πᾶσιν. También preserva la ambigüedad de τῷ δυναμένῳ mediante nota. Sin embargo, la nota [a] introduce una alternativa defectuosa («confío a Dios»), que no es español natural para este contexto ni refleja bien el sentido auditado de ‘entrust/commit to God’.'
  spanish_quality_summary: El texto principal es claro y digno, pero puede mejorarse levemente para mayor naturalidad y precisión. «La cual» suena algo rígido; «que» funciona mejor en español bíblico actual sin perder referencia. Además, «todos los santificados» es comprensible, pero «todos los que han sido santificados» expresa mejor el participio perfecto pasivo auditado y evita sonar como etiqueta fija. La nota [a] necesita reparación por formulación poco natural y por una glosa explicativa que confunde la alternativa.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεῷ = «Dios», χάριτος = «gracia», λόγῳ = «palabra», κληρονομίαν = «herencia». La elección «santificados» no contradice el glosario, pero la forma verbal expandida representa mejor ἡγιασμένοις según la propia auditoría inglesa.'
  issues:
  - severity: medium
    issue: La nota [a] ofrece «confi[o] a Dios», formulación incorrecta o antinatural en español.
    rationale: En este contexto, lo natural sería «los confío a Dios» o mejor «los pongo al cuidado de Dios». La forma actual no debe aprobarse como alternativa léxica documentada.
  - severity: low
    issue: «La cual puede» suena innecesariamente rígido.
    rationale: «Que puede» es más natural en español neutral y mantiene la misma función referencial, además de permitir la nota sobre la alternativa «quien/el cual puede» referida a Dios.
  - severity: medium
    issue: «Entre todos los santificados» reduce la fuerza verbal del participio perfecto pasivo.
    rationale: La auditoría inglesa explícitamente prefirió «those who have been sanctified». En español, «todos los que han sido santificados» preserva mejor ese matiz aspectual y evita una posible lectura demasiado nominal.
  revised_spanish_text: Y ahora los encomiendo[a] a Dios y a la palabra de su gracia, que[b] puede edificar y dar la herencia entre todos los que han sido santificados.
