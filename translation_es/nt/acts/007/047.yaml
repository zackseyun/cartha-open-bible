translation:
  language: es
  text: Pero Salomón le edificó una casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un templo'; el griego dice literalmente 'una casa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σολομῶν
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomon
  lexicon: BDAG
  rationale: Nombre propio bíblico transliterado al español estándar. 'Salomón' es la forma consagrada y más natural en español para el rey de Israel.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce contraste y continuidad narrativa. 'Pero' reproduce bien la leve oposición con la afirmación previa sobre la morada del Altísimo.
- source_word: οἰκοδόμησεν
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: BDAG
  rationale: El verbo expresa la acción de construir un edificio. 'Edificó' conserva el registro bíblico y comunica adecuadamente la construcción material sin forzar un sentido metafórico.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: BDAG
  rationale: 'El dativo referido a Dios en contexto se expresa de forma natural en español con objeto indirecto: ''le edificó''. Mantiene la intención de destinación o dedicación implícita en el griego.'
- source_word: οἶκον
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  - una morada
  lexicon: BDAG
  rationale: El griego usa el término general οἶκος, literalmente 'casa'. 'Una casa' preserva la dicción del texto y deja visible la tensión con la interpretación contextual del templo.
theological_decisions:
- issue: 'Cómo renderizar οἶκον: ''casa'' o ''templo'''
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: 'La lectura principal conserva el vocabulario concreto del griego y mantiene la tensión teológica del argumento de Esteban: Dios no habita en casas hechas por manos humanas, aun cuando se hable de una ''casa'' para él. ''Templo'' es una interpretación contextual válida, pero aquí se preserva mejor en nota.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El contexto muestra acuerdo alto y no requiere cambios sustanciales; se mantiene la decisión del POB inglés de conservar 'house/casa' en el texto principal y reservar 'templo' para nota.
  spanish_consistency_notes:
  - Se conserva el contraste introducido por δέ con 'Pero'.
  - Se mantiene la terminología literal 'casa' para οἶκον, coherente con el audit trail inglés.
  - El dativo αὐτῷ se vierte de manera idiomática con 'le' sin perder el sentido de destinación.
