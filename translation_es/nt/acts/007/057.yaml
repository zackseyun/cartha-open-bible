translation:
  language: es
  text: Pero, gritando a voz alta, se taparon los oídos y se lanzaron todos juntos[a] contra él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de común acuerdo» o «como uno solo». El griego ὁμοθυμαδόν enfatiza su acción unida.
    reason: lexical_alternative
lexical_decisions:
- source_word: κράξαντες
  english_pob_choice: crying out
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - exclamando
  - gritando a voz alta
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción de voz fuerte previa y concurrente con los verbos siguientes. «Gritando» comunica el acto sonoro de forma natural en español sin añadir una carga emocional específica que el griego no exige.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo contrastivo desde la visión de Esteban hacia la reacción hostil de la multitud. «Pero» conserva ese movimiento discursivo en español.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: a voz alta
  alternatives_spanish:
  - en voz alta
  - con voz fuerte
  lexicon: BDAG
  rationale: La construcción dativa se vierte de modo idiomático como expresión adverbial. «A voz alta» mantiene la idea concreta de la voz elevada, y el marcador de nota permite reconocer la alternativa más común «en voz alta».
- source_word: συνέσχον τὰ ὦτα αὐτῶν
  english_pob_choice: they covered their ears
  chosen_spanish: se taparon los oídos
  alternatives_spanish:
  - se cerraron los oídos
  - se taparon los oídos con las manos
  - se obturaron los oídos
  lexicon: BDAG
  rationale: El idiomático griego significa cerrar o cubrir los oídos para no oír. «Se taparon los oídos» es la equivalencia más natural y clara en español, preservando la imagen física.
- source_word: ὥρμησαν
  english_pob_choice: rushed
  chosen_spanish: arremetieron
  alternatives_spanish:
  - se lanzaron
  - corrieron
  - irrumpieron
  lexicon: BDAG
  rationale: El verbo expresa un movimiento repentino y enérgico hacia la víctima. «Arremetieron» comunica mejor el impulso hostil implícito en el contexto que un simple «corrieron».
- source_word: ὁμοθυμαδὸν
  english_pob_choice: together
  chosen_spanish: unánimemente
  alternatives_spanish:
  - juntos
  - de común acuerdo
  - con un mismo impulso
  lexicon: BDAG
  rationale: El adverbio subraya acción unida, de una sola mente o impulso compartido. «Unánimemente» conserva esa fuerza colectiva; aunque «juntos» es más literal, resulta más débil en español.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: at him
  chosen_spanish: contra él
  alternatives_spanish:
  - hacia él
  - sobre él
  - contra él
  lexicon: BDAG
  rationale: Con un verbo de acometida, la preposición indica dirección hostil hacia una persona. «Contra él» expresa con claridad la intención agresiva del movimiento sin apartarse del valor contextual de ἐπί con acusativo.
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés presentan alta concordancia; no hay revisiones aplicadas al sentido base. La principal decisión de redacción fue mantener la secuencia participial y la hostilidad del movimiento final sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo un estilo moderno y reverente, sin recurrir a fórmulas eclesiásticas arcaizantes innecesarias.
  - 'Se preservó la progresión narrativa: voz fuerte, auto-obstrucción auditiva y acometida colectiva.'
  - «Unánimemente» se eligió para reflejar mejor el valor adverbial de ὁμοθυμαδόν que el simple «juntos».
