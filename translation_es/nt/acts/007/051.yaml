translation:
  language: es
  text: Duros de cerviz e incircuncisos de corazón y de oídos, ustedes siempre resisten al Espíritu Santo; como hicieron sus padres[a], así también hacen ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «sus antepasados». Griego: «sus padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σκληροτράχηλοι
  english_pob_choice: stiff-necked
  chosen_spanish: duros de cerviz
  alternatives_spanish:
  - obstinados
  - tercos
  lexicon: BDAG
  rationale: Conserva la metáfora corporal fuerte del griego y su tono profético, sin suavizarla a un mero rasgo psicológico.
- source_word: ἀπερίτμητοι
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - sin circuncisión
  - impíos
  lexicon: BDAG
  rationale: Mantiene el término de pacto de forma literal, como en el inglés POB, porque la reprensión apela al lenguaje profético sobre la rebelión interior.
- source_word: καρδίαις
  english_pob_choice: in hearts
  chosen_spanish: de corazón
  alternatives_spanish:
  - en el corazón
  - en sus corazones
  lexicon: BDAG
  rationale: En español, la expresión natural y fiel es 'de corazón' dentro de la construcción 'incircuncisos de corazón'; preserva la esfera interior sin volverla torpe.
- source_word: τοῖς ὠσίν
  english_pob_choice: and ears
  chosen_spanish: y de oídos
  alternatives_spanish:
  - y en oídos
  - y en sus oídos
  lexicon: BDAG
  rationale: Reproduce la coordinación con 'corazón' y mantiene la imagen de insensibilidad receptiva, evitando una paráfrasis como 'sordos' que debilitaría la metáfora.
- source_word: ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: BDAG
  rationale: Adverbio directo y natural que comunica una conducta persistente.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  - el Espíritu Sagrado
  lexicon: BDAG
  rationale: En este contexto la frase se refiere a la persona divina; en español se capitaliza de forma convencional para reflejar ese referente sin añadir contenido ajeno al texto.
- source_word: ἀντιπίπτετε
  english_pob_choice: resist
  chosen_spanish: resisten
  alternatives_spanish:
  - se oponen
  - hacen resistencia a
  lexicon: BDAG
  rationale: '''Resisten'' comunica oposición activa y conserva el verbo acusatorio sin expansión interpretativa.'
- source_word: ὡς οἱ πατέρες ὑμῶν καὶ ὑμεῖς
  english_pob_choice: as your fathers did, so do you
  chosen_spanish: como hicieron sus padres, así también hacen ustedes
  alternatives_spanish:
  - como sus padres, así también ustedes
  - igual que sus padres, ustedes también
  lexicon: BDAG
  rationale: Explicita el paralelismo implícito del griego en un español fluido, manteniendo la confrontación retórica del pasaje.
theological_decisions:
- issue: Referencia del Espíritu Santo
  english_pob_reading: Personal divine Holy Spirit
  chosen_spanish_reading: Espíritu Santo como persona divina
  alternative_spanish_readings:
  - espíritu santo como influencia divina
  - espíritu santo como disposición interior
  rationale: La frase con artículo y adjetivo, en Hechos, normalmente designa al Espíritu Santo personal. La mayúscula en español señala ese referente sin alterar el sentido griego.
  doctrine_reference: Hechos 7:51; filosofía de traducción POB sobre referentes divinos
- issue: 'Imagen del pacto: incircuncisos de corazón y oídos'
  english_pob_reading: Preserve 'uncircumcised' metaphor in hearts and ears
  chosen_spanish_reading: Preservar la metáfora 'incircuncisos de corazón y de oídos'
  alternative_spanish_readings:
  - cerrados de corazón y sordos de oídos
  - duros de corazón y oídos
  rationale: El texto invoca lenguaje profético y de pacto; mantener la metáfora evita rebajar la acusación a una descripción meramente psicológica y conserva la continuidad bíblica.
  doctrine_reference: Fidelidad al trasfondo profético y al lenguaje de pacto
- issue: Término ancestral masculino
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El griego usa el plural masculino 'padres'; se conserva la forma del original para no neutralizarla, aunque el contexto abarque generaciones anteriores de Israel.
  doctrine_reference: Política de exactitud de género del POB
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente. El borrador sigue el texto griego y el audit trail inglés sin cambios documentados.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' con mayúsculas por el referente personal divino.
  - Se conserva la metáfora de pacto 'incircuncisos de corazón y de oídos' en una construcción española natural.
  - '''Padres'' se traduce como ''padres'' y no ''antepasados'' en el texto principal, siguiendo el griego masculino plural y el audit trail.'
  - La exclamación inicial refleja el tono profético y acusatorio del pasaje.
