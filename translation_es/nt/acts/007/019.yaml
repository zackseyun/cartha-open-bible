translation:
  language: es
  text: Este hombre[a], habiendo tratado con astucia a nuestro pueblo, maltrató a nuestros padres[c][b], causando que sus infantes fueran expuestos para que no fueran dejados con vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo tratado con engaño a nuestro pueblo». El participio griego puede enfatizar astucia o trato engañoso.
    reason: lexical_alternative
  - marker: b
    text: Es decir, abandonar a los bebés mediante exposición, una práctica destinada a dejarlos morir.
    reason: cultural_note
  - marker: c
    text: O «a nuestros antepasados» para «a nuestros padres». El griego usa el término familiar tradicional para los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo apunta a un referente específico ya identificado en el contexto. «Este hombre» conserva la fuerza deíctica sin sonar rígido ni ambiguo en español.
- source_word: κατασοφισάμενος
  english_pob_choice: having dealt shrewdly with
  chosen_spanish: habiendo tratado con astucia
  alternatives_spanish:
  - habiendo obrado con astucia
  - habiendo actuado con engaño
  - habiendo maquinado contra
  lexicon: BDAG
  rationale: El participio expresa acción astuta y dañina; «con astucia» preserva el matiz de cunning/deceptive conduct sin exagerar hacia una conclusión que el contexto no exige explícitamente.
- source_word: τὸ γένος ἡμῶν
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra gente
  - nuestra nación
  - nuestra raza
  lexicon: BDAG
  rationale: Γένος aquí designa al pueblo étnico de Israel. «Nuestro pueblo» evita las connotaciones modernas problemáticas de «raza» y sigue bien el valor colectivo del término.
- source_word: ἐκάκωσεν
  english_pob_choice: mistreated
  chosen_spanish: maltrató
  alternatives_spanish:
  - oprimió
  - afligió
  - hizo daño a
  lexicon: BDAG
  rationale: El verbo indica causar daño o trato cruel. «Maltrató» es natural en español y transmite la violencia del contexto sin precisar más de lo que la forma verbal dice.
- source_word: τοὺς πατέρας
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros ancestros
  - a nuestros padres y antepasados
  lexicon: BDAG
  rationale: Se conserva el lenguaje familiar-histórico del griego. En español, «padres» puede referirse a los antepasados de Israel, pero se mantiene con el valor tradicional del pasaje; la preposición «a» marca el objeto directo personal.
- source_word: τοῦ ποιεῖν
  english_pob_choice: causing
  chosen_spanish: causando que
  alternatives_spanish:
  - haciendo que
  - al hacer que
  - obligando a
  lexicon: BDAG
  rationale: La construcción articula medio o resultado. «Causando que» sigue de cerca el valor causal/resultativo sin introducir la idea más fuerte de coerción que no está explícita en la revisión final inglesa.
- source_word: τὰ βρέφη
  english_pob_choice: their infants
  chosen_spanish: sus infantes
  alternatives_spanish:
  - sus bebés
  - sus niños pequeños
  - sus recién nacidos
  lexicon: BDAG
  rationale: Βρέφη refiere a criaturas muy pequeñas, especialmente bebés. «Infantes» es preciso, sobrio y adecuado al registro bíblico.
- source_word: ἔκθετα
  english_pob_choice: to be exposed
  chosen_spanish: fueran expuestos
  alternatives_spanish:
  - fueran abandonados
  - fueran dejados expuestos
  - fueran arrojados fuera
  lexicon: BDAG
  rationale: El adjetivo describe a los bebés expuestos al abandono. «Fueran expuestos» conserva el término histórico con naturalidad; la nota explica la práctica cultural implicada.
- source_word: εἰς τὸ μὴ ζῳογονεῖσθαι
  english_pob_choice: so that they would not be kept alive
  chosen_spanish: para que no fueran mantenidos con vida
  alternatives_spanish:
  - para que no sobrevivieran
  - para que no siguieran con vida
  - a fin de que no fueran preservados con vida
  lexicon: BDAG
  rationale: La frase expresa propósito/resultado negativo. «No fueran mantenidos con vida» refleja bien el pasivo y el sentido de preservar la vida, con un español claro y digno.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «by forcing their infants to be exposed» a «causing their infants to be exposed» para acercarse más a la construcción griega sin añadir coerción explícita. La redacción española sigue esa revisión con «causando que», manteniendo el matiz causal y evitando imponer una fuerza verbal mayor que la que el texto final inglés y el griego requieren.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el tetragrámaton según la norma del proyecto, aunque este versículo no lo contiene.
  - Se preservó «nuestro pueblo» para γένος y «nuestros padres» para πατέρας conforme al lenguaje histórico del pasaje.
  - «Expuestos» conserva el término técnico-cultural; la nota aclara que se trata de abandono infantil por exposición.
