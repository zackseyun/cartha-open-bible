base_translation:
  language: en
  yaml_path: translation/nt/acts/007/019.yaml
  text: This man[a], having dealt shrewdly with our people, mistreated our fathers[c][b], causing their infants to be exposed so that they would not be kept alive.
  footnotes:
  - marker: a
    text: Or 'having dealt craftily with our people.' The Greek participle emphasizes cunning or deceptive treatment.
    reason: lexical_alternative
  - marker: b
    text: That is, to abandon their babies by exposure, a practice intended to leave them to die.
    reason: cultural_note
  - marker: c
    text: Or 'our ancestors' for 'our fathers.' The Greek uses the traditional familial term for Israel's forefathers.
    reason: lexical_alternative
