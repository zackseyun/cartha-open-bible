    rationale: 'El griego expresa procedencia/origen de la compra: Abraham compró el sepulcro «de» los hijos de Hamor. En español, «comprar a alguien» puede sonar natural, pero aquí el proyecto pide preservar de cerca la elección léxica del original y del POB inglés («from the sons of Hamor»). «De los hijos de Hamor» es más fiel y suficientemente natural.'
