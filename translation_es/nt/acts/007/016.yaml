  source_alignment_summary: 'El borrador sigue bien el griego en la estructura básica: traslado a Siquem, colocación en el sepulcro, compra atribuida a Abraham, precio de plata y referencia a los hijos de Hamor en Siquem. También preserva correctamente la tensión histórica documentada en la nota, sin armonizar con Génesis. Sin embargo, «a los hijos de Hamor» para παρὰ τῶν υἱῶν Ἑμμὼρ cambia la relación de origen expresada por παρά con genitivo; en este contexto español debe decir «de los hijos de Hamor» para reflejar fielmente «from the sons of Hamor».'
  spanish_quality_summary: El español es claro y digno. «Siquem» y «sepulcro» son adecuados. Puede mejorarse la naturalidad funeraria de «fueron puestos» a «fueron depositados», aunque no es un error grave. La nota está bien formulada, pero «sepulcro» en Génesis 23 puede sonar algo más específico que el inglés «burial site»; conviene suavizarlo a «lugar de sepultura» para mayor precisión.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Los nombres propios están bien. La decisión clave que requiere ajuste es sintáctico-lexical: παρὰ + genitivo debe conservarse en español como procedencia/origen («de los hijos de Hamor»), no como complemento indirecto («a los hijos de Hamor»).'
  issues:
