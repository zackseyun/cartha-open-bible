translation:
  language: es
  text: y fueron trasladados a Siquem y fueron depositados en el sepulcro que Abraham había comprado por un precio de plata de los hijos de Hamor en Siquem[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción de Esteban combina detalles que los lectores pueden comparar con Génesis 23, donde Abraham compra un lugar de sepultura en Macpela, y Génesis 33:19, donde Jacob compra un terreno cerca de Siquem a los hijos de Hamor.
    reason: cross_reference
lexical_decisions:
- source_word: μετετέθησαν
  english_pob_choice: were carried over
  chosen_spanish: fueron trasladados
  alternatives_spanish:
  - fueron llevados
  - fueron transportados
  lexicon: BDAG
  rationale: El aoristo pasivo de μετατίθημι expresa traslado o cambio de lugar. «Trasladados» conserva con naturalidad la idea de movimiento de restos hacia otro sitio sin volverlo más interpretativo de lo que permite el griego.
- source_word: Συχὲμ / Συχέμ
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: Transliteración bíblica estándar al español
  rationale: «Siquem» es la forma bíblica usual y reconocible en español, y preserva el nombre propio del lugar sin depender de la forma inglesa.
- source_word: ἐτέθησαν
  english_pob_choice: laid
  chosen_spanish: fueron puestos
  alternatives_spanish:
  - fueron colocados
  - fueron depositados
  lexicon: BDAG
  rationale: En contexto funerario, τίθημι puede traducirse de modo natural como «poner». «Fueron puestos» mantiene la pasiva del griego y comunica el acto de depositarlos en la tumba.
- source_word: μνήματι
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tumba funeraria
  lexicon: BDAG
  rationale: μνῆμα designa un lugar de entierro. «Sepulcro» es un equivalente claro y dignificado en español, apto para contexto bíblico, sin añadir matices ajenos al texto.
- source_word: ᾧ
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - donde
  - en el cual
  lexicon: BDAG
  rationale: El relativo neutro dativo se refiere al sepulcro. En español, «que» introduce con naturalidad la cláusula relativa sin forzar una localización explícita que el griego no formula aquí.
- source_word: ὠνήσατο
  english_pob_choice: had bought
  chosen_spanish: había comprado
  alternatives_spanish:
  - compró
  - había adquirido
  lexicon: BDAG
  rationale: El verbo significa comprar/adquirir. El pluscuamperfecto español expresa bien la anterioridad respecto al entierro narrado y coincide con la relación temporal del griego.
- source_word: τιμῆς ἀργυρίου
  english_pob_choice: for a price of silver
  chosen_spanish: por un precio de plata
  alternatives_spanish:
  - por plata
  - por un precio en plata
  lexicon: BDAG
  rationale: La construcción genitiva expresa un precio consistente en plata. «Por un precio de plata» conserva la literalidad semántica y evita convertirlo en una suma monetaria no especificada.
- source_word: παρὰ τῶν υἱῶν Ἑμμὼρ
  english_pob_choice: from the sons of Hamor
  chosen_spanish: a los hijos de Hamor
  alternatives_spanish:
  - de los hijos de Hamor
  - a manos de los hijos de Hamor
  lexicon: BDAG
  rationale: 'παρά con genitivo indica origen, pero en español la compra se expresa con más naturalidad mediante el complemento de persona a quien se compra: «a los hijos de Hamor». Esto sigue el valor relacional del griego y evita una traducción rígida. "Hamor" se mantiene como transliteración habitual del nombre propio.'
- source_word: ἐν Συχέμ
  english_pob_choice: in Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Shechem
  lexicon: BDAG
  rationale: La frase final se traduce de manera directa para mantener el lugar indicado por el texto griego. «En Siquem» conserva la estructura y no fuerza una resolución interpretativa adicional.
theological_decisions:
- issue: Tensión histórica con los relatos de Génesis sobre la compra del sepulcro/terreno
  english_pob_reading: 'Retain Stephen''s wording as given: Abraham bought the tomb from the sons of Hamor in Shechem.'
  chosen_spanish_reading: 'Mantener el enunciado de Esteban tal como aparece en el griego: Abraham compró el sepulcro a los hijos de Hamor en Siquem.'
  alternative_spanish_readings:
  - Armonizar con Jacob como comprador en Génesis 33:19
  - Armonizar con la compra de Abraham en Génesis 23
  rationale: La traducción debe representar el texto griego sin resolver por adelantado la tensión con Génesis. Por eso el cuerpo principal conserva la formulación tal como está, y la nota explica la relación con los pasajes paralelos para no ocultar la dificultad textual e histórica.
  doctrine_reference: Primacía del texto original; preservar tensiones históricas en la traducción y documentarlas en nota.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el griego SBLGNT y con el auditorio inglés: no se detectaron revisiones aplicadas en el ciclo más reciente, y la única cuestión relevante es la tensión narrativa con Génesis, conservada y anotada en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Siquem» como forma bíblica estándar en español.
  - Se conservó «Abraham» y «Hamor» como nombres propios tradicionales y transparentes.
  - Se eligió «sepulcro» para μνῆμα por ser natural en registro bíblico y equivalente al sentido funerario.
  - Se respetó la anterioridad verbal con el pluscuamperfecto «había comprado».
