translation:
  language: es
  text: 'Y al día siguiente se les apareció mientras estaban peleando, y trataba de reconciliarlos para que hubiera paz[a] entre ellos, diciendo: «Hombres, ustedes son hermanos; ¿por qué se agravian unos a otros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los estaba reconciliando para llevarlos a la paz». El imperfecto griego puede leerse como acción en curso; aquí probablemente expresa un intento: Moisés trataba de ponerlos en paz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε ἐπιούσῃ ἡμέρᾳ
  english_pob_choice: on the following day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - en el día siguiente
  - el siguiente día
  lexicon: BDAG
  rationale: La expresión temporal en dativo es idiomática; «al día siguiente» conserva la secuencia narrativa de manera natural en español sin perder el valor de sucesión.
- source_word: ὤφθη
  english_pob_choice: he appeared
  chosen_spanish: se les apareció
  alternatives_spanish:
  - fue visto por ellos
  - se mostró a ellos
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω funciona narrativamente como «aparecer». En español, la forma pronominal mantiene el evento perceptible sin la rigidez de «fue visto».
- source_word: αὐτοῖς μαχομένοις
  english_pob_choice: to them as they were fighting
  chosen_spanish: mientras estaban peleando
  alternatives_spanish:
  - cuando estaban peleando
  - mientras combatían
  lexicon: BDAG
  rationale: El participio circunstancial indica acción en curso. «Mientras estaban peleando» comunica bien el aspecto progresivo y la simultaneidad.
- source_word: συνήλλασσεν
  english_pob_choice: was trying to reconcile
  chosen_spanish: trataba de reconciliarlos
  alternatives_spanish:
  - estaba reconciliándolos
  - intentaba reconciliarlos
  - trataba de hacerles la paz
  lexicon: BDAG
  rationale: El imperfecto sugiere acción intentada o en desarrollo; «trataba de» refleja ese valor con naturalidad. «Reconciliarlos» mantiene la relación personal implícita en el verbo.
- source_word: εἰς εἰρήνην
  english_pob_choice: to peace
  chosen_spanish: con la paz
  alternatives_spanish:
  - hacia la paz
  - en paz
  - a la paz
  lexicon: BDAG
  rationale: En español, «reconciliar a alguien con la paz» preserva la idea de llevar a un estado de paz, aunque sea menos literal que «a/para la paz». Se elige por claridad y fluidez en la construcción verbal.
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Señores
  - Varones
  lexicon: BDAG
  rationale: El vocativo plural de ἀνήρ se traduce directamente por «Hombres». Mantiene la fuerza lexical sin introducir una cortesía ajena al griego.
- source_word: ἀδελφοί ἐστε
  english_pob_choice: you are brothers
  chosen_spanish: hermanos son ustedes
  alternatives_spanish:
  - ustedes son hermanos
  - ustedes son hermanos entre sí
  - son hermanos
  lexicon: BDAG
  rationale: La frase destaca una identidad compartida entre los dos interlocutores. Se antepone «hermanos» para conservar el énfasis vocativo y relacional del griego.
- source_word: ἱνατί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué motivo
  - ¿por qué razón
  lexicon: BDAG
  rationale: Interrogativo causal directo; «¿por qué?» es la equivalencia española más natural y precisa.
- source_word: ἀδικεῖτε ἀλλήλους
  english_pob_choice: are you wronging one another
  chosen_spanish: se hacen daño unos a otros
  alternatives_spanish:
  - se están haciendo injusticia unos a otros
  - se están agraviando mutuamente
  - se están tratando injustamente
  lexicon: BDAG
  rationale: 'ἀδικέω puede implicar hacer mal, cometer injusticia o perjudicar. En este contexto de conflicto entre dos hombres, «se hacen daño» comunica el agravio mutuo con claridad. La alternativa más cercana en registro jurídico sería «se hacen injusticia». '
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste revisado del inglés POB desde una formulación más idiomática hacia «reconciliar ... con la paz», procurando reflejar el matiz del imperfecto sin perder naturalidad española. También se observó que el contexto inmediato muestra un intento fallido de mediación, lo cual justifica un verbo de acción en curso o tentativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió un español directo y sobrio, evitando «brethren» o fórmulas eclesiásticas arcaizantes.
  - La relación de fraternidad se expresó con «hermanos» como equivalente natural de ἀδελφοί, sin necesidad de nota de inclusividad porque aquí se trata de dos varones concretos.
  - Se preservó la tensión aspectual del imperfecto en un verbo de intento («trataba de»).
