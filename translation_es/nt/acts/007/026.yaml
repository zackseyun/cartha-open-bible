    text: 'Or ''was reconciling them into peace.'' The Greek imperfect may be read as ongoing action, but here likely carries the sense of attempted action: Moses was trying to bring them to peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was trying to reconcile them to peace'.
    reason: previous_rendering
