base_translation:
  language: en
  yaml_path: translation/nt/acts/007/026.yaml
  text: And on the following day he appeared to them as they were fighting and was trying to reconcile them to peace[a], saying, ‘Men, you are brothers[b]; why are you wronging one another?’
  footnotes:
