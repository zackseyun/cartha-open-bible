translation:
  language: es
  text: Pero, estando lleno del Espíritu Santo, miró fijamente[a] al cielo y vio la gloria de Dios y a Jesús de pie a la derecha de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «miró atentamente al cielo».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «a la derecha de Dios» es un modismo bíblico que indica el lugar de mayor honor y autoridad.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπάρχων
  english_pob_choice: being
  chosen_spanish: estando
  alternatives_spanish:
  - siendo
  - hallándose
  lexicon: BDAG
  rationale: El participio presente introduce el estado continuo de Esteban antes de la acción principal. «Estando» reproduce bien ese valor circunstancial en español sin sonar forzado.
- source_word: πλήρης πνεύματος ἁγίου
  english_pob_choice: full of the Holy Spirit
  chosen_spanish: lleno del Espíritu Santo
  alternatives_spanish:
  - lleno de Espíritu Santo
  - lleno del espíritu santo
  lexicon: BDAG
  rationale: La expresión funciona como un modismo reconocible en español bíblico. Se mantiene la referencia personal al Espíritu Santo con artículo implícito en la forma natural española.
- source_word: ἀτενίσας
  english_pob_choice: gazed
  chosen_spanish: miró fijamente
  alternatives_spanish:
  - observó atentamente
  - fijó la vista
  lexicon: BDAG
  rationale: El aoristo participial expresa una mirada concentrada e intencional. «Miró fijamente» conserva esa intensidad de forma clara y natural en español.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo abierto
  - al cielo
  lexicon: BDAG
  rationale: En español «al cielo» comunica el destino de la mirada en una visión sin sobrecargar la frase; el contexto ya deja claro que no se trata solo del firmamento visible.
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - contempló
  - vislumbró
  lexicon: BDAG
  rationale: Es el verbo principal narrativo y se traduce de manera directa y sobria.
- source_word: δόξαν θεοῦ
  english_pob_choice: the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - la gloria de Dios
  - la gloria divina
  lexicon: BDAG
  rationale: «La gloria de Dios» preserva con claridad la manifestación visible de la majestad divina que el contexto presenta.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ἑστῶτα
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - erguido
  lexicon: BDAG
  rationale: La forma participial describe la postura de Jesús. «De pie» es idiomático y comunica la escena con naturalidad.
- source_word: ἐκ δεξιῶν τοῦ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la derecha de Dios
  alternatives_spanish:
  - a la diestra de Dios
  - a la derecha de Dios
  lexicon: BDAG
  rationale: El griego usa la expresión idiomática de honor y autoridad. En español, «a la derecha de Dios» mantiene el sentido sin sonar arcaico; «a la diestra» se reserva como alternativa tradicional.
theological_decisions:
- issue: Referencia personal del Espíritu Santo
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  rationale: En este contexto lucano la frase apunta a la persona del Espíritu, no a una cualidad abstracta. La mayúscula y el artículo en español ayudan a comunicar esa referencia personal sin añadir contenido ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Idiomática del «lado derecho» de Dios
  english_pob_reading: Jesus standing at the right hand of God
  chosen_spanish_reading: Jesús de pie a la derecha de Dios
  alternative_spanish_readings:
  - Jesús a la diestra de Dios
  - Jesús a la derecha de Dios
  rationale: Se conserva la distinción entre Dios y Jesús y la imagen de exaltación. «A la derecha de Dios» expresa el modismo de honor y autoridad en español contemporáneo; «a la diestra» sería una alternativa más tradicional.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con el audit trail inglés: participio circunstancial para ὑπάρχων, mirada intensa para ἀτενίσας, visión celestial para οὐρανός, y preservación del modismo de exaltación para ἐκ δεξιῶν τοῦ θεοῦ. No se requieren revisiones adicionales según el control de concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Espíritu Santo» para πνεύματος ἁγίου conforme a la terminología POB.
  - Se evita «Mesías» porque el texto dice Ἰησοῦν como nombre propio, no el título Χριστός.
  - Se usa español moderno y reverente, evitando arcaísmos innecesarios como «diestra» en el texto principal.
