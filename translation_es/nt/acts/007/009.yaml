translation:
  language: es
  text: Y los patriarcas, por envidia de José, lo vendieron a Egipto; y Dios estaba con él,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πατριάρχαι
  english_pob_choice: the patriarchs
  chosen_spanish: los patriarcas
  alternatives_spanish:
  - los padres
  - los antepasados
  lexicon: BDAG
  rationale: En Hechos 7, el término designa específicamente a los hijos de Jacob como los padres fundacionales de Israel. «Patriarcas» conserva ese sentido histórico-teológico con precisión y es el equivalente natural en español.
- source_word: ζηλώσαντες
  english_pob_choice: being jealous of
  chosen_spanish: movidos de envidia contra
  alternatives_spanish:
  - celosos de
  - envidiando a
  lexicon: BDAG
  rationale: El participio aoristo expresa la causa o motivo de la acción principal. «Movidos de envidia contra» conserva la fuerza afectiva del término y su función causal en un español claro y natural.
- source_word: ἀπέδοντο
  english_pob_choice: sold
  chosen_spanish: vendieron
  alternatives_spanish:
  - lo entregaron
  - lo dieron en venta
  lexicon: BDAG
  rationale: Aquí el verbo tiene el sentido concreto de vender a José, no solo de entregarlo. «Vendieron» preserva esa fuerza y encaja con el trasfondo de Génesis.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: into Egypt
  chosen_spanish: para Egipto
  alternatives_spanish:
  - a Egipto
  - dentro de Egipto
  lexicon: BDAG
  rationale: El griego señala movimiento hacia/para un destino. En español, «para Egipto» comunica bien la dirección del acto sin forzar una imagen menos natural que «hacia el interior de Egipto».
- source_word: ἦν ὁ θεὸς μετ’ αὐτοῦ
  english_pob_choice: God was with him
  chosen_spanish: Dios estaba con él
  alternatives_spanish:
  - Dios era con él
  - Dios estaba al lado de él
  lexicon: BDAG
  rationale: La frase declara la presencia favorable de Dios. «Dios estaba con él» es la forma más natural y fiel en español, sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: La presencia de Dios en medio del rechazo de José
  english_pob_reading: and God was with him
  chosen_spanish_reading: y Dios estaba con él
  alternative_spanish_readings:
  - y Dios estaba al lado de él
  - y Dios acompañaba a José
  rationale: La cláusula afirma la presencia de Dios con José a pesar de la traición de sus hermanos. Se mantiene esa tensión sin ampliar el texto con interpretaciones sobre providencia que el versículo no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el control cruzado; por eso el borrador español sigue de cerca el sentido ya estabilizado del texto griego y del auditorial inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva el nombre propio «José» sin glosa.
  - No se introduce nota textual porque el testimonio griego y el audit trail inglés coinciden sustancialmente.
