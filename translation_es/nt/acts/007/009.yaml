revisions:
- from: Y los patriarcas, movidos de envidia contra José, lo vendieron para Egipto; y Dios estaba con él,
  to: Y los patriarcas, por envidia de José, lo vendieron a Egipto; y Dios estaba con él,
  rationale: Se ajusta «para Egipto» a «a Egipto» por fidelidad idiomática a εἰς Αἴγυπτον en español natural. También se simplifica «movidos de envidia contra» a «por envidia de», que expresa claramente el motivo del participio ζηλώσαντες sin rigidez innecesaria. No hacen falta notas.
