translation:
  language: es
  text: ¿Quieres matarme[a] como mataste al egipcio ayer?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asesinarme». El verbo griego puede denotar quitar la vida o poner a muerte; aquí se traduce con el valor más general, «matar».
    reason: lexical_alternative
  - marker: b
    text: Esta pregunta alude a la muerte del egipcio cometida por Moisés el día anterior (véase Éx. 2:12, 14).
    reason: cross_reference
lexical_decisions:
- source_word: μὴ ἀνελεῖν με σὺ θέλεις
  english_pob_choice: Do you want to kill me
  chosen_spanish: ¿Quieres matarme
  alternatives_spanish:
  - ¿Quieres matarme de muerte?
  - ¿Quieres darme muerte?
  lexicon: BDAG; ἀναιρέω
  rationale: La pregunta retórica se expresa de forma natural en español con una estructura directa. Se mantiene el valor de ἀνελεῖν como dar muerte/matar, sin atenuarlo a un sentido más débil.
- source_word: ὃν τρόπον
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - del modo en que
  - tal como
  lexicon: BDAG; ὃν τρόπον
  rationale: En español, 'como' transmite bien la comparación de manera que introduce el paralelismo entre ambas acciones, con naturalidad y sin añadir matiz interpretativo.
- source_word: ἀνεῖλες
  english_pob_choice: killed
  chosen_spanish: mataste
  alternatives_spanish:
  - mataste de muerte
  - diste muerte
  lexicon: BDAG; ἀναιρέω
  rationale: Se conserva la consistencia léxica con el infinitivo anterior mediante el mismo verbo básico 'matar', que comunica el acto de dar muerte sin sobrecargar el juicio legal del término.
- source_word: ἐχθὲς
  english_pob_choice: yesterday
  chosen_spanish: ayer
  alternatives_spanish:
  - el día de ayer
  lexicon: BDAG; ἐχθές
  rationale: Adverbio temporal de equivalencia directa y natural en español.
- source_word: τὸν Αἰγύπτιον
  english_pob_choice: the Egyptian
  chosen_spanish: al egipcio
  alternatives_spanish:
  - al egipcio aquel
  - al hombre egipcio
  lexicon: BDAG; Αἰγύπτιος
  rationale: El griego usa un gentilicio sustantivado; en español, 'al egipcio' reproduce esa función de modo idiomático y claro.
theological_decisions:
- issue: Nuance moral/legal de ἀναιρέω en la acusación
  english_pob_reading: Render neutrally as 'kill' rather than 'murder' in the main text
  chosen_spanish_reading: Traducir con 'matar' en el texto principal, sin fijar explícitamente 'asesinar' o 'asesinarte'
  alternative_spanish_readings:
  - asesinarme ... como asesinaste al egipcio
  - darme muerte ... como diste muerte al egipcio
  rationale: El griego permite el sentido general de quitar la vida; el contexto implica reproche, pero el término por sí solo no obliga a una formulación más jurídica. 'Matar' preserva esa amplitud y sigue la decisión auditada de la POB en inglés.
  doctrine_reference: BDAG; nota auditada de la POB sobre ἀναιρέω y la acusación en Éxodo 2:12, 14
- issue: Referencia implícita a la muerte del egipcio
  english_pob_reading: This question alludes to Moses' killing of an Egyptian the previous day
  chosen_spanish_reading: Mantener la alusión sin explicarla dentro del texto principal
  alternative_spanish_readings:
  - '...ayer, como recuerdas al egipcio'
  - '...ayer, en alusión al egipcio'
  rationale: La frase ya presupone el episodio conocido; una explicación intratextual excedería el nivel del versículo. La alusión queda suficientemente clara por la mención del egipcio y 'ayer'.
  doctrine_reference: Éxodo 2:12, 14; Hechos 7:28
translation_notes:
  revision_awareness: 'Se siguió el criterio auditado de la POB en inglés: mantener ἀναιρέω con un verbo general de dar muerte en ambas ocurrencias, y conservar ὃν τρόπον con una comparación natural y formal mediante ''como''. Se evitó traducir mecánicamente desde el inglés, pero se respetó su decisión léxica y su nota de alusión a Éxodo.'
  spanish_consistency_notes:
  - Se mantuvo 'matar' de forma consistente para ἀνελεῖν/ἀνεῖλες.
  - Se evitó 'SEÑOR' u այլ equivalentes no pertinentes; no hay vocabulario teológico sensible en este versículo.
  - La puntuación interrogativa española se ajustó para reflejar la fuerza retórica del griego.
