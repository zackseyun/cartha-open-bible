  text: οὗτός ἐστιν ὁ γενόμενος ἐν τῇ ἐκκλησίᾳ ἐν τῇ ἐρήμῳ μετὰ τοῦ ἀγγέλου τοῦ λαλοῦντος αὐτῷ ἐν τῷ ὄρει Σινᾶ καὶ τῶν πατέρων ἡμῶν, ὃς ἐδέξατο ⸀λόγια ζῶντα δοῦναι ⸀ἡμῖν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/038.yaml
  text: This is the one who was in the assembly in the wilderness with the angel who was speaking to him on Mount Sinai[a], and with our fathers[c][b]; he received living oracles to give to us.
  footnotes:
