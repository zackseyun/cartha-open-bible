revisions:
- from: Este es el que estuvo en la asamblea[a] en el desierto, con el ángel que le hablaba en el monte Sinaí y con nuestros padres[c][b]; él recibió oráculos vivos para darnos[a].
  to: Este es el que estuvo en la asamblea[a] en el desierto, con el ángel que le hablaba en el monte Sinaí y con nuestros padres[c]; él recibió oráculos vivos[b] para darnos.
  rationale: 'Se corrige un error editorial importante: la nota [a] no puede reutilizarse al final. También se reubica la nota [b] junto a «oráculos vivos», que es el lugar semánticamente correcto para la alternativa léxica, y se elimina el marcador espurio del final. El resto del texto se mantiene sustancialmente, con una redacción final precisa y natural que sigue el sentido del griego y las decisiones documentadas del POB.'
