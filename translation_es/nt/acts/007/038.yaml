translation:
  language: es
  text: Este es el que estuvo en la asamblea[a] en el desierto, con el ángel que le hablaba en el monte Sinaí y con nuestros padres[c]; él recibió oráculos vivos[b] para darnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «congregación»; tradicionalmente, «iglesia en el desierto».
    reason: alternative_reading
  - marker: b
    text: O «oráculos vivientes» o «palabras vivas».
    reason: lexical_alternative
  - marker: c
    text: «Nuestros padres» se refiere a los antepasados de Israel; algunas traducciones lo vierten más generalmente como «nuestros antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - iglesia
  lexicon: BDAG
  rationale: «Asamblea» conserva el sentido básico de un pueblo reunido sin importar en español la noción eclesiástica posterior de «iglesia»; «congregación» también es posible, pero «asamblea» es más natural y directo en este contexto histórico-salvífico.
- source_word: ἐρήμῳ
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - yermo
  - despoblado
  lexicon: BDAG
  rationale: En este contexto bíblico, «desierto» comunica bien el escenario del éxodo y la peregrinación de Israel. «Yermo» o «despoblado» sonarían más marcados o menos naturales para el lector general.
- source_word: ἀγγέλου
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: La referencia en el marco de Sinaí y Hechos 7 apunta con mayor probabilidad a un ser angelical; por eso «ángel» es la opción más directa y fiel.
- source_word: λαλοῦντος
  english_pob_choice: who was speaking
  chosen_spanish: que le hablaba
  alternatives_spanish:
  - que estaba hablando
  - hablándole
  lexicon: BDAG
  rationale: El participio se vierte con una relativa natural en español. «Le hablaba» conserva el aspecto progresivo de la escena sin sonar pesado.
- source_word: ὄρει Σινᾶ
  english_pob_choice: Mount Sinai
  chosen_spanish: monte Sinaí
  alternatives_spanish:
  - el monte Sinaí
  lexicon: BDAG
  rationale: «Monte Sinaí» es la forma idiomática y transparente en español; mantiene el referente geográfico sin artificio.
- source_word: πατέρων ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres e hijos
  lexicon: BDAG
  rationale: Se mantiene «padres» porque el griego es masculino y alude a los antepasados de Israel. «Antepasados» es una posible aclaración, pero suaviza la forma concreta del original.
- source_word: ἐδέξατο
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - aceptó
  lexicon: BDAG
  rationale: «Recibió» es la traducción más transparente para el acto de Moisés como receptor de la revelación divina.
- source_word: λόγια
  english_pob_choice: oracles
  chosen_spanish: oráculos
  alternatives_spanish:
  - palabras
  - declaraciones
  - dichos
  lexicon: BDAG
  rationale: «Oráculos» preserva el valor de λόγια como enunciados divinos solemnes, mejor que «palabras», que sería demasiado general.
- source_word: ζῶντα
  english_pob_choice: living
  chosen_spanish: vivos
  alternatives_spanish:
  - vivientes
  - vivificadores
  lexicon: BDAG
  rationale: «Vivos» refleja con claridad el participio sin añadir explícitamente la interpretación «vivificadores», que sería más explicativa que el griego.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - conceder
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa naturalmente en español con «dar», que conserva la relación entre recibir y transmitir la revelación.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: «A nosotros» mantiene la referencia directa al auditorio incluido en la historia de Israel, sin diluirla en una formulación más interpretativa.
- source_word: ὁ γενόμενος
  english_pob_choice: the one who was
  chosen_spanish: el que estuvo
  alternatives_spanish:
  - el que fue
  - el que llegó a estar
  lexicon: BDAG
  rationale: «El que estuvo» comunica de manera natural la presencia de Moisés en ese escenario. «El que fue» resultaría más ambiguo; «llegó a estar» sería demasiado literal y pesado.
theological_decisions:
- issue: Cómo rendir ἐκκλησίᾳ sin importar la institución eclesiástica posterior
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - iglesia
  - congregación
  rationale: La escena habla de Israel reunido en el desierto, no de la iglesia neotestamentaria como institución. «Asamblea» conserva el sentido de un pueblo convocado y evita una lectura eclesiológica no exigida por el texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo preservar la tensión de λόγια ζῶντα
  english_pob_reading: living oracles
  chosen_spanish_reading: oráculos vivos
  alternative_spanish_readings:
  - oráculos vivientes
  - palabras vivas
  - oráculos que dan vida
  rationale: '«Oráculos vivos» mantiene la brevedad y la fuerza del griego: son dichos divinos caracterizados por estar vivos, sin reducirlos a una paráfrasis explicativa como «que dan vida».'
  doctrine_reference: Translation philosophy §3
- issue: Si traducir πατέρων ἡμῶν como una forma más inclusiva
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El griego usa un sustantivo masculino y remite a los patriarcas/antepasados de Israel. «Nuestros padres» mantiene la forma histórica y la conexión genealógica del texto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el control más reciente; el pasaje quedó estable con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «asamblea» y la nota tradicional «iglesia en el desierto», como en el audit trail inglés.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no lo contiene; no hay necesidad de una convención de sustitución aquí.
  - Se preservó «oráculos» para λόγια y no se rebajó a «palabras», para conservar la densidad revelatoria del griego.
  - La puntuación sigue la sintaxis española y conserva la pausa fuerte antes de la cláusula final de resultado/proósito.
