translation:
  language: es
  text: 'Entonces el Señor le dijo: «Quítate la sandalia de tus pies,[a] porque el lugar donde estás de pie es tierra santa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Desata la sandalia de tus pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En la cita del episodio de la zarza ardiente, κύριος funciona como título reverencial para Dios; en español bíblico, «Señor» conserva esa función sin introducir la convención tipográfica de «SEÑOR», que no aparece en el griego de este versículo.
- source_word: Λῦσον
  english_pob_choice: Take off
  chosen_spanish: Quítate
  alternatives_spanish:
  - Desátate
  - Suelta
  lexicon: BDAG
  rationale: Aunque λύω puede significar literalmente «desatar/soltar», con calzado el sentido idiomático es removerlo. «Quítate» expresa con naturalidad la acción imperativa en español.
- source_word: τὸ ὑπόδημα
  english_pob_choice: the sandals
  chosen_spanish: las sandalias
  alternatives_spanish:
  - las sandalia
  - el calzado
  lexicon: BDAG
  rationale: El griego presenta el sustantivo en singular, pero el audit trail inglés revisado optó por el plural para reflejar mejor el referente de calzado en español. «Sandalias» es la forma más natural y clara; además, «quítate las sandalias de los pies» reproduce bien el mandato idiomático.
- source_word: τῶν ποδῶν σου
  english_pob_choice: from your feet
  chosen_spanish: de los pies
  alternatives_spanish:
  - de tu pie
  lexicon: BDAG
  rationale: El griego usa plural («pies»). En español, la expresión fija «de los pies» comunica de forma natural la referencia al lugar desde donde se debe retirar el calzado.
- source_word: ὁ γὰρ τόπος
  english_pob_choice: for the place
  chosen_spanish: porque el lugar
  alternatives_spanish:
  - pues el lugar
  - ya que el lugar
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la orden anterior. «Porque» transmite bien esa relación causal/explanatoria en español.
- source_word: ἐφ’ ᾧ
  english_pob_choice: on which
  chosen_spanish: en que
  alternatives_spanish:
  - sobre el cual
  - en el cual
  lexicon: BDAG
  rationale: La construcción relativa con ἐπί se puede verter de manera más natural en español como «en que»; mantiene la referencia espacial sin sonar rígida.
- source_word: ἕστηκας
  english_pob_choice: you are standing
  chosen_spanish: estás
  alternatives_spanish:
  - estás de pie
  - te encuentras
  lexicon: BDAG
  rationale: El perfecto de ἵστημι tiene aquí sentido de estado presente. En español, «estás» funciona de modo natural con la cláusula relativa y conserva la idea de postura actual.
- source_word: γῆ ἁγία
  english_pob_choice: holy ground
  chosen_spanish: tierra santa
  alternatives_spanish:
  - suelo santo
  - terreno santo
  lexicon: BDAG
  rationale: γῆ puede significar tierra, suelo o terreno; en este contexto bíblico, «tierra santa» es una expresión clara y fiel. «Santa» conserva el predicado adjetival del griego sin necesidad de una frase más pesada.
theological_decisions:
- issue: Título divino en la cita del éxodo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto griego dice κύριος, y la cita reproduce la forma del discurso en griego. Aunque el trasfondo narrativo remite al nombre divino, aquí la primacía del texto fuente favorece «Señor». No se introduce «Yahvé» porque el versículo no usa el Tetragrámaton en griego, y no se usa «SEÑOR» como convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord; Translation philosophy #1 and #2'
- issue: Lugar sagrado en la teofanía
  english_pob_reading: holy ground
  chosen_spanish_reading: tierra santa
  alternative_spanish_readings:
  - suelo santo
  - terreno santo
  rationale: La declaración no describe una santidad abstracta, sino que consagra el espacio inmediato de la manifestación divina. «Tierra santa» preserva esa idea de espacio santo y es idiomática en español.
  doctrine_reference: Éxodo 3:5; Hechos 7:33
translation_notes:
  revision_awareness: El borrador inglés pasó de «the sandal» a «the sandals» para reflejar mejor el plural semántico del calzado en el mandato; el español sigue esa revisión con «las sandalias». También se mantuvo la opción reverencial «Señor» en lugar de una máscara tipográfica o una transliteración del nombre divino, conforme al audit trail.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, en coherencia con el criterio POB auditado para este versículo.
  - Se evita «LORD»/«SEÑOR» como convención tipográfica ajena al texto griego; la reverencia se expresa léxicamente.
  - «Sandalias» refleja con naturalidad el plural revisado en la tradición auditada, aunque el singular griego se considere en la nota.
  - «Tierra santa» mantiene el valor de γῆ ἁγία sin introducir un calco torpe.
  - Los pies aparecen en plural, como en el griego.
