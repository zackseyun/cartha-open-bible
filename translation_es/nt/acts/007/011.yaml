review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego, pero hay dos desajustes importantes con el sentido fuente y la auditoría inglesa: λιμός se refiere a una hambruna/famine más que a «hambre» como sensación, y la nota léxica preservada en inglés para «our fathers» no fue trasladada al español. Además, «no hallaban» no expresa tan claramente como el inglés auditado la incapacidad práctica del imperfecto οὐχ ηὕρισκον.'
  spanish_quality_summary: El español es legible y digno, pero «vino un hambre» suena menos natural y preciso que «hubo una hambruna» o «vino una hambruna». «Gran angustia» es posible, aunque «gran aflicción» o «gran sufrimiento» se acercan mejor a θλῖψις como penuria objetiva. La frase mejora en naturalidad con una redacción menos calcada.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la política de lenguaje ancestral. Debe conservarse «nuestros padres» en el texto principal, pero conviene añadir la nota alternativa «nuestros antepasados», ya que el inglés POB la documentó explícitamente.
  issues:
  - severity: medium
    issue: «hambre» para λιμός
    rationale: λιμός en este contexto describe una calamidad regional de escasez de alimentos, es decir, «hambruna», no meramente el estado de tener hambre. «Hambre» debilita la precisión del evento.
  - severity: medium
    issue: Falta la nota para «nuestros padres»
    rationale: La auditoría inglesa conserva una nota léxica alternativa («our ancestors»). Esa alternativa también es relevante en español («nuestros antepasados») y debe preservarse.
  - severity: low
    issue: «no hallaban» atenúa la fuerza de incapacidad
    rationale: El imperfecto οὐχ ηὕρισκον, auditado como «could not find», se comunica más claramente con «no podían encontrar» que con el más literario «no hallaban».
  revised_spanish_text: Entonces hubo una hambruna sobre todo Egipto y Canaán, y gran aflicción, y nuestros padres[a] no podían encontrar alimentos.
  revised_footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice «nuestros padres», refiriéndose a los antepasados de Israel.
    reason: lexical_alternative
  revision_rationale: Se ajusta λιμός a «hambruna» para reflejar mejor una carestía regional, se explicita la incapacidad continua de οὐχ ηὕρισκον con «no podían encontrar», y se restaura la nota léxica documentada para «nuestros padres». «Gran aflicción» representa bien θλῖψις μεγάλη en este contexto histórico sin cargarlo con sentido escatológico. No se requiere adjudicación adicional.
