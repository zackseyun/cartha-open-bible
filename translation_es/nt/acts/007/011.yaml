translation:
  language: es
  text: Entonces hubo una hambruna sobre todo Egipto y Canaán, y gran aflicción, y nuestros padres[a] no podían encontrar alimentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice «nuestros padres», refiriéndose a los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sobrevino
  lexicon: BDAG
  rationale: En español, con λιμός, «vino» comunica la llegada de la calamidad de modo natural y mantiene el valor eventivo del aoristo sin añadir explicación.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ introduce la secuencia narrativa; «Entonces» funciona bien en español para marcar avance del relato sin expresar contraste fuerte.
- source_word: λιμὸς
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez de alimentos
  lexicon: BDAG
  rationale: El término griego puede abarcar hambre generalizada o hambruna. En español, «hambre» conserva la amplitud semántica de la crisis sin sonar demasiado técnico; «famine» sería un préstamo innecesario y «escasez de alimentos» explica más de lo que dice el texto.
- source_word: ἐφ’ ὅλην τὴν Αἴγυπτον καὶ Χανάαν
  english_pob_choice: over all Egypt and Canaan
  chosen_spanish: sobre todo Egipto y Canaán
  alternatives_spanish:
  - por toda Egipto y Canaán
  - a través de todo Egipto y Canaán
  lexicon: BDAG
  rationale: La construcción con ἐπί + acusativo indica extensión territorial. «Sobre todo Egipto y Canaán» refleja esa cobertura regional de forma idiomática en español.
- source_word: Χανάαν
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canán
  lexicon: BDAG
  rationale: Se usa la forma castellana asentada del topónimo bíblico.
- source_word: θλῖψις μεγάλη
  english_pob_choice: great distress
  chosen_spanish: gran angustia
  alternatives_spanish:
  - gran aflicción
  - gran tribulación
  - severa penuria
  lexicon: BDAG
  rationale: θλῖψις aquí describe la presión o aflicción causada por la crisis, no un uso técnico escatológico. «Gran angustia» es claro, digno y conserva el peso emocional sin cargar el término con connotaciones doctrinales ajenas al contexto.
- source_word: οὐχ ηὕρισκον
  english_pob_choice: could not find
  chosen_spanish: no hallaban
  alternatives_spanish:
  - no podían encontrar
  - no encontraban
  lexicon: BDAG
  rationale: El imperfecto marca una incapacidad continua durante el tiempo de la carestía. «No hallaban» expresa bien esa situación persistente en español, de forma natural y concisa.
- source_word: χορτάσματα
  english_pob_choice: food
  chosen_spanish: alimentos
  alternatives_spanish:
  - comida
  - provisiones
  - víveres
  lexicon: BDAG
  rationale: χορτάσματα denota provisiones para saciar el hambre. «Alimentos» es un equivalente amplio y sobrio; evita reducir el sentido a un solo tipo de comida.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres y madres
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego. En español, «padres» puede referirse al linaje ancestral y mantiene la referencia histórica a los patriarcas/antepasados de Israel sin neutralizar el texto.
theological_decisions:
- issue: Lenguaje ancestral masculino
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El griego dice literalmente «nuestros padres» y se refiere a los antepasados de Israel. Se conserva el masculino porque es parte del texto fuente y porque aquí no crea ambigüedad doctrinal; la opción neutral «antepasados» sería posible, pero atenúa la forma explícita del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión disponible indica alta conformidad y ningún cambio necesario en el pasaje de referencia; esta redacción mantiene el mismo contenido semántico principal con ajustes naturales al español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones teológicas no presentes en el versículo.
  - Se mantuvo la distinción entre la calamidad general («hambre») y la aflicción asociada («gran angustia»).
  - Se conservó el plural masculino «padres» para reflejar el griego οἱ πατέρες ἡμῶν.
