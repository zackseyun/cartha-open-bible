translation:
  language: es
  text: Yo soy el Dios de tus padres[a], el Dios de Abraham, de Isaac y de Jacob. Entonces Moisés se llenó de temor y no se atrevía a mirar de cerca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de tus antepasados». «Padres» conserva el sentido literal de πατέρων y el eco del lenguaje del pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a examinar» o «a observar de cerca». El verbo griego puede denotar mirar cuidadosamente o considerar atentamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  lexicon: BDAG
  rationale: El griego usa un pronombre enfático dentro de una identificación divina; en español, «Yo soy» expresa de forma natural la misma autodeclaración, sin omitir la fuerza enfática de ἐγώ.
- source_word: ὁ θεὸς
  english_pob_choice: the God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: El artículo definido funciona en una fórmula de identificación; «el Dios» mantiene la forma del título y su valor identificador en la cita.
- source_word: τῶν πατέρων σου
  english_pob_choice: of your fathers
  chosen_spanish: de tus padres
  alternatives_spanish:
  - de tus antepasados
  - de tus antecesores
  lexicon: BDAG
  rationale: «Padres» conserva el sentido literal de πατέρων y el eco de lenguaje pactal. Se usa el posesivo de segunda persona singular porque el destinatario es Moisés.
- source_word: ὁ θεὸς Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: the God of Abraham and Isaac and Jacob
  chosen_spanish: el Dios de Abraham, de Isaac y de Jacob
  alternatives_spanish:
  - el Dios de Abraham e Isaac y Jacob
  - el Dios de Abraham, Isaac y Jacob
  lexicon: BDAG
  rationale: Se conserva la repetición de «de» para reflejar la estructura appositiva griega y el tono citacional. La coordinación española naturaliza el encadenamiento sin perder la cadencia bíblica.
- source_word: ἔντρομος
  english_pob_choice: terrified
  chosen_spanish: tembloroso
  alternatives_spanish:
  - aterrado
  - lleno de temor
  - tremendo de miedo
  lexicon: BDAG
  rationale: ἔντρομος expresa estar temblando por miedo. «Tembloroso» conserva la imagen física y evita intensificar más allá de lo que el término griego exige.
- source_word: γενόμενος
  english_pob_choice: becoming
  chosen_spanish: al ponerse
  alternatives_spanish:
  - habiendo quedado
  - habiendo llegado a estar
  lexicon: BDAG
  rationale: El participio aoristo indica entrada en un estado. La construcción «al ponerse tembloroso» reproduce esa transición de manera idiomática en español.
- source_word: οὐκ ἐτόλμα
  english_pob_choice: did not dare
  chosen_spanish: no se atrevía
  alternatives_spanish:
  - no osaba
  - no se atrevió
  lexicon: BDAG
  rationale: El imperfecto de τολμάω sugiere una renuencia sostenida. «No se atrevía» comunica bien esa continuidad y suena natural en español actual.
- source_word: κατανοῆσαι
  english_pob_choice: to look closely
  chosen_spanish: mirar con atención
  alternatives_spanish:
  - examinar
  - observar con detenimiento
  - considerar atentamente
  lexicon: BDAG
  rationale: En el contexto visual de la zarza ardiente, κατανοέω puede referirse a observar cuidadosamente. «Mirar con atención» conserva la dimensión perceptiva y evita tecnicismos innecesarios.
theological_decisions:
- issue: Identificación divina en cita de Éxodo con referencia a Yahvé
  english_pob_reading: I am the God of your fathers
  chosen_spanish_reading: Yo soy el Dios de tus padres
  alternative_spanish_readings:
  - Yo soy el Dios de tus antepasados
  rationale: Aunque el pasaje griego cita la autodeclaración de Dios sin explicitar el tetragrámaton, el contexto del episodio en Éxodo remite a la autoidentificación divina de Yahvé. Se mantiene «Dios» como traducción de θεός y se preserva el eco de la revelación sin sustituirla por una fórmula eclesiástica distinta.
  doctrine_reference: Éxodo 3:6; Hechos 7:32; principio POB de primacía del texto fuente con transparencia terminológica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que convirtió «becoming terrified» en una cláusula finita por fluidez. En español, la estructura participial «al ponerse tembloroso» permite conservar la secuencia aspectual del griego sin sonar artificial, por lo que no fue necesario adoptar una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se traduce Ἰησοῦς no aplica en este versículo; no hay otras designaciones cristológicas.
  - Se preserva el tono citacional bíblico mediante repeticiones controladas («de Abraham, de Isaac y de Jacob»).
  - No se usa «SEÑOR» como sustituto del nombre divino en este versículo porque el griego cita θεός, no κύριος.
