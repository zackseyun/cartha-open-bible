translation:
  language: es
  text: Así que Moisés huyó[a] por estas palabras, y se hizo forastero[b] en la tierra de Madián, donde fue padre de dos hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de esta declaración». El griego puede entenderse como la causa inmediata de la huida.
    reason: lexical_alternative
  - marker: b
    text: O «vivió como extranjero» o «se hizo residente extranjero». El término describe a alguien que habita en una tierra que no es la suya.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se fugó
  lexicon: BDAG
  rationale: El aoristo de φεύγω expresa huida repentina; en español, «huyó» conserva la fuerza narrativa sin sonar artificioso. «Escapó» puede sugerir liberación más que huida, y «se fugó» es más coloquial.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ aquí enlaza la secuencia narrativa con leve fuerza inferencial. «Así que» comunica bien ese paso lógico sin volverlo excesivamente formal.
- source_word: ἐν τῷ λόγῳ τούτῳ
  english_pob_choice: at this word
  chosen_spanish: por esta palabra
  alternatives_spanish:
  - a causa de esta palabra
  - por esta declaración
  - al oír esta palabra
  lexicon: BDAG
  rationale: La frase griega es compacta y puede indicar el motivo inmediato de la huida. «Por esta palabra» mantiene la brevedad y el vínculo causal. Se evita explicitar demasiado el matiz para no sobreparafrasear.
- source_word: ἐγένετο πάροικος
  english_pob_choice: became a sojourner
  chosen_spanish: se hizo forastero
  alternatives_spanish:
  - habitó como extranjero
  - se hizo residente extranjero
  - se convirtió en peregrino
  lexicon: BDAG
  rationale: πάροικος denota a alguien que vive en tierra ajena, con matiz de extranjería/residencia temporal. «Forastero» comunica bien esa condición en español sin imponer un tecnicismo moderno ni desplazar el matiz bíblico.
- source_word: ἐν γῇ Μαδιάμ
  english_pob_choice: in the land of Midian
  chosen_spanish: en la tierra de Madián
  alternatives_spanish:
  - en Madián
  - en la región de Madián
  lexicon: BDAG
  rationale: «Tierra» reproduce γῇ y mantiene la formulación geográfica del griego. «Madián» sigue la forma española usual del topónimo.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - allí donde
  lexicon: BDAG
  rationale: El adverbio relativo introduce el lugar de la acción siguiente; «donde» es la equivalencia natural y precisa en español.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: BDAG
  rationale: «Engendró» conserva la referencia masculina del sujeto y la fuerza verbal del griego mejor que un «tuvo» más genérico. Aunque es más solemne, aquí encaja con el registro bíblico y la precisión lexical.
- source_word: υἱοὺς δύο
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos varones
  - dos hijos varones
  lexicon: BDAG
  rationale: El griego dice literalmente «dos hijos»; en español eso es natural y suficiente. «Hijos varones» sería más explícito, pero no es necesario en este contexto.
translation_notes:
  revision_awareness: El texto coincide con la revisión más reciente indicada como sin cambios; no se detectan ajustes posteriores que requieran alterar la redacción base.
  spanish_consistency_notes:
  - Se mantiene «Madián» para el topónimo y «tierra» para γῇ, en línea con la formulación geográfica del griego.
  - Se evita «SEÑOR» o «Cristo» porque el versículo no contiene esos términos ni alusiones que requieran decisión terminológica adicional.
  - «Forastero» se usa para preservar el matiz de πάροικος sin introducir un tecnicismo eclesial ajeno al contexto.
  - La puntuación sigue la segmentación narrativa del original con dos cláusulas coordinadas y una relativa final.
