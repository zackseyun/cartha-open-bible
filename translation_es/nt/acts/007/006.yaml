    reason: lexical_alternative
  revision_rationale: 'Se revisa πάροικον ἐν γῇ ἀλλοτρίᾳ a una expresión más natural y clara en español contemporáneo (''forasteros en tierra ajena''), evitando la ambigüedad de ''peregrina''. También se adopta el plural semántico en el texto principal (''sus descendientes ... los'') para mejorar la fluidez del español, mientras se preserva en nota la característica importante del griego: el singular colectivo de σπέρμα con pronombre singular. Se mantiene ''esclavizar'' por fidelidad al grupo δουλ-.'
