review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego: conserva la introducción formal (''Pero Dios habló de esta manera''), el singular colectivo de σπέρμα con ''su descendencia'', el valor fuerte de δουλόω con ''esclavizar'', y la duración ''durante cuatrocientos años''. Sin embargo, ''peregrina en tierra ajena'' no expresa con suficiente claridad moderna el sentido de πάροικον ἐν γῇ ἀλλοτρίᾳ; en español eclesial general ''peregrina'' puede sugerir viaje devocional más que residencia forastera. Además, el singular predicativo con un colectivo abstracto suena algo forzado. Conviene una formulación más natural que preserve la extranjería/residencia ajena.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'sería peregrina en tierra ajena' resulta menos natural y potencialmente ambigua para lectores contemporáneos. 'Residente forastera en tierra ajena' sería demasiado técnica; una solución mejor es pasar a una expresión idiomática con plural semántico y conservar la nota sobre el singular colectivo. El resto del verso es legible y fiel.
  glossary_alignment: 'No hay conflicto con los términos de proyecto principales. ''Dios'' y ''esclavizar'' están bien alineados. La cuestión principal es léxica/estilística en πάροικον: se recomienda ''forasteros'' o ''extranjeros'' en el texto español por claridad, con nota que preserve el singular colectivo griego. Esto también armoniza mejor con la revisión inglesa final, que priorizó la naturalidad de ''sojourners''.'
  issues:
  - severity: medium
    issue: '''Peregrina en tierra ajena'' suena ambigua y poco natural'
    rationale: πάροικον denota residencia forastera/no propia; 'peregrina' en español moderno puede evocar peregrinación religiosa o viaje, no necesariamente condición social de extranjero residente.
  - severity: medium
    issue: El singular colectivo se conserva, pero en español produce rigidez innecesaria en esta cláusula
    rationale: Aunque el griego usa singular colectivo, el propio expediente inglés terminó usando plural en el texto principal y dejó constancia del singular en nota. En español, 'su descendencia serían forasteros' o 'sería forastera' generan tensión gramatical/estilística; una solución idiomática principal con nota es preferible.
  - severity: low
    issue: La nota actual explica bien el singular colectivo, pero debería ajustarse al nuevo texto principal
    rationale: Si el texto principal pasa a plural semántico, la nota debe señalar explícitamente que el griego usa singular colectivo ('descendencia ... la').
  revised_spanish_text: 'Pero Dios habló de esta manera: que sus descendientes serían forasteros en tierra ajena[a], y los esclavizarían y los maltratarían durante cuatrocientos años.'
