- from: 'Pero Dios habló de esta manera: que su descendencia sería peregrina en tierra ajena[a], y la esclavizarían y la maltratarían durante cuatrocientos años.'
  to: 'Pero Dios habló de esta manera: que sus descendientes serían forasteros en tierra ajena[a], y los esclavizarían y los maltratarían durante cuatrocientos años.'
  rationale: 'Se revisa πάροικον ἐν γῇ ἀλλοτρίᾳ a una expresión más natural y clara en español contemporáneo (''forasteros en tierra ajena''), evitando la ambigüedad de ''peregrina''. También se adopta el plural semántico en el texto principal (''sus descendientes ... los'') para mejorar la fluidez del español, mientras se preserva en nota la característica importante del griego: el singular colectivo de σπέρμα con pronombre singular. Se mantiene ''esclavizar'' por fidelidad al grupo δουλ-.'
