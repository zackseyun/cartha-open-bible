translation:
  language: es
  text: 'Pero Dios habló de esta manera: que sus descendientes serían forasteros en tierra ajena[a], y los esclavizarían y los maltratarían durante cuatrocientos años.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''que su descendencia sería forastera en tierra ajena, y la esclavizarían y la maltratarían durante cuatrocientos años''. El griego usa un singular colectivo: ''descendencia ... la''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν δὲ οὕτως
  english_pob_choice: But God spoke in this way
  chosen_spanish: Pero Dios habló de esta manera
  alternatives_spanish:
  - Y Dios habló así
  - Pero Dios dijo así
  lexicon: BDAG
  rationale: δέ introduce continuidad con leve contraste, y οὕτως conviene conservarlo con una expresión explícita en español. 'Habló de esta manera' mantiene el tono formal de introducción de la cita sin sonar rígido.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Se sigue el uso normal del español y no se reproduce el artículo griego, que no aporta naturalidad en esta construcción.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  lexicon: BDAG
  rationale: '''Que'' introduce de forma natural el contenido del discurso directo/indirecto en español y conserva la función completiva.'
- source_word: ἔσται
  english_pob_choice: would be
  chosen_spanish: sería
  alternatives_spanish:
  - será
  - habría de ser
  lexicon: BDAG
  rationale: En discurso indirecto tras un verbo pasado, el futuro griego se corresponde bien con el condicional en español, manteniendo la perspectiva futura respecto del momento de la խոսca.
- source_word: τὸ σπέρμα αὐτοῦ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus descendientes
  lexicon: BDAG
  rationale: σπέρμα aquí es colectivo. 'Descendencia' preserva la colectividad y es idiomática en español bíblico sin perder el vínculo con la promesa a Abraham.
- source_word: πάροικον ἐν γῇ ἀλλοτρίᾳ
  english_pob_choice: sojourners in a foreign land
  chosen_spanish: peregrina en tierra ajena
  alternatives_spanish:
  - forastera en tierra extranjera
  - residente forastera en tierra extraña
  lexicon: BDAG
  rationale: πάροικος expresa residencia no propia, condición de forastería o estancia ajena. 'Peregrina' comunica esa situación temporal y de extrañeza; 'tierra ajena' conserva ἀλλοτρία sin endurecerlo con un calco innecesario.
- source_word: δουλώσουσιν αὐτὸ
  english_pob_choice: they would enslave them
  chosen_spanish: la esclavizarían
  alternatives_spanish:
  - los esclavizarían
  - la harían esclava
  lexicon: BDAG
  rationale: δουλόω se vierte con 'esclavizar' para mantener la fuerza léxica. El singular colectivo de σπέρμα permite 'la', que conserva correspondencia formal con el objeto singular griego.
- source_word: κακώσουσιν
  english_pob_choice: mistreat
  chosen_spanish: la maltratarían
  alternatives_spanish:
  - la afligirían
  - la oprimirían
  lexicon: BDAG
  rationale: κακόω denota hacer daño o tratar con crueldad. 'Maltratar' es claro, amplio y suficientemente fuerte para abarcar la idea de aflicción/opresión sin precisar más de lo que el griego exige.
- source_word: ἔτη τετρακόσια
  english_pob_choice: for four hundred years
  chosen_spanish: durante cuatrocientos años
  alternatives_spanish:
  - por cuatrocientos años
  - por un período de cuatrocientos años
  lexicon: BDAG
  rationale: El acusativo de duración se expresa de manera natural con 'durante' en español, conservando la extensión temporal sin añadir sentido ajeno.
theological_decisions:
- issue: Tratamiento del singular colectivo en 'σπέρμα' y el pronombre objeto
  english_pob_reading: 'The Greek uses a collective singular: ''offspring ... it.'' The English POB preserves the singular collectively in the main text, with a footnote for the idiomatic plural.'
  chosen_spanish_reading: 'Se conserva el singular colectivo en español: ''su descendencia ... la esclavizarían ... la maltratarían''.'
  alternative_spanish_readings:
  - '''sus descendientes ... los esclavizarían ... los maltratarían'''
  - '''su descendencia ... los esclavizarían ... los maltratarían'''
  rationale: El griego presenta σπέρμα como singular colectivo y usa αὐτό en singular. Mantener ese rasgo en español evita suavizar una tensión textual importante y refleja la unidad de la posteridad prometida, aunque suene menos idiomático que el plural.
  doctrine_reference: Translation philosophy §1 (primacy of original-language evidence) and §5 (consistency of key terms)
- issue: Rendered term for enslaving
  english_pob_reading: enslave
  chosen_spanish_reading: esclavizar
  alternative_spanish_readings:
  - hacer esclavo
  - poner en esclavitud
  rationale: El grupo δουλ- exige una traducción con fuerza de servidumbre forzada. 'Esclavizar' conserva ese peso léxico mejor que opciones más suaves como 'someter'.
  doctrine_reference: Project-level terminology default for δοῦλος / δουλόω
- issue: Rendered term for foreign/strange land
  english_pob_reading: foreign land
  chosen_spanish_reading: tierra ajena
  alternative_spanish_readings:
  - tierra extranjera
  - tierra extraña
  rationale: ἀλλοτρίᾳ enfatiza pertenencia a otro. 'Ajena' conserva la idea de lo que no les pertenece y combina bien con 'peregrina' para expresar la condición de forasteros.
  doctrine_reference: Translation philosophy §1 and lexicon-sensitive contextual rendering
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece en el texto español. Además, se mantuvo la tensión del singular colectivo del griego en la redacción principal, con una alternativa idiomática en la nota.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, sin añadir 'SEÑOR' ni sustituir el nombre divino.
  - '''Descendencia'' mantiene el singular colectivo de σπέρμα, coherente con la nota.'
  - '''Esclavizar'' conserva la fuerza del campo léxico δουλ-.'
  - '''Tierra ajena'' expresa ἀλλοτρίᾳ de manera natural en español y sin perder el matiz de pertenencia de otro.'
