translation:
  language: es
  text: Entonces José envió a llamar a Jacob, su padre, y a todos sus parientes[a], setenta y cinco personas en total.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos pasajes del Antiguo Testamento dan el total como «setenta» (por ejemplo, el texto hebreo de Génesis 46:27 y Éxodo 1:5); aquí Hechos dice «setenta y cinco».
    reason: cross_reference
lexical_decisions:
- source_word: ἀποστείλας
  english_pob_choice: sent
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió
  - habiendo enviado
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa de José. En español, «mandó llamar» comunica de manera natural que José hizo venir a alguien, sin forzar una construcción participial pesada y sin añadir un objeto explícito que el griego no da.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca la progresión narrativa. «Entonces» conserva bien el valor discursivo en español y encaja con el relato de Esteban.
- source_word: μετεκαλέσατο
  english_pob_choice: summoned
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - llamó
  - citó
  lexicon: BDAG
  rationale: El verbo medio implica hacer venir o llamar para que alguien se presente. «Mandó llamar» expresa esa fuerza con naturalidad y evita la repetición directa de «mandó/mandó» si se intentara traducir demasiado literalmente ἀποστείλας y μετεκαλέσατο.
- source_word: Ἰακὼβ τὸν πατέρα αὐτοῦ
  english_pob_choice: Jacob his father
  chosen_spanish: Jacob, su padre
  alternatives_spanish:
  - Jacob su padre
  - Jacob, su padre
  lexicon: BDAG
  rationale: 'La relación es apposicional: Jacob es el padre de José. En español, la coma ayuda a reproducir esa apposición de forma clara y natural.'
- source_word: πᾶσαν τὴν συγγένειαν
  english_pob_choice: all his relatives
  chosen_spanish: toda su parentela
  alternatives_spanish:
  - todos sus parientes
  - toda su familia
  lexicon: BDAG
  rationale: συγγένεια denota el grupo de parientes o la parentela. «Parentela» preserva mejor el sentido colectivo y genealógico que «familia», que podría sonar demasiado restringido al hogar inmediato.
- source_word: ἐν ψυχαῖς
  english_pob_choice: persons in all
  chosen_spanish: personas en total
  alternatives_spanish:
  - almas en total
  - en número
  lexicon: BDAG
  rationale: La expresión idiomática literalmente dice «en almas», es decir, contando personas. En español, «personas en total» comunica el valor de censo sin introducir una connotación espiritual ajena al contexto.
- source_word: ἑβδομήκοντα πέντε
  english_pob_choice: seventy-five
  chosen_spanish: setenta y cinco
  lexicon: BDAG
  rationale: Equivalencia directa del numeral griego.
theological_decisions:
- issue: Diferencia numérica entre Actos y la tradición textual del Antiguo Testamento citada como paralelo
  english_pob_reading: seventy-five persons in all
  chosen_spanish_reading: setenta y cinco personas en total
  alternative_spanish_readings:
  - setenta personas en total
  rationale: El texto griego de Hechos lee explícitamente setenta y cinco, y la traducción debe conservar esa cifra en el cuerpo principal. La nota explica la diferencia con pasajes del Pentateuco sin armonizar artificialmente las fuentes.
  doctrine_reference: Primacía del texto fuente y preservación de tensiones textuales legítimas
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión auditada del inglés POB de conservar la cifra de Hechos sin armonizarla con Génesis/Éxodo, y adapta al español la elección idiomática de una expresión de envío/llamado para ἀποστείλας + μετεκαλέσατο.
  spanish_consistency_notes:
  - Se conserva el nombre propio «José» para Ἰωσὴφ y «Jacob» para Ἰακώβ conforme al uso bíblico estándar en español.
  - Se mantiene «parentela» para reflejar el grupo de parientes sin reducirlo a familia nuclear.
  - La nota al pie marca explícitamente la tensión numérica en lugar de resolverla, siguiendo la política de transparencia del proyecto.
