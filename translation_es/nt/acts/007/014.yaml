    issue: Se fusionan ἀποστείλας y μετεκαλέσατο en un solo giro («mandó llamar»).
    rationale: 'El griego presenta dos acciones relacionadas: primero enviar, luego hacer venir/convocar. El English POB lo conserva explícitamente. En español puede mantenerse con naturalidad como «envió a llamar».'
  - severity: low
