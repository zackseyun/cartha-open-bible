translation:
  language: es
  text: 'Pero Dios se apartó y los entregó[a] para servir a la hueste del cielo[b], tal como está escrito en el libro[c] de los profetas: «¿Acaso me ofrecieron víctimas y sacrificios por cuarenta años en el desierto[d], casa de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para adorar a la hueste del cielo». El verbo griego puede denotar servicio religioso o adoración.
    reason: lexical_alternative
  - marker: b
    text: «La hueste del cielo» es una expresión bíblica para los cuerpos celestes y, por extensión, los poderes celestiales asociados con ellos en el culto idolátrico.
    reason: cultural_note
  - marker: c
    text: O «en el rollo de los profetas».
    reason: lexical_alternative
  - marker: d
    text: Citado de Amós 5:25.
    reason: cross_reference
lexical_decisions:
- source_word: ἔστρεψεν
  english_pob_choice: turned away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se volvió
  - se desvió
  lexicon: BDAG
  rationale: Con Dios como sujeto y unido a «los entregó», la idea es de retirada judicial, no de un giro físico. «Se apartó» conserva esa distancia relacional y el matiz de juicio sin exagerar.
- source_word: παρέδωκεν
  english_pob_choice: gave them over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los puso en manos de
  - los abandonó a
  lexicon: BDAG
  rationale: «Entregar» reproduce bien el sentido de abandono judicial o de dejar bajo una consecuencia determinada. Es una equivalencia natural en español y conserva la fuerza severa del verbo.
- source_word: λατρεύειν
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para adorar
  - para rendir culto
  lexicon: BDAG
  rationale: El verbo puede abarcar servicio cultual o adoración. «Servir» mantiene la amplitud del griego y deja que el contexto idolátrico comunique la idea de culto, como en el audit trail inglés.
- source_word: τῇ στρατιᾷ τοῦ οὐρανοῦ
  english_pob_choice: the host of heaven
  chosen_spanish: el ejército del cielo
  alternatives_spanish:
  - la hueste del cielo
  - el host del cielo
  lexicon: BDAG
  rationale: «Ejército del cielo» es transparente en español y refleja la imagen bíblica de una multitud/cuerpo celestial. Aunque «hueste» sería más tradicional, «ejército» comunica mejor la metáfora militar del sustantivo griego sin perder el referente idolátrico.
- source_word: ἐν βίβλῳ τῶν προφητῶν
  english_pob_choice: in the book of the prophets
  chosen_spanish: en el libro de los profetas
  alternatives_spanish:
  - en el rollo de los profetas
  lexicon: BDAG
  rationale: «Libro» es una traducción natural de βίβλος y coincide con la lectura inglesa principal. Se conserva la posibilidad de un documento profético sin forzar «rollo» en el texto principal.
- source_word: Μὴ σφάγια καὶ θυσίας προσηνέγκατέ μοι
  english_pob_choice: Did you offer to me slain offerings and sacrifices
  chosen_spanish: ¿Acaso me ofrecieron víctimas y sacrificios?
  alternatives_spanish:
  - ¿Me ofrecieron víctimas inmoladas y sacrificios?
  - ¿Acaso me presentaron víctimas y sacrificios?
  lexicon: BDAG
  rationale: El griego plantea una pregunta retórica que espera respuesta negativa. «¿Acaso…?» ayuda a conservar ese tono. «Víctimas» traduce de forma comprensible σφάγια; «sacrificios» mantiene θυσίας. La omisión de un adjetivo equivalente a «slain» evita pesadez, pero el sustantivo ya sugiere lo sacrificial e inmolado.
- source_word: ἔτη τεσσεράκοντα
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  - a lo largo de cuarenta años
  lexicon: BDAG
  rationale: «Por cuarenta años» es idiomático y conserva la duración temporal del acusativo griego sin añadir interpretaciones.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: BDAG
  rationale: Aunque «wilderness» suele renderizarse como «desierto» o «lugar desierto», aquí la formulación bíblica es natural y clara en español. «Desierto» mantiene la referencia del éxodo y evita un término demasiado literario.
- source_word: οἶκος Ἰσραήλ
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - Oh casa de Israel
  - familia de Israel
  lexicon: BDAG
  rationale: Se conserva la vocación profética sin forzar el vocativo con «oh» en español moderno. «Casa de Israel» es reconocible y solemnemente bíblico.
theological_decisions:
- issue: Acción divina y responsabilidad humana
  english_pob_reading: God turned away and gave them over to serve the host of heaven, expressing judicial abandonment without implying that God caused their idolatry.
  chosen_spanish_reading: Dios se apartó y los entregó para servir al ejército del cielo, expresando juicio y abandono judicial sin atribuir a Dios la autoría de la idolatría.
  alternative_spanish_readings:
  - Dios los hizo servir al ejército del cielo
  - Dios simplemente permitió su idolatría
  rationale: 'La doble acción verbal debe leerse como juicio divino sobre la rebelión previa. La redacción española mantiene esa tensión: Dios actúa judicialmente, pero no se afirma que produzca el pecado.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de la frase bíblica sobre culto idolátrico
  english_pob_reading: ‘the host of heaven’ is a biblical expression for the heavenly bodies and associated celestial powers.
  chosen_spanish_reading: «el ejército del cielo» conserva la expresión bíblica para los cuerpos celestes o poderes asociados a la idolatría.
  alternative_spanish_readings:
  - los astros del cielo
  - la hueste celestial
  rationale: En este contexto profético, la frase apunta a objetos o poderes celestes vinculados al culto falso. Se deja la imagen tradicional sin especificar en exceso si son estrellas, astros o poderes.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste reciente del audit trail inglés en la cláusula de sacrificio («offer to me») y se reflejó en español con el orden natural «me ofrecieron», manteniendo la pregunta retórica y la estructura citacional. También se preservó la tensión lexical entre «servir» y la posible lectura de adoración mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según la terminología base.
  - Se evita «SEÑOR» porque el texto griego aquí usa θεός, no el nombre divino en cita directa.
  - «Casa de Israel» conserva el tono profético del vocativo.
  - «Ejército del cielo» se usa de forma consistente con la expresión bíblica del host of heaven.
  - La nota a cubre la alternativa cultual de λατρεύειν sin reemplazar el texto principal.
