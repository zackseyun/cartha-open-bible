review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene el aspecto progresivo de ἀδικῶν, el vínculo léxico de πλησίον, la fuerza concreta de ἀπώσατο, y la pregunta sobre autoridad en κατέστησεν ἄρχοντα καὶ δικαστὴν ἐφ’ ἡμῶν. Sin embargo, «lo empujó» queda algo incompleto frente a ἀπώσατο αὐτόν, que en contexto incluye matiz de apartarlo o echarlo a un lado, no solo de darle un empujón.'
  spanish_quality_summary: 'El español es claro y legible, con tono bíblico natural. No obstante, «estaba haciendo injusticia a su prójimo» suena algo poco idiomático en español moderno; «estaba maltratando a su prójimo» o «estaba obrando injustamente contra su prójimo» serían más naturales, pero la primera suaviza y la segunda es más pesada. El ajuste más necesario es en ἀπώσατο: «lo apartó de un empujón» conserva mejor la escena y mejora la naturalidad.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Prójimo», «juez» y la estructura de autoridad están bien alineadas. «Gobernante» es aceptable para ἄρχοντα. La nota léxica también va en la dirección correcta, aunque conviene alinear el texto principal con el matiz de apartar/rechazar físicamente.
  issues:
  - severity: medium
    issue: «lo empujó» no expresa plenamente el sentido de ἀπώσατο
    rationale: El verbo griego, según el audit trail, no solo describe contacto físico sino un apartarlo o echarlo a un lado con rechazo brusco. «Lo empujó» podría entenderse como mero empellón sin el matiz de apartamiento.
  - severity: low
    issue: «estaba haciendo injusticia a su prójimo» suena algo forzado en español
    rationale: Aunque es semánticamente fiel a ἀδικῶν, la expresión no es del todo idiomática en español actual. Aun así, no distorsiona el sentido, por lo que no exige cambio obligatorio si se quiere conservar la cercanía léxica.
  revised_spanish_text: 'Pero el que estaba haciendo injusticia a su prójimo lo apartó[a], diciendo: «¿Quién te puso por gobernante y juez sobre nosotros?»'
  revised_footnotes:
