translation:
  language: es
  text: 'Pero el que estaba haciendo injusticia a su prójimo lo apartó[a], diciendo: «¿Quién te puso por gobernante y juez sobre nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo echó a un lado». El verbo griego puede enfatizar un rechazo físico o un desaire brusco.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῶν
  english_pob_choice: was wronging
  chosen_spanish: estaba haciendo injusticia
  alternatives_spanish:
  - estaba maltratando
  - estaba injuriando
  - estaba obrando injustamente contra
  lexicon: BDAG
  rationale: El participio presente imperfectivo pide una forma continua en español. «Hacer injusticia» conserva con claridad el valor de ἀδικέω y evita suavizarlo demasiado en una mera idea de maltrato.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  - fellow man
  lexicon: BDAG
  rationale: «Prójimo» es un equivalente natural en español bíblico para el sentido de persona cercana o compatriota; en este contexto refleja bien la relación sin imponer una precisión innecesaria.
- source_word: ἀπώσατο
  english_pob_choice: pushed him away
  chosen_spanish: lo empujó
  alternatives_spanish:
  - lo rechazó
  - lo apartó de sí
  - lo echó a un lado
  lexicon: BDAG
  rationale: El verbo griego puede implicar un rechazo físico o brusco. «Lo empujó» mantiene la concreción de la escena y la fuerza del gesto, como en el audit trail inglés.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: puso por
  alternatives_spanish:
  - nombró
  - designó
  - estableció como
  lexicon: BDAG
  rationale: En la pregunta idiomática sobre autoridad, «puso por» reproduce de manera natural el valor causativo de καθίστημι y encaja con la acusación formulada.
- source_word: ἄρχοντα
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - jefe
  - regidor
  lexicon: BDAG
  rationale: «Gobernante» comunica la función de autoridad política o directiva. En español suena más natural que «ruler» trasladado literalmente y preserva la carga de la objeción.
- source_word: δικαστὴν
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - árbitro
  - magistrado
  lexicon: BDAG
  rationale: «Juez» es el equivalente directo y el más claro en español, además de formar una pareja natural con «gobernante».
- source_word: ἐφ’ ἡμῶν
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - entre nosotros
  - por encima de nosotros
  - para nosotros
  lexicon: BDAG
  rationale: La preposición con genitivo expresa autoridad ejercida sobre el grupo; «sobre nosotros» mantiene ese matiz de control o dominio.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés de POB. La principal decisión fue conservar la fuerza concreta de ἀπώσατο con un verbo físico en español y mantener el carácter acusatorio de la pregunta final sin suavizar la autoridad implícita.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico actual, digno y claro.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton ni κύριος en este versículo.
  - Se usó «prójimo» como equivalente bíblico habitual para πλησίον, coherente con el contexto de injusticia hacia otro miembro del pueblo.
