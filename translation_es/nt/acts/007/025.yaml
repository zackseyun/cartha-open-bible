translation:
  language: es
  text: Él pensaba que sus hermanos entendían que Dios les estaba dando liberación por medio de su mano[a][b], pero ellos no entendieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salvación». El término griego puede denotar rescate, liberación o salvación; aquí el contexto inmediato apunta a la liberación de Israel por medio de Moisés.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» se refiere a los compatriotas israelitas de Moisés; en griego es lenguaje de parentesco masculino plural.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνόμιζεν
  english_pob_choice: supposed
  chosen_spanish: suponía
  alternatives_spanish:
  - pensaba
  - creía
  lexicon: BDAG
  rationale: El imperfecto expresa un estado mental en desarrollo o de fondo; «suponía» conserva ese matiz mejor que un pasado puntual. En español suena natural y mantiene la cautela de la expectativa de Moisés.
- source_word: συνιέναι
  english_pob_choice: understood
  chosen_spanish: entendían
  alternatives_spanish:
  - comprendían
  - captaban
  lexicon: BDAG
  rationale: El infinitivo depende de ἐνόμιζεν y señala la captación del sentido de la acción. «Entendían» es claro y permite repetir el mismo verbo al final para reflejar el juego verbal del griego.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - fellow Israelites
  - hermanos e Israelitas
  lexicon: BDAG
  rationale: Se conserva el lenguaje de parentesco plural masculino. En este contexto los «hermanos» son los compatriotas israelitas de Moisés; traducirlo así es fiel al término y mantiene la referencia colectiva.
- source_word: διὰ χειρὸς αὐτοῦ
  english_pob_choice: through his hand
  chosen_spanish: por medio de su mano
  alternatives_spanish:
  - por su mano
  - por medio de él
  lexicon: BDAG
  rationale: La expresión es idiomática de agencia o instrumento. «Por medio de su mano» preserva la imagen concreta del griego sin volverla demasiado abstracta, y evita perder el color metafórico que la versión inglesa documentó.
- source_word: δίδωσιν
  english_pob_choice: was giving
  chosen_spanish: estaba dando
  alternatives_spanish:
  - daba
  - estaba concediendo
  lexicon: BDAG
  rationale: Aunque el verbo está en presente formal, en discurso indirecto español el imperfecto progresivo comunica bien la acción en curso. «Estaba dando» mantiene el marco narrativo y la idea de acción divina en proceso.
- source_word: σωτηρίαν
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - rescate
  lexicon: BDAG
  rationale: En este contexto histórico de Éxodo, la referencia inmediata es la liberación de Israel de la opresión; «liberación» evita restringir indebidamente el sentido a una formulación más estrechamente soteriológica. Se mantiene la tensión con el rango más amplio de σωτηρία que la nota inglesa ya señaló.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con «les» en español. El clítico permite una frase fluida sin perder el valor de destinatario de la acción.
- source_word: οἱ δὲ οὐ συνῆκαν
  english_pob_choice: but they did not understand
  chosen_spanish: pero ellos no entendieron
  alternatives_spanish:
  - pero no comprendieron
  - pero no lo entendieron
  lexicon: BDAG
  rationale: 'Se repite «entender» para reproducir la reiteración y el contraste del griego. La forma directa mantiene el énfasis en la ironía narrativa: Moisés esperaba comprensión, pero no la hubo.'
theological_decisions:
- issue: σωτηρία en un contexto de liberación de Moisés e Israel
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: 'El contexto inmediato es histórico y exodal: Dios actuaba por medio de Moisés para sacar a su pueblo de la opresión. «Liberación» comunica con precisión ese acto sin imponer de entrada un sentido técnico más estrecho de salvación; a la vez, deja visible la continuidad teológica con el lenguaje bíblico más amplio de σωτηρία.'
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión teológica sin resolverla por tradición terminológica.'
- issue: διὰ χειρὸς αὐτοῦ como lenguaje de agencia divina
  english_pob_reading: through his hand
  chosen_spanish_reading: por medio de su mano
  alternative_spanish_readings:
  - por su mano
  - por medio de él
  rationale: La frase conserva la mediación concreta de Moisés como instrumento de Dios. No se reduce de inmediato a «por medio de él» porque eso suaviza la imagen corporal del texto; mantener «mano» respeta la forma expresiva del griego y la mediación visible en el relato.
  doctrine_reference: 'Principio POB: conservar imágenes bíblicas cuando son transparentes y portadoras de sentido teológico.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que prefirió el pasado simple «suponía» en inglés por naturalidad, pero en español se optó por el imperfecto «suponía» para reflejar mejor el valor aspectual del verbo ἐνόμιζεν. Se mantuvieron los demás ejes del análisis: repetición de «entender», imagen de agencia en «por medio de su mano» y traducción contextual de σωτηρία como «liberación».'
  spanish_consistency_notes:
  - Se preserva el paralelo verbal entre «entendían» y «entendieron» para reflejar συνιέναι / συνῆκαν.
  - Se usa «liberación» en vez de «salvación» en el texto principal, con nota de alternativa para no borrar el rango semántico de σωτηρία.
  - «Hermanos» conserva la forma masculina plural y la referencia étnica al pueblo de Israel.
  - 'La puntuación mantiene el contraste narrativo: expectativa de Moisés frente a la incomprensión del pueblo.'
