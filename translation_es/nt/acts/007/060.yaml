translation:
  language: es
  text: 'Entonces,[a] poniéndose de rodillas, clamó a gran voz: «Señor, no les tomes en cuenta este pecado». Y después de decir esto,[b] se durmió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no les imputes este pecado» o «no les cuentes este pecado».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «se durmió», expresión habitual para la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὶς δὲ τὰ γόνατα
  english_pob_choice: Then, kneeling down
  chosen_spanish: Entonces, de rodillas
  alternatives_spanish:
  - Y, de rodillas
  - Luego, de rodillas
  lexicon: BDAG
  rationale: La construcción griega expresa la acción de ponerse en postura de rodillas antes de orar o clamar; en español, 'de rodillas' comunica con naturalidad el gesto físico sin un calco como 'habiendo puesto las rodillas'. 'Entonces' conserva el matiz narrativo de δέ como avance de la secuencia.
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  english_pob_choice: he cried out with a loud voice
  chosen_spanish: clamó con voz fuerte
  alternatives_spanish:
  - gritó con voz fuerte
  - clamó en voz alta
  lexicon: BDAG
  rationale: κράζω implica un clamor o grito intenso; 'clamó' mantiene ese tono solemne y bíblico sin perder fuerza. φωνῇ μεγάλῃ se vierte literalmente como 'con voz fuerte' para conservar la construcción enfática de la voz, en vez de reducirla solo a un adverbio.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En este contexto vocativo se dirige a Jesús; 'Señor' preserva el título reverente y es la equivalencia española estable para κύριος en oración cristológica. 'Maestro' no refleja tan bien el tono de súplica.
- source_word: μὴ στήσῃς αὐτοῖς ταύτην τὴν ἁμαρτίαν
  english_pob_choice: do not hold this sin against them
  chosen_spanish: no les tomes en cuenta este pecado
  alternatives_spanish:
  - no les imputes este pecado
  - no les cuentes este pecado
  lexicon: BDAG
  rationale: στήσῃς aquí comunica la idea de poner el pecado a la cuenta de alguien. 'No les tomes en cuenta' expresa en español actual esa carga forense sin sonar mecánico ni arcaico. 'Este pecado' mantiene el demostrativo de ταύτην.
- source_word: καὶ τοῦτο εἰπὼν
  english_pob_choice: And after saying this
  chosen_spanish: Y después de decir esto
  alternatives_spanish:
  - Y habiendo dicho esto
  - Y cuando dijo esto
  lexicon: BDAG
  rationale: El participio temporal se traduce de forma natural con una secuencia temporal en español, conservando la relación inmediata con la oración anterior.
- source_word: ἐκοιμήθη
  english_pob_choice: he fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: BDAG
  rationale: κοιμάομαι funciona como eufemismo de muerte en el uso cristiano primitivo. 'Se durmió' conserva la metáfora del griego y su tono reverente; 'murió' la aplana y 'falleció' debilita el eco figurado.
theological_decisions:
- issue: Eufemismo de muerte en ἐκοιμήθη
  english_pob_reading: he fell asleep
  chosen_spanish_reading: se durmió
  alternative_spanish_readings:
  - murió
  - falleció
  rationale: La traducción mantiene la metáfora de 'dormir' presente en el griego, que en Hechos funciona como forma respetuosa de hablar de la muerte. Así se preserva el matiz literario y teológico sin explicitar más de lo que el verso dice.
  doctrine_reference: 'Translation philosophy #3, #6'
- issue: Dirección del vocativo Κύριε en la oración de Esteban
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El vocativo se entiende aquí como oración dirigida al Jesús exaltado en el contexto inmediato. 'Señor' conserva la dignidad cristológica del título y evita una lectura demasiado doméstica o meramente didáctica.
  doctrine_reference: 'Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Coincide con el testimonio griego SBLGNT y con el audit trail inglés de alta concordancia; se mantiene la progresión narrativa, la súplica forense y el eufemismo de muerte sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος en armonía con el uso doctrinal del proyecto y con el contexto oracional.
  - Se mantiene 'pecado' en singular para reflejar el demonstrativo griego 'esta' y la formulación puntual del texto.
  - '''Se durmió'' conserva el eufemismo de muerte, evitando un lenguaje más explícito que el griego no exige.'
