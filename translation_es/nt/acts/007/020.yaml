translation:
  language: es
  text: En aquel tiempo nació Moisés, y era hermoso[a] a los ojos de Dios. Fue criado durante tres meses en casa de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermoso ante Dios'. El griego también puede rendirse 'bello' o 'de buen aspecto', pero la referencia a Dios es explícita y por eso se conserva en el texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ καιρῷ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquella ocasión
  lexicon: BDAG
  rationale: Expresa de manera natural la referencia temporal idiomática del griego sin volverla mecánica. 'Aquel' mantiene el matiz narrativo y de distancia temporal del contexto.
- source_word: ἐγεννήθη
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - fue nacido
  - llegó a nacer
  lexicon: BDAG
  rationale: En español, 'nació' comunica con claridad el pasivo de nacimiento sin sonar forzado. Conserva el valor narrativo del aoristo pasivo.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico
  rationale: Transliteración española estándar del nombre propio, equivalente a la forma inglesa y reconocible en el uso bíblico en español.
- source_word: ἀστεῖος
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - buen aspecto
  - agradable
  lexicon: BDAG
  rationale: '''Hermoso'' preserva el sentido lexical visible de belleza o atractivo. Evita reducir el término a una cualidad meramente moral o excepcional sin apoyo explícito en el texto.'
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - ante Dios
  - a los ojos de Dios
  lexicon: BDAG
  rationale: '''Para Dios'' refleja de forma directa la dativo griego con referencia/evaluación y mantiene la tensión lexical documentada por la POB inglesa. En español, ''para'' comunica que la hermosura es definida con respecto a Dios sin introducir una lectura más interpretativa.'
- source_word: ὃς
  english_pob_choice: He
  chosen_spanish: Fue criado
  alternatives_spanish:
  - Él fue criado
  - Y fue criado
  lexicon: BDAG
  rationale: Se integra la referencia anafórica de modo natural en español mediante una oración independiente en pasiva. Esto evita un relativo literal innecesario y conserva la secuencia narrativa.
- source_word: ἀνετράφη
  english_pob_choice: was brought up
  chosen_spanish: fue criado
  alternatives_spanish:
  - fue criado y educado
  - fue criado/rearado
  lexicon: BDAG
  rationale: '''Fue criado'' expresa bien el sentido de ser levantado/rearado en un hogar. Es natural en español bíblico contemporáneo y mantiene el foco en el cuidado doméstico.'
- source_word: μῆνας τρεῖς
  english_pob_choice: for three months
  chosen_spanish: tres meses
  alternatives_spanish:
  - por tres meses
  - durante tres meses
  lexicon: BDAG
  rationale: El complemento temporal en español puede expresarse sin preposición explícita en este contexto narrativo. 'Tres meses' resulta claro y fiel al durativo griego.
- source_word: ἐν τῷ οἴκῳ τοῦ πατρός
  english_pob_choice: in his father's house
  chosen_spanish: en casa de su padre
  alternatives_spanish:
  - en la casa de su padre
  - en el hogar de su padre
  - en la casa paterna
  lexicon: BDAG
  rationale: '''Casa de su padre'' mantiene el valor de οἶκος como ámbito doméstico/familiar. La forma ''en casa de'' es idiomática en español y conserva la imagen sin sobrecargarla.'
theological_decisions:
- issue: Sentido de ἀστεῖος τῷ θεῷ
  english_pob_reading: Moses was beautiful to God, preserving explicit reference to God and the evaluative force of the dative.
  chosen_spanish_reading: Moisés era hermoso para Dios.
  alternative_spanish_readings:
  - Moisés era hermoso a los ojos de Dios.
  - Moisés era hermoso ante Dios.
  - Moisés era un niño hermoso, y Dios lo veía así.
  rationale: La frase debe conservar la referencia explícita a Dios, como hace la POB inglesa, sin convertirla en una observación puramente humana ni en una paráfrasis interpretativa. 'Para Dios' permite mantener la tensión entre belleza visible y evaluación divina sin añadir más contenido doctrinal del que el griego afirma.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor narrativo del pasivo en ἐγεννήθη / ἀνετράφη
  english_pob_reading: 'Simple historical statements: Moses was born and was brought up.'
  chosen_spanish_reading: Nació Moisés... Fue criado tres meses...
  alternative_spanish_readings:
  - Moisés fue nacido...
  - Moisés fue criado durante tres meses...
  rationale: En español, el pasivo perifrástico puede sonar pesado o artificial. La construcción elegida conserva la pasividad/recepción de las acciones sin sacrificar claridad narrativa ni solemnidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje griego SBLGNT y el auditoría inglesa más reciente, que retiene la referencia explícita a Dios en τῷ θεῷ y entiende ἀστεῖος como una cualidad de belleza/atractivo, no solo de valor general. Se ajustó el español para que suene natural sin perder la tensión lexical preservada por la POB inglesa.
  spanish_consistency_notes:
  - Se usó 'Moisés' como transliteración bíblica estándar.
  - Se mantuvo 'Dios' para θεός, con referencia explícita en la frase evaluativa.
  - Se prefirió 'nació' y 'fue criado' para reflejar acciones pasivas narrativas de forma natural en español.
  - Se evitó 'SEÑOR' o una paráfrasis devocional no respaldada por el texto.
  - La frase 'en casa de su padre' conserva el sentido familiar de οἶκος sin introducir una lectura más doméstica de la necesaria.
