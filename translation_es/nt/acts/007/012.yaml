translation:
  language: es
  text: Pero cuando Jacob oyó que había grano en Egipto[a], envió a nuestros padres por primera vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alimentos/provisiones en Egipto». El griego σιτία puede referirse de manera más amplia a provisiones, aunque aquí «grano» parece ser la intención más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - después de haber oído
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo se usa temporalmente con el verbo principal. «Cuando ... oyó» reproduce bien la secuencia narrativa en español sin volver la frase pesada ni demasiado literal.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: La partícula marca una transición suave en el relato. «Pero» conserva ese avance discursivo en español natural sin exagerar el contraste.
- source_word: ὄντα ⸂σιτία εἰς Αἴγυπτον⸃
  english_pob_choice: that there was grain in Egypt
  chosen_spanish: que había grano en Egipto
  alternatives_spanish:
  - que había alimentos en Egipto
  - que había provisiones en Egipto
  lexicon: BDAG
  rationale: La construcción de acusativo con participio tras ἀκούω se vierte como discurso indirecto en español. «Había grano» sigue el contexto de José y la hambruna, y es más preciso que las alternativas más generales.
- source_word: σιτία
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - alimentos
  - provisiones
  lexicon: BDAG
  rationale: El plural de σιτίον puede abarcar comida o provisiones, pero en el marco de Génesis/José el sentido más exacto y natural es «grano».
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El verbo compuesto puede expresar un envío con énfasis en la salida, pero en español «envió» transmite adecuadamente la acción sin sonar forzado. El contexto de la misión de los hermanos queda claro por la frase completa.
- source_word: τοὺς πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros patriarcas
  lexicon: BDAG
  rationale: Se preserva el lenguaje familiar-covenantal del griego. «Nuestros padres» reproduce mejor el término de parentesco que opciones más abstractas o interpretativas.
- source_word: πρῶτον
  english_pob_choice: the first time
  chosen_spanish: por primera vez
  alternatives_spanish:
  - la primera vez
  - primero
  lexicon: BDAG
  rationale: El acusativo adverbial indica la primera de varias ocasiones. «Por primera vez» es la forma más natural en español y anticipa la visita posterior del relato.
theological_decisions:
- issue: Mantener la referencia masculina de τοὺς πατέρας ἡμῶν
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros patriarcas
  rationale: Se conserva el valor histórico-familiar del texto, referido a los varones ancestrales de Israel. Neutralizarlo podría borrar el matiz genealógico que Stephen usa en su discurso.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La versión concuerda con el audit trail inglés: mantiene el giro temporal de ἀκούσας, la transición suave de δὲ, el sentido de σιτία como «grano», el envío expresado por ἐξαπέστειλεν y el valor relacional de «nuestros padres». No se registraron revisiones posteriores que alteraran la lectura.'
  spanish_consistency_notes:
  - Se usa «grano» para σιτία de manera consistente con el contexto de José y la hambruna.
  - Se mantiene «nuestros padres» para τοὺς πατέρας ἡμῶν, evitando una neutralización que borre el parentesco masculino explícito.
  - «Envió» conserva naturalidad en español sin perder la idea de una acción dirigida hacia el destino de Egipto.
  - La puntuación sigue el estilo bíblico moderno en español, con coma antes de la apódosis principal y nota de pie vinculada al término léxico ambiguo.
