revisions:
- from: 'Y él dijo[a]: «Hermanos y padres, escuchen: el Dios de gloria se apareció a nuestro padre Abraham cuando estaba en Mesopotamia[b], antes de que habitara en Harán».'
  to: 'Y dijo[a]: «Hermanos y padres, escuchen: el Dios de gloria se apareció a nuestro padre Abraham cuando estaba en Mesopotamia, antes de que viviera en Harán[b]».'
  rationale: Se elimina el pronombre explícito para reflejar mejor el valor no enfático de ἔφη en español natural. También se cambia «habitara» por «viviera» como equivalente más claro y común de κατοικέω, manteniendo en nota la alternativa «se estableciera» ya sustentada por el expediente inglés. Además, se mueve la marca [b] para anclarla directamente a la frase pertinente.
