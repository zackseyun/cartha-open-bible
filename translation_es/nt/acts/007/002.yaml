translation:
  language: es
  text: 'Y dijo[a]: «Hermanos y padres, escuchen: el Dios de gloria se apareció a nuestro padre Abraham cuando estaba en Mesopotamia, antes de que viviera en Harán[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hombres, hermanos y padres». La fórmula vocativa griega es explícitamente masculina y formal.
    reason: lexical_alternative
  - marker: b
    text: O «antes de que se estableciera en Harán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: BDAG
  rationale: Mantiene la introducción narrativa simple de ἔφη y refleja la conexión suave de δέ con una conjunción natural en español.
- source_word: Ἄνδρες ἀδελφοὶ καὶ πατέρες
  english_pob_choice: Brothers and fathers
  chosen_spanish: Hermanos y padres
  alternatives_spanish:
  - Hombres, hermanos y padres
  - Hermanos, padres
  lexicon: BDAG
  rationale: Conserva el valor vocativo y masculino del griego sin añadir una expansión pesada; en español, «Hermanos y padres» suena natural y respeta la fórmula formal de apelación.
- source_word: ἀκούσατε
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - escúchenme
  lexicon: BDAG
  rationale: Imperativo de atención dirigido a un grupo; «escuchen» es el equivalente moderno y directo en español, sin forzar la presencia explícita de «me» que no está en el griego.
- source_word: Ὁ θεὸς τῆς δόξης
  english_pob_choice: the God of glory
  chosen_spanish: el Dios de gloria
  alternatives_spanish:
  - el Dios glorioso
  lexicon: BDAG
  rationale: Se preserva la estructura genitiva formal «de gloria», que mantiene la resonancia bíblica y evita convertirla en un adjetivo interpretativo.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: BDAG
  rationale: En contextos de manifestación divina, «se apareció» comunica bien el valor de ὤφθη y sugiere una aparición personal sin alejarse del sentido base de «aparecer».
- source_word: τῷ πατρὶ ἡμῶν Ἀβραὰμ
  english_pob_choice: to our father Abraham
  chosen_spanish: a nuestro padre Abraham
  alternatives_spanish:
  - a Abraham nuestro padre
  - a nuestro antepasado Abraham
  lexicon: BDAG
  rationale: La inversión natural del español favorece «a nuestro padre Abraham» y conserva la identificación comunitaria con Abraham.
- source_word: ὄντι ἐν τῇ Μεσοποταμίᾳ
  english_pob_choice: when he was in Mesopotamia
  chosen_spanish: cuando estaba en Mesopotamia
  alternatives_spanish:
  - mientras estaba en Mesopotamia
  - siendo aún en Mesopotamia
  lexicon: BDAG
  rationale: La construcción participial se vuelve temporal en español con una cláusula clara y fiel al contexto.
- source_word: πρὶν ἢ κατοικῆσαι αὐτὸν ἐν Χαρράν
  english_pob_choice: before he lived in Haran
  chosen_spanish: antes de que habitara en Harán
  alternatives_spanish:
  - antes de que viviera en Harán
  - antes de que se estableciera en Harán
  lexicon: BDAG
  rationale: «Habitara» conserva el matiz de κατοικέω como residir/establecerse en un lugar; se prefiere frente a una formulación más general como «viviera» para mantener algo del peso léxico del verbo.
theological_decisions:
- issue: Tratamiento del vocativo masculino griego Ἄνδρες ἀδελφοὶ καὶ πατέρες
  english_pob_reading: Brothers and fathers
  chosen_spanish_reading: Hermanos y padres
  alternative_spanish_readings:
  - Hombres, hermanos y padres
  - Hermanos, padres
  rationale: Se conserva el carácter masculino y formal del saludo sin sobrecargar el español con una redundancia poco natural. El texto sigue dirigiéndose a un auditorio varonil/familiar como en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Elección de «el Dios de gloria» para θεὸς τῆς δόξης
  english_pob_reading: the God of glory
  chosen_spanish_reading: el Dios de gloria
  alternative_spanish_readings:
  - el Dios glorioso
  rationale: Se prefiere la relación nominal del original, que deja abierta la densidad bíblica de la expresión y evita una simplificación adjetival.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y coincide sustancialmente con el recorrido auditado en inglés; se ajustó el orden y la idiomaticidad al español sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se preserva «Dios» para θεός y «gloria» para δόξα siguiendo la convención del proyecto.
  - Se usa «Mesopotamia» y «Harán» como transliteraciones estándar en español.
  - La cláusula temporal reproduce el participio ὄντι como circunstancia de tiempo, no como descripción estática.
  - Se mantiene el tono formal del discurso de Esteban sin neutralizar el masculino explícito del vocativo.
