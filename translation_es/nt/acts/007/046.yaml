translation:
  language: es
  text: que halló favor delante de Dios y pidió hallar una morada para el Dios de Jacob[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un tabernáculo para el Dios de Jacob".
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν χάριν
  english_pob_choice: found favor
  chosen_spanish: halló gracia
  alternatives_spanish:
  - halló favor
  - encontró gracia
  lexicon: BDAG
  rationale: La locución griega εὑρίσκειν χάριν puede expresar obtener favor o aceptación. En español, "halló gracia" conserva la relación personal y bíblica sin forzar un giro más explicativo que el original no exige. Se evita "favor" porque en este contexto puede sonar menos natural en español y pierde la resonancia bíblica de χάρις.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: ἐνώπιον con genitivo indica estar delante o ante alguien. "Delante de Dios" es natural en español y mantiene la idea de comparecer o hallarse en su presencia.
- source_word: ᾐτήσατο
  english_pob_choice: asked
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - rogó
  lexicon: BDAG
  rationale: El medio de αἰτέω aquí expresa hacer una petición. "Pidió" es el equivalente más claro y directo en español; "rogó" elevaría innecesariamente el tono, y "solicitó" sería demasiado administrativo.
- source_word: εὑρεῖν
  english_pob_choice: to find
  chosen_spanish: hallar
  alternatives_spanish:
  - encontrar
  - obtener
  lexicon: BDAG
  rationale: El infinitivo mantiene el verbo de hallazgo. "Hallar" conserva mejor el paralelismo con "halló gracia" y suena más bíblico sin depender de una estructura forzada.
- source_word: σκήνωμα
  english_pob_choice: a dwelling place
  chosen_spanish: un lugar de morada
  alternatives_spanish:
  - un tabernáculo
  - una morada
  - una habitación
  lexicon: BDAG
  rationale: σκήνωμα puede designar una morada, habitación o tabernáculo. Se eligió "un lugar de morada" para reflejar la amplitud del término en el discurso de Esteban, sin resolver demasiado pronto la referencia hacia "tabernáculo" o "templo". La frase conserva la tensión documentada por la POB inglesa.
- source_word: τῷ θεῷ Ἰακώβ
  english_pob_choice: for the God of Jacob
  chosen_spanish: para el Dios de Jacob
  alternatives_spanish:
  - para el Dios de Jacob
  - para el Dios de Jacob, es decir, Jacob
  - para el Dios de Jacob
  lexicon: BDAG
  rationale: El dativo con σκήνωμα se vierte naturalmente con "para" en español. "El Dios de Jacob" preserva la fórmula pactal bíblica y refleja el genitivo Ἰακώβ sin alterarlo a una explicación más larga.
theological_decisions:
- issue: Naturaleza del lugar solicitado para Dios en el resumen de Esteban
  english_pob_reading: Rendered σκήνωμα as 'a dwelling place' rather than the more technical 'tabernacle' or 'temple.'
  chosen_spanish_reading: Traducir σκήνωμα como "un lugar de morada" en vez de "tabernáculo" o "templo".
  alternative_spanish_readings:
  - un tabernáculo
  - un templo
  - una morada
  rationale: El término griego es más amplio que la terminología técnica posterior. "Un lugar de morada" mantiene la amplitud del original y conserva la tensión narrativa del discurso de Esteban, en el que David desea un lugar para Dios y luego Salomón construye la casa. No se resuelve prematuramente el sentido hacia una sola institución.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el pasaje con el texto griego SBLGNT y el audit trail inglés de la POB. No se detectaron cambios textuales o de revisión adicionales; la decisión clave es mantener la amplitud de σκήνωμα sin estrecharla a una lectura técnica.
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεός conforme al estándar del proyecto.
  - Se usa "gracia" en un giro idiomático bíblico, pero sin convertirlo en una abstracción teológica distinta de χάριν εὑρεν.
  - '"Delante de Dios" conserva la relación espacial/relacional de ἐνώπιον.'
  - El marcador [a] se coloca sobre "lugar de morada" para conservar la alternativa lexical documentada.
