revisions:
- from: Nuestros padres no quisieron hacerse obedientes a él[a], sino que lo rechazaron y, en sus corazones, se volvieron hacia Egipto[b].
  to: Nuestros padres no quisieron hacerse obedientes a él, sino que lo rechazaron[a] y volvieron atrás en sus corazones hacia Egipto[b].
  rationale: La revisión corrige la ubicación de la nota lexical para que corresponda al verbo ἀπώσαντο, y refuerza el matiz de reversión de ἐστράφησαν con «volvieron atrás», preservando mejor el sentido auditado de «turned back». También se ajusta la nota cultural para reflejar con mayor precisión la explicación inglesa sin añadir distancia interpretativa.
