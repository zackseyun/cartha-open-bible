review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: negativa de obedecer a Moisés, rechazo de él, y giro interior hacia Egipto. Sin embargo, dos decisiones atenúan matices del original y del rastro POB en inglés: (1) la nota [a] quedó anclada en «a él», aunque la alternativa léxica corresponde a ἀπώσαντο («lo rechazaron»), no al dativo ᾧ; y (2) «se volvieron hacia Egipto» no expresa tan claramente el valor de ἐστράφησαν como reversión/retroceso que sí preserva «turned back».'
  spanish_quality_summary: El español es claro, natural y de tono bíblico legible. «No quisieron hacerse obedientes» es aceptable aunque algo rígido; el resto fluye bien. La mayor reparación necesaria es de precisión semántica y de colocación de la nota, no de legibilidad general.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Nuestros padres», «corazones» y «Egipto» concuerdan bien con el original y el estilo POB. La revisión propuesta mantiene el lenguaje bíblico sin calcos innecesarios.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica una alternativa para ἀπώσαντο («lo rechazaron» / «lo apartaron» / «lo echaron a un lado»), pero en el borrador está colocada tras «a él», que traduce ᾧ. Esto desaline­a texto, fuente y nota lexical.
  - severity: medium
    issue: «Se volvieron hacia Egipto» debilita el matiz de retorno implícito en ἐστράφησαν.
    rationale: Aunque no es incorrecto, el inglés auditado preserva «turned back». En español, «volvieron atrás ... a Egipto» o «se volvieron de nuevo ... a Egipto» expresa mejor la reorientación reversiva sin sobreinterpretar un retorno físico.
  - severity: low
    issue: La nota [b] puede formularse con mayor cercanía al sentido auditado.
    rationale: El inglés dice que interiormente anhelaban volver a Egipto aun estando en el desierto. El texto actual añade «como si», que introduce una leve distancia interpretativa innecesaria.
  revised_spanish_text: Nuestros padres no quisieron hacerse obedientes a él, sino que lo rechazaron[a] y volvieron atrás en sus corazones hacia Egipto[b].
  revised_footnotes:
  - marker: a
    text: O «lo apartaron». El verbo griego puede sugerir más literalmente apartar o echar a un lado a Moisés.
    reason: lexical_alternative
  - marker: b
    text: Es decir, interiormente anhelaban volver a Egipto, aun estando todavía en el desierto.
    reason: cultural_note
  revision_rationale: La revisión corrige la ubicación de la nota lexical para que corresponda al verbo ἀπώσαντο, y refuerza el matiz de reversión de ἐστράφησαν con «volvieron atrás», preservando mejor el sentido auditado de «turned back». También se ajusta la nota cultural para reflejar con mayor precisión la explicación inglesa sin añadir distancia interpretativa.
