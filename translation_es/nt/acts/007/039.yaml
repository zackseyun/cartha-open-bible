translation:
  language: es
  text: Nuestros padres no quisieron hacerse obedientes a él, sino que lo rechazaron[a] y volvieron atrás en sus corazones hacia Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo apartaron». El verbo griego puede sugerir más literalmente apartar o echar a un lado a Moisés.
    reason: lexical_alternative
  - marker: b
    text: Es decir, interiormente anhelaban volver a Egipto, aun estando todavía en el desierto.
    reason: cultural_note
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - al cual
  - a quien
  lexicon: BDAG
  rationale: El dativo relativo se refiere a Moisés por el contexto. En español, 'hacerse obedientes a él' conserva la relación de obediencia al referente sin volver la frase rígida o poco natural.
- source_word: ἠθέλησαν
  english_pob_choice: were unwilling
  chosen_spanish: no quisieron
  alternatives_spanish:
  - no estuvieron dispuestos
  - no desearon
  lexicon: BDAG
  rationale: θέλω expresa voluntad/deseo. 'No quisieron' comunica la negativa de voluntad de forma natural y mantiene la fuerza del rechazo.
- source_word: ὑπήκοοι γενέσθαι
  english_pob_choice: to become obedient
  chosen_spanish: hacerse obedientes
  alternatives_spanish:
  - llegar a obedecer
  - obedecer
  lexicon: BDAG
  rationale: La construcción con γενέσθαι pide una idea de 'llegar a ser' o 'hacerse'. 'Hacerse obedientes' preserva la forma del griego y el matiz de disposición obediente, en vez de reducirlo a un simple 'obedecer'.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: La frase alude a los antepasados de Israel. 'Nuestros padres' sigue de cerca el giro bíblico y el tono genealógico del original.
- source_word: ἀπώσαντο
  english_pob_choice: rejected him
  chosen_spanish: lo rechazaron
  alternatives_spanish:
  - lo apartaron
  - lo echaron a un lado
  lexicon: BDAG
  rationale: El verbo medio expresa repudio o rechazo de Moisés. 'Lo rechazaron' capta bien el valor relacional y resulta idiomático en español; 'lo apartaron' o 'lo echaron a un lado' serían más literales pero menos naturales.
- source_word: ἐστράφησαν
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron atrás
  - regresaron
  lexicon: BDAG
  rationale: En este contexto el verbo señala una reorientación hacia Egipto. 'Se volvieron' permite mantener la imagen verbal y, unido al complemento interno, comunica el giro de deseo sin resolverlo demasiado hacia una mera acción física.
- source_word: ἐν ταῖς καρδίαις αὐτῶν
  english_pob_choice: in their hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en su interior
  - en su mente
  lexicon: BDAG
  rationale: καρδία designa la interioridad, incluyendo deseo y voluntad. 'Corazones' conserva el idioma bíblico y la oposición entre la situación externa y la inclinación interna.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: to Egypt
  chosen_spanish: hacia Egipto
  alternatives_spanish:
  - a Egipto
  - de vuelta a Egipto
  lexicon: BDAG
  rationale: εἰς indica dirección. 'Hacia Egipto' mantiene el movimiento orientado al país y evita añadir de antemano la idea de regreso, ya sugerida por el contexto y por 'se volvieron'.
theological_decisions:
- issue: El giro interior hacia Egipto
  english_pob_reading: 'Rendered as an inward turning of desire and allegiance rather than a physical return alone: ''turned back in their hearts to Egypt.'''
  chosen_spanish_reading: 'Se expresa como una reorientación interior: ''en sus corazones, se volvieron hacia Egipto.'''
  alternative_spanish_readings:
  - se volvieron en sus corazones hacia Egipto
  - regresaron en su corazón a Egipto
  rationale: 'La frase ''en sus corazones'' obliga a leer más que un simple movimiento geográfico. La redacción conserva esa tensión: hubo rechazo de Moisés y, al mismo tiempo, una inclinación interior hacia Egipto, sin convertirla en un regreso físico explícito ni borrar el matiz de deseo/allegiance.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El testigo griego y el audit trail inglés coinciden en un sentido de rechazo más una orientación interior hacia Egipto; no hay revisiones aplicadas en el expediente. La versión española mantiene esa combinación sin suavizarla ni resolverla en exceso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'padres' como forma bíblica para οἱ πατέρες ἡμῶν.
  - Se preserva 'corazones' para καρδίαις, evitando sustituirlo por 'mente' o 'interior' en el texto principal.
  - '''Hacia Egipto'' conserva la dirección de εἰς sin añadir una repetición innecesaria de ''volver'' en la misma frase.'
