translation:
  language: es
  text: Y juzgaré a la nación a la cual servirán[a], dijo Dios, y después de estas cosas saldrán y me rendirán culto[b] en este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la cual serán esclavizados» / «a la cual servirán como esclavos». El griego usa el verbo «servir», pero el contexto es la esclavitud de Israel en Egipto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me servirán». El verbo griego puede denotar servicio religioso o adoración ofrecida a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación gentil
  lexicon: BDAG
  rationale: ἔθνος aquí nombra al ente político que oprime a la descendencia de Abraham; en español, «nación» conserva bien ese referente singular y sigue el uso del original sin introducir una explicación innecesaria en el texto principal.
- source_word: ᾧ ἐὰν δουλεύσουσιν
  english_pob_choice: that they will serve
  chosen_spanish: a la cual servirán
  alternatives_spanish:
  - a la cual serán esclavizados
  - a la cual servirán como esclavos
  lexicon: BDAG
  rationale: El relativo dativo con δουλεύω marca la entidad a la que se presta servicio. En español, «servirán» preserva la forma verbal del dicho; la fuerza de esclavitud queda documentada como alternativa por el contexto de Egipto, sin borrar la tensión léxica del verbo.
- source_word: κρινῶ
  english_pob_choice: I will judge
  chosen_spanish: juzgaré
  alternatives_spanish:
  - castigaré
  - traeré juicio sobre
  lexicon: BDAG
  rationale: κρίνω en este anuncio divino tiene sentido judicial. «Juzgaré» es la equivalencia más directa y mantiene la amplitud del acto de juicio sin especificar más de lo que el texto dice.
- source_word: ὁ θεὸς εἶπεν
  english_pob_choice: God said
  chosen_spanish: dijo Dios
  alternatives_spanish:
  - Dios dijo
  lexicon: BDAG
  rationale: La atribución de habla dentro de la cita suena más natural en español con el orden «dijo Dios», y conserva el sujeto explícito del griego.
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de eso
  - luego
  lexicon: BDAG
  rationale: La expresión temporal plural se vierte de manera relativamente formal para reflejar el encadenamiento narrativo de la promesa y no simplificarlo demasiado.
- source_word: ἐξελεύσονται
  english_pob_choice: they will come out
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrán de allí
  - partirán
  lexicon: BDAG
  rationale: En el contexto del éxodo, ἐξέρχομαι se entiende como salida/liberación. «Saldrán» es breve y natural en español, y deja implícita la salida de la situación de esclavitud.
- source_word: λατρεύσουσίν μοι
  english_pob_choice: worship me
  chosen_spanish: me rendirán culto
  alternatives_spanish:
  - me adorarán
  - me servirán
  lexicon: BDAG
  rationale: λατρεύω denota servicio religioso o cultual ofrecido a Dios. «Me rendirán culto» comunica ese matiz de manera clara y digna en español, sin reducirlo a un servicio ordinario ni cargarlo de lenguaje litúrgico excesivo.
- source_word: ἐν τῷ τόπῳ τούτῳ
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - aquí
  lexicon: BDAG
  rationale: τόπος se traduce de forma directa como «lugar». En el marco de Esteban, la referencia funciona bien en español como «este lugar», con el mismo anclaje espacial general del original.
theological_decisions:
- issue: δουλεύω en un contexto de esclavitud
  english_pob_reading: serve
  chosen_spanish_reading: servir
  alternative_spanish_readings:
  - ser esclavizados
  - servir como esclavos
  rationale: Aunque el contexto de Egipto implica esclavitud, el verbo griego es δουλεύω y no el sustantivo δοῦλος. La redacción principal conserva el verbo «servir» y la nota recoge la alternativa más fuerte para no borrar la tensión entre la forma verbal y la realidad de opresión.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; términos discutidos según contexto'
- issue: λατρεύω dirigido a Dios
  english_pob_reading: worship me
  chosen_spanish_reading: rendir culto
  alternative_spanish_readings:
  - adorarme
  - servirme
  rationale: El verbo expresa servicio religioso/cultual a Dios, no trabajo común. «Rendir culto» comunica con precisión la dimensión teológica sin excederla ni volverla demasiado técnica.
  doctrine_reference: 'DOCTRINE.md: español moderno legible; preservar el sentido del texto fuente'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el último pase indicó que no había cambios necesarios y el cotejo mostró acuerdo alto con observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR», ya que el texto griego aquí dice explícitamente ὁ θεός εἶπεν.
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece el nombre divino.
  - Se conserva «servir» en la nota léxica para δουλεύω y «rendir culto» para λατρεύω, distinguiendo servicio forzado de servicio religioso.
  - La puntuación sigue el orden natural del español, manteniendo las comas que separan la cita y la atribución de habla.
