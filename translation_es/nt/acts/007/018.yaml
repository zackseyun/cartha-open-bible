- from: hasta que surgió otro rey sobre Egipto[a][b], que no conocía a José.
  to: hasta que surgió[a] otro rey que reinó sobre Egipto, que no conocía a José[b].
  rationale: Se mantiene «surgió» para preservar la decisión léxica sobre ἀνέστη, pero se reestructura la frase con «que reinó sobre Egipto» para expresar de manera natural en español la idea de dominio contenida en ἐπ’ Αἴγυπτον. También se corrigen los anclajes de notas para que correspondan a las palabras comentadas.
