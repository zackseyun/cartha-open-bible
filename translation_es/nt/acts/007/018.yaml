translation:
  language: es
  text: hasta que surgió[a] otro rey que reinó sobre Egipto, que no conocía a José[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Surgió» refleja el griego ἀνέστη de manera más literal; también puede entenderse como «llegó al poder».
    reason: lexical_alternative
  - marker: b
    text: «No conocía a José» también puede implicar «no lo reconocía» o «no lo consideraba».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta que llegó el tiempo en que
  lexicon: BDAG
  rationale: La frase marca un límite temporal. «Hasta que» es la forma natural en español y conserva con claridad la idea de duración previa hasta un cambio de situación.
- source_word: ἀνέστη
  english_pob_choice: arose
  chosen_spanish: surgió
  alternatives_spanish:
  - se levantó
  - apareció
  - llegó al poder
  lexicon: BDAG
  rationale: El verbo griego puede usarse idiomáticamente para la aparición de un gobernante. «Surgió» mantiene la imagen verbal sin sonar tan literal como «se levantó», y evita explicitar «llegó al poder» como interpretación excesiva.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: BDAG
  rationale: El equivalente directo es «rey», que preserva el sentido político e histórico del término griego.
- source_word: ἕτερος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - diferente
  - distinto
  lexicon: BDAG
  rationale: «Otro» transmite la distinción respecto del rey anterior sin sobrecargar el texto.
- source_word: ἐπ’ Αἴγυπτον
  english_pob_choice: over Egypt
  chosen_spanish: sobre Egipto
  alternatives_spanish:
  - en Egipto
  - contra Egipto
  lexicon: BDAG
  rationale: Con un rey, ἐπί con acusativo puede expresar dominio o autoridad sobre un territorio. «Sobre Egipto» conserva esa relación de gobierno.
- source_word: οὐκ ᾔδει
  english_pob_choice: did not know
  chosen_spanish: no conocía
  alternatives_spanish:
  - no sabía de
  - no reconocía
  - no tomaba en cuenta
  lexicon: BDAG
  rationale: Aunque el griego puede implicar también falta de reconocimiento o consideración, el sentido básico es «no conocer». En español, «no conocía a José» es natural y deja abierta la implicación contextual.
- source_word: τὸν Ἰωσήφ
  english_pob_choice: Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - José
  lexicon: BDAG
  rationale: Se usa el nombre propio español estándar «José», con la preposición personal requerida por el objeto directo animado en español.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran revisiones aplicadas y el pasaje fue marcado como de alta concordancia, sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «Egipto» como nombre propio geográfico estándar.
  - Se usa «José» para Ἰωσήφ conforme al uso bíblico en español.
  - La opción «surgió» preserva la imagen de ἀνέστη sin imponer una paráfrasis política explícita.
  - 'La estructura de la frase respeta el orden lógico del griego: límite temporal, aparición del rey, y la cláusula relativa sobre José.'
