    issue: «por medio de la mano del ángel» es un calco pesado
    rationale: Aunque intenta reflejar σὺν χειρὶ, en español suena artificial. «Por mano del ángel» conserva mejor el giro bíblico y la mediación instrumental sin sacrificar naturalidad.
  - severity: low
    issue: La nota [a] sobre «rechazaron» no está motivada por el audit trail inglés
    rationale: El inglés solo conserva nota para λυτρωτής. Añadir una nota nueva aquí no corrige una ambigüedad creada por el español y recarga innecesariamente el verso.
