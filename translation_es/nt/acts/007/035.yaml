translation:
  language: es
  text: 'Este Moisés, a quien ellos rechazaron, diciendo: «¿Quién te puso por gobernante y juez?»—a este Dios lo envió como gobernante y redentor[a], por mano del ángel que se le apareció en la zarza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libertador». El término griego puede referirse a quien trae liberación; «redentor» se eligió para conservar la resonancia de redención.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρνήσαντο
  english_pob_choice: rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - negaron
  - repudiaron
  lexicon: BDAG
  rationale: En este contexto el verbo expresa repudiar la autoridad de Moisés, no solo una negación verbal. «Rechazaron» conserva bien ese matiz narrativo y es natural en español.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: puso por
  alternatives_spanish:
  - nombró
  - estableció como
  lexicon: BDAG
  rationale: La pregunta trata de instalar a alguien en un cargo o función. «Puso por» reproduce de forma clara y idiomática la idea de designación para un oficio sin alejarse del griego.
- source_word: ἄρχοντα
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  lexicon: BDAG
  rationale: ἄρχων denota a quien ejerce autoridad. «Gobernante» preserva el sentido oficial y evita suavizar el término.
- source_word: δικαστήν
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  lexicon: BDAG
  rationale: El término designa con sencillez a quien juzga. «Juez» es la equivalencia más directa y clara.
- source_word: λυτρωτὴν
  english_pob_choice: redeemer
  chosen_spanish: redentor
  alternatives_spanish:
  - libertador
  - liberador
  lexicon: BDAG
  rationale: λυτρωτής puede referirse a quien trae liberación o rescate. «Redentor» preserva mejor el peso de redención que «libertador», y mantiene la resonancia teológica presente en el texto.
- source_word: ἀπέσταλκεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - ha enviado
  - mandó
  lexicon: BDAG
  rationale: Aunque el perfecto puede sugerir una acción con vigencia actual, en español narrativo «envió» fluye con naturalidad y conserva el hecho cumplido.
- source_word: σὺν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por medio de la mano de
  alternatives_spanish:
  - con la ayuda de
  - por
  lexicon: BDAG
  rationale: Se trata de una expresión semítica/instrumental. «Por medio de la mano de» mantiene el giro bíblico y la mediación del ángel.
- source_word: ἀγγέλου
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En la narración de la zarza ardiente, ἄγγελος se refiere al ser celestial que se apareció a Moisés. «Ángel» es el equivalente normal y adecuado.
- source_word: τοῦ ὀφθέντος αὐτῷ ἐν τῇ βάτῳ
  english_pob_choice: who appeared to him in the bush
  chosen_spanish: que se le apareció en la zarza
  alternatives_spanish:
  - que fue visto por él en la zarza
  lexicon: BDAG
  rationale: El participio pasivo funciona idiomáticamente como «aparecerse». «Se le apareció» expresa el sentido con naturalidad; «zarza» comunica el referente de βάτος en el contexto de la zarza ardiente.
- source_word: Τοῦτον ... τοῦτον
  english_pob_choice: This Moses ... this man
  chosen_spanish: Este Moisés ... a este
  alternatives_spanish:
  - Este mismo Moisés ... a este mismo
  - Este Moisés ... a este hombre
  lexicon: BDAG
  rationale: La repetición del demostrativo es enfática. «Este Moisés... a este» conserva esa fuerza en español sin sonar forzado; el pronombre retoma al mismo referente con claridad.
- source_word: καὶ ἄρχοντα καὶ λυτρωτὴν
  english_pob_choice: as both ruler and redeemer
  chosen_spanish: como gobernante y redentor
  alternatives_spanish:
  - como gobernante y como redentor
  - como tanto gobernante como redentor
  lexicon: BDAG
  rationale: El doble καί marca una coordinación enfática. En español, «como gobernante y redentor» comunica la doble función sin recargar la frase.
theological_decisions:
- issue: Cómo traducir λυτρωτής sin perder la carga de rescate/redención en la tipología de Moisés
  english_pob_reading: redeemer
  chosen_spanish_reading: redentor
  alternative_spanish_readings:
  - libertador
  - liberador
  rationale: «Redentor» preserva mejor la densidad redentora del término y permite mantener la tipología salvífica del pasaje sin reducirla a una simple liberación política o física.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo reflejar la mediación expresada por σὺν χειρὶ ἀγγέλου
  english_pob_reading: by the hand of the angel
  chosen_spanish_reading: por medio de la mano del ángel
  alternative_spanish_readings:
  - con la ayuda del ángel
  - por mano del ángel
  rationale: La construcción conserva el giro semítico y evita borrar la mediación instrumental del ángel en la escena de la zarza.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se mantiene la lectura auditada con alta concordancia entre los controles de revisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada solo cuando el texto fuente lo requiera; este versículo no la contiene.
  - Se prefirió «redentor» sobre «libertador» para conservar la carga salvífica documentada en el audit trail.
  - Se usó un orden de palabras natural en español, pero sin perder la repetición enfática de «este... a este».
