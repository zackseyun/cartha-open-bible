review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: acción en curso («lo apedreaban»), dirección explícita de la súplica a Jesús («Señor Jesús»), y «mi espíritu» para τὸ πνεῦμά μου. Sin embargo, «mientras invocaba» deja el verbo ἐπικαλούμενον demasiado absoluto en español; con el discurso directo siguiente puede leerse aceptablemente, pero resulta menos natural que una formulación que una la invocación con el acto de decir. Además, la nota alternativa actual invierte la prioridad semántica del inglés auditado: el texto principal español usa «invocaba», mientras la nota ofrece «llamaba», cuando el inglés principal eligió una forma más general («called out») y reservó «invoking» como alternativa más explícita. Conviene reparar esa relación para mayor fidelidad al rastro de auditoría y mejor legibilidad en español.'
  spanish_quality_summary: El español es claro y digno, pero «mientras invocaba y decía» suena algo trabado y elipsis del complemento de «invocaba» puede sentirse rígida. Una redacción como «mientras lo invocaba y decía» suena más natural y deja inequívoco el referente sin sobreinterpretar. La puntuación y el registro son adecuados.
  glossary_alignment: «Señor Jesús» concuerda con la política para κύριος en vocativo a Jesús; «espíritu» mantiene correctamente πνεῦμα. No hay conflicto con Yahvé/Mesías u otras entradas del glosario. La única mejora terminológica es hacer más natural la expresión de ἐπικαλούμενον sin perder el matiz de invocación orante.
  issues:
  - severity: medium
    issue: La frase «mientras invocaba[a] y decía» es poco natural en español por la ausencia del complemento de «invocar».
    rationale: Aunque el contexto permite inferir que invoca a Jesús, en español el verbo suele pedir objeto explícito. Añadir «lo» aclara el referente y mejora la fluidez sin apartarse del griego ni del sentido teológico.
  - severity: medium
    issue: La nota al pie no preserva bien la jerarquía de alternativas del audit trail inglés.
    rationale: El inglés principal usa una expresión más general («called out») y la nota ofrece la alternativa más explícita («invoking»). En español, el borrador principal usa ya «invocaba» y la nota propone «llamaba», invirtiendo esa lógica. La nota debe reformularse para reflejar una alternativa real y útil en español.
  revised_spanish_text: 'Y lo apedreaban a Esteban, mientras lo invocaba[a] y decía: «Señor Jesús, recibe mi espíritu».'
  revised_footnotes:
  - marker: a
    text: 'O: «mientras clamaba y decía». El participio griego también puede expresar más explícitamente la idea de invocar o dirigirse a alguien en súplica.'
    reason: lexical_alternative
  revision_rationale: Se añadió el pronombre «lo» para que «invocaba» suene natural e inequívoco en español, manteniendo que la súplica va dirigida a Jesús. También se ajustó la nota para ofrecer una alternativa española plausible sin invertir la lógica semántica del rastro inglés.
