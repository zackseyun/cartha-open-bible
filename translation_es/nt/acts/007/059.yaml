translation:
  language: es
  text: 'Y lo apedreaban a Esteban, mientras lo invocaba[a] y decía: «Señor Jesús, recibe mi espíritu».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras clamaba y decía». El participio griego también puede expresar más explícitamente la idea de invocar o dirigirse a alguien en súplica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλιθοβόλουν
  english_pob_choice: they were stoning
  chosen_spanish: lo apedreaban
  alternatives_spanish:
  - lo estaban apedreando
  - lo apedreaban continuamente
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso. En español, el imperfecto simple «lo apedreaban» comunica bien esa duración sin volver la frase pesada. «Lo estaban apedreando» es posible, pero aquí suena más recargado.
- source_word: ἐπικαλούμενον
  english_pob_choice: as he called out
  chosen_spanish: mientras invocaba[a]
  alternatives_spanish:
  - mientras llamaba
  - mientras invocaba a Jesús
  lexicon: BDAG
  rationale: El participio puede implicar invocación en oración. «Invocaba» conserva esa fuerza religiosa y evita rebajar el acto a un mero grito. Se mantiene la relación con el discurso siguiente sin sobreexplicar el objeto verbal, que está claro por el contexto.
- source_word: λέγοντα
  english_pob_choice: and said
  chosen_spanish: y decía
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio coordinado se puede verter de modo natural con el imperfecto de habla en español. «Y decía» mantiene la continuidad de la escena y suena más fluido en contexto narrativo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el vocativo dirigido a Jesús, «Señor» preserva la reverencia y la carga cristológica. «Maestro» no refleja tan bien la dimensión de adoración/petición presente en el contexto.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: δέξαι
  english_pob_choice: receive
  chosen_spanish: recibe
  alternatives_spanish:
  - acepta
  - toma
  lexicon: BDAG
  rationale: El imperativo aoristo en una oración de entrega se expresa naturalmente con «recibe». Conserva el matiz de encomendarse a otro al morir.
- source_word: τὸ πνεῦμά μου
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento de vida
  - mi vida
  lexicon: BDAG
  rationale: «Espíritu» es la equivalencia directa y más clara para πνεῦμα en este contexto de muerte y entrega personal. Otras opciones diluyen el sentido inmediato del texto.
theological_decisions:
- issue: La invocación de Esteban a Jesús debe verse como oración dirigida al Cristo resucitado sin suavizarla.
  english_pob_reading: Rendered ἐπικαλούμενον as 'as he called out' and retained the direct address 'Lord Jesus'
  chosen_spanish_reading: «mientras invocaba» junto con «Señor Jesús» deja explícita la petición/oración dirigida a Jesús.
  alternative_spanish_readings:
  - mientras llamaba
  - mientras pedía
  rationale: El griego permite un matiz de invocación cultual; en español, «invocaba» comunica mejor esa orientación orante que un simple «llamaba». El vocativo «Señor Jesús» preserva la dirección de la súplica sin cambiar el referente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en los puntos clave: imperfecto durativo para ἐλιθοβόλουν, participio con matiz de invocación para ἐπικαλούμενον, y vocativo directo a Jesús. No se requieren revisiones adicionales respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se conserva la diferencia entre «Señor» como vocativo cristológico y «Jesús» como nombre propio.
  - Se usa «espíritu» para πνεῦμα por claridad y correspondencia directa con el contexto de muerte.
  - 'La sintaxis mantiene el orden narrativo del griego sin calco rígido: acción en curso, invocación, luego la petición.'
