revisions:
- from: 'Cuando Moisés lo vio[a], se asombró ante la visión. Y al acercarse para observarla con atención[c][b], se oyó una voz del Señor:'
  to: 'Cuando Moisés lo vio[a], se asombró ante lo que veía. Y al acercarse para observarlo con atención[c], vino una voz del Señor[b]:'
  rationale: Se ajusta τὸ ὅραμα a una expresión principal más acorde con el contexto visible y con el razonamiento documentado por el POB, dejando «la visión» como alternativa en nota. También se corrige ἐγένετο φωνὴ a una formulación eventiva («vino una voz») y se mueve «se oyó una voz» a nota. Además, se normalizan los referentes de «observarlo» para concordar con el fenómeno visible mencionado.
