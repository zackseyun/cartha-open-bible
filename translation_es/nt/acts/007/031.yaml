review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego y mantiene correctamente «Señor» para κύριος. Sin embargo, se aparta del rastro auditado del POB en dos puntos significativos: τὸ ὅραμα se vertió en el texto principal como «la visión» en vez de una opción más concreta para un fenómeno visible, y ἐγένετο φωνὴ se convirtió en «se oyó una voz», que añade un matiz auditivo no explícito frente a la construcción eventiva del griego.'
  spanish_quality_summary: El español es claro y natural, pero puede ajustarse mejor a la filosofía optimal-equivalence del POB. «Se asombró ante la visión» es legible, aunque «ante lo que vio» o «ante aquella vista» suena más idiomático en español para un fenómeno visible. «Vino una voz del Señor» suena algo literal, pero en este contexto es preferible a «se oyó una voz» por fidelidad semántica.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Ἰησοῦς no aparece; κύριος se conserva como «Señor» y no como «Yahvé» en el texto principal, con nota explicativa adecuada. No hay conflicto con otros términos del glosario. La excepción principal es léxica/contextual: ὅραμα conviene reflejarlo en el texto principal como fenómeno visible, dejando «visión» como alternativa en nota, conforme al POB inglés.'
  issues:
  - severity: medium
    issue: τὸ ὅραμα se tradujo como «la visión» en el texto principal.
    rationale: Aunque ὅραμα puede significar «visión», el contexto inmediato es el arbusto ardiente como fenómeno visible externo. El POB inglés documenta «the sight» precisamente para evitar una lectura de trance o visión interior. En español, conviene una formulación equivalente en el texto principal y reservar «la visión» para nota alternativa.
  - severity: medium
    issue: La nota [a] contradice la elección principal y su justificación.
    rationale: La nota dice que se eligió «la visión», pero presentada como alternativa a «lo vio». Además, la explicación repite la lógica que favorece una referencia visible, no necesariamente «visión». Debe rehacerse para indicar que una alternativa es «la visión», mientras el texto principal opta por una expresión más contextual.
  - severity: medium
    issue: ἐγένετο φωνὴ se vertió como «se oyó una voz».
    rationale: Esa formulación introduce la idea de percepción auditiva ('se oyó') más de lo que exige el griego. El rastro POB prefiere una construcción eventiva («vino/llegó una voz» o «hubo una voz») y deja «se oyó» como alternativa en nota.
  revised_spanish_text: 'Cuando Moisés lo vio[a], se asombró ante lo que veía. Y al acercarse para observarlo con atención[c], vino una voz del Señor[b]:'
