  - marker: b
    text: O «se oyó una voz del Señor».
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores esperarían «Yahvé» por la escena del Éxodo; sin embargo, el griego dice κύριος, «Señor».
    reason: alternative_reading
  revision_rationale: Se ajusta τὸ ὅραμα a una expresión principal más acorde con el contexto visible y con el razonamiento documentado por el POB, dejando «la visión» como alternativa en nota. También se corrige ἐγένετο φωνὴ a una formulación eventiva («vino una voz») y se mueve «se oyó una voz» a nota. Además, se normalizan los referentes de «observarlo» para concordar con el fenómeno visible mencionado.
