translation:
  language: es
  text: 'Cuando Moisés lo vio[a], se asombró ante lo que veía. Y al acercarse para observarlo con atención[c], vino una voz del Señor[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la visión». El término griego puede designar una aparición visible o una visión; aquí se prefirió una expresión referida a lo visible porque Moisés está reaccionando al fenómeno del arbusto.
    reason: lexical_alternative
  - marker: b
    text: O «se oyó una voz del Señor».
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores esperarían «Yahvé» por la escena del Éxodo; sin embargo, el griego dice κύριος, «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - habiendo visto
  - vio
  lexicon: BDAG
  rationale: El participio aoristo expresa acción previa a la principal; en español, «lo vio» comunica de manera natural la referencia al fenómeno visible sin añadir elementos ajenos al griego.
- source_word: ἐθαύμασεν
  english_pob_choice: marveled
  chosen_spanish: se asombró
  alternatives_spanish:
  - se maravilló
  - quedó maravillado
  lexicon: BDAG
  rationale: θαυμάζω aquí expresa sorpresa o asombro. «Se asombró» conserva la reacción fuerte y resulta claro en español contemporáneo.
- source_word: τὸ ὅραμα
  english_pob_choice: the sight
  chosen_spanish: la visión
  alternatives_spanish:
  - el espectáculo
  - la vista
  lexicon: BDAG
  rationale: Aunque el contexto describe un fenómeno visible, ὅραμα puede denotar «visión» o aparición visible. Aquí se mantiene «visión» porque el texto griego permite esa ambigüedad y así se preserva mejor el valor del término frente a una simple naturalización de la escena.
- source_word: προσερχομένου
  english_pob_choice: as he came near
  chosen_spanish: al acercarse
  alternatives_spanish:
  - cuando se acercaba
  - mientras se acercaba
  lexicon: BDAG
  rationale: El genitivo absoluto señala circunstancia temporal acompañante. «Al acercarse» es fluido en español y conserva la relación de proximidad al hecho principal.
- source_word: κατανοῆσαι
  english_pob_choice: to look closely
  chosen_spanish: observarla con atención
  alternatives_spanish:
  - examinarla
  - mirarla cuidadosamente
  lexicon: BDAG
  rationale: κατανοέω implica notar o examinar atentamente. Como su objeto inmediato es el fenómeno visto, «observarla con atención» transmite bien el foco visual sin perder naturalidad.
- source_word: ἐγένετο φωνὴ
  english_pob_choice: a voice came
  chosen_spanish: se oyó una voz
  alternatives_spanish:
  - vino una voz
  - hubo una voz
  lexicon: BDAG
  rationale: La construcción eventiva con γίνομαι introduce lo que sucede. En español, «se oyó una voz» expresa con claridad la irrupción de la voz en la escena; se mantiene la cautela de no convertir la frase en una explicación más interpretativa que el griego.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Dios
  - de Yahvé
  lexicon: BDAG
  rationale: El texto griego dice κύριος, no el Tetragrama. Se conserva «Señor» para reflejar el término griego y, a la vez, la mayúscula de tratamiento reverente en español. Aunque la escena remite al trasfondo del Éxodo, el griego no escribe el nombre divino aquí.
theological_decisions:
- issue: κύριος en una escena teofánica alusiva al Éxodo
  english_pob_reading: the Lord, not the LORD
  chosen_spanish_reading: el Señor, no Yahvé en el texto principal
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La fuente griega lee κύριος. Siguiendo el criterio del POB, se representa con «Señor» y no se sustituye por un nombre divino del hebreo; así se preserva la forma del texto fuente y se deja constancia de la alusión teofánica sin ocultar la lectura griega.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales. Se mantuvo la lectura griega de κύριος como «Señor» y se resolvió la tensión entre ὅραμα como «visión» o «sight» en favor de una opción española natural y suficientemente fiel al contexto visible del episodio.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como forma estándar y reconocible en español.
  - Se usó «Señor» para κύριος de acuerdo con el texto griego y la política terminológica del proyecto.
  - Se prefirió «se asombró» para expresar el matiz de θαυμάζω sin exceso de solemnidad.
  - La frase final conserva la ambigüedad de la voz como evento narrativo, sin añadir explícitamente un sujeto distinto al griego.
