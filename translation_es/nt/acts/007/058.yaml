review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: expulsion previa, apedreamiento en curso, sentido jurídico de μάρτυρες, y referencia a Saulo. Sin embargo, la combinación «después de haberlo sacado de la ciudad[a]» debilita la fuerza explícita de ἔξω τῆς πόλεως, que en el griego está lexicalmente presente además del verbo de expulsar. Conviene explicitar «fuera de la ciudad» en el texto principal, no solo en nota.'
  spanish_quality_summary: El español es claro y legible, pero «sus vestiduras» suena algo elevado/tradicional y menos preciso que la decisión auditada «outer garments». «Sus mantos» funciona mejor en español bíblico moderno y mantiene naturalidad, con nota que preserve las alternativas más amplias. También es preferible «dejaron» frente a «pusieron» para ἀπέθεντο en este contexto de quitarse ropa y depositarla.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Testigos» alinea correctamente con la decisión teológica sobre μάρτυρες. «Saulo» y el resto del léxico son adecuados. La principal mejora es reflejar con más plenitud ἔξω y afinar ἱμάτια con una opción española más natural.
  issues:
  - severity: medium
    issue: ἔξω τῆς πόλεως no queda plenamente representado en el texto principal
    rationale: «De la ciudad» tras «sacado» sugiere salida, pero el griego expresa explícitamente «fuera de la ciudad». Dado que el POB inglés lo conserva en el texto principal, el español también debería hacerlo.
  - severity: low
    issue: «Vestiduras» es menos natural y menos preciso para ἱμάτια en español actual
    rationale: Aunque no es incorrecto, suena más arcaizante y menos concreto. «Mantos» o «prendas exteriores» comunica mejor ropa exterior; una nota puede preservar la amplitud léxica.
  - severity: low
    issue: «Pusieron» es algo plano para ἀπέθεντο en contexto de depositar ropa
    rationale: «Dejaron» o «depositaron» encaja mejor con el acto de quitarse y dejar la ropa a los pies de alguien.
