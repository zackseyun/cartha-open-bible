revisions:
- from: Y después de haberlo sacado de la ciudad[a], lo estaban apedreando. Y los testigos pusieron sus vestiduras[b] a los pies de un joven llamado Saulo.
  to: Y después de haberlo expulsado fuera de la ciudad[a], lo estaban apedreando. Y los testigos dejaron sus mantos[b] a los pies de un joven llamado Saulo.
  rationale: Se ajusta el texto para reflejar explícitamente ἔξω τῆς πόλεως en el cuerpo principal, en consonancia con la evidencia griega y la decisión auditada en inglés. También se mejora la naturalidad y precisión del español al usar «dejaron» para ἀπέθεντο y «mantos» para ἱμάτια, preservando las alternativas amplias en nota.
