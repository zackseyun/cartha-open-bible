translation:
  language: es
  text: Y después de haberlo expulsado fuera de la ciudad[a], lo estaban apedreando. Y los testigos dejaron sus mantos[b] a los pies de un joven llamado Saulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haberlo sacado de la ciudad». El griego expresa explícitamente que lo echaron fuera de la ciudad.
    reason: alternative_reading
  - marker: b
    text: O «sus prendas de vestir exteriores» o «sus vestiduras». El término griego se refiere ampliamente a ropa exterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλόντες
  english_pob_choice: after they had driven him out
  chosen_spanish: después de haberlo sacado
  alternatives_spanish:
  - después de haberlo expulsado
  - habiéndolo echado fuera
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, la construcción de anterioridad con ‘después de haber…’ comunica bien esa prioridad temporal sin sonar rígida. ‘Sacado’ mantiene la fuerza de expulsión física del contexto.
- source_word: ἔξω τῆς πόλεως
  english_pob_choice: out of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - afuera de la ciudad
  lexicon: BDAG
  rationale: La idea de movimiento desde el interior hacia fuera ya queda expresada por el verbo anterior; en español, ‘de la ciudad’ es natural y fiel al conjunto de la frase.
- source_word: ἐλιθοβόλουν
  english_pob_choice: they were stoning him
  chosen_spanish: lo estaban apedreando
  alternatives_spanish:
  - lo apedreaban
  - lo apedrearon
  lexicon: BDAG
  rationale: El imperfecto señala acción en curso; ‘lo estaban apedreando’ reproduce mejor ese aspecto que un pretérito simple.
- source_word: οἱ μάρτυρες
  english_pob_choice: the witnesses
  chosen_spanish: los testigos
  alternatives_spanish:
  - los testigos acusadores
  - los que testificaban
  lexicon: BDAG
  rationale: Aquí μάρτυρες tiene sentido jurídico y narrativo, no el sentido posterior de ‘mártires’. ‘Testigos’ preserva ese valor sin añadir una connotación ajena al pasaje.
- source_word: ἀπέθεντο
  english_pob_choice: laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - depositaron
  - dejaron
  lexicon: BDAG
  rationale: El verbo describe el acto de dejar o colocar algo aparte; ‘pusieron’ es natural en español y funciona bien con la expresión siguiente.
- source_word: τὰ ἱμάτια αὐτῶν
  english_pob_choice: their outer garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus prendas de vestir exteriores
  - sus mantos
  lexicon: BDAG
  rationale: ἱμάτια se refiere amplísimamente a ropa exterior. ‘Vestiduras’ es un término español digno y suficientemente amplio; se deja constancia de que el griego abarca ropa exterior en sentido general.
- source_word: παρὰ τοὺς πόδας
  english_pob_choice: at the feet of
  chosen_spanish: a los pies de
  alternatives_spanish:
  - junto a los pies de
  - delante de los pies de
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural en español para colocar algo junto a una persona en señal de depósito o custodia.
- source_word: νεανίου
  english_pob_choice: a young man
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un mozo
  lexicon: BDAG
  rationale: ‘Joven’ comunica bien la edad relativa del término sin cargarlo con matices demasiado coloquiales o demasiado juveniles.
- source_word: καλουμένου Σαύλου
  english_pob_choice: called Saul
  chosen_spanish: llamado Saulo
  alternatives_spanish:
  - de nombre Saulo
  - con el nombre de Saulo
  lexicon: BDAG
  rationale: ‘Llamado’ sigue de cerca la forma participial griega y es claro en español. Se conserva ‘Saulo’ como nombre propio correspondiente al griego Σαῦλος.
theological_decisions:
- issue: Sentido de μάρτυρες en un contexto de ejecución
  english_pob_reading: Rendered as 'witnesses' in the legal sense, not 'martyrs.'
  chosen_spanish_reading: ‘testigos’ en sentido jurídico, no ‘mártires’
  alternative_spanish_readings:
  - ‘mártires’
  - ‘testigos’ con nota explicativa
  rationale: 'El contexto inmediato es procesal y narrativo: quienes participan en la ejecución son los testigos legales. Traducir ‘mártires’ introduciría un sentido eclesial posterior que el pasaje no exige.'
  doctrine_reference: Primacía del sentido del idioma original sobre la tradición de traducción; evitar añadir una carga doctrinal o hagiográfica no presente en el texto.
translation_notes:
  revision_awareness: La revisión más reciente indica sin cambios necesarios; este borrador sigue el acuerdo alto del control cruzado y conserva las decisiones léxicas y aspectuales principales del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el aspecto imperfectivo de ἐλιθοβόλουν con ‘lo estaban apedreando’.
  - Se evita ‘Cristo/SEÑOR’ u այլ terminología no pertinente; no hay nombres divinos en este versículo.
  - ‘Testigos’ conserva la referencia legal de μάρτυρες sin importar el sentido posterior de ‘mártires’.
  - ‘Vestiduras’ es una opción digna y amplia para ἱμάτια; la nota aclara la amplitud semántica.
