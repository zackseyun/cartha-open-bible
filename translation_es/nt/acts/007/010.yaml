translation:
  language: es
  text: y lo rescató de todas sus aflicciones[a], y le dio favor[b] y sabiduría delante de Faraón, rey de Egipto, y lo puso como gobernante[c] sobre Egipto y sobre toda su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo libró de todas sus angustias».
    reason: lexical_alternative
  - marker: b
    text: O «gracia»; aquí significa el favor o la buena disposición mostrada hacia José en presencia de Faraón.
    reason: lexical_alternative
  - marker: c
    text: O «lo nombró gobernador».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξείλατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - lo libró
  - lo salvó
  - lo sacó
  lexicon: BDAG
  rationale: ἐξαιρέω aquí expresa liberación activa de una situación de angustia o peligro. «Rescató» comunica esa acción de liberación de manera natural en español y conserva la fuerza narrativa mejor que un simple «sacó».
- source_word: θλίψεων
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - penas
  - angustias
  - aflicciones
  lexicon: BDAG
  rationale: θλῖψις en este contexto narra presiones, sufrimientos y dificultades reales; «aflicciones» preserva el peso del término sin cargarlo con un matiz escatológico propio de «tribulaciones».
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: favor[b]
  alternatives_spanish:
  - gracia
  lexicon: BDAG
  rationale: Aquí χάρις designa el buen trato o la aceptación favorable de Faraón hacia José. «Favor» expresa mejor ese sentido inmediato; se mantiene la alternativa teológica en nota porque «gracia» sigue siendo una posibilidad léxica legítima.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: BDAG
  rationale: σοφία significa de manera directa «sabiduría»; en español esa es la equivalencia más fiel y clara en el contexto del reconocimiento dado por Faraón.
- source_word: ἐναντίον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: BDAG
  rationale: ἐναντίον con genitivo indica estar en presencia o a la vista de alguien. «Delante de» es idiomático en español y conserva esa relación de presencia sin añadir formalidad innecesaria.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: lo puso como gobernante[c]
  alternatives_spanish:
  - lo nombró
  - lo estableció
  - lo designó
  lexicon: BDAG
  rationale: καθίστημι aquí implica colocar a alguien en una función de autoridad. «Lo puso como gobernante» comunica la instalación en cargo de manera natural; la nota permite la alternativa «gobernador» que refleja la misma función de autoridad.
- source_word: ἡγούμενον
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - gobernador
  - líder
  lexicon: BDAG
  rationale: Como complemento de κατέστησεν, ἡγούμενον señala a alguien que ejerce autoridad directiva. «Gobernante» es suficientemente amplio y fiel; «gobernador» queda como alternativa posible pero más administrativa.
- source_word: ἐπ’ Αἴγυπτον
  english_pob_choice: over Egypt
  chosen_spanish: sobre Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - a cargo de Egipto
  lexicon: BDAG
  rationale: La construcción con ἐπί + acusativo expresa autoridad sobre una esfera. «Sobre Egipto» reproduce esa relación de gobierno de manera breve y clara.
- source_word: ὅλον τὸν οἶκον αὐτοῦ
  english_pob_choice: all his household
  chosen_spanish: sobre toda su casa
  alternatives_spanish:
  - sobre toda su familia
  - sobre todo su hogar
  lexicon: BDAG
  rationale: οἶκος aquí abarca la casa en sentido doméstico-administrativo, no solo el edificio. «Toda su casa» conserva la amplitud del término y funciona bien en español bíblico; se coordina con «sobre Egipto» para reflejar el alcance total de su autoridad.
theological_decisions:
- issue: Sujeto implícito de la acción divina en la narración
  english_pob_reading: The implied subject is God, continuing Stephen's summary of Joseph's story.
  chosen_spanish_reading: El sujeto implícito sigue siendo Dios, sin nombrarlo de nuevo en la cláusula.
  alternative_spanish_readings:
  - Dios lo rescató...
  - Él lo rescató...
  rationale: El griego mantiene verbos coordinados sin repetir el sujeto explícitamente. La versión española conserva esa continuidad narrativa y no inserta «Dios» para no forzar una explicitación ausente en el verso, aunque el contexto inmediato lo presupone.
  doctrine_reference: Primacía del texto original y preservación de la tensión narrativa; coherencia contextual sin sobreexplicación.
translation_notes:
  revision_awareness: Sin cambios de revisión aplicados; se mantiene la lectura estable del texto fuente y del audit trail inglés, con ajuste español de estilo y de matiz léxico.
  spanish_consistency_notes:
  - Se preserva «Yahvé» cuando el texto lo requiera, pero aquí no aparece el nombre divino explícito.
  - Se evita traducir automáticamente χάρις como «gracia» en el texto principal porque el contexto favorece el sentido relacional de «favor».
  - «Gobernante» se usa como término funcional amplio; la nota mantiene la alternativa «gobernador» por el matiz administrativo señalado en el audit trail.
  - 'La estructura con dos frases coordinadas refleja la progresión del griego: rescate, favor/sabiduría, e instalación en autoridad.'
