review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: liberación de todas las θλίψεις, don de χάρις y σοφία ante Faraón, y nombramiento con autoridad sobre Egipto y la casa de Faraón. Sin embargo, la nota c no preserva plenamente la alternativa inglesa documentada, que abarca no solo «gobernador» sino también el alcance completo «sobre Egipto y toda su casa». Además, «sobre toda su casa» es comprensible, pero «sobre toda su casa» puede sonar algo más físico en español; «sobre toda su casa» sigue siendo defendible por tradición bíblica, aunque «sobre toda su casa»/«sobre toda su familia» no debe reducirse. La mejor reparación es mantener el texto principal casi intacto y ajustar la nota c para reflejar la alternativa completa.'
  spanish_quality_summary: El español es claro, natural y digno. «Rescató», «aflicciones», «sabiduría», «delante de Faraón» y «gobernante» son buenas opciones. El principal problema es de documentación y preservación de alternativas más que de legibilidad. El texto principal suena bien en español eclesial general.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Favor» para χάριν sigue correctamente la decisión contextual frente a «gracia», con nota adecuada. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota c es incompleta frente a la auditoría inglesa.
    rationale: El inglés preserva como alternativa «appointed him governor over Egypt and all his household». La nota española «O «lo nombró gobernador»» solo conserva el título alternativo, pero omite el complemento de autoridad sobre Egipto y toda su casa, que también forma parte de la alternativa documentada.
  - severity: low
    issue: «Toda su casa» puede sugerir más fácilmente el edificio en español contemporáneo.
    rationale: Aunque «casa» es una opción bíblica defendible para οἶκος y aquí funciona, el español moderno puede oírla de forma más física que «household». No es un error suficiente para rechazar el texto, pero conviene que la documentación o la nota no reduzcan el sentido administrativo-doméstico.
  revised_spanish_text: y lo rescató de todas sus aflicciones[a], y le dio favor[b] y sabiduría delante de Faraón, rey de Egipto, y lo puso como gobernante[c] sobre Egipto y sobre toda su casa.
  revised_footnotes:
  - marker: a
    text: O «lo libró de todas sus angustias».
    reason: lexical_alternative
  - marker: b
    text: O «gracia»; aquí significa el favor o la buena disposición mostrada hacia José en presencia de Faraón.
    reason: lexical_alternative
  - marker: c
    text: O «lo nombró gobernador sobre Egipto y toda su casa».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. La corrección necesaria es completar la nota c para preservar fielmente la alternativa registrada en la auditoría inglesa, incluyendo tanto «gobernador» como el alcance de la autoridad «sobre Egipto y toda su casa».
