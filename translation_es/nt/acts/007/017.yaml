translation:
  language: es
  text: Pero cuando se acercaba el tiempo de la promesa que Dios había hecho[a] a Abraham, el pueblo creció y se multiplicó en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la promesa que Dios había prometido a Abraham» o «la promesa que Dios había comprometido a Abraham». El verbo griego puede denotar un compromiso declarado; se usa «había hecho» por ser la forma natural en español en la expresión «hacer una promesa».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθὼς δὲ
  english_pob_choice: But as
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: Καθώς introduce una relación temporal, y δέ añade un leve giro discursivo. En español, 'Pero cuando' comunica bien la transición sin forzar un contraste fuerte y mantiene el valor temporal del inciso.
- source_word: ἤγγιζεν
  english_pob_choice: was drawing near
  chosen_spanish: se acercaba
  alternatives_spanish:
  - iba acercándose
  - estaba llegando
  lexicon: BDAG
  rationale: El imperfecto expresa proceso en curso; 'se acercaba' reproduce naturalmente ese sentido progresivo en español.
- source_word: ὁ χρόνος
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - la fecha
  lexicon: BDAG
  rationale: χρόνος aquí es tiempo en sentido general, no un término más técnico como καιρός. 'El tiempo' es la equivalencia directa y suficiente.
- source_word: τῆς ἐπαγγελίας
  english_pob_choice: of the promise
  chosen_spanish: de la promesa
  alternatives_spanish:
  - de la promesa comprometida
  - de la promesa hecha
  lexicon: BDAG
  rationale: ἐπαγγελία se traduce de manera directa como 'promesa'. El genitivo queda transparente en español como 'de la promesa'.
- source_word: ἧς
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: El relativo retoma 'promesa'. 'Que' es la forma más natural en español para esta cláusula restrictiva.
- source_word: ὡμολόγησεν
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - había prometido
  - había comprometido
  lexicon: BDAG
  rationale: Aunque el verbo puede abarcar declaración o compromiso, en esta construcción con 'promesa' la forma natural en español es 'había hecho'. Evita introducir un matiz más fuerte como juramento, que no está explícito en el griego.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se rinde normalmente como 'Dios'. No se marca el artículo en español porque sería innecesario y poco idiomático.
- source_word: τῷ Ἀβραάμ
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con 'a' en español.
- source_word: ηὔξησεν ὁ λαὸς
  english_pob_choice: the people increased
  chosen_spanish: el pueblo creció
  alternatives_spanish:
  - el pueblo aumentó
  - el pueblo se hizo más numeroso
  lexicon: BDAG
  rationale: λαός designa al pueblo colectivo; 'el pueblo creció' conserva el sujeto colectivo y el sentido de aumento sin redundancia.
- source_word: καὶ ἐπληθύνθη
  english_pob_choice: and multiplied
  chosen_spanish: y se multiplicó
  alternatives_spanish:
  - y se volvió numeroso
  - y aumentó en número
  lexicon: BDAG
  rationale: 'Conviene distinguir este segundo verbo del anterior: ''se multiplicó'' mantiene la diferencia léxica y refleja bien la idea de multiplicación numérica.'
- source_word: ἐν Αἰγύπτῳ
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  lexicon: BDAG
  rationale: Localización simple; 'Egipto' es la forma estándar en español.
theological_decisions:
- issue: Verbo ὡμολόγησεν aplicado a la promesa divina a Abraham
  english_pob_reading: had made within the phrase 'the promise that God had made to Abraham'
  chosen_spanish_reading: había hecho dentro de 'la promesa que Dios había hecho a Abraham'
  alternative_spanish_readings:
  - había prometido
  - había comprometido
  - había jurado
  rationale: La POB inglesa preserva el valor de compromiso declarado sin convertirlo en lenguaje de juramento. En español, 'había hecho' dentro de la expresión fija 'hacer una promesa' transmite la misma idea con naturalidad y sin añadir una afirmación doctrinal más fuerte de la que el verbo exige.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión léxica sin resolverla mediante expansión doctrinal'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran acuerdo alto y no registran revisiones sustanciales recientes; esta versión española sigue esa lectura estable, cuidando especialmente el valor progresivo del imperfecto y la ambigüedad controlada de ὡμολόγησεν sin sobretraducirla.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Abraham' para Ἀβραάμ, conforme a las normas del proyecto.
  - Se distingue 'creció' de 'se multiplicó' para reflejar los dos verbos griegos diferentes (αὐξάνω y πληθύνω).
  - Se conserva 'promesa' como traducción de ἐπαγγελία sin convertirla en 'juramento'.
  - No se usa 'SEÑOR' porque el versículo nombra explícitamente a Dios y no contiene κύριος como sustituto del nombre divino.
