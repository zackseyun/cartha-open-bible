  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Tierra», «caldeos», «Harán» y la omisión del sujeto están alineados con las decisiones documentadas. «Habitó» es aceptable para κατοικέω y «lo trasladó» comunica bien μετῴκισεν.
