base_translation:
  language: en
  yaml_path: translation/nt/acts/007/004.yaml
  text: Then[a], after he had gone out from the land of the Chaldeans, he settled in Haran. And from there, after his father died, he moved him into this land in which you now live[b],
  footnotes:
