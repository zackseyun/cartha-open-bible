translation:
  language: es
  text: Entonces, después de haber salido de la tierra de los caldeos, habitó en Harán. Y desde allí, después de morir su padre, lo trasladó[a] a esta tierra, en la cual ustedes ahora habitan[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «él lo trasladó»; el griego no expresa explícitamente el sujeto, aunque el contexto permite inferirlo.
    reason: lexical_alternative
  - marker: b
    text: Esteban dice que este traslado ocurrió después de la muerte de su padre. Compárese Génesis 11:32; 12:4 para la cronología relacionada.
    reason: cross_reference
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Como marcador discursivo temporal, «Entonces» conserva la secuencia narrativa de forma natural en español y corresponde bien al «Then» del POB inglés.
- source_word: ἐξελθὼν
  english_pob_choice: after he had gone out
  chosen_spanish: después de haber salido
  alternatives_spanish:
  - habiendo salido
  - después de salir
  - al salir
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa anterioridad. «Después de haber salido» mantiene claramente la relación temporal sin sonar forzado.
- source_word: ἐκ γῆς Χαλδαίων
  english_pob_choice: from the land of the Chaldeans
  chosen_spanish: de la tierra de los caldeos
  alternatives_spanish:
  - de la tierra de los caldeanos
  - de Caldea
  lexicon: BDAG
  rationale: «γῆ + genitivo étnico» se refleja de modo directo como «la tierra de los caldeos». «Tierra» preserva γῆ mejor que «país» y evita comprimir el giro a un topónimo más interpretativo.
- source_word: κατῴκησεν
  english_pob_choice: he settled
  chosen_spanish: habitó
  alternatives_spanish:
  - se estableció
  - vivió
  - habitó allí
  lexicon: BDAG
  rationale: Aunque «se estableció» capta bien la idea de residencia fija, «habitó» reproduce con más sobriedad el matiz de κατοικέω y es plenamente readable en español bíblico contemporáneo.
- source_word: ἐν Χαρράν
  english_pob_choice: in Haran
  chosen_spanish: en Harán
  alternatives_spanish:
  - en Harán
  lexicon: BDAG
  rationale: Se conserva el nombre propio tradicionalmente transliterado como «Harán», con preposición locativa normal en español.
- source_word: κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y desde allí
  alternatives_spanish:
  - Y de allí
  - Desde allí
  lexicon: BDAG
  rationale: La crasis κἀκεῖθεν combina enlace y procedencia. «Y desde allí» reproduce ambos elementos de manera natural.
- source_word: μετὰ τὸ ἀποθανεῖν
  english_pob_choice: after ... died
  chosen_spanish: después de morir
  alternatives_spanish:
  - tras morir
  - después de que murió
  - luego de morir
  lexicon: BDAG
  rationale: El infinitivo articular con μετά expresa sucesión temporal. En español, «después de morir» es la forma más limpia y fiel sin añadir una cláusula innecesariamente pesada.
- source_word: τὸν πατέρα αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre
  lexicon: BDAG
  rationale: La construcción posesiva es directa y no requiere mayor elaboración.
- source_word: μετῴκισεν αὐτὸν
  english_pob_choice: he moved him
  chosen_spanish: lo trasladó
  alternatives_spanish:
  - lo movió
  - lo resettló
  - lo trasladó allí
  lexicon: BDAG
  rationale: El verbo μετοικίζω indica mover a alguien a otro lugar o reasentarlo. «Lo trasladó» comunica el cambio de residencia con buena naturalidad en español y mantiene el sujeto implícito del griego, como en la revisión POB.
- source_word: εἰς τὴν γῆν ταύτην
  english_pob_choice: into this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a esta tierra
  - en esta tierra
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento «a» o «hacia/into», en español «a esta tierra» conserva el destino sin sobredeterminar la imagen espacial. «Tierra» mantiene γῆ.
- source_word: εἰς ἣν ὑμεῖς νῦν κατοικεῖτε
  english_pob_choice: in which you now live
  chosen_spanish: en la cual ustedes ahora habitan
  alternatives_spanish:
  - en la cual ustedes ahora viven
  - donde ustedes ahora habitan
  lexicon: BDAG
  rationale: El relativo con repetición de εἰς se vierte idiomáticamente como «en la cual». «Habitan» conserva un tono más bíblico y estable que «viven», sin caer en arcaísmo.
theological_decisions:
- issue: Sujeto implícito de μετῴκισεν
  english_pob_reading: The English audit trail first supplied 'God moved him' for clarity, then revised to 'he moved him' because the Greek does not explicitly state the subject here.
  chosen_spanish_reading: «lo trasladó» sin explicitar el sujeto
  alternative_spanish_readings:
  - Dios lo trasladó
  - él lo trasladó
  rationale: El griego presenta un verbo en tercera singular sin sujeto expreso. En español conviene mantener esa misma no explicitación, ya que el contexto inmediato permite recuperarlo sin añadir información no dicha en el versículo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tensión cronológica con Génesis respecto a la muerte de Taré y la salida de Abram
  english_pob_reading: Translate the Greek as written without harmonizing
  chosen_spanish_reading: Traducir el orden y la secuencia del griego sin armonizar la cronología
  alternative_spanish_readings:
  - Reformular para armonizar con Génesis
  - Suavizar la secuencia temporal
  rationale: La traducción debe preservar la afirmación tal como aparece en Hechos 7:4. No corresponde resolver por paráfrasis una tensión que el texto presenta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión del POB en inglés, que eliminó la explicitación de «God» y conservó el sujeto implícito del verbo griego. En español se mantiene esa decisión, y se conserva también la secuencia temporal sin armonizarla con Génesis, conforme al rastro de auditoría.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «habitó/habitan» para κατοικέω en un registro bíblico claro y contemporáneo, evitando «dwelled»/«habitaría» calcos arcaizantes.
  - «Tierra» se mantuvo para γῆ en ambos casos, para conservar la repetición retórica del griego.
  - Se evitó explicitar un sujeto para μετῴκισεν, en línea con la revisión POB y con la sintaxis del griego.
