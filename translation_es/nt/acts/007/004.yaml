    text: Or, 'he moved him'; the Greek does not state the subject explicitly, though the context indicates God.
    reason: lexical_alternative
  - marker: b
    text: Stephen says this move happened after his father died. Compare Genesis 11:32; 12:4 for the related chronology.
    reason: cross_reference
