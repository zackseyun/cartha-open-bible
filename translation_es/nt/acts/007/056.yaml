  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: mantiene la exclamación inmediata, el presente «veo», el plural «los cielos», el estado resultante de «abiertos», el título «el Hijo del Hombre» y la postura «en pie». Sin embargo, «a la derecha de Dios» no preserva tan bien como «a la diestra de Dios» el idiomatismo bíblico-teológico de ἐκ δεξιῶν, especialmente dado que el inglés auditado eligió explícitamente «at the right hand» por su peso intertextual.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en precisión bíblica y coherencia estilística. «Mira» funciona bien; «en pie» también. El principal ajuste recomendable es «a la diestra de Dios», que en este contexto sigue siendo plenamente inteligible en español eclesial y conserva mejor el registro del pasaje. Además, la nota [a] sobre «Y dijo» es innecesaria y distrae, mientras que falta la nota teológica correspondiente al título «el Hijo del Hombre», presente en el rastro inglés.
  glossary_alignment: 'No aparecen términos del glosario mayor como Yahvé o Mesías. «Dios», «el Hijo del Hombre» y la sintaxis general están alineados con las decisiones del POB. La excepción relevante es ἐκ δεξιῶν: el borrador usa «a la derecha», pero por la racionalidad documentada del POB conviene «a la diestra» para preservar el idiomatismo de autoridad y honor.'
