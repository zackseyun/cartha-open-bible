translation:
  language: es
  text: 'Y dijo: «Mira, veo los cielos abiertos[a] y al Hijo del Hombre[b] en pie a la diestra de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Abiertos» refleja el participio perfecto pasivo griego, que presenta los cielos como ya abiertos en la visión.
    reason: lexical_alternative
  - marker: b
    text: «El Hijo del Hombre» es un título mesiánico reconocido, en eco de Daniel 7:13.
    reason: cross_reference
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Observa
  - Mira bien
  lexicon: BDAG
  rationale: Se conserva el valor de interjección que llama la atención dentro del discurso directo. «Mira» es natural en español y mantiene la inmediatez de la exclamación.
- source_word: θεωρῶ
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - veo
  - contemplo
  - observo
  lexicon: BDAG
  rationale: El presente indica percepción en curso; «veo» es la equivalencia más natural y no exagera el tono del visionario.
- source_word: τοὺς οὐρανοὺς
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: BDAG
  rationale: Se preserva el plural griego con «los cielos» en lugar del singular, manteniendo mejor la forma y el registro visionario.
- source_word: διηνοιγμένους
  english_pob_choice: opened
  chosen_spanish: abiertos
  alternatives_spanish:
  - abiertos
  - abiertos de par en par
  - habiendo sido abiertos
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «abiertos» comunica ese estado de manera clara en español sin sobrertraducir la forma verbal.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: al Hijo del Hombre
  alternatives_spanish:
  - al Hijo del Hombre
  - al Hijo Humano
  lexicon: BDAG
  rationale: Se conserva el título reconocido y su resonancia daniélica; la traducción literal es la más fiel al uso del NT y evita debilitar el carácter técnico del título.
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la derecha
  - a la diestra
  lexicon: BDAG
  rationale: En español actual, «a la derecha» comunica el idiomatismo de posición de honor con naturalidad. Se evita «diestra» por su mayor arcaísmo, aunque la imagen de dignidad se conserva en el contexto.
- source_word: ἑστῶτα
  english_pob_choice: standing
  chosen_spanish: en pie
  alternatives_spanish:
  - en pie
  - de pie
  - parado
  lexicon: BDAG
  rationale: El participio describe postura; «en pie» es idiomático, sobrio y distingue la postura de estar sentado, preservando la tensión textual del pasaje.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: La relación posesiva se traduce de forma directa y sin expansión, manteniendo la simplicidad del genitivo griego.
theological_decisions:
- issue: Título cristológico υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hombre
  - el Ser Humano
  rationale: Se mantiene el título tradicional porque es una designación reconocible y cargada de eco de Daniel 7:13; traducirlo de modo explicativo diluiría su valor intertextual.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Postura del Cristo exaltado
  english_pob_reading: standing at the right hand of God
  chosen_spanish_reading: en pie a la derecha de Dios
  alternative_spanish_readings:
  - sentado a la derecha de Dios
  - a la diestra de Dios
  rationale: Se respeta que el texto diga «en pie» y no se armoniza con fórmulas más comunes sobre estar sentado; esto preserva la tensión y la especificidad teológica del relato.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del inglés POB, que no introdujo cambios adicionales; por ello no se aplicaron ajustes textuales nuevos respecto del sentido auditado.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para θεός.
  - Se preserva el título cristológico «Hijo del Hombre» en forma literal.
  - Se evita «SEÑOR» como sustituto del nombre divino porque este versículo no contiene el tetragrámaton ni κύριος como equivalente directo de Yahvé.
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
