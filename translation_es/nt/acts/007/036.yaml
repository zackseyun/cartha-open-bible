translation:
  language: es
  text: Este los sacó[a], realizando prodigios y señales en la tierra de Egipto y en el Mar Rojo y en el desierto durante cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mar de Junco». El texto griego dice «Mar Rojo» (Ἐρυθρὰ Θάλασσα), la designación estándar en el Nuevo Testamento y la Septuaginta para el lugar del cruce de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo es enfático y apunta a Moisés en el discurso de Esteban. «Este hombre» conserva esa fuerza retórica en español sin volver la frase rígida ni perder claridad.
- source_word: ἐξήγαγεν
  english_pob_choice: led them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los llevó fuera
  - los condujo fuera
  lexicon: BDAG
  rationale: El verbo expresa sacar o conducir fuera. En español, «los sacó» comunica bien la acción de éxodo y mantiene la concisión del griego.
- source_word: ποιήσας
  english_pob_choice: performing
  chosen_spanish: realizando
  alternatives_spanish:
  - haciendo
  - obrando
  lexicon: BDAG
  rationale: El participio aoristo acompaña la acción principal y no introduce una secuencia temporal fuerte. «Realizando» funciona como complemento participial natural en español.
- source_word: τέρατα καὶ σημεῖα
  english_pob_choice: wonders and signs
  chosen_spanish: prodigios y señales
  alternatives_spanish:
  - maravillas y señales
  - portentos y señales
  lexicon: BDAG
  rationale: Conservo la distinción entre actos asombrosos y actos-signo. «Prodigios y señales» es idiomático y preserva mejor el par léxico que una sola idea general de «milagros».
- source_word: ἐν γῇ Αἰγύπτῳ
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: BDAG
  rationale: «Tierra» refleja directamente γῇ y mantiene la estructura geográfica del verso. También evita perder el paralelismo con Mar Rojo y desierto.
- source_word: ἐν Ἐρυθρᾷ Θαλάσσῃ
  english_pob_choice: at the Red Sea
  chosen_spanish: junto al Mar Rojo
  alternatives_spanish:
  - en el Mar Rojo
  - a orillas del Mar Rojo
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν repetidamente, en español «junto al Mar Rojo» expresa con naturalidad el lugar del acontecimiento y evita una formulación extraña como «en el Mar Rojo». Se conserva la designación tradicional «Mar Rojo».
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto del desierto
  - en la región desértica
  lexicon: BDAG
  rationale: «Desierto» es la forma española más natural para el entorno del éxodo. Aunque «wilderness» puede tener un matiz bíblico más amplio, aquí el contexto de peregrinación lo hace suficiente.
- source_word: ἔτη τεσσεράκοντα
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  - cuarenta años
  lexicon: BDAG
  rationale: El español requiere una preposición de duración. «Por cuarenta años» es directo y mantiene la extensión temporal de la acción.
theological_decisions:
- issue: Referencia del demostrativo y agencia en el éxodo
  english_pob_reading: The verse refers to Moses as the human agent who led Israel out while not implying independent divine agency apart from God.
  chosen_spanish_reading: El verso identifica a Moisés como el agente humano que los sacó, sin atribuirle agencia divina independiente de Dios.
  alternative_spanish_readings:
  - Él los sacó, ...
  - Moisés los sacó, ...
  rationale: «Este hombre» conserva el énfasis de Esteban sobre Moisés sin convertir el texto en una identificación explícita por nombre que el griego no da aquí. La formulación mantiene la idea bíblica de acción divina mediante un agente humano.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «in the Red Sea» a «at the Red Sea» para mayor naturalidad. En español se tomó esa misma sensibilidad locativa con «junto al Mar Rojo», manteniendo el dato geográfico y la fluidez. No hubo cambios textuales relevantes en el resto de la línea auditada.
  spanish_consistency_notes:
  - Se conserva «Mar Rojo» como término bíblico estándar, con nota alternativa «Mar de Junco» por la tensión lexical documentada.
  - Se evita «Señor» o sustituciones teológicas ajenas al pasaje; el texto trata de la acción de Moisés en el éxodo.
  - «Prodigios y señales» mantiene el par léxico sin fusionarlo en «milagros», para no borrar la distinción del griego.
