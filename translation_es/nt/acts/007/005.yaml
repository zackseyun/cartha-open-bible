- from: Y no le dio herencia en ella[a], ni siquiera la extensión de un pie; pero le prometió dársela en posesión, y a su descendencia después de él[b], aunque no tenía hijo.
  to: Y no le dio herencia en ella[a], ni siquiera un pie de tierra; pero le prometió dársela como posesión, y a su descendencia después de él[b], aunque no tenía ningún hijo.
  rationale: Se ajusta el modismo de οὐδὲ βῆμα ποδός a un español más natural ('ni siquiera un pie de tierra') mientras se conserva el matiz más literal en nota. También se corrige la cláusula final para evitar el estrechamiento semántico de τέκνου como 'hijo' en sentido exclusivamente masculino; 'ningún hijo' preserva mejor la intención de carencia de descendencia inmediata en una formulación española natural. Además, 'como posesión' representa con más naturalidad el valor resultativo de εἰς κατάσχεσιν.
