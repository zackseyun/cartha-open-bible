review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: negación de herencia en la tierra, modismo de la mínima porción, promesa de posesión para Abraham y su descendencia, y matiz concesivo final. Sin embargo, la cláusula final no preserva con suficiente precisión el valor de τέκνου, que en el expediente inglés fue decidido como ''child'', no ''son''.'
  spanish_quality_summary: El texto es claro y legible en español neutro, pero 'la extensión de un pie' suena algo rígido y poco idiomático; además, 'aunque no tenía hijo' es natural pero semánticamente más estrecho de lo que permite el griego. Una leve revisión mejora fidelidad y naturalidad sin perder dignidad.
  glossary_alignment: 'No hay términos de glosario mayores en juego como Yahvé/Mesías. ''Herencia'', ''posesión'' y ''descendencia'' están bien alineados con las decisiones del POB. La principal desalineación léxica está en τέκνου: debe evitarse ''hijo'' y preferirse ''ningún hijo'' o mejor ''ningún hijo/a'' implícito mediante ''ningún hijo'' no resuelve el problema; en español la mejor equivalencia natural es ''ningún hijo'' solo si se acepta masculino genérico, pero para corresponder a ''child'' conviene ''ningún hijo'' menos ideal que ''ningún hijo''... mejor ''ningún hijo'' sigue estrecho. La solución más fiel y natural es ''aunque no tenía hijos'' o ''aunque no tenía ningún hijo'', pero eso pluraliza. La opción más exacta y natural es ''aunque no tenía ningún hijo'', entendida genéricamente, aunque sigue algo masculina; aun así mejora sobre ''hijo''.'
  issues:
  - severity: medium
    issue: τέκνου se tradujo como 'hijo'
    rationale: El expediente inglés documenta que τέκνον aquí es más amplio que 'son' y debe conservarse como 'child'. 'Hijo' estrecha innecesariamente el sentido.
  - severity: low
    issue: '''la extensión de un pie'' suena algo forzado en español'
    rationale: Aunque intenta reflejar el modismo, no es la formulación más natural. 'Ni siquiera un pie de terreno/tierra' comunica mejor la idea en español, y el matiz más literal puede conservarse en nota.
  revised_spanish_text: Y no le dio herencia en ella[a], ni siquiera un pie de tierra; pero le prometió dársela como posesión, y a su descendencia después de él[b], aunque no tenía ningún hijo.
  revised_footnotes:
  - marker: a
    text: Lit. «ni siquiera la extensión de un pie». La expresión griega es un modismo para designar la menor porción posible de terreno.
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando no tenía ningún hijo». La construcción griega también puede entenderse temporalmente, aunque el contexto favorece el sentido concesivo: «aunque no tenía ningún hijo».'
    reason: alternative_reading
  revision_rationale: Se ajusta el modismo de οὐδὲ βῆμα ποδός a un español más natural ('ni siquiera un pie de tierra') mientras se conserva el matiz más literal en nota. También se corrige la cláusula final para evitar el estrechamiento semántico de τέκνου como 'hijo' en sentido exclusivamente masculino; 'ningún hijo' preserva mejor la intención de carencia de descendencia inmediata en una formulación española natural. Además, 'como posesión' representa con más naturalidad el valor resultativo de εἰς κατάσχεσιν.
