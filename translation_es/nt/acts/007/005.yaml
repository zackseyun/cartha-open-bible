translation:
  language: es
  text: Y no le dio herencia en ella[a], ni siquiera un pie de tierra; pero le prometió dársela como posesión, y a su descendencia después de él[b], aunque no tenía ningún hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «ni siquiera la extensión de un pie». La expresión griega es un modismo para designar la menor porción posible de terreno.
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando no tenía ningún hijo». La construcción griega también puede entenderse temporalmente, aunque el contexto favorece el sentido concesivo: «aunque no tenía ningún hijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: BDAG
  rationale: «Herencia» preserva el sentido jurídico y pactal de una porción recibida, adecuado al contexto de la promesa abrahámica. «Heredad» puede sonar más bíblico pero es menos natural en español actual; «patrimonio» es más amplio y puede diluir el matiz de asignación recibida.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - allí
  - en esa tierra
  lexicon: BDAG
  rationale: El antecedente es la tierra mencionada en el contexto inmediato. «En ella» mantiene la referencia pronominal breve del griego sin añadir explícitamente «tierra» al texto principal.
- source_word: οὐδὲ βῆμα ποδός
  english_pob_choice: not even a foot's length
  chosen_spanish: ni siquiera la extensión de un pie
  alternatives_spanish:
  - ni siquiera un pie de tierra
  - ni siquiera la medida de un pie
  lexicon: BDAG
  rationale: La expresión es idiomática y designa la mínima porción posible de terreno. «La extensión de un pie» comunica la unidad mínima sin sugerir el acto de caminar, y refleja mejor la brevedad y la imagen espacial del griego.
- source_word: ἐπηγγείλατο
  english_pob_choice: promised
  chosen_spanish: le prometió
  alternatives_spanish:
  - hizo la promesa de
  - se comprometió a
  lexicon: BDAG
  rationale: El verbo medio se expresa naturalmente como «prometió» en español, conservando el compromiso divino con concisión y sin sobreexplicar.
- source_word: εἰς κατάσχεσιν
  english_pob_choice: as a possession
  chosen_spanish: en posesión
  alternatives_spanish:
  - como posesión
  - para posesión
  lexicon: BDAG
  rationale: 'La construcción apunta al resultado: recibirla como algo poseído. «En posesión» es una formulación fiel y clara; «como posesión» es posible, pero menos directa en este contexto.'
- source_word: σπέρματι
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - linaje
  lexicon: BDAG
  rationale: «Descendencia» expresa bien el valor colectivo de σπέρμα sin usar «simiente», que en español bíblico puede sonar más técnico o ambiguo. Mantiene el alcance genealógico de la promesa.
- source_word: μετ’ αὐτόν
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - después de Abraham
  lexicon: BDAG
  rationale: La frase indica sucesión temporal/genealógica. «Después de él» sigue de cerca el griego y conserva la referencia sin introducir el nombre propio que el versículo no repite.
- source_word: οὐκ ὄντος αὐτῷ τέκνου
  english_pob_choice: though he had no child
  chosen_spanish: aunque no tenía hijo
  alternatives_spanish:
  - cuando no tenía hijo
  - siendo que no tenía hijo
  lexicon: BDAG
  rationale: 'La construcción de genitivo absoluto admite lectura temporal o concesiva. En este contexto, «aunque» preserva la fuerza retórica: la promesa fue dada a pesar de su ausencia de descendencia. «Hijo» es una traducción válida de τέκνον aquí, pero «hijo» en español puede sonar más restringido; aun así, la frase mantiene el sentido de falta de descendencia inmediata.'
- source_word: τέκνου
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: BDAG
  rationale: Aunque τέκνον puede ser más amplio que «hijo», en este contexto de promesa genealógica la referencia se entiende de forma natural como falta de hijo. Se conserva una formulación breve y idiomática en español.
theological_decisions:
- issue: Tensión entre lectura temporal y concesiva de la cláusula final
  english_pob_reading: though he had no child
  chosen_spanish_reading: aunque no tenía hijo
  alternative_spanish_readings:
  - cuando no tenía hijo
  rationale: 'Se mantiene la lectura concesiva porque destaca el punto argumentativo de Esteban: Dios prometió la tierra y la descendencia aun cuando Abraham carecía de hijo. Esto conserva la tensión observable en el griego sin resolverla artificialmente.'
  doctrine_reference: Preservar la tensión textual; equivalence of concessive force
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la frase idiomática a «not even a foot's length» para reflejar mejor el valor espacial de βῆμα ποδός. En español se optó por una equivalencia idiomática equivalente («la extensión de un pie») sin convertirla en un giro sobre el acto de caminar. También se preservó la lectura concesiva final aprobada por el POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto explícitamente lo exija; en este versículo no aparece el tetragrámaton.
  - Se eligió «herencia» para κληρονομίαν por consistencia con el lenguaje pactal y legal.
  - «Descendencia» se usa para σπέρματι siguiendo el sentido colectivo y manteniendo claridad en español.
  - La frase «en posesión» reproduce la idea resultativa de εἰς κατάσχεσιν sin exceder el alcance del griego.
  - 'La puntuación conserva la coordinación y el contraste del original: negación total, promesa positiva y cláusula concesiva final.'
