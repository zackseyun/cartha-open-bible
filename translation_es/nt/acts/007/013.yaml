translation:
  language: es
  text: Y en la segunda ocasión José fue reconocido por sus hermanos[a], y la familia[b] de José llegó a ser conocida al faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega es pasiva ('fue reconocido'), pero en el trasfondo narrativo puede implicar que José se dio a conocer a ellos. Se conserva la pasiva porque está más cerca del griego y mantiene la tensión observada en la tradición POB.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse 'la parentela de José' o 'el linaje de José'. Se prefirió 'familia' por ser la opción más clara en español contemporáneo, sin perder el sentido de grupo de parentesco.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ δευτέρῳ
  english_pob_choice: on the second visit
  chosen_spanish: en la segunda ocasión
  alternatives_spanish:
  - en la segunda vez
  - en la segunda visita
  - durante la segunda ocasión
  lexicon: BDAG
  rationale: La expresión con artículo y adjetivo funciona de modo idiomático como 'en la segunda ocasión'. En español, 'ocasión' conserva bien la idea sin añadir innecesariamente 'visita', que en el griego no aparece de forma explícita.
- source_word: ἀνεγνωρίσθη
  english_pob_choice: was recognized
  chosen_spanish: fue reconocido
  alternatives_spanish:
  - se dio a conocer
  - se hizo reconocer
  - fue identificado
  lexicon: BDAG
  rationale: El verbo está en pasiva y el texto griego, leído en contexto narrativo, permite la idea de que José fue reconocido por sus hermanos. 'Fue reconocido' mantiene con más fidelidad la forma pasiva que una paráfrasis reflexiva.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ
  english_pob_choice: by his brothers
  chosen_spanish: por sus hermanos
  alternatives_spanish:
  - ante sus hermanos
  - a sus hermanos
  lexicon: BDAG
  rationale: La construcción dativa en pasiva se rinde naturalmente con 'por'. 'Hermanos' es literal y exacto para el grupo masculino aludido en el relato de José.
- source_word: φανερὸν ἐγένετο
  english_pob_choice: became known
  chosen_spanish: llegó a ser conocida
  alternatives_spanish:
  - se hizo conocido
  - se dio a conocer
  - fue conocido
  lexicon: BDAG
  rationale: La combinación con γίνομαι expresa llegada a un estado de conocimiento público. 'Llegó a ser conocida' conserva el matiz de proceso y evita endurecer la frase. En español, se coordina con 'la familia' de forma natural.
- source_word: τὸ γένος Ἰωσήφ
  english_pob_choice: Joseph’s family
  chosen_spanish: la familia de José
  alternatives_spanish:
  - el linaje de José
  - la parentela de José
  - su linaje
  lexicon: BDAG
  rationale: γένος puede significar 'familia', 'linaje' o 'parentela'. Aquí el contexto narrativo favorece el grupo familiar/parentesco conocido por el faraón. 'Familia de José' es claro y no sobredesplaza el término hacia 'raza' o 'linaje' sin necesidad.
- source_word: τῷ Φαραώ
  english_pob_choice: to Pharaoh
  chosen_spanish: por el faraón
  alternatives_spanish:
  - ante el faraón
  - al faraón
  lexicon: BDAG
  rationale: Aunque el dativo puede marcar a quien algo llega a ser conocido, en español la pasiva 'ser conocido por' resulta más natural y mantiene el sentido relacional del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje revisado del audit trail inglés: la POB cambió de una formulación más reflexiva (''made himself known'') a una pasiva más directa (''was recognized''). La versión española sigue esa revisión y evita introducir una reflexiva que suavice la forma verbal griega. También se mantuvo la segunda cláusula como conocimiento que llega al faraón, respetando el valor de γένος como grupo de parentesco.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en todo el proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió 'fue reconocido' para reflejar la pasiva griega, evitando una recasting excesivamente interpretativa.
  - '''Familia de José'' traduce γένος de manera idiomática en español, con nota de alternativas para conservar la amplitud semántica.'
  - Se emplea puntuación y mayúsculas estándar del español, con 'faraón' en minúscula por tratarse de un cargo/título en uso común.
