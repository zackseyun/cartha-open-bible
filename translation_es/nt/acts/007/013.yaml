- from: Y en la segunda ocasión José fue reconocido por sus hermanos[a], y la familia de José[b] llegó a ser conocida por el faraón.
  to: Y en la segunda ocasión José fue reconocido por sus hermanos[a], y la familia[b] de José llegó a ser conocida al faraón.
  rationale: Se corrige el complemento final para reflejar el dativo griego τῷ Φαραώ ('al faraón') en vez de un agente de pasiva ('por el faraón'), y se reubica la nota [b] sobre 'familia', que es la palabra que traduce γένος. Se conserva el resto del texto porque refleja adecuadamente la pasiva de ἀνεγνωρίσθη y la claridad del español contemporáneo.
