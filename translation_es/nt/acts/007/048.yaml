translation:
  language: es
  text: 'Pero el Altísimo no habita en cosas hechas por manos humanas[a], como dice el profeta:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "en templos hechos por manos humanas". El griego es más amplio: "en cosas hechas por manos humanas", aunque el templo es el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca el contraste fuerte con la afirmación anterior; en español, 'Pero' suena natural y conserva la oposición sin volver el inicio artificial.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: BDAG
  rationale: '''Altísimo'' es el título divino establecido en español bíblico y conserva el sentido titular sin añadir ''Dios'', que no aparece explícitamente en el griego.'
- source_word: ἐν χειροποιήτοις
  english_pob_choice: in things made by hands
  chosen_spanish: en cosas hechas por manos
  alternatives_spanish:
  - en cosas hechas con manos humanas
  - en templos hechos por manos
  - en obras hechas por manos
  lexicon: BDAG
  rationale: El plural griego es más amplio que 'templos'; 'cosas hechas por manos' preserva esa amplitud y la contraposición entre lo divino y lo fabricado por el ser humano.
- source_word: κατοικεῖ
  english_pob_choice: does not dwell
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  lexicon: BDAG
  rationale: '''Habita'' comunica de manera natural la idea bíblica de morada/presencia divina en español sin perder el matiz de permanencia.'
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: Introduce la cita de apoyo de forma fluida; 'como' es idiomático en español y mantiene la relación de correspondencia.
- source_word: ὁ προφήτης
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Isaías
  lexicon: BDAG
  rationale: El griego dice solo 'el profeta'; no se debe suplir el nombre en el texto principal aunque la cita provenga de Isaías.
theological_decisions:
- issue: Si traducir χειροποιήτοις como 'templos' en el texto principal
  english_pob_reading: Keep the broader expression 'things made by hands'
  chosen_spanish_reading: Mantener la expresión amplia 'cosas hechas por manos'
  alternative_spanish_readings:
  - templos hechos por manos
  - santuarios hechos por manos
  rationale: Aunque el contexto inmediato es el templo, el adjetivo griego es más amplio y sostiene mejor la fuerza polémica contra cualquier realidad sagrada fabricada por seres humanos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si ampliar ὁ ὕψιστος a 'el Altísimo Dios'
  english_pob_reading: Translate simply as 'the Most High'
  chosen_spanish_reading: Traducir simplemente 'el Altísimo'
  alternative_spanish_readings:
  - el Altísimo Dios
  rationale: El título remite claramente a Dios, pero el texto no añade θεός; por fidelidad al source text, no se incorpora una especificación que no está presente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto al último control de revisión; no se detectaron problemas en el acuerdo entre el texto griego, el audit trail inglés y la redacción española propuesta.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como título divino, coherente con el tratamiento de ὁ ὕψιστος sin añadir 'Dios'.
  - Se preserva la amplitud de χειροποίητος con 'cosas hechas por manos' y una nota que reconoce la alternativa más estrecha relacionada con el templo.
  - La fórmula introductoria 'como dice el profeta' sigue el griego y evita identificar al profeta por inferencia.
  - El registro es sobrio y bíblico, con puntuación española estándar y sin arcaísmos innecesarios.
