translation:
  language: es
  text: 'Entonces el sumo sacerdote dijo[a]: «¿Son así estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Es esto así?»; o, de forma más explícita, «¿Son verdaderos estos cargos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte de manera natural como 'dijo'. Aunque sigue una pregunta directa, en español también es normal introducirla con 'dijo', conservando la forma narrativa del griego sin convertir el verbo en un verbo de interrogación.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca continuidad narrativa. 'Entonces' transmite bien el avance del relato y suena natural en español.
- source_word: ὁ ἀρχιερεύς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: BDAG
  rationale: '''Sumo sacerdote'' es el equivalente establecido y preciso en español para ἀρχιερεύς en este contexto judicial. ''Jefe de los sacerdotes'' sería más literal pero menos idiomático y menos claro.'
- source_word: Εἰ
  english_pob_choice: Are
  chosen_spanish: ¿Son
  alternatives_spanish:
  - ¿Es
  - ¿Si
  lexicon: BDAG
  rationale: En preguntas directas, εἰ introduce una interrogativa de sí/no. En español, '¿Son...' reproduce con naturalidad la fuerza de la pregunta y mantiene el plural de ταῦτα.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos cargos
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural apunta a lo que se ha acusado previamente. 'Estas cosas' es formalmente cercano y no añade la interpretación judicial de 'cargos', que queda como alternativa.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de este modo
  lexicon: BDAG
  rationale: οὕτως afirma el estado de cosas alegado. 'Así' es la opción más breve y natural en español para esta pregunta.
- source_word: ἔχει
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - es el caso
  lexicon: BDAG
  rationale: 'En la expresión idiomática οὕτως ἔχει, ἔχω equivale a ''ser/estar así'' o ''ser el caso''. En español, ''son'' reproduce con naturalidad la pregunta: ''¿Son estas cosas así?''.'
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego SBLGNT y con el audit trail inglés: no hubo revisiones aplicadas y el consenso de revisión fue alto, así que el borrador español sigue de cerca la estructura del original sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se conserva 'sumo sacerdote' como término bíblico estándar y transparente en español.
  - Se mantiene la pregunta breve y judicial del texto griego, sin expandir 'estas cosas' a 'cargos' en el cuerpo principal.
  - La nota alternativa recoge la posibilidad interpretativa que el inglés POB dejó abierta.
