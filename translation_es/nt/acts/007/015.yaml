translation:
  language: es
  text: Y Jacob bajó[a] a Egipto, y murió, él y nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendió». El griego usa un verbo de descenso; se conserva aquí para reflejar el movimiento hacia Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue
  - se fue hacia abajo
  lexicon: BDAG
  rationale: καταβαίνω expresa movimiento descendente; en español, "descendió" conserva la dirección y suena natural en un contexto geográfico e histórico como el viaje a Egipto.
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: convención onomástica
  rationale: El nombre propio se translitera como "Jacob", forma estándar y más cercana al uso bíblico-histórico en español.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - en Egipto
  lexicon: BDAG
  rationale: εἰς marca movimiento hacia un destino. En español, "a Egipto" transmite de forma natural ese desplazamiento; "a" puede abarcar el valor dinámico de entrada sin sonar forzado.
- source_word: ἐτελεύτησεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó al fin de su vida
  lexicon: BDAG
  rationale: τελευτάω es el verbo directo para morir. "Murió" es la equivalencia más clara y transparente, sin suavizar el sentido.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres patriarcas
  lexicon: BDAG
  rationale: El griego dice literalmente "padres". En español, "nuestros padres" conserva la forma masculina-familiar del texto y refleja el uso histórico-covenantal de Stephen/Esteban sin neutralizarlo.
theological_decisions:
- issue: Referencia histórica-covenantal de "nuestros padres"
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: La frase identifica a los patriarcas de Israel dentro de la historia de la alianza. Mantener "padres" preserva el matiz masculino y genealógico del original, en línea con la lectura fuente y la filosofía de precisión de género.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El texto griego carece del artículo o de una frase explicativa adicional; la traducción sigue de cerca el paralelismo simple: descenso de Jacob a Egipto, seguido de su muerte y la de nuestros padres. Se evita ampliar con glosas innecesarias.'
  spanish_consistency_notes:
  - Se mantiene "Jacob" como nombre propio consistente con el uso bíblico común en español.
  - Se evita "SEÑOR" o formas equivalentes porque no hay aquí un término divino en el griego.
  - '"Nuestros padres" conserva la relación histórica con los patriarcas y evita una neutralización no exigida por el texto.'
