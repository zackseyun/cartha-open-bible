translation:
  language: es
  text: Y en aquellos días hicieron un becerro[a] y ofrecieron un sacrificio al ídolo, y se alegraban en las obras de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fabricaron un becerro».
    reason: lexical_alternative
  - marker: b
    text: O «se alegraban por lo que habían hecho con sus manos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοσχοποίησαν
  english_pob_choice: they made a calf
  chosen_spanish: hicieron un becerro
  alternatives_spanish:
  - fabricaron un becerro
  - hicieron un becerro-idolo
  lexicon: BDAG
  rationale: El verbo expresa hacer o dar forma a un becerro; en español, «hicieron un becerro» es natural y fiel. «Fabricaron» es posible, pero suena más técnico. No se añade «ídolo» aquí porque el texto ya lo explicita después con τῷ εἰδώλῳ.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: Es una expresión temporal directa y común; «en aquellos días» conserva la estructura y el tono bíblico sin resultar arcaico.
- source_word: ἀνήγαγον θυσίαν
  english_pob_choice: offered a sacrifice
  chosen_spanish: ofrecieron un sacrificio
  alternatives_spanish:
  - presentaron un sacrificio
  - alzaron un sacrificio
  lexicon: BDAG
  rationale: En contexto sacrificial, el verbo se entiende idiomáticamente como ofrecer. «Ofrecieron un sacrificio» comunica bien la acción cultual en español.
- source_word: τῷ εἰδώλῳ
  english_pob_choice: to the idol
  chosen_spanish: al ídolo
  alternatives_spanish:
  - a un ídolo
  - a la imagen
  lexicon: BDAG
  rationale: «Ídolo» preserva la fuerza despectiva de εἴδωλον. El artículo apunta probablemente al becerro mencionado antes, por eso se usa «al ídolo».
- source_word: εὐφραίνοντο
  english_pob_choice: they were rejoicing
  chosen_spanish: se alegraban
  alternatives_spanish:
  - se regocijaban
  - estaban celebrando
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o repetida. «Se alegraban» mantiene ese valor aspectual y suena natural en español.
- source_word: ἐν τοῖς ἔργοις τῶν χειρῶν αὐτῶν
  english_pob_choice: in the works of their hands
  chosen_spanish: en las obras de sus manos
  alternatives_spanish:
  - en lo que habían hecho con sus manos
  - sobre las obras de sus manos
  lexicon: BDAG
  rationale: Se conserva la imagen bíblica y la fórmula polémica contra la idolatría. «Obras» es el equivalente más natural de ἔργοις y mantiene el eco escritural.
theological_decisions:
- issue: Fuerza polémica contra la idolatría
  english_pob_reading: Render εἴδωλον as 'idol' and retain 'works of their hands' literally.
  chosen_spanish_reading: Traducir εἴδωλον como «ídolo» y conservar literalmente «las obras de sus manos».
  alternative_spanish_readings:
  - imagen
  - lo que habían hecho
  rationale: La frase pertenece al lenguaje profético y bíblico de denuncia de la idolatría. «Ídolo» y «obras de sus manos» preservan esa carga teológica sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión previa falló porque los marcadores de nota no estaban anclados en el texto. Aquí ambos marcadores aparecen explícitamente junto a las palabras correspondientes: «becerro[a]» y «alegraban[b]».'
  spanish_consistency_notes:
  - Se mantiene «ídolo» para εἴδωλον, en coherencia con la terminología POB y con el tono acusatorio del pasaje.
  - Se usa el plural «sus manos» para reflejar fielmente el genitivo plural del griego.
  - Se evita «Cristo» u otra terminología ajena al versículo; no hay nombres divinos ni cristológicos en juego.
  - El estilo busca ser publicable, claro y reverente, sin neutralizar la crítica bíblica a la idolatría.
