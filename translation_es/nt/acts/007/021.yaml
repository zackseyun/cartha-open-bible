revisions:
- from: Pero cuando había sido expuesto[a][b], la hija de Faraón lo tomó y lo crió para sí como hijo.
  to: Pero cuando había sido expuesto, la hija de Faraón lo recogió[a] y lo crió como su propio hijo[b].
  rationale: 'La revisión conserva el sentido del griego y del POB inglés, pero mejora dos puntos: (1) explicita el matiz contextual de ἀνείλατο con ‘lo recogió’, más adecuado para un niño expuesto; y (2) reemplaza la formulación rígida ‘para sí como hijo’ por ‘como su propio hijo’, que expresa de manera natural en español la combinación de ἑαυτῇ y εἰς υἱόν. También se corrige la ubicación de las notas para que correspondan a las palabras relevantes.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: exposición del niño, acción de la hija de Faraón y crianza en condición filial. Sin embargo, dos decisiones debilitan matices importantes del original y del rastro POB en inglés: ἀνείλατο se entiende mejor aquí como ‘recogió’/‘tomó consigo’ en el contexto de un niño expuesto, no simplemente ‘lo tomó’; y la combinación ἑαυτῇ εἰς υἱόν queda más fiel y natural en español como ‘como su propio hijo’ que como ‘para sí como hijo’, que suena rígido y menos idiomático.'
  spanish_quality_summary: El texto es comprensible, pero ‘lo tomó’ resulta algo plano en contexto, y ‘lo crió para sí como hijo’ suena poco natural en español general eclesial. Una formulación más fluida y digna es ‘la hija de Faraón lo recogió[a] y lo crió como su propio hijo[b]’. También conviene reubicar las notas al lugar que realmente ilustran.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. ‘Faraón’ y el resto del léxico son adecuados. La revisión propuesta mejora la fidelidad léxica sin apartarse de la filosofía de equivalencia óptima del POB.
  issues:
  - severity: medium
    issue: ‘lo tomó’ subrepresenta ἀνείλατο en este contexto
    rationale: El verbo, en relación con un niño expuesto, lleva el matiz de recogerlo o tomarlo consigo. El inglés POB distinguió correctamente esta acción de la crianza/adopción posterior.
  - severity: medium
    issue: ‘para sí como hijo’ es poco idiomático y no expresa bien ἑαυτῇ εἰς υἱόν
    rationale: Aunque formalmente cercano, en español suena forzado. La idea contextual es que lo crió en calidad de hijo suyo; ‘como su propio hijo’ transmite mejor el valor reflexivo y resultativo.
  - severity: low
    issue: Las notas están ancladas en una ubicación menos pertinente
    rationale: La alternativa sobre ‘lo recogió’ debe anclarse al verbo correspondiente, y la nota sobre ‘para hijo/como hijo’ al sintagma filial, no a ‘expuesto’.
  revised_spanish_text: Pero cuando había sido expuesto, la hija de Faraón lo recogió[a] y lo crió como su propio hijo[b].
  revised_footnotes:
  - marker: a
    text: O «lo tomó consigo». El verbo griego puede denotar el acto de recoger a un niño expuesto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hijo» o «como hijo».
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del griego y del POB inglés, pero mejora dos puntos: (1) explicita el matiz contextual de ἀνείλατο con ‘lo recogió’, más adecuado para un niño expuesto; y (2) reemplaza la formulación rígida ‘para sí como hijo’ por ‘como su propio hijo’, que expresa de manera natural en español la combinación de ἑαυτῇ y εἰς υἱόν. También se corrige la ubicación de las notas para que correspondan a las palabras relevantes.'
