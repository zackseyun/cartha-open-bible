translation:
  language: es
  text: Pero cuando había sido expuesto, la hija de Faraón lo recogió[a] y lo crió como su propio hijo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo tomó consigo». El verbo griego puede denotar el acto de recoger a un niño expuesto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hijo» o «como hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκτεθέντος
  english_pob_choice: had been exposed
  chosen_spanish: había sido expuesto
  alternatives_spanish:
  - había sido dejado afuera
  - había sido abandonado
  - había sido puesto afuera
  lexicon: BDAG
  rationale: El participio aoristo pasivo de ἐκτίθημι en este contexto habla de un niño dejado expuesto. «Había sido expuesto» conserva la situación histórico-cultural sin añadir una intención más fuerte como «abandonado».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo; «Pero» reproduce bien el contraste con la acción salvadora de la hija de Faraón.
- source_word: ἀνείλατο
  english_pob_choice: took him up
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo recogió
  - lo levantó
  - lo tomó consigo
  lexicon: BDAG
  rationale: El medio de ἀναιρέω aquí puede significar tomar a un niño expuesto. «Lo tomó» es natural en español y permite que el matiz de recoger/levantar quede implícito, sin adelantar la idea de adopción, que aparece después.
- source_word: θυγάτηρ Φαραὼ
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija de Faraón
  alternatives_spanish:
  - la hija del Faraón
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de forma directa y natural en español bíblico contemporáneo.
- source_word: ἀνεθρέψατο
  english_pob_choice: raised him
  chosen_spanish: lo crió
  alternatives_spanish:
  - lo crió y educó
  - lo crió
  - lo educó
  lexicon: BDAG
  rationale: ἀνατρέφω se refiere a criar o educar a un niño. «Lo crió» es la expresión más natural y fiel; además deja abierta la amplitud de la crianza sin forzar una especificación pedagógica.
- source_word: ἑαυτῇ
  english_pob_choice: as her own
  chosen_spanish: para sí
  alternatives_spanish:
  - como suyo
  - como propio
  - para ella
  lexicon: BDAG
  rationale: El dativo reflexivo indica relación con ella misma. «Para sí» mantiene esa referencia sin añadir todavía el resultado filial completo.
- source_word: εἰς υἱόν
  english_pob_choice: as her own son
  chosen_spanish: como hijo
  alternatives_spanish:
  - como su hijo
  - para un hijo
  - en calidad de hijo
  lexicon: BDAG
  rationale: La construcción εἰς con υἱόν expresa resultado o estatus. «Como hijo» refleja ese valor; el «para sí» anterior ya comunica que fue en relación consigo misma, por lo que no es necesario repetir «su» y así se evita sobreespecificar más de lo que el griego afirma.
translation_notes:
  revision_awareness: 'El contexto inglés POB y la revisión más reciente concuerdan en la lectura básica: niño expuesto, acción de tomarlo y crianza posterior. No se introducen cambios sustantivos; la principal adaptación es preservar en español la distinción entre el acto inmediato de tomarlo y la relación filial expresada por εἰς υἱόν.'
  spanish_consistency_notes:
  - Se mantiene «Faraón» como nombre/título según el uso bíblico habitual en español.
  - 'Se evita «adoptó» para no fusionar dos acciones distintas en el griego: tomar al niño y criarlo como hijo.'
  - Se conserva el matiz de exposición infantil sin intensificarlo a «abandonado».
  - La frase «para sí como hijo» refleja la combinación de ἑαυτῇ + εἰς υἱόν sin forzar una sola expresión idiomática que borre la doble marca semántica.
