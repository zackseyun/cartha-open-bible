translation:
  language: es
  text: Y al ver a alguien que era maltratado, lo defendió y vengó[a] al que era oprimido, golpeando[b] al egipcio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo justicia por el que era oprimido». La expresión griega ἐποίησεν ἐκδίκησιν puede significar vengar o vindicar.
    reason: lexical_alternative
  - marker: b
    text: O «derribando al egipcio». El verbo puede significar simplemente «golpear»; la formulación más fuerte refleja el desenlace probable en el contexto sin exigir que el verbo mismo signifique «matar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδών
  english_pob_choice: when he saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo funciona como circunstancia temporal previa a las acciones principales; en español, «al ver» expresa esa relación de manera natural y fiel.
- source_word: τινα
  english_pob_choice: someone
  chosen_spanish: a uno
  alternatives_spanish:
  - a alguien
  - a cierta persona
  lexicon: BDAG
  rationale: El indefinido griego no nombra al sujeto; «a uno» conserva la indefinición sin sobrecargar el texto con una especificación ausente.
- source_word: ἀδικούμενον
  english_pob_choice: being wronged
  chosen_spanish: que era maltratado
  alternatives_spanish:
  - que era tratado injustamente
  - que sufría agravio
  lexicon: BDAG
  rationale: La forma pasiva indica a alguien que padece injusticia. «Maltratado» recoge el sentido de abuso concreto en el contexto, aunque «tratado injustamente» sería una alternativa más literal.
- source_word: ἠμύνατο
  english_pob_choice: he defended him
  chosen_spanish: lo defendió
  alternatives_spanish:
  - acudió en su defensa
  - lo protegió
  lexicon: BDAG
  rationale: El medio de ἀμύνομαι expresa defensa activa frente a agresión; «lo defendió» es la forma más directa y natural en español.
- source_word: ἐποίησεν ἐκδίκησιν
  english_pob_choice: avenged
  chosen_spanish: hizo venganza
  alternatives_spanish:
  - ejerció venganza
  - hizo justicia vindicadora
  - tomó venganza
  lexicon: BDAG
  rationale: Se mantiene la tensión léxica del giro griego, que puede significar venganza o vindicación. «Hizo venganza» suena poco idiomático, pero preserva de manera visible la literalidad y evita suavizar el término más de lo que el texto permite.
- source_word: τῷ καταπονουμένῳ
  english_pob_choice: for the one being oppressed
  chosen_spanish: por el que era oprimido
  alternatives_spanish:
  - por el oprimido
  - por el que sufría opresión
  lexicon: BDAG
  rationale: El dativo de ventaja expresa que la acción se realiza en favor del oprimido. «Por el que era oprimido» conserva el participio pasivo y la relación de beneficio.
- source_word: πατάξας
  english_pob_choice: by striking down
  chosen_spanish: golpeando
  alternatives_spanish:
  - hiriendo
  - dando un golpe a
  lexicon: BDAG
  rationale: πατάσσω significa golpear o herir. En este contexto el resultado es fatal, pero el verbo en sí expresa el golpe; «golpeando» evita añadir explícitamente la muerte que el griego no dice de forma directa.
- source_word: τὸν Αἰγύπτιον
  english_pob_choice: the Egyptian
  chosen_spanish: al egipcio
  alternatives_spanish:
  - al egipcio hombre
  lexicon: BDAG
  rationale: El sustantivo étnico se traduce de forma directa y natural como «el egipcio».
theological_decisions:
- issue: 'ἐποίησεν ἐκδίκησιν: venganza o vindicación'
  english_pob_reading: Render with justice-oriented language rather than personal revenge language
  chosen_spanish_reading: hizo venganza
  alternative_spanish_readings:
  - ejerció venganza
  - hizo justicia vindicadora
  - vindicó
  rationale: El audit trail inglés reconoció la fuerza de avenging/vindication, pero la revisión final prefirió una formulación más directa. En español, «hizo venganza» conserva la ambigüedad entre venganza y vindicación sin convertirla en un eufemismo.
  doctrine_reference: Traducción de equivalencia óptima; conservar la tensión semántica del griego sin añadir una interpretación doctrinal ajena.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión final del inglés, que sustituyó «brought justice» por «avenged» para reflejar más directamente ἐποίησεν ἐκδίκησιν. En español se conservó la tensión semántica con una forma literal y una nota alternativa, y se mantuvo «golpeando» en vez de «matando» o «derribando» para no sobreinterpretar πατάξας.
  spanish_consistency_notes:
  - Se usa «egipcio» en minúscula como adjetivo sustantivado étnico, conforme al uso editorial español.
  - Se preserva el orden causal-temporal del griego con una estructura fluida en español.
  - Se evitó «SEÑOR» u otra terminología no pertinente; no hay vocabulario divino en este versículo.
  - Se mantuvo la distinción entre opresión y maltrato mediante participios pasivos en español, sin convertirlos en una interpretación narrativa más amplia.
