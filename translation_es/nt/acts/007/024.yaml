  text: καὶ ἰδών τινα ἀδικούμενον ἠμύνατο καὶ ἐποίησεν ἐκδίκησιν τῷ καταπονουμένῳ πατάξας τὸν Αἰγύπτιον.
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/024.yaml
  text: And when he saw someone being wronged[b][a], he defended him and avenged the one being oppressed by striking down the Egyptian.
  footnotes:
  - marker: a
    text: Or 'executed vengeance for the one being oppressed.' The Greek expression ἐποίησεν ἐκδίκησιν can carry the sense of avenging or vindicating.
    reason: lexical_alternative
  - marker: b
    text: Or 'by striking the Egyptian.' The verb can simply mean 'strike'; 'striking down' reflects the likely lethal outcome in context.
    reason: lexical_alternative
