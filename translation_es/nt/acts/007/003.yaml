  glossary_alignment: No hay conflictos con la terminología proyectual. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión «parentela» está bien justificada y es compatible con el razonamiento léxico del POB, siempre que se acompañe de nota alternativa.
