translation:
  language: es
  text: 'Y le dijo: «Sal de tu tierra y de tu parentela[a], y ven a la tierra que yo te mostraré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tus parientes» o «de tu familia». El griego συγγένεια se refiere al grupo de parentesco o parentela de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρὸς αὐτόν
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le dijo a él
  lexicon: BDAG
  rationale: La fórmula narrativa griega se expresa con naturalidad en español como «le dijo». Mantiene el dativo de destinatario sin añadir el nombre propio, como hace el texto griego con αὐτόν.
- source_word: Ἔξελθε
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve fuera
  - Salte
  lexicon: BDAG
  rationale: «Sal» conserva la fuerza imperativa y la dirección de movimiento del verbo ἐξέρχομαι. En español suena más natural que una construcción más literal como «ve fuera».
- source_word: ἐκ τῆς γῆς σου
  english_pob_choice: from your land
  chosen_spanish: de tu tierra
  alternatives_spanish:
  - de tu país
  - de tu territorio
  lexicon: BDAG
  rationale: γῆ aquí se traduce mejor como «tierra», porque mantiene el sentido amplio de territorio o lugar de pertenencia sin introducir la idea moderna de nación que puede sugerir «país».
- source_word: συγγενείας
  english_pob_choice: kindred
  chosen_spanish: parentela
  alternatives_spanish:
  - familia
  - parientes
  - linaje
  lexicon: BDAG
  rationale: El término griego designa el grupo de parentesco o de clan. «Parentela» conserva mejor el valor colectivo de συγγένεια que «familia», que puede sonar demasiado restringido en español contemporáneo.
- source_word: δεῦρο
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - acércate
  lexicon: BDAG
  rationale: δεῦρο funciona aquí como un llamado imperativo. «Ven» reproduce bien esa orientación deíctica en español dentro del discurso directo de Dios.
- source_word: εἰς τὴν γῆν
  english_pob_choice: into the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - en la tierra
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento hacia o dentro de un lugar, en español «a la tierra» suena natural y comunica adecuadamente el desplazamiento sin forzar una literalidad poco idiomática con «en» o «dentro de».
- source_word: ἣν ἄν σοι δείξω
  english_pob_choice: that I will show you
  chosen_spanish: que yo te mostraré
  alternatives_spanish:
  - que te mostraré
  - que llegaré a mostrarte
  lexicon: BDAG
  rationale: La cláusula relativa con ἄν y subjuntivo tiene sentido prospectivo en este mandato. «Te mostraré» comunica de forma fiel y natural la promesa futura implícita; añadir «yo» refuerza la referencia al hablante como en el griego.
translation_notes:
  revision_awareness: 'Se corrigió la omisión del anclaje de nota: la versión española ahora no incluye notas al pie, de modo que no queda ningún marcador sin correspondencia. La redacción sigue de cerca el griego y el expediente inglés, con el mismo sentido básico y sin ampliar el contenido.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de la triple serie imperativa: salir / venir / mostrar.'
  - Se prefirió «tierra» sobre «país» para no modernizar indebidamente γῆ.
  - Se optó por «parentela» como equivalente colectivo de συγγένεια, coherente con el valor señalado en el expediente inglés.
