translation:
  language: es
  text: Al oír esto[a], se sintieron traspasados hasta el corazón y rechinaban los dientes contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se enfurecieron en su interior»; el verbo griego dice literalmente «fueron cortados/traspasados», preservando una imagen vívida de intensa agitación interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούοντες
  english_pob_choice: when they heard
  chosen_spanish: Al oír esto
  alternatives_spanish:
  - cuando oyeron esto
  - oyendo esto
  lexicon: BDAG
  rationale: El participio introduce la circunstancia temporal del enojo. «Al oír esto» conserva la relación temporal y suena natural en español, sin perder el valor de antecedente del discurso de Esteban.
- source_word: δὲ
  english_pob_choice: Now
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: En español no hace falta una partícula explícita para marcar el avance narrativo. La transición queda suficientemente indicada por la estructura de la oración.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - estas palabras
  lexicon: BDAG
  rationale: El plural griego apunta al contenido del discurso anterior. «Esto» evita una expresión pesada en español y mantiene la referencia a lo dicho previamente.
- source_word: διεπρίοντο
  english_pob_choice: they were cut to the heart
  chosen_spanish: se enfurecían en sus corazones
  alternatives_spanish:
  - eran traspasados en sus corazones
  - se consumían en su interior
  - les dolía el corazón
  lexicon: BDAG
  rationale: El verbo griego es literalmente muy vívido («ser cortados/rasgados») y la POB inglesa preserva la tensión entre imagen e interpretación. En español, «se enfurecían en sus corazones» comunica la agitación interna sin perder el matiz de intensa irritación. Se evita una paráfrasis suavizada que borraría la violencia verbal del original.
- source_word: ταῖς καρδίαις αὐτῶν
  english_pob_choice: to the heart
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en sus corazones
  - en su corazón
  - en su interior
  lexicon: BDAG
  rationale: El dativo indica la esfera afectada. Se mantiene «corazones» en plural para respetar el griego, mientras que «en» expresa el ámbito interno del movimiento emocional.
- source_word: ἔβρυχον τοὺς ὀδόντας
  english_pob_choice: gnashed their teeth
  chosen_spanish: rechinaban los dientes
  alternatives_spanish:
  - crujían los dientes
  - apretaban los dientes
  - rechinaban sus dientes
  lexicon: BDAG
  rationale: La expresión es una señal convencional de ira. «Rechinaban los dientes» es idiomático en español y conserva la fuerza gestual del griego mejor que una formulación más explicativa.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: at him
  chosen_spanish: contra él
  alternatives_spanish:
  - hacia él
  - sobre él
  - a él
  lexicon: BDAG
  rationale: La preposición con acción hostil exige una dirección adversativa. «Contra él» transmite mejor la agresión implícita que una simple indicación de dirección.
theological_decisions:
- issue: Intensidad de la reacción interior ante la predicación de Esteban
  english_pob_reading: they were cut to the heart / or enraged in their hearts
  chosen_spanish_reading: se enfurecían en sus corazones
  alternative_spanish_readings:
  - eran traspasados en sus corazones
  - se consumían por dentro
  - quedaron profundamente heridos
  rationale: La POB inglesa conserva la tensión entre la metáfora corporal del verbo y su efecto emocional. En español, la lectura elegida mantiene la idea de agitación violenta e ira, que es el resultado más explícito en el contexto inmediato, sin borrar la imaginería del «corte» que el griego sugiere.
  doctrine_reference: Hechos 7:54; BDAG sobre διεπρίοντο
translation_notes:
  revision_awareness: 'Se ha respetado el alto acuerdo del ciclo de revisión: no hubo cambios sustantivos respecto al análisis auditado en inglés. La única decisión sensible es cómo trasladar en español la metáfora fuerte de διεπρίοντο sin perder inteligibilidad ni suavizarla en exceso.'
  spanish_consistency_notes:
  - Se mantiene el registro narrativo bíblico en español, claro y sobrio.
  - Se conserva el plural de «corazones» para reflejar el griego, aun cuando en español el singular podría sonar más idiomático.
  - «Contra él» expresa mejor la hostilidad de ἐπ’ αὐτόν que un simple «a él».
