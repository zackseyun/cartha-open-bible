translation:
  language: es
  text: La tienda[a] del testimonio estaba con nuestros padres[b] en el desierto, tal como el que hablaba[a Moisés][c] le ordenó hacerla conforme al modelo que había visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tabernáculo del testimonio’.
    reason: lexical_alternative
  - marker: b
    text: O ‘nuestros antepasados’. El griego dice ‘nuestros padres’.
    reason: lexical_alternative
  - marker: c
    text: O ‘el que habló a Moisés’ o ‘Dios/el Señor hablando a Moisés’. El griego deja implícito al hablante.
    reason: alternative_reading
lexical_decisions:
- source_word: σκηνὴ
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  lexicon: BDAG
  rationale: ‘Tienda’ comunica el sentido básico de σκηνή como estructura portátil y evita imponer un tecnicismo eclesiástico donde el griego sigue siendo descriptivo. ‘Tabernáculo’ es posible, pero en español suena más tradicional y especializado.
- source_word: τοῦ μαρτυρίου
  english_pob_choice: of testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - de testimonio
  - del testimonio (del pacto)
  lexicon: BDAG
  rationale: Mantiene el genitivo de forma cercana y transparente. ‘Del testimonio’ refleja la expresión bíblica estable asociada con el santuario del testimonio sin añadir una expansión interpretativa.
- source_word: ἦν ... ἐν τῇ ἐρήμῳ
  english_pob_choice: was with our fathers in the wilderness
  chosen_spanish: estaba con nuestros padres en el desierto
  alternatives_spanish:
  - estaba entre nuestros padres en el desierto
  - estaba en el desierto con nuestros padres
  lexicon: BDAG
  rationale: ‘Estaba con’ reproduce la relación del dativo con una solución natural en español. ‘Desierto’ es el equivalente bíblico estándar de ἐρήμῳ en este contexto.
- source_word: πατράσιν ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: Se conserva la referencia masculina explícita del griego y el uso bíblico de ‘padres’ para los antepasados de Israel. ‘Antepasados’ suaviza el género, pero no refleja tan directamente la forma griega.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: ‘Tal como’ expresa con claridad la correspondencia entre la tienda del desierto y la instrucción divina.
- source_word: διετάξατο
  english_pob_choice: directed
  chosen_spanish: le ordenó
  alternatives_spanish:
  - le indicó
  - le instruyó
  lexicon: BDAG
  rationale: En este contexto de mandato para la construcción, ‘le ordenó’ comunica con fuerza la autoridad de la instrucción. ‘Instruyó’ o ‘indicó’ serían más suaves, pero menos exactos respecto al valor imperativo.
- source_word: ὁ λαλῶν τῷ Μωϋσῇ
  english_pob_choice: the one speaking to Moses
  chosen_spanish: el que hablaba con Moisés
  alternatives_spanish:
  - el que le hablaba a Moisés
  - el que hablaba a Moisés
  lexicon: BDAG
  rationale: El participio se vierte de forma sustantivada y natural. Se conserva el referente implícito del griego sin especificarlo como ‘Dios’ o ‘el Señor’.
- source_word: ποιῆσαι αὐτὴν
  english_pob_choice: to make it
  chosen_spanish: hacerla
  alternatives_spanish:
  - construirla
  - hacerla construir
  lexicon: BDAG
  rationale: ‘Hacerla’ sigue de cerca el infinitivo con objeto y evita sobreespecificar el tipo de acción más allá de lo que el texto exige.
- source_word: κατὰ τὸν τύπον
  english_pob_choice: according to the pattern
  chosen_spanish: conforme al modelo
  alternatives_spanish:
  - según el patrón
  - de acuerdo con el modelo
  lexicon: BDAG
  rationale: ‘Modelo’ funciona bien en español para τύπος en el contexto del tabernáculo y conserva la idea de un prototipo mostrado divinamente. ‘Patrón’ también sería posible, pero suena algo menos natural aquí.
- source_word: ὃν ἑωράκει
  english_pob_choice: that he had seen
  chosen_spanish: que había visto
  alternatives_spanish:
  - el cual había visto
  lexicon: BDAG
  rationale: El pluscuamperfecto se mantiene en español para reflejar la anterioridad respecto a la orden dada a Moisés. ‘Que’ resulta más fluido que ‘el cual’.
theological_decisions:
- issue: Identidad del que hablaba con Moisés
  english_pob_reading: Left implicit as 'the one speaking to Moses' rather than making the subject explicit as God or the Lord.
  chosen_spanish_reading: Se deja implícito como ‘el que hablaba con Moisés’, sin añadir ‘Dios’ ni ‘el Señor’.
  alternative_spanish_readings:
  - Dios hablando con Moisés
  - el Señor hablando con Moisés
  rationale: El griego usa un participio sustantivado sin nombrar al sujeto. Para respetar la redacción y no resolver prematuramente la referencia, la traducción conserva la ambigüedad controlada del texto fuente.
  doctrine_reference: Primacía del texto original; conservar tensiones o ambigüedades donde el griego las deja abiertas.
translation_notes:
  revision_awareness: El borrador se ajusta al contexto auditado en inglés y corrige la validación previa asegurando que solo se incluya la nota [a], la única anclada en el texto español.
  spanish_consistency_notes:
  - Se usó ‘tienda’ para σκηνή, consistente con la decisión inglesa de evitar ‘tabernáculo’ como término principal.
  - Se mantuvo ‘nuestros padres’ para πατράσιν, conservando el eco bíblico masculino del griego.
  - Se dejó implícito el sujeto de ‘el que hablaba con Moisés’, sin explicitarlo teológicamente.
  - ‘Desierto’ traduce ἐρήμῳ con el sentido bíblico usual y no se añadió ‘wilderness’.
