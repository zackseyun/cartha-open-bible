  glossary_alignment: No hay conflicto con la terminología de proyecto. «Sus hermanos» y «los hijos de Israel» respetan la decisión POB de conservar el lenguaje de parentesco y la designación étnica/covenantal. No intervienen términos sensibles como Yahvé/Mesías/esclavo.
