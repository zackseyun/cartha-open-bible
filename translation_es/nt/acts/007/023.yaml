translation:
  language: es
  text: Ahora bien, cuando estaba por cumplir cuarenta años, le vino al corazón[a] visitar a sus hermanos[b], los hijos de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le surgió en el corazón» o «decidió». El griego conserva un modismo de impulso o resolución interior.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a sus compatriotas israelitas; la expresión «los hijos de Israel» identifica al grupo étnicamente.
    reason: cultural_note
  - marker: c
    text: O «los descendientes de Israel» o «los israelitas».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: La combinación introduce un cambio temporal y narrativo. «Ahora bien, cuando» mantiene el enlace discursivo y la relación temporal sin sonar demasiado rígido en español.
- source_word: ἐπληροῦτο αὐτῷ τεσσερακονταετὴς χρόνος
  english_pob_choice: he was approaching forty years of age
  chosen_spanish: se cumplían para él los cuarenta años
  alternatives_spanish:
  - estaba llegando a los cuarenta años
  - se completaban para él cuarenta años
  - cuando tenía unos cuarenta años
  lexicon: BDAG
  rationale: La expresión griega es idiomática. «Se cumplían para él los cuarenta años» conserva la imagen de cumplimiento/progresión y evita reducirla a una simple edad estática.
- source_word: ἀνέβη ἐπὶ τὴν καρδίαν αὐτοῦ
  english_pob_choice: it came into his heart
  chosen_spanish: le vino al corazón
  alternatives_spanish:
  - le surgió en el corazón
  - le vino a la mente
  - decidió
  lexicon: BDAG
  rationale: La imagen del corazón como sede del impulso interior se preserva. «Le vino al corazón» reproduce la metáfora semítica sin convertirla en una paráfrasis plana como «decidió».
- source_word: ἐπισκέψασθαι
  english_pob_choice: to visit
  chosen_spanish: visitar
  alternatives_spanish:
  - velar por
  - examinar
  - hacerse cargo de
  lexicon: BDAG
  rationale: En el contexto, el verbo expresa ir a ver a su gente; «visitar» es la correspondencia más natural y concisa. El matiz de interés o cuidado queda abierto por el contexto inmediato.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus compatriotas
  - sus parientes
  lexicon: BDAG
  rationale: El plural masculino griego funciona como referencia representativa a los miembros de su pueblo. «Sus hermanos» conserva la forma del original y el valor de parentesco/solidaridad.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - el pueblo de Israel
  lexicon: BDAG
  rationale: La apposición identifica a quiénes llama «hermanos». «Los hijos de Israel» es la forma bíblica más directa y transparente al griego; se conserva el idiomático hebraizante.
theological_decisions:
- issue: Lenguaje fraterno y designación étnica/covenantal
  english_pob_reading: his brothers, the sons of Israel
  chosen_spanish_reading: sus hermanos, los hijos de Israel
  alternative_spanish_readings:
  - sus compatriotas, el pueblo de Israel
  - sus hermanos y hermanas, los israelitas
  rationale: 'No hay disputa doctrinal, pero sí una decisión de fidelidad textual: mantener el masculino plural y la apposición étnica. Así se preserva la textura familiar y covenantal del pasaje sin neutralizar el lenguaje del griego.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indica alta concordancia y que no hubo cambios necesarios. La redacción española conserva el valor idiomático del griego y el registro narrativo del texto base, alineándose con la lectura inglesa auditada sin depender mecánicamente de ella.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» por transparencia formal y por coherencia con el lenguaje bíblico del pasaje.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en este versículo.
  - Se prefirió «corazón» en consonancia con el modismo griego y el uso bíblico de la sede interior de intención.
  - Se conservó el masculino plural «hermanos» para reflejar el griego y la decisión auditada de precisión de género representativo.
