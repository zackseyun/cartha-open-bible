translation:
  language: es
  text: Y Moisés fue educado en toda la sabiduría de los egipcios[a], y era poderoso en palabras y obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en palabras y acciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαιδεύθη
  english_pob_choice: was educated
  chosen_spanish: fue educado
  alternatives_spanish:
  - fue instruido
  - fue formado
  lexicon: BDAG
  rationale: El pasivo de παιδεύω aquí indica formación o instrucción recibida. «Fue educado» comunica con naturalidad esa idea en español y encaja con el contexto de la formación cortesana egipcia sin reducirla a una simple instrucción puntual.
- source_word: πάσῃ σοφίᾳ Αἰγυπτίων
  english_pob_choice: in all the wisdom of the Egyptians
  chosen_spanish: en toda la sabiduría de los egipcios
  alternatives_spanish:
  - con toda la sabiduría de los egipcios
  - en toda clase de sabiduría egipcia
  lexicon: BDAG
  rationale: La construcción con dativo se expresa de manera natural con «en». «Toda la sabiduría» conserva la amplitud de πάσῃ, y «de los egipcios» mantiene el valor posesivo/origen del genitivo.
- source_word: δυνατὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - capaz
  lexicon: BDAG
  rationale: «Poderoso» conserva la fuerza semántica de δυνατός y resulta idiomático en español con el paralelo de «palabras y obras». «Capaz» debilitaría la idea; «fuerte» suena menos natural en este contexto.
- source_word: λόγοις καὶ ἔργοις
  english_pob_choice: in words and deeds
  chosen_spanish: en palabras y obras
  alternatives_spanish:
  - en discurso y acciones
  - en palabras y hechos
  lexicon: BDAG
  rationale: La pareja «palabras y obras» mantiene de cerca el paralelismo griego λόγοις / ἔργοις y es una combinación clara y natural en español. Se evita añadir posesivo porque el griego no lo enfatiza explícitamente en la revisión auditada.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: —
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: La revisión inglesa retiró el posesivo explícito para reflejar mejor el griego. En español también se omite el posesivo, ya que la referencia se entiende por el contexto y por la estructura coordinada del verso.
theological_decisions:
- issue: Tensión con Éxodo 4:10 acerca de la elocuencia de Moisés
  english_pob_reading: Rendered as 'mighty in words and deeds' without harmonizing to Exodus 4:10.
  chosen_spanish_reading: Se traduce «poderoso en palabras y obras» sin armonizar el texto con Éxodo 4:10.
  alternative_spanish_readings:
  - «poderoso en discurso y acción»
  - interpretarlo solo como fama o efecto, no como capacidad propia
  rationale: El dicho de Esteban debe traducirse en sus propios términos. Aunque Éxodo 4:10 presenta a Moisés como poco elocuente, este versículo lo describe como poderoso en palabra y obra; la traducción conserva esa tensión en lugar de resolverla con una paráfrasis explicativa.
  doctrine_reference: Preservar la tensión teológica/textual en vez de resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que eliminó el posesivo explícito «his» antes de «words» para reflejar mejor el griego. La versión española también omite un posesivo equivalente y conserva la coordinación simple «palabras y obras».
  spanish_consistency_notes:
  - Se mantiene «Moisés» como forma estable del nombre propio.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene esa terminología.
  - «Fue educado» y «sabiduría» reflejan un contexto de formación intelectual/cortesana, no solo escolar.
  - La puntuación y el orden siguen una cadencia bíblica natural en español, sin calco rígido.
