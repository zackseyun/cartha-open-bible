  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego y sigue correctamente las decisiones auditadas: Ἰησοῦ se entiende como Josué, διαδεξάμενοι se resume idiomáticamente como «a su vez», ἐξῶσεν como «expulsó», y ἕως τῶν ἡμερῶν Δαυίδ como «hasta los días de David». Sin embargo, hay un problema importante de concordancia en la relativa inicial: ἣν remite a un antecedente femenino singular, por lo que «el cual» no es fiel ni gramaticalmente adecuado en español.'
  spanish_quality_summary: La redacción es generalmente clara y eclesialmente legible, pero «el cual» suena incorrecto aquí por discordancia de género y afecta la naturalidad. Además, la frase mejora notablemente si se usa «la cual» y si se simplifica ligeramente la puntuación sin perder dignidad. El resto del versículo es idiomático y comprensible.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Josué» para Ἰησοῦ está bien justificado con nota; «Dios» para θεός y «las naciones» para τῶν ἐθνῶν concuerdan con las directrices. No aparece ningún término del glosario mayor que requiera ajuste adicional.
  issues:
  - severity: high
    issue: Pronombre relativo inicial en género incorrecto
    rationale: ἣν es femenino singular y retoma el referente femenino del versículo anterior (la tienda/tabernáculo). «El cual» introduce discordancia gramatical en español y debilita la fidelidad al texto fuente. Debe ser «la cual» o, menos marcadamente, «que».
  - severity: low
    issue: Coma tras «padres» puede aligerarse
    rationale: «Nuestros padres, a su vez, trajeron...» es aceptable, pero el inciso puede fluir mejor con una sola pausa. No es un error, solo una mejora estilística menor.
