translation:
  language: es
  text: la cual también nuestros padres, a su vez, trajeron con Josué[a] en la toma de posesión de las naciones[b] que Dios expulsó de delante de nuestros padres, hasta los días de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Josué» traduce el nombre griego Ἰησοῦς aquí por el referente histórico evidente: Josué hijo de Nun, no Jesús de Nazaret.'
    reason: alternative_reading
  - marker: b
    text: O «en el despojo de las naciones». La frase griega ἐν τῇ κατασχέσει puede expresar la ocupación o toma de posesión del territorio; la redacción principal busca evitar que el sujeto de la acción sean los padres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - la cual
  - que
  lexicon: BDAG
  rationale: El antecedente implícito es femenino singular; en español, «el cual» mantiene la referencia relativa con mayor claridad y encaja bien en una cláusula subordinada larga.
- source_word: εἰσήγαγον
  english_pob_choice: brought in
  chosen_spanish: trajeron
  alternatives_spanish:
  - introdujeron
  - llevaron dentro
  lexicon: BDAG
  rationale: El verbo expresa traer/introducir algo a un lugar. «Trajeron» es natural en español y conserva la dirección del movimiento sin sonar rígido.
- source_word: διαδεξάμενοι
  english_pob_choice: in turn
  chosen_spanish: a su vez
  alternatives_spanish:
  - sucesivamente
  - recibiéndolo en sucesión
  lexicon: BDAG
  rationale: La idea principal es la sucesión generacional en la custodia de la tienda. «A su vez» comunica esa continuidad heredada de manera idiomática y breve.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: Se conserva el lenguaje histórico-covenantal del discurso. «Padres» refleja mejor la fórmula bíblica que «antepasados» y preserva el paralelismo retórico.
- source_word: μετὰ Ἰησοῦ
  english_pob_choice: with Joshua
  chosen_spanish: con Josué
  alternatives_spanish:
  - con Jesús
  lexicon: BDAG
  rationale: Aunque el griego permite ambos nombres, el contexto histórico del ingreso a la tierra muestra que el referente es Josué hijo de Nun. La traducción identifica el referente histórico correcto para evitar una lectura confusa.
- source_word: ἐν τῇ κατασχέσει
  english_pob_choice: at the dispossession of
  chosen_spanish: en la toma de posesión
  alternatives_spanish:
  - en la ocupación
  - al conquistar
  lexicon: BDAG
  rationale: La expresión alude al proceso de posesión/ocupación del territorio. «Toma de posesión» transmite el hecho histórico sin atribuir incorrectamente a los padres la acción principal de despojar a las naciones.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: En este contexto de conquista territorial, ἔθνη se refiere a los pueblos/naciones del territorio prometido, no a la categoría teológica «gentiles». «Las naciones» es la opción más transparente.
- source_word: ὧν ἐξῶσεν ὁ θεὸς
  english_pob_choice: that God drove out
  chosen_spanish: que Dios expulsó
  alternatives_spanish:
  - que Dios echó
  - que Dios desalojó
  lexicon: BDAG
  rationale: ἐξωθέω significa empujar fuera, expulsar, desalojar. «Expulsó» conserva la fuerza del verbo con un español bíblico claro y no arcaizante.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de ante
  lexicon: BDAG
  rationale: Es un hebraísmo/semitismo que expresa remoción de la presencia de alguien. «De delante de» reproduce bien esa imagen bíblica en español.
- source_word: ἕως τῶν ἡμερῶν Δαυίδ
  english_pob_choice: until the days of David
  chosen_spanish: hasta los días de David
  alternatives_spanish:
  - hasta el tiempo de David
  lexicon: BDAG
  rationale: Se mantiene la fórmula temporal directa del texto, útil para enlazar con el versículo siguiente y conservar el ritmo narrativo.
theological_decisions:
- issue: Referente de Ἰησοῦ
  english_pob_reading: Joshua
  chosen_spanish_reading: Josué
  alternative_spanish_readings:
  - Jesús
  rationale: La escena es la entrada de Israel en la tierra después de Moisés; por tanto, el referente es Josué hijo de Nun. Traducirlo así evita un falso eco cristológico que el pasaje no pretende aquí.
  doctrine_reference: Acts 7:45 historical context; translation philosophy on referential clarity
- issue: Sentido de διαδεξάμενοι
  english_pob_reading: The fathers brought it in as successive inheritors/custodians
  chosen_spanish_reading: nuestros padres la trajeron a su vez como custodios sucesivos
  alternative_spanish_readings:
  - nuestros padres la trajeron después de recibirla
  - nuestros padres la trajeron sucesivamente
  rationale: El participio subraya la sucesión de generaciones en la custodia del tabernáculo. «A su vez» conserva esa idea sin sobrecargar el versículo, y el contexto deja implícita la recepción heredada.
  doctrine_reference: Acts 7 speech; covenant-historical continuity
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó una formulación temporal más libre por «at the dispossession of» para reflejar con mayor precisión ἐν τῇ κατασχέσει y evitar atribuir a «nuestros padres» la acción principal de posesión. La versión española conserva esa corrección, usando «en la toma de posesión» y manteniendo a Dios como sujeto de «expulsó».
  spanish_consistency_notes:
  - Se preserva «Dios» para θεός y no se introduce «SEÑOR».
  - Se usa «Josué» como nombre histórico, alineado con la decisión auditada del inglés POB.
  - «Las naciones» mantiene el valor contextual de ἔθνη en un marco de conquista territorial.
  - La cláusula relativa se traduce con una estructura legible en español sin borrar la sucesión generacional implícita en διαδεξάμενοι.
