  text: ἣν καὶ εἰσήγαγον διαδεξάμενοι οἱ πατέρες ἡμῶν μετὰ Ἰησοῦ ἐν τῇ κατασχέσει τῶν ἐθνῶν ὧν ἐξῶσεν ὁ θεὸς ἀπὸ προσώπου τῶν πατέρων ἡμῶν ἕως τῶν ἡμερῶν Δαυίδ·
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/045.yaml
  text: which our fathers in turn brought in with Joshua at the dispossession of the nations that God drove out from before our fathers[b][a], until the days of David.
  footnotes:
  - marker: a
    text: Greek 'with Jesus'; the name Ἰησοῦς can refer to either Jesus or Joshua. Here it refers to Joshua son of Nun.
    reason: alternative_reading
  - marker: b
    text: Or 'after receiving it in succession, our fathers brought it in.' The participle emphasizes generational succession.
    reason: lexical_alternative
