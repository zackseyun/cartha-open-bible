translation:
  language: es
  text: Y después de haber pasado cuarenta años[a], se le apareció un ángel en el desierto del monte Sinaí[c], en una llama de fuego desde una zarza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se cumplieron cuarenta años».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en una llama de fuego de una zarza»; es decir, la llama estaba asociada con una zarza, en eco de Éxodo 3:2.'
    reason: cross_reference
  - marker: c
    text: Algunos intérpretes conectan esto con «el ángel de Yahvé» de Éxodo 3:2, pero aquí Hechos dice simplemente «un ángel».
    reason: alternative_reading
lexical_decisions:
- source_word: πληρωθέντων ἐτῶν τεσσεράκοντα
  english_pob_choice: after forty years had passed
  chosen_spanish: cuando se cumplieron cuarenta años
  alternatives_spanish:
  - después de haber pasado cuarenta años
  - cuando habían transcurrido cuarenta años
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una circunstancia temporal. «Se cumplieron» conserva la idea de cumplimiento/completación de πληρόω y suena natural en español, sin reducirlo solo a «pasar».
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - apareció
  - se mostró
  lexicon: BDAG
  rationale: El pasivo de ὁράω funciona aquí como verbo de aparición. En español, «se le apareció» comunica la iniciativa del evento y el destinatario sin volverlo un pasivo artificial.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El dativo indirecto se integra naturalmente en español con el clítico «le»; en contexto, refiere a Moisés.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en el yermo
  lexicon: BDAG
  rationale: «Ἔρημος» admite «desierto» o «wilderness». Aquí se mantiene «desierto» porque el contexto del Sinaí y del Éxodo es geográfico y bíblico, y la palabra conserva bien el sentido del escenario.
- source_word: τοῦ ὄρους Σινᾶ
  english_pob_choice: of Mount Sinai
  chosen_spanish: del monte Sinaí
  alternatives_spanish:
  - del monte de Sinaí
  - del monte Sinaí
  lexicon: BDAG
  rationale: La forma usual en español es «monte Sinaí». Conserva el nombre propio del monte sin sobrecargar la construcción genitiva.
- source_word: ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: En este contexto teofánico el referente es celestial, no humano. Se mantiene «ángel» sin expandirlo a «ángel de Yahvé» en el texto principal, porque el griego dice solo ἄγγελος.
- source_word: ἐν φλογὶ πυρὸς
  english_pob_choice: in a flame of fire
  chosen_spanish: en una llama de fuego
  alternatives_spanish:
  - en una llama ígnea
  - en una llama de fuego
  lexicon: BDAG
  rationale: La doble expresión se conserva de modo idiomático. «Llama de fuego» refleja la imagen vívida sin perder la redundancia enfática del griego.
- source_word: βάτου
  english_pob_choice: from a bush
  chosen_spanish: de una zarza
  alternatives_spanish:
  - desde una zarza
  - de un arbusto
  lexicon: BDAG
  rationale: El genitivo resulta comprimido en griego. En español, «de una zarza» conserva la asociación con la zarza ardiente de Éxodo 3:2 y evita forzar una preposición menos natural.
theological_decisions:
- issue: Identidad del ángel en un contexto de teofanía
  english_pob_reading: Render ἄγγελος as 'an angel' without importing a stronger identification in the main text.
  chosen_spanish_reading: Traducir «ἄγγελος» simplemente como «un ángel», sin introducir en el texto principal «el ángel de Yahvé».
  alternative_spanish_readings:
  - el ángel de Yahvé
  - un mensajero
  rationale: El versículo no dice «el ángel de Yahvé» sino solo «un ángel». La traducción debe preservar esa tensión y no resolverla por anticipado. La posible conexión con Éxodo 3:2 puede quedar sugerida en nota.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «had been fulfilled» a «had passed» para mayor naturalidad, manteniendo el sentido temporal. La propuesta española conserva ambos matices con «se cumplieron», que expresa completación temporal sin perder fluidez. También se evitó trasladar mecánicamente el matiz inglés de 'from a bush' con una preposición extraña, prefiriendo la construcción española natural y fiel al eco de Éxodo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en las notas teológicas según la terminología POB, pero no se introduce en el texto principal porque el griego aquí solo dice ἄγγελος.
  - «Desierto» se usa para ἔρημος por adecuación bíblica y geográfica.
  - «Ángel» se conserva en el texto principal para respetar la lectura auditada del griego, sin ampliar la identificación.
  - Las notas con [a], [b] y [c] están ancladas exactamente en el texto principal y no se usan marcadores sin ancla.
