  text: τίνα τῶν προφητῶν οὐκ ἐδίωξαν οἱ πατέρες ὑμῶν; καὶ ἀπέκτειναν τοὺς προκαταγγείλαντας περὶ τῆς ἐλεύσεως τοῦ δικαίου οὗ νῦν ὑμεῖς προδόται καὶ φονεῖς ⸀ἐγένεσθε,
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/052.yaml
  text: Which of the prophets did your fathers not persecute? And they killed those who announced beforehand the coming of the Righteous One[a], of whom you have now become betrayers and murderers[c][b],
