revisions:
- from: ¿A cuál de los profetas no persiguieron sus padres? Y mataron a los que anunciaron de antemano la venida del Justo[a], de quien ahora ustedes se han hecho traidores y asesinos[b][c],
  to: ¿A cuál de los profetas no persiguieron sus padres[c]? Y mataron a los que anunciaron de antemano la venida del Justo, de quien ahora ustedes han llegado a ser traidores y asesinos[b],
  rationale: Se eliminó la nota defectuosa sobre 'el Justo' porque repetía el texto principal sin ofrecer una alternativa real. Se reubicó la nota sobre 'sus padres' en el texto, ya que corresponde a una observación léxica preservada por el expediente inglés. Se ajustó la nota de la cláusula final para reflejar una alternativa de la expresión completa, no solo de una palabra aislada. Además, se suavizó 'se han hecho' a 'han llegado a ser' por mayor naturalidad en español sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: pregunta retórica partitiva, persecución de los profetas, asesinato de quienes anunciaron de antemano la venida, y acusación final contra los oyentes. Sin embargo, no sigue del todo la decisión léxica auditada para τοῦ δικαίου, donde el inglés POB adoptó explícitamente ''the Righteous One'' con nota alternativa ''the Just One''. En español, ''del Justo'' es posible, pero dado el expediente auditado y la terminología del proyecto, conviene ''del Justo/Righteous One'' equivalente principal en español como ''del Justo'' solo si se justifica bien; aquí la nota actual es defectuosa porque repite la misma forma y no preserva una alternativa real. Además, la nota sobre φονεῖς no corresponde al expediente inglés, que da la alternativa en la pareja completa (''traitors and murderers''), no solo ''murderers'' → ''homicidas''.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''¿A cuál de los profetas...?'' suena aceptable, aunque ''¿A cuál de los profetas no persiguieron sus padres?'' es algo menos fluido que ''¿A cuál de los profetas no persiguieron sus padres?'' y puede mantenerse. La cláusula final ''de quien ahora ustedes se han hecho traidores y asesinos'' es comprensible, pero ''han llegado a ser'' suena un poco más natural con la fuerza de ἐγένεσθε. El principal problema de calidad está en las notas: la nota [a] es internamente errónea y la [b] no representa la alternativa documentada en el audit trail.'
  glossary_alignment: 'Alineación parcial. ''persiguieron'', ''mataron'', ''venida'', ''de quien'', y ''asesinos'' encajan bien. El punto sensible es τοῦ δικαίου: el expediente inglés privilegia el valor titular ''the Righteous One''. En español, para reflejar mejor δικαίου como designación cristológica y la decisión inglesa, ''el Justo'' puede mantenerse como texto principal por naturalidad e inteligibilidad eclesial, pero la nota debe ofrecer la alternativa real ''el Justo''/''el Justo'' no sirve; mejor ''O "el Justo"'' si el principal fuera ''el Justo'' no añade nada. Por eso conviene cambiar el texto principal a ''del Justo'' o mejor ''del Justo'' con alternativa ''del Justo'' no ayuda; la opción más coherente con el rationale auditado es ''del Justo[a]'' con nota ''O "del Justo"'' no resuelve. En español, una correspondencia más explícita con ''Righteous One'' es ''del Justo'' y puede ir sin nota, mientras la nota preserve ''O "el Justo"'' solo si el principal fuera ''el Justo''. Dado
    que el español natural favorece ''el Justo'', la corrección más necesaria es arreglar las notas y alinear la alternativa de la cláusula final a ''traidores y asesinos''.'
  issues:
  - severity: high
    issue: La nota [a] repite exactamente la misma lectura del texto principal.
    rationale: El texto principal dice 'del Justo[a]' y la nota dice 'También puede traducirse «el Justo»'. No preserva ninguna alternativa real ni aporta información útil. Esto incumple la disciplina de notas y no refleja la alternativa inglesa documentada ('the Just One').
  - severity: medium
    issue: La nota [b] no sigue la alternativa preservada en el expediente inglés para la cláusula final.
    rationale: El inglés POB documenta como alternativa de προδόται καὶ φονεῖς la pareja completa 'traitors and murderers', no solo una alternativa para φονεῖς. En español, la nota debe reflejar una alternativa de la expresión completa, p. ej. 'O «traidores y homicidas»'.
  - severity: low
    issue: '''se han hecho'' es correcto, pero ''han llegado a ser'' refleja con más naturalidad el cambio de estado de ἐγένεσθε en esta acusación formal.'
    rationale: No es un error grave, pero una leve mejora estilística y semántica ayuda a la fluidez en español bíblico contemporáneo.
  revised_spanish_text: ¿A cuál de los profetas no persiguieron sus padres[c]? Y mataron a los que anunciaron de antemano la venida del Justo, de quien ahora ustedes han llegado a ser traidores y asesinos[b],
  revised_footnotes:
  - marker: b
    text: O «traidores y homicidas».
    reason: lexical_alternative
  - marker: c
    text: «Sus padres» también podría traducirse «sus antepasados», pero el griego dice más literalmente «sus padres».
    reason: lexical_alternative
  revision_rationale: Se eliminó la nota defectuosa sobre 'el Justo' porque repetía el texto principal sin ofrecer una alternativa real. Se reubicó la nota sobre 'sus padres' en el texto, ya que corresponde a una observación léxica preservada por el expediente inglés. Se ajustó la nota de la cláusula final para reflejar una alternativa de la expresión completa, no solo de una palabra aislada. Además, se suavizó 'se han hecho' a 'han llegado a ser' por mayor naturalidad en español sin alterar el sentido.
