translation:
  language: es
  text: ¿A cuál de los profetas no persiguieron sus padres[c]? Y mataron a los que anunciaron de antemano la venida del Justo, de quien ahora ustedes han llegado a ser traidores y asesinos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «traidores y homicidas».
    reason: lexical_alternative
  - marker: c
    text: «Sus padres» también podría traducirse «sus antepasados», pero el griego dice más literalmente «sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα τῶν προφητῶν
  english_pob_choice: Which of the prophets
  chosen_spanish: ¿A cuál de los profetas
  alternatives_spanish:
  - ¿Qué profeta
  - ¿Cuál de los profetas
  lexicon: BDAG
  rationale: La construcción partitiva con τίνα + genitivo plural pide en español una pregunta idiomática que conserve el valor retórico de excepción total. «A cuál de los profetas» refleja bien la referencia distributiva sin perder naturalidad.
- source_word: ἐδίωξαν
  english_pob_choice: did ... persecute
  chosen_spanish: persiguieron
  alternatives_spanish:
  - hostigaron
  - acosaron
  lexicon: BDAG
  rationale: En este contexto διώκω expresa hostilidad sostenida contra los profetas. «Persiguieron» comunica ese sentido bíblico de manera clara y estable en español.
- source_word: οἱ πατέρες ὑμῶν
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: BDAG
  rationale: Con el discurso directo en español, «sus padres» preserva la referencia generacional y el tono acusatorio del griego. «Antepasados» suaviza demasiado la formulación; «vuestros» no es el registro más natural aquí.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - pusieron a muerte
  lexicon: BDAG
  rationale: «Mataron» es la equivalencia más directa, moderna y fiel al aoristo. Evita arcaísmos y no debilita la acusación moral del pasaje.
- source_word: τοὺς προκαταγγείλαντας
  english_pob_choice: those who announced beforehand
  chosen_spanish: a los que anunciaron de antemano
  alternatives_spanish:
  - a los que proclamaron de antemano
  - a los que anunciaron previamente
  lexicon: BDAG
  rationale: El participio expresa una proclamación previa; «anunciaron de antemano» conserva tanto la idea de anuncio como el valor temporal del prefijo προ-. La preposición «a» ayuda al régimen natural del verbo en español.
- source_word: περὶ τῆς ἐλεύσεως
  english_pob_choice: the coming of
  chosen_spanish: la venida de
  alternatives_spanish:
  - la llegada de
  - el advenimiento de
  lexicon: BDAG
  rationale: «Venida» mantiene el lenguaje bíblico habitual y corresponde bien a ἔλευσις sin sonar arcaico en español moderno. «Llegada» es posible, pero menos solemne.
- source_word: τοῦ δικαίου
  english_pob_choice: the Righteous One
  chosen_spanish: el Justo[a]
  alternatives_spanish:
  - el Justo
  - el hombre justo
  lexicon: BDAG
  rationale: La forma articular singular funciona como designación titulada en el contexto de Hechos, referida a Jesús. «El Justo» es la opción más sobria y fiel en español; la nota preserva la alternativa lexical «el Justo»/«el Justo» frente a otras posibilidades como «el Justo» entendido solo descriptivamente.
- source_word: οὗ
  english_pob_choice: of whom
  chosen_spanish: de quien
  alternatives_spanish:
  - del cual
  - de quien ahora
  lexicon: BDAG
  rationale: El relativo genitivo se expresa de forma natural en español con «de quien», manteniendo la relación sintáctica con el sujeto precedente sin forzar una construcción más pesada.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: BDAG
  rationale: «Ahora» conserva el contraste temporal con la conducta de los padres y subraya la culpabilidad presente de los oyentes.
- source_word: προδόται
  english_pob_choice: betrayers
  chosen_spanish: traidores
  alternatives_spanish:
  - entregadores
  - traicioneros
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «betrayers» para evitar connotaciones políticas excesivas, en español «traidores» es la forma más natural y reproduce bien la idea de haber entregado a Jesús. «Entregadores» suena menos idiomático; «traicioneros» es adjetival.
- source_word: φονεῖς
  english_pob_choice: murderers
  chosen_spanish: asesinos
  alternatives_spanish:
  - homicidas
  - matadores
  lexicon: BDAG
  rationale: «Asesinos» comunica con fuerza la culpabilidad de una muerte injusta. En español bíblico suena directo y no meramente genérico como «matadores».
- source_word: ἐγένεσθε
  english_pob_choice: have now become
  chosen_spanish: se han hecho
  alternatives_spanish:
  - han llegado a ser
  - se volvieron
  lexicon: BDAG
  rationale: El aoristo medio aquí expresa un cambio de estado. «Se han hecho» transmite bien ese resultado en español actual y combina naturalmente con «ahora».
theological_decisions:
- issue: Identificación de τοῦ δικαίου como título cristológico
  english_pob_reading: the Righteous One
  chosen_spanish_reading: el Justo
  alternative_spanish_readings:
  - el Justo entendido solo como adjetivo
  - el Hombre justo
  rationale: En el contexto de Hechos 7, Stephen alude a Jesús como el inocente/justo cuyo advenimiento fue anunciado por los profetas. En español, «el Justo» preserva el valor casi titular sin agregar contenido ajeno al griego.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Conservar la acusación judicial y moral de la cláusula final
  english_pob_reading: betrayers and murderers
  chosen_spanish_reading: traidores y asesinos
  alternative_spanish_readings:
  - traidores y homicidas
  - traidores y matadores
  rationale: El griego presenta una denuncia directa. «Asesinos» mantiene el peso moral y jurídico de φονεῖς; «homicidas» es más técnico, pero menos enérgico en español común.
  doctrine_reference: Translation philosophy §§2, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés, pero ajusta varias decisiones para español natural: καὶ se refleja con «Y» sin intensificación añadida; τοὺς προκαταγγείλαντας se vierte como «a los que anunciaron de antemano»; y el cierre mantiene el contraste temporal de νῦν con «ahora». También se conserva la fuerza acusatoria de προδόται καὶ φονεῖς con «traidores y asesinos».'
  spanish_consistency_notes:
  - Se usa «Justo» con mayúscula en el texto para señalar el carácter titulativo cristológico, coherente con el audit trail inglés.
  - Se mantiene «padres» en lugar de «antepasados» para reflejar la literalidad del griego y el tono de reproche del discurso.
  - La puntuación separa la pregunta retórica de la denuncia final, siguiendo la estructura del griego y la edición inglesa.
