  glossary_alignment: 'Buena alineación con la terminología del proyecto: θεοὺς -> «dioses» preserva correctamente la forma léxica en contexto idolátrico; no hay conflicto con Yahvé/Mesías ni otros términos sensibles del glosario. La nota sobre «ídolos» es adecuada como alternativa léxica, pero debe anclarse en «dioses».'
