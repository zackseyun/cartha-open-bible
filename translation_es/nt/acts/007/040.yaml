translation:
  language: es
  text: 'diciendo a Aarón: «Haznos dioses[a] que vayan delante de nosotros, porque este Moisés[b], que nos sacó de la tierra de Egipto, no sabemos qué le ha pasado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolos». La palabra griega es literalmente «dioses», en eco de la redacción de Éxodo, y preserva la afirmación del pueblo en vez de reemplazarla por una etiqueta interpretativa.
    reason: lexical_alternative
  - marker: b
    text: El demostrativo «este» conserva el matiz de distancia del griego.
    reason: lexical_note
lexical_decisions:
- source_word: εἰπόντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - habiendo dicho
  lexicon: BDAG
  rationale: El participio aoristo introduce el contenido del discurso. «Diciendo» es natural en español narrativo y conserva la relación participial sin sobrecargar la frase.
- source_word: Ποίησον
  english_pob_choice: Make
  chosen_spanish: Haznos
  alternatives_spanish:
  - Haz para nosotros
  - Fabrícanos
  lexicon: BDAG
  rationale: El imperativo de ποιέω aquí exige un verbo directo de fabricación o producción. «Haznos» es claro, idiomático y preserva la petición a Aarón sin añadir matices.
- source_word: θεοὺς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  - dioses/ídolos
  lexicon: BDAG
  rationale: El griego dice θεοὺς, no un término distinto para «ídolos». «Dioses» mantiene la forma léxica del texto y conserva la tensión irónica de la petición idólatra.
- source_word: οἳ προπορεύσονται ἡμῶν
  english_pob_choice: who will go before us
  chosen_spanish: que vayan delante de nosotros
  alternatives_spanish:
  - que vayan antes de nosotros
  - que nos guíen
  lexicon: BDAG
  rationale: προπορεύομαι significa ir delante o preceder. «Vayan delante de nosotros» refleja bien la imagen espacial del griego sin convertirla en «guiar», que sería más interpretativo.
- source_word: ὁ γὰρ Μωϋσῆς οὗτος
  english_pob_choice: for this Moses
  chosen_spanish: porque este Moisés
  alternatives_spanish:
  - pues este Moisés
  - porque, en cuanto a este Moisés
  lexicon: BDAG
  rationale: γάρ expresa la razón de la petición. En español, «porque» reproduce la conexión causal de modo natural; «este Moisés» conserva el demostrativo con tono de distancia y cierto desdén.
- source_word: ἐξήγαγεν
  english_pob_choice: led us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos llevó fuera
  - nos hizo salir
  lexicon: BDAG
  rationale: ἐξάγω puede traducirse por sacar o llevar fuera. «Nos sacó» es la forma más natural en español y encaja con el lenguaje del éxodo.
- source_word: ἐκ γῆς Αἰγύπτου
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: BDAG
  rationale: La expresión incluye γῆς, así que «de la tierra de Egipto» conserva el detalle explícito del griego en vez de comprimirlo a «de Egipto».
- source_word: οὐκ οἴδαμεν
  english_pob_choice: we do not know
  chosen_spanish: no sabemos
  alternatives_spanish:
  - no conocemos
  - no tenemos noticia
  lexicon: BDAG
  rationale: Expresión directa de ignorancia presente. «No sabemos» es la opción más natural en español y refleja con sencillez el estado de desconocimiento.
- source_word: τί ἐγένετο αὐτῷ
  english_pob_choice: what has happened to him
  chosen_spanish: qué le ha pasado
  alternatives_spanish:
  - qué le sucedió
  - qué fue de él
  lexicon: BDAG
  rationale: La construcción con γίνομαι aquí pide un sentido idiomático de acontecimiento o resultado. «Qué le ha pasado» es claro en español y evita un giro más arcaico como «qué fue de él».
theological_decisions:
- issue: Rendering θεοὺς in an idolatry context
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  rationale: La frase reporta la propia solicitud del pueblo usando θεοὺς. Traducir «dioses» preserva la forma del original y la ironía del pecado sin sustituirla por un término interpretativo.
  doctrine_reference: 'Translation philosophy: primacía del texto original; mantener la tensión teológica sin resolverla en la traducción principal.'
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del auditoría inglesa, que eliminó el relleno interpretativo equivalente a «as for» y dejó una cláusula más directa: «for this Moses... we do not know what has happened to him». La redacción española refleja esa misma linealidad y conserva el tono ligeramente despectivo del demostrativo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó «dioses» en el cuerpo para respetar θεοὺς; la alternativa «ídolos» quedó en nota.
  - «Moisés» y «Aarón» siguen la forma española estándar de los nombres propios bíblicos.
  - El orden de la cláusula principal reproduce el flujo narrativo del griego sin rigidizarlo en un calco innecesario.
