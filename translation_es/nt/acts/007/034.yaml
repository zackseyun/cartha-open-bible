review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: visión enfática de la aflicción/trato duro, escucha del gemido, descenso divino para liberar, y comisión a Moisés para ir a Egipto. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: ἰδὼν εἶδον suena más natural en español como «Ciertamente he visto» que «He visto ciertamente», y κατέβην se alinea mejor con el audit trail inglés y con la expresión bíblica idiomática como «he bajado» que con «he descendido», que resulta más rígido en este contexto de intervención divina.'
  spanish_quality_summary: El español es claro y digno, pero «He visto ciertamente» suena algo calcado y poco idiomático en español moderno. «He descendido» es comprensible, pero menos natural que «he bajado» en una cita que evoca Éxodo 3:7–8. El resto del versículo lee bien; «aflicción» y «librarlos» son aceptables en registro bíblico, aunque la nota léxica ya preserva alternativas útiles.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Librarlos» concuerda bien con la revisión inglesa a «deliver them». «Aflicción» es permitido como opción principal si se conservan «opresión» y «maltrato» en nota.
  issues:
  - severity: medium
    issue: Orden poco natural en «He visto ciertamente»
    rationale: Aunque transmite el énfasis de ἰδὼν εἶδον, en español suena más natural y solemne «Ciertamente he visto» o «Sí, he visto». El cambio mejora legibilidad sin perder la fuerza enfática.
  - severity: medium
    issue: «He descendido» es menos idiomático que «he bajado» para κατέβην en esta cita
    rationale: El griego usa el lenguaje antropomórfico tradicional de la intervención divina, en eco de Éxodo. En español bíblico corriente, «he bajado» suena más natural y directo que «he descendido», preservando mejor el tono narrativo sin tecnicismo innecesario.
  revised_spanish_text: Ciertamente he visto la aflicción[a] de mi pueblo en Egipto, y he oído su gemido; y he bajado para librarlos. Y ahora, ven, te enviaré a Egipto.
  revised_footnotes:
  - marker: a
    text: O «opresión» o «maltrato» para «aflicción».
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden de la expresión enfática para un español más natural («Ciertamente he visto») y se cambia «he descendido» por «he bajado» para reflejar mejor el uso bíblico idiomático de κατέβην y el eco de Éxodo 3:8, sin alterar el sentido ni la teología del texto. Se conserva la nota léxica sobre «aflicción».
