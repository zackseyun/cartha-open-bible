translation:
  language: es
  text: Ciertamente he visto la aflicción[a] de mi pueblo en Egipto, y he oído su gemido; y he bajado para librarlos. Y ahora, ven, te enviaré a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «opresión» o «maltrato» para «aflicción».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν εἶδον
  english_pob_choice: I have surely seen
  chosen_spanish: He visto ciertamente
  alternatives_spanish:
  - Ciertamente he visto
  - He visto sin duda
  - Verdaderamente he visto
  lexicon: BDAG
  rationale: La construcción participio + verbo finito expresa énfasis. En español, «he visto ciertamente» conserva ese énfasis sin sonar forzado; el pretérito perfecto mantiene la relevancia presente de la percepción divina.
- source_word: κάκωσιν
  english_pob_choice: mistreatment
  chosen_spanish: aflicción
  alternatives_spanish:
  - maltrato
  - opresión
  - sufrimiento
  lexicon: BDAG
  rationale: El término cubre trato duro, daño o aflicción. «Aflicción» preserva un campo semántico amplio y solemne; «maltrato» sería más literal pero menos abarcador, y «opresión» estrecha demasiado el matiz.
- source_word: τοῦ λαοῦ μου
  english_pob_choice: my people
  chosen_spanish: de mi pueblo
  alternatives_spanish:
  - de mi gente
  - de mi pueblo amado
  lexicon: BDAG
  rationale: «Pueblo» reproduce bien λαός y conserva el tono pactual del posesivo. «Gente» sería más coloquial y menos preciso en este contexto.
- source_word: τοῦ ἐν Αἰγύπτῳ
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - que está en Egipto
  - los que están en Egipto
  lexicon: BDAG
  rationale: La frase adjetival se expresa de manera natural en español como «en Egipto», sin añadir una paráfrasis innecesaria.
- source_word: τοῦ στεναγμοῦ αὐτοῦ
  english_pob_choice: their groaning
  chosen_spanish: su gemido
  alternatives_spanish:
  - su clamor
  - su suspiro
  - su lamentación
  lexicon: BDAG
  rationale: Aunque el griego usa singular, el referente es colectivo. «Su gemido» respeta el singular del original y comunica dolor audible; en nota se preserva la alternativa colectiva implícita en el sentido.
- source_word: κατέβην
  english_pob_choice: I have come down
  chosen_spanish: he descendido
  alternatives_spanish:
  - he bajado
  - he venido abajo
  lexicon: BDAG
  rationale: El verbo mantiene la imaginería teofánica de descenso. «He descendido» es más formal y más cercano al léxico del texto que una paráfrasis como «he venido».
- source_word: ἐξελέσθαι
  english_pob_choice: to deliver them
  chosen_spanish: para librarlos
  alternatives_spanish:
  - para rescatarlos
  - para entregarlos
  - para sacarlos
  lexicon: BDAG
  rationale: El infinitivo medio expresa liberación activa. «Librarlos» es un equivalente natural y sobrio en español bíblico; «rescatarlos» es viable pero más interpretativo, y «entregarlos» no corresponde al sentido aquí.
- source_word: δεῦρο
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven acá
  - ven aquí
  lexicon: BDAG
  rationale: La partícula deíctica funciona como una invitación imperativa breve. «Ven» conserva la concisión y el impulso del mandato.
- source_word: ἀποστείλω
  english_pob_choice: I will send
  chosen_spanish: te enviaré
  alternatives_spanish:
  - yo te enviaré
  - te mandaré
  lexicon: BDAG
  rationale: El futuro es directo. «Te enviaré» es natural en español y mantiene la forma de comisión; «mandar» suena más coloquial o autoritativo en un registro distinto.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - hasta Egipto
  lexicon: BDAG
  rationale: En español, el destino se expresa normalmente con «a»; es la opción más fluida y fiel al valor direccional de εἰς.
theological_decisions:
- issue: Lenguaje antropomórfico de la descendencia divina
  english_pob_reading: I have come down
  chosen_spanish_reading: he descendido
  alternative_spanish_readings:
  - he bajado
  - he venido
  rationale: Se conserva la imaginería de la intervención divina sin explicarla ni suavizarla. «He descendido» mantiene la tensión teofánica del texto, en línea con la lectura inglesa que preserva el antropomorfismo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre el singular griego y el referente colectivo en el gemido
  english_pob_reading: their groaning
  chosen_spanish_reading: su gemido
  alternative_spanish_readings:
  - su gemir
  - su clamor
  rationale: El español puede conservar el singular del sustantivo y, al mismo tiempo, dejar claro el referente colectivo por el contexto. Esto evita forzar un plural donde el griego usa singular, sin perder el sentido comunitario.
  doctrine_reference: POB lexical practice on collective reference
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y la decisión inglesa revisada de usar un término formal para ἐξελέσθαι; se evita una traducción mecánica desde el inglés al conservar la metáfora de descenso, el énfasis del hebraísmo griego ἰδὼν εἶδον y la comisión directa de envío a Egipto. No se incorporan glosas doctrinales externas al verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino; aquí no está explícito en el texto griego.
  - «Aflicción» conserva el rango semántico del término griego sin reducirlo exclusivamente a «opresión».
  - «He descendido» preserva el tono teofánico y se alinea con el registro formal del resto del verso.
  - El pronombre colectivo se resuelve de forma natural en español con «su gemido», sin añadir un plural no presente en el griego.
