- from: He visto ciertamente la aflicción[a] de mi pueblo en Egipto, y he oído su gemido; y he descendido para librarlos. Y ahora, ven, te enviaré a Egipto.
  to: Ciertamente he visto la aflicción[a] de mi pueblo en Egipto, y he oído su gemido; y he bajado para librarlos. Y ahora, ven, te enviaré a Egipto.
  rationale: Se ajusta el orden de la expresión enfática para un español más natural («Ciertamente he visto») y se cambia «he descendido» por «he bajado» para reflejar mejor el uso bíblico idiomático de κατέβην y el eco de Éxodo 3:8, sin alterar el sentido ni la teología del texto. Se conserva la nota léxica sobre «aflicción».
