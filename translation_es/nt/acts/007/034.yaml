base_translation:
  language: en
  yaml_path: translation/nt/acts/007/034.yaml
  text: I have surely seen the mistreatment of my people in Egypt[a], and I have heard their groaning, and I have come down to deliver them. And now come[b], I will send you to Egypt.
  footnotes:
