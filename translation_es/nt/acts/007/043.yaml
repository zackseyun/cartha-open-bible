translation:
  language: es
  text: Y llevaron la tienda de Moloch y la estrella del dios Refán[a], las imágenes que hicieron para adorarlas[c], y yo los deportaré más allá de Babilonia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas traducciones, reflejando la fuente hebrea de Amós 5:26, leen 'vuestro dios Refán' en lugar de 'el dios Refán'. Aquí Hechos dice 'el dios Refán'.
    reason: alternative_reading
  - marker: b
    text: Hechos aquí dice 'más allá de Babilonia'. En Amós 5:27, el pasaje de origen suele traducirse 'más allá de Damasco'.
    reason: cross_reference
  - marker: c
    text: O 'figuras' o 'representaciones' para 'imágenes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνελάβετε
  english_pob_choice: you took up
  chosen_spanish: tomaste
  alternatives_spanish:
  - tomaste en hombros
  - llevaste
  - alzaste
  lexicon: BDAG
  rationale: El aoristo indica una acción completa y la idea aquí es asumir o cargar el objeto idólatra. En español, 'tomaste' es natural y suficientemente amplio para conservar el sentido de portar/susbtener sin añadir detalles no explicitados.
- source_word: σκηνὴν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - tabernáculo
  - santuario
  lexicon: BDAG
  rationale: '''Tienda'' reproduce el sentido básico de σκηνή sin sugerir el tabernáculo legítimo de Yahvé. ''Tabernáculo'' podría inducir una asociación incorrecta; ''tienda'' es claro y fiel al referente idolátrico portátil.'
- source_word: Μολὸχ
  english_pob_choice: Moloch
  chosen_spanish: Moloch
  alternatives_spanish:
  - Moloc
  - Molec
  lexicon: BDAG
  rationale: Es un nombre propio transliterado. Mantengo 'Moloch' por ser forma reconocible en español bíblico y suficientemente cercana al griego.
- source_word: ἄστρον
  english_pob_choice: star
  chosen_spanish: estrella
  alternatives_spanish:
  - astro
  - estrella-idolo
  - astro idolátrico
  lexicon: BDAG
  rationale: El sustantivo denota literalmente un astro/estrella. 'Estrella' es el equivalente más natural en español y conserva la referencia directa, sin convertirla en una interpretación más específica que el texto no exige.
- source_word: τοῦ θεοῦ Ῥαιφάν
  english_pob_choice: of the god Rephan
  chosen_spanish: del dios Refán
  alternatives_spanish:
  - del dios Refán
  - de vuestro dios Refán
  - del dios Raifán
  lexicon: BDAG
  rationale: 'Sigo la lectura griega de Hechos: ''del dios Rephan''. En español, ''Refán'' adapta la transliteración a una forma más natural en nuestra ortografía. No se armoniza con la fuente de Amos, donde aparece la variante ''vuestro dios'', porque el texto de Hechos conserva aquí ''el dios''.'
- source_word: Ῥαιφάν
  english_pob_choice: Rephan
  chosen_spanish: Refán
  alternatives_spanish:
  - Refán
  - Raifán
  - Rafán
  lexicon: BDAG
  rationale: La forma griega se translitera como nombre propio. 'Refán' es una adaptación fonética viable en español y evita una pronunciación demasiado anglicizada, manteniendo la identificación del personaje o ídolo.
- source_word: τύπους
  english_pob_choice: images
  chosen_spanish: imágenes
  alternatives_spanish:
  - figuras
  - representaciones
  - formas
  lexicon: BDAG
  rationale: En este contexto de idolatría, 'imágenes' comunica con claridad los objetos fabricados para culto. Conserva el matiz de representación material sin cargarlo con una explicación adicional.
- source_word: ἐποιήσατε
  english_pob_choice: you made
  chosen_spanish: hiciste
  alternatives_spanish:
  - fabricaste
  - modelaste
  - elaboraste
  lexicon: BDAG
  rationale: La forma verbal acusa directamente la fabricación humana de esos ídolos. 'Hiciste' es simple, directo y mantiene la responsabilidad del sujeto sin sobreespecificar el proceso.
- source_word: προσκυνεῖν αὐτοῖς
  english_pob_choice: to worship them
  chosen_spanish: para adorarlas
  alternatives_spanish:
  - para postrarse ante ellas
  - para rendirles culto
  - para venerarlas
  lexicon: BDAG
  rationale: En contexto religioso, προσκυνέω puede ser 'adorar' o 'postrarse'. Aquí se refiere al acto idólatra dirigido a las imágenes; 'adorarlas' transmite bien el fin del acto. El pronombre se ajusta al femenino plural de 'imágenes'.
- source_word: μετοικιῶ
  english_pob_choice: I will deport
  chosen_spanish: yo os deportaré
  alternatives_spanish:
  - yo os llevaré al exilio
  - yo os desterraré
  - os trasladaré al exilio
  lexicon: BDAG
  rationale: El futuro expresa una acción judicial de traslado forzoso. 'Deportaré' conserva esa fuerza y es conciso. Se mantiene la primera persona divina del griego, con un objeto directo en segunda persona plural.
- source_word: ἐπέκεινα Βαβυλῶνος
  english_pob_choice: beyond Babylon
  chosen_spanish: más allá de Babilonia
  alternatives_spanish:
  - al otro lado de Babilonia
  - allende Babilonia
  lexicon: BDAG
  rationale: '''Más allá de'' reproduce de manera natural ἐπέκεινα y preserva el contraste geográfico del texto de Hechos. Se conserva ''Babilonia'' conforme a la lectura griega, sin armonizarla con la tradición de Amós.'
theological_decisions:
- issue: Variación textual entre Hechos y la fuente de Amós sobre el lugar del exilio
  english_pob_reading: beyond Babylon
  chosen_spanish_reading: más allá de Babilonia
  alternative_spanish_readings:
  - más allá de Damasco
  rationale: El texto de Hechos dice explícitamente 'Babilonia', y la traducción debe reflejar esa lectura en lugar de corregirla o armonizarla con Amós 5:27. Se preserva así la tensión textual documentada por el POB en inglés.
  doctrine_reference: Translation philosophy §1 (primacía del texto fuente); §3 (preservar tensiones textuales)
- issue: Lectura de 'el dios Rephan' frente a la variante de la tradición de Amós
  english_pob_reading: the god Rephan
  chosen_spanish_reading: el dios Refán
  alternative_spanish_readings:
  - vuestro dios Refán
  - el dios Raifán
  rationale: Hechos 7:43 en griego usa 'el dios Rephan', por lo que la traducción principal debe seguir esa forma. La variante 'vuestro dios' queda implícitamente reconocida en nota para no borrar la tensión con la tradición veterotestamentaria.
  doctrine_reference: Primacía del original griego; preservación de variantes textuales relevantes
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Hechos 7:43 y la auditoría inglesa del POB. Se conserva la tensión documental entre la cita en Hechos y la forma conocida de Amós, sin armonizar el destino del exilio ni la lectura de 'el dios Rephan'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto cuando el texto lo requiera, pero aquí el versículo no contiene el Tetragrámaton; por eso no aparece.
  - '''Imágenes'' mantiene concordancia femenina plural con el pronombre enclítico ''las'' en ''adorarlas''.'
  - '''Deportaré'' conserva el tono judicial del futuro divino mejor que una paráfrasis más suave.'
  - '''Refán'' es una adaptación española del nombre griego Rephan para facilitar lectura y pronunciación sin alterar la referencia.'
