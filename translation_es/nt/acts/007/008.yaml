translation:
  language: es
  text: Y Dios le dio a Abraham la alianza de la circuncisión. Y así engendró a Isaac y lo circuncidó al octavo día; e Isaac engendró a Jacob, y Jacob a los doce patriarcas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διαθήκην περιτομῆς
  english_pob_choice: the covenant of circumcision
  chosen_spanish: el pacto de la circuncisión
  alternatives_spanish:
  - un pacto de la circuncisión
  - el pacto marcado por la circuncisión
  lexicon: BDAG
  rationale: 'διαθήκη en este contexto histórico-bíblico se entiende mejor como ''pacto''; en español, ''pacto'' comunica con claridad la relación establecida por Dios. El genitivo περιτομῆς se conserva como definitorio: no cualquier pacto, sino el asociado con la circuncisión, en línea con Génesis 17. Mantengo el artículo definido porque el referente es el pacto específico de la historia de la salvación.'
- source_word: οὕτως
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - así
  - de ese modo
  lexicon: BDAG
  rationale: οὕτως enlaza la entrega del pacto con lo que sigue. 'Y así' conserva el valor consecutivo/secuencial de forma natural en español sin añadir interpretación.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: BDAG
  rationale: Aquí γεννάω expresa generación paterna y descendencia genealógica. 'Engendró' es formal, bíblico y fiel al sujeto masculino; además preserva el patrón genealógico del texto. Incluyo la preposición 'a' donde corresponde en español para fluidez.
- source_word: περιέτεμεν
  english_pob_choice: circumcised
  chosen_spanish: circuncidó
  alternatives_spanish:
  - cortó el prepucio de
  - realizó la circuncisión de
  lexicon: BDAG
  rationale: περιτέμνω significa de manera directa 'circuncidar'. El verbo español normal y claro es 'circuncidar', que conserva el acto pactal sin circunloquios.
- source_word: τῇ ἡμέρᾳ τῇ ὀγδόῃ
  english_pob_choice: on the eighth day
  chosen_spanish: al octavo día
  alternatives_spanish:
  - en el octavo día
  - a los ocho días
  lexicon: BDAG
  rationale: La frase temporal dativa se expresa naturalmente en español con 'al octavo día'. Es idiomático, claro y no agrega la especificación 'después del nacimiento' que no aparece explícita en el griego.
- source_word: πατριάρχας
  english_pob_choice: patriarchs
  chosen_spanish: patriarcas
  alternatives_spanish:
  - padres patriarcales
  - antepasados
  lexicon: BDAG
  rationale: '''Patriarcas'' es el término bíblico-histórico establecido para los padres fundadores de las tribus de Israel. Conserva el valor técnico del término griego.'
- source_word: Ἰσαάκ / Ἰακώβ
  english_pob_choice: Isaac / Jacob
  chosen_spanish: Isaac / Jacob
  lexicon: convención estándar de transliteración bíblica
  rationale: Los nombres propios se mantienen en su forma castellana convencional, que es la transparente y reconocible para la lectura eclesial.
theological_decisions:
- issue: Referencia específica al pacto abrahámico
  english_pob_reading: Rendered as 'the covenant of circumcision' with definite article
  chosen_spanish_reading: '''el pacto de la circuncisión'' con artículo definido'
  alternative_spanish_readings:
  - '''un pacto de la circuncisión'''
  rationale: El pasaje alude al pacto concreto dado por Dios a Abraham, especialmente en Génesis 17. El artículo definido en español ayuda a identificar ese pacto específico sin introducir contenido ajeno al texto.
  doctrine_reference: Génesis 17; Hechos 7:8
- issue: Valor genealógico de γεννάω
  english_pob_reading: Used 'fathered' throughout the genealogy
  chosen_spanish_reading: Usar 'engendró' en la secuencia genealógica
  alternative_spanish_readings:
  - '''fue padre de'''
  - '''engendró'''
  rationale: '''Engendró'' mantiene la fuerza genealógica y masculina del verbo griego y conserva el estilo de enumeración histórica del pasaje. Evita tanto la paráfrasis como el tono arcaizante excesivo.'
  doctrine_reference: Hechos 7:8; principio de precisión genealógica
translation_notes:
  revision_awareness: 'La versión inglesa auditada quedó sin revisiones posteriores y con acuerdo alto; por tanto, la draft española sigue de cerca las decisiones ya fijadas: pacto específico, generación genealógica masculina y secuencia temporal natural, sin añadir notas textuales porque el contexto griego no presenta variante relevante en este versículo.'
  spanish_consistency_notes:
  - Mantengo 'pacto' para διαθήκη en coherencia con el uso bíblico-teológico del contexto.
  - Conservo 'circuncidó' en vez de un giro explicativo para no diluir el acto ritual-covenantal.
  - Uso 'patriarcas' como término técnico y reconocible.
  - La puntuación en dos cláusulas con punto y coma ayuda a reflejar la secuencia del griego sin volverla rígida.
