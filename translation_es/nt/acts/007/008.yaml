    rationale: Aunque 'pacto' no es incorrecto, διαθήκη en este contexto salvífico-histórico se vierte más naturalmente como 'alianza' en español bíblico amplio. Esto mejora fidelidad terminológica y legibilidad sin añadir contenido.
