  revised_spanish_text: Y Dios le dio a Abraham la alianza de la circuncisión. Y así engendró a Isaac y lo circuncidó al octavo día; e Isaac engendró a Jacob, y Jacob a los doce patriarcas.
  revision_rationale: Se ajusta διαθήκη a 'alianza' por mejor equivalencia bíblica en español y se explicita el referente de αὐτῷ ('a Abraham') para claridad contextual. Se conservan 'Y así', 'engendró', 'circuncidó', 'al octavo día' y 'patriarcas' por ser fieles, naturales y coherentes con el análisis fuente.
