translation:
  language: es
  text: ¿No hizo mi mano todas estas cosas?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «¿No hice yo todas estas cosas?»'
    reason: lexical_alternative
  - marker: b
    text: Esta línea alude a Isaías 66:2.
    reason: cross_reference
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Did not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es verdad que ...?
  lexicon: BDAG
  rationale: οὐχί introduce una pregunta retórica que espera una respuesta afirmativa. En español, «¿No ...?» conserva mejor la fuerza interrogativa y el tono natural de la frase.
- source_word: ἡ χείρ μου
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  - yo mismo
  lexicon: BDAG
  rationale: χείρ es literalmente «mano». Como en el contexto se mantiene la imagen antropomórfica de la cita de Isaías 66:2, conviene conservar la expresión concreta en español.
- source_word: ἐποίησεν
  english_pob_choice: make
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - fabricó
  lexicon: BDAG
  rationale: ποιέω aquí se refiere a hacer o producir; «hizo» reproduce el sentido verbal de acción creadora sin forzar un término más técnico que el griego no exige en esta frase.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas todas
  lexicon: BDAG
  rationale: La combinación de demostrativo y cuantificador se refleja mejor con «todas estas cosas», que conserva la amplitud total y la deixis de ταῦτα πάντα.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retain 'my hand' as the speaker's self-reference to divine agency
  chosen_spanish_reading: Conservar «mi mano» como imagen de la acción divina
  alternative_spanish_readings:
  - 'Traducir interpretativamente: «¿No fui yo quien hizo todas estas cosas?»'
  - 'Parafrasear: «¿No hizo mi poder todas estas cosas?»'
  rationale: La cita funciona como lenguaje antropomórfico y retiene la fuerza retórica de la imagen. En español, «mi mano» preserva mejor la cita de Isaías 66:2 y evita desactivar la figura.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y se mantuvo sin cambios; la redacción española sigue la misma lectura y conserva la cita intertextual sin añadir matices no sustentados por el griego.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de Dios sin sustituir la imagen concreta por una paráfrasis abstracta.
  - Se conserva la estructura interrogativa retórica y la amplitud de «todas estas cosas».
  - La elección de «hizo» y «mano» sigue el valor literal del griego y del contexto de Isaías 66:2.
