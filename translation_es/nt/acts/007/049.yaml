  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene la oposición cósmica cielo/tierra, conserva «casa» en vez de interpretar «templo», y reproduce adecuadamente la pregunta retórica y «el Señor» para κύριος en esta cita neotestamentaria. Sin embargo, introduce una nota sobre «Los cielos» que no está sustentada por el griego singular ni por el audit trail inglés, y «estrado» para ὑποπόδιον es menos preciso que una opción española más establecida.'
  spanish_quality_summary: El texto es legible y digno, pero «edificaréis» suena marcadamente peninsular y menos neutro para el español latinoamericano amplio; «construirán» o una reestructuración evitaría ese problema, aunque el singular/plural debe seguir el griego. Además, «estrado» puede sugerir plataforma o tarima más que escabel/reposapiés. Conviene una leve naturalización sin perder formalidad.
  glossary_alignment: 'Buena alineación en general: «el cielo», «trono», «la tierra», «casa», «el Señor», «lugar», «descanso». La principal excepción es ὑποπόδιον, donde «escabel» o «reposapiés» corresponde mejor al campo semántico. La decisión de no usar «Yahvé» aquí es defendible porque la fuente inmediata es κύριος y el proyecto pide explicar ese caso, no imponer ciegamente el nombre divino.'
  issues:
