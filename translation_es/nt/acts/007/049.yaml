translation:
  language: es
  text: «El cielo es mi trono, y la tierra, el escabel[a] de mis pies. ¿Qué clase de casa me edificaréis, dice el Señor, o cuál es el lugar de mi descanso?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estrado de mis pies». Se prefiere «escabel» por corresponder más directamente a un apoyo para los pies.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανός
  english_pob_choice: Heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: BDAG
  rationale: En esta cita de Isaías, οὐρανός remite al ámbito celestial en contraste con la tierra; en español, «el cielo» comunica ese sentido de manera natural y reverente. «Los cielos» también sería posible, pero aquí el singular mantiene mejor la imagen de trono.
- source_word: θρόνος
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - sitial
  - asiento real
  lexicon: BDAG
  rationale: «Trono» es el equivalente directo y conserva la metáfora de realeza y soberanía del original.
- source_word: γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: La pareja cielo/tierra reproduce el contraste cósmico del texto griego. «La tierra» es la forma más natural y fiel en español.
- source_word: ὑποπόδιον
  english_pob_choice: the footstool of my feet
  chosen_spanish: el estrado de mis pies
  alternatives_spanish:
  - el escabel de mis pies
  - el banquillo de mis pies
  lexicon: BDAG
  rationale: El griego expresa una imagen de apoyo bajo los pies. «Estrado» comunica bien la metáfora en español bíblico contemporáneo y evita una construcción forzada. Se conserva «de mis pies» para reflejar el genitivo explícito del griego, como en el audit trail inglés.
- source_word: ποῖον
  english_pob_choice: What kind of
  chosen_spanish: ¿Qué clase de
  alternatives_spanish:
  - ¿Qué tipo de
  - ¿Cuál
  lexicon: BDAG
  rationale: ποῖον pregunta por clase o cualidad, no solo por identidad. «Qué clase de» preserva mejor el matiz retórico.
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - templo
  lexicon: BDAG
  rationale: Aunque el contexto alude al templo, el griego dice literalmente «casa». «Casa» preserva la formulación de la cita y deja que el contexto temple su referencia.
- source_word: οἰκοδομήσετέ
  english_pob_choice: will you build
  chosen_spanish: edificaréis
  alternatives_spanish:
  - construiréis
  - levantaréis
  lexicon: BDAG
  rationale: El futuro de segunda plural se conserva con «edificaréis». «Edificar» mantiene el registro bíblico y la correspondencia verbal con el griego.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el texto fuente es κύριος en una cita del NT. Por fidelidad al griego citado y por coherencia con el audit trail inglés, se traduce «el Señor».
- source_word: τόπος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - lugar
  - sitio
  lexicon: BDAG
  rationale: «Lugar» es el equivalente natural y formal en español para τόπος.
- source_word: καταπαύσεώς
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - descanso
  - reposo
  lexicon: BDAG
  rationale: El sustantivo apunta al concepto de descanso o reposo. «Descanso» suena natural en español y preserva la idea de la morada tranquila de Dios.
theological_decisions:
- issue: Cómo traducir κύριος en una cita de Isaías dentro de Hechos
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El griego de Hechos 7:49 usa κύριος, y el audit trail inglés prescribe «the Lord» en vez de «LORD». En español, «el Señor» conserva la referencia al hablante divino sin introducir una convención tipográfica ajena al texto citado.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Mantener la tensión entre la trascendencia divina y el templo
  english_pob_reading: Heaven is my throne ... What kind of house will you build for me ... what is the place of my rest?
  chosen_spanish_reading: El cielo es mi trono ... ¿Qué clase de casa me edificaréis ... cuál es el lugar de mi descanso?
  alternative_spanish_readings:
  - Los cielos son mi trono ...
  - ¿Qué templo me edificaréis ...
  rationale: La formulación conserva la oposición entre cielo/tierra y la pregunta retórica que relativiza cualquier casa humana como morada de Dios. No se sustituye «casa» por «templo» para no suavizar la cita ni resolver por adelantado la tensión del original.
  doctrine_reference: Isaías 66:1; Hechos 7:49 en contexto de discurso de Esteban
translation_notes:
  revision_awareness: El audit trail inglés pasó de «the footstool for my feet» a «the footstool of my feet» para mayor cercanía al genitivo griego. La versión española refleja esa misma cercanía con «el estrado de mis pies», manteniendo la referencia explícita a los pies y la estructura poética de la cita.
  spanish_consistency_notes:
  - Se usa «el Señor» para κύριος, coherente con el texto griego citado y con la pauta auditada en inglés.
  - Se conserva «casa» en lugar de «templo» para respetar la palabra del original y dejar la interpretación contextual al lector.
  - «El cielo / la tierra» mantiene el paralelismo cósmico del pasaje.
  - La frase «de mis pies» preserva la relación posesiva explícita del griego, en línea con la revisión inglesa más literal.
