    issue: Nota [a] introduce «Los cielos» como alternativa
    rationale: El griego tiene singular ὁ οὐρανός, y el audit trail inglés no preserva una alternativa plural. La nota crea una posibilidad innecesaria y potencialmente engañosa.
  - severity: medium
    issue: «Estrado» para ὑποπόδιον es menos fiel que «escabel»
    rationale: Ὑποπόδιον significa un apoyo para los pies; «estrado» en español suele evocar una plataforma o tarima. «Escabel» preserva mejor la imagen concreta del original.
  - severity: low
    issue: «edificaréis» no es el registro más neutro panhispánico
    rationale: Aunque es correcto y fiel al futuro de segunda persona plural, en un español latinoamericano amplio suena más localizado. Una solución con «van a construir» sería menos literal en tiempo/aspecto; por eso puede mantenerse si se prioriza formalidad, pero merece observación.
  revised_spanish_text: «El cielo es mi trono, y la tierra, el escabel[a] de mis pies. ¿Qué clase de casa me edificaréis, dice el Señor, o cuál es el lugar de mi descanso?»
  revised_footnotes:
