translation:
  language: es
  text: ustedes que recibieron la ley por mediación de ángeles[a], y no la guardaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como entregada por ángeles» o «por disposición de ángeles». La frase griega es difícil, pero se refiere a la ley como dada con mediación angelical.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: you who
  chosen_spanish: ustedes que
  alternatives_spanish:
  - ustedes, los que
  - quienes
  lexicon: BDAG
  rationale: El griego introduce un segundo plural con fuerza acusatoria; «ustedes que» conserva la dirección directa al auditorio y evita volver impersonal la reprensión.
- source_word: ἐλάβετε
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - tomaron
  lexicon: BDAG
  rationale: «Recibieron» reproduce bien el aoristo de λαμβάνω en este contexto y mantiene el idioma bíblico natural para la ley.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: Aquí νόμος se refiere a la ley mosaica. En español, minúscula evita imponer una convención editorial no exigida por el griego.
- source_word: εἰς διαταγὰς ἀγγέλων
  english_pob_choice: as delivered by angels
  chosen_spanish: '[a]'
  alternatives_spanish:
  - como entregada por ángeles
  - en disposiciones de ángeles
  - por disposición de ángeles
  lexicon: BDAG
  rationale: La frase es difícil y el texto apunta a mediación angelical en la recepción de la ley. Se conserva la tensión semántica con una nota en lugar de resolver de forma excesiva el giro de διαταγή y εἰς.
- source_word: ἀγγέλων
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto alude a seres celestiales vinculados con la entrega de la ley, no a mensajeros humanos.
- source_word: οὐκ ἐφυλάξατε
  english_pob_choice: did not keep it
  chosen_spanish: no la guardaron
  alternatives_spanish:
  - no la obedecieron
  - no la observaron
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, observar o cumplir. Con «la ley», «guardar» es un equivalente idiomático fiel y ampliamente comprensible.
theological_decisions:
- issue: Mediación angelical en la entrega de la ley
  english_pob_reading: The law was received in connection with angelic mediation/delivery.
  chosen_spanish_reading: La ley fue recibida en relación con una mediación angelical.
  alternative_spanish_readings:
  - La ley fue recibida mediante ángeles.
  - La ley fue entregada por ángeles.
  rationale: El griego y el audit trail inglés afirman la participación angélica sin especificar el mecanismo exacto. La redacción española mantiene esa relación sin cerrar indebidamente la ambigüedad de διαταγαί.
  doctrine_reference: Preservar la tensión teológica y el alcance del texto, sin resolver el modo de la mediación más allá de lo que el verso afirma.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el audit trail inglés revisado y no requiere cambios adicionales; se mantiene la lectura de mediación angelical sin forzar una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «ley» en minúscula para reflejar νόμος sin introducir una convención tipográfica teológica.
  - Se mantiene «ángeles» en plural como en el griego.
  - «Guardaron» conserva el valor de observar/cumplir, no solo proteger físicamente.
  - La nota a identifica la dificultad de εἰς διαταγὰς ἀγγέλων y preserva alternativas plausibles en español.
