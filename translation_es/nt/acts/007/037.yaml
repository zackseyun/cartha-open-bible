translation:
  language: es
  text: 'Este es el Moisés que dijo a los hijos de Israel[a]: «Dios les levantará un profeta[b] de entre sus hermanos[c], como yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Israel» también podría traducirse «hijos de Israel» o «israelitas»; el griego dice específicamente «hijos».
    reason: lexical_alternative
  - marker: b
    text: O, de manera más interpretativa, «el Profeta», en alusión a Deuteronomio 18:15 y su aplicación a Jesús en Hechos.
    reason: alternative_reading
  - marker: c
    text: Aquí «hermanos» se refiere a los demás israelitas; el plural griego es masculino.
    reason: cultural_note
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Este mismo
  - Éste
  lexicon: BDAG
  rationale: El demostrativo apunta de manera enfática a Moisés; en español, «Este» conserva la identificación directa sin sonar forzado.
- source_word: ὁ Μωϋσῆς
  english_pob_choice: the Moses
  chosen_spanish: el Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: El artículo griego contribuye a la identificación enfática («este es el Moisés»). En español, «el Moisés» refleja mejor ese matiz, aunque sea una forma marcada.
- source_word: εἴπας
  english_pob_choice: who said
  chosen_spanish: que habló
  alternatives_spanish:
  - que dijo
  - el que dijo
  lexicon: BDAG
  rationale: El participio aoristo funciona atributivamente con Moisés. «Que habló» mantiene el valor relativo y suena natural en español bíblico.
- source_word: τοῖς υἱοῖς Ἰσραήλ
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israelitas
  - a los israelitas
  - a los hijos de Jacob
  lexicon: BDAG
  rationale: «Hijos» conserva la forma léxica υἱοῖς y el eco escritural del contexto deuteronómico. En español es más natural que «hijos de Israel» que una solución más interpretativa como «israelitas».
- source_word: Προφήτην
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el Profeta
  lexicon: BDAG
  rationale: El acusativo anartro del dicho citado favorece «un profeta». Se mantiene la tensión documental con la lectura mesiánica sin imponerla en el texto principal.
- source_word: ἀναστήσει
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - hará surgir
  - suscitará
  lexicon: BDAG
  rationale: «Levantar» preserva el sentido verbal usual de ἀνίστημι en este contexto profético, con español claro y bíblico.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Como sujeto del verbo en la cita, «Dios» es la forma normal y transparente en español; no se requiere el artículo.
- source_word: ἐκ τῶν ἀδελφῶν ὑμῶν
  english_pob_choice: from among your brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre vuestros hermanos
  - de entre sus hermanos israelitas
  lexicon: BDAG
  rationale: La preposición ἐκ con genitivo indica origen dentro del grupo. «De entre» expresa bien ese matiz, y «sus» se ajusta al discurso dirigido a Israel como colectividad.
- source_word: ὡς ἐμέ
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - semejante a mí
  - igual que yo
  lexicon: BDAG
  rationale: La comparación final es directa; «como yo» es la traducción más breve y fiel.
theological_decisions:
- issue: La referencia mesiánica de Deuteronomio 18:15 dentro de Hechos
  english_pob_reading: Render the statement straightforwardly as Moses' prophecy of 'a prophet' without capitalizing or explicitly interpreting it as 'the Prophet' in the main text.
  chosen_spanish_reading: Traducir de manera llana «un profeta» sin capitalizar ni convertirlo en «el Profeta» dentro del texto principal.
  alternative_spanish_readings:
  - el Profeta
  - un Profeta
  rationale: 'El griego cita un sustantivo anartro, y la POB inglesa preserva la ambigüedad sin resolverla. El español mantiene esa misma tensión: el lector puede reconocer la alusión mesiánica por el contexto de Hechos y de Deuteronomio, pero el texto no la impone.'
  doctrine_reference: Preservar la tensión exegética y cristológica sin sobreinterpretar el enunciado citado.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente SBLGNT y con la revisión inglesa más reciente, que no introdujo cambios respecto del borrador auditado. La versión española sigue la misma decisión principal: mantener «un profeta» sin capitalización interpretativa, y conservar el valor formal de υἱοῖς y ἀδελφῶν con notas breves.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Jesús» no aparece en el versículo, por lo que no se introduce terminología cristológica no presente en el griego.
  - «Hijos de Israel» conserva el eco bíblico y la precisión formal del original.
  - La decisión «el Moisés» refleja el artículo griego y la fuerza identificadora del sintagma.
  - La puntuación reproduce el quiebre de la cita y usa comillas españolas de apertura y cierre.
