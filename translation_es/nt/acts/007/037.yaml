  text: οὗτός ἐστιν ὁ Μωϋσῆς ὁ ⸀εἴπας τοῖς υἱοῖς Ἰσραήλ· Προφήτην ὑμῖν ἀναστήσει ⸂ὁ θεὸς⸃ ἐκ τῶν ἀδελφῶν ὑμῶν ὡς ἐμέ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/037.yaml
  text: This is the Moses who said to the sons of Israel[a], ‘God will raise up for you a prophet from among your brothers[c][b], like me.’
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the Prophet,' reflecting the well-known expectation from Deuteronomy 18:15 and its application to Jesus in Acts.
    reason: alternative_reading
  - marker: b
    text: '''Sons of Israel'' could also be rendered ''children of Israel'' or ''Israelites''; the Greek is specifically ''sons.'''
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' here refers to fellow Israelites; the Greek is masculine plural.'
    reason: cultural_note
