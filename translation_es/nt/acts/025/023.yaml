  text: Τῇ οὖν ἐπαύριον ἐλθόντος τοῦ Ἀγρίππα καὶ τῆς Βερνίκης μετὰ πολλῆς φαντασίας καὶ εἰσελθόντων εἰς τὸ ἀκροατήριον σύν ⸀τε χιλιάρχοις καὶ ἀνδράσιν τοῖς κατ’ ⸀ἐξοχὴν τῆς πόλεως καὶ κελεύσαντος τοῦ Φήστου ἤχθη ὁ Παῦλος.
base_translation:
  language: en
  yaml_path: translation/nt/acts/025/023.yaml
  text: So on the next day[a], Agrippa and Bernice came with great pomp and entered the audience hall with the military tribunes and the prominent men of the city[b], and at Festus's command Paul was brought in.
  footnotes:
