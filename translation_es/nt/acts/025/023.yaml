translation:
  language: es
  text: Así, al día siguiente, Agripa y Berenice llegaron con gran pompa[a] y entraron en la sala de audiencias, con los tribunos militares y los hombres principales de la ciudad[b]; y, por orden de Festo, hicieron entrar a Pablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mucho aparato» o «con gran despliegue» para «con gran pompa».
    reason: lexical_alternative
  - marker: b
    text: O «los hombres notables de la ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ οὖν ἐπαύριον
  english_pob_choice: So on the next day
  chosen_spanish: Así, al día siguiente
  alternatives_spanish:
  - Entonces, al día siguiente
  - Por tanto, al día siguiente
  lexicon: BDAG
  rationale: La expresión temporal se vierte de forma natural con «al día siguiente». «Así» conserva la conexión narrativa de οὖν sin sobrecargar el tono.
- source_word: ἐλθόντος
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - acudieron
  lexicon: BDAG
  rationale: El participio aoristo de llegada se expresa mejor con un verbo finito en español. «Llegaron» mantiene el movimiento hacia el lugar de la audiencia.
- source_word: Ἀγρίππα ... Βερνίκης
  english_pob_choice: Agrippa and Bernice
  chosen_spanish: Agripa y Berenice
  alternatives_spanish:
  - Agripa y Bernice
  lexicon: Transliteración estándar
  rationale: Se conservan los nombres propios con grafía española usual. «Agripa» es la forma más natural en español bíblico; «Berenice» mantiene la transliteración habitual.
- source_word: μετὰ πολλῆς φαντασίας
  english_pob_choice: with great pomp
  chosen_spanish: con gran pompa
  alternatives_spanish:
  - con gran despliegue
  - con mucha pompa
  lexicon: BDAG
  rationale: «φαντασία» aquí denota ostentación o ceremonia pública. «Pompa» es un equivalente español preciso, digno y comprensible; se conserva la ambigüedad de ostentación ceremonial frente a simple lujo mediante la nota alternativa.
- source_word: εἰσελθόντων εἰς τὸ ἀκροατήριον
  english_pob_choice: entered the audience hall
  chosen_spanish: entraron en la sala de audiencias
  alternatives_spanish:
  - entraron en el auditorio
  - entraron en la sala de juicio
  lexicon: BDAG
  rationale: «ἀκροατήριον» designa un lugar de audiencia o hearing chamber. «Sala de audiencias» es claro en español y preserva el contexto oficial/judicial.
- source_word: σύν τε χιλιάρχοις
  english_pob_choice: with the military tribunes
  chosen_spanish: con los tribunos militares
  alternatives_spanish:
  - con los tribunos
  - con los comandantes militares
  lexicon: BDAG
  rationale: «χιλίαρχοι» se refiere a oficiales romanos de alto rango; «tribunos militares» es el equivalente técnico más preciso en español. No se fuerza un equivalente para τε aparte de la simple coordinación.
- source_word: ἀνδράσιν τοῖς κατ’ ἐξοχὴν τῆς πόλεως
  english_pob_choice: the prominent men of the city
  chosen_spanish: los hombres prominentes de la ciudad
  alternatives_spanish:
  - los hombres principales de la ciudad
  - los hombres de alto rango de la ciudad
  lexicon: BDAG
  rationale: La frase indica hombres distinguidos o notables de la ciudad. «Prominentes» conserva la idea de distinción social sin imponer una lectura demasiado formalizada.
- source_word: κελεύσαντος τοῦ Φήστου
  english_pob_choice: at Festus's command
  chosen_spanish: a la orden de Festo
  alternatives_spanish:
  - por orden de Festo
  - cuando Festo dio la orden
  lexicon: BDAG
  rationale: El genitivo absoluto expresa la acción que acompaña el traslado. «A la orden de Festo» reproduce con naturalidad la autoridad oficial implicada por κελεύω.
- source_word: ἤχθη ὁ Παῦλος
  english_pob_choice: Paul was brought in
  chosen_spanish: fue traído Pablo
  alternatives_spanish:
  - trajeron a Pablo
  - Pablo fue conducido
  lexicon: BDAG
  rationale: El pasivo de ἄγω indica que Pablo fue conducido/introducido al lugar de audiencia. Se mantiene el pasivo y el orden enfático del griego al final de la cláusula.
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada del audit trail inglés, sin añadir «ambos» antes de «los tribunos militares», ya que σύν τε no exige una marcación explícita en español. Se preservó el tono narrativo sobrio del pasaje y la secuencia de acciones en una sola oración larga, como en el griego.
  spanish_consistency_notes:
  - Se usó «Agripa» como forma española común del nombre propio, en paralelo con la transliteración inglesa Agrippa.
  - Se evitó «SEÑOR» para el nombre divino, pero este versículo no lo contiene.
  - Se mantuvo «tribunos militares» como término técnico coherente con la tradición de la POB y con el contexto romano.
  - Se eligió «sala de audiencias» por ser más natural que un calco literal, sin perder el matiz judicial.
  - La cláusula final conserva la pasiva para reflejar que Pablo es el sujeto paciente del traslado.
