    rationale: Aunque comunica autoridad, el español natural para κελεύσαντος τοῦ Φήστου en este contexto es «por orden de Festo» o similar.
  - severity: medium
    issue: «fue traído Pablo» suena forzado y calcado
    rationale: Preserva el pasivo griego de forma demasiado rígida. En español natural y digno, el contexto judicial pide «hicieron entrar a Pablo» o, si se desea conservar pasiva, «Pablo fue hecho entrar», aunque esta última sigue siendo menos natural.
  - severity: low
