translation:
  language: es
  text: Pero cuando Pablo apeló para que se le mantuviera bajo custodia para la decisión del Emperador[a], ordené que se le mantuviera bajo custodia hasta que lo envíe a César.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la decisión del Emperador». El griego tiene «el Augusto» (Σεβαστός), el título imperial equivalente a «Augusto».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσαμένου
  english_pob_choice: appealed
  chosen_spanish: apeló
  alternatives_spanish:
  - interpuso una apelación
  - recurrio
  lexicon: BDAG
  rationale: En el contexto judicial romano, el participio medio indica una apelación formal. «Apeló» es la forma natural y precisa en español jurídico y conserva el valor procesal del verbo sin añadir interpretación.
- source_word: τηρηθῆναι / τηρεῖσθαι
  english_pob_choice: be kept in custody / be kept in custody
  chosen_spanish: se le mantuviera bajo custodia / se le mantuviera bajo custodia
  alternatives_spanish:
  - se le mantuviera
  - se le guardara
  - se le retuviera
  lexicon: BDAG
  rationale: Aquí τηρέω tiene sentido de detención oficial, no solo de protección o vigilancia. «Bajo custodia» explicita el matiz legal y mantiene la repetición del texto griego y de la POB inglesa.
- source_word: διάγνωσιν
  english_pob_choice: decision
  chosen_spanish: decisión
  alternatives_spanish:
  - juicio
  - resolución
  - audiencia
  lexicon: BDAG
  rationale: El sustantivo se refiere a una determinación judicial. «Decisión» es amplio y natural en español, y no fuerza un sentido más técnico o más condenatorio de lo que el griego exige.
- source_word: Σεβαστοῦ
  english_pob_choice: the Emperor
  chosen_spanish: el Emperador
  alternatives_spanish:
  - el Augusto
  - el Augusto César
  lexicon: BDAG
  rationale: Σεβαστός es el título imperial equivalente a «Augustus», pero en este contexto la POB revisada prefirió «the Emperor» por naturalidad y precisión. En español, «el Emperador» comunica el mismo referente sin calco extraño, mientras que «el Augusto» podría sonar artificial o ambiguo.
- source_word: ἀναπέμψω
  english_pob_choice: I send
  chosen_spanish: yo lo envíe
  alternatives_spanish:
  - lo remita
  - lo despache
  - lo envíe
  lexicon: BDAG
  rationale: En contexto, Festo habla de trasladar a Pablo a la autoridad superior. «Lo envíe» preserva la sencillez del verbo griego, y el subjuntivo tras «hasta que» corresponde al futuro de la acción en español.
- source_word: πρὸς Καίσαρα
  english_pob_choice: to Caesar
  chosen_spanish: a César
  alternatives_spanish:
  - ante César
  - para César
  lexicon: BDAG
  rationale: «César» funciona aquí como título/nombre imperial histórico. «A César» conserva la fórmula tradicional y el movimiento hacia la autoridad romana superior.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada de la POB inglesa, que abandonó «the August One» por «the Emperor» para Σεβαστός. Se mantuvo la estructura judicial del enunciado, la repetición de «bajo custodia» y el destino final «a César».
  spanish_consistency_notes:
  - Se mantuvo «César» como título imperial, no como nombre propio moderno, por fidelidad histórica y consistencia con Acts.
  - Se usó «custodia» para conservar el sentido legal de τηρέω en ambos infinitivos y evitar un término más vago como «guardado».
  - Se eligió «el Emperador» en el texto principal, mientras la nota preserva la alternativa literal asociada a Σεβαστός.
  - La puntuación reproduce una sola oración larga, adecuada al tono narrativo-jurídico del pasaje.
