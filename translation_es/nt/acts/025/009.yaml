translation:
  language: es
  text: 'Pero Festo, queriendo hacerles un favor[a] a los judíos[b], respondió[c] a Pablo y dijo: «¿Quieres subir a Jerusalén y allí ser juzgado[d] ante mí[e] acerca de estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «concederles un favor»; la expresión alude a la intención de Festo de acomodar a los acusadores judíos de Pablo.
    reason: lexical_alternative
  - marker: b
    text: Aquí «los judíos» se refiere por contexto a los acusadores o dirigentes judíos que impulsaban el caso, no a todo el pueblo judío sin distinción.
    reason: cultural_note
  - marker: c
    text: O «contestando»; fórmula narrativa de introducción al discurso.
    reason: lexical_alternative
  - marker: d
    text: O «ser sometido a juicio» o «tener tu caso oído»; el verbo griego puede expresar el proceso judicial como tal.
    reason: lexical_alternative
  - marker: e
    text: O «delante de mí»; en este contexto legal indica la comparecencia ante la autoridad del magistrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo hacer
  lexicon: BDAG
  rationale: El participio presenta la motivación en curso de Festo. «Queriendo» conserva ese matiz participial con naturalidad en español sin añadir una intención más fuerte de la que exige el griego.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los líderes judíos
  - a los judeanos
  lexicon: BDAG
  rationale: La fuente griega dice literalmente «los judíos». Mantener el término preserva la forma original; la restricción contextual a los acusadores se deja para nota, no para el texto principal.
- source_word: χάριν καταθέσθαι
  english_pob_choice: to do ... a favor
  chosen_spanish: hacerles un favor
  alternatives_spanish:
  - concederles un favor
  - ganarse el favor de
  lexicon: BDAG
  rationale: La expresión idiomática griega indica otorgar un favor o ganar buena voluntad. «Hacerles un favor» suena natural en español y conserva la amplitud de la expresión sin cargarla con un matiz manipulador no explícito.
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dijo
  lexicon: BDAG
  rationale: Es la fórmula narrativa de introducción al discurso. «Respondió» reproduce bien la transición al habla en español bíblico contemporáneo.
- source_word: Θέλεις
  english_pob_choice: Do you want
  chosen_spanish: ¿Quieres
  alternatives_spanish:
  - ¿Estás dispuesto a
  - ¿Deseas
  lexicon: BDAG
  rationale: La pregunta apunta a la voluntad/disposición de Pablo. «¿Quieres» es directo y claro, sin forzar el sentido a mera autorización.
- source_word: εἰς Ἱεροσόλυμα ἀναβὰς
  english_pob_choice: to go up to Jerusalem
  chosen_spanish: subir a Jerusalén
  alternatives_spanish:
  - ir a Jerusalén
  - viajar a Jerusalén
  lexicon: BDAG
  rationale: ἀναβαίνω con Jerusalén conserva la imagen tradicional de ascenso geográfico. «Subir a Jerusalén» retiene ese matiz sin sonar artificial.
- source_word: περὶ τούτων
  english_pob_choice: concerning these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estos asuntos
  - respecto de estos cargos
  lexicon: BDAG
  rationale: La referencia es amplia y no obliga a especificar «cargos». «Acerca de estas cosas» refleja bien la amplitud del demostrativo.
- source_word: κριθῆναι
  english_pob_choice: be judged
  chosen_spanish: ser juzgado
  alternatives_spanish:
  - ser juzgado en juicio
  - ser juzgado/tratado
  lexicon: BDAG
  rationale: En contexto judicial, el infinitivo pasivo de κρίνω puede ser «ser juzgado» o «ser sometido a juicio». «Ser juzgado» mantiene cercanía al griego y es inteligible en español.
- source_word: ἐπ’ ἐμοῦ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - bajo mi autoridad
  lexicon: BDAG
  rationale: La preposición en este marco legal señala la presencia/autoridad del magistrado. «Delante de mí» es idiomático en español y conserva el escenario procesal sin precisar más de lo que dice el griego.
theological_decisions:
- issue: Posible sobrelectura anti-judía de «los judíos»
  english_pob_reading: Retain 'the Jews' in the main text while understanding contextually that this refers to the Jewish accusers or leaders pressing the case.
  chosen_spanish_reading: Mantener «a los judíos» en el texto principal, entendiendo por contexto que se trata de los acusadores judíos en la escena narrativa.
  alternative_spanish_readings:
  - a los líderes judíos
  - a los acusadores judíos
  rationale: La decisión sigue la primacía del término griego y evita sustituirlo por una restricción interpretativa dentro del texto. La precisión contextual se explica en nota para evitar una lectura indebida.
  doctrine_reference: 'Translation philosophy #1; #5'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y sin revisiones sustanciales aplicadas; se mantuvo la lectura principal de la edición SBLGNT y las decisiones léxicas auditadas del POB en inglés. La única tensión relevante es la amplitud de «los judíos», resuelta en nota contextual sin alterar el texto principal.
  spanish_consistency_notes:
  - Se usa «Jerusalén» con el verbo direccional «subir» para conservar la idiomática bíblica del ascenso a la ciudad.
  - Se mantiene «juzgado» en voz pasiva para reproducir el valor judicial de κριθῆναι.
  - No se sustituye «judíos» por «líderes judíos» en el texto principal para no introducir una restricción no explícita en el griego.
