base_translation:
  language: en
  yaml_path: translation/nt/acts/025/009.yaml
  text: But Festus[a], wanting to do the Jews a favor, answered Paul and said[c][b], “Do you want to go up to Jerusalem and there be judged before me concerning these things?”
  footnotes:
  - marker: a
    text: Or “grant the Jews a favor”; the expression refers to Festus seeking to accommodate Paul's Jewish accusers.
    reason: lexical_alternative
  - marker: b
    text: “The Jews” here refers contextually to the Jewish accusers or leaders pressing the case, not to every Jewish person without distinction.
    reason: cultural_note
  - marker: c
    text: Or “be tried before me” or “have your case heard before me.”
    reason: lexical_alternative
