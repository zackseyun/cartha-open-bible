translation:
  language: es
  text: Entonces Festo[a], después de llegar a la provincia, subió desde Cesarea a Jerusalén después de tres días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber entrado en la provincia» o «después de tomar posesión de la provincia». El participio griego puede indicar la llegada de Festo a su provincia y, por implicación, el comienzo de su administración allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φῆστος
  english_pob_choice: Festus
  chosen_spanish: Festus
  alternatives_spanish:
  - Festo
  lexicon: propio
  rationale: Se conserva la transliteración habitual del nombre propio. "Festus" es reconocible en español bíblico y mantiene continuidad con la forma inglesa auditada.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - Pues
  lexicon: BDAG
  rationale: El conector marca progresión narrativa. "Entonces" funciona con naturalidad en español y no fuerza una inferencia lógica más fuerte que la del contexto.
- source_word: ἐπιβὰς τῇ ἐπαρχείᾳ
  english_pob_choice: after arriving in the province
  chosen_spanish: después de haber llegado a la provincia
  alternatives_spanish:
  - habiendo entrado en la provincia
  - después de tomar posesión de la provincia
  - al llegar a la provincia
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior al verbo principal. "Llegado a la provincia" refleja el ingreso/arribo sin decidir de manera explícita si implica formalmente asumir el cargo, tensión que el audit trail inglés también preserva mediante una nota alternativa.
- source_word: ἐπαρχείᾳ
  english_pob_choice: province
  chosen_spanish: provincia
  alternatives_spanish:
  - jurisdicción
  - gobierno provincial
  lexicon: BDAG
  rationale: El término designa la división administrativa romana. "Provincia" es la equivalencia directa y clara en español.
- source_word: μετὰ τρεῖς ἡμέρας
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - tres días después
  - al cabo de tres días
  lexicon: BDAG
  rationale: La preposición μετά con acusativo es temporal. "Después de tres días" conserva el valor sucesivo de la expresión y es idiomático.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue subiendo
  - ascendió
  lexicon: BDAG
  rationale: Se mantiene el idioma geográfico bíblico de subir a Jerusalén. "Subió" reproduce de forma natural el valor convencional de ἀναβαίνω.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: La meta del movimiento se expresa de manera directa y natural en español con "a Jerusalén".
- source_word: ἀπὸ Καισαρείας
  english_pob_choice: from Caesarea
  chosen_spanish: desde Cesarea
  alternatives_spanish:
  - de Cesarea
  lexicon: BDAG
  rationale: ἀπό indica procedencia; "desde Cesarea" preserva con claridad el punto de origen y combina bien con el orden del movimiento en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el orden y las relaciones del texto griego SBLGNT, teniendo en cuenta la revisión auditada del inglés que reordenó la frase de origen y destino para reflejar mejor el movimiento «desde Cesarea a Jerusalén». En español se mantuvo ese orden natural con «desde Cesarea a Jerusalén», y se preservó la ambigüedad documentada del participio ἐπιβὰς mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «provincia» para ἐπαρχεία, coherente con el valor administrativo romano documentado.
  - Se conserva «subió» para ἀνέβη, manteniendo el idiomático bíblico de Jerusalén como destino ascendente.
  - No se introduce una equivalencia de autoridad explícita en el texto principal; esa posible lectura queda solo en la nota.
  - La puntuación y el orden en español priorizan claridad sin perder la relación temporal del participio y de «después de tres días».
