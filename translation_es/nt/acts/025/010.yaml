  text: εἶπεν δὲ ὁ Παῦλος· ⸂Ἐπὶ τοῦ βήματος Καίσαρος ἑστώς⸃ εἰμι, οὗ με δεῖ κρίνεσθαι. Ἰουδαίους οὐδὲν ⸀ἠδίκησα, ὡς καὶ σὺ κάλλιον ἐπιγινώσκεις.
base_translation:
  language: en
  yaml_path: translation/nt/acts/025/010.yaml
  text: But Paul said[a], “I am standing before Caesar’s tribunal, where I ought to be judged. I have done no wrong to the Jews[c][b], as you yourself know very well.”
  footnotes:
  - marker: a
    text: Or “judgment seat.” The Greek βῆμα refers to the official judicial seat or tribunal.
    reason: lexical_alternative
  - marker: b
    text: Or “I stand before Caesar’s tribunal.” The Greek uses a periphrastic expression that emphasizes Paul’s present legal standing there.
    reason: lexical_alternative
  - marker: c
    text: Or “I have committed no offense against the Jews.”
    reason: lexical_alternative
