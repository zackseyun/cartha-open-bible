translation:
  language: es
  text: 'Pero Pablo dijo: «Estoy de pie ante el tribunal de César[a], donde debo ser juzgado. No he hecho ningún mal contra los judíos[b], como tú mismo lo sabes muy bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estrado judicial». El griego βῆμα se refiere al asiento o sede judicial oficial, y por extensión al tribunal.
    reason: lexical_alternative
  - marker: b
    text: O «no he cometido ninguna ofensa contra los judíos». El verbo griego puede significar hacer mal, cometer una injusticia o agraviar.
    reason: lexical_alternative
lexical_decisions:
- source_word: βῆμα
  english_pob_choice: tribunal
  chosen_spanish: tribunal
  alternatives_spanish:
  - asiento de juicio
  - estrado de juicio
  - juzgado
  lexicon: BDAG
  rationale: βῆμα designa aquí el asiento o sede judicial de la autoridad romana, no solo una tarima física. «Tribunal» comunica de manera natural el marco legal y mantiene la referencia institucional de César.
- source_word: Καίσαρος
  english_pob_choice: Caesar’s
  chosen_spanish: de César
  alternatives_spanish:
  - del emperador
  - del César
  lexicon: BDAG
  rationale: Καῖσαρ funciona como título imperial. «De César» conserva el nombre/título romano del texto y evita sustituirlo por una generalización que borre el trasfondo histórico.
- source_word: ἑστώς εἰμι
  english_pob_choice: I am standing
  chosen_spanish: estoy
  alternatives_spanish:
  - estoy de pie
  - estoy presentado
  - permanezco
  lexicon: BDAG
  rationale: La construcción perifrástica expresa la posición actual de Pablo ante el tribunal. En español, «estoy ante el tribunal» preserva el sentido sin sonar forzado; «de pie» es posible pero menos natural aquí.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - ante el cual
  - en el que
  lexicon: BDAG
  rationale: El relativo remite al tribunal como lugar propio del juicio. «Donde» es idiomático en español y conserva el valor locativo sin perder precisión jurídica.
- source_word: δεῖ
  english_pob_choice: ought to
  chosen_spanish: debo
  alternatives_spanish:
  - me conviene
  - es necesario que yo
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. «Debo» transmite bien la obligación procesal y suena más natural en español que una perífrasis más pesada.
- source_word: κρίνεσθαι
  english_pob_choice: to be judged
  chosen_spanish: ser juzgado
  alternatives_spanish:
  - ser llevado a juicio
  - ser examinado
  lexicon: BDAG
  rationale: En contexto legal pasivo, κρίνω significa ser juzgado o sometido a juicio. «Ser juzgado» es la traducción más directa y fiel.
- source_word: Ἰουδαίους
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - al pueblo judío
  - a los judeanos
  lexicon: BDAG
  rationale: En este contexto Pablo se refiere de manera amplia a los judíos como el grupo contra el que supuestamente habría obrado. «A los judíos» es la forma más directa y mantiene el referente colectivo.
- source_word: οὐδὲν ἠδίκησα
  english_pob_choice: I have done no wrong
  chosen_spanish: no les he hecho ningún daño
  alternatives_spanish:
  - no he hecho nada injusto
  - no los he perjudicado en nada
  - no he cometido ningún agravio
  lexicon: BDAG
  rationale: ἀδικέω abarca la idea de hacer mal, cometer injusticia o agraviar. «No les he hecho ningún daño» comunica bien el sentido moral-legal en español; se conserva la posibilidad de leerlo como agravio/injusticia sin imponer una formulación demasiado abstracta.
- source_word: ὡς καὶ σὺ κάλλιον ἐπιγινώσκεις
  english_pob_choice: as you yourself know very well
  chosen_spanish: como tú mismo lo sabes muy bien
  alternatives_spanish:
  - como tú mismo lo conoces mejor
  - como incluso tú lo sabes mejor
  lexicon: BDAG
  rationale: ἐπιγινώσκω intensifica el conocimiento y κάλλιον añade la idea de «mejor/ muy bien». «Tú mismo» refleja el énfasis de καὶ σὺ, y «muy bien» reproduce de forma natural la fuerza del comparativo.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no fue necesario introducir cambios respecto del acuerdo alto entre revisores. La redacción española mantiene el sentido legal y la fuerza retórica del original sin añadir matices no sustentados por el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «tribunal» como equivalente principal de βῆμα, coherente con el audit trail inglés y con el marco jurídico del pasaje.
  - Se prefirió «ser juzgado» para κρίνεσθαι por su transparencia legal en español.
  - Se conservó la referencia directa a «los judíos» por ser el referente explícito del griego y del análisis contextual.
  - Se usó puntuación de diálogo española con comillas angulares para claridad editorial.
