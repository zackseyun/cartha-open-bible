review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del versículo: Pablo habla ante la autoridad romana, afirma la jurisdicción apropiada y niega haber obrado mal contra los judíos. Sin embargo, «Estoy ante el tribunal de César» atenúa la perífrasis ἑστώς εἰμι («estoy de pie / estoy compareciendo»), y «no les he hecho ningún daño» reduce ἀδικέω a daño personal, cuando el griego y la auditoría inglesa conservan mejor la fuerza moral-jurídica de «hacer mal / cometer injusticia / ofender».'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. No obstante, «no les he hecho ningún daño» suena algo estrecho para contexto judicial; «no he hecho ningún mal contra los judíos» o «no he cometido ninguna injusticia contra los judíos» se ajusta mejor al sentido legal. También conviene armonizar la nota sobre βῆμα con una alternativa más idiomática en español que «asiento de juicio».
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «César» y «tribunal» están bien. La principal corrección léxica es ἀδικέω: el proyecto inglés eligió «I have done no wrong», por lo que en español conviene «no he hecho ningún mal» o equivalente, no solo «daño».'
  issues:
  - severity: medium
    issue: «Estoy ante el tribunal de César» debilita la fuerza de ἑστώς εἰμι.
    rationale: La construcción perifrástica subraya la posición/comparecencia presente de Pablo ante el tribunal. «Estoy de pie ante el tribunal de César» preserva mejor esa vividez y sigue siendo natural en español.
  - severity: high
    issue: «No les he hecho ningún daño» no representa con suficiente precisión οὐδὲν ἠδίκησα.
    rationale: ἀδικέω en este contexto forense significa hacer mal, obrar injustamente, cometer ofensa. «Daño» puede sonar solo a perjuicio material o personal y pierde la fuerza moral-legal atestiguada por la auditoría inglesa.
  - severity: low
    issue: La nota «asiento de juicio» para βῆμα suena poco idiomática.
    rationale: Aunque literalmente posible, en español eclesial y jurídico moderno es más claro «sede judicial» o «tribunal», con «estrado judicial» como alternativa si se quiere conservar el matiz físico.
  revised_spanish_text: 'Pero Pablo dijo: «Estoy de pie ante el tribunal de César[a], donde debo ser juzgado. No he hecho ningún mal contra los judíos[b], como tú mismo lo sabes muy bien».'
  revised_footnotes:
  - marker: a
    text: O «estrado judicial». El griego βῆμα se refiere al asiento o sede judicial oficial, y por extensión al tribunal.
    reason: lexical_alternative
  - marker: b
    text: O «no he cometido ninguna ofensa contra los judíos». El verbo griego puede significar hacer mal, cometer una injusticia o agraviar.
    reason: lexical_alternative
  revision_rationale: Se revisa para representar mejor la perífrasis griega ἑστώς εἰμι con «estoy de pie» y para corregir οὐδὲν ἠδίκησα a una formulación con fuerza moral-jurídica («no he hecho ningún mal») en vez de la más estrecha «no les he hecho ningún daño». También se mejora la nota de βῆμα para un español más idiomático.
