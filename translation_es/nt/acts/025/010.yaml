- from: 'Pero Pablo dijo: «Estoy ante el tribunal de César[a], donde debo ser juzgado. A los judíos no les he hecho ningún daño[b], como tú mismo lo sabes muy bien».'
  to: 'Pero Pablo dijo: «Estoy de pie ante el tribunal de César[a], donde debo ser juzgado. No he hecho ningún mal contra los judíos[b], como tú mismo lo sabes muy bien».'
  rationale: Se revisa para representar mejor la perífrasis griega ἑστώς εἰμι con «estoy de pie» y para corregir οὐδὲν ἠδίκησα a una formulación con fuerza moral-jurídica («no he hecho ningún mal») en vez de la más estrecha «no les he hecho ningún daño». También se mejora la nota de βῆμα para un español más idiomático.
