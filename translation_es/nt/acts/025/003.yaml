translation:
  language: es
  text: pidiendo un favor contra él[a], que lo mandara traer a Jerusalén, preparando una emboscada para matarlo en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que lo mandara llamar a Jerusalén». El verbo griego puede significar «mandar traer» o «mandar llamar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτούμενοι
  english_pob_choice: asking
  chosen_spanish: pidiendo
  alternatives_spanish:
  - solicitando
  - rogando
  lexicon: BDAG
  rationale: El participio presente comunica una acción concurrente con la petición del verso anterior. «Pidiendo» conserva ese valor aspectual y suena natural en español.
- source_word: χάριν
  english_pob_choice: a favor
  chosen_spanish: un favor
  alternatives_spanish:
  - favor
  - una concesión
  lexicon: BDAG
  rationale: La expresión idiomática αἰτεῖν χάριν requiere en español una formulación equivalente de petición beneficiosa. «Un favor» mantiene el sentido sin endurecer innecesariamente el giro.
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - acerca de él
  - en su contra
  lexicon: BDAG
  rationale: El contexto es hostil, no meramente informativo. «Contra él» reproduce la fuerza adversativa del griego de manera directa.
- source_word: ὅπως
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Después de «pidiendo un favor», «que» introduce con naturalidad el contenido solicitado. Mantiene la relación de finalidad sin recargar la sintaxis.
- source_word: μεταπέμψηται
  english_pob_choice: he might have him brought
  chosen_spanish: lo mandara traer
  alternatives_spanish:
  - lo hiciera traer
  - lo mandara llamar
  lexicon: BDAG
  rationale: El medio/causativo del verbo puede significar «mandar traer» o «mandar llamar». Aquí el contexto de traslado a Jerusalén hace más precisa la idea de hacerlo venir, no solo convocarlo.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  lexicon: BDAG
  rationale: La preposición de dirección se expresa naturalmente con «a» en español. No se añade matiz extra que no esté en el texto.
- source_word: ἐνέδραν ποιοῦντες
  english_pob_choice: setting an ambush
  chosen_spanish: tendiéndole una emboscada
  alternatives_spanish:
  - preparando una emboscada
  - formando una emboscada
  lexicon: BDAG
  rationale: El participio expresa acción concomitante y el sustantivo denota una trampa hostil. «Tendiéndole una emboscada» conserva la vivacidad de la escena y hace explícito el objeto indirecto implícito por el contexto.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para asesinarlo
  - para darle muerte
  lexicon: BDAG
  rationale: En este contexto ἀναιρέω significa quitar la vida. «Matarlo» es directo y fiel sin introducir una carga legal o estilística mayor de la que el griego exige.
- source_word: κατὰ τὴν ὁδόν
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - durante el trayecto
  lexicon: BDAG
  rationale: La expresión idiomática describe el lugar/curso de la emboscada. «En el camino» es idiomático en español y conserva la sencillez del original.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el auditorial inglés: mantiene el valor participial de αἰτούμενοι y ἐνέδραν ποιοῦντες, y refleja la revisión inglesa que prefirió una construcción con subjuntivo natural para ὅπως + verbo. La ambigüedad léxica de μεταπέμψηται se conserva en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece.
  - Se mantiene «emboscada» como término fuerte y transparente para ἐνέδρα.
  - «Matarlo» conserva la fuerza directa del verbo sin sustituirlo por una paráfrasis.
