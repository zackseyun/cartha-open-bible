translation:
  language: es
  text: Después de pasar entre ellos no más de ocho o diez días, bajó a Cesarea, y al día siguiente, después de tomar asiento en el tribunal[a], ordenó que llevaran a Pablo ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de sentarse en el asiento judicial». El griego βῆμα se refiere al asiento oficial de juicio o al tribunal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διατρίψας
  english_pob_choice: After spending
  chosen_spanish: Después de pasar
  alternatives_spanish:
  - Después de permanecer
  - Después de estar
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa; en español, «pasar» con valor temporal expresa bien la estancia sin volver la frase rígida o antinatural.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - con ellos
  - en medio de ellos
  lexicon: BDAG
  rationale: «Entre ellos» conserva la idea de presencia en su compañía o ámbito, con una naturalidad mayor en español que un calco más literal.
- source_word: ἡμέρας οὐ πλείους ὀκτὼ ἢ δέκα
  english_pob_choice: no more than eight or ten days
  chosen_spanish: no más de ocho o diez días
  alternatives_spanish:
  - no más de ocho o diez días
  - a lo sumo ocho o diez días
  lexicon: BDAG
  rationale: La expresión griega marca un límite aproximado, no un conteo exacto; «no más de» preserva el matiz de límite y la oscilación «ocho o diez» mantiene la aproximación.
- source_word: καταβὰς
  english_pob_choice: he went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - se fue hacia abajo
  lexicon: BDAG
  rationale: Para el traslado de Jerusalén a Cesarea, «bajó» reproduce el idiomatismo direccional del griego de forma natural en español.
- source_word: Καισάρειαν
  english_pob_choice: Caesarea
  chosen_spanish: Cesarea
  alternatives_spanish:
  - Césarea
  lexicon: nombre propio
  rationale: Se usa la forma castellana habitual del topónimo, sin alterar el referente geográfico.
- source_word: τῇ ἐπαύριον
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: BDAG
  rationale: Es un modismo temporal equivalente, claro y natural en español para indicar el día posterior a la llegada.
- source_word: καθίσας ἐπὶ τοῦ βήματος
  english_pob_choice: after taking his seat on the tribunal
  chosen_spanish: después de tomar asiento en el tribunal[a]
  alternatives_spanish:
  - después de sentarse en el tribunal[a]
  - después de tomar asiento en el estrado judicial[a]
  lexicon: BDAG
  rationale: «Tribunal» comunica bien el contexto judicial y, con la nota, mantiene abierta la alternativa literal relacionada con βῆμα. «Tomar asiento» refleja el participio de modo natural en español.
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio órdenes de
  lexicon: BDAG
  rationale: «Mandó» es una forma formal y natural en español para una orden de autoridad judicial, sin perder el tono oficial del verbo griego.
- source_word: ἀχθῆναι
  english_pob_choice: to be brought in
  chosen_spanish: que trajeran a Pablo
  alternatives_spanish:
  - que llevaran a Pablo
  - que fuera traído Pablo
  lexicon: BDAG
  rationale: En una escena de audiencia, el pasivo griego se expresa con naturalidad en español mediante una subordinada activa impersonal; «trajeran» conserva la idea de hacer comparecer a Pablo ante el tribunal.
theological_decisions:
- issue: βῆμα como asiento judicial o tribunal
  english_pob_reading: The Greek βῆμα refers to the official judicial seat or tribunal.
  chosen_spanish_reading: tribunal
  alternative_spanish_readings:
  - asiento judicial
  - estrado judicial
  - silla del tribunal
  rationale: El término apunta al acto y lugar de juzgar; «tribunal» es comprensible y formal en español. La nota preserva la tensión entre el objeto físico del asiento y la institución judicial.
  doctrine_reference: Lexical/forensic context, no doctrinal issue
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. Se conservó la aproximación temporal «ocho o diez días», el movimiento direccional «bajó», y la ambigüedad de βῆμα mediante una nota que permite la lectura alternativa sin perder la fluidez de «tribunal» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Cesarea» como forma castellana estándar del topónimo.
  - Se evita el calco «juzgado» o «silla del juicio» porque no reflejan con precisión el matiz institucional de βῆμα.
  - La construcción final usa «que trajeran a Pablo» para naturalidad narrativa en español, sin añadir contenido no presente en el griego.
