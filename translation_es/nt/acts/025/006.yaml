  - severity: low
    issue: «mandó» es aceptable, pero «ordenó» encaja mejor con el tono oficial del contexto.
    rationale: ἐκέλευσεν denota una orden de autoridad. «Mandó» no es incorrecto, pero «ordenó» suena más propio de un procedimiento judicial formal en español neutral.
