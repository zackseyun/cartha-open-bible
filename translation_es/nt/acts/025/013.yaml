translation:
  language: es
  text: Pasados algunos días[a], el rey Agripa y Berenice llegaron a Cesarea para saludar a Festo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bernice» es otra transliteración posible de «Berenice».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμερῶν δὲ διαγενομένων τινῶν
  english_pob_choice: Now after some days had passed
  chosen_spanish: Ahora, después de que habían pasado algunos días
  alternatives_spanish:
  - Después de que habían pasado algunos días
  - Y después de que habían pasado algunos días
  - Cuando habían pasado algunos días
  lexicon: BDAG
  rationale: El genitivo absoluto marca trasfondo temporal; en español, «después de que habían pasado algunos días» comunica con naturalidad ese valor. «Ahora» conserva el matiz narrativo leve de δέ que el inglés POB rindió con «Now».
- source_word: Ἀγρίππας ὁ βασιλεὺς
  english_pob_choice: King Agrippa
  chosen_spanish: el rey Agripa
  alternatives_spanish:
  - Rey Agripa
  - Agripa el rey
  lexicon: BDAG
  rationale: 'La construcción título + nombre se expresa de forma natural en español con artículo: «el rey Agripa». Mantiene explícito βασιλεύς sin sonar forzado.'
- source_word: Βερνίκη
  english_pob_choice: Bernice
  chosen_spanish: Berenice
  alternatives_spanish:
  - Bernice
  lexicon: BDAG
  rationale: Se adopta la transliteración más conocida y transparente en español, «Berenice». Se preserva la variante inglesa «Bernice» como alternativa válida de transliteración.
- source_word: κατήντησαν
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - arrivaron
  - alcanzaron
  lexicon: BDAG
  rationale: En un relato de desplazamiento, «llegaron» expresa bien el aoristo narrativo y su sentido de arribo al destino. Es más natural en español que un calco como «arribaron».
- source_word: εἰς Καισάρειαν
  english_pob_choice: at Caesarea
  chosen_spanish: a Cesarea
  alternatives_spanish:
  - en Cesarea
  - hasta Cesarea
  lexicon: BDAG
  rationale: Con un verbo de movimiento, εἰς marca destino; «a Cesarea» lo reproduce de modo directo y sobrio. No se fuerza «en» porque el griego no describe ubicación estática.
- source_word: ἀσπασάμενοι τὸν Φῆστον
  english_pob_choice: to greet Festus
  chosen_spanish: para saludar a Festo
  alternatives_spanish:
  - después de saludar a Festo
  - para dar el saludo a Festo
  - para presentar sus saludos a Festo
  lexicon: BDAG
  rationale: El participio aoristo medio expresa acción acompañante con finalidad/circunstancia; «para saludar a Festo» conserva esa función sin sobredeterminar el matiz cortesano. «Saludar» es el equivalente español más natural y fiel al verbo.
- source_word: Φῆστος
  english_pob_choice: Festus
  chosen_spanish: Festo
  alternatives_spanish:
  - Festus
  lexicon: BDAG
  rationale: Se adapta al nombre propio en su forma española habitual, «Festo», manteniendo identificación clara del gobernador romano.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no señalan revisiones textuales o interpretativas relevantes; por eso la versión española sigue de cerca la lectura consensuada, ajustando solo la idiomaticidad natural del español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó el título real explícito con «el rey» en lugar de omitirlo.
  - Se evitó el calco «arribaron» y se prefirió «llegaron» por naturalidad en español.
  - La nota al pie marca solo la variante transliterativa del nombre propio, sin añadir interpretación no sustentada.
