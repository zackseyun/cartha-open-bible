- from: Ahora, después de que habían pasado algunos días[a], el rey Agripa y Berenice llegaron a Cesarea para saludar a Festo.
  to: Pasados algunos días[a], el rey Agripa y Berenice llegaron a Cesarea para saludar a Festo.
  rationale: Se reemplaza el inicio por una construcción temporal idiomática y fiel al genitivo absoluto griego, eliminando el 'Ahora' anglicado y el pluscuamperfecto pesado. Se mantiene el resto de las decisiones léxicas por ser fieles y naturales. Se ajusta la nota para reflejar con claridad la variante de transliteración.
