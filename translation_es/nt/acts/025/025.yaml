translation:
  language: es
  text: Pero yo hallé que él no había hecho nada digno de muerte; y como él mismo apeló al Emperador[a], resolví enviarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Augusto». El título griego Σεβαστός se refiere aquí al emperador romano.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελαβόμην
  english_pob_choice: I found
  chosen_spanish: hallé
  alternatives_spanish:
  - encontré
  - determiné
  - concluí
  lexicon: BDAG
  rationale: En este contexto judicial, el verbo expresa la apreciación o conclusión de Festus tras examinar el caso. «Hallé» conserva el valor de llegar a una conclusión y suena natural en español sin añadir una formalidad innecesaria.
- source_word: μηδὲν ἄξιον ... θανάτου
  english_pob_choice: nothing deserving death
  chosen_spanish: nada digno de muerte
  alternatives_spanish:
  - nada merecedor de muerte
  - nada digno de la pena de muerte
  lexicon: BDAG
  rationale: La expresión niega que haya algo que merezca castigo capital. «Digno de muerte» sigue de cerca la construcción griega y mantiene la fuerza legal sin introducir explícitamente «pena de muerte», que sería más interpretativo.
- source_word: αὐτὸν θανάτου πεπραχέναι
  english_pob_choice: he had done
  chosen_spanish: él no había hecho
  alternatives_spanish:
  - él no había cometido
  - él no había practicado
  lexicon: BDAG
  rationale: La construcción acusativo + infinitivo se vierte de forma natural como oración de contenido en español. «Había hecho» reproduce el sentido amplio de πράσσω en este contexto, con la negación ya implicando la ausencia de actos capitalmente culpables.
- source_word: πεπραχέναι
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había cometido
  - había practicado
  lexicon: BDAG
  rationale: Aquí πράσσω se refiere a acciones realizadas o cometidas. «Había hecho» es el equivalente más directo y natural; «había cometido» también es posible en un registro judicial, pero añade una tonalidad más acusatoria.
- source_word: αὐτοῦ δὲ τούτου ἐπικαλεσαμένου
  english_pob_choice: because he himself appealed
  chosen_spanish: y como él mismo apeló
  alternatives_spanish:
  - y cuando él mismo apeló
  - y puesto que él mismo apeló
  - y después de que él mismo apeló
  lexicon: BDAG
  rationale: El genitivo absoluto expresa la circunstancia que motivó la decisión de Festus. «Y como» comunica bien el valor causal en español; «él mismo» refleja el énfasis del pronombre griego.
- source_word: ἐπικαλεσαμένου
  english_pob_choice: appealed
  chosen_spanish: apeló
  alternatives_spanish:
  - interpuso apelación
  - recurrió
  lexicon: BDAG
  rationale: En el marco legal romano, ἐπικαλέω con el acusativo de la autoridad indica recurrir a una instancia superior. «Apeló» es la opción más clara y idiomática en español moderno.
- source_word: τὸν Σεβαστὸν
  english_pob_choice: the Emperor
  chosen_spanish: al Emperador
  alternatives_spanish:
  - a Augusto
  - al Augusto
  - al emperador romano
  lexicon: BDAG
  rationale: Σεβαστός es el título griego correspondiente a Augustus y, en este contexto, designa al emperador romano como autoridad suprema. «Emperador» comunica con claridad el referente para el lector español; en la nota se conserva la alternativa «Augusto».
- source_word: ἔκρινα
  english_pob_choice: I decided
  chosen_spanish: resolví
  alternatives_spanish:
  - decidí
  - juzgué
  - determiné
  lexicon: BDAG
  rationale: El verbo expresa la resolución oficial de Festus. «Resolví» mantiene el matiz de decisión personal/administrativa y evita que «juzgué» suene excesivamente valorativo en español contemporáneo.
- source_word: πέμπειν
  english_pob_choice: to send him
  chosen_spanish: enviarlo
  alternatives_spanish:
  - mandarlo
  - remitirlo
  lexicon: BDAG
  rationale: El infinitivo complementa a ἔκρινα y el objeto se sobreentiende por el contexto. «Enviarlo» es natural en español y evita una redundancia innecesaria; «remitirlo» sería más jurídico, pero menos directo.
theological_decisions:
- issue: Título imperial en τὸν Σεβαστόν
  english_pob_reading: the Greek title Σεβαστός refers here to the Roman emperor.
  chosen_spanish_reading: al Emperador
  alternative_spanish_readings:
  - a Augusto
  - al Augusto
  rationale: No hay tensión doctrinal, sino una decisión histórico-lexical. El texto no usa el nombre propio sino un título imperial; por claridad pública se traduce como «Emperador», y se preserva en la nota la alternativa histórica «Augusto».
  doctrine_reference: Hechos 25:25; uso histórico del título imperial romano
translation_notes:
  revision_awareness: La traducción sigue de cerca el griego SBLGNT y el audit trail inglés de la POB, manteniendo la valoración judicial de Festus («hallé», «resolví») y la referencia imperial de Σεβαστός. No se detectaron revisiones pendientes ni cambios necesarios respecto del acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología POB general, pero este versículo no contiene el nombre divino.
  - Se mantuvo un registro formal y claro, evitando calcos innecesarios como «deserving death» -> «merecedor de la muerte» cuando una formulación más natural conservaba mejor la fuerza legal.
  - La puntuación refleja una sola oración compuesta coordinada, acorde con el griego y con la audición inglesa.
  - El pronombre explícito «él mismo» preserva el énfasis del griego αὐτοῦ δὲ τούτου.
