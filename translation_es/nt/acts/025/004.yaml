translation:
  language: es
  text: Festus, por tanto, respondió que Pablo estaba retenido en Cesarea[a], y que él mismo estaba a punto de partir en breve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba siendo retenido en Cesarea». El griego usa la expresión «hacia/en Cesarea» de modo idiomático para indicar el lugar de custodia de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὲν οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - entonces
  lexicon: BDAG
  rationale: La combinación introduce una respuesta inferencial y de transición narrativa. «Por tanto» conserva esa relación lógica sin sonar demasiado coloquial.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» comunica de forma natural el verbo narrativo de dar una respuesta y mantiene un registro digno y directo.
- source_word: τηρεῖσθαι
  english_pob_choice: was being kept
  chosen_spanish: estaba siendo custodiado
  alternatives_spanish:
  - estaba siendo retenido
  - estaba siendo guardado
  lexicon: BDAG
  rationale: El infinitivo pasivo presente indica una acción/estado continuo. «Custodiado» preserva la idea de vigilancia o custodia implícita sin especificar más de lo que el griego permite.
- source_word: εἰς Καισάρειαν
  english_pob_choice: in Caesarea
  chosen_spanish: en Cesarea
  alternatives_spanish:
  - en Cesarea
  - en la Cesarea
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente direccional, aquí funciona idiomáticamente con τηρεῖσθαι para indicar el lugar donde Pablo estaba bajo custodia. «En Cesarea» refleja bien ese uso sin forzar una traducción más literal y oscura.
- source_word: ἑαυτὸν
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él mismo
  - por su parte
  lexicon: BDAG
  rationale: El reflexivo añade énfasis y contraste con Pablo. «Él mismo» conserva explícitamente esa fuerza enfatizadora.
- source_word: μέλλειν
  english_pob_choice: was about to
  chosen_spanish: estaba por
  alternatives_spanish:
  - iba a
  - estaba a punto de
  lexicon: BDAG
  rationale: μέλλω expresa inminencia. «Estaba por» mantiene la cercanía temporal de manera natural en español.
- source_word: ἐν τάχει
  english_pob_choice: shortly
  chosen_spanish: en breve
  alternatives_spanish:
  - pronto
  - en poco tiempo
  lexicon: BDAG
  rationale: La expresión marca proximidad temporal. «En breve» reproduce bien el matiz de inmediatez con un tono formal y bíblico.
- source_word: ἐκπορεύεσθαι
  english_pob_choice: depart
  chosen_spanish: partir
  alternatives_spanish:
  - salir
  - marcharse
  lexicon: BDAG
  rationale: En contexto de viaje, «partir» es una forma natural y digna para ἐκπορεύεσθαι; conserva el sentido de salir/ir-se sin excesiva literalidad.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la preferencia revisada por un verbo más formal para ἐκπορεύεσθαι (''depart'') apoya el español «partir»; también se conserva la nota de equivalencia idiomática de εἰς Καισάρειαν mediante una nota de alternativa lexical.'
  spanish_consistency_notes:
  - Se mantiene «Cesarea» sin artículo, como nombre propio geográfico estándar en español bíblico.
  - Se preserva el énfasis de ἑαυτόν con «él mismo».
  - El registro general es formal y readable, acorde con un versículo narrativo breve.
