translation:
  language: es
  text: Porque me parece irrazonable[a] al enviar a un prisionero no indicar también las acusaciones contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «especificar las acusaciones contra él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλογον
  english_pob_choice: unreasonable
  chosen_spanish: irrazonable
  alternatives_spanish:
  - irracional
  - absurdo
  - sin sentido
  lexicon: BDAG
  rationale: ἄλογος expresa algo que carece de razón o de lógica en este contexto administrativo. «Irrazonable» conserva el juicio práctico de Festo con naturalidad en español, sin cargar el texto con un matiz filosófico más fuerte como «irracional».
- source_word: δοκεῖ μοι
  english_pob_choice: it seems ... to me
  chosen_spanish: me parece
  alternatives_spanish:
  - yo pienso
  - me parece a mí
  - considero
  lexicon: BDAG
  rationale: La construcción impersonal δοκεῖ μοι se refleja bien con «me parece», que preserva la valoración personal y moderada del hablante. Añadir «a mí» sería posible, pero en español no es necesario para reproducir el matiz.
- source_word: πέμποντα
  english_pob_choice: when sending
  chosen_spanish: enviar
  alternatives_spanish:
  - al enviar
  - cuando se envía
  - mientras se envía
  lexicon: BDAG
  rationale: El participio presente se entiende circunstancialmente. En español, «enviar» integrado en el infinitivo expresa de forma natural la situación general a la que alude el argumento, sin forzar una subordinación más pesada.
- source_word: δέσμιον
  english_pob_choice: a prisoner
  chosen_spanish: un preso
  alternatives_spanish:
  - un prisionero
  - un cautivo
  - un detenido
  lexicon: BDAG
  rationale: En este contexto judicial, «preso» comunica con claridad la persona bajo custodia. «Prisionero» también es posible, pero «preso» suena más natural en español contemporáneo sin perder el sentido legal.
- source_word: μὴ καὶ
  english_pob_choice: not also
  chosen_spanish: sin ... también
  alternatives_spanish:
  - no también
  - sin además
  - sin asimismo
  lexicon: BDAG
  rationale: La combinación negativa con καί expresa la impropiedad de omitir algo acompañante. «Sin indicar también» reproduce bien la idea de ausencia de la acción complementaria, en una sintaxis española fluida.
- source_word: τὰς κατ’ αὐτοῦ αἰτίας
  english_pob_choice: the charges against him
  chosen_spanish: las acusaciones contra él
  alternatives_spanish:
  - los cargos contra él
  - las imputaciones contra él
  - las causas en su contra
  lexicon: BDAG
  rationale: αἰτία en un marco judicial puede significar «cargos» o «acusaciones». Aquí «acusaciones» mantiene el sentido forense sin sonar excesivamente técnico; «contra él» reproduce la relación preposicional del griego.
- source_word: σημᾶναι
  english_pob_choice: to indicate
  chosen_spanish: indicar
  alternatives_spanish:
  - especificar
  - hacer saber
  - señalar
  lexicon: BDAG
  rationale: σημαίνω significa indicar, dar a conocer o señalar. «Indicar» encaja bien con el acto administrativo de acompañar al preso con la información de los cargos, sin sobreinterpretar el verbo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la sintaxis y el sentido del griego, tomando como guía el auditable POB en inglés: mantiene la valoración personal de δοκεῖ μοι, conserva el matiz circunstancial del participio πέμποντα y refleja el lenguaje forense de αἰτίας/σημᾶναι sin endurecerlo innecesariamente.'
  spanish_consistency_notes:
  - Se prefirió «irrazonable» frente a «irracional» para conservar el juicio práctico y administrativo del contexto.
  - «Acusaciones» se usó como equivalente natural de αἰτίας en este entorno legal; la nota conserva la alternativa «especificar» que el inglés POB documenta para σημᾶναι.
  - No se introdujo terminología eclesiástica ni una paráfrasis doctrinal, porque el versículo es una observación procedimental de Festo.
