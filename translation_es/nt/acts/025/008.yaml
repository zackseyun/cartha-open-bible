translation:
  language: es
  text: 'Pablo hizo su defensa: «No he pecado[a] en nada contra la ley de los judíos, ni contra el templo, ni contra César».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No he cometido ninguna falta contra la ley de los judíos, ni contra el templo, ni contra César».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολογουμένου
  english_pob_choice: made his defense
  chosen_spanish: hizo su defensa
  alternatives_spanish:
  - presentó su defensa
  - se defendió
  lexicon: BDAG
  rationale: El participio genitivo absoluto introduce el acto formal de defensa ante un tribunal. «Hizo su defensa» conserva el sentido forense y suena natural en español sin añadir una idea de réplica que el griego no exige.
- source_word: ὅτι
  english_pob_choice: implicit quotation introduction rendered with punctuation
  chosen_spanish: marcador implícito de cita, reflejado con dos puntos y comillas
  alternatives_spanish:
  - que
  - —
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de la defensa. En español publicado, los dos puntos y las comillas comunican mejor la cita directa que retener «que» de forma pesada.
- source_word: νόμον τῶν Ἰουδαίων
  english_pob_choice: the law of the Jews
  chosen_spanish: la ley de los judíos
  alternatives_spanish:
  - la ley judía
  - la ley de los judeanos
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva bastante literal. «Ley de los judíos» sigue de cerca el griego y evita decidir prematuramente entre un matiz étnico, religioso o cultural.
- source_word: ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto del templo
  lexicon: BDAG
  rationale: En este contexto ἱερόν se refiere al complejo del templo; «templo» es la forma clara y estándar en español.
- source_word: Καίσαρά
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el César
  - el emperador
  lexicon: BDAG
  rationale: Se mantiene el nombre/título propio tradicional en español para el gobernante romano, preservando el marco legal-político del pasaje.
- source_word: τι
  english_pob_choice: in nothing
  chosen_spanish: en nada
  alternatives_spanish:
  - en absoluto
  - en ningún aspecto
  - nada
  lexicon: BDAG
  rationale: Con ἥμαρτον, τι intensifica la negación total. «En nada» reproduce de forma natural y fiel esa amplitud negativa.
- source_word: ἥμαρτον
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he cometido ninguna falta
  - he hecho nada malo
  lexicon: BDAG
  rationale: Se conserva el verbo de pecado para no reducir la afirmación a un mero tecnicismo legal. En español, «he pecado» mantiene la dimensión moral del término griego.
- source_word: οὔτε ... οὔτε ... οὔτε
  english_pob_choice: either ... or ... or
  chosen_spanish: ni ... ni ... ni ...
  alternatives_spanish:
  - ya sea ... o ... o ...
  - ni contra ... ni contra ... ni contra ...
  lexicon: BDAG
  rationale: La triple negación del griego se expresa con la coordinación enfática «ni... ni... ni...», la más natural y exacta en español.
theological_decisions:
- issue: Nuance legal y moral de ἥμαρτον
  english_pob_reading: Retain 'I have sinned' rather than reducing the statement to purely legal language.
  chosen_spanish_reading: Conservar «he pecado» en vez de suavizarlo a «no he cometido ninguna falta» en el texto principal.
  alternative_spanish_readings:
  - no he cometido ninguna falta
  - no he hecho nada malo
  rationale: El contexto es judicial, pero el verbo griego sigue siendo ἁμαρτάνω. Mantener «he pecado» preserva la carga moral y lexical del término, mientras la nota aclara la alternativa jurídica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación de la negación con las tres esferas mencionadas
  english_pob_reading: '''against either the law of the Jews, or the temple, or Caesar.'''
  chosen_spanish_reading: Repetir «contra» en cada elemento para hacer explícita la relación de oposición en español.
  alternative_spanish_readings:
  - contra la ley de los judíos, el templo y César
  - respecto de la ley de los judíos, el templo y César
  rationale: El griego usa εἰς con cada complemento. En español, repetir «contra» evita ambigüedad y deja visible la triple acusación negada.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «made his defense» frente a una formulación más interpretativa. En español se refleja con «hizo su defensa», manteniendo el tono forense y evitando añadir explicaciones no presentes en el griego. También se conserva la dimensión moral de ἥμαρτον, como en el inglés revisado.
  spanish_consistency_notes:
  - Se usa «César» como nombre/título romano, coherente con el contexto político del pasaje.
  - Se prefiere «ley» para νόμος y «templo» para ἱερόν, manteniendo consistencia con terminología bíblica estándar pero sin suavizar el griego.
  - La coordinación negativa «ni... ni... ni...» transmite bien la triple exclusión sin necesidad de calcos pesados.
  - El texto principal evita elipsis excesivas y conserva un registro apto para lectura pública.
