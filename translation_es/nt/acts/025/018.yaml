translation:
  language: es
  text: Acerca de él[a], cuando comparecieron los acusadores, no presentaron ninguna acusación de las cosas malas[b] que yo sospechaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Respecto de él».'
    reason: alternative_rendering
  - marker: b
    text: 'O: «de los delitos que yo sospechaba». El griego dice literalmente «cosas malas», lo que puede referirse de manera más general a actos malos que a delitos definidos formalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ οὗ
  english_pob_choice: Concerning him
  chosen_spanish: Acerca de él
  alternatives_spanish:
  - Con respecto a él
  - Sobre él
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema del que se habla. «Acerca de él» conserva ese valor referencial y suena natural en español.
- source_word: σταθέντες
  english_pob_choice: when ... stood up
  chosen_spanish: cuando se pusieron de pie
  alternatives_spanish:
  - cuando se levantaron
  - habiéndose puesto de pie
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente en el contexto judicial. «Se pusieron de pie» refleja la escena de comparecencia sin forzar una traducción demasiado literal.
- source_word: οἱ κατήγοροι
  english_pob_choice: the accusers
  chosen_spanish: los acusadores
  alternatives_spanish:
  - los fiscales
  - los que acusaban
  lexicon: BDAG
  rationale: κατήγοροι designa a quienes formulan acusaciones en un contexto legal. «Acusadores» mantiene el sentido directo y evita un tecnicismo innecesario.
- source_word: οὐδεμίαν αἰτίαν ἔφερον
  english_pob_choice: they brought no charge
  chosen_spanish: no presentaron ninguna acusación
  alternatives_spanish:
  - no trajeron ninguna acusación
  - no formularon ninguna acusación
  lexicon: BDAG
  rationale: La expresión forense con φέρειν αἰτίαν se refiere a presentar o formular una acusación. «Presentaron ninguna acusación» es claro en español jurídico común.
- source_word: ὧν
  english_pob_choice: of the ... things that
  chosen_spanish: de las cosas
  alternatives_spanish:
  - de las cosas que
  - de tales cosas
  lexicon: BDAG
  rationale: El genitivo plural relativo depende de αἰτίαν con valor partitivo/qualificativo. «De las cosas» preserva la relación con lo que sigue sin sobredeterminarla.
- source_word: ἐγὼ ὑπενόουν
  english_pob_choice: I was suspecting
  chosen_spanish: yo sospechaba
  alternatives_spanish:
  - yo estaba sospechando
  - yo suponía
  lexicon: BDAG
  rationale: El imperfecto expresa una expectativa o sospecha previa y sostenida. «Sospechaba» comunica bien esa continuidad sin sonar artificial en español.
- source_word: πονηρῶν
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - cosas malas y perversas
  - maldades
  - hechos malos
  lexicon: BDAG
  rationale: πονηρός en neutro plural puede referirse a males, malas acciones o conducta dañina. «Cosas malas» mantiene la amplitud semántica del griego y evita restringirlo indebidamente a delitos formales.
translation_notes:
  revision_awareness: El testimonio auditado en inglés quedó sin cambios sustanciales en la revisión más reciente; la propuesta española sigue de cerca el valor forense del pasaje y mantiene la amplitud de πονηρῶν sin convertirla en un tecnicismo penal no explicitado por el griego.
  spanish_consistency_notes:
  - Se usa «acusadores» para κατήγοροι, en línea con el valor legal del término.
  - Se evita «SEÑOR» u otras fórmulas no pertinentes, ya que no hay vocabulario divino en este versículo.
  - «Cosas malas» conserva la amplitud de πονηρῶν y deja abierta la posible referencia a conducta dañina o acusaciones no formalizadas.
