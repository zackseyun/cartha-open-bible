translation:
  language: es
  text: 'Entonces Festo, después de consultar con el consejo, respondió: «Has apelado a César[a]; a César irás»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante César irás». La expresión tiene sentido jurídico: irás al tribunal del emperador después de haber apelado.'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata de forma natural en español; 'Entonces' conserva el valor temporal y el avance del relato sin añadir matices causales no explícitos.
- source_word: συλλαλήσας
  english_pob_choice: after conferring
  chosen_spanish: después de conferenciar
  alternatives_spanish:
  - habiendo hablado con
  - después de consultar
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa a la respuesta principal. 'Conferenciar' preserva la idea deliberativa de consulta conjunta en un contexto legal-administrativo.
- source_word: μετὰ τοῦ συμβουλίου
  english_pob_choice: with the council
  chosen_spanish: con el consejo
  alternatives_spanish:
  - con el consejo asesor
  - con su consejo
  lexicon: BDAG
  rationale: '''Consejo'' comunica adecuadamente συμβούλιον como cuerpo deliberativo. Se evita ''su consejo'' porque el griego no lo explicita.'
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: BDAG
  rationale: En español, 'respondió' suena natural y mantiene el tono formal del contexto judicial, equivalente funcional de 'answered'.
- source_word: Καίσαρα
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el emperador
  lexicon: BDAG
  rationale: Se conserva el título propio romano en español como 'César', que es la forma estable y transparente para el contexto legal del pasaje.
- source_word: ἐπικέκλησαι
  english_pob_choice: you have appealed to
  chosen_spanish: has apelado a
  alternatives_spanish:
  - has invocado
  - has llamado a
  lexicon: BDAG
  rationale: 'El perfecto medio de ἐπικαλέω tiene sentido técnico jurídico: recurrir a la jurisdicción superior. ''Has apelado a'' expresa con claridad ese valor legal en español.'
- source_word: ἐπὶ Καίσαρα
  english_pob_choice: to Caesar
  chosen_spanish: a César
  alternatives_spanish:
  - ante César
  lexicon: BDAG
  rationale: Se sigue la lectura idiomática del movimiento/jurisdicción hacia la autoridad apelada. 'A César' es natural en español y mantiene abierta la alternativa legal sin sobreexplicar.
- source_word: πορεύσῃ
  english_pob_choice: you will go
  chosen_spanish: irás
  alternatives_spanish:
  - serás llevado
  - te presentarás
  lexicon: BDAG
  rationale: El futuro medio indica desplazamiento; 'irás' es directo y sobrio, sin introducir pasividad explícita que el verbo no exige por sí mismo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde. No se añadieron notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantuvo 'César' como transliteración estable del título romano, coherente con el contexto legal.
  - Se preservó el valor jurídico de ἐπικαλέω mediante 'apelar', evitando un calco literal que perdería precisión.
  - 'La estructura española respeta la secuencia participial del griego: primero la consulta, luego la respuesta.'
  - El registro es formal y publicable, sin arcaísmos innecesarios.
