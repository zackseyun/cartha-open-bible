translation:
  language: es
  text: Así que, cuando se reunieron aquí, no hice ninguna demora, sino que al día siguiente tomé asiento en el tribunal[a] y ordené que trajeran al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomé asiento en el estrado judicial». El griego βῆμα se refiere al asiento o plataforma oficial de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνελθόντων
  english_pob_choice: when they had come together
  chosen_spanish: cuando se habían reunido
  alternatives_spanish:
  - cuando se habían congregado
  - después de haberse reunido
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto expresa una reunión previa; en español, «se habían reunido» comunica naturalmente el hecho sin perder el valor aspectual de anterioridad.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad inferencial en el discurso de Festo. «Así que» es natural en español y preserva la relación lógica sin sonar excesivamente formal.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: BDAG
  rationale: Adverbio locativo simple; «aquí» es la equivalencia más directa y natural.
- source_word: ἀναβολὴν μηδεμίαν ποιησάμενος
  english_pob_choice: I made no delay
  chosen_spanish: no hice ninguna demora
  alternatives_spanish:
  - no diferí nada
  - no aplazé nada
  lexicon: BDAG
  rationale: La expresión idiomática comunica ausencia de postergación administrativa. «No hice ninguna demora» conserva el sentido legal y sigue siendo idiomático en español.
- source_word: τῇ ἑξῆς
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al siguiente día
  lexicon: BDAG
  rationale: La dativa temporal idiomática se expresa con claridad y naturalidad como «al día siguiente».
- source_word: καθίσας ἐπὶ τοῦ βήματος
  english_pob_choice: I sat on the judgment seat
  chosen_spanish: me senté en el tribunal[a]
  alternatives_spanish:
  - tomé asiento en el tribunal
  - me senté en la plataforma judicial
  lexicon: BDAG
  rationale: βῆμα refiere al asiento/plataforma judicial oficial. «Tribunal» comunica el lugar/jurisdicción con claridad en español, aunque el matiz de «asiento judicial» queda disponible en la nota.
- source_word: ἐκέλευσα
  english_pob_choice: I ordered
  chosen_spanish: mandé
  alternatives_spanish:
  - ordené
  - di la orden
  lexicon: BDAG
  rationale: Verbo de mandato oficial en contexto judicial. «Mandé» suena natural en español y conserva la fuerza directiva sin añadir solemnidad innecesaria.
- source_word: ἀχθῆναι
  english_pob_choice: to be brought
  chosen_spanish: que trajeran
  alternatives_spanish:
  - que lo trajeran
  - que fuera traído
  lexicon: BDAG
  rationale: En contexto de audiencia judicial, el infinitivo pasivo se puede expresar de forma natural en español como una subordinada de mandato. «Que trajeran» mantiene la acción de presentar al hombre ante el tribunal.
- source_word: τὸν ἄνδρα
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al acusado
  - a ese hombre
  lexicon: BDAG
  rationale: ἀνήρ se traduce de manera directa como «hombre». Evita añadir «acusado», que sería interpretativo aunque el contexto lo sugiera.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail en inglés: conserva la secuencia discursiva («Así que»), la anterioridad del participio («se habían reunido»), la decisión administrativa sin demora, y evita introducir «in» o «acusado», que no aparecen en el original. Se ajustó la nota para anclarla correctamente en el texto español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usó «tribunal» para βῆμα por claridad española; la nota preserva el matiz de asiento o plataforma judicial.
  - Se evitó «Cristo», «Señor» u otra terminología teológica no presente en el texto.
  - El registro es narrativo-formal, adecuado para discurso histórico-judicial en Hechos.
