  text: πρὸς οὓς ἀπεκρίθην ὅτι οὐκ ἔστιν ἔθος Ῥωμαίοις χαρίζεσθαί τινα ⸀ἄνθρωπον πρὶν ἢ ὁ κατηγορούμενος κατὰ πρόσωπον ἔχοι τοὺς κατηγόρους τόπον τε ἀπολογίας λάβοι περὶ τοῦ ἐγκλήματος.
base_translation:
  language: en
  yaml_path: translation/nt/acts/025/016.yaml
  text: To them I answered that it is not the custom of the Romans to hand over any man before the accused has the accusers face to face and receives an opportunity for a defense concerning the charge[a][b].
  footnotes:
  - marker: a
    text: Or 'to grant any man as a favor'; the Greek verb can carry the sense of handing someone over to satisfy an accuser's request.
    reason: lexical_alternative
  - marker: b
    text: Greek 'any man'; the expression is grammatically masculine but used generically in this legal setting.
    reason: lexical_alternative
