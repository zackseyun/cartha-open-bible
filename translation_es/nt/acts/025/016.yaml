translation:
  language: es
  text: A ellos respondí que no es costumbre de los romanos entregar[a] a ningún hombre[b] antes de que el acusado tenga a sus acusadores cara a cara y reciba una oportunidad para presentar su defensa respecto de la acusación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conceder como favor»; el verbo griego puede llevar la idea de entregar a alguien para satisfacer la petición de un acusador.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a ningún hombre»; la forma es masculina, pero funciona de manera genérica en este contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθος
  english_pob_choice: custom
  chosen_spanish: costumbre
  alternatives_spanish:
  - práctica
  - uso
  lexicon: BDAG
  rationale: ἔθος designa una conducta establecida o habitual. «Costumbre» comunica bien esa idea en un registro natural y formal para un contexto jurídico-administrativo.
- source_word: Ῥωμαίοις
  english_pob_choice: Romans
  chosen_spanish: los romanos
  alternatives_spanish:
  - los romanos
  - la autoridad romana
  - el pueblo romano
  lexicon: BDAG
  rationale: El dativo plural se refiere a los romanos como cuerpo civil y legal. «Los romanos» conserva la referencia directa y funciona bien en español.
- source_word: χαρίζεσθαί
  english_pob_choice: hand over
  chosen_spanish: entregar
  alternatives_spanish:
  - conceder como favor
  - ceder
  - entregar como favor
  lexicon: BDAG
  rationale: Aquí χαρίζομαι puede significar ceder o entregar a alguien para complacer una petición. «Entregar» es claro en español jurídico; la nota conserva el matiz alternativo de «conceder como favor».
- source_word: τινα ἄνθρωπον
  english_pob_choice: any man
  chosen_spanish: a ningún hombre
  alternatives_spanish:
  - a cualquier hombre
  - a ninguna persona
  - a alguien
  lexicon: BDAG
  rationale: El griego usa una forma masculinizada pero genérica en este marco legal. «A ningún hombre» refleja el valor indefinido en español, mientras la nota explica el matiz genérico y la posible alternativa «persona».
- source_word: ὁ κατηγορούμενος
  english_pob_choice: the accused
  chosen_spanish: el acusado
  alternatives_spanish:
  - el que es acusado
  - el demandado
  - el imputado
  lexicon: BDAG
  rationale: El participio sustantivado funciona como designación legal de la persona bajo acusación. «El acusado» es la forma más idiomática y precisa en español.
- source_word: κατὰ πρόσωπον
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - en persona
  - frente a frente
  lexicon: BDAG
  rationale: La locución transmite confrontación directa y personal. «Cara a cara» preserva bien esa fuerza idiomática en español sin perder naturalidad.
- source_word: τόπον ... ἀπολογίας
  english_pob_choice: an opportunity for a defense
  chosen_spanish: un lugar para defenderse
  alternatives_spanish:
  - una oportunidad de defensa
  - espacio para defenderse
  - ocasión para su defensa
  lexicon: BDAG
  rationale: τόπος puede usarse idiomáticamente como «lugar» o «espacio/oportunidad». Mantener «un lugar» deja visible la metáfora del griego, mientras el verbo reflexivo «defenderse» comunica la función jurídica de ἀπολογία. La alternativa idiomática se anota para no ocultar el valor del texto.
- source_word: τοῦ ἐγκλήματος
  english_pob_choice: the charge
  chosen_spanish: la acusación
  alternatives_spanish:
  - el cargo
  - la imputación
  - el cargo de acusación
  lexicon: BDAG
  rationale: ἔγκλημα refiere a una acusación o cargo legal. «La acusación» es claro y natural en español; «cargo» queda como alternativa técnica posible.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «for Romans» a «of the Romans» para una relación más natural sin cambiar el sentido. En español, «de los romanos» ya expresa esa relación posesiva/genérica de manera directa; no se introdujeron cambios doctrinales ni textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - Se prefirió un registro jurídico claro y sobrio, acorde con el contexto procesal de Hechos 25:16.
  - Se conservó la tensión lexical de χαρίζομαι con una nota, en vez de aplanarla a un simple «entregar» sin matiz.
