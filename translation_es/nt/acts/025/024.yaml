    rationale: Aunque intenta reflejar πλῆθος como colectivo, la expresión suena forzada en español. «Toda la multitud de los judíos» conserva mejor el valor colectivo y la legibilidad.
  - severity: medium
    issue: «me pidió» debilita el matiz de ἐνέτυχόν μοι y discorda con el sujeto colectivo
    rationale: El griego describe una apelación o petición dirigida a Festo por parte del grupo. «Apeló a mí»/«apelaron a mí» o «me hicieron petición» representa mejor el contexto legal y concuerda con «multitud» entendido colectivamente.
  - severity: low
    issue: La nota [a] no ofrece una alternativa real útil
    rationale: 'La nota dice «O: “Y Festo dice”», que repite esencialmente el texto principal. La nota debería explicar el presente histórico o bien omitirse.'
  - severity: low
    issue: «que están presentes con nosotros» puede aligerarse
    rationale: «Presentes con nosotros» refleja bien συμπαρόντες y suena más natural y compacto en el registro del pasaje.
