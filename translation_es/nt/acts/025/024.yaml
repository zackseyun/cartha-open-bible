translation:
  language: es
  text: 'Y Festo dice: «Rey Agripa, y todos los hombres presentes con nosotros, ustedes ven a este hombre, acerca de quien toda la multitud[a] de los judíos apeló a mí, tanto en Jerusalén como aquí, clamando que no debía seguir viviendo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el conjunto de los judíos». El griego usa una expresión colectiva (πλῆθος), por lo que la frase refleja una colectividad retórica y no necesariamente a cada judío individual sin excepción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que no debía vivir ya más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φησιν
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dice en presente histórico
  - dijo
  lexicon: BDAG
  rationale: El presente narrativo se conserva mejor con el presente español «dice», manteniendo la vivacidad del relato sin forzar un pasado donde el griego usa presente histórico.
- source_word: συμπαρόντες
  english_pob_choice: present with us
  chosen_spanish: que están presentes con nosotros
  alternatives_spanish:
  - presentes con nosotros
  - que nos acompañan
  lexicon: BDAG
  rationale: La idea es de presencia compartida en la escena judicial; «que están presentes con nosotros» es claro y natural en español.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - caballeros
  lexicon: BDAG
  rationale: El vocativo se dirige a los asistentes masculinos; «hombres» conserva el valor léxico sin suavizarlo con un tratamiento cortesano no presente en el griego.
- source_word: θεωρεῖτε
  english_pob_choice: you see
  chosen_spanish: ustedes ven
  alternatives_spanish:
  - ustedes observan
  - miren
  lexicon: BDAG
  rationale: En contexto Festo llama la atención sobre Pablo ante la asamblea; en español «ustedes ven» expresa bien la referencia directa sin sobrecargarla con un imperativo que el griego no requiere.
- source_word: περὶ οὗ
  english_pob_choice: about whom
  chosen_spanish: acerca de quien
  alternatives_spanish:
  - sobre quien
  - de quien
  lexicon: BDAG
  rationale: La construcción relativa con περί se rinde de forma idiomática con «acerca de quien», que conserva el matiz de referencia temática o acusatoria.
- source_word: ἅπαν τὸ πλῆθος τῶν Ἰουδαίων
  english_pob_choice: the whole multitude of the Jews
  chosen_spanish: todo el conjunto de los judíos
  alternatives_spanish:
  - toda la multitud de los judíos
  - la totalidad de los judíos
  lexicon: BDAG
  rationale: πλῆθος es un sustantivo colectivo; «conjunto» ayuda a preservar el sentido de masa/agrupación sin convertirlo en una afirmación universal sobre cada judío individual. Se mantiene «los judíos» porque el griego lo nombra explícitamente.
- source_word: ἐνέτυχόν μοι
  english_pob_choice: appealed to me
  chosen_spanish: me pidió
  alternatives_spanish:
  - me suplicó
  - presentó su petición ante mí
  lexicon: BDAG
  rationale: ἐντυγχάνω aquí tiene fuerza de solicitud formal. En español, el verbo simple «pedir» comunica esa petición en un registro judicial sin introducir un tecnicismo ajeno al flujo de la frase.
- source_word: ἔν τε Ἱεροσολύμοις καὶ ἐνθάδε
  english_pob_choice: both in Jerusalem and here
  chosen_spanish: en Jerusalén y también aquí
  alternatives_spanish:
  - tanto en Jerusalén como aquí
  - en Jerusalén y aquí
  lexicon: BDAG
  rationale: La correlación griega se expresa con naturalidad en español mediante «y también», conservando la doble localización y el contraste entre Jerusalén y el lugar presente.
- source_word: βοῶντες
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - vociferando
  lexicon: BDAG
  rationale: El participio comunica insistencia vocal fuerte; «clamando» mantiene el tono formal del relato judicial sin volverlo demasiado coloquial.
- source_word: μὴ δεῖν αὐτὸν ζῆν μηκέτι
  english_pob_choice: that he ought no longer to live
  chosen_spanish: que no debía seguir viviendo
  alternatives_spanish:
  - que no debía vivir ya más
  - que no debía continuar con vida
  lexicon: BDAG
  rationale: La construcción infinitiva expresa obligación o conveniencia negada. «No debía seguir viviendo» reproduce esa fuerza sin convertirla en una fórmula explícita de sentencia de muerte.
theological_decisions:
- issue: Referencia colectiva a «los judíos» en un contexto hostil
  english_pob_reading: Retain 'the Jews' as the ethnic-political group named in the Greek, while rendering πλῆθος as a collective expression rather than every individual Jew without exception.
  chosen_spanish_reading: Mantener «los judíos» y matizar πλῆθος con «todo el conjunto» para reflejar una colectividad retórica, no una universalidad absoluta.
  alternative_spanish_readings:
  - todos los judíos
  - la multitud judía
  - los dirigentes judíos
  rationale: El texto griego nombra explícitamente a τῶν Ἰουδαίων; no conviene estrecharlo a «los dirigentes» ni ampliarlo a «todos» de modo matemático. La solución española conserva el referente y la tensión retórica del testimonio de Festo.
  doctrine_reference: Principios de fidelidad léxica y precisión referencial del proyecto POB
- issue: Sentido de μὴ δεῖν αὐτὸν ζῆν μηκέτι
  english_pob_reading: that he ought no longer to live
  chosen_spanish_reading: que no debía seguir viviendo
  alternative_spanish_readings:
  - que no debía vivir ya más
  - que no debía continuar con vida
  rationale: El griego presenta una evaluación de necesidad/deber, no una fórmula técnica de ejecución. El español elegido conserva esa ambigüedad sin suavizar indebidamente el rechazo a la vida de Pablo.
  doctrine_reference: Principios POB sobre preservar tensiones semánticas y jurídicas
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: se mantuvo el presente histórico de φησιν, se preservó el valor colectivo de πλῆθος sin universalizarlo, se tradujo ἐνέτυχόν μοι con un verbo de petición acorde al contexto legal, y se evitó una formulación más fuerte que el griego para μὴ δεῖν αὐτὸν ζῆν μηκέτι. También se respetó la preferencia del POB por conservar el referente explícito «los judíos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «los judíos» porque el griego lo expresa directamente; no se sustituye por una forma más interpretativa.
  - «Mesías/Cristo» no aparece en este versículo.
  - La puntuación de apertura y cierre de cita sigue la norma española, conservando la estructura del discurso directo.
