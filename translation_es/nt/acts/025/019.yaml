translation:
  language: es
  text: Más bien,[a] tenían con él ciertas controversias acerca de su propia religión y acerca de un cierto Jesús, que había muerto, a quien Pablo afirmaba que estaba vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de su propia superstición». El término griego puede usarse de manera neutral para religión o de modo más despectivo por un observador externo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήματα
  english_pob_choice: disputes
  chosen_spanish: controversias
  alternatives_spanish:
  - disputas
  - cuestiones
  lexicon: BDAG
  rationale: El sustantivo se refiere a asuntos en disputa, no a preguntas neutrales. 'Controversias' conserva el carácter conflictivo del pasaje y suena natural en español formal.
- source_word: δέ
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - pero
  - sino
  lexicon: BDAG
  rationale: En contexto introduce un contraste correctivo respecto de lo que se esperaba como acusación penal. 'Más bien' transmite bien ese giro en español.
- source_word: τινα
  english_pob_choice: certain
  chosen_spanish: ciertas
  alternatives_spanish:
  - algunas
  lexicon: BDAG
  rationale: Mantiene el matiz indefinido y ligeramente formal del griego, ligado a ζητήματα.
- source_word: περὶ τῆς ἰδίας δεισιδαιμονίας
  english_pob_choice: about their own religion
  chosen_spanish: acerca de su propia religión
  alternatives_spanish:
  - acerca de su propia superstición
  - acerca de su propia práctica religiosa
  lexicon: BDAG
  rationale: '''Religión'' refleja el referente en español sin cargar innecesariamente el tono con ''superstición''. ''Su propia'' conserva la distancia de perspectiva de Festo.'
- source_word: ἰδίας
  english_pob_choice: their own
  chosen_spanish: su propia
  alternatives_spanish:
  - su particular
  - su privada
  lexicon: BDAG
  rationale: Conserva el matiz de pertenencia específica al ámbito de ellos, tal como lo expresa el punto de vista de Festo.
- source_word: εἶχον πρὸς αὐτόν
  english_pob_choice: they had ... with him
  chosen_spanish: tenían con él
  alternatives_spanish:
  - tenían contra él
  - presentaban contra él
  lexicon: BDAG
  rationale: La expresión idiomática en español mantiene la idea de controversias dirigidas hacia Pablo sin añadir una formulación jurídica más fuerte que la del griego.
- source_word: καὶ περί τινος Ἰησοῦ
  english_pob_choice: and about a certain Jesus
  chosen_spanish: y acerca de un cierto Jesús
  alternatives_spanish:
  - y acerca de alguien llamado Jesús
  lexicon: BDAG
  rationale: '''Un cierto Jesús'' reproduce la referencia distante y poco informada de Festo, como en el inglés POB.'
- source_word: τεθνηκότος
  english_pob_choice: who had died
  chosen_spanish: que había muerto
  alternatives_spanish:
  - que estaba muerto
  - que había fallecido
  lexicon: BDAG
  rationale: El participio perfecto expresa el estado resultante de la muerte. 'Había muerto' es natural y fiel en español.
- source_word: ὃν ἔφασκεν ὁ Παῦλος ζῆν
  english_pob_choice: whom Paul claimed to be alive
  chosen_spanish: a quien Pablo afirmaba que vivía
  alternatives_spanish:
  - a quien Pablo decía que estaba vivo
  - a quien Pablo sostenía que vivía
  lexicon: BDAG
  rationale: '''Afirmaba'' traduce el valor reportativo de φάσκω sin convertir el enunciado en una afirmación narrativa del autor. ''Que vivía'' conserva el infinitivo de contenido en un español natural.'
theological_decisions:
- issue: δeσιδαιμονία en boca de un funcionario romano
  english_pob_reading: religion
  chosen_spanish_reading: religión
  alternative_spanish_readings:
  - superstición
  - práctica religiosa
  rationale: En este relato, Festo describe el conflicto con un término que puede oscilar entre observación neutral y desdén externo. 'Religión' evita exagerar el insulto, pero la nota conserva la alternativa pejorativa reconocida por el POB inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Forma de reportar la afirmación de Pablo sobre Jesús vivo
  english_pob_reading: whom Paul claimed to be alive
  chosen_spanish_reading: a quien Pablo afirmaba que vivía
  alternative_spanish_readings:
  - a quien Pablo decía que estaba vivo
  - a quien Pablo sostenía que vivía
  rationale: La frase debe seguir siendo un reporte de Festo, no una proclamación directa del narrador en este miembro. 'Afirmaba' preserva esa distancia y no atenúa la referencia a la resurrección, que el texto mayor del NT sostiene.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió de cerca el contexto auditable en inglés y el griego; no hubo revisiones posteriores que alteraran la decisión del sentido principal. La redacción española conserva el contraste correctivo de δέ, el distanciamiento de τινα/ἰδίας, y el carácter reportado de φάσκω.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' cuando no aplica en este versículo; no hay nombres divinos explícitos aquí.
  - Se eligió 'Jesús' para Ἰησοῦς siguiendo el estándar del proyecto.
  - Se evitó 'Cristo' porque el griego nombra a Jesús por su nombre propio, no por el título.
  - Se conservó una sintaxis natural en español sin suavizar la tensión semántica de δεισιδαιμονία.
  - La nota al pie marca la alternativa lexical reconocida por el POB inglés para δεισιδαιμονία.
