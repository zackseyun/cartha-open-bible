translation:
  language: es
  text: Con respecto a él[a], cuando llegué a Jerusalén, los principales sacerdotes y los ancianos de los judíos me informaron, pidiendo una sentencia de condena contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de él» o «en cuanto a él».
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ οὗ
  english_pob_choice: Concerning him
  chosen_spanish: Con respecto a él
  alternatives_spanish:
  - Acerca de él
  - En cuanto a él
  lexicon: BDAG
  rationale: La construcción con περί + genitivo introduce el asunto del que se habla. «Con respecto a él» conserva ese valor referencial y suena natural en español sin perder el enlace con Pablo.
- source_word: γενομένου μου εἰς Ἱεροσόλυμα
  english_pob_choice: when I arrived in Jerusalem
  chosen_spanish: cuando llegué a Jerusalén
  alternatives_spanish:
  - cuando fui a Jerusalén
  - al llegar yo a Jerusalén
  lexicon: BDAG
  rationale: El genitivo absoluto con γίνομαι y εἰς + lugar expresa llegada o arribo. «Cuando llegué a Jerusalén» transmite bien la fuerza temporal y evita una calca innecesaria.
- source_word: ἐνεφάνισαν
  english_pob_choice: informed me
  chosen_spanish: me informaron
  alternatives_spanish:
  - presentaron su caso ante mí
  - me dieron a conocer
  lexicon: BDAG
  rationale: En este contexto administrativo-judicial, ἐμφανίζω significa dar aviso o presentar una denuncia ante una autoridad. «Me informaron» reproduce el valor de comunicación formal sin volverse arcaico.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los sumos sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Sumos sacerdotes» es la equivalencia española estándar para el plural del título, y evita la ambigüedad de un solo «sumo sacerdote».
- source_word: οἱ πρεσβύτεροι τῶν Ἰουδαίων
  english_pob_choice: the elders of the Jews
  chosen_spanish: los ancianos de los judíos
  alternatives_spanish:
  - los ancianos judíos
  - los ancianos entre los judíos
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva del griego sin estrechar indebidamente el sentido. «De los judíos» refleja el grupo identificado por el texto fuente.
- source_word: αἰτούμενοι
  english_pob_choice: asking for
  chosen_spanish: pidiendo
  alternatives_spanish:
  - solicitando
  - requiriendo
  lexicon: BDAG
  rationale: 'El participio expresa una acción concomitante: al informarle, estaban solicitando algo. «Pidiendo» conserva la sencillez del acto de petición y encaja en español natural.'
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su contra
  - contra él mismo
  lexicon: BDAG
  rationale: Κατά con genitivo tiene aquí sentido adversativo/hostil en un marco legal. «Contra él» reproduce esa orientación directa.
- source_word: καταδίκην
  english_pob_choice: a sentence of condemnation
  chosen_spanish: una sentencia de condena
  alternatives_spanish:
  - una condena
  - un veredicto de culpabilidad
  lexicon: BDAG
  rationale: καταδίκη es un término judicial de condenación. «Sentencia de condena» conserva la fuerza legal y evita reducirlo a una simple desaprobación.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del texto inglés POB, que hizo explícito «Concerning him» para reflejar περὶ οὗ y reordenó la cláusula para mantenerse más cerca del griego sin perder naturalidad. La traducción española conserva ese ajuste estructural con una apertura equivalente.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como topónimo habitual en español.
  - Se usa «sumos sacerdotes» para el plural del título sacerdotal, en línea con el valor colectivo del griego.
  - «Sentencia de condena» preserva el matiz jurídico de καταδίκη y evita suavizarlo.
  - La nota al pie se ancla en «Con respecto a él» para reflejar la alternativa principal de περί + genitivo.
