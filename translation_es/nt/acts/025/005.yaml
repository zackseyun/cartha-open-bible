translation:
  language: es
  text: Por tanto, que los que entre ustedes sean capaces[a] bajen conmigo, y si hay algo indebido[b] en ese hombre, que lo acusen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los principales entre ustedes» o «los que tienen autoridad entre ustedes»; δυνατοί puede denotar capacidad, poder o prominencia, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «impropio» o «fuera de lugar»; ἄτοπον puede referirse a algo indebido o incorrecto, sin exigir el sentido más fuerte de «criminal».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ οὖν
  english_pob_choice: Therefore, let ...
  chosen_spanish: Por tanto, que ...
  alternatives_spanish:
  - Entonces, que ...
  - Así pues, que ...
  lexicon: BDAG
  rationale: οὖν expresa continuación/inferencia; en español, «Por tanto» mantiene el valor conclusivo al inicio de la frase. La estructura con «que» conserva el tono de exhortación/jussivo del original y evita una redacción rígida.
- source_word: ἐν ὑμῖν ... δυνατοὶ
  english_pob_choice: those among you who are able
  chosen_spanish: los que entre ustedes sean capaces
  alternatives_spanish:
  - los hombres capaces entre ustedes
  - los que tengan capacidad entre ustedes
  - los líderes entre ustedes
  lexicon: BDAG
  rationale: δυνατοί aquí puede significar «capaces», «poderosos» o «prominentes». Dado el ajuste revisado del POB en inglés, «capaces» refleja mejor el sentido amplio sin introducir por sí solo la idea de autoridad social. Se evita «líderes» o «influyentes» porque eso estrecha el término más de lo que exige el griego.
- source_word: συγκαταβάντες
  english_pob_choice: go down with me
  chosen_spanish: bajen conmigo
  alternatives_spanish:
  - vengan conmigo
  - desciendan conmigo
  - bajen junto conmigo
  lexicon: BDAG
  rationale: El participio con σύν expresa acompañamiento; «conmigo» lo reproduce de manera natural. «Bajen» conserva el idiolecto geográfico de «subir/bajar» inherente al contexto de Jerusalén y Cesarea, sin necesidad de paraphrasear.
- source_word: εἴ τί ἐστιν
  english_pob_choice: if there is anything
  chosen_spanish: si hay algo
  alternatives_spanish:
  - si existe algo
  - si hubiera algo
  - si hay cualquier cosa
  lexicon: BDAG
  rationale: La construcción introduce una eventualidad indefinida. «Si hay algo» es idiomático en español y preserva la indefinición de τί.
- source_word: ἐν τῷ ἀνδρὶ
  english_pob_choice: in the man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - contra el hombre
  - acerca del hombre
  - en este hombre
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» porque el griego dice literalmente ἐν y el POB en inglés decidió no sustituirla por «contra», para no desplazar el matiz hacia una fórmula jurídica más fuerte. «El hombre» conserva la referencia algo distante a Pablo.
- source_word: ἄτοπον
  english_pob_choice: wrong
  chosen_spanish: malo
  alternatives_spanish:
  - impropio
  - incorrecto
  - fuera de lugar
  lexicon: BDAG
  rationale: ἄτοπον puede significar lo impropio, incorrecto o desviado. «Malo» es una equivalencia amplia y comprensible en español, aunque menos técnica que «impropio»; se elige por claridad y porque el contexto legal no obliga a precisar «criminal».
- source_word: κατηγορείτωσαν αὐτοῦ
  english_pob_choice: let them accuse him
  chosen_spanish: que lo acusen
  alternatives_spanish:
  - que presenten cargos contra él
  - que formulen acusación contra él
  lexicon: BDAG
  rationale: κατηγορέω significa acusar/formular cargos. «Que lo acusen» reproduce con naturalidad el valor imperativo-jussivo. Se evita sobrecargar el texto con una forma más forense que el griego no exige.
theological_decisions:
- issue: Valor del masculino plural para δυνατοί
  english_pob_reading: The Greek masculine plural refers to specific male leaders in context, rendered as 'those among you who are able.'
  chosen_spanish_reading: Se conserva el plural masculino implícito con «los que entre ustedes sean capaces», sin añadir «líderes» ni «autoridades».
  alternative_spanish_readings:
  - los hombres capaces entre ustedes
  - los varones capaces entre ustedes
  - los líderes entre ustedes
  rationale: El contexto habla de interlocutores varones, pero el griego no obliga a introducir una categoría social que no esté en δυνατοί. La formulación elegida preserva el referente masculino de forma natural sin importar un matiz de poder que el texto no asegura.
  doctrine_reference: Hechos 25:5; BDAG s.v. δυνατός
translation_notes:
  revision_awareness: He tenido en cuenta la revisión reciente del POB en inglés, que sustituyó «the influential men among you» por «those among you who are able» para reflejar mejor δυνατοί sin importar una lectura sociopolítica demasiado específica. La versión española sigue ese ajuste y evita traducir el término como «influyentes» o «autoridades».
  spanish_consistency_notes:
  - Se mantiene Yahvé por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva «conmigo» para el matiz de acompañamiento de σύν.
  - «Acusar» se usa como equivalente estable de κατηγορέω, sin expandir a una fórmula forense más pesada.
  - La expresión «en el hombre» reproduce el ἐν del griego, aunque en español suene menos idiomática; se conserva por fidelidad al matiz auditado del POB.
