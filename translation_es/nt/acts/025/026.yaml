translation:
  language: es
  text: Respecto de él no tengo nada definido que escribir a mi señor[a]. Por eso lo he presentado ante ustedes, y especialmente ante ti, rey Agripa, para que, después del examen[c], tenga algo que escribir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «al emperador». El griego dice «a mi señor», usando el título estándar κύριος en este contexto imperial.
    reason: alternative_reading
  - marker: c
    text: «Examen» también puede traducirse «audiencia» o «investigación», refiriéndose a la averiguación judicial del caso de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσφαλές τι
  english_pob_choice: nothing definite
  chosen_spanish: nada seguro
  alternatives_spanish:
  - nada definitivo
  - nada cierto
  - nada fiable
  lexicon: BDAG
  rationale: ἀσφαλές expresa algo seguro, firme o cierto. En español, «nada seguro» mantiene la fuerza de incertidumbre administrativa sin sonar forzado, y conserva la idea de que Festo no tiene un informe sólido que redactar.
- source_word: γράψαι / γράψω
  english_pob_choice: to write / something to write
  chosen_spanish: escribir / algo que escribir
  alternatives_spanish:
  - redactar / algo que redactar
  - escribir / algo para escribir
  lexicon: BDAG
  rationale: El verbo γράφω alude aquí a la redacción de un informe. «Escribir» es natural y fiel, y «algo que escribir» conserva el complemento implícito del griego sin añadir contenido ajeno.
- source_word: τῷ κυρίῳ
  english_pob_choice: to my lord
  chosen_spanish: a mi señor[a]
  alternatives_spanish:
  - a mi señor, el emperador
  - a mi señor, el soberano
  lexicon: BDAG
  rationale: κύριος se mantiene con su valor léxico básico como tratamiento respetuoso. En este contexto imperial no se traduce por un título eclesiástico; «mi señor» preserva la forma del griego y la nota aclara el referente al emperador.
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: διό introduce consecuencia lógica. «Por eso» conserva la relación causal con un español claro y sobrio, adecuado al registro judicial.
- source_word: προήγαγον
  english_pob_choice: I have brought
  chosen_spanish: lo he presentado
  alternatives_spanish:
  - lo he traído
  - lo he puesto delante
  lexicon: BDAG
  rationale: El verbo tiene la idea de llevar/presentar delante de un auditorio. «He presentado» refleja mejor la escena procesal que un simple «traído», y encaja con el contexto formal.
- source_word: ἐφ’ ὑμῶν
  english_pob_choice: before you all
  chosen_spanish: ante ustedes[b]
  alternatives_spanish:
  - delante de ustedes
  - en presencia de ustedes
  lexicon: BDAG
  rationale: La preposición con genitivo aquí indica puesta delante de un grupo. «Ustedes» reproduce el plural griego y evita perder el contraste con el singular siguiente dirigido a Agripa.
- source_word: μάλιστα ἐπὶ σοῦ
  english_pob_choice: especially before you
  chosen_spanish: y especialmente ante ti
  alternatives_spanish:
  - y sobre todo ante ti
  - y en particular ante ti
  lexicon: BDAG
  rationale: μάλιστα intensifica el enfoque sobre Agripa. «Especialmente» es directo y mantiene el contraste con el auditorio plural anterior.
- source_word: βασιλεῦ Ἀγρίππα
  english_pob_choice: King Agrippa
  chosen_spanish: rey Agripa
  alternatives_spanish:
  - rey Agripa
  - Agripa, rey
  lexicon: BDAG
  rationale: El vocativo se vierte naturalmente como título más nombre. «Rey Agripa» es claro, digno y acorde con el orden español más usual.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: ὅπως introduce finalidad. «Para que» es la forma más natural en español y conserva la estructura final de la oración.
- source_word: τῆς ἀνακρίσεως γενομένης
  english_pob_choice: after the examination has taken place
  chosen_spanish: hecha la investigación[c]
  alternatives_spanish:
  - realizada la investigación
  - después de la audiencia
  - una vez hecha la indagación
  lexicon: BDAG
  rationale: ἀνάκρισις puede significar examen judicial, audiencia o investigación. «Investigación» mantiene la idea de indagación procesal sin cargar el texto con un tecnicismo excesivo; la construcción absoluta se vierte temporalmente como una frase participial española natural.
- source_word: σχῶ τί γράψω
  english_pob_choice: I may have something to write
  chosen_spanish: tenga yo algo que escribir
  alternatives_spanish:
  - tenga algo que escribir
  - pueda yo escribir algo
  lexicon: BDAG
  rationale: La combinación expresa disponer de material para redactar. «Tenga yo algo que escribir» conserva el matiz de finalidad y la relación con el informe oficial, con un registro idiomático en español.
theological_decisions:
- issue: κύριος en contexto imperial romano
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - el emperador
  - mi señor, el emperador
  rationale: Aquí κύριος no es un título divino ni cristológico, sino una fórmula de cortesía política. Mantener «mi señor» preserva la lexicalización del griego; la nota identifica explícitamente al emperador para evitar ambigüedad doctrinal.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; contexto no teológico requiere aclaración referencial'
- issue: ἀνάκρισις como procedimiento legal
  english_pob_reading: examination
  chosen_spanish_reading: investigación
  alternative_spanish_readings:
  - examen
  - audiencia
  - indagación
  rationale: El término describe un proceso judicial de averiguación sobre el caso de Pablo. «Investigación» comunica bien la función legal en español sin imponer un tecnicismo que oscurezca el flujo del verso.
  doctrine_reference: Uso contextual del léxico judicial en Hechos; sin implicación doctrinal directa
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego de SBLGNT y el rastro auditado en inglés POB. La revisión más reciente indicó que no había cambios necesarios y el control cruzado reportó alta concordancia; por eso no se introdujeron ajustes textuales adicionales más allá de la formulación española idiomática.
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento singular/plural del griego: «ustedes» para ὑμῶν y «ti» para σοῦ.'
  - Se preservó el valor de κύριος como «mi señor» con nota explicativa, evitando sustituirlo por una fórmula eclesiástica.
  - Se tradujo ἀνάκρισις con un término judicial comprensible en español, manteniendo la referencia a una investigación procesal.
  - El orden general del versículo sigue la sintaxis del original, pero con reacomodo natural para el español publicado.
