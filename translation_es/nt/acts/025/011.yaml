translation:
  language: es
  text: Si, pues, hago mal y he hecho algo digno de muerte, no rehúso morir. Pero si no hay nada en las cosas de que estos hombres me acusan, nadie puede entregarme[a] a ellos como favor. Apelo a César.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cederme a ellos para complacerlos». El verbo griego puede incluir la idea de conceder o entregar a alguien como favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῶ
  english_pob_choice: am doing wrong
  chosen_spanish: hago mal
  alternatives_spanish:
  - estoy obrando mal
  - soy culpable de hacer mal
  lexicon: BDAG
  rationale: El presente griego expresa una conducta o estado en curso; en español, 'hago mal' comunica con naturalidad la fuerza moral y judicial sin sonar más técnico de lo necesario.
- source_word: ἄξιον θανάτου
  english_pob_choice: deserving death
  chosen_spanish: digno de muerte
  alternatives_spanish:
  - merecedor de muerte
  - castigable con muerte
  lexicon: BDAG
  rationale: '''Digno de muerte'' reproduce bien la valoración de ἄξιος y mantiene el matiz de pena capital sin sobre-explicar la fórmula.'
- source_word: πέπραχά τι
  english_pob_choice: have done anything
  chosen_spanish: he hecho algo
  alternatives_spanish:
  - he cometido algo
  - he practicado algo
  lexicon: BDAG
  rationale: El perfecto griego señala acción completada con relevancia presente; 'he hecho algo' conserva la amplitud de τι y funciona bien en un contexto legal.
- source_word: οὐ παραιτοῦμαι τὸ ἀποθανεῖν
  english_pob_choice: I do not refuse to die
  chosen_spanish: no rehúso morir
  alternatives_spanish:
  - no me niego a morir
  - no rechazo morir
  lexicon: BDAG
  rationale: παραιτέομαι aquí implica rehusar o declinar. 'No rehúso morir' es breve, fiel y mantiene la disposición de Pablo a aceptar la muerte si fuera culpable.
- source_word: οὐδέν ἐστιν ὧν οὗτοι κατηγοροῦσίν μου
  english_pob_choice: there is nothing to the things these men are accusing me of
  chosen_spanish: no hay nada en lo que estos hombres me acusan
  alternatives_spanish:
  - no hay nada en lo que estos hombres me imputan
  - nada hay de verdad en lo que estos hombres me acusan
  lexicon: BDAG
  rationale: La frase griega afirma que las acusaciones carecen de sustancia. En español, 'no hay nada en lo que estos hombres me acusan' intenta conservar esa idea sin añadir explícitamente 'verdad' al texto principal.
- source_word: κατηγοροῦσίν μου
  english_pob_choice: are accusing me of
  chosen_spanish: me acusan
  alternatives_spanish:
  - me imputan
  - presentan cargos contra mí
  lexicon: BDAG
  rationale: El verbo tiene fuerza jurídica de acusación formal; en este contexto, 'me acusan' es claro y natural en español, mientras el complemento relativo anterior ya hace visible el contenido de la acusación.
- source_word: χαρίσασθαι
  english_pob_choice: hand me over to them as a favor
  chosen_spanish: concedérmelo a ellos como favor
  alternatives_spanish:
  - dármelo a ellos como favor
  - entregármelo a ellos como favor
  - cederme a ellos como favor
  lexicon: BDAG
  rationale: El verbo incluye la idea de conceder o dar por favor. 'Concedérmelo a ellos como favor' procura reflejar esa concesión con una estructura española compacta, sin perder la carga de favor político/judicial.
- source_word: Καίσαρα ἐπικαλοῦμαι
  english_pob_choice: I appeal to Caesar
  chosen_spanish: ¡Apelo a César!
  alternatives_spanish:
  - ¡Recurro a César!
  - ¡Apelo al César!
  lexicon: BDAG
  rationale: Es un uso técnico de apelación legal ante el emperador. 'Apelo a César' es la forma más natural y reconocible en español, y conserva el valor procesal del verbo.
- source_word: μὲν οὖν ... δὲ
  english_pob_choice: If, then, ... But if
  chosen_spanish: Si, entonces, ... Pero si
  alternatives_spanish:
  - Si, pues, ... Pero si
  - Si, por tanto, ... Pero si
  lexicon: LSJ
  rationale: Las partículas organizan dos ramas condicionales contrastivas. 'Si, entonces' y 'Pero si' mantienen la progresión argumentativa sin forzar una construcción demasiado literal.
theological_decisions:
- issue: Concesión condicional de la pena de muerte y rechazo de una entrega injusta
  english_pob_reading: Paul acknowledges the legitimacy of capital punishment if he is truly guilty, while denying any right of the governor to surrender him unjustly to his accusers.
  chosen_spanish_reading: Pablo admite que la muerte sería justa si realmente hubiera hecho algo digno de ella, pero niega que el gobernador pueda entregarlo como favor a sus acusadores si las imputaciones no tienen fundamento.
  alternative_spanish_readings:
  - Pablo solo habla de forma retórica sin conceder nada sobre la legitimidad de la pena
  - Pablo niega toda posibilidad de condena, incluso en caso de culpa
  rationale: 'El versículo es principalmente jurídico y debe conservar su tensión: admite la pena capital bajo culpabilidad real, pero rechaza una concesión política al margen de la justicia. La traducción evita suavizar esa dualidad.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje concuerda en lo esencial con la última pasada revisada y con el control cruzado: no se detectaron cambios sustanciales necesarios. Se mantuvo la lectura jurídica de la frase final y la tensión entre culpabilidad legítima y entrega injusta.'
  spanish_consistency_notes:
  - Se conservó 'César' como nombre propio en el sentido legal del texto, sin cambiarlo por 'el emperador' para mantener la forma fija del expediente romano.
  - '''Digno de muerte'' y ''no rehúso morir'' mantienen un registro formal y judicial, coherente con el estilo POB.'
  - La nota al pie se ancla en la expresión 'como favor[a]' porque allí se concentra la ambigüedad de χαρίζομαι.
