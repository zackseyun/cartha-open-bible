translation:
  language: es
  text: 'Y como permanecieron allí muchos días, Festo expuso[a] al rey los asuntos relacionados con Pablo[b], diciendo: «Hay cierto hombre a quien Félix dejó como prisionero»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presentó al rey». El verbo griego sugiere poner un asunto ante alguien para que lo considere, no meramente informar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el caso relacionado con Pablo». La expresión puede referirse más específicamente a la situación legal de Pablo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλείους ἡμέρας
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - varios días
  - más días
  lexicon: BDAG
  rationale: La combinación temporal en contexto expresa una estancia prolongada; «muchos días» es natural en español y conserva el valor de duración sin volverlo demasiado preciso.
- source_word: διέτριβον
  english_pob_choice: they stayed
  chosen_spanish: permanecieron
  alternatives_spanish:
  - se quedaron
  - estuvieron
  lexicon: BDAG
  rationale: διατρίβω aquí significa pasar tiempo o quedarse en un lugar. «Permanecieron» transmite bien la idea de estancia continuada y suena digno en español bíblico moderno.
- source_word: ἀνέθετο
  english_pob_choice: laid before
  chosen_spanish: expuso
  alternatives_spanish:
  - presentó
  - expuso al rey
  - puso ante
  lexicon: BDAG
  rationale: El verbo sugiere poner un asunto delante de alguien para consideración, no solo informar. «Expuso» conserva esa apertura de un caso o asunto ante el rey.
- source_word: τὰ κατὰ τὸν Παῦλον
  english_pob_choice: the matters concerning Paul
  chosen_spanish: los asuntos relacionados con Pablo
  alternatives_spanish:
  - el caso acerca de Pablo
  - las cosas concernientes a Pablo
  lexicon: BDAG
  rationale: La expresión es idiomática y puede aludir al caso legal de Pablo, pero el griego no lo especifica por completo. «Los asuntos relacionados con Pablo» mantiene la amplitud sin sobredeterminar.
- source_word: Ἀνήρ τίς
  english_pob_choice: There is a certain man
  chosen_spanish: cierto hombre
  alternatives_spanish:
  - un hombre cierto
  - hay un hombre
  lexicon: BDAG
  rationale: En discurso directo español, la construcción puede ir sin «hay» para sonar más natural, pero «cierto» conserva el matiz de indefinición específica.
- source_word: καταλελειμμένος
  english_pob_choice: left behind
  chosen_spanish: dejado
  alternatives_spanish:
  - abandonado
  - dejado atrás
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo indica un estado resultante: alguien que ha sido dejado. «Dejado» es fiel y evita añadir la carga emocional de «abandonado».'
- source_word: δέσμιος
  english_pob_choice: as a prisoner
  chosen_spanish: como prisionero
  alternatives_spanish:
  - prisionero
  - en custodia
  lexicon: BDAG
  rationale: '«Prisionero» reproduce el sustantivo griego con claridad. El «como» ayuda a conservar la relación predicativa del griego: quedó en condición de prisionero.'
- source_word: βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Agripa
  lexicon: BDAG
  rationale: El griego dice simplemente «el rey»; la identificación concreta depende del contexto inmediato, así que la traducción conserva el título sin añadir el nombre.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de SBLGNT y el auditable inglés de POB. Se mantuvo la ambigüedad de τὰ κατὰ τὸν Παῦλον con una formulación amplia en español, y se preservó el matiz de ἀνέθετο como presentación de un asunto ante una autoridad, no simple reporte.
  spanish_consistency_notes:
  - Se usa «Pablo» como forma regular para Παῦλος.
  - Se mantiene «prisionero» para δέσμιος, en línea con el valor léxico fuerte del término.
  - Se optó por «Festo» y «el rey» según el contexto narrativo inmediato.
  - La puntuación abre la cita directa con dos puntos y comillas angulares españolas de forma publicable.
