    issue: Las notas al pie están ancladas en palabras equivocadas.
    rationale: La nota [a] explica ἀνέθετο ('expuso/presentó al rey'), pero está puesta en 'hombre'. La nota [b] explica τὰ κατὰ τὸν Παῦλον ('los asuntos/caso relacionado con Pablo'), pero está puesta en 'prisionero'. Esto desajusta la evidencia auditada y puede confundir al lector.
  - severity: medium
    issue: La frase 'hombre dejado por Félix como prisionero' es poco natural en español.
    rationale: Aunque fiel en lo básico, la construcción participial suena forzada. 'a quien Félix dejó como prisionero' conserva el sentido de καταλελειμμένος + δέσμιος con mejor legibilidad.
