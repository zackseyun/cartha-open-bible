- from: Y, porque estaba perplejo[a] acerca de cómo investigar estos asuntos, les pregunté si quería ir a Jerusalén y ser juzgado allí respecto de ellos.
  to: Y, porque estaba perplejo[a] acerca de cómo investigar estos asuntos, le pregunté si quería ir a Jerusalén y ser juzgado allí respecto de ellos.
  rationale: Se corrige 'les pregunté' a 'le pregunté' para ajustarlo al singular del original y al referente correcto, Pablo. Se mantiene el resto porque representa bien el sentido del griego y la línea léxica del POB inglés.
