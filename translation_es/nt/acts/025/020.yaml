translation:
  language: es
  text: Y, porque estaba perplejo[a] acerca de cómo investigar estos asuntos, le pregunté si quería ir a Jerusalén y ser juzgado allí respecto de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estaba confundido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπορούμενος
  english_pob_choice: since I was at a loss
  chosen_spanish: estaba perplejo
  alternatives_spanish:
  - estaba sin saber qué hacer
  - estaba confundido
  - estaba atónito
  lexicon: BDAG
  rationale: El participio expresa desconcierto o falta de salida ante el caso. 'Perplejo' conserva la idea de incertidumbre judicial sin sonar demasiado coloquial. En español conviene separar el valor causal con 'porque'.
- source_word: ζήτησιν
  english_pob_choice: investigation
  chosen_spanish: investigar
  alternatives_spanish:
  - examinar
  - indagar
  - investigar el asunto
  lexicon: BDAG
  rationale: En este contexto legal, el sustantivo apunta a la acción de examinar el caso. El infinitivo 'investigar' refleja bien la idea procesal que la revisión inglesa también captó como 'how to investigate'.
- source_word: ἔλεγον
  english_pob_choice: I asked
  chosen_spanish: les pregunté
  alternatives_spanish:
  - les decía
  - les dije
  lexicon: BDAG
  rationale: Aunque el verbo griego es literalmente 'decía', la pregunta indirecta siguiente muestra la función pragmática de 'preguntar'. En español, 'les pregunté' comunica de forma natural esa estructura.
- source_word: εἰ βούλοιτο
  english_pob_choice: whether he wanted
  chosen_spanish: si quería
  alternatives_spanish:
  - si estaba dispuesto
  - si deseaba
  lexicon: BDAG
  rationale: La optativa en discurso indirecto expresa el contenido de la consulta. 'Si quería' es natural en español y mantiene la idea de voluntad sin sobrecargar el texto.
- source_word: πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - viajar
  - dirigirse
  lexicon: BDAG
  rationale: '''Ir'' es la equivalencia más directa y suficiente en este contexto.'
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: κρίνεσθαι
  english_pob_choice: be judged
  chosen_spanish: ser juzgado
  alternatives_spanish:
  - ser sometido a juicio
  - ser juzgado en juicio
  lexicon: BDAG
  rationale: El infinitivo pasivo tiene sentido forense. 'Ser juzgado' conserva la amplitud del acto judicial sin restringirlo indebidamente a 'ser procesado' o 'ser probado'.
- source_word: κἀκεῖ
  english_pob_choice: and there
  chosen_spanish: allí
  alternatives_spanish:
  - y allí
  - y en ese lugar
  lexicon: BDAG
  rationale: El adverbio 'allí' funciona con naturalidad en español; la conjunción ya está expresada antes por 'y'.
- source_word: περὶ τούτων
  english_pob_choice: concerning them
  chosen_spanish: respecto de ellos
  alternatives_spanish:
  - acerca de ellos
  - sobre ellos
  - con respecto a estos asuntos
  lexicon: BDAG
  rationale: La referencia vuelve a los asuntos discutidos. 'Respecto de ellos' mantiene el referente pronominal y evita una repetición pesada de 'estos asuntos'.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió 'how to investigate these matters' frente a una construcción más pesada. Por eso en español se optó por una frase verbal directa ('cómo investigar estos asuntos') en lugar de una perífrasis más abstracta. También se conservó el valor forense de κρίνεσθαι con 'ser juzgado'.
  spanish_consistency_notes:
  - Se usó 'Jerusalén' como nombre propio convencional en español.
  - Se mantuvo un registro formal y claro, adecuado para lectura eclesial moderna.
  - Se evitó reemplazar el matiz judicial por una expresión más teológica o interpretativa.
  - La primera mención de la incertidumbre se marcó con nota para preservar la alternativa semántica del griego.
