    rationale: El verbo griego, según la auditoría, significa dar a conocer un asunto ante una autoridad y aquí probablemente tiene matiz legal, pero no exige «acusaciones» como formulación explícita. «Su caso contra Pablo» conserva mejor la amplitud y el matiz forense.
  - severity: medium
    issue: La nota [a] está anclada en «los judíos» en lugar de «hombres principales»
    rationale: La nota explica πρῶτοι / «hombres principales», por lo que debe marcarse en esa frase para evitar ambigüedad textual.
