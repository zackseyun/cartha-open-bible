translation:
  language: es
  text: Así que los principales sacerdotes y los hombres principales[a] de los judíos le expusieron su caso contra Pablo, y le instaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «los hombres principales» conserva el matiz masculino del griego πρῶτοι; también podría entenderse de forma más general como «los principales» o «los líderes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεφάνισάν
  english_pob_choice: presented their case against
  chosen_spanish: le presentaron sus acusaciones contra
  alternatives_spanish:
  - le informaron acerca de
  - le dieron a conocer
  - presentaron su caso contra
  lexicon: BDAG
  rationale: El verbo admite desde «dar a conocer» hasta una presentación formal ante una autoridad. En este contexto judicial ante el gobernador, «le presentaron sus acusaciones contra» conserva la fuerza forense que el POB inglés identifica, sin convertirlo en un tecnicismo legal más fuerte que el griego.
- source_word: τέ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: La partícula enlaza el relato con lo anterior. En español, «Así que» mantiene esa continuidad discursiva con naturalidad, equivalente al «So» del POB inglés.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» refleja el grupo de liderazgo sacerdotal con un español amplio y reconocido. Evita una carga eclesiástica ajena y conserva el sentido de liderazgo institucional del plural griego.
- source_word: οἱ πρῶτοι τῶν Ἰουδαίων
  english_pob_choice: the leading men of the Jews
  chosen_spanish: los hombres principales de los judíos
  alternatives_spanish:
  - los principales de los judíos
  - los líderes de los judíos
  - los varones principales de los judíos
  lexicon: BDAG
  rationale: πρῶτοι aquí señala a personas prominentes. «Hombres principales» conserva la referencia masculina y la idea de estatus social/político distinguido, más cercana al griego que una reducción genérica a «líderes».
- source_word: κατὰ τοῦ Παύλου
  english_pob_choice: against Paul
  chosen_spanish: contra Pablo
  alternatives_spanish:
  - en contra de Pablo
  - acerca de Pablo
  lexicon: BDAG
  rationale: La preposición con genitivo expresa oposición o acusación. «Contra Pablo» reproduce esa postura adversa de manera directa y natural en español.
- source_word: παρεκάλουν
  english_pob_choice: urged
  chosen_spanish: le instaban
  alternatives_spanish:
  - le rogaban
  - le suplicaban
  - le pedían insistentemente
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o sostenida. «Le instaban» conserva esa insistencia sin cargar el texto con una emoción mayor que la del contexto político-judicial.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a él mismo
  lexicon: BDAG
  rationale: El pronombre retoma a Festo como destinatario de la presión de los acusadores. En español, el dativo se expresa naturalmente con «le».
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y la lectura auditada del POB inglés. Se conserva la naturaleza forense de ἐνεφάνισάν con una formulación española más explícita que «informaron», y se refleja la insistencia imperfectiva de παρεκάλουν con «le instaban». No se detectaron revisiones previas aplicadas en el expediente.
  spanish_consistency_notes:
  - Se usa «Pablo» y no «Saulo», conforme al nombre en el contexto.
  - Se usa «principales sacerdotes» para οἱ ἀρχιερεῖς, manteniendo un término comprensible y consistente con el liderazgo sacerdotal.
  - Se evita «SEÑOR» u otras convenciones de ocultamiento del nombre divino, porque este versículo no contiene el tetragrámaton ni una cita directa del Nombre.
