translation:
  language: es
  text: Y cuando llegó, los judíos que habían bajado de Jerusalén se pusieron alrededor de él[a], presentando muchas acusaciones graves que no podían probar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo rodearon». El verbo griego puede enfatizar que se colocaron alrededor de él, con esa postura de cerco implicando presión en el contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενομένου δὲ αὐτοῦ
  english_pob_choice: And when he arrived
  chosen_spanish: Y cuando él llegó
  alternatives_spanish:
  - Y cuando él arribó
  - Y cuando él apareció
  lexicon: BDAG
  rationale: El genitivo absoluto marca circunstancia temporal. «Cuando él llegó» expresa con naturalidad el inicio de la escena judicial sin perder la secuencia del griego.
- source_word: περιέστησαν αὐτόν
  english_pob_choice: stood around him
  chosen_spanish: lo rodearon
  alternatives_spanish:
  - se pusieron alrededor de él
  - se agruparon en torno a él
  lexicon: BDAG
  rationale: El verbo puede describir a alguien rodeado o a personas que se colocan alrededor. En español, «lo rodearon» comunica bien la postura colectiva y el contexto forense sin sonar forzado.
- source_word: οἱ ἀπὸ Ἱεροσολύμων καταβεβηκότες Ἰουδαῖοι
  english_pob_choice: the Jews who had come down from Jerusalem
  chosen_spanish: los judíos que habían bajado de Jerusalén
  alternatives_spanish:
  - los judeanos que habían bajado de Jerusalén
  - los judíos procedentes de Jerusalén
  lexicon: BDAG
  rationale: Aquí Ἰουδαῖοι se refiere a acusadores judíos provenientes de Jerusalén. «Judíos» es la opción más idiomática en español y conserva el referente histórico señalado por el contexto.
- source_word: πολλὰ καὶ βαρέα αἰτιώματα
  english_pob_choice: many serious charges
  chosen_spanish: muchas acusaciones graves
  alternatives_spanish:
  - muchos cargos graves
  - muchas acusaciones serias
  lexicon: BDAG
  rationale: αἰτιώματα tiene sentido legal de acusaciones o cargos, y βαρέα añade gravedad. «Acusaciones graves» mantiene el matiz jurídico y la intensidad de la expresión.
- source_word: καταφέροντες
  english_pob_choice: bringing
  chosen_spanish: presentando
  alternatives_spanish:
  - formulando
  - sosteniendo
  lexicon: BDAG
  rationale: En el contexto legal el participio implica traer o presentar cargos contra alguien. «Presentando» funciona con naturalidad en español y refleja la acción procesal.
- source_word: ἃ οὐκ ἴσχυον ἀποδεῖξαι
  english_pob_choice: that they were not able to prove
  chosen_spanish: que no podían probar
  alternatives_spanish:
  - que no podían demostrar
  - que no lograban probar
  lexicon: BDAG
  rationale: ἴσχυον con infinitivo expresa capacidad; ἀποδεῖξαι significa probar o demostrar. «No podían probar» conserva la negación de capacidad en una forma breve y clara.
translation_notes:
  revision_awareness: 'El texto inglés POB fue revisado y quedó sin cambios (latest_revision_pass: unchanged=true). La presente versión española sigue ese mismo estado estable, sin introducir ajustes textuales más allá de la adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαῖοι, en coherencia con la nota auditada del inglés POB; el contexto aclara que son acusadores venidos de Jerusalén.
  - Se evita «Mesías/Cristo» y terminología teológica ajena, porque el versículo es narrativo-procesal.
  - «Acusaciones graves» conserva el registro judicial del pasaje mejor que una paráfrasis general.
  - 'Las notas a y b se anclan en los puntos de mayor ambigüedad lexical: temporalidad del genitivo absoluto y alcance de περιέστησαν.'
