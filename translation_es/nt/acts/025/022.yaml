  to: 'Entonces Agripa dijo a Festo: «Yo mismo querría[a] oír al hombre[b]». «Mañana», dice[c], «lo oirás[d]».'
  rationale: Se revisa para eliminar el matiz deíctico añadido en «ese hombre», ajustando mejor τοῦ ἀνθρώπου a «al hombre». También se elimina una nota poco sustantiva y se añaden notas que preservan las alternativas semánticas relevantes documentadas en la auditoría inglesa, especialmente para ἀκούσῃ αὐτοῦ.
