translation:
  language: es
  text: 'Entonces Agripa dijo a Festo: «Yo mismo querría[a] oír al hombre[b]». «Mañana», dice[c], «lo oirás[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «yo también querría oír al hombre», tomando καὶ αὐτὸς con sentido aditivo más que principalmente enfático.
    reason: lexical_alternative
  - marker: b
    text: Griego, «al hombre». El texto no marca explícitamente la deixis de «ese» o «este».
    reason: lexical_alternative
  - marker: c
    text: 'El griego conserva el presente histórico: «dice». Algunas traducciones lo suavizan como «dijo».'
    reason: lexical_alternative
  - marker: d
    text: O, «oirás de él». La expresión griega también puede significar oír hablar directamente de labios de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγρίππας
  english_pob_choice: Agrippa
  chosen_spanish: Agripa
  alternatives_spanish:
  - Agripa (sin adaptar)
  - Agripa
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar al español bíblico, manteniendo la referencia histórica sin traducirlo.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo suave; «Entonces» conserva la progresión del relato en español natural.
- source_word: πρὸς τὸν Φῆστον
  english_pob_choice: said to Festus
  chosen_spanish: dijo a Festo
  alternatives_spanish:
  - habló con Festo
  - se dirigió a Festo
  lexicon: BDAG
  rationale: Con verbos de habla, πρός se expresa idiomáticamente en español como «dijo a», evitando un calco preposicional.
- source_word: Ἐβουλόμην
  english_pob_choice: would like
  chosen_spanish: querría
  alternatives_spanish:
  - quería
  - quisiera
  - me gustaría
  lexicon: BDAG
  rationale: El imperfecto de βούλομαι expresa deseo en curso o intención; «querría» mantiene una cortesía/voluntad deseada sin perder del todo la fuerza imperfectiva, y evita sonar excesivamente coloquial.
- source_word: καὶ αὐτὸς
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo también
  - Yo mismo también
  lexicon: BDAG
  rationale: La combinación es enfática más que aditiva; «Yo mismo» preserva ese énfasis en español de modo natural.
- source_word: τοῦ ἀνθρώπου
  english_pob_choice: the man
  chosen_spanish: a ese hombre
  alternatives_spanish:
  - al hombre
  - a este hombre
  - a ese persona
  lexicon: BDAG
  rationale: En el contexto judicial, el referente es Pablo como individuo concreto. «Ese hombre» refleja la referencia deíctica y el tono del diálogo; con ἀκούω no se fuerza un objeto directo explícito en español.
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - oírlo
  lexicon: BDAG
  rationale: En este contexto judicial, ἀκοῦσαι se refiere a escuchar a la persona hablar o conocer su caso. «Oír» reproduce mejor la simplicidad del griego y el matiz directo del juicio.
- source_word: Αὔριον
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  lexicon: BDAG
  rationale: Adverbio temporal directo; «Mañana» conserva la respuesta breve y enfática de Festo.
- source_word: φησίν
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», como lo hace la POB en inglés.
- source_word: ἀκούσῃ αὐτοῦ
  english_pob_choice: you will hear him
  chosen_spanish: lo oirás
  alternatives_spanish:
  - oirás de él
  - lo escucharás
  lexicon: BDAG
  rationale: La expresión griega puede significar oír a la persona directamente o recibir noticias de ella. «Lo oirás» mantiene la ambigüedad útil y encaja con el contexto de audiencia judicial.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y toma como contexto de auditoría la elección inglesa reciente de «would like» para Ἐβουλόμην, pero la vierte al español con un matiz natural y reverente («querría») sin perder la imperfectividad ni el valor de cortesía/voluntad. También conserva el presente histórico de φησίν.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece.
  - Se mantiene «Festo» y «Agripa» como nombres propios usuales en español bíblico.
  - Se prefiere «oír» frente a «escuchar» por el valor directo del verbo griego en contexto judicial.
  - La frase «ese hombre» conserva la referencia concreta a Pablo sin introducir explicaciones ajenas al texto.
