base_translation:
  language: en
  yaml_path: translation/nt/acts/025/022.yaml
  text: Then Agrippa said to Festus[a], “I myself would like to hear the man.” “Tomorrow,” he says[c][b], “you will hear him.”
  footnotes:
  - marker: a
    text: Or, 'I too wanted to hear the man,' taking καὶ αὐτὸς with an additive sense rather than primarily emphatic.
    reason: lexical_alternative
  - marker: b
    text: 'Greek has the historical present: ''he says.'' Some translations smooth this to ''he said.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'you will hear from him.' The Greek expression can mean hearing the person speak directly.
    reason: lexical_alternative
