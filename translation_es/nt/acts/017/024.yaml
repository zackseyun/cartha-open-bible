translation:
  language: es
  text: El Dios que hizo el mundo y todo lo que hay en él[a], siendo Señor del cielo y de la tierra, no habita en templos hechos por manos humanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templos hechos con manos». La frase significa templos construidos por seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας
  english_pob_choice: who made
  chosen_spanish: que hizo
  alternatives_spanish:
  - que creó
  - habiendo hecho
  lexicon: BDAG
  rationale: El aoristo participio modifica a ὁ θεός. «Que hizo» conserva la relación participial en español con fluidez natural; «creó» es posible, pero «hizo» refleja más directamente ποιέω en este contexto.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el universo
  - el cosmos
  lexicon: BDAG
  rationale: κόσμος aquí designa el orden creado en su conjunto. «El mundo» es la equivalencia idiomática más natural en español y mantiene el alcance amplio del término.
- source_word: πάντα τὰ ἐν αὐτῷ
  english_pob_choice: everything in it
  chosen_spanish: todo lo que hay en él
  alternatives_spanish:
  - todas las cosas en él
  - todo dentro de él
  lexicon: BDAG
  rationale: La expresión amplía «el mundo» para incluir todo lo contenido en él. «Todo lo que hay en él» conserva la fuerza inclusiva de πάντα τὰ ἐν αὐτῷ con español claro y reverente.
- source_word: ὑπάρχων κύριος
  english_pob_choice: being Lord
  chosen_spanish: siendo Señor
  alternatives_spanish:
  - puesto que es Señor
  - como Señor
  lexicon: BDAG
  rationale: ὑπάρχων indica un estado existente; «siendo Señor» reproduce mejor esa construcción que una causal explícita. «Señor» mantiene el valor soberano de κύριος según el estándar del proyecto.
- source_word: οὐρανοῦ καὶ γῆς
  english_pob_choice: of heaven and earth
  chosen_spanish: del cielo y de la tierra
  alternatives_spanish:
  - de los cielos y de la tierra
  - del cielo y la tierra
  lexicon: BDAG
  rationale: La relación genitiva depende de «Señor». «Del cielo y de la tierra» es la pareja bíblica natural en español y conserva el alcance cósmico del original.
- source_word: χειροποιήτοις
  english_pob_choice: made by hands
  chosen_spanish: hechos por manos humanas
  alternatives_spanish:
  - hechos por la mano de hombres
  - fabricados por manos humanas
  lexicon: BDAG
  rationale: χειροποίητος significa hecho por manos humanas. «Hechos por manos humanas» expresa con claridad la oposición entre el Creador y los santuarios construidos por personas.
- source_word: ναοῖς
  english_pob_choice: temples
  chosen_spanish: templos
  alternatives_spanish:
  - santuarios
  - sala sagrada
  lexicon: BDAG
  rationale: ναός se refiere a un templo o santuario como lugar sagrado. En este contexto areopagita, «templos» es la equivalencia más clara y comprensible.
- source_word: κατοικεῖ
  english_pob_choice: does not dwell
  chosen_spanish: no habita
  alternatives_spanish:
  - no mora
  - no reside
  lexicon: BDAG
  rationale: κατοικέω significa habitar/residir. «No habita» conserva el registro bíblico en español y mantiene el contraste con los templos humanos.
theological_decisions:
- issue: Trascendencia divina frente a localización en el templo
  english_pob_reading: The verse states that the Creator and Lord of heaven and earth is not localized in human-made temples.
  chosen_spanish_reading: El versículo afirma que el Creador y Señor del cielo y de la tierra no está localizado en templos hechos por manos humanas.
  alternative_spanish_readings:
  - Dios no puede ser confinado en templos hechos por manos humanas.
  - Dios no habita en templos humanos como si estuviera contenido en ellos.
  rationale: La traducción mantiene la afirmación directa del texto sin convertirla en una paráfrasis más amplia. «No habita en templos hechos por manos humanas» comunica la trascendencia divina y la oposición entre Creador y santuario construido.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide con la revisión inglesa más reciente, sin necesidad de cambios respecto del sentido auditado. Se conserva la tensión entre la trascendencia de Dios y la noción de templos construidos por seres humanos.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme al estándar del proyecto.
  - «Mundo» se usa para κόσμος en sentido amplio de creación ordenada.
  - «No habita» conserva el registro bíblico sin recurrir a una paraphrasis interpretativa.
  - La nota al pie preserva la alternativa léxica documentada para χειροποιήτοις.
