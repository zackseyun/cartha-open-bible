  - severity: low
    issue: «Entre ellos» refleja el sentido, pero «entre quienes estaban» representa más de cerca la construcción relativa ἐν οἷς.
    rationale: No es un error de sentido, pero la formulación relativa conecta mejor a los ejemplos nombrados con el grupo de quienes creyeron.
