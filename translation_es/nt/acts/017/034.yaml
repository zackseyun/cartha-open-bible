- from: Pero algunos hombres se unieron a él y creyeron[a], entre ellos Dionisio, el areopagita, y una mujer llamada Damaris[b], y otros con ellos.
  to: Pero algunos hombres se unieron a él y creyeron[a], entre quienes estaban también Dionisio, el areopagita[b], y una mujer llamada Damaris, y otros con ellos.
  rationale: Se corrige la ubicación de la nota cultural para que explique «areopagita», como en el audit trail inglés y según el griego ὁ Ἀρεοπαγίτης. Además, se ajusta «entre ellos» a «entre quienes estaban también» para reflejar mejor la construcción ἐν οἷς sin cambiar el sentido.
