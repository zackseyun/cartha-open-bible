translation:
  language: es
  text: Y según la costumbre[a] de Pablo, entró a donde ellos, y en tres sábados[b] razonó con ellos a partir de las Escrituras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como era costumbre de Pablo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «durante tres sábados».'
    reason: alternative_reading
  - marker: c
    text: 'O: «discutió con ellos» o «dialogó con ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ δὲ τὸ εἰωθὸς τῷ Παύλῳ
  english_pob_choice: according to Paul's custom
  chosen_spanish: y según la costumbre de Pablo
  alternatives_spanish:
  - como era costumbre de Pablo
  - según lo acostumbrado por Pablo
  lexicon: BDAG
  rationale: La construcción κατά + artículo + participio perfecto de εἴωθα expresa una práctica habitual establecida. 'Según la costumbre de Pablo' conserva el sentido idiomático y suena natural en español sin expandir indebidamente el texto.
- source_word: εἰσῆλθεν πρὸς αὐτοὺς
  english_pob_choice: he went in to them
  chosen_spanish: entró donde ellos
  alternatives_spanish:
  - entró a donde ellos
  - fue a ellos
  lexicon: BDAG
  rationale: εἰσέρχομαι indica entrar, y πρὸς αὐτούς añade dirección relacional. 'Entró donde ellos' conserva el movimiento de entrada y evita especificar más de lo que el griego dice en este versículo.
- source_word: ἐπὶ σάββατα τρία
  english_pob_choice: on three Sabbaths
  chosen_spanish: por tres sábados
  alternatives_spanish:
  - durante tres sábados
  - en tres sábados
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí marca distribución temporal sobre un período. En español, 'por tres sábados' comunica mejor la duración/reiteración de la actividad que una traducción demasiado literal o rígida.
- source_word: διελέξατο
  english_pob_choice: he reasoned with them
  chosen_spanish: razonó con ellos
  alternatives_spanish:
  - discutió con ellos
  - dialogó con ellos
  - argumentó con ellos
  lexicon: BDAG
  rationale: διαλέγομαι en Hechos suele indicar conversación argumentativa o razonamiento. 'Razonó con ellos' preserva la fuerza persuasiva sin cargar el verbo con una connotación hostil.
- source_word: ἀπὸ τῶν γραφῶν
  english_pob_choice: from the Scriptures
  chosen_spanish: desde las Escrituras
  alternatives_spanish:
  - a partir de las Escrituras
  - de las Escrituras
  lexicon: BDAG
  rationale: γραφή en plural en contexto judío-cristiano designa las Escrituras reconocidas. 'Desde las Escrituras' refleja bien el punto de partida textual del razonamiento de Pablo, con un matiz de base argumentativa.
theological_decisions:
- issue: Referente implícito de "ellos"
  english_pob_reading: Retain the pronoun 'them' without specifying 'the Jews' or 'the people in the synagogue' in the main text.
  chosen_spanish_reading: Mantener 'ellos' sin añadir 'los judíos' o 'la sinagoga' en el texto principal.
  alternative_spanish_readings:
  - entró en la sinagoga
  - entró donde estaban los judíos
  rationale: El contexto inmediato aclara el escenario, pero este versículo usa pronombres, no un sustantivo explícito. Mantener 'ellos' evita introducir una precisión que el griego no formula aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés sin depender mecánicamente de él; se conservan las decisiones clave sobre la costumbre habitual de Pablo, la entrada hacia ellos, la extensión temporal de ἐπὶ σάββατα τρία, el matiz argumentativo de διελέξατο y el punto de partida escritural de ἀπὸ τῶν γραφῶν. No se registraron revisiones posteriores con cambios sustantivos.
  spanish_consistency_notes:
  - Se usa 'Pablo' sin artículo, conforme al griego y al uso narrativo.
  - '''Escrituras'' se mantiene en plural con mayúscula, como término bíblico establecido.'
  - '''Razonó con ellos'' conserva el tono de exposición persuasiva propio de Hechos.'
  - La nota [a] se coloca en 'costumbre' para reflejar la ambigüedad entre fórmula idiomática y lectura descriptiva.
  - La nota [b] se ancla en 'sábados' para expresar la posible lectura temporal alternativa.
  - La nota [c] se ancla en 'razonó' porque el verbo griego admite varias equivalencias cercanas en español.
