translation:
  language: es
  text: Y algunos de ellos fueron persuadidos y se unieron a Pablo y a Silas[a], junto con un gran número de griegos temerosos de Dios y no pocas de las mujeres principales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «echaron su suerte con Pablo y Silas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες ἐξ αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - algunos de entre ellos
  - unos cuantos de ellos
  lexicon: BDAG
  rationale: La expresión partititiva se conserva de forma natural en español con «algunos de ellos». Evita sobreexplicar y sigue el referente inmediato del contexto.
- source_word: ἐπείσθησαν
  english_pob_choice: were persuaded
  chosen_spanish: fueron persuadidos
  alternatives_spanish:
  - quedaron convencidos
  - creyeron
  lexicon: BDAG
  rationale: Se mantiene el valor verbal de πείθω como respuesta a la predicación, sin sustituirlo por un término más explícito de fe que el griego no usa aquí. «Fueron persuadidos» es fiel y digno; conserva la tensión entre persuasión y respuesta de fe.
- source_word: προσεκληρώθησαν
  english_pob_choice: joined
  chosen_spanish: se unieron
  alternatives_spanish:
  - se asociaron con
  - se adhirieron a
  - echaron su suerte con
  lexicon: BDAG
  rationale: El verbo raro expresa afiliación o asociación con Pablo y Silas. «Se unieron» comunica bien esa idea en español moderno; la alternativa más literal queda preservada en la nota.
- source_word: τῷ Παύλῳ καὶ τῷ Σιλᾷ
  english_pob_choice: Paul and Silas
  chosen_spanish: a Pablo y a Silas
  alternatives_spanish:
  - con Pablo y Silas
  lexicon: BDAG
  rationale: El dativo relacional se expresa naturalmente con «a» después de «se unieron». Esto evita una construcción rígida y conserva la relación personal del verbo.
- source_word: τῶν τε σεβομένων Ἑλλήνων
  english_pob_choice: the God-fearing Greeks
  chosen_spanish: de los griegos temerosos de Dios
  alternatives_spanish:
  - de los griegos piadosos
  - de los griegos devotos
  - de los griegos que reverenciaban a Dios
  lexicon: BDAG
  rationale: «Temerosos de Dios» reproduce la expresión técnica de Hechos para gentiles vinculados a la adoración del Dios de Israel. Se prefiere esta forma a «devotos» porque preserva mejor la referencia histórica y religiosa.
- source_word: πλῆθος πολὺ
  english_pob_choice: a large number
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - un gran número
  - una multitud numerosa
  lexicon: BDAG
  rationale: La construcción nominal se vierte con una expresión natural y elevada en español. «Una gran multitud» mantiene el énfasis cuantitativo sin sonar demasiado técnico.
- source_word: γυναικῶν τε τῶν πρώτων
  english_pob_choice: the leading women
  chosen_spanish: y no pocas de las mujeres principales
  alternatives_spanish:
  - y no pocas de las mujeres de primera posición
  - y no pocas de las mujeres prominentes
  lexicon: BDAG
  rationale: «Τῶν πρώτων» aquí apunta a mujeres de estatus o prominencia social, no a orden cronológico. «Mujeres principales» conserva esa idea en un español sobrio y entendido.
- source_word: οὐκ ὀλίγαι
  english_pob_choice: not a few
  chosen_spanish: no pocas
  alternatives_spanish:
  - bastantes
  - muchas
  lexicon: BDAG
  rationale: 'Se preserva la litotes de Lucas: «no pocas» mantiene el subrayado retórico mejor que convertirlo directamente en «muchas».'
- source_word: τε ... τε
  english_pob_choice: along with ... and
  chosen_spanish: junto con ... y
  alternatives_spanish:
  - así como ... y
  - tanto ... como
  lexicon: BDAG
  rationale: La coordinación aditiva se expresa de manera fluida en español con «junto con ... y». Se conserva la suma de grupos sin forzar una simetría artificial.
theological_decisions:
- issue: Si ἐπείσθησαν debe traducirse con lenguaje explícito de conversión
  english_pob_reading: were persuaded
  chosen_spanish_reading: fueron persuadidos
  alternative_spanish_readings:
  - creyeron
  - se convirtieron
  rationale: El griego usa πείθω, no πιστεύω. Por eso se evita traducir directamente con «creyeron» o «se convirtieron», aunque el contexto evangelístico permita inferir una respuesta de fe.
  doctrine_reference: 'Translation philosophy #1, #3'
- issue: Cómo expresar σεβομένων Ἑλλήνων sin borrar su sentido histórico-religioso
  english_pob_reading: the God-fearing Greeks
  chosen_spanish_reading: los griegos temerosos de Dios
  alternative_spanish_readings:
  - los griegos devotos
  - los griegos piadosos
  - los griegos que adoraban a Dios
  rationale: En Hechos, la expresión designa a gentiles relacionados con la adoración del Dios de Israel. «Temerosos de Dios» es la forma más precisa y reconocible en español para ese grupo.
  doctrine_reference: 'Translation philosophy #1, #6'
- issue: Cómo reflejar τῶν πρώτων sin introducir un sentido eclesiástico ajeno
  english_pob_reading: the leading women
  chosen_spanish_reading: las mujeres principales
  alternative_spanish_readings:
  - las mujeres prominentes
  - las mujeres de alto rango
  - las mujeres de primera posición
  rationale: El adjetivo indica estatus social, no liderazgo ministerial. «Principales» preserva la noción de prominencia sin cargar el término con una interpretación posterior.
  doctrine_reference: 'Translation philosophy #1'
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego SBLGNT y se mantuvo la lectura del audit trail inglés: πείθω como «persuadidos», προσκληρόομαι como afiliación/adhesión, σεβόμενοι como término técnico para gentiles temerosos de Dios, y πρῶτοι como prominencia social. La redacción española se ajustó para ser publicable y natural, sin perder estas distinciones.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «griegos temerosos de Dios» para mantener el valor histórico-religioso del grupo descrito en Hechos.
  - «No pocas» preserva la litotes del original, en línea con el audit trail inglés.
  - La nota al pie mantiene la alternativa más literal documentada para προσεκληρώθησαν.
