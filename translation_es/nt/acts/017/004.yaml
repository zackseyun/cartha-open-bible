- from: Y algunos de ellos fueron persuadidos y se unieron a Pablo y a Silas[a], junto con una gran multitud de los griegos temerosos de Dios y no pocas de las mujeres principales.
  to: Y algunos de ellos fueron persuadidos y se unieron a Pablo y a Silas[a], junto con un gran número de griegos temerosos de Dios y no pocas de las mujeres principales.
  rationale: Se ajusta «una gran multitud» a «un gran número» para reflejar mejor πλῆθος πολὺ en contexto, se aligera la frase eliminando el artículo innecesario antes de «griegos temerosos de Dios», y se pule la redacción editorial de la nota al pie. No se requieren cambios doctrinales ni adjudicación adicional.
