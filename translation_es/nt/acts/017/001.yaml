translation:
  language: es
  text: Después de pasar por Anfípolis[a] y Apolonia, llegaron a Tesalónica, donde había una sinagoga de los judíos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Habiendo pasado por Anfípolis y Apolonia».
    reason: lexical_alternative
  - marker: b
    text: O «donde estaba la sinagoga de los judíos», aunque el griego no lleva artículo delante de «sinagoga».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διοδεύσαντες
  english_pob_choice: After passing through
  chosen_spanish: Después de pasar por
  alternatives_spanish:
  - Habiendo pasado por
  - Tras pasar por
  lexicon: BDAG
  rationale: El participio aoristo antecede a ἦλθον; en español, una construcción temporal natural con 'después de' expresa bien la acción previa sin volverla pesada ni demasiado literal.
- source_word: Ἀμφίπολιν
  english_pob_choice: Amphipolis
  chosen_spanish: Anfípolis
  alternatives_spanish:
  - Amfípolis
  lexicon: Nombre propio geográfico; transliteración estándar
  rationale: Se translitera el topónimo al uso español, manteniendo la referencia histórica y la legibilidad.
- source_word: Ἀπολλωνίαν
  english_pob_choice: Apollonia
  chosen_spanish: Apolonia
  alternatives_spanish:
  - Apollonia
  lexicon: Nombre propio geográfico; transliteración estándar
  rationale: Se adapta al nombre propio tradicional en español, conservando la identificación geográfica.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: '''Llegaron'' comunica claramente el movimiento con sentido narrativo de arribo y evita una calca demasiado simple de ''vinieron'' en este contexto.'
- source_word: εἰς Θεσσαλονίκην
  english_pob_choice: to Thessalonica
  chosen_spanish: a Tesalónica
  alternatives_spanish:
  - hacia Tesalónica
  - hasta Tesalónica
  lexicon: BDAG
  rationale: '''A'' expresa de forma natural el destino de movimiento hacia una ciudad; ''Tesalónica'' es la forma habitual en español.'
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  lexicon: BDAG
  rationale: '''Donde'' reproduce la cláusula locativa con naturalidad en español.'
- source_word: συναγωγὴ
  english_pob_choice: a synagogue
  chosen_spanish: una sinagoga
  alternatives_spanish:
  - la sinagoga
  lexicon: BDAG
  rationale: El griego carece de artículo; 'una sinagoga' refleja mejor el carácter anartro y sigue la decisión auditada del POB inglés.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judíos de Judea
  - de la comunidad judía
  lexicon: BDAG
  rationale: Se conserva la designación étnico-religiosa directa del griego. 'Judíos' es la equivalencia más inmediata y evita ampliar indebidamente el referente.
theological_decisions:
- issue: Ἰουδαίων como designación comunitaria en contexto narrativo
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - la comunidad judía
  - los judeanos
  rationale: En este contexto se refiere a la comunidad judía asociada con la sinagoga en Tesalónica. 'Los judíos' es la forma más directa y fiel; 'los judeanos' desplazaría el sentido geográfico y 'la comunidad judía' explicitaría más de lo que dice el texto.
  doctrine_reference: Principio de primacía del texto original y equivalencia semántica transparente
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la redacción española sigue la lectura estable y alta concordancia del pasaje, preservando la alternativa sobre el participio y la ausencia de artículo en 'sinagoga'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa 'judíos' para Ἰουδαίων conforme al contexto narrativo y a la auditoría inglesa.
  - Se evita 'Cristo'/'Mesías' porque no aparece en el versículo.
  - Se conserva el orden narrativo simple del griego sin añadir matices interpretativos innecesarios.
