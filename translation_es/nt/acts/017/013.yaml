  text: ὡς δὲ ἔγνωσαν οἱ ἀπὸ τῆς Θεσσαλονίκης Ἰουδαῖοι ὅτι καὶ ἐν τῇ Βεροίᾳ κατηγγέλη ὑπὸ τοῦ Παύλου ὁ λόγος τοῦ θεοῦ, ἦλθον κἀκεῖ σαλεύοντες ⸂καὶ ταράσσοντες⸃ τοὺς ὄχλους.
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/013.yaml
  text: But when the Jews from Thessalonica learned that the word of God had been proclaimed by Paul in Berea also[a], they came there too[b], stirring up and troubling the crowds.
  footnotes:
  - marker: a
    text: Or 'was proclaimed' instead of 'had been proclaimed'; the Greek aorist passive can be rendered either way in English depending on how tightly the sequence is expressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'stirring up and disturbing the crowds.' The two participles overlap but likely intensify the picture of public agitation.
    reason: lexical_alternative
