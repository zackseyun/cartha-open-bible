translation:
  language: es
  text: Pero cuando los judíos de Tesalónica se enteraron de que también en Berea la palabra de Dios había sido proclamada por Pablo[a], fueron allí también, agitando[b] y perturbando a las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se había proclamado». El aoristo pasivo griego puede expresarse en español de más de una manera según cuán explícita se quiera hacer la secuencia temporal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «incitando». Los dos participios se superponen, pero juntos intensifican la imagen de agitación pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: Mantiene el giro narrativo y la leve contraposición del δέ, con una temporalidad natural en español.
- source_word: ἔγνωσαν
  english_pob_choice: learned
  chosen_spanish: se enteraron
  alternatives_spanish:
  - supieron
  - llegaron a saber
  lexicon: BDAG
  rationale: Expresa el matiz de llegar a conocer una noticia en contexto narrativo, sin reducirlo a posesión estática de conocimiento.
- source_word: οἱ ἀπὸ τῆς Θεσσαλονίκης Ἰουδαῖοι
  english_pob_choice: the Jews from Thessalonica
  chosen_spanish: los judíos de Tesalónica
  alternatives_spanish:
  - los judíos tesalonicenses
  - los judíos que eran de Tesalónica
  lexicon: BDAG
  rationale: Identifica al grupo por procedencia de manera clara y natural en español, sin generalizar indebidamente a todos los judíos.
- source_word: ὅτι καὶ ἐν τῇ Βεροίᾳ
  english_pob_choice: that ... in Berea also
  chosen_spanish: de que también en Berea
  alternatives_spanish:
  - de que en Berea también
  - de que asimismo en Berea
  lexicon: BDAG
  rationale: Conserva el valor aditivo de καί y su vínculo con el lugar adicional donde ocurrió la proclamación.
- source_word: κατηγγέλη
  english_pob_choice: had been proclaimed
  chosen_spanish: se había proclamado
  alternatives_spanish:
  - se proclamó
  - había sido proclamada
  lexicon: BDAG
  rationale: La pasiva aorística de καταγγέλλω se vierte con una pasiva refleja natural en español; el pluscuamperfecto preserva la secuencia temporal del relato.
- source_word: ὑπὸ τοῦ Παύλου
  english_pob_choice: by Paul
  chosen_spanish: por Pablo
  alternatives_spanish:
  - a través de Pablo
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agente personal; 'por Pablo' es la forma directa y idiomática en español.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios hablada
  - el mensaje de Dios
  lexicon: BDAG
  rationale: '''Palabra de Dios'' es la equivalencia española más estable para λόγος en este contexto de anuncio divino, preservando la resonancia teológica sin sobreespecificar.'
- source_word: ἦλθον κἀκεῖ
  english_pob_choice: they came there too
  chosen_spanish: fueron allá también
  alternatives_spanish:
  - vinieron allí también
  - fueron también allí
  lexicon: BDAG
  rationale: κἀκεῖ significa 'allí también/ahí también'; 'fueron allá también' fluye bien en español y mantiene la idea de extensión geográfica de su oposición.
- source_word: σαλεύοντες
  english_pob_choice: stirring up
  chosen_spanish: agitando
  alternatives_spanish:
  - alborotando
  - incitando
  lexicon: BDAG
  rationale: Conserva la imagen de causar agitación pública; en español, 'agitando' es breve y compatible con el participio presente del original.
- source_word: καὶ ταράσσοντες
  english_pob_choice: and troubling
  chosen_spanish: perturbando
  alternatives_spanish:
  - y disturbando
  - y alborotando
  lexicon: BDAG
  rationale: 'Retiene la segunda participio con un término distinto del primero para no borrar la intensificación: no sólo agitan, sino que también perturban.'
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a los grupos de gente
  - a la multitud
  lexicon: BDAG
  rationale: ὄχλοι designa grupos reunidos de personas; 'multitudes' es un plural natural y respetuoso del sentido colectivo.
theological_decisions:
- issue: Renderizar ὁ λόγος τοῦ θεοῦ
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - la palabra de Dios hablada
  - el mensaje de Dios
  rationale: Se conserva la fórmula bíblica tradicional en español sin diluir el carácter teológico del anuncio. En este contexto no conviene sustituirla por una paráfrasis más genérica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el cierre de auditoría en inglés; no se detectaron revisiones posteriores que alteraran las decisiones léxicas o teológicas del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'Pablo' para Παύλου de forma consistente con el paquete fuente.
  - Se usa 'palabra de Dios' como fórmula estable y reconocible, sin sustituirla por 'mensaje' en el texto principal.
  - Se preserva la duplicación de participios mediante dos verbos españoles distintos para reflejar la intensificación retórica del griego.
  - La referencia espacial 'Berea' se conserva sin adaptación toponímica.
  - El tono es narrativo, sobrio y apto para lectura eclesial amplia.
