revisions:
- from: 'Porque al pasar y observar sus objetos de culto[a], hallé incluso un altar en el que estaba inscrito: «Al dios desconocido». Por tanto[b], lo que ustedes adoran sin conocerlo, eso les anuncio.'
  to: 'Porque al pasar y observar sus objetos de culto, hallé incluso un altar en el que estaba inscrito: «Al dios desconocido»[a]. Por tanto, lo que ustedes adoran sin conocer[b], eso les anuncio.'
  rationale: 'La revisión hace una reparación menor pero importante: elimina el clítico personal «lo» de «sin conocerlo» para conservar mejor el neutro del original y la decisión exegética del POB; además, añade las notas necesarias para preservar la alternativa de la inscripción y la lectura personalizada frente a la impersonal.'
