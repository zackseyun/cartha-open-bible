  text: διερχόμενος γὰρ καὶ ἀναθεωρῶν τὰ σεβάσματα ὑμῶν εὗρον καὶ βωμὸν ἐν ᾧ ἐπεγέγραπτο· Ἀγνώστῳ θεῷ. ⸀ὃ οὖν ἀγνοοῦντες εὐσεβεῖτε, ⸀τοῦτο ἐγὼ καταγγέλλω ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/023.yaml
  text: For as I was passing through and observing your objects of worship[a], I even found an altar on which had been inscribed, ‘To an unknown god.’ Therefore[b], what you worship in ignorance—this I proclaim to you.
  footnotes:
  - marker: a
    text: Or, 'To the unknown god.' The Greek inscription lacks the article, so either an indefinite or a more idiomatic definite rendering is possible in English.
    reason: lexical_alternative
  - marker: b
    text: Or, 'whom you worship without knowing.' Some translations personalize the referent, but the Greek uses a neuter relative pronoun ('what/that which').
    reason: alternative_reading
