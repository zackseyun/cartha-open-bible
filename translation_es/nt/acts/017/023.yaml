translation:
  language: es
  text: 'Porque al pasar y observar sus objetos de culto, hallé incluso un altar en el que estaba inscrito: «Al dios desconocido»[a]. Por tanto, lo que ustedes adoran sin conocer[b], eso les anuncio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «A un dios desconocido». La inscripción griega carece de artículo, por lo que puede entenderse de manera indefinida o con la forma más idiomática de una dedicatoria en español.
    reason: lexical_alternative
  - marker: b
    text: O, «a quien ustedes adoran sin conocer». Algunas traducciones personalizan el referente, pero el griego usa un pronombre relativo neutro («lo que / aquello que»).
    reason: alternative_reading
lexical_decisions:
- source_word: διερχόμενος
  english_pob_choice: as I was passing through
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaba
  - cuando iba pasando
  lexicon: BDAG
  rationale: El participio se vierte con una construcción temporal natural en español. «Al pasar» conserva la idea de tránsito y encaja con la explicación de Pablo sin añadir información.
- source_word: ἀναθεωρῶν
  english_pob_choice: observing
  chosen_spanish: observar
  alternatives_spanish:
  - examinar
  - mirar con atención
  lexicon: BDAG
  rationale: El verbo implica atención reflexiva, no una mirada casual. «Observar» transmite bien ese matiz en español y mantiene el paralelismo participial.
- source_word: σεβάσματα
  english_pob_choice: objects of worship
  chosen_spanish: objetos de culto
  alternatives_spanish:
  - objetos de veneración
  - cosas veneradas
  - santuarios
  lexicon: BDAG
  rationale: El término es amplio y puede abarcar objetos o elementos religiosos venerados. «Objetos de culto» conserva la amplitud del griego mejor que «santuarios», que sería más estrecho.
- source_word: βωμὸν
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  lexicon: BDAG
  rationale: Es el equivalente normal y directo de βωμός en este contexto cultual.
- source_word: ἐπεγέγραπτο
  english_pob_choice: had been inscribed
  chosen_spanish: estaba inscrito
  alternatives_spanish:
  - había sido inscrito
  - estaba grabado
  - estaba escrito
  lexicon: BDAG
  rationale: En español, «estaba inscrito» comunica de forma natural la inscripción previa sobre el altar. Mantiene la pasiva y la anterioridad sin forzar un pluperfecto pesado.
- source_word: Ἀγνώστῳ θεῷ
  english_pob_choice: To an unknown god
  chosen_spanish: Al dios desconocido
  alternatives_spanish:
  - Al dios ignorado
  - Al dios desconocido
  lexicon: BDAG
  rationale: La inscripción griega carece de artículo. En español, la forma natural de una dedicatoria es «Al dios desconocido»; el artículo definido e indefinido en la dedicatoria española no refleja exactamente el griego, pero sí una fórmula idiomática legítima y fiel al sentido. Se mantiene la tensión documental entre una lectura indefinida y una más idiomáticamente definida en el registro de notas.
- source_word: ὃ οὖν
  english_pob_choice: Therefore, what
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Por ello
  lexicon: BDAG
  rationale: La partícula inferencial se expresa de modo natural con «Por tanto». El relativo neutro se recoge en la cláusula siguiente con «lo que», preservando el valor no personal del griego.
- source_word: ἀγνοοῦντες
  english_pob_choice: in ignorance
  chosen_spanish: sin conocerlo
  alternatives_spanish:
  - ignorándolo
  - sin saberlo
  - en ignorancia
  lexicon: BDAG
  rationale: El participio describe el modo de adoración y está ligado conceptualmente a «desconocido». «Sin conocerlo» conserva la conexión semántica y evita un español demasiado abstracto.
- source_word: εὐσεβεῖτε
  english_pob_choice: you worship
  chosen_spanish: adoran
  alternatives_spanish:
  - rinden culto
  - veneran
  - practican devoción
  lexicon: BDAG
  rationale: En este contexto, la acción religiosa concreta se expresa de manera más natural con «adoran». Aunque el verbo griego tiene el matiz de reverencia piadosa, «adoran» comunica suficientemente el acto de culto sin perder solemnidad.
- source_word: καταγγέλλω
  english_pob_choice: I proclaim
  chosen_spanish: les anuncio
  alternatives_spanish:
  - les proclamo
  - les declaro
  lexicon: BDAG
  rationale: El verbo implica anuncio público y autoritativo. En español, «les anuncio» conserva la direccionalidad a la audiencia y resulta más idiomático que una calca solemne.
theological_decisions:
- issue: Referencia del relativo neutro ὃ
  english_pob_reading: what you worship in ignorance—this I proclaim to you
  chosen_spanish_reading: lo que ustedes adoran sin conocerlo, eso les anuncio
  alternative_spanish_readings:
  - a quien ustedes adoran sin conocerlo, eso les anuncio
  - lo que ustedes veneran sin conocer, eso les anuncio
  rationale: Se mantiene el neutro impersonal del griego con «lo que» y «eso», en lugar de personalizar el referente con «a quien». Esto preserva la tensión interpretativa del texto y la precisión gramatical del original.
  doctrine_reference: Preservar la tensión exegética sin resolverla artificialmente.
- issue: Sentido de εὐσεβεῖτε en contexto de culto a una deidad desconocida
  english_pob_reading: you worship
  chosen_spanish_reading: adoran
  alternative_spanish_readings:
  - rinden culto
  - veneran
  rationale: El contexto habla de práctica religiosa dirigida a una divinidad desconocida. «Adoran» recoge el valor cultual de manera clara, aunque no agota el matiz de reverencia piadosa.
  doctrine_reference: BDAG; uso contextual en Hechos 17:23.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó en estado de alta concordancia y sin revisiones aplicadas. Esta propuesta sigue esa lectura, pero adapta a español la dedicatoria cultual con una fórmula idiomática natural y conserva la referencia neutra del relativo.
  spanish_consistency_notes:
  - Se mantiene «Dios» no aplica aquí; la dedicatoria es «al dios desconocido» según la fórmula del altar.
  - 'Se preserva el paralelismo del original: observación → hallazgo → inscripción → inferencia → proclamación.'
  - No se introduce lenguaje eclesiástico tradicional que desplace el sentido cultual del pasaje.
  - La nota a conserva la amplitud semántica de σεβάσματα sin reducirla a una sola clase de objeto religioso.
