translation:
  language: es
  text: Y de uno hizo toda nación de seres humanos para habitar sobre toda la faz de la tierra[a], habiendo determinado[b] sus tiempos señalados y los límites de su habitación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen 'de una sola sangre' en lugar de 'de uno'. El texto principal sigue la lectura de SBLGNT 'de uno'.
    reason: textual_variant
  - marker: b
    text: 'O: ''habiendo fijado''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησέν
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - formó
  - creó
  lexicon: ποιέω
  rationale: ποιέω es amplio; aquí conviene un verbo natural en español que preserve la idea de producir o disponer el orden humano sin añadir más de lo que el texto afirma. 'Hizo' refleja bien el acto divino y mantiene la sobriedad del griego.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y
  - Además
  - Y también
  lexicon: τέ
  rationale: La partícula coordina con la cláusula anterior. 'Y' conserva la conexión discursiva de forma simple y natural en español.
- source_word: ἐξ ἑνὸς
  english_pob_choice: from one
  chosen_spanish: de uno
  alternatives_spanish:
  - de uno
  - de un solo hombre
  - de un antepasado
  lexicon: εἷς
  rationale: El griego dice solo 'de uno'. En español, 'de uno' respeta el alcance del texto y evita importar una precisión que el manuscrito base no explicita. La referencia humana queda clara por el contexto inmediato.
- source_word: πᾶν ἔθνος ἀνθρώπων
  english_pob_choice: every nation of mankind
  chosen_spanish: toda nación de seres humanos
  alternatives_spanish:
  - toda nación de la humanidad
  - cada nación de hombres
  - todo pueblo de seres humanos
  lexicon: ἔθνος / ἄνθρωπος
  rationale: '''Nación'' preserva el valor étnico/colectivo de ἔθνος. ''Seres humanos'' evita el masculino genérico de ''hombres'' y conserva el sentido inclusivo de ἀνθρώπων sin perder la referencia a la humanidad en conjunto.'
- source_word: κατοικεῖν
  english_pob_choice: to live
  chosen_spanish: habitar
  alternatives_spanish:
  - vivir
  - habitar
  - residir
  lexicon: κατοικέω
  rationale: Aquí el infinitivo expresa finalidad de residencia en la tierra. 'Habitar' mantiene mejor la idea de asentamiento estable que 'vivir', y es suficientemente claro y bíblico en español.
- source_word: ἐπὶ παντὸς προσώπου τῆς γῆς
  english_pob_choice: on all the face of the earth
  chosen_spanish: sobre toda la faz de la tierra
  alternatives_spanish:
  - sobre toda la superficie de la tierra
  - en toda la faz de la tierra
  - sobre todo el rostro de la tierra
  lexicon: πρόσωπον / γῆ
  rationale: '''Faz de la tierra'' conserva el giro idiomático del griego y su resonancia bíblica, mientras que ''sobre toda'' refleja πᾶς con naturalidad. Se evita una traducción demasiado técnica de πρόσωπον que sonaría extraña en español.'
- source_word: ὁρίσας
  english_pob_choice: having determined
  chosen_spanish: habiendo determinado
  alternatives_spanish:
  - habiendo fijado
  - habiendo establecido
  - habiendo señalado
  lexicon: ὁρίζω
  rationale: El participio indica una acción soberana previa o concurrente de delimitar/establecer. 'Habiendo determinado' mantiene ese sentido formal y la relación lógica con el verbo principal.
- source_word: προστεταγμένους καιρούς
  english_pob_choice: their appointed times
  chosen_spanish: tiempos señalados
  alternatives_spanish:
  - tiempos dispuestos
  - tiempos establecidos
  - tiempos fijados
  lexicon: καιρός / προστάσσω
  rationale: καιροί aquí son períodos o momentos marcados. 'Tiempos señalados' comunica la idea de tiempos determinados de antemano sin sobrecargar la frase con posesivos implícitos que el español no exige. Se preserva la tensión entre tiempo como momento oportuno y tiempo como período fijado.
- source_word: τὰς ὁροθεσίας
  english_pob_choice: the boundaries
  chosen_spanish: los límites
  alternatives_spanish:
  - las fronteras
  - los linderos
  - los límites territoriales
  lexicon: ὁροθεσία
  rationale: ὁροθεσία designa delimitación fronteriza. 'Límites' es el equivalente más natural y suficientemente preciso en español; 'fronteras' sería más político y moderno, y 'linderos' más local/agrario.
- source_word: τῆς κατοικίας αὐτῶν
  english_pob_choice: of their dwelling place
  chosen_spanish: de la habitación de ellos
  alternatives_spanish:
  - de su habitación
  - de su morada
  - de su lugar de habitación
  lexicon: κατοικία
  rationale: κατοικία es 'habitación' en el sentido de lugar de residencia. Se conserva el sustantivo abstracto singular del griego para no aplanar la estructura, y 'de ellos' retiene el referente plural del pronombre sin imponer una construcción posesiva más idiomática que sería interpretativa.
theological_decisions:
- issue: Si explicitar o no el referente implícito de ἐξ ἑνὸς
  english_pob_reading: from one
  chosen_spanish_reading: de uno
  alternative_spanish_readings:
  - de un solo hombre
  - de un antepasado
  rationale: El texto base griego no añade 'sangre' ni especifica 'hombre'. Mantener 'de uno' respeta la forma mínima del original y deja que el contexto paulino exprese la unidad de la humanidad sin introducir una glosa no atestiguada por el texto base.
  doctrine_reference: Hechos 17:26; filosofía de traducción §§1, 4
- issue: Cómo rendir ἀνθρώπων sin borrar la referencia a la humanidad común
  english_pob_reading: mankind
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - humanidad
  - hombres
  - género humano
  rationale: '''Seres humanos'' conserva el referente colectivo y evita una lectura masculinizada innecesaria. A la vez, no lo abstrae tanto como ''humanidad'', que puede sonar menos concreto frente al griego genitivo de clase.'
  doctrine_reference: Hechos 17:26; filosofía de traducción §4
- issue: Valor de 'faz de la tierra' como idiomatismo bíblico
  english_pob_reading: on all the face of the earth
  chosen_spanish_reading: sobre toda la faz de la tierra
  alternative_spanish_readings:
  - sobre toda la superficie de la tierra
  - en toda la faz de la tierra
  rationale: '''Faz de la tierra'' reproduce el giro semítico y bíblico del original con dignidad natural en español. Mantiene la imagen espacial del texto sin perder inteligibilidad.'
  doctrine_reference: Hechos 17:26; traducción idiomática controlada
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del testimonio inglés: se mantuvo la lectura breve de ''from one'' sin añadir ''blood'' en el texto principal, y se preservó la estructura formal con ''all the face of the earth'' reflejada en español como ''sobre toda la faz de la tierra''. También se respetó el tono revisado que privilegia la sobriedad del griego base frente a explicaciones interpretativas en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma en este proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se evitó 'Cristo' porque no aparece Χριστός en el versículo.
  - Se optó por 'seres humanos' para ἀνθρώπων como equivalente inclusivo y textualmente sobrio, en coherencia con el estilo POB.
  - '''Límites'' se eligió para ὁροθεσίας por ser el término más natural y fiel en español; ''fronteras'' habría estrechado indebidamente el sentido.'
