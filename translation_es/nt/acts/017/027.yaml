translation:
  language: es
  text: para que buscaran a Dios, si quizá lo buscaran[a] a tientas y lo hallaran—aunque en verdad no está lejos de cada uno de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo palparan' o 'lo tantearan'. El verbo griego sugiere buscar por medio del tacto, como en una percepción limitada o en la oscuridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητεῖν
  english_pob_choice: that they should seek
  chosen_spanish: buscaran
  alternatives_spanish:
  - que buscaran
  - para que busquen
  lexicon: BDAG
  rationale: El infinitivo depende de una cláusula de propósito/resulto; en español, una subordinada final con subjuntivo expresa con naturalidad esa finalidad sin forzar una construcción mecánica.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a el Dios
  - a Dios, el
  lexicon: BDAG
  rationale: En español, el artículo definido del griego no suele reproducirse con naturalidad en este uso teológico genérico; el acusativo se marca con la preposición 'a' para el objeto directo personal.
- source_word: εἰ ἄρα γε
  english_pob_choice: if perhaps
  chosen_spanish: si quizá
  alternatives_spanish:
  - si acaso
  - si tal vez
  lexicon: BDAG
  rationale: La combinación expresa contingencia con matiz tentativo. 'Si quizá' conserva la vacilación y el carácter no asegurado de la búsqueda.
- source_word: ψηλαφήσειαν
  english_pob_choice: might grope for
  chosen_spanish: lo palparan
  alternatives_spanish:
  - lo tantearan
  - lo buscaran a tientas
  lexicon: BDAG
  rationale: El verbo griego evoca tocar a tientas, con percepción limitada. 'Palparan' mantiene el sentido táctil sin sonar demasiado arcaico; 'a tientas' está implícito en el contexto y puede explicitarse en nota.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El referente es Dios; en español, el pronombre clítico de objeto directo masculino singular resulta natural y conciso.
- source_word: καὶ εὕροιεν
  english_pob_choice: and find him
  chosen_spanish: y lo hallaran
  alternatives_spanish:
  - y lo encontraran
  lexicon: BDAG
  rationale: '''Hallar'' conserva un registro sobrio y clásico, adecuado al tono bíblico, y corresponde bien a εὑρίσκω.'
- source_word: καί γε
  english_pob_choice: though indeed
  chosen_spanish: aunque en verdad
  alternatives_spanish:
  - y en verdad
  - pero en verdad
  lexicon: BDAG
  rationale: 'La secuencia introduce una aclaración concesiva: pese a la búsqueda tentativa, se afirma la realidad de la cercanía divina. ''Aunque en verdad'' preserva esa tensión.'
- source_word: οὐ μακρὰν
  english_pob_choice: not far
  chosen_spanish: no está lejos
  alternatives_spanish:
  - no está distante
  - no queda lejos
  lexicon: BDAG
  rationale: '''No está lejos'' es la forma natural en español para expresar cercanía espacial o relacional sin perder la afirmación directa del griego.'
- source_word: ἀπὸ ἑνὸς ἑκάστου ἡμῶν
  english_pob_choice: from each one of us
  chosen_spanish: de cada uno de nosotros
  alternatives_spanish:
  - de cada uno de nosotros mismos
  - de cada uno
  lexicon: BDAG
  rationale: La estructura distributiva se transmite con claridad y naturalidad mediante 'de cada uno de nosotros'; el matiz de individualidad queda preservado.
- source_word: ὑπάρχοντα
  english_pob_choice: he is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - existe
  lexicon: BDAG
  rationale: El participio afirma la condición real de Dios como cercano. 'Está' comunica presencia/ubicación de manera idiomática en español sin diluir la afirmación de hecho.
theological_decisions:
- issue: Tensión entre búsqueda humana limitada y cercanía divina real
  english_pob_reading: Preserve both the tentativeness of human searching and the affirmation of God's nearness.
  chosen_spanish_reading: Mantener tanto la búsqueda vacilante de los seres humanos como la afirmación firme de que Dios no está lejos.
  alternative_spanish_readings:
  - suavizar la metáfora y decir simplemente 'buscaran a Dios y lo encontraran'
  - intensificar la imagen y decir 'lo palparan a tientas'
  rationale: 'El griego sostiene ambas ideas a la vez: búsqueda incierta y proximidad verdadera. La traducción debe evitar resolver la tensión eliminando la metáfora o haciendo demasiado segura la búsqueda.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del audit trail inglés; no se requieren revisiones adicionales. La opción española conserva la metáfora táctil y la concesión, sin depender mecánicamente de la formulación inglesa.
  spanish_consistency_notes:
  - Se usa 'Dios' sin artículo inicial, conforme al uso bíblico natural en español para esta referencia teológica.
  - '''Palparan'' mantiene el campo semántico de búsqueda táctil y evita diluir ψηλαφήσειαν en un simple ''buscar''.'
  - '''Aunque en verdad'' conserva la lectura concesiva de καί γε y la cercanía divina afirmada al final del versículo.'
  - La puntuación con coma y pausa interna ayuda a reflejar la progresión del griego sin volverla rígida.
  - Se mantiene un registro sobrio y eclesial, compatible con la serie POB en español.
