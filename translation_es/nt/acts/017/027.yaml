    rationale: Si el texto principal adopta 'buscaran a tientas', la nota debe ofrecer una alternativa distinta y útil, por ejemplo 'lo palparan' o 'lo tantearan', explicando el matiz táctil.
  - severity: low
    issue: La pausa antes de la cláusula concesiva puede reflejarse mejor
    rationale: Una raya o punto y coma antes de 'aunque en verdad' ayuda a marcar el giro concesivo de καί γε, como hace el POB inglés con raya.
  revised_spanish_text: para que buscaran a Dios, si quizá lo buscaran[a] a tientas y lo hallaran—aunque en verdad no está lejos de cada uno de nosotros.
