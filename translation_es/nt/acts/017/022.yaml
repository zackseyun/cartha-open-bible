translation:
  language: es
  text: 'Entonces Pablo, de pie en medio del Areópago, dijo: «Hombres de Atenas, veo que en todo son muy religiosos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «demasiado supersticiosos» o «más religiosos». El adjetivo griego puede entenderse en sentido negativo o positivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σταθεὶς
  english_pob_choice: standing
  chosen_spanish: puesto
  alternatives_spanish:
  - estando
  - puesto de pie
  - habiéndose puesto en pie
  lexicon: BDAG
  rationale: El participio aoristo se usa de manera circunstancial para introducir la escena. En español, «puesto» con el apoyo de una nota mantiene la escena de postura sin sonar forzado; «estando» o «habiéndose puesto en pie» resultan más pesados.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δει marca transición narrativa suave. «Entonces» conserva el flujo discursivo natural en español sin introducir contraste adversativo indebido.
- source_word: ἐν μέσῳ τοῦ Ἀρείου Πάγου
  english_pob_choice: in the midst of the Areopagus
  chosen_spanish: en medio del Areópago
  alternatives_spanish:
  - en el centro del Areópago
  - ante el Areópago
  lexicon: BDAG
  rationale: La frase es locativa; «en medio de» sigue de cerca el griego y mantiene la imagen espacial. «Ante» interpretaría más de lo que el texto dice.
- source_word: Ἀρείου Πάγου
  english_pob_choice: Areopagus
  chosen_spanish: Areópago
  alternatives_spanish:
  - Marte
  - colina de Marte
  lexicon: BDAG
  rationale: Se conserva la transliteración tradicional del nombre propio griego, que corresponde mejor al texto fuente y evita sustituirlo por un equivalente cultural menos directo.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - habló
  lexicon: BDAG
  rationale: El imperfecto introductorio funciona aquí como marcador de habla. «Dijo» es la forma natural en español para introducir la cita.
- source_word: Ἄνδρες Ἀθηναῖοι
  english_pob_choice: Men of Athens
  chosen_spanish: Hombres de Atenas
  alternatives_spanish:
  - Atenienses
  - Varones atenienses
  lexicon: BDAG
  rationale: Se conserva la vocación masculina explícita de ἄνδρες y el sustantivo de lugar en forma natural. «Atenienses» suavizaría la forma vocativa y perdería parte de la estructura del original.
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo aspecto
  - en cada cosa
  - en todo sentido
  lexicon: BDAG
  rationale: La expresión distributiva se puede verter de forma breve y natural con «en todo», manteniendo la amplitud de la observación. Otras opciones son más explicativas pero menos fluidas.
- source_word: ὡς
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - como
  - cómo
  lexicon: BDAG
  rationale: Introduce el contenido de la observación de Pablo. En español, «que» es la conexión más natural después de «considero».
- source_word: δεισιδαιμονεστέρους
  english_pob_choice: very religious
  chosen_spanish: más religiosos
  alternatives_spanish:
  - muy religiosos
  - supersticiosos
  - más devotos
  lexicon: BDAG
  rationale: El comparativo griego admite un sentido positivo o negativo. «Más religiosos» preserva la comparación sin resolver prematuramente la valoración; la alternativa negativa queda abierta para notas, y «muy religiosos» no reproduce tan bien la idea comparativa.
- source_word: θεωρῶ
  english_pob_choice: I see
  chosen_spanish: considero
  alternatives_spanish:
  - veo
  - observo
  - percibo
  lexicon: BDAG
  rationale: Aquí θεωρέω expresa observación evaluativa, no solo visión física. «Considero» comunica mejor la valoración reflexiva implícita en el contexto retórico, sin perder el matiz de percepción.
theological_decisions:
- issue: Tono de la caracterización de la religiosidad ateniense en δεισιδαιμονεστέρους
  english_pob_reading: very religious, with a footnoted alternative 'too superstitious' or 'more religious'
  chosen_spanish_reading: más religiosos, con nota de alternativa pejorativa o positiva
  alternative_spanish_readings:
  - muy religiosos
  - supersticiosos
  - más devotos
  rationale: El adjetivo comparativo griego es semánticamente flexible y Pablo puede estar usando una formulación retóricamente ambigua. Traducirlo como «más religiosos» conserva la tensión entre una lectura positiva y una negativa sin decidirla en el texto principal. La nota explica que también puede entenderse en sentido pejorativo («supersticiosos») o, de modo más literal, como comparación abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la auditoría inglesa fue alto; por eso se mantiene una solución española que conserva la ambigüedad lexical del comparativo griego y la escena narrativa sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se mantiene «Areópago» como transliteración estable del nombre propio.
  - Se conserva la vocación masculina explícita de Ἄνδρες con «Hombres de Atenas».
  - Se evita resolver definitivamente el valor de δεισιδαιμονεστέρους en el cuerpo del texto, dejando la tensión en nota.
  - Se usa puntuación española para introducir y cerrar la cita directa.
