- from: 'Entonces Pablo, puesto[a] en medio del Areópago, dijo: «Hombres de Atenas, en todo los considero[b] más religiosos[c]».'
  to: 'Entonces Pablo, de pie en medio del Areópago, dijo: «Hombres de Atenas, veo que en todo son muy religiosos[a]».'
  rationale: 'Se corrige la naturalidad y fidelidad del español: «de pie» expresa bien Σταθεὶς; «veo que» representa mejor θεωρῶ y la estructura de la oración; «muy religiosos» sigue la decisión auditada del POB inglés y funciona idiomáticamente en español, mientras la nota preserva la ambigüedad léxica documentada del término griego.'
