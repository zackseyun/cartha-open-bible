translation:
  language: es
  text: Por lo tanto, muchos de ellos creyeron, y no pocas[a] de las mujeres griegas prominentes[b] y no pocos[a] de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «no pocas/no pocos», un giro idiomático que significa «un número considerable».'
    reason: lexical_alternative
  - marker: b
    text: O «respetables» o «de alto rango social» para «prominentes».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ μὲν οὖν
  english_pob_choice: Therefore many
  chosen_spanish: Por lo tanto, muchos
  alternatives_spanish:
  - Así que muchos
  - Entonces muchos
  - Por consiguiente, muchos
  lexicon: BDAG
  rationale: La secuencia μὲν οὖν marca transición inferencial; «Por lo tanto» comunica esa conclusión en español natural sin sobrecargar las partículas griegas.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - de entre ellos
  lexicon: BDAG
  rationale: El partitivo ἐξ se expresa de forma idiomática con «de ellos», refiriéndose al grupo mencionado antes.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - llegaron a creer
  - pusieron su fe
  lexicon: BDAG
  rationale: πιστεύω se traduce con el verbo simple «creer» para no añadir una formulación doctrinal no explícita en el versículo.
- source_word: τῶν Ἑλληνίδων γυναικῶν
  english_pob_choice: of the Greek women
  chosen_spanish: de las mujeres griegas
  alternatives_spanish:
  - de las mujeres helenas
  - de las mujeres gentiles griegas
  lexicon: BDAG
  rationale: Ἑλληνίδων identifica a estas mujeres como griegas; γυναικῶν se conserva como «mujeres», no «esposas», porque no hay indicio del vínculo marital en el texto.
- source_word: τῶν εὐσχημόνων
  english_pob_choice: prominent
  chosen_spanish: prominentes
  alternatives_spanish:
  - respetables
  - de alto rango social
  - de buena posición
  lexicon: BDAG
  rationale: εὐσχήμων aquí apunta a estatus social y consideración pública. «Prominentes» es breve y comunica bien esa idea en español contemporáneo.
- source_word: ἀνδρῶν οὐκ ὀλίγοι
  english_pob_choice: and not a few ... men
  chosen_spanish: y de los hombres no pocos
  alternatives_spanish:
  - y de los hombres, no pocos
  - y de los hombres, muchos
  lexicon: BDAG
  rationale: Se mantiene la litotes de οὐκ ὀλίγοι con «no pocos» para conservar el énfasis retórico del griego, en vez de aplanarlo a «muchos».
theological_decisions:
- issue: Cómo expresar ἐπίστευσαν sin ampliar el contenido de la fe más allá de lo dicho en el verso
  english_pob_reading: believed
  chosen_spanish_reading: creyeron
  alternative_spanish_readings:
  - creyeron en el mensaje
  - llegaron a la fe
  rationale: El texto afirma la respuesta de fe, pero no la especifica aquí; «creyeron» preserva esa sobriedad y evita importar una ampliación doctrinal.
  doctrine_reference: 'Principio de transparencia: no añadir contenido teológico no explícito en la unidad textual.'
- issue: Cómo tratar la frase εὐσχήμων sin convertirla en un juicio moral que el versículo no explicita
  english_pob_reading: prominent
  chosen_spanish_reading: prominentes
  alternative_spanish_readings:
  - respetables
  - de alta posición social
  rationale: La evidencia contextual favorece estatus social/visibilidad pública. «Prominentes» refleja eso sin reducir el término a mera «respetabilidad» moral.
  doctrine_reference: Lectura contextual de estatus social en BDAG; evitar moralizar un descriptor social.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del inglés POB: la inferencia de μὲν οὖν como transición conclusiva, el partitivo de ἐξ αὐτῶν, la litotes de οὐκ ὀλίγοι y el valor social de εὐσχήμων. No se introdujeron ampliaciones doctrinales no presentes en el verso.'
  spanish_consistency_notes:
  - Se mantuvo un español formal y legible, con sintaxis natural.
  - «Creyeron» se usa para πιστεύω, en línea con la sobriedad del griego.
  - «Prominentes» se eligió como equivalente funcional de εὐσχήμων en este contexto.
  - Se conservó la litotes «no pocos» para οὐκ ὀλίγοι, siguiendo el valor retórico del original.
