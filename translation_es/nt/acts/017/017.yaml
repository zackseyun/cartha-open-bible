translation:
  language: es
  text: Así que él razonaba en la sinagoga con los judíos y con los que adoraban a Dios[a], y en la plaza pública[b] cada día con los que se encontraban allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los temerosos de Dios», para los gentiles asociados con el culto judío.
    reason: lexical_alternative
  - marker: b
    text: La «plaza pública» era también un espacio cívico donde la gente se reunía, y no solo un lugar de compra y venta.
    reason: cultural_note
lexical_decisions:
- source_word: διελέγετο
  english_pob_choice: was reasoning
  chosen_spanish: razonaba
  alternatives_spanish:
  - discutía
  - dialogaba
  - debatía
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción շարունակada o repetida; «razonaba» conserva el sentido dialogal y argumentativo de διαλέγομαι sin sonar tan técnico o rígido en español.
- source_word: μὲν οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  - así pues
  lexicon: BDAG
  rationale: La combinación marca continuidad/inferencia respecto del contexto anterior. «Así que» reproduce bien ese enlace discursivo en español natural.
- source_word: συναγωγῇ
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En Hechos el término designa la institución y lugar judío reconocible; «sinagoga» es la equivalencia directa y establecida.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - el pueblo judío
  - los judeanos
  lexicon: BDAG
  rationale: Aquí se refiere a la comunidad judía presente en la sinagoga. «Los judíos» es la forma más directa y fiel al contexto.
- source_word: τοῖς σεβομένοις
  english_pob_choice: those who worshiped God
  chosen_spanish: los que adoraban a Dios
  alternatives_spanish:
  - los temerosos de Dios
  - los piadosos
  - los que reverenciaban a Dios
  lexicon: BDAG
  rationale: El participio apunta a gentiles vinculados al culto judío. «Adoraban a Dios» transmite el sentido religioso sin obligar al lector a conocer el rótulo técnico «temerosos de Dios».
- source_word: ἀγορᾷ
  english_pob_choice: marketplace
  chosen_spanish: plaza del mercado
  alternatives_spanish:
  - mercado
  - plaza pública
  - foro
  lexicon: BDAG
  rationale: ἀγορά incluye tanto el espacio comercial como el cívico. «Plaza del mercado» conserva ambas dimensiones mejor que «mercado» a secas y evita limitarlo solo a compraventa.
- source_word: κατὰ πᾶσαν ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: BDAG
  rationale: La expresión idiomática denota repetición diaria regular. «Cada día» es natural y preciso en español.
- source_word: πρὸς τοὺς παρατυγχάνοντας
  english_pob_choice: with those who happened to be there
  chosen_spanish: con los que se encontraban allí
  alternatives_spanish:
  - con los que pasaban por allí
  - con los presentes
  - con los transeúntes
  lexicon: BDAG
  rationale: El participio indica personas halladas por casualidad o presentes allí. «Se encontraban allí» mantiene la amplitud del sentido sin reducirlo solo a peatones o transeúntes.
theological_decisions:
- issue: 'τοῖς σεβομένοις: designación técnica o descriptiva de gentiles vinculados al culto judío'
  english_pob_reading: those who worshiped God, with a note that this may mean 'the God-fearers'
  chosen_spanish_reading: los que adoraban a Dios, con nota de alternativa técnica
  alternative_spanish_readings:
  - los temerosos de Dios
  - los reverentes
  - los devotos
  rationale: El texto griego permite una lectura descriptiva y otra casi técnica. Mantener una traducción clara en el texto principal y una nota con la opción técnica preserva la tensión documental sin imponer un término especializado al lector.
  doctrine_reference: Hechos 10:2; 13:16, 26
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y conserva el matiz aspectual del imperfecto, la inferencia de μὲν οὖν y la amplitud semántica de ἀγορά y παρατυγχάνω. Se integra el mismo punto de decisión de la POB inglesa sobre σεβομένοις con una nota española equivalente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y la mayúscula en el referente divino.
  - Se usa «sinagoga» como término institucional establecido.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se conserva «adoraban a Dios» en el texto principal y se documenta la alternativa técnica «temerosos de Dios» en nota.
  - «Plaza del mercado» intenta reflejar tanto el aspecto comercial como el cívico de ἀγορά.
