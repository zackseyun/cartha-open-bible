translation:
  language: es
  text: 'Pero, al no encontrarlos, arrastraron a Jasón y a algunos hermanos[a] ante las autoridades de la ciudad[b], gritando: «Estos hombres que han trastornado el mundo[c] han venido también aquí»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a algunos hermanos», es decir, miembros de la comunidad creyente; el grupo pudo incluir mujeres según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: El título griego es «politarcas», un término cívico macedonio para funcionarios de la ciudad.
    reason: cultural_note
  - marker: c
    text: 'O: «el mundo habitado»; la expresión puede referirse al mundo conocido, a menudo el mundo romano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ εὑρόντες
  english_pob_choice: when they did not find
  chosen_spanish: al no encontrarlos
  alternatives_spanish:
  - cuando no los encontraron
  - como no los encontraron
  lexicon: BDAG
  rationale: El participio aoristo con μή expresa la circunstancia previa a la acción principal. En español, «al no encontrarlos» conserva esa relación temporal-circunstancial con naturalidad y sin añadir una paráfrasis excesiva.
- source_word: ἔσυρον
  english_pob_choice: they dragged
  chosen_spanish: arrastraron
  alternatives_spanish:
  - los arrastraron
  - los llevaron a la fuerza
  lexicon: BDAG
  rationale: σύρω implica arrastrar o llevar por la fuerza. «Arrastraron» mantiene la coerción física del verbo griego y su fuerza narrativa.
- source_word: τινας ἀδελφοὺς
  english_pob_choice: some brothers
  chosen_spanish: a algunos hermanos
  alternatives_spanish:
  - a algunos creyentes
  - a algunos hermanos y hermanas
  lexicon: BDAG
  rationale: ἀδελφοί aquí designa a miembros de la comunidad cristiana. Se conserva «hermanos» por el valor lexical documentado, y «a algunos» refleja τινας sin neutralizar el término en el texto principal.
- source_word: ἐπὶ τοὺς πολιτάρχας
  english_pob_choice: before the city authorities
  chosen_spanish: ante las autoridades de la ciudad
  alternatives_spanish:
  - ante los politarcas
  - ante los gobernantes de la ciudad
  lexicon: BDAG
  rationale: πολιτάρχης es un título cívico macedonio específico; en español, «autoridades de la ciudad» comunica su función de manera clara y legible. «Ante» refleja el movimiento hacia una instancia oficial para comparecer.
- source_word: βοῶντες
  english_pob_choice: shouting
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - vociferando
  lexicon: BDAG
  rationale: El participio indica un alarido público acompañando la acción. «Gritando» reproduce la fuerza y el carácter acusatorio del contexto.
- source_word: οἱ τὴν οἰκουμένην ἀναστατώσαντες
  english_pob_choice: these men who have turned the world upside down
  chosen_spanish: Estos hombres que han trastornado el mundo
  alternatives_spanish:
  - Estos hombres que han perturbado el mundo habitado
  - Estos hombres que han causado tumulto en el mundo
  lexicon: BDAG
  rationale: ἀναστατόω expresa causar trastorno, agitación o upheaval. «Han trastornado el mundo» conserva la idiomaticidad de la acusación sin perder la idea de desorden radical. Se mantiene el tono polémico del original.
- source_word: οἰκουμένην
  english_pob_choice: world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: BDAG
  rationale: οἰκουμένη alude literalmente al mundo habitado, con frecuencia el ámbito grecorromano conocido. En el cuerpo del texto, «el mundo» es la equivalencia más natural; la matización literal puede preservarse en nota.
- source_word: οὗτοι καὶ ἐνθάδε πάρεισιν
  english_pob_choice: have come here also
  chosen_spanish: han venido también acá
  alternatives_spanish:
  - están aquí también
  - han llegado también acá
  lexicon: BDAG
  rationale: πάρειμι puede significar estar presente o haber llegado. En esta acusación hostil, «han venido también acá» recoge la llegada y la presencia implícita, mientras καί se expresa con «también».
theological_decisions:
- issue: Referencia de ἀδελφοί a la comunidad cristiana
  english_pob_reading: some brothers, referring to fellow believers; the group may have included women depending on context
  chosen_spanish_reading: a algunos hermanos, es decir, miembros de la comunidad creyente
  alternative_spanish_readings:
  - a algunos creyentes
  - a algunos hermanos y hermanas
  rationale: El texto griego usa la forma masculina plural, pero el sentido comunitario apunta a creyentes asociados con Pablo. Se conserva «hermanos» en el texto principal y se explicita su referencia comunitaria en la nota para no perder la tensión lexical.
  doctrine_reference: Comunidad de los creyentes / uso inclusivo contextual de ἀδελφοί
- issue: Sentido de οἰκουμένη
  english_pob_reading: the inhabited world, often the Roman world
  chosen_spanish_reading: el mundo, con la posible implicación del mundo habitado o romano
  alternative_spanish_readings:
  - el mundo habitado
  - el mundo romano
  rationale: La acusación busca magnificar el alcance del conflicto. «El mundo» funciona en español y mantiene la hipérbole; la nota preserva la precisión lexical sin imponer una expansión interpretativa en el texto principal.
  doctrine_reference: Contexto histórico-lingüístico del discurso misionero y acusatorio
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el griego SBLGNT, sin cambios de revisión aplicados en el registro fuente. La redacción española intenta conservar la secuencia narrativa, la fuerza acusatoria y las equivalencias léxicas documentadas.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiriera; no aplica en este versículo.
  - Se mantuvo «hermanos» por el valor lexical documentado de ἀδελφοί, con aclaración comunitaria en nota.
  - Se evitó traducir πολιτάρχας como término tradicional eclesiástico; se optó por una equivalencia funcional y una nota cultural.
  - «Trastornado el mundo» conserva la acusación idiomática del griego sin suavizarla.
