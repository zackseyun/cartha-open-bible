base_translation:
  language: en
  yaml_path: translation/nt/acts/017/029.yaml
  text: Therefore[a], since we are God’s offspring, we ought not to think that the Divine Being is like gold or silver or stone[b], an image formed by human skill and imagination.
  footnotes:
  - marker: a
    text: Or “the Deity,” “the divine nature,” or “the Godhead.” Greek τὸ θεῖον is a broad term for what is divine; here it refers to the true God in Paul’s argument.
    reason: lexical_alternative
  - marker: b
    text: Or “a carved image” or “an engraved thing.”
    reason: lexical_alternative
