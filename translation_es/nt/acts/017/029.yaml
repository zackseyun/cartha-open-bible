translation:
  language: es
  text: Así pues[a], siendo linaje de Dios, no debemos pensar que el Ser divino[b] sea semejante a oro, plata o piedra[c], una imagen labrada por habilidad e imaginación humanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por consiguiente», «Luego».
    reason: alternative_reading
  - marker: b
    text: O «la Deidad», «la naturaleza divina» o «lo divino». Griego τὸ θεῖον es un término amplio para lo que es divino; aquí se refiere al Dios verdadero en el argumento de Pablo.
    reason: lexical_alternative
  - marker: c
    text: O «una cosa grabada» o «una imagen tallada».
    reason: lexical_alternative
lexical_decisions:
- source_word: γένος
  english_pob_choice: offspring
  chosen_spanish: linaje
  alternatives_spanish:
  - descendencia
  - estirpe
  - linaje de hijos
  lexicon: BDAG
  rationale: γένος expresa origen común y pertenencia relacional. En español, ‘linaje’ comunica bien esa idea de procedencia/parentesco sin reducirla a etnia ni a una relación doméstica más estrecha.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - Entonces
  - Por consiguiente
  lexicon: BDAG
  rationale: Marca la inferencia lógica del argumento. ‘Así pues’ suena natural en español y conserva el valor conclusivo sin endurecer el tono.
- source_word: ὑπάρχοντες
  english_pob_choice: since we are
  chosen_spanish: siendo
  alternatives_spanish:
  - puesto que somos
  - ya que somos
  - como somos
  lexicon: BDAG
  rationale: 'El participio tiene valor causal en el contexto. ‘Siendo’ permite expresar esa base argumentativa de modo fluido: somos linaje de Dios, por eso sigue la conclusión.'
- source_word: τοῦ θεοῦ
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  - del Dios verdadero
  lexicon: BDAG
  rationale: El genitivo posesivo se traduce de forma directa y natural. ‘De Dios’ mantiene la referencia monoteísta del argumento sin introducir una glosa innecesaria.
- source_word: οὐκ ὀφείλομεν
  english_pob_choice: we ought not
  chosen_spanish: no debemos
  alternatives_spanish:
  - no estamos obligados a
  - no conviene que
  - no hemos de
  lexicon: BDAG
  rationale: El verbo expresa obligación/deuda moral. ‘No debemos’ es idiomático en español y conserva la fuerza normativa del razonamiento de Pablo.
- source_word: νομίζειν
  english_pob_choice: to think
  chosen_spanish: pensar
  alternatives_spanish:
  - considerar
  - suponer
  - creer
  lexicon: BDAG
  rationale: Es un verbo cognitivo general. ‘Pensar’ funciona bien en español actual y corresponde a la amplitud semántica del original.
- source_word: χρυσῷ ἢ ἀργύρῳ ἢ λίθῳ
  english_pob_choice: gold or silver or stone
  chosen_spanish: oro, plata o piedra
  alternatives_spanish:
  - oro, plata o una piedra
  - oro, plata o piedra tallada
  lexicon: BDAG
  rationale: Se conservan los tres materiales mencionados en griego. La secuencia en español mantiene el contraste material antes de la frase explicativa siguiente.
- source_word: χαράγματι
  english_pob_choice: an image formed
  chosen_spanish: una imagen labrada
  alternatives_spanish:
  - una cosa grabada
  - un objeto esculpido
  - una imagen tallada
  lexicon: BDAG
  rationale: χαράγματι remite a algo grabado o labrado. ‘Labrada’ preserva la idea de trabajo artesanal de manera comprensible y breve.
- source_word: τέχνης
  english_pob_choice: by human skill
  chosen_spanish: por habilidad
  alternatives_spanish:
  - por arte
  - por destreza
  - por artesanía
  lexicon: BDAG
  rationale: τέχνη abarca arte, oficio y habilidad. ‘Habilidad’ transmite el aspecto técnico-productivo del hacer humano; el contexto ya deja claro que se trata de producción humana.
- source_word: ἐνθυμήσεως
  english_pob_choice: imagination
  chosen_spanish: pensamiento
  alternatives_spanish:
  - imaginación
  - idea
  - concebimiento
  lexicon: BDAG
  rationale: El término apunta a lo concebido en la mente. ‘Pensamiento’ es sobrio y evita cargar el texto con una noción moderna de ‘imaginación’ que podría sonar demasiado psicológica.
- source_word: ἀνθρώπου
  english_pob_choice: human
  chosen_spanish: humanos
  alternatives_spanish:
  - del hombre
  - de una persona
  - de la humanidad
  lexicon: BDAG
  rationale: El genitivo singular funciona de modo genérico. ‘Humanos’ permite que la frase en español sea natural y mantenga el valor representativo sin sugerir un varón particular.
- source_word: τὸ θεῖον
  english_pob_choice: the Divine Being
  chosen_spanish: lo divino
  alternatives_spanish:
  - la Deidad
  - el Ser divino
  - la naturaleza divina
  lexicon: BDAG
  rationale: τὸ θεῖον es un sustantivo neutro amplio sobre lo que es divino. ‘Lo divino’ conserva esa amplitud y evita forzar una interpretación filosófica más técnica de lo que el griego exige.
- source_word: ὅμοιον
  english_pob_choice: is like
  chosen_spanish: sea semejante a
  alternatives_spanish:
  - sea como
  - se parezca a
  - sea igual a
  lexicon: BDAG
  rationale: El predicativo completa la cláusula infinitiva. ‘Sea semejante a’ suena natural en español y conserva la relación comparativa sin intensificarla indebidamente.
theological_decisions:
- issue: Cómo rendir τὸ θεῖον en un discurso paulino a oyentes paganos
  english_pob_reading: the Divine Being
  chosen_spanish_reading: lo divino
  alternative_spanish_readings:
  - la Deidad
  - el Ser divino
  - la naturaleza divina
  rationale: El griego es amplio y filosófico, pero en el argumento de Pablo apunta al Dios verdadero, no a una fuerza impersonal. ‘Lo divino’ mantiene la amplitud léxica y deja abierta la tensión entre lenguaje acomodado al auditorio y la afirmación monoteísta del apóstol.
  doctrine_reference: Mantener la tensión lexical de τὸ θεῖον sin resolverla con un término técnico eclesiástico o excesivamente metafísico.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés como guía de decisiones léxicas y de tono, pero se ajustó la redacción al español natural. Se preservó la amplitud de τὸ θεῖον con ‘lo divino’ y el matiz causal de ὑπάρχοντες con ‘siendo’. No se aplicaron revisiones adicionales respecto al pasaje base.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός y ‘lo divino’ para τὸ θεῖον, distinguiendo el referente personal del adjetivo/sustantivo neutro.
  - ‘Linaje’ conserva mejor la idea de procedencia relacional de γένος que ‘raza’, que sería anacrónico o etnicista en español.
  - ‘Labrada’ y ‘habilidad’ reproducen la combinación de arte/oficio y fabricación humana sin añadir elementos no presentes en el griego.
  - Se evita ‘Cristo’ u otras fórmulas tradicionales no pertinentes al versículo.
  - La puntuación separa la cláusula principal de la descripción final para reflejar la sintaxis griega.
