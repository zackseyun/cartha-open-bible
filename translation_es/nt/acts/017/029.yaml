    reason: lexical_alternative
  - marker: c
    text: O «una cosa grabada» o «una imagen tallada».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el punto principal de fidelidad teológica y léxica: τὸ θεῖον debe sonar personal sin perder el registro filosófico, por eso «el Ser divino» refleja mejor la decisión POB que «lo divino». Además, «imaginación» restaura el matiz de ἐνθυμήσεως como concepción mental detrás de la idolatría. El resto del texto puede mantenerse como una representación adecuada y legible del griego.'
