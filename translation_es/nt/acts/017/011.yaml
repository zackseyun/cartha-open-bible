revisions:
- from: Estos eran más nobles[a] que los de Tesalónica, pues recibieron la palabra con toda disposición[b], examinando cada día las Escrituras para ver si estas cosas eran así.
  to: Estos eran de ánimo más noble[a] que los de Tesalónica, pues recibieron la palabra con todo entusiasmo[b], examinando cada día las Escrituras para ver si estas cosas eran así.
  rationale: Se ajusta εὐγενέστεροι a la decisión contextual del POB («more noble-minded») con una formulación española natural, y se fortalece προθυμία para reflejar mejor el sentido de prontitud entusiasta. También se corrige el anglicismo de la nota sin alterar su contenido.
  reviewer_model: gpt-5.4
