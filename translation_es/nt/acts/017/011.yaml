translation:
  language: es
  text: Estos eran de ánimo más noble[a] que los de Tesalónica, pues recibieron la palabra con todo entusiasmo[b], examinando cada día las Escrituras para ver si estas cosas eran así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más nobles». El griego puede referirse tanto a una disposición más encomiable como, menos probablemente aquí, a una posición social más alta.
    reason: lexical_alternative
  - marker: b
    text: O «recibieron el mensaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγενέστεροι
  english_pob_choice: more noble-minded
  chosen_spanish: más nobles
  alternatives_spanish:
  - más nobles de espíritu
  - más abiertos de mente
  lexicon: BDAG
  rationale: En español, «más nobles» conserva bien el valor comparativo de εὐγενέστεροι y deja abierta la pregunta entre nobleza de disposición y nobleza social; el contexto de la frase siguiente orienta la lectura hacia una actitud commendable. No se añadió un equivalente explicativo como «de espíritu» para no cargar el texto más allá de lo que la fuente exige.
- source_word: οἵτινες
  english_pob_choice: for they
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: La función explicativa del relativo se expresa de forma natural en español con «pues», que introduce la razón por la cual se los caracteriza como «más nobles». Evita una traducción rígida del relativo sin perder el valor causal-explicativo.
- source_word: ἐδέξαντο τὸν λόγον
  english_pob_choice: received the word
  chosen_spanish: recibieron la palabra
  alternatives_spanish:
  - acogieron el mensaje
  - aceptaron la palabra
  lexicon: BDAG
  rationale: Se mantiene «la palabra» para conservar la continuidad bíblica de λόγος en Hechos, y «recibieron» reproduce bien el verbo de recepción sin hacer paráfrasis. «La palabra» evita sustituir prematuramente por «mensaje», aunque esa alternativa sigue siendo semánticamente válida.
- source_word: μετὰ πάσης προθυμίας
  english_pob_choice: with all eagerness
  chosen_spanish: con toda disposición
  alternatives_spanish:
  - con todo afán
  - con toda prontitud
  lexicon: BDAG
  rationale: προθυμία expresa disposición, voluntad pronta y entusiasmo. «Con toda disposición» suena natural en español y conserva el matiz de pronta aceptación; se evita «afán» por su posible connotación de ansiedad, y se evita sobrerrepresentar la intensidad emocional.
- source_word: τὸ καθ’ ἡμέραν
  english_pob_choice: daily
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: BDAG
  rationale: La construcción adverbial se vierte con «cada día», que expresa con claridad la habitualidad sin sonar demasiado abstracto. Es una opción directa y bíblicamente transparente.
- source_word: ἀνακρίνοντες
  english_pob_choice: examining
  chosen_spanish: examinando
  alternatives_spanish:
  - investigando
  - escudriñando
  lexicon: BDAG
  rationale: «Examinando» conserva el sentido de comprobar cuidadosamente al contrastar con las Escrituras. «Escudriñando» es posible, pero en español puede sonar más tradicional y menos neutral; «investigando» añadiría una carga moderna de pesquisa que no es necesaria aquí.
- source_word: τὰς γραφὰς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los escritos
  - las Sagradas Escrituras
  lexicon: BDAG
  rationale: En este contexto, γραφαί remite a la colección sagrada de Israel, por lo que «las Escrituras» es la equivalencia natural y precisa. «Sagradas Escrituras» explicita, pero añade un adjetivo no presente en el griego.
- source_word: εἰ ἔχοι ταῦτα οὕτως
  english_pob_choice: to see whether these things were so
  chosen_spanish: para ver si estas cosas eran así
  alternatives_spanish:
  - para comprobar si estas cosas eran verdaderas
  - para ver si esto era de ese modo
  lexicon: BDAG
  rationale: 'La expresión se conserva de manera idiomática y fiel: «para ver si estas cosas eran así» reproduce el sentido de comprobar la correspondencia entre lo escuchado y las Escrituras. Se evita «verdaderas» porque el griego enfatiza más la conformidad o correspondencia que una afirmación abstracta de verdad.'
theological_decisions:
- issue: 'Alcance de εὐγενέστεροι: nobleza de carácter o de clase'
  english_pob_reading: commendable disposition ('more noble-minded') rather than social nobility
  chosen_spanish_reading: más nobles, entendido por el contexto como nobleza de disposición
  alternative_spanish_readings:
  - más nobles de nacimiento
  - más nobles de espíritu
  rationale: La nota en inglés deja abierta la posibilidad léxica, pero el contexto inmediato explica la nobleza por su recepción pronta de la palabra y su examen diario de las Escrituras. En español, el texto principal mantiene la amplitud de «más nobles»; la nota aclara que la referencia probable es a una disposición commendable, no a clase social.
  doctrine_reference: Translation philosophy §1, §6
- issue: Traducción de λόγος en el marco de Hechos
  english_pob_reading: '''the word'' retained in the main text'
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - el mensaje
  - la enseñanza
  rationale: Se conserva el lenguaje bíblico de «la palabra» para mantener la resonancia teológica de Hechos y la continuidad con el uso del término en el libro. La alternativa «el mensaje» es legítima, pero debilita la textura verbal del pasaje y no es necesaria para la claridad española.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre revisiones y no muestra cambios aplicados en la última pasada; por eso la redacción española se alinea estrechamente con la lectura estable del texto fuente y del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico y transparente de «la palabra» y «las Escrituras».
  - Se evita introducir un calco innecesario como «más noble-minded» y se opta por un español natural que conserva la ambigüedad documentada.
  - La nota a reconoce explícitamente la tensión lexical entre nobleza de carácter y estatus social.
  - La nota b preserva la alternativa semántica documentada para λόγος sin desplazar la traducción principal.
