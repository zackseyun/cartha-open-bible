base_translation:
  language: en
  yaml_path: translation/nt/acts/017/015.yaml
  text: Those who were escorting Paul brought him as far as Athens[a], and after receiving instructions for Silas and Timothy to come to him as quickly as possible[b], they departed.
  footnotes:
  - marker: a
    text: Or 'to Athens.' The Greek phrase can be rendered more simply, but 'as far as Athens' preserves the sense of accompanying Paul up to that destination.
    reason: lexical_alternative
  - marker: b
    text: Or 'having received a command.' The noun can carry the stronger sense of an authoritative order as well as 'instruction.'
    reason: lexical_alternative
