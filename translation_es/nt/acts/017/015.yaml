translation:
  language: es
  text: Pero los que acompañaban a Pablo lo llevaron hasta Atenas[a]; y, después de recibir instrucciones para Silas y Timoteo de que fueran a verlo lo antes posible[b], partieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Atenas». La frase griega también puede traducirse de manera más simple; «hasta Atenas» conserva la idea de acompañar a Pablo hasta ese destino.
    reason: lexical_alternative
  - marker: b
    text: O «después de recibir una orden». El sustantivo puede tener un sentido más fuerte, de mandato con autoridad, además de «instrucciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθιστάνοντες
  english_pob_choice: were escorting
  chosen_spanish: acompañaban
  alternatives_spanish:
  - escoltaban
  - iban con él
  - lo conducían
  lexicon: BDAG
  rationale: El participio describe una acción acompañante y de traslado en curso. En español, «acompañaban» comunica bien ese sentido durativo sin sonar forzado; «escoltaban» sería posible, pero puede sugerir un matiz militar o oficial que el contexto no exige.
- source_word: ἤγαγον
  english_pob_choice: brought
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo trajeron
  - lo condujeron
  - lo llevaron consigo
  lexicon: BDAG
  rationale: El aoristo narra la acción completada de llevar a Pablo a Atenas. «Lo llevaron» es natural y fiel; conserva el movimiento hacia el destino sin cargar un matiz interpretativo adicional.
- source_word: ἕως Ἀθηνῶν
  english_pob_choice: as far as Athens
  chosen_spanish: hasta Atenas
  alternatives_spanish:
  - a Atenas
  - hasta la ciudad de Atenas
  lexicon: BDAG
  rationale: «Hasta Atenas» preserva el valor de extensión o alcance de ἕως, que en el contexto indica que lo acompañaron hasta ese punto. Es más fiel que simplemente «a Atenas», que podría perder la idea de límite alcanzado.
- source_word: λαβόντες ἐντολήν
  english_pob_choice: after receiving instructions
  chosen_spanish: después de recibir instrucciones
  alternatives_spanish:
  - después de recibir una orden
  - habiendo recibido un encargo
  - tras recibir un mandato
  lexicon: BDAG
  rationale: El participio temporal expresa que, al recibir la indicación, continuaron su camino. «Instrucciones» mantiene la naturalidad en español y deja abierta la fuerza de ἐντολή, que puede ir de instrucción a orden autoritativa.
- source_word: πρὸς τὸν Σιλᾶν καὶ τὸν Τιμόθεον
  english_pob_choice: for Silas and Timothy
  chosen_spanish: para Silas y Timoteo
  alternatives_spanish:
  - a Silas y Timoteo
  - con respecto a Silas y Timoteo
  lexicon: BDAG
  rationale: Aquí πρός señala a los destinatarios de las instrucciones. «Para Silas y Timoteo» es claro en español y refleja bien la relación de destinatario sin introducir más de lo que el texto dice.
- source_word: ἵνα ὡς τάχιστα ἔλθωσιν πρὸς αὐτόν
  english_pob_choice: to come to him as quickly as possible
  chosen_spanish: de que vinieran a él lo más pronto posible
  alternatives_spanish:
  - para que vinieran a él lo antes posible
  - que vinieran a él tan pronto como fuera posible
  - para que acudieran a él con la mayor rapidez posible
  lexicon: BDAG
  rationale: La cláusula expresa el contenido de las instrucciones y la urgencia. «Vinieran a él lo más pronto posible» conserva el sentido del subjuntivo final y de ὡς τάχιστα con un español natural; se evita explicitar «Pablo» para no añadir lo que el griego mantiene como «a él».
- source_word: ἐξῄεσαν
  english_pob_choice: they departed
  chosen_spanish: partieron
  alternatives_spanish:
  - se fueron
  - salieron
  - se marcharon
  lexicon: BDAG
  rationale: El imperfecto concluye la escena con una acción de salida. «Partieron» funciona bien narrativamente en español y resume la transición sin perder la idea de que se alejaron para seguir su camino.
translation_notes:
  revision_awareness: 'Se siguió el testimonio del griego SBLGNT y el rastro auditado en inglés, manteniendo la equivalencia óptima del POB: participios temporales en español natural, la extensión de ἕως con «hasta», y la ambigüedad de ἐντολή con «instrucciones» sin perder su posible fuerza de mandato. No se requirieron revisiones posteriores en el pasaje inglés, y la versión española conserva esa misma lectura.'
  spanish_consistency_notes:
  - Se usa «Pablo», «Silas» y «Timoteo» de forma consistente con los nombres propios establecidos.
  - Se conservó «a él» para αὐτόν, evitando sustituirlo por «a Pablo» para no añadir una identificación que el texto griego no explicita en ese punto.
  - La formulación «hasta Atenas» mantiene el límite de alcance implícito en ἕως mejor que una simple preposición de dirección.
