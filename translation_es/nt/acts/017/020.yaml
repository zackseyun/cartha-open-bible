translation:
  language: es
  text: Porque estás introduciendo algunas cosas extrañas[a] a nuestros oídos; por tanto, queremos saber qué[b] significan estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «extranjeras» o «desconocidas». El término griego puede describir algo extraño porque es nuevo o porque viene de fuera de la experiencia del oyente.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «qué quieren ser estas cosas». Es un giro idiomático que significa «qué quieren decir» o «qué significan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ξενίζοντα
  english_pob_choice: strange
  chosen_spanish: extrañas
  alternatives_spanish:
  - forasteras
  - ajenas
  - nuevas
  lexicon: BDAG
  rationale: El participio describe algo percibido como no familiar para los oyentes. «Extrañas» comunica bien esa reacción sin forzar «asombrosas» ni reducirlo solo a «extranjeras»; mantiene la tensión entre lo novedoso y lo ajeno.
- source_word: τινα
  english_pob_choice: some things
  chosen_spanish: cosas
  alternatives_spanish:
  - algunas cosas
  - ciertas cosas
  - algo
  lexicon: BDAG
  rationale: El indefinido neutro apunta a contenido no especificado. «Cosas» es natural en español y conserva la indeterminación; el matiz de «some» queda implícito por el contexto y por el artículo ausente en griego.
- source_word: εἰσφέρεις
  english_pob_choice: you are bringing
  chosen_spanish: estás introduciendo
  alternatives_spanish:
  - estás trayendo
  - introduces
  - traes
  lexicon: BDAG
  rationale: El verbo expresa llevar algo hacia el ámbito de los oyentes. «Introduciendo» reproduce mejor en español la idea de meter o llevar dentro de un espacio de escucha; «trayendo» sería más literal pero menos preciso para el giro idiomático.
- source_word: εἰς τὰς ἀκοὰς ἡμῶν
  english_pob_choice: to our ears
  chosen_spanish: en nuestros oídos
  alternatives_spanish:
  - a nuestros oídos
  - en nuestra escucha
  - a nuestra audiencia
  lexicon: BDAG
  rationale: La expresión es corporal e idiomática. «En nuestros oídos» preserva la imagen casi literal y suena natural en español bíblico contemporáneo; «a nuestros oídos» también es posible, pero aquí se prefirió la localización más directa del griego.
- source_word: βουλόμεθα
  english_pob_choice: we want
  chosen_spanish: queremos
  alternatives_spanish:
  - deseamos
  - queremos saber
  - tenemos el deseo
  lexicon: BDAG
  rationale: «Queremos» es la forma más directa y actual para expresar voluntad. En combinación con el infinitivo siguiente, resulta idiomático en español.
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: saber
  alternatives_spanish:
  - conocer
  - llegar a saber
  - enterarnos
  lexicon: BDAG
  rationale: Aquí el infinitivo complementa el deseo de entender el sentido de lo dicho. «Saber» transmite de forma natural la búsqueda de comprensión; «conocer» sonaría menos idiomático en este contexto.
- source_word: τίνα θέλει ταῦτα εἶναι
  english_pob_choice: what these things mean
  chosen_spanish: qué quiere significar esto
  alternatives_spanish:
  - qué son estas cosas
  - qué significan estas cosas
  - qué pretende ser esto
  lexicon: BDAG
  rationale: La construcción griega es idiomática y pregunta por el sentido o alcance de lo dicho, no solo por su identidad. «Qué quiere significar esto» conserva la orientación semántica del griego y refleja la lectura auditada de la POB inglesa, aunque deja visible la literalidad subyacente.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: «Porque» expresa la relación causal/explanatoria con lo anterior de modo natural en español. Mantiene la función de γάρ sin rigidez sintáctica.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - entonces
  - por eso
  lexicon: BDAG
  rationale: «Por tanto» mantiene la inferencia lógica marcada por οὖν y es adecuado en un registro bíblico digno.
translation_notes:
  revision_awareness: La redacción sigue el sentido ya auditado en la POB inglesa para Acts 17:20, pero vuelve al griego para conservar la imagen idiomática de «llevar a los oídos» y la pregunta «qué quiere significar esto». Se mantuvo la equivalencia óptima sin calcar mecánicamente el inglés.
  spanish_consistency_notes:
  - Se usó «oídos» para conservar la metáfora corporal del texto griego y la audición del audit trail inglés.
  - Se prefirió «extrañas» en vez de «forasteras» en el cuerpo principal por naturalidad, dejando las alternativas en nota.
  - No se añadió ninguna formulación teológica específica, pues el verso es una observación sobre la incomprensión de los oyentes y no contiene terminología doctrinal técnica.
