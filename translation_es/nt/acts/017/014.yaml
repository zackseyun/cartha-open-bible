translation:
  language: es
  text: Entonces inmediatamente los hermanos[a] enviaron a Pablo para que fuera hasta el mar[b]; pero tanto Silas como Timoteo se quedaron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas»; el griego dice «hermanos» y puede referirse colectivamente a los creyentes.
    reason: lexical_alternative
  - marker: b
    text: O «hasta el mar» o «hacia el mar»; la expresión griega puede indicar movimiento hasta la costa sin precisar más.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: Adverbio de prontitud; «inmediatamente» conserva el sentido de acción sin demora y suena natural en español contemporáneo.
- source_word: δὲ τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - y entonces
  - así que
  lexicon: BDAG
  rationale: La combinación marca transición narrativa. «Entonces» resume bien el avance temporal sin forzar una doble traducción de las partículas.
- source_word: ἐξαπέστειλαν
  english_pob_choice: sent ... away
  chosen_spanish: enviaron
  alternatives_spanish:
  - despidieron
  - mandaron
  lexicon: BDAG
  rationale: El verbo compuesto indica envío desde un lugar. En español, «enviaron» comunica el movimiento de salida con naturalidad; el matiz de alejamiento queda claro por el contexto y por «para que fuera».
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego. En este contexto puede incluir a toda la comunidad creyente, pero la forma fuente es ἀδελφοί, por lo que «los hermanos» preserva mejor la huella léxica.
- source_word: πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: para que fuera
  alternatives_spanish:
  - para ir
  - para viajar
  lexicon: BDAG
  rationale: Tras un verbo de envío, el infinitivo expresa propósito. «Para que fuera» fluye bien en español y evita un calco duro; el sentido básico de desplazamiento queda intacto.
- source_word: ἕως ἐπὶ τὴν θάλασσαν
  english_pob_choice: as far as the sea
  chosen_spanish: hasta el mar
  alternatives_spanish:
  - hasta la costa
  - hasta el mar / hacia el mar
  lexicon: BDAG
  rationale: La construcción indica movimiento hasta el borde marítimo o la costa. «Hasta el mar» mantiene la imagen espacial y deja abierta la posibilidad de un trayecto costeño, como en el texto griego.
- source_word: ὑπέμεινάν
  english_pob_choice: remained
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se quedaron allí
  lexicon: BDAG
  rationale: Aquí el verbo significa permanecer en un lugar, no soportar una prueba. «Se quedaron» es idiomático y expresa bien el contraste con la salida de Pablo.
- source_word: ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος
  english_pob_choice: both Silas and Timothy
  chosen_spanish: Silas y Timoteo
  alternatives_spanish:
  - ambos, Silas y Timoteo
  - tanto Silas como Timoteo
  lexicon: BDAG
  rationale: El correlative τε ... καὶ marca pareja; en español, el contraste ya queda claro en la frase. «Se quedaron» con dos sujetos nominales mantiene la idea sin necesidad de explicitar «ambos».
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: BDAG
  rationale: Adverbio locativo normal; «allí» es el equivalente más natural y mantiene la referencia a un lugar ya mencionado.
theological_decisions:
- issue: Alcance de ἀδελφοί en la comunidad creyente
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se conserva la forma gramatical del griego en el texto principal. Aunque el término puede incluir a toda la comunidad cristiana, la decisión de mantener «los hermanos» evita suavizar la forma fuente; la posible lectura inclusiva queda implícita por el contexto comunitario.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Dirección exacta de ἕως ἐπὶ τὴν θάλασσαν
  english_pob_reading: as far as the sea
  chosen_spanish_reading: hasta el mar
  alternative_spanish_readings:
  - hacia el mar
  - hasta la costa
  rationale: La frase griega permite un trayecto hasta la costa sin precisar el modo final del viaje. «Hasta el mar» conserva esa apertura semántica y no decide más de lo que el texto dice.
  doctrine_reference: Principio POB de no cerrar ambigüedades léxicas sin apoyo textual
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés: se mantuvo la progresión narrativa («Then»), el envío de Pablo, la idea de llegada hasta la costa y la permanencia de Silas y Timoteo. No se reportan revisiones aplicadas en el registro fuente, y la traducción sigue la decisión revisada de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva «los hermanos» como traducción base de ἀδελφοί, con nota para la lectura inclusiva.
  - «Hasta el mar» preserva la ambigüedad espacial del griego y evita especificar más de lo que el texto garantiza.
  - El verbo «se quedaron» traduce ὑπέμειναν en el sentido de permanecer, no de soportar.
