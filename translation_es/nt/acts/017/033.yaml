lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Entonces
  - De este modo
  lexicon: BDAG
  rationale: Aquí οὕτως funciona como conector discursivo que cierra la escena del Areópago. «Así» conserva el valor inferencial/narrativo de «So/Thus» con español natural y sobrio.
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se vierte por la forma española estándar «Pablo», transparente y reconocible para el lector hispanohablante.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  - salió de allí
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida/marcha. «Salió» reproduce la acción concreta con naturalidad en español y evita añadir matices no explícitos.
- source_word: ἐκ μέσου αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de entre ellos
  - de su midst
  - de entre la multitud
  lexicon: BDAG
  rationale: La expresión idiomática señala la salida del grupo reunido. «De en medio de ellos» mantiene la imagen espacial del griego y es plenamente inteligible en español.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés presentan alta concordancia y no requieren revisión sustantiva; se mantiene la misma fuerza narrativa con equivalencia idiomática española.
  spanish_consistency_notes:
  - Se mantiene «Pablo» como forma española estándar del nombre propio.
  - Se evita «Señor» u otra expansión interpretativa, pues el versículo no contiene léxico divino.
  - La preposición compuesta «de en medio de» conserva la imagen idiomática de ἐκ μέσου sin forzar un calco torpe.
