    text: Or, more traditionally, 'For in him we live and move and have our being.'
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' renders Greek γένος, which can also mean ''children,'' ''race,'' or ''kindred''; here it refers broadly to human derivation from God in the poetic citation.'
    reason: lexical_alternative
