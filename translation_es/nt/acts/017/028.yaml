translation:
  language: es
  text: 'Porque en él vivimos, y nos movemos, y somos[a], como incluso algunos de sus propios[b] poetas han dicho: «Porque también nosotros somos su descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Porque en él vivimos y nos movemos y tenemos nuestro ser».'
    reason: lexical_alternative
  - marker: b
    text: O «de entre ustedes». La expresión griega se refiere a poetas pertenecientes al propio pueblo o grupo de los oyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - mediante él
  lexicon: BDAG
  rationale: La preposición ἐν con dativo expresa aquí esfera o relación. «En él» conserva la imagen relacional sin convertirla en una explicación instrumental que el contexto no desarrolla.
- source_word: ζῶμεν
  english_pob_choice: we live
  chosen_spanish: vivimos
  alternatives_spanish:
  - tenemos vida
  lexicon: BDAG
  rationale: El verbo ζάω se rinde de forma directa y natural con «vivimos», manteniendo el valor simple del presente y el paralelismo de la serie verbal.
- source_word: κινούμεθα
  english_pob_choice: move
  chosen_spanish: nos movemos
  alternatives_spanish:
  - somos movidos
  - tenemos movimiento
  lexicon: BDAG
  rationale: La forma media/pasiva se expresa de manera idiomática con «nos movemos». «Somos movidos» sugeriría de modo demasiado explícito un agente externo, y «tenemos movimiento» suena forzado en español.
- source_word: ἐσμέν
  english_pob_choice: are
  chosen_spanish: somos
  alternatives_spanish:
  - existimos
  - estamos
  lexicon: BDAG
  rationale: Aunque εἰμί puede traducirse simplemente «ser/estar», en esta triada «somos» conserva la concisión y la fuerza existencial del griego. «Existimos» sería más explicativo; «estamos» debilita el valor ontológico del enunciado.
- source_word: ὡς καί τινες τῶν καθ’ ὑμᾶς ποιητῶν
  english_pob_choice: as even some of your own poets
  chosen_spanish: como incluso algunos de sus propios poetas
  alternatives_spanish:
  - como también algunos de los poetas entre ustedes
  - como algunos de sus poetas también
  lexicon: BDAG
  rationale: καθ’ ὑμᾶς indica pertenencia al grupo de oyentes; por eso «sus propios poetas» comunica bien la idea. «Incluso» refleja el énfasis de καί de manera natural en español.
- source_word: εἰρήκασιν
  english_pob_choice: have said
  chosen_spanish: han dicho
  alternatives_spanish:
  - dijeron
  lexicon: BDAG
  rationale: El perfecto griego se refleja adecuadamente con el pretérito perfecto compuesto, que en español mantiene la idea de una afirmación ya pronunciada y todavía vigente en cita.
- source_word: Τοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de este
  lexicon: BDAG
  rationale: El genitivo del pronombre remite a Dios en la cita. «Su» es la forma natural en español para la línea poética, sin perder la referencia posesiva.
- source_word: γένος
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - raza
  - hijos
  lexicon: BDAG
  rationale: γένος aquí expresa procedencia o estirpe en sentido amplio. «Descendencia» mantiene esa idea sin forzar una lectura de filiación adoptiva que el contexto no desarrolla. «Hijos» sería demasiado específico teológicamente; «raza» puede sonar ambiguo en español actual.
theological_decisions:
- issue: Relación de dependencia creada respecto de Dios en la frase «en él»
  english_pob_reading: Retain 'in him' without expanding it into a metaphysical explanation.
  chosen_spanish_reading: Conservar «en él» sin convertirlo en «por él» o «mediante él».
  alternative_spanish_readings:
  - por él
  - mediante él
  rationale: El versículo afirma dependencia y ámbito de vida, pero no define el mecanismo metafísico. «En él» preserva la tensión teológica del texto sin resolverla por paráfrasis.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Sentido de γένος en la cita poética
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - hijos
  - linaje
  rationale: La cita sostiene una procedencia humana respecto de Dios, pero no introduce por sí misma la categoría de adopción filial. «Descendencia» conserva la relación de origen sin añadir una teología más explícita de filiación.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «exist» por «are» para acercarse más a ἐσμέν. En español, esto favorece «somos» como opción más directa y concisa que «existimos», manteniendo además el paralelismo verbal de la tríada.
  spanish_consistency_notes:
  - Se mantuvo «en él» para ἐν αὐτῷ, conforme al valor relacional conservado por la POB en inglés.
  - Se evitó «Cristo» porque el texto habla de Dios en general y la cita poética no introduce terminología mesiánica.
  - Se prefirió «descendencia» a «hijos» para no importar una filiación adoptiva que el contexto no afirma explícitamente.
