    issue: Pronombre equivocado en «como incluso algunos de sus propios poetas»
    rationale: El griego τῶν καθ’ ὑμᾶς ποιητῶν significa «de entre ustedes / de su propio pueblo», es decir, de los oyentes atenienses. En español, «sus» remite naturalmente al antecedente más cercano, «él», y da a entender «los poetas de Dios», lo cual distorsiona el sentido.
  - severity: low
    issue: Puntuación de la cita mejorable
    rationale: Después de «han dicho» funciona mejor una coma antes de la cita poética introducida por dos puntos o simplemente dos puntos tras una construcción más natural. Es un ajuste estilístico menor.
