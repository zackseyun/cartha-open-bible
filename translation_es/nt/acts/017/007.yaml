base_translation:
  language: en
  yaml_path: translation/nt/acts/017/007.yaml
  text: These men[a], whom Jason has welcomed, are all acting against Caesar’s decrees[c][b], saying that there is another king—Jesus.
  footnotes:
  - marker: a
    text: Or 'has received' or 'has taken in.' The Greek verb can denote receiving guests or offering hospitality.
    reason: lexical_alternative
  - marker: b
    text: Or 'edicts' for 'decrees.' The term refers to official rulings or ordinances.
    reason: lexical_alternative
  - marker: c
    text: Or 'a different king.' The Greek says 'another king,' presenting the charge as a rival claim to Caesar’s rule.
    reason: alternative_reading
