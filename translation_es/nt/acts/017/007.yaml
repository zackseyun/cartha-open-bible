translation:
  language: es
  text: 'Estos hombres[a], a quienes Jasón ha recibido en su casa, todos actúan contra los decretos[b] de César, diciendo que hay otro rey[c]: Jesús.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ha recibido' o 'ha hospedado'. El verbo griego puede implicar recibir huéspedes y ofrecer hospitalidad.
    reason: lexical_alternative
  - marker: b
    text: O 'edictos'. El término se refiere a resoluciones u órdenes oficiales.
    reason: lexical_alternative
  - marker: c
    text: O 'un rey diferente'. El griego dice 'otro rey', presentando la acusación como una pretensión rival frente al gobierno de César.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποδέδεκται
  english_pob_choice: has welcomed
  chosen_spanish: ha recibido en su casa
  alternatives_spanish:
  - ha acogido
  - ha hospedado
  - ha recibido
  lexicon: BDAG
  rationale: El perfecto medio indica que Jasón les dio acogida como huéspedes; por eso conviene una expresión española que conserve la idea de hospitalidad y la base de la acusación. 'Ha recibido en su casa' suena natural y mantiene ese matiz mejor que un simple 'ha recibido'.
- source_word: ἀπέναντι
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en oposición a
  - frente a
  - contrario a
  lexicon: BDAG
  rationale: Con genitivo, el término expresa oposición. 'Contra' es la forma más directa y natural en español en este contexto legal y acusatorio.
- source_word: δογμάτων
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - edictos
  - ordenanzas
  lexicon: BDAG
  rationale: En el marco cívico romano, δόγματα se refiere a disposiciones oficiales. 'Decretos' es claro, formal y fiel al tipo de resolución implicada.
- source_word: πράσσουσι
  english_pob_choice: are ... acting
  chosen_spanish: actúan
  alternatives_spanish:
  - proceden
  - obran
  - están actuando
  lexicon: BDAG
  rationale: El presente denota conducta en curso. En español, 'actúan' transmite bien la idea verbal sin forzar una perífrasis innecesaria, manteniendo el tono de la acusación.
- source_word: βασιλέα ἕτερον
  english_pob_choice: another king
  chosen_spanish: otro rey
  alternatives_spanish:
  - un rey diferente
  - otro soberano
  - otro monarca
  lexicon: BDAG
  rationale: βασιλεύς significa específicamente 'rey', y ἕτερον marca a otro distinto. 'Otro rey' preserva con claridad la carga política de la acusación.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - declarando
  - alegando
  lexicon: BDAG
  rationale: El participio explica el contenido de la acusación. 'Diciendo' es transparente y no añade un grado de intensificación que el griego no exige.
- source_word: εἶναι Ἰησοῦν
  english_pob_choice: that there is ... Jesus
  chosen_spanish: que hay ... Jesús
  alternatives_spanish:
  - que Jesús es
  - que Jesús sea
  - que existe ... Jesús
  lexicon: BDAG
  rationale: 'El infinitivo en español requiere reestructuración. ''Que hay otro rey: Jesús'' conserva el sentido de contenido reportado y deja la identificación final con fuerza acusatoria.'
- source_word: οὗτοι πάντες
  english_pob_choice: These men ... are all
  chosen_spanish: Estos hombres ... todos
  alternatives_spanish:
  - todos estos hombres
  - estos todos
  - estos hombres todos
  lexicon: BDAG
  rationale: La frase es enfática y colectiva. 'Estos hombres ... todos' preserva la fuerza demostrativa y la generalización de la acusación en español natural.
theological_decisions:
- issue: Carga política y cristológica de 'otro rey'
  english_pob_reading: Render the charge straightforwardly as an accusation that they proclaim Jesus as another king, without softening it into merely spiritual language.
  chosen_spanish_reading: 'Traducir la acusación en términos políticos directos: ''otro rey: Jesús'', sin rebajarla a una categoría meramente espiritual.'
  alternative_spanish_readings:
  - 'otro líder: Jesús'
  - 'otro gobernante: Jesús'
  - 'un rey distinto: Jesús'
  rationale: El pasaje presenta una acusación explícita contra el orden de César. Mantener 'rey' preserva la tensión histórica y teológica, y evita suavizar la afirmación sobre Jesús.
  doctrine_reference: Preservar la tensión teológica e histórica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se requirieron revisiones adicionales respecto del sentido base; la principal decisión fue conservar la tensión político-cívica del pasaje y la hospitalidad implícita en ὑποδέδεκται.
  spanish_consistency_notes:
  - Se usó 'Jesús' para Ἰησοῦς conforme al estándar del proyecto.
  - Se mantuvo 'decretos' para δόγματα por el marco romano-cívico del pasaje.
  - Se evitó 'Cristo' porque el griego aquí nombra a Jesús directamente como el pretendido rey.
  - 'La puntuación con dos puntos en ''otro rey: Jesús'' refleja la identificación enfática del reclamado rey en español natural.'
