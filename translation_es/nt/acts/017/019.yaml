base_translation:
  language: en
  yaml_path: translation/nt/acts/017/019.yaml
  text: So they took hold of him and brought him to the Areopagus[a], saying[b], “May we know what this new teaching is that you are speaking?”
  footnotes:
  - marker: a
    text: Or, 'that you are speaking.' The Greek more literally says, 'the teaching being spoken by you.'
    reason: lexical_alternative
  - marker: b
    text: '''Areopagus'' may refer to the hill itself or to the council associated with it; traditional English also has ''Mars Hill.'''
    reason: cultural_note
