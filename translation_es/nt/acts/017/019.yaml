translation:
  language: es
  text: 'Así que lo tomaron consigo y lo llevaron al Areópago[a], diciendo: «¿Podríamos saber cuál es esta nueva enseñanza que estás enseñando?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Areópago’ puede referirse a la colina misma o al consejo asociado con ella; tradicionalmente también se ha dicho ‘colina de Marte’.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπιλαβόμενοί
  english_pob_choice: took hold of
  chosen_spanish: lo tomaron por la fuerza
  alternatives_spanish:
  - lo tomaron
  - lo agarraron
  - lo sujetaron
  lexicon: BDAG
  rationale: El participio puede expresar desde ‘tomar por la mano’ hasta ‘apoderarse de’. En este contexto, ‘lo tomaron por la fuerza’ comunica una acción física firme sin volverla innecesariamente hostil ni suavizarla demasiado.
- source_word: τε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: La partícula enlaza la acción con lo anterior. ‘Así que’ mantiene la progresión narrativa con naturalidad en español.
- source_word: ἐπὶ τὸν Ἄρειον Πάγον
  english_pob_choice: to the Areopagus
  chosen_spanish: al Areópago
  alternatives_spanish:
  - al Marteo
  - a la colina de Marte
  - ante el Areópago
  lexicon: BDAG
  rationale: Se conserva el nombre propio transliterado ‘Areópago’, como en el texto griego y en la tradición histórica del lugar/institución, sin resolver más de lo que el verso permite sobre si se trata de la colina o del consejo.
- source_word: ἤγαγον
  english_pob_choice: brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - condujeron
  lexicon: BDAG
  rationale: ‘Llevaron’ funciona de manera natural con el complemento de destino y refleja el sentido de ἄγω sin cargarlo con un matiz excesivamente formal.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio contemporáneo se expresa con ‘diciendo’, conservando la relación inmediata con la acción principal.
- source_word: Δυνάμεθα γνῶναι
  english_pob_choice: May we know
  chosen_spanish: ¿Podríamos saber?
  alternatives_spanish:
  - ¿Podemos saber?
  - ¿Se nos permite saber?
  lexicon: BDAG
  rationale: La forma griega es una petición cortés más que una pregunta sobre capacidad. ‘¿Podríamos saber?’ reproduce bien esa deferencia en español.
- source_word: καινὴ
  english_pob_choice: new
  chosen_spanish: nueva
  alternatives_spanish:
  - reciente
  - extraña
  lexicon: BDAG
  rationale: ‘Nueva’ es la equivalencia más directa y suficientemente amplia para καινός en este contexto.
- source_word: λαλουμένη
  english_pob_choice: that you are speaking
  chosen_spanish: que tú estás proclamando
  alternatives_spanish:
  - que tú estás hablando
  - que se está hablando por ti
  lexicon: BDAG
  rationale: El griego presenta una pasiva participial ‘siendo hablada por ti’. En español, ‘estás proclamando’ comunica con claridad la acción de hablar/enseñar sin una construcción pasiva pesada, y ‘proclamando’ conserva el peso público del discurso en el contexto de Pablo.
- source_word: διδαχή
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: ‘Enseñanza’ es el equivalente más natural y menos técnico en español contemporáneo, y evita sobrecargar el término con un matiz eclesiástico que el contexto no exige.
theological_decisions:
- issue: Alcance de la acción al llevar a Pablo al Areópago
  english_pob_reading: A firm but not necessarily hostile escort to the Areopagus
  chosen_spanish_reading: Una conducción firme, sin convertirla explícitamente en arresto
  alternative_spanish_readings:
  - Un arresto formal
  - Una invitación meramente cortés
  rationale: El verbo permite una acción física fuerte, pero el contexto inmediato habla de interés por el mensaje. Por eso la versión evita tanto ‘arresto’ como una suavización excesiva.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Sentido de Ἄρειος Πάγος
  english_pob_reading: Rendered as the proper name 'Areopagus' without specifying whether it is strictly the hill, the court, or both
  chosen_spanish_reading: ‘Areópago’ como nombre propio, sin decidir si designa la colina, la corte o ambas
  alternative_spanish_readings:
  - colina de Marte
  - consejo del Areópago
  rationale: La frase griega mantiene una ambigüedad histórica y geográfica que la traducción no debe resolver por cuenta propia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una pasiva incómoda por una formulación más natural; en español se siguió ese principio de naturalidad sin perder la referencia al contenido griego de la pregunta.
  spanish_consistency_notes:
  - Se usa ‘Areópago’ como transliteración estable del nombre propio.
  - Se mantiene el tratamiento de respeto con ‘tú’ porque el griego usa segunda persona singular.
  - ‘Nueva enseñanza’ se vierte como ‘nueva enseñanza/enseñanza’ según la naturalidad del español; aquí se eligió ‘nueva enseñanza’ para conservar el orden lógico del griego.
