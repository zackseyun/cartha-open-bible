    issue: «es servido» suena poco natural en español contemporáneo de lectura eclesial
    rationale: Aunque es comprensible y cercano al inglés auditado, en español «ser servido» suele asociarse a recibir servicio personal o doméstico. «Es atendido» preserva mejor la idea de ministración/atención recibida, encaja con el contexto de no necesitar nada y evita un calco innecesario.
  - severity: low
    issue: La nota «es adorado por manos humanas» puede pulirse
    rationale: La combinación es inteligible, pero menos idiomática en español. Una formulación como «es adorado por seres humanos» comunica la alternativa léxica con mayor naturalidad, mientras la línea principal conserva «por manos humanas» como eco del original.
  revised_spanish_text: Ni es atendido por manos humanas[a], como si necesitara de algo, pues él mismo da a todos vida, aliento y todas las cosas.
