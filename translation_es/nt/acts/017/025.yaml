  to: Ni es atendido por manos humanas[a], como si necesitara de algo, pues él mismo da a todos vida, aliento y todas las cosas.
  rationale: Se ajusta θεραπεύεται de «es servido» a «es atendido» para un español más natural y fiel al sentido de recibir servicio/atención sin necesidad. También se mejora la coordinación final («vida, aliento y todas las cosas») para fluidez, y se pule la nota alternativa para español más idiomático.
