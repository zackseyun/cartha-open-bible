translation:
  language: es
  text: Ni es atendido por manos humanas[a], como si necesitara de algo, pues él mismo da a todos vida, aliento y todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es adorado por seres humanos». El verbo griego puede referirse al servicio o a la atención ofrecidos en un contexto religioso; aquí la idea es que Dios no depende de ministraciones humanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεραπεύεται
  english_pob_choice: is served
  chosen_spanish: es servido
  alternatives_spanish:
  - es adorado
  - recibe servicio
  - es ministrado
  lexicon: BDAG
  rationale: En este contexto, con «por manos humanas» y la cláusula siguiente «como si necesitara de algo», el verbo no describe curación sino recibir servicio o atención. «Es servido» conserva la idea de dependencia cultual o ministrativa sin restringirla indebidamente a «adoración».
- source_word: ὑπὸ χειρῶν ἀνθρωπίνων
  english_pob_choice: by human hands
  chosen_spanish: por manos humanas
  alternatives_spanish:
  - por las manos de los hombres
  - por agencia humana
  lexicon: BDAG
  rationale: La expresión se mantiene concreta y casi literal para conservar el idiomatismo bíblico y la imagen de manos humanas como origen de una atención cultual o material.
- source_word: προσδεόμενός τινος
  english_pob_choice: as though he needed anything
  chosen_spanish: como si necesitara de algo
  alternatives_spanish:
  - puesto que no necesita nada
  - siendo necesitado de algo
  lexicon: BDAG
  rationale: El participio expresa la razón implícita por la que tal servicio sería necesario. «Como si necesitara de algo» reproduce bien el matiz retórico y la indefinición de τινος sin volverlo demasiado explicativo.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - mismo
  lexicon: BDAG
  rationale: El pronombre es enfático. «Él mismo» conserva ese énfasis natural en español y contrasta a Dios con cualquier ser dependiente.
- source_word: διδοὺς
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - otorga
  lexicon: BDAG
  rationale: Un verbo finito en español fluye con naturalidad tras «pues» y mantiene el sentido causal del participio presente.
- source_word: πᾶσι
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los seres
  - a cada uno
  lexicon: BDAG
  rationale: «A todos» preserva el alcance universal y no lo restringe solo a seres humanos.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  - vida propia
  lexicon: BDAG
  rationale: Renderizado estándar y directo; en conjunto con «aliento» expresa que Dios es dador de la vida misma.
- source_word: πνοὴν
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - espíritu
  lexicon: BDAG
  rationale: «Aliento» comunica bien la dependencia creatural y evita sobreinterpretar el término como «espíritu» en este paralelismo con «vida».
- source_word: καὶ τὰ πάντα
  english_pob_choice: and all things
  chosen_spanish: y todas las cosas
  alternatives_spanish:
  - y todo
  - y todas las demás cosas
  lexicon: BDAG
  rationale: La frase amplía el alcance más allá de «vida» y «aliento». «Todas las cosas» refleja con sobriedad el totalizador griego τὰ πάντα en un registro formal.
theological_decisions:
- issue: Si θεραπεύεται debe sonar explícitamente a culto/adoración o más ampliamente a servicio religioso
  english_pob_reading: is served
  chosen_spanish_reading: es servido
  alternative_spanish_readings:
  - es adorado
  - recibe servicio
  rationale: El argumento de Pablo subraya que Dios no depende de ministraciones humanas. «Es servido» conserva esa amplitud y no reduce el sentido a una sola esfera devocional, manteniendo la tensión léxica del griego.
  doctrine_reference: 'Principio POB: primacía del idioma fuente y respeto por la amplitud semántica; no resolver prematuramente una tensión teológica por tradición de traducción.'
translation_notes:
  revision_awareness: Se sigue de cerca la revisión inglesa más reciente que prefirió «all things» frente a una forma más general, y se conserva el énfasis retórico de la cláusula causal. En español se optó por un equivalente natural y publicable que mantiene la negación inicial, la independencia divina y el paralelismo «vida / aliento / todas las cosas».
  spanish_consistency_notes:
  - Se usó «Dios» implícito por el contexto de la perícopa, sin introducir un sujeto nuevo que el versículo no explicite en esta línea.
  - «Aliento» se prefirió a «respiración» por tono bíblico y porque encaja mejor con el paralelismo con «vida».
  - «Todas las cosas» conserva el alcance totalizante de τὰ πάντα en un registro más solemne que «todo».
