translation:
  language: es
  text: Después de recibir una garantía[a] de Jasón y de los demás, los pusieron en libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "una cantidad suficiente"; probablemente una caución o depósito legal para garantizar una conducta pacífica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: after taking
  chosen_spanish: y después de recibir
  alternatives_spanish:
  - habiendo recibido
  - después de haber recibido
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, 'después de recibir' preserva la secuencia temporal sin sonar demasiado pesado. 'Recibir' funciona bien con el objeto implícito de garantía/depósito.
- source_word: τὸ ἱκανὸν
  english_pob_choice: security
  chosen_spanish: una fianza
  alternatives_spanish:
  - una garantía suficiente
  - una seguridad
  - un depósito suficiente
  lexicon: BDAG
  rationale: En este contexto jurídico-cívico, el giro sugiere una garantía o caución para asegurar buena conducta. 'Fianza' comunica de manera natural esa función legal en español, sin precisar más de lo que el griego indica.
- source_word: παρὰ τοῦ Ἰάσονος καὶ τῶν λοιπῶν
  english_pob_choice: from Jason and the others
  chosen_spanish: de Jasón y de los demás
  alternatives_spanish:
  - de Jasón y del resto
  - de Jasón y de los otros
  lexicon: BDAG
  rationale: παρά con genitivo expresa procedencia; en español, 'de' es la manera más directa y clara. 'Los demás' evita forzar una totalidad técnica y mantiene el referente grupal inmediato.
- source_word: ἀπέλυσαν
  english_pob_choice: they released
  chosen_spanish: los soltaron
  alternatives_spanish:
  - los liberaron
  - los pusieron en libertad
  lexicon: BDAG
  rationale: Aunque el verbo puede ser 'liberar' en ciertos contextos, aquí la idea es el cese de detención tras recibir la garantía. 'Soltaron' es natural en español y conserva el valor de dejar ir/releasar sin sobredeterminar el matiz jurídico.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ellos
  lexicon: BDAG
  rationale: El acusativo plural se refiere a los detenidos; en español, el objeto directo 'los' es la correspondencia normal y mantiene la referencia clara.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego y con la solución auditada en inglés; no se detectan revisiones aplicadas ni tensiones textuales adicionales para esta cláusula breve.
  spanish_consistency_notes:
  - Se mantiene 'Jasón' para Ἰάσων, con la grafía habitual en español bíblico.
  - '''Fianza'' se usa como equivalencia funcional de la caución/garantía legal sugerida por τὸ ἱκανὸν; la nota preserva la alternativa semántica importante.'
  - '''Los soltaron'' conserva el sentido procesal de ἀπολύω en este contexto sin introducir un tecnicismo innecesario.'
