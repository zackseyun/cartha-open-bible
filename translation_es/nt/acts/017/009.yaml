- from: Y después de recibir una fianza[a] de Jasón y de los demás, los soltaron.
  to: Después de recibir una garantía[a] de Jasón y de los demás, los pusieron en libertad.
  rationale: Se ajusta τὸ ἱκανόν a 'garantía' para reflejar mejor la amplitud del sentido jurídico de 'security' documentado por el POB, sin sobredeterminarlo. Se cambia 'los soltaron' por 'los pusieron en libertad' para un registro más digno y más acorde con el contexto judicial. También se omite la conjunción inicial para un español más natural.
