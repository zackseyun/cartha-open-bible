revisions:
- from: Por tanto, habiendo pasado por alto los tiempos de ignorancia, Dios ahora manda[a] a todos los seres humanos en todas partes[b] que se arrepientan.
  to: Por tanto, habiendo pasado por alto los tiempos de ignorancia, Dios ahora manda a todas las personas[a] en todas partes que se arrepientan.
  rationale: Se mejora la naturalidad y legibilidad del español sin cambiar el sentido del griego ni las decisiones teológicas del POB. «Personas» conserva el valor genérico de ἀνθρώποις mejor que «seres humanos» en este contexto, y se elimina una nota no esencial sobre «manda».
