    unchanged: false
    changes_summary: Replaced 'although God overlooked' with 'having overlooked' to reflect the participial construction more accurately, and changed 'change their thinking' to 'repent' as the standard and more faithful rendering of μετανοεῖν.
translation:
  language: es
  text: Por tanto, habiendo pasado por alto los tiempos de ignorancia, Dios ahora manda a todas las personas[a] en todas partes que se arrepientan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἀνθρώποις, usado aquí en sentido genérico para seres humanos; por eso se traduce «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς μὲν οὖν χρόνους
  english_pob_choice: Therefore, having overlooked the times
  chosen_spanish: Por tanto, habiendo pasado por alto los tiempos
  alternatives_spanish:
  - Así pues, habiendo pasado por alto los tiempos
  - Por tanto, habiendo ignorado los tiempos
  lexicon: BDAG
  rationale: μὲν οὖν marca transición con contraste implícito, y el participio aoristo ὑπεριδών pide una construcción participial en español. «Habiendo pasado por alto» conserva la idea de forbearancia temporal sin sugerir aprobación.
- source_word: τῆς ἀγνοίας
  english_pob_choice: of ignorance
  chosen_spanish: de ignorancia
  alternatives_spanish:
  - de desconocimiento
  - de no saber
  lexicon: BDAG
  rationale: «Ignorancia» reproduce el sustantivo ἀγνοία de forma directa y mantiene la fuerza del contraste con el mandato presente. Las alternativas explican más, pero añaden matiz no explícito en el griego.
- source_word: ὑπεριδὼν
  english_pob_choice: overlooked
  chosen_spanish: habiendo pasado por alto
  alternatives_spanish:
  - habiendo tolerado
  - habiendo pasado de largo
  lexicon: BDAG
  rationale: El aoristo participial expresa una acción anterior de tolerancia o forbearance divina. «Pasado por alto» es natural en español y no implica aprobación moral.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Sujeto nominativo claro y directo; «Dios» es la forma natural y fiel en español.
- source_word: τὰ νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - en el presente
  lexicon: BDAG
  rationale: El adverbio temporal contrasta con «los tiempos de ignorancia»; «ahora» preserva esa oposición con naturalidad en español.
- source_word: παραγγέλλει
  english_pob_choice: commands
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - comanda
  - instruye
  lexicon: BDAG
  rationale: παραγγέλλω puede traducirse con lenguaje de mandato. «Manda» es idiomático en español y conserva la fuerza imperativa divina sin sobrecargar el estilo.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: a todos los seres humanos
  alternatives_spanish:
  - a todas las personas
  - a la humanidad
  lexicon: BDAG
  rationale: Aunque ἄνθρωποι es masculino gramaticalmente, aquí es genérico. «Seres humanos» hace explícita la referencia universal sin restringirla a varones y mantiene el alcance colectivo.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos los hombres y mujeres
  lexicon: BDAG
  rationale: 'El adjetivo cuantificador refuerza la universalidad del mandato. En español queda mejor integrado con el objeto indirecto: «a todos».'
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: en todas partes
  alternatives_spanish:
  - por doquier
  - en todo lugar
  lexicon: BDAG
  rationale: Adverbio de lugar con sentido distributivo universal. «En todas partes» es claro, amplio y natural en español contemporáneo.
- source_word: μετανοεῖν
  english_pob_choice: to repent
  chosen_spanish: que se arrepientan
  alternatives_spanish:
  - que cambien de mente
  - que hagan arrepentimiento
  lexicon: BDAG
  rationale: En este contexto proclamativo, μετανοέω abarca el giro moral y relacional propio de «arrepentirse». Las alternativas son más explicativas o menos idiomáticas en español.
theological_decisions:
- issue: Sentido de «haber pasado por alto» los tiempos de ignorancia
  english_pob_reading: God overlooked these times in the sense of forbearance or non-immediate judgment, not approval or indifference to sin.
  chosen_spanish_reading: Dios los pasó por alto en el sentido de una tolerancia previa, no de aprobación de la ignorancia o del pecado.
  alternative_spanish_readings:
  - Dios ignoró esos tiempos
  - Dios excusó por completo esa ignorancia
  rationale: 'El participio ὑπεριδών debe conservar la tensión teológica: Dios no sanciona la ignorancia, pero sí mostró paciencia antes del mandato presente. «Pasó por alto» permite esa lectura sin borrar la responsabilidad humana.'
  doctrine_reference: Preservar la tensión teológica del texto
- issue: Alcance universal del mandato de arrepentirse
  english_pob_reading: 'The command is universal: ''all people everywhere.'''
  chosen_spanish_reading: 'El mandato es universal: «a todos los seres humanos en todas partes».'
  alternative_spanish_readings:
  - a todos los hombres en todas partes
  - a toda la humanidad
  rationale: πάντας πανταχοῦ con τοῖς ἀνθρώποις expresa universalidad total. «Seres humanos» conserva el alcance genérico del griego y evita una lectura restringida al masculino.
  doctrine_reference: Precisión genérica y universalidad del llamado
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: conserva la construcción participial («habiendo pasado por alto») y traduce μετανοεῖν como «arrepentirse», en vez de paráfrasis cognitivas. También mantiene el contraste temporal entre el pasado de ignorancia y el mandato presente.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara; el sujeto divino se tradujo directamente como «Dios».
  - Se prefirió una formulación universal y genérica («seres humanos») para ἄνθρωποι, coherente con la nota auditada en inglés.
  - «Haber pasado por alto» preserva la forbearance divina sin implicar aprobación; no se sustituyó por un término más doctrinalmente cargado.
  - «Arrepentirse» se usó como equivalente bíblico estándar de μετανοεῖν, manteniendo tanto el giro moral como la respuesta exigida.
