review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: Dios, habiendo pasado por alto los tiempos de ignorancia, ahora emite un mandato universal de arrepentimiento. También preserva correctamente la idea teológica de forbearancia previa, no aprobación. Sin embargo, la redistribución de τοῖς ἀνθρώποις + πάντας como «a todos los seres humanos» es algo pesada y la nota anclada en «manda» no corresponde a una ambigüedad realmente significativa del texto base.'
  spanish_quality_summary: El español es claro y fiel, pero puede sonar más natural y más cercano al estilo bíblico eclesial con «manda a todas las personas en todas partes» o «manda a todos, en todas partes». Además, conviene evitar una nota innecesaria sobre «manda» y mantener solo la aclaración útil sobre el sentido genérico de ἀνθρώποις.
  glossary_alignment: 'Alineado con los términos del proyecto: θεός -> «Dios»; μετανοεῖν -> «arrepentirse». No hay conflicto con Yahvé/Mesías u otros términos marco. La elección «seres humanos» es semánticamente válida para ἀνθρώποις, pero «personas» resulta más natural en español neutral y conserva igual alcance genérico.'
  issues:
  - severity: medium
    issue: «a todos los seres humanos en todas partes» suena pesado y algo explicativo
    rationale: Aunque fiel al sentido universal de τοῖς ἀνθρώποις πάντας πανταχοῦ, en español bíblico natural «a todas las personas en todas partes» comunica el mismo alcance con mejor fluidez.
  - severity: low
    issue: La nota [a] sobre «manda»/«ordena» es innecesaria
    rationale: El verbo παραγγέλλει sí tiene fuerza de mandato, pero «manda» ya la expresa adecuadamente. No hay aquí una alternativa que el lector español necesite para evitar pérdida de sentido.
  revised_spanish_text: Por tanto, habiendo pasado por alto los tiempos de ignorancia, Dios ahora manda a todas las personas[a] en todas partes que se arrepientan.
  revised_footnotes:
  - marker: a
    text: Griego ἀνθρώποις, usado aquí en sentido genérico para seres humanos; por eso se traduce «personas».
    reason: lexical_alternative
  revision_rationale: Se mejora la naturalidad y legibilidad del español sin cambiar el sentido del griego ni las decisiones teológicas del POB. «Personas» conserva el valor genérico de ἀνθρώποις mejor que «seres humanos» en este contexto, y se elimina una nota no esencial sobre «manda».
