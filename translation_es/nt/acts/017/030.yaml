  text: τοὺς μὲν οὖν χρόνους τῆς ἀγνοίας ὑπεριδὼν ὁ θεὸς τὰ νῦν ⸀παραγγέλλει τοῖς ἀνθρώποις ⸀πάντας πανταχοῦ μετανοεῖν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/030.yaml
  text: Therefore[a], having overlooked the times of ignorance, God now commands all people everywhere to repent[b],
  footnotes:
  - marker: a
    text: Or 'having overlooked' or 'passed over.' The sense is that God formerly bore with these times of ignorance rather than that he approved them.
    reason: lexical_alternative
  - marker: b
    text: Greek 'men' (anthrōpois), used here in a generic sense for human beings; hence 'people.'
    reason: lexical_alternative
