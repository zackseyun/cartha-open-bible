translation:
  language: es
  text: Pues todos los atenienses y los extranjeros que estaban de paso allí pasaban el tiempo en nada más que en decir o en oír algo más nuevo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «algo nuevo». El griego usa el comparativo «más nuevo», probablemente para expresar un apetito continuo por la última novedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀθηναῖοι
  english_pob_choice: the Athenians
  chosen_spanish: los atenienses
  alternatives_spanish:
  - atenienses
  lexicon: BDAG
  rationale: El griego presenta a los habitantes de Atenas como un grupo definido; en español, el artículo plural naturaliza la referencia colectiva sin perder precisión.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí funciona como transición narrativa suave. 'Ahora' conserva el matiz introductorio sin volverlo adversativo con más fuerza de la que tiene el griego.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos y cada uno
  lexicon: BDAG
  rationale: Se mantiene la referencia universal inmediata del sujeto sin sobrecargar la frase.
- source_word: οἱ ἐπιδημοῦντες ξένοι
  english_pob_choice: the foreigners staying there
  chosen_spanish: los extranjeros que residían allí
  alternatives_spanish:
  - los extranjeros que estaban allí
  - los extranjeros residentes allí
  - los extranjeros de paso que estaban allí
  lexicon: BDAG
  rationale: ἐπιδημοῦντες señala presencia temporal o de estancia; 'residían allí' conserva la idea de estar establecidos en el lugar por un tiempo, y 'extranjeros' traduce ξένοι con su sentido básico de forasteros/no locales.
- source_word: εἰς οὐδὲν ἕτερον
  english_pob_choice: in nothing else
  chosen_spanish: no se ocupaban de otra cosa
  alternatives_spanish:
  - en nada más
  - para nada más
  - en ninguna otra cosa
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con una construcción natural en español que preserve la exclusividad de la ocupación, como hace el inglés auditado.
- source_word: ηὐκαίρουν
  english_pob_choice: would spend their time
  chosen_spanish: no se ocupaban
  alternatives_spanish:
  - pasaban el tiempo
  - se dedicaban
  - tenían tiempo para
  lexicon: BDAG
  rationale: El imperfecto expresa hábito. 'No se ocupaban' refleja la actividad continua y la idea de tener disponible el tiempo para esa sola actividad.
- source_word: ἢ λέγειν τι
  english_pob_choice: than telling something
  chosen_spanish: sino de decir
  alternatives_spanish:
  - sino de hablar
  - sino de contar
  lexicon: BDAG
  rationale: Después de la negación idiomática, 'sino de' es el correlato español más natural. 'Decir' preserva la generalidad del infinitivo griego sin imponer un matiz demasiado específico.
- source_word: ἢ ἀκούειν
  english_pob_choice: or hearing
  chosen_spanish: o de oír
  alternatives_spanish:
  - o de escuchar
  lexicon: BDAG
  rationale: El par 'decir / oír' mantiene el paralelismo verbal. 'Oír' es más directo para el acto de recibir novedades; 'escuchar' sugeriría una atención más volitiva que el griego no exige.
- source_word: τι καινότερον
  english_pob_choice: something newer
  chosen_spanish: algo más nuevo
  alternatives_spanish:
  - algo nuevo
  - alguna novedad
  - algo más novedoso
  lexicon: BDAG
  rationale: 'Se conserva el comparativo griego con ''más nuevo'', en vez de suavizarlo a ''nuevo''. Así se mantiene la tensión lexical documentada por el audit trail: deseo de algo ''más nuevo'', es decir, de la novedad reciente.'
theological_decisions:
- issue: No hay decisión doctrinal explícita; se trata de una observación cultural sobre la afición ateniense a la novedad.
  english_pob_reading: The verse describes the Athenians and resident foreigners as occupying themselves with hearing or telling something newer.
  chosen_spanish_reading: 'La frase describe una disposición cultural: ocupar el tiempo en decir o oír algo más nuevo.'
  alternative_spanish_readings:
  - buscando siempre novedades
  - interesados en oír cualquier cosa nueva
  rationale: No se introduce contenido doctrinal donde el texto no lo tiene. La redacción conserva el valor descriptivo y cultural del pasaje sin moralizarlo más allá de lo que dice el griego.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Coincide con el pasaje auditado en sentido y decisión léxica principal. Se preserva el comparativo de καινότερον con «más nuevo», tal como el audit trail inglés optó por «something newer» en vez de suavizarlo a «something new».
  spanish_consistency_notes:
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
  - Se mantuvo un registro neutro y bíblico, con sintaxis española natural, sin perder la estructura de exclusividad del griego.
  - La nota al pie preserva la alternativa idiomática aceptada por el audit trail y explicita el matiz comparativo del adjetivo griego.
