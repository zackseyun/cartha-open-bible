translation:
  language: es
  text: 'Ahora bien, cuando oyeron acerca de la resurrección de los muertos[a], unos se burlaban, pero otros dijeron: «Te oiremos otra vez acerca de esto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Te oiremos acerca de esto otra vez», preservando la fuerza explícita de «otra vez» (καὶ πάλιν).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de los verbos principales. «Cuando oyeron» mantiene esa relación de tiempo con español natural y sin sobrecargar la frase.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pues
  lexicon: BDAG
  rationale: El conector marca un leve avance discursivo. «Ahora bien» funciona bien en español para abrir la escena sin forzar contraste fuerte ni añadir interpretación.
- source_word: ἀνάστασιν νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de entre los muertos
  - la resurrección de los que han muerto
  lexicon: BDAG
  rationale: La expresión griega nombra la resurrección en relación con los muertos como categoría. «De los muertos» conserva la fórmula bíblica común en español y la fuerza conceptual del original.
- source_word: οἱ μὲν ... οἱ δὲ
  english_pob_choice: some ... but others
  chosen_spanish: unos ... pero otros
  alternatives_spanish:
  - algunos ... y otros
  - unos ... y otros
  lexicon: BDAG
  rationale: La correlación contrasta dos grupos dentro de la audiencia. «Unos ... pero otros» reproduce la oposición de manera clara y natural.
- source_word: ἐχλεύαζον
  english_pob_choice: mocked
  chosen_spanish: se burlaban
  alternatives_spanish:
  - se mofaban
  - se reían de él
  - burlaban
  lexicon: BDAG
  rationale: El imperfecto describe una acción en curso. «Se burlaban» expresa bien la reacción despectiva sin introducir un matiz inceptivo que el griego no exige.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - manifestaron
  lexicon: BDAG
  rationale: Aoristo narrativo simple; «dijeron» es la forma más directa y fiel al relato.
- source_word: Ἀκουσόμεθά σου
  english_pob_choice: We will hear you again
  chosen_spanish: Te oiremos otra vez
  alternatives_spanish:
  - Te escucharemos otra vez
  - Oiremos de ti otra vez
  lexicon: BDAG
  rationale: El futuro medio de ἀκούω con pronombre en genitivo expresa escuchar/oir a alguien. «Te oiremos otra vez» conserva la naturalidad y el valor relacional del griego.
- source_word: περὶ τούτου καὶ πάλιν
  english_pob_choice: about this
  chosen_spanish: acerca de esto
  alternatives_spanish:
  - sobre esto otra vez
  - en cuanto a esto
  lexicon: BDAG
  rationale: La frase indica el tema de lo que oirán. «Acerca de esto» es idiomático en español; la idea de «otra vez» se mantiene en el adverbio principal de la cita y no se añade duplicadamente al cuerpo.
theological_decisions:
- issue: Cómo verter la expresión de resurrección sin suavizar su alcance doctrinal
  english_pob_reading: the resurrection of the dead
  chosen_spanish_reading: la resurrección de los muertos
  alternative_spanish_readings:
  - la resurrección de entre los muertos
  - resurrección desde los muertos
  rationale: La frase no se amplía ni se reduce doctrinalmente. Se conserva el lenguaje directo del anuncio paulino, apto para una audiencia mixta y sin resolver la tensión teológica que el texto mismo deja abierta.
  doctrine_reference: Primacía del texto fuente y preservación de la terminología bíblica general de resurrección.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «some began mocking» a «some mocked» para evitar un matiz inceptivo no explicitado por el imperfecto. En español se refleja esa decisión con «se burlaban», que mantiene el imperfecto narrativo sin añadir «comenzaron a».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se conserva «resurrección de los muertos» como fórmula bíblica natural y conceptualmente amplia en español.
  - «Oír»/«escuchar» se mantiene según el valor relacional del griego; aquí «oír» funciona mejor con la construcción y evita una sobreinterpretación.
  - La puntuación de la cita directa sigue el español moderno, manteniendo la claridad narrativa.
