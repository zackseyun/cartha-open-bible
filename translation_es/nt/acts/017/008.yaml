translation:
  language: es
  text: Y alarmaron a la multitud y a las autoridades de la ciudad[a], al oír estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «los politarcas», un título cívico macedonio para autoridades de la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: ἐτάραξαν
  english_pob_choice: disturbed
  chosen_spanish: perturbaron
  alternatives_spanish:
  - trastornaron
  - alteraron
  - inquietaron
  lexicon: BDAG
  rationale: ταράσσω expresa causar perturbación, turbación o agitación; en español, 'perturbaron' comunica bien una alteración social y emocional sin intensificar indebidamente el tono.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una continuidad narrativa suave; 'Y' es el enlace más natural en español aquí.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la turba
  - el gentío
  - la gente
  lexicon: BDAG
  rationale: ὄχλος designa un grupo reunido; 'multitud' conserva el sentido colectivo de forma neutral. 'Turba' añadiría una connotación demasiado negativa.
- source_word: τοὺς πολιτάρχας
  english_pob_choice: the city officials
  chosen_spanish: los oficiales de la ciudad
  alternatives_spanish:
  - los politarcas
  - los magistrados
  - las autoridades de la ciudad
  lexicon: BDAG
  rationale: πολιτάρχης es un título cívico macedonio. 'Oficiales de la ciudad' mantiene una referencia comprensible sin ocultar el cargo local tras un tecnicismo opaco; 'politarcas' es más preciso pero menos transparente para el lector general.
- source_word: ἀκούοντας ταῦτα
  english_pob_choice: when they heard these things
  chosen_spanish: al oír estas cosas
  alternatives_spanish:
  - cuando oyeron estas cosas
  - oyendo estas cosas
  - al escuchar estas cosas
  lexicon: BDAG
  rationale: El participio presente funciona temporalmente respecto de ambos grupos; 'al oír estas cosas' suena natural en español y refleja el plural ταῦτα con 'estas cosas'.
translation_notes:
  revision_awareness: El griego presenta un solo verbo de perturbación que rige tanto a la multitud como a los πολιτάρχας; la versión española conserva esa coordinación y la relación temporal del participio ἀκούοντας sin sobreespecificar la reacción. La decisión de traducir πολιτάρχας de manera funcional sigue el criterio auditado del POB en inglés, con nota alternativa para el título técnico.
  spanish_consistency_notes:
  - Se mantiene 'Y' como conector narrativo leve para δὲ.
  - '''Multitud'' preserva el valor colectivo de ὄχλος sin cargarlo de hostilidad.'
  - '''Oficiales de la ciudad'' sigue la opción funcional del POB inglés; la nota ofrece la forma técnica ''politarcas'' para quien quiera mayor precisión.'
  - Se evita 'SEÑOR' o terminología litúrgica no pertinente, y no hay vocabulario teológico especial en este versículo.
