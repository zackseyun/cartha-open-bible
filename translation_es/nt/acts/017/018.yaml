translation:
  language: es
  text: 'Algunos de los filósofos epicúreos y estoicos[a] también conversaban con él, y algunos decían: «¿Qué quiere decir este charlatán[b]?». Pero otros decían: «Parece ser un proclamador de deidades extranjeras[c]», porque anunciaba las buenas nuevas acerca de Jesús y la resurrección[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debatiendo con él» o «discutiendo con él»; el verbo griego puede denotar discusión activa o disputa.
    reason: lexical_alternative
  - marker: b
    text: «Charlatán» traduce un término despectivo relacionado literalmente con un «recogedor de semillas», usado para alguien visto como recolector y repetidor de restos de ideas.
    reason: cultural_note
  - marker: c
    text: O «dioses extranjeros» o «demonios extranjeros». En este contexto pagano, los hablantes probablemente entienden seres divinos ajenos según su propio marco religioso, no necesariamente espíritus malignos en el sentido cristiano posterior.
    reason: alternative_reading
  - marker: d
    text: Algunos intérpretes piensan que los atenienses pudieron confundir «la resurrección» con otra deidad, porque Pablo anunciaba a Jesús y la resurrección.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέβαλλον αὐτῷ
  english_pob_choice: engaged with him
  chosen_spanish: discutían con él
  alternatives_spanish:
  - conversaban con él
  - debatían con él
  - trataban con él
  lexicon: BDAG
  rationale: El verbo puede señalar interacción en discusión o disputa. «Discutían con él» conserva esa interacción activa sin forzar una hostilidad mayor de la que exige el contexto.
- source_word: σπερμολόγος
  english_pob_choice: babbler
  chosen_spanish: charlatán
  alternatives_spanish:
  - parlanchín
  - hablador
  - recogedor de migajas de ideas
  lexicon: BDAG
  rationale: Es un término despectivo. «Charlatán» comunica bien el tono de desprecio en español y es más natural que una glosa demasiado literal como «recogedor de migajas de ideas».
- source_word: Τί ἂν θέλοι ... λέγειν
  english_pob_choice: What is this babbler trying to say?
  chosen_spanish: ¿Qué quiere decir este charlatán?
  alternatives_spanish:
  - ¿Qué podría querer decir este charlatán?
  - ¿Qué intenta decir este charlatán?
  lexicon: BDAG
  rationale: La construcción con optativo y ἄν expresa una pregunta tentativa o desdeñosa. «Quiere decir» refleja de forma natural el sentido idiomático en español sin volverlo demasiado interpretativo.
- source_word: Ξένων δαιμονίων
  english_pob_choice: foreign deities
  chosen_spanish: deidades extranjeras
  alternatives_spanish:
  - dioses extranjeros
  - divinidades extranjeras
  - demonios extraños
  lexicon: BDAG
  rationale: En este contexto pagano, δαιμόνια no debe imponerse como «demonios» en sentido cristiano posterior. «Deidades extranjeras» conserva la perspectiva de los hablantes y el valor religioso del término.
- source_word: καταγγελεὺς
  english_pob_choice: proclaimer
  chosen_spanish: proclamador
  alternatives_spanish:
  - anunciador
  - heraldo
  lexicon: BDAG
  rationale: El sustantivo designa a quien anuncia públicamente. «Proclamador» reproduce bien el carácter formal de la acusación y mantiene la raíz de la proclamación.
- source_word: εὐηγγελίζετο
  english_pob_choice: was proclaiming the good news
  chosen_spanish: anunciaba las buenas nuevas
  alternatives_spanish:
  - predicaba las buenas nuevas
  - evangelizaba
  lexicon: BDAG
  rationale: El verbo alude al anuncio gozoso del evangelio. «Anunciaba las buenas nuevas» preserva ese sentido con claridad y evita un lenguaje eclesiástico más cargado que podría ocultar la conexión léxica.
- source_word: ἀνάστασιν
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - Resurrección
  lexicon: BDAG
  rationale: El texto griego usa el sustantivo común dentro de la explicación narrativa de Lucas. En el cuerpo principal, «la resurrección» evita capitalizarla como si fuera un nombre propio, aunque la lectura personificada queda posible en la nota.
- source_word: Ἐπικουρείων καὶ Στοϊκῶν φιλοσόφων
  english_pob_choice: the Epicurean and Stoic philosophers
  chosen_spanish: los filósofos epicúreos y estoicos
  alternatives_spanish:
  - los pensadores epicúreos y estoicos
  - filósofos de los epicúreos y de los estoicos
  lexicon: BDAG
  rationale: La construcción genitiva se expresa naturalmente en español como una enumeración adjetival. Se mantiene el nombre de ambas escuelas filosóficas sin recargar la frase.
theological_decisions:
- issue: Cómo traducir δαιμόνια en una acusación pagana
  english_pob_reading: foreign deities
  chosen_spanish_reading: deidades extranjeras
  alternative_spanish_readings:
  - dioses extranjeros
  - divinidades extranjeras
  - demonios extraños
  rationale: La escena refleja la perspectiva de los oyentes atenienses, no una evaluación cristiana posterior. «Deidades extranjeras» evita importar la idea de demonios malignos donde el texto sugiere seres divinos ajenos a su marco religioso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si la resurrección debe leerse como nombre propio o como sustantivo común
  english_pob_reading: the resurrection
  chosen_spanish_reading: la resurrección
  alternative_spanish_readings:
  - Resurrección
  rationale: Aunque algunos intérpretes proponen que los atenienses la tomaron por otra divinidad, el texto narrativo explica el contenido de la predicación de Pablo. La traducción principal mantiene el sentido común y deja abierta la interpretación alternativa en nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del último pase sin cambios: la traducción española conserva el contraste entre la reacción filosófica, el insulto despectivo, la acusación religiosa pagana y la explicación narrativa sobre Jesús y la resurrección.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «resurrección» en minúscula en el texto principal por coherencia con la explicación narrativa.
  - «Deidades extranjeras» conserva la perspectiva de los interlocutores sin imponer la demonología cristiana posterior.
  - «Buenas nuevas» mantiene la conexión con el verbo de anuncio evangélico sin depender de una fórmula eclesiástica fija.
