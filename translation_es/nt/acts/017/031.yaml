  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y fidelidad idiomática del español: «al resucitarlo» representa mejor el participio instrumental que «mediante haberlo resucitado», y «a quien» fluye mejor que «al cual». Se conservan las decisiones léxicas centrales del POB y sus notas auditables.'
