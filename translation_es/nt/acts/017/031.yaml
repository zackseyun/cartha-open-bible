translation:
  language: es
  text: porque ha fijado un día en el cual va a juzgar al mundo habitado en justicia[a] por un hombre a quien ha designado, dando prueba[b] a todos al resucitarlo de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con justicia» para «en justicia» (δικαιοσύνῃ).
    reason: lexical_alternative
  - marker: b
    text: O «dando seguridad a todos»; más literalmente, «dando fe a todos» (πίστιν παρασχὼν πᾶσιν), aunque aquí el sentido es prueba o seguridad pública.
    reason: alternative_reading
lexical_decisions:
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la razón del llamado previo al arrepentimiento. «Porque» conserva bien la causalidad explícita y suena natural en español contemporáneo.
- source_word: ἔστησεν ἡμέραν
  english_pob_choice: has fixed a day
  chosen_spanish: ha fijado un día
  alternatives_spanish:
  - ha establecido un día
  - ha señalado un día
  lexicon: BDAG
  rationale: ἵστημι aquí expresa poner o determinar una fecha; «ha fijado» comunica con claridad un día ya determinado y mantiene la solemnidad del anuncio.
- source_word: ἐν ᾗ μέλλει κρίνειν
  english_pob_choice: on which he is going to judge
  chosen_spanish: en el cual va a juzgar
  alternatives_spanish:
  - en el que juzgará
  - en el cual está por juzgar
  lexicon: BDAG
  rationale: μέλλω con infinitivo señala acción futura/pendiente. «Va a juzgar» conserva esa inminencia o intención sin sonar forzado en español.
- source_word: τὴν οἰκουμένην
  english_pob_choice: the inhabited world
  chosen_spanish: al mundo habitado
  alternatives_spanish:
  - al mundo
  - a la tierra habitada
  lexicon: BDAG
  rationale: οἰκουμένη denota el mundo habitado, no solo el universo en abstracto. «Mundo habitado» preserva el alcance universal de juicio con precisión léxica.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: BDAG
  rationale: Aunque el inglés POB retiene «righteousness», en español «justicia» comunica mejor el valor judicial y moral de δικαιοσύνη en este contexto; se deja nota de la alternativa teológica y léxica.
- source_word: ἐν ἀνδρὶ ᾧ ὥρισεν
  english_pob_choice: by a man whom he appointed
  chosen_spanish: por un hombre al cual ha designado
  alternatives_spanish:
  - por un hombre que ha nombrado
  - por el hombre al cual ha designado
  lexicon: BDAG
  rationale: ἀνήρ es «hombre» y no un término genérico de persona. «Ha designado» conserva el sentido de ὁρίζω como nombrar/determinar, y «por» refleja el agente instrumental del juicio.
- source_word: πίστιν παρασχὼν πᾶσιν
  english_pob_choice: having given proof to all
  chosen_spanish: dando prueba a todos
  alternatives_spanish:
  - dando seguridad a todos
  - habiendo dado prueba a todos
  lexicon: BDAG
  rationale: La expresión παρέχω πίστιν aquí no debe leerse mecánicamente como «fe». En contexto significa brindar prueba, garantía o evidencia pública; «dando prueba» preserva ese sentido sin oscurecer el sustantivo πίστις.
- source_word: ἀναστήσας αὐτὸν ἐκ νεκρῶν
  english_pob_choice: by raising him from the dead
  chosen_spanish: mediante haberlo resucitado de entre los muertos
  alternatives_spanish:
  - al resucitarlo de entre los muertos
  - resucitándolo de entre los muertos
  lexicon: BDAG
  rationale: El aoristo participial expresa el medio por el cual Dios dio prueba. «Mediante haberlo resucitado» hace explícita esa relación y «de entre los muertos» refleja el valor idiomático de ἐκ νεκρῶν.
theological_decisions:
- issue: δικαιοσύνη como justicia/righteousness
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - en rectitud
  - con justicia
  rationale: En un contexto de juicio, «justicia» comunica de forma más inmediata la dimensión judicial y moral de δικαιοσύνη en español. No se elimina la tensión con «righteousness»; se preserva como alternativa válida en nota.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: πίστις en πίστιν παρασχὼν πᾶσιν
  english_pob_reading: having given proof to all
  chosen_spanish_reading: dando prueba a todos
  alternative_spanish_readings:
  - dando seguridad a todos
  - habiendo dado prueba a todos
  - dando garantía a todos
  rationale: Aquí πίστις funciona idiomáticamente como prueba/seguridad pública, no como el contenido habitual «fe». Mantener «prueba» evita una traducción engañosamente literal y respeta el argumento de Pablo en el contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
- issue: ἀνήρ en referencia al juez designado
  english_pob_reading: by a man whom he appointed
  chosen_spanish_reading: por un hombre al cual ha designado
  alternative_spanish_readings:
  - por el hombre al cual ha designado
  - por un varón al cual ha designado
  rationale: Se conserva el valor específico de ἀνήρ como «hombre», no una referencia genérica a «persona». El referente cristológico es claro por el contexto, pero la forma española mantiene la precisión léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con el pasaje de alta concordancia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el contexto anterior sin introducirlo aquí, porque el versículo depende sintácticamente del anuncio previo.
  - Se usa «Jesús» solo cuando el texto lo exige; en este versículo el referente aparece mediante «un hombre» y la identidad se deduce del contexto inmediato.
  - «Mundo habitado» conserva el alcance universal de οἰκουμένη sin sobredimensionarlo como «universo».
  - La fórmula «de entre los muertos» sigue la convención bíblica española y refleja el origen plural de νεκρῶν.
