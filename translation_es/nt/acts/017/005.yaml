translation:
  language: es
  text: Pero los judíos[a], poniéndose celosos y tomando consigo a algunos hombres perversos del mercado, formaron una turba y alborotaban la ciudad; y, llegando a la casa de Jasón, buscaban sacarlos[b] a la asamblea[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeos»; el griego dice literalmente «los judíos», sin limitar el referente a «los líderes judíos».
    reason: lexical_alternative
  - marker: b
    text: O «hacerlos salir»; el infinitivo griego puede expresar la idea de sacar o llevar fuera para una comparecencia pública.
    reason: alternative_reading
  - marker: c
    text: O «a la asamblea pública» o «ante el pueblo»; δῆμος se refiere aquí al cuerpo cívico reunido públicamente, no solo a una multitud indefinida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηλώσαντες
  english_pob_choice: becoming jealous
  chosen_spanish: poniéndose celosos
  alternatives_spanish:
  - llenándose de celos
  - volviéndose celosos
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa y motivo de lo que sigue. «Poniéndose celosos» conserva ese valor ingresivo mejor que un estado estático, y evita convertir el matiz relacional en una emoción genérica.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: El griego dice simplemente «los judíos». Mantengo el término directo del texto, sin reducirlo a «líderes» ni sustituirlo por una paráfrasis más limitada.
- source_word: προσλαβόμενοι
  english_pob_choice: taking along
  chosen_spanish: tomando consigo
  alternatives_spanish:
  - llevándose
  - trayendo consigo
  lexicon: BDAG
  rationale: El participio medio indica que añadieron personas a su grupo. «Tomando consigo» suena natural en español y conserva la idea de incorporar a otros sin sugerir reclutamiento formal.
- source_word: τῶν ἀγοραίων
  english_pob_choice: from the marketplace
  chosen_spanish: de entre los del mercado
  alternatives_spanish:
  - de entre los de la plaza
  - del mercado
  lexicon: BDAG
  rationale: ἀγοραῖος señala a personas asociadas con el ágora o mercado. «De entre los del mercado» refleja esa procedencia o asociación personal; la opción es ligeramente más concreta que «del mercado» y menos interpretativa que «vagos de la plaza».
- source_word: ἄνδρας τινὰς πονηρούς
  english_pob_choice: some wicked men
  chosen_spanish: a algunos hombres perversos
  alternatives_spanish:
  - a ciertos hombres malvados
  - a algunos hombres malhechores
  lexicon: BDAG
  rationale: ἄνδρας requiere «hombres», y πονηρούς marca una cualidad moral negativa. «Perversos» preserva esa carga moral fuerte sin suavizarla en exceso.
- source_word: ὀχλοποιήσαντες
  english_pob_choice: formed a mob
  chosen_spanish: formaron una turba
  alternatives_spanish:
  - amontonaron a la gente
  - reunieron a una multitud
  lexicon: BDAG
  rationale: El verbo implica hacer o reunir una masa de gente con tono hostil en el contexto. «Turba» conserva mejor el matiz peyorativo que una expresión neutral como «multitud».
- source_word: ἐθορύβουν τὴν πόλιν
  english_pob_choice: were throwing the city into an uproar
  chosen_spanish: alborotaban la ciudad
  alternatives_spanish:
  - estaban causando un alboroto en la ciudad
  - estaban perturbando la ciudad
  lexicon: BDAG
  rationale: El imperfecto describe acción continua. «Alborotaban la ciudad» es breve, vivo y suficientemente fuerte para θορυβέω, sin perder el sentido de disturbio público.
- source_word: ἐπιστάντες τῇ οἰκίᾳ Ἰάσονος
  english_pob_choice: coming to Jason’s house
  chosen_spanish: llegando a la casa de Jasón
  alternatives_spanish:
  - presentándose en la casa de Jasón
  - poniéndose ante la casa de Jasón
  lexicon: BDAG
  rationale: En esta construcción, ἐφίστημι puede significar llegar o presentarse ante un lugar. «Llegando a la casa de Jasón» encaja con la secuencia narrativa y mantiene la naturalidad en español.
- source_word: ἐζήτουν
  english_pob_choice: they were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - se esforzaban por hallar
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso. «Buscaban» conserva bien el sentido de búsqueda/intentona y evita introducir una perífrasis innecesaria.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: sacarlos
  alternatives_spanish:
  - a ellos
  - sacarlos a ellos
  lexicon: BDAG
  rationale: El pronombre se refiere a los misioneros por contexto, pero el griego conserva un «ellos» implícito. En español, «sacarlos» integra el referente sin recargar la frase.
- source_word: προαγαγεῖν
  english_pob_choice: to bring them out
  chosen_spanish: para presentarlos
  alternatives_spanish:
  - para sacarlos
  - para traerlos fuera
  lexicon: BDAG
  rationale: El infinitivo expresa llevar hacia adelante o sacar para comparecer. Dado que sigue «ante el pueblo», «presentarlos» capta la idea de comparecencia pública sin añadir violencia no explicitada por el verbo mismo.
- source_word: εἰς τὸν δῆμον
  english_pob_choice: to the assembly
  chosen_spanish: ante el pueblo
  alternatives_spanish:
  - a la asamblea
  - ante la asamblea pública
  lexicon: BDAG
  rationale: δῆμος no es meramente una multitud indefinida, sino el cuerpo cívico reunido en público. «Ante el pueblo» preserva ese sentido público e institucional en español, y mantiene abierta la nota explicativa sobre el término griego.
theological_decisions:
- issue: Referencia de οἱ Ἰουδαῖοι en un relato de conflicto
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los líderes judíos
  - los judeanos
  rationale: Sigo el sustantivo del texto sin estrecharlo a «líderes» ni desplazarlo a un etnónimo menos común. El contexto narra la oposición de un grupo concreto, pero la traducción no debe sustituir el término fuente por una interpretación no explicitada.
  doctrine_reference: Primacía del idioma original; fidelidad lexical sin paraphrase interpretativa
- issue: Sentido de δῆμος y su posible carga institucional
  english_pob_reading: to the assembly
  chosen_spanish_reading: ante el pueblo[c]
  alternative_spanish_readings:
  - a la asamblea
  - ante la asamblea pública
  rationale: «Pueblo» puede sonar más general en español, por eso lo acompaño con nota para precisar que δῆμος se refiere al cuerpo cívico reunido en público, no a una multitud indefinida. Así se conserva la tensión entre claridad idiomática y el matiz institucional del griego.
  doctrine_reference: Precisión semántica con apoyo en nota; evitación de sobreinterpretación
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB no introdujo cambios; el borrador español sigue de cerca el texto griego y conserva las decisiones léxicas auditadas, especialmente el valor ingresivo de ζηλώσαντες, el matiz hostil de ὀχλοποιήσαντες y la referencia cívica de δῆμος.
  spanish_consistency_notes:
  - Se mantiene «judíos» como equivalente principal de οἱ Ἰουδαῖοι, conforme al texto fuente y al audit trail.
  - Se usa «Mesías» no aplica en este versículo; no se introduce terminología cristológica innecesaria.
  - «Turba» y «alborotaban» preservan el tono negativo de la escena sin exagerar el verbo griego.
  - La nota sobre δῆμος clarifica el referente institucional sin sustituir el texto principal por una glosa intrusiva.
