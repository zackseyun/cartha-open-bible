  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Su espíritu» está bien. «Llena de ídolos» concuerda con la decisión auditada para κατείδωλον. La nota sobre «entregada a los ídolos» es útil como alternativa. La revisión principal es léxica en παρωξύνετο.
