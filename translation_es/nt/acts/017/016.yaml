translation:
  language: es
  text: Ahora bien, mientras Pablo los esperaba en Atenas, su espíritu[a] se sentía provocado dentro de él, al ver que la ciudad estaba llena de ídolos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «su ser interior»; el griego se refiere al interior personal de Pablo, no explícitamente al Espíritu Santo.'
    reason: lexical_alternative
  - marker: b
    text: O «entregada a los ídolos»; el adjetivo griego puede expresar una ciudad sumergida o dominada por la idolatría.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδεχομένου
  english_pob_choice: was waiting for
  chosen_spanish: los esperaba
  alternatives_spanish:
  - estaba esperando a
  - aguardaba a
  lexicon: BDAG
  rationale: El participio genitivo expresa una circunstancia temporal durativa. En español, «los esperaba» comunica con naturalidad que Pablo estaba en actitud de espera respecto de sus compañeros, sin perder el matiz continuo.
- source_word: παρωξύνετο
  english_pob_choice: was provoked
  chosen_spanish: se enardecía
  alternatives_spanish:
  - se irritaba
  - era provocado
  - se conmovía hondamente
  lexicon: BDAG
  rationale: El verbo imperfectivo presenta una reacción interna sostenida y aguda. «Se enardecía» conserva la intensidad de la agitación interior mejor que una opción suavizada como «se molestaba» o «se entristecía».
- source_word: τὸ πνεῦμα αὐτοῦ
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su ser interior
  - su ánimo
  lexicon: BDAG
  rationale: Aquí πνεῦμα se refiere al espíritu humano de Pablo, no al Espíritu Santo. «Su espíritu» es la forma más directa y fiel, y mantiene la distinción teológica del pasaje.
- source_word: ἐν αὐτῷ
  english_pob_choice: within him
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en él
  - en su interior
  lexicon: BDAG
  rationale: La frase refuerza la localización interior de la reacción. «Dentro de él» expresa con claridad ese sentido enfático en español.
- source_word: θεωροῦντος
  english_pob_choice: as he saw
  chosen_spanish: al ver
  alternatives_spanish:
  - mientras veía
  - al observar
  lexicon: BDAG
  rationale: El participio contemporáneo de percepción se vierte naturalmente con «al ver», que mantiene la simultaneidad sin sobredesarrollar el matiz de observación.
- source_word: κατείδωλον
  english_pob_choice: full of idols
  chosen_spanish: llena de ídolos
  alternatives_spanish:
  - entregada a los ídolos
  - abarrotada de ídolos
  lexicon: BDAG
  rationale: El adjetivo describe una ciudad saturada de imágenes e ídolos. «Llena de ídolos» reproduce la fuerza léxica de manera clara y lecturable en español.
- source_word: πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - Atenas
  lexicon: BDAG
  rationale: El griego dice literalmente «la ciudad», ya identificada antes como Atenas. Conservar «la ciudad» preserva la formulación del texto fuente.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como transición narrativa. «Ahora bien» comunica ese cambio de escena con un español sobrio y actual.
theological_decisions:
- issue: Referencia de «su espíritu»
  english_pob_reading: The verse refers to Paul's own human spirit being agitated, not explicitly to the Holy Spirit.
  chosen_spanish_reading: El texto habla del espíritu humano de Pablo, sin atribuir explícitamente la reacción al Espíritu Santo.
  alternative_spanish_readings:
  - El Espíritu Santo lo impulsaba interiormente
  - Su espíritu era el Espíritu Santo
  rationale: El posesivo «su» y la ubicación «dentro de él» apuntan a una reacción interior de Pablo. La traducción no debe introducir una atribución pneumatológica que el versículo no dice.
  doctrine_reference: Mantener la tensión textual sin añadir una lectura doctrinal no expresada por el pasaje.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como sin cambios; no hubo revisiones aplicadas en el historial, y la presente redacción mantiene la equivalencia óptima del audit trail en español.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se usó «espíritu» en sentido antropológico, no como mayúscula pneumatológica, para no desdibujar la distinción del griego.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene Ἰησοῦς ni Χριστός.
  - «La ciudad» se mantuvo literal para respetar el sustantivo explícito πόλις, con Atenas ya mencionada en el contexto inmediato.
