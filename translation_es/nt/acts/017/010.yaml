review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: los hermanos actúan con prontitud, envían a Pablo y Silas de noche a Berea, y al llegar entran en la sinagoga judía. Sin embargo, omite en el texto principal la fuerza correlativa de τε ... καί (''ambos'') que el English POB preserva con ''both Paul and Silas''. También puede mejorarse la colocación de ''de noche'' para que modifique con más naturalidad el envío urgente.'
  spanish_quality_summary: El español es claro y legible, pero la puntuación con comas alrededor de 'de noche' suena algo trabada. 'Entraron en la sinagoga de los judíos' es natural y fiel. Conviene añadir 'a ambos' para reflejar mejor el original sin volver la frase pesada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los hermanos', 'Berea' y 'la sinagoga de los judíos' están alineados con las decisiones auditadas. La revisión propuesta solo refuerza la fidelidad a τε ... καί.
  issues:
  - severity: medium
    issue: Falta la fuerza de τε ... καί en el texto principal.
    rationale: El griego destaca explícitamente a los dos enviados. El English POB lo conserva con 'both Paul and Silas'. En español, 'a ambos, Pablo y Silas' o 'tanto a Pablo como a Silas' preserva mejor ese matiz que solo 'a Pablo y a Silas'.
  - severity: low
    issue: La puntuación de 'de noche' resulta algo forzada.
    rationale: '''Enviaron de inmediato, de noche, ...'' es comprensible, pero ''enviaron de inmediato ... durante la noche'' o ''de noche'' sin inciso mejora la fluidez y mantiene el valor temporal de διὰ νυκτός.'
  revised_spanish_text: Entonces los hermanos enviaron de inmediato, de noche, a ambos, Pablo y Silas, a Berea[a], y cuando llegaron[b], entraron en la sinagoga de los judíos[c].
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», que puede referirse a la comunidad creyente en general.
    reason: lexical_alternative
  - marker: b
    text: O «durante la noche».
    reason: lexical_alternative
  - marker: c
    text: O «la sinagoga judía».
    reason: lexical_alternative
  revision_rationale: 'Se añadió ''a ambos'' para reflejar la fuerza de τε ... καί, preservada en el English POB. También se reubicaron las notas para que correspondan a los mismos puntos léxicos que en el expediente auditado: Berea, la expresión temporal alternativa y la alternativa para ''sinagoga de los judíos''. El resto del texto ya era fiel y natural en español.'
