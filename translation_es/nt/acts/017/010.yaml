translation:
  language: es
  text: Entonces los hermanos enviaron de inmediato, de noche, a ambos, Pablo y Silas, a Berea[a], y cuando llegaron[b], entraron en la sinagoga de los judíos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», que puede referirse a la comunidad creyente en general.
    reason: lexical_alternative
  - marker: b
    text: O «durante la noche».
    reason: lexical_alternative
  - marker: c
    text: O «la sinagoga judía».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se conserva el plural masculino del griego como forma directa, sin expandirlo en el texto principal. En español, «los hermanos» puede abarcar a la comunidad creyente según el contexto, y mantiene la precisión gramatical y la economía del original.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «De inmediato» comunica la prontitud de la acción en español natural y digno, sin perder el matiz de urgencia.
- source_word: διὰ νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  lexicon: BDAG
  rationale: La expresión idiomática señala que la acción ocurrió en el transcurso de la noche. «De noche» es breve y natural en español, manteniendo el valor temporal.
- source_word: ἐξέπεμψαν
  english_pob_choice: sent ... away
  chosen_spanish: enviaron
  alternatives_spanish:
  - despacharon
  - enviaron lejos
  lexicon: BDAG
  rationale: El verbo compuesto sugiere salida o partida promovida por otros. En español, el contexto de urgencia ya está dado por «de inmediato» y «de noche», por lo que «enviaron» comunica bien el acto sin sobrecargar la frase.
- source_word: τόν τε Παῦλον καὶ τὸν Σιλᾶν
  english_pob_choice: both Paul and Silas
  chosen_spanish: a Pablo y a Silas
  alternatives_spanish:
  - a ambos, Pablo y Silas
  - tanto a Pablo como a Silas
  lexicon: BDAG
  rationale: El valor correlativo de τε ... καί se entiende por la estructura coordinada en español; no es necesario forzar una construcción pesada. Se conserva la referencia clara a ambos sujetos.
- source_word: Βέροιαν
  english_pob_choice: Berea
  chosen_spanish: Berea
  alternatives_spanish:
  - Beroea
  lexicon: BDAG
  rationale: Se mantiene la forma habitual y reconocible del topónimo en español bíblico moderno.
- source_word: οἵτινες
  english_pob_choice: and when they
  chosen_spanish: y cuando
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: BDAG
  rationale: En español, la función del relativo continuativo se expresa con naturalidad mediante la conjunción temporal «y cuando», que evita una literalidad poco fluida y conserva la secuencia narrativa.
- source_word: παραγενόμενοι
  english_pob_choice: when they arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - habiendo llegado
  - al llegar
  lexicon: BDAG
  rationale: El participio temporal se vierte con el pasado simple para una narrativa clara y fluida. El sentido de llegada queda plenamente conservado en contexto.
- source_word: συναγωγὴν τῶν Ἰουδαίων
  english_pob_choice: the synagogue of the Jews
  chosen_spanish: la sinagoga de los judíos
  alternatives_spanish:
  - la sinagoga judía
  - la sinagoga
  lexicon: BDAG
  rationale: Se preserva la construcción genitiva transparente del griego. «De los judíos» refleja el referente comunitario local sin suavizar ni reinterpretar la frase.
- source_word: ἀπῄεσαν
  english_pob_choice: they went into
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron
  - se dirigieron
  lexicon: BDAG
  rationale: Dado el complemento de dirección «en la sinagoga», el verbo natural en español es «entraron». Comunica la acción de manera idiomática y exacta.
theological_decisions:
- issue: Alcance de ἀδελφοὶ en una comunidad creyente mixta
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se mantiene el masculino plural del original en el texto principal. Aunque el contexto puede incluir a toda la comunidad creyente, el griego no usa una forma explícitamente inclusiva, y el español permite conservar esa precisión sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor comunitario de τῶν Ἰουδαίων
  english_pob_reading: of the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - judía
  - de la comunidad judía
  rationale: La frase se traduce de manera transparente y sin atenuación. En el contexto de Hechos, identifica la sinagoga de la comunidad judía local, no una valoración teológica negativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registraron cambios y el informe de control cruzado indica alta concordancia (agreement 1.0). No se detectan tensiones textuales nuevas respecto del original griego ni del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Berea» como topónimo estándar en español bíblico.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni un κύριος relevante.
  - Se conserva «los judíos» como traducción transparente del genitivo griego.
  - La puntuación y el orden mantienen la secuencia narrativa del griego con naturalidad española.
