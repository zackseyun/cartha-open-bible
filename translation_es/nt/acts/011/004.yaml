translation:
  language: es
  text: Pero Pedro comenzó y les explicó en orden[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de manera ordenada», «en secuencia» o «les expuso un relato ordenado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρξάμενος
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - habiendo comenzado
  - empezando
  lexicon: BDAG
  rationale: El participio aoristo medio funciona de manera adverbial con el verbo principal. En español, «comenzó» expresa de forma natural el inicio de la acción sin forzar una estructura participial pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ introduce transición con leve contraste respecto de la acusación anterior; «Pero» reproduce bien ese giro discursivo en español.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro apóstol
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española habitual del nombre propio.
- source_word: ἐξετίθετο
  english_pob_choice: explained
  chosen_spanish: explicarles
  alternatives_spanish:
  - expuso a ellos
  - les presentó
  - les dio una explicación
  lexicon: BDAG
  rationale: El imperfecto medio de ἐκτίθημι aquí significa exponer o explicar un asunto. «Explicarles» es claro, natural y conserva el sentido de relato ordenado que sigue.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa de manera natural con el clítico dativo español «les».
- source_word: καθεξῆς
  english_pob_choice: in order
  chosen_spanish: en orden
  alternatives_spanish:
  - en secuencia
  - paso a paso
  - de manera ordenada
  lexicon: BDAG
  rationale: El adverbio indica sucesión ordenada; «en orden» mantiene la idea de un recuento ordenado sin añadir más de lo que el griego afirma.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente introduce el discurso directo que sigue; «diciendo» preserva esa relación verbal sin convertirlo en una nueva oración independiente.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y el auditable manejo inglés de ἀρξάμενος, ἐξετίθετο y καθεξῆς. Se conserva el valor narrativo de transición de δέ y el matiz de exposición ordenada, sin convertirlo en una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Pedro» como forma española estándar del nombre.
  - Se evitó «siendo»/«habiendo» para ἀρξάμενος porque el español natural aquí prefiere un verbo finito coordinado con el flujo narrativo.
  - «En orden» conserva la ambigüedad útil de καθεξῆς entre secuencia y exposición ordenada, reflejada en la nota.
