translation:
  language: es
  text: La noticia acerca de ellos llegó a oídos de la iglesia en Jerusalén[a], y enviaron a Bernabé hasta Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue oída por la iglesia en Jerusalén»; literalmente, «la noticia fue oída en los oídos de la iglesia en Jerusalén».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσθη
  english_pob_choice: reached
  chosen_spanish: llegó a oídos
  alternatives_spanish:
  - se oyó
  - fue oído
  lexicon: BDAG
  rationale: El griego usa un pasivo idiomático para expresar que la noticia llegó a la atención de alguien. En español, «llegó a oídos» conserva esa imagen sin sonar forzado.
- source_word: ὁ λόγος
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el reporte
  - el mensaje
  - la palabra
  lexicon: BDAG
  rationale: En este contexto λόγος no se refiere a «la Palabra» doctrinal, sino a la información sobre lo ocurrido. «La noticia» comunica bien el sentido narrativo sin perder neutralidad.
- source_word: εἰς τὰ ὦτα
  english_pob_choice: reached the ears
  chosen_spanish: a oídos
  alternatives_spanish:
  - en los oídos
  - hasta los oídos
  lexicon: BDAG
  rationale: La locución española «a oídos de» reproduce de manera natural el modismo griego de información que llega a la atención de alguien.
- source_word: ἐκκλησίας
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία designa a la comunidad cristiana. «Iglesia» es el equivalente natural en español y mantiene el uso contextual del término.
- source_word: τῆς οὔσης ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: que estaba en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - la que estaba en Jerusalén
  lexicon: BDAG
  rationale: La participación identifica cuál iglesia se tiene en vista. Mantener «que estaba en Jerusalén» conserva la referencia descriptiva del participio sin volver el español pesado.
- source_word: περὶ αὐτῶν
  english_pob_choice: about them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - con respecto a ellos
  lexicon: BDAG
  rationale: El pronombre remite naturalmente a los creyentes y acontecimientos recién mencionados. «Acerca de ellos» es claro y no añade un referente nuevo.
- source_word: ἐξαπέστειλαν
  english_pob_choice: they sent out
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  - enviaron fuera
  lexicon: BDAG
  rationale: El compuesto puede intensificar la idea de envío, pero en español «enviaron» comunica bien la acción narrativa. Se evita «despacharon» por posible tono administrativo.
- source_word: Βαρναβᾶν
  english_pob_choice: Barnabas
  chosen_spanish: Bernabé
  alternatives_spanish:
  - Barnabás
  lexicon: standard transliteration convention in Spanish
  rationale: En español bíblico es habitual la forma «Bernabé», que corresponde al nombre conocido del personaje y es más natural para lectores hispanohablantes.
- source_word: ἕως Ἀντιοχείας
  english_pob_choice: as far as Antioch
  chosen_spanish: hasta Antioquía
  alternatives_spanish:
  - a Antioquía
  - hasta Antioqia
  lexicon: BDAG
  rationale: «Hasta» conserva el valor de extensión o destino del griego ἕως. «Antioquía» es la forma castellana estándar del topónimo.
theological_decisions:
- issue: Sujeto de «enviaron»
  english_pob_reading: The Jerusalem church collectively sent Barnabas.
  chosen_spanish_reading: La iglesia de Jerusalén actuó colectivamente como sujeto de «enviaron».
  alternative_spanish_readings:
  - unos líderes de la iglesia enviaron a Bernabé
  - los apóstoles enviaron a Bernabé
  rationale: El texto griego presenta como antecedente explícito a «la iglesia que estaba en Jerusalén». No se debe restringir el sujeto a una jerarquía no nombrada en el versículo.
  doctrine_reference: 'Principio de fidelidad textual: no importar un sujeto eclesiástico más específico del que el texto afirma.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del audit trail inglés: λόγος como noticia/reporte, el modismo de «oídos» conservado de forma natural en español, y el envío colectivo de la iglesia de Jerusalén sin introducir un sujeto más estrecho. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «la iglesia» para ἐκκλησία conforme al uso contextual de Hechos.
  - Se mantiene «Bernabé» por convención bíblica española, en lugar de transliterar mecánicamente «Barnabás».
  - «Hasta Antioquía» preserva la extensión/dirección del griego ἕως sin sobreexplicación.
  - La nota al pie conserva la alternativa literal para reflejar la tensión idiomática del pasivo griego.
