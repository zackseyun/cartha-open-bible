revisions:
- from: Y llegó a oídos de la iglesia que estaba en Jerusalén[a] la noticia acerca de ellos, y enviaron a Bernabé hasta Antioquía.
  to: La noticia acerca de ellos llegó a oídos de la iglesia en Jerusalén[a], y enviaron a Bernabé hasta Antioquía.
  rationale: Se ajusta el orden de la oración para un español más natural, se simplifica la identificación de la iglesia como «en Jerusalén» sin pérdida de sentido, y se pule la nota al pie para reflejar con claridad la alternativa literal documentada en el POB inglés.
