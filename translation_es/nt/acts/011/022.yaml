review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: la noticia llegó a conocimiento de la iglesia en Jerusalén y esta envió a Bernabé hasta Antioquía. También mantiene adecuadamente λόγος como «noticia», ἐκκλησία como «iglesia» y ἕως Ἀντιοχείας como «hasta Antioquía». Sin embargo, el orden «Y llegó a oídos de la iglesia... la noticia» suena menos natural en español que una reordenación equivalente, y la nota al pie introduce «en/ hacia» con una barra poco elegante.'
  spanish_quality_summary: El español es mayormente claro y fiel, pero puede pulirse para mayor naturalidad y dignidad estilística. La frase inicial funciona mejor como «La noticia acerca de ellos llegó a oídos de la iglesia en Jerusalén», sin el relativo «que estaba» ni la inversión marcada del sujeto. Esto conserva el modismo y mejora la fluidez. La nota también debe simplificarse y usar comillas/puntuación más limpias.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Iglesia», «Bernabé» y «Antioquía» están bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «noticia» para λόγος es coherente con el rastro léxico inglés.
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en la cláusula inicial
    rationale: «Y llegó a oídos de la iglesia... la noticia» es comprensible, pero en español narrativo suena invertido y algo forzado. Reordenar a «La noticia acerca de ellos llegó a oídos...» preserva el significado y mejora la legibilidad.
  - severity: low
    issue: «que estaba en Jerusalén» es más pesado de lo necesario
    rationale: El participio griego puede representarse naturalmente en español como «la iglesia en Jerusalén» sin pérdida de sentido, en línea con la compresión aprobada en el POB inglés.
  - severity: low
    issue: Redacción de la nota al pie mejorable
    rationale: 'La fórmula «en/ hacia los oídos» con barra no es estilísticamente limpia. Conviene una nota más natural: «O “fue oída por la iglesia en Jerusalén”; literalmente, “la noticia fue oída en los oídos de la iglesia en Jerusalén”».'
  revised_spanish_text: La noticia acerca de ellos llegó a oídos de la iglesia en Jerusalén[a], y enviaron a Bernabé hasta Antioquía.
  revised_footnotes:
  - marker: a
    text: O «fue oída por la iglesia en Jerusalén»; literalmente, «la noticia fue oída en los oídos de la iglesia en Jerusalén».
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden de la oración para un español más natural, se simplifica la identificación de la iglesia como «en Jerusalén» sin pérdida de sentido, y se pule la nota al pie para reflejar con claridad la alternativa literal documentada en el POB inglés.
