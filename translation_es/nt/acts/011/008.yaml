translation:
  language: es
  text: 'Pero dije[a]: «De ningún modo, Señor, porque nada común o inmundo ha entrado jamás en mi boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nada profanado o inmundo». El griego usa dos términos distintos, κοινόν y ἀκάθαρτον, que se solapan en este contexto de pureza, pero no son idénticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδαμῶς
  english_pob_choice: By no means
  chosen_spanish: De ningún modo
  alternatives_spanish:
  - De ninguna manera
  - En absoluto
  lexicon: BDAG
  rationale: Expresa la negación enfática e idiomática del griego sin volverla mecánica; conserva el tono de rechazo fuerte que POB mantiene con “By no means”.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Mantiene el tratamiento reverente y el uso establecido para la dirección a Jesús o a Dios según contexto; en español bíblico "Señor" es la equivalencia más natural y fiel aquí.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la negativa de Pedro; en español "porque" comunica con claridad la fuerza explicativa/causal del griego en una oración subordinada más natural que un calco de "for".
- source_word: κοινὸν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - profano
  - defendido
  lexicon: BDAG
  rationale: Conserva la distinción léxica de κοινός en el contexto de pureza ritual, evitando fusionarlo con ἀκάθαρτον. "Común" refleja lo no consagrado o no apartado.
- source_word: ἀκάθαρτον
  english_pob_choice: unclean
  chosen_spanish: inmundo
  alternatives_spanish:
  - impuro
  - inmundo
  lexicon: BDAG
  rationale: Mantiene la segunda categoría de pureza como término distinto de κοινόν. "Inmundo" es bíblico y claro en este contexto ritual; se evita reducirlo a una sola idea de contaminación general.
- source_word: οὐδέποτε
  english_pob_choice: has ever
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - en ningún momento
  lexicon: BDAG
  rationale: Condensa naturalmente el valor de duración total negativa del adverbio sin perder el énfasis temporal de la experiencia de Pedro.
- source_word: εἰσῆλθεν
  english_pob_choice: has entered
  chosen_spanish: ha entrado
  alternatives_spanish:
  - entró
  - ha pasado
  lexicon: BDAG
  rationale: El pretérito perfecto español expresa bien una acción pasada con relevancia vigente en el momento del habla, igual que la solución inglesa del POB.
- source_word: εἰς τὸ στόμα μου
  english_pob_choice: entered my mouth
  chosen_spanish: en mi boca
  alternatives_spanish:
  - dentro de mi boca
  - a mi boca
  lexicon: BDAG
  rationale: La imagen concreta se conserva en español de forma natural. La frase completa mantiene el sentido literal de ingestión sin paraphrasearlo como "he comido".
theological_decisions:
- issue: Distinción entre κοινὸν y ἀκάθαρτον en el lenguaje de pureza
  english_pob_reading: Render the two terms distinctly as 'common or unclean'
  chosen_spanish_reading: “común o inmundo”
  alternative_spanish_readings:
  - común o impuro
  - profano o inmundo
  - común o contaminado
  rationale: El versículo conserva dos términos relacionados pero no idénticos; la traducción española debe reflejar esa tensión y no colapsarlos en un solo concepto. "Común" mantiene κοινός y "inmundo" marca la categoría ritual más fuerte de ἀκάθαρτος.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la relación causal de ὅτι de “because” a “for” para hacer más explícito su valor explicativo; en español se optó por “porque”, que comunica de manera natural esa misma función explicativa sin perder formalidad ni fidelidad.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente “Señor” para κύριε, coherente con el POB y con el español bíblico.
  - Se preserva la distinción de pureza entre “común” e “inmundo”, siguiendo la auditoría inglesa que evita fusionar κοινός y ἀκάθαρτος.
  - La puntuación de cita y el orden de la oración buscan ser publicables en español latinoamericano estándar.
