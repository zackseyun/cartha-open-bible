review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: negación enfática, vocativo reverente, razón explicativa y la imagen concreta de que nada ha entrado en la boca de Pedro. También preserva la distinción entre κοινόν y ἀκάθαρτον. Sin embargo, la nota al pie no coincide con la alternativa documentada en el English POB, que contrasta mejor con el texto principal al ofrecer ''profanado/impuro'' o equivalente, no repitiendo prácticamente el texto principal con ''común o impuro''.'
  spanish_quality_summary: 'La redacción principal es natural y digna en español: «De ningún modo, Señor» funciona bien, y «ha entrado jamás en mi boca» es comprensible. Aun así, en español bíblico fluye un poco mejor «nada común ni inmundo ha entrado jamás en mi boca» o mantener «o»; el problema principal no está en la sintaxis sino en la calidad de la nota, que debería explicar mejor la diferencia léxica sin crear redundancia con el texto principal.'
  glossary_alignment: Señor para κύριε y la distinción «común / inmundo» están alineadas con las decisiones del proyecto. No hay conflicto con la terminología base. La única desalineación relevante está en la nota léxica, que no reproduce bien la alternativa inglesa «defiled or unclean» y por tanto debilita la justificación de la distinción entre los dos términos griegos.
  issues:
  - severity: medium
    issue: La nota al pie no refleja con suficiente fidelidad la alternativa léxica auditada en inglés.
    rationale: El English POB ofrece como alternativa «nothing defiled or unclean». La nota española actual dice «O “común o impuro”», lo cual no aporta una verdadera alternativa al texto principal y difumina la razón de la nota.
  - severity: low
    issue: 'Hay una errata en las decisiones léxicas internas: «defendido» como alternativa para κοινὸν.'
    rationale: No afecta el texto bíblico publicado, pero sí indica descuido en el expediente léxico. La alternativa correcta sería algo como «profano» o «contaminado/impuro» según contexto.
  revised_spanish_text: 'Pero dije[a]: «De ningún modo, Señor, porque nada común o inmundo ha entrado jamás en mi boca».'
  revised_footnotes:
  - marker: a
    text: O «nada profanado o inmundo». El griego usa dos términos distintos, κοινόν y ἀκάθαρτον, que se solapan en este contexto de pureza, pero no son idénticos.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota al pie para alinearla con la alternativa documentada en el English POB y para explicar mejor la distinción entre los dos términos griegos.
