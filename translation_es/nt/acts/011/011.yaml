translation:
  language: es
  text: Y he aquí[a], inmediatamente tres hombres llegaron a la casa donde estábamos, enviados desde Cesarea a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «he aquí» conserva el valor enfático del griego ἰδοὺ; también podría entenderse como «mira» o «fíjate».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Mira
  - Y mira
  lexicon: BDAG
  rationale: Conserva la función discursiva de llamar la atención sobre un hecho significativo. «He aquí» es una equivalencia natural y reverente en español, más fiel al marcador enfático que omitirlo.
- source_word: ἐξαυτῆς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - justo entonces
  lexicon: BDAG
  rationale: Refleja la idea de ocurrencia sin demora y mantiene la relación temporal con la visión anterior sin añadir explicación interpretativa.
- source_word: τρεῖς ἄνδρες
  english_pob_choice: three men
  chosen_spanish: tres hombres
  alternatives_spanish:
  - tres varones
  - tres personas
  lexicon: BDAG
  rationale: Reproduce con precisión el numeral y ἀνήρ. «Hombres» preserva el dato de género y el sentido narrativo directo.
- source_word: ἐπέστησαν
  english_pob_choice: arrived
  chosen_spanish: se presentaron
  alternatives_spanish:
  - llegaron
  - se acercaron
  lexicon: BDAG
  rationale: El verbo aquí sugiere la irrupción súbita de su presencia ante la casa. «Se presentaron» conserva ese matiz de aparición/presencia mejor que un simple «llegaron».
- source_word: ἐπὶ τὴν οἰκίαν
  english_pob_choice: at the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - ante la casa
  lexicon: BDAG
  rationale: En combinación con ἐπέστησαν, la expresión indica que llegaron al lugar señalado. «En la casa» resulta natural en español y comunica la ubicación contextual.
- source_word: ἐν ᾗ ἦμεν
  english_pob_choice: where we were
  chosen_spanish: donde estábamos
  alternatives_spanish:
  - en la que estábamos
  - donde nos hallábamos
  lexicon: BDAG
  rationale: La relativa solo marca ubicación. «Donde estábamos» es claro y no introduce la idea de permanencia o estadía que el griego no exige explícitamente.
- source_word: ἀπεσταλμένοι
  english_pob_choice: having been sent
  chosen_spanish: enviados
  alternatives_spanish:
  - habiendo sido enviados
  - mandados
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica que ya venían comisionados. En español, «enviados» transmite la acción previa de manera natural y suficientemente precisa en una construcción participial.
- source_word: ἀπὸ Καισαρείας
  english_pob_choice: from Caesarea
  chosen_spanish: desde Cesarea
  alternatives_spanish:
  - de Cesarea
  - procedentes de Cesarea
  lexicon: BDAG
  rationale: «Desde» expresa mejor el punto de origen y el movimiento desde Cesarea hacia el hablante, en sintonía con el valor de ἀπό.
- source_word: πρός με
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: BDAG
  rationale: Con el acusativo, πρός señala dirección hacia el destinatario. «A mí» es la forma más directa y transparente en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que precisó ἐξαυτῆς como «immediately». La frase española refleja esa actualización con «inmediatamente» sin añadir intensificación extra. También se respetó la decisión auditada de leer ἐπέστησαν como llegada/presencia súbita, no como mera posición estática.
  spanish_consistency_notes:
  - Se mantuvo «Cesarea» como nombre propio estándar en español.
  - Se evitó el calco «en la cual estábamos» porque la relativa simple «donde estábamos» comunica con más naturalidad el valor locativo del griego.
  - No se introdujo terminología eclesiástica innecesaria; el versículo es narrativo y descriptivo.
