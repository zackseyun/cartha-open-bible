translation:
  language: es
  text: Al mirar fijamente dentro de ella[a], la estaba examinando, y vi los cuadrúpedos de la tierra, las fieras, los reptiles y las aves del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas que se arrastran». Esta redacción conserva la categoría más amplia del término griego y su eco con las clasificaciones de la creación y de la ley sobre alimentos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν
  english_pob_choice: into it
  chosen_spanish: hacia adentro de ella
  alternatives_spanish:
  - en ella
  - dentro de ella
  - hacia ella
  lexicon: BDAG
  rationale: El referente es el lienzo/objeto de la visión. En español, con ἀτενίσας, una dirección de la mirada se expresa con naturalidad como 'hacia adentro de ella', preservando la idea de mirar en el interior del objeto, no solo sobre él.
- source_word: ἀτενίσας
  english_pob_choice: looked intently
  chosen_spanish: al mirar fijamente
  alternatives_spanish:
  - al fijar la vista
  - al contemplar atentamente
  - al mirar con atención
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa y concentrada de la mirada. 'Mirar fijamente' conserva la intensidad visual sin sonar artificial.
- source_word: κατενόουν
  english_pob_choice: I was considering it
  chosen_spanish: la estaba considerando
  alternatives_spanish:
  - la estaba examinando
  - la estaba observando cuidadosamente
  - la estaba contemplando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso y distinta del aoristo siguiente. 'La estaba considerando' reproduce bien el matiz de atención mental/progresiva que el texto inglés corrigió para evitar redundancia con 'mirar fijamente'.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - percibí
  - divisé
  lexicon: BDAG
  rationale: El aoristo simple pide un pasado simple en español. 'Vi' es directo y mantiene el contraste con el imperfecto anterior.
- source_word: τετράποδα τῆς γῆς
  english_pob_choice: the four-footed animals of the earth
  chosen_spanish: los cuadrúpedos de la tierra
  alternatives_spanish:
  - los animales de cuatro patas de la tierra
  - las criaturas cuadrúpedas de la tierra
  - los cuadrúpedos del suelo
  lexicon: BDAG
  rationale: '''Cuadrúpedos'' conserva con precisión la categoría léxica de cuatro pies. Aunque ''animales de cuatro patas'' sería más corriente, ''cuadrúpedos'' mantiene mejor la taxonomía del catálogo y el eco clasificatorio del griego.'
- source_word: θηρία
  english_pob_choice: the wild beasts
  chosen_spanish: las fieras
  alternatives_spanish:
  - las bestias salvajes
  - los animales salvajes
  - las bestias
  lexicon: BDAG
  rationale: '''Fieras'' es breve, natural y mantiene el sentido de animales salvajes. También conserva mejor el tono de lista categorial del pasaje que ''animales salvajes''.'
- source_word: ἑρπετὰ
  english_pob_choice: the reptiles
  chosen_spanish: los reptiles
  alternatives_spanish:
  - las cosas que se arrastran
  - las criaturas reptantes
  - los animales rastreros
  lexicon: BDAG
  rationale: '''Reptiles'' es el equivalente español más claro e idiomático. La alternativa más literal ''criaturas que se arrastran'' se preserva implícitamente en la categoría, pero resultaría menos natural en el texto principal.'
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del aire
  - las aves del cielo
  - los pájaros del cielo
  lexicon: BDAG
  rationale: '''Aves del cielo'' conserva el giro bíblico y el paralelismo catalogal. ''Cielo'' evita limitar el sentido a una localización meteorológica y corresponde bien al genitivo griego en esta enumeración.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió 'I was considering it' para κατενόουν en lugar de una repetición cercana a 'looked intently'. En español, 'la estaba considerando' mantiene ese valor progresivo y mental. También se preserva la lista zoológica amplia del original, incluyendo una nota para ἑρπετά porque el español 'reptiles' puede ser algo más estrecho que la categoría intertextual evocada por el griego.
  spanish_consistency_notes:
  - Se usa 'Dios'/'Yahvé' según las reglas generales del proyecto, pero este versículo no contiene esos términos.
  - '''Aves del cielo'' se prefiere a ''aves del aire'' por mayor naturalidad bíblica en español.'
  - '''Cuadrúpedos'' mantiene la fuerza clasificatoria del griego y la coherencia con la lista de categorías animales.'
