translation:
  language: es
  text: Y uno de ellos[a], llamado Agabo, se puso de pie e indicó por el Espíritu que iba a venir una gran hambruna sobre toda la tierra habitada[a]; lo cual sucedió en tiempo de Claudio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el mundo»; en Lucas-Hechos, «la tierra habitada» también puede referirse más específicamente al mundo romano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: levantándose
  alternatives_spanish:
  - se levantó
  - puesto de pie
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Agabo en la reunión. En español, «levantándose» conserva el valor físico y narrativo de la acción sin sonar rígido ni excesivamente literario.
- source_word: ἐσήμανεν
  english_pob_choice: indicated
  chosen_spanish: dio a entender
  alternatives_spanish:
  - indicó
  - hizo saber
  - señaló
  lexicon: BDAG
  rationale: σημαίνω puede significar indicar, significar o hacer saber. «Dio a entender» transmite el acto de comunicar la revelación sin forzar una fórmula profética más explícita de la que exige el griego.
- source_word: διὰ τοῦ πνεύματος
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - a través del Espíritu
  - mediante el Espíritu
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por el Espíritu» es natural en español y conserva la referencia al Espíritu Santo en contexto profético.
- source_word: λιμὸν μεγάλην
  english_pob_choice: a great famine
  chosen_spanish: una gran hambre
  alternatives_spanish:
  - una gran escasez de alimentos
  - una severa hambruna
  lexicon: BDAG
  rationale: λιμός designa hambre o carestía generalizada. «Hambre» preserva la palabra del original y «gran» mantiene el adjetivo μεγάλην sin interpretarlo más allá de lo que el texto dice.
- source_word: μέλλειν ἔσεσθαι
  english_pob_choice: was about to come
  chosen_spanish: vendría
  alternatives_spanish:
  - estaba por venir
  - iba a venir
  lexicon: BDAG
  rationale: La construcción perifrástica expresa inminencia o futuridad esperada. En español, «vendría» comunica adecuadamente ese futuro cercano en un estilo fluido y sobrio.
- source_word: ἐφ’ ὅλην τὴν οἰκουμένην
  english_pob_choice: over the whole inhabited world
  chosen_spanish: sobre toda la tierra habitada
  alternatives_spanish:
  - sobre todo el mundo
  - sobre todo el mundo habitado
  - sobre todo el mundo romano
  lexicon: BDAG
  rationale: οἰκουμένη significa literalmente «tierra habitada» y en Lucas-Hechos puede aludir al mundo romano en sentido amplio. La opción principal preserva el valor léxico sin resolver prematuramente la extensión histórica.
- source_word: ἥτις ἐγένετο
  english_pob_choice: which happened
  chosen_spanish: y esto sucedió
  alternatives_spanish:
  - lo cual sucedió
  - que sucedió
  lexicon: BDAG
  rationale: El relativo retoma el acontecimiento anterior. «Y esto sucedió» suena natural en español y mantiene la conexión narrativa sin recargar la sintaxis.
- source_word: ἐπὶ Κλαυδίου
  english_pob_choice: in the time of Claudius
  chosen_spanish: en tiempo de Claudio
  alternatives_spanish:
  - bajo Claudio
  - durante el reinado de Claudio
  lexicon: BDAG
  rationale: ἐπί con genitivo en expresiones cronológicas puede significar «en tiempo de» o «bajo». «En tiempo de Claudio» es claro, neutral y fiel al valor temporal del texto.
theological_decisions:
- issue: Referencia de «el Espíritu» en διὰ τοῦ πνεύματος
  english_pob_reading: the Holy Spirit is intended
  chosen_spanish_reading: se entiende al Espíritu Santo
  alternative_spanish_readings:
  - un espíritu inspirado en sentido más general
  rationale: En Hechos, en contextos proféticos, «el Espíritu» normalmente se refiere al Espíritu Santo. El español mantiene la mayúscula conceptual en la decisión interpretativa, aunque el texto principal conserva la forma «Espíritu» por fidelidad al griego y al uso natural.
  doctrine_reference: Hechos 2:4; 13:2; afirmaciones trinitarias y de inspiración profética
- issue: Alcance de οἰκουμένη
  english_pob_reading: rendered lexically as 'the whole inhabited world' without restricting it in the main text
  chosen_spanish_reading: se mantiene la traducción literal amplia en el texto principal
  alternative_spanish_readings:
  - todo el mundo
  - todo el mundo romano
  rationale: El término puede referirse al mundo habitado en general y, en Lucas-Hechos, a veces al mundo imperial. La redacción principal evita estrechar el alcance; la nota ofrece la alternativa contextual.
  doctrine_reference: Principios de traducción lexical; Lucas 2:1; Hechos 17:6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y el texto quedó sin ajustes.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia contextual al Espíritu Santo.
  - Se evita «Cristo» porque no aparece el título Χριστός en este versículo.
  - Se conserva «Claudio» como forma española habitual del nombre propio latino.
  - «Tierra habitada» mantiene el matiz léxico de οἰκουμένη sin imponer de entrada la restricción histórica a «mundo romano».
