translation:
  language: es
  text: 'diciendo: «Entraste en casa de hombres incircuncisos[a] y comiste con ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a hombres incircuncisos»; la expresión se refiere a quienes estaban fuera de la señal judía del pacto de la circuncisión, es decir, gentiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la acusación; «diciendo» conserva esa relación participial y suena natural en español.
- source_word: ὅτι
  english_pob_choice: “
  chosen_spanish: «
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: En discurso directo en español, la mejor correspondencia es abrir cita directa en vez de explicitar «que».
- source_word: Εἰσῆλθες
  english_pob_choice: you went in
  chosen_spanish: Entraste
  alternatives_spanish:
  - Entraste en
  - Fuiste a
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι se expresa de forma natural con «entraste», manteniendo el sentido concreto de entrar.
- source_word: πρὸς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - con
  lexicon: BDAG
  rationale: Con personas, πρός puede expresar aproximación o relación. En español, «a» encaja bien con «entrar a» y conserva el tono acusatorio.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: ἀνήρ se refiere a varones; «hombres» es el equivalente normal y fiel en español.
- source_word: ἀκροβυστίαν ἔχοντας
  english_pob_choice: uncircumcised men
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - hombres incircuncisos
  - que no estaban circuncidados
  lexicon: BDAG
  rationale: La expresión es un modo judío idiomático de designar a quienes estaban fuera del marcador pactual de la circuncisión. En español, «incircuncisos» conserva la carga social y religiosa de la acusación sin explicitar indebidamente «gentiles» en el texto principal.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Coordinación simple de las dos acusaciones.
- source_word: συνέφαγες
  english_pob_choice: ate with
  chosen_spanish: comiste con
  alternatives_spanish:
  - compartiste comida con
  - comiste junto con
  lexicon: BDAG
  rationale: El verbo compuesto enfatiza comer en compañía. «Comiste con» es la forma más directa e idiomática en español.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - con ellos
  lexicon: BDAG
  rationale: Se integra en la expresión española «comiste con ellos», manteniendo el sentido relacional del pronombre.
theological_decisions:
- issue: Cómo rendir ἀκροβυστίαν ἔχοντας sin borrar la ofensa covenantal/purificatoria de la acusación
  english_pob_reading: uncircumcised men
  chosen_spanish_reading: incircuncisos
  alternative_spanish_readings:
  - gentiles
  - hombres incircuncisos
  rationale: La acusación no es solo étnica, sino marcada por la frontera del pacto y la pureza judía. «Incircuncisos» preserva esa tensión teológica y social mejor que «gentiles», que la explicaría demasiado y la volvería más interpretativa.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste de la POB inglesa de una forma más natural y fiel a la vez: no explicita «gentiles» en el texto principal, sino que conserva el término cargado «incircuncisos». La elección española mantiene esa misma decisión de traducción y su tensión semántica.'
  spanish_consistency_notes:
  - Se conserva «incircuncisos» como equivalente principal para mantener la carga covenantal/purificatoria.
  - Se usa cita directa en español para reflejar el ὅτι introductorio, como en la POB inglesa.
  - El verbo compuesto griego συνέφαγες queda en un español idiomático («comiste con») sin perder el matiz de compartir mesa.
