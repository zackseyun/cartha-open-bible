  text: Οἱ μὲν οὖν διασπαρέντες ἀπὸ τῆς θλίψεως τῆς γενομένης ἐπὶ Στεφάνῳ διῆλθον ἕως Φοινίκης καὶ Κύπρου καὶ Ἀντιοχείας μηδενὶ λαλοῦντες τὸν λόγον εἰ μὴ μόνον Ἰουδαίοις.
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/019.yaml
  text: So then[a], those who had been scattered because of the affliction that arose over Stephen went as far as Phoenicia and Cyprus and Antioch[c][b], speaking the word to no one except Jews.
  footnotes:
  - marker: a
    text: Or 'persecution' for 'affliction.' The Greek term can denote distress, trouble, or persecution in context.
    reason: lexical_alternative
  - marker: b
    text: '''The word'' here refers to the proclaimed message about Jesus; alternatively, ''the message.'''
    reason: lexical_alternative
  - marker: c
    text: 'The Greek is emphatic: ''except only to Jews'' or ''except to Jews alone.'''
    reason: lexical_alternative
