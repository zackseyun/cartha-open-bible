  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del griego ni de la auditoría inglesa: «que surgió en relación con Esteban» comunica mejor el sentido contextual de τῆς γενομένης ἐπὶ Στεφάνῳ, y «sin hablarle a nadie de la palabra» expresa de forma idiomática μηδενὶ λαλοῦντες τὸν λόγον, preservando «la palabra» como término lucano establecido.'
