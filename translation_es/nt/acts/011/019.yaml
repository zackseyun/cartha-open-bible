translation:
  language: es
  text: Así que[a], los que habían sido dispersados por la aflicción que surgió en relación con Esteban fueron hasta Fenicia, Chipre y Antioquía, sin hablarle a nadie de la palabra[b], sino solo a los judíos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así pues». El griego Οἱ μὲν οὖν introduce la continuidad lógica del relato.
    reason: alternative_reading
  - marker: b
    text: «La palabra» refleja el modo lucano de referirse al mensaje proclamado; también puede entenderse como «el mensaje».
    reason: lexical_alternative
  - marker: c
    text: 'El griego es enfático: «excepto a los judíos» o «a los judíos solamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διασπαρέντες
  english_pob_choice: had been scattered
  chosen_spanish: habían sido dispersados
  alternatives_spanish:
  - habían sido esparcidos
  - fueron dispersados
  lexicon: BDAG
  rationale: El participio aoristo pasivo mira a una dispersión previa respecto del verbo principal. «Habían sido dispersados» conserva la anterioridad y la voz pasiva. «Esparcidos» es posible, pero «dispersados» encaja mejor con el registro bíblico y narrativo.
- source_word: θλίψεως
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - persecución
  - angustia
  lexicon: BDAG
  rationale: La fuente griega es amplia y puede abarcar aflicción, presión o persecución. «Aflicción» mantiene esa amplitud sin reducir el término a «persecución» de manera innecesaria.
- source_word: τῆς γενομένης ἐπὶ Στεφάνῳ
  english_pob_choice: that arose over Stephen
  chosen_spanish: que vino sobre Esteban
  alternatives_spanish:
  - que se produjo en relación con Esteban
  - que surgió sobre Esteban
  - que vino a causa de Esteban
  lexicon: BDAG
  rationale: La construcción con ἐπί + dativo señala el episodio asociado con Esteban. «Vino sobre Esteban» sigue de cerca la imagen del griego y mantiene la relación con el conflicto desencadenado en ese contexto, sin añadir más interpretación que la necesaria.
- source_word: διῆλθον
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - viajaron
  - pasaron
  - recorrieron
  lexicon: BDAG
  rationale: En contexto describe desplazamiento hacia regiones nombradas. «Fueron» es natural en español y suficientemente preciso; «viajaron» es más explícito pero menos sobrio.
- source_word: ἕως
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - tan lejos como
  - a lo largo de
  lexicon: BDAG
  rationale: «Hasta» expresa bien el alcance geográfico del recorrido en español natural. «Tan lejos como» sería más marcado y menos idiomático.
- source_word: Φοινίκης
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenicia
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español. «Fenicia» es la forma asentada y transparente.
- source_word: Κύπρου
  english_pob_choice: Cyprus
  chosen_spanish: Chipre
  alternatives_spanish:
  - Chipre
  lexicon: BDAG
  rationale: Topónimo estándar en español.
- source_word: Ἀντιοχείας
  english_pob_choice: Antioch
  chosen_spanish: Antioquía
  alternatives_spanish:
  - Antioquía
  lexicon: BDAG
  rationale: Topónimo estándar en español para la ciudad mencionada en Hechos.
- source_word: μηδενὶ λαλοῦντες
  english_pob_choice: speaking the word to no one
  chosen_spanish: hablando ... a nadie
  alternatives_spanish:
  - sin hablar a nadie
  - no hablando a nadie
  - hablando a nadie
  lexicon: BDAG
  rationale: Se conserva el participio de manera natural con «hablando». La frase negativa con dativo se expresa de forma idiomática en español con «a nadie».
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  - el mensaje proclamado
  lexicon: BDAG
  rationale: En Hechos, λόγος puede funcionar como designación abreviada del mensaje proclamado. «La palabra» mantiene la terminología recurrente de Lucas y evita introducir una expansión interpretativa en el cuerpo del texto. En español, el femenino concuerda con el uso sustantivo de «palabra».
- source_word: εἰ μὴ μόνον Ἰουδαίοις
  english_pob_choice: except Jews
  chosen_spanish: sino solo a los judíos
  alternatives_spanish:
  - excepto a los judíos
  - sino a los judíos solamente
  - salvo a los judíos
  lexicon: BDAG
  rationale: 'El griego es enfático: εἰ μή + μόνον restringe el alcance. «Sino solo a los judíos» preserva esa restricción y su fuerza contrastiva en español natural. Se evita «excepto» porque suena más neutro y atenúa el contraste.'
theological_decisions:
- issue: Alcance de θλίψις en el contexto de la muerte de Esteban
  english_pob_reading: Render θλίψις with the broader term 'affliction' rather than the narrower 'persecution' in the main text.
  chosen_spanish_reading: Mantener «aflicción» en el texto principal, sin traducirla de forma automática como «persecución».
  alternative_spanish_readings:
  - persecución
  - tribulación
  rationale: Aunque el contexto narrativo implica hostilidad y persecución, el sustantivo griego es más amplio. «Aflicción» respeta esa amplitud y deja que el contexto histórico haga visible la persecución sin imponerla como única posibilidad léxica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de λόγος en Hechos
  english_pob_reading: Keep the idiomatic but source-near expression 'the word' in the main text.
  chosen_spanish_reading: Conservar «la palabra» en el cuerpo del texto.
  alternative_spanish_readings:
  - el mensaje
  - el evangelio
  rationale: Lucas usa con frecuencia λόγος como fórmula del mensaje proclamado. «La palabra» preserva el eco lucano y evita convertir el texto en una paráfrasis explicativa. La posible ambigüedad queda dentro del campo semántico bíblico.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza restrictiva de εἰ μὴ μόνον
  english_pob_reading: 'The Greek is emphatic: ''except only to Jews'' or ''except to Jews alone.'''
  chosen_spanish_reading: Reproducir la restricción con «sino solo a los judíos».
  alternative_spanish_readings:
  - excepto a los judíos
  - solo a los judíos
  rationale: La combinación griega intensifica la exclusión. «Sino solo» conserva la fuerza restrictiva mejor que una simple preposición exclusiva y mantiene el tono enfático del original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue el texto griego y el cierre revisado del POB en inglés, que eliminó el redundante 'only' tras 'except Jews'. En español, la fuerza equivalente se conserva con «sino solo a los judíos», sin añadir otra partícula equivalente redundante. También se respeta la decisión léxica de mantener «aflicción» y «la palabra» como términos fuente-cercanos.
  spanish_consistency_notes:
  - Se usa «Fenicia», «Chipre» y «Antioquía» como topónimos estándar en español.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, pues no aparece el nombre divino en este versículo.
  - «Palabra» se conserva en sentido técnico lucano, no como simple vocablo aislado.
  - La puntuación y el orden verbal buscan sonar naturales en español sin perder la progresión del griego.
