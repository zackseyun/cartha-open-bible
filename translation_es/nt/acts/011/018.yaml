translation:
  language: es
  text: 'Al oír estas cosas, se aquietaron y glorificaron a Dios, diciendo: «Entonces Dios también ha concedido a los gentiles[a] el arrepentimiento para vida[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones». Aquí ἔθνεσιν se refiere a no judíos, por eso «gentiles» encaja mejor con el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «arrepentimiento para la vida», «arrepentimiento que lleva a la vida» o «arrepentimiento para vida». La frase griega εἰς ζωήν expresa dirección o resultado hacia la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: When they heard
  chosen_spanish: Al oír
  alternatives_spanish:
  - Cuando oyeron
  - Después de oír
  lexicon: BDAG
  rationale: El participio aoristo introduce una circunstancia temporal previa a los verbos principales. En español, «Al oír» conserva esa relación temporal de forma natural y concisa.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural remite al informe de Pedro. «Estas cosas» mantiene la referencia plural sin forzar una especificación que el contexto no exige.
- source_word: ἡσύχασαν
  english_pob_choice: they became quiet
  chosen_spanish: se aquietaron
  alternatives_spanish:
  - guardaron silencio
  - se callaron
  lexicon: BDAG
  rationale: El verbo expresa cesar la oposición y pasar al silencio. «Se aquietaron» conserva el matiz de apaciguamiento y suena natural en español actual.
- source_word: ἐδόξασαν τὸν θεόν
  english_pob_choice: glorified God
  chosen_spanish: glorificaron a Dios
  alternatives_spanish:
  - dieron gloria a Dios
  - alabaron a Dios
  lexicon: BDAG
  rationale: «Glorificar» reproduce con precisión el verbo δοξάζω y mantiene la carga teológica del texto en Lucas-Hechos mejor que una opción más ligera como «alabar».
- source_word: ἔθνεσιν
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  - pueblos
  lexicon: BDAG
  rationale: En Hechos, ἔθνη/ἔθνεσιν se refiere normalmente a los no judíos. «Gentiles» es el equivalente contextual más claro en español eclesial.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: el arrepentimiento
  alternatives_spanish:
  - la conversión
  - el cambio de mente
  lexicon: BDAG
  rationale: En este contexto la fuerza principal es moral y volitiva, no meramente cognitiva. «Arrepentimiento» conserva el sentido bíblico recibido sin diluir la llamada al giro real de vida.
- source_word: εἰς ζωὴν
  english_pob_choice: unto life / that leads to life
  chosen_spanish: para vida
  alternatives_spanish:
  - hacia la vida
  - que lleva a la vida
  lexicon: BDAG
  rationale: La preposición εἰς expresa dirección o resultado. «Para vida» es breve, fiel y evita añadir una paráfrasis más interpretativa de la necesaria.
- source_word: ἔδωκεν
  english_pob_choice: has also granted
  chosen_spanish: ha concedido
  alternatives_spanish:
  - ha dado
  - les ha otorgado
  lexicon: BDAG
  rationale: «Conceder» preserva la idea de don otorgado por Dios, con dignidad formal y sin perder la noción de regalo implícita en ἔδωκεν. El perfecto compuesto español comunica la acción completada con vigencia presente.
theological_decisions:
- issue: El arrepentimiento como don divino
  english_pob_reading: God has also granted to the Gentiles repentance unto life.
  chosen_spanish_reading: Dios también ha concedido a los gentiles el arrepentimiento para vida.
  alternative_spanish_readings:
  - Dios también les ha dado el arrepentimiento para vida
  - Dios también ha otorgado a los gentiles arrepentimiento para vida
  rationale: La frase griega presenta el arrepentimiento como algo que Dios da. La traducción conserva ese énfasis sin resolver por adelantado la relación entre gracia divina y respuesta humana, manteniendo la tensión bíblica del pasaje.
  doctrine_reference: Preservar la tensión teológica del texto; no añadir una teoría soteriológica que el versículo no explicita.
translation_notes:
  revision_awareness: La versión inglesa final corrigió una paráfrasis más explicativa de μετάνοια por «repentance unto life», y mantuvo el matiz de don concedido por Dios. Esta propuesta sigue esa decisión, pero la vierte en español con el sustantivo bíblico estándar «arrepentimiento» y una preposición breve («para vida») que conserva la dirección/resultante de εἰς ζωὴν.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al criterio del proyecto.
  - Se usa «gentiles» y no «naciones» en el cuerpo principal por la referencia contextual a no judíos en Hechos.
  - No se emplea «Cristo» ni terminología ajena al versículo.
  - Se conserva el tono formal y eclesial sin caer en calcos innecesarios.
