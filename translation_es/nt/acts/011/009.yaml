review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: «una voz respondió», «desde el cielo», «por segunda vez», y la prohibición con contraste de pureza. Sin embargo, «ha limpiado» debilita el campo semántico ritual de καθαρίζω en este contexto, donde el contraste con κοινόω pide una formulación más cultual como «ha purificado».'
  spanish_quality_summary: El español es claro y natural, pero «no lo llames común» suena algo poco idiomático para muchos lectores hispanos aunque es defendible por fidelidad. Mantener «común» en el texto principal es correcto por la decisión POB, pero conviene reforzar la coherencia ritual con «ha purificado» en vez de «ha limpiado». El resto fluye bien y conserva un registro digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «cielo» están bien. La principal cuestión terminológica es preservar la distinción teológica/ritual entre καθαρίζω y κοινόω; por eso «purificado» alinea mejor con la rationale auditada que «limpiado».
  issues:
  - severity: medium
    issue: «ha limpiado» para ἐκαθάρισεν
    rationale: Aunque es posible, «limpiar» en español tiende más a suciedad física. En un contexto de pureza ritual y en contraste con «común», «ha purificado» preserva mejor el matiz cultual documentado en el rastro inglés.
  - severity: low
    issue: Naturalidad de «no lo llames común»
    rationale: La frase conserva bien el griego y la rationale POB, pero en español suena menos natural que «no lo tengas por común/profano». Aun así, puede mantenerse para reflejar el énfasis en «call common» y apoyarse con nota al pie.
  revised_spanish_text: 'Pero una voz respondió desde el cielo por segunda vez[a]: «Lo que Dios ha purificado, tú no lo llames común».[b]'
