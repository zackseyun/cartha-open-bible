translation:
  language: es
  text: 'Pero una voz respondió desde el cielo por segunda vez[a]: «Lo que Dios ha purificado, tú no lo llames común».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de nuevo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no lo consideres impuro» o «no lo llames inmundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El verbo deponente ἀποκρίνομαι aquí introduce una respuesta desde el cielo. En español, «respondió» suena natural y conserva la idea de réplica sin añadir matices innecesarios.
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - una voz
  lexicon: BDAG
  rationale: El sustantivo es indefinido en el texto griego; «una voz» mantiene esa indefinición sin identificar al hablante más allá del contexto.
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: BDAG
  rationale: La expresión idiomática indica repetición. «Por segunda vez» suena natural en español y conserva la relación temporal del original.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo
  - del cielo
  lexicon: BDAG
  rationale: En español, «desde el cielo» comunica bien el origen de la voz y mantiene la referencia celestial del griego οὐρανός.
- source_word: Ἃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Aquello que
  - Las cosas que
  lexicon: BDAG
  rationale: El relativo neutro plural funciona de manera general. «Lo que» es la forma más natural en español para expresar esa categoría general sin forzar el número.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Traducción directa y estándar de θεός en este contexto.
- source_word: ἐκαθάρισεν
  english_pob_choice: has made clean
  chosen_spanish: ha limpiado
  alternatives_spanish:
  - ha purificado
  - ha hecho limpio
  lexicon: BDAG
  rationale: καθαρίζω expresa hacer limpio/puro. En español, «ha limpiado» comunica la acción completada con naturalidad y permite mantener la oposición con «común» en la frase siguiente.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego; en español puede conservarse con «tú» para reflejar esa fuerza directa.
- source_word: μὴ κοίνου
  english_pob_choice: must not call common
  chosen_spanish: no lo llames común
  alternatives_spanish:
  - no lo consideres impuro
  - no lo tengas por inmundo
  - no lo llames impuro
  lexicon: BDAG
  rationale: κοινόω significa literalmente tratar como común/profano. «Común» preserva la categoría de pureza del texto y el contraste con «limpiado»; las alternativas explicitan el sentido para lectores que no conozcan el trasfondo ritual.
theological_decisions:
- issue: Lenguaje de pureza en κοινόω frente a «impuro/inmundo»
  english_pob_reading: call common
  chosen_spanish_reading: llamar común
  alternative_spanish_readings:
  - considerar impuro
  - llamar impuro
  - tener por inmundo
  rationale: El contraste principal en el dicho divino es entre lo que Dios ha limpiado y lo que el ser humano no debe tratar como κοινός. «Común» conserva el término técnico de pureza sin sustituirlo por una equivalencia interpretativa más amplia.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referencia celestial de la voz
  english_pob_reading: from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - del cielo
  rationale: «Cielo» en español comunica la esfera divina del texto mejor que una referencia meramente espacial. Mantiene la lectura teológica sin oscurecer el origen de la voz.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no se reportan revisiones aplicadas al contenido de esta unidad.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se prefirió «común» para κοινός/κοινόω para preservar el vocabulario de pureza ritual, con alternativa aclaratoria en nota.
  - Se usó «desde el cielo» para ἐκ τοῦ οὐρανοῦ por naturalidad en español y fidelidad al origen celestial de la voz.
  - El pronombre explícito «tú» conserva el énfasis del griego sin sobrecargar la sintaxis española.
