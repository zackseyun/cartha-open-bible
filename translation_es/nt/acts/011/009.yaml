    text: 'O: «de nuevo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no lo consideres impuro» o «no lo llames inmundo».'
    reason: lexical_alternative
  revision_rationale: Se revisa «ha limpiado» a «ha purificado» para reflejar mejor el matiz ritual de καθαρίζω y sostener el contraste con κοινόω («común»). Se conserva «común» en el texto principal por fidelidad a la decisión léxica y teológica documentada en el POB. Se añade una nota menor sobre «por segunda vez/de nuevo» como alternativa válida, y se mantiene la nota sobre «impuro/inmundo» para ayudar al lector sin desplazar la categoría de pureza del texto principal.
