revisions:
- from: 'Pero una voz respondió desde el cielo por segunda vez[a]: «Lo que Dios ha limpiado, tú no lo llames común».'
  to: 'Pero una voz respondió desde el cielo por segunda vez[a]: «Lo que Dios ha purificado, tú no lo llames común».[b]'
  rationale: Se revisa «ha limpiado» a «ha purificado» para reflejar mejor el matiz ritual de καθαρίζω y sostener el contraste con κοινόω («común»). Se conserva «común» en el texto principal por fidelidad a la decisión léxica y teológica documentada en el POB. Se añade una nota menor sobre «por segunda vez/de nuevo» como alternativa válida, y se mantiene la nota sobre «impuro/inmundo» para ayudar al lector sin desplazar la categoría de pureza del texto principal.
