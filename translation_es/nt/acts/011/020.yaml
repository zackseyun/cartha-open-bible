translation:
  language: es
  text: Pero algunos de ellos, hombres de Chipre y de Cirene[a], al llegar a Antioquía, hablaban también a los helenistas, anunciando la buena noticia sobre el Señor Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «griegos» en vez de «helenistas». Si esa lectura es original, el sentido es que hablaban a gentiles, no solo a judíos de habla griega.
    reason: textual_variant
lexical_decisions:
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: El plural indefinido señala un subconjunto no identificado; «algunos» es la forma natural y fiel en español.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: BDAG
  rationale: El griego usa un sustantivo masculino específico para adultos varones; «hombres» conserva ese valor de manera directa.
- source_word: Κύπριοι καὶ Κυρηναῖοι
  english_pob_choice: from Cyprus and Cyrene
  chosen_spanish: de Chipre y de Cirene
  alternatives_spanish:
  - chipriotas y cireneos
  - procedentes de Chipre y Cirene
  lexicon: BDAG
  rationale: Los etnónimos funcionan como indicación de origen; en español, «de Chipre y de Cirene» expresa con naturalidad la procedencia sin perder el matiz geográfico-etnónico.
- source_word: ἐλθόντες εἰς Ἀντιόχειαν
  english_pob_choice: when they came to Antioch
  chosen_spanish: al llegar a Antioquía
  alternatives_spanish:
  - cuando llegaron a Antioquía
  - después de llegar a Antioquía
  lexicon: BDAG
  rationale: El participio aoristo se entiende mejor en español como circunstancia temporal; «al llegar» conserva la relación temporal sin forzar el orden verbal.
- source_word: ἐλάλουν
  english_pob_choice: were speaking
  chosen_spanish: hablaban
  alternatives_spanish:
  - estaban hablando
  - hablaban continuamente
  lexicon: BDAG
  rationale: El imperfecto marca acción en curso o repetida. «Hablaban» transmite ese aspecto de manera natural en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: Aquí καί añade audiencia o extensión de la actividad; «también» recoge ese valor aditivo.
- source_word: πρὸς τοὺς Ἑλληνιστάς
  english_pob_choice: to the Hellenists
  chosen_spanish: a los helenistas
  alternatives_spanish:
  - a los griegos
  - a los judíos de habla griega
  lexicon: BDAG
  rationale: La lectura principal es Ἑλληνιστάς; en español, «helenistas» reproduce el término técnico. La alternativa interpretativa se preserva en nota porque la variante textual «griegos» cambia el alcance del pasaje.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the good news about
  chosen_spanish: anunciando las buenas nuevas acerca de
  alternatives_spanish:
  - proclamando el evangelio acerca de
  - evangelizando acerca de
  lexicon: BDAG
  rationale: El participio expresa el contenido gozoso del mensaje. «Anunciando las buenas nuevas» mantiene el sentido evangelizador sin depender de una calca.
- source_word: τὸν κύριον Ἰησοῦν
  english_pob_choice: the Lord Jesus
  chosen_spanish: el Señor Jesús
  alternatives_spanish:
  - el Señor Jesucristo
  - Jesús el Señor
  lexicon: BDAG
  rationale: κύριος se traduce como «Señor» según el uso cristológico del proyecto. «El Señor Jesús» respeta la construcción y es idiomático en español.
theological_decisions:
- issue: Identidad de τοὺς Ἑλληνιστάς frente a la variante textual Ἕλληνας
  english_pob_reading: Main text follows SBLGNT 'Hellenists' and preserves 'Greeks' in a footnote.
  chosen_spanish_reading: El texto principal sigue «helenistas» y preserva «griegos» en nota.
  alternative_spanish_readings:
  - griegos
  - judíos de habla griega
  rationale: 'Es una decisión textual con impacto interpretativo: «helenistas» suele referirse a judíos de habla griega, mientras que «griegos» implicaría gentiles. Mantener la lectura principal y registrar la alternativa preserva la tensión documental sin resolverla prematuramente.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y conserva la decisión auditada del inglés POB: imperfecto aspectual en «hablaban», valor aditivo de καί en «también», y la lectura principal «helenistas» con la variante textual «griegos» documentada en nota. No se requirieron revisiones recientes adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Señor» se mantiene para κύριος por tratarse de una designación cristológica fija.
  - «Helenistas» se conserva como tecnicismo bíblico; la nota explica su posible equivalencia interpretativa con «griegos».
  - La puntuación y el orden verbal buscan ser naturales en español sin debilitar el aspecto imperfectivo del griego.
