    issue: «las buenas nuevas» suena menos natural en español contemporáneo
    rationale: Aunque es comprensible y fiel en sentido, el proyecto pide español moderno y broadly church-readable. «La buena noticia» comunica εὐαγγελιζόμενοι con más naturalidad y dignidad en español actual.
  - severity: low
    issue: La nota textual dice «les hablaban» en lugar de reflejar más de cerca «hablaban a...»
    rationale: No cambia de fondo el sentido, pero es mejor mantener la misma construcción para precisión y coherencia con el texto principal.
