    text: Algunos manuscritos leen «griegos» en vez de «helenistas». Si esa lectura es original, el sentido es que hablaban a gentiles, no solo a judíos de habla griega.
    reason: textual_variant
  revision_rationale: Se ajusta la expresión de εὐαγγελιζόμενοι a un español más natural y moderno («la buena noticia») sin perder el matiz evangelizador. También se corrige levemente la redacción de la nota para que refleje con más precisión la sintaxis y el sentido del texto principal.
