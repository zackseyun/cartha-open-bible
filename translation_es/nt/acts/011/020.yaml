revisions:
- from: Pero algunos de ellos, hombres de Chipre y de Cirene[a], al llegar a Antioquía, hablaban también a los helenistas, anunciando las buenas nuevas acerca del Señor Jesús.
  to: Pero algunos de ellos, hombres de Chipre y de Cirene[a], al llegar a Antioquía, hablaban también a los helenistas, anunciando la buena noticia sobre el Señor Jesús.
  rationale: Se ajusta la expresión de εὐαγγελιζόμενοι a un español más natural y moderno («la buena noticia») sin perder el matiz evangelizador. También se corrige levemente la redacción de la nota para que refleje con más precisión la sintaxis y el sentido del texto principal.
