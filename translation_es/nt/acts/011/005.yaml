source:
  edition: SBLGNT
  text: Ἐγὼ ἤμην ἐν πόλει Ἰόππῃ προσευχόμενος καὶ εἶδον ἐν ἐκστάσει ὅραμα, καταβαῖνον σκεῦός τι ὡς ὀθόνην μεγάλην τέσσαρσιν ἀρχαῖς καθιεμένην ἐκ τοῦ οὐρανοῦ, καὶ ἦλθεν ἄχρι ἐμοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/005.yaml
  text: 'I was in the city of Joppa praying[a], and in a trance I saw a vision: something like a large sheet was coming down, being lowered from heaven by four corners[b], and it came to me.'
  footnotes:
  - marker: a
    text: Or 'a certain vessel'; the Greek uses a broad term for an object or container before comparing it to a large sheet.
    reason: lexical_alternative
  - marker: b
    text: Or 'let down from heaven by four corners.'
    reason: lexical_alternative
