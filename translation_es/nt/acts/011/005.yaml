    changes_summary: Removed 'its' before 'four corners' to more closely reflect the Greek 'by four corners' without adding a possessive not explicit in the text. Otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: 'Yo estaba en la ciudad de Jope, orando, y en un trance vi una visión: algo[a] como una gran sábana estaba descendiendo, mientras era bajada desde el cielo por cuatro puntas[b], y llegó hasta mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un recipiente' o 'un objeto determinado'; el término griego es amplio y primero presenta el objeto de manera indefinida antes de compararlo con una gran sábana.
    reason: lexical_alternative
  - marker: b
    text: O 'por cuatro extremos'. El griego dice literalmente 'por cuatro extremos'; 'por cuatro puntas' comunica con más claridad en español la imagen de la tela suspendida, sin añadir un posesivo explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ ἤμην
  english_pob_choice: I was
  chosen_spanish: Yo estaba
  alternatives_spanish:
  - Yo mismo estaba
  - Estaba yo
  lexicon: BDAG
  rationale: El pronombre explícito Ἐγώ aporta énfasis leve; en español, 'Yo estaba' conserva ese énfasis sin sonar forzado. 'Estaba yo' también sería posible, pero 'Yo estaba' es más claro y natural.
- source_word: ἐν πόλει Ἰόππῃ
  english_pob_choice: in the city of Joppa
  chosen_spanish: en la ciudad de Jope
  alternatives_spanish:
  - en Jope
  lexicon: BDAG
  rationale: La frase griega incluye explícitamente πόλει ('ciudad'), así que se preserva en español. 'Jope' es el equivalente tradicional y claro para Ἰόππη.
- source_word: προσευχόμενος
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - mientras oraba
  - orando mientras estaba
  lexicon: BDAG
  rationale: El participio contemporáneo se expresa de manera natural con 'orando'. Esta forma conserva la acción en curso sin añadir más explicación que la requerida por el contexto.
- source_word: ἐν ἐκστάσει
  english_pob_choice: in a trance
  chosen_spanish: en un trance
  alternatives_spanish:
  - en éxtasis
  - en un estado de éxtasis
  lexicon: BDAG
  rationale: '''Trance'' comunica bien el estado visionario de ἔκστασις en Hechos y evita reducirlo a una emoción de ''éxtasis''. Mantiene la distinción entre el estado y la visión.'
- source_word: ὅραμα
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - un vislumbre
  lexicon: BDAG
  rationale: '''Visión'' es el equivalente directo y adecuado para ὅραμα en contexto revelatorio.'
- source_word: καταβαῖνον
  english_pob_choice: was coming down
  chosen_spanish: estaba descendiendo
  alternatives_spanish:
  - venía bajando
  - descendía
  lexicon: BDAG
  rationale: La forma participial describe el movimiento del objeto visto; 'estaba descendiendo' mantiene el valor progresivo del inglés POB y suena natural en español.
- source_word: σκεῦός τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - un objeto
  - un recipiente
  - un vaso
  lexicon: BDAG
  rationale: El término es amplio y el contexto visual lo deja indeterminado antes de la comparación con la sábana. 'Algo' respeta esa indefinición, como el inglés POB, sin imponer una categoría demasiado específica.
- source_word: ὡς ὀθόνην μεγάλην
  english_pob_choice: like a large sheet
  chosen_spanish: como una gran sábana
  alternatives_spanish:
  - como una gran tela
  - como una gran sábana de lino
  lexicon: BDAG
  rationale: '''Sábana'' comunica bien la imagen de una pieza grande de tela suspendida, y ''gran'' reproduce el tamaño expresado por μεγάλην. Es una solución idiomática y suficientemente precisa para ὀθόνη.'
- source_word: τέσσαρσιν ἀρχαῖς
  english_pob_choice: by four corners
  chosen_spanish: por cuatro extremos
  alternatives_spanish:
  - por cuatro esquinas
  - por sus cuatro extremos
  lexicon: BDAG
  rationale: ἀρχαί aquí se refiere a extremos o puntas; 'extremos' evita añadir la imagen de 'esquinas' si no se quiere hacer más geométrica la figura. Mantiene la falta de posesivo explícito del griego.
- source_word: καθιεμένην
  english_pob_choice: being lowered
  chosen_spanish: siendo bajada
  alternatives_spanish:
  - bajada
  - dejada caer
  lexicon: BDAG
  rationale: El participio pasivo describe el objeto en proceso de ser descendido. 'Siendo bajada' conserva el valor pasivo y progresivo, en línea con el inglés POB.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo de Dios
  - del cielo
  lexicon: BDAG
  rationale: En este contexto visionario, el sentido puede expresarse como 'desde el cielo'; 'desde el cielo' es natural en español y mantiene la procedencia vertical y revelatoria sin agregar formulación interpretativa extra.
- source_word: ἦλθεν ἄχρι ἐμοῦ
  english_pob_choice: it came to me
  chosen_spanish: llegó hasta mí
  alternatives_spanish:
  - vino hasta mí
  - me alcanzó
  lexicon: BDAG
  rationale: ἄχρι con genitivo expresa llegada hasta la posición del hablante. 'Llegó hasta mí' reproduce bien la idea de alcance y evita un literalismo menos natural.
theological_decisions:
- issue: Estado visionario y visión como realidades distintas
  english_pob_reading: in a trance I saw a vision
  chosen_spanish_reading: en un trance vi una visión
  alternative_spanish_readings:
  - en éxtasis vi una visión
  - vi una visión en éxtasis
  rationale: Se mantienen separados el estado de ἐκστάσει y el objeto de ὅραμα. Así no se diluye el matiz narrativo de que Pedro estaba en un trance cuando recibió la visión.
  doctrine_reference: Translation philosophy §1, §6
- issue: Procedencia celestial de la imagen
  english_pob_reading: from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - del cielo
  - desde el cielo de Dios
  rationale: La visión procede de arriba en un marco revelatorio; 'desde el cielo' conserva esa procedencia sin reemplazarla por una lectura devocional más explicativa.
  doctrine_reference: Hechos 10–11, contexto narrativo
- issue: No añadir posesivo que el griego no expresa
  english_pob_reading: by four corners
  chosen_spanish_reading: por cuatro extremos
  alternative_spanish_readings:
  - por cuatro esquinas
  - por sus cuatro extremos
  rationale: Siguiendo la revisión del texto inglés, se evita introducir un posesivo no explícito. La forma española mantiene la misma sobriedad del griego.
  doctrine_reference: Revisión textual auditada
translation_notes:
  revision_awareness: Se siguió el pasaje inglés auditado y su revisión más reciente, especialmente la decisión de no añadir posesivo antes de 'four corners'. También se preservó la distinción entre el estado visionario y la visión, y se mantuvo la amplitud de σκεῦός τι sin especificarlo demasiado pronto.
  spanish_consistency_notes:
  - Se usó 'Jope' para Ἰόππη, consistente con la forma española tradicional del topónimo.
  - Se empleó 'trance' para ἐκστάσει y 'visión' para ὅραμα, manteniendo la distinción conceptual del original.
  - '''Algo'' refleja la indefinición de σκεῦός τι y evita imponer ''vaso'' o ''recipiente'' sin necesidad.'
  - '''Desde el cielo'' conserva la dirección y el origen revelatorio del griego ἐκ τοῦ οὐρανοῦ.'
  - '''Por cuatro extremos'' evita agregar posesivo y sigue de cerca la estructura del griego.'
