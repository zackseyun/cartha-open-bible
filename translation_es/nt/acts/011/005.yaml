    text: O 'un recipiente' o 'un objeto determinado'; el término griego es amplio y primero presenta el objeto de manera indefinida antes de compararlo con una gran sábana.
    reason: lexical_alternative
  - marker: b
    text: O 'por cuatro extremos'. El griego dice literalmente 'por cuatro extremos'; 'por cuatro puntas' comunica con más claridad en español la imagen de la tela suspendida, sin añadir un posesivo explícito.
    reason: lexical_alternative
