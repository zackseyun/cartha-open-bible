review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego en conjunto: «llegó», «vio la gracia de Dios», «se alegró», «a todos», «permanecer con el Señor». También respeta la decisión auditada de mantener literal «la gracia de Dios» y de no sobreinterpretar προσμένειν como «devoción». Sin embargo, «exhortaba» por sí solo debilita el matiz imperfectivo de παρεκάλει que el POB inglés explicitó como «kept urging», y la colocación «permanecer con el Señor con propósito de corazón» suena algo rígida en español y puede beneficiarse de una formulación más idiomática sin perder la estructura.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere un ajuste menor para mayor naturalidad y fidelidad aspectual. «Exhortaba» es correcto, aunque «seguía exhortando» refleja mejor la acción continua. Además, «con propósito de corazón» es comprensible pero poco natural; «con firme propósito de corazón» suena mejor en español e interpreta πρόθεσις de manera legítima, manteniendo καρδία. La nota a pie a sobrecarga una alternativa idéntica al texto principal; conviene convertirla en una nota léxica útil en vez de repetir exactamente la misma frase.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: χάρις -> «gracia»; θεοῦ -> «Dios»; κύριος -> «Señor». No hay conflicto con Yahvé, Mesías, Espíritu, etc. La elección «permanecer con el Señor» concuerda con la revisión auditada del inglés. La principal mejora es estilística/aspectual, no terminológica.'
  issues:
  - severity: medium
    issue: «Exhortaba» no refleja con suficiente claridad el imperfecto de παρεκάλει
    rationale: El audit trail inglés marcó explícitamente la acción continua/repetida con «kept urging». En español, el imperfecto simple puede bastar, pero «seguía exhortando» preserva mejor ese matiz en una línea clave de exhortación pastoral.
  - severity: medium
    issue: «Con propósito de corazón» suena poco idiomático
    rationale: Aunque cercano al griego, la expresión es rígida en español moderno. «Con firme propósito de corazón» mejora la legibilidad y sigue representando πρόθεσις + καρδία sin paráfrasis excesiva.
  - severity: low
    issue: La nota [a] repite el texto principal como alternativa
    rationale: Decir «O “la gracia de Dios”» no aporta una alternativa real. Debe ofrecer una alternativa útil como «la gracia que viene de Dios» o explicar el posible sentido contextual de la frase.
  revised_spanish_text: Cuando llegó y vio la gracia de Dios[a], se alegró y seguía exhortando a todos a permanecer con el Señor[b] con firme propósito de corazón.
  revised_footnotes:
