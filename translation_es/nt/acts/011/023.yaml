    changes_summary: Changed 'remain devoted to the Lord' to 'remain with the Lord' for closer lexical accuracy to προσμένειν τῷ κυρίῳ; retained 'with purpose of heart' as a natural rendering of τῇ προθέσει τῆς καρδίας.
translation:
  language: es
  text: Cuando llegó y vio la gracia de Dios[a], se alegró y seguía exhortando a todos a permanecer con el Señor[b] con firme propósito de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gracia que viene de Dios». La expresión puede referirse a la evidencia visible de la obra graciosa de Dios entre ellos.
    reason: lexical_alternative
  - marker: b
    text: O «seguir con el Señor» o «continuar fieles al Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: παραγενόμενος
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - fue y llegó
  lexicon: BDAG
  rationale: El participio aoristo indica la llegada de Bernabé al lugar. «Llegó» es natural en español y conserva el valor puntual del evento sin añadir información.
- source_word: ἰδὼν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - observó
  lexicon: BDAG
  rationale: El verbo ὁράω se expresa con el sentido directo de visión. «Vio» mantiene la sencillez del griego; el matiz de percepción queda en el contexto.
- source_word: τὴν χάριν τὴν τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_spanish: la gracia de Dios
  alternatives_spanish:
  - la gracia de Dios
  - el favor de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión teológica «gracia de Dios», que puede referir al obrar gracioso de Dios visible en la comunidad. «Favor» sería posible, pero debilita el peso teológico del término.
- source_word: ἐχάρη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de gozo
  lexicon: BDAG
  rationale: El aoristo de χαίρω puede traducirse como «se alegró» o «se regocijó». Se elige una forma natural y digna en español, sin perder el tono de gozo.
- source_word: παρεκάλει
  english_pob_choice: kept urging
  chosen_spanish: exhortaba
  alternatives_spanish:
  - seguía exhortando
  - insistía en
  lexicon: BDAG
  rationale: El imperfecto señala acción continuada. «Exhortaba» comunica la dimensión exhortativa de παρακαλέω; el matiz iterativo queda sugerido por el imperfecto español.
- source_word: πάντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos los presentes
  lexicon: BDAG
  rationale: En contexto, el objeto son los creyentes reunidos. «A todos» es idiomático en español y no introduce un referente innecesariamente explícito.
- source_word: τῇ προθέσει τῆς καρδίας
  english_pob_choice: with purpose of heart
  chosen_spanish: con propósito de corazón
  alternatives_spanish:
  - con resolución de corazón
  - con firme propósito del corazón
  - con propósito firme
  lexicon: BDAG
  rationale: πρόθεσις expresa propósito o resolución, y καρδία designa el centro interior de la voluntad y afecto. «Con propósito de corazón» sigue de cerca la estructura griega y preserva la formulación auditada del POB inglés.
- source_word: προσμένειν
  english_pob_choice: remain with
  chosen_spanish: permanecer con
  alternatives_spanish:
  - seguir con
  - continuar con
  - perseverar con
  lexicon: BDAG
  rationale: προσμένω puede expresar permanecer, continuar o mantenerse adherido. Dado el dativo τῷ κυρίῳ, «permanecer con» conserva cercanía relacional sin forzar «devoción» como interpretación adicional.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Aquí κύριος se refiere al Señor en el contexto narrativo de Hechos; en español, «el Señor» es la forma natural y reverente para este título. No se sustituye por un nombre propio porque el texto griego usa el título.
theological_decisions:
- issue: Sentido de «la gracia de Dios»
  english_pob_reading: God's gracious work evident among the Antioch believers
  chosen_spanish_reading: la gracia de Dios visible en la comunidad
  alternative_spanish_readings:
  - el favor de Dios
  - la gracia que Dios les concedió
  rationale: Se mantiene la expresión literal para no resolver la tensión entre gracia como favor divino y gracia como obra visible de Dios entre ellos. La formulación permite ambas dimensiones, tal como el audit trail inglés.
  doctrine_reference: Principio POB de preservar la tensión léxica y teológica documentada
- issue: Force de προσμένειν τῷ κυρίῳ
  english_pob_reading: persevering attachment/devotion to the Lord
  chosen_spanish_reading: permanecer con el Señor en adhesión continua
  alternative_spanish_readings:
  - continuar con el Señor
  - mantenerse fiel al Señor
  rationale: La frase griega apunta a una permanencia sostenida junto al Señor. «Permanecer con el Señor» conserva la cercanía relacional sin reemplazar el matiz verbal por una categoría doctrinal más estrecha.
  doctrine_reference: 'Translation philosophy: optimal equivalence; contested sense of προσμένω + dative'
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que prefirió «remain with the Lord» frente a «remain devoted to the Lord» por mayor precisión léxica. En español se refleja esa misma cautela con «permanecer con el Señor», mientras que se conserva el giro «con propósito de corazón» por ser una correspondencia natural y auditada de τῇ προθέσει τῆς καρδίας.
  spanish_consistency_notes:
  - Se usa «gracia de Dios» en coherencia con el término clave χάρις y con la decisión inglesa de no parafrasear la obra divina.
  - Se usa «el Señor» para κύριος, conforme al título cristológico del contexto de Hechos.
  - Se evita «Cristo» porque el griego no lo emplea aquí.
  - «Con propósito de corazón» preserva la estructura nominal griega y coincide con la tradición POB de no suavizar la formulación cuando sigue siendo idiomática en español.
  - El imperfecto español «exhortaba» intenta reflejar la acción continuada de παρεκάλει sin añadir contenido no presente en el texto.
