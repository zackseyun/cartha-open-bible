revisions:
- from: Cuando llegó y vio la gracia de Dios[a], se alegró y exhortaba a todos a permanecer con el Señor[b] con propósito de corazón.
  to: Cuando llegó y vio la gracia de Dios[a], se alegró y seguía exhortando a todos a permanecer con el Señor[b] con firme propósito de corazón.
  rationale: Se hizo una reparación menor para reflejar mejor el imperfecto de παρεκάλει («seguía exhortando»), mejorar la naturalidad de τῇ προθέσει τῆς καρδίας («con firme propósito de corazón») y corregir la nota [a], que antes no ofrecía una alternativa real. El resto del texto conserva bien las decisiones léxicas y teológicas auditadas.
