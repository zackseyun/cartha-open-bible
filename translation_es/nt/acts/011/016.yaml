  text: ἐμνήσθην δὲ τοῦ ῥήματος ⸀τοῦ κυρίου ὡς ἔλεγεν· Ἰωάννης μὲν ἐβάπτισεν ὕδατι, ὑμεῖς δὲ βαπτισθήσεσθε ἐν πνεύματι ἁγίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/016.yaml
  text: Then I remembered the word of the Lord[a], how he said, ‘John baptized with water, but you will be baptized in the Holy Spirit.’
  footnotes:
  - marker: a
    text: Or ‘with the Holy Spirit.’ The Greek preposition can be understood either locatively (‘in’) or instrumentally (‘with’).
    reason: alternative_reading
