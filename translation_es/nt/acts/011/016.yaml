translation:
  language: es
  text: 'Entonces recordé la palabra[a] del Señor, cómo dijo: «Juan bautizó con agua, pero ustedes serán bautizados en el Espíritu Santo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dicho». ῥῆμα puede referirse a una palabra pronunciada o a un dicho concreto.
    reason: lexical_alternative
  - marker: b
    text: O «con el Espíritu Santo». La preposición griega ἐν aquí puede entenderse locativamente («en») o instrumentalmente («con»).
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμνήσθην
  english_pob_choice: I remembered
  chosen_spanish: recordé
  alternatives_spanish:
  - me acordé
  - recordé en mi mente
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι funciona aquí como acción puntual de recordar. «Recordé» es natural, claro y suficientemente formal en español; evita una perífrasis innecesaria.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ marca avance discursivo más que oposición fuerte. «Entonces» conserva el flujo narrativo sin sobrerresaltar contraste.
- source_word: τοῦ ῥήματος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la declaración
  - la frase
  lexicon: BDAG
  rationale: ῥῆμα puede ser ‘palabra’, ‘dicho’ o ‘declaración’. En este contexto, «la palabra» es la opción bíblica más natural en español y encaja con la cita que sigue.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: El inglés POB usa «Lord» para κύριος. En español, «Señor» preserva el peso cristológico y sigue el uso bíblico normal sin sustituir el título por una paráfrasis.
- source_word: ὡς ἔλεγεν
  english_pob_choice: how he said
  chosen_spanish: cómo dijo
  alternatives_spanish:
  - como decía
  - cómo estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto ἔλεγεν aquí se entiende de una cita recordada, pero el ajuste editorial inglés ya decidió evitar una lectura habitualizante. En español, «cómo dijo» reproduce ese valor de manera natural.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: μὲν ... δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - por un lado ... pero por otro
  - en cambio
  lexicon: BDAG
  rationale: La pareja μὲν ... δὲ introduce contraste entre dos bautismos. «Pero» es la forma más directa y natural para mantener ese contraste en español.
- source_word: ἐβάπτισεν ὕδατι
  english_pob_choice: baptized with water
  chosen_spanish: bautizó con agua
  alternatives_spanish:
  - bautizó en agua
  - sumergió en agua
  lexicon: BDAG
  rationale: βαπτίζω se traduce aquí por «bautizó» por su uso establecido y preciso en este contexto. El dativo ὕδατι expresa medio/instrumento; «con agua» preserva bien la relación funcional en español.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El plural explícito contrasta a los oyentes con Juan. «Ustedes» es neutral y ampliamente comprensible en el español bíblico latinoamericano.
- source_word: βαπτισθήσεσθε
  english_pob_choice: will be baptized
  chosen_spanish: serán bautizados
  alternatives_spanish:
  - serán sumergidos
  - serán bautizados
  lexicon: BDAG
  rationale: El futuro pasivo de βαπτίζω se vierte naturalmente como «serán bautizados». Mantiene la pasividad y la referencia sacramental sin añadir explicación ajena al texto.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: La preposición ἐν admite sentido locativo o instrumental. La opción principal «en el Espíritu Santo» preserva la lectura de base del POB inglés y deja abierta la tensión semántica; «con» queda como alternativa viable en español.
theological_decisions:
- issue: Rendición de κύριος en un dicho atribuido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El término κύριος mantiene su fuerza cristológica y de autoridad. «Señor» es la equivalencia española estable y refleja el valor doctrinal que el POB preserva en inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Preposición en ἐν πνεύματι ἁγίῳ
  english_pob_reading: in the Holy Spirit
  chosen_spanish_reading: en el Espíritu Santo
  alternative_spanish_readings:
  - con el Espíritu Santo
  rationale: 'Se conserva la ambigüedad relativa del griego: ἐν puede leerse locativamente o instrumentalmente. «En» mantiene la lectura principal del POB y no resuelve prematuramente la relación entre inmersión y Espíritu.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción refleja la revisión más reciente del POB en inglés, que prefirió «he said» frente a «he used to say» para no forzar una habitualidad inexistente. Por eso se optó por «cómo dijo» y no por una perífrasis habitual en español.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio doctrinal del proyecto.
  - Se conserva «Espíritu Santo» con mayúsculas por tratarse del referente divino.
  - «Bautizados» traduce el pasivo futuro sin introducir verbos alternativos que diluyan el paralelismo con Juan.
  - Las comillas angulares se usan para el discurso directo en estilo editorial español.
