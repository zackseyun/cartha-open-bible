translation:
  language: es
  text: Pero cuando Pedro subió a Jerusalén, los de la circuncisión discutían con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Ahora bien, cuando
  - Y cuando
  lexicon: BDAG
  rationale: δέ marca transición narrativa con un matiz adversativo leve; «Pero cuando» conserva ese enlace sin sonar forzado en español.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió a
  - fue a Jerusalén
  - ascendió
  lexicon: BDAG
  rationale: Con Jerusalén, ἀναβαίνω conserva el idiomático sentido geográfico de «subir». «Subió» reproduce esa imagen de forma natural en español.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: nombre propio
  rationale: Se usa la forma corriente en español para el nombre de la ciudad.
- source_word: διεκρίνοντο
  english_pob_choice: were disputing
  chosen_spanish: discutían
  alternatives_spanish:
  - estaban disputando
  - contendían
  - le replicaban
  lexicon: BDAG
  rationale: El imperfecto expresa una acción շարունակada o repetida. «Discutían» mantiene la idea de oposición verbal activa sin cargar el término con más intensidad de la que exige el griego.
- source_word: πρὸς αὐτόν
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - contra él
  - ante él
  lexicon: BDAG
  rationale: En contexto de disputa, πρός con acusativo señala interacción dirigida a una persona. «Con él» es la equivalencia idiomática natural en español; «contra él» sería más fuerte de lo que obliga el texto.
- source_word: οἱ ἐκ περιτομῆς
  english_pob_choice: those of the circumcision
  chosen_spanish: los de la circuncisión
  alternatives_spanish:
  - los circuncidados
  - los de la circuncisión, es decir, el partido de la circuncisión
  - los creyentes de la circuncisión
  lexicon: BDAG
  rationale: La frase identifica al grupo por su relación con la circuncisión. Se conserva la formulación breve y ambigua del griego, evitando añadir «grupo» o «partido» sin apoyo explícito en el texto.
theological_decisions:
- issue: Identificación de οἱ ἐκ περιτομῆς
  english_pob_reading: a circumcision-identified group within the Jerusalem believers who objected to Peter
  chosen_spanish_reading: un grupo definido por su relación con la circuncisión, dentro del marco narrativo de Jerusalén, que objetaba a Pedro
  alternative_spanish_readings:
  - todos los creyentes judíos en general
  - un partido formal de la circuncisión
  - los circuncidados en sentido meramente étnico
  rationale: El griego señala una subidentidad real en el relato, pero no obliga a leer un nombre de partido técnico. La traducción mantiene la referencia sin resolver indebidamente la tensión entre descripción étnica y afiliación doctrinal.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada que eliminó «group» del equivalente inglés porque no está explícito en el griego; por eso el español evita añadir «grupo» o una glosa similar en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Jerusalén» y no una transliteración inglesa.
  - Se prefirió «los de la circuncisión» para conservar la ambigüedad significativa del sintagma griego.
  - «Discutían» refleja el imperfecto sin intensificar indebidamente la hostilidad.
  - No se introdujo «partido» ni «creyentes» en el texto principal porque esas explicaciones no están explícitas en el versículo.
