translation:
  language: es
  text: Así que los discípulos determinaron, cada uno según lo que podía[a], enviar ayuda a los hermanos que vivían en Judea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según lo que a cada uno le prosperaba» o «según lo que cada uno podía costear».
    reason: lexical_alternative
  - marker: b
    text: «Los hermanos» probablemente se refiere a los creyentes de Judea, incluida la comunidad cristiana en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητῶν
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el término establecido para μαθηταί en el NT y conserva la relación de aprendizaje y adhesión a Jesús sin diluirla en un término más general.
- source_word: καθὼς εὐπορεῖτό τις
  english_pob_choice: each according to his ability
  chosen_spanish: cada uno según lo que podía
  alternatives_spanish:
  - cada uno según sus recursos
  - cada uno según lo que podía permitirse
  lexicon: BDAG
  rationale: La frase expresa proporcionalidad respecto de medios o capacidad disponible. «Según lo que podía» mantiene la idea de capacidad práctica sin introducir una formulación demasiado abstracta o económica en español.
- source_word: ὥρισαν
  english_pob_choice: determined
  chosen_spanish: determinaron
  alternatives_spanish:
  - decidieron
  - resolvieron
  lexicon: BDAG
  rationale: ὁρίζω aquí comunica una decisión deliberada y concertada. «Determinaron» reproduce bien ese matiz de fijar o resolver una acción.
- source_word: ἕκαστος αὐτῶν
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  lexicon: BDAG
  rationale: El valor distributivo de ἕκαστος se expresa naturalmente con «cada uno». El complemento «de ellos» no es necesario en español.
- source_word: εἰς διακονίαν
  english_pob_choice: to send relief
  chosen_spanish: enviar ayuda
  alternatives_spanish:
  - enviar socorro
  - enviar asistencia
  lexicon: BDAG
  rationale: Aunque διακονία puede abarcar «servicio» o «ministerio», en este contexto el contenido concreto es ayuda práctica para hermanos necesitados. «Ayuda» comunica esa función sin forzar una lectura eclesiástica más amplia.
- source_word: πέμψαι
  english_pob_choice: to send relief
  chosen_spanish: enviar ayuda
  alternatives_spanish:
  - mandar ayuda
  - remitir ayuda
  lexicon: BDAG
  rationale: El infinitivo σημαίνει «enviar»; en contexto se entiende el envío de apoyo material. «Enviar ayuda» conserva el verbo básico y el sentido contextual.
- source_word: τοῖς κατοικοῦσιν ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: to those living in Judea
  chosen_spanish: a los que vivían en Judea
  alternatives_spanish:
  - a los que habitaban en Judea
  - a los que residían en Judea
  lexicon: BDAG
  rationale: «Vivían» es una traducción natural y clara del participio presente de κατοικέω, sin perder el sentido locativo de residencia estable.
- source_word: ἀδελφοῖς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego. En contexto puede abarcar a la comunidad cristiana en Judea, pero la forma de la fuente se preserva en la traducción principal.
theological_decisions:
- issue: Referencia comunitaria de ἀδελφοῖς
  english_pob_reading: the brothers likely refers to fellow believers in Judea, including the wider Christian community.
  chosen_spanish_reading: los hermanos puede referirse a los creyentes de Judea, es decir, a la comunidad cristiana en sentido amplio.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: La forma griega es masculina plural, y el uso cristiano primitivo puede ser inclusivo en referencia a toda la comunidad. Se conserva «los hermanos» en el texto principal por fidelidad a la forma fuente, y se explicita el alcance comunitario en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que descartó una traducción demasiado literal de εἰς διακονίαν como «for service»; por eso el español evita «para servicio» y adopta «enviar ayuda», que refleja mejor el contexto de socorro material sin perder la conexión semántica con el envío de apoyo. También se preservó la decisión revisada de no sobrecargar la frase con una palabra equivalente a «relief» cuando el español ya puede expresarla de forma natural mediante «ayuda».
  spanish_consistency_notes:
  - Se mantuvo «hermanos» como forma masculina plural, en continuidad con la política de precisión de género del proyecto.
  - Se evitó «Señor» o términos litúrgicos ajenos porque el versículo no los requiere.
  - El verbo en pasado («determinaron») y el participio traducido como relativa («los que vivían») reflejan la sintaxis narrativa del pasaje en español natural.
