  text: τῶν δὲ μαθητῶν καθὼς εὐπορεῖτό τις ὥρισαν ἕκαστος αὐτῶν εἰς διακονίαν πέμψαι τοῖς κατοικοῦσιν ἐν τῇ Ἰουδαίᾳ ἀδελφοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/029.yaml
  text: So the disciples determined[a], each according to his ability[b], to send relief to the brothers living in Judea.
  footnotes:
