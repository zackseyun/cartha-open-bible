source:
  edition: SBLGNT
  text: εἰ οὖν τὴν ἴσην δωρεὰν ἔδωκεν αὐτοῖς ὁ θεὸς ὡς καὶ ἡμῖν πιστεύσασιν ἐπὶ τὸν κύριον Ἰησοῦν Χριστόν, ⸀ἐγὼ τίς ἤμην δυνατὸς κωλῦσαι τὸν θεόν;
base_translation:
  language: en
  yaml_path: translation/nt/acts/011/017.yaml
  text: If then God gave to them the same gift as also to us who believed in the Lord Jesus Messiah[b][a], who was I that I could hinder God?
  footnotes:
  - marker: a
    text: 'Or ''Christ'': Greek Χριστόν. Here rendered ''Messiah'' because the title sense is still active.'
    reason: alternative_reading
  - marker: b
    text: Or 'to us who believed in the Lord Jesus Messiah.' The Greek participle can be rendered more literally that way.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
