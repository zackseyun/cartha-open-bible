translation:
  language: es
  text: Y cuando lo halló, lo llevó a Antioquía. Y durante todo un año se reunieron en la iglesia[a] y enseñaron a mucha gente; y en Antioquía los discípulos fueron llamados cristianos por primera vez[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: O «se congregaron con la iglesia». La frase puede enfatizar la reunión junto con la comunidad cristiana más que una reunión dentro de un edificio.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «fueron llamados cristianos por primera vez». El nombre probablemente surgió como designación pública en Antioquía.
    reason: cultural_note
lexical_decisions:
- source_word: εὑρὼν
  english_pob_choice: when he found him
  chosen_spanish: cuando lo halló
  alternatives_spanish:
  - habiéndolo hallado
  - después de hallarlo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, una subordinada temporal mantiene con naturalidad la secuencia sin perder el valor anterior de la acción.
- source_word: ἤγαγεν
  english_pob_choice: he brought him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo condujo
  - lo trajo
  lexicon: BDAG
  rationale: Aquí ἄγω expresa el traslado de una persona a Antioquía; «lo llevó» es claro y fiel al sentido de mover a alguien de un lugar a otro.
- source_word: ἐγένετο δὲ αὐτοῖς καὶ
  english_pob_choice: And for a whole year they
  chosen_spanish: Y aconteció que durante todo un año ellos
  alternatives_spanish:
  - Y sucedió que durante todo un año
  - Y ocurrió que durante todo un año
  lexicon: BDAG
  rationale: Se conserva la introducción narrativa idiomática sin forzar un calco demasiado áspero; la frase prepara el tramo de acciones subsiguientes y deja claro que se refiere a Bernabé y Saulo.
- source_word: ἐνιαυτὸν ὅλον
  english_pob_choice: for a whole year
  chosen_spanish: durante todo un año
  alternatives_spanish:
  - por un año entero
  - durante un año completo
  lexicon: BDAG
  rationale: La acusativa temporal se expresa de manera natural en español con «durante todo un año».
- source_word: συναχθῆναι ἐν τῇ ἐκκλησίᾳ
  english_pob_choice: met together in the church
  chosen_spanish: se reunieron en la iglesia
  alternatives_spanish:
  - se congregaron con la iglesia
  - se reunieron con la iglesia
  lexicon: BDAG
  rationale: Se conserva la idea de reunirse en asociación con la comunidad cristiana. En español, «iglesia» puede sugerir tanto la comunidad como el lugar; aquí se mantiene la ambigüedad útil del griego, sin imponer de modo exclusivo el sentido de edificio.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: En Hechos, ἐκκλησία designa normalmente a la comunidad cristiana; «iglesia» es el equivalente estándar y comprensible en español.
- source_word: διδάξαι
  english_pob_choice: taught
  chosen_spanish: enseñaron
  alternatives_spanish:
  - enseñar
  - estuvieron enseñando
  lexicon: BDAG
  rationale: El infinitivo coordinado se vierte como verbo finito para una lectura fluida en español, manteniendo la acción de instrucción como parte del mismo período narrativo.
- source_word: ὄχλον ἱκανόν
  english_pob_choice: a considerable crowd
  chosen_spanish: a una considerable multitud
  alternatives_spanish:
  - a mucha gente
  - a una gran multitud
  lexicon: BDAG
  rationale: ἱκανός expresa una cantidad considerable o suficiente; «considerable multitud» conserva la idea de volumen sin exagerarla.
- source_word: χρηματίσαι
  english_pob_choice: were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - recibieron el nombre de
  - fueron designados
  lexicon: BDAG
  rationale: En este contexto, χρηματίζω se refiere a recibir una designación o nombre. «Fueron llamados» reproduce bien el sentido pasivo.
- source_word: πρώτως
  english_pob_choice: first
  chosen_spanish: por primera vez
  alternatives_spanish:
  - primero
  - en primer lugar
  lexicon: BDAG
  rationale: El adverbio marca la primera ocurrencia del nombre; «por primera vez» explicita con naturalidad ese valor en español.
- source_word: Χριστιανούς
  english_pob_choice: Christians
  chosen_spanish: cristianos
  alternatives_spanish:
  - mesianistas
  lexicon: BDAG
  rationale: Aunque Χριστός suele traducirse como «Mesías» cuando funciona como título, Χριστιανούς aquí es un nombre grupal ya lexicalizado. En español, «cristianos» es el equivalente natural y reconocido; «mesianistas» sería demasiado artificial y desplazaría el valor de nombre establecido.
theological_decisions:
- issue: Cómo renderizar el nombre grupal Χριστιανούς sin perder la relación con Χριστός/Mesías
  english_pob_reading: Christians
  chosen_spanish_reading: cristianos
  alternative_spanish_readings:
  - mesianistas
  rationale: El texto no usa Χριστός como título predicativo, sino un etnónimo o designación social ya formada. «Cristianos» comunica correctamente el nombre por el que eran conocidos en Antioquía, sin introducir una connotación etimológica innecesaria.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; coherencia terminológica con excepciones documentadas.'
- issue: Sentido de ἐκκλησίᾳ en la frase de reunión
  english_pob_reading: in the church
  chosen_spanish_reading: en la iglesia
  alternative_spanish_readings:
  - con la iglesia
  - en la congregación
  rationale: El griego permite una lectura comunitaria y, en el uso cristiano primitivo, también puede evocar la asamblea local. «En la iglesia» conserva esa amplitud sin forzar el sentido de edificio ni limitarlo a una reunión informal.
  doctrine_reference: Hechos 11:26 y el uso de ἐκκλησία en el NT; distinción comunidad/edificio según contexto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del POB inglés, que prefirió «in the church» frente a «with the church» y simplificó la clausula final a una forma más natural. En español se conserva esa decisión con «en la iglesia» y se mantiene la secuencia narrativa clara, sin introducir una paráfrasis que atenúe el carácter de nombre recibido en Antioquía.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «iglesia» para ἐκκλησία conforme al uso contextual en Hechos, sin implicar necesariamente un edificio.
  - Se traduce Χριστιανούς como «cristianos» por tratarse de un nombre de grupo ya establecido, no de un título a verter como «Mesías».
  - Las notas se limitan a alternativas realmente presentes en el análisis, sin añadir glosas no ancladas en el texto.
