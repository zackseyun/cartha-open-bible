translation:
  language: es
  text: Ahora bien, en aquellos días bajaron[a] profetas de Jerusalén a Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendieron de Jerusalén a Antioquía'. El verbo griego puede traducirse como 'bajaron' o 'descendieron'; aquí se elige 'bajaron' como la opción más natural en español, conservando el sentido geográfico de descenso.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ταύταις δὲ ταῖς ἡμέραις
  english_pob_choice: Now in those days
  chosen_spanish: Ahora bien, en aquellos días
  alternatives_spanish:
  - En aquellos días
  - Durante aquellos días
  - En ese tiempo
  lexicon: BDAG
  rationale: La expresión funciona como marco temporal narrativo. 'Ahora bien' representa suavemente δέ como transición discursiva, y 'en aquellos días' conserva la referencia temporal sin sobrecargar el español.
- source_word: κατῆλθον
  english_pob_choice: came down
  chosen_spanish: bajaron
  alternatives_spanish:
  - vinieron
  - descendieron
  - fueron hacia abajo
  lexicon: BDAG
  rationale: El verbo κατέρχομαι conserva un matiz direccional de 'descender'. En español, 'bajaron' transmite de forma natural ese sentido geográfico sin perder la orientación del texto.
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: BDAG
  rationale: ἀπό expresa origen o procedencia. 'De Jerusalén' es la forma más natural y directa en español; 'desde Jerusalén' también sería posible, pero suena más enfático.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - mensajeros proféticos
  - portavoces inspirados
  lexicon: BDAG
  rationale: Se conserva el término reconocido 'profetas' para no estrechar indebidamente el alcance del oficio o carisma que el griego no delimita aquí.
- source_word: εἰς Ἀντιόχειαν
  english_pob_choice: to Antioch
  chosen_spanish: a Antioquía
  alternatives_spanish:
  - hacia Antioquía
  - hasta Antioquía
  lexicon: BDAG
  rationale: εἰς marca movimiento hacia un lugar. En español, con nombres de ciudad, 'a Antioquía' es la opción idiomática y fiel.
theological_decisions:
- issue: Alcance del término 'profetas' en el contexto de la iglesia primitiva
  english_pob_reading: Render προφῆται simply as 'prophets' without narrowing the term to either OT-style canonical prophets or merely gifted preachers.
  chosen_spanish_reading: Traducir simplemente 'profetas', sin restringirlo a profetas canónicos ni a meros predicadores carismáticos.
  alternative_spanish_readings:
  - profetas inspirados
  - maestros proféticos
  rationale: El griego usa el término común προφῆται y no define aquí el tipo exacto de ministerio. Mantener 'profetas' preserva la tensión teológica y evita imponer una lectura confesional no explicitada por el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se corrigió la validación previa eliminando el marcador de nota al pie no anclado. La traducción ahora no usa notas, por lo que no hay riesgo de marcadores huérfanos.
  spanish_consistency_notes:
  - Se prefirió 'Antioquía' como nombre tradicional geográfico en español.
  - Se evitó 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
  - El movimiento se expresó con 'bajaron' para conservar la imagen espacial del verbo griego.
  - La puntuación y el orden siguen un español natural de registro bíblico contemporáneo.
