translation:
  language: es
  text: Esto ocurrió tres veces[a], y todo fue llevado de nuevo al cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo ello fue llevado de nuevo al cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esto mismo
  - Este acontecimiento
  lexicon: BDAG
  rationale: El demostrativo apunta al hecho narrado previamente. «Esto» conserva la referencia amplia sin añadir «visión» ni especificar más de lo que el griego expresa aquí.
- source_word: ἐγένετο
  english_pob_choice: happened
  chosen_spanish: ocurrió
  alternatives_spanish:
  - sucedió
  - pasó
  - tuvo lugar
  lexicon: BDAG
  rationale: γίνομαι aquí introduce un evento que acontece. «Ocurrió» suena natural en español moderno y mantiene el valor narrativo.
- source_word: ἐπὶ τρίς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - en tres ocasiones
  - tres ocasiones
  lexicon: BDAG
  rationale: La expresión idiomática indica repetición en tres ocasiones. «Tres veces» es la equivalencia más directa y clara en español.
- source_word: ἀνεσπάσθη
  english_pob_choice: was drawn up
  chosen_spanish: fue vuelto a ser levantado
  alternatives_spanish:
  - fue alzado de nuevo
  - fue subido otra vez
  - fue levantado
  lexicon: BDAG
  rationale: El pasivo de ἀνασπάω conserva la idea de un movimiento hacia arriba producido externamente. He optado por una forma pasiva que preserve el movimiento ascendente y el retorno expresado por πάλιν, sin convertirlo en una explicación interpretativa demasiado específica.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Adverbio de repetición/restablecimiento. Aquí refuerza que la acción de elevación se repite o se reitera.
- source_word: ἅπαντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - el conjunto entero
  - todas las cosas
  lexicon: BDAG
  rationale: El neutro plural tiene alcance comprehensivo. «Todo» preserva esa amplitud sin precisar indebidamente si el referente es el lienzo, los animales o la escena completa.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - hasta el cielo
  - hacia el cielo
  lexicon: BDAG
  rationale: Aunque οὐρανός en contextos visionarios puede referirse a «cielo» o «cielo/heaven», la dirección espacial de εἰς y la imagen narrativa se expresan bien con «hacia el cielo». Evito «al cielo» si pudiera sonar demasiado finalizado, y «cielo» mantiene la ambigüedad reverente sin imponer una interpretación teológica cerrada en la línea misma.
theological_decisions:
- issue: Alcance del referente de ἅπαντα
  english_pob_reading: Rendered broadly as 'everything' without specifying 'the sheet' or 'the animals.'
  chosen_spanish_reading: Se traduce ampliamente como «todo» sin identificar en la línea si se trata del lienzo, de los animales o del conjunto de la visión.
  alternative_spanish_readings:
  - todo ello
  - el lienzo entero
  - todos los animales
  rationale: El griego es comprehensivo pero no precisa el referente inmediato en esta cláusula. Mantener la amplitud preserva la tensión textual y evita importar una aclaración que el versículo no exige por sí solo.
  doctrine_reference: Primacía del texto original; conservar ambigüedad donde el griego la conserva.
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura amplia de ἅπαντα y una nota alternativa para el alcance del objeto; la versión española conserva esa amplitud y añade una formulación pasiva que respeta el movimiento ascendente y la reiteración de πάλιν. No se detectan revisiones aplicadas en el registro de auditoría.
  spanish_consistency_notes:
  - Se conserva «cielo» en un contexto visionario sin forzar «cielo» como simple atmósfera; la frase conserva la ambigüedad reverente del original.
  - No se introduce «visión» ni otro referente explícito ausente del griego.
  - Se usa «todo» para ἅπαντα, coherente con la decisión inglesa de no concretar el referente.
