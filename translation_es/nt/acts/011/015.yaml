review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia y el sentido básico del griego: la construcción temporal de ἐν δὲ τῷ ἄρξασθαί με λαλεῖν, la acción vívida de ἐπέπεσεν, el sujeto «el Espíritu Santo», y la referencia temporal «al principio». Sin embargo, la nota [a] no preserva fielmente la alternativa documentada, porque el texto principal usa «cuando» y la nota repite «cuando» en vez de ofrecer la alternativa «mientras/al comenzar» correspondiente al matiz de «as». Además, la nota [c] en español queda incompleta, ya que omite el verbo implícito que el inglés auditado suplió idiomáticamente.'
  spanish_quality_summary: El español es claro y eclesialmente natural. «Cayó sobre ellos» y «el Espíritu Santo» funcionan bien. La frase comparativa «así como también sobre nosotros» es comprensible, pero su nota alternativa debe formularse mejor para no sonar fragmentaria. En general, solo requiere un ajuste menor de notas para precisión y legibilidad.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Espíritu Santo» está bien contextualizado. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La capitalización y el registro son adecuados.
  issues:
  - severity: medium
    issue: La nota [a] no presenta una alternativa real al texto principal.
    rationale: El texto principal ya dice «cuando empecé a hablar», pero la nota dice «O “cuando empecé a hablar”». La evidencia inglesa documenta la alternancia «as/when»; en español debe reflejarse con una opción distinta, por ejemplo «mientras comenzaba a hablar» o «al comenzar a hablar».
  - severity: low
    issue: La nota [c] es demasiado fragmentaria en español.
    rationale: «O “así como también sobre nosotros”» es posible, pero queda elíptico y menos natural. Conviene suplir el verbo implícito para una alternativa española idiomática y clara, p. ej. «O “así como también había caído sobre nosotros”».
  revised_spanish_text: Y cuando empecé a hablar[a], el Espíritu Santo cayó sobre ellos, así como también sobre nosotros al principio[b][c].
  revised_footnotes:
