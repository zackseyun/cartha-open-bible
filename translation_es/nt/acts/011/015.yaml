translation:
  language: es
  text: Y cuando empecé a hablar[a], el Espíritu Santo cayó sobre ellos, así como también sobre nosotros al principio[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras comenzaba a hablar». La construcción griega puede traducirse como «cuando» o «mientras» en sentido temporal.
    reason: alternative_reading
  - marker: b
    text: «Al principio» probablemente se refiere al comienzo del derramamiento del Espíritu sobre los discípulos, es decir, Pentecostés.
    reason: cross_reference
  - marker: c
    text: O «así como también había caído sobre nosotros».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν δὲ τῷ ἄρξασθαί με λαλεῖν
  english_pob_choice: as I began to speak
  chosen_spanish: Y cuando empecé a hablar
  alternatives_spanish:
  - Y al comenzar yo a hablar
  - Y como empecé a hablar
  lexicon: BDAG
  rationale: La construcción con ἐν + infinitivo articular expresa simultaneidad temporal; en español, «cuando» comunica bien ese valor, y «empecé a hablar» conserva el inicio inmediato de la acción sin endurecer la sintaxis.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: a hablar
  alternatives_spanish:
  - a hablarles
  - a decir
  lexicon: BDAG
  rationale: «Hablar» es el equivalente natural y digno para λαλέω en este contexto narrativo y mantiene el énfasis en el acto de dirigirse a la audiencia.
- source_word: ἐπέπεσεν
  english_pob_choice: fell on
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - descendió sobre
  lexicon: BDAG
  rationale: «Cayó sobre» reproduce la fuerza idiomática de ἐπιπίπτω con un verbo concreto y vívido, sin suavizar el impacto del acontecimiento.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  lexicon: BDAG
  rationale: En español eclesial contemporáneo, «Espíritu Santo» es la forma natural y fiel para τὸ πνεῦμα τὸ ἅγιον; la mayúscula mantiene el referente personal y divino.
- source_word: ἐπ’ αὐτοὺς
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - en ellos
  lexicon: BDAG
  rationale: «Sobre ellos» conserva la preposición de contacto/irradiación que acompaña al verbo, y evita una interiorización que el griego no exige aquí.
- source_word: ὥσπερ καὶ ἐφ’ ἡμᾶς
  english_pob_choice: just as it had on us
  chosen_spanish: así como también sobre nosotros
  alternatives_spanish:
  - igual que sobre nosotros también
  - tal como sobre nosotros
  lexicon: BDAG
  rationale: El griego establece un paralelo explícito con los receptores previos; «así como también» mantiene la comparación y el «también» de καί sin forzar una versión más interpretativa del verbo implícito.
- source_word: ἐν ἀρχῇ
  english_pob_choice: at the beginning
  chosen_spanish: al principio
  alternatives_spanish:
  - al comienzo
  - en el principio
  lexicon: BDAG
  rationale: «Al principio» es idiomático y conserva la referencia temporal abierta que, en el contexto de Hechos, apunta al inicio del derramamiento del Espíritu sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Referencia de «al principio» (ἐν ἀρχῇ)
  english_pob_reading: A temporal reference to the beginning of the apostolic Spirit-outpouring experience, especially Pentecost.
  chosen_spanish_reading: Una referencia temporal al inicio del derramamiento del Espíritu sobre los discípulos, especialmente Pentecostés.
  alternative_spanish_readings:
  - 'Una referencia más general: «al comienzo» o «al principio» sin identificar Pentecostés'
  - Una alusión a un comienzo previo del ministerio apostólico
  rationale: El contexto inmediato compara la experiencia de Cornelio con lo que ocurrió «sobre nosotros»; por eso la lectura más probable es Pentecostés. Sin embargo, la traducción principal permanece lo bastante amplia para no cerrar la tensión interpretativa que el griego no resuelve explícitamente.
  doctrine_reference: Prioridad del texto original y preservación de la referencia histórica sin sobreespecificar.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que hizo más explícito el paralelismo temporal, pero en español se conservó una formulación natural que mantiene el verbo implícito y el valor comparativo del griego.
  spanish_consistency_notes:
  - Se usó «Espíritu Santo» como título fijo y natural en español.
  - Se prefirió «cayó sobre» para mantener la imagen verbal del griego.
  - Se mantuvo «al principio» sin expandirlo a una explicación doctrinal en el texto principal.
  - La comparación con «nosotros» se dejó explícita para conservar el paralelismo de ὥσπερ καὶ ἐφ’ ἡμᾶς.
