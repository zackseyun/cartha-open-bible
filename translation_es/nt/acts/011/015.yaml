    text: «Al principio» probablemente se refiere al comienzo del derramamiento del Espíritu sobre los discípulos, es decir, Pentecostés.
    reason: cross_reference
  - marker: c
    text: O «así como también había caído sobre nosotros».
    reason: alternative_reading
  revision_rationale: La traducción principal es esencialmente fiel y natural; solo hace falta corregir las notas para que preserven con precisión las alternativas documentadas en la auditoría inglesa y suenen idiomáticas en español.
