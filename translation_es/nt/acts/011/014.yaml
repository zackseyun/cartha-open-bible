revisions:
- from: Él te hablará palabras, por las cuales tú y toda tu casa serán salvados[a].
  to: Él te dirá palabras[a] por medio de las cuales serás salvo tú y toda tu casa.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español sin perder el sentido del griego: se evita el calco áspero ''hablará palabras'', se expresa con claridad el valor instrumental de ἐν οἷς, y se usa ''serás salvo'' para una formulación más idiomática y teológicamente adecuada en español bíblico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:08:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el hablante futuro, las ''palabras'', el valor instrumental de ἐν οἷς y la promesa de salvación para el destinatario y su casa. Sin embargo, ''Él te hablará palabras'' suena poco natural en español y no incorpora la decisión léxica documentada para πρὸς σέ como ''a ti''. Además, ''serán salvados'' con sujeto coordinado ''tú y toda tu casa'' es gramaticalmente posible pero menos natural y menos preciso que una formulación singular referida a ''tú'' y ''toda tu casa'' como dos componentes de una coordinación distributiva: ''serán salvos'' o una reestructuración equivalente. La mejor reparación menor es ''Él te dirá palabras[a] por medio de las cuales serás salvo tú y toda tu casa'', aunque para conservar λαλέω es preferible ''te hablará''.'
  spanish_quality_summary: 'La frase actual es comprensible pero contiene una construcción poco idiomática: ''hablará palabras'' es un calco del griego poco elegante en español bíblico moderno. ''Toda tu casa'' es aceptable y church-readable, pero la oración mejora notablemente con una reestructuración que evite la torpeza. ''Serán salvados'' también suena pesado; ''serán salvos'' o ''serás salvo tú y toda tu casa'' es más natural y digno.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. σωθήσῃ debe mantenerse con fuerza soteriológica como 'ser salvo'. οἶκος puede mantenerse como 'casa' en este contexto, aunque 'hogar' o 'familia' serían alternativas interpretativas; el borrador conserva adecuadamente la imagen doméstica. La nota sobre ἐν οἷς está bien orientada, pero debe ajustarse al género si se cambia la redacción.
  issues:
  - severity: medium
    issue: Calco poco natural en 'te hablará palabras'
    rationale: Aunque refleja literalmente λαλήσει ῥήματα, en español suena forzado. Una reestructuración como 'te hablará palabras' sigue siendo rara; 'te dirá palabras' o mejor 'te hablará, y por sus palabras...' cambia demasiado. La solución más fiel y natural es 'te dirá palabras' o 'te hablará palabras' no es ideal. Dado el objetivo de legibilidad, conviene reformular a 'te hablará palabras[a]' solo si se tolera la rareza, pero mejor 'te hablará, y por medio de esas palabras...' sería algo más expansivo. La opción propuesta abajo conserva el contenido con mínima adaptación idiomática.
  - severity: medium
    issue: La redacción no refleja la decisión léxica de πρὸς σέ como 'a ti'
    rationale: El texto usa 'te', que comunica bien el destinatario, pero la documentación del borrador dice 'a ti'. No es un error, pero una revisión puede armonizar mejor texto y decisiones documentadas o ajustar la explicación.
  - severity: medium
    issue: '''serán salvados'' es pesado y menos natural en este contexto'
    rationale: Para σωθήσῃ, el español eclesial natural prefiere 'serás salvo' / 'serán salvos'. La forma actual también tensiona la concordancia por incluir 'tú' dentro de un sujeto coordinado plural; una reestructuración distributiva evita esa aspereza.
  revised_spanish_text: Él te dirá palabras[a] por medio de las cuales serás salvo tú y toda tu casa.
  revised_footnotes:
  - marker: a
    text: O 'en las cuales' o 'por las cuales'; la expresión griega indica que esas palabras son el medio por el cual viene la salvación.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad del español sin perder el sentido del griego: se evita el calco áspero ''hablará palabras'', se expresa con claridad el valor instrumental de ἐν οἷς, y se usa ''serás salvo'' para una formulación más idiomática y teológicamente adecuada en español bíblico.'
