translation:
  language: es
  text: Él te dirá palabras[a] por medio de las cuales serás salvo tú y toda tu casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en las cuales' o 'por las cuales'; la expresión griega indica que esas palabras son el medio por el cual viene la salvación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - quien
  lexicon: BDAG
  rationale: El relativo griego retoma al hablante ya introducido; en español, 'Él' funciona de manera natural como retomada personal al inicio de la cláusula y evita una construcción demasiado pesada con 'quien'.
- source_word: λαλήσει
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - dirá
  lexicon: BDAG
  rationale: λαλέω aquí expresa el acto de comunicar oralmente un mensaje. 'Hablará' conserva un registro claro y solemne en español.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - mensajes
  - cosas
  lexicon: BDAG
  rationale: ῥήματα es objeto directo de 'hablar' y se expresa con naturalidad como 'palabras'. Se mantiene el plural concreto del griego.
- source_word: πρὸς σὲ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - contigo
  lexicon: BDAG
  rationale: Con un verbo de habla, πρός + acusativo señala dirección hacia el oyente. 'A ti' transmite esa relación de forma natural en español.
- source_word: ἐν οἷς
  english_pob_choice: by which
  chosen_spanish: por las cuales
  alternatives_spanish:
  - en las cuales
  - mediante las cuales
  lexicon: BDAG
  rationale: 'El griego usa ἐν con valor instrumental/mediador: las palabras son el medio por el cual viene la salvación. ''Por las cuales'' conserva esa función causal-instrumental sin forzar el español.'
- source_word: σωθήσῃ
  english_pob_choice: will be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán librados
  - serán preservados
  lexicon: BDAG
  rationale: El futuro pasivo de σῴζω se traduce con la pasiva 'ser salvados', que en Hechos mantiene la fuerza soteriológica del texto. Se prefiere la forma plural por la coordinación con 'tú y toda tu casa' entendida como sujeto colectivo en español.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - vos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis; en español se conserva con 'tú' dentro de la coordinación, manteniendo la referencia personal del griego.
- source_word: πᾶς ὁ οἶκός σου
  english_pob_choice: all your household
  chosen_spanish: toda tu casa
  alternatives_spanish:
  - toda tu familia
  - todo tu hogar
  lexicon: BDAG
  rationale: οἶκος aquí designa el conjunto doméstico y no solo la edificación. 'Toda tu casa' preserva la imagen y el valor colectivo de manera directa y bíblica en español.
theological_decisions:
- issue: Alcance de la salvación en el contexto de Cornelio
  english_pob_reading: '''will be saved'' preserves the soteriological force without specifying the mechanics beyond the verse.'
  chosen_spanish_reading: '''serán salvados'' conserva la fuerza soteriológica sin precisar el modo de participación de cada miembro de la casa.'
  alternative_spanish_readings:
  - serán librados
  - serán rescatados
  rationale: El contexto de Hechos es la proclamación del evangelio y la respuesta a él. La traducción mantiene abierta la cuestión de cómo se aplica la salvación a cada uno, sin imponer una explicación doctrinal no explicitada en el verso.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Naturaleza de 'toda tu casa'
  english_pob_reading: Translated collectively as 'all your household' without implying automatic salvation apart from response.
  chosen_spanish_reading: '''toda tu casa'' se entiende colectivamente, sin insinuar salvación automática independiente de la respuesta al mensaje.'
  alternative_spanish_readings:
  - toda tu familia
  - todo tu hogar
  rationale: El texto griego habla del alcance doméstico de la promesa, pero no desarrolla aquí las condiciones narrativas completas. La versión respeta ese alcance colectivo sin cargarlo con una lectura denominacional específica.
  doctrine_reference: La traducción no debe imponer un distintivo doctrinal donde el griego no lo exige.
translation_notes:
  revision_awareness: El cotejo final reportó alta concordancia y no requirió cambios respecto del pase previo; se mantiene la solución auditada para ἐν οἷς como valor instrumental y la lectura soteriológica de σωθήσῃ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - '''Ser salvados'' conserva el valor pasivo de σωθήσῃ y evita sustituirlo por una formulación más interpretativa.'
  - '''Toda tu casa'' preserva el valor colectivo de οἶκος y sigue siendo idiomático en español bíblico contemporáneo.'
