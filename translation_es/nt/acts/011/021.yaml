revisions:
- from: Y la mano de Yahvé estaba con ellos[a], y un gran número de los que creyeron[b] se volvieron al Señor.
  to: Y la mano del Señor estaba con ellos[a], y un gran número de los que creyeron[b] se volvieron al Señor.
  rationale: Se corrige la primera ocurrencia de κύριος a «Señor» para ajustarse a la fuente griega inmediata y a la decisión teológica auditada de conservar «Señor» en ambas instancias. Se mantiene el resto de la redacción porque comunica bien el sentido del versículo. La nota [a] se rehace para apoyar la traducción principal aprobada y explicar el idiomismo sin introducir «Yahvé» como lectura principal en este contexto. La nota [a] queda formalmente igual al texto principal porque el expediente inglés ofrece la alternativa posesiva en inglés; en español esa alternancia no produce una diferencia real de forma, así que la nota es de utilidad limitada, pero se conserva la explicación del modismo. No se requiere adjudicación adicional.
