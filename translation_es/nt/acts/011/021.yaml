review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: el idiomismo χεὶρ κυρίου, μετ’ αὐτῶν, πολύς τε ἀριθμός, y el sentido de ἐπέστρεψεν ἐπὶ τὸν κύριον. Sin embargo, no preserva la decisión auditada clave de mantener κύριος como «Señor» en ambas ocurrencias sin expansión interpretativa. Cambiar la primera ocurrencia a «Yahvé» introduce una distinción referencial no marcada por el texto griego ni por el rastro teológico inglés.'
  spanish_quality_summary: El español es claro y natural. No obstante, «de los que creyeron» después de «un gran número» suena algo menos directo que «que creyó» o «que creyó/creyeron». En español estándar y eclesial, «un gran número que creyó» resulta algo rígido por la concordancia colectiva; «un gran número de los que creyeron» es aceptable, pero la formulación más natural aquí es «un gran número creyó y se volvió al Señor» o «un gran número, al creer, se volvió al Señor». Aun así, para mantenerse cerca del POB inglés y del participio, «un gran número que creyó se volvió al Señor» también es posible aunque menos idiomático. La reparación necesaria principal es terminológica, no estilística.
  glossary_alignment: 'Desalineación importante con la política contextual: aunque el proyecto prefiere «Yahvé» para יהוה/YHWH, aquí la fuente inmediata es griega κύριος y el expediente inglés documenta explícitamente conservar «Lord» en ambas instancias por apertura teológica. Por tanto, el borrador no sigue la justificación léxica/teológica auditada al usar «Yahvé» en la primera ocurrencia. El resto del léxico principal está bien encaminado.'
