  - severity: medium
    issue: La nota [a] explica «Yahvé» y ofrece «la mano del Señor» como alternativa, invirtiendo la prioridad del expediente inglés.
    rationale: La nota debe apoyar la traducción principal auditada («la mano del Señor») y ofrecer la alternativa posesiva, además de explicar el modismo, no justificar un cambio no respaldado por el rastro de auditoría.
  - severity: low
