translation:
  language: es
  text: Y la mano del Señor estaba con ellos[a], y un gran número de los que creyeron[b] se volvieron al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mano del Señor»; la expresión es un modismo bíblico para el poder o favor activo del Señor.
    reason: lexical_alternative
  - marker: b
    text: O «habiendo creído».
    reason: lexical_alternative
lexical_decisions:
- source_word: χεὶρ κυρίου
  english_pob_choice: the hand of the Lord
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano del Señor
  - el poder de Yahvé
  - la mano del Señor
  lexicon: BDAG
  rationale: Conservo la metáfora corporal de χείρ para mantener el sentido idiomático bíblico de acción/poder/favor divinos. En este proyecto, κύριος que corresponde al nombre divino se vierte normalmente como Yahvé, por lo que «la mano de Yahvé» comunica mejor la referencia de fondo que «el Señor» y evita ocultar el nombre divino.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: estaba con ellos
  alternatives_spanish:
  - estaba entre ellos
  - los acompañaba
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa presencia acompañante. «Estaba con ellos» es natural en español y preserva la idea de apoyo/presencia activa sin añadir matices no explícitos.
- source_word: πολύς τε ἀριθμός
  english_pob_choice: a great number
  chosen_spanish: un gran número
  alternatives_spanish:
  - una gran cantidad
  - muchos
  lexicon: BDAG
  rationale: La construcción nominal se refleja bien con «un gran número», que suena natural en español y conserva el valor cuantitativo de la frase sin convertirla en un simple adjetivo.
- source_word: ὁ πιστεύσας
  english_pob_choice: who believed
  chosen_spanish: de los que creyeron
  alternatives_spanish:
  - que creyeron
  - habiendo creído
  - los que creyeron
  lexicon: BDAG
  rationale: El participio aoristo articular funciona de manera colectiva con «un gran número». En español, «de los que creyeron» expresa con claridad ese grupo de creyentes sin volver la frase pesada ni perder el sentido de identificación colectiva. La alternativa «habiendo creído» conserva más literalmente la forma verbal, pero es menos natural aquí.
- source_word: ἐπέστρεψεν ἐπὶ τὸν κύριον
  english_pob_choice: turned to the Lord
  chosen_spanish: se volvieron al Señor
  alternatives_spanish:
  - se volvieron a Yahvé
  - volvieron al Señor
  - se convirtieron al Señor
  lexicon: BDAG
  rationale: ἐπιστρέφω con ἐπί puede denotar giro/conversión hacia el Señor. «Se volvieron al Señor» conserva esa idea de conversión sin añadir explícitamente «arrepentimiento» ni restringir el matiz a un retorno de estado previo. Mantengo «Señor» aquí porque el giro final formula la relación de respuesta al κύριος como título referencial; el nombre divino ya queda preservado en la primera mitad de la versículo.
theological_decisions:
- issue: Valor de κύριος en dos ocurrencias dentro del versículo
  english_pob_reading: Render κύριος simply as 'Lord' in both instances without specifying 'Jesus' in the translation.
  chosen_spanish_reading: Vierto la primera ocurrencia con Yahvé por el valor del sintagma fijo «mano de Yahvé», y la segunda como «el Señor» sin explicitar «Jesús».
  alternative_spanish_readings:
  - «la mano del Señor» / «se volvieron al Señor»
  - «la mano de Yahvé» / «se volvieron a Yahvé»
  - «la mano de Yahvé» / «se volvieron a Jesús»
  rationale: La primera cláusula reproduce un idiomismo bíblico que, en el marco de la norma del proyecto, apunta al nombre divino y conviene transparentarlo como Yahvé. La segunda cláusula mantiene la ambigüedad respetuosa del griego, porque el texto solo dice κύριον y no obliga a especificar explícitamente Jesús; «el Señor» preserva esa apertura teológica.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
translation_notes:
  revision_awareness: El contexto inglés POB y la revisión más reciente coinciden en mantener la metáfora de «la mano del Señor» y en traducir ἐπέστρεψεν ἐπὶ τὸν κύριον como «turned to the Lord». En español, se ajusta la primera mitad a la norma del proyecto para hacer explícito Yahvé, y se conserva la lectura conversional sin sobreinterpretar el segundo miembro.
  spanish_consistency_notes:
  - Se mantiene el tono bíblico sobrio y no paraprástico.
  - «Yahvé» se usa para el nombre divino según la norma del proyecto; «Señor» se reserva para la segunda referencia por fidelidad al texto y a la ambigüedad del griego.
  - La estructura «un gran número de los que creyeron» evita forzar una subordinación extraña en español y refleja el grupo colectivo del participio articular.
  - No se añade «arrepentimiento» porque el griego aquí habla de volverse/dirigirse al Señor, no lo especifica léxicamente.
