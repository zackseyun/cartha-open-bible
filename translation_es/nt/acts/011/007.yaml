translation:
  language: es
  text: 'Y oí también una voz que me decía: «Levántate, Pedro; mata[a] y come».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrifica». El verbo griego θῦσον puede significar «sacrificar» en ciertos contextos, pero aquí se refiere a matar animales para alimento dentro de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: El aoristo indica una acción completa en narración; «oí» es la equivalencia natural y directa en español para reportar la percepción auditiva.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como enlace suave; «Y» conserva la continuidad narrativa sin introducir contraste más fuerte del que exige el griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: En esta posición, καί añade un elemento adicional a la experiencia de Pedro; «también» expresa de forma idiomática esa fuerza aditiva.
- source_word: φωνῆς
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: BDAG
  rationale: Con λεγούσης, el sentido personal de φωνή es claramente «voz», no simplemente «sonido».
- source_word: λεγούσης μοι
  english_pob_choice: saying to me
  chosen_spanish: que me decía
  alternatives_spanish:
  - hablándome
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del discurso; «que me decía» es fluido en español y conserva la relación directa con la voz.
- source_word: Ἀναστάς
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate y
  lexicon: BDAG
  rationale: El participio aoristo funciona con valor imperatival en el discurso directo. «Levántate» comunica claramente la orden en español y encaja con la secuencia de mandatos.
- source_word: Πέτρε
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro,
  lexicon: BDAG
  rationale: Vocativo del nombre propio Πέτρος; el equivalente estándar en español es «Pedro».
- source_word: θῦσον
  english_pob_choice: slaughter
  chosen_spanish: sacrifica
  alternatives_spanish:
  - mata
  - sacrifica/immola
  - sacrifica y
  lexicon: BDAG
  rationale: El verbo θύω puede significar «sacrificar» y, en contextos como este, conlleva la idea de matar animales para alimento. En español, «sacrifica» mantiene esa fuerza verbal y evita reducir demasiado el matiz potencialmente ritual del término, siguiendo la tensión documentada por la POB inglesa.
- source_word: φάγε
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - cómelo
  - ingiere
  lexicon: BDAG
  rationale: Imperativo aoristo de ἐσθίω; «come» es la equivalencia directa, natural y sobria.
theological_decisions:
- issue: Cómo renderizar θῦσον sin borrar la tensión entre «sacrificar» y «matar»
  english_pob_reading: slaughter; note that θῦσον can in some contexts mean 'sacrifice,' but here the sense is the killing of animals for food within the vision.
  chosen_spanish_reading: sacrifica
  alternative_spanish_readings:
  - mata
  - sacrifica/mata
  - sacrifica para comer
  rationale: La lectura inglesa conserva una alternativa léxica y una nota explicativa. En español, «sacrifica» preserva la posibilidad semántica de θύω sin imponer de entrada un sentido meramente profano. La frase siguiente «y come» deja claro el contexto alimentario de la visión. Si bien «mata» aclararía la acción material, «sacrifica» mantiene mejor la tensión documentada en el audit trail.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés registra una revisión desde «Get up, Peter; kill and eat» a «Rise, Peter; slaughter and eat» para un registro más formal y una mejor correspondencia con ἀναστάς, además de preferir un verbo más cercano a θῦσον. La presente versión española refleja esa misma decisión de elevar el registro con «Levántate» y conservar la tensión léxica de θῦσον mediante «sacrifica», con nota aclaratoria.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple y solemne del griego: conexión con «Y», complemento adverbial «también», voz y discurso directo.'
  - «Pedro» sigue la forma española estándar del nombre vocativo.
  - «Levántate» es más natural que un calco literal de «Rise» en español, sin perder el valor imperatival del participio aoristo.
  - Se evita «Señor» o sustituciones litúrgicas no presentes en el texto.
  - La nota al pie marca explícitamente la alternativa léxica relevante para θῦσον, preservando la tensión documentada por la POB inglesa.
