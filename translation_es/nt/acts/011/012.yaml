translation:
  language: es
  text: Y el Espíritu me dijo que fuera con ellos[a], sin hacer distinción. También vinieron conmigo estos seis hermanos, y entramos en la casa de aquel hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin vacilar» o «sin dudar». El participio griego puede expresar tanto no hacer distinción como no vacilar.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ πνεῦμά
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: En el contexto de guía revelatoria en Hechos, πνεῦμα con artículo se entiende naturalmente como el Espíritu de Dios. En español, «el Espíritu» suena natural y mantiene la sobriedad del griego sin añadir «Santo» cuando no está explícito.
- source_word: εἶπεν ... μοι
  english_pob_choice: told me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me instruyó
  lexicon: BDAG
  rationale: λέγω con dativo de persona expresa una comunicación dirigida. «Me dijo» reproduce con naturalidad la función directiva del verbo en español sin cargar el texto con explicaciones añadidas.
- source_word: συνελθεῖν αὐτοῖς
  english_pob_choice: to go with them
  chosen_spanish: que fuera con ellos
  alternatives_spanish:
  - que los acompañara
  - que me uniera a ellos
  lexicon: BDAG
  rationale: El infinitivo de συνέρχομαι aquí indica acompañamiento. «Que fuera con ellos» mantiene la idea de ir junto a otros en un español claro y fluido.
- source_word: μηδὲν διακρίναντα
  english_pob_choice: making no distinction
  chosen_spanish: sin hacer distinción
  alternatives_spanish:
  - sin vacilar
  - sin dudar
  lexicon: BDAG
  rationale: διακρίνω puede significar distinguir, vacilar o dudar. En este pasaje, el peso contextual está en la barrera judío-gentil; por eso «sin hacer distinción» conserva la fuerza social/teológica del texto. Las otras posibilidades siguen siendo reales y se preservan en la nota.
- source_word: οἱ ἓξ ἀδελφοὶ οὗτοι
  english_pob_choice: these six brothers
  chosen_spanish: estos seis hermanos
  alternatives_spanish:
  - estos seis hermanos aquí
  - estos seis creyentes
  lexicon: BDAG
  rationale: ἀδελφοί se traduce como «hermanos» en masculino plural porque el referente es un grupo de seis varones. «Estos» refleja οὗτοι de forma directa.
- source_word: εἰσήλθομεν
  english_pob_choice: we entered
  chosen_spanish: entramos
  alternatives_spanish:
  - entramos en
  - ingresamos
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa de manera natural con «entramos». En español resulta más idiomático que una forma más pesada como «ingresamos».
- source_word: τὸν οἶκον τοῦ ἀνδρός
  english_pob_choice: the man's house
  chosen_spanish: la casa del hombre
  alternatives_spanish:
  - la casa de aquel hombre
  - su casa
  lexicon: BDAG
  rationale: ἀνήρ aquí señala al varón concreto ya mencionado. «La casa del hombre» conserva el sustantivo explícito del griego y evita sustituirlo prematuramente por un posesivo.
theological_decisions:
- issue: Sentido de μηδὲν διακρίναντα
  english_pob_reading: making no distinction
  chosen_spanish_reading: sin hacer distinción
  alternative_spanish_readings:
  - sin vacilar
  - sin dudar
  rationale: El contexto inmediato trata de la entrada de Pedro en una casa gentil y de la justificación de ese acto ante creyentes judíos. Por eso conviene preservar la lectura de «distinción» para no perder la dimensión social y teológica del texto. Al mismo tiempo, el participio admite matices de vacilación o duda, así que no se eliminan de la documentación.
  doctrine_reference: Hechos 10–11; no hacer acepción de personas / cruce de la frontera judío-gentil
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones posteriores; la lectura aprobada permanece sin cambios, y la versión española sigue esa misma decisión básica con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se conserva «Espíritu» sin añadir «Santo», en paralelo con la decisión inglesa y por la misma razón contextual.
  - Se evita «Señor» o fórmulas eclesiásticas no presentes en el versículo.
  - «Sin hacer distinción» preserva la tensión lexical de διακρίνω; la nota mantiene las alternativas legítimas.
  - «La casa del hombre» sigue el sustantivo explícito del griego y no lo reduce a un posesivo genérico.
