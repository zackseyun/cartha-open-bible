revisions:
- from: 'Y le informó cómo había visto al ángel en su casa, de pie y diciendo[a]: «Envía a Jope y manda llamar a Simón, que es llamado Pedro».'
  to: 'Y nos informó cómo había visto al ángel en su casa, de pie, y diciendo[a]: «Envía a Jope y manda llamar a Simón, que es llamado Pedro».'
  rationale: Se corrige la omisión de «nos» para reflejar ἡμῖν con fidelidad. Se hace un ajuste menor de puntuación para mejorar la lectura en español sin alterar la estructura participial del original. Se afina la nota léxica para expresar con mayor claridad el matiz de μεταπέμψαι preservado en la auditoría inglesa.
