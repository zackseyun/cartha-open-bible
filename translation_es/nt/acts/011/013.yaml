translation:
  language: es
  text: 'Y nos informó cómo había visto al ángel en su casa, de pie, y diciendo[a]: «Envía a Jope y manda llamar a Simón, que es llamado Pedro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «manda traer a Simón, que es llamado Pedro». El verbo puede traducirse también «enviar por», es decir, enviar a buscar a alguien para que venga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: le informó
  alternatives_spanish:
  - le reportó
  - le contó
  lexicon: BDAG
  rationale: ἀπαγγέλλω en este contexto narra la comunicación de un testimonio o informe. «Le informó» conserva el valor de relatar hechos con claridad y es natural en español culto sin perder el matiz de reporte.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ aquí enlaza la secuencia narrativa sin fuerte contraste. «Y» transmite adecuadamente la transición discursiva en español.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con el pronombre átono «nos» en español, manteniendo la referencia comunitaria del relato.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: πῶς introduce el contenido del informe con matiz de modo o manera. «Cómo» conserva esa estructura informativa mejor que un simple «que».
- source_word: εἶδεν
  english_pob_choice: had seen
  chosen_spanish: había visto
  alternatives_spanish:
  - vio
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo, en español el pluscuamperfecto expresa bien que la visión ocurrió antes del informe. Esto sigue la relación temporal observada en el texto fuente y en la solución inglesa.
- source_word: τὸν ἄγγελον
  english_pob_choice: the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - un ángel
  - el ángel
  lexicon: BDAG
  rationale: El artículo griego señala una referencia específica ya conocida en el contexto. En español, el complemento directo personal con «al ángel» es la forma más natural y mantiene esa identificación.
- source_word: ἐν τῷ οἴκῳ αὐτοῦ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  lexicon: BDAG
  rationale: οἶκος aquí designa la vivienda como escenario de la visión. «Casa» es directo y fiel; «hogar» suavizaría demasiado el matiz espacial.
- source_word: σταθέντα
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - en pie
  lexicon: BDAG
  rationale: El participio de ἵστημι describe la postura del ángel. «De pie» es idiomático en español y preserva la imagen visual sin forzar una construcción participial pesada.
- source_word: εἰπόντα
  english_pob_choice: saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: La coordinación participial con σταθέντα se refleja mejor con «y diciendo», que conserva el flujo simultáneo de la acción verbal del ángel.
- source_word: Ἀπόστειλον
  english_pob_choice: Send
  chosen_spanish: Envía
  alternatives_spanish:
  - Manda
  - Despacha
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀποστέλλω exige una orden breve. «Envía» es directo y suficientemente neutral; mantiene el mandato sin añadir sujetos u objetos no expresados.
- source_word: εἰς Ἰόππην
  english_pob_choice: to Joppa
  chosen_spanish: a Jope
  alternatives_spanish:
  - a Joppa
  - hacia Jope
  lexicon: BDAG
  rationale: La preposición εἰς con nombre de ciudad indica destino. «A Jope» es la transliteración habitual en español bíblico y preserva la referencia geográfica.
- source_word: μετάπεμψαι
  english_pob_choice: summon
  chosen_spanish: manda llamar
  alternatives_spanish:
  - llama
  - haz venir
  lexicon: BDAG
  rationale: μεταπέμπομαι significa enviar por alguien para que venga. «Manda llamar» conserva mejor que un simple «llama» la idea de enviar a buscar a la persona, en línea con la alternativa inglesa «send for».
- source_word: Σίμωνα τὸν ἐπικαλούμενον Πέτρον
  english_pob_choice: Simon, who is called Peter
  chosen_spanish: a Simón, que es llamado Pedro
  alternatives_spanish:
  - a Simón, llamado Pedro
  - a Simón, al que llaman Pedro
  lexicon: BDAG
  rationale: El participio presente pasivo funciona de manera atributiva para identificar a Simón por su nombre conocido. «Que es llamado Pedro» reproduce con claridad esa identificación; la preposición «a» se mantiene por el régimen del verbo «mandar llamar».
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios; la versión española sigue esa lectura estable sin introducir variantes textuales ni reajustes doctrinales. Se mantuvo la secuencia narrativa y la identificación específica del ángel y de Simón Pedro tal como refleja el griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se conservó «Jope» como forma española estable de Ἰόππη.
  - «Manda llamar» se eligió para reflejar el valor de μεταπέμψαι sin introducir objetos implícitos.
  - La puntuación con dos puntos antes de la cita reproduce adecuadamente el cambio a discurso directo.
  - Se prefirió un español natural pero sobrio, sin sustituir por fórmulas eclesiásticas ajenas al griego.
