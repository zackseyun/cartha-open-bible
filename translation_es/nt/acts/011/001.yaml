translation:
  language: es
  text: Ahora los apóstoles y los hermanos que estaban por toda Judea oyeron que también los gentiles habían recibido la palabra de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede referirse de manera más amplia a los creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí introduce una noticia recibida; en español, "oyeron" comunica de forma natural ese hecho narrativo sin añadir matices ajenos al griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ marca transición narrativa más que contraste fuerte. "Ahora" funciona bien en español para abrir el nuevo desarrollo del relato.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los mensajeros
  lexicon: BDAG
  rationale: En Hechos, ἀπόστολοι designa al grupo apostólico reconocido; "apóstoles" es el equivalente directo y estable.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se conserva el plural masculino del griego, que en este contexto puede referirse representativamente a la comunidad creyente. "Hermanos" es fiel al número y al registro del original.
- source_word: οἱ ὄντες κατὰ τὴν Ἰουδαίαν
  english_pob_choice: who were throughout Judea
  chosen_spanish: que estaban por toda Judea
  alternatives_spanish:
  - que estaban en Judea
  - que estaban repartidos por Judea
  lexicon: BDAG
  rationale: κατὰ con acusativo tiene aquí un sentido distributivo; "por toda Judea" reproduce mejor esa extensión que un simple "en Judea".
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  lexicon: BDAG
  rationale: Topónimo estándar, transliterado de modo natural en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  lexicon: BDAG
  rationale: Introduce el contenido de lo oído; en español, "que" es la conjunción completiva natural.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En este contexto de Hechos, ἔθνη contrasta con los judíos y se refiere a los no judíos. "Gentiles" expresa con precisión ese valor contextual.
- source_word: ἐδέξαντο
  english_pob_choice: had received
  chosen_spanish: habían recibido
  alternatives_spanish:
  - recibieron
  - habían acogido
  - habían aceptado
  lexicon: BDAG
  rationale: δέχομαι puede significar recibir, aceptar o acoger. El giro "habían recibido" conserva la idiomatización de "recibir la palabra de Dios" y el valor anterior respecto del verbo principal.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Yahvé
  lexicon: BDAG
  rationale: La expresión bíblica estable λόγος τοῦ θεοῦ se conserva como "la palabra de Dios". En español es la forma más natural y reverente, manteniendo el valor idiomático y teológico del original.
theological_decisions:
- issue: Valor de ἀδελφοί en contexto de comunidad creyente mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: Se mantiene la forma masculina plural del griego, como en la POB inglesa. Aunque puede abarcar a toda la comunidad creyente, la forma no se expande en el texto principal para no borrar la señal lexical del original; la posible lectura inclusiva queda aclarada en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan plenamente; no hay revisiones aplicadas en la fuente inglesa más reciente. La redacción española conserva esa estabilidad sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino como forma léxica independiente; aquí aparece la expresión fija "la palabra de Dios" y se traduce literalmente.
  - Se usa "gentiles" para ἔθνη según el contexto de Hechos, donde el contraste es étnico-religioso y no meramente geopolítico.
  - Se preserva la correspondencia temporal con "habían recibido" para reflejar la anterioridad del evento oído respecto del acto de oír narrado en la cláusula principal.
