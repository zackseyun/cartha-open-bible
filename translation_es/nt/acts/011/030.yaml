translation:
  language: es
  text: Y eso hicieron[a], enviándolo a los ancianos por mano de Bernabé y Saulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de Bernabé y Saulo». La expresión griega dice literalmente «por la mano de Bernabé y Saulo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  english_pob_choice: so
  chosen_spanish: eso
  alternatives_spanish:
  - lo
  - ello
  lexicon: BDAG
  rationale: El pronombre neutro retoma la contribución de alivio del contexto anterior. En español, «eso» conserva la anáfora de forma natural tras «Y eso hicieron».
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Además
  lexicon: BDAG
  rationale: Aquí funciona como enlace narrativo con la oración anterior; «Y» mantiene el flujo simple y directo.
- source_word: ἐποίησαν
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - lo llevaron a cabo
  - cumplieron
  lexicon: BDAG
  rationale: ποιέω aquí es un verbo de sentido ligero; «hicieron» conserva la concisión del griego y combina bien con el referente implícito.
- source_word: ἀποστείλαντες
  english_pob_choice: sending
  chosen_spanish: enviándolo
  alternatives_spanish:
  - habiendo enviado
  - al enviarlo
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción concomitante o instrumental en la narración; en español, el gerundio con objeto explícito comunica bien la relación con el verbo principal.
- source_word: πρὸς τοὺς πρεσβυτέρους
  english_pob_choice: to the elders
  chosen_spanish: a los ancianos
  alternatives_spanish:
  - a los presbíteros
  lexicon: BDAG
  rationale: πρεσβύτεροι en Hechos designa líderes reconocidos de la comunidad. «Ancianos» es transparente y fiel; «presbíteros» sería más técnico y menos claro.
- source_word: διὰ χειρὸς
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: La expresión idiomática conserva la noción concreta de agencia por medio de mensajeros. «Por mano de» preserva el giro griego con naturalidad suficiente en español bíblico.
- source_word: Βαρναβᾶ καὶ Σαύλου
  english_pob_choice: Barnabas and Saul
  chosen_spanish: Bernabé y Saulo
  alternatives_spanish:
  - Barnabé y Saulo
  lexicon: BDAG
  rationale: Se siguen las formas españolas asentadas de los nombres propios. «Bernabé» es la forma habitual en español bíblico y corresponde al mismo personaje.
- source_word: objeto implícito del envío
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  lexicon: BDAG
  rationale: El griego omite el objeto porque se entiende por el contexto inmediato; en español conviene explicitarlo como pronombre átono, sin añadir contenido ajeno al verso.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés están en alto acuerdo; la única decisión relevante es cómo verter el idiomatismo διὰ χειρὸς. No se requieren revisiones textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se mantuvo «ancianos» para πρεσβυτέρους, conforme al uso comunitario de Hechos.
  - Se evitó «Cristo» o terminología doctrinal no presente en el versículo.
  - La nota al pie preserva la alternativa idiomática sin perder la literalidad subyacente.
