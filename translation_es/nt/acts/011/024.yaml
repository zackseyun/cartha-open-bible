translation:
  language: es
  text: Porque era un hombre bueno[a], lleno del Espíritu Santo y de fe. Y una multitud considerable fue añadida al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lleno del Espíritu Santo y de fidelidad». La palabra griega pistis también puede significar «fidelidad» o «confianza»; aquí el texto principal sigue la traducción por defecto «fe».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación de la afirmación anterior sobre Bernabé. En español, «Porque» comunica con naturalidad ese valor explicativo sin añadir énfasis indebido.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a Bernabé; «hombre» conserva la referencia gramatical y semántica sin neutralizarla.
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - justo
  - íntegro
  - bondadoso
  lexicon: BDAG
  rationale: «Bueno» es la equivalencia más directa y natural en español para la cualidad moral general expresada aquí.
- source_word: πλήρης
  english_pob_choice: full
  chosen_spanish: lleno
  alternatives_spanish:
  - lleno de
  - colmado
  lexicon: BDAG
  rationale: Con genitivos dependientes, «lleno de» es la construcción española natural y fiel al giro griego.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En Hechos, la expresión refiere al Espíritu divino personal, no a una disposición humana; por eso se traduce con el término cristiano estándar y con artículo definido.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La lectura principal mantiene «fe», siguiendo el valor por defecto de πίστις en el proyecto; aunque «fidelidad» es posible en este contexto caracterizador, no se impone en el texto principal.
- source_word: προσετέθη
  english_pob_choice: was added
  chosen_spanish: fue añadida
  alternatives_spanish:
  - se añadió
  - fue incorporada
  lexicon: BDAG
  rationale: La pasiva se conserva en español. El femenino concuerda con «multitud» y mantiene el giro bíblico de ser añadidos.
- source_word: ὄχλος ἱκανός
  english_pob_choice: a considerable crowd
  chosen_spanish: una multitud considerable
  alternatives_spanish:
  - una gran multitud
  - una multitud numerosa
  lexicon: BDAG
  rationale: «ὄχλος» se expresa bien como «multitud»; «ἱκανός» aquí señala cantidad notable, y «considerable» reproduce esa idea sin sobrerrepresentarla.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Maestro
  lexicon: BDAG
  rationale: Se mantiene el referente titulado como «Señor», que en el contexto de Hechos remite a Cristo; «al» refleja correctamente el dativo de incorporación/adición.
theological_decisions:
- issue: Sentido de πνεύματος ἁγίου
  english_pob_reading: Reference to the Holy Spirit as the divine person
  chosen_spanish_reading: Referencia al Espíritu Santo como persona divina
  alternative_spanish_readings:
  - Espíritu santo como cualidad moral
  - espíritu santo en sentido indefinido
  rationale: En Hechos, la expresión apunta de forma ordinaria al Espíritu Santo personal. Traducirla como mera cualidad interior debilitaría el sentido pneumatológico del pasaje.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Nuancia de πίστεως en la caracterización de Bernabé
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se preserva la opción principal del POB inglés. Aunque el contexto permite una lectura de fidelidad, el texto principal no debe resolver de manera cerrada una tensión léxica legítima.
  doctrine_reference: 'Contested terms: πίστις'
- issue: Objeto de προσετέθη ... τῷ κυρίῳ
  english_pob_reading: people were added to the Lord
  chosen_spanish_reading: una multitud fue añadida al Señor
  alternative_spanish_readings:
  - una multitud fue añadida a la iglesia
  - una multitud se unió al Señor
  rationale: El griego dice explícitamente «al Señor»; no conviene sustituirlo por «a la iglesia» ni expandirlo interpretativamente. La formulación española conserva esa relación directa.
  doctrine_reference: 'Translation philosophy #1, #3'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; el borrador español sigue de cerca el texto griego y conserva las mismas tensiones léxicas documentadas, especialmente πίστις y el dativo τῷ κυρίῳ.
  spanish_consistency_notes:
  - Se usó «Espíritu Santo» con artículo, coherente con la referencia personal divina en Hechos.
  - Se mantuvo «fe» en el texto principal y se preservó la alternativa «fidelidad» en nota, sin resolver artificialmente la ambigüedad.
  - Se tradujo ὄχλος ἱκανός como «una multitud considerable»/«una multitud considerable» en una forma natural para el español bíblico contemporáneo.
  - Se conservó «al Señor» en lugar de explicar el objeto como «a la iglesia», respetando el griego.
  - La puntuación y el orden resultan publicables en español sin desplazar el sentido del original.
