translation:
  language: es
  text: Ahora José[a], a quien los apóstoles llamaron Bernabé —que traducido significa hijo de aliento—, levita, natural de Chipre,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijo de exhortación', 'hijo de consolación' o 'hijo de consuelo'. El término griego puede abarcar exhortación, aliento o consuelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joséf
  - Joseph
  lexicon: nombre propio bíblico
  rationale: El nombre personal se adapta a la forma española estándar José, que es la forma bíblica y eclesial más natural en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δὲ funciona como transición discursiva suave; ‘Ahora’ mantiene el flujo narrativo sin introducir contraste fuerte.
- source_word: ἐπικληθεὶς
  english_pob_choice: was called
  chosen_spanish: llamaron
  alternatives_spanish:
  - fue llamado
  - recibió el nombre de
  lexicon: BDAG
  rationale: El participio pasivo con ἀπὸ τῶν ἀποστόλων expresa que los apóstoles le dieron ese nombre; en español, ‘lo llamaron’ comunica con naturalidad la acción de nombrar.
- source_word: Βαρναβᾶς
  english_pob_choice: Barnabas
  chosen_spanish: Bernabé
  alternatives_spanish:
  - Barnabás
  - Barnabas
  lexicon: nombre propio bíblico
  rationale: La forma española tradicional y reconocible es Bernabé, que preserva la identificación del personaje en lectura pública.
- source_word: ἀπὸ τῶν ἀποστόλων
  english_pob_choice: by the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - por los apóstoles
  - de parte de los apóstoles
  lexicon: BDAG
  rationale: ἀπό con personas aquí indica el origen de la designación; en español, el sujeto agente con ‘llamaron’ evita una traducción rígida y conserva el sentido fuente/origen.
- source_word: ὅ ἐστιν μεθερμηνευόμενον
  english_pob_choice: which translated means
  chosen_spanish: que traducido significa
  alternatives_spanish:
  - que interpretado significa
  - que en traducción quiere decir
  lexicon: BDAG
  rationale: La glosa explicativa se mantiene de forma directa y natural; ‘traducido significa’ conserva el valor aclaratorio del original para el lector.
- source_word: υἱὸς παρακλήσεως
  english_pob_choice: son of encouragement
  chosen_spanish: hijo de consolación
  alternatives_spanish:
  - hijo de exhortación
  - hijo de aliento
  - hijo de consuelo
  lexicon: BDAG
  rationale: παράκλησις tiene un campo semántico amplio. ‘Consolación’ es una opción legítima y tradicional en español bíblico; se preserva la tensión lexical mediante alternativas, sin cerrar indebidamente el sentido a un solo matiz.
- source_word: Λευίτης
  english_pob_choice: a Levite
  chosen_spanish: levita
  alternatives_spanish:
  - un levita
  lexicon: BDAG
  rationale: El sustantivo de identidad tribal/religiosa se expresa con el nombre común español ‘levita’, que es claro y fiel al dato del texto.
- source_word: Κύπριος τῷ γένει
  english_pob_choice: a native of Cyprus
  chosen_spanish: natural de Chipre
  alternatives_spanish:
  - chipriota por nacimiento
  - de Chipre por origen
  lexicon: BDAG
  rationale: τῷ γένει señala origen o procedencia. ‘Natural de Chipre’ comunica de modo natural el dato genealógico/geográfico sin perder el matiz de procedencia.
theological_decisions:
- issue: Sentido de παράκλησις en el nombre explicativo Bernabé
  english_pob_reading: Rendered broadly as 'encouragement' in the main text, with alternatives preserved in a footnote
  chosen_spanish_reading: hijo de consolación, con alternativas semánticas preservadas
  alternative_spanish_readings:
  - hijo de exhortación
  - hijo de consuelo
  - hijo de aliento
  rationale: El texto no obliga a reducir παράκλησις a un solo matiz. En español, ‘consolación’ es una opción bíblica comprensible, pero se documenta el rango semántico para no borrar la tensión entre exhortar, animar y consolar.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre el apelativo dado por los apóstoles y el nombre propio de José
  english_pob_reading: ‘who was called Barnabas by the apostles’
  chosen_spanish_reading: ‘a quien los apóstoles llamaron Bernabé’
  alternative_spanish_readings:
  - a quien los apóstoles dieron el nombre de Bernabé
  - quien fue llamado Bernabé por los apóstoles
  rationale: La forma activa en español refleja bien el hecho histórico de que el apelativo procede de los apóstoles, sin agregar una nota interpretativa innecesaria.
  doctrine_reference: Acts 4:36 source syntax and narrative attribution
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la auditoría inglesa, incorporando la revisión que eliminó cualquier matiz no expresado explícitamente en el original (como un ‘también’ no presente). Se mantiene el valor explicativo de la glosa y el rango semántico de παράκλησις sin resolverlo de manera estrecha.
  spanish_consistency_notes:
  - Se usó ‘Bernabé’ por ser la forma bíblica española más establecida, equivalente funcional de Barnabas.
  - Se eligió ‘consolación’ en el cuerpo principal por claridad y tradición bíblica en español, pero la nota conserva la amplitud semántica requerida.
  - ‘Natural de Chipre’ conserva el dato de procedencia expresado por τῷ γένει.
  - No se añadió ningún equivalente de ‘también’, en coherencia con la revisión inglesa auditada.
