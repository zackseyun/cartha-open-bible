translation:
  language: es
  text: Mientras hablaban al pueblo, se les acercaron[a] los sacerdotes, el capitán del templo[b] y los saduceos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'llegaron hasta ellos' o 'se les presentaron'. El verbo griego puede indicar llegada súbita o acercamiento; el contexto sugiere una interrupción oficial.
    reason: lexical_alternative
  - marker: b
    text: El 'capitán del templo' era el funcionario encargado del orden y la seguridad en el recinto del templo.
    reason: cultural_note
lexical_decisions:
- source_word: Λαλούντων δὲ αὐτῶν
  english_pob_choice: Now while they were speaking
  chosen_spanish: Mientras hablaban
  alternatives_spanish:
  - Y mientras hablaban
  - Mientras estaban hablando
  lexicon: SBLGNT + BDAG (via English audit)
  rationale: El participio genitivo absoluto funciona naturalmente en español como una subordinada temporal introducida por 'mientras'. Se omite 'now' como marcador explícito porque en español ya queda bien señalado el avance narrativo con la secuencia de la oración.
- source_word: πρὸς τὸν λαὸν
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  lexicon: BDAG (via English audit)
  rationale: λαός puede ser 'pueblo' o 'gente'; aquí, en el contexto del templo, 'pueblo' preserva el valor colectivo y suena natural en español bíblico sin volverlo más específico de lo que exige el griego.
- source_word: ἐπέστησαν αὐτοῖς
  english_pob_choice: came upon them
  chosen_spanish: se les presentaron
  alternatives_spanish:
  - vinieron sobre ellos
  - se acercaron a ellos
  - los interrumpieron
  lexicon: BDAG (via English audit)
  rationale: El verbo admite la idea de llegada súbita o de acercamiento. En español, 'se les presentaron' comunica irrupción/inmediación sin añadir una hostilidad más fuerte que la que el verbo exige por sí mismo.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los principales sacerdotes
  lexicon: BDAG (via English audit)
  rationale: ἱερεῖς es 'sacerdotes'; no se debe subir a 'principales sacerdotes' porque el griego no usa ἀρχιερεῖς.
- source_word: ὁ στρατηγὸς τοῦ ἱεροῦ
  english_pob_choice: the captain of the temple
  chosen_spanish: el capitán del templo
  alternatives_spanish:
  - el comandante del templo
  - el capitán de la guardia del templo
  lexicon: BDAG (via English audit)
  rationale: '''Capitán del templo'' reproduce bien el cargo y mantiene la formulación reconocible en español. ''Comandante'' explica más el matiz militar, pero ''capitán'' conserva mejor la equivalencia tradicional del oficio.'
- source_word: οἱ Σαδδουκαῖοι
  english_pob_choice: the Sadducees
  chosen_spanish: los saduceos
  alternatives_spanish:
  - los saduceos
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre de la secta/grupo como 'saduceos', forma estable en español y equivalente al inglés auditado.
theological_decisions:
- issue: Matiz de oposición en la llegada de las autoridades
  english_pob_reading: Render ἐπέστησαν neutrally as 'came upon them' rather than more interpretive 'confronted them.'
  chosen_spanish_reading: Traducir neutralmente como 'se les presentaron' en vez de 'los confrontaron'.
  alternative_spanish_readings:
  - los confrontaron
  - se acercaron a ellos
  - irrumpieron sobre ellos
  rationale: El contexto posterior muestra oposición, pero este versículo en sí narra la llegada de las autoridades. 'Se les presentaron' mantiene la tensión narrativa sin decidir de antemano un tono más agresivo que el del verbo griego.
  doctrine_reference: Preservar la tensión narrativa sin sobreinterpretar el grado de hostilidad.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en su lectura de ἐπέστησαν como llegada súbita/interrupción oficial, de κληρ? No aplica. No se identifican revisiones posteriores; el control cruzado reporta alta concordancia y ningún cambio necesario.
  spanish_consistency_notes:
  - Se mantiene 'saduceos' como transliteración estable.
  - Se evita 'SEÑOR' u այլ masking porque el versículo no contiene el nombre divino.
  - '''Sacerdotes'' se conserva sin elevarlo a ''principales sacerdotes'', conforme al griego.'
  - '''Capitán del templo'' se entiende como cargo, no como rango militar moderno.'
