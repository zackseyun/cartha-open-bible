translation:
  language: es
  text: Pues el hombre en quien había ocurrido esta señal de curación tenía más de cuarenta años de edad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta señal sanadora» o «este milagro de curación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτῶν ... πλειόνων τεσσεράκοντα
  english_pob_choice: more than forty years old
  chosen_spanish: más de cuarenta años
  alternatives_spanish:
  - mayor de cuarenta años
  - de más de cuarenta años
  lexicon: BDAG
  rationale: La construcción genitiva con comparativo y número expresa edad de manera idiomática. En español, «más de cuarenta años» comunica la misma idea con naturalidad y sin añadir matices innecesarios.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - En efecto
  lexicon: BDAG
  rationale: γάρ introduce explicación o apoyo discursivo. «Pues» conserva esa conexión de manera natural en español bíblico moderno, sin volverla causal de forma demasiado fuerte.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: BDAG
  rationale: Aquí ἄνθρωπος designa al individuo concreto ya identificado en el contexto. «El hombre» es fiel y más directo que una generalización como «la persona».
- source_word: ἐφ’ ὃν
  english_pob_choice: on whom
  chosen_spanish: sobre quien
  alternatives_spanish:
  - en quien
  - para quien
  lexicon: BDAG
  rationale: La preposición con relativo marca la persona relacionada con el acontecimiento. «Sobre quien» mantiene la relación preposicional de forma formal y comprensible en español.
- source_word: γεγόνει
  english_pob_choice: had happened
  chosen_spanish: había acontecido
  alternatives_spanish:
  - había ocurrido
  - había sucedido
  lexicon: BDAG
  rationale: El pluscuamperfecto de γίνομαι señala un hecho ya completado antes del punto narrativo. «Había acontecido» conserva el carácter eventivo sin introducir una agentividad que el verbo griego no explicita.
- source_word: τὸ σημεῖον τοῦτο
  english_pob_choice: this sign
  chosen_spanish: esta señal
  alternatives_spanish:
  - este signo
  - este milagro
  lexicon: BDAG
  rationale: En Lucas-Hechos, σημεῖον resalta el valor indicativo y testimonial del hecho. «Señal» funciona bien en español para mantener ese matiz; «milagro» sería más interpretativo. Se evita «signo» por posible dureza o tecnicismo en español eclesial.
- source_word: τῆς ἰάσεως
  english_pob_choice: of healing
  chosen_spanish: de sanidad
  alternatives_spanish:
  - de curación
  - de sanación
  lexicon: BDAG
  rationale: ἴασις puede referirse a curación/sanidad. «Sanidad» es una opción bíblica clara y natural en español; mantiene el campo semántico de la restauración física sin reducirlo a un tecnicismo médico.
theological_decisions:
- issue: Valor de σημεῖον en un contexto de milagro
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - milagro
  - signo
  rationale: La decisión preserva el énfasis lucano en el carácter revelador y acreditador del hecho, no solo su carácter maravilloso. «Señal» permite sostener ese matiz sin desplazar el sentido hacia una simple maravilla.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implicación de agencia en γεγόνει
  english_pob_reading: had happened
  chosen_spanish_reading: había acontecido
  alternative_spanish_readings:
  - había sido hecho
  - había sido realizado
  rationale: El griego usa γίνομαι, no un pasivo explícito de «hacer». «Había acontecido» respeta el foco en el evento y evita atribuir una formulación de agencia que el versículo no expresa de manera directa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y el griego SBLGNT, manteniendo el orden informativo del versículo, el pluscuamperfecto eventivo y la tensión semántica de σημεῖον. Se ha ajustado la elección de «señal» y «sanidad» para una lectura eclesial natural en español sin perder la precisión exegética.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no lo requiere.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se usa «señal» para σημεῖον y no se sustituye por «milagro» en el texto principal, preservando la distinción lucana.
  - «Sanidad» traduce ἴασις en un registro bíblico natural; se documenta la alternativa «sanación» como posible variante española.
