source:
  edition: SBLGNT
  text: γνωστὸν ἔστω πᾶσιν ὑμῖν καὶ παντὶ τῷ λαῷ Ἰσραὴλ ὅτι ἐν τῷ ὀνόματι Ἰησοῦ Χριστοῦ τοῦ Ναζωραίου, ὃν ὑμεῖς ἐσταυρώσατε, ὃν ὁ θεὸς ἤγειρεν ἐκ νεκρῶν, ἐν τούτῳ οὗτος παρέστηκεν ἐνώπιον ὑμῶν ὑγιής.
base_translation:
  language: en
  yaml_path: translation/nt/acts/004/010.yaml
  text: let it be known to all of you and to all the people of Israel that in the name of Jesus Messiah the Nazarene[a], whom you crucified[c][b], whom God raised from the dead—by this name this man stands before you healthy.
  footnotes:
  - marker: a
    text: Or "Jesus Christ of Nazareth." The Greek title Χριστός can be rendered "Messiah" or, in more name-like usage, "Christ."
    reason: alternative_reading
  - marker: b
    text: Or "by this name." The phrase ἐν τούτῳ may refer instrumentally to Jesus himself or more specifically to his name just mentioned.
    reason: lexical_alternative
  - marker: c
    text: Or "whole" or "well." The Greek ὑγιής denotes soundness or restored health.
    reason: lexical_alternative
