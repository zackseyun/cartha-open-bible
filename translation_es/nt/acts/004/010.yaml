    changes_summary: 'Changed ''by the name'' to ''in the name'' for closer alignment with ἐν τῷ ὀνόματι; changed ''Jesus the Messiah of Nazareth'' to ''Jesus Christ the Nazarene'' to reflect Ἰησοῦ Χριστοῦ τοῦ Ναζωραίου more directly and maintain formal register; changed ''by him'' to ''by this name'' to reflect ἐν τούτῳ more explicitly. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Hágaseles saber a todos ustedes y a todo el pueblo de Israel que, en el nombre de Jesús Mesías[a], el Nazareno, a quien ustedes crucificaron, a quien Dios resucitó de entre los muertos, por este nombre[b] este hombre está ante ustedes sano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «Jesús Cristo» o «Jesús el Cristo». Χριστός aquí funciona como título mesiánico, por eso se traduce «Mesías» en vez de dejarlo como un apellido fijo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «por este» o «en él». La frase griega ἐν τούτῳ puede referirse instrumentalmente al nombre recién mencionado o, menos probablemente, a Jesús mismo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «bien» o «restaurado». ὑγιής describe salud o integridad recuperada; «sano» es la opción más directa en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ἔστω
  english_pob_choice: let it be known
  chosen_spanish: Hágaseles saber
  alternatives_spanish:
  - Que se sepa
  - Sea dado a conocer
  lexicon: BDAG
  rationale: Expresa la misma proclamación pública e impersonal en un español natural y solemne, manteniendo el valor declarativo del imperativo pasivo/impersonal.
- source_word: πᾶσιν ὑμῖν καὶ παντὶ τῷ λαῷ Ἰσραήλ
  english_pob_choice: to all of you and to all the people of Israel
  chosen_spanish: a todos ustedes y a todo el pueblo de Israel
  alternatives_spanish:
  - a ustedes todos y a todo el pueblo de Israel
  - a todos vosotros y a todo el pueblo de Israel
  lexicon: BDAG
  rationale: 'Conserva la doble audiencia: los oyentes inmediatos y el pueblo de Israel en conjunto. ''Ustedes'' es el pronombre neutral y claro para español latinoamericano.'
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - por la autoridad de
  lexicon: BDAG
  rationale: El español idiomático y fiel al griego es 'en el nombre de'; aquí no se fuerza una paráfrasis como 'por la autoridad de' porque el texto mantiene la fórmula nominal ligada a la acción sanadora.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como 'Mesías' conforme a la política del proyecto para preservar el valor titular mesiánico. 'Jesús Mesías' mantiene la tensión entre nombre y título sin volverlo un apellido fijo.
- source_word: τοῦ Ναζωραίου
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - de Nazaret
  - el de Nazaret
  lexicon: BDAG
  rationale: El gentilicio/título da identidad de origen y reconocimiento público. 'El Nazareno' es la forma más natural y fiel al valor titular del griego en un contexto proclamativo.
- source_word: ὃν ὑμεῖς ἐσταυρώσατε
  english_pob_choice: whom you crucified
  chosen_spanish: a quien ustedes crucificaron
  alternatives_spanish:
  - a quien vosotros crucificasteis
  - al que ustedes crucificaron
  lexicon: BDAG
  rationale: Mantiene la acusación directa y el objeto personal del verbo, con un español claro y formal.
- source_word: ὃν ὁ θεὸς ἤγειρεν ἐκ νεκρῶν
  english_pob_choice: whom God raised from the dead
  chosen_spanish: a quien Dios resucitó de entre los muertos
  alternatives_spanish:
  - a quien Dios levantó de entre los muertos
  - a quien Dios despertó de entre los muertos
  lexicon: BDAG
  rationale: '''Resucitó'' comunica de manera natural la acción divina de la resurrección sin perder la agencia de Dios ni la referencia a los muertos como ámbito del que salió.'
- source_word: ἐν τούτῳ
  english_pob_choice: by this name
  chosen_spanish: en este[b]
  alternatives_spanish:
  - por este
  - en él
  lexicon: BDAG
  rationale: Se preserva la posibilidad de referencia instrumental al nombre recién mencionado, pero en español la expresión requiere una leve adaptación. La nota aclara que el demostrativo puede referirse al nombre o, menos probablemente, a Jesús mismo.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: éste hombre
  alternatives_spanish:
  - este hombre
  - este
  lexicon: BDAG
  rationale: 'El demostrativo apunta al hombre sanado que está presente ante ellos; en español se explicita ''hombre'' para claridad referencial. Se prefiere la forma sin tilde en el flujo editorial normal: ''este hombre''.'
- source_word: παρέστηκεν ἐνώπιον ὑμῶν
  english_pob_choice: stands before you
  chosen_spanish: se presenta ante ustedes
  alternatives_spanish:
  - está de pie ante ustedes
  - permanece ante ustedes
  lexicon: BDAG
  rationale: El perfecto expresa un estado presente visible. 'Se presenta ante ustedes' comunica esa presencia actual sin sonar rígido ni perder la dimensión forense del escenario.
- source_word: ὑγιής
  english_pob_choice: healthy
  chosen_spanish: sano
  alternatives_spanish:
  - sano y salvo
  - completo
  - bien
  lexicon: BDAG
  rationale: '''Sano'' expresa restauración física de forma directa y sobria. Se evita ''salvo'' porque en español podría sonar más espiritual que médico; ''sano'' conserva la fuerza lexical del término.'
theological_decisions:
- issue: Título Χριστός como Mesías y no como apellido fijo
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: El contexto es proclamación pública ante Israel, por lo que el título mesiánico sigue activo. Traducirlo como 'Mesías' preserva el sentido teológico y evita fijarlo como nombre propio sin perder la identificación de Jesús.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve contested terms and documented theological force'
- issue: Resurrección como acción divina explícita
  english_pob_reading: whom God raised from the dead
  chosen_spanish_reading: a quien Dios resucitó de entre los muertos
  alternative_spanish_readings:
  - a quien Dios levantó de entre los muertos
  - a quien Dios hizo levantar de entre los muertos
  rationale: La formulación mantiene la agencia divina explícita y la referencia corporal/histórica a la resurrección, sin añadir explicación doctrinal extra.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Referente de ἐν τούτῳ
  english_pob_reading: by this name
  chosen_spanish_reading: en este[b]
  alternative_spanish_readings:
  - por este
  - en él
  rationale: El griego permite que el demostrativo apunte al nombre mencionado o, menos directamente, a Jesús mismo. La traducción conserva la ambigüedad con una nota, en lugar de resolverla demasiado pronto.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tension where the source is ambiguous'
translation_notes:
  revision_awareness: El borrador sigue el último estado revisado del audit trail en cuanto a la mención explícita del nombre/título de Jesús, pero corrige para español la formulación de ἐν τούτῳ con una nota de ambigüedad en vez de fijarla de forma excesiva. También conserva la elección doctrinal de 'Mesías' para Χριστός y la traducción titulada de 'el Nazareno'.
  spanish_consistency_notes:
  - Se usa 'ustedes' como forma neutral y de lectura eclesial amplia para el plural de segunda persona.
  - '''Yahvé'' no aparece en este versículo; no se requiere ajuste de nomenclatura divina.'
  - Se evita 'Cristo' como sustituto automático de Χριστός para no perder la carga titular mesiánica documentada.
  - La puntuación con comas reproduce la estructura acusativa y proclamativa del griego, con una nota donde el español necesita resolver una ambigüedad del demostrativo.
