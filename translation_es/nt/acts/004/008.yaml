translation:
  language: es
  text: 'Entonces Pedro, lleno del Espíritu Santo, les dijo: «gobernantes[a] del pueblo y ancianos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gobernantes» traduce el vocativo de autoridad de ἄρχοντες y conserva su tono oficial; «líderes» sería más amplio y menos preciso.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Marcador temporal y discursivo que introduce la acción siguiente en secuencia; «Entonces» conserva la fluidez narrativa natural del español sin añadir matiz extra.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Nombre propio transliterado/adaptado al uso estándar en español bíblico. «Pedro» es la forma estable y transparente para el lector hispanohablante.
- source_word: πλησθεὶς
  english_pob_choice: filled
  chosen_spanish: lleno
  alternatives_spanish:
  - habiendo sido lleno
  - colmado
  lexicon: BDAG
  rationale: El participio pasivo aoristo de πίμπλημι expresa que Pedro está en un estado producido por una acción previa. En español, «lleno» reproduce de forma natural ese estado resultante sin forzar una perífrasis pesada.
- source_word: πνεύματος ἁγίου
  english_pob_choice: with the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - con el Espíritu Santo
  lexicon: BDAG
  rationale: Aunque el inglés POB vierte la construcción como «filled with», en español la combinación «lleno del Espíritu Santo» es idiomática y fiel al contenido. «Espíritu Santo» mantiene la referencia personal y divina del referente en Hechos.
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: Fórmula narrativa simple y directa. «Les dijo» es más natural que una calca de «dijo a ellos» y conserva el valor de habla dirigida.
- source_word: Ἄρχοντες
  english_pob_choice: Rulers
  chosen_spanish: Gobernantes
  alternatives_spanish:
  - Ruleres
  - Autoridades
  lexicon: BDAG
  rationale: Vocativo plural para quienes ejercen autoridad. «Gobernantes» preserva el tono oficial y judicial mejor que «líderes», que sería demasiado general.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de la nación
  lexicon: BDAG
  rationale: «Pueblo» reproduce con naturalidad λαός en un contexto cívico-religioso y, en español, puede abarcar al pueblo como colectivo de identidad común.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - viejos
  lexicon: BDAG
  rationale: En este contexto de autoridad, el término puede ser tanto un título institucional como una designación de edad/estatus. Se elige «ancianos» para mantener el paralelo formal con la vocación plural del vocativo y dejar abierta la tensión de sentido; «presbíteros» sería más técnico y eclesial de lo que exige el griego aquí.
theological_decisions:
- issue: πνεύματος ἁγίου como agente personal divino
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu santo
  - el santo espíritu
  rationale: En Hechos, la expresión se refiere al Espíritu Santo como persona divina que capacita la palabra de Pedro. La mayúscula en español expresa ese referente sin añadir contenido ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el análisis inglés POB y no requiere revisión textual adicional; la principal decisión en español es resolver de forma idiomática la construcción participial y el vocativo de autoridad sin perder el matiz institucional.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas para el referente personal y divino.
  - Se evita «Señor» u otros términos no presentes en el verso.
  - «Ancianos» conserva la ambigüedad contextual de πρεσβύτεροι sin tecnicismo eclesial innecesario.
