translation:
  language: es
  text: Pero, después de amenazarlos[a] aún más, los dejaron ir, sin encontrar cómo castigarlos, a causa del pueblo, porque todos estaban glorificando a Dios por lo que había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de amenazarlos otra vez» o «después de añadir amenazas». El participio griego προσαπειλησάμενοι expresa una amenaza adicional o intensificada respecto de la previa.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαπειλησάμενοι
  english_pob_choice: after further threatening
  chosen_spanish: después de amenazarlos aún más
  alternatives_spanish:
  - después de amenazarlos de nuevo
  - después de añadir amenazas
  lexicon: BDAG
  rationale: El prefijo προ- en el compuesto intensifica o añade a las amenazas previas. «Aún más» comunica esa intensificación de manera natural en español sin perder el matiz de amenaza añadida.
- source_word: ἀπέλυσαν
  english_pob_choice: they released
  chosen_spanish: los soltaron
  alternatives_spanish:
  - los liberaron
  - los dejaron ir
  lexicon: BDAG
  rationale: En un contexto de custodia, ἀπολύω significa dejar ir o liberar. «Los soltaron» es natural en español y conserva la acción de ponerlos en libertad/retirarlos de custodia.
- source_word: μηδὲν εὑρίσκοντες
  english_pob_choice: finding no way
  chosen_spanish: sin encontrar manera
  alternatives_spanish:
  - sin hallar nada
  - sin encontrar base
  lexicon: BDAG
  rationale: Aunque literalmente sería «no encontrando nada», el complemento con τὸ πῶς aclara que lo que faltaba era un modo o medio para proceder. «Sin encontrar manera» refleja el giro idiomático con claridad.
- source_word: τὸ πῶς ⸀κολάσωνται αὐτούς
  english_pob_choice: to punish them
  chosen_spanish: de castigarlos
  alternatives_spanish:
  - de cómo castigarlos
  - de poder castigarlos
  lexicon: BDAG
  rationale: La construcción articular τὸ πῶς + subjuntivo expresa el modo en que podrían actuar. κολάζω aquí remite a una acción punitiva de autoridades; «castigar» es la equivalencia directa y comprensible en español.
- source_word: διὰ τὸν λαόν
  english_pob_choice: because of the people
  chosen_spanish: por causa del pueblo
  alternatives_spanish:
  - a causa del pueblo
  - por el pueblo
  lexicon: BDAG
  rationale: διά con acusativo tiene valor causal. «Por causa del pueblo» mantiene esa relación causal de manera explícita y suficientemente formal para el registro bíblico.
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el mundo
  - todo el pueblo
  lexicon: BDAG
  rationale: Aquí πάντες se refiere de forma general a la multitud/población. «Todos» conserva la universalidad del enunciado sin añadir matices ajenos.
- source_word: ἐδόξαζον τὸν θεόν
  english_pob_choice: was glorifying God
  chosen_spanish: estaban glorificando a Dios
  alternatives_spanish:
  - glorificaban a Dios
  - estaban alabando a Dios
  lexicon: BDAG
  rationale: 'δοξάζω en Lucas-Hechos conserva el lenguaje de dar gloria a Dios. El imperfecto se vierte con perífrasis progresiva para mantener la acción en curso: «estaban glorificando».'
- source_word: ἐπὶ τῷ γεγονότι
  english_pob_choice: for what had happened
  chosen_spanish: por lo que había sucedido
  alternatives_spanish:
  - a causa de lo ocurrido
  - por lo acontecido
  lexicon: BDAG
  rationale: El participio perfecto γεγονότι alude al hecho ya ocurrido con relevancia presente. «Lo que había sucedido» / «lo sucedido» expresa bien ese evento completado; aquí «por lo que había sucedido» resulta natural y causal en español.
theological_decisions:
- issue: Referencia a Dios en el contexto de glorificación pública
  english_pob_reading: everyone was glorifying God for what had happened
  chosen_spanish_reading: todos estaban glorificando a Dios por lo que había sucedido
  alternative_spanish_readings:
  - todos estaban alabando a Dios por lo que había sucedido
  - todos daban gloria a Dios por lo que había sucedido
  rationale: Se conserva «glorificando» para reflejar el valor de δοξάζω y el patrón lucano de honor dirigido a Dios, en vez de rebajarlo a una mera alabanza general.
  doctrine_reference: 'Lucas-Hechos: doxología y honor a Dios en respuesta a sus obras (cf. Hch 2:47; 3:8-9, según el marco narrativo de Hechos).'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego y el audit trail en inglés. No se detectaron revisiones posteriores en el registro inglés; por ello, la redacción española mantiene el mismo sentido sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para θεός.
  - 'Se mantiene el registro de Hechos con verbos concretos y administrativos: «soltaron», «castigar», «por causa del pueblo».'
  - Se preserva el imperfecto progresivo con «estaban glorificando» para reflejar acción en curso.
  - Se evita el calco rígido de «no encontrando nada» en favor de una construcción más natural en español que conserve el sentido del griego.
