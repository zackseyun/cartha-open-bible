revisions:
- from: Así que, después de amenazarlos[a] aún más, los soltaron, sin encontrar manera de castigarlos por causa del pueblo, porque todos estaban glorificando a Dios por lo que había sucedido.
  to: Pero, después de amenazarlos[a] aún más, los dejaron ir, sin encontrar cómo castigarlos, a causa del pueblo, porque todos estaban glorificando a Dios por lo que había sucedido.
  rationale: Se ajusta el conector para reflejar mejor δέ, se sustituye «los soltaron» por una expresión de registro más natural y digno en español bíblico, y se mejora la naturalidad de la cláusula causal sin alterar el sentido fuente. También se simplifica «sin encontrar manera de castigarlos» a «sin encontrar cómo castigarlos», que refleja bien τὸ πῶς κολάσωνται αὐτούς en español idiomático.
