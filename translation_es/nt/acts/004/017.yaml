translation:
  language: es
  text: Pero, para que no se extienda más entre el pueblo, amenacémoslos[a] para que no hablen más en este nombre a nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «advirtámosles severamente». El verbo griego significa más precisamente «amenazar» y lleva un matiz de intimidación por parte de autoridades.
    reason: lexical_alternative
lexical_decisions:
- source_word: διανεμηθῇ
  english_pob_choice: may not spread
  chosen_spanish: no se extienda
  alternatives_spanish:
  - no sea difundido
  - no se propague
  lexicon: BDAG
  rationale: El verbo griego puede sugerir difusión o expansión de un mensaje. En español, «se extienda» comunica esa idea con naturalidad y sin perder el sentido de propagación implícito en el contexto de los apóstoles y su mensaje.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: any further
  chosen_spanish: más
  alternatives_spanish:
  - más adelante
  - todavía más
  lexicon: BDAG
  rationale: La construcción indica extensión adicional. «Más» en combinación con «se extienda» conserva la fuerza comparativa de manera breve y natural; el adverbio «más» ya suple la idea de «any further».
- source_word: λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: En Hechos, λαός suele referirse al pueblo en sentido colectivo, a menudo el pueblo judío. «El pueblo» es el equivalente más directo y formal en español.
- source_word: ἀπειλησώμεθα
  english_pob_choice: let us threaten them
  chosen_spanish: amenacémosles
  alternatives_spanish:
  - intimidémoslos
  - advirtámosles con amenaza
  lexicon: BDAG
  rationale: El verbo denota amenaza, no una simple advertencia. «Amenacémosles» conserva la fuerza coercitiva del consejo y refleja mejor la intención de intimidación de la autoridad.
- source_word: μηκέτι λαλεῖν
  english_pob_choice: not to speak any longer
  chosen_spanish: que no hablen más en absoluto
  alternatives_spanish:
  - que no sigan hablando
  - que no hablen más
  lexicon: BDAG
  rationale: La combinación expresa cese continuo desde ese punto en adelante. «No hablen más en absoluto» reproduce la idea de interrupción total con un español natural.
- source_word: ἐπὶ τῷ ὀνόματι τούτῳ
  english_pob_choice: in this name
  chosen_spanish: en este nombre
  alternatives_spanish:
  - sobre este nombre
  - con este nombre
  lexicon: BDAG
  rationale: La expresión en Hechos remite a hablar bajo la autoridad o en relación con el nombre invocado. «En este nombre» sigue de cerca el valor idiomático del griego y el uso establecido en el pasaje.
- source_word: μηδενὶ ἀνθρώπων
  english_pob_choice: to anyone
  chosen_spanish: a ningún hombre
  alternatives_spanish:
  - a nadie
  - a ninguna persona
  lexicon: BDAG
  rationale: El griego usa una negación reforzada con ἀνθρώπων, literalmente «de hombres/personas». «A ningún hombre» conserva esa forma concreta y suena más cercano al original que una generalización como «a nadie».
theological_decisions:
- issue: Fuerza intimidatoria del mandato del consejo
  english_pob_reading: let us threaten them
  chosen_spanish_reading: amenacémosles
  alternative_spanish_readings:
  - advirtámosles
  - reprendámosles
  rationale: La escena es jurídica y coercitiva; el griego no describe una advertencia suave sino una amenaza de autoridad. «Amenacémosles» preserva esa tensión y evita diluir el tono del pasaje.
  doctrine_reference: Lexical accuracy in coercive speech acts; translation philosophy §5 (documented exception/variance)
- issue: Uso de «en este nombre» como fórmula de autoridad
  english_pob_reading: in this name
  chosen_spanish_reading: en este nombre
  alternative_spanish_readings:
  - sobre este nombre
  - en nombre de este
  rationale: En el contexto de Hechos, «el nombre» funciona como referencia a la autoridad y representación de Jesús. Mantener la fórmula evita explicar de más y conserva la densidad teológica del texto.
  doctrine_reference: Acts naming/authority motif; translation philosophy §6 (readable modern Spanish)
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. La formulación principal conserva la amenaza coercitiva del verbo griego y la restricción de hablar «en este nombre» sin suavizar el tono.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando corresponde; aquí no aparece.
  - Se mantiene «nombre» en singular para reflejar la fórmula griega y el motivo de autoridad en Hechos.
  - Se eligió un español sobrio y publicable, evitando calcos innecesarios pero preservando la fuerza jurídica del mandato.
