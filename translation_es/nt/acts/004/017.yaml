review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: finalidad negativa («para que no se extienda más»), el objeto social («entre el pueblo»), la fuerza coercitiva de ἀπειλησώμεθα, y la prohibición de seguir hablando «en este nombre» a nadie. Sin embargo, añade intensidad no exigida por μηκέτι con «en absoluto», y «a ningún hombre» suena poco natural y menos fiel al valor genérico de μηδενὶ ἀνθρώπων en español contemporáneo. Además, la nota al pie actual no funciona como alternativa léxica porque repite exactamente el mismo verbo usado en el texto principal.'
  spanish_quality_summary: 'El español es generalmente claro, pero tiene dos problemas de naturalidad: «amenacémosles con que» es menos idiomático que «amenacémoslos para que no…» o «amenazarlos con que no…», y «a ningún hombre» resulta rígido y poco natural en registro bíblico moderno neutral. También la nota [a] está mal anclada: se coloca tras «pueblo» aunque comenta ἀπειλησώμεθα.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «El pueblo», «en este nombre» y la fuerza de «amenazar» están bien encaminados. La principal corrección léxica es preferir «a nadie» para μηδενὶ ἀνθρώπων en español natural y genérico, y ajustar la nota para reflejar una alternativa real respecto de ἀπειλησώμεθα.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «pueblo» pero explica el verbo ἀπειλησώμεθα.
    rationale: Las notas deben marcar la palabra o frase relevante. Aquí la nota léxica corresponde a «amenacémoslos», no a «pueblo».
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real.
    rationale: Dice «O, más literalmente, “amenacémosles”», pero el texto principal ya usa «amenacémosles». La nota queda redundante y no cumple la función documentada del inglés.
  - severity: medium
    issue: «A ningún hombre» es poco natural y no refleja bien el valor genérico en español actual.
    rationale: μηδενὶ ἀνθρώπων significa genéricamente ‘a nadie / a ninguna persona’. En español neutral eclesial, «a nadie» es más claro y fiel al sentido.
  - severity: low
    issue: «En absoluto» sobretraduce μηκέτι.
    rationale: μηκέτι aporta cese temporal (‘ya no’, ‘más’), no necesariamente énfasis absoluto adicional. «No hablen más» basta.
  - severity: low
    issue: «Amenacémosles con que» es menos idiomático en español moderno.
    rationale: Aunque comprensible, «amenacémoslos[a] para que no hablen más…» fluye mejor y mantiene la coerción del griego.
  revised_spanish_text: Pero, para que no se extienda más entre el pueblo, amenacémoslos[a] para que no hablen más en este nombre a nadie.
  revised_footnotes:
  - marker: a
    text: O, «advirtámosles severamente». El verbo griego significa más precisamente «amenazar» y lleva un matiz de intimidación por parte de autoridades.
    reason: lexical_alternative
