revisions:
- from: Pero, para que no se extienda más entre el pueblo[a], amenacémosles con que no hablen más en absoluto a ningún hombre en este nombre.
  to: Pero, para que no se extienda más entre el pueblo, amenacémoslos[a] para que no hablen más en este nombre a nadie.
  rationale: Se corrigió el anclaje de la nota para que recaiga sobre el verbo relevante, se reemplazó la nota redundante por una alternativa real, se eliminó «en absoluto» por ser una intensificación no exigida por μηκέτι, se cambió «a ningún hombre» por «a nadie» para un español natural y fiel al sentido genérico, y se suavizó la sintaxis a una formulación más idiomática sin perder la fuerza coercitiva de ἀπειλησώμεθα.
