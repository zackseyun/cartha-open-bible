translation:
  language: es
  text: para hacer todo lo que tu mano y tu propósito había predestinado que sucediera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había determinado de antemano» o «había decidido de antemano». El verbo griego indica determinación previa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - llevar a cabo
  - realizar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la acción que debía efectuarse en relación con el contexto previo. «Hacer» es la equivalencia más directa y natural en español, sin añadir matices de ejecución formal que no están explícitos en el griego.
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - cuanto
  lexicon: BDAG
  rationale: El relativo neutro plural con alcance amplio pide una expresión inclusiva. «Todo lo que» conserva la amplitud de ὅσα y resulta idiomático en español.
- source_word: χείρ
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - obra
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto «mano» para preservar la imagen bíblica y la metáfora de agencia divina. No se sustituye por «poder» porque la fuente griega conserva la imagen corporal.
- source_word: βουλή
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - consejo
  - voluntad
  lexicon: BDAG
  rationale: βουλή señala intención deliberada o designio. «Propósito» comunica bien esa intención en español actual y evita diluir el sentido en un «voluntad» demasiado general.
- source_word: προώρισεν
  english_pob_choice: had predestined
  chosen_spanish: habían predestinado
  alternatives_spanish:
  - habían determinado de antemano
  - habían decidido de antemano
  - habían preordenado
  lexicon: BDAG
  rationale: El verbo indica determinación previa. «Predestinado» preserva la fuerza teológica del término como en el POB inglés. Se usa el plural porque «mano» y «propósito» aparecen coordinados como sujeto compuesto en la formulación española, sin perder el referente a la acción divina.
- source_word: γενέσθαι
  english_pob_choice: to happen
  chosen_spanish: que sucediera
  alternatives_spanish:
  - que ocurriera
  - que tuviera lugar
  - que llegara a pasar
  lexicon: BDAG
  rationale: El infinitivo de γίνομαι aquí refiere al llegar a ocurrir de los hechos. «Sucediera» es natural en español y conserva el sentido eventivo sin volverlo demasiado literal o rígido.
theological_decisions:
- issue: Determinación divina previa en un contexto de soberanía y responsabilidad humana
  english_pob_reading: had predestined
  chosen_spanish_reading: habían predestinado
  alternative_spanish_readings:
  - habían determinado de antemano
  - habían decidido de antemano
  - habían preordenado
  rationale: El texto afirma una determinación previa de Dios respecto de los acontecimientos, sin intentar resolver aquí la relación entre soberanía divina y responsabilidad humana. Se conserva el término fuerte «predestinado» para no atenuar la afirmación del griego προώρισεν.
  doctrine_reference: Translation philosophy §3; ortodoxia ecuménica sin distintivos denominacionales
- issue: Valor de «mano» y «propósito» como lenguaje antropomórfico aplicado a Dios
  english_pob_reading: your hand and your purpose
  chosen_spanish_reading: tu mano y tu propósito
  alternative_spanish_readings:
  - tu poder y tu propósito
  - tu mano y tu plan
  rationale: Se conserva la imagen de «mano» en vez de sustituirla por una abstracción como «poder», porque el griego mantiene el antropomorfismo/metáfora. «Propósito» traduce βουλή sin borrar la idea de designio deliberado.
  doctrine_reference: Sal. 33:11; Isa. 46:10; Hech. 2:23
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado como sin cambios: la propuesta mantiene la lectura principal de determinación previa, conserva la metáfora de «mano», y refleja el alcance amplio de ὅσα sin introducir glosa adicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino explícito; el contexto habla de Dios por medio de la oración.
  - Se conserva «predestinado» como término teológicamente cargado, en línea con el POB inglés y con la necesidad de no suavizar προώρισεν.
  - «Mano» se deja literal por fidelidad a la imagen bíblica; no se expande a «poder» en el texto principal.
  - La secuencia española sigue el orden lógico del griego y del POB inglés, pero se ajusta a una sintaxis natural en español con infinitivo final de propósito.
