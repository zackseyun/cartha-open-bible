translation:
  language: es
  text: Porque no podemos dejar de hablar de lo que hemos visto y oído[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Porque no podemos evitar hablar de lo que hemos visto y oído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δυνάμεθα
  english_pob_choice: we cannot / are not able
  chosen_spanish: no podemos
  alternatives_spanish:
  - no somos capaces
  - no nos es posible
  lexicon: BDAG
  rationale: El griego expresa imposibilidad; en español, «no podemos» comunica esa fuerza de manera natural y transparente, sin añadir una voluntad meramente subjetiva.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación previa. «Porque» conserva bien el valor explicativo causal/discursivo en español moderno.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros justamente
  lexicon: BDAG
  rationale: El pronombre explícito puede mantenerse en español para reflejar el énfasis del griego. Aquí se omite por fluidez porque la forma verbal ya incluye la persona y el contexto no exige reforzarlo.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se vuelve naturalmente «lo que» en español, que preserva el contenido de testimonio sin sonar pesado.
- source_word: εἴδαμεν
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  lexicon: BDAG
  rationale: El perfecto español comunica bien la vigencia del testimonio apostólico. «Vimos» también sería posible, pero «hemos visto» mantiene mejor la relevancia presente del hecho presenciado.
- source_word: ἠκούσαμεν
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - escuchado
  lexicon: BDAG
  rationale: En coordinación con «hemos visto», «oído» ofrece un paralelismo natural y fiel. «Escuchado» sería más interpretativo, porque el foco es haber recibido audiblemente el testimonio.
- source_word: μὴ λαλεῖν
  english_pob_choice: not to speak
  chosen_spanish: dejar de hablar
  alternatives_spanish:
  - callar
  - no hablar
  lexicon: BDAG
  rationale: La construcción con δύναμαι más infinitivo expresa incapacidad para guardarse de hablar. En español, «dejar de hablar» transmite con naturalidad la imposibilidad de permanecer callados, sin perder la tensión del original.
- source_word: λαλεῖν
  english_pob_choice: speak about
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - hablar acerca de
  lexicon: BDAG
  rationale: Aquí el verbo se refiere al acto de hablar como testigos de lo visto y oído. El complemento «de lo que hemos visto y oído» ya especifica el contenido, por lo que «hablar» basta sin sobrecargar la frase.
theological_decisions:
- issue: 'Fuerza de la afirmación apostólica: incapacidad, no mera decisión voluntariosa'
  english_pob_reading: The apostles are unable to refrain from speaking.
  chosen_spanish_reading: No se presenta como simple determinación, sino como imposibilidad de callar.
  alternative_spanish_readings:
  - No podemos evitar hablar
  - No queremos dejar de hablar
  rationale: El griego οὐ δυνάμεθα ... μὴ λαλεῖν expresa imposibilidad. «No podemos dejar de hablar» conserva esa fuerza sin convertirla en una paráfrasis moralista o solo volitiva.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que corrigió una doble negación torpe hacia una expresión más natural sin perder el sentido de obligación/imposibilidad. En español, «no podemos dejar de hablar» cumple esa misma función con naturalidad y mantiene la relación entre imposibilidad y testimonio.
  spanish_consistency_notes:
  - Se mantiene «hemos visto y oído» para conservar el paralelismo del testimonio apostólico.
  - Se evita «SEÑOR/Cristo» porque el versículo no contiene esos términos.
  - «Hablar» se usa de forma intransitiva porque el complemento con «de» ya marca el objeto del habla.
