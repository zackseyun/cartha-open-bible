translation:
  language: es
  text: y los ponían a los pies de los apóstoles[a][b], y se distribuía a cada uno según lo que necesitaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante los apóstoles». El griego dice literalmente «junto a los pies de los apóstoles» o «a los pies de los apóstoles», conservando la imagen de colocar los recursos bajo su supervisión.'
    reason: lexical_alternative
  - marker: b
    text: 'El objeto de «los ponían» y «se distribuía» está implícito desde el versículo anterior: los recursos procedentes de lo vendido.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐτίθουν
  english_pob_choice: they were laying
  chosen_spanish: los ponían
  alternatives_spanish:
  - los colocaban
  - los depositaban
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción repetida o habitual; en español, el imperfecto también puede comunicar continuidad narrativa. «Los ponían» conserva la imagen concreta de colocar algo y sugiere el acto repetido sin volverlo más interpretativo de lo necesario.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων
  english_pob_choice: at the apostles’ feet
  chosen_spanish: a los pies de los apóstoles
  alternatives_spanish:
  - ante los apóstoles
  - junto a los pies de los apóstoles
  lexicon: BDAG
  rationale: Se preserva la imagen física de colocar el dinero junto a los pies, sin borrar el matiz de sometimiento u অফrecimiento bajo su autoridad. «A los pies de los apóstoles» es natural en español y mantiene la concreción del griego.
- source_word: διεδίδετο
  english_pob_choice: it was being distributed
  chosen_spanish: se distribuía
  alternatives_spanish:
  - era distribuido
  - se repartía
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción continua o habitual. «Se distribuía» conserva el valor pasivo/impersonal en español y evita introducir un sujeto no expresado en el texto.
- source_word: ἑκάστῳ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada uno de ellos
  - a cada persona
  lexicon: BDAG
  rationale: El dativo distributivo se expresa de forma natural con «a cada uno», que conserva la individualidad de la distribución sin añadir especificaciones.
- source_word: καθότι ἄν τις χρείαν εἶχεν
  english_pob_choice: according as anyone had need
  chosen_spanish: según la necesidad que cualquiera tuviera
  alternatives_spanish:
  - conforme a la necesidad que cualquiera tuviera
  - según tuviera necesidad
  lexicon: BDAG
  rationale: La cláusula compara la distribución con la necesidad de cada uno. «Según la necesidad que cualquiera tuviera» refleja bien el sentido de correspondencia de καθότι y el matiz genérico de τις, manteniendo un español claro y digno.
- source_word: χρείαν
  english_pob_choice: need
  chosen_spanish: necesidad
  alternatives_spanish:
  - necesidad
  - falta
  lexicon: BDAG
  rationale: χρεία denota necesidad o carencia; «necesidad» es la equivalencia más directa y estable en español bíblico contemporáneo.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: cualquiera
  alternatives_spanish:
  - cualquiera
  - alguien
  lexicon: BDAG
  rationale: El indefinido griego es genérico. «Cualquiera» preserva ese valor amplio sin restringirlo a una persona específica.
theological_decisions:
- issue: Objeto implícito de «los ponían» y «se distribuía»
  english_pob_reading: Keep the implied object unstated in English except by pronoun ('them' / 'it'), allowing the context from v.34 to supply that these are the proceeds from what had been sold.
  chosen_spanish_reading: Se deja implícito el objeto en ambas cláusulas, confiando en el contexto inmediato para entender que se trata de los recursos procedentes de las ventas.
  alternative_spanish_readings:
  - poner explícitamente «el dinero»
  - poner explícitamente «los recursos»
  - repetir «las ganancias»
  rationale: El griego no nombra el objeto en este versículo, sino que lo presupone por el contexto anterior. Mantenerlo implícito evita sobreinterpretar y conserva la continuidad textual.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Valor de καθότι en la distribución
  english_pob_reading: according as anyone had need
  chosen_spanish_reading: según la necesidad que cualquiera tuviera
  alternative_spanish_readings:
  - conforme a la necesidad que cualquiera tuviera
  - según tuviera necesidad
  rationale: La distribución se regula por la necesidad de cada persona; «según» expresa correspondencia proporcional sin volver el verso más abstracto de lo necesario.
  doctrine_reference: Aspecto verbal y correspondencia semántica del contexto narrativo
translation_notes:
  revision_awareness: El texto inglés de base pasó de «as anyone had need» a «according as anyone had need» para reflejar con mayor precisión καθότι; por eso la versión española usa «según la necesidad que cualquiera tuviera», manteniendo la relación proporcional y el flujo narrativo. También se preserva el objeto implícito del contexto anterior, tal como en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «apóstoles» en minúscula, conforme al uso común cuando no funciona como título formal en contexto tipográfico especial.
  - Se evita «SEÑOR» o fórmulas equivalentes porque no aparece el tetragrámaton ni κύριος en este versículo.
  - «Se distribuía» conserva la voz pasiva/impersonal del griego sin introducir un agente no expresado.
  - «Cualquiera» refleja el valor genérico de τις mejor que «alguien», que puede sonar más concreto.
