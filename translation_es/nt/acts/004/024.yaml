translation:
  language: es
  text: 'Cuando lo oyeron[a], alzaron su voz unidos a Dios y dijeron: «Soberano[b], tú eres el que hizo el cielo y la tierra y el mar, y todo lo que hay en ellos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al oírlo».
    reason: alternative_reading
  - marker: b
    text: 'O «Soberano Señor». Griego: Δέσποτα, un título que enfatiza autoridad absoluta y se distingue de κύριος («Señor»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: cuando lo oyeron
  alternatives_spanish:
  - después de oír esto
  - al oírlo
  lexicon: BDAG
  rationale: El participio aoristo tiene valor temporal; en español, “cuando lo oyeron” conserva la relación con el episodio anterior sin añadir más explicación de la que exige el griego. El objeto implícito se recupera naturalmente por el contexto.
- source_word: ὁμοθυμαδόν
  english_pob_choice: together
  chosen_spanish: unánimes
  alternatives_spanish:
  - de común acuerdo
  - juntos
  lexicon: BDAG
  rationale: El sentido es de unidad concorde en la acción orante. “Unánimes” conserva esa fuerza colectiva y evita que “juntos” reduzca la idea a mera proximidad física.
- source_word: ἦραν φωνήν
  english_pob_choice: they lifted their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron la voz
  - alzaron las voces
  lexicon: BDAG
  rationale: La expresión idiomática griega se reproduce de forma natural en español. Aunque el griego usa “voz” en singular, el español puede mantener el singular colectivo sin perder el sentido de oración comunitaria.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: En un contexto de oración, πρός señala dirección de la petición o alabanza. “Hacia Dios” conserva ese matiz direccional; “a Dios” también sería posible y más idiomático, pero algo menos transparente al valor preposicional.
- source_word: Δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Soberano Señor
  - Soberano
  - Señor
  lexicon: BDAG
  rationale: La POB inglesa eligió “Master” para distinguir δεσπότης de κύριος. En español, “Maestro” mantiene una designación de autoridad personal, pero es menos exacto semánticamente que “Señor”; por eso se documenta la tensión. No se adopta “Señor” como equivalente principal porque borraría la distinción léxica del griego.
- source_word: σὺ ὁ ποιήσας
  english_pob_choice: you are the one who made
  chosen_spanish: tú eres el que hizo
  alternatives_spanish:
  - tú, que hiciste
  - tú eres quien hizo
  lexicon: BDAG
  rationale: La construcción con pronombre enfático + participio articular identifica a Dios como el Creador. “Tú eres el que hizo” conserva el énfasis identificador con español natural.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὴν θάλασσαν
  english_pob_choice: heaven and earth and sea
  chosen_spanish: el cielo y la tierra y el mar
  alternatives_spanish:
  - los cielos y la tierra y el mar
  - el cielo, la tierra y el mar
  lexicon: BDAG
  rationale: El griego presenta una fórmula de creación conocida. “Cielo” traduce mejor en español contemporáneo el singular οὐρανός en este contexto; “cielos” sería una posible opción bíblica tradicional, pero no necesaria aquí.
- source_word: πάντα τὰ ἐν αὐτοῖς
  english_pob_choice: everything in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todo cuanto hay en ellos
  - todas las cosas que hay en ellos
  lexicon: BDAG
  rationale: La fórmula abarcadora se vuelve natural en español con “todo lo que hay en ellos”, preservando la totalidad de lo creado dentro del cielo, la tierra y el mar.
theological_decisions:
- issue: Título divino Δέσποτα y distinción respecto de κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Soberano Señor
  - Soberano
  - Señor
  rationale: La decisión inglesa subraya que δεσπότης expresa autoridad absoluta y que no debe confundirse con κύριος. En español, “Maestro” intenta conservar la designación vocativa sin fusionarla con el título eclesiástico habitual “Señor”, aunque se reconoce que no es una equivalencia perfecta. Se documenta para no borrar la tensión léxica del texto.
  doctrine_reference: Contested terms table for κύριος and δεσπότης; translation philosophy §1, §5
- issue: 'Universalidad creadora: cielo, tierra, mar y todo lo que hay en ellos'
  english_pob_reading: you are the one who made heaven and earth and sea, and everything in them
  chosen_spanish_reading: tú eres el que hizo el cielo y la tierra y el mar, y todo lo que hay en ellos
  alternative_spanish_readings:
  - tú eres el que hizo el cielo, la tierra y el mar, y todo lo que hay en ellos
  - tú, que hiciste el cielo y la tierra y el mar, y todo lo que hay en ellos
  rationale: La frase recoge una fórmula de creación totalizante. Se conserva la enumeración completa y el remate inclusivo para no diluir la afirmación teológica de Dios como Creador de todo lo existente en esos ámbitos.
  doctrine_reference: Génesis 1; Salmo 146:6; Hechos 14:15
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el pasaje mantiene alto acuerdo con la evaluación cruzada; por eso la presente propuesta conserva la misma línea de traducción y solo explicita en español las decisiones léxicas y la tensión de Δέσποτα frente a κύριος.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero aquí el texto dice θεὸν en contexto de oración y no requiere el nombre divino.
  - Se traduce θάλασσα como “mar”, conforme al valor concreto del sustantivo en la fórmula de creación.
  - Se conserva el orden enumerativo del griego para reflejar su ritmo retórico.
  - No se usa “Cristo”, “SEÑOR” ni formulación litúrgica añadida donde el griego no la exige.
