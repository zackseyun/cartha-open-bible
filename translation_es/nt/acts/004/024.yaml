review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y sentido general del griego: valor temporal de ἀκούσαντες, unidad de ὁμοθυμαδόν, fórmula creadora y cláusula inclusiva final. Sin embargo, dos elecciones principales no preservan bien ni la decisión léxica auditada ni el español natural: Δέσποτα se vertió como «Maestro», que en español se asocia sobre todo con docente y no con señorío absoluto; y πρὸς τὸν θεόν como «hacia Dios», que suena menos idiomático en contexto de oración que «a Dios».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «alzaron unánimes su voz hacia Dios» suena algo rígido. En español bíblico natural funciona mejor «alzaron su voz unidos a Dios» o, más directamente, «alzaron su voz a Dios». También conviene ajustar la nota de Δέσποτα para reflejar una alternativa española más fiel que «Maestro».
  glossary_alignment: No hay conflicto con Yahvé/Mesías u otros términos de proyecto en este versículo. El punto terminológico clave es distinguir δεσπότης de κύριος. «Maestro» no logra esa distinción de manera fiel en español; «Soberano» la conserva mejor sin introducir «Señor» al texto principal.
  issues:
  - severity: high
    issue: Δέσποτα traducido como «Maestro»
    rationale: Aunque el inglés auditado usa «Master», el equivalente español «Maestro» desplaza el sentido hacia 'teacher' y no comunica bien autoridad absoluta/propiedad implícita en δεσπότης. «Soberano» es más fiel y sigue distinguiéndose de κύριος.
  - severity: medium
    issue: πρὸς τὸν θεόν traducido como «hacia Dios»
    rationale: En contexto de oración, «a Dios» es el español idiomático. «Hacia Dios» suena calco direccional y menos natural, sin añadir precisión necesaria.
  - severity: low
    issue: Orden y fluidez de «alzaron unánimes su voz»
    rationale: La colocación adverbial es comprensible pero algo dura. «alzaron su voz unidos» conserva ὁμοθυμαδόν con mejor fluidez española.
