revisions:
- from: 'Cuando lo oyeron[a], alzaron unánimes su voz hacia Dios y dijeron: “Maestro[b], tú eres el que hizo el cielo y la tierra y el mar, y todo lo que hay en ellos”'
  to: 'Cuando lo oyeron[a], alzaron su voz unidos a Dios y dijeron: «Soberano[b], tú eres el que hizo el cielo y la tierra y el mar, y todo lo que hay en ellos»'
