translation:
  language: es
  text: Pero muchos de los que habían oído el mensaje[a] creyeron, y el número de los hombres[b] llegó a unos cinco mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra». Aquí λόγος se refiere a la proclamación o mensaje apostólico.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el número de los hombres», probablemente indicando un conteo de varones, no de toda la multitud mixta.'
    reason: cultural_note
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - muchísimas personas
  lexicon: BDAG
  rationale: «Muchos» conserva la fuerza cuantitativa indefinida sin añadir información que no está en el griego. Es natural en español y refleja el valor de πολλοὶ.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» comunica bien el contraste narrativo con el contexto previo, de forma natural en español.
- source_word: ἀκουσάντων τὸν λόγον
  english_pob_choice: those who had heard the message
  chosen_spanish: los que habían oído el mensaje
  alternatives_spanish:
  - los que habían oído la palabra
  - los que habían oído la proclamación
  lexicon: BDAG
  rationale: 'El participio aoristo se expresa con anterioridad relativa: «habían oído». λόγος aquí se entiende como la proclamación apostólica; «mensaje» comunica ese sentido con claridad en español moderno. «Palabra» se mantiene como alternativa viable y más cercana al término formal.'
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - creyeron en él
  - pusieron su fe
  lexicon: BDAG
  rationale: «Creyeron» reproduce de manera directa πιστεύω sin cargarlo con una formulación más interpretativa. En español, el verbo simple conserva la sobriedad del griego.
- source_word: ἐγενήθη
  english_pob_choice: became
  chosen_spanish: llegó a
  alternatives_spanish:
  - se convirtió en
  - pasó a ser
  lexicon: BDAG
  rationale: Con «el número... llegó a unos cinco mil» se mantiene el sentido de resultado y cifra alcanzada. En español, esta construcción suena más natural que un calco con «se hizo» o «se volvió».
- source_word: ὁ ἀριθμὸς
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - la cifra
  - el total
  lexicon: BDAG
  rationale: «El número» es la correspondencia directa y adecuada del sintagma griego, sin expansión innecesaria.
- source_word: τῶν ἀνδρῶν
  english_pob_choice: of the men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los varones
  - de los varones adultos
  lexicon: BDAG
  rationale: ἀνήρ señala varón/hombre. «De los hombres» preserva la referencia masculina de manera idiomática en español; «varones» sería más explícito pero menos natural aquí. La formulación deja abierta la posibilidad de que el conteo se refiera a varones y no a toda la multitud mixta.
- source_word: ὡς χιλιάδες πέντε
  english_pob_choice: about five thousand
  chosen_spanish: unos cinco mil
  alternatives_spanish:
  - aproximadamente cinco mil
  - como cinco mil
  lexicon: BDAG
  rationale: ὡς con número indica aproximación. «Unos cinco mil» es breve, natural y conserva esa ligera imprecisión cuantitativa.
theological_decisions:
- issue: Conteo masculino en τῶν ἀνδρῶν
  english_pob_reading: Translate explicitly as 'the men' rather than a gender-neutral term.
  chosen_spanish_reading: 'Traducir con un masculino explícito: «de los hombres».'
  alternative_spanish_readings:
  - de las personas
  - de los creyentes
  rationale: El griego usa ἀνδρῶν, que normalmente designa hombres/varones. Mantener el masculino preserva la precisión léxica y evita neutralizar el dato del texto. Esto no decide por sí solo si hubo mujeres incluidas en el total de la comunidad; simplemente refleja cómo está formulado el conteo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto de auditoría en inglés: se mantiene la lectura óptima-equivalente ya aprobada, sin cambios sustanciales respecto del sentido griego ni de las decisiones léxicas y teológicas documentadas.'
  spanish_consistency_notes:
  - Se mantuvo el marcador masculino explícito «de los hombres» para reflejar τῶν ἀνδρῶν.
  - «Mensaje» se usa para λόγος por claridad; la alternativa «palabra» queda documentada en nota.
  - «Unos cinco mil» expresa la aproximación de ὡς sin sobreinterpretar la cifra.
  - La puntuación y el orden siguen un español bíblico moderno, no una paráfrasis libre.
