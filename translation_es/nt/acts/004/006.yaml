review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura enumerativa griega, conserva correctamente «Anás el sumo sacerdote» sin armonización histórica, y traduce fielmente los nombres propios y «todos los que eran». La única desviación significativa está en «de la familia sumo sacerdotal», que suena poco natural en español y además omite una construcción posesiva/adjetival más clara para ἐκ γένους ἀρχιερατικοῦ.
  spanish_quality_summary: El texto es mayormente claro y bíblicamente natural, pero «familia sumo sacerdotal» resulta forzado en español. «De familia sacerdotal principal» sería inexacto; la mejor solución es «de la familia de los sumos sacerdotes» o «del linaje sumo sacerdotal». Dado que la nota ya preserva alternativas de linaje/descendencia, conviene hacer el texto principal plenamente idiomático.
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Anás», «sumo sacerdote», «Caifás», «Juan» y «Alejandro» son formas españolas adecuadas. La revisión propuesta mantiene la decisión teológica de conservar el título aplicado a Anás y mejora la expresión de γένος ἀρχιερατικόν con una formulación española más natural.
  issues:
  - severity: medium
    issue: «de la familia sumo sacerdotal» es una colocación poco natural en español
    rationale: Aunque transmite la idea básica, el adjetivo «sumo sacerdotal» pospuesto a «familia» suena forzado. El griego expresa pertenencia a un linaje/familia sacerdotal de alto rango; en español eclesial claro conviene «de la familia de los sumos sacerdotes».
  - severity: low
    issue: La nota al pie puede mantenerse, pero queda más coherente si el texto principal usa una formulación más idiomática
    rationale: Las alternativas «descendencia» y «linaje» siguen siendo útiles como matices léxicos de γένος. No es necesario cambiarlas, solo anclar la redacción principal en un español más natural.
  revised_spanish_text: y Anás el sumo sacerdote[a], y Caifás, y Juan, y Alejandro, y todos los que eran de la familia de los sumos sacerdotes,
