translation:
  language: es
  text: y Anás el sumo sacerdote[a], y Caifás, y Juan, y Alejandro, y todos los que eran de la familia de los sumos sacerdotes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la descendencia sumo sacerdotal» o «del linaje sumo sacerdotal».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἅννας
  english_pob_choice: Annas
  chosen_spanish: Anás
  alternatives_spanish:
  - Annas
  lexicon: n/a (nombre propio transliterado)
  rationale: Se translitera el nombre propio al español de forma reconocible y estándar. «Anás» es la forma tradicional hispana más usual para este personaje; «Annas» preserva más de cerca la grafía inglesa, pero no es la forma natural en español.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el jefe sacerdote
  lexicon: BDAG
  rationale: ἀρχιερεύς designa el cargo de sumo sacerdote; «sumo sacerdote» es el equivalente natural y fiel en español bíblico. Se mantiene el título dado por el griego sin armonizarlo históricamente.
- source_word: Καϊάφας
  english_pob_choice: Caiaphas
  chosen_spanish: Caifás
  alternatives_spanish:
  - Caiafás
  lexicon: n/a (nombre propio transliterado)
  rationale: Nombre propio transliterado a la forma habitual en español bíblico, «Caifás».
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johanan
  lexicon: n/a (nombre propio transliterado)
  rationale: Se usa la forma española habitual del nombre propio griego. «Johanan» reflejaría mejor el trasfondo semítico, pero no es la forma idiomática en español.
- source_word: Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_spanish: Alejandro
  alternatives_spanish:
  - Alexandro
  lexicon: n/a (nombre propio transliterado)
  rationale: «Alejandro» es la forma estándar y natural en español del nombre griego.
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  lexicon: BDAG
  rationale: La expresión cuantificadora se vierte con una construcción natural en español que conserva el valor inclusivo del relativo plural.
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - estaban
  lexicon: BDAG
  rationale: Imperfecto de εἰμί en una enumeración descriptiva; «eran» conserva la relación de pertenencia sin forzar un matiz de estado.
- source_word: ἐκ γένους ἀρχιερατικοῦ
  english_pob_choice: of the high-priestly family
  chosen_spanish: de la familia sumo sacerdotal
  alternatives_spanish:
  - de linaje sumo sacerdotal
  - de descendencia sumo sacerdotal
  - de la familia de los sumos sacerdotes
  lexicon: BDAG
  rationale: γένος aquí indica grupo familiar o linaje; ἀρχιερατικός funciona como adjetivo de pertenencia al sumo sacerdocio. «Familia sumo sacerdotal» conserva la idea de pertenencia genealógica sin hacerla más técnica de lo necesario.
theological_decisions:
- issue: Si mantener o suavizar la tensión histórica del título aplicado a Anás
  english_pob_reading: 'Retain the text''s title straightforwardly: ''Annas the high priest'''
  chosen_spanish_reading: 'Conservar el título de manera directa: «Anás el sumo sacerdote»'
  alternative_spanish_readings:
  - Anás, ex sumo sacerdote
  - Anás, antiguo sumo sacerdote
  - Anás, el jefe de los sacerdotes
  rationale: El griego atribuye a Anás el título ὁ ἀρχιερεύς, y la traducción no debe corregir ni armonizar el dato por consideraciones históricas. Se preserva la tensión del texto fuente tal como hace la POB inglesa.
  doctrine_reference: Principio de primacía del texto original y preservación de tensiones textuales
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente sin cambios reportados; la traducción española mantiene la misma decisión de fondo que la POB inglesa: nombrar a Anás con el título explícito del griego y conservar la enumeración genealógica al final.'
  spanish_consistency_notes:
  - Se usó «sumo sacerdote» en lugar de calcos como «jefe sacerdote», por ser la forma española bíblica más natural y fiel.
  - Se preservó la estructura coordinada de nombres propios y la clausula final con valor de pertenencia genealógica.
  - La nota al pie marca la ambigüedad de ἐκ γένους ἀρχιερατικοῦ sin perder la opción principal en el texto.
  - No se añadió interpretación histórica sobre el cargo de Anás en el cuerpo del texto.
