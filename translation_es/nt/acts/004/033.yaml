translation:
  language: es
  text: Y con gran poder los apóstoles daban testimonio de la resurrección del Señor Jesús[a], y había gran favor sobre todos ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Favor» traduce χάρις en el sentido amplio de benevolencia o disposición favorable. También podría leerse «gracia»; el griego puede abarcar ambas ideas, y el contexto no obliga a escoger solo una.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμει μεγάλῃ
  english_pob_choice: with great power
  chosen_spanish: con gran poder
  alternatives_spanish:
  - con gran fuerza
  - con gran potencia
  lexicon: BDAG
  rationale: El dativo instrumental expresa medio o manera. «Poder» es la forma más natural en español para δύναμις en Hechos y conserva la idea de eficacia dada por el Espíritu sin añadir especificaciones que el texto no da.
- source_word: ἀπεδίδουν
  english_pob_choice: were giving
  chosen_spanish: daban testimonio
  alternatives_spanish:
  - rendían testimonio
  - seguían dando testimonio
  lexicon: BDAG
  rationale: El imperfecto comunica acción continua o repetida. En español, «daban testimonio» conserva ese valor aspectual de modo natural y corresponde al idiomático ἀποδίδωμι con μαρτύριον.
- source_word: τὸ μαρτύριον
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio dado
  - testimonio de ellos
  lexicon: BDAG
  rationale: μαρτύριον significa testimonio o declaración de testigo. En español, «daban testimonio» evita una formulación torpe como «daban el testimonio» y mantiene el sentido de declaración pública.
- source_word: τῆς ἀναστάσεως
  english_pob_choice: to the resurrection
  chosen_spanish: de la resurrección
  alternatives_spanish:
  - acerca de la resurrección
  - sobre la resurrección
  lexicon: BDAG
  rationale: El genitivo funciona como contenido del testimonio. En español, «testimonio de la resurrección» es conciso y fiel; «acerca de» o «sobre» también son posibles, pero menos directos aquí.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - de Jesús, el Señor
  - del Señor Jesucristo
  lexicon: BDAG
  rationale: κύριος se traduce como «Señor» por el valor ya establecido para Kyrios. La forma «del Señor Jesús» preserva el enlace genitivo con la resurrección y mantiene la referencia cristológica sin ampliar el texto.
- source_word: χάρις
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: BDAG
  rationale: Aquí χάρις puede abarcar gracia divina, favor o benevolencia. Siguiendo la decisión auditada, «favor» es la opción más abierta e idiomática en español, sin cerrar la tensión teológica del término.
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - además
  - también
  lexicon: BDAG
  rationale: La partícula enlaza suavemente con la cláusula anterior. «Y» es la equivalencia natural en español y no añade matices ajenos.
- source_word: ἐπὶ πάντας αὐτούς
  english_pob_choice: upon them all
  chosen_spanish: sobre todos ellos
  alternatives_spanish:
  - encima de todos ellos
  - sobre toda la comunidad
  lexicon: BDAG
  rationale: ἐπί con acusativo expresa algo que recae o se extiende sobre el grupo. «Sobre todos ellos» conserva la imagen espacial y el énfasis en la totalidad del colectivo.
theological_decisions:
- issue: Sentido de χάρις en el contexto
  english_pob_reading: great favor was upon them all
  chosen_spanish_reading: gran favor estaba sobre todos ellos
  alternative_spanish_readings:
  - gran gracia estaba sobre todos ellos
  - la gracia de Dios estaba sobre todos ellos
  - gran benevolencia estaba sobre ellos
  rationale: El texto no precisa el origen de χάρις. «Favor» preserva la ambigüedad entre una disposición favorable de Dios y el buen acogimiento externo, sin reducir el término a un sentido técnico ni resolver indebidamente la tensión.
  doctrine_reference: Mantener la tensión léxica y teológica de χάρις sin especificación excesiva.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail en inglés: se simplificó a «testimony to» por mayor cercanía a τὸ μαρτύριον ... τῆς ἀναστάσεως, y se mantuvo la decisión de traducir χάρις como «favor» para no estrechar el sentido. La versión española conserva esa misma línea: «daban testimonio de la resurrección» y «gran favor» reflejan la misma relación semántica y la misma cautela interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el valor cristológico del término en el proyecto.
  - «Poder» conserva el registro de δύναμις en Hechos sin recurrir a «fuerza» o «potencia», menos naturales aquí.
  - «Gran favor estaba sobre todos ellos» mantiene la ambigüedad de χάρις, tal como exige el audit trail.
  - La puntuación reproduce dos miembros coordinados unidos por «y», en paralelo con el griego.
