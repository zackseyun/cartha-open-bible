- from: Éste es la piedra[a] que fue rechazada por ustedes, los constructores, y que ha llegado a ser la piedra angular.
  to: Esta es la piedra que fue rechazada por ustedes, los constructores, y que ha llegado a ser la piedra angular[a].
  rationale: Se corrige la discordancia gramatical principal, se mueve la nota al lugar correspondiente de κεφαλὴν γωνίας y se ajusta su contenido para preservar la alternativa léxica documentada en la POB inglesa sin repetir la lectura principal. No se requieren cambios doctrinales ni de fondo.
