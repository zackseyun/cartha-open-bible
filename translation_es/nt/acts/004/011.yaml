translation:
  language: es
  text: Esta es la piedra que fue rechazada por ustedes, los constructores, y que ha llegado a ser la piedra angular[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la piedra de remate»; más literalmente, «la cabeza de la esquina».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This
  chosen_spanish: Éste
  alternatives_spanish:
  - Esta piedra
  - Ésta
  lexicon: BDAG
  rationale: El demostrativo apunta de manera enfática a Jesús en el contexto inmediato. «Éste» conserva la identificación directa y el énfasis del griego, con ajuste natural al español.
- source_word: λίθος
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - roca
  - bloque de piedra
  lexicon: BDAG
  rationale: «Piedra» es el equivalente natural en español y preserva la imagen del Salmo 118. «Roca» sería más fuerte de lo que exige el término; «bloque de piedra» es demasiado explicativo.
- source_word: ἐξουθενηθεὶς
  english_pob_choice: rejected
  chosen_spanish: rechazada
  alternatives_spanish:
  - despreciada
  - tratada como nada
  lexicon: BDAG
  rationale: El verbo expresa desprecio o tratar como sin valor. En la metáfora de construcción y en la cita salmódica, «rechazada» comunica bien el resultado funcional sin perder el sentido de menosprecio.
- source_word: ὑφ’ ὑμῶν
  english_pob_choice: by you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - por vosotros
  - por ustedes todos
  lexicon: BDAG
  rationale: Conserva la acusación directa en segunda persona plural. «Por ustedes» es el español neutral más claro y natural para el registro bíblico moderno.
- source_word: οἰκοδόμων
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los edificadores
  - los que construyen
  lexicon: BDAG
  rationale: En español, «constructores» transmite la metáfora con claridad. Aunque «edificadores» sería más literal en algunos contextos, aquí suena más marcado y menos natural; el paralelo figurado se mantiene sin explicitar innecesariamente la identidad de los líderes en el texto principal.
- source_word: γενόμενος
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha convertido en
  - llegó a ser
  lexicon: BDAG
  rationale: La forma compuesta refleja un cambio culminado con resultado presente. «Ha llegado a ser» conserva ese matiz mejor que un simple pasado.
- source_word: κεφαλὴν γωνίας
  english_pob_choice: the cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la piedra principal
  - la piedra clave
  - la piedra de esquina
  lexicon: BDAG
  rationale: «Piedra angular» es la equivalencia española más estable para la imagen tradicional del texto. Mantiene la tensión de la cita del Salmo sin resolver dogmáticamente la precisión arquitectónica; «piedra de esquina» sería demasiado literal y menos idiomática.
theological_decisions:
- issue: Imagen del salmo aplicada a Jesús
  english_pob_reading: The verse identifies Jesus as the rejected stone that has become the cornerstone.
  chosen_spanish_reading: El versículo identifica a Jesús como la piedra rechazada que ha llegado a ser la piedra angular.
  alternative_spanish_readings:
  - la piedra angular
  - la piedra de esquina
  - la piedra principal
  rationale: La formulación conserva la identificación cristológica y, al mismo tiempo, mantiene abierta la cuestión arquitectónica exacta de κεφαλὴν γωνίας, tal como lo hace la POB en inglés con su nota alternativa.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente en inglés no introdujo cambios; el pasaje permanece en pleno acuerdo con la nota lexical sobre κεφαλὴν γωνίας, por lo que la versión española conserva esa tensión con una nota alternativa equivalente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «Jesús» implícitamente en la referencia contextual sin necesidad de añadirlo al texto, siguiendo el carácter citacional del versículo.
  - Se prefirió el registro bíblico moderno y claro, evitando calcos excesivamente literales que oscurecieran la metáfora de la piedra.
