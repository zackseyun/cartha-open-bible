review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y la línea de la POB en inglés: identificación enfática de Jesús, metáfora de la piedra rechazada por los edificadores y exaltada como piedra angular. Sin embargo, hay un problema gramatical importante en español: «Éste es la piedra» no concuerda en género; debe ser «Esta es la piedra» o una reestructuración equivalente. Además, la nota actual ancla la nota a «piedra» en vez de a «piedra angular», que es donde corresponde la alternativa léxica de κεφαλὴν γωνίας.'
  spanish_quality_summary: La redacción es clara y natural en español neutral, pero la discordancia «Éste ... la piedra» afecta seriamente la corrección y la dignidad del texto. «Los constructores» es legible, aunque «los edificadores» sería más cercano al lenguaje de la cita; no obstante, no es necesario forzar cambio. «Ha llegado a ser» suena bien en registro bíblico moderno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «piedra angular» concuerda con la decisión inglesa para κεφαλὴν γωνίας, y la nota debe preservar la alternativa arquitectónica sin duplicar la lectura principal. La referencia de la nota debe estar en «piedra angular», no en «piedra».
  issues:
  - severity: high
    issue: Discordancia de género en «Éste es la piedra»
    rationale: οὗτός es masculino por concordar con «λίθος», pero en español el predicativo nominal exige una formulación natural y gramatical. «Éste es la piedra» es incorrecto; la solución más fiel y natural es «Esta es la piedra».
  - severity: medium
    issue: Ubicación incorrecta de la nota al pie
    rationale: La nota explica la alternativa de κεφαλὴν γωνίας («cornerstone/capstone/head of the corner»), por lo que debe ir anclada en «piedra angular», no en la primera mención de «piedra».
  - severity: low
    issue: Contenido de la nota poco ajustado a la POB inglesa
    rationale: La nota dice «O “la piedra angular”», que repite la lectura principal en vez de ofrecer la alternativa. Debe reflejar la alternativa «piedra de remate» o similar, y la forma más literal «la cabeza de la esquina».
  revised_spanish_text: Esta es la piedra que fue rechazada por ustedes, los constructores, y que ha llegado a ser la piedra angular[a].
  revised_footnotes:
  - marker: a
    text: O «la piedra de remate»; más literalmente, «la cabeza de la esquina».
    reason: lexical_alternative
  revision_rationale: Se corrige la discordancia gramatical principal, se mueve la nota al lugar correspondiente de κεφαλὴν γωνίας y se ajusta su contenido para preservar la alternativa léxica documentada en la POB inglesa sin repetir la lectura principal. No se requieren cambios doctrinales ni de fondo.
