translation:
  language: es
  text: Y después de llamarlos, les ordenaron que no hablaran[a] en absoluto ni enseñaran en el nombre de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no dijeran nada en absoluto ni enseñaran en el nombre de Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσαντες
  english_pob_choice: after calling them in
  chosen_spanish: después de llamarlos
  alternatives_spanish:
  - habiéndolos llamado
  - después de convocarlos
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y se entiende naturalmente con valor temporal en español. «Llamarlos» conserva la acción de hacerlos venir sin sobrecargar el texto con una forma más rígida como «convocarlos».
- source_word: παρήγγειλαν
  english_pob_choice: they ordered
  chosen_spanish: les ordenaron
  alternatives_spanish:
  - les mandaron
  - les dieron orden
  lexicon: BDAG
  rationale: El verbo expresa una instrucción autoritativa. «Ordenaron» reproduce con claridad esa fuerza en español y mantiene el registro digno del pasaje.
- source_word: τὸ καθόλου
  english_pob_choice: at all
  chosen_spanish: en absoluto
  alternatives_spanish:
  - de ninguna manera
  - completamente
  lexicon: BDAG
  rationale: La construcción intensifica la prohibición. «En absoluto» comunica bien la total extensión del veto en español moderno sin perder el énfasis.
- source_word: μὴ φθέγγεσθαι
  english_pob_choice: not to speak
  chosen_spanish: que no hablaran
  alternatives_spanish:
  - que no dijeran nada
  - que no pronunciaran palabra
  lexicon: BDAG
  rationale: φθέγγομαι apunta a hablar o emitir voz. «Hablar» es el equivalente natural aquí; la inserción de «en absoluto» sostiene la fuerza del original.
- source_word: μηδὲ διδάσκειν
  english_pob_choice: nor teach
  chosen_spanish: ni enseñaran
  alternatives_spanish:
  - ni instruyeran
  - ni dieran enseñanza
  lexicon: BDAG
  rationale: La coordinación negativa pide en español «ni» para corresponder a μηδέ. «Enseñaran» conserva la segunda actividad prohibida con naturalidad y precisión.
- source_word: ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  english_pob_choice: in the name of Jesus
  chosen_spanish: en el nombre de Jesús
  alternatives_spanish:
  - sobre el nombre de Jesús
  - con respecto al nombre de Jesús
  lexicon: BDAG
  rationale: En Hechos, esta expresión suele denotar hablar o actuar bajo la autoridad de Jesús. «En el nombre de Jesús» es la forma más idiomática y fiel en español.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: N/A
  rationale: Se conserva el nombre propio según la política del proyecto.
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: A comprehensive ban on both speaking and teaching connected with Jesus
  chosen_spanish_reading: Una prohibición amplia de hablar y enseñar en relación con Jesús
  alternative_spanish_readings:
  - Una prohibición solo de la predicación pública
  - Una prohibición limitada al testimonio formal
  rationale: La combinación de τὸ καθόλου con dos infinitivos negativos indica una prohibición total de ambas acciones. El español conserva esa amplitud sin restringir el sentido más de lo que permite el griego.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto fuente sin introducir limitaciones no presentes en el original.'
translation_notes:
  revision_awareness: Se corrigió la validación previa añadiendo el marcador [a] en el texto principal para que la nota quede anclada correctamente. Se mantiene la coordinación negativa formal («ni»), como en la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦ conforme a la convención del proyecto.
  - Se prefirió «en el nombre de Jesús» por ser la equivalencia española más natural y auditable de ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ.
  - La negación compuesta «no ... en absoluto ni ...» refleja la intensidad de τὸ καθόλου sin volver el español artificial.
