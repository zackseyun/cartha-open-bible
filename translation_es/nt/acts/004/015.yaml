- from: Pero, después de ordenarles que salieran fuera del concilio[a], comenzaron a deliberar entre sí[b].
  to: Pero, después de ordenarles que fueran fuera del concilio[a], comenzaron a deliberar entre sí[b].
  rationale: Se corrige la redundancia «salieran fuera» para lograr un español más natural sin perder el matiz de ἔξω («fuera»). Se conservan las notas y el resto de la redacción, que reflejan bien el sentido del original y del historial de auditoría inglés.
