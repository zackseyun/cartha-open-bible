translation:
  language: es
  text: Pero, después de ordenarles que fueran fuera del concilio[a], comenzaron a deliberar entre sí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera del Sanedrín». El griego usa συνέδριον, que puede referirse al consejo gobernante judío o a su sesión reunida.
    reason: lexical_alternative
  - marker: b
    text: O «comenzaron a conferenciar entre sí» o «estaban deliberando entre sí».
    reason: lexical_alternative
lexical_decisions:
- source_word: κελεύσαντες
  english_pob_choice: after ordering
  chosen_spanish: después de ordenarles
  alternatives_spanish:
  - habiéndoles ordenado
  - después de mandarles
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, una construcción temporal con infinitivo expresa bien la secuencia previa sin volver la frase pesada. «Ordenarles» conserva el matiz de autoridad que el contexto judicial exige.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa suave desde la escena anterior hacia la deliberación privada del consejo; «Pero» reproduce bien ese giro.
- source_word: ἔξω τοῦ συνεδρίου
  english_pob_choice: outside the council
  chosen_spanish: fuera del concilio
  alternatives_spanish:
  - fuera del consejo
  - fuera del Sanedrín
  lexicon: BDAG
  rationale: «Concilio» es una forma natural y eclesialmente reconocible en español para el cuerpo gobernante judío aquí. Mantiene el sentido del original sin fijar de antemano una transliteración técnica. Se conserva en notas la alternativa «Sanedrín» por el valor lexical del término griego.
- source_word: ἀπελθεῖν
  english_pob_choice: to go
  chosen_spanish: que salieran
  alternatives_spanish:
  - que se fueran
  - que se retiraran
  lexicon: BDAG
  rationale: La complementación con κελεύσαντες pide una expresión natural de mandato en español. «Salieran» encaja con ἔξω y evita la redundancia de «salir fuera» en el cuerpo principal.
- source_word: συνέβαλλον
  english_pob_choice: they began conferring
  chosen_spanish: comenzaron a deliberar
  alternatives_spanish:
  - comenzaron a conferenciar
  - estaban discutiendo
  lexicon: BDAG
  rationale: El imperfecto indica acción en desarrollo. En este contexto, «deliberar» transmite una discusión formal y evaluativa más fiel al escenario del tribunal que un «discutir» demasiado genérico.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - entre ellos
  lexicon: BDAG
  rationale: La expresión recíproca se expresa de forma natural y concisa con «entre sí», que preserva el carácter mutuo de la deliberación.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y el audit trail inglés: conserva la secuencia del participio aoristo, el giro narrativo de δὲ, el valor del imperfecto en συνέβαλλον y la reciprocidad de πρὸς ἀλλήλους. No se detectaron revisiones aplicadas en el registro fuente, por lo que no se introducen cambios adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «concilio» en el texto principal por claridad y naturalidad, dejando «Sanedrín» como alternativa en nota.
  - Se evitó «departaran» o «se apartaran» porque ἀπελθεῖν aquí funciona como salir del recinto a petición del consejo.
  - «Deliberar» se escogió para reflejar el contexto formal del tribunal sin perder el sentido de discusión mutua.
