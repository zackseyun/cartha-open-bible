review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: participio antecedente («después de ordenarles»), salida del ámbito del συνέδριον, y deliberación mutua posterior. Sin embargo, el texto español introduce una redundancia no fiel al análisis lexical documentado: «salieran fuera del concilio» duplica ἀπελθεῖν + ἔξω de forma poco natural, mientras la propia justificación lexical dice que se debe evitar «salir fuera» en el cuerpo principal.'
  spanish_quality_summary: La redacción es clara y digna, pero «salieran fuera del concilio» suena torpe en español. «Que fueran fuera» tampoco sería ideal; lo más natural y fiel es «que fueran fuera del concilio» o mejor «que salieran del concilio» si se quisiera absorber ἔξω, pero dado que la nota y el inglés mantienen «outside», conviene conservar «fuera del concilio» y usar un verbo no redundante. El resto del versículo («comenzaron a deliberar entre sí») es bueno.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. «Concilio» para συνέδριον es aceptable con nota alternativa «Sanedrín». No hay conflictos con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Redundancia en «salieran fuera del concilio»
    rationale: La combinación «salir fuera» es innecesariamente redundante en español. Además contradice la rationale lexical del propio borrador, que afirma evitar esa redundancia. El griego expresa la idea con ἀπελθεῖν complementado por ἔξω; en español debe resolverse con una formulación idiomática como «que fueran fuera del concilio» o equivalente.
  revised_spanish_text: Pero, después de ordenarles que fueran fuera del concilio[a], comenzaron a deliberar entre sí[b].
  revised_footnotes:
  - marker: a
    text: O «fuera del Sanedrín». El griego usa συνέδριον, que puede referirse al consejo gobernante judío o a su sesión reunida.
    reason: lexical_alternative
  - marker: b
    text: O «comenzaron a conferenciar entre sí» o «estaban deliberando entre sí».
    reason: lexical_alternative
  revision_rationale: Se corrige la redundancia «salieran fuera» para lograr un español más natural sin perder el matiz de ἔξω («fuera»). Se conservan las notas y el resto de la redacción, que reflejan bien el sentido del original y del historial de auditoría inglés.
