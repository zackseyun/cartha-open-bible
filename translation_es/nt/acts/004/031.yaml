translation:
  language: es
  text: Y después de que oraron, el lugar donde estaban reunidos[a] fue sacudido, y todos fueron llenos con el Espíritu Santo, y hablaban la palabra de Dios con denuedo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «donde estaban congregados». El griego los describe como estando en un estado de reunión.
    reason: lexical_alternative
  - marker: b
    text: O «con valentía», «con confianza» o «con franqueza». El término denota habla abierta y sin temor.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεηθέντων αὐτῶν
  english_pob_choice: when they had prayed
  chosen_spanish: cuando ellos habían orado
  alternatives_spanish:
  - después de que habían orado
  - cuando habían hecho súplica
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto da un trasfondo temporal. «Habían orado» conserva el sentido natural y culto en español, y evita una paráfrasis más interpretativa como «hecho súplica», aunque esa sea una alternativa semánticamente posible en δέομαι.
- source_word: ἐσαλεύθη
  english_pob_choice: was shaken
  chosen_spanish: fue sacudido
  alternatives_spanish:
  - fue movido
  - fue estremecido
  - fue agitado
  lexicon: BDAG
  rationale: El aoristo pasivo indica que el lugar sufrió un sacudimiento real. «Fue sacudido» comunica mejor la fuerza física del verbo σαλεύω en español que opciones más débiles o más literarias.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la ubicación
  lexicon: BDAG
  rationale: Se refiere al espacio físico donde estaban congregados. «El lugar» es la equivalencia directa, clara y natural en español.
- source_word: ἐν ᾧ ἦσαν συνηγμένοι
  english_pob_choice: in which they were gathered
  chosen_spanish: en que estaban reunidos
  alternatives_spanish:
  - donde estaban reunidos
  - en el que habían sido reunidos
  lexicon: BDAG
  rationale: La construcción relativa describe el estado de reunión. «Estaban reunidos» preserva el matiz de estado resultante que el participio perfecto perifrástico sugiere, sin forzar una forma demasiado rígida en español.
- source_word: ἐπλήσθησαν
  english_pob_choice: were filled
  chosen_spanish: fueron llenos
  alternatives_spanish:
  - quedaron llenos
  - fueron colmados
  lexicon: BDAG
  rationale: En contextos de llenura del Espíritu, el verbo πίμπλημι se traduce de forma estable con una pasiva de llenura. «Fueron llenos» mantiene la idiomaticidad bíblica y la pasividad del verbo.
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos ellos
  lexicon: BDAG
  rationale: ἅπαντες enfatiza la totalidad del grupo. «Todos» es suficiente, claro y fiel.
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo de Dios
  - del Espíritu de santidad
  lexicon: BDAG
  rationale: 'Aquí el genitivo después de «llenos» se entiende naturalmente como contenido/relación: «del Espíritu Santo». Se capitaliza por el referente divino personal, conforme al uso cristiano y al sentido del contexto.'
- source_word: ἐλάλουν
  english_pob_choice: were speaking
  chosen_spanish: hablaban
  alternatives_spanish:
  - estaban hablando
  - seguían hablando
  - decían
  lexicon: BDAG
  rationale: El imperfecto expresa acción en desarrollo. «Hablaban» conserva esa duración sin añadir una progresión que el griego no exige.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: La expresión lucana establecida se mantiene con «la palabra de Dios», que conserva tanto el idioma bíblico como el peso teológico de λόγος en este contexto de proclamación.
- source_word: μετὰ παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con denuedo
  alternatives_spanish:
  - con valentía
  - con confianza
  - con franqueza
  lexicon: BDAG
  rationale: παρρησία en Hechos denota habla pública libre, sin miedo y franca. «Denuedo» es un término español bíblico y digno que conserva bien esa fuerza; se prefiere sobre opciones más generales como «valentía» o más explicativas como «confianza».
theological_decisions:
- issue: Forma de traducir la llenura del Espíritu Santo
  english_pob_reading: they were all filled with the Holy Spirit
  chosen_spanish_reading: todos fueron llenos del Espíritu Santo
  alternative_spanish_readings:
  - todos fueron llenos por el Espíritu Santo
  - todos quedaron llenos del Espíritu Santo
  rationale: Se conserva la formulación de llenura sin resolverla hacia una causalidad más estrecha («por»). El texto expresa empoderamiento divino y presencia plenificante; la traducción debe mantener esa tensión sin añadir una explicación doctrinal que el versículo no formula explícitamente.
  doctrine_reference: Hechos 4:31; pneumatología lucana; mantener la tensión textual
- issue: Matiz aspectual del imperfecto ἐλάλουν
  english_pob_reading: were speaking
  chosen_spanish_reading: hablaban
  alternative_spanish_readings:
  - estaban hablando
  - hablaron
  rationale: El imperfecto señala una acción continua o en curso. «Hablaban» preserva mejor ese aspecto que un pretérito puntual («hablaron») y evita sobrerrepresentar la continuidad con una perífrasis innecesaria.
  doctrine_reference: Primacía del aspecto verbal del griego en la traducción
- issue: Valor de παρρησία
  english_pob_reading: boldness
  chosen_spanish_reading: denuedo
  alternative_spanish_readings:
  - valentía
  - confianza
  - franqueza
  rationale: El término en Hechos apunta a proclamación abierta y sin temor. «Denuedo» mantiene la fuerza pública y exhortativa del pasaje sin reducirlo a mera disposición interior.
  doctrine_reference: Hechos 4; testimonio apostólico público
translation_notes:
  revision_awareness: 'Se revisó el pasaje conforme al último pasaje de auditoría: no se requirieron cambios respecto al criterio inglés ya aprobado. La versión española sigue directamente el texto griego y conserva las decisiones léxicas y teológicas clave del auditor inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se mantiene «Espíritu Santo» capitalizado por referencia personal divina.
  - Se prefiere «palabra de Dios» como término establecido y coherente con el resto del proyecto.
  - «Denuedo» se conserva como equivalente estable de παρρησία cuando el contexto es proclamación valiente y pública.
