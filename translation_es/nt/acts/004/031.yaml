revisions:
- from: Y cuando ellos habían orado[a], el lugar en que estaban reunidos fue sacudido[b], y todos fueron llenos del Espíritu Santo, y hablaban la palabra de Dios con denuedo.
  to: Y después de que oraron, el lugar donde estaban reunidos[a] fue sacudido, y todos fueron llenos con el Espíritu Santo, y hablaban la palabra de Dios con denuedo[b].
  rationale: Se corrige la desalineación grave de la nota [a], se mejora la naturalidad temporal del genitivo absoluto con «después de que oraron», se ajusta la expresión de llenura a «con el Espíritu Santo» para reflejar mejor la decisión auditada y el uso idiomático, y se preserva la alternativa léxica documentada para παρρησία en una nota correctamente anclada.
  reviewer_model: gpt-5.4
