review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego: oración previa, sacudimiento del lugar, llenura del Espíritu Santo, y proclamación continua de la palabra de Dios con παρρησία. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) la nota [a] está anclada a «orado» pero comenta por error la cláusula de συνηγμένοι («assembled/gathered state»), no δεηθέντων; y (2) «del Espíritu Santo» es menos natural y menos alineado con la decisión inglesa documentada que «con el Espíritu Santo» tras ἐπλήσθησαν. Además, «cuando ellos habían orado» suena poco natural en español; «después de que oraron» o «cuando hubieron orado» refleja mejor el genitivo absoluto temporal.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta cierta rigidez: «cuando ellos habían orado» es calco poco idiomático; «denuedo» es aceptable y bíblicamente reconocible, aunque algo menos transparente para lectores amplios. El resto fluye bien. Conviene mejorar la naturalidad temporal y corregir las notas para que correspondan a los marcadores y al contenido auditado.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: «Espíritu Santo», «Dios», «la palabra de Dios». No hay conflicto con Yahvé/Mesías/etc. La principal mejora terminológica es usar «con el Espíritu Santo» para reflejar mejor el valor idiomático de la llenura en español y la decisión teológica documentada en inglés.'
  issues:
  - severity: high
    issue: La nota [a] no corresponde al segmento al que está anclada.
    rationale: El marcador [a] está en «orado», pero el contenido de la nota («where they were assembled… gathered state») pertenece a ἐν ᾧ ἦσαν συνηγμένοι, no a δεηθέντων αὐτῶν. Esto distorsiona la auditoría y debe corregirse.
  - severity: medium
    issue: «Cuando ellos habían orado» es poco idiomático en español.
    rationale: Aunque comunica anterioridad, suena calcado del inglés. El genitivo absoluto temporal se expresa mejor como «después de que oraron» o «cuando hubieron orado».
  - severity: medium
    issue: «Fueron llenos del Espíritu Santo» es menos natural que «fueron llenos con el Espíritu Santo».
    rationale: La decisión inglesa documenta claramente el sentido de contenido con 'with the Holy Spirit'. En español bíblico moderno, «llenos con el Espíritu Santo» refleja mejor esa relación que «del».
  - severity: low
    issue: Falta una nota para la alternativa de «estaban reunidos».
    rationale: La auditoría inglesa conserva una alternativa relevante para συνηγμένοι. Dado que la nota [a] estaba mal usada, conviene reubicar una nota correcta en esa cláusula para preservar la alternativa documentada.
  revised_spanish_text: Y después de que oraron, el lugar donde estaban reunidos[a] fue sacudido, y todos fueron llenos con el Espíritu Santo, y hablaban la palabra de Dios con denuedo[b].
  revised_footnotes:
