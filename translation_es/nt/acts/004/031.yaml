base_translation:
  language: en
  yaml_path: translation/nt/acts/004/031.yaml
  text: And when they had prayed[a], the place in which they were gathered was shaken[b], and they were all filled with the Holy Spirit and were speaking the word of God with boldness.
  footnotes:
