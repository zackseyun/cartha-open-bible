translation:
  language: es
  text: Porque ni siquiera había entre ellos ningún necesitado[a], pues cuantos eran dueños de terrenos o de casas los vendían y traían el producto de lo vendido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el precio de lo vendido”. El griego dice más literalmente “los precios”, pero en español “el producto” comunica mejor el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ γὰρ
  english_pob_choice: For ... not even
  chosen_spanish: Porque ... no había ni siquiera
  alternatives_spanish:
  - Pues ... no había siquiera
  - Porque ... no había
  lexicon: BDAG
  rationale: γάρ introduce explicación, y οὐδέ intensifica la negación. En español, 'Porque' conserva el enlace explicativo y 'ni siquiera' reproduce la fuerza de 'not even' sin sonar forzado.
- source_word: ἐνδεής
  english_pob_choice: needy
  chosen_spanish: necesitado
  alternatives_spanish:
  - necesitado de ayuda
  - pobre
  lexicon: BDAG
  rationale: '''Necesitado'' expresa falta o carencia sin reducir el término a pobreza económica estricta. En este contexto comunitario, mantiene el sentido de alguien que carece de lo necesario.'
- source_word: τις ἦν ἐν αὐτοῖς
  english_pob_choice: there was ... among them
  chosen_spanish: no había entre ellos ningún ...
  alternatives_spanish:
  - no existía entre ellos ningún ...
  - no había ninguno entre ellos
  lexicon: BDAG
  rationale: La construcción existencial en español se expresa con naturalidad como 'no había entre ellos'. 'Ningún' refuerza el valor de τις como indefinido singular dentro de la negación.
- source_word: ὅσοι
  english_pob_choice: as many as
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - los que
  lexicon: BDAG
  rationale: '''Todos los que'' comunica bien el alcance distributivo dentro del grupo descrito. Evita la literalidad rígida de ''cuantos'' y conserva la idea de totalidad relativa al conjunto mencionado.'
- source_word: κτήτορες
  english_pob_choice: owners
  chosen_spanish: dueños
  alternatives_spanish:
  - propietarios
  - poseedores
  lexicon: BDAG
  rationale: '''Dueños'' es claro y natural en español para quienes poseen bienes. ''Propietarios'' sería más técnico; ''poseedores'' puede sonar menos idiomático en este contexto.'
- source_word: χωρίων
  english_pob_choice: fields
  chosen_spanish: terrenos
  alternatives_spanish:
  - campos
  - parcelas
  lexicon: BDAG
  rationale: En este contexto, χωρίον designa porciones de tierra. 'Terrenos' evita limitarlo a agricultura ('campos') y mantiene la amplitud del término.
- source_word: οἰκιῶν
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  lexicon: BDAG
  rationale: '''Casas'' corresponde al sentido concreto del sustantivo. ''Hogares'' introduciría una connotación más afectiva que la del original.'
- source_word: ὑπῆρχον
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - existían
  - había
  lexicon: BDAG
  rationale: Aquí ὑπάρχω funciona como indicar pertenencia/existencia dentro del grupo descrito. 'Eran dueños' integra naturalmente el predicado sin perder el matiz de clase o condición.
- source_word: πωλοῦντες
  english_pob_choice: selling them
  chosen_spanish: los vendían
  alternatives_spanish:
  - al venderlos
  - vendiéndolos
  lexicon: BDAG
  rationale: El participio expresa la acción acompañante; en español, el imperfecto 'los vendían' mantiene la fluidez narrativa y el valor durativo/reiterado que el inglés POB marcó con 'were selling them'.
- source_word: ἔφερον
  english_pob_choice: were bringing
  chosen_spanish: traían
  alternatives_spanish:
  - iban trayendo
  - llevaban
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o continua en la narración. 'Traían' es la forma natural y conserva ese aspecto sin sobrecargar la frase.
- source_word: τὰς τιμὰς
  english_pob_choice: the proceeds
  chosen_spanish: el producto
  alternatives_spanish:
  - el precio
  - las ganancias
  lexicon: BDAG
  rationale: Aunque τιμή puede significar 'precio', aquí designa el dinero obtenido por la venta. 'Producto' comunica el resultado de la venta de forma natural en español y evita reducirlo a una simple lista de precios.
- source_word: τῶν πιπρασκομένων
  english_pob_choice: of what was sold
  chosen_spanish: de lo vendido
  alternatives_spanish:
  - de las cosas vendidas
  - de lo que se vendía
  lexicon: BDAG
  rationale: El participio substantivado se refiere a los bienes vendidos. 'De lo vendido' es breve, idiomático y preserva la referencia sin añadir detalles no explícitos.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que suavizó la coordinación participial ('were selling them and bringing'). En español se resolvió con una coordinación simple y natural ('los vendían y traían'), preservando el aspecto imperfectivo y el flujo narrativo sin calcar la estructura inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el nombre divino en el texto.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al contenido de este pasaje.
  - '''Necesitado'' y ''producto'' se eligieron por claridad semántica y para conservar la fuerza del original sin tecnicismos innecesarios.'
