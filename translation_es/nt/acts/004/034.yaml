  text: οὐδὲ γὰρ ἐνδεής τις ⸀ἦν ἐν αὐτοῖς· ὅσοι γὰρ κτήτορες χωρίων ἢ οἰκιῶν ὑπῆρχον, πωλοῦντες ἔφερον τὰς τιμὰς τῶν πιπρασκομένων
base_translation:
  language: en
  yaml_path: translation/nt/acts/004/034.yaml
  text: For there was not even any needy person among them[a], for as many as were owners of fields or houses were selling them and bringing the proceeds of what was sold.
  footnotes:
  - marker: a
    text: Or 'the prices of the things being sold.' The Greek is more literally 'the prices,' but 'proceeds' better conveys the sense in natural English.
    reason: lexical_alternative
