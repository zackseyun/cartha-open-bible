  to: Porque ni siquiera había entre ellos ningún necesitado[a], pues cuantos eran dueños de terrenos o de casas los vendían y traían el producto de lo vendido.
  rationale: Se añadió 'ni siquiera' para reflejar explícitamente la fuerza de οὐδὲ en el texto principal. También se ajustó 'todos los que' a 'cuantos' para representar mejor el valor distributivo de ὅσοι sin cambiar el sentido. Se conservó 'terrenos', 'casas' y 'el producto de lo vendido' por ser opciones fieles y naturales en español.
