    issue: Falta en el texto principal el matiz enfático de οὐδὲ
    rationale: La decisión léxica española afirma 'Porque ... no había ni siquiera', pero el borrador dice solo 'Porque no había'. El griego οὐδὲ γὰρ refuerza la negación; conviene preservarlo en el cuerpo del texto.
  - severity: low
    issue: '''Todos los que'' puede sonar un poco más interpretivo que necesario para ὅσοι'
    rationale: No es incorrecto, pero 'cuantos' o estructura equivalente conserva mejor el distributivo 'as many as' sin añadir una universalización más fuerte de la requerida.
  revised_spanish_text: Porque ni siquiera había entre ellos ningún necesitado[a], pues cuantos eran dueños de terrenos o de casas los vendían y traían el producto de lo vendido.
  revised_footnotes:
  - marker: a
    text: O “el precio de lo vendido”. El griego dice más literalmente “los precios”, pero en español “el producto” comunica mejor el sentido.
    reason: lexical_alternative
  revision_rationale: Se añadió 'ni siquiera' para reflejar explícitamente la fuerza de οὐδὲ en el texto principal. También se ajustó 'todos los que' a 'cuantos' para representar mejor el valor distributivo de ὅσοι sin cambiar el sentido. Se conservó 'terrenos', 'casas' y 'el producto de lo vendido' por ser opciones fieles y naturales en español.
