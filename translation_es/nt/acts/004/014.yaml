translation:
  language: es
  text: Y al ver al hombre que había sido sanado, de pie con ellos, no tenían nada que decir en respuesta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no podían decir nada en contra» o «no tenían nada que contradecir».
    reason: lexical_alternative
lexical_decisions:
- source_word: τόν ⸀τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Entonces
  - Y también
  lexicon: BDAG
  rationale: La partícula τε enlaza esta cláusula con el desarrollo narrativo previo. En español, una simple conjunción coordinante «Y» comunica con naturalidad ese enlace sin sobredeterminar el matiz.
- source_word: ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  lexicon: BDAG
  rationale: El acusativo singular señala al individuo masculino específico ya mencionado. «Al hombre» conserva la referencia concreta y el género del referente.
- source_word: βλέποντες
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vieron
  lexicon: BDAG
  rationale: El participio presente contemporáneo se expresa bien con una construcción temporal natural en español. «Al ver» mantiene la relación de simultaneidad sin volver la frase pesada.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - en su compañía
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento. «Con ellos» es la equivalencia más directa y clara en español.
- source_word: ἑστῶτα
  english_pob_choice: standing
  chosen_spanish: que estaba
  alternatives_spanish:
  - de pie
  - en pie
  lexicon: BDAG
  rationale: 'El participio perfecto de ἵστημι describe un estado resultante: el hombre permanece de pie. En español, «que estaba» funciona dentro de la relativa y se entiende como estar de pie por el contexto inmediato; «de pie» también sería posible, pero la estructura con relativa conserva bien el movimiento de la oración.'
- source_word: τεθεραπευμένον
  english_pob_choice: who had been healed
  chosen_spanish: que había sido sanado
  alternatives_spanish:
  - que había sido curado
  - que había sido restaurado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de θεραπεύω identifica al hombre por una sanidad ya consumada con efecto presente. «Sanado» es natural en español bíblico y comunica el contexto milagroso; «curado» suena más clínico y menos marcado por la intervención divina.
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: οὐδέν funciona como objeto de εἶχον con el infinitivo, expresando ausencia total de respuesta. «Nada» es la equivalencia idiomática y directa.
- source_word: εἶχον ἀντειπεῖν
  english_pob_choice: had nothing to say in reply
  chosen_spanish: no tenían nada que responder
  alternatives_spanish:
  - no tenían nada que decir en réplica
  - no podían decir nada en contra
  lexicon: BDAG
  rationale: La construcción ἔχω + infinitivo expresa incapacidad o falta de base para responder. «No tenían nada que responder» es una forma natural en español y conserva el sentido adversativo de ἀντειπεῖν sin endurecerlo innecesariamente.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia; no se requieren revisiones sustantivas. Se ha optado por una sintaxis española fluida que preserve el valor del participio y del infinitivo final, sin perder el matiz adversativo de ἀντειπεῖν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «sanado» para θεραπεύω, en línea con el contexto milagroso y la terminología bíblica natural en español.
  - Se conserva la negación total con «nada», acorde con οὐδέν y con la opción auditada en inglés.
  - La nota al pie recoge alternativas reales del campo semántico de ἀντειπεῖν sin introducir interpretaciones ajenas al pasaje.
