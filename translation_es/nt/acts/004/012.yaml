revisions:
- from: Y no hay salvación en ningún otro[a], pues no hay bajo el cielo otro nombre dado entre los hombres[b] por el cual debamos ser salvos.
  to: Y no hay salvación en nadie más[a], pues no hay bajo el cielo otro nombre dado entre los hombres[b] por el cual debamos ser salvos.
  rationale: La revisión hace una mejora pequeña pero importante de naturalidad y precisión personal en español al cambiar «en ningún otro» por «en nadie más», sin alterar el sentido del griego ni del expediente inglés. Se mantienen intactos el énfasis de exclusividad, el modismo «bajo el cielo», el valor de «nombre» y la nota inclusiva sobre ἀνθρώποις.
