translation:
  language: es
  text: Y no hay salvación en nadie más[a], pues no hay bajo el cielo otro nombre dado entre los hombres[b] por el cual debamos ser salvos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ningún otro». El griego ἐν ἄλλῳ οὐδενί expresa exclusividad personal.
    reason: alternative_reading
  - marker: b
    text: O «entre los seres humanos». El griego ἐν ἀνθρώποις es genérico y se refiere a la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: En este contexto de la proclamación apostólica sobre Jesuús, «salvación» conserva tanto el valor inmediato de rescate como su alcance teológico; «liberación» sería posible, pero reduciría el peso del término en español.
- source_word: ἐν ἄλλῳ οὐδενί
  english_pob_choice: in no one else
  chosen_spanish: en ningún otro
  alternatives_spanish:
  - en nadie más
  - en otro ninguno
  lexicon: BDAG
  rationale: La construcción griega expresa exclusividad personal. «En ningún otro» reproduce bien la idea y suena natural en español sin perder el matiz relacional del original.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre/autoridad
  - persona
  lexicon: BDAG
  rationale: Se mantiene «nombre» porque el griego conserva la densidad bíblica de identidad, autoridad y representación sin explicitarla; «persona» o «autoridad» serían paráfrasis.
- source_word: ἕτερον
  english_pob_choice: other
  chosen_spanish: otro
  alternatives_spanish:
  - diferente
  lexicon: BDAG
  rationale: En esta negación, «otro» es la opción más directa y natural; «diferente» debilitaría la exclusividad del enunciado.
- source_word: ὑπὸ τὸν οὐρανόν
  english_pob_choice: under heaven
  chosen_spanish: bajo el cielo
  alternatives_spanish:
  - bajo el cielo
  - en el mundo
  lexicon: BDAG
  rationale: Se conserva el giro idiomático bíblico. «Bajo el cielo» reproduce la amplitud de la esfera humana sin aplanarla a «en el mundo».
- source_word: δεδομένον ἐν ἀνθρώποις
  english_pob_choice: given among men
  chosen_spanish: dado entre los hombres
  alternatives_spanish:
  - dado entre los seres humanos
  - dado entre la humanidad
  lexicon: BDAG
  rationale: La preposición ἐν con ἀνθρώποις puede entenderse como ámbito colectivo. «Entre los hombres» mantiene la idiomaticidad de la tradición bíblica y refleja el sentido genérico del griego.
- source_word: ἐν ᾧ
  english_pob_choice: by which
  chosen_spanish: por el cual
  alternatives_spanish:
  - mediante el cual
  - a través del cual
  lexicon: BDAG
  rationale: El relativo apunta al «nombre» como medio/instrumento de salvación. «Por el cual» comunica bien la relación instrumental en español.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debamos
  alternatives_spanish:
  - es necesario que
  - tenemos que
  lexicon: BDAG
  rationale: Se traduce la necesidad con una forma verbal natural en español. «Debamos» conserva la fuerza obligatoria del griego en un registro digno.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvos
  alternatives_spanish:
  - ser salvados
  - ser librados
  lexicon: BDAG
  rationale: Se mantiene la pasiva con «ser salvos», que preserva la relación con «salvación» y evita interpretar el término hacia una liberación meramente circunstancial.
theological_decisions:
- issue: Exclusividad de la salvación en relación con Jesús
  english_pob_reading: There is salvation in no one else, for there is no other name under heaven given among men by which we must be saved.
  chosen_spanish_reading: Y no hay salvación en ningún otro, pues no hay bajo el cielo otro nombre dado entre los hombres por el cual debamos ser salvos.
  alternative_spanish_readings:
  - No hay otro camino de salvación.
  - La salvación no está en nadie más.
  rationale: 'La versión española conserva la exclusividad sin añadir explicaciones doctrinales ajenas al versículo. Se mantiene la estructura causal del griego: la ausencia de otro nombre fundamenta la afirmación sobre la salvación.'
  doctrine_reference: Hechos 4:12; afirmación de exclusividad soteriológica
- issue: Valor genérico de ἀνθρώποις
  english_pob_reading: given among men
  chosen_spanish_reading: dado entre los hombres
  alternative_spanish_readings:
  - dado entre los seres humanos
  - dado entre la humanidad
  rationale: El griego es genérico para la humanidad. Se conserva «los hombres» como equivalente bíblico tradicional y fiel, sin imponer una explicación, aunque las alternativas inclusivas siguen siendo posibles en español.
  doctrine_reference: Principio de equivalencia semántica y género genérico
translation_notes:
  revision_awareness: 'Coincide con el pase más reciente del POB inglés: no se detectaron cambios necesarios tras la revisión final; la redacción española sigue la misma lectura de exclusividad soteriológica y mantiene el valor genérico de ἀνθρώποις.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «salvación» y «ser salvos» para conservar coherencia léxica.
  - Se preservó el idiomatismo bíblico «bajo el cielo» en vez de una paráfrasis más moderna.
  - Se evitó sustituir «nombre» por una explicación interpretativa como «autoridad» o «persona».
  - El estilo general es formal y eclesialmente legible, sin calco rígido del inglés.
