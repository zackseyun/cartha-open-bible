    changes_summary: Revised “plot futile things” to “devise vain things” for closer lexical alignment with ἐμελέτησαν κενά and to echo the Psalm citation more formally.
translation:
  language: es
  text: 'quien[a], por medio del Espíritu Santo, por boca de David tu siervo, dijo: «¿Por qué se amotinaron las naciones, y los pueblos tramaron cosas vanas[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «nuestro padre David, tu siervo», haciendo que la introducción sea: «quien, por medio del Espíritu Santo, por boca de nuestro padre David, tu siervo, dijo».'
    reason: textual_variant
  - marker: b
    text: O «meditaron cosas vanas». El verbo griego puede significar «meditar», pero en este contexto también puede significar «tramaron» o «idearon».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τοῦ πατρὸς ἡμῶν
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - quien, nuestro padre
  - quien por medio de nuestro padre
  lexicon: BDAG
  rationale: La secuencia griega forma parte de una lectura textual problemática en la fórmula introductoria. En español, la conexión relativa con el hablante divino del contexto anterior se expresa con «quien», evitando forzar una frase genitiva inestable en la línea principal.
- source_word: διὰ πνεύματος ἁγίου
  english_pob_choice: through the Holy Spirit
  chosen_spanish: por medio del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - a través del Espíritu Santo
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de» conserva con claridad el valor instrumental y la referencia personal al Espíritu.
- source_word: στόματος Δαυὶδ
  english_pob_choice: by the mouth of David
  chosen_spanish: por boca de David
  alternatives_spanish:
  - por la boca de David
  - por medio de la boca de David
  lexicon: BDAG
  rationale: La expresión bíblica idiomática se mantiene con una forma natural en español. «Por boca de» conserva el matiz de agencia profética sin volverse rígida.
- source_word: παιδός σου
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu hijo
  lexicon: BDAG
  rationale: Aunque παῖς puede significar «niño/hijo» o «siervo/esclavo», aquí se trata de una fórmula de cita bíblica aplicada a David en relación con Dios. En español, «siervo» comunica esa relación reverente y evita una lectura extraña o ambigua.
- source_word: εἰπών
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habiendo dicho
  - al decir
  lexicon: BDAG
  rationale: El participio aoristo introductorio se vierte de modo natural con un verbo finito en español para mantener fluidez sin perder la relación con la cita siguiente.
- source_word: Ἱνατί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Para qué razón
  lexicon: BDAG
  rationale: Interrogativo directo y sencillo; «¿Por qué» es el equivalente natural y fiel.
- source_word: ἐφρύαξαν
  english_pob_choice: rage
  chosen_spanish: se enfurecieron
  alternatives_spanish:
  - rugieron
  - se amotinaron
  - se desbocaron
  lexicon: BDAG
  rationale: El verbo expresa agitación desafiante y turbulenta. En español, «se enfurecieron» conserva el sentido de violencia emocional y oposición rebelde sin sonar artificial.
- source_word: ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: Se preserva el plural y el trasfondo veterotestamentario del Salmo citado. «Las naciones» es la opción más precisa para el contraste paralelo.
- source_word: λαοὶ
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - los pueblos de la tierra
  lexicon: BDAG
  rationale: Se mantiene el plural y el paralelismo del texto griego y del Salmo. «Los pueblos» evita reducirlo a un singular genérico.
- source_word: ἐμελέτησαν
  english_pob_choice: devise
  chosen_spanish: tramaron
  alternatives_spanish:
  - meditaron
  - pensaron
  - planearon
  lexicon: BDAG
  rationale: En este contexto hostil, el verbo no describe meditación inocente sino deliberación para el mal. «Tramaron» expresa mejor la intención adversaria que «meditaron».
- source_word: κενά
  english_pob_choice: vain things
  chosen_spanish: cosas vanas
  alternatives_spanish:
  - cosas vacías
  - cosas inútiles
  lexicon: BDAG
  rationale: El adjetivo comunica vacío/inutilidad. «Cosas vanas» preserva la resonancia bíblica y el paralelismo poético con un español natural.
theological_decisions:
- issue: Forma textual de la introducción de la cita
  english_pob_reading: Translate the quotation introduction without including “of our father,” while keeping the connection to God speaking through the Holy Spirit and David.
  chosen_spanish_reading: Traducir la introducción con «quien» y sin incorporar una frase posesiva explícita incierta en la línea principal.
  alternative_spanish_readings:
  - «quien, por medio de nuestro padre David, tu siervo, dijo»
  - «quien, por medio de nuestro padre David y tu siervo, dijo»
  rationale: La lectura griega presenta dificultad textual y sintáctica. En español, la línea principal debe ser fluida y no cargar con una formulación dudosa; la variante se preserva en nota para no borrar la tensión documental.
  doctrine_reference: Primacía del texto original y conservación de variantes; no resolver indebidamente una lectura textual disputada.
- issue: Valor semántico de ἐμελέτησαν κενά
  english_pob_reading: The people “devise vain things,” with a footnote allowing “meditate on vain things” as an alternative.
  chosen_spanish_reading: «tramaron cosas vanas» con nota alternativa que permite «meditaron cosas vanas» como sentido secundario posible.
  alternative_spanish_readings:
  - «meditaron cosas vanas»
  - «idearon cosas vanas»
  - «planearon cosas vanas»
  rationale: El contexto del Salmo citado en Hechos es abiertamente hostil. Mantener un verbo de intención maliciosa evita suavizar el pasaje, pero la nota conserva la posibilidad léxica de «meditar».
  doctrine_reference: No borrar la tensión léxica entre contemplación y conspiración; conservar la fuerza del salmo citado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la elección de «devise vain things» para acercarse más a ἐμελέτησαν κενά. Por eso la versión española principal adopta un verbo de conspiración («tramaron») y no una opción más neutral como «pensaron».
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas por tratarse del Espíritu divino.
  - Se prefirió «las naciones / los pueblos» para conservar el paralelismo poético del Salmo citado.
  - «Siervo» se mantuvo para παιδός σου conforme al uso bíblico y al POB en inglés.
  - No se emplea «SEÑOR» para el nombre divino aquí, porque el versículo citado no contiene יהוה sino una cita introducida de manera indirecta.
