  text: ὁ ⸂τοῦ πατρὸς ἡμῶν⸃ διὰ ⸂πνεύματος ἁγίου⸃ στόματος Δαυὶδ παιδός σου εἰπών· Ἱνατί ἐφρύαξαν ἔθνη καὶ λαοὶ ἐμελέτησαν κενά;
base_translation:
  language: en
  yaml_path: translation/nt/acts/004/025.yaml
  text: 'who[a], through the Holy Spirit, by the mouth of David your servant, said: ‘Why did the nations rage[b], and the peoples devise vain things?’'
  footnotes:
  - marker: a
    text: 'Some manuscripts read “our father David your servant,” making the introduction: “who through the Holy Spirit, by the mouth of our father David your servant, said.”'
    reason: textual_variant
  - marker: b
    text: Or “meditated on vain things.” The Greek verb can mean “meditate” or, in context, “plot/devise.”
    reason: lexical_alternative
