translation:
  language: es
  text: Como tenía un campo[a], lo vendió y trajo el dinero[b], y lo puso a los pies de los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «teniendo un campo» o «puesto que tenía un campo». El griego usa un genitivo absoluto para dar la circunstancia de fondo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el producto de la venta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπάρχοντος αὐτῷ ἀγροῦ
  english_pob_choice: Since he owned a field
  chosen_spanish: Como tenía una finca
  alternatives_spanish:
  - Como poseía un campo
  - Puesto que tenía un campo
  - Ya que era dueño de un terreno
  lexicon: BDAG
  rationale: El genitivo absoluto aporta circunstancia de fondo. En español, 'como' comunica esa relación causal/circunstancial de manera natural. 'Tenía' preserva la idea de posesión sin forzar una perífrasis; 'finca' amplía ligeramente ἀγρός sin perder el sentido de propiedad rural/agraria.
- source_word: ἀγροῦ
  english_pob_choice: a field
  chosen_spanish: una finca
  alternatives_spanish:
  - un campo
  - un terreno
  - una parcela
  lexicon: BDAG
  rationale: ἀγρός puede referirse a campo, terreno o propiedad rural. 'Finca' es una opción amplia y natural en español para una posesión de tierra; mantiene el valor de propiedad explícito en el contexto.
- source_word: πωλήσας
  english_pob_choice: he sold it
  chosen_spanish: la vendió
  alternatives_spanish:
  - habiéndola vendido
  - después de venderla
  - vendió esa finca
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales. En español, la coordinación verbal simple reproduce bien la secuencia. El pronombre 'la' recupera naturalmente la finca mencionada.
- source_word: ἤνεγκεν
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - presentó
  - aportó
  lexicon: BDAG
  rationale: En este contexto φέρω significa llevar o traer un importe para presentarlo. 'Trajo' es idiomático en español y conserva la acción de llevar el dinero a los apóstoles.
- source_word: τὸ χρῆμα
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - el producto de la venta
  - los fondos
  - el importe
  lexicon: BDAG
  rationale: χρῆμα aquí designa el dinero obtenido por la venta. 'El dinero' es claro y directo; otras opciones explicitan que se trata del producto de la venta, pero son más interpretativas.
- source_word: ἔθηκεν
  english_pob_choice: laid
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo depositó
  - lo dejó
  lexicon: BDAG
  rationale: τίθημι con la expresión siguiente funciona como un acto concreto de depositar. 'Lo puso' es natural en español y conserva la sencillez del gesto sin cargarlo de solemnidad añadida.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων
  english_pob_choice: at the apostles’ feet
  chosen_spanish: a los pies de los apóstoles
  alternatives_spanish:
  - delante de los apóstoles
  - junto a los pies de los apóstoles
  - a los pies de los apóstoles,
  lexicon: BDAG
  rationale: La expresión se conserva de manera concreta porque la imagen física importa y además sugiere la entrega bajo la administración apostólica. En español, 'a los pies de' reproduce el modismo sin explicar de más.
theological_decisions:
- issue: Preservar la imagen concreta de la entrega del dinero a la autoridad apostólica
  english_pob_reading: Retained the concrete expression 'laid it at the apostles’ feet.'
  chosen_spanish_reading: Se mantiene 'lo puso a los pies de los apóstoles.'
  alternative_spanish_readings:
  - se lo entregó a los apóstoles
  - lo dio a los apóstoles
  rationale: La escena describe un acto físico real y, al mismo tiempo, una entrega bajo la administración apostólica. Conservar la imagen evita diluir el gesto en una paráfrasis administrativa y respeta la fuerza narrativa del griego.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo representar la circunstancia de fondo del genitivo absoluto inicial
  english_pob_reading: Since he owned a field
  chosen_spanish_reading: Como tenía una finca
  alternative_spanish_readings:
  - Porque tenía una finca
  - Puesto que poseía un campo
  rationale: El griego presenta una circunstancia previa, no necesariamente una causalidad fuerte. 'Como' expresa bien ese trasfondo en español y evita sobreinterpretar la relación lógica.
  doctrine_reference: Grammar note on genitive absolute; translation philosophy §2
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el hilo de decisiones del POB en inglés. No se aprecian revisiones textuales en el registro base; la principal tensión de traducción está en el genitivo absoluto inicial y en el valor de χρῆμα. La versión española conserva la imagen concreta, evita paráfrasis excesivas y mantiene la relación entre venta, dinero y entrega apostólica.
  spanish_consistency_notes:
  - Se usó 'finca' para ἀγρός por naturalidad en español, aunque 'campo' también sería posible; se evita 'SEÑOR' o cristianización innecesaria porque no hay léxico divino aquí.
  - '''Lo puso a los pies de los apóstoles'' conserva el modismo corporal del original y coincide con la decisión POB de no reducirlo a ''se lo dio''.'
  - '''Como tenía'' refleja la función circunstancial del genitivo absoluto sin convertirlo en explicación causal fuerte.'
  - Se mantuvo un registro sobrio y publicable, sin añadir detalles sobre la finalidad de la ofrenda que el versículo no expresa.
