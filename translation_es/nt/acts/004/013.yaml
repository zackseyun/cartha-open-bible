translation:
  language: es
  text: Ahora bien, al observar el denuedo de Pedro y de Juan[a], y al darse cuenta de que eran hombres sin instrucción y corrientes, se asombraban y reconocían que habían estado con Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin letras y laicos». El griego describe a hombres sin formación académica o rabínica formal y sin estatus profesional oficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θεωροῦντες
  english_pob_choice: as they observed
  chosen_spanish: al observar
  alternatives_spanish:
  - viendo
  - al mirar
  - al percatarse de
  lexicon: BDAG
  rationale: El participio introduce una observación continua que conduce a la reacción del consejo. «Al observar» conserva el valor de proceso y suena natural en español sin reducirlo a un simple «ver».
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: valentía
  alternatives_spanish:
  - denuedo
  - confianza
  - franqueza
  lexicon: BDAG
  rationale: En Hechos, παρρησία combina osadía y libertad para hablar. «Valentía» comunica bien el componente de coraje público; «denuedo» sería más tradicional, pero menos natural para lectores modernos.
- source_word: ἀγράμματοί
  english_pob_choice: uneducated
  chosen_spanish: sin instrucción
  alternatives_spanish:
  - sin letras
  - sin formación académica
  - sin instrucción formal
  lexicon: BDAG
  rationale: El término no describe ignorancia moral ni falta absoluta de inteligencia, sino ausencia de formación escolar o rabínica formal. «Sin instrucción» preserva esa fuerza sin cargar con matices peyorativos.
- source_word: ἰδιῶται
  english_pob_choice: ordinary
  chosen_spanish: comunes
  alternatives_spanish:
  - laicos
  - personas comunes
  - no profesionales
  lexicon: BDAG
  rationale: La palabra contrasta con especialistas o figuras oficiales. «Comunes» mantiene la idea de estatus no elitista y evita introducir un tecnicismo eclesiástico que podría oscurecer el contraste del pasaje.
- source_word: ἐθαύμαζον
  english_pob_choice: they were astonished
  chosen_spanish: se asombraban
  alternatives_spanish:
  - estaban asombrados
  - se maravillaban
  - quedaban atónitos
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción continua. «Se asombraban» conserva ese aspecto durativo y refleja bien la sorpresa del contexto narrativo.
- source_word: ἐπεγίνωσκόν
  english_pob_choice: they recognized
  chosen_spanish: reconocían
  alternatives_spanish:
  - llegaban a reconocer
  - identificaban
  - caían en la cuenta
  lexicon: BDAG
  rationale: El verbo indica reconocimiento o identificación. «Reconocían» es breve y natural, y mantiene la secuencia de comprensión que culmina en la observación siguiente.
- source_word: σὺν τῷ Ἰησοῦ ἦσαν
  english_pob_choice: they had been with Jesus
  chosen_spanish: habían estado con Jesús
  alternatives_spanish:
  - estaban con Jesús
  - habían andado con Jesús
  lexicon: BDAG
  rationale: El imperfecto en contexto retrospectivo señala una relación previa ya consumada desde el punto de vista narrativo. El pretérito pluscuamperfecto en español expresa con precisión esa asociación anterior que explica su audacia presente.
- source_word: δὲ ... καὶ ... καὶ
  english_pob_choice: Now ... and
  chosen_spanish: Ahora bien, ... y ... y
  alternatives_spanish:
  - Y ... y ...
  - Entonces ... y ...
  lexicon: BDAG
  rationale: Las partículas organizan el avance narrativo más que una oposición fuerte. «Ahora bien» reproduce el enlace discursivo de δέ, mientras que «y» mantiene la fluidez del encadenamiento.
theological_decisions:
- issue: Caracterización social de Pedro y Juan
  english_pob_reading: Rendered ἀγράμματοι καὶ ἰδιῶται as 'uneducated and ordinary men'
  chosen_spanish_reading: «hombres sin instrucción y comunes»
  alternative_spanish_readings:
  - «hombres incultos y del pueblo»
  - «hombres sin letras y laicos»
  - «hombres sin instrucción y laicos»
  rationale: La frase apunta a la percepción del consejo sobre la falta de formación formal y de estatus profesional de Pedro y Juan, no a una acusación de torpeza intelectual o moral. «Sin instrucción y comunes» conserva esa tensión social sin suavizarla hasta perder el contraste.
  doctrine_reference: Translation philosophy §§1, 4, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustantivos; el texto español sigue de cerca la solución auditada en inglés, ajustando solo la idiomaticidad y la equivalencia semántica para español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se evita «SEÑOR» o sustitución reverencial porque el pasaje no contiene el nombre divino.
  - «Sin instrucción» se usa para ἀγράμματοι con el mismo valor semántico que el inglés auditado «uneducated».
  - «Comunes» refleja el contraste de ἰδιῶται con personas de rango o oficio especializado, sin imponer «laicos» como término eclesiástico obligatorio.
