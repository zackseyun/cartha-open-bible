revisions:
- from: Ahora bien, al observar la valentía de Pedro y de Juan[a], y al darse cuenta de que eran hombres sin instrucción y comunes, se asombraban, y reconocían que habían estado con Jesús.
  to: Ahora bien, al observar el denuedo de Pedro y de Juan[a], y al darse cuenta de que eran hombres sin instrucción y corrientes, se asombraban y reconocían que habían estado con Jesús.
  rationale: 'Se propone una reparación menor para mejorar fidelidad léxica y naturalidad española sin alterar la estructura del versículo: «denuedo» refleja mejor παρρησία en Hechos que «valentía», y «corrientes» suena más natural que «comunes» para ἰδιῶται en esta frase. Se conserva la nota alternativa documentada, pero con redacción española pulida.'
