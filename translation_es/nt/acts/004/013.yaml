review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: observación de la παρρησία, comprensión de la condición social/educativa de Pedro y Juan, asombro y reconocimiento de su asociación previa con Jesús. Sin embargo, «valentía» reduce un poco παρρησία al coraje y pierde el matiz de franqueza/denuedo en el hablar; y «hombres ... comunes» suena algo forzado en español en esta construcción. La nota alternativa también necesita mejor español y mejor correspondencia con el inglés auditado.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «hombres sin instrucción y comunes» no suena del todo natural; «hombres sin instrucción y del vulgo» sería demasiado cargado, mientras que «hombres sin instrucción y corrientes» o reestructurar la frase mejora la legibilidad. Además, «se asombraban» en este contexto puede sonar iterativo; «quedaron asombrados» o «estaban asombrados» sería más idiomático, aunque el imperfecto puede mantenerse. La mejor reparación pequeña es ajustar παρρησία a «denuedo» y suavizar la caracterización social con una nota.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto (Jesús, Dios, etc.). La principal cuestión léxica es παρρησία, donde «denuedo» preserva mejor el valor usual en Hechos que «valentía». Para ἀγράμματοι καὶ ἰδιῶται, conviene mantener la idea de falta de formación formal y de condición no profesional/oficial; en español, «sin instrucción y corrientes» funciona mejor que «comunes», con nota que preserve «sin letras y laicos».
  issues:
  - severity: medium
    issue: «valentía» para παρρησία
    rationale: Aunque comunica coraje, pierde parte del matiz de franqueza pública y denuedo característico de παρρησία en Hechos. «Denuedo» es más preciso y sigue siendo comprensible en registro bíblico moderno.
  - severity: medium
    issue: «hombres sin instrucción y comunes» suena poco natural
    rationale: La combinación adjetival final es gramatical pero poco idiomática en español eclesial general. «hombres sin instrucción y corrientes» o una reformulación equivalente preserva mejor el sentido de ἰδιῶται como no profesionales/no oficiales.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La nota empieza con una comilla innecesaria y «formación escolar o rabínica formal» puede pulirse a «formación académica o rabínica formal». También debe mantener de forma limpia la alternativa preservada en el inglés auditado.
  revised_spanish_text: Ahora bien, al observar el denuedo de Pedro y de Juan[a], y al darse cuenta de que eran hombres sin instrucción y corrientes, se asombraban y reconocían que habían estado con Jesús.
  revised_footnotes:
  - marker: a
    text: 'O: «sin letras y laicos». El griego describe a hombres sin formación académica o rabínica formal y sin estatus profesional oficial.'
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación menor para mejorar fidelidad léxica y naturalidad española sin alterar la estructura del versículo: «denuedo» refleja mejor παρρησία en Hechos que «valentía», y «corrientes» suena más natural que «comunes» para ἰδιῶται en esta frase. Se conserva la nota alternativa documentada, pero con redacción española pulida.'
