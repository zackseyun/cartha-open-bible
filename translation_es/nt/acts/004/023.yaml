translation:
  language: es
  text: Después de ser liberados[a], fueron a los suyos y les informaron todo lo que les habían dicho los principales sacerdotes y los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus compañeros»; más literalmente, «a los suyos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπολυθέντες
  english_pob_choice: After they were released
  chosen_spanish: Después de ser liberados
  alternatives_spanish:
  - Después de haber sido liberados
  - Cuando fueron liberados
  lexicon: BDAG
  rationale: El participio aoristo pasivo indica una acción anterior a la principal. «Liberados» conserva el matiz legal/custodial que el contexto demanda, sin forzar un calco pesado en español.
- source_word: δὲ
  english_pob_choice: After
  chosen_spanish: —(integrado en la cláusula temporal)
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: En español, el valor discursivo leve de δέ queda bien absorbido por la apertura temporal «Después de…», de modo que no se añade una conjunción separada que resulte artificial.
- source_word: ἦλθον
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - se dirigieron
  lexicon: BDAG
  rationale: «Ir/fueron» es el equivalente natural en español con πρὸς + acusativo en este contexto narrativo. «Vinieron» dependería más del punto de vista del destino.
- source_word: πρὸς τοὺς ἰδίους
  english_pob_choice: to their own people
  chosen_spanish: a los suyos
  alternatives_spanish:
  - a su propia gente
  - a sus compañeros
  - a su propio grupo
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente significa «a los propios / a los suyos». Se mantiene la fuerza relacional sin precisar más de lo que el texto dice. En español, «a los suyos» es breve y natural; el matiz comunitario queda implícito.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: les informaron
  alternatives_spanish:
  - les reportaron
  - les contaron
  - les anunciaron
  lexicon: BDAG
  rationale: «Informaron» transmite bien el acto de relatar formalmente lo ocurrido. «Les contaron» sería más coloquial; «reportaron» suena menos natural en español general.
- source_word: ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - cuanto
  lexicon: BDAG
  rationale: «Todo lo que» preserva el alcance total de la información sin añadir un tono arcaizante.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: BDAG
  rationale: Con un verbo de habla, πρός + acusativo indica destinatario del discurso. «Les» expresa esa relación de manera natural y evita una lectura hostil que el griego no exige.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  lexicon: BDAG
  rationale: Se elige «principales sacerdotes» para reflejar el plural institucional del término griego, no un único sumo sacerdote. «Sumos sacerdotes» puede sonar más técnico, pero en español también puede sugerir ambigüedad si no se atiende al plural.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los líderes
  lexicon: BDAG
  rationale: En este marco judío-institucional, πρεσβύτεροι designa a los miembros ancianos/líderes del consejo. «Ancianos» es fiel y ampliamente entendible; «presbíteros» cargaría un matiz eclesial posterior.
- source_word: εἶπαν
  english_pob_choice: had said
  chosen_spanish: les habían dicho
  alternatives_spanish:
  - dijeron
  - habían hablado
  lexicon: BDAG
  rationale: 'El pluscuamperfecto español conserva la secuencia temporal: primero hablaron los dirigentes, luego los discípulos lo relataron.'
theological_decisions:
- issue: Identidad de «τοὺς ἰδίους»
  english_pob_reading: their own people / their own companions
  chosen_spanish_reading: a los suyos
  alternative_spanish_readings:
  - a su propia gente
  - a sus compañeros
  - a su propio grupo
  rationale: No se especifica «compañeros» ni se estrecha a un grupo técnico; el griego solo marca pertenencia relacional. «A los suyos» conserva esa amplitud y deja abierta la referencia comunitaria precisa.
  doctrine_reference: Hechos 4:23; uso idiomático de ἴδιος
- issue: Título institucional de οἱ ἀρχιερεῖς
  english_pob_reading: the chief priests
  chosen_spanish_reading: los principales sacerdotes
  alternative_spanish_readings:
  - los sumos sacerdotes
  rationale: La forma plural del griego requiere un plural institucional. «Principales sacerdotes» evita confundir el pasaje con el singular funcional de «sumo sacerdote» y mantiene la referencia al grupo dirigente sacerdotal.
  doctrine_reference: Hechos 4:23; léxico sacerdotal del Segundo Templo
- issue: Tiempo verbal en εἶπαν dentro de una narración pasada
  english_pob_reading: had said
  chosen_spanish_reading: les habían dicho
  alternative_spanish_readings:
  - les dijeron
  rationale: El pluscuamperfecto en español comunica que la declaración de los líderes precede al reporte de los discípulos, como en el inglés POB auditado.
  doctrine_reference: Hechos 4:23; secuencia narrativa
translation_notes:
  revision_awareness: Coincide con el pasaje auditado sin revisiones aplicadas; se conserva la misma resolución de sentido que el inglés POB, adaptada al español con el mismo valor temporal y relacional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general de proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y cualquier terminología cristiana posterior, porque el texto no la contiene.
  - «Liberados» conserva el matiz de liberación legal/custodial de ἀπολύω, coherente con el contexto narrativo de arresto y comparecencia.
  - «A los suyos» preserva la ambigüedad útil del griego sin sobreespecificar destinatarios.
  - «Principales sacerdotes» y «ancianos» mantienen el registro institucional judío del pasaje.
