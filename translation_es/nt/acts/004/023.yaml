review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: liberación previa, ida hacia su comunidad y reporte de todo lo dicho por las autoridades. También conserva adecuadamente el sentido de πρὸς αὐτοὺς como destinatario (''les''). Sin embargo, la nota al pie no preserva bien la alternativa documentada en inglés: repite la lectura principal (''a los suyos'') y propone ''a los propios'', que en español suena menos natural y no representa bien la alternativa inglesa ''companions''.'
  spanish_quality_summary: El texto es claro y natural en español general. 'Después de ser liberados' y 'les informaron todo lo que...' son fluidos. 'A los suyos' funciona bien en el cuerpo del texto. La mejora necesaria está en la nota, para que ofrezca alternativas españolas idiomáticas y útiles al lector.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los principales sacerdotes' para οἱ ἀρχιερεῖς y 'los ancianos' para οἱ πρεσβύτεροι son aceptables y fieles al contexto institucional. No intervienen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie no reproduce fielmente las alternativas léxicas auditadas
    rationale: El inglés documenta 'their own companions' y 'more literally their own'. La nota española actual dice 'O «a los suyos», o más literalmente «a los propios»', lo cual repite la lectura principal y omite una alternativa idiomática equivalente a 'compañeros'.
  - severity: low
    issue: '''A los propios'' suena poco natural en español bíblico contemporáneo'
    rationale: Aunque intenta reflejar lo literal, en español amplio resulta menos claro que 'a los suyos' o 'a su propia gente'. Conviene ofrecer una alternativa más útil para lectura e interpretación.
  revised_spanish_text: Después de ser liberados[a], fueron a los suyos y les informaron todo lo que les habían dicho los principales sacerdotes y los ancianos.
  revised_footnotes:
  - marker: a
    text: O «a sus compañeros»; más literalmente, «a los suyos».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural. Solo se corrige la nota para reflejar con precisión el expediente léxico del POB en un español idiomático: una alternativa interpretativa (''a sus compañeros'') y la forma más literal (''a los suyos'').'
