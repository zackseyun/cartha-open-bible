translation:
  language: es
  text: 'Y, después de ponerlos en el centro[a], les preguntaban: «¿Con qué poder, o en qué nombre, hicieron esto ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «comenzaron a preguntarles» o «les inquirían». El imperfecto griego puede subrayar una investigación continua más que el inicio de la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσαντες
  english_pob_choice: after setting
  chosen_spanish: después de ponerlos
  alternatives_spanish:
  - habiéndolos puesto
  - después de colocarlos
  - cuando los pusieron
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera circunstancial y anterior a la pregunta. En español, “después de ponerlos” conserva la secuencia temporal sin sonar forzado. “Colocarlos” puede sonar demasiado técnico; “habiéndolos puesto” es más literal pero menos natural.
- source_word: ἐν τῷ μέσῳ
  english_pob_choice: in the midst
  chosen_spanish: en medio
  alternatives_spanish:
  - en el medio
  - en medio de ellos
  - ante ellos
  lexicon: BDAG
  rationale: La expresión griega mantiene una imagen espacial de colocarlos en el centro. “En medio” es la forma natural y fiel en español. “Ante ellos” interpretaría el escenario más allá del griego; “en el medio” es posible, pero menos idiomático en esta construcción.
- source_word: ἐπυνθάνοντο
  english_pob_choice: they began asking
  chosen_spanish: les preguntaban
  alternatives_spanish:
  - les hacían preguntas
  - comenzaron a preguntarles
  - les inquirían
  lexicon: BDAG
  rationale: El imperfecto puede expresar acción continua o reiterada. En español, “les preguntaban” conserva esa duración sin imponer el matiz inceptivo de “comenzaron a preguntarles”. “Inquirían” es correcto pero más marcado y menos natural en registro bíblico moderno.
- source_word: Ἐν ποίᾳ δυνάμει
  english_pob_choice: By what power
  chosen_spanish: ¿Con qué poder?
  alternatives_spanish:
  - ¿En qué poder?
  - ¿Por qué poder?
  - ¿Con qué autoridad?
  lexicon: BDAG
  rationale: La preposición ἐν puede llevar fuerza instrumental en este interrogatorio. En español, “con qué poder” comunica naturalmente la idea de medio o capacidad operativa. “Autoridad” alteraría el término griego δύναμις y borraría la distinción que hace el texto con “nombre”.
- source_word: ἢ ἐν ποίῳ ὀνόματι
  english_pob_choice: or in what name
  chosen_spanish: o en qué nombre
  alternatives_spanish:
  - o por qué nombre
  - o con qué nombre
  - o en nombre de quién
  lexicon: BDAG
  rationale: Se conserva el idioma bíblico “en qué nombre”, que en español es comprensible y reproduce la formulación griega. “Por qué nombre” suena menos natural; “en nombre de quién” interpretaría la referencia personal y no solo la fórmula lexical.
- source_word: ἐποιήσατε τοῦτο
  english_pob_choice: did you do this
  chosen_spanish: hicisteis esto
  alternatives_spanish:
  - habéis hecho esto
  - hicieron esto
  - realizasteis esto
  lexicon: BDAG
  rationale: El aoristo interrogativo se rinde con pasado simple. “Hicisteis” mantiene la segunda persona plural y la concisión del griego. “Realizasteis” es posible, pero menos directo; “habéis hecho” desplaza el tiempo verbal.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: vosotros
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  - vosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis. En español, “vosotros” mantiene el contraste y el peso del plural directo en un registro bíblico estándar. Si la serie editorial prefiriera un español exclusivamente latinoamericano, “ustedes” sería posible, pero aquí “vosotros” conserva mejor la fuerza del plural explícito sin añadir una glosa.
theological_decisions:
- issue: 'δύναμις: “poder” vs. “autoridad”'
  english_pob_reading: power
  chosen_spanish_reading: poder
  alternative_spanish_readings:
  - autoridad
  - capacidad
  rationale: La pregunta contrapone el medio de acción (“poder”) con la fórmula invocada (“nombre”). Traducir δύναμις como “poder” preserva el léxico del original y evita fusionarlo con la idea de autoridad, que el griego expresa más directamente con otros términos.
  doctrine_reference: Primacía del texto fuente y preservación de distinciones léxicas del original.
- issue: 'ἐν ποίῳ ὀνόματι: conservar la fórmula “en nombre”'
  english_pob_reading: in what name
  chosen_spanish_reading: en qué nombre
  alternative_spanish_readings:
  - por qué nombre
  - con qué autoridad
  rationale: La forma “en nombre” es una fórmula bíblica estable que comunica representación e invocación. Mantenerla evita diluir el valor teológico-jurídico de la expresión, especialmente en un contexto de interrogatorio sobre la autoridad del acto.
  doctrine_reference: Uso bíblico de la expresión representativa del “nombre” sin reemplazarla por equivalentes interpretativos.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego y el audit trail inglés, sin cambios de revisión indicados en la fuente. Se conserva la distinción entre δύναμις (“poder”) y ὄνομα (“nombre”), y el imperfecto ἐπυνθάνοντο se refleja con una forma española durativa.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene “nombre” como fórmula representativa bíblica, no como simple etiqueta onomástica.
  - Se ha preferido un registro natural pero reverente, apto para lectura eclesial.
  - La forma “vosotros” se usa para reflejar el plural explícito del griego; si la línea editorial exigiera uniformidad latinoamericana, podría revisarse a “ustedes” en toda la obra.
