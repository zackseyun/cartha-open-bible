translation:
  language: es
  text: estando muy molestos porque enseñaban al pueblo y proclamaban en Jesús[a] la resurrección de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el caso de Jesús»; la expresión griega «en Jesús» puede apuntar específicamente a la resurrección tal como se mostró en la propia resurrección de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: διαπονούμενοι
  english_pob_choice: being greatly disturbed
  chosen_spanish: estando grandemente perturbados
  alternatives_spanish:
  - estando muy molestos
  - estando muy irritados
  - estando angustiados
  lexicon: BDAG
  rationale: El participio expresa fuerte molestia o vexación. «Grandemente perturbados» conserva la intensidad sin sonar demasiado coloquial y mantiene el carácter pasivo/estado del participio en español.
- source_word: διὰ τὸ διδάσκειν
  english_pob_choice: because they were teaching
  chosen_spanish: porque enseñaban
  alternatives_spanish:
  - debido a que enseñaban
  - por estar enseñando
  - a causa de que enseñaban
  lexicon: BDAG
  rationale: La construcción con διά + infinitivo articular expresa causa. En español, una oración causal simple comunica mejor el valor de razón sin sobrecargar la sintaxis.
- source_word: αὐτοὺς
  english_pob_choice: they
  chosen_spanish: (omitido, recuperado por el contexto)
  alternatives_spanish:
  - ellos
  - estaban enseñando
  lexicon: BDAG
  rationale: El pronombre retoma a Pedro y Juan por el contexto inmediato. En español no hace falta explicitarlo en el núcleo de la cláusula causal, porque «enseñaban» ya permite la referencia anafórica natural.
- source_word: τὸν λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la multitud
  - al pueblo de Israel
  lexicon: BDAG
  rationale: «λαός» aquí designa al pueblo como colectivo. «Al pueblo» conserva ese sentido más preciso que «a la gente» y no introduce una especificación étnica que el texto no añade.
- source_word: καταγγέλλειν
  english_pob_choice: proclaiming
  chosen_spanish: proclamaban
  alternatives_spanish:
  - anunciaban
  - declaraban
  - predicaban
  lexicon: BDAG
  rationale: El verbo tiene fuerza de anuncio público. «Proclamaban» mantiene ese tono formal y público mejor que «predicaban», que puede sonar más eclesial que el griego.
- source_word: ἐν τῷ Ἰησοῦ
  english_pob_choice: in Jesus
  chosen_spanish: en Jesús[a]
  alternatives_spanish:
  - en el caso de Jesús
  - por medio de Jesús
  - acerca de Jesús
  lexicon: BDAG
  rationale: Se conserva la literalidad de ἐν para no resolver de antemano la relación semántica. La nota preserva la alternativa interpretativa que puede referirse a la resurrección mostrada en Jesús mismo.
- source_word: ἀνάστασιν
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - resurrección
  - el levantamiento
  lexicon: BDAG
  rationale: Con artículo, el sustantivo señala la resurrección como realidad definida y proclamada. «La resurrección» es la forma natural y fiel en español.
- source_word: τὴν ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La frase griega sugiere salir del conjunto de los muertos. «De entre los muertos» conserva mejor esa idea que el más breve «de los muertos».
theological_decisions:
- issue: Sentido de ἐν τῷ Ἰησοῦ aplicado a la resurrección
  english_pob_reading: The phrase is rendered transparently as 'in Jesus,' allowing the text to indicate that the resurrection being proclaimed is manifested in or centered in Jesus.
  chosen_spanish_reading: La frase se deja como «en Jesús», permitiendo que la proclamación se entienda como centrada en Jesús o manifiesta en él, sin cerrarla demasiado.
  alternative_spanish_readings:
  - en el caso de Jesús
  - por medio de Jesús
  - acerca de Jesús
  rationale: El griego admite más de una relación cercana. Mantener «en Jesús» conserva la tensión interpretativa señalada en el inglés POB y evita una paráfrasis que decida más de lo que el texto dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de «la resurrección de entre los muertos»
  english_pob_reading: The wording allows both the immediate reference to Jesus' resurrection and the broader apostolic proclamation of resurrection as demonstrated in him.
  chosen_spanish_reading: La redacción deja abierta tanto la referencia inmediata a la resurrección de Jesús como la proclamación más amplia de la resurrección mostrada en él.
  alternative_spanish_readings:
  - solo la resurrección de Jesús
  - la doctrina general de la resurrección futura
  rationale: La sintaxis griega puede evocar ambas dimensiones. La traducción evita restringir el sentido a una sola lectura cuando el texto no lo hace.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el auditorio de revisión inglés, sin cambios frente al último pase registrado; se mantiene la apertura interpretativa de ἐν τῷ Ἰησοῦ mediante nota, y se conserva el tono público de καταγγέλλειν con «proclamaban».
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en este registro, pero no aparece en este versículo.
  - Se mantiene «resurrección» para ἀνάστασις por ser el término cristiano estándar y fiel al griego.
  - «Pueblo» traduce λαός en sentido colectivo, no como multitud casual.
  - La puntuación sigue el uso español; la coma final del griego no se reproduce salvo como cierre natural de la oración.
