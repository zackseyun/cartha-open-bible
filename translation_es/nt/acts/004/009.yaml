    rationale: Aunque 'se nos interroga' es una alternativa válida, el POB no la conservó como nota de lector en este versículo. Dado que sí preservó la polisemia de σῴζω, conviene no desplazar la atención de la nota principal.
  - severity: low
    issue: Los signos de interrogación pueden sobredeterminar la sintaxis.
    rationale: El griego presenta una condición abierta que introduce la defensa de Pedro; el inglés POB la deja como oración incompleta con raya final. En español, sin necesidad de imitar la puntuación inglesa exactamente, es mejor evitar convertirlo en pregunta cerrada.
