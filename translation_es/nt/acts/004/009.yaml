translation:
  language: es
  text: Si hoy se nos examina acerca de una buena obra hecha a un hombre enfermo, por qué medio[a] este hombre ha sido sanado[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante qué» o «por quién». El griego puede señalar el medio o instrumento, y en el relato la respuesta inmediata nombrará a Jesús.
    reason: alternative_reading
  - marker: b
    text: O «ha sido salvado» o «ha sido hecho sano»; el verbo griego puede referirse a rescate, salvación o sanidad. Aquí el contexto inmediato apunta a la sanidad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνακρινόμεθα
  english_pob_choice: are being examined
  chosen_spanish: se nos examina
  alternatives_spanish:
  - se nos interroga
  - se nos juzga
  - estamos siendo examinados
  lexicon: BDAG
  rationale: El verbo puede tener matiz judicial o investigativo. «Se nos examina» conserva el sentido de indagación formal sin volverlo más duro que el griego ni forzar «juicio» donde el contexto inmediato es una investigación sobre el hecho.
- source_word: ἐπὶ εὐεργεσίᾳ
  english_pob_choice: concerning a good deed
  chosen_spanish: acerca de una buena obra
  alternatives_spanish:
  - por una buena obra
  - con respecto a una buena acción
  - sobre un acto de bondad
  lexicon: BDAG
  rationale: ἐπί con dativo expresa aquí base u ocasión. «Acerca de» reproduce bien el tema de la indagación, y «buena obra» transmite εὐεργεσία con un registro natural en español sin perder la ironía del caso.
- source_word: ἀνθρώπου ἀσθενοῦς
  english_pob_choice: to a sick man
  chosen_spanish: a un hombre enfermo
  alternatives_spanish:
  - a un hombre débil
  - a un hombre enfermo y débil
  - a un hombre afligido
  lexicon: BDAG
  rationale: En este contexto ἀσθενής se refiere a enfermedad o debilidad física, ligada al milagro de sanidad. «Hombre enfermo» es claro y comunica la condición del beneficiario sin sobredeterminarla.
- source_word: ἐν τίνι
  english_pob_choice: by what means
  chosen_spanish: por qué medio
  alternatives_spanish:
  - mediante qué
  - por cuál medio
  - por quién
  lexicon: BDAG
  rationale: La construcción con ἐν y el interrogativo puede expresar medio o instrumento. «Por qué medio» preserva esa amplitud y deja abierta la forma específica de la agencia, como hace el griego.
- source_word: σέσωσται
  english_pob_choice: has been healed
  chosen_spanish: ha sido sanado
  alternatives_spanish:
  - ha sido salvado
  - ha sido hecho sano
  - ha sido restaurado
  lexicon: BDAG
  rationale: σῴζω puede significar salvar, rescatar o sanar. Aquí el contexto inmediato es la restauración física del hombre, por lo que «ha sido sanado» es la opción principal; aun así, la polisemia se conserva en la decisión teológica para no borrar la posibilidad de «salvado» en el trasfondo del verbo.
theological_decisions:
- issue: La polisemia de σῴζω en un contexto de sanidad
  english_pob_reading: has been healed
  chosen_spanish_reading: ha sido sanado
  alternative_spanish_readings:
  - ha sido salvado
  - ha sido hecho sano
  rationale: El episodio trata de la recuperación física del hombre cojo, así que la lectura principal debe ser sanidad. Sin embargo, como σῴζω también puede significar salvación, conviene no desactivar esa resonancia semántica del verbo; se deja abierta en las alternativas para mantener la tensión lexical del griego.
  doctrine_reference: Principio POB de preservar la tensión semántica cuando el contexto inmediato es específico pero el verbo admite un alcance mayor.
translation_notes:
  revision_awareness: El texto inglés revisado mantiene la relación explicativa entre la acusación sobre una «buena obra» y la pregunta concreta sobre el medio de la sanidad. La versión española refleja esa misma relación con una coma que introduce la pregunta final, sin añadir o quitar contenido al sentido del griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando el texto no exige aquí el nombre divino.
  - Se mantiene «sanado» para σῴζω en el sentido inmediato de sanidad física, sin borrar su posible trasfondo de salvación.
  - «Buena obra» se escogió por naturalidad y para conservar el valor benéfico de εὐεργεσία.
  - «Por qué medio» preserva la apertura del interrogativo griego sin fijarlo de antemano como «por quién».
