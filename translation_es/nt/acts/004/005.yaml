translation:
  language: es
  text: Y aconteció que al día siguiente fueron reunidos sus gobernantes, ancianos y escribas en Jerusalén.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se reunieron» o «se congregaron». El verbo griego es pasivo en su forma («fueron reunidos»).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: BDAG
  rationale: La fórmula narrativa ἐγένετο con δέ introduce avance del relato. «Aconteció» preserva el giro narrativo con dignidad y evita un calco demasiado pesado; además, mantiene la cadencia bíblica sin forzar arcaísmo extremo.
- source_word: ἐπὶ τὴν αὔριον
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - para el día siguiente
  lexicon: BDAG
  rationale: El modismo temporal se expresa naturalmente en español como «al día siguiente». Conserva el valor idiomático de la construcción griega sin rigidizarla en una forma menos natural.
- source_word: συναχθῆναι
  english_pob_choice: were gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - fueron congregados
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo presenta el hecho de la reunión. En español, el reflejo pronominal «se reunieron» comunica bien el resultado colectivo y mantiene el sentido pasivo sin sonar artificioso. «Fueron reunidos» preservaría más la pasividad formal, pero suena menos natural en este contexto.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: BDAG
  rationale: El pronombre genitivo se vierte de manera posesiva natural en español como «sus», manteniendo la relación marcada por el griego sin añadir una especificación no explicitada en el versículo.
- source_word: τοὺς ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - dirigentes
  - príncipes
  lexicon: BDAG
  rationale: En este contexto de liderazgo judío, ἄρχοντες designa autoridades que ejercen gobierno. «Gobernantes» es claro y suficientemente amplio; «dirigentes» enfatizaría función de liderazgo, pero puede ser menos preciso para la carga de autoridad.
- source_word: τοὺς πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: En contexto institucional, πρεσβύτεροι alude a líderes reconocidos, no solo a personas de mayor edad. «Ancianos» es la equivalencia tradicional en español bíblico y conserva esa función comunitaria; «presbíteros» sería más técnico y eclesial, pero aquí no es necesario.
- source_word: τοὺς γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - letrados
  - doctores de la ley
  lexicon: BDAG
  rationale: γραμματεῖς designa la clase scribal/legal. «Escribas» es el equivalente directo y tradicional en español, sin expandir indebidamente su función.
- source_word: Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La localización es directa. «En Jerusalén» reproduce fielmente el locativo sin añadir elementos no presentes en el griego.
theological_decisions:
- issue: Valor pasivo de συναχθῆναι y su presentación en español
  english_pob_reading: were gathered together
  chosen_spanish_reading: se reunieron
  alternative_spanish_readings:
  - fueron reunidos
  - fueron congregados
  rationale: La POB inglesa decidió reflejar la forma pasiva del verbo. En español, una pasiva perifrástica sería posible, pero el reflexivo «se reunieron» transmite con naturalidad el evento colectivo y no borra el hecho de la reunión. Se mantiene así la fuerza narrativa sin sobrecargar la sintaxis.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Identificación no explicitada del antecedente de αὐτῶν
  english_pob_reading: their rulers
  chosen_spanish_reading: sus gobernantes
  alternative_spanish_readings:
  - los gobernantes de ellos
  - los gobernantes de esas personas
  rationale: El griego conserva el pronombre posesivo sin desarrollar el antecedente dentro del versículo. «Sus» preserva esa relación de manera idiomática sin imponer una identificación más estrecha que la del contexto inmediato.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el pasaje fuente; la redacción inglesa más reciente permaneció sin cambios y el cotejo externo indicó alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en general según la convención del proyecto, pero este versículo no contiene referencia al nombre divino.
  - Se usa «ancianos» para πρεσβυτέρους como término bíblico comunitario estándar en español, no como referencia meramente etaria.
  - 'Se preserva el orden enumerativo simple de tres grupos: gobernantes, ancianos y escribas.'
