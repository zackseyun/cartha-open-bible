translation:
  language: es
  text: 'diciendo[a]: «¿Qué debemos hacer con estos hombres? Porque, en efecto, una señal notable ha ocurrido por medio de ellos, evidente para todos los que habitan en Jerusalén, y no podemos negarlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una señal bien conocida». El griego γνωστόν puede significar «conocido» o «bien conocido» y, en este contexto, expresa la idea de una señal públicamente reconocida.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del discurso del consejo; en español, «diciendo» conserva esa conexión participial sin añadir una temporalidad innecesaria. «Y decían» también es posible, pero introduce una coordinación menos directa con el contexto.
- source_word: Τί ποιήσωμεν
  english_pob_choice: What should we do
  chosen_spanish: ¿Qué debemos hacer?
  alternatives_spanish:
  - ¿Qué hemos de hacer?
  - ¿Qué haremos?
  lexicon: BDAG
  rationale: Es una pregunta deliberativa. «Debemos hacer» comunica bien la deliberación en español moderno y mantiene el matiz de decisión práctica. «¿Qué hemos de hacer?» es posible, pero suena más tradicional; «¿Qué haremos?» puede sonar menos deliberativo.
- source_word: τοῖς ἀνθρώποις τούτοις
  english_pob_choice: with these men
  chosen_spanish: con estos hombres
  alternatives_spanish:
  - a estos hombres
  - con estas personas
  lexicon: BDAG
  rationale: El dativo con ποιέω en este giro se entiende naturalmente en español como «con». ἄνθρωποι aquí se refiere a varones concretos en el contexto narrativo, por lo que «hombres» conserva la referencia específica. «Personas» suavizaría innecesariamente el rasgo contextual.
- source_word: ὅτι μὲν γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque, en efecto
  alternatives_spanish:
  - Pues, en verdad
  - Porque, ciertamente
  lexicon: BDAG
  rationale: La combinación introduce explicación con énfasis. «Porque, en efecto» preserva ambos valores de modo natural en español y no sobrecarga la frase.
- source_word: γνωστὸν σημεῖον
  english_pob_choice: a notable sign
  chosen_spanish: una señal notable
  alternatives_spanish:
  - una señal conocida
  - una señal bien conocida
  lexicon: BDAG
  rationale: γνωστός puede significar «conocido» o «notable / bien conocido». En este contexto, el énfasis está en la notoriedad pública del hecho en Jerusalén; «señal notable» comunica esa visibilidad pública sin convertir el texto en una paráfrasis interpretativa. Se usa «señal» para conservar el peso teológico de σημεῖον.
- source_word: γέγονεν
  english_pob_choice: has happened
  chosen_spanish: ha ocurrido
  alternatives_spanish:
  - ha sucedido
  - se ha realizado
  lexicon: BDAG
  rationale: El perfecto indica un hecho completado con relevancia presente. «Ha ocurrido» es natural en español y encaja con el acontecimiento de la señal.
- source_word: δι’ αὐτῶν
  english_pob_choice: through them
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - a través de ellos
  - por ellos
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o instrumento. «Por medio de ellos» preserva esa mediación sin sugerir demasiado la autoría humana independiente.
- source_word: πᾶσιν τοῖς κατοικοῦσιν Ἰερουσαλήμ
  english_pob_choice: to all who live in Jerusalem
  chosen_spanish: visible para todos los que habitan en Jerusalén
  alternatives_spanish:
  - conocida para todos los que viven en Jerusalén
  - manifiesta a todos los que habitan en Jerusalén
  lexicon: BDAG
  rationale: La idea es que el hecho quedó patente ante la población de Jerusalén. «Visible para todos» recoge bien el predicado del texto; «habitan» mantiene un registro digno y fiel al participio. Se evita «habitantes» para conservar la construcción verbal del griego.
- source_word: φανερόν
  english_pob_choice: evident
  chosen_spanish: visible
  alternatives_spanish:
  - evidente
  - manifiesta
  lexicon: BDAG
  rationale: φανερός expresa algo patente, abierto, manifiesto. En español, «visible» funciona bien junto a «para todos» y mantiene la idea de publicidad; «evidente» también sería correcto, pero aquí la redacción fluye mejor con el complemento preposicional.
- source_word: οὐ δυνάμεθα ἀρνεῖσθαι
  english_pob_choice: we cannot deny it
  chosen_spanish: no podemos negarlo
  alternatives_spanish:
  - no somos capaces de negarlo
  - no podemos negarla
  lexicon: BDAG
  rationale: ἀρνέομαι aquí significa negar o desmentir. En español, el pronombre neutro «lo» retoma la señal implícita en el contexto. «Negarlo» conserva la fuerza idiomática y evita repetir un sustantivo innecesario.
theological_decisions:
- issue: Naturaleza de σημεῖον en contexto de sanidad/milagro público
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - milagro
  - prodigio
  rationale: '«Señal» preserva el término de Lucas y su carga teológica: el hecho no es solo un prodigio, sino un acto con significado que apunta más allá de sí mismo. «Milagro» explicita el aspecto extraordinario, pero reduce la tensión semántica del texto; por eso se mantiene «señal».'
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión lexical/teológica
- issue: Relación entre la mediación apostólica y la agencia del signo
  english_pob_reading: has happened through them
  chosen_spanish_reading: ha ocurrido por medio de ellos
  alternative_spanish_readings:
  - ha sido hecho por ellos
  - ha sucedido por ellos
  rationale: La formulación mantiene la mediación de los apóstoles sin atribuirles el poder como fuente autónoma. «Por medio de ellos» deja claro que son instrumentos del hecho, coherente con la sintaxis del griego y con el contexto narrativo.
  doctrine_reference: Instrumentalidad humana bajo la acción de Dios en Hechos
- issue: Público de Jerusalén como testigo colectivo
  english_pob_reading: evident to all who live in Jerusalem
  chosen_spanish_reading: visible para todos los que habitan en Jerusalén
  alternative_spanish_readings:
  - evidente para todos los que viven en Jerusalén
  - manifiesto a todos los que habitan en Jerusalén
  rationale: La frase resalta que el hecho fue públicamente reconocible, no una experiencia privada. «Visible» mantiene esa apertura pública; al mismo tiempo, la nota de notoriedad queda implícita en el contexto inmediato.
  doctrine_reference: Testimonio público y verificable en el relato de Hechos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que reemplazó «well-known sign» por «notable sign» para reflejar con más precisión γνωστόν. En español se optó por «señal notable» en la construcción principal, mientras que la nota conserva la posibilidad semántica de «conocida / bien conocida» sin perder la lectura pública del contexto. También se observó la tensión entre «evident/visible» y la necesidad de una frase natural en español; por eso se integró el valor de φανερόν con una formulación fluida.
  spanish_consistency_notes:
  - Se mantuvo «señal» para σημεῖον a fin de conservar el lenguaje teológico de Hechos.
  - Se eligió «por medio de ellos» para mantener la mediación instrumental de δι’ αὐτῶν.
  - Se usó «no podemos negarlo» con pronombre neutro porque el objeto implícito es la señal/hecho, no un referente personal.
  - El registro es formal pero natural para lectura eclesial en español latinoamericano.
