translation:
  language: es
  text: Y les echaron mano y los pusieron bajo custodia hasta el día siguiente[a][b], porque ya era tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrestaron». La expresión griega es literalmente «les echaron mano» y suele usarse para una aprehensión hostil.
    reason: lexical_alternative
  - marker: b
    text: O «los pusieron en la cárcel» o «los pusieron bajo guardia». El griego habla de mantenerlos bajo custodia sin especificar el lugar exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβαλον ... τὰς χεῖρας
  english_pob_choice: laid hands on
  chosen_spanish: les echaron mano
  alternatives_spanish:
  - les pusieron las manos encima
  - los arrestaron
  - los aprehendieron
  lexicon: BDAG
  rationale: El griego usa una expresión idiomática de acción hostil. En español, «les echaron mano» conserva el golpe idiomático y comunica aprehensión física sin volverla un tecnicismo jurídico demasiado fuerte. «Los arrestaron» explicaría el resultado, pero perdería el sabor del giro original.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con pronombre de objeto indirecto en español tras el giro idiomático. «Les» mantiene fluidez y referencia clara a Pedro y Juan.
- source_word: ἔθεντο εἰς τήρησιν
  english_pob_choice: put them in custody
  chosen_spanish: los pusieron bajo custodia
  alternatives_spanish:
  - los pusieron en prisión
  - los dejaron bajo guardia
  - los retuvieron
  lexicon: BDAG
  rationale: τήρησις puede significar custodia, vigilancia o guardia. «Bajo custodia» conserva la amplitud del griego sin especificar una cárcel concreta. «En prisión» sería más específico de lo que el texto dice.
- source_word: εἰς τὴν αὔριον
  english_pob_choice: until the next day
  chosen_spanish: hasta el día siguiente
  alternatives_spanish:
  - hasta mañana
  lexicon: BDAG
  rationale: La expresión temporal se vierte de forma natural en español como «hasta el día siguiente». Evita un calco rígido y mantiene el valor temporal de demora.
- source_word: ἦν γὰρ ἑσπέρα ἤδη
  english_pob_choice: for it was already evening
  chosen_spanish: porque ya era de noche
  alternatives_spanish:
  - porque ya era tarde
  - pues ya anochecía
  - porque ya era ya entrada la tarde
  lexicon: BDAG
  rationale: ἑσπέρα indica tarde/noche según el contexto. En español, «ya era de noche» refleja bien la razón dada para postergar el asunto y suena natural en narrativa. Aunque «tarde» también es posible, «noche» comunica mejor el avance del día insinuado por el griego.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el testimonio griego SBLGNT y el audit trail inglés: conserva el idiomatismo de «echaron mano», evita concretar indebidamente la forma de detención de τήρησις, y traduce la cláusula temporal y causal con equivalencias naturales en español. No se registran revisiones aplicadas en el expediente inglés; por ello el borrador español mantiene la misma lectura base sin expandirla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Custodia» se mantiene como término amplio para τήρησις, en línea con la cautela del inglés POB.
  - «De noche» se eligió para ἑσπέρα en función del contexto narrativo; se reconoce que «de tarde» sería menos preciso aquí.
  - Los marcadores de nota [a][b] aparecen en el texto principal y corresponden a alternativas léxicas reales, no a glosas libres.
