  to: 'Pero Pedro y Juan respondieron y les dijeron: «Si es justo delante de Dios escucharlos[a] a ustedes antes que a Dios, juzguen ustedes mismos».'
  rationale: Se ajusta el texto para reflejar explícitamente ambos verbos de habla del griego, conforme a la decisión auditada del POB inglés, y se mueve la nota al verbo ἀκούειν, que es donde realmente corresponde la alternativa «obedecer». También se mejora la naturalidad panhispánica con «escucharlos».
