translation:
  language: es
  text: 'Pero Pedro y Juan respondieron y les dijeron: «Si es justo delante de Dios escucharlos[a] a ustedes antes que a Dios, juzguen ustedes mismos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «obedecerlos a ustedes antes que a Dios». El verbo griego significa literalmente «oír/escuchar», pero en este contexto implica atender a una autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ Πέτρος καὶ Ἰωάννης
  english_pob_choice: But Peter and John
  chosen_spanish: Pero Pedro y Juan
  alternatives_spanish:
  - Y Pedro y Juan
  - Ahora bien, Pedro y Juan
  lexicon: BDAG
  rationale: δέ marca transición con leve contraste; «Pero» reproduce bien ese giro en español. No se expresa el artículo griego porque en español no sería natural aquí.
- source_word: ἀποκριθέντες ... εἶπον
  english_pob_choice: answered and said
  chosen_spanish: les respondieron
  alternatives_spanish:
  - respondieron y dijeron
  - contestaron
  lexicon: BDAG
  rationale: En español, «respondieron» comunica la función del par verbal sin forzar una repetición pesada como «respondieron y dijeron». Se conserva el carácter de respuesta directa al tribunal/autoridades.
- source_word: δίκαιόν
  english_pob_choice: right
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - correcto
  - adecuado
  lexicon: BDAG
  rationale: Aquí el término evalúa lo que es moral y judicialmente apropiado delante de Dios. «Justo» preserva mejor esa fuerza que «correcto» o «adecuado».
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: in the sight of God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - a la vista de Dios
  - en presencia de Dios
  lexicon: BDAG
  rationale: «Delante de Dios» es una expresión natural y fiel al valor evaluativo de ἐνώπιον, sin perder la idea de estar bajo su juicio o consideración.
- source_word: ἀκούειν
  english_pob_choice: to listen to
  chosen_spanish: escucharles
  alternatives_spanish:
  - oírlos
  - obedecerles
  lexicon: BDAG
  rationale: El griego dice literalmente «oír/escuchar». En español, «escucharles» mantiene la forma lexical y deja que el contexto exprese la implicación de obedecer sin imponerla en la traducción principal.
- source_word: μᾶλλον ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: BDAG
  rationale: «Antes que» funciona naturalmente en español para una comparación excluyente de preferencia/obediencia y preserva el contraste del griego.
- source_word: κρίνατε
  english_pob_choice: judge for yourselves
  chosen_spanish: juzguen ustedes mismos
  alternatives_spanish:
  - juzguen
  - decidan ustedes
  lexicon: BDAG
  rationale: La forma imperativa exige una evaluación por parte de los oyentes. «Ustedes mismos» explicita el sentido reflexivo/discursivo que el inglés POB marcó con «for yourselves».
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a esas personas
  lexicon: BDAG
  rationale: El dativo pronominal en español se expresa con naturalidad mediante el clítico «les» en el verbo de habla.
theological_decisions:
- issue: Si traducir ἀκούειν como «obedecer» en lugar de «escuchar»/«oír»
  english_pob_reading: Retain the more literal 'listen to you rather than to God' in the main text
  chosen_spanish_reading: Mantener «escucharles a ustedes antes que a Dios» en el texto principal
  alternative_spanish_readings:
  - obedecerles a ustedes antes que a Dios
  - hacerles caso antes que a Dios
  rationale: El contexto apunta claramente a la obediencia, pero el griego usa ἀκούω, no un verbo más explícito para «obedecer». La traducción principal conserva esa tensión textual y deja la inferencia al lector; una nota puede señalar la lectura interpretativa posible.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con el control cruzado: no se registraron revisiones pendientes ni cambios de última pasada. La presente redacción sigue la línea auditada de mantener la literalidad de ἀκούειν en el cuerpo principal y explicitar en nota la implicación de obediencia.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - «Delante de Dios» conserva el valor evaluativo de ἐνώπιον sin usar una fórmula eclesiástica más marcada.
  - El verbo de habla se naturaliza a «respondieron» para evitar una calca pesada de «answered and said».
  - La nota usa una alternativa interpretativa, no una corrección textual.
