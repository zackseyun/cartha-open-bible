base_translation:
  language: en
  yaml_path: translation/nt/acts/004/032.yaml
  text: Now the multitude of those who had believed were of one heart and soul[a], and not even one of them said that anything belonging to him was his own[b], but all things were held in common among them.
  footnotes:
