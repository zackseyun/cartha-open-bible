review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: la gran cantidad de creyentes, la unidad interior (''corazón y alma''), el énfasis de ''ni siquiera uno'', y la posesión común. Sin embargo, hay dos puntos a ajustar para mayor fidelidad: (1) la nota [a] en español dice «compartían todo», pero el texto usa «todas las cosas», por lo que conviene alinear la nota con «lo compartían todo»; (2) la nota [b] explica mal el distributivo singular, porque αὐτῷ corresponde a ''a él / de cada uno'', no a «uno de ellos».'
  spanish_quality_summary: El español es claro, natural y digno. 'Ahora bien' funciona bien para δέ. 'De un solo corazón y una sola alma' es fiel y legible. 'Todas las cosas eran comunes entre ellos' es comprensible, aunque algo más idiomático sería 'todo era común entre ellos'; con todo, la forma actual sigue siendo aceptable y cercana al griego.
  glossary_alignment: No hay términos del glosario principal en disputa en este versículo. Las decisiones léxicas concuerdan en general con el POB inglés. La única desalineación relevante está en la formulación de la nota distributiva y en la alternativa dinámica de la nota [a].
  issues:
  - severity: medium
    issue: La nota [b] atribuye el singular distributivo a «uno de ellos» en vez de al posesivo singular subyacente en αὐτῷ.
    rationale: En el griego, οὐδὲ εἷς da 'ni siquiera uno', pero el distributivo explicado por el POB inglés está específicamente en αὐτῷ ('a él', 'de cada uno'). La nota actual confunde ambos elementos y puede inducir a una explicación gramatical incorrecta.
  - severity: low
    issue: La nota [a] ofrece una alternativa dinámica no del todo alineada con el español del texto principal.
    rationale: El POB inglés dice 'they shared everything'; en español, la alternativa más natural y exacta es «lo compartían todo», no «compartían todo», aunque ambas son comprensibles.
  revised_spanish_text: Ahora bien, la multitud de los que habían creído era de un solo corazón y una sola alma[a], y ni siquiera uno de ellos decía que algo de lo que poseía era suyo[b], sino que todas las cosas eran comunes entre ellos.
  revised_footnotes:
  - marker: a
    text: 'O, de forma más dinámica: «lo compartían todo».'
    reason: lexical_alternative
  - marker: b
    text: El singular en «lo que poseía» refleja el singular distributivo del griego («a él»), refiriéndose a cada persona individualmente.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse, pero las notas deben corregirse para reflejar con precisión el análisis del griego y la alternativa dinámica documentada en el POB inglés.
