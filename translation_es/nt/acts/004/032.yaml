translation:
  language: es
  text: Ahora bien, la multitud de los que habían creído era de un solo corazón y una sola alma[a], y ni siquiera uno de ellos decía que algo de lo que poseía era suyo[b], sino que todas las cosas eran comunes entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más dinámica: «compartían todo».'
    reason: lexical_alternative
  - marker: b
    text: El singular «uno de ellos» refleja el singular distributivo del griego, donde la idea es «a cada uno» o «a él individualmente».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθους
  english_pob_choice: multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - grupo
  - número
  - comunidad
  lexicon: BDAG
  rationale: πλῆθος señala un conjunto numeroso; «multitud» conserva la idea de gran número sin diluirla en un término más genérico.
- source_word: τῶν πιστευσάντων
  english_pob_choice: of those who had believed
  chosen_spanish: de los que habían creído
  alternatives_spanish:
  - de los creyentes
  - de los que creían
  lexicon: BDAG
  rationale: El participio aoristo pide reflejar una fe ya ocurrida respecto a la descripción narrativa; «habían creído» conserva ese matiz verbal mejor que un sustantivo abstracto.
- source_word: καρδία καὶ ψυχὴ μία
  english_pob_choice: of one heart and soul
  chosen_spanish: de un solo corazón y una sola alma
  alternatives_spanish:
  - de un corazón y un alma
  - unidos en corazón y alma
  lexicon: BDAG
  rationale: La locución expresa unidad profunda de vida interior y propósito. En español, «de un solo corazón y una sola alma» mantiene ambos sustantivos y su cualidad de unidad sin volverla paráfrasis.
- source_word: οὐδὲ εἷς
  english_pob_choice: not even one of them
  chosen_spanish: ni siquiera uno de ellos
  alternatives_spanish:
  - nadie
  - ni uno
  lexicon: BDAG
  rationale: La construcción es enfática; «ni siquiera uno de ellos» conserva la fuerza de οὐδὲ y encaja con el singular distributivo que sigue.
- source_word: τι τῶν ὑπαρχόντων αὐτῷ
  english_pob_choice: anything belonging to him
  chosen_spanish: algo de lo que poseía
  alternatives_spanish:
  - algo de sus posesiones
  - algo de lo que era suyo
  lexicon: BDAG
  rationale: τῶν ὑπαρχόντων alude a bienes o posesiones. «Algo de lo que poseía» mantiene el sentido posesivo sin sonar forzado; el singular distributivo de αὐτῷ queda reflejado en «de ellos»/«lo que poseía» aplicado a cada persona.
- source_word: ἔλεγεν ἴδιον εἶναι
  english_pob_choice: said that ... was his own
  chosen_spanish: decía que ... era suyo
  alternatives_spanish:
  - reclamaba ... como propio
  - decía que ... le pertenecía exclusivamente
  lexicon: BDAG
  rationale: ἴδιον subraya pertenencia privada. «Era suyo» reproduce con naturalidad la afirmación de propiedad sin intensificarla más allá del griego.
- source_word: πάντα κοινά
  english_pob_choice: all things were held in common among them
  chosen_spanish: todas las cosas eran comunes entre ellos
  alternatives_spanish:
  - lo compartían todo
  - todo era común para ellos
  lexicon: BDAG
  rationale: κοινά significa común/compartido. «Eran comunes entre ellos» conserva la estructura copulativa y la idea de tenencia compartida; «lo compartían todo» es más dinámico y menos pegado a la sintaxis del griego.
theological_decisions:
- issue: Descripción de la vida comunitaria y de la propiedad
  english_pob_reading: The verse is translated descriptively as reporting voluntary communal sharing, without importing a later economic or ecclesial system.
  chosen_spanish_reading: El versículo se vierte de manera descriptiva, como testimonio de comunión voluntaria de bienes, sin convertirlo en un modelo económico o eclesial posterior.
  alternative_spanish_readings:
  - La iglesia tenía todas las cosas en común como norma obligatoria
  - Cada uno conservaba en privado lo suyo
  rationale: El griego afirma que nadie trataba algo como propiedad exclusiva y que todo era común entre ellos. La traducción conserva esa tensión descriptiva sin añadir una estructura doctrinal posterior ni minimizar el carácter compartido.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audio de decisiones del POB en inglés, manteniendo el paralelismo entre «one heart and soul» y la estructura copulativa de «all things were common». No se introducen cambios respecto del pasaje base ni se desplazan las implicaciones de propiedad comunitaria más allá de lo que el griego dice explícitamente.
  spanish_consistency_notes:
  - Se usa «multitud» para πλῆθος, en consonancia con la decisión inglesa.
  - Se evita «SEÑOR» u otro recurso de ocultamiento del nombre divino porque no aparece en este versículo.
  - «Corazón» y «alma» se conservan ambos para no aplanar la unidad interior expresada por καρδία καὶ ψυχὴ μία.
  - La formulación «algo de lo que poseía» mantiene el valor posesivo de τῶν ὑπαρχόντων sin convertirlo en una paráfrasis sociológica.
  - «Comunes entre ellos» preserva la cláusula copulativa de κοινά y deja abierta la lectura descriptiva de la comunidad de bienes.
