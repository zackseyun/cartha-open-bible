  text: συνήχθησαν γὰρ ἐπ’ ἀληθείας ⸂ἐν τῇ πόλει ταύτῃ⸃ ἐπὶ τὸν ἅγιον παῖδά σου Ἰησοῦν, ὃν ἔχρισας, Ἡρῴδης τε καὶ Πόντιος Πιλᾶτος σὺν ἔθνεσιν καὶ λαοῖς Ἰσραήλ,
base_translation:
  language: en
  yaml_path: translation/nt/acts/004/027.yaml
  text: For truly in this city Herod and Pontius Pilate[a], together with the Gentiles and the peoples of Israel, were gathered against your holy servant Jesus, whom you anointed[b],
  footnotes:
  - marker: a
    text: Or "your holy child Jesus." The Greek παῖς can mean either "servant" or "child"; here "servant" is preferred because of the likely echo of Isaiah’s Servant language.
    reason: lexical_alternative
  - marker: b
    text: Or "the nations and the people of Israel." The Greek reads "Gentiles/nations" and "peoples" (plural) of Israel.
    reason: lexical_alternative
