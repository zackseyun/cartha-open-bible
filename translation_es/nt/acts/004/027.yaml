translation:
  language: es
  text: Porque en verdad, en esta ciudad, Herodes y Poncio Pilato, junto con los gentiles y los pueblos de Israel, se reunieron contra tu santo siervo Jesús[a], a quien ungiste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu santo niño Jesús». El griego παῖς puede significar «siervo» o «niño»; aquí se prefiere «siervo» por el probable eco del lenguaje del Siervo de Isaías.
    reason: lexical_alternative
  - marker: b
    text: O «las naciones y los pueblos de Israel». El griego dice «gentiles/naciones» y «pueblos» (plural) de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: were gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se juntaron
  lexicon: BDAG
  rationale: El aoristo pasivo presenta una acción completada de reunión o coalición. En español, 'se reunieron' conserva la idea de agrupación efectiva sin forzar una pasiva artificial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Funciona como nexo explicativo con lo anterior; 'Porque' mantiene bien la conexión causal/discursiva en español.
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - realmente
  lexicon: BDAG
  rationale: Expresa el matiz enfático de 'en verdad/realmente' de forma natural y solemne en español.
- source_word: ἐν τῇ πόλει ταύτῃ
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - en esta misma ciudad
  lexicon: BDAG
  rationale: La referencia a Jerusalén queda clara por el contexto; no hace falta explicitarla en el texto principal.
- source_word: ἐπὶ τὸν
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - frente a
  lexicon: BDAG
  rationale: En este contexto de hostilidad, 'contra' reproduce bien la fuerza adversativa de ἐπί con acusativo.
- source_word: ἅγιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - apartado
  lexicon: BDAG
  rationale: '''Santo'' comunica la consagración y la cualidad reverente de manera natural en español bíblico contemporáneo.'
- source_word: παῖδά σου
  english_pob_choice: your holy servant
  chosen_spanish: tu santo siervo
  alternatives_spanish:
  - tu santo niño
  - tu santo hijo
  lexicon: BDAG
  rationale: La tradición de Hechos y el trasfondo de Isaías favorecen 'siervo' para preservar la alusión al Siervo de Yahvé sin sobretraducir a 'hijo'.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio.
- source_word: ὃν ἔχρισας
  english_pob_choice: whom you anointed
  chosen_spanish: a quien ungiste
  alternatives_spanish:
  - a quien nombraste
  - a quien designaste
  lexicon: BDAG
  rationale: '''Ungiste'' conserva el valor literal de χρίω y mantiene la resonancia mesiánica sin imponer el sustantivo ''Mesías'' donde no aparece.'
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  lexicon: BDAG
  rationale: Forma habitual en español para el nombre del gobernante.
- source_word: Πόντιος Πιλᾶτος
  english_pob_choice: Pontius Pilate
  chosen_spanish: Poncio Pilato
  lexicon: BDAG
  rationale: Forma habitual en español para el nombre del gobernador romano.
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  lexicon: BDAG
  rationale: '''Junto con'' comunica mejor la idea de alianza o participación conjunta que un simple ''con''.'
- source_word: ἔθνεσιν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En el contraste con Israel, 'gentiles' refleja mejor la oposición étnico-religiosa del texto.
- source_word: λαοῖς Ἰσραήλ
  english_pob_choice: the peoples of Israel
  chosen_spanish: los pueblos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: BDAG
  rationale: El plural λαοῖς se conserva mejor con 'pueblos' para reflejar la forma griega documentada por la POB inglesa.
theological_decisions:
- issue: Rendering of παῖς for Jesus
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - niño
  - hijo
  rationale: La lectura contextual en Hechos sigue el eco de Isaías sobre el Siervo; 'siervo' mantiene esa tensión y no desplaza la cristología hacia una equivalencia más interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5; cristología bíblica y siervo de Yahvé
- issue: Rendering of ἔθνεσιν in contrast with Israel
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: El contraste con 'los pueblos de Israel' es identitario y religioso; 'gentiles' comunica con claridad la oposición entre no judíos e Israel.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando en el texto principal los anclajes [a] y [b] exactamente donde corresponden, de modo que cada nota queda vinculada a una palabra o frase concreta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto solo cuando corresponda; este versículo no la contiene.
  - Se preservó la distinción léxica entre «siervo» y posibles lecturas alternativas de παῖς, sin borrar la tensión documentada.
  - Se conservó el plural de λαοῖς con «pueblos», siguiendo la forma griega y la observación del audit trail inglés.
  - Se evitó introducir «Mesías» como sustituto de un verbo de unción, porque aquí el griego usa χρίω y no el título Χριστός.
