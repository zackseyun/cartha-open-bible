translation:
  language: es
  text: Los reyes de la tierra tomaron posición[a], y los gobernantes se reunieron juntos contra el Señor y contra su Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se levantaron»; el griego sugiere una toma deliberada de postura en oposición, en eco de Salmo 2:2.
    reason: alternative_reading
lexical_decisions:
- source_word: παρέστησαν
  english_pob_choice: took their stand
  chosen_spanish: se pusieron[a]
  alternatives_spanish:
  - tomaron postura
  - se alinearon
  - se pusieron en pie
  lexicon: BDAG
  rationale: El griego y el eco de Salmo 2:2 expresan una toma de posición deliberada, no solo el acto físico de ponerse de pie. En español, «se pusieron» puede funcionar como una puesta en posición/oposición; por eso se deja la nota para el matiz intertextual. Mantiene la fuerza sin sonar forzado.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  - monarcas
  lexicon: BDAG
  rationale: «Reyes» conserva la precisión del sustantivo griego y el paralelismo con el salmo citado. «Gobernantes» sería demasiado general y perdería el título político específico.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del mundo
  - de la tierra habitada
  lexicon: BDAG
  rationale: En este eco de Salmo 2, γῆ tiene alcance amplio, no local. «De la tierra» reproduce el idioma bíblico natural en español y mantiene la resonancia intertextual.
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - líderes
  lexicon: BDAG
  rationale: «Gobernantes» es claro y moderno en español, y cubre el campo semántico de ἄρχοντες sin el matiz demasiado arcaico o nobiliario de «príncipes». Se prefirió esta forma para una lectura pública fluida.
- source_word: συνήχθησαν
  english_pob_choice: were gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  - se juntaron
  lexicon: BDAG
  rationale: El pasivo griego puede expresarse con un reflexivo natural en español. «Se reunieron» conserva la idea de reunión concertada y evita una construcción pesada, aunque el texto inglés mantiene más explícita la pasividad.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en un mismo lugar
  - a una misma cosa
  - a una
  lexicon: BDAG
  rationale: La locución idiomática significa reunión conjunta. En español, «juntos» es la opción más natural; aquí se integra en «se reunieron» para no sobrecargar la frase.
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en oposición a
  lexicon: BDAG
  rationale: La preposición marca oposición hostil en ambos casos. «Contra» es la correspondencia directa y más idiomática en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En la cita del Salmo, κύριος remite al título divino. En español, «el Señor» preserva ese peso bíblico y litúrgico, y evita reducirlo a un simple «amo» o «maestro».
- source_word: χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - Ungido
  lexicon: BDAG
  rationale: El contexto de Salmo 2:2 enfatiza el sentido titulado y mesiánico de Χριστός. En español, «Mesías» preserva mejor el trasfondo hebreo de «su ungido» que «Cristo», que puede sonar ya como nombre propio.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: El pronombre remite naturalmente al Señor. «Su Mesías» mantiene la relación posesiva directa del griego y su claridad en español.
theological_decisions:
- issue: Título divino κύριος en una cita de Salmo 2
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para יהוה en el texto principal, aquí el griego cita κύριος dentro de la formulación del Salmo. En español, «el Señor» conserva la forma bíblica reconocible y respeta la cita griega tal como aparece en Hechos.
  doctrine_reference: 'DOCTRINE.md: κύριος en citas veterotestamentarias puede conservar la forma de cita bíblica cuando el griego la presenta así.'
- issue: Χριστός como título en un eco de Salmo 2
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - Ungido
  rationale: El versículo no usa aquí Χριστός como simple nombre devocional, sino como título interpretado a la luz del Salmo 2. «Mesías» mantiene la tensión de «ungido» y la carga mesiánica sin latinizar el término.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título.'
translation_notes:
  revision_awareness: Se revisó la alineación con el texto griego SBLGNT y con el audit trail inglés. Se mantuvo la equivalencia del eco de Salmo 2, la oposición hostil marcada por κατὰ y la lectura titulada de Χριστός como «Mesías». No se detectaron cambios necesarios respecto del último pase revisado.
  spanish_consistency_notes:
  - Se evitó usar «Cristo» como nombre fijo porque en este contexto la fuente destaca el título mesiánico.
  - Se conservó «el Señor» para κύριος por tratarse de una cita bíblica con fuerte resonancia teológica.
  - La pasividad de συνήχθησαν se suavizó a una forma reflexiva natural en español, sin perder el sentido de reunión concertada.
  - «De la tierra» mantiene el paralelismo del Salmo 2 mejor que una paráfrasis como «del mundo».
