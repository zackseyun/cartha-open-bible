    issue: «se pusieron[a]» no traduce adecuadamente παρέστησαν
    rationale: El verbo griego, en eco de Salmo 2:2, expresa una toma de postura deliberada contra alguien. «Se pusieron» en español queda truncado, no comunica oposición por sí mismo y puede percibirse como traducción incompleta.
  - severity: medium
    issue: No se expresa claramente ἐπὶ τὸ αὐτό
    rationale: La auditoría inglesa conserva «together», y las decisiones léxicas españolas reconocen «juntos», pero el texto final omite ese matiz. Aunque «se reunieron» sugiere colectividad, conviene hacerlo explícito para mayor fidelidad y para corresponder al análisis documentado.
  - severity: low
    issue: La nota alternativa actual depende de una base textual débil
    rationale: Si se cambia a una formulación principal más adecuada como «tomaron posición», la nota debe revisarse para ofrecer una alternativa real y útil, no una explicación compensatoria de una traducción deficiente.
  revised_spanish_text: Los reyes de la tierra tomaron posición[a], y los gobernantes se reunieron juntos contra el Señor y contra su Mesías.
