translation:
  language: es
  text: Y ahora[a], Señor, mira sus amenazas y concede a tus siervos hablar tu palabra con toda valentía,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus esclavos» o «tus servidores»; δοῦλος puede denotar a uno que pertenece a un amo. Aquí «siervos» se usa porque el contexto de oración resalta el servicio humilde a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τὰ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora mismo
  lexicon: BDAG
  rationale: La expresión introduce el ruego como una transición temporal/discursiva natural. «Y ahora» conserva la fuerza idiomática del griego sin forzar una paráfrasis.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Es una invocación directa a Dios en oración. «Señor» es la equivalencia estable y reverente en español.
- source_word: ἔπιδε ἐπὶ
  english_pob_choice: look upon
  chosen_spanish: mira
  alternatives_spanish:
  - mira sobre
  - atiende a
  - mira las
  lexicon: BDAG
  rationale: El imperativo pide que Dios preste atención a algo concreto. «Mira» es más natural en español; el complemento «las amenazas de ellos» conserva el objeto del verbo sin añadir interpretaciones.
- source_word: ἀπειλὰς
  english_pob_choice: threats
  chosen_spanish: amenazas
  alternatives_spanish:
  - amenazamientos
  lexicon: BDAG
  rationale: Es el equivalente directo y natural del sustantivo plural. «Amenazas» mantiene la referencia concreta a la hostilidad sufrida por la comunidad.
- source_word: δὸς
  english_pob_choice: grant
  chosen_spanish: concede
  alternatives_spanish:
  - da
  - otorga
  lexicon: BDAG
  rationale: Aunque literalmente es «da», en una súplica dirigida a Dios «concede» expresa mejor una petición reverente de habilitación para actuar.
- source_word: τοῖς δούλοις σου
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: BDAG
  rationale: Se preserva el peso lexical de δοῦλος con «esclavos», evitando suavizarlo a «siervos». En este contexto de pertenencia total a Dios, la fuerza subordinante del término es relevante y auditable.
- source_word: μετὰ παρρησίας πάσης
  english_pob_choice: with all boldness
  chosen_spanish: con toda valentía
  alternatives_spanish:
  - con toda osadía
  - con plena libertad
  lexicon: BDAG
  rationale: παρρησία aquí implica franqueza intrépida para hablar. «Valentía» comunica bien ese campo semántico en español y mantiene el intensificador «toda».
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - proclamar
  lexicon: BDAG
  rationale: El infinitivo expresa la acción pedida sin requerir un verbo técnico. «Hablar» es el valor básico y suficientemente preciso; «proclamar» sería más interpretativo.
- source_word: τὸν λόγον σου
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu mensaje
  lexicon: BDAG
  rationale: λόγος en este contexto se refiere al mensaje de Dios. «Tu palabra» conserva el idioma bíblico y la relación con la proclamación apostólica.
theological_decisions:
- issue: δοῦλος al dirigirse a Dios en oración
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: La guía de terminología permite «esclavo» cuando el griego δοῦλος conserva fuerza lexical. Aquí la oración subraya pertenencia y sumisión totales a Dios; por eso se mantiene la tensión del término en vez de neutralizarla.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; translation philosophy on preserving lexical force'
translation_notes:
  revision_awareness: 'La traducción revisa la elección del inglés POB para δοῦλος: en español se optó por preservar la fuerza lexical con «esclavos» en lugar de suavizarla a «siervos». No se detectan otras revisiones necesarias respecto del paquete fuente y del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε en contexto de oración.
  - «Tu palabra» conserva el idioma bíblico habitual para λόγος sin perder transparencia.
  - «Con toda valentía» busca equivaler la intensidad de παρρησία πάσης en un español natural.
  - La puntuación y el orden reflejan una súplica continua y no una frase fragmentaria.
