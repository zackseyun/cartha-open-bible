review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: transición discursiva («Y ahora»), vocativo («Señor»), petición doble («mira… y concede…»), objeto («las amenazas de ellos») y propósito infinitivo («hablar tu palabra») con el matiz de παρρησία. Sin embargo, se aparta del rastro auditado del POB en una decisión clave: τοῖς δούλοις σου fue resuelto en inglés como «your servants» por razón contextual y teológica, y el español cambió eso a «tus esclavos» con una justificación contraria a la decisión documentada. Además, «hablar tu palabra» suena menos natural que «hablar de tu palabra» o «anunciar tu palabra», pero dado que λαλεῖν + acusativo permite una traducción más directa, conviene mantener la cercanía y mejorar solo donde haga falta para fluidez.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «mira las amenazas de ellos» suena menos idiomático que «mira sus amenazas». La frase «tus esclavos» en oración a Dios es comprensible, pero aquí resulta más dura de lo que pide el expediente y menos natural para lectura eclesial general. «Con toda valentía» es aceptable para παρρησία πάσης, aunque «con todo denuedo» o «con toda franqueza» serían opciones posibles; no es necesario cambiarlas.
  glossary_alignment: Hay un desajuste importante con la política contextual de δοῦλος en este pasaje. Aunque el proyecto normalmente favorece «esclavo» cuando el inglés POB eligió «slave», aquí el inglés auditado eligió explícitamente «servants» por el contexto de oración humilde. Por lo tanto, el español debe alinearse con «tus siervos» o «tus servidores», preferiblemente «tus siervos» por registro bíblico natural. No hay conflicto relevante con otros términos del glosario.
  issues:
  - severity: high
    issue: δοῦλοις σου fue traducido como «tus esclavos» en vez de seguir la decisión auditada contextual de «your servants».
    rationale: El expediente inglés documenta expresamente que en este contexto de oración la postura de servicio humilde a Dios prima sobre la fuerza social de «slave». El español no debe revertir esa decisión sin nueva evidencia fuente.
  - severity: medium
    issue: La nota al pie defiende «esclavos» y por tanto contradice la razón léxica/theológica auditada.
    rationale: 'La nota no preserva una alternativa; redefine la decisión de manera opuesta al registro inglés. Debe invertirse: texto principal con «siervos» y nota con alternativas «esclavos»/«servidores».'
  - severity: low
    issue: «las amenazas de ellos» es correcto pero poco idiomático en español general.
    rationale: «Sus amenazas» expresa el genitivo αὐτῶν de forma más natural sin pérdida de sentido.
  revised_spanish_text: Y ahora[a], Señor, mira sus amenazas y concede a tus siervos hablar tu palabra con toda valentía,
  revised_footnotes:
  - marker: a
    text: O «tus esclavos» o «tus servidores»; δοῦλος puede denotar a uno que pertenece a un amo. Aquí «siervos» se usa porque el contexto de oración resalta el servicio humilde a Dios.
    reason: lexical_alternative
