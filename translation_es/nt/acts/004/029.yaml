- from: Y ahora[a], Señor, mira las amenazas de ellos, y concede a tus esclavos hablar tu palabra con toda valentía,
  to: Y ahora[a], Señor, mira sus amenazas y concede a tus siervos hablar tu palabra con toda valentía,
