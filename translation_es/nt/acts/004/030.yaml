translation:
  language: es
  text: mientras extiendes tu mano para sanar[a], y señales y prodigios se realizan por medio del nombre de tu santo siervo Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu santo hijo Jesús». El griego pais puede significar «hijo» o «siervo»; aquí se prefiere «siervo» porque Hechos evoca el lenguaje del Siervo de Isaías.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ ... ἐκτείνειν
  english_pob_choice: while you stretch out
  chosen_spanish: mientras extiendes
  alternatives_spanish:
  - as you stretch out
  - al extender
  lexicon: BDAG
  rationale: La construcción ἐν τῷ + infinitivo expresa circunstancia temporal concomitante. En español, «mientras» conserva esa relación de simultaneidad de forma natural sin volver la frase rígida.
- source_word: χεῖρά σου
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano extendida
  - tu brazo
  lexicon: BDAG
  rationale: «Mano» reproduce el idiomático bíblico de acción y poder divinos sin añadir interpretación. No se amplía a «brazo» porque el griego dice literalmente mano.
- source_word: εἰς ἴασιν
  english_pob_choice: for healing
  chosen_spanish: para sanidad
  alternatives_spanish:
  - para curación
  - para sanar
  lexicon: BDAG
  rationale: ἴασις denota sanidad/curación. «Sanidad» es una traducción clara y eclesiásticamente comprensible en español; se evita «sanar» porque el sintagma aquí funciona como propósito, no como verbo.
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - señales milagrosas y prodigios
  lexicon: BDAG
  rationale: La pareja fija de Hechos suele traducirse con dos sustantivos coordinados. «Prodigios» comunica bien τέρατα en registro bíblico y mantiene la fuerza del par sin explicitar «milagrosas».
- source_word: γίνεσθαι
  english_pob_choice: are done
  chosen_spanish: se realizan
  alternatives_spanish:
  - acontecen
  - tienen lugar
  - se hacen
  lexicon: BDAG
  rationale: Aquí γίνομαι expresa ocurrencia de hechos. «Se realizan» mantiene la pasividad/resultatividad de la frase mejor que un simple «acontecen» y suena natural en español.
- source_word: διὰ τοῦ ὀνόματος
  english_pob_choice: through the name
  chosen_spanish: por medio del nombre
  alternatives_spanish:
  - por el nombre
  - a través del nombre
  lexicon: BDAG
  rationale: διά con genitivo indica medio/instrumento. «Por medio del nombre» explicita la mediación de forma fiel y clara, preservando la teología bíblica del nombre como agente de autoridad.
- source_word: τοῦ ἁγίου παιδός σου Ἰησοῦ
  english_pob_choice: of your holy servant Jesus
  chosen_spanish: de tu santo siervo Jesús
  alternatives_spanish:
  - de tu santo hijo Jesús
  - de tu santo servidor Jesús
  lexicon: BDAG
  rationale: παῖς admite «hijo/niño» o «siervo». En Hechos, el eco del Siervo de Yahvé favorece «siervo», que además evita una connotación de inmadurez. «Santo» traduce ἁγίου de modo directo.
theological_decisions:
- issue: παῖς aplicado a Jesús
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - hijo
  - niño
  rationale: El contexto de Hechos 3 y 4 alude al Siervo de Isaías; traducir παῖς como «siervo» conserva esa resonancia bíblica y no minimiza la dignidad de Jesús. La alternativa «hijo/niño» se reserva como posibilidad léxica, pero no es la lectura preferida en el texto principal.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación entre la mano de Dios y la ocurrencia de señales
  english_pob_reading: signs and wonders are done through the name of your holy servant Jesus
  chosen_spanish_reading: señales y prodigios se realizan por medio del nombre de tu santo siervo Jesús
  alternative_spanish_readings:
  - señales y prodigios ocurren por medio del nombre de tu santo siervo Jesús
  - señales y prodigios son hechas por medio del nombre de tu santo siervo Jesús
  rationale: La formulación conserva el valor instrumental de διά y el carácter eventivo de γίνομαι, sin forzar una interpretación doctrinal adicional. El texto conecta la acción de Dios con el nombre de Jesús, tal como en el griego y el flujo de la oración.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa revisó la primera formulación para hacer más natural ἐν τῷ + infinitivo y para reflejar γίνεσθαι como ocurrencia de hechos. En español, «mientras extiendes» y «se realizan» siguen esa misma revisión, manteniendo el paralelismo sintáctico y el matiz de acción en curso.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiera; aquí no aparece el Tetragrámaton ni un κύριος que deba explicitarse.
  - Se conserva «Jesús» como nombre propio establecido.
  - «Siervo» se mantiene como término técnico para παῖς en este contexto de Hechos, en coherencia con la pauta del proyecto y con el eco isaiano.
  - «Señales y prodigios» reproduce la pareja fija de Hechos sin añadir calificativos interpretativos.
