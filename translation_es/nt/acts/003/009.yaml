  text: Y todo el pueblo lo vio caminando y alabando a Dios,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se conserva la simple coordinación narrativa sin introducir una relación temporal más fuerte de la que exige el griego.
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - miró
  lexicon: BDAG
  rationale: El aoristo de ὁράω expresa aquí la percepción del hombre sanado; 'vio' es el equivalente natural y directo en español.
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo en conjunto
  - la gente toda
  lexicon: BDAG
  rationale: πᾶς con el singular articulado tiene sentido colectivo. 'Pueblo' conserva el valor de λαός como una colectividad definida, más que una multitud indiferenciada.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre de objeto directo en español se ajusta naturalmente con 'lo', manteniendo la referencia al hombre sanado del contexto previo.
- source_word: περιπατοῦντα
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - andando
  - caminando de un lado a otro
  lexicon: BDAG
  rationale: El participio presente describe la acción visible del hombre. 'Caminando' comunica de manera clara el hecho del andar recuperado sin sobretraducir.
- source_word: καὶ αἰνοῦντα
  english_pob_choice: and praising
  chosen_spanish: y alabando
  alternatives_spanish:
  - y dando alabanza
  - y bendiciendo
  lexicon: BDAG
  rationale: αἰνέω significa alabar en reconocimiento reverente. 'Alabando' es la forma más natural y digna en español para este contexto de adoración.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: En español, el objeto directo personal animado suele llevar la preposición 'a'. Se mantiene 'Dios' como el término regular para θεός, sin necesidad de mayor explicitación.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; por eso la versión española sigue de cerca la estructura simple del versículo sin añadir matices interpretativos.
  spanish_consistency_notes:
  - Se mantiene 'pueblo' para λαός en sentido colectivo, coherente con el valor del sustantivo en contextos narrativos.
  - Se usa 'Dios' para θεός conforme al criterio del proyecto.
  - No se introducen notas porque el versículo no presenta variantes textuales ni tensiones léxicas relevantes en el material provisto.
