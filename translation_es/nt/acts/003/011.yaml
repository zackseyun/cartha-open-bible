revisions:
- from: Mientras él se aferraba a Pedro y a Juan, todo el pueblo, [a]asombrado sobremanera[b], corrió hacia ellos en el pórtico llamado de Salomón.
  to: Mientras él se aferraba[a] a Pedro y a Juan, todo el pueblo, sumamente asombrados, acudió corriendo hacia ellos en el pórtico llamado de Salomón.[b]
  rationale: Se corrigió la concordancia y la naturalidad de la frase que vierte ἔκθαμβοι, se reubicó la nota léxica en el verbo que realmente comenta, y se ajustó συνέδραμεν para reflejar mejor la idea de convergencia rápida y colectiva. Se mantuvo 'pórtico' y 'de Salomón' conforme al audit trail y al uso natural del español eclesial moderno.
