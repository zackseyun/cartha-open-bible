translation:
  language: es
  text: Mientras él se aferraba[a] a Pedro y a Juan, todo el pueblo, sumamente asombrados, acudió corriendo hacia ellos en el pórtico llamado de Salomón.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego permite también la idea de 'mientras se mantenía agarrado a' Pedro y a Juan; κρατέω subraya el agarre firme o el aferrarse.
    reason: lexical_alternative
  - marker: b
    text: '''Pórtico'' designa aquí una galería cubierta con columnas en el recinto del templo, tradicionalmente conocida como el Pórtico de Salomón.'
    reason: cultural_note
lexical_decisions:
- source_word: Κρατοῦντος δὲ αὐτοῦ
  english_pob_choice: While he was holding on to
  chosen_spanish: Mientras él se aferraba a
  alternatives_spanish:
  - Mientras sostenía a
  - Mientras se agarraba a
  lexicon: BDAG / uso natural del español
  rationale: El participio en genitivo absoluto expresa acción contemporánea; κρατέω aquí indica tomar fuertemente o mantenerse sujeto. 'Se aferraba a' conserva la idea de adhesión física intensa y suena natural en español, sin añadir emoción excesiva.
- source_word: τὸν Πέτρον καὶ τὸν Ἰωάννην
  english_pob_choice: Peter and John
  chosen_spanish: Pedro y a Juan
  alternatives_spanish:
  - Pedro y Juan
  lexicon: Nombres propios transliterados
  rationale: Se mantienen los nombres propios en su forma habitual en español. La repetición de la preposición 'a' conserva el régimen personal del español y la relación directa del verbo con ambos objetos.
- source_word: συνέδραμεν
  english_pob_choice: ran together
  chosen_spanish: corrió hacia ellos
  alternatives_spanish:
  - acudió corriendo hacia ellos
  - corrió junto con los demás hacia ellos
  lexicon: BDAG / sintaxis española
  rationale: συντρέχω expresa converger rápidamente. En español, 'corrió hacia ellos' comunica la acción colectiva con fluidez; el valor de 'juntos' queda ya reforzado por 'todo el pueblo'.
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la multitud
  lexicon: BDAG
  rationale: λαός se vierte mejor como 'pueblo' en este contexto templeario, donde no se trata sólo de una multitud genérica sino del pueblo reunido. 'Todo' mantiene el sentido inclusivo de πᾶς.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - en dirección a ellos
  lexicon: BDAG
  rationale: Con valor de movimiento, πρός + acusativo indica dirección. 'Hacia ellos' expresa mejor el desplazamiento que un simple 'a ellos', que en español puede sonar menos dinámico.
- source_word: ἐπὶ τῇ στοᾷ
  english_pob_choice: at the portico
  chosen_spanish: en el pórtico
  alternatives_spanish:
  - junto al pórtico
  - en la galería
  lexicon: BDAG
  rationale: στοά designa una galería cubierta o pórtico columnado. 'Pórtico' es el término más transparente y común en español para este elemento arquitectónico del templo.
- source_word: τῇ καλουμένῃ Σολομῶντος
  english_pob_choice: called Solomon’s
  chosen_spanish: llamado de Salomón
  alternatives_spanish:
  - conocido como el de Salomón
  - llamado el pórtico de Salomón
  lexicon: BDAG
  rationale: El participio pasivo de καλέω se traduce con 'llamado'. Como la frase ya incluye 'pórtico', 'de Salomón' evita una repetición innecesaria y conserva el nombre convencional del lugar.
- source_word: ἔκθαμβοι
  english_pob_choice: utterly astonished
  chosen_spanish: asombrado sobremanera
  alternatives_spanish:
  - sumamente asombrado
  - sobrecogido de asombro
  lexicon: BDAG
  rationale: ἔκθαμβος expresa asombro intenso. 'Asombrado sobremanera' conserva la fuerza sin recurrir a una locución demasiado literaria o arcaizante.
translation_notes:
  revision_awareness: El texto español sigue de cerca el estado final del POB inglés, que no requirió revisiones en el pase más reciente (sin cambios). Se preserva la secuencia narrativa, la intensidad de ἔκθαμβοι y la referencia arquitectónica del pórtico del templo sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio, evitando 'porche' o 'galería' donde 'pórtico' es el término más estable para στοά.
  - Se conserva la dirección dinámica de πρός con 'hacia ellos'.
  - La nota cultural distingue el nombre tradicional del lugar sin sustituir el término base del texto.
