review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el audit trail inglés en la estructura general: transición con «Pero», respuesta de Pedro al pueblo, vocativo «Hombres de Israel», maravilla ante el hecho, mirada sostenida hacia los apóstoles, y negación de poder propio o cualidad religiosa propia como causa de que el hombre ande. Sin embargo, hay pequeños desajustes de fidelidad/forma: la nota [a] no preserva bien la alternativa inglesa documentada, y «piedad» como término principal es posible pero menos claro y menos alineado con la decisión inglesa principal «godliness», especialmente en español eclesial amplio donde puede sonar más a acto devocional que a cualidad de vida piadosa.'
  spanish_quality_summary: El texto es mayormente natural y legible en español. «Hombres de Israel» funciona bien; «se maravillan» y «nos miran fijamente» son claros. La cláusula final suena natural. No obstante, «piedad» puede resultar menos transparente que «devoción» o «vida piadosa», y la nota [a] actual («miren fijamente») cambia indebidamente la persona verbal en lugar de ofrecer una alternativa léxica bien formada en contexto.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). La principal cuestión léxica es εὐσεβείᾳ: para reflejar mejor la rationale del POB inglés, conviene usar «devoción» en el texto principal y dejar «piedad» como alternativa en nota. Esto mantiene la negación de una cualidad religiosa propia sin sonar arcaico ni ambiguo.'
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada
    rationale: El inglés conserva una alternativa completa para ἀτενίζω («why are you looking intently at us?»). La nota española «O “miren fijamente”» no corresponde bien al contexto ni a la persona verbal; debería dar una alternativa como «o “por qué nos contemplan atentamente”» o similar.
  - severity: medium
    issue: «Piedad» como texto principal queda menos alineado con la decisión principal del POB
    rationale: Aunque εὐσέβεια puede traducirse «piedad», en español general puede sugerir más fácilmente devoción religiosa o compasión según contexto. «Devoción» en el texto principal, con «piedad» en nota, comunica mejor la cualidad religiosa propia que Pedro niega y sigue más de cerca la rationale inglesa sobre «godliness/piety».
  - severity: low
    issue: «Lo vio» es comprensible pero «vio esto» sería un poco más transparente
    rationale: El objeto está implícito en griego y el inglés lo suple como «it». En español, «esto» evita una referencia pronominal algo flotante, aunque no es un error de fidelidad mantener «lo».
  revised_spanish_text: 'Pero cuando Pedro vio esto, respondió al pueblo: «Hombres de Israel, ¿por qué se maravillan de esto, o por qué nos miran fijamente[a] como si por nuestro propio poder o devoción[b] hubiéramos hecho que él caminara?»'
  revised_footnotes:
