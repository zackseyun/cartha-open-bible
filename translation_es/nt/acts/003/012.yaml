    text: O «por qué nos contemplan atentamente». El verbo implica una mirada sostenida o intensa.
    reason: lexical_alternative
  - marker: b
    text: O «piedad». Pedro niega que la curación haya procedido de una cualidad religiosa propia de los apóstoles.
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores para mejorar fidelidad y claridad: «vio esto» explicita mejor el objeto implícito; la nota [a] ahora ofrece una alternativa contextual y gramaticalmente correcta para ἀτενίζω; y «devoción» como texto principal para εὐσεβείᾳ se alinea mejor con la rationale del POB inglés, dejando «piedad» como alternativa válida en nota.'
