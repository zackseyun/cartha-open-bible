translation:
  language: es
  text: 'Pero cuando Pedro vio esto, respondió al pueblo: «Hombres de Israel, ¿por qué se maravillan de esto, o por qué nos miran fijamente[a] como si por nuestro propio poder o devoción[b] hubiéramos hecho que él caminara?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por qué nos contemplan atentamente». El verbo implica una mirada sostenida o intensa.
    reason: lexical_alternative
  - marker: b
    text: O «piedad». Pedro niega que la curación haya procedido de una cualidad religiosa propia de los apóstoles.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when Peter saw it
  chosen_spanish: cuando Pedro lo vio
  alternatives_spanish:
  - al ver esto Pedro
  - cuando Pedro vio esto
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte temporalmente. «Lo» recoge el referente implícito del contexto: la reacción ante el hombre sanado.'
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición con matiz de contraste entre la reacción de la multitud y la respuesta de Pedro.
- source_word: ἀπεκρίνατο πρὸς τὸν λαόν
  english_pob_choice: he answered the people
  chosen_spanish: respondió al pueblo
  alternatives_spanish:
  - contestó al pueblo
  - se dirigió al pueblo
  lexicon: BDAG
  rationale: «Responder» preserva el giro griego de réplica dirigida al pueblo y suena natural en español bíblico contemporáneo.
- source_word: Ἄνδρες Ἰσραηλῖται
  english_pob_choice: Men of Israel
  chosen_spanish: Hombres de Israel
  alternatives_spanish:
  - Varones de Israel
  - Israelitas
  lexicon: BDAG
  rationale: La forma vocativa masculina se conserva de manera directa. «Hombres de Israel» es fiel y comprensible en español actual.
- source_word: τί θαυμάζετε ἐπὶ τούτῳ
  english_pob_choice: why do you marvel at this
  chosen_spanish: ¿por qué se maravillan de esto?
  alternatives_spanish:
  - ¿por qué se asombran de esto?
  - ¿por qué se admiran de esto?
  lexicon: BDAG
  rationale: «Maravillarse» reproduce bien θαυμάζω con un tono elevado sin perder claridad. «De esto» mantiene la referencia al hecho de la sanidad.
- source_word: ἢ ἡμῖν τί ἀτενίζετε
  english_pob_choice: or why do you stare at us
  chosen_spanish: o por qué nos miran fijamente[a]
  alternatives_spanish:
  - o por qué nos contemplan fijamente
  - o por qué nos fijan la vista
  lexicon: BDAG
  rationale: ἀτενίζω implica una mirada sostenida e intensa; «mirar fijamente» conserva ese valor mejor que un simple «mirar». El pie de nota preserva la alternativa léxica documentada.
- source_word: ὡς ἰδίᾳ δυνάμει
  english_pob_choice: as though by our own power
  chosen_spanish: como si por nuestro propio poder
  alternatives_spanish:
  - como si mediante nuestro propio poder
  - como si con nuestro propio poder
  lexicon: BDAG
  rationale: «Propio» traduce ἰδίᾳ con la fuerza de posesión/pertenencia personal. «Poder» mantiene la capacidad eficaz atribuida erróneamente a los apóstoles.
- source_word: εὐσεβείᾳ
  english_pob_choice: godliness
  chosen_spanish: piedad[b]
  alternatives_spanish:
  - devoción
  - devotidad
  lexicon: BDAG
  rationale: Aquí εὐσέβεια puede verterse como «piedad» en español bíblico, conservando el matiz de reverencia religiosa. La nota mantiene visible la alternativa «piedad/godliness» del audit trail.
- source_word: πεποιηκόσιν
  english_pob_choice: we had made
  chosen_spanish: hubiéramos hecho
  alternatives_spanish:
  - hubiésemos hecho
  - habríamos hecho
  lexicon: BDAG
  rationale: En discurso irreal dependiente de «como si», el pluscuamperfecto de subjuntivo refleja mejor la atribución supuesta que el indicativo simple.
- source_word: τοῦ περιπατεῖν αὐτόν
  english_pob_choice: him walk
  chosen_spanish: que él caminara
  alternatives_spanish:
  - que él anduviera
  - que lo hiciera caminar
  lexicon: BDAG
  rationale: La construcción infinitiva de resultado se vuelve natural en español con una subordinada final/resultativa. «Caminar» respeta el sentido básico de περιπατέω en este contexto de sanidad.
theological_decisions:
- issue: εὐσεβείᾳ y la posible insinuación de mérito religioso apostólico
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - devotidad
  rationale: El texto niega que la curación provenga de una cualidad religiosa propia de Pedro y Juan. «Piedad» conserva el campo religioso sin introducir una doctrina de mérito; la lectura deja intacta la negación de cualquier poder propio.
  doctrine_reference: Preservar la tensión teológica del texto; no importar categorías posteriores de mérito.
- issue: Vocativo masculino Ἄνδρες Ἰσραηλῖται
  english_pob_reading: Men of Israel
  chosen_spanish_reading: Hombres de Israel
  alternative_spanish_readings:
  - Varones de Israel
  - Israelitas
  rationale: Se mantiene la forma masculina del vocativo, siguiendo una política de precisión de género en el saludo público del discurso.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el audit trail en inglés. Se conservan las dos preguntas retóricas, el vocativo masculino y la negación de toda causalidad propia de los apóstoles. No hubo revisiones aplicadas en el registro inglés más reciente; por eso la redacción se alinea con el estado aprobado.
  spanish_consistency_notes:
  - Se usa «poder» para δύναμις, coherente con el uso usual del proyecto.
  - Se usa «piedad» para εὐσέβεια, pero se deja visible la alternativa semántica en nota.
  - Se preserva «mirar fijamente» para ἀτενίζω, manteniendo la intensidad de la mirada.
  - «Hombres de Israel» conserva el vocativo masculino del griego y el estilo del discurso directo bíblico.
