translation:
  language: es
  text: 'Y Pedro, junto con Juan, fijó su mirada en él y dijo: «Míranos[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira atentamente hacia nosotros». El griego usa un verbo de mirada dirigida y un mandato de atención enfocada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίσας
  english_pob_choice: fixed his gaze
  chosen_spanish: fijando en él la mirada
  alternatives_spanish:
  - mirándolo fijamente
  - clavando la vista en él
  - fijó su mirada en él
  lexicon: BDAG
  rationale: ἀτενίζω expresa una mirada intensa y dirigida, no un simple mirar. En español, «fijando en él la mirada» conserva esa fuerza sin sonar demasiado literal o rígido.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ introduce el avance narrativo con un matiz leve; «Pero» es una opción común en español bíblico para continuar la escena, aunque reconoce un leve giro discursivo sin forzar contraste fuerte.
- source_word: σὺν τῷ Ἰωάννῃ
  english_pob_choice: together with John
  chosen_spanish: junto con Juan
  alternatives_spanish:
  - con Juan
  - acompañado de Juan
  lexicon: BDAG
  rationale: σύν con dativo marca acompañamiento. «Junto con Juan» refleja con claridad la compañía de Juan en una forma natural en español.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - habló
  lexicon: BDAG
  rationale: λέγω en este contexto es el verbo ordinario de habla. «Dijo» es la equivalencia directa y más natural en español.
- source_word: Βλέψον
  english_pob_choice: Look
  chosen_spanish: Míranos
  alternatives_spanish:
  - Mira hacia nosotros
  - Dirige la mirada hacia nosotros
  - Mírame
  lexicon: BDAG
  rationale: El imperativo pide atención visual directa. «Míranos» conserva el tono de mandato breve y natural que tiene el griego, y refleja bien que el pedido se dirige al hombre como plural de cortesía ausente aquí; el plural corresponde al objeto «a nosotros».
- source_word: εἰς ἡμᾶς
  english_pob_choice: at us
  chosen_spanish: nos
  alternatives_spanish:
  - hacia nosotros
  - a nosotros
  lexicon: BDAG
  rationale: En español, el objeto directo pronominal «nos» funciona naturalmente con «mirar». La preposición griega εἰς queda implícita en el verbo y el contexto de atención visual; por eso no es necesario explicitarla.
translation_notes:
  revision_awareness: Alineado con el pasaje griego de Hechos 3:4 y con la elección inglesa de resaltar la intensidad de la mirada (ἀτενίσας) y el mandato visual (Βλέψον). La redacción española conserva esa fuerza sin depender mecánicamente del inglés, y mantiene la relación de compañía con Juan.
  spanish_consistency_notes:
  - Se usa «Juan» para Ἰωάννης según la terminología española estándar.
  - Se conserva «nos» en el imperativo para reflejar el objeto plural de ἡμᾶς.
  - La puntuación sigue el estilo bíblico en español con comillas angulares.
  - «Pero» se entiende aquí como conector narrativo leve, no como oposición doctrinal o discursiva fuerte.
