translation:
  language: es
  text: Y ahora[a], hermanos, sé que actuaron por ignorancia, como también lo hicieron sus dirigentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego dice literalmente 'hermanos' y puede dirigirse al grupo mixto de manera representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Así que ahora
  lexicon: BDAG
  rationale: Conserva la transición discursiva de καί + νῦν de forma natural en español. 'Y ahora' es la equivalencia más directa y mantiene el tono de apelación inmediata del contexto.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amigos
  lexicon: BDAG
  rationale: La forma griega es literalmente masculina plural; en español, 'hermanos' funciona como vocativo plural natural y puede abarcar al grupo mixto de manera representativa sin expandir el texto principal.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - estoy seguro
  lexicon: BDAG
  rationale: '''Sé'' expresa de manera idiomática y directa la afirmación de conocimiento de Pedro, sin añadir matices no presentes en el griego.'
- source_word: κατὰ ἄγνοιαν
  english_pob_choice: in ignorance
  chosen_spanish: por ignorancia
  alternatives_spanish:
  - en ignorancia
  - sin saber
  lexicon: BDAG
  rationale: '''Por ignorancia'' reproduce bien la idea de acción caracterizada por ignorancia o falta de comprensión. ''Por'' evita sonar rígido y conserva la relación causal o modal sin convertir el texto en una exoneración completa.'
- source_word: ἐπράξατε
  english_pob_choice: you acted
  chosen_spanish: actuaron
  alternatives_spanish:
  - hicieron
  - procedieron
  lexicon: BDAG
  rationale: En español, 'actuaron' es suficientemente amplio para πράσσω aquí y evita importar un objeto explícito que el versículo no expresa. Se omite el pronombre por fluidez narrativa y porque el sujeto ya es claro por el contexto.
- source_word: ὥσπερ καὶ
  english_pob_choice: just as ... also
  chosen_spanish: como también
  alternatives_spanish:
  - así como también
  - igual que también
  lexicon: BDAG
  rationale: '''Como también'' comunica la comparación con adición de manera natural en español. Mantiene la relación entre la ignorancia del pueblo y la de sus dirigentes sin sobrecargar la frase.'
- source_word: οἱ ἄρχοντες ὑμῶν
  english_pob_choice: your rulers
  chosen_spanish: sus dirigentes
  alternatives_spanish:
  - sus gobernantes
  - sus autoridades
  lexicon: BDAG
  rationale: '''Dirigentes'' captura el sentido de ἄρχοντες como líderes con autoridad en este contexto de Jerusalén. Se prefiere a ''gobernantes'' para sonar menos restrictivo a autoridad política formal y más acorde al liderazgo religioso-social del pasaje. Se usa ''sus'' en español por concordancia discursiva y referencia al grupo al que se dirige Pedro.'
theological_decisions:
- issue: Cómo renderizar la ignorancia sin eliminar la responsabilidad moral
  english_pob_reading: Retain 'acted in ignorance' without softening culpability or implying full exoneration.
  chosen_spanish_reading: actuaron por ignorancia
  alternative_spanish_readings:
  - actuaron sin saber
  - actuaron ignorantemente
  rationale: '''Por ignorancia'' conserva la tensión del texto: reconoce la ignorancia como factor real, pero no absuelve por completo la acción. Evita tanto una exculpación total como una intensificación innecesaria de culpa, dejando intacta la llamada al arrepentimiento del contexto inmediato.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y toma como contexto de auditoría la decisión inglesa de mantener el vocativo literal, la frase 'in ignorance' y la comparación con 'your rulers also did'. No se requieren revisiones adicionales respecto del pasaje base.
  spanish_consistency_notes:
  - Se conserva 'hermanos' como vocativo literal, en línea con la política de mantener la forma griega cuando no hay necesidad textual de expandirla en el cuerpo principal.
  - '''Por ignorancia'' preserva la tensión moral/epistemológica del verso sin volverlo exculpatorio ni condenatorio en exceso.'
  - '''Dirigentes'' se usa para ἄρχοντες en consonancia con el contexto de liderazgo del pasaje; no se introduce ''Cristo'', ''SEÑOR'' ni otros términos no presentes en el versículo.'
