review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición discursiva (''Y ahora''), vocativo (''hermanos''), conocimiento de Pedro (''sé''), ignorancia como factor (''por ignorancia'') y referencia a los dirigentes. Sin embargo, la cláusula final omite el verbo explícito que en griego se sobreentiende por comparación con ἐπράξατε y que el inglés POB sí preserva con ''did''. En español, ''como también sus dirigentes'' queda elíptico de manera menos clara y suena incompleto.'
  spanish_quality_summary: El español es claro y digno, pero la frase final necesita completarse para sonar natural y plenamente inteligible en lectura pública. 'Sus dirigentes' es comprensible, aunque 'sus gobernantes' o 'sus autoridades' acercarían más el matiz de ἄρχοντες; no obstante, 'dirigentes' sigue siendo aceptable en este contexto. El resto del verso está bien resuelto y la nota sobre 'hermanos' está correctamente anclada.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo el tratamiento de ἀδελφοί, bien manejado como ''hermanos'' con nota alternativa. La decisión ''por ignorancia'' preserva la tensión teológica documentada y no exonera indebidamente. La principal corrección es sintáctico-semántica: hacer explícito en español que los dirigentes también actuaron así.'
  issues:
  - severity: medium
    issue: 'La comparación final queda elíptica en exceso: ''como también sus dirigentes''.'
    rationale: ὥσπερ καὶ οἱ ἄρχοντες ὑμῶν compara la acción del pueblo con la de sus gobernantes, con el verbo recuperado de ἐπράξατε. En español conviene explicitarlo ('también lo hicieron sus dirigentes' o equivalente) para preservar plenamente el sentido y la fluidez.
  revised_spanish_text: Y ahora[a], hermanos, sé que actuaron por ignorancia, como también lo hicieron sus dirigentes.
