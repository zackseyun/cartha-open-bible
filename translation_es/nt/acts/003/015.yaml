translation:
  language: es
  text: pero ustedes mataron al Autor[a] de la vida, a quien Dios levantó de entre los muertos, de lo cual nosotros somos testigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Príncipe de la vida», «Fundador de la vida» o «Guía de la vida». El griego ἀρχηγός puede implicar origen, liderazgo o preeminencia.
    reason: lexical_alternative
  - marker: b
    text: O «de quien nosotros somos testigos». El griego puede referirse tanto al resucitado como al hecho de su resurrección.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza la acusación con el contexto previo y puede conservar un matiz adversativo. En español, «pero» reproduce bien ese giro sin forzar una oposición más fuerte de la que el griego exige.
- source_word: ἀρχηγὸν
  english_pob_choice: Author
  chosen_spanish: Autor
  alternatives_spanish:
  - Fundador
  - Guía
  - Príncipe
  - Iniciador
  lexicon: BDAG
  rationale: El término ἀρχηγός admite sentidos de origen, liderazgo y preeminencia. «Autor» es la opción española más natural para una expresión titulada y transmite la idea de origen o fuente de la vida, manteniendo la tensión cristológica del pasaje.
- source_word: τῆς ζωῆς
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de la vida misma
  - de la vida eterna
  lexicon: BDAG
  rationale: 'La frase se mantiene compacta y titular: «de la vida». En español, esta construcción conserva la fuerza genitiva sin añadir precisiones no presentes en el texto.'
- source_word: ἀπεκτείνατε
  english_pob_choice: you killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - asesinaron
  - dieron muerte a
  lexicon: BDAG
  rationale: El verbo expresa muerte causada por acción directa. En este contexto de acusación pública, «mataron» es claro y fiel; evita introducir un matiz legal más fuerte que el del verbo griego, aunque la responsabilidad moral queda intacta por el contexto.
- source_word: ἤγειρεν ἐκ νεκρῶν
  english_pob_choice: raised from the dead
  chosen_spanish: resucitó de entre los muertos
  alternatives_spanish:
  - lo levantó de entre los muertos
  - lo resucitó de entre los muertos
  lexicon: BDAG
  rationale: «Resucitó de entre los muertos» es la forma más natural y precisa en español para el lenguaje de resurrección. Mantiene la acción divina y el carácter corporal/real de la resurrección.
- source_word: οὗ ἡμεῖς μάρτυρές ἐσμεν
  english_pob_choice: of which we are witnesses
  chosen_spanish: de lo cual nosotros somos testigos
  alternatives_spanish:
  - de quien somos testigos
  - de esto somos testigos
  lexicon: BDAG
  rationale: El relativo οὗ puede apuntar al hecho de la resurrección o, más cercanamente, al resucitado. Siguiendo la decisión auditada del POB inglés, «de lo cual» preserva esa referencia amplia al evento proclamado, mientras «nosotros somos testigos» conserva la forma nominal del testimonio apostólico.
theological_decisions:
- issue: Renderización de ἀρχηγός como título cristológico
  english_pob_reading: Author of life
  chosen_spanish_reading: Autor de la vida
  alternative_spanish_readings:
  - Príncipe de la vida
  - Fundador de la vida
  - Guía de la vida
  rationale: '«Autor de la vida» comunica la relación de Cristo con el origen y la fuente de la vida y mantiene el contraste retórico del versículo: mataron precisamente al que está vinculado con la vida. «Príncipe» es tradicional, pero en español moderno puede sonar menos transparente; «Autor» preserva mejor la amplitud semántica documentada.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Referencia de οὗ en la cláusula del testimonio
  english_pob_reading: of which we are witnesses
  chosen_spanish_reading: de lo cual nosotros somos testigos
  alternative_spanish_readings:
  - de quien nosotros somos testigos
  - de esto nosotros somos testigos
  rationale: El griego permite relacionar el relativo con el Resucitado o con el hecho de la resurrección. La redacción española mantiene esa ambigüedad controlada y sigue el flujo del texto auditado, haciendo explícito que el testimonio apostólico recae sobre el acontecimiento proclamado.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
translation_notes:
  revision_awareness: Se siguió la última revisión auditada del inglés POB al preferir la conexión adversativa de δέ con «pero», mantener la coma antes de la cláusula final y conservar una formulación que haga explícita la referencia amplia de οὗ. La versión española ajusta esa solución al orden natural del español sin perder el contraste ni la ambigüedad controlada del relativo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se introdujo terminología eclesiástica adicional.
  - Se eligió «Autor de la vida» como equivalente principal de ἀρχηγός, coherente con el criterio POB documentado.
  - Se preservó «resucitó de entre los muertos» como fórmula idiomática y teológicamente precisa.
  - La cláusula final usa «de lo cual» para reflejar la amplitud del relativo griego sin cerrar indebidamente el referente.
