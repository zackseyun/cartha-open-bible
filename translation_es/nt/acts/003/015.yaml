revisions:
- from: pero ustedes mataron al Autor[a] de la vida, a quien Dios resucitó de entre los muertos, de lo cual nosotros somos testigos[b].
  to: pero ustedes mataron al Autor[a] de la vida, a quien Dios levantó de entre los muertos, de lo cual nosotros somos testigos[b].
  rationale: Se corrigió «resucitó» por «levantó» para reflejar con español natural y gramaticalmente correcto el verbo transitivo ἤγειρεν con objeto directo explícito («a quien»), manteniendo intacto el sentido de resurrección. También se normalizó la mayúscula en la nota b.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:06:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: conserva el matiz conectivo de δὲ con «pero», traduce ἀπεκτείνατε con una acusación directa, mantiene la resurrección divina «de entre los muertos» y preserva la cláusula final con nota sobre la ambigüedad de οὗ. El punto principal a corregir es ἤγειρεν: con objeto directo explícito («a quien»), en español debe decirse «lo resucitó» o «lo levantó», no «resucitó», ya que esta última forma normalmente funciona como intransitiva.'
  spanish_quality_summary: El español es claro y digno, pero presenta una incorrección gramatical importante en «a quien Dios resucitó», porque «resucitar» ahí se usa transitivamente sin pronombre de objeto. También conviene evitar la mayúscula innecesaria en «Resucitado» dentro de la nota, salvo que el proyecto la use de manera sistemática para título reverencial, lo cual no consta aquí. El resto fluye bien y suena natural para un registro bíblico moderno.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεός = «Dios» está correcto; no aparecen Yahvé/Mesías/δοῦλος, etc. «Autor de la vida» está bien justificado para ἀρχηγός y la nota alternativa preserva las opciones relevantes.'
  issues:
  - severity: high
    issue: Uso transitivo incorrecto de «resucitó» en el texto principal
    rationale: El griego ὃν ὁ θεὸς ἤγειρεν lleva objeto directo («a quien Dios levantó/resucitó»). En español natural y correcto, debe decirse «a quien Dios lo resucitó» es redundante, pero «a quien Dios resucitó» suena defectuoso; la forma adecuada es «a quien Dios levantó de entre los muertos» o, mejor aquí, «a quien Dios resucitó de entre los muertos» solo si se entiende transitivo con objeto tácito, algo poco recomendable. La solución más clara es «a quien Dios levantó de entre los muertos» o reestructurar a «a quien Dios levantó». Dado que el proyecto ya favorece ‘raised’, «levantó de entre los muertos» encaja muy bien.
  - severity: medium
    issue: Posible mejora léxica en la nota alternativa de ἀρχηγός
    rationale: «Guía» no es incorrecto, pero refleja menos bien el matiz de preeminencia/origen que «Líder» o «Pionero». No obstante, no es un error grave porque la nota ya incluye opciones fuertes como «Príncipe» y «Fundador».
  - severity: low
    issue: Mayúscula reverencial en la nota b
    rationale: «el Resucitado» podría escribirse en minúscula («el resucitado») para mantener neutralidad editorial, a menos que la guía del proyecto prefiera esa mayúscula devocional. Es un detalle menor.
  revised_spanish_text: pero ustedes mataron al Autor[a] de la vida, a quien Dios levantó de entre los muertos, de lo cual nosotros somos testigos[b].
  revised_footnotes:
  - marker: a
    text: O «Príncipe de la vida», «Fundador de la vida» o «Guía de la vida». El griego ἀρχηγός puede implicar origen, liderazgo o preeminencia.
    reason: lexical_alternative
  - marker: b
    text: O «de quien nosotros somos testigos». El griego puede referirse tanto al resucitado como al hecho de su resurrección.
    reason: alternative_reading
  revision_rationale: Se corrigió «resucitó» por «levantó» para reflejar con español natural y gramaticalmente correcto el verbo transitivo ἤγειρεν con objeto directo explícito («a quien»), manteniendo intacto el sentido de resurrección. También se normalizó la mayúscula en la nota b.
