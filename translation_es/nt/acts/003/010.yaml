  text: ἐπεγίνωσκον ⸀δὲ αὐτὸν ὅτι ⸀οὗτος ἦν ὁ πρὸς τὴν ἐλεημοσύνην καθήμενος ἐπὶ τῇ Ὡραίᾳ Πύλῃ τοῦ ἱεροῦ, καὶ ἐπλήσθησαν θάμβους καὶ ἐκστάσεως ἐπὶ τῷ συμβεβηκότι αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/003/010.yaml
  text: And they recognized him[a], that this was the man who used to sit for alms at the Beautiful Gate of the temple[b], and they were filled with amazement and astonishment at what had happened to him.
  footnotes:
  - marker: a
    text: Or, more formally, 'the one sitting for alms.' The translation 'used to sit for alms' brings out the descriptive, customary sense in context.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex generally, not specifically the inner sanctuary (ναός).
    reason: cultural_note
