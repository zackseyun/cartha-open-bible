translation:
  language: es
  text: Y lo reconocían[a], porque este era el que se sentaba para pedir limosna en la Puerta Hermosa del templo[b], y se llenaron de asombro y de estupor ante lo que le había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «el que estaba sentado para limosna». La redacción «se sentaba para pedir limosna» procura expresar el sentido descriptivo y habitual del contexto.
    reason: lexical_alternative
  - marker: b
    text: Griego ἱερόν se refiere al conjunto del templo, no específicamente al santuario interior (ναός).
    reason: cultural_note
lexical_decisions:
- source_word: ἐπεγίνωσκον
  english_pob_choice: recognized
  chosen_spanish: lo reconocían
  alternatives_spanish:
  - lo reconocieron
  - lo estaban reconociendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa reconocimiento continuo o repetido por parte de la multitud. «Lo reconocían» conserva ese valor aspectual mejor que un pretérito puntual y suena natural en español narrativo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ enlaza la narración sin contraste fuerte. «Y» mantiene el flujo del relato con un conector leve y natural en español.
- source_word: οὗτος ἦν
  english_pob_choice: this was
  chosen_spanish: este era
  alternatives_spanish:
  - él era
  - este es
  lexicon: BDAG
  rationale: La combinación demostrativa + imperfecto marca identificación enfática del hombre ya conocido. «Este era» preserva esa fuerza deíctica sin forzar el español.
- source_word: ὁ πρὸς τὴν ἐλεημοσύνην καθήμενος
  english_pob_choice: the man who used to sit for alms
  chosen_spanish: el que se sentaba para pedir limosna
  alternatives_spanish:
  - el que se sentaba para las limosnas
  - el hombre sentado para pedir limosna
  lexicon: BDAG
  rationale: La expresión articula un participio sustantivado con sentido descriptivo y habitual. «Se sentaba para pedir limosna» conserva el valor de costumbre y hace explícita la finalidad implícita en la construcción griega.
- source_word: ἐλεημοσύνην
  english_pob_choice: alms
  chosen_spanish: limosna
  alternatives_spanish:
  - almosna
  - caridad
  - limosnas
  lexicon: BDAG
  rationale: «Limosna» es el equivalente más idiomático y concreto en español para un don dado al pobre. En este contexto es mejor que «caridad», que resulta más abstracto.
- source_word: ἐπὶ τῇ Ὡραίᾳ Πύλῃ
  english_pob_choice: at the Beautiful Gate
  chosen_spanish: en la Hermosa Puerta
  alternatives_spanish:
  - en la Puerta Hermosa
  - en la puerta llamada Hermosa
  lexicon: BDAG
  rationale: La forma griega funciona como designación conocida del acceso. En español, «Hermosa Puerta» conserva el nombre tradicional y el valor de título propio dentro del contexto.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del recinto del templo
  - del complejo del templo
  lexicon: BDAG
  rationale: ἱερόν designa el conjunto del templo, no específicamente el santuario interior. «Del templo» es suficiente en español y mantiene la claridad sin expandir innecesariamente el texto principal.
- source_word: ἐπλήσθησαν
  english_pob_choice: they were filled
  chosen_spanish: se llenaron
  alternatives_spanish:
  - fueron llenados
  - quedaron llenos
  lexicon: BDAG
  rationale: 'La pasiva de πίμπλημι con sustantivos de emoción se expresa bien en español con reflexivo: «se llenaron». Conserva el sentido de quedar completamente afectados por la impresión.'
- source_word: θάμβους
  english_pob_choice: amazement
  chosen_spanish: de asombro
  alternatives_spanish:
  - de maravilla
  - de estupor
  lexicon: BDAG
  rationale: θάμβος denota sorpresa impactante o atónita. «Asombro» es claro y natural; además permite mantener la paridad con el término siguiente sin sonar redundante.
- source_word: ἐκστάσεως
  english_pob_choice: astonishment
  chosen_spanish: de estupor
  alternatives_spanish:
  - de asombro
  - de desconcierto
  - de éxtasis
  lexicon: BDAG
  rationale: Aquí ἔκστασις no tiene sentido místico, sino de quedar sobrecogidos o fuera de sí por lo ocurrido. «Estupor» distingue bien esta intensidad y evita confundirlo con «éxtasis».
- source_word: ἐπὶ τῷ συμβεβηκότι αὐτῷ
  english_pob_choice: at what had happened to him
  chosen_spanish: ante lo que le había sucedido
  alternatives_spanish:
  - por lo que le había sucedido
  - a causa de lo que le había sucedido
  lexicon: BDAG
  rationale: La construcción expresa la causa o el objeto de su asombro, con referencia al evento ya ocurrido. «Ante lo que le había sucedido» mantiene la reacción emocional y suena natural en español; el pronombre dativo se vierte como referencia personal clara.
theological_decisions:
- issue: ἱερόν como recinto del templo, no el santuario interior
  english_pob_reading: the temple
  chosen_spanish_reading: el templo
  alternative_spanish_readings:
  - el recinto del templo
  - el complejo del templo
  rationale: El griego ἱερόν nombra el conjunto del área del templo. En español, «templo» comunica adecuadamente ese ámbito general sin sugerir el interior sagrado de ναός.
  doctrine_reference: Distinción léxica entre ἱερόν y ναός en el NT
- issue: 'La reacción de la multitud: dos sustantivos cercanos, pero no idénticos'
  english_pob_reading: amazement and astonishment
  chosen_spanish_reading: asombro y estupor
  alternative_spanish_readings:
  - asombro y asombro
  - maravilla y estupor
  rationale: Conviene preservar la doble expresión del griego sin borrar la tensión entre θάμβος y ἔκστασις. «Asombro y estupor» mantiene la duplicidad y sugiere una intensificación progresiva.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés, sin traducir mecánicamente. La principal decisión de estilo fue mantener el valor aspectual del imperfecto («lo reconocían») y conservar la doble emoción del final sin colapsarla en un solo término. No se registran revisiones previas aplicadas en esta unidad.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «limosna» para ἐλεημοσύνη, coherente con el valor concreto de ofrenda dada al pobre.
  - Se mantuvo «Hermosa Puerta» como nombre propio contextual, en vez de parafrasear la designación.
