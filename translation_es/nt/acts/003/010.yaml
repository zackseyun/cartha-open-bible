  glossary_alignment: No hay conflictos con la terminología base del proyecto. «limosna», «templo», «asombro» y «estupor» están bien elegidos. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La distinción ἱερόν/ναός se conserva correctamente en nota.
