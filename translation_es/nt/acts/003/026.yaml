translation:
  language: es
  text: A ustedes primero[a], Dios, habiendo levantado a su siervo[b], lo envió para bendecirlos al apartar a cada uno de ustedes de sus maldades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo levantado» puede significar «habiendo hecho surgir/nombrado» a su siervo, no necesariamente «habiéndolo resucitado de entre los muertos».
    reason: alternative_reading
  - marker: b
    text: O «su hijo»; el griego παῖς puede significar «siervo» o «hijo», aunque aquí «siervo» probablemente refleja el trasfondo del Siervo de Isaías.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμῖν πρῶτον
  english_pob_choice: To you first
  chosen_spanish: A ustedes primero
  alternatives_spanish:
  - A ustedes en primer lugar
  - Para ustedes primero
  lexicon: BDAG
  rationale: El dativo con πρῶτον expresa prioridad dirigida al destinatario. «A ustedes primero» conserva la prioridad salvífica y la fuerza de complemento indirecto sin sobrecargar el verso con una glosa explicativa.
- source_word: ἀναστήσας
  english_pob_choice: having raised up
  chosen_spanish: habiendo levantado
  alternatives_spanish:
  - habiendo resucitado
  - habiendo hecho surgir
  - habiendo puesto en pie
  lexicon: BDAG
  rationale: «Levantado» mantiene la ambigüedad del griego entre levantar/poner en pie y resucitar, como en el audit trail inglés. En español evita decidir prematuramente entre resurrección y exaltación/levantamiento para la misión.
- source_word: τὸν παῖδα αὐτοῦ
  english_pob_choice: his servant
  chosen_spanish: a su siervo
  alternatives_spanish:
  - a su hijo
  - a su hijo/siervo
  - a su muchacho
  lexicon: BDAG
  rationale: «Siervo» refleja el trasfondo isaiano del término παῖς y coincide con la decisión auditada en inglés. «Hijo» sería más interpretativo y «muchacho» sería inadecuado en este contexto.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: lo envió
  alternatives_spanish:
  - lo mandó
  - lo despachó
  lexicon: BDAG
  rationale: «Envió» reproduce el verbo de misión con naturalidad en español y mantiene la relación entre envío y propósito sin añadir matices administrativos.
- source_word: εὐλογοῦντα ὑμᾶς
  english_pob_choice: to bless you
  chosen_spanish: para bendecirlos
  alternatives_spanish:
  - bendiciéndolos
  - con el fin de bendecirlos
  lexicon: BDAG
  rationale: La construcción participial se vuelve una finalidad natural en español. «Bendecirlos» expresa con claridad el beneficio resultante del envío sin perder el sentido del participio.
- source_word: ἐν τῷ ἀποστρέφειν
  english_pob_choice: by turning
  chosen_spanish: al apartar
  alternatives_spanish:
  - al volver
  - por apartar
  - mediante el apartar
  lexicon: BDAG
  rationale: La frase articular con infinitivo expresa medio o circunstancia. «Al apartar» conserva la relación instrumental y suena idiomático en español, manteniendo la idea de que la bendición se efectúa por ese acto.
- source_word: ἕκαστον
  english_pob_choice: each of you
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada uno
  - a cada cual
  lexicon: BDAG
  rationale: «A cada uno» reproduce el distributivo del griego y, unido al contexto de segunda persona plural, comunica que el alcance es individual dentro del grupo.
- source_word: ἀπὸ τῶν πονηριῶν ὑμῶν
  english_pob_choice: from your wicked ways
  chosen_spanish: de sus maldades
  alternatives_spanish:
  - de sus caminos perversos
  - de sus maldades/obras malas
  - de sus perversidades
  lexicon: BDAG
  rationale: «Maldades» es una manera natural de expresar el plural concreto πονηρίαι sin estrecharlo solo a actos aislados. Se evita «caminos» porque no está explícito en el griego, y se mantiene el carácter moral del sustantivo plural.
theological_decisions:
- issue: 'Ambigüedad de ἀναστήσας: resurrección o levantamiento/nombramiento'
  english_pob_reading: Retain 'having raised up' in the main text without specifying whether this refers to resurrection or to God raising up/bringing forth his servant.
  chosen_spanish_reading: «Habiendo levantado» deja abierta la referencia, sin añadir «de entre los muertos» ni resolver la frase en sentido meramente vocacional.
  alternative_spanish_readings:
  - habiendo resucitado
  - habiendo hecho surgir/levantado para su obra
  - habiendo levantado de entre los muertos
  rationale: El griego permite ambas resonancias y el contexto de Hechos conserva la tensión cristológica y salvífica. La redacción española debe preservar esa ambigüedad, no eliminarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de παῖς aplicado a Jesús
  english_pob_reading: Render παῖς as 'servant'
  chosen_spanish_reading: «Siervo» mantiene el eco del Siervo de Yahvé y no impone una lectura de filiación que el término no expresa de forma directa aquí.
  alternative_spanish_readings:
  - hijo
  - niño
  - siervo/hijo
  rationale: La elección respeta el trasfondo escriturario y el uso lucano, sin negar la cristología bíblica más amplia.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el audit trail inglés, sin introducir revisiones posteriores; el control cruzado reporta alta concordancia y no se registran cambios aplicados.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός y no se requiere «Yahvé» en este versículo, porque el texto griego nombra a Dios directamente.
  - Se mantiene «siervo» para παῖς conforme al criterio del proyecto y al trasfondo isaiano.
  - «A ustedes primero» conserva la prioridad histórica de la audiencia sin sonar artificial en español.
  - La frase final evita ampliar «πονηρίαι» a una sola categoría; «maldades» conserva el plural moral concreto.
