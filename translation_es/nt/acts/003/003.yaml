  to: Cuando vio a Pedro y a Juan, que estaban por entrar en el templo[a], les pidió limosna.
  rationale: Se corrige una construcción no idiomática y gramaticalmente problemática ('lo vio a Pedro y a Juan') por una forma natural y fiel al griego. También se simplifica 'una limosna' a 'limosna' para un español más natural sin pérdida de sentido. La nota sobre ἱερόν se mantiene porque preserva una distinción léxica importante.
