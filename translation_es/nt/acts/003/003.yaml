translation:
  language: es
  text: Cuando vio a Pedro y a Juan, que estaban por entrar en el templo[a], les pidió limosna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἱερόν se refiere al recinto o complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: he
  chosen_spanish: lo vio
  alternatives_spanish:
  - al verlo
  - cuando lo vio
  lexicon: BDAG
  rationale: El pronombre relativo vuelve al cojo del versículo anterior; en español, convertirlo en una construcción temporal con objeto directo retomado por contexto produce una oración natural sin perder la referencia.
- source_word: ἰδὼν
  english_pob_choice: When he saw
  chosen_spanish: Cuando lo vio
  alternatives_spanish:
  - Al verlo
  - Viendo
  lexicon: BDAG
  rationale: 'El participio aoristo expresa relación temporal: al ver a Pedro y a Juan, actuó. ''Cuando lo vio'' mantiene esa secuencia de forma idiomática en español.'
- source_word: Πέτρον καὶ Ἰωάννην
  english_pob_choice: Peter and John
  chosen_spanish: a Pedro y a Juan
  alternatives_spanish:
  - Pedro y Juan
  lexicon: BDAG
  rationale: Los nombres propios se transliteran en español; con el verbo ver, el objeto personal lleva la preposición 'a'.
- source_word: μέλλοντας εἰσιέναι
  english_pob_choice: about to go into
  chosen_spanish: que estaban por entrar
  alternatives_spanish:
  - a punto de entrar
  - iban a entrar
  lexicon: BDAG
  rationale: μέλλω + infinitivo indica inminencia. 'Estaban por entrar' conserva esa cercanía inmediata sin sonar rígido.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: into the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo o recinto del templo, no al santuario interior; en el texto principal, 'en el templo' es claro y natural, mientras que la nota preserva el sentido más amplio.
- source_word: ἠρώτα
  english_pob_choice: he asked
  chosen_spanish: les pidió
  alternatives_spanish:
  - les pidió limosna
  - les rogó
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir acción continua, la revisión inglesa descartó un matiz inceptivo. En español, 'les pidió' expresa bien la petición puntual del contexto.
- source_word: ἐλεημοσύνην
  english_pob_choice: alms
  chosen_spanish: una limosna
  alternatives_spanish:
  - limosna
  - una dádiva caritativa
  lexicon: BDAG
  rationale: '''Limosna'' es el equivalente natural en español para un donativo a los pobres en este contexto narrativo; conserva el registro tradicional sin desviar el sentido.'
- source_word: λαβεῖν
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - recibirla
  lexicon: BDAG
  rationale: El infinitivo expresa el contenido de la petición. En español, 'pedir una limosna' ya implica el propósito de recibirla, por lo que el infinitivo se integra de forma natural en la frase.
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de 'began asking' a 'asked' porque el griego simplemente dice que pidió; por eso el español evita cualquier matiz de inicio o progresividad y usa una petición directa y simple.
  spanish_consistency_notes:
  - Se mantiene 'templo' como forma readable en el texto principal, con nota para preservar el sentido de ἱερόν.
  - Se evita 'Cristo/Mesías' porque no aparece en este versículo.
  - La construcción 'les pidió una limosna' integra el infinitivo 'recibir' de manera natural en español y evita una duplicación forzada.
