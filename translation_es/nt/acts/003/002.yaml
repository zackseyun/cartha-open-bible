source:
  edition: SBLGNT
  text: καί τις ἀνὴρ χωλὸς ἐκ κοιλίας μητρὸς αὐτοῦ ὑπάρχων ἐβαστάζετο, ὃν ἐτίθουν καθ’ ἡμέραν πρὸς τὴν θύραν τοῦ ἱεροῦ τὴν λεγομένην Ὡραίαν τοῦ αἰτεῖν ἐλεημοσύνην παρὰ τῶν εἰσπορευομένων εἰς τὸ ἱερόν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/003/002.yaml
  text: And a certain man[a], lame from his mother’s womb, was being carried, whom they would place every day at the gate of the temple called Beautiful, to ask for alms from those entering into the temple[c][b],
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary (ναός).
    reason: cultural_note
  - marker: b
    text: Or 'from birth' for 'from his mother’s womb.'
    reason: lexical_alternative
  - marker: c
    text: The gate’s name is literally 'Beautiful.'
    reason: lexical_alternative
