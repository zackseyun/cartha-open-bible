revisions:
- from: Y cierto hombre[a], cojo desde el vientre de su madre, era traído; a quien ponían cada día junto a la puerta del templo, llamada Hermosa[c], para pedir limosna de los que entraban al templo[b].
  to: Y cierto hombre, cojo desde el vientre de su madre[b], era llevado; a quien ponían cada día a la puerta del templo[a], llamada Hermosa[c], para pedir limosna de los que entraban al templo.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras correctas del texto fuente y del audit trail inglés. Además, se mejoró levemente la naturalidad de ἐβαστάζετο con «era llevado» y se ajustó «junto a la puerta» a «a la puerta» para una correspondencia más directa con el griego, sin alterar el sentido.
