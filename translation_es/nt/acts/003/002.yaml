review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: introduce a un individuo específico pero indefinido («cierto hombre»), conserva la condición congénita («desde el vientre de su madre»), la acción habitual de ser llevado y puesto cada día, el propósito de pedir limosna, y la ubicación en la puerta del templo llamada Hermosa. Sin embargo, hay un desajuste importante en las notas: la nota [a] sobre ἱερόν está anclada a «hombre» en vez de a «templo», y la nota [b] sobre «desde el vientre de su madre» está anclada a «templo» al final. Eso invierte dos ayudas exegéticas claves y debe corregirse.'
  spanish_quality_summary: El español es generalmente claro y digno. «Cierto hombre» y «cojo» son naturales; «limosna» es preciso; «llamada Hermosa» funciona bien. No obstante, «era traído» suena algo rígido en español bíblico contemporáneo; «era llevado» o «lo llevaban» sería más idiomático. Además, «junto a la puerta» puede afinarse a «a la puerta», más cercano a πρὸς aquí. La puntuación con punto y coma no es incorrecta, pero una coma fluye mejor.
  glossary_alignment: No hay conflicto con los términos base del proyecto. ἱερόν como «templo» en texto principal con nota explicativa es coherente con el audit trail. No aparecen términos sensibles como Yahvé/Mesías/esclavo en este versículo. «Limosna» para ἐλεημοσύνην y «cojo» para χωλός están bien sustentados.
  issues:
  - severity: high
    issue: Las notas [a] y [b] están ancladas a palabras equivocadas en el texto español.
    rationale: La nota cultural sobre ἱερόν debe anclarse a «templo», no a «hombre»; la nota léxica alternativa «desde el nacimiento» debe anclarse a «desde el vientre de su madre», no al último «templo». Así como está, el lector recibe información incorrectamente asociada.
  - severity: medium
    issue: «Era traído» suena menos natural que otras opciones disponibles en español.
    rationale: Aunque no es falso, «era llevado» expresa mejor ἐβαστάζετο en español contemporáneo y mantiene la pasividad/imperfectividad sin rigidez innecesaria.
  - severity: low
    issue: «Junto a la puerta» puede ser ligeramente menos preciso que «a la puerta».
    rationale: πρὸς con verbos de colocar aquí apunta al lugar de destino/ubicación inmediata. «A la puerta» o «ante la puerta» suena más directo y cercano al original.
  revised_spanish_text: Y cierto hombre, cojo desde el vientre de su madre[b], era llevado; a quien ponían cada día a la puerta del templo[a], llamada Hermosa[c], para pedir limosna de los que entraban al templo.
  revised_footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior (ναός).
    reason: cultural_note
  - marker: b
    text: También puede entenderse «desde el nacimiento» para «desde el vientre de su madre».
    reason: lexical_alternative
  - marker: c
    text: El nombre de la puerta significa literalmente «Hermosa».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras correctas del texto fuente y del audit trail inglés. Además, se mejoró levemente la naturalidad de ἐβαστάζετο con «era llevado» y se ajustó «junto a la puerta» a «a la puerta» para una correspondencia más directa con el griego, sin alterar el sentido.
