translation:
  language: es
  text: Y cierto hombre, cojo desde el vientre de su madre[b], era llevado; a quien ponían cada día a la puerta del templo[a], llamada Hermosa[c], para pedir limosna de los que entraban al templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior (ναός).
    reason: cultural_note
  - marker: b
    text: También puede entenderse «desde el nacimiento» para «desde el vientre de su madre».
    reason: lexical_alternative
  - marker: c
    text: El nombre de la puerta significa literalmente «Hermosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: τις ἀνὴρ
  english_pob_choice: a certain man
  chosen_spanish: cierto hombre
  alternatives_spanish:
  - un hombre
  - un cierto hombre
  lexicon: BDAG
  rationale: τις con ἀνήρ introduce a un individuo indefinido pero concreto. «Cierto hombre» conserva esa especificidad narrativa sin sonar forzado en español.
- source_word: χωλὸς
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - lame
  - inválido de las piernas
  lexicon: BDAG
  rationale: En español actual, «cojo» comunica de forma natural la incapacidad para caminar normalmente. «Lame» puede sonar menos idiomático o más marcado en algunas variedades.
- source_word: ἐκ κοιλίας μητρὸς αὐτοῦ
  english_pob_choice: from his mother’s womb
  chosen_spanish: desde el vientre de su madre
  alternatives_spanish:
  - desde el seno de su madre
  - desde el nacimiento
  lexicon: BDAG
  rationale: La imagen corporal del griego se conserva bien con «vientre de su madre». Mantiene el sentido literal sin caer en una calca extraña.
- source_word: ὑπάρχων
  english_pob_choice: — (implicit in 'lame from his mother’s womb')
  chosen_spanish: — (implícito en «cojo desde el vientre de su madre» )
  alternatives_spanish:
  - siendo
  - existiendo
  lexicon: BDAG
  rationale: El participio funciona de modo predicativo con χωλός y no requiere una traducción separada en español; se integra naturalmente en la descripción de su condición.
- source_word: ἐβαστάζετο
  english_pob_choice: was being carried
  chosen_spanish: era traído
  alternatives_spanish:
  - era cargado
  - lo llevaban
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa acción repetida o en curso en el pasado. «Era traído» mantiene la pasividad y la idea de traslado habitual sin sonar demasiado pesado.
- source_word: ἐτίθουν
  english_pob_choice: they would place
  chosen_spanish: ponían
  alternatives_spanish:
  - solían poner
  - lo colocaban
  lexicon: BDAG
  rationale: El imperfecto plural expresa acción habitual. «Ponían» es natural y reproduce la repetición habitual de forma clara.
- source_word: καθ’ ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - diariamente
  lexicon: BDAG
  rationale: «Cada día» es equivalente, claro y sobrio en español contemporáneo.
- source_word: θύραν τοῦ ἱεροῦ
  english_pob_choice: the gate of the temple
  chosen_spanish: la puerta del templo
  alternatives_spanish:
  - la puerta del recinto del templo
  - la puerta del santuario
  lexicon: BDAG
  rationale: θύρα admite «puerta» o «portón». En español, «puerta» funciona bien aquí y no fuerza una distinción arquitectónica innecesaria en el texto principal.
- source_word: τὴν λεγομένην Ὡραίαν
  english_pob_choice: called Beautiful
  chosen_spanish: llamada Hermosa
  alternatives_spanish:
  - llamada Bella
  - llamada la Hermosa
  lexicon: BDAG
  rationale: «Hermosa» es la equivalencia natural de Ὡραίαν y comunica que se trata del nombre de la puerta. Se conserva la forma adjetival como en el griego y en el audit trail inglés.
- source_word: τοῦ αἰτεῖν
  english_pob_choice: to ask for
  chosen_spanish: para pedir
  alternatives_spanish:
  - para solicitar
  - a fin de pedir
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para pedir» es breve, idiomático y reproduce la finalidad sin sobreexplicar.
- source_word: ἐλεημοσύνην
  english_pob_choice: alms
  chosen_spanish: limosna
  alternatives_spanish:
  - ayuda
  - caridad
  lexicon: BDAG
  rationale: «Limosna» es el término español tradicional y preciso para donación a los pobres en este contexto. Mantiene el matiz histórico de la escena.
- source_word: παρὰ τῶν εἰσπορευομένων
  english_pob_choice: from those entering
  chosen_spanish: de los que entraban
  alternatives_spanish:
  - de los que ingresaban
  - de los que iban entrando
  lexicon: BDAG
  rationale: La preposición παρά con genitivo indica procedencia o fuente. «De los que entraban» es natural y refleja el movimiento de ingreso al templo.
- source_word: εἰς τὸ ἱερόν
  english_pob_choice: into the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - dentro del templo
  - en el templo
  lexicon: BDAG
  rationale: Aquí εἰς conserva dirección de entrada. En español, «al templo» expresa bien el destino del movimiento y evita una repetición pesada de «en/dentro del templo».
theological_decisions:
- issue: ἱερόν como complejo del templo, no solo el santuario interior
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary (ναός).
  chosen_spanish_reading: «templo» en el texto principal, con nota sobre el recinto o complejo del templo
  alternative_spanish_readings:
  - recinto del templo
  - precintos del templo
  - santuario
  rationale: El español común puede usar «templo» de forma idiomática; la nota preserva la precisión del griego sin imponer una expresión poco natural en el versículo.
  doctrine_reference: Precisión léxica y topográfica del texto bíblico; distinción ἱερόν/ναός.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «used to place» por «would place» para reflejar mejor el imperfecto habitual de ἐτίθουν. La traducción española sigue esa decisión con «ponían», que expresa acción repetida. Se mantuvo además la distinción notada por el audit trail entre θύρα y ἱερόν, incorporando una nota para el valor de ἱερόν.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando corresponda, aunque este versículo no la contiene.
  - Se mantiene «Mesías» solo cuando el original y el contexto lo requieran; aquí no aplica.
  - Se prefiere «espíritu/Espíritu» según contexto; aquí no aplica.
  - Se evita calcar el inglés cuando el español natural puede expresar mejor el imperfecto habitual y la finalidad.
  - Las notas usan marcadores únicos y corresponden exactamente a anclas presentes en el texto.
