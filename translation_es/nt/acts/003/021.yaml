translation:
  language: es
  text: a quien el cielo debe recibir hasta los tiempos de la restauración de todas las cosas, acerca de las cuales Dios habló por boca de sus santos profetas desde antiguo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde tiempos antiguos'. La expresión no necesariamente significa 'desde la eternidad' aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: whom
  chosen_spanish: A él
  alternatives_spanish:
  - a quien
  - al cual
  lexicon: BDAG
  rationale: El relativo griego retoma a Jesús y funciona como objeto. En español, para evitar una construcción pesada y mantener fluidez, se explicita con el clítico y el dativo inicial 'A él', conservando la referencia personal sin alterar el sentido.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: le es necesario
  alternatives_spanish:
  - debe
  - es necesario que
  lexicon: BDAG
  rationale: La necesidad expresada por δεῖ tiene fuerza de necesidad divina. 'Le es necesario' preserva esa obligación sin sonar mecánica y evita suavizarla excesivamente.
- source_word: οὐρανὸν μὲν δέξασθαι
  english_pob_choice: heaven must receive
  chosen_spanish: que el cielo lo reciba
  alternatives_spanish:
  - que el cielo lo acoja
  - que sea recibido por el cielo
  lexicon: BDAG
  rationale: Sigo la decisión auditada de tomar οὐρανόν como sujeto gramatical que recibe a Jesús. 'Reciba' conserva el valor de δέχομαι y mantiene la construcción activa, mientras que 'acoger' o la pasiva serían menos precisas o más interpretativas.
- source_word: ἄχρι χρόνων
  english_pob_choice: until the times
  chosen_spanish: hasta los tiempos
  alternatives_spanish:
  - hasta el tiempo
  - hasta que lleguen los tiempos
  lexicon: BDAG
  rationale: El plural χρόνων se conserva como 'tiempos', señalando un período escatológico y no un único momento.
- source_word: ἀποκαταστάσεως
  english_pob_choice: restoration
  chosen_spanish: restauración
  alternatives_spanish:
  - restitución
  - renovación
  lexicon: BDAG
  rationale: '''Restauración'' es el equivalente directo y amplio en español. ''Restitución'' puede sonar más jurídico y ''renovación'' desplaza el término hacia otra matiz menos exacto.'
- source_word: πάντων
  english_pob_choice: of all things
  chosen_spanish: de todas las cosas
  alternatives_spanish:
  - de todo
  - de todas
  lexicon: BDAG
  rationale: El neutro plural se conserva como una expresión amplia y natural en español. 'Todas las cosas' evita restringirlo a personas y mantiene la amplitud del griego.
- source_word: ὧν
  english_pob_choice: about which
  chosen_spanish: acerca de las cuales
  alternatives_spanish:
  - sobre las cuales
  - de las cuales
  lexicon: BDAG
  rationale: La revisión inglesa añadió 'about which' para reflejar mejor el relativo. En español, 'acerca de las cuales' transmite de forma clara y formal que Dios habló en relación con esas cosas.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: BDAG
  rationale: El aoristo de λαλέω se traduce de manera directa con 'habló', manteniendo el tono bíblico sin sobrerrepresentar el matiz.
- source_word: διὰ στόματος
  english_pob_choice: through the mouth of
  chosen_spanish: por boca de
  alternatives_spanish:
  - por la boca de
  - a través de la boca de
  lexicon: BDAG
  rationale: '''Por boca de'' es el idiomatismo bíblico natural en español y conserva la imagen profética de agencia, equivalente al inglés auditado.'
- source_word: τῶν ἁγίων ... προφητῶν
  english_pob_choice: his holy prophets
  chosen_spanish: de sus santos profetas
  alternatives_spanish:
  - de los santos profetas
  - de sus profetas santos
  lexicon: BDAG
  rationale: '''Santos'' se mantiene como calificativo de consagración, y el posesivo ''sus'' sigue la decisión inglesa de relacionar a los profetas con Dios. El orden español habitual hace la frase clara y reverente.'
- source_word: ἀπ’ αἰῶνος αὐτοῦ
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde la antigüedad
  - desde tiempos antiguos
  - desde la eternidad
  lexicon: BDAG
  rationale: La frase no exige 'eternidad'; el audit trail inglés advierte contra esa lectura. 'Desde antiguo' es natural, bíblico y evita cargar el texto con una idea no necesaria.
theological_decisions:
- issue: Alcance de ἀποκαταστάσεως πάντων
  english_pob_reading: '''the restoration of all things'' as broad eschatological language without specifying the scope'
  chosen_spanish_reading: '''la restauración de todas las cosas'' como frase escatológica amplia, sin resolver si alude a restauración cósmica, nacional o universal'
  alternative_spanish_readings:
  - '''la restauración de todo'''
  - '''la restauración de todas'''
  - lectura como salvación universal
  - lectura restringida a la restauración de Israel
  rationale: La frase griega es amplia y la traducción debe permanecer amplia. 'Todas las cosas' conserva el alcance neutro sin inclinar el versículo hacia un sistema doctrinal concreto. No se resuelve aquí si el texto implica universalismo o una restauración limitada.
  doctrine_reference: Preservar la tensión teológica del texto; no definir más allá del original.
- issue: Fuerza de οὐρανὸν δέξασθαι
  english_pob_reading: heaven as the grammatical subject that receives Jesus until the appointed times
  chosen_spanish_reading: el cielo como sujeto que recibe a Jesús hasta el tiempo señalado
  alternative_spanish_readings:
  - '''el cielo debe recibirlo'''
  - '''Jesús debe ser recibido por el cielo'''
  rationale: 'La construcción activa se conserva: el cielo recibe a Jesús. En español, ''que el cielo lo reciba'' mantiene esa relación sin convertirla en una pasiva doctrinalmente cargada ni perder la agencia del sujeto gramatical.'
  doctrine_reference: Primacía del original griego sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que añadió la relación explícita de ὧν con el contenido de lo dicho ('about which'). También conserva la lectura gramatical de οὐρανὸν δέξασθαι con el cielo como sujeto receptor y mantiene la amplitud de ἀποκαταστάσεως πάντων sin resolver debates escatológicos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene 'Jesús' para Ἰησοῦς y no aparece 'Cristo' como nombre litúrgico porque el versículo no lo exige.
  - '''Espíritu'' no aparece en este versículo; no hay decisión contextual que fijar.'
  - '''Santo'' se traduce como ''santos'' en sentido de consagración, en armonía con el registro bíblico.'
  - La puntuación española ajusta el orden para que la cláusula relativa final suene natural sin perder el paralelismo del griego.
