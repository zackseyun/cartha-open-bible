    issue: 'Construcción inicial poco natural: ''A él le es necesario que el cielo lo reciba'''
    rationale: Aunque intenta reflejar ὃν + δεῖ, en español suena pesada y algo artificial. Además, 'le es necesario' aplicado a Jesús puede distraer del punto principal, que es la necesidad de que el cielo lo reciba. Una formulación como 'a quien el cielo debe recibir' preserva la referencia relativa y mejora notablemente la fluidez sin perder fuerza semántica.
  revised_spanish_text: a quien el cielo debe recibir hasta los tiempos de la restauración de todas las cosas, acerca de las cuales Dios habló por boca de sus santos profetas desde antiguo[a].
