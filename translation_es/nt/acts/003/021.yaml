  rationale: Se reemplaza la apertura por una construcción relativa más natural en español, que sigue siendo fiel al acusativo relativo ὃν y a la necesidad expresada por δεῖ, mientras mantiene al cielo como sujeto de 'recibir'. También se añade una coma antes de 'acerca de las cuales' para mejorar la legibilidad de la cláusula relativa explicativa en español.
