translation:
  language: es
  text: 'Pero Dios cumplió así lo que había anunciado de antemano por boca de todos los profetas[a]: que su Mesías[b] sufriría.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de todos los profetas». El griego dice más literalmente «por boca de todos los profetas».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «su Cristo». Aquí se traduce «su Mesías» porque Χριστός funciona como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: El valor adversativo de δέ se conserva mejor con «Pero», que enlaza el contraste con el contexto inmediato sin sonar forzado.
- source_word: προκατήγγειλεν
  english_pob_choice: had announced beforehand
  chosen_spanish: había anunciado de antemano
  alternatives_spanish:
  - había predicho
  - había proclamado de antemano
  lexicon: BDAG
  rationale: «Había anunciado de antemano» conserva tanto el prefijo temporal como el acto de comunicación, sin volverlo más interpretativo que el griego.
- source_word: διὰ στόματος πάντων τῶν προφητῶν
  english_pob_choice: through the mouth of all the prophets
  chosen_spanish: por boca de todos los profetas
  alternatives_spanish:
  - por la boca de todos los profetas
  - a través de la boca de todos los profetas
  - por medio de todos los profetas
  lexicon: BDAG
  rationale: Se mantiene el giro idiomático bíblico «por boca de», que refleja mejor la imagen concreta del griego que una simplificación como «por medio de».
- source_word: παθεῖν
  english_pob_choice: would suffer
  chosen_spanish: padeciera
  alternatives_spanish:
  - sufriera
  - tuviera que padecer
  lexicon: BDAG
  rationale: 'En español, el subjuntivo dentro del discurso de contenido anunciado suena natural: «que ... padeciera». «Padeciera» conserva el sentido de sufrir sin introducir obligación modal no explicitada por la forma verbal.'
- source_word: τὸν χριστὸν αὐτοῦ
  english_pob_choice: his Messiah
  chosen_spanish: su Mesías
  alternatives_spanish:
  - su Cristo
  - su Ungido
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título; esto sigue la decisión doctrinal del POB y comunica mejor el trasfondo judío del pasaje que «Cristo» en español.
- source_word: ἐπλήρωσεν
  english_pob_choice: fulfilled
  chosen_spanish: cumplió
  alternatives_spanish:
  - llevó a cumplimiento
  - realizó
  lexicon: BDAG
  rationale: «Cumplió» expresa de modo claro la idea de πληρόω en contextos de cumplimiento profético. En español, aquí suena más natural que «llenó» y evita sobreexpansión.
- source_word: οὕτως
  english_pob_choice: thus / in this way
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - entonces
  lexicon: BDAG
  rationale: '«Así» mantiene el matiz modal de οὕτως y se integra con fluidez en la sintaxis española: «Dios así cumplió...».'
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: his Messiah
  chosen_spanish_reading: su Mesías
  alternative_spanish_readings:
  - su Cristo
  - su Ungido
  rationale: La lectura titulada del griego se conserva con «Mesías», evitando convertir el término en un nombre eclesial ya fijado. Esto mantiene el énfasis profético y judío del discurso de Pedro.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: Relación entre profecía y sufrimiento del Mesías
  english_pob_reading: that his Messiah would suffer
  chosen_spanish_reading: que su Mesías padeciera
  alternative_spanish_readings:
  - que su Mesías debía padecer
  - que su Mesías sufriera
  rationale: Se preserva la tensión profética sin añadir necesidad modal explícita. «Padeciera» comunica el contenido anunciado sin resolver la fuerza del texto más allá de lo que el griego afirma.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que cambió primero «his Messiah» a «his Christ» por consistencia léxica, y luego lo restauró a «his Messiah» conforme a la política doctrinal. La presente propuesta sigue la decisión final y refleja también la preferencia del POB por conservar el matiz titulado de Χριστός.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente griego directo.
  - «Mesías» se usa de forma consistente para Χριστός como título; no se alterna con «Cristo» en el texto principal.
  - «Por boca de» conserva la imagen semítica del original y evita una equivalencia demasiado general.
  - «Padeciera» mantiene la naturalidad del español bíblico sin perder el valor de sufrimiento del infinitivo griego.
