- from: Pero Dios así cumplió lo que había anunciado de antemano por boca de todos los profetas[a], que su Mesías[b] padeciera.
  to: 'Pero Dios cumplió así lo que había anunciado de antemano por boca de todos los profetas[a]: que su Mesías[b] sufriría.'
  rationale: Se ajusta el orden de «así» para un español más natural y se cambia «padeciera» por «sufriría» para reflejar con mayor claridad el contenido anunciado de la profecía, en línea con la auditoría inglesa («would suffer»), sin introducir obligación modal. Se mantiene «Mesías» y la nota lexical correspondiente.
