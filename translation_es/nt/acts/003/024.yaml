  rationale: Se añadió 'también' para reflejar explícitamente el valor aditivo de καί en 'καὶ κατήγγειλαν', conforme a la decisión léxica auditada en inglés ('also announced'). También se ajustó la puntuación para mejorar la legibilidad en español sin alterar la estructura ni el sentido del griego.
