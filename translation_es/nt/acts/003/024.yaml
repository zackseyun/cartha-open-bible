    reason: lexical_alternative
  - marker: c
    text: O «estos tiempos». La frase se refiere al periodo presente de cumplimiento en el discurso de Pedro.
    reason: alternative_reading
  revision_rationale: Se añadió 'también' para reflejar explícitamente el valor aditivo de καί en 'καὶ κατήγγειλαν', conforme a la decisión léxica auditada en inglés ('also announced'). También se ajustó la puntuación para mejorar la legibilidad en español sin alterar la estructura ni el sentido del griego.
