translation:
  language: es
  text: Y todos los profetas, desde Samuel y los que le siguieron[a], cuantos hablaron, también anunciaron[b] estos días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que vinieron en sucesión» o «los que siguieron».
    reason: lexical_alternative
  - marker: b
    text: O «proclamaron»; o, de manera más interpretativa, «predijeron».
    reason: lexical_alternative
  - marker: c
    text: O «estos tiempos». La frase se refiere al periodo presente de cumplimiento en el discurso de Pedro.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες δὲ οἱ προφῆται
  english_pob_choice: all the prophets
  chosen_spanish: todos los profetas
  alternatives_spanish:
  - y todos los profetas
  - ahora todos los profetas
  lexicon: BDAG
  rationale: En español, "todos los profetas" comunica con naturalidad el alcance total de πάντες οἱ προφῆται. Conservé la unión con la frase anterior mediante la simple coordinación "Y"; δέ aquí es enlazador y no exige un matiz adversativo fuerte.
- source_word: ἀπὸ Σαμουὴλ
  english_pob_choice: from Samuel
  chosen_spanish: desde Samuel
  alternatives_spanish:
  - a partir de Samuel
  - comenzando desde Samuel
  lexicon: BDAG
  rationale: Con un nombre personal, ἀπό señala punto de inicio en una secuencia. "Desde Samuel" es la forma más natural en español para expresar ese comienzo temporal o serial sin sobreexplicar.
- source_word: τῶν καθεξῆς
  english_pob_choice: those after him
  chosen_spanish: los que le siguieron
  alternatives_spanish:
  - los que vinieron después
  - los que siguieron en sucesión
  lexicon: BDAG
  rationale: La frase sustantivada indica una serie posterior. "Los que le siguieron" conserva la idea de sucesión y resulta idiomática en español, sin perder el enlace con Samuel.
- source_word: ὅσοι ἐλάλησαν
  english_pob_choice: as many as spoke
  chosen_spanish: cuantos hablaron
  alternatives_spanish:
  - todos los que hablaron
  - los que hablaron
  lexicon: BDAG
  rationale: ὅσοι tiene fuerza cuantitativa inclusiva. "Cuantos hablaron" reproduce mejor ese alcance que una simple subordinada relativa y suena natural en español bíblico contemporáneo.
- source_word: καὶ κατήγγειλαν
  english_pob_choice: also announced
  chosen_spanish: y anunciaron
  alternatives_spanish:
  - y proclamaron
  - y declararon
  lexicon: BDAG
  rationale: καταγγέλλω suele significar anunciar o proclamar públicamente. En español, "anunciaron" mantiene el sentido público y evita introducir una interpretación más fuerte como "profetizaron" o "predijeron".
- source_word: τὰς ἡμέρας ταύτας
  english_pob_choice: these days
  chosen_spanish: estos días
  alternatives_spanish:
  - estos tiempos
  lexicon: BDAG
  rationale: Conservo la deíxis temporal directa del griego. "Estos días" es la traducción más inmediata; "estos tiempos" sería posible, pero menos literal y algo más interpretativa.
theological_decisions:
- issue: Referencia profética al periodo presente de cumplimiento
  english_pob_reading: these days
  chosen_spanish_reading: estos días
  alternative_spanish_readings:
  - estos tiempos
  rationale: El griego alude al tiempo presente de cumplimiento que Pedro está explicando, pero no lo explicita más de lo necesario. Mantengo la expresión temporal simple para no resolver la tensión interpretativa que la POB inglesa también conserva.
  doctrine_reference: Preservar la tensión teológica sin ampliarla indebidamente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura inglesa revisada del POB, que decidió no explicitar un matiz enfático para δέ y conservar una estructura simple. En español, mantengo esa sobriedad: no introduzco un equivalente enfático adicional y dejo la secuencia profética con el mismo alcance inclusivo y temporal.'
  spanish_consistency_notes:
  - Usé «Dios»/«Yahvé» según la convención del proyecto, aunque este versículo no contiene el nombre divino.
  - Mantuve «anunciaron» para κατήγγειλαν porque el verbo griego es de proclamación pública y no exige «profetizaron».
  - Opté por «estos días» en el texto principal y reservé «estos tiempos» en nota, siguiendo la tensión temporal del original.
  - La coordinación inicial con «Y» es suficiente en español; no forcé un marcador enfático para δέ.
