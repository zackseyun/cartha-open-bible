review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego y el rastro POB en casi todo: μετανοήσατε = «arrepiéntanse», οὖν = «Por tanto», ἐπιστρέψατε = «vuelvan», y la cláusula final de propósito/resultado = «para que sus pecados sean borrados». Sin embargo, la nota al pie no preserva la alternativa léxica inglesa documentada para ἐξαλειφθῆναι («be blotted out»), porque repite exactamente la lectura principal («sean borrados»).'
  spanish_quality_summary: El español es natural, claro y digno. «Arrepiéntanse» y «vuelvan» suenan bien en registro eclesial amplio. La única reparación necesaria es la nota, para que aporte una verdadera alternativa semántica y estilística en español. También conviene anclarla en «borrados[a]» para reflejar la alternativa tradicional.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión de usar «arrepiéntanse» concuerda con la pauta de μετάνοια/μετανοέω en contexto de pecado. «Pecados» y «espíritu» no presentan problemas aquí.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de ofrecer la alternativa léxica documentada.
    rationale: El inglés conserva «be blotted out» como alternativa a «be wiped away». En español, «O 'sean borrados'» no añade información, porque el texto ya dice «sean borrados». Debe sustituirse por una alternativa real, como «sean borrados[a]» con nota «O 'sean borrados por completo'» o, mejor, «O 'sean borrados del todo' / 'sean borrados como de un registro'». La opción más fiel al matiz tradicional es «sean borrados como de un registro», pero la nota debe seguir siendo breve.
  revised_spanish_text: Por tanto, arrepiéntanse y vuelvan, para que sus pecados sean borrados[a].
