translation:
  language: es
  text: Por tanto, arrepiéntanse y vuelvan, para que sus pecados sean borrados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sean borrados como de un registro".
    reason: lexical_alternative
lexical_decisions:
- source_word: μετανοήσατε
  english_pob_choice: repent
  chosen_spanish: arrepiéntanse
  alternatives_spanish:
  - cambien de pensar
  - cambien de mente
  - arrepentíos
  lexicon: BDAG
  rationale: El imperativo aoristo exige una respuesta decisiva. En español, 'arrepiéntanse' conserva la fuerza moral y exhortativa de μετανοήσατε sin diluirla en una formulación meramente cognitiva. 'Cambien de pensar' sería demasiado débil y poco natural en este contexto.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: La partícula marca conclusión lógica a partir del discurso previo. 'Por tanto' reproduce bien esa inferencia en español formal y readable.
- source_word: ἐπιστρέψατε
  english_pob_choice: turn back
  chosen_spanish: vuelvan
  alternatives_spanish:
  - regresen
  - retornen
  - vuélvanse
  lexicon: BDAG
  rationale: El verbo es un imperativo activo de retorno. 'Vuelvan' comunica la idea de volver o regresar sin introducir la pasividad o la carga eclesiástica de 'conviértanse'. En este contexto, el complemento implícito hacia Dios queda entendido por la secuencia del mandato.
- source_word: πρὸς τὸ ἐξαλειφθῆναι
  english_pob_choice: so that ... may be wiped away
  chosen_spanish: para que ... sean borrados
  alternatives_spanish:
  - para el borrado de
  - a fin de que ... sean borrados
  - para que ... sean borradas
  lexicon: BDAG
  rationale: La preposición con infinitivo articular expresa propósito o resultado. 'Para que ... sean borrados' suena natural en español y preserva el sentido final de la construcción, evitando una frase nominal demasiado literal.
- source_word: ἐξαλειφθῆναι
  english_pob_choice: be wiped away
  chosen_spanish: sean borrados
  alternatives_spanish:
  - sean borrados de la memoria
  - sean borrados / eliminados
  - sean borrados o tachados
  lexicon: BDAG
  rationale: El pasivo de ἐξαλείφω conserva la imagen de borrar o eliminar. 'Sean borrados' mantiene esa metáfora con buena inteligibilidad. La alternativa tradicional 'borrados / tachados' se puede evocar en la nota.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: BDAG
  rationale: '''Pecados'' es el equivalente normal y preciso de ἁμαρτίας en este plural. ''Faltas'' reduce la fuerza moral; ''transgresiones'' es más técnico y menos natural.'
theological_decisions:
- issue: Relación entre arrepentimiento, retorno y perdón de pecados
  english_pob_reading: 'Render the clause as purpose/result without specifying a doctrinal mechanism beyond the text: ''so that your sins may be wiped away.'''
  chosen_spanish_reading: 'Traducir la cláusula como propósito/resultado: ''para que sus pecados sean borrados'', sin precisar un mecanismo doctrinal adicional.'
  alternative_spanish_readings:
  - para el borrado de sus pecados
  - para que sus pecados sean eliminados
  rationale: El versículo vincula el arrepentimiento y el retorno con la remoción de los pecados, pero no desarrolla aquí una teoría completa del orden de salvación. La traducción conserva esa relación sin sobreexplicarla ni armonizarla con fórmulas confesionales externas.
  doctrine_reference: Preservar la tensión teológica del texto; no resolver el mecanismo de perdón más allá de lo explícito.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'repent' sobre 'change your thinking' para μετανοήσατε y mantuvo 'turn back' para ἐπιστρέψατε. En español, se preserva esa misma distinción mediante 'arrepiéntanse' y 'vuelvan'.
  spanish_consistency_notes:
  - Se mantiene 'pecados' para ἁμαρτίας, coherente con el plural concreto del texto.
  - Se evita 'conviértanse' para no cargar el imperativo con una formulación más doctrinal que la forma verbal activa del griego.
  - La nota alternativa sobre 'borrados' conserva la metáfora de eliminación sin imponer una lectura distinta.
