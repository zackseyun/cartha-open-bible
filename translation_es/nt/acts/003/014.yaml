translation:
  language: es
  text: Pero ustedes negaron al Santo y al Justo, y pidieron que se les concediera[a] un homicida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente en el contexto, 'que se les liberara'.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑμεῖς δὲ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero ustedes mismos
  - Y ustedes
  lexicon: BDAG
  rationale: δέ aporta contraste; ὑμεῖς añade énfasis. 'Pero ustedes' conserva el contraste y la fuerza acusatoria directa con un español natural.
- source_word: τὸν ἅγιον καὶ δίκαιον
  english_pob_choice: the Holy and Righteous One
  chosen_spanish: al Santo y Justo
  alternatives_spanish:
  - al Santo y al Justo
  - al santo y justo
  lexicon: BDAG
  rationale: El griego usa artículo con adjetivos coordinados con valor sustantivo y título aplicado a Jesús. En español, 'al Santo y Justo' mantiene esa fuerza titular sin añadir 'Uno' de manera innecesaria; la mayúscula marca el referente cristológico.
- source_word: ἠρνήσασθε
  english_pob_choice: denied
  chosen_spanish: negaron
  alternatives_spanish:
  - rechazaron
  - desconocieron
  lexicon: BDAG
  rationale: ἀρνέομαι puede significar negar, repudiar o desautorizar. 'Negaron' conserva el valor directo y judicial del verbo, en paralelo con el texto base en inglés.
- source_word: ᾐτήσασθε
  english_pob_choice: asked for
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - clamaron por
  lexicon: BDAG
  rationale: αἰτέω es pedir o solicitar. 'Pidieron' es natural en español y mantiene la idea de petición dirigida a una autoridad.
- source_word: ἄνδρα φονέα
  english_pob_choice: a murderer
  chosen_spanish: un homicida
  alternatives_spanish:
  - un asesino
  - un hombre homicida
  lexicon: BDAG
  rationale: El griego combina ἄνδρα ('varón / hombre') con φονέα ('asesino, homicida'). En español, 'un homicida' preserva la carga lexical sin forzar una perífrasis pesada; 'asesino' también sería posible, pero 'homicida' es más cercano al registro jurídico del contexto.
- source_word: χαρισθῆναι ὑμῖν
  english_pob_choice: to be granted to you
  chosen_spanish: que se les concediera
  alternatives_spanish:
  - que se les diera
  - que se les liberara
  lexicon: BDAG
  rationale: χαρίζομαι aquí expresa conceder como favor o dispensar en un contexto judicial. 'Concediera' sigue de cerca el sentido de 'granted'; el complemento pronominal 'se les' refleja la pasiva con dativo. La alternativa contextual 'liberara' queda implícita sin sobretraducir el verbo.
theological_decisions:
- issue: Título cristológico 'the Holy and Righteous One'
  english_pob_reading: Treat as a titular description of Jesus with capitalization
  chosen_spanish_reading: 'Tratarlo como título aplicado a Jesús: ''el Santo y Justo'''
  alternative_spanish_readings:
  - 'como meros adjetivos: ''el santo y justo'''
  - '''el Santo, el Justo'''
  rationale: En el contexto petrino, los adjetivos forman una designación con peso identificador y reverencial. La mayúscula inicial en español ayuda a señalar la referencia cristológica sin introducir palabras ajenas al texto.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Nuance of χαρισθῆναι in the Barabbas context
  english_pob_reading: Render literally as 'to be granted to you' in the main text
  chosen_spanish_reading: '''que se les concediera'''
  alternative_spanish_readings:
  - '''que se les liberara'''
  - '''que se les otorgara'''
  rationale: El verbo griego es más amplio que 'liberar', pero el contexto judicial lo presupone. 'Concediera' mantiene la proximidad al verbo y deja visible la tensión entre concesión y liberación; la lectura contextual alternativa queda abierta sin perder la referencia a Barrabás.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés: se conserva la acusación directa (''Pero ustedes...''), el título cristológico sustantivado, y la clausula final con verbo de concesión en lugar de una paráfrasis interpretativa. La única tensión lexical relevante es χαρισθῆναι, donde el contexto de Barrabás permite ''liberara'', pero el texto principal prefiere ''concediera'' por mayor cercanía al griego.'
  spanish_consistency_notes:
  - Se usó 'Santo y Justo' como título cristológico consistente con el valor substantival del griego.
  - Se prefirió 'homicida' en lugar de 'asesino' para mantener un matiz más jurídico y menos coloquial.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - La pasiva con dativo ὑμῖν se reflejó con 'se les', natural en español y fiel al destinatario implícito.
