revisions:
- from: El Dios de Abraham, de Isaac y de Jacob[a], el Dios de nuestros padres, glorificó a su siervo Jesús, a quien ustedes entregaron y negaron delante de Pilato, cuando este había resuelto soltarlo.
  to: El Dios de Abraham, de Isaac y de Jacob[a], el Dios de nuestros padres, glorificó a su siervo Jesús, a quien ustedes entregaron y negaron delante de Pilato, cuando este había resuelto ponerlo en libertad.
  rationale: Se conserva la traducción general del borrador porque es fiel y bien escrita, pero se ajusta la nota de παῖς para evitar una lectura filial más fuerte de la que expresa la alternativa inglesa, y se eleva «soltarlo» a «ponerlo en libertad» para reflejar mejor el registro judicial de ἀπολύειν.
