translation:
  language: es
  text: El Dios de Abraham, de Isaac y de Jacob[a], el Dios de nuestros padres, glorificó a su siervo Jesús, a quien ustedes entregaron y negaron delante de Pilato, cuando este había resuelto ponerlo en libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su niño Jesús». El griego παῖς puede significar tanto «niño» como «siervo»; aquí se prefiere «siervo» por el probable eco del lenguaje del Siervo en Isaías.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ θεὸς Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: The God of Abraham and Isaac and Jacob
  chosen_spanish: El Dios de Abraham, de Isaac y de Jacob
  alternatives_spanish:
  - El Dios de Abraham y de Isaac y de Jacob
  - El Dios de Abraham, Isaac y Jacob
  lexicon: BDAG
  rationale: Conservo la fórmula pactual bíblica y el eco de Éxodo 3:6/LXX. En español, las comas con repetición de la preposición 'de' hacen la frase natural y a la vez transparente; mantienen la enumeración nominal sin perder claridad.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de nuestros padres
  alternatives_spanish:
  - el Dios de nuestros antepasados
  lexicon: BDAG
  rationale: '''Padres'' conserva el registro bíblico y pactual de πατέρων, además de reflejar mejor el lenguaje de la historia de Israel que ''antepasados''. En español, el plural posesivo ''nuestros padres'' comunica el vínculo comunitario heredado.'
- source_word: ἐδόξασεν
  english_pob_choice: has glorified
  chosen_spanish: glorificó
  alternatives_spanish:
  - ha glorificado
  - honró
  lexicon: BDAG
  rationale: El aoristo griego se vierte de manera natural con el pretérito perfecto simple en español en un discurso narrativo. 'Glorificó' conserva mejor el peso teológico de δοξάζω que 'honró', sin forzar el aspecto.
- source_word: τὸν παῖδα αὐτοῦ Ἰησοῦν
  english_pob_choice: his servant Jesus
  chosen_spanish: a su siervo Jesús
  alternatives_spanish:
  - a su hijo Jesús
  - a su niño Jesús
  lexicon: BDAG
  rationale: Sigo la decisión auditada de 'servant' por el trasfondo isaiano de Siervo y porque evita una lectura filial o infantil que no está exigida por παῖς aquí. 'Siervo' preserva la tensión cristológica e intertextual del pasaje.
- source_word: παρεδώκατε
  english_pob_choice: you handed over
  chosen_spanish: entregaron
  alternatives_spanish:
  - lo entregaron
  - lo pusieron en manos de
  lexicon: BDAG
  rationale: '''Entregaron'' funciona de forma natural en español para παραδίδωμι en contexto judicial y mantiene la idea de poner a Jesús bajo control ajeno. Evita añadir la carga interpretativa de ''traicionaron'', que el contexto no requiere.'
- source_word: ἠρνήσασθε
  english_pob_choice: denied
  chosen_spanish: negaron
  alternatives_spanish:
  - renegaron de
  - lo negaron
  lexicon: BDAG
  rationale: '''Negaron'' conserva el valor directo de ἀρνέομαι y su vínculo con el lenguaje neotestamentario de la negación. En la construcción con objeto implícito, el sentido queda claro por el contexto inmediato.'
- source_word: κατὰ πρόσωπον Πιλάτου
  english_pob_choice: before Pilate
  chosen_spanish: delante de Pilato
  alternatives_spanish:
  - en presencia de Pilato
  - ante Pilato
  lexicon: BDAG
  rationale: '''Delante de Pilato'' comunica el matiz público y cara a cara de la expresión idiomática griega sin sonar forzado. Mantiene la escena judicial que subyace en el contexto.'
- source_word: κρίναντος ἐκείνου ἀπολύειν
  english_pob_choice: when he had decided to release him
  chosen_spanish: cuando este había resuelto soltarlo
  alternatives_spanish:
  - cuando había decidido soltarlo
  - después de haber decidido soltarlo
  lexicon: BDAG
  rationale: La construcción genitiva absoluta se traduce de manera temporal y fluida en español. 'Había resuelto' capta el acto de decisión de κρίναντος, y 'soltarlo' es una opción idiomática y judicialmente válida para ἀπολύειν en este contexto.
theological_decisions:
- issue: Rendering of παῖς for Jesus
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - hijo
  - niño
  rationale: La elección 'siervo' preserva el eco probable de Isaías y mantiene la referencia cristológica sin introducir una relación filial que el término no expresa aquí. También evita una ambigüedad en español donde 'hijo' podría oscurecer la precisión del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5; lectura cristológica sobria dentro de la ortodoxia calcedoniana
- issue: Aspecto verbal de ἐδόξασεν
  english_pob_reading: has glorified
  chosen_spanish_reading: glorificó
  alternative_spanish_readings:
  - ha glorificado
  - glorificó
  rationale: No es necesario imponer un perfecto compuesto en español para reflejar el aoristo. El pretérito simple suena natural y sigue transmitiendo la acción completa y decisiva de Dios, sin alterar el sentido teológico.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La revisión final del testimonio inglés quedó estable (''high_agreement'', sin cambios). Por eso, esta versión española sigue la misma línea interpretativa: conserva la fórmula patriarcal, traduce παῖς como ''siervo'', y vierte la escena judicial de manera natural sin añadir interpretación extra.'
  spanish_consistency_notes:
  - He mantenido 'Dios' para θεός y 'Jesús' para Ἰησοῦς de forma consistente con el estándar del proyecto.
  - He evitado 'SEÑOR' como sustituto de Yahvé, porque el texto aquí no contiene el tetragrámaton ni una cita directa que lo exija.
  - He usado 'siervo' para παῖς siguiendo la decisión auditada del POB en inglés; la nota aclara la alternativa semántica sin perder la tensión léxica.
  - '''Delante de Pilato'' y ''cuando este había resuelto soltarlo'' preservan el trasfondo judicial del griego sin calcar la sintaxis griega de manera rígida.'
