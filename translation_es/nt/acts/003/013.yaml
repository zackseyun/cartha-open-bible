base_translation:
  language: en
  yaml_path: translation/nt/acts/003/013.yaml
  text: The God of Abraham and Isaac and Jacob[a], the God of our fathers, has glorified his servant Jesus, whom you handed over and denied before Pilate, when he had decided to release him.
  footnotes:
  - marker: a
    text: Or "his child Jesus." The Greek word παῖς can mean either "child" or "servant"; here "servant" is preferred because of the likely echo of Isaiah's Servant language.
