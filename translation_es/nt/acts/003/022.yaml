translation:
  language: es
  text: 'Moisés, en efecto, dijo[a]: «Yahvé Dios les levantará un profeta de entre sus hermanos, como yo[b]. A él lo escucharán en todo lo que les hable».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Moisés, en efecto, dijo que...». La partícula griega μέν marca énfasis o avance del discurso; aquí se vierte con una fórmula natural en español.'
    reason: lexical_alternative
  - marker: b
    text: Hechos cita Deuteronomio 18:15 con redacción ligeramente distinta; en particular, el griego aquí dice «Yahvé Dios»/«el Señor Dios» y no «Yahvé tu Dios»/«el Señor tu Dios».
    reason: cross_reference
lexical_decisions:
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Nombre propio estándar; se conserva la forma española usual y reconocible.
- source_word: μὲν
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - pues
  - —
  lexicon: BDAG
  rationale: La partícula μέν aporta énfasis y avance discursivo; «en efecto» transmite ese matiz sin sobrecargar el español.
- source_word: εἶπεν ὅτι
  english_pob_choice: said, ‘...’
  chosen_spanish: 'dijo: «...»'
  alternatives_spanish:
  - dijo que
  - 'afirmó: «...»'
  lexicon: BDAG
  rationale: La cita directa es natural en español y refleja con claridad la fórmula de introducción del discurso.
- source_word: Προφήτην
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  - aquel profeta
  lexicon: BDAG
  rationale: El acusativo anartro se vierte de forma indefinida; el peso profético-mesiánico del pasaje queda en el contexto, no en una glosa interpretativa.
- source_word: ἀναστήσει
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - hará surgir
  - alzará
  - suscitará
  lexicon: BDAG
  rationale: «Levantar» comunica de manera natural el valor de suscitar/poner en pie a un profeta, conservando el enlace con Deuteronomio sin imponer un sentido de resurrección como primario.
- source_word: κύριος ὁ θεὸς
  english_pob_choice: the Lord God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Dios
  lexicon: BDAG
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto, y «Dios» para θεός. El griego de Hechos sigue la forma de la cita sin el «tu» del texto de Deuteronomio.
- source_word: ἐκ τῶν ἀδελφῶν ὑμῶν
  english_pob_choice: from among your brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre sus hermanos israelitas
  - de entre sus parientes
  lexicon: BDAG
  rationale: Se conserva el plural masculino de parentesco/covenänto como «hermanos»; «de entre» expresa bien ἐκ. El pronombre se adapta al español por concordancia con el antecedente implícito de «un profeta».
- source_word: ὡς ἐμέ
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - como a mí
  - semejante a mí
  lexicon: BDAG
  rationale: Comparación directa y sobria; mantiene la relación de semejanza entre el profeta prometido y Moisés.
- source_word: αὐτοῦ ἀκούσεσθε
  english_pob_choice: You shall listen to him
  chosen_spanish: A él le escucharán
  alternatives_spanish:
  - lo escucharán
  - deberán escucharlo
  lexicon: BDAG
  rationale: En español, «escuchar» expresa mejor la obediencia atenta que «oír». Se mantiene el sentido de futura obligación/covenantal sin volverlo un mandato explícito que el griego no formula aquí de manera directa.
- source_word: κατὰ πάντα ὅσα ἂν λαλήσῃ πρὸς ὑμᾶς
  english_pob_choice: in everything he says to you
  chosen_spanish: en todo lo que les hable
  alternatives_spanish:
  - en todo cuanto les diga
  - en todas las cosas que les hable
  lexicon: BDAG
  rationale: La construcción distributiva se expresa de forma natural y completa en español; «hable» preserva el valor futuro-subjuntivo de λαλήσῃ en el marco de la cita.
theological_decisions:
- issue: Cita de Deuteronomio 18 y referencia mesiánica
  english_pob_reading: Retain the wording as a prophetic citation about 'a prophet' without explicitly inserting 'Messiah' into the translation.
  chosen_spanish_reading: Mantener «un profeta» sin añadir «Mesías» o «el Profeta» en el texto principal.
  alternative_spanish_readings:
  - el Profeta
  - el Mesías
  - aquel profeta
  rationale: Hechos aplica el pasaje a Jesús en el contexto inmediato, pero la forma griega citada aquí sigue diciendo «un profeta». La traducción no debe resolver en la línea principal una tensión interpretativa que el texto mantiene.
  doctrine_reference: Primacía del original; preservar la tensión textual y cristológica sin armonización prematura.
- issue: Traducción de κύριος ὁ θεός
  english_pob_reading: the Lord God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor, Dios
  rationale: El proyecto pide usar «Yahvé» para יהוה. Aunque el griego cita κύριος, el trasfondo es la fórmula divina del Pentateuco; se mantiene la distinción sin ocultar el nombre divino.
  doctrine_reference: Norma terminológica del proyecto para el nombre divino.
- issue: ἀδελφῶν ὑμῶν como lenguaje de parentesco/covenio
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - compatriotas
  rationale: Se conserva el masculino plural del griego y el enlace de pacto/descendencia. La nota puede aclarar que el giro abarca al pueblo como colectividad representada.
  doctrine_reference: Precisión léxica y sensibilidad a la fuerza representativa del plural masculino.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparece exactamente en el texto español: [a] tras «dijo» y [b] tras «yo». Se evitó cualquier nota sin anclaje visible.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se mantiene «profeta» sin mayúscula para no introducir una identificación interpretativa no presente en la cita.
  - Se emplea «escuchar» en sentido de obedecer atentamente, que es natural en español bíblico contemporáneo.
  - Se conserva el plural masculino «hermanos» y se deja la ampliación representativa en nota, no en el texto principal.
