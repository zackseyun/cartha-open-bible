base_translation:
  language: en
  yaml_path: translation/nt/acts/003/022.yaml
  text: Moses indeed said[a], ‘The Lord God will raise up for you a prophet from among your brothers, like me[b]. You shall listen to him in everything he says to you.’
  footnotes:
  - marker: a
    text: Or 'from among your fellow Israelites.' The Greek says 'from among your brothers,' using masculine kinship language in a representative covenantal sense.
    reason: lexical_alternative
  - marker: b
    text: Acts quotes Deuteronomy 18:15 with slightly different wording here; notably, the Greek text of Acts says 'the Lord God' rather than 'the Lord your God.'
    reason: cross_reference
