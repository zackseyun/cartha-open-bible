translation:
  language: es
  text: 'Pero Pedro dijo: «Plata y oro no tengo, pero lo que tengo, eso te doy: en el nombre de Jesús Mesías[a] el Nazareno[b], camina».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». Aquí Χριστός se traduce «Mesías» para preservar su sentido titular.
    reason: alternative_reading
  - marker: b
    text: O «de Nazaret». El griego τοῦ Ναζωραίου es más literalmente «el Nazareno».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀργύριον
  english_pob_choice: Silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata (moneda)
  lexicon: BDAG
  rationale: El griego nombra explícitamente el metal y forma con χρυσίον una pareja idiomática de riqueza material. En español, «plata y oro» conserva esa explicitud y suena natural; «dinero» pierde el paralelismo metálico.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro (moneda)
  - riqueza
  lexicon: BDAG
  rationale: Se mantiene la correspondencia literal con Ἀργύριον para preservar el par «plata y oro», que funciona como merismo de recursos monetarios o riqueza.
- source_word: οὐχ ὑπάρχει μοι
  english_pob_choice: I do not have
  chosen_spanish: No tengo
  alternatives_spanish:
  - no me pertenece
  - no está a mi disposición
  lexicon: BDAG
  rationale: La construcción griega expresa posesión/disponibilidad. «No tengo» comunica de forma natural el sentido sin forzar una construcción existencial en español.
- source_word: ὃ δὲ ἔχω τοῦτό σοι δίδωμι
  english_pob_choice: but what I do have, this I give to you
  chosen_spanish: pero lo que tengo, eso te doy
  alternatives_spanish:
  - pero lo que tengo, esto te doy
  - pero lo que sí tengo, eso te doy
  lexicon: BDAG
  rationale: Se conserva el contraste enfático entre la carencia de plata/oro y la entrega de lo que sí tiene Pedro. «Eso» reproduce bien la fuerza demostrativa de τοῦτό sin sonar artificial.
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por la autoridad de
  - invocando el nombre de
  lexicon: BDAG
  rationale: La fórmula se mantiene de manera transparente y reconocible en español, preservando tanto la literalidad como el peso teológico de la expresión.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός se traduce como «Mesías» para conservar el valor titular de la palabra, de acuerdo con el enfoque del POB. En español, «Jesús Mesías» puede sonar marcado, pero refleja con mayor claridad el título griego que «Jesús Cristo».
- source_word: τοῦ Ναζωραίου
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - de Nazaret
  - el Nazoreo
  lexicon: BDAG
  rationale: Ναζωραῖος funciona aquí como designación/título. «El Nazareno» es la forma española más natural y fiel al valor adjetival del término; «de Nazaret» es más explicativa y menos directa.
- source_word: περιπάτει
  english_pob_choice: walk
  chosen_spanish: camina
  alternatives_spanish:
  - anda
  - camina y sigue
  lexicon: BDAG
  rationale: El imperativo presente se traduce de manera breve y directa. «Camina» conserva el mandato de ponerse en movimiento sin añadir aspecto inceptivo no explicitado por el griego.
theological_decisions:
- issue: Traducción de Χριστοῦ en la fórmula del nombre
  english_pob_reading: Jesus Messiah the Nazarene
  chosen_spanish_reading: Jesús Mesías el Nazareno
  alternative_spanish_readings:
  - Jesús Cristo el Nazareno
  rationale: Se preserva el valor titular de Χριστός como «Mesías», siguiendo el principio del POB de traducir títulos cuando el contexto lo permite. La alternativa tradicional «Cristo» queda indicada por la nota para lectores que la esperen en una fórmula cristiana establecida.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Valor de la designación Ναζωραίου
  english_pob_reading: the Nazarene
  chosen_spanish_reading: el Nazareno
  alternative_spanish_readings:
  - de Nazaret
  - el Nazoreo
  rationale: El término griego es una designación asociada a Jesús. «El Nazareno» preserva mejor el carácter nominal/titular que una paráfrasis geográfica. Se evita normalizarlo excesivamente como simple procedencia.
  doctrine_reference: BDAG / uso contextual de Ναζωραῖος en los evangelios y Hechos
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre «Messiah» y «Christ» para Χριστός, con una corrección posterior que restaura «Messiah» por coherencia doctrinal. Esta traducción sigue esa corrección y mantiene la decisión titular en español con «Mesías», además de conservar la designación «el Nazareno» para Ναζωραίου. También se tuvo en cuenta que la versión inglesa final y su nota documentan la alternativa tradicional «Christ», por lo que se preserva en nota al pie.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y no se usa «Cristo» como nombre fijo en el cuerpo, para respetar la política de traducir Χριστός como título.
  - Se evita «SEÑOR» porque no aparece κύριος en el versículo; la fórmula es «en el nombre de Jesús Mesías el Nazareno».
  - «Plata y oro» reproduce el par metálico del griego y evita una generalización como «dinero», que perdería precisión lexical.
  - «Camina» conserva el imperativo breve del griego y es comprensible en registro bíblico contemporáneo.
