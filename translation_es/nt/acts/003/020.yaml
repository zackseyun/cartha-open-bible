translation:
  language: es
  text: para que vengan tiempos de refrigerio de la presencia del Señor, y que él envíe al Mesías designado[a] para ustedes, Jesús,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «designado a ustedes» o «previamente designado para ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως ἂν
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La construcción introduce finalidad respecto del llamado previo al arrepentimiento; en español, «para que» comunica bien esa relación sin añadir matices no exigidos por el griego.
- source_word: ἔλθωσιν
  english_pob_choice: may come
  chosen_spanish: vengan
  alternatives_spanish:
  - puedan venir
  - lleguen
  lexicon: BDAG
  rationale: El subjuntivo plural conserva la idea de evento deseado/esperado. «Vengan» es natural y suficientemente abierto para la contingencia del griego.
- source_word: καιροὶ
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - épocas
  - estaciones
  lexicon: BDAG
  rationale: «Tiempos» reproduce de manera amplia el valor de καιροί sin precisar indebidamente una cronología escatológica.
- source_word: ἀναψύξεως
  english_pob_choice: refreshing
  chosen_spanish: refrigerio
  alternatives_spanish:
  - refresco
  - alivio
  - reanimación
  lexicon: BDAG
  rationale: La palabra admite la idea de alivio, descanso o refrescamiento. «Refrigerio» conserva bien la imagen de alivio vivificante en español bíblico y sigue siendo inteligible; se evita «alivio» como demasiado prosaico y «reanimación» como más interpretativo.
- source_word: ἀπὸ προσώπου τοῦ κυρίου
  english_pob_choice: from the presence of the Lord
  chosen_spanish: de parte de la presencia del Señor
  alternatives_spanish:
  - de la presencia del Señor
  - de delante del rostro del Señor
  lexicon: BDAG
  rationale: La expresión griega puede leerse como «desde la presencia». En español, «de parte de la presencia» intenta conservar el movimiento de procedencia señalado por ἀπό y, a la vez, evitar una calca dura; «del Señor» se mantiene en línea con el contexto doctrinal de κύριος.
- source_word: ἀποστείλῃ
  english_pob_choice: he may send
  chosen_spanish: envíe
  alternatives_spanish:
  - mande
  - despache
  lexicon: BDAG
  rationale: El subjuntivo mantiene la dependencia del propósito. «Envíe» es el equivalente más directo y natural para ἀποστέλλω.
- source_word: προκεχειρισμένον
  english_pob_choice: appointed
  chosen_spanish: designado
  alternatives_spanish:
  - nombrado
  - previamente designado
  - designado de antemano
  lexicon: BDAG
  rationale: El participio incluye la idea de una designación previa. «Designado» preserva el sentido principal sin forzar una explicación temporal en el texto principal; la pre-idea queda documentada en nota.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: BDAG
  rationale: El dativo se entiende mejor como beneficio/relación para el auditorio. «Para ustedes» es claro, neutro y coherente con el registro bíblico contemporáneo.
- source_word: χριστὸν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí χριστός funciona como título mesiánico, no como nombre fijo. «Mesías» conserva el sentido judío del título y sigue la preferencia doctrinal del proyecto.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Cómo traducir κύριος en una frase que alude a la presencia divina
  english_pob_reading: from the presence of the Lord
  chosen_spanish_reading: de parte de la presencia del Señor
  alternative_spanish_readings:
  - de la presencia del Señor
  - de delante del rostro del Señor
  rationale: Se mantiene «Señor» como tratamiento de κύριος en un contexto que remite al ámbito divino. La forma elegida busca conservar el valor de procedencia del griego sin convertir la frase en una calca rígida.
  doctrine_reference: 'DOCTRINE.md: κύριος / YHWH and divine-name rendering; preserve contextual κύριος as Señor when the Greek text uses κύριος rather than the tetragrammaton.'
- issue: Valor de προκεχειρισμένον en relación con la elección previa de Jesús
  english_pob_reading: appointed for you
  chosen_spanish_reading: designado para ustedes
  alternative_spanish_readings:
  - previamente designado para ustedes
  - designado de antemano para ustedes
  rationale: El participio puede implicar designación anterior, pero el punto central del versículo es que Jesús es el Mesías destinado para ellos. El texto principal conserva esa afirmación; la antelación queda como alternativa documentada.
  doctrine_reference: 'DOCTRINE.md: contested terms and participles of prior appointment; avoid over-explicating beyond the clause unless the source requires it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar el texto fuente en inglés; esta versión española sigue esa misma lectura estable y conserva las alternativas léxicas relevantes sin añadir expansiones no sustentadas.
  spanish_consistency_notes:
  - Se usa «Mesías» para χριστός como título, en coherencia con la preferencia del proyecto.
  - Se mantiene el nombre propio «Jesús» sin transliteración adicional.
  - «Señor» traduce κύριος conforme al contexto, sin sustituirlo por una paráfrasis doctrinal.
  - El tono es bíblico contemporáneo y publicable, evitando arcaísmos innecesarios.
