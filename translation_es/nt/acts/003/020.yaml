review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura de finalidad de ὅπως ἂν, el sentido general de καιροὶ ἀναψύξεως, y la lectura titular de χριστὸν como «Mesías». También refleja adecuadamente «para ustedes» para ὑμῖν. Sin embargo, «de parte de la presencia del Señor» no representa de manera natural ni precisa ἀπὸ προσώπου τοῦ κυρίου, que aquí significa «de la presencia del Señor» o «desde la presencia del Señor», no una procedencia mediada «de parte de». Además, la nota existente se desvía del rastro de auditoría inglés: la nota documentada corresponde a προκεχειρισμένον ὑμῖν («designado para ustedes / a ustedes / previamente designado para ustedes»), no a ἀναψύξεως.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «de parte de la presencia del Señor» suena forzado e idiomáticamente débil. «Tiempos de refrigerio» es aceptable y eclesialmente legible. «Designado para ustedes» es correcto, aunque «designado» y «nombrado» no mejoran a «designado». La sintaxis se lee mejor con una sola cláusula de finalidad inicial y coordinación posterior.
  glossary_alignment: Alinea bien «Mesías» para χριστός y «Jesús» para Ἰησοῦς. «Señor» para κύριος es aceptable aquí según el expediente doctrinal. No hay conflicto con otros términos del glosario, pero la nota debe trasladarse desde «refrigerio» a «designado para ustedes» para seguir la decisión léxica auditada.
  issues:
  - severity: high
    issue: La frase «de parte de la presencia del Señor» traduce mal ἀπὸ προσώπου τοῦ κυρίου.
    rationale: ἀπό + πρόσωπον en este modismo expresa procedencia «de la presencia» o «desde la presencia», no «de parte de», que en español suele implicar agencia o representación y distorsiona el sentido.
  - severity: medium
    issue: La nota al pie está anclada en el término equivocado.
    rationale: El expediente inglés conserva alternativas para προκεχειρισμένον ὑμῖν, no para ἀναψύξεως. La nota española actual introduce alternativas no auditadas como «restauración» y omite la nota requerida sobre «designado para ustedes».
  - severity: low
    issue: La repetición «para que ... y para que» puede simplificarse estilísticamente.
    rationale: Aunque no es incorrecta, en español fluye mejor «para que ... y que él envíe...», manteniendo la dependencia sintáctica del subjuntivo griego.
  revised_spanish_text: para que vengan tiempos de refrigerio de la presencia del Señor, y que él envíe al Mesías designado[a] para ustedes, Jesús,
  revised_footnotes:
  - marker: a
    text: O «designado a ustedes» o «previamente designado para ustedes».
    reason: lexical_alternative
