translation:
  language: es
  text: 'Ustedes son los hijos de los profetas y del pacto que Dios hizo con sus padres[a], diciendo a Abraham[b]: «Y en tu descendencia todas las familias de la tierra serán bendecidas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos»; el griego dice «hijos», una expresión de herencia pactal.
    reason: lexical_alternative
  - marker: b
    text: O «descendencia». El griego puede referirse colectivamente a los descendientes de Abraham y, en contexto bíblico-teológico, también puede tener un sentido singular representativo.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendientes
  lexicon: BDAG
  rationale: En español, "hijos" conserva el valor de pertenencia hereditaria y de filiación covenantal que el inglés POB expresa con "sons". "Hijos e hijas" neutralizaría el marcado masculino del griego; "descendientes" perdería la imagen filial y hereditaria.
- source_word: προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - pertenecientes a los profetas
  - de la línea de los profetas
  lexicon: BDAG
  rationale: El genitivo se rinde de forma directa en español. En este contexto no se trata de descendencia biológica de profetas individuales, sino de pertenencia a la esfera hereditaria y promesal de los profetas.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: '"Pacto" es el término más natural y reconocido en español bíblico para διαθήκη en contexto salvífico e histórico. "Testamento" sería engañoso; "alianza" es posible, pero aquí "pacto" comunica mejor la tradición pactal abrahámica.'
- source_word: διέθετο
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - estableció
  - concertó
  lexicon: BDAG
  rationale: En la construcción con διαθήκη, el verbo indica hacer o establecer un pacto. "Hizo" es natural y fiel; evita un calco pesado y conserva la acción divina de pactar con los patriarcas.
- source_word: πρὸς τοὺς πατέρας ὑμῶν
  english_pob_choice: with your fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - a sus padres
  - con sus antepasados
  lexicon: BDAG
  rationale: Aunque πρός puede ser "a", el idioma del pacto en español queda mejor con "con". "Sus padres" mantiene el referente a los patriarcas y preserva el paralelismo del griego y del inglés POB.
- source_word: λέγων πρὸς Ἀβραάμ
  english_pob_choice: saying to Abraham
  chosen_spanish: diciendo a Abraham
  alternatives_spanish:
  - al decir a Abraham
  - cuando dijo a Abraham
  lexicon: BDAG
  rationale: El participio explica la cita de Génesis y se traduce con una construcción participial natural en español. "Diciendo a Abraham" conserva la introducción inmediata del discurso sin añadir elementos ajenos.
- source_word: σπέρματί
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  - posteridad
  lexicon: BDAG
  rationale: '"Descendencia" es la mejor opción en español para preservar el sentido colectivo de σπέρμα y, al mismo tiempo, dejar abierta la tensión bíblica entre el colectivo y la posible referencia representativa singular. "Semilla" sería demasiado literal y poco natural; "posteridad" es correcto pero menos transparente.'
- source_word: ἐνευλογηθήσονται
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - recibirán bendición
  - serán bendecidos
  lexicon: BDAG
  rationale: El pasivo futuro se traduce de modo directo. Se usa el femenino plural porque el sujeto inmediato es "todas las familias". "Serán bendecidas" comunica la pasividad del verbo sin forzar una explicación adicional.
- source_word: πατριαὶ
  english_pob_choice: families
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  - linajes
  lexicon: BDAG
  rationale: '"Familias" es la equivalencia más natural y fiel para πατριαί en este eco de la promesa abrahámica. Mantiene amplitud suficiente para abarcar grupos humanos y no restringe el alcance universal del texto.'
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  - país
  lexicon: BDAG
  rationale: En la cita de la promesa a Abraham, "tierra" conserva el alcance universal del griego y del inglés POB. "Mundo" sería más interpretativo; "país" o "suelo" serían demasiado limitados.
theological_decisions:
- issue: Lenguaje filial masculino en υἱοὶ
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: Se conserva el lenguaje filial del griego, que en este contexto funciona como expresión de herencia y pertenencia pactal. En español, "hijos" mantiene esa fuerza sin diluirla en una neutralización que borre la forma masculina del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión bíblico-teológica de σπέρμα/descendencia de Abraham
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - semilla
  - linaje
  - posteridad
  rationale: La promesa abrahámica en la cita conserva una tensión entre lectura colectiva y referencia representativa singular. "Descendencia" permite mantener esa ambivalencia sin imponer una sola interpretación y sin perder la conexión con Génesis.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión más reciente: no hubo cambios necesarios y el veredicto de concordancia fue alto.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, en línea con el estándar del proyecto.
  - Se usó «pacto» para διαθήκη y «bendecidas» para el pasivo futuro, preservando el eco abrahámico.
  - Se evitó «SEÑOR» porque el texto aquí no contiene κύριος; el nombre divino no aparece en este versículo.
  - Se eligió «tierra» para γῆ conforme al alcance universal de la promesa citada.
  - Se mantuvo la puntuación y el orden discursivo de una cita bíblica publicada en español claro y digno.
