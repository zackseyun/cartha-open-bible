review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y el rastro POB en casi todos los puntos: conserva «hijos» para υἱοὶ, «pacto» para διαθήκη, el sentido relacional de «con sus padres», la cita abrahámica y el valor colectivo/representativo de σπέρμα con «descendencia». Sin embargo, la nota [a] no preserva correctamente la alternativa inglesa, porque repite «hijos» donde debe ofrecer «children» = «hijos/as» o mejor «descendientes/niños» según contexto; aquí la alternativa adecuada es «hijos»/«descendientes» frente al texto principal. Dado que el texto principal ya dice «hijos», la nota actual es errónea y debe corregirse.'
  spanish_quality_summary: El español es claro, natural y digno. «Ustedes son...» funciona bien en registro neutro latinoamericano. La sintaxis de «diciendo a Abraham» es aceptable, aunque ligeramente rígida; no requiere cambio. La puntuación y la cita están bien. La única reparación necesaria es la coherencia y utilidad de la nota [a].
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: no hay ocurrencias de Yahvé, Mesías, δοῦλος, etc. «Pacto» para διαθήκη es aceptable en este proyecto por el razonamiento documentado. «Descendencia» para σπέρμα está bien justificado. Debe ajustarse la nota de υἱοὶ para reflejar la alternativa léxica real en español.'
  issues:
  - severity: medium
    issue: La nota [a] está formulada incorrectamente
    rationale: El texto principal ya usa «hijos», pero la nota dice «O «hijos»», lo cual no ofrece alternativa alguna y no preserva la intención del POB inglés («Or 'children'»). Debe reemplazarse por una alternativa española real, idealmente «O «descendientes»» o «O «hijos/as»», con explicación de que el griego dice «hijos» como expresión de herencia pactal.
  revised_spanish_text: 'Ustedes son los hijos de los profetas y del pacto que Dios hizo con sus padres[a], diciendo a Abraham[b]: «Y en tu descendencia todas las familias de la tierra serán bendecidas».'
  revised_footnotes:
  - marker: a
    text: O «descendientes»; el griego dice «hijos», una expresión de herencia pactal.
    reason: lexical_alternative
  - marker: b
    text: O «descendencia». El griego puede referirse colectivamente a los descendientes de Abraham y, en contexto bíblico-teológico, también puede tener un sentido singular representativo.
    reason: alternative_reading
  revision_rationale: Se mantiene el texto principal porque es fiel al griego y al POB inglés. Solo se corrige la nota [a], que en el borrador repetía el mismo término del texto principal y por tanto no funcionaba como nota de alternativa léxica.
