translation:
  language: es
  text: Y toda persona que no escuche a aquel profeta será totalmente destruida de entre el pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''será cortada de entre el pueblo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ψυχὴ
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - toda alma
  - cada persona
  - todo ser humano
  lexicon: BDAG
  rationale: ψυχή aquí funciona idiomáticamente como una persona individual, no como una afirmación técnica sobre 'alma'. 'Toda persona' comunica ese sentido con naturalidad en español y evita introducir una antropología que el griego no exige en este contexto.
- source_word: ἥτις ἂν μὴ ἀκούσῃ
  english_pob_choice: who does not listen
  chosen_spanish: que no escuche
  alternatives_spanish:
  - que no oiga
  - que no preste atención
  - que no obedezca
  lexicon: BDAG
  rationale: La construcción relativa indefinida expresa 'cualquiera que no'. ἀκούω puede significar oír, escuchar o atender. 'Escuche' conserva el matiz de respuesta obediente y suena natural en español. No se añadió 'obedezca' para no sobrecargar el verbo con una interpretación que el texto no explicita de forma directa.
- source_word: τοῦ προφήτου ἐκείνου
  english_pob_choice: that prophet
  chosen_spanish: aquel profeta
  alternatives_spanish:
  - ese profeta
  - aquel Profeta
  lexicon: BDAG
  rationale: '''Aquel'' refleja de manera directa el demostrativo ἐκείνου y señala a un referente específico ya identificado en el contexto anterior. Se mantiene ''profeta'' en minúscula porque el griego no marca aquí un título formalizado con mayúscula.'
- source_word: ἐξολεθρευθήσεται
  english_pob_choice: will be utterly destroyed
  chosen_spanish: será totalmente destruida
  alternatives_spanish:
  - será destruida
  - será exterminada
  - será cortada
  lexicon: BDAG
  rationale: El futuro pasivo de ἐξολεθρεύω transmite destrucción completa o eliminación total. 'Totalmente destruida' preserva esa fuerza en español sin sonar excesivamente técnico. 'Exterminada' sería posible pero más duro en registro; 'cortada' conserva el trasfondo deuteronómico, pero no expresa con tanta claridad el verbo usado en Hechos.
- source_word: ἐκ τοῦ λαοῦ
  english_pob_choice: from among the people
  chosen_spanish: de entre el pueblo
  alternatives_spanish:
  - entre el pueblo
  - fuera del pueblo
  - del pueblo
  lexicon: BDAG
  rationale: ἐκ con λαός indica remoción desde dentro del pueblo. 'De entre el pueblo' reproduce bien esa idea de exclusión o expulsión desde la comunidad. 'Pueblo' mantiene el sentido de colectivo, sin añadir el posesivo que no está en el griego.
theological_decisions:
- issue: Naturaleza de la amenaza de juicio en la cita de Deuteronomio 18:19 aplicada aquí
  english_pob_reading: Render the warning in terms of destruction/removal without specifying whether the judgment is temporal, covenantal, or eschatological.
  chosen_spanish_reading: Traducir la amenaza como destrucción/remoción sin precisar si el juicio es temporal, pactual o escatológico.
  alternative_spanish_readings:
  - expulsión de la comunidad del pacto
  - juicio divino final
  rationale: El versículo anuncia un juicio severo para quien rechace al profeta, pero el texto no define por sí mismo el modo ni el momento de ese juicio. 'Totalmente destruida de entre el pueblo' conserva la severidad de ἐξολεθρευθήσεται y la dimensión comunitaria de ἐκ τοῦ λαοῦ, sin cerrar una tensión teológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El pasaje fue revisado en el auditable inglés POB y no presenta cambios aplicados en la última pasada; la versión española sigue esa lectura estable, preservando la fuerza del verbo de juicio y la ambigüedad controlada sobre su alcance exacto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando corresponda al nombre divino; aquí no aparece.
  - Se mantiene 'profeta' en minúscula, siguiendo la referencia griega específica sin imponer una mayúscula interpretativa.
  - '''Pueblo'' traduce λαός con valor colectivo de comunidad, no como población genérica.'
