translation:
  language: es
  text: Entonces fijó la mirada en ellos[a], esperando recibir algo de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prestó atención a ellos» / «los miró fijamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: So he
  chosen_spanish: Así que él
  alternatives_spanish:
  - Y él
  - Pero él
  lexicon: BDAG
  rationale: δέ marca una transición narrativa suave; en español, «Así que» reproduce bien el avance de la escena sin volverla demasiado contrastiva. El sujeto retomado se expresa de modo natural con el pronombre explícito o implícito; aquí se omite «él» para mayor fluidez, porque el referente ya está claro.
- source_word: ἐπεῖχεν
  english_pob_choice: fixed his attention on
  chosen_spanish: fijó la mirada en
  alternatives_spanish:
  - prestó atención a
  - miró fijamente a
  - dio atención a
  lexicon: BDAG
  rationale: En este contexto, ἐπέχω comunica atención sostenida hacia las personas. «Fijó la mirada en» conserva la intensidad y el enfoque visual/atencional que el inglés POB captó con «fixed his attention on», evitando una expresión demasiado técnica o pesada en español.
- source_word: αὐτοῖς
  english_pob_choice: on them
  chosen_spanish: en ellos
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: BDAG
  rationale: Con este verbo, la preposición natural en español es «en». El referente son Pedro y Juan; «en ellos» transmite la dirección de la mirada/atención sin perder la relación establecida por el griego.
- source_word: προσδοκῶν
  english_pob_choice: expecting
  chosen_spanish: esperando
  alternatives_spanish:
  - expectando
  - anticipando
  lexicon: BDAG
  rationale: El participio expresa una circunstancia concomitante de expectativa. «Esperando» es la forma más natural y fiel en español para una expectativa concreta en contexto de limosna.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - alguna cosa
  - algo de dinero
  lexicon: BDAG
  rationale: El indefinido es inespecífico, pero el contexto sugiere un donativo. «Algo» conserva la indeterminación del griego sin añadir más de lo que el texto dice.
- source_word: παρ’ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de parte de ellos
  alternatives_spanish:
  - de ellos
  - de su parte
  lexicon: BDAG
  rationale: παρά con genitivo indica procedencia/origen. «De parte de ellos» suena natural en español y mantiene explícita la idea de procedencia, útil en un contexto de petición de limosna.
- source_word: λαβεῖν
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - tomar
  lexicon: BDAG
  rationale: El infinitivo expresa el contenido de la expectativa. «Recibir» es el equivalente más preciso y digno para una dádiva, mejor que «obtener» o «tomar».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y conserva el sentido ya confirmado en la auditoría inglesa POB. Se evita una traducción mecánica: se ajusta la conectividad narrativa de δέ con «Así que», se expresa ἐπεῖχεν con una locución española idiomática y se mantiene la indeterminación de τι con «algo». No hay revisiones documentadas en la auditoría inglesa, y el presente borrador permanece alineado con ese estado estable.'
  spanish_consistency_notes:
  - Se usa «ellos» para referirse a Pedro y Juan de manera cohesionada con el contexto inmediato.
  - La preposición «de parte de» preserva la procedencia implicada por παρά + genitivo.
  - Se evita «SEÑOR» u otras terminologías no pertinentes aquí, porque el versículo no contiene lenguaje divino explícito.
  - El anclaje de nota a[a] se coloca en la frase verbal principal para reflejar la alternativa lexical sobre ἐπεῖχεν.
