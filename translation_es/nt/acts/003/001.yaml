translation:
  language: es
  text: Pedro y Juan subían al templo a la hora de la oración, la novena hora[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, aproximadamente a las tres de la tarde según el cálculo moderno.
    reason: cultural_note
lexical_decisions:
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δὲ aquí funciona como un conector suave que avanza la narración, no como contraste fuerte. «Ahora» conserva ese flujo discursivo natural en español sin añadir adversatividad.
- source_word: ἀνέβαινον
  english_pob_choice: were going up
  chosen_spanish: subían
  alternatives_spanish:
  - iban subiendo
  - subieron
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o habitual en pasado. «Subían» mantiene ese aspecto imperfectivo y reproduce bien la imagen de ascenso hacia el templo.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: to the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al recinto del templo
  - al complejo del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al área del templo, no al santuario interior (ναός). En español, «al templo» es la forma más natural y readable; las alternativas son más precisas pero más pesadas.
- source_word: ἐπὶ τὴν ὥραν
  english_pob_choice: at the hour
  chosen_spanish: a la hora
  alternatives_spanish:
  - para la hora
  - hacia la hora
  lexicon: BDAG
  rationale: Con ἐπί + acusativo en una expresión temporal, la idea es la de dirigirse en relación con un tiempo señalado. «A la hora» transmite de modo idiomático que iban para ese momento fijado.
- source_word: τῆς προσευχῆς
  english_pob_choice: of prayer
  chosen_spanish: de la oración
  alternatives_spanish:
  - para la oración
  lexicon: BDAG
  rationale: El genitivo se expresa con naturalidad como «de la oración» en la fórmula fija «la hora de la oración». Esto conserva la estructura formal del original y resulta claro en español.
- source_word: τὴν ἐνάτην
  english_pob_choice: the ninth hour
  chosen_spanish: la novena hora
  alternatives_spanish:
  - a la hora novena
  - aproximadamente a las tres de la tarde
  lexicon: BDAG
  rationale: «La novena hora» preserva el marco horario judío del texto. La equivalencia moderna se deja para la nota, no para reemplazar la expresión fuente en el cuerpo principal.
translation_notes:
  revision_awareness: Se mantiene la lectura y la solución del texto base en alta concordancia con el audit trail en inglés; no se documentaron revisiones textuales ni tensiones teológicas en este versículo.
  spanish_consistency_notes:
  - Se conservó el orden narrativo sencillo del griego con un conector discursivo natural en español.
  - «Templo» se usa en sentido amplio para ἱερόν, no como traducción de ναός.
  - La expresión horaria se mantuvo fuente-orientada como «la novena hora», con aclaración cultural en nota.
  - Se evitó introducir vocabulario eclesiástico ajeno al texto como «santuario» o «casas de oración».
