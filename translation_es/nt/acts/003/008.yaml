translation:
  language: es
  text: Y saltando, se puso en pie y comenzó a andar, y entró con ellos en el templo[a], andando y saltando y alabando a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más precisamente, «el recinto del templo» o «los atrios del templo»; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαλλόμενος
  english_pob_choice: leaping up
  chosen_spanish: saltando
  alternatives_spanish:
  - dando un salto
  - saltando hacia arriba
  lexicon: BDAG
  rationale: El participio expresa un movimiento vigoroso y repentino al ser sanado. En español, 'saltando' transmite bien la acción dinámica sin forzar una perífrasis extraña; el matiz de impulso ascendente queda implícito en el contexto y en el verbo siguiente.
- source_word: ἔστη
  english_pob_choice: he stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - se levantó
  - estuvo en pie
  lexicon: BDAG
  rationale: Aunque el inglés opta por 'he stood', en español 'se puso en pie' suena más natural para el resultado inmediato de la sanidad y conserva la idea de pasar a estar de pie.
- source_word: περιεπάτει
  english_pob_choice: began to walk
  chosen_spanish: comenzó a andar
  alternatives_spanish:
  - empezó a caminar
  - andaba
  lexicon: BDAG
  rationale: El imperfecto tiene aquí valor inceptivo en el contexto narrativo. 'Comenzó a andar' refleja ese inicio de la capacidad recuperada y mantiene el registro digno de la narración.
- source_word: εἰσῆλθεν
  english_pob_choice: he entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - pasó
  lexicon: BDAG
  rationale: Aoristo narrativo simple; 'entró' es la forma más directa y natural en español.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: Expresa acompañamiento simple de modo idiomático en español, refiriéndose a Pedro y Juan.
- source_word: τὸ ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el recinto del templo
  - los atrios del templo
  lexicon: BDAG
  rationale: El término ἱερόν designa el complejo del templo, no solo el santuario interior. 'El templo' conserva la lectura pública y fluida, mientras que el sentido más preciso se documenta en la nota.
- source_word: περιπατῶν
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - caminando
  lexicon: BDAG
  rationale: El participio acompaña la acción principal y repite el motivo de movilidad restaurada. 'Andando' evita una repetición demasiado mecánica de 'caminar' y mantiene el ritmo de la frase.
- source_word: ἁλλόμενος
  english_pob_choice: leaping
  chosen_spanish: saltando
  alternatives_spanish:
  - dando saltos
  - brincando
  lexicon: BDAG
  rationale: La repetición del verbo de movimiento expresa júbilo corporal. 'Saltando' conserva la correspondencia con ἐξαλλόμενος sin introducir una diferencia innecesaria como 'brincando', que sería menos neutra.
- source_word: αἰνῶν
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - dando alabanza
  lexicon: BDAG
  rationale: El participio denota alabanza verbal dirigida a Dios. 'Alabando' es el equivalente más directo y plenamente idiomático en español.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El objeto directo de la alabanza es Dios; en español conviene marcar la preposición personal 'a' con el nombre divino.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más cercana al griego que mantiene ''leaping/leaping'' en el audit trail, pero adapta el duplicado de movimiento con un español natural: ''saltando'' al inicio y de nuevo ''saltando'' dentro de la enumeración, sin perder la progresión narrativa de levantarse, andar, entrar y alabar.'
  spanish_consistency_notes:
  - Se mantiene 'templo' para ἱερόν en el cuerpo del texto y se aclara su alcance en la nota.
  - Se usa 'Dios' en lugar de una convención litúrgica de máscara, conforme al principio del proyecto.
  - 'Se conserva la secuencia aspectual: acción súbita, ponerse en pie, comenzar a andar, entrar, andar/saltar/alabar.'
