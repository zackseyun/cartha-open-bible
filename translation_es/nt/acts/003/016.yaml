    reason: lexical_alternative
  - marker: b
    text: O «completa sanidad» o «salud perfecta».
    reason: lexical_alternative
  revision_rationale: Se corrige la alineación de las notas para que coincidan con el expediente inglés y con las palabras relevantes del texto. Se reemplaza «plenitud» por «integridad completa» para reflejar mejor ὁλοκληρίαν en un contexto de restauración corporal pública, manteniendo a la vez el matiz de completitud. Se elimina la nota innecesaria sobre «su nombre ha hecho fuerte» porque no añade una alternativa útil en español y no debe desplazar la nota sobre la sanidad/entereza del hombre.
