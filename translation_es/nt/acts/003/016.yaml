translation:
  language: es
  text: Y sobre la base de la fe en su nombre[a], su nombre mismo ha hecho fuerte a este hombre, a quien ustedes ven y conocen; y la fe que es por medio de él le ha dado esta integridad completa[b] delante de todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza en su nombre». El término griego pistis puede significar «fe», «confianza» o, en algunos contextos, «fidelidad».
    reason: lexical_alternative
  - marker: b
    text: O «completa sanidad» o «salud perfecta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τῇ πίστει
  english_pob_choice: on the basis of faith
  chosen_spanish: sobre la base de la fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  lexicon: BDAG
  rationale: ἐπί con dativo puede expresar base o fundamento. En español, «sobre la base de» conserva con claridad ese valor causal/fundacional sin volver la frase oscura o demasiado literal.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: La forma principal «fe» sigue el valor normal de πίστις en este contexto. Se mantiene la tensión interpretativa porque el término puede abarcar confianza; «fidelidad» no parece primario aquí.
- source_word: τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - de su nombre
  - por su nombre
  lexicon: BDAG
  rationale: La construcción griega con πίστις se expresa con naturalidad en español como «fe en su nombre». «Nombre» conserva el valor metonímico de persona y autoridad.
- source_word: ἐστερέωσεν
  english_pob_choice: has made strong
  chosen_spanish: ha hecho fuerte
  alternatives_spanish:
  - ha fortalecido
  - ha hecho firme
  lexicon: BDAG
  rationale: El verbo indica hacer firme o fuerte. «Ha hecho fuerte» sigue de cerca el valor concreto del resultado visible en el hombre sanado y evita una lectura demasiado abstracta.
- source_word: θεωρεῖτε καὶ οἴδατε
  english_pob_choice: whom you see and know
  chosen_spanish: a quien ustedes ven y conocen
  alternatives_spanish:
  - a quien ustedes están viendo y conocen
  - a quien ustedes observan y reconocen
  lexicon: BDAG
  rationale: La pareja verbal destaca el conocimiento público y directo del hombre. «Ven y conocen» es claro y mantiene ambos aspectos sin sobrecargar la frase.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre mismo
  alternatives_spanish:
  - el nombre de él
  - su nombre
  lexicon: BDAG
  rationale: Se conserva la repetición enfática del griego. «Mismo» ayuda a reflejar el énfasis retórico de la cláusula sin cambiar el sentido metonímico del «nombre».
- source_word: ἡ πίστις ἡ δι’ αὐτοῦ
  english_pob_choice: the faith that is through him
  chosen_spanish: la fe que es por medio de él
  alternatives_spanish:
  - la fe que viene por medio de él
  - la fe a través de él
  lexicon: BDAG
  rationale: La estructura con artículo y frase preposicional se vierte con una relativa para mayor claridad. «Por medio de él» conserva la ambigüedad controlada del griego sobre si la fe es mediada por Jesús o dirigida por su agencia.
- source_word: ἔδωκεν αὐτῷ
  english_pob_choice: has given him
  chosen_spanish: le ha dado
  alternatives_spanish:
  - le dio
  lexicon: BDAG
  rationale: El aoristo griego puede reflejarse naturalmente como pasado simple en español, pero aquí el perfecto compuesto funciona bien para resaltar el resultado presente de la curación en el discurso.
- source_word: ὁλοκληρίαν
  english_pob_choice: wholeness
  chosen_spanish: plenitud
  alternatives_spanish:
  - completa integridad
  - salud perfecta
  lexicon: BDAG
  rationale: ὁλοκληρίαν denota integridad, completitud o salud plena. «Plenitud» comunica la idea de restauración integral en un español natural y digno, sin reducirla sólo a lo físico.
- source_word: ἀπέναντι πάντων ὑμῶν
  english_pob_choice: in the presence of all of you
  chosen_spanish: delante de todos ustedes
  alternatives_spanish:
  - en presencia de todos ustedes
  - ante todos ustedes
  lexicon: BDAG
  rationale: La frase subraya el carácter público e incuestionable de la sanidad. «Delante de todos ustedes» es natural en español y conserva ese valor evidencial.
theological_decisions:
- issue: 'Agencia de la sanidad: nombre, fe y mediación'
  english_pob_reading: The verse attributes the man's strengthening to Jesus' name, with faith related to that name and mediated through Jesus, without specifying more narrowly whose faith is in view.
  chosen_spanish_reading: El versículo atribuye la restauración al nombre de Jesús, vinculando la fe con ese nombre y con la acción mediadora de él, sin precisar de manera cerrada de quién es esa fe.
  alternative_spanish_readings:
  - la fe del hombre sanado en el nombre de Jesús
  - la fe de los apóstoles en el nombre de Jesús
  - la fe generada por Jesús
  rationale: El griego presenta una relación entre el nombre de Jesús, la fe y la sanidad, pero no identifica de forma explícita al sujeto humano de la fe en este versículo. La traducción conserva esa tensión en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Fuerza metonímica de «nombre»
  english_pob_reading: '''His name'' is retained in the main text as a metonym for Jesus'' person and authority.'
  chosen_spanish_reading: «Su nombre» se conserva como metonimia de la persona y autoridad de Jesús.
  alternative_spanish_readings:
  - Jesús mismo ha fortalecido a este hombre
  - el poder de su nombre ha fortalecido a este hombre
  rationale: En Hechos, «nombre» tiene una carga teológica especial. Mantenerlo evita aplanar el lenguaje de Lucas y preserva la fuerza de la expresión.
  doctrine_reference: Uso metonímico del nombre en Hechos.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión auditada del texto inglés: la repetición enfática de «nombre» y la preferencia por un equivalente que conserve tanto el valor causal de ἐπὶ τῇ πίστει como la relación ambigua de ἡ πίστις ἡ δι’ αὐτοῦ. No se introdujeron soluciones que eliminen esa tensión textual.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en contextos relacionados; aquí no aplica.
  - Se usa «fe» para πίστις en el cuerpo principal, con nota alternativa para «confianza».
  - Se conserva «nombre» como metonimia teológica, siguiendo el patrón de Hechos.
  - Se evita «SEÑOR» como sustituto no pedido por el texto griego.
  - La puntuación y el registro buscan ser publicables en español latinoamericano sin perder fidelidad al griego.
