- from: Y tomando[a] al hombre por la mano derecha, lo levantó; y al instante fueron fortalecidos sus pies y tobillos.
  to: Y tomándolo de la mano derecha, lo levantó; y al instante fueron fortalecidos sus pies y tobillos[a].
  rationale: Se quita el añadido «al hombre» para ceñirse al pronombre del griego, y se reubica/corrige la nota al pie para que corresponda a τὰ σφυδρά, preservando la alternativa léxica documentada por el POB de forma clara en español.
