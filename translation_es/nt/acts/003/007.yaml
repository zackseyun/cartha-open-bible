lexical_decisions:
- source_word: πιάσας
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - agarrando
  - tomándolo de la mano
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa y acompañante del verbo principal. «Tomando» conserva ese valor narrativo y suena natural en español, sin endurecer el gesto como «agarrando» ni expandirlo demasiado con una paráfrasis.
- source_word: τῆς δεξιᾶς χειρός
  english_pob_choice: by the right hand
  chosen_spanish: por la mano derecha
  alternatives_spanish:
  - de la mano derecha
  - tomándolo de la mano derecha
  lexicon: BDAG
  rationale: La construcción en griego indica el medio o el contacto con la mano derecha. «Por la mano derecha» comunica bien la relación física del acto y evita introducir un posesivo que no está explícito en el griego.
- source_word: ἤγειρεν αὐτόν
  english_pob_choice: he raised him up
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo hizo ponerse de pie
  lexicon: BDAG
  rationale: En este contexto de sanidad, «lo levantó» reproduce el movimiento físico de manera clara y natural. «Lo alzó» es posible, pero menos usual en español actual; «lo hizo ponerse de pie» añade más interpretación de la necesaria.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio subraya la rapidez súbita del hecho. «Al instante» es idiomático, directo y mantiene la inmediatez del original.
- source_word: ἐστερεώθησαν
  english_pob_choice: were strengthened
  chosen_spanish: fueron fortalecidos
  alternatives_spanish:
  - quedaron fortalecidos
  - se fortalecieron
  lexicon: BDAG
  rationale: El pasivo señala que la fuerza les fue impartida a las extremidades. «Fueron fortalecidos» conserva el pasivo y el resultado sin resolver explícitamente la agencia en la cláusula.
- source_word: αἱ βάσεις αὐτοῦ
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus bases
  - las plantas de sus pies
  lexicon: BDAG
  rationale: Aunque βάσεις puede referirse a las partes de apoyo para estar de pie, en español «pies» es la forma natural y suficientemente fiel en este contexto corporal. «Bases» resultaría extraño; «plantas de sus pies» estrecha más de lo que exige el griego.
- source_word: τὰ σφυδρά
  english_pob_choice: ankles
  chosen_spanish: tobillos
  alternatives_spanish:
  - los huesos del tobillo
  - los tobillos
  lexicon: BDAG
  rationale: El término apunta a la zona del tobillo/articulación. «Tobillos» es la equivalencia idiomática normal en español y conserva la precisión anatómica sin sobreespecificar huesos.
theological_decisions:
- issue: Descripción del milagro como fortalecimiento físico inmediato
  english_pob_reading: Render the clause as a straightforward report of immediate physical strengthening without adding interpretive language about miracle mechanics.
  chosen_spanish_reading: Presentar el hecho como fortalecimiento físico repentino, sin añadir explicaciones sobre el mecanismo del milagro.
  alternative_spanish_readings:
  - fueron sanados
  - Dios les fortaleció
  rationale: El griego narra el evento en términos concretos de fortalecimiento de miembros, no con una glosa explícita sobre el modo del milagro. La traducción preserva esa sobriedad y deja la implicación milagrosa al contexto narrativo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La traducción sigue de cerca el paquete fuente griego y concuerda con la auditoría inglesa de alta concordancia; no se requieren revisiones adicionales respecto del borrador previo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el pasivo en «fueron fortalecidos» para no resolver la agencia más allá del texto.
  - «Tobillos» se usa como equivalente natural de σφυδρά, con nota alternativa para la lectura anatómica ampliada.
