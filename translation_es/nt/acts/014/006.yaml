translation:
  language: es
  text: cuando se dieron cuenta de ello[a], huyeron a las ciudades de Licaonia —Listra y Derbe— y la región circundante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando comprendieron esto» o «cuando llegaron a saberlo». El participio griego indica que llegaron a entender o percibir el peligro descrito en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδόντες
  english_pob_choice: when they learned of it
  chosen_spanish: cuando se dieron cuenta de ello
  alternatives_spanish:
  - cuando lo supieron
  - cuando comprendieron esto
  - al advertirlo
  lexicon: BDAG
  rationale: El participio aoristo expresa que llegaron a percatarse de la situación previa. En español, «se dieron cuenta de ello» conserva el matiz de comprensión repentina sin añadir explicaciones. «Lo supieron» suena demasiado informativo; «comprendieron esto» y «al advertirlo» son posibles, pero menos naturales aquí.
- source_word: κατέφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - buscaron refugio
  - se refugiaron
  - escaparon
  lexicon: BDAG
  rationale: El verbo puede sugerir huida o buscar refugio, pero en este contexto narrativo el punto principal es la salida urgente ante el peligro. «Huyeron» reproduce bien esa fuerza directa. «Se refugiaron» podría sonar a protección buscada más que a retirada rápida.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: BDAG
  rationale: Con verbos de movimiento, la preposición marca destino. En español, «a» es la forma más natural con nombres de ciudades.
- source_word: τὰς πόλεις τῆς Λυκαονίας
  english_pob_choice: the cities of Lycaonia
  chosen_spanish: las ciudades de Licaonia
  alternatives_spanish:
  - las ciudades licaonias
  - las ciudades en Licaonia
  lexicon: BDAG
  rationale: Se conserva la estructura genitiva del griego con una formulación clara en español. «Las ciudades de Licaonia» prepara bien la enumeración de los nombres propios que siguen.
- source_word: Λύστραν καὶ Δέρβην
  english_pob_choice: Lystra and Derbe
  chosen_spanish: Listra y Derbe
  alternatives_spanish:
  - Lystra y Derbe
  lexicon: BDAG
  rationale: Se usan las transliteraciones españolas habituales. «Listra» es la forma más natural en español; «Derbe» se conserva sin cambio.
- source_word: τὴν περίχωρον
  english_pob_choice: the surrounding region
  chosen_spanish: la región circundante
  alternatives_spanish:
  - la zona alrededor
  - el campo circundante
  - la comarca vecina
  lexicon: BDAG
  rationale: El sustantivo funciona aquí como un área alrededor de las ciudades nombradas. «La región circundante» mantiene amplitud geográfica y suena digna en español contemporáneo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustanciales; el texto fue verificado con acuerdo alto entre revisores. La presente redacción sigue de cerca el griego y conserva la decisión inglesa de expresar συνιδόντες como una toma de conciencia del peligro previo.
  spanish_consistency_notes:
  - Se mantiene «Licaonia» como forma española del topónimo.
  - Se evita «se refugiarion» o «buscaron refugio» para no desplazar el énfasis narrativo de la huida urgente.
  - La puntuación con dos puntos ayuda a mostrar que «Listra y Derbe» especifica las ciudades de Licaonia, sin alterar el orden del griego.
