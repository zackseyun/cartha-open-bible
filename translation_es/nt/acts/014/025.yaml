translation:
  language: es
  text: Y después de hablar la palabra en Perga[a], descendieron a Atalia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo hablado la palabra en Perga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλήσαντες
  english_pob_choice: after speaking
  chosen_spanish: después de hablar
  alternatives_spanish:
  - habiendo hablado
  - después de proclamar
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción anterior respecto del verbo principal. En español, «después de hablar» expresa con naturalidad esa anterioridad sin forzar una construcción demasiado literal. «Habiendo hablado» es más formal, pero menos natural. «Proclamar» añadiría un matiz más fuerte que el verbo griego no exige por sí solo.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra del Señor
  lexicon: BDAG
  rationale: λόγος aquí designa el mensaje cristiano predicado. «La palabra» conserva la expresión lucana recurrente y no introduce contenido ajeno al texto. «El mensaje» es posible, pero diluye esa fórmula habitual. «La palabra del Señor» no aparece en el griego y no debe importarse.
- source_word: ἐν Πέργῃ
  english_pob_choice: in Perga
  chosen_spanish: en Perge
  alternatives_spanish:
  - en Perga
  lexicon: BDAG
  rationale: La preposición ἐν con nombre de ciudad se rinde de forma directa con «en». Se conserva el topónimo en su forma española habitual «Perge» para respetar el uso geográfico en español y la transliteración estable del lugar.
- source_word: κατέβησαν
  english_pob_choice: they went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron descendiendo
  lexicon: BDAG
  rationale: καταβαίνω expresa descenso o bajada. «Descendieron» mantiene el sentido direccional y la sobriedad narrativa del griego. «Bajaron» sería más coloquial; «fueron descendiendo» añade progresividad que no está explícita.
- source_word: εἰς Ἀττάλειαν
  english_pob_choice: to Attalia
  chosen_spanish: a Atalía
  alternatives_spanish:
  - hasta Atalía
  lexicon: BDAG
  rationale: Con destino, εἰς se vierte naturalmente como «a». Se emplea «Atalía» como forma española del topónimo. «Hasta» sugeriría un matiz de término o límite que el griego no requiere.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: καί continúa la secuencia narrativa. «Y» conserva la simple conexión coordinante sin añadir temporalidad o inferencia interpretativa.
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta concordancia y no registra revisiones aplicadas; se mantiene la relación narrativa simple: hablar en Perge y luego descender a Atalía.'
  spanish_consistency_notes:
  - Se mantiene «la palabra» para λόγος, en línea con el uso lucano y con la decisión inglesa documentada.
  - Se conserva la forma española tradicional de los topónimos «Perge» y «Atalía» para coherencia con el registro bíblico en español.
  - La traducción evita sobreinterpretar el movimiento geográfico; «descendieron» reproduce el valor de καταβαίνω sin ampliar la explicación.
