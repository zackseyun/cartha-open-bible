translation:
  language: es
  text: Y después de anunciar la buena noticia en aquella ciudad y hacer muchos discípulos[a], regresaron a Listra, a Iconio y a Antioquía,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo predicado el evangelio en aquella ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐαγγελισάμενοί
  english_pob_choice: after proclaiming the good news
  chosen_spanish: después de anunciar la buena noticia
  alternatives_spanish:
  - después de predicar el evangelio
  - habiendo evangelizado
  lexicon: BDAG
  rationale: El participio aoristo se entiende como acción anterior al verbo principal. En español, «después de» comunica bien esa anterioridad sin forzar una subordinada pesada. «Anunciar la buena noticia» conserva el sentido evangelizador de εὐαγγελίζω con español natural y evita el tecnicismo eclesiástico de «predicar el evangelio».
- source_word: τε
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - pues
  - (sin traducir)
  lexicon: BDAG
  rationale: τε enlaza suavemente la cláusula participial con lo anterior y lo siguiente. «Y» reproduce esa continuidad de forma natural en español.
- source_word: τὴν πόλιν ἐκείνην
  english_pob_choice: that city
  chosen_spanish: aquella ciudad
  alternatives_spanish:
  - esa ciudad
  - la ciudad de allí
  lexicon: BDAG
  rationale: El demostrativo apunta a la ciudad ya mencionada en el contexto. «Aquella ciudad» conserva distancia referencial y respeta πόλις como «ciudad».
- source_word: μαθητεύσαντες
  english_pob_choice: making many disciples
  chosen_spanish: de hacer muchos discípulos
  alternatives_spanish:
  - de hacer discípulos a muchos
  - de discipular a muchos
  lexicon: BDAG
  rationale: μαθητεύω significa causar que alguien llegue a ser discípulo. En español, «hacer discípulos» es la forma más directa y auditable; se mantiene el complemento «muchos» para reflejar ἱκανούς. Se evita «discipular» por ser menos natural y más jerga contemporánea.
- source_word: ἱκανοὺς
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - bastantes
  - un número considerable
  lexicon: BDAG
  rationale: En este contexto ἱκανοί expresa cantidad notable, no mera suficiencia. «Muchos» es la equivalencia más clara y natural en español.
- source_word: ὑπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: El verbo indica reanudación del viaje en dirección de regreso. «Regresaron» es claro, digno y natural en español actual.
- source_word: εἰς τὴν Λύστραν
  english_pob_choice: to Lystra
  chosen_spanish: a Listra
  alternatives_spanish:
  - hacia Listra
  - a la Listra
  lexicon: BDAG
  rationale: Con nombres de lugar, εἰς normalmente señala destino. En español, la preposición «a» reproduce bien ese movimiento.
- source_word: εἰς Ἰκόνιον
  english_pob_choice: to Iconium
  chosen_spanish: a Iconio
  alternatives_spanish:
  - hacia Iconio
  lexicon: BDAG
  rationale: Se conserva el mismo patrón de destino geográfico que en el griego y la cohesión del itinerario.
- source_word: εἰς Ἀντιόχειαν
  english_pob_choice: to Antioch
  chosen_spanish: a Antioquía
  alternatives_spanish:
  - hacia Antioquía
  lexicon: BDAG
  rationale: Se mantiene la secuencia geográfica y el valor de destino de εἰς con la preposición española «a».
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente griego y el auditorio inglés, manteniendo la estructura participial previa al verbo principal y la triple secuencia de destinos. No se introdujeron cambios de sentido ni ajustes doctrinales; la única nota preserva la alternativa léxica documentada para εὐαγγελίζω.
  spanish_consistency_notes:
  - Se usó «buena noticia» para εὐαγγελίζω, coherente con el término POB inglés y con el estilo español natural.
  - Se mantuvo «discípulos» para μαθητεύω, evitando una paráfrasis que borraría la relación verbo-sustantivo.
  - Se respetó la triple preposición de destino con «a» para los tres topónimos.
  - No se empleó «Cristo», «Señor» ni otras fórmulas no presentes en el versículo.
