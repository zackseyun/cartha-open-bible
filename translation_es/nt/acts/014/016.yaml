translation:
  language: es
  text: En generaciones pasadas, permitió[a] que todas las naciones anduvieran en sus propios caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permitió que todas las naciones fueran por sus propios caminos» o «permitió a todos los gentiles andar en sus caminos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - quien
  lexicon: BDAG
  rationale: El relativo griego retoma a Dios desde el versículo anterior; en español, 'él' mantiene la referencia continua y suena natural en esta oración sin perder el vínculo antecedente.
- source_word: ἐν ταῖς παρῳχημέναις γενεαῖς
  english_pob_choice: In past generations
  chosen_spanish: En generaciones pasadas
  alternatives_spanish:
  - en generaciones anteriores
  - en generaciones ya pasadas
  lexicon: BDAG
  rationale: παρῳχημέναις expresa generaciones que han transcurrido. 'En generaciones pasadas' conserva el valor temporal y el tono bíblico con español claro y actual.
- source_word: εἴασεν
  english_pob_choice: allowed
  chosen_spanish: permitió
  alternatives_spanish:
  - dejó
  - consintió
  lexicon: BDAG
  rationale: ἐάω significa permitir/dejar. 'Permitió' comunica con precisión la idea de no impedir, y conserva la tensión teológica de una tolerancia divina sin implicar aprobación.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - todos los pueblos
  lexicon: BDAG
  rationale: En este contexto ἔθνη tiene alcance colectivo y etnopolítico amplio. 'Naciones' reproduce mejor ese campo semántico en español que 'gentiles', que introduciría un contraste explícito no exigido por la cláusula.
- source_word: πορεύεσθαι
  english_pob_choice: to walk
  chosen_spanish: anduvieran
  alternatives_spanish:
  - caminaran
  - fueran
  lexicon: BDAG
  rationale: Con 'caminos', πορεύεσθαι funciona idiomáticamente como metáfora de conducta. 'Anduvieran' conserva esa imagen bíblica de manera natural en español, sin reducirla a un simple 'ir'.
- source_word: ταῖς ὁδοῖς αὐτῶν
  english_pob_choice: in their own ways
  chosen_spanish: en sus propios caminos
  alternatives_spanish:
  - en sus caminos
  - por sus propios caminos
  lexicon: BDAG
  rationale: '''Caminos'' traduce ὁδοῖς como metáfora de conducta, y ''propios'' explicita el matiz posesivo de αὐτῶν. La combinación mantiene el paralelismo idiomático y la idea de autodirección.'
theological_decisions:
- issue: Permiso divino sin aprobación moral
  english_pob_reading: The verse states that God allowed the nations to follow their own ways, implying divine forbearance or non-intervention rather than moral approval.
  chosen_spanish_reading: El versículo afirma que Dios permitió que las naciones siguieran sus propios caminos, lo cual expresa tolerancia o no intervención divina, no aprobación moral.
  alternative_spanish_readings:
  - Dios aprobó los caminos de las naciones
  - Dios determinó causalmente los caminos de las naciones
  rationale: El verbo ἐάω pide una traducción que preserve el matiz de permitir/dejar. En el contexto de Hechos 14:15–17, la declaración debe mantener la tensión entre la soberanía divina y la responsabilidad humana, sin suavizarla hacia aprobación ni endurecerla hacia determinismo.
  doctrine_reference: Preservar la tensión teológica; no resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue el acuerdo alto del control cruzado y conserva las decisiones léxicas y teológicas auditadas.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' implícito por el antecedente del versículo anterior, reflejado con el pronombre 'él', coherente con la continuidad del contexto.
  - Se prefirió 'naciones' para ἔθνη siguiendo el criterio auditado de amplitud colectiva, sin imponer 'gentiles' en el texto principal.
  - Se conservó la metáfora de 'caminos'/'andar' para reproducir la imagen bíblica de conducta y trayectoria de vida.
  - La nota al pie recoge la alternativa verbal más literal ('caminaran') para transparentar la posibilidad léxica del griego.
