translation:
  language: es
  text: Este hombre escuchó a Pablo hablar; quien, mirándolo fijamente y viendo que tenía fe para ser salvado[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega también puede entenderse en el sentido de «ser sanado», ya que σῴζω puede significar «salvar» o «sanar»; aquí la redacción española conserva el sentido más directo de «salvar», aunque el contexto inmediato es de sanidad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo se refiere al cojo de la sección anterior; «Este hombre» conserva la referencia concreta y suena natural en español.
- source_word: ἤκουσεν
  english_pob_choice: listened
  chosen_spanish: escuchaba
  alternatives_spanish:
  - escuchó
  - oyó
  lexicon: BDAG
  rationale: En el contexto de la predicación de Pablo, «escuchaba» expresa recepción atenta mejor que el simple «oyó», aunque el aoristo describe el hecho puntual.
- source_word: λαλοῦντος
  english_pob_choice: speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - predicar
  - hablando
  lexicon: BDAG
  rationale: El participio presente con Pablo se vierte de forma natural como «hablar»; evita sobredeterminar la acción como predicación formal.
- source_word: ἀτενίσας
  english_pob_choice: looking intently
  chosen_spanish: fijando en él la mirada
  alternatives_spanish:
  - mirándolo fijamente
  - mirando con atención
  lexicon: BDAG
  rationale: La expresión española conserva la idea de una mirada sostenida e intencional sin sonar mecánica.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - al ver
  - percibiendo
  lexicon: BDAG
  rationale: El participio aoristo de percepción se mantiene con «viendo», que deja abierta la dimensión de discernimiento contextual.
- source_word: ἔχει πίστιν
  english_pob_choice: had faith
  chosen_spanish: tenía fe
  alternatives_spanish:
  - tenía confianza
  - tenía fe / fidelidad
  lexicon: BDAG
  rationale: «Fe» es el equivalente normal de πίστις en este contexto de respuesta receptiva a la palabra y al poder de Dios.
- source_word: τοῦ σωθῆναι
  english_pob_choice: to be saved
  chosen_spanish: para ser salvado
  alternatives_spanish:
  - para ser sanado
  - para ser curado
  - para ser salvo
  lexicon: BDAG
  rationale: Se conserva la relación semántica de σῴζω con «salvar» de modo directo, siguiendo la revisión más reciente del POB; en este contexto la frase también puede sugerir sanidad física, pero el griego permite no restringirla sólo a eso.
theological_decisions:
- issue: Sentido de σωθῆναι en un relato de sanidad
  english_pob_reading: broader salvation ('to be saved')
  chosen_spanish_reading: para ser salvado
  alternative_spanish_readings:
  - para ser sanado
  - para ser curado
  - para ser salvado
  rationale: La revisión del POB se movió hacia una equivalencia más directa con el griego σωθῆναι. En español, «salvado» preserva esa amplitud semántica sin cerrar el pasaje a una mera sanidad corporal, aunque el contexto inmediato siga siendo milagroso.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: πίστις'
- issue: Alcance de πίστις en la escena
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Aquí πίστις describe la disposición receptiva del hombre ante la acción de Dios por medio de Pablo. «Fe» mantiene la fuerza habitual del término sin imponer una especificación doctrinal ajena al contexto.
  doctrine_reference: BDAG; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El POB inglés pasó de «to be healed» a «to be saved» en la revisión más reciente para reflejar más directamente σωθῆναι. Esta versión española sigue esa última decisión y evita fijar el sentido exclusivamente en sanidad, aunque mantiene abierta la lectura contextual de restauración física.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις de manera consistente con el léxico del proyecto.
  - Se evita «SEÑOR» y no interviene ningún nombre divino en este versículo.
  - «Salvado» se mantiene como forma directa de σῴζω en esta línea, en armonía con la revisión inglesa más reciente.
