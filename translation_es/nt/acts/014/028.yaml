translation:
  language: es
  text: Y permanecieron con los discípulos por no poco tiempo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «por un tiempo considerable» o «por bastante tiempo». El griego usa una litotes: «no poco tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβον
  english_pob_choice: they stayed
  chosen_spanish: y permanecieron
  alternatives_spanish:
  - y se quedaron
  - y estuvieron
  - y pasaron tiempo
  lexicon: BDAG
  rationale: El imperfecto de διατρίβω expresa una permanencia continua o el paso de tiempo en un lugar. «Permanecieron» conserva bien ese aspecto durativo en español y suena natural en un registro bíblico actual.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Y, pues
  lexicon: BDAG
  rationale: δέ funciona como conectivo narrativo leve. «Y» mantiene la continuidad simple del relato sin introducir matices no sustentados.
- source_word: χρόνον οὐκ ὀλίγον
  english_pob_choice: for no little time
  chosen_spanish: por no poco tiempo
  alternatives_spanish:
  - por bastante tiempo
  - por un tiempo considerable
  - por bastante tiempo
  lexicon: BDAG
  rationale: 'La expresión es una litotes: literalmente, «no poco tiempo». «Por no poco tiempo» conserva la forma retórica del griego y deja visible la tensión semántica; en español también se entiende como una duración significativa.'
- source_word: σὺν τοῖς μαθηταῖς
  english_pob_choice: with the disciples
  chosen_spanish: con los discípulos
  alternatives_spanish:
  - entre los discípulos
  lexicon: BDAG
  rationale: σύν con dativo significa de manera directa «con». «Los discípulos» es la referencia más natural en el contexto de la comunidad local de creyentes.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés concuerdan estrechamente; no se observan revisiones aplicadas en la fuente auditada. La decisión principal en español es preservar la litotes de χρόνον οὐκ ὀλίγον sin volverla demasiado explicativa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí el nombre divino ni una cita que requiera esa convención.
  - Se usa «discípulos» en sentido comunitario, coherente con el contexto narrativo de Hechos.
  - La litotes se mantiene visible en el texto principal y se ofrece una alternativa idiomática en nota.
