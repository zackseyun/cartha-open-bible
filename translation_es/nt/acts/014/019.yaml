translation:
  language: es
  text: Pero unos judíos vinieron desde Antioquía e Iconio, y después de convencer a las multitudes y apedrear a Pablo, lo arrastraron fuera de la ciudad, pensando[a] que estaba muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pensando que había muerto». El griego presenta la suposición de los agresores, no afirma explícitamente que Pablo realmente muriera.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπῆλθαν
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron sobre
  lexicon: BDAG
  rationale: El aoristo introduce la llegada de opositores desde otras ciudades. «Vinieron» es natural en español narrativo y conserva el movimiento de llegada sin volverlo más violento de lo que el contexto exige.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro adversativo respecto del recibimiento favorable previo. «Pero» reproduce bien ese cambio de rumbo en español.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judíos de Judea
  - personas judías
  lexicon: BDAG
  rationale: En Hechos, el término suele designar a judíos opositores o al pueblo judío en general, no específicamente residentes de Judea. «Judíos» es la equivalencia directa y contextual.
- source_word: πείσαντες τοὺς ὄχλους
  english_pob_choice: after persuading the crowds
  chosen_spanish: después de convencer a las multitudes
  alternatives_spanish:
  - después de persuadir a las multitudes
  - habiendo convencido a las multitudes
  lexicon: BDAG
  rationale: El participio antecede a la acción principal e indica acción previa. «Después de convencer» preserva el orden y la relación causal sin sobretraducir el matiz.
- source_word: ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  lexicon: BDAG
  rationale: «Multitudes» refleja el plural y mantiene un registro más solemne que «gente», sin perder la referencia a una masa reunida.
- source_word: λιθάσαντες
  english_pob_choice: stoning
  chosen_spanish: apedrear
  alternatives_spanish:
  - lapidar
  - apedreando
  lexicon: BDAG
  rationale: El verbo describe el acto violento de arrojar piedras a Pablo. «Apedrear» es claro y natural en español bíblico contemporáneo; «lapidar» es posible, pero menos transparente para lectores generales.
- source_word: ἔσυρον
  english_pob_choice: they dragged
  chosen_spanish: lo arrastraron
  alternatives_spanish:
  - lo llevaron arrastrando
  - lo sacaron arrastrándolo
  lexicon: BDAG
  rationale: El imperfecto presenta la acción en desarrollo. «Lo arrastraron» expresa con fuerza la violencia del acto y funciona bien en narración española.
- source_word: ἔξω τῆς πόλεως
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - afuera de la ciudad
  - fuera de la población
  lexicon: BDAG
  rationale: La frase indica el lugar al que lo llevaron. «Fuera de la ciudad» es la forma más clara y corriente en español.
- source_word: νομίζοντες
  english_pob_choice: supposing
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: BDAG
  rationale: El participio expresa la inferencia de los agresores. «Pensando» mantiene la idea de juicio asumido sin afirmar más de lo que dice el texto.
- source_word: τεθνηκέναι
  english_pob_choice: that he was dead
  chosen_spanish: que estaba muerto
  alternatives_spanish:
  - que había muerto
  - que estaba fallecido
  lexicon: BDAG
  rationale: El infinitivo perfecto comunica el estado que ellos inferían. «Que estaba muerto» expresa de manera natural su suposición sin resolver si realmente murió.
theological_decisions:
- issue: Si el versículo afirma la muerte real de Pablo o solo la percepción de sus agresores
  english_pob_reading: 'The main text preserves the attackers'' perception only: ''supposing that he was dead.'''
  chosen_spanish_reading: 'El texto principal conserva solo la percepción de los agresores: «pensando que estaba muerto».'
  alternative_spanish_readings:
  - «pensando que había muerto»
  - «creyendo que estaba muerto»
  rationale: El griego presenta una suposición (νομίζοντες αὐτὸν τεθνηκέναι), no una afirmación narrativa explícita de la muerte de Pablo. La traducción debe preservar esa tensión y no resolverla en una dirección que el versículo no afirma directamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura final inglesa auditada y conserva la misma cautela teológica sobre la muerte de Pablo. No se registran revisiones aplicadas en el paquete fuente, y el texto inglés más reciente permanece sin cambios.
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαῖοι, conforme al uso de Hechos y al criterio POB auditado.
  - Se usa «multitudes» para ὄχλους por concordancia con el plural y registro bíblico natural.
  - Se evita «lapidar» en el texto principal para no elevar el registro y para conservar transparencia léxica.
  - Se conserva la ambigüedad del final con «pensando que estaba muerto», sin afirmar una muerte real de Pablo.
