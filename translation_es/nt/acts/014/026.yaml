  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ -> ''Dios'', χάριτι -> ''gracia''. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión ''encomendados'' es compatible con el expediente inglés, aunque la nota alternativa ''confiados'' preserva bien el matiz de ''entrusted''.'
