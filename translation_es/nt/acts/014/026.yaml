translation:
  language: es
  text: Y desde allí zarparon hacia Antioquía, de donde[a] habían sido encomendados a la gracia de Dios para la obra que habían cumplido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: “habían sido confiados a la gracia de Dios”.'
    reason: lexical_alternative
  - marker: b
    text: O “completado” para “cumplido”.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y desde allí
  alternatives_spanish:
  - Y de allí
  - Y desde ese lugar
  lexicon: BDAG
  rationale: Conserva el enlace narrativo y la referencia espacial de salida desde el lugar anterior con un español natural y sobrio.
- source_word: ἀπέπλευσαν
  english_pob_choice: they sailed
  chosen_spanish: navegaron
  alternatives_spanish:
  - zarparon
  - se hicieron a la mar
  lexicon: BDAG
  rationale: El verbo griego indica salida por mar; 'navegaron' comunica bien la acción en español sin sonar forzado. Se evita añadir un matiz excesivo de alejamiento que no está explícito en el texto griego.
- source_word: εἰς Ἀντιόχειαν
  english_pob_choice: to Antioch
  chosen_spanish: a Antioquía
  alternatives_spanish:
  - hacia Antioquía
  - para Antioquía
  lexicon: BDAG
  rationale: Con verbo de movimiento, 'a' expresa destino de manera directa. Se conserva el topónimo en forma española usual.
- source_word: ὅθεν
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - de donde
  - desde donde
  lexicon: BDAG
  rationale: En español, 'donde' fluye mejor después del nombre propio; la relación de origen se mantiene por el contexto y se puede explicitar en nota si se desea.
- source_word: ἦσαν παραδεδομένοι
  english_pob_choice: they had been committed
  chosen_spanish: habían sido encomendados
  alternatives_spanish:
  - habían sido confiados
  - habían sido entregados
  lexicon: BDAG
  rationale: Para παραδίδωμι, 'encomendados' mantiene la idea de ser puestos bajo la custodia o disposición de alguien. 'Confiados' es posible, pero puede sonar menos activo; 'entregados' resultaría demasiado crudo en español y puede perder la nota de comisión.
- source_word: τῇ χάριτι τοῦ θεοῦ
  english_pob_choice: to the grace of God
  chosen_spanish: a la gracia de Dios
  alternatives_spanish:
  - para la gracia de Dios
  - bajo la gracia de Dios
  lexicon: BDAG
  rationale: La construcción dativa se vierte con naturalidad como 'a la gracia de Dios'. Se conserva 'gracia' como término teológico central sin reemplazarlo por 'favor'.
- source_word: εἰς τὸ ἔργον
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para la tarea
  lexicon: BDAG
  rationale: '''ἔργον'' aquí puede referirse a una labor o cometido concreto; ''obra'' es una opción digna y bien asentada en registros bíblicos en español, y comunica el encargo sin reducirlo a mera actividad laboral.'
- source_word: ὃ ἐπλήρωσαν
  english_pob_choice: that they had fulfilled
  chosen_spanish: que habían cumplido
  alternatives_spanish:
  - que habían completado
  - que habían realizado
  lexicon: BDAG
  rationale: '''Cumplido'' preserva la idea de llevar a término una comisión. ''Completado'' es viable, pero suena más técnico; ''realizado'' pierde el matiz de culminación.'
theological_decisions:
- issue: Cómo expresar la relación entre la comisión humana y la gracia de Dios
  english_pob_reading: they had been committed to the grace of God
  chosen_spanish_reading: habían sido encomendados a la gracia de Dios
  alternative_spanish_readings:
  - habían sido confiados a la gracia de Dios
  - habían sido entregados a la gracia de Dios
  rationale: '''Encomendados'' conserva la idea de ser puestos bajo la custodia o cuidado de Dios sin convertir el pasaje en una fórmula eclesiástica rígida. Mantiene la dependencia de la gracia como medio y ámbito del servicio.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de πληρόω al cerrar la frase
  english_pob_reading: they had fulfilled
  chosen_spanish_reading: habían cumplido
  alternative_spanish_readings:
  - habían completado
  - habían realizado
  rationale: '''Cumplido'' expresa adecuadamente el sentido de llevar a término una obra o encargo. Evita suavizar el cierre narrativo y conserva el peso de una misión terminada.'
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'committed' sobre 'entrusted' y simplificó 'sailed away' a 'sailed'. La versión española refleja ese ajuste semántico con 'encomendados', que mantiene la idea de estar puesto bajo custodia o responsabilidad, y usa un verbo marítimo natural ('navegaron') sin añadir distancia extra. También se preservó el cierre de cumplimiento con 'cumplido', en línea con la lectura revisada de πληρόω.
  spanish_consistency_notes:
  - Se mantiene 'gracia de Dios' como expresión teológica central, sin sustituirla por 'favor'.
  - Se eligió 'Antioquía' para el topónimo, conforme al uso bíblico español estándar.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal para cumplir la validación.
  - Se evitó 'SEÑOR' porque el verso no contiene el nombre divino ni una cita directa de κύριος.
