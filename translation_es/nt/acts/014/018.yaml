translation:
  language: es
  text: Y al decir estas cosas[a], apenas contuvieron a las multitudes de ofrecerles sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y diciendo estas cosas, apenas detuvieron a las multitudes de ofrecerles sacrificios».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Entonces
  lexicon: BDAG
  rationale: Conecta de manera directa con el contexto inmediato sin sobrecargar el valor de καί; en español, 'Y' conserva la simple continuidad narrativa que el POB inglés decidió mantener en su revisión más reciente.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El plural demostrativo se conserva con 'estas cosas', que refleja mejor la forma griega y puede abarcar las palabras previas de Pablo y Bernabé.
- source_word: λέγοντες
  english_pob_choice: by saying
  chosen_spanish: al decir
  alternatives_spanish:
  - diciendo
  - mientras decían
  lexicon: BDAG
  rationale: La participio presente adverbial expresa medio o circunstancia; 'al decir' transmite naturalmente la relación instrumental sin perder la conexión con la acción verbal.
- source_word: μόλις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - escasamente
  lexicon: BDAG
  rationale: '''Apenas'' comunica bien la idea de dificultad y resultado casi fallido, con un registro natural y digno en español.'
- source_word: κατέπαυσαν
  english_pob_choice: restrained
  chosen_spanish: contuvieron
  alternatives_spanish:
  - detuvieron
  - calmaron
  - impidieron
  lexicon: BDAG
  rationale: El verbo implica hacer cesar o frenar una acción; 'contuvieron' encaja con el objeto 'las multitudes' y con el infinitivo final de impedir el sacrificio. 'Detuvieron' es posible, pero 'contuvieron' expresa mejor la restricción de un impulso colectivo.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la multitud
  lexicon: BDAG
  rationale: El griego está en plural; 'las multitudes' preserva ese plural y sugiere un grupo grande de personas sin reducirlo al singular.
- source_word: τοῦ μὴ θύειν
  english_pob_choice: from sacrificing
  chosen_spanish: para que no les ofrecieran sacrificio
  alternatives_spanish:
  - de no sacrificarles
  - para no sacrificarles
  - de no ofrecerles sacrificio
  lexicon: BDAG
  rationale: 'El infinitivo articular con μή expresa prevención de la acción. En español, una subordinada final negativa comunica con claridad el sentido: impedir que les hicieran una ofrenda sacrificial. Se prefiere ''ofrecieran sacrificio'' para conservar el matiz cultual de θύω.'
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos y a Bernabé y Pablo
  lexicon: BDAG
  rationale: El dativo se expresa de forma natural con el pronombre clítico 'les', que mantiene la referencia a Pablo y Bernabé sin forzar la sintaxis.
theological_decisions:
- issue: El alcance cultual de θύω en el contexto de idolatría o veneración indebida
  english_pob_reading: from sacrificing to them
  chosen_spanish_reading: para que no les ofrecieran sacrificio
  alternative_spanish_readings:
  - para que no les sacrificaran
  - para que no les ofrecieran ofrendas
  rationale: El contexto exige un acto sacrificial, no un simple gesto de respeto. 'Ofrecieran sacrificio' conserva la fuerza religiosa/cúltica del verbo sin sonar artificial en español.
  doctrine_reference: Acts 14:11-18; prohibición de culto indebido y rechazo de adoración a criaturas
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'Even by saying these things' a 'And by saying these things' y de 'barely' a 'scarcely'. En español se siguió la lectura revisada más directa y formal, evitando introducir un valor concesivo adicional no exigido por el griego.
  spanish_consistency_notes:
  - Se mantuvo el plural de 'las multitudes' para reflejar τοὺς ὄχλους.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas ajenas al texto, ya que este versículo no contiene el Tetragrámaton.
  - Se prefirió una construcción final negativa para expresar el infinitivo articular con μή de manera natural en español.
