    issue: Uso de «Barnabás» en lugar de «Bernabé»
    rationale: Aunque el griego es Βαρναβᾶν, en español bíblico y eclesial la forma establecida y natural es «Bernabé». «Barnabás» suena menos idiomático y reduce legibilidad sin aportar mayor fidelidad.
  - severity: medium
    issue: Construcción poco natural «los llamaban a Barnabás Zeus, y a Pablo Hermes»
    rationale: En español, con este verbo y doble acusativo reportado del griego, conviene una estructura más idiomática como «llamaban a Bernabé “Zeus” y a Pablo “Hermes”»; la redacción actual suena calcada.
  - severity: low
    issue: «Principal orador» puede sonar algo interpretativo
    rationale: Comunica bien el sentido general, pero «orador» puede sugerir un registro más formal o retórico. Una formulación como «el que dirigía la palabra» o «el principal portavoz» preserva mejor el matiz de liderazgo en el hablar.
  revised_spanish_text: Y llamaban a Bernabé Zeus[b], y a Pablo Hermes, porque él era el que dirigía la palabra[a].
  revised_footnotes:
