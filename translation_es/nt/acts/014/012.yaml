translation:
  language: es
  text: Y llamaban a Bernabé Zeus[b], y a Pablo Hermes, porque él era el que dirigía la palabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el que va al frente en el habla» o «el principal orador».'
    reason: lexical_alternative
  - marker: b
    text: Las versiones tradicionales en inglés suelen leer «Júpiter» y «Mercurio», usando los nombres romanos de estos dioses; el texto griego tiene «Zeus» y «Hermes».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκάλουν
  english_pob_choice: were calling
  chosen_spanish: llamaban
  alternatives_spanish:
  - estaban llamando
  - llamaron
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en desarrollo o repetida; en español, el imperfecto simple «llamaban» comunica bien esa continuidad sin recargar la frase.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: La partícula coordina la cláusula con la anterior. «Y» es la equivalencia más natural en español y mantiene la conexión narrativa sin sobretraducir.
- source_word: Δία
  english_pob_choice: Zeus
  chosen_spanish: Zeus
  alternatives_spanish:
  - Júpiter
  lexicon: BDAG
  rationale: El texto griego usa el nombre griego del dios. Se conserva «Zeus» por primacía del original; «Júpiter» pertenece a la tradición latina, no al griego del pasaje.
- source_word: Ἑρμῆν
  english_pob_choice: Hermes
  chosen_spanish: Hermes
  alternatives_spanish:
  - Mercurio
  lexicon: BDAG
  rationale: Se mantiene el nombre griego «Hermes» por fidelidad al texto fuente, en vez del equivalente romano «Mercurio».
- source_word: ἐπειδὴ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la causa de la identificación de Pablo con Hermes. «Porque» es la forma más clara y directa en español actual.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, distinguiendo a Pablo como el que desempeñaba ese papel. En español, «él» funciona naturalmente en contexto; «él mismo» sería más pesado.
- source_word: ὁ ἡγούμενος
  english_pob_choice: the chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el que iba al frente
  - el jefe
  - el principal portavoz
  lexicon: BDAG
  rationale: El participio de ἡγέομαι aquí señala al que ocupa el papel principal o director en la situación. «El principal» conserva esa idea de prominencia sin imponer una etiqueta demasiado técnica.
- source_word: τοῦ λόγου
  english_pob_choice: speaker
  chosen_spanish: orador
  alternatives_spanish:
  - hablante
  - portavoz
  - de la palabra
  lexicon: BDAG
  rationale: Aquí λόγος se refiere al habla/discurso, no a «la Palabra» teológica. «Orador» comunica de forma idiomática que Pablo era el principal encargado de hablar.
theological_decisions:
- issue: Uso de nombres de divinidades paganas en la narración
  english_pob_reading: Use 'Zeus' and 'Hermes' in the main text
  chosen_spanish_reading: Usar «Zeus» y «Hermes» en el texto principal
  alternative_spanish_readings:
  - Júpiter y Mercurio
  rationale: El versículo reporta la percepción de la multitud acerca de Barnabás y Pablo. La fidelidad al griego favorece conservar los nombres divinos griegos en lugar de sustituirlos por equivalentes romanos de la tradición de traducción.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del inglés POB que prefirió «chief speaker» en lugar de «leading speaker» por ser más formal y natural; por eso en español se eligió «el principal orador», que conserva la noción de preeminencia y fluye con naturalidad.
  spanish_consistency_notes:
  - Se conservan los nombres griegos de las divinidades («Zeus», «Hermes») por coherencia con la primacía del texto original.
  - «λόγος» se entendió aquí como habla/discurso, no como «Palabra» teológica.
  - El imperfecto se reflejó con «llamaban» para mantener la acción continua del griego.
