- from: Ahora, en Iconio, entraron juntos[a] en la sinagoga de los judíos y hablaron de tal manera que una gran multitud de judíos y de griegos creyó.
  to: En Iconio, entraron juntos en la sinagoga de los judíos[a] y hablaron de tal manera que una gran multitud de judíos y de griegos creyó.
