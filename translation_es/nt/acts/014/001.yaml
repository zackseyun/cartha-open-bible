translation:
  language: es
  text: En Iconio, entraron juntos en la sinagoga de los judíos[a] y hablaron de tal manera que una gran multitud de judíos y de griegos creyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la sinagoga judía». El griego dice literalmente «en la sinagoga de los judíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y sucedió que
  - Entonces
  lexicon: BDAG
  rationale: La fórmula narrativa introduce la escena como transición del relato. «Ahora» mantiene ese valor discursivo de apertura sin sobretraducir el giro griego ni hacerlo pesado en español.
- source_word: ἐν Ἰκονίῳ
  english_pob_choice: in Iconium
  chosen_spanish: en Iconio
  alternatives_spanish:
  - en Iconio
  lexicon: BDAG
  rationale: Topónimo transliterado de forma directa, con preposición locativa simple y natural en español.
- source_word: κατὰ τὸ αὐτὸ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - de común acuerdo
  lexicon: BDAG
  rationale: El contexto muestra acción conjunta de Pablo y Bernabé. «Juntos» comunica esa acción compartida de manera natural y breve; mantiene la fuerza del valor adverbial sin volverlo opaco.
- source_word: εἰσελθεῖν αὐτοὺς
  english_pob_choice: they entered
  chosen_spanish: entraron
  alternatives_spanish:
  - entraron allí
  - fueron entrando
  lexicon: BDAG
  rationale: El infinitivo aoristo en la construcción narrativa se vierte con verbo finito en español. «Entraron» es la correspondencia más directa y fluida.
- source_word: εἰς τὴν συναγωγὴν τῶν Ἰουδαίων
  english_pob_choice: into the synagogue of the Jews
  chosen_spanish: en la sinagoga de los judíos
  alternatives_spanish:
  - en la sinagoga judía
  - en la sinagoga de los judíos
  lexicon: BDAG
  rationale: Se conserva el genitivo explícito del griego sin diluirlo en una paráfrasis más interpretativa. «Sinagoga de los judíos» refleja la relación nominal del original y evita ocultar el matiz del texto fuente.
- source_word: λαλῆσαι
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - hablaron allí
  - se dirigieron a ellos
  lexicon: BDAG
  rationale: Aquí λαλέω denota el acto de hablar/proclamar en la sinagoga. «Hablaron» es fiel, sobrio y suficientemente amplio para el contexto.
- source_word: οὕτως ὥστε
  english_pob_choice: in such a way that
  chosen_spanish: de tal manera que
  alternatives_spanish:
  - de modo que
  - tan eficazmente que
  lexicon: BDAG
  rationale: La combinación expresa modo con resultado. «De tal manera que» preserva ambos valores y suena natural en español bíblico contemporáneo.
- source_word: πιστεῦσαι
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - llegó a creer
  - tuvo fe
  lexicon: BDAG
  rationale: El verbo πιστεύω en este contexto narrativo señala la respuesta de fe al mensaje apostólico. En español, «creyó» conserva el valor verbal simple y evita añadir matices no expresados por el griego.
- source_word: Ἰουδαίων τε καὶ Ἑλλήνων
  english_pob_choice: of both Jews and Greeks
  chosen_spanish: de judíos y de griegos
  alternatives_spanish:
  - tanto de judíos como de griegos
  - de unos y otros, judíos y griegos
  lexicon: BDAG
  rationale: El par correlativo τε καὶ incluye a ambos grupos sin separación jerárquica. «De judíos y de griegos» mantiene esa inclusión con economía y claridad; la idea de «ambos» ya queda implícita en «una gran multitud».
- source_word: πολὺ πλῆθος
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud grande
  - muchísima gente
  lexicon: BDAG
  rationale: El sintagma subraya un número considerable de personas. «Una gran multitud» reproduce bien el peso cuantitativo del griego sin perder dignidad estilística.
theological_decisions:
- issue: Respuesta de fe expresada por πιστεῦσαι
  english_pob_reading: believed
  chosen_spanish_reading: creyó
  alternative_spanish_readings:
  - llegó a creer
  - tuvo fe
  rationale: No hay una elaboración doctrinal especial en la frase; el texto narra la respuesta de oyentes al anuncio apostólico. Se conserva la traducción directa del acto de creer sin expandirla a una formulación más explicativa.
  doctrine_reference: 'DOCTRINE.md: πίστις / πιστεύω — sentido básico de creer/fe en contexto narrativo'
- issue: Relación nominal en «la sinagoga de los judíos»
  english_pob_reading: the synagogue of the Jews
  chosen_spanish_reading: la sinagoga de los judíos
  alternative_spanish_readings:
  - la sinagoga judía
  - la sinagoga de los judíos
  rationale: Se mantiene la relación del genitivo griego y no se reduce automáticamente a un adjetivo. Esto deja visible la estructura del original y evita borrar una posible nota identitaria del texto.
  doctrine_reference: 'DOCTRINE.md: Retención de relaciones genitivas cuando aportan transparencia al original'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el texto fuente y con el audit trail inglés. La única tensión relevante es estilística: cómo verter κατὰ τὸ αὐτό y el genitivo τῶν Ἰουδαίων sin perder naturalidad. Se optó por una solución transparente y fluida en español, sin alterar el contenido ni introducir interpretación adicional.'
  spanish_consistency_notes:
  - Se mantiene «griegos» para Ἑλλήνων, siguiendo el valor étnico de oposición inclusiva frente a «judíos».
  - Se usa «creyeron» solo si se leyera el sujeto como plural explícito; aquí se prefirió «creyó» para reflejar el verbo singular del español con sujeto colectivo («una gran multitud»).
  - No se emplea «SEÑOR» ni terminología cristianizada no presente en este versículo.
  - 'La puntuación segmenta la escena en tres movimientos: marco narrativo, entrada y proclamación, resultado de fe.'
