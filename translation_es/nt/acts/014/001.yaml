review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: transición narrativa, entrada conjunta en Iconio, entrada en la sinagoga de los judíos, habla con resultado de fe en muchos judíos y griegos. Sin embargo, hay dos desajustes relevantes: (1) la nota al pie está anclada en «juntos[a]», pero la alternativa documentada en el POB inglés corresponde a «la sinagoga de los judíos / sinagoga judía»; (2) «Ahora» suena algo menos natural como transición narrativa en español bíblico que «Entonces» o una simple reestructuración sin marcador explícito. Además, la nota actual formula mal la alternativa, porque repite prácticamente la lectura principal en vez de ofrecer la alternativa adjetival.'
  spanish_quality_summary: 'El texto es claro y legible, pero requiere un pequeño ajuste para corregir el anclaje y contenido de la nota. También conviene suavizar la apertura a un español más natural: «En Iconio, entraron juntos...» funciona bien sin «Ahora». El resto de la frase suena digna y natural; «de tal manera que una gran multitud de judíos y de griegos creyó» es fiel y comprensible.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Creyó» para πιστεῦσαι y «sinagoga de los judíos» para συναγωγὴν τῶν Ἰουδαίων están alineados con el rastro inglés. La excepción necesaria es solo la nota léxica, que debe presentar correctamente la alternativa «sinagoga judía» y anclarse en esa expresión, no en «juntos».
  issues:
  - severity: medium
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: La nota inglesa preserva una alternativa para «into the synagogue of the Jews» / «into the Jewish synagogue», no para «together». En español, el marcador debe ir junto a «sinagoga de los judíos».
  - severity: medium
    issue: El contenido de la nota no presenta la alternativa léxica correcta.
    rationale: La nota actual ofrece «entraron en la sinagoga de los judíos», que no constituye una alternativa significativa a la redacción principal. Debe reflejar la alternativa «sinagoga judía» frente a «sinagoga de los judíos».
  - severity: low
    issue: «Ahora» como transición narrativa suena algo forzado en español bíblico contemporáneo.
    rationale: Aunque defendible, «En Iconio...» o «Entonces, en Iconio...» fluye mejor. Dado que ἐγένετο δὲ funciona como transición discursiva, el español no necesita reproducirla con «Ahora» si eso entorpece la naturalidad.
  revised_spanish_text: En Iconio, entraron juntos en la sinagoga de los judíos[a] y hablaron de tal manera que una gran multitud de judíos y de griegos creyó.
  revised_footnotes:
  - marker: a
    text: 'O: «en la sinagoga judía». El griego dice literalmente «en la sinagoga de los judíos».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a la unidad léxica documentada en el POB inglés, y se reescribió la nota para ofrecer la alternativa real («sinagoga judía»). También se eliminó «Ahora» para una transición más natural en español sin pérdida de sentido.
