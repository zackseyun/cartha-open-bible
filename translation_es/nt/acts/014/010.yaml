translation:
  language: es
  text: 'Dijo en voz alta[b]: «Ponte de pie, erguido[a], sobre tus pies». Y él dio un salto[b] y comenzó a caminar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Levántate derecho sobre tus pies».
    reason: lexical_alternative
  - marker: b
    text: O «Dijo a gran voz»; también, «dio un salto y andaba». El imperfecto del verbo final puede enfatizar la acción en curso o el comienzo de caminar.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλῃ φωνῇ
  english_pob_choice: in a loud voice
  chosen_spanish: en voz alta
  alternatives_spanish:
  - con voz fuerte
  - en una voz grande
  lexicon: BDAG
  rationale: La frase dativa expresa manera. «En voz alta» es la equivalencia española más natural y conserva el carácter público y enfático del habla sin introducir un giro forzado.
- source_word: Ἀνάστηθι
  english_pob_choice: Stand
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀνίστημι aquí funciona como mandato de incorporarse desde la posición de invalidez. En español, «Levántate» comunica el acto inmediato de ponerse en pie con claridad narrativa.
- source_word: ἐπὶ τοὺς πόδας σου
  english_pob_choice: on your feet
  chosen_spanish: sobre tus pies
  alternatives_spanish:
  - en tus pies
  - apoyado en tus pies
  lexicon: BDAG
  rationale: La imagen espacial se conserva mejor con «sobre tus pies», que refleja el apoyo o postura resultante de estar de pie, sin añadir interpretación.
- source_word: ὀρθός
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - erguido
  - derecho
  lexicon: BDAG
  rationale: ὀρθός califica la postura. «Recto» mantiene la idea de alineación vertical y funciona bien junto al imperativo en español. Se coloca como adverbio/predicativo según el flujo natural del mandato.
- source_word: ἥλατο
  english_pob_choice: he leaped up
  chosen_spanish: saltó
  alternatives_spanish:
  - dio un salto
  - brincó
  lexicon: BDAG
  rationale: El verbo medio de ἅλλομαι expresa un salto repentino. «Saltó» preserva el golpe narrativo del milagro; el contexto ya implica el movimiento hacia arriba.
- source_word: περιεπάτει
  english_pob_choice: began walking
  chosen_spanish: comenzó a caminar
  alternatives_spanish:
  - iba caminando
  - andaba
  lexicon: BDAG
  rationale: El imperfecto puede sugerir acción en curso o inicio de la marcha. «Comenzó a caminar» reproduce bien el valor inceptivo que la POB inglesa destacó, sin perder la continuidad implícita.
theological_decisions:
- issue: Descripción del milagro sin amplificación interpretativa
  english_pob_reading: Translate the command and response straightforwardly as an immediate physical healing without embellishment.
  chosen_spanish_reading: Traducir la orden y la respuesta de manera directa como una sanidad física inmediata, sin añadir comentario interpretativo.
  alternative_spanish_readings:
  - Añadir explicaciones sobre la fe del hombre
  - Hacer la frase más devocional o exclamativa
  rationale: El griego presenta una orden directa seguida de una respuesta visible e instantánea. La traducción española debe conservar esa concreción narrativa y no expandir el contenido más allá de lo que el texto afirma.
  doctrine_reference: Principio de primacía del texto original; preservar el alcance afirmado por el pasaje.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo de alta concordancia del auditor: no se introducen cambios textuales respecto del sentido del griego ni de la lectura inglesa, y se mantiene la distinción entre el salto repentino y la marcha en imperfecto.'
  spanish_consistency_notes:
  - Se usa «Levántate» para Ἀνάστηθι, evitando el calco rígido «stand» y conservando la fuerza imperativa natural del español.
  - «En voz alta» traduce la manera expresada por μεγάλῃ φωνῇ sin forzar la literalidad de «gran voz».
  - «Comenzó a caminar» refleja adecuadamente el valor imperfectivo/inceptivo de περιεπάτει en el contexto narrativo.
  - La puntuación y las comillas siguen el uso español, y los marcadores de nota están anclados en las frases pertinentes.
