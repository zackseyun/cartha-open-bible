    rationale: Aunque reproduce formalmente ἐπὶ τοὺς πόδας σου, en español natural la orden se expresa mejor como «ponte de pie» o «sobre tus propios pies» en otros contextos. Aquí el objetivo es la postura erguida, no una imagen espacial literal.
  - severity: medium
    issue: «Levántate recto» suena forzado
    rationale: ὀρθός describe la postura erguida, pero «recto» en español puede oírse moral o físicamente rígido. «Erguido» o «derecho» comunican mejor el sentido postural y la legibilidad.
  - severity: low
