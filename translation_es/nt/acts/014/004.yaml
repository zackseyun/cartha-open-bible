translation:
  language: es
  text: Pero la gente[a] de la ciudad quedó dividida, y unos estaban con los judíos y otros con los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la multitud de la ciudad quedó dividida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσχίσθη
  english_pob_choice: were divided
  chosen_spanish: quedó dividida
  alternatives_spanish:
  - se dividió
  - quedó partida
  - fue dividida
  lexicon: BDAG
  rationale: El pasivo de σχίζω expresa una ruptura o división. En español, «quedó dividida» comunica el resultado de esa fractura social de manera natural y mantiene la fuerza pasiva/resultativa sin sonar mecánico.
- source_word: τὸ πλῆθος τῆς πόλεως
  english_pob_choice: the people of the city
  chosen_spanish: la gente de la ciudad
  alternatives_spanish:
  - la multitud de la ciudad
  - la población de la ciudad
  - el pueblo de la ciudad
  lexicon: BDAG
  rationale: πλῆθος puede ser multitud, muchedumbre o conjunto de personas. Aquí la referencia es al conjunto de habitantes/capital social de la ciudad, no a una multitud reunida en un solo lugar, por eso «la gente de la ciudad» resulta natural y fiel al sentido contextual.
- source_word: οἱ μὲν ... οἱ δὲ
  english_pob_choice: some ... some
  chosen_spanish: unos ... otros
  alternatives_spanish:
  - algunos ... algunos
  - una parte ... otra parte
  - unos ... unos
  lexicon: BDAG
  rationale: La correlación griega marca dos grupos contrapuestos. En español, «unos ... otros» reproduce bien la bipartición y suena más idiomático que una repetición rígida de «algunos ... algunos».
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en apoyo de
  - de parte de
  - a favor de
  lexicon: BDAG
  rationale: σύν con dativo indica asociación o alineación. «Con» es la equivalencia directa y suficiente; el contexto de conflicto ya deja claro que se trata de tomar partido.
- source_word: Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los líderes judíos
  lexicon: BDAG
  rationale: En Hechos, Ἰουδαῖοι designa normalmente al grupo judío como tal. No hay una restricción explícita a líderes, así que «los judíos» preserva la referencia del texto sin añadir precisión no indicada por la fuente.
- source_word: ἀποστόλοις
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los mensajeros
  lexicon: BDAG
  rationale: ἀπόστολος es el término ya establecido en Hechos para este grupo, y en este capítulo se aplica a Pablo y Bernabé. «Apóstoles» mantiene la designación narrativa directa y reconocible.
theological_decisions:
- issue: Identidad de «los apóstoles»
  english_pob_reading: Retain 'the apostles' as the narrative designation for Paul and Barnabas.
  chosen_spanish_reading: Mantener «los apóstoles» como designación narrativa de Pablo y Bernabé.
  alternative_spanish_readings:
  - traducirlo más genéricamente como «los enviados»
  - 'explicitar los nombres: «Pablo y Bernabé»'
  rationale: El propio capítulo identifica a Bernabé y Pablo como «apóstoles» en 14:14. Traducir directamente el término conserva el lenguaje de Lucas sin introducir una paráfrasis que debilite la designación narrativa.
  doctrine_reference: Hechos 14:14; principio de consistencia narrativa del texto
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión aprobada: no se requieren cambios textuales adicionales. Se conserva la lectura de división social y la designación directa de «los apóstoles» conforme al audit trail inglés.'
  spanish_consistency_notes:
  - 'Se evitó «SEÑOR» u otro reemplazo innecesario: no aparece el nombre divino en este versículo.'
  - Se eligió «la gente de la ciudad» / «quedó dividida» para mantener naturalidad en español sin perder el sentido pasivo de ἐσχίσθη.
  - «Los judíos» y «los apóstoles» se mantienen como designaciones de grupo en paralelo, reflejando la antítesis del griego.
