translation:
  language: es
  text: 'y diciendo: «Hombres, ¿por qué hacen estas cosas? Nosotros también somos hombres de la misma condición que ustedes[a], y les anunciamos buenas nuevas, para que se vuelvan de estas cosas inútiles[b] al Dios viviente, que hizo el cielo[c], la tierra, el mar y todo lo que hay en ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la misma naturaleza que ustedes»; la expresión indica que Pablo y Bernabé comparten la misma condición humana que sus oyentes.
    reason: lexical_alternative
  - marker: b
    text: «Estas cosas inútiles» se refiere contextualmente al culto pagano vano, incluidos los ídolos.
    reason: cultural_note
  - marker: c
    text: O «los cielos»; el griego tiene singular («cielo») en una fórmula fija de creación que hace eco del lenguaje de las Escrituras.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Varones
  - Señores
  lexicon: BDAG
  rationale: El vocativo plural de ἀνήρ se dirige al auditorio masculino. «Hombres» conserva la interpelación directa y la fuerza retórica sin suavizarla con un tratamiento más cortés o genérico.
- source_word: ὁμοιοπαθεῖς
  english_pob_choice: of like nature with you
  chosen_spanish: de la misma condición que ustedes
  alternatives_spanish:
  - de naturaleza semejante a ustedes
  - de la misma naturaleza que ustedes
  - con las mismas experiencias humanas que ustedes
  lexicon: BDAG
  rationale: La palabra expresa compartir la misma condición humana. En español, «de la misma condición» comunica bien esa realidad sin sonar tan técnico como «de naturaleza semejante», y preserva la negativa implícita a cualquier honor divino.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - seres humanos
  - personas
  lexicon: BDAG
  rationale: El predicado refuerza que Pablo y Bernabé son simples humanos. «Hombres» mantiene el paralelo con el vocativo Ἄνδρες y conserva el matiz retórico del original.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: bringing you good news
  chosen_spanish: les anunciamos buenas nuevas
  alternatives_spanish:
  - les proclamamos el evangelio
  - les traemos buenas nuevas
  lexicon: BDAG
  rationale: El participio explica la acción de hablarles. «Anunciamos buenas nuevas» es una forma natural en español bíblico actual y evita imponer un tecnicismo eclesiástico innecesario.
- source_word: ματαίων
  english_pob_choice: worthless things
  chosen_spanish: cosas inútiles
  alternatives_spanish:
  - cosas vanas
  - cosas vacías
  - ídolos
  lexicon: BDAG
  rationale: El adjetivo describe lo fútil, lo sin provecho. «Cosas inútiles» preserva el valor negativo amplio del griego; «ídolos» sería más específico que el término usado, aunque el contexto lo sugiera.
- source_word: ἐπιστρέφειν
  english_pob_choice: to turn
  chosen_spanish: se aparten
  alternatives_spanish:
  - se vuelvan
  - se conviertan
  - regresen
  lexicon: BDAG
  rationale: En el contexto de dejar la idolatría para dirigirse a Dios, el infinitivo de propósito se expresa con naturalidad como un cambio de dirección. «Se aparten» comunica bien el abandono de lo vano; «se vuelvan» queda reservado en la frase siguiente por la relación con ἐπὶ.
- source_word: ἐπὶ θεὸν ζῶντα
  english_pob_choice: to the living God
  chosen_spanish: al Dios viviente
  alternatives_spanish:
  - hacia el Dios viviente
  - al Dios que vive
  lexicon: BDAG
  rationale: La preposición con acusativo indica movimiento hacia. «Al Dios viviente» es la equivalencia española más natural y fiel al contraste entre el Dios verdadero y los objetos paganos sin vida.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: BDAG
  rationale: En la fórmula creativa, «hizo» reproduce de forma directa el verbo griego y funciona bien con la estructura enumerativa del texto.
- source_word: τὸν οὐρανὸν
  english_pob_choice: the heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: BDAG
  rationale: Aunque el griego es singular, en español la forma idiomática y natural en esta fórmula es «el cielo». La elección evita una construcción forzada como «el heaven».},{
- source_word: πάντα τὰ ἐν αὐτοῖς
  english_pob_choice: all that is in them
  chosen_spanish: todo lo que hay en ellos
  alternatives_spanish:
  - todo lo que está en ellos
  - todas las cosas en ellos
  lexicon: BDAG
  rationale: La frase resume de manera total la creación. «Todo lo que hay en ellos» es claro, natural y suficientemente amplio para abarcar cielo, tierra y mar.
theological_decisions:
- issue: Condición humana de Pablo y Bernabé frente a cualquier insinuación de divinidad
  english_pob_reading: We also are men of like nature with you
  chosen_spanish_reading: Nosotros también somos hombres de la misma condición que ustedes
  alternative_spanish_readings:
  - Nosotros también somos hombres de naturaleza semejante a ustedes
  - Nosotros también somos simplemente humanos, como ustedes
  rationale: El texto rechaza que se atribuya a los apóstoles una categoría divina. La redacción elegida mantiene la afirmación positiva de humanidad compartida sin convertirla en una paráfrasis demasiado explicativa.
  doctrine_reference: Hechos 14:15; doctrina de la humanidad común y rechazo de la idolatría
- issue: Alcance de «cosas inútiles»
  english_pob_reading: These worthless things refers contextually to futile pagan worship, including idols.
  chosen_spanish_reading: Estas cosas inútiles aluden al culto pagano inútil, incluidos los ídolos.
  alternative_spanish_readings:
  - Estas cosas inútiles se refieren a los ídolos
  - Estas cosas vanas incluyen la idolatría pagana
  rationale: El griego conserva una expresión amplia; el contexto inmediato muestra que el problema incluye la idolatría. La nota puede aclarar el sentido contextual sin reemplazar la frase del texto principal.
  doctrine_reference: Hechos 14:15; contexto de idolatría pagana
- issue: Sentido de ἐπὶ θεὸν ζῶντα
  english_pob_reading: to the living God
  chosen_spanish_reading: al Dios viviente
  alternative_spanish_readings:
  - hacia el Dios viviente
  - al Dios que vive
  rationale: La dirección del movimiento es parte del llamado a la conversión. «Al Dios viviente» conserva el contraste teológico con los ídolos muertos y mantiene una formulación bíblica natural en español.
  doctrine_reference: Hechos 14:15; contraste entre el Dios vivo y los ídolos
- issue: Fórmula de creación
  english_pob_reading: who made heaven and earth and sea and all that is in them
  chosen_spanish_reading: que hizo el cielo, la tierra, el mar y todo lo que hay en ellos
  alternative_spanish_readings:
  - que hizo los cielos, la tierra, el mar y todo lo que hay en ellos
  - que creó el cielo, la tierra, el mar y todo lo que hay en ellos
  rationale: La enumeración sigue la fórmula de creación de las Escrituras. «Hizo» reproduce bien el verbo y evita introducir una decisión más interpretativa como «creó» cuando el griego usa ποιέω.
  doctrine_reference: Génesis 1; Hechos 14:15
translation_notes:
  revision_awareness: 'El contexto inglés revisado pasó de «with the same nature as you» a «of like nature with you» y añadió la relación de propósito con el infinitivo «that you should turn». La versión española sigue esa misma línea: expresa la humanidad compartida con una fórmula idiomática y hace explícita la direccionalidad con una construcción natural de propósito. También conserva la fórmula creadora con una enumeración cercana al griego, evitando ampliar innecesariamente el texto.'
  spanish_consistency_notes:
  - Se usa «Dios viviente» para θεὸν ζῶντα conforme al estándar del proyecto.
  - Se mantiene «hombres» para el vocativo y el predicado para conservar el paralelismo retórico.
  - No se introduce «Cristo» ni otro término confesional ajeno al versículo.
  - La frase «cosas inútiles» preserva la amplitud del original y se aclara en nota sin sustituirla por «ídolos» en el cuerpo del texto.
