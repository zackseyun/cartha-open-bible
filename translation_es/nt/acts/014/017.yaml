translation:
  language: es
  text: Sin embargo, no se dejó sin testimonio acerca de sí mismo[a], haciendo el bien al darles lluvias desde el cielo y tiempos fructíferos[b], llenando sus corazones[c] de alimento y de alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sin testimonio”. El griego subraya que Dios no se dejó sin testimonio acerca de quién es él y de su carácter.
    reason: lexical_alternative
  - marker: b
    text: O “tiempos que producen fruto”.
    reason: lexical_alternative
  - marker: c
    text: Algunas traducciones leen “nuestros corazones” por una variante textual en el pronombre; el texto SBLGNT lee “sus corazones”, es decir, “los corazones de ustedes”.
    reason: textual_variant
lexical_decisions:
- source_word: καίτοι
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Expresa con naturalidad el valor concesivo de la partícula al enlazar con lo anterior. En español, 'Sin embargo' mantiene el contraste sin sonar forzado.
- source_word: ἀμάρτυρον
  english_pob_choice: without witness
  chosen_spanish: sin testimonio
  alternatives_spanish:
  - sin testigo
  - sin evidencia
  lexicon: BDAG
  rationale: '''Testimonio'' preserva mejor el matiz de declaración/atestiguamiento que ''evidencia'', y suena natural en español bíblico contemporáneo.'
- source_word: αὑτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a él mismo
  - él mismo
  lexicon: BDAG
  rationale: Mantiene el carácter reflexivo del pronombre, importante para el sentido de que Dios da testimonio de su propia realidad y carácter.
- source_word: ἀφῆκεν
  english_pob_choice: did not leave
  chosen_spanish: no se dejó
  alternatives_spanish:
  - no lo dejó
  - no abandonó
  lexicon: BDAG
  rationale: La construcción española refleja bien el giro idiomático de 'did not leave himself' sin perder el sentido de dejar en un estado determinado.
- source_word: ἀγαθουργῶν
  english_pob_choice: doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - obrando bien
  - beneficiando
  lexicon: BDAG
  rationale: '''Haciendo el bien'' transmite la beneficencia activa del participio y es más natural que una traducción más técnica o abstracta.'
- source_word: οὐρανόθεν
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo de arriba
  - del cielo
  lexicon: BDAG
  rationale: '''Desde el cielo'' conserva el origen celestial de las lluvias y su tono bíblico sin sonar arcaico.'
- source_word: ὑετοὺς
  english_pob_choice: rains
  chosen_spanish: lluvias
  alternatives_spanish:
  - lluvia
  - aguaceros
  lexicon: BDAG
  rationale: El plural griego sugiere lluvias repetidas o providencias recurrentes; 'lluvias' reproduce ese matiz mejor que el singular.
- source_word: διδοὺς
  english_pob_choice: by giving
  chosen_spanish: al dar
  alternatives_spanish:
  - dando
  - por dar
  lexicon: BDAG
  rationale: '''Al dar'' expresa con claridad la relación participial de medio o manera respecto de ''haciendo el bien''.'
- source_word: καιροὺς καρποφόρους
  english_pob_choice: fruitful seasons
  chosen_spanish: tiempos fructíferos
  alternatives_spanish:
  - estaciones fructíferas
  - tiempos de fruto
  lexicon: BDAG
  rationale: '''Tiempos fructíferos'' conserva el sentido de períodos señalados con abundancia productiva y evita una formulación demasiado técnica.'
- source_word: ἐμπιπλῶν
  english_pob_choice: filling
  chosen_spanish: llenando
  alternatives_spanish:
  - saturando
  - colmando
  lexicon: BDAG
  rationale: Verbo directo y natural que mantiene la imagen de plenitud del participio presente.
- source_word: τροφῆς
  english_pob_choice: food
  chosen_spanish: de alimento
  alternatives_spanish:
  - de comida
  - de sustento
  lexicon: BDAG
  rationale: '''Alimento'' es más digno y amplio que ''comida'', y recoge bien el sentido de provisión nutritiva.'
- source_word: εὐφροσύνης
  english_pob_choice: gladness
  chosen_spanish: de alegría
  alternatives_spanish:
  - de gozo
  - de regocijo
  lexicon: BDAG
  rationale: '''Alegría'' comunica adecuadamente el gozo interior y combina bien con ''alimento'' en español moderno.'
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - vuestros corazones
  - sus corazones de ustedes
  lexicon: BDAG
  rationale: Se adopta el pronombre de tercera persona plural ('sus') para reflejar la lectura textual indicada por la nota auditada en inglés, mientras se mantiene la referencia comunitaria implícita en el contexto.
theological_decisions:
- issue: Testimonio divino a través de la providencia
  english_pob_reading: God bears witness to himself through providential goodness in creation
  chosen_spanish_reading: Dios da testimonio de sí mismo mediante su bondad providencial en la creación
  alternative_spanish_readings:
  - Los fenómenos naturales son solo procesos impersonalmente descritos
  - Dios simplemente cuida, sin intención testimonial
  rationale: La combinación de 'sin testimonio' con los participios de acción benéfica presenta lluvias, estaciones fructíferas y el llenado del corazón como señales intencionales de Dios sobre quién es él. La redacción española conserva esa fuerza testimonial sin ir más allá del texto.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el análisis auditado en inglés. Se conservan las tres unidades participiales: ''haciendo el bien'', ''al dar'' y ''llenando''. También se refleja la variante pronominal documentada en la nota inglesa mediante ''sus corazones'' y la nota c. No se introdujeron cambios respecto del sentido lexical ni de la lectura teológica aprobada en la auditoría.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - '''Testimonio'' se prefiere a ''evidencia'' para mantener el matiz forense de ἀμάρτυρον.'
  - Se mantiene el registro bíblico contemporáneo, evitando calcos demasiado literales como 'sin testigo'.
  - 'La colocación de los complementos finaliza con naturalidad en español: ''de alimento y de alegría''.'
