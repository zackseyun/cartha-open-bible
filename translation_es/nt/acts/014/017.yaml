    reason: lexical_alternative
  - marker: b
    text: O “tiempos que producen fruto”.
    reason: lexical_alternative
  - marker: c
    text: Algunas traducciones leen “nuestros corazones” por una variante textual en el pronombre; el texto SBLGNT lee “sus corazones”, es decir, “los corazones de ustedes”.
    reason: textual_variant
  revision_rationale: 'La revisión corrige el principal problema de fidelidad y naturalidad en español al reemplazar el calco reflexivo ''no se dejó a sí mismo'' por una construcción idiomática que preserva el sentido del griego: Dios no quedó sin testimonio acerca de sí mismo. También se ajusta la nota léxica para mantener el matiz testimonial sin añadir ''declaración visible'', y se aclara la nota textual sobre ''sus corazones''.'
