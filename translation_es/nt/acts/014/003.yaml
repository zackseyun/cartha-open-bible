translation:
  language: es
  text: Así que permanecieron allí bastante tiempo[a], hablando con valentía para el Señor, quien daba testimonio al mensaje de su gracia, concediendo que se realizaran señales y prodigios por medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablando con valentía en el Señor». La expresión griega puede poner el énfasis en que su audacia estaba fundada en el Señor o ejercida en relación con él.
    reason: alternative_reading
lexical_decisions:
- source_word: ἱκανὸν ... χρόνον
  english_pob_choice: a considerable time
  chosen_spanish: bastante tiempo
  alternatives_spanish:
  - un tiempo considerable
  - por un buen tiempo
  lexicon: BDAG
  rationale: La expresión griega indica una duración notable. «Bastante tiempo» suena natural en español y conserva la idea de una permanencia prolongada sin sobrerrepresentarla.
- source_word: διέτριψαν
  english_pob_choice: they stayed there
  chosen_spanish: permanecieron allí
  alternatives_spanish:
  - se quedaron allí
  - estuvieron allí
  lexicon: BDAG
  rationale: Aquí διατρίβω expresa permanecer o pasar tiempo en un lugar. «Permanecieron allí» conserva ubicación y duración con un tono adecuado para narrativa bíblica.
- source_word: παρρησιαζόμενοι
  english_pob_choice: speaking boldly
  chosen_spanish: hablando con valentía
  alternatives_spanish:
  - hablando abiertamente
  - hablando con denuedo
  lexicon: BDAG
  rationale: El participio comunica habla franca y sin temor. «Hablando con valentía» transmite el matiz de audacia de manera clara y natural en español.
- source_word: ἐπὶ τῷ κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - en el Señor
  - apoyados en el Señor
  - confiando en el Señor
  lexicon: BDAG
  rationale: La preposición con dativo puede expresar base, relación o dependencia. «Para el Señor» comunica bien que su audacia estaba al servicio de él, sin borrar la posibilidad alternativa de «en el Señor».
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el título habitual «Señor» para κύριος, sin añadir especificación que el griego no expresa explícitamente.
- source_word: τῷ μαρτυροῦντι
  english_pob_choice: who was bearing witness
  chosen_spanish: quien daba testimonio
  alternatives_spanish:
  - quien testificaba
  - quien estaba dando testimonio
  lexicon: BDAG
  rationale: El participio presente marca acción en curso. «Daba testimonio» mantiene el valor testimonial y sugiere continuidad sin resultar rígido.
- source_word: τῷ λόγῳ τῆς χάριτος αὐτοῦ
  english_pob_choice: the word of his grace
  chosen_spanish: la palabra de su gracia
  alternatives_spanish:
  - el mensaje de su gracia
  - su palabra de gracia
  lexicon: BDAG
  rationale: «Palabra» conserva λόγος con su peso discursivo y teológico. El genitivo se rinde de modo directo como «de su gracia» para no diluir la construcción.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En Lucas-Hechos, χάρις suele tener sentido teológico fuerte. «Gracia» preserva ese valor mejor que «favor».
- source_word: διδόντι
  english_pob_choice: granting
  chosen_spanish: concediendo
  alternatives_spanish:
  - dando
  - permitiendo
  lexicon: BDAG
  rationale: El participio presenta al Señor como quien autoriza o concede la ocurrencia de milagros. «Concediendo» comunica mejor esa acción soberana que un simple «dando».
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - signos y prodigios
  lexicon: BDAG
  rationale: La pareja es fórmula bíblica estable. «Señales y prodigios» conserva la fuerza evidencial y extraordinaria del binomio con una forma natural en español.
- source_word: γίνεσθαι
  english_pob_choice: to be done
  chosen_spanish: que se realizaran
  alternatives_spanish:
  - que ocurrieran
  - que se hicieran
  lexicon: BDAG
  rationale: Con señales y prodigios, el infinitivo expresa su acontecer efectivo. «Que se realizaran» suena idiomático en español y mantiene la idea de evento efectivamente ocurrido.
- source_word: διὰ τῶν χειρῶν αὐτῶν
  english_pob_choice: through their hands
  chosen_spanish: por medio de sus manos
  alternatives_spanish:
  - por sus manos
  - a través de sus manos
  lexicon: BDAG
  rationale: La expresión resalta instrumentalidad concreta. «Por medio de sus manos» conserva la imagen sin sonar extraña en español moderno.
theological_decisions:
- issue: Referente de κύριος en el pasaje
  english_pob_reading: Render simply as 'the Lord' without specifying beyond the Greek title, while understanding the narrative likely refers to the risen Jesus.
  chosen_spanish_reading: Traducir simplemente «el Señor», sin especificar más de lo que dice el griego.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El texto griego usa solo κύριος. Añadir «Jesús» o redefinirlo como «Dios» excedería el alcance explícito del pasaje, aunque el contexto narrativo sugiera al Señor resucitado.
  doctrine_reference: Primacía del texto original; no importar especificaciones no expresadas explícitamente
- issue: Fuerza de ἐπὶ τῷ κυρίῳ
  english_pob_reading: Express the relation as 'for the Lord' in the main text, with 'in the Lord' preserved as an alternative.
  chosen_spanish_reading: Expresar la relación como «para el Señor» en el texto principal.
  alternative_spanish_readings:
  - en el Señor
  - sobre la base del Señor
  - dependiendo del Señor
  rationale: La construcción puede indicar base, esfera o relación. «Para el Señor» comunica de forma natural el sentido de audacia ejercida en su servicio, sin eliminar la tensión interpretativa.
  doctrine_reference: Conservar tensión semántica cuando la preposición admite más de una relación
translation_notes:
  revision_awareness: Se ha seguido el pasaje tal como está en el paquete fuente, sin revisiones aplicadas; el estado de concordancia del audit trail es alto y no requiere cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar proyectado.
  - Se traduce χάρις como «gracia», no como «favor», para conservar el peso teológico habitual en Hechos.
  - Se evita una especificación de Jesús que el griego no añade explícitamente.
  - «Señales y prodigios» preserva la fórmula bíblica fija sin calco innecesario.
  - La nota [a] conserva la alternativa interpretativa sobre ἐπὶ τῷ κυρίῳ, ya documentada en el audit trail inglés.
