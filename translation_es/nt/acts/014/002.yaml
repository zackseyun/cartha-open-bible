    changes_summary: Changed 'refused to believe' to 'were disobedient' to more directly reflect ἀπειθήσαντες while preserving formal register; retained the rest as accurate and natural.
translation:
  language: es
  text: Pero los judíos desobedientes[a] incitaron a los gentiles y envenenaron su ánimo[b] contra los hermanos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no quisieron creer». El griego puede denotar rechazo a creer el mensaje; en este contexto probablemente alude al rechazo del evangelio.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «sus almas». Aquí la expresión se refiere al interior, la disposición o el ánimo de los gentiles.'
    reason: lexical_alternative
  - marker: c
    text: «Hermanos» probablemente se refiere a los creyentes en general, incluidas las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπειθήσαντες
  english_pob_choice: were disobedient
  chosen_spanish: desobedientes
  alternatives_spanish:
  - reacios a creer
  - incrédulos
  - desobedientes
  lexicon: BDAG
  rationale: El participio aoristo expresa una actitud de rechazo frente al mensaje; la revisión inglesa prefirió reflejar más directamente la idea de desobediencia. En español, «desobedientes» conserva esa fuerza y evita forzar un verbo que añadiría un complemento no explícito en el griego.
- source_word: Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - el pueblo judío
  lexicon: BDAG
  rationale: Aquí designa al grupo opositor concreto en el contexto narrativo, no a todo el pueblo judío. «Los judíos» sigue de cerca el griego y la restricción contextual queda en la escena misma.
- source_word: ἐπήγειραν
  english_pob_choice: stirred up
  chosen_spanish: incitaron
  alternatives_spanish:
  - agitaron
  - soliviantaron
  - provocaron
  lexicon: BDAG
  rationale: El verbo expresa el acto de mover a otros hacia una reacción hostil. «Incitaron» es natural en español y conserva el matiz causativo y público del término.
- source_word: ἐκάκωσαν
  english_pob_choice: poisoned
  chosen_spanish: pervirtieron
  alternatives_spanish:
  - amargaron
  - envenenaron
  - corrompieron
  lexicon: BDAG
  rationale: El inglés «poisoned» interpreta idiomáticamente la idea de dañar interiormente la disposición de las personas. En español, «pervirtieron» transmite la corrupción de la actitud o interioridad sin introducir una imagen demasiado libre; se deja la ambigüedad de ψυχή en nota.
- source_word: τὰς ψυχὰς
  english_pob_choice: their minds
  chosen_spanish: las almas
  alternatives_spanish:
  - sus mentes
  - su interior
  - sus almas
  lexicon: BDAG
  rationale: Aunque el inglés optó por «minds» para aclarar el sentido idiomático, el griego dice literalmente «las almas». En español se mantiene esa forma en el texto principal para no borrar el término fuente, y se explica en nota que se trata del interior o disposición.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  - de los no judíos
  lexicon: BDAG
  rationale: En el contraste judío-gentil de Hechos, ἔθνη significa «gentiles». Esa equivalencia es la más idiomática y fiel al contexto narrativo.
- source_word: κατὰ τῶν ἀδελφῶν
  english_pob_choice: against the brothers
  chosen_spanish: contra los hermanos
  alternatives_spanish:
  - contra los hermanos y hermanas
  - contra los creyentes
  lexicon: BDAG
  rationale: El sustantivo masculino plural ἀδελφῶν puede funcionar colectivamente para la comunidad cristiana. Se conserva «hermanos» en el texto principal, manteniendo la forma fuente; el posible alcance inclusivo se preserva en nota.
theological_decisions:
- issue: Alcance colectivo de ἀδελφῶν en una comunidad cristiana mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: La forma griega es masculina plural y en uso cristiano temprano suele abarcar a la comunidad entera. Se mantiene la forma cercana al original en el texto principal, sin neutralizarla, conforme al principio de precisión de género documentado en la base POB.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relación entre ἀπειθήσαντες y la respuesta al evangelio
  english_pob_reading: were disobedient
  chosen_spanish_reading: desobedientes
  alternative_spanish_readings:
  - que rechazaron creer
  - incrédulos
  rationale: En este contexto narrativo el rechazo es al mensaje apostólico; no obstante, el griego mantiene el rasgo de desobediencia más que una paráfrasis explícita de fe/no fe. «Desobedientes» preserva esa tensión sin imponer una explicación doctrinal excesiva al texto.
  doctrine_reference: Acts narrative lexical context; BDAG ἀπειθέω
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB ajustó ἀπειθήσαντες desde una formulación centrada en la incredulidad a «were disobedient» para reflejar más directamente el participio griego, manteniendo intacta la escena de oposición y corrupción interior. La presente versión española sigue esa última decisión y conserva la triple red de notas sobre desobediencia, ψυχή y ἀδελφοί.
  spanish_consistency_notes:
  - Se mantuvo «gentiles» para ἔθνη, conforme al uso técnico narrativo en Hechos.
  - Se evitó reemplazar «hermanos» por una forma neutral en el texto principal; el alcance inclusivo queda en nota.
  - Se optó por un verbo español que refleje corrupción interior sin abandonar innecesariamente el lenguaje fuente de ψυχή.
  - La puntuación y el orden siguen un registro bíblico moderno y legible en español.
