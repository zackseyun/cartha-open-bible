revisions:
- from: Pero los judíos desobedientes[a] incitaron y pervirtieron las almas[b] de los gentiles contra los hermanos[c].
  to: Pero los judíos desobedientes[a] incitaron a los gentiles y envenenaron su ánimo[b] contra los hermanos[c].
  rationale: Se revisa la expresión de ἐκάκωσαν τὰς ψυχὰς para lograr un español más natural y fiel al sentido contextual. «Envenenaron su ánimo» conserva el matiz idiomático de corromper la disposición interior contra los creyentes, en línea con la traducción inglesa auditada («poisoned their minds») y con la nota que aclara el griego literal «sus almas». También se mejora la fluidez sintáctica con «incitaron a los gentiles».
