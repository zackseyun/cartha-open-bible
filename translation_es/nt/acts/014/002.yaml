base_translation:
  language: en
  yaml_path: translation/nt/acts/014/002.yaml
  text: But the Jews who were disobedient stirred up the Gentiles and poisoned their minds against the brothers[a][b][c].
  footnotes:
  - marker: a
    text: Or 'were disobedient.' The Greek can denote refusal to believe the message, and in this context likely refers to rejecting the gospel.
    reason: lexical_alternative
  - marker: b
    text: Greek 'their souls'; here the sense is their inner disposition or attitude.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' here likely refers to fellow believers generally, including women.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
