  glossary_alignment: No hay términos teológicos o glosario de proyecto en juego aquí. Los topónimos «Pisidia» y «Panfilia» están bien adaptados al español. La coordinación inicial «Y» concuerda con la filosofía de conservar καὶ como enlace simple.
