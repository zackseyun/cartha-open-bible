lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Conserva la simple coordinación narrativa del griego sin añadir matiz temporal o discursivo que el texto no exige.
- source_word: διελθόντες
  english_pob_choice: after passing through
  chosen_spanish: después de atravesar
  alternatives_spanish:
  - habiendo atravesado
  - después de pasar por
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior al verbo principal; «después de atravesar» mantiene esa relación temporal de forma natural en español y conserva el matiz de recorrido por una región.
- source_word: Πισιδίαν
  english_pob_choice: Pisidia
  chosen_spanish: Pisidia
  alternatives_spanish:
  - la Pisidia
  lexicon: N- proper noun
  rationale: Nombre geográfico propio transliterado; en español bíblico suele omitirse el artículo con regiones históricas para mayor naturalidad y fidelidad al uso del nombre.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: En este contexto de itinerario, «llegaron» comunica con precisión el movimiento hacia el destino y suena más natural en español que un simple «vinieron».
- source_word: εἰς τὴν Παμφυλίαν
  english_pob_choice: into Pamphylia
  chosen_spanish: a Panfilia
  alternatives_spanish:
  - a la Panfilia
  - hacia Panfilia
  lexicon: BDAG
  rationale: La preposición griega marca dirección hacia una región; en español, «a Panfilia» expresa bien ese movimiento sin forzar un equivalente literal de «en/into». «Panfilia» respeta la forma española usual del topónimo.
