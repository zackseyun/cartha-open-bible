lexical_decisions:
- source_word: κἀκεῖ
  english_pob_choice: And there
  chosen_spanish: Y allí
  alternatives_spanish:
  - y allí también
  - allí también
  lexicon: BDAG
  rationale: κἀκεῖ combina καί + ἐκεῖ y puede ser “y allí” o “allí también”. En español, “Y allí” conserva el enlace narrativo con el contexto inmediato y mantiene la referencia locativa sin añadir una matización de “también” que no es obligatoria en el griego.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: preaching the good news
  chosen_spanish: anunciando las buenas nuevas
  alternatives_spanish:
  - proclamando el evangelio
  - predicando las buenas nuevas
  lexicon: BDAG
  rationale: El participio de εὐαγγελίζω significa anunciar buenas noticias, especialmente el evangelio. “Anunciando las buenas nuevas” conserva el valor verbal y el matiz de noticia gozosa, evitando un tecnicismo eclesiástico excesivo. “Predicando” sería posible, pero “anunciando” refleja mejor el acto de comunicar la noticia.
- source_word: ἦσαν
  english_pob_choice: they were
  chosen_spanish: estaban
  alternatives_spanish:
  - continuaban
  - seguían
  lexicon: BDAG
  rationale: La construcción perifrástica εὐαγγελιζόμενοι ἦσαν expresa acción en desarrollo en pasado. En español, “estaban anunciando” transmite de forma natural ese aspecto progresivo.
translation_notes:
  revision_awareness: El texto griego es breve y no presenta variantes textuales relevantes en el paquete proporcionado. La versión española sigue de cerca la estructura perifrástica del original y el valor lexical de εὐαγγελιζόμενοι según el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene “buenas nuevas” para conservar la preferencia POB por el sentido léxico de εὐαγγελίζω.
  - Se evita “evangelio” en el texto principal para no cerrar la opción semántica que el propio audit trail inglés deja abierta.
  - La perífrasis “estaban anunciando” reproduce naturalmente el imperfecto perifrástico sin forzar un calco rígido.
