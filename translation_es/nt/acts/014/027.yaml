  glossary_alignment: 'Se alinea bien con la terminología del proyecto: ἐκκλησία como «iglesia», θεός como «Dios», ἔθνεσιν como «gentiles», πίστις como «fe». No hay conflicto con defaults mayores. La decisión teológica sobre μετ’ αὐτῶν está correctamente conservada en el texto principal.'
