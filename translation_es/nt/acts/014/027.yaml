translation:
  language: es
  text: Y cuando llegaron y reunieron a la iglesia, informaron todo lo que Dios había hecho con ellos[a], y que había abierto a los gentiles una puerta de fe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que Dios había hecho por medio de ellos». El griego dice más literalmente «con ellos».
    reason: lexical_alternative
  - marker: b
    text: O «había abierto a las naciones una puerta de fe».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  english_pob_choice: when they arrived
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - habiendo llegado
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa al verbo principal; «cuando llegaron» expresa bien la relación temporal en español sin volver la frase pesada.
- source_word: συναγαγόντες τὴν ἐκκλησίαν
  english_pob_choice: gathered the church together
  chosen_spanish: reunieron a la iglesia
  alternatives_spanish:
  - convocaron a la iglesia
  - juntaron a la iglesia
  lexicon: BDAG
  rationale: «Iglesia» comunica mejor que «congregación» la referencia de ἐκκλησία en Hechos. «Reunieron» mantiene la acción de convocar/agrupar sin añadir matices ajenos.
- source_word: ἀνήγγελλον
  english_pob_choice: they reported
  chosen_spanish: informaron
  alternatives_spanish:
  - relataron
  - anunciaron
  lexicon: BDAG
  rationale: El imperfecto describe el acto de ir comunicando a la comunidad lo sucedido; «informaron» es natural y conserva el tono de informe misionero.
- source_word: ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cuanto
  - todas las cosas que
  lexicon: BDAG
  rationale: «Todo lo que» es el equivalente idiomático más claro para introducir el contenido del informe.
- source_word: ἐποίησεν ὁ θεὸς μετ’ αὐτῶν
  english_pob_choice: God had done with them
  chosen_spanish: Dios había hecho con ellos
  alternatives_spanish:
  - Dios había hecho por medio de ellos
  - Dios había hecho entre ellos
  lexicon: BDAG
  rationale: Se conserva «con ellos» para reflejar la preposición μετά con genitivo y la decisión POB de no resolverla prematuramente como «por medio de». El español requiere el verbo «hacer» para sonar natural; el sentido de acción divina asociada con Pablo y Bernabé queda intacto.
- source_word: ἤνοιξεν
  english_pob_choice: he had opened
  chosen_spanish: había abierto
  alternatives_spanish:
  - abrió
  lexicon: BDAG
  rationale: El pluscuamperfecto español reproduce bien la retrospección del informe narrado sobre una acción divina completada.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En Hechos, ἔθνη suele marcar la inclusión de los no judíos; «gentiles» preserva mejor esa distinción teológica y narrativa.
- source_word: θύραν πίστεως
  english_pob_choice: a door of faith
  chosen_spanish: una puerta de fe
  alternatives_spanish:
  - una puerta para la fe
  - la puerta de la fe
  lexicon: BDAG
  rationale: Se mantiene la metáfora y la construcción genitiva sin explicitarla demasiado; «puerta de fe» sigue la decisión inglesa y sugiere una apertura al ámbito de la fe.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto no aparece la construcción debatida pistis-Christou; «fe» es la opción estándar y más clara en español.
theological_decisions:
- issue: Sentido de μετ’ αὐτῶν en la acción de Dios
  english_pob_reading: God had done with them
  chosen_spanish_reading: Dios había hecho con ellos
  alternative_spanish_readings:
  - Dios había hecho por medio de ellos
  - Dios había hecho entre ellos
  rationale: 'La traducción conserva la preposición relacional «con» para no convertir la frase en una afirmación instrumental más fuerte de la que el griego exige. Así se mantiene la tensión teológica: Dios es el agente principal y los misioneros participan de su obra.'
  doctrine_reference: Preservar la tensión del texto sin resolverla de manera excesiva.
- issue: Alcance de ἔθνεσιν
  english_pob_reading: to the Gentiles
  chosen_spanish_reading: a los gentiles
  alternative_spanish_readings:
  - a las naciones
  rationale: «Gentiles» comunica en Hechos la inclusión de los no judíos en el pueblo de Dios; «naciones» puede sonar más geopolítico y diluir la oposición narrativa judíos/gentiles.
  doctrine_reference: Hechos y la inclusión de los gentiles.
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del audit trail inglés y no requiere revisión adicional; se mantuvo la decisión de traducir μετ’ αὐτῶν con «con ellos» y ἔθνεσιν con «gentiles».
  spanish_consistency_notes:
  - Se usó «iglesia» para ἐκκλησία como término estable en Hechos, con nota alternativa para «asamblea».
  - 'Se mantuvo el orden natural del español sin perder la progresión verbal del griego: llegada, reunión, informe, apertura.'
  - «Puerta de fe» conserva la metáfora y evita explicar de más el genitivo.
  - No se empleó «Cristo» porque no aparece en el versículo.
  - Se evitó «SEÑOR» para θεός, siguiendo el término base «Dios».
