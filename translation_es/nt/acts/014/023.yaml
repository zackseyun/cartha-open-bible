base_translation:
  language: en
  yaml_path: translation/nt/acts/014/023.yaml
  text: And after appointing elders for them in every church[a], and praying with fasting, they entrusted them to the Lord[c][b], in whom they had believed.
  footnotes:
  - marker: a
    text: Or “after electing elders for them in each church.” The Greek verb can in some contexts carry the sense of choosing by vote or raised hands, though here it may simply mean appointing.
    reason: alternative_reading
  - marker: b
    text: Or “they entrusted them” may refer specifically to the newly appointed elders rather than to the believers as a whole.
    reason: alternative_reading
  - marker: c
    text: Or 'And after appointing elders for them in every church, and praying with fasting,'.
    reason: previous_rendering
