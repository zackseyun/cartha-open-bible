  rationale: Se añade la nota léxica importante sobre χειροτονήσαντες para conservar el rastro de auditoría del POB inglés. También se ordenan las notas para que cada una tenga su anclaje correspondiente en el texto revisado. El cuerpo del versículo solo requiere un ajuste menor de anotación; la redacción base es fiel y clara.
