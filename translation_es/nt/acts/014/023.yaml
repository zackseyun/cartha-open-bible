translation:
  language: es
  text: Y después de designar[a] ancianos para ellos en cada iglesia, y de orar con ayunos, los encomendaron al Señor[b], en quien habían creído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de elegir ancianos para ellos en cada iglesia». El verbo griego puede, en algunos contextos, dar la idea de escoger por votación o por manos alzadas, aunque aquí también puede significar simplemente designar.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los encomendaron» puede referirse específicamente a los recién designados ancianos, no solo a los creyentes en conjunto.'
    reason: alternative_reading
lexical_decisions:
- source_word: χειροτονήσαντες
  english_pob_choice: after appointing
  chosen_spanish: después de designar
  alternatives_spanish:
  - después de nombrar
  - después de elegir
  - después de escoger por votación
  lexicon: BDAG
  rationale: En este contexto eclesial, χειροτονήσαντες expresa la acción de establecer o designar líderes. «Designar» comunica la función sin importar un procedimiento específico de votación que el verso no explicita. «Nombrar» también sería posible, pero «designar» conserva mejor el matiz de asignación formal.
- source_word: κατ’ ἐκκλησίαν
  english_pob_choice: in every church
  chosen_spanish: en cada iglesia
  alternatives_spanish:
  - en toda iglesia
  - iglesia por iglesia
  - en cada congregación
  lexicon: BDAG
  rationale: El valor distributivo de κατά con singular indica reparto por comunidades locales. «En cada iglesia» es natural en español y preserva esa distribución sin forzar una formulación técnica.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - líderes ancianos
  lexicon: BDAG
  rationale: En español eclesial, «ancianos» comunica el cargo reconocible del contexto. «Presbíteros» es más técnico y menos transparente para lectura pública; «ancianos» mantiene la referencia institucional sin perder la base léxica.
- source_word: προσευξάμενοι
  english_pob_choice: praying
  chosen_spanish: de orar
  alternatives_spanish:
  - orando
  - después de orar
  lexicon: BDAG
  rationale: 'El participio aoristo acompaña la acción anterior y en español fluye bien como complemento de infinitivo dentro de la cadena narrativa: «y de orar». «Orando» también sería posible, pero aquí la forma infinitiva mantiene claridad junto con el participio principal anterior.'
- source_word: μετὰ νηστειῶν
  english_pob_choice: with fasting
  chosen_spanish: con ayunos
  alternatives_spanish:
  - con ayuno
  - acompañados de ayuno
  lexicon: BDAG
  rationale: El plural griego puede reflejar la práctica repetida del ayuno. «Con ayunos» conserva esa pluralidad formal y evita reducirlo a un solo ayuno puntual. En español suena un poco más marcado que «con ayuno», pero es fiel al número del original.
- source_word: παρέθεντο
  english_pob_choice: they entrusted
  chosen_spanish: los encomendaron
  alternatives_spanish:
  - los confiaron
  - los entregaron al cuidado de
  - los encomendaron al cuidado de
  lexicon: BDAG
  rationale: El verbo implica poner a alguien bajo el cuidado de otro. «Encomendar» es una opción española natural y digna que conserva la idea de depositar en manos del Señor; además permite la construcción tradicional «encomendar al Señor» sin forzar una lectura devocional ajena al contexto.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - al Dueño
  lexicon: BDAG
  rationale: κύριος aquí designa al Señor a quien se confía a los creyentes. En este pasaje el referente se entiende cristológicamente por el contexto inmediato y la cláusula relativa posterior. «Señor» es la equivalencia española natural en esta construcción dativa de encomienda.
- source_word: εἰς ὃν πεπιστεύκεισαν
  english_pob_choice: in whom they had believed
  chosen_spanish: en quien habían creído
  alternatives_spanish:
  - en el cual habían creído
  - en quien habían puesto su fe
  lexicon: BDAG
  rationale: La preposición εἰς con πιστεύω se vierte de forma idiomática con «creer en». El pluscuamperfecto «habían creído» refleja la acción previa y establecida. «Poner su fe» sería explicativo, pero menos directo que el griego.
theological_decisions:
- issue: Sentido de χειροτονήσαντες y el modelo de nombramiento de líderes
  english_pob_reading: appointing elders
  chosen_spanish_reading: designar ancianos
  alternative_spanish_readings:
  - elegir ancianos por votación
  - nombrar ancianos
  rationale: 'El griego admite una asociación histórica con elección por mano alzada, pero el verso no especifica ese mecanismo. «Designar» preserva la tensión: hubo selección formal de líderes, sin imponer una forma de gobierno congregacional o jerárquica que el texto no declara.'
  doctrine_reference: 'Principio POB: conservar la tensión teológica y no resolver distintivos denominacionales sin apoyo inequívoco del griego.'
- issue: Referente de los pronombres en παρέθεντο αὐτοὺς τῷ κυρίῳ
  english_pob_reading: the believers/congregations were entrusted to the Lord
  chosen_spanish_reading: los encomendaron al Señor
  alternative_spanish_readings:
  - encomendaron a los ancianos al Señor
  - los encomendaron, es decir, a los creyentes, al Señor
  rationale: El contexto de Hechos 14 trata de fortalecer a los discípulos y establecer ancianos para las iglesias, por lo que el pronombre puede referirse a la comunidad creyente en conjunto. La formulación española conserva la ambigüedad sin decidir de forma excesiva entre la congregación y los ancianos.
  doctrine_reference: 'Principio POB: mantener una ambigüedad razonable cuando el antecedente del pronombre sigue siendo discutible.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la decisión inglesa más reciente de coordinar con claridad los participios: primero designar ancianos, luego orar con ayunos, y finalmente encomendar a los creyentes al Señor. Se evita traducir mecánicamente desde el inglés cuando el español requiere una sintaxis más natural, pero se conservan las tensiones documentadas sobre χειροτονήσαντες y el referente de αὐτούς.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al contexto de encomienda; no se sustituye por una forma más teológica o litúrgica sin base inmediata.
  - «Ancianos» conserva la función eclesial del término πρεσβύτεροι y es más transparente para el lector general que «presbíteros».
  - La cláusula final permanece en voz ambigua y no se desambigua por completo, en línea con el audit trail en inglés.
  - Se usa «ayunos» en plural para reflejar νηστειῶν y no reducir el número del original.
