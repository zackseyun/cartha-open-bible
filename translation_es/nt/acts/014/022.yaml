review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura participial y el sentido general del griego: «fortaleciendo… animándolos… y diciendo que…». Conserva adecuadamente «las almas», «los discípulos», «la fe» y «el reino de Dios». Sin embargo, las notas al pie están desalineadas con sus anclas y con el contenido documentado en la auditoría inglesa: la nota [a] está puesta sobre «discípulos» pero habla de «tribulaciones»; la nota [b] repite la lectura principal en vez de ofrecer la alternativa «fe» sin artículo; y la nota [c] está anclada al final pero comenta «entrar en», que además ya aparece en el texto. Esto requiere corrección editorial para que las alternativas correspondan al lugar correcto y preserven la racionalidad léxica documentada.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Fortaleciendo las almas de los discípulos» suena bíblico y comprensible; «animándolos a permanecer en la fe» es idiomático; «por muchas aflicciones» es aceptable y fiel. La principal deficiencia no es de estilo sino de aparato crítico: las notas inducen confusión. Conviene también anclar la nota sobre «fe» directamente en «la fe» y la de «tribulaciones» en «aflicciones».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios», «reino de Dios», «fe» y «almas» concuerdan con las decisiones POB. No aparece vocabulario sensible como Yahvé/Mesías/esclavo. La decisión «la fe» sigue correctamente la lectura con artículo; la alternativa debe conservarse en nota como «fe» a secas.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «discípulos» pero su contenido corresponde a «aflicciones/tribulaciones».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el lector entiende erróneamente que «discípulos» tiene como alternativa «por muchas tribulaciones».
  - severity: high
    issue: La nota [b] no ofrece una alternativa real al texto principal.
    rationale: El texto principal dice «la fe», pero la nota repite «permanecer en la fe» y luego explica el valor del artículo. Según la auditoría inglesa, la alternativa relevante es «permanecer en fe» o simplemente «permanecer en fe», sin artículo.
  - severity: medium
    issue: La nota [c] comenta «entrar en», pero el texto ya usa «entrar en el reino de Dios» y la ancla está al final de la oración.
    rationale: La nota inglesa [c] era heredada de una formulación previa («enter into») y ya no aporta una alternativa útil en esta redacción española. Mantenerla produce ruido editorial.
  revised_spanish_text: fortaleciendo las almas de los discípulos, animándolos a permanecer en la fe[a], y diciendo que por muchas aflicciones[b] debemos entrar en el reino de Dios.
  revised_footnotes:
  - marker: a
    text: O «permanecer en fe». El griego también puede leerse de manera más general, aunque el artículo favorece «la fe».
    reason: lexical_alternative
  - marker: b
    text: O «por muchas tribulaciones».
    reason: lexical_alternative
  revision_rationale: Se corrigen exclusivamente las notas al pie y sus anclas para que coincidan con el griego, la auditoría inglesa y el texto español final. Se elimina la nota heredada sobre «entrar en», que ya no representa una alternativa significativa en español, y se reubica la nota de «tribulaciones» sobre «aflicciones».
