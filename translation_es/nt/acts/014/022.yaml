translation:
  language: es
  text: fortaleciendo las almas de los discípulos, animándolos a permanecer en la fe[a], y diciendo que por muchas aflicciones[b] debemos entrar en el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanecer en fe». El griego también puede leerse de manera más general, aunque el artículo favorece «la fe».
    reason: lexical_alternative
  - marker: b
    text: O «por muchas tribulaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστηρίζοντες
  english_pob_choice: strengthening
  chosen_spanish: fortaleciendo
  alternatives_spanish:
  - fortaleciendo firmemente
  - confirmando
  - afirmando
  lexicon: BDAG
  rationale: El participio presente expresa una acción continua de Pablo y Bernabé. «Fortaleciendo» es natural en español y conserva la idea de hacer firmes a los discípulos sin forzar un matiz técnico de institución o establecimiento.
- source_word: ψυχὰς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - seres interiores
  lexicon: BDAG
  rationale: ψυχή aquí apunta a la vida interior o persona de los discípulos. «Almas» conserva el peso léxico y espiritual del término sin imponer una lectura dualista excesiva.
- source_word: μαθητῶν
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  - seguidores
  lexicon: BDAG
  rationale: Es el término normal del NT para los seguidores comprometidos de Jesús; «discípulos» es preciso y plenamente inteligible en español.
- source_word: παρακαλοῦντες
  english_pob_choice: encouraging
  chosen_spanish: animándolos
  alternatives_spanish:
  - exhortándolos
  - alentándolos
  - animando
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar aliento, exhortación y consuelo. En este contexto, junto con el infinitivo «permanecer» y la referencia a las aflicciones, «animándolos» comunica una exhortación de apoyo con buena naturalidad en español.
- source_word: ἐμμένειν
  english_pob_choice: to remain
  chosen_spanish: permanecer
  alternatives_spanish:
  - continuar
  - persistir
  lexicon: BDAG
  rationale: El verbo significa continuar en, mantenerse en, permanecer en. «Permanecer» funciona bien con el dativo implícito de la fe y expresa estabilidad y constancia.
- source_word: πίστει
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fe
  - la confianza
  lexicon: BDAG
  rationale: 'El artículo favorece un sentido definido: la fe cristiana como contenido y camino compartido. «La fe» preserva ese matiz sin sobreexplicar.'
- source_word: διὰ πολλῶν θλίψεων
  english_pob_choice: through many afflictions
  chosen_spanish: por muchas aflicciones
  alternatives_spanish:
  - a través de muchas tribulaciones
  - mediante muchas tribulaciones
  - por muchas tribulaciones
  lexicon: BDAG
  rationale: θλῖψις denota presión, angustia o tribulación. «Aflicciones» transmite sufrimiento real en español y evita un arcaísmo innecesario; la preposición «por» comunica el medio o camino por el que se entra.
- source_word: δεῖ
  english_pob_choice: we must
  chosen_spanish: debemos
  alternatives_spanish:
  - es necesario que debamos
  - tenemos que
  lexicon: BDAG
  rationale: La necesidad impersonal se expresa de forma idiomática con «debemos». Conserva la fuerza de obligación sin añadir un sujeto explícito ajeno al griego.
- source_word: εἰσελθεῖν
  english_pob_choice: enter
  chosen_spanish: entrar
  alternatives_spanish:
  - entrar en
  - ingresar
  lexicon: BDAG
  rationale: El aoristo infinitivo expresa entrada hacia el reino. «Entrar» es directo y fiel; en español no requiere repetir «en» para mantener la naturalidad de la frase.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - la realeza de Dios
  - el gobierno de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la forma bíblica estándar y preserva tanto la imagen concreta como la dimensión de reinado. No se sustituye por expresiones más interpretativas.
theological_decisions:
- issue: Sentido de τῇ πίστει con artículo
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - fe
  rationale: El artículo sugiere un referente definido, probablemente la fe cristiana como ámbito compartido de permanencia. «La fe» conserva esa lectura comunitaria sin convertirla en terminología técnica adicional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for πίστις'
- issue: Fuerza de δεῖ en la frase final
  english_pob_reading: we must enter the kingdom of God through many afflictions
  chosen_spanish_reading: debemos entrar en el reino de Dios por muchas aflicciones
  alternative_spanish_readings:
  - es necesario que entremos en el reino de Dios por muchas aflicciones
  rationale: El texto expresa necesidad, no explica su mecanismo metafísico. «Debemos» preserva la obligación/necesidad sin ampliar doctrinalmente el pasaje sobre predestinación, mérito o el origen de las aflicciones.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy #3'
- issue: Valor de θλίψεων
  english_pob_reading: afflictions
  chosen_spanish_reading: aflicciones
  alternative_spanish_readings:
  - tribulaciones
  - angustias
  rationale: «Aflicciones» mantiene el sentido de presión o sufrimiento grave que la POB documenta para θλῖψις. No se suaviza el término ni se cambia a una formulación más interpretativa.
  doctrine_reference: BDAG; English POB lexical note on θλίψις
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés que añadió «saying» para reflejar ὅτι; por eso la cláusula final en español se expresa con «y diciendo que». También se respetó la revisión que volvió idiomático «enter» sin añadir una redundancia innecesaria, por lo que se usa simplemente «entrar».
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» como fórmula estable y no se sustituye por «gobierno» o «realeza» en el texto principal.
  - «La fe» conserva el artículo del griego y la decisión inglesa «the faith».
  - «Aflicciones» sigue la elección lexical de θλῖψις y evita rebajar el sufrimiento a simple dificultad.
  - El sujeto implícito de δεῖ se conserva en primera persona plural mediante «debemos», en paralelo con el inglés POB.
