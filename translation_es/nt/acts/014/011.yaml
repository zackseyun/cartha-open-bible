translation:
  language: es
  text: 'Y cuando las multitudes vieron lo que Pablo había hecho, alzaron la voz, diciendo en lengua licaónica[a]: «Los dioses, hechos semejantes a hombres[b], han bajado a nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «en licaónico».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo sido hechos semejantes a hombres»; el griego dice literalmente «habiendo sido hechos semejantes a hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε ὄχλοι
  english_pob_choice: And when the crowds
  chosen_spanish: Y cuando las multitudes
  alternatives_spanish:
  - Entonces las multitudes
  - Y las multitudes
  lexicon: BDAG
  rationale: ὄχλοι es plural y el participio temporal introduce la circunstancia de la acción principal. «Y cuando» conserva la continuidad discursiva marcada por οἵ τε y expresa naturalmente la secuencia narrativa en español.
- source_word: ἰδόντες
  english_pob_choice: when ... saw
  chosen_spanish: vieron
  alternatives_spanish:
  - habiendo visto
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí temporalmente. En español, «cuando vieron» queda implícito en la estructura completa y evita una traducción pesada sin perder la relación temporal.
- source_word: ὃ ἐποίησεν Παῦλος
  english_pob_choice: what Paul had done
  chosen_spanish: lo que Pablo había hecho
  alternatives_spanish:
  - lo que Pablo hizo
  lexicon: BDAG
  rationale: El relativo refiere a la acción milagrosa recién narrada. El pluscuamperfecto español ayuda a reflejar la anterioridad narrativa que la POB inglesa también marcó.
- source_word: ἐπῆραν τὴν φωνὴν αὐτῶν
  english_pob_choice: they raised their voices
  chosen_spanish: alzaron la voz
  alternatives_spanish:
  - levantaron la voz
  - gritaron
  lexicon: BDAG
  rationale: Es un modismo para hablar a viva voz. «Alzaron la voz» conserva la imagen sin volverlo demasiado interpretativo como «gritaron».
- source_word: Λυκαονιστί
  english_pob_choice: in the Lycaonian language
  chosen_spanish: en lengua licaónica
  alternatives_spanish:
  - en licaónico
  lexicon: BDAG
  rationale: La expansión «en lengua» explicita el adverbio de idioma para el lector moderno. «Licaónica» sigue el nombre propio del idioma y mantiene el registro bíblico.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  - clamando
  lexicon: BDAG
  rationale: Participio introductorio de habla; «diciendo» es la opción menos interpretativa y la más natural en español.
- source_word: Οἱ θεοὶ
  english_pob_choice: The gods
  chosen_spanish: Los dioses
  alternatives_spanish:
  - Los dioses paganos
  lexicon: BDAG
  rationale: Se trata claramente de deidades paganas en la exclamación de la multitud. «Dioses» reproduce el plural griego sin añadir explicaciones que el texto no da.
- source_word: ὁμοιωθέντες ἀνθρώποις
  english_pob_choice: having become like men
  chosen_spanish: habiéndose hecho semejantes a los hombres
  alternatives_spanish:
  - hechos semejantes a los hombres
  - habiendo sido hechos semejantes a los hombres
  - en semejanza de hombres
  lexicon: BDAG
  rationale: El participio aoristo pasivo de ὁμοιόω expresa semejanza/ser hecho semejante. «Habiéndose hecho semejantes» preserva la tensión semántica sin convertirla en lenguaje encarnacional cristiano.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Aunque el griego usa masculino plural, en esta contraposición con dioses funciona como referencia general a la humanidad. «Los hombres» mantiene el giro tradicional y la forma del contraste.
- source_word: κατέβησαν πρὸς ἡμᾶς
  english_pob_choice: have come down to us
  chosen_spanish: han descendido hasta nosotros
  alternatives_spanish:
  - han bajado hasta nosotros
  - han venido a nosotros
  lexicon: BDAG
  rationale: καταβαίνω significa descender/venir abajo. «Han descendido» conserva el valor léxico; «hasta nosotros» refleja πρὸς ἡμᾶς como dirección hacia los oyentes, con un tono más solemne que «a nosotros».
theological_decisions:
- issue: Preservar el error pagano de la multitud sin suavizarlo con formulaciones cristológicas
  english_pob_reading: The gods, having become like men, have come down to us!
  chosen_spanish_reading: Los dioses, habiéndose hecho semejantes a los hombres, han descendido hasta nosotros
  alternative_spanish_readings:
  - Los dioses, hechos semejantes a los hombres, han descendido hasta nosotros
  - Los dioses han descendido hasta nosotros en semejanza de hombres
  rationale: El versículo reporta la interpretación equivocada de la multitud de Listra. La traducción debe conservar esa afirmación como discurso pagano, sin usar vocabulario que sugiera encarnación doctrinal cristiana más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica del relato; no introducir categorías cristológicas ajenas al habla de la multitud.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde una formulación más literal «in the likeness of men» a «having become like men» para reflejar más directamente ὁμοιωθέντες. En español, se optó por «habiéndose hecho semejantes a los hombres» para conservar esa literalidad revisada y, a la vez, mantener distancia respecto de lenguaje doctrinal cristiano.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó «dioses» en plural para θεοὶ, sin singularizar ni reinterpretar.
  - Se eligió «hombres» para ἀνθρώποις por correspondencia formal con la exclamación, aunque «seres humanos» sería una alternativa inclusiva más explicativa.
  - Se evitó «Cristo» o lenguaje de encarnación, dado que el texto cita la interpretación errónea de la multitud.
  - La puntuación con comillas latinas y coma antes del discurso directo sigue el estilo bíblico español moderno.
