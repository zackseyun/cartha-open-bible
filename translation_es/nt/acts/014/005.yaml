translation:
  language: es
  text: Y cuando se hizo un intento[a] por parte de los gentiles y de los judíos[b], junto con sus gobernantes, de maltratarlos y apedrearlos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘una arremetida’ o ‘un asalto’. El griego ὁρμή puede denotar un movimiento violento o un embate; aquí se elige ‘intento’ porque las acciones hostiles se expresan como actos proyectados (‘maltratarlos’ y ‘apedrearlos’), no como hechos ya consumados.
    reason: lexical_alternative
  - marker: b
    text: O ‘los judeanos’ en algunos contextos. Aquí probablemente se refiere a opositores judíos como grupo, y no específicamente a personas de Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Pero cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: En español, 'Y cuando' conserva la continuidad narrativa de δέ sin forzar un contraste que el griego no exige.
- source_word: ἐγένετο
  english_pob_choice: was made
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - surgió
  - aconteció
  lexicon: BDAG
  rationale: Con ὁρμή como sujeto, γίνομαι expresa que el impulso/ataque llegó a existir; 'hubo' funciona naturalmente en español para introducir que se presentó un intento hostil.
- source_word: ὁρμή
  english_pob_choice: attempt
  chosen_spanish: intento
  alternatives_spanish:
  - arremetida
  - asalto
  - ímpetu
  - ataque
  lexicon: BDAG
  rationale: '''Intento'' preserva la idea de una acción hostil iniciada pero no necesariamente consumada, en línea con el griego y con la elección inglesa de no implicar que el daño ya se había completado.'
- source_word: τῶν ἐθνῶν τε καὶ Ἰουδαίων
  english_pob_choice: the Gentiles and the Jews
  chosen_spanish: tanto los gentiles como los judíos
  alternatives_spanish:
  - los gentiles y los judíos
  - las naciones y los judíos
  lexicon: BDAG
  rationale: '''Gentiles'' se mantiene como término técnico bíblico y ''tanto... como...'' refleja el valor correlativo de τε καί, dejando claro que ambos grupos participaron conjuntamente.'
- source_word: σὺν τοῖς ἄρχουσιν αὐτῶν
  english_pob_choice: together with their rulers
  chosen_spanish: junto con sus gobernantes
  alternatives_spanish:
  - con sus líderes
  - junto a sus autoridades
  lexicon: BDAG
  rationale: '''Gobernantes'' transmite el sentido formal de ἄρχοντες como autoridades dirigentes; ''junto con'' reproduce adecuadamente σύν.'
- source_word: ὑβρίσαι
  english_pob_choice: to mistreat
  chosen_spanish: maltratarlos
  alternatives_spanish:
  - abusarlos
  - insultarlos
  - vejarlos
  lexicon: BDAG
  rationale: '''Maltratar'' cubre abuso verbal o físico sin estrechar indebidamente ὑβρίζω a solo insulto; el enclítico ''-los'' da fluidez al infinitivo en español.'
- source_word: καὶ λιθοβολῆσαι
  english_pob_choice: and to stone
  chosen_spanish: y apedrearlos
  alternatives_spanish:
  - y lapidarlos
  - y matarlos a pedradas
  lexicon: BDAG
  rationale: '''Apedrear'' es el verbo bíblico natural en español para λιθοβολέω; se evita añadir ''hasta la muerte'' porque el verbo no lo dice explícitamente.'
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: BDAG
  rationale: El pronombre se integra en español mediante el clítico de objeto directo 'los', referido a Pablo y Bernabé según el contexto inmediato.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantiene la misma lectura y no introduce cambios; el español sigue esa estabilidad textual y lexical sin necesidad de ajustar el sentido principal.
  spanish_consistency_notes:
  - Se preserva el valor correlativo de τε καί con ‘tanto... como...’.
  - Se mantiene la tensión semántica de ὁρμή como intento/inicio hostil, sin convertirla en agresión consumada.
  - ‘Gentiles’ se traduce como ‘gentiles’ en sentido bíblico, no como ‘naciones’.
  - Se usa ‘gobernantes’ para ἄρχοντες por su tono formal y eclesiásticamente legible.
