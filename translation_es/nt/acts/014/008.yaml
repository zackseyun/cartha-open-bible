revisions:
- from: Y en Listra un hombre estaba sentado[a], sin fuerzas en los pies, cojo desde el vientre de su madre, que nunca había andado.
  to: Y en Listra cierto hombre estaba sentado[a], sin fuerzas en los pies, cojo desde el vientre de su madre, que nunca había andado.
  rationale: Se ajusta τις ἀνὴρ a 'cierto hombre' para conservar mejor la especificidad narrativa indefinida del griego sin sonar demasiado forzado en español. Se corrige la nota [a] para que presente una alternativa real y mantenga la observación léxica del English POB. El resto del versículo puede mantenerse porque representa fielmente el texto fuente y lee con naturalidad en español.
