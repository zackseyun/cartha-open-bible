translation:
  language: es
  text: Y en Listra cierto hombre estaba sentado[a], sin fuerzas en los pies, cojo desde el vientre de su madre, que nunca había andado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sin fuerza en los pies'. El griego enfatiza la falta de fuerza antes de decir explícitamente que era cojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y así
  lexicon: BDAG
  rationale: Se conserva la simple continuidad narrativa del griego; en español, ‘Y’ introduce con naturalidad la escena siguiente sin añadir matiz interpretativo.
- source_word: τις ἀνὴρ
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - un hombre en particular
  - un hombre conocido
  lexicon: BDAG
  rationale: El griego presenta a un individuo indefinido pero narrativamente concreto. En español, ‘un hombre’ comunica esa indefinición; ‘un cierto hombre’ suena menos natural y puede endurecer el estilo.
- source_word: ἀδύνατος ... τοῖς ποσίν
  english_pob_choice: powerless in his feet
  chosen_spanish: sin fuerzas en los pies
  alternatives_spanish:
  - sin poder en los pies
  - sin fuerza en los pies
  - impotente en los pies
  lexicon: BDAG
  rationale: Se preserva el valor básico de ἀδύνατος como falta de fuerza/poder, antes de la precisión posterior χωλός. ‘Sin fuerzas en los pies’ expresa la debilidad física sin fundirse por completo con ‘cojo’.
- source_word: ἐν Λύστροις
  english_pob_choice: in Lystra
  chosen_spanish: en Listra
  lexicon: BDAG
  rationale: Se usa la forma española habitual del topónimo, manteniendo el referente geográfico del texto.
- source_word: ἐκάθητο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba sentado allí
  lexicon: BDAG
  rationale: El imperfecto describe una acción/estado en curso en el trasfondo narrativo. ‘Estaba sentado’ reproduce bien ese aspecto en español.
- source_word: χωλός
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - lame
  - lisiado
  lexicon: BDAG
  rationale: ‘Cojo’ es una equivalencia directa y natural en español para la incapacidad de caminar normalmente. Aunque ‘lame’ es posible, aquí ‘cojo’ resulta más idiomático para un registro bíblico moderno.
- source_word: ἐκ κοιλίας μητρὸς αὐτοῦ
  english_pob_choice: from his mother's womb
  chosen_spanish: desde el vientre de su madre
  alternatives_spanish:
  - desde el seno de su madre
  - desde el vientre materno
  - desde que nació
  lexicon: BDAG
  rationale: Se mantiene la imagen idiomática del origen congénito. ‘Desde el vientre de su madre’ conserva el color del griego y es claro en español.
- source_word: οὐδέποτε περιεπάτησεν
  english_pob_choice: had never walked
  chosen_spanish: nunca había andado
  alternatives_spanish:
  - nunca caminó
  - jamás había caminado
  lexicon: BDAG
  rationale: El pluscuamperfecto en español expresa bien la condición anterior y continua hasta el momento del relato. ‘Andar’ es una opción natural y bíblica para ‘walk’.
translation_notes:
  revision_awareness: 'La versión española sigue el último estado revisado del texto inglés, que eliminó ‘there’ por no estar en el griego. Por eso la traducción no añade un equivalente espacial innecesario y conserva la progresión: ‘estaba sentado’, ‘sin fuerzas en los pies’, ‘cojo’, ‘desde el vientre de su madre’, ‘nunca había andado’.'
  spanish_consistency_notes:
  - Se mantiene ‘Listra’ como topónimo español estándar.
  - Se conserva la distinción entre la falta de fuerzas inicial (ἀδύνατος) y la calificación posterior (χωλός).
  - Se evita ‘SEÑOR’ u otra equivalencia teológica ajena, porque no aparece en este versículo.
  - El tiempo verbal ‘estaba sentado’ reproduce el imperfecto narrativo sin forzar una traducción más rígida.
