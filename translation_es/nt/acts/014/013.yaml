    text: Literalmente, 'el Zeus que estaba delante de la ciudad'; el sentido probablemente es 'el templo' o 'santuario de Zeus' que estaba fuera de la ciudad.
    reason: alternative_reading
  - marker: b
    text: O 'coronas' para 'guirnaldas'.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de las notas para que correspondan a las palabras pertinentes; se cambió 'coronas' por 'guirnaldas' como equivalente más preciso de στέμματα en contexto ritual, conservando la alternativa en nota; se ajustó 'con la multitud' a 'con las multitudes' para reflejar el plural griego ὄχλοις; y se sustituyó 'habiendo traído' por 'llevó' para un español más natural sin alterar el sentido narrativo.
