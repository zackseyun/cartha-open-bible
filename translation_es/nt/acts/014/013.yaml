translation:
  language: es
  text: Y el sacerdote de Zeus, cuyo templo estaba delante de la ciudad[a], llevó toros y guirnaldas[b] a las puertas, y quería ofrecer sacrificio con las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el Zeus que estaba delante de la ciudad'; el sentido probablemente es 'el templo' o 'santuario de Zeus' que estaba fuera de la ciudad.
    reason: alternative_reading
  - marker: b
    text: O 'coronas' para 'guirnaldas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅ τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La combinación relativa con τε funciona aquí de manera narrativa para continuar la escena. En español, una simple 'Y' mantiene la fluidez sin sobrecargar la conexión.
- source_word: ἱερεὺς τοῦ Διὸς
  english_pob_choice: the priest of Zeus
  chosen_spanish: el sacerdote de Zeus
  alternatives_spanish:
  - el sacerdote de Júpiter
  lexicon: BDAG
  rationale: El texto griego nombra a Ζεύς; por fidelidad al original se conserva 'Zeus' y no se sustituye por el equivalente romano 'Júpiter'.
- source_word: τοῦ ὄντος πρὸ τῆς πόλεως
  english_pob_choice: whose temple was before the city
  chosen_spanish: cuyo templo estaba delante de la ciudad
  alternatives_spanish:
  - que estaba delante de la ciudad
  - cuyo santuario estaba fuera de la ciudad
  lexicon: BDAG
  rationale: La frase genitiva participial alude naturalmente al santuario/templo asociado con Zeus, situado antes o fuera de la ciudad. En español conviene explicitar 'templo' para hacer claro el referente implícito, manteniendo la tensión semántica de 'delante de / fuera de'.
- source_word: ταύρους
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - toros sacrificables
  lexicon: BDAG
  rationale: ταῦρος designa un toro; 'toros' es directo y natural en este contexto sacrificial.
- source_word: στέμματα
  english_pob_choice: wreaths
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas
  - coronas rituales
  lexicon: BDAG
  rationale: στέμματα puede referirse a coronas o guirnaldas usadas en procesiones rituales. 'Coronas' es una opción breve y comprensible en español; la alternativa 'guirnaldas' queda implícita en el rango léxico.
- source_word: ἐπὶ τοὺς πυλῶνας
  english_pob_choice: to the gates
  chosen_spanish: a las puertas
  alternatives_spanish:
  - a las entradas
  - a los portones
  lexicon: BDAG
  rationale: πυλών significa puerta o portal. En español plural, 'a las puertas' comunica bien la imagen de acceso al recinto y encaja con el movimiento del participio.
- source_word: ἐνέγκας
  english_pob_choice: brought
  chosen_spanish: habiendo traído
  alternatives_spanish:
  - trayendo
  - tras traer
  lexicon: BDAG
  rationale: El participio aoristo puede expresarse en español con una construcción de anterioridad. 'Habiendo traído' preserva mejor el orden de acciones que un simple pretérito.
- source_word: σὺν τοῖς ὄχλοις
  english_pob_choice: with the crowds
  chosen_spanish: con la multitud
  alternatives_spanish:
  - con las multitudes
  - junto con la multitud
  lexicon: BDAG
  rationale: Aunque ὄχλοις es plural, en español 'la multitud' expresa de forma natural el conjunto de gente reunida; 'con las multitudes' suena menos idiomático en este contexto narrativo.
- source_word: ἤθελεν θύειν
  english_pob_choice: wanted to offer sacrifice
  chosen_spanish: quería ofrecer sacrificio
  alternatives_spanish:
  - pretendía sacrificar
  - quería sacrificar
  lexicon: BDAG
  rationale: θέλω + infinitivo expresa deseo o intención. θύω aquí tiene el sentido cultual de ofrecer sacrificio; 'ofrecer sacrificio' preserva ese valor religioso sin reducirlo a un simple 'sacrificar'.
theological_decisions:
- issue: Referente implícito en τοῦ ὄντος πρὸ τῆς πόλεως
  english_pob_reading: The phrase refers to the temple/shrine of Zeus located before or outside the city, rendered 'whose temple was before the city.'
  chosen_spanish_reading: La frase se entiende como referencia al templo/santuario de Zeus situado delante o fuera de la ciudad, por eso se explicita 'cuyo templo'.
  alternative_spanish_readings:
  - '''el Zeus que estaba delante de la ciudad'''
  - '''cuyo santuario estaba fuera de la ciudad'''
  rationale: El contexto narrativo trata de un sacerdote preparando un sacrificio; en el uso antiguo es normal identificar a la deidad por la ubicación de su santuario. El español necesita un referente explícito para evitar ambigüedad, sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final reportó alta concordancia con observaciones menores; por eso se mantiene una solución estable que explicita el templo/santuario implícito sin alterar el sentido del griego.
  spanish_consistency_notes:
  - Se conserva 'Zeus' para respetar la especificidad del nombre divino griego.
  - '''Toros'' y ''coronas'' mantienen el tono sacrificial y procesional del pasaje.'
  - '''Ofrecer sacrificio'' preserva el valor cultual de θύειν sin eufemizarlo.'
  - La ambigüedad de πρὸ τῆς πόλεως queda señalada en la nota, como en el audit trail inglés.
