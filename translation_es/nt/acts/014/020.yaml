translation:
  language: es
  text: Pero, después de que los discípulos lo rodearon[a], se levantó[b] y entró en la ciudad. Al día siguiente salió con Bernabé hacia Derbe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo cercaron» o «lo circundaron».
    reason: lexical_alternative
  - marker: b
    text: O «se alzó». El griego también puede traducirse así, pero aquí probablemente se refiere a que Pablo se puso en pie físicamente, no a una resurrección explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: κυκλωσάντων
  english_pob_choice: had gathered around
  chosen_spanish: lo rodearon
  alternatives_spanish:
  - se agruparon a su alrededor
  - lo circundaron
  - lo rodearon de cerca
  lexicon: BDAG
  rationale: El participio aoristo de κυκλόω indica la acción de rodear o formar un círculo alrededor de alguien. En español, «lo rodearon» comunica esa imagen con naturalidad y conserva la fuerza espacial del verbo sin añadir una nota hostil que no exige el contexto inmediato.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce aquí una transición narrativa con leve contraste respecto del versículo anterior. «Pero» funciona bien en español para marcar el giro inesperado sin exagerarlo.
- source_word: τῶν μαθητῶν
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  lexicon: BDAG
  rationale: μαθητής se traduce de manera estable como «discípulo» en Hechos. Mantener ese término preserva la consistencia terminológica del libro.
- source_word: ἀναστὰς
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  - se levantó de nuevo
  lexicon: BDAG
  rationale: El participio de ἀνίστημι describe aquí una acción física posterior al episodio previo. «Se levantó» es natural en español y evita sugerir por sí solo una resurrección o una elevación milagrosa que el griego no expresa explícitamente en este versículo.
- source_word: εἰσῆλθεν εἰς τὴν πόλιν
  english_pob_choice: went into the city
  chosen_spanish: entró en la ciudad
  alternatives_spanish:
  - fue a la ciudad
  - se dirigió a la ciudad
  lexicon: BDAG
  rationale: εἰσέρχομαι con εἰς se puede traducir como «entró en». En español esta opción es precisa y fluida; conserva el movimiento hacia dentro de la ciudad sin perder claridad narrativa.
- source_word: τῇ ἐπαύριον
  english_pob_choice: on the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al siguiente día
  lexicon: BDAG
  rationale: La expresión temporal dativa significa «al día siguiente». La forma elegida es idiomática y clara en español contemporáneo.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  - salió de allí
  lexicon: BDAG
  rationale: ἐξέρχομαι significa literalmente «salir». «Salió» preserva el valor direccional del verbo sin recargar la frase.
- source_word: σὺν τῷ Βαρναβᾷ
  english_pob_choice: with Barnabas
  chosen_spanish: con Bernabé
  alternatives_spanish:
  - junto con Bernabé
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento. «Con Bernabé» es la forma más natural y concisa en español. Se usa la transliteración habitual «Bernabé» para el nombre propio.
- source_word: Δέρβην
  english_pob_choice: Derbe
  chosen_spanish: Derbe
  alternatives_spanish:
  - Dérbe
  lexicon: BDAG
  rationale: Nombre propio geográfico transliterado de manera estándar. Se conserva sin adaptación adicional.
theological_decisions:
- issue: Si ἀναστὰς debe sonar a resurrección, reanimación o simple acción física
  english_pob_reading: 'Rendered as a straightforward physical action: ''he got up'''
  chosen_spanish_reading: se levantó como acción física ordinaria
  alternative_spanish_readings:
  - resucitó
  - se alzó
  - fue levantado
  rationale: El contexto inmediato recuerda que Pablo había sido apedreado, pero el participio ἀναστὰς por sí solo no afirma resurrección. La traducción mantiene la tensión narrativa sin añadir una afirmación doctrinal que el texto no formula aquí.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el auditor inglés. Se mantuvo la lectura sobria de ἀναστὰς como acción física y se optó por un español natural que preserve el orden narrativo del griego sin añadir matices no señalados por el texto.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί, en coherencia con Hechos.
  - Se usa «Bernabé» para el nombre propio Βαρναβᾶς, conforme al uso español habitual.
  - Se conserva «Derbe» como transliteración geográfica estándar.
  - La expresión verbal «se levantó» evita sobrecargar el versículo con una lectura de resurrección no explícita.
