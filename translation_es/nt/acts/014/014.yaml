translation:
  language: es
  text: Pero cuando los apóstoles Bernabé y Pablo lo oyeron, rasgaron sus vestidos[a] y se lanzaron al gentío, clamando[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rasgar los vestidos era una señal acostumbrada de dolor, horror o protesta contra un honor blasfemo.
    reason: cultural_note
  - marker: b
    text: O «irrumpieron en medio del gentío».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... lo oyeron
  alternatives_spanish:
  - al oír
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo expresa antecedencia temporal. «Cuando ... lo oyeron» mantiene la relación temporal de manera natural en español sin volver pesada la frase.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca transición y contraste suave con la reacción de la multitud; «Pero» conserva ese giro discursivo en un español bíblico claro.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los mensajeros
  lexicon: BDAG
  rationale: En Hechos, ἀπόστολοι funciona como designación ministerial. «Apóstoles» preserva el término técnico sin explicarlo en exceso.
- source_word: Βαρναβᾶς καὶ Παῦλος
  english_pob_choice: Barnabas and Paul
  chosen_spanish: Bernabé y Pablo
  alternatives_spanish:
  - Barnabás y Pablo
  lexicon: Nombres propios
  rationale: 'Se usa la forma usual en español bíblico para el nombre de Barnabas: «Bernabé». Mantiene inteligibilidad y uso eclesial amplio.'
- source_word: διαρρήξαντες τὰ ἱμάτια αὐτῶν
  english_pob_choice: they tore their garments
  chosen_spanish: rasgaron sus vestidos
  alternatives_spanish:
  - desgarraron sus vestiduras
  - rompieron sus vestidos
  lexicon: BDAG
  rationale: La acción es un gesto cultural de dolor, horror o protesta. «Vestidos» es natural en español y conserva el matiz ceremonial sin volverlo interpretativo.
- source_word: ἐξεπήδησαν
  english_pob_choice: rushed into the crowd
  chosen_spanish: se lanzaron
  alternatives_spanish:
  - irrumpieron
  - saltaron
  lexicon: BDAG
  rationale: El verbo expresa impulso súbito y fuerte. «Se lanzaron» comunica la rapidez y energía del movimiento de forma idiomática; el complemento posterior especifica la dirección.
- source_word: εἰς τὸν ὄχλον
  english_pob_choice: into the crowd
  chosen_spanish: al gentío
  alternatives_spanish:
  - entre la multitud
  - en medio del gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser «muchedumbre», «multitud» o «gentío». «Gentío» suena vivo y natural aquí, y conserva la idea de masa humana sin elevar el registro innecesariamente.
- source_word: κράζοντες
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - exclamando
  lexicon: BDAG
  rationale: El participio presente indica acción concomitante y voz fuerte. «Clamando» preserva la intensidad sin añadir contenido que pertenece al versículo siguiente.
theological_decisions:
- issue: Identidad de «los apóstoles» aplicada a Bernabé y Pablo
  english_pob_reading: Retain 'the apostles Barnabas and Paul' as the text states, without narrowing the term or adding explanation in the main text.
  chosen_spanish_reading: «Los apóstoles Bernabé y Pablo» se mantiene tal como está, sin aclaraciones doctrinales añadidas en el texto principal.
  alternative_spanish_readings:
  - Bernabé y Pablo, los apóstoles
  - los enviados Bernabé y Pablo
  rationale: El griego identifica directamente a Bernabé y Pablo como «los apóstoles» en este contexto. La traducción conserva esa afirmación sin suavizarla ni restringirla.
  doctrine_reference: Hechos 14:14; filosofía de traducción §1 y §3
- issue: Gesto de rasgar los vestidos
  english_pob_reading: Tearing one's garments was a customary sign of grief, horror, or protest against blasphemous honor.
  chosen_spanish_reading: Rasgar los vestidos se mantiene como gesto cultural de dolor, horror o protesta.
  alternative_spanish_readings:
  - desgarrar las vestiduras
  - romper los vestidos
  rationale: El texto griego presenta un gesto convencional judío. La traducción lo deja visible en español sin convertirlo en explicación dentro del versículo.
  doctrine_reference: Hechos 14:14; nota cultural del POB en inglés
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB inglés que corrigió «rushed out into the crowd» a «rushed into the crowd», porque el griego no dice explícitamente «out». Por eso la redacción española evita añadir una idea de salida y usa una expresión de movimiento directo hacia el gentío.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «apóstoles» en sentido técnico conforme al texto, sin añadir explicaciones en la línea principal.
  - «Gentío» traduce ὄχλος con un registro natural y bíblicamente sobrio.
  - «Clamando» mantiene el carácter intenso del participio κράζοντες sin anticipar el contenido del grito.
