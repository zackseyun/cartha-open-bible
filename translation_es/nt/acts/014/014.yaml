    reason: cultural_note
  - marker: b
    text: O «irrumpieron en medio del gentío».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota cultural al gesto que realmente explica («rasgaron sus vestidos») y se añade una nota léxica para ἐξεπήδησαν, en línea con el POB inglés. El texto principal se mantiene esencialmente igual porque ya representa bien el sentido del griego y suena natural en español.
