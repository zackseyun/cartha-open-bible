    issue: «las ciudades de afuera» es poco idiomático en español
    rationale: Aunque intenta seguir la literalidad de ἔξω, la expresión suena extraña en español bíblico natural. «Las ciudades de fuera» comunica mejor la idea de ciudades exteriores o fuera de la región, y la nota puede conservar la alternativa más literal.
  - severity: low
    issue: La nota comienza con comilla simple innecesaria
    rationale: 'La redacción de la nota tiene puntuación algo torpe: "''O, más literalmente...". Conviene normalizarla a «O, más literalmente: ...».'
