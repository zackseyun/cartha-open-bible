translation:
  language: es
  text: Y en todas las sinagogas, castigándolos muchas veces, trataba de obligarlos a blasfemar; y, estando sobremanera enfurecido contra ellos, los perseguía hasta las ciudades de fuera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta ciudades de afuera»; la frase probablemente se refiere a ciudades más allá de Judea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πάσας τὰς συναγωγάς
  english_pob_choice: in all the synagogues
  chosen_spanish: en todas las sinagogas
  alternatives_spanish:
  - por todas las sinagogas
  - en cada una de las sinagogas
  lexicon: BDAG
  rationale: La expresión es distributiva/local y señala una acción repetida en distintos ámbitos sinagogales. «En todas las sinagogas» suena natural en español y conserva el alcance total sin sobreparafrasear.
- source_word: πολλάκις
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - frecuentemente
  - a menudo
  lexicon: BDAG
  rationale: La forma adverbial enfatiza repetición. «Muchas veces» mantiene mejor ese valor iterativo que una opción más suave como «a menudo».
- source_word: τιμωρῶν
  english_pob_choice: punishing them
  chosen_spanish: castigándolos
  alternatives_spanish:
  - mientras los castigaba
  - castigando a ellos
  lexicon: BDAG
  rationale: El participio expresa circunstancia concomitante con la acción principal. «Castigándolos» refleja esa relación de manera fluida y directa en español.
- source_word: ἠνάγκαζον
  english_pob_choice: I tried to force
  chosen_spanish: trataba de obligarlos
  alternatives_spanish:
  - los obligaba
  - intentaba forzarlos
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o en curso. «Trataba de obligarlos» conserva el matiz de esfuerzo coercitivo sin convertirlo indebidamente en un hecho puntual ya cerrado.
- source_word: βλασφημεῖν
  english_pob_choice: to blaspheme
  chosen_spanish: blasfemar
  alternatives_spanish:
  - hablar blasfemamente
  - renegar con blasfemia
  lexicon: BDAG
  rationale: El infinitivo nombra directamente la acción de blasfemar. En español, «blasfemar» es la forma más clara y fiel, sin especificar más de lo que el griego dice.
- source_word: περισσῶς
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - excesivamente
  - en gran manera
  lexicon: BDAG
  rationale: El adverbio intensifica el estado hostil. «Sobremanera» conserva el grado de exceso con un registro digno y bíblico, pero no arcaizante.
- source_word: ἐμμαινόμενος
  english_pob_choice: being enraged
  chosen_spanish: enfurecido
  alternatives_spanish:
  - rabioso
  - furioso
  - enloquecido de furia
  lexicon: BDAG
  rationale: El verbo expresa hostilidad frenética. «Enfurecido» comunica bien esa furia intensa en español actual, sin introducir la connotación psiquiátrica de «loco» o «enloquecido».
- source_word: ἐδίωκον
  english_pob_choice: I kept persecuting
  chosen_spanish: los perseguía
  alternatives_spanish:
  - seguía persiguiéndolos
  - continuaba persiguiéndolos
  lexicon: BDAG
  rationale: El imperfecto marca acción continua o repetida. «Los perseguía» preserva esa continuidad en español; la idea de persistencia ya queda reforzada por el contexto y por «sobremanera enfurecido».
- source_word: ἕως καὶ εἰς τὰς ἔξω πόλεις
  english_pob_choice: even to the foreign cities
  chosen_spanish: hasta las ciudades de afuera[a]
  alternatives_spanish:
  - incluso hasta las ciudades de afuera
  - hasta las ciudades externas
  lexicon: BDAG
  rationale: La frase griega dice literalmente «hasta las ciudades de afuera»; en contexto probablemente alude a ciudades fuera de Judea. Se conserva la literalidad en el texto principal y se deja la aclaración contextual en nota, evitando decidir más de lo que la expresión griega precisa.
theological_decisions:
- issue: Objeto implícito de «blasfemar»
  english_pob_reading: Rendered generically as 'to blaspheme' without specifying the object.
  chosen_spanish_reading: «blasfemar» sin explicitar el objeto.
  alternative_spanish_readings:
  - blasfemar contra Jesús
  - renegar de la confesión cristiana con blasfemia
  rationale: El contexto sugiere una blasfemia forzada contra Jesús o contra la fe cristiana, pero el griego no lo expresa de manera explícita. Se mantiene la generalidad para no resolver una tensión que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica y no añadir precisión no dicha por el texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés: se respeta la estructura participial sin introducir un equivalente explicativo innecesario, y se conserva la idea de «the foreign cities» con una formulación literal en español y nota contextual. También se mantiene la generalidad de «blasfemar» conforme al texto fuente y al criterio revisado de no especificar el objeto implícito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se preserva «blasfemar» como verbo simple y no se sustituye por perífrasis más interpretativas.
  - Se elige «ciudades de afuera» para reflejar ἔξω; la nota aclara el probable sentido geográfico sin convertirlo en una paráfrasis.
  - El registro es bíblico contemporáneo y evita arcaísmos innecesarios como «les forzaba» o «de sobremanera».
