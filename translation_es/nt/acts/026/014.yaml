base_translation:
  language: en
  yaml_path: translation/nt/acts/026/014.yaml
  text: And when we had all fallen to the ground[a], I heard a voice saying to me in the Hebrew language, ‘Saul, Saul[b], why are you persecuting me? It is hard for you to kick against the goads.’
