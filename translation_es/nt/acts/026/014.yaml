translation:
  language: es
  text: 'Y cuando todos habíamos caído[a] al suelo, oí una voz que me decía en la lengua hebrea: «Saúl, Saúl[b], ¿por qué me persigues? Es duro para ti dar coces contra los aguijones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «en arameo»; la expresión griega dice literalmente «en la lengua/dialecto hebreo».'
    reason: alternative_reading
  - marker: b
    text: 'Expresión proverbial: resistir al que habla solo trae daño para uno mismo.'
    reason: cultural_note
lexical_decisions:
- source_word: πάντων τε καταπεσόντων ἡμῶν
  english_pob_choice: when we had all fallen
  chosen_spanish: cuando todos habíamos caído
  alternatives_spanish:
  - después de que todos caímos
  - cuando habíamos caído todos
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte naturalmente con una cláusula temporal en español. Se conserva el valor de totalidad de πάντων con «todos» y la acción previa completada de καταπεσόντων con el pluscuamperfecto «habíamos caído».
- source_word: εἰς τὴν γῆν
  english_pob_choice: to the ground
  chosen_spanish: al suelo
  alternatives_spanish:
  - a tierra
  - al piso
  lexicon: BDAG
  rationale: En español narrativo, «al suelo» comunica con naturalidad el movimiento de caída sin endurecer la frase con un calco menos idiomático.
- source_word: ἤκουσα φωνὴν
  english_pob_choice: I heard a voice
  chosen_spanish: oí una voz
  alternatives_spanish:
  - escuché una voz
  - oí una voz que hablaba
  lexicon: BDAG
  rationale: φωνή en un contexto de discurso directo se entiende como «voz», no solo sonido. «Oí» mantiene la concisión del original y del audit trail inglés.
- source_word: λέγουσαν πρός με
  english_pob_choice: saying to me
  chosen_spanish: que me hablaba
  alternatives_spanish:
  - que me decía
  - hablándome
  lexicon: BDAG
  rationale: El participio con πρός + acusativo expresa dirección del habla. «Que me hablaba» conserva el valor relacional de la frase y suena natural en español; «me decía» también sería posible, pero aquí la frase completa ya introduce el contenido directo.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  english_pob_choice: in the Hebrew language
  chosen_spanish: en la lengua hebrea
  alternatives_spanish:
  - en el idioma hebreo
  - en arameo
  lexicon: BDAG
  rationale: Se sigue de cerca la expresión griega, que dice literalmente «en la lengua/dialecto hebreo». No se importa en el texto principal la identificación histórica con arameo; esa posibilidad se preserva como nota.
- source_word: Σαοὺλ Σαούλ
  english_pob_choice: Saul, Saul
  chosen_spanish: «Saúl, Saúl»
  alternatives_spanish:
  - «Saulo, Saulo»
  lexicon: BDAG
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico. La repetición se conserva para mantener el énfasis vocativo del original.
- source_word: τί με διώκεις;
  english_pob_choice: why are you persecuting me?
  chosen_spanish: ¿por qué me persigues?
  alternatives_spanish:
  - ¿por qué me estás persiguiendo?
  - ¿por qué me hostigas?
  lexicon: BDAG
  rationale: «Perseguir» comunica bien διώκω en este contexto de hostilidad contra una persona. El presente simple en español expresa de forma natural la acción directa del discurso.
- source_word: σκληρόν
  english_pob_choice: It is hard
  chosen_spanish: Dura cosa te es
  alternatives_spanish:
  - Es difícil para ti
  - Es duro para ti
  lexicon: BDAG
  rationale: La construcción proverbial griega se vierte con una fórmula tradicional y comprensible en español que conserva el tono sentencioso. «Dura cosa» mantiene el valor adjetival y la fuerza proverbial sin explicitar de más.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: te es
  alternatives_spanish:
  - para ti es
  - te resulta
  lexicon: BDAG
  rationale: El dativo de referencia se integra en la locución española «te es», que reproduce bien la relación indirecta del enunciado proverbial.
- source_word: πρὸς κέντρα
  english_pob_choice: against the goads
  chosen_spanish: contra el aguijón
  alternatives_spanish:
  - contra los aguijones
  - contra la aguijada
  lexicon: BDAG
  rationale: κέντρον designa el instrumento punzante para dirigir animales; «aguijón» es un equivalente clásico y claro en español bíblico. Se singulariza en la fórmula proverbial tradicional para que la sentencia fluya con naturalidad.
- source_word: λακτίζειν
  english_pob_choice: to kick
  chosen_spanish: dar coces
  alternatives_spanish:
  - patear
  - cocear
  lexicon: BDAG
  rationale: «Dar coces» expresa con precisión la imagen de golpear con los pies y encaja de modo idiomático con la expresión proverbial.
theological_decisions:
- issue: Traducción de τῇ Ἑβραΐδι διαλέκτῳ
  english_pob_reading: in the Hebrew language
  chosen_spanish_reading: en la lengua hebrea
  alternative_spanish_readings:
  - en arameo
  rationale: 'Se mantiene en el texto principal la formulación que refleja de manera directa el griego: «hebrea». La posible referencia histórica al arameo se deja para nota, en vez de sustituir el dato textual del original.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el contexto de auditoría muestra acuerdo alto y sin objeciones. Esta versión sigue de cerca el griego y conserva la nota histórica sobre «hebrea/arameo» en vez de resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable en este versículo.
  - Se prefirió «esclavo/siervo» no aplicable; no hay δοῦλος aquí.
  - Se conservó el tratamiento directo y la repetición vocativa «Saúl, Saúl».
  - La imagen proverbial se tradujo con un equivalente idiomático español sin explicar de más en el texto principal.
