translation:
  language: es
  text: Entonces se levantó el rey, y el gobernador y Berenice[a] y los que estaban sentados con ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Berenice: también puede escribirse «Bernice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέστη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El aoristo de ἀνίστημι aquí expresa el acto físico de incorporarse desde el asiento. En español, «se levantó» comunica ese movimiento de manera natural y digna en el contexto formal de una audiencia, sin perder el sentido básico del verbo.
- source_word: τε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: La partícula τε enlaza la acción con la escena anterior. En español, «Entonces» refleja con naturalidad la progresión narrativa que el inglés POB captó con «Then».
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: BDAG
  rationale: 'βασιλεύς designa de forma directa a un rey. El griego conserva el título y no el nombre propio, así que el español también mantiene el título: «el rey».'
- source_word: ὁ ἡγεμὼν
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el gobernante
  - el prefecto
  lexicon: BDAG
  rationale: En este contexto, ἡγεμών se refiere al funcionario romano que presidía la audiencia. «Gobernador» es la equivalencia más precisa y natural en español.
- source_word: Βερνίκη
  english_pob_choice: Bernice
  chosen_spanish: Bernice
  alternatives_spanish:
  - Berenice
  lexicon: BDAG
  rationale: Se conserva la forma inglesa/convencional usada en el POB y en muchos contextos del NT en español. «Berenice» queda como alternativa transliterada posible, pero no es necesaria en el texto principal.
- source_word: οἱ συγκαθήμενοι αὐτοῖς
  english_pob_choice: those seated with them
  chosen_spanish: los que estaban sentados con ellos
  alternatives_spanish:
  - los que se sentaban con ellos
  - los comensales con ellos
  lexicon: BDAG
  rationale: El participio συγκαθήμενοι significa literalmente quienes están sentados junto con otros. «Los que estaban sentados con ellos» conserva la imagen de la disposición física sin añadir una interpretación social que el griego no exige.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: La coordinación repetida se conserva con «y», manteniendo la enumeración acumulativa del griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisiones sustanciales; se ha mantenido la estructura enumerativa y el matiz de progresión narrativa con una equivalencia española natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» como norma general del proyecto, pero este versículo no contiene esos términos.
  - Se preservó el valor físico de ἀνίστημι con «se levantó», evitando una paráfrasis más amplia.
  - La lista coordinada reproduce el orden y la simplicidad sintáctica del original griego.
