translation:
  language: es
  text: Así que yo mismo, de hecho, pensé que debía hacer muchas cosas en oposición al nombre de Jesús el Nazareno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra el nombre de Jesús de Nazaret».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - personalmente yo
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego; «yo mismo» conserva esa autocontraste personal sin sonar forzado en español.
- source_word: μὲν οὖν
  english_pob_choice: So ... indeed
  chosen_spanish: Así que ... de hecho
  alternatives_spanish:
  - entonces ... en verdad
  - por tanto ... ciertamente
  lexicon: BDAG
  rationale: La combinación enlaza el discurso con matiz inferencial y enfático. «Así que» refleja οὖν y «de hecho» conserva la fuerza de μέν sin endurecer el tono.
- source_word: ἔδοξα ἐμαυτῷ
  english_pob_choice: thought
  chosen_spanish: pensaba
  alternatives_spanish:
  - pensé
  - me pareció
  lexicon: BDAG
  rationale: El giro expresa una evaluación interna de Saulo/ Pablo sobre su deber. «Pensaba» transmite bien el estado mental habitual o sostenido; el reflexivo implícito queda reforzado por «yo mismo».
- source_word: πρὸς τὸ ὄνομα
  english_pob_choice: in opposition to the name
  chosen_spanish: en oposición al nombre
  alternatives_spanish:
  - contra el nombre
  - frente al nombre
  lexicon: BDAG
  rationale: Aquí πρός tiene fuerza adversativa por el contexto de ἐναντία. «En oposición a» reproduce esa relación de enfrentamiento sin perder el sustantivo «nombre», que mantiene el valor bíblico-teológico del término.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - autoridad
  - persona
  lexicon: BDAG
  rationale: Se conserva «nombre» para no reducir el alcance idiomático. En el uso bíblico puede implicar la persona y su honra o representación, pero el texto no obliga a explicitarlo.
- source_word: Ἰησοῦ τοῦ Ναζωραίου
  english_pob_choice: Jesus the Nazarene
  chosen_spanish: Jesús el Nazareno
  alternatives_spanish:
  - Jesús de Nazaret
  - Jesús el Nazoreo
  lexicon: BDAG
  rationale: Ναζωραῖος designa la identificación de Jesús con Nazaret. «El Nazareno» es la forma breve y natural en español, conservando el carácter titular del griego; «de Nazaret» sería válido pero más explicativo.
- source_word: δεῖν
  english_pob_choice: ought to
  chosen_spanish: debía
  alternatives_spanish:
  - tenía que
  - debí
  lexicon: BDAG
  rationale: La infinitiva expresa una obligación percibida dentro del juicio previo de Pablo. «Debía» refleja esa necesidad subjetiva sin convertirla en un mandato externo más fuerte.
- source_word: πολλὰ ἐναντία πρᾶξαι
  english_pob_choice: to do many things in opposition
  chosen_spanish: hacer muchas cosas en oposición
  alternatives_spanish:
  - cometer muchas cosas contra
  - actuar de muchas maneras contra
  lexicon: BDAG
  rationale: La construcción señala múltiples acciones hostiles o contrarias. «Hacer muchas cosas en oposición» conserva la pluralidad (πολλά) y la oposición (ἐναντία) sin especificar indebidamente el tipo de actos.
theological_decisions:
- issue: Sentido de «el nombre» aplicado a Jesús
  english_pob_reading: Retain the biblical idiom 'the name' rather than interpret it as 'authority' or 'cause.'
  chosen_spanish_reading: Conservar «el nombre» como modismo bíblico, sin explicitarlo como «autoridad» o «causa».
  alternative_spanish_readings:
  - la autoridad de Jesús
  - la causa de Jesús
  rationale: El texto no exige reducir el modismo a un solo matiz. Mantener «el nombre» preserva la forma bíblica de hablar de la persona, la honra y la confesión pública de Jesús, dejando abierta la tensión semántica.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el pasaje presenta alta concordancia con el control cruzado y no requiere cambios respecto del último pase auditado.
  spanish_consistency_notes:
  - Se mantiene «Jesús» y no «Cristo», conforme al nombre propio del original y al auditorio del versículo.
  - «Nombre» se conserva de manera literal para respetar el modismo bíblico-teológico.
  - «Nazareno» se usa como gentilicio/título breve y natural en español; la nota ofrece la alternativa más explícita «de Nazaret».
  - La estructura inferencial y enfática de μὲν οὖν se reparte entre «Así que» y «de hecho» para evitar un calco pesado.
