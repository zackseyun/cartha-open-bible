    text: O, «¿Quién eres, señor?». El griego κύριε puede funcionar como un tratamiento respetuoso; sin embargo, aquí se prefiere «Señor» porque el hablante es identificado de inmediato como Jesús en una aparición celestial.
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego, al POB inglés y al estilo español requerido. Se corrige únicamente la nota al pie para reemplazar la alternativa no española «sir» por «señor», manteniendo la justificación léxica y teológica documentada.
