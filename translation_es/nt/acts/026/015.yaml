  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y el rastro inglés del POB: mantiene «Señor» para κύριε/κύριος, reproduce la autoidentificación «Yo soy Jesús» y expresa correctamente διώκεις como persecución en curso. La única desviación significativa está en la nota léxica interna, donde aparece el anglicismo «sir» como alternativa española, lo cual no es español y debería ser «señor».'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español eclesial contemporáneo. La puntuación y el flujo narrativo son buenos. Solo requiere una reparación menor para mantener coherencia idiomática y metadatos de calidad: ajustar la nota al pie para español natural y evitar una alternativa no española.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: κύριος -> «Señor» en ambos usos; Ἰησοῦς -> «Jesús». No hay términos del glosario principal incumplidos en el texto bíblico. La reparación propuesta solo afecta la nota al pie.'
  issues:
  - severity: medium
    issue: La nota al pie ofrece «sir» como alternativa dentro del español.
    rationale: Aunque la nota explica bien el valor posible de κύριε, la alternativa citada debe estar en español. «sir» es un anglicismo impropio en una edición española; corresponde «señor» en minúscula como tratamiento respetuoso no titular.
  revised_spanish_text: 'Y dije[a]: «¿Quién eres, Señor?» Y el Señor dijo: «Yo soy Jesús, a quien tú persigues».'
  revised_footnotes:
