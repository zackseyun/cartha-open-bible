translation:
  language: es
  text: 'Y dije[a]: «¿Quién eres, Señor?» Y el Señor dijo: «Yo soy Jesús, a quien tú persigues».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Quién eres, señor?». El griego κύριε puede funcionar como un tratamiento respetuoso; sin embargo, aquí se prefiere «Señor» porque el hablante es identificado de inmediato como Jesús en una aparición celestial.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ δὲ εἶπα
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Pero dije
  lexicon: BDAG
  rationale: δέ funciona aquí como conector narrativo leve; en español, «Y» conserva la continuidad sin forzar contraste. El pronombre explícito ἐγώ no necesita reproducirse con énfasis porque la forma verbal española ya expresa la primera persona.
- source_word: Τίς εἶ, κύριε;
  english_pob_choice: Who are you, Lord?
  chosen_spanish: ¿Quién eres, Señor?
  alternatives_spanish:
  - ¿Quién eres, sir?
  - ¿Quién eres, maestro?
  lexicon: BDAG
  rationale: τίς εἶ se traduce de manera directa como «¿Quién eres?». κύριε se vierte «Señor» siguiendo la decisión del POB para κύριος; aunque «señor» puede funcionar como tratamiento respetuoso, aquí el contexto de la aparición celestial y la identificación inmediata con Jesús favorecen mantener la carga reverencial de «Señor».
- source_word: ὁ δὲ ⸀κύριος εἶπεν
  english_pob_choice: And the Lord said
  chosen_spanish: Y el Señor dijo
  alternatives_spanish:
  - Pero el Señor dijo
  - Entonces el Señor dijo
  lexicon: BDAG
  rationale: 'κύριος se conserva como «Señor» por la convención doctrinal del proyecto y por la identificación explícita posterior con Jesús. El artículo funciona naturalmente como sujeto identificado en español: «el Señor».'
- source_word: Ἐγώ εἰμι Ἰησοῦς
  english_pob_choice: I am Jesus
  chosen_spanish: Yo soy Jesús
  alternatives_spanish:
  - Soy Jesús
  - Yo soy Jesús mismo
  lexicon: BDAG
  rationale: La autoidentificación es directa. En español, «Yo soy Jesús» reproduce de forma clara el ἐγώ εἰμι sin sobrecargarlo; añadir «mismo» introduciría un matiz no requerido por el griego.
- source_word: ὃν σὺ διώκεις
  english_pob_choice: whom you are persecuting
  chosen_spanish: a quien tú persigues
  alternatives_spanish:
  - a quien persigues
  - a quien tú estás persiguiendo
  lexicon: BDAG
  rationale: διώκω aquí significa «perseguir» en sentido hostil. El presente español simple («persigues») conserva la acción vigente sin necesidad de una progresiva explícita. El pronombre relativo se adapta a objeto directo humano con «a quien».
theological_decisions:
- issue: Rendering of κύριος in Saul's address and the speaker's self-identification
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: La línea del POB trata κύριος como «Lord» en ambos usos, y en español la forma reverente y teológicamente cargada es «Señor». Aunque «señor» podría leerse como tratamiento cortés, el contexto cristofánico y la respuesta «Yo soy Jesús» hacen preferible conservar la mayúscula devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
translation_notes:
  revision_awareness: El inglés POB mantiene la lectura «Lord» en ambos κύριος y deja constancia de la alternativa respetuosa «sir». La presente versión española sigue esa misma decisión auditada, sin añadir intensificación innecesaria ni suavizar el peso cristológico del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al criterio del proyecto y al contexto cristofánico.
  - Se optó por el presente simple «persigues» para conservar naturalidad en español sin perder el valor aspectual continuo del inglés POB.
  - No se trasladó el pronombre explícito ἐγώ con énfasis adicional, porque el español ya lo expresa suficientemente en la forma verbal.
