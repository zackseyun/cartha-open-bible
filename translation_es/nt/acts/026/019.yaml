lexical_decisions:
- source_word: Ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: BDAG
  rationale: La partícula introduce una conclusión lógica desde el relato anterior. «Por tanto» preserva bien la relación inferencial en un español natural y solemne, sin forzar un giro demasiado coloquial.
- source_word: βασιλεῦ Ἀγρίππα
  english_pob_choice: King Agrippa
  chosen_spanish: rey Agripa
  alternatives_spanish:
  - Rey Agripa
  - oh rey Agripa
  - Agripa, el rey
  lexicon: BDAG
  rationale: El vocativo se conserva con el título real. En español, el orden «rey Agripa» es claro y fluido; el vocativo explícito con «oh» no añade valor semántico necesario.
- source_word: οὐκ ἐγενόμην
  english_pob_choice: I was not
  chosen_spanish: no fui
  alternatives_spanish:
  - no llegué a ser
  - no me mostré
  - no resulté
  lexicon: BDAG
  rationale: Con γίνομαι + adjetivo predicativo, el sentido idiomático en este contexto es de estado/resultante. «No fui» comunica de manera natural la afirmación de Pablo sin sobrecargarla con matices innecesarios.
- source_word: ἀπειθὴς
  english_pob_choice: disobedient
  chosen_spanish: desobediente
  alternatives_spanish:
  - rebeldemente contrario
  - incrédulo
  - no obediente
  lexicon: BDAG
  rationale: La noción es la de negativa a cumplir una comisión divina. «Desobediente» es la correspondencia más directa y reconocible en español, manteniendo la fuerza volitiva del término.
- source_word: τῇ οὐρανίῳ ὀπτασίᾳ
  english_pob_choice: the heavenly vision
  chosen_spanish: la visión celestial
  alternatives_spanish:
  - la visión del cielo
  - la visión proveniente del cielo
  - la aparición celestial
  lexicon: BDAG
  rationale: ὀπτασία denota una visión o aparición sobrenatural. «Visión celestial» conserva la categoría del evento y el matiz de origen/ámbito celestial; «aparición» sería posible, pero desplaza el foco desde la experiencia vista hacia el acto de aparecer.
theological_decisions:
- issue: Naturaleza de la experiencia de Pablo en el camino a Damasco
  english_pob_reading: vision
  chosen_spanish_reading: visión
  alternative_spanish_readings:
  - aparición
  - revelación del cielo
  rationale: Se mantiene la categoría textual de «visión» sin resolverla en una formulación teológica más desarrollada. «Celestial» reproduce el rasgo de origen o carácter indicado por οὐρανίῳ, dejando intacta la tensión entre visión y aparición.
  doctrine_reference: Preservar la tensión teológica sin ampliarla más allá del texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal junto al término correspondiente, y que no hay notas huérfanas.
  spanish_consistency_notes:
  - Se mantiene «visión» para ὀπτασία, en continuidad con la elección inglesa y sin introducir una interpretación más técnica.
  - «Celestial» se usa aquí como equivalente natural de οὐρανίῳ, evitando la máscara litúrgica «del cielo» como única opción principal.
  - El orden vocativo «rey Agripa» es idiomático y conserva la deferencia del original.
