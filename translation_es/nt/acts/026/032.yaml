translation:
  language: es
  text: 'Entonces Agripa dijo a Festo[a]: «Este hombre pudo haber sido puesto en libertad si no hubiera apelado a César».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este hombre podría haber sido puesto en libertad si no hubiera apelado a César».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ marca transición narrativa; «Entonces» conserva ese avance discursivo con naturalidad en español.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - manifestó
  lexicon: BDAG
  rationale: El imperfecto de φημί funciona aquí como introducción de habla; «dijo» es idiomático y no fuerza el aspecto.
- source_word: Ἀπολελύσθαι
  english_pob_choice: have been released
  chosen_spanish: haber sido puesto en libertad
  alternatives_spanish:
  - haber sido liberado
  - haber sido soltado
  lexicon: BDAG
  rationale: El infinitivo perfecto de ἀπολύω expresa quedar libre o ser liberado. En español jurídico/narrativo, «puesto en libertad» comunica bien la idea sin reducirla a una absolución técnica.
- source_word: ἐδύνατο
  english_pob_choice: could
  chosen_spanish: pudo haber sido
  alternatives_spanish:
  - podría haber sido
  - era posible que fuera
  lexicon: BDAG
  rationale: δύναμαι expresa posibilidad/capacidad pasada no realizada. «Pudo haber sido» refleja esa posibilidad contrafáctica de manera natural.
- source_word: ὁ ἄνθρωπος οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - esta persona
  - el hombre
  lexicon: BDAG
  rationale: ἄνθρωπος aquí se refiere a un individuo masculino concreto; «este hombre» conserva el demostrativo y la referencia específica.
- source_word: εἰ μὴ
  english_pob_choice: if ... not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: BDAG
  rationale: La construcción introduce una condición contraria a los hechos; «si no» en la cláusula con subjuntivo pluscuamperfecto expresa con claridad esa relación.
- source_word: ἐπεκέκλητο
  english_pob_choice: had not appealed
  chosen_spanish: hubiera apelado
  alternatives_spanish:
  - hubiera recurrido
  - hubiera invocado
  lexicon: BDAG
  rationale: En contexto jurídico romano, ἐπικαλέω con César significa apelar al emperador. «Apelado» preserva el sentido legal preciso del texto.
- source_word: Καίσαρα
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el emperador
  lexicon: BDAG
  rationale: Καῖσαρ es el título/nombre formal del recurso legal; «César» conserva el matiz histórico y jurídico mejor que «el emperador».
translation_notes:
  revision_awareness: 'Seguimos el acuerdo alto con el texto fuente y con la auditoría inglesa: la escena es una observación legal de Agripa, sin cambios textuales ni revisiones sustantivas registradas; se mantiene la alternativa modal de δυνατός/ἐδύνατο en una nota porque el inglés POB también preserva esa ambigüedad entre posibilidad cumplida y posibilidad hipotética.'
  spanish_consistency_notes:
  - Se mantiene «César» para Καίσαρ, en línea con el uso histórico-jurídico del pasaje.
  - «Pudo haber sido puesto en libertad» conserva la modalidad contrafáctica del griego y evita cerrar demasiado el matiz de δυνατός.
  - No se introduce terminología eclesiástica ajena al contexto judicial.
