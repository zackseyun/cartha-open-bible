translation:
  language: es
  text: 'Pero Pablo dijo[a]: «No estoy loco, excelentísimo Festo[b], sino que hablo palabras de verdad y de sano juicio[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No estoy fuera de mí».
    reason: lexical_alternative
  - marker: b
    text: «Excelentísimo» es un tratamiento formal para un funcionario de alto rango.
    reason: cultural_note
  - marker: c
    text: O «palabras de verdad y sobriedad» o «palabras de verdad y cordura».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La forma adversativa contrasta con la acusación previa de Festo; «Pero» comunica bien ese giro en español natural.
- source_word: μαίνομαι
  english_pob_choice: am not out of my mind
  chosen_spanish: No estoy fuera de mí
  alternatives_spanish:
  - No estoy loco
  - No estoy insano
  lexicon: BDAG
  rationale: La expresión española conserva el valor idiomático y evita un tono demasiado clínico o arcaico; mantiene la tensión entre locura e incoherencia sin suavizarla demasiado.
- source_word: φησίν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más natural el pasado simple.
- source_word: κράτιστε
  english_pob_choice: most excellent
  chosen_spanish: excelentísimo
  alternatives_spanish:
  - ilustrísimo
  - vuestra excelencia
  lexicon: BDAG
  rationale: Es un tratamiento honorífico formal para un funcionario de alto rango; «excelentísimo» refleja el matiz institucional y es idiomático en español bíblico.
- source_word: ἀληθείας
  english_pob_choice: of truth
  chosen_spanish: de verdad
  alternatives_spanish:
  - de la verdad
  - verdaderas
  lexicon: BDAG
  rationale: Se conserva la idea de contenidos/speech caracterizados por la verdad; «de verdad» resulta más natural en español que una construcción demasiado literal.
- source_word: σωφροσύνης
  english_pob_choice: sound judgment
  chosen_spanish: sano juicio
  alternatives_spanish:
  - sobriedad
  - sensatez
  - cordura
  lexicon: BDAG
  rationale: El término abarca sensatez, autocontrol y sobriedad mental; «sano juicio» preserva el campo semántico sin reducirlo solo a «sobriedad» o solo a «cordura».
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - expresiones
  - dichos
  lexicon: BDAG
  rationale: Traduce el plural concreto con claridad y sin abstracción innecesaria.
- source_word: ἀποφθέγγομαι
  english_pob_choice: I am speaking
  chosen_spanish: expreso
  alternatives_spanish:
  - declaro
  - pronuncio
  lexicon: BDAG
  rationale: El verbo puede implicar hablar o declarar con énfasis; «expreso» mantiene el acto de hablar en respuesta directa sin sobrerrepresentar solemnidad retórica.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente del POB inglés; se mantiene la misma lectura global y no se requieren cambios de sentido.
  spanish_consistency_notes:
  - Se conserva el contraste adversativo de δέ con «Pero».
  - Se mantiene el honorífico formal para κράτιστε, evitando traducirlo como un simple título honorífico religioso.
  - La combinación «de verdad y de sano juicio» refleja el genitivo griego con una formulación natural en español.
  - Se preserva la posibilidad semántica de σωφροσύνη mediante una nota de alternativas, como en el audit trail inglés.
