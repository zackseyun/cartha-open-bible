translation:
  language: es
  text: Me han conocido desde el principio[a], si están dispuestos a testificar, que viví como fariseo según la secta[b] más estricta de nuestra religión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el comienzo» o «hace mucho tiempo».
    reason: alternative_reading
  - marker: b
    text: Griego αἵρεσις, aquí con el sentido de «secta» o «partido», no de «herejía» en el sentido técnico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: προγινώσκοντές
  english_pob_choice: have known
  chosen_spanish: me conocieron
  alternatives_spanish:
  - me han conocido
  - me conocían
  lexicon: BDAG
  rationale: El participio con valor de conocimiento previo se vierte de modo natural en español con un pretérito que expresa reconocimiento anterior y continuo; «me conocieron» conserva la idea de conocimiento previo sin forzar una perífrasis pesada.
- source_word: ἄνωθεν
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde antes
  lexicon: BDAG
  rationale: En este contexto indica antigüedad del conocimiento, no ubicación espacial. «Desde el principio» sigue bien la decisión inglesa y es claro en español.
- source_word: ἐὰν θέλωσι μαρτυρεῖν
  english_pob_choice: if they are willing to testify
  chosen_spanish: si quieren testificar
  alternatives_spanish:
  - si están dispuestos a testificar
  - si desean dar testimonio
  lexicon: BDAG
  rationale: θέλωσι expresa voluntad; μαρτυρεῖν tiene matiz forense. «Testificar» es natural en un contexto legal, y «si quieren» preserva la idea de disposición.
- source_word: κατὰ τὴν ἀκριβεστάτην αἵρεσιν
  english_pob_choice: according to the strictest sect
  chosen_spanish: según la secta más estricta
  alternatives_spanish:
  - conforme a la secta más rigurosa
  - según el partido más estricto
  lexicon: BDAG
  rationale: «Secta» mantiene el valor histórico de αἵρεσις como grupo o partido reconocido dentro del judaísmo, sin introducir el sentido posterior de «herejía». «Más estricta» sigue el superlativo de ἀκριβής.
- source_word: τῆς ἡμετέρας θρησκείας
  english_pob_choice: of our religion
  chosen_spanish: de nuestra religión
  alternatives_spanish:
  - de nuestra práctica religiosa
  - de nuestra fe
  lexicon: BDAG
  rationale: θρησκείας aquí designa la religión judía como marco común; «religión» es el equivalente directo y más sobrio en español.
- source_word: ἔζησα
  english_pob_choice: I lived
  chosen_spanish: viví
  alternatives_spanish:
  - me conduje
  - llevé mi vida
  lexicon: BDAG
  rationale: El aoristo resume la manera de vida anterior de Pablo. «Viví» es breve, idiomático y fiel al valor narrativo.
- source_word: Φαρισαῖος
  english_pob_choice: as a Pharisee
  chosen_spanish: como fariseo
  alternatives_spanish:
  - siendo fariseo
  - en calidad de fariseo
  lexicon: BDAG
  rationale: El predicativo se expresa naturalmente con «como fariseo», que comunica identidad y modo de vida sin añadir elementos no presentes.
theological_decisions:
- issue: αἵρεσις en un contexto judío histórico
  english_pob_reading: sect
  chosen_spanish_reading: secta
  alternative_spanish_readings:
  - herejía
  - partido
  rationale: Se conserva el sentido histórico de un grupo reconocible dentro del judaísmo. «Herejía» impondría una carga teológica posterior ajena al pasaje; «secta» refleja mejor la decisión auditada del inglés POB.
  doctrine_reference: Principio de primacía del texto fuente y de no importar categorías eclesiásticas posteriores.
translation_notes:
  revision_awareness: La revisión inglesa eliminó la redundancia de «for a long time» y dejó solo «from the beginning». La redacción española sigue esa decisión con «desde el principio» y conserva la lectura forense de «testificar».
  spanish_consistency_notes:
  - Se mantiene «secta» para αἵρεσις conforme al criterio auditado, evitando «herejía».
  - Se usa «religión» para θρησκείας, coherente con el contexto histórico-judicial.
  - El verbo «testificar» conserva el matiz testimonial/forense de μαρτυρεῖν.
  - No se introduce «Señor» ni otras convenciones no presentes en este versículo.
