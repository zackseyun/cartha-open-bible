    rationale: El inglés auditado eligió «have known» para expresar conocimiento que viene del pasado hasta el presente. En español, «me han conocido» preserva mejor esa continuidad que el pretérito simple «me conocieron», que suena más puntual o cerrado.
  - severity: medium
