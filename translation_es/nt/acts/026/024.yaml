translation:
  language: es
  text: 'Mientras él decía estas cosas en su defensa[a], Festo dijo en voz alta: «¡Estás loco, Pablo! Tu gran erudición te está llevando a la locura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras hacía su defensa»; o «mientras se defendía». También: «¡Estás loco, Pablo! Tu mucho estudio te está volviendo loco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολογουμένου
  english_pob_choice: as he was saying these things in his defense
  chosen_spanish: Mientras él se defendía de estas cosas
  alternatives_spanish:
  - mientras hablaba en su defensa
  - mientras hacía su defensa
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea; ἀπολογέομαι aquí tiene sentido forense de defenderse ante una acusación. «Se defendía» conserva esa idea jurídica y suena natural en español.
- source_word: μεγάλῃ τῇ φωνῇ
  english_pob_choice: with a loud voice
  chosen_spanish: en voz alta
  alternatives_spanish:
  - con voz fuerte
  - a gran voz
  lexicon: BDAG
  rationale: La frase dativa es idiomática para modo. «En voz alta» comunica bien la interrupción de Festo en español moderno sin perder el valor enfático.
- source_word: φησιν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo estándar es más natural el pretérito simple.
- source_word: Μαίνῃ
  english_pob_choice: You are out of your mind
  chosen_spanish: ¡Estás loco, Pablo!
  alternatives_spanish:
  - ¡Estás fuera de tu mente, Pablo!
  - ¡Estás loco de remate, Pablo!
  lexicon: BDAG
  rationale: μαίνομαι expresa estar loco o delirante. «Estás loco» conserva la fuerza directa y reproduce la acusación insultante del texto; en nota se puede mantener la alternativa más literal «mad»/«loco» según el contexto.
- source_word: τὰ πολλά ... γράμματα
  english_pob_choice: Your great learning
  chosen_spanish: Tu gran saber
  alternatives_spanish:
  - Tu mucha erudición
  - Tu gran aprendizaje
  - Tus muchos escritos
  lexicon: BDAG
  rationale: γράμματα puede significar letras, escritos o instrucción/aprendizaje. Aquí el contexto apunta al saber o erudición de Pablo; «gran saber» es claro y natural, y evita reducirlo a documentos escritos.
- source_word: εἰς μανίαν
  english_pob_choice: into madness
  chosen_spanish: a la locura
  alternatives_spanish:
  - hacia la locura
  - hasta la locura
  - en locura
  lexicon: BDAG
  rationale: La preposición εἰς expresa dirección o resultado. «A la locura» conserva el movimiento hacia un estado, con español fluido.
- source_word: περιτρέπει
  english_pob_choice: is driving
  chosen_spanish: te está llevando
  alternatives_spanish:
  - te está conduciendo
  - te empuja
  - te está arrastrando
  lexicon: BDAG
  rationale: περιτρέπω aquí comunica causar un giro hacia un estado. «Te está llevando» expresa bien esa causalidad en español actual sin sobretraducir.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto principal en la palabra o frase correspondiente a la nota.
  spanish_consistency_notes:
  - Se mantuvo el tono directo e insultante de la intervención de Festo.
  - Se prefirió un español natural que conserva la relación entre «saber/erudición» y el resultado de «locura».
  - La nota alternativa preserva la ambigüedad léxica de γράμματα y μαίνομαι sin imponer una sola solución.
