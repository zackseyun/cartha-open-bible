    issue: 'Construcción española poco natural: «se juzga entre ustedes como increíble»'
    rationale: Aunque refleja los componentes griegos, en español moderno suena forzado. «Se considera increíble entre ustedes» transmite el mismo sentido con mejor legibilidad y dignidad.
  - severity: medium
    issue: La partícula «como» introduce una formulación no necesaria
    rationale: κρίνεται ἄπιστον se expresa naturalmente en español como «se considera increíble» o «se juzga increíble», no «se juzga como increíble».
  - severity: low
    issue: Ubicación incorrecta del marcador de nota
    rationale: La nota explica la alternativa de τί («¿Por qué?» / «¿Qué?»), no el verbo «resucita». El marcador debe anclarse en la apertura de la pregunta.
  revised_spanish_text: ¿Por qué[a] se considera increíble entre ustedes si Dios resucita a los muertos?
