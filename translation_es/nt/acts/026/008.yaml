translation:
  language: es
  text: ¿Por qué[a] se considera increíble entre ustedes si Dios resucita a los muertos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué se considera increíble entre ustedes, si Dios resucita a los muertos?» El griego puede representarse de forma más formal, pero el sentido es una pregunta retórica: «¿Por qué?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿A causa de qué
  lexicon: BDAG
  rationale: En esta construcción interrogativa idiomática, τί funciona adverbialmente con valor de causa o motivo. «¿Por qué?» expresa mejor el desafío retórico que un simple «¿Qué?».
- source_word: ἄπιστον
  english_pob_choice: unbelievable
  chosen_spanish: increíble
  alternatives_spanish:
  - inverosímil
  - increíble de creer
  - imposible de aceptar
  lexicon: BDAG
  rationale: ἄπιστον describe la afirmación como no creíble. «Increíble» conserva el valor evaluativo y suena natural en español moderno sin suavizar la fuerza del juicio.
- source_word: κρίνεται
  english_pob_choice: is judged
  chosen_spanish: se juzga
  alternatives_spanish:
  - se considera
  - se estima
  lexicon: BDAG
  rationale: La pasiva de κρίνω comunica que algo es evaluado o considerado. «Se juzga» mantiene la forma formal y la idea de valoración explícita.
- source_word: παρ’ ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - por ustedes
  - en su opinión
  - a su parecer
  lexicon: BDAG
  rationale: παρά con dativo puede señalar el ámbito o perspectiva desde la cual algo es evaluado. «Entre ustedes» refleja bien ese marco comunitario y suena natural en español.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Dios es el equivalente directo y normal de θεός. No hace falta marcar el artículo en español.
- source_word: νεκροὺς
  english_pob_choice: the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - a los que están muertos
  - a los difuntos
  lexicon: BDAG
  rationale: Aquí νεκρούς es sustantivado. En español, con «resucita» el objeto natural es «a los muertos», que conserva el sentido colectivo de personas fallecidas.
- source_word: ἐγείρει
  english_pob_choice: raises
  chosen_spanish: resucita
  alternatives_spanish:
  - levanta
  - levanta de entre los muertos
  - hace levantar
  lexicon: BDAG
  rationale: En contexto de resurrección, ἐγείρω puede traducirse como «resucitar» en español para expresar con claridad el acto divino de levantar a los muertos a la vida. Esta elección explicita el sentido contextualmente resurreccional que en inglés POB quedó con «raises».
theological_decisions:
- issue: Lenguaje de resurrección
  english_pob_reading: God raises the dead
  chosen_spanish_reading: Dios resucita a los muertos
  alternative_spanish_readings:
  - Dios levanta a los muertos
  - Dios hace resucitar a los muertos
  rationale: El pasaje afirma la capacidad divina de dar vida a los muertos. En español, «resucita» comunica de forma clara y reverente el sentido resurreccional de ἐγείρει sin perder la afirmación central.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor retórico de la pregunta
  english_pob_reading: Why is it judged unbelievable among you if God raises the dead?
  chosen_spanish_reading: ¿Por qué se juzga entre ustedes como increíble si Dios resucita a los muertos?
  alternative_spanish_readings:
  - ¿Qué se juzga como increíble entre ustedes si Dios resucita a los muertos?
  - ¿Por qué consideran increíble entre ustedes que Dios resucite a los muertos?
  rationale: La pregunta retórica no busca información sino impugnar la incredulidad. La redacción elegida conserva esa fuerza sin convertirla en una paráfrasis libre.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió el sentido del griego SBLGNT y el audit trail inglés, especialmente la observación de que τί aquí funciona de modo idiomático y retórico. La elección de «entre ustedes» refleja παρ’ ὑμῖν como ámbito de juicio; «resucita» explicita en español el sentido resurreccional de ἐγείρει, manteniendo el contenido doctrinal del texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se usa un español neutral y eclesialmente readable, sin arcaísmos innecesarios.
  - La nota al pie preserva la alternativa formal documentada en el inglés POB y la fuerza retórica del interrogativo.
