  source_alignment_summary: El borrador capta correctamente la estructura retórica de τί ... κρίνεται y refleja bien παρ’ ὑμῖν como «entre ustedes». También preserva el sentido de resurrección en ὁ θεὸς νεκροὺς ἐγείρει. Sin embargo, «se juzga entre ustedes como increíble» suena poco natural en español y añade una construcción («como») no exigida por el griego. Además, conviene evitar anclar la nota en «resucita[a]», ya que la alternativa documentada afecta a la apertura interrogativa τί, no al verbo ἐγείρει.
  spanish_quality_summary: La frase es comprensible, pero resulta algo rígida y menos idiomática de lo deseable para un español eclesial natural. «Se considera increíble entre ustedes» conserva mejor el valor pasivo/evaluativo de κρίνεται y fluye mejor que «se juzga ... como increíble». También es preferible mover la nota al inicio interrogativo, donde realmente recae la variante formal «¿Qué ...?»
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός -> «Dios» y νεκρούς -> «los muertos» están bien. La elección «resucita» para ἐγείρει es aceptable en este contexto de resurrección, aunque «levanta» sería más formalmente cercano al griego; no requiere cambio. La nota alternativa debe seguir documentando «¿Qué ...?» frente a «¿Por qué ...?»'
  issues:
