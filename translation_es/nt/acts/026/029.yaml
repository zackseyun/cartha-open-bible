revisions:
- from: 'Pero Pablo dijo[a]: «Yo pediría a Dios que, ya sea en poco tiempo o en mucho tiempo, no solo tú, sino también todos los que me oyen hoy, llegaran a ser tales como yo soy, excepto por estas cadenas».'
  to: 'Pero Pablo dijo[a]: «Yo oraría a Dios que, ya sea en poco tiempo o en mucho tiempo, no solo tú, sino también todos los que me oyen hoy, llegaran a ser tales como yo soy, salvo estas cadenas».'
  rationale: 'Se hacen dos reparaciones menores: «Yo oraría a Dios» expresa de forma más natural y fiel el deseo-oración de Εὐξαίμην ἂν τῷ θεῷ, y «salvo estas cadenas» refleja con más precisión la excepción marcada por παρεκτός. El resto del texto preserva bien el sentido del original y la justificación léxica documentada.'
