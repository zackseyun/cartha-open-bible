translation:
  language: es
  text: 'Pero Pablo dijo[a]: «Yo oraría a Dios que, ya sea en poco tiempo o en mucho tiempo, no solo tú, sino también todos los que me oyen hoy, llegaran a ser tales como yo soy, salvo estas cadenas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casi o del todo»; la expresión griega es difícil y puede referirse a grado, esfuerzo o tiempo/extensión.
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐξαίμην ἂν
  english_pob_choice: I would pray
  chosen_spanish: Yo pediría a Dios
  alternatives_spanish:
  - yo desearía
  - yo querría
  lexicon: BDAG
  rationale: El griego expresa un deseo formulado como oración o ruego; en español, «pediría a Dios» conserva el matiz optativo y hace explícita la dirección del verbo hacia Dios, como en el audit trail inglés.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  lexicon: BDAG
  rationale: El dativo con εὔχομαι indica el destinatario del ruego; «a Dios» es la forma más directa y natural en español.
- source_word: ἐν ὀλίγῳ καὶ ἐν μεγάλῳ
  english_pob_choice: whether in a short time or in a long time
  chosen_spanish: ya sea en poco tiempo o en mucho tiempo
  alternatives_spanish:
  - ya sea con poco o con mucho
  - ya sea casi o del todo
  lexicon: BDAG
  rationale: La expresión es difícil y admite varias lecturas. Se eligió una formulación temporal amplia que preserva la indeterminación del griego sin forzar la alternativa tradicional «casi o del todo».
- source_word: οὐ μόνον σὲ ἀλλὰ καὶ πάντας τοὺς ἀκούοντάς μου σήμερον
  english_pob_choice: not only you but also all who hear me today
  chosen_spanish: no solo tú, sino también todos los que me oyen hoy
  alternatives_spanish:
  - no solo tú, sino también todos los que me escuchan hoy
  lexicon: BDAG
  rationale: Se mantiene el contraste enfático y el participio presente con una traducción natural y precisa en español.
- source_word: γενέσθαι
  english_pob_choice: might become
  chosen_spanish: llegaran a ser
  alternatives_spanish:
  - llegasen a ser
  - pudieran llegar a ser
  lexicon: BDAG
  rationale: El infinitivo aoristo en la construcción de deseo expresa resultado querido; «llegaran a ser» comunica ese cambio de estado de manera idiomática.
- source_word: τοιούτους ὁποῖος καὶ ἐγώ εἰμι
  english_pob_choice: such as I am
  chosen_spanish: tales como yo soy
  alternatives_spanish:
  - como yo soy
  - de la clase que yo soy
  lexicon: BDAG
  rationale: La frase conserva la auto-referencia de Pablo con un grado de formalidad acorde al registro del pasaje.
- source_word: παρεκτὸς τῶν δεσμῶν τούτων
  english_pob_choice: except for these chains
  chosen_spanish: excepto por estas cadenas
  alternatives_spanish:
  - salvo por estas cadenas
  - excepto estas cadenas
  lexicon: BDAG
  rationale: παρεκτός introduce excepción; «cadenas» traduce δεσμοί de forma concreta y concorde con el contexto de prisión.
theological_decisions:
- issue: Interpretación de ἐν ὀλίγῳ καὶ ἐν μεγάλῳ
  english_pob_reading: 'Rendered as a broad contrast of duration/extent: ''whether in a short time or in a long time.'''
  chosen_spanish_reading: 'Se vierte como un contraste amplio de duración: «ya sea en poco tiempo o en mucho tiempo».'
  alternative_spanish_readings:
  - «casi o del todo»
  - «con poco esfuerzo o con mucho esfuerzo»
  rationale: La frase es debatida y el pasaje no exige una resolución doctrinal. La traducción principal conserva una lectura plausible y las alternativas quedan documentadas para no borrar la tensión del original.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje se mantuvo estable respecto del último pase revisado; la única corrección aplicada fue anclar la nota alternativa mediante el marcador [a] dentro del texto español, para cumplir la validación.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεῷ, coherente con el estándar del proyecto.
  - Se traduce δεσμοί como «cadenas» por concreción contextual, en línea con el inglés auditado.
  - Se evita resolver de forma cerrada la expresión ἐν ὀλίγῳ καὶ ἐν μεγάλῳ, dejando registrada la ambigüedad en nota.
  - El registro español es formal y eclesial, pero no arcaizante.
