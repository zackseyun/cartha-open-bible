translation:
  language: es
  text: En relación con esto[a], mientras iba de camino a Damasco con autoridad y una comisión de parte de los principales sacerdotes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «En las cuales cosas», refiriéndose a las acciones e intenciones previas de Pablo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν οἷς
  english_pob_choice: In this connection
  chosen_spanish: En esta circunstancia
  alternatives_spanish:
  - En relación con esto
  - En esta conexión
  - En estas cosas
  lexicon: BDAG
  rationale: El giro griego es anafórico y remite a las acciones e intenciones anteriores de Saulo. En español, «En esta circunstancia» conserva ese enlace retrospectivo sin sonar tan literal ni tan oscuro como «En estas cosas». Mantiene el valor de conexión contextual que documenta la traducción inglesa.
- source_word: πορευόμενος
  english_pob_choice: as I was traveling
  chosen_spanish: mientras iba de camino
  alternatives_spanish:
  - mientras viajaba
  - mientras viajaba hacia
  - yendo
  lexicon: BDAG
  rationale: El participio presente contemporáneo se expresa de forma natural con una subordinada temporal. «Iba de camino» comunica el movimiento narrativo hacia Damasco sin introducir un matiz demasiado moderno o técnico como «viajaba».
- source_word: εἰς τὴν Δαμασκὸν
  english_pob_choice: to Damascus
  chosen_spanish: a Damasco
  alternatives_spanish:
  - hacia Damasco
  - hasta Damasco
  lexicon: BDAG
  rationale: Con un nombre de ciudad, εἰς se vierte de modo natural como «a». «A Damasco» preserva la sencillez idiomática y la dirección del movimiento.
- source_word: μετ’ ἐξουσίας
  english_pob_choice: with authority
  chosen_spanish: con autoridad
  alternatives_spanish:
  - con poder
  - con autorización
  lexicon: BDAG
  rationale: ἐξουσία designa autoridad delegada, no mera fuerza. «Con autoridad» mantiene el sentido oficial y evita diluirlo en «poder», que en español puede sonar más físico o general.
- source_word: ἐπιτροπῆς
  english_pob_choice: a commission
  chosen_spanish: una comisión
  alternatives_spanish:
  - un encargo
  - una autorización
  - un mandato
  lexicon: BDAG
  rationale: En este contexto, ἐπιτροπή expresa una misión o encargo formal recibido. «Una comisión» conserva el matiz institucional y funciona bien en paralelo con «autoridad».
- source_word: τῆς τῶν ἀρχιερέων
  english_pob_choice: from the chief priests
  chosen_spanish: de parte de los sumos sacerdotes
  alternatives_spanish:
  - de los sumos sacerdotes
  - procedente de los sumos sacerdotes
  lexicon: BDAG
  rationale: Aunque el griego es genitivo, el sentido contextual es de procedencia/origen de la autoridad y la comisión. «De parte de» expresa esa procedencia en español de forma natural. «Sumos sacerdotes» reproduce el valor colegiado de ἀρχιερεῖς en este marco judío del Segundo Templo.
theological_decisions:
- issue: Relación entre Ἐν οἷς y los hechos previos de Pablo
  english_pob_reading: In this connection
  chosen_spanish_reading: En esta circunstancia
  alternative_spanish_readings:
  - En relación con esto
  - En estas cosas
  - En esta conexión
  rationale: 'La frase no introduce una doctrina, pero sí una relación discursiva importante: el texto se apoya en los actos y propósitos previos de Saulo. El español elegido conserva la anáfora sin forzar una literalidad opaca.'
  doctrine_reference: Coherencia discursiva y contexto narrativo en Hechos 26
- issue: Naturaleza de la comisión recibida de los líderes sacerdotales
  english_pob_reading: with authority and a commission from the chief priests
  chosen_spanish_reading: con autoridad y una comisión de parte de los sumos sacerdotes
  alternative_spanish_readings:
  - con autoridad y un encargo de parte de los sumos sacerdotes
  - con autoridad y un mandato de parte de los sumos sacerdotes
  rationale: El texto destaca que la persecución de Saulo no era iniciativa privada sino una acción oficialmente respaldada por la jerarquía sacerdotal. «Comisión» mantiene ese carácter formal sin añadir detalles que el griego no explicita.
  doctrine_reference: Autoridad religiosa y persecución en el relato de conversión de Hechos 26
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa muestran acuerdo alto y sin revisiones aplicadas. La versión española mantiene esa lectura estable, conservando la relación anafórica de Ἐν οἷς y la dupla oficial «autoridad / comisión» sin introducir variación textual innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Damasco» sin artículo, según uso natural en español.
  - Se usa «sumos sacerdotes» para reflejar el plural colegiado ἀρχιερεῖς.
  - Se conserva «autoridad» para ἐξουσία y «comisión» para ἐπιτροπή, evitando fusionar ambos matices.
  - La puntuación deja la oración abierta con coma final porque el versículo continúa en la línea siguiente del contexto narrativo.
