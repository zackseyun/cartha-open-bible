translation:
  language: es
  text: Por todas las cosas de las que soy acusado por los judíos, rey Agripa, me considero afortunado[a] de estar hoy a punto de presentar mi defensa ante ti,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichoso»; aquí el sentido probablemente es «afortunado» o «privilegiado» en el marco de una defensa legal ante Agripa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ πάντων ὧν
  english_pob_choice: Concerning all the things of which
  chosen_spanish: En cuanto a todo lo que
  alternatives_spanish:
  - Acerca de todo lo que
  - Respecto de todo aquello que
  lexicon: BDAG
  rationale: περί con genitivo introduce el asunto del que se habla. En español, «en cuanto a todo lo que» conserva la relación amplia y formal sin sonar forzado; evita una calca demasiado pesada de «de lo cual».
- source_word: ἐγκαλοῦμαι
  english_pob_choice: I am accused
  chosen_spanish: soy acusado
  alternatives_spanish:
  - estoy acusado
  - se me acusa
  lexicon: BDAG
  rationale: El verbo pasivo expresa una acusación formal en contexto judicial. «Soy acusado» mantiene esa fuerza forense de modo claro y sobrio; «se me acusa» es posible, pero cambia más la construcción.
- source_word: ὑπὸ Ἰουδαίων
  english_pob_choice: by the Jews
  chosen_spanish: por los judíos
  alternatives_spanish:
  - por judíos
  - por el pueblo judío
  lexicon: BDAG
  rationale: ὑπό marca agente. «Los judíos» refleja el referente contextual de los acusadores inmediatos sin convertirlo en una generalización étnica; «el pueblo judío» suaviza demasiado el tono jurídico.
- source_word: βασιλεῦ Ἀγρίππα
  english_pob_choice: King Agrippa
  chosen_spanish: rey Agripa
  alternatives_spanish:
  - oh rey Agripa
  - Rey Agripa
  lexicon: BDAG
  rationale: El vocativo directo se conserva con el título y el nombre propios en forma natural en español. «Rey Agripa» suena adecuado en discurso directo; no hace falta añadir «oh».
- source_word: ἥγημαι ἐμαυτὸν
  english_pob_choice: I consider myself
  chosen_spanish: me considero
  alternatives_spanish:
  - me tengo por
  - me juzgo
  lexicon: BDAG
  rationale: ἡγέομαι con acusativo reflexivo expresa una evaluación personal. «Me considero» es la solución española más clara y fiel; el sujeto implícito y el reflexivo se entienden sin añadir ruido.
- source_word: μακάριον
  english_pob_choice: fortunate
  chosen_spanish: dichoso
  alternatives_spanish:
  - afortunado
  - bienaventurado
  lexicon: BDAG
  rationale: En este contexto forense, el matiz es de privilegio o favorable oportunidad, no de bendición litúrgica. «Dichoso» comunica esa valoración personal con dignidad; «bienaventurado» sería demasiado teológico y «afortunado» más secular.
- source_word: ἐπὶ σοῦ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: BDAG
  rationale: ἐπί con genitivo puede indicar comparecencia ante una autoridad. «Delante de ti» suena natural en español y conserva el sentido de comparecer ante Agripa en audiencia.
- source_word: μέλλων
  english_pob_choice: I am about to
  chosen_spanish: de poder
  alternatives_spanish:
  - estando a punto de
  - por estar a punto de
  lexicon: BDAG
  rationale: μέλλω marca inminencia o proximidad de la acción. Al integrarlo con el infinitivo, «de poder defenderme» en español fluye mejor dentro de la frase y mantiene la idea de una acción inminente.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  lexicon: BDAG
  rationale: σήμερον es simplemente temporal. «Hoy» es la equivalencia directa, natural y sin arcaísmo.
- source_word: ἀπολογεῖσθαι
  english_pob_choice: make my defense
  chosen_spanish: defenderme
  alternatives_spanish:
  - presentar mi defensa
  - hacer mi defensa
  lexicon: BDAG
  rationale: ἀπολογέομαι es un término forense para responder en defensa propia. «Defenderme» comunica esa función jurídica de manera idiomática en español; «presentar mi defensa» sería más explícito pero menos directo.
translation_notes:
  revision_awareness: 'El griego y el contexto judicial concuerdan con la lectura de la edición inglesa auditada: perí + genitivo como tema del discurso, ἐγκαλοῦμαι como acusación formal, μακάριον como privilegio/favor en una audiencia legal, y ἀπολογεῖσθαι como defensa forense. No se requieren revisiones respecto del pase inglés más reciente.'
  spanish_consistency_notes:
  - 'Se mantiene una terminología jurídica sobria: «acusado», «defenderme», «delante de ti».'
  - Se evita «Cristo» o vocabulario doctrinal ajeno al versículo.
  - «Dichoso» conserva el matiz contextual de privilegio sin imponer bendición religiosa.
  - La puntuación reproduce una sola cláusula continua, como en el griego, con la vocativa intercalada.
