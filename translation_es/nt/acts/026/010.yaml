revisions:
- from: 'Y esto es lo que hice en Jerusalén: yo encerré en prisiones[a] a muchos de los santos, habiendo recibido de los principales sacerdotes la autoridad; y, cuando ellos eran llevados a la muerte, yo di mi voto en contra de ellos[b].'
  to: 'Y esto es lo que hice en Jerusalén: no solo encerré en cárceles a muchos de los santos, habiendo recibido autoridad de los principales sacerdotes, sino que también, cuando eran condenados a muerte, di mi voto contra ellos[a].'
  rationale: Se ajustó el texto para reflejar explícitamente la correlación griega τε...τε con 'no solo... sino también'; se reemplazó 'eran llevados a la muerte' por 'eran condenados a muerte' para un español más natural y suficientemente cercano al sentido de 'being put to death' sin resolver en exceso el marco jurídico; se simplificó 'recibido de los principales sacerdotes la autoridad' a 'recibido autoridad de los principales sacerdotes'; se cambió 'prisiones' por 'cárceles' por mayor naturalidad en español. También se corrigieron las notas para alinearlas con el audit trail documentado, conservando la nota léxica sobre ψῆφος y eliminando la nota no necesaria sobre 'santos'.
  reviewer_model: gpt-5.4
