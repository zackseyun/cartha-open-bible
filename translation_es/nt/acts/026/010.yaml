  text: ὃ καὶ ἐποίησα ἐν Ἱεροσολύμοις, καὶ πολλούς ⸀τε τῶν ἁγίων ἐγὼ ⸀ἐν φυλακαῖς κατέκλεισα τὴν παρὰ τῶν ἀρχιερέων ἐξουσίαν λαβών, ἀναιρουμένων τε αὐτῶν κατήνεγκα ψῆφον,
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/010.yaml
  text: 'And this is what I did in Jerusalem: I not only locked up many of the saints in prisons[a], having received authority from the chief priests, but also, when they were being put to death[b], I cast my vote against them.'
  footnotes:
  - marker: a
    text: Or 'I gave my vote against them.' The Greek literally refers to bringing or casting a 'vote' (ψῆφος).
    reason: lexical_alternative
  - marker: b
    text: '''Saints'' here means the holy people of God, that is, believers in Jesus.'
    reason: lexical_alternative
