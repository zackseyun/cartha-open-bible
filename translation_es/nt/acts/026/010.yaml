    text: 'O: “di mi voto contra ellos”. El griego literalmente se refiere a presentar o emitir un “voto” (ψῆφος).'
    reason: lexical_alternative
  revision_rationale: Se ajustó el texto para reflejar explícitamente la correlación griega τε...τε con 'no solo... sino también'; se reemplazó 'eran llevados a la muerte' por 'eran condenados a muerte' para un español más natural y suficientemente cercano al sentido de 'being put to death' sin resolver en exceso el marco jurídico; se simplificó 'recibido de los principales sacerdotes la autoridad' a 'recibido autoridad de los principales sacerdotes'; se cambió 'prisiones' por 'cárceles' por mayor naturalidad en español. También se corrigieron las notas para alinearlas con el audit trail documentado, conservando la nota léxica sobre ψῆφος y eliminando la nota no necesaria sobre 'santos'.
