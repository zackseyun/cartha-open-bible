    changes_summary: Adjusted the opening to more directly reflect ὃ καὶ ἐποίησα ('And this is what I did'). Recast 'not only' placement for smoother English while preserving the correlative τε...τε structure with 'but also.' No substantive lexical changes beyond improving fidelity and flow.
translation:
  language: es
  text: 'Y esto es lo que hice en Jerusalén: no solo encerré en cárceles a muchos de los santos, habiendo recibido autoridad de los principales sacerdotes, sino que también, cuando eran condenados a muerte, di mi voto contra ellos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “di mi voto contra ellos”. El griego literalmente se refiere a presentar o emitir un “voto” (ψῆφος).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ καὶ ἐποίησα
  english_pob_choice: And this is what I did
  chosen_spanish: Y esto es lo que hice
  alternatives_spanish:
  - Y eso fue lo que hice
  - Y esto también hice
  lexicon: BDAG
  rationale: La cláusula resumptiva en español fluye mejor como 'Y esto es lo que hice', manteniendo el retroceso al relato previo sin volverla innecesariamente rígida.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Es el equivalente directo y natural del topónimo en español.
- source_word: πολλούς τε τῶν ἁγίων
  english_pob_choice: many of the saints
  chosen_spanish: a muchos de los santos
  alternatives_spanish:
  - a muchos de los santos de Dios
  - a muchos de los santos/los consagrados
  lexicon: BDAG
  rationale: '''Santos'' conserva el valor lexical de ἅγιοι en Hechos para los creyentes, sin convertirlo en un sentido devocional posterior.'
- source_word: ἐν φυλακαῖς κατέκλεισα
  english_pob_choice: I not only locked up ... in prisons
  chosen_spanish: encerré en prisiones
  alternatives_spanish:
  - metí en prisión
  - encerré en cárceles
  lexicon: BDAG
  rationale: '''Encerré'' reproduce bien la fuerza de κατακλείω (''confinar, encerrar'') y ''prisiones'' mantiene el plural explícito de φυλακαῖς, como en el inglés POB.'
- source_word: τὴν παρὰ τῶν ἀρχιερέων ἐξουσίαν λαβών
  english_pob_choice: having received authority from the chief priests
  chosen_spanish: habiendo recibido de los principales sacerdotes la autoridad
  alternatives_spanish:
  - habiendo obtenido autorización de los principales sacerdotes
  - con autoridad de los principales sacerdotes
  lexicon: BDAG
  rationale: '''Autoridad'' traduce ἐξουσία de manera directa. ''Principales sacerdotes'' sigue la convención ya establecida para ἀρχιερεῖς.'
- source_word: ἀναιρουμένων τε αὐτῶν
  english_pob_choice: when they were being put to death
  chosen_spanish: cuando ellos eran llevados a la muerte
  alternatives_spanish:
  - cuando los estaban matando
  - cuando eran ejecutados
  lexicon: BDAG
  rationale: La formulación evita sobreespecificar el marco legal y conserva el sentido de muerte causada/ocasionada, en línea con la cautela del inglés POB.
- source_word: κατήνεγκα ψῆφον
  english_pob_choice: I cast my vote against them
  chosen_spanish: yo di mi voto en contra de ellos
  alternatives_spanish:
  - yo emití mi voto en contra de ellos
  - yo lancé mi voto contra ellos
  lexicon: BDAG
  rationale: '''Di mi voto'' comunica el acto de votar en un español claro y natural; ''en contra de ellos'' explicita el sentido hostil que el contexto requiere. ''Voto'' preserva ψῆφος en su valor concreto de voto/piedra de votación.'
theological_decisions:
- issue: Sentido de ἅγιοι en Hechos
  english_pob_reading: Rendered as 'saints' referring to believers
  chosen_spanish_reading: Traducido como 'santos' para los creyentes en Jesús
  alternative_spanish_readings:
  - los santos/los consagrados
  - el pueblo santo de Dios
  rationale: Mantener 'santos' preserva la continuidad léxica del NT y evita leer el término como una categoría posterior de canonización.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Fuerza de κατήνεγκα ψῆφον
  english_pob_reading: Personal participation in voting against condemned believers
  chosen_spanish_reading: Participación personal mediante un voto en contra
  alternative_spanish_readings:
  - simple aprobación sin voto formal
  - emití un voto formal contra ellos
  rationale: El español conserva la idea concreta de un voto emitido por Pablo, sin fijar más de lo que el texto dice sobre el escenario institucional exacto.
  doctrine_reference: Translation philosophy §1 (original-language primacy) y §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, especialmente el inicio resumptivo ('And this is what I did') y la correlación 'not only ... but also'. La redacción española mantiene el plural de 'prisiones', la autoridad proveniente de los principales sacerdotes y el valor concreto de ψῆφος como voto, sin suavizar la dureza del relato.
  spanish_consistency_notes:
  - Se conserva 'santos' como término técnico para creyentes, en continuidad con el uso del NT.
  - '''Principales sacerdotes'' se mantiene para ἀρχιερεῖς por consistencia con el registro bíblico español.'
  - '''Autoridad'' se usa para ἐξουσία en sentido de permiso/poder delegado, no como ''licencia'' ni ''facultad'' porque el contexto enfatiza la investidura recibida.'
  - '''Voto'' mantiene la concreción de ψῆφος; no se reduce a ''opinión'' o ''aprobación''.'
