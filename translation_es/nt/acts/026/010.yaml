review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en gran medida la estructura y el sentido del griego: la cláusula resumptiva inicial, el encierro de muchos de los santos, la autoridad recibida de los principales sacerdotes y la participación personal de Pablo mediante un voto. Sin embargo, omite en el texto principal la correlación enfática τε...τε (''no solo... sino también''), y la nota a pie está desalineada: el marcador [a] está anclado en ''prisiones'', pero la nota explica una alternativa de ''encerré en cárceles''; además, la nota [b] en español explica ''santos'', mientras que en el inglés auditado la nota sobre el voto pertenece a ψῆφος y no se preservó nota sobre ''santos''. También ''eran llevados a la muerte'' es menos fiel y menos natural que ''eran condenados a muerte'' o ''los estaban matando / eran ejecutados''; conviene una formulación que preserve ''put to death'' sin sobreespecificar demasiado.'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede mejorarse para sonar más natural y preciso. 'Encerré en prisiones' es comprensible, aunque 'encerré ... en cárceles' suena más idiomático en español bíblico general. 'Habiendo recibido de los principales sacerdotes la autoridad' es aceptable, pero fluye mejor como 'habiendo recibido autoridad de los principales sacerdotes'. La frase 'cuando ellos eran llevados a la muerte' suena forzada en español; 'cuando los condenaban a muerte' o 'cuando eran ejecutados' sería más natural. También conviene reflejar el paralelismo griego con 'no solo... sino también'.
  glossary_alignment: 'La terminología clave está mayormente alineada: ἅγιοι -> ''santos''; ἀρχιερεῖς -> ''principales sacerdotes''; ἐξουσία -> ''autoridad''; ψῆφος -> ''voto''. No hay conflicto con los glosarios del proyecto. La principal corrección necesaria es de presentación y fidelidad discursiva, no de glosario.'
  issues:
  - severity: medium
    issue: Falta en el texto principal la correlación 'no solo... sino también'
    rationale: El griego usa τε...τε y el inglés POB lo refleja con 'not only ... but also'. El borrador español enumera acciones sin conservar esa relación enfática, lo que reduce la fidelidad discursiva.
  - severity: medium
    issue: La frase 'cuando ellos eran llevados a la muerte' es poco natural y algo imprecisa
    rationale: ἀναιρουμένων αὐτῶν significa que estaban siendo muertos / puestos a muerte. 'Llevados a la muerte' no es la mejor representación en español y suena forzada.
  - severity: high
    issue: Las notas a pie no siguen bien el rastro auditado ni su anclaje textual
    rationale: El marcador [a] está colocado en 'prisiones' pero la nota comenta una alternativa que afecta a toda la expresión verbal. Además, el inglés auditado preserva una nota léxica sobre ψῆφος, mientras que el español pone una nota sobre 'santos' y no sobre 'voto', alterando el enfoque documentado.
  revised_spanish_text: 'Y esto es lo que hice en Jerusalén: no solo encerré en cárceles a muchos de los santos, habiendo recibido autoridad de los principales sacerdotes, sino que también, cuando eran condenados a muerte, di mi voto contra ellos[a].'
  revised_footnotes:
