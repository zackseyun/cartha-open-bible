translation:
  language: es
  text: librándote del pueblo y de los gentiles[a], a quienes yo te envío
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescatándote del pueblo judío y de los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαιρούμενός
  english_pob_choice: delivering
  chosen_spanish: librándote
  alternatives_spanish:
  - rescatándote
  - librándote de
  lexicon: BDAG
  rationale: El participio presente medio de ἐξαιρέω expresa una acción continua de librar o rescatar. «Librándote» conserva la idea de ser sacado de un peligro o poder hostil sin sonar tan técnico como «rescatándote».
- source_word: τοῦ λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo judío
  - Israel
  lexicon: BDAG
  rationale: En el contraste con «los gentiles», λαός se refiere de manera natural al pueblo judío, pero el griego no lo explicita. «El pueblo» preserva esa forma más literal en el texto principal.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En el marco judío-gentil de Hechos, ἔθνη designa normalmente a los no judíos. «Los gentiles» comunica ese sentido contextual de forma natural en español.
- source_word: εἰς οὓς
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - entre quienes
  lexicon: BDAG
  rationale: Aunque εἰς con relativo puede ser más literal como «a los cuales» o «hacia quienes», en este envío la función idiomática se expresa mejor en español con «a quienes».
- source_word: ἀποστέλλω
  english_pob_choice: I am sending
  chosen_spanish: yo te envío
  alternatives_spanish:
  - yo te estoy enviando
  - yo te mando
  lexicon: BDAG
  rationale: El presente griego puede reflejar inmediatez de comisión. «Yo te envío» suena natural en español y conserva la fuerza del encargo actual sin añadir una perífrasis innecesaria.
theological_decisions:
- issue: Referencia de «el pueblo» frente a «los gentiles»
  english_pob_reading: Retains 'the people' in the main text, with the understood referent being the Jewish people.
  chosen_spanish_reading: Se mantiene «el pueblo» en el texto principal, con el referente implícito al pueblo judío.
  alternative_spanish_readings:
  - «el pueblo judío»
  - «Israel»
  rationale: El contraste con «los gentiles» hace claro el referente, pero el griego dice simplemente «el pueblo». Mantener la forma breve preserva la tensión/ambigüedad controlada del original sin introducir una glosa interpretativa en el cuerpo principal.
  doctrine_reference: Primacía del texto original; conservar ambigüedad significativa cuando el griego la deja abierta.
translation_notes:
  revision_awareness: El cotejo de revisión disponible indica que no hubo cambios necesarios y que la concordancia general con el audit trail es alta; esta versión sigue la decisión principal de mantener en el cuerpo el contraste literal «el pueblo / los gentiles» y reservar la especificación «judío» para nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de ἔθνη como «gentiles» en un contraste judío-gentil.
  - Se conserva el referente implícito de «el pueblo» sin explicitarlo en el texto principal.
  - La forma verbal «yo te envío» refleja el presente de comisión sin forzar una paráfrasis más larga.
