translation:
  language: es
  text: 'Y después de retirarse, hablaban entre sí, diciendo: «Este hombre no hace nada digno de muerte o de prisión[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de cadenas». El griego δεσμῶν significa literalmente «lazos/cadenas», pero aquí probablemente se refiere a prisión o custodia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναχωρήσαντες
  english_pob_choice: after they withdrew
  chosen_spanish: después de retirarse
  alternatives_spanish:
  - después de apartarse
  - después de haberse retirado
  lexicon: BDAG
  rationale: El participio aoristo indica que se apartaron del lugar antes de la acción principal. «Retirarse» conserva el sentido de apartarse del contexto público sin sobrecargar el texto.
- source_word: ἐλάλουν
  english_pob_choice: they were speaking
  chosen_spanish: hablaban
  alternatives_spanish:
  - estaban hablando
  - decían
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso; «hablaban» lo reproduce con naturalidad en español.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos a otros
  - el uno al otro
  lexicon: BDAG
  rationale: Es una expresión recíproca idiomática; «entre sí» resulta natural y comunica la reciprocidad del diálogo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Introduce el contenido del habla de manera directa y concisa, sin alterar el flujo sintáctico.
- source_word: Οὐδὲν ... ἄξιον
  english_pob_choice: nothing worthy
  chosen_spanish: nada digno
  alternatives_spanish:
  - nada merecedor
  - nada que merezca
  lexicon: BDAG
  rationale: La construcción expresa que no hay nada que merezca las penas mencionadas. «Digno» conserva bien la fuerza evaluativa de ἄξιον.
- source_word: θανάτου ἢ δεσμῶν
  english_pob_choice: of death or imprisonment
  chosen_spanish: de muerte o de prisión
  alternatives_spanish:
  - de muerte o de cadenas
  - de muerte o de cautiverio
  lexicon: BDAG
  rationale: θανάτου se refiere a la pena capital. δεσμῶν puede ser literalmente «cadenas», pero en este contexto judicial el sentido es detención/custodia; «prisión» comunica mejor ese valor sin perder la tensión textual, que queda reflejada en la nota.
- source_word: τι πράσσει
  english_pob_choice: is doing
  chosen_spanish: hace
  alternatives_spanish:
  - está haciendo
  - obra
  lexicon: BDAG
  rationale: El presente aquí describe la conducta de este hombre de forma general. «Hace» es natural en español y suficientemente amplio para πράσσει.
- source_word: ὁ ἄνθρωπος οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - esta persona
  lexicon: BDAG
  rationale: Masculino singular referido específicamente a Pablo. «Este hombre» conserva el referente y la naturalidad del español.
translation_notes:
  revision_awareness: Se corrigió el fallo previo asegurando que el marcador de nota [a] aparezca exactamente en el texto español en el lugar correspondiente y que no haya notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y público, apto para lectura eclesial.
  - Se evitó una traducción demasiado literal de δεσμῶν en el cuerpo principal, pero se preservó la alternativa literal en nota para reflejar la tensión léxica documentada.
  - La puntuación y las comillas siguen el uso normativo del español.
