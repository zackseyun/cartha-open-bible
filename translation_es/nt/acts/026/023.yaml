- from: que el Mesías[a] padecería, y que, como el primero en resucitar de entre los muertos[d], anunciaría luz[b][c] tanto al pueblo como a las naciones.
  to: que el Mesías[a] padecería, y que, como el primero en resucitar de entre los muertos[d], anunciaría luz[b] tanto al pueblo como a los gentiles[c].
  rationale: 'Se revisa el texto principal para alinear ἔθνεσιν con la decisión auditada del POB: ''gentiles'' en el texto y ''naciones'' como alternativa en nota. También se normaliza la nota a al español y se ajusta la nota d para reflejar mejor su función de redacción alternativa previa. El resto del versículo es fiel, natural y teológicamente sobrio.'
