  text: εἰ παθητὸς ὁ χριστός, εἰ πρῶτος ἐξ ἀναστάσεως νεκρῶν φῶς μέλλει καταγγέλλειν τῷ ⸀τε λαῷ καὶ τοῖς ἔθνεσιν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/023.yaml
  text: that the Messiah would suffer[a], and that, as the first to rise from the dead[d][c][b], he would proclaim light both to the people and to the Gentiles.
  footnotes:
