translation:
  language: es
  text: que el Mesías[a] padecería, y que, como el primero en resucitar de entre los muertos[d], anunciaría luz[b] tanto al pueblo como a los gentiles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Cristo'. Aquí Χριστός funciona como título mesiánico, por eso se traduce 'Mesías'.
    reason: alternative_reading
  - marker: b
    text: '''El pueblo'' aquí probablemente se refiere al pueblo judío, en contraste con ''los gentiles''.'
    reason: lexical_alternative
  - marker: c
    text: O 'a las naciones'. En este contexto, la frase suele referirse a las naciones no judías, es decir, a los gentiles.
    reason: lexical_alternative
  - marker: d
    text: O 'y que, como el primero en resucitar de entre los muertos, él anunciaría'.
    reason: previous_rendering
lexical_decisions:
- source_word: παθητὸς
  english_pob_choice: would suffer
  chosen_spanish: padecería
  alternatives_spanish:
  - sufriría
  - sería sujeto a sufrimiento
  - sería pasible de sufrimiento
  lexicon: BDAG
  rationale: El adjetivo comunica capacidad o destino de sufrir. En español, 'padecería' mantiene el valor verbal esperado en este contexto profético sin volverse filosófico o pesado.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título mesiánico, no como nombre fijo. 'Mesías' preserva esa fuerza titular en español y sigue la decisión documental del POB en inglés.
- source_word: πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - el primero en
  lexicon: BDAG
  rationale: Se conserva la prioridad explícita de la afirmación. 'El primero' suena natural en español y mantiene la idea de precedencia.
- source_word: ἐξ ἀναστάσεως νεκρῶν
  english_pob_choice: to rise from the dead
  chosen_spanish: resucitar de entre los muertos
  alternatives_spanish:
  - levantarse de entre los muertos
  - salir de la resurrección de entre los muertos
  lexicon: BDAG
  rationale: La frase griega es compacta y, en contexto, expresa resurrección entre los muertos. 'Resucitar de entre los muertos' es idiomático y fiel al alcance de la imagen.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - iluminación
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de 'luz', que sugiere revelación, salvación y esperanza sin estrechar el sentido.
- source_word: μέλλει καταγγέλλειν
  english_pob_choice: would proclaim
  chosen_spanish: anunciaría
  alternatives_spanish:
  - proclamaría
  - estaba por anunciar
  - estaba destinado a anunciar
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa futuro o intención/deber. 'Anunciaría' resulta natural en español y mantiene la proyección futura sin sugerir solo inminencia.
- source_word: τῷ τε λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - al pueblo judío
  lexicon: BDAG
  rationale: Se conserva el término genérico 'pueblo' para respetar el griego, dejando que el contraste con 'las naciones' sugiera el referente judío. Las alternativas más explícitas son interpretativas.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  lexicon: BDAG
  rationale: Se opta por 'naciones' para mantener la literalidad de ἔθνη. En notas se puede aclarar que, en este contraste, el sentido suele ser 'gentiles'.
- source_word: τε ... καὶ
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - así ... como
  - ambos ... y
  lexicon: LSJ
  rationale: La correlación se expresa de forma natural en español con 'tanto ... como', que mantiene el paralelismo de los destinatarios.
theological_decisions:
- issue: Título mesiánico de Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: La decisión mantiene el valor titulado del término en un contexto profético y evita convertirlo en un nombre litúrgico fijo sin necesidad textual.
  doctrine_reference: 'Translation philosophy #1; #5'
- issue: Prioridad de resurrección
  english_pob_reading: as the first to rise from the dead
  chosen_spanish_reading: como el primero en resucitar de entre los muertos
  alternative_spanish_readings:
  - como el primero de entre los muertos en resucitar
  - como el primer resucitado
  rationale: El griego afirma precedencia en resurrección sin desarrollar aquí toda la teología de primicias; la traducción conserva esa sobriedad.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Alcance de λαῷ frente a ἔθνεσιν
  english_pob_reading: to the people ... to the Gentiles
  chosen_spanish_reading: al pueblo ... a las naciones
  alternative_spanish_readings:
  - al pueblo judío ... a los gentiles
  - al pueblo de Israel ... a las naciones
  rationale: El texto mantiene el contraste del original. 'El pueblo' queda deliberadamente abierto, mientras 'las naciones' conserva el sentido básico de ἔθνη y su posible carga étnica se aclara en nota.
  doctrine_reference: 'Translation philosophy #1; #5'
translation_notes:
  revision_awareness: La versión inglesa más reciente afinó la paralela 'that... and that...' y añadió el sujeto explícito 'he'. En español se refleja esa misma estructura con dos proposiciones coordinadas dependientes de 'que', manteniendo la simetría y el sujeto implícito/recuperable sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se usó 'Mesías' conforme al criterio del proyecto para Χριστός como título.
  - '''Padecería'' conserva la fuerza de ''would suffer'' sin endurecer el español.'
  - '''Resucitar de entre los muertos'' mantiene la imagen de ἀνάστασις χωρίς añadir doctrinas ajenas al versículo.'
  - '''Naciones'' se eligió por fidelidad al griego, con nota para el sentido contextual de ''gentiles''.'
  - La puntuación reproduce las dos cláusulas paralelas del griego de forma clara y publicable.
