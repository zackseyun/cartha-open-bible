    text: O «¿aceptas a los profetas?» o «¿confías en los profetas?»
    reason: lexical_alternative
  revision_rationale: Se ajusta «creer en los profetas» a «les crees a los profetas» para reflejar mejor el valor de πιστεύω con dativo como dar crédito al testimonio de personas. Se antepone «Rey Agripa» para un vocativo español más natural al inicio de la oración. Se añade la nota léxica alternativa exigida por el rastro inglés. «Sé que sí les crees» mantiene la afirmación enfática de Pablo de forma idiomática en español.
