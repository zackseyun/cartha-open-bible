translation:
  language: es
  text: Rey Agripa[a], ¿les crees a los profetas? Sé que sí les crees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿aceptas a los profetas?» o «¿confías en los profetas?»
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύεις
  english_pob_choice: do you believe / you believe
  chosen_spanish: ¿Crees…? / crees
  alternatives_spanish:
  - ¿confías…? / confías
  - ¿das crédito a…? / das crédito a
  lexicon: BDAG
  rationale: El verbo πιστεύω en esta construcción con objeto personal/colectivo se entiende naturalmente como ‘creer’ o ‘dar crédito a’. En español, ‘creer’ comunica con claridad la aceptación de la testificación profética sin añadir matices de confianza personal que el contexto no exige.
- source_word: βασιλεῦ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - oh rey
  - rey Agripa
  lexicon: BDAG
  rationale: El vocativo de βασιλεύς se vierte de manera directa como ‘rey’. En español, el vocativo puede quedar natural sin ‘oh’; ‘rey Agripa’ mantiene la forma de tratamiento del griego sin arcaísmo excesivo.
- source_word: Ἀγρίππα
  english_pob_choice: Agrippa
  chosen_spanish: Agripa
  alternatives_spanish:
  - Agrippa
  lexicon: Transliteración estándar
  rationale: Se adapta el nombre propio a la forma corriente en español, ‘Agripa’, para fluidez y lectura eclesial amplia, sin alterar la identificación histórica.
- source_word: τοῖς προφήταις
  english_pob_choice: the prophets
  chosen_spanish: en los profetas
  alternatives_spanish:
  - a los profetas
  - los profetas
  lexicon: BDAG
  rationale: El dativo con πιστεύω puede expresar el contenido o el objeto al que se concede crédito. ‘Creer en los profetas’ conserva la referencia a su testimonio profético y resulta idiomático en español; no se sustituye por ‘escrituras proféticas’ porque el texto griego menciona a las personas/profetas, no una perífrasis textual.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Lo sé
  - Yo sé
  lexicon: BDAG
  rationale: La forma perfecta con sentido presente se traduce de manera breve y natural como ‘sé’, preservando la afirmación directa de Pablo sin sobrecargarla.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que tú
  - —
  lexicon: BDAG
  rationale: Conjunción estándar de contenido; ‘que’ es la equivalencia directa y clara en español.
theological_decisions:
- issue: Sentido de πιστεύω con 'los profetas'
  english_pob_reading: belief in the prophetic witnesses/scriptural testimony, not specifically obedience or generic religiosity
  chosen_spanish_reading: creer en los profetas como testigos proféticos dignos de crédito
  alternative_spanish_readings:
  - aceptar a los profetas
  - confiar en los profetas
  rationale: La frase mantiene la tensión del griego entre asentimiento y confianza testimonial sin resolverla hacia obediencia o mera religiosidad. ‘Creer en los profetas’ deja abierto que el énfasis está en admitir la veracidad de su testimonio.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de tensiones léxicas y teológicas documentadas.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior eliminando cualquier nota no anclada: esta versión no usa notas al pie, porque la opción principal ‘creer en los profetas’ ya recoge el sentido del griego sin necesidad de variante explícita en el texto.'
  spanish_consistency_notes:
  - Se mantiene ‘Agripa’ como transliteración española coherente con uso moderno.
  - Se usa ‘creer’ de forma consistente para πιστεύω cuando el contexto trata de aceptar testimonio o afirmación.
  - Se evita ‘Cristo’/‘Mesías’ y otros términos no presentes en este versículo.
  - La puntuación reproduce la fuerza retórica de dos preguntas/enunciados breves, conforme al griego.
