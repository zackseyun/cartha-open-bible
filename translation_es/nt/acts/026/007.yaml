source:
  edition: SBLGNT
  text: εἰς ἣν τὸ δωδεκάφυλον ἡμῶν ἐν ἐκτενείᾳ νύκτα καὶ ἡμέραν λατρεῦον ἐλπίζει καταντῆσαι· περὶ ἧς ἐλπίδος ἐγκαλοῦμαι ⸂ὑπὸ Ἰουδαίων, βασιλεῦ⸃·
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/007.yaml
  text: to which our twelve tribes hope to attain[a], as they earnestly serve God night and day. It is concerning this hope that I am accused by the Jews[c][b], O king.
  footnotes:
  - marker: a
    text: Or 'our nation of twelve tribes.' The Greek uses a collective singular, referring to Israel as the twelve-tribe people.
    reason: lexical_alternative
  - marker: b
    text: Or 'worship' for 'serve God'; the Greek verb can denote religious service or worship offered to God.
    reason: lexical_alternative
  - marker: c
    text: Or 'by Jewish people.' The Greek reads 'by Jews' in a legal-context description of Paul's accusers, not a statement about all Jews universally.
    reason: lexical_alternative
