translation:
  language: es
  text: a la cual nuestras doce tribus[a] esperan llegar, mientras sirven fervientemente a Dios noche y día[b]. Acerca de esta esperanza soy acusado por los judíos[c], oh rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "nuestro pueblo de doce tribus". El griego usa un singular colectivo para referirse a Israel como el pueblo de las doce tribus.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "adoran". El verbo griego puede denotar servicio religioso o culto ofrecido a Dios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "por judíos" o "por personas judías". El griego dice "por judíos" en un contexto legal, no como una afirmación universal sobre todos los judíos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν
  english_pob_choice: to which
  chosen_spanish: a la cual
  alternatives_spanish:
  - para la cual
  - hacia la cual
  lexicon: BDAG
  rationale: Conserva la relación direccional/meta de εἰς con el relativo y mantiene la referencia a la esperanza anterior sin forzar una paráfrasis.
- source_word: τὸ δωδεκάφυλον ἡμῶν
  english_pob_choice: our twelve tribes
  chosen_spanish: nuestras doce tribus
  alternatives_spanish:
  - nuestro pueblo de doce tribus
  - nuestra nación de doce tribus
  lexicon: BDAG
  rationale: El griego usa un singular colectivo; en español, el plural 'nuestras doce tribus' comunica de forma natural el conjunto de Israel sin perder la referencia a las tribus como pueblo.
- source_word: ἐν ἐκτενείᾳ
  english_pob_choice: earnestly
  chosen_spanish: fervientemente
  alternatives_spanish:
  - con fervor
  - con perseverancia
  - ardientemente
  lexicon: BDAG
  rationale: La idea es intensidad y constancia en el servicio religioso. 'Fervientemente' conserva el matiz de devoción intensa en un español digno y natural.
- source_word: νύκτα καὶ ἡμέραν
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - día y noche
  lexicon: BDAG
  rationale: Mantiene el orden del griego y la idea idiomática de continuidad constante.
- source_word: λατρεῦον
  english_pob_choice: serve God
  chosen_spanish: sirviendo a Dios
  alternatives_spanish:
  - adorando a Dios
  - rindiendo servicio sagrado a Dios
  lexicon: BDAG
  rationale: El verbo puede abarcar servicio religioso o culto. En este contexto, 'sirviendo a Dios' conserva el alcance cultual sin estrecharlo únicamente a 'adorar'.
- source_word: ἐλπίζει καταντῆσαι
  english_pob_choice: hope to attain
  chosen_spanish: esperan llegar
  alternatives_spanish:
  - esperan alcanzar
  - esperan arribar
  lexicon: BDAG
  rationale: καταντάω expresa llegar a una meta o alcanzar un destino. 'Llegar' funciona de manera natural en español; el contexto de esperanza permite entender el sentido de alcanzar la promesa.
- source_word: περὶ ἧς ἐλπίδος
  english_pob_choice: concerning this hope
  chosen_spanish: Por esta esperanza
  alternatives_spanish:
  - Acerca de esta esperanza
  - Con respecto a esta esperanza
  lexicon: BDAG
  rationale: La frase περί con genitivo puede ser 'acerca de' o, por contexto, 'a causa de'. 'Por esta esperanza' expresa bien la relación causal/legal que sigue en el verso, sin apartarse del referente explícito de la esperanza.
- source_word: ἐγκαλοῦμαι
  english_pob_choice: I am accused
  chosen_spanish: soy acusado
  alternatives_spanish:
  - estoy siendo acusado
  - se me acusa
  lexicon: BDAG
  rationale: El pasivo legal encaja con el marco judicial. 'Soy acusado' es directo y sobrio en español moderno.
- source_word: ὑπὸ Ἰουδαίων
  english_pob_choice: by Jews
  chosen_spanish: por los judíos
  alternatives_spanish:
  - por judíos
  - por el pueblo judío
  lexicon: BDAG
  rationale: La preposición marca al agente de la acusación. Se conserva 'los judíos' como en el audit trail inglés, con artículo natural en español, sin universalizar el juicio más allá del contexto legal.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: ¡oh rey!
  alternatives_spanish:
  - rey
  - ¡rey!
  lexicon: BDAG
  rationale: El vocativo se dirige formalmente a Agripa. '¡Oh rey!' reproduce el tono retórico y respetuoso del original.
theological_decisions:
- issue: Objeto implícito de λατρεῦον
  english_pob_reading: 'The English POB supplies ''God'' as the object: ''serve God'''
  chosen_spanish_reading: Se explicita 'a Dios' en el texto principal
  alternative_spanish_readings:
  - sirviendo
  - adorando
  - rindiendo servicio sagrado a Dios
  rationale: Aunque el griego no añade un objeto explícito, el contexto de devoción cultual de Israel lo presupone. En español, mencionar 'a Dios' evita ambigüedad y mantiene la lectura contextual sin imponer una glosa ajena.
  doctrine_reference: Translation philosophy §6 (claridad moderna sin perder el sentido cultual)
translation_notes:
  revision_awareness: Se siguió el audit trail en el que la revisión final prefirió 'our twelve tribes' y 'by the Jews'. En español se mantuvo el valor colectivo de τὸ δωδεκάφυλον ἡμῶν con 'nuestras doce tribus' y se conservó el agente judicial 'por los judíos' con nota aclaratoria. También se preservó la opción de hacer explícito el objeto divino de λατρεῦον, acorde con la lectura inglesa revisada.
  spanish_consistency_notes:
  - Se usó 'Dios' en lugar de una forma genérica o velada para respetar el objeto implícito del verbo cultual.
  - Se evitó 'Cristo' o terminología eclesiástica ajena al verso.
  - '''Noche y día'' mantiene la expresión adverbial continua del griego.'
  - El vocativo final se puntuó para reflejar la apelación directa al rey.
