translation:
  language: es
  text: Al mediodía, por el camino, vi, oh rey, una luz del cielo, más brillante que el sol, que brillaba[a] alrededor de mí y de los que viajaban conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá del resplandor del sol»; el griego destaca que la luz superaba el brillo del sol.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας μέσης
  english_pob_choice: At midday
  chosen_spanish: Al mediodía
  alternatives_spanish:
  - A mediodía
  - En pleno día
  lexicon: BDAG
  rationale: La construcción genitiva es idiomática para indicar la hora central del día. «Al mediodía» es natural en español y conserva la especificidad temporal sin añadir explicación.
- source_word: κατὰ τὴν ὁδὸν
  english_pob_choice: along the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - por el camino
  - a lo largo del camino
  lexicon: BDAG
  rationale: La frase describe la ubicación durante el viaje. «Junto al camino» suena natural en español y mantiene la escena concreta sin forzar una calca.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi claramente
  - divisé
  lexicon: BDAG
  rationale: El aoristo de percepción se traduce de forma directa. «Vi» es suficiente y fiel, sin añadir matices no exigidos por el griego.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: BDAG
  rationale: El vocativo dirige la palabra a Agripa. «Oh rey» conserva la forma de apelación formal y directa, adecuada al registro bíblico en español.
- source_word: οὐρανόθεν
  english_pob_choice: from heaven
  chosen_spanish: que venía del cielo
  alternatives_spanish:
  - del cielo
  - procedente del cielo
  lexicon: BDAG
  rationale: En Hechos, el adverbio tiene fuerza de origen celestial, no meramente atmosférico. En español, «del cielo» comunica bien esa procedencia; la relativa «que venía del cielo» integra con fluidez la oración y evita ambigüedad.
- source_word: ὑπὲρ τὴν λαμπρότητα τοῦ ἡλίου
  english_pob_choice: brighter than the sun
  chosen_spanish: más brillante que el sol
  alternatives_spanish:
  - más brillante que la luz del sol
  - más resplandeciente que el sol
  lexicon: BDAG
  rationale: ὑπέρ con acusativo expresa excedencia. La revisión inglesa optó por «brighter than the sun» como equivalente más natural; en español, «más brillante que el sol» refleja el mismo contraste sin repetir innecesariamente «brillo».
- source_word: περιλάμψαν
  english_pob_choice: shining around
  chosen_spanish: que resplandecía
  alternatives_spanish:
  - que brillaba alrededor
  - rodeándome de luz
  lexicon: BDAG
  rationale: El participio expresa la acción envolvente de la luz. «Que resplandecía» comunica el efecto visible en español de forma natural; el contexto ya deja claro que se trata de una iluminación envolvente, por lo que no es necesario repetir «alrededor» en la misma frase.
- source_word: φῶς
  english_pob_choice: a light
  chosen_spanish: una luz
  alternatives_spanish:
  - luz
  - un resplandor
  lexicon: BDAG
  rationale: El sustantivo anartro se vierte naturalmente con artículo indefinido en español. «Una luz» introduce el fenómeno observado de manera clara.
- source_word: τοὺς σὺν ἐμοὶ πορευομένους
  english_pob_choice: those traveling with me
  chosen_spanish: de los que viajaban conmigo
  alternatives_spanish:
  - de los que iban conmigo
  - de mis acompañantes
  lexicon: BDAG
  rationale: El participio presente con σύν describe a los compañeros de viaje de Pablo. «Los que viajaban conmigo» es fiel y claro; la preposición «de» se exige por la sintaxis española dentro de la coordinación con «mí».
theological_decisions:
- issue: Origen celestial de la luz en una visión/manifestación
  english_pob_reading: from heaven
  chosen_spanish_reading: que venía del cielo
  alternative_spanish_readings:
  - del cielo
  - procedente del cielo
  rationale: La escena es una revelación con lenguaje de procedencia celestial. «Del cielo» conserva la carga teológica sin convertir la frase en una explicación interpretativa más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Comparativo de excedencia frente al sol
  english_pob_reading: brighter than the sun
  chosen_spanish_reading: más brillante que el sol
  alternative_spanish_readings:
  - más brillante que la luz del sol
  - más resplandeciente que el sol
  rationale: El griego no dice solo que la luz era solar, sino que excedía la luminosidad del sol. «Más brillante que el sol» mantiene esa tensión sin sobrerrepetición; evita la expresión más pesada «más brillante que la brillantez del sol».
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: 'La base inglesa fue revisada para preferir una formulación más natural: de «brighter than the brightness of the sun» a «brighter than the sun». La presente versión española sigue esa misma simplificación natural sin perder el valor comparativo del griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término de proyecto cuando corresponda, aunque no aparece en este versículo.
  - «Cielo» se usa para οὐρανόθεν por la fuerza teológica de procedencia celestial, no como simple referencia meteorológica.
  - Se conservó un registro bíblico sobrio y contemporáneo, evitando giros arcaizantes innecesarios.
