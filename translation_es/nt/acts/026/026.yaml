  text: ἐπίσταται γὰρ περὶ τούτων ὁ βασιλεύς, πρὸς ὃν ⸀καὶ παρρησιαζόμενος λαλῶ· λανθάνειν γὰρ ⸀αὐτὸν τούτων οὐ πείθομαι ⸀οὐθέν, οὐ γάρ ⸀ἐστιν ἐν γωνίᾳ πεπραγμένον τοῦτο.
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/026.yaml
  text: For the king knows about these things[a], and I speak boldly to him. For I am persuaded that none of these things has escaped his notice[c][b], because this has not been done in a corner.
  footnotes:
  - marker: a
    text: Or 'I speak freely to him.' The Greek participle conveys frank, open, confident speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'nothing of these things is hidden from him' or 'has gone unnoticed by him.'
    reason: lexical_alternative
  - marker: c
    text: '''Not been done in a corner'' is an idiom meaning it was not done secretly or obscurely.'
    reason: cultural_note
