translation:
  language: es
  text: Porque el rey sabe acerca de estas cosas, y le hablo con valentía[a]. Pues estoy persuadido de que nada de esto le ha pasado inadvertido[b][c], porque esto no se ha hecho en un rincón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le hablo con franqueza». El participio griego comunica un habla abierta, confiada y sin reservas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nada de estas cosas le está oculto» o «nada de esto le ha pasado desapercibido».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «no se ha hecho en un rincón» es un modismo que significa que no se hizo en secreto ni de manera oscura.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπίσταται
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está al tanto de
  lexicon: BDAG
  rationale: ἐπίσταμαι expresa conocimiento o estar enterado. En español, «sabe» comunica de manera natural que el rey tiene conocimiento de los hechos sin agregar matices no presentes en el griego.
- source_word: περὶ τούτων
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - respecto de estas cosas
  lexicon: BDAG
  rationale: περί con genitivo marca el tema o referente. «Acerca de estas cosas» conserva ese sentido referencial de forma clara y formal.
- source_word: παρρησιαζόμενος
  english_pob_choice: speak boldly
  chosen_spanish: hablo con valentía
  alternatives_spanish:
  - hablo con franqueza
  - hablo abiertamente
  lexicon: BDAG
  rationale: El participio comunica franqueza confiada y sin temor. «Con valentía» preserva la audacia del habla mejor que una mera apertura formal.
- source_word: πρὸς ὃν ... λαλῶ
  english_pob_choice: I speak boldly to him
  chosen_spanish: hablo con él
  alternatives_spanish:
  - me dirijo a él
  - le hablo
  lexicon: BDAG
  rationale: La construcción señala a la persona a quien se dirige la palabra. El español mantiene la relación directa y natural sin forzar un calco sintáctico.
- source_word: λανθάνειν ... αὐτὸν
  english_pob_choice: has escaped his notice
  chosen_spanish: le ha pasado inadvertida
  alternatives_spanish:
  - le ha pasado desapercibida
  - le está oculta
  lexicon: BDAG
  rationale: 'λανθάνω aquí es idiomático: algo no notado por alguien. «Le ha pasado inadvertida» reproduce bien esa idea de no haber sido percibido, sin volverla demasiado técnica.'
- source_word: οὐ πείθομαι οὐθέν
  english_pob_choice: I am persuaded that none of these things
  chosen_spanish: estoy persuadido de que ninguna de estas cosas
  alternatives_spanish:
  - estoy convencido de que nada de esto
  - no creo que nada de esto
  lexicon: BDAG
  rationale: πείθομαι en voz media/pasiva expresa convicción. La formulación positiva en español conserva el sentido de certeza asentada, evitando una reconstrucción innecesariamente negativa.
- source_word: πεπραγμένον
  english_pob_choice: has been done
  chosen_spanish: se ha hecho
  alternatives_spanish:
  - ha sido hecho
  - se ha llevado a cabo
  lexicon: BDAG
  rationale: El participio perfecto de πράσσω apunta a una acción ya realizada. «Se ha hecho» es fiel, natural y suficientemente amplio para abarcar el acto referido.
- source_word: ἐν γωνίᾳ
  english_pob_choice: in a corner
  chosen_spanish: en un rincón
  alternatives_spanish:
  - en secreto
  - en un lugar oculto
  lexicon: BDAG
  rationale: La imagen espacial se conserva de modo directo. «En un rincón» preserva el color idiomático del griego, que alude a algo hecho sin publicidad.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: BDAG
  rationale: El demostrativo es amplio y no especifica más de lo que el texto da. «Esto» mantiene esa amplitud y evita precisar indebidamente el alcance.
theological_decisions:
- issue: Alcance de «esto» y carácter público de los hechos
  english_pob_reading: Render neutrally as a public, well-known set of events without specifying more than the text states.
  chosen_spanish_reading: Traducir de manera neutra como un conjunto de hechos públicamente conocidos, sin concretar más de lo que el versículo dice.
  alternative_spanish_readings:
  - Entenderlo solo de la muerte y resurrección de Jesús
  - Entenderlo de todo el movimiento cristiano y del caso de Pablo
  rationale: El griego sugiere hechos públicamente visibles y no ocultos, pero no delimita con precisión su alcance. La traducción mantiene esa amplitud y no resuelve la tensión interpretativa.
  doctrine_reference: Conservar la tensión textual sin imponer una especificación doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se hicieron cambios y que el texto quedó en alto acuerdo con la auditoría; por eso la propuesta sigue de cerca la lectura inglesa aprobada, pero formulada con sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB cuando no aparece en este versículo.
  - Se usa «esto/estas cosas» para conservar la amplitud referencial del griego.
  - Se preserva la imagen de «un rincón» para no perder el modismo cultural del texto.
