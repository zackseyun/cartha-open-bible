revisions:
- from: Porque el rey sabe acerca de estas cosas[a], y yo hablo con valentía con él. Pues estoy persuadido de que ninguna de estas cosas le ha pasado inadvertida[c][b], porque esto no se ha hecho en un rincón.
  to: Porque el rey sabe acerca de estas cosas, y le hablo con valentía[a]. Pues estoy persuadido de que nada de esto le ha pasado inadvertido[b][c], porque esto no se ha hecho en un rincón.
  rationale: Se corrige la sintaxis para un español más natural y fiel al valor direccional de πρὸς ὃν ... λαλῶ ('le hablo'). También se reemplaza una formulación poco idiomática y con concordancia áspera por 'nada de esto le ha pasado inadvertido', que reproduce mejor el sentido de λανθάνειν ... αὐτόν y de οὐ πείθομαι οὐθέν en español natural. Además, se ajusta la ubicación de las notas para que correspondan exactamente a los segmentos relevantes del texto y se limpia un detalle editorial en la nota a.
