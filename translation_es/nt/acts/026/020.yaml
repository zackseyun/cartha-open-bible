translation:
  language: es
  text: pero primero a los de Damasco, y también a los de Jerusalén, y por toda la región de Judea, y a los gentiles[a], proclamaba que debían arrepentirse y volver a Dios, haciendo obras dignas del arrepentimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a las naciones’. Aquí el término se refiere a pueblos no judíos; por eso se usa ‘gentiles’ en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O ‘hechos dignos del arrepentimiento’ u ‘obras apropiadas al arrepentimiento’. La frase se refiere a acciones que acompañan apropiadamente al arrepentimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: Marca contraste con la negación anterior; en español, 'pero' conserva el valor adversativo natural y claro.
- source_word: τοῖς ἐν Δαμασκῷ
  english_pob_choice: to those in Damascus
  chosen_spanish: a los de Damasco
  alternatives_spanish:
  - a las personas de Damasco
  - a los que estaban en Damasco
  lexicon: BDAG
  rationale: El dativo con ἐν + lugar señala a las personas ubicadas allí; 'a los de Damasco' es breve, idiomático y conserva la fuerza indirecta de ἀπήγγελλον.
- source_word: πρῶτόν τε καὶ Ἱεροσολύμοις
  english_pob_choice: first ... then also in Jerusalem
  chosen_spanish: primero ... y también en Jerusalén
  alternatives_spanish:
  - primero en Damasco y en Jerusalén
  - primero, incluso en Jerusalén
  lexicon: BDAG
  rationale: La secuencia indica orden y adición. En español, 'primero ... y también' comunica mejor la progresión sin forzar la sintaxis griega.
- source_word: πᾶσάν τε τὴν χώραν τῆς Ἰουδαίας
  english_pob_choice: throughout all the region of Judea
  chosen_spanish: por toda la región de Judea
  alternatives_spanish:
  - por toda la comarca de Judea
  - por todo el territorio de Judea
  lexicon: BDAG
  rationale: χώρα puede significar región, país o campo. 'Región' es amplio y natural en español contemporáneo, sin reducirlo indebidamente a zona rural.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En este contexto de contraste con Judea y Jerusalén, ἔθνη se refiere a no judíos; 'gentiles' preserva esa distinción etnorreligiosa.
- source_word: ἀπήγγελλον
  english_pob_choice: I proclaimed
  chosen_spanish: anunciaba
  alternatives_spanish:
  - proclamaba
  - declaraba
  lexicon: BDAG
  rationale: Aunque el verbo puede significar informar o anunciar, aquí conviene un verbo de proclamación pública; 'anunciaba' es natural y mantiene el tono de testimonio.
- source_word: μετανοεῖν
  english_pob_choice: repent
  chosen_spanish: arrepentirse
  alternatives_spanish:
  - hacer arrepentimiento
  - cambiar de mente
  lexicon: BDAG
  rationale: En este contexto, μετανοέω expresa arrepentimiento ante Dios; 'arrepentirse' es la equivalencia española más clara y fiel, sin reducirlo a mera reconsideración mental.
- source_word: ἐπιστρέφειν ἐπὶ τὸν θεόν
  english_pob_choice: turn to God
  chosen_spanish: volver a Dios
  alternatives_spanish:
  - regresar a Dios
  - volverse hacia Dios
  lexicon: BDAG
  rationale: ἐπιστρέφω con ἐπί + acusativo expresa dirigirse o volverse hacia Dios. 'Volver a Dios' es idiomático y no restringe innecesariamente el alcance del llamado, incluyendo a los gentiles.
- source_word: ἄξια τῆς μετανοίας ἔργα
  english_pob_choice: works worthy of repentance
  chosen_spanish: obras dignas del arrepentimiento
  alternatives_spanish:
  - obras dignas de arrepentimiento
  - obras convenientes al arrepentimiento
  lexicon: BDAG
  rationale: ἄξια = dignas/fitting; ἔργα = obras. 'Obras dignas del arrepentimiento' preserva la relación estrecha entre arrepentimiento y su evidencia visible sin sugerir mérito salvífico.
- source_word: πράσσοντας
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - practicando
  - realizando
  lexicon: BDAG
  rationale: El participio presente expresa acción continua o acompañante. 'Haciendo' es natural en español y conserva la idea de conducta observable y persistente.
theological_decisions:
- issue: Relación entre arrepentimiento, volver a Dios y las obras
  english_pob_reading: The verse presents works as the fitting evidence of repentance, not as a replacement for repentance itself.
  chosen_spanish_reading: El versículo presenta las obras como la evidencia adecuada del arrepentimiento, no como sustituto de él.
  alternative_spanish_readings:
  - Las obras podrían leerse como el contenido mismo del arrepentimiento
  - Las obras podrían leerse como base meritoria para ser aceptado
  rationale: La sintaxis griega coloca μετανοεῖν y ἐπιστρέφειν como el anuncio central, mientras que πράσσοντας ἄξια τῆς μετανοίας describe la conducta que corresponde a ese arrepentimiento. 'Obras dignas del arrepentimiento' conserva ese orden sin introducir mérito.
  doctrine_reference: Mantener la tensión teológica del texto; no añadir una doctrina de mérito que el pasaje no formula.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió 'repent' para μετανοεῖν y mantuvo la relación entre arrepentimiento y obras como evidencia, no como mérito. También conserva la progresión geográfica y la distinción entre Judea y los gentiles.
  spanish_consistency_notes:
  - Se usó ‘gentiles’ por coherencia con el uso contextual de ἔθνη en Hechos.
  - Se prefirió ‘arrepentirse/arrepentimiento’ para μετανοέω/μετάνοια, manteniendo consistencia léxica.
  - Se evitó ‘SEÑOR’ porque el texto griego dice θεόν; por ello se traduce ‘Dios’.
  - Se mantuvo ‘volver a Dios’ como equivalente idiomático de ἐπιστρέφειν ἐπὶ τὸν θεόν, sin introducir matices ajenos al pasaje.
