translation:
  language: es
  text: sobre todo porque eres conocedor de todas las costumbres y disputas entre los judíos[a]. Por eso te ruego que me escuches con paciencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todas las costumbres y disputas judías».
    reason: lexical_alternative
  - marker: b
    text: O «te pido» en vez de «te ruego»; el verbo griego expresa una solicitud insistente.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάλιστα
  english_pob_choice: especially because
  chosen_spanish: sobre todo, porque
  alternatives_spanish:
  - especialmente porque
  - sobre todo
  lexicon: BDAG
  rationale: La partícula intensifica la razón por la que Pablo puede hablar con confianza. En español, «sobre todo, porque» comunica bien la relación causal sin sonar forzado.
- source_word: γνώστην ὄντα σε
  english_pob_choice: you are knowledgeable
  chosen_spanish: eres conocedor
  alternatives_spanish:
  - eres conocedor de
  - conoces bien
  - estás bien enterado
  lexicon: BDAG
  rationale: La construcción participial describe a Agripa como alguien que conoce estos asuntos. «Eres conocedor» mantiene el sentido de competencia o familiaridad sin exagerar hacia «experto».
- source_word: πάντων τῶν κατὰ Ἰουδαίους ἐθῶν
  english_pob_choice: all the customs among the Jews
  chosen_spanish: de todas las costumbres entre los judíos
  alternatives_spanish:
  - de todas las costumbres de los judíos
  - de todas las costumbres relacionadas con los judíos
  lexicon: BDAG
  rationale: «κατὰ Ἰουδαίους» señala la esfera o referencia de las costumbres. «Entre los judíos» conserva esa referencia de manera natural y evita volver demasiado interpretativo el adjetivo.
- source_word: ζητημάτων
  english_pob_choice: disputes
  chosen_spanish: disputas
  alternatives_spanish:
  - controversias
  - cuestiones
  - asuntos debatidos
  lexicon: BDAG
  rationale: En este contexto judicial/polémico, ζήτημα no es una pregunta neutral sino un asunto en disputa. «Disputas» sigue de cerca la revisión inglesa y mantiene la fuerza adversativa.
- source_word: δέομαι
  english_pob_choice: I beg
  chosen_spanish: te ruego
  alternatives_spanish:
  - te suplico
  - te pido
  - te imploro
  lexicon: BDAG
  rationale: El verbo expresa una petición insistente y respetuosa. «Te ruego» preserva esa intensidad sin adoptar un tono excesivamente arcaico o demasiado brusco.
- source_word: μακροθύμως
  english_pob_choice: patiently
  chosen_spanish: con paciencia
  alternatives_spanish:
  - pacientemente
  - con longanimidad
  lexicon: BDAG
  rationale: El adverbio pide una escucha paciente. «Con paciencia» suena natural en español y comunica bien la actitud solicitada en el contexto del discurso.
- source_word: ἀκοῦσαί μου
  english_pob_choice: to listen to me
  chosen_spanish: que me escuches
  alternatives_spanish:
  - que me oigas
  - que me escuches atentamente
  lexicon: BDAG
  rationale: El infinitivo con genitivo expresa oír/escuchar a alguien. «Que me escuches» es idiomático y adecuado para una petición directa en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «controversies» por «disputes» para reflejar con más precisión ζητημάτων. Por eso la versión española adopta «disputas» y evita un término más interpretativo. También mantiene el valor causal de μάλιστα y la petición respetuosa de δέομαι sin diluirlos.
  spanish_consistency_notes:
  - Se usa «judíos» en minúscula como gentilicio común.
  - «Disputas» refleja el matiz polémico/judicial de ζητήματα en este contexto.
  - «Te ruego» conserva la fuerza de la súplica sin forzar un registro litúrgico.
  - La puntuación separa claramente la base causal («sobre todo, porque…») de la petición principal.
