translation:
  language: es
  text: Por causa de estas cosas[a], los judíos me apresaron en el templo[b] y trataban de matarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por este motivo» o «A causa de estas cosas».
    reason: lexical_alternative
  - marker: b
    text: «En el templo» traduce ἐν τῷ ἱερῷ, que en griego designa el complejo del templo y no específicamente el santuario interior.
    reason: cultural_note
lexical_decisions:
- source_word: ἕνεκα τούτων
  english_pob_choice: Because of these things
  chosen_spanish: Por causa de estas cosas
  alternatives_spanish:
  - A causa de estas cosas
  - Por estas cosas
  - Por este motivo
  lexicon: BDAG
  rationale: ἕνεκα con genitivo expresa causa o razón. «Por causa de estas cosas» conserva la referencia retrospectiva al testimonio y las acciones anteriores de Pablo, con un español natural y formal.
- source_word: Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - judíos
  - el pueblo judío
  - los judíos de allí
  lexicon: BDAG
  rationale: El plural con artículo se refiere aquí a los opositores judíos implicados en el incidente. «Los judíos» reproduce el referente narrativo sin convertirlo en una generalización étnica, en línea con la lectura contextual del POB inglés.
- source_word: συλλαβόμενοι
  english_pob_choice: seized
  chosen_spanish: me prendieron
  alternatives_spanish:
  - me arrestaron
  - me agarraron
  - me apresaron
  lexicon: BDAG
  rationale: El participio indica que lo tomaron o aprehendieron de manera hostil. «Prendieron» comunica bien la acción violenta y, en español, puede abarcar la idea de sujetar o aprehender en contexto hostil sin sonar excesivamente técnico.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  - en el complejo del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no específicamente al santuario interior. «En el templo» es la forma más natural en español; el matiz espacial más amplio se conserva en nota.
- source_word: ἐπειρῶντο
  english_pob_choice: were trying
  chosen_spanish: trataban de
  alternatives_spanish:
  - intentaban
  - estaban intentando
  - procuraban
  lexicon: BDAG
  rationale: El imperfecto medio expresa una acción en curso o repetida en el pasado. «Trataban de» mantiene ese valor imperfectivo mejor que un pretérito puntual.
- source_word: διαχειρίσασθαι
  english_pob_choice: to kill
  chosen_spanish: matarme
  alternatives_spanish:
  - quitarme la vida
  - matarme de muerte violenta
  - asesinarme
  lexicon: BDAG
  rationale: En este contexto el verbo significa matar o eliminar violentamente. «Matarme» es directo, claro y fiel; «asesinarme» añade una valoración legal que el lexema no exige.
theological_decisions:
- issue: Referencia de «los judíos» en un contexto potencialmente polémico
  english_pob_reading: Rendered as 'the Jews' without the article and understood contextually as the specific Jewish opponents who seized Paul, not as an indictment of the Jewish people as a whole.
  chosen_spanish_reading: «Los judíos» se entiende como los opositores judíos concretos implicados en este episodio, no como una acusación global contra el pueblo judío.
  alternative_spanish_readings:
  - los judíos
  - el pueblo judío
  - judíos
  rationale: La traducción debe conservar el referente histórico del pasaje y, al mismo tiempo, evitar una generalización étnica que el texto no afirma. En español, el artículo determinado ayuda a mantener la referencia narrativa concreta.
  doctrine_reference: Principio de fidelidad al texto fuente y de no ampliar indebidamente el alcance referencial.
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de nota al pie: ahora el marcador [a] aparece en el texto principal exactamente en el sintagma correspondiente. También se evitó crear notas sin anclaje visible.'
  spanish_consistency_notes:
  - Se mantuvo un tono formal y publicable, con español natural de América Latina.
  - Se prefirió «prendieron» para conservar el matiz hostil de συλλαβόμενοι sin tecnicismo excesivo.
  - «Trataban de» preserva bien el imperfecto de ἐπειρῶντο.
  - La nota del templo se ancló en el sintagma exacto para cumplir la validación y preservar el matiz espacial del término ἱερόν.
