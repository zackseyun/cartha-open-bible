revisions:
- from: 'Pero levántate y ponte sobre tus pies[a], porque para esto me he aparecido a ti: para nombrarte siervo y testigo de las cosas en que me has visto y de las cosas en que me apareceré a ti.'
  to: 'Pero levántate y ponte de pie[a], porque para esto me he aparecido ante ti: para nombrarte servidor y testigo de las cosas en las que me has visto y de las cosas en las que me apareceré ante ti.'
  rationale: 'Se hicieron ajustes de naturalidad y precisión terminológica sin cambiar el sentido fuente: «ponte de pie» por el calco menos natural «ponte sobre tus pies»; «ante ti» para una construcción española más idiomática con lenguaje de aparición; «servidor» para reflejar mejor ὑπηρέτης frente a δοῦλος; y «en las que» para mejorar fluidez sintáctica. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por el griego y el rastro auditado.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:09:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: doble mandato inicial, finalidad de la aparición, comisión como ὑπηρέτης y μάρτυς, y el paralelismo entre lo ya visto y lo que aún será revelado. Sin embargo, varias formulaciones españolas suenan poco naturales o demasiado calcadas: «ponte sobre tus pies», «me he aparecido a ti» y especialmente «me apareceré a ti». Además, «siervo» para ὑπηρέτην no es la mejor alineación con la decisión inglesa ‘servant’ ni con la distinción del proyecto frente a δοῦλος; «servidor» expresa mejor un agente subordinado sin arrastrar la resonancia más marcada de «siervo».'
  spanish_quality_summary: La legibilidad necesita ajuste menor. El texto actual es comprensible, pero varias expresiones no son español natural de registro bíblico moderno y digno. «Ponte de pie» y «me he aparecido / me apareceré» deben mejorarse para sonar idiomáticos sin perder el lenguaje de aparición. La sintaxis relativa final puede conservarse, pero conviene pulirla a «en las que» para mejor fluidez.
  glossary_alignment: 'No hay conflicto con términos mayores del glosario (Yahvé, Mesías, etc.). El punto terminológico relevante es ὑπηρέτην: mejor «servidor» que «siervo» para preservar la diferencia frente a δοῦλος y la racionalidad documentada de ‘servant’ como agente subordinado/auxiliar. «Testigo» está bien. El lenguaje de aparición debe mantenerse, pero en español idiomático: «me he mostrado a ti» / «me mostraré a ti» o similar; aquí se prefiere mantener ‘aparecer’ con construcción natural.'
  issues:
  - severity: medium
    issue: «ponte sobre tus pies» es un calco poco natural
    rationale: Aunque reproduce la imagen griega, en español bíblico natural se dice «ponte de pie». La nota puede conservar la alternativa más formal/literal si se desea documentar la compresión del griego.
  - severity: medium
    issue: «me he aparecido a ti» y «me apareceré a ti» son construcciones poco idiomáticas
    rationale: El griego expresa lenguaje de aparición revelatoria, pero en español la construcción natural es «me he aparecido ante ti» o mejor «se me he manifestado»; sin embargo, para preservar ‘appear’, «me he aparecido ante ti» y «me apareceré» sin «a ti»/con «ante ti» suenan mejor. En la segunda cláusula, «me apareceré ante ti» es claramente preferible.
  - severity: medium
    issue: «siervo» para ὑπηρέτην difumina la distinción con δοῦλος
    rationale: ὑπηρέτης no es δοῦλος. El inglés auditado escogió ‘servant’ con matiz de subordinado/agente. En español, «servidor» refleja mejor esa función comisionada; «siervo» introduce una resonancia más tradicional y más cercana a otras familias léxicas.
  - severity: low
    issue: «en que» puede pulirse a «en las que»
    rationale: La forma actual es comprensible, pero «de las cosas en las que…» hace más transparente la estructura relativa en español sin apartarse del griego.
  revised_spanish_text: 'Pero levántate y ponte de pie[a], porque para esto me he aparecido ante ti: para nombrarte servidor y testigo de las cosas en las que me has visto y de las cosas en las que me apareceré ante ti.'
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «sobre tus pies». La construcción griega es compacta y aquí se ha expresado con mayor claridad en español.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes de naturalidad y precisión terminológica sin cambiar el sentido fuente: «ponte de pie» por el calco menos natural «ponte sobre tus pies»; «ante ti» para una construcción española más idiomática con lenguaje de aparición; «servidor» para reflejar mejor ὑπηρέτης frente a δοῦλος; y «en las que» para mejorar fluidez sintáctica. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por el griego y el rastro auditado.'
