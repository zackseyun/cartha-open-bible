translation:
  language: es
  text: 'Pero levántate y ponte de pie[a], porque para esto me he aparecido ante ti: para nombrarte servidor y testigo de las cosas en las que me has visto y de las cosas en las que me apareceré ante ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «sobre tus pies». La construcción griega es compacta y aquí se ha expresado con mayor claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάστηθι
  english_pob_choice: rise
  chosen_spanish: levántate
  alternatives_spanish:
  - ponte de pie
  - alza-te
  lexicon: BDAG
  rationale: El imperativo aoristo pide acción inmediata y decidida. En español, «levántate» comunica bien el impulso inicial del mandato y funciona de manera natural en un contexto de comisión.
- source_word: στῆθι ἐπὶ τοὺς πόδας σου
  english_pob_choice: stand on your feet
  chosen_spanish: ponte sobre tus pies
  alternatives_spanish:
  - ponte de pie
  - permanece firme sobre tus pies
  lexicon: BDAG
  rationale: Conserva la imagen corporal del griego sin volverla demasiado pesada. «Ponte sobre tus pies» refleja la escena de ponerse en posición de estar de pie y mantiene el tono vívido del mandato.
- source_word: εἰς τοῦτο γὰρ
  english_pob_choice: for this purpose
  chosen_spanish: porque para esto
  alternatives_spanish:
  - pues para este fin
  - porque con este propósito
  lexicon: BDAG
  rationale: La frase introduce finalidad. «Porque para esto» es natural en español y conserva el valor teleológico de la expresión.
- source_word: ὤφθην σοι
  english_pob_choice: I have appeared to you
  chosen_spanish: me he aparecido a ti
  alternatives_spanish:
  - se te he aparecido
  - me aparecí a ti
  lexicon: BDAG
  rationale: Se mantiene el lenguaje de aparición revelatoria, no reducido a una mera impresión interior. El perfecto español refleja bien la fuerza resultativa del aoristo pasivo en este contexto de comisión.
- source_word: προχειρίσασθαί σε
  english_pob_choice: to appoint you
  chosen_spanish: para nombrarte
  alternatives_spanish:
  - para designarte
  - para elegirte
  lexicon: BDAG
  rationale: El infinitivo expresa el propósito de la aparición. «Nombrarte» comunica la idea de designación para una función; «designarte» es una alternativa válida, pero «nombrarte» suena más directo en una comisión solemne.
- source_word: ὑπηρέτην
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - asistente
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «servant», en español «siervo» transmite con más fuerza la subordinación del cargo sin cargar innecesariamente con la connotación jurídica de «esclavo». Mantiene la dignidad del encargo en este contexto.
- source_word: μάρτυρα
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testificador
  lexicon: BDAG
  rationale: «Testigo» es la correspondencia natural y precisa para alguien comisionado a dar testimonio de lo visto y revelado.
- source_word: ὧν τε εἶδές με
  english_pob_choice: of the things in which you have seen me
  chosen_spanish: de las cosas en que me has visto
  alternatives_spanish:
  - de lo que me has visto
  - de las cosas que has visto en mí
  lexicon: BDAG
  rationale: Se conserva la relación relativa comprimida del griego sin forzar una expansión explicativa. «Me has visto» sigue de cerca la construcción y evita la frase menos natural «has visto de mí».
- source_word: ὧν τε ὀφθήσομαί σοι
  english_pob_choice: of the things in which I will appear to you
  chosen_spanish: de las cosas en que me apareceré a ti
  alternatives_spanish:
  - de lo que te apareceré
  - de las cosas en que yo me mostraré a ti
  lexicon: BDAG
  rationale: Se preserva el lenguaje de futura aparición, manteniendo la fuerza revelatoria del verbo sin reducirlo a una simple comunicación subjetiva. «Me apareceré a ti» sigue de cerca el patrón verbal del pasaje.
theological_decisions:
- issue: Lenguaje de aparición revelatoria en ὤφθην / ὀφθήσομαί
  english_pob_reading: Render both verbs as appearance language ('I have appeared,' 'I will appear') rather than reducing them to generic seeing or inward impression.
  chosen_spanish_reading: 'Se mantiene el campo semántico de aparición personal: «me he aparecido» / «me apareceré».'
  alternative_spanish_readings:
  - se me mostró / se me mostrará
  - fui visto / seré visto
  rationale: El pasaje presenta una comisión del Resucitado; por eso conviene conservar el valor objetivo de la aparición y no diluirlo en una experiencia meramente interior. La formulación española mantiene esa fuerza.
  doctrine_reference: Hechos 26:16; filosofía de traducción POB
- issue: Función de ὑπηρέτην en una comisión apostólica
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - servidor
  - asistente
  rationale: En español, «siervo» expresa mejor la subordinación y el carácter comisionado del rol sin introducir la idea técnica de esclavitud donde el contexto de la misión enfatiza servicio bajo autoridad.
  doctrine_reference: Hechos 26:16; uso contextual de δοῦλος/ὑπηρέτης en POB
translation_notes:
  revision_awareness: 'El texto inglés POB fue revisado para ajustar la relación relativa: de una formulación más libre a otra más pegada al griego («the things in which you have seen me» / «the things in which I will appear to you»). La versión española sigue esa misma línea de cercanía sintáctica y mantiene el lenguaje de aparición revelatoria.'
  spanish_consistency_notes:
  - Se usa «siervo» aquí conforme al inglés POB, aunque en otros contextos del proyecto podría preferirse «esclavo» cuando el término griego lo exija con mayor fuerza lexical.
  - Se mantiene «me he aparecido / me apareceré» para preservar la categoría de aparición divina o revelatoria, en paralelo con la decisión auditada del inglés POB.
  - «Ponte sobre tus pies» conserva la imagen corporal del original; si se prefiere una forma más idiomática, la nota da la alternativa «ponte de pie».
