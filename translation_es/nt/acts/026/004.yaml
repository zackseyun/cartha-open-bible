translation:
  language: es
  text: Pues bien[a], todos los judíos conocen mi modo de vida desde mi juventud, que desde el principio he pasado entre mi propio pueblo y en Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida» o «mi manera de vivir». El término griego se refiere al modo de vivir de Pablo, no simplemente a su existencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: βίωσίν
  english_pob_choice: manner of life
  chosen_spanish: modo de vida
  alternatives_spanish:
  - vida
  - manera de vivir
  - conducta
  lexicon: BDAG
  rationale: βίωσις no se refiere simplemente a la existencia biológica, sino al curso o estilo de vida de una persona. En español, «modo de vida» conserva esa amplitud sin reducirlo a «vida» a secas.
- source_word: ἐκ νεότητος
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde joven
  - desde mis primeros años
  lexicon: BDAG
  rationale: La expresión marca el punto de partida del patrón de vida de Pablo. «Desde mi juventud» es natural en español y mantiene la referencia personal implícita en el posesivo.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: La frase intensifica el alcance temporal de la afirmación. «Desde el principio» reproduce bien ese valor temporal de manera idiomática en español.
- source_word: γενομένην
  english_pob_choice: was spent
  chosen_spanish: fue vivido
  alternatives_spanish:
  - transcurrió
  - se desarrolló
  - se pasó
  lexicon: BDAG
  rationale: El participio modifica βίωσιν y presenta el curso de vida como algo que ocurrió en un ámbito concreto. «Fue vivido» conserva esa relación con la vida-camino, aunque suene menos natural que otras opciones; evita diluir el vínculo con el sustantivo principal.
- source_word: ἐν τῷ ἔθνει μου
  english_pob_choice: among my own nation
  chosen_spanish: entre mi propia nación
  alternatives_spanish:
  - en mi nación
  - entre mi pueblo
  lexicon: BDAG
  rationale: ἔθνος aquí designa al pueblo étnico de Pablo, no una nación-estado moderna. «Entre mi propia nación» mantiene ese sentido colectivo; «mi pueblo» sería más fluido, pero menos cercano al término fuente.
- source_word: ἔν τε Ἱεροσολύμοις
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y también en Jerusalén
  - y asimismo en Jerusalén
  lexicon: BDAG
  rationale: El τε coordinador suma Jerusalén al lugar anterior. En español, «y en Jerusalén» refleja esa adición sin sobrerrepresentarla.
- source_word: ἴσασι
  english_pob_choice: know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - están al tanto de
  lexicon: BDAG
  rationale: οἶδα en forma perfecta suele tener sentido presente. «Conocen» expresa de forma natural que los judíos están familiarizados con la vida de Pablo.
- source_word: πάντες Ἰουδαῖοι
  english_pob_choice: all the Jews
  chosen_spanish: todos los judíos
  alternatives_spanish:
  - todo el pueblo judío
  - todos los judíos de allí
  lexicon: BDAG
  rationale: La frase es colectiva y definida en contexto. «Todos los judíos» es la traducción más directa y no atenúa la referencia étnica.
- source_word: μὲν οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Pues bien
  - Entonces
  lexicon: BDAG
  rationale: La combinación de partículas introduce continuidad discursiva. «Así que» comunica esa transición con naturalidad en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: βίωσις se entiende como curso o modo de vida; γενομένην se conserva como una cláusula pasiva que vincula esa vida con un ámbito histórico concreto; ἔν τε se vierte de forma simple como coordinación aditiva. Se mantuvo la tensión lexical entre «vida» y «modo de vida» mediante nota, sin borrar el matiz documentado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '«Jesusalén» se mantiene como topónimo tradicional en forma española estándar: «Jerusalén».'
  - No se emplea «Cristo», «Señor» ni otros términos teológicos ajenos al versículo.
  - Se optó por un español público y eclesialmente legible, evitando calcos excesivamente duros salvo donde el vínculo lexical lo justifica.
