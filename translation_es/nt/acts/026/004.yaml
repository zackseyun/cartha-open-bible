  text: Τὴν μὲν οὖν βίωσίν μου ⸀τὴν ἐκ νεότητος τὴν ἀπ’ ἀρχῆς γενομένην ἐν τῷ ἔθνει μου ἔν ⸀τε Ἱεροσολύμοις ἴσασι ⸀πάντες Ἰουδαῖοι,
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/004.yaml
  text: So then[a], all the Jews know my manner of life from my youth, which from the beginning was spent among my own nation and in Jerusalem,
