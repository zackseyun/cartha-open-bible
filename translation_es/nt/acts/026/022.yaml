translation:
  language: es
  text: Por tanto[a], habiendo recibido la ayuda que procede de Dios, sigo en pie hasta hoy, dando testimonio a pequeños y grandes[b], sin decir nada fuera de lo que tanto los profetas como Moisés dijeron que iba a suceder[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo obtenido ayuda de Dios».'
    reason: lexical_alternative
  - marker: b
    text: «Pequeños y grandes» es un modismo que alude a personas de todo rango social.
    reason: cultural_note
  - marker: c
    text: 'O: «sin decir nada más allá de lo que tanto los profetas como Moisés dijeron que sucedería».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικουρίας
  english_pob_choice: the help
  chosen_spanish: la ayuda
  alternatives_spanish:
  - el auxilio
  - la asistencia
  lexicon: BDAG
  rationale: ἐπικουρία denota ayuda o socorro. En español, «la ayuda» es natural y mantiene el valor de auxilio recibido, sin intensificar innecesariamente el término.
- source_word: τυχὼν
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - habiendo obtenido
  - habiendo conseguido
  lexicon: BDAG
  rationale: El participio aoristo expresa la obtención/recepción de esa ayuda. «Habiendo recibido» conserva la relación participial de modo claro y fiel.
- source_word: τῆς ἀπὸ τοῦ θεοῦ
  english_pob_choice: that is from God
  chosen_spanish: que procede de Dios
  alternatives_spanish:
  - que viene de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: La frase atributiva especifica el origen de la ayuda. «Procede de Dios» comunica el origen con dignidad y evita un calco rígido.
- source_word: ἕστηκα
  english_pob_choice: I stand
  chosen_spanish: permanezco
  alternatives_spanish:
  - estoy en pie
  - me mantengo
  lexicon: BDAG
  rationale: El perfecto de ἵστημι expresa un estado presente resultante. En español, «permanezco» transmite continuidad y firmeza sin sonar artificial.
- source_word: μαρτυρόμενος
  english_pob_choice: testifying
  chosen_spanish: dando testimonio
  alternatives_spanish:
  - testificando
  - atestiguando
  lexicon: BDAG
  rationale: El participio describe la actividad continua de Pablo. «Dar testimonio» es idiomático en español y conserva el matiz legal/de testigo.
- source_word: μικρῷ τε καὶ μεγάλῳ
  english_pob_choice: to both small and great
  chosen_spanish: ante pequeños y grandes
  alternatives_spanish:
  - a pequeños y grandes
  - ante personas de toda condición
  lexicon: BDAG
  rationale: La expresión es un modismo de rango social. Se conserva la imagen «pequeños y grandes» y se explicita con «ante» el ámbito de la proclamación.
- source_word: οὐδὲν ἐκτὸς λέγων
  english_pob_choice: saying nothing except
  chosen_spanish: sin decir nada fuera de
  alternatives_spanish:
  - sin decir nada excepto
  - no diciendo nada más que
  lexicon: BDAG
  rationale: ἐκτός con genitivo introduce excepción. «Sin decir nada fuera de» es natural en español y preserva el sentido de exclusión.
- source_word: ὧν
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo remite al contenido profético. «Lo que» funciona con naturalidad tras la negación y evita sobrecargar la frase.
- source_word: οἱ προφῆται ... καὶ Μωϋσῆς
  english_pob_choice: both the prophets and Moses
  chosen_spanish: tanto los profetas como Moisés
  alternatives_spanish:
  - los profetas y Moisés
  - los profetas y también Moisés
  lexicon: BDAG
  rationale: La construcción τε ... καί se expresa de forma correlativa. Se conserva el orden griego con una coordinación natural en español.
- source_word: ἐλάλησαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - declararon
  lexicon: BDAG
  rationale: Con una cláusula de contenido, «dijeron» es la opción más directa en español y no debilita la fuerza profética.
- source_word: μελλόντων γίνεσθαι
  english_pob_choice: was going to happen
  chosen_spanish: que iba a suceder
  alternatives_spanish:
  - que habría de suceder
  - que estaba por suceder
  lexicon: BDAG
  rationale: La construcción expresa futuridad relativa respecto del discurso profético. «Iba a suceder» mantiene esa orientación futura en español corriente.
theological_decisions:
- issue: Continuidad entre el testimonio de Pablo y las Escrituras de Israel
  english_pob_reading: Paul claims that his testimony goes beyond neither the prophets nor Moses, emphasizing continuity with prior revelation rather than novelty.
  chosen_spanish_reading: Pablo afirma que no dice nada fuera de lo que ya anunciaron los profetas y Moisés, subrayando continuidad con la revelación previa y no novedad.
  alternative_spanish_readings:
  - Pablo solo afirma una coincidencia general con la Escritura
  - Pablo presenta su mensaje como una simple confirmación religiosa
  rationale: La sintaxis griega οὐδὲν ἐκτὸς λέγων ὧν ... ἐλάλησαν es una afirmación fuerte de continuidad. La traducción la conserva sin suavizarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «I stand to this day» para reflejar mejor el perfecto ἕστηκα como estado presente. Por eso se eligió «permanezco hasta este día», manteniendo continuidad y presencia actual en español. También se preservó la fuerza de la cláusula de continuidad profética sin convertirla en una paráfrasis general.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se mantuvo «profetas» y «Moisés» sin añadir fórmulas eclesiásticas ajenas al texto.
  - Se conservó la imagen social de «pequeños y grandes» porque el modismo está documentado en el audit trail inglés.
  - Se optó por una redacción española fluida, pero sin perder la relación participial de las construcciones griegas principales.
