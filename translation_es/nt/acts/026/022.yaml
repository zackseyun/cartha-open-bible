  rationale: 'Se ajusta el español para reflejar con más naturalidad y precisión el griego: «sigo en pie hasta hoy» comunica mejor ἕστηκα ... ἄχρι τῆς ἡμέρας ταύτης, y «a pequeños y grandes» representa mejor el destinatario del testimonio. Las notas se normalizan en español y mantienen las alternativas del rastro inglés.'
