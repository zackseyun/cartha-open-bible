review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: ayuda recibida de Dios, continuidad hasta el presente, testimonio a todos los rangos, y la afirmación de que Pablo no dice nada fuera de lo anunciado por los profetas y Moisés. Sin embargo, hay dos ajustes de fidelidad/estilo: ἄχρι τῆς ἡμέρας ταύτης se alinea mejor con «hasta hoy»/«hasta este día» que con una colocación algo más pesada junto a «permanezco», y μικρῷ τε καὶ μεγάλῳ expresa destinatarios del testimonio más naturalmente como «a pequeños y grandes» que «ante pequeños y grandes».'
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más natural y bíblico con «hasta hoy» y «a pequeños y grandes». «Permanezco» es defendible para ἕστηκα, aunque combinado con «hasta este día» resulta algo rígido; «sigo en pie hasta hoy» conserva mejor la idea de estado continuado. También conviene mantener las notas con formulación española más natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «profetas» y «Moisés» están bien. No hay términos sensibles como Yahvé/Mesías/esclavo aquí. Las decisiones léxicas principales son compatibles con el rastro inglés, con mejora menor en la expresión idiomática de ἕστηκα y del dativo μικρῷ τε καὶ μεγάλῳ.
  issues:
  - severity: medium
    issue: «ante pequeños y grandes» no expresa tan directamente el dativo de destinatario
    rationale: μικρῷ τε καὶ μεγάλῳ indica a quiénes Pablo da testimonio. «Ante» puede sugerir mera presencia; «a pequeños y grandes» comunica mejor el destinatario del testimonio y conserva el modismo.
  - severity: medium
    issue: «permanezco hasta este día» suena algo rígido para ἕστηκα ἄχρι τῆς ἡμέρας ταύτης
    rationale: La idea es estado presente continuado hasta ahora. «Sigo en pie hasta hoy» o similar suena más natural en español y conserva la fuerza aspectual sin calco duro.
  - severity: low
    issue: Las notas alternativas pueden afinarse para sonar más idiomáticas en español
    rationale: La nota [a] puede omitir el artículo en la alternativa («ayuda de Dios»), y la [c] funciona mejor con una redacción paralela al texto revisado.
  revised_spanish_text: Por tanto[a], habiendo recibido la ayuda que procede de Dios, sigo en pie hasta hoy, dando testimonio a pequeños y grandes[b], sin decir nada fuera de lo que tanto los profetas como Moisés dijeron que iba a suceder[c].
  revised_footnotes:
