  glossary_alignment: No hay conflicto relevante con la terminología del proyecto. «Cristiano» corresponde correctamente a Χριστιανόν. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, etc. El único ajuste lexical importante es alinear mejor ποιῆσαι con la decisión documentada de resultado/devenir y mejorar la sintaxis española.
