  glossary_alignment: 'Buena alineación con la terminología del proyecto: ''Dios'', ''Satanás'', ''fe'', ''santificados'' y ''herencia'' están bien elegidos. No hay conflicto con los defaults doctrinales o léxicos. Se preserva correctamente ''autoridad'' para ἐξουσία, con ''poder'' y ''dominio'' como alternativas en nota.'
