translation:
  language: es
  text: para abrir sus ojos, para que se vuelvan de las tinieblas a la luz y de la autoridad[a] de Satanás a Dios, para que reciban perdón de pecados y una herencia entre los que han sido santificados por la fe en mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el poder de Satanás' o 'el dominio de Satanás'. El término griego puede denotar autoridad, poder gobernante o dominio.
    reason: lexical_alternative
  - marker: b
    text: O 'entre los que han sido hechos santos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι
  english_pob_choice: to open
  chosen_spanish: abrir
  alternatives_spanish:
  - hacer ver
  lexicon: BDAG
  rationale: Conserva la metáfora concreta de los ojos abiertos sin convertirla en una explicación abstracta; 'hacer ver' sería posible, pero desplaza la imagen original.
- source_word: ὀφθαλμοὺς αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: los ojos de ellos
  alternatives_spanish:
  - sus ojos
  lexicon: BDAG
  rationale: Mantiene el referente personal directo y la imagen corporal. 'Sus ojos' es natural, pero 'los ojos de ellos' deja explícito el genitivo pronominal del griego en un estilo todavía readable.
- source_word: τοῦ ἐπιστρέψαι
  english_pob_choice: so that they may turn
  chosen_spanish: para que se vuelvan
  alternatives_spanish:
  - para que vuelvan
  - para convertirlos
  lexicon: BDAG
  rationale: ἐπιστρέφω expresa giro o vuelta de rumbo; 'se vuelvan' conserva el movimiento de conversión sin introducir una formulación más doctrinal como 'convertirse' en el cuerpo principal.
- source_word: ἀπὸ σκότους εἰς φῶς
  english_pob_choice: from darkness to light
  chosen_spanish: de las tinieblas a la luz
  alternatives_spanish:
  - de oscuridad a luz
  lexicon: BDAG
  rationale: '''Tinieblas'' preserva mejor la carga bíblica y metafórica tradicional del contraste; ''oscuridad'' sería comprensible, pero menos marcado.'
- source_word: τῆς ἐξουσίας τοῦ Σατανᾶ
  english_pob_choice: the authority of Satan
  chosen_spanish: la autoridad de Satanás
  alternatives_spanish:
  - el poder de Satanás
  - el dominio de Satanás
  lexicon: BDAG
  rationale: '''Autoridad'' sigue de cerca ἐξουσία y evita borrar la tensión entre autoridad, poder delegado y dominio. Se conserva el nombre propio ''Satanás'' sin suavizarlo.'
- source_word: ἐπὶ τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - para Dios
  lexicon: BDAG
  rationale: Con el movimiento previo 'de... a...', 'a Dios' es la manera más natural en español y expresa transferencia de dirección o lealtad.
- source_word: τοῦ λαβεῖν
  english_pob_choice: that they may receive
  chosen_spanish: para recibir
  alternatives_spanish:
  - para que reciban
  - a fin de recibir
  lexicon: BDAG
  rationale: La serie de infinitivos de propósito puede expresarse con 'para'; en español evita una sobrecarga de subordinadas y sigue la estructura final del pasaje.
- source_word: ἄφεσιν ἁμαρτιῶν
  english_pob_choice: forgiveness of sins
  chosen_spanish: perdón de pecados
  alternatives_spanish:
  - remisión de pecados
  - liberación de pecados
  lexicon: BDAG
  rationale: '''Perdón de pecados'' es claro y natural en español contemporáneo. ''Remisión'' es más técnico y ''liberación'' no refleja tan bien el uso normal de ἄφεσις.'
- source_word: κλῆρον
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una porción
  - un lote
  lexicon: BDAG
  rationale: En este contexto salvífico, κλῆρος remite a la porción asignada al pueblo de Dios; 'herencia' comunica bien ese sentido covenantal y escatológico.
- source_word: ἐν τοῖς ἡγιασμένοις
  english_pob_choice: among those who have been sanctified
  chosen_spanish: entre los que han sido santificados
  alternatives_spanish:
  - entre los santificados
  - entre los que han sido hechos santos
  lexicon: BDAG
  rationale: La forma perifrástica preserva el valor verbal y el estado resultante del participio perfecto pasivo. 'Santificados' es más fiel que 'santos' para este punto.
- source_word: πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  - con fe
  lexicon: BDAG
  rationale: La dative instrumental se expresa naturalmente con 'por la fe' en español y mantiene el carácter de medio o esfera de acceso.
- source_word: τῇ εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - en mí mismo
  - dirigida a mí
  lexicon: BDAG
  rationale: La construcción griega especifica el objeto de la fe; 'en mí' es la forma idiomática en español y conserva el foco personal en Jesús.
theological_decisions:
- issue: Sentido de ἐξουσία en 26:18
  english_pob_reading: the authority of Satan
  chosen_spanish_reading: la autoridad de Satanás
  alternative_spanish_readings:
  - el poder de Satanás
  - el dominio de Satanás
  rationale: Se mantiene la elección del POB inglés para no borrar la distinción entre autoridad, poder y dominio. 'Autoridad' es lo más próximo a ἐξουσία y deja abierta la implicación de jurisdicción o gobierno usurpado.
  doctrine_reference: 'DOCTRINE.md: términos de potestad/autoridad; mantener fuerza léxica sin nivelar diferencias'
- issue: πίστει τῇ εἰς ἐμέ
  english_pob_reading: by faith in me
  chosen_spanish_reading: por la fe en mí
  alternative_spanish_readings:
  - por confianza en mí
  - mediante la fe dirigida a mí
  rationale: No se trata de la construcción debatida pistis-Christou; el texto habla de la fe relacionada con Jesús como objeto. 'Fe en mí' preserva la referencia personal y el valor estándar de πίστις.
  doctrine_reference: 'DOCTRINE.md: πίστις por defecto = ''faith'''
- issue: ἡγιασμένοις
  english_pob_reading: those who have been sanctified
  chosen_spanish_reading: los que han sido santificados
  alternative_spanish_readings:
  - los que han sido hechos santos
  - los santos
  rationale: El participio perfecto pasivo expresa una acción realizada con estado resultante. 'Santificados' conserva la pasividad y evita reducirlo a un simple título eclesial.
  doctrine_reference: 'DOCTRINE.md: pasivos divinos / estado resultante en participios perfectos'
translation_notes:
  revision_awareness: Se revisó el paquete fuente griego SBLGNT y el audit trail inglés de POB. No hubo revisiones aplicadas en el registro inglés reciente; la versión española sigue de cerca esas decisiones, manteniendo el paralelo de infinitivos de propósito, la metáfora ojos/tinieblas/luz y la ambigüedad controlada de ἐξουσία con nota alternativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí el texto dice θεόν, por eso se traduce 'Dios'.
  - Se mantuvo 'Satanás' como nombre propio sin suavización.
  - Se conservaron metáforas corporales y de traslado ('ojos', 'tinieblas', 'luz') en vez de abstraerlas.
  - '''Santificados'' se emplea en sentido participial, no como sustituto de ''santos''.'
