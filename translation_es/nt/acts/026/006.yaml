translation:
  language: es
  text: Y ahora estoy aquí para ser juzgado por la esperanza de la promesa hecha por Dios a nuestros padres[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice «nuestros padres», refiriéndose a los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Así que ahora
  lexicon: BDAG
  rationale: La transición discursiva pide una fórmula natural en español que conserve el enlace con la defensa anterior; «Y ahora» expresa bien el valor de conexión temporal y argumentativa.
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: because of the hope
  chosen_spanish: por la esperanza
  alternatives_spanish:
  - a causa de la esperanza
  - en razón de la esperanza
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo aquí expresa base o motivo. En español, «por la esperanza» comunica de manera natural la causa del juicio, sin perder el matiz causal del griego.
- source_word: τῆς ... ἐπαγγελίας
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - el prometido cumplimiento
  - la cosa prometida
  lexicon: BDAG
  rationale: ἐπαγγελία se rinde de forma directa como «promesa», que es claro y fiel al uso estándar del término en contexto bíblico.
- source_word: τῆς εἰς τοὺς πατέρας ἡμῶν ἐπαγγελίας
  english_pob_choice: the promise made by God to our fathers
  chosen_spanish: la promesa hecha por Dios a nuestros padres
  alternatives_spanish:
  - la promesa para nuestros padres
  - la promesa dirigida a nuestros padres
  lexicon: BDAG
  rationale: La frase preposicional indica orientación/alcance de la promesa hacia los antepasados de Israel. «Hecha ... a nuestros padres» conserva esa relación de modo idiomático en español y mantiene el lenguaje covenantal del texto.
- source_word: γενομένης ὑπὸ τοῦ θεοῦ
  english_pob_choice: made by God
  chosen_spanish: hecha por Dios
  alternatives_spanish:
  - dada por Dios
  - proveniente de Dios
  lexicon: BDAG
  rationale: El participio con ὑπό + genitivo señala agencia divina. «Hecha por Dios» reproduce de forma natural esa agencia sin añadir interpretación.
- source_word: πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: El griego es masculino plural y en contexto judío-covenantal alude a los patriarcas/antepasados de Israel. Se mantiene «padres» para respetar la forma del original; en nota se explica la posible equivalencia interpretativa «antepasados».
- source_word: ἕστηκα
  english_pob_choice: I stand
  chosen_spanish: estoy siendo juzgado
  alternatives_spanish:
  - estoy en pie
  - permanezco
  lexicon: BDAG
  rationale: Aunque ἕστηκα tiene valor perfectivo-estativo («estoy en pie / permanezco»), en esta cláusula el participio κρινόμενος determina el marco judicial. En español, la combinación se expresa con naturalidad como «estoy siendo juzgado», que comunica la situación forense sin forzar una imagen de pie poco idiomática.
- source_word: κρινόμενος
  english_pob_choice: on trial
  chosen_spanish: siendo juzgado
  alternatives_spanish:
  - en juicio
  - bajo juicio
  lexicon: BDAG
  rationale: El participio presenta la condición judicial actual de Pablo. «Siendo juzgado» conserva el valor pasivo y el contexto forense mejor que una formulación más abstracta.
theological_decisions:
- issue: Alcance de «nuestros padres»
  english_pob_reading: Israel's patriarchal forefathers/covenant ancestors
  chosen_spanish_reading: los padres/antepasados pactales de Israel
  alternative_spanish_readings:
  - nuestros antepasados
  - los patriarcas de Israel
  rationale: El contexto de Hechos 26 es una defensa ante Agripa en la que Pablo apela a la historia de Israel. La traducción principal conserva «nuestros padres» por fidelidad formal, mientras la nota permite entender el valor histórico-covenantal sin neutralizar el masculino del original.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el ajuste auditado del inglés POB de «hope in the promise» a «hope of the promise» para reflejar mejor la construcción de ἐπ’ ἐλπίδι τῆς ἐπαγγελίας. En español se optó por «por la esperanza de la promesa» para conservar esa relación causal y el enlace directo entre esperanza y promesa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «Señor» como máscara.
  - Se conserva «padres» en el texto principal por fidelidad al griego; la nota ofrece «antepasados» como alternativa explicativa.
  - La cláusula judicial se expresó como «estoy siendo juzgado» para reflejar el contexto forense de κρινόμενος junto con ἕστηκα.
  - No se añadió puntuación interpretativa adicional; la coma final queda abierta para continuar el discurso en el versículo siguiente.
