  - severity: low
    issue: La equivalencia judicial puede mejorarse en español
    rationale: Aunque «siendo juzgado» es fiel, en español bíblico-jurídico suena menos natural que «para ser juzgado» o «en juicio» cuando acompaña a «estoy aquí»/«comparezco».
  revised_spanish_text: Y ahora estoy aquí para ser juzgado por la esperanza de la promesa hecha por Dios a nuestros padres[a],
