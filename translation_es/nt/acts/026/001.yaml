translation:
  language: es
  text: 'Entonces Agripa dijo a Pablo[a]: «Se te permite hablar en tu propia defensa[b]». Entonces Pablo extendió la mano y presentó su defensa:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo su defensa». El verbo griego puede denotar presentar una defensa legal.
    reason: lexical_alternative
  - marker: b
    text: O «hablar por ti mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγρίππας
  english_pob_choice: Agrippa
  chosen_spanish: Agripa
  alternatives_spanish:
  - Agripa (con h)
  lexicon: nombre propio
  rationale: Se translitera el nombre propio al uso español usual, con la forma breve y reconocible «Agripa».
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca avance narrativo; «Entonces» preserva el flujo temporal natural en español.
- source_word: πρὸς τὸν Παῦλον ἔφη
  english_pob_choice: said to Paul
  chosen_spanish: dijo a Pablo
  alternatives_spanish:
  - habló a Pablo
  - se dirigió a Pablo
  lexicon: BDAG
  rationale: La construcción con verbo de habla se vierte de manera idiomática en español como «dijo a Pablo».
- source_word: Ἐπιτρέπεταί σοι
  english_pob_choice: You are permitted
  chosen_spanish: Se te permite
  alternatives_spanish:
  - Te está permitido
  - Tienes permiso
  lexicon: BDAG
  rationale: La pasiva impersonal conserva el tono formal y judicial del griego sin volver la frase pesada en español.
- source_word: ὑπὲρ σεαυτοῦ λέγειν
  english_pob_choice: to speak on your own behalf
  chosen_spanish: hablar en tu propia defensa
  alternatives_spanish:
  - hablar por ti mismo
  - hablar en tu favor
  lexicon: BDAG
  rationale: En este contexto forense, ὑπέρ con reflexivo expresa defensa propia; «en tu propia defensa» mantiene ese sentido jurídico.
- source_word: ἐκτείνας τὴν χεῖρα
  english_pob_choice: stretched out his hand
  chosen_spanish: extendiendo la mano
  alternatives_spanish:
  - alzando la mano
  - levantando la mano
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural en español con gerundio; «la mano» respeta el gesto sin añadir detalles.
- source_word: ἀπελογεῖτο
  english_pob_choice: made his defense
  chosen_spanish: hacía su defensa
  alternatives_spanish:
  - presentaba su defensa
  - se defendía
  lexicon: BDAG
  rationale: Se evita añadir un matiz inceptivo no explícito; el imperfecto describe la acción en curso, y «hacía su defensa» preserva el valor forense.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió «made his defense» frente a «began his defense» para no introducir un matiz inceptivo ausente en el griego. En español se reflejó esa decisión con el imperfecto «hacía su defensa».
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y judicial, coherente con el contexto de audiencia ante autoridades.
  - No se usaron notas al pie porque la formulación española elegida ya integra las alternativas semánticas relevantes sin crear una ambigüedad adicional que requiera anclaje.
