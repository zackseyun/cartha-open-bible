translation:
  language: es
  text: Así que nos embarcamos en un barco de Adramitio, que estaba por navegar hacia los lugares[a][b] de la costa de Asia, y zarpamos, estando con nosotros Aristarco, macedonio de Tesalónica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la provincia romana de Asia en el occidente de Asia Menor, no el continente moderno.
    reason: cultural_note
  - marker: b
    text: 'O: «a los puertos de la costa de Asia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιβάντες
  english_pob_choice: boarded
  chosen_spanish: nos embarcamos
  alternatives_spanish:
  - subimos a bordo
  - nos subimos al barco
  lexicon: BDAG
  rationale: En contexto náutico, el participio aoristo indica la acción de subir al barco antes del verbo principal. 'Nos embarcamos' suena natural en español y conserva el orden narrativo.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo más que contraste. 'Así que' enlaza bien con el contexto previo sin forzar una oposición.
- source_word: πλοίῳ Ἀδραμυττηνῷ
  english_pob_choice: an Adramyttian ship
  chosen_spanish: un barco de Adramitio
  alternatives_spanish:
  - un barco adramitiano
  - un barco de Adramyttion
  lexicon: BDAG
  rationale: El adjetivo identifica el barco por su puerto de origen. En español, la construcción con 'de' comunica con claridad la procedencia y mantiene el referente propio.
- source_word: μέλλοντι πλεῖν
  english_pob_choice: that was about to sail
  chosen_spanish: que estaba por navegar
  alternatives_spanish:
  - que iba a navegar
  - que estaba a punto de zarpar
  lexicon: BDAG
  rationale: La combinación μέλλω + infinitivo expresa inminencia o acción próxima. 'Estaba por navegar' preserva esa cercanía temporal y es idiomático en español.
- source_word: εἰς τοὺς κατὰ τὴν Ἀσίαν τόπους
  english_pob_choice: to the places along the coast of Asia
  chosen_spanish: hacia los lugares de la costa de Asia
  alternatives_spanish:
  - hacia los puertos de la costa de Asia
  - hacia los lugares a lo largo de la costa de Asia
  lexicon: BDAG
  rationale: κατά con acusativo tiene aquí fuerza geográfica/distributiva. 'De la costa de Asia' refleja el vínculo local sin introducir 'puertos' en el texto principal, aunque el contexto marítimo lo sugiera.
- source_word: Ἀσίαν
  english_pob_choice: Asia
  chosen_spanish: Asia
  alternatives_spanish:
  - la provincia de Asia
  lexicon: BDAG
  rationale: En Hechos, 'Asia' designa la provincia romana en el occidente de Asia Menor. El texto principal conserva el nombre familiar; la nota aclara que no se trata del continente moderno.
- source_word: ἀνήχθημεν
  english_pob_choice: put out to sea
  chosen_spanish: zarpamos
  alternatives_spanish:
  - salimos a navegar
  - nos hicimos a la mar
  lexicon: BDAG
  rationale: El verbo náutico expresa la maniobra de salir del puerto o hacerse a la mar. 'Zarpamos' es natural y preciso en español, y funciona bien en primera persona plural.
- source_word: ὄντος σὺν ἡμῖν
  english_pob_choice: with Aristarchus ... being with us
  chosen_spanish: con nosotros estando Aristarco
  alternatives_spanish:
  - y Aristarco estaba con nosotros
  - acompañado por Aristarco
  lexicon: BDAG
  rationale: El genitivo absoluto añade una circunstancia acompañante. Esta formulación mantiene la información suplementaria y deja visible la relación sintáctica, aunque en español suene algo más marcada.
- source_word: Ἀριστάρχου
  english_pob_choice: Aristarchus
  chosen_spanish: Aristarco
  alternatives_spanish:
  - Aristárco
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español convencional.
- source_word: Μακεδόνος
  english_pob_choice: a Macedonian
  chosen_spanish: macedonio
  alternatives_spanish:
  - de Macedonia
  lexicon: BDAG
  rationale: El término identifica a Aristarco por procedencia/región. 'Macedonio' reproduce la apposición étnica con naturalidad en español.
- source_word: Θεσσαλονικέως
  english_pob_choice: from Thessalonica
  chosen_spanish: de Tesalónica
  alternatives_spanish:
  - tesalonicense
  - tesalonicense
  lexicon: BDAG
  rationale: Este segundo calificativo especifica su ciudad. 'De Tesalónica' es claro y evita una doble cadena de gentilicios menos natural en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que aclaró 'the coast of Asia' como referencia a lugares a lo largo de la costa. Por eso el español usa 'los lugares de la costa de Asia' y mantiene el verbo náutico 'zarpamos' para ἀνήχθημεν, sin añadir contenido no respaldado por el griego.
  spanish_consistency_notes:
  - Se preservó 'Asia' como nombre propio y se añadió nota para evitar confusión con el continente moderno.
  - Se mantuvo 'Aristarco' como nombre propio y 'macedonio' / 'de Tesalónica' como apposiciones geográficas coherentes con el griego.
  - La secuencia verbal en primera persona plural refleja el plural inclusivo del griego ('nos embarcamos', 'zarpamos').
  - Se evitó 'siendo con nosotros' en favor de una construcción española más legible que aún refleja el genitivo absoluto.
