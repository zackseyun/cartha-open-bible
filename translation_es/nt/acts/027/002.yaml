revisions:
- from: Así que nos embarcamos en un barco de Adramitio, que estaba por navegar hacia los lugares[a] de la costa de Asia, y zarpamos, con nosotros estando Aristarco[b], macedonio de Tesalónica.
  to: Así que nos embarcamos en un barco de Adramitio, que estaba por navegar hacia los lugares[a][b] de la costa de Asia, y zarpamos, estando con nosotros Aristarco, macedonio de Tesalónica.
  rationale: Se reubicó la nota léxica [b] para que ancle correctamente a «lugares», que es donde pertenece la alternativa «puertos». También se reformuló la cláusula final a «estando con nosotros Aristarco» para expresar de manera natural en español la circunstancia acompañante del genitivo absoluto griego sin perder el sentido del original. Se mantuvo el resto del contenido porque refleja adecuadamente el texto fuente y las decisiones del POB en inglés.
