  text: ἐπιβάντες δὲ πλοίῳ Ἀδραμυττηνῷ ⸀μέλλοντι πλεῖν ⸀εἰς τοὺς κατὰ τὴν Ἀσίαν τόπους ἀνήχθημεν ὄντος σὺν ἡμῖν Ἀριστάρχου Μακεδόνος Θεσσαλονικέως·
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/002.yaml
  text: So we boarded an Adramyttian ship that was about to sail to the places along the coast of Asia[a], and put out to sea, with Aristarchus, a Macedonian from Thessalonica[b], being with us.
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern continent.
    reason: cultural_note
  - marker: b
    text: Or "to the ports along the coast of Asia."
    reason: lexical_alternative
