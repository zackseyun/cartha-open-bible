translation:
  language: es
  text: 'diciéndoles: «Hombres, percibo que la travesía está por hacerse[a] con desastre y gran pérdida, no solo del cargamento y del barco, sino también de nuestras vidas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con violencia y mucho daño». La frase griega puede enfatizar una dureza o violencia acompañante, además de la pérdida.
    reason: lexical_alternative
  - marker: b
    text: O «nuestras almas», pero aquí el sentido es claramente «nuestras vidas» por el contexto de posible naufragio y muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων αὐτοῖς
  english_pob_choice: saying to them
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - hablándoles
  - les decía
  lexicon: BDAG
  rationale: El participio introductorio se vierte como gerundio español para mantener el valor de circunstancia acompañante y el flujo narrativo sin sobreexplicar.
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Señores
  - Varones
  lexicon: BDAG
  rationale: Es un vocativo plural de ἀνήρ. «Hombres» conserva la correspondencia de género y la dirección directa del original; «Señores» suaviza demasiado el término.
- source_word: θεωρῶ
  english_pob_choice: I perceive
  chosen_spanish: percibo
  alternatives_spanish:
  - veo
  - considero
  lexicon: BDAG
  rationale: «Percibo» comunica discernimiento u observación fundada, no mera visión física, y reproduce bien el tono de evaluación de Pablo.
- source_word: μετὰ ὕβρεως καὶ πολλῆς ζημίας
  english_pob_choice: with disaster and great loss
  chosen_spanish: con desastre y gran pérdida
  alternatives_spanish:
  - con injuria y mucho daño
  - con violencia y gran pérdida
  lexicon: BDAG
  rationale: En este contexto marítimo, ὕβρις apunta a una calamidad/violencia que acompaña el viaje, y ζημία a pérdida seria. «Desastre y gran pérdida» suena natural en español y mantiene la fuerza del conjunto.
- source_word: οὐ μόνον τοῦ φορτίου καὶ τοῦ πλοίου ἀλλὰ καὶ
  english_pob_choice: not only of the cargo and the ship, but also
  chosen_spanish: no solo del cargamento y del barco, sino también
  alternatives_spanish:
  - no solo del cargamento y de la nave, sino también
  - no solo de la carga y del barco, sino también
  lexicon: BDAG
  rationale: Los genitivos dependen de la idea de pérdida o daño. «Del cargamento y del barco» explicita el objeto afectado y usa un español natural para un contexto náutico.
- source_word: τῶν ψυχῶν ἡμῶν
  english_pob_choice: our lives
  chosen_spanish: de nuestras vidas
  alternatives_spanish:
  - de nuestras almas
  - de nosotros mismos
  lexicon: BDAG
  rationale: Aquí ψυχή se refiere a la vida física amenazada por el naufragio, no al alma inmaterial. «Nuestras vidas» expresa claramente el sentido contextual.
- source_word: μέλλειν ἔσεσθαι
  english_pob_choice: is about to be
  chosen_spanish: va a ser
  alternatives_spanish:
  - está por ser
  - está a punto de ser
  lexicon: BDAG
  rationale: La combinación expresa inminencia. En español, «va a ser» comunica de forma natural que el resultado es inminente, sin perder la idea de proximidad.
- source_word: τὸν πλοῦν
  english_pob_choice: the voyage
  chosen_spanish: el viaje
  alternatives_spanish:
  - la travesía
  - la navegación
  lexicon: BDAG
  rationale: πλοῦς se refiere a la travesía por mar. «El viaje» es claro y suficientemente preciso en español; en contexto, queda entendido como viaje marítimo.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: los marcadores [a] y [b] ahora aparecen exactamente en el texto español y corresponden a notas ancladas. El resto del verso se mantuvo alineado con el sentido contextual del griego y con las decisiones auditadas en la versión inglesa.'
  spanish_consistency_notes:
  - Se preservó el vocabulario náutico con «cargamento», «barco» y «viaje» para mantener naturalidad en español.
  - Se evitó «almas» en el texto principal porque ψυχή aquí tiene fuerza de vida física amenazada; la alternativa queda documentada en nota.
  - La apertura con gerundio («diciéndoles») mantiene la función narrativa del participio griego sin añadir contenido.
  - El registro es sobrio y apto para publicación, sin depender de fórmulas eclesiásticas arcaicas.
