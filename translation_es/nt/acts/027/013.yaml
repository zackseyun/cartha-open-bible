base_translation:
  language: en
  yaml_path: translation/nt/acts/027/013.yaml
  text: And when a south wind began to blow gently[a], thinking that they had obtained their purpose, they weighed anchor and sailed along Crete[c][b], close inshore.
  footnotes:
  - marker: a
    text: Or 'supposing that they had secured their plan.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'having lifted [anchor].' The nautical sense is 'weighed anchor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'coasted along Crete, nearer the shore.'
    reason: lexical_alternative
