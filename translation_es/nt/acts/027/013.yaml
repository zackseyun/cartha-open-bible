revisions:
- from: Y cuando comenzó a soplar suavemente un viento del sur, pensando que habían conseguido su propósito, levaron anclas y navegaron más cerca de Creta.
  to: Y cuando comenzó a soplar suavemente un viento del sur, pensando que habían conseguido su propósito, levaron ancla[a] y costearon Creta,[b] más cerca de la orilla.
  rationale: 'La revisión conserva el sentido del borrador pero corrige el punto principal de fidelidad: el original no dice solo que navegaron ‘más cerca de Creta’, sino que fueron costeando la isla cerca de la orilla. También se preserva mediante nota el matiz literal de ἄραντες, conforme al rastro de auditoría inglés.'
