translation:
  language: es
  text: Y cuando comenzó a soplar suavemente un viento del sur, pensando que habían conseguido su propósito, levaron ancla[a] y costearon Creta,[b] más cerca de la orilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habiendo levantado [ancla]». En contexto náutico, la expresión significa «levar ancla».
    reason: lexical_alternative
  - marker: b
    text: O «navegaron a lo largo de Creta, más cerca de la costa».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑποπνεύσαντος
  english_pob_choice: began to blow gently
  chosen_spanish: comenzó a soplar suavemente
  alternatives_spanish:
  - sopló suavemente
  - empezó a soplar con suavidad
  lexicon: BDAG
  rationale: El participio expresa un soplar leve del viento con matiz ingresivo; «comenzó a soplar suavemente» conserva ambos rasgos sin sonar forzado en español.
- source_word: νότου
  english_pob_choice: a south wind
  chosen_spanish: un viento del sur
  alternatives_spanish:
  - el viento del sur
  - un viento austral
  lexicon: BDAG
  rationale: νότος nombra el viento procedente del sur; en español, «un viento del sur» reproduce con naturalidad el valor anartro y la dirección meteorológica.
- source_word: δόξαντες
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - creyendo
  lexicon: BDAG
  rationale: δοκέω aquí expresa una evaluación subjetiva de la situación; «pensando» es directo y mantiene el flujo narrativo.
- source_word: τῆς προθέσεως
  english_pob_choice: their purpose
  chosen_spanish: su propósito
  alternatives_spanish:
  - su plan
  - su intención
  lexicon: BDAG
  rationale: πρόθεσις en este contexto se refiere al objetivo o curso que creían haber logrado. «Su propósito» conserva la amplitud semántica sin cargarlo con un matiz exclusivamente teológico.
- source_word: κεκρατηκέναι
  english_pob_choice: had obtained
  chosen_spanish: habían conseguido
  alternatives_spanish:
  - habían obtenido
  - habían logrado
  lexicon: BDAG
  rationale: κρατέω puede significar alcanzar, obtener o conseguir. «Habían conseguido» expresa bien la idea de haber alcanzado su objetivo en español contemporáneo.
- source_word: ἄραντες
  english_pob_choice: they weighed anchor
  chosen_spanish: levaron anclas
  alternatives_spanish:
  - alzaron anclas
  - levantaron anclas
  lexicon: BDAG
  rationale: En contexto náutico, αἴρω alude a izar o levantar el ancla para zarpar. «Levaron anclas» es el equivalente español natural y técnico.
- source_word: ἆσσον
  english_pob_choice: close inshore
  chosen_spanish: más cerca
  alternatives_spanish:
  - más cerca de la costa
  - pegados a la costa
  lexicon: BDAG
  rationale: ἆσσον es un adverbio comparativo de cercanía. En castellano, la cercanía al litoral queda suficientemente expresada por el verbo y el contexto; «más cerca» evita añadir información no explícita en el griego.
- source_word: παρελέγοντο
  english_pob_choice: sailed along
  chosen_spanish: navegaron
  alternatives_spanish:
  - costearon
  - navegaron bordeando
  lexicon: BDAG
  rationale: παραλέγομαι se usa en navegación para avanzar a lo largo de una costa. «Navegaron» es natural y, unido al complemento «más cerca de Creta», mantiene la idea de seguir la línea costera.
- source_word: τὴν Κρήτην
  english_pob_choice: Crete
  chosen_spanish: de Creta
  alternatives_spanish:
  - Creta
  - la costa de Creta
  lexicon: BDAG
  rationale: El objeto directo es «Creta», pero el verbo náutico ya sugiere el desplazamiento costero. En español, «de Creta» integra de forma fluida la relación espacial en la construcción verbal.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido aprobado en el audit trail inglés: viento suave del sur, percepción subjetiva de haber alcanzado la meta, acción náutica de levar anclas y avanzar a lo largo de la costa de Creta. No se detectaron revisiones aplicadas ni tensiones teológicas en este versículo.'
  spanish_consistency_notes:
  - Se mantiene un registro náutico claro y idiomático, evitando calcos innecesarios.
  - No se introduce 'SEÑOR' ni terminología teológica ajena al pasaje.
  - La cercanía costera queda expresada por el contexto verbal sin sobreexplicar el griego.
