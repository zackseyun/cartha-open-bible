  text: καὶ τὰς ἀγκύρας περιελόντες εἴων εἰς τὴν θάλασσαν, ἅμα ἀνέντες τὰς ζευκτηρίας τῶν πηδαλίων, καὶ ἐπάραντες τὸν ἀρτέμωνα τῇ πνεούσῃ κατεῖχον εἰς τὸν αἰγιαλόν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/040.yaml
  text: And after casting off the anchors[a], they left them in the sea; at the same time loosening the ropes of the rudders, and hoisting the foresail to the wind[b], they made for the beach.
  footnotes:
  - marker: a
    text: Or 'the bands/fastenings of the rudders'; the Greek term is a rare nautical word for what secured the steering apparatus.
    reason: lexical_alternative
  - marker: b
    text: Or 'the topsail' or 'the sail at the bow'; the exact reference of the Greek nautical term is uncertain.
    reason: lexical_alternative
