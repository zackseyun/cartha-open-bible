translation:
  language: es
  text: Y después de soltar las anclas, las dejaron en el mar; al mismo tiempo, soltando las amarras[a] de los timones y izando la vela de proa[b] al viento, se dirigieron hacia la playa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bandas/amarres de los timones»; el término griego es una palabra náutica rara para lo que sujetaba el aparato de gobierno.
    reason: lexical_alternative
  - marker: b
    text: O «la vela delantera» o «la vela de arriba»; no es seguro el referente exacto del término náutico griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιελόντες
  english_pob_choice: after casting off
  chosen_spanish: después de soltar
  alternatives_spanish:
  - después de desatar
  - después de largar
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa. En contexto náutico, el sentido es liberar o aflojar algo para dejarlo ir; «soltar» comunica bien la acción sin forzar un calco.
- source_word: ἀγκύρας
  english_pob_choice: the anchors
  chosen_spanish: las anclas
  alternatives_spanish:
  - los anclajes
  lexicon: BDAG
  rationale: Sustantivo náutico directo y transparente en español. «Anclas» conserva el plural y el valor concreto del objeto.
- source_word: εἴων εἰς τὴν θάλασσαν
  english_pob_choice: they left them in the sea
  chosen_spanish: las dejaron en el mar
  alternatives_spanish:
  - las soltaron en el mar
  - las abandonaron en el mar
  lexicon: BDAG
  rationale: ἐάω aquí significa dejar ir/abandonar. En español, «las dejaron en el mar» refleja que no las recuperaron y mantiene la naturalidad narrativa.
- source_word: ἅμα
  english_pob_choice: at the same time
  chosen_spanish: al mismo tiempo
  alternatives_spanish:
  - simultáneamente
  - a la vez
  lexicon: BDAG
  rationale: Marca acciones concurrentes con los participios siguientes. «Al mismo tiempo» es claro y fiel al valor adverbial.
- source_word: ἀνέντες
  english_pob_choice: loosening
  chosen_spanish: soltando
  alternatives_spanish:
  - liberando
  - aflojando
  lexicon: BDAG
  rationale: El verbo expresa la liberación de algo previamente sujeto. «Soltando» funciona bien con la imagen de cuerdas o amarras en un contexto marinero.
- source_word: ζευκτηρίας
  english_pob_choice: the ropes
  chosen_spanish: las amarras
  alternatives_spanish:
  - las cuerdas
  - las bandas
  lexicon: BDAG
  rationale: Es un término náutico raro para lo que aseguraba el aparato de gobierno. «Amarras» conserva la idea de sujeción y suena más natural que «cuerdas» en español marítimo; la nota preserva la incertidumbre del término griego.
- source_word: τῶν πηδαλίων
  english_pob_choice: of the rudders
  chosen_spanish: de los timones
  alternatives_spanish:
  - de los remos de gobierno
  - de los rudders
  lexicon: BDAG
  rationale: En español, «timones» comunica el aparato de gobierno de la nave con más naturalidad que una transliteración o un término técnico menos conocido. Se mantiene el valor funcional del plural griego.
- source_word: ἐπάραντες
  english_pob_choice: hoisting
  chosen_spanish: izando
  alternatives_spanish:
  - levantando
  - alzando
  lexicon: BDAG
  rationale: En lenguaje náutico, «izar» es la forma idiomática de elevar una vela. Conserva el sentido de levantar algo con propósito operativo.
- source_word: ἀρτέμωνα
  english_pob_choice: the foresail
  chosen_spanish: la vela de proa
  alternatives_spanish:
  - el foque
  - la vela delantera
  lexicon: BDAG
  rationale: El término griego designa una vela de tipo debatido. «Vela de proa» comunica su ubicación frontal sin afirmar una identificación más precisa de la que permite la evidencia.
- source_word: τῇ πνεούσῃ
  english_pob_choice: to the wind
  chosen_spanish: al viento
  alternatives_spanish:
  - a la brisa
  - con el viento
  lexicon: BDAG
  rationale: El participio de πνέω funciona aquí con sentido de viento soplante. «Al viento» reproduce la relación direccional e instrumental de manera concisa y natural.
- source_word: κατεῖχον εἰς τὸν αἰγιαλόν
  english_pob_choice: they made for the beach
  chosen_spanish: se dirigieron hacia la playa
  alternatives_spanish:
  - apuntaron hacia la playa
  - tomaron rumbo a la playa
  lexicon: BDAG
  rationale: κατέχω tiene aquí un matiz náutico de dirigir/ mantener rumbo hacia un destino. «Se dirigieron hacia la playa» expresa el movimiento intencional sin sobretraducir la imagen.
translation_notes:
  revision_awareness: El texto sigue de cerca la pauta auditada en inglés, pero ajusta el registro al español bíblico contemporáneo. Se conserva la secuencia de acciones marítimas y la incertidumbre léxica de ἀρτέμων y ζευκτηρία mediante notas alternativas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras convenciones no presentes en el versículo.
  - Se mantiene un vocabulario náutico natural en español, con «anclas», «amarras», «timones» y «vela de proa».
  - La puntuación reproduce la acumulación de participios del griego sin volverla pesada en español.
