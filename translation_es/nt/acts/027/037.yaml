translation:
  language: es
  text: Y había en total 276 personas en la nave[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Éramos, en total, 276 almas en la nave». Aquí «almas» significa «personas» o «gente», no específicamente almas inmateriales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤμεθα
  english_pob_choice: there were
  chosen_spanish: había
  alternatives_spanish:
  - estábamos
  lexicon: BDAG
  rationale: El griego está en primera persona plural, pero en español el valor idiomático con un total numérico se expresa de manera natural con el existencial impersonal «había». Conserva el sentido del conteo sin forzar una traducción literal extraña como «estábamos».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa suave. «Ahora» reproduce ese cambio de escena de forma natural en español.
- source_word: αἱ πᾶσαι ψυχαὶ
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - gentes
  lexicon: BDAG
  rationale: ψυχαί en este contexto designa a los individuos a bordo, no a almas inmateriales. «Personas» evita una lectura teológica errónea y expresa el total con claridad. Mantengo «en total» para reflejar πᾶσαι.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the ship
  chosen_spanish: en la nave
  alternatives_spanish:
  - en el barco
  - a bordo de la nave
  lexicon: BDAG
  rationale: πλοῖον puede traducirse como «nave» o «barco». «En la nave» conserva bien la referencia concreta al medio de transporte marítimo y suena natural en español bíblico contemporáneo.
- source_word: διακόσιαι ἑβδομήκοντα ἕξ
  english_pob_choice: '276'
  chosen_spanish: '276'
  alternatives_spanish:
  - doscientas setenta y seis
  - doscientos setenta y seis
  lexicon: BDAG
  rationale: El número se presenta en cifra por claridad y fidelidad exacta al total griego. Al referirse a «personas», no se marca el género numérico en español.
theological_decisions:
- issue: Sentido de ψυχαί
  english_pob_reading: '''souls'' means ''persons'' or ''people,'' not specifically immaterial souls.'
  chosen_spanish_reading: «personas», no «almas» en sentido antropológico/espiritual.
  alternative_spanish_readings:
  - almas
  - vidas
  rationale: El contexto del recuento de pasajeros exige un valor colectivo e idiomático de ψυχαί. Traducir «almas» en español podría sugerir una afirmación doctrinal sobre la parte inmaterial del ser humano, cosa que el texto no está haciendo aquí.
  doctrine_reference: Uso contextual de ψυχή; cf. recuentos narrativos donde «alma» = persona.
translation_notes:
  revision_awareness: Se revisó el cierre numeral y el valor idiomático de ψυχαί conforme al audit trail inglés. No se aplicaron revisiones previas; se adoptó una redacción española natural que conserva el conteo exacto y evita una mala lectura de «almas».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aplica.
  - Se prefirió una construcción existencial impersonal («había») para reflejar el valor idiomático de ἤμεθα con un total numérico.
  - Se mantuvo «nave» como equivalente de πλοῖον, consistente con un registro bíblico claro y contemporáneo.
  - La nota al pie marca explícitamente la alternativa «almas» para preservar la tensión léxica documentada por el POB inglés.
