translation:
  language: es
  text: y el resto[a], unos sobre tablas y otros sobre fragmentos del barco. Y así sucedió que todos llegaron a salvo a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos fueron salvados a tierra» / «todos escaparon a salvo a la orilla». El verbo griego aquí se refiere a la liberación física en medio del naufragio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς λοιποὺς
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - los demás
  - los restantes
  lexicon: BDAG
  rationale: λοιποί se refiere al grupo restante de personas después de la mención previa. «El resto» es natural en español y conserva la idea de los que quedaban.
- source_word: οὓς μὲν ... οὓς δὲ
  english_pob_choice: some ... and some
  chosen_spanish: unos ... y otros
  alternatives_spanish:
  - unos ... y unos otros
  - algunos ... y otros
  lexicon: BDAG
  rationale: La construcción correlativa divide al grupo restante en dos conjuntos. «Unos ... y otros» reproduce bien la contraposición sin calcar de modo forzado μέν/δέ.
- source_word: ἐπὶ σανίσιν
  english_pob_choice: on planks
  chosen_spanish: sobre tablas
  alternatives_spanish:
  - sobre tablones
  - sobre planchas
  lexicon: BDAG
  rationale: σανίς designa una tabla o tablón. En español, «tablas» es claro y natural; «tablones» también sería posible, pero «tablas» mantiene el tono simple del contexto náufrago.
- source_word: ἐπί τινων τῶν ἀπὸ τοῦ πλοίου
  english_pob_choice: on pieces from the ship
  chosen_spanish: sobre piezas del barco
  alternatives_spanish:
  - sobre fragmentos del barco
  - sobre algunos restos del barco
  lexicon: BDAG
  rationale: τινων + el sintagma partitivo indica objetos indefinidos procedentes del barco. «Piezas del barco» es suficientemente general y no especifica más de lo que permite el griego.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: οὕτως resume la manera ya descrita. «Así» es la correspondencia más natural y breve en español.
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - ocurrió
  - vino a pasar
  lexicon: BDAG
  rationale: γίνομαι en esta fórmula introduce el resultado narrativo. «Sucedió» conserva el tono de relato y evita sobretraducir el aspecto verbal.
- source_word: πάντας διασωθῆναι
  english_pob_choice: all were brought safely
  chosen_spanish: todos fueron llevados a salvo
  alternatives_spanish:
  - todos fueron salvados
  - todos escaparon a salvo
  lexicon: BDAG
  rationale: διασῴζω aquí expresa preservación física a través del peligro del naufragio. «Llevados a salvo» refleja el pasivo/resultativo sin introducir, por defecto, una carga soteriológica que el contexto inmediato no exige.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: to land
  chosen_spanish: a tierra
  alternatives_spanish:
  - a la costa
  - a la orilla
  lexicon: BDAG
  rationale: En este contexto marítimo, γῆ significa tierra firme frente al mar. «A tierra» es idiomático en español y corresponde bien a la imagen de llegar sanos y salvos.
theological_decisions:
- issue: Sentido de διασωθῆναι en un relato de naufragio
  english_pob_reading: 'Physical deliverance: ''were brought safely to land'''
  chosen_spanish_reading: 'Rescate físico: ''fueron llevados a salvo a tierra'''
  alternative_spanish_readings:
  - fueron salvados a tierra
  - escaparon a salvo a la orilla
  rationale: El contexto inmediato trata de supervivencia en un naufragio, no de salvación espiritual. La redacción española preserva esa lectura física y evita importar una implicación doctrinal ajena al pasaje.
  doctrine_reference: Principio de primacía del texto original y de no sobrecargar un verbo de rescate físico con sentido soteriológico no marcado por el contexto.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso de revisión previo (alto acuerdo) y mantiene la decisión auditada de traducir διασωθῆναι en sentido de rescate físico, sin introducir cambios sustantivos respecto del análisis inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin intervenir, pues este versículo no contiene referencia divina directa.
  - Se usa «barco» en lugar de «nave» para conservar un registro claro y común en español contemporáneo.
  - Se conserva la distinción narrativa entre «unos ... y otros» y la cláusula final de resultado.
  - La nota al pie marca la alternativa semántica principal reconocida en el audit trail inglés.
