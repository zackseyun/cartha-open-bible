revisions:
- from: Pero al caer en un lugar[a] entre dos mares, encallaron la nave; y la proa, habiéndose afirmado, quedó inmóvil, mientras la popa se iba deshaciendo por la fuerza.
  to: Pero al caer en un lugar donde se encontraban dos mares[a], encallaron la nave; y la proa, habiendo quedado atascada, quedó inmóvil, mientras la popa se iba deshaciendo por la fuerza.
  rationale: Se ajusta τόπον διθάλασσον para que el texto principal refleje la elección auditada más literal («donde se encontraban dos mares») y se deja «entre dos mares» como alternativa en la nota. También se sustituye «habiéndose afirmado» por «habiendo quedado atascada», que representa con mayor naturalidad y precisión la idea de la proa firmemente trabada. El resto del versículo es fiel y natural, incluida la omisión de «olas» tras «fuerza».
