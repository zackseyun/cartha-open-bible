translation:
  language: es
  text: Pero al caer en un lugar donde se encontraban dos mares[a], encallaron la nave; y la proa, habiendo quedado atascada, quedó inmóvil, mientras la popa se iba deshaciendo por la fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lugar entre dos mares». La expresión griega es rara y puede referirse a un canal, un banco de arena o un punto de encuentro de dos masas o corrientes de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιπεσόντες
  english_pob_choice: falling into
  chosen_spanish: al caer en
  alternatives_spanish:
  - al encontrarse con
  - al dar en
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia del accidente marítimo. «Al caer en» conserva la idea de irrupción súbita y adversa sin volverla demasiado interpretativa.
- source_word: τόπον διθάλασσον
  english_pob_choice: a place where two seas met
  chosen_spanish: un lugar entre dos mares
  alternatives_spanish:
  - un lugar donde se encuentran dos mares
  - un sitio entre dos corrientes
  lexicon: BDAG
  rationale: La expresión es rara y admite más de una reconstrucción. «Entre dos mares» mantiene la ambigüedad léxica del griego y sugiere un paso o franja de agua sin añadir detalles no explícitos en el texto.
- source_word: ἐπέκειλαν τὴν ναῦν
  english_pob_choice: they ran the ship aground
  chosen_spanish: encallaron la nave
  alternatives_spanish:
  - pusieron la nave en seco
  - vararon la nave
  lexicon: BDAG
  rationale: El verbo es náutico y describe llevar la embarcación a tocar fondo. «Encallaron» es natural en español y conserva el sentido técnico de varar o quedar fija en el fondo.
- source_word: πρῷρα
  english_pob_choice: the bow
  chosen_spanish: la proa
  alternatives_spanish:
  - el frente de la nave
  - el prow
  lexicon: BDAG
  rationale: Término náutico estándar en español para la parte delantera de la nave.
- source_word: ἐρείσασα
  english_pob_choice: having stuck fast
  chosen_spanish: habiéndose afirmado
  alternatives_spanish:
  - habiéndose trabado
  - habiéndose fijado con firmeza
  lexicon: BDAG
  rationale: El participio de ἐρείδω expresa quedar firmemente apoyada o trabada. «Habiéndose afirmado» comunica la fijación firme sin introducir una imagen ajena al griego.
- source_word: ἔμεινεν ἀσάλευτος
  english_pob_choice: remained immovable
  chosen_spanish: quedó inmóvil
  alternatives_spanish:
  - permaneció inmóvil
  - quedó sin moverse
  lexicon: BDAG
  rationale: La frase resalta que la proa no podía moverse. «Quedó inmóvil» es breve y fiel, y preserva el valor resultativo del conjunto.
- source_word: πρύμνα
  english_pob_choice: the stern
  chosen_spanish: la popa
  alternatives_spanish:
  - la parte trasera de la nave
  - la popa del barco
  lexicon: BDAG
  rationale: Término náutico estándar en español. «Popa» corresponde al back/ stern de la nave.
- source_word: ἐλύετο
  english_pob_choice: was being broken up
  chosen_spanish: se iba deshaciendo
  alternatives_spanish:
  - se iba rompiendo
  - se desmoronaba
  lexicon: BDAG
  rationale: El imperfecto pasivo indica un proceso progresivo. «Se iba deshaciendo» transmite la desintegración gradual con un español natural y dinámico.
- source_word: ὑπὸ τῆς βίας
  english_pob_choice: by the force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - por la violencia
  - por la presión
  lexicon: BDAG
  rationale: βία significa fuerza o violencia. Dado que el griego no explicita «olas», se evita añadir un complemento inexistente; «por la fuerza» conserva la generalidad del original.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al no añadir «de las olas» en ὑπὸ τῆς βίας, porque esa especificación no aparece en el griego y fue retirada en el pasaje auditado. También conserva la rareza de τόπον διθάλασσον mediante una nota alternativa en vez de fijar una interpretación más concreta que el original no exige.
  spanish_consistency_notes:
  - Se usó «nave» para τὴν ναῦν por coherencia náutica y por alineación con el registro del pasaje.
  - Se prefirió «proa» y «popa» como equivalentes técnicos de πρῷρα y πρύμνα.
  - No se introdujo «olas» en el último sintagma, en consonancia con el texto griego y la revisión inglesa auditada.
  - El marcador de nota a aparece anclado en «lugar» para preservar la ambigüedad léxica de τόπον διθάλασσον.
