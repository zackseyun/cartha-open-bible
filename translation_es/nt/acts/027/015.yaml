translation:
  language: es
  text: Y cuando la nave fue atrapada y no podía encarar el viento[a], cedimos y fuimos llevados a la deriva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cedimos a ello y fuimos llevados»'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναρπασθέντος
  english_pob_choice: was caught
  chosen_spanish: fue atrapada
  alternatives_spanish:
  - fue arrebatada
  - fue llevada por la fuerza
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa que la nave quedó súbitamente tomada por una fuerza externa. «Fue atrapada» mantiene la pasividad y el carácter repentino sin añadir una imagen más fuerte de pérdida total de control.
- source_word: πλοίου
  english_pob_choice: ship
  chosen_spanish: nave
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En español, «nave» funciona bien en un contexto náutico y es plenamente natural en un relato de travesía; evita el posible tono demasiado genérico de «embarcación» y el posible registro menos preciso de «barco».
- source_word: μὴ δυναμένου
  english_pob_choice: could not
  chosen_spanish: no podía
  alternatives_spanish:
  - no era capaz de
  - no lograba
  lexicon: BDAG
  rationale: La construcción participial expresa imposibilidad; en español, una forma finita como «no podía» comunica con naturalidad esa incapacidad sin perder el sentido del original.
- source_word: ἀντοφθαλμεῖν
  english_pob_choice: face
  chosen_spanish: hacer frente
  alternatives_spanish:
  - enfrentar
  - ir contra
  - mirar de frente
  lexicon: BDAG
  rationale: El verbo alude a resistir o hacer frente al viento, especialmente en un contexto marítimo. «Hacer frente» conserva la idea de resistencia frente a la fuerza del viento y suena natural en español.
- source_word: τῷ ἀνέμῳ
  english_pob_choice: the wind
  chosen_spanish: al viento
  alternatives_spanish:
  - al viento huracanado
  - a la tempestad
  lexicon: BDAG
  rationale: ἄνεμος significa simplemente «viento». Aunque el contexto es tormentoso, el sustantivo por sí solo no exige intensificarlo a «tempestad» o «huracanado».
- source_word: ἐπιδόντες
  english_pob_choice: we gave way
  chosen_spanish: cedimos
  alternatives_spanish:
  - cedimos terreno
  - nos dejamos llevar
  lexicon: BDAG
  rationale: En contexto náutico, el participio expresa abandonar la resistencia contra la fuerza del viento. «Cedimos» mantiene la idea de dejar de oponerse y resulta claro y breve en español.
- source_word: ἐφερόμεθα
  english_pob_choice: were driven along
  chosen_spanish: fuimos arrastrados
  alternatives_spanish:
  - fuimos llevados
  - fuimos empujados
  lexicon: BDAG
  rationale: El imperfecto pasivo indica movimiento continuo bajo una fuerza externa. «Fuimos arrastrados» preserva esa pasividad e intensifica apropiadamente el contexto de la tormenta.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de SBLGNT y el control auditado en inglés, incorporando la revisión que prefirió un verbo más natural para la acción de la nave al ser tomada por la tormenta. Se mantuvo la secuencia causal: captura de la nave, incapacidad de resistir al viento, cesión y desplazamiento forzado.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin calcos innecesarios.
  - «Nave» se eligió como equivalente natural en este contexto marítimo.
  - La alternativa de la nota explica la segunda mitad del verso sin introducir una nueva lectura doctrinal.
