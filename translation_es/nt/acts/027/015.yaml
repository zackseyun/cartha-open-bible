revisions:
- from: Y cuando la nave fue atrapada y no podía hacer frente al viento[a], cedimos y fuimos arrastrados.
  to: Y cuando la nave fue atrapada y no podía encarar el viento[a], cedimos y fuimos llevados a la deriva.
  rationale: Se ajusta la expresión náutica para representar mejor ἀντοφθαλμεῖν («encarar el viento») y se mejora la representación de ἐφερόμεθα con «fuimos llevados a la deriva», que comunica con más naturalidad española el movimiento continuo del barco bajo fuerza externa. También se pule la nota alternativa para evitar redundancia y mantener el sentido del rastro de auditoría inglés.
