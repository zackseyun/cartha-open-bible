revisions:
- from: Después de izarlo[a], usaban cables de sostén para ceñir el barco; y, temiendo[b] encallar en la Sirte, soltaron[c] el ancla de mar y así eran arrastrados.
  to: Después de izarlo, usaban cables de sostén[a] para reforzar el casco del barco; y, temiendo encallar en la Sirte[b], bajaron[c] el ancla de mar y así eran arrastrados.
  rationale: Se ajusta «ceñir el barco» a una expresión más clara y fiel al sentido náutico de reforzar la nave con cables; se cambia «soltaron» por «bajaron» para reflejar mejor χαλάσαντες; y se alinean las notas con la auditoría inglesa, añadiendo la nota cultural sobre la Sirte y una alternativa léxica pertinente para βοηθείαις.
