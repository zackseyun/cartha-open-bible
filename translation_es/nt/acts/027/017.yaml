source:
  edition: SBLGNT
  text: ἣν ἄραντες βοηθείαις ἐχρῶντο ὑποζωννύντες τὸ πλοῖον· φοβούμενοί τε μὴ εἰς τὴν Σύρτιν ἐκπέσωσιν, χαλάσαντες τὸ σκεῦος, οὕτως ἐφέροντο.
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/017.yaml
  text: After hoisting it up[a], they used supporting cables to undergird the ship; and fearing that they might run aground on the Syrtis[c][b], they lowered the sea anchor and so were driven along.
  footnotes:
  - marker: a
    text: Or 'frapping cables'; the Greek literally speaks of using 'supports' to undergird the ship.
    reason: lexical_alternative
  - marker: b
    text: The Syrtis was a notorious area of shoals or sandbanks off the North African coast.
    reason: cultural_note
  - marker: c
    text: Or 'they lowered the tackle' or 'they lowered the sea anchor'; the Greek says 'the gear/equipment,' and the exact nautical reference is uncertain.
    reason: lexical_alternative
