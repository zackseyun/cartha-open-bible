review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: después de subir la barca, usan cables para reforzar la nave, temen encallar en la Sirte, bajan cierto equipo náutico y son llevados por la tormenta. Sin embargo, dos decisiones no preservan del todo bien el matiz fuente/auditoría: «ceñir el barco» suena poco claro para ὑποζωννύντες τὸ πλοῖον, que describe reforzar el casco con cables pasados por debajo/alrededor; y «soltaron el ancla de mar» se aparta del valor básico de χαλάσαντες (‘bajar’, ‘arriar’) y de la nota inglesa que mantiene la incertidumbre del referente de σκεῦος.'
  spanish_quality_summary: El español es generalmente legible, pero «ceñir el barco» resulta algo opaco en registro general, y «soltaron el ancla de mar» puede sugerir liberarla más que arriarla/bajarla. Además, conviene preservar en nota la explicación cultural sobre la Sirte, ya presente en la auditoría inglesa, y hacer que la nota a se alinee con la alternativa inglesa sobre ‘cables de frapado’/‘soportes’.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La transliteración «Sirte» funciona bien en español. «Barco» es aceptable para πλοῖον, aunque «nave»/«barco» ambos serían válidos. La elección «ancla de mar» es admisible como lectura contextual probable, pero debe expresarse con un verbo como «bajaron» para respetar mejor χαλάσαντες.
  issues:
  - severity: medium
    issue: «para ceñir el barco» es poco claro para ὑποζωννύντες τὸ πλοῖον
    rationale: El verbo náutico describe pasar cables para reforzar el casco. «Ceñir» no comunica con suficiente claridad la acción de apuntalar/afianzar la nave y puede sonar literario u oscuro.
  - severity: medium
    issue: «soltaron el ancla de mar» debilita el sentido de χαλάσαντες
    rationale: El participio aoristo indica bajar/arriar. «Soltar» puede entenderse como liberar o dejar ir, mientras que el contexto y la auditoría inglesa favorecen ‘lowered’.
  - severity: low
    issue: Falta la nota cultural sobre la Sirte presente en la auditoría inglesa
    rationale: La POB inglesa conservó una nota explicando que la Sirte era una zona famosa de bajíos/bancos de arena. En español conviene mantenerla para preservar la misma ayuda contextual.
  - severity: low
    issue: La nota [a] no refleja la alternativa léxica principal documentada para βοηθείαις
    rationale: La auditoría inglesa marca como alternativa «frapping cables» y explica que el griego dice literalmente ‘supports’. La nota española actual sobre el participio aoristo no corresponde al punto principal de variación léxica preservado en inglés.
