translation:
  language: es
  text: Después de izarlo, usaban cables de sostén[a] para reforzar el casco del barco; y, temiendo encallar en la Sirte[b], bajaron[c] el ancla de mar y así eran arrastrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cables de frapado»; el griego literalmente habla de «soportes» o «ayudas» usados para reforzar la nave.'
    reason: lexical_alternative
  - marker: b
    text: La Sirte era una zona notoria de bajíos o bancos de arena frente a la costa del norte de África.
    reason: cultural_note
  - marker: c
    text: 'O: «bajaron el aparejo» o «bajaron el ancla de mar»; el griego dice «el equipo/aparejo», y la referencia náutica exacta es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - ello
  - eso
  lexicon: BDAG
  rationale: El antecedente es la barca pequeña del versículo anterior; en español, el neutro resumitivo se expresa con 'lo' en un giro natural como 'después de izarlo', sin forzar una relativa calcada.
- source_word: ἄραντες
  english_pob_choice: After hoisting ... up
  chosen_spanish: Después de izarlo
  alternatives_spanish:
  - habiéndolo levantado
  - después de levantarlo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; 'después de izarlo' conserva la anterioridad y encaja con el contexto náutico.
- source_word: βοηθείαις
  english_pob_choice: supporting cables
  chosen_spanish: cables de sostén
  alternatives_spanish:
  - ayudas
  - soportes
  - cables de apoyo
  lexicon: BDAG
  rationale: La palabra es literalmente 'ayudas' o 'soportes', pero en este contexto marítimo apunta a medios técnicos para reforzar el casco. 'Cables de sostén' comunica la función sin exagerar la precisión técnica.
- source_word: ἐχρῶντο
  english_pob_choice: they used
  chosen_spanish: usaban
  alternatives_spanish:
  - usaron
  - hacían uso de
  lexicon: BDAG
  rationale: El imperfecto indica acción en desarrollo; 'usaban' mantiene ese matiz continuo mejor que un perfecto puntual.
- source_word: ὑποζωννύντες τὸ πλοῖον
  english_pob_choice: to undergird the ship
  chosen_spanish: para ceñir el barco
  alternatives_spanish:
  - para reforzar el barco por debajo
  - para ceñir el navío
  lexicon: BDAG
  rationale: El verbo describe pasar cables alrededor del casco para afirmarlo. 'Ceñir el barco' conserva la imagen de rodearlo y apretarlo, de forma más idiomática que un calco rígido.
- source_word: φοβούμενοί τε μὴ εἰς τὴν Σύρτιν ἐκπέσωσιν
  english_pob_choice: fearing that they might run aground on the Syrtis
  chosen_spanish: temiendo encallar en la Sirte
  alternatives_spanish:
  - temiendo ser arrojados a la Sirte
  - temiendo dar en la Sirte
  lexicon: BDAG
  rationale: '''ἐκπέσωσιν'' expresa quedar expuestos o caer en el peligro de los bajíos; ''encallar'' es el equivalente marítimo natural. Se conserva el nombre geográfico transliterado tradicionalmente en español como ''Sirte''.'
- source_word: Σύρτιν
  english_pob_choice: the Syrtis
  chosen_spanish: la Sirte
  alternatives_spanish:
  - la Syrtis
  - los bajíos de la Sirte
  lexicon: BDAG
  rationale: Como topónimo, en español es más natural 'Sirte' que la forma grecolatinizante 'Syrtis'. La nota de contexto queda implícita en el nombre propio.
- source_word: χαλάσαντες τὸ σκεῦος
  english_pob_choice: they lowered the sea anchor
  chosen_spanish: soltaron el ancla de mar
  alternatives_spanish:
  - bajaron el aparejo
  - soltaron el equipo
  lexicon: BDAG
  rationale: La revisión inglesa opta por 'sea anchor' como lectura probable; en español 'ancla de mar' expresa esa opción con naturalidad náutica. Se mantiene la posibilidad implícita sin precisar más allá de la evidencia.
- source_word: οὕτως ἐφέροντο
  english_pob_choice: and so were driven along
  chosen_spanish: y así eran arrastrados
  alternatives_spanish:
  - y así eran llevados
  - y de ese modo derivaban
  lexicon: BDAG
  rationale: El pasivo imperfecto denota movimiento continuo causado por fuerzas externas; 'eran arrastrados' lo comunica con fuerza y sin añadir elementos ajenos al texto.
translation_notes:
  revision_awareness: El contexto inglés revisado prefirió ‘sea anchor’ para τὸ σκεῦος, sustituyendo la genérica ‘gear/equipment’. El español adopta esa lectura probable como ‘ancla de mar’, pero deja nota alternativa porque la referencia exacta sigue siendo incierta en el griego.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando el calco rígido.
  - ‘Sirte’ se usa como topónimo español estable para Σύρτις.
  - ‘eran arrastrados’ refleja el imperfecto pasivo con continuidad, sin introducir navegación técnica no atestiguada.
  - Las notas [a], [b] y [c] aparecen ancladas directamente en el texto para cumplir la trazabilidad editorial.
