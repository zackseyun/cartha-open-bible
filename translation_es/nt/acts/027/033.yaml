translation:
  language: es
  text: 'Hasta que iba a amanecer[a], Pablo seguía instando a todos a tomar alimento, diciendo: «Hoy es el día catorce que han continuado esperando[b] sin comer, sin haber tomado nada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iba a amanecer» traduce de manera idiomática la idea griega de que el día estaba por llegar a ser; también podría entenderse «iba a hacerse de día».
    reason: lexical_alternative
  - marker: b
    text: El participio προσδοκῶντες puede expresar simplemente «esperando»; en este contexto de tormenta también puede sugerir expectativa tensa, pero el texto principal mantiene la forma básica para no añadir una interpretación más fuerte que la necesaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄχρι δὲ οὗ
  english_pob_choice: Until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - Hasta el momento en que
  - Mientras no
  lexicon: BDAG
  rationale: La expresión introduce un límite temporal. «Hasta que» reproduce con naturalidad en español la idea de un punto terminal de la acción de Pablo.
- source_word: ἡμέρα ἤμελλεν γίνεσθαι
  english_pob_choice: the day was about to dawn
  chosen_spanish: iba a amanecer
  alternatives_spanish:
  - estaba por amanecer
  - iba a hacerse de día
  lexicon: BDAG
  rationale: El griego dice literalmente que «el día estaba por llegar a ser». En español, «iba a amanecer» expresa bien la inminencia del alba sin sonar forzado.
- source_word: παρεκάλει
  english_pob_choice: kept urging
  chosen_spanish: seguía exhortando
  alternatives_spanish:
  - seguía instando
  - continuaba animando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua. «Seguía exhortando» conserva la insistencia de Pablo mejor que un simple pasado puntual.
- source_word: ἅπαντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a cada uno
  lexicon: BDAG
  rationale: Se refiere a todos los que estaban a bordo. «A todos» comunica la totalidad de manera natural en español.
- source_word: μεταλαβεῖν τροφῆς
  english_pob_choice: to take some food
  chosen_spanish: a tomar alimento
  alternatives_spanish:
  - a comer algo
  - a participar de alimento
  lexicon: BDAG
  rationale: «Tomar alimento» preserva el matiz de recibir o ingerir alimento sin reducirlo demasiado a «comer»; además mantiene cierta cercanía al griego partitivo.
- source_word: Τεσσαρεσκαιδεκάτην σήμερον ἡμέραν
  english_pob_choice: Today is the fourteenth day
  chosen_spanish: Hoy es el día catorce
  alternatives_spanish:
  - Hoy es el decimocuarto día
  - Hoy cumplen catorce días
  lexicon: BDAG
  rationale: La construcción griega pone énfasis en que el día presente es el decimocuarto. «Hoy es el día catorce» conserva esa estructura de forma clara y natural.
- source_word: προσδοκῶντες
  english_pob_choice: waiting
  chosen_spanish: esperando
  alternatives_spanish:
  - aguardando
  - en espera
  lexicon: BDAG
  rationale: El contexto de la revisión inglesa favorece «waiting» sin intensificar indebidamente la connotación. En español, «esperando» refleja bien la expectativa continuada; el contexto de la tormenta ya sugiere la tensión sin añadirla explícitamente.
- source_word: ἄσιτοι
  english_pob_choice: without food
  chosen_spanish: sin haber comido nada
  alternatives_spanish:
  - sin alimento
  - ayunando
  lexicon: BDAG
  rationale: El adjetivo significa no haber comido. «Sin haber comido nada» evita que se lea como ayuno religioso voluntario y comunica el estado real de la tripulación.
- source_word: διατελεῖτε
  english_pob_choice: you have continued
  chosen_spanish: están
  alternatives_spanish:
  - han continuado
  - siguen
  lexicon: BDAG
  rationale: 'La idea es de permanencia hasta el presente. En español se integra en la frase completa como estado continuado: «están esperando ... sin haber comido nada».'
- source_word: μηθὲν προσλαβόμενοι
  english_pob_choice: having taken nothing
  chosen_spanish: sin haber tomado nada
  alternatives_spanish:
  - sin haber recibido nada
  - no habiendo tomado nada
  lexicon: BDAG
  rationale: La frase participial explica que no han ingerido nada. «Sin haber tomado nada» conserva la relación con el verbo griego y funciona bien con el español de la oración.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y toma como contexto auditado la decisión inglesa revisada de traducir προσδοκῶντες con «waiting» en lugar de una equivalencia más interpretativa. En español se optó por un término básico («esperando») que conserva esa neutralidad, mientras que la nota [b] registra la posible carga de expectación del participio sin imponerla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Pablo» como nombre propio sin variación.
  - Se traduce τροφή con un sustantivo general («alimento») para evitar una especificación innecesaria.
  - No se usa «ayuno» porque el contexto no indica práctica religiosa, sino falta real de comida.
  - La puntuación y las comillas españolas siguen el estilo bíblico publicado en español.
  - 'El orden de las cláusulas preserva la secuencia del griego: límite temporal, exhortación de Pablo, cita directa.'
