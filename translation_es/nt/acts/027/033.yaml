base_translation:
  language: en
  yaml_path: translation/nt/acts/027/033.yaml
  text: Until the day was about to dawn[a], Paul kept urging them all to take some food, saying, “Today is the fourteenth day that you have continued waiting without food, having taken nothing.”
  footnotes:
  - marker: a
    text: Or “waiting anxiously”; the Greek participle can denote expectation, and in this storm context likely carries the sense of anxious suspense.
    reason: lexical_alternative
