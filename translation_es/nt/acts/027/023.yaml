revisions:
- from: Pues esta misma noche se me presentó un ángel del Dios[a], de quien soy y a quien también rindo culto[b].
  to: Pues esta misma noche un ángel del Dios a quien pertenezco[a] y a quien también rindo culto[b] estuvo junto a mí.
  rationale: La revisión corrige el principal desajuste semántico de παρέστη con «estuvo junto a mí», reubica la nota de literalidad en la cláusula correcta, y mejora la naturalidad/fidelidad de οὗ εἰμι con «a quien pertenezco». Se conserva «rindo culto» con nota alternativa para respetar el matiz cultual de λατρεύω documentado en la auditoría inglesa.
