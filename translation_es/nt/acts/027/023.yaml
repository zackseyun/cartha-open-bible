translation:
  language: es
  text: Pues esta misma noche un ángel del Dios a quien pertenezco[a] y a quien también rindo culto[b] estuvo junto a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «de quien soy» o «cuyo soy»; el griego expresa pertenencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a quien también sirvo»; el verbo griego puede denotar servicio sagrado o culto ofrecido a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέστη
  english_pob_choice: stood by me
  chosen_spanish: se me presentó
  alternatives_spanish:
  - estuvo junto a mí
  - se puso junto a mí
  lexicon: BDAG
  rationale: El verbo griego expresa una presencia repentina y cercana. En español, «se me presentó» comunica bien esa irrupción sin perder el matiz de proximidad; «estuvo junto a mí» suena más estático.
- source_word: ταύτῃ τῇ νυκτί
  english_pob_choice: this very night
  chosen_spanish: esta misma noche
  alternatives_spanish:
  - esta noche
  - en esta misma noche
  lexicon: BDAG
  rationale: La combinación demostrativa + dativo intensifica la inmediatez. «Esta misma noche» conserva naturalmente ese énfasis en español.
- source_word: τοῦ θεοῦ
  english_pob_choice: of the God
  chosen_spanish: del Dios[a]
  alternatives_spanish:
  - de Dios
  - del Dios de quien soy
  lexicon: BDAG
  rationale: El genitivo modifica a «ángel» e identifica a qué Dios pertenece el mensajero. En español se conserva la relación con «Dios» sin ocultarla con una paráfrasis más libre.
- source_word: οὗ εἰμι
  english_pob_choice: to whom I belong
  chosen_spanish: de quien soy
  alternatives_spanish:
  - a quien pertenezco
  - cuya soy
  lexicon: BDAG
  rationale: La expresión es literalmente posesiva («cuya/o soy»). «De quien soy» mantiene la pertenencia con un español más natural y fiel que una formulación demasiado arcaica.
- source_word: ᾧ καὶ λατρεύω
  english_pob_choice: and whom I also worship
  chosen_spanish: y a quien también rindo culto[b]
  alternatives_spanish:
  - y a quien también sirvo
  - y a quien también doy servicio sagrado
  lexicon: BDAG
  rationale: λατρεύω puede significar servicio sagrado o culto dirigido a Dios. «Rindo culto» preserva mejor el sentido religioso que «sirvo», sin excluir la posible lectura de servicio devocional.
- source_word: ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: En este contexto narrativo de ayuda divina, el sentido sobrenatural es el adecuado. «Ángel» es la opción más clara y fiel.
theological_decisions:
- issue: Relación de pertenencia expresada por οὗ εἰμι
  english_pob_reading: to whom I belong
  chosen_spanish_reading: de quien soy
  alternative_spanish_readings:
  - a quien pertenezco
  - cuya soy
  rationale: La frase expresa pertenencia y lealtad a Dios. «De quien soy» mantiene esa fuerza relacional sin añadir un matiz doctrinal más fuerte que el texto griego.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de λατρεύω aplicado a Dios
  english_pob_reading: worship
  chosen_spanish_reading: rindo culto
  alternative_spanish_readings:
  - sirvo
  - presto servicio sagrado
  rationale: Aquí λατρεύω se dirige a Dios y tiene peso cultual. «Rindo culto» conserva esa carga religiosa y sigue dejando visible la alternativa de servicio devocional.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El borrador sigue el sentido y la decisión lexical del texto inglés auditado: preserva la inmediatez de «this very night», la presencia cercana de παρέστη, la pertenencia expresada por οὗ εἰμι y la ambigüedad cultual de λατρεύω. No hay revisiones posteriores registradas en el paquete fuente; se mantiene alineación alta con el texto griego y el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y no se introduce «SEÑOR», porque el versículo no contiene κύριος.
  - Se mantiene «ángel» y no «mensajero», conforme al contexto narrativo y al tratamiento del POB inglés.
  - «Rindo culto» conserva el matiz cultual de λατρεύω sin eliminar la posible lectura alternativa de «servir».
  - La construcción «de quien soy» refleja la pertenencia del griego sin forzar un calco arcaizante.
