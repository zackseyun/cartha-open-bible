translation:
  language: es
  text: Entonces los soldados cortaron las cuerdas de la lancha[a] y dejaron que se soltara[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lancha» traduce la embarcación auxiliar del griego σκάφη. Otras posibilidades serían «bote» o «bote del barco»; se eligió «lancha» para distinguirla del navío principal y sonar natural en español moderno.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede entenderse, según el contexto, como «alejarse flotando» o «quedar a la deriva». Aquí «se soltara» conserva el sentido inmediato de desprenderse tras cortar las cuerdas, sin excluir el matiz náutico implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural, conciso y conserva el valor temporal-secuencial sin añadir matices innecesarios.
- source_word: ἀπέκοψαν
  english_pob_choice: cut away
  chosen_spanish: cortaron
  alternatives_spanish:
  - cortaron aparte
  - separaron cortando
  - cortaron de un tajo
  lexicon: BDAG
  rationale: El verbo expresa el acto físico de seccionar o cortar; en español, «cortaron» transmite con claridad la acción sin sobrecargar el giro. El complemento «las sogas» ya hace explícito que se trata de cortar las amarras.
- source_word: οἱ στρατιῶται
  english_pob_choice: the soldiers
  chosen_spanish: los soldados
  alternatives_spanish:
  - las tropas
  lexicon: BDAG
  rationale: Correspondencia directa y precisa del sujeto nominativo plural.
- source_word: τὰ σχοινία
  english_pob_choice: the ropes
  chosen_spanish: las sogas
  alternatives_spanish:
  - las cuerdas
  - los cabos
  lexicon: BDAG
  rationale: En contexto náutico, «sogas» comunica bien el cordaje de amarre y suena natural en español bíblico moderno; evita el tecnicismo excesivo de «cabos» y mantiene la imagen concreta de la maniobra.
- source_word: τῆς σκάφης
  english_pob_choice: of the skiff
  chosen_spanish: de la lancha
  alternatives_spanish:
  - del bote
  - de la embarcación pequeña
  - de la chalupa
  lexicon: BDAG
  rationale: σκάφη aquí designa la embarcación auxiliar unida al barco principal. «Lancha» mantiene la distinción funcional en español contemporáneo y es suficientemente amplia para no fijar indebidamente el tipo exacto de nave auxiliar.
- source_word: εἴασαν
  english_pob_choice: let
  chosen_spanish: la dejaron
  alternatives_spanish:
  - la permitieron
  - la soltaron
  lexicon: BDAG
  rationale: Con el infinitivo siguiente, el sentido es de permitir que ocurra el movimiento resultante. «La dejaron» es idiomático y preserva la idea de no retenerla más.
- source_word: αὐτὴν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la lancha
  lexicon: BDAG
  rationale: El pronombre femenino retoma a «lancha»; en español, el clítico «la» evita redundancia y mantiene la referencia clara.
- source_word: ἐκπεσεῖν
  english_pob_choice: fall off
  chosen_spanish: caer
  alternatives_spanish:
  - desprenderse
  - quedar a la deriva
  - salirse
  lexicon: BDAG
  rationale: El griego puede leerse como caer/salir fuera y, en contexto náutico, también como alejarse o derivar. «Caer» conserva la imagen básica del desprendimiento tras cortar las sogas sin especificar más de lo que el texto exige.
translation_notes:
  revision_awareness: El contexto auditado en inglés traduce la secuencia como «Then the soldiers cut away the ropes of the skiff and let it fall off», con una nota alternativa sobre «boat/ship’s boat» para σκάφη y una observación de que ἐκπεσεῖν también puede entenderse como «drift away». La presente redacción española conserva la acción de cortar las amarras y el resultado de que la embarcación auxiliar quede libre para caer o soltarse, sin introducir una interpretación más específica que la atestiguada.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y claro, sin usar «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se prefirió una equivalencia natural en español («Entonces», «cortaron», «la dejaron caer») sin perder la imagen náutica del original.
  - La elección de «lancha» refleja la nota lexical del inglés sobre la μικρότερη embarcación adjunta al barco principal, evitando confundirla con el navío.
