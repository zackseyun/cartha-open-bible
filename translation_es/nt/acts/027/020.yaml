translation:
  language: es
  text: Y cuando ni el sol ni las estrellas aparecían durante muchos días[a], y una tempestad no pequeña nos oprimía, desde entonces toda esperanza de ser salvados se nos iba quitando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo rescatados». El verbo griego puede significar «salvar» o «rescatar»; aquí se refiere a la liberación física de la tempestad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφαινόντων
  english_pob_choice: appeared
  chosen_spanish: aparecían
  alternatives_spanish:
  - se mostraban
  - brillaban
  - se dejaban ver
  lexicon: BDAG
  rationale: El participio describe la visibilidad de los cuerpos celestes en el contexto náutico. «Aparecían» es natural en español y conserva la idea de que no se veían ni daban luz de manera funcional para la navegación.
- source_word: ἐπὶ πλείονας ἡμέρας
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - por varios días
  lexicon: BDAG
  rationale: La expresión indica duración extendida. «Por muchos días» reproduce bien el lapso prolongado sin añadir precisión que el griego no da.
- source_word: χειμῶνός
  english_pob_choice: storm
  chosen_spanish: tempestad
  alternatives_spanish:
  - tormenta
  - mal tiempo
  lexicon: BDAG
  rationale: En este contexto marítimo, el término apunta a un temporal fuerte. «Tempestad» mantiene el carácter grave de la situación y funciona bien en español bíblico contemporáneo.
- source_word: οὐκ ὀλίγου
  english_pob_choice: no small
  chosen_spanish: no pequeña
  alternatives_spanish:
  - nada pequeña
  - muy grande
  - severa
  lexicon: BDAG
  rationale: Se conserva la litote del griego. «No pequeña» refleja la fórmula literal y su énfasis retórico, en lugar de reemplazarla por una adjetivación explicativa.
- source_word: ἐπικειμένου
  english_pob_choice: was pressing on us
  chosen_spanish: nos oprimía
  alternatives_spanish:
  - pesaba sobre nosotros
  - nos acosaba
  - se abatía sobre nosotros
  lexicon: BDAG
  rationale: El participio expresa una presión continua y agobiante. «Nos oprimía» transmite bien esa carga sostenida en español, sin perder el sentido de amenaza incesante.
- source_word: λοιπὸν
  english_pob_choice: from then on
  chosen_spanish: desde entonces
  alternatives_spanish:
  - a partir de ahí
  - desde ese momento
  - por fin
  lexicon: BDAG
  rationale: Aquí marca el giro temporal en la experiencia de la tripulación. «Desde entonces» comunica el cambio de fase de manera clara y fiel.
- source_word: περιῃρεῖτο
  english_pob_choice: was gradually taken away
  chosen_spanish: nos era quitada poco a poco
  alternatives_spanish:
  - se nos iba quitando
  - nos iba siendo arrebatada
  - era eliminada gradualmente
  lexicon: BDAG
  rationale: El imperfecto pasivo sugiere un proceso continuo de pérdida. «Nos era quitada poco a poco» preserva ese avance gradual de la desesperanza.
- source_word: ἐλπὶς πᾶσα
  english_pob_choice: all hope
  chosen_spanish: toda esperanza
  alternatives_spanish:
  - cada esperanza
  - toda la esperanza
  lexicon: BDAG
  rationale: La frase idiomática se vierte de forma natural como «toda esperanza», manteniendo la totalidad y el tono de desesperación del pasaje.
- source_word: τοῦ σῴζεσθαι ἡμᾶς
  english_pob_choice: of our being saved
  chosen_spanish: de ser salvados
  alternatives_spanish:
  - de ser rescatados
  - de que fuéramos salvados
  - de nuestra salvación
  lexicon: BDAG
  rationale: En el relato marítimo, σῴζεσθαι se refiere a la preservación física del naufragio, no a la salvación espiritual. «Ser salvados» conserva el vínculo léxico con σῴζω y evita introducir un sentido doctrinal ajeno al contexto.
theological_decisions:
- issue: Sentido de σῴζεσθαι en un contexto de naufragio
  english_pob_reading: physical rescue/preservation from death at sea, rendered 'being saved'
  chosen_spanish_reading: salvación/preservación física de la tripulación frente a la tempestad
  alternative_spanish_readings:
  - ser rescatados
  - ser preservados
  rationale: El contexto de Hechos 27 es estrictamente narrativo y marítimo. En español, «ser salvados» conserva la correspondencia con σῴζω sin forzar una lectura soteriológica; la nota aclara que se trata de libramiento físico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego y el audit trail en inglés sin cambios de contenido respecto a la última pasada; se mantiene la lectura contextual de σῴζεσθαι como rescate físico y la litote «no pequeña» para χειμῶνός οὐκ ὀλίγου.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término base cuando aparezca el nombre divino; este versículo no contiene referencia explícita al nombre.
  - Se preserva «ser salvados» para σῴζεσθαι, en coherencia con la terminología POB en contextos narrativos de preservación física.
  - La litote «no pequeña» se conserva para respetar la retórica griega y no suavizar el énfasis del texto.
