  to: Y cuando ni el sol ni las estrellas aparecían durante muchos días[a], y una tempestad no pequeña nos oprimía, desde entonces toda esperanza de ser salvados se nos iba quitando.
  rationale: 'Se ajusta la redacción para un español más natural y fiel al aspecto verbal del griego: «durante muchos días» mejora la expresión de duración, y «se nos iba quitando» refleja mejor la pérdida progresiva de la esperanza. Se elimina la nota sobre «tempestad» por innecesaria.'
