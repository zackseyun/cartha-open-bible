translation:
  language: es
  text: Y como el puerto no era apto para invernar, la mayoría decidió zarpar de allí[a], si de algún modo pudieran llegar a Phoenix[b] y pasar allí el invierno, un puerto de Creta que daba hacia el sudoeste y el noroeste[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacerse a la mar desde allí». El verbo griego es un término náutico para salir al mar.'
    reason: lexical_alternative
  - marker: b
    text: Phoenix era un puerto de Creta. Versiones antiguas suelen dar este nombre como «Fenice».
    reason: cultural_note
  - marker: c
    text: La frase direccional final es difícil. Tradicionalmente se entiende como «que daba hacia el sudoeste y el noroeste»; algunos la precisan más como «hacia el oeste-noroeste».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνευθέτου
  english_pob_choice: unsuitable
  chosen_spanish: no era apto
  alternatives_spanish:
  - era inadecuado
  - no convenía
  lexicon: BDAG
  rationale: El griego describe que el puerto no servía bien para el objetivo inmediato; «no era apto» comunica esa falta de idoneidad de manera natural en español sin perder el juicio práctico.
- source_word: λιμένος
  english_pob_choice: harbor
  chosen_spanish: puerto
  alternatives_spanish:
  - bahía
  - fondeadero
  lexicon: BDAG
  rationale: Aunque «puerto» puede abarcar algo más que el fondeadero, es la forma más clara y publicable en español para este contexto náutico; «fondeadero» sería más técnico y menos idiomático aquí.
- source_word: πρὸς παραχειμασίαν
  english_pob_choice: for wintering
  chosen_spanish: para invernar
  alternatives_spanish:
  - para pasar el invierno
  - para pasar la temporada invernal
  lexicon: BDAG
  rationale: «Invernar» refleja de forma concisa la función de παραχειμασίαν y evita una paráfrasis más larga que diluiría el matiz de finalidad.
- source_word: οἱ πλείονες
  english_pob_choice: the majority
  chosen_spanish: la mayoría
  alternatives_spanish:
  - los más
  - la mayor parte
  lexicon: BDAG
  rationale: «La mayoría» reproduce bien el sustantivo comparativo y su sentido colectivo, con naturalidad en español contemporáneo.
- source_word: ἔθεντο βουλήν
  english_pob_choice: decided
  chosen_spanish: resolvió
  alternatives_spanish:
  - decidió
  - tomó la resolución
  lexicon: BDAG
  rationale: El giro griego literalmente es 'pusieron un plan/consejo'; «resolvió» conserva el sentido de decisión deliberada y suena más preciso que un simple «decidió».
- source_word: ἀναχθῆναι ἐκεῖθεν
  english_pob_choice: to put out from there
  chosen_spanish: levar anclas de allí
  alternatives_spanish:
  - zarpar de allí
  - hacerse a la mar desde allí
  lexicon: BDAG
  rationale: El verbo es un término náutico. «Levar anclas de allí» transmite la acción marítima de salir del puerto sin mecanizarla, y preserva el carácter técnico del movimiento.
- source_word: εἴ πως
  english_pob_choice: if somehow
  chosen_spanish: por si acaso
  alternatives_spanish:
  - si de algún modo
  - si quizá
  lexicon: BDAG
  rationale: La expresión comunica esperanza incierta; «por si acaso» reproduce esa tentativa práctica en un español fluido, aunque con una ligera adaptación idiomática.
- source_word: δύναιντο
  english_pob_choice: they might
  chosen_spanish: pudieran
  alternatives_spanish:
  - podrían
  - fueran capaces de
  lexicon: BDAG
  rationale: El optativo con εἴ πως expresa posibilidad incierta; «pudieran» mantiene ese matiz potencial mejor que un futuro o un condicional más firme.
- source_word: καταντήσαντες εἰς Φοίνικα
  english_pob_choice: reach Phoenix
  chosen_spanish: llegar a Fenice
  alternatives_spanish:
  - arribar a Fenice
  - alcanzar Fenice
  lexicon: BDAG
  rationale: Se preserva el nombre del lugar como forma española tradicional documentada en versiones antiguas y en la transmisión eclesial, sin forzar una transliteración nueva.
- source_word: Φοίνικα
  english_pob_choice: Phoenix
  chosen_spanish: Fenice
  alternatives_spanish:
  - Fénix
  lexicon: BDAG
  rationale: Aunque el inglés POB prefiere 'Phoenix', en español «Fenice» evita la confusión con el ave mítica y mantiene una forma histórica reconocible para este puerto de Creta.
- source_word: παραχειμάσαι
  english_pob_choice: spend the winter there
  chosen_spanish: pasar allí el invierno
  alternatives_spanish:
  - invernar allí
  - quedarse allí durante el invierno
  lexicon: BDAG
  rationale: El infinitivo repite el sentido estacional con destino específico; «pasar allí el invierno» es claro y conserva la finalidad sin sonar rígido.
- source_word: βλέποντα
  english_pob_choice: facing
  chosen_spanish: que miraba hacia
  alternatives_spanish:
  - orientado hacia
  - abierto hacia
  lexicon: BDAG
  rationale: Para un puerto, el participio expresa orientación geográfica. «Que miraba hacia» mantiene la imagen verbal del griego y sigue siendo comprensible.
- source_word: κατὰ λίβα
  english_pob_choice: southwest
  chosen_spanish: el sudoeste
  alternatives_spanish:
  - el suroeste
  - hacia el sudoeste
  lexicon: LSJ
  rationale: El término designa la región del viento del sudoeste; «sudoeste» es una forma válida y clara en español, compatible con el registro geográfico del versículo.
- source_word: κατὰ χῶρον
  english_pob_choice: northwest
  chosen_spanish: el noroeste
  alternatives_spanish:
  - hacia el noroeste
  - el oeste-noroeste
  lexicon: LSJ
  rationale: Se adopta la lectura direccional estándar y más común en español. Aunque existe debate sobre la precisión de este segundo término, «noroeste» es la equivalencia más estable para el lector.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir una formulación breve y natural para παραχειμασίαν. También mantiene la incertidumbre del optativo con εἴ πως, conserva el carácter náutico de ἀναχθῆναι y respeta la dificultad de la orientación final del puerto, sin suavizarla indebidamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa un español moderno y reverente, evitando calcos demasiado rígidos.
  - «Puerto» se conserva por ser el término más natural en una narración marítima; no se sustituye por vocabulario eclesiástico.
  - La frase «levar anclas» se eligió para conservar la imagen náutica del verbo griego.
  - Se usa «noroeste/sudoeste» en minúsculas dentro de la oración, conforme al uso español para direcciones geográficas.
