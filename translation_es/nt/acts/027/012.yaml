source:
  edition: SBLGNT
  text: ἀνευθέτου δὲ τοῦ λιμένος ὑπάρχοντος πρὸς παραχειμασίαν οἱ πλείονες ἔθεντο βουλὴν ἀναχθῆναι ⸀ἐκεῖθεν, εἴ πως δύναιντο καταντήσαντες εἰς Φοίνικα παραχειμάσαι, λιμένα τῆς Κρήτης βλέποντα κατὰ λίβα καὶ κατὰ χῶρον.
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/012.yaml
  text: And because the harbor was unsuitable for wintering[a], the majority decided to put out from there[c][b], if somehow they might reach Phoenix and spend the winter there—a harbor of Crete facing southwest and northwest.
  footnotes:
  - marker: a
    text: Or 'to set sail from there.' The Greek verb is a nautical term for putting out to sea.
    reason: lexical_alternative
  - marker: b
    text: Phoenix was a harbor on Crete. Older English versions often give the name as 'Phenice.'
    reason: cultural_note
  - marker: c
    text: The final directional phrase is difficult. Traditionally it is rendered 'facing southwest and northwest'; some understand the second term more specifically as 'west-northwest.'
    reason: lexical_alternative
