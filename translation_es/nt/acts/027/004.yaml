translation:
  language: es
  text: Y desde allí[a], habiendo zarpado, navegamos al abrigo de Chipre, porque los vientos nos eran contrarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «navegamos por el lado protegido de Chipre». El verbo griego es un término náutico para navegar por el lado resguardado de una isla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y desde allí
  alternatives_spanish:
  - Y de allí
  - Y desde ese lugar
  lexicon: BDAG
  rationale: La combinación de καί + ἐκεῖθεν expresa continuidad narrativa y origen espacial; «y desde allí» comunica ambos elementos de manera natural en español sin perder el enlace del relato.
- source_word: ἀναχθέντες
  english_pob_choice: after putting out to sea
  chosen_spanish: habiendo zarpado
  alternatives_spanish:
  - después de zarpar
  - después de haber zarpado
  - habiendo salido a mar
  lexicon: BDAG
  rationale: El participio aoristo pasivo de ἀνάγω en contexto náutico refiere la salida al mar. «Habiendo zarpado» conserva el valor anterior y la imagen marítima con buena naturalidad en español.
- source_word: ὑπεπλεύσαμεν
  english_pob_choice: we sailed under the lee of
  chosen_spanish: navegamos bajo la costa de
  alternatives_spanish:
  - navegamos al abrigo de
  - navegamos por la parte protegida de
  - navegamos bajo el resguardo de
  lexicon: BDAG
  rationale: El verbo es un término náutico para pasar por el lado resguardado de una isla. «Bajo la costa de» mantiene la referencia espacial al borde de Chipre, aunque en español la idea de abrigo se expresa en la nota por ser la carga técnica del verbo.
- source_word: τὴν Κύπρον
  english_pob_choice: Cyprus
  chosen_spanish: Chipre
  alternatives_spanish:
  - la isla de Chipre
  lexicon: BDAG
  rationale: Chipre es el nombre propio estándar en español. No se añade «isla» en el texto principal porque el contexto ya lo sugiere y el nombre geográfico basta.
- source_word: διὰ τὸ ... εἶναι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: διά con el infinitivo articular introduce causa. «Porque» reproduce con claridad la relación causal en español actual.
- source_word: τοὺς ἀνέμους
  english_pob_choice: the winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - los aires
  lexicon: BDAG
  rationale: El plural de ἄνεμος se traduce de forma directa como «vientos», manteniendo la referencia meteorológica simple y precisa.
- source_word: ἐναντίους
  english_pob_choice: were against us
  chosen_spanish: nos eran contrarios
  alternatives_spanish:
  - nos eran adversos
  - iban en contra nuestra
  lexicon: BDAG
  rationale: El adjetivo significa «opuestos/contrarios». En español, «nos eran contrarios» conserva la fuerza del original sin añadir explícitamente un pronombre inexistente en el griego, aunque el contexto náutico implica adversidad para la travesía.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el griego y el audit trail inglés: conserva la progresión narrativa («y desde allí»), el participio previo («habiendo zarpado»), el verbo náutico especializado (expresado en el cuerpo y aclarado en nota), y la causa explícita de los vientos contrarios. No se detectaron revisiones textuales adicionales en el expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene «Chipre» como topónimo estándar en español.
  - Se usa «vientos» en plural, en consonancia con el griego.
  - Se evita «SEÑOR» o terminología teológica no pertinente; el verso es puramente narrativo.
  - La nota a preserva la alternativa de lectura náutica documentada por la POB inglesa.
