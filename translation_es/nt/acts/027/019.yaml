translation:
  language: es
  text: Y al tercer día, arrojaron por la borda, con sus propias manos,[a] el equipo del barco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ellos mismos echaron por la borda el equipo del barco".'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG
  rationale: La construcción dativa con ordinal expresa tiempo; en español, «al tercer día» comunica de forma natural el valor temporal sin perder precisión.
- source_word: αὐτόχειρες
  english_pob_choice: with their own hands
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - con sus propias manos
  - personalmente
  lexicon: BDAG
  rationale: El griego subraya que actuaron por sí mismos. En español, «ellos mismos» conserva esa participación directa; la alternativa «con sus propias manos» sería más literal, pero puede sonar más pesada en este contexto. La nota mantiene la opción más explícita disponible.
- source_word: σκευή
  english_pob_choice: gear
  chosen_spanish: equipo
  alternatives_spanish:
  - utensilios
  - aparejos
  - pertrechos
  lexicon: BDAG
  rationale: En contexto náutico, σκευή se refiere al equipo o aparejo del barco. «Equipo» es claro y natural en español; se evita una traducción demasiado técnica o demasiado general.
- source_word: τοῦ πλοίου
  english_pob_choice: the ship’s
  chosen_spanish: del barco
  alternatives_spanish:
  - de la nave
  - del navío
  lexicon: BDAG
  rationale: El genitivo se expresa naturalmente como complemento con «de». «Barco» es el término más directo y comprensible en español actual para este contexto marítimo.
- source_word: ἔρριψαν
  english_pob_choice: they threw ... overboard
  chosen_spanish: arrojaron
  alternatives_spanish:
  - tiraron
  - echaron
  lexicon: BDAG
  rationale: El verbo significa arrojar o lanzar. En español, «arrojaron» mantiene la fuerza verbal sin añadir una glosa direccional innecesaria; el contexto ya indica que fue al mar.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. El contenido sigue de cerca el griego y el rastro auditado en inglés, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro claro y moderno para narrativa marítima.
  - «Barco» se usó por naturalidad en español; «nave» o «navío» quedarían más marcados.
  - La nota alternativa conserva la ambigüedad lexical permitida por el inglés POB, pero sin sobrecargar la línea principal.
