translation:
  language: es
  text: Cuando se decidió que navegáramos hacia Italia, entregaron a Pablo y a algunos otros prisioneros a un centurión llamado Julio, de la cohorte augusta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la cohorte augustea»; posiblemente «de la cohorte de Sebaste». El griego Σεβαστῆς refleja un título asociado con Augusto o con el emperador, pero la unidad histórica exacta es incierta.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκρίθη
  english_pob_choice: it was decided
  chosen_spanish: se decidió
  alternatives_spanish:
  - se determinó
  - se resolvió
  lexicon: BDAG
  rationale: El aoristo pasivo impersonal aquí expresa una decisión oficial; el español impersonal con «se decidió» conserva esa fuerza administrativa sin volverse rígido.
- source_word: τοῦ ἀποπλεῖν ἡμᾶς
  english_pob_choice: that we should sail
  chosen_spanish: que navegáramos
  alternatives_spanish:
  - que zarpáramos
  - que partiéramos por mar
  lexicon: BDAG
  rationale: «Navegáramos» comunica de manera natural el matiz marítimo de ἀποπλεῖν y mantiene la primera persona plural del relato de Lucas. «Zarpáramos» es posible, pero menos general.
- source_word: παρεδίδουν
  english_pob_choice: they handed over
  chosen_spanish: entregaron
  alternatives_spanish:
  - los entregaron
  - los transfirieron
  lexicon: BDAG
  rationale: El imperfecto narrativo se traduce con pasado simple idiomático en español. «Entregaron» conserva el acto formal de traspaso de custodia.
- source_word: τόν τε Παῦλον καί τινας ἑτέρους δεσμώτας
  english_pob_choice: both Paul and some other prisoners
  chosen_spanish: a Pablo y a algunos otros prisioneros
  alternatives_spanish:
  - a Pablo y a ciertos otros prisioneros
  - a Pablo y a algunos demás presos
  lexicon: BDAG
  rationale: En español, el valor conjuntivo de τε...καί se expresa con coordinación simple; «prisioneros» es el equivalente más claro de δεσμώτας. No se marcó «ambos» porque en español sonaría forzado con un nombre propio y un grupo indefinido.
- source_word: ἑκατοντάρχῃ
  english_pob_choice: to a centurion
  chosen_spanish: a un centurión
  alternatives_spanish:
  - al centurión
  lexicon: BDAG
  rationale: El dativo indica destinatario de la entrega. El artículo indefinido es natural porque Julio se introduce aquí por primera vez.
- source_word: ὀνόματι Ἰουλίῳ
  english_pob_choice: named Julius
  chosen_spanish: llamado Julio
  alternatives_spanish:
  - de nombre Julio
  - que se llamaba Julio
  lexicon: BDAG
  rationale: «Llamado Julio» reproduce con naturalidad la fórmula de identificación nominal sin añadir matiz ajeno al texto.
- source_word: σπείρης Σεβαστῆς
  english_pob_choice: of the Augustan Cohort
  chosen_spanish: de la cohorte augusta
  alternatives_spanish:
  - de la cohorte augustea
  - de la cohorte imperial
  lexicon: BDAG
  rationale: Se conserva el término militar «cohorte» y se vierte Σεβαστῆς con el adjetivo «augusta», que es el equivalente más directo y respeta el vínculo con Augusto/lo imperial. Se evita «imperial» en el texto principal porque debilita el eco nominal del original; la identificación histórica exacta queda abierta.
theological_decisions:
- issue: Designación militar de σπείρης Σεβαστῆς, históricamente incierta pero no doctrinal
  english_pob_reading: of the Augustan Cohort
  chosen_spanish_reading: de la cohorte augusta
  alternative_spanish_readings:
  - de la cohorte augustea
  - de la cohorte imperial
  rationale: No hay carga doctrinal; la decisión afecta precisión histórica y estilo. «Augusta» sigue de cerca el valor de Σεβαστῆς y mantiene el vínculo con Augusto, mientras que las alternativas se reservan por la incertidumbre sobre la unidad exacta.
  doctrine_reference: Principios de traducción §1, §6
translation_notes:
  revision_awareness: El contexto inglés pasó de «Imperial Cohort» a «Augustan Cohort» en una revisión posterior, buscando una versión más directa de σπείρης Σεβαστῆς. La redacción española sigue esa revisión al preferir «cohorte augusta» en el texto principal, preservando en nota la alternativa «augustea» y la incertidumbre histórica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «prisioneros» para δεσμώτας, coherente con el valor léxico fuerte del término.
  - «Cohorte» se conserva por ser un tecnicismo militar estable en español bíblico y contemporáneo.
