base_translation:
  language: en
  yaml_path: translation/nt/acts/027/001.yaml
  text: Now when it was decided that we should sail for Italy[a], they handed over both Paul and some other prisoners to a centurion named Julius, of the Augustan Cohort.
  footnotes:
  - marker: a
    text: Or “of the Augustan Cohort”; possibly “of the Sebaste cohort.” The Greek Σεβαστῆς reflects a title associated with Augustus/the emperor, but the exact historical unit is uncertain.
    reason: alternative_reading
