translation:
  language: es
  text: Pero no mucho después[a], un viento tifónico llamado Euraquilo se abatió contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Euroclydon» en lugar de «Euraquilo».
    reason: textual_variant
lexical_decisions:
- source_word: μετ’ οὐ πολὺ
  english_pob_choice: not long after
  chosen_spanish: no mucho después
  alternatives_spanish:
  - poco después
  - no mucho tiempo después
  lexicon: BDAG
  rationale: Expresa el giro temporal idiomático de manera natural en español, sin volverlo rígidamente literal.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición narrativa con un matiz de contraste adecuado al cambio brusco hacia una situación adversa.
- source_word: ἔβαλεν
  english_pob_choice: rushed down
  chosen_spanish: se abatió
  alternatives_spanish:
  - se lanzó
  - irrumpió
  - cayó con violencia
  lexicon: BDAG
  rationale: Con viento como sujeto y κατά + genitivo, el verbo comunica un acometimiento repentino y violento; 'se abatió' lo transmite con naturalidad en español.
- source_word: κατ’ αὐτῆς
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra ello
  - sobre ella
  - contra la nave
  lexicon: BDAG
  rationale: El pronombre femenino en el contexto remite al referente femenino del pasaje; 'contra ella' conserva la direccionalidad hostil y la referencia del griego.
- source_word: ἄνεμος
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - racha
  - vendaval
  lexicon: BDAG
  rationale: Mantiene el término básico 'viento' como núcleo léxico, dejando la intensidad a la cualidad que sigue.
- source_word: τυφωνικὸς
  english_pob_choice: typhonic
  chosen_spanish: tifónico
  alternatives_spanish:
  - tempestuoso
  - de tormenta violenta
  - tipo tifón
  lexicon: BDAG
  rationale: '''Tifónico'' refleja más directamente la relación con τύφων y conserva el registro formal que buscó la revisión inglesa; en español suena más transparente que una paráfrasis amplia.'
- source_word: ὁ καλούμενος
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - conocido como
  - denominado
  lexicon: BDAG
  rationale: Fórmula participial estándar para introducir un nombre propio o designación.
- source_word: Εὐρακύλων
  english_pob_choice: Euraquilo
  chosen_spanish: Euraquilón
  alternatives_spanish:
  - Euraquilo
  - Euroclydón
  lexicon: BDAG
  rationale: 'Se translitera el nombre propio; ''Euraquilón'' adapta la forma al español y evita traducir interpretativamente como ''noreste''. '
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'typhoon-like' por 'typhonic' para una equivalencia más directa y formal; esta propuesta sigue esa decisión con 'tifónico'. También se corrigió la nota para que el marcador aparezca anclado en el texto principal.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y publicable, sin añadir explicaciones interpretativas al texto base.
  - La transliteración 'Euraquilón' sigue la estrategia de nombre propio del POB, mientras que la nota registra la variante textual tradicional.
