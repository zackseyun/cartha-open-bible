review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: el centurión quiere salvar a Pablo, impide la intención de los soldados del v. anterior, y da la orden de que los que saben nadar se arrojen primero y lleguen a tierra. Sin embargo, la frase principal "los detuvo de su propósito" no es español natural ni expresa con claridad la construcción ἐκώλυσεν αὐτοὺς τοῦ βουλήματος, que significa impedir que llevaran a cabo su intención. Conviene ajustar también la nota a una formulación idiomática en español.'
  spanish_quality_summary: La mayor parte del texto es clara y digna. "Centurión", "queriendo salvar", "los que podían nadar" y "salieran a tierra" funcionan bien. El problema principal de legibilidad es "los detuvo de su propósito", que suena forzado y poco natural. Una formulación como "les impidió llevar a cabo su propósito" o "les impidió ejecutar su plan" es mucho más idiomática. La nota a también necesita corrección de puntuación y naturalidad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave se manejan bien: Παῦλον -> Pablo, ἑκατοντάρχης -> centurión, διασῶσαι -> salvar. No hay cuestiones teológicas especiales en este versículo.'
  issues:
  - severity: medium
    issue: '"los detuvo de su propósito" es una construcción poco natural en español'
    rationale: Aunque intenta conservar el valor de βούλημα, en español neutro no se dice normalmente "detener a alguien de su propósito". El griego expresa impedir la ejecución de una intención; la forma natural es "les impidió llevar a cabo su propósito".
  - severity: low
    issue: La nota a tiene redacción y puntuación poco naturales
    rationale: Empieza con comilla simple innecesaria y la alternativa "impidió que llevaran a cabo su propósito" puede integrarse mejor como nota española normalizada.
  revised_spanish_text: Pero el centurión[a], queriendo salvar a Pablo, les impidió llevar a cabo su propósito, y ordenó que los que podían nadar se lanzaran primero al agua y salieran a tierra[b].
  revised_footnotes:
