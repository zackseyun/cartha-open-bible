    text: 'O: «les impidió ejecutar su plan». La expresión se refiere a la intención de los soldados mencionada en el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «habiéndose arrojado primero, salir a tierra».'
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula central para expresar de manera fiel e idiomática la construcción griega de impedir la ejecución de una intención. También se normalizan las notas para mejor español y mayor claridad, manteniendo las alternativas documentadas por el POB inglés.
