translation:
  language: es
  text: Pero el centurión[a], queriendo salvar a Pablo, les impidió llevar a cabo su propósito, y ordenó que los que podían nadar se lanzaran primero al agua y salieran a tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les impidió ejecutar su plan». La expresión se refiere a la intención de los soldados mencionada en el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «habiéndose arrojado primero, salir a tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - comandante de cien
  lexicon: BDAG
  rationale: Título militar romano establecido; 'centurión' es el equivalente natural y preciso en español, y conserva la referencia histórica sin explicación innecesaria.
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  lexicon: BDAG
  rationale: El participio expresa la intención o voluntad del centurión. 'Queriendo' reproduce bien el matiz volitivo en español sin recargar el estilo.
- source_word: διασῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - preservar con vida
  lexicon: BDAG
  rationale: Aquí el verbo implica mantener a Pablo con vida a través del peligro. 'Salvar' comunica ese sentido de forma directa y fiel al contexto narrativo.
- source_word: ἐκώλυσεν αὐτοὺς τοῦ βουλήματος
  english_pob_choice: kept them from their plan
  chosen_spanish: los detuvo de su propósito
  alternatives_spanish:
  - los impidió de su propósito
  - los frenó en su intención
  - les impidió llevar a cabo su plan
  lexicon: BDAG
  rationale: La construcción expresa impedir que ejecutaran lo que habían resuelto. 'De su propósito' conserva el peso de βούλημα como intención/resolución; 'los detuvo' mantiene la fuerza del verbo en español. Se evita 'plan' porque en español puede sonar más interpretativo que el griego en este contexto.
- source_word: ἐκέλευσέν τε
  english_pob_choice: and ordered
  chosen_spanish: y ordenó
  alternatives_spanish:
  - y mandó
  - y dio órdenes
  lexicon: BDAG
  rationale: κελεύω significa dar una orden o mandar. 'Ordenó' es el equivalente idiomático y suficientemente fuerte en español.
- source_word: τοὺς δυναμένους κολυμβᾶν
  english_pob_choice: those who were able to swim
  chosen_spanish: los que podían nadar
  alternatives_spanish:
  - los que sabían nadar
  - los capaces de nadar
  lexicon: BDAG
  rationale: La frase identifica a un subgrupo con capacidad real para nadar. 'Podían nadar' es natural en español y conserva el sentido de habilidad.
- source_word: ἀπορίψαντας
  english_pob_choice: to jump overboard
  chosen_spanish: saltaran primero al agua
  alternatives_spanish:
  - se arrojaran al agua
  - saltaran por la borda
  - se echaran al mar
  lexicon: BDAG
  rationale: Literalmente el participio indica 'habiéndose lanzado' o 'arrojado'. 'Saltar al agua' comunica de manera natural la acción marítima sin perder el movimiento físico que implica el original.
- source_word: πρώτους
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - los primeros
  lexicon: BDAG
  rationale: 'Marca prioridad de acción: los nadadores debían salir antes que los demás. ''Primero'' reproduce bien ese orden.'
- source_word: ἐπὶ τὴν γῆν ἐξιέναι
  english_pob_choice: get to land
  chosen_spanish: salieran a tierra
  alternatives_spanish:
  - llegaran a tierra
  - salieran a la tierra
  - alcanzaran la costa
  lexicon: BDAG
  rationale: La expresión indica dirigirse desde el mar a tierra firme. 'Salir a tierra' conserva el movimiento de salida y es idiomático en español; evita introducir 'costa' si el texto griego solo dice 'tierra'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y toma como guía el auditorio inglés de POB, especialmente en la relación entre intención, impedimento y secuencia de acciones. Se mantuvo el matiz de βούλημα como propósito/intención y de ἀπορίψαντας como un lanzamiento corporal hacia el agua, sin suavizar el detalle narrativo. La revisión inglesa que ajustó la última cláusula a una forma más directa ('get to land') se refleja en 'salieran a tierra', que conserva la dirección y la sencillez del griego.
  spanish_consistency_notes:
  - Se usa 'centurión' para ἑκατοντάρχης, coherente con la terminología militar estándar.
  - Se evita 'Señor' o cualquier sustitución teológica no pertinente; el versículo es narrativo y no contiene vocabulario divino.
  - '''Salvar'' se mantiene para διασῶσαι, siguiendo la fuerza de preservar con vida en contexto de peligro marítimo.'
  - '''Tierra'' traduce γῆ sin precisar ''costa'', porque el griego no lo especifica.'
  - 'El orden temporal queda claro: primero los nadadores, después los demás implícitos en el contexto inmediato.'
