translation:
  language: es
  text: Por tanto, les ruego que tomen alimento[a], porque esto es para su supervivencia; pues ni un cabello de la cabeza de ninguno de ustedes se perderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salvación». Aquí la palabra griega puede significar «salvación», «liberación», «preservación» o «supervivencia»; en este contexto se refiere a la supervivencia física.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto anterior sin sonar mecánico. 'Por tanto' conserva la relación conclusiva y es natural en español bíblico moderno.
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - los exhorto
  - les insto
  - les ruego con insistencia
  lexicon: BDAG
  rationale: En este contexto la voz expresa una apelación fuerte pero pastoral. 'Les ruego' comunica el llamado enfático sin endurecerlo innecesariamente; mantiene la fuerza de la súplica/instancia.
- source_word: μεταλαβεῖν τροφῆς
  english_pob_choice: to take some food
  chosen_spanish: que tomen alimento
  alternatives_spanish:
  - que coman algo
  - que participen de alimento
  - que tomen comida
  lexicon: BDAG
  rationale: El idiomático griego apunta a ingerir alimento para fortalecerse. 'Tomen alimento' preserva el acto concreto sin ampliar más de lo que el texto permite.
- source_word: σωτηρίας
  english_pob_choice: preservation
  chosen_spanish: preservación
  alternatives_spanish:
  - salvación
  - supervivencia
  - seguridad
  lexicon: BDAG
  rationale: El contexto inmediato es la tempestad y el peligro físico, no una declaración soteriológica. 'Preservación' mantiene la amplitud semántica de σωτηρία sin forzar 'salvación' en el texto principal.
- source_word: οὐδενὸς γὰρ ὑμῶν
  english_pob_choice: of any of you
  chosen_spanish: de ninguno de ustedes
  alternatives_spanish:
  - de ninguno de vosotros
  - de cualquiera de ustedes
  - de nadie entre ustedes
  lexicon: BDAG
  rationale: El genitivo distributivo se expresa con naturalidad en español como 'de ninguno de ustedes', conservando el alcance individual de la promesa.
- source_word: θρὶξ ἀπὸ τῆς κεφαλῆς
  english_pob_choice: not a hair from the head
  chosen_spanish: ni un cabello de la cabeza
  alternatives_spanish:
  - ni un cabello de su cabeza
  - ni un solo cabello de la cabeza
  - ni un cabello de la cabeza de alguno
  lexicon: BDAG
  rationale: La imagen idiomática de total seguridad se mantiene con una formulación idiomática en español. 'De la cabeza' refleja el griego ἀπό sin sonar forzado.
- source_word: ἀπολεῖται
  english_pob_choice: will perish
  chosen_spanish: se perderá
  alternatives_spanish:
  - perecerá
  - será destruido
  - se extraviará
  lexicon: BDAG
  rationale: Con 'cabello' el verbo funciona como parte del idiomático 'no se perderá ni un cabello', una construcción muy natural en español. Evita una literalidad que suene extraña, pero mantiene la idea de daño absoluto negado.
theological_decisions:
- issue: Sentido de σωτηρία en el contexto narrativo
  english_pob_reading: physical preservation/survival rather than spiritual salvation
  chosen_spanish_reading: preservación física / supervivencia, no salvación espiritual
  alternative_spanish_readings:
  - salvación
  - liberación
  - seguridad
  rationale: El relato trata de la supervivencia de los pasajeros durante la tormenta y el naufragio. Traducir aquí 'salvación' en el cuerpo principal podría sugerir un contenido teológico que el contexto no está desarrollando. 'Preservación' conserva la amplitud semántica y deja visible la tensión léxica.
  doctrine_reference: Principio de primacía del idioma fuente y fidelidad contextual; no resolver ambigüedades léxicas a favor de la tradición si el contexto físico es claro.
- issue: Fórmula final de absoluta protección
  english_pob_reading: not a hair from the head of any of you will perish
  chosen_spanish_reading: ni un cabello de la cabeza de ninguno de ustedes se perderá
  alternative_spanish_readings:
  - no perecerá ni un cabello de la cabeza de ninguno de ustedes
  - ni un solo cabello suyo se perderá
  rationale: La expresión es una garantía enfática de preservación total. La traducción conserva el valor idiomático sin exagerarlo ni espiritualizarlo.
  doctrine_reference: Respeto por el género narrativo y por la imagen idiomática del original; no introducir una lectura alegórica no sustentada.
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto entre el texto griego y el audit trail inglés. Se mantuvo la decisión clave de σωτηρία como sentido físico en el texto principal, con nota alternativa para no borrar la tensión léxica documentada. No se introdujeron revisiones no atestiguadas por el expediente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo.
  - Se prefirió 'preservación' para σωτηρία conforme al contexto marítimo y al audit trail inglés.
  - La frase final conserva el modismo de seguridad total con una sintaxis natural en español.
  - Se evitó 'Cristo'/'Mesías' y otras terminologías no presentes en el verso.
