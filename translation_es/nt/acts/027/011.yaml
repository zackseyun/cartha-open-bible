translation:
  language: es
  text: Pero el centurión se dejaba convencer más por el piloto y el propietario del barco que por lo dicho por Pablo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se dejaba convencer más por el piloto y el propietario del barco que por lo que Pablo decía»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  - comandante de cien soldados
  lexicon: BDAG
  rationale: En este contexto histórico-militar, 'centurión' es el equivalente español natural y preciso para el oficial romano. Conserva el valor técnico del cargo sin añadir explicación innecesaria.
- source_word: κυβερνήτῃ
  english_pob_choice: pilot
  chosen_spanish: piloto
  alternatives_spanish:
  - timonel
  - navegante
  - capitán
  lexicon: BDAG
  rationale: El término designa al que gobierna o dirige la nave. 'Piloto' funciona bien en español moderno y mantiene la distinción con ναυκλήρῳ; 'timonel' sería posible, pero menos directo en este registro.
- source_word: ναυκλήρῳ
  english_pob_choice: shipowner
  chosen_spanish: propietario del barco
  alternatives_spanish:
  - dueño del barco
  - armador
  - capitán
  lexicon: BDAG
  rationale: La palabra puede referirse al dueño o principal responsable de la nave. 'Propietario del barco' comunica esa relación sin confundirlo con el κυβερνήτης. Se evita 'capitán' para no borrar la diferencia entre los dos cargos.
- source_word: μᾶλλον ἐπείθετο
  english_pob_choice: was persuaded more by
  chosen_spanish: se dejaba persuadir más por
  alternatives_spanish:
  - se persuadía más por
  - creía más a
  - prestaba más atención a
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo de πείθω expresa un estado de ser persuadido o de dejarse convencer. 'Se dejaba persuadir más por' conserva ese matiz relacional y la comparación de μᾶλλον, sin reducirlo solo a atención externa.
- source_word: τοῖς ὑπὸ Παύλου λεγομένοις
  english_pob_choice: what was said by Paul
  chosen_spanish: lo dicho por Pablo
  alternatives_spanish:
  - lo que decía Pablo
  - las palabras dichas por Pablo
  - lo que era dicho por Pablo
  lexicon: BDAG
  rationale: La construcción participial articulada apunta a lo que Pablo estaba diciendo, es decir, su consejo o advertencia. 'Lo dicho por Pablo' preserva la referencia al contenido hablado y suena más natural en español que una pasiva perifrástica pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la advertencia anterior de Pablo; 'Pero' reproduce de manera directa el valor adversativo de δέ en este contexto narrativo.
- source_word: ἢ
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: BDAG
  rationale: En español, la comparación con μᾶλλον queda más natural con 'que'. Mantiene el paralelo comparativo sin sobrecargar la frase.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'paid more attention to' por 'was persuaded more by' para reflejar con mayor precisión ἐπείθετο. La redacción española sigue esa revisión y evita una versión que sugiera solo atención o preferencia superficial. También conserva la distinción entre κυβερνήτης y ναυκλήρος mediante 'piloto' y 'propietario del barco'.
  spanish_consistency_notes:
  - Se mantuvo 'centurión' como término técnico militar estándar.
  - '''Piloto'' se usó para κυβερνήτης para distinguirlo de ''propietario del barco'' y evitar fusionar ambos cargos.'
  - Se eligió una construcción pronominal pasiva ('se dejaba persuadir') para reflejar el matiz imperfectivo de ἐπείθετο.
  - '''Lo dicho por Pablo'' preserva el foco en el contenido de su consejo, no solo en el acto de hablar.'
