translation:
  language: es
  text: Y después de decir estas cosas y de tomar pan, dio gracias a Dios en presencia de todos[a], y después de partirlo, comenzó a comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "delante de todos".
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπας
  english_pob_choice: after saying
  chosen_spanish: después de decir
  alternatives_spanish:
  - habiendo dicho
  - cuando dijo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «después de decir» comunica con naturalidad la secuencia previa sin añadir matices ajenos.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza el relato con suavidad. «Y» mantiene el avance narrativo sin sobrecargar el tono.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural remite a lo dicho anteriormente. «Estas cosas» conserva esa referencia amplia sin precisar indebidamente como «estas palabras».
- source_word: λαβὼν ἄρτον
  english_pob_choice: taking bread
  chosen_spanish: de tomar pan
  alternatives_spanish:
  - de tomar un pan
  - de tomar algo de pan
  lexicon: BDAG
  rationale: Ἄρτον puede entenderse de modo general o como una porción/pan. «Pan» reproduce la sencillez del griego y evita fijar innecesariamente si era un pan entero o una porción.
- source_word: εὐχαρίστησεν τῷ θεῷ
  english_pob_choice: he gave thanks to God
  chosen_spanish: dio gracias a Dios
  alternatives_spanish:
  - le dio gracias a Dios
  - agradeció a Dios
  lexicon: BDAG
  rationale: εὐχαριστέω significa dar gracias. «Dio gracias a Dios» es la forma natural y fiel en español, manteniendo el objeto explícito.
- source_word: ἐνώπιον πάντων
  english_pob_choice: in the presence of all
  chosen_spanish: en presencia de todos
  alternatives_spanish:
  - delante de todos
  - ante todos
  lexicon: BDAG
  rationale: La expresión marca publicidad y visibilidad. «En presencia de todos» conserva el matiz formal de estar ante los demás; «delante de todos» es una alternativa posible más coloquial.
- source_word: κλάσας
  english_pob_choice: after breaking it
  chosen_spanish: después de partirlo
  alternatives_spanish:
  - habiéndolo partido
  - y después de partirlo
  lexicon: BDAG
  rationale: El participio aoristo indica acción anterior a «comenzó a comer». «Partirlo» es el verbo natural en español para el pan; el pronombre lo refiere al pan ya mencionado.
- source_word: ἤρξατο ἐσθίειν
  english_pob_choice: he began to eat
  chosen_spanish: comenzó a comer
  alternatives_spanish:
  - empezó a comer
  - se puso a comer
  lexicon: BDAG
  rationale: La construcción ἄρχομαι + infinitivo expresa inicio de la acción. «Comenzó a comer» conserva el valor incoativo con un registro digno y claro.
theological_decisions:
- issue: Posible resonancia eucarística en la secuencia tomar pan / dar gracias / partir / comer
  english_pob_reading: Render the actions in ordinary narrative terms without sacramental interpretation in the main text.
  chosen_spanish_reading: Presentar las acciones como gestos narrativos ordinarios, sin introducir en el texto principal una lectura sacramental.
  alternative_spanish_readings:
  - Expresar el pasaje con lenguaje más litúrgico para sugerir la Cena del Señor.
  - Reforzar la resonancia eucarística con vocabulario tradicional de comunión.
  rationale: El versículo narra una comida pública en el barco. Aunque la secuencia recuerda otros relatos eucarísticos, el texto no identifica explícitamente este acto como la Cena del Señor. Por fidelidad al contexto y para no importar una afirmación doctrinal no dicha aquí, la traducción permanece sobria y narrativa.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincido con el pasaje griego y con la auditoría inglesa en que no hace falta ningún reajuste: la secuencia temporal, la referencia pública y el tono narrativo quedan bien reflejados en español.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para τῷ θεῷ, conforme al estándar del proyecto.
  - Se usa «pan» sin artículo añadido, siguiendo la indefinición/neutralidad del griego.
  - Se conserva un registro sobrio y bíblico, pero con español natural y legible.
  - No se introduce lenguaje sacramental en la línea principal, de acuerdo con la auditoría inglesa.
