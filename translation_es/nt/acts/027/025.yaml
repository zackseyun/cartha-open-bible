translation:
  language: es
  text: Por tanto[a], cobren ánimo, hombres; pues le creo a Dios que será tal como se me ha dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Confío en Dios». El griego puede enfatizar tanto confiar en Dios como creer lo que Dios ha dicho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: La partícula introduce una conclusión a partir de lo dicho antes. «Por tanto» conserva la relación lógica sin sonar forzado en español.
- source_word: εὐθυμεῖτε
  english_pob_choice: take courage
  chosen_spanish: cobren ánimo
  alternatives_spanish:
  - tengan valor
  - anímense
  - cobren aliento
  lexicon: BDAG
  rationale: Es una exhortación en un contexto de peligro marítimo. «Cobren ánimo» comunica bien el llamado a la firmeza y evita el tono anticuado de otras opciones.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - señores
  lexicon: BDAG
  rationale: El vocativo plural se dirige a los hombres presentes a bordo. «Hombres» mantiene la fuerza directa del original sin neutralizar el vocativo.
- source_word: πιστεύω
  english_pob_choice: I believe
  chosen_spanish: confío
  alternatives_spanish:
  - creo
  - tengo fe
  lexicon: BDAG
  rationale: En esta construcción con dativo, el sentido puede ser confiar en Dios o creer lo que Dios ha dicho. «Confío» preserva esa confianza personal sin sonar rígido en español.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: en Dios
  alternatives_spanish:
  - Dios
  - a Dios
  lexicon: BDAG
  rationale: Aunque el inglés POB omite la preposición, en español la construcción natural con «confiar» requiere «en». Así se mantiene el valor relacional de la frase.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de la afirmación, no la causa. «Que» reproduce la subordinación de manera directa.
- source_word: οὕτως
  english_pob_choice: just as
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - exactamente así
  lexicon: BDAG
  rationale: Funciona con la comparación siguiente para expresar correspondencia. «Así» es breve y natural; el adverbio se refuerza en la traducción con «exactamente» para evitar ambigüedad.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - ocurrirá
  - pasará a ser
  lexicon: BDAG
  rationale: El futuro de εἰμί aquí expresa resultado futuro. «Será» es la opción más directa y compatible con la comparación del versículo.
- source_word: καθ’ ὃν τρόπον
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - como
  - del modo en que
  lexicon: BDAG
  rationale: La expresión comparativa subraya conformidad precisa con lo dicho. «Exactamente como» comunica mejor esa correspondencia, en línea con el sentido auditado del inglés POB.
- source_word: λελάληταί
  english_pob_choice: it has been told
  chosen_spanish: me ha sido dicho
  alternatives_spanish:
  - me ha sido hablado
  - me ha sido anunciado
  lexicon: BDAG
  rationale: El perfecto pasivo de λαλέω destaca una palabra ya pronunciada y vigente. «Me ha sido dicho» conserva el pasivo y la referencia al mensaje recibido.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Es el dativo indirecto de destinatario. En español, el clítico «me» fluye con naturalidad y conserva la relación personal del mensaje.
theological_decisions:
- issue: 'πιστεύω τῷ θεῷ: creer o confiar en Dios'
  english_pob_reading: I believe God
  chosen_spanish_reading: confío en Dios
  alternative_spanish_readings:
  - creo a Dios
  - tengo fe en Dios
  rationale: La construcción griega puede enfatizar tanto confiar en Dios como creer lo que Dios dice. En español, «confío en Dios» expresa bien la confianza personal sin perder la dimensión proposicional del mensaje recibido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Correspondencia exacta entre palabra dicha y cumplimiento futuro
  english_pob_reading: it will be just as it has been told to me
  chosen_spanish_reading: así será exactamente como me ha sido dicho
  alternative_spanish_readings:
  - será tal como me fue dicho
  - será como me fue dicho
  rationale: La combinación de οὕτως y καθ’ ὃν τρόπον resalta conformidad precisa, no mera semejanza. «Exactamente» ayuda a hacer audible esa correspondencia sin añadir contenido nuevo.
  doctrine_reference: BDAG on καθ’ ὃν τρόπον; translation philosophy §2
- issue: Vocativo masculino ἄνδρες
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - varones
  - amigos
  rationale: El texto se dirige a un grupo masculino concreto. Mantener el vocativo como «hombres» preserva la dirección interpersonal y evita neutralizaciones no sustentadas por el griego.
  doctrine_reference: Gender-accurate translation policy
translation_notes:
  revision_awareness: Se siguió el expediente inglés auditado sin depender mecánicamente de su redacción. La versión española conserva la conclusión lógica, la exhortación a cobrar ánimo, el vocativo masculino, la construcción de confianza dirigida a Dios y la correspondencia precisa entre lo dicho y lo que ocurrirá. No se documentaron revisiones textuales adicionales en el expediente; por eso no se añadieron variantes de crítica textual.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí aparece «Dios» por el griego θεῷ.
  - Se mantuvo una terminología sobria y directa, adecuada para una lectura eclesial amplia.
  - La nota[a] se ancla en «Por tanto» para reflejar la alternativa léxica de la construcción con πιστεύω.
