    issue: «tenían el plan» para βουλὴ ἐγένετο
    rationale: Suena antinatural en español y no refleja con precisión la idea de que surgió o se formó un plan.
  - severity: low
    issue: «presos» en vez de «prisioneros»
    rationale: «Presos» no es incorrecto, pero «prisioneros» mantiene mejor el registro y coincide más estrechamente con la decisión del POB en inglés.
  - severity: low
    issue: Anclaje de notas fragmentado en «se [a]escapara nadando[b]»
    rationale: La construcción griega funciona como una unidad; una sola nota en la frase completa es más clara y menos intrusiva.
