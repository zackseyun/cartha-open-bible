translation:
  language: es
  text: Entonces se formó el plan de los soldados de matar a los prisioneros, para que ninguno escapara nadando[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «para que ninguno escapara nadando» expresa el propósito negativo de μή τις … διαφύγῃ con español natural. «Nadando» conserva el matiz de ἐκκολυμβήσας, literalmente «habiendo nadado hacia afuera» o «tras salir nadando».
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλὴ ἐγένετο
  english_pob_choice: the soldiers’ plan was
  chosen_spanish: tenían el plan
  alternatives_spanish:
  - se formó un plan entre los soldados
  - los soldados decidieron
  lexicon: BDAG
  rationale: La construcción griega expresa que surgió o se estableció un plan. En español, «tenían el plan» conserva esa idea de intención ya formada sin sonar forzado. Evita reducir βουλή a una decisión momentánea, y mantiene el foco en el propósito que sigue.
- source_word: στρατιωτῶν
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: BDAG
  rationale: «Soldados» es la equivalencia natural y precisa para στρατιωτῶν en este contexto narrativo marítimo.
- source_word: δεσμώτας
  english_pob_choice: prisoners
  chosen_spanish: presos
  alternatives_spanish:
  - prisioneros
  - cautivos
  lexicon: BDAG
  rationale: «Presos» comunica bien el estado de custodia de los hombres transportados. En español puede sonar más concreto y natural que «prisioneros», aunque ambas opciones son válidas; aquí se eligió la más directa para el contexto de traslado bajo vigilancia.
- source_word: ἀποκτείνωσιν
  english_pob_choice: kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - ejecutar
  lexicon: BDAG
  rationale: «Matar» refleja el sentido básico sin añadir la formalidad jurídica que podría sugerir «ejecutar». El griego no especifica un acto de ejecución legal.
- source_word: μή τις ἐκκολυμβήσας διαφύγῃ
  english_pob_choice: lest any of them should swim away and escape
  chosen_spanish: para que ninguno se escapara nadando
  alternatives_spanish:
  - no fuera que alguno nadara y escapara
  - a fin de que ninguno escapara nadando
  lexicon: BDAG
  rationale: 'La finalidad negativa se expresa con naturalidad en español con «para que ninguno...». «Escapara nadando» conserva el doble movimiento de ἐκκολυμβήσας + διαφύγῃ: salir nadando del lugar de peligro y eludir la custodia.'
translation_notes:
  revision_awareness: La redacción sigue el giro revisado del inglés POB, que prefirió una construcción formal con «lest any of them should». En español, ese matiz se reproduce mejor con «para que ninguno se escapara nadando» que con una causalidad simple o con un calco duro.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, adecuado para Hechos.
  - No se introdujo vocabulario eclesiástico innecesario.
  - Se preservó el componente físico del participio compuesto griego mediante una frase verbal natural en español.
