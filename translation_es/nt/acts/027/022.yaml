review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: τὰ νῦν = «Y ahora», παραινῶ = «les exhorto», εὐθυμεῖν = exhortación al ánimo, ἀποβολὴ ψυχῆς οὐδεμία = «no habrá pérdida de vida», ἐξ ὑμῶν = «entre ustedes». Sin embargo, la cláusula final πλὴν τοῦ πλοίου no está bien resuelta con «sino solamente del barco», porque esa formulación suena elíptica y poco natural en español, y además depende demasiado de reconstruir mentalmente «pérdida». La excepción se expresa mejor como «excepto por el barco» o «salvo el barco», que preserva el contraste del original y del English POB.'
  spanish_quality_summary: El español es generalmente claro y digno, con registro bíblico moderno apropiado. «Les exhorto a tener ánimo» es aceptable, aunque «cobrar ánimo» o «tener valor» también serían válidos. El problema principal de legibilidad es «sino solamente del barco», que resulta poco idiomático en español contemporáneo. También conviene limpiar la puntuación tipográfica de la nota a para quitar comillas redundantes. El resto del verso y la nota sobre ψυχή son adecuados.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «vida» para ψυχή está bien justificado y alineado con la auditoría inglesa. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La única decisión léxica que requiere ajuste es la excepción final: para πλήν, «excepto por el barco» se alinea mejor con la decisión inglesa «except for the ship» y con el griego.'
  issues:
