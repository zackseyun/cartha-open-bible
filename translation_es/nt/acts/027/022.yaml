translation:
  language: es
  text: Y ahora les exhorto a tener ánimo[a], porque no habrá pérdida de vida entre ustedes[b], excepto por el barco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cobrar ánimo», «tener valor» o «mantener el ánimo».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «no habrá pérdida de vida»; ψυχή aquí se refiere a la vida física, no específicamente al alma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ νῦν
  english_pob_choice: now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: La expresión introduce la exhortación inmediata de Pablo; "y ahora" comunica con naturalidad el valor temporal y el enlace discursivo del griego sin volverlo pesado.
- source_word: παραινῶ
  english_pob_choice: I urge
  chosen_spanish: les exhorto
  alternatives_spanish:
  - les urjo
  - les aconsejo
  - les animo
  lexicon: BDAG
  rationale: παραινέω expresa exhortación/admonición pastoral. "Les exhorto" mantiene la fuerza persuasiva sin sonar forzado en español bíblico contemporáneo.
- source_word: εὐθυμεῖν
  english_pob_choice: to take courage
  chosen_spanish: tener ánimo
  alternatives_spanish:
  - cobrar ánimo
  - tener valor
  - mantener el ánimo
  lexicon: BDAG
  rationale: En un contexto de tormenta, el verbo apunta a ánimo y valentía. "Tener ánimo" es idiomático en español y conserva la idea de fortaleza interior; se evita una frase demasiado arcaica.
- source_word: ἀποβολὴ
  english_pob_choice: loss
  chosen_spanish: pérdida
  alternatives_spanish:
  - destrucción
  - desaparición
  - pérdida de
  lexicon: BDAG
  rationale: Aquí ἀποβολή significa pérdida, no un acto literal de arrojar. "Pérdida" reproduce bien la construcción y el sentido del peligro marítimo.
- source_word: ψυχῆς
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - persona
  - existencia
  lexicon: BDAG
  rationale: En este contexto ψυχή se refiere a la vida física, no al alma inmaterial. "Vida" evita introducir una distinción ajena al pasaje.
- source_word: οὐδεμία ἔσται
  english_pob_choice: there will be no
  chosen_spanish: no habrá
  alternatives_spanish:
  - no existirá
  - no ocurrirá
  - ninguna habrá
  lexicon: BDAG
  rationale: La negación futura existencial se expresa de forma natural y concisa en español con "no habrá".
- source_word: ἐξ ὑμῶν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - de entre ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: El sentido es el grupo del cual no se perderá ninguna vida. "Entre ustedes" es claro, neutro y natural en español latinoamericano.
- source_word: πλὴν τοῦ πλοίου
  english_pob_choice: except for the ship
  chosen_spanish: sino solamente del barco
  alternatives_spanish:
  - excepto el barco
  - salvo el barco
  - pero no el barco
  lexicon: BDAG
  rationale: 'πλήν marca excepción: las personas se salvarán, pero el barco no. "Sino solamente del barco" hace explícito ese contraste en español, conservando el sentido de pérdida del navío.'
theological_decisions:
- issue: Sentido de ψυχή en un anuncio de supervivencia
  english_pob_reading: ψυχή here refers to physical life, not specifically to the soul.
  chosen_spanish_reading: ψυχή se entiende como vida física, no como alma inmortal.
  alternative_spanish_readings:
  - ψique significa alma
  - ninguna vida se perderá en sentido espiritual
  rationale: El contexto es una crisis marítima concreta y el griego habla de pérdida de vida. Traducir "vida" preserva la referencia literal sin importar una antropología que el texto no está discutiendo.
  doctrine_reference: Hechos 27:22; uso léxico de ψυχή en contexto narrativo
- issue: Alcance de la excepción final
  english_pob_reading: except for the ship
  chosen_spanish_reading: se preserva la vida de los hombres, pero se pierde el barco.
  alternative_spanish_readings:
  - excepto el barco
  - salvo el barco
  - el barco será destruido
  rationale: El griego contrasta la seguridad de las personas con la pérdida del navío. La formulación española mantiene esa asimetría sin añadir más de lo que dice el texto.
  doctrine_reference: Hechos 27:22; relación entre el grupo humano y el navío
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último pase auditado: se mantiene la equivalencia óptima, la exhortación como "les exhorto" y el valor de ψυχή como "vida". El único ajuste estilístico es hacer más natural la excepción final en español, explicitando el contraste entre las personas y el barco sin alterar el sentido del griego.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '"Vida" se usa de manera consistente para ψυχή en este contexto narrativo, evitando "alma".'
  - '"Barco" es una opción clara y neutra para πλοῖον en un relato marítimo; no se introduce terminología eclesiástica.'
  - El tono es exhortativo y sobrio, acorde con la escena de peligro y la voz de Pablo.
