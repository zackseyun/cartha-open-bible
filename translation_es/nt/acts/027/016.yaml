  glossary_alignment: 'No hay términos teológicos clave en este versículo. La transliteración «Cauda» concuerda con la documentación. La decisión principal es náutica/lexical: conviene mantener el matiz de abrigo frente al viento sin convertirlo en una acción reflexiva de refugio.'
