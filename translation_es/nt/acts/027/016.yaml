translation:
  language: es
  text: Pero, después de pasar bajo el abrigo de una pequeña isla llamada Cauda[a], apenas pudimos sujetar el bote del barco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de pasar a sotavento de una pequeña isla llamada Cauda». El griego usa lenguaje náutico para moverse al resguardo de la isla frente al viento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νησίον ... τι
  english_pob_choice: a small island
  chosen_spanish: una pequeña isla
  alternatives_spanish:
  - una cierta isla
  - un islote
  lexicon: BDAG
  rationale: El diminutivo νησίον sugiere tamaño reducido; en español, 'una pequeña isla' conserva la idea sin sonar forzado. 'Un islote' sería posible, pero puede desplazar la imagen geográfica hacia algo más técnico o menor de lo que el contexto exige.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición narrativa leve con matiz contrastivo. 'Pero' comunica bien el giro desde la dificultad del temporal hacia esta maniobra provisional.
- source_word: ὑποδραμόντες
  english_pob_choice: after running under the shelter of
  chosen_spanish: al refugiarnos bajo la protección de
  alternatives_spanish:
  - después de pasar a la sotavento de
  - al pasar bajo el abrigo de
  lexicon: BDAG
  rationale: El verbo tiene sentido náutico de entrar bajo el resguardo de algo frente al viento. 'Refugiarnos bajo la protección de' transmite la imagen de abrigo marítimo con naturalidad en español, sin ocultar la intención de resguardo del original.
- source_word: καλούμενον Καῦδα
  english_pob_choice: called Cauda
  chosen_spanish: llamada Cauda
  alternatives_spanish:
  - nombrada Cauda
  - conocida como Cauda
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo directo con 'llamada Cauda'. Se mantiene la transliteración tradicional del topónimo.
- source_word: ἰσχύσαμεν μόλις
  english_pob_choice: we were barely able
  chosen_spanish: apenas pudimos
  alternatives_spanish:
  - solo con dificultad pudimos
  - casi no pudimos
  lexicon: BDAG
  rationale: La frase expresa capacidad llevada al límite. 'Apenas pudimos' reproduce bien la dificultad y la casi incapacidad en un español natural.
- source_word: περικρατεῖς γενέσθαι
  english_pob_choice: to secure
  chosen_spanish: sujetar
  alternatives_spanish:
  - asegurar
  - tomar control de
  lexicon: BDAG
  rationale: En este contexto náutico, el punto es lograr dominar o fijar la embarcación menor. 'Sujetar' comunica la acción concreta de mantenerla firme, más acorde con el objeto 'lancha' que un abstracto 'asegurar'.
- source_word: τῆς σκάφης
  english_pob_choice: the ship’s boat
  chosen_spanish: la lancha del barco
  alternatives_spanish:
  - la chalupa del barco
  - el bote del barco
  lexicon: BDAG
  rationale: σκάφη designa la embarcación pequeña asociada al barco. 'Lancha del barco' es claro para lectores modernos; conserva la relación posesiva y evita un tecnicismo innecesario.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el griego SBLGNT. Se mantuvo la lectura náutica de ὑποδραμόντες con una solución natural en español, y se conservó el nombre Cauda. No se introdujeron cambios doctrinales ni variantes textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'Cauda' como transliteración del topónimo, en continuidad con el contexto auditado.
  - Se eligió 'lancha del barco' para la μικρή embarcación; no se usó 'bote' para evitar ambigüedad regional.
  - El tono mantiene narrativa histórica sobria y readable, sin añadir explicaciones al cuerpo principal más allá de la nota náutica.
