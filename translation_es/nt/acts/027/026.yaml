translation:
  language: es
  text: Pero debemos encallar en alguna isla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser llevados a la costa de alguna isla».
    reason: lexical_alternative
lexical_decisions:
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ expresa transición con contraste leve; «Pero» conserva esa relación discursiva de forma natural en español.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debemos
  alternatives_spanish:
  - es necesario que
  lexicon: BDAG
  rationale: 'El verbo impersonal de necesidad se vuelve de manera idiomática en español con una primera persona plural que mantiene la obligación: «debemos».'
- source_word: ἡμᾶς
  english_pob_choice: we
  chosen_spanish: nosotros / debemos
  alternatives_spanish:
  - nos
  lexicon: BDAG
  rationale: Aunque el griego usa acusativo dentro de la construcción con infinitivo, el español exige una cláusula finita; la obligación recae sobre «nosotros», expresada de forma natural en el verbo «debemos».
- source_word: ἐκπεσεῖν
  english_pob_choice: run aground
  chosen_spanish: encallar
  alternatives_spanish:
  - ser arrojados a la costa
  - ser llevados a la costa
  - varar
  lexicon: BDAG
  rationale: En contexto náutico, ἐκπίπτω puede referirse a quedar varado o encallar; «encallar» comunica con precisión y brevedad el evento marítimo sin añadir agencia que el griego no explicita.
- source_word: εἰς νῆσον
  english_pob_choice: on some island
  chosen_spanish: en alguna isla
  alternatives_spanish:
  - a alguna isla
  - sobre alguna isla
  lexicon: BDAG
  rationale: La combinación preposicional se adapta al resultado del naufragio de modo natural en español con «en alguna isla», preservando la idea de llegada no especificada a una isla.
- source_word: τινα
  english_pob_choice: some
  chosen_spanish: alguna
  alternatives_spanish:
  - una cierta
  - una
  lexicon: BDAG
  rationale: El indefinido marca falta de identificación; «alguna» reproduce esa indeterminación de forma idiomática en español.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa de POB coinciden en la lectura básica: una necesidad inevitable de llegar a una isla. No hay revisión textual relevante ni cambio doctrinal; la única cuestión es léxica/náutica, donde el español puede expresar el evento como «encallar» o, de modo alternativo, «ser llevados a la costa».'
  spanish_consistency_notes:
  - Se evita calcar «run aground» con una perífrasis pesada; «encallar» es el equivalente náutico más natural en español.
  - «Alguna isla» conserva la indefinición de τινα mejor que «una isla cierta» o una formulación más específica.
  - La primera persona plural «debemos» mantiene el sujeto implícito de ἡμᾶς sin romper la fluidez del español.
  - Se mantiene un registro bíblico claro y sobrio, adecuado para lectura pública.
