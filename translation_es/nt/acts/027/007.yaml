translation:
  language: es
  text: Durante muchos días navegamos lentamente[a], y con dificultad llegamos frente a Cnido. Como el viento no nos permitía avanzar más, navegamos al abrigo de Creta[b], a la altura de Salmona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «íbamos navegando despacio». El griego indica avance lento en la navegación.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «bajo Creta», es decir, por el lado resguardado de la isla, a sotavento.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἱκαναῖς δὲ ἡμέραις
  english_pob_choice: For many days
  chosen_spanish: Durante muchos días
  alternatives_spanish:
  - Por muchos días
  - A lo largo de muchos días
  lexicon: BDAG
  rationale: La expresión indica duración prolongada; «Durante muchos días» transmite bien el lapso continuo sin sonar artificial en español.
- source_word: βραδυπλοοῦντες
  english_pob_choice: we were sailing slowly
  chosen_spanish: navegamos lentamente
  alternatives_spanish:
  - íbamos navegando despacio
  - navegábamos lentamente
  lexicon: BDAG
  rationale: El participio describe avance lento por mar; «navegamos lentamente» conserva la imagen náutica y suena natural en el relato.
- source_word: μόλις γενόμενοι κατὰ τὴν Κνίδον
  english_pob_choice: with difficulty we came opposite Cnidus
  chosen_spanish: con dificultad llegamos frente a Cnido
  alternatives_spanish:
  - apenas llegamos frente a Cnido
  - con esfuerzo llegamos a la altura de Cnido
  lexicon: BDAG
  rationale: «μόλις» expresa dificultad; «frente a» comunica bien el valor náutico de llegar a la altura/oposición de un punto geográfico.
- source_word: μὴ προσεῶντος ἡμᾶς τοῦ ἀνέμου
  english_pob_choice: Since the wind did not allow us to go farther
  chosen_spanish: Como el viento no nos permitía avanzar más
  alternatives_spanish:
  - Porque el viento no nos permitía seguir
  - Ya que el viento no nos dejaba avanzar
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto da la razón del cambio de ruta; «no nos permitía avanzar más» conserva la fuerza causal y el matiz de impedimento.
- source_word: ὑπεπλεύσαμεν
  english_pob_choice: we sailed under the lee of
  chosen_spanish: navegamos al abrigo de
  alternatives_spanish:
  - navegamos bajo el resguardo de
  - pasamos por la parte protegida de
  lexicon: BDAG
  rationale: En contexto náutico, el verbo indica navegar por la parte resguardada de una isla; «al abrigo de» reproduce esa idea de protección leeward en español.
- source_word: κατὰ Σαλμώνην
  english_pob_choice: off Salmone
  chosen_spanish: frente a Salmona
  alternatives_spanish:
  - junto a Salmona
  - a la altura de Salmona
  lexicon: BDAG
  rationale: La preposición con un punto costero señala ubicación relativa; «frente a» es una forma clara y natural de expresar esa referencia geográfica.
- source_word: Κνίδον / Κρήτην / Σαλμώνην
  english_pob_choice: Cnidus / Crete / Salmone
  chosen_spanish: Cnido / Creta / Salmona
  alternatives_spanish:
  - Cnidus / Creta / Salmóna
  - Cnido / Creta / Salmón
  lexicon: standard transliteration
  rationale: Se conservan los nombres propios geográficos en transliteración española estándar para mantener identificación histórica y geográfica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Se mantuvo la lectura náutica y causal del original griego, en línea con la revisión aprobada del contexto inglés.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aplica.
  - Se conservó el estilo narrativo marítimo con verbos naturales en español y sin sobreparáfrasis.
  - Los topónimos se ajustaron a transliteración española estándar y a la tradición geográfica usual en español bíblico.
  - La nota [a] acompaña el matiz de la expresión verbal sin convertirla en una glosa excesiva.
  - La nota [b] explica el modismo náutico sin reemplazar el texto principal por una explicación interpretativa.
