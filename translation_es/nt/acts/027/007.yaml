  yaml_path: translation/nt/acts/027/007.yaml
  text: For many days we were sailing slowly[a], and with difficulty we came opposite Cnidus. Since the wind did not allow us to go farther, we sailed under the lee of Crete[b], off Salmone.
  footnotes:
  - marker: a
    text: Or 'the wind did not permit us' or 'the wind did not allow us to approach.' The Greek expression is a genitive absolute explaining why they changed course.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we sailed under Crete'—that is, under the shelter of the island, on its leeward side.
    reason: cultural_note
