      estos no permanecen»? To ensure correctness, use «Si estos no permanecen en la nave» -> still same issue. Best final: «Si estos no permanecen en la nave» should be revised to «Si estos no permanecen en la nave»? No. Use subjunctive: «Si estos no permanecen» cannot be subjunctive. Correct subjunctive form is «permanezcan». Thus revise to «Si estos no permanezcan» is ungrammatical after si. Natural Spanish instead uses future-oriented condition with present indicative, but the current lexical note itself proposes «permanezcan». For dignity and fidelity, best is to recast as «A menos que estos permanezcan en la nave». This preserves the Greek ἐὰν μὴ sense and avoids the ''si + subjuntivo'' problem.'
