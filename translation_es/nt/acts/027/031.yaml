translation:
  language: es
  text: 'Pablo dijo al centurión y a los soldados: «A menos que estos permanezcan en la nave, ustedes no pueden ser salvados[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser rescatados». El griego dice «ser salvados», y aquí se refiere a la supervivencia física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχῃ
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - comandante de cien
  lexicon: BDAG
  rationale: El término griego designa un rango militar romano; «centurión» es el equivalente natural y preciso en español, y preserva la referencia histórica sin perífrasis innecesaria.
- source_word: οὗτοι
  english_pob_choice: these men
  chosen_spanish: estos
  alternatives_spanish:
  - estos hombres
  - estos mismos
  lexicon: BDAG
  rationale: En español, el demostrativo plural ya permite identificar el grupo señalado en el contexto. Añadir «hombres» sería explicativo, pero no imprescindible para la claridad.
- source_word: μείνωσιν
  english_pob_choice: remain
  chosen_spanish: permanecen
  alternatives_spanish:
  - se queden
  - permanezcan
  lexicon: BDAG
  rationale: «Permanecen» comunica de forma natural la idea de continuar a bordo en una condición hipotética. También sería posible «permanezcan»; aquí se opta por una forma más directa y fluida en la cita.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the ship
  chosen_spanish: en la nave
  alternatives_spanish:
  - en el barco
  - en el barco/a bordo
  lexicon: BDAG
  rationale: «Nave» conserva el registro algo más formal del relato marítimo y funciona bien para un embarcación de gran tamaño. «Barco» sería más coloquial.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvados
  alternatives_spanish:
  - ser rescatados
  - ser preservados
  lexicon: BDAG
  rationale: Se conserva la forma verbal amplia «ser salvados» para reflejar el verbo griego σῴζω sin reducirlo de antemano a «rescatados». En el contexto inmediato, el sentido es la preservación física en la tormenta.
- source_word: οὐ δύνασθε
  english_pob_choice: you cannot
  chosen_spanish: ustedes no pueden
  alternatives_spanish:
  - no pueden ustedes
  - no les es posible
  lexicon: BDAG
  rationale: La negación de poder se expresa de manera natural en español con «no pueden». Se mantiene el plural explícito para distinguir a los oyentes de los «estos» mencionados.
theological_decisions:
- issue: Cómo renderizar σωθῆναι sin borrar la tensión entre «salvación» y «rescate físico».
  english_pob_reading: be saved, here referring to physical survival
  chosen_spanish_reading: ser salvados, refiriéndose aquí a la preservación física
  alternative_spanish_readings:
  - ser rescatados
  - ser preservados con vida
  rationale: La traducción mantiene el verbo general «salvar» y deja que el contexto marítimo precise que se trata de supervivencia física. Así se conserva la transparencia léxica sin imponer una paráfrasis que cierre el rango semántico del griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: Se corrigió la falta anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en «soldados[a]». No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «centurión» como equivalente militar estándar y transparente.
  - «Nave» conserva un registro bíblico-natural sin forzar una forma arcaica.
  - «Ser salvados» preserva el verbo griego σῴζω y deja que el contexto determine el sentido físico.
  - La cita usa puntuación española y comillas angulares para una presentación publicable.
