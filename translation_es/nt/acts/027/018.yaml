translation:
  language: es
  text: Como éramos violentamente azotados por la tormenta, al día siguiente comenzaron a arrojar la carga por la borda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «hicieron un alijo». El griego usa una expresión náutica para echar la carga de un barco al mar a fin de aligerarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφοδρῶς
  english_pob_choice: violently
  chosen_spanish: violentamente
  alternatives_spanish:
  - con gran violencia
  - fuertemente
  lexicon: BDAG
  rationale: El adverbio intensifica la severidad del temporal; «violentamente» mantiene la fuerza del griego y suena natural en español.
- source_word: χειμαζομένων
  english_pob_choice: were being violently storm-tossed
  chosen_spanish: éramos sacudidos violentamente por la tormenta
  alternatives_spanish:
  - éramos arrojados por la tempestad
  - éramos zarandeados por la tormenta
  lexicon: BDAG
  rationale: El participio pasivo comunica estar a merced de la tormenta. «Sacudidos» conserva la imagen de ser agitados por el mar, y el pasivo en español refleja bien el valor verbal del griego.
- source_word: ἡμῶν
  english_pob_choice: we
  chosen_spanish: nosotros / éramos
  alternatives_spanish:
  - nos
  - a nosotros
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte con una cláusula circunstancial en español. La forma explícita «nosotros» conserva la primera persona plural del original.
- source_word: τῇ ἑξῆς
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - a la siguiente jornada
  lexicon: BDAG
  rationale: Es un giro temporal idiomático estándar; «al día siguiente» es la opción más natural y fiel.
- source_word: ἐκβολὴν
  english_pob_choice: throw the cargo overboard
  chosen_spanish: arrojar la carga por la borda
  alternatives_spanish:
  - hacer un alijo
  - hacer una jettison
  lexicon: BDAG
  rationale: El sustantivo designa la acción de echar fuera, en contexto náutico, para aligerar la nave. «Arrojar la carga por la borda» expresa el acto marítimo sin perder el sentido técnico.
- source_word: ἐποιοῦντο
  english_pob_choice: they began to throw
  chosen_spanish: comenzaron a arrojar
  alternatives_spanish:
  - iban arrojando
  - procedieron a arrojar
  lexicon: BDAG
  rationale: El imperfecto indica acción en desarrollo; en español, «comenzaron a» transmite bien el inicio narrativo de la maniobra sin forzar una traducción demasiado literal de «hacer».
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del inglés POB, que pasó de una paráfrasis más general a «storm-tossed» para acercarse mejor a χειμαζομένων. En español se conservó esa cercanía con «sacudidos violentamente por la tormenta», y se mantuvo el valor náutico de ἐκβολὴν con una expresión idiomática equivalente.
  spanish_consistency_notes:
  - Se mantuvo «carga» para ἐκβολὴν en el contexto marítimo, en lugar de una glosa técnica extraña al español general.
  - No se usó «SEÑOR» ni vocabulario teológico aquí, porque el versículo no contiene referencias nominales a Dios o al Mesías.
  - La primera persona plural del genitivo absoluto se hizo explícita para preservar la perspectiva narrativa de Lucas y sus acompañantes.
