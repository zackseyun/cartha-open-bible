review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: un genitivo absoluto con ἡμῶν/χειμαζομένων, la intensificación de σφοδρῶς, el marco temporal τῇ ἑξῆς, y la maniobra náutica de ἐκβολὴν ἐποιοῦντο. Sin embargo, la nota al pie no preserva la alternativa documentada en el POB inglés para ἐκβολὴν ἐποιοῦντο (''hicieron un alijo'' / ''hicieron un echazón''), sino que introduce una alternativa sobre χειμαζομένων. Además, ''Pero como'' añade un matiz adversativo/causal más fuerte de lo necesario para δέ.'
  spanish_quality_summary: El español es claro y mayormente natural. No obstante, 'Pero como nosotros éramos...' suena algo pesado; el pronombre explícito 'nosotros' no es necesario y la combinación 'Pero como' es menos fluida que una cláusula temporal/circunstancial simple. 'Sacudidos violentamente por la tormenta' es comprensible, pero 'azotados violentamente por la tormenta' o 'violentamente azotados por la tormenta' representa mejor el matiz de temporal marítimo. La frase final 'arrojar la carga por la borda' es buena.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La terminología náutica sí importa: ἐκβολὴν debe conservar la idea de echar carga al mar para aligerar la nave; por eso conviene mantener una nota que refleje la alternativa más formal del inglés POB. No hay conflictos con los defaults del glosario del proyecto.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada al segmento equivocado.
    rationale: El POB inglés conserva una alternativa formal para ἐκβολὴν ἐποιοῦντο ('they made a jettison'), no para χειμαζομένων. La nota española actual cambia el foco semántico y no transmite la decisión léxica auditada.
  - severity: low
    issue: '''Pero como'' sobrerrepresenta δέ y produce una apertura menos natural.'
    rationale: δέ aquí funciona mejor como simple transición narrativa. En español, comenzar con 'Como' o reestructurar la oración evita un adversativo innecesario.
  - severity: low
    issue: El pronombre 'nosotros' es innecesario y hace la frase más pesada.
    rationale: La primera persona plural ya está expresada en 'éramos'; omitir el pronombre mejora la naturalidad sin pérdida de fidelidad.
  revised_spanish_text: Como éramos violentamente azotados por la tormenta, al día siguiente comenzaron a arrojar la carga por la borda[a].
  revised_footnotes:
