revisions:
- from: Pero como nosotros éramos sacudidos violentamente por la tormenta[a], al día siguiente comenzaron a arrojar la carga por la borda.
  to: Como éramos violentamente azotados por la tormenta, al día siguiente comenzaron a arrojar la carga por la borda[a].
  rationale: Se ajusta la apertura para reflejar mejor el genitivo absoluto y el valor transicional de δέ sin el innecesario 'Pero'. Se elimina 'nosotros' para mayor naturalidad. Se conserva el sentido de χειμαζομένων con una formulación idiomática en español. Sobre todo, se corrige la nota al pie para que preserve la alternativa léxica auditada del POB inglés en ἐκβολὴν ἐποιοῦντο, no una alternativa distinta sobre la tormenta.
