base_translation:
  language: en
  yaml_path: translation/nt/acts/027/003.yaml
  text: And on the next day we put in at Sidon[a], and Julius, treating Paul kindly[b], permitted him to go to his friends and receive care.
  footnotes:
  - marker: a
    text: Or 'receive attention' or 'obtain care'; the Greek expression can refer broadly to receiving needed assistance from friends.
    reason: lexical_alternative
  - marker: b
    text: '''Treating Paul kindly'' could also be rendered ''treating Paul humanely,'' emphasizing Julius''s benevolent conduct toward a prisoner.'
    reason: lexical_alternative
