translation:
  language: es
  text: Y al día siguiente arribamos a Sidón, y Julio, tratando a Pablo con humanidad[b], le permitió ir a sus amigos y recibir atención[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibir cuidados» u «obtener atención»; la expresión griega puede referirse en sentido amplio a recibir la ayuda necesaria de sus amigos.
    reason: lexical_alternative
  - marker: b
    text: «Tratando a Pablo con humanidad» también puede traducirse «tratando a Pablo bondadosamente» o «tratándolo humanamente», destacando la conducta benévola de Julio hacia un preso.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε ἑτέρᾳ
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al otro día
  lexicon: BDAG
  rationale: La expresión temporal narrativa se entiende como el día posterior, no simplemente «otro día». «Al día siguiente» es natural en español y conserva la secuencia temporal.
- source_word: κατήχθημεν εἰς Σιδῶνα
  english_pob_choice: we put in at Sidon
  chosen_spanish: llegamos a Sidón
  alternatives_spanish:
  - arribamos a Sidón
  - tocamos puerto en Sidón
  lexicon: BDAG
  rationale: En español, el valor náutico queda bien expresado con «llegamos a Sidón», que evita el calco y comunica claramente la llegada al puerto. «Tocamos puerto» sería más técnico, pero menos neutral.
- source_word: φιλανθρώπως
  english_pob_choice: kindly
  chosen_spanish: con humanidad
  alternatives_spanish:
  - amablemente
  - bondadosamente
  - con bondad
  lexicon: BDAG
  rationale: El adverbio subraya trato benévolo y humano; «con humanidad» preserva ese matiz de benevolencia hacia un preso sin reducirlo solo a cortesía.
- source_word: χρησάμενος
  english_pob_choice: treating
  chosen_spanish: tratándolo
  alternatives_spanish:
  - procediendo con él
  - portándose con él
  lexicon: BDAG
  rationale: El participio con dativo expresa la manera en que Julio actuó hacia Pablo; «tratándolo» refleja bien la relación y enlaza naturalmente con el adverbio anterior.
- source_word: ἐπέτρεψεν
  english_pob_choice: permitted
  chosen_spanish: le permitió
  alternatives_spanish:
  - le dio permiso
  - le autorizó
  lexicon: BDAG
  rationale: El verbo indica concesión de permiso. «Le permitió» es formal, claro y fiel al sentido del verbo en el contexto narrativo.
- source_word: πρὸς τοὺς φίλους
  english_pob_choice: to his friends
  chosen_spanish: a sus amigos
  alternatives_spanish:
  - con sus amigos
  - junto a sus amigos
  lexicon: BDAG
  rationale: El griego apunta a personas conocidas de Pablo en Sidón. En español, «a sus amigos» expresa de forma natural la relación personal y la dirección del movimiento.
- source_word: πορευθέντι
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - dirigirse
  - presentarse
  lexicon: BDAG
  rationale: Como complemento de la अनुमति/permiso, el infinitivo de finalidad se traduce naturalmente con «ir», sin forzar una perífrasis más pesada.
- source_word: ἐπιμελείας
  english_pob_choice: care
  chosen_spanish: cuidado
  alternatives_spanish:
  - atención
  - asistencia
  - cuidado y atención
  lexicon: BDAG
  rationale: El sustantivo puede abarcar cuidado, atención o asistencia. «Cuidado» es amplio y claro en español; mantiene la apertura semántica del término griego.
- source_word: τυχεῖν
  english_pob_choice: receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - gozar de
  lexicon: BDAG
  rationale: Con genitivo, el verbo expresa obtener/recibir algo. «Recibir cuidado» conserva la idea de beneficiar por parte de sus amigos.
translation_notes:
  revision_awareness: No se requerían revisiones adicionales; el borrador sigue de cerca el griego y el tramo auditable en inglés, manteniendo el sentido náutico, el trato benévolo de Julio y la amplitud semántica de ἐπιμελείας τυχεῖν.
  spanish_consistency_notes:
  - Se usa «Sidón» como topónimo sin artículo.
  - Se mantiene «Julio» como nombre propio latino.
  - Se conserva el registro narrativo sobrio y publicable, con vocabulario claro y moderno.
  - La nota [a] preserva la alternativa semántica que el audit trail inglés documenta para ἐπιμελείας τυχεῖν.
  - La nota [b] preserva la tensión entre «kindly» y «humanely» sin imponer una sola glosa.
