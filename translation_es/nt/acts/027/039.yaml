translation:
  language: es
  text: Cuando amaneció, no reconocieron la tierra, pero notaron una cierta bahía con una playa, en la cual planeaban, si podían, varar[a] el barco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer encallar el barco». El verbo griego se refiere a impulsar o forzar la nave hasta la orilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ ἡμέρα ἐγένετο
  english_pob_choice: Now when day came
  chosen_spanish: Cuando amaneció
  alternatives_spanish:
  - Cuando llegó el día
  - Cuando se hizo de día
  lexicon: BDAG
  rationale: ἡμέρα ἐγένετο expresa la llegada del día/luz; en español, «amaneció» comunica de forma natural ese cambio temporal. Se omite un equivalente explícito de δέ porque en castellano el giro temporal ya funciona como transición narrativa suficiente.
- source_word: τὴν γῆν οὐκ ἐπεγίνωσκον
  english_pob_choice: they did not recognize the land
  chosen_spanish: no reconocían la tierra
  alternatives_spanish:
  - no podían identificar la tierra
  - no reconocían la costa
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí es reconocer/identificar. «Tierra» conserva la amplitud de γῆ, aunque el contexto náutico sugiere la costa o el territorio cercano.
- source_word: κόλπον δέ τινα
  english_pob_choice: but they noticed a certain bay
  chosen_spanish: pero distinguieron un cierto golfo
  alternatives_spanish:
  - pero observaron una cierta ensenada
  - pero notaron un cierto bahía
  lexicon: BDAG
  rationale: κόλπος en contexto marítimo puede ser golfo, bahía o ensenada. «Golfo» mantiene la posibilidad geográfica amplia del término; «distinguieron» traduce la observación atenta de κατενόουν. «Cierto» conserva la indefinición de τινα.
- source_word: κατενόουν
  english_pob_choice: they noticed
  chosen_spanish: distinguieron
  alternatives_spanish:
  - notaron
  - observaron
  lexicon: BDAG
  rationale: κατανοέω implica percibir con atención. «Distinguieron» sugiere reconocimiento visual cuidadoso, adecuado al avance narrativo del episodio.
- source_word: ἔχοντα αἰγιαλὸν
  english_pob_choice: with a beach
  chosen_spanish: con una playa
  alternatives_spanish:
  - con una costa
  - con un arenal
  lexicon: BDAG
  rationale: αἰγιαλός se refiere a la orilla o playa junto al mar. «Playa» es claro y natural en español, sin añadir el matiz «arenosa» que el griego no expresa.
- source_word: εἰς ὃν
  english_pob_choice: into which
  chosen_spanish: hacia el cual
  alternatives_spanish:
  - al cual
  - donde
  lexicon: BDAG
  rationale: La frase apunta al golfo como destino de la maniobra. «Hacia el cual» conserva la orientación direccional sin forzar una imagen demasiado literal en español.
- source_word: ἐβουλεύοντο
  english_pob_choice: they planned
  chosen_spanish: se proponían
  alternatives_spanish:
  - planeaban
  - resolvían
  lexicon: BDAG
  rationale: βουλεύομαι expresa deliberar y tomar la intención de actuar. «Se proponían» recoge bien la intención formada, con un tono natural en español narrativo.
- source_word: εἰ δύναιντο
  english_pob_choice: if they could
  chosen_spanish: si les fuera posible
  alternatives_spanish:
  - si pudieran
  - si era posible
  lexicon: BDAG
  rationale: La construcción condicional con optativo expresa posibilidad contingente. «Si les fuera posible» preserva ese matiz de posibilidad sin sonar rígido.
- source_word: ἐξῶσαι τὸ πλοῖον
  english_pob_choice: to run the ship ashore
  chosen_spanish: encallar el barco
  alternatives_spanish:
  - varar el barco
  - poner el barco en la playa
  lexicon: BDAG
  rationale: En contexto náutico, ἐξωθέω significa empujar o hacer llegar la nave a tierra. «Encallar» es el equivalente más natural para ese acto; aunque puede evocar una varadura accidental, aquí la intención deliberada está marcada por el contexto.
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT como fuente primaria y se aprovechó el audit trail en inglés para mantener las decisiones léxicas clave: llegada del día, no reconocer la tierra, un término marítimo para κόλπος, observación atenta, playa/orilla, la dirección hacia la costa y la maniobra de varar/encallar la nave. No se adoptaron cambios de revisión posteriores porque el expediente indica alta concordancia y sin cambios necesarios.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro náutico coherente: tierra, golfo, playa, barco, encallar.'
  - Se evitó «SEÑOR» o vocabulario teológico no pertinente, ya que el versículo no contiene terminología divina.
  - «Cierto» conserva la indefinición de τινα; «les fuera posible» refleja adecuadamente la contingencia del optativo.
  - La nota a pie distingue la formulación idiomática española de la traducción más literal del griego.
