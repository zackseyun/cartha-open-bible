translation:
  language: es
  text: Después de cruzar el mar abierto[a] junto a Cilicia y Panfilia, llegamos[b] a Mira, en Licia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la altura de Cilicia y Panfilia», indicando una ruta junto a la costa de esas regiones.
    reason: lexical_alternative
  - marker: b
    text: O «arribamos a Mira, en Licia». El verbo griego literalmente significa «bajamos» o «descendimos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πέλαγος
  english_pob_choice: the open sea
  chosen_spanish: el mar abierto
  alternatives_spanish:
  - el mar
  - el mar profundo
  lexicon: BDAG
  rationale: πέλαγος suele referirse al mar abierto, no simplemente al mar en general. «Mar abierto» conserva esa precisión marítima y suena natural en español.
- source_word: τὸ κατὰ τὴν Κιλικίαν καὶ Παμφυλίαν
  english_pob_choice: along Cilicia and Pamphylia
  chosen_spanish: junto a Cilicia y Panfilia
  alternatives_spanish:
  - a lo largo de Cilicia y Panfilia
  - por la costa de Cilicia y Panfilia
  - cerca de Cilicia y Panfilia
  lexicon: BDAG
  rationale: La preposición κατά con acusativo en este contexto geográfico indica una ruta paralela a la costa o junto a esa región. «Junto a» comunica bien esa trayectoria sin sonar forzado en español; se mantiene la referencia regional sin añadir más de lo que el griego asegura.
- source_word: διαπλεύσαντες
  english_pob_choice: after sailing across
  chosen_spanish: Después de navegar
  alternatives_spanish:
  - habiendo navegado
  - tras cruzar navegando
  - después de atravesar navegando
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y marca una acción completada antes de llegar. «Después de navegar» preserva la secuencia temporal y evita una traducción demasiado literal o pesada.
- source_word: κατήλθομεν
  english_pob_choice: we came down
  chosen_spanish: llegamos
  alternatives_spanish:
  - descendimos
  - bajamos
  - vinimos
  lexicon: BDAG
  rationale: Aunque el verbo griego significa literalmente «bajar/venir hacia abajo», en narrativas de viaje puede funcionar como verbo de llegada. En español, «llegamos» comunica con naturalidad el valor narrativo sin perder el sentido de desplazamiento al destino.
- source_word: Μύρα τῆς Λυκίας
  english_pob_choice: Myra in Lycia
  chosen_spanish: Mira, en Licia
  alternatives_spanish:
  - Mira de Licia
  - Mira, de Licia
  lexicon: BDAG
  rationale: El genitivo señala la ubicación regional de Mira. «En Licia» es la forma más idiomática en español para expresar ese marco geográfico.
- source_word: τε
  english_pob_choice: and (implicit connective)
  chosen_spanish: (conectivo implícito)
  alternatives_spanish:
  - y
  - también
  lexicon: BDAG
  rationale: τέ une suavemente esta cláusula con la anterior, pero en español no requiere un equivalente explícito. Su fuerza se absorbe en la fluidez de la oración.
translation_notes:
  revision_awareness: 'Se siguió el auditorio inglés con equivalencia óptima: se conservaron la secuencia temporal del participio aoristo, el matiz geográfico de κατά y la posible literalidad direccional de κατήλθομεν en nota. No hubo revisiones aplicadas en el paquete base.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «Mira» para Μύρα, forma española usual del topónimo.
  - Se mantuvo la puntuación natural del español con la coma geográfica «Mira, en Licia».
  - La nota a conserva la alternativa de ruta costera sin sobreinterpretar el griego.
  - La nota b conserva la tensión entre «llegar» e «bajar» en el verbo κατήλθομεν.
