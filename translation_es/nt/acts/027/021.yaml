source:
  edition: SBLGNT
  text: Πολλῆς ⸀τε ἀσιτίας ὑπαρχούσης τότε σταθεὶς ὁ Παῦλος ἐν μέσῳ αὐτῶν εἶπεν· Ἔδει μέν, ὦ ἄνδρες, πειθαρχήσαντάς μοι μὴ ἀνάγεσθαι ἀπὸ τῆς Κρήτης κερδῆσαί τε τὴν ὕβριν ταύτην καὶ τὴν ζημίαν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/021.yaml
  text: After they had gone a long time without food[a], Paul stood up among them and said, “Men, you should have listened to me and not set sail from Crete[c][b], and so have avoided this damage and loss.”
  footnotes:
  - marker: a
    text: Or “Since there had been much fasting.” The Greek ἀσιτία can refer either to lack of food or abstinence from eating; in this storm context, prolonged not eating is more likely.
    reason: lexical_alternative
  - marker: b
    text: Or “obeyed me.” The verb can carry the sense of obeying an instruction or authority; here it refers to heeding Paul’s counsel.
    reason: lexical_alternative
  - marker: c
    text: The pair “damage and loss” likely distinguishes physical harm from material loss.
    reason: cultural_note
