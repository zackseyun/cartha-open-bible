translation:
  language: es
  text: Y temiendo que pudiéramos encallar en lugares rocosos[a], echaron cuatro anclas desde la popa y oraban para que amaneciera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que pudiéramos ser arrojados contra rocas» o «que pudiéramos encallar en lugares ásperos».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «oraban para que se hiciera de día»; es decir, anhelaban que llegara la luz del amanecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβούμενοί
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - teniendo miedo
  - estando atemorizados
  lexicon: BDAG
  rationale: El participio expresa la circunstancia que impulsa la acción siguiente. «Temiendo» conserva el valor participial y fluye mejor en español que una cláusula finita.
- source_word: μή που κατὰ τραχεῖς τόπους ἐκπέσωμεν
  english_pob_choice: that we might run aground on rocky places
  chosen_spanish: que pudiéramos encallar en lugares rocosos
  alternatives_spanish:
  - que fuéramos a dar en lugares ásperos
  - que pudiéramos ser arrojados contra rocas
  lexicon: BDAG
  rationale: En contexto náutico, ἐκπίπτω describe que la nave termine varada o encallada. «Encallar» es el equivalente español más natural y preciso; «lugares rocosos» conserva la idea de terreno peligroso sin sobreespecificar más allá del griego.
- source_word: ἐκπέσωμεν
  english_pob_choice: run aground
  chosen_spanish: encallar
  alternatives_spanish:
  - varar
  - dar en
  lexicon: BDAG
  rationale: El verbo no sugiere simplemente caer, sino que la nave sea llevada a tierra, bajíos o rocas. «Encallar» comunica bien ese sentido marítimo en español.
- source_word: ἐκ πρύμνης
  english_pob_choice: from the stern
  chosen_spanish: desde la popa
  alternatives_spanish:
  - desde la parte trasera de la nave
  - desde la popa del barco
  lexicon: BDAG
  rationale: «Πρύμνα» es la parte posterior de la embarcación. «Popa» es el término náutico natural en español y mantiene la precisión del original.
- source_word: ῥίψαντες ἀγκύρας τέσσαρας
  english_pob_choice: they dropped four anchors
  chosen_spanish: echaron cuatro anclas
  alternatives_spanish:
  - arrojaron cuatro anclas
  - soltaron cuatro anclas
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Echaron» es el verbo náutico normal en español y reproduce bien la acción concreta de lanzar o soltar anclas.
- source_word: ηὔχοντο
  english_pob_choice: prayed
  chosen_spanish: oraban
  alternatives_spanish:
  - oraron
  - estaban orando
  - pedían
  lexicon: BDAG
  rationale: En este contexto εὔχομαι expresa oración, no mera esperanza. El imperfecto sugiere acción continua; «oraban» conserva mejor esa duración que un pasado puntual.
- source_word: ἡμέραν γενέσθαι
  english_pob_choice: for day to come
  chosen_spanish: por que llegara el día
  alternatives_spanish:
  - para que viniera el día
  - por que amaneciera
  lexicon: BDAG
  rationale: La expresión literalmente apunta a que «el día llegue a ser». «Llegara el día» reproduce la idea de la llegada de la luz diurna con naturalidad en español.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al estado auditado, y la elección española mantiene la misma lectura semántica y el mismo valor aspectual del original griego.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la continuidad narrativa del contexto inmediato.
  - «Encallar» se usa con sentido marítimo específico, no como simple «caer».
  - «Oraban» conserva el imperfecto griego mejor que un perfecto puntual.
  - «Popa» se prefiere por precisión náutica y naturalidad en español.
  - Las notas [a] y [b] preservan alternativas léxicas documentadas sin introducir interpretación doctrinal.
