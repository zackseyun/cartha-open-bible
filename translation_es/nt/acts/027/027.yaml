translation:
  language: es
  text: Cuando llegó la decimocuarta noche[a], mientras nosotros éramos arrastrados por el Adriático[b], cerca de la medianoche los marineros empezaron a sospechar que alguna tierra firme se les acercaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando llegó la noche decimocuarta». El griego presenta literalmente «la decimocuarta noche llegó».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras nosotros éramos llevados en Adria». El antiguo nombre geográfico Ἀδρίας podía referirse más ampliamente a las aguas centrales del Mediterráneo en esa zona, no solo al Adriático moderno.'
    reason: cultural_note
lexical_decisions:
- source_word: τεσσαρεσκαιδεκάτη νὺξ
  english_pob_choice: the fourteenth night
  chosen_spanish: la decimocuarta noche
  alternatives_spanish:
  - la noche decimocuarta
  - la noche número catorce
  lexicon: SBLGNT; BDAG
  rationale: La construcción temporal expresa la llegada de la noche dentro de la secuencia del relato. En español, ‘la decimocuarta noche’ conserva la referencia ordinal de forma natural y fiel.
- source_word: ἐγένετο
  english_pob_choice: had come
  chosen_spanish: llegó
  alternatives_spanish:
  - había llegado
  - vino
  lexicon: BDAG
  rationale: Con una expresión temporal, γίνομαι comunica la llegada o consumación del momento. ‘Llegó’ transmite ese valor de manera idiomática en español sin forzar un pluscuamperfecto innecesario.
- source_word: διαφερομένων ἡμῶν
  english_pob_choice: as we were being driven along
  chosen_spanish: mientras nosotros éramos llevados
  alternatives_spanish:
  - mientras íbamos siendo arrastrados
  - mientras éramos empujados
  lexicon: BDAG
  rationale: El participio pasivo indica movimiento continuo fuera del control de los viajeros. ‘Éramos llevados’ conserva la pasividad y el avance forzado; ‘ser arrastrados’ sería más expresivo, pero más interpretativo.
- source_word: ἐν τῷ Ἀδρίᾳ
  english_pob_choice: in the Adriatic Sea
  chosen_spanish: por el Adriático
  alternatives_spanish:
  - en el mar Adriático
  - en el Adriático
  lexicon: BDAG
  rationale: La nota inglesa señala que Ἀδρίας puede abarcar la región marítima central más ampliamente que el mar Adriático moderno. ‘Por el Adriático’ deja abierto ese alcance regional sin perder la identificación geográfica.
- source_word: κατὰ μέσον τῆς νυκτός
  english_pob_choice: about midnight
  chosen_spanish: cerca de la medianoche
  alternatives_spanish:
  - a medianoche
  - en medio de la noche
  lexicon: BDAG
  rationale: La frase expresa aproximadamente el punto medio de la noche. ‘Cerca de la medianoche’ mantiene el matiz aproximado y suena natural en español.
- source_word: ὑπενόουν
  english_pob_choice: began to suspect
  chosen_spanish: empezaron a sospechar
  alternatives_spanish:
  - sospecharon
  - comenzaron a sospechar
  lexicon: BDAG
  rationale: El imperfecto sugiere una sospecha que va formándose. ‘Empezaron a sospechar’ recoge bien el matiz inceptivo indicado en el audit trail inglés.
- source_word: οἱ ναῦται
  english_pob_choice: the sailors
  chosen_spanish: los marineros
  alternatives_spanish:
  - los navegantes
  - los marinos
  lexicon: BDAG
  rationale: ‘Marineros’ es el equivalente natural en español para ναῦται en este contexto náutico, y es plenamente claro para el lector moderno.
- source_word: προσάγειν
  english_pob_choice: was drawing near to them
  chosen_spanish: se les acercaba
  alternatives_spanish:
  - se aproximaba a ellos
  - iba acercándose a ellos
  lexicon: BDAG
  rationale: El verbo, en discurso indirecto con χώραν como sujeto, indica que la tierra estaba viniendo hacia su cercanía. ‘Se les acercaba’ conserva la perspectiva del griego y suena natural en español.
- source_word: τινὰ ... χώραν
  english_pob_choice: some land
  chosen_spanish: alguna tierra
  alternatives_spanish:
  - tierra alguna
  - cierta tierra
  lexicon: BDAG
  rationale: 'τινά marca indefinición: los marineros percibían tierra, pero no sabían cuál. ‘Alguna tierra’ preserva esa incertidumbre mejor que un simple ‘tierra’.'
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo se expresa en español con ‘se les’ dentro de la construcción pronominal, manteniendo el foco del griego en la tierra que se aproxima a su posición.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió ‘was drawing near to them’ para προσάγειν, y la refleja con ‘se les acercaba’. También preserva la lectura espacial amplia de Ἀδρίας con una fórmula geográfica abierta (‘por el Adriático’) y mantiene el matiz inceptivo de ὑπενόουν con ‘empezaron a sospechar’.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ y terminología teológica no pertinente; el pasaje es narrativo y marítimo.
  - ‘Marineros’ se usa de forma consistente para οἱ ναῦται en contexto náutico.
  - La pasiva ‘éramos llevados’ conserva la falta de control del grupo, acorde con el griego.
  - La indefinición de τινὰ se mantiene con ‘alguna’, sin especificar más de lo que el texto permite.
