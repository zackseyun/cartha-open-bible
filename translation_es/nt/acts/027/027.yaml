  text: Ὡς δὲ τεσσαρεσκαιδεκάτη νὺξ ἐγένετο διαφερομένων ἡμῶν ἐν τῷ Ἀδρίᾳ, κατὰ μέσον τῆς νυκτὸς ὑπενόουν οἱ ναῦται προσάγειν τινὰ αὐτοῖς χώραν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/027/027.yaml
  text: When the fourteenth night had come[a], as we were being driven along in the Adriatic Sea[b], about midnight the sailors began to suspect that some land was drawing near to them.
  footnotes:
  - marker: a
    text: Or, 'as we were being carried along in Adria.' The ancient term 'Adria' could refer more broadly to the central Mediterranean waters in this region, not only the modern Adriatic Sea.
    reason: cultural_note
  - marker: b
    text: Literally, 'the sailors were suspecting that some land was approaching them.'
    reason: lexical_alternative
