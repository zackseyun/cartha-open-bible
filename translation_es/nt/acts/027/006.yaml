translation:
  language: es
  text: Allí, el centurión encontró un barco alejandrino que navegaba hacia Italia[a], y nos hizo subir a bordo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y allí el centurión encontró un barco alejandrino con destino a Italia y nos hizo subir a bordo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Y allí
  - Entonces allí
  lexicon: BDAG
  rationale: El compuesto lleva un matiz aditivo («y allí» / «allí también»), pero en español narrativo puede integrarse de forma natural con «Allí» sin perder el avance del relato. Si se quisiera explicitar el enlace, «Y allí» también sería posible.
- source_word: εὑρὼν
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - habiendo encontrado
  - al encontrar
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal; en español, una forma finita fluye mejor y conserva la secuencia narrativa. «Encontró» mantiene la acción sin volverla excesivamente literal.
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  lexicon: BDAG
  rationale: «Centurión» es el equivalente preciso y reconocido para el rango militar romano. «Oficial romano» sería más general y perdería especificidad.
- source_word: πλοῖον Ἀλεξανδρῖνον
  english_pob_choice: an Alexandrian ship
  chosen_spanish: un barco alejandrino
  alternatives_spanish:
  - un barco de Alejandría
  - una nave alejandrina
  lexicon: BDAG
  rationale: El adjetivo identifica la nave como alejandrina; en español, «barco alejandrino» es conciso y conserva la designación geográfica. «De Alejandría» sería más explicativo, pero menos fiel a la forma adjetival del griego.
- source_word: πλέον εἰς τὴν Ἰταλίαν
  english_pob_choice: sailing for Italy
  chosen_spanish: que navegaba hacia Italia
  alternatives_spanish:
  - con destino a Italia
  - dirigido a Italia
  lexicon: BDAG
  rationale: El participio presente indica curso o dirección. «Navegaba hacia Italia» transmite el sentido marítimo de forma natural y evita una calca dura como «yendo a Italia».
- source_word: ἐνεβίβασεν ἡμᾶς εἰς αὐτό
  english_pob_choice: he put us on board it
  chosen_spanish: nos embarcó en él
  alternatives_spanish:
  - nos hizo subir a bordo
  - nos puso a bordo
  lexicon: BDAG
  rationale: El verbo expresa causar que alguien suba/embarque en una nave. «Nos embarcó en él» conserva la fuerza causativa y es una solución sobria y comprensible en español.
theological_decisions:
- issue: Referencia implícita a la nave y mantenimiento del sujeto histórico
  english_pob_reading: The centurion... he put us on board it.
  chosen_spanish_reading: El centurión... nos embarcó en él.
  alternative_spanish_readings:
  - el centurión... nos puso a bordo de ella
  - el centurión... nos embarcó
  rationale: El pasaje mantiene el referente inmediato de la nave mediante el pronombre neutro «él», que en español puede funcionar para un barco en estilo bíblico sobrio. No hay una decisión doctrinal, sino de referencia textual y fluidez narrativa.
  doctrine_reference: Ninguno; decisión referencial/narrativa.
translation_notes:
  revision_awareness: 'El texto inglés auditado no requiere cambios según el último pase: el revisor marcó alta concordancia y sin revisiones aplicadas. La versión española sigue esa lectura estable, solo adaptando la sintaxis a un español natural y manteniendo las alternativas léxicas pertinentes.'
  spanish_consistency_notes:
  - Se mantiene «centurión» como término técnico coherente con el uso bíblico estándar y con el valor del griego.
  - «Alejandrino» conserva la forma adjetival del original, sin expandir innecesariamente a una perífrasis.
  - La preposición direccional «hacia» refleja bien εἰς con un participio de movimiento.
  - Se conserva el referente de la nave con «él», de acuerdo con el uso estilístico español en contexto narrativo, sin introducir ambigüedad sustancial.
