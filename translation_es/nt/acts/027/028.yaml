translation:
  language: es
  text: Y después de echar la sonda[a], hallaron veinte brazas; y, tras avanzar un poco, volvieron a echar la sonda y hallaron quince brazas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'después de haber echado la plomada'; el griego se refiere a medir la profundidad del mar con una línea de sondeo.
    reason: lexical_alternative
lexical_decisions:
- source_word: βολίσαντες
  english_pob_choice: after taking soundings
  chosen_spanish: después de tomar sondas
  alternatives_spanish:
  - después de echar la sonda
  - después de sondear
  lexicon: BDAG
  rationale: El participio se refiere a medir la profundidad con una línea de sondeo o plomada. En español, 'tomar sondas' conserva el acto técnico y es entendible en contexto náutico; 'echar la sonda' sería más literal pero menos natural, y 'sondear' puede sonar más general.
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: BDAG
  rationale: El aoristo narrativo comunica el resultado de la medición. 'Hallaron' mantiene el tono directo y sirve bien para el registro bíblico sin añadir matices ajenos.
- source_word: ὀργυιὰς
  english_pob_choice: fathoms
  chosen_spanish: brazas
  alternatives_spanish:
  - fathoms
  - medidas de unos dos metros
  lexicon: BDAG
  rationale: Es una unidad náutica equivalente aproximada a una braza. 'Brazas' es el equivalente español natural y evita una transliteración innecesaria.
- source_word: εἴκοσι
  english_pob_choice: twenty
  chosen_spanish: veinte
  alternatives_spanish:
  - '20'
  lexicon: none
  rationale: Correspondencia numérica directa con el texto griego.
- source_word: βραχὺ
  english_pob_choice: a little farther
  chosen_spanish: avanzar un poco
  alternatives_spanish:
  - desplazarse un poco
  - ir un poco más adelante
  lexicon: BDAG
  rationale: Aquí funciona adverbialmente con el movimiento implícito del participio siguiente. 'Avanzar un poco' hace explícito el pequeño desplazamiento de forma idiomática en español.
- source_word: διαστήσαντες
  english_pob_choice: after going
  chosen_spanish: tras avanzar
  alternatives_spanish:
  - después de ir
  - tras desplazarse
  lexicon: BDAG
  rationale: En este contexto de navegación, el participio expresa un pequeño avance antes de repetir la medición. 'Tras avanzar' es natural y preserva la secuencia narrativa.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Adverbio simple de repetición; 'de nuevo' mantiene claridad y buen ritmo en español.
- source_word: δεκαπέντε
  english_pob_choice: fifteen
  chosen_spanish: quince
  alternatives_spanish:
  - '15'
  lexicon: none
  rationale: Correspondencia numérica directa con el texto griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión sustantiva; la redacción española mantiene la secuencia narrativa y la terminología náutica sin introducir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se conserva el paralelismo de dos mediciones sucesivas con estructura coordinada.
  - '''Brazas'' funciona como equivalente náutico natural de ''fathoms'' en español.'
  - La nota al pie preserva la alternativa literal documentada por el audit trail inglés sin sustituir el texto principal.
