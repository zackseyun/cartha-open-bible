    rationale: Καλοὺς Λιμένας funciona aquí como nombre propio. En español conviene conservar un topónimo reconocible; «Buenos Puertos» es más compacto y natural como nombre que «Puertos Hermosos».
  - severity: medium
    issue: «costeando junto a ella» es poco idiomático en español.
    rationale: Aunque intenta reflejar παραλεγόμενοι αὐτὴν, la combinación resulta torpe. «Costeándola» o «navegando junto a su costa» expresa mejor la idea de avanzar bordeando la costa.
  - severity: low
    issue: La nota al pie usa «la costa de ella», que suena poco natural.
    rationale: En español neutral es preferible «su costa» o «la costa» si el referente ya está claro.
