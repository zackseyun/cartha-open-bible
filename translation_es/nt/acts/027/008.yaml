  to: Y con dificultad, costeándola[a], llegamos a cierto lugar llamado Buenos Puertos, cerca del cual había una ciudad llamada Lasea.
  rationale: Se ajusta la expresión náutica a un español más natural y fiel («costeándola»), se mejora la nota para evitar un giro poco idiomático, y se sustituye «Puertos Hermosos» por «Buenos Puertos» para tratar Καλοὺς Λιμένας como topónimo más adecuado en español. No se requiere adjudicación especial.
