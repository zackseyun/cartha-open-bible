translation:
  language: es
  text: Y con dificultad, costeándola[a], llegamos a cierto lugar llamado Buenos Puertos, cerca del cual había una ciudad llamada Lasea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apenas navegando junto a su costa, llegamos…». El participio griego παραλεγόμενοι es un término náutico para avanzar junto a la costa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόλις
  english_pob_choice: with difficulty
  chosen_spanish: con dificultad
  alternatives_spanish:
  - apenas
  - a duras penas
  lexicon: BDAG
  rationale: El adverbio expresa que el avance fue posible solo con gran esfuerzo. «Con dificultad» conserva ese énfasis narrativo sin forzar un calco poco natural en español.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y así
  lexicon: BDAG
  rationale: La partícula enlaza la acción con la cláusula anterior. «Y» mantiene la continuidad narrativa de manera sobria y natural.
- source_word: παραλεγόμενοι
  english_pob_choice: coasting along
  chosen_spanish: costeando junto a
  alternatives_spanish:
  - navegando junto a la costa de
  - pasando junto a
  lexicon: BDAG
  rationale: En contexto náutico, el participio indica desplazamiento costero. «Costeando» comunica bien la imagen marítima; «junto a» conserva la referencia a la costa/objeto al que se bordea, mientras que la nota preserva la alternativa lexical más amplia.
- source_word: αὐτὴν
  english_pob_choice: it
  chosen_spanish: ella
  alternatives_spanish:
  - la costa
  - la isla
  lexicon: BDAG
  rationale: El referente inmediato es Creta, mencionada antes como isla/femenina en español. «Ella» sigue el antecedente implícito en la narración sin añadir especificación que el griego no exige aquí.
- source_word: ἤλθομεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - vinimos
  - arribamos
  lexicon: BDAG
  rationale: El aoristo de movimiento aquí funciona como llegada al destino. «Llegamos» es natural en español y mantiene el valor narrativo de arribo.
- source_word: εἰς τόπον τινά
  english_pob_choice: to a certain place
  chosen_spanish: a un lugar
  alternatives_spanish:
  - a cierto lugar
  - a un sitio
  lexicon: BDAG
  rationale: El griego mantiene indefinición; en español, «a un lugar» preserva la falta de precisión sin sonar excesivamente marcado. «Cierto» podría sonar más enfático de lo que el contexto requiere.
- source_word: καλούμενον
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - conocido como
  - denominado
  lexicon: BDAG
  rationale: Participio estándar para introducir un topónimo. «Llamado» es directo y transparente en español.
- source_word: Καλοὺς Λιμένας
  english_pob_choice: Fair Havens
  chosen_spanish: Puertos Hermosos
  alternatives_spanish:
  - Buenos Puertos
  - Hermosos Puertos
  lexicon: BDAG
  rationale: Se conserva el sentido del topónimo griego en forma transparente al español. «Puertos Hermosos» refleja el valor semántico de Καλούς Λιμένας sin depender de una forma litúrgica tradicional en inglés.
- source_word: ᾧ ἐγγὺς ἦν πόλις Λασαία
  english_pob_choice: near which was a city named Lasea
  chosen_spanish: cerca del cual había una ciudad llamada Lasea
  alternatives_spanish:
  - y cerca de él había una ciudad llamada Lasea
  - junto al cual se encontraba una ciudad llamada Lasea
  lexicon: BDAG
  rationale: La relativa ᾧ retoma el lugar anterior; «cerca del cual» reproduce con claridad esa relación. El sintagma anartro πόλις se traduce como «una ciudad», y «llamada Lasea» introduce el nombre propio de forma natural.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente en sentido y estructura general; se mantiene la solución de traducción optimamente equivalente, sin cambios sustantivos respecto al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la conexión narrativa del τε griego.
  - Se evita «SEÑOR» o terminología teológica ajena, ya que el versículo es puramente narrativo y geográfico.
  - El topónimo se vierte de forma transparente al español como «Puertos Hermosos», en línea con la transparencia del POB y sin depender de la forma inglesa tradicional.
  - La nota a preserva la ambigüedad náutica documentada en el audit trail inglés para παραλεγόμενοι.
