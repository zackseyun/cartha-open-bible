review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: los marineros intentaban escapar, bajaron la embarcación pequeña al mar y fingían que iban a desplegar anclas desde la proa. Las decisiones principales para ναυτῶν, ζητούντων φυγεῖν, προφάσει, ἐκ πρῴρης y μελλόντων ἐκτείνειν son fieles al texto fuente y al rastro de auditoría inglés.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. Sin embargo, una nota al pie introduce un error grave: ofrece «desde la popa» como alternativa para ἐκ πρῴρης, cuando πρῷρα significa «proa», no «popa». Además, conviene hacer que la nota alternativa de σκάφη suene plenamente natural en español con «bote» o mantener «barca»; el texto principal puede permanecer prácticamente igual.'
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. El uso de «marineros», «barco», «esquife», «proa» y «anclas» concuerda con la racionalidad léxica documentada. La única desalineación real es la nota b, que contradice el propio análisis léxico al dar «popa» como supuesta alternativa.
  issues:
  - severity: high
    issue: La nota b da «desde la popa» como alternativa.
    rationale: El griego ἐκ πρῴρης significa «desde la proa / desde el frente del barco», no «desde la popa». La nota actual invierte el sentido espacial del texto fuente y contradice tanto el griego como el English POB.
  - severity: low
    issue: La formulación «con el pretexto de que iban a» podría fluir mejor como «so pretexto de que iban a» o mantenerse tal cual.
    rationale: No es incorrecta; simplemente es una cuestión de estilo. La redacción actual ya es comprensible y fiel, así que no exige cambio.
  revised_spanish_text: Y cuando los marineros procuraban escapar del barco y habían bajado el esquife al mar, con el pretexto de que iban a echar las anclas desde la proa[a][b],
  revised_footnotes:
  - marker: a
    text: O «habían bajado la barca». La palabra griega skaphē se refiere a la pequeña embarcación del barco.
    reason: lexical_alternative
  - marker: b
    text: O «desde la proa del barco». El griego también puede traducirse «desde la proa».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige la nota b, que contenía un error léxico grave al decir «popa» en lugar de «proa». No se requieren otros cambios sustanciales.
