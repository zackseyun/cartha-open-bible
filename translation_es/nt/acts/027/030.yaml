translation:
  language: es
  text: Y cuando los marineros procuraban escapar del barco y habían bajado el esquife al mar, con el pretexto de que iban a echar las anclas desde la proa[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían bajado la barca». La palabra griega skaphē se refiere a la pequeña embarcación del barco.
    reason: lexical_alternative
  - marker: b
    text: O «desde la popa». El griego dice literalmente «desde la proa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ναυτῶν
  english_pob_choice: the sailors
  chosen_spanish: los marineros
  alternatives_spanish:
  - los marinos
  - los tripulantes
  lexicon: BDAG
  rationale: ναύτης se refiere a la tripulación marinera del barco. «Marineros» es natural en español y conserva el sentido de gente de mar sin volverlo demasiado técnico.
- source_word: ζητούντων φυγεῖν
  english_pob_choice: were seeking to escape
  chosen_spanish: procuraban escapar
  alternatives_spanish:
  - intentaban huir
  - buscaban escapar
  lexicon: BDAG
  rationale: La construcción expresa intento/proyecto; «procuraban» recoge bien la idea de esfuerzo intencional, y «escapar» encaja con el contexto de abandonar la nave.
- source_word: ἐκ τοῦ πλοίου
  english_pob_choice: from the ship
  chosen_spanish: del barco
  alternatives_spanish:
  - de la nave
  - del navío
  lexicon: BDAG
  rationale: «Barco» es claro y natural en español contemporáneo; mantiene el referente marítimo sin sonar arcaico.
- source_word: χαλασάντων τὴν σκάφην
  english_pob_choice: had lowered the skiff
  chosen_spanish: habían bajado el esquife
  alternatives_spanish:
  - habían dejado caer la barca
  - habían bajado la embarcación pequeña
  lexicon: BDAG
  rationale: σκάφη designa la barca pequeña auxiliar del barco. «Esquife» conserva precisión náutica y evita interpretar demasiado; «bajado» refleja bien el verbo de ponerla hacia abajo al mar.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - en el mar
  - dentro del mar
  lexicon: BDAG
  rationale: «Al mar» es la equivalencia más natural y directa en español para el movimiento hacia el agua.
- source_word: προφάσει
  english_pob_choice: under the pretense
  chosen_spanish: con el pretexto
  alternatives_spanish:
  - bajo el pretexto
  - con apariencia de
  lexicon: BDAG
  rationale: πρόφασις indica una razón fingida o aparente. «Con el pretexto» expresa con claridad la falsedad de la motivación.
- source_word: ὡς
  english_pob_choice: of being about to
  chosen_spanish: de que iban a
  alternatives_spanish:
  - como si fueran a
  - como para
  lexicon: BDAG
  rationale: Aquí ὡς introduce la supuesta intención. En español, «de que iban a» comunica de manera natural la pretensión atribuida.
- source_word: ἐκ πρῴρης
  english_pob_choice: from the bow
  chosen_spanish: desde la proa
  alternatives_spanish:
  - desde el frente
  - desde la popa
  lexicon: BDAG
  rationale: πρῷρα es la proa de una embarcación. «Proa» es el término técnico exacto en español náutico.
- source_word: ἀγκύρας
  english_pob_choice: anchors
  chosen_spanish: las anclas
  alternatives_spanish:
  - anclas
  lexicon: BDAG
  rationale: Plural directo y natural; el artículo definido fluye bien en la frase española.
- source_word: μελλόντων ἐκτείνειν
  english_pob_choice: being about to lay out
  chosen_spanish: iban a echar
  alternatives_spanish:
  - estaban por largar
  - pensaban soltar
  lexicon: BDAG
  rationale: En contexto náutico, ἐκτείνω se refiere a soltar o largar anclas. «Echar las anclas» es una expresión marítima española idiomática y fiel al sentido funcional del griego.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la auditoría inglesa (alta concordancia). No se detectaron revisiones sustantivas; se mantuvo la ambigüedad náutica de σκάφη con una nota alternativa, y se preservó la lectura de πρόφασις/ὡς como pretexto e intención aparente.
  spanish_consistency_notes:
  - Se usó «proa» de manera consistente con el valor náutico de πρῷρα y con la nota alternativa sobre la posible traducción idiomática en español.
  - Se mantuvo «esquife» para σκάφη como término preciso, con alternativa en nota para lectores que prefieran «barca».
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay términos divinos en este versículo.
  - «Echar las anclas» conserva el giro marítimo español y corresponde al valor contextual de ἐκτείνειν en este pasaje.
