translation:
  language: es
  text: Y cuando ya habían comido suficiente[a], comenzaron a aligerar[b] la nave, arrojando el trigo[c] al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuando quedaron saciados de comida' o 'habiendo quedado llenos de comida'.
    reason: lexical_alternative
  - marker: b
    text: O 'estaban aligerando la nave' o simplemente 'aligeraron la nave'; el imperfecto griego puede resaltar el proceso o el inicio de la acción.
    reason: lexical_alternative
  - marker: c
    text: O 'el grano'. La palabra griega puede ser más amplia, pero aquí probablemente se refiere específicamente al trigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κορεσθέντες
  english_pob_choice: when they had eaten enough
  chosen_spanish: cuando se hubieron saciado de comida
  alternatives_spanish:
  - cuando habían comido suficiente
  - después de haberse saciado de comida
  - cuando estuvieron satisfechos con comida
  lexicon: BDAG / sentido de κορέννυμι
  rationale: El participio aoristo pasivo expresa haber quedado satisfechos o llenos. En español, 'saciarse de comida' comunica bien la plenitud resultante de haber comido sin sonar mecánico. Se conserva la relación temporal con la acción principal mediante 'cuando'.
- source_word: τροφῆς
  english_pob_choice: had eaten enough
  chosen_spanish: de comida
  alternatives_spanish:
  - de alimento
  - con alimento
  - de provisiones
  lexicon: BDAG
  rationale: El genitivo especifica en qué fueron saciados. 'De comida' integra la idea de manera natural en español y evita una repetición pesada de 'comer'.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ introduce avance narrativo suave; 'Y' mantiene la continuidad en español de forma natural.
- source_word: ἐκούφιζον
  english_pob_choice: they began to lighten
  chosen_spanish: comenzaron a aligerar
  alternatives_spanish:
  - iban aligerando
  - aligeraban
  - empezaron a aligerar
  lexicon: BDAG
  rationale: El imperfecto puede sugerir proceso o inicio de la acción. 'Comenzaron a aligerar' refleja bien el valor incoativo señalado en la auditoría inglesa y es idiomático en español.
- source_word: τὸ πλοῖον
  english_pob_choice: the ship
  chosen_spanish: la nave
  alternatives_spanish:
  - el barco
  - la embarcación
  - el navío
  lexicon: BDAG
  rationale: En este contexto marítimo, 'nave' es un equivalente natural y digno para πλοῖον. Mantiene la referencia al transporte marítimo sin necesidad de un término más moderno o más coloquial.
- source_word: ἐκβαλλόμενοι
  english_pob_choice: by throwing
  chosen_spanish: arrojando
  alternatives_spanish:
  - echando
  - tirando
  - echándolo por la borda
  lexicon: BDAG
  rationale: El participio presente expresa el medio por el cual aligeraban la nave. 'Arrojando' reproduce ese valor instrumental con claridad. 'Por la borda' no está en el griego y se omite para no añadir precisión no explícita.
- source_word: τὸν σῖτον
  english_pob_choice: the wheat
  chosen_spanish: el trigo
  alternatives_spanish:
  - el grano
  - el cereal
  - el cargamento de grano
  lexicon: BDAG
  rationale: σῖτος puede referirse de manera más amplia a grano, pero en el contexto de esta navegación ya cargada con cereal, la traducción específica 'trigo' sigue la decisión léxica inglesa y conserva la referencia concreta del texto.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - al mar abierto
  - en el mar
  - hacia el mar
  lexicon: BDAG
  rationale: La preposición de destino se expresa naturalmente en español con 'al mar'. 'Mar' es fluido y contextual aquí; mantiene el sentido literal de descarga al agua sin calco rígido.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que prefirió 'when' frente a 'after' para reflejar con más precisión la construcción participial temporal. En español se reprodujo esa relación con 'cuando'. También se mantuvo la elección específica de 'wheat/trigo' frente a un genérico 'grain/grano', conforme al contexto narrativo y al audit trail.
  spanish_consistency_notes:
  - Se conserva el tono narrativo simple y continuo propio de Hechos.
  - Se evitó 'SEÑOR' u այլ capitalización devocional; este versículo no contiene léxico divino.
  - '''Nave'' se eligió por registro bíblico-natural; si en otros pasajes del mismo tramo se usa ''barco'', convendrá revisar consistencia estilística del periplo marítimo.'
  - No se añadieron notas textuales porque el griego y el audit trail no presentan variantes relevantes aquí.
