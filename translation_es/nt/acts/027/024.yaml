translation:
  language: es
  text: 'diciendo[a]: «No temas, Pablo. Es necesario que comparezcas ante César, y he aquí[b] que Dios te ha concedido a todos los que navegan contigo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengas miedo, Pablo.»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios te ha concedido a todos los que navegan contigo», destacando el favor implícito en el verbo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, Pablo
  lexicon: BDAG
  rationale: El imperativo prohibitivo de φοβέομαι con μή pide una exhortación directa. «No temas» conserva la fuerza idiomática natural en español y refleja bien el tono del ángel sin volverlo más explicativo de lo que el griego dice.
- source_word: Παῦλε
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: El vocativo del nombre propio se vierte con la forma usual en español bíblico y eclesial, «Pablo», que es clara y reconocible para el lector hispanohablante.
- source_word: Καίσαρί
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el emperador
  lexicon: BDAG
  rationale: El título/nombre imperial se conserva como «César» para mantener el marco histórico-jurídico del pasaje, en vez de interpretar con «el emperador».
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: Es necesario que
  alternatives_spanish:
  - Debes
  - Tienes que
  - Es preciso que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. En español, «Es necesario que» preserva el valor de obligación/necessidad sin forzar una decisión entre necesidad humana o designio divino, que el contexto de Hechos deja implícita.
- source_word: παραστῆναι
  english_pob_choice: stand before
  chosen_spanish: comparezcas ante
  alternatives_spanish:
  - aparezcas ante
  - te presentes ante
  lexicon: BDAG
  rationale: En un contexto judicial o de audiencia, παραστῆναι significa comparecer ante una autoridad. «Comparezcas ante» comunica esa cita formal en un español natural y suficientemente cercano a la imagen de presentarse de pie ante César.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - fíjate
  lexicon: BDAG
  rationale: Como partícula discursiva de atención, ἰδοὺ se traduce mejor con una forma elevada y breve. «He aquí» conserva el giro formal que el POB inglés reforzó al pasar de «look» a «behold».
- source_word: κεχάρισταί
  english_pob_choice: has granted
  chosen_spanish: ha concedido
  alternatives_spanish:
  - ha dado con gracia
  - ha otorgado
  lexicon: BDAG
  rationale: El perfecto medio de χαρίζομαι implica dar como favor, con matiz de gracia. «Ha concedido» mantiene la idea de don favorable sin sobrecargar el texto con una paráfrasis devocional.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: BDAG
  rationale: El dativo se integra naturalmente en español con el complemento indirecto «te», manteniendo que el don se dirige a Pablo de manera personal.
- source_word: πάντας τοὺς πλέοντας μετὰ σοῦ
  english_pob_choice: all those sailing with you
  chosen_spanish: a todos los que navegan contigo
  alternatives_spanish:
  - a todos los que viajan contigo por mar
  - a todos los que van contigo en la nave
  lexicon: BDAG
  rationale: πλέοντας especifica viaje por mar, no viaje genérico. «Los que navegan contigo» conserva esa especificidad marítima y el alcance colectivo de πάντας.
theological_decisions:
- issue: Alcance de la necesidad expresada por δεῖ
  english_pob_reading: Rendered as 'must' without making the divine source of necessity explicit in the main text.
  chosen_spanish_reading: «Es necesario que» sin explicitar en el cuerpo principal que la necesidad proviene de Dios.
  alternative_spanish_readings:
  - «Debes»
  - «Estás destinado a»
  - «Es la voluntad de Dios que»
  rationale: Hechos suele presentar δεῖ con trasfondo de propósito divino, pero el versículo mismo no lo formula de manera explícita. Mantener «Es necesario que» preserva esa tensión sin resolverla interpretativamente en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma excesiva.
- issue: Valor de concesión favorable en κεχάρισταί
  english_pob_reading: God has granted to you all those sailing with you, highlighting the favor implied in the verb.
  chosen_spanish_reading: «Dios te ha concedido a todos los que navegan contigo» con el matiz de favor implícito en «concedido».
  alternative_spanish_readings:
  - «Dios te ha dado con gracia a todos los que navegan contigo»
  - «Dios te ha otorgado…»
  rationale: El verbo griego comunica un acto benéfico y favorable. «Ha concedido» deja visible el carácter de favor sin añadir una glosa explicativa dentro del texto.
  doctrine_reference: Mantener el matiz de gracia/favor sin convertirlo en paráfrasis doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue el expediente inglés más reciente: se mantiene la forma formal de ἰδοὺ («he aquí») adoptada en la revisión, se conserva la necesidad de δεῖ con un giro español natural («Es necesario que»), y se preserva el matiz de favor de κεχάρισταί con «ha concedido» sin ampliar el texto más allá del griego.'
  spanish_consistency_notes:
  - Se usó «César» para Καίσαρ, de acuerdo con la práctica POB y el contexto romano.
  - Se prefirió «Pablo» en vocativo por inteligibilidad y uso eclesial estándar.
  - Se mantuvo «navegan» para πλέοντας a fin de conservar la especificidad marítima.
  - Se evitó «SEÑOR» o fórmulas de sustitución para θεός; se tradujo simplemente «Dios».
  - La puntuación y las comillas siguen una presentación bíblica en español moderna y digna.
