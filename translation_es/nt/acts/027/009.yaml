revisions:
- from: Como había pasado bastante tiempo y el viaje ya era peligroso[a], porque incluso la Fiesta[b] ya había pasado, Pablo los aconsejaba.
  to: Como había pasado bastante tiempo y el viaje ya era peligroso[a], porque incluso el Ayuno[b] ya había pasado, Pablo les aconsejaba.
  rationale: La revisión corrige el error principal de sentido al restaurar τὴν νηστείαν como «el Ayuno», en línea con el griego y el expediente inglés. También mejora la naturalidad idiomática con «Pablo les aconsejaba» y simplifica la nota léxica para que no afirme una literalidad impropia.
