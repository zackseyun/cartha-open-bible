translation:
  language: es
  text: 'Y, después de orar, dijeron: «Tú, Señor, conocedor de los corazones de todos[b], muestra[a] cuál de estos dos has escogido»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «designa» o «indica» para «muestra»; el verbo puede expresar dar a conocer o señalar públicamente.
    reason: lexical_alternative
  - marker: b
    text: «Señor» puede entenderse dirigido a Dios en general o específicamente a Jesús; el griego no identifica de modo explícito el referente aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: προσευξάμενοι
  english_pob_choice: after praying
  chosen_spanish: después de orar
  alternatives_spanish:
  - habiendo orado
  - orando
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa anterioridad. «Después de orar» suena natural en español y conserva el orden temporal del griego sin volverlo mecánico.
- source_word: Σὺ κύριε
  english_pob_choice: You, Lord
  chosen_spanish: Tú, Señor
  alternatives_spanish:
  - Tú Señor
  - Oh Señor
  lexicon: BDAG
  rationale: El pronombre explícito se conserva con «Tú» para mantener el énfasis del griego. «Señor» reproduce κύριε como vocativo directo con registro bíblico claro y natural en español.
- source_word: καρδιογνῶστα πάντων
  english_pob_choice: knower of the hearts of all
  chosen_spanish: conocedor de los corazones de todos
  alternatives_spanish:
  - conocedor de todos los corazones
  - quien conoce los corazones de todos
  - conocedor de los corazones de todos
  lexicon: BDAG
  rationale: El compuesto καρδιογνώστης se vuelve de manera transparente como una designación descriptiva, sin perder su fuerza. «De los corazones de todos» mantiene πάντων y evita suavizar el carácter de título vocativo.
- source_word: ἀνάδειξον
  english_pob_choice: show
  chosen_spanish: muestra
  alternatives_spanish:
  - indica
  - designa
  - revela
  lexicon: BDAG
  rationale: En este contexto la petición es que Dios haga visible cuál es el elegido. «Muestra» conserva la amplitud del verbo sin forzar la idea de instalación oficial que podría sugerir «designa».
- source_word: ὃν ἐξελέξω
  english_pob_choice: which one ... you have chosen
  chosen_spanish: cuál ... has escogido
  alternatives_spanish:
  - a quién ... has escogido
  - cuál ... escogiste
  - el que ... has escogido
  lexicon: BDAG
  rationale: El relativo y el verbo medio indican una elección ya hecha por el Señor. En español, «cuál ... has escogido» expresa bien la identificación solicitada y conserva la relación con la elección previa.
- source_word: ἐκ τούτων τῶν δύο ἕνα
  english_pob_choice: which one of these two
  chosen_spanish: cuál de estos dos
  alternatives_spanish:
  - uno de estos dos
  - cuál de los dos
  - uno entre estos dos
  lexicon: BDAG
  rationale: La frase delimita la selección dentro de dos candidatos. «De estos dos» evita añadir «hombres» u otro sustantivo no explícito en el griego, a la vez que suena natural en español.
theological_decisions:
- issue: Referente de «Señor» en la oración
  english_pob_reading: Retain the vocative 'Lord' without specifying in translation whether the address is to the Father or to Jesus.
  chosen_spanish_reading: Conservar «Señor» sin resolver si la oración se dirige al Padre o a Jesús.
  alternative_spanish_readings:
  - Señor, referido a Dios en general
  - Señor, referido específicamente a Jesús resucitado
  rationale: El griego sólo dice κύριε, sin identificar explícitamente al referente. La traducción debe preservar esa tensión interpretativa y no decidir doctrinalmente lo que el verso no determina de forma expresa.
  doctrine_reference: Preservar la tensión teológica cuando el texto no la resuelve explícitamente; κύριος se traduce normalmente «Señor».
translation_notes:
  revision_awareness: El texto griego y el contexto de la POB en inglés muestran alto acuerdo y no requieren revisión sustantiva. La única decisión teológica explícita es mantener sin resolver el referente de κύριε. La redacción española sigue la secuencia, el énfasis del pronombre y la fuerza descriptiva de καρδιογνῶστα sin introducir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε como término estable de la POB, sin sustituirlo por una paráfrasis.
  - Se usa «escogido» para ἐξελέξω, coherente con el valor de elección previa documentado en el audit trail.
  - Se evita añadir «hombres» a «estos dos» porque el griego no lo dice explícitamente.
  - La puntuación conserva el carácter de oración directa y la cita en estilo bíblico moderno en español.
