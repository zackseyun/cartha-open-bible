  text: γέγραπται γὰρ ἐν βίβλῳ ψαλμῶν· Γενηθήτω ἡ ἔπαυλις αὐτοῦ ἔρημος καὶ μὴ ἔστω ὁ κατοικῶν ἐν αὐτῇ, καί· Τὴν ἐπισκοπὴν αὐτοῦ ⸀λαβέτω ἕτερος.
base_translation:
  language: en
  yaml_path: translation/nt/acts/001/020.yaml
  text: For it is written in the book of Psalms[a], ‘Let his dwelling place become desolate, and let there be no one dwelling in it,’ and[c][b], ‘Let another take his office.’
  footnotes:
  - marker: a
    text: Or 'homestead' or 'habitation' for 'dwelling' (ἔπαυλις).
    reason: lexical_alternative
  - marker: b
    text: Or 'Let no one dwell in it' or 'let there be no inhabitant in it.'
    reason: lexical_alternative
  - marker: c
    text: '''Office'' translates ἐπισκοπή; alternatively ''overseership.'' Older English versions often have ''bishopric,'' but that may suggest a later technical church office not required by the context.'
    reason: alternative_reading
