translation:
  language: es
  text: 'Porque está escrito en el libro de los Salmos: «Que su morada[a] quede desolada, y que no haya quien habite en ella[b]»; y: «Que otro tome su cargo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vivienda», «habitación» o «estancia» para ἔπαυλις. «Morada» mantiene un registro bíblico natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «que no haya nadie que habite en ella» o «que no haya habitante en ella». La frase conserva el paralelismo con el participio κατοικῶν.
    reason: lexical_alternative
  - marker: c
    text: «Cargo» traduce ἐπισκοπή; alternativamente, «supervisión» o «función de supervisión». Versiones más antiguas a menudo tienen «episcopado», pero eso puede sugerir un oficio eclesiástico técnico posterior que el contexto no exige.
    reason: alternative_reading
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: El perfecto pasivo funciona como fórmula de cita escritural. «Está escrito» conserva el valor vigente de la cita y suena natural en español bíblico contemporáneo sin mecanizar el inglés.
- source_word: βίβλῳ ψαλμῶν
  english_pob_choice: the book of Psalms
  chosen_spanish: el libro de los Salmos
  alternatives_spanish:
  - el rollo de los Salmos
  - el libro de los Salmos
  lexicon: BDAG
  rationale: La construcción identifica la fuente escritural. «Libro de los Salmos» es claro, natural y fiel al referente canónico.
- source_word: ἔπαυλις
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - vivienda
  - habitación
  - estancia
  lexicon: BDAG
  rationale: El término puede referirse a una residencia o habitación. «Morada» comunica bien el sentido de lugar habitado y mantiene un registro bíblico digno en español.
- source_word: ἔρημος
  english_pob_choice: desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - desierta
  - abandonada
  lexicon: BDAG
  rationale: En el contexto del Salmo citado, describe un lugar dejado sin habitantes. «Desolada» preserva la fuerza solemne y escritural del juicio implícito.
- source_word: μὴ ἔστω ὁ κατοικῶν ἐν αὐτῇ
  english_pob_choice: let there be no one dwelling in it
  chosen_spanish: que no haya quien habite en ella
  alternatives_spanish:
  - que no haya habitante en ella
  - que no viva nadie en ella
  lexicon: BDAG
  rationale: La negación más el participio sustantivado expresan ausencia de ocupante. «Quien habite» mantiene la referencia a κατοικῶν sin sonar forzado y conserva el paralelismo poético.
- source_word: ἐπισκοπή
  english_pob_choice: office
  chosen_spanish: cargo
  alternatives_spanish:
  - oficio
  - posición de supervisión
  - episcopado
  lexicon: BDAG
  rationale: En este contexto alude al encargo o función que Judas ocupaba entre los apóstoles. «Cargo» es una forma natural y suficientemente formal en español, sin importar una estructura eclesiástica posterior; se preservan alternativas más literales en la nota.
- source_word: λαβέτω ἕτερος
  english_pob_choice: Let another take
  chosen_spanish: Que otro tome
  alternatives_spanish:
  - Que otro reciba
  - Que otro asuma
  lexicon: BDAG
  rationale: El imperativo jussivo se expresa con «Que otro tome», que conserva la cadencia de la cita y la idea de sucesión o reemplazo.
theological_decisions:
- issue: Alcance de ἐπισκοπή en un contexto apostólico
  english_pob_reading: office
  chosen_spanish_reading: cargo
  alternative_spanish_readings:
  - oficio
  - posición de supervisión
  - episcopado
  rationale: El texto aplica el Salmo al puesto vacante de Judas. «Cargo» evita proyectar categorías eclesiásticas posteriores, pero mantiene la idea de una función real y transferible dentro del grupo apostólico. Se preservan alternativas cercanas para auditoría lexical.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Imprecación/cita poética en la fórmula del Salmo
  english_pob_reading: Let his dwelling place become desolate
  chosen_spanish_reading: Que su morada quede desolada
  alternative_spanish_readings:
  - Que su morada se vuelva desolada
  - Que su morada quede abandonada
  rationale: La frase reproduce el tono de cita escritural y el matiz de juicio del salmo sin suavizarlo ni exagerarlo. «Quede desolada» conserva el valor de resultado pedido por el imperativo jussivo.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del POB en inglés, que afinó ἔπαυλις como «dwelling place» y κατοικῶν como «dwelling» para mayor correspondencia léxica. En español, «morada» y «habite» buscan el mismo equilibrio entre precisión y naturalidad, y «cargo» refleja la decisión de mantener ἐπισκοπή como función sin introducir un tecnicismo eclesial posterior.
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se evitó «SEÑOR» para no ocultar el nombre divino, pero este verso es una cita salmódica sin una decisión nueva sobre el tetragrámaton.
  - «Cargo» se eligió como equivalente contextual de ἐπισκοπή, en línea con el rechazo del tecnicismo «obispado» cuando no lo exige el contexto.
  - Se preservó la cadencia de cita con comillas españolas y dos puntos, compatible con el estilo bíblico moderno en español.
