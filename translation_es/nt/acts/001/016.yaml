revisions:
- from: Hombres[a], hermanos, era necesario que la Escritura se cumpliera, la cual el Espíritu Santo habló de antemano por boca de David, acerca de Judas, que llegó a ser guía de los que arrestaron a Jesús[c][b].
  to: Hombres[a], hermanos, era necesario que se cumpliera la Escritura, la cual el Espíritu Santo anunció de antemano por boca de David acerca de Judas, que llegó a ser guía de los que prendieron a Jesús[b][c].
  rationale: 'Se ajusta la cláusula principal para lograr español natural sin perder la estructura del original: ''anunció de antemano'' conserva el sentido de προεῖπε y mantiene al Espíritu Santo como sujeto. También se mejora la fluidez de ''que se cumpliera la Escritura'' y se adopta ''prendieron'' como opción principal por su buen encaje bíblico, conservando la alternativa ''arrestaron'' en nota. Se mantienen las notas necesarias con marcadores únicos y anclados en el texto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:07:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: mantiene el doble vocativo, la necesidad impersonal, el cumplimiento de la Escritura, la agencia del Espíritu Santo por medio de David, y la referencia a Judas como guía de los que prendieron/arrestaron a Jesús. Sin embargo, hay un problema importante de naturalidad/fidelidad en ''la cual el Espíritu Santo habló de antemano'', porque en español ''hablar una Escritura'' suena incorrecto; debe reformularse para conservar al Espíritu como sujeto sin violentar la sintaxis, p. ej. ''la cual el Espíritu Santo anunció de antemano''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero presenta una construcción poco idiomática en 'la cual el Espíritu Santo habló de antemano'. Además, 'Hombres, hermanos' es comprensible pero algo tosco; 'Varones, hermanos' suena más bíblico-tradicional, aunque 'Hombres' puede mantenerse con nota. Conviene también simplificar la puntuación y reemplazar 'arrestaron' por 'prendieron' o 'apresaron' si se desea un registro más bíblico; no obstante, 'arrestaron' no es inexacto.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: ''Espíritu Santo'', ''Jesús'' y ''Escritura'' están bien. No aparece vocabulario sensible adicional. La decisión sobre ''Hombres'' frente a ''Varones'' es estilística más que glosarial.'
  issues:
  - severity: high
    issue: 'Construcción no idiomática: ''la cual el Espíritu Santo habló de antemano'''
    rationale: Aunque el griego tiene al Espíritu Santo como sujeto de προεῖπε, en español no se dice naturalmente que alguien 'hable' una Escritura. 'Anunció de antemano' o 'dijo de antemano' preserva la agencia divina y mejora la fidelidad comunicativa.
  - severity: medium
    issue: Vocativo 'Hombres, hermanos' suena rígido en español bíblico
    rationale: Es formalmente fiel a Ἄνδρες ἀδελφοί, pero en español eclesial 'Varones, hermanos' o 'Hermanos, varones' resulta más natural. Aun así, puede mantenerse 'Hombres' con nota explicativa si se prioriza transparencia léxica.
  - severity: low
    issue: '''arrestaron'' es correcto pero menos bíblico-literario que ''prendieron'''
    rationale: El griego συλλαβοῦσιν admite 'arrestaron' o 'prendieron'. En un registro bíblico digno, 'prendieron' encaja muy bien y además ya está preservado en la nota como alternativa.
