translation:
  language: es
  text: Hombres[a], hermanos, era necesario que se cumpliera la Escritura, la cual el Espíritu Santo anunció de antemano por boca de David acerca de Judas, que llegó a ser guía de los que prendieron a Jesús[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'varones'. El griego usa un vocativo masculino explícito, además de 'hermanos'.
    reason: lexical_alternative
  - marker: b
    text: O 'de los que arrestaron a Jesús'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'por boca de David'; es un modismo para hablar por medio de un agente humano.
    reason: cultural_note
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Men, brothers
  chosen_spanish: Hombres, hermanos
  alternatives_spanish:
  - Hermanos
  - Hermanos y hermanas
  - Hombres y hermanos
  lexicon: BDAG
  rationale: Conservo ambos vocativos como en el griego. 'Hombres' traduce ἄνδρες y 'hermanos' traduce ἀδελφοί sin reducir el doble llamado a un solo término.
- source_word: ἔδει
  english_pob_choice: it was necessary
  chosen_spanish: era necesario
  alternatives_spanish:
  - tenía que ser
  - estaba destinado a
  lexicon: BDAG
  rationale: '''Era necesario'' expresa la necesidad impersonal sin añadir una explicación que el texto no explicita.'
- source_word: πληρωθῆναι
  english_pob_choice: to be fulfilled
  chosen_spanish: que ... se cumpliera
  alternatives_spanish:
  - que ... se completara
  - que ... llegara a su cumplimiento
  lexicon: BDAG
  rationale: En lenguaje bíblico español, 'cumplirse' comunica bien el valor de cumplimiento de la Escritura y mantiene la pasiva del griego.
- source_word: γραφὴν
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - el escrito
  - el pasaje de la Escritura
  lexicon: BDAG
  rationale: Aquí γραφή se refiere a la Escritura sagrada, no a un escrito cualquiera.
- source_word: προεῖπε
  english_pob_choice: spoke beforehand
  chosen_spanish: habló de antemano
  alternatives_spanish:
  - predijo
  - dijo de antemano
  lexicon: BDAG
  rationale: '''Habló de antemano'' conserva el verbo de habla y la referencia a la actividad profética del Espíritu sin volverlo más técnico de lo que exige el griego.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo de Dios
  lexicon: BDAG
  rationale: Es la forma normal, clara y fiel en español para la persona divina nombrada en el texto.
- source_word: διὰ στόματος Δαυὶδ
  english_pob_choice: through the mouth of David
  chosen_spanish: por boca de David
  alternatives_spanish:
  - por la boca de David
  - por medio de David
  lexicon: BDAG
  rationale: '''Por boca de David'' preserva el idiomatismo semítico del griego y sugiere mediación humana en la palabra inspirada.'
- source_word: περὶ Ἰούδα
  english_pob_choice: concerning Judas
  chosen_spanish: acerca de Judas
  alternatives_spanish:
  - con respecto a Judas
  - sobre Judas
  lexicon: BDAG
  rationale: '''Acerca de'' es natural en español y mantiene el alcance temático de περί con genitivo.'
- source_word: τοῦ γενομένου ὁδηγοῦ
  english_pob_choice: who became a guide
  chosen_spanish: que llegó a ser guía
  alternatives_spanish:
  - que se hizo guía
  - que vino a ser guía
  lexicon: BDAG
  rationale: '''Llegó a ser'' refleja bien el matiz de γίνομαι y evita sobrecargar con una expresión más interpretativa. ''Guía'' conserva el sustantivo sin añadir artículo innecesario.'
- source_word: τοῖς συλλαβοῦσιν Ἰησοῦν
  english_pob_choice: to those who arrested Jesus
  chosen_spanish: de los que arrestaron a Jesús
  alternatives_spanish:
  - de los que prendieron a Jesús
  - de los que apresaron a Jesús
  lexicon: BDAG
  rationale: '''Arrestaron'' transmite el sentido contextual de συλλαμβάνω en este pasaje. El genitivo participial se vierte naturalmente con ''de los que'' dentro de la frase explicativa.'
theological_decisions:
- issue: Necesidad de cumplimiento de la Escritura
  english_pob_reading: Rendered ἔδει as 'it was necessary' without specifying more than the text states.
  chosen_spanish_reading: '''era necesario'' sin añadir una causa determinista explícita'
  alternative_spanish_readings:
  - '''tenía que suceder'' con tono más fuerte'
  - '''estaba predeterminado'''
  rationale: El versículo afirma necesidad y cumplimiento, pero no desarrolla el mecanismo. La redacción conserva esa tensión sin resolverla por cuenta propia.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica del texto.'
- issue: Agencia divina y humana en la inspiración
  english_pob_reading: '''which the Holy Spirit spoke beforehand through the mouth of David.'''
  chosen_spanish_reading: '''la cual el Espíritu Santo habló de antemano por boca de David'''
  alternative_spanish_readings:
  - '''que David habló por el Espíritu Santo'''
  - '''que el Espíritu inspiró a David a escribir'''
  rationale: La forma elegida mantiene al Espíritu Santo como sujeto que habla y a David como agente humano mediado, tal como lo presenta el griego.
  doctrine_reference: Affirmations; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El control de revisión indicó alta concordancia y sin cambios necesarios en la última pasada; por eso el borrador sigue de cerca la lectura auditada en inglés, ajustando solo la formulación al español natural.
  spanish_consistency_notes:
  - Se conserva 'Espíritu Santo' de forma consistente con la terminología del proyecto.
  - '''Escritura'' se usa en singular, en línea con el valor colectivo sagrado del griego.'
  - '''Jesús'' se mantiene sin sustitución litúrgica.'
  - El orden de los complementos intenta reflejar la estructura del griego sin sonar forzado en español.
