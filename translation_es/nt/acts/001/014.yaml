translation:
  language: es
  text: Todos ellos se dedicaban constantemente, de común acuerdo, a la oración[a], junto con las mujeres[b], y María, la madre de Jesús, y con sus hermanos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un mismo sentir» o «unánimemente». El griego destaca tanto la unidad de propósito como el reunirse de manera concertada.
    reason: lexical_alternative
  - marker: b
    text: O «con mujeres». El griego no lleva artículo, pero en español la expresión suele entenderse como un grupo conocido dentro del contexto narrativo.
    reason: lexical_alternative
  - marker: c
    text: «Hermanos» traduce el griego ἀδελφοί. Algunos lo entienden en un sentido más amplio como parientes cercanos; el texto no especifica más aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι πάντες
  english_pob_choice: All of these
  chosen_spanish: Todos éstos
  alternatives_spanish:
  - Estos todos
  - Todos éstos
  lexicon: BDAG
  rationale: «Todos éstos» conserva la fuerza demostrativa de οὗτοι y la totalidad de πάντες de forma natural en español, sin calco rígido.
- source_word: ἦσαν προσκαρτεροῦντες
  english_pob_choice: were continually devoting themselves
  chosen_spanish: perseveraban
  alternatives_spanish:
  - se dedicaban continuamente
  - persistían
  lexicon: BDAG
  rationale: El perífrasis imperfectiva expresa una acción continua y sostenida. «Perseveraban» comunica bien la persistencia devota sin sonar forzado; el adverbio de continuidad se sobreentiende en el contexto.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: unánimes
  alternatives_spanish:
  - de común acuerdo
  - con un mismo sentir
  - unidos
  lexicon: BDAG
  rationale: «Unánimes» reproduce la idea de unidad de propósito y mente compartida que el inglés POB preserva con «with one accord». Es más idiomático que un calco como «con un solo ánimo».
- source_word: τῇ προσευχῇ
  english_pob_choice: to prayer
  chosen_spanish: en la oración
  alternatives_spanish:
  - a la oración
  - en oración
  lexicon: BDAG
  rationale: Con προσκαρτερέω, el dativo funciona naturalmente como ámbito/objeto de dedicación. «En la oración» mantiene la referencia al acto de orar sin añadir un matiz demasiado técnico; «a la oración» también sería posible, pero suena menos natural en español aquí.
- source_word: σὺν γυναιξίν
  english_pob_choice: together with the women
  chosen_spanish: junto con las mujeres
  alternatives_spanish:
  - con las mujeres
  - al lado de las mujeres
  lexicon: BDAG
  rationale: «Junto con» refleja σύν y mantiene la idea de asociación dentro del grupo reunido. Aunque el griego no lleva artículo, el español lo añade naturalmente para un grupo conocido por el contexto.
- source_word: Μαριὰμ τῇ μητρὶ τοῦ Ἰησοῦ
  english_pob_choice: Mary the mother of Jesus
  chosen_spanish: María, la madre de Jesús
  alternatives_spanish:
  - Mariam, la madre de Jesús
  lexicon: BDAG
  rationale: «María» es la forma española estándar y clara para el nombre propio. El apuesto explicativo se conserva sin adornos adicionales.
- source_word: σὺν τοῖς ἀδελφοῖς αὐτοῦ
  english_pob_choice: and with his brothers
  chosen_spanish: y con sus hermanos
  alternatives_spanish:
  - y con sus hermanos y hermanas
  - y con sus parientes cercanos
  lexicon: BDAG
  rationale: «Hermanos» mantiene el valor léxico de ἀδελφοί y evita expandir el término más allá de lo que el texto dice. En español, «hermanos» es preciso y natural; no se resuelve aquí la discusión sobre parentesco exacto.
theological_decisions:
- issue: Referencia de los ἀδελφοί de Jesús
  english_pob_reading: Rendered as 'his brothers' without resolving broader doctrinal debates about whether these were biological brothers, stepbrothers, or close kin.
  chosen_spanish_reading: Se traduce «sus hermanos» sin decidir entre hermanos biológicos, hermanastros o parientes cercanos.
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - sus parientes cercanos
  rationale: El texto griego usa ἀδελφοί, cuyo sentido básico es «hermanos». La traducción mantiene esa forma y conserva la tensión interpretativa en lugar de imponer una conclusión doctrinal no explicitada por el pasaje.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral
- issue: Alcance de ὁμοθυμαδόν
  english_pob_reading: with one accord
  chosen_spanish_reading: unánimes
  alternative_spanish_readings:
  - de común acuerdo
  - con un mismo sentir
  rationale: La elección conserva la unidad interna y la disposición compartida del grupo, que en Lucas-Hechos es un rasgo teológico y narrativo recurrente.
  doctrine_reference: Lucas-Hechos; unidad de la comunidad; lectura narrativa
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se preserva la continuidad aspectual, la unidad expresada por ὁμοθυμαδόν, la referencia al grupo de mujeres y la ambigüedad sobre ἀδελφοί sin resolverla. No hubo revisiones aplicadas respecto del contexto fuente proporcionado.'
  spanish_consistency_notes:
  - Se usa «María» como forma española estándar del nombre propio.
  - Se mantiene «hermanos» para ἀδελφοί por fidelidad léxica y para no cerrar la tensión interpretativa.
  - «Unánimes» se reserva aquí para ὁμοθυμαδόν, evitando variaciones innecesarias en este registro.
  - La puntuación conserva el paralelismo del original y el ritmo enumerativo de la frase.
