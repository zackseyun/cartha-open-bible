  text: οὗτοι πάντες ἦσαν προσκαρτεροῦντες ὁμοθυμαδὸν τῇ ⸀προσευχῇ σὺν γυναιξὶν καὶ ⸀Μαριὰμ τῇ μητρὶ τοῦ Ἰησοῦ καὶ ⸀σὺν τοῖς ἀδελφοῖς αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/001/014.yaml
  text: All of these were continually devoting themselves with one accord to prayer[a], together with the women, and Mary the mother of Jesus[c][b], and with his brothers.
  footnotes:
  - marker: a
    text: Or 'unitedly' or 'with one mind'; the Greek emphasizes shared purpose as well as physical gathering.
    reason: lexical_alternative
  - marker: b
    text: Or 'with women.' The Greek lacks the article, but the phrase likely refers to a known group of women associated with the disciples.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' translates the Greek word adelphoi. Some understand this more broadly as close relatives or kin; the text itself does not specify further here.'
    reason: alternative_reading
