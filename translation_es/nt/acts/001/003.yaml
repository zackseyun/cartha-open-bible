    issue: Las notas al pie están mal ancladas
    rationale: El marcador [a] aparece en 'vivo', pero la nota [a] explica 'con muchas pruebas'; el marcador [b] aparece en 'pruebas', pero la nota [b] explica 'durante cuarenta días'. Esto viola la disciplina requerida de que cada nota tenga su marcador exacto en la frase correspondiente.
  - severity: medium
    issue: '''A estos también se les'' es menos natural que ''A ellos también se les'''
    rationale: Aunque no es incorrecto, 'a estos' suena más señalativo y menos fluido en español corriente. Dado que el inglés POB auditado optó por 'To them' en vez de 'To these men', 'A ellos' refleja mejor la referencia anafórica sin rigidez innecesaria.
  - severity: low
    issue: '''apareciéndoseles'' es estilísticamente pesado'
    rationale: La forma enclítica es gramatical, pero para español ampliamente legible 'apareciéndose a ellos' resulta más natural y mantiene el valor de ὀπτανόμενος αὐτοῖς.
  revised_spanish_text: A ellos también se les presentó vivo, después de haber padecido, con muchas pruebas[a], apareciéndose a ellos durante cuarenta días[b] y hablando acerca del reino de Dios.
