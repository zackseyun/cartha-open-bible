translation:
  language: es
  text: A ellos también se les presentó vivo, después de haber padecido, con muchas pruebas[a], apareciéndose a ellos durante cuarenta días[b] y hablando acerca del reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "por muchas pruebas", "con muchas evidencias" o "con muchas pruebas convincentes". El término griego designa evidencia que establece certeza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a lo largo de cuarenta días" o "por cuarenta días". La frase indica apariciones distribuidas a lo largo de ese periodo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  english_pob_choice: to them
  chosen_spanish: a estos también se les
  alternatives_spanish:
  - a ellos también se les
  - a los cuales también se les
  lexicon: BDAG
  rationale: El dativo relativo apunta a los apóstoles del contexto inmediato. En español, 'a estos' conserva la referencia anterior sin añadir 'hombres', que no está explícito en el griego, y el clítico 'se les' reproduce con naturalidad la relación dativa.
- source_word: παρέστησεν ἑαυτὸν
  english_pob_choice: he presented himself
  chosen_spanish: se les presentó
  alternatives_spanish:
  - se mostró
  - se hizo visible
  lexicon: BDAG
  rationale: La construcción con reflexivo expresa la auto-presentación de Jesús. 'Se les presentó' mantiene el sentido formal de presentarse/mostrarse sin imponer una matización interpretativa adicional.
- source_word: ζῶντα
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - viviente
  lexicon: BDAG
  rationale: En contexto de resurrección, 'vivo' es el equivalente natural y claro en español, y preserva la afirmación directa del estado posterior al sufrimiento.
- source_word: μετὰ τὸ παθεῖν αὐτόν
  english_pob_choice: after he had suffered
  chosen_spanish: después de haber padecido
  alternatives_spanish:
  - después de sufrir
  - tras haber padecido
  lexicon: BDAG
  rationale: El infinitivo articular con μετά es temporal; 'después de haber padecido' conserva el carácter de acción completada antes de las apariciones. 'Padecer' es más preciso que un simple 'sufrir' para el contexto de la pasión.
- source_word: ἐν πολλοῖς τεκμηρίοις
  english_pob_choice: by many proofs
  chosen_spanish: con muchas pruebas
  alternatives_spanish:
  - por muchas pruebas
  - con muchas evidencias
  - con muchas pruebas convincentes
  lexicon: BDAG
  rationale: τεκμήριον expresa prueba/evidencia que establece certeza. 'Con muchas pruebas' mantiene la fuerza probatoria y permite en español una lectura natural; no se añade 'convincente' en el texto principal porque sería una ampliación interpretativa.
- source_word: δι’ ἡμερῶν τεσσεράκοντα
  english_pob_choice: over forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  - a lo largo de cuarenta días
  lexicon: BDAG
  rationale: La διά con genitivo indica extensión temporal a lo largo de un periodo. 'Durante cuarenta días' es la forma española más natural para expresar apariciones distribuidas en ese lapso.
- source_word: ὀπτανόμενος αὐτοῖς
  english_pob_choice: appearing to them
  chosen_spanish: apareciéndoseles
  alternatives_spanish:
  - apareciendo a ellos
  - siéndoles visible
  lexicon: BDAG
  rationale: El participio medio/pasivo de ὀπτάνομαι se usa en contextos de resurrección con el sentido de 'aparecer'. 'Apareciéndoseles' conserva el valor verbal y la relación pronominal del dativo.
- source_word: λέγων τὰ περὶ τῆς βασιλείας τοῦ θεοῦ
  english_pob_choice: speaking about the kingdom of God
  chosen_spanish: hablando acerca del reino de Dios
  alternatives_spanish:
  - diciendo las cosas acerca del reino de Dios
  - hablando sobre el reino de Dios
  lexicon: BDAG
  rationale: El giro τὰ περὶ + genitivo significa 'las cosas concernientes a'. 'Hablando acerca de' reproduce el contenido sin forzar una construcción más pesada.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Yahvé
  lexicon: BDAG
  rationale: '''Reino de Dios'' es la forma establecida y fiel al sentido de βασιλεία en este contexto, preservando tanto el aspecto de dominio real como el de esfera/regla divina.'
theological_decisions:
- issue: Lenguaje de resurrección y evidencia
  english_pob_reading: The verse states plainly that Jesus presented himself alive after suffering, by many proofs.
  chosen_spanish_reading: El texto afirma de manera directa que Jesús se les presentó vivo después de haber padecido, con muchas pruebas.
  alternative_spanish_readings:
  - Jesús se mostró vivo tras sufrir, con muchas evidencias
  - Jesús se les hizo visible vivo, con pruebas incontables
  rationale: La redacción conserva la afirmación central de resurrección/aparición y la fuerza evidencial de τεκμήριοις sin recurrir a lenguaje arcaico ni a intensificaciones no presentes en el griego.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 6
- issue: Referente masculino implícito de οἷς
  english_pob_reading: to them
  chosen_spanish_reading: a estos también se les
  alternative_spanish_readings:
  - a ellos también se les
  - a estos hombres también se les
  rationale: El antecedente inmediato son los apóstoles varones del contexto, pero el griego no añade un sustantivo masculino explícito en este versículo. La solución española mantiene la referencia contextual sin introducir una palabra no expresada en el original.
  doctrine_reference: Filosofía de traducción §4
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del POB inglés, que prefirió 'to them' frente a 'to these men' para ajustarse más de cerca a οἷς; en español se evita añadir 'hombres' de forma explícita y se conserva la referencia contextual con 'a estos'. También se mantiene la lectura revisada de una secuencia temporal de apariciones distribuidas durante cuarenta días, con la misma fuerza evidencial de 'many proofs'.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se mantiene 'reino de Dios' en vez de 'reinado de Dios' porque el contexto de Hechos conserva el sintagma tradicional sin perder la noción de gobierno.
  - Se traduce πνεῦμα no aplica en este versículo.
  - Se evita 'Cristo' y no hay necesidad de decisión terminológica adicional sobre Χριστός en este texto.
  - Las notas a y b siguen el orden de alternativas preservadas en el audit trail inglés y se anclan en 'vivo[a]' y 'pruebas[b]' respectivamente.
