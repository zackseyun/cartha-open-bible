translation:
  language: es
  text: para tomar el lugar de este ministerio y apostolado, de la cual Judas se desvió[a] para ir a su propio lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se apartó» o «se desvió»; el verbo griego puede indicar desviación o abandono del encargo.
    reason: lexical_alternative
  - marker: b
    text: «Su propio lugar» puede referirse simplemente al lugar que pertenecía a Judas, o más enfáticamente al lugar de juicio que le correspondía.
    reason: alternative_reading
lexical_decisions:
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - recibir
  - asumir
  lexicon: BDAG
  rationale: En este contexto el infinitivo expresa la finalidad de ocupar una función vacante; "tomar" comunica de manera natural la idea de asumir un encargo sin perder el matiz básico de λαμβάνω.
- source_word: τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la posición
  - el cargo
  lexicon: BDAG
  rationale: τόπος es literalmente "lugar". Mantener "lugar" preserva la imagen repetida después en "su propio lugar" y deja visible el contraste textual.
- source_word: διακονίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  lexicon: BDAG
  rationale: En un contexto eclesial y apostólico, "ministerio" es la equivalencia española más clara y fiel para διακονία sin diluir su carácter de encargo.
- source_word: ἀποστολῆς
  english_pob_choice: apostleship
  chosen_spanish: apostolado
  alternatives_spanish:
  - oficio apostólico
  - misión
  lexicon: BDAG
  rationale: ἀποστολή aquí designa la función/encargo apostólico. "Apostolado" conserva el valor de oficio o condición apostólica en un español natural y readable.
- source_word: ἀφ’ ἧς
  english_pob_choice: from which
  chosen_spanish: del cual
  alternatives_spanish:
  - de la cual
  - de quien
  lexicon: BDAG
  rationale: El relativo retoma el conjunto "ministerio y apostolado". "Del cual" suena natural en español y conserva la referencia al ámbito del que Judas se apartó.
- source_word: παρέβη
  english_pob_choice: turned aside
  chosen_spanish: se desvió
  alternatives_spanish:
  - se apartó
  - se alejó
  - transgredió
  lexicon: BDAG
  rationale: παραβαίνω puede implicar desviarse o apartarse. "Se desvió" mantiene la idea de desviación o abandono sin cargar el texto con una formulación doctrinal más fuerte que la del griego.
- source_word: πορευθῆναι
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para partir
  - para dirigirse
  lexicon: BDAG
  rationale: El infinitivo expresa resultado o finalidad. "Para ir" es simple, directo y fiel al movimiento básico de πορεύομαι.
- source_word: εἰς τὸν τόπον τὸν ἴδιον
  english_pob_choice: to his own place
  chosen_spanish: a su propio lugar
  alternatives_spanish:
  - al lugar que le pertenecía
  - a su lugar propio
  lexicon: BDAG
  rationale: La expresión es deliberadamente breve y ambigua. "Su propio lugar" conserva la tensión interpretativa del griego y evita resolverla en el texto principal.
theological_decisions:
- issue: Sentido de "su propio lugar" respecto al destino de Judas
  english_pob_reading: Retain the ambiguous wording 'his own place' in the main text.
  chosen_spanish_reading: Conservar "su propio lugar" en el texto principal.
  alternative_spanish_readings:
  - referencia a la tumba o muerte
  - referencia al juicio
  - referencia simplemente al lugar que le correspondía
  rationale: El griego no define explícitamente el destino. La traducción conserva la ambigüedad para no imponer una conclusión doctrinal que el versículo no enuncia de forma directa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se corrigió el anclaje de notas para que cada marcador aparezca exactamente en el texto español y se mantuvo la ambigüedad interpretativa del final.
  spanish_consistency_notes:
  - Se prefirió "ministerio" para διακονία y "apostolado" para ἀποστολή, manteniendo la distinción léxica.
  - Se evitó "Señor" o cualquier máscara terminológica no presente en el verso.
  - La secuencia "para tomar..." refleja la finalidad del infinitivo inicial sin sobreexplicación.
  - '"Su propio lugar" conserva el paralelismo con "el lugar" y la carga sobria del pasaje.'
