translation:
  language: es
  text: Y echaron suertes por ellos, y la suerte cayó sobre Matías[a], y fue contado con los once apóstoles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''la suerte cayó en Matías''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''fue numerado con los once apóstoles'' o ''fue añadido a los once apóstoles''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν κλήρους αὐτοῖς
  english_pob_choice: they cast lots for them
  chosen_spanish: echaron suertes entre ellos
  alternatives_spanish:
  - les dieron suertes
  - asignaron suertes entre ellos
  lexicon: BDAG
  rationale: El griego literalmente dice 'dieron suertes', pero en este contexto narrativo la expresión comunica el acto de sortear para elegir. 'Echaron suertes' es la forma natural y fiel en español para el procedimiento descrito, sin perder el sentido concreto del acto.
- source_word: κλήρους / ὁ κλῆρος
  english_pob_choice: lots / the lot
  chosen_spanish: suertes / la suerte
  alternatives_spanish:
  - lotes / el lote
  - porciones / la porción
  lexicon: BDAG
  rationale: Aquí κλῆρος se refiere a una suerte usada para selección, no a una herencia. 'Suertes' y 'la suerte' conservan el valor idiomático y el procedimiento de sorteo.
- source_word: ἔπεσεν ὁ κλῆρος ἐπὶ Μαθθίαν
  english_pob_choice: the lot fell to Matthias
  chosen_spanish: la suerte cayó sobre Matías
  alternatives_spanish:
  - la suerte cayó en Matías
  - la suerte recayó sobre Matías
  lexicon: BDAG
  rationale: '''Cayó sobre'' reproduce de manera natural la imagen del griego sin forzar un giro mecánico. Mantiene la metáfora del resultado del sorteo y corresponde bien al uso castellano.'
- source_word: Μαθθίαν
  english_pob_choice: Matthias
  chosen_spanish: Matías
  alternatives_spanish:
  - Matthías
  lexicon: transliteración estándar
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: συγκατεψηφίσθη
  english_pob_choice: was counted with
  chosen_spanish: fue contado con
  alternatives_spanish:
  - fue incluido entre
  - fue añadido a
  - fue numerado con
  lexicon: BDAG
  rationale: El verbo expresa ser contado conjuntamente con un grupo. 'Fue contado con' sigue de cerca el valor lexical sin añadir más que el texto afirma. 'Fue incluido entre' o 'fue añadido a' suavizan o interpretan más de lo necesario.
- source_word: μετὰ τῶν ἕνδεκα ἀποστόλων
  english_pob_choice: with the eleven apostles
  chosen_spanish: con los once apóstoles
  alternatives_spanish:
  - entre los once apóstoles
  lexicon: BDAG
  rationale: μετά con genitivo significa 'con'. 'Con los once apóstoles' preserva la relación de asociación; 'entre' sugeriría pertenencia interna pero no es la opción más directa del griego.
theological_decisions:
- issue: Si el verbo final debe sugerir una incorporación más fuerte que la mera contabilidad narrativa
  english_pob_reading: was counted with the eleven apostles
  chosen_spanish_reading: fue contado con los once apóstoles
  alternative_spanish_readings:
  - fue añadido a los once apóstoles
  - fue inscrito entre los once apóstoles
  - fue numerado entre los once apóstoles
  rationale: La traducción mantiene la afirmación narrativa sin convertirla en una declaración eclesiológica más fuerte de lo que exige el griego. Se preserva la tensión textual entre el acto de sorteo y el reconocimiento del grupo.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría inglesa: no se requieren revisiones adicionales; se conserva el valor idiomático de sorteo y la formulación prudente del verbo final.'
  spanish_consistency_notes:
  - Se mantiene 'Matías' como forma española estándar del nombre.
  - '''Apóstoles'' se escribe en minúscula porque no inicia oración y funciona como nombre común en el grupo referido.'
  - '''Suertes'' traduce el procedimiento narrativo de selección, evitando términos más técnicos o eclesiásticos que no están en el griego.'
