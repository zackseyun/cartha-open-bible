translation:
  language: es
  text: Y mientras ellos miraban fijamente hacia el cielo[a], mientras él se iba, he aquí, dos hombres estaban junto a ellos con vestiduras blancas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el cielo visible». El griego οὐρανός puede significar «cielo» o «cielo visible/firmamento»; en este contexto de la ascensión se eligió «cielo».
    reason: lexical_alternative
  - marker: b
    text: O «con ropa blanca» o «con prendas blancas». El término griego se refiere de manera amplia a la vestimenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίζοντες
  english_pob_choice: gazing intently
  chosen_spanish: miraban fijamente
  alternatives_spanish:
  - contemplaban fijamente
  - miraban atentamente
  lexicon: BDAG
  rationale: El participio expresa una mirada sostenida y concentrada. «Miraban fijamente» conserva esa intensidad de forma natural en español sin añadir matices ajenos al griego.
- source_word: οὐρανόν
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo
  - cielos
  lexicon: BDAG
  rationale: En este contexto de la ascensión, el español «cielo» comunica adecuadamente la dirección superior y puede abarcar el sentido de «heaven» sin forzar una distinción cosmológica en el texto principal.
- source_word: πορευομένου αὐτοῦ
  english_pob_choice: while he was going
  chosen_spanish: mientras él iba
  alternatives_spanish:
  - cuando él iba
  - mientras se iba
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto señala acción concomitante. «Mientras él iba» refleja esa simultaneidad de manera simple y fiel, sin añadir que «subía» o «partía».
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - véase
  lexicon: BDAG
  rationale: «He aquí» conserva el valor de marcador discursivo que introduce algo notable. Es más solemne que «miren» y no agrega una urgencia que el griego no explicita.
- source_word: ἄνδρες δύο
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  lexicon: BDAG
  rationale: ἀνήρ designa varón/hombre, no simplemente «persona». «Dos hombres» mantiene la referencia lexical y deja la identidad implícita para el contexto, como en el texto griego.
- source_word: παρειστήκεισαν
  english_pob_choice: stood by
  chosen_spanish: estaban junto a ellos
  alternatives_spanish:
  - estaban de pie junto a ellos
  - se hallaban junto a ellos
  lexicon: BDAG
  rationale: El verbo describe presencia al lado de ellos; en español, «estaban junto a ellos» suena natural y conserva la idea de cercanía sin forzar el aspecto verbal idiomático de «stood by».
- source_word: ἐσθήσεσι λευκαῖς
  english_pob_choice: in white clothing
  chosen_spanish: con vestiduras blancas
  alternatives_spanish:
  - con ropa blanca
  - con prendas blancas
  lexicon: BDAG
  rationale: ἐσθής refiere ropa/vestimenta de forma amplia. «Vestiduras blancas» es digno y claro en español, y mantiene la amplitud del término sin restringirlo a «robes».
theological_decisions:
- issue: οὐρανός en el contexto de la ascensión
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielo
  - cielos
  rationale: La escena de la ascensión orienta la lectura hacia lo alto de manera teológica, pero el español «cielo» sigue siendo un equivalente legítimo de οὐρανός. Se evita introducir una separación artificial entre «cielo» y «heaven» en el texto principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve legitimate lexical range without flattening context'
- issue: Identidad de los dos hombres
  english_pob_reading: two men
  chosen_spanish_reading: dos hombres
  alternative_spanish_readings:
  - dos ángeles
  rationale: El griego dice literalmente «dos hombres» y no los identifica como ángeles en este versículo. La traducción mantiene esa superficie textual y deja la identificación contextual para el lector, sin importarla al texto principal.
  doctrine_reference: 'Translation philosophy: no importar una identificación doctrinal que el versículo no formula explícitamente'
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios y el control cruzado informó alta concordancia (1.0). No se documentaron correcciones aplicadas; por eso el borrador español sigue de cerca la lectura auditada y mantiene las dos alternativas léxicas principales en nota.
  spanish_consistency_notes:
  - Se usa «cielo» para οὐρανός en este versículo, coherente con el contexto de la ascensión y con la nota que preserva la alternativa «cielo/cielos».
  - Se conserva «dos hombres» para ἄνδρες δύο, evitando «ángeles» en el texto principal.
  - «Vestiduras blancas» mantiene la amplitud semántica de ἐσθής y coincide con la nota de alternativa léxica.
  - El marcador narrativo «he aquí» reproduce el valor discursivo de ἰδού sin modernizarlo a un imperativo coloquial.
