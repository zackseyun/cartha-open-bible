translation:
  language: es
  text: Pero recibirán poder cuando el Espíritu Santo haya venido sobre ustedes, y serán mis testigos en Jerusalén, en toda Judea y en Samaria, y hasta el fin de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hasta los confines de la tierra». La frase griega es singular («hasta el fin de la tierra»), pero funciona idiomáticamente para la extensión más remota de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste directo con la afirmación anterior. En español, «Pero» es el adversativo más natural y fiel aquí.
- source_word: λήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - tomarán
  lexicon: BDAG
  rationale: El futuro de λαμβάνω aquí expresa recibir lo que viene de fuera; «recibirán» conserva ese valor mejor que un verbo de toma activa.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: BDAG
  rationale: «Poder» reproduce la amplitud semántica de δύναμις en este contexto de habilitación divina, sin reducirlo a fuerza física o capacidad humana.
- source_word: ἐπελθόντος ... ἐφ’ ὑμᾶς
  english_pob_choice: when ... has come upon you
  chosen_spanish: cuando ... haya venido sobre ustedes
  alternatives_spanish:
  - cuando ... venga sobre ustedes
  - después de que ... venga sobre ustedes
  lexicon: BDAG
  rationale: La construcción temporal del genitivo absoluto se vierte con una subordinada idiomática en español. «Haya venido sobre ustedes» conserva el sentido de llegada efectiva del Espíritu sobre ellos.
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el santo Espíritu
  - el Espíritu divino
  lexicon: BDAG
  rationale: Es el referente personal divino; en español la forma estable y clara es «Espíritu Santo», con mayúsculas por uso cristiano.
- source_word: ἔσεσθέ
  english_pob_choice: you will be
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - estarán siendo
  lexicon: BDAG
  rationale: El futuro de εἰμί es copulativo; «serán» es la equivalencia directa y más natural en español.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - para mí
  - de mí
  lexicon: BDAG
  rationale: 'El genitivo expresa pertenencia/relación: son testigos de Jesús. En español, el posesivo plural concuerda con «testigos».'
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testificantes
  - mártires
  lexicon: BDAG
  rationale: Aquí el sentido primario es el de quienes dan testimonio. «Testigos» evita importar el sentido posterior de «mártires».
- source_word: ἔν τε Ἰερουσαλὴμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - también en Jerusalén
  lexicon: BDAG
  rationale: La partícula enlaza el primer ámbito de la secuencia. En español basta «en Jerusalén» para mantener la progresión geográfica sin sobrecargar la frase.
- source_word: ἐν πάσῃ τῇ Ἰουδαίᾳ
  english_pob_choice: in all Judea
  chosen_spanish: en toda Judea
  alternatives_spanish:
  - por toda Judea
  - en Judea entera
  lexicon: BDAG
  rationale: «Toda Judea» expresa bien πάσῃ con el nombre de la región y conserva el alcance geográfico del texto.
- source_word: καὶ Σαμαρείᾳ
  english_pob_choice: and Samaria
  chosen_spanish: y Samaria
  alternatives_spanish:
  - y en Samaria
  lexicon: BDAG
  rationale: El griego omite repetir la preposición, pero en español puede quedar elíptica sin pérdida de claridad; la coordinación con las regiones es suficiente.
- source_word: ἕως ἐσχάτου τῆς γῆς
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el fin de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta el último rincón de la tierra
  lexicon: BDAG
  rationale: La expresión griega es singular y funciona idiomáticamente como alcance remoto de la tierra. «Hasta el fin de la tierra» conserva esa forma singular y su fuerza global.
theological_decisions:
- issue: Naturaleza del don prometido
  english_pob_reading: power given when the Holy Spirit has come upon you
  chosen_spanish_reading: poder concedido por la venida del Espíritu Santo sobre ustedes
  alternative_spanish_readings:
  - fuerza humana para la misión
  - capacitación interior sin referencia personal al Espíritu
  rationale: El texto vincula el poder con la llegada personal del Espíritu, no con una capacidad meramente humana. La redacción española mantiene esa relación causal sin explicarla más allá del versículo.
  doctrine_reference: Hechos 1:8; afirmación cristiana histórica sobre el Espíritu Santo
- issue: Alcance del testimonio
  english_pob_reading: witnesses in Jerusalem, Judea, Samaria, and to the end of the earth
  chosen_spanish_reading: testigos en expansión geográfica desde Jerusalén hasta el fin de la tierra
  alternative_spanish_readings:
  - un esquema puramente simbólico
  - una comisión restringida solo a los apóstoles
  rationale: La secuencia de lugares señala expansión real y progresiva. La traducción conserva los topónimos y el horizonte universal sin convertirlo en una alegoría.
  doctrine_reference: Hechos 1:8; lectura canónica del mandato misionero
- issue: Referencia pronominal de «my witnesses»
  english_pob_reading: my witnesses
  chosen_spanish_reading: mis testigos
  alternative_spanish_readings:
  - testigos de mí
  - testigos para mí
  rationale: El genitivo de posesión/relación se expresa de forma natural con el posesivo español. «Mis testigos» comunica correctamente la relación con Jesús sin añadir matices ajenos.
  doctrine_reference: Hechos 1:8
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el criterio óptimo-equivalente de la POB inglesa. No se introdujeron cambios de revisión aplicados en el expediente; la redacción mantiene la progresión geográfica, el valor copulativo de «serán» y la singularidad idiomática de «hasta el fin de la tierra».
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas para el referente personal divino.
  - Se mantiene «poder» para δύναμις y «testigos» para μάρτυρες, en coherencia con el campo semántico auditado.
  - Se preserva la singularidad de la expresión final con una nota alternativa en lugar de sustituirla por una pluralización no presente en el griego.
  - Los nombres geográficos se dejan sin artículo cuando el español natural lo permite, siguiendo el patrón bíblico común en registros de lectura pública.
