translation:
  language: es
  text: Por tanto, es necesario que uno de los hombres[a] que estuvieron con nosotros durante todo el tiempo en que el Señor Jesús entraba y salía entre nosotros[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres que nos acompañaron» o, más literalmente, «los hombres que vinieron juntos con nosotros».
    reason: lexical_alternative
  - marker: b
    text: La expresión «entraba y salía entre nosotros» es un modismo para la vida y actividad pública continua de Jesús en compañía de los discípulos.
    reason: cultural_note
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - es preciso
  - debe ser
  lexicon: BDAG
  rationale: El verbo impersonal expresa necesidad; «es necesario» conserva esa fuerza sin anticipar el complemento que continúa en el versículo siguiente.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la inferencia lógica a partir del contexto previo; «Por tanto» suena natural en español y mantiene el valor conclusivo.
- source_word: συνελθόντων ... ἀνδρῶν
  english_pob_choice: the men who accompanied us
  chosen_spanish: uno de los hombres que estuvieron con nosotros
  alternatives_spanish:
  - uno de los hombres que se reunieron con nosotros
  - uno de los hombres que nos acompañaron
  lexicon: BDAG
  rationale: El participio de συνέρχομαι indica literalmente «habiendo venido juntos», pero aquí la idea es de compañía sostenida. «Estuvieron con nosotros» comunica esa asociación continua de modo natural en español sin perder el sentido.
- source_word: ἀνδρῶν
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los varones
  lexicon: BDAG
  rationale: ἀνήρ designa específicamente varones; por fidelidad léxica se mantiene «hombres» y no un término neutralizador.
- source_word: ἐν παντὶ χρόνῳ
  english_pob_choice: during all the time
  chosen_spanish: durante todo el tiempo
  alternatives_spanish:
  - a lo largo de todo el tiempo
  - durante todo ese tiempo
  lexicon: BDAG
  rationale: La frase apunta al lapso completo de la presencia pública de Jesús con ellos; esta formulación es idiomática y fiel.
- source_word: ᾧ
  english_pob_choice: in which
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: Aunque la relación es temporal, la construcción griega usa un relativo con valor de «en el cual». «En que» preserva mejor la relación sintáctica que una simple temporalización.
- source_word: εἰσῆλθεν καὶ ἐξῆλθεν
  english_pob_choice: went in and out
  chosen_spanish: iba y venía
  alternatives_spanish:
  - entraba y salía
  - iba y salía
  lexicon: BDAG
  rationale: Es un modismo semítico para la actividad pública y continua. En español, «iba y venía» comunica bien esa idea de presencia y movimiento habitual sin volverse rígido.
- source_word: ἐφ’ ἡμᾶς
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - con nosotros
  - en medio de nosotros
  lexicon: BDAG
  rationale: Con este verbo y en este contexto comunitario, la relación espacial/relacional se expresa con naturalidad como «entre nosotros».
- source_word: ὁ κύριος Ἰησοῦς
  english_pob_choice: the Lord Jesus
  chosen_spanish: el Señor Jesús
  alternatives_spanish:
  - el Maestro Jesús
  lexicon: BDAG
  rationale: κύριος se traduce aquí como «Señor», conforme al valor cristológico habitual y a la guía doctrinal del proyecto. El artículo definido refleja el griego de forma natural.
theological_decisions:
- issue: Título cristológico κύριος
  english_pob_reading: the Lord Jesus
  chosen_spanish_reading: el Señor Jesús
  alternative_spanish_readings:
  - el Maestro Jesús
  rationale: En Hechos, κύριος aplicado a Jesús conlleva honor y peso teológico. «Señor» es el equivalente español más fiel; «Maestro» debilitaría ese valor.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Referencia a los varones requeridos para el reemplazo apostólico
  english_pob_reading: the men who accompanied us
  chosen_spanish_reading: uno de los hombres que estuvieron con nosotros
  alternative_spanish_readings:
  - uno de los hombres que nos acompañaron
  - uno de los hombres que anduvieron con nosotros
  rationale: El griego usa ἀνδρῶν, un sustantivo masculino específico. La traducción conserva ese rasgo y evita neutralizar la condición masculina exigida por el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se documentaron revisiones textuales o de sentido que alteren la lectura base de SBLGNT; la redacción sigue el sentido ya estabilizado en el audit trail inglés, con ajustes naturales para el español.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος siguiendo la convención doctrinal del proyecto en títulos cristológicos.
  - Se mantiene la referencia masculina «hombres» por la fuerza específica de ἀνδρῶν.
  - La metáfora idiomática se adapta a español con «iba y venía» para evitar un calco duro de «went in and out» sin perder el sentido.
