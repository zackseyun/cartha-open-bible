revisions:
- from: Por tanto[a], es necesario que uno de los hombres que estuvieron con nosotros durante todo el tiempo en que el Señor Jesús[b] iba y venía entre nosotros.
  to: Por tanto, es necesario que uno de los hombres[a] que estuvieron con nosotros durante todo el tiempo en que el Señor Jesús entraba y salía entre nosotros[b],
