    reason: lexical_alternative
  revision_rationale: Se corrige la expresión de la ascensión para reflejar mejor ἀνελήμφθη sin añadir «de entre». Se eliminan notas defectuosas y se sustituye la nota de alternativa real heredada del POB. También se reordena levemente la frase final para un español más natural, manteniendo que «con nosotros» modifique el testimonio compartido/apostólico.
