translation:
  language: es
  text: comenzando desde el bautismo de Juan[a] hasta el día en que fue llevado de nosotros, uno de estos debe llegar a ser testigo de su resurrección[b] con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el bautismo de Juan».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «de su resurrección»; en español también puede expresarse «testigo de su resurrección» con «con nosotros» unido a «debe llegar a ser», sin cambio sustancial de sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρξάμενος
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - empezando
  - desde el comienzo
  lexicon: BDAG
  rationale: El participio introduce el tramo temporal y en español 'comenzando desde' conserva esa fuerza aspectual sin sonar forzado.
- source_word: ἀπὸ τοῦ βαπτίσματος Ἰωάννου
  english_pob_choice: from the baptism of John
  chosen_spanish: desde el bautismo de Juan
  alternatives_spanish:
  - desde el bautismo de Juan el Bautista
  - a partir del bautismo de Juan
  lexicon: BDAG
  rationale: '''Desde el bautismo de Juan'' sigue de cerca la construcción griega y mantiene la naturalidad en español; se evita añadir ''el Bautista'' porque no está en el texto.'
- source_word: ἕως τῆς ἡμέρας ἧς
  english_pob_choice: until the day when
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día cuando
  - hasta el día en el cual
  lexicon: BDAG
  rationale: La combinación 'hasta el día en que' expresa con claridad el límite temporal y la relativa sin cargar la frase.
- source_word: ἀνελήμφθη
  english_pob_choice: he was taken up
  chosen_spanish: fue tomado de entre nosotros
  alternatives_spanish:
  - fue levantado de entre nosotros
  - fue llevado de entre nosotros
  lexicon: BDAG
  rationale: '''Tomado de entre nosotros'' conserva el pasivo y refleja la partida/ascensión sin ampliar doctrinalmente con una paráfrasis como ''ascendió al cielo''.'
- source_word: ἀφ’ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de entre nosotros
  alternatives_spanish:
  - de nosotros
  - alejado de nosotros
  lexicon: BDAG
  rationale: '''De entre nosotros'' expresa mejor en español la idea relacional y espacial de la salida de Jesús del grupo, sin perder la referencia directa a ''from us''.'
- source_word: μάρτυρα
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - un testigo
  - mártir
  lexicon: BDAG
  rationale: En español 'testigo' es el equivalente natural; el artículo indefinido se sobreentiende por la sintaxis 'uno de estos'. 'Mártir' no corresponde aquí.
- source_word: τῆς ἀναστάσεως αὐτοῦ
  english_pob_choice: of his resurrection
  chosen_spanish: de su resurrección
  alternatives_spanish:
  - de la resurrección de él
  - de su levantamiento
  lexicon: BDAG
  rationale: La relación genitiva se traduce de modo directo por 'de su resurrección'. 'Testigo de' es la formulación española más natural para esta construcción.
- source_word: σὺν ἡμῖν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  - en compañía de nosotros
  lexicon: BDAG
  rationale: '''Con nosotros'' es claro y fiel; en español la posición natural es junto a ''testigo'', no pegada al infinitivo.'
- source_word: γενέσθαι
  english_pob_choice: must become
  chosen_spanish: debe llegar a ser
  alternatives_spanish:
  - debe ser
  - debe convertirse en
  lexicon: BDAG
  rationale: El sentido resultante depende de la necesidad expresada en el contexto inmediato; 'llegar a ser' preserva el matiz de cambio de estado sin sonar rígido.
- source_word: ἕνα τούτων
  english_pob_choice: one of these
  chosen_spanish: uno de estos
  alternatives_spanish:
  - uno de estos hombres
  - uno de ellos
  lexicon: BDAG
  rationale: Se mantiene la brevedad del griego y del inglés POB; no se añade 'hombres' porque no aparece en este versículo.
theological_decisions:
- issue: Referencia a la ascensión sin expandir el contenido del versículo
  english_pob_reading: he was taken up
  chosen_spanish_reading: fue tomado de entre nosotros
  alternative_spanish_readings:
  - ascendió al cielo
  - fue llevado al cielo
  rationale: El griego señala la partida de Jesús mediante pasivo; la traducción evita importar una formulación doctrinal más explícita que el versículo no usa, aunque la referencia a la ascensión sea clara en contexto.
  doctrine_reference: Hechos 1:9-11; cristología/ascensión
- issue: Dependencia sintáctica de la necesidad de la v. 21
  english_pob_reading: one of these must become a witness with us
  chosen_spanish_reading: uno de estos debe llegar a ser testigo con nosotros
  alternative_spanish_readings:
  - uno de estos tiene que ser testigo con nosotros
  - uno de estos debe ser testigo con nosotros
  rationale: Aunque la forma verbal griega aquí es infinitiva, el sentido de obligación viene del contexto inmediato. En español conviene explicitarlo con 'debe' para no dejar la cláusula incompleta.
  doctrine_reference: Hechos 1:21-22; cohesión sintáctica
- issue: Función de 'testigo' respecto de la resurrección
  english_pob_reading: a witness of his resurrection
  chosen_spanish_reading: testigo de su resurrección
  alternative_spanish_readings:
  - testigo a favor de su resurrección
  - testigo de que él resucitó
  rationale: '''Testigo de'' mantiene la relación genitiva del griego y suena natural en español. Se evita paraphrasear con ''a favor de'' o ''de que'' porque estrechan o amplían indebidamente el alcance.'
  doctrine_reference: Hechos 1:22; testimonio apostólico
translation_notes:
  revision_awareness: El inglés POB afinó la frase para que 'with us' modifique 'witness' y no 'become'. En español se reflejó esa relación colocando 'con nosotros' junto a 'testigo'. También se evitó traducir mecánicamente 'he was taken up' como una paráfrasis doctrinal añadida; se preservó el pasivo con una formulación natural en español. No se añadió 'hombres' a 'uno de estos' porque el griego de este versículo no lo expresa.
  spanish_consistency_notes:
  - Se usó 'Dios/Yahvé/Jesús' solo cuando corresponde; este versículo no lo requiere.
  - Se mantuvo 'testigo' para μάρτυρα, siguiendo el valor lexical de testimonio y no 'mártir'.
  - '''Con nosotros'' se colocó con ''testigo'' para respetar la sintaxis y la revisión auditada del inglés POB.'
  - La frase 'de su resurrección' conserva la construcción genitiva sin forzar 'a su resurrección' o 'sobre su resurrección'.
