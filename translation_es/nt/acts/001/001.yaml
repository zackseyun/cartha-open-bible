translation:
  language: es
  text: En el primer relato[a], oh Teófilo, escribí acerca de todo lo que Jesús comenzó tanto a hacer como a enseñar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el relato anterior' o 'el primer libro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸν μὲν πρῶτον λόγον
  english_pob_choice: the first account
  chosen_spanish: el primer relato
  alternatives_spanish:
  - el primer libro
  - el relato anterior
  - la primera narración
  lexicon: BDAG
  rationale: λόγος aquí designa una obra escrita o relato, no una sola 'palabra'. 'Relato' conserva el sentido de composición narrativa y 'primer' refleja πρῶτον. 'En el primer relato' fluye de manera natural en español y mantiene la referencia al escrito previo de Lucas.
- source_word: ἐποιησάμην
  english_pob_choice: I wrote
  chosen_spanish: escribí
  alternatives_spanish:
  - compuse
  - hice
  lexicon: BDAG
  rationale: Aunque el verbo base es ποιέω ('hacer'), con λόγος en este contexto significa producir una obra escrita. 'Escribí' es el equivalente idiomático natural en español y preserva la idea de una obra compuesta por escrito.
- source_word: περὶ πάντων
  english_pob_choice: about all
  chosen_spanish: acerca de todo
  alternatives_spanish:
  - sobre todo
  - acerca de todas las cosas
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema o asunto. 'Acerca de todo' sigue la amplitud del inglés POB sin forzar una totalidad filosófica absoluta; deja el alcance narrativo en su tensión natural.
- source_word: ὦ Θεόφιλε
  english_pob_choice: O Theophilus
  chosen_spanish: oh Teófilo
  alternatives_spanish:
  - Teófilo
  - querido Teófilo
  lexicon: BDAG
  rationale: ὦ marca vocativo directo. 'Oh' preserva esa apelación en español sin añadir una cercanía afectiva que el griego no expresa explícitamente.
- source_word: ὧν
  english_pob_choice: that
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - las cosas que
  lexicon: BDAG
  rationale: La construcción relativa con genitivo se vierte de manera idiomática como 'lo que', que enlaza bien con 'todo' y evita una formulación pesada en español.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: BDAG
  rationale: '''Comenzó'' preserva el valor aspectual de inicio del verbo y mantiene la tensión teológica que el texto deja abierta: Jesús inició una obra que no se agota en este punto.'
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español, de acuerdo con la práctica del proyecto.
- source_word: ποιεῖν τε καὶ διδάσκειν
  english_pob_choice: both to do and to teach
  chosen_spanish: hacer y a enseñar
  alternatives_spanish:
  - hacer y enseñar
  - obrar y a enseñar
  lexicon: BDAG
  rationale: La coordinación τε καὶ se expresa de forma natural con 'y'. 'Hacer' conserva la amplitud de ποιεῖν; 'enseñar' corresponde a διδάσκειν. El infinitivo 'a enseñar' depende del régimen de 'comenzó a' y suena natural en español.
theological_decisions:
- issue: Mantener ἤρξατο ('comenzó') sin resolver la implicación narrativa-teológica sobre la continuación de la obra de Jesús en Hechos
  english_pob_reading: Retain 'began' in the main text without explicating the continuation.
  chosen_spanish_reading: Mantener 'comenzó' en el texto principal sin explicitar que la obra continúa mediante los apóstoles.
  alternative_spanish_readings:
  - traducir dinámicamente como 'todo lo que Jesús hizo y enseñó'
  - 'parafrasear: ''todo lo que Jesús comenzó a hacer y continuó haciendo por medio de sus apóstoles'''
  rationale: El griego dice explícitamente 'comenzó', y esa señal debe conservarse. La traducción no debe eliminar la tensión interpretativa ni resolverla con una paráfrasis doctrinalmente cargada. 'Comenzó' deja abierta la relación entre el ministerio de Jesús y la narración de Hechos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y el paquete de auditoría inglesa muestran alto acuerdo y no requieren cambios sustantivos. Se preservó la fuerza de 'comenzó' y la naturaleza de λόγος como obra escrita, con ajustes mínimos para español natural. No se introdujeron expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo 'Teófilo' como transliteración del vocativo personal.
  - '''Relato'' se usa para λόγος en sentido de obra escrita, coherente con el uso del proyecto para este tipo de prólogo.'
  - '''Jesús'' se conserva como nombre propio estándar; no se introdujo ''Cristo'' porque el texto fuente no lo exige.'
  - La puntuación reproduce una apertura de frase fluida en español y conserva la relación sintáctica del participio relativo al infinitivo final.
