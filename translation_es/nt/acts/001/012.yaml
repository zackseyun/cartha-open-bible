  rationale: Se corrige el topónimo para que el texto principal use un nombre breve y natural en español, paralelo a «Olivet», mientras la forma tradicional queda en nota. También se mejora la fluidez del modismo de distancia sin perder su carácter cultural judío ni mover la explicación fuera de la nota.
