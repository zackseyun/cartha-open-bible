translation:
  language: es
  text: Entonces regresaron a Jerusalén desde el monte llamado Olivete[a], que está cerca de Jerusalén, a un viaje de sábado[b] de distancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más tradicionalmente, «llamado el Monte de los Olivos».
    reason: lexical_alternative
  - marker: b
    text: Un «viaje de sábado» era la distancia acostumbrada que un judío podía recorrer el sábado.
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca una transición temporal narrativa; «Entonces» es natural y conserva el avance secuencial del relato sin añadir matiz temporal innecesario.
- source_word: ὑπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: El aoristo de ὑποστρέφω expresa volver a un punto previo. «Regresaron» es claro, narrativo y de registro digno en español.
- source_word: εἰς Ἰερουσαλὴμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - para Jerusalén
  lexicon: BDAG
  rationale: Con un nombre de ciudad, el movimiento hacia el destino se expresa naturalmente en español con «a». Mantiene la dirección sin forzar un calco.
- source_word: ἀπὸ ὄρους
  english_pob_choice: from the mount
  chosen_spanish: desde el monte
  alternatives_spanish:
  - desde la montaña
  - desde el cerro
  lexicon: BDAG
  rationale: ὄρος puede significar monte o montaña; «monte» conserva el estilo toponímico y la sobriedad del pasaje.
- source_word: τοῦ καλουμένου Ἐλαιῶνος
  english_pob_choice: called Olivet
  chosen_spanish: llamado de los Olivos
  alternatives_spanish:
  - llamado Olivete
  - llamado el Monte de los Olivos
  lexicon: BDAG
  rationale: El griego apunta literalmente a un nombre relacionado con los olivos. Se evita imponer de entrada la forma tradicional más extensa en el texto principal; la alternativa más familiar queda documentada en nota.
- source_word: ὅ ἐστιν ἐγγὺς Ἰερουσαλὴμ
  english_pob_choice: which is near Jerusalem
  chosen_spanish: que está cerca de Jerusalén
  alternatives_spanish:
  - que queda cerca de Jerusalén
  - que se halla cerca de Jerusalén
  lexicon: BDAG
  rationale: La cláusula relativa identifica la ubicación. «Está cerca» reproduce de forma natural ἐγγύς sin sobreinterpretar el valor espacial.
- source_word: σαββάτου ἔχον ὁδόν
  english_pob_choice: a Sabbath day’s journey away
  chosen_spanish: a la distancia de un viaje de sábado
  alternatives_spanish:
  - a un camino de sábado
  - a la distancia permitida en sábado
  lexicon: BDAG
  rationale: La expresión es idiomática y culturalmente marcada. «Viaje de sábado» conserva el vínculo con el Sabbath/Sábado y mantiene el sentido de distancia convencional sin explicarlo dentro del texto principal.
theological_decisions:
- issue: 'Expresión judía de distancia: σαββάτου ἔχον ὁδόν'
  english_pob_reading: a Sabbath day’s journey away
  chosen_spanish_reading: a la distancia de un viaje de sábado
  alternative_spanish_readings:
  - a la distancia permitida en sábado
  - a un camino de sábado
  rationale: No es una cuestión doctrinal, sino histórico-cultural. Se conserva la referencia judía del modismo sin sustituirla por una paráfrasis explicativa en el cuerpo del versículo; la nota aclara su sentido tradicional.
  doctrine_reference: Trasfondo cultural judío; equivalencia óptima; claridad para lector moderno.
translation_notes:
  revision_awareness: El contexto de auditoría en inglés muestra alta concordancia y sin revisiones aplicadas; por eso el borrador español sigue de cerca la estructura del original y conserva la alternativa tradicional solo en nota lexical, sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «Jerusalén» de forma consistente para el topónimo.
  - Se mantiene «monte» como equivalente de ὄρος para preservar el tono toponímico.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene nombres divinos.
  - La nota cultural explica el modismo de distancia sabática sin diluirlo en el texto principal.
