review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la geografía básica del griego: «Entonces regresaron a Jerusalén… que está cerca de Jerusalén». También conserva correctamente el modismo cultural de σαββάτου ἔχον ὁδόν mediante una nota explicativa. Sin embargo, «llamado de los Olivos» no funciona bien como nombre en español y no representa con naturalidad la decisión inglesa «called Olivet» ni la alternativa tradicional documentada.'
  spanish_quality_summary: 'El español es generalmente claro, pero dos giros suenan poco naturales o poco idiomáticos para una Biblia eclesial legible: «llamado de los Olivos» y «a la distancia de un viaje de sábado». Una formulación más natural y fiel sería «llamado Olivete» con nota tradicional, y «a un viaje de sábado de distancia», que suena más idiomático y preserva el modismo sin explicarlo dentro del texto.'
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La cuestión central es léxica/estilística: representar Ἐλαιῶνος de manera natural en español sin perder la nota tradicional «Monte de los Olivos», y mantener la expresión judía de distancia con una nota cultural.'
  issues:
  - severity: medium
    issue: «llamado de los Olivos[a]» es poco natural en español
    rationale: Aunque intenta reflejar literalmente Ἐλαιῶνος, en español no funciona bien como topónimo. Además, la nota ofrece «el Monte de los Olivos», lo que muestra que el texto principal quedó extraño. «Olivete» reproduce mejor la intención de un nombre breve equivalente a «Olivet».
  - severity: medium
    issue: «a la distancia de un viaje de sábado» es torpe
    rationale: Comunica la idea general, pero suena pesado y menos idiomático que alternativas como «a un viaje de sábado de distancia» o «a la distancia de un día de reposo». Conviene conservar el modismo judío y dejar la explicación en la nota.
  - severity: low
    issue: La nota b podría sonar más natural con «el sábado»
    rationale: «En sábado» se entiende, pero «el sábado» suele ser más natural en español general al hablar de la observancia sabática.
  revised_spanish_text: Entonces regresaron a Jerusalén desde el monte llamado Olivete[a], que está cerca de Jerusalén, a un viaje de sábado[b] de distancia.
  revised_footnotes:
