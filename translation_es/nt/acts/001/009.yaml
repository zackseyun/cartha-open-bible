translation:
  language: es
  text: Y después de decir estas cosas, mientras ellos miraban, fue levantado[a], y una nube lo ocultó de su vista[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue tomado arriba».'
    reason: lexical_alternative
  - marker: b
    text: La frase «una nube lo ocultó» puede evocar escenas bíblicas en las que una nube señala la presencia de Dios, aunque el versículo no lo dice explícitamente.
    reason: cross_reference
  - marker: c
    text: 'O: «lo recibió fuera de su vista».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conecta narrativamente este versículo con lo anterior sin añadir una relación temporal más fuerte que la del griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural demostrativo se refiere a las palabras previas de Jesús; «estas cosas» conserva mejor el plural del original.
- source_word: εἰπὼν
  english_pob_choice: after he said
  chosen_spanish: después que dijo
  alternatives_spanish:
  - habiendo dicho
  - cuando hubo dicho
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal; en español, «después que dijo» expresa con naturalidad la secuencia temporal sin sobrecargarla.
- source_word: βλεπόντων αὐτῶν
  english_pob_choice: as they were watching
  chosen_spanish: mientras ellos miraban
  alternatives_spanish:
  - mientras lo miraban
  - en tanto lo observaban
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto indica acción concomitante; «mientras ellos miraban» conserva el aspecto continuo y es idiomático en español.
- source_word: ἐπήρθη
  english_pob_choice: he was lifted up
  chosen_spanish: fue levantado
  alternatives_spanish:
  - fue alzado
  - fue tomado arriba
  lexicon: BDAG
  rationale: «Fue levantado» refleja el pasivo de ἐπαίρω y mantiene la imagen de elevación visible sin forzar una formulación más interpretativa.
- source_word: νεφέλη
  english_pob_choice: a cloud
  chosen_spanish: una nube
  alternatives_spanish:
  - la nube
  lexicon: BDAG
  rationale: El sustantivo aparece sin artículo en griego; «una nube» reproduce esa indefinición de manera directa.
- source_word: ὑπέλαβεν
  english_pob_choice: took him
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo tomó
  - lo tomó consigo
  lexicon: BDAG
  rationale: El verbo admite el sentido de «recibir» además de «tomar»; en el contexto de la desaparición de Jesús de la vista, «lo recibió» conserva la amplitud semántica sin sonar forzado en español.
- source_word: ἀπὸ τῶν ὀφθαλμῶν αὐτῶν
  english_pob_choice: out of their sight
  chosen_spanish: fuera de su vista
  alternatives_spanish:
  - de sus ojos
  - delante de sus ojos
  lexicon: BDAG
  rationale: La expresión es idiomática; «fuera de su vista» comunica con claridad la desaparición del campo visual sin caer en un calco literal.
theological_decisions:
- issue: Si ἐπήρθη debe sonar como una fórmula teológica tradicional de ascensión o como un enunciado descriptivo
  english_pob_reading: he was lifted up
  chosen_spanish_reading: fue levantado
  alternative_spanish_readings:
  - fue tomado
  - fue alzado
  rationale: La escena narra un movimiento ascendente visible sin introducir una formulación más doctrinal de la necesaria; «fue levantado» mantiene esa sobriedad y sigue de cerca el griego.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión lexical sin resolverla por tradición.'
- issue: Si νεφέλη debe interpretarse explícitamente como nube teofánica
  english_pob_reading: a cloud
  chosen_spanish_reading: una nube
  alternative_spanish_readings:
  - la nube
  - una nube de gloria
  rationale: El texto no identifica explícitamente la nube como símbolo; por eso la traducción principal permanece neutral y no añade una interpretación teológica no dicha en el versículo.
  doctrine_reference: 'Principio POB: no incorporar al texto principal una lectura doctrinal que el versículo no formule.'
- issue: Cómo manejar ὑπέλαβεν sin cerrar la ambigüedad semántica
  english_pob_reading: took him / received him out of their sight
  chosen_spanish_reading: lo recibió
  alternative_spanish_readings:
  - lo tomó
  - lo recibió fuera de su vista
  rationale: «Lo recibió» mantiene abierta la posibilidad de «recibir/tomar» que reconoce el audit trail inglés, y evita escoger un valor demasiado estrecho donde el verbo puede abarcar más de una matización.
  doctrine_reference: 'Principio POB: conservar alternativas significativas cuando el léxico lo permite.'
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el audit trail inglés: mantiene la secuencia temporal de un participio antecedente, conserva la elevación visible con un pasivo sobrio y deja la nube en forma indefinida. Donde el inglés POB ofreció alternativas («lifted up / taken up», «took / received»), el español conserva esa amplitud mediante notas y evita una formulación excesivamente interpretativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Jesús» se mantiene implícito por el contexto narrativo, sin necesidad de repetir el nombre.
  - La coordinación y la puntuación siguen el flujo narrativo breve del griego.
  - Se conserva un registro moderno y eclesialmente legible, evitando arcaísmos innecesarios.
