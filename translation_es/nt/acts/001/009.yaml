revisions:
- from: Y después que dijo estas cosas[a], mientras ellos miraban, fue levantado[b], y una nube[c] lo recibió fuera de su vista.
  to: Y después de decir estas cosas, mientras ellos miraban, fue levantado[a], y una nube lo ocultó de su vista[c][b].
  rationale: Se ajusta ὑπέλαβεν a una expresión española más natural y visual ('lo ocultó de su vista') que preserva el efecto narrativo del griego y la opción principal del expediente inglés. Se conservan las alternativas significativas en notas, incluyendo la formulación tradicional con 'recibió'. También se mejora la naturalidad de εἰπὼν con 'después de decir estas cosas'.
