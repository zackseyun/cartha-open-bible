revisions:
- from: Y mientras estaba con ellos[a], les ordenó que no se apartaran de Jerusalén, sino que esperaran la promesa del Padre, la cual oísteis de mí.
  to: Y mientras estaba con ellos[a], les ordenó que no se apartaran de Jerusalén, sino que esperaran la promesa del Padre, que oyeron de mí.
  rationale: Se recomienda una revisión menor para ajustar el registro al español neutral latinoamericano y mejorar la naturalidad sin perder fidelidad al griego ni a la auditoría inglesa. El cambio principal sustituye «la cual oísteis de mí» por «que oyeron de mí», evitando el voseo peninsular y el relativo más rígido. La nota al pie se conserva con mejor fluidez estilística. No se requiere adjudicación adicional, porque el asunto es principalmente de registro y legibilidad, no de incertidumbre doctrinal o textual mayor.
