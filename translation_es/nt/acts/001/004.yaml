translation:
  language: es
  text: Y mientras estaba con ellos[a], les ordenó que no se apartaran de Jerusalén, sino que esperaran la promesa del Padre, que oyeron de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «mientras se reunía con ellos»; algunos entienden la frase como «mientras comía con ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναλιζόμενος
  english_pob_choice: while staying with them
  chosen_spanish: y mientras estaba con ellos
  alternatives_spanish:
  - y mientras se reunía con ellos
  - y mientras comía con ellos
  lexicon: BDAG
  rationale: El participio es difícil y admite más de una lectura. En español, «mientras estaba con ellos» comunica de forma natural la cercanía y presencia conjunta sin forzar una interpretación específica. Se preservan como alternativas la idea de reunirse y la tradición de comer con ellos, pero sin convertir esa opción en la lectura principal.
- source_word: παρήγγειλεν
  english_pob_choice: ordered
  chosen_spanish: les ordenó
  alternatives_spanish:
  - les mandó
  - les instruyó
  lexicon: BDAG
  rationale: El verbo expresa una orden con autoridad. «Les ordenó» conserva mejor esa fuerza que «instruyó» y suena natural en español bíblico actual.
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - lejos de Jerusalén
  lexicon: BDAG
  rationale: Con el infinitivo de separación, el sentido es que no debían salir o apartarse de la ciudad. «De Jerusalén» reproduce con naturalidad el valor de procedencia/separación del original.
- source_word: μὴ χωρίζεσθαι
  english_pob_choice: not to depart
  chosen_spanish: que no se apartaran
  alternatives_spanish:
  - que no se fueran
  - que no se separaran
  lexicon: BDAG
  rationale: En este contexto, el verbo comunica dejar el lugar o alejarse. «No se apartaran» es idiomático en español y mantiene la idea de no abandonar Jerusalén.
- source_word: περιμένειν
  english_pob_choice: to wait for
  chosen_spanish: sino que esperaran
  alternatives_spanish:
  - sino que aguardaran
  - sino que esperasen
  lexicon: BDAG
  rationale: El verbo expresa esperar con expectativa. «Esperaran» es claro y natural; «aguardaran» también sería viable, pero algo más marcado estilísticamente.
- source_word: τὴν ἐπαγγελίαν τοῦ πατρὸς
  english_pob_choice: the promise of the Father
  chosen_spanish: la promesa del Padre
  alternatives_spanish:
  - la promesa del Padre
  - la promesa que viene del Padre
  - la promesa paternal
  lexicon: BDAG
  rationale: 'La construcción genitiva se conserva de manera directa: no se trata de una paráfrasis, sino de la promesa vinculada al Padre. «La promesa del Padre» mantiene la formulación bíblica y deja abierta la referencia contextual al don prometido.'
- source_word: ἣν ἠκούσατέ μου
  english_pob_choice: which you heard from me
  chosen_spanish: la cual oísteis de mí
  alternatives_spanish:
  - la cual escuchasteis de mí
  - que oísteis de mí
  lexicon: BDAG
  rationale: El complemento con genitivo tras ἀκούω se vierte naturalmente como «oír de» alguien. Se conserva la segunda persona plural del original griego («oísteis») para reflejar la forma directa del discurso.
theological_decisions:
- issue: Sentido de συναλιζόμενος en la escena postresurrección
  english_pob_reading: Rendered generally as Jesus being together with the disciples ('while staying with them') rather than specifically 'eating with them.'
  chosen_spanish_reading: Se traduce de manera general como que Jesús estaba con ellos, sin afirmar explícitamente que estuviera comiendo con ellos.
  alternative_spanish_readings:
  - mientras se reunía con ellos
  - mientras comía con ellos
  rationale: El texto no obliga a fijar una escena de comida. Dado el trasfondo textual discutido y la función narrativa del pasaje, la traducción principal mantiene la presencia conjunta sin resolver la tensión léxica en una dirección más específica de lo que el griego exige.
  doctrine_reference: Preservar la tensión textual y lexical sin sobreinterpretar.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial más reciente; el borrador sigue el pasaje fuente y el audit trail inglés con la misma decisión general sobre συναλιζόμενος.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Promesa del Padre» conserva la formulación sustantiva del original y armoniza con el resto del corpus POB.
  - La segunda persona plural en «oísteis» refleja el plural griego y evita suavizar el discurso directo de Jesús.
