translation:
  language: es
  text: Así que este hombre adquirió[a] un campo con el salario de la injusticia, y cayendo de cabeza[b], se reventó por el medio, y se derramaron todas sus entrañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compró». El griego dice «adquirió», lo que puede describir una posesión obtenida por medio del dinero asociado con Judas, no necesariamente una compra personal directa.
    reason: alternative_reading
  - marker: b
    text: O «habiendo quedado boca abajo» / «habiendo caído de bruces». La expresión probablemente describe una caída de cabeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτος μὲν οὖν
  english_pob_choice: So this man
  chosen_spanish: Así que este hombre
  alternatives_spanish:
  - Ahora bien, este hombre
  - Por tanto, este hombre
  lexicon: BDAG
  rationale: Οὗτος retoma a Judas; la combinación μὲν οὖν marca continuación/inferencia. «Así que» conserva esa conexión discursiva de manera natural en español, y «este hombre» preserva la referencia demostrativa sin introducir un nombre no presente en el versículo.
- source_word: ἐκτήσατο
  english_pob_choice: acquired
  chosen_spanish: adquirió
  alternatives_spanish:
  - obtuvo
  - compró
  lexicon: BDAG
  rationale: κτάομαι significa adquirir u obtener posesión. «Adquirió» mantiene amplitud semántica y no fuerza el sentido comercial más estrecho de «compró», respetando la tensión textual documentada en el audit trail.
- source_word: χωρίον
  english_pob_choice: a field
  chosen_spanish: un campo
  alternatives_spanish:
  - una parcela
  - una propiedad
  lexicon: BDAG
  rationale: χωρίον suele referirse a un campo o porción de terreno. «Campo» es la solución más directa y natural en español.
- source_word: ἐκ μισθοῦ τῆς ἀδικίας
  english_pob_choice: with the wages of unrighteousness
  chosen_spanish: con el salario de la injusticia
  alternatives_spanish:
  - con la recompensa de la maldad
  - con el pago de la injusticia
  lexicon: BDAG
  rationale: μισθός puede ser salario, pago o recompensa; ἀδικία es injusticia o maldad. Opté por «salario» para conservar el valor de retribución concretamente pagada, y «injusticia» para reflejar ἀδικία con un sustantivo abstracto fuerte y bíblico. «Con» reproduce adecuadamente ἐκ en esta construcción idiomática, siguiendo la revisión inglesa.
- source_word: πρηνὴς γενόμενος
  english_pob_choice: falling headlong
  chosen_spanish: cayendo de cabeza
  alternatives_spanish:
  - habiendo caído boca abajo
  - quedando en posición prona
  lexicon: BDAG
  rationale: πρηνής indica estar de cabeza o boca abajo; con γενόμενος describe el estado o modo del descenso. «Cayendo de cabeza» es una equivalencia natural que comunica el movimiento brusco sin sonar mecánica.
- source_word: ἐλάκησεν μέσος
  english_pob_choice: he burst open in the middle
  chosen_spanish: se abrió por el medio
  alternatives_spanish:
  - se reventó por la mitad
  - se partió por la mitad
  lexicon: BDAG
  rationale: λακάω significa romperse o reventar; μέσος funciona aquí adverbialmente, indicando el centro o la mitad. «Se abrió por el medio» preserva la imagen gráfica con una formulación comprensible en español.
- source_word: ἐξεχύθη
  english_pob_choice: spilled out
  chosen_spanish: se derramaron
  alternatives_spanish:
  - se vaciaron
  - salieron derramadas
  lexicon: BDAG
  rationale: ἐκχέω en pasiva describe que el contenido fue vertido o derramado. «Se derramaron» mantiene el movimiento de salida y suena natural en español.
- source_word: πάντα τὰ σπλάγχνα αὐτοῦ
  english_pob_choice: all his intestines
  chosen_spanish: todas sus entrañas
  alternatives_spanish:
  - todos sus intestinos
  - todos sus vísceras
  lexicon: BDAG
  rationale: σπλάγχνα designa literalmente las entrañas o partes internas. «Entrañas» conserva el registro vívido y bíblico sin imponer un tecnicismo moderno; además evita la torpeza de un plural anatómico menos natural en español.
theological_decisions:
- issue: Relación de Judas con la adquisición del campo
  english_pob_reading: Render ἐκτήσατο as 'acquired' rather than 'bought,' allowing the text to state possession without over-specifying the mechanism.
  chosen_spanish_reading: Traducir ἐκτήσατο como «adquirió» y no como «compró», dejando abierta la manera exacta en que el campo llegó a estar en su posesión.
  alternative_spanish_readings:
  - compró el campo
  - el campo fue adquirido con su dinero
  rationale: Esto evita resolver en la traducción la tensión armonizadora con Mateo 27:5–8. El griego permite una afirmación amplia de adquisición, y el español debe preservar esa amplitud en vez de cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente: usa una construcción equivalente a «with the wages of unrighteousness» en lugar de «from», mantiene «acquired» sin convertirlo en «bought», y conserva el orden narrativo y la imaginería física del final del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece Χριστός en el texto base.
  - «Injusticia» traduce ἀδικία con un sustantivo abstracto de fuerza jurídica/moral coherente con el uso del proyecto.
  - «Entrañas» conserva el valor concreto de σπλάγχνα sin suavizar el impacto narrativo.
