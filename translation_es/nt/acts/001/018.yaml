  text: Οὗτος μὲν οὖν ἐκτήσατο χωρίον ἐκ μισθοῦ τῆς ἀδικίας, καὶ πρηνὴς γενόμενος ἐλάκησεν μέσος, καὶ ἐξεχύθη πάντα τὰ σπλάγχνα αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/001/018.yaml
  text: So this man acquired a field with the wages of unrighteousness[a], and falling headlong he burst open in the middle[c][b], and all his intestines spilled out.
  footnotes:
  - marker: a
    text: Or 'with the reward of wickedness.' The Greek expression can be rendered more dynamically, but 'from the wages of unrighteousness' preserves the wording more closely.
    reason: lexical_alternative
  - marker: b
    text: Or 'having become prone' / 'having fallen face down.' The phrase likely describes a headlong fall.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'acquired' a field, which may describe possession obtained through the money associated with Judas, not necessarily a direct personal purchase.
    reason: alternative_reading
