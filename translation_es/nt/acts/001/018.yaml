    reason: alternative_reading
  - marker: b
    text: O «habiendo quedado boca abajo» / «habiendo caído de bruces». La expresión probablemente describe una caída de cabeza.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el audit trail inglés: se añade la nota faltante sobre el alcance de «adquirió», se coloca el marcador en el verbo correspondiente, y se fortalece «se abrió por el medio» a «se reventó por el medio» para reflejar mejor ἐλάκησεν.'
