review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: mantiene «adquirió» para ἐκτήσατο, preservando la tensión sobre cómo llegó el campo a ser suyo; «con el salario de la injusticia» sigue adecuadamente la revisión inglesa contextual de ἐκ; y la secuencia narrativa de la caída, apertura del cuerpo y derramamiento de las entrañas está conservada. Sin embargo, falta en español la nota equivalente a la nota inglesa sobre «adquirió», que documenta que no necesariamente implica compra personal directa. Además, el anclaje actual [a] en «campo» no es el lugar más natural para una nota sobre ἐκτήσατο.'
  spanish_quality_summary: El español es claro y legible, con registro moderno y digno. No obstante, «se abrió por el medio» suena algo débil frente a la fuerza de ἐλάκησεν; «se reventó por el medio» o «se reventó por la mitad» expresa mejor el verbo sin volverse demasiado técnico. También conviene mover la nota de adquisición al verbo «adquirió», donde corresponde semánticamente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Injusticia», «adquirió» y «entrañas» son defendibles en contexto. La decisión de no usar «compró» está bien alineada con la rationale teológica documentada. Se debe, sin embargo, conservar en notas la alternativa/explicación sobre adquisición vs. compra que el POB inglés sí preservó.
  issues:
  - severity: medium
    issue: Falta la nota equivalente a la nota inglesa sobre «acquired»
    rationale: El audit trail inglés conserva explícitamente una nota que aclara que «adquirió» puede referirse a posesión obtenida mediante el dinero asociado a Judas, no necesariamente a una compra personal directa. El español actual solo ofrece «O “compró”», lo cual no preserva toda la razón documentada.
  - severity: low
    issue: La nota [a] está anclada en «campo» en vez de «adquirió»
    rationale: La observación léxica corresponde al verbo ἐκτήσατο, no al sustantivo χωρίον. Mover el marcador mejora precisión editorial.
  - severity: low
    issue: «Se abrió por el medio» atenúa la viveza de ἐλάκησεν
    rationale: λακάω denota reventarse/abrirse violentamente. En español, «se reventó por el medio» comunica mejor la fuerza narrativa y sigue siendo natural.
  revised_spanish_text: Así que este hombre adquirió[a] un campo con el salario de la injusticia, y cayendo de cabeza[b], se reventó por el medio, y se derramaron todas sus entrañas.
  revised_footnotes:
