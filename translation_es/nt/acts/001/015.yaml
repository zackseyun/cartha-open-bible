translation:
  language: es
  text: Y en aquellos días, Pedro se levantó en medio de los hermanos[a] y dijo (y el número de personas reunidas era aproximadamente ciento veinte).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hermanos y hermanas'; el griego dice 'hermanos', pero en esta comunidad reunida la referencia puede incluir a todos los creyentes, incluidas las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Pedro antes de hablar. En español, 'se levantó' comunica con naturalidad el gesto de ponerse en pie para dirigirse al grupo, sin perder el valor concreto de la acción.
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - entre
  lexicon: BDAG
  rationale: La expresión indica ubicación dentro de un grupo reunido. 'En medio de' conserva la imagen espacial y es idiomático en español.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: El plural masculino se conserva como en el texto fuente. En español, 'los hermanos' puede funcionar como designación de la comunidad de creyentes, manteniendo la forma masculina documentada sin neutralizarla en el texto principal.
- source_word: ὄχλος ὀνομάτων
  english_pob_choice: the number of persons
  chosen_spanish: el número de personas
  alternatives_spanish:
  - la multitud de nombres
  - la compañía de personas
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática: literalmente algo como ''multitud de nombres'', pero se refiere a personas contadas. ''El número de personas'' refleja el sentido ya aclarado en el audit trail inglés, evitando una literalidad opaca en español.'
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: together
  chosen_spanish: reunidas
  alternatives_spanish:
  - juntas
  - en un mismo lugar
  lexicon: BDAG
  rationale: El modismo expresa que estaban congregados. 'Reunidas' transmite con naturalidad el estado colectivo indicado por el griego, y se integra bien en la frase española.
- source_word: ὡς ἑκατὸν εἴκοσι
  english_pob_choice: about one hundred twenty
  chosen_spanish: como de ciento veinte
  alternatives_spanish:
  - aproximadamente ciento veinte
  - unos ciento veinte
  lexicon: BDAG
  rationale: ὡς con número marca aproximación. 'Como de ciento veinte' conserva el matiz aproximativo con estilo sobrio y bíblico, sin añadir precisión inexistente.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφῶν en la comunidad reunida
  english_pob_reading: Render as 'brothers' in the main text, with a footnote noting the likely inclusive reference to fellow believers including women.
  chosen_spanish_reading: Mantener 'los hermanos' en el texto principal, con nota explicativa sobre su posible alcance inclusivo.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se preserva la forma masculina plural del original y la decisión auditada en inglés. La posible inclusión de mujeres queda documentada en la nota en vez de reemplazar la designación de base en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el marcador [a] exactamente en el texto principal. La redacción española también ajusta ὄχλος ὀνομάτων con base en la revisión inglesa, evitando una literalidad opaca y manteniendo el matiz idiomático del original.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' ausente porque este versículo no contiene el nombre divino.
  - Se evitó 'Cristo' porque no aparece Χριστός en el pasaje.
  - '''Hermanos'' se conserva como forma masculina plural documentada; la posible inclusión femenina queda en la nota.'
  - '''Como de ciento veinte'' refleja la aproximación del ὡς griego sin sobrerrepresentarla.'
