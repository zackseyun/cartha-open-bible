base_translation:
  language: en
  yaml_path: translation/nt/acts/001/013.yaml
  text: 'And when they had entered[a], they went up to the upper room where they were staying: Peter, and John, and James, and Andrew; Philip and Thomas; Bartholomew and Matthew; James the son of Alphaeus, and Simon the Zealot, and Judas the son of James.'
