translation:
  language: es
  text: 'Y cuando entraron, subieron al aposento alto donde se alojaban: Pedro, Juan, Santiago y Andrés; Felipe y Tomás; Bartolomé y Mateo; Santiago, hijo de Alfeo, y Simón el Zelote, y Judas, hijo de Santiago[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judas, hermano de Santiago». El griego dice solo «Judas de Santiago», dejando implícita la relación exacta.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσῆλθον
  english_pob_choice: had entered
  chosen_spanish: entraron
  alternatives_spanish:
  - habían entrado
  - ingresaron
  lexicon: BDAG
  rationale: El aoristo en la cláusula temporal con ὅτε marca una acción anterior a la principal; en español, el pretérito simple 'entraron' comunica de forma natural esa anterioridad contextual sin forzar un pluscuamperfecto que aquí no es necesario.
- source_word: εἰς τὸ ὑπερῷον ἀνέβησαν
  english_pob_choice: they went up to the upper room
  chosen_spanish: subieron al aposento alto
  alternatives_spanish:
  - subieron al cuarto alto
  - subieron al cuarto de arriba
  lexicon: BDAG
  rationale: La combinación de movimiento ascendente con destino se expresa bien en español con 'subieron al aposento alto'. 'Aposento alto' preserva el sentido espacial de ὑπερῷον y mantiene un registro bíblico inteligible sin depender de una fórmula eclesial demasiado cargada.
- source_word: ὑπερῷον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación superior
  lexicon: BDAG
  rationale: '''Aposento alto'' es una equivalencia tradicional y comprensible en español para un espacio elevado o del piso superior. Conserva el matiz arquitectónico sin restringir el pasaje a una asociación litúrgica específica.'
- source_word: οὗ ἦσαν καταμένοντες
  english_pob_choice: where they were staying
  chosen_spanish: donde se estaban quedando
  alternatives_spanish:
  - donde permanecían
  - donde estaban alojados
  lexicon: BDAG
  rationale: La idea es de permanencia continua. 'Se estaban quedando' comunica el carácter durativo de manera natural en español; 'permanecían' es posible, pero más formal y menos idiomático aquí.
- source_word: ὅ τε Πέτρος καὶ Ἰωάννης καὶ Ἰάκωβος καὶ Ἀνδρέας, Φίλιππος καὶ Θωμᾶς, Βαρθολομαῖος καὶ Μαθθαῖος
  english_pob_choice: Peter, and John, and James, and Andrew; Philip and Thomas; Bartholomew and Matthew
  chosen_spanish: Pedro, y Juan, y Jacobo, y Andrés; Felipe y Tomás; Bartolomé y Mateo
  alternatives_spanish:
  - Pedro, Juan, Jacobo y Andrés; Felipe y Tomás; Bartolomé y Mateo
  lexicon: BDAG
  rationale: Se conserva la lista de nombres y su agrupación visible en el griego. Se mantiene la repetición de 'y' antes de Juan y Jacobo para reflejar mejor la estructura enumerativa, siguiendo la revisión inglesa más reciente.
- source_word: Ἰάκωβος Ἁλφαίου
  english_pob_choice: James the son of Alphaeus
  chosen_spanish: Jacobo, hijo de Alfeo
  alternatives_spanish:
  - Jacobo de Alfeo
  - Jacobo, el hijo de Alfeo
  lexicon: BDAG
  rationale: El genitivo se entiende relacionalmente. 'Hijo de Alfeo' hace explícita la relación en español natural y evita una forma ambigua o demasiado literal.
- source_word: Σίμων ὁ ζηλωτὴς
  english_pob_choice: Simon the Zealot
  chosen_spanish: Simón el Zelote
  alternatives_spanish:
  - Simón el celoso
  - Simón el ferviente
  lexicon: BDAG
  rationale: ζηλωτής funciona aquí como epíteto identificador. 'El Zelote' es la forma más estable y transparente en español, y evita diluir el término en una paráfrasis moral.
- source_word: Ἰούδας Ἰακώβου
  english_pob_choice: Judas the son of James
  chosen_spanish: Judas, hijo de Jacobo
  alternatives_spanish:
  - Judas de Jacobo
  - Judas, hermano de Jacobo
  lexicon: BDAG
  rationale: El genitivo griego no explicita la relación. En español, 'hijo de Jacobo' sigue la opción más probable en un listado apostólico y conserva la tensión documentada mediante nota; se evita resolverla de forma absoluta.
theological_decisions:
- issue: Relación implicada por Ἰούδας Ἰακώβου
  english_pob_reading: 'Judas the son of James, with footnote: Or ''Judas brother of James.'' The Greek says only ''Judas of James,'' leaving the exact relationship implicit.'
  chosen_spanish_reading: Judas, hijo de Jacobo, con nota alternativa sobre 'hermano de Jacobo'
  alternative_spanish_readings:
  - Judas de Jacobo
  - Judas, hermano de Jacobo
  rationale: El texto griego deja implícita la relación exacta. Se conserva la lectura más probable en contexto apostólico, pero la nota mantiene la ambigüedad sin resolverla de manera dogmática o excesivamente interpretativa.
  doctrine_reference: Translation philosophy §3 (preservar la tensión textual cuando el original no la resuelve)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'upper room' frente a 'upstairs room' y añadió la repetición de 'and' en la lista. La versión española sigue esa estructura, pero usa 'aposento alto' como equivalente idiomático y natural de ὑπερῷον, conservando la secuencia y los grupos de nombres del griego.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Jacobo' para Ἰάκωβος en coherencia interna con este registro y con la identificación apostólica, evitando alternar entre 'Santiago' y 'Jacobo' en una misma lista.
  - '''Zelote'' se conserva como epíteto identificador, no como descripción moral.'
  - La puntuación con dos puntos tras 'se estaban quedando' reproduce la introducción de la lista de nombres de forma clara en español.
