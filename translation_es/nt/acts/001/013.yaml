    text: O «Judas, hermano de Santiago». El griego dice solo «Judas de Santiago», dejando implícita la relación exacta.
    reason: alternative_reading
  revision_rationale: Se revisa «Jacobo» a «Santiago» por naturalidad bíblica en español y mejor identificación apostólica; se sustituye «se estaban quedando» por «se alojaban» para un registro más digno y fluido; se aligera la puntuación de la lista sin perder su estructura. Se mantiene «aposento alto», «Simón el Zelote» y la nota que preserva la ambigüedad de Ἰούδας Ἰακώβου.
