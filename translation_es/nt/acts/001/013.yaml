review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: entrada, subida al cuarto superior, estancia continua y lista de los once. También conserva adecuadamente la ambigüedad de Ἰούδας Ἰακώβου mediante nota. Sin embargo, hay dos desajustes importantes con la fidelidad léxica y la legibilidad española: el uso de «Jacobo» para Ἰάκωβος resulta poco natural en español bíblico actual para el apóstol y crea aspereza innecesaria; además, «donde se estaban quedando» suena coloquial frente al registro del pasaje. Una leve revisión mejora fidelidad estilística sin alterar el sentido.'
  spanish_quality_summary: El texto es comprensible, pero «aposento alto» es aceptable aunque algo tradicional; el problema principal de calidad es «Jacobo», que en este contexto apostólico suele leerse mejor como «Santiago» en español eclesial amplio. También «se estaban quedando» suena conversacional; «se alojaban» o «se hospedaban» encaja mejor con un registro moderno y digno. La puntuación con comas antes de cada «y» reproduce en exceso la cadencia inglesa; en español es más natural aligerarla sin perder la estructura listal.
  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto. «Simón el Zelote» está bien. La nota sobre «Judas de Santiago/Jacobo» preserva la ambigüedad requerida. La principal decisión léxica a corregir es Ἰάκωβος: en español bíblico de lectura amplia, «Santiago» es la forma idiomática estable para este apóstol, mientras que «Jacobo» suena forzado aquí.'
  issues:
  - severity: medium
    issue: Uso de «Jacobo» para Ἰάκωβος en la lista apostólica
    rationale: Aunque formalmente relacionado con James/Jacob, en español eclesial y bíblico la forma idiomática para el apóstol en este contexto es «Santiago». Mantener «Jacobo» reduce naturalidad y puede sonar a calco no necesario.
  - severity: low
    issue: «donde se estaban quedando» suena demasiado coloquial
    rationale: El griego expresa estancia continua; «donde se alojaban» conserva el sentido con mejor registro en español digno y ampliamente legible.
  - severity: low
    issue: Puntuación algo anglicada en la enumeración inicial
    rationale: Las comas antes de cada «y» no son necesarias en español y hacen la lista más pesada. Puede mantenerse la estructura de agrupación sin esa sobrecarga.
  revised_spanish_text: 'Y cuando entraron, subieron al aposento alto donde se alojaban: Pedro, Juan, Santiago y Andrés; Felipe y Tomás; Bartolomé y Mateo; Santiago, hijo de Alfeo, y Simón el Zelote, y Judas, hijo de Santiago[a].'
  revised_footnotes:
