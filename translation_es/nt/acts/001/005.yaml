translation:
  language: es
  text: Porque Juan bautizó con agua[a], pero ustedes serán bautizados en el Espíritu Santo dentro de pocos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el Espíritu Santo». La preposición griega puede entenderse como «en» o «con».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: BDAG
  rationale: ὅτι introduce aquí la explicación del dicho previo; en español, «Porque» comunica con naturalidad esa relación causal/expositiva sin forzar una subordinación extraña.
- source_word: ἐβάπτισεν
  english_pob_choice: baptized
  chosen_spanish: bautizó
  alternatives_spanish:
  - sumergió
  - inmersó
  lexicon: BDAG
  rationale: «Bautizó» conserva el término religioso establecido y evita imponer una especificación de modo que el griego no exige.
- source_word: ὕδατι
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: BDAG
  rationale: El dativo instrumental se expresa naturalmente en español con «con agua», manteniendo el contraste con la frase siguiente.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  lexicon: BDAG
  rationale: Se conserva «en» para reflejar de manera transparente la preposición ἐν y no resolver de antemano la tensión interpretativa entre esfera y medio; «Espíritu Santo» funciona como referente personal definido en este contexto.
- source_word: βαπτισθήσεσθε
  english_pob_choice: you will be baptized
  chosen_spanish: serán bautizados
  alternatives_spanish:
  - serán sumergidos
  lexicon: BDAG
  rationale: La pasiva futura se rinde de forma directa con «serán bautizados», preservando el paralelismo con el bautismo de Juan y dejando implícito el agente, como en griego.
- source_word: οὐ μετὰ πολλὰς ταύτας ἡμέρας
  english_pob_choice: not many days from now
  chosen_spanish: dentro de no muchos días
  alternatives_spanish:
  - no después de muchos de estos días
  - no muchos días de aquí en adelante
  lexicon: BDAG
  rationale: «Dentro de no muchos días» expresa con naturalidad el valor temporal y deíctico de la expresión griega sin sonar forzado en español.
theological_decisions:
- issue: Cómo renderizar ἐν πνεύματι ἁγίῳ en un dicho sobre el bautismo con el Espíritu
  english_pob_reading: in the Holy Spirit
  chosen_spanish_reading: en el Espíritu Santo
  alternative_spanish_readings:
  - con el Espíritu Santo
  rationale: La preposición ἐν admite lectura locativa o instrumental. Se mantiene «en» en el texto principal para respetar la ambigüedad productiva del griego y no clausurar la cuestión de manera confesional; la alternativa «con» queda implícitamente reconocida por el mismo campo semántico.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del paquete fuente y con la auditoría inglesa: se mantiene el contraste agua/Espíritu, la temporalidad próxima y la tensión interpretativa de ἐν πνεύματι ἁγίῳ sin sobreespecificarla.'
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» como referente definido y personal, no como una expresión indefinida.
  - Se prefirió «bautizados» en lugar de un calco más duro como «inmersos», para conservar la terminología estable sin perder el vínculo léxico con el rito de Juan.
  - La nota al pie marca la única alternativa relevante preservada por la auditoría inglesa.
