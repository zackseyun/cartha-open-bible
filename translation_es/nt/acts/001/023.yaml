translation:
  language: es
  text: 'Y presentaron[a] a dos: José, llamado Barsabás, también llamado Justo, y Matías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nombraron» o «presentaron». El verbo griego puede significar poner personas delante de un grupo; aquí probablemente indica proponerlas como candidatas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: put forward
  chosen_spanish: presentaron
  alternatives_spanish:
  - propusieron
  - pusieron delante
  - presentaron ante la asamblea
  lexicon: BDAG
  rationale: En este contexto procedimental, el verbo no describe una postura física, sino la acción de poner a dos hombres ante el grupo como candidatos. «Presentaron» conserva bien ese sentido en español natural sin forzar una noción de nombramiento definitivo.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos personas
  - ambos
  lexicon: BDAG
  rationale: El numeral es directo y no requiere expansión. «Dos» reproduce con precisión la cantidad de candidatos.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  - Josef
  lexicon: Nombre propio
  rationale: 'El nombre propio se adapta a la forma usual en español bíblico: «José».'
- source_word: καλούμενον
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  - conocido como
  lexicon: BDAG
  rationale: El participio califica a José con un segundo nombre o designación. «Llamado» es la equivalencia más natural y fiel en español.
- source_word: Βαρσαββᾶν
  english_pob_choice: Barsabbas
  chosen_spanish: Barsabás
  alternatives_spanish:
  - Barsabás
  lexicon: Nombre propio
  rationale: Se translitera al uso castellano habitual como nombre propio bíblico.
- source_word: ἐπεκλήθη
  english_pob_choice: was also called
  chosen_spanish: también fue llamado
  alternatives_spanish:
  - también era llamado
  - era también llamado
  lexicon: BDAG
  rationale: El pasivo introduce un segundo nombre o sobrenombre. «También fue llamado» conserva la relación entre ambos nombres y expresa con claridad la equivalencia de designación.
- source_word: Ἰοῦστος
  english_pob_choice: Justus
  chosen_spanish: Justo
  alternatives_spanish:
  - Justo
  lexicon: Nombre propio
  rationale: Como nombre/título personal, en español se vierte «Justo», que mantiene la forma reconocible del cognomen.
- source_word: Μαθθίαν
  english_pob_choice: Matthias
  chosen_spanish: Matías
  alternatives_spanish:
  - Matías
  lexicon: Nombre propio
  rationale: Se usa la forma española habitual del nombre propio.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Y ... y
  lexicon: BDAG
  rationale: La coordinación simple del griego se refleja con la conjunción española inicial y final, manteniendo el ritmo narrativo.
translation_notes:
  revision_awareness: El texto griego presenta una acción de selección/propuesta de dos candidatos; la redacción española evita sugerir una elección formal ya consumada. Se conserva la doble designación de José/Justo sin diluirla.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - Se evita «Cristo», «SEÑOR» o vocabulario teológico ajeno porque no aparecen en este versículo.
  - Los nombres propios se castellanizan de forma estándar y consistente con uso bíblico español.
