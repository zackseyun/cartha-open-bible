translation:
  language: es
  text: hasta el día en que, después de haber dado mandatos[a] a los apóstoles por medio del Espíritu Santo a quienes había escogido, fue llevado arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu Santo». La preposición griega con genitivo puede expresar medio o agencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι ἧς ἡμέρας
  english_pob_choice: until the day when
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día cuando
  - hasta el día en que
  lexicon: BDAG
  rationale: La expresión marca el límite temporal del relato. «Hasta el día en que» conserva la estructura idiomática de forma natural en español y refleja el valor temporal de ἄχρι ἧς ἡμέρας sin añadir información.
- source_word: ἐντειλάμενος
  english_pob_choice: after giving commands
  chosen_spanish: después de haber dado mandatos
  alternatives_spanish:
  - después de haber mandado
  - tras dar instrucciones
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa una acción previa a la ascensión. «Dar mandatos» preserva mejor la fuerza de ἐντέλλομαι que «dar instrucciones», y mantiene el matiz más enérgico que el contexto exige.
- source_word: τοῖς ἀποστόλοις
  english_pob_choice: to the apostles
  chosen_spanish: a los apóstoles
  alternatives_spanish:
  - a los enviados
  lexicon: BDAG
  rationale: «Apóstoles» es el equivalente establecido y fiel para ἀπόστολοι en Lucas-Hechos. «Enviados» sería etimológicamente posible, pero aquí debilitaría la referencia reconocible al grupo designado por Jesús.
- source_word: διὰ πνεύματος ἁγίου
  english_pob_choice: through the Holy Spirit
  chosen_spanish: por medio del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - a través del Espíritu Santo
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o agencia. «Por medio del Espíritu Santo» mantiene la relación instrumental sin forzar una precisión doctrinal adicional. En español, esta forma suena clara y natural.
- source_word: οὓς ἐξελέξατο
  english_pob_choice: whom he had chosen
  chosen_spanish: a quienes había escogido
  alternatives_spanish:
  - a quienes escogió
  - a quienes había elegido
  lexicon: BDAG
  rationale: El relativo identifica a los apóstoles como los que Jesús ya había escogido antes del momento de la ascensión. «Había escogido» expresa bien la anterioridad; «escogido» se prefiere sobre «elegido» porque conserva mejor la correspondencia léxica con el verbo de elección y suena más bíblico sin volverse arcaico.
- source_word: ἀνελήμφθη
  english_pob_choice: he was taken up
  chosen_spanish: fue tomado arriba
  alternatives_spanish:
  - fue llevado arriba
  - fue tomado
  - fue levantado
  lexicon: BDAG
  rationale: Se conserva el sentido directo del pasivo y se evita añadir «al cielo», que no está expresado en este versículo. «Tomado arriba» traduce con transparencia el movimiento de ascensión; aunque menos idiomático que otras opciones, preserva el dato lexical sin interpretarlo de más.
theological_decisions:
- issue: Relación entre los mandatos de Jesús y el Espíritu Santo
  english_pob_reading: Jesus gave commands through the Holy Spirit to the apostles before he was taken up.
  chosen_spanish_reading: Jesús dio mandatos a los apóstoles por medio del Espíritu Santo antes de ser tomado arriba.
  alternative_spanish_readings:
  - Jesús dio mandatos a los apóstoles por el Espíritu Santo
  - Jesús, por medio del Espíritu Santo, dio mandatos a los apóstoles
  rationale: La sintaxis permite vincular διὰ πνεύματος ἁγίου con el acto de mandar. La redacción española mantiene esa relación instrumental sin resolverla en exceso ni separar artificialmente al Espíritu del acto de Jesús. Así se conserva la tensión teológica de Lucas-Hechos sobre la continuidad entre Jesús y el Espíritu.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el último pase revisado, que no introdujo cambios, y se mantuvo la alta concordancia del control cruzado. No se añadieron expansiones interpretativas fuera de la evidencia griega y del audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se mantuvo «Espíritu Santo» con mayúsculas por tratarse de la referencia personal al Espíritu.
  - «Apóstoles» conserva la terminología técnica estable en Hechos.
  - No se agregó «al cielo» en la ascensión porque el griego aquí solo dice ἀνελήμφθη.
  - La nota al pie marca la alternativa de medio/agencia en διά con genitivo, en paralelo con el audit trail inglés.
