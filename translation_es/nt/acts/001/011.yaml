translation:
  language: es
  text: 'También les dijeron[a]: «Hombres de Galilea, ¿por qué están mirando al cielo? Este Jesús, que fue llevado de entre ustedes al cielo, vendrá de la misma manera en que lo vieron ir al cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «Este mismo Jesús». El griego dice explícitamente «este Jesús»; «mismo» es una ampliación interpretativa para enfatizar la identidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες Γαλιλαῖοι
  english_pob_choice: Men of Galilee
  chosen_spanish: Hombres de Galilea
  alternatives_spanish:
  - Galileos
  - Hombres, galileos
  lexicon: BDAG
  rationale: Mantiene el vocativo plural y la referencia étnica/geográfica de forma natural en español. «Hombres de Galilea» conserva el tono directo del original sin volverlo más formal o más interpretativo de lo que exige el griego.
- source_word: τί ἑστήκατε βλέποντες
  english_pob_choice: why do you stand looking
  chosen_spanish: ¿por qué se quedan mirando
  alternatives_spanish:
  - ¿por qué están de pie mirando?
  - ¿por qué permanecen mirando?
  lexicon: BDAG
  rationale: El perfecto con fuerza de estado se expresa bien en español con «se quedan», y el participio acompaña con «mirando». Se evita una construcción rígida como «están de pie mirando» porque suena menos natural en español, pero se conserva la idea de permanecer inmóviles con la vista fija.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo del cielo
  - al cielo/los cielos
  - al cielo (al cielo, en sentido de los cielos)
  lexicon: BDAG
  rationale: En español, «cielo» comunica tanto la dirección como el ámbito celestial de manera idiomática. Aunque «heaven» en inglés se traduce a menudo por «cielo», aquí se preserva la dimensión ascensional sin imponer una fórmula más eclesiástica que el griego no exige.
- source_word: οὗτος ὁ Ἰησοῦς
  english_pob_choice: This Jesus
  chosen_spanish: Este Jesús
  alternatives_spanish:
  - Este mismo Jesús
  - Jesús, este
  lexicon: BDAG
  rationale: Se mantiene el demostrativo explícito sin añadir «mismo», porque el griego dice «este Jesús» y la ampliación tradicional sería interpretativa. La forma española conserva la identidad señalada por el texto y evita suavizar la fuerza deíctica.
- source_word: ὁ ἀναλημφθεὶς ἀφ’ ὑμῶν
  english_pob_choice: who was taken up from you
  chosen_spanish: que fue tomado de entre ustedes
  alternatives_spanish:
  - que fue llevado de entre ustedes
  - que fue alzado de entre ustedes
  - que fue tomado de ustedes
  lexicon: BDAG
  rationale: «Fue tomado» refleja bien el pasivo de ἀναλαμβάνω en contexto de ascensión. Se añade «de entre ustedes» para expresar la separación del grupo presente con un español más natural y relacional que un simple «de ustedes».
- source_word: εἰς τὸν οὐρανὸν / οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo/los cielos
  - al cielo (celestial)
  lexicon: BDAG
  rationale: La repetición de οὐρανός se conserva con la misma palabra española para que el lector perciba el movimiento de ascensión y la futura venida en el mismo marco celestial. «Al cielo» es la opción más clara y sobria en español.
- source_word: οὕτως ἐλεύσεται
  english_pob_choice: will come in the same way
  chosen_spanish: vendrá de la misma manera
  alternatives_spanish:
  - vendrá así
  - vendrá del mismo modo
  lexicon: BDAG
  rationale: «De la misma manera» comunica la referencia comparativa de οὕτως con buena fluidez en español. Se evita una forma demasiado literal como «así vendrá» que suena menos transparente para el lector contemporáneo.
- source_word: ὃν τρόπον
  english_pob_choice: that / in the same way that
  chosen_spanish: en que
  alternatives_spanish:
  - en la manera en que
  - como
  - tal como
  lexicon: BDAG
  rationale: Dado que la idea comparativa ya quedó expresada en «de la misma manera», «en que» permite introducir la subordinada sin redundancia. Es una solución idiomática que conserva la relación de modo del griego.
- source_word: ἐθεάσασθε
  english_pob_choice: you saw
  chosen_spanish: lo han visto
  alternatives_spanish:
  - lo vieron
  - lo vieron con sus propios ojos
  - lo han contemplado
  lexicon: BDAG
  rationale: El perfecto compuesto español ayuda a mantener la relevancia de la experiencia para los oyentes, y «visto» evita un matiz excesivamente literario. El objeto implícito se expresa con «lo» para mantener la referencia a Jesús sin repetir su nombre innecesariamente.
- source_word: πορευόμενον
  english_pob_choice: going
  chosen_spanish: ir
  alternatives_spanish:
  - marchar
  - partir
  - desplazarse
  lexicon: BDAG
  rationale: En español, el infinitivo dentro de «lo han visto ir al cielo» reproduce naturalmente la escena descrita por el participio presente. Se conserva la idea de movimiento sin introducir una interpretación adicional como «partir» o «marcharse».
theological_decisions:
- issue: Sentido de οὐρανός en la ascensión y el retorno
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielos
  - firmamento
  rationale: En este contexto narrativo-teológico, la referencia es al ámbito de la ascensión de Jesús y de su futura venida. «Cielo» permite mantener esa dimensión sin disolverla en una referencia meramente física al firmamento.
  doctrine_reference: Translation philosophy §1; afirmación cristiana histórica sobre ascensión y retorno de Cristo
- issue: Fuerza de οὗτος ὁ Ἰησοῦς
  english_pob_reading: This Jesus
  chosen_spanish_reading: Este Jesús
  alternative_spanish_readings:
  - Este mismo Jesús
  rationale: 'La lectura más ajustada al griego es la deíxis directa: Jesús mismo, ese Jesús del que ustedes fueron testigos. Se evita agregar «mismo» en el texto principal porque el valor de identidad ya está presente sin expansión interpretativa.'
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés (sin revisiones aplicadas) y el dictamen de alta concordancia, conservando las decisiones léxicas y teológicas principales. La nota sobre «This same Jesus» se mantuvo como alternativa tradicional, pero el texto español principal sigue el griego más de cerca.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - «Cielo» se usó de forma consistente para οὐρανός tanto en la pregunta como en la promesa de la venida.
  - Se prefirió un español sobrio y readable, evitando calcos como «mirando en» o «viendo hacia» que sonaban menos naturales.
