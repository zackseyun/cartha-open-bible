revisions:
- from: 'Pero les dijo[a][b]: «No les corresponde conocer los tiempos o las ocasiones que el Padre ha puesto en su propia autoridad».'
  to: 'Pero les dijo: «No les corresponde conocer los tiempos o las épocas señaladas[a] que el Padre ha fijado por su propia autoridad[b]».'
  rationale: Se ajusta καιροί a una opción más fiel y natural en español bíblico («épocas señaladas») y se cambia «en su propia autoridad» por «por su propia autoridad» en el texto principal para reflejar mejor el sentido auditado de ἐν τῇ ἰδίᾳ ἐξουσίᾳ. También se reubican los marcadores de nota a los lugares que realmente comentan.
