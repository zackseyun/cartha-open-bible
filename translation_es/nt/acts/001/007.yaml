base_translation:
  language: en
  yaml_path: translation/nt/acts/001/007.yaml
  text: But he said to them[b][a], “It is not for you to know times or seasons that the Father has set by his own authority.”
  footnotes:
  - marker: a
    text: Or “times or appointed times” or “times or epochs.” Greek distinguishes χρόνοι and καιροί, two related terms for temporal periods and appointed moments.
    reason: lexical_alternative
  - marker: b
    text: Or “in his own authority.” The Greek expression is literally “in his own authority,” meaning that the Father has reserved these matters to his own sovereign prerogative.
    reason: lexical_alternative
