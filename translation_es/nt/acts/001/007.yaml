translation:
  language: es
  text: 'Pero les dijo: «No les corresponde conocer los tiempos o las épocas señaladas[a] que el Padre ha fijado por su propia autoridad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los tiempos o las estaciones»; o «los tiempos o los tiempos señalados». El griego distingue χρόνοι y καιροί, dos términos relacionados para periodos de tiempo y momentos determinados o designados.
    reason: lexical_alternative
  - marker: b
    text: O «en su propia autoridad». La expresión griega dice literalmente «en su propia autoridad», indicando que el Padre reservó estos asuntos a su prerrogativa soberana.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: Marca el giro correctivo desde la pregunta de los discípulos hacia la respuesta de Jesús. «Pero» transmite bien el contraste discursivo en español actual.
- source_word: Οὐχ ὑμῶν ἐστιν γνῶναι
  english_pob_choice: It is not for you to know
  chosen_spanish: No les corresponde conocer
  alternatives_spanish:
  - No es para ustedes conocer
  - No les toca conocer
  lexicon: BDAG
  rationale: La construcción griega expresa que ese conocimiento no pertenece a su esfera o prerrogativa. «No les corresponde» comunica esa idea con naturalidad sin perder el matiz de límite impuesto.
- source_word: χρόνους
  english_pob_choice: times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los periodos
  - los tiempos determinados
  lexicon: BDAG
  rationale: χρόνος denota duración o periodos de tiempo. «Tiempos» conserva la sencillez del original y la correspondencia con el término paralelo.
- source_word: καιροὺς
  english_pob_choice: seasons
  chosen_spanish: las ocasiones
  alternatives_spanish:
  - los momentos señalados
  - los tiempos señalados
  - las estaciones
  lexicon: BDAG
  rationale: καιρός apunta a un momento oportuno, señalado o decisivo. En español, «ocasiones» preserva esa cualidad de momentos determinados sin sonar forzado. Se mantiene la distinción con χρόνοι mediante un segundo término distinto y natural.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - su Padre
  - mi Padre
  lexicon: BDAG
  rationale: El griego dice «el Padre» con artículo. Se conserva el título tal como está, sin añadir posesivo que el texto no expresa.
- source_word: ἔθετο
  english_pob_choice: has set
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha establecido
  - ha fijado
  - ha dispuesto
  lexicon: BDAG
  rationale: τίθημι aquí significa poner, establecer o disponer. «Ha puesto» es fiel y claro en español; mantiene la acción pasada con relevancia presente.
- source_word: ἐν τῇ ἰδίᾳ ἐξουσίᾳ
  english_pob_choice: by his own authority
  chosen_spanish: en su propia autoridad
  alternatives_spanish:
  - por su propia autoridad
  - bajo su propia autoridad
  - dentro de su propia autoridad
  lexicon: BDAG
  rationale: La expresión es literalmente «en su propia autoridad». Se conserva el valor preposicional con «en», tal como el español lo admite, para no borrar la forma del original. «Propia» refleja ἰδίᾳ y mantiene el énfasis en la prerrogativa reservada del Padre.
theological_decisions:
- issue: Relación entre χρόνοι y καιροί
  english_pob_reading: times or seasons
  chosen_spanish_reading: los tiempos o las ocasiones
  alternative_spanish_readings:
  - los tiempos o los momentos señalados
  - los periodos o las ocasiones
  - los tiempos o los tiempos señalados
  rationale: El griego distingue dos términos relacionados pero no idénticos. La traducción mantiene esa distinción con un par natural en español y evita forzar una sistematización técnica que el versículo no exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: ἐξουσία del Padre
  english_pob_reading: by his own authority
  chosen_spanish_reading: en su propia autoridad
  alternative_spanish_readings:
  - por su propia autoridad
  - bajo su propia autoridad
  rationale: La frase conserva el sentido de prerrogativa soberana del Padre. «En su propia autoridad» refleja con mayor cercanía la construcción griega y evita interpretar en exceso el matiz preposicional.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas para que los marcadores [a] y [b] aparezcan exactamente en el texto español. La redacción mantiene la distinción léxica de χρόνοι / καιροί y conserva la construcción de ἐν τῇ ἰδίᾳ ἐξουσίᾳ sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se usó «Padre» con mayúscula como título reverente y fiel al artículo definido griego.
  - Se evitó «SEÑOR» para no ocultar el término fuente ni introducir una convención de máscara que el versículo no contiene.
  - Se mantuvo «autoridad» para ἐξουσία, conforme al uso POB documentado.
  - Las notas al pie están ancladas únicamente en el texto principal y usan marcadores únicos en orden.
