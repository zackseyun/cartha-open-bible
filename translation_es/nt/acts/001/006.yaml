translation:
  language: es
  text: 'Así que, cuando se reunieron, le preguntaron, diciendo: «Señor, ¿en este tiempo restauras el reino para Israel[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Israel». El dativo griego puede entenderse como destinatario («a Israel») o como beneficio («para Israel»).
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ μὲν οὖν συνελθόντες
  english_pob_choice: So when they had come together
  chosen_spanish: Así que, cuando se habían reunido
  alternatives_spanish:
  - Entonces, cuando se habían reunido
  - Cuando se habían reunido
  lexicon: BDAG
  rationale: El participio aoristo συνελθόντες funciona temporalmente, introduciendo la circunstancia de la pregunta. La combinación μὲν οὖν marca avance discursivo; «Así que» comunica esa continuidad de forma natural en español sin forzar una estructura demasiado literal.
- source_word: ἠρώτων αὐτὸν
  english_pob_choice: they asked him
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - le estaban preguntando
  lexicon: BDAG
  rationale: El imperfecto ἠρώτων sugiere una acción descriptiva o repetida. En español, «le preguntaban» conserva ese matiz mejor que un pasado simple, y sigue siendo fluido en narrativa.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio introduce el contenido de la pregunta. «Diciendo» preserva la relación sintáctica del griego y evita añadir un conector que el texto no exige.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En la dirección directa a Jesús, «Señor» conserva el peso honorífico y teológico de κύριος. «Maestro» sería más restringido y no refleja tan bien la carga del título en este contexto.
- source_word: εἰ
  english_pob_choice: is it
  chosen_spanish: ¿en este tiempo restauras
  alternatives_spanish:
  - ¿si en este tiempo restauras
  lexicon: BDAG
  rationale: Aunque εἰ puede equivaler a «si», aquí introduce una pregunta de sí/no; en español, la interrogación queda mejor expresada por el orden y la entonación de la frase que por una traducción literal con «si».
- source_word: ἐν τῷ χρόνῳ τούτῳ
  english_pob_choice: at this time
  chosen_spanish: en este tiempo
  alternatives_spanish:
  - a esta altura
  - en este momento
  lexicon: BDAG
  rationale: χρόνος señala un período u ocasión, no solo un instante. «En este tiempo» preserva la proximidad temporal del griego y suena natural en español bíblico contemporáneo.
- source_word: ἀποκαθιστάνεις
  english_pob_choice: you are restoring
  chosen_spanish: restauras
  alternatives_spanish:
  - estás restaurando
  - reestableces
  lexicon: BDAG
  rationale: ἀποκαθίστημι expresa restaurar a un estado previo. En esta pregunta directa, el presente simple «restauras» suena más natural en español que una perífrasis progresiva, sin perder el sentido de restauración.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el gobierno real
  lexicon: BDAG
  rationale: βασιλεία puede significar reino o reinado. Aquí la expectativa de los discípulos se expresa con un sustantivo concreto; «el reino» preserva esa expectativa y es el equivalente más transparente en español.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en favor de Israel
  lexicon: BDAG
  rationale: El dativo puede leerse como destinatario o como ventaja. Siguiendo la nota auditada del POB inglés, «para Israel» mantiene abierta la posibilidad de sentido beneficiario sin perder la referencia a Israel como receptor de la restauración.
theological_decisions:
- issue: La expectativa de los discípulos sobre el reino de Israel
  english_pob_reading: Render the question straightforwardly as a restoration of 'the kingdom to Israel' without interpreting it as either purely political or purely spiritual.
  chosen_spanish_reading: Traducir la pregunta de forma directa como una restauración del reino para Israel, sin decidir en la traducción si la expectativa es política, espiritual o ambas.
  alternative_spanish_readings:
  - restauras el reino a Israel
  - restauras el reino de Israel
  rationale: El versículo registra la pregunta de los discípulos; no corresponde a la traducción resolver el sentido teológico de su expectativa. «Para Israel» preserva la tensión interpretativa reconocida en el aparato inglés y evita cerrar el pasaje prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador de nota [a] aparece exactamente en el texto español, anclado a «Israel». Se mantiene la tensión lexical documentada en el audit trail inglés sin resolverla de manera indebida.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en dirección directa a Jesús, conforme al criterio POB.
  - Se usa «reino» para βασιλεία, porque en este contexto la expectativa nacional concreta es parte del sentido.
  - Se usa «para Israel» en el texto principal para conservar la alternativa beneficiaria documentada en la nota inglesa.
  - El imperfecto griego se refleja con «preguntaban» para conservar aspecto descriptivo.
  - La puntuación de la cita respeta el uso español de comillas angulares y signos de interrogación invertidos.
