review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego: reunión previa, pregunta dirigida a Jesús como «Señor», y expectativa de restauración del reino para/con respecto a Israel. Sin embargo, hay dos desajustes con el POB auditado y con el griego narrativo: «le preguntaban» suena durativo/iterativo de manera más marcada de lo necesario para ἠρώτων en este contexto, donde el inglés auditado prefirió un pasado simple narrativo; y «se habían reunido» introduce un pluscuamperfecto innecesario donde el participio aoristo temporal se expresa mejor en español como «se reunieron» o «estaban reunidos».'
  spanish_quality_summary: El español es comprensible, pero «Así que, cuando se habían reunido, le preguntaban, diciendo» resulta algo pesado y poco natural. «Diciendo» es aceptable, pero combinado con «le preguntaban» y el pluscuamperfecto produce una frase rígida. Una reparación menor mejora claridad y fluidez sin perder estructura ni dignidad.
  glossary_alignment: «Señor» para Κύριε y «reino» para βασιλείαν están bien alineados. No hay conflicto con términos doctrinales del proyecto. La nota sobre τῷ Ἰσραήλ está bien preservada; en español conviene mantener el texto principal como «para Israel» si se desea seguir la apertura del aparato, con nota «O “a Israel”».
  issues:
  - severity: medium
    issue: Uso de pluscuamperfecto en «cuando se habían reunido»
    rationale: El participio aoristo συνελθόντες es temporal, no exige anterioridad remota. En español narrativo suena más natural «cuando se reunieron».
  - severity: medium
    issue: «Le preguntaban» suena demasiado durativo/iterativo
    rationale: Aunque ἠρώτων es imperfecto, el POB inglés justificó un pasado simple natural en narrativa. En este contexto «le preguntaron» comunica mejor el evento sin sugerir repetición innecesaria.
  - severity: low
    issue: 'Cadena verbal pesada: «Así que ... le preguntaron, diciendo»'
    rationale: Es fiel pero algo rígida. Con el ajuste del primer verbo, la frase queda suficientemente natural y no requiere reestructuración mayor.
  revised_spanish_text: 'Así que, cuando se reunieron, le preguntaron, diciendo: «Señor, ¿en este tiempo restauras el reino para Israel[a]?»'
  revised_footnotes:
  - marker: a
    text: O «a Israel». El dativo griego puede entenderse como destinatario («a Israel») o como beneficio («para Israel»).
    reason: lexical_alternative
  revision_rationale: 'La revisión hace una reparación pequeña pero importante: ajusta la secuencia verbal al uso narrativo natural del español y al análisis auditado del POB inglés, sin cambiar el sentido base ni la decisión teológica/lexical sobre «para Israel» con nota alternativa «a Israel».'
