translation:
  language: es
  text: Y llegó a saberse entre todos los que vivían en Jerusalén, de modo que aquel campo fue llamado en su propia lengua[a] Akeldamach[b], es decir, Campo de Sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su propio dialecto». El griego διάλεκτος puede referirse a una forma regional de hablar o, más generalmente, a una lengua.
    reason: lexical_alternative
  - marker: b
    text: Akeldamach sigue de cerca la forma griega Ἁκελδαμάχ; en la tradición de traducción suele aparecer como «Akeldama».
    reason: alternative_reading
lexical_decisions:
- source_word: γνωστὸν ἐγένετο
  english_pob_choice: it became known
  chosen_spanish: llegó a ser conocido
  alternatives_spanish:
  - se hizo conocido
  - pasó a ser conocido
  - llegó a saberse
  lexicon: BDAG
  rationale: La construcción impersonal griega expresa que el hecho se difundió y quedó conocido. «Llegó a ser conocido» conserva el matiz de proceso/resultación del original y suena natural en español bíblico moderno.
- source_word: πᾶσι τοῖς κατοικοῦσιν Ἰερουσαλήμ
  english_pob_choice: to all those living in Jerusalem
  chosen_spanish: por todos los que habitaban en Jerusalén
  alternatives_spanish:
  - a todos los que vivían en Jerusalén
  - a todos los residentes de Jerusalén
  - a todos los que habitaban en Jerusalén
  lexicon: BDAG
  rationale: El participio κατοικοῦσιν designa a quienes residen o habitan en un lugar. «Habitaban» mantiene el sentido de residencia estable y encaja bien con el registro narrativo.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  - con el resultado de que
  lexicon: BDAG
  rationale: Aquí ὥστε introduce resultado. «De modo que» expresa la relación causal-resultativa sin volverla demasiado inferencial.
- source_word: κληθῆναι
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - se llamó
  - vino a ser llamado
  - fue nombrado
  lexicon: BDAG
  rationale: El infinitivo pasivo aoristo después de ὥστε se refleja bien con una pasiva simple en español. «Fue llamado» es fiel y claro.
- source_word: τὸ χωρίον ἐκεῖνο
  english_pob_choice: that field
  chosen_spanish: aquel campo
  alternatives_spanish:
  - ese campo
  - aquella parcela
  - aquel lugar
  lexicon: BDAG
  rationale: χωρίον aquí se entiende como un terreno o campo; la glosa posterior «Campo de Sangre» confirma esa elección. «Aquel campo» preserva el demostrativo y la coherencia léxica con la explicación.
- source_word: τῇ ἰδίᾳ διαλέκτῳ αὐτῶν
  english_pob_choice: in their own language
  chosen_spanish: en su propia lengua
  alternatives_spanish:
  - en su propio dialecto
  - en su idioma propio
  - en su propia habla
  lexicon: BDAG
  rationale: διάλεκτος puede significar lengua o dialecto. «En su propia lengua» es natural en español y conserva la ambigüedad razonable sin forzar una tecnicidad innecesaria.
- source_word: Ἁκελδαμάχ
  english_pob_choice: Akeldamach
  chosen_spanish: Akeldamach
  alternatives_spanish:
  - Hakeldamach
  - Akeldama
  lexicon: BDAG
  rationale: Los nombres propios se transliteran. Se conserva la forma del griego Ἁκελδαμάχ, tal como hace la POB inglesa, para mantener trazabilidad al texto fuente.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  - que significa
  lexicon: BDAG
  rationale: La fórmula introduce una glosa explicativa. «Es decir» es la equivalencia natural en español para una aclaración formal.
- source_word: Χωρίον Αἵματος
  english_pob_choice: Field of Blood
  chosen_spanish: Campo de Sangre
  alternatives_spanish:
  - Campo de sangre
  - Campo sangriento
  - Campo de la Sangre
  lexicon: BDAG
  rationale: La glosa del propio griego se conserva como nombre explicativo. Se capitaliza como topónimo/denominación, igual que en la versión inglesa auditada.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la auditoría es alto; por eso se mantiene la estructura y el sentido del texto fuente sin expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva la distinción entre el nombre transliterado y la glosa explicativa final.
  - «Jerusalén» se mantiene como topónimo estándar en español bíblico.
  - No se reemplazó «lengua» por «dialecto» en el texto principal para evitar una precisión técnica no exigida por el contexto.
  - La puntuación reproduce la pausa resultativa y la aclaración final del original griego.
