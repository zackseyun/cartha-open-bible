translation:
  language: es
  text: sensatas, puras, trabajando en casa[a], bondadosas, sujetas a sus propios maridos[b], para que la palabra de Dios no sea blasfemada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ocupadas en el hogar' o 'dedicadas a las tareas del hogar'. El término griego es raro y se refiere a la labor doméstica.
    reason: lexical_alternative
  - marker: b
    text: O 'sometidas a sus propios maridos'.
    reason: lexical_alternative
  - marker: c
    text: O 'no sea injuriada' o, más literalmente, 'blasfemada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: σώφρονας
  english_pob_choice: self-controlled
  chosen_spanish: sensatas
  alternatives_spanish:
  - de dominio propio
  - moderadas
  - sobrias
  lexicon: BDAG
  rationale: El rasgo combina prudencia y autocontrol. 'Sensatas' comunica bien la idea de mente sobria y juicio práctico en español natural; 'de dominio propio' sería más explícito, pero más pesado en una lista de virtudes.
- source_word: ἁγνάς
  english_pob_choice: pure
  chosen_spanish: puras
  alternatives_spanish:
  - castas
  - moralmente puras
  lexicon: BDAG
  rationale: El término apunta a pureza, especialmente moral. 'Puras' es breve, natural y suficientemente amplio; 'castas' suena más restringido y puede sonar arcaico.
- source_word: οἰκουργούς
  english_pob_choice: working at home
  chosen_spanish: trabajando en casa
  alternatives_spanish:
  - ocupadas en el hogar
  - trabajando en el hogar
  - dedicadas a las tareas del hogar
  lexicon: BDAG
  rationale: El compuesto raro sugiere labor doméstica activa. 'Trabajando en casa' conserva el sentido de trabajo y evita convertir la frase en una restricción de encierro; 'ocupadas en el hogar' es posible, pero menos directa.
- source_word: ἀγαθάς
  english_pob_choice: kind
  chosen_spanish: bondadosas
  alternatives_spanish:
  - buenas
  - amables
  - benévolas
  lexicon: BDAG
  rationale: En una lista de virtudes, el adjetivo expresa una cualidad ética y relacional. 'Bondadosas' da ese tono en español mejor que el genérico 'buenas'.
- source_word: ὑποτασσομένας
  english_pob_choice: being subject to
  chosen_spanish: sujetas a
  alternatives_spanish:
  - sometidas a
  - subordinadas a
  - que se someten a
  lexicon: BDAG
  rationale: El participio describe una relación de orden o sujeción. 'Sujetas a' mantiene la fuerza relacional sin añadir matices más interpretativos; 'sometidas a' puede sonar más duro en español.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  english_pob_choice: to their own husbands
  chosen_spanish: a sus propios maridos
  alternatives_spanish:
  - a sus propios esposos
  - a sus propios hombres
  lexicon: BDAG
  rationale: ἀνήρ puede significar 'varón' o 'marido'; aquí el contexto doméstico exige 'maridos'. 'Propios' traduce ἰδίοις y limita la referencia al vínculo matrimonial.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - con el fin de que no
  lexicon: BDAG
  rationale: La cláusula expresa propósito negativo. 'Para que no' es la forma natural y clara en español, manteniendo la finalidad del texto.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: '''Palabra de Dios'' es la equivalencia directa y establecida en español bíblico, sin ocultar el referente divino.'
- source_word: βλασφημῆται
  english_pob_choice: may not be slandered
  chosen_spanish: no sea blasfemada
  alternatives_spanish:
  - no sea calumniada
  - no sea injuriada
  - no sea vilipendiada
  lexicon: BDAG
  rationale: Aquí el verbo puede significar hablar contra con deshonra o irreverencia. Como el objeto es 'la palabra de Dios', 'blasfemada' conserva la cercanía léxica al griego y mantiene el peso religioso del término; 'calumniada' sería más moderno, pero menos preciso en este contexto.
theological_decisions:
- issue: Cómo reflejar la rareza de οἰκουργούς sin exagerar una norma de reclusión doméstica
  english_pob_reading: working at home
  chosen_spanish_reading: trabajando en casa
  alternative_spanish_readings:
  - ocupadas en el hogar
  - dedicadas a las tareas del hogar
  rationale: La expresión apunta a actividad doméstica productiva, no a una clausura explícita. 'Trabajando en casa' conserva ese sentido y evita sobreinterpretar el alcance social del versículo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no añadir restricciones no explicitadas por el texto griego.'
- issue: Cómo traducir ὑποτασσομένας sin importar un sistema doctrinal completo sobre relaciones matrimoniales
  english_pob_reading: being subject to their own husbands
  chosen_spanish_reading: sujetas a sus propios maridos
  alternative_spanish_readings:
  - sometidas a sus propios maridos
  - que se someten a sus propios maridos
  rationale: El participio sí afirma una relación de sujeción ordenada en el matrimonio. 'Sujetas a' mantiene la afirmación con sobriedad y evita fórmulas más cargadas doctrinalmente; 'sus propios maridos' preserva el límite relacional del texto.
  doctrine_reference: 'Affirmations and translation philosophy: no importar un distintivo denominacional que el griego no exprese de manera inequívoca.'
translation_notes:
  revision_awareness: Se revisó el pasaje con el último pase disponible y no se detectaron cambios pendientes; la redacción española sigue de cerca el texto griego y el archivo auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'palabra de Dios' para λόγος τοῦ θεοῦ, conforme al criterio del proyecto.
  - Se traduce δοῦλος no aplica aquí; no se introducen términos eclesiásticos ajenos al contexto.
  - Se usa 'maridos' para ἀνδράσιν por el contexto doméstico y la especificación 'propios'.
  - Se conserva la fuerza de la cláusula de propósito con 'para que no'.
  - Se evita 'SEÑOR' porque el texto no contiene κύριος ni una cita del nombre divino.
