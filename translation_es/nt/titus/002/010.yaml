translation:
  language: es
  text: no hurtando, sino mostrando toda buena fe[a], para que en todo adornen la enseñanza de Dios nuestro Salvador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mostrando plena fidelidad» o «demostrando total confiabilidad». El griego usa πίστις, que con frecuencia se traduce «fe», pero aquí probablemente tiene el sentido ético de fidelidad o confiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νοσφιζομένους
  english_pob_choice: not pilfering
  chosen_spanish: no defraudando
  alternatives_spanish:
  - no hurtando
  - no apropiándose indebidamente
  - no sustrayendo
  lexicon: BDAG
  rationale: El verbo νοσφίζομαι expresa apartar para sí lo ajeno o retener indebidamente; en este contexto de conducta servil, “defraudar” comunica bien la idea de apropiarse o retener lo que no corresponde, sin sonar demasiado específico como “malversar”.
- source_word: πᾶσαν πίστιν ἐνδεικνυμένους ἀγαθήν
  english_pob_choice: showing all good faith
  chosen_spanish: mostrando toda buena fidelidad
  alternatives_spanish:
  - mostrando toda buena fe
  - mostrando completa fidelidad
  - demostrando plena confiabilidad
  lexicon: BDAG
  rationale: Aquí πίστις tiene fuerza ética de confiabilidad/fidelidad más que solo “fe” interior. “Fidelidad” conserva el valor relacional y moral del término, y “toda” refleja πᾶσαν como totalidad/completitud. “Buena” mantiene ἀγαθήν.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - fidelidad
  - confiabilidad
  - lealtad
  lexicon: BDAG
  rationale: Aunque πίστις suele renderizarse “fe”, el contexto de conducta ante amos favorece el sentido de lealtad/confiabilidad. Se eligió “fidelidad” en el texto principal para no perder ese matiz ético, manteniendo la carga de confianza activa.
- source_word: κοσμῶσιν
  english_pob_choice: may adorn
  chosen_spanish: adornen
  alternatives_spanish:
  - embellezcan
  - honren
  - adornaran
  lexicon: BDAG
  rationale: κοσμέω conserva la metáfora de “adornar” o embellecer. “Adornen” reproduce la imagen sin explicación añadida y funciona naturalmente en español bíblico contemporáneo.
- source_word: διδασκαλίαν
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: “Enseñanza” es el equivalente más natural y fiel para διδασκαλία en español moderno. Evita cargar el término con una tecnicidad confesional que el contexto no exige.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: of God our Savior
  chosen_spanish: de Dios nuestro Salvador
  alternatives_spanish:
  - de nuestro Salvador Dios
  - de Dios, nuestro Salvador
  - de nuestro Dios Salvador
  lexicon: BDAG
  rationale: El genitivo se vierte de manera natural como “de Dios nuestro Salvador”, manteniendo el título pastoral sin forzar una lectura cristológica explícita más allá de la forma del texto.
- source_word: ἐν πᾶσιν
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo asunto
  - en todo aspecto
  lexicon: BDAG
  rationale: “En todo” es una forma breve y natural en español que reproduce el alcance global de ἐν πᾶσιν sin sobrecargar la frase.
theological_decisions:
- issue: Valor de πίστις en un contexto ético
  english_pob_reading: Main text keeps 'faith' in the phrase 'all good faith'; footnote preserves ethical alternatives like faithfulness and trustworthiness.
  chosen_spanish_reading: El texto principal usa “fidelidad”; la nota conserva la alternativa de “fe” con sentido ético de confiabilidad.
  alternative_spanish_readings:
  - fe
  - fidelidad completa
  - confiabilidad
  - lealtad
  rationale: En este versículo el contexto apunta a conducta confiable, no principalmente a creencia interior. Por eso el texto principal da prioridad al sentido ético, pero la nota recuerda que πίστις también puede entenderse como “fe” con matiz de fidelidad.
  doctrine_reference: 'DOCTRINE.md: πίστις en contextos de conducta; principio de mantener la alternativa cuando el sentido ético es debatible.'
- issue: Referencia de 'Dios nuestro Salvador'
  english_pob_reading: Rendered as 'God our Savior' without collapsing it into an explicit reference to Christ.
  chosen_spanish_reading: “Dios nuestro Salvador” se conserva sin explicitar una referencia cristológica adicional.
  alternative_spanish_readings:
  - nuestro Salvador Dios
  - Dios, nuestro Salvador
  - nuestro Dios Salvador
  rationale: El texto griego nombra a Dios como Salvador; la traducción debe preservar esa formulación sin introducir una identificación que el versículo no enuncia de manera explícita.
  doctrine_reference: 'DOCTRINE.md: preservación de títulos divinos según el texto; no inferir más allá del enunciado explícito.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que afinó el matiz de νοσφιζομένους hacia “pilfering/misappropriating”. Por eso el español evita un término demasiado genérico y opta por “defraudando”, que comunica apropiación indebida sin perder naturalidad. También se respetó la decisión revisada de conservar el valor ético de πίστις en una nota, mientras el texto principal privilegia el sentido contextual de fidelidad.
  spanish_consistency_notes:
  - Se mantiene “Dios” para θεός y “Salvador” para σωτήρ, conforme al estilo del proyecto.
  - Se usa “enseñanza” para διδασκαλία, en línea con un registro claro y moderno.
  - Se evita “SEÑOR” como sustituto de Yahvé porque este versículo no contiene el nombre divino hebreo; la frase griega cita el título “Dios nuestro Salvador”.
  - La puntuación busca reflejar una cláusula participial inicial seguida de propósito final con “para que”.
