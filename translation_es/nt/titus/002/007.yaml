translation:
  language: es
  text: en todos los aspectos[a] presentándote como modelo[b] de buenas obras; en tu enseñanza[c], pureza[d], dignidad[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todo». La frase griega también puede traducirse más formalmente como «con respecto a todo» o «en todas las cosas», pero aquí probablemente significa «en todos los aspectos».
    reason: lexical_alternative
  - marker: b
    text: O «ejemplo» o «patrón» de buenas obras.
    reason: lexical_alternative
  - marker: c
    text: O «en la enseñanza» o «en doctrina».
    reason: lexical_alternative
  - marker: d
    text: O «incorrupción» o «integridad».
    reason: lexical_alternative
  - marker: e
    text: O «seriedad» o «gravedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todos los aspectos
  - de todas maneras
  lexicon: BDAG
  rationale: La expresión funciona adverbialmente con el participio y señala amplitud de conducta, no solo tema. «En todo» conserva esa cobertura amplia de modo natural en español.
- source_word: σεαυτὸν παρεχόμενος
  english_pob_choice: presenting yourself
  chosen_spanish: presentándote tú mismo
  alternatives_spanish:
  - mostrándote a ti mismo
  - ofreciéndote a ti mismo
  lexicon: BDAG
  rationale: El participio medio reflexivo exige que Tito sea el sujeto que se exhibe o se presenta como referencia visible. «Presentándote tú mismo» mantiene la fuerza reflexiva y suena natural antes del complemento predicativo.
- source_word: τύπον
  english_pob_choice: an example
  chosen_spanish: modelo
  alternatives_spanish:
  - ejemplo
  - patrón
  lexicon: BDAG
  rationale: En este contexto ético, τύπος designa una figura a imitar. «Modelo» comunica bien la idea de ejemplaridad sin sonar demasiado abstracto, y conserva la posibilidad de imitación práctica.
- source_word: καλῶν ἔργων
  english_pob_choice: of good works
  chosen_spanish: de buenas obras
  alternatives_spanish:
  - de buenas obras
  - de buenas acciones
  lexicon: BDAG
  rationale: «Buenas obras» reproduce con fidelidad la unidad léxica tradicional del sintagma y su sentido moral general. Se evita «acciones» porque debilita la formulación bíblica usual sin necesidad.
- source_word: ἐν τῇ διδασκαλίᾳ
  english_pob_choice: in your teaching
  chosen_spanish: en tu enseñanza
  alternatives_spanish:
  - en la enseñanza
  - en doctrina
  lexicon: BDAG
  rationale: El contexto apunta a la actividad de enseñar de Tito. «Tu enseñanza» hace explícito el referente personal en español y evita el lenguaje eclesiástico más técnico de «doctrina» cuando no es imprescindible.
- source_word: ἀφθορίαν
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - incorrupción
  - integridad
  lexicon: BDAG
  rationale: Aunque el término puede sugerir incorrupción en sentido más literal, el contexto de la enseñanza favorece una cualidad moral y doctrinal no corrompida. «Pureza» es la opción española más natural y fiel al valor adoptado en la revisión inglesa reciente.
- source_word: σεμνότητα
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - seriedad
  - gravedad
  lexicon: BDAG
  rationale: Σεμνότης expresa una seriedad respetable y honorable. «Dignidad» comunica bien esa cualidad en español contemporáneo, sin perder el tono reverente y sobrio del término.
theological_decisions:
- issue: Si traducir περὶ πάντα como alcance total o como relación temática
  english_pob_reading: '''in every way'' rather than ''concerning everything'''
  chosen_spanish_reading: «en todo» como cobertura total de conducta
  alternative_spanish_readings:
  - «con respecto a todo»
  - «en todas las cosas»
  rationale: La construcción adverbial aquí describe el modo global de la conducta de Tito. En español, «en todo» preserva la amplitud sin convertir la frase en una indicación temática sobre asuntos concretos.
  doctrine_reference: Translation philosophy §3
- issue: Cómo reflejar ἀφθορίαν sin cerrar indebidamente su alcance
  english_pob_reading: '''purity'' with awareness of the broader lexical range'
  chosen_spanish_reading: «pureza»
  alternative_spanish_readings:
  - «incorrupción»
  - «integridad»
  rationale: El término puede apuntar tanto a pureza moral como a enseñanza no contaminada. «Pureza» conserva la amplitud ética sin imponer una tecnificación excesiva en español, y evita una lectura demasiado estrecha.
  doctrine_reference: Translation philosophy §3
- issue: Si usar terminología doctrinal para διδασκαλίᾳ
  english_pob_reading: '''teaching'' rather than ''doctrine'''
  chosen_spanish_reading: «enseñanza»
  alternative_spanish_readings:
  - «doctrina»
  - «instrucción»
  rationale: El pasaje manda a Tito a mostrar una manera concreta de enseñar. «Enseñanza» mantiene el carácter activo y relacional del término y evita sustituirlo por una abstracción doctrinal que el contexto no exige.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La tradición auditada en inglés fue revisada recientemente en ἀφθορίαν, pasando de «incorruptibility» a «purity». Esta versión española sigue la lectura revisada y la expresa como «pureza», manteniendo abierta la amplitud lexical del término griego sin forzar una tecnificación innecesaria. También se conserva la preferencia del POB por un equivalente funcional de περὶ πάντα como alcance global, y por «teaching/enseñanza» frente a «doctrine/doctrina».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Buenas obras» reproduce la terminología ética habitual del proyecto para καλὰ ἔργα.
  - Se usa «enseñanza» y no «doctrina» para conservar el carácter activo del contexto.
  - La nota al pie se ancla en «tú mismo[a]» para reflejar la alternativa de alcance de περὶ πάντα sin duplicar notas.
