translation:
  language: es
  text: Porque la gracia de Dios ha aparecido[a], trayendo salvación a todas las personas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha aparecido, salvando a todas las personas» o «ha aparecido para todas las personas». El adjetivo griego σωτήριος («salvadora», «que trae salvación») y la frase πᾶσιν ἀνθρώποις pueden entenderse de maneras ligeramente distintas.
    reason: lexical_alternative
  - marker: b
    text: «Todas las personas» traduce ἀνθρώποις en sentido genérico para la humanidad, no solo para varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεφάνη
  english_pob_choice: has appeared
  chosen_spanish: se ha manifestado
  alternatives_spanish:
  - ha aparecido
  - se ha hecho visible
  - ha resplandecido
  lexicon: ἐπιφαίνω
  rationale: El aoristo pasivo intransitivo expresa una manifestación ya ocurrida con efecto presente. En español, «se ha manifestado» conserva la idea de aparición/revelación sin sonar artificial, y mantiene el matiz epifánico del verbo mejor que un simple «aparecido» aislado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: γάρ
  rationale: Introduce la base explicativa de lo anterior. «Porque» es natural en español y conserva la función causal o justificativa del conector.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gracioso
  - benevolencia
  lexicon: χάρις
  rationale: «Gracia» es el equivalente más directo y estable en el uso paulino. Preserva tanto el favor divino como su eficacia salvífica sin ampliar indebidamente el sentido.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: θεός
  rationale: El genitivo posesivo/atributivo se vierte naturalmente como «de Dios», con transparencia formal y sin añadir una relación que el griego no exige.
- source_word: σωτήριος
  english_pob_choice: bringing salvation
  chosen_spanish: trayendo salvación
  alternatives_spanish:
  - salvadora
  - que trae salvación
  - salvífica
  lexicon: σωτήριος
  rationale: El adjetivo modifica «gracia» y expresa su cualidad salvífica. En español, «trayendo salvación» refleja bien la función del término tal como la traduce el POB en inglés, evitando la ambigüedad de un adjetivo más técnico o menos idiomático.
- source_word: πᾶσιν ἀνθρώποις
  english_pob_choice: to all people
  chosen_spanish: a todos los seres humanos
  alternatives_spanish:
  - a todas las personas
  - para todos los seres humanos
  - a todos
  lexicon: πᾶς + ἄνθρωπος
  rationale: La expresión griega es genérica para la humanidad, no solo para varones. «Seres humanos» deja explícita la universalidad del alcance y evita una lectura masculinizante, manteniendo el valor inclusivo del original.
theological_decisions:
- issue: Alcance universal de πᾶσιν ἀνθρώποις
  english_pob_reading: Rendered as 'to all people' to preserve the text's universal scope without specifying whether Paul means every individual without exception or all kinds/classes of people.
  chosen_spanish_reading: «a todos los seres humanos» conserva el alcance universal sin decidir entre 'cada individuo sin excepción' o 'toda clase de personas'.
  alternative_spanish_readings:
  - a todas las personas
  - para todos los seres humanos
  - a todos
  rationale: El texto afirma la amplitud de la gracia de Dios; sin embargo, su implicación soteriológica exacta se debate en el contexto de Tito 2. La traducción debe preservar esa amplitud sin resolver la tensión doctrinal por adelantado.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La base inglesa pasó de «for all people» a «to all people» para una mejor naturalidad; la versión española sigue esa orientación con una preposición de destino/beneficio («a») y conserva el matiz de universalidad del dativo griego.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις, según el uso paulino estándar en POB.
  - Se usa «Dios» para θεός sin mayúsculas especiales adicionales en el texto.
  - «seres humanos» evita un masculino genérico innecesario y preserva la referencia universal.
  - No se introduce «Mesías» ni terminología cristológica ajena al versículo.
