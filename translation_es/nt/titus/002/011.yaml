review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del griego: γὰρ como explicación, ἡ χάρις τοῦ θεοῦ como sujeto, Ἐπεφάνη con sentido epifánico, y σωτήριος πᾶσιν ἀνθρώποις como salvación con alcance universal. Sin embargo, «se ha manifestado» es algo más interpretativo que el inglés auditado «has appeared» y que el griego Ἐπεφάνη; además, la nota a omite una de las alternativas documentadas en la auditoría inglesa («ha aparecido a todos» / «ha aparecido para todos»).'
  spanish_quality_summary: El español es claro y digno, pero «a todos los seres humanos» suena más pesado de lo necesario en un texto eclesial corrido. «A todas las personas» o «a todos» sería más natural; de esas, «a todas las personas» preserva bien la explicitud inclusiva. También «ha aparecido» es más directo y idiomático aquí que «se ha manifestado», sin perder el matiz epifánico.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Gracia» y «Dios» están bien. La decisión inclusiva para ἀνθρώποις debe mantenerse, pero conviene evitar la formulación más técnica «seres humanos» en el texto principal cuando una opción más natural en español logra el mismo fin.
  issues:
  - severity: medium
    issue: «se ha manifestado» para Ἐπεφάνη
    rationale: Aunque es posible, desplaza el verbo desde «aparecer» hacia «manifestarse», añadiendo un matiz interpretativo. El POB en inglés y el valor usual de ἐπιφαίνω aquí favorecen «ha aparecido».
  - severity: medium
    issue: «a todos los seres humanos» suena pesado en español bíblico corriente
    rationale: Preserva bien el sentido inclusivo, pero resulta menos natural y más técnico que «a todas las personas», que comunica el mismo alcance genérico sin masculinizante ni rigidez.
  - severity: low
    issue: La nota [a] no conserva todas las alternativas significativas de la auditoría inglesa
    rationale: La auditoría inglesa registra también la posibilidad de entender la frase como «has appeared to all people» o «saving all people». La nota española debería reflejar esa elasticidad sintáctica con más precisión.
  revised_spanish_text: Porque la gracia de Dios ha aparecido[a], trayendo salvación a todas las personas[b].
  revised_footnotes:
  - marker: a
    text: O «ha aparecido, salvando a todas las personas» o «ha aparecido para todas las personas». El adjetivo griego σωτήριος («salvadora», «que trae salvación») y la frase πᾶσιν ἀνθρώποις pueden entenderse de maneras ligeramente distintas.
    reason: lexical_alternative
  - marker: b
    text: «Todas las personas» traduce ἀνθρώποις en sentido genérico para la humanidad, no solo para varones.
    reason: lexical_alternative
