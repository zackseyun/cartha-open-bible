translation:
  language: es
  text: con un habla sana[a], que no pueda ser condenada[b], para que el que se opone[c] quede avergonzado, no teniendo nada malo que decir acerca de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "palabra sana" o "mensaje sano".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "irreprochable" o "no expuesta a censura".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "el de la parte contraria", es decir, un oponente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον
  english_pob_choice: speech
  chosen_spanish: habla / palabras
  alternatives_spanish:
  - palabra
  - mensaje
  - discurso
  lexicon: BDAG
  rationale: En este contexto λόγον se refiere al contenido y manera de hablar en la exhortación pastoral, no a una sola 'palabra'. 'Habla' conserva el valor de discurso, y 'palabras' ayuda a sonar natural en español con los adjetivos que siguen.
- source_word: ὑγιῆ
  english_pob_choice: sound
  chosen_spanish: sanas
  alternatives_spanish:
  - saludables
  - sólidas
  - íntegras
  lexicon: BDAG
  rationale: "La metáfora pastoral de ense\0f1anza/habla 'sana' se entiende bien en español y preserva la idea de rectitud doctrinal y moral sin volver el texto torpe."
- source_word: ἀκατάγνωστον
  english_pob_choice: that cannot be condemned
  chosen_spanish: irreprensibles
  alternatives_spanish:
  - inculpables
  - no sujetas a censura
  - que no pueden ser condenadas
  lexicon: BDAG
  rationale: El adjetivo expresa algo que no puede ser justamente censurado o condenado. 'Irreprensibles' es una forma natural en español bíblico actual y mantiene la fuerza reputacional/judicial del término.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. 'Para que' es la equivalencia natural y clara en español.
- source_word: ὁ ἐξ ἐναντίας
  english_pob_choice: the one who opposes us
  chosen_spanish: el que se opone
  alternatives_spanish:
  - el opositor
  - el de la parte contraria
  - el adversario
  lexicon: BDAG
  rationale: La expresión griega describe a un oponente de la parte contraria. 'El que se opone' comunica el sentido sin sobreespecificar más de lo que el griego dice.
- source_word: ἐντραπῇ
  english_pob_choice: may be put to shame
  chosen_spanish: se avergüence
  alternatives_spanish:
  - sea avergonzado
  - quede avergonzado
  - sea puesto en vergüenza
  lexicon: BDAG
  rationale: El pasivo subjuntivo puede expresar ser traído a vergüenza. En español, 'se avergüence' captura bien ese efecto social y moral; la nota explica la alternativa más fuerte si se desea.
- source_word: μηδὲν ἔχων λέγειν
  english_pob_choice: having nothing ... to say
  chosen_spanish: no teniendo nada ... que decir
  alternatives_spanish:
  - sin tener nada que alegar
  - no teniendo nada que decir
  - sin nada que decir
  lexicon: BDAG
  rationale: La construcción participial se vierte de manera idiomática en español como 'no teniendo nada que decir', conservando la idea de ausencia de acusación válida.
- source_word: περὶ ἡμῶν
  english_pob_choice: about us
  chosen_spanish: acerca de nosotros
  alternatives_spanish:
  - sobre nosotros
  - respecto de nosotros
  lexicon: BDAG
  rationale: Se mantiene el plural de primera persona del griego sin restringirlo a una referencia más estrecha. 'Acerca de nosotros' es claro y natural.
- source_word: φαῦλον
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - vil
  - perverso
  lexicon: BDAG
  rationale: φαῦλος puede significar malo, ruin o de mala calidad moral. En este contexto de calumnia, 'malo' funciona bien y evita sonar excesivamente interpretativo; el adjetivo ya queda reforzado por el contexto.
theological_decisions:
- issue: Alcance del plural de primera persona en περὶ ἡμῶν
  english_pob_reading: Rendered simply as 'about us' without narrowing the referent.
  chosen_spanish_reading: Se conserva 'acerca de nosotros' sin concretar si refiere a Pablo y Tito, a la misión, o a la comunidad cristiana en general.
  alternative_spanish_readings:
  - acerca de ustedes
  - acerca de los cristianos
  - acerca de nuestra enseñanza
  rationale: El griego usa primera persona plural y no precisa más. Mantener esa forma evita introducir una identificación más estrecha o más amplia que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del cotejo, sin cambios sustanciales respecto del sentido auditado en inglés. Se ajusta al español natural manteniendo las tensiones léxicas: λόγον como habla/palabras, ἀκατάγνωστον como irreprensibles, y ὁ ἐξ ἐναντίας como el que se opone.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' y 'Yahvé' según el estándar del proyecto; este versículo no los contiene.
  - Se conserva el plural de primera persona ('nosotros') sin expansión interpretativa.
  - '''Irreprensibles'' se usa como equivalente funcional de ''cannot be condemned'' en un contexto moral y reputacional.'
  - No se reemplaza 'se opone' por un término doctrinalmente cargado como 'adversario', porque el griego describe a un opositor en contexto retórico más que introducir un título fijo.
