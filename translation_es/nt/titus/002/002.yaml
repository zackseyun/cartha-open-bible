translation:
  language: es
  text: Los hombres mayores han de ser sobrios, dignos, sensatos, sanos en la fe[a], en el amor y en la perseverancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». El griego πίστις puede significar «fe» o «fidelidad» según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: πρεσβύτας
  english_pob_choice: older men
  chosen_spanish: los hombres mayores
  alternatives_spanish:
  - los ancianos
  - los hombres de edad avanzada
  lexicon: BDAG
  rationale: En este contexto de instrucciones domésticas, el término se refiere a varones de mayor edad, no al oficio eclesiástico de ancianos. «Hombres mayores» conserva el referente masculino y suena natural en español.
- source_word: νηφαλίους
  english_pob_choice: temperate
  chosen_spanish: sobrios
  alternatives_spanish:
  - templados
  - moderados
  - sensatos
  lexicon: BDAG
  rationale: El adjetivo puede aludir a sobriedad literal y, por extensión, a autocontrol. «Sobrios» mantiene esa amplitud en español y funciona bien en una lista de virtudes; además deja abierta la resonancia ética de dominio propio.
- source_word: σεμνούς
  english_pob_choice: dignified
  chosen_spanish: dignos
  alternatives_spanish:
  - respetables
  - serios
  lexicon: BDAG
  rationale: El término expresa una gravedad/nobleza que merece respeto. «Dignos» es claro y natural en español, sin reducirlo a mera severidad.
- source_word: σώφρονας
  english_pob_choice: self-controlled
  chosen_spanish: sensatos
  alternatives_spanish:
  - dueños de sí
  - prudentes
  - moderados
  lexicon: BDAG
  rationale: En Tito, la palabra apunta a juicio disciplinado y dominio de sí. «Sensatos» comunica juicio recto y moderación en una forma idiomática; como alternativa, «dueños de sí» sería más explícita sobre el autocontrol, pero menos fluida en la serie.
- source_word: ὑγιαίνοντας
  english_pob_choice: sound
  chosen_spanish: sanos
  alternatives_spanish:
  - sólidos
  - íntegros
  - saludables
  lexicon: BDAG
  rationale: Literalmente significa «estar sanos/enteros». En las Pastorales suele tener sentido figurado de solidez doctrinal o moral. «Sanos» conserva la metáfora con naturalidad en español.
- source_word: τῇ πίστει
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fidelidad
  - en la confianza
  - en la fe y fidelidad
  lexicon: BDAG
  rationale: 'Se sigue el valor principal de πίστις como «fe» en la traducción principal. El artículo se integra de modo natural en español: «en la fe». La alternativa «fidelidad» queda implícitamente posible por la ambigüedad léxica, que se preserva en la nota.'
- source_word: τῇ ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en el amor
  lexicon: BDAG
  rationale: «ἀγάπη» se vierte por «amor» según el uso base del proyecto. La preposición «en» refleja la construcción dativa como esfera o ámbito de cualidad.
- source_word: τῇ ὑπομονῇ
  english_pob_choice: in steadfastness
  chosen_spanish: en la perseverancia
  alternatives_spanish:
  - en la constancia
  - en la paciencia perseverante
  lexicon: BDAG
  rationale: Ὑπομονή denota aguante paciente bajo dificultad. «Perseverancia» comunica bien la constancia sostenida y es idiomática en español; «constancia» queda como alternativa cercana.
theological_decisions:
- issue: Sentido de πίστις en una lista de virtudes
  english_pob_reading: faith, with a footnoted alternative of faithfulness
  chosen_spanish_reading: fe, con posibilidad implícita de fidelidad
  alternative_spanish_readings:
  - fe
  - fidelidad
  rationale: 'Se conserva el valor principal «fe» en el texto principal, en continuidad con la decisión de proyecto. La polisemia de πίστις no se elimina: la nota permite advertir que también puede entenderse como «fidelidad» según el contexto.'
  doctrine_reference: 'DOCTRINE.md: contested terms — πίστις default ''faith''; preserve alternatives in footnotes where contested'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: el texto griego y la auditoría inglesa apoyan una lista de virtudes para varones mayores, con πίστις como término polisémico. No se registraron revisiones aplicadas y el control cruzado informó alto acuerdo, por lo que no se introdujeron cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene el registro digno y eclesial sin arcaísmos innecesarios.
  - «Sobrios» conserva la amplitud ética de νηφάλιος sin restringirlo solo al alcohol.
  - «Sanos» refleja el símil médico de ὑγιαίνω y funciona bien con la serie de virtudes.
  - Se prefirió «en la fe» por consistencia terminológica del proyecto, con nota para la alternativa «fidelidad».
  - Se usó «perseverancia» para ὑπομονή por su claridad moderna y por mantener la triada virtud-virtud-virtud en español.
