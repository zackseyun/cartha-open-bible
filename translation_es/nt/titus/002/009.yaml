    rationale: Aunque intenta captar el sentido de ἀντιλέγοντας, no corresponde al registro moderno pero digno pedido por el proyecto y puede sonar infantil o poco bíblico.
  - severity: low
    issue: La nota a usa «estatus ligado», expresión poco natural
    rationale: La idea del inglés («bonded status») debe expresarse con español más claro, por ejemplo «condición de esclavitud» o «condición servil vinculada»; «estatus ligado» no suena idiomático.
  - severity: low
    issue: La nota b puede sonar excesivamente literal
    rationale: «No hablando en contra» es comprensible, pero una formulación más natural como «no respondiendo en contra» o mantener «no contradiciendo» mejora la legibilidad.
  revised_spanish_text: Los esclavos deben someterse a sus propios amos en todo[a], ser agradables, sin contradecirlos[b],
