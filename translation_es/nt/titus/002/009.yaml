translation:
  language: es
  text: Los esclavos deben someterse a sus propios amos en todo[a], ser agradables, sin contradecirlos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirvientes» o «siervos»; el griego doulous puede denotar personas en servicio, pero aquí probablemente está en vista la condición de esclavitud.
    reason: alternative_reading
  - marker: b
    text: O «no respondiéndoles en contra» o «no discutiendo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Δούλους
  english_pob_choice: Slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - esclavos domésticos
  lexicon: BDAG
  rationale: δοῦλος aquí conserva su fuerza social de persona bajo autoridad y dependencia real. En español, «esclavos» comunica mejor esa relación vinculada que «siervos», que suavizaría el término y perdería parte de la carga histórica y léxica.
- source_word: ἰδίοις δεσπόταις
  english_pob_choice: their own masters
  chosen_spanish: a sus propios amos
  alternatives_spanish:
  - a sus propios dueños
  - a sus propios señores
  lexicon: BDAG
  rationale: δεσπότης expresa autoridad de posesión/ dominio sobre la persona; «amos» es el equivalente más natural y fiel en este contexto de casa y subordinación. «Sus propios» refleja ἰδίοις sin diluir la relación específica.
- source_word: ὑποτάσσεσθαι
  english_pob_choice: are to submit
  chosen_spanish: deben someterse
  alternatives_spanish:
  - han de someterse
  - deben sujetarse
  - están obligados a someterse
  lexicon: BDAG
  rationale: El infinitivo exhortativo en esta cadena de conducta se vierte naturalmente con obligación normativa en español. «Someterse» conserva la idea de orden y subordinación sin introducir un matiz más fuerte que el de la exhortación apostólica.
- source_word: ἐν πᾶσιν
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  - en todo sentido
  lexicon: BDAG
  rationale: La expresión es amplia y abarcadora; «en todo» es una forma idiomática y compacta en español que preserva la totalidad del alcance sin sonar rígida.
- source_word: εὐαρέστους εἶναι
  english_pob_choice: to be pleasing
  chosen_spanish: para ser agradables
  alternatives_spanish:
  - para ser complacientes
  - para ser bien agradables
  - para resultar agradables
  lexicon: BDAG
  rationale: εὐάρεστος significa lo que es agradable o aceptable. «Agradables» mantiene la cualidad relacional esperada y encaja con la serie infinitiva del mandato.
- source_word: μὴ ἀντιλέγοντας
  english_pob_choice: not argumentative
  chosen_spanish: no contestones
  alternatives_spanish:
  - no respondones
  - no hablando en contra
  - no contradictores
  lexicon: BDAG
  rationale: ἀντιλέγω puede implicar hablar en contra, contradecir o responder con resistencia verbal. En español, «contestones» comunica de forma natural la idea de hablar de manera desafiante o de rebeldía verbal, cercana a «not talking back» del aparato inglés.
theological_decisions:
- issue: Renderización de δοῦλος en un código doméstico
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  - criados
  rationale: La lectura inglesa documenta que aquí el estatus vinculado es probablemente el trasfondo saliente. Por eso, siguiendo la preferencia POB para δοῦλος cuando la esclavitud o dependencia atada es relevante, «esclavos» conserva la realidad social del texto sin suavizarla.
  doctrine_reference: 'DOCTRINE.md — Contested terms: δοῦλος = servant / slave (context-dependent); use ''slave'' where the bonded nature is salient'
- issue: Alcance de la sumisión exigida por ἐν πᾶσιν
  english_pob_reading: in everything
  chosen_spanish_reading: en todo
  alternative_spanish_readings:
  - en todas las cosas
  - en todo aspecto
  rationale: No hay indicio textual para restringir el alcance, pero el español puede sonar absolutizador si se sobreinterpreta. «En todo» conserva la amplitud sin añadir especificaciones ajenas al texto.
  doctrine_reference: Principio de alcance semántico amplio en exhortaciones parenéticas; mantener el valor totalizante de πᾶσιν sin expansión interpretativa
translation_notes:
  revision_awareness: La versión española sigue el análisis auditado del texto griego y coincide con la lectura inglesa revisada como estable, sin cambios posteriores en el pase más reciente. Se preserva la tensión léxica de δοῦλος con «esclavos» y la ambigüedad verbal de ἀντιλέγω con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde corresponda al Tetragrámaton; aquí no aparece ningún nombre divino.
  - Se usa «esclavos» para δοῦλος conforme al criterio POB cuando el estado ligado es saliente.
  - Se evita «SEÑOR» para δεσπότης; «amos» refleja mejor la autoridad doméstica absoluta del término.
  - Se conserva una cadencia sobria y bíblica en español, sin calco excesivo del inglés.
