translation:
  language: es
  text: Pero en cuanto a ti, habla lo que conviene a la sana enseñanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sana doctrina».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - tú mismo
  lexicon: BDAG
  rationale: El pronombre griego es explícito y enfatiza el contraste con los falsos maestros. En español, «tú» mantiene la segunda persona y el contraste sin recargar el texto; el valor enfático queda suficientemente sugerido por «Pero tú».
- source_word: δὲ
  english_pob_choice: But as for
  chosen_spanish: Pero
  alternatives_spanish:
  - Pero en cuanto a ti
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce contraste con lo anterior. «Pero» conserva la oposición de manera natural en español; el matiz topical de «as for you» queda reforzado por el pronombre explícito «tú».
- source_word: λαλεί
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - enseña
  - proclama
  lexicon: BDAG
  rationale: λαλέω es un mandato general de hablar. «Habla» preserva la amplitud del verbo sin estrecharlo indebidamente a una forma técnica de enseñanza.
- source_word: ἃ
  english_pob_choice: the things that
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural introduce el contenido de lo que Tito debe decir. «Lo que» suena natural en español y puede abarcar ese conjunto de contenidos sin forzar una pluralidad explícita poco idiomática.
- source_word: πρέπει
  english_pob_choice: are fitting for
  chosen_spanish: conviene a
  alternatives_spanish:
  - es apropiado para
  - cuadra con
  - es adecuado para
  lexicon: BDAG
  rationale: πρέπω expresa conveniencia o adecuación. «Conviene a» conserva bien la idea de lo que corresponde o resulta apropiado, con un tono sobrio y fiel al sentido.
- source_word: ὑγιαινούσῃ
  english_pob_choice: sound
  chosen_spanish: sana
  alternatives_spanish:
  - sólida
  - saludable
  lexicon: BDAG
  rationale: En este contexto metafórico, ὑγιαίνω se refiere a enseñanza doctrinal sana. «Sana» es el equivalente español más establecido y transmite correctamente la metáfora de salud doctrinal.
- source_word: διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: διδασκαλία puede referirse al acto o al contenido de enseñar. «Enseñanza» mantiene la amplitud del término y evita imponer de entrada un tecnicismo eclesiástico, aunque «doctrina» queda como alternativa válida.
theological_decisions:
- issue: τῇ ὑγιαινούσῃ διδασκαλίᾳ
  english_pob_reading: sound teaching
  chosen_spanish_reading: sana enseñanza
  alternative_spanish_readings:
  - sana doctrina
  - enseñanza sana
  - doctrina sana
  rationale: La expresión alude a la instrucción apostólica doctrinalmente saludable. «Sana enseñanza» conserva la metáfora de salud y mantiene el contenido doctrinal sin depender de un término más institucionalizado como «doctrina».
  doctrine_reference: Translation philosophy §5; §6
translation_notes:
  revision_awareness: El texto base inglés ya fue revisado y quedó sin cambios; el draft español sigue esa lectura estable, preservando la equivalencia óptima y la alternativa lexical principal en nota.
  spanish_consistency_notes:
  - Se mantiene el contraste explícito de la segunda persona con «Pero tú».
  - Se evita traducir διδασκαλία automáticamente como «doctrina» en el texto principal; esa opción queda documentada en nota.
  - La construcción «lo que conviene a» intenta respetar la conveniencia/suitability de πρέπω sin endurecer el español.
  - «Sana» conserva el valor metafórico de salud doctrinal presente en ὑγιαινούσῃ.
