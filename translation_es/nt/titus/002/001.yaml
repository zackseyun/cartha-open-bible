  rationale: Se ajusta el inicio para reflejar mejor el contraste tópico de Σὺ δὲ y se mueve la nota al sintagma correcto, ya que la alternativa «sana doctrina» corresponde a «sana enseñanza», no al pronombre «tú». No se requiere una reescritura mayor del resto del versículo.
