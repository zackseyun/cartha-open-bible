translation:
  language: es
  text: para que formen[a] a las mujeres más jóvenes[b] a amar a sus maridos y a sus hijos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'animen' o 'enseñen a ser sensatas'; el verbo griego tiene la idea de formar o aconsejar hacia una conducta juiciosa.
    reason: lexical_alternative
  - marker: b
    text: O 'las mujeres jóvenes'. El griego literalmente dice 'las más jóvenes', en contraste con las mujeres mayores del contexto inmediato.
    reason: lexical_alternative
  - marker: c
    text: 'O ''amar a sus maridos'' y ''amar a sus hijos''. El griego usa dos adjetivos paralelos: ''amorosas hacia sus maridos'' y ''amorosas hacia sus hijos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa con naturalidad el valor de propósito de ἵνα en español, conservando la fuerza subordinante sin volverla más rígida de lo necesario.
- source_word: σωφρονίζωσι
  english_pob_choice: they may train
  chosen_spanish: enseñen
  alternatives_spanish:
  - formen
  - adviertan
  - instruyan
  lexicon: BDAG
  rationale: El verbo griego incluye la idea de orientar/formar hacia una conducta sensata. En este contexto, 'enseñen' funciona como equivalente dinámico sobrio para la labor formativa de las ancianas, sin perder el componente exhortativo.
- source_word: τὰς νέας
  english_pob_choice: the younger women
  chosen_spanish: las mujeres más jóvenes
  alternatives_spanish:
  - las mujeres jóvenes
  - las jóvenes
  lexicon: BDAG
  rationale: '''Más jóvenes'' preserva mejor el matiz comparativo frente a las mujeres mayores del contexto inmediato. ''Mujeres jóvenes'' es posible, pero puede sonar menos relacional que el griego.'
- source_word: φιλάνδρους
  english_pob_choice: love their husbands
  chosen_spanish: amar a sus maridos
  alternatives_spanish:
  - amar a sus esposos
  - ser amantes de sus maridos
  lexicon: BDAG
  rationale: El adjetivo expresa disposición afectuosa hacia el marido. En español, el infinitivo 'amar' comunica con naturalidad esa cualidad sin forzar una perífrasis extraña; 'maridos' mantiene el eco del ámbito doméstico del pasaje.
- source_word: φιλοτέκνους
  english_pob_choice: love their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - amar a sus hijos
  - ser amantes de sus hijos
  lexicon: BDAG
  rationale: Se mantiene el paralelo con 'amar a sus maridos' y el sentido relacional del adjetivo. La elipsis del verbo en español dentro de la coordinación con 'amar' es natural y clara.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: a
  alternatives_spanish:
  - ser
  - estar
  lexicon: BDAG
  rationale: El infinitivo queda absorbido naturalmente por la estructura española 'enseñar a...'; no requiere una traducción separada que suene redundante.
theological_decisions:
- issue: Alcance de τὰς νέας en el contexto doméstico
  english_pob_reading: Younger women, not narrowed to 'wives'
  chosen_spanish_reading: mujeres más jóvenes, sin restringir explícitamente a 'esposas'
  alternative_spanish_readings:
  - esposas jóvenes
  - mujeres jóvenes
  rationale: El texto griego habla de mujeres más jóvenes en contraste con las mayores del contexto, y aunque presupone una esfera matrimonial y familiar, no exige en el vocabulario una restricción a 'esposas'.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Forma de expresar la cualidad afectiva de φιλάνδρους y φιλοτέκνους
  english_pob_reading: love their husbands and their children
  chosen_spanish_reading: amar a sus maridos y a sus hijos
  alternative_spanish_readings:
  - ser afectuosas con sus maridos y sus hijos
  - amar a sus esposos y a sus hijos
  rationale: La versión inglesa depuró una paráfrasis más larga para conservar un enunciado directo. En español, 'amar a' transmite con precisión la relación afectiva requerida por ambos adjetivos y mantiene el paralelo retórico del griego.
  doctrine_reference: Affirmations; Translation philosophy §§2, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB que simplificó 'be loving toward' a 'love' para φιλάνδρους y φιλοτέκνους. También conserva el valor relacional de νέας sin estrecharlo a 'esposas', alineándose con el acuerdo alto del proceso de revisión.
  spanish_consistency_notes:
  - Se usa 'amar a' para ambos miembros del paralelismo, manteniendo simetría y claridad.
  - '''Maridos'' se conserva por fidelidad al registro doméstico del pasaje; ''esposos'' queda como alternativa válida pero no necesaria.'
  - '''Mujeres más jóvenes'' refleja el comparativo del griego y evita sonar como una categoría absoluta.'
