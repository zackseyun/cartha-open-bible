translation:
  language: es
  text: Las mujeres mayores, asimismo, deben ser reverentes en su conducta[a], no calumniadoras ni esclavizadas a mucho vino, maestras de lo bueno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no falsas acusadoras» o «no malignas chismosas». El término griego aquí se relaciona con la palabra a menudo traducida «diablo», pero en este contexto significa personas calumniadoras.
    reason: lexical_alternative
  - marker: b
    text: O «ni adictas a mucho vino». El griego dice más literalmente «habiendo sido esclavizadas a mucho vino».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρεσβύτιδας
  english_pob_choice: Older women
  chosen_spanish: Las mujeres mayores
  alternatives_spanish:
  - las ancianas
  - las mujeres de edad avanzada
  lexicon: BDAG
  rationale: πρεσβῦτις se refiere a mujeres de mayor edad, en paralelo con el contexto inmediato. «Mujeres mayores» comunica esa referencia de manera natural y neutra en español, sin añadir matices eclesiásticos ajenos al texto.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: BDAG
  rationale: Marca la correspondencia con la exhortación anterior. «Asimismo» conserva la conexión discursiva con un tono claro y sobrio en español.
- source_word: ἐν καταστήματι
  english_pob_choice: in behavior
  chosen_spanish: en su conducta
  alternatives_spanish:
  - en su comportamiento
  - en su modo de vivir
  lexicon: BDAG
  rationale: La frase apunta al porte o conducta externa. «Conducta» expresa bien ese ámbito ético en español y evita una literalidad rígida como «en su comportamiento» si suena menos fluida aquí.
- source_word: ἱεροπρεπεῖς
  english_pob_choice: reverent
  chosen_spanish: reverentes
  alternatives_spanish:
  - dignas de santidad
  - con reverencia
  lexicon: BDAG
  rationale: El adjetivo indica lo apropiado a lo sagrado o a la santidad. «Reverentes» reproduce bien esa cualidad en español y encaja con «en su conducta».
- source_word: μὴ διαβόλους
  english_pob_choice: not slanderers
  chosen_spanish: no calumniadoras
  alternatives_spanish:
  - no acusadoras falsas
  - no malignas chismosas
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como adjetivo/sustantivo ético, no como referencia al Diablo. «Calumniadoras» preserva la fuerza de habla dañina y resulta natural en español, aunque «slanderers» pueda corresponder más directamente a «calumniadoras» que a «chismosas».
- source_word: μηδὲ οἴνῳ πολλῷ δεδουλωμένας
  english_pob_choice: nor enslaved to much wine
  chosen_spanish: ni esclavizadas por mucho vino
  alternatives_spanish:
  - ni adictas a mucho vino
  - ni esclavizadas al mucho vino
  lexicon: BDAG
  rationale: El participio perfecto pasivo de δουλόω conserva la imagen de esclavitud. «Esclavizadas» mantiene esa fuerza verbal en español y sigue la preferencia del proyecto por traducir este campo léxico con lenguaje de esclavitud cuando es pertinente.
- source_word: καλοδιδασκάλους
  english_pob_choice: teachers of what is good
  chosen_spanish: maestras de lo bueno
  alternatives_spanish:
  - enseñadoras de lo bueno
  - maestras del bien
  lexicon: BDAG
  rationale: El compuesto describe a quienes enseñan lo bueno. «Maestras de lo bueno» es conciso, fiel al valor del compuesto y claro en español; el femenino concuerda con «mujeres mayores».
theological_decisions:
- issue: Conservar el lenguaje de esclavitud en la prohibición sobre el vino
  english_pob_reading: Retain bondage language with 'enslaved to much wine'
  chosen_spanish_reading: «esclavizadas por mucho vino»
  alternative_spanish_readings:
  - «adictas a mucho vino»
  - «dominadas por mucho vino»
  rationale: El griego usa δουλόω, y la POB en inglés preserva la imagen de esclavitud en lugar de suavizarla con «addicted». En español, «esclavizadas» mantiene la tensión lexical y la gravedad moral del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested terms for δοῦλος
- issue: Interpretación de διάβολος en una lista ética
  english_pob_reading: '''not slanderers'' rather than a reference to the devil'
  chosen_spanish_reading: «no calumniadoras»
  alternative_spanish_readings:
  - «no falsas acusadoras»
  - «no malignas chismosas»
  rationale: El contexto es una lista de cualidades éticas, por lo que la palabra no se refiere al diablo como ser personal. «Calumniadoras» mantiene la referencia al habla dañina sin introducir una lectura demonológica incorrecta.
  doctrine_reference: BDAG; uso contextual de διάβολος en listas de vicios
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el expediente auditado en inglés. Se mantuvieron las imágenes léxicas clave de conducta reverente, ausencia de calumnia y esclavitud frente al vino, sin suavizar la metáfora de δουλόω. No se documentaron revisiones posteriores que alteraran la lectura base.
  spanish_consistency_notes:
  - Se usó «esclavizadas» para mantener el campo léxico de esclavitud coherente con la política POB sobre δοῦλος/δουλόω.
  - Se prefirió «calumniadoras» por su naturalidad en español, dejando la alternativa textual en nota para preservar la ambigüedad semántica de διάβολος.
  - Se eligió el femenino plural en toda la cláusula porque el referente explícito es «mujeres mayores».
  - «Maestras de lo bueno» conserva el valor del compuesto καλοδιδάσκαλος sin convertirlo en una mera valoración de habilidad docente.
