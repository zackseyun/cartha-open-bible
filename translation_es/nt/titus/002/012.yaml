translation:
  language: es
  text: formándonos[a], para que, habiendo renunciado a la impiedad y a los deseos mundanos[b], vivamos en la edad presente[c] con dominio propio, con justicia y con piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instruyéndonos» o «disciplinándonos»; el griego incluye la idea de formación educativa y corrección moral.
    reason: lexical_alternative
  - marker: b
    text: O «pasiones mundanas».
    reason: lexical_alternative
  - marker: c
    text: 'El griego tiene tres adverbios: «con dominio propio», «con justicia» y «con piedad»; en español se expresan así de manera natural para describir una vida marcada por dominio propio, justicia y piedad. También puede traducirse «en esta era presente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδεύουσα
  english_pob_choice: training
  chosen_spanish: disciplinándonos
  alternatives_spanish:
  - instruyéndonos
  - formándonos
  lexicon: BDAG
  rationale: El verbo griego incluye la idea de formación educativa y corrección moral. En español, «disciplinándonos» conserva ese carácter formativo y correctivo sin reducirlo solo a «enseñar», que sería más estrecho. También evita una expresión demasiado técnica.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce la finalidad de la acción anterior. «Para que» es la forma natural y clara en español contemporáneo y preserva el valor purposivo del griego.
- source_word: ἀρνησάμενοι
  english_pob_choice: having renounced
  chosen_spanish: habiendo renunciado
  alternatives_spanish:
  - habiendo negado
  - rechazando
  lexicon: BDAG
  rationale: El aoristo medio participial expresa una acción antecedente y decisiva. «Habiendo renunciado» refleja mejor esa decisión previa que una simple negación continua.
- source_word: ἀσέβειαν
  english_pob_choice: ungodliness
  chosen_spanish: la impiedad
  alternatives_spanish:
  - la irreverencia
  - la falta de piedad
  lexicon: BDAG
  rationale: «Impiedad» es el equivalente natural y bíblico en español para conducta contraria a Dios. Mantiene la dimensión moral y teológica del término.
- source_word: κοσμικὰς ἐπιθυμίας
  english_pob_choice: worldly desires
  chosen_spanish: los deseos mundanos
  alternatives_spanish:
  - las pasiones mundanas
  - los deseos del mundo
  lexicon: BDAG
  rationale: La frase alude a deseos conformados por el orden caído de este mundo. «Mundanos» conserva ese contraste sin forzar una connotación moderna de «secular».
- source_word: σωφρόνως
  english_pob_choice: self-controlled
  chosen_spanish: con dominio propio
  alternatives_spanish:
  - sensatamente
  - con sobriedad
  lexicon: BDAG
  rationale: Aunque el inglés POB lo expresa con «self-controlled», en español la forma adverbial más natural es «con dominio propio». Conserva la idea de autocontrol ético central en Tito.
- source_word: δικαίως
  english_pob_choice: righteous
  chosen_spanish: con justicia
  alternatives_spanish:
  - rectamente
  - justamente
  lexicon: BDAG
  rationale: El adverbio señala una conducta conforme a lo recto y justo. «Con justicia» mantiene el matiz moral y social del término sin perder naturalidad en español.
- source_word: εὐσεβῶς
  english_pob_choice: godly
  chosen_spanish: con piedad
  alternatives_spanish:
  - piadosamente
  - con devoción
  lexicon: BDAG
  rationale: El adverbio indica una vida reverente orientada a Dios. «Con piedad» es la equivalencia bíblica más clara y no introduce una carga confesional posterior ajena al griego.
- source_word: ζήσωμεν
  english_pob_choice: we might live
  chosen_spanish: vivamos
  alternatives_spanish:
  - podamos vivir
  - vivamos nosotros
  lexicon: BDAG
  rationale: Después de «para que», el subjuntivo español expresa naturalmente el propósito. «Vivamos» conserva la fuerza exhortativa/resultativa del griego sin añadir matices ajenos.
- source_word: ἐν τῷ νῦν αἰῶνι
  english_pob_choice: in the present age
  chosen_spanish: en el presente siglo
  alternatives_spanish:
  - en la presente era
  - en este tiempo presente
  lexicon: BDAG
  rationale: «αἰών» aquí apunta al orden de esta época en contraste con la venidera. «Presente siglo» conserva esa resonancia bíblica-esjatológica en español, mientras que «era» o «tiempo» la debilitarían.
theological_decisions:
- issue: 'La serie ética de tres adverbios griegos: σωφρόνως καὶ δικαίως καὶ εὐσεβῶς'
  english_pob_reading: rendered as 'self-controlled, righteous, and godly lives'
  chosen_spanish_reading: con dominio propio, con justicia y con piedad
  alternative_spanish_readings:
  - soberamente, justamente y piadosamente
  - con autocontrol, rectitud y piedad
  rationale: El griego presenta tres adverbios que describen cómo se vive, no solo tres cualidades abstractas. En español, una serie puramente adverbial como «soberamente» resultaría poco natural; por eso se expresa mediante frases preposicionales que preservan la tríada ética y su carácter concreto en la vida.
  doctrine_reference: Translation philosophy §5; §6
- issue: παιδεύουσα como acción formativa de la gracia
  english_pob_reading: training us
  chosen_spanish_reading: disciplinándonos
  alternative_spanish_readings:
  - instruyéndonos
  - formándonos
  rationale: La gracia no solo comunica información; forma el carácter. «Disciplinándonos» retiene tanto instrucción como corrección y evita reducir el sentido a mero aprendizaje intelectual.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y toma como guía el audit trail inglés de la POB. Se conserva la tríada ética y la relación de propósito. Se prefirió una solución española natural para la serie adverbial, sin borrar la tensión lexical entre formación, disciplina e instrucción en παιδεύουσα. No se introdujeron cambios textuales frente al contenido base; solo ajustes de naturalidad y puntuación en español.
  spanish_consistency_notes:
  - Se usa «impiedad» para ἀσέβεια, en línea con el valor bíblico moral-religioso del término.
  - Se mantiene «deseos mundanos» para κοσμικὰς ἐπιθυμίας, evitando «seculares» por ser anacrónico.
  - «Presente siglo» conserva la dimensión escatológica de αἰών, en consonancia con el contraste entre la era presente y la venidera.
  - La serie final se mantiene explícitamente tripartita para reflejar el griego y el inglés POB, aunque en español se reformule sintácticamente.
