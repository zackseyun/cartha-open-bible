translation:
  language: es
  text: quien se dio a sí mismo por nosotros[a], para redimirnos de toda iniquidad y purificar para sí un pueblo para su propia posesión[b], celoso de buenas obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en favor de nosotros» o «en nuestro lugar». El griego ὑπὲρ ἡμῶν puede expresar beneficencia y, según el contexto, también un matiz sustitutivo; la redacción conserva esa amplitud.
    reason: lexical_alternative
  - marker: b
    text: O «un pueblo precioso» o «un pueblo especial». El griego «un pueblo para su propia posesión» preserva el sentido pactal de un pueblo que le pertenece de manera especial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν ἑαυτὸν
  english_pob_choice: gave himself
  chosen_spanish: se dio a sí mismo
  alternatives_spanish:
  - se entregó
  - se dio
  lexicon: BDAG
  rationale: La expresión griega indica una acción voluntaria de autodonación. «Se dio a sí mismo» conserva esa fuerza reflexiva sin añadir interpretaciones ajenas al texto; «se entregó» también sería posible, pero puede sugerir más claramente entrega sacrificial que el griego no explicita por sí solo.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor de nosotros
  - por nuestro bien
  lexicon: BDAG
  rationale: «Por nosotros» mantiene la amplitud benefactiva/substitutiva del griego ὑπέρ sin cerrar la relación de sentido a una sola formulación doctrinal.
- source_word: ἵνα λυτρώσηται
  english_pob_choice: so that he might redeem
  chosen_spanish: para redimirnos
  alternatives_spanish:
  - para rescatarnos
  - para librarnos
  lexicon: BDAG
  rationale: «Redimir» conserva el peso teológico y el campo semántico de λύτροομαι, incluyendo liberación mediante rescate, y funciona bien en español bíblico sin volverlo arcaico.
- source_word: ἀπὸ πάσης ἀνομίας
  english_pob_choice: from all lawlessness
  chosen_spanish: de toda maldad
  alternatives_spanish:
  - de toda iniquidad
  - de toda anarquía moral
  lexicon: BDAG
  rationale: El griego ἀνομία es literalmente «desorden/ausencia de ley», pero en español «maldad» comunica de forma natural el alcance moral del término. Aun así, se reconoce que se pierde parte de la concreción jurídica de «lawlessness»; la alternativa «iniquidad» era posible, pero resulta más tradicional y menos precisa en español moderno.
- source_word: καθαρίσῃ
  english_pob_choice: purify
  chosen_spanish: purificarse
  alternatives_spanish:
  - limpiarse
  - purificar
  lexicon: BDAG
  rationale: «Purificarse» preserva la idea de limpieza moral/covenantal en un registro natural. El reflexivo español refleja que el sujeto actúa en favor de un pueblo que le pertenece, sin forzar el matiz técnico de «limpiar».
- source_word: ἑαυτῷ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: BDAG
  rationale: «Para sí» expresa posesión y propósito de manera concisa en español. Evita una redundancia innecesaria, aunque «para sí mismo» también sería posible.
- source_word: λαὸν περιούσιον
  english_pob_choice: a people for his own possession
  chosen_spanish: un pueblo para su propia posesión
  alternatives_spanish:
  - un pueblo de su propiedad
  - un pueblo suyo peculiar
  - un pueblo adquirido
  lexicon: BDAG
  rationale: «Pueblo para su propia posesión» conserva el sentido de pertenencia especial y el eco de lenguaje pactal del Antiguo Testamento. «Adquirido» o «peculiar» son posibles, pero pueden sonar más técnicos o más ambiguos en español contemporáneo.
- source_word: ζηλωτὴν καλῶν ἔργων
  english_pob_choice: zealous for good works
  chosen_spanish: celoso de buenas obras
  alternatives_spanish:
  - entusiasta de buenas obras
  - apasionado por las buenas obras
  - zeloso de buenas obras
  lexicon: BDAG
  rationale: «Celoso de buenas obras» conserva la idea de fervor y dedicación activa. En español, «celoso de» puede expresar compromiso intenso; aunque es menos común que «zeloso», evita una forma extraña y mantiene la relación con el original.
theological_decisions:
- issue: Alcance de ὑπὲρ ἡμῶν en la autodonación de Cristo
  english_pob_reading: Rendered broadly as 'for us' without choosing only substitutionary language
  chosen_spanish_reading: «por nosotros»
  alternative_spanish_readings:
  - «en favor de nosotros»
  - «en nuestro lugar»
  rationale: La redacción española conserva la amplitud del griego y no resuelve prematuramente la tensión entre sentido benefactivo y posible matiz sustitutivo. Esto sigue la cautela del POB inglés de no cerrar el modelo de expiación con una sola frase.
  doctrine_reference: Preservar tensión teológica; primacía del texto original sobre una fórmula doctrinal única.
- issue: Sentido pactal de λαὸν περιούσιον
  english_pob_reading: '''a people for his own possession'' preserving covenantal sense'
  chosen_spanish_reading: «un pueblo para su propia posesión»
  alternative_spanish_readings:
  - «un pueblo especial»
  - «un pueblo precioso»
  - «un pueblo de su propiedad»
  rationale: La frase mantiene la idea de un pueblo especialmente perteneciente a Dios y el eco de la terminología pactal bíblica, sin reemplazarla por un equivalente más general o devocional.
  doctrine_reference: Consistencia terminológica y respeto al eco veterotestamentario.
translation_notes:
  revision_awareness: Revisado frente al texto griego SBLGNT, la tabla morfológica y el audit trail inglés de POB. No hubo revisiones aplicadas en el paso más reciente; la propuesta sigue de cerca las decisiones establecidas, con adaptación idiomática controlada al español y sin resolver indebidamente las tensiones léxicas o teológicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Cristo» según no aplica en este versículo; no se introdujeron términos no atestiguados por el texto.
  - Se conservó el paralelismo final entre redención, purificación y pueblo perteneciente a Dios.
  - «Por nosotros» y la nota correspondiente preservan la amplitud de ὑπέρ sin fijar una sola teoría de expiación.
  - «Celoso de buenas obras» intenta equilibrar fidelidad léxica y naturalidad en español bíblico contemporáneo.
