- from: quien se dio a sí mismo por nosotros[a], para redimirnos de toda maldad y purificarse para sí un pueblo para su propia posesión, celoso[b] de buenas obras.
  to: quien se dio a sí mismo por nosotros[a], para redimirnos de toda iniquidad y purificar para sí un pueblo para su propia posesión[b], celoso de buenas obras.
  rationale: La revisión corrige un error sintáctico-semántico importante en «purificarse», restituye mejor el sentido de ἀνομία con «iniquidad», y reemplaza una nota poco útil por la alternativa léxica documentada para λαὸν περιούσιον. Se conserva la estructura y teología del original con un español más claro y fiel.
