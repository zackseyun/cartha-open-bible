translation:
  language: es
  text: Igualmente, exhorta a los jóvenes a tener dominio propio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ser sensatos» o «ser sobrios de mente». El griego enfatiza juicio sano y autocontrol disciplinado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοὺς νεωτέρους
  english_pob_choice: the younger men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los hombres jóvenes
  - los jóvenes varones
  lexicon: BDAG
  rationale: El griego masculino plural con artículo se refiere específicamente a los varones más jóvenes dentro de la serie de exhortaciones por grupos. En español, "los jóvenes" conserva la referencia masculina en este contexto sin sonar forzado; "los jóvenes varones" sería más explícito pero menos natural.
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Igualmente
  alternatives_spanish:
  - Asimismo
  - De la misma manera
  lexicon: BDAG
  rationale: El adverbio enlaza esta exhortación con las anteriores. "Igualmente" transmite la continuidad retórica de forma natural en español y mantiene el valor de conexión del texto.
- source_word: παρακάλει
  english_pob_choice: urge
  chosen_spanish: exhorta
  alternatives_spanish:
  - urge
  - anima
  - apremia
  lexicon: BDAG
  rationale: El imperativo presente pide una acción pastoral sostenida. "Exhorta" conserva mejor la fuerza instruccional del verbo que un simple "anima", y en español bíblico sigue siendo claro y digno.
- source_word: σωφρονεῖν
  english_pob_choice: to be self-controlled
  chosen_spanish: ser sobrios
  alternatives_spanish:
  - ser dueños de sí mismos
  - tener dominio propio
  - ser sensatos
  lexicon: BDAG
  rationale: El campo semántico incluye juicio sano, moderación y autocontrol. En español, "sobrios" puede abarcar esa mesura disciplinada y mantiene una resonancia bíblica breve; sin embargo, su sentido aquí no debe limitarse solo a abstinencia de alcohol, por lo que se preserva la nota de control disciplinado.
theological_decisions:
- issue: Referencia masculina específica en νεωτέρους
  english_pob_reading: specific reference to younger men
  chosen_spanish_reading: referencia específica a los jóvenes varones dentro de la comunidad
  alternative_spanish_readings:
  - referencia genérica a la juventud
  - referencia a personas jóvenes en general
  rationale: La estructura inmediata distingue grupos por edad y género. Traducir simplemente "los jóvenes" mantiene la referencia masculina en español sin neutralizarla, conforme al criterio de precisión del texto fuente.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sentido de σωφρονεῖν
  english_pob_reading: self-controlled / sensible / sober-minded
  chosen_spanish_reading: sobriedad entendida como mesura, juicio sano y autocontrol
  alternative_spanish_readings:
  - sensatez
  - dominio propio
  - mente sobria
  rationale: El griego no se reduce a temperancia física; incluye conducta y juicio disciplinados. "Sobrios" se deja con esa amplitud semántica en español, evitando reducir el término a una sola práctica y preservando la tensión léxica del original.
  doctrine_reference: Pastoral Epistles lexical usage; BDAG s.v. σωφρονέω
translation_notes:
  revision_awareness: El contexto auditado indica alta concordancia con la revisión más reciente y ningún cambio necesario; la presente redacción sigue esa lectura estable, manteniendo la especificidad masculina de νεωτέρους y el valor de autocontrol de σωφρονεῖν.
  spanish_consistency_notes:
  - Se conserva el enlace discursivo de ὡσαύτως con "Igualmente" para alinearlo con las exhortaciones paralelas del pasaje.
  - '"Exhorta" mantiene el tono pastoral y directivo del imperativo presente.'
  - '"Sobrios" se usa con amplitud semántica para reflejar el alcance de σωφρονεῖν sin imponer una única acepción restrictiva.'
