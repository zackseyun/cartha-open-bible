translation:
  language: es
  text: mientras aguardamos la bendita esperanza y la manifestación de la gloria de nuestro gran Dios y Salvador[a], Jesús Mesías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «la gloria del gran Dios y de nuestro Salvador Jesús Mesías», tomando «Dios» y «Salvador» como dos referentes distintos en vez de un solo título para Jesús Mesías.'
