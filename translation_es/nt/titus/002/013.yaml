lexical_decisions:
- source_word: προσδεχόμενοι
  english_pob_choice: as we await
  chosen_spanish: mientras aguardamos
  alternatives_spanish:
  - esperando
  - anhelando
  - en espera de
  lexicon: BDAG
  rationale: El participio expresa expectativa continua; «mientras aguardamos» conserva el valor durativo y vincula esta frase con el contexto inmediato, sin volverla una simple etiqueta nominal.
- source_word: μακαρίαν
  english_pob_choice: blessed
  chosen_spanish: bendita
  alternatives_spanish:
  - bienaventurada
  - feliz
  - afortunada
  lexicon: BDAG
  rationale: «Bendita» comunica bien el tono escatológico y devocional de la esperanza. «Bienaventurada» sería posible, pero suena más marcada y menos natural en español moderno.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - espera
  - confianza
  lexicon: BDAG
  rationale: «Esperanza» es la equivalencia normal y conserva el objeto futuro de la expectativa cristiana.
- source_word: ἐπιφάνειαν
  english_pob_choice: appearing
  chosen_spanish: manifestación
  alternatives_spanish:
  - aparición
  - venida
  - epifanía
  lexicon: BDAG
  rationale: «Manifestación» preserva la idea de una revelación visible y solemne; evita la rigidez de «aparición» y el tecnicismo de «epifanía».
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honra
  lexicon: BDAG
  rationale: «Gloria» es la traducción directa y adecuada. Mantiene el genitivo de relación en «la manifestación de la gloria» sin sobreexplicar.
- source_word: μεγάλου
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: BDAG
  rationale: «Gran» suena natural en español antes de «Dios» y conserva el matiz de grandeza del adjetivo.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: «Dios» es la forma normal y reverente en español; aquí integra el sintagma cristológico sin artículos innecesarios.
- source_word: σωτῆρος
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  - Redentor
  lexicon: BDAG
  rationale: «Salvador» es la equivalencia más estable y adecuada en el registro bíblico; «Libertador» o «Redentor» restringen o desplazan el sentido.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Aunque el POB inglés prefiere «Messiah» para Χριστός, en español el nombre compuesto «Jesucristo» es el equivalente eclesial más claro y reconocido, y evita una construcción pesada. No se expande a «Jesús el Mesías» porque el griego aquí funciona como nombre/título final de identificación.
theological_decisions:
- issue: Si «del gran Dios y Salvador nuestro, Jesucristo» se refiere a un solo referente o a dos
  english_pob_reading: 'One person: Jesus Messiah is identified as ''our great God and Savior.'''
  chosen_spanish_reading: 'Un solo referente: «nuestro gran Dios y Salvador» identifica a Jesucristo.'
  alternative_spanish_readings:
  - 'Dos referentes: «la gloria del gran Dios y de nuestro Salvador Jesucristo»'
  rationale: La construcción griega con un solo artículo y dos sustantivos personales singulares es más naturalmente leída como un solo referente. Por eso el texto principal mantiene la lectura cristológica unificada, pero la nota preserva la alternativa reconocida por el audit trail.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy §3 Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail en cuanto a la lectura unificada cristológica, pero adapta el cierre nominal al español natural con «Jesucristo». También se ha evitado introducir «Cristo» como transliteración mecánica, manteniendo la tensión documentada entre título y nombre propio sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Salvador» para σωτήρ, sin sustituirlos por formulaciones devocionales más libres.
  - «bendita esperanza» reproduce el valor escatológico de μακαρίαν sin trivializarlo.
  - «manifestación» conserva la idea de ἐπιφάνεια como aparición visible y solemne.
  - La puntuación deja claro que la nota a afecta toda la secuencia final sobre «nuestro gran Dios y Salvador».
