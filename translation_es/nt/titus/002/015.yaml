translation:
  language: es
  text: Habla estas cosas[a], y exhorta y reprende con toda autoridad. Que nadie te menosprecie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que nadie te desprecie» / «Que nadie te mire con desdén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas enseñanzas
  - estos asuntos
  lexicon: BDAG
  rationale: El demostrativo neutro plural remite a las instrucciones anteriores del capítulo. «Estas cosas» conserva esa referencia amplia sin especificarla de más.
- source_word: λάλει
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - enseña
  lexicon: BDAG
  rationale: λαλέω aquí pide una acción verbal continua. «Habla» es natural en español y mantiene el sentido de comunicación directa sin reducirlo a «enseña».
- source_word: παρακάλει
  english_pob_choice: exhort
  chosen_spanish: exhorta
  alternatives_spanish:
  - anima
  - urge
  lexicon: BDAG
  rationale: παρακαλέω puede significar animar, urgir o exhortar. En este contexto pastoral, «exhorta» conserva la fuerza directiva y moral junto a los otros imperativos.
- source_word: ἔλεγχε
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprueba
  - convence
  lexicon: BDAG
  rationale: ἐλέγχω expresa exponer el error y corregirlo. «Reprende» es idiomático en español y mantiene el tono pastoral correctivo.
- source_word: μετὰ πάσης ἐπιταγῆς
  english_pob_choice: with all authority
  chosen_spanish: con toda autoridad
  alternatives_spanish:
  - con toda orden
  - con plena autoridad
  - con toda fuerza de mando
  lexicon: BDAG
  rationale: ἐπιταγή puede significar mandato u autoridad. En esta construcción, el énfasis recae en la autoridad delegada que acompaña la exhortación y la reprensión; «con toda autoridad» lo expresa con naturalidad en español.
- source_word: μηδείς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no uno
  lexicon: BDAG
  rationale: Como sujeto indefinido negativo de una prohibición, «nadie» es el equivalente claro y normal en español.
- source_word: σου
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - tu persona
  lexicon: BDAG
  rationale: El genitivo pronominal funciona con περιφρονέω como la persona despreciada o ignorada; el español lo expresa de forma natural con el objeto directo/reflexivo de segunda persona singular en «te».
- source_word: περιφρονείτω
  english_pob_choice: disregard
  chosen_spanish: menosprecie
  alternatives_spanish:
  - desprecie
  - te mire por encima
  - te desatienda
  lexicon: BDAG
  rationale: περιφρονέω significa pensar poco de alguien, despreciarlo o ignorarlo. «Menosprecie» comunica esa actitud de desdén con buena fluidez; «desprecie» queda como alternativa léxica cercana que la tradición inglesa de POB también preserva en nota.
theological_decisions:
- issue: Fuerza de la autoridad ministerial en μετὰ πάσης ἐπιταγῆς
  english_pob_reading: Paul instructs Titus to act with full delegated authority in teaching, exhorting, and rebuking.
  chosen_spanish_reading: Pablo instruye a Tito para que ejerza sus amonestaciones con la plena autoridad delegada que acompaña su ministerio.
  alternative_spanish_readings:
  - Pablo le manda a Tito hablar con un tono imperativo solamente
  - La frase se refiere solo a la autoridad del mensaje, no al ministerio de Tito
  rationale: La construcción naturalmente modifica los imperativos y señala el peso con que Tito debe desempeñar estas acciones. «Con toda autoridad» conserva esa fuerza sin convertirla en poder autónomo; la autoridad sigue siendo ministerial y derivada del encargo apostólico.
  doctrine_reference: 'Mantener la tensión teológica del texto: autoridad real, pero delegada; no añadir una tesis doctrinal que el versículo no formule explícitamente.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el cierre auditado de la POB en inglés. No se requieren revisiones adicionales respecto del último pase, que fue marcado como sin cambios y con alto acuerdo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término predeterminado del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «Mesías» solo cuando lo demande el contexto; aquí no aplica.
  - 'Se mantiene un registro bíblico claro y moderno: «habla», «exhorta», «reprende», «autoridad».'
  - La nota al pie preserva la alternativa léxica documentada para περιφρονέω sin sustituir la traducción principal.
