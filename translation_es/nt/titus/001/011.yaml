revisions:
- from: A éstos hay que callar[a], porque trastornan casas enteras[b], enseñando lo que no deben, por vergonzosa ganancia[c].
  to: A ellos debe hacérseles callar[a], porque trastornan hogares enteros[b], enseñando lo que no deben, por ganancia vergonzosa[c].
  rationale: 'La revisión mantiene el sentido del borrador, pero ajusta dos puntos importantes al expediente POB y al griego: «hogares enteros» expresa mejor οἶκος como unidad doméstica, y «A ellos debe hacérseles callar» representa con más precisión la necesidad de silenciar su enseñanza sin el tono más coloquial de «hay que callar». También se suaviza la colocación final a un español más idiomático con «ganancia vergonzosa».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general de Tito 1:11: necesidad de detener a los falsos maestros, razón causal, daño a unidades domésticas, medio instrumental de su enseñanza y motivación por ganancia deshonrosa. Sin embargo, dos elecciones debilitan la fidelidad óptima al expediente POB y al griego: «A éstos» convierte un relativo anafórico en demostrativo algo más abrupto, y «casas enteras» en el texto principal deja demasiado expuesto el sentido físico de edificio que el propio expediente inglés evita con «whole households».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para mayor precisión y legibilidad eclesial. «Hay que callar» suena algo coloquial y transitivo sobre personas de forma dura; «debe hacérseles callar» o «deben ser silenciados» expresa mejor la necesidad impersonal del griego. «Hogares enteros» comunica mejor el sentido social/doméstico que «casas enteras» en el cuerpo del texto, evitando depender de la nota para corregir una ambigüedad principal.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones clave concuerdan en general con el rastro inglés. Conviene alinear mejor ὅλους οἴκους con «hogares enteros» y ἐπιστομίζειν con una formulación más cercana a «ser silenciados / hacérseles callar», manteniendo la nota literal sobre «cerrarles la boca».
  issues:
  - severity: medium
    issue: «Casas enteras» en el texto principal para ὅλους οἴκους
    rationale: Aunque la nota aclara el sentido, en español «casas» sugiere fácilmente edificios físicos. El expediente POB privilegia «whole households», y «hogares enteros» preserva mejor el valor social de οἶκος sin requerir corrección posterior.
  - severity: medium
    issue: «A éstos hay que callar» para οὓς δεῖ ἐπιστομίζειν
    rationale: La construcción es comprensible, pero «a éstos» suena más señaladora que el relativo anafórico, y «callar» aplicado así a personas puede sonar algo brusco/coloquial. Una formulación como «A ellos debe hacérseles callar» conserva mejor la necesidad y el foco en detener su habla.
  - severity: low
    issue: «por vergonzosa ganancia»
    rationale: Es entendible y fiel, pero en español suena menos idiomático que «por ganancia vergonzosa» o «por lucro vergonzoso». No obstante, no constituye error grave de sentido.
  revised_spanish_text: A ellos debe hacérseles callar[a], porque trastornan hogares enteros[b], enseñando lo que no deben, por ganancia vergonzosa[c].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «cerrarles la boca».
    reason: lexical_alternative
  - marker: b
    text: «Hogares enteros» probablemente se refiere a unidades familiares y dependientes dentro de un hogar, no solo a edificios físicos.
    reason: cultural_note
  - marker: c
    text: O, «por lucro vergonzoso».
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido del borrador, pero ajusta dos puntos importantes al expediente POB y al griego: «hogares enteros» expresa mejor οἶκος como unidad doméstica, y «A ellos debe hacérseles callar» representa con más precisión la necesidad de silenciar su enseñanza sin el tono más coloquial de «hay que callar». También se suaviza la colocación final a un español más idiomático con «ganancia vergonzosa».'
