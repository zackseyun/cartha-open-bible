translation:
  language: es
  text: A ellos debe hacérseles callar[a], porque trastornan hogares enteros[b], enseñando lo que no deben, por ganancia vergonzosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cerrarles la boca».
    reason: lexical_alternative
  - marker: b
    text: «Hogares enteros» probablemente se refiere a unidades familiares y dependientes dentro de un hogar, no solo a edificios físicos.
    reason: cultural_note
  - marker: c
    text: O, «por lucro vergonzoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς
  english_pob_choice: They
  chosen_spanish: A éstos
  alternatives_spanish:
  - Ellos
  - A quienes
  lexicon: BDAG
  rationale: El pronombre relativo griego retoma a los falsos maestros del contexto inmediato. En español, 'a éstos' mantiene la referencia anafórica y la fuerza directa del objeto del mandato sin introducir ambigüedad de sujeto.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: hay que
  alternatives_spanish:
  - deben
  - es necesario
  lexicon: BDAG
  rationale: '''δεῖ'' expresa necesidad/obligación. ''Hay que'' transmite esa obligatoriedad de modo natural en español, sin suavizarla ni volverla demasiado abstracta.'
- source_word: ἐπιστομίζειν
  english_pob_choice: be silenced
  chosen_spanish: callar
  alternatives_spanish:
  - cerrar la boca
  - enmudece
  - ser silenciados
  lexicon: BDAG
  rationale: El verbo significa literalmente 'poner freno a la boca'. 'Callar' comunica la acción requerida de detener su habla de forma clara y pública; la alternativa más literal puede sonar forzada en español, aunque se conserva en nota.
- source_word: οἵτινες
  english_pob_choice: since they are
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: La relativa cualitativa introduce la razón del mandato. 'Porque' expresa con naturalidad en español ese valor explicativo/causal.
- source_word: ὅλους οἴκους
  english_pob_choice: whole households
  chosen_spanish: casas enteras
  alternatives_spanish:
  - hogares enteros
  - familias enteras
  - casas domésticas
  lexicon: BDAG
  rationale: '''οἶκος'' puede referirse al conjunto doméstico, no solo al edificio. ''Casas enteras'' conserva la imagen concreta del griego y admite la amplitud social del término; se aclara en nota el sentido doméstico.'
- source_word: ἀνατρέπουσιν
  english_pob_choice: are upsetting
  chosen_spanish: trastornan
  alternatives_spanish:
  - derriban
  - subvierten
  - arruinan
  lexicon: BDAG
  rationale: El verbo expresa volver algo del revés, desestabilizar o arruinar. 'Trastornan' conserva bien esa fuerza de alteración seria sin exagerar hacia destrucción total.
- source_word: διδάσκοντες
  english_pob_choice: by teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - al enseñar
  - mediante su enseñanza
  lexicon: BDAG
  rationale: El participio expresa el medio por el cual causan el trastorno. 'Enseñando' es la forma más natural en español y conserva la relación instrumental.
- source_word: ἃ μὴ δεῖ
  english_pob_choice: what they ought not
  chosen_spanish: lo que no deben
  alternatives_spanish:
  - lo que no es debido
  - lo que no conviene
  - cosas que no deben
  lexicon: BDAG
  rationale: La construcción señala contenido indebido, no simple ausencia de necesidad. 'Lo que no deben' preserva la obligación moral implícita y suena claro en español.
- source_word: αἰσχροῦ κέρδους χάριν
  english_pob_choice: for the sake of shameful gain
  chosen_spanish: por vergonzosa ganancia
  alternatives_spanish:
  - por ganancia vergonzosa
  - por lucro vergonzoso
  - por ganancia deshonrosa
  lexicon: BDAG
  rationale: '''αἰσχρός'' califica la ganancia como vergonzosa/deshonrosa. ''Por vergonzosa ganancia'' reproduce la valoración negativa con una expresión breve; se deja abierta la posibilidad de lucro o ganancia, como en el griego.'
theological_decisions:
- issue: Fuerza del mandato contra los falsos maestros
  english_pob_reading: They must be silenced
  chosen_spanish_reading: A éstos hay que callar
  alternative_spanish_readings:
  - Deben ser silenciados
  - Hay que ponerles freno a la boca
  rationale: El griego manda detener su enseñanza perjudicial. 'Callar' mantiene la severidad del mandato sin especificar un método disciplinario o físico que el texto no detalla. Se preserva así la tensión entre la urgencia pastoral y la forma exacta de la intervención.
  doctrine_reference: Tito 1:11; principio de primacía del texto original y cautela frente a sobreinterpretación
- issue: Sentido de 'οἶκος' en el contexto
  english_pob_reading: whole households
  chosen_spanish_reading: casas enteras
  alternative_spanish_readings:
  - hogares enteros
  - familias enteras
  rationale: La expresión apunta al impacto doméstico y comunitario de la falsa enseñanza. 'Casas enteras' conserva la textura del griego y no reduce el alcance a una mera estructura física; la nota aclara que se trata de unidades familiares y dependientes.
  doctrine_reference: Tito 1:11; nota cultural sobre οἶκος
translation_notes:
  revision_awareness: El draft sigue de cerca el texto griego y el expediente auditado en inglés. Se mantuvo la fuerza de obligación de δεῖ, el valor causal de οἵτινες, el matiz doméstico de οἶκος y la condena ética de αἰσχροῦ κέρδους. La redacción española fue ajustada para sonar natural sin perder la severidad y la estructura argumentativa del original.
  spanish_consistency_notes:
  - Se usa 'callar' para ἐπιστομίζειν por claridad idiomática, con nota de alternativa más literal.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el pasaje.
  - '''Casas enteras'' se mantiene como equivalente de οἴκους, con explicación cultural en nota.'
  - '''Vergonzosa ganancia'' conserva el juicio moral del griego; ''lucro'' queda como alternativa anotada.'
