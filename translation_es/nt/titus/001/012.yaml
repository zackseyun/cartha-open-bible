translation:
  language: es
  text: 'Uno de ellos, su propio profeta, dijo: «Los cretenses son siempre mentirosos, malas bestias, glotones perezosos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «vientres ociosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τις
  english_pob_choice: One of them ... said
  chosen_spanish: Uno de ellos ... dijo
  alternatives_spanish:
  - Alguien dijo
  - Uno de los suyos dijo
  lexicon: BDAG
  rationale: τίς es un indefinido que aquí, con ἐξ αὐτῶν, expresa a alguien del mismo grupo. «Uno de ellos» conserva el valor partitivo y suena natural en español.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - entre ellos
  lexicon: BDAG
  rationale: La preposición con genitivo marca procedencia o pertenencia al grupo. «De ellos» es breve y mantiene la relación de pertenencia sugerida por el texto.
- source_word: ἴδιος αὐτῶν προφήτης
  english_pob_choice: their own prophet
  chosen_spanish: su propio profeta
  alternatives_spanish:
  - un profeta propio de ellos
  - un profeta de los suyos
  lexicon: BDAG
  rationale: ἴδιος enfatiza pertenencia/propiedad. «Su propio profeta» reproduce bien esa idea en español y evita añadir una precisión que el griego no exige.
- source_word: Κρῆτες
  english_pob_choice: Cretans
  chosen_spanish: cretenses
  alternatives_spanish:
  - cretos
  lexicon: BDAG
  rationale: Es el etnónimo normal en español para los habitantes de Creta.
- source_word: ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  lexicon: BDAG
  rationale: ἀεί significa «siempre» o «continuamente»; «siempre» es la equivalencia directa y más idiomática en el dicho proverbial.
- source_word: ψεῦσται
  english_pob_choice: liars
  chosen_spanish: mentirosos
  alternatives_spanish:
  - embusteros
  - falsarios
  lexicon: BDAG
  rationale: ψεύστης designa a quien dice falsedad. En español, «mentirosos» es el equivalente más directo y natural en el refrán.
- source_word: κακὰ θηρία
  english_pob_choice: evil beasts
  chosen_spanish: malas bestias
  alternatives_spanish:
  - bestias malignas
  - animales feroces
  lexicon: BDAG
  rationale: θηρία son bestias/animales salvajes; κακά añade juicio moral. «Malas bestias» conserva el insulto proverbial y el tono de la acusación con naturalidad en español.
- source_word: γαστέρες ἀργαί
  english_pob_choice: lazy gluttons
  chosen_spanish: vientres ociosos
  alternatives_spanish:
  - vientres perezosos
  - glotones perezosos
  lexicon: BDAG
  rationale: Literalmente, «vientres perezosos/ociosos». La imagen corporal se preserva mejor con «vientres ociosos», que deja visible la metáfora y la aspereza del dicho; no se reemplaza por una interpretación más explícita.
theological_decisions:
- issue: Cita de un dicho injurioso acerca de los cretenses
  english_pob_reading: Translate the quotation directly as a cited saying without softening its negative language
  chosen_spanish_reading: Traducir la cita de forma directa, sin suavizar el lenguaje despectivo
  alternative_spanish_readings:
  - Parafrasear para atenuar la dureza del estereotipo
  - Explicar en el texto que es una cita proverbial
  rationale: El griego presenta una cita frontal y áspera. La traducción debe conservar esa dureza como parte del argumento retórico del pasaje, sin convertirla en una generalización doctrinal sobre todos los cretenses. La tensión queda en la cita misma.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión retórica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue el sentido confirmado por el aparato en inglés y no requiere revisión adicional; se conservan el tono proverbial y la aspereza del insulto, con una nota léxica para la imagen literal de γαστέρες ἀργαί.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usa «su propio» para ἴδιος αὐτῶν, en línea con el valor de pertenencia destacado por el inglés POB.
  - La nota [a] se ancla solo en «vientres ociosos», donde la literalidad griega añade información útil para el lector.
