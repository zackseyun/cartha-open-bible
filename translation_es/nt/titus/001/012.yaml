review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: «Uno de ellos … su propio profeta» reproduce adecuadamente εἶπέν τις ἐξ αὐτῶν, ἴδιος αὐτῶν προφήτης; «Los cretenses son siempre mentirosos» corresponde fielmente a Κρῆτες ἀεὶ ψεῦσται; y «malas bestias» conserva con bastante naturalidad la fuerza metafórica de κακὰ θηρία. La principal desviación frente al rastro POB en inglés está en γαστέρες ἀργαί: el inglés principal eligió el sentido idiomático «lazy gluttons» y reservó «lazy bellies» para nota. El español puso en el texto principal la opción literal «vientres ociosos», lo que preserva la metáfora pero reduce claridad idiomática y no sigue la decisión auditada de usar una forma más comprensible en el cuerpo del texto.'
  spanish_quality_summary: 'El español es generalmente claro y digno. Sin embargo, hay dos problemas de presentación: (1) el marcador [a] aparece dos veces aunque solo hay una nota y solo debe anclarse donde corresponde; (2) «vientres ociosos» suena algo opaco y menos natural en español corriente. «Glotones perezosos» transmite mejor el insulto proverbial en español moderno, mientras la nota puede conservar el literal «vientres ociosos».'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Los términos relevantes aquí son étnicos y proverbiales, no nombres divinos ni títulos mesiánicos. La revisión propuesta mantiene la decisión léxica de POB de poner la expresión idiomática en el texto principal y la alternativa literal en nota.
  issues:
  - severity: medium
    issue: La frase principal «vientres ociosos» no sigue la decisión auditada de usar un equivalente idiomático en el texto principal.
    rationale: El inglés POB eligió «lazy gluttons» para claridad y dejó el literal en nota. En español, «vientres ociosos» es comprensible pero suena opaco y menos natural; «glotones perezosos» comunica mejor el sentido de γαστέρες ἀργαί.
  - severity: medium
    issue: El marcador de nota [a] está duplicado en el texto.
    rationale: Solo hay una nota léxica sobre la expresión final, de modo que el marcador debe aparecer una sola vez en la frase relevante. Anclarlo también en «Uno de ellos» crea una correspondencia incorrecta entre texto y nota.
  revised_spanish_text: 'Uno de ellos, su propio profeta, dijo: «Los cretenses son siempre mentirosos, malas bestias, glotones perezosos[a]».

