translation:
  language: es
  text: Profesan conocer a Dios[a], pero por sus obras lo niegan[b]; son detestables[c], desobedientes y no aptos[d] para toda buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afirman conocer a Dios».
    reason: lexical_alternative
  - marker: b
    text: O «por sus hechos niegan a Dios».
    reason: lexical_alternative
  - marker: c
    text: O «abominables».
    reason: lexical_alternative
  - marker: d
    text: O «descalificados para toda buena obra».
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: BDAG
  rationale: Es el objeto directo de «profesan conocer»; en español, «Dios» mantiene la referencia personal y directa sin añadir determinación no presente en el griego.
- source_word: ὁμολογοῦσιν
  english_pob_choice: profess
  chosen_spanish: profesan
  alternatives_spanish:
  - declaran
  - confiesan
  - afirmán
  lexicon: BDAG
  rationale: «Profesan» comunica una declaración externa de identidad o conocimiento, con el matiz de apariencia verbal que contrasta con las obras.
- source_word: εἰδέναι
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  lexicon: BDAG
  rationale: Aunque el infinitivo expresa «saber/conocer», en relación personal y religiosa «conocer a Dios» es la forma natural y fiel en español.
- source_word: τοῖς δὲ ἔργοις
  english_pob_choice: by their works
  chosen_spanish: con sus obras
  alternatives_spanish:
  - por sus obras
  - por sus hechos
  - en sus obras
  lexicon: BDAG
  rationale: El dativo instrumental se expresa con claridad en español mediante «con». Conserva la idea de que las obras son el medio o evidencia por la cual se manifiesta la negación.
- source_word: ἀρνοῦνται
  english_pob_choice: they deny him
  chosen_spanish: lo niegan
  alternatives_spanish:
  - lo reniegan
  - lo rechazan
  - niegan a Dios
  lexicon: BDAG
  rationale: El pronombre objeto retoma naturalmente a «Dios» en español. «Lo niegan» es breve, directo y mantiene la fuerza del contraste con «profesan conocer».
- source_word: βδελυκτοὶ
  english_pob_choice: detestable
  chosen_spanish: detestables
  alternatives_spanish:
  - abominables
  - repugnantes
  lexicon: BDAG
  rationale: «Detestables» conserva la severidad moral sin cargar el texto con un registro demasiado arcaico o excesivamente fuerte para el español actual.
- source_word: ἀπειθεῖς
  english_pob_choice: disobedient
  chosen_spanish: desobedientes
  alternatives_spanish:
  - rebeldes
  - incrédulos
  - indóciles
  lexicon: BDAG
  rationale: En contexto ético-pastoral, el rasgo es la negativa a obedecer; «desobedientes» es la correspondencia más directa y transparente.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν
  english_pob_choice: for every good work
  chosen_spanish: para toda buena obra
  alternatives_spanish:
  - para cualquier buena obra
  - hacia toda buena obra
  lexicon: BDAG
  rationale: «Para» comunica adecuadamente la relación de aptitud o destino expresada por πρός con acusativo, y «toda buena obra» reproduce el alcance universal del texto.
- source_word: ἀδόκιμοι
  english_pob_choice: unfit
  chosen_spanish: no aptos
  alternatives_spanish:
  - descalificados
  - sin aprobación
  - improbados
  lexicon: BDAG
  rationale: «No aptos» expresa de manera clara la incapacidad o falta de idoneidad para las buenas obras. Mantiene la idea de ineptitud moral/funcional sin tecnicismo innecesario.
theological_decisions:
- issue: Tensión entre profesión verbal y negación práctica de Dios
  english_pob_reading: The verse states that people may verbally profess knowledge of God while their actions functionally deny him.
  chosen_spanish_reading: El versículo afirma que puede haber una profesión verbal de conocer a Dios, mientras que las obras lo niegan de hecho.
  alternative_spanish_readings:
  - Su conducta contradice su confesión.
  - Dicen conocer a Dios, pero sus obras lo desmienten.
  rationale: 'La traducción conserva la tensión ética y teológica explícita en el griego: una afirmación verbal no respaldada por la conducta. No se expande el sentido hacia una doctrina más amplia que no esté en el enunciado.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés de la POB, sin cambios de revisión pendientes; la versión vigente indica concordancia alta y no requiere ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Dios» como traducción de θεόν, coherente con el uso project-level.
  - Se eligió «profesan» para preservar el matiz de declaración externa sin implicar sinceridad.
  - Se evitó «Cristo» y otras sustituciones no pertinentes al versículo.
  - Se conservó la negación pronominal «lo» para retomar a Dios de forma natural en español.
  - Se tradujo ἀδόκιμοι con una expresión de idoneidad («no aptos») para reflejar la idea de incapacidad para toda buena obra.
