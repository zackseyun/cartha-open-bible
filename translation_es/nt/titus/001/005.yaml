translation:
  language: es
  text: Por esta razón te dejé en Creta, para que pusieras en orden lo que quedaba[a] y designaras ancianos en cada ciudad[b], como te lo indiqué[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que faltaba».
    reason: lexical_alternative
  - marker: b
    text: O «ciudad por ciudad».
    reason: lexical_alternative
  - marker: c
    text: O «como te lo mandé».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτου χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por este motivo
  - Por esta causa
  lexicon: BDAG
  rationale: La expresión causal es idiomática; «Por esta razón» conserva el valor explicativo sin sonar forzado en español.
- source_word: ἀπέλιπόν
  english_pob_choice: I left
  chosen_spanish: te dejé
  alternatives_spanish:
  - te abandoné
  - te dejé atrás
  lexicon: BDAG
  rationale: En el contexto, Pablo explica que dejó a Tito en Creta. «Te dejé» es natural y fiel; evita una carga innecesaria de «dejé atrás», que en español puede sonar más enfática de lo que requiere el griego.
- source_word: ἐν Κρήτῃ
  english_pob_choice: in Crete
  chosen_spanish: en Creta
  alternatives_spanish:
  - en la isla de Creta
  lexicon: BDAG
  rationale: Es la equivalencia geográfica directa y estándar en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito; «para que» comunica de manera natural el sentido teleológico.
- source_word: τὰ λείποντα
  english_pob_choice: what remained
  chosen_spanish: lo que quedaba
  alternatives_spanish:
  - lo que faltaba
  - las cosas que quedaban sin terminar
  lexicon: BDAG
  rationale: La frase participial señala asuntos aún pendientes. «Lo que quedaba» reproduce la idea de incompletitud con naturalidad; «lo que faltaba» mantiene la posible tensión de carencia que la POB inglesa preservó en nota.
- source_word: ἐπιδιορθώσῃ
  english_pob_choice: set in order
  chosen_spanish: pusieras en orden
  alternatives_spanish:
  - corrigieras
  - reordenaras
  lexicon: BDAG
  rationale: El verbo incluye la idea de corregir y ordenar lo pendiente. «Pusieras en orden» conserva ese matiz práctico sin volverse demasiado técnico.
- source_word: καταστήσῃς
  english_pob_choice: appoint
  chosen_spanish: designaras
  alternatives_spanish:
  - nombraras
  - establecieras
  lexicon: BDAG
  rationale: En este contexto eclesial el verbo se refiere a colocar personas en un cargo. «Designaras» funciona bien en español y mantiene el acto de nombramiento; «nombraras» sería igualmente posible, pero «designaras» evita una repetición demasiado administrativa con «ancianos».
- source_word: κατὰ πόλιν
  english_pob_choice: in every city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - ciudad por ciudad
  - en todas las ciudades
  lexicon: BDAG
  rationale: La construcción distributiva κατά + singular se vierte naturalmente como «en cada ciudad». La alternativa «ciudad por ciudad» es válida, pero menos fluida en el cuerpo principal.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - ancianos de la iglesia
  lexicon: BDAG
  rationale: La POB inglesa opta por «elders» para evitar importar una estructura denominacional posterior. En español, «ancianos» conserva la referencia a líderes reconocidos de la comunidad sin tecnicismo eclesiástico adicional; «presbíteros» sería más técnico y menos accesible.
- source_word: ὡς ἐγώ σοι διεταξάμην
  english_pob_choice: as I directed you
  chosen_spanish: como te lo indiqué
  alternatives_spanish:
  - como te lo mandé
  - como te lo ordené
  lexicon: BDAG
  rationale: διατάσσω puede expresar mandato o instrucción autoritativa. «Te lo indiqué» mantiene la autoridad apostólica sin intensificar la formulación hasta «mandé» u «ordené», que pueden sonar más duros que el contexto inmediato.
theological_decisions:
- issue: Terminología de liderazgo eclesial en πρεσβυτέρους
  english_pob_reading: Render as 'elders' without importing later denominational structures.
  chosen_spanish_reading: Traducir como «ancianos» sin introducir estructuras eclesiales posteriores.
  alternative_spanish_readings:
  - presbíteros
  - ancianos de la iglesia
  rationale: El pasaje habla de liderazgo local reconocido, pero la traducción no debe prejuzgar debates posteriores sobre gobierno eclesial. «Ancianos» refleja el sentido léxico y el contexto inmediato con neutralidad confesional.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Fuerza de διεταξάμην
  english_pob_reading: Use 'directed' rather than the stronger 'commanded' in the main text.
  chosen_spanish_reading: Usar «te lo indiqué» en lugar de una forma más fuerte como «te lo mandé».
  alternative_spanish_readings:
  - te lo mandé
  - te lo ordené
  rationale: El griego admite una instrucción con autoridad. «Te lo indiqué» conserva la autoridad de Pablo sin sobrerrepresentar el tono como si fuera una orden militar o jurídica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente (gpt-5.4, 2026-04-23T10:01:57Z): sin cambios necesarios; el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - Se evitó «Cristo» porque no aparece Χριστός en el texto fuente.
  - «Ancianos» se usa como término eclesial sobrio y no denominacional, coherente con la decisión inglesa de «elders».
  - La nota b preserva la ambigüedad distributiva de κατὰ πόλιν sin forzar una sola paráfrasis.
  - La nota c conserva la tensión entre «indiqué» y la alternativa más fuerte «mandé».
