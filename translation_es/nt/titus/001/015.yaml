revisions:
- from: Todo es puro para los puros; pero para los que están contaminados y no creen[a], nada es puro. Al contrario, tanto su mente como su conciencia están contaminadas.
  to: Todo es puro para los puros; pero para los contaminados e incrédulos[a], nada es puro. Más bien, tanto su mente como su conciencia están contaminadas.
  rationale: Se ajusta ἀπίστοις a una forma adjetival («incrédulos») para preservar mejor el paralelismo y el registro del original, y se suaviza «Al contrario» a «Más bien» para reflejar con mayor naturalidad el contraste explicativo de ἀλλὰ. Se mantiene «puro» y la nota sobre «limpios», en plena consonancia con la racionalidad léxica y teológica documentada.
