translation:
  language: es
  text: Todo es puro para los puros; pero para los contaminados e incrédulos[a], nada es puro. Más bien, tanto su mente como su conciencia están contaminadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpios» en todo el versículo; el término griego puede llevar matices rituales y morales.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: All things
  chosen_spanish: Todo es puro
  alternatives_spanish:
  - Todas las cosas son puras
  lexicon: BDAG
  rationale: El neutro plural griego funciona de manera comprehensiva. En español, «todo» reproduce mejor la amplitud proverbial de la cláusula que una solución más pesada como «todas las cosas».
- source_word: καθαρὰ / καθαρόν / καθαροῖς
  english_pob_choice: pure / the pure
  chosen_spanish: puro / los puros
  alternatives_spanish:
  - limpio / los limpios
  lexicon: BDAG
  rationale: «καθαρός» puede abarcar pureza ritual y moral. En este contexto, «puro» conserva esa amplitud mejor que «limpio». El sustantivado «los puros» refleja bien el dativo plural adjetival.
- source_word: τοῖς δὲ μεμιαμμένοις
  english_pob_choice: to those who are defiled
  chosen_spanish: para los que están contaminados
  alternatives_spanish:
  - para los que han sido contaminados
  - para los contaminados
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante. «Están contaminados» comunica ese estado en español de forma natural; «contaminados» también sería posible, pero la forma verbal ayuda a mantener la fuerza estativa del griego.
- source_word: ἀπίστοις
  english_pob_choice: unbelieving
  chosen_spanish: no creen
  alternatives_spanish:
  - incrédulos
  - sin fe
  lexicon: BDAG
  rationale: Aquí el contraste es con la fe real, no principalmente con la fidelidad pactual. «No creen» resulta claro y directo en español, aunque «incrédulos» también es viable.
- source_word: οὐδὲν καθαρόν
  english_pob_choice: nothing is pure
  chosen_spanish: nada es puro
  alternatives_spanish:
  - nada está limpio
  lexicon: BDAG
  rationale: La estructura predicativa se conserva de modo paralelo a la primera cláusula. «Puro» mantiene la misma red semántica que en la primera mitad del versículo.
- source_word: ἀλλὰ
  english_pob_choice: Instead
  chosen_spanish: Al contrario
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: La partícula introduce un contraste explicativo fuerte. «Al contrario» expresa mejor ese giro que un simple «pero».
- source_word: μεμίανται
  english_pob_choice: are defiled
  chosen_spanish: están contaminadas
  alternatives_spanish:
  - han sido contaminadas
  - están impuras
  lexicon: BDAG
  rationale: El perfecto pasivo subraya un estado presente derivado de una acción previa. «Están contaminadas» preserva ese valor estativo y enlaza con el verbo del participio anterior.
- source_word: νοῦς
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - razón
  lexicon: BDAG
  rationale: «Mente» es la correspondencia más natural y amplia para la facultad de pensar/percibir en español contemporáneo.
- source_word: συνείδησις
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  lexicon: BDAG
  rationale: La equivalencia habitual en español es «conciencia». Mantiene la referencia paulina a la facultad moral de autovigilancia y juicio interior.
- source_word: καὶ ... καὶ
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - y ... y
  lexicon: Greek grammar
  rationale: La correlación destaca que ambas facultades están afectadas. «Tanto ... como» transmite naturalmente ese énfasis en español.
theological_decisions:
- issue: Alcance de la pureza
  english_pob_reading: Rendered καθαρός as 'pure' throughout to preserve both ritual and moral dimensions without restricting the saying to ceremonial cleanness alone.
  chosen_spanish_reading: Se tradujo καθαρός como «puro» en todo el versículo para conservar tanto la dimensión ritual como la moral, sin reducir el dicho a una simple limpieza ceremonial.
  alternative_spanish_readings:
  - Traducirlo como «limpio» para enfatizar la pureza ceremonial
  rationale: 'El contexto de Tito 1 incluye controversias sobre pureza y regulaciones judías, pero la afirmación va más allá de alimentos o ritos: el problema está en la condición interior del sujeto. «Puro» preserva mejor esa tensión teológica.'
  doctrine_reference: 'Principio de traducción: conservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: Se ha seguido de cerca el audit trail inglés sin traducir mecánicamente desde él. La redacción española conserva el paralelismo, la fuerza estativa del perfecto y la amplitud semántica de καθαρός, ἀπίστοις, νοῦς y συνείδησις.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no lo contiene.
  - Se prefirió «puro» sobre «limpio» para mantener la tensión ritual/moral documentada.
  - Se usó «conciencia» como término estable para συνείδησις en coherencia con el resto del proyecto.
  - Se eligió una estructura española paralela y legible que conserva el contraste del griego entre lo exterior y la condición interior.
