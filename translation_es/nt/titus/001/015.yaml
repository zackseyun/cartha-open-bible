review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido global del griego: universalidad de πάντα, continuidad de καθαρός como «puro», contraste con los contaminados/incrédulos, y la contaminación de la mente y la conciencia. Sin embargo, «no creen» para ἀπίστοις debilita la simetría adjetival del original y su coordinación con «contaminados»; una forma adjetival como «incrédulos» o «sin fe» preserva mejor el paralelismo. Además, «Al contrario» para ἀλλὰ es posible, pero «más bien» refleja con más naturalidad el giro explicativo-contrastivo en este contexto.'
  spanish_quality_summary: El español es claro y legible. «Todo es puro para los puros» suena natural y conserva el tono sentencioso. No obstante, «los que están contaminados y no creen» mezcla una descripción adjetival con una verbal de forma algo menos elegante y menos ajustada al original. «Contaminados e incrédulos» mejora la fluidez, la dignidad del registro y la cohesión interna del versículo. El resto del verso está bien construido.
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos aquí. La elección de «puro» frente a «limpio» está bien alineada con la decisión POB y debe mantenerse. «Mente» y «conciencia» también están bien. La principal desalineación es lexical-estilística: ἀπίστοις queda mejor como «incrédulos» que como «no creen», en línea con la decisión inglesa «unbelieving».'
  issues:
  - severity: medium
    issue: ἀπίστοις se traduce como «no creen»
    rationale: El original usa un adjetivo coordinado con μεμιαμμένοις. «No creen» comunica el sentido básico, pero pierde el paralelismo formal y el carácter descriptivo del griego. «Incrédulos» o «sin fe» preserva mejor la coordinación «contaminados e incrédulos».
  - severity: low
    issue: «Al contrario» puede sonar demasiado enfático o contradecir más de lo que explica
    rationale: 'ἀλλὰ aquí introduce el verdadero punto del contraste: no la pureza de las cosas, sino la corrupción interior. «Más bien» suena más natural en español bíblico contemporáneo para ese valor adversativo-explicativo.'
  revised_spanish_text: Todo es puro para los puros; pero para los contaminados e incrédulos[a], nada es puro. Más bien, tanto su mente como su conciencia están contaminadas.
  revised_footnotes:
  - marker: a
    text: O «limpios» en todo el versículo; el término griego puede llevar matices rituales y morales.
    reason: lexical_alternative
