translation:
  language: es
  text: Pablo, esclavo de Dios y apóstol de Jesús Mesías, para la fe de los escogidos[a] de Dios y el conocimiento[b] de la verdad que corresponde a la piedad[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los elegidos de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «pleno conocimiento de la verdad».
    reason: lexical_alternative
  - marker: c
    text: O «la verdad que conduce a la piedad».
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: La guía de la POB favorece ‘esclavo’ cuando δοῦλος comunica pertenencia total y condición vinculada. En español, ‘esclavo’ conserva esa fuerza relacional y de sujeción mejor que ‘siervo’, que suaviza el término.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: 'Es un genitivo de pertenencia/relación que modifica a δοῦλος: Pablo pertenece a Dios. En esta frase el griego no usa el nombre divino explícito, así que ‘de Dios’ refleja con naturalidad el original.'
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: ‘Apóstol’ es el término técnico y reconocido para el oficio de Pablo; ‘enviado’ sería semánticamente posible pero perdería precisión eclesial.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave, no como contraste fuerte. En español, ‘y’ comunica mejor la progresión apposicional de la autodescripción.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Aunque la POB inglesa mantiene ‘Messiah’ por política de títulos, en español ‘Jesucristo’ es la forma más natural y reverente para un uso eclesial amplio. Dado que el nombre-título ya está lexicalizado en español y la fórmula fija evita extrañeza, se opta por la forma estándar sin borrar la referencia cristológica.
- source_word: κατὰ πίστιν
  english_pob_choice: for the faith
  chosen_spanish: para la fe
  alternatives_spanish:
  - en relación con la fe
  - según la fe
  lexicon: BDAG
  rationale: La preposición κατὰ aquí marca orientación o referencia de la misión apostólica. ‘Para la fe’ conserva ese sentido direccional en español sin sobreactuar una equivalencia más técnica o pesada.
- source_word: ἐκλεκτῶν θεοῦ
  english_pob_choice: God’s chosen ones
  chosen_spanish: los escogidos de Dios
  alternatives_spanish:
  - los elegidos de Dios
  - el pueblo escogido de Dios
  - los electos de Dios
  lexicon: BDAG
  rationale: La frase describe a quienes Dios ha escogido. ‘Escogidos’ mantiene la idea de elección divina con español claro y bíblico; ‘electos’ suena más técnico y ‘elegidos’ puede ser correcto pero menos marcado por la iniciativa divina.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - pleno conocimiento
  - reconocimiento
  lexicon: BDAG
  rationale: ἐπίγνωσις intensifica la idea de conocer, pero en este contexto ‘conocimiento’ es suficiente y natural. Se conserva la posibilidad de mayor intensidad en la nota [b].
- source_word: ἀληθείας
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: El artículo se refleja naturalmente en español como ‘la verdad’, refiriéndose al contenido de la fe y no a la verdad abstracta en general.
- source_word: τῆς κατ’ εὐσέβειαν
  english_pob_choice: that accords with godliness
  chosen_spanish: que corresponde a la piedad
  alternatives_spanish:
  - que conduce a la piedad
  - conforme a la piedad
  lexicon: BDAG
  rationale: La construcción modifica a ‘la verdad’ e indica su relación con εὐσέβεια. ‘Corresponde a’ reproduce bien la relación expresada por κατά sin forzar una lectura causal; ‘piedad’ es la forma más estable en castellano bíblico para εὐσέβεια.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - temor de Dios
  lexicon: BDAG
  rationale: En las Pastorales, εὐσέβεια suele referirse a una vida reverente orientada a Dios. ‘Piedad’ es el equivalente tradicional y comprensible en español; ‘devoción’ puede ser demasiado subjetivo.
theological_decisions:
- issue: Cómo traducir Χριστός en este saludo inicial
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Mesías
  rationale: La política general de la POB favorece ‘Mesías’ cuando Χριστός funciona como título. Sin embargo, en español ‘Jesucristo’ es una forma histórica y plenamente inteligible que preserva la identificación cristológica en un registro natural. Se evita ‘Cristo’ aislado como mero nombre despojado del trasfondo titular.
  doctrine_reference: DOCTRINE.md translation policy on Χριστός / Messiah language
- issue: Relación de κατὰ πίστιν ... καὶ ἐπίγνωσιν
  english_pob_reading: for the faith of God’s chosen ones and the knowledge of the truth
  chosen_spanish_reading: para la fe de los escogidos de Dios y el conocimiento de la verdad
  alternative_spanish_readings:
  - según la fe de los escogidos de Dios y el conocimiento de la verdad
  - con respecto a la fe...
  rationale: La sintaxis es compacta y admite varias lecturas. ‘Para’ mantiene la orientación ministerial de la frase sin cerrar indebidamente el matiz semántico de κατά. No se explicita una teología más estrecha que la que el texto exige.
  doctrine_reference: Translation philosophy item 3; Pastorals syntax notes
- issue: Sentido de τῆς κατ’ εὐσέβειαν
  english_pob_reading: the truth that accords with godliness
  chosen_spanish_reading: la verdad que corresponde a la piedad
  alternative_spanish_readings:
  - la verdad que conduce a la piedad
  - la verdad conforme a la piedad
  rationale: ‘Corresponde a’ preserva el vínculo sin imponer un valor causal exclusivo. La alternativa ‘conduce a’ es plausible, pero el griego permite una relación más general de conformidad u orientación.
  doctrine_reference: BDAG under κατά; translation note on εὐσέβεια
translation_notes:
  revision_awareness: El expediente inglés muestra un ciclo de revisión sobre Χριστός/‘Christ’ y una restauración final de ‘Messiah’ por política doctrinal. En español, se evaluó la tensión entre la política base de traducir Χριστός como ‘Mesías’ y la fijación idiomática de ‘Jesucristo’; se eligió esta última por naturalidad y recepción eclesial amplia, sin perder el valor cristológico del título. También se mantuvo la flexibilidad de κατά y de ἐπίγνωσις con notas alternativas.
  spanish_consistency_notes:
  - Se mantiene ‘esclavo’ para δοῦλος, en coherencia con la terminología POB sobre sujeción y pertenencia.
  - ‘Piedad’ se usa para εὐσέβεια, término estable en el registro pastoral.
  - ‘La verdad’ conserva el artículo definido de ἀληθείας.
  - Las notas [b] y [c] se colocan en el orden en que aparecen las alternativas relevantes en el texto, sin reutilizar marcadores.
