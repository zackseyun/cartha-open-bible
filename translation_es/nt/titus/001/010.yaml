translation:
  language: es
  text: Porque hay muchos rebeldes, habladores vanos y engañadores, especialmente los de la circuncisión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los del partido de la circuncisión» o «los procedentes de la circuncisión». La frase probablemente se refiere a opositores judíos o judaizantes, pero el griego es menos explícito.
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: BDAG
  rationale: Introduce la razón o explicación del contexto anterior; «porque» comunica bien la conexión discursiva en español y mantiene la función explicativa de γάρ.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  - muchos hombres
  lexicon: BDAG
  rationale: Adjetivo cuantitativo simple; en español puede sustantivarse por el contexto, así que «muchos» conserva la brevedad del griego.
- source_word: ἀνυπότακτοι
  english_pob_choice: rebellious people
  chosen_spanish: rebeldes
  alternatives_spanish:
  - insubordinados
  - indóciles
  lexicon: BDAG
  rationale: El término expresa negativa a someterse a autoridad legítima. «Rebeldes» es natural en español y conserva la fuerza moral y relacional del vocablo.
- source_word: ματαιολόγοι
  english_pob_choice: empty talkers
  chosen_spanish: habladores vacíos
  alternatives_spanish:
  - habladores vanos
  - charlatanes
  lexicon: BDAG
  rationale: Compuesto que denota hablar cosas vacías o inútiles. «Habladores vacíos» preserva la imagen semántica con un español claro y digno.
- source_word: φρεναπάται
  english_pob_choice: deceivers
  chosen_spanish: engañadores
  alternatives_spanish:
  - seductores
  - los que engañan
  lexicon: BDAG
  rationale: Literalmente sugiere engañar la mente; en español, «engañadores» comunica de forma idiomática ese sentido sin perder la acusación ética.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - particularmente
  - sobre todo
  lexicon: BDAG
  rationale: Marca un subgrupo con énfasis especial; «especialmente» es la equivalencia más natural y precisa.
- source_word: οἱ ἐκ τῆς περιτομῆς
  english_pob_choice: those of the circumcision
  chosen_spanish: los de la circuncisión
  alternatives_spanish:
  - los del partido de la circuncisión
  - los procedentes de la circuncisión
  lexicon: BDAG
  rationale: Se mantiene la formulación transparente del griego sin añadir una identificación histórica más explícita que la del texto. «Los de la circuncisión» conserva la ambigüedad controlada del original.
theological_decisions:
- issue: Referente de «los de la circuncisión»
  english_pob_reading: Rendered transparently as 'those of the circumcision' without specifying 'Jews' or 'circumcision party' in the main text.
  chosen_spanish_reading: «los de la circuncisión» en el texto principal, sin precisar en la traducción si se trata de un grupo judío o judaizante.
  alternative_spanish_readings:
  - «los del partido de la circuncisión»
  - «los procedentes de la circuncisión»
  - «los judíos»
  rationale: La expresión griega es breve y menos explícita que las expansiones interpretativas. Mantenerla transparente evita resolver en la traducción una identificación histórica que el texto no formula de manera directa.
  doctrine_reference: Principio de primacía del idioma original y preservación de la tensión interpretativa; la traducción no debe sobreespecificar donde el griego permanece compacto.
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones aplicadas; esta versión sigue de cerca sus decisiones léxicas y su cautela interpretativa, adaptándolas a un español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene «circuncisión» como término técnico, evitando expandir a «partido» en el texto principal.
  - 'La secuencia adjetival se conserva con un orden natural en español: rebeldes, habladores vacíos y engañadores.'
  - No se introduce «Cristo», «Señor» ni otras fórmulas no presentes en el versículo.
