    rationale: La revisión española debe preservar no solo el rango léxico griego, sino también la decisión documentada del POB salvo razón fuerte para apartarse. Aquí no hay necesidad española que justifique invertir principal y alternativa.
  - severity: medium
    issue: «los que contradicen» deja implícito el objeto y suena truncado en español.
    rationale: El contexto permite inferirlo, pero el español idiomático mejora con «los que la contradicen», reflejando además la explicitación contextual del inglés POB ('contradict it').
  - severity: low
