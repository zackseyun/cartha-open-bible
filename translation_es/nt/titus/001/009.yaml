translation:
  language: es
  text: aferrado[a] a la palabra digna de confianza, conforme a la enseñanza, para que también sea capaz de exhortar con la enseñanza sana y de reprender[b] a los que la contradicen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aferrado a la palabra fiel conforme a la enseñanza».
    reason: lexical_alternative
  - marker: b
    text: O «refutar»; el verbo griego también puede implicar exponer o demostrar el error de quienes contradicen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντεχόμενον
  english_pob_choice: holding firmly to
  chosen_spanish: aferrado a
  alternatives_spanish:
  - sosteniéndose firmemente a
  - aferrándose a
  - manteniéndose fiel a
  lexicon: BDAG
  rationale: El participio expresa adhesión firme y sostenida. «Aferrado a» comunica bien la idea de mantenerse sujeto con tenacidad en un español natural y digno, sin suavizar la fuerza del verbo.
- source_word: πιστοῦ λόγου
  english_pob_choice: the trustworthy word
  chosen_spanish: la palabra digna de confianza
  alternatives_spanish:
  - la palabra fiel
  - la palabra confiable
  - el mensaje digno de confianza
  lexicon: BDAG
  rationale: πιστός aquí describe la fiabilidad del λόγος. «Digna de confianza» conserva el valor de confiabilidad y evita un matiz exclusivamente confesional de «fiel» en español, aunque esa sigue siendo una alternativa válida.
- source_word: κατὰ τὴν διδαχήν
  english_pob_choice: in accordance with the teaching
  chosen_spanish: conforme a la enseñanza
  alternatives_spanish:
  - según la enseñanza
  - de acuerdo con la enseñanza
  - en conformidad con la enseñanza
  lexicon: BDAG
  rationale: La preposición κατά con acusativo expresa conformidad. «Conforme a» es una solución clara y sobria; «la enseñanza» mantiene el artículo porque el texto apunta a una enseñanza reconocida, no genérica.
- source_word: παρακαλεῖν
  english_pob_choice: to exhort
  chosen_spanish: exhortar
  alternatives_spanish:
  - animar
  - instar
  - aconsejar
  lexicon: BDAG
  rationale: En este contexto pastoral, παρακαλέω no es solo consolar o animar, sino llamar con autoridad a la respuesta correcta. «Exhortar» conserva esa fuerza sin caer en dureza innecesaria.
- source_word: ἐν τῇ διδασκαλίᾳ τῇ ὑγιαινούσῃ
  english_pob_choice: by sound teaching
  chosen_spanish: con la enseñanza sana
  alternatives_spanish:
  - con la doctrina sana
  - por medio de la enseñanza sana
  - con sana enseñanza
  lexicon: BDAG
  rationale: ὑγιαίνω se usa metafóricamente de enseñanza sana o saludable. «Enseñanza sana» es la opción más transparente en español y mantiene el matiz de salud/doctrina sin tecnicismo excesivo.
- source_word: ἀντιλέγοντας
  english_pob_choice: those who contradict it
  chosen_spanish: los que contradicen
  alternatives_spanish:
  - los que se oponen
  - los que hablan en contra
  - los contradictores
  lexicon: BDAG
  rationale: El participio describe a quienes hablan contra la palabra o enseñanza ya mencionada. En español, el objeto implícito se entiende por el contexto, por lo que no es necesario explicitarlo en el texto principal.
- source_word: ἐλέγχειν
  english_pob_choice: to rebuke
  chosen_spanish: refutar
  alternatives_spanish:
  - reprender
  - reprobar
  - poner en evidencia
  lexicon: BDAG
  rationale: El verbo puede incluir refutar, exponer y corregir. Dado que el contexto incluye responder a opositores doctrinales, «refutar» preserva bien la dimensión de demostrar el error, mientras que la nota conserva la alternativa de reprensión pastoral.
- source_word: δυνατὸς ᾖ
  english_pob_choice: he may be able
  chosen_spanish: sea capaz
  alternatives_spanish:
  - pueda
  - esté capacitado
  - sea competente
  lexicon: BDAG
  rationale: La cláusula de propósito expresa capacidad. «Sea capaz» es idiomático en español y mantiene el sentido potencial sin introducir una formulación demasiado técnica.
theological_decisions:
- issue: Relación entre «la palabra digna de confianza» y «la enseñanza»
  english_pob_reading: These refer to the recognized apostolic Christian teaching entrusted to church leaders, not merely the elder's private opinion or rhetorical skill.
  chosen_spanish_reading: Se refieren a la enseñanza apostólica reconocida, confiada a los líderes de la iglesia, no a la opinión privada del anciano ni a simple habilidad retórica.
  alternative_spanish_readings:
  - una instrucción moral general
  - una doctrina indefinida
  rationale: La presencia del artículo en διδαχή y la combinación con λόγος en el contexto pastoral apuntan a una enseñanza estable y reconocible. La redacción española mantiene esa referencia sin añadir categorías doctrinales posteriores que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de ἐλέγχειν frente a opositores
  english_pob_reading: The elder is qualified to confront and correct doctrinal opposition, rendered 'rebuke,' while preserving 'refute' as an alternative nuance.
  chosen_spanish_reading: El líder debe estar capacitado para confrontar y corregir la oposición doctrinal, expresado aquí como «refutar», manteniendo la reprensión como matiz alternativo.
  alternative_spanish_readings:
  - reprender
  - reprobar
  - exponer el error
  rationale: El versículo combina instrucción positiva y corrección de quienes contradicen. «Refutar» conserva la dimensión de responder al error, y la nota permite ver que el verbo también puede tener un matiz de reprensión pastoral.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no hacían falta cambios sustanciales. Esta versión mantiene esa línea, pero ajusta el español para que la fuerza de ἀντεχόμενον y ἐλέγχειν quede clara con un registro natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el texto no contiene Χριστός.
  - «Enseñanza» se usa de manera consistente para διδαχή en este contexto pastoral.
  - «Refutar» se eligió en el texto principal para preservar el matiz de ἐλέγχειν; la reprensión queda documentada en la nota.
  - Se preservó el artículo de «la enseñanza» para reflejar una referencia reconocible y no genérica.
