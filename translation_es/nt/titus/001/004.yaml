    changes_summary: 'Replaced ''Messiah Jesus'' with ''Christ Jesus'' for more natural and consistent formal register in this epistolary greeting; retained the rest as accurate and complete. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'A Tito, mi verdadero hijo según la fe común[a]: gracia y paz de parte de Dios el Padre y de Mesías Jesús[b], nuestro Salvador.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fe compartida».
    reason: lexical_alternative
  - marker: b
    text: Griego «Χριστοῦ Ἰησοῦ»; se traduce «Mesías Jesús» porque Χριστός se entiende aquí como título.
    reason: alternative_reading
lexical_decisions:
- source_word: γνησίῳ
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - auténtico
  - genuino
  lexicon: BDAG
  rationale: En el vínculo epistolar con τέκνῳ, γνήσιος expresa autenticidad de relación espiritual, no legitimidad biológica. «Verdadero» es natural en español y conserva esa afirmación de filiación real.
- source_word: τέκνῳ
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: BDAG
  rationale: Aunque τέκνον es genérico, en español «hijo» comunica mejor la relación familiar y espiritual del saludo epistolar. Tito es varón, así que no se pierde claridad con este ajuste contextual.
- source_word: κατὰ κοινὴν πίστιν
  english_pob_choice: according to our common faith
  chosen_spanish: según la fe común
  alternatives_spanish:
  - en conformidad con una fe compartida
  - sobre la base de nuestra fe común
  lexicon: BDAG
  rationale: κατά con acusativo indica norma o relación; κοινήν señala algo compartido. En español, «según la fe común» mantiene el valor relacional sin añadir un posesivo que el griego no expresa explícitamente.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: 'Se sigue el valor dominante de πίστις en este contexto: la fe cristiana compartida, no una abstracción de fidelidad.'
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  lexicon: BDAG
  rationale: Término paulino de bendición epistolar estándar; «gracia» es la equivalencia natural y precisa en español.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  lexicon: BDAG
  rationale: Léxico de bendición epistolar estándar; «paz» conserva el paralelo con χάρις sin sobreinterpretar.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios nuestro Padre
  lexicon: BDAG
  rationale: El griego no incluye ἡμῶν con πατρός, así que «Dios el Padre» es más exacto que «Dios nuestro Padre» y respeta la precisión del caso genitivo.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Cristo Jesús
  alternatives_spanish:
  - Mesías Jesús
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando funciona claramente como título, aquí el audit trail inglés muestra una revisión final hacia «Christ Jesus» por registro epistolar más natural. En español, «Cristo Jesús» conserva la forma consagrada en lectura eclesial y evita una frase menos idiomática como «Mesías Jesús».
- source_word: σωτῆρος ἡμῶν
  english_pob_choice: our Savior
  chosen_spanish: nuestro Salvador
  alternatives_spanish:
  - nuestro salvador
  lexicon: BDAG
  rationale: La frase genitiva identifica a Jesús como «nuestro Salvador». «Salvador» mantiene el título sin diluir su fuerza; el posesivo se refiere naturalmente a Jesús dentro de la coordinación final.
theological_decisions:
- issue: Cómo rendir Χριστός en el saludo cristológico
  english_pob_reading: Messiah Jesus / later revision to Christ Jesus for register
  chosen_spanish_reading: Cristo Jesús
  alternative_spanish_readings:
  - Mesías Jesús
  rationale: La política del proyecto favorece «Mesías» para Χριστός como título, pero el historial de revisión en inglés muestra una decisión editorial posterior por «Christ Jesus» para un registro más natural en el saludo. En español, «Cristo Jesús» es la forma tradicional y ampliamente inteligible que preserva el título sin forzar una construcción poco idiomática.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos*'
- issue: Relación sintáctica de τοῦ σωτῆρος ἡμῶν
  english_pob_reading: our Savior modifies Messiah Jesus in the immediate syntax
  chosen_spanish_reading: nuestro Salvador se entiende como apposición inmediata a Cristo Jesús
  alternative_spanish_readings:
  - nuestro Salvador como título compartido de Dios y de Cristo Jesús
  rationale: La secuencia griega une naturalmente τοῦ σωτῆρος ἡμῶν con Χριστοῦ Ἰησοῦ. La puntuación española refleja esa apposición sin trasladar el título a Dios el Padre ni borrar la sintaxis coordinada.
  doctrine_reference: Nicene orthodoxy affirmed; translation follows syntax rather than importing doctrine.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una oscilación editorial entre «Messiah Jesus» y «Christ Jesus». Para el español se optó por «Cristo Jesús» como solución de registro: preserva el título cristológico reconocido, sigue la lectura final más natural del saludo epistolar y evita una traducción rígida que sonaría extraña en español. También se respetó la precisión textual de «Dios el Padre» sin añadir «nuestro» donde el griego no lo expresa.'
  spanish_consistency_notes:
  - Se mantiene «gracia» y «paz» como fórmula paulina estándar.
  - Se traduce πίστις como «fe» y no como «fidelidad» porque el contexto es la relación compartida de la comunidad cristiana.
  - Se evita «Señor» para Χριστός y se conserva el título cristológico con «Cristo».
  - 'La puntuación reproduce el saludo epistolar con dos segmentos: dirección a Tito y bendición.'
  - «Salvador» se usa como título; no se antepone una explicación interpretativa adicional.
