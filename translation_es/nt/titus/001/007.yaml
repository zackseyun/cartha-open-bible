review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y casi todo el sentido del griego: necesidad/obligación, cualificación del ἐπίσκοπος, condición de ἀνέγκλητον, función de οἰκονόμος de Dios, y la serie de negaciones. Sin embargo, dos elecciones no preservan óptimamente el matiz documentado: «supervisor» suena corporativo en español eclesial y no comunica tan bien el oficio funcional como «supervisor/obispo» pretende; «encargado» o mejor «supervisor»? A la luz del proyecto y de la legibilidad bíblica, «supervisor» es comprensible pero poco natural en registro bíblico. Además, «soberbio» reduce αὐθάδη a orgullo, mientras el audit trail subraya más bien una voluntad obstinada/autocomplaciente. Conviene ajustar esos puntos.'
  spanish_quality_summary: El español es claro y gramatical, con buen registro general. No obstante, «supervisor» resulta demasiado administrativo/moderno para lectura eclesial continua, e «irascible» es correcto pero algo culto; aun así es aceptable. «Ávido de ganancia vergonzosa» es fiel, aunque «codicioso de ganancias vergonzosas» o «ávido de lucro vergonzoso» sonarían más naturales; no es imprescindible cambiarlo. El principal problema de calidad/precisión es «no soberbio» para αὐθάδη.
  glossary_alignment: Alinea bien con los principios del proyecto en Dios/Dios, y evita «obispo» como forma principal de ἐπίσκοπος conforme al audit trail. No hay conflictos con terminología teológica mayor. Sí conviene afinar la decisión léxica de αὐθάδη hacia «obstinado» o «terco en lo suyo» para conservar el matiz de self-willed. Mantengo nota alternativa para «obispo».
  issues:
  - severity: medium
    issue: «no soberbio» no representa con suficiente precisión αὐθάδη
    rationale: 'El griego y la decisión inglesa enfatizan «self-willed»: obstinado, autocomplaciente, empeñado en su propia voluntad. «Soberbio» capta arrogancia, pero omite el componente volitivo destacado por la POB.'
  - severity: low
    issue: «supervisor» es comprensible pero algo poco natural en registro bíblico/eclesial
    rationale: Aunque refleja la función y evita connotaciones posteriores de «obispo», en español general de iglesia «supervisor» suena administrativo. Aun así, no es infiel; es una cuestión de estilo/legibilidad más que de sentido.
  revised_spanish_text: Porque es necesario que el supervisor[a] sea irreprochable, como administrador de Dios, no obstinado, no irascible, no dado al vino, no violento, no ávido de ganancia vergonzosa[b],
  revised_footnotes:
  - marker: a
    text: O «obispo». El término griego denota a quien supervisa; «supervisor» evita importar connotaciones eclesiásticas posteriores que pueden asociarse con «obispo».
    reason: alternative_reading
  - marker: b
    text: O «ávido de ganancia deshonesta». El griego enfatiza una ganancia buscada de manera moralmente vergonzosa.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y casi todo el borrador, pero se cambia «soberbio» por «obstinado» para reflejar mejor αὐθάδη según la documentación inglesa («self-willed»). No se fuerza otro cambio mayor: «supervisor» permanece por alineación con la filosofía de evitar «obispo», aunque no sea la opción más elegante en español.'
