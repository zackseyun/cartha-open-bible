base_translation:
  language: en
  yaml_path: translation/nt/titus/001/007.yaml
  text: For an overseer must be above reproach as God's steward[a], not self-willed, not quick-tempered, not given to wine, not violent, not greedy for shameful gain[b],
  footnotes:
  - marker: a
    text: Or 'bishop.' The Greek term denotes one who oversees; 'overseer' avoids importing later church-office connotations that may attach to 'bishop.'
    reason: alternative_reading
  - marker: b
    text: Or 'greedy for dishonest gain.' The Greek emphasizes profit sought in a morally disgraceful way.
    reason: lexical_alternative
