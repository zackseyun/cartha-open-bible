translation:
  language: es
  text: Porque es necesario que el supervisor[a] sea irreprochable, como administrador de Dios, no obstinado, no irascible, no dado al vino, no violento, no ávido de ganancia vergonzosa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obispo». El término griego denota a quien supervisa; «supervisor» evita importar connotaciones eclesiásticas posteriores que pueden asociarse con «obispo».
    reason: alternative_reading
  - marker: b
    text: O «ávido de ganancia deshonesta». El griego enfatiza una ganancia buscada de manera moralmente vergonzosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίσκοπον
  english_pob_choice: overseer
  chosen_spanish: supervisor
  alternatives_spanish:
  - obispo
  - anciano
  lexicon: BDAG
  rationale: Se vierte por su sentido funcional de quien vigila y supervisa, evitando importar una acepción eclesiástica posterior que el término griego por sí solo no exige. 'Supervisor' comunica la función de manera natural en español contemporáneo.
- source_word: ἀνέγκλητον
  english_pob_choice: above reproach
  chosen_spanish: irreprochable
  alternatives_spanish:
  - sin reproche
  - intachable
  lexicon: BDAG
  rationale: Expresa con claridad que no está abierto a acusación válida. 'Irreprochable' conserva bien la fuerza moral del término sin sonar más absoluto de lo que pide el griego.
- source_word: ὡς θεοῦ οἰκονόμον
  english_pob_choice: as God's steward
  chosen_spanish: como administrador de Dios
  alternatives_spanish:
  - como mayordomo de Dios
  - como administrador de la casa de Dios
  lexicon: BDAG
  rationale: '''Administrador'' transmite la responsabilidad de gestión y rendición de cuentas. Se prefiere esta forma a ''mayordomo'' por ser más transparente en español actual; se conserva la relación genitiva con Dios sin sobrecargar la imagen doméstica.'
- source_word: αὐθάδη
  english_pob_choice: self-willed
  chosen_spanish: soberbio
  alternatives_spanish:
  - obstinado
  - autoafirmado
  - caprichoso
  lexicon: BDAG
  rationale: El griego apunta a una persona que se impone por sí misma y no es dócil a corrección. 'Soberbio' recoge la autosuficiencia arrogante con una palabra natural en español, aunque 'obstinado' también es posible; se evita reducirlo solo a terquedad.
- source_word: ὀργίλον
  english_pob_choice: quick-tempered
  chosen_spanish: irascible
  alternatives_spanish:
  - pronto a la ira
  - colérico
  lexicon: BDAG
  rationale: Comunica la disposición habitual a irritarse, no solo un arrebato ocasional. 'Irascible' es preciso y suficientemente formal para el registro bíblico.
- source_word: πάροινον
  english_pob_choice: given to wine
  chosen_spanish: dado al vino
  alternatives_spanish:
  - aficionado al vino
  - bebedor habitual
  - inclinado al vino
  lexicon: BDAG
  rationale: Conserva la idea adjetival de una persona caracterizada por el exceso con el vino, sin convertirlo necesariamente en una acusación de embriaguez constante.
- source_word: πλήκτην
  english_pob_choice: violent
  chosen_spanish: violento
  alternatives_spanish:
  - agresivo
  - golpeador
  - pendenciero
  lexicon: BDAG
  rationale: El término apunta a una persona dada a golpear o agredir; 'violento' capta bien esa conducta en español moderno. 'Golpeador' resulta más literal pero menos idiomático.
- source_word: αἰσχροκερδῆ
  english_pob_choice: greedy for shameful gain
  chosen_spanish: ávido de ganancia vergonzosa
  alternatives_spanish:
  - codicioso de ganancias deshonestas
  - ávido de lucro vergonzoso
  - deseoso de ganancia vergonzosa
  lexicon: BDAG
  rationale: Se preservan tanto la codicia como el carácter moralmente vergonzoso de la ganancia. 'Ganancia vergonzosa' mantiene una correspondencia directa con el griego y deja abierta la amplitud del matiz ético.
theological_decisions:
- issue: Traducción de ἐπίσκοπος sin cargarlo de una jerarquía eclesiástica posterior
  english_pob_reading: overseer, not bishop
  chosen_spanish_reading: supervisor, no obispo
  alternative_spanish_readings:
  - obispo
  - veedor
  rationale: La lectura de la POB en inglés privilegia la función de supervisión frente al título eclesiástico posterior. En español, 'supervisor' mantiene esa orientación funcional y evita importar un oficio más desarrollado de lo que el verso por sí mismo exige.
  doctrine_reference: Translation philosophy §1, §6
- issue: Expresión de la relación con Dios en ὡς θεοῦ οἰκονόμον
  english_pob_reading: as God's steward
  chosen_spanish_reading: como administrador de Dios
  alternative_spanish_readings:
  - como mayordomo de Dios
  - como administrador de la casa de Dios
  rationale: Se conserva la idea de responsabilidad delegada ante Dios. 'Administrador de Dios' es una solución sintética que refleja pertenencia y encargo sin alterar el sentido de mayordomía presente en el texto griego.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el trazado auditado en inglés. Se mantuvo la secuencia de rasgos negativos con una sola cadencia coordinada, equivalente al flujo sin pausa fuerte del original. También se respetó la decisión de evitar “obispo” como término principal, por la carga eclesial posterior documentada en la POB inglesa.
  spanish_consistency_notes:
  - Se prefirió un registro bíblico contemporáneo, claro y digno, sin arcaísmos innecesarios.
  - Se mantuvo la distinción entre función ('supervisor', 'administrador') y título eclesiástico posterior.
  - Se conservó la fuerza moral de 'ἀνέγκλητον' con 'irreprochable', sin elevarla a una perfección absoluta no exigida por el contexto.
  - '''Ávido de ganancia vergonzosa'' reproduce el enlace entre deseo de lucro y cualidad moral del lucro, sin domesticar el matiz del griego.'
