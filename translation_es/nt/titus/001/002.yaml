translation:
  language: es
  text: en la esperanza de vida eterna[a], que prometió el Dios que no miente antes de que comenzaran los siglos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que comenzara el tiempo». El griego dice literalmente «antes de tiempos eternos / de siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in the hope
  chosen_spanish: en la esperanza
  alternatives_spanish:
  - con base en la esperanza
  - con miras a la esperanza
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo puede expresar base, esfera o circunstancia. «En la esperanza» comunica de manera natural en español que el ministerio/apostolado está situado en relación con esa esperanza, sin forzar una causalidad más específica que la del griego.
- source_word: ζωῆς αἰωνίου
  english_pob_choice: of eternal life
  chosen_spanish: de vida eterna
  alternatives_spanish:
  - de vida perdurable
  - de vida eterna e inagotable
  lexicon: BDAG
  rationale: La construcción genitiva se entiende con naturalidad como contenido de la esperanza. «Vida eterna» es la forma usual y fiel para ζωή αἰώνιος, conservando tanto duración como sentido teológico.
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El relativo femenino singular retoma con mayor probabilidad «vida eterna». «La cual» mantiene esa referencia de forma clara en español y evita ambigüedad con «la esperanza».
- source_word: ἐπηγγείλατο
  english_pob_choice: promised
  chosen_spanish: prometió
  alternatives_spanish:
  - hizo una promesa de
  - pactó
  lexicon: BDAG
  rationale: El aoristo medio de ἐπαγγέλλομαι se expresa bien con «prometió». Es la opción natural y exacta en español, sin intentar reproducir innecesariamente la voz media.
- source_word: ὁ ἀψευδὴς θεός
  english_pob_choice: the God who does not lie
  chosen_spanish: el Dios que no miente
  alternatives_spanish:
  - el Dios veraz
  - el Dios incapaz de mentir
  lexicon: BDAG
  rationale: ἀψευδής significa «no mentiroso, verdadero». La relativa «que no miente» preserva la afirmación moral del texto sin intensificarla más allá de lo que dice el adjetivo. Se evita un sustantivo abstracto como «veraz» por ser menos directo.
- source_word: πρὸ χρόνων αἰωνίων
  english_pob_choice: before the ages began
  chosen_spanish: antes de los tiempos de los siglos
  alternatives_spanish:
  - antes de que comenzaran los siglos
  - antes de tiempos eternos
  - antes de la eternidad
  lexicon: BDAG
  rationale: La frase griega es literalmente «antes de tiempos eternos/age-long». «Antes de los tiempos de los siglos» conserva la acumulación semítica y la fuerza pretemporal del original, evitando resolverla de antemano como «antes de que comenzaran los siglos» o como una paráfrasis más metafísica.
theological_decisions:
- issue: Cómo expresar πρὸ χρόνων αἰωνίων sin resolver su alcance teológico
  english_pob_reading: The verse states that God's promise of eternal life precedes the ages, rendered as 'before the ages began,' without specifying the metaphysical mechanics of to whom the promise was made.
  chosen_spanish_reading: El versículo afirma que la promesa de Dios antecede al orden de los tiempos, sin especificar a quién fue hecha ni si se trata de decreto, propósito o promesa intra-trinitaria.
  alternative_spanish_readings:
  - antes de que comenzaran los siglos
  - desde toda la eternidad
  - antes del tiempo
  rationale: La traducción conserva la referencia temporal anterior a la creación/los siglos, pero no resuelve la cuestión interpretativa sobre el modo de la promesa. Así se preserva la tensión teológica documentada por el POB en inglés.
  doctrine_reference: Preservar la tensión teológica, no resolverla por traducción.
- issue: Cómo traducir ἀψευδής sin sobrecargar la afirmación sobre Dios
  english_pob_reading: Render as 'the God who does not lie' rather than a stronger doctrinal paraphrase such as 'the God who cannot lie.'
  chosen_spanish_reading: «El Dios que no miente» mantiene el rasgo del texto sin convertirlo en una afirmación más fuerte como «el Dios que no puede mentir».
  alternative_spanish_readings:
  - el Dios veraz
  - el Dios incapaz de mentir
  rationale: La expresión griega afirma veracidad y ausencia de mentira. La forma elegida es plenamente teológica y evita intensificar el alcance semántico del adjetivo más allá de lo que el texto exige.
  doctrine_reference: No importar una formulación doctrinal más fuerte que el griego.
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés no introdujo cambios; el acuerdo de revisión fue alto y el texto se mantiene estable. Por eso la propuesta española sigue de cerca la decisión óptima ya auditada, sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por una máscara litúrgica como «SEÑOR».
  - Se usa «vida eterna» como término doctrinal estándar y transparente para ζωή αἰώνιος.
  - «No miente» conserva la fuerza moral de ἀψευδής sin exceso doctrinal.
  - La nota al pie marca la alternativa temporal ya documentada en el POB inglés y la conserva en español.
