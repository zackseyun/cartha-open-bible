translation:
  language: es
  text: si alguien es irreprensible[a], esposo de una sola mujer[b], con hijos fieles[c], no bajo acusación de disolución[d] ni siendo insubordinados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin reproche». El griego ἀνέγκλητος puede expresar la idea de no estar sujeto a una acusación legítima.
    reason: alternative_reading
  - marker: b
    text: O «un hombre de una sola mujer». La frase griega μιᾶς γυναικὸς ἀνήρ es idiomática y mantiene una formulación masculina específica.
    reason: lexical_alternative
  - marker: c
    text: O «creyentes». El griego πιστά puede significar «fieles» o «creyentes».
    reason: alternative_reading
  - marker: d
    text: O «vida desenfrenada» o «conducta disoluta» para ἀσωτία.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέγκλητος
  english_pob_choice: above reproach
  chosen_spanish: irreprensible
  alternatives_spanish:
  - sin reproche
  - no sujeto a acusación
  lexicon: BDAG
  rationale: El griego expresa la idea de no estar expuesto a una acusación legítima. «Irrreprensible» comunica bien esa cualidad evaluativa en español sin sonar tan absoluto como «sin pecado», y conserva la fuerza de requisito para un cargo eclesial.
- source_word: μιᾶς γυναικὸς ἀνήρ
  english_pob_choice: the husband of one wife
  chosen_spanish: marido de una sola mujer
  alternatives_spanish:
  - esposo de una sola mujer
  - hombre de una sola mujer
  lexicon: BDAG
  rationale: La expresión es idiomática y masculina. «Marido de una sola mujer» mantiene la transparencia formal del giro griego y deja abiertas las cuestiones interpretativas sin imponerse más de lo que el texto dice.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendencia
  lexicon: BDAG
  rationale: En este contexto de cualificación doméstica, «hijos» es la forma natural y suficientemente abarcadora en español para τέκνα, sin necesidad de una perífrasis.
- source_word: πιστά
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - creyentes
  - leales
  lexicon: BDAG
  rationale: El adjetivo es realmente ambiguo entre «fieles» y «creyentes». Se mantiene «fieles» en el texto principal por ser más amplio y menos decisivo doctrinalmente, preservando la tensión léxica documentada por el POB inglés.
- source_word: κατηγορίᾳ
  english_pob_choice: under accusation
  chosen_spanish: bajo acusación
  alternatives_spanish:
  - sujetos a acusación
  - bajo denuncia
  lexicon: BDAG
  rationale: La construcción con ἐν pide una expresión que conserve el matiz forense. «Bajo acusación» refleja directamente la idea de estar formalmente expuesto a una imputación.
- source_word: ἀσωτίας
  english_pob_choice: debauchery
  chosen_spanish: disolución
  alternatives_spanish:
  - depravación
  - vida desenfrenada
  - derroche
  lexicon: BDAG
  rationale: «Disolución» es un término español bíblico y formal que puede abarcar conducta moralmente desordenada y derrochadora. No se resuelve la tensión hacia un solo matiz coloquial, y se conserva la gravedad del término.
- source_word: ἀνυπότακτα
  english_pob_choice: insubordinate
  chosen_spanish: insubordinados
  alternatives_spanish:
  - rebeldes
  - indisciplinados
  lexicon: BDAG
  rationale: El adjetivo expresa negativa a someterse al orden debido. «Insubordinados» encaja bien con el ámbito doméstico e institucional del pasaje y corresponde de cerca a la elección inglesa.
theological_decisions:
- issue: Ambigüedad de πιστά en τέκνα ἔχων πιστά
  english_pob_reading: faithful children
  chosen_spanish_reading: hijos fieles
  alternative_spanish_readings:
  - hijos creyentes
  rationale: Se conserva la ambigüedad teológica del griego sin resolverla prematuramente. «Fieles» permite tanto la idea de confiabilidad como la de fe, mientras que «creyentes» queda como posibilidad legítima sin imponerse en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms table for πίστις/πιστός family
- issue: Alcance de μιᾶς γυναικὸς ἀνήρ
  english_pob_reading: the husband of one wife
  chosen_spanish_reading: marido de una sola mujer
  alternative_spanish_readings:
  - un hombre de una sola mujer
  rationale: La frase sigue siendo intencionalmente transparente y no se fuerza una conclusión sobre celibato, divorcio o segunda nupcia. La traducción evita añadir inferencias doctrinales no explícitas en el verso.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: La redacción inglesa auditada fue revisada para hacer más natural «under accusation» sin cambiar el contenido. En español se mantuvo esa precisión forense con «bajo acusación», y se preservó la misma apertura interpretativa que el POB inglés dejó en πίστις/πιστός y μιᾶς γυναικὸς ἀνήρ.
  spanish_consistency_notes:
  - Se conserva el tono de requisitos para liderazgo eclesial sin intensificar el verso hacia una moralización absoluta.
  - «Irreprensible» se usa como equivalente funcional de «above reproach», no como sinónimo de impecable.
  - «Fieles» mantiene abierta la ambigüedad de πιστά; no se ha reemplazado por «creyentes» en el texto principal.
  - «Marido de una sola mujer» sigue la transparencia formal del giro griego y la política de género fiel al masculino explícito.
  - «Bajo acusación» mantiene el matiz forense de ἐν κατηγορίᾳ.
  - «Disolución» se eligió por su registro digno y eclesial, con nota de alternativas más idiomáticas.
