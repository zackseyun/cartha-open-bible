    issue: La frase final «ni insubordinados» es demasiado elíptica en español.
    rationale: Aunque refleja ἢ ἀνυπότακτα, en español suena truncada tras «no bajo acusación de disolución». Añadir «siendo» o reformular hace más clara la relación con «hijos» sin introducir interpretación extra.
  - severity: low
    issue: Falta una nota en el texto para la ambigüedad de «fieles».
    rationale: El POB inglés preserva la alternativa «believing». Dado que en español «fieles» también puede entenderse moralmente, conviene mantener la alternativa «creyentes» en nota para conservar el mismo espacio interpretativo.
  - severity: low
