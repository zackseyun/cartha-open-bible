translation:
  language: es
  text: pero hospitalario, amante de lo bueno[a], con dominio propio, justo[b], santo[c] y disciplinado[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amante del bien».
    reason: lexical_alternative
  - marker: b
    text: O «recto» para «justo».
    reason: lexical_alternative
  - marker: c
    text: O «devoto» para «santo».
    reason: lexical_alternative
  - marker: d
    text: 'El griego usa dos virtudes relacionadas aquí: una que significa ser sensato o tener dominio propio (σώφρονα), y otra que implica ejercer dominio sobre uno mismo (ἐγκρατῆ).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - sino más bien
  lexicon: BDAG
  rationale: En esta lista de cualidades que contrasta con los vicios del versículo anterior, «sino» conserva el valor adversativo correctivo del griego y suena natural en español.
- source_word: φιλόξενον
  english_pob_choice: hospitable
  chosen_spanish: hospitalario
  alternatives_spanish:
  - amante de los huéspedes
  - amante de los extranjeros
  - dado a la hospitalidad
  lexicon: BDAG
  rationale: El adjetivo expresa acogida a huéspedes o extraños. «Hospitalario» es el equivalente idiomático más claro en español y mantiene el sentido ético sin literalidad pesada.
- source_word: φιλάγαθον
  english_pob_choice: loving what is good
  chosen_spanish: amante de lo bueno
  alternatives_spanish:
  - amante del bien
  - amante de lo bueno
  - amigo de lo bueno
  lexicon: BDAG
  rationale: El compuesto apunta a amar el bien o lo bueno. «Amante de lo bueno» conserva el objeto del afecto, en paralelo con el español natural.
- source_word: σώφρονα
  english_pob_choice: self-controlled
  chosen_spanish: autocontrolado
  alternatives_spanish:
  - sensato
  - prudente
  - templado
  lexicon: BDAG
  rationale: El término incluye sobriedad mental y dominio propio. «Autocontrolado» comunica bien esa virtud en español y deja espacio para distinguirla de ἐγκρατῆ.
- source_word: δίκαιον
  english_pob_choice: upright
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - íntegro
  - righteous
  lexicon: BDAG
  rationale: En este catálogo de cualidades, el adjetivo describe rectitud moral. «Justo» es una traducción directa y natural; «recto» o «íntegro» también serían posibles, pero «justo» preserva mejor la conexión con el campo semántico del griego.
- source_word: ὅσιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - piadoso
  - devoto
  - santo
  lexicon: BDAG
  rationale: La palabra señala piedad o devoción acorde con lo sagrado. «Santo» es el equivalente más fuerte y reconocible en español, aunque puede rozar un matiz más religioso que ético.
- source_word: ἐγκρατῆ
  english_pob_choice: disciplined
  chosen_spanish: disciplinado
  alternatives_spanish:
  - dominado de sí
  - templado
  - con dominio propio
  lexicon: BDAG
  rationale: Este adjetivo enfatiza el dominio sobre los deseos e impulsos. «Disciplinado» mantiene esa fuerza de autodominio y, junto con «autocontrolado» para σώφρονα, evita colapsar las dos virtudes en una sola expresión.
theological_decisions:
- issue: Distinguir las dos virtudes adyacentes σώφρονα y ἐγκρατῆ
  english_pob_reading: Render σώφρονα as 'self-controlled' and ἐγκρατῆ as 'disciplined'
  chosen_spanish_reading: Traducir σώφρονα como «autocontrolado» y ἐγκρατῆ como «disciplinado»
  alternative_spanish_readings:
  - Usar términos solapados como «prudente» y «templado»
  - Traducir ambos con expresiones de dominio propio
  rationale: El griego emplea dos virtudes relacionadas pero no idénticas. La versión española conserva esa tensión con dos términos distintos, para no borrar el matiz entre sobriedad mental y dominio activo de sí.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y ninguna revisión posterior sustantiva; se conserva la distinción entre σώφρονα y ἐγκρατῆ documentada por la POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto como norma general, pero este versículo no contiene el nombre divino.
  - «Cristo/Mesías» no aparece en el texto.
  - Se evita comprimir σώφρονα y ἐγκρατῆ en una sola idea para respetar la decisión lexical ya auditada en inglés.
