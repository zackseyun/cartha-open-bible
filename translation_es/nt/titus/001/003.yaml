translation:
  language: es
  text: pero en sus propios tiempos[a] manifestó su palabra mediante la proclamación[b], que me fue confiada[c], según el mandato de Dios nuestro Salvador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En sus propios tiempos» también puede traducirse «en los tiempos oportunos». El griego dice literalmente «en sus propios tiempos», probablemente refiriéndose a los tiempos señalados por Dios.
    reason: lexical_alternative
  - marker: b
    text: O «por la predicación». El término puede referirse tanto al acto de proclamar como al mensaje proclamado.
    reason: lexical_alternative
  - marker: c
    text: 'El relativo también puede entenderse con «su palabra»: «su palabra ... que me fue confiada».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφανέρωσεν
  english_pob_choice: he revealed
  chosen_spanish: manifestó
  alternatives_spanish:
  - reveló
  - dio a conocer
  lexicon: BDAG
  rationale: El aoristo activo con Dios como sujeto implícito expresa hacer visible algo antes oculto. «Manifestó» conserva esa idea de hacer patente, mientras que «reveló» también sería posible; se evita una formulación demasiado interpretativa.
- source_word: καιροῖς ἰδίοις
  english_pob_choice: in his own times
  chosen_spanish: en sus propios tiempos
  alternatives_spanish:
  - en los tiempos oportunos
  - en el tiempo señalado
  lexicon: BDAG
  rationale: La expresión dativa es idiomática para tiempos determinados por Dios. «Sus propios tiempos» preserva la fuerza posesiva de ἰδίοις y sigue de cerca el matiz del griego.
- source_word: τὸν λόγον αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - la palabra de él
  lexicon: BDAG
  rationale: λόγος aquí se refiere a la comunicación divina. «Palabra» mantiene la conexión léxica con λόγος y suena natural en español bíblico.
- source_word: ἐν κηρύγματι
  english_pob_choice: through the proclamation
  chosen_spanish: mediante la proclamación
  alternatives_spanish:
  - por la predicación
  - mediante predicación
  lexicon: BDAG
  rationale: κήρυγμα puede designar tanto el acto como el contenido proclamado. «Mediante la proclamación» conserva el valor instrumental de ἐν sin reducir el término solo a la actividad de predicar.
- source_word: ὃ
  english_pob_choice: with which
  chosen_spanish: con la cual
  alternatives_spanish:
  - la cual
  - con lo cual
  lexicon: BDAG
  rationale: El relativo neutro singular se entiende mejor en relación inmediata con κήρυγμα. En español, «con la cual» refleja la idea de que Pablo fue confiado con esa proclamación.
- source_word: ἐπιστεύθην
  english_pob_choice: I was entrusted
  chosen_spanish: fui confiado
  alternatives_spanish:
  - se me confió
  - fui encargado
  lexicon: BDAG
  rationale: El pasivo aoristo de πιστεύω aquí significa que algo fue confiado a Pablo. «Fui confiado» mantiene el pasivo, aunque «se me confió» sería una alternativa más idiomática; se elige una forma que conserve la estructura del griego y el sentido de encomienda.
- source_word: κατ’ ἐπιταγὴν
  english_pob_choice: according to the command
  chosen_spanish: según el mandato
  alternatives_spanish:
  - de acuerdo con el mandato
  - por mandato
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad a una orden autoritativa. «Según el mandato» es fiel y fluido en español.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: of God our Savior
  chosen_spanish: de Dios nuestro Salvador
  alternatives_spanish:
  - de nuestro Salvador Dios
  - de Dios, nuestro Salvador
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma natural como título appositivo. «Dios nuestro Salvador» conserva el orden y el título sin forzar un giro más litúrgico.
theological_decisions:
- issue: Sujeto implícito de ἐφανέρωσεν y el valor de καιροῖς ἰδίοις
  english_pob_reading: The subject is God, yielding 'in his own times he revealed.'
  chosen_spanish_reading: 'El sujeto implícito es Dios: «en sus propios tiempos manifestó…»'
  alternative_spanish_readings:
  - «en el tiempo oportuno manifestó…»
  - «en sus tiempos señalados manifestó…»
  rationale: El contexto previo habla de Dios prometiendo y luego haciendo patente su propósito; mantener a Dios como sujeto conserva el flujo argumental y la fuerza posesiva de «sus propios tiempos».
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia de ὃ
  english_pob_reading: It refers to 'the proclamation' rather than directly to 'his word.'
  chosen_spanish_reading: El relativo se refiere a «la proclamación»; por eso se traduce «con la cual fui confiado».
  alternative_spanish_readings:
  - «de la cual fui confiado»
  - «con el cual fui confiado»
  rationale: La referencia inmediata más natural es κήρυγμα. La traducción mantiene la relación entre la palabra de Dios y la proclamación mediante la cual fue dada a conocer.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete de fuente griego y el audit trail inglés, sin cambios de revisión pendientes; se preservó el valor instrumental de ἐν κηρύγματι, la referencia probable de ὃ a κήρυγμα y el título «Dios nuestro Salvador».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «Salvador» para σωτήρ, evitando reemplazos litúrgicos no requeridos.
  - Se eligió «manifestó» para ἐφανέρωσεν por claridad y naturalidad, sin perder el sentido de hacer visible.
  - La secuencia «su palabra mediante la proclamación» conserva la relación entre λόγος y κήρυγμα.
  - Se evitó traducir δοῦλος u otros términos no presentes aquí; no aplica una equivalencia terminológica especial en este versículo.
