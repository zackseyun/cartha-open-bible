translation:
  language: es
  text: Recuérdales que estén sujetos a los gobernantes y a las autoridades[a], que sean obedientes, que estén preparados para toda buena obra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "someterse a los gobernantes y a las autoridades, obedecer".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπομίμνῃσκε
  english_pob_choice: Remind
  chosen_spanish: Recuérdales
  alternatives_spanish:
  - Sigue recordándoles
  - Recuérdales continuamente
  lexicon: BDAG
  rationale: El imperativo presente segundo singular expresa una instrucción continua a Tito. En español, 'Recuérdales' transmite de manera natural la acción exhortativa; la iteración continua queda implícita, como en el inglés POB.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estas personas
  lexicon: BDAG
  rationale: El pronombre de objeto plural se refiere a los creyentes cretenses. En español, el dativo 'les' funciona con naturalidad junto al verbo de recuerdo exhortativo.
- source_word: ἀρχαῖς
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - autoridades civiles
  - magistrados
  - líderes
  lexicon: BDAG
  rationale: En este contexto cívico, ἀρχαῖς designa autoridades de gobierno. 'Gobernantes' conserva el matiz personal del liderazgo político sin sonar tan técnico como 'magistrados'.
- source_word: ἐξουσίαις
  english_pob_choice: authorities
  chosen_spanish: a las autoridades
  alternatives_spanish:
  - a los poderes
  - a las autoridades en poder
  lexicon: BDAG
  rationale: El par ἀρχαῖς ἐξουσίαις se mantiene como dos expresiones coordinadas. 'Autoridades' preserva el sentido de poderes gobernantes sin reducirlo a un solo término.
- source_word: ὑποτάσσεσθαι
  english_pob_choice: to be subject to
  chosen_spanish: que estén sujetos
  alternatives_spanish:
  - que se sometan
  - que sean sumisos
  lexicon: BDAG
  rationale: La idea es de subordinación ordenada en el ámbito civil. 'Estén sujetos' refleja bien esa relación sin sugerir servilismo absoluto.
- source_word: πειθαρχεῖν
  english_pob_choice: to be obedient
  chosen_spanish: que sean obedientes
  alternatives_spanish:
  - que obedezcan
  lexicon: BDAG
  rationale: El verbo apunta a obedecer a la autoridad. 'Sean obedientes' suena natural en la cadena de infinitivos y mantiene el matiz de disposición continua.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν
  english_pob_choice: for every good work
  chosen_spanish: para toda buena obra
  alternatives_spanish:
  - para toda buena acción
  - para cada buena obra
  lexicon: BDAG
  rationale: La preposición πρός con acusativo expresa orientación o disposición hacia algo. 'Para toda buena obra' conserva la fórmula ética tradicional y la amplitud del término ἔργον.
- source_word: ἑτοίμους εἶναι
  english_pob_choice: to be ready
  chosen_spanish: estar listos
  alternatives_spanish:
  - estar preparados
  lexicon: BDAG
  rationale: La frase final pide una disposición permanente. 'Estar listos' es idiomático en español y comunica la prontitud requerida para toda buena obra.
theological_decisions:
- issue: Alcance de la sumisión a las autoridades civiles
  english_pob_reading: A general exhortation to civic submission and obedience, without implying absolute obedience in every circumstance.
  chosen_spanish_reading: Una exhortación general a la sujeción y obediencia cívicas, sin implicar obediencia absoluta en toda circunstancia.
  alternative_spanish_readings:
  - Una obediencia total e incondicional a las autoridades
  - Una sumisión meramente externa sin deber de obedecer
  rationale: La pareja ἀρχαῖς ἐξουσίαις apunta a autoridades civiles. La redacción española mantiene la exhortación clara, pero no resuelve la tensión bíblica sobre los límites de la obediencia humana más allá de lo que el texto dice.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador sigue el estado de alta concordancia y conserva la distinción cívica de ἀρχαῖς / ἐξουσίαις sin fusionarla.
  spanish_consistency_notes:
  - Se mantiene 'gobernantes'/'autoridades' como par cívico, evitando términos eclesiásticos.
  - '''Sujetos'' traduce la idea de ὑποτάσσεσθαι sin cargarla de servidumbre absoluta.'
  - '''Buena obra'' conserva la amplitud ética de ἔργον ἀγαθόν.'
  - No se usan mayúsculas reverenciales ni sustituciones por 'SEÑOR' porque el versículo no contiene el nombre divino.
