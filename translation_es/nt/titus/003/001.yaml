    rationale: ἑτοίμους εἶναι significa estar en disposición o preparación. Aunque 'listos' es correcto, 'preparados' encaja mejor con el registro bíblico y con 'para toda buena obra'.
  revised_spanish_text: Recuérdales que estén sujetos a los gobernantes y a las autoridades[a], que sean obedientes, que estén preparados para toda buena obra,
  revised_footnotes:
