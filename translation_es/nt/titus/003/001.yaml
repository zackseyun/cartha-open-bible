  glossary_alignment: No hay términos del glosario de proyecto en conflicto. La distinción entre 'gobernantes' y 'autoridades' conserva el doblete ἀρχαῖς/ἐξουσίαις. No hay problemas con Mesías/Cristo, Yahvé, esclavo, etc.
