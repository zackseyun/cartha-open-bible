translation:
  language: es
  text: sabiendo que tal persona[a] se ha desviado[b] y sigue pecando, siendo autocondenada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «tal hombre». La expresión griega es masculina singular: «tal hombre», aunque también puede entenderse de manera genérica como «tal persona».'
    reason: lexical_alternative
  - marker: b
    text: O «está pervertida» o «ha torcido su camino». El verbo griego en perfecto indica un estado presente resultante de una desviación previa.
    reason: lexical_alternative
  - marker: c
    text: O «condenada por sí misma». El adjetivo puede significar condenada por sus propias acciones o por el testimonio que ella misma da contra sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - sabiendo que
  lexicon: οἶδα / ὁράω (participio circunstancial)
  rationale: El participio introduce una relación circunstancial con la instrucción anterior. «Sabiendo» conserva esa función sin forzar un matiz causal o concesivo específico.
- source_word: ἐξέστραπται
  english_pob_choice: is warped
  chosen_spanish: está torcida
  alternatives_spanish:
  - ha torcido su camino
  - está pervertida
  - se ha desviado
  lexicon: ἐκστρέφομαι
  rationale: El perfecto comunica un estado presente resultante de una desviación previa. «Está torcida» preserva la idea de distorsión moral en estado actual y evita una paráfrasis demasiado interpretativa.
- source_word: ὁ τοιοῦτος
  english_pob_choice: such a person
  chosen_spanish: tal persona
  alternatives_spanish:
  - tal hombre
  - esa clase de persona
  lexicon: τοιοῦτος
  rationale: Aunque el griego es masculino singular, el audit trail inglés revisó la redacción a «such a person» para reflejar el valor genérico. «Tal persona» mantiene esa genericidad de modo natural en español.
- source_word: ἁμαρτάνει
  english_pob_choice: is sinning
  chosen_spanish: sigue pecando
  alternatives_spanish:
  - está pecando
  - peca
  lexicon: ἁμαρτάνω
  rationale: El presente indica acción en curso. «Sigue pecando» expresa continuidad sin añadir una doctrina de hábito más fuerte que la que el verbo exige.
- source_word: ὢν
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - porque es
  - ya que es
  lexicon: εἰμί (participio)
  rationale: El participio final enlaza con la cualidad anterior. «Siendo» mantiene la sintaxis compacta y la relación con la frase precedente.
- source_word: αὐτοκατάκριτος
  english_pob_choice: self-condemned
  chosen_spanish: condenada por sí misma
  alternatives_spanish:
  - autocondenada
  - condenada por su propia conducta
  lexicon: αὐτοκατάκριτος
  rationale: La expresión puede entenderse como condenada por sus propias palabras/acciones o por su propia condición. En español, «condenada por sí misma» conserva el sentido reflexivo sin introducir una formulación técnica ajena al contexto.
theological_decisions:
- issue: Referencia genérica masculina en ὁ τοιοῦτος
  english_pob_reading: such a person
  chosen_spanish_reading: tal persona
  alternative_spanish_readings:
  - tal hombre
  - esa clase de hombre
  rationale: El texto griego usa masculino singular, pero el propio audit trail inglés optó por una forma genérica para evitar forzar una lectura sexista donde la referencia contextual apunta al tipo de persona, no a un individuo masculino específico. «Tal persona» preserva esa decisión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza de αὐτοκατάκριτος
  english_pob_reading: self-condemned
  chosen_spanish_reading: condenada por sí misma
  alternative_spanish_readings:
  - autocondenada
  - condenada por sus propias acciones
  rationale: La frase no añade una sentencia judicial explícita; describe un estado en que la propia conducta deja a la persona sin defensa. «Condenada por sí misma» mantiene el peso teológico sin sobreinterpretar el alcance escatológico.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés revisado. Se respetó la revisión que reemplazó «man» por una forma genérica en inglés; por eso el español usa «tal persona». También se mantuvo el valor aspectual del perfecto en ἐξέστραπται y del participio final, evitando convertir el cierre en una sentencia judicial más amplia de lo que el texto afirma.
  spanish_consistency_notes:
  - «Yahvé» no aplica en este versículo.
  - «Mesías»/«Cristo» no aparecen en este versículo.
  - Se eligió vocabulario de tono sobrio y eclesialmente readable, evitando calcos rígidos.
  - 'La relación entre desvío moral y pecado continuo queda diferenciada: «está torcida» / «sigue pecando».'
