translation:
  language: es
  text: Ayuda con diligencia a Zenas, el abogado,[a] y a Apolos en su viaje, para que nada les falte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Encamina con diligencia a Zenas, el abogado, y a Apolos". El verbo puede implicar apoyo práctico para el viaje, no solo despedirlos o enviarlos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηνᾶν
  english_pob_choice: Zenas
  chosen_spanish: Zenas
  alternatives_spanish:
  - Zenás
  lexicon: nombre propio
  rationale: Se translitera el nombre propio según el uso habitual en español bíblico, manteniendo la misma referencia personal que en el texto griego y en el audit trail inglés.
- source_word: τὸν νομικὸν
  english_pob_choice: the lawyer
  chosen_spanish: el experto en la ley
  alternatives_spanish:
  - el abogado
  - el jurista
  - el entendido en la ley
  lexicon: BDAG νομικός
  rationale: νομικός puede designar a alguien versado en la ley. En español, 'abogado' suena más moderno y profesional-jurídico que el contexto no exige; 'experto en la ley' conserva mejor el sentido de persona conocedora de la Ley sin imponer una profesión anacrónica.
- source_word: Ἀπολλῶν
  english_pob_choice: Apollos
  chosen_spanish: Apolos
  alternatives_spanish:
  - Apolo
  lexicon: nombre propio
  rationale: Se usa la forma española corriente Apolos/Apolos según el nombre griego Ἀπολλῶς, evitando confundirlo con el dios Apolo. La forma breve 'Apolos' es clara y reconocible en contexto bíblico.
- source_word: σπουδαίως
  english_pob_choice: diligently
  chosen_spanish: con diligencia
  alternatives_spanish:
  - con esmero
  - con prontitud
  - con empeño
  lexicon: BDAG σπουδαίως
  rationale: El adverbio expresa seriedad y atención aplicada. 'Con diligencia' reproduce bien esa fuerza en español sin reducirlo solamente a velocidad.
- source_word: πρόπεμψον
  english_pob_choice: send ... on their way
  chosen_spanish: envía ... para su viaje
  alternatives_spanish:
  - despídelos
  - acompañalos en su camino
  - ayúdalos en su viaje
  lexicon: BDAG προπέμπω
  rationale: El verbo en contexto de viaje puede implicar despedida con apoyo práctico. 'Envía ... para su viaje' conserva la idea de preparación/provisión para el trayecto sin convertirlo en mera despedida social ni ampliar más allá de lo que el griego exige.
- source_word: ἵνα μηδὲν αὐτοῖς λείπῃ
  english_pob_choice: so that they may lack nothing
  chosen_spanish: para que nada les falte
  alternatives_spanish:
  - para que no carezcan de nada
  - a fin de que nada les falte
  lexicon: BDAG λείπω
  rationale: La cláusula de propósito expresa que no deben quedar sin provisiones necesarias. 'Para que nada les falte' es natural en español y conserva tanto el alcance general como el matiz de necesidad material implícito en el contexto de viaje.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo. Se conserva la tensión lexical de προπέμπω con una redacción española que puede leerse tanto como envío como provisión para el viaje, sin forzar una sola opción.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el texto.
  - Se evita 'siervo' porque no hay δοῦλος en el versículo.
  - '''Ley'' se entiende en el sentido de conocimiento jurídico/mosaico contextual, no como ley civil moderna.'
  - La puntuación refleja una exhortación única con cláusula final de propósito.
