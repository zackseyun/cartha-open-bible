review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: una instrucción a Tito para asistir en el viaje de Zenas y Apolos, con el propósito de que no les falte nada. Sin embargo, omite en el texto principal la fuerza viajera de πρόπεμψον (''encaminar/despedir con apoyo para el viaje'') al dejar solo ''Envía'', y su nota alternativa sí la reconoce. Además, la decisión principal ''el experto en la ley'' se aparta innecesariamente del audit trail inglés, que favorece una designación profesional más concisa (''the lawyer'') en este contexto appositivo.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para mayor naturalidad y fidelidad contextual. 'Envía con diligencia a Zenas...' suena menos idiomático que 'Encamina con diligencia...' o 'Ayuda con diligencia... en su viaje'. También conviene alinear el complemento final con el apoyo de viaje implícito. 'Apolos' y 'Zenas' son formas aceptables y bien conocidas.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La principal cuestión léxica es νομικός: aquí ''el abogado'' refleja mejor la decisión documentada en inglés (''the lawyer'') y funciona naturalmente en español, sin necesidad de imponer lectura teológica de ''la Ley''. También conviene reflejar mejor πρόπεμψον con un verbo de acompañamiento/envío de viaje, no mero ''envía''.'
  issues:
  - severity: medium
    issue: '''Envía'' no refleja suficientemente el sentido de πρόπεμψον en contexto de viaje.'
    rationale: El audit trail inglés documenta que el verbo implica asistencia práctica para el trayecto, no solo mandar o despachar. El texto principal debería conservar mejor ese matiz, no dejarlo solo en nota.
  - severity: medium
    issue: '''el experto en la ley'' se aparta de la elección documentada ''the lawyer'' sin necesidad contextual fuerte.'
    rationale: Aunque νομικός puede significar alguien versado en la ley, aquí parece una designación personal/profesional. 'El abogado' es más conciso, natural en español y más cercano a la decisión inglesa auditada.
  - severity: low
    issue: La nota alternativa tiene puntuación y redacción mejorables en español.
    rationale: 'Puede formularse de manera más natural: ''O: “Ayuda con diligencia a Zenas, el abogado, y a Apolos en su viaje”.'''
  revised_spanish_text: Ayuda con diligencia a Zenas, el abogado,[a] y a Apolos en su viaje, para que nada les falte.
  revised_footnotes:
  - marker: a
    text: 'O: "Encamina con diligencia a Zenas, el abogado, y a Apolos". El verbo puede implicar apoyo práctico para el viaje, no solo despedirlos o enviarlos.'
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar mejor πρόπεμψον como asistencia de viaje en el texto principal, no solo en nota, y para alinear νομικός con la decisión auditada 'the lawyer' mediante 'el abogado', que es natural y conciso en español. Se conserva 'con diligencia' para σπουδαίως y 'para que nada les falte' para la cláusula final.
