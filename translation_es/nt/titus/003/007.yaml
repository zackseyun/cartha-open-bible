translation:
  language: es
  text: para que, habiendo sido justificados por su gracia, lleguemos a ser herederos conforme a la esperanza de la vida eterna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la esperanza de la vida eterna».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad/resultdo con una expresión natural en español y conserva el valor subordinante del griego.
- source_word: δικαιωθέντες
  english_pob_choice: having been justified
  chosen_spanish: habiendo sido justificados
  alternatives_spanish:
  - habiendo sido declarados justos
  - siendo justificados
  lexicon: BDAG
  rationale: Mantiene la voz pasiva y el aspecto anterior al verbo principal. 'Justificados' conserva la terminología paulina sin explicitar más de lo que dice el texto.
- source_word: τῇ ἐκείνου χάριτι
  english_pob_choice: by his grace
  chosen_spanish: por su gracia
  alternatives_spanish:
  - por la gracia de él
  - por aquella gracia
  lexicon: BDAG
  rationale: La dative instrumental se rinde de forma natural con 'por'. 'Su' refleja el referente inmediato sin forzar una identificación más explícita que el griego no exige aquí.
- source_word: κληρονόμοι
  english_pob_choice: heirs
  chosen_spanish: herederos
  alternatives_spanish:
  - herederos de la herencia
  - inherederos
  lexicon: BDAG
  rationale: Es el equivalente estándar y conserva la imagen de herencia del contexto paulino.
- source_word: γενηθῶμεν
  english_pob_choice: we might become
  chosen_spanish: lleguemos a ser
  alternatives_spanish:
  - podamos ser
  - nos hagamos
  lexicon: BDAG
  rationale: Expresa el devenir de estado que comunica γίνομαι y suena más natural en español que un calco rígido.
- source_word: κατ’ ἐλπίδα
  english_pob_choice: according to the hope
  chosen_spanish: conforme a la esperanza
  alternatives_spanish:
  - según la esperanza
  - en esperanza
  lexicon: BDAG
  rationale: '''Conforme a'' preserva el valor de κατά con acusativo sin endurecerlo en un calco semánticamente torpe.'
- source_word: ζωῆς αἰωνίου
  english_pob_choice: of eternal life
  chosen_spanish: de la vida eterna
  alternatives_spanish:
  - de vida eterna
  - de la vida perdurable
  lexicon: BDAG
  rationale: '''Vida eterna'' es la forma estable y fiel para ζωὴ αἰώνιος en español bíblico contemporáneo.'
theological_decisions:
- issue: Sentido de δικαιωθέντες en contexto paulino de salvación
  english_pob_reading: justified
  chosen_spanish_reading: justificados
  alternative_spanish_readings:
  - declarados justos
  rationale: Se conserva el término técnico tradicional del corpus paulino sin resolver la tensión entre declaración forense y transformación, tal como hace el texto fuente.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Valor de κατ’ ἐλπίδα
  english_pob_reading: according to the hope
  chosen_spanish_reading: conforme a la esperanza
  alternative_spanish_readings:
  - en esperanza
  - según la esperanza
  rationale: Se mantiene la relación entre la condición de herederos y la esperanza escatológica sin desplazarla a una simple esfera subjetiva.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Referencia de ἐκείνου ('his')
  english_pob_reading: his = God, in the immediate salvation context
  chosen_spanish_reading: su = Dios, en el contexto inmediato de salvación
  alternative_spanish_readings:
  - su = Jesucristo, según el antecedente más cercano del contexto amplio
  rationale: '''Su'' conserva el mismo nivel de ambigüedad controlada que el griego, sin precisar más de lo que el verso obliga.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto español, anclado en 'herederos[a]'. La redacción general conserva el sentido de finalidad, pasivo anterior, herencia y esperanza escatológica del griego, alineada con el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió 'por su gracia' frente a una construcción más literal pero menos natural en español.
  - '''Habiendo sido justificados'' conserva la pasiva y el antecedente temporal del participio aoristo.'
  - '''Conforme a la esperanza'' evita perder el enlace sintáctico con κατ’ ἐλπίδα.'
  - '''Vida eterna'' se mantiene como término bíblico estable en español.'
