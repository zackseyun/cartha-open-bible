translation:
  language: es
  text: Pero evita las controversias necias y las genealogías y las rencillas y las disputas acerca de la ley[a][b], porque son inútiles y vanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disputas» o «especulaciones» para «controversias».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «disputas legales»; es decir, disputas acerca de la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὰς
  english_pob_choice: foolish
  chosen_spanish: necias
  alternatives_spanish:
  - insensatas
  - necias
  - tontas
  lexicon: BDAG
  rationale: μωρός expresa necedad o falta de sensatez más que simple falta de inteligencia. En español, «necias» comunica bien el tono práctico y moral del término sin sonar excesivamente coloquial.
- source_word: ζητήσεις
  english_pob_choice: controversies
  chosen_spanish: controversias
  alternatives_spanish:
  - disputas
  - especulaciones
  - debates
  lexicon: BDAG
  rationale: En las Pastorales, ζητήσεις suele referirse a discusiones o investigaciones contenciosas. «Controversias» conserva el matiz polémico que privilegió la POB en inglés.
- source_word: γενεαλογίας
  english_pob_choice: genealogies
  chosen_spanish: genealogías
  alternatives_spanish:
  - linajes
  - listas genealógicas
  lexicon: BDAG
  rationale: El sustantivo se traduce de manera directa para preservar la forma léxica y no imponer una interpretación histórica específica en el texto principal.
- source_word: ἔρεις
  english_pob_choice: strife
  chosen_spanish: rencillas
  alternatives_spanish:
  - discordias
  - pleitos
  - contiendas
  lexicon: BDAG
  rationale: ἔρις denota contención o discordia. «Rencillas» distingue este término del siguiente y resulta natural en español, manteniendo la idea de fricción relacional.
- source_word: μάχας νομικὰς
  english_pob_choice: quarrels about the law
  chosen_spanish: disputas legales
  alternatives_spanish:
  - pleitos sobre la ley
  - quarrelas acerca de la ley
  - disputas acerca de la ley
  lexicon: BDAG
  rationale: La expresión literalmente significa algo como «peleas/querellas legales». «Disputas legales» conserva el adjetivo νομικός sin hacer explícita una litigación judicial; el sentido de discusiones sobre la ley queda claro en español y la nota explica la literalidad.
- source_word: περιΐστασο
  english_pob_choice: avoid
  chosen_spanish: evita
  alternatives_spanish:
  - aléjate de
  - shúnyelas
  - apártate de
  lexicon: BDAG
  rationale: El imperativo medio pide mantenerse apartado de esas cosas. «Evita» es idiomático, imperativo y fiel a la fuerza exhortativa.
- source_word: ἀνωφελεῖς
  english_pob_choice: unprofitable
  chosen_spanish: inútiles
  alternatives_spanish:
  - no provechosas
  - sin provecho
  - improductivas
  lexicon: BDAG
  rationale: ἀνωφελής significa no beneficioso o no útil. «Inútiles» es claro en español y comunica la falta de provecho en términos directos.
- source_word: μάταιοι
  english_pob_choice: futile
  chosen_spanish: vanas
  alternatives_spanish:
  - vacías
  - fútiles
  - sin sentido
  lexicon: BDAG
  rationale: μάταιος expresa vacuidad o falta de resultado. «Vanas» preserva la correspondencia semántica con el inglés POB y deja audible la fuerza de inutilidad y vaciedad del segundo adjetivo.
theological_decisions:
- issue: Naturaleza de las genealogías y de las disputas legales
  english_pob_reading: Translate the terms generically without specifying a particular Jewish, Gnostic, or heretical system in the main text.
  chosen_spanish_reading: Traducir los términos de forma general, sin identificar en el texto principal un trasfondo judío, gnóstico o herético concreto.
  alternative_spanish_readings:
  - Entender «genealogías» como debates sobre linajes judíos
  - Entender la frase como especulaciones mitológicas proto-gnósticas
  rationale: El versículo nombra prácticas controvertidas, pero no las define con suficiente precisión para introducir una reconstrucción histórica particular en la traducción. Mantener un lenguaje amplio preserva la transparencia y evita sobreinterpretación.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en una revisión estable sin cambios recientes; la versión española sigue esa lectura conservadora, preservando la secuencia de sustantivos y la doble valoración final («inútiles y vanas»).
  spanish_consistency_notes:
  - Se mantiene la repetición de coordinaciones con «y» para reflejar la acumulación del griego.
  - Se traduce νομικὰς con «legales» en el texto y se aclara en nota la relación literal con «la ley».
  - Se usa «genealogías» sin especificación interpretativa en el cuerpo del versículo, como en el inglés POB.
  - La pareja «inútiles y vanas» busca reflejar ἀνωφελεῖς καὶ μάταιοι con dos matices distintos, no como simple redundancia.
