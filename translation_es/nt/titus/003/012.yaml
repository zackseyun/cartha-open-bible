translation:
  language: es
  text: Cuando envíe a Artemas o a Tíquico, haz todo lo posible[a] por venir a verme en Nicópolis, porque he decidido pasar allí el invierno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sé diligente para venir a verme» o «esfuérzate por venir a verme».
    reason: lexical_alternative
  - marker: b
    text: O «he resuelto pasar allí el invierno».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν πέμψω
  english_pob_choice: When I send
  chosen_spanish: Cuando envíe
  alternatives_spanish:
  - Cuando mande
  - Cuando mande a
  lexicon: BDAG
  rationale: La construcción temporal con ὅταν + subjuntivo futuro apunta a un hecho venidero y específico. En español, «Cuando envíe» mantiene bien esa contingencia futura sin volverla hipotética en exceso.
- source_word: Ἀρτεμᾶν
  english_pob_choice: Artemas
  chosen_spanish: Artemas
  lexicon: Onomástica estándar
  rationale: Nombre propio transliterado de manera directa y reconocible en español.
- source_word: Τυχικόν
  english_pob_choice: Tychicus
  chosen_spanish: Tíquico
  alternatives_spanish:
  - Tíquicus
  lexicon: Onomástica estándar
  rationale: El nombre se adapta a la forma española usual, más natural y readable para una audiencia eclesial en español.
- source_word: σπούδασον
  english_pob_choice: make every effort
  chosen_spanish: esfuérzate
  alternatives_spanish:
  - procura con diligencia
  - haz todo lo posible
  lexicon: BDAG
  rationale: El imperativo expresa empeño serio e intencionalidad. «Esfuérzate» comunica bien la urgencia y la diligencia sin sonar demasiado burocrático.
- source_word: ἐλθεῖν πρός με
  english_pob_choice: to come to me
  chosen_spanish: venir a mí
  alternatives_spanish:
  - acercarte a mí
  lexicon: BDAG
  rationale: El movimiento es hacia el hablante, así que en español corresponde «venir», no «ir».
- source_word: εἰς Νικόπολιν
  english_pob_choice: at Nicopolis
  chosen_spanish: a Nicópolis
  alternatives_spanish:
  - en Nicópolis
  - para Nicópolis
  lexicon: BDAG
  rationale: Con «venir» en español, la preposición natural es «a». Conserva la idea de destino sin añadir una formulación menos idiomática.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: «Allí» mantiene la referencia locativa a Nicópolis con un registro claro y sobrio.
- source_word: κέκρικα
  english_pob_choice: I have decided
  chosen_spanish: he decidido
  alternatives_spanish:
  - he resuelto
  - he determinado
  lexicon: BDAG
  rationale: El perfecto expresa una decisión ya tomada con vigencia presente. «He decidido» es transparente en español y conserva el valor resultativo.
- source_word: παραχειμάσαι
  english_pob_choice: to spend the winter
  chosen_spanish: pasar allí el invierno
  alternatives_spanish:
  - invernar allí
  - quedarme allí durante el invierno
  lexicon: BDAG
  rationale: «Pasar el invierno» es el equivalente natural y preciso. Se añade «allí» porque el griego lo marca con ἐκεῖ, y así se evita perder el referente locativo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y concuerda con la auditoría inglesa: contingencia futura en Ὅταν πέμψω, imperativo de diligencia en σπούδασον, destino hacia Pablo en πρός με, y decisión asentada en κέκρικα. No se introducen cambios respecto del contexto auditado; solo se ajusta la formulación al español natural.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «Tíquico» como forma española estable del nombre propio.
  - «Pasar allí el invierno» preserva tanto el sentido temporal de παραχειμάσαι como la referencia locativa de ἐκεῖ.
