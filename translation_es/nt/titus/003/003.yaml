translation:
  language: es
  text: Porque también nosotros en otro tiempo éramos insensatos[a], desobedientes, extraviados, esclavizados a deseos y placeres diversos, pasando nuestra vida en malicia y envidia, odiosos[b], odiándonos unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engañados» para «extraviados».
    reason: lexical_alternative
  - marker: b
    text: O «odiados» para «odiosos». El adjetivo griego puede entenderse en sentido activo («odiosos, detestables») o pasivo («odiados»).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦμεν γάρ ποτε καὶ ἡμεῖς
  english_pob_choice: For we ourselves also were once
  chosen_spanish: Porque también nosotros en otro tiempo éramos
  alternatives_spanish:
  - Porque nosotros también éramos una vez
  - Pues también nosotros en otro tiempo fuimos
  lexicon: BDAG
  rationale: γάρ introduce conexión explicativa; en español, «Porque» mantiene esa relación. καὶ ἡμεῖς se refleja con «también nosotros», y ποτε con «en otro tiempo» para una referencia temporal natural y fiel al matiz de anterioridad.
- source_word: ἀνόητοι
  english_pob_choice: foolish
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - sin entendimiento
  lexicon: BDAG
  rationale: «Insensatos» reproduce el valor de falta de juicio/entendimiento sin sonar tan coloquial como «necios» en algunos registros; mantiene bien la fuerza ética de la lista de vicios.
- source_word: ἀπειθεῖς
  english_pob_choice: disobedient
  chosen_spanish: desobedientes
  alternatives_spanish:
  - rebeldes
  - incrédulos
  lexicon: BDAG
  rationale: «Desobedientes» es la equivalencia directa y apropiada al contexto moral. «Rebeldes» intensifica el matiz, mientras que «incrédulos» desplaza demasiado el sentido.
- source_word: πλανώμενοι
  english_pob_choice: being led astray
  chosen_spanish: extraviados
  alternatives_spanish:
  - siendo engañados
  - descarriados
  lexicon: BDAG
  rationale: El participio puede expresar ser conducidos fuera del camino o ser engañados. «Extraviados» conserva esa ambigüedad sin decidir exclusivamente por la engaño intelectual, y funciona bien en español como estado resultante.
- source_word: δουλεύοντες
  english_pob_choice: enslaved
  chosen_spanish: esclavizados
  alternatives_spanish:
  - sirviendo como esclavos
  - sometidos
  lexicon: BDAG
  rationale: Se preserva la fuerza de δουλεύω con «esclavizados», siguiendo el criterio de mantener lenguaje de esclavitud cuando el texto describe sujeción a deseos y placeres. En español suena natural y conserva el peso teológico del cautiverio moral.
- source_word: ἐπιθυμίαις καὶ ἡδοναῖς ποικίλαις
  english_pob_choice: various desires and pleasures
  chosen_spanish: deseos y placeres diversos
  alternatives_spanish:
  - diversas pasiones y placeres
  - varios deseos y deleites
  lexicon: BDAG
  rationale: «Deseos» traduce ἐπιθυμίαις en un sentido amplio, sin restringirlo a «lujurias». «Placeres diversos» refleja ποικίλαις aplicado al conjunto y conserva la idea de multiplicidad/variedad.
- source_word: ἐν κακίᾳ καὶ φθόνῳ διάγοντες
  english_pob_choice: spending our lives in malice and envy
  chosen_spanish: pasando nuestra vida en malicia y envidia
  alternatives_spanish:
  - viviendo en malicia y envidia
  - llevando una vida de malicia y envidia
  lexicon: BDAG
  rationale: διάγω puede significar conducir o pasar la vida; «pasando nuestra vida» preserva la idea durativa. «Malicia» y «envidia» corresponden de forma precisa a κακία y φθόνος en esta serie de vicios interpersonales.
- source_word: στυγητοί
  english_pob_choice: hateful
  chosen_spanish: odiosos
  alternatives_spanish:
  - aborrecibles
  - hated
  lexicon: BDAG
  rationale: στυγητοί admite tanto sentido activo («odiosos, detestables») como pasivo («odiados»). «Odiosos» mantiene la ambigüedad de manera razonable en español y se ajusta a la lectura contextual de la lista, sin resolver en exceso el término.
- source_word: μισοῦντες ἀλλήλους
  english_pob_choice: hating one another
  chosen_spanish: aborreciéndonos unos a otros
  alternatives_spanish:
  - odiándonos unos a otros
  - aborreciendo a los demás
  lexicon: BDAG
  rationale: El participio recíproco se expresa de forma natural con «unos a otros». «Aborreciéndonos» conserva el paralelismo fuerte con στυγητοί y evita repetir simplemente «odiar» después de «odiosos».
theological_decisions:
- issue: Fuerza de esclavitud moral en δουλεύοντες con objetos no personales
  english_pob_reading: enslaved to various desires and pleasures
  chosen_spanish_reading: esclavizados a deseos y placeres diversos
  alternative_spanish_readings:
  - sirviendo a deseos y placeres diversos
  - sometidos a deseos y placeres diversos
  rationale: La frase describe cautiverio moral antes de la conversión. «Esclavizados» conserva la fuerza de la metáfora sin añadir doctrina ajena al texto. «Sirviendo» suavizaría indebidamente el vínculo de dominio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος
- issue: Valor activo/pasivo de στυγητοί
  english_pob_reading: hateful
  chosen_spanish_reading: odiosos
  alternative_spanish_readings:
  - odiados
  - detestables
  rationale: El adjetivo griego puede entenderse como activo («detestables/odiosos») o pasivo («odiados»). La opción elegida respeta la nota de ambigüedad que el audit trail inglés preserva y encaja con el flujo de la lista de vicios.
  doctrine_reference: BDAG on στυγητός; English POB footnote b
- issue: Relación entre ἀνόητοι y el tono moral del versículo
  english_pob_reading: foolish
  chosen_spanish_reading: insensatos
  alternative_spanish_readings:
  - necios
  - sin entendimiento
  rationale: El término no sólo apunta a falta intelectual, sino a una condición moral anterior al evangelio. «Insensatos» comunica esa dimensión sin exagerar ni moralizar más allá del texto.
  doctrine_reference: BDAG on ἀνόητος
translation_notes:
  revision_awareness: 'Se revisó el expediente en inglés y el estado final quedó sin cambios sustantivos (''unchanged: true''); la propuesta española conserva el mismo perfil semántico y la misma ambigüedad lexical documentada, especialmente en πλανώμενοι y στυγητοί.'
  spanish_consistency_notes:
  - Se mantuvo 'esclavizados' para reflejar la fuerza de δουλεύοντες, en línea con el criterio POB para lenguaje de esclavitud moral.
  - Se evitó 'Cristo'/'Mesías' porque este versículo no contiene esa terminología.
  - '''Porque'' al inicio conserva la conexión inferencial de γάρ con el versículo anterior.'
  - La secuencia verbal y participial en español intenta reproducir la cadena descriptiva del griego sin volverla más interpretativa de lo necesario.
