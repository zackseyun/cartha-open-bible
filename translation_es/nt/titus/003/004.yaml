translation:
  language: es
  text: Pero cuando apareció la bondad[a] y el amor por la humanidad[b] de Dios nuestro Salvador,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amabilidad» o «benevolencia»; χρηστότης expresa bondad o benignidad en sentido relacional.
    reason: lexical_alternative
  - marker: b
    text: O «amor a la humanidad»; φιλανθρωπία denota benevolencia o amor hacia los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: BDAG
  rationale: ὅτε introduce una cláusula temporal y δέ añade una transición con matiz adversativo o progresivo. En español, «Pero cuando» comunica bien ese giro discursivo desde la condición humana anterior hacia la intervención salvadora de Dios.
- source_word: χρηστότης
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benevolencia
  - bondad
  lexicon: BDAG
  rationale: χρηστότης puede expresar bondad, amabilidad o benevolencia. Aquí «bondad» es natural en español y mantiene la primera cualidad como un rasgo moral-relacional sin volverla redundante con φιλανθρωπία.
- source_word: φιλανθρωπία
  english_pob_choice: love for humanity
  chosen_spanish: amor por la humanidad
  alternatives_spanish:
  - amor a la humanidad
  - amor por los seres humanos
  - benevolencia hacia la humanidad
  lexicon: BDAG
  rationale: φιλανθρωπία denota benevolencia o amor hacia los seres humanos. «Amor por la humanidad» conserva el sentido léxico de benevolencia hacia las personas y evita reducir el término a un simple «amor» genérico.
- source_word: ἐπεφάνη
  english_pob_choice: appeared
  chosen_spanish: aparecieron
  alternatives_spanish:
  - se manifestó
  - apareció
  - se hicieron patentes
  lexicon: BDAG
  rationale: El verbo griego está en singular, pero en español conviene coordinarlo con los dos sustantivos sujetos («la bondad y el amor por la humanidad»), de modo que el verbo plural refleje naturalmente la estructura sintáctica y el evento de manifestación. «Aparecieron» mantiene el valor de epifanía sin añadir interpretación.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: of God our Savior
  chosen_spanish: de Dios nuestro Salvador
  alternatives_spanish:
  - de Dios, nuestro Salvador
  - de nuestro Salvador Dios
  - de Dios, nuestro Salvador
  lexicon: BDAG
  rationale: La frase nominal funciona como un título que califica a Dios. «Dios nuestro Salvador» conserva el orden natural español y la fuerza titular, sin sustituirlo por una formulación eclesiástica distinta.
theological_decisions:
- issue: Referencia de «Dios nuestro Salvador»
  english_pob_reading: The phrase refers to God the Father in this verse, with the saving manifestation described in connection with his kindness and love, while the broader context distinguishes Jesus Christ in verse 6.
  chosen_spanish_reading: La frase se mantiene como título de Dios, sin resolver en la traducción la relación con la referencia más amplia del contexto; el versículo presenta su bondad y amor por la humanidad como la manifestación salvadora.
  alternative_spanish_readings:
  - Se refiere explícitamente a Dios Padre.
  - Es un título divino general sin precisar la persona.
  rationale: El texto griego permite preservar la tensión teológica sin explicitar más de lo que el versículo dice. La traducción conserva el título y la relación salvadora, dejando que el contexto posterior siga diferenciando a Jesús Cristo.
  doctrine_reference: Credo Niceno; preservar la tensión teológica sin resolverla en exceso
translation_notes:
  revision_awareness: El pasaje fue revisado con acuerdo alto entre la traducción inglesa de POB y la evidencia griega; no se registraron cambios sustantivos en la última pasada, así que este borrador sigue de cerca la lectura establecida y solo adapta la sintaxis al español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Salvador» para σωτήρ según la terminología POB.
  - Se evita introducir «Mesías» o «Señor» porque este versículo no los contiene.
  - La concordancia verbal plural en español responde a la coordinación de dos sustantivos sujetos; no cambia el contenido léxico del verbo griego.
