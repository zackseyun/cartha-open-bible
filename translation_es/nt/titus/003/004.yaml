    issue: El verbo «aparecieron» no preserva el singular griego ἐπεφάνη.
    rationale: El original presenta «la bondad y la filantropía» como una sola aparición/manifiestación de Dios nuestro Salvador. Pasarlo a plural hace más idiomática la concordancia superficial en español, pero pierde un matiz significativo del texto fuente y contradice la justificación inglesa de «appeared» en singular.
