    rationale: '''Amables'' es natural, pero puede sonar superficial o meramente cortés. El griego ἐπιεικής suele implicar consideración, ecuanimidad o trato benigno y clemente. ''Considerados'' preserva mejor ese matiz sin colisionar con ''mansedumbre''.'
