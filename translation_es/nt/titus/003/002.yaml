translation:
  language: es
  text: a nadie injuriar[a], ser pacíficos[b], considerados[c], mostrando toda mansedumbre hacia todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hablar mal de nadie'. El verbo puede denotar habla abusiva en general, no solo difamación formal.
    reason: lexical_alternative
  - marker: b
    text: O 'no conflictivos' o 'no contenciosos'.
    reason: lexical_alternative
  - marker: c
    text: O 'amables' o 'afables'. Se eligió 'considerados' para diferenciarlo de 'mansedumbre' más adelante en el verso y reflejar mejor el matiz de trato benigno del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie en absoluto
  lexicon: BDAG
  rationale: El acusativo con infinitivo en español se expresa naturalmente con el complemento directo/objeto de infinitivo introducido por 'a nadie'; conserva el alcance universal sin sonar forzado.
- source_word: βλασφημεῖν
  english_pob_choice: to slander
  chosen_spanish: difamar
  alternatives_spanish:
  - hablar mal de
  - injuriar
  - blasfemar
  lexicon: BDAG
  rationale: En este contexto ético interpersonal, el verbo no apunta a blasfemar contra Dios sino a hablar con abuso o daño de una persona. 'Difamar' comunica bien esa fuerza en español y evita limitarlo a un sentido estrictamente religioso.
- source_word: ἀμάχους
  english_pob_choice: peaceable
  chosen_spanish: pacíficos
  alternatives_spanish:
  - no conflictivos
  - no contenciosos
  - apacibles
  lexicon: BDAG
  rationale: La idea es no ser pendenciero ni dado a riñas. 'Pacíficos' es natural en español y transmite la ausencia de espíritu belicoso o litigioso que el inglés POB resolvió como 'peaceable'.
- source_word: ἐπιεικεῖς
  english_pob_choice: gentle
  chosen_spanish: amables
  alternatives_spanish:
  - gentiles
  - considerados
  - afables
  lexicon: BDAG
  rationale: ἐπιεικής puede abarcar amabilidad, consideración y trato benigno. Dado que el verso ya tiene 'mansedumbre' para πραΰτης, 'amables' ayuda a distinguir ambos términos sin perder la suavidad ética del griego.
- source_word: πραΰτητα
  english_pob_choice: meekness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - dulzura
  - humildad
  - gentileza
  lexicon: BDAG
  rationale: '''Mansedumbre'' es el equivalente bíblico más asentado para πραΰτης y preserva la tensión lexical con ἐπιεικεῖς. Aunque ''gentileza'' también es posible, ''mansedumbre'' expresa mejor la cualidad de humildad y suavidad controlada.'
- source_word: πρὸς πάντας ἀνθρώπους
  english_pob_choice: toward all people
  chosen_spanish: hacia todas las personas
  alternatives_spanish:
  - con todas las personas
  - para con todos
  - hacia todos
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico y abarca a seres humanos en general. 'Todas las personas' mantiene el valor inclusivo del original y suena claro en español contemporáneo.
theological_decisions:
- issue: Distinción entre ἐπιεικεῖς y πραΰτητα
  english_pob_reading: gentle ... showing all meekness
  chosen_spanish_reading: amables ... mostrando toda mansedumbre
  alternative_spanish_readings:
  - gentiles ... mostrando toda gentileza
  - afables ... mostrando toda humildad
  rationale: Conviene no colapsar ambos términos en una sola idea. 'Amables' para ἐπιεικεῖς y 'mansedumbre' para πραΰτης preservan la diferenciación observada por el POB inglés entre el adjetivo y el sustantivo.
  doctrine_reference: DOCTRINE.md Translation philosophy § lexical distinctiveness
- issue: Alcance universal de ἀνθρώπους
  english_pob_reading: all people
  chosen_spanish_reading: todas las personas
  alternative_spanish_readings:
  - todos
  - todos los hombres
  rationale: El griego usa ἀνθρώπους de manera genérica para toda la humanidad. En español, 'todas las personas' evita una lectura masculina restringida y reproduce fielmente el alcance universal del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de ''non-contentious'' a ''peaceable'' para ἀμάχους, y mantuvo la distinción entre ἐπιεικεῖς y πραΰτητα. Esta versión española sigue esa revisión: usa ''pacíficos'' para el primer rasgo y conserva una segunda cualidad distinta con ''amables'' / ''mansedumbre''.'
  spanish_consistency_notes:
  - Se evita 'blasfemar' porque en español su uso primario remite a Dios; aquí el contexto exige daño verbal contra personas.
  - Se mantiene un registro bíblico pero actual, con términos que suenan naturales y a la vez conservan la diferenciación léxica del griego.
  - '''Personas'' se usa para reflejar el valor genérico de ἀνθρώπους sin sesgo masculino.'
