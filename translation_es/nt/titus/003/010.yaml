translation:
  language: es
  text: Rechaza a la persona[b] divisiva[a] después de una primera y una segunda amonestación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «factiosa»; o, en traducciones tradicionales, «herética». El término griego probablemente se refiere a una persona que crea división sectaria.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «hombre/persona» para un ser humano individual. Se traduce «persona» en español por naturalidad en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετικὸν
  english_pob_choice: divisive
  chosen_spanish: divisiva
  alternatives_spanish:
  - factiosa
  - herética
  lexicon: BDAG
  rationale: En este contexto, αἱρετικός apunta a alguien que provoca facciones o división en la comunidad, no primariamente al sentido técnico posterior de “herejía”. “Divisiva” conserva ese efecto relacional y eclesial sin cargar el término con un desarrollo doctrinal más tardío. Se mantiene el género del adjetivo en español conforme a “persona”.
- source_word: ἄνθρωπον
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - hombre
  - individuo
  lexicon: BDAG
  rationale: El griego usa ἄνθρωπον en singular para un ser humano concreto. En español, “persona” expresa con naturalidad el referente genérico sin introducir una marca masculina que el contexto no exige.
- source_word: μετὰ μίαν καὶ δευτέραν νουθεσίαν
  english_pob_choice: after a first and second warning
  chosen_spanish: después de una primera y segunda amonestación
  alternatives_spanish:
  - tras una primera y segunda advertencia
  - después de una primera y segunda instrucción
  lexicon: BDAG
  rationale: La secuencia indica que la acción viene solo después de una corrección previa reiterada. “Amonestación” conserva el peso correctivo de νουθεσία; “advertencia” sería viable, pero “amonestación” refleja mejor el matiz de exhortación disciplinaria.
- source_word: παραιτοῦ
  english_pob_choice: Reject
  chosen_spanish: Rechaza
  alternatives_spanish:
  - Evita
  - No tengas trato con
  - Recházalo
  lexicon: BDAG
  rationale: El imperativo exige una respuesta disciplinaria clara. “Rechaza” comunica la decisión de no recibir o no seguir aceptando a esa persona en ese estado. “Evita” sería más débil y “no tengas trato con” añade más de lo que el griego expresa de forma directa.
theological_decisions:
- issue: 'El alcance de αἱρετικὸν: “hereje” en sentido técnico versus alguien que causa divisiones'
  english_pob_reading: divisive
  chosen_spanish_reading: divisiva
  alternative_spanish_readings:
  - herética
  - factiosa
  rationale: Se preserva la lectura de conflicto comunitario que el audit trail inglés considera probable. “Herética” importaría una categoría eclesiástica posterior que el término, por sí solo, no requiere aquí. “Divisiva” mantiene la tensión entre doctrina y unidad sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB inglés: se conservó la idea de “divisive” y se tomó en cuenta la corrección de “man” a “person”. El orden temporal de “after a first and second warning” se reprodujo con una construcción natural en español.'
  spanish_consistency_notes:
  - Se mantuvo “amonestación” para νουθεσία, en línea con el matiz correctivo del contexto.
  - Se evitó “hereje”/“herético” en el texto principal para no fijar un sentido técnico no exigido por el griego.
  - Se usó “Rechaza” para reproducir la fuerza imperativa disciplinaria de παραιτοῦ.
