translation:
  language: es
  text: Todos los que están conmigo te saludan. Saluda a los que nos aman en fe[a]. La gracia sea con todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la fe»; alternativamente, «en fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζονταί
  english_pob_choice: greet
  chosen_spanish: te saludan
  alternatives_spanish:
  - te envían saludos
  - te saludan cordialmente
  lexicon: BDAG
  rationale: En el cierre epistolar, ἀσπάζομαι funciona como fórmula de saludo. «Te saludan» conserva la fuerza interpersonal directa y suena natural en español; «saludar» evita una paráfrasis excesiva.
- source_word: οἱ μετ’ ἐμοῦ πάντες
  english_pob_choice: All who are with me
  chosen_spanish: Todos los que están conmigo
  alternatives_spanish:
  - Todos los que me acompañan
  - Todas las personas que están conmigo
  lexicon: BDAG
  rationale: La construcción μετά + genitivo expresa compañía/estar con alguien. «Todos los que están conmigo» preserva πάντες y la relación de compañía sin añadir matices no presentes en el griego.
- source_word: ἄσπασαι
  english_pob_choice: Greet
  chosen_spanish: Saluda
  alternatives_spanish:
  - Saluda a
  - Da saludos a
  lexicon: BDAG
  rationale: El imperativo epistolar de ἀσπάζομαι se rinde con el imperativo natural «saluda», que comunica el mandato breve y directo del texto.
- source_word: τοὺς φιλοῦντας ἡμᾶς
  english_pob_choice: those who love us
  chosen_spanish: a los que nos aman
  alternatives_spanish:
  - a los que nos quieren
  - a los que nos tienen afecto
  lexicon: BDAG
  rationale: φιλέω aquí apunta a afecto personal. «Aman» conserva esa intensidad relacional y sigue la lectura de POB; «nos aman» respeta el objeto directo implícito del griego con el complemento preposicional español habitual.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en fe
  - en fidelidad
  lexicon: BDAG
  rationale: Aquí πίστις puede entenderse como la esfera compartida de la comunidad cristiana. En español, «en la fe» comunica con más claridad la posible referencia al ámbito de la fe cristiana y mantiene la alternativa abierta que el inglés POB anotó entre «in faith», «in the faith» y «in faithfulness».
- source_word: ἡ χάρις
  english_pob_choice: Grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - La gracia de Dios
  - Gracia
  lexicon: BDAG
  rationale: La bendición final paulina conserva el sustantivo «gracia». Incluir el artículo explícito («La gracia») refleja mejor el griego ἡ χάρις y mantiene el tono benedictivo.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: be with all of you
  chosen_spanish: sea con todos ustedes
  alternatives_spanish:
  - esté con todos ustedes
  - sea con ustedes todos
  lexicon: BDAG
  rationale: El verbo copulativo está elíptico en griego; en español debe expresarse. «Sea con todos ustedes» conserva el valor de bendición y preserva πάντων con una formulación idiomática.
theological_decisions:
- issue: Valor de πίστις en ἐν πίστει
  english_pob_reading: in faith; alternatively, in the faith / in faithfulness
  chosen_spanish_reading: en la fe
  alternative_spanish_readings:
  - en fe
  - en fidelidad
  - en la fe cristiana
  rationale: 'El contexto de saludo final permite más de una lectura: la esfera de la fe compartida, la fidelidad, o la comunidad creyente. En español, «en la fe» es la opción más transparente y conserva la ambigüedad útil sin cerrar indebidamente el sentido.'
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve alternatives where context is open'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el segmento «en la fe[a]» para que el marcador aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el registro epistolar breve y benedictivo propio del cierre de carta.
  - Se evitó el calco «La gracia sea con...» por resultar menos natural en español; el añadido de «sea» expresa la elipsis griega de manera idiomática.
  - Se conservó «todos ustedes» para representar πάντων ὑμῶν de forma inclusiva y natural en español latinoamericano.
