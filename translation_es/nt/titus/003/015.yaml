review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: saludo de los acompañantes, mandato de saludar a ciertos destinatarios y bendición final. Sin embargo, en ἐν πίστει el español principal se aparta de la decisión auditada del POB inglés, que eligió ''in faith'' y solo preservó ''in the faith'' como alternativa. El texto español pone ''en la fe'' en el cuerpo principal, lo cual sobreespecifica una opción alternativa no marcada en griego.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Todos los que están conmigo te saludan' y 'La gracia sea con todos ustedes' funcionan bien. La única reparación necesaria es ajustar 'en la fe' a 'en fe' en el texto principal y reordenar la nota para reflejar primero la alternativa auditada correspondiente.
  glossary_alignment: 'No hay conflictos con términos del glosario mayor. ''La gracia'' para ἡ χάρις es adecuado en esta bendición paulina. El punto relevante es πίστις: por directriz doctrinal del proyecto, el valor por defecto es ''fe'', preservando alternativas en nota cuando el contexto es abierto. Por eso conviene ''en fe'' en el texto principal, con nota para ''en la fe'' y ''en fidelidad''.'
  issues:
  - severity: medium
    issue: El texto principal traduce ἐν πίστει como 'en la fe' en lugar de la opción base auditada 'en faith'/'en fe'.
    rationale: El inglés POB decidió 'in faith' como lectura principal y dejó 'in the faith' e 'in faithfulness' como alternativas. El español actual desplaza una alternativa al texto principal y añade especificación no exigida por el griego.
  - severity: low
    issue: La nota al pie prioriza 'en fidelidad' y luego explica 'en la fe', en vez de reflejar con mayor fidelidad el orden de alternativas del registro inglés.
    rationale: No es un error grave, pero para trazabilidad auditada conviene que la nota preserve primero 'en la fe' y luego 'en fidelidad', ya que la primera es la alternativa más cercana a la anotación inglesa.
  revised_spanish_text: Todos los que están conmigo te saludan. Saluda a los que nos aman en fe[a]. La gracia sea con todos ustedes.
