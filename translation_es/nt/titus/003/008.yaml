translation:
  language: es
  text: Este dicho es digno de confianza, y acerca de estas cosas quiero que insistas con firmeza[a], para que los que han creído a Dios[b] procuren dedicarse a buenas obras. Estas cosas son buenas y útiles para las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «insistas con fuerza» o «afirmes con confianza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que han creído en Dios» o «los que han confiado en Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς ὁ λόγος
  english_pob_choice: This saying is trustworthy
  chosen_spanish: Esta palabra es confiable
  alternatives_spanish:
  - Esta declaración es confiable
  - Este dicho es confiable
  lexicon: BDAG
  rationale: λόγος en esta fórmula pastoral apunta a la afirmación o mensaje previo, no solo a una palabra aislada. En español, «palabra» mantiene la fuerza formularia y el vínculo con el contexto inmediato; «confiable» comunica bien πιστός como cualidad de veracidad y fiabilidad.
- source_word: περὶ τούτων
  english_pob_choice: concerning these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - concerning these cosas
  - sobre estas cosas
  lexicon: BDAG
  rationale: La preposición περί con genitivo se rinde naturalmente como «acerca de». «Estas cosas» conserva el deíctico y el enlace con lo dicho antes.
- source_word: βούλομαί σε
  english_pob_choice: I want you
  chosen_spanish: quiero que
  alternatives_spanish:
  - deseo que
  - tengo la intención de que
  lexicon: BDAG
  rationale: El valor de voluntad de βούλομαι se expresa con naturalidad en español mediante «quiero que». La construcción impersonal directa en español evita una literalidad extraña y conserva la fuerza personal de la exhortación.
- source_word: διαβεβαιοῦσθαι
  english_pob_choice: to insist confidently
  chosen_spanish: insistas con firmeza
  alternatives_spanish:
  - afirmes con confianza
  - insistas con confianza
  - afirmes con firmeza
  lexicon: BDAG
  rationale: El infinitivo medio transmite afirmar con seguridad, insistir o recalcar de manera enfática. «Insistas con firmeza» reproduce mejor la decisión exhortativa que «hablar con confianza» y mantiene la intensidad documentada por la auditoría inglesa.
- source_word: ἵνα φροντίζωσιν
  english_pob_choice: so that ... may be careful
  chosen_spanish: para que ... procuren
  alternatives_spanish:
  - para que ... tengan cuidado
  - para que ... presten atención
  lexicon: BDAG
  rationale: φροντίζω implica atender con cuidado, pensar seriamente o ocuparse de algo. «Procuren» en español conserva la idea de atención deliberada y encaja de forma fluida con el infinitivo siguiente.
- source_word: καλῶν ἔργων
  english_pob_choice: good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - buenas obras y acciones
  - buenos hechos
  lexicon: BDAG
  rationale: «Obras» conserva la resonancia bíblica de ἔργα sin reducirlo a mera filantropía. «Buenas» refleja καλός como bondad cualitativa y moral.
- source_word: προΐστασθαι
  english_pob_choice: to devote themselves to
  chosen_spanish: dedicarse a
  alternatives_spanish:
  - ocuparse de
  - aplicarse a
  - practicarlas
  lexicon: BDAG
  rationale: En este contexto, προΐστασθαι no funciona principalmente como «dirigir» sino como atenderse a algo, ocuparse de ello o dedicarse a ello. «Dedicarse a» comunica bien el compromiso sostenido con buenas obras y preserva la decisión léxica ya auditada en inglés.
- source_word: οἱ πεπιστευκότες θεῷ
  english_pob_choice: those who have believed God
  chosen_spanish: los que han creído a Dios
  alternatives_spanish:
  - los que han creído en Dios
  - los que han confiado en Dios
  lexicon: BDAG
  rationale: El perfecto participial señala a quienes han creído y permanecen en ese estado. El dativo θεῷ permite en español «creído a Dios», opción que mantiene más de cerca la construcción griega y el matiz de tomar a Dios por verdadero. La alternativa más idiomática se preserva por nota.
- source_word: ταῦτά ἐστιν
  english_pob_choice: These things are
  chosen_spanish: Estas cosas son
  alternatives_spanish:
  - Esto es
  lexicon: BDAG
  rationale: El sujeto neutro plural exige en español un plural explícito. «Estas cosas son» conserva el referente demostrativo y la sintaxis natural del español.
- source_word: καλὰ καὶ ὠφέλιμα
  english_pob_choice: good and beneficial
  chosen_spanish: buenas y útiles
  alternatives_spanish:
  - buenas y provechosas
  - buenas y beneficiosas
  lexicon: BDAG
  rationale: καλά expresa bondad y calidad; ὠφέλιμα indica utilidad o provecho. «Útiles» reproduce ese sentido con sencillez, y junto con «buenas» mantiene ambas dimensiones.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: for people
  chosen_spanish: para las personas
  alternatives_spanish:
  - para la gente
  - para los seres humanos
  lexicon: BDAG
  rationale: ἀνθρώποις es genérico y no masculino específico. «Las personas» comunica inclusividad natural en español sin perder el sentido universal.
theological_decisions:
- issue: Relación entre fe y obras en la exhortación
  english_pob_reading: 'Rendered the clause as an ethical result of prior belief: ''those who have believed God may be careful to devote themselves to good works.'''
  chosen_spanish_reading: 'La cláusula se traduce como resultado ético de una fe ya existente: «los que han creído a Dios procuren dedicarse a buenas obras».'
  alternative_spanish_readings:
  - traducirla más débilmente como una exhortación general a hacer buenas obras
  - traducirla más fuertemente como si las obras fueran meritorias
  rationale: El griego presenta las buenas obras como consecuencia esperada en quienes ya han creído, no como base de salvación. La redacción española conserva ese orden sin añadir un marco doctrinal ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Construcción de πιστεύω con dativo θεῷ
  english_pob_reading: Main text keeps the direct sense 'believed God.'
  chosen_spanish_reading: 'La traducción mantiene la lectura directa: «creído a Dios».'
  alternative_spanish_readings:
  - creído en Dios
  - confiado en Dios
  rationale: El dativo con πιστεύω puede reflejar creer a Dios, es decir, aceptar lo que dice. En español, «creído a Dios» preserva mejor la relación fuente-meta; la formulación más idiomática queda como alternativa de nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el último ajuste auditado del inglés, que prefirió 'insist confidently' sobre 'speak confidently' para διαβεβαιοῦσθαι. En español se reflejó esa intensificación con «insistas con firmeza», manteniendo además el valor exhortativo del pasaje y la continuidad con la cláusula final sobre la utilidad de estas cosas.
  spanish_consistency_notes:
  - Se conservó «Dios» sin máscara litúrgica porque el texto griego usa θεῷ directamente.
  - Se eligió «buenas obras» para preservar la terminología paulina/pastoral de ἔργα sin convertirla en simple ayuda social.
  - «Personas» evita un masculino genérico innecesario y corresponde al valor universal de ἀνθρώποις.
  - Las notas a y b preservan alternativas semánticas reales documentadas por la auditoría inglesa.
