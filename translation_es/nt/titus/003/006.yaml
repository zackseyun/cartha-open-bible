translation:
  language: es
  text: el cual derramó sobre nosotros abundantemente por medio de Jesús Mesías nuestro Salvador[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo cual derramó sobre nosotros abundantemente», si el relativo se expresa de manera menos personal; el antecedente es el Espíritu Santo en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: Griego «Jesús Cristo»; aquí se traduce «Jesús Mesías» porque Χριστός se usa como título.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗ
  english_pob_choice: whom
  chosen_spanish: el cual
  alternatives_spanish:
  - quien
  - lo cual
  lexicon: BDAG
  rationale: El relativo griego puede referirse al Espíritu Santo mencionado en el versículo anterior. En español, «el cual» mantiene una referencia personal o al menos personalizable sin forzar un giro demasiado coloquial; «lo cual» depersonalizaría la referencia.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - esparció
  lexicon: BDAG
  rationale: ἐκχέω expresa la acción de derramar o vaciar. «Derramó» es el equivalente natural y bíblico en español para el envío del Espíritu, y conserva la imagen verbal sin arcaísmo.
- source_word: ἐφ’ ἡμᾶς
  english_pob_choice: on us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - en nosotros
  - sobre nosotros mismos
  lexicon: BDAG
  rationale: La preposición con acusativo comunica dirección hacia o encima de. «Sobre nosotros» reproduce bien la imagen de algo derramado hacia/encima de nosotros y suena natural en español.
- source_word: πλουσίως
  english_pob_choice: richly
  chosen_spanish: abundantemente
  alternatives_spanish:
  - con abundancia
  - generosamente
  lexicon: BDAG
  rationale: El adverbio comunica abundancia o riqueza de manera cualitativa. «Abundantemente» expresa claramente la amplitud del derramamiento y evita una metáfora de riqueza que en español podría sonar menos directa en este contexto.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά indica medio o agencia. «Por medio de» comunica con precisión el medio instrumental y mantiene un registro claro y bíblico.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando funciona claramente como título, en español «Jesucristo» es una forma fijada y plenamente inteligible en registro eclesial. Aquí evita una construcción menos natural como «Jesús Mesías» y conserva la referencia cristológica sin perder claridad.
- source_word: τοῦ σωτῆρος ἡμῶν
  english_pob_choice: our Savior
  chosen_spanish: nuestro Salvador
  alternatives_spanish:
  - el Salvador nuestro
  - el Salvador de nosotros
  lexicon: BDAG
  rationale: σωτήρ se traduce de forma natural como «Salvador». El posesivo «nuestro» reproduce el genitivo personal de manera idiomática en español y conserva el título cristológico.
theological_decisions:
- issue: Referente del relativo οὗ
  english_pob_reading: The pronoun refers to the Holy Spirit mentioned in Titus 3:5, so the verse speaks of God pouring out the Spirit on believers.
  chosen_spanish_reading: El relativo se entiende como referencia al Espíritu Santo mencionado en el versículo anterior, de modo que el texto habla de un derramamiento del Espíritu sobre nosotros.
  alternative_spanish_readings:
  - el cual podría leerse de manera más impersonal
  - lo cual, si se tomara como referencia abstracta
  rationale: La conexión inmediata con el Espíritu Santo en el contexto favorece una referencia personal. En español, «el cual» permite conservar esa relación sin perder fluidez.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Tratamiento de Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús, el Mesías
  rationale: La tensión auditada entre traducir Χριστός como título y mantener una forma estable del nombre compuesto se resuelve aquí con «Jesucristo», una forma idiomática y reverente en español. Dado que el contexto lo coloca junto a «nuestro Salvador», el sentido cristológico permanece claro sin introducir una expresión menos natural.
  doctrine_reference: 'Translation philosophy #2; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que alternó entre «Jesus Messiah» y «Jesus Christ», con una corrección posterior para restaurar la política de traducir Χριστός como «Messiah». En español, la decisión se resuelve con «Jesucristo», una forma asentada que evita una traducción mecánica de la oscilación inglesa y mantiene la claridad del título cristológico.
  spanish_consistency_notes:
  - Se mantuvo el referente del pronombre relativo con una formulación personalizable («el cual») para no despersonalizar el Espíritu Santo.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton ni κύριος como equivalente directo del nombre de Yahvé.
  - Se prefirió «Jesucristo» por naturalidad y estabilidad eclesial en español, aunque el audit trail inglés discute «Mesiah/Christ» como título.
  - Se conservó «nuestro Salvador» para reflejar el genitivo posesivo sin forzar una construcción más literal.
