translation:
  language: es
  text: no por obras hechas en rectitud[a] que nosotros mismos hicimos, sino según su misericordia nos salvó, por medio del lavamiento de regeneración y de renovación por el Espíritu Santo[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hechas en justicia'. El griego δικαιοσύνη puede significar 'rectitud' o 'justicia'; aquí se usa 'rectitud' en el texto principal por reflejar mejor el valor paulino de la expresión, mientras se preserva 'justicia' como alternativa.
    reason: alternative_reading
  - marker: b
    text: '''Lavamiento'' puede aludir al bautismo, a una imagen de limpieza, o a ambos; el griego no obliga al traductor a explicitar esa decisión interpretativa en el texto principal.'
    reason: lexical_alternative
  - marker: c
    text: O 'renovación del Espíritu Santo'. La construcción griega permite relacionar de más de una manera 'Espíritu Santo' con 'renovación'.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐξ ἔργων
  english_pob_choice: not from works
  chosen_spanish: no por obras
  alternatives_spanish:
  - no a partir de obras
  - no de obras
  lexicon: BDAG
  rationale: ἐκ con genitivo expresa origen o base; en español, 'no por obras' comunica con naturalidad la idea de que las obras no son la fuente o base de la salvación, sin forzar una paráfrasis excesiva.
- source_word: τῶν ἐν δικαιοσύνῃ
  english_pob_choice: done in righteousness
  chosen_spanish: hechas en justicia
  alternatives_spanish:
  - hechas en rectitud
  - hechas en justicia y rectitud
  lexicon: BDAG
  rationale: δικαιοσύνη se deja como 'justicia' para preservar la alternativa semántica documentada en el audit trail, y porque en español 'hechas en justicia' mantiene el contraste con 'según su misericordia'. La forma 'hechas' hace explícito el participio implícito, como en el inglés auditado.
- source_word: ἃ ἐποιήσαμεν ἡμεῖς
  english_pob_choice: that we ourselves did
  chosen_spanish: que nosotros mismos hicimos
  alternatives_spanish:
  - que hicimos nosotros mismos
  - que nosotros hicimos
  lexicon: BDAG
  rationale: La duplicación pronominal 'nosotros mismos' conserva el énfasis de ἡμεῖς. 'Hicimos' refleja el aoristo verbal sin añadir matices no presentes en el griego.
- source_word: κατὰ τὸ αὐτοῦ ἔλεος
  english_pob_choice: according to his mercy
  chosen_spanish: según su misericordia
  alternatives_spanish:
  - de acuerdo con su misericordia
  - conforme a su misericordia
  lexicon: BDAG
  rationale: κατά aquí marca norma o base; 'según' es una equivalencia natural en español que conserva la relación causal/basal con la misericordia, en contraste con las obras.
- source_word: ἔσωσεν ἡμᾶς
  english_pob_choice: he saved us
  chosen_spanish: nos salvó
  alternatives_spanish:
  - nos rescató
  - nos libró
  lexicon: BDAG
  rationale: σῴζω en este contexto soteriológico se traduce con el verbo usual 'salvar'. El clítico 'nos' preserva la relación directa del objeto sin necesidad de un pronombre explícito doble.
- source_word: διὰ λουτροῦ
  english_pob_choice: through the washing
  chosen_spanish: por medio del lavamiento
  alternatives_spanish:
  - por medio del baño
  - mediante el lavamiento
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento; 'por medio del' es claro y natural. 'Lavamiento' conserva el sustantivo de acción y deja abierta la cuestión interpretativa sobre bautismo o limpieza ritual, sin resolverla en el texto principal.
- source_word: παλιγγενεσίας
  english_pob_choice: of regeneration
  chosen_spanish: de regeneración
  alternatives_spanish:
  - de nuevo nacimiento
  - de renacimiento
  lexicon: BDAG
  rationale: '''Regeneración'' preserva el valor técnico-teológico del término y la relación nominal con ''lavamiento'', en línea con la decisión inglesa de no volverlo más explícito de lo que el griego requiere.'
- source_word: καὶ ἀνακαινώσεως
  english_pob_choice: and renewal
  chosen_spanish: y de renovación
  alternatives_spanish:
  - y de renovación interior
  - y de renovación espiritual
  lexicon: BDAG
  rationale: ἀνακαίνωσις se traduce de forma directa como 'renovación', manteniendo el paralelismo con 'regeneración' y evitando una explicación interpretativa añadida.
- source_word: πνεύματος ἁγίου
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - mediante el Espíritu Santo
  lexicon: BDAG
  rationale: La construcción griega admite relación de agencia o de pertenencia con 'renovación'. En español, 'por el Espíritu Santo' comunica con naturalidad el sentido instrumental/agencial preservando la ambigüedad sintáctica documentada.
theological_decisions:
- issue: Valor de δικαιοσύνη en la frase "ἔργων τῶν ἐν δικαιοσύνῃ"
  english_pob_reading: righteousness, with justice preserved as an alternative
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: Se mantiene 'justicia' porque el español permite conservar la alternativa registrada en el audit trail y porque la frase describe obras caracterizadas por justicia, no obras como base de justificación. La decisión evita una domesticación hacia lenguaje eclesiástico menos preciso.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Relación de λουτροῦ παλιγγενεσίας con el debate bautismal
  english_pob_reading: washing of regeneration, without specifying baptism in the main text
  chosen_spanish_reading: lavamiento de regeneración
  alternative_spanish_readings:
  - lavamiento bautismal de regeneración
  - baño de regeneración
  rationale: 'El texto griego permite varias lecturas: bautismal, metafórica o mixta. El español conserva ''lavamiento'' para no resolver esa tensión y no añadir ''bautismo'' al texto principal.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Alcance de πνεύματος ἁγίου
  english_pob_reading: renewal by the Holy Spirit, with the genitive attached most directly to renewal
  chosen_spanish_reading: renovación por el Espíritu Santo
  alternative_spanish_readings:
  - renovación del Espíritu Santo
  - renovación y del Espíritu Santo
  rationale: La traducción española conserva la lectura más probable de agencia para la renovación, pero no fuerza una solución dogmática cerrada sobre si el genitivo se extiende a toda la frase. El orden mantiene la coordinación natural del español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'which we ourselves did' a 'that we ourselves did' para hacer más natural la conexión relativa; en español se reflejó esa relación con 'que nosotros mismos hicimos'. No se introdujeron cambios doctrinales nuevos. Se mantuvo la tensión interpretativa sobre δικαιοσύνη, λουτρόν y la relación sintáctica de πνεύματος ἁγίου, siguiendo la filosofía de equivalencia óptima documentada.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' con mayúsculas por referencia al Espíritu divino.
  - '''Misericordia'' traduce ἔλεος de forma estable y publicable en español bíblico moderno.'
  - No se usa 'SEÑOR' ni 'Cristo' en este verso; no hay término correspondiente en el griego de base.
  - '''Regeneración'' y ''renovación'' se conservaron como sustantivos técnicos para reflejar el paralelismo del original.'
  - 'La puntuación con comas sigue la sintaxis española y preserva el encadenamiento de contrastes: no... sino..., por medio de...'
