  text: οὐκ ἐξ ἔργων τῶν ἐν δικαιοσύνῃ ⸀ἃ ἐποιήσαμεν ἡμεῖς ἀλλὰ κατὰ ⸂τὸ αὐτοῦ ἔλεος⸃ ἔσωσεν ἡμᾶς διὰ λουτροῦ παλιγγενεσίας καὶ ἀνακαινώσεως πνεύματος ἁγίου,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/005.yaml
  text: not from works done in righteousness that we ourselves did[a], but according to his mercy he saved us, through the washing of regeneration and renewal by the Holy Spirit[c][b],
  footnotes:
  - marker: a
    text: Or 'works done in justice.' The Greek word can mean 'righteousness' or 'justice'; in Pauline usage the main text keeps 'righteousness.'
    reason: alternative_reading
  - marker: b
    text: '''Washing'' may refer to baptism, cleansing imagery, or both; the Greek itself does not require the translator to make that interpretive choice explicit in the main text.'
    reason: lexical_alternative
  - marker: c
    text: Or 'renewal of the Holy Spirit.' The Greek construction allows slightly different ways of relating 'Holy Spirit' to 'renewal.'
    reason: alternative_reading
