  to: no por obras hechas en rectitud[a] que nosotros mismos hicimos, sino según su misericordia nos salvó, por medio del lavamiento de regeneración y de renovación por el Espíritu Santo[c][b],
  rationale: Se revisa principalmente δικαιοσύνη para que el texto principal español refleje mejor la decisión auditada 'righteousness' sin caer en un calco extraño; 'rectitud' resulta más natural y teológicamente ajustado, mientras 'justicia' queda como alternativa en nota. También se elimina la coma antes de la relativa restrictiva para mejorar la sintaxis española. Se mantienen 'lavamiento', 'regeneración' y 'renovación por el Espíritu Santo' para no resolver en exceso debates interpretativos presentes en el griego y en el audit trail.
