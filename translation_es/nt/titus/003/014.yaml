review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo y acierta en «aprendan», «buenas obras» y el propósito final. Sin embargo, se aparta del rastro auditado y del griego en dos puntos relevantes: (1) «para las necesidades urgentes» escoge una alternativa inglesa posible, pero el POB fijó «necessary needs» como preferida, así que en español debe conservarse mejor la idea de necesidades necesarias/esenciales más que urgencia; (2) la nota de «los nuestros» introduce «nuestros propios pueblos», que no corresponde al inglés auditado («our own / our own people») ni al sentido del griego. También conviene mejorar la naturalidad de «ocuparse de buenas obras» hacia una formulación más idiomática de participación activa.'
  spanish_quality_summary: El español es legible y digno, pero «ocuparse de buenas obras» suena algo forzado en este contexto, y «necesidades urgentes» desplaza el matiz semántico principal. «Infructuosos» es correcto, aunque «sin fruto» sería más transparente; no es un problema. La frase puede fluir mejor como «aprendan a dedicarse a buenas obras para atender las necesidades indispensables».
  glossary_alignment: No hay conflictos con la terminología mayor del proyecto. «Buenas obras» preserva bien καλῶν ἔργων. «Los nuestros» es aceptable para οἱ ἡμέτεροι, pero su nota debe alinearse con «los nuestros propios / nuestro propio pueblo» y no «pueblos». La decisión para εἰς τὰς ἀναγκαίας χρείας debe reflejar «necesidades indispensables/necesarias» más que «urgentes», salvo en nota alternativa.
  issues:
  - severity: medium
    issue: «necesidades urgentes» no sigue la elección principal auditada
    rationale: El inglés POB eligió «for necessary needs» como lectura principal y dejó «urgent needs» como alternativa. La versión española hace principal la alternativa y cambia el centro semántico de ἀναγκαίας.
  - severity: medium
    issue: La nota al pie [a] dice «nuestros propios pueblos»
    rationale: Eso no corresponde al inglés auditado («our own» / «our own people») y además «pueblos» cambia el referente comunitario a colectividades/pluralidad de pueblos.
  - severity: low
    issue: «ocuparse de buenas obras» es algo poco idiomático
    rationale: Aunque es defendible semánticamente, en español bíblico actual suena menos natural que «dedicarse a buenas obras» o «practicar buenas obras», sin perder el sentido de implicación activa.
  revised_spanish_text: Y que también los nuestros[a] aprendan a dedicarse[b] a buenas obras para atender las necesidades indispensables[c], a fin de que no sean infructuosos.
  revised_footnotes:
