translation:
  language: es
  text: Y que también los nuestros[a] aprendan a dedicarse[b] a buenas obras para atender las necesidades indispensables[c], a fin de que no sean infructuosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros propios» o «nuestro propio pueblo».
    reason: lexical_alternative
  - marker: b
    text: O «participar en buenas obras» o «tomar la iniciativa en buenas obras».
    reason: lexical_alternative
  - marker: c
    text: O «para necesidades urgentes».
    reason: lexical_alternative
lexical_decisions:
- source_word: μανθανέτωσαν
  english_pob_choice: let ... learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - que aprendan
  - aprendan a
  lexicon: BDAG
  rationale: El imperativo exhortativo plural pide un mandato con matiz de aprendizaje progresivo; en español, «aprendan» comunica bien la fuerza jussiva sin endurecerla innecesariamente.
- source_word: οἱ ἡμέτεροι
  english_pob_choice: our people
  chosen_spanish: los nuestros
  alternatives_spanish:
  - nuestro pueblo
  - los de nuestra comunidad
  lexicon: BDAG
  rationale: «Los nuestros» refleja de forma natural y breve la pertenencia comunitaria del grupo al que se refiere el griego, sin restringirlo por género ni hacerlo más abstracto de lo necesario.
- source_word: καλῶν ἔργων
  english_pob_choice: good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - buenas acciones
  - obras buenas
  lexicon: BDAG
  rationale: «Buenas obras» conserva la formulación tradicional y la repetición temática de Tito, manteniendo el valor moral y práctico del sintagma.
- source_word: προΐστασθαι
  english_pob_choice: to engage in
  chosen_spanish: ocuparse de
  alternatives_spanish:
  - dedicarse a
  - empeñarse en
  - tomar la iniciativa en
  lexicon: BDAG
  rationale: El verbo admite la idea de dirigir, presidir, atender o dedicarse a. Aquí, con «buenas obras», el contexto no sugiere liderazgo eclesial, sino participación activa y sostenida; «ocuparse de» preserva esa amplitud sin añadir una interpretación más estrecha que el texto no exige.
- source_word: εἰς τὰς ἀναγκαίας χρείας
  english_pob_choice: for necessary needs
  chosen_spanish: para las necesidades urgentes
  alternatives_spanish:
  - para las necesidades necesarias
  - para las necesidades imprescindibles
  - para los apremios necesarios
  lexicon: BDAG
  rationale: La combinación expresa necesidades reales y apremiantes. En español, «necesidades urgentes» evita la tautología de «necesidades necesarias» y refleja bien la fuerza de ἀναγκαίας + χρείας.
- source_word: ἄκαρποι
  english_pob_choice: unfruitful
  chosen_spanish: infructuosos
  alternatives_spanish:
  - sin fruto
  - estériles
  - improductivos
  lexicon: BDAG
  rationale: «Infructuosos» mantiene la metáfora de fruto/fructificación presente en el griego y en el POB inglés, con un registro claro y bíblicamente reconocible.
theological_decisions:
- issue: Alcance comunitario de οἱ ἡμέτεροι
  english_pob_reading: A reference to members of the Christian community associated with Paul/Titus ('our people').
  chosen_spanish_reading: Una referencia a los miembros de la comunidad cristiana vinculada con Pablo/Tito («los nuestros»).
  alternative_spanish_readings:
  - nuestros propios hermanos
  - los de nosotros
  rationale: La frase es relacional y comunitaria, no técnica. «Los nuestros» mantiene esa inclusión sin introducir un masculino restringido ni convertir el texto en una categoría doctrinal ajena al contexto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Sentido de προΐστασθαι con καλῶν ἔργων
  english_pob_reading: Active involvement/engagement in good works, not ecclesial leadership.
  chosen_spanish_reading: Participación activa y sostenida en buenas obras, no presidencia ni gobierno eclesial.
  alternative_spanish_readings:
  - tomar el mando de buenas obras
  - liderar buenas obras
  rationale: El griego puede significar dirigir o atender, pero con καλῶν ἔργων y el paralelo contextual en Tito 3, la lectura adecuada es de implicación práctica. La traducción evita crear una jerarquía inexistente en el pasaje.
  doctrine_reference: BDAG; contexto intratextual en Tito 3:8, 14
translation_notes:
  revision_awareness: The English POB revision moved from 'devote themselves to' to 'engage in' for προΐστασθαι, prioritizing active involvement. The Spanish draft follows that latest revision by using «ocuparse de» rather than a leadership-leaning or overly devotional phrasing, and it preserves the purpose/result structure with «a fin de que no sean infructuosos».
  spanish_consistency_notes:
  - Se mantuvo «buenas obras» para coherencia con el vocabulario de Tito.
  - «Los nuestros» refleja la pertenencia comunitaria sin añadir género o rango.
  - «Infructuosos» conserva la metáfora de fruto y armoniza con el registro bíblico del pasaje.
