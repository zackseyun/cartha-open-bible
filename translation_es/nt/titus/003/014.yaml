- from: Y que también los nuestros aprendan a ocuparse de buenas obras[a][b], para las necesidades urgentes[c], a fin de que no sean infructuosos.
  to: Y que también los nuestros[a] aprendan a dedicarse[b] a buenas obras para atender las necesidades indispensables[c], a fin de que no sean infructuosos.
  rationale: La revisión vuelve a alinear el texto principal con la decisión auditada sobre εἰς τὰς ἀναγκαίας χρείας, corrige una nota mal formulada en [a], y mejora la naturalidad de προΐστασθαι en español sin introducir liderazgo eclesial. Se preservan las alternativas significativas en notas.
