translation:
  language: es
  text: Tenía muchas cosas que escribirte[a], pero no quiero escribirte con tinta y pluma;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con tinta y pluma de caña».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλὰ
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - muchas cosas
  lexicon: BDAG
  rationale: El neutro plural funciona sustantivado y pide en español una expresión plural explícita. «Muchas cosas» conserva mejor la pluralidad y el sentido de contenido abundante que un simple «mucho».
- source_word: εἶχον
  english_pob_choice: I had
  chosen_spanish: tenía
  alternatives_spanish:
  - tenía
  - había tenido
  lexicon: BDAG
  rationale: El imperfecto en español reproduce bien el marco pasado y la idea de algo que estaba pendiente de ser escrito. «Tenía» es natural y mantiene la perspectiva temporal del griego.
- source_word: γράψαι
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - escribir
  - haber escrito
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la acción contemplada. En español, el infinitivo simple «escribir» comunica con claridad la intención sin cargar indebidamente el aspecto.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - te
  - a ti
  lexicon: BDAG
  rationale: El dativo personal se expresa de forma natural en español con el pronombre átono «te». En el texto epistolar resulta más fluido que repetir «a ti».
- source_word: ἀλλ’ οὐ θέλω
  english_pob_choice: but I do not want
  chosen_spanish: pero no quiero
  alternatives_spanish:
  - pero no quiero
  - pero no deseo
  lexicon: BDAG
  rationale: «Θέλω» expresa voluntad/deseo. «No quiero» conserva el tono directo y epistolar del original, sin volverlo más solemne de lo necesario.
- source_word: διὰ μέλανος καὶ καλάμου
  english_pob_choice: with ink and pen
  chosen_spanish: con tinta y pluma
  alternatives_spanish:
  - con tinta y pluma
  - con tinta y caña
  lexicon: BDAG
  rationale: «Διά» con genitivo indica medio o instrumento. «Μέλαν» es tinta y «κάλαμος» es literalmente una caña/reed; en español «pluma» comunica el instrumento de escritura de modo natural. «Con tinta y pluma» preserva la función sin tecnicismo excesivo.
- source_word: γράφειν
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - escribir
  - seguir escribiendo
  lexicon: BDAG
  rationale: El presente infinitivo puede sugerir el acto de escribir en curso. El verbo simple «escribir» es suficiente y evita sobreinterpretar el aspecto.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el paquete fuente griego y concuerda con la solución inglesa auditada: imperfecto pasado («tenía»), infinitivo de intención («escribir»), y medio instrumental con materiales de escritura. No se introdujeron cambios de sentido respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se mantuvo un español natural y eclesialmente legible sin recurrir a calcos rígidos.
  - Se conservó la referencia al instrumento de escritura en una nota, ya que «pluma» traduce funcionalmente κάλαμος pero no es completamente literal.
  - No hay decisiones teológicas especiales en este versículo; el énfasis es puramente epistolar y estilístico.
