translation:
  language: es
  text: El anciano al amado Gayo[a], a quien amo en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de verdad»; alternativamente, «en la verdad». La frase griega puede expresar amor sincero, amor fundado en la verdad del evangelio, o ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ πρεσβύτερος
  english_pob_choice: The elder
  chosen_spanish: El anciano
  alternatives_spanish:
  - El presbítero
  - El anciano
  lexicon: BDAG
  rationale: El sustantivo con artículo funciona aquí como autoidentificación epistolar del remitente. En español, «el anciano» mantiene el valor de oficio/estatus sin imponer de entrada un tecnicismo eclesiástico que el griego no exige de manera inequívoca. «Presbítero» es posible, pero suena más técnico y menos natural en este saludo breve.
- source_word: Γαΐῳ
  english_pob_choice: Gaius
  chosen_spanish: Gayo
  alternatives_spanish:
  - Gaio
  - Gayo
  lexicon: BDAG
  rationale: Los nombres propios se transliteran según el uso castellano establecido. «Gayo» es la forma más natural y reconocible en español bíblico.
- source_word: τῷ ἀγαπητῷ
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado
  - querido
  lexicon: BDAG
  rationale: «ἀγαπητός» expresa afecto hacia el destinatario. «Amado» conserva esa fuerza y deja visible la relación léxica con ἀγαπῶ más adelante. «Querido» es posible, pero suaviza un poco la resonancia afectiva y no refleja tan bien el vínculo verbal del versículo.
- source_word: ὃν
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a quien
  - al cual
  lexicon: Greek grammar
  rationale: El relativo es acusativo singular masculino y funciona como objeto de ἀγαπῶ. En español, «a quien» refleja correctamente esa función sin sonar rebuscado.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo
  lexicon: Greek grammar
  rationale: El pronombre explícito añade énfasis leve en griego. En español puede mantenerse con «yo» para conservar ese matiz, aunque la gramática no lo requiera.
- source_word: ἀγαπῶ
  english_pob_choice: love
  chosen_spanish: amo
  alternatives_spanish:
  - amo
  - quiero
  lexicon: BDAG
  rationale: El verbo significa «amar/love» en sentido fuerte. «Amo» comunica mejor esa intensidad que «quiero», que en español puede sonar más débil o ambiguo.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en la verdad
  - de verdad
  - con sinceridad
  lexicon: BDAG
  rationale: La frase puede indicar sinceridad, ámbito/estándar de la verdad, o ambas cosas. «En la verdad» preserva la formulación griega y la resonancia joánica de ἀλήθεια, sin resolver prematuramente la tensión semántica.
theological_decisions:
- issue: Alcance de ἐν ἀληθείᾳ
  english_pob_reading: Rendered as 'in truth' rather than forcing either 'truly' or 'in the truth.'
  chosen_spanish_reading: Traducido como «en la verdad», dejando abierta la posibilidad de sinceridad y/o conformidad con la verdad del evangelio.
  alternative_spanish_readings:
  - de verdad
  - con sinceridad
  - en la verdad
  rationale: 'El griego admite más de una lectura: amor sincero, amor en la esfera de la verdad revelada, o ambas. Mantener «en la verdad» preserva esa tensión sin explicarla de más en el cuerpo del texto. La nota ofrece las alternativas legítimas.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: No se aplicaron revisiones previas. El borrador mantiene la decisión de no cerrar la ambigüedad de ἐν ἀληθείᾳ y conserva una formulación breve y epistolar para el saludo inicial.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «amado/amado» y «amo» para mantener la conexión léxica entre ἀγαπητός y ἀγαπῶ.
  - «En la verdad» conserva la estructura preposicional del griego y la ambigüedad teológica documentada.
  - «El anciano» evita introducir una terminología más eclesiástica de la que el contexto inmediato exige.
