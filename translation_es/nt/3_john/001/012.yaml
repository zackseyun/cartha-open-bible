    text: Or, 'has been testified to by everyone.' The Greek uses a perfect passive of 'testify/bear witness,' indicating an established commendation.
    reason: lexical_alternative
  - marker: b
    text: '''The truth itself'' may mean that Demetrius''s life is in accord with the truth, or more broadly that the gospel/truth bears witness in his favor.'
    reason: alternative_reading
