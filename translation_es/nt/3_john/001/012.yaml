translation:
  language: es
  text: Demetrio ha recibido testimonio de todos[a], y de la verdad misma. También nosotros damos testimonio[b], y sabes que nuestro testimonio es verdadero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se ha dado testimonio acerca de él por todos». El griego usa un perfecto pasivo de «testificar/dar testimonio», que indica una recomendación ya establecida.'
    reason: lexical_alternative
  - marker: b
    text: «La verdad misma» puede significar que la vida de Demetrio está en conformidad con la verdad, o más ampliamente que la verdad/el evangelio da testimonio a su favor.
    reason: alternative_reading
lexical_decisions:
- source_word: Δημητρίῳ
  english_pob_choice: Demetrius
  chosen_spanish: A Demetrio
  alternatives_spanish:
  - Demetrio
  lexicon: N/A (nombre propio transliterado)
  rationale: El nombre propio se translitera al español como ‘Demetrio’. La preposición ‘a’ introduce con naturalidad el dativo de destinatario/afectado en español.
- source_word: μεμαρτύρηται
  english_pob_choice: has received testimony
  chosen_spanish: se le ha dado testimonio
  alternatives_spanish:
  - ha recibido testimonio
  - ha sido testimoniado
  lexicon: BDAG
  rationale: 'El perfecto pasivo expresa un estado resultante: ya cuenta con un testimonio recibido. ‘Se le ha dado testimonio’ conserva la pasiva sin añadir ‘bueno’ u otro calificativo no explícito en el griego.'
- source_word: ὑπὸ πάντων
  english_pob_choice: from everyone
  chosen_spanish: por todos
  alternatives_spanish:
  - de parte de todos
  - por todos y cada uno
  lexicon: BDAG
  rationale: Con pasiva, ὑπό marca agente. ‘Por todos’ es la forma más natural en español y mantiene el alcance universal.
- source_word: ὑπὸ αὐτῆς τῆς ἀληθείας
  english_pob_choice: from the truth itself
  chosen_spanish: por la misma verdad
  alternatives_spanish:
  - por la verdad misma
  - por la verdad en persona
  lexicon: BDAG
  rationale: ‘La misma verdad’ reproduce la fuerza intensiva de αὐτῆς/αὐτή χωρίς recargar la frase. Se conserva ‘verdad’ sin reducirla a ‘evangelio’ ni explicar interpretivamente su alcance.
- source_word: μαρτυροῦμεν
  english_pob_choice: We also testify
  chosen_spanish: también nosotros damos testimonio
  alternatives_spanish:
  - también nosotros testificamos
  - nosotros también testificamos
  lexicon: BDAG
  rationale: ‘Dar testimonio’ es idiomático en español y mantiene la relación verbal con μαρτυρία/testimonio en el versículo.
- source_word: οἶδας
  english_pob_choice: you know
  chosen_spanish: sabes
  alternatives_spanish:
  - conoces
  - ya sabes
  lexicon: BDAG
  rationale: οἶδας funciona como presente de estado en koiné. ‘Sabes’ es directo y natural en español.
- source_word: ἡ μαρτυρία ἡμῶν
  english_pob_choice: our testimony
  chosen_spanish: nuestro testimonio
  alternatives_spanish:
  - nuestro testimonio dado
  - nuestro testimonio
  lexicon: BDAG
  rationale: Se mantiene la cognación con μαρτυροῦμεν mediante ‘testimonio’. La forma posesiva singular concuerda con el sustantivo español.
- source_word: ἀληθής ἐστιν
  english_pob_choice: is true
  chosen_spanish: es verdadero
  alternatives_spanish:
  - es verdad
  - es cierto
  lexicon: BDAG
  rationale: ‘Verdadero’ preserva la conexión léxica con ἀλήθεια (‘verdad’) al inicio del versículo y suena natural en español.
theological_decisions:
- issue: Sentido de la frase intensiva 'ὑπὸ αὐτῆς τῆς ἀληθείας'
  english_pob_reading: Retain the phrase literally as 'from the truth itself' rather than interpretively narrowing it to 'the gospel' or 'his conduct in accord with the truth.'
  chosen_spanish_reading: Conservar ‘por la misma verdad’ sin estrecharlo a ‘el evangelio’ ni a ‘su conducta’.
  alternative_spanish_readings:
  - por el evangelio mismo
  - por su vida misma en consonancia con la verdad
  rationale: La frase es teológicamente densa y puede aludir a que la vida de Demetrio concuerda con la verdad o a que la verdad misma da testimonio a su favor. El español conserva esa tensión sin resolverla de manera interpretativa.
  doctrine_reference: Preservar la tensión hermenéutica del texto; no ampliar ni reducir el alcance de ἀλήθεια.
translation_notes:
  revision_awareness: La redacción sigue la revisión posterior que eliminó un adjetivo no explícito antes de 'testimonio' en el inglés POB. Por eso el español evita añadir ‘bueno’ y conserva el perfecto pasivo/resultativo mediante ‘se le ha dado testimonio’.
  spanish_consistency_notes:
  - Se mantiene la familia léxica testimonio/dar testimonio para reflejar μαρτυρέω y μαρτυρία.
  - Se evita ‘SEÑOR’ u otros equivalentes no presentes; el verso no contiene el nombre divino.
  - Se conserva ‘verdad’ de forma literal para respetar la ambigüedad teológica y literaria.
  - La puntuación divide naturalmente las dos afirmaciones del verso, como en el griego.
