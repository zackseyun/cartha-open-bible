translation:
  language: es
  text: Pero espero verte pronto[a], y hablaremos cara a cara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «boca a boca». La expresión significa conversación directa y personal, es decir, «cara a cara».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίζω
  english_pob_choice: I hope
  chosen_spanish: espero
  alternatives_spanish:
  - tengo esperanza
  - confío
  lexicon: BDAG
  rationale: En este saludo final epistolar, ἐλπίζω expresa expectativa personal. «Espero» conserva ese valor y suena natural en español sin intensificar indebidamente la certeza.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ introduce una leve transición/contraste con la frase anterior; «Pero» mantiene ese giro de pensamiento con naturalidad en español.
- source_word: εὐθέως
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: Aunque el griego puede significar «inmediatamente», en este contexto de visita comunica cercanía temporal. «Pronto» reproduce bien esa fuerza idiomática.
- source_word: σε ἰδεῖν
  english_pob_choice: to see you
  chosen_spanish: verte
  alternatives_spanish:
  - visitarte
  lexicon: BDAG
  rationale: La construcción infinitiva es literalmente «verte». «Visitarte» explicita la implicación de presencia personal, pero «verte» permanece más cerca del griego y es suficientemente claro.
- source_word: στόμα πρὸς στόμα
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - boca a boca
  lexicon: BDAG
  rationale: El giro griego es literalmente «boca con boca», pero aquí es un modismo para conversación directa personal. «Cara a cara» es el equivalente natural en español y evita una literalidad engañosa.
- source_word: λαλήσομεν
  english_pob_choice: we will speak
  chosen_spanish: hablaremos
  alternatives_spanish:
  - conversaremos
  - platicaremos
  lexicon: BDAG
  rationale: El futuro expresa la conversación esperada. «Hablaremos» conserva el tono sobrio de la carta y corresponde bien a λαλέω en este contexto.
translation_notes:
  revision_awareness: 'Ajusté el anclaje de la nota: la marca [a] aparece ahora en el texto español junto a la expresión que la motiva. La redacción sigue de cerca el griego y el audit trail inglés, sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparezca el nombre divino; aquí no corresponde.
  - Mantuve el tono epistolar breve y directo, equivalente al cierre del versículo.
  - Opté por «cara a cara» como equivalente idiomático estándar de στόμα πρὸς στόμα, con nota literal para preservar la tensión léxica.
