translation:
  language: es
  text: Porque me alegré mucho cuando vinieron hermanos[a] y dieron testimonio de tu verdad[c][b], así como tú andas en la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas», refiriéndose a creyentes compañeros; el griego dice «hermanos».
    reason: lexical_alternative
  - marker: b
    text: O «dieron testimonio acerca de tu fidelidad a la verdad».
    reason: alternative_reading
  - marker: c
    text: O «dieron testimonio de tu verdad».
    reason: textual_variant
lexical_decisions:
- source_word: ἐχάρην
  english_pob_choice: I rejoiced
  chosen_spanish: me alegré
  alternatives_spanish:
  - me regocijé
  - me alegré mucho
  lexicon: BDAG
  rationale: El aoristo de χαίρω expresa un gozo puntual o declarado; en español, «me alegré» comunica bien el hecho del gozo. Se evita un calco rígido y se conserva el tono epistolar natural.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación o fundamento de lo dicho antes. «Porque» es claro y formal en español actual.
- source_word: λίαν
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - excesivamente
  lexicon: BDAG
  rationale: Expresa intensidad de forma natural. Unido a «me alegré», «mucho» suena fluido y suficientemente enfático.
- source_word: ἐρχομένων ἀδελφῶν
  english_pob_choice: when brothers came
  chosen_spanish: cuando vinieron hermanos
  alternatives_spanish:
  - cuando llegaron hermanos
  - al venir hermanos
  - cuando vinieron los hermanos
  lexicon: BDAG
  rationale: La construcción participial se entiende temporalmente. «Vinieron hermanos» respeta el dato gramatical masculino plural y mantiene la referencia fraternal cristiana sin neutralizarla en el texto principal.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes
  lexicon: BDAG
  rationale: El griego usa plural masculino; se conserva «hermanos» como forma fiel y eclesialmente entendible. La posible inclusión de hermanas queda abierta como alternativa contextual.
- source_word: μαρτυρούντων
  english_pob_choice: testified
  chosen_spanish: dieron testimonio
  alternatives_spanish:
  - testificaron
  - atestiguaron
  lexicon: BDAG
  rationale: «Dar testimonio» conserva el lenguaje de μαρτυρέω con naturalidad en español y evita un verbo excesivamente técnico o frío.
- source_word: σου τῇ ἀληθείᾳ
  english_pob_choice: to your truth
  chosen_spanish: de tu verdad
  alternatives_spanish:
  - sobre tu verdad
  - acerca de tu verdad
  - de tu fidelidad a la verdad
  lexicon: BDAG
  rationale: El dativo con μαρτυρέω puede marcar el contenido del testimonio. En español, «dar testimonio de» es la correspondencia más natural y mantiene la tensión interpretativa entre verdad como realidad vivida y verdad como fidelidad.
- source_word: ἀληθείᾳ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - realidad
  lexicon: BDAG
  rationale: En Juan, ἀλήθεια tiene peso teológico y ético. «Verdad» preserva el término sin resolverlo prematuramente en «fidelidad», aunque esa matización permanece posible en la nota.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: Marca la correspondencia entre el testimonio recibido y la conducta de Gayo. «Así como» es idiomático y mantiene el paralelo.
- source_word: περιπατεῖς
  english_pob_choice: you are walking
  chosen_spanish: andas
  alternatives_spanish:
  - caminas
  - vives
  - andas caminando
  lexicon: BDAG
  rationale: «Andas» conserva la metáfora ética de περιπατέω en español y suena natural. El presente refleja una acción habitual o continua.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en verdad
  - en la verdad de Dios
  - en la verdad
  lexicon: BDAG
  rationale: Mantiene la imagen de esfera o ámbito de vida. «En la verdad» preserva la carga joánica y la relación entre conducta y verdad.
theological_decisions:
- issue: El valor de ἀλήθεια en un contexto joánico ético-teológico
  english_pob_reading: Rendered as 'truth' in both occurrences, preserving the Johannine theological-ethical category without reducing it to mere sincerity or doctrine alone.
  chosen_spanish_reading: Se traduce «verdad» en ambos casos, preservando la categoría joánica sin reducirla ni a mera sinceridad ni únicamente a doctrina.
  alternative_spanish_readings:
  - fidelidad
  - la verdad que hay en ti
  - sinceridad
  rationale: El verso vincula el testimonio sobre la vida de Gayo con su caminar constante. Mantener «verdad» en ambos lugares conserva la tensión entre fidelidad doctrinal, integridad práctica y realidad vivida, sin cerrar indebidamente el sentido.
  doctrine_reference: Translation philosophy §3, §5
- issue: Posible inclusión femenina en ἀδελφῶν
  english_pob_reading: brothers, with a footnote allowing 'brothers and sisters' as a lexical alternative
  chosen_spanish_reading: Se mantiene «hermanos» en el texto principal y se abre la alternativa inclusiva en nota.
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: El griego es masculino plural y la POB inglesa preserva esa forma con nota. En español, conservar «hermanos» respeta la señal gramatical del original, mientras la nota evita excluir una referencia posiblemente más amplia.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La edición inglesa más reciente volvió de 'testified about your truth' a 'testified to your truth' para acercarse mejor al dativo griego. En español, la solución principal «dieron testimonio de tu verdad» conserva la relación del testimonio con el contenido y, al mismo tiempo, aprovecha la construcción natural «dar testimonio de».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda, pero no aparece en este versículo.
  - Se usa «verdad» de manera consistente en ambos miembros del paralelismo para preservar el peso joánico del término.
  - Se conserva la metáfora de caminar/andar mediante «andas».
  - Se conserva el plural masculino «hermanos» en el texto principal, con nota inclusiva para la posible amplitud referencial.
