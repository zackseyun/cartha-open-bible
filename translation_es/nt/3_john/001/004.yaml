translation:
  language: es
  text: 'No tengo gozo mayor que este: oír que mis hijos andan en la verdad[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «No tengo un gozo mayor que estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: «Mis hijos» probablemente se refiere a los hijos espirituales de Juan, es decir, creyentes bajo su cuidado pastoral.
    reason: cultural_note
lexical_decisions:
- source_word: μειζοτέραν
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: BDAG
  rationale: El comparativo griego pide un comparativo natural en español. «Mayor» reproduce bien la relación de comparación y funciona de manera idiomática con «gozo».
- source_word: τούτων
  english_pob_choice: than this
  chosen_spanish: que este
  alternatives_spanish:
  - que estas cosas
  - que estos
  lexicon: BDAG
  rationale: El genitivo comparativo se vierte de forma natural en español con «que este», enlazando con la cláusula siguiente como en el sentido del inglés POB «than this».
- source_word: χαράν
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  lexicon: BDAG
  rationale: «Gozo» es un equivalente bíblico natural en español y mantiene el peso afectivo y espiritual de χαρά. «Alegría» también sería posible, pero «gozo» suena más afín al registro eclesial sin ser arcaizante.
- source_word: ἵνα ἀκούω
  english_pob_choice: to hear that
  chosen_spanish: oír que
  alternatives_spanish:
  - para oír que
  - al oír que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido que constituye el gozo, no un propósito estrecho. «Oír que» transmite bien ese valor sin forzar una estructura más pesada.
- source_word: τὰ ἐμὰ τέκνα
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis niños
  - mis hijos espirituales
  lexicon: BDAG
  rationale: τέκνα es literalmente «hijos/niños» en sentido amplio. En español, «mis hijos» conserva la metáfora familiar y deja abierta la referencia espiritual que sugiere el contexto, sin explicitarla en el texto principal.
- source_word: ἐν τῇ ἀληθείᾳ
  english_pob_choice: in the truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en verdad
  - según la verdad
  lexicon: BDAG
  rationale: La expresión se conserva casi de manera directa porque en el contexto joánico «la verdad» puede abarcar vida recta y adhesión a la revelación. «En la verdad» mantiene esa amplitud.
- source_word: περιπατοῦντα
  english_pob_choice: are walking
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - viven
  lexicon: BDAG
  rationale: El verbo griego expresa el modo de vida. En español, «andan» preserva la metáfora de caminar con naturalidad y suena más bíblico que «viven» sin convertirse en calco duro.
theological_decisions:
- issue: Sentido de τέκνα en el contexto de 3 Juan
  english_pob_reading: Retain the literal expression 'my children' without specifying biological or spiritual in the main text.
  chosen_spanish_reading: Mantener una expresión familiar literal —«mis hijos»— sin aclarar en el texto principal si son biológicos o espirituales.
  alternative_spanish_readings:
  - mis hijos espirituales
  - mis convertidos
  rationale: 'El contexto sugiere relación pastoral/espiritual, pero el sustantivo griego es familiar. La traducción conserva esa tensión: el lector puede inferir el matiz espiritual sin que el traductor lo imponga en el cuerpo del verso.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de ἐν τῇ ἀληθείᾳ
  english_pob_reading: Render as 'in the truth' rather than resolving to merely ethical sincerity or doctrinal correctness.
  chosen_spanish_reading: Traducir «en la verdad» sin restringirlo a sinceridad ética o a corrección doctrinal בלבד.
  alternative_spanish_readings:
  - en verdad
  - según la verdad
  - en la doctrina verdadera
  rationale: En Juan, «verdad» suele unir conducta y revelación. La formulación española preserva esa amplitud teológica en vez de reducirla a una sola dimensión.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: The English audit trail shows no applied revisions and a high-agreement review, so the Spanish draft follows the established source decisions closely while adapting them to natural Spanish.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo semántico del inglés POB: comparativo + gozo + cláusula de contenido.'
  - Se prefirió «en la verdad» para conservar la amplitud joánica de ἀλήθεια.
  - Se evitó introducir «Cristo», «SEÑOR» o explicaciones doctrinales no presentes en el versículo.
  - La metáfora de andar/caminar se conservó con «andan», que es natural y reconocible en español bíblico.
