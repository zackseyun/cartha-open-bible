translation:
  language: es
  text: Ellos dieron testimonio ante la iglesia acerca de tu amor, y harás bien en ayudarlos[a] a continuar su viaje de una manera digna de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviarlos en su camino»; el verbo griego puede implicar enviar a los viajeros adelante con apoyo práctico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρησάν
  english_pob_choice: testified
  chosen_spanish: testificaron
  alternatives_spanish:
  - dieron testimonio
  - atestiguaron
  lexicon: BDAG
  rationale: El aoristo indica una acción completa; «testificaron» preserva el sentido de dar testimonio y suena natural en español contemporáneo.
- source_word: σου τῇ ἀγάπῃ
  english_pob_choice: about your love
  chosen_spanish: acerca de tu amor
  alternatives_spanish:
  - sobre tu amor
  - de tu amor
  lexicon: BDAG
  rationale: La construcción con el dativo admite la referencia u objeto del testimonio. «Acerca de» comunica bien que el contenido del testimonio fue el amor de Gayo, y «amor» mantiene la carga usual de ἀγάπη.
- source_word: ἐνώπιον ἐκκλησίας
  english_pob_choice: before the church
  chosen_spanish: delante de la iglesia
  alternatives_spanish:
  - en presencia de la iglesia
  - ante la iglesia
  lexicon: BDAG
  rationale: ἐνώπιον expresa estar en presencia de otros. «Delante de la iglesia» es una solución clara y natural; «iglesia» corresponde al grupo cristiano reunido en este contexto.
- source_word: οὓς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a quienes
  - ellos
  lexicon: BDAG
  rationale: El relativo remite a los hermanos viajeros. En español, la reestructuración exige un objeto directo átono o explícito; aquí «los» mantiene la referencia sin forzar el orden.
- source_word: καλῶς ποιήσεις
  english_pob_choice: you will do well
  chosen_spanish: harás bien
  alternatives_spanish:
  - harás lo correcto
  - te irá bien
  lexicon: BDAG
  rationale: La expresión es idiomática de exhortación/comendación. «Harás bien» conserva tanto el matiz exhortativo como la forma futura del griego.
- source_word: προπέμψας
  english_pob_choice: to send them on their way
  chosen_spanish: encaminarlos
  alternatives_spanish:
  - despedirlos en su camino
  - acompañarlos en su viaje
  lexicon: BDAG
  rationale: προπέμπω puede implicar enviar adelante a viajeros con apoyo práctico. «Encaminarlos» es breve y natural en español; el matiz de ayuda queda disponible en la nota.
- source_word: ἀξίως τοῦ θεοῦ
  english_pob_choice: in a manner worthy of God
  chosen_spanish: de manera digna de Dios
  alternatives_spanish:
  - de un modo digno de Dios
  - como corresponde a Dios
  lexicon: BDAG
  rationale: ἀξίως expresa modo. «De manera digna de Dios» conserva la medida ética y teológica del texto sin caer en un calco rígido.
theological_decisions:
- issue: Alcance de προπέμπω en hospitalidad cristiana
  english_pob_reading: Rendered as 'send them on their way' in the main text, with the practical-support nuance preserved in a footnote.
  chosen_spanish_reading: «Encaminarlos» en el texto principal, con una nota que preserve la posibilidad de apoyo práctico en el viaje.
  alternative_spanish_readings:
  - acompañarlos en su viaje
  - despedirlos con ayuda
  rationale: El verbo puede ir más allá de una mera despedida y sugerir provisión para el trayecto. El texto principal mantiene fluidez y la nota resguarda la amplitud semántica.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al unir las dos cláusulas en una sola oración y reflejar el aoristo como pasado simple. Se mantuvo la estructura coordinada con «y» y se preservó la exhortación futura con valor imperatival de καλῶς ποιήσεις.
  spanish_consistency_notes:
  - Se usa «iglesia» para ἐκκλησία en el sentido de comunidad cristiana reunida.
  - Se usa «Dios» para θεοῦ según el uso estándar del proyecto.
  - 'Se evita traducir mecánicamente desde el inglés: «encaminarlos» busca reflejar προπέμπω desde el griego con un verbo natural en español.'
  - La nota al pie marca la alternativa de apoyo práctico sin imponerla en el texto principal.
