translation:
  language: es
  text: Amado[a], no imites lo malo, sino lo bueno. El que hace el bien es de Dios; el que hace el mal no ha visto a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que hace el bien ... el que hace el mal»; los participios griegos pueden enfatizar una práctica continua o una conducta característica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητέ
  english_pob_choice: Beloved
  chosen_spanish: Amado
  alternatives_spanish:
  - Querido
  - Amado amigo
  - Amado hermano
  lexicon: BDAG
  rationale: Vocativo afectuoso de ἀγαπητός. «Amado» conserva el tono íntimo y johánico del inglés POB «Beloved» sin volverlo excesivamente libre.
- source_word: μὴ μιμοῦ
  english_pob_choice: do not imitate
  chosen_spanish: no imites
  alternatives_spanish:
  - no sigas
  - no copies
  - no te imites
  lexicon: BDAG
  rationale: μιμέομαι pide una prohibición directa; «imitar» mantiene la correspondencia léxica y el matiz de conducta ejemplar o modelo moral.
- source_word: τὸ κακὸν
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo maligno
  - lo que es malo
  lexicon: BDAG
  rationale: El neutro articular funciona sustantivamente. «Lo malo» expresa de manera natural el contraste ético general sin convertirlo en un acto único.
- source_word: τὸ ἀγαθόν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  lexicon: BDAG
  rationale: Mantiene el paralelismo con τὸ κακόν y el valor moral genérico del neutro articular.
- source_word: ὁ ἀγαθοποιῶν
  english_pob_choice: The one who does good
  chosen_spanish: El que hace el bien
  alternatives_spanish:
  - El que hace lo bueno
  - Quien hace el bien
  - El que practica el bien
  lexicon: BDAG
  rationale: El participio presente sustantivado señala una acción caracterizada o habitual. «Hace el bien» es idiomático en español y conserva el sentido verbal continuo sin añadir interpretación doctrinal.
- source_word: ἐκ τοῦ θεοῦ ἐστιν
  english_pob_choice: is from God
  chosen_spanish: es de Dios
  alternatives_spanish:
  - proviene de Dios
  - es de parte de Dios
  - es de Dios y le pertenece
  lexicon: BDAG
  rationale: «ἐκ» expresa origen o procedencia; en español bíblico «es de Dios» transmite esa relación de procedencia/pertenencia de forma breve y fiel.
- source_word: ὁ κακοποιῶν
  english_pob_choice: the one who does evil
  chosen_spanish: el que hace el mal
  alternatives_spanish:
  - quien hace el mal
  - el que practica el mal
  - el que obra mal
  lexicon: BDAG
  rationale: Paralelo directo con ὁ ἀγαθοποιῶν. «Hace el mal» preserva el contraste y la idea de conducta característica.
- source_word: οὐχ ἑώρακεν τὸν θεόν
  english_pob_choice: has not seen God
  chosen_spanish: no ha visto a Dios
  alternatives_spanish:
  - no ha visto a Dios jamás
  - no conoce a Dios
  - no ha contemplado a Dios
  lexicon: BDAG
  rationale: El perfecto de ὁράω se conserva con el perfecto español «ha visto». No se interpreta como «conoce», para no suavizar ni expandir la afirmación johánica.
theological_decisions:
- issue: Valor diagnóstico de la conducta moral en relación con Dios
  english_pob_reading: The verse states that doing good shows one is 'from God,' while doing evil shows one 'has not seen God,' without flattening these into a denominational doctrine of regeneration or perfectionism.
  chosen_spanish_reading: El versículo afirma que hacer el bien muestra que uno es «de Dios», mientras que hacer el mal muestra que uno «no ha visto a Dios», sin convertirlo en una doctrina sistemática ajena al texto.
  alternative_spanish_readings:
  - El que hace el bien necesariamente ya ha sido regenerado
  - El que hace el mal prueba una ausencia total de relación previa con Dios en sentido dogmático
  rationale: El griego presenta una afirmación moral-espiritual dentro del idioma joánico. La redacción española conserva las categorías del texto («de Dios», «no ha visto a Dios») y su tensión, sin resolverla con formulaciones doctrinales posteriores.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreinterpretación sistemática.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el audit trail inglés; la versión española sigue de cerca las decisiones léxicas confirmadas y mantiene el contraste moral y la formulación joánica sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para θεός.
  - Se conserva el perfecto español «no ha visto» para reflejar οὐχ ἑώρακεν.
  - Se mantiene «de Dios» para ἐκ τοῦ θεοῦ, preservando procedencia/pertenencia.
  - La nota [a] queda anclada en «El que» para reflejar la alternativa participial sin duplicar el contenido en el texto principal.
