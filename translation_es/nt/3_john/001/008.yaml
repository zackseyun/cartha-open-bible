  glossary_alignment: No hay conflictos con la terminología base del proyecto. La principal cuestión es mantener la decisión teológica/lexical documentada para τῇ ἀληθείᾳ como cooperación en favor de la verdad, no simplemente una relación genitiva con «la verdad».
