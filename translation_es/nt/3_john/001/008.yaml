translation:
  language: es
  text: Por tanto, nosotros debemos recibir[a] a tales personas, para que lleguemos a ser colaboradores para la verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo traducido «recibir» también puede implicar acoger y brindar apoyo material a estos trabajadores itinerantes.
    reason: lexical_alternative
  - marker: b
    text: O «con la verdad» o «en la verdad». El dativo griego puede entenderse de más de una manera; el texto principal toma la idea de apoyo a la causa de la verdad.
    reason: alternative_reading
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros también
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para mantener el énfasis del griego y la claridad sintáctica en español.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la inferencia con un conector natural y formal en español, equivalente a la relación lógica del griego.
- source_word: ὀφείλομεν
  english_pob_choice: ought to
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - tenemos que
  lexicon: BDAG
  rationale: Expresa obligación moral con fuerza adecuada sin sonar excesivamente coercitivo; en español 'debemos' comunica bien la carga ética.
- source_word: ὑπολαμβάνειν
  english_pob_choice: receive
  chosen_spanish: recibir
  alternatives_spanish:
  - acoger
  - sostener
  - dar apoyo a
  lexicon: BDAG
  rationale: '''Recibir'' conserva amplitud semántica y puede abarcar la acogida hospitalaria y el apoyo material; la ambigüedad útil del verbo se mantiene en nota.'
- source_word: τοὺς τοιούτους
  english_pob_choice: such people
  chosen_spanish: a personas como estas
  alternatives_spanish:
  - a tales personas
  - a gente como esta
  lexicon: BDAG
  rationale: En español, esta construcción suena natural y mantiene la referencia a los trabajadores descritos en el contexto inmediato sin volverla innecesariamente masculina.
- source_word: συνεργοὶ
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - cooperadores
  - compañeros de trabajo
  lexicon: BDAG
  rationale: '''Colaboradores'' reproduce bien la idea de cooperación ministerial y resulta natural en español contemporáneo.'
- source_word: γινώμεθα
  english_pob_choice: we may become
  chosen_spanish: lleguemos a ser
  alternatives_spanish:
  - seamos
  - podamos llegar a ser
  lexicon: BDAG
  rationale: '''Lleguemos a ser'' conserva la idea de llegar a una condición resultante, no meramente de ser ya algo de forma estática.'
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: for the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - para la verdad
  - con la verdad
  - en la verdad
  lexicon: BDAG
  rationale: Se eligió una formulación española que permite leer la relación como referencia/cauce de cooperación; el griego dativo admite más de una comprensión y conviene documentar la alternativa principal del audit trail.
theological_decisions:
- issue: Relación de συνεργοὶ con τῇ ἀληθείᾳ
  english_pob_reading: '''for the truth'' meaning participation in and support of the gospel mission'
  chosen_spanish_reading: '''de la verdad'' entendido como colaboración en favor de la verdad, es decir, en la misión del evangelio'
  alternative_spanish_readings:
  - '''para la verdad'''
  - '''con la verdad'''
  - '''en la verdad'''
  rationale: El contexto trata de sostener a obreros itinerantes enviados por causa del Nombre. El español 'de la verdad' es breve y natural, pero la nota conserva que el dativo griego admite otras lecturas y que la intención principal es la participación en la obra de la verdad.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica documentada; no cerrar indebidamente una ambigüedad que el griego permite.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la revisión más reciente y no registra cambios sustanciales; la presente propuesta conserva la decisión principal del inglés POB sobre la obligación, la recepción/hospitalidad y la finalidad de cooperación con la verdad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Colaboradores'' se usa para preservar el sentido ministerial de συνεργοὶ sin introducir una terminología eclesiástica más pesada.'
  - La preposición 'de' en 'de la verdad' se usa como solución española breve y flexible; la nota explicita las opciones del dativo griego.
