base_translation:
  language: en
  yaml_path: translation/nt/3_john/001/008.yaml
  text: Therefore[a], we ought to receive such people[b], so that we may become fellow workers for the truth.
  footnotes:
  - marker: a
    text: Or 'with the truth' or 'in the truth.' The Greek dative can be understood in more than one way; the main text takes the sense as support for the cause of the truth.
    reason: alternative_reading
  - marker: b
    text: The verb translated 'receive' can also carry the sense of welcoming and materially supporting such traveling workers.
    reason: lexical_alternative
