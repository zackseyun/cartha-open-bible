translation:
  language: es
  text: Pues por causa del Nombre[a] salieron, sin tomar nada de los gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los paganos» o «de los incrédulos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por
  - en favor de
  - a causa de
  lexicon: BDAG
  rationale: En esta construcción con genitivo, ὑπέρ expresa motivo o finalidad. «Por causa de» comunica bien el sentido causal/propósito en español sin volverlo mecánico.
- source_word: τοῦ ὀνόματος
  english_pob_choice: the Name
  chosen_spanish: el Nombre
  alternatives_spanish:
  - su nombre
  - el nombre de Cristo
  - el Nombre
  lexicon: BDAG
  rationale: 'La mayúscula conserva el uso reverencial del griego y del audit trail inglés: una referencia implícita y solemne, sin añadir un referente explícito que el texto no nombra.'
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - fueron
  - salieron fuera
  lexicon: BDAG
  rationale: El aoristo describe su partida; «salieron» es natural en español y evita un arcaísmo innecesario.
- source_word: μηδὲν λαμβάνοντες
  english_pob_choice: taking nothing
  chosen_spanish: sin tomar nada
  alternatives_spanish:
  - no aceptando nada
  - sin recibir nada
  - no tomando nada
  lexicon: BDAG
  rationale: El participio expresa la manera de su salida. «Sin tomar nada» reproduce el valor del verbo de manera clara y concisa, manteniendo la idea de no aceptar apoyo material.
- source_word: ἀπὸ τῶν ἐθνικῶν
  english_pob_choice: from the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de los paganos
  - de los incrédulos
  - de las naciones
  lexicon: BDAG
  rationale: «Gentiles» preserva mejor el valor lexical e histórico del término. «Paganos» y «incrédulos» interpretan más de lo que el griego dice, y «de las naciones» es menos natural en español.
theological_decisions:
- issue: Referencia de «el Nombre»
  english_pob_reading: A reverential reference to Jesus/the Lord, left implicit in the main text as 'the Name.'
  chosen_spanish_reading: Una referencia reverencial e implícita a Jesús/el Señor, mantenida como «el Nombre».
  alternative_spanish_readings:
  - «el nombre de Cristo»
  - «su nombre»
  rationale: Conservar la expresión reverencial evita especificar más de lo que dice el versículo y mantiene la resonancia teológica del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de ἐθνικῶν
  english_pob_reading: '''Gentiles'' in the main text.'
  chosen_spanish_reading: «Gentiles» en el texto principal.
  alternative_spanish_readings:
  - «paganos»
  - «incrédulos»
  rationale: El término puede tener matiz religioso, pero «gentiles» preserva mejor la forma léxica y el marco histórico judeocristiano. Las otras opciones se conservan como posibilidades interpretativas.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto griego y el auditoría inglesa coinciden en una lectura estable; no se requieren revisiones adicionales. La decisión principal fue conservar la fórmula reverencial «el Nombre» y traducir ἐθνικῶν como «gentiles» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y eclesial, sin recurrir a calcos pesados.
  - «Nombre» va con mayúscula para reflejar la fórmula reverencial del original y del inglés auditado.
  - «Gentiles» se conserva como término histórico-lexical, con nota alternativa para lectores que prefieran un matiz más interpretativo.
