    issue: La nota [b] está colocada sobre «Los amigos te saludan» pero explica «κατ’ ὄνομα / by name».
    rationale: La evidencia inglesa y griega muestran que la alternativa «individualmente / uno por uno» modifica la tercera cláusula («Saluda a los amigos...»), no el verbo ἀσπάζονταί de la segunda cláusula. Tal como está, la nota induce a error exegético y editorial.
  - severity: low
    issue: «Por nombre» es comprensible pero menos idiomático que «por su nombre» en español actual.
    rationale: Aunque formalmente cercano al griego, «por su nombre» comunica mejor el matiz personal de κατ’ ὄνομα sin añadir una paráfrasis excesiva. Mejora la naturalidad manteniendo la fidelidad.
  - severity: low
    issue: El texto de la nota [b] en español está formulado de manera imprecisa.
    rationale: Dice «Saludan a los amigos individualmente», lo cual no corresponde al sujeto ni a la estructura del versículo. Debe reformularse como alternativa a «Saluda a los amigos por su nombre».
