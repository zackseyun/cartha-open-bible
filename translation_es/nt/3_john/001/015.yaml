review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en las tres cláusulas principales: «Paz a ti», «los amigos te saludan» y «saluda a los amigos». Preserva correctamente φίλοι como «amigos» y no introduce términos eclesiales ajenos. Sin embargo, hay dos problemas: (1) la nota [b] está anclada en la cláusula equivocada, porque la alternativa «individualmente / uno por uno» corresponde a κατ’ ὄνομα en la tercera cláusula, no a «te saludan»; y (2) «por nombre» suena menos natural en español bíblico actual que «por su nombre» o «por nombre» con mejor explicación. Conviene ajustar la redacción para claridad idiomática.'
  spanish_quality_summary: El español es claro y digno, pero requiere una corrección menor. «Paz a ti» funciona, y «Los amigos te saludan» es natural. La principal mejora de legibilidad está en «Saluda a los amigos por su nombre», que expresa de forma más idiomática el sentido personal de κατ’ ὄνομα. También debe corregirse la nota al pie mal ubicada y su contenido para que describa correctamente la frase final.
  glossary_alignment: 'El borrador se alinea con la terminología del proyecto: no hay términos teológicos disputados aquí. Se conserva φίλοι como «amigos» en ambas ocurrencias, en línea con la decisión léxica inglesa y con buena consistencia. No hay conflictos con los glosarios de Yahvé, Mesías, Espíritu, etc.'
  issues:
