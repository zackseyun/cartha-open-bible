translation:
  language: es
  text: Paz a ti[a]. Los amigos te saludan. Saluda a los amigos por su nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Paz sea contigo». El griego es literalmente «Paz a ti», una breve bendición epistolar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Saluda a los amigos individualmente» o «uno por uno». El griego dice «por nombre», subrayando un saludo personal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz sea contigo
  - La paz sea contigo
  lexicon: BDAG
  rationale: El nominativo funciona como saludo/benedición epistolar. En español, «Paz» es la forma más directa y natural; «Paz sea contigo» explicita el sentido verbal implícito, pero añade palabras no presentes en el griego.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - contigo
  lexicon: BDAG
  rationale: El dativo marca al destinatario de la bendición. «A ti» conserva la concisión epistolar y refleja mejor la relación sintáctica con el griego que una formulación más libre como «contigo».
- source_word: ἀσπάζονταί
  english_pob_choice: greet
  chosen_spanish: saludan
  alternatives_spanish:
  - te envían saludos
  - te saludan
  lexicon: BDAG
  rationale: En español, el verbo epistolar más natural para ἀσπάζομαι es «saludar/saludan» en este contexto. «Te envían saludos» es posible, pero más expansivo; «saludan» mantiene la concisión del original.
- source_word: οἱ φίλοι
  english_pob_choice: the friends
  chosen_spanish: los amigos
  alternatives_spanish:
  - los amigos nuestros
  - los hermanos
  lexicon: BDAG
  rationale: El griego dice literalmente «los amigos». «Los amigos» preserva el léxico distintivo del texto; «los hermanos» introduciría un término eclesial no presente en esta frase.
- source_word: ἀσπάζου
  english_pob_choice: Greet
  chosen_spanish: Saluda
  alternatives_spanish:
  - Da saludos a
  - Envía saludos a
  lexicon: BDAG
  rationale: El imperativo singular se expresa de manera directa con «Saluda». Es el equivalente más natural y conserva el paralelismo con la frase anterior.
- source_word: τοὺς φίλους
  english_pob_choice: the friends
  chosen_spanish: a los amigos
  alternatives_spanish:
  - a los hermanos
  - a nuestros amigos
  lexicon: BDAG
  rationale: Se mantiene la misma palabra de base que en la cláusula anterior para respetar la repetición del griego. El objeto directo personal se expresa naturalmente con la preposición «a» en español.
- source_word: κατ’ ὄνομα
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - individualmente
  - uno por uno
  lexicon: BDAG
  rationale: La expresión griega es idiomática y significa saludar a cada uno personalmente. «Por nombre» reproduce con bastante cercanía la forma del texto; «individualmente» o «uno por uno» explicitan la implicación interpretativa.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en sentido y estructura: saludo de paz, saludos de los amigos y mandato final de saludar a los amigos por nombre. No se aplicaron revisiones textuales; se conservaron las dos ambigüedades relevantes del griego en notas de alternativa.'
  spanish_consistency_notes:
  - Se mantuvo «amigos» de forma consistente en las dos apariciones de φίλοι para reflejar la repetición del original.
  - Se evitó sustituir «Paz» por una fórmula litúrgica más larga, porque el griego es breve y epistolar.
  - «Saluda» y «saludan» mantienen el paralelismo verbal entre el saludo recibido y el saludo ordenado.
