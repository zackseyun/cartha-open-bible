translation:
  language: es
  text: Amado[a], ruego que en todo[d] prosperes y goces de salud[b], así como prospera tu alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Querido». El griego expresa un trato afectuoso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estés bien de salud» o «estés sano».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu alma va bien» o «tu ser interior prospera».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en todos los aspectos». El griego expresa más naturalmente alcance que prioridad, no «sobre todo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀγαπητέ
  english_pob_choice: Beloved
  chosen_spanish: Amado
  alternatives_spanish:
  - Querido
  - Amado amigo
  - Amado hermano
  lexicon: BDAG
  rationale: El vocativo expresa una apelación afectuosa. «Amado» conserva la relación con el campo de ἀγαπάω/ἀγάπη y es transparente en español eclesial, sin desplazar el matiz a una amistad no explicitada por el griego.
- source_word: περὶ πάντων
  english_pob_choice: in all respects
  chosen_spanish: en todo
  alternatives_spanish:
  - en todos los aspectos
  - en todo sentido
  - con respecto a todo
  lexicon: BDAG
  rationale: La frase griega señala ámbito o extensión, no prioridad. «En todo» comunica naturalmente el alcance de la oración y evita el malentendido de «sobre todo» o «por encima de todo».
- source_word: εὔχομαί
  english_pob_choice: I pray
  chosen_spanish: ruego
  alternatives_spanish:
  - oro
  - pido
  - imploro
  lexicon: BDAG
  rationale: En contexto epistolar, εὔχομαι expresa una petición con tono de oración/deseo. «Ruego» mantiene el acto peticional y su dignidad; «oro» sería posible, pero «ruego» suena más natural y no pierde el matiz devocional.
- source_word: σε εὐοδοῦσθαι
  english_pob_choice: that you may prosper
  chosen_spanish: tengas prosperidad
  alternatives_spanish:
  - prosperes
  - te vaya bien
  - tengas éxito
  lexicon: BDAG
  rationale: εὐοδόομαι alude a que a alguien le vaya bien, tenga buen resultado o prospere. «Tengas prosperidad» conserva el sentido positivo de bienestar/successo sin reducirlo solo a riqueza material; además evita que «prosperes» suene demasiado económico en español.
- source_word: καὶ ὑγιαίνειν
  english_pob_choice: be healthy
  chosen_spanish: salud
  alternatives_spanish:
  - goces de salud
  - estés bien de salud
  - estés sano
  lexicon: BDAG
  rationale: El verbo apunta a salud física. En español, «salud» dentro de la coordinación con prosperidad es claro y natural; semánticamente equivale a «gozar de salud» y preserva el paralelismo del texto.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  - justamente como
  lexicon: BDAG
  rationale: Introduce comparación. «Así como» es la opción más idiomática y clara en español para marcar el paralelismo entre el bienestar externo y el bienestar del alma.
- source_word: εὐοδοῦταί σου ἡ ψυχή
  english_pob_choice: your soul prospers
  chosen_spanish: prospera tu alma
  alternatives_spanish:
  - tu alma va bien
  - tu alma prospera
  - tu ser interior prospera
  lexicon: BDAG
  rationale: Se conserva la repetición de εὐοδόομαι para mantener el eco léxico del griego. «Alma» traduce ψυχή de modo directo y preserva la tensión interpretativa entre vida interior, persona y dimensión espiritual.
theological_decisions:
- issue: Alcance de περὶ πάντων
  english_pob_reading: in all respects / concerning all things, not 'above all'
  chosen_spanish_reading: en todo, no 'sobre todo'
  alternative_spanish_readings:
  - sobre todo
  - por encima de todo
  - en todos los aspectos
  rationale: La sintaxis griega favorece alcance y no prioridad. En español, «en todo» evita convertir la frase en una afirmación de supremacía temática y conserva la intención de bienestar integral.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Sentido de ψυχή
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser interior
  - persona interior
  rationale: «Alma» mantiene la correspondencia con la traducción inglesa y la tensión del texto entre bienestar físico y bienestar interior. Aunque ψυχή puede abarcar otras nociones, el contraste retórico aquí favorece una referencia al ámbito interior sin definir antropología técnica.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés que ajustó la sintaxis de περὶ πάντων para expresar ámbito («in all respects») y no una construcción frontal awkward. La redacción española sigue esa lectura de alcance con «en todo», manteniendo además el paralelismo del verbo εὐοδοῦομαι en ambas cláusulas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; en este versículo no aparece.
  - Se mantuvo «alma» para ψυχή con una nota alternativa, porque el contexto contrasta bienestar externo e interior.
  - Se preservó la repetición léxica de prosperar/prosperidad para reflejar el eco del griego.
  - Se evitó «sobre todo» porque en español sugiere prioridad, no alcance.
  - El orden de los elementos sigue la claridad natural del español sin perder el paralelismo del original.
