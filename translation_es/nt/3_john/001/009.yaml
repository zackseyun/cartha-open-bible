translation:
  language: es
  text: Escribí algo a la iglesia[a], pero Diótrefes, que ama ser el primero entre ellos, no nos recibe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escribí una breve nota a la iglesia». El texto griego tiene una expresión indefinida («escribí algo»), y algunos manuscritos amplían la redacción.'
    reason: textual_variant
  - marker: b
    text: 'O: «no nos da la bienvenida» o «no nos reconoce».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔγραψά
  english_pob_choice: I wrote
  chosen_spanish: Yo escribí
  alternatives_spanish:
  - He escrito
  lexicon: BDAG
  rationale: El aoristo indicativo se rinde naturalmente con pretérito perfecto simple en español. Añadir «yo» es opcional, pero aquí ayuda a reflejar la fuerza personal del verbo sin sobrecargar el estilo.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - una breve nota
  - algo breve
  lexicon: BDAG
  rationale: El indefinido neutro se expresa con «algo», que conserva la indefinición del griego. Se evita suplir un objeto más específico que el texto no explicita.
- source_word: τῇ ἐκκλησίᾳ
  english_pob_choice: to the church
  chosen_spanish: a la iglesia
  alternatives_spanish:
  - a la congregación
  lexicon: BDAG
  rationale: ἐκκλησία se traduce de modo natural por «iglesia» en español bíblico actual. «Congregación» también es posible, pero «iglesia» es la forma más reconocible y no pierde el referente comunitario local.
- source_word: ὁ φιλοπρωτεύων
  english_pob_choice: who loves to be first
  chosen_spanish: que ama ser el primero
  alternatives_spanish:
  - que quiere ser el primero
  - que ama la preeminencia
  lexicon: BDAG
  rationale: El participio expresa inclinación a ocupar el primer lugar. «Ama ser el primero» reproduce la fuerza moral de manera clara y evita un calco menos natural.
- source_word: αὐτῶν
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - sobre ellos
  - de ellos
  lexicon: BDAG
  rationale: El genitivo con φιλοπρωτεύων señala el grupo en cuyo ámbito busca primer lugar. «Entre ellos» conserva esa relación sin convertirla en una afirmación explícita de autoridad formal.
- source_word: οὐκ ἐπιδέχεται ἡμᾶς
  english_pob_choice: does not receive us
  chosen_spanish: no nos recibe
  alternatives_spanish:
  - no nos acoge
  - no nos acepta
  lexicon: BDAG
  rationale: «Recibe» conserva la amplitud de ἐπιδέχομαι, que puede abarcar acogida, aceptación o reconocimiento. Se evita estrechar el sentido a una sola dimensión, preservando la tensión del pasaje.
theological_decisions:
- issue: Alcance de οὐκ ἐπιδέχεται ἡμᾶς
  english_pob_reading: The translation leaves ἐπιδέχεται broad as 'receive us' rather than specifying only hospitality or only recognition of authority.
  chosen_spanish_reading: La traducción mantiene amplio «no nos recibe», sin especificar solo hospitalidad o solo reconocimiento de autoridad.
  alternative_spanish_readings:
  - no nos acoge
  - no reconoce nuestra autoridad
  rationale: El griego permite varias implicaciones y el audit trail inglés deliberadamente no las reduce. En español, «no nos recibe» conserva esa amplitud y evita imponer una lectura eclesiológica más estrecha que la del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios adicionales respecto del texto fuente y del criterio óptimo equivalente ya auditado.'
  spanish_consistency_notes:
  - Se mantiene «iglesia» para ἐκκλησία, coherente con el registro bíblico moderno y con la práctica del POB en inglés.
  - Se conserva «no nos recibe» para ἐπιδέχεται, evitando resolver el matiz entre acogida personal y reconocimiento de autoridad.
  - 'Los nombres propios se transliteran de manera estándar: Diótrefes, Jesús, etc.; aquí solo aparece Diótrefes.'
  - 'La puntuación y el orden son naturales en español, pero siguen de cerca la relación contrastiva del griego: acción del autor / oposición de Diótrefes.'
