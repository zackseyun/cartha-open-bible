  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca el audit trail inglés: «escribí algo», «a la iglesia», el contraste con «pero», la caracterización de Diótrefes y la amplitud de «no nos recibe». Sin embargo, la nota b está anclada en la frase equivocada: las alternativas «no nos da la bienvenida / no nos reconoce» corresponden a οὐκ ἐπιδέχεται ἡμᾶς, no a «entre ellos».'
  spanish_quality_summary: El español es claro y natural, pero «Yo escribí» suena un poco marcado sin necesidad contextual; «Escribí» es más idiomático y suficientemente fiel. El resto del verso es legible y digno. Las notas son comprensibles, aunque la nota a puede limpiarse levemente quitando comillas sobrantes.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «iglesia», «recibe» y el nombre «Diótrefes» están bien. La decisión de mantener «recibe» preserva adecuadamente la amplitud semántica de ἐπιδέχεται.
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre «entre ellos» en lugar de sobre «no nos recibe».
    rationale: Las alternativas documentadas en el audit trail inglés («does not welcome us / does not acknowledge us») explican οὐκ ἐπιδέχεται ἡμᾶς, no αὐτῶν. Tal como está, el anclaje induce a error exegético.
  - severity: low
    issue: «Yo escribí» está innecesariamente enfatizado.
    rationale: El griego no exige pronombre explícito; en español bíblico natural «Escribí algo…» fluye mejor sin pérdida de sentido.
  - severity: low
    issue: La redacción de la nota [a] puede pulirse.
    rationale: Las comillas exteriores y el formato actual son algo torpes; una formulación más limpia mejora la legibilidad sin cambiar el contenido.
  revised_spanish_text: Escribí algo a la iglesia[a], pero Diótrefes, que ama ser el primero entre ellos, no nos recibe[b].
