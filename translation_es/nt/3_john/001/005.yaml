translation:
  language: es
  text: Amado[a], actúas fielmente en todo lo que haces por los hermanos[b], y especialmente cuando son desconocidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amado, haces una cosa fiel en todo lo que haces por los hermanos, y esto siendo desconocidos». La expresión griega puede formularse más literalmente, pero en español se ha preferido una redacción más natural.'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφοὺς. En contexto se refiere a compañeros creyentes, aunque el grupo puede incluir mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητέ
  english_pob_choice: Beloved
  chosen_spanish: Amado
  alternatives_spanish:
  - Querido
  - Amado(a)
  - Amado amigo
  lexicon: BDAG
  rationale: El vocativo expresa afecto epistolar. «Amado» conserva ese tono con mayor cercanía al griego y a la tradición bíblica que «querido». Se evita «amado amigo» porque añade un matiz no explícito en el texto.
- source_word: πιστὸν ποιεῖς
  english_pob_choice: you are acting faithfully
  chosen_spanish: haces una obra fiel
  alternatives_spanish:
  - actúas fielmente
  - estás actuando con fidelidad
  - haces lo fiel
  lexicon: BDAG
  rationale: La expresión griega literalmente dice «haces algo fiel» / «haces una cosa fiel». En español, «haces una obra fiel» conserva la evaluación de fidelidad sin volverlo torpemente literal. «Actúas fielmente» es posible, pero pierde el sabor nominal del giro πιστὸν ποιεῖς.
- source_word: ὃ ἐὰν ἐργάσῃ
  english_pob_choice: in whatever you do
  chosen_spanish: en todo lo que haces
  alternatives_spanish:
  - en cualquier cosa que hagas
  - todo lo que trabajes
  - lo que sea que hagas
  lexicon: BDAG
  rationale: El relativo con ἐάν + subjuntivo expresa indefinición. «En todo lo que haces» comunica bien el alcance general y evita el calco «lo que sea que trabajes», que en español suena forzado. Se preserva la idea de acción amplia, no solo trabajo manual.
- source_word: εἰς τοὺς ἀδελφοὺς
  english_pob_choice: for the brothers
  chosen_spanish: para con los hermanos
  alternatives_spanish:
  - para los hermanos
  - a favor de los hermanos
  - en favor de los hermanos
  lexicon: BDAG
  rationale: εἰς aquí expresa dirección/beneficio. «Para con» en español transmite trato y servicio hacia personas, y suena natural en contexto de apoyo práctico. Se mantiene «hermanos» por la decisión léxica de la POB de conservar el masculino plural del griego.
- source_word: καὶ τοῦτο ξένους
  english_pob_choice: and especially when they are strangers
  chosen_spanish: y especialmente cuando son extraños
  alternatives_spanish:
  - y esto, siendo extraños
  - y aun a extraños
  - y esto para extraños
  lexicon: BDAG
  rationale: 'La construcción añade énfasis: no solo a los hermanos conocidos, sino también cuando éstos resultan desconocidos para el anfitrión. «Especialmente cuando son extraños» reproduce bien el valor intensivo de καὶ τοῦτο y el contexto de hospitalidad.'
- source_word: ξένους
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - desconocidos
  - huéspedes
  lexicon: BDAG
  rationale: Aquí ξένος no significa necesariamente «extranjero» étnico, sino persona desconocida o ajena al hogar. «Extraños» es la opción más directa y clara en español contemporáneo, sin perder el matiz de hospitalidad.
theological_decisions:
- issue: Alcance de ἀδελφοὺς en un contexto eclesial
  english_pob_reading: ‘Brothers’ translates the masculine plural ἀδελφοὺς. In context it refers to fellow believers, though the group may have included women.
  chosen_spanish_reading: «Hermanos» se conserva como masculino plural, entendido en contexto como creyentes compañeros, aunque el grupo pudiera incluir mujeres.
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  - la familia de la fe
  rationale: Se mantiene la forma masculina plural para respetar el dato gramatical del griego y la decisión POB de no neutralizarlo sin base textual. El contexto de 3 Juan apunta a miembros de la comunidad cristiana y no solo a varones biológicos.
  doctrine_reference: Principio de fidelidad gramatical y contextual; lectura eclesial de ἀδελφοί en el NT
- issue: Fuerza de καὶ τοῦτο en la segunda cláusula
  english_pob_reading: and especially when they are strangers
  chosen_spanish_reading: y especialmente cuando son extraños
  alternative_spanish_readings:
  - y esto, siendo extraños
  - y aun siendo extraños
  - y particularmente a extraños
  rationale: La frase griega intensifica la commendación y no debe diluirse. El español elegido preserva el énfasis sin perder claridad, manteniendo la relación con la hospitalidad hacia personas no conocidas.
  doctrine_reference: Pragmática textual de énfasis y hospitalidad cristiana en 3 Juan
- issue: Naturaleza de la acción encomiada
  english_pob_reading: you are acting faithfully
  chosen_spanish_reading: haces una obra fiel
  alternative_spanish_readings:
  - actúas fielmente
  - obras con fidelidad
  - haces lo fiel
  rationale: La cláusula no describe solo una actitud interior, sino una práctica concreta de apoyo. «Obra fiel» mantiene el carácter evaluativo del texto y deja espacio para la dimensión ética y comunitaria del pasaje.
  doctrine_reference: Ética de la fidelidad práctica en el discipulado
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que añadió «and» antes de «especially» para reflejar con más claridad καὶ τοῦτο. En español se incorporó ese valor intensivo con «y especialmente». También se evitó un calco rígido de πιστὸν ποιεῖς, buscando una equivalencia natural sin perder la valoración de fidelidad.
  spanish_consistency_notes:
  - Se conserva «Amado» para Ἀγαπητέ, coherente con el tono epistolar afectuoso.
  - Se mantiene «hermanos» como masculino plural por fidelidad al griego y a la línea editorial POB.
  - Se usa «extraños» para ξένους, evitando «forasteros» o «extranjeros» que en español podrían desplazar el sentido hacia origen nacional en lugar de desconocimiento/hospitalidad.
  - La puntuación con coma antes de «y especialmente» ayuda a reproducir el efecto aditivo/intensivo del griego sin sonar artificial.
