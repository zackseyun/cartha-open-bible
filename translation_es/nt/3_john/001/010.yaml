revisions:
- from: Por esta razón[a], si voy, llamaré la atención sobre las obras que él hace, hablando maliciosamente contra nosotros con palabras malas; y no contento con estas cosas, él mismo no recibe a los hermanos[b], y estorba a los que quieren hacerlo y los expulsa de la iglesia[c].
  to: Por esta razón, si vengo, llamaré la atención sobre las obras que él hace, charlando maliciosamente contra nosotros con palabras maliciosas; y no contento con estas cosas, él mismo no recibe[a] a los hermanos[b], y se lo impide a los que quieren hacerlo y los expulsa de la iglesia[c].
  rationale: Se corrige «si voy» a «si vengo» para reflejar correctamente ἔλθω y la perspectiva epistolar. Se ajusta φλυαρῶν a «charlando maliciosamente» para conservar mejor la idea de hablar vacía o neciamente con hostilidad. Se mejora «con palabras malas» a «con palabras maliciosas» por naturalidad y contexto. Se añade la nota léxica sobre «recibe/acoge» para ἐπιδέχεται y se conservan las notas necesarias sobre «los hermanos» y la expulsión de la iglesia. No se requiere adjudicación adicional porque los cambios son claros y de nivel editorial normal.
