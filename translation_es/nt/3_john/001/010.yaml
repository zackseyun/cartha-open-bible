translation:
  language: es
  text: Por esta razón, si vengo, llamaré la atención sobre las obras que él hace, charlando maliciosamente contra nosotros con palabras maliciosas; y no contento con estas cosas, él mismo no recibe[a] a los hermanos[b], y se lo impide a los que quieren hacerlo y los expulsa de la iglesia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acoge». El verbo griego puede significar recibir o dar la bienvenida, especialmente en el sentido de hospitalidad.
    reason: lexical_alternative
  - marker: b
    text: «Los hermanos» probablemente se refiere a hermanos cristianos itinerantes o misioneros; algunas traducciones lo amplían a «hermanos y hermanas» o «creyentes».
    reason: lexical_alternative
  - marker: c
    text: O «los echa de la iglesia».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Por tanto
  - Debido a esto
  lexicon: BDAG
  rationale: Mantiene el valor causal-consecuencial explícito del giro griego y suena natural en español actual.
- source_word: ἐὰν ἔλθω
  english_pob_choice: if I come
  chosen_spanish: si voy
  alternatives_spanish:
  - si llego
  - si vengo
  lexicon: BDAG
  rationale: En contexto epistolar, 'si voy' comunica con naturalidad la perspectiva de desplazamiento del hablante. 'Si llego' también sería posible, pero 'ir' resulta más directo en español.
- source_word: ὑπομνήσω
  english_pob_choice: I will call attention to
  chosen_spanish: llamaré la atención sobre
  alternatives_spanish:
  - recordaré
  - mencionaré
  - haré notar
  lexicon: BDAG
  rationale: La frase conserva la idea de poner el asunto en evidencia públicamente. Evita reducir el verbo a un simple 'recordar', que sería demasiado débil para el contexto.
- source_word: αὐτοῦ τὰ ἔργα ἃ ποιεῖ
  english_pob_choice: the works he is doing
  chosen_spanish: las obras que él hace
  alternatives_spanish:
  - las obras que está haciendo
  - sus obras
  - lo que hace
  lexicon: BDAG
  rationale: '''Obras'' reproduce bien τὰ ἔργα y ''que él hace'' conserva el presente de acción continua. Se evita suavizarlo a una formulación más interpretativa.'
- source_word: λόγοις πονηροῖς
  english_pob_choice: with evil words
  chosen_spanish: con palabras malas
  alternatives_spanish:
  - con palabras perversas
  - con palabras maliciosas
  - con malas palabras
  lexicon: BDAG
  rationale: Se mantiene el lenguaje directo del adjetivo. 'Palabras malas' es más transparente y menos técnico que 'malas palabras', que en español moderno puede sonar coloquial o vulgar.
- source_word: φλυαρῶν ἡμᾶς
  english_pob_choice: maliciously babbling against us
  chosen_spanish: hablando maliciosamente contra nosotros
  alternatives_spanish:
  - chismeando contra nosotros
  - hablando necedades contra nosotros
  - proferiendo habladas vacías contra nosotros
  lexicon: BDAG
  rationale: φλυαρέω apunta a hablar fútil o neciamente; en este contexto el hablar es hostil. 'Hablando maliciosamente contra nosotros' conserva la carga adversativa sin introducir un coloquialismo innecesario.
- source_word: μὴ ἀρκούμενος ἐπὶ τούτοις
  english_pob_choice: not content with these things
  chosen_spanish: y no contento con estas cosas
  alternatives_spanish:
  - y no satisfecho con esto
  - y no conformándose con ello
  - y no parando ahí
  lexicon: BDAG
  rationale: Expresa bien que sus acciones no se limitan a la calumnia, sino que continúan más allá de eso.
- source_word: οὔτε αὐτὸς ἐπιδέχεται τοὺς ἀδελφοὺς
  english_pob_choice: he himself does not receive the brothers
  chosen_spanish: él mismo no recibe a los hermanos
  alternatives_spanish:
  - él mismo no acoge a los hermanos
  - él mismo no da la bienvenida a los hermanos
  - él mismo no hospeda a los hermanos
  lexicon: BDAG
  rationale: '''Recibe'' conserva el sentido amplio de ἐπιδέχομαι, que aquí implica hospitalidad. El artículo y plural masculinos se mantienen sin neutralización.'
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: a los hermanos
  alternatives_spanish:
  - a los hermanos y hermanas
  - a los creyentes
  - a los hermanos de la fe
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego, coherente con el criterio de precisión de género y con el probable referente de trabajadores cristianos itinerantes.
- source_word: τοὺς βουλομένους
  english_pob_choice: those who want to do so
  chosen_spanish: a los que quieren hacerlo
  alternatives_spanish:
  - a los que desean recibirlos
  - a los que están dispuestos
  - a los que quieren recibir a los hermanos
  lexicon: BDAG
  rationale: El pronombre implícito se recupera de la cláusula previa. 'Hacerlo' evita redundancia y mantiene el sentido volitivo de βούλομαι.
- source_word: κωλύει
  english_pob_choice: he hinders
  chosen_spanish: estorba
  alternatives_spanish:
  - impide
  - obstaculiza
  - les pone trabas
  lexicon: BDAG
  rationale: '''Estorba'' transmite la idea de impedir o poner obstáculos sin decidir demasiado el mecanismo exacto. En español suena natural y suficientemente fuerte.'
- source_word: ἐκ τῆς ἐκκλησίας ἐκβάλλει
  english_pob_choice: throws them out of the church
  chosen_spanish: los expulsa de la iglesia
  alternatives_spanish:
  - los echa de la iglesia
  - los expulsa de la asamblea
  - los saca de la iglesia
  lexicon: BDAG
  rationale: '''Expulsa'' refleja la fuerza de ἐκβάλλει. ''Iglesia'' es la traducción más natural de ἐκκλησία en este contexto local cristiano.'
theological_decisions:
- issue: Tratamiento de ἀδελφοί en contexto de hospitalidad cristiana
  english_pob_reading: the brothers
  chosen_spanish_reading: a los hermanos
  alternative_spanish_readings:
  - a los hermanos y hermanas
  - a los creyentes
  rationale: Se conserva el masculino plural del griego y se evita neutralizarlo sin base textual directa. El contexto sugiere compañeros cristianos itinerantes, probablemente varones, por lo que 'hermanos' es la opción más fiel al audit trail.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Valor de ἐκκλησία en el cierre de la cláusula
  english_pob_reading: church
  chosen_spanish_reading: iglesia
  alternative_spanish_readings:
  - asamblea
  - congregación
  rationale: En esta situación local y eclesial, 'iglesia' comunica con naturalidad la comunidad cristiana concreta. 'Asamblea' sería posible, pero en español eclesial actual resulta menos inmediato.
  doctrine_reference: BDAG; uso contextual de ἐκκλησία en el NT
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del texto inglés, que ajustó la puntuación para reflejar mejor la estructura del griego: una cláusula principal con explicación participial y una serie coordinada final. Se conservó esa segmentación mediante coma, punto y coma, y coordinación final en español.'
  spanish_consistency_notes:
  - Se mantiene «hermanos» para ἀδελφοί, conforme al criterio de precisión de género del proyecto.
  - Se usa «iglesia» para ἐκκλησία en sentido local cristiano.
  - Se conserva un tono formal y público, sin calco rígido del inglés.
  - 'La puntuación refleja la progresión del original: motivo, condición, acción principal, descripción hostil y acciones añadidas.'
