review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego y del audit trail inglés: causal inicial, condición futura, exposición pública de las obras, continuación del mal comportamiento, rechazo de los hermanos, obstaculización de quienes quieren recibirlos y expulsión de la iglesia. Sin embargo, hay dos desajustes relevantes: ἐὰν ἔλθω se refleja mejor como «si vengo» que «si voy» por la perspectiva epistolar del original y del POB inglés; y φλυαρῶν ἡμᾶς no queda bien captado por «hablando maliciosamente contra nosotros», porque pierde el matiz de hablar necia o vacíamente/sin fundamento. Además, el sistema de notas del español no preserva la alternativa léxica documentada para ἐπιδέχεται («recibir»/«acoger»), y la nota [a] se aparta del contenido del POB inglés al introducir alternativas que no son la nota principal allí.'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible, pero algunas opciones suenan menos naturales o menos precisas de lo deseable. «Con palabras malas» es comprensible, aunque «con palabras maliciosas» encaja mejor en español contemporáneo y con el contexto hostil. «Estorba» es aceptable, pero «se lo impide» o «lo impide» sonaría más natural; aun así no exige cambio obligatorio. La puntuación es buena. Conviene aligerar el exceso de «él mismo» solo lo necesario, pero aquí puede quedarse por énfasis griego.
  glossary_alignment: 'No hay conflicto con terminología doctrinal mayor. «Iglesia» para ἐκκλησία y «hermanos» para ἀδελφοί están alineados con el proyecto y con la justificación teológica del POB. El ajuste principal es léxico-contextual: conservar mejor el matiz de φλυαρῶν y la perspectiva de ἔλθω. También conviene añadir la nota léxica sobre «recibe/acoge» para ἐπιδέχεται, ya que el inglés la preservó.'
  issues:
