base_translation:
  language: en
  yaml_path: translation/nt/3_john/001/010.yaml
  text: For this reason[a], if I come, I will call attention to the works he is doing, maliciously babbling against us with evil words; and not content with these things, he himself does not receive the brothers[c][b], and he hinders those who want to do so and throws them out of the church.
