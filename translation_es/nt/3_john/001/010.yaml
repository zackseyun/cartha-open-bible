    issue: «si voy» para ἐὰν ἔλθω
    rationale: El griego usa «si vengo/si llego» desde la perspectiva del remitente hacia los destinatarios; «si voy» invierte esa orientación y se aleja del POB inglés («if I come»).
  - severity: medium
    issue: «hablando maliciosamente contra nosotros» debilita φλυαρῶν
    rationale: φλυαρέω no solo indica malicia, sino hablar vacía o neciamente, charlatanear o despotricar sin fundamento. El borrador pierde ese componente semántico clave.
  - severity: medium
    issue: Falta la nota léxica de ἐπιδέχεται
    rationale: El audit trail inglés conserva la alternativa «receive/welcome». En español conviene preservar «recibe/acoge» mediante nota para mantener la documentación léxica.
  - severity: low
