    reason: lexical_alternative
  - marker: b
    text: '''The brothers'' likely refers to traveling Christian brothers/missionaries; some translations broaden this to ''brothers and sisters'' or ''believers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'expels them from the church.'
    reason: lexical_alternative
