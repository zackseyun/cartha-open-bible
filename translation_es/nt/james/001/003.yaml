  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: γινώσκοντες introduce la base causal del mandato previo; τὸ δοκίμιον ὑμῶν τῆς πίστεως se expresa como la prueba de la fe de los lectores; κατεργάζεται ὑπομονήν se traduce adecuadamente como un resultado producido. Sin embargo, «sabiendo» en español suena algo colgante y menos natural que una formulación causal explícita en continuidad con el contexto. Además, la nota a para δοκίμιον introduce «carácter probado», que no corresponde estrechamente a la alternativa auditada en inglés («proven genuineness»).'
  spanish_quality_summary: El texto es comprensible y digno, pero puede mejorarse en naturalidad y ajuste discursivo. «Porque saben que…» suena más idiomático y comunica mejor la fuerza causal que el participio aislado «sabiendo». «Su fe» es aceptable en registro neutro, aunque la línea completa queda más fluida con la causal explícita. La nota b está bien; la nota a conviene alinearla más de cerca con la evidencia léxica documentada.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: πίστις → «fe» está bien; no aparecen términos sensibles del glosario mayor. La decisión de ὑπομονή como «perseverancia» es válida y está respaldada por nota alternativa. La principal corrección es estilístico-semántica, no terminológica.'
  issues:
