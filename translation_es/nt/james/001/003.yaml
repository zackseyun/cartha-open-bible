translation:
  language: es
  text: porque saben que la prueba[a] de su fe produce perseverancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la genuinidad probada de su fe». El término griego puede referirse tanto al proceso de prueba como a la cualidad demostrada por la prueba.
    reason: lexical_alternative
  - marker: b
    text: O «constancia» o «aguante firme».
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκοντες
  english_pob_choice: because you know
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque ustedes saben
  - ya que saben
  lexicon: BDAG
  rationale: El participio presente tiene valor explicativo/causal en relación con el mandato previo de considerar las pruebas como gozo. En español, «sabiendo» conserva la conexión participial sin volver la frase innecesariamente pesada; el sentido causal queda implícito por el contexto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que se sabe. En español, «que» es la manera más natural de presentar la cláusula subordinada y evita duplicar la causalidad ya sugerida por el participio.
- source_word: τὸ δοκίμιον
  english_pob_choice: the testing
  chosen_spanish: la prueba
  alternatives_spanish:
  - el proceso de prueba
  - la comprobación
  - el probado carácter
  lexicon: BDAG
  rationale: δοκίμιον puede referirse al proceso de probar o al resultado mostrado por la prueba. «La prueba» es breve, natural y suficientemente amplia para abarcar tanto el proceso como el efecto sin forzar una glosa interpretativa en el texto principal.
- source_word: ὑμῶν τῆς πίστεως
  english_pob_choice: of your faith
  chosen_spanish: de su fe
  alternatives_spanish:
  - de su confianza
  - de su fidelidad
  lexicon: BDAG
  rationale: 'La construcción genitiva es directa: la prueba se relaciona con la fe de los lectores. Se mantiene «fe» por defecto doctrinal y por claridad en el contexto de Santiago.'
- source_word: κατεργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - obra
  - genera
  - da por resultado
  lexicon: BDAG
  rationale: 'El verbo expresa efecto/resultación: la prueba ocasiona perseverancia. «Produce» transmite bien la relación causal sin sonar arcaico ni demasiado técnico.'
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - resistencia
  - paciencia perseverante
  lexicon: BDAG
  rationale: ὑπομονή denota firmeza sostenida bajo dificultad. «Perseverancia» recoge bien la idea de permanecer firme y avanzar bajo prueba; en español bíblico moderno es clara y digna.
theological_decisions:
- issue: Rendering of πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se conserva el valor estándar de πίστις como «fe», en línea con el criterio doctrinal del proyecto. En este contexto no hay presión suficiente para desplazarlo a «confianza» o «fidelidad».
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Translation philosophy §3'
- issue: Rendering of δοκίμιον
  english_pob_reading: the testing / the proven genuineness
  chosen_spanish_reading: la prueba
  alternative_spanish_readings:
  - la prueba comprobada
  - el probado carácter
  rationale: El término admite tanto el proceso de prueba como el resultado demostrado. Se evita cerrar el sentido a una sola posibilidad en el cuerpo principal; la nota preserva la alternativa interpretativa documentada por el audit trail.
  doctrine_reference: James 1:3 lexical note on δοκίμιον
translation_notes:
  revision_awareness: 'La versión española sigue el resultado del pasaje auditado sin cambios textuales respecto del sentido base: mantiene la relación causal del participio, la cláusula contentiva con ὅτι, y preserva la ambigüedad lexical de δοκίμιον mediante nota. El cierre con ὑπομονή se traduce con un término español de amplia aceptación bíblica.'
  spanish_consistency_notes:
  - Se usa «fe» para πίστις conforme al criterio doctrinal del proyecto.
  - Se evita «Señor» u otros equivalentes irrelevantes porque el versículo no contiene el tetragrámaton.
  - La puntuación con punto final mantiene el ritmo de cláusula breve propio del griego.
  - La nota sobre δοκίμιον conserva la tensión interpretativa documentada en el audit trail.
