revisions:
- from: sabiendo que la prueba[a] de su fe produce perseverancia[b].
  to: porque saben que la prueba[a] de su fe produce perseverancia[b].
  rationale: Se hace explícita la relación causal de γινώσκοντες con «porque saben que», que en español suena más natural y refleja mejor la decisión auditada en inglés. También se ajusta la nota de δοκίμιον para que siga más de cerca la alternativa léxica documentada sin añadir una interpretación menos controlada.
