    issue: γινώσκοντες como «sabiendo»
    rationale: Aunque el participio griego puede verterse literalmente, en español aquí queda menos natural y menos claro en su valor causal. El audit trail inglés optó por «because you know» precisamente por esa fuerza discursiva. «Porque saben que» o «ya que saben que» preserva mejor el sentido en español.
  - severity: medium
    issue: Nota léxica de δοκίμιον demasiado alejada en «el carácter probado»
    rationale: La alternativa documentada en inglés es «the proven genuineness of your faith». «El carácter probado» introduce una formulación menos precisa y más interpretativa. Conviene mantener una alternativa más cercana, como «la genuinidad probada de su fe».
  revised_spanish_text: porque saben que la prueba[a] de su fe produce perseverancia[b].
