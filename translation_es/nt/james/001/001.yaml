translation:
  language: es
  text: 'Santiago[a], esclavo[b] de Dios y del Señor Jesús el Mesías[c], a las doce tribus que están en la Dispersión[d]: saludos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre habitual del autor en español bíblico; corresponde al mismo personaje llamado 'James' en inglés.
    reason: cultural_note
  - marker: b
    text: O «siervo». Se conserva «esclavo» para mantener la fuerza del griego δοῦλος, que expresa pertenencia total a un señor.
    reason: lexical_alternative
  - marker: c
    text: O «Jesucristo». El griego contiene el título Χριστός, que aquí se traduce de forma explícita como «Mesías».
    reason: alternative_reading
  - marker: d
    text: Es decir, el pueblo judío y los creyentes de origen judío que viven fuera de la tierra de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Santiago
  alternatives_spanish:
  - Jacobo
  - Santiago
  lexicon: uso bíblico hispano
  rationale: En español bíblico, el personaje del NT se conoce de forma estable como 'Santiago'. Aunque el nombre histórico corresponde a 'Jacob', la forma canónica y reconocible para los lectores es 'Santiago'.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: 'Se conserva el genitivo posesivo simple con δοῦλος: ''esclavo de Dios''. No hay motivo para expandir ni suavizar la relación de pertenencia.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Maestro
  lexicon: BDAG
  rationale: '''Señor'' es el equivalente español doctrinal y natural para κύριος en este contexto cristológico, preservando autoridad y uso bíblico establecido.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque la guía inglesa preserva el valor titular de Χριστός como 'Messiah', en español la forma más fiel y idiomática aquí es el nombre compuesto tradicional 'Jesucristo', que mantiene la identificación cristológica sin sonar forzado. No se documenta aquí una necesidad contextual de separar el título para claridad.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Se mantiene la fuerza lexical de pertenencia total. 'Esclavo' conserva la intensidad de δοῦλος mejor que 'siervo', que suaviza indebidamente el término.
- source_word: ταῖς δώδεκα φυλαῖς
  english_pob_choice: to the twelve tribes
  chosen_spanish: a las doce tribus
  alternatives_spanish:
  - a las doce tribus
  lexicon: BDAG
  rationale: Se conserva la referencia israelita/covenantal sin generalizarla a 'pueblos' o 'grupos'.
- source_word: διασπορᾷ
  english_pob_choice: the Dispersion
  chosen_spanish: la Dispersión
  alternatives_spanish:
  - la diáspora
  - la dispersión
  lexicon: BDAG
  rationale: Se capitaliza como término casi técnico para preservar el sentido judío de los creyentes fuera de la tierra de Israel, siguiendo el valor semitécnico reconocido en la tradición de traducción.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - saludos
  - alegraos
  lexicon: BDAG
  rationale: En el saludo epistolar, el infinitivo se traduce idiomáticamente como una fórmula de apertura. 'Saludos' comunica el uso convencional sin perder naturalidad en español.
theological_decisions:
- issue: Χριστός en la identificación de Jesús
  english_pob_reading: Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Cristo
  rationale: La pauta inglesa preserva el sentido titular de Χριστός, pero en español la forma compuesta 'Jesucristo' es la equivalencia eclesial estable y plenamente inteligible. No se impone una separación artificial del título cuando el uso recibido ya funciona como designación cristológica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: δοῦλος en la autodesignación de Santiago
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: Se conserva la fuerza de pertenencia y sujeción total que la guía inglesa privilegia. 'Esclavo' evita suavizar la relación de dependencia que el autor expresa al presentarse.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table for δοῦλος'
translation_notes:
  revision_awareness: La tradición inglesa auditada pasó por una revisión que primero suavizó 'slave' a 'servant' y 'Messiah' a 'Christ', pero luego se restauraron ambas elecciones más fuertes por fidelidad doctrinal y lexical. En español se mantiene la misma línea de conservación de fuerza léxica en δοῦλος, pero con una equivalencia idiomática estable para Χριστός mediante 'Jesucristo', sin perder el referente titular.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara tipográfica; se usa 'Señor' con capital inicial por estilo bíblico español.
  - '''Dispersión'' se capitaliza para reflejar el valor semitécnico del término sin recurrir a una transliteración innecesaria.'
  - '''Saludos'' funciona como fórmula epistolar equivalente a χαίρειν, más natural que un calco como ''regocijaos''.'
  - No se usa 'Mesías' en el texto principal porque la forma compuesta española tradicional 'Jesucristo' es la equivalencia más natural y reconocible en este contexto breve.
  - Se mantiene el orden sintáctico español fluido sin añadir partículas interpretativas ajenas al griego.
