  text: Ἰάκωβος θεοῦ καὶ κυρίου Ἰησοῦ Χριστοῦ δοῦλος ταῖς δώδεκα φυλαῖς ταῖς ἐν τῇ διασπορᾷ χαίρειν.
base_translation:
  language: en
  yaml_path: translation/nt/james/001/001.yaml
  text: 'James[a], a slave of God and of the Lord Jesus Messiah[c][b], to the twelve tribes in the Dispersion: greetings.'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered either 'Messiah' or, in more name-like usage, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'servant.' The Greek δοῦλος denotes one who belongs to a master; 'slave' is used here to preserve that stronger sense.
    reason: lexical_alternative
  - marker: c
    text: That is, the Jewish people living outside the land of Israel.
    reason: cultural_note
