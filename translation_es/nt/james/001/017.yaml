review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la procedencia celestial de todo don bueno, la imagen del Padre de las luces y la afirmación de su inmutabilidad. Sin embargo, comprime indebidamente dos elementos verbales distintos: ἄνωθέν ἐστιν (''es/procede de lo alto'') y καταβαῖνον (''que desciende / descendiendo''). Al traducir ambos como ''desciende'', se pierde la estructura del original. Además, παρ’ ᾧ se representa mejor como ''en quien'' o ''con quien''; el borrador usa ''en quien'', que es aceptable. La última frase ''sombra de cambio'' es comprensible, pero se aparta del inglés auditado y de la imaginería más concreta de τροπῆς ἀποσκίασμα.'
  spanish_quality_summary: El español es claro y digno. 'Toda dádiva buena y todo don perfecto' suena natural, aunque algo literario; funciona bien en registro bíblico. La principal mejora de legibilidad y fidelidad es restaurar la distinción entre 'es/procede de lo alto' y 'desciende'. También conviene alinear la nota [b] con una alternativa española más idiomática y cercana al audit trail, evitando 'rotación' en el texto explicativo principal como opción demasiado técnica.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Padre de las luces' preserva la metáfora; no hay términos de glosario mayor implicados como Yahvé, Mesías o esclavo. La decisión 'dádiva' / 'don' está bien justificada para distinguir δόσις y δώρημα.
  issues:
  - severity: high
    issue: 'Se fusionan ἄνωθέν ἐστιν y καταβαῖνον en un solo verbo: ''desciende''.'
    rationale: El griego primero afirma el origen ('es/procede de lo alto') y luego añade el participio ('que desciende'). La versión actual elimina esa doble articulación y reduce la precisión del original.
  - severity: medium
    issue: '''Sombra de cambio'' debilita la imagen más concreta de τροπῆς ἀποσκίασμα.'
    rationale: Aunque es inteligible, el audit trail prefirió una expresión más cercana a 'shadow of turning'. En español, 'sombra de giro' preserva mejor la metáfora astronómica; puede mantenerse aclaración en nota.
  - severity: low
    issue: La nota [b] ofrece 'sombra de rotación', opción demasiado técnica para lectura eclesial general.
    rationale: La nota debe ayudar sin introducir un registro científico innecesario. 'Sombra cambiante' o 'sombra de giro' comunican mejor el trasfondo.
  revised_spanish_text: Toda dádiva buena y todo don perfecto es de lo alto[a], y desciende del Padre de las luces[b], en quien no hay variación ni sombra de giro.
  revised_footnotes:
