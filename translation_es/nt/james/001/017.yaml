translation:
  language: es
  text: Toda dádiva buena y todo don perfecto es de lo alto[a], y desciende del Padre de las luces[b], en quien no hay variación ni sombra de giro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda buena dádiva y todo don perfecto». δόσις puede destacar el acto de dar, mientras que δώρημα enfatiza el don mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sombra de cambio» o «sombra cambiante». La frase probablemente alude a las sombras cambiantes asociadas con el movimiento de los astros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶσα δόσις ἀγαθὴ
  english_pob_choice: Every good gift
  chosen_spanish: Toda dádiva buena
  alternatives_spanish:
  - Todo buen don
  - Todo regalo bueno
  lexicon: BDAG
  rationale: δόσις puede destacar el acto de dar o la dádiva resultante. En español, «dádiva» conserva el matiz de don recibido y diferencia esta primera mitad del segundo sintagma, sin perder la fuerza distributiva de πᾶσα. Se mantiene ἀγαθὴ como «buena» de forma directa.
- source_word: πᾶν δώρημα τέλειον
  english_pob_choice: every perfect gift
  chosen_spanish: todo don perfecto
  alternatives_spanish:
  - todo regalo perfecto
  - todo presente perfecto
  lexicon: BDAG
  rationale: δώρημα denota el regalo dado; «don» es un equivalente natural y digno en español, y preserva mejor la distinción con δόσις que repetir «dádiva» o usar un término más coloquial. τέλειον se traduce «perfecto» en el sentido de completo, íntegro o plenamente bueno.
- source_word: ἄνωθέν ἐστιν
  english_pob_choice: is from above
  chosen_spanish: desciende de lo alto
  alternatives_spanish:
  - es de lo alto
  - viene de arriba
  lexicon: BDAG
  rationale: ἄνωθεν expresa origen «de arriba / de lo alto». Aunque la POB inglesa explicita la copulativa como «is from above», en español «desciende de lo alto» comunica con naturalidad el origen celestial y enlaza bien con el participio siguiente. La idea de procedencia se conserva sin volver la frase rígida.
- source_word: καταβαῖνον
  english_pob_choice: coming down
  chosen_spanish: desciende
  alternatives_spanish:
  - bajando
  - que desciende
  lexicon: BDAG
  rationale: El participio presente describe el movimiento continuo de procedencia. «Desciende» es fluido en español y mantiene la imagen de algo que baja desde la fuente divina.
- source_word: ἀπὸ τοῦ πατρὸς τῶν φώτων
  english_pob_choice: from the Father of lights
  chosen_spanish: del Padre de las luces
  alternatives_spanish:
  - del Padre de las luminarias
  - del Padre de los astros
  lexicon: BDAG
  rationale: La expresión se conserva casi de manera literal para respetar la metáfora. «Luces» mantiene la ambigüedad poética del griego —posiblemente los luminares celestes— sin resolverla en el texto principal. «Padre» se mantiene como título relacional y creador.
- source_word: παρ’ ᾧ
  english_pob_choice: with whom
  chosen_spanish: en quien
  alternatives_spanish:
  - con quien
  - junto a quien
  lexicon: BDAG
  rationale: La preposición παρά con relativo aquí expresa relación cercana en un contexto de inmutabilidad divina. En español, «en quien» suena natural y fiel para indicar la esfera del ser de Dios, y evita una imagen demasiado espacial que podría sonar extraña.
- source_word: οὐκ ἔνι
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: BDAG
  rationale: ἔνι es una forma existencial idiomática. «No hay» reproduce con naturalidad la negación existencial en español.
- source_word: παραλλαγὴ
  english_pob_choice: variation
  chosen_spanish: variación
  alternatives_spanish:
  - cambio
  - alteración
  lexicon: BDAG
  rationale: «Variación» conserva la idea de cambio observable en fenómenos luminares y sigue de cerca la elección inglesa, preservando el contraste con la estabilidad divina.
- source_word: τροπῆς ἀποσκίασμα
  english_pob_choice: shadow of turning
  chosen_spanish: sombra de cambio
  alternatives_spanish:
  - sombra de giro
  - sombra de rotación
  - sombra de mudanza
  lexicon: BDAG
  rationale: La frase es difícil y alude probablemente a sombras cambiantes producidas por el movimiento de los astros. «Sombra de cambio» conserva el núcleo imagístico y hace explícita la noción de alteración sin imponer una sola solución interpretativa. Se preserva así la tensión del original sin abandonar la claridad del español.
theological_decisions:
- issue: Imagen del Padre de las luces y la inmutabilidad divina
  english_pob_reading: Retain the metaphor and the statement of unchangeableness without expanding it into a doctrinal paraphrase.
  chosen_spanish_reading: Mantener la metáfora del «Padre de las luces» y la afirmación de que en Dios no hay variación ni sombra de cambio.
  alternative_spanish_readings:
  - explicar las «luces» como astros en el texto principal
  - reformular el final como «en quien no hay cambio»
  rationale: El versículo contrapone el origen bueno y perfecto de los dones con la estabilidad del Creador frente a las luces creadas y cambiantes. La traducción conserva esa imagen y la tensión teológica sin convertirla en explicación doctrinal dentro del cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que prefirió «gift» para ambos sustantivos y volvió a una formulación más formal para la imagen final. En español, mantuve una distinción léxica natural entre «dádiva» y «don» para reflejar la diferencia griega entre δόσις y δώρημα, y conservé una solución source-near para la clausula final sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Uso «Yahvé» para el nombre divino cuando aparece; aquí no aplica.
  - Mantengo «Padre de las luces» como metáfora literal y no como paráfrasis explicativa.
  - Conservo la tensión semántica de la última cláusula con una nota alternativa, ya que el griego admite varias imágenes relacionadas con el cambio y las sombras.
  - Evité «SEÑOR» y «Cristo» porque no corresponden al texto de este versículo.
