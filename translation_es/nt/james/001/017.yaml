    text: 'O: «Toda buena dádiva y todo don perfecto». δόσις puede destacar el acto de dar, mientras que δώρημα enfatiza el don mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sombra de cambio» o «sombra cambiante». La frase probablemente alude a las sombras cambiantes asociadas con el movimiento de los astros.'
    reason: lexical_alternative
  revision_rationale: Se revisa para preservar la estructura del griego distinguiendo entre ἄνωθέν ἐστιν ('es de lo alto') y καταβαῖνον ('desciende'). También se ajusta la cláusula final a una imagen más cercana al original y al audit trail, manteniendo español natural y eclesialmente legible.
