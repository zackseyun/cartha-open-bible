translation:
  language: es
  text: Considérenlo todo gozo[a], mis hermanos, cuando caigan en diversas pruebas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mis hermanos y hermanas”; el vocativo “hermanos” probablemente se dirige a toda la comunidad creyente.
    reason: alternative_reading
  - marker: b
    text: O “tentaciones”; en este contexto se entiende mejor como pruebas externas que ponen a prueba la fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶσαν χαρὰν
  english_pob_choice: all joy
  chosen_spanish: sumo gozo
  alternatives_spanish:
  - todo gozo
  - gozo completo
  lexicon: BDAG
  rationale: 'La construcción acusativa funciona como complemento predicativo de ἡγήσασθε: “consideren [esto] como gozo”. En español, “sumo gozo” conserva la idea de totalidad/intensidad sin sonar tan forzado como una repetición literal de “todo gozo”. Mantiene la fuerza evaluativa del original.'
- source_word: ἡγήσασθε
  english_pob_choice: Consider it
  chosen_spanish: Tengan por
  alternatives_spanish:
  - Consideren
  - Cuenten
  lexicon: BDAG
  rationale: El aoristo medio imperativo plural de ἡγέομαι expresa una evaluación o consideración mental. “Tengan por” comunica esa valoración de forma natural en español y conserva el mandato sin volverlo técnico o arcaico.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - mis hermanos/as
  lexicon: BDAG
  rationale: El vocativo masculino plural puede funcionar representativamente para toda la comunidad creyente. En español, “mis hermanos” preserva la forma del texto fuente; la lectura inclusiva queda implícita por el uso comunitario y puede explicitarse si la política editorial lo requiere en nota.
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Con el subjuntivo περιπέσητε, ὅταν expresa una temporalidad indefinida/recurrente. En español, “cuando” con subjuntivo mantiene esa indefinición de manera idiomática; “cada vez que” sería más explícito pero algo más interpretativo.
- source_word: πειρασμοῖς
  english_pob_choice: trials
  chosen_spanish: pruebas
  alternatives_spanish:
  - tentaciones
  - ensayos
  lexicon: BDAG
  rationale: En Santiago 1:2 el contexto inmediato favorece dificultades externas que ponen a prueba la fe, no solo seducciones al pecado. “Pruebas” es la equivalencia más natural en español para ese sentido, y preserva la ambivalencia lexical documentada de πειρασμός sin colapsarla en “tentaciones”.
- source_word: περιπέσητε
  english_pob_choice: you fall into
  chosen_spanish: caigan en
  alternatives_spanish:
  - se encuentren con
  - les sobrevengan
  lexicon: BDAG
  rationale: El verbo implica “caer en” o “toparse con” algo de manera no planeada. “Caigan en” conserva la imagen verbal del griego y sugiere una entrada involuntaria en la situación.
- source_word: ποικίλοις
  english_pob_choice: various
  chosen_spanish: diversas
  alternatives_spanish:
  - varias
  - múltiples
  lexicon: BDAG
  rationale: El adjetivo denota variedad o diversidad. “Diversas” es claro, sobrio y fiel; mantiene la idea de pluralidad de tipos sin añadir intensidad no presente en el texto.
theological_decisions:
- issue: Alcance de ἀδελφοί en la dirección epistolar
  english_pob_reading: Retain 'my brothers' in the main text, with an inclusive alternative in a footnote.
  chosen_spanish_reading: Conservar “mis hermanos” en el texto principal, con una nota que señale el posible alcance inclusivo de la comunidad creyente.
  alternative_spanish_readings:
  - mis hermanos y hermanas
  - mis hermanos/as
  rationale: Se preserva la forma masculina del vocativo como reflejo del griego y de su fuerza representativa, sin negar que la dirección abarca probablemente a toda la iglesia. La decisión respeta la política de precisión de género del POB y evita sustituir el texto fuente por una forma expansiva no explicitada en el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de πειρασμοῖς en Santiago 1:2
  english_pob_reading: ‘trials’ in the sense of outward trials that test faith, with lexical note that the word can also mean temptations.
  chosen_spanish_reading: “Pruebas” como dificultades externas que ponen a prueba la fe, con nota de que el término también puede abarcar “tentaciones” según el contexto.
  alternative_spanish_readings:
  - tentaciones
  - pruebas o tentaciones
  rationale: El contexto inmediato de Santiago 1 favorece el sentido de pruebas externas, especialmente por el contraste con 1:13, donde la tentación en sentido moral aparece explícitamente. “Pruebas” evita confundir los dos usos y conserva la tensión léxica documentada en el griego.
  doctrine_reference: Santiago 1:2–13; BDAG πειρασμός
translation_notes:
  revision_awareness: 'El texto inglés auditado ya había elegido una equivalencia óptima y mantenido la tensión léxica de πειρασμοῖς mediante una nota. La presente versión española conserva esa misma estructura de decisiones: mantiene la dirección fraterna masculina en el cuerpo principal, traduce ἡγήσασθε como una evaluación mental idiomática, y refleja el sentido contextual de πειρασμοῖς como “pruebas” sin borrar la alternativa “tentaciones”. No se reportan revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa “Dios”/“Yahvé” según las normas del proyecto; este versículo no contiene esos términos.
  - “Mis hermanos” conserva la forma fuente; la inclusividad queda anotada, no incorporada al texto principal.
  - “Pruebas” mantiene la ambivalencia de πειρασμός sin introducir una interpretación doctrinal adicional.
  - La puntuación y el orden son fluidos en español, pero siguen de cerca la sintaxis del griego para audibilidad textual.
