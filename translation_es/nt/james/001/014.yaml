    issue: «pasión» para ἐπιθυμία
    rationale: Aunque intenta mantener un matiz moral, no refleja tan fielmente la amplitud del griego ni la decisión auditada del POB inglés de usar un término amplio equivalente a «desire». «Deseo» es más preciso y la nota puede conservar alternativas más intensas.
  - severity: medium
    issue: «seducido» para δελεαζόμενος
    rationale: En español puede sugerir seducción interpersonal o sexual, mientras que el griego evoca señuelo/cebo/trampa. Una formulación como «atraído con engaño» conserva mejor la imaginería sin volverse demasiado literal.
  - severity: low
    issue: Error gramatical en la nota b
    rationale: Debe decir «Los participios emparejados» o mejor «Los dos participios». Además, la redacción puede simplificarse para mayor claridad.
