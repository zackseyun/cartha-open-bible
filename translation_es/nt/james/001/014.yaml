  text: ἕκαστος δὲ πειράζεται ὑπὸ τῆς ἰδίας ἐπιθυμίας ἐξελκόμενος καὶ δελεαζόμενος·
base_translation:
  language: en
  yaml_path: translation/nt/james/001/014.yaml
  text: But each one is tempted by his own desire[b][a], being drawn away and enticed.
  footnotes:
  - marker: a
    text: Or 'by his own craving' or 'by his own lust.' The Greek term can denote strong desire generally, not only sexual desire.
    reason: lexical_alternative
  - marker: b
    text: The paired participles evoke the imagery of being lured out and baited, like prey or a fish drawn into a trap.
    reason: cultural_note
