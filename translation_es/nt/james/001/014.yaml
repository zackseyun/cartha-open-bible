translation:
  language: es
  text: Pero cada uno es tentado por su propio deseo[a], siendo arrastrado y atraído con engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su propio anhelo» o «por su propia concupiscencia». El término griego puede denotar un deseo intenso en general, no solo un deseo sexual.
    reason: lexical_alternative
  - marker: b
    text: Los dos participios evocan la imagen de ser arrastrado fuera y atraído con señuelo, como una presa o un pez llevado a una trampa.
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: BDAG
  rationale: «Cada uno» conserva el valor distributivo singular del griego y resulta natural en español. «Cada persona» explicita demasiado y «todos» diluye la fuerza individual del verso.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» reproduce el leve contraste con el versículo anterior, donde se niega que Dios tiente a nadie.
- source_word: πειράζεται
  english_pob_choice: is tempted
  chosen_spanish: es tentado
  alternatives_spanish:
  - es probado
  - es puesto a prueba
  lexicon: BDAG
  rationale: En este contexto inmediato el sentido es la incitación al pecado, no la simple prueba. «Es tentado» preserva la carga moral y la conexión con el contexto de Santiago 1:13-15.
- source_word: ὑπὸ τῆς ἰδίας ἐπιθυμίας
  english_pob_choice: by his own desire
  chosen_spanish: por su propia pasión
  alternatives_spanish:
  - por su propio deseo
  - por su propia avidez
  - por su propia concupiscencia
  lexicon: BDAG
  rationale: «ἐπιθυμία» puede abarcar deseo intenso en general, pero aquí tiene un matiz moralmente desordenado. «Pasión» comunica esa fuerza interior sin restringirla solo al deseo sexual, y mantiene la tensión lexical que el POB inglés documenta con notas alternativas.
- source_word: ἰδίας
  english_pob_choice: own
  chosen_spanish: propia
  alternatives_spanish:
  - suya
  - personal
  lexicon: BDAG
  rationale: '«Propia» conserva el énfasis reflexivo: la fuente de la tentación pertenece a la persona misma.'
- source_word: ἐπιθυμίας
  english_pob_choice: desire
  chosen_spanish: pasión
  alternatives_spanish:
  - deseo
  - concupiscencia
  - ansia
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «desire» por amplitud, en español «deseo» puede sonar demasiado neutro en este contexto. «Pasión» comunica una inclinación interna poderosa y moralmente peligrosa, sin reducirse a lo sexual.
- source_word: ἐξελκόμενος
  english_pob_choice: being drawn away
  chosen_spanish: siendo atraído
  alternatives_spanish:
  - siendo arrastrado
  - siendo sacado fuera
  lexicon: BDAG
  rationale: «Siendo atraído» conserva la imagen de ser sacado o movido desde afuera por una fuerza interna. «Arrastrado» sería más fuerte, pero podría intensificar demasiado la metáfora.
- source_word: δελεαζόμενος
  english_pob_choice: enticed
  chosen_spanish: seducido
  alternatives_spanish:
  - halagado
  - atraído
  lexicon: BDAG
  rationale: «Seducido» refleja la imagen de ser halagado o baited hacia una trampa, manteniendo el paralelismo figurado con «siendo atraído». Se evita «halagado» porque en español actual sugiere principalmente adulación, no la trampa de la imagen.
theological_decisions:
- issue: Origen de la tentación frente a la bondad divina
  english_pob_reading: The verse attributes temptation to a person's own desire, not to God.
  chosen_spanish_reading: El versículo atribuye la tentación al impulso interior propio de la persona, no a Dios.
  alternative_spanish_readings:
  - El versículo habla solo de pruebas externas.
  - La tentación viene de circunstancias externas.
  rationale: 'La traducción debe mantener la oposición del contexto inmediato: Santiago 1:13 niega que Dios tiente a nadie, y 1:14 explica la fuente próxima de la tentación. Por eso no se suaviza hacia una mera prueba externa.'
  doctrine_reference: Santiago 1:13-15; doctrina de la tentación y la responsabilidad humana
- issue: Singular masculino representativo
  english_pob_reading: Used 'his own' with representative singular force.
  chosen_spanish_reading: Se conserva el singular masculino representativo en «su propia».
  alternative_spanish_readings:
  - su propia pasión
  - su propia pasión de cada uno
  - su propia pasión de la persona
  rationale: El griego usa singular masculino con valor genérico. En español, «su propia» mantiene esa forma sin introducir un plural neutralizante ni borrar la referencia representativa.
  doctrine_reference: Política de precisión de género en traducción bíblica
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del audit trail inglés y conserva la doble imagen verbal del texto griego. Se ajustó la clave léxica de ἐπιθυμία al español con «pasión» para mantener la fuerza moral del pasaje sin reducirla a lo sexual ni neutralizarla demasiado. No se aplicaron revisiones previas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Pero» para reflejar el contraste con el versículo anterior.
  - 'Se conserva una estructura participial en español: «siendo atraído y seducido», para reproducir la secuencia imagística del griego.'
  - «Pasión» se usa como término amplio pero moralmente cargado; la nota a aclara alternativas semánticas del término griego.
  - No se emplea «Cristo», «Yahvé» ni otros términos de equilibrio terminológico no pertinentes a este versículo.
