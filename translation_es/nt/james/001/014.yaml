  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: contraste con v. 13, singular distributivo («cada uno»), sentido de πειράζεται como tentación, y la atribución de la tentación a la propia ἐπιθυμία. Sin embargo, «pasión» desplaza el campo semántico documentado por el POB inglés, que prefirió un término amplio equivalente a «desire» y explicitó en nota alternativas más cargadas. Además, «seducido» introduce un matiz más estrecho y menos acorde con la imaginería de cebo/trampa de δελεαζόμενος.'
  spanish_quality_summary: 'El español es generalmente claro y natural, pero hay dos problemas de calidad: (1) «pasión» en este contexto puede sonar psicológica o romántica y no tan amplia como «deseo»; (2) la nota b contiene un error gramatical («Las participios») y una explicación algo torpe. Conviene afinar el texto principal para conservar la amplitud léxica y mejorar la nota cultural.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La principal cuestión léxica es ἐπιθυμία: el POB inglés documenta «desire» como opción principal y deja «craving/lust» como alternativas. En español, «deseo» corresponde mejor a esa decisión, mientras que «pasión» se aparta innecesariamente. Para δελεαζόμενος, «atraído con engaño» o «engañado con señuelo» preserva mejor la metáfora que «seducido».'
  issues:
