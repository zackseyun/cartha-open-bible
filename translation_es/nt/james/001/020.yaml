translation:
  language: es
  text: Porque la ira del hombre no produce la rectitud de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la justicia de Dios». El griego δικαιοσύνη puede significar «rectitud» o «justicia»; aquí el texto principal usa «rectitud» para preservar mejor el sentido amplio de la cualidad justa que corresponde a Dios o que Dios aprueba.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «la ira del hombre»; la forma singular masculina puede funcionar de modo genérico en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργὴ
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: BDAG
  rationale: En español, 'ira' conserva bien la intensidad de ὀργή sin volverla necesariamente judicial como 'furor' o demasiado coloquial como 'enojo'. Mantiene el registro bíblico y natural.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: '''Porque'' expresa de forma clara la relación explicativa con el contexto anterior y suena natural en español bíblico formal.'
- source_word: ἀνδρὸς
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - del varón
  lexicon: BDAG
  rationale: Aunque el griego es masculino singular, en español 'la ira del hombre' preserva el valor genérico de ἀνήρ en este contexto sin forzar una construcción artificial. Evita una ambigüedad innecesariamente restrictiva sobre un individuo concreto.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  lexicon: BDAG
  rationale: '''Justicia'' permite conservar la amplitud semántica de δικαιοσύνη y, en español, puede abarcar tanto la cualidad recta como lo que corresponde a Dios. Se mantiene la alternativa interpretativa en nota porque el término puede entenderse también como ''rectitud''.'
- source_word: θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo de relación de manera directa y natural en español. No se interpreta el vínculo (posesión, procedencia o aprobación) para no estrechar el sentido.
- source_word: οὐκ ἐργάζεται
  english_pob_choice: does not produce
  chosen_spanish: no produce
  alternatives_spanish:
  - no logra
  - no realiza
  lexicon: BDAG
  rationale: '''Producir'' comunica bien la idea de causar o dar por resultado, que es el sentido funcional de ἐργάζομαι aquí. En español evita el calco ''trabaja'' y mantiene la fuerza causal del verbo.'
theological_decisions:
- issue: Sentido de δικαιοσύνην θεοῦ
  english_pob_reading: '''the righteousness of God'' kept broad, with an English note allowing ''God''s justice.'''
  chosen_spanish_reading: '''la justicia de Dios'' mantenida amplia, con nota que también permite ''la justicia'' entendida como ''rectitud'''
  alternative_spanish_readings:
  - la justicia de Dios
  - la rectitud de Dios
  - la justicia que Dios requiere
  rationale: El griego admite una gama semántica amplia y el contexto no obliga a resolverla. La traducción principal preserva la construcción genitiva sin expandirla doctrinalmente; la nota conserva la alternativa 'rectitud' para reflejar la tensión lexical sin cerrarla.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y semántica de los genitivos; tabla de δικαιοσύνη'
translation_notes:
  revision_awareness: 'El borrador español sigue el último estado de auditoría en inglés: conserva la relación explicativa de γάρ con «Porque», mantiene la forma genitiva de δικαιοσύνην θεοῦ sin interpretarla, y refleja la decisión revisada de una formulación formal y fuente-cercana para ἀνδρὸς / θεοῦ. La nota sobre δικαιοσύνη mantiene la alternativa lexical registrada en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «ira» para ὀργή por claridad y registro; no se eleva innecesariamente a «furor».
  - La secuencia «la justicia de Dios» conserva la ambigüedad genitiva sin elegir entre posesión, procedencia o aprobación.
  - La nota [b] conserva el valor genérico del singular masculino, coherente con la auditoría inglesa.
