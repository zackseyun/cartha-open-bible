translation:
  language: es
  text: Por lo tanto, habiendo dejado a un lado toda inmundicia y la abundancia[a] de maldad, reciban con mansedumbre[b] la palabra implantada[c], la cual puede salvar sus almas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la abundancia de mal» o «el exceso de maldad».
    reason: lexical_alternative
  - marker: b
    text: O «con dulzura» o «con humildad».
    reason: lexical_alternative
  - marker: c
    text: 'O «la palabra innata»; tradicional: «la palabra injertada».'
    reason: lexical_alternative
  - marker: d
    text: O «sus vidas» o «ustedes mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto anterior con un conector natural y solemne en español.
- source_word: ἀποθέμενοι
  english_pob_choice: having put away
  chosen_spanish: habiendo dejado a un lado
  alternatives_spanish:
  - habiendo apartado
  - dejando a un lado
  lexicon: BDAG
  rationale: Mantiene el valor de participio aoristo con una acción previa o concomitante al imperativo principal, sin sonar forzado en español.
- source_word: πᾶσαν ῥυπαρίαν
  english_pob_choice: all filthiness
  chosen_spanish: toda inmundicia
  alternatives_spanish:
  - toda suciedad
  - toda impureza moral
  lexicon: BDAG
  rationale: ῥυπαρία apunta a suciedad/impureza con carga moral; 'inmundicia' conserva la fuerza vívida y ética del término.
- source_word: περισσείαν κακίας
  english_pob_choice: the abundance of wickedness
  chosen_spanish: la abundancia de maldad
  alternatives_spanish:
  - el exceso de maldad
  - la abundancia de malicia
  lexicon: BDAG
  rationale: περισσεία comunica exceso o abundancia, y κακία aquí es más amplio que 'malicia'; 'maldad' preserva el campo semántico y la decisión revisada del audit trail.
- source_word: ἐν πραΰτητι
  english_pob_choice: with meekness
  chosen_spanish: con mansedumbre
  alternatives_spanish:
  - con humildad
  - con gentileza
  lexicon: BDAG
  rationale: πραΰτης combina mansedumbre, humildad y docilidad receptiva; 'mansedumbre' es la opción más precisa y natural para el contexto exhortativo.
- source_word: δέξασθε
  english_pob_choice: receive
  chosen_spanish: reciban
  alternatives_spanish:
  - reciban ustedes
  - acepten
  lexicon: BDAG
  rationale: El imperativo exhorta a una recepción activa; en español se expresa con un imperativo plural claro y directo.
- source_word: τὸν ἔμφυτον λόγον
  english_pob_choice: the implanted word
  chosen_spanish: la palabra implantada
  alternatives_spanish:
  - la palabra injertada
  - la palabra innata
  lexicon: BDAG
  rationale: Se mantiene la imagen de algo puesto dentro/arraigado. En español, 'palabra implantada' es transparente y fiel a la metáfora sin cargarla con una interpretación más específica.
- source_word: τὸν δυνάμενον σῶσαι
  english_pob_choice: which is able to save
  chosen_spanish: la cual puede salvar
  alternatives_spanish:
  - que puede salvar
  - que es capaz de salvar
  lexicon: BDAG
  rationale: Preserva la afirmación de capacidad sin explicar el mecanismo de salvación; el relativo femenino concuerda con 'palabra'.
- source_word: τὰς ψυχὰς ὑμῶν
  english_pob_choice: your souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - ustedes mismos
  lexicon: BDAG
  rationale: '''Almas'' conserva el peso teológico de ψυχή en un contexto de salvación, evitando reducirlo a mera vida física o identidad total.'
theological_decisions:
- issue: Valor de ψυχὰς ὑμῶν en contexto salvífico
  english_pob_reading: your souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - sus vidas
  - ustedes mismos
  rationale: La lectura conserva la densidad espiritual y soteriológica del texto. En español, 'almas' mantiene el alcance tradicional sin anular posibles matices de vida o persona completa.
  doctrine_reference: Preservar la tensión teológica y el campo semántico, no reducir el término a una sola noción.
- issue: Sentido de ἔμφυτον λόγον
  english_pob_reading: the implanted word
  chosen_spanish_reading: la palabra implantada
  alternative_spanish_readings:
  - la palabra innata
  - la palabra injertada
  rationale: La frase puede referirse al mensaje ya implantado por Dios en los creyentes o a la palabra arraigada en ellos. 'Implantada' mantiene esa amplitud sin forzar una precisión no garantizada por el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de 'overflow of wickedness' a 'abundance of wickedness'; por eso se prefirió 'abundancia de maldad' para reflejar directamente περισσείαν. También se conservó la preferencia por 'implanted word' frente a lecturas más interpretativas, y se mantuvo la tensión de ψυχή como 'almas' sin reducirla a 'vidas'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando corresponda; este versículo no lo requiere.
  - '''Mansedumbre'' se eligió para πραΰτης en concordancia con el registro bíblico y la receptividad exigida por el contexto.'
  - Se evitó 'Cristo' y otras terminologías no pertinentes al versículo.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura exhortativa del griego.
