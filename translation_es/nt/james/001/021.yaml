- from: Por lo tanto[a], habiendo dejado a un lado toda inmundicia y la abundancia de maldad, reciban con mansedumbre el[b] palabra implantada[c], la cual puede salvar sus almas[d].
  to: Por lo tanto, habiendo dejado a un lado toda inmundicia y la abundancia[a] de maldad, reciban con mansedumbre[b] la palabra implantada[c], la cual puede salvar sus almas[d].
