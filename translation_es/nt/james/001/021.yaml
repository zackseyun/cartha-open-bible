  text: διὸ ἀποθέμενοι πᾶσαν ῥυπαρίαν καὶ περισσείαν κακίας ἐν πραΰτητι δέξασθε τὸν ἔμφυτον λόγον τὸν δυνάμενον σῶσαι τὰς ψυχὰς ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/james/001/021.yaml
  text: Therefore[a], having put away all filthiness and the abundance of wickedness, receive with meekness the implanted word[d][c][b], which is able to save your souls.
