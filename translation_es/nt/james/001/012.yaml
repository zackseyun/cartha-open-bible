  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé, Mesías, δοῦλος, etc. La decisión «Bienaventurado» para Μακάριος es coherente con el peso teológico. «Prueba» para πειρασμός concuerda con la decisión documentada; la única desalineación real es la alternativa «examen», que debe ajustarse a algo más cercano a «prueba»/«situación de prueba»/«tiempo de prueba».
