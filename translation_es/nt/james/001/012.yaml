base_translation:
  language: en
  yaml_path: translation/nt/james/001/012.yaml
  text: Blessed is the man who endures trial[a], because after he has been approved, he will receive the crown of life[b], which he promised to those who love him.
  footnotes:
  - marker: a
    text: Or 'temptation' or 'testing'; the Greek word can cover both the idea of a trial and a temptation, but here the context emphasizes enduring under testing.
    reason: lexical_alternative
  - marker: b
    text: The Greek term for 'crown' can refer to a victor's wreath, not necessarily a royal crown.
    reason: cultural_note
