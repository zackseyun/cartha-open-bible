translation:
  language: es
  text: Bienaventurado el hombre que persevera en medio de la prueba[a], porque, después de haber sido aprobado, recibirá la corona de la vida[b], que él prometió a los que lo aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tentación» o «tiempo de prueba»; la palabra griega puede abarcar tanto la idea de una prueba como la de una tentación, pero aquí el contexto pone el acento en perseverar bajo prueba.
    reason: lexical_alternative
  - marker: b
    text: El término griego para «corona» puede referirse a una guirnalda o corona de vencedor, no necesariamente a una corona real.
    reason: cultural_note
lexical_decisions:
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: BDAG
  rationale: «Bienaventurado» conserva el tono de bienaventuranza y el peso teológico de Μακάριος mejor que «feliz», que suena subjetivo, o «dichoso», que puede resultar más débil en español moderno.
- source_word: ἀνὴρ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: BDAG
  rationale: El griego es masculino singular y funciona aquí de manera genérica/representativa. «El hombre» mantiene esa forma sin forzar una neutralización que atenúe el paralelismo del texto.
- source_word: ὑπομένει
  english_pob_choice: endures
  chosen_spanish: soporta
  alternatives_spanish:
  - persevera en
  - resiste
  lexicon: BDAG
  rationale: «Soporta» comunica bien la idea de permanecer bajo presión. «Persevera en» o «resiste» son posibles, pero «soporta» resulta más natural en español con «prueba».
- source_word: πειρασμόν
  english_pob_choice: trial
  chosen_spanish: prueba
  alternatives_spanish:
  - tentación
  - examen
  lexicon: BDAG
  rationale: En este contexto, el énfasis está en la situación probatoria que debe soportarse. «Prueba» conserva la amplitud semántica de πειρασμός sin cerrar indebidamente la posibilidad de tentación.
- source_word: δόκιμος γενόμενος
  english_pob_choice: after he has been approved
  chosen_spanish: después de haber sido aprobado
  alternatives_spanish:
  - habiendo sido aprobado
  - después de haber demostrado ser genuino
  - después de haber pasado la prueba
  lexicon: BDAG
  rationale: 'La frase expresa el resultado del proceso de prueba: quedar aprobado. «Después de haber sido aprobado» refleja con claridad el valor resultativo y temporal del participio.'
- source_word: λήμψεται
  english_pob_choice: he will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  lexicon: BDAG
  rationale: Futuro simple normal en español para λήμψεται; «recibirá» encaja naturalmente con el lenguaje de recompensa.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - corona del vencedor
  lexicon: BDAG
  rationale: «Corona» es el equivalente más transparente en español. La posible referencia a una corona de vencedor o guirnalda se conserva mejor en la nota, en lugar de reemplazar el término principal.
- source_word: τῆς ζωῆς
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - que da vida
  - de vida
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa como «de la vida»; es la opción más fiel y natural sin añadir interpretación innecesaria.
- source_word: ἐπηγγείλατο
  english_pob_choice: he promised
  chosen_spanish: prometió
  alternatives_spanish:
  - ha prometido
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple. El antecedente más natural del sujeto es Dios en el contexto amplio, aunque el versículo lo deja implícito.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a los que le aman
  - para los que lo aman
  lexicon: BDAG
  rationale: La construcción dativa con ἐπαγγέλλομαι se expresa naturalmente con «a». «Lo aman» sigue el pronombre de objeto directo estándar en español contemporáneo.
theological_decisions:
- issue: Alcance semántico de πειρασμός
  english_pob_reading: trial
  chosen_spanish_reading: prueba
  alternative_spanish_readings:
  - tentación
  - tentación o prueba
  - examen
  rationale: El contexto inmediato destaca la perseverancia y el resultado de aprobación, por lo que «prueba» preserva el énfasis en la situación de resistencia sin eliminar la tensión lexicológica de πειρασμός. La nota mantiene abiertas las otras posibilidades.
  doctrine_reference: Translation philosophy §3 (preservar tensión lexical y teológica) y §6 (claridad moderna)
- issue: Naturaleza de la 'crown of life'
  english_pob_reading: crown with cultural note about victor's wreath
  chosen_spanish_reading: corona de la vida
  alternative_spanish_readings:
  - corona del vencedor
  - guirnalda de la vida
  rationale: «Corona» es la forma más natural y reconocible en español. La posible connotación de corona de vencedor/guirnalda se conserva en la nota para no perder la observación cultural del texto griego.
  doctrine_reference: Poética y semántica cultural del símbolo de recompensa
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último pase del texto inglés: no se detectaron cambios necesarios en la lectura principal. La traducción española sigue la misma resolución contextual de πειρασμός como ''trial'' y conserva la nota cultural sobre στέφανος.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al versículo.
  - Se conserva el matiz de recompensa escatológica sin sobreinterpretar el símbolo de la corona.
