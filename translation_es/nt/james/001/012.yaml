revisions:
- from: Bienaventurado el hombre que soporta la prueba[a], porque, después de haber sido aprobado, recibirá la corona de la vida[b], que prometió a los que lo aman.
  to: Bienaventurado el hombre que persevera en medio de la prueba[a], porque, después de haber sido aprobado, recibirá la corona de la vida[b], que él prometió a los que lo aman.
  rationale: Se propone una revisión menor, no por error grave de sentido, sino para mejorar precisión léxica y naturalidad. «Persevera en medio de la prueba» representa mejor ὑπομένει que «soporta la prueba», y la nota a se corrige para reflejar con más fidelidad las alternativas documentadas para πειρασμός. Se añade «él» en «que él prometió» para evitar una posible ambigüedad referencial en español, aunque el sujeto sigue siendo implícitamente Dios por el contexto.
