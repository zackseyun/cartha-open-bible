revisions:
- from: Habiendo querido hacerlo[a], nos dio a luz mediante la palabra de verdad[b], para que fuéramos como primicias de sus criaturas.
  to: Habiéndolo querido[a], nos dio a luz mediante la palabra de verdad[b], para que fuéramos como primicias de sus criaturas.
  rationale: Se reemplaza «Habiendo querido hacerlo» por «Habiéndolo querido» para eliminar un complemento no expreso en el griego y mejorar la naturalidad sin perder el valor participial de βουληθείς. También se corrige la nota alternativa para reflejar de manera idiomática y fiel la opción auditada en inglés. El resto del texto se mantiene porque preserva bien la imagen de nacimiento, el medio instrumental, la finalidad y la metáfora de las primicias.
