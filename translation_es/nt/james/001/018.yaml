  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: la voluntad previa de Dios, el nuevo nacimiento por medio de la palabra de verdad, y el propósito de que los creyentes sean primicias entre sus criaturas. Sin embargo, «Habiendo querido hacerlo» introduce un complemento («hacerlo») ausente del griego y menos natural que otras opciones españolas. Además, la nota alternativa «Habiendo sido su voluntad» no refleja bien βουληθείς. El resto del verso está bien alineado con ἀπεκύησεν, λόγῳ ἀληθείας, ἀπαρχήν, τινα y τῶν αὐτοῦ κτισμάτων.'
