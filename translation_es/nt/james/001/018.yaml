translation:
  language: es
  text: Habiéndolo querido[a], nos dio a luz mediante la palabra de verdad[b], para que fuéramos como primicias de sus criaturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por su propia voluntad, nos dio a luz mediante la palabra de verdad».'
    reason: alternative_reading
  - marker: b
    text: «Primicias» evoca la primera porción de la cosecha apartada y ofrecida a Dios; aquí presenta a los creyentes como una porción inicial y consagrada entre lo que Dios ha hecho.
    reason: cultural_note
lexical_decisions:
- source_word: βουληθεὶς
  english_pob_choice: Having willed it
  chosen_spanish: Habiendo querido hacerlo
  alternatives_spanish:
  - Según su voluntad
  - Habiéndolo querido
  - De su propia voluntad
  lexicon: BDAG
  rationale: El participio aoristo señala una acción de voluntad anterior y relacionada con el verbo principal. «Habiendo querido hacerlo» conserva ese valor participial y la iniciativa divina sin convertir la frase en una paráfrasis doctrinal.
- source_word: ἀπεκύησεν
  english_pob_choice: he gave birth to us
  chosen_spanish: nos dio a luz
  alternatives_spanish:
  - nos hizo nacer
  - nos engendró
  - nos trajo a luz
  lexicon: BDAG
  rationale: El verbo expresa de manera literal la imagen de dar a luz o hacer salir. «Nos dio a luz» mantiene la metáfora del nacimiento que enlaza con el contexto de Santiago 1, sin perder claridad en español.
- source_word: λόγῳ ἀληθείας
  english_pob_choice: by the word of truth
  chosen_spanish: mediante la palabra de verdad
  alternatives_spanish:
  - por la palabra de verdad
  - por medio de la palabra de verdad
  - mediante la palabra verdadera
  lexicon: BDAG
  rationale: El dativo indica medio. «Palabra de verdad» conserva la expresión bíblica establecida y su posible referencia al mensaje verdadero del evangelio. «Mediante» comunica con claridad el instrumento causal en español.
- source_word: εἰς τὸ εἶναι ἡμᾶς
  english_pob_choice: so that we might be
  chosen_spanish: para que fuéramos
  alternatives_spanish:
  - a fin de que fuéramos
  - para ser
  - de modo que fuéramos
  lexicon: BDAG
  rationale: La construcción con εἰς + infinitivo articula propósito. «Para que fuéramos» expresa finalidad de manera natural y suficientemente precisa en español.
- source_word: ἀπαρχήν
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - primera porción
  - ofrenda primicial
  lexicon: BDAG
  rationale: «Primicias» es el equivalente bíblico natural en español y preserva la carga sacrificial y agrícola del término mejor que una explicación más larga.
- source_word: τινα
  english_pob_choice: a kind of
  chosen_spanish: como
  alternatives_spanish:
  - una especie de
  - de alguna manera
  - en cierto sentido
  lexicon: BDAG
  rationale: El indefinido atenúa la identificación exacta. «Como» expresa la cualidad aproximada sin cerrar el matiz representativo del texto.
- source_word: τῶν αὐτοῦ κτισμάτων
  english_pob_choice: of his creatures
  chosen_spanish: de sus criaturas
  alternatives_spanish:
  - de su creación
  - de las cosas que creó
  - de sus seres creados
  lexicon: BDAG
  rationale: «Criaturas» reproduce el plural concreto de κτίσματα y mantiene la amplitud del conjunto creado. Evita convertir la frase en una abstracción colectiva como «creación».
theological_decisions:
- issue: Iniciativa divina en el nuevo nacimiento
  english_pob_reading: The verse is rendered to emphasize that God's willing is the source of believers' new birth, without importing a specific denominational account of predestination or regeneration.
  chosen_spanish_reading: La traducción conserva que la voluntad de Dios precede y fundamenta el dar a luz, sin explicitar un sistema doctrinal posterior.
  alternative_spanish_readings:
  - De su propia voluntad nos hizo nacer
  - Porque quiso, nos dio a luz
  - Por su voluntad nos hizo nacer
  rationale: El griego presenta la voluntad divina como antecedente y causal, pero no desarrolla toda la teología de la regeneración. La redacción española mantiene esa tensión y evita sobreespecificar.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Alcance de κτισμάτων
  english_pob_reading: '''his creatures'' is retained broadly, allowing the phrase to refer to the wider created order rather than narrowing it to humanity alone.'
  chosen_spanish_reading: «sus criaturas» se conserva en sentido amplio, sin restringirlo solo a la humanidad.
  alternative_spanish_readings:
  - de toda su creación
  - de los seres que creó
  - de la humanidad que creó
  rationale: El plural griego permite un referente amplio del orden creado. La traducción no debe limitar el alcance sin una necesidad textual clara.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El borrador inglés más reciente ajustó la apertura de «Because he willed it» a «Having willed it» para reflejar con más precisión el participio griego. La versión española sigue esa misma decisión al usar una estructura participial inicial («Habiendo querido hacerlo»). También conserva el sentido amplio de «his creatures» y la metáfora de nacimiento/primicias sin resolver la tensión teológica más allá del texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto del versículo, sin añadir sujeto explícito en español.
  - «Palabra de verdad» preserva la fórmula bíblica y evita reducirla a «palabra verdadera», que sería más descriptiva que técnica.
  - «Primicias» es el término preferido para mantener la resonancia cultual y agrícola del original.
  - «Criaturas» conserva el plural concreto del griego y evita una abstracción que perdería la imagen del conjunto creado.
