translation:
  language: es
  text: y el rico, en su humillación[a], porque como flor de la hierba[b] desaparecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, supliendo la elipsis del versículo anterior: «pero el rico debe gloriarse en su humillación».'
    reason: alternative_reading
  - marker: b
    text: «Flor de la hierba» es una traducción literal de la imagen griega, que subraya cuán rápido se marchitan los ricos como la vegetación en flor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πλούσιος
  english_pob_choice: and the rich man
  chosen_spanish: y el rico
  alternatives_spanish:
  - pero el rico
  - y el hombre rico
  lexicon: BDAG
  rationale: πλούσιος es un sustantivo masculino singular; en español, «el rico» conserva esa sustantivación de manera natural y breve. La conjunción δέ se puede reflejar con «y» en una secuencia vinculada con el versículo anterior, sin sobredeterminar el matiz adversativo.
- source_word: ἐν τῇ ταπεινώσει αὐτοῦ
  english_pob_choice: in his humiliation
  chosen_spanish: en su humillación
  alternatives_spanish:
  - en su bajeza
  - en su condición de humillación
  - en su abatimiento
  lexicon: BDAG
  rationale: ταπείνωσις admite la idea de ser rebajado o humillado. «Humillación» conserva el peso social y deshonroso del término en un español claro y sobrio, y corresponde bien al sentido contextual de ser puesto abajo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la afirmación. «Porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: ὡς ἄνθος χόρτου
  english_pob_choice: like a flower of grass
  chosen_spanish: como flor de la hierba
  alternatives_spanish:
  - como flor de hierba
  - como una flor del pasto
  - como flor del campo
  lexicon: BDAG
  rationale: La imagen es deliberadamente literal y vegetal. «Flor de la hierba» conserva el genitivo griego y evita reemplazar la figura por una más interpretativa; «hierba» sigue la imaginería bíblica tradicional sin domesticarla.
- source_word: παρελεύσεται
  english_pob_choice: he will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará y se irá
  - desaparecerá
  - pasará de largo
  lexicon: BDAG
  rationale: El futuro medio de παρέρχομαι comunica transitoriedad. «Pasará» es conciso y suficientemente idiomático en español; el contexto de la flor de la hierba ya aporta la idea de fugacidad.
theological_decisions:
- issue: Ellipsis from the previous verse
  english_pob_reading: The main text leaves the implied verb unstated in v.10 and renders only the extant Greek words.
  chosen_spanish_reading: El texto principal deja implícito el verbo arrastrado desde el versículo anterior y traduce solo las palabras presentes en este versículo.
  alternative_spanish_readings:
  - 'Añadir en el cuerpo: «pero el rico debe gloriarse en su humillación»'
  - 'Añadir en el cuerpo: «y el rico se gloríe en su humillación»'
  rationale: La sintaxis de 1:10 depende de 1:9. Para mantener auditabilidad y no añadir material inexistente en el versículo, la traducción principal conserva la elipsis, mientras la nota explica la posibilidad de suplirla desde el contexto inmediato.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of 'humiliation'
  english_pob_reading: The phrase refers to the rich man's being brought low, especially in light of his fleeting status.
  chosen_spanish_reading: La frase se entiende como el ser rebajado del rico, a la luz de su condición pasajera.
  alternative_spanish_readings:
  - Una humildad voluntaria
  - Una condición social baja en general
  rationale: El paralelo con «como flor de la hierba pasará» muestra que el énfasis está en la reversión y transitoriedad, no en una virtud interior elegida. «Humillación» preserva esa tensión sin moralizarla indebidamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La base griega y el control auditado en inglés coinciden de manera alta; no se requirieron revisiones sustantivas. Se mantuvo la elipsis del verbo implícito para no introducir una lectura expansiva en el texto principal.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se usó «humillación» para ταπείνωσις por coherencia con el tono de abatimiento y reversión social.
  - Se conservó la imagen literal «flor de la hierba» en la nota para no borrar la metáfora bíblica.
  - «Pasará» mantiene la brevedad del futuro de παρέρχομαι y funciona bien con la imagen de la vegetación que se seca.
