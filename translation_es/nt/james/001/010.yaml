    issue: «pasará» queda ambiguo para παρελεύσεται
    rationale: Aunque formalmente posible, en español «pasará» puede entenderse como 'pasar por' o 'pasar de largo'. El contexto pide más claramente la idea de desaparecer o acabarse, como en la auditoría inglesa «he will pass away».
  - severity: low
    issue: Redacción poco natural en la nota de la elipsis
    rationale: «O, suplido elipsis desde el versículo anterior» no suena idiomático. «O, supliendo la elipsis del versículo anterior» expresa lo mismo con español natural y claro.
