  text: ἀνέτειλεν γὰρ ὁ ἥλιος σὺν τῷ καύσωνι καὶ ἐξήρανεν τὸν χόρτον, καὶ τὸ ἄνθος αὐτοῦ ἐξέπεσεν καὶ ἡ εὐπρέπεια τοῦ προσώπου αὐτοῦ ἀπώλετο· οὕτως καὶ ὁ πλούσιος ἐν ταῖς πορείαις αὐτοῦ μαρανθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/james/001/011.yaml
  text: For the sun rose with its scorching heat and dried up the grass[a], and its flower fell off and the beauty of its appearance perished[b]; so also the rich man will wither away in the midst of his pursuits.
  footnotes:
  - marker: a
    text: Or 'with the scorching wind'; the Greek καύσων can refer to burning heat and, in some contexts, the hot wind associated with it.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his journeys.' The Greek can refer literally to journeys or more broadly to one's course of activity or pursuits.
    reason: lexical_alternative
