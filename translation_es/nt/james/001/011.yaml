translation:
  language: es
  text: Porque salió el sol con su calor abrasador[a], y secó la hierba, y su flor se cayó y la belleza de su apariencia pereció; así también el rico se marchitará en medio de sus ocupaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con el viento abrasador"; el griego καύσων puede referirse al calor ardiente y, en algunos contextos, al viento caliente asociado con él.
    reason: lexical_alternative
  - marker: b
    text: O "en sus viajes". El griego puede referirse literalmente a viajes o, de manera más amplia, al curso de sus actividades u ocupaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέτειλεν
  english_pob_choice: rose
  chosen_spanish: salió el sol
  alternatives_spanish:
  - se levantó el sol
  - apareció el sol
  lexicon: BDAG
  rationale: En español, "salió el sol" es una forma natural y fiel para el aoristo narrativo del verbo ἀνατέλλω; conserva la imagen de amanecer sin sonar forzado.
- source_word: σὺν τῷ καύσωνι
  english_pob_choice: with its scorching heat
  chosen_spanish: con su calor abrasador
  alternatives_spanish:
  - con su calor ardiente
  - con su viento abrasador
  lexicon: BDAG
  rationale: καύσων puede referirse al calor abrasador y, en algunos contextos, al viento caliente asociado. Aquí, como en la POB inglesa, el sol es el sujeto y "calor abrasador" transmite bien la fuerza de la expresión.
- source_word: ἐξήρανεν τὸν χόρτον
  english_pob_choice: dried up the grass
  chosen_spanish: secó la hierba
  alternatives_spanish:
  - secó la yerba
  - marchitó la hierba
  lexicon: BDAG
  rationale: ξηραίνω describe el efecto del calor sobre la vegetación. "Secó la hierba" es natural en español y conserva la imagen concreta.
- source_word: τὸ ἄνθος αὐτοῦ ἐξέπεσεν
  english_pob_choice: its flower fell off
  chosen_spanish: su flor se cayó
  alternatives_spanish:
  - su flor cayó
  - su flor se desprendió
  lexicon: BDAG
  rationale: ἐκπίπτω significa literalmente caer fuera / caerse. "Se cayó" mantiene el movimiento físico de la imagen floral sin interpretarla demasiado.
- source_word: ἡ εὐπρέπεια
  english_pob_choice: the beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - el esplendor
  - la hermosura
  lexicon: BDAG
  rationale: εὐπρέπεια denota belleza o hermosura. "Belleza" es la equivalencia más clara y ampliamente entendible en español.
- source_word: τοῦ προσώπου αὐτοῦ
  english_pob_choice: of its appearance
  chosen_spanish: de su apariencia
  alternatives_spanish:
  - de su rostro
  - de su aspecto
  lexicon: BDAG
  rationale: πρόσωπον puede ser "rostro", pero en la imagen de una planta o flor resulta más natural en español decir "apariencia" o "aspecto"; así se preserva la metáfora sin antropomorfismo raro.
- source_word: ἀπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - se perdió
  - desapareció
  lexicon: BDAG
  rationale: La forma media expresa pérdida o desaparición. "Pereció" conserva el tono elevado y el sentido de desaparición de la belleza.
- source_word: ὁ πλούσιος
  english_pob_choice: the rich man
  chosen_spanish: el rico
  alternatives_spanish:
  - el hombre rico
  - la persona rica
  lexicon: BDAG
  rationale: El griego es masculino singular y funciona como figura representativa. "El rico" mantiene la referencia masculina gramatical sin añadir una explicación innecesaria.
- source_word: ἐν ταῖς πορείαις αὐτοῦ
  english_pob_choice: in the midst of his pursuits
  chosen_spanish: en medio de sus ocupaciones
  alternatives_spanish:
  - en sus viajes
  - en medio de sus actividades
  - en su curso de vida
  lexicon: BDAG
  rationale: πορεία puede significar viaje o curso de actividad. En este contexto, la advertencia aplica al modo de vida y quehaceres del rico; "ocupaciones" transmite ese alcance amplio sin restringirlo a viajes literales.
- source_word: μαρανθήσεται
  english_pob_choice: will wither away
  chosen_spanish: se marchitará
  alternatives_spanish:
  - se desvanecerá
  - se agostará
  lexicon: BDAG
  rationale: La futura pasiva/deponente continúa la metáfora vegetal. "Se marchitará" reproduce bien la imagen de deterioro inevitable.
theological_decisions:
- issue: Referencia de ὁ πλούσιος
  english_pob_reading: the rich man
  chosen_spanish_reading: el rico
  alternative_spanish_readings:
  - el hombre rico
  - la persona rica
  rationale: Se conserva el singular masculino como figura representativa, siguiendo el valor gramatical del griego y sin reducir el alcance de la advertencia a un individuo exclusivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Alcance de πορείαις en la advertencia al rico
  english_pob_reading: pursuits
  chosen_spanish_reading: ocupaciones
  alternative_spanish_readings:
  - viajes
  - actividades
  - quehaceres
  rationale: El contexto apunta al curso de acción y actividad del rico, no solo a desplazamientos literales. "Ocupaciones" conserva la amplitud metafórica de la advertencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El cotejo más reciente indica alta concordancia con el texto fuente y con la auditoría inglesa; no se requirieron cambios de revisión posteriores. Se mantuvieron las dos tensiones léxicas principales: καύσων como calor abrasador/viento abrasador, y πορείαις como viajes/ocupaciones.'
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió "el rico" para respetar el singular masculino del griego, como en la auditoría inglesa.
  - 'Se mantuvo la metáfora vegetal con verbos concretos: "secó", "se cayó", "se marchitará".'
  - Las notas al pie preservan las alternativas léxicas documentadas en la POB inglesa sin ampliar indebidamente el sentido.
