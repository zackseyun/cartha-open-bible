    issue: La nota [b] está colocada sobre «pereció» en vez de sobre «sus ocupaciones».
    rationale: La nota explica la alternativa léxica de πορείαις («viajes» / curso de actividades), no de ἀπώλετο. Tal como está, induce a pensar erróneamente que la alternativa afecta a «pereció». Esto es un problema de fidelidad al expediente de auditoría y de legibilidad documental.
