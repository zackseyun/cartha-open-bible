translation:
  language: es
  text: No se dejen engañar[a], mis amados hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hermanos y hermanas»; el griego «hermanos» puede dirigirse colectivamente a los creyentes, incluidas las mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  english_pob_choice: Do not
  chosen_spanish: No se dejen
  alternatives_spanish:
  - No sean
  - No se aparten
  lexicon: μή + imperativo presente de prohibición
  rationale: El griego μὴ con imperativo presente marca una prohibición. En español, 'No se dejen' comunica de forma natural la orden negativa sin añadir intensidad o aspecto que el texto no exige.
- source_word: πλανᾶσθε
  english_pob_choice: be deceived
  chosen_spanish: engañar
  alternatives_spanish:
  - desviar
  - extraviar
  - ser engañados
  lexicon: πλανάω
  rationale: πλανᾶσθε en pasivo/medio expresa la idea de ser inducidos a error o engaño. En español, 'dejarse engañar' conserva bien la fuerza pasiva y el matiz de aceptar una falsedad en este contexto de advertencia.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: ἀδελφοί
  rationale: El vocativo plural ἀδελφοί es literalmente 'hermanos'. Se mantiene esa forma en el texto principal por fidelidad al griego; el sentido inclusivo se aclara en la nota, como hace el POB en inglés.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: amados
  alternatives_spanish:
  - míos
  - queridos
  lexicon: ἐγώ (pronombre posesivo en vocativo afectivo)
  rationale: El posesivo μου expresa cercanía afectiva. En español, esa relación pastoral queda mejor integrada con 'amados' y evita un 'mis' forzado en esta fórmula vocativa.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - amados por Dios
  lexicon: ἀγαπητός
  rationale: ἀγαπητοί significa 'amados/beloved'. 'Amados' preserva el tono afectivo y solemne del vocativo, y unido a 'hermanos' produce una fórmula natural en español.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: Render 'brothers' in the main text, with inclusive force preserved in a footnote.
  chosen_spanish_reading: Mantener 'hermanos' en el texto principal y aclarar en nota que puede incluir a hermanas.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  - hermanos/as
  rationale: La forma gramatical griega es masculina plural y puede dirigirse representativamente a toda la comunidad cristiana. Se conserva la exactitud formal en el cuerpo del texto y se explica el alcance inclusivo en nota, en línea con la filosofía POB.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Fuerza de la prohibición con μὴ πλανᾶσθε
  english_pob_reading: Do not be deceived
  chosen_spanish_reading: No se dejen engañar
  alternative_spanish_readings:
  - No sean engañados
  - No se extravíen
  - No se dejen desviar
  rationale: La advertencia de Santiago sigue a la enseñanza sobre la tentación y el origen del mal en los vv. 13–15. 'No se dejen engañar' mantiene el carácter de advertencia contra aceptar una mentira sin introducir una interpretación doctrinal adicional.
  doctrine_reference: Contexto inmediato de Santiago 1:13–15
translation_notes:
  revision_awareness: 'El registro coincide con la última revisión disponible: no se requieren cambios respecto al acuerdo alto entre el borrador inglés y el control cruzado.'
  spanish_consistency_notes:
  - Se conserva el vocativo afectivo como 'amados hermanos', una fórmula natural y fiel al griego.
  - La nota a pie de página sigue el patrón del POB inglés para aclarar el alcance inclusivo de ἀδελφοί sin alterar el texto principal.
  - Se evita 'Cristo' o terminología doctrinal no presente en el versículo; el español se mantiene estrictamente limitado al contenido de la cláusula griega.
