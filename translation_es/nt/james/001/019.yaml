translation:
  language: es
  text: 'Sepan esto[c], mis amados hermanos[a]: todo hombre[b] sea pronto para oír, tardo para hablar, tardo para airarse,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis amados hermanos y hermanas»; el griego dice «hermanos», pero es probable que Santiago se esté dirigiendo a toda la comunidad creyente.
    reason: alternative_reading
  - marker: b
    text: O «cada persona» / «todos»; el griego usa una forma masculina singular con sentido genérico.
    reason: lexical_alternative
  - marker: c
    text: O «Ustedes saben esto, mis amados hermanos»; el verbo inicial también puede entenderse como indicativo, no solo como imperativo.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἴστε
  english_pob_choice: Know this
  chosen_spanish: Sepan esto
  alternatives_spanish:
  - Sepan
  - Entiendan esto
  - Reconozcan esto
  lexicon: BDAG
  rationale: La forma griega puede entenderse como imperativa o indicativa. En español, «Sepan esto» conserva bien el tono exhortativo y la función discursiva de introducción a las amonestaciones siguientes, sin sobrecargar el texto con una glosa.
- source_word: ἀδελφοί μου ἀγαπητοί
  english_pob_choice: my beloved brothers
  chosen_spanish: mis amados hermanos
  alternatives_spanish:
  - mis queridos hermanos
  - mis hermanos amados
  - mis hermanos y hermanas amados
  lexicon: BDAG
  rationale: «Hermanos» conserva el plural masculino representativo del griego. «Amados» reproduce ἀγαπητοί con un registro natural y digno en español. Se evita neutralizar en el texto principal, pero la posible referencia al conjunto de la comunidad queda reflejada en la nota.
- source_word: ἔστω δὲ
  english_pob_choice: let ... be
  chosen_spanish: sea
  alternatives_spanish:
  - y sea
  - pero sea
  - ahora sea
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa de forma natural en español con «sea». El valor conectivo de δέ queda suavemente implícito por el flujo exhortativo, sin forzar un «pero» que suene excesivo.
- source_word: πᾶς ἄνθρωπος
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada persona
  - todo ser humano
  - todos
  lexicon: BDAG
  rationale: La construcción griega es singular genérica con forma masculina. «Todo hombre» preserva ese valor representativo y la precisión formal del original. En español suena algo más literario que «cada persona», pero es fiel al peso del griego.
- source_word: ταχὺς εἰς τὸ ἀκοῦσαι
  english_pob_choice: quick to hear
  chosen_spanish: pronto para oír
  alternatives_spanish:
  - rápido para escuchar
  - dispuesto a oír
  - pronto para escuchar
  lexicon: BDAG
  rationale: «Pronto para oír» mantiene la cercanía léxica a ἀκούω y suena natural en español bíblico contemporáneo. «Escuchar» sería más idiomático en algunos contextos, pero «oír» conserva mejor la conexión formal con el verbo griego.
- source_word: βραδὺς εἰς τὸ λαλῆσαι
  english_pob_choice: slow to speak
  chosen_spanish: tardo para hablar
  alternatives_spanish:
  - lento para hablar
  - tardo en hablar
  - reacio a hablar
  lexicon: BDAG
  rationale: «Tardo para hablar» refleja βραδύς con un matiz sobrio y directo. «Hablar» funciona mejor que «decir» o «platicar» para conservar el paralelo con el estilo exhortativo del pasaje.
- source_word: βραδὺς εἰς ὀργήν
  english_pob_choice: slow to anger
  chosen_spanish: tardo para la ira
  alternatives_spanish:
  - lento para la ira
  - tardo en la ira
  - lento en enojarse
  lexicon: BDAG
  rationale: «Ira» expresa ὀργή con un registro que puede abarcar tanto ira emocional como enojo sostenido, sin reducirlo a un simple «enojarse». Se mantiene la misma construcción que en los dos miembros previos para preservar el paralelismo.
theological_decisions:
- issue: Alcance genérico y posible audiencia mixta en la expresión de dirección comunitaria
  english_pob_reading: 'Retain masculine forms in the main text: ''brothers'' and ''every man'''
  chosen_spanish_reading: 'Retener las formas masculinas representativas en el texto principal: «hermanos» y «todo hombre»'
  alternative_spanish_readings:
  - mis hermanos y hermanas
  - cada persona
  - todos
  rationale: El griego usa formas masculinas con valor genérico/representativo. La traducción principal conserva ese rasgo para no borrar la forma del original. Dado que la comunidad probablemente incluía creyentes de ambos sexos, se aclara la posible amplitud del término en una nota, no en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: 'Función de Ἴστε: imperativo o indicativo'
  english_pob_reading: '''Know this'' / ''You know this'''
  chosen_spanish_reading: «Sepan esto» con valor exhortativo
  alternative_spanish_readings:
  - «Ustedes saben esto»
  - «Sepan»
  - «Entiendan esto»
  rationale: La ambigüedad gramatical se conserva en la nota textual/alternativa, pero el cuerpo principal adopta una lectura exhortativa coherente con la serie de mandatos que sigue. En español, «Sepan esto» comunica con naturalidad esa transición sin perder la tensión interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés y no requiere cambios respecto a la decisión base: se mantuvo la ambigüedad de Ἴστε mediante una redacción exhortativa, se conservó el masculino representativo en «hermanos» y «todo hombre», y se tradujo el paralelismo final con equivalentes naturales en español. No se registraron revisiones posteriores en la fuente auditada.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de tres miembros: «pronto para oír, tardo para hablar, tardo para la ira».'
  - Se evitó introducir puntuación o conectores que debilitaran el tono exhortativo del griego.
  - «Oír» se usó para sostener la correspondencia con ἀκοῦσαι; «hablar» reproduce adecuadamente λαλέω en el contexto.
  - «Ira» conserva un registro bíblico claro y no se sustituyó por «furia» o «enojo» en el texto principal.
  - Las notas usan marcadores únicos y corresponden a las alternativas documentadas en el audit trail.
