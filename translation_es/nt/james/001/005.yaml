review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: condición, carencia de sabiduría, petición a Dios, generosidad divina, ausencia de reproche y promesa de respuesta. Sin embargo, hay un problema de alineación en las notas: la nota [a] no preserva una alternativa léxica del original ni del rastro de auditoría inglés, sino que introduce una explicación interpretativa sobre «sabiduría». Además, la nota [b] recoge correctamente el matiz de μὴ ὀνειδίζοντος, pero falta la nota cultural equivalente a la del inglés sobre el singular representativo, ya que el español ha neutralizado parcialmente ese rasgo.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Pero si alguno de ustedes carece de sabiduría» y «y le será dada» son fluidos. El punto más débil es «pídala a Dios»: aunque es comprensible, suena un poco abrupto y menos natural que «que se la pida a Dios» en registro bíblico contemporáneo. «Sin reproche» es aceptable, pero en español puede sonar ligeramente abstracto; la nota ayuda a aclararlo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «sabiduría» y «generosamente» están bien alineados. No intervienen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La decisión sobre el singular representativo necesita reflejarse mejor en notas, dado que el texto español no conserva explícitamente el masculino singular del griego.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde al motivo documentado en el POB inglés
    rationale: La nota inglesa marcada a/b preserva una alternativa para μὴ ὀνειδίζοντος y una nota cultural sobre el singular representativo; no añade una glosa interpretativa sobre «sabiduría». La nota española [a] introduce interpretación contextual en vez de preservar evidencia o una alternativa significativa del original.
  - severity: medium
    issue: Falta una nota sobre el singular representativo del griego
    rationale: El rastro inglés documenta explícitamente que las formas masculinas singulares son representativas. Como el español usa una formulación más neutral («pídala... le será dada»), conviene preservar ese dato en nota para no perder información relevante del original.
  - severity: low
    issue: «Pídala a Dios» es menos natural que una exhortación con «que»
    rationale: Para un imperativo de tercera persona en español bíblico natural, «que se la pida a Dios» fluye mejor y conserva la referencia a «sabiduría» sin sonar telegráfico.
  revised_spanish_text: Pero si alguno de ustedes carece de sabiduría, que se la pida a Dios, quien da a todos generosamente y sin reproche[a], y le será dada[b].
  revised_footnotes:
