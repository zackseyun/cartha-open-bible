  text: Εἰ δέ τις ὑμῶν λείπεται σοφίας, αἰτείτω παρὰ τοῦ διδόντος θεοῦ πᾶσιν ἁπλῶς καὶ ⸀μὴ ὀνειδίζοντος, καὶ δοθήσεται αὐτῷ·
base_translation:
  language: en
  yaml_path: translation/nt/james/001/005.yaml
  text: But if any of you lacks wisdom[a], let him ask of God, who gives to all generously and without reproach[b], and it will be given to him.
  footnotes:
  - marker: a
    text: Or 'without finding fault.'
    reason: lexical_alternative
  - marker: b
    text: The Greek uses masculine singular forms ('him') in a representative sense for any person among you.
    reason: cultural_note
