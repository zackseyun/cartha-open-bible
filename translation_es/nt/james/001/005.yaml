- from: Pero si alguno de ustedes carece de sabiduría[a], pídala a Dios, quien da a todos generosamente y sin reproche[b], y le será dada.
  to: Pero si alguno de ustedes carece de sabiduría, que se la pida a Dios, quien da a todos generosamente y sin reproche[a], y le será dada[b].
  rationale: 'Se corrigen las notas para que reflejen fielmente el rastro de auditoría y la evidencia griega: se elimina la glosa interpretativa innecesaria sobre «sabiduría», se conserva la alternativa léxica pertinente para μὴ ὀνειδίζοντος y se añade la nota sobre el singular representativo. También se mejora levemente la naturalidad de αἰτείτω con «que se la pida a Dios».'
