translation:
  language: es
  text: Pero si alguno de ustedes carece de sabiduría, que se la pida a Dios, quien da a todos generosamente y sin reproche[a], y le será dada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin encontrar falta». La idea es que Dios no avergüenza ni reprende al que pide.
    reason: lexical_alternative
  - marker: b
    text: El griego usa formas masculinas singulares con sentido representativo para cualquier persona entre ustedes.
    reason: cultural_note
lexical_decisions:
- source_word: Εἰ δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: δέ introduce un desarrollo suave respecto del versículo anterior; «Pero si» conserva ese matiz de transición natural en español sin exagerar la oposición.
- source_word: τις ὑμῶν
  english_pob_choice: any of you
  chosen_spanish: alguno de ustedes
  alternatives_spanish:
  - cualquiera de ustedes
  - alguien entre ustedes
  lexicon: BDAG
  rationale: La combinación indefinida con genitivo partitivo se expresa de forma natural como «alguno de ustedes», manteniendo el alcance abierto y el tono pastoral directo.
- source_word: λείπεται
  english_pob_choice: lacks
  chosen_spanish: carece de
  alternatives_spanish:
  - le falta
  - está falto de
  lexicon: BDAG
  rationale: El verbo aquí funciona idiomáticamente con sentido de necesidad o carencia. «Carece de» es claro y digno en español y preserva la idea de falta sin forzar un calco.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: BDAG
  rationale: «Sabiduría» es la equivalencia normal y no estrecha indebidamente el término. En este contexto se trata de sabiduría dada por Dios para enfrentar pruebas, pero el texto no obliga a especificarlo más en la traducción.
- source_word: αἰτείτω
  english_pob_choice: let him ask
  chosen_spanish: pídala
  alternatives_spanish:
  - que pida
  - que la pida
  lexicon: BDAG
  rationale: El imperativo de tercera persona puede trasladarse de forma más natural al español con una construcción exhortativa. Se usa objeto directo femenino («la») por referencia a «sabiduría», evitando perder la conexión pronominal del griego.
- source_word: παρὰ τοῦ διδόντος θεοῦ
  english_pob_choice: of God, who gives
  chosen_spanish: a Dios, quien da
  alternatives_spanish:
  - de Dios, quien da
  - del Dios que da
  lexicon: BDAG
  rationale: 'Tras αἰτέω, la relación natural en español es «pedir a». La frase participial se conserva como relativa explicativa: Dios es el que da, manteniendo el énfasis en su carácter de dador.'
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  - a cada uno
  lexicon: BDAG
  rationale: El dativo plural amplio se expresa con «a todos», respetando el alcance universal del dador sin introducir restricciones.
- source_word: ἁπλῶς
  english_pob_choice: generously
  chosen_spanish: generosamente
  alternatives_spanish:
  - liberalmente
  - con sencillez
  lexicon: BDAG
  rationale: En este contexto de dar, ἁπλῶς apunta a una donación abundante y abierta. «Generosamente» capta bien ese matiz y evita reducirlo a mera «simplicidad».
- source_word: μὴ ὀνειδίζοντος
  english_pob_choice: without reproach
  chosen_spanish: sin reproche
  alternatives_spanish:
  - sin echar en cara
  - sin encontrarle falta
  lexicon: BDAG
  rationale: La construcción expresa que Dios no humilla ni reprende al que pide. «Sin reproche» preserva la formulación sobria del POB; las alternativas recogen el matiz de no echar en cara.
- source_word: δοθήσεται αὐτῷ
  english_pob_choice: it will be given to him
  chosen_spanish: le será dada
  alternatives_spanish:
  - se le dará
  - le será otorgada
  lexicon: BDAG
  rationale: El futuro pasivo promete respuesta divina. Se impersonaliza con «le será dada» para un español fluido y reverente, manteniendo como referente «sabiduría».
theological_decisions:
- issue: Lenguaje masculino singular representativo
  english_pob_reading: let him ask ... it will be given to him
  chosen_spanish_reading: pídala ... le será dada
  alternative_spanish_readings:
  - que pida ... se le dará
  - que la pida ... le será dada
  rationale: El griego usa singular masculino con valor genérico. En español, la forma exhortativa con objeto femenino resuelve el referente de «sabiduría» y mantiene la inclusividad representativa sin necesidad de pluralizar el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de ἁπλῶς aplicado a Dios
  english_pob_reading: generously
  chosen_spanish_reading: generosamente
  alternative_spanish_readings:
  - liberalmente
  - con sencillez
  rationale: El versículo presenta a Dios como dador abundante y no reprochador. «Generosamente» expresa ese carácter de manera natural y evita un giro que pudiera sonar a simpleza o informalidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés POB, que ajustó «ask from God» a «ask of God» para reflejar mejor παρά con genitivo. En español se optó por la solución natural «pedir a Dios», equivalente funcionalmente a esa revisión. También se preservó el sentido de διδόντος/ἁπλῶς como la disposición generosa de Dios, y se mantuvo la clausula final pasiva como promesa divina sin añadir explicaciones no presentes en el griego.
  spanish_consistency_notes:
  - Se usa «Dios» en lugar de una fórmula de reemplazo para el nombre divino, porque aquí el texto griego dice θεοῦ y no el tetragrámaton ni una cita explícita de YHWH.
  - Se mantiene «sabiduría» como término amplio, no reducido a ‘prudencia’, aunque la nota permite ese matiz contextual.
  - La forma «le será dada» conserva el pasivo divino y evita forzar un sujeto humano implícito.
  - El texto principal evita calcos innecesarios y busca lectura pública natural, manteniendo al mismo tiempo la estructura lógica del original.
