    text: O «sin encontrar falta». La idea es que Dios no avergüenza ni reprende al que pide.
    reason: lexical_alternative
  - marker: b
    text: El griego usa formas masculinas singulares con sentido representativo para cualquier persona entre ustedes.
    reason: cultural_note
  revision_rationale: 'Se corrigen las notas para que reflejen fielmente el rastro de auditoría y la evidencia griega: se elimina la glosa interpretativa innecesaria sobre «sabiduría», se conserva la alternativa léxica pertinente para μὴ ὀνειδίζοντος y se añade la nota sobre el singular representativo. También se mejora levemente la naturalidad de αἰτείτω con «que se la pida a Dios».'
