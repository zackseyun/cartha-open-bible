translation:
  language: es
  text: Pero sean hacedores de la palabra[a], y no oidores solamente, engañándose a sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deludiéndose» o «haciéndose caer en error por razonamientos falsos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γίνεσθε
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - háganse
  lexicon: BDAG
  rationale: El imperativo presente medio pide una conducta continua. En español, «sean» comunica bien la exhortación estable y natural, sin sobrecargar el matiz medio con una formulación artificiosa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste exhortativo con la frase anterior; «Pero» conserva el giro adversativo de manera directa y fluida.
- source_word: ποιηταὶ
  english_pob_choice: doers
  chosen_spanish: hacedores
  alternatives_spanish:
  - los que hacen
  - practicantes
  lexicon: BDAG
  rationale: «Hacedores» es un equivalente natural de ποιηταί y mantiene el contraste retórico con «oidores». «Practicantes» sonaría menos directo en este contexto.
- source_word: λόγου
  english_pob_choice: of the word
  chosen_spanish: de la palabra
  alternatives_spanish:
  - del mensaje
  - de la enseñanza
  lexicon: BDAG
  rationale: «Palabra» conserva la referencia bíblica de λόγος y la continuidad con el contexto inmediato de Santiago 1:21. «Palabra» es la opción más transparente y eclesialmente inteligible en español.
- source_word: ἀκροαταὶ μόνον
  english_pob_choice: hearers only
  chosen_spanish: solamente oidores
  alternatives_spanish:
  - oidores solo
  - meros oyentes
  lexicon: BDAG
  rationale: «Solamente oidores» reproduce la restricción de μόνον y mantiene el paralelo con «hacedores». «Oidores» funciona mejor que «oyentes» por su cercanía formal al sustantivo griego y al contraste moral del pasaje.
- source_word: παραλογιζόμενοι
  english_pob_choice: deceiving
  chosen_spanish: engañándose
  alternatives_spanish:
  - deludiéndose
  - razonándose a error
  lexicon: BDAG
  rationale: El participio connota autoengaño mediante razonamiento erróneo. «Engañándose» es claro y bíblicamente natural; la posible implicación de falsa argumentación se preserva en la nota alternativa.
- source_word: ἑαυτούς
  english_pob_choice: yourselves
  chosen_spanish: a sí mismos
  alternatives_spanish:
  - a ustedes mismos
  - a vosotros mismos
  lexicon: BDAG
  rationale: Reflexivo directo y natural en español neutro. «A sí mismos» preserva el auto-referente sin marcar dialecto regional.
theological_decisions:
- issue: Sentido de λόγος en Santiago 1:22
  english_pob_reading: '''the word'' as God''s spoken/received message, retaining biblical-theological resonance rather than reducing it to a generic ''message.'''
  chosen_spanish_reading: «la palabra» como la palabra recibida de Dios, no como un simple «mensaje» genérico.
  alternative_spanish_readings:
  - «el mensaje»
  - «la enseñanza»
  rationale: El contexto inmediato de Santiago 1:21 habla de la palabra implantada; por eso conviene mantener «palabra», que conserva la fuerza teológica y la continuidad literaria sin imponer una glosa más estrecha.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza del imperativo Γίνεσθε
  english_pob_reading: An ongoing exhortation to live as doers, not merely a one-time act.
  chosen_spanish_reading: Una exhortación continua a vivir como hacedores, no solo a realizar un acto puntual.
  alternative_spanish_readings:
  - «lleguen a ser hacedores»
  - «se conviertan en hacedores»
  rationale: El presente imperativo exige una conducta habitual. «Sean» transmite bien esa continuidad en español, sin volver el mandato más pesado de lo que el griego exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Revisión concordante con el último pase: no se requirieron cambios respecto del texto fuente auditado; se mantuvo la equivalencia óptima y la fuerza exhortativa del griego.'
  spanish_consistency_notes:
  - Se mantuvo «palabra» para λόγος, en coherencia con Santiago 1:21 y con la preferencia POB de preservar resonancia bíblica.
  - Se prefirió «oidores» sobre «oyentes» por correspondencia más directa con ἀκροαταί y por mantener el contraste estilístico con «hacedores».
  - El reflexivo «a sí mismos» preserva la auto-decepción del participio sin añadir explicación interpretativa al texto principal.
