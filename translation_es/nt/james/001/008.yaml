review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y la línea de la POB inglesa: ἀνὴρ como «hombre», δίψυχος como una expresión idiomática de división interior, ἀκατάστατος como «inestable», y ἐν πάσαις ταῖς ὁδοῖς αὐτοῦ como una metáfora abarcadora de la vida. Sin embargo, la nota alternativa no preserva fielmente el posesivo inclusivo del inglés («their ways»), porque repite «sus caminos» con posible antecedente ambiguo; conviene ajustar la alternativa española para que corresponda mejor al valor representativo.'
  spanish_quality_summary: El texto principal es natural, claro y digno en español bíblico contemporáneo. «De doble ánimo» y «en todos sus caminos» son expresiones plenamente legibles y adecuadas al registro. La única reparación necesaria es menor y afecta a la redacción de la nota, no al cuerpo del versículo.
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. La elección de «hombre» concuerda con la decisión documentada sobre lenguaje masculino representativo; «de doble ánimo» comunica bien δίψυχος sin calco torpe; «inestable» y «caminos» son buenas equivalencias contextuales.
  issues:
  - severity: low
    issue: La nota alternativa española no refleja con suficiente precisión el posesivo inclusivo del inglés auditado.
    rationale: La POB inglesa ofrece «a double-minded person, unstable in all their ways». En español, «una persona ... en todos sus caminos» suena menos natural por la discordancia semántica entre singular genérico y plural posesivo implícito; además, puede percibirse como una mera copia del texto principal. Una formulación como «inestable en todos sus caminos» sigue siendo posible, pero para una nota alternativa conviene mejorar la naturalidad y el valor representativo explícito.
  revised_spanish_text: un hombre de doble ánimo[a], inestable en todos sus caminos.
  revised_footnotes:
  - marker: a
    text: O «una persona de doble ánimo, inestable en todos sus propios caminos». El griego es masculino singular, pero probablemente tiene fuerza representativa.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se ajusta la nota para reflejar mejor la alternativa inclusiva documentada en la POB inglesa y evitar una redacción menos precisa en español.
