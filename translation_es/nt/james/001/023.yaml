translation:
  language: es
  text: Porque si alguno es oidor de la palabra y no hacedor, ese es como un hombre que mira su rostro natural[a] en un espejo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el rostro natural con que nació’. La frase griega es literalmente ‘el rostro de su nacimiento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροατὴς
  english_pob_choice: hearer
  chosen_spanish: oidor
  alternatives_spanish:
  - oyente
  - escuchador
  lexicon: BDAG
  rationale: ‘Oidor’ conserva el paralelismo verbal con ‘hacedor’ y mantiene el contraste ético de Santiago entre oír y hacer. ‘Oyente’ es más común, pero ‘oidor’ reproduce mejor la forma sustantiva agente del griego.
- source_word: λόγου
  english_pob_choice: of the word
  chosen_spanish: de la palabra
  alternatives_spanish:
  - del mensaje
  - de la Palabra
  lexicon: BDAG
  rationale: Se eligió ‘palabra’ porque traduce directamente λόγος y funciona con naturalidad en español. ‘Palabra’ mantiene la continuidad contextual con la enseñanza proclamada en Santiago.
- source_word: ποιητής
  english_pob_choice: doer
  chosen_spanish: hacedor
  alternatives_spanish:
  - cumplidor
  - el que hace
  - practicante
  lexicon: BDAG
  rationale: ‘Hacedor’ refleja el sustantivo agente del griego y preserva el contraste oír/hacer. ‘Cumplidor’ suaviza demasiado la fuerza lexical y ‘el que hace’ resulta más perifrástico.
- source_word: ἔοικεν
  english_pob_choice: is like
  chosen_spanish: es semejante
  alternatives_spanish:
  - se parece
  - es como
  lexicon: BDAG
  rationale: ‘Es semejante’ es una equivalencia idiomática clara en español y conserva el valor comparativo del verbo sin perder solemnidad.
- source_word: ἀνδρὶ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  lexicon: BDAG
  rationale: Se mantiene el masculino específico del griego ἀνήρ, conforme al criterio de precisión de género del proyecto. En contexto, la comparación sigue siendo representativa para el lector.
- source_word: κατανοοῦντι
  english_pob_choice: looking at
  chosen_spanish: que mira
  alternatives_spanish:
  - que contempla
  - que observa
  - que examina
  lexicon: BDAG
  rationale: El participio indica atención consciente. ‘Que mira’ conserva la imagen sin sobrecargar el verso; el adverbio ‘natural’ ayuda a completar el sentido en español junto con el objeto directo.
- source_word: τὸ πρόσωπον
  english_pob_choice: the face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - el rostro
  lexicon: BDAG
  rationale: ‘Rostro’ es natural y digno en español bíblico contemporáneo. Se conserva el posesivo porque el griego lo expresa con αὐτοῦ.
- source_word: τῆς γενέσεως αὐτοῦ
  english_pob_choice: of his birth / his natural face
  chosen_spanish: natural
  alternatives_spanish:
  - de su nacimiento
  - de su origen
  - nacido con él
  lexicon: BDAG
  rationale: La POB inglesa resolvió la tensión entre literalidad e idiomaticidad como ‘his natural face.’ En español, ‘natural’ comunica mejor esa idea y evita una construcción extraña como ‘rostro de su nacimiento’, sin borrar la metáfora de origen corporal.
- source_word: ἐν ἐσόπτρῳ
  english_pob_choice: in a mirror
  chosen_spanish: en un espejo
  alternatives_spanish:
  - ante un espejo
  - en un espejo de mano
  lexicon: BDAG
  rationale: ‘Espejo’ es el equivalente moderno claro de ἔσοπτρον y reproduce la imagen del texto con naturalidad.
theological_decisions:
- issue: 'El matiz de τῆς γενέσεως αὐτοῦ: literalidad frente a sentido natural'
  english_pob_reading: Or 'the natural face he was born with.' The Greek phrase is literally 'the face of his birth.'
  chosen_spanish_reading: rostro natural
  alternative_spanish_readings:
  - rostro de su nacimiento
  - rostro con que nació
  - rostro de su origen
  rationale: Se preserva la tensión documentada entre la forma literal y el sentido idiomático. ‘Rostro natural’ comunica el significado contextual sin perder la referencia al griego, mientras que la nota mantiene abierta la alternativa más literal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor masculino de ἀνδρὶ
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  rationale: Se conserva el masculino específico del griego para no neutralizar indebidamente el sustantivo ἀνήρ. En la comparación de Santiago, el masculino funciona representativamente sin cambiar el sentido ético general.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una versión demasiado literal de la frase final y prefirió ‘his natural face’ por mayor precisión y naturalidad. La presente redacción sigue esa revisión, pero mantiene una nota que preserva la alternativa más literal del griego.
  spanish_consistency_notes:
  - Se mantiene ‘palabra’ para λόγος, en continuidad con el uso de Santiago y con la decisión POB inglesa.
  - Se usa ‘oidor/hacedor’ para conservar el contraste agentivo del verso.
  - Se evita ‘SEÑOR’ u otras sustituciones no presentes en este pasaje.
  - ‘Rostro natural’ traduce el sentido revisado de τῆς γενέσεως αὐτοῦ sin borrar la literalidad documentada en la nota.
