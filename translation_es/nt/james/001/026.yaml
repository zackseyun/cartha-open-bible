translation:
  language: es
  text: Si alguien piensa que es religioso[a] y no le pone freno a su lengua[b], sino que engaña su corazón, la religión de esa persona es vana[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘parece ser religioso’.
    reason: lexical_alternative
  - marker: b
    text: El griego dice ‘poner brida a su lengua’, conservando la imagen de una brida usada para controlar a un animal.
    reason: lexical_alternative
  - marker: c
    text: O ‘inútil’ o ‘sin valor’.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_spanish: piensa
  alternatives_spanish:
  - cree
  - se imagina
  - parece
  lexicon: BDAG
  rationale: ‘Piensa’ comunica la evaluación subjetiva de la propia condición religiosa, como en la decisión inglesa ‘thinks’, sin reducirlo a mera apariencia externa.
- source_word: θρησκὸς
  english_pob_choice: religious
  chosen_spanish: religioso
  alternatives_spanish:
  - devoto
  - observante
  lexicon: BDAG
  rationale: ‘Religioso’ conserva el valor adjetival y el vínculo directo con θρησκεία, manteniendo la crítica a la práctica religiosa profesada.
- source_word: χαλιναγωγῶν
  english_pob_choice: bridling
  chosen_spanish: refrena
  alternatives_spanish:
  - frena
  - controla
  - domina
  lexicon: BDAG
  rationale: Se evita una calca rígida, pero ‘refrena’ conserva la imagen de contener y gobernar la lengua, que el inglés POB preserva con ‘bridling’.
- source_word: γλῶσσαν αὐτοῦ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su habla
  - su boca
  lexicon: BDAG
  rationale: ‘Lengua’ mantiene la metáfora concreta del griego y su conexión temática con Santiago 3:2; en español resulta natural y fiel al cuadro físico.
- source_word: ἀπατῶν
  english_pob_choice: deceiving
  chosen_spanish: engaña
  alternatives_spanish:
  - seduce
  - ilude
  - defrauda
  lexicon: BDAG
  rationale: ‘Engaña’ es el equivalente directo y claro para la acción de autoengaño o engaño interior expresada por el participio.
- source_word: καρδίαν αὐτοῦ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - sí mismo
  lexicon: BDAG
  rationale: Se conserva ‘corazón’ como sede interior de pensamiento y voluntad; el español bíblico entiende naturalmente esta imagen sin necesidad de abstracción.
- source_word: τούτου
  english_pob_choice: this person's
  chosen_spanish: de ese tal
  alternatives_spanish:
  - de esta persona
  - de ese hombre
  lexicon: BDAG
  rationale: ‘De ese tal’ transmite con naturalidad la referencia demostrativa despectiva o evaluativa del griego, sin perder el enlace con el tipo de persona descrito.
- source_word: μάταιος
  english_pob_choice: worthless
  chosen_spanish: vana
  alternatives_spanish:
  - inútil
  - sin valor
  - vacía
  lexicon: BDAG
  rationale: ‘Vana’ recoge la fuerza de ματαιος con un registro bíblico y solemne; en español puede abarcar inutilidad y falta de realidad/eficacia.
- source_word: ἡ θρησκεία
  english_pob_choice: religion
  chosen_spanish: la religión
  alternatives_spanish:
  - la práctica religiosa
  - la observancia religiosa
  lexicon: BDAG
  rationale: ‘Religión’ preserva el vínculo léxico con θρησκὸς y θρησκεία. El contexto aclara que no se condena la religión en sí, sino su invalidez cuando la lengua no es refrenada.
theological_decisions:
- issue: Referencia genérica masculina singular
  english_pob_reading: If anyone thinks he is religious ... his tongue ... his heart
  chosen_spanish_reading: Si alguien piensa que es religioso ... su lengua ... su corazón
  alternative_spanish_readings:
  - Si alguien piensa que es religioso ... su lengua ... su corazón
  rationale: El griego usa formas masculinas singulares con valor genérico. En español, ‘alguien’ cubre el alcance universal y ‘su’ mantiene la construcción singular representativa sin necesidad de marcar género explícitamente en cada miembro.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido de θρησκεία/θρησκός
  english_pob_reading: religious / religion
  chosen_spanish_reading: religioso / la religión
  alternative_spanish_readings:
  - devoto / devoción
  - observante / observancia
  rationale: La pareja ‘religioso / religión’ preserva el enlace lexical entre el adjetivo y el sustantivo, y mantiene la evaluación de la práctica religiosa profesada que Santiago está cuestionando.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La versión española corrige la validación anterior asegurando que cada marcador de nota aparece exactamente en el texto: [a] en ‘religioso’, [b] en ‘lengua’, y [c] en ‘vana’. Se mantiene la lectura óptima del audit trail inglés sin añadir glosa innecesaria al contenido del versículo.'
  spanish_consistency_notes:
  - Se conservó el paralelismo entre θρησκὸς y θρησκεία con ‘religioso’ / ‘religión’.
  - ‘Refrena su lengua’ mantiene la metáfora corporal sin trasladarla a una abstracción excesiva.
  - ‘Ese tal’ reproduce el valor evaluativo del demostrativo τούτου con naturalidad española.
  - Se evitó ‘siervo’ o ‘piedad’ porque no están sustentados por el audit trail para este versículo.
