- from: Si alguien piensa que es religioso[a] y no refrena su lengua[b], sino que engaña su corazón, la religión de ese tal es vana[c].
  to: Si alguien piensa que es religioso[a] y no le pone freno a su lengua[b], sino que engaña su corazón, la religión de esa persona es vana[c].
  rationale: Se ajusta τούτου a un español más natural (‘de esa persona’), se preserva más claramente la metáfora de χαλιναγωγῶν con ‘poner freno a su lengua’, y se corrige la nota b para que refleje con precisión la explicación auditada. También se mejora la nota c para evitar repetir ‘vana’ como alternativa de sí misma.
