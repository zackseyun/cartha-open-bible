base_translation:
  language: en
  yaml_path: translation/nt/james/001/027.yaml
  text: 'Religion that is pure and undefiled before God the Father is this: to care for orphans and widows in their affliction[b][a], and to keep oneself unstained from the world.'
  footnotes:
