    rationale: Aunque es fiel al sentido de τηρεῖν ἑαυτόν, en español general resulta menos natural que «mantenerse» o «conservarse» en una máxima ética. «Mantenerse sin mancha del mundo» conserva mejor la fluidez y el valor genérico.
