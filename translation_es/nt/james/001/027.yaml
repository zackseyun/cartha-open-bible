translation:
  language: es
  text: 'La religión[a] pura y sin mancha delante de Dios el Padre es esta: cuidar[b] de los huérfanos y de las viudas en su aflicción, y mantenerse sin mancha[c] del mundo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culto» o «devoción religiosa»; θρησκεία aquí se refiere a la práctica religiosa visible, no a la fe en abstracto.
    reason: lexical_alternative
  - marker: b
    text: O «visitar» a los huérfanos y a las viudas en su aflicción»; el verbo griego puede incluir tanto visitarlos como atenderlos activamente.
    reason: lexical_alternative
  - marker: c
    text: «El mundo» aquí se refiere al orden moral corrupto opuesto a Dios, no a la creación en sí.
    reason: cultural_note
lexical_decisions:
- source_word: θρησκεία
  english_pob_choice: Religion
  chosen_spanish: religión
  alternatives_spanish:
  - devoción religiosa
  - culto
  lexicon: BDAG
  rationale: θρησκεία se refiere aquí a la práctica religiosa visible, no a la fe en abstracto. En español, «religión» comunica con naturalidad esa dimensión de piedad practicada y mantiene la correspondencia con la lectura auditada en inglés.
- source_word: καθαρὰ
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - limpia de todo
  lexicon: BDAG
  rationale: «Pura» es la forma más natural en español para la pureza moral o religiosa y conserva el paralelismo con «sin mancha».
- source_word: ἀμίαντος
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin contaminación
  - inmaculada
  lexicon: BDAG
  rationale: La imagen es de pureza no contaminada; «sin mancha» reproduce bien el matiz moral y cultual sin sonar forzado en español. Se mantiene la tensión entre pureza interior y conducta visible.
- source_word: παρὰ τῷ θεῷ καὶ πατρὶ
  english_pob_choice: before God the Father
  chosen_spanish: delante de Dios el Padre
  alternatives_spanish:
  - ante Dios el Padre
  - a los ojos de Dios el Padre
  lexicon: BDAG
  rationale: παρά con dativo expresa evaluación/presencia. «Delante de» es claro y digno en español. La frase articula «Dios el Padre» como una sola referencia apposicional, tal como sugiere el artículo único en griego.
- source_word: ἐπισκέπτεσθαι
  english_pob_choice: to care for
  chosen_spanish: cuidar de
  alternatives_spanish:
  - visitar
  - atender
  lexicon: BDAG
  rationale: El verbo puede incluir visitar, pero en este contexto implica ayuda activa y compasiva. «Cuidar de» comunica mejor esa atención práctica que una visita meramente social.
- source_word: ὀρφανοὺς
  english_pob_choice: orphans
  chosen_spanish: huérfanos
  alternatives_spanish:
  - niños huérfanos
  - desamparados
  lexicon: BDAG
  rationale: «Huérfanos» es el equivalente directo, breve y plenamente entendible en español.
- source_word: χήρας
  english_pob_choice: widows
  chosen_spanish: viudas
  alternatives_spanish:
  - mujeres viudas
  lexicon: BDAG
  rationale: Equivalente directo y natural; mantiene la pareja social vulnerable del texto.
- source_word: ἐν τῇ θλίψει αὐτῶν
  english_pob_choice: in their affliction
  chosen_spanish: en su aflicción
  alternatives_spanish:
  - en su angustia
  - en su tribulación
  lexicon: BDAG
  rationale: θλῖψις puede abarcar aflicción, angustia o presión opresiva. «Aflicción» conserva el peso bíblico y la gravedad del término sin volverlo arcaico.
- source_word: ἄσπιλον
  english_pob_choice: unstained
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculado
  - sin contaminación
  lexicon: BDAG
  rationale: Con τηρεῖν ἑαυτόν, la imagen es la de permanecer libre de contaminación moral. «Sin mancha» mantiene la misma metáfora que ya aparece en la primera cláusula y suena natural en español.
- source_word: ἑαυτὸν
  english_pob_choice: oneself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - uno mismo
  - a sí
  lexicon: BDAG
  rationale: El infinitivo moral es de valor general; «a sí mismo» conserva el reflejo reflexivo y evita restringir el sentido a un varón concreto.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: guardarse
  alternatives_spanish:
  - mantenerse
  - conservarse
  lexicon: BDAG
  rationale: «Guardarse» reproduce la idea de vigilancia activa sobre la propia conducta. En español encaja bien con «sin mancha» y con el tono exhortativo del pasaje.
- source_word: ἀπὸ τοῦ κόσμου
  english_pob_choice: from the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de este mundo
  - del orden del mundo
  lexicon: BDAG
  rationale: Se conserva «el mundo» como en el texto auditado en inglés, sin explicitar en el cuerpo principal que se trata del orden moral corrupto. Eso preserva la tensión teológica y evita sobreinterpretar el término.
theological_decisions:
- issue: Sentido de κόσμος en el contexto ético
  english_pob_reading: Retain 'the world' in the main text as the sphere of moral contamination opposed to God, without expanding it to material creation or society as such.
  chosen_spanish_reading: Mantener «el mundo» en el texto principal como esfera de contaminación moral opuesta a Dios, sin ampliar el sentido a la creación material o a la sociedad en general.
  alternative_spanish_readings:
  - el orden corrupto del mundo
  - la mundanalidad
  - la sociedad secular
  rationale: El griego usa κόσμος en sentido ético, pero hacerlo explícito en la línea principal interpretaría más de lo que el texto dice. Mantener «el mundo» conserva la tensión teológica y permite explicitar el matiz en nota.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Alcance de ἐπισκέπτεσθαι
  english_pob_reading: The verb can include both visiting and actively caring for them.
  chosen_spanish_reading: «Cuidar de» en el texto principal, con la posibilidad de «visitar» como matiz alternativo.
  alternative_spanish_readings:
  - visitar
  - atender y cuidar de
  rationale: La forma verbal griega no describe solo una visita social; en este contexto implica atención efectiva. La decisión principal evita reducir el mandato a una visita ocasional y preserva el componente práctico.
  doctrine_reference: BDAG / lexical decision on ἐπισκέπτομαι
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del tramo inglés y no introduce cambios de revisión relevantes; se conserva la estructura sintáctica principal, la pareja «pura / sin mancha» y la tensión ética de κόσμος. Se ha optado por una formulación española más natural para ἐπισκέπτεσθαι («cuidar de») sin perder la alternativa reconocida por el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Dios el Padre» para reflejar la apposición del griego y evitar convertirla en dos referentes separados.
  - Se conserva «el mundo» en el cuerpo principal y se reserva la explicación ética para la nota.
  - «Sin mancha» se usa tanto para ἀμίαντος como para ἄσπιλον, reproduciendo el paralelismo retórico del verso.
  - La sintaxis española respeta la estructura de máximas del original sin añadir sujetos o explicaciones ajenas al texto.
