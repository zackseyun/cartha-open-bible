    text: Or 'to visit orphans and widows in their affliction'; the Greek verb can include both visiting and actively caring for them.
    reason: lexical_alternative
  - marker: b
    text: '''The world'' here refers to the morally corrupt order opposed to God, not to creation itself.'
    reason: cultural_note
