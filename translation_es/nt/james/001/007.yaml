translation:
  language: es
  text: Porque ese hombre no debe suponer[a] que recibirá nada del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esa persona». El griego está en masculino singular («ese hombre»), pero se refiere representativamente al individuo que duda en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γὰρ
  english_pob_choice: For ... must not
  chosen_spanish: Porque ... no debe
  alternatives_spanish:
  - Pues ... no debe
  - Porque ... no debe pensarse
  lexicon: BDAG
  rationale: γάρ introduce la explicación del versículo anterior; «Porque» conserva ese enlace. μή con la forma exhortativa/prohibitiva se expresa de manera natural en español con «no debe», manteniendo el carácter de advertencia sin volverlo mecánico.
- source_word: οἰέσθω
  english_pob_choice: suppose
  chosen_spanish: pensar
  alternatives_spanish:
  - suponer
  - imaginar
  - creer
  lexicon: BDAG
  rationale: οἴομαι puede significar 'pensar' o 'suponer'. «Pensar» es natural en español y comunica la postura mental que se prohíbe. «Suponer» sería más literal, pero puede sonar más marcado de lo necesario en español contemporáneo.
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  english_pob_choice: that man
  chosen_spanish: ese hombre
  alternatives_spanish:
  - esa persona
  - aquel hombre
  lexicon: BDAG
  rationale: El griego es masculino singular y remite de modo representativo al individuo que duda en el contexto inmediato. «Ese hombre» conserva la deixis y el género gramatical sin suavizarlo a una forma neutral que borre ese rasgo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido del pensamiento prohibido. En español, «que» es la forma natural y directa.
- source_word: λήμψεταί
  english_pob_choice: he will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  - le tocará
  lexicon: BDAG
  rationale: El futuro de λαμβάνω se traduce de manera estándar por «recibirá», especialmente con el complemento «del Señor», donde el matiz de recepción es claro y formal.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - nada
  - alguna cosa
  lexicon: BDAG
  rationale: En contexto negativo, τι expresa una expectativa de cualquier cosa. «Algo» conserva el sentido de una cosa cualquiera sin forzar una frase más pesada como «nada»; la negación está en el verbo de la cláusula principal.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - del Maestro
  lexicon: BDAG
  rationale: παρά con genitivo señala procedencia; en español se expresa naturalmente con «de». κύριος se mantiene como «Señor», conforme al contexto y a la convención del proyecto para esta forma en traducción española.
theological_decisions:
- issue: Referencia de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el Señor Dios
  rationale: El griego dice κύριος sin precisar más. «El Señor» preserva la forma del texto y evita especificar más de lo que el versículo afirma explícitamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor representativo de ὁ ἄνθρωπος ἐκεῖνος
  english_pob_reading: that man
  chosen_spanish_reading: ese hombre
  alternative_spanish_readings:
  - esa persona
  rationale: La forma griega es masculina singular y funciona de manera representativa para el individuo indeciso descrito antes. Se conserva el género gramatical en español, con la observación correspondiente en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto sigue de cerca el original griego y concuerda con el audit trail inglés: enlace causal con γάρ, advertencia con μή, valor representativo de ὁ ἄνθρωπος ἐκεῖνος, y referencia indefinida de τι sin intensificar el sentido más allá del contexto.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος de modo consistente con el proyecto.
  - Se evita suavizar el masculino singular del griego en el texto principal; la alternativa inclusiva queda en nota.
  - «Algo» reproduce la indefinición de τι en una cláusula negativa sin cambiar el tono de advertencia.
