review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: γάρ como explicación («Porque»), la prohibición con οἰέσθω, el referente masculino singular representativo («ese hombre»), el futuro «recibirá» y «del Señor» para παρὰ τοῦ κυρίου. Sin embargo, «pensar» para οἰέσθω es un poco más débil e inespecífico que «suponer», y «algo» en español puede sonar menos claramente abarcador que «nada» en esta construcción.'
  spanish_quality_summary: El español es claro y natural. No obstante, «no debe pensar que recibirá algo» suena algo menos idiomático y menos enfático que «no debe suponer que recibirá nada». La revisión mejora precisión semántica y fluidez sin perder dignidad ni legibilidad.
  glossary_alignment: «Señor» para κύριος está bien alineado con el proyecto. La conservación de «ese hombre» con nota alternativa también sigue la política de género del POB. No hay conflicto con los términos doctrinales por defecto.
  issues:
  - severity: medium
    issue: οἰέσθω traducido como «pensar»
    rationale: Aunque posible, «pensar» es más amplio y menos ajustado al matiz de ‘suponer/imaginarse’ documentado en el audit trail inglés. «Suponer» reproduce mejor el acto mental advertido por el texto.
  - severity: medium
    issue: τι en contexto negativo traducido como «algo»
    rationale: En español, con esta estructura, «no debe suponer que recibirá nada» comunica mejor la fuerza de negación total (‘anything’) que «algo», que puede sonar menos enfático o ligeramente ambiguo para algunos lectores.
  revised_spanish_text: Porque ese hombre no debe suponer[a] que recibirá nada del Señor.
  revised_footnotes:
  - marker: a
    text: O «esa persona». El griego está en masculino singular («ese hombre»), pero se refiere representativamente al individuo que duda en el versículo anterior.
    reason: lexical_alternative
