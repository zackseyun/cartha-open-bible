- from: Porque ese hombre no debe pensar[a] que recibirá algo del Señor.
  to: Porque ese hombre no debe suponer[a] que recibirá nada del Señor.
  rationale: Se ajusta «pensar» a «suponer» para reflejar mejor οἰέσθω según la decisión léxica auditada, y «algo» a «nada» para expresar con mayor naturalidad en español la fuerza abarcadora de τι dentro de una expectativa negada. Se conserva «ese hombre» y la nota alternativa, así como «del Señor» para κύριος.
