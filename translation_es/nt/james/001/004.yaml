    rationale: ἐν μηδενὶ λειπόμενοι describe no quedar faltos o deficientes en ningún respecto. 'Sin carecer de nada' o 'sin que les falte nada' puede expresar mejor ese matiz según el registro elegido.
  - severity: low
    issue: La nota al pie puede pulirse en español.
    rationale: '''Una realización llevada a su fin'' es comprensible, pero algo pesada. Puede expresarse con más naturalidad sin perder el contenido léxico documentado.'
