  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Perseverancia', 'maduros' y 'completos' concuerdan con las decisiones documentadas. La nota al pie preserva adecuadamente la alternativa léxica, aunque conviene ajustar levemente su redacción para mayor naturalidad en español.
