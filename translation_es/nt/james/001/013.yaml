    rationale: Aunque intenta preservar la compacidad de ἀπείραστός, la secuencia «es no tentable» resulta torpe. «No es tentable» conserva mejor la fuerza adjetival con español natural y digno.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica la traducción de ἀπείραστός ἐστιν κακῶν, no la expresión «Que nadie». Según las instrucciones, el marcador debe aparecer en la palabra o frase pertinente del texto.
  revised_spanish_text: 'Que nadie que está siendo tentado diga: «Estoy siendo tentado por Dios», porque Dios no es tentable[a] por el mal, y él mismo no tienta a nadie.'
  revised_footnotes:
