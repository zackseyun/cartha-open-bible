  text: μηδεὶς πειραζόμενος λεγέτω ὅτι Ἀπὸ θεοῦ πειράζομαι· ὁ γὰρ θεὸς ἀπείραστός ἐστιν κακῶν, πειράζει δὲ αὐτὸς οὐδένα.
base_translation:
  language: en
  yaml_path: translation/nt/james/001/013.yaml
  text: Let no one who is being tempted say[a], “I am being tempted by God,” for God is untemptable by evil, and he himself tempts no one.
  footnotes:
  - marker: a
    text: Or, more smoothly, 'for God cannot be tempted by evil.' The Greek reads more literally, 'for God is untemptable by evils.'
    reason: lexical_alternative
