translation:
  language: es
  text: 'Que nadie que está siendo tentado diga: «Estoy siendo tentado por Dios», porque Dios no es tentable[a] por el mal, y él mismo no tienta a nadie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más suavemente: «porque Dios no puede ser tentado por el mal». El griego dice más literalmente: «porque Dios no es tentable por el mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Nadie
  - Que no diga nadie
  lexicon: BDAG
  rationale: 'La construcción negativa con imperativo se expresa de manera natural en español con una prohibición impersonal: «Que nadie...». Conserva el tono exhortativo del griego sin volverlo rígido.'
- source_word: πειραζόμενος
  english_pob_choice: who is being tempted
  chosen_spanish: que está siendo tentado
  alternatives_spanish:
  - cuando es tentado
  - siendo tentado
  - que es tentado
  lexicon: BDAG
  rationale: Se mantiene el participio presente pasivo y la idea de proceso continuo. «Tentado» es preferible aquí a «probado» por el contexto inmediato de deseo y pecado.
- source_word: λεγέτω
  english_pob_choice: say
  chosen_spanish: diga
  alternatives_spanish:
  - esté diciendo
  - declare
  - afirme
  lexicon: BDAG
  rationale: 'El imperativo de tercera persona se vierte con un subjuntivo exhortativo natural en español: «diga». Evita una calca demasiado literal y conserva la prohibición.'
- source_word: Ἀπὸ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de Dios
  - desde Dios
  lexicon: BDAG
  rationale: Aunque ἀπό puede significar «de / desde», en esta construcción expresa origen o agencia de la tentación alegada. «Por Dios» comunica mejor en español la acusación que se está negando.
- source_word: πειράζομαι
  english_pob_choice: I am being tempted
  chosen_spanish: estoy siendo tentado
  alternatives_spanish:
  - soy tentado
  - estoy siendo probado
  lexicon: BDAG
  rationale: Se preserva la voz pasiva y el matiz progresivo. En este contexto, «tentado» comunica la solicitación moral que Santiago niega como procedente de Dios.
- source_word: ἀπείραστός
  english_pob_choice: untemptable
  chosen_spanish: no tentable
  alternatives_spanish:
  - imposible de tentar
  - no susceptible de tentación
  - inaccesible al mal
  lexicon: BDAG
  rationale: La forma griega es rara y compacta; «no tentable» intenta reflejar esa densidad adjetival sin convertirla en una perífrasis interpretativa. Se evita borrar la tensión léxica documentada en el inglés auditado.
- source_word: κακῶν
  english_pob_choice: by evil
  chosen_spanish: por el mal
  alternatives_spanish:
  - por males
  - por cosas malas
  - con el mal
  lexicon: BDAG
  rationale: El genitivo plural κακῶν se entiende aquí de manera cualitativa/relacional, como en el inglés revisado. «El mal» suena más natural que «los males» y conserva la fuerza moral del contexto.
- source_word: πειράζει
  english_pob_choice: tempts
  chosen_spanish: tienta
  alternatives_spanish:
  - prueba
  - somete a prueba
  lexicon: BDAG
  rationale: Se mantiene la misma familia verbal que en los miembros anteriores para no diluir el contraste del versículo. «Tienta» es la opción más fiel al rechazo de toda implicación divina en la seducción al mal.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - Dios mismo
  - él
  lexicon: BDAG
  rationale: 'El pronombre enfático se conserva explícitamente en español para reflejar el énfasis del griego: Dios, personalmente, no tienta a nadie.'
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - nadie
  - a ninguna persona
  lexicon: BDAG
  rationale: Como objeto directo de «tienta», en español la forma natural es «a nadie». Mantiene la universalidad negativa del original.
theological_decisions:
- issue: Cómo traducir la familia πειράζω en este versículo
  english_pob_reading: Use 'tempt/tempted' throughout the verse rather than 'test/tested.'
  chosen_spanish_reading: Usar «tentar/tentado» en todo el versículo, no «probar/probado».
  alternative_spanish_readings:
  - Usar «probar/probado» en una o más apariciones
  - Distinguir entre «probar» y «tentar»
  rationale: En este pasaje, Santiago niega que Dios sea la fuente de la incitación moral al mal. Traducir consistentemente con «tentar» preserva esa línea argumental y evita mezclarla con el tema bíblico distinto de la prueba divina.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Sentido de ἀπείραστός ἐστιν κακῶν
  english_pob_reading: Translate as 'God is untemptable by evil.'
  chosen_spanish_reading: Traducir como «Dios es no tentable por el mal».
  alternative_spanish_readings:
  - Dios no puede ser tentado por el mal
  - Dios es inaccesible al mal
  - Dios no es susceptible de tentación por el mal
  rationale: La expresión griega es difícil y compacta. «No tentable» conserva el peso adjetival y evita suavizar demasiado el enunciado; al mismo tiempo, no añade una explicación que cierre la ambigüedad del original más de lo necesario.
  doctrine_reference: 'Affirmations: historic ecumenical Christian orthodoxy'
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del inglés POB, que prefirió «by evil» frente a «by evils» por naturalidad. En español, eso se refleja con «por el mal», manteniendo la rareza compacta de ἀπείραστός y la línea argumental del versículo.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, no una sustitución por «Señor», porque el texto griego nombra a Dios directamente.
  - 'Se mantiene una sola familia léxica para πειράζω: «tentar/tentado/tienta», de acuerdo con la decisión inglesa y con el contexto de la perícopa.'
  - Se conserva el pronombre enfático «él mismo» para αὐτός.
  - La nota al pie ofrece la alternativa más natural en español sin borrar la forma más literal del texto principal.
