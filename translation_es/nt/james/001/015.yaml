base_translation:
  language: en
  yaml_path: translation/nt/james/001/015.yaml
  text: Then desire[a], after it has conceived, gives birth to sin; and sin, when it is fully grown[b], brings forth death.
  footnotes:
  - marker: a
    text: Or 'having conceived.' The Greek participle keeps the conception imagery tightly linked to desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'when it is completed' or 'when it has come to maturity.'
    reason: lexical_alternative
