translation:
  language: es
  text: Luego el deseo[a], cuando ha concebido, da a luz al pecado; y el pecado, cuando ha llegado a su madurez[b], engendra la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo concebido». El participio griego mantiene muy unida la imagen de la concepción con el deseo.
    reason: lexical_alternative
  - marker: b
    text: O «cuando está completo» o «cuando ha llegado a la madurez».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Luego
  alternatives_spanish:
  - Entonces
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia lógica y temporal en la progresión de la tentación. «Luego» suena natural en español y mantiene el valor consecutivo sin añadir énfasis excesivo.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - pasión
  - codicia
  - lujuria
  lexicon: BDAG
  rationale: «Deseo» conserva el sentido amplio del término. «Lujuria» o «codicia» estrechan innecesariamente el alcance; «pasión» puede sonar demasiado genérico o positivo en español.
- source_word: συλλαβοῦσα
  english_pob_choice: after it has conceived
  chosen_spanish: cuando ha concebido
  alternatives_spanish:
  - habiendo concebido
  - después de haber concebido
  lexicon: BDAG
  rationale: La imagen de concepción se conserva de manera idiomática. El participio aoristo expresa una acción previa respecto del verbo principal; «cuando ha concebido» hace visible esa relación en español.
- source_word: τίκτει
  english_pob_choice: gives birth to
  chosen_spanish: da a luz a
  alternatives_spanish:
  - engendra
  - alumbra
  lexicon: BDAG
  rationale: Sostiene la metáfora del parto de forma clara y natural. «Da a luz a» comunica la imagen con transparencia; «engendra» queda reservado para el segundo miembro del paralelismo por variedad estilística.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado moral
  lexicon: BDAG
  rationale: «Pecado» es el equivalente normal y exacto en español para ἁμαρτία en este contexto.
- source_word: ἀποτελεσθεῖσα
  english_pob_choice: when it is fully grown
  chosen_spanish: cuando ha llegado a su madurez
  alternatives_spanish:
  - cuando está completo
  - cuando ha sido completado
  - cuando ha llegado a plenitud
  lexicon: BDAG
  rationale: La forma participial comunica culminación o madurez dentro de la metáfora orgánica. «Ha llegado a su madurez» preserva esa idea sin volverla demasiado técnica o mecánica.
- source_word: ἀποκύει
  english_pob_choice: brings forth
  chosen_spanish: engendra
  alternatives_spanish:
  - da a luz a
  - produce
  - trae
  lexicon: BDAG
  rationale: El verbo continúa la imaginería de nacimiento y generación. «Engendra» mantiene la fuerza metafórica y evita repetir exactamente la misma construcción que en el primer miembro.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte física
  - muerte espiritual
  - muerte eterna
  lexicon: BDAG
  rationale: El texto griego dice simplemente «muerte». Añadir un calificativo doctrinal restringiría indebidamente la amplitud del término.
theological_decisions:
- issue: Metáfora de concepción y nacimiento aplicada al deseo y al pecado
  english_pob_reading: Preserve James's personified conception-and-birth imagery without softening it into abstract causation.
  chosen_spanish_reading: Conservar la imaginería personificada de concepción y nacimiento sin reducirla a una mera causalidad abstracta.
  alternative_spanish_readings:
  - Entonces el deseo conduce al pecado, y el pecado conduce a la muerte.
  - El deseo produce pecado, y el pecado produce muerte.
  rationale: La metáfora es parte del argumento de Santiago; suavizarla perdería su fuerza retórica y su progresión orgánica. La traducción conserva la secuencia viviente de la imagen.
  doctrine_reference: 'Principio POB: preservar la tensión e imaginería del texto en lugar de resolverla mediante paráfrasis.'
- issue: Alcance de θάνατος
  english_pob_reading: Render simply as 'death' without specifying physical, spiritual, or eternal death.
  chosen_spanish_reading: Traducir simplemente «la muerte» sin especificar si es física, espiritual o eterna.
  alternative_spanish_readings:
  - muerte espiritual
  - muerte eterna
  rationale: El griego no especifica el tipo de muerte. Mantener la amplitud del término evita introducir una precisión doctrinal que el versículo no afirma de manera explícita.
  doctrine_reference: 'Principio POB: no importar al texto afirmaciones doctrinales que el original no expresa.'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de forma alta y no registran revisiones aplicadas; se conserva la misma metáfora de concepción, crecimiento y muerte sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «deseo» para ἐπιθυμία, coherente con el criterio POB de no estrechar innecesariamente el campo semántico.
  - Se conserva la metáfora de nacimiento con dos verbos distintos («da a luz» / «engendra») para reflejar el paralelismo sin sonar forzado en español.
  - Se evita traducir ἀποτελεσθεῖσα con un término puramente técnico como «completado», porque en español la imagen orgánica de madurez comunica mejor el sentido del pasaje.
  - Se usa «la muerte» sin adjetivos doctrinales, en línea con la lectura fuente-cercana del versículo.
