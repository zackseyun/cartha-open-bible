translation:
  language: es
  text: Porque se miró a sí mismo, se fue, y inmediatamente olvidó qué clase de persona[a] era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo era». La expresión griega se refiere a la clase o tipo de persona que era.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατενόησεν
  english_pob_choice: looked at
  chosen_spanish: se miró a sí mismo
  alternatives_spanish:
  - se observó
  - se contempló
  - se fijó en sí mismo
  lexicon: BDAG
  rationale: El verbo griego expresa observar o examinar atentamente. En este contexto del espejo, español natural pide una formulación reflexiva que conserve la acción concreta y el matiz de autoobservación sin añadir más de lo que el texto dice.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la comparación anterior. «Porque» mantiene esa relación causal/explicativa de manera clara en español.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a él mismo
  - a su propio ser
  lexicon: BDAG
  rationale: El pronombre reflexivo apunta directamente al sujeto. En español, «a sí mismo» comunica la referencia reflexiva de forma natural y fiel.
- source_word: ἀπελήλυθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  - ha ido
  lexicon: BDAG
  rationale: Aunque el perfecto griego puede sugerir estado resultante, en la secuencia narrativa española «se fue» reproduce el movimiento y fluye con el resto de la frase sin forzar una perífrasis más pesada.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio marca prontitud. «Enseguida» es una equivalencia natural y digna en español contemporáneo, con fuerza temporal clara.
- source_word: ἐπελάθετο
  english_pob_choice: forgot
  chosen_spanish: olvidó
  alternatives_spanish:
  - se olvidó
  - dejó de recordar
  lexicon: BDAG
  rationale: El verbo medio significa olvidar o dejar de recordar. «Olvidó» es la forma más directa; el sujeto sigue siendo implícito por la conjugación verbal.
- source_word: ὁποῖος ἦν
  english_pob_choice: what kind of person he was
  chosen_spanish: qué clase de persona era
  alternatives_spanish:
  - cómo era
  - qué tipo de persona era
  - cómo era él
  lexicon: BDAG
  rationale: La expresión griega pregunta por la cualidad o clase de ser, no solo por identidad. «Qué clase de persona era» preserva el valor cualitativo. Se evita un masculino genérico en español cuando el sentido es representativo.
theological_decisions:
- issue: Referencia genérica del sujeto en la analogía del espejo
  english_pob_reading: what kind of person he was
  chosen_spanish_reading: qué clase de persona era
  alternative_spanish_readings:
  - qué clase de hombre era
  - qué tipo de hombre era
  rationale: El griego usa masculino singular, pero la referencia funciona como ejemplo representativo. En español, «persona» mantiene el alcance genérico y evita introducir una marca masculina innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El paquete inglés no registra revisiones textuales; la draft española sigue el sentido del SBLGNT y del audit trail inglés, conservando la ironía narrativa del espejo y la alternativa cualitativa de ὁποῖος.
  spanish_consistency_notes:
  - Se usó «Porque» para mantener la conexión explicativa con el versículo anterior.
  - Se prefirió «persona» en la cláusula final para reflejar el sentido genérico y cualitativo del griego.
  - No se transliteró ningún término técnico porque aquí no aparece vocabulario con equivalente teológico fijado como Yahvé, Mesías o Espíritu.
