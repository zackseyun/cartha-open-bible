base_translation:
  language: en
  yaml_path: translation/nt/james/001/025.yaml
  text: But the one who has looked intently into the perfect law[a], the law of freedom[c][b], and has continued in it—not becoming a forgetful hearer but a doer of the work—this one will be blessed in his doing.
