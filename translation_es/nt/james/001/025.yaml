revisions:
- from: Pero el que ha mirado atentamente en la ley perfecta, la ley de la libertad[a], y ha perseverado en ella, no siendo un oyente olvidadizo[b] sino un hacedor de la obra[c], este será bienaventurado en su hacer.
  to: Pero el que ha mirado atentamente a la ley perfecta, la ley de la libertad[a], y ha perseverado en ella, no siendo un oyente olvidadizo[b] sino un hacedor de la obra[c], este será bienaventurado en lo que hace.
  rationale: 'Se hicieron dos ajustes menores para un español más natural y fiel: «ha mirado atentamente a la ley» reemplaza el giro poco idiomático «ha mirado atentamente en la ley», y «en lo que hace» reemplaza «en su hacer» para expresar con claridad ἐν τῇ ποιήσει αὐτοῦ sin rigidez excesiva. Se conservaron «la ley de la libertad», «oyente olvidadizo», «hacedor de la obra» y «bienaventurado» porque reflejan adecuadamente las decisiones léxicas y teológicas del expediente POB.'
