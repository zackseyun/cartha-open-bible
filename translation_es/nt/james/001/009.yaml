translation:
  language: es
  text: Pero el hermano[a] humilde gloríese en su exaltación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hermano o la hermana»; el griego tiene el singular masculino «hermano», que puede funcionar de modo representativo para un creyente.
    reason: lexical_alternative
  - marker: b
    text: O «en su elevada posición». La frase puede apuntar al estatus honrado del creyente humilde ante Dios, con posible referencia tanto a una inversión presente como futura.
    reason: alternative_reading
lexical_decisions:
- source_word: Καυχάσθω
  english_pob_choice: let ... boast
  chosen_spanish: gloríese
  alternatives_spanish:
  - boasté
  - presuma
  - tenga de qué gloriarse
  lexicon: BDAG
  rationale: El imperativo exhortativo pide una acción verbal fuerte. «Gloríese» conserva el valor de καυχάομαι sin rebajarlo a un simple «alegrarse», y en español puede entenderse como gloriarse/boast en sentido positivo por el contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Introduce un giro contrastivo respecto del contexto inmediato. «Pero» reproduce bien esa transición en español natural.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: the brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - el creyente
  - el hermano o hermana
  lexicon: BDAG
  rationale: El griego es masculino singular. En el texto principal se mantiene «el hermano» para reflejar la forma gramatical y el uso representativo posible en Santiago; la ampliación inclusiva se deja para nota.
- source_word: ὁ ταπεινὸς
  english_pob_choice: the lowly
  chosen_spanish: humilde
  alternatives_spanish:
  - de baja condición
  - pobre
  - abatido
  lexicon: BDAG
  rationale: En este contexto, en paralelo con el rico del v. 10, el término puede abarcar condición social baja y también humillación. «Humilde» es claro en español, pero la nota mantiene la amplitud semántica de «lowly».
- source_word: ἐν τῷ ὕψει αὐτοῦ
  english_pob_choice: in his exaltation
  chosen_spanish: en su exaltación
  alternatives_spanish:
  - en su elevada posición
  - en su honra
  - en su altura
  lexicon: BDAG
  rationale: '«Exaltación» preserva el sustantivo de altura/exaltación y deja abierta la tensión interpretativa del texto: honor presente ante Dios y posible reversión futura, sin reducirla a una sola lectura.'
theological_decisions:
- issue: Alcance de la «exaltación» del hermano humilde
  english_pob_reading: The phrase refers to the lowly brother's elevated status or honor before God, likely with social-reversal overtones, without restricting it to either present material uplift or only future eschatological exaltation.
  chosen_spanish_reading: La expresión señala la condición elevada u honrada del hermano humilde ante Dios, con posible trasfondo de reversión social, sin cerrarla ni a una prosperidad presente ni a una exaltación exclusivamente futura.
  alternative_spanish_readings:
  - elevación social presente
  - estado espiritual ante Dios
  - exaltación escatológica futura
  rationale: Santiago contrasta al humilde con el rico en vv. 9–10, por lo que la traducción debe conservar la amplitud de la reversión sin resolverla de manera demasiado específica. «Exaltación» deja abierta la tensión teológica documentada por la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Género de ἀδελφός
  english_pob_reading: Render as 'brother' in the main text, preserving the masculine singular form while recognizing representative force in context.
  chosen_spanish_reading: Se mantiene «el hermano» en el texto principal, conservando el masculino singular y su posible valor representativo para un creyente del grupo.
  alternative_spanish_readings:
  - el hermano o la hermana
  - el creyente
  rationale: La fuente griega es masculina singular. En español, «hermano» conserva la correspondencia formal y evita neutralizar el término sin base textual directa; la posible inclusión representativa se explicita en nota.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el paquete fuente; se sigue el último pase estable sin cambios, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se conserva «hermano» para reflejar el singular masculino del griego y la política de exactitud de género.
  - «Gloríese» se usa como equivalente idiomático de καυχάσθω sin suavizar su fuerza exhortativa.
  - «Exaltación» mantiene abierta la tensión entre honra ante Dios, reversión social y horizonte futuro.
  - La puntuación y la colocación de las notas siguen el estilo editorial del POB en español.
