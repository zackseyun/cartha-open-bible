translation:
  language: es
  text: Así hablen y así actúen, como quienes van a ser juzgados por la ley de la libertad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ley de libertad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de ese modo
  lexicon: BDAG
  rationale: Repite el adverbio de modo para conservar el paralelismo exhortativo de ambos imperativos. «Así» es natural en español y mantiene la fuerza retórica del griego.
- source_word: λαλεῖτε
  english_pob_choice: speak
  chosen_spanish: hablen
  alternatives_spanish:
  - hablen entre ustedes
  - hablen
  lexicon: BDAG
  rationale: Imperativo presente de segunda plural. «Hablen» comunica la exhortación moral con un verbo directo y dignamente idiomático; evita el matiz demasiado coloquial de «platiquen».
- source_word: ποιεῖτε
  english_pob_choice: act
  chosen_spanish: actúen
  alternatives_spanish:
  - obren
  - hagan
  - se conduzcan
  lexicon: BDAG
  rationale: «Actúen» funciona bien junto a «hablen» y destaca la conducta visible, como en el énfasis ético de Santiago. «Hagan» sería más literal pero menos preciso en español para conducta.
- source_word: ὡς
  english_pob_choice: as those who
  chosen_spanish: como quienes
  alternatives_spanish:
  - como los que
  - como personas que
  lexicon: BDAG
  rationale: La construcción participial pide explicitar la identidad o condición bajo la cual se mandan las acciones. «Como quienes» preserva esa relación sin sobreexplicar.
- source_word: διὰ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: Con el pasivo «ser juzgados», «por» es la forma más natural en español para expresar la agencia o norma bajo la cual ocurre el juicio, sin perder la relación instrumental del griego.
- source_word: νόμου ἐλευθερίας
  english_pob_choice: the law of freedom
  chosen_spanish: la ley de la libertad
  alternatives_spanish:
  - la ley de la libertad
  - la ley de libertad
  - la ley liberadora
  lexicon: BDAG
  rationale: Se conserva literalmente la expresión ya establecida en Santiago 1:25. «Ley de la libertad» mantiene la tensión teológica del sintagma sin resolverla a favor de una interpretación doctrinal específica.
- source_word: μέλλοντες
  english_pob_choice: are going to
  chosen_spanish: van a ser
  alternatives_spanish:
  - están por ser
  - están a punto de ser
  - van a ser
  lexicon: BDAG
  rationale: El participio de μέλλω con infinitivo comunica proximidad o expectativa futura. «Van a ser» suena natural en español y conserva el valor prospectivo.
- source_word: κρίνεσθαι
  english_pob_choice: be judged
  chosen_spanish: juzgados
  alternatives_spanish:
  - juzgados
  - evaluados
  - sometidos a juicio
  lexicon: BDAG
  rationale: El pasivo infinitivo de κρίνω se rinde con «ser juzgados». En la perífrasis española, «juzgados» preserva la referencia judicial y escatológica del contexto.
theological_decisions:
- issue: Sentido de «ley de la libertad» en Santiago
  english_pob_reading: Retain the phrase literally as 'the law of freedom' without interpreting it in the main text as Mosaic law, gospel, or a specific theological system.
  chosen_spanish_reading: Conservar «la ley de la libertad» sin aclararla en el texto principal como ley mosaica, evangelio o sistema doctrinal concreto.
  alternative_spanish_readings:
  - la ley que da libertad
  - la ley liberadora
  - el evangelio como ley de libertad
  rationale: El sintagma es teológicamente denso y debatido. La forma española debe retener esa tensión y no imponer una identificación que el griego no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: This draft follows the audited English POB revision that settled on the more natural judgment phrase «by the law of freedom»; the Spanish likewise uses a natural passive construction («van a ser juzgados por») while preserving the literal legal-theological expression «la ley de la libertad».
  spanish_consistency_notes:
  - Se mantiene «ley de la libertad» para concordar con Santiago 1:25 y conservar la unidad terminológica interna.
  - Se usa «por» con el pasivo «ser juzgados» para reflejar el valor natural de διὰ en español sin forzar «mediante» o «a través de».
  - Se evita «Cristo», «Señor» u otro vocabulario no presente en el versículo.
  - El tono es exhortativo y sobrio, apto para lectura eclesial amplia.
