translation:
  language: es
  text: ¿De qué provecho es[a], hermanos míos, si alguien dice que tiene fe[c], pero no tiene obras? ¿Puede esa fe salvarlo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hermanos y hermanas míos’. El griego usa el plural masculino ‘hermanos’ como forma representativa de dirigirse a la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: 'O ‘¿Puede la fe salvarlo?’. El griego dice literalmente ‘¿Puede la fe salvarlo?’, refiriéndose a la clase de fe recién mencionada: una fe declarada pero sin obras.'
    reason: alternative_reading
  - marker: c
    text: ‘Fe’ también puede traducirse como ‘confianza’ o, en algunos contextos, ‘fidelidad’; aquí ‘fe’ encaja mejor con la idea de una creencia o profesión alegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί ὄφελος
  english_pob_choice: What good is it
  chosen_spanish: ¿De qué provecho es
  alternatives_spanish:
  - ¿De qué sirve
  - ¿Qué provecho tiene
  lexicon: BDAG
  rationale: La pregunta retórica pide una equivalencia idiomática en español que conserve la idea de beneficio práctico o utilidad. '¿De qué provecho es' mantiene el matiz de ventaja/beneficio sin sonar forzado.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos y hermanas míos
  - mis hermanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural representativa del griego. 'Hermanos míos' es natural y fiel, y permite anotar la posible inclusión de la comunidad completa en la nota.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: '''Fe'' es el equivalente más directo y establecido para πίστις en este contexto de profesión alegada. Las alternativas existen, pero aquí el contraste con obras exige mantener el término teológico usual.'
- source_word: λέγῃ τις ἔχειν
  english_pob_choice: someone says he has
  chosen_spanish: si alguien dice que tiene
  alternatives_spanish:
  - si alguien afirma tener
  - si uno dice que tiene
  lexicon: BDAG
  rationale: La construcción expresa una afirmación profesada. 'Dice que tiene' sigue de cerca el griego y suena natural en español sin añadir una interpretación excesiva.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: '''Obras'' reproduce el léxico paulino/jacobeo tradicional y mantiene el contraste conceptual con ''fe'' en Santiago 2. En español bíblico resulta claro y preciso.'
- source_word: μὴ ἔχῃ
  english_pob_choice: does not have
  chosen_spanish: no tiene
  alternatives_spanish:
  - no posee
  - carece de
  lexicon: BDAG
  rationale: La negación de posesión se expresa de forma simple y directa. 'No tiene' reproduce la estructura sin sobrerrepresentar la ausencia.
- source_word: μὴ δύναται
  english_pob_choice: Can ... ?
  chosen_spanish: ¿Puede ...?
  alternatives_spanish:
  - ¿Acaso puede ...?
  - ¿Será capaz de ...?
  lexicon: BDAG
  rationale: La pregunta con μή espera respuesta negativa. En español, la interrogación directa preserva la fuerza retórica sin añadir un negativo explícito innecesario.
- source_word: ἡ πίστις
  english_pob_choice: that faith
  chosen_spanish: esa fe
  alternatives_spanish:
  - la fe
  - tal fe
  lexicon: BDAG
  rationale: '''Esa fe'' recoge el valor anafórico del artículo griego, remitiendo al tipo de fe recién descrito: una fe solamente declarada y sin obras. Evita universalizar la pregunta.'
- source_word: σῶσαι
  english_pob_choice: save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - librar
  lexicon: BDAG
  rationale: '''Salvar'' es el equivalente normal de σῴζω y preserva el peso soteriológico de la pregunta. Las alternativas son posibles, pero menos directas aquí.'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El pronombre objeto directo masculino singular mantiene la referencia personal del griego. 'Lo' es idiomático en español y conserva la economía del texto.
theological_decisions:
- issue: Relación entre fe y obras en la pregunta retórica
  english_pob_reading: A merely professed faith without works is in view; the translation should not resolve James's tension prematurely.
  chosen_spanish_reading: Se entiende una fe solo declarada, sin obras, sin cerrar de antemano la tensión que plantea Santiago.
  alternative_spanish_readings:
  - ¿Puede salvarlo esa fe?
  - ¿Puede la fe salvarlo?
  rationale: '''Esa fe'' conserva el alcance anafórico y deja claro que no se habla de la fe genuina en abstracto, sino de la fe descrita antes. Así se mantiene la tensión doctrinal del pasaje sin interpretarla de más.'
  doctrine_reference: Preservar la tensión teológica del texto, no resolverla prematuramente.
- issue: Tratamiento inclusivo del vocativo
  english_pob_reading: Keep 'my brothers' in the main text; inclusive expansion can be noted.
  chosen_spanish_reading: '''Hermanos míos'' se mantiene en el cuerpo del texto como vocativo representativo masculino plural.'
  alternative_spanish_readings:
  - hermanos y hermanas míos
  - queridos hermanos y hermanas
  rationale: El griego usa la forma masculina plural como vocativo representativo. La traducción principal conserva esa forma; la posible inclusión del conjunto de la comunidad puede indicarse en nota.
  doctrine_reference: Precisión de género gramatical con nota de alcance comunitario.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora los marcadores de nota [a] y [b] aparecen exactamente en el texto español donde corresponden, y no hay notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene 'hermanos' como vocativo representativo, coherente con la política de género-accurada del proyecto.
  - '''Obras'' conserva el vínculo léxico con Santiago 2 y no se suaviza a ''acciones''.'
  - '''Salvar'' preserva el peso soteriológico de σῴζω.'
  - '''Esa fe'' reproduce el anafórico del griego sin neutralizar la tensión del pasaje.'
