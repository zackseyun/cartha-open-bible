  text: ⸀Τί ὄφελος, ἀδελφοί μου, ἐὰν πίστιν λέγῃ τις ἔχειν ἔργα δὲ μὴ ἔχῃ; μὴ δύναται ἡ πίστις σῶσαι αὐτόν;
base_translation:
  language: en
  yaml_path: translation/nt/james/002/014.yaml
  text: What good is it[a], my brothers[c][b], if someone says he has faith but does not have works? Can that faith save him?
  footnotes:
  - marker: a
    text: Or 'my brothers and sisters.' The Greek uses the masculine plural 'brothers' as a representative form of address to the believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'Can such faith save him?' The Greek literally says 'Can the faith save him?' referring back to the kind of faith just mentioned—faith that is claimed but lacks works.
    reason: alternative_reading
  - marker: c
    text: πίστις can also be rendered 'trust' or, in some contexts, 'faithfulness'; here 'faith' best fits the sense of a claimed belief or profession.
    reason: lexical_alternative
