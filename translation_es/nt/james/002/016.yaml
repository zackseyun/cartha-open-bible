translation:
  language: es
  text: 'y si alguno de ustedes les dice: «Vayan en paz; manténganse calientes[a] y sean saciados», pero no les dan lo necesario para el cuerpo, ¿de qué sirve?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sean calentados y sean saciados». Las formas griegas pueden entenderse en sentido pasivo o medio.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπῃ δέ τις
  english_pob_choice: and one ... says
  chosen_spanish: y si alguno de ustedes les dice
  alternatives_spanish:
  - y si uno de ustedes les dice
  - pero si alguien les dice
  lexicon: BDAG
  rationale: La construcción introduce un caso hipotético. «Alguno de ustedes» expresa bien el sentido partitivo de ἐξ ὑμῶν y evita una calca extraña. «Y» conserva el flujo discursivo de δέ sin forzar un contraste excesivo.
- source_word: ἐξ ὑμῶν
  english_pob_choice: of you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - entre ustedes
  - de entre ustedes
  lexicon: BDAG
  rationale: 'El griego indica procedencia partitiva: uno tomado del grupo al que se habla. «De ustedes» es natural en español y mantiene esa pertenencia al conjunto.'
- source_word: Ὑπάγετε ἐν εἰρήνῃ
  english_pob_choice: Go in peace
  chosen_spanish: Vayan en paz
  alternatives_spanish:
  - Vayan tranquilos
  - Partan en paz
  lexicon: BDAG
  rationale: Es una fórmula de despedida / bendición convencional. «Vayan en paz» es el equivalente más natural y conserva el tono irónico del contexto.
- source_word: θερμαίνεσθε
  english_pob_choice: keep warm
  chosen_spanish: cálmense
  alternatives_spanish:
  - manténganse calientes
  - abríguense
  lexicon: BDAG
  rationale: 'Aquí se necesita una decisión textual y de sentido. El verbo puede leerse como pasivo o medio, y el texto completo alude a una necesidad corporal concreta, no a una temperatura emocional. Sin embargo, en español «manténganse calientes» suena menos natural en una exhortación reproducida como cita directa; «abríguense» sería más concreto pero ya interpreta la situación. «Cálmense» no corresponde al lexema griego, por lo que se debe revisar: la mejor opción fuente es «manténganse calientes».'
- source_word: χορτάζεσθε
  english_pob_choice: be filled
  chosen_spanish: sean saciados
  alternatives_spanish:
  - llénense
  - queden satisfechos
  lexicon: BDAG
  rationale: χορτάζω suele significar ser saciado o lleno, especialmente de comida. «Sean saciados» preserva la pasividad/mediación posible del verbo y el campo semántico de alimento o provisión.
- source_word: μὴ δῶτε δὲ αὐτοῖς
  english_pob_choice: but you do not give them
  chosen_spanish: pero no les dan
  alternatives_spanish:
  - pero no les den
  - y no les dan
  lexicon: BDAG
  rationale: El contraste adversativo con la acción omitida se mantiene con «pero». «No les dan» conserva el valor general/hypotético en segunda persona plural. La forma directa «no les dan» evita sobreespecificar el modo verbal.
- source_word: τὰ ἐπιτήδεια τοῦ σώματος
  english_pob_choice: the necessities of the body
  chosen_spanish: las necesidades del cuerpo
  alternatives_spanish:
  - lo necesario para el cuerpo
  - las cosas necesarias para el cuerpo
  lexicon: BDAG
  rationale: ἐπιτήδεια denota lo necesario o apropiado, especialmente provisiones. «Las necesidades del cuerpo» es claro, formal y fiel al énfasis corporal de τοῦ σώματος.
- source_word: τί ὄφελος;
  english_pob_choice: what benefit is that?
  chosen_spanish: ¿de qué sirve?
  alternatives_spanish:
  - ¿qué beneficio tiene?
  - ¿qué provecho hay?
  lexicon: BDAG
  rationale: 'La pregunta es idiomática y retórica: no pregunta por un objeto sino por utilidad real. «¿De qué sirve?» comunica bien la fuerza pragmática de ὄφελος en español contemporáneo.'
theological_decisions:
- issue: 'Valor de θερμαίνεσθε y χορτάζεσθε: voz y responsabilidad'
  english_pob_reading: Render as conventional exhortations ('keep warm and be filled') without specifying whether the subjects are to warm/feed themselves or are passively to receive warmth/food.
  chosen_spanish_reading: 'Traducir como exhortaciones convencionales sin cerrar si son reflexivas o pasivas: «manténganse calientes» / «sean saciados».'
  alternative_spanish_readings:
  - abríguense y sean alimentados
  - cálmense y llénense
  rationale: El punto de Santiago es la inutilidad de palabras piadosas sin ayuda material, no resolver la mecánica exacta de la voz verbal. En español conviene conservar esa tensión y no convertirla en una instrucción demasiado precisa sobre autoabastecimiento o recepción pasiva.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El borrador se revisó para alinear la lectura española con el texto griego y con el punto auditado del POB inglés: la formulación de θερμαίνεσθε no debe perder la tensión de voz ni sustituirse por una interpretación ajena. Se ajustó la frase para que la cita siga siendo natural en español y, a la vez, deje visible la alternativa más literal en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde corresponda; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se mantuvo un español neutro y eclesialmente legible, con puntuación de cita directa en estilo español.
  - La nota [a] está anclada en la frase «manténganse calientes y sean saciados» para reflejar la alternativa más literal del griego.
