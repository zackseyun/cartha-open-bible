translation:
  language: es
  text: Así también la fe[a], si no tiene obras, está muerta por sí sola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza»; menos probable aquí, «fidelidad». El término griego pistis puede abarcar esos sentidos, pero «fe» encaja mejor con el argumento de Santiago en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera también
  - Así asimismo
  lexicon: BDAG
  rationale: οὕτως señala una relación de correspondencia con el ejemplo anterior, y καί añade continuidad. «Así también» suena natural en español y conserva el vínculo argumentativo sin volverlo más explicativo de lo que permite el griego.
- source_word: ἡ πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: En este contexto Santiago contrasta una fe profesada con su evidencia práctica. «Fe» es la equivalencia principal y mantiene la tensión lexical y teológica del pasaje; «confianza» o «fidelidad» serían posibilidades léxicas, pero no encajan tan bien aquí.
- source_word: ἐὰν μὴ ἔχῃ
  english_pob_choice: if it does not have
  chosen_spanish: si no tiene
  alternatives_spanish:
  - si no posee
  - a menos que tenga
  lexicon: BDAG
  rationale: La cláusula condicional negativa se expresa de modo directo y natural con «si no tiene», preservando la fuerza del subjuntivo presente sin sobretraducir.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: «Obras» es el equivalente español más estable para ἔργα en Santiago 2 y conserva la conexión temática con el argumento sobre la fe visible en actos concretos.
- source_word: νεκρά
  english_pob_choice: dead
  chosen_spanish: muerta
  alternatives_spanish:
  - sin vida
  - inactiva
  lexicon: BDAG
  rationale: El adjetivo es metafórico y tajante. «Muerta» conserva el contraste fuerte del griego y su carácter sentencioso en español.
- source_word: καθ’ ἑαυτήν
  english_pob_choice: by itself
  chosen_spanish: por sí sola
  alternatives_spanish:
  - en sí misma
  - aislada
  lexicon: BDAG
  rationale: La frase indica a la fe considerada aisladamente, separada de las obras. «Por sí sola» es idiomática en español y preserva la idea de aislamiento sin añadir interpretación.
theological_decisions:
- issue: πίστις en un pasaje clave para el debate fe y obras
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: 'La traducción principal debe ser «fe» para reflejar la elección del POB inglés y el uso más probable en Santiago. Se conserva así la tensión del texto: una fe sin obras no es negada como palabra, sino declarada muerta. No se introduce una solución denominacional al debate.'
  doctrine_reference: 'DOCTRINE.md: contested terms for πίστις; translation philosophy #3'
- issue: Relación entre fe y obras en la afirmación final
  english_pob_reading: is dead by itself
  chosen_spanish_reading: está muerta por sí sola
  alternative_spanish_readings:
  - está muerta en sí misma
  - está muerta sola
  rationale: '«Está muerta por sí sola» mantiene el alcance adverbial de καθ’ ἑαυτήν: la fe considerada aparte de las obras carece de vida. La formulación evita suavizar el juicio del versículo.'
  doctrine_reference: James 2:17 within James 2:14-26; lexical note on metaphorical νεκρά
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión final en inglés; no se requieren cambios textuales respecto del sentido base. Se preservó la dureza retórica de νεκρά y la ambigüedad léxica de πίστις mediante una nota mínima.
  spanish_consistency_notes:
  - Se usó «obras» para mantener la correspondencia con el argumento de Santiago y la terminología ya establecida en el contexto inmediato.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay nombres divinos en este versículo.
  - «Por sí sola» comunica la misma idea de aislamiento que «by itself» sin sonar forzado en español.
  - Se mantuvo un registro moderno y digno, apto para lectura pública y estudio.
