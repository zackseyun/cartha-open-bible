translation:
  language: es
  text: Porque cualquiera que guarda toda la ley, pero tropieza en un solo punto, se ha hecho culpable de todo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falla en una sola cosa» o «quebranta una parte de ella». El griego dice literalmente «tropieza en uno», con una metáfora de fracaso moral.
    reason: lexical_alternative
  - marker: b
    text: O «queda sujeto a responsabilidad por todo ello». La expresión indica que quebrantar una parte hace a la persona responsable respecto de toda la ley.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: El pronombre indefinido introduce un principio general. «Cualquiera que» conserva bien el valor universal sin sonar forzado en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí γάρ retoma y fundamenta la afirmación anterior. «Porque» mantiene la relación explicativa con naturalidad en español.
- source_word: ὅλον τὸν νόμον
  english_pob_choice: the whole law
  chosen_spanish: toda la ley
  alternatives_spanish:
  - la ley entera
  - la ley completa
  lexicon: BDAG
  rationale: El griego enfatiza totalidad. «Toda la ley» transmite la extensión completa de νόμος de forma idiomática y clara.
- source_word: τηρήσῃ
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: BDAG
  rationale: En contexto legal-moral, τηρέω es guardar u observar mandamientos. «Guarda» es natural en español bíblico y mantiene la idea de fidelidad activa.
- source_word: πταίσῃ
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - falla
  - peca
  - se desliza
  lexicon: BDAG
  rationale: La metáfora central es de tropiezo; «tropieza» conserva la imagen física y el sentido moral, sin borrar la tensión entre tropiezo y transgresión.
- source_word: ἐν ἑνί
  english_pob_choice: in one point
  chosen_spanish: en un solo punto
  alternatives_spanish:
  - en una sola cosa
  - en un punto
  lexicon: BDAG
  rationale: La construcción indica esfera o respecto. «En un solo punto» expresa con precisión que se trata de un único punto o requisito dentro de la ley.
- source_word: γέγονεν
  english_pob_choice: has become
  chosen_spanish: se ha hecho
  alternatives_spanish:
  - ha llegado a ser
  - ha resultado
  lexicon: BDAG
  rationale: El perfecto señala un estado resultante. «Se ha hecho» conserva ese matiz de resultado sin perder fluidez en español.
- source_word: πάντων
  english_pob_choice: of all of it
  chosen_spanish: de todo
  alternatives_spanish:
  - de toda ella
  - de todo ello
  lexicon: BDAG
  rationale: El genitivo con ἔνοχος expresa responsabilidad respecto del conjunto. «De todo» mantiene la referencia global a la ley sin añadir explicaciones excesivas.
- source_word: ἔνοχος
  english_pob_choice: guilty
  chosen_spanish: culpable
  alternatives_spanish:
  - responsable
  - liable
  lexicon: BDAG
  rationale: En este contexto moral-jurídico, ἔνοχος puede ser «culpable» o «responsable/liable». «Culpable» comunica con claridad la carga legal y moral, mientras la nota mantiene la alternativa de responsabilidad.
theological_decisions:
- issue: Alcance de la culpa respecto de la ley
  english_pob_reading: Violating one part of the law makes a person guilty with respect to the whole law, without specifying a later doctrinal system for how that guilt is reckoned.
  chosen_spanish_reading: Romper un solo punto de la ley hace culpable a la persona respecto de toda la ley, sin precisar un sistema doctrinal posterior sobre cómo se computa esa culpa.
  alternative_spanish_readings:
  - Romper un mandamiento equivale en gravedad a romper todos por separado.
  - El versículo se limita al problema específico de la parcialidad en Santiago 2 y no a la ley como un todo.
  rationale: La frase griega πάντων ἔνοχος apunta a responsabilidad frente al conjunto, no necesariamente a que cada mandamiento haya sido violado individualmente ni a que todas las faltas tengan idéntica gravedad. La traducción conserva esa fuerza y deja abierta la tensión teológica en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el trayecto auditado en inglés: conserva la estructura causal, la metáfora de tropiezo, el valor perfectivo de γέγονεν y la idea de culpabilidad respecto del conjunto de la ley, sin suavizar la tensión entre una falta puntual y la responsabilidad total.'
  spanish_consistency_notes:
  - Se mantuvo «ley» para νόμος y no se introdujo terminología eclesiástica no respaldada por el griego.
  - «Tropieza» preserva la imagen metafórica de πταίσῃ, y la nota ofrece la alternativa semántica sin perder la fuerza del original.
  - «Culpable de todo» expresa de manera compacta la lectura de ἔνοχος con genitivo total; la nota aclara la posibilidad de responsabilidad/jurisdicción sobre todo el conjunto.
