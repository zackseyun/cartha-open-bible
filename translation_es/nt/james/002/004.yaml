translation:
  language: es
  text: ¿No han hecho distinciones entre ustedes y se han convertido en jueces con malos pensamientos?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «¿No han discriminado entre ustedes?». El verbo griego puede llevar el sentido de «discriminar», «estar divididos» o, en otros contextos, «dudar», pero aquí el contexto favorece la idea de hacer distinciones discriminatorias.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «jueces de razonamientos/pensamientos malos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκρίθητε
  english_pob_choice: have ... made distinctions
  chosen_spanish: han hecho distinciones
  alternatives_spanish:
  - han discriminado
  - han dudado
  - se han dividido
  lexicon: BDAG
  rationale: En este contexto la acción reprochada es la parcialidad entre ricos y pobres en la asamblea, no la duda interior. Por eso, en español, «hacer distinciones» comunica bien la discriminación implícita sin forzar un calco técnico ni desplazar el sentido al escepticismo.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes mismos
  alternatives_spanish:
  - dentro de ustedes mismos
  - en ustedes mismos
  lexicon: BDAG
  rationale: La escena es comunitaria y relacional; «entre ustedes mismos» expresa mejor la dimensión interpersonal del reproche. «Dentro de ustedes mismos» podría sugerir un conflicto meramente interno, que aquí no es el foco principal.
- source_word: ἐγένεσθε
  english_pob_choice: become
  chosen_spanish: se han convertido en
  alternatives_spanish:
  - han llegado a ser
  - resultaron ser
  lexicon: BDAG
  rationale: «Se han convertido en» conserva la idea de resultado de la acción previa. Es natural en español y mantiene el enlace causal que marca el griego.
- source_word: κριταὶ
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - árbitros
  lexicon: BDAG
  rationale: «Jueces» es la equivalencia más directa y transparente para κριταί. Además, conserva la fuerza moral y judicial de la reprensión de Santiago.
- source_word: διαλογισμῶν πονηρῶν
  english_pob_choice: with evil thoughts
  chosen_spanish: de pensamientos malos
  alternatives_spanish:
  - de malos razonamientos
  - de malas intenciones
  - con pensamientos malos
  lexicon: BDAG
  rationale: El genitivo griego puede entenderse de manera literal como «jueces de pensamientos/razonamientos malos», pero en español esa construcción suena más extraña que clara. «De pensamientos malos» conserva el contenido léxico de διαλογισμός sin añadir una explicación más estrecha como «malas intenciones».
- source_word: οὐ
  english_pob_choice: have you not
  chosen_spanish: ¿No han ...?
  alternatives_spanish:
  - ¿Acaso no han ...?
  - ¿No es cierto que han ...?
  lexicon: BDAG
  rationale: La pregunta retórica en español necesita una forma natural que mantenga el tono de reprensión. «¿No han ...?» reproduce bien esa fuerza sin volver la frase pesada.
theological_decisions:
- issue: Sentido de διακρίνω en el marco de la parcialidad
  english_pob_reading: The verse rebukes discriminatory distinctions within the believing community, not internal doubt.
  chosen_spanish_reading: El versículo reprende la discriminación interna y la parcialidad en la comunidad creyente, no la duda interior.
  alternative_spanish_readings:
  - El versículo habla de estar divididos interiormente
  - El versículo se refiere a vacilar o dudar
  rationale: El contexto inmediato de 2:1–3 trata del favoritismo hacia el rico y contra el pobre. Por eso la traducción debe orientar al lector hacia la discriminación social/comunitaria, no hacia el sentido de «dudar» que aparece en otros pasajes.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones pendientes. La solución española sigue la lectura contextual de parcialidad/discriminación, conserva la pregunta retórica y evita introducir el sentido de duda que pertenece a otros usos de διακρίνω en Santiago.
  spanish_consistency_notes:
  - Se mantiene «jueces» para κριταί, en coherencia con el valor judicial fuerte del reproche.
  - Se usa «pensamientos malos» para respetar el contenido de διαλογισμῶν πονηρῶν sin suavizar la acusación.
  - La fórmula «entre ustedes mismos» conserva el matiz comunitario de ἐν ἑαυτοῖς.
  - La puntuación interrogativa española reproduce el tono acusatorio de la pregunta retórica griega.
