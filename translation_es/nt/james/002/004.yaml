    rationale: El genitivo griego es difícil de calcar. En español, «jueces de pensamientos malos» puede entenderse como jueces que juzgan pensamientos malos. El inglés POB resolvió esto con «with evil thoughts» y mantuvo la literalidad en nota. «Con malos pensamientos» comunica mejor que los jueces están caracterizados por razonamientos malos.
