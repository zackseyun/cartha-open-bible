translation:
  language: es
  text: ¿No blasfeman ellos mismos el buen nombre que fue llamado sobre ustedes?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nombre honorable» o «el nombre noble».
    reason: lexical_alternative
  - marker: b
    text: O «que fue llamado sobre ustedes»; la frase probablemente se refiere al nombre por el cual se identifica a los creyentes, posiblemente con eco de lenguaje de pacto o bautismal.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ αὐτοὶ
  english_pob_choice: Do not they themselves
  chosen_spanish: ¿No blasfeman ellos mismos
  alternatives_spanish:
  - ¿No son ellos mismos los que blasfeman
  - ¿No blasfeman ellos
  lexicon: BDAG
  rationale: La partícula negativa con αὐτοὶ introduce una pregunta retórica que espera respuesta afirmativa y enfatiza a los mismos sujetos. En español, “¿No blasfeman ellos mismos...?” conserva esa fuerza enfática y la estructura interrogativa natural.
- source_word: βλασφημοῦσιν
  english_pob_choice: blaspheme
  chosen_spanish: blasfeman
  alternatives_spanish:
  - injurian
  - hablan mal de
  lexicon: BDAG
  rationale: Aquí el verbo conserva un peso religioso y de deshonra mayor que un simple “hablar mal”. “Blasfeman” reproduce bien esa intensidad en español y mantiene la conexión verbal con el honor del nombre.
- source_word: τὸ καλὸν ὄνομα
  english_pob_choice: the good name
  chosen_spanish: el buen nombre
  alternatives_spanish:
  - el nombre honorable
  - el nombre noble
  lexicon: BDAG
  rationale: καλός aquí apunta a honorabilidad o nobleza. “Buen nombre” es una expresión española natural que preserva el sentido idiomático de nombre con honra, sin precisar indebidamente el referente.
- source_word: τὸ ἐπικληθὲν
  english_pob_choice: that was called
  chosen_spanish: que fue invocado
  alternatives_spanish:
  - que fue llamado
  - que fue puesto sobre
  lexicon: BDAG
  rationale: El participio pasivo con ἐπί en esta construcción puede expresar la idea de un nombre llamado sobre alguien. “Invocado” recoge la fuerza idiomática de un nombre que se pronuncia sobre personas y deja abierta la posibilidad de lectura cultual o identificadora. Se evita reducirlo solo a “llamado” porque en español esa opción puede sonar demasiado débil frente al valor idiomático del griego.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre vosotros
  - encima de ustedes
  lexicon: BDAG
  rationale: La preposición con acusativo después de ἐπικαλέω sugiere el nombre puesto sobre los creyentes. “Sobre ustedes” comunica con claridad el matiz espacial/relacional del griego en español moderno.
theological_decisions:
- issue: Referencia del 'buen nombre'
  english_pob_reading: An intentionally broad reference to the honorable name borne by believers, most likely the name of Jesus/the Lord associated with them.
  chosen_spanish_reading: Una referencia amplia al nombre honroso que llevan los creyentes, probablemente el nombre de Jesús/el Señor asociado con ellos.
  alternative_spanish_readings:
  - Una referencia directa al nombre de Cristo
  - Una referencia al nombre de Dios o a la identidad cristiana de la comunidad
  rationale: El griego no menciona explícitamente a Jesús aquí, aunque el contexto inmediato de la fe en 'nuestro Señor Jesucristo' en 2:1 orienta la lectura. La traducción mantiene 'el buen nombre' y no especifica 'Cristo' en el cuerpo principal para no cerrar indebidamente una tensión interpretativa que el texto no resuelve de manera explícita.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el griego y el auditable inglés POB: mantiene la pregunta retórica, conserva el valor fuerte de βλασφημοῦσιν como ''blasfeman'', y refleja la ambigüedad de τὸ καλὸν ὄνομα / τὸ ἐπικληθὲν sin introducir un referente más específico que el que el texto garantiza.'
  spanish_consistency_notes:
  - Se usó 'buen nombre' como equivalente idiomático de 'the good name'.
  - Se eligió 'invocado sobre ustedes' para conservar la posibilidad de un nombre pronunciado/puesto sobre el creyente, sin imponer una sola explicación.
  - Se mantuvo el tratamiento de segunda persona plural 'ustedes' para una lectura neutra latinoamericana.
  - La puntuación con pregunta retórica refleja el orden y la fuerza del griego, adaptado a español natural.
