    issue: El texto principal traduce τὸ ἐπικληθὲν como «fue invocado» en vez de una forma más literal como «fue llamado».
    rationale: La auditoría inglesa escogió «that was called» precisamente para no sobreinterpretar el participio. «Invocado» es posible, pero añade un matiz cultual más fuerte y debería quedar como alternativa explicativa, no como la lectura principal.
  - severity: low
    issue: La nota b presenta «fue llamado sobre ustedes» como alternativa, cuando esa debería ser la redacción principal.
    rationale: 'La relación entre texto principal y nota debe reflejar la jerarquía de decisiones documentada en la auditoría inglesa: lectura más literal en el cuerpo, alternativa/explicación en la nota.'
