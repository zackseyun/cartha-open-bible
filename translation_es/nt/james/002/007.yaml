  source_alignment_summary: 'La estructura interrogativa retórica y el énfasis de οὐκ αὐτοὶ están bien preservados con «¿No blasfeman ellos mismos…?». «Blasfeman» refleja adecuadamente βλασφημοῦσιν. «El buen nombre» mantiene la amplitud intencional de τὸ καλὸν ὄνομα. El punto principal a corregir es τὸ ἐπικληθὲν ἐφ’ ὑμᾶς: el texto principal en español usa «fue invocado sobre ustedes», pero la auditoría inglesa eligió deliberadamente «was called upon you» y dejó «invoked» solo como alternativa no preferida. En español, «invocado sobre ustedes» suena más interpretativo y menos fiel al valor básico pasivo de ἐπικληθέν.'
  spanish_quality_summary: El borrador es claro y legible en español eclesial moderno. Sin embargo, «fue invocado sobre ustedes» resulta algo forzado y cultual en el texto principal; «fue llamado sobre ustedes» es más cercano al griego y permite que la nota explique la alternativa y el posible eco bautismal/pactual. El resto del verso suena natural y digno.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Se evita especificar indebidamente «Cristo» en el texto principal, en línea con la decisión teológica documentada. La revisión propuesta respeta también la preferencia del POB por no sobreinterpretar ἐπικαλέω en el texto base.
  issues:
