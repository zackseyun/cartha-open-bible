revisions:
- from: ¿No blasfeman ellos mismos el buen nombre que fue invocado sobre ustedes?[a][b]
  to: ¿No blasfeman ellos mismos el buen nombre que fue llamado sobre ustedes?[a][b]
  rationale: 'Se corrige el verbo principal de la cláusula relativa para alinear el español con la decisión fuente y la auditoría inglesa: ἐπικληθέν se mantiene como «fue llamado», no «fue invocado», evitando una interpretación más fuerte de la necesaria en el texto principal. Se conserva la amplitud teológica de «el buen nombre», el énfasis de «ellos mismos» y las notas léxicas existentes.'
