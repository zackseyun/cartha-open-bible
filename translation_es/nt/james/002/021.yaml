translation:
  language: es
  text: ¿No fue justificado Abraham, nuestro padre, por obras, cuando ofreció a Isaac su hijo sobre el altar?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mostrado justo' o 'vindicado'. El verbo griego puede tener fuerza declarativa o demostrativa según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀβραὰμ ὁ πατὴρ ἡμῶν
  english_pob_choice: Abraham our father
  chosen_spanish: Abraham, nuestro padre
  alternatives_spanish:
  - Abraham, nuestro antepasado
  lexicon: BDAG
  rationale: Conservo la relación familiar y del pacto con la formulación más natural en español. 'Nuestro padre' preserva la fuerza relacional del griego mejor que 'nuestro antepasado', que atenúa el vínculo que el texto explota retóricamente.
- source_word: οὐκ ἐξ ἔργων
  english_pob_choice: by works
  chosen_spanish: por obras
  alternatives_spanish:
  - a partir de obras
  - sobre la base de obras
  lexicon: BDAG
  rationale: La preposición con genitivo expresa base o fuente. 'Por obras' es la forma idiomática en español y mantiene la conexión teológica con la discusión de fe y obras sin sobreexplicar la construcción griega.
- source_word: ἐδικαιώθη
  english_pob_choice: was justified
  chosen_spanish: fue justificado
  alternatives_spanish:
  - fue mostrado justo
  - fue vindicado
  - fue declarado justo
  lexicon: BDAG
  rationale: '''Justificado'' conserva el vínculo léxico con δικαιόω y la tensión teológica del pasaje. No resuelvo el verbo en la dirección solo declarativa o solo demostrativa; esa ambigüedad queda preservada en nota.'
- source_word: ἀνενέγκας
  english_pob_choice: when he offered up
  chosen_spanish: cuando ofreció
  alternatives_spanish:
  - después de ofrecer
  - habiendo ofrecido
  lexicon: BDAG
  rationale: El participio aoristo funciona naturalmente con valor temporal aquí. 'Cuando ofreció' es fluido en español y retiene el matiz sacrificial de la acción.
- source_word: Ἰσαὰκ τὸν υἱὸν αὐτοῦ
  english_pob_choice: Isaac his son
  chosen_spanish: a Isaac su hijo
  alternatives_spanish:
  - a Isaac, su hijo
  lexicon: BDAG
  rationale: Mantengo el orden natural del complemento directo en español y la referencia filial explícita. El sentido es inequívoco y no requiere expansión.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: BDAG
  rationale: '''Sobre el altar'' reproduce con claridad la relación espacial de ἐπί con acusativo y encaja con el contexto de sacrificio.'
theological_decisions:
- issue: Sentido de δικαιόω en Santiago 2:21
  english_pob_reading: Keep 'was justified' in the main text and preserve the possibility of declarative or demonstrative force in a footnote.
  chosen_spanish_reading: Mantener 'fue justificado' en el texto principal y explicar que también puede leerse como 'fue mostrado justo' o 'fue vindicado'.
  alternative_spanish_readings:
  - fue mostrado justo
  - fue vindicado
  - fue declarado justo
  rationale: La traducción conserva la tensión clásica del pasaje sobre fe y obras. No la cierro hacia una lectura exclusivamente forense ni exclusivamente demostrativa; la nota deja abiertas las alternativas que el verbo puede abarcar según contexto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el estado de alta concordancia confirma que la lectura base permanece estable y no requiere ajustes textuales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Cristo/Mesías'' no aparece en el pasaje.'
  - '''por obras'' conserva el paralelismo con la discusión de fe y obras en Santiago sin introducir paráfrasis.'
  - La puntuación interrogativa en español mantiene el valor retórico de la pregunta griega.
  - Se optó por 'fue justificado' como forma verbal pasiva acorde con el griego aoristo pasivo; la nota preserva la tensión lexical.
