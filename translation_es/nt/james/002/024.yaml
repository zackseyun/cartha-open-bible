translation:
  language: es
  text: Ustedes ven que un hombre[a] es justificado[b] por obras y no solo por la fe[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «un hombre», usado aquí en sentido representativo para un ser humano en general.
    reason: cultural_note
  - marker: b
    text: O «es mostrado como justo» o «es vindicado». Se conserva la formulación de Santiago sin resolver la discusión interpretativa sobre cómo esto se relaciona con el uso de «justificar» en Pablo.
    reason: alternative_reading
  - marker: c
    text: O «fidelidad» o «confianza» para «fe», aunque «fe» es la traducción habitual de πίστις en esta versión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρᾶτε
  english_pob_choice: You see
  chosen_spanish: Ustedes ven
  alternatives_spanish:
  - Ven
  - Pueden ver
  - Ustedes pueden ver
  lexicon: BDAG
  rationale: El verbo está en segunda persona plural y funciona como una apelación directa al auditorio; "Ustedes ven" conserva el valor declarativo y naturalidad en español, evitando un imperativo artificial.
- source_word: ἐξ ἔργων
  english_pob_choice: by works
  chosen_spanish: por obras
  alternatives_spanish:
  - a partir de obras
  - de obras
  - mediante obras
  lexicon: BDAG
  rationale: La preposición con genitivo expresa base o medio. "Por obras" comunica de manera natural en español la base/instrumento sin introducir una paráfrasis excesiva.
- source_word: δικαιοῦται
  english_pob_choice: is justified
  chosen_spanish: es justificado
  alternatives_spanish:
  - es declarado justo
  - es vindicado
  - se muestra justo
  lexicon: BDAG
  rationale: Se conserva el término central de la familia de δικαιόω para mantener la tensión interpretativa del pasaje. "Es justificado" es la forma más directa y auditable; las alternativas reflejan el matiz posible de demostración o vindicación.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: el ser humano
  alternatives_spanish:
  - una persona
  - un hombre
  lexicon: BDAG
  rationale: Aunque el griego es masculino singular, en español "el ser humano" evita una lectura exclusivamente masculina y comunica mejor el valor representativo/genericidad del enunciado, manteniendo el alcance universal del dicho.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La oposición del versículo es entre obras y fe; "fe" conserva el término normal y la continuidad doctrinal del texto. Las alternativas quedan como posibilidades léxicas, no como lectura preferida.
- source_word: μόνον
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: '"Solo" reproduce de forma idiomática la exclusividad de μόνον en español actual y encaja naturalmente con "la fe".'
theological_decisions:
- issue: Sentido de δικαιοῦται en relación con la justificación
  english_pob_reading: Retain 'is justified' in the main text, allowing James's wording to stand without harmonizing it away.
  chosen_spanish_reading: Mantener "es justificado" en el texto principal, sin resolver en la traducción la relación exacta con la justificación paulina.
  alternative_spanish_readings:
  - es mostrado como justo
  - es vindicado
  rationale: 'El versículo ha sido interpretado de manera diversa en la historia cristiana. La traducción debe preservar esa tensión: el texto principal conserva el lenguaje de justificación, mientras que la alternativa explicativa queda documentada como posibilidad contextual.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance genérico de ἄνθρωπος
  english_pob_reading: Translate as 'a man' with representative/generic force.
  chosen_spanish_reading: Traducir con un sustantivo genérico que exprese representación universal.
  alternative_spanish_readings:
  - un hombre
  - una persona
  rationale: El griego usa masculino singular con valor genérico. En español, "el ser humano" hace explícita esa genericidad sin perder el alcance representativo del enunciado.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador mantiene la lectura fuente-griega y el trazado auditado del inglés POB, ajustando únicamente la expresión española para mayor naturalidad y claridad sin perder la tensión teológica del pasaje.
  spanish_consistency_notes:
  - Se mantiene "fe" como traducción por defecto de πίστις, con alternativas en nota.
  - Se conserva "justificado" para δικαιοῦται para mantener continuidad terminológica.
  - Se usa "obras" para ἔργα en concordancia con el registro bíblico y el marco argumental de Santiago.
  - La genericidad de ἄνθρωπος se explicita en nota para evitar ambigüedad de género en español.
