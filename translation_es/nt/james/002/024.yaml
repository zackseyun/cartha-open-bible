review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: ὁρᾶτε = «Ustedes ven», ἐξ ἔργων = «por obras», δικαιοῦται = «es justificado», y οὐκ ἐκ πίστεως μόνον = «y no ... solo por la fe». Sin embargo, se aparta del rastro auditado en un punto significativo: ἄνθρωπος fue documentado en el English POB como «a man» con nota explicativa sobre su sentido representativo, mientras que el español lo sustituye por «el ser humano», lo cual cambia la decisión de género/forma del original en vez de preservarla con nota.'
  spanish_quality_summary: El español es claro y natural, pero «el ser humano» suena más abstracto e impersonal de lo que pide el enunciado proverbial de Santiago. «Un hombre» funciona mejor aquí como singular representativo y mantiene la fuerza del griego; la nota aclara que es genérico. También conviene reordenar las notas para que la alternativa de δικαιοῦται quede junto a «es justificado» y la de πίστις junto a «fe», siguiendo mejor los anclajes semánticos.
  glossary_alignment: 'La terminología principal está bien alineada: δικαιοῦται = «es justificado», πίστις = «fe», ἐξ ἔργων = «por obras». El punto que requiere corrección es la política de ἄνθρωπος: el proyecto auditó «a man» con fuerza representativa, y el español debe preferir «un hombre» con nota, no neutralizarlo en el texto principal como «el ser humano».'
  issues:
  - severity: medium
    issue: «el ser humano» para ἄνθρωπος
    rationale: El English POB documentó explícitamente «a man» como decisión principal por fidelidad al masculino singular representativo. «El ser humano» introduce una reformulación más abstracta y neutral que no preserva esa decisión de forma suficientemente cercana.
  - severity: low
    issue: Ubicación de notas b/c menos precisa
    rationale: La nota sobre δικαιοῦται debería anclarse en «es justificado», y la nota sobre πίστις en «fe», para reflejar con mayor claridad las alternativas léxicas correspondientes.
  revised_spanish_text: Ustedes ven que un hombre[a] es justificado[b] por obras y no solo por la fe[c].
