translation:
  language: es
  text: Si, no obstante, cumplen la ley real[a] conforme a la Escritura, «Amarás a tu prójimo como a ti mismo», hacen bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ley regia» o «la ley del reino». El griego dice «ley real», lo que puede destacar tanto su origen regio como su condición suprema.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ μέντοι
  english_pob_choice: If, however
  chosen_spanish: Si, sin embargo
  alternatives_spanish:
  - Si, no obstante
  - Si, pues
  lexicon: BDAG
  rationale: La combinación introduce una condición con matiz de contraste o concesión; «si, sin embargo» conserva la apertura condicional de εἰ y el giro adversativo de μέντοι en español natural.
- source_word: νόμον ... βασιλικὸν
  english_pob_choice: the royal law
  chosen_spanish: la ley real
  alternatives_spanish:
  - la ley regia
  - la ley del reino
  lexicon: BDAG
  rationale: βασιλικός expresa pertenencia o relación con un rey; «real» es el equivalente español más directo y fiel, sin forzar una explicación interpretativa única. Se evita «del reino» porque ya añade una explicitación no exigida por la forma griega.
- source_word: τελεῖτε
  english_pob_choice: you are fulfilling
  chosen_spanish: cumplen
  alternatives_spanish:
  - están cumpliendo
  - cumplen plenamente
  - están llevando a cabo
  lexicon: BDAG
  rationale: τελέω aquí apunta a realizar o cumplir una exigencia. En español, «cumplen» transmite bien esa idea sin sobrecargar la frase; el presente funciona de modo general y exhortativo en el contexto.
- source_word: κατὰ τὴν γραφήν
  english_pob_choice: according to the Scripture
  chosen_spanish: conforme a la Escritura
  alternatives_spanish:
  - según la Escritura
  - de acuerdo con la Escritura
  lexicon: BDAG
  rationale: «Conforme a» expresa adecuadamente la idea de correspondencia con lo que dice la Escritura. Se conserva el singular con artículo para respetar la forma griega y su matiz de autoridad escritural.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Amarás tú
  lexicon: BDAG
  rationale: La cita bíblica reproduce una forma futura con valor imperatival; en español, «Amarás» mantiene el tono escriturario y la cita reconocible sin añadir auxiliares ajenos al texto.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a la persona cercana a ti
  lexicon: BDAG
  rationale: «Prójimo» es el término bíblico más fiel y habitual para πλησίον en este contexto ético. «Vecino» puede sonar más cotidiano pero reduce el alcance moral de la expresión; por eso se conserva el término tradicional y preciso.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a uno mismo
  - como te amas a ti mismo
  lexicon: BDAG
  rationale: La frase comparativa es breve en griego; «como a ti mismo» mantiene el paralelismo con la cita de Levítico y su forma clásica en español bíblico sin añadir palabras no presentes.
- source_word: καλῶς ποιεῖτε
  english_pob_choice: you are doing well
  chosen_spanish: hacen bien
  alternatives_spanish:
  - obran bien
  - proceden bien
  - están haciendo bien
  lexicon: BDAG
  rationale: La expresión afirma una acción correcta. «Hacen bien» es natural, breve y fiel; evita una perífrasis que en español moderno puede sonar más pesada que el griego conciso.
theological_decisions:
- issue: Sentido de «ley real»
  english_pob_reading: A law characterized as royal, likely because it belongs to or reflects the reign of God/the Messiah and holds preeminent status in kingdom ethics, without narrowing the phrase to a single doctrinal explanation in translation.
  chosen_spanish_reading: Una ley caracterizada como real, sin cerrar si el énfasis recae en su origen regio, su relación con el rey o su condición suprema entre las leyes.
  alternative_spanish_readings:
  - la ley del reino
  - la ley del Rey
  - la ley suprema
  rationale: «Ley real» conserva la ambigüedad teológica del griego βασιλικός y permite tanto una lectura de procedencia regia como de estatus preeminente. No se resuelve la tensión interpretativa en la traducción.
  doctrine_reference: Preservar la tensión teológica e interpretativa sin decidirla en el texto principal.
translation_notes:
  revision_awareness: 'El texto refleja la revisión más reciente con alto grado de acuerdo: no se introdujeron cambios sustantivos respecto del análisis auditado en inglés; solo se ajustó la formulación para la fluidez y fidelidad del español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto cuando no aparece en este versículo; no hay efecto directo aquí.
  - Se mantuvo «Escritura» en singular con artículo para reflejar τὴν γραφήν.
  - Se conservó la cita bíblica en futuro imperatival («Amarás») por ser la forma más estable y reconocible en español bíblico.
  - «Prójimo» se retuvo por su valor técnico-bíblico y para no debilitar el alcance ético del término griego.
