revisions:
- from: 'Si, sin embargo, cumplen la ley real[a] conforme a la Escritura: «Amarás a tu prójimo como a ti mismo», hacen bien.'
  to: Si, no obstante, cumplen la ley real[a] conforme a la Escritura, «Amarás a tu prójimo como a ti mismo», hacen bien.
  rationale: 'La revisión hace dos ajustes menores: reemplaza «sin embargo» por «no obstante» para una apertura más natural en español sin perder el matiz de μέντοι, y cambia los dos puntos por una coma antes de la cita para reflejar mejor la sintaxis del original y del POB inglés. El resto del borrador es fiel y no requiere cambios.'
