translation:
  language: es
  text: Porque el juicio es sin misericordia para quien no mostró misericordia; la misericordia triunfa sobre el juicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La misericordia se gloria sobre el juicio». El verbo griego puede llevar el sentido de gloriarse o alzarse triunfante sobre; aquí se vierte de forma idiomática como «triunfa sobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - condena
  lexicon: BDAG
  rationale: En Santiago, κρίσις apunta al juicio divino o judicial, no solo a una opinión. «Juicio» conserva ese peso forense de manera natural en español sin volverlo más específico que el griego.
- source_word: ἀνέλεος
  english_pob_choice: without mercy
  chosen_spanish: sin misericordia
  alternatives_spanish:
  - sin misericordia
  - despiadado
  - sin compasión
  lexicon: BDAG
  rationale: Como adjetivo predicativo de «juicio», «sin misericordia» es claro y mantiene el vínculo léxico con ἔλεος. «Despiadado» suena más idiomático en algunos contextos, pero pierde transparencia.
- source_word: τῷ μὴ ποιήσαντι ἔλεος
  english_pob_choice: to the one who has shown no mercy
  chosen_spanish: para el que no practicó misericordia
  alternatives_spanish:
  - para el que no mostró misericordia
  - para el que no hizo misericordia
  - para el que no tuvo misericordia
  lexicon: BDAG
  rationale: 'ποιέω con ἔλεος funciona como una expresión semítica: «hacer/practicar misericordia». «Practicó misericordia» preserva mejor ese giro que una versión más psicológica o abstracta. «Mostró misericordia» es posible, pero desplaza el matiz verbal de acción concreta.'
- source_word: κατακαυχᾶται
  english_pob_choice: triumphs over
  chosen_spanish: triunfa sobre
  alternatives_spanish:
  - triunfa sobre
  - se gloria sobre
  - se jacta sobre
  - vence a
  lexicon: BDAG
  rationale: El verbo puede sugerir «gloriarse/boast over», pero en este contexto la fuerza idiomática es que la misericordia prevalece. «Triunfa sobre» comunica esa victoria retórica sin borrar la tensión del verbo griego.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia
  - compasión
  - clemencia
  lexicon: BDAG
  rationale: «Misericordia» es la equivalencia directa y mantiene la repetición del término clave en el versículo. «Compasión» o «clemencia» sonarían menos precisas para este enlace lexical.
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - condena
  lexicon: BDAG
  rationale: Se mantiene la misma traducción que para κρίσις para conservar el contraste interno del versículo. «Condena» sería más fuerte de lo que exige el griego.
theological_decisions:
- issue: Sentido de la cláusula final κατακαυχᾶται ἔλεος κρίσεως
  english_pob_reading: 'A general principle: mercy triumphs over judgment.'
  chosen_spanish_reading: 'Un principio general: la misericordia triunfa sobre el juicio.'
  alternative_spanish_readings:
  - La misericordia se gloria sobre el juicio.
  - La misericordia del misericordioso prevalece en el juicio.
  rationale: 'La frase es breve y proverbial. Traducirla como principio general preserva su alcance sapiencial y deja abierta la tensión teológica: puede referirse a la misericordia de Dios, a la misericordia operante en el juicio, o al efecto vindicador de la misericordia mostrada por el creyente. «Triunfa sobre» expresa el valor idiomático sin resolver de antemano la ambigüedad.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego SBLGNT y el rastro auditado de la POB inglesa. Se conserva la repetición léxica de ἔλεος / κρίσις con «misericordia» / «juicio», y se mantiene la ambigüedad teológica de la cláusula final sin convertirla en una explicación doctrinal cerrada.
  spanish_consistency_notes:
  - Se eligió «juicio» para κρίσις y κρίσεως de manera consistente para preservar la antítesis interna del versículo.
  - Se prefirió «misericordia» para ἔλεος en ambas apariciones para mantener la repetición lexical.
  - «Practicó misericordia» intenta reproducir la fuerza verbal de ποιήσαντι ἔλεος sin volverlo una paráfrasis larga.
  - La puntuación con punto y coma refleja la relación entre las dos cláusulas del griego y favorece la lectura proverbial del verso.
