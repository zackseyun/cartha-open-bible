  rationale: Se ajusta una expresión poco idiomática («practicó misericordia») a una forma española más natural («mostró misericordia») que sigue representando fielmente el sentido de ποιήσαντι ἔλεος. También se mueve la nota al lugar relevante de la variante léxica, la cláusula final con «triunfa sobre», para que el anclaje del marcador corresponda exactamente al punto comentado por la nota inglesa.
