review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: atención favorable al bien vestido, mandato de sentarse en buen lugar, y trato degradante al pobre. Sin embargo, el texto español no preserva correctamente la variante textual ni la deixis de ἐκεῖ/ὑπό: en el texto principal dice «Ponte de pie allí[a], o siéntate aquí bajo mi estrado[b]», pero el griego impreso y el POB inglés tienen «stand there, or sit under my footstool», con nota sobre la variante «or sit there». Además, la nota b está anclada al sustantivo equivocado y no al segmento variante.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero requiere reparación menor para coherencia interna entre texto y nota. «Estrado» no es la mejor opción para ὑποπόδιον en español general; sugiere plataforma/dais más que un apoyapiés. «Debajo de mi reposapiés» o «bajo mi reposapiés» comunica mejor la imagen humillante y el referente léxico. También conviene anclar la nota textual en la frase variante, no en «estrado».
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. Las decisiones «ponen atención», «ropa brillante» y «en un buen lugar» son aceptables y consonantes con el POB. La principal desalineación es léxico-contextual: ὑποπόδιον debe reflejarse mejor como «reposapiés» que «estrado», y la nota textual debe corresponder a «o siéntate allí».'
  issues:
  - severity: high
    issue: El texto principal cambia indebidamente «allí» por «aquí» en la segunda orden.
    rationale: 'El griego impreso tiene ἢ κάθου ἐκεῖ, y el POB inglés: «or sit there». Poner «aquí» invierte la distancia y debilita el contraste humillante.'
  - severity: high
    issue: La nota textual está mal aplicada y contradice el texto principal.
    rationale: La nota b explica la variante «o siéntate allí», pero en el texto esa lectura no aparece; el marcador está puesto en «estrado». La instrucción del proyecto exige que el marcador exacto aparezca en la palabra o frase pertinente.
  - severity: medium
    issue: «Estrado» no refleja con precisión ὑποπόδιον.
    rationale: ὑποπόδιον es un reposapiés/banquillo para los pies. «Estrado» en español estándar suele significar tarima o plataforma, lo que introduce una imagen distinta.
  - severity: low
    issue: «al pobre» pierde la explicitud de género conservada en el POB inglés.
    rationale: No es un error grave, porque en español suena natural; pero «al pobre» neutraliza ligeramente la correspondencia con «the poor man». Puede mantenerse por naturalidad.
