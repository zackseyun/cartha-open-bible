translation:
  language: es
  text: 'y si ustedes ponen atención al que viste ropa brillante[a] y le dicen: «Siéntate aquí en un buen lugar», y al pobre le dicen: «Ponte de pie allí, o siéntate allí[b] bajo mi reposapiés»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ropa fina» o «ropa espléndida».
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos omiten «o siéntate allí», dejando simplemente: «Ponte de pie allí, o siéntate bajo mi reposapiés»; el texto impreso incluye «o siéntate allí».'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιβλέψητε
  english_pob_choice: pay attention to
  chosen_spanish: ponen atención
  alternatives_spanish:
  - miran con favor
  - se fijan en
  lexicon: BDAG
  rationale: El verbo aquí expresa prestar atención con cierta preferencia o consideración, no solo ver. «Ponen atención» conserva la idea sin introducir de antemano la formulación interpretativa de «hacer favoritismo» que aparece en el contexto más amplio.
- source_word: φοροῦντα
  english_pob_choice: wearing
  chosen_spanish: viste
  alternatives_spanish:
  - lleva puesto
  - usa
  lexicon: BDAG
  rationale: El participio describe a la persona que lleva ropa puesta. «Viste» es natural en español y mantiene la referencia directa a la ropa, sin añadir matices ajenos.
- source_word: ἐσθῆτα τὴν λαμπράν
  english_pob_choice: the bright clothing
  chosen_spanish: ropa brillante
  alternatives_spanish:
  - ropa fina
  - ropa espléndida
  lexicon: BDAG
  rationale: λαμπρός puede significar brillante, resplandeciente, espléndido o fino. «Brillante» preserva el valor léxico básico y el efecto visual de una vestimenta llamativa. «Ropa» funciona en español de manera más natural que un calco con «vestidura» en este contexto.
- source_word: Σὺ κάθου ὧδε καλῶς
  english_pob_choice: You sit here in a good place
  chosen_spanish: Siéntate aquí en un buen lugar
  alternatives_spanish:
  - Siéntate aquí cómodamente
  - Siéntate aquí bien
  lexicon: BDAG
  rationale: La orden es imperativa y καλῶς indica un lugar o acomodo favorable. «En un buen lugar» expresa bien el contraste social sin sobreexplicar ni desplazar la imagen concreta.
- source_word: τῷ πτωχῷ
  english_pob_choice: the poor man
  chosen_spanish: al pobre
  alternatives_spanish:
  - al hombre pobre
  - al pobre hombre
  lexicon: BDAG
  rationale: El griego es masculino singular, pero en español «al pobre» suena natural y conserva el referente personal. «El pobre hombre» añadiría una carga idiomática no requerida por el texto.
- source_word: στῆθι
  english_pob_choice: stand
  chosen_spanish: Ponte de pie
  alternatives_spanish:
  - Párate
  - Permanece de pie
  lexicon: BDAG
  rationale: 'El mandato es simple: estar de pie. «Ponte de pie» es una equivalencia idiomática clara y digna en español moderno.'
- source_word: ἢ κάθου ἐκεῖ
  english_pob_choice: or sit there
  chosen_spanish: o siéntate allí
  alternatives_spanish:
  - o siéntate allá
  - o toma asiento allí
  lexicon: BDAG
  rationale: La partícula ἢ presenta una alternativa. «Allí» conserva la distancia de ἐκεῖ y mantiene la oposición con el trato dado a la otra persona.
- source_word: ὑπὸ τὸ ὑποπόδιόν μου
  english_pob_choice: under my footstool
  chosen_spanish: bajo mi estrado
  alternatives_spanish:
  - debajo de mi estrado
  - bajo mi banquillo
  lexicon: BDAG
  rationale: ὑποπόδιον es el apoyo para los pies; en español «estrado» comunica esa imagen de manera comprensible y digna. «Bajo» conserva la fuerza de ὑπό con acusativo. Se prefiere «estrado» a «reposapiés» por el tono más bíblico y por la humillación implícita en la escena.
theological_decisions:
- issue: Tratamiento desigual y parcialidad
  english_pob_reading: Render the commands in a way that preserves the contrast in honor given to the rich and dishonor given to the poor without importing later doctrinal terminology into this verse.
  chosen_spanish_reading: La versión conserva las órdenes concretas y el contraste social entre el trato al rico y al pobre, sin introducir una explicación doctrinal explícita en el texto principal.
  alternative_spanish_readings:
  - mostrar favoritismo
  - dar preferencia
  rationale: El versículo narra la escena; la censura teológica de la parcialidad queda para el contexto inmediato. Mantener la concreción evita sobrerinterpretar la línea.
  doctrine_reference: Santiago 2:1-9; traducción por contexto inmediato
- issue: Identidad del destinatario pobre
  english_pob_reading: the poor man
  chosen_spanish_reading: al pobre
  alternative_spanish_readings:
  - al hombre pobre
  - al pobre hombre
  rationale: El referente es masculino singular en la escena. En español, «al pobre» preserva esa referencia sin forzar una expresión más marcada o despectiva.
  doctrine_reference: Coherencia gramatical y referencial del texto
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del rastro de auditoría en inglés. No se requieren cambios respecto del último pase revisado; la redacción española mantiene el contraste social, la fuerza imperativa y la variante textual señalada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de este proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Pobre» se conserva en masculino singular por la referencia individual del pasaje.
  - «Estrado» se usa para reflejar ὑποπόδιον sin perder el tono bíblico y la imagen de humillación.
