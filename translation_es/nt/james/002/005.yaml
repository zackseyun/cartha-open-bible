  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: θεός = «Dios», πίστις = «fe», κληρονόμοι = «herederos». No aparecen términos de glosario sensibles como Yahvé/Mesías/δοῦλος. La decisión de mantener «hermanos» con nota inclusiva sigue la política auditada. La elección de «escogido» para ἐξελέξατο es aceptable y no sobreteologiza el pasaje.'
