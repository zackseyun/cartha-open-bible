  text: ἀκούσατε, ἀδελφοί μου ἀγαπητοί. οὐχ ὁ θεὸς ἐξελέξατο τοὺς πτωχοὺς ⸂τῷ κόσμῳ⸃ πλουσίους ἐν πίστει καὶ κληρονόμους τῆς βασιλείας ἧς ἐπηγγείλατο τοῖς ἀγαπῶσιν αὐτόν;
base_translation:
  language: en
  yaml_path: translation/nt/james/002/005.yaml
  text: 'Listen[c][b][a], my beloved brothers: has not God chosen those who are poor in the world to be rich in faith and heirs of the kingdom that he promised to those who love him?'
  footnotes:
