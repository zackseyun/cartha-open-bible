translation:
  language: es
  text: 'Escuchen, mis hermanos[a] amados: ¿acaso no ha escogido Dios a los que son pobres en el mundo[b] para que sean ricos en fe[c] y herederos del reino que prometió a los que lo aman?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse inclusivamente a toda la comunidad creyente.
    reason: alternative_reading
  - marker: b
    text: O «pobres según el mundo», «pobres ante el mundo» o «pobres a los ojos del mundo».
    reason: lexical_alternative
  - marker: c
    text: «Fe» también podría traducirse como «confianza» o, menos probablemente aquí, «fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσατε
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen, atiendan
  lexicon: BDAG
  rationale: Imperativo aoristo plural de llamado a prestar atención. «Escuchen» es natural en español actual y conserva el tono exhortativo directo sin perder formalidad.
- source_word: ἀδελφοί μου ἀγαπητοί
  english_pob_choice: my beloved brothers
  chosen_spanish: mis hermanos amados
  alternatives_spanish:
  - mis hermanos y hermanas amados
  - mis queridos hermanos
  lexicon: BDAG
  rationale: Se mantiene «hermanos» como forma gramatical del plural masculino, con valor posible de dirección a toda la comunidad; «amados» refleja ἀγαπητοί con un matiz afectivo fiel al texto.
- source_word: οὐχ ὁ θεὸς ἐξελέξατο
  english_pob_choice: has not God chosen
  chosen_spanish: ¿acaso no ha escogido Dios?
  alternatives_spanish:
  - ¿no escogió Dios?
  - ¿no ha elegido Dios?
  lexicon: BDAG
  rationale: La pregunta retórica espera una respuesta afirmativa. «Ha escogido» comunica bien la vigencia del acto divino; «escogido» es más idiomático que un calco rígido y preserva la fuerza de elección sin sobrecargarla doctrinalmente.
- source_word: τοὺς πτωχοὺς τῷ κόσμῳ
  english_pob_choice: those who are poor in the world
  chosen_spanish: a los pobres del mundo
  alternatives_spanish:
  - a los pobres en el mundo
  - a los pobres ante el mundo
  lexicon: BDAG
  rationale: 'El dativo τῷ κόσμῳ expresa esfera o respecto: pobres en relación con el mundo. «Del mundo» en español transmite con naturalidad esa valoración mundana, sin añadir la glosa más interpretativa «a los ojos del mundo».'
- source_word: πλουσίους ἐν πίστει
  english_pob_choice: rich in faith
  chosen_spanish: ricos en fe
  alternatives_spanish:
  - ricos en confianza
  - ricos en fidelidad
  lexicon: BDAG
  rationale: Se conserva el sentido usual de πίστις como «fe», que encaja con el contraste entre pobreza material y riqueza espiritual. «Fe» es la opción principal; las otras posibilidades quedan registradas como alternativas léxicas.
- source_word: κληρονόμους τῆς βασιλείας
  english_pob_choice: heirs of the kingdom
  chosen_spanish: herederos del reino
  alternatives_spanish:
  - herederos del reinado
  - herederos del Reino
  lexicon: BDAG
  rationale: «Herederos» corresponde con precisión a κληρονόμοι y conserva la relación jurídico-familiar. «Reino» traduce βασιλεία en forma clara y usual en español bíblico sin recurrir a formulaciones más teológicas que el contexto inmediato no exige.
- source_word: ἧς ἐπηγγείλατο
  english_pob_choice: that he promised
  chosen_spanish: que prometió
  alternatives_spanish:
  - que él prometió
  - que había prometido
  lexicon: BDAG
  rationale: La relativa se vierte de manera fluida con «que prometió». El verbo medio se expresa adecuadamente como «prometió» sin añadir matices reflexivos no explícitos en el contexto.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a quienes lo aman
  - a los que le aman
  lexicon: BDAG
  rationale: La construcción dativa se vierte naturalmente con «a los que lo aman». Se mantiene el presente participial como descripción característica de los destinatarios de la promesa.
theological_decisions:
- issue: Alcance de la elección divina en ἐξελέξατο
  english_pob_reading: Render ἐξελέξατο simply as 'chosen' without importing a technical doctrine of election beyond the verse's immediate point.
  chosen_spanish_reading: Traducir con «ha escogido» sin desarrollar una doctrina técnica de la elección más allá del argumento inmediato de Santiago.
  alternative_spanish_readings:
  - ha predestinado
  - ha seleccionado
  rationale: El pasaje subraya la valoración divina de los pobres y la incongruencia del favoritismo; la traducción debe conservar esa tensión textual sin resolver debates sistemáticos que el versículo no desarrolla.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: Keep 'brothers' in the main text and preserve inclusive force in a footnote.
  chosen_spanish_reading: Mantener «hermanos» en el texto principal y registrar en nota la posible inclusión de toda la comunidad.
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: El plural masculino griego es la forma del texto; en español se conserva por fidelidad formal, sin negar que el destinatario probablemente incluya a toda la asamblea.
  doctrine_reference: Translation philosophy §4
- issue: Valor de πίστις en la frase ἐν πίστει
  english_pob_reading: Use 'faith' in the main text.
  chosen_spanish_reading: Usar «fe» en el texto principal.
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: En este contexto la oposición con la pobreza material favorece «fe» como sentido principal. Las alternativas se conservan porque el campo semántico de πίστις puede abarcar confianza o fidelidad según el contexto.
  doctrine_reference: 'Contested terms table: πίστις'
translation_notes:
  revision_awareness: El registro en inglés muestra alta concordancia y una revisión reciente sin cambios; por eso la propuesta española sigue de cerca el texto auditado, manteniendo las decisiones léxicas principales (ἄκουσατε → Escuchen; πτωχοὺς τῷ κόσμῳ → pobres del mundo; πίστις → fe) y conservando las notas de alternativa donde el inglés POB ya documentó ambigüedad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca explícitamente el nombre divino; aquí el texto dice θεός, por lo que se traduce «Dios».
  - Se mantiene el masculino plural «hermanos» en el texto principal, con nota de posible inclusividad.
  - «Fe» se conserva como traducción principal de πίστις para coherencia con el proyecto.
  - «Reino» traduce βασιλεία de manera natural y consistente con el registro bíblico del español.
