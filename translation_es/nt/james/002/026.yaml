translation:
  language: es
  text: Porque así como el cuerpo sin espíritu[b][a] está muerto, así también la fe sin obras está muerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sin aliento’. La palabra griega puede significar ‘espíritu’ o ‘aliento’.
    reason: lexical_alternative
  - marker: b
    text: O ‘fidelidad’. La palabra griega también puede denotar confianza o fidelidad; aquí el texto principal sigue la traducción base ‘fe’.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: Introduce una comparación exacta y natural en español, manteniendo la relación analógica entre las dos cláusulas.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Conserva el valor explicativo/conectivo del griego y enlaza con el argumento previo de manera natural en español.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: Es el equivalente directo y estándar de σῶμα en este contexto físico literal.
- source_word: χωρὶς πνεύματος
  english_pob_choice: without the spirit
  chosen_spanish: sin espíritu
  alternatives_spanish:
  - sin aliento
  - sin aire vital
  lexicon: BDAG
  rationale: χωρίς expresa separación o ausencia; ‘sin espíritu’ conserva el término griego πνεῦμα y su sentido antropológico natural en la comparación, sin resolver la ambigüedad a favor de una sola lectura.
- source_word: νεκρόν
  english_pob_choice: is dead
  chosen_spanish: está muerto
  alternatives_spanish:
  - es muerto
  - está sin vida
  lexicon: BDAG
  rationale: En español, el predicado con ‘estar’ comunica mejor el estado resultante del cuerpo sin espíritu; mantiene la fuerza directa de νεκρόν sin volverlo interpretativo.
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual modo también
  - de la misma manera también
  lexicon: BDAG
  rationale: Reproduce la correspondencia enfática entre los dos miembros de la comparación con una fórmula idiomática y clara.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene la traducción base ‘fe’ en el texto principal, como en el POB inglés, preservando la discusión de sentido sin resolverla por paráfrasis.
- source_word: χωρὶς ἔργων
  english_pob_choice: without works
  chosen_spanish: sin obras
  alternatives_spanish:
  - aparte de obras
  - sin hechos
  lexicon: BDAG
  rationale: ‘Obras’ conserva el paralelismo léxico y el campo semántico de la discusión de Santiago mejor que alternativas más generales.
- source_word: νεκρά
  english_pob_choice: is dead
  chosen_spanish: está muerta
  alternatives_spanish:
  - es muerta
  - está sin vida
  lexicon: BDAG
  rationale: Mantiene la repetición de la imagen de muerte aplicada a la fe y su paralelismo con la primera cláusula.
theological_decisions:
- issue: Sentido de πνεύματος en la analogía
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - respiración
  rationale: La forma principal conserva el término del texto griego y su posible sentido antropológico; la nota preserva la alternativa ‘aliento’ sin cerrar indebidamente la ambigüedad.
  doctrine_reference: Preservar la tensión léxica de πνεῦμα sin resolverla dogmáticamente.
- issue: Posible alcance de πίστις en Santiago 2:26
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene ‘fe’ como lectura principal, conforme al POB inglés, dejando constancia de alternativas semánticas reconocidas sin convertirlas en paráfrasis del texto base.
  doctrine_reference: Mantener el término doctrinal base de πίστις y reservar alternativas en nota.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el archivo de auditoría en inglés. Se mantuvieron las dos repeticiones de νεκρόν/νεκρά con el mismo campo semántico (‘muerto/muerta’) y se preservó la ambigüedad de πνεύματος mediante nota, como en el POB inglés. No se registraron revisiones posteriores que alteraran la solución de traducción.
  spanish_consistency_notes:
  - Se prefirió ‘cuerpo’ para σῶμα y ‘obras’ para ἔργα por coherencia con el argumento de Santiago.
  - Se usó ‘espíritu’ en el texto principal y ‘aliento’ en nota para no perder la correspondencia con πνεῦμα.
  - La concordancia de género en ‘muerta’ sigue el sustantivo femenino ‘fe’.
  - Se evitó ‘siempre’ o ‘solamente’ para no añadir énfasis ajeno al griego.
