translation:
  language: es
  text: 'Y se cumplió la Escritura que dice[a]: «Abraham creyó a Dios, y le fue contado como rectitud, y fue llamado amigo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acreditado»; el verbo griego también puede traducirse «considerado» o «imputado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπληρώθη
  english_pob_choice: was fulfilled
  chosen_spanish: se cumplió
  alternatives_spanish:
  - fue cumplida
  - llegó a cumplirse
  lexicon: BDAG
  rationale: En una fórmula de cita bíblica, el pasivo de πληρόω expresa que la Escritura llegó a su pleno cumplimiento. «Se cumplió» es natural en español, mantiene el matiz de cumplimiento de una cita autorizada y evita un calco rígido.
- source_word: γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - el escrito
  - el pasaje de la Escritura
  lexicon: BDAG
  rationale: En el uso neotestamentario, γραφή alude a la Escritura como testimonio sagrado, no a cualquier escrito. El singular con artículo se refleja bien con «la Escritura».
- source_word: λέγουσα
  english_pob_choice: that says
  chosen_spanish: que dice
  alternatives_spanish:
  - que afirma
  - diciendo
  lexicon: BDAG
  rationale: El participio presente que modifica a «la Escritura» funciona idiomáticamente como introducción de cita. «Que dice» conserva la referencia textual y suena natural en español.
- source_word: Ἐπίστευσεν ... τῷ θεῷ
  english_pob_choice: Abraham believed God
  chosen_spanish: Abraham creyó a Dios
  alternatives_spanish:
  - Abraham creyó en Dios
  - Abraham confió en Dios
  lexicon: BDAG
  rationale: El dativo con πιστεύω aquí expresa creer a Dios, es decir, tomarlo por verdadero y creerle su palabra. «Creyó a Dios» preserva esa fuerza relacional y evita desplazar el sentido hacia una formulación más interpretativa.
- source_word: ἐλογίσθη
  english_pob_choice: it was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue acreditado
  - le fue considerado
  lexicon: BDAG
  rationale: λογίζομαι en pasivo tiene un matiz contable/forense. «Le fue contado» mantiene esa imagen con buena naturalidad. En la nota se preservan alternativas cercanas como «acreditado» y «considerado».
- source_word: εἰς δικαιοσύνην
  english_pob_choice: as righteousness
  chosen_spanish: como justicia
  alternatives_spanish:
  - como rectitud
  - para justicia
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «righteousness», en español «justicia» comunica bien la idea de ser contado en relación con la norma divina y respeta el campo semántico amplio de δικαιοσύνη. Se evita «justificación» porque introduciría un término técnico no presente aquí. «Rectitud» queda como posible alternativa estilística, pero «justicia» es la opción más directa y source-near.
- source_word: φίλος θεοῦ
  english_pob_choice: a friend of God
  chosen_spanish: amigo de Dios
  alternatives_spanish:
  - amigo de Dios mismo
  - amigo de Yahvé
  lexicon: BDAG
  rationale: La construcción nominativa con genitivo se expresa naturalmente como «amigo de Dios». Conserva el carácter relacional del título sin sobrecargarlo con interpretaciones adicionales.
- source_word: ἐκλήθη
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fue nombrado
  - fue conocido como
  lexicon: BDAG
  rationale: 'El pasivo de καλέω se traduce de forma directa con «fue llamado». Deja abierta la amplitud del griego: designación, reconocimiento o denominación.'
theological_decisions:
- issue: Relación entre fe y obras en la argumentación de Santiago
  english_pob_reading: Preserve James's claim that Scripture was fulfilled in Abraham's demonstrated action, without importing a denominational resolution of justification debates.
  chosen_spanish_reading: Mantener la afirmación de que la Escritura se cumplió en la acción de Abraham, sin resolver en la traducción el debate doctrinal sobre fe y obras.
  alternative_spanish_readings:
  - Una redacción que separara tajantemente la fe de la acción obediente de Abraham
  - Una redacción que hiciera de las obras la base completa de la justicia
  rationale: El versículo une Génesis 15:6 con el obrar posterior de Abraham. La traducción debe conservar esa tensión textual y teológica, no suavizarla ni resolverla con una síntesis doctrinal externa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Traducción de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: En este contexto de cita de Génesis y lenguaje de contar/imputar, «justicia» es el equivalente más estable y amplio. «Justificación» sería demasiado técnico y «rectitud» puede sonar más moral que forense.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness'
translation_notes:
  revision_awareness: El pasaje inglés auditado fue revisado para omitir el «And» inicial dentro de la cita; en español se refleja con una apertura sobria («Y se cumplió...») y la cita comienza directamente con la cláusula atribuida a la Escritura, sin repetir una conjunción interior innecesaria. La opción española mantiene el valor de cumplimiento de la fórmula y la frase bíblica tradicional sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ y no se introduce ninguna convención de máscara para el nombre divino porque en este versículo el texto griego usa θεός.
  - Se usa «justicia» para δικαιοσύνη de manera consistente con la decisión doctrinal del pasaje y con la necesidad de conservar la cita de Génesis en un español claro.
  - 'La puntuación de la cita sigue el español moderno: dos puntos antes de las comillas y coma interna donde corresponde a la sintaxis de la cláusula citada.'
  - No se introduce «Cristo» ni terminología eclesiástica adicional, pues el verso no la requiere.
