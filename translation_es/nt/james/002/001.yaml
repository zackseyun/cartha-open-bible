    rationale: El griego incluye explícitamente 'de gloria'. Aunque la relación sintáctica sea debatida, el español no debe eliminarla. El rastro inglés preservó esta información al menos en notas, y la decisión léxica española de 'absorberla' deja sin traducir una palabra fuente.
  - severity: medium
    issue: La nota d no refleja con precisión la alternativa inglesa más natural
    rationale: La nota actual 'nuestro Señor Jesús Mesías, el Señor de gloria' es comprensible, pero para corresponder mejor a 'our Lord Jesus Messiah, the Lord of glory' y sonar más idiomática en español, conviene 'nuestro Señor Jesús Mesías, el Señor de la gloria' o conservarla como alternativa explícita mejor formulada.
  - severity: low
    issue: Anclaje acumulado de cuatro notas sobre 'Mesías'
    rationale: No es incorrecto, pero visualmente es pesado. Aun así, puede mantenerse porque las cuatro notas sí pertenecen al sintagma cristológico y no hace falta reestructurarlas para esta reparación.
