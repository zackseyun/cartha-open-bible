translation:
  language: es
  text: Hermanos míos, no tengan la fe de nuestro Señor Jesús Mesías[a][b][c][d], el Señor de gloria, con parcialidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego dice 'hermanos', pero se dirige a la comunidad creyente en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O 'la fe en nuestro Señor Jesús Mesías'. La construcción griega puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: c
    text: O 'nuestro glorioso Señor Jesús Mesías'.
    reason: lexical_alternative
  - marker: d
    text: O 'nuestro Señor Jesús Mesías, el Señor de gloria'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀδελφοί μου
  english_pob_choice: My brothers
  chosen_spanish: Hermanos míos
  alternatives_spanish:
  - Hermanos y hermanas míos
  - Hermanos y hermanas
  lexicon: BDAG
  rationale: El vocativo masculino plural se conserva de manera directa como 'Hermanos míos'. En el contexto de la comunidad creyente, la inclusión de mujeres puede explicitarse en nota, sin borrar la forma gramatical del griego en el texto principal.
- source_word: μὴ ... ἔχετε
  english_pob_choice: do not hold
  chosen_spanish: no tengan
  alternatives_spanish:
  - no tengan como
  - no mantengan
  lexicon: BDAG
  rationale: El imperativo presente con μή expresa prohibición. 'No tengan' comunica bien la instrucción en español y mantiene la idea de sostener o practicar una actitud, sin sonar forzado.
- source_word: ἐν προσωπολημψίαις
  english_pob_choice: with partiality
  chosen_spanish: con parcialidad
  alternatives_spanish:
  - con favoritismo
  - sin acepción de personas
  lexicon: BDAG
  rationale: προσωπολημψία denota favoritismo o parcialidad. 'Con parcialidad' es natural en español moderno y preserva el sentido ético, evitando una fórmula más arcaica o más interpretativa.
- source_word: τὴν πίστιν
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe
  - la confianza
  lexicon: BDAG
  rationale: Se conserva 'la fe' como traducción normal de πίστις. El artículo permite entender una fe concreta, definida por su relación con el Señor Jesús Mesías, sin resolver de más la construcción.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: of our Lord Jesus Messiah
  chosen_spanish: de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - en nuestro Señor Jesús Mesías
  - de nuestro Señor Jesucristo
  lexicon: BDAG
  rationale: κύριος se traduce 'Señor' y Χριστός como 'Mesías' por tratarse aquí de un título. Se mantiene la estructura genitiva del griego para no cerrar la posible relación de πίστις con 'de' o 'en' en el texto principal.
- source_word: τῆς δόξης
  english_pob_choice: the Lord of glory / our glorious Lord
  chosen_spanish: —
  alternatives_spanish:
  - glorioso
  - de gloria
  lexicon: BDAG
  rationale: En el texto principal no se añade un equivalente interpretativo para δόξης, siguiendo la revisión inglesa más cauta que evitó resolverlo como 'glorioso'. La expresión queda absorbida en la construcción completa sin sobretraducir el genitivo.
theological_decisions:
- issue: Relación genitiva de 'τὴν πίστιν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ'
  english_pob_reading: The faith of our Lord Jesus Messiah, with 'faith in our Lord Jesus Messiah' preserved in a footnote.
  chosen_spanish_reading: la fe de nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - la fe en nuestro Señor Jesús Mesías
  rationale: El griego admite más de una relación entre πίστις y el genitivo siguiente. En español, el texto principal conserva la forma más cercana al orden y a la ambigüedad del original, mientras la nota preserva la lectura alternativa 'fe en'.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene 'Mesías' porque aquí Χριστός funciona como título, no como simple forma litúrgica fija. Esto conserva el valor semántico del griego y sigue la política terminológica del proyecto.
  doctrine_reference: 'Translation philosophy §2; Contested terms: Χριστός'
- issue: Alcance del vocativo Ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: Hermanos míos
  alternative_spanish_readings:
  - Hermanos y hermanas míos
  rationale: La forma masculina del griego se conserva en el texto principal. Como el destinatario es la comunidad creyente en conjunto, la inclusión amplia se preserva mejor en nota que neutralizando la forma original.
  doctrine_reference: Translation philosophy §4
- issue: Tratamiento de δόξης
  english_pob_reading: our Lord Jesus Messiah, the Lord of glory / our glorious Lord Jesus Messiah
  chosen_spanish_reading: sin adición explícita en el cuerpo del verso
  alternative_spanish_readings:
  - nuestro glorioso Señor Jesús Mesías
  - el Señor de gloria
  rationale: La revisión inglesa posterior evitó resolver δόξης como 'glorious' por ser demasiado interpretativo. En español se sigue esa cautela para no fijar un matiz que el griego puede expresar de forma más abierta.
  doctrine_reference: Translation philosophy §3; notas de revisión
translation_notes:
  revision_awareness: La versión inglesa pasó por revisiones que oscilaron entre 'our glorious Lord Jesus Messiah' y una forma más cauta sin 'glorious'; el texto español principal evita cerrar esa tensión y conserva la ambigüedad de la relación genitiva y del sintagma de 'gloria' mediante una redacción sobria y notas alternativas.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός, coherente con la política terminológica del proyecto.
  - Se usa 'Señor' para κύριος.
  - La puntuación mantiene un vocativo inicial natural en español y una clausula breve con prohibición directa.
  - La nota a conserva la posible amplitud inclusiva del vocativo sin alterar el texto principal.
  - La nota b preserva la ambigüedad de πίστις + genitivo, que en español también puede leerse como 'de' o 'en'.
