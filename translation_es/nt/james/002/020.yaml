translation:
  language: es
  text: ¿Quieres saber, oh, hombre necio[a], que la fe, aparte de las obras, es inútil[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre vano». El griego dice literalmente «hombre vacío».
    reason: lexical_alternative
  - marker: b
    text: O «está inactiva» o «es ineficaz». El término griego indica algo inactivo o improductivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλεις δὲ γνῶναι
  english_pob_choice: But do you want to know
  chosen_spanish: ¿Quieres saber
  alternatives_spanish:
  - ¿Deseas saber
  - ¿Quieres conocer
  lexicon: BDAG
  rationale: θέλεις expresa voluntad o deseo, y γνῶναι pide un infinitivo de conocimiento. En español, «¿Quieres saber?» comunica con naturalidad la pregunta retórica sin añadir explicación interpretativa.
- source_word: ὦ ἄνθρωπε κενέ
  english_pob_choice: O foolish man
  chosen_spanish: oh hombre vacío
  alternatives_spanish:
  - oh hombre necio
  - oh hombre vano
  lexicon: BDAG
  rationale: ἄνθρωπε es un vocativo singular masculino, por lo que se conserva «hombre». κενέ significa literalmente «vacío», y ese sentido material/metafórico es el más cercano al griego; «necio» o «vano» son alternativas interpretativas que se mantienen como posibilidades en nota.
- source_word: ἡ πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: En este contexto πίστις se refiere a la fe profesada; «fe» es la equivalencia más directa y menos cargada interpretativamente en español.
- source_word: χωρὶς τῶν ἔργων
  english_pob_choice: apart from works
  chosen_spanish: aparte de las obras
  alternatives_spanish:
  - sin las obras
  - separada de las obras
  lexicon: BDAG
  rationale: χωρὶς con genitivo expresa separación o exclusión. «Aparte de las obras» conserva bien esa relación sin sonar forzado en español; «obras» mantiene el término técnico del argumento de Santiago.
- source_word: ἀργή ἐστιν
  english_pob_choice: is useless
  chosen_spanish: es inútil
  alternatives_spanish:
  - está inactiva
  - no produce nada
  - es ineficaz
  lexicon: BDAG
  rationale: ἀργός puede significar inactivo, improductivo o ineficaz. «Inútil» comunica en español el efecto práctico de una fe que no produce obras, sin resolver la tensión del término hacia «muerta», que pertenece al verso cercano pero no a este.
theological_decisions:
- issue: Relación entre fe y obras en Santiago 2:20
  english_pob_reading: faith apart from works is useless
  chosen_spanish_reading: la fe, aparte de las obras, es inútil
  alternative_spanish_readings:
  - la fe, sin obras, está inactiva
  - la fe, aparte de las obras, no produce nada
  rationale: 'El griego usa ἀργή, no νεκρά, así que conviene preservar el matiz propio del versículo: no se sustituye por «muerta». La traducción deja intacta la afirmación de Santiago de que una fe aislada de las obras carece de eficacia.'
  doctrine_reference: Preservar la tensión léxica del texto sin armonizarla artificialmente con el versículo siguiente.
translation_notes:
  revision_awareness: El texto inglés de referencia pasó de «O empty man» a «O foolish man» por naturalidad contextual, pero el griego sigue diciendo κενέ («vacío»). En español se ha optado por conservar el sentido literal primario en el cuerpo del texto y registrar las alternativas interpretativas en nota, manteniendo también ἀργή como «inútil» para no importar «muerta» desde el contexto inmediato.
  spanish_consistency_notes:
  - Se mantiene «fe» para πίστις y «obras» para ἔργων, siguiendo el uso técnico del pasaje.
  - «Aparte de» reproduce la separación de χωρὶς con un español natural y claro.
  - Se conserva la invocación vocativa con «oh» para reflejar el tono retórico del griego.
  - No se usa «Cristo», «SEÑOR» ni otros términos no presentes en el verso.
