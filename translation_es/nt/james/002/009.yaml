revisions:
- from: Pero si muestran parcialidad[a], cometen pecado y son convictos por la ley como transgresores[c].
  to: Pero si muestran parcialidad[a], cometen pecado y son declarados culpables[b] por la ley como transgresores[c].
  rationale: Se revisa principalmente «son convictos» a «son declarados culpables» para lograr un español más natural y ampliamente inteligible, sin perder el marco judicial del griego. También se añade la nota correspondiente a ἐλεγχόμενοι para conservar el rango semántico documentado en la auditoría inglesa.
