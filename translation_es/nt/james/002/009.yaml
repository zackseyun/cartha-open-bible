translation:
  language: es
  text: Pero si muestran parcialidad[a], cometen pecado y son declarados culpables[b] por la ley como transgresores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muestran favoritismo». El verbo griego προσωπολημπτέω alude a juzgar o tratar a las personas según su apariencia o estatus externo.
    reason: lexical_alternative
  - marker: b
    text: O «quedan expuestos» o «son reprendidos» por la ley. El participio griego lleva la idea de que su maldad sale a la luz y queda demostrada como culpable.
    reason: lexical_alternative
  - marker: c
    text: O «como quebrantadores de la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora si
  - Y si
  lexicon: BDAG
  rationale: εἰ introduce una condición, y δέ añade una leve transición o contraste. «Pero si» conserva ambos matices de forma natural en español.
- source_word: προσωπολημπτεῖτε
  english_pob_choice: you show partiality
  chosen_spanish: muestran parcialidad
  alternatives_spanish:
  - muestran favoritismo
  - reciben a la persona
  lexicon: BDAG
  rationale: El verbo alude a tratar o juzgar a otros según apariencia o estatus externo. «Mostrar parcialidad» es claro y fiel al sentido idiomático sin volverlo demasiado literal.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - culpa
  lexicon: BDAG
  rationale: El sustantivo expresa la acción o estado de pecar; «pecado» es el equivalente directo y bíblicamente transparente en español.
- source_word: ἐργάζεσθε
  english_pob_choice: you commit
  chosen_spanish: cometen
  alternatives_spanish:
  - están cometiendo
  - practican
  lexicon: BDAG
  rationale: Con ἁμαρτίαν, el verbo significa hacer o cometer pecado. En español, «cometen» transmite el sentido idiomático con naturalidad y mantiene la fuerza presente.
- source_word: ἐλεγχόμενοι
  english_pob_choice: being convicted
  chosen_spanish: son convictos
  alternatives_spanish:
  - son expuestos
  - son reprendidos
  - quedan convictos
  lexicon: BDAG
  rationale: El participio pasivo presenta la acción de la ley que expone y demuestra culpabilidad. «Son convictos» conserva el matiz judicial; suena más directo que una perífrasis larga, aunque sigue siendo una opción marcadamente formal.
- source_word: ὑπὸ τοῦ νόμου
  english_pob_choice: by the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - por la Ley
  - por la ley de Dios
  lexicon: BDAG
  rationale: νόμος aquí funciona como norma jurídica/moral que acusa la conducta parcial. «Por la ley» mantiene el ámbito general sin especificar más de lo que el griego exige.
- source_word: ὡς παραβάται
  english_pob_choice: as transgressors
  chosen_spanish: como transgresores
  alternatives_spanish:
  - como violadores de la ley
  - como quebrantadores
  lexicon: BDAG
  rationale: παραβάται designa a quienes cruzan un límite o infringen una norma. «Transgresores» preserva el registro bíblico y jurídico sin añadir una palabra inexistente en el griego.
theological_decisions:
- issue: Naturaleza de la ley que acusa la parcialidad
  english_pob_reading: Render νόμος as 'law' without specifying 'Mosaic law' or capitalizing 'Law.'
  chosen_spanish_reading: Traducir νόμος como «ley» sin añadir «Ley» mayúscula ni especificar «ley mosaica».
  alternative_spanish_readings:
  - la Ley
  - la ley de Dios
  rationale: El texto presenta la ley como estándar que revela el pecado de la parcialidad. El griego no obliga a una precisión confesional más estrecha; por eso se conserva el alcance general del argumento.
  doctrine_reference: Mantener la tensión del texto original sin resolverla mediante una glosa teológica no exigida por el griego.
translation_notes:
  revision_awareness: 'El inglés POB pasó de una construcción más literal con participio («being convicted by the law») a una coordinación más natural («are convicted by the law»). En español, se optó por una solución igualmente directa: «son convictos por la ley», manteniendo el matiz pasivo-judicial del participio y la fluidez de la oración.'
  spanish_consistency_notes:
  - Se mantuvo «parcialidad» como equivalente principal de προσωπολημπτέω, coherente con el valor idiomático documentado.
  - «Pecado» y «transgresores» conservan el registro legal-moral del versículo.
  - No se capitalizó «ley», siguiendo la decisión auditada del inglés POB de no restringir el alcance del término.
  - Se evitó «siervo» o vocabulario eclesiástico no pertinente; el versículo es jurídico-ético.
  - La nota c se ancla en «transgresores» porque ahí está la alternativa lexical documentada en el POB inglés.
