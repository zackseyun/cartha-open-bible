translation:
  language: es
  text: Porque si entra en vuestra asamblea[a] un hombre con anillos de oro y con ropa espléndida, y también entra un hombre pobre con ropa mugrienta,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «sinagoga»: el término griego es synagōgē, literalmente «sinagoga» o «asamblea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναγωγήν
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - sinagoga
  - reunión
  lexicon: BDAG
  rationale: En el contexto de Santiago, el término puede referirse a una reunión cristiana; «asamblea» comunica ese sentido sin imponer la idea de una institución judía formal. «Sinagoga» se conserva como alternativa literal porque el griego usa συναγωγή y esa resonancia histórica es relevante.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego es masculino singular y presenta a un individuo masculino en la ilustración; «un hombre» conserva esa precisión gramatical y retórica.
- source_word: χρυσοδακτύλιος
  english_pob_choice: wearing gold rings
  chosen_spanish: con anillos de oro
  alternatives_spanish:
  - luciendo anillos de oro
  - con un anillo de oro
  lexicon: BDAG
  rationale: El adjetivo griego describe a alguien adornado con oro en los dedos. En español, «con anillos de oro» transmite naturalmente la imagen de riqueza ostentosa mejor que una forma demasiado literal o extraña.
- source_word: ἐσθῆτι λαμπρᾷ
  english_pob_choice: bright clothing
  chosen_spanish: ropa espléndida
  alternatives_spanish:
  - ropa brillante
  - ropa fina
  - vestiduras espléndidas
  lexicon: BDAG
  rationale: λαμπρός puede ser «brillante», «espléndido» o «fino». «Espléndida» preserva el valor de apariencia destacada y socialmente llamativa de la vestimenta, con un español más natural que «brillante» para ropa.
- source_word: πτωχὸς
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - una persona pobre
  lexicon: BDAG
  rationale: Como sustantivo, πτωχός designa aquí a una persona pobre. En español, «un pobre» mantiene la concisión y el contraste retórico del original.
- source_word: ῥυπαρᾷ ἐσθῆτι
  english_pob_choice: filthy clothing
  chosen_spanish: ropa sucia
  alternatives_spanish:
  - ropa inmunda
  - ropa andrajosa
  - ropa miserable
  lexicon: BDAG
  rationale: ῥυπαρός expresa suciedad, suciedad visible o aspecto mugriento. «Ropa sucia» conserva la idea sin exagerar con un término que en español sonaría más áspero de lo que el contexto exige.
- source_word: εἰσέλθῃ ... εἰσέλθῃ
  english_pob_choice: enters ... also enters
  chosen_spanish: entra ... y también entra
  alternatives_spanish:
  - entra ... entra también
  - ingresa ... y también ingresa
  lexicon: BDAG
  rationale: Se repite el mismo verbo para mantener el paralelismo hipotético del griego. «Entra ... y también entra» reproduce esa repetición de forma clara y fluida en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento para la exhortación anterior. «Porque» conserva esa relación causal-explicativa en un español bíblico claro.
theological_decisions:
- issue: Rendering συναγωγή in a Christian-context epistle
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - sinagoga
  rationale: No hay una afirmación doctrinal sobre la naturaleza institucional del lugar; la decisión es contextual y lexical. «Asamblea» evita sugerir erróneamente una sinagoga formal, pero se preserva la lectura literal en nota para transparencia.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y recibió acuerdo alto sin cambios; la redacción española sigue esa lectura estable, manteniendo la distinción lexical entre συναγωγή y una reunión cristiana sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se usa «asamblea» para συναγωγή conforme al contexto, con «sinagoga» preservado en nota por transparencia.
  - Se mantiene la repetición de «entra» para reflejar el paralelismo del griego.
  - «Ropa sucia» traduce ῥυπαρᾷ ἐσθῆτι con un registro natural y suficientemente fuerte.
  - Se evita «Cristo/SEÑOR» u otra terminología ajena porque no intervienen en este versículo.
