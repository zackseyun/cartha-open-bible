translation:
  language: es
  text: Y asimismo, ¿no fue justificada[a] Rahab la prostituta por las obras, cuando recibió a los mensajeros[b] y los envió por otro camino?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declarada justa» o «mostrada como justa». El griego dice literalmente «justificada», y la traducción conserva ese verbo sin resolver la discusión teológica sobre el matiz aquí.
    reason: lexical_alternative
  - marker: b
    text: Griego «mensajeros»; el contexto se refiere a los hombres que Rahab recibió (Josué 2), no a seres celestiales.
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως δὲ καὶ
  english_pob_choice: And likewise ... also
  chosen_spanish: Y asimismo
  alternatives_spanish:
  - Asimismo
  - Y de igual manera
  lexicon: BDAG
  rationale: La combinación introduce un segundo caso paralelo al de Abraham y añade la idea de continuidad. «Y asimismo» conserva esa relación comparativa y suena natural en español, sin diluir el enlace del griego.
- source_word: Ῥαὰβ
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Rajab
  lexicon: Convención onomástica
  rationale: Se mantiene el nombre propio en transliteración usual. «Rahab» es reconocible y fiel al testimonio del texto fuente y del uso cristiano extendido.
- source_word: ἡ πόρνη
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la mujer prostituida
  lexicon: BDAG
  rationale: πόρνη designa de forma directa a una prostituta. «La prostituta» preserva la fuerza social y moral del término con español claro y contemporáneo; se evita «ramera» por ser más arcaico o marcado.
- source_word: οὐκ ... ἐδικαιώθη
  english_pob_choice: was not ... justified
  chosen_spanish: ¿no fue justificada?
  alternatives_spanish:
  - ¿no fue declarada justa?
  - ¿no fue mostrada como justa?
  lexicon: BDAG
  rationale: Se conserva «justificada» para mantener el enlace léxico con δικαιόω y no resolver la tensión teológica del pasaje. Las alternativas interpretan el matiz, pero el texto griego sostiene la forma verbal de «justificar».
- source_word: ἐξ ἔργων
  english_pob_choice: by works
  chosen_spanish: por las obras
  alternatives_spanish:
  - por obras
  - sobre la base de obras
  lexicon: BDAG
  rationale: «Por las obras» expresa la base o medio indicado por ἐκ con genitivo en un español natural. Mantiene el contraste argumental de Santiago sin sobreexplicarlo.
- source_word: ὑποδεξαμένη
  english_pob_choice: when she welcomed
  chosen_spanish: cuando recibió
  alternatives_spanish:
  - cuando acogió
  - cuando dio hospedaje a
  lexicon: BDAG
  rationale: Aunque la nota inglesa privilegia «welcomed», el verbo griego aquí subraya recepción hospitalaria. «Recibió» es sobrio y fiel; «acogió» sería posible, pero puede intensificar más de lo que el texto exige.
- source_word: τοὺς ἀγγέλους
  english_pob_choice: the messengers
  chosen_spanish: a los mensajeros
  alternatives_spanish:
  - a los ángeles
  - a los espías
  lexicon: BDAG
  rationale: Se sigue la decisión auditada de entender ἄγγελος como «mensajero» por el contexto de Josué 2. «Ángeles» sería erróneo aquí; «espías» es contextual pero menos directamente léxico.
- source_word: καὶ ἑτέρᾳ ὁδῷ ἐκβαλοῦσα
  english_pob_choice: and sent them out by another way
  chosen_spanish: y los envió por otro camino
  alternatives_spanish:
  - y los hizo salir por otro camino
  - y los despidió por otro camino
  lexicon: BDAG
  rationale: ἐκβάλλω aquí funciona como hacer salir/despachar, no como expulsión violenta. «Los envió por otro camino» comunica bien la acción y preserva la contraposición de «otro camino».
theological_decisions:
- issue: Sentido de δικαιόω en Santiago 2:25 y su relación con fe y obras
  english_pob_reading: Retain 'justified' in the main text without narrowing it to either initial forensic justification or later vindication.
  chosen_spanish_reading: Mantener «justificada» en el cuerpo del texto sin reducirlo a «declarada justa» o «mostrada como justa».
  alternative_spanish_readings:
  - declarada justa
  - mostrada como justa
  rationale: Santiago usa δικαιόω de manera que conserva tensión entre justificación y demostración pública de justicia. La traducción no debe cerrar ese debate; «justificada» mantiene la conexión verbal con el griego y deja abierta la discusión doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión inglesa, que mantuvo la redacción sin cambios. No hay revisiones aplicadas en el expediente fuente; por ello la versión española conserva la misma decisión central sobre δικαιόω y sobre ἄγγελος = «mensajeros».
  spanish_consistency_notes:
  - Se conserva el nombre propio Rahab en la forma usual castellana del ámbito bíblico.
  - «Justificada» se mantiene de forma consistente con la terminología POB para δικαιόω, evitando una paráfrasis doctrinal.
  - «Mensajeros» sigue la lectura contextual del relato de Josué y evita el falso sentido de «ángeles».
  - Se usa «por otro camino» para reproducir la idea de ἑτέρᾳ ὁδῷ sin añadir detalle no presente en el griego.
  - La puntuación en forma de pregunta retórica respeta la estructura del original griego.
