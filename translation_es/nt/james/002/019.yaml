translation:
  language: es
  text: Tú crees que Dios es uno[a]; haces bien. Hasta los demonios creen y se estremecen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hay un solo Dios». El griego puede leerse de ambas maneras; «Dios es uno» sigue más de cerca la redacción griega y conserva el eco de la confesión monoteísta judía.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tiemblan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Usted
  lexicon: BDAG
  rationale: El pronombre explícito en griego añade énfasis. En español, "Tú" conserva el señalamiento directo en segunda persona singular sin añadir una paráfrasis innecesaria.
- source_word: πιστεύεις
  english_pob_choice: believe
  chosen_spanish: crees
  alternatives_spanish:
  - tienes fe
  - confías
  lexicon: BDAG
  rationale: Aquí πιστεύω introduce una proposición con ὅτι; "crees" es la forma más natural y directa en español para expresar asentimiento mental a una afirmación doctrinal.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: '"Que" introduce de manera natural el contenido de la creencia en español.'
- source_word: εἷς ἐστιν ὁ θεός
  english_pob_choice: God is one
  chosen_spanish: Dios es uno
  alternatives_spanish:
  - hay un solo Dios
  - Dios es uno solo
  lexicon: BDAG
  rationale: Se mantiene la cercanía a la sintaxis griega y el eco monoteísta de la confesión bíblica. "Dios es uno" conserva la predicación sin convertirla en una formulación más explicativa que el griego.
- source_word: καλῶς ποιεῖς
  english_pob_choice: you do well
  chosen_spanish: haces bien
  alternatives_spanish:
  - estás obrando bien
  - lo haces bien
  lexicon: BDAG
  rationale: La expresión breve y idiomática se refleja de forma directa en español; "haces bien" preserva el tono conciso del original.
- source_word: καὶ
  english_pob_choice: Even
  chosen_spanish: También
  alternatives_spanish:
  - Incluso
  - Y
  lexicon: BDAG
  rationale: En este contexto, el griego introduce una comparación inclusiva entre el creyente y los demonios. "También" mantiene la relación sin forzar en español una lectura ascendente tan marcada como "Incluso".
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malignos
  - demonios
  lexicon: BDAG
  rationale: '"Los demonios" es la equivalencia directa y clara para δαιμόνια; evita una expansión interpretativa como "espíritus malignos".'
- source_word: πιστεύουσιν
  english_pob_choice: believe
  chosen_spanish: creen
  alternatives_spanish:
  - tienen fe
  lexicon: BDAG
  rationale: Se conserva la repetición léxica de πιστεύω con el mismo verbo español que en la primera cláusula, reforzando el argumento de Santiago sobre un mero asentimiento.
- source_word: φρίσσουσιν
  english_pob_choice: shudder
  chosen_spanish: se estremecen
  alternatives_spanish:
  - tiemblan
  - tiritan
  lexicon: BDAG
  rationale: '"Se estremecen" comunica una reacción corporal de temor. Es una opción natural en español y mantiene la fuerza del verbo sin sonar arcaica.'
theological_decisions:
- issue: La confesión monoteísta εἷς ἐστιν ὁ θεός
  english_pob_reading: God is one
  chosen_spanish_reading: Dios es uno
  alternative_spanish_readings:
  - hay un solo Dios
  - Dios es uno solo
  rationale: Se conserva la forma predicativa cercana al griego y el posible eco de la confesión de Israel sobre la unicidad divina. La traducción no atenúa el monoteísmo; simplemente refleja la estructura de la frase.
  doctrine_reference: Afirrmaciones; Deuteronomio 6:4
- issue: El contraste retórico entre la fe humana y la de los demonios
  english_pob_reading: Even the demons believe—and shudder
  chosen_spanish_reading: También los demonios creen y se estremecen
  alternative_spanish_readings:
  - Y los demonios también creen y tiemblan
  - Incluso los demonios creen y se estremecen
  rationale: '"También" preserva la comparación que Santiago establece entre la creencia humana y la demoniaca. Aunque la edición inglesa usa "Even" para resaltar el contraste, en español "También" comunica con claridad la inclusión comparativa sin volver el tono demasiado enfático.'
  doctrine_reference: Santiago 2:14-26; fe como asentimiento versus fe salvadora
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y tiene en cuenta el audit trail inglés de la POB. Se conserva la repetición de πιστεύω con «crees/creen», se mantiene la confesión monoteísta en forma predicativa, y se ofrece una nota para la alternativa semántica de φρίσσω. No se aplicaron revisiones posteriores al texto base.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y se mantiene la confesión en singular.
  - Se conserva el mismo verbo español para πιστεύω en ambas cláusulas para reflejar la repetición del griego.
  - El tono es digno y actual, sin recurrir a fórmulas litúrgicas arcaicas.
  - Las notas emplean marcas únicas y aparecen ancladas en el texto con el formato requerido.
