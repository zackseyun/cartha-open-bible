translation:
  language: es
  text: Si un hermano o una hermana están mal vestidos[a] y les falta alimento diario,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desnudos'; el término griego puede significar literalmente 'desnudos', pero aquí probablemente se refiere a estar insuficientemente vestidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si alguna vez
  - Supongamos que
  lexicon: BDAG
  rationale: Introduce una condición hipotética de forma natural en español, conservando el valor condicional del griego sin añadir matices no presentes en el texto.
- source_word: ἀδελφὸς ἢ ἀδελφή
  english_pob_choice: a brother or sister
  chosen_spanish: un hermano o una hermana
  alternatives_spanish:
  - un hermano o una hermana de la comunidad
  - un creyente
  lexicon: BDAG
  rationale: Reproduce de manera directa la pareja masculina/femenina del griego y mantiene el lenguaje familiar que James usa en el contexto.
- source_word: γυμνοὶ
  english_pob_choice: poorly clothed
  chosen_spanish: desnudos[a]
  alternatives_spanish:
  - mal vestidos
  - pobremente vestidos
  - sin ropa
  lexicon: BDAG
  rationale: El griego puede significar literalmente 'desnudos' o, por contexto, 'mal vestidos'. Se conserva la tensión lexical con 'desnudos' y se señala la alternativa interpretativa en la nota, siguiendo la cautela del POB en inglés.
- source_word: ὑπάρχωσιν
  english_pob_choice: is
  chosen_spanish: está[n]
  alternatives_spanish:
  - se encuentra[n]
  - se halla[n]
  lexicon: BDAG
  rationale: Funciona como verbo copulativo/existencial. En español, 'está[n]' comunica con naturalidad la situación del sujeto sin sobretraducir.
- source_word: λειπόμενοι
  english_pob_choice: lacking
  chosen_spanish: carece[n] de
  alternatives_spanish:
  - falta[n] de
  - está[n] sin
  lexicon: BDAG
  rationale: Expresa la idea continua de carencia o insuficiencia. 'Carecer de' resulta claro y conserva el sentido de necesidad presente en el participio.
- source_word: τῆς ἐφημέρου τροφῆς
  english_pob_choice: daily food
  chosen_spanish: alimento diario
  alternatives_spanish:
  - comida diaria
  - alimento para cada día
  - sustento diario
  lexicon: BDAG
  rationale: '''τροφῆς'' denota alimento/sustento; ''ἐφήμερος'' añade la idea de lo diario o para el día. ''Alimento diario'' comunica ese sustento cotidiano de forma fiel y publicable.'
theological_decisions:
- issue: Sentido de γυμνοὶ en un contexto de necesidad material
  english_pob_reading: The Greek term can mean literally unclothed, but here likely refers to being inadequately clothed.
  chosen_spanish_reading: Se traduce 'desnudos', pero se deja una nota para indicar que el sentido probable es 'mal vestidos' o 'pobremente vestidos'.
  alternative_spanish_readings:
  - mal vestidos
  - pobremente vestidos
  - sin ropa
  rationale: El texto griego permite la lectura fuerte literal y también una lectura contextual de insuficiencia de vestido. Como el POB inglés retuvo la ambigüedad en nota, el español conserva esa tensión para no borrar una posibilidad lexical real.
  doctrine_reference: Translation philosophy §2 (source transparency) y §3 (lexical tension)
- issue: Referencia comunitaria de 'hermano o hermana'
  english_pob_reading: Retain 'brother or sister' as the familial language James uses, likely referring to fellow believers in context.
  chosen_spanish_reading: Se conserva 'un hermano o una hermana' como lenguaje familiar dentro de la comunidad creyente.
  alternative_spanish_readings:
  - un hermano o una hermana de la fe
  - un miembro de la comunidad
  rationale: La frase mantiene el parentesco espiritual implícito sin expandir indebidamente el alcance a una categoría más general que el contexto no exige.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del POB en inglés: no se introdujeron cambios de sentido respecto al texto auditado, y se mantuvo la alternativa léxica para γυμνοὶ.'
  spanish_consistency_notes:
  - Se usa 'alimento' para τροφή con un registro natural y bíblico, evitando 'comida' si pudiera sonar demasiado coloquial en este contexto.
  - Se evita 'siervo' o terminología eclesial ajena al griego; el parentesco 'hermano o hermana' se conserva por fidelidad al texto.
  - La nota al pie marca explícitamente la tensión lexical de γυμνοὶ, siguiendo el precedente del POB inglés.
