  spanish_quality_summary: 'La redacción actual no es publicable por el uso de desdobles morfológicos entre corchetes. En español natural y digno, conviene pluralizar el predicado para abarcar ''un hermano o una hermana'': ''están mal vestidos y les falta alimento diario''. Esto suena claro, eclesialmente legible y evita torpeza gramatical.'
  glossary_alignment: No hay conflictos con términos del glosario principal. 'Hermano o hermana' está bien. La principal corrección es alinear γυμνοὶ con el sentido contextual 'mal vestidos' en el texto principal, dejando 'desnudos' como alternativa en nota, tal como hace el POB inglés.
  issues:
