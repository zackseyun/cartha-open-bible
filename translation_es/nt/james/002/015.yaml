    rationale: El POB inglés eligió 'poorly clothed' y relegó 'naked' a nota. En Santiago 2:15, junto con falta de comida, el cuadro es de indigencia, no necesariamente desnudez literal. En español, 'mal vestidos' comunica mejor ese sentido.
  - severity: high
    issue: 'El texto usa formas no publicables: ''está[n] desnudos[a] y carece[n]''.'
    rationale: Estas marcas son andamiaje editorial, no español final. Debe resolverse con una redacción natural que cubra ambos géneros sin artificios.
  - severity: medium
    issue: La nota al pie invierte la relación principal/alternativa respecto del POB inglés.
    rationale: Si el texto principal pasa a 'mal vestidos', la nota debe ofrecer 'desnudos' como alternativa léxica, no al revés.
