review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: βλέπεις como apelación directa, πίστις como ‘fe’, συνήργει como cooperación entre fe y obras, y ἐτελειώθη como llegada a su meta/completitud. Sin embargo, la puntuación y sintaxis no reproducen adecuadamente la estructura completa del versículo en español, y la colocación de notas [a][b] sobre ‘obras’ induce ambigüedad, ya que ambas notas pertenecen léxicamente a ‘fe’/πίστις y al verbo final ἐτελειώθη, no a ‘obras’.'
  spanish_quality_summary: 'La frase es mayormente natural, pero contiene un problema formal importante: abre con interrogación y no la cierra, y además introduce ‘y que’ de manera menos directa que el griego. ‘Fue llevada a su plenitud’ es comprensible, pero ‘fue llevada a la plenitud’ suena menos idiomático que ‘fue llevada a su plenitud’ o mejor ‘llegó a su plenitud’/‘fue llevada a su pleno desarrollo’; aun así, para respetar el pasivo griego conviene mantener un pasivo claro. La revisión mejora fluidez y corrige puntuación.'
  glossary_alignment: ‘Fe’ y ‘obras’ están alineados con la terminología del proyecto. No hay términos del glosario mayor que requieran ajuste. La nota sobre πίστις debe anclarse a ‘fe’, y la nota sobre ἐτελειώθη debe anclarse a la cláusula final, no a ‘obras’.
  issues:
  - severity: high
    issue: Falta el signo de cierre de interrogación
    rationale: El texto inicia con ‘¿Ves’ pero no cierra la pregunta, lo que constituye un error ortográfico/sintáctico en español.
  - severity: medium
    issue: Ubicación incorrecta de las notas [a][b]
    rationale: La nota a explica πίστις (‘fe’) y la nota b explica ἐτελειώθη (‘fue llevada a su plenitud’), pero ambas están ancladas tras ‘obras’. Esto desalinéa evidencia fuente y aparato de notas.
  - severity: low
    issue: ‘y que’ añade una subordinación no necesaria
    rationale: El griego coordina directamente las dos afirmaciones con καί. En español suena más limpio ‘..., y por las obras...’ que ‘..., y que por las obras...’.
  revised_spanish_text: ¿Ves que la fe[a] cooperaba con sus obras, y que por las obras la fe fue llevada a su plenitud[b]?
  revised_footnotes:
  - marker: a
    text: O ‘fidelidad’ o ‘confianza’ para πίστις (‘fe’); el texto principal sigue la equivalencia por defecto del proyecto.
    reason: lexical_alternative
  - marker: b
    text: O ‘fue perfeccionada’ / ‘fue hecha completa’; el verbo griego puede indicar llegar al fin previsto o a la madurez.
    reason: lexical_alternative
  revision_rationale: Se corrige la puntuación española, se reubican las notas en las palabras/cláusulas que realmente explican y se preserva el sentido auditado del griego y del POB en inglés sin introducir interpretación doctrinal adicional.
