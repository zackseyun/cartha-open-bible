translation:
  language: es
  text: 'Pero alguien dirá: «Tú tienes fe, y yo tengo obras». Muéstrame tu fe aparte de las obras[a][b], y yo te mostraré mi fe por medio de mis obras[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin obras». La frase griega puede traducirse tanto «aparte de obras» como «sin obras».
    reason: lexical_alternative
  - marker: b
    text: Griego pistis; también puede significar «confianza» o, en algunos contextos, «fidelidad».
    reason: alternative_reading
  - marker: c
    text: O «de mis obras». La preposición griega puede indicar origen o medio; aquí «por medio de mis obras» expresa que las obras hacen visible la fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Introduce con naturalidad la oposición/objeción en el diálogo retórico de Santiago. «Pero» conserva el contraste sin sonar forzado en español.
- source_word: ἐρεῖ τις
  english_pob_choice: someone will say
  chosen_spanish: alguien dirá
  alternatives_spanish:
  - alguien puede decir
  - dirá alguien
  lexicon: BDAG
  rationale: El futuro mantiene el tono de interlocutor hipotético y la forma diatríbica del griego. «Alguien dirá» es natural y conserva la fuerza retórica.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se conserva «fe» como término principal para πίστις, siguiendo la decisión auditable de la POB en este pasaje. «Confianza» o «fidelidad» serían posibles, pero resolverían prematuramente la tensión interpretativa de Santiago.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: «Obras» es el equivalente estable en este argumento de Santiago y preserva la repetición conceptual del pasaje.
- source_word: δεῖξόν μοι
  english_pob_choice: Show me
  chosen_spanish: Muéstrame
  alternatives_spanish:
  - Demuéstrame
  - Prueba que
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una demanda concreta de evidencia. «Muéstrame» es idiomático y suficientemente directo en español.
- source_word: χωρὶς τῶν ἔργων
  english_pob_choice: apart from works
  chosen_spanish: aparte de las obras
  alternatives_spanish:
  - sin obras
  - separada de las obras
  lexicon: BDAG
  rationale: χωρίς admite «aparte de» o «sin». Aquí «aparte de» preserva el contraste argumentativo y evita suavizarlo. Se introduce [a] para reflejar la alternativa documentada.
- source_word: κἀγώ σοι δείξω
  english_pob_choice: and I will show you
  chosen_spanish: y yo te mostraré
  alternatives_spanish:
  - y también te mostraré
  - pero yo te mostraré
  lexicon: BDAG
  rationale: «Y yo te mostraré» refleja κἀγώ con la coordinación enfática y mantiene el paralelismo con la primera cláusula.
- source_word: ἐκ τῶν ἔργων μου
  english_pob_choice: by my works
  chosen_spanish: por medio de [b] mis obras
  alternatives_spanish:
  - a partir de mis obras
  - desde mis obras
  lexicon: BDAG
  rationale: ἐκ puede indicar origen o medio. «Por medio de» comunica con claridad el valor evidencial/mediacional que el inglés POB expresa con «by», sin perder la posibilidad alternativa de «from».
- source_word: τὴν πίστιν
  english_pob_choice: my faith
  chosen_spanish: mi fe
  alternatives_spanish:
  - la fe que tengo
  lexicon: BDAG
  rationale: La repetición explícita de πίστις se conserva como «fe»; el posesivo implícito por μου se expresa naturalmente con «mi» para sostener el paralelismo con «tu fe».
theological_decisions:
- issue: Cómo rendir πίστις en un contexto de fe y obras sin resolver la tensión interpretativa
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene «fe» como traducción principal para πίστις, en continuidad con la pauta doctrinal y con la lectura de Santiago que contrapone una fe profesada a sus evidencias visibles. Traducirla como «fidelidad» desplazaría el foco del argumento antes de tiempo.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Valor de ἐκ en la frase final
  english_pob_reading: by my works
  chosen_spanish_reading: por medio de mis obras
  alternative_spanish_readings:
  - a partir de mis obras
  - desde mis obras
  rationale: La relación entre fe y obras es de demostración/evidencia. «Por medio de» transmite adecuadamente ese valor instrumental o mediador sin convertirlo en una explicación causal más fuerte de la que el texto exige.
  doctrine_reference: BDAG ἐκ; English POB lexical note on means/source
translation_notes:
  revision_awareness: Se siguió el último pase revisionado sin cambios sustantivos; el acuerdo de revisión fue alto y no se registraron correcciones aplicadas. La redacción española conserva la estructura retórica del griego, el paralelismo entre «tu fe» y «mi fe», y la tensión lexical entre evidencias visibles y el concepto de fe.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις de manera consistente con la pauta doctrinal y con el audit trail inglés.
  - Se usa «obras» para ἔργα en ambos miembros del paralelismo para mantener la repetición argumentativa.
  - Se conserva el contraste diatríbico con «Pero alguien dirá».
  - Se prefirió una formulación natural en español («por medio de») para ἐκ, con nota de alternativa semántica.
  - Los marcadores de nota se colocan sólo donde la alternativa afecta la lectura inmediata del texto.
