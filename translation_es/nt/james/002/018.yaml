  text: Ἀλλ’ ἐρεῖ τις· Σὺ πίστιν ἔχεις κἀγὼ ἔργα ἔχω. δεῖξόν μοι τὴν πίστιν σου ⸀χωρὶς τῶν ⸀ἔργων, κἀγώ ⸂σοι δείξω⸃ ἐκ τῶν ἔργων μου τὴν ⸀πίστιν.
base_translation:
  language: en
  yaml_path: translation/nt/james/002/018.yaml
  text: But someone will say[a], “You have faith, and I have works.” Show me your faith apart from works[c][b], and I will show you my faith by my works.
  footnotes:
  - marker: a
    text: Or “without works.” The Greek phrase can be rendered either “apart from works” or “without works.”
    reason: lexical_alternative
  - marker: b
    text: Or “from my works.” The Greek preposition can indicate source or means; “by my works” expresses that the works make faith visible.
    reason: lexical_alternative
  - marker: c
    text: Greek pistis; also possibly “trust” or, in some contexts, “faithfulness.”
    reason: alternative_reading
