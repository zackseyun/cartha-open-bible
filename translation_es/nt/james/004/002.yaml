  text: ἐπιθυμεῖτε, καὶ οὐκ ἔχετε· φονεύετε καὶ ζηλοῦτε, καὶ οὐ δύνασθε ἐπιτυχεῖν· μάχεσθε καὶ πολεμεῖτε. οὐκ ἔχετε διὰ τὸ μὴ αἰτεῖσθαι ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/james/004/002.yaml
  text: You desire and do not have[a]; you murder and envy and are not able to obtain; you fight and wage war[d][c][b]. You do not have because you do not ask.
  footnotes:
  - marker: a
    text: Or 'You covet' for 'You desire'; the Greek can denote strong desire, often in a wrongful sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'You kill'; the Greek verb more specifically often means 'murder.' Some interpreters understand the wording rhetorically, but the translation preserves the stronger lexical sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'you are jealous' for 'you envy.'
    reason: lexical_alternative
  - marker: d
    text: The implied object of 'ask' is God from the surrounding context, though the Greek does not state it explicitly here.
    reason: cross_reference
