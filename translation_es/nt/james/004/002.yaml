revisions:
- from: Desean y no tienen; matan y envidian y no pueden alcanzar; pelean y guerrean. No tienen porque no piden.
  to: Desean y no tienen[a]; asesinan[b] y envidian[c] y no pueden obtener; pelean y hacen la guerra. No tienen porque no piden[d].
  rationale: Se ajusta φονεύετε a 'asesinan' para preservar la decisión léxica fuerte documentada en la auditoría inglesa; se mejora ἐπιτυχεῖν con 'obtener'; se cambia πολεμεῖτε a la forma más natural 'hacen la guerra'; y se restauran notas relevantes que conservan alternativas léxicas y la implicitud del objeto de 'pedir'.
  reviewer_model: gpt-5.4
