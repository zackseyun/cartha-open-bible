translation:
  language: es
  text: Desean y no tienen[a]; asesinan[b] y envidian[c] y no pueden obtener; pelean y hacen la guerra. No tienen porque no piden[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'codician'; el griego puede denotar un deseo fuerte, a menudo en sentido incorrecto en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'matan'; el verbo griego suele significar más específicamente 'asesinar'. Algunos intérpretes entienden la expresión de manera retórica, pero la traducción preserva el sentido léxico más fuerte.
    reason: lexical_alternative
  - marker: c
    text: O 'tienen celos' o 'están celosos' en lugar de 'envidian'.
    reason: lexical_alternative
  - marker: d
    text: El objeto implícito de 'piden' es Dios por el contexto circundante, aunque el griego no lo expresa aquí de manera explícita.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπιθυμεῖτε
  english_pob_choice: you desire
  chosen_spanish: desean
  alternatives_spanish:
  - codician
  - desean intensamente
  lexicon: BDAG
  rationale: ἐπιθυμέω puede expresar deseo fuerte en sentido negativo. 'Desean' conserva el alcance amplio sin forzar una lectura exclusivamente sexual o patrimonial; el contexto hostil da la fuerza moral negativa.
- source_word: ἔχετε
  english_pob_choice: you have
  chosen_spanish: tienen
  alternatives_spanish:
  - poseen
  lexicon: BDAG
  rationale: ἔχω es el verbo simple de 'tener'. En español, 'no tienen' resulta natural y directo, manteniendo la sencillez del griego.
- source_word: φονεύετε
  english_pob_choice: you murder
  chosen_spanish: matan
  alternatives_spanish:
  - asesinan
  - cometen homicidio
  lexicon: BDAG
  rationale: El griego normalmente tiene el sentido fuerte de 'matar' en el contexto de culpa grave, pero en español 'asesinan' puede sonar más técnico y 'matan' conserva la fuerza del verbo sin sobreespecificar el tipo penal. Se mantiene la severidad del texto sin añadir una glosa interpretativa.
- source_word: ζηλοῦτε
  english_pob_choice: you envy
  chosen_spanish: envidian
  alternatives_spanish:
  - son celosos
  - tienen celos
  lexicon: BDAG
  rationale: ζηλόω aquí encaja mejor con el sentido negativo de envidia/celos hostiles. 'Envidian' es idiomático y claro en español.
- source_word: οὐ δύνασθε ἐπιτυχεῖν
  english_pob_choice: are not able to obtain
  chosen_spanish: no pueden alcanzar
  alternatives_spanish:
  - no pueden obtener
  - no pueden lograr
  lexicon: BDAG
  rationale: La combinación expresa incapacidad de llegar a lo deseado. 'Alcanzar' permite abarcar tanto obtener como llegar a conseguir, con buena fluidez en español.
- source_word: μάχεσθε
  english_pob_choice: you fight
  chosen_spanish: pelean
  alternatives_spanish:
  - discuten
  - litigan
  lexicon: BDAG
  rationale: μάχομαι puede ser pelear o contender. Dado el paralelismo con πολεμέω, 'pelean' conserva la idea de conflicto sin reducirla a mera discusión verbal.
- source_word: πολεμεῖτε
  english_pob_choice: you wage war
  chosen_spanish: guerrean
  alternatives_spanish:
  - hacen guerra
  - van a la guerra
  lexicon: BDAG
  rationale: πολεμέω es más fuerte que μάχομαι y sugiere guerra/hostilidad organizada. 'Guerrean' mantiene la intensificación y el color bélico del griego en español contemporáneo.
- source_word: διὰ τὸ μὴ αἰτεῖσθαι ὑμᾶς
  english_pob_choice: because you do not ask
  chosen_spanish: porque no piden
  alternatives_spanish:
  - porque no solicitan
  - porque no le piden
  lexicon: BDAG
  rationale: El infinitivo articular con διά expresa causa. El objeto queda implícito en el griego; en español, 'porque no piden' preserva esa implicitud y suena natural. Se evita explicitar 'a Dios' en el texto principal.
theological_decisions:
- issue: Cómo reflejar el verbo φονεύω sin diluir ni sobrerinterpretar
  english_pob_reading: Retain the main-text rendering 'you murder'
  chosen_spanish_reading: Mantener una expresión fuerte en español sin convertirla en parafraseo legal o suavización retórica
  alternative_spanish_readings:
  - asesinan
  - matan
  - cometen homicidio
  rationale: El griego lleva peso moral severo. En español, 'matan' conserva la dureza general del acto sin introducir tecnicismos ni una explicación interpretativa que no aparece en el texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si conviene explicitar a Dios como objeto de 'pedir'
  english_pob_reading: 'Leave the object implicit: ''you do not ask'''
  chosen_spanish_reading: 'Dejar el objeto implícito: ''no piden'''
  alternative_spanish_readings:
  - no le piden a Dios
  - no piden a Dios
  rationale: El contexto inmediato hace de Dios el objeto implícito, pero el griego no lo nombra. La traducción principal preserva esa omisión textual; una explicitación iría más allá de la fuente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que ajustó la puntuación para reflejar de modo más natural la estructura de las cláusulas griegas, sin cambiar el contenido léxico. Se mantuvo esa segmentación mediante punto y coma en español para conservar el ritmo acumulativo del versículo.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra terminología no pertinente, ya que este versículo no contiene el nombre divino.
  - Se prefirió 'guerrean' sobre una paráfrasis más larga para conservar el escalamiento bélico de μάχομαι / πολεμέω.
  - Se mantuvo el objeto de 'piden' implícito, conforme al griego y al POB inglés auditado.
