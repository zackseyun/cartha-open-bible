    text: O 'matan'; el verbo griego suele significar más específicamente 'asesinar'. Algunos intérpretes entienden la expresión de manera retórica, pero la traducción preserva el sentido léxico más fuerte.
    reason: lexical_alternative
  - marker: c
    text: O 'tienen celos' o 'están celosos' en lugar de 'envidian'.
    reason: lexical_alternative
  - marker: d
    text: El objeto implícito de 'piden' es Dios por el contexto circundante, aunque el griego no lo expresa aquí de manera explícita.
    reason: cross_reference
  revision_rationale: Se ajusta φονεύετε a 'asesinan' para preservar la decisión léxica fuerte documentada en la auditoría inglesa; se mejora ἐπιτυχεῖν con 'obtener'; se cambia πολεμεῖτε a la forma más natural 'hacen la guerra'; y se restauran notas relevantes que conservan alternativas léxicas y la implicitud del objeto de 'pedir'.
