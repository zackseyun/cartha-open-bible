review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: deseo frustrado, violencia/envidia, incapacidad de obtener, conflicto, y la causa final por no pedir. Sin embargo, no preserva plenamente una decisión léxica clave del POB en φονεύετε, donde la evidencia y la auditoría inglesa retienen el sentido fuerte de ''murder'' y el español ''matan'' lo suaviza. También faltan las notas léxicas/explicativas significativas preservadas en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y legible, pero 'guerrean' suena algo menos natural en registro bíblico general que 'hacen la guerra', y 'porque no piden' puede mantenerse pero conviene conservar la nota de que el objeto implícito es Dios. 'Desean y no tienen; ...' fluye bien. La puntuación es adecuada.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad al peso léxico. 'Desean' para ἐπιθυμεῖτε y 'envidian' para ζηλοῦτε están bien. 'No pueden obtener' refleja mejor ἐπιτυχεῖν que 'alcanzar' en este contexto de obtener lo deseado. Para φονεύετε conviene 'asesinan' como equivalente más cercano a 'you murder'.
  issues:
  - severity: high
    issue: φονεύετε fue traducido como 'matan' en vez de una forma equivalente a 'murder'
    rationale: La auditoría inglesa retuvo deliberadamente el sentido fuerte del verbo. 'Matan' es más amplio y puede incluir matar en sentido genérico; 'asesinan' preserva mejor la gravedad léxica sin volverse glosa interpretativa.
  - severity: medium
    issue: Faltan notas significativas que la auditoría inglesa preserva
    rationale: El inglés incluye alternativas léxicas para 'desire/covet', 'murder/kill', 'envy/jealous' y una nota contextual sobre el objeto implícito de 'ask'. Dado que son decisiones relevantes y útiles también en español, deben conservarse.
  - severity: low
    issue: '''guerrean'' es menos natural que ''hacen la guerra'''
    rationale: Aunque semánticamente posible, 'guerrean' suena más marcado. 'Hacen la guerra' conserva la intensificación de πολεμεῖτε y lee con mayor naturalidad en español amplio.
  - severity: low
    issue: '''no pueden alcanzar'' podría sonar menos preciso que ''no pueden obtener'''
    rationale: ἐπιτυχεῖν aquí apunta a lograr/obtener lo deseado. 'Obtener' expresa de manera más directa el resultado frustrado.
  revised_spanish_text: Desean y no tienen[a]; asesinan[b] y envidian[c] y no pueden obtener; pelean y hacen la guerra. No tienen porque no piden[d].
  revised_footnotes:
