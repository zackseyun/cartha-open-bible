translation:
  language: es
  text: Pero, tal como están las cosas, ustedes se jactan en su arrogancia[a]. Toda jactancia de este tipo es mala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en sus pretensiones' o 'en sus alardes'. El término griego puede denotar pretensión arrogante en general; aquí probablemente apunta de manera concreta a las presunciones de los versículos anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero, tal como están las cosas
  alternatives_spanish:
  - Pero ahora
  - Pero, así es como están las cosas
  lexicon: BDAG
  rationale: νῦν con δέ introduce contraste con la actitud previa de dependencia humilde. En español, 'tal como están las cosas' comunica de manera natural el estado presente efectivo, conservando el matiz adversativo sin sonar mecánico.
- source_word: καυχᾶσθε
  english_pob_choice: you boast
  chosen_spanish: se jactan
  alternatives_spanish:
  - se glorían
  - presumen
  lexicon: BDAG
  rationale: El verbo expresa jactancia/autoexaltación. 'Se jactan' es la equivalencia directa y mantiene el vínculo léxico con καύχησις al final del versículo.
- source_word: ἐν ταῖς ἀλαζονείαις ὑμῶν
  english_pob_choice: in your arrogance
  chosen_spanish: en su arrogancia
  alternatives_spanish:
  - en sus pretensiones
  - en sus alardes
  lexicon: BDAG
  rationale: ἀλαζονεία denota arrogancia o pretensión fanfarrona. 'Arrogancia' refleja bien el valor moral del término en un español claro y no agrega la interpretación específica de 'planes' o 'esquemas'.
- source_word: πᾶσα καύχησις τοιαύτη
  english_pob_choice: All such boasting
  chosen_spanish: Toda jactancia como esta
  alternatives_spanish:
  - Toda jactancia de este tipo
  - Toda jactancia semejante
  lexicon: BDAG
  rationale: La construcción distributiva se vierte naturalmente con 'toda... como esta'. 'Jactancia' conserva la relación de sentido con καυχᾶσθε y evita perder el carácter general del juicio.
- source_word: πονηρά
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  lexicon: BDAG
  rationale: Aquí πονηρός expresa evaluación moral. 'Mala' es un español sobrio y comprensible; 'malvada' o 'perversa' sonarían más fuertes y menos naturales en este sintagma nominal breve.
theological_decisions:
- issue: Alcance del reproche contra la jactancia
  english_pob_reading: The verse condemns boastful self-confidence in human plans apart from submission to the Lord, without importing a broader doctrine beyond the immediate context.
  chosen_spanish_reading: El versículo condena la jactancia autosuficiente y arrogante, en continuidad con el contexto inmediato de planes hechos sin someterse al Señor, sin ampliar indebidamente el alcance doctrinal del texto.
  alternative_spanish_readings:
  - Condena toda confianza en uno mismo
  - Condena solo los planes comerciales presumidos
  rationale: El contexto de Santiago 4:13–15 orienta la frase hacia la autosuficiencia arrogante en los planes humanos. La traducción española mantiene ese alcance sin introducir explícitamente 'planes' en el texto base, para no exceder el griego del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca en el texto español exactamente donde corresponde. La nota se mantiene anclada al sintagma con ἀλαζονείαις para reflejar la alternativa lexical documentada por la POB en inglés.
  spanish_consistency_notes:
  - Se preserva el contraste adversativo de νῦν δὲ con una fórmula idiomática en español.
  - Se eligió 'jactancia' para mantener coherencia léxica con el verbo 'se jactan'.
  - '''Arrogancia'' refleja el valor moral de ἀλαζονείαις sin sobreinterpretar como ''planes'' en el texto principal.'
  - '''Mala'' traduce πονηρά con un registro natural y moralmente negativo, sin exagerar el matiz.'
