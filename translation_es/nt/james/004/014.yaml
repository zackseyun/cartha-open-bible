translation:
  language: es
  text: Ustedes no saben qué traerá el mañana. ¿Qué es su vida? Porque ustedes son vapor[a], que aparece por un breve tiempo y luego se desvanece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «neblina».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστασθε
  english_pob_choice: you do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no comprenden
  lexicon: BDAG
  rationale: El verbo expresa conocimiento o comprensión; en este contexto de incertidumbre sobre el futuro, «no saben» reproduce de forma natural y directa la ignorancia humana respecto de lo que viene.
- source_word: τὸ τῆς αὔριον
  english_pob_choice: what tomorrow will bring
  chosen_spanish: qué traerá el mañana
  alternatives_spanish:
  - lo de mañana
  - qué pertenecerá al mañana
  - las circunstancias de mañana
  lexicon: BDAG
  rationale: La expresión es elíptica y alude a lo que pertenece o sucede mañana. «Qué traerá el mañana» conserva la idea sin volverla demasiado literal en español.
- source_word: ποία ἡ ζωὴ ὑμῶν
  english_pob_choice: What is your life?
  chosen_spanish: ¿Qué es su vida?
  alternatives_spanish:
  - ¿Qué clase de cosa es su vida?
  - ¿Cómo es su vida?
  lexicon: BDAG
  rationale: La pregunta retórica pide por la naturaleza o cualidad de la vida. La forma breve «¿Qué es su vida?» mantiene la fuerza retórica y la concisión del original.
- source_word: ἀτμὶς
  english_pob_choice: mist
  chosen_spanish: neblina
  alternatives_spanish:
  - vapor
  - vaho
  lexicon: BDAG
  rationale: «Neblina» comunica en español contemporáneo algo tenue, inestable y breve, cercano al valor imagético del griego. «Vapor» queda como alternativa léxica importante, pero suena más técnico o abstracto.
- source_word: πρὸς ὀλίγον
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por breve tiempo
  - por un rato
  lexicon: BDAG
  rationale: La frase indica duración breve; «por un poco de tiempo» es idiomática, clara y fiel al matiz temporal.
- source_word: φαινομένη
  english_pob_choice: appears
  chosen_spanish: aparece
  alternatives_spanish:
  - se deja ver
  - es visible
  lexicon: BDAG
  rationale: El participio describe una visibilidad momentánea. «Aparece» es el equivalente más natural y conserva la imagen.
- source_word: ἔπειτα καὶ ἀφανιζομένη
  english_pob_choice: and then vanishes
  chosen_spanish: y luego se desvanece
  alternatives_spanish:
  - y después desaparece
  - y luego se esfuma
  lexicon: BDAG
  rationale: La secuencia temporal y el participio de desaparición se expresan bien con «y luego se desvanece», que conserva el movimiento de la metáfora sin exceder el sentido.
theological_decisions:
- issue: Imagen metafórica de la transitoriedad de la vida humana
  english_pob_reading: Retain the image as a rhetorical statement about the brevity and uncertainty of human life, without importing additional doctrinal claims about mortality or judgment.
  chosen_spanish_reading: Mantener la imagen como afirmación retórica de la brevedad e inestabilidad de la vida humana, sin añadir inferencias doctrinales que el versículo no explicita.
  alternative_spanish_readings:
  - Su vida es fugaz.
  - La vida humana es pasajera.
  rationale: El texto enfatiza la limitación humana frente a planes futuros. Conservar la metáfora («neblina») preserva la tensión literaria y teológica mejor que reducirla a una abstracción.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios y el consenso de control cruzado fue de alta concordancia. Se mantiene la misma lectura interpretativa y léxica, con equivalencia óptima al español.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento en segunda persona plural con valor general («no saben», «ustedes») para reflejar el plural griego.
  - Se preserva el tono proverbial y retórico del versículo sin convertirlo en paráfrasis explicativa.
  - La elección de «neblina» deja visible la alternativa «vapor» en nota, conservando la tensión léxica documentada por el POB en inglés.
