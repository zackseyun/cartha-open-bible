revisions:
- from: No saben qué traerá el mañana. ¿Qué es su vida? Porque ustedes son neblina[a], que aparece por un poco de tiempo y luego se desvanece.
  to: Ustedes no saben qué traerá el mañana. ¿Qué es su vida? Porque ustedes son vapor[a], que aparece por un breve tiempo y luego se desvanece.
  rationale: Se ajusta la persona explícita a «ustedes» para mantener coherencia con el contexto y con el propio versículo; se cambia «neblina» por «vapor» para reflejar mejor ἀτμίς en español y conservar la alternativa en nota; y se mejora la naturalidad de πρὸς ὀλίγον con «por un breve tiempo», que suena más idiomático y digno sin perder el sentido temporal breve del original.
