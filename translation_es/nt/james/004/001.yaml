translation:
  language: es
  text: '¿De dónde vienen las guerras y de dónde vienen las peleas entre ustedes[a]? ¿No vienen de aquí: de sus placeres que hacen guerra en sus miembros[b][c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en ustedes' para la primera frase; el griego puede indicar tanto conflicto entre los lectores como conflicto dentro de ellos. El versículo en conjunto vincula la contienda externa con los deseos internos.
    reason: alternative_reading
  - marker: b
    text: O 'conflictos ... disputas'. El griego usa términos militares, literalmente 'guerras' y 'peleas', para hablar de disputas dentro de la comunidad.
    reason: lexical_alternative
  - marker: c
    text: '''Miembros'' es literal; puede referirse a partes del cuerpo o, más ampliamente, a las facultades dentro de una persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  english_pob_choice: From where come
  chosen_spanish: ¿De dónde vienen
  alternatives_spanish:
  - ¿De dónde provienen
  - ¿De dónde salen
  lexicon: BDAG
  rationale: Conserva la pregunta retórica sobre origen y evita suavizar la repetición de la fuente, como en el audit trail inglés.
- source_word: πόλεμοι
  english_pob_choice: wars
  chosen_spanish: las guerras
  alternatives_spanish:
  - los conflictos
  - las contiendas
  lexicon: BDAG
  rationale: Mantiene la imagen militar fuerte del griego, en vez de rebajarla de entrada a un sentido más débil como 'conflictos'.
- source_word: μάχαι
  english_pob_choice: fights
  chosen_spanish: las peleas
  alternatives_spanish:
  - las disputas
  - las contiendas
  lexicon: BDAG
  rationale: Distingue el segundo sustantivo del primero con un término natural en español que preserve la intensificación sin fusionarlos.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: 'En el primer miembro la referencia es comunitaria: conflicto dentro del grupo, no solo interior individual.'
- source_word: οὐκ ἐντεῦθεν
  english_pob_choice: Is it not from here
  chosen_spanish: ¿No vienen de aquí
  alternatives_spanish:
  - ¿No es de aquí
  - ¿No provienen de aquí
  lexicon: BDAG
  rationale: Reproduce la pregunta retórica con valor de afirmación esperada y conserva el deíctico de fuente inmediata.
- source_word: ἡδονῶν
  english_pob_choice: pleasures
  chosen_spanish: placeres
  alternatives_spanish:
  - deseos
  - pasiones
  lexicon: BDAG
  rationale: '''Placeres'' es el equivalente más directo y mantiene la posible carga de autocomplacencia sin interpretar de más.'
- source_word: στρατευομένων
  english_pob_choice: that wage war
  chosen_spanish: que guerrean
  alternatives_spanish:
  - que hacen guerra
  - que combaten
  lexicon: BDAG
  rationale: Conserva la metáfora militar activa del participio y enlaza con las 'guerras' iniciales.
- source_word: ἐν τοῖς μέλεσιν ὑμῶν
  english_pob_choice: in your members
  chosen_spanish: en sus miembros
  alternatives_spanish:
  - en sus cuerpos
  - dentro de ustedes
  lexicon: BDAG
  rationale: Preserva el sentido literal de μέλη y deja abierta la tensión entre partes corporales y facultades personales, como en el texto auditado.
theological_decisions:
- issue: Tensión entre conflicto comunitario y conflicto interior
  english_pob_reading: The main text renders the first ἐν ὑμῖν as 'among you' and the later bodily phrase as 'in your members,' preserving both communal and internal dimensions.
  chosen_spanish_reading: La primera expresión se traduce 'entre ustedes' y la final 'en sus miembros', conservando tanto la dimensión comunitaria como la interior/corporal.
  alternative_spanish_readings:
  - '''en ustedes'' para ambas expresiones'
  - '''dentro de ustedes'' al final'
  rationale: La frase griega permite leer el conflicto como social y como interno; la traducción no resuelve esa tensión, sino que la deja visible en español.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; se mantiene la solución auditada en inglés, trasladando al español la misma tensión entre guerra comunitaria e impulsos internos, sin neutralizar la imaginería militar.
  spanish_consistency_notes:
  - Se mantiene 'ustedes' para concordar con el registro bíblico moderno latinoamericano y evitar ambigüedad de persona.
  - Se conserva la metáfora militar con 'guerras'/'peleas' y 'guerrean' para reflejar el paralelismo del griego.
  - '''Miembros'' se deja literal para no cerrar indebidamente el posible alcance corporal e interior del término.'
