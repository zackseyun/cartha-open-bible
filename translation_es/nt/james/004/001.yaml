  text: Πόθεν πόλεμοι καὶ ⸀πόθεν μάχαι ἐν ὑμῖν; οὐκ ἐντεῦθεν, ἐκ τῶν ἡδονῶν ὑμῶν τῶν στρατευομένων ἐν τοῖς μέλεσιν ὑμῶν;
base_translation:
  language: en
  yaml_path: translation/nt/james/004/001.yaml
  text: From where come wars and from where come fights among you? Is it not from here—from your pleasures that wage war in your members?[a][b][c]
  footnotes:
  - marker: a
    text: Or 'conflicts ... quarrels.' The Greek uses military terms, literally 'wars' and 'fights,' for disputes within the community.
    reason: lexical_alternative
  - marker: b
    text: Or 'in you' for the first phrase; the Greek can denote either conflict among the readers or conflict within them. The verse as a whole links outward strife with inward desires.
    reason: alternative_reading
  - marker: c
    text: '''Members'' is literal; it can refer to bodily parts or, more broadly, the faculties within a person.'
    reason: lexical_alternative
