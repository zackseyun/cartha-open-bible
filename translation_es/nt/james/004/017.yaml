translation:
  language: es
  text: Por tanto, el que sabe[a] hacer el bien y no lo hace, para él es pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así que, quien sabe hacer el bien y no lo hace, para él es pecado».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδότι
  english_pob_choice: for the one who knows
  chosen_spanish: para el que sabe
  alternatives_spanish:
  - para el que conoce
  - para quien sabe
  lexicon: BDAG
  rationale: El participio dativo singular funciona sustantivamente y describe a una persona caracterizada por saber. «El que sabe» preserva el valor singular y general sin volverlo demasiado explicativo.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca conclusión inferencial. «Así que» es natural en español moderno y conserva la relación lógica con lo anterior.
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo correcto
  - una cosa buena
  lexicon: BDAG
  rationale: Aquí καλός tiene fuerza ética/moral. «Lo bueno» permite mantener el valor sustantivado del adjetivo y su amplitud moral.
- source_word: ποιεῖν
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - practicar
  - realizar
  - llevar a cabo
  lexicon: BDAG
  rationale: Infinitivo complementario de καλόν; «hacer» es la forma más directa y natural en español para esta construcción.
- source_word: μὴ ποιοῦντι
  english_pob_choice: and does not do it
  chosen_spanish: y no lo hace
  alternatives_spanish:
  - y no lo realiza
  - y no lo practica
  - y no lo lleva a cabo
  lexicon: BDAG
  rationale: El participio presente con μή expresa una falta de acción continua o habitual. «No lo hace» conserva la contraposición entre saber y actuar, con un objeto implícito recuperado por el contexto.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - es pecado
  - una falta
  - culpa
  lexicon: BDAG
  rationale: El predicado nominal anartro es cualitativo. «Pecado» comunica con claridad que tal omisión pertenece realmente al ámbito del pecado, sin atenuarlo.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - en su caso
  - respecto de él
  lexicon: BDAG
  rationale: 'Dativo de referencia: la omisión es pecado con respecto a esa persona. «Para él» es natural en español y mantiene la aplicación personal singular.'
- source_word: ἐστιν
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - resulta ser
  - se considera
  lexicon: BDAG
  rationale: La cópula puede mantenerse implícita en español. «Es» conserva la estructura breve y sentenciosa del griego.
theological_decisions:
- issue: Carácter general de la afirmación sobre el bien omitido
  english_pob_reading: The verse states that knowingly failing to do good is sin, without narrowing the principle to a specific doctrinal system.
  chosen_spanish_reading: El versículo afirma que omitir a sabiendas el bien es pecado, sin restringir el alcance a un caso doctrinal particular.
  alternative_spanish_readings:
  - Se refiere solo al contexto inmediato de planes jactanciosos
  - Establece un principio amplio sobre pecados de omisión
  rationale: El contexto inmediato habla de proyectos arrogantes, pero la formulación es general y proverbial. La traducción conserva esa amplitud sin resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin cerrarla.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto base; el draft español sigue la lectura auditada del griego y mantiene la misma amplitud interpretativa del inglés POB.
  spanish_consistency_notes:
  - Se conservó la secuencia inferencial de οὖν con una equivalencia natural en español.
  - «Lo bueno» mantiene el valor ético general de καλόν y evita estrecharlo a una sola acción puntual.
  - «Pecado» se prefirió sobre una atenuación como «falta» para sostener la fuerza del predicado nominal.
  - La nota alternativa reproduce la variante sintáctica señalada en el inglés POB sin introducir una interpretación doctrinal adicional.
