revisions:
- from: Así que, para el que sabe[a] hacer lo bueno y no lo hace, para él es pecado.
  to: Por tanto, el que sabe[a] hacer el bien y no lo hace, para él es pecado.
  rationale: Se ajusta la redacción para un español más natural y digno sin perder el sentido del griego ni la alternativa documentada en inglés. «Por tanto» refleja bien οὖν en registro bíblico; «el que sabe» expresa con naturalidad el participio sustantivado εἰδότι; «hacer el bien» es la forma idiomática más clara para καλὸν ποιεῖν. Se conserva «para él es pecado» para mantener explícito el valor personal de αὐτῷ, en línea con la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica bien el sentido básico del griego: una conclusión inferencial y el principio de que no hacer el bien conocido es pecado. Sin embargo, «para el que sabe» en la cláusula inicial suena menos natural y ligeramente más torpe en español que una construcción sustantivada directa, y la combinación «lo bueno»/«para él es pecado» puede mejorarse para reflejar con más claridad e idiomaticidad el valor ético general de καλὸν y el dativo αὐτῷ.'
  spanish_quality_summary: El texto es entendible y fiel en lo esencial, pero necesita un ajuste menor de naturalidad y fluidez. «Así que» es aceptable para οὖν; mejor aún, «Por tanto» encaja bien en registro bíblico digno. «El que sabe hacer el bien» suena más natural que «para el que sabe hacer lo bueno». También conviene evitar la repetición algo pesada de «para ... para él» en la misma oración.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Pecado» refleja bien ἁμαρτία. La cuestión principal es estilística-lexical: para καλὸν, en esta construcción idiomática española «hacer el bien» es preferible a «hacer lo bueno».'
  issues:
  - severity: medium
    issue: «para el que sabe» en la cláusula inicial es poco natural
    rationale: Aunque intenta reflejar el dativo sustantivado εἰδότι, en español bíblico natural se expresa mejor como «el que sabe» o «quien sabe», dejando el valor referencial personal para la cláusula final («le es pecado» / «para él es pecado»).
  - severity: medium
    issue: «hacer lo bueno» es menos idiomático que «hacer el bien»
    rationale: Ambas opciones pueden transmitir καλὸν, pero en español la expresión establecida y más clara para el sentido ético general es «hacer el bien».
  - severity: low
    issue: La doble secuencia «para el que... para él...» resulta pesada
    rationale: El sentido se entiende, pero el español gana claridad si se evita esa repetición, especialmente en una frase breve y sentenciosa.
  revised_spanish_text: Por tanto, el que sabe[a] hacer el bien y no lo hace, para él es pecado.
  revised_footnotes:
