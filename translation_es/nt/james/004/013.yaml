translation:
  language: es
  text: 'Ahora bien[a], ustedes que dicen: «Hoy o mañana iremos a esta ciudad, pasaremos allí un año, comerciaremos y obtendremos ganancias».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «a una ciudad tal o cual». El griego dice «esta ciudad», usando un demostrativo para una ciudad concreta en el plan de los hablantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγε νῦν
  english_pob_choice: Come now
  chosen_spanish: ¡Vamos ahora
  alternatives_spanish:
  - Vengan ahora
  - Oigan ahora
  lexicon: BDAG
  rationale: Es una fórmula idiomática de atención y reprensión. «¡Vamos ahora» conserva el impulso exhortativo y la viveza retórica sin volverse demasiado literal o torpe en español.
- source_word: οἱ λέγοντες
  english_pob_choice: you who say
  chosen_spanish: ustedes que dicen
  alternatives_spanish:
  - los que dicen
  - quienes dicen
  lexicon: BDAG
  rationale: El participio articular funciona como vocativo dirigido a los oyentes. «Ustedes que dicen» mantiene el contacto directo y la confrontación del pasaje.
- source_word: Σήμερον ἢ αὔριον
  english_pob_choice: Today or tomorrow
  chosen_spanish: Hoy o mañana
  alternatives_spanish:
  - Hoy y mañana
  lexicon: BDAG
  rationale: La conjunción disyuntiva ἢ exige «o», no «y». Se conserva el matiz de planes inmediatos y presumidos para el futuro cercano.
- source_word: πορευσόμεθα
  english_pob_choice: we will go
  chosen_spanish: iremos
  alternatives_spanish:
  - viajaremos
  - nos dirigiremos
  lexicon: BDAG
  rationale: En este contexto de desplazamiento, el futuro de πορεύομαι se expresa naturalmente con «iremos», que es claro y fiel.
- source_word: εἰς τήνδε τὴν πόλιν
  english_pob_choice: into this city
  chosen_spanish: a esta ciudad
  alternatives_spanish:
  - a esa ciudad
  - a esta tal ciudad
  lexicon: BDAG
  rationale: El demostrativo τήνδε apunta a una ciudad concreta en el plan de los hablantes. En español, «a esta ciudad» comunica la referencia sin forzar una construcción poco idiomática con «into».
- source_word: ποιήσομεν ἐκεῖ ἐνιαυτόν
  english_pob_choice: spend a year there
  chosen_spanish: pasaremos allí un año
  alternatives_spanish:
  - nos quedaremos allí un año
  - haremos allí un año
  lexicon: BDAG
  rationale: ποιέω con acusativo temporal es un modismo para pasar un período de tiempo. «Pasaremos allí un año» reproduce el sentido idiomático de manera natural y clara.
- source_word: ἐμπορευσόμεθα
  english_pob_choice: do business
  chosen_spanish: haremos negocio
  alternatives_spanish:
  - negociaremos
  - nos dedicaremos al comercio
  lexicon: BDAG
  rationale: El verbo expresa actividad comercial. «Haremos negocio» conserva el sentido mercantil en español moderno sin volverlo excesivamente técnico; no se sustituye por un lenguaje piadoso ajeno al contexto.
- source_word: κερδήσομεν
  english_pob_choice: make a profit
  chosen_spanish: ganaremos dinero
  alternatives_spanish:
  - obtendremos ganancia
  - lucramos
  lexicon: BDAG
  rationale: En este contexto comercial, el verbo se refiere a obtener ganancia financiera. «Ganaremos dinero» transmite la intención económica de forma comprensible y directa en español.
theological_decisions:
- issue: Tono de reprensión apostrófica
  english_pob_reading: Direct address ('you who say') rather than impersonal description
  chosen_spanish_reading: Dirección directa («ustedes que dicen»)
  alternative_spanish_readings:
  - los que dicen
  rationale: Santiago confronta a los oyentes de manera directa. La forma elegida conserva la fuerza admonitiva del original y evita diluir la interpelación.
  doctrine_reference: Principio de primacía del texto fuente y claridad retórica
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora la marca de nota [a] aparece exactamente en el texto español junto al segmento correspondiente.'
  spanish_consistency_notes:
  - Se mantiene «a esta ciudad» para reflejar el demostrativo del griego, con nota alternativa para la opción idiomática.
  - Se usa futuro simple en toda la serie verbal para conservar la sucesión de planes proyectados.
  - No se introduce terminología eclesiástica ajena al contexto comercial del versículo.
