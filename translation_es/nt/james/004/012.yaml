translation:
  language: es
  text: Hay un solo Legislador y Juez[a], el que tiene poder para salvar y para destruir. Pero tú, ¿quién eres para juzgar a tu prójimo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «solo un Legislador y Juez».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el que juzga a tu prójimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - solo uno
  lexicon: BDAG
  rationale: El griego enfatiza la unicidad de la figura con εἷς. En español, "un solo" reproduce bien esa fuerza sin volverlo más explícito de lo que exige el texto.
- source_word: νομοθέτης
  english_pob_choice: Lawgiver
  chosen_spanish: Legislador
  alternatives_spanish:
  - dador de la ley
  - Legislador de la ley
  lexicon: BDAG
  rationale: '"Legislador" conserva la idea de autoridad que establece la ley y suena natural en español. Evita una perífrasis pesada y mantiene el valor titular del sustantivo.'
- source_word: κριτής
  english_pob_choice: Judge
  chosen_spanish: Juez
  alternatives_spanish:
  - juez
  lexicon: BDAG
  rationale: '"Juez" es la equivalencia directa y idiomática en español, manteniendo el paralelo con "Legislador" y la función judicial del término.'
- source_word: ὁ δυνάμενος
  english_pob_choice: the one who is able
  chosen_spanish: el que tiene poder para
  alternatives_spanish:
  - el que puede
  - el único capaz de
  lexicon: BDAG
  rationale: La participación sustantivada expresa capacidad real. "Tiene poder para" preserva la fuerza de autoridad implícita en el contexto, no solo posibilidad abstracta.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  lexicon: BDAG
  rationale: '"Salvar" es la correspondencia normal de σῴζω y conserva el alcance teológico amplio del verbo.'
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - llevar a destrucción
  lexicon: BDAG
  rationale: '"Destruir" es la opción más directa y mantiene la antítesis con "salvar" sin definir el modo exacto del juicio final.'
- source_word: σὺ δὲ τίς εἶ
  english_pob_choice: But who are you
  chosen_spanish: Pero tú, ¿quién eres
  alternatives_spanish:
  - Pero quién eres tú
  - Y tú, ¿quién eres
  lexicon: BDAG
  rationale: El giro interrogativo en español coloca el pronombre de forma enfática y conserva el tono de reprensión del contraste adversativo.
- source_word: ὁ κρίνων
  english_pob_choice: to judge / judging
  chosen_spanish: para juzgar
  alternatives_spanish:
  - juzgando
  - que juzgas
  lexicon: BDAG
  rationale: Después de "¿quién eres?" el infinitivo final resulta más natural en español y refleja el sentido de la participio presente como acción caracterizadora.
- source_word: τὸν πλησίον
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - al prójimo
  lexicon: BDAG
  rationale: '"Prójimo" conserva la relación ética del término griego en el contexto bíblico. El posesivo "tu" hace explícita la aplicación directa de la reprensión.'
theological_decisions:
- issue: Único Legislador y Juez como referencia a Dios
  english_pob_reading: The phrase refers to God as the uniquely authoritative giver of law and judge.
  chosen_spanish_reading: 'La frase se traduce como un título divino: Dios es el único Legislador y Juez.'
  alternative_spanish_readings:
  - Una afirmación general sobre la singularidad de la autoridad judicial
  - Un juez y legislador humano en sentido abstracto
  rationale: El contexto de Santiago 4:11–12 corrige la presunción de juzgar al hermano y fundamenta esa corrección en la autoridad exclusiva de Dios. La mayúscula en "Legislador" y "Juez" refleja ese uso titular sin añadir contenido ajeno al texto.
  doctrine_reference: Santiago 4:11–12; filosofía de traducción del POB §1 y §3
- issue: Fuerza de 'destruir'
  english_pob_reading: '''Destroy'' denotes God''''s authority to bring final judgment/ruin, without specifying the metaphysical nature of that destruction.'
  chosen_spanish_reading: '"Destruir" expresa la capacidad de Dios para llevar a cabo juicio y ruina final, sin definir su mecánica.'
  alternative_spanish_readings:
  - aniquilar
  - condenar
  rationale: El texto afirma la capacidad de salvar y destruir, pero no explica cómo ocurre ese juicio. "Destruir" conserva la tensión teológica sin importar una doctrina específica sobre el castigo final.
  doctrine_reference: Santiago 4:12; filosofía de traducción del POB §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y refleja el ajuste más reciente del audit trail inglés: el cierre se formula con infinitivo final natural en español («para juzgar»), preservando la reprensión directa sin transformar el participio en una frase explicativa más larga. También se conserva la antítesis salvación/destrucción sin precisar más de lo que el texto dice.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '"Legislador" y "Juez" se capitalizan por su función titular divina en este contexto.'
  - '"Prójimo" se usa para πλησίον por su carga ética bíblica, con el posesivo "tu" para corresponder al inglés POB y al tono directo del griego.'
  - La estructura "un solo... el que tiene poder para..." busca equilibrio entre fidelidad sintáctica y naturalidad en español.
