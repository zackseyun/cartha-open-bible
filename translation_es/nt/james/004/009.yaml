translation:
  language: es
  text: Sean miserables[a], hagan duelo y lloren. Que su risa se convierta en duelo y su alegría en abatimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sean desdichados». El verbo griego puede denotar estar en miseria o aflicción; «Sean miserables» se elige por ser más natural en español moderno y por conservar la dureza del mandato.
    reason: lexical_alternative
  - marker: b
    text: O «desánimo». El término griego se refiere a un estado de ánimo decaído y sombrío.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταλαιπωρήσατε
  english_pob_choice: Be miserable
  chosen_spanish: Sean miserables
  alternatives_spanish:
  - Sean desdichados
  - Sean miserables de corazón
  - Vivan en miseria
  lexicon: BDAG
  rationale: El imperativo aoristo exige una exhortación fuerte a una condición de aflicción. «Sean miserables» conserva la severidad del llamado y suena natural en español moderno; «sean desdichados» es posible, pero menos directo. Se evita suavizarlo a «lamenten», porque eso repetiría el verbo siguiente y perdería la fuerza del primer mandato.
- source_word: πενθήσατε
  english_pob_choice: mourn
  chosen_spanish: lamenten
  alternatives_spanish:
  - duelan
  - estén en duelo
  - mourn
  lexicon: BDAG
  rationale: πενθέω expresa duelo o lamento por dolor y pérdida. «Lamenten» mantiene el peso afectivo y encaja con el tono penitencial del contexto. «Estén en duelo» sería demasiado específico para un duelo formal; «duelan» no comunica tan bien la acción exhortativa.
- source_word: κλαύσατε
  english_pob_choice: weep
  chosen_spanish: lloren
  alternatives_spanish:
  - lloren en voz alta
  - prorrumpan en llanto
  - lloren amargamente
  lexicon: BDAG
  rationale: «Lloren» es la correspondencia más natural para κλαίω y preserva la progresión de los tres imperativos. Se evita «lloren en voz alta» o adverbios añadidos porque el griego no los requiere.
- source_word: ὁ γέλως ὑμῶν
  english_pob_choice: your laughter
  chosen_spanish: su risa
  alternatives_spanish:
  - la risa de ustedes
  - su risa
  - su regocijo
  lexicon: BDAG
  rationale: El giro posesivo se expresa naturalmente con «su risa». «Risa» conserva el sustantivo concreto y evita abstraerlo a «regocijo», que sería más interpretativo.
- source_word: εἰς πένθος
  english_pob_choice: into mourning
  chosen_spanish: en lamento
  alternatives_spanish:
  - en duelo
  - en duelo y llanto
  - en tristeza
  lexicon: BDAG
  rationale: πένθος nombra duelo, lamento o aflicción por pérdida. «En lamento» mantiene la relación con el verbo πενθήσατε y preserva el campo semántico del duelo. Se evita «tristeza», que es más general y menos concreto.
- source_word: μετατραπήτω
  english_pob_choice: be turned
  chosen_spanish: se convierta
  alternatives_spanish:
  - sea convertido
  - sea cambiado
  - se transforme
  lexicon: BDAG
  rationale: La pasiva imperativa se expresa de forma natural en español con «se convierta». Esto conserva el cambio de estado sin sobrecargar el verbo con matices no presentes en el griego.
- source_word: ἡ χαρὰ
  english_pob_choice: your joy
  chosen_spanish: su alegría
  alternatives_spanish:
  - su gozo
  - la alegría de ustedes
  - su regocijo
  lexicon: BDAG
  rationale: «Alegría» es una equivalencia clara y digna para χαρά. Aunque el griego explicita el posesivo con la primera cláusula y lo elide en la segunda, el español lo mantiene por paralelismo natural. «Gozo» es posible, pero aquí «alegría» resulta más transparente.
- source_word: εἰς κατήφειαν
  english_pob_choice: into gloom
  chosen_spanish: en abatimiento
  alternatives_spanish:
  - en desánimo
  - en melancolía
  - en abatimiento del ánimo
  lexicon: BDAG
  rationale: κατήφεια designa un estado abatido, sombrío o de desánimo. «Abatimiento» comunica bien el carácter de decaimiento interior. Se evita «gloom» transliterado o «melancolía», que podría sugerir un matiz psicológico más moderno que el del texto.
theological_decisions:
- issue: Fuerza penitencial de los imperativos
  english_pob_reading: The verse is rendered as a forceful call to sorrowful repentance without softening the imperatives.
  chosen_spanish_reading: El versículo se traduce como una exhortación intensa a la aflicción y al arrepentimiento, sin atenuar el tono imperativo.
  alternative_spanish_readings:
  - Una exhortación más suave a la seriedad
  - Una llamada general a la reflexión
  rationale: En el contexto inmediato (Santiago 4:6–10), la secuencia de mandatos intensifica la humillación delante de Dios. La traducción conserva esa severidad sin añadir explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Santiago 4:6–10; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas y el último pase indica que no hubo cambios; por tanto, esta versión española sigue de cerca las decisiones léxicas y teológicas ya consolidadas, preservando la triple progresión imperativa y el paralelismo final.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo entre los dos pares de verbos y sustantivos: lamento/llanto frente a risa/alegría.'
  - Se usa «miserables» para la primera orden porque el español exige una construcción más idiomática que un simple adjetivo aislado.
  - Se conserva «lamento» y «abatimiento» como sustantivos concretos, sin suavizar a términos genéricos como «tristeza» o «seriedad».
