translation:
  language: es
  text: Humíllense delante[a] del Señor, y él los exaltará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la presencia del Señor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y él los levantará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταπεινώθητε
  english_pob_choice: Humble yourselves
  chosen_spanish: Humíllense
  alternatives_spanish:
  - Humíllense ustedes
  - Sean humillados
  - Bajen de sí mismos
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo de ταπεινόω puede tener fuerza reflexiva/misional en exhortación. En español, "humíllense" conserva la llamada voluntaria a la humildad y suena natural y digna, sin convertirlo en una mera descripción pasiva de ser rebajados por otro.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: ἐνώπιον expresa ubicación relacional o espacial "delante de / en presencia de". "Delante de" es idiomático en español bíblico contemporáneo y mantiene la imagen sin endurecerla.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Jesús
  - de Dios
  lexicon: BDAG
  rationale: El audit trail inglés preserva "the Lord" sin especificar el referente. En español, "Señor" mantiene esa ambigüedad fuente y evita resolver indebidamente si se trata de Dios o del Señor Jesús. Se usa el artículo contracto natural en la construcción preposicional.
- source_word: ὑψώσει
  english_pob_choice: will exalt
  chosen_spanish: los exaltará
  alternatives_spanish:
  - los levantará
  - los elevará
  - los alzará
  lexicon: BDAG
  rationale: 'ὑψόω aquí es metafórico: elevación en honor tras la humildad. "Exaltará" conserva ese valor teológico y moral mejor que "levantar" o "elevar", que en español pueden sonar más físicos o menos solemnes.'
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ustedes
  lexicon: BDAG
  rationale: El objeto es plural de segunda persona. En español, el clítico directo plural "los" permite una frase natural y directa; el plural explícito queda claro por el contexto exhortativo. Sin marcar género explícito en el texto, se conserva el plural colectivo del destinatario.
theological_decisions:
- issue: Referente de κύριος / "el Señor"
  english_pob_reading: Rendered generically as 'the Lord' without specifying in the main text whether the referent is God or the Lord Jesus.
  chosen_spanish_reading: '"el Señor" sin precisar si se refiere a Dios o al Señor Jesús en el texto principal.'
  alternative_spanish_readings:
  - Dios
  - el Señor Jesús
  rationale: James puede usar κύριος con referencia a Dios y también a Jesús. El contexto inmediato no exige resolver el referente con más precisión que el griego. Mantener "el Señor" conserva la tensión teológica documentada y evita introducir una especificación no necesaria del original.
  doctrine_reference: Preservar la ambigüedad reverente del referente de κύριος; no forzar identificación cristológica ni teológica donde el texto no la explicita.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la auditoría inglesa; no se registran revisiones aplicadas. La redacción española conserva el paralelismo exhortación/promesa y mantiene la ambigüedad de κύριος.
  spanish_consistency_notes:
  - Se sigue el término proyecto "Señor" para κύριος, evitando reemplazos por fórmulas eclesiásticas más interpretativas.
  - '"Humíllense" mantiene el tono exhortativo y voluntario del aoristo pasivo en contexto parenético.'
  - '"Exaltará" preserva el registro elevado y metafórico de ὑψόω.'
  - Las notas alternativas se limitan a las opciones documentadas en la auditoría inglesa, sin añadir glosas especulativas.
