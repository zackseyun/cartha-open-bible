translation:
  language: es
  text: ¿O piensan que la Escritura habla en vano? El Espíritu[a] que él hizo morar en nosotros anhela celosamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu que él hizo morar en nosotros». El griego puede referirse tanto al Espíritu Santo como al espíritu humano.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con envidia». La frase griega también puede entenderse así.'
    reason: alternative_reading
lexical_decisions:
- source_word: κενῶς
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin efecto
  - para nada
  lexicon: BDAG
  rationale: κενῶς expresa la idea de inutilidad o falta de efecto. «En vano» es el equivalente español natural y digno para conservar la fuerza retórica de la pregunta sin volverla áspera o coloquial.
- source_word: ἡ γραφὴ
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - Escritura
  - las Escrituras
  lexicon: BDAG
  rationale: El singular con artículo funciona como designación técnica de la revelación escrita. «La Escritura» mantiene esa referencia autorizada y evita pluralizar indebidamente el texto.
- source_word: τὸ πνεῦμα
  english_pob_choice: The Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  - el espíritu que hizo morar en nosotros
  lexicon: BDAG
  rationale: La frase es genuinamente ambigua entre el Espíritu Santo y el espíritu humano. En el cuerpo principal se opta por «el Espíritu» con mayúscula, porque la construcción de habitar en nosotros encaja de manera natural con el Espíritu Santo; la alternativa queda preservada en nota.
- source_word: ἐπιποθεῖ
  english_pob_choice: yearns
  chosen_spanish: anhela
  alternatives_spanish:
  - desea intensamente
  - suspira por
  lexicon: BDAG
  rationale: ἐπιποθέω comunica un deseo fuerte y sostenido. «Anhela» mantiene esa intensidad en español con un registro sobrio y bíblico.
- source_word: Πρὸς φθόνον
  english_pob_choice: jealously
  chosen_spanish: celosamente
  alternatives_spanish:
  - con celos
  - con envidia
  lexicon: BDAG
  rationale: La expresión preposicional es difícil. «Celosamente» reproduce el matiz adverbial sin introducir de entrada la carga moral negativa de «envidia». La ambigüedad semántica se conserva en la nota, ya que el giro griego puede leerse también con el sentido de «con envidia».
- source_word: κατῴκισεν
  english_pob_choice: caused to dwell
  chosen_spanish: hizo morar
  alternatives_spanish:
  - hizo habitar
  - causó que habitara
  lexicon: BDAG
  rationale: El aoristo causativo de κατοικίζω pide una forma verbal que exprese agencia divina. «Hizo morar» es breve, claro y fiel al sentido de causar residencia, sin perder solemnidad.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: La preposición apunta a indwelling, no simplemente a presencia colectiva. «En nosotros» conserva mejor la idea de morada interior.
theological_decisions:
- issue: Referente de τὸ πνεῦμα
  english_pob_reading: The Spirit refers to the Holy Spirit indwelling believers.
  chosen_spanish_reading: El texto se entiende principalmente del Espíritu Santo que mora en los creyentes.
  alternative_spanish_readings:
  - se refiere al espíritu humano que Dios hizo morar en nosotros
  rationale: La gramática permite ambas opciones. La lectura principal sigue el valor más natural de la clausula con «hizo morar en nosotros» y la aplica al Espíritu Santo; no obstante, la ambigüedad real se conserva en nota para no resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor moral de φθόνος
  english_pob_reading: Render the longing as 'jealously' rather than 'enviously'.
  chosen_spanish_reading: Se prefiere «celosamente» antes que una forma que ya sugiera «envidia» en el texto principal.
  alternative_spanish_readings:
  - con envidia
  - envidiosamente
  rationale: En español, «envidia» suele sonar moralmente viciosa; si el sujeto es el Espíritu Santo, conviene evitar esa implicación en la línea principal. La nota conserva la alternativa literal porque el griego sigue siendo difícil y la tensión interpretativa debe quedar visible.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la decisión auditada del POB en inglés de mantener el verbo de deseo fuerte, conservar la referencia autoritativa de «la Escritura» y dejar abierta la ambigüedad de τὸ πνεῦμα. Se adopta «en vano» como equivalente natural de κενῶς y se traslada la dificultad de Πρὸς φθόνον a una nota, sin eliminarla del texto principal.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula en la lectura principal, coherente con el uso confesional cuando el contexto sugiere el Espíritu Santo.
  - «En vano» y «anhela celosamente» conservan el tono retórico y la tensión interpretativa del original.
  - No se usa «SEÑOR» ni «Cristo» porque no aparecen en este versículo.
  - La estructura interrogativa y la puntuación reflejan el contraste del griego entre la pregunta y la cita/afirmación subsiguiente.
