translation:
  language: es
  text: ¡Adúlteras![a] ¿No saben que la amistad con el mundo[b] es hostilidad hacia Dios[c]? Por tanto, cualquiera que quiera ser amigo del mundo, se hace enemigo de Dios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes adúlteras». El término probablemente funciona de manera metafórica para la infidelidad espiritual, en eco del lenguaje profético del pacto.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «el mundo» se refiere al orden humano en oposición a Dios, no a la creación misma.
    reason: cultural_note
  - marker: c
    text: 'O: «enemistad con Dios».'
    reason: alternative_reading
  - marker: d
    text: 'O: «llega a ser enemigo de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: μοιχαλίδες
  english_pob_choice: Adulteresses
  chosen_spanish: ¡Adúlteras!
  alternatives_spanish:
  - ¡Ustedes adúlteras!
  - ¡Personas adúlteras!
  lexicon: BDAG
  rationale: Se conserva el vocativo femenino plural de fuerza directa. “Adúlteras” reproduce el golpe retórico y deja que el contexto muestre la metáfora de infidelidad del pacto; “personas adúlteras” suaviza indebidamente el femenino marcado.
- source_word: οὐκ οἴδατε
  english_pob_choice: do you not know
  chosen_spanish: ¿No saben
  alternatives_spanish:
  - ¿No entienden
  - ¿No conocen
  lexicon: BDAG
  rationale: La pregunta retórica negativa se expresa de forma natural en español con “¿No saben?”, manteniendo el tono de reprensión e incredulidad del original.
- source_word: φιλία
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - afecto
  - alianza
  lexicon: BDAG
  rationale: “Amistad” conserva el sustantivo relacional y enlaza con φίλος (“amigo”) en la cláusula siguiente. Otras opciones o bien reducen el sentido o lo vuelven demasiado interpretativo.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el orden del mundo
  - el sistema del mundo
  lexicon: BDAG
  rationale: Se mantiene la forma directa “el mundo”, como en el POB inglés, sin ampliar el texto principal con una glosa interpretativa. El contexto adversativo ya limita el referente al orden humano opuesto a Dios.
- source_word: ἔχθρα τοῦ θεοῦ
  english_pob_choice: hostility toward God
  chosen_spanish: enemistad con Dios
  alternatives_spanish:
  - hostilidad hacia Dios
  - enemistad de Dios
  lexicon: BDAG
  rationale: En español, “enemistad con Dios” reproduce con naturalidad la relación adversativa y preserva la opción alternativa tradicional señalada por el POB inglés. “Hostilidad hacia Dios” también es posible, pero suena menos compacta en esta construcción.
- source_word: ὃς ἐὰν οὖν
  english_pob_choice: Therefore, whoever
  chosen_spanish: Por tanto, quienquiera que
  alternatives_spanish:
  - Así que, quien
  - Por eso, quien
  lexicon: BDAG
  rationale: “Por tanto” recoge la inferencia de οὖν, y “quienquiera que” expresa bien la cláusula generalizadora. La combinación mantiene el vínculo lógico sin volverlo pesado.
- source_word: βουληθῇ
  english_pob_choice: wants
  chosen_spanish: quiera
  alternatives_spanish:
  - desee
  - quiera ser
  lexicon: BDAG
  rationale: El subjuntivo de voluntad se vierte con “quiera”, que en español comunica intención deliberada sin rigidez. “Desee” es posible, pero menos directo en este encadenamiento condicional.
- source_word: φίλος εἶναι τοῦ κόσμου
  english_pob_choice: to be a friend of the world
  chosen_spanish: ser amigo del mundo
  alternatives_spanish:
  - ser del mundo
  - hacer amistad con el mundo
  lexicon: BDAG
  rationale: 'Se conserva la relación nominal con φίλος y φιλία: “amigo del mundo” reproduce el paralelismo léxico del pasaje. “Ser del mundo” interpretaría demasiado; “hacer amistad con” altera la sintaxis.'
- source_word: ἐχθρὸς τοῦ θεοῦ
  english_pob_choice: an enemy of God
  chosen_spanish: enemigo de Dios
  alternatives_spanish:
  - hostil a Dios
  lexicon: BDAG
  rationale: “Enemigo de Dios” es la forma directa y contundente del predicado sustantivado. Mantiene el contraste relacional con “amigo del mundo” y su fuerza moral.
- source_word: καθίσταται
  english_pob_choice: makes himself
  chosen_spanish: se constituye en
  alternatives_spanish:
  - se hace
  - llega a ser
  lexicon: BDAG
  rationale: “Se constituye en” traduce la idea de quedar establecido en un estado o condición, sin forzar una lectura puramente reflexiva. También preserva la gravedad del proceso moral; “se hace” sería más coloquial y menos preciso.
theological_decisions:
- issue: Metáfora de μοιχαλίδες
  english_pob_reading: Retain the literal term 'Adulteresses' in the main text while allowing the context to signal spiritual/covenantal unfaithfulness.
  chosen_spanish_reading: Mantener el vocativo literal “¡Adúlteras!” en el texto principal, dejando que el contexto señale la infidelidad espiritual o de pacto.
  alternative_spanish_readings:
  - ¡Personas adúlteras!
  - ¡Infieles!
  rationale: El griego usa un vocativo femenino fuerte que no conviene diluir. Traducirlo literalmente respeta la dureza profética del reproche y evita sustituir una imagen bíblica por una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 4, 6
- issue: Sentido de κόσμος
  english_pob_reading: Translate as 'the world' without expanding it in the main text.
  chosen_spanish_reading: Traducir como “el mundo” sin ampliar en el texto principal su referencia al orden humano opuesto a Dios.
  alternative_spanish_readings:
  - el sistema del mundo
  - el orden presente del mundo
  rationale: El pasaje sí apunta al ámbito humano contrario a Dios, pero esa aclaración pertenece al comentario, no al texto. “El mundo” conserva la forma del original y mantiene abierta la carga teológica sin sobreinterpretar.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: He revisado la concordancia con el griego SBLGNT y con el audio de decisiones del POB inglés. La versión española conserva el vocativo femenino, la relación léxica φιλία/φίλος, el valor inferencial de οὖν y la ambigüedad controlada de ἔχθρα τοῦ θεοῦ sin convertirla en glosa exegética dentro del texto principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Dios según las normas del proyecto; en este versículo solo aparece «Dios».
  - Se evita «SEÑOR» porque no hay κύριος en el verso.
  - «Amigo del mundo» conserva el vínculo formal con «amistad».
  - La puntuación sigue el español moderno con vocativo e interrogación retórica.
