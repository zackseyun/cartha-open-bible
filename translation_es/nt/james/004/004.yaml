base_translation:
  language: en
  yaml_path: translation/nt/james/004/004.yaml
  text: Adulteresses[a], do you not know that friendship with the world is hostility toward God? Therefore[d][c][b], whoever wants to be a friend of the world makes himself an enemy of God.
  footnotes:
  - marker: a
    text: Or 'You adulteresses.' The term likely functions metaphorically for spiritual unfaithfulness, echoing prophetic covenant language.
    reason: lexical_alternative
  - marker: b
    text: Or 'enmity with God.'
    reason: alternative_reading
  - marker: c
    text: '''The world'' here refers to the human order in opposition to God, not to creation itself.'
    reason: cultural_note
  - marker: d
    text: Or 'becomes an enemy of God.'
    reason: alternative_reading
