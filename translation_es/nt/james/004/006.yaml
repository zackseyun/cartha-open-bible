translation:
  language: es
  text: 'Pero da mayor gracia. Por eso dice[a]: «Dios se opone a los soberbios, pero da gracia a los humildes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por eso él dice», o «Por eso dice la Escritura». El griego deja implícito el sujeto de «dice».'
    reason: alternative_reading
lexical_decisions:
- source_word: μείζονα
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más
  - superior
  lexicon: BDAG
  rationale: El comparativo de μέγας pide una forma comparativa natural en español. “Mayor” conserva la fuerza comparativa y funciona con “gracia” sin forzar una estructura extraña.
- source_word: δίδωσιν χάριν
  english_pob_choice: gives grace
  chosen_spanish: da gracia
  alternatives_spanish:
  - concede gracia
  - otorga gracia
  lexicon: BDAG
  rationale: La combinación verbo + objeto se mantiene de manera directa y repetida para preservar el paralelismo del verso. “Da gracia” es natural y refleja la simplicidad del griego.
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa bien la inferencia desde lo anterior con español moderno y claro. “Por eso” suena menos pesado que “por lo tanto” y conserva la relación causal.
- source_word: λέγει
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice la Escritura
  - él dice
  lexicon: BDAG
  rationale: El griego deja implícito el sujeto de “dice”. En español, una forma impersonal breve como “dice” preserva esa ambigüedad sin sobreespecificarla. La nota explica las alternativas posibles.
- source_word: ὑπερηφάνοις
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: BDAG
  rationale: El sustantivo adjetival pide un sustantivo plural. “Soberbios” comunica bien la actitud de autoexaltación y tiene un registro bíblico claro en español.
- source_word: ἀντιτάσσεται
  english_pob_choice: opposes
  chosen_spanish: se opone a
  alternatives_spanish:
  - resiste a
  - se enfrenta a
  lexicon: BDAG
  rationale: La forma media/reflexiva española expresa oposición activa con naturalidad. “Se opone a” es directa y conserva el sentido de resistencia o enfrentamiento sin exagerar el matiz.
- source_word: ταπεινοῖς
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los abatidos
  lexicon: BDAG
  rationale: Conserva el contraste adjetival sustantivado con “los soberbios”. “Humildes” es la opción más clara y amplia; “mansos” o “abatidos” restringirían el sentido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: BDAG
  rationale: El griego marca contraste dentro de la cita. “Pero” reproduce esa oposición con el mismo valor adversativo que en la traducción inglesa.
theological_decisions:
- issue: Sujeto implícito de λέγει en la fórmula de cita
  english_pob_reading: Therefore it says
  chosen_spanish_reading: Por eso dice
  alternative_spanish_readings:
  - Por eso dice la Escritura
  - Por eso él dice
  rationale: El griego no explicita el sujeto de “dice”. Mantener “dice” conserva la ambigüedad del texto y evita introducir un sujeto no expresado. La nota recoge las posibilidades que el inglés POB dejó abiertas.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; esta propuesta mantiene esa lectura, conservando la comparativa de χάρις, la ambigüedad del sujeto de λέγει y el contraste adversativo dentro de la cita.
  spanish_consistency_notes:
  - Se mantiene “gracia” para χάρις y “humildes/soberbios” para el contraste ético del texto.
  - Se usa “Yahvé” solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - La cita se introduce con una formulación breve y neutral que respeta la ambigüedad del original.
