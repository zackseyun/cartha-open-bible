  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «gracia», «los soberbios» y «los humildes» concuerdan con las decisiones léxicas documentadas. No intervienen aquí términos sensibles como Yahvé, Mesías o esclavo.
