translation:
  language: es
  text: Piden y no reciben, porque piden mal[a], para gastarlo en sus placeres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piden equivocadamente» o «piden con motivos torcidos».
    reason: lexical_alternative
  - marker: b
    text: O «en sus placeres»; «placeres» también puede llevar la idea de deseos o pasiones autoindulgentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτεῖτε
  english_pob_choice: you ask
  chosen_spanish: piden
  alternatives_spanish:
  - ustedes piden
  - ustedes piden
  lexicon: BDAG
  rationale: El verbo pide una petición directa; en español, «pedir» expresa de manera natural la acción de solicitar, sin añadir matices innecesarios. El presente mantiene la forma verbal general del griego y el tono directo del reproche.
- source_word: λαμβάνετε
  english_pob_choice: do not receive
  chosen_spanish: no reciben
  alternatives_spanish:
  - no obtienen
  - no reciben
  lexicon: BDAG
  rationale: «Recibir» conserva bien la relación semántica entre pedir y recibir, además de mantener un registro bíblico claro y natural en español.
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: Introduce con claridad la causa de no recibir. «Porque» es la conexión causal más transparente en español contemporáneo.
- source_word: κακῶς
  english_pob_choice: wrongly
  chosen_spanish: mal
  alternatives_spanish:
  - incorrectamente
  - mal
  - con malas intenciones
  lexicon: BDAG
  rationale: El adverbio griego es amplio; «mal» conserva la acusación sin restringirla solo a motivos internos. En este contexto funciona de modo natural con «piden» y deja que la cláusula final precise el desorden del pedir.
- source_word: αἰτεῖσθε
  english_pob_choice: you ask
  chosen_spanish: piden
  alternatives_spanish:
  - ustedes piden
  - se piden
  lexicon: BDAG
  rationale: Se mantiene la repetición verbal del texto griego con «piden», sin forzar una marca reflexiva que el español no necesita para expresar el medio.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - para
  lexicon: BDAG
  rationale: La cláusula expresa finalidad. En español, «para» da una relación final natural y concisa, equivalente al valor de propósito/resultadо del griego.
- source_word: ἐν ταῖς ἡδοναῖς ὑμῶν
  english_pob_choice: on your pleasures
  chosen_spanish: en sus placeres
  alternatives_spanish:
  - en sus placeres
  - para sus placeres
  - en sus deseos
  lexicon: BDAG
  rationale: «Ἡδοναῖς» designa placeres o deleites; «placeres» es la correspondencia más directa. Se conserva la preposición «en», porque el griego sitúa la acción dentro de ese ámbito. Se usa «sus» para mantener el referente plural y el tono natural en español.
- source_word: δαπανήσητε
  english_pob_choice: you may spend it
  chosen_spanish: gastarlo
  alternatives_spanish:
  - gastarlo
  - consumirlo
  - desperdiciarlo
  lexicon: BDAG
  rationale: El verbo significa gastar o expender. Aquí el infinitivo sustantivado español tras «para» funciona bien y mantiene la idea de uso de recursos; «gastarlo» es más neutral que «desperdiciarlo», que añadiría una valoración no explícita en el verbo.
theological_decisions:
- issue: Si hacer explícito que el pedir está dirigido a Dios
  english_pob_reading: 'Leave the object implicit: ''You ask and do not receive'''
  chosen_spanish_reading: 'Se mantiene el objeto implícito: «Piden, y no reciben»'
  alternative_spanish_readings:
  - Piden a Dios, y no reciben
  - Ustedes piden a Dios, y no reciben
  rationale: Aunque el contexto apunta a la oración, el griego no dice «a Dios». Mantener el objeto implícito preserva la restricción del texto y evita una paráfrasis que sobrepasa la evidencia fuente.
  doctrine_reference: 'Principio POB: no resolver ni explicitar más allá de lo que el texto griego dice.'
- issue: Cómo rendir κακῶς sin reducirlo solo a motivo
  english_pob_reading: Render as 'wrongly' in the main text
  chosen_spanish_reading: Render como «mal» en el texto principal
  alternative_spanish_readings:
  - con malas intenciones
  - incorrectamente
  - amiss
  rationale: «Mal» es suficientemente amplio para abarcar la calidad defectuosa o torcida del pedir, sin cerrarlo exclusivamente a la esfera de intenciones. La cláusula de finalidad explica el desorden con mayor precisión.
  doctrine_reference: Equivalencia óptima con primacía del original; preservar la tensión lexical en vez de estrecharla prematuramente.
- issue: Relación de finalidad en ἵνα ἐν ταῖς ἡδοναῖς ὑμῶν δαπανήσητε
  english_pob_reading: so that you may spend it on your pleasures
  chosen_spanish_reading: «para gastarlo en sus placeres»
  alternative_spanish_readings:
  - para gastarlo en sus placeres
  - para usarlo en sus placeres
  - para consumirlo en sus placeres
  rationale: El giro español con «para» comunica la finalidad del aoristo subjuntivo sin añadir matices doctrinales o morales que no estén explicitados. «En sus placeres» conserva el ámbito de consumo expresado por el griego.
  doctrine_reference: La finalidad en ἵνα se respeta como propósito/resultación, sin intensificarla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue el pasaje sin cambios de revisión reportados en el audit trail reciente; no se detectan ajustes posteriores pendientes respecto del texto inglés base.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal breve del original: «Piden... no reciben... porque piden...».'
  - Se evita introducir «Cristo», «SEÑOR» o «Dios» donde el griego no lo dice explícitamente.
  - «Placeres» mantiene la decisión léxica del audit trail y admite la posible connotación de deseos autoindulgentes sin forzarla en el texto principal.
  - La puntuación refleja claramente la cadena causal y final del versículo.
