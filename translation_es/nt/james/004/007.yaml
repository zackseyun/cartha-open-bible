translation:
  language: es
  text: Sométanse[a], pues, a Dios. Pero resistan al diablo y huirá de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estén sometidos a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτάγητε
  english_pob_choice: Submit yourselves
  chosen_spanish: Sométanse
  alternatives_spanish:
  - Sujétense
  - Pónganse bajo la autoridad de Dios
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo con valor reflexivo pide una forma natural en español que exprese la rendición voluntaria a la autoridad de Dios. 'Sométanse' conserva el matiz de colocarse bajo autoridad sin el calco incómodo de una pasiva literal.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: pues
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca inferencia respecto del argumento previo. 'Pues' suena más natural en este contexto exhortativo español y mantiene la conexión lógica.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo con ὑποτάγητε se expresa naturalmente con 'a Dios' en español, conservando la dirección de la sumisión.
- source_word: ἀντίστητε
  english_pob_choice: resist
  chosen_spanish: resistan
  alternatives_spanish:
  - opónganse
  - hagan frente
  lexicon: BDAG
  rationale: El imperativo aoristo activo exhorta a ponerse en contra del adversario. 'Resistan' es la equivalencia directa, clara y bíblicamente estable en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: Expresa contraste entre someterse a Dios y resistir al diablo.
- source_word: τῷ διαβόλῳ
  english_pob_choice: the devil
  chosen_spanish: al diablo
  alternatives_spanish:
  - al acusador
  - al calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como título personal del adversario espiritual. 'Diablo' es el equivalente establecido y fiel al contexto.
- source_word: φεύξεται
  english_pob_choice: he will flee
  chosen_spanish: huirá
  alternatives_spanish:
  - saldrá corriendo
  - escapará
  lexicon: BDAG
  rationale: El futuro medio indica el resultado de la resistencia. En español, el sujeto queda claro por el contexto inmediato; no hace falta repetir 'él' para mantener fluidez, aunque puede añadirse por énfasis.
- source_word: ἀφ’ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - lejos de ustedes
  lexicon: BDAG
  rationale: La preposición con genitivo expresa alejamiento. 'De ustedes' es la forma neutra y natural en español latinoamericano.
theological_decisions:
- issue: Naturaleza de διάβολος como adversario personal
  english_pob_reading: the devil as a personal supernatural adversary
  chosen_spanish_reading: el diablo como adversario personal y espiritual
  alternative_spanish_readings:
  - el diablo como símbolo del mal
  - el acusador como fuerza impersonal
  rationale: El contexto de conflicto espiritual y la forma articular del término favorecen una lectura personal, no meramente abstracta. 'Diablo' en español transmite esa lectura sin diluirla.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto español. No se añadieron notas sin anclaje; la opción alternativa está vinculada directamente al verbo inicial.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός y 'diablo' para διάβολος, conforme al auditoría inglesa y a la terminología POB.
  - Se eligió un registro neutral latinoamericano, con imperativo plural de trato general ('Sométanse', 'resistan').
  - La relación lógica de οὖν quedó expresada con 'pues' sin endurecer el ritmo del mandato.
  - Se evitó una glosa excesiva de ὑποτάσσω; la nota ofrece la alternativa 'Sujétense' para preservar la tensión léxica documentada.
