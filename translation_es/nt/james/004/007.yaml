review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: ὑποτάγητε = ''Sométanse'', οὖν = ''pues'', ἀντίστητε = ''resistan'', τῷ διαβόλῳ = ''al diablo'', φεύξεται ἀφ’ ὑμῶν = ''huirá de ustedes''. También preserva correctamente la lectura teológica de διάβολος como adversario personal. La única desviación significativa está en la nota léxica: la alternativa inglesa ''Be subject to God'' no equivale bien a ''Sujétense a Dios'', que en español cambia el matiz hacia ''agarrarse'' o ''aferrarse'' más que ''estar sujetos/someterse''.'
  spanish_quality_summary: La redacción principal es clara, natural y digna para español latinoamericano amplio. 'Sométanse, pues, a Dios. Pero resistan al diablo, y él huirá de ustedes' es perfectamente legible. Puede mejorarse levemente la puntuación y fluidez quitando el pronombre explícito 'él', ya que el sujeto ya es claro, y sustituyendo la coma antes de 'y' por una coordinación más natural en español bíblico moderno.
  glossary_alignment: 'El borrador mantiene bien la terminología del proyecto: θεός = ''Dios'', διάβολος = ''diablo''. No hay conflicto con Yahvé/Mesías/etc. La decisión sobre ὑποτάγητε en el texto principal (''Sométanse'') concuerda con la justificación auditada; lo que debe corregirse es solo la alternativa de nota para que refleje mejor ''Be subject to God'' en español.'
  issues:
  - severity: medium
    issue: La nota al pie usa 'Sujétense a Dios' como alternativa para ὑποτάγητε.
    rationale: En español, 'sujetarse a' puede funcionar en algunos contextos, pero 'Sujétense a Dios' suena menos idiomático y puede sugerir 'agárrense de Dios' o una acción física. La alternativa inglesa auditada es 'Be subject to God', que en español se refleja mejor como 'Estén sujetos a Dios' o, más naturalmente, 'Estén sometidos a Dios'.
  - severity: low
    issue: La cláusula final incluye 'y él huirá de ustedes'.
    rationale: No es infiel, pero el pronombre 'él' no es necesario en español porque el referente ya es claro. 'Y huirá de ustedes' suena más natural y evita un énfasis no marcado en el griego.
  - severity: low
    issue: La coma antes de 'y' en la última coordinación resulta algo menos natural.
    rationale: En español corriente, 'Pero resistan al diablo y huirá de ustedes' o con pausa fuerte anterior funciona mejor que '..., y ...'. Dado que ya hay punto antes de 'Pero', puede simplificarse sin pérdida de sentido.
  revised_spanish_text: Sométanse[a], pues, a Dios. Pero resistan al diablo y huirá de ustedes.
  revised_footnotes:
  - marker: a
    text: 'O: «Estén sometidos a Dios».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal con una mejora menor de fluidez en la segunda oración y se corrige la nota léxica para reflejar con mayor fidelidad la alternativa auditada en inglés sin introducir un matiz español inadecuado.
