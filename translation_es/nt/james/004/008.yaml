translation:
  language: es
  text: Acérquense a Dios, y él se acercará a ustedes. Limpien sus manos, pecadores, y purifiquen sus corazones, los de doble ánimo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de dos almas». El término describe a una persona dividida en lealtad o compromiso interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίσατε
  english_pob_choice: Draw near
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Acerquémonos
  - Cercaos
  lexicon: BDAG
  rationale: El imperativo aoristo plural expresa una exhortación directa y relacional. «Acérquense» comunica el movimiento hacia Dios en español natural y mantiene la fuerza exhortativa sin volverlo explicativo.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Yahvé
  - a Dios nuestro
  lexicon: BDAG
  rationale: El dativo tras ἐγγίζω se expresa de manera sencilla en español con «a Dios». Aquí el contexto griego usa θεός, no el nombre divino, así que no se introduce «Yahvé» en el texto principal.
- source_word: ἐγγιεῖ
  english_pob_choice: he will draw near
  chosen_spanish: él se acercará
  alternatives_spanish:
  - él se acercará a ustedes
  - se acercará
  lexicon: BDAG
  rationale: Se preserva el paralelismo verbal con el primer miembro, usando el mismo verbo de cercanía. El sujeto está implícito en el griego y en español se explicita «él» para claridad, referido a Dios.
- source_word: καθαρίσατε
  english_pob_choice: Cleanse
  chosen_spanish: Limpien
  alternatives_spanish:
  - Laven
  - Lávense
  lexicon: BDAG
  rationale: El verbo admite matiz ritual y moral. «Limpien» conserva la imagen concreta de purificación de las manos y funciona bien en paralelo con el mandato interior siguiente.
- source_word: χεῖρας
  english_pob_choice: your hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos
  - sus obras
  lexicon: BDAG
  rationale: Aunque el posesivo no aparece explícito en griego, en español se requiere en la exhortación directa. Se mantiene la imagen corporal, que sugiere conducta externa sin explicitarla en paráfrasis.
- source_word: ἁμαρτωλοί
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - ustedes, pecadores
  - malvados
  lexicon: BDAG
  rationale: Vocativo plural fuerte. «Pecadores» conserva el tono de reprensión directa y corresponde al término griego sin suavizarlo.
- source_word: ἁγνίσατε
  english_pob_choice: purify
  chosen_spanish: purifiquen
  alternatives_spanish:
  - limpien
  - hagan puros
  lexicon: BDAG
  rationale: 'Se distingue de καθαρίσατε para conservar la variación léxica de Santiago: primero la limpieza externa de las manos, luego la purificación interna del corazón.'
- source_word: καρδίας
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - los corazones
  - sus mentes
  lexicon: BDAG
  rationale: «Corazones» mantiene el sentido bíblico del centro interior de motivaciones y lealtades. Se conserva el posesivo por la misma razón idiomática que en «sus manos».
- source_word: δίψυχοι
  english_pob_choice: double-minded people
  chosen_spanish: personas de doble ánimo
  alternatives_spanish:
  - doble ánimo
  - de dos almas
  lexicon: BDAG
  rationale: La imagen griega literalmente es «de dos almas», pero en español «personas de doble ánimo» comunica mejor la idea de lealtad interior dividida. Se evita «doble ánimo» como sustantivación demasiado fría en el vocativo, sin perder la tensión semántica.
theological_decisions:
- issue: Cercanía humana y respuesta divina
  english_pob_reading: Draw near to God, and he will draw near to you.
  chosen_spanish_reading: Acérquense a Dios, y él se acercará a ustedes.
  alternative_spanish_readings:
  - Acérquense a Dios, y él se acercará a ustedes mismos
  - Acérquense a Dios, y Dios se acercará a ustedes
  rationale: Se conserva la estructura condicional implícita y el paralelismo entre la iniciativa humana y la respuesta divina. No se añade una interpretación doctrinal extra; el texto mantiene la tensión relacional del griego.
  doctrine_reference: Santiago 4:8; cf. la reciprocidad del arrepentimiento y la gracia en la exhortación bíblica
- issue: Purificación exterior e interior
  english_pob_reading: Cleanse your hands... and purify your hearts...
  chosen_spanish_reading: Limpien sus manos... y purifiquen sus corazones...
  alternative_spanish_readings:
  - Lávense las manos... y purifiquen sus corazones...
  - Limpien sus obras... y purifiquen sus intenciones...
  rationale: Se mantiene la imaginería corporal y se deja que funcione como metáfora moral y quizá cultual, sin desactivar la tensión entre lo externo y lo interno. Esto refleja la decisión inglesa de no parafrasear las imágenes.
  doctrine_reference: Santiago 4:8; Translation philosophy §3, §6
- issue: δίψυχοι como identidad moral de división interior
  english_pob_reading: double-minded people
  chosen_spanish_reading: personas de doble ánimo
  alternative_spanish_readings:
  - doble ánimo
  - de dos almas
  - personas de dos almas
  rationale: El griego sugiere una lealtad interior dividida. «Personas de doble ánimo» expresa la idea con claridad pastoral en español y conserva la amonestación directa; la lectura literal «de dos almas» queda como alternativa por su valor imagético.
  doctrine_reference: Santiago 1:8; 4:8
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con alta concordancia y sin revisiones aplicadas. La redacción española conserva la triple progresión del griego: acercarse a Dios, limpieza de manos y purificación del corazón, rematando con el vocativo que denuncia la división interior.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme a la directriz, sin introducir «Yahvé» porque el texto fuente griego no usa κύριος ni una cita explícita del nombre divino.
  - Se tradujo ἐγγίζω de forma consistente como «acercarse» para preservar el paralelismo verbal.
  - 'Se conservaron los dos mandatos distintos: «limpien» para καθαρίσατε y «purifiquen» para ἁγνίσατε.'
  - «Personas de doble ánimo» resuelve el vocativo plural de δίψυχοι en un español natural, mientras la nota preserva la lectura más literal.
