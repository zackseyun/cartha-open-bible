review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: la corrección contrastiva, la condición introducida por ἐάν, la dependencia de la vida y de las acciones de la voluntad del Señor, y la indefinición de «esto o aquello». Sin embargo, «En lugar de decir» no refleja plenamente la fuerza correctiva que el English POB explicitó como «Instead, you ought to say», y la nota al pie repite exactamente la redacción principal en vez de preservar la alternativa más literal con el sujeto implícito.'
  spanish_quality_summary: El español es claro y natural, pero la apertura «En lugar de decir» queda algo colgante en el flujo de la oración y menos idiomática que una formulación exhortativa explícita. «Si el Señor quiere» es perfectamente legible y digna; «haremos esto o aquello» también funciona bien.
  glossary_alignment: 'La terminología clave está bien alineada: κύριος → «Señor», no se sobreinterpreta el referente; θέλω se vierte de forma natural; ποιέω → «haremos»; no hay conflicto con los términos doctrinales del proyecto. No aplica aquí la política de «Yahvé», porque el texto fuente usa κύριος, no el nombre divino.'
  issues:
  - severity: medium
    issue: La frase inicial no comunica suficientemente la corrección exhortativa del contexto.
    rationale: Aunque ἀντὶ τοῦ λέγειν ὑμᾶς es literalmente «en lugar de decir ustedes», el English POB documentó y adoptó una explicitación idiomática correctiva. En español, «Más bien, deberían decir» refleja mejor ese valor sin apartarse del sentido fuente.
  - severity: medium
    issue: La nota al pie no preserva una alternativa útil y distinta.
    rationale: 'La nota dice «O, más literalmente: “en lugar de decir”», que repite la redacción principal y omite el sujeto implícito ὑμᾶς. Debe ofrecer una alternativa realmente literal, por ejemplo «en lugar de que ustedes digan» o «en lugar de decir ustedes».'
  revised_spanish_text: 'Más bien, deberían decir[a]: «Si el Señor quiere, viviremos y haremos esto o aquello».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «en lugar de que ustedes digan».'
    reason: lexical_alternative
