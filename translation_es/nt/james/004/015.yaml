translation:
  language: es
  text: 'Más bien, deberían decir[a]: «Si el Señor quiere, viviremos y haremos esto o aquello».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «en lugar de que ustedes digan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ τοῦ λέγειν ὑμᾶς
  english_pob_choice: Instead, you ought to say
  chosen_spanish: En lugar de decir
  alternatives_spanish:
  - En vez de decir
  - Más bien, digan
  lexicon: BDAG
  rationale: 'La construcción ἀντὶ τοῦ + infinitivo expresa sustitución: ''en lugar de decir''. En español, la corrección implícita se comunica con naturalidad sin añadir un verbo de obligación que el griego no explicita aquí.'
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - Dios
  lexicon: BDAG
  rationale: κύριος se traduce con el equivalente reverente 'Señor'. El texto griego no especifica otra identidad, así que se preserva la referencia abierta y la carga de autoridad divina.
- source_word: θελήσῃ
  english_pob_choice: wills
  chosen_spanish: quiere
  alternatives_spanish:
  - quiere así
  - lo quiere
  - determina
  lexicon: BDAG
  rationale: θέλω expresa voluntad; en español, 'quiere' es la forma más natural y fiel para esta cláusula condicional. 'Determina' o 'decreta' irían más allá de lo que el verbo requiere.
- source_word: ζήσομεν
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - seguiremos viviendo
  - viviremos todavía
  lexicon: BDAG
  rationale: El futuro indica que aun la continuación de la vida depende del querer del Señor. 'Viviremos' conserva la simplicidad y el alcance del futuro griego.
- source_word: ποιήσομεν
  english_pob_choice: and do
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos también
  - realizaremos
  - llevaremos a cabo
  lexicon: BDAG
  rationale: ποιέω es amplio ('hacer'). 'Haremos' es la equivalencia más directa y natural, sin cargar el verbo con un matiz más específico que el original no exige.
- source_word: τοῦτο ἢ ἐκεῖνο
  english_pob_choice: this or that
  chosen_spanish: esto o aquello
  alternatives_spanish:
  - esto o lo otro
  - una cosa u otra
  lexicon: BDAG
  rationale: La pareja demostrativa conserva el carácter indefinido de planes futuros. 'Esto o aquello' es idiomático en español y reproduce bien la amplitud de la expresión.
theological_decisions:
- issue: Dependencia humana de la voluntad del Señor
  english_pob_reading: If the Lord wills, we will live and do this or that.
  chosen_spanish_reading: Si el Señor quiere, viviremos y haremos esto o aquello.
  alternative_spanish_readings:
  - Si Dios quiere, viviremos y haremos esto o aquello.
  - Si el Señor lo permite, viviremos y haremos esto o aquello.
  rationale: La formulación preserva la idea de subordinación de los planes humanos a la voluntad del Señor, sin resolver indebidamente si el referente es el Padre, Jesús o una formulación más general. 'Si el Señor quiere' mantiene la tensión teológica del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Señor); preservar la tensión teológica sin resolver el referente más allá del griego.'
translation_notes:
  revision_awareness: Se corrigió la falta de anclaje de la nota al insertar [a] en el texto español. La redacción sigue el pasaje griego y el audit trail inglés, manteniendo la relación de sustitución de ἀντὶ τοῦ λέγειν y la dependencia condicional de la voluntad del Señor.
  spanish_consistency_notes:
  - Se emplea 'Señor' para κύριος conforme al criterio del proyecto.
  - Se mantiene 'esto o aquello' para el par indefinido τοῦτο ἢ ἐκεῖνο.
  - La cláusula condicional con 'Si' refleja Ἐὰν de manera natural en español.
  - No se añadió 'deberían' o 'deben', para no introducir obligación explícita ausente del griego.
