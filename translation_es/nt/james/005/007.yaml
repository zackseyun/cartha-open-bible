review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: exhortación a la paciencia hasta la venida del Señor, ejemplo del agricultor que espera el fruto valioso de la tierra, y referencia a la lluvia temprana y tardía. También mantiene correctamente «hermanos» para ἀδελφοί y «venida» para παρουσία. Sin embargo, «teniendo paciencia sobre él» no es español natural y suena como calco del inglés revisado, aunque intenta reflejar ἐπ’ αὐτῷ. Además, la nota [b] introduce una alternativa no preservada por la POB inglesa, mientras falta la nota léxica importante sobre «venida/presencia».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «sobre él» resulta poco idiomático en este contexto agrícola. «Con paciencia por él» o una reformulación semejante mejora mucho la legibilidad sin perder el sentido. También conviene alinear las notas con las decisiones auditadas: mantener la nota sobre «hermanos» y añadir la alternativa «presencia» para παρουσία; no hace falta una nota para «Miren».'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto salvo que «Señor» aquí traduce κύριος y no exige «Yahvé». «Hermanos» está bien conforme a la política de género-precisión. «Venida» para παρουσία está bien en el texto principal, con nota alternativa «presencia».
  issues:
