    issue: «teniendo paciencia sobre él» es un giro poco natural en español
    rationale: Aunque intenta seguir la revisión inglesa «over it», en español «sobre él» suena forzado y poco legible. El sentido de ἐπ’ αὐτῷ se puede conservar mejor con una formulación idiomática como «teniéndole paciencia» o «teniendo paciencia por él/cultivo».
  - severity: medium
    issue: Falta la nota sobre la alternativa léxica de παρουσία
    rationale: La POB inglesa documenta explícitamente la alternativa «presence». En español debería preservarse como nota en «venida» para mantener la trazabilidad léxica.
  - severity: low
    issue: La nota [b] sobre «Miren/vean» no corresponde a una nota preservada en el audit trail inglés
    rationale: No es errónea en sí, pero desplaza una nota más importante y añade complejidad innecesaria donde no hay nueva ambigüedad en español.
