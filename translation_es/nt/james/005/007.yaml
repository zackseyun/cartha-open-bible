translation:
  language: es
  text: 'Tengan paciencia[a], pues, hermanos, hasta la venida[b] del Señor. Miren: el labrador espera el precioso fruto de la tierra, teniéndole paciencia hasta que reciba la lluvia temprana y la tardía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y a menudo se dirige así a toda la comunidad creyente.
    reason: alternative_reading
  - marker: b
    text: O «presencia» para «venida» (παρουσία), aunque aquí probablemente se refiere a la futura venida del Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακροθυμήσατε
  english_pob_choice: Be patient
  chosen_spanish: Tengan paciencia
  alternatives_spanish:
  - Sean pacientes
  - Tengan longanimidad
  lexicon: BDAG
  rationale: El imperativo exhorta a una paciencia perseverante; «Tengan paciencia» es natural en español actual y conserva el valor exhortativo sin volver el tono arcaico. También deja visible la repetición de la raíz μακροθυμ- en la frase siguiente.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: pues
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto precedente. «Pues» funciona con fluidez en español bíblico moderno y mantiene la conexión argumentativa.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes
  lexicon: BDAG
  rationale: La forma vocativa masculina plural se traduce literalmente como «hermanos»; en el español eclesial estándar puede abarcar a toda la comunidad creyente, y la nota puede aclararlo.
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - llegada
  - presencia
  lexicon: BDAG
  rationale: En este contexto escatológico, «venida» comunica bien el sentido de παρουσία como evento futuro esperado. «Presencia» es posible léxicamente, pero menos natural aquí en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título reverencial habitual para κύριος cuando se refiere al Señor en este contexto. No hace falta sustituirlo por un término menos propio del registro bíblico.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren esto
  lexicon: BDAG
  rationale: Introduce un ejemplo ilustrativo y llama la atención del lector. «Miren» conserva el gesto deíctico sin el tono arcaico de «he aquí» o «mirad».
- source_word: γεωργὸς
  english_pob_choice: farmer
  chosen_spanish: labrador
  alternatives_spanish:
  - agricultor
  - campesino
  lexicon: BDAG
  rationale: «Labrador» es un equivalente natural y bíblicamente reconocible para el trabajador del campo. Es suficientemente general para el ejemplo, sin estrecharlo a una actividad agrícola específica.
- source_word: ἐκδέχεται
  english_pob_choice: waits for
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - permanece esperando
  lexicon: BDAG
  rationale: El verbo indica espera sostenida; «espera» es claro y natural en español. La idea de paciencia se conserva por el contexto y por la participación verbal posterior.
- source_word: τίμιον
  english_pob_choice: precious
  chosen_spanish: precioso
  alternatives_spanish:
  - valioso
  - de gran valor
  lexicon: BDAG
  rationale: «Precioso» reproduce bien el matiz de valor y aprecio del fruto. Mantiene el enlace semántico con la valoración del cultivo sin sobreexplicar.
- source_word: καρπὸν τῆς γῆς
  english_pob_choice: fruit of the earth
  chosen_spanish: fruto de la tierra
  alternatives_spanish:
  - producto de la tierra
  - cosecha de la tierra
  lexicon: BDAG
  rationale: Se conserva la imagen bastante literal del texto griego. «Fruto de la tierra» es comprensible en español y no restringe indebidamente la referencia a un cultivo particular.
- source_word: μακροθυμῶν
  english_pob_choice: being patient
  chosen_spanish: teniendo paciencia
  alternatives_spanish:
  - siendo paciente
  - mostrando paciencia
  lexicon: BDAG
  rationale: El participio retoma la raíz del imperativo inicial y describe el modo de esperar del labrador. «Teniendo paciencia» reproduce esa continuidad lexical y sugiere una acción sostenida.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - por él
  - a causa de él
  lexicon: BDAG
  rationale: La preposición expresa la paciencia ejercida respecto del fruto/cultivo. «Sobre él» refleja la decisión revisada del audit trail inglés y mantiene la referencia al objeto agrícola sin añadir interpretación extra.
- source_word: ἕως λάβῃ
  english_pob_choice: until it receives
  chosen_spanish: hasta que reciba
  alternatives_spanish:
  - hasta que reciba él
  - hasta recibir
  lexicon: BDAG
  rationale: En el contexto, el referente más coherente del sujeto implícito es el cultivo/la tierra que recibe la lluvia. El español permite mantener la misma ambigüedad funcional sin forzar un sujeto explícito.
- source_word: πρόϊμον καὶ ὄψιμον
  english_pob_choice: the early and late rains
  chosen_spanish: la lluvia temprana y la tardía
  alternatives_spanish:
  - las lluvias temprana y tardía
  - la lluvia de otoño y la de primavera
  lexicon: BDAG
  rationale: Los adjetivos se entienden de forma sustantivada para lluvias estacionales. «La lluvia temprana y la tardía» es claro en español y conserva el par agrícola tradicional sin añadir una glosa demasiado interpretativa.
theological_decisions:
- issue: Uso de ἀδελφοί como vocativo comunitario
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos y hermanas en la fe
  rationale: Se conserva la forma masculina plural del vocativo, tal como hace la POB inglesa, porque el griego dice literalmente «hermanos». El uso incluye a la comunidad creyente en el contexto sin neutralizar el dato formal del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: παρουσία τοῦ κυρίου en marco escatológico
  english_pob_reading: the coming of the Lord
  chosen_spanish_reading: la venida del Señor
  alternative_spanish_readings:
  - la presencia del Señor
  - la llegada del Señor
  rationale: «Venida» es la manera más natural de expresar la expectativa futura de παρουσία en este versículo. Evita reducirla a «presencia», que aunque posible, no comunica tan bien la dimensión de espera escatológica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que ajustó la relación de ἐπ’ αὐτῷ a «over it» por ser más natural. En español se reflejó como «sobre él», manteniendo la repetición de μακροθυμέω y la imagen agrícola sin perder la referencia al objeto esperado. También se preservó la decisión lexicográfica de παρουσία como «venida» en un contexto escatológico.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al uso bíblico habitual del español y en continuidad con la traducción inglesa auditada.
  - Se mantuvo «fruto de la tierra» para no estrechar indebidamente el término καρπός.
  - La repetición de la raíz de paciencia se preservó con «Tengan paciencia» / «teniendo paciencia».
  - La frase final conserva la ambigüedad funcional del sujeto de «reciba» sin añadir aclaraciones ajenas al texto.
