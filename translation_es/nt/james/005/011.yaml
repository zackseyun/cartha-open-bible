review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: μακαρίζομεν → «consideramos dichosos», ὑπομείναντας / ὑπομονήν → «han perseverado / perseverancia», y la cláusula final sobre el carácter del Señor está bien conservada. También sigue razonablemente el audit trail inglés al usar «propósito del Señor» para τὸ τέλος κυρίου. Sin embargo, hay un problema formal importante con las notas: el mismo marcador [a] se usa tanto en «Miren[a]» como en «propósito[a]», pero la nota solo corresponde a τὸ τέλος κυρίου y no a ἰδοὺ.'
  spanish_quality_summary: El español es claro y mayormente natural, pero requiere una pequeña corrección de anclaje de nota. Además, «Han oído de la perseverancia de Job» suena menos natural en español que «Han oído hablar de la perseverancia de Job» o «Han oído de la perseverancia de Job»; la primera opción es más fluida. «Miren» funciona, pero no necesita nota. El resto mantiene un tono moderno y digno.
  glossary_alignment: «Señor» para κύριος es defendible aquí porque la fuente inmediata es griega y no una aparición explícita del tetragrámaton; la decisión teológica ya está documentada. «Dichosos», «perseverancia», «compasivo» y «misericordioso» se alinean bien con las decisiones léxicas del proyecto. No hay conflicto terminológico mayor.
  issues:
  - severity: high
    issue: Marcador de nota reutilizado incorrectamente
    rationale: El marcador [a] aparece en «Miren[a]» y en «propósito[a]», pero solo hay una nota y su contenido corresponde a τὸ τέλος κυρίου. Las instrucciones exigen marcadores únicos y que cada nota esté anclada exactamente donde corresponde.
  - severity: medium
    issue: «Han oído de» suena poco idiomático en este contexto
    rationale: Aunque comprensible, en español bíblico natural «Han oído hablar de la perseverancia de Job» expresa mejor ἠκούσατε con objeto abstracto y evita una formulación algo forzada.
  revised_spanish_text: Miren, consideramos dichosos a los que han perseverado. Han oído hablar de la perseverancia de Job, y han visto el propósito[a] del Señor, que el Señor es muy compasivo y misericordioso.
  revised_footnotes:
  - marker: a
    text: 'O: «el final del Señor», «el desenlace del Señor» o «el propósito/resultado del Señor».'
    reason: alternative_reading
  revision_rationale: Se quitó el marcador de nota de «Miren» porque la nota no corresponde a ἰδοὺ. Se mantuvo la nota únicamente en «propósito», donde sí explica la ambigüedad de τὸ τέλος κυρίου. Además, se ajustó «Han oído de» a «Han oído hablar de» para mayor naturalidad en español sin cambiar el sentido.
