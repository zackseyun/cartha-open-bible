translation:
  language: es
  text: Miren, consideramos dichosos a los que han perseverado. Han oído hablar de la perseverancia de Job, y han visto el propósito[a] del Señor, que el Señor es muy compasivo y misericordioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el final del Señor», «el desenlace del Señor» o «el propósito/resultado del Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren, pues
  lexicon: BDAG
  rationale: ἰδοὺ funciona como partícula de llamada de atención. En español, «Miren» conserva la fuerza exhortativa y resulta natural y digna; «Vean» también es posible, pero aquí «Miren» suena más directo para el lector.
- source_word: μακαρίζομεν
  english_pob_choice: we count ... as blessed
  chosen_spanish: consideramos dichosos
  alternatives_spanish:
  - llamamos dichosos
  - contamos como benditos
  lexicon: BDAG
  rationale: El verbo expresa valorar o declarar a alguien bienaventurado. «Consideramos dichosos» mantiene el acto evaluativo sin reducirlo a un estado emocional y evita un calco rígido.
- source_word: τοὺς ὑπομείναντας
  english_pob_choice: those who have endured
  chosen_spanish: a los que han perseverado
  alternatives_spanish:
  - a los que han soportado
  - a los que han resistido
  lexicon: BDAG
  rationale: En este contexto de prueba y sufrimiento, ὑπομένω apunta a perseverar bajo presión. «Perseverado» comunica bien la constancia fiel; «soportado» o «resistido» serían posibles, pero suenan menos naturales aquí.
- source_word: ὑπομονὴν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - aguante
  - paciencia
  lexicon: BDAG
  rationale: En Santiago, ὑπομονή es la firme constancia bajo prueba. «Perseverancia» preserva ese sentido activo mejor que «paciencia», que en español puede sugerir solo espera pasiva.
- source_word: Ἰὼβ
  english_pob_choice: Job’s
  chosen_spanish: Job
  alternatives_spanish:
  - de Job
  lexicon: BDAG
  rationale: Se conserva el nombre propio en forma usual en español. En la frase, el genitivo se expresa naturalmente con «de Job».
- source_word: ἠκούσατε
  english_pob_choice: you have heard of
  chosen_spanish: Han oído de
  alternatives_spanish:
  - Han escuchado
  - Ustedes han oído
  lexicon: BDAG
  rationale: El aoristo se vierte de modo idiomático en español con perfecto para un conocimiento ya compartido. «Han oído de» mantiene el matiz de noticia o referencia recibida.
- source_word: τὸ τέλος κυρίου
  english_pob_choice: the Lord’s purpose
  chosen_spanish: el propósito del Señor
  alternatives_spanish:
  - el final del Señor
  - el desenlace del Señor
  - el propósito/resultado del Señor
  lexicon: BDAG
  rationale: τέλος puede significar fin, resultado, desenlace o propósito. Dado el contexto de Job y la lectura revisada del audit trail, «propósito» es la opción principal más natural en español, pero conserva la tensión interpretativa respecto al alcance exacto del término.
- source_word: εἴδετε
  english_pob_choice: you have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - han percibido
  lexicon: BDAG
  rationale: Como con «han oído», el aoristo se expresa en español con perfecto para indicar reconocimiento ya recibido. «Han visto» mantiene la imaginería concreta del texto.
- source_word: πολύσπλαγχνός
  english_pob_choice: very compassionate
  chosen_spanish: muy compasivo
  alternatives_spanish:
  - lleno de compasión
  - entrañablemente compasivo
  lexicon: BDAG
  rationale: Este adjetivo intensifica la compasión. «Muy compasivo» reproduce bien el valor de πολύ- sin volver la frase pesada o excesivamente interpretativa.
- source_word: οἰκτίρμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - lleno de misericordia
  lexicon: BDAG
  rationale: El término añade la idea de misericordia/piedad. «Misericordioso» preserva la distinción respecto de πολύσπλαγχνός y es una palabra natural y bíblicamente transparente en español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para el tetragrámaton, aquí el griego presenta κύριος de forma explícita y en el marco de una cita/adaptación sapiencial. Se mantiene «el Señor» para respetar el enunciado griego y la costumbre de la carta de Santiago, sin afirmar de manera automática una sustitución directa del nombre divino.
theological_decisions:
- issue: Sentido de τὸ τέλος κυρίου
  english_pob_reading: the Lord’s purpose
  chosen_spanish_reading: el propósito del Señor
  alternative_spanish_readings:
  - el final del Señor
  - el desenlace del Señor
  - el propósito/resultado del Señor
  rationale: La frase es interpretativamente difícil. «Propósito» sigue la revisión más reciente del audit trail inglés y evita una traducción mecánica de τέλος como «fin», que en español puede sonar a término temporal o incluso a finalización absoluta. Al mismo tiempo, no resuelve de forma excesiva el alcance exacto del vocablo, sino que mantiene la referencia a la acción intencional del Señor en la historia de Job.
  doctrine_reference: Translation philosophy §3 (preservar tensión teológica cuando el término es ambiguo)
translation_notes:
  revision_awareness: El texto inglés pasó de «outcome» a «purpose» en la revisión más reciente; la versión española sigue esa lectura principal con «propósito», pero conserva en nota las alternativas semánticas de τέλος para no cerrar indebidamente la ambigüedad. También se mantuvo la distinción entre compasión y misericordia en los dos adjetivos finales.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en esta cláusula, coherente con el texto griego y con la necesidad de distinguir el título explícito del posible trasfondo del nombre divino.
  - «Perseverancia» traduce ὑπομονή de forma consistente con el uso de Santiago y evita reducirlo a mera paciencia pasiva.
  - 'La pareja «muy compasivo y misericordioso» mantiene dos adjetivos diferenciados como en el griego: no se fusionan en un solo rasgo.'
  - «Miren» conserva el carácter exhortativo de ἰδοὺ sin sonar anticuado en español actual.
