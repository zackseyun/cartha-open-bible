revisions:
- from: Miren[a], consideramos dichosos a los que han perseverado. Han oído de la perseverancia de Job, y han visto el propósito[a] del Señor, que el Señor es muy compasivo y misericordioso.
  to: Miren, consideramos dichosos a los que han perseverado. Han oído hablar de la perseverancia de Job, y han visto el propósito[a] del Señor, que el Señor es muy compasivo y misericordioso.
  rationale: Se quitó el marcador de nota de «Miren» porque la nota no corresponde a ἰδοὺ. Se mantuvo la nota únicamente en «propósito», donde sí explica la ambigüedad de τὸ τέλος κυρίου. Además, se ajustó «Han oído de» a «Han oído hablar de» para mayor naturalidad en español sin cambiar el sentido.
  reviewer_model: gpt-5.4
