base_translation:
  language: en
  yaml_path: translation/nt/james/005/011.yaml
  text: Behold[a], we count those who have endured as blessed. You have heard of Job’s endurance, and you have seen the Lord’s purpose, that the Lord is very compassionate and merciful.
  footnotes:
