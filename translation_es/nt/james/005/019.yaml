translation:
  language: es
  text: Hermanos míos[a], si alguno entre ustedes se extravía[b] de la verdad y alguien lo hace volver[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas». El griego usa una forma masculina plural de tratamiento que puede incluir a toda la comunidad.
    reason: lexical_alternative
  - marker: b
    text: O «se desvía de la verdad» o «es engañado y se aparta de la verdad».
    reason: lexical_alternative
  - marker: c
    text: O «alguien lo trae de vuelta».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί μου
  english_pob_choice: My brothers
  chosen_spanish: Hermanos míos
  alternatives_spanish:
  - Hermanos y hermanas míos
  - Hermanos
  lexicon: BDAG
  rationale: Conservo la forma masculina plural de la vocación directa, que puede incluir a toda la comunidad, sin neutralizarla en el texto principal. En español, «Hermanos míos» es natural, digno y fiel al registro del original.
- source_word: ἐάν τις ἐν ὑμῖν
  english_pob_choice: if anyone among you
  chosen_spanish: si alguno entre ustedes
  alternatives_spanish:
  - si alguien entre ustedes
  - si alguno de ustedes
  lexicon: BDAG
  rationale: τις es indefinido singular; «alguno» mantiene bien el matiz y el tono condicional. «Entre ustedes» expresa el sentido local de ἐν ὑμῖν sin forzar una paráfrasis.
- source_word: πλανηθῇ
  english_pob_choice: wanders
  chosen_spanish: se extravía
  alternatives_spanish:
  - se desvía
  - anda extraviado
  - es engañado
  lexicon: BDAG
  rationale: La forma aorista pasiva admite tanto la idea de ser desviado como la de apartarse; en español, «se extravía» comunica bien el alejamiento de la verdad sin perder la ambigüedad entre extravío y engaño. Evito una solución demasiado interpretativa y conservo la tensión del griego.
- source_word: ἀπὸ τῆς ἀληθείας
  english_pob_choice: from the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - de la verdad
  - fuera de la verdad
  - alejado de la verdad
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo se expresa con naturalidad en español como «de». «La verdad» se mantiene sin precisar más allá del texto, aunque el contexto apunta a la verdad del evangelio.
- source_word: καὶ ἐπιστρέψῃ τις αὐτόν
  english_pob_choice: and someone turns him back
  chosen_spanish: y alguien lo hace volver
  alternatives_spanish:
  - y alguien lo vuelve atrás
  - y alguien lo trae de vuelta
  - y alguien lo restaura
  lexicon: BDAG
  rationale: ἐπιστρέφω aquí tiene el sentido de volver a encaminar o traer de regreso. «Lo hace volver» conserva el valor causativo y la imagen de retorno sin introducir un vocabulario eclesiástico más cargado que el del griego.
theological_decisions:
- issue: Lenguaje masculino en el vocativo y el pronombre objeto
  english_pob_reading: 'Retain masculine forms in the main text: ''brothers'' and ''him'''
  chosen_spanish_reading: Mantener el vocativo masculino «Hermanos míos» y el objeto singular masculino «lo» en el texto principal
  alternative_spanish_readings:
  - Hermanos y hermanas míos
  - si alguno entre ustedes se extravía ... y alguien lo/la hace volver
  - si alguno entre ustedes se extravía ... y alguien le hace volver
  rationale: El griego usa formas masculinas que pueden abarcar a toda la asamblea, pero el texto no adopta una reformulación inclusiva explícita. En español, el masculino plural conserva esa forma fuente y evita neutralizar indebidamente el address y el pronombre.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: 'Matiz de πλανηθῇ: extravío frente a engaño'
  english_pob_reading: 'Render with passive nuance: ''wanders'''
  chosen_spanish_reading: 'Traducir con una forma que conserve tanto el alejamiento como la posibilidad de engaño: «se extravía»'
  alternative_spanish_readings:
  - se desvía
  - es engañado
  - anda extraviado
  rationale: La morfología pasiva no debe borrarse, pero tampoco conviene cargar el verso con una explicación secundaria no explícita. «Se extravía» conserva la tensión entre apartarse y ser desviado, y queda bien para la continuidad del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «is led astray from the truth» a «wanders from the truth» para reflejar con más naturalidad la fuerza de πλανηθῇ. En español, la elección «se extravía» mantiene esa naturalidad y a la vez conserva el margen semántico entre extravío y engaño que el audit trail documenta.
  spanish_consistency_notes:
  - Se mantiene «Hermanos» para el vocativo masculino plural, coherente con la política POB de conservar la forma fuente en el texto principal.
  - Se evita «SEÑOR» o «Cristo» porque el verso no los contiene.
  - «Verdad» se deja sin especificación doctrinal añadida para no sobretraducir el sintagma ἀπὸ τῆς ἀληθείας.
  - El pronombre objeto singular masculino «lo» corresponde al αὐτόν del griego.
