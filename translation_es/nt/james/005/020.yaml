translation:
  language: es
  text: Sepa que el que hace volver a un pecador del error de su camino salvará su alma[a] de la muerte y cubrirá una multitud de pecados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida». El griego puede significar «alma» o «vida».
    reason: lexical_alternative
  - marker: b
    text: El pronombre «su» puede referirse al pecador que es hecho volver; algunos lo entienden como una referencia al que lo hace volver.
    reason: alternative_reading
lexical_decisions:
- source_word: γινωσκέτω
  english_pob_choice: let him know
  chosen_spanish: Sepa esto
  alternatives_spanish:
  - Que lo sepa
  - Debe saberlo
  - Sepa
  lexicon: BDAG
  rationale: 'El imperativo exhortativo de tercera persona se expresa en español de forma natural con una orden impersonal dirigida al lector: «Sepa esto». Conserva la fuerza exhortativa sin volverla innecesariamente rígida.'
- source_word: ὁ ἐπιστρέψας
  english_pob_choice: whoever turns ... back
  chosen_spanish: el que hace volver
  alternatives_spanish:
  - quien vuelve
  - quien hace retornar
  - el que convierte
  lexicon: BDAG
  rationale: ἐπιστρέφω aquí tiene sentido de restaurar o hacer volver a alguien del extravío. «El que hace volver» mantiene la acción de retorno sin introducir el matiz técnico de «convertir».
- source_word: ἁμαρτωλὸν
  english_pob_choice: a sinner
  chosen_spanish: a un pecador
  alternatives_spanish:
  - a un pecador
  - al pecador
  lexicon: BDAG
  rationale: El acusativo indefinido singular se conserva con «a un pecador», que en español suena natural y mantiene el valor genérico del griego.
- source_word: ἐκ πλάνης ὁδοῦ αὐτοῦ
  english_pob_choice: from the error of his way
  chosen_spanish: del error de su camino
  alternatives_spanish:
  - de la extraviación de su camino
  - de la vagancia de su camino
  - del extravío de su camino
  lexicon: BDAG
  rationale: πλάνη mezcla la idea de error y de extravío; ὁδός conserva la metáfora de conducta o trayectoria. «Del error de su camino» es una solución clara que retiene ambas dimensiones.
- source_word: σώσει
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - rescatará
  - preservará
  lexicon: BDAG
  rationale: El futuro de σῴζω se traduce con «salvará», que es la forma más directa y teológicamente adecuada en este contexto.
- source_word: ψυχὴν αὐτοῦ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su persona
  lexicon: BDAG
  rationale: ψυχή puede significar «alma» o «vida». Se mantiene «alma» para conservar la forma léxica y la gravedad del enunciado, sin cerrar la posibilidad de un sentido integral de vida.
- source_word: ἐκ θανάτου
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de la muerte
  - de la perdición
  lexicon: BDAG
  rationale: La preposición con θάνατος se vierte literalmente como «de la muerte». El texto no especifica el tipo de muerte, así que la traducción evita restringirla.
- source_word: καλύψει
  english_pob_choice: will cover
  chosen_spanish: cubrirá
  alternatives_spanish:
  - encubrirá
  - tapará
  lexicon: BDAG
  rationale: καλύπτω conserva el idiomático bíblico de «cubrir» pecados. «Cubrirá» mantiene esa resonancia sin explicitar más de lo que el texto dice.
- source_word: πλῆθος ἁμαρτιῶν
  english_pob_choice: a multitude of sins
  chosen_spanish: una multitud de pecados
  alternatives_spanish:
  - muchos pecados
  - gran cantidad de pecados
  lexicon: BDAG
  rationale: πλῆθος se traduce con «multitud» para mantener el registro elevado y el plural colectivo del griego. «Pecados» conserva el contenido moral del sustantivo.
theological_decisions:
- issue: Antecedente de αὐτοῦ en ψυχὴν αὐτοῦ
  english_pob_reading: The pronoun 'his' may refer to the sinner who is turned back; some understand it to refer to the one who turns him back.
  chosen_spanish_reading: «su» se deja sin precisar en el texto principal; puede referirse al pecador que vuelve o, menos probablemente, al que lo hace volver.
  alternative_spanish_readings:
  - su alma del pecador
  - su alma del que hace volver
  rationale: El griego admite más de un antecedente. La versión principal conserva la ambigüedad con «su alma» y la nota documenta las lecturas posibles, sin resolver la tensión más allá del alcance del texto.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en lugar de resolverla)
- issue: Sentido de ψυχή y θάνατος
  english_pob_reading: retain 'soul' and 'death' in broad terms
  chosen_spanish_reading: conservar «alma» y «muerte» en sentido amplio
  alternative_spanish_readings:
  - vida ... de la muerte
  - alma ... de la muerte espiritual
  - persona ... de la ruina
  rationale: El versículo puede implicar vida preservada, salvación espiritual o ambas cosas. La traducción no estrecha el alcance del texto con una interpretación doctrinal única.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y la auditoría inglesa POB. No se introdujeron revisiones adicionales; se preservan la ambigüedad de αὐτοῦ y el alcance amplio de ψυχή/θάνατος, con notas españolas equivalentes a las del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «alma» para ψυχή en concordancia con la decisión POB, con nota de alternativa «vida».
  - Se traduce ἐπιστρέφω con una expresión de retorno/restauración («hace volver») para evitar el tecnicismo de «convertir».
  - «Cubrirá una multitud de pecados» conserva el idiomático bíblico sin suavizar el plural colectivo del griego.
