translation:
  language: es
  text: Pero, sobre todo[a], mis hermanos, no juren, ni por el cielo ni por la tierra ni por ningún otro juramento. Más bien, que su sí sea sí y su no, no[b], para que no caigan bajo juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mis hermanos y hermanas’; el griego dice ‘hermanos’ y probablemente se dirige a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O ‘para que no caigan bajo condena’.
    reason: alternative_reading
lexical_decisions:
- source_word: Πρὸ πάντων
  english_pob_choice: above all
  chosen_spanish: sobre todo
  alternatives_spanish:
  - antes que todo
  - especialmente
  lexicon: BDAG
  rationale: La expresión marca prioridad o máxima importancia. «Sobre todo» comunica de manera natural en español esa fuerza enfática sin volver la frase rígida o literalista.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - mis hermanos en la fe
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego como el texto base, pero en español «mis hermanos» también puede abarcar a la comunidad creyente en general. La nota puede aclarar el alcance inclusivo.
- source_word: μὴ ὀμνύετε
  english_pob_choice: do not swear
  chosen_spanish: no juren
  alternatives_spanish:
  - no hagan juramentos
  - no prometan bajo juramento
  lexicon: BDAG
  rationale: Aquí el sentido es jurar o tomar juramentos, no usar lenguaje vulgar. «No juren» es breve, idiomático y mantiene la prohibición general.
- source_word: μήτε τὸν οὐρανὸν μήτε τὴν γῆν
  english_pob_choice: either by heaven or by earth
  chosen_spanish: ni por el cielo ni por la tierra
  alternatives_spanish:
  - ni el cielo ni la tierra
  - ni por el cielo ni por la tierra misma
  lexicon: BDAG
  rationale: La preposición implícita en español se expresa naturalmente con «por» para juramentos. Se preserva el paralelismo de los dos ámbitos creados invocados como garantía.
- source_word: μήτε ἄλλον τινὰ ὅρκον
  english_pob_choice: or by any other oath
  chosen_spanish: ni por ningún otro juramento
  alternatives_spanish:
  - ni por otro juramento
  - ni por cualquier otro juramento
  lexicon: BDAG
  rationale: «Ὅρκος» puede referirse al juramento mismo. «Juramento» evita ambigüedad y conserva la amplitud de la prohibición.
- source_word: ἤτω δὲ ὑμῶν τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ
  english_pob_choice: Instead, let your yes be yes and your no, no
  chosen_spanish: Más bien, que su sí sea sí y su no, no
  alternatives_spanish:
  - En cambio, que su sí sea sí y su no sea no
  - Más bien, sea su sí sí y su no no
  lexicon: BDAG
  rationale: Se conserva la forma proverbial y tersa del griego. «Más bien» recoge el contraste de δέ, y «que su sí sea sí y su no, no» mantiene la sobriedad y claridad del dicho.
- source_word: ἵνα μὴ ⸂ὑπὸ κρίσιν⸃ πέσητε
  english_pob_choice: so that you may not fall under judgment
  chosen_spanish: para que no caigan bajo juicio
  alternatives_spanish:
  - para que no caigan bajo condena
  - para que no caigan en juicio
  lexicon: BDAG
  rationale: «Κρίσις» se traduce por «juicio» para no estrechar indebidamente el sentido hacia condena final. «Caigan bajo juicio» conserva la imagen de «caer bajo» algo que los alcanza.
theological_decisions:
- issue: Alcance de ἀδελφοί en un destinatario eclesial mixto
  english_pob_reading: my brothers
  chosen_spanish_reading: mis hermanos
  alternative_spanish_readings:
  - mis hermanos y hermanas
  - hermanos y hermanas
  rationale: Se mantiene la forma masculina plural del original, sin neutralizarla en el texto principal. En español, como en el griego, puede funcionar representativamente para toda la comunidad creyente. La posible lectura inclusiva queda disponible en nota.
  doctrine_reference: 'Translation philosophy §4: gender-accurate over gender-neutral.'
- issue: Sentido de κρίσις en la cláusula final
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condena
  - condenación
  rationale: El término griego permite un sentido amplio de evaluación o juicio, no necesariamente la condena final. «Juicio» preserva mejor la tensión semántica y evita importar una especificación doctrinal más fuerte de la que el texto exige.
  doctrine_reference: Preservar la tensión léxica y no resolverla con una equivalencia más fuerte de lo que el griego garantiza.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. No se requieren cambios adicionales respecto del paso de revisión más reciente; se conserva la distinción entre juramento, el dicho proverbial sobre el sí/no, y la opción semántica amplia de κρίσις.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se mantuvo «juicio» en el texto principal para κρίσις y se reservó «condena» en nota como alternativa.
  - Se preservó la fórmula proverbial con repetición de «sí» y «no» sin expandirla innecesariamente.
  - El marcador de nota [a] aparece en el sustantivo de dirección comunitaria, y [b] en la cláusula final, según lo exige el anclaje textual.
