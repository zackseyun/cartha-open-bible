base_translation:
  language: en
  yaml_path: translation/nt/james/005/012.yaml
  text: But above all[a], my brothers, do not swear, either by heaven or by earth or by any other oath. Instead, let your yes be yes and your no, no[b], so that you may not fall under judgment.
  footnotes:
