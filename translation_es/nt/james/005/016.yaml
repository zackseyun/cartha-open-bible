translation:
  language: es
  text: Por tanto[a], confiesen sus pecados unos a otros y oren unos por otros, para que sean sanados. La oración de un justo es muy poderosa cuando actúa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La súplica de un justo tiene gran fuerza cuando actúa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  english_pob_choice: confess
  chosen_spanish: confiesen
  alternatives_spanish:
  - reconozcan abiertamente
  - admitan
  lexicon: BDAG
  rationale: El imperativo medio pide una confesión abierta; en español, «confiesen» comunica de forma natural y directa la acción recíproca y moral del contexto sin introducir un marco sacramental.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Conserva la relación inferencial con lo anterior y suena natural en español bíblico contemporáneo.
- source_word: ἀλλήλοις
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - entre unos y otros
  lexicon: BDAG
  rationale: Expresa la reciprocidad de manera idiomática en español y mantiene la mutualidad explícita del griego.
- source_word: τὰς ἁμαρτίας
  english_pob_choice: your sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - los pecados de ustedes
  - sus faltas
  lexicon: BDAG
  rationale: «Pecados» es el equivalente directo de ἁμαρτίας; el posesivo plural mantiene el sentido recíproco sin forzar una formulación más explicativa.
- source_word: εὔχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - hagan oración
  - recen
  lexicon: BDAG
  rationale: «Oren» es claro, breve y adecuado para la exhortación recíproca del verso.
- source_word: ὑπὲρ ἀλλήλων
  english_pob_choice: for one another
  chosen_spanish: unos por otros
  alternatives_spanish:
  - a favor de unos y otros
  - en favor de unos por otros
  lexicon: BDAG
  rationale: «Por» preserva la idea de intercesión y funciona con naturalidad en español.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce con claridad la cláusula de propósito o resultado.
- source_word: ἰαθῆτε
  english_pob_choice: you may be healed
  chosen_spanish: sean sanados
  alternatives_spanish:
  - sean curados
  - sean restaurados
  lexicon: BDAG
  rationale: «Sanados» preserva el sentido amplio de curación/restauración que el griego permite, sin restringirlo solo a lo físico o solo a lo espiritual.
- source_word: πολὺ ἰσχύει
  english_pob_choice: is very powerful
  chosen_spanish: Mucho puede
  alternatives_spanish:
  - es muy poderoso
  - tiene gran fuerza
  lexicon: BDAG
  rationale: La expresión griega comunica gran eficacia; «Mucho puede» reproduce bien la fuerza idiomática y evita sobreespecificar el matiz.
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la súplica
  - la petición
  lexicon: BDAG
  rationale: «Oración» es el equivalente más natural en español; conserva la amplitud semántica del término, y la nota permite recordar la alternativa más específica.
- source_word: δικαίου
  english_pob_choice: of a righteous person
  chosen_spanish: de un justo
  alternatives_spanish:
  - de una persona justa
  - de un hombre justo
  lexicon: BDAG
  rationale: «Justo» mantiene la sustantivación del adjetivo y suena bíblicamente natural en español; evita introducir una paráfrasis más larga.
- source_word: ἐνεργουμένη
  english_pob_choice: as it is at work
  chosen_spanish: cuando está en acción
  alternatives_spanish:
  - cuando actúa
  - en su obra
  - mientras opera
  lexicon: BDAG
  rationale: «Cuando está en acción» comunica la idea de eficacia operativa del participio sin caer en una construcción demasiado técnica o en una sola lectura (activa/pasiva).
theological_decisions:
- issue: 'La confesión en la comunidad: si implica confesión sacramental o mutua entre creyentes'
  english_pob_reading: mutual confession to one another
  chosen_spanish_reading: confesión mutua entre unos a otros
  alternative_spanish_readings:
  - confesión ante clérigos
  - confesión sacramental
  rationale: El dativo recíproco ἀλλήλοις exige reciprocidad. La traducción mantiene esa mutualidad y no añade un destinatario clerical que no aparece en el texto.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: El alcance de ἰαθῆτε en el contexto de enfermedad y pecado
  english_pob_reading: healed, preserving broad sense
  chosen_spanish_reading: sean sanados, preservando un sentido amplio
  alternative_spanish_readings:
  - sean curados físicamente
  - sean sanados espiritualmente
  rationale: El contexto inmediato incluye enfermedad, pero también pecado y restauración; «sanados» deja abierta la amplitud del texto sin reducirlo indebidamente.
  doctrine_reference: Translation philosophy §3
- issue: 'El referente de δικαίου: género gramatical versus fuerza genérica'
  english_pob_reading: righteous person
  chosen_spanish_reading: un justo
  alternative_spanish_readings:
  - una persona justa
  - un hombre justo
  rationale: Aunque el griego usa forma masculina singular, funciona genéricamente. «Un justo» conserva la sobriedad proverbial y no restringe el alcance a varones.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se atendió la validación anterior eliminando cualquier nota sin anclaje. Solo se incluye la nota [a], y aparece exactamente en el texto principal en el lugar correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, pero este versículo no la requiere explícitamente.
  - «Justo» se usa como sustantivo genérico para δικαίου, en línea con la política de género-accurate del proyecto.
  - «Sanados» conserva la amplitud de ἰαθῆτε sin fijarlo solo en curación física o espiritual.
  - La sintaxis española conserva la relación causal/purpose con «para que» y la inferencia con «Por tanto».
