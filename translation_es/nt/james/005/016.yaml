review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene la inferencia de οὖν, la mutualidad de ἀλλήλοις, la amplitud de ἰαθῆτε y la eficacia de la oración en la cláusula final. También conserva correctamente la nota alternativa para la frase difícil πολὺ ἰσχύει δέησις δικαίου ἐνεργουμένη.'
  spanish_quality_summary: 'El español es mayormente claro y natural, pero la frase final «cuando está en acción» suena algo mecánica y poco idiomática en registro bíblico contemporáneo. «Muy poderosa cuando actúa» expresa mejor la fuerza y operatividad del participio ἐνεργουμένη sin rigidez. La nota también conviene ajustarla por naturalidad: «tiene gran fuerza cuando actúa».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Pecados», «oren», «sanados» y «un justo» son aceptables en contexto. La decisión «un justo» es defendible en español proverbial, aunque menos explícita que el inglés inclusivo; no requiere adjudicación adicional.
  issues:
  - severity: medium
    issue: La expresión «cuando está en acción» para ἐνεργουμένη resulta poco idiomática en español.
    rationale: Aunque semánticamente cercana, suena calcada y menos natural que alternativas como «cuando actúa» o «al actuar», que preservan la idea de eficacia operativa documentada en el POB inglés.
  - severity: low
    issue: La nota al pie replica la misma formulación rígida «está en acción».
    rationale: La alternativa léxica debe sonar natural en español, especialmente porque su función es aclarar un matiz del original, no introducir una frase forzada.
  revised_spanish_text: Por tanto[a], confiesen sus pecados unos a otros y oren unos por otros, para que sean sanados. La oración de un justo es muy poderosa cuando actúa.
  revised_footnotes:
  - marker: a
    text: 'O: «La súplica de un justo tiene gran fuerza cuando actúa».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y el sentido del borrador, pero se mejora la naturalidad y precisión idiomática de la cláusula final. «Es muy poderosa» refleja bien πολὺ ἰσχύει en línea con el POB inglés, y «cuando actúa» comunica de forma más natural la fuerza operativa de ἐνεργουμένη que «cuando está en acción». La nota alternativa se ajusta en el mismo sentido.
