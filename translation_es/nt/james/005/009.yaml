  - severity: low
    issue: «Ante las puertas» es fiel pero menos idiomático que «a las puertas».
    rationale: El griego plural θυρῶν debe idealmente mantenerse. «A las puertas» conserva el plural y la idea idiomática de inminencia con mejor naturalidad en español eclesial amplio.
