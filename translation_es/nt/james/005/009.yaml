  glossary_alignment: No hay términos del glosario mayor en juego salvo la conservación de «hermanos» para ἀδελφοί, lo cual está correctamente alineado con el audit trail inglés y con la nota explicativa. «Juez» para κριτής y «juzgados» para κριθῆτε también están alineados. No hay conflicto con términos como Yahvé, Mesías, Espíritu, etc.
