translation:
  language: es
  text: No se quejen unos contra otros, hermanos[a], para que no sean juzgados. Miren, el Juez está a las puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Hermanos” traduce el griego adelphoi, que puede dirigirse colectivamente a los creyentes y, según el contexto, incluir también a las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ στενάζετε
  english_pob_choice: Do not grumble
  chosen_spanish: No se quejen
  alternatives_spanish:
  - No murmuren
  - No giman
  - No se lamenten
  lexicon: BDAG
  rationale: En este contexto, con κατ’ ἀλλήλων (“unos contra otros”), el verbo no describe solo un gemido interior, sino una queja resentida dirigida a otros. En español, “quejarse” comunica mejor esa censura interpersonal que “gemir”, que sería más literal pero menos natural aquí.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - hermanos en la fe
  lexicon: BDAG
  rationale: El vocativo plural masculino puede dirigirse a la comunidad cristiana mixta. Se conserva “hermanos” para mantener la forma gramatical del original; la inclusión de mujeres se explica en la nota, como en el audit trail inglés.
- source_word: κατ’ ἀλλήλων
  english_pob_choice: against one another
  chosen_spanish: unos contra otros
  alternatives_spanish:
  - unos a otros
  - entre sí
  - contra los demás
  lexicon: BDAG
  rationale: La preposición κατά con genitivo expresa oposición o hostilidad dirigida hacia otros. “Unos contra otros” preserva esa fuerza relacional mejor que fórmulas más neutras como “unos a otros”.
- source_word: κριθῆτε
  english_pob_choice: you may not be judged
  chosen_spanish: no sean juzgados
  alternatives_spanish:
  - no caigan bajo juicio
  - no sean condenados
  - no reciban juicio
  lexicon: BDAG
  rationale: El aoristo subjuntivo pasivo de κρίνω se traduce de manera natural por “ser juzgados”. “Condenados” sería más fuerte de lo que exige el verbo, así que se mantiene el sentido de juicio sin añadir el resultado.
- source_word: κριτὴς
  english_pob_choice: the Judge
  chosen_spanish: el Juez
  alternatives_spanish:
  - el juez
  lexicon: BDAG
  rationale: El sustantivo tiene fuerza titular y apunta al juez escatológico. En español, la mayúscula no es obligatoria, pero “el Juez” funciona como título y conserva la solemnidad del griego sin explicitar más de lo que el texto dice.
- source_word: πρὸ τῶν θυρῶν
  english_pob_choice: at the doors
  chosen_spanish: ante las puertas
  alternatives_spanish:
  - a las puertas
  - delante de las puertas
  - junto a las puertas
  lexicon: BDAG
  rationale: El plural θυρῶν se conserva como “puertas”. “Ante las puertas” mantiene la imagen de cercanía e inminencia sin reducir el plural a un singular idiomático; también suena natural en español bíblico actual.
- source_word: ἕστηκεν
  english_pob_choice: is standing
  chosen_spanish: está de pie
  alternatives_spanish:
  - está en pie
  - se encuentra de pie
  - permanece de pie
  lexicon: BDAG
  rationale: El perfecto de ἵστημι comunica un estado presente resultante de una acción completada. “Está de pie” expresa esa postura de presencia y disposición de manera viva y natural en español.
theological_decisions:
- issue: Referente de “el Juez”
  english_pob_reading: An eschatological divine judge, most naturally the Lord/Christ in context
  chosen_spanish_reading: Un juez escatológico divino, de forma más natural el Señor/Cristo en el contexto
  alternative_spanish_readings:
  - Dios como juez en sentido general
  rationale: El texto no identifica explícitamente al Juez; la traducción conserva esa tensión al decir solo “el Juez”. La nota puede sugerir el trasfondo escatológico sin resolver más de lo que el griego permite.
  doctrine_reference: Conservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el testimonio de traducción está en alto acuerdo y no requiere corrección adicional. Se ha mantenido la misma lectura básica, ajustando solo la formulación española para naturalidad y fidelidad al griego.
  spanish_consistency_notes:
  - Se mantiene “Juez” para el título escatológico, en consonancia con el valor titular del griego.
  - Se conserva la oposición interpersonal de κατ’ ἀλλήλων con “unos contra otros”, evitando suavizar el tono.
  - “Hermanos” se usa como vocativo comunitario, con nota explicativa de alcance inclusivo.
  - “Ante las puertas” preserva el plural del original y la idea de inminencia.
