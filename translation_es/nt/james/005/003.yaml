base_translation:
  language: en
  yaml_path: translation/nt/james/005/003.yaml
  text: Your gold and silver have rusted[a], and their corrosion will be evidence against you and will eat your flesh like fire[b]. You have stored up treasure in the last days.
  footnotes:
  - marker: a
    text: Or, 'their rust will be a witness against you.' The Greek can be rendered more literally with 'rust' and 'witness,' though 'corrosion' and 'evidence' better fit the metal imagery and modern English.
    reason: lexical_alternative
  - marker: b
    text: Or, 'You have stored up treasure like fire in the last days.' Some take 'like fire' with the final clause rather than with 'will eat your flesh.'
    reason: alternative_reading
