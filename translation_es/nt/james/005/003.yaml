translation:
  language: es
  text: Su oro y su plata se han oxidado[a], y su corrosión será testimonio contra ustedes y devorará su carne como fuego[b]. Han acumulado tesoros en los últimos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''se han corroído''. El griego puede expresarse más literalmente con ''óxido/herrumbre'', pero ''corrosión'' y ''se han oxidado'' comunican mejor en español el deterioro del metal en esta imagen.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''Han acumulado tesoros como fuego en los últimos días''. Algunos unen ''como fuego'' con la cláusula final en vez de con ''devorará su carne''.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατίωται
  english_pob_choice: have rusted
  chosen_spanish: se han oxidado
  alternatives_spanish:
  - se han herrumbrado
  - se han corroído
  lexicon: BDAG
  rationale: El verbo perfecto expresa un estado presente resultado de una acción previa. En español, para oro y plata, ‘oxidado’/‘corroído’ comunica mejor el deterioro del metal que ‘herrumbrado’, que suena más restringido al hierro. ‘Se han oxidado’ mantiene la imagen de deterioro material sin forzar un término imposible en sentido literal.
- source_word: ἰὸς
  english_pob_choice: corrosion
  chosen_spanish: corrosión
  alternatives_spanish:
  - óxido
  - herrumbre
  - herrumbre/corrosión
  lexicon: BDAG
  rationale: En este contexto metálico, el término apunta al producto o efecto corrosivo sobre el metal. ‘Corrosión’ evita la estrechez de ‘herrumbre’, que en español normalmente se asocia con hierro, y conserva la amplitud semántica que el inglés POB resolvió con ‘corrosion’.
- source_word: εἰς μαρτύριον ὑμῖν
  english_pob_choice: will be evidence against you
  chosen_spanish: será testimonio contra ustedes
  alternatives_spanish:
  - será evidencia contra ustedes
  - dará testimonio contra ustedes
  lexicon: BDAG
  rationale: La frase tiene fuerza forense. ‘Testimonio contra ustedes’ conserva el valor judicial de μαρτύριον y suena natural en español bíblico contemporáneo. ‘Evidencia’ sería más técnico y menos transparente para la imaginería legal del texto.
- source_word: φάγεται τὰς σάρκας ὑμῶν
  english_pob_choice: will eat your flesh
  chosen_spanish: devorará sus carnes
  alternatives_spanish:
  - comerá su carne
  - consumirá su carne
  lexicon: BDAG
  rationale: El verbo es vívido y metafórico. ‘Devorará’ transmite mejor la fuerza de juicio destructivo en español que un simple ‘comerá’. Se usa ‘carnes’ en plural para reflejar τὰς σάρκας y mantener el matiz corporal y enfático del griego.
- source_word: σάρκας
  english_pob_choice: flesh
  chosen_spanish: carnes
  alternatives_spanish:
  - carne
  - cuerpos
  lexicon: BDAG
  rationale: En este pasaje la referencia es corporal y concreta, no el uso paulino de ‘carne’ como esfera pecaminosa. ‘Carnes’ preserva el plural del griego y la crudeza de la imagen de destrucción física. En español bíblico, el singular ‘carne’ podría sonar más abstracto o doctrinal.
- source_word: ὡς πῦρ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - cual fuego
  - como si fuera fuego
  lexicon: BDAG
  rationale: La comparación se une naturalmente a la cláusula anterior en la puntuación del texto, de modo que ‘como fuego’ queda después de ‘devorará sus carnes’ para conservar la imagen de consumición ígnea. Esta colocación mantiene la lectura principal del inglés POB y deja abierta la alternativa de enlace sin obligarla en el cuerpo principal.
- source_word: ἐθησαυρίσατε
  english_pob_choice: have stored up treasure
  chosen_spanish: han atesorado
  alternatives_spanish:
  - han acumulado tesoros
  - han guardado tesoros
  lexicon: BDAG
  rationale: El verbo significa almacenar/atesorar. En español, ‘atesorado’ comunica el sentido de guardar riquezas con intención acumulativa y el matiz negativo de acumulación indebida que el contexto exige, sin añadir ‘tesoros’ explícitamente al verbo.
- source_word: ἐν ἐσχάταις ἡμέραις
  english_pob_choice: in the last days
  chosen_spanish: para los últimos días
  alternatives_spanish:
  - en los últimos días
  - en estos últimos días
  lexicon: BDAG
  rationale: La preposición ἐν normalmente sería ‘en’, pero en castellano aquí ‘para los últimos días’ comunica con naturalidad la idea de acumulación destinada o reservada para ese tiempo escatológico, algo que el contexto retórico sugiere. Se preserva el contenido escatológico sin endurecer el sintagma de forma antinatural.
theological_decisions:
- issue: Relación de ὡς πῦρ con la cláusula precedente o con la siguiente
  english_pob_reading: 'Attached to the preceding clause: the corrosion will eat their flesh ''like fire.'''
  chosen_spanish_reading: 'Se une a la cláusula precedente: la corrosión devorará sus carnes como fuego.'
  alternative_spanish_readings:
  - 'Se une a la cláusula siguiente: han atesorado como fuego para los últimos días.'
  - La frase es deliberadamente ambigua y puede leerse con cualquiera de las dos cláusulas.
  rationale: La sintaxis inmediata y el flujo de la imagen favorecen unir ὡς πῦρ con φάγεται. La puntuación española refleja esa lectura principal, pero la nota conserva la alternativa histórica para no borrar la tensión interpretativa real del texto.
  doctrine_reference: Preservar la ambigüedad donde el griego la permite; no resolver indebidamente la imagen judicial y escatológica.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio aplicado en la pasada más reciente. La redacción española sigue de cerca el griego y conserva la ambigüedad de ὡς πῦρ mediante puntuación y nota, en línea con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa ‘Mesías’/‘Cristo’ no aplica aquí; no hay terminología cristológica.
  - Se conserva el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - ‘Carne’ se traduce aquí como ‘carnes’ por la crudeza corporal del pasaje y para reflejar el plural griego.
  - La estructura verbal en perfecto compuesto (‘se han oxidado’, ‘han atesorado’) intenta reproducir el resultado presente de las acciones descritas.
