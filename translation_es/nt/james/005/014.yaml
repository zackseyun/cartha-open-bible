base_translation:
  language: en
  yaml_path: translation/nt/james/005/014.yaml
  text: Is anyone among you sick? Let him call for the elders of the church[a], and let them pray over him[b], anointing him with oil in the name of the Lord.
  footnotes:
  - marker: a
    text: Or 'Is anyone among you weak?' The Greek verb can denote weakness more broadly, but here likely refers to sickness in view of prayer, anointing with oil, and the healing context of the next verse.
    reason: lexical_alternative
  - marker: b
    text: The anointing with oil may be understood as medicinal, symbolic, or both; the text itself does not specify the mechanism.
    reason: cultural_note
