translation:
  language: es
  text: ¿Está alguno entre ustedes enfermo[a]? Que haga llamar a los ancianos de la iglesia, y que oren sobre él[b], ungiéndolo con aceite en el nombre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘¿Está alguno entre ustedes débil?’ El verbo griego puede indicar una debilidad más amplia, pero aquí probablemente se refiere a enfermedad a la luz de la oración, la unción con aceite y el contexto de sanidad del versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: La unción con aceite puede entenderse como medicinal, simbólica o ambas; el texto no especifica el mecanismo.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσθενεῖ
  english_pob_choice: is sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - débil
  - enfermo
  lexicon: BDAG
  rationale: En este contexto de llamar a los ancianos, orar y ungir con aceite, el sentido más probable es una dolencia física. En español, 'enfermo' comunica con naturalidad esa idea; 'débil' conservaría la amplitud léxica, pero aquí sería menos preciso en la escena inmediata.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - alguien
  - cualquiera
  lexicon: BDAG
  rationale: El indefinido griego tiene fuerza genérica. 'Alguno' funciona bien en una pregunta retórica y mantiene el carácter abierto del enunciado sin sobreespecificar.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su medio
  lexicon: BDAG
  rationale: Es la forma natural en español para expresar pertenencia o presencia dentro de la comunidad destinataria.
- source_word: προσκαλεσάσθω
  english_pob_choice: let him call for
  chosen_spanish: que llame
  alternatives_spanish:
  - que haga llamar
  - que convoque
  lexicon: BDAG
  rationale: El imperativo medio aoristo de tercera singular pide una traducción imperativa clara. En español, 'que llame' expresa bien la petición de que busque o mande a buscar a los ancianos.
- source_word: τοὺς πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los mayores
  lexicon: BDAG
  rationale: En el contexto de la iglesia, el término designa líderes reconocidos de la comunidad. 'Ancianos' es fiel y usual; 'presbíteros' sería más técnico, pero menos transparente para lectores generales.
- source_word: τῆς ἐκκλησίας
  english_pob_choice: of the church
  chosen_spanish: de la iglesia
  alternatives_spanish:
  - de la asamblea
  - de la congregación
  lexicon: BDAG
  rationale: '''Iglesia'' es el equivalente más natural y claro para ἐκκλησία en este contexto cristiano comunitario.'
- source_word: προσευξάσθωσαν
  english_pob_choice: let them pray
  chosen_spanish: que oren
  alternatives_spanish:
  - que hagan oración
  - que recen
  lexicon: BDAG
  rationale: El plural exhortativo se expresa de modo directo y natural con 'que oren'. 'Recen' puede sonar más limitado confesionalmente.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - por él
  - encima de él
  lexicon: BDAG
  rationale: La preposición con acusativo puede mantener la idea de oración dirigida 'sobre' la persona, como en el uso bíblico del contexto de sanidad.
- source_word: ἀλείψαντες
  english_pob_choice: anointing
  chosen_spanish: ungiéndolo
  alternatives_spanish:
  - untándolo
  - aplicándole aceite
  lexicon: BDAG
  rationale: '''Ungir'' conserva el valor verbal tradicional y bíblico del acto sin decidir de antemano si fue medicinal, simbólico o ambos. ''Untarlo'' sería más literal pero menos digno en español contemporáneo.'
- source_word: ἐλαίῳ
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con óleo
  - con aceite de oliva
  lexicon: BDAG
  rationale: '''Aceite'' es la equivalencia natural en español. ''Óleo'' suena más litúrgico y ''aceite de oliva'' añade una precisión que el texto no explicita.'
- source_word: ἐν τῷ ὀνόματι τοῦ κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - por la autoridad del Señor
  - en nombre del Señor
  lexicon: BDAG
  rationale: La fórmula fija se conserva en español como idiomática y teológicamente resonante. 'Señor' sigue la convención del proyecto para κύριος.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: El título κύριος se vierte 'Señor' por ser la forma bíblica y común en español. En este contexto cristiano, la referencia apunta naturalmente al Señor Jesús, aunque el texto mantiene el título sin explicitar el nombre.
theological_decisions:
- issue: Sentido de ἀσθενεῖ en el contexto
  english_pob_reading: physical sickness/illness is primary
  chosen_spanish_reading: enfermedad física es la lectura principal
  alternative_spanish_readings:
  - debilidad general
  - fragilidad espiritual
  rationale: La mención de ancianos, oración y unción con aceite, junto con el versículo siguiente sobre sanar/levantar al enfermo, inclina claramente el sentido hacia enfermedad corporal. Se conserva, sin embargo, la amplitud potencial del verbo en la elección léxica general del texto.
  doctrine_reference: Preservar la tensión semántica cuando exista; aquí el contexto inclina suficientemente la lectura principal sin necesidad de resolver toda posibilidad abstracta.
- issue: Función de la unción con aceite
  english_pob_reading: render neutrally as 'anointing him with oil' without specifying sacramental, symbolic, or medicinal function
  chosen_spanish_reading: ungere con aceite sin especificar su mecanismo
  alternative_spanish_readings:
  - acto medicinal
  - acto simbólico
  - rito sacramental
  rationale: El griego describe la acción pero no define su naturaleza teológica o médica. La traducción española conserva esa neutralidad para no introducir conclusiones denominacionales.
  doctrine_reference: No imponer una lectura doctrinal donde el original no la explicita.
- issue: Valor del mandato plural de orar
  english_pob_reading: let them pray
  chosen_spanish_reading: que oren
  alternative_spanish_readings:
  - que hagan oración
  - que intercedan
  rationale: El plural exhortativo se mantiene sin añadir especificaciones ausentes en el texto. 'Oren' comunica de forma breve la acción requerida por la comunidad.
  doctrine_reference: La traducción debe reflejar la acción comunitaria sin aumentar el contenido del mandato.
translation_notes:
  revision_awareness: La revisión más reciente indicó concordancia alta y no requirió cambios. Esta propuesta mantiene la misma lectura base del audit trail inglés, trasladándola a un español natural y fiel al contexto inmediato.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος conforme al criterio del proyecto y la fórmula bíblica española estándar.
  - Se prefiere 'ancianos' para πρεσβύτεροι por transparencia y uso eclesial amplio.
  - Se conserva la ambigüedad funcional de la unción con aceite sin interpretar el acto como sacramental, medicinal o solo simbólico.
  - El texto principal toma 'enfermo' como lectura contextual principal, pero la nota preserva la alternativa 'débil' porque el verbo griego tiene un rango semántico más amplio.
