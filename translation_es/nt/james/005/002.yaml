  text: Su riqueza se ha podrido, y sus ropas se han vuelto roídas por la polilla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλοῦτος
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - bienes
  - riqueza
  lexicon: BDAG
  rationale: πλοῦτος puede referirse a riqueza acumulada en general. En español, «riquezas» comunica mejor el plural colectivo implícito en el contexto de bienes materiales del rico que «riqueza» en singular abstracto.
- source_word: σέσηπεν
  english_pob_choice: has rotted
  chosen_spanish: se han podrido
  alternatives_spanish:
  - se ha podrido
  - están podridas
  - se han corrompido
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado resultante de un proceso completado. En español, «se han podrido» conserva la imagen física y el valor de resultado mejor que una simple descripción estática.
- source_word: ἱμάτια
  english_pob_choice: clothes
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  - vestiduras
  lexicon: BDAG
  rationale: ἱμάτια designa prendas de vestir en general. «Vestidos» es comprensible y natural en español bíblico moderno; «vestiduras» suena más solemne, pero menos transparente.
- source_word: σητόβρωτα
  english_pob_choice: moth-eaten
  chosen_spanish: roídos por la polilla
  alternatives_spanish:
  - comidos por la polilla
  - moteados por la polilla
  - apolillados
  lexicon: BDAG
  rationale: El compuesto indica literalmente algo devorado por polillas. «Roídos por la polilla» conserva la imagen concreta y evita la posible ambigüedad de «apolillados», que en español puede sonar más idiomático pero menos visualmente explícito.
- source_word: γέγονεν
  english_pob_choice: have become
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - han llegado a ser
  - han quedado
  - son
  lexicon: BDAG
  rationale: El perfecto de γίνομαι indica un estado resultante. «Se han vuelto» refleja ese cambio de condición de manera natural en español y mantiene la relación con el daño descrito por σητόβρωτα.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y ningún cambio necesario; este borrador conserva la misma imagen y fuerza aspectual del texto griego, ajustando solo la formulación española para naturalidad y transparencia.
  spanish_consistency_notes:
  - Se mantuvo la metáfora material de corrupción y deterioro sin suavizarla.
  - Se preservó el paralelismo entre riqueza y vestiduras como dos señales visibles de decadencia.
  - No se introdujeron términos eclesiásticos ni interpretativos ajenos al texto breve de James 5:2.
