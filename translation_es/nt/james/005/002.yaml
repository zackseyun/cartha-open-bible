review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: riqueza arruinada y ropa dañada por polillas. Sin embargo, hay dos desajustes léxicos importantes. Primero, πλοῦτος es singular; «riquezas» no es imposible, pero desplaza el sustantivo abstracto/colectivo del original y además entra en conflicto con «se han podrido», que en el borrador queda en plural. Segundo, ἱμάτια se expresa más naturalmente como «ropas» o «ropa» que como «vestidos», ya que «vestidos» en español moderno suele sugerir una prenda específica femenina. El perfecto de σέσηπεν / γέγονεν está bien representado con «se ha podrido» / «se han vuelto».'
  spanish_quality_summary: El texto es claro, pero «Sus riquezas se han podrido» suena menos natural por la discordancia conceptual con el singular griego y «sus vestidos» puede inducir una lectura demasiado estrecha. «Su riqueza se ha podrido, y sus ropas se han vuelto roídas por la polilla» suena más fiel y más idiomático en español general eclesial.
  glossary_alignment: No hay términos de glosario mayor implicados. La revisión propuesta mejora la correspondencia de πλοῦτος con «riqueza» y de ἱμάτια con «ropas», en línea con la filosofía de equivalencia óptima del English POB.
  issues:
  - severity: medium
    issue: «riquezas» para πλοῦτος
    rationale: El sustantivo griego está en singular y denota la riqueza acumulada como posesión/colectivo. «Riquezas» es posible, pero aquí «riqueza» preserva mejor la forma y la fuerza del original; además corrige la flexión verbal a singular para σέσηπεν.
  - severity: medium
    issue: «vestidos» para ἱμάτια
    rationale: Aunque puede entenderse, en español moderno «vestidos» suele referirse a una clase particular de prenda. ἱμάτια significa ropa/prendas de vestir en general; «ropas» comunica eso con más naturalidad y precisión.
  revised_spanish_text: Su riqueza se ha podrido, y sus ropas se han vuelto roídas por la polilla.
  revision_rationale: Se ajusta πλοῦτος al singular colectivo del original con «riqueza», se corrige la concordancia verbal correspondiente, y se reemplaza «vestidos» por «ropas» para reflejar mejor el sentido amplio de ἱμάτια en español natural. No se requieren notas al pie porque no hay ambigüedad nueva ni alternativa preservada en el expediente inglés.
