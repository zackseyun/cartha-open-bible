translation:
  language: es
  text: ¿Sufre alguno entre ustedes? Que ore. ¿Está alegre alguno? Que cante alabanzas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cante salmos»; el verbo griego puede referirse específicamente a cantar salmos o, de manera más amplia, a cantar alabanzas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κακοπαθεῖ
  english_pob_choice: is suffering
  chosen_spanish: sufre
  alternatives_spanish:
  - está sufriendo
  - padece
  - está en aflicción
  lexicon: BDAG
  rationale: κακοπαθέω expresa experimentar penuria, aflicción o sufrimiento. «Sufre» es natural en español y conserva la amplitud del término sin restringirlo a una causa específica.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - alguien
  - cualquiera
  lexicon: BDAG
  rationale: El indefinido singular mantiene el valor representativo del griego. «Alguno» funciona bien en la pregunta y permite conservar la forma singular exhortativa en la respuesta.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - entre vosotros
  - en medio de ustedes
  lexicon: BDAG
  rationale: La expresión sitúa a la persona dentro de la comunidad destinataria. «Entre ustedes» es natural, directo y fiel al sentido comunitario del griego.
- source_word: προσευχέσθω
  english_pob_choice: let him pray
  chosen_spanish: Que ore
  alternatives_spanish:
  - Que él ore
  - Que esa persona ore
  - Que rece
  lexicon: BDAG
  rationale: El imperativo de tercera persona singular se conserva con una exhortación singular en español. «Ore» es el verbo más habitual y adecuado para la acción dirigida a Dios en este contexto.
- source_word: εὐθυμεῖ
  english_pob_choice: is cheerful
  chosen_spanish: está alegre
  alternatives_spanish:
  - está contento
  - está de buen ánimo
  - está animado
  lexicon: BDAG
  rationale: εὐθυμέω describe estar de buen ánimo o con el corazón alegre. «Está alegre» comunica bien el contraste con el sufrimiento y mantiene un tono claro y sobrio.
- source_word: ψαλλέτω
  english_pob_choice: let him sing praise
  chosen_spanish: Que cante alabanzas
  alternatives_spanish:
  - Que cante salmos
  - Que entone alabanzas
  - Que haga música de alabanza
  lexicon: BDAG
  rationale: ψάλλω aquí apunta al canto dirigido a Dios. «Cante alabanzas» expresa el sentido devocional amplio sin imponer la lectura más restringida de «salmos», aunque esa posibilidad permanece implícita.
theological_decisions:
- issue: Exhortación singular genérica
  english_pob_reading: Retain singular exhortation with 'let him'
  chosen_spanish_reading: Mantener la exhortación singular con «Que ore» y «Que cante alabanzas»
  alternative_spanish_readings:
  - Que oren
  - Que canten alabanzas
  - Que esa persona ore
  rationale: El griego usa τις con imperativos en tercera persona singular; la forma es genérica, no masculina exclusiva. El español conserva esa estructura exhortativa singular para no diluir el matiz representativo del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de ψάλλω
  english_pob_reading: sing praise
  chosen_spanish_reading: cante alabanzas
  alternative_spanish_readings:
  - cante salmos
  - haga música
  - cante
  rationale: El contexto exhorta a una respuesta de adoración, no a una norma litúrgica específica. «Cante alabanzas» mantiene el valor de alabanza a Dios y deja abierta la posibilidad de un canto de salmos sin reducirlo únicamente a ellos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y la resolución auditada del POB en inglés: mantiene la estructura de pregunta-respuesta, conserva el singular genérico de las exhortaciones y resuelve ψαλλέτω con un equivalente amplio en español, dejando constancia de la alternativa más estrecha «cante salmos».'
  spanish_consistency_notes:
  - Se usó «ustedes» para un español neutral latinoamericano y eclesialmente amplio.
  - Se mantuvo el tono imperativo breve y paralelo de las dos cláusulas.
  - No se introdujo vocabulario tradicionalizante innecesario como «salmodiar» o «enaltecer», para respetar la claridad moderna del POB.
