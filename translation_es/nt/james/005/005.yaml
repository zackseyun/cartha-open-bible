translation:
  language: es
  text: Han vivido en lujo[a] sobre la tierra y se han entregado a la autoindulgencia[b][c]; han engordado sus corazones en un día de matanza[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han vivido en placer».
    reason: lexical_alternative
  - marker: b
    text: O «se han entregado a los placeres».
    reason: lexical_alternative
  - marker: c
    text: La imagen es de animales engordados antes de la matanza, con probable implicación de juicio inminente.
    reason: cultural_note
  - marker: d
    text: O «para el día de matanza».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτρυφήσατε
  english_pob_choice: have lived in luxury
  chosen_spanish: han vivido en lujo
  alternatives_spanish:
  - han vivido en placer
  - han vivido en deleites
  lexicon: BDAG
  rationale: τρυφάω expresa una vida de lujo y deleite, con carga moral de indulgencia. «Han vivido en lujo» conserva esa fuerza y suena natural en español.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: γῆ puede significar «tierra» o «tierra/terruño». Aquí, como en el inglés auditado, «sobre la tierra» conserva la referencia amplia y el tono de contraste con lo venidero.
- source_word: ἐσπαταλήσατε
  english_pob_choice: indulged yourselves
  chosen_spanish: se han entregado a los placeres
  alternatives_spanish:
  - se han dado a la autoindulgencia
  - han vivido en desenfreno
  lexicon: BDAG
  rationale: 'σπαταλάω intensifica la idea anterior: vida disipada, autoindulgente. «Se han entregado a los placeres» comunica esa complacencia excesiva en español sin perder del todo el matiz de reproche.'
- source_word: ἐθρέψατε
  english_pob_choice: have fattened
  chosen_spanish: han engordado
  alternatives_spanish:
  - han alimentado
  - han nutrido
  lexicon: BDAG
  rationale: Aunque τρέφω normalmente es «alimentar/nutrir», el contexto irónico apunta a engordar para el matadero. «Han engordado» preserva la imagen.
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus vidas interiores
  - ustedes mismos interiormente
  lexicon: BDAG
  rationale: La literalidad «sus corazones» mantiene la antropología bíblica y la imagen retórica; no se diluye en una paráfrasis explicativa.
- source_word: ἐν ἡμέρᾳ σφαγῆς
  english_pob_choice: in a day of slaughter
  chosen_spanish: en día de matanza
  alternatives_spanish:
  - para el día de matanza
  - en un día de matanza
  lexicon: BDAG
  rationale: La construcción conserva el griego sin explicitar en el texto principal el referente del juicio. «Matanza» reproduce la dureza de σφαγή mejor que un término más interpretativo.
theological_decisions:
- issue: Imagen del 'día de matanza'
  english_pob_reading: Retain the metaphor of impending slaughter/judgment without making the referent explicit in the main text.
  chosen_spanish_reading: Conservar la metáfora de la matanza inminente sin explicarla como juicio en el texto principal.
  alternative_spanish_readings:
  - hacer explícito el juicio divino
  - leer la frase como referencia directa al castigo de Dios
  rationale: La metáfora debe quedar visible y tensa, como en el griego y en el audit trail inglés. Explicarla en el cuerpo del texto iría más allá de lo que el versículo dice.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje fue confirmado como estable en el pase más reciente, con alta concordancia en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantiene «tierra» para γῆ y no se sustituye por un equivalente eclesiástico tradicional.
  - Se usa «corazones» de manera literal, conforme a la imagen bíblica y al audit trail inglés.
  - Se conserva la metáfora de matanza sin glosarla en el texto principal.
  - El registro evita calcos rígidos, pero no amplía el sentido más allá de la evidencia del griego.
