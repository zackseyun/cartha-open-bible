translation:
  language: es
  text: Ustedes condenaron, asesinaron al justo[a]. Él no les resiste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Justo». Algunos intérpretes ven aquí un posible eco de Jesús, «el Justo», aunque el contexto inmediato también admite a una persona justa representativa oprimida por los ricos.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «¿No les resiste él?». La cláusula puede leerse como una pregunta retórica con el sentido dado en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδικάσατε
  english_pob_choice: you condemned
  chosen_spanish: Condenaron
  alternatives_spanish:
  - Han condenado
  - Condenasteis
  - Los condenaron
  lexicon: BDAG; καταδικάζω
  rationale: El aoristo plural de segunda persona expresa una acción pasada y contundente. "Condenaron" reproduce el golpe judicial del verbo sin añadir perífrasis ni suavizar el juicio.
- source_word: ἐφονεύσατε
  english_pob_choice: you murdered
  chosen_spanish: asesinaron
  alternatives_spanish:
  - mataron
  - dieron muerte a
  - homicidaron
  lexicon: BDAG; φονεύω
  rationale: φονεύω puede implicar muerte violenta e injusta; en español "asesinaron" conserva mejor el peso moral de la acusación que el más neutro "mataron".
- source_word: τὸν δίκαιον
  english_pob_choice: the righteous one
  chosen_spanish: al justo
  alternatives_spanish:
  - al justo uno
  - al hombre justo
  - al inocente
  lexicon: BDAG; δίκαιος
  rationale: El sustantivo adjetival masculino singular se expresa de forma natural como "el justo" en español. Mantiene la ambigüedad entre una persona representativa y una posible alusión cristológica sin resolverla.
- source_word: οὐκ ἀντιτάσσεται ὑμῖν
  english_pob_choice: He does not resist you
  chosen_spanish: ¿No se les opone él?
  alternatives_spanish:
  - ¿No les resiste él?
  - Él no se les opone.
  - ¿No se resiste a ustedes?
  lexicon: BDAG; ἀντιτάσσομαι
  rationale: El griego puede leerse como pregunta retórica. En español, la forma interrogativa preserva mejor esa tensión que una declaración lisa; "se les opone" expresa el sentido de enfrentarse u oponerse. Se conserva el pronombre para reflejar el sujeto singular del texto.
theological_decisions:
- issue: Referente de "el justo"
  english_pob_reading: A representative righteous person oppressed by the rich, not explicitly a christological title in the main text.
  chosen_spanish_reading: Un justo representativo o un creyente justo oprimido por los ricos; no se afirma explícitamente como título cristológico en el texto principal.
  alternative_spanish_readings:
  - Una alusión velada a Jesús como "el Justo".
  - El inocente por excelencia.
  rationale: La forma singular puede ser representativa y el contexto inmediato denuncia a opresores ricos. La traducción conserva esa amplitud sin cerrar la posibilidad de una lectura cristológica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Fuerza de la cláusula final
  english_pob_reading: 'Declarative English rendering of a rhetorical Greek question: ''He does not resist you.'''
  chosen_spanish_reading: Se mantiene la pregunta retórica en español para respetar la forma y la fuerza del griego.
  alternative_spanish_readings:
  - Él no se les opone.
  - ¿No les resiste?
  rationale: Como el griego termina en interrogación, la traducción interrogativa preserva mejor la retórica del reproche. La opción declarativa queda como posibilidad interpretativa, pero no se adopta en el texto principal.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: El borrador inglés más reciente cambió «the righteous man» por «the righteous one» para rendir con más inmediatez τὸν δίκαιον. El español adopta una solución equivalente y más natural («al justo»), manteniendo la ambigüedad controlada del original y la pregunta retórica final como tal.
  spanish_consistency_notes:
  - Se usa «justo» como sustantivo adjetival masculino singular para τὸν δίκαιον, coherente con el valor del griego y con el ajuste reciente del audit trail inglés.
  - Se evita «SEÑOR» o términos eclesiásticos añadidos; el verso permanece judicial y acusatorio.
  - Se conserva la interrogación final para reflejar la puntuación del griego y la posibilidad retórica documentada en la auditoría inglesa.
