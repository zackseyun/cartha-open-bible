  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «al justo» es una buena solución para τὸν δίκαιον. «asesinaron» preserva bien φονεύω. «se les opone» es aceptable para ἀντιτάσσεται, pero para alinearse con la decisión POB auditada conviene «no les resiste» o «no se les opone» en forma declarativa. '
