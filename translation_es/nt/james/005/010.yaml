translation:
  language: es
  text: Hermanos[a], tomen a los profetas como ejemplo de sufrimiento y de paciencia, que hablaron en el nombre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino ἀδελφοί; en contexto, Santiago probablemente se dirige a toda la comunidad creyente, incluidas las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόδειγμα
  english_pob_choice: example
  chosen_spanish: ejemplo
  alternatives_spanish:
  - modelo
  - patrón
  lexicon: BDAG
  rationale: ὑπόδειγμα denota un ejemplo o modelo digno de imitación. «Ejemplo» comunica de modo natural la fuerza exhortativa del texto sin añadir una paráfrasis excesiva.
- source_word: λάβετε
  english_pob_choice: take
  chosen_spanish: tomen
  alternatives_spanish:
  - consideren
  - tomen como
  lexicon: BDAG
  rationale: El aoristo imperativo de λαμβάνω aquí funciona idiomáticamente con ὑπόδειγμα y el objeto directo. «Tomen» conserva la imagen verbal de tomar/recibir y en español suena natural en una exhortación.
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - hermanos
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino plural de forma transparente. En el contexto de la carta puede incluir a toda la comunidad creyente; esa amplitud se aclara en la nota, sin neutralizar el término base.
- source_word: κακοπαθίας
  english_pob_choice: suffering
  chosen_spanish: sufrimiento
  alternatives_spanish:
  - aflicción
  - penuria
  - dificultad
  lexicon: BDAG
  rationale: κακοπαθία se refiere a soportar padecimiento o penuria. «Sufrimiento» es amplio, claro y compatible con la pareja conceptual con μακροθυμία.
- source_word: μακροθυμίας
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - constancia
  - longanimidad
  - perseverancia
  lexicon: BDAG
  rationale: μακροθυμία suele expresar paciencia o paciencia perseverante ante pruebas o personas difíciles. «Paciencia» es la opción más natural y comunicativa en español; «longanimidad» sería más técnico y menos transparente.
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: BDAG
  rationale: Objeto directo explícito de la exhortación. Se traduce de forma directa y sin carga interpretativa adicional.
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - proclamaron
  lexicon: BDAG
  rationale: λαλέω es el verbo ordinario «hablar». «Hablaron» preserva la sencillez del griego sin importar un matiz más formal como «proclamaron».
- source_word: ἐν τῷ ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - por autoridad del Señor
  - en nombre del Señor
  lexicon: BDAG
  rationale: La expresión es una fórmula bíblica estable que indica representación y autoridad. Se mantiene el giro idiomático en español; «en nombre del Señor» es una alternativa equivalente si se prefiere una formulación más fluida.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: κύριος se traduce aquí por «Señor», siguiendo la convención bíblica para el título divino en la expresión fija «en el nombre del Señor». En la construcción española, el artículo no es necesario dentro de la frase preposicional.
theological_decisions:
- issue: Alcance del vocativo ἀδελφοί en una dirección eclesial
  english_pob_reading: Brothers in the main text, with inclusive force noted in a footnote
  chosen_spanish_reading: Hermanos en el texto principal, con posible inclusión de toda la comunidad explicada en nota
  alternative_spanish_readings:
  - Hermanos y hermanas
  - hermanos y hermanas en la comunidad
  rationale: Se conserva la forma masculina plural del original en el texto principal, por fidelidad morfosintáctica. La nota evita borrar la posible referencia amplia a la comunidad creyente, incluyendo mujeres, sin reemplazar el vocativo original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación sintáctica entre ὑπόδειγμα y los genitivos de cualidad
  english_pob_reading: take the prophets ... as an example of suffering and patience
  chosen_spanish_reading: tomen a los profetas como ejemplo de sufrimiento y de paciencia
  alternative_spanish_readings:
  - tomen como ejemplo a los profetas en sufrimiento y paciencia
  - tomen a los profetas como ejemplo en sufrimiento y paciencia
  rationale: El griego presenta a «los profetas» como el objeto que debe tomarse como ejemplo, y los genitivos especifican en qué aspecto son ejemplares. La traducción española conserva esa relación sin alterar el contenido ni desplazar el énfasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Expresión «en el nombre del Señor» como fórmula de autoridad divina
  english_pob_reading: in the name of the Lord
  chosen_spanish_reading: en el nombre del Señor
  alternative_spanish_readings:
  - por autoridad del Señor
  - en nombre del Señor
  rationale: La frase es una expresión bíblica convencional de representación y autoridad. Se preserva la fórmula idiomática para no diluir su resonancia textual ni su posible trasfondo cultual/missionero.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Coincide con el último pase revisado, que se mantuvo sin cambios tras el control de concordancia de alta similitud; no hubo revisiones aplicadas al versículo.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la expresión fija «en el nombre del Señor», coherente con el resto del proyecto cuando κύριος funciona como título divino o fórmula bíblica estable.
  - Se eligió «sufrimiento» y «paciencia» para reflejar la pareja semántica κακοπαθίας / μακροθυμίας sin sobreinterpretar los matices.
  - La puntuación y mayúsculas siguen el uso estándar del español bíblico contemporáneo.
