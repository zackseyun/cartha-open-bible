translation:
  language: es
  text: Tengan también ustedes paciencia; fortalezcan sus corazones[a], porque la venida del Señor se ha acercado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la presencia del Señor». El griego παρουσία puede significar «presencia» o «venida»; en este contexto se refiere a la llegada escatológica del Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακροθυμήσατε
  english_pob_choice: be patient
  chosen_spanish: Tengan paciencia
  alternatives_spanish:
  - Sean longánimes
  - Permanezcan pacientes
  lexicon: BDAG
  rationale: El imperativo exhorta a una perseverancia paciente ante la presión. «Tengan paciencia» comunica con naturalidad la idea de soportar con constancia sin volver demasiado técnico el mandamiento.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: también ustedes
  alternatives_spanish:
  - y ustedes
  - ustedes también
  lexicon: BDAG
  rationale: La construcción añade énfasis y enlaza a los lectores con el ejemplo anterior. «También ustedes» conserva ese valor enfático y suena natural en español.
- source_word: στηρίξατε
  english_pob_choice: strengthen
  chosen_spanish: fortalezcan
  alternatives_spanish:
  - afirmen
  - hagan firmes
  lexicon: BDAG
  rationale: El verbo puede significar fortalecer, afirmar o hacer firme. «Fortalezcan» comunica bien la idea de dar firmeza interior a los creyentes y se ajusta al paralelismo con «sus corazones».
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - su interior
  - su ser interior
  lexicon: BDAG
  rationale: Se mantiene la metáfora bíblica de «corazones», que en este contexto designa el centro de la voluntad y la firmeza interior. No se sustituye por una paráfrasis explicativa para no perder la imagen original.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de las exhortaciones. «Porque» es la equivalencia causal más clara y natural en español.
- source_word: ἡ παρουσία
  english_pob_choice: the coming
  chosen_spanish: la venida
  alternatives_spanish:
  - la presencia
  - la llegada
  lexicon: BDAG
  rationale: Aunque παρουσία puede significar «presencia», aquí el contexto es escatológico y apunta a la llegada futura del Señor. «La venida» conserva ese sentido de arribo y funciona bien en español bíblico contemporáneo.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Dueño
  - del Maestro
  lexicon: BDAG
  rationale: «Señor» mantiene el título cristológico usual y corresponde al uso del NT para Jesús en este contexto escatológico.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - ha llegado cerca
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante de cercanía ya establecido. «Se ha acercado» preserva ese matiz mejor que un simple «está cerca», sin sonar forzado en español.
theological_decisions:
- issue: Sentido de παρουσία en una exhortación escatológica
  english_pob_reading: the coming of the Lord
  chosen_spanish_reading: la venida del Señor
  alternative_spanish_readings:
  - la presencia del Señor
  rationale: En Santiago 5:7–8 el contexto es la expectativa del desenlace escatológico, no una mera presencia abstracta. Por eso se traduce como «venida», manteniendo el valor de llegada futura que la auditoría inglesa preserva.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: παρουσία'
- issue: Término cristológico κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En este contexto, «Señor» es la forma establecida y teológicamente adecuada para referirse a Jesús sin perder la carga reverencial del título.
  doctrine_reference: Project-level Spanish terminology defaults; NT usage of κύριος
translation_notes:
  revision_awareness: 'El texto sigue de cerca la auditoría inglesa aprobada sin cambios sustantivos: mantiene el imperativo exhortativo, la metáfora de «corazones» y la lectura escatológica de παρουσία, con una única nota alternativa para preservar la tensión léxica documentada entre «presencia» y «venida».'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al uso cristológico del NT.
  - Se conserva «corazones» como metáfora del centro interior, en lugar de una explicación interpretativa.
  - «Venida» se eligió para παρουσία por el contexto escatológico, pero la nota mantiene la alternativa «presencia».
  - «Se ha acercado» procura reflejar el aspecto perfectivo del griego sin sobrecargar el español.
