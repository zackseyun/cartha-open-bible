translation:
  language: es
  text: Ahora bien, ustedes los ricos, lloren, dando alaridos[a] por las miserias[b] que vienen sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aullando». El participio griego transmite un lamento fuerte y público.
    reason: lexical_alternative
  - marker: b
    text: O «calamidades» o «aflicciones» para «miserias».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγε νῦν
  english_pob_choice: Come now
  chosen_spanish: Vamos ahora
  alternatives_spanish:
  - Vamos pues
  - Oigan ahora
  - Vamos, pues, ahora
  lexicon: BDAG
  rationale: Es un marcador discursivo de llamado y amonestación; «Vamos ahora» conserva el impulso imperativo directo en español sin sonar arcaico.
- source_word: οἱ πλούσιοι
  english_pob_choice: you rich
  chosen_spanish: ustedes, los ricos
  alternatives_spanish:
  - los ricos
  - ricos
  - ustedes los ricos
  lexicon: BDAG
  rationale: El nominativo funciona como vocativo. «Ustedes, los ricos» mantiene la dirección a los oyentes y el tono profético abrupto.
- source_word: κλαύσατε
  english_pob_choice: weep
  chosen_spanish: lloren
  alternatives_spanish:
  - lloren de dolor
  - lloren amargamente
  - laméntense
  lexicon: BDAG
  rationale: El imperativo aoristo pide duelo visible. «Lloren» es natural y fuerte en español; «laméntense» también sería posible, pero pierde el matiz de llanto explícito.
- source_word: ὀλολύζοντες
  english_pob_choice: wailing
  chosen_spanish: lamentándose
  alternatives_spanish:
  - aullando
  - gimiendo
  - sollozando
  lexicon: BDAG
  rationale: El participio añade una intensificación de lamento audible y público. «Lamentándose» comunica el valor de duelo continuo y evita una imagen demasiado zoológica en español corriente.
- source_word: ἐπὶ ταῖς ταλαιπωρίαις ὑμῶν
  english_pob_choice: over the miseries
  chosen_spanish: por las miserias
  alternatives_spanish:
  - a causa de las miserias
  - sobre las miserias
  - ante las miserias
  lexicon: BDAG
  rationale: Con el dativo, ἐπί expresa la base u ocasión del lamento. En español, «por» reproduce bien el motivo del duelo sin forzar una posesión inexistente.
- source_word: ταλαιπωρίαις
  english_pob_choice: miseries
  chosen_spanish: miserias
  alternatives_spanish:
  - calamidades
  - aflicciones
  - angustias
  lexicon: BDAG
  rationale: El sustantivo denota desgracia y aflicción severa. «Miserias» preserva el peso acusatorio y coincide con el registro de la traducción inglesa auditada.
- source_word: ταῖς ἐπερχομέναις
  english_pob_choice: that are coming upon you
  chosen_spanish: que vienen sobre ustedes
  alternatives_spanish:
  - que están por venir sobre ustedes
  - que se acercan a ustedes
  - que vienen encima de ustedes
  lexicon: BDAG
  rationale: El participio presente indica miserias en proceso de llegada. «Que vienen sobre ustedes» refleja el movimiento de aproximación y la idea de juicio inminente.
theological_decisions:
- issue: Tono profético y alcance del destinatario
  english_pob_reading: A prophetic denunciation of wealthy people facing impending misery/judgment, without specifying whether they are believers or unbelievers beyond what the verse itself states.
  chosen_spanish_reading: Una denuncia profética dirigida a los ricos que anuncia miseria inminente, sin precisar aquí si son creyentes o incrédulos.
  alternative_spanish_readings:
  - Una condena exclusiva de ricos explotadores no creyentes
  - Una advertencia interna a miembros ricos de la comunidad cristiana
  rationale: El versículo nombra solo a «los ricos» y anuncia las miserias venideras. La traducción conserva esa tensión interpretativa sin resolverla más allá del texto.
  doctrine_reference: Mantener la tensión teológica sin importación doctrinal adicional.
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada: el giro se expresa como miserias que vienen sobre ustedes, no como posesión («sus miserias»), y se mantuvo la intensificación del participio griego con una expresión de lamento audible en español.'
  spanish_consistency_notes:
  - Se preserva el tratamiento vocativo directo de οἱ πλούσιοι con «ustedes, los ricos».
  - Se evitó «Señor» u otras sustituciones no pertinentes; no hay términos divinos en este versículo.
  - «Miserias» se mantiene como equivalente principal de ταλαιπωρίαις, coherente con el registro de denuncia profética.
  - La construcción «vienen sobre ustedes» refleja la revisada lectura auditada de ἐπὶ + dativo como afección que recae sobre el destinatario.
