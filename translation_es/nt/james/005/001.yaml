    rationale: En el texto, [a] aparece en «Vamos ahora[a]», pero el contenido de la nota trata de una alternativa para ὀλολύζοντες ('aullar'), no para Ἄγε νῦν. Esto rompe la trazabilidad léxica requerida.
  - severity: medium
    issue: «Vamos ahora» no suena natural como equivalente de Ἄγε νῦν en español bíblico claro.
    rationale: Aunque intenta reflejar el llamado discursivo, en español suena como invitación inclusiva a moverse, no como marcador de denuncia profética. «Ahora bien» funciona mejor idiomáticamente.
  - severity: medium
    issue: «lamentándose» debilita la intensidad de ὀλολύζοντες.
    rationale: El participio griego expresa lamento fuerte, audible y público. «Lamentándose» resulta demasiado suave y reflexivo; «dando alaridos» conserva mejor la fuerza sin caer en una imagen animalística.
