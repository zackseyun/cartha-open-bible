translation:
  language: es
  text: Miren[a], el salario de los trabajadores que cosecharon sus campos y que ha sido retenido por ustedes clama, y los clamores de los que cosecharon han entrado en los oídos de Yahvé de los Ejércitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡He aquí!».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el Señor Sabaot». El griego conserva Σαβαώθ, título hebreo tradicional que algunas versiones transliteran.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren ustedes!
  - ¡Fíjense!
  - ¡He aquí!
  lexicon: BDAG
  rationale: La interjección introduce una llamada enfática de atención. «¡Miren!» comunica bien el impulso exhortativo sin el tono más arcaico de «He aquí».
- source_word: μισθὸς
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - jornal
  - remuneración
  lexicon: BDAG
  rationale: Aquí se trata de la compensación debida a obreros. «Salario» es claro y natural en español; conserva la idea de paga debida, aunque el sustantivo griego sea singular colectivo.
- source_word: ἐργατῶν
  english_pob_choice: workers
  chosen_spanish: trabajadores
  alternatives_spanish:
  - obreros
  - jornaleros
  - labradores
  lexicon: BDAG
  rationale: Designa a quienes realizan el trabajo. «Trabajadores» es amplio, claro y adecuado; «obreros» o «jornaleros» sería más específico, pero el contexto no obliga a restringirlo.
- source_word: ἀμησάντων
  english_pob_choice: harvested
  chosen_spanish: que segaron
  alternatives_spanish:
  - que cosecharon
  - que recolectaron
  - que miesaron
  lexicon: BDAG
  rationale: El verbo apunta a segar o cosechar grano. «Segaron» preserva con más precisión la imagen agrícola de corte/recolección que un genérico como «cosecharon».
- source_word: χώρας
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - parcelas
  - terrenos
  lexicon: BDAG
  rationale: En este contexto se refiere a tierras cultivadas. «Campos» es la equivalencia natural y bíblica en español, sin perder el sentido agrario.
- source_word: ἀφυστερημένος ἀφ’ ὑμῶν
  english_pob_choice: which have been withheld by you
  chosen_spanish: que ha sido retenido por ustedes
  alternatives_spanish:
  - que ustedes han retenido
  - que les ha sido quitado
  - que fue defraudado por ustedes
  lexicon: BDAG
  rationale: El participio pasivo expresa algo retenido injustamente. «Ha sido retenido por ustedes» conserva la voz y la acusación implícita sin ir más allá a «defraudado», que sería más interpretativo.
- source_word: κράζει
  english_pob_choice: cry out
  chosen_spanish: clama
  alternatives_spanish:
  - está clamando
  - grita
  - pide justicia
  lexicon: BDAG
  rationale: El verbo singular intensifica la personificación del salario retenido. «Clama» reproduce esa fuerza de manera sobria y bíblica en español.
- source_word: βοαὶ
  english_pob_choice: cries
  chosen_spanish: los clamores
  alternatives_spanish:
  - los gritos
  - los lamentos
  - las voces
  lexicon: BDAG
  rationale: El plural expresa gritos de reclamo o auxilio. «Clamores» mantiene el registro solemne y la intensidad retórica.
- source_word: θερισάντων
  english_pob_choice: those who harvested
  chosen_spanish: de los que cosecharon
  alternatives_spanish:
  - de los segadores
  - de los cosechadores
  - de los que segaron
  lexicon: BDAG
  rationale: El participio se refiere a quienes realizaron la cosecha. «Los que cosecharon» es natural y conserva la relación participial sin sobrecargar el español.
- source_word: εἰς τὰ ὦτα
  english_pob_choice: into the ears
  chosen_spanish: a los oídos
  alternatives_spanish:
  - hasta los oídos
  - dentro de los oídos
  lexicon: BDAG
  rationale: La frase semítica puede conservarse literal, pero en español «a los oídos» transmite el destino del clamor con naturalidad, sin añadir una rareza innecesaria.
- source_word: Κυρίου Σαβαὼθ
  english_pob_choice: the Lord of Hosts
  chosen_spanish: el Señor de los ejércitos
  alternatives_spanish:
  - el Señor de los ejércitos celestiales
  - el Señor Sabaot
  lexicon: BDAG
  rationale: El título divino traduce Σαβαώθ por su sentido tradicional de «hosts/armies». «Señor de los ejércitos» conserva el valor del título y resulta transparente en español.
- source_word: εἰσεληλύθασιν
  english_pob_choice: have entered
  chosen_spanish: han llegado
  alternatives_spanish:
  - han entrado
  - han llegado hasta
  - han penetrado
  lexicon: BDAG
  rationale: El perfecto marca llegada con efecto vigente. «Han llegado» comunica el resultado del clamor de forma fluida en español; aunque «han entrado» sea más literal, aquí «han llegado» evita dureza y conserva la imagen de acceso al oído divino.
theological_decisions:
- issue: Título divino Κυρίου Σαβαὼθ
  english_pob_reading: the Lord of Hosts
  chosen_spanish_reading: el Señor de los ejércitos
  alternative_spanish_readings:
  - el Señor Sabaot
  - el Señor de los ejércitos celestiales
  rationale: Se traduce el título por su sentido, siguiendo el principio de transparentar títulos divinos. «Señor de los ejércitos» preserva la carga veterotestamentaria y evita una transliteración opaca en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. κύριος → Señor.'
- issue: Personificación del salario retenido que clama
  english_pob_reading: which have been withheld by you, cry out
  chosen_spanish_reading: que ha sido retenido por ustedes, clama
  alternative_spanish_readings:
  - que ustedes han retenido, clama
  - que ha sido defraudado por ustedes, clama
  rationale: La forma pasiva mantiene el énfasis en la injusticia objetiva del salario retenido. «Clama» conserva la personificación sin convertirla en una explicación moralizante.
  doctrine_reference: Santiago 5:4; injusticia económica y clamor por justicia
- issue: Imagen de «entrado en los oídos»
  english_pob_reading: have entered into the ears
  chosen_spanish_reading: han llegado a los oídos
  alternative_spanish_readings:
  - han entrado en los oídos
  - han llegado hasta los oídos
  rationale: La imagen semítica se mantiene en su fuerza, pero en español la locución «han llegado a los oídos» expresa con claridad que el clamor ha alcanzado a Dios. No se borra la metáfora, solo se la hace idiomática.
  doctrine_reference: Retórica semítica; salmos y literatura profética
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y toma en cuenta la revisión inglesa más reciente, que hizo más directo el verbo singular de clamor y simplificó la referencia a quienes cosecharon. En español se mantuvo esa direccionalidad, pero se optó por un equivalente natural: «clama» / «han llegado» en vez de un calco más rígido.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según el patrón doctrinal, y «ejércitos» para Σαβαώθ por su sentido titular.
  - Se traduce el lenguaje agrícola con verbos concretos («segaron», «cosecharon») sin introducir tecnicismos innecesarios.
  - La personificación del salario se conserva como recurso retórico y teológico, no se suaviza a una simple acusación legal.
