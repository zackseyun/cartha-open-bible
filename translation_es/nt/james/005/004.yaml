revisions:
- from: ¡Miren[a]! El salario de los trabajadores que segaron sus campos, y que ha sido retenido por ustedes, clama, y los clamores de los que cosecharon han llegado a los oídos del Señor de los ejércitos.
  to: Miren[a], el salario de los trabajadores que cosecharon sus campos y que ha sido retenido por ustedes clama, y los clamores de los que cosecharon han entrado en los oídos de Yahvé de los Ejércitos[b].
  rationale: Se revisa para ajustarse mejor al griego y a la terminología obligatoria del proyecto. «Yahvé de los Ejércitos» refleja el título divino con el nombre propio exigido por la guía; se añade nota con la forma tradicional transliterada. «Han entrado en los oídos» preserva la metáfora verbal de εἰσεληλύθασιν. También se pule la puntuación y se unifica «cosecharon» para mayor cohesión.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: llamado de atención, salario retenido que clama, y clamores que llegan a los oídos divinos. Sin embargo, hay dos desajustes importantes con la evidencia fuente y las normas del proyecto: (1) Κυρίου Σαβαώθ no debe quedar como «el Señor de los ejércitos» en el texto principal bajo la terminología española del proyecto, sino «Yahvé de los Ejércitos» cuando κύριος representa el nombre divino en este título veterotestamentario; (2) εἰσεληλύθασιν se acerca más a «han entrado» que a «han llegado», ya que el inglés auditado preserva explícitamente la metáfora de entrada. Además, conviene quitar la coma innecesaria antes de «y que ha sido retenido» para evitar una pausa poco natural.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «¡Miren!» funciona bien para ἰδού, aunque en contexto epistolar «Miren» sin signos de exclamación también sería suficiente; no es un problema mayor. «Segaron» y luego «cosecharon» dentro del mismo versículo introduce una leve inconsistencia estilística, pero ambas opciones son legítimas. La frase «han llegado a los oídos» es idiomática, pero pierde parte de la imagen verbal que el texto fuente y el POB inglés decidieron conservar. La puntuación puede pulirse.
  glossary_alignment: Alineación parcial. Se respetan bien «salario», «trabajadores», «campos», «clama». Pero el borrador incumple la directriz principal de יהוה/YHWH -> «Yahvé» al traducir Κυρίου Σαβαώθ como «el Señor de los ejércitos» sin explicar que aquí κύριος funciona dentro de un título heredado del AT que remite al nombre divino. Debe reflejarse como «Yahvé de los Ejércitos» en el texto principal, con nota para la opción tradicional «el Señor Sabaot» o similar.
  issues:
  - severity: high
    issue: Título divino «Κυρίου Σαβαώθ» traducido como «el Señor de los ejércitos»
    rationale: Las normas del proyecto exigen «Yahvé» en el texto principal cuando κύριος representa o incorpora el nombre divino en una fórmula veterotestamentaria. Aquí el trasfondo es inequívocamente el título divino «YHWH Sabaot».
  - severity: medium
    issue: «han llegado a los oídos» debilita la imagen de εἰσεληλύθασιν
    rationale: El verbo perfecto «han entrado» fue conservado deliberadamente en el POB inglés para mantener la metáfora de entrada «en los oídos». En español «han entrado en los oídos» es suficientemente claro y más fiel.
  - severity: low
    issue: Coma innecesaria antes de «y que ha sido retenido»
    rationale: La oración relativa especificativa no requiere esa pausa; sin coma fluye mejor y evita segmentar de modo artificial el sujeto complejo.
  - severity: low
    issue: Leve inconsistencia entre «segaron» y «cosecharon»
    rationale: No es error semántico, pero usar la misma familia léxica en ambas participiales da mayor cohesión al versículo.
  revised_spanish_text: Miren[a], el salario de los trabajadores que cosecharon sus campos y que ha sido retenido por ustedes clama, y los clamores de los que cosecharon han entrado en los oídos de Yahvé de los Ejércitos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «¡He aquí!».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el Señor Sabaot». El griego conserva Σαβαώθ, título hebreo tradicional que algunas versiones transliteran.'
    reason: alternative_reading
  revision_rationale: Se revisa para ajustarse mejor al griego y a la terminología obligatoria del proyecto. «Yahvé de los Ejércitos» refleja el título divino con el nombre propio exigido por la guía; se añade nota con la forma tradicional transliterada. «Han entrado en los oídos» preserva la metáfora verbal de εἰσεληλύθασιν. También se pule la puntuación y se unifica «cosecharon» para mayor cohesión.
