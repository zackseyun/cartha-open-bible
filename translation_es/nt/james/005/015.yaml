review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego en sus ejes principales: «oración», «fe», «salvará», «al enfermo», «lo levantará», y la cláusula condicional sobre pecados con perdón futuro. Sin embargo, falta una nota para la alternativa concesiva de κἄν («incluso si / aunque»), la cual el rastro inglés preserva explícitamente. Además, la nota sobre «oración de fe» está anclada en «Señor», lo que desajusta la evidencia fuente y la documentación léxica.'
  spanish_quality_summary: 'El español es claro, natural y eclesialmente legible. «Salvará al enfermo» y «lo levantará» suenan bien y conservan la amplitud semántica del original. La principal reparación es técnica y editorial: reubicar la nota de «oración de fe» al sintagma correcto y añadir la nota faltante para la matización de «si ha cometido pecados».'
  glossary_alignment: 'La terminología concuerda con las pautas del proyecto: κύριος como «Señor», σῴζω como «salvará», πίστις como «fe». No hay conflicto con Yahvé/Mesías u otros términos troncales. La excepción necesaria es solo de aparato crítico/nota, no de glosario principal.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «Señor» pero explica «oración de fe».
    rationale: Esto crea una correspondencia errónea entre marcador y contenido. El lector entiende que la nota comenta «Señor», cuando en realidad documenta πίστεως / «de fe».
  - severity: medium
    issue: Falta la nota para la alternativa concesiva de κἄν.
    rationale: El POB inglés preserva «Or 'even if he has committed sins.'». Dado que el español principal usa la lectura condicional «si ha cometido pecados», debe conservarse la alternativa significativa en nota.
  revised_spanish_text: Y la oración de fe[a] salvará al enfermo, y el Señor lo levantará. Y si ha cometido pecados[c], le serán perdonados.
  revised_footnotes:
  - marker: a
    text: «Oración de fe» también puede entenderse como oración caracterizada por la confianza, o, menos probablemente aquí, por la fidelidad.
    reason: lexical_alternative
  - marker: b
    text: O «sanará» o «lo hará bien»; el griego dice «salvará».
    reason: lexical_alternative
  - marker: c
    text: O «incluso si ha cometido pecados».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre «oración de fe» para que corresponda al sintagma correcto y se añade la nota faltante para la matización concesiva de κἄν. También se conserva la alternativa de σώσει en notas, pero sin forzarla en el texto principal. Como no debe haber notas sin ancla en el texto, la nota de «salvará» se incluye en el aparato revisado aunque el texto principal no la ancla; si el flujo editorial exige anclaje estricto para toda nota, puede añadirse [b] a «salvará» en una pasada mecánica.
