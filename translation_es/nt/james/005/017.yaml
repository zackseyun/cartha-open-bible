translation:
  language: es
  text: Elías era un hombre con una naturaleza semejante a la nuestra[a], y oró con fervor para que no lloviera, y no llovió en la tierra durante tres años y seis meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Elías era un hombre como nosotros»; o: «Elías tenía los mismos sentimientos o pasiones que nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: Nombre propio bíblico
  rationale: Se translitera al equivalente español estándar del nombre del profeta. En español, 'Elías' es la forma natural y reconocible, sin perder la referencia al personaje bíblico.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - una persona
  lexicon: BDAG
  rationale: El término presenta a Elías como un ser humano ordinario. 'Un hombre' conserva la concreción y el rasgo masculino explícito del texto.
- source_word: ὁμοιοπαθὴς ἡμῖν
  english_pob_choice: with a nature like ours
  chosen_spanish: con una naturaleza semejante a la nuestra
  alternatives_spanish:
  - como nosotros
  - con las mismas pasiones que nosotros
  - de la misma condición que nosotros
  lexicon: BDAG
  rationale: La expresión griega puede abarcar la condición humana compartida y no solo los sentimientos. 'Naturaleza semejante' preserva esa amplitud sin reducirla a emociones ni volverla demasiado técnica.
- source_word: προσευχῇ προσηύξατο
  english_pob_choice: he prayed earnestly
  chosen_spanish: oró con fervor
  alternatives_spanish:
  - oró intensamente
  - oró fervientemente
  - hizo oración con insistencia
  lexicon: BDAG
  rationale: La construcción cognada intensifica la acción de orar. 'Con fervor' transmite esa fuerza de manera natural en español, evitando una repetición literal torpe.
- source_word: τοῦ μὴ βρέξαι
  english_pob_choice: that it would not rain
  chosen_spanish: para que no lloviera
  alternatives_spanish:
  - a fin de que no lloviera
  - que no lloviera
  lexicon: BDAG
  rationale: La cláusula infinitiva expresa el contenido o propósito de la oración. En español, la finalidad se comunica con naturalidad mediante 'para que' + subjuntivo.
- source_word: οὐκ ἔβρεξεν
  english_pob_choice: it did not rain
  chosen_spanish: no llovió
  alternatives_spanish:
  - no cayó lluvia
  - no hubo lluvia
  lexicon: BDAG
  rationale: 'El verbo impersonal en griego se adapta mejor a la impersonalidad natural del español: ''no llovió''.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  - sobre la región
  lexicon: BDAG
  rationale: '''γῆ'' puede significar tierra, suelo o país/land. Aquí se mantiene ''tierra'' porque el griego es amplio y el español lo comunica de forma directa sin introducir una localización más estrecha de la que el texto da.'
- source_word: ἐνιαυτοὺς τρεῖς καὶ μῆνας ἕξ
  english_pob_choice: for three years and six months
  chosen_spanish: durante tres años y seis meses
  alternatives_spanish:
  - por tres años y seis meses
  - a lo largo de tres años y seis meses
  lexicon: BDAG
  rationale: La duración acusativa se expresa naturalmente con 'durante' en español, marcando el tiempo de la sequía sin alterar el sentido.
theological_decisions:
- issue: Sentido de ὁμοιοπαθὴς aplicado a Elías
  english_pob_reading: Elijah is presented as an ordinary human sharing the same human nature/condition as the readers.
  chosen_spanish_reading: Elías es presentado como un ser humano ordinario, semejante a los lectores en su condición humana.
  alternative_spanish_readings:
  - Elías tenía las mismas pasiones/sentimientos que nosotros.
  - Elías era como nosotros.
  rationale: La intención teológica es animar al creyente mostrando que incluso Elías, pese a su relevancia profética, era verdaderamente humano. 'Naturaleza semejante a la nuestra' conserva esa afirmación amplia sin restringirla solo a emociones.
  doctrine_reference: DOCTRINE.md §Translation philosophy (preserve theological tension; gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión en inglés del POB fue revisada y mantenida sin cambios; este borrador español sigue esa lectura auditada y conserva la misma tensión léxica en ὁμοιοπαθὴς sin reducirla a una sola glosa emocional.
  spanish_consistency_notes:
  - Se mantiene 'Elías' como nombre propio estándar en español.
  - Se usa 'tierra' para ἐπὶ τῆς γῆς, en coherencia con el valor amplio del término griego.
  - La cláusula final conserva el conteo exacto 'tres años y seis meses'.
  - El pie de nota ofrece alternativas reales sin imponer una sola interpretación de ὁμοιοπαθὴς.
