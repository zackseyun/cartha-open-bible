translation:
  language: es
  text: ¿Quién es sabio y entendido entre ustedes? Muestre[a] sus obras por su buena conducta, en la mansedumbre de la sabiduría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa una forma singular masculina con fuerza representativa para cualquier persona así en la comunidad.
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: “con la mansedumbre que proviene de la sabiduría”.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Cuál persona
  - ¿Quién de ustedes
  lexicon: BDAG
  rationale: Interrogativo retórico natural en español para preguntar por la persona caracterizada por las cualidades siguientes.
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - experimentado
  lexicon: BDAG
  rationale: En contexto de sabiduría ética, 'sabio' conserva mejor la fuerza moral y práctica del término.
- source_word: ἐπιστήμων
  english_pob_choice: understanding
  chosen_spanish: entendido
  alternatives_spanish:
  - con conocimiento
  - instruido
  - experto
  lexicon: BDAG
  rationale: '''Entendido'' combina con ''sabio'' de forma natural en español y comunica discernimiento más que simple información.'
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: Expresa pertenencia dentro de la comunidad destinataria de manera natural para el español latinoamericano.
- source_word: δειξάτω
  english_pob_choice: Let him show
  chosen_spanish: Muestre
  alternatives_spanish:
  - Que muestre
  - Déjelo mostrar
  - Debe mostrar
  lexicon: BDAG
  rationale: Conserva el imperativo aoristo con fuerza exhortativa. En español, la forma singular de cortesía/orden general funciona como equivalente natural del imperativo representativo griego.
- source_word: ἐκ τῆς καλῆς ἀναστροφῆς
  english_pob_choice: by his good conduct
  chosen_spanish: por su buena conducta
  alternatives_spanish:
  - por su buen comportamiento
  - a partir de su buena conducta
  - mediante su buena conducta
  lexicon: BDAG
  rationale: '''ἀναστροφή'' significa conducta o manera de vivir. ''Buena conducta'' sigue de cerca la revisión inglesa más reciente y es idiomática en español. ''Por'' refleja bien el valor de medio o manifestación.'
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus obras buenas
  lexicon: BDAG
  rationale: '''Obras'' preserva el vínculo léxico con Santiago y la terminología tradicional del pasaje, sin forzar una paráfrasis.'
- source_word: ἐν πραΰτητι σοφίας
  english_pob_choice: in the meekness of wisdom
  chosen_spanish: en la mansedumbre de la sabiduría
  alternatives_spanish:
  - con la mansedumbre que proviene de la sabiduría
  - en la gentileza de la sabiduría
  lexicon: BDAG
  rationale: '''πραΰτης'' puede ser ''mansedumbre'' o ''gentileza''. ''Mansedumbre'' retiene mejor el matiz de virtud moral; ''de la sabiduría'' conserva la relación genitiva sin resolverla demasiado en una sola paráfrasis.'
theological_decisions:
- issue: Imperativo singular masculino con fuerza representativa
  english_pob_reading: Let him show
  chosen_spanish_reading: Muestre
  alternative_spanish_readings:
  - Que muestre
  - Muestren
  rationale: El griego usa una forma singular masculina con valor representativo para cualquier persona en la comunidad. En español, se conserva la exhortación en singular sin neutralizarla en plural; el matiz representativo puede explicarse en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre sabiduría y mansedumbre
  english_pob_reading: in the meekness of wisdom
  chosen_spanish_reading: en la mansedumbre de la sabiduría
  alternative_spanish_readings:
  - con la mansedumbre que proviene de la sabiduría
  - en la gentileza de la sabiduría
  rationale: La frase griega permite leer la mansedumbre como cualidad caracterizada por la sabiduría. La opción principal mantiene la tensión sin explicar excesivamente la relación genitiva.
  doctrine_reference: Lexical/theological note on πραΰτης + σοφίας
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'good conduct' sobre 'good way of life' para ἀναστροφή. En español se adoptó 'buena conducta' como equivalente natural y fiel. También se mantuvo la elección de 'works'/'obras' y la expresión formal 'mansedumbre de la sabiduría'.
  spanish_consistency_notes:
  - Se mantuvo 'sabio' para σοφός y 'entendido' para ἐπιστήμων para conservar el paralelismo retórico.
  - Se eligió 'obras' en vez de 'hechos' para reflejar la terminología de Santiago y el vocabulario auditable del POB.
  - '''Entre ustedes'' evita una traducción demasiado formal o eclesiástica sin perder el sentido comunitario.'
  - No se usó 'SEÑOR' ni terminología de sustitución teológica ajena al versículo.
