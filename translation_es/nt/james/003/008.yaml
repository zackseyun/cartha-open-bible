translation:
  language: es
  text: Pero nadie entre los hombres[a] puede domar la lengua. Es un mal incontrolable[b], lleno de veneno mortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «nadie puede domar la lengua».
    reason: alternative_reading
  - marker: b
    text: O «mal inquieto» o «mal inestable».
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσαν
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua
  - el habla
  - la palabra
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal del texto griego, equivalente al inglés POB 'the tongue'. En español, 'la lengua' mantiene la imagen y la continuidad con el contexto de Santiago 3.
- source_word: οὐδεὶς
  english_pob_choice: no one among men
  chosen_spanish: nadie entre los hombres
  alternatives_spanish:
  - nadie
  - ningún ser humano
  - ninguno entre los hombres
  lexicon: BDAG
  rationale: El griego usa una forma masculina singular con valor humano general. 'Nadie entre los hombres' conserva esa huella formal y el alcance representativo; 'nadie' solo sería más idiomático pero menos sensible a la forma del original.
- source_word: δαμάσαι
  english_pob_choice: to tame
  chosen_spanish: domar
  alternatives_spanish:
  - domar
  - domesticar
  - someter
  lexicon: BDAG
  rationale: '''Domar'' es el equivalente natural de δαμάζω y encaja con el contexto inmediato de Santiago, donde la imagen es la de animales que llegan a ser domados.'
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - puede
  - es capaz de
  lexicon: BDAG
  rationale: '''Puede'' expresa de forma directa la capacidad/posibilidad del verbo δύναμαι en este contexto.'
- source_word: ἀνθρώπων
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre los hombres
  - de los hombres
  - entre la humanidad
  lexicon: BDAG
  rationale: La expresión genitiva se refleja de modo natural como 'entre los hombres', manteniendo la referencia humana general que el inglés POB preservó con 'among men'.
- source_word: ἀκατάστατον
  english_pob_choice: restless
  chosen_spanish: inquieto
  alternatives_spanish:
  - inquieto
  - inestable
  - rebelde
  lexicon: BDAG
  rationale: El adjetivo puede denotar desorden, inestabilidad o agitación. 'Inquieto' comunica bien la falta de reposo/quietud que el inglés POB traduce como 'restless', sin perder la fuerza moral del contexto.
- source_word: κακόν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - mal
  - malvado
  - maldad
  lexicon: BDAG
  rationale: '''Mal'' conserva la fuerza moral del sustantivo/adjetivo neutro κακόν y su función predicativa en la frase.'
- source_word: μεστὴ
  english_pob_choice: full of
  chosen_spanish: lleno de
  alternatives_spanish:
  - lleno de
  - colmado de
  lexicon: BDAG
  rationale: Se traduce de manera idiomática y directa como una descripción de plenitud.
- source_word: ἰοῦ
  english_pob_choice: poison
  chosen_spanish: veneno
  alternatives_spanish:
  - veneno
  - ponzoña
  lexicon: BDAG
  rationale: En este contexto con θανατηφόρου, el sentido es claramente una sustancia venenosa mortal. 'Veneno' es el equivalente español más claro y accesible.
- source_word: θανατηφόρου
  english_pob_choice: deadly
  chosen_spanish: mortal
  alternatives_spanish:
  - mortal
  - que da muerte
  - letal
  lexicon: BDAG
  rationale: '''Mortal'' preserva la idea de muerte inminente y se corresponde con la fuerza de θανατηφόρου en la frase ''veneno mortal''.'
theological_decisions:
- issue: Carácter representativo de οὐδεὶς ἀνθρώπων
  english_pob_reading: no one among men
  chosen_spanish_reading: nadie entre los hombres
  alternative_spanish_readings:
  - nadie
  - ningún ser humano puede domar la lengua
  rationale: Se mantiene el alcance universal humano del dicho y, al mismo tiempo, la huella formal del plural genitivo griego. No se introduce ninguna restricción doctrinal; la frase subraya la incapacidad humana general.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés de trabajo pasó de 'unstable evil' a 'restless evil' para reflejar mejor ἀκατάστατον. La versión española adopta 'inquieto' para conservar esa opción revisada, manteniendo abierta la alternativa semántica de 'inestable' en la nota.
  spanish_consistency_notes:
  - Se usa 'lengua' para γλῶσσα, en continuidad con el vocabulario bíblico usual y con la imagen metafórica del pasaje.
  - Se evita 'SEÑOR' o terminología eclesiástica no pertinente; este versículo no contiene referencias directas al nombre divino.
  - '''Mortal'' se prefiere a ''letal'' por naturalidad estilística en español bíblico contemporáneo, aunque ambas son posibles.'
  - La construcción 'nadie entre los hombres' preserva el matiz representativo masculino del griego sin volver la frase forzada.
