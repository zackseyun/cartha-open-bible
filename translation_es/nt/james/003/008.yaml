    text: O, de manera más idiomática, «nadie puede domar la lengua».
    reason: alternative_reading
  - marker: b
    text: O «mal inquieto» o «mal inestable».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «mal inquieto» por «mal incontrolable» para lograr una expresión más natural y contextualmente fuerte en español, manteniendo el campo semántico de ἀκατάστατον como algo indócil, desordenado o inquieto. Se conserva la nota lexical para preservar las alternativas más literales («inquieto», «inestable»). No se requieren cambios en la primera oración aparte de mantener la nota idiomática ya útil.
