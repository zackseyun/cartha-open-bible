revisions:
- from: Pero nadie entre los hombres[a] puede domar la lengua. Es un mal inquieto[b], lleno de veneno mortal.
  to: Pero nadie entre los hombres[a] puede domar la lengua. Es un mal incontrolable[b], lleno de veneno mortal.
  rationale: Se reemplaza «mal inquieto» por «mal incontrolable» para lograr una expresión más natural y contextualmente fuerte en español, manteniendo el campo semántico de ἀκατάστατον como algo indócil, desordenado o inquieto. Se conserva la nota lexical para preservar las alternativas más literales («inquieto», «inestable»). No se requieren cambios en la primera oración aparte de mantener la nota idiomática ya útil.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca la auditoría inglesa: conserva la metáfora de γλῶσσαν como «la lengua», traduce δαμάσαι con «domar», expresa la incapacidad humana general de οὐδεὶς … ἀνθρώπων, y comunica correctamente «lleno de veneno mortal». La principal mejora necesaria está en ἀκατάστατον κακόν: «mal inquieto» suena menos natural en español bíblico contemporáneo y la nota al pie actual repite la lectura principal en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El texto es claro y legible, pero «mal inquieto» resulta algo forzado y menos idiomático que «mal incontrolable» o «mal rebelde». Además, la nota [b] está defectuosa porque ofrece como alternativa la misma expresión ya usada en el texto. «Nadie entre los hombres» es aceptable y fiel al rastro formal del original, aunque algo marcado; la nota [a] compensa bien con una opción más idiomática.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «La lengua», «domar», «veneno mortal» y el manejo de lenguaje humano genérico son consistentes con las decisiones documentadas. La revisión propuesta solo afina la naturalidad y la precisión contextual de ἀκατάστατον.
  issues:
  - severity: medium
    issue: «mal inquieto» suena poco natural para ἀκατάστατον κακόν
    rationale: Aunque «inquieto» puede aproximarse a «restless», en español aplicado a «mal» produce una colocación extraña. El contexto de Santiago 3 favorece una idea de indocilidad/desorden continuo; «mal incontrolable» comunica mejor esa fuerza sin alejarse del griego ni de la auditoría inglesa.
  - severity: medium
    issue: La nota [b] repite la lectura principal
    rationale: La nota dice «O ‘mal inquieto’ o ‘mal inestable’», pero «mal inquieto» ya está en el texto principal. Las notas deben preservar alternativas significativas, no duplicar la traducción base.
  revised_spanish_text: Pero nadie entre los hombres[a] puede domar la lengua. Es un mal incontrolable[b], lleno de veneno mortal.
