translation:
  language: es
  text: ¿Acaso de una misma abertura brota de un manantial[a] agua dulce y amarga?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Acaso el manantial hace brotar lo dulce y lo amargo de la misma abertura?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτι
  english_pob_choice: Does ... ?
  chosen_spanish: ¿Puede ... ?
  alternatives_spanish:
  - ¿Acaso ... ?
  - ¿No ... ?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta retórica que espera respuesta negativa. En español, una pregunta con «¿Puede...?» conserva ese valor de imposibilidad o incongruencia sin volverla mecánica ni añadir una negación explícita que altere el ritmo retórico.
- source_word: πηγή
  english_pob_choice: spring
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - spring
  lexicon: BDAG
  rationale: πηγή designa una fuente natural de agua. «Fuente» es idiomática y clara en español; «manantial» sería igualmente posible, pero «fuente» mantiene bien la imagen general y suena más amplia y bíblica sin perder el referente físico.
- source_word: ἐκ τῆς αὐτῆς ὀπῆς
  english_pob_choice: from the same opening
  chosen_spanish: de la misma abertura
  alternatives_spanish:
  - del mismo agujero
  - de la misma abertura de salida
  lexicon: BDAG
  rationale: ὀπή significa literalmente una abertura o agujero. «Abertura» comunica la imagen física con dignidad y evita una rusticidad innecesaria; también preserva mejor el paralelo con la salida del agua que «agujero».
- source_word: βρύει
  english_pob_choice: pour out
  chosen_spanish: brotar
  alternatives_spanish:
  - emanar
  - manar
  - derramar
  lexicon: BDAG
  rationale: βρύω expresa el salir a borbotones o brotar de una fuente. «Brotar» conserva el movimiento natural del agua y sugiere la salida viva del manantial mejor que «derramar», que puede sonar más general.
- source_word: τὸ γλυκὺ
  english_pob_choice: sweet water
  chosen_spanish: lo dulce
  alternatives_spanish:
  - agua dulce
  - lo dulce (el agua dulce)
  lexicon: BDAG
  rationale: El griego usa el adjetivo sustantivado. En español, «lo dulce» preserva esa sustantivación y evita añadir «agua» donde el griego no la expresa explícitamente; el contexto de la fuente hace clara la referencia al agua.
- source_word: τὸ πικρόν
  english_pob_choice: bitter water
  chosen_spanish: lo amargo
  alternatives_spanish:
  - agua amarga
  - lo amargo (el agua amarga)
  lexicon: BDAG
  rationale: Como con τὸ γλυκύ, el adjetivo está sustantivado. «Lo amargo» mantiene la simetría con «lo dulce» y deja que el contexto determine que se trata del agua que brota de la fuente.
translation_notes:
  revision_awareness: La versión inglesa revisada optó por una pregunta retórica directa con μήτι y añadió «water» por claridad. En español, se preservó la pregunta retórica sin negación explícita, pero se evitó añadir «agua» para no sobreespecificar lo que el griego deja implícito en los adjetivos sustantivados.
  spanish_consistency_notes:
  - Se mantuvo «fuente» para πηγή, un término natural en español y coherente con la imagen de agua que brota.
  - Se preservó la sustantivación de los adjetivos con «lo dulce» / «lo amargo» para no perder la forma griega.
  - No se empleó «SEÑOR» ni terminología cristológica; no hay decisiones teológicas especiales en este versículo.
