translation:
  language: es
  text: 'Fíjense también en las naves: aunque son tan grandes y son impulsadas por vientos fuertes, son dirigidas por un timón muy pequeño, adondequiera que quiera la inclinación del que las dirige.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «adondequiera que el piloto quiera ir». El griego dice más literalmente: «adondequiera que quiera el impulso del que dirige».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Fíjense
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: BDAG
  rationale: Como exhortación de atención en plural, «Fíjense» comunica mejor el valor discursivo de ἰδοὺ en español moderno que un calco más solemne.
- source_word: καὶ τὰ πλοῖα
  english_pob_choice: also at the ships
  chosen_spanish: también en las naves
  alternatives_spanish:
  - también las naves
  - también en los barcos
  lexicon: BDAG
  rationale: «También» conserva la función aditiva del contexto, y «naves» mantiene un registro digno y amplio para el ejemplo marítimo.
- source_word: τηλικαῦτα ὄντα
  english_pob_choice: though they are so large
  chosen_spanish: aunque son tan grandes
  alternatives_spanish:
  - siendo tan grandes
  - aunque son tan enormes
  lexicon: BDAG
  rationale: 'La idea es concesiva: pese a su gran tamaño. «Tan grandes» reproduce el contraste sin exagerar más de lo que exige el griego.'
- source_word: ὑπὸ ἀνέμων σκληρῶν ἐλαυνόμενα
  english_pob_choice: are driven by strong winds
  chosen_spanish: son impulsadas por vientos fuertes
  alternatives_spanish:
  - son arrastradas por vientos fuertes
  - son movidas por vientos fuertes
  lexicon: BDAG
  rationale: «Impulsadas» mantiene la pasiva de ἐλαυνόμενα; «vientos fuertes» sigue el valor idiomático que el audit trail inglés prefirió para σκληρῶν.
- source_word: μετάγεται
  english_pob_choice: they are steered
  chosen_spanish: son gobernadas
  alternatives_spanish:
  - son dirigidas
  - son guiadas
  lexicon: BDAG
  rationale: En español náutico, «gobernar» una nave es natural y precisa; conserva la idea de dirección del barco sin forzar un tecnicismo extraño.
- source_word: ὑπὸ ἐλαχίστου πηδαλίου
  english_pob_choice: by a very small rudder
  chosen_spanish: por un timón muy pequeño
  alternatives_spanish:
  - por un timón diminuto
  - por el timón más pequeño
  lexicon: BDAG
  rationale: «Timón» es el equivalente español funcional de πηδάλιον. «Muy pequeño» refleja el superlativo con naturalidad, como en el enfoque inglés auditado.
- source_word: ὅπου
  english_pob_choice: wherever
  chosen_spanish: adondequiera que
  alternatives_spanish:
  - dondequiera que
  - donde
  lexicon: BDAG
  rationale: El adverbio relativo expresa dirección o destino según la voluntad del que conduce; «adondequiera que» comunica mejor ese movimiento intencional.
- source_word: ἡ ὁρμὴ
  english_pob_choice: the inclination
  chosen_spanish: la inclinación
  alternatives_spanish:
  - el impulso
  - la intención
  lexicon: BDAG
  rationale: La revisión inglesa optó por «inclination» por ser más natural que «impulse». En español, «inclinación» conserva la noción de tendencia o orientación interior.
- source_word: τοῦ εὐθύνοντος
  english_pob_choice: of the one steering
  chosen_spanish: del que las dirige
  alternatives_spanish:
  - del que gobierna
  - del timonel
  lexicon: BDAG
  rationale: 'La construcción participial se vierte con una relativa natural: «el que las dirige». Mantiene la imagen verbal sin introducir un título técnico no requerido por el griego.'
- source_word: βούλεται
  english_pob_choice: wills
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - decide
  lexicon: BDAG
  rationale: Aquí βούλεται expresa volición concreta. En español, «quiere» es más natural que un «quiere» absolutizado como traducción filosófica; conserva el acto de querer del que dirige.
theological_decisions:
- issue: Fuerza de la metáfora de gobierno y voluntad
  english_pob_reading: Retained the lexical texture of 'the inclination of the one steering wills' rather than paraphrasing to a fully explanatory idiom.
  chosen_spanish_reading: Se conserva la imagen de la inclinación del que dirige como factor que gobierna la nave.
  alternative_spanish_readings:
  - adondequiera que el piloto quiera ir
  - según la dirección del timonel
  rationale: El versículo ilustra el argumento de Santiago con una imagen concreta de control mediante un instrumento pequeño. Mantener la tensión entre la inclinación interna del que dirige y la respuesta de la nave evita borrar el paralelismo retórico del original.
  doctrine_reference: Santiago 3:3-5; filosofía de traducción del POB §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa revisó ὁρμή de «impulse» a «inclination» por ser más natural; la traducción española sigue esa revisión y evita un calco rígido. También se preserva la imagen náutica de πηδάλιον con «timón» y la pasiva de ἐλαυνόμενα con «son impulsadas».
  spanish_consistency_notes:
  - Se mantuvo «naves» para el campo marítimo amplio, coherente con un registro bíblico moderno y digno.
  - Se prefirió «dirige» sobre «pilota» para conservar el paralelo verbal con la participación del sujeto que gobierna la nave.
  - Se evitó «Cristo» o terminología doctrinal ajena al versículo; el texto es puramente ilustrativo.
