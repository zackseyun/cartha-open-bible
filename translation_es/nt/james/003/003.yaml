review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español comunica correctamente la ilustración condicional: poner el instrumento de control en la boca de los caballos para que obedezcan, y así guiar todo el cuerpo. Sin embargo, se aparta en dos puntos de la evidencia fuente y del rastro léxico del POB inglés: (1) χαλινοὺς aquí se entiende con precisión como la pieza puesta en la boca, por lo que «frenos» funciona mejor si la nota alternativa menciona «bridas», no «riendas»; (2) εἰς τὰ στόματα es plural y conviene conservar «en las bocas» para reflejar mejor la forma griega sin perder naturalidad. También es más idiomático en español distributivo pluralizar «todo su cuerpo» a «todo su cuerpo» o «todos sus cuerpos»; en este caso puede mantenerse singular distributivo, pero la construcción completa mejora con un pequeño ajuste estilístico.'
  spanish_quality_summary: El español es claro y digno, pero la nota al pie introduce una alternativa menos adecuada («riendas») y la frase «en la boca de los caballos» reduce un plural fuente que el español puede expresar naturalmente como «en las bocas de los caballos». Además, «todo su cuerpo» suena aceptable, aunque la frase queda más redonda con el resto de los ajustes. La revisión propuesta mejora precisión léxica y naturalidad sin cambiar el sentido.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión principal relevante al glosario y a la auditoría léxica es χαλινοὺς: el POB inglés eligió ''bits'' con nota alternativa ''bridles''. En español, «frenos» es una buena equivalencia contextual para la pieza en la boca; la alternativa correspondiente debe ser «bridas», no «riendas», porque «riendas» nombra más propiamente las correas/reins y no la pieza puesta en la boca.'
  issues:
  - severity: medium
    issue: La nota al pie usa «riendas» como alternativa para χαλινοὺς.
    rationale: El rastro inglés preserva la alternativa 'bridles', no 'reins'. En español, «riendas» desplaza el referente hacia las correas de dirección, mientras que el contexto habla de algo que se pone en la boca del caballo.
  - severity: low
    issue: «en la boca de los caballos» singulariza εἰς τὰ στόματα.
    rationale: El griego tiene plural («en las bocas»). En español también suena natural el plural aquí y preserva mejor la imagen distributiva.
  revised_spanish_text: Ahora bien, si ponemos frenos[a] en las bocas de los caballos para que nos obedezcan, también guiamos todo su cuerpo.
  revised_footnotes:
