translation:
  language: es
  text: Ahora bien, si ponemos frenos[a] en las bocas de los caballos para que nos obedezcan, también guiamos todo su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bridas», aunque aquí «frenos» es más preciso, porque la referencia inmediata es a la pieza que se pone en la boca del caballo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: Now if
  chosen_spanish: Ahora bien, si
  alternatives_spanish:
  - Si
  - Pero si
  lexicon: BDAG
  rationale: Conserva la fuerza condicional de εἰ y el matiz discursivo de δέ. «Ahora bien» suena natural en español y mantiene la transición argumentativa sin volverla demasiado abrupta.
- source_word: χαλινοὺς
  english_pob_choice: bits
  chosen_spanish: frenos
  alternatives_spanish:
  - mordidas
  - riendas
  lexicon: BDAG
  rationale: En este contexto el objeto va «en la boca» del caballo; en español «frenos» comunica la pieza que controla al animal sin obligar a una traducción más técnica o rara. Se evita «riendas» porque puede sugerir el conjunto completo y no la pieza colocada en la boca.
- source_word: εἰς τὰ στόματα
  english_pob_choice: into the mouths
  chosen_spanish: en la boca
  alternatives_spanish:
  - en las bocas
  - dentro de la boca
  lexicon: BDAG
  rationale: El griego plural es literal, pero en español «en la boca» resulta más natural al referirse al caballo en general. La imagen sigue siendo la de introducir el freno en la boca del animal.
- source_word: βάλλομεν
  english_pob_choice: we put
  chosen_spanish: ponemos
  alternatives_spanish:
  - colocamos
  - metemos
  lexicon: BDAG
  rationale: Verbo simple y fiel para la acción de introducir/poner el freno. «Ponemos» preserva la naturalidad del español sin volver mecánico el movimiento expresado por el griego.
- source_word: εἰς τὸ πείθεσθαι αὐτοὺς ἡμῖν
  english_pob_choice: so that they obey us
  chosen_spanish: para que nos obedezcan
  alternatives_spanish:
  - a fin de que nos obedezcan
  - para obedecerlos
  lexicon: BDAG
  rationale: El infinitivo articular con εἰς expresa propósito. «Para que nos obedezcan» reproduce ese fin de modo directo; «obedecer» expresa aquí la idea de someterse al control humano del ejemplo.
- source_word: μετάγομεν
  english_pob_choice: we guide
  chosen_spanish: guiamos
  alternatives_spanish:
  - dirigimos
  - conducimos
  lexicon: BDAG
  rationale: El verbo denota dirigir o mover algo de un lugar/curso a otro. «Guiamos» encaja bien con la imagen de controlar al caballo y conserva el valor de dirección sin forzar un término más técnico.
- source_word: ὅλον τὸ σῶμα αὐτῶν
  english_pob_choice: their whole bodies
  chosen_spanish: todo su cuerpo
  alternatives_spanish:
  - todo el cuerpo de ellos
  - todo su ser corporal
  lexicon: BDAG
  rationale: 'Aunque el griego tiene un sustantivo singular con pronombre plural, en español la referencia distributiva se expresa con naturalidad en singular colectivo: «todo su cuerpo». Mantiene la imagen del animal completo sin sobrecargar la frase.'
translation_notes:
  revision_awareness: Se siguió el acuerdo de alta concordancia del texto base. No hubo revisiones aplicadas en el audit trail inglés, así que el español se redactó directamente desde el griego con apoyo del análisis léxico inglés. Se mantuvo la metáfora de control de un caballo mediante una pieza colocada en la boca, sin expandirla a una imagen distinta.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo requiere.
  - Se evitó «Cristo/Mesías» porque el pasaje no contiene referencia cristológica.
  - Se preservó el tono proverbial e ilustrativo del argumento de Santiago con una sintaxis natural en español.
  - La referencia distributiva de σώμα se resolvió en singular español («todo su cuerpo») por claridad y naturalidad.
