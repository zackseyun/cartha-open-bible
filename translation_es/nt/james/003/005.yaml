base_translation:
  language: en
  yaml_path: translation/nt/james/003/005.yaml
  text: So also the tongue is a small member[a], and yet it boasts of great things[b]. See how small a fire sets ablaze so great a forest.
  footnotes:
  - marker: a
    text: Or, "See how great a fire sets ablaze how great a forest." The Greek wording can be taken exclamatorily, but the main text follows the sense of a small cause producing a large effect, which fits the immediate comparison with the tongue as a small member.
    reason: alternative_reading
  - marker: b
    text: Or "wood," "timber," or "brush." The Greek word can refer broadly to combustible material or woodland; "forest" best fits the image in natural English.
    reason: lexical_alternative
