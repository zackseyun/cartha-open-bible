translation:
  language: es
  text: Así también la lengua es un miembro pequeño, y se jacta de grandes cosas. Mira[a] cuán pequeño es un fuego que enciende un bosque tan grande[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira qué gran fuego enciende cuán grande bosque». El griego también puede leerse de modo exclamativo; el texto principal sigue el sentido de una causa pequeña que produce un efecto grande, en consonancia con la comparación inmediata con la lengua como miembro pequeño.'
    reason: alternative_reading
  - marker: b
    text: 'O: «madera», «leña» o «ramaje». La palabra griega puede referirse en general a material combustible o al conjunto de árboles; «bosque» comunica mejor la imagen en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - la lengua
  - el órgano de la lengua
  - habla
  lexicon: BDAG
  rationale: En español, «lengua» conserva la imagen corporal concreta del griego y funciona de modo natural en la metáfora de Santiago. «Habla» interpretaría la imagen en vez de traducirla; «órgano de la lengua» sería más explicativo de lo necesario.
- source_word: μικρὸν μέλος
  english_pob_choice: a small member
  chosen_spanish: un miembro pequeño
  alternatives_spanish:
  - una pequeña parte del cuerpo
  - un pequeño órgano
  lexicon: BDAG
  rationale: «Miembro» preserva la imagen del cuerpo y el paralelismo con el contexto inmediato. «Parte del cuerpo» es más explícito, pero menos conciso y menos fiel al tono imagético del pasaje.
- source_word: μεγάλα αὐχεῖ
  english_pob_choice: it boasts of great things
  chosen_spanish: se jacta de grandes cosas
  alternatives_spanish:
  - hace grandes alardes
  - se gloría de grandes cosas
  lexicon: BDAG
  rationale: El verbo griego expresa jactancia o alarde. «Se jacta de grandes cosas» mantiene esa fuerza sin suavizarla; «se gloría» podría sonar más positivo y «hace grandes alardes» es más libre.
- source_word: Ἰδοὺ
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Mira bien
  lexicon: BDAG
  rationale: «Mira» transmite la llamada de atención del texto con un español natural y breve. Evita el arcaísmo de «he aquí» o «he aquí que» y conserva la función demostrativa.
- source_word: ἡλίκον πῦρ
  english_pob_choice: how small a fire
  chosen_spanish: cuán pequeño fuego
  alternatives_spanish:
  - qué pequeño fuego
  - cómo de pequeño fuego
  lexicon: BDAG
  rationale: La puntuación y el contexto favorecen la lectura que destaca el pequeño tamaño del fuego como causa. «Cuán pequeño fuego» conserva la tensión retórica; en español puede sonar algo abrupto, pero refleja la comparación del original.
- source_word: ἡλίκην ὕλην
  english_pob_choice: so great a forest
  chosen_spanish: tan grande bosque
  alternatives_spanish:
  - tan gran bosque
  - tan grande leña
  - tan grande monte de leña
  lexicon: BDAG
  rationale: ὕλη puede abarcar madera, bosque o combustible. «Bosque» comunica de forma clara la imagen de algo extenso que arde, y corresponde al sentido elegido en el audit trail inglés. «Tan gran bosque» sería igualmente posible, pero «tan grande bosque» mantiene mejor el paralelismo del griego y el flujo del verso.
- source_word: ἀνάπτει
  english_pob_choice: sets ablaze
  chosen_spanish: enciende
  alternatives_spanish:
  - prende
  - prende fuego a
  - incendia
  lexicon: BDAG
  rationale: «Enciende» es un verbo natural y preciso para el inicio del fuego. «Incendia» intensificaría demasiado el resultado; «prende» es válido, pero menos claro en registro general.
theological_decisions:
- issue: Imagen proverbial de la lengua como fuente de daño
  english_pob_reading: The verse presents a small cause producing a large effect, using a bodily image and fire metaphor without flattening the tension.
  chosen_spanish_reading: El verso mantiene la imagen de un miembro pequeño que produce un efecto desproporcionado, mediante la metáfora del fuego que enciende un bosque.
  alternative_spanish_readings:
  - La lengua habla grandes cosas
  - La lengua es un pequeño órgano del habla
  rationale: No se debe convertir la metáfora corporal en una abstracción. La redacción española conserva la tensión entre pequeñez y gran alcance del daño, tal como la lectura inglesa y el griego.
  doctrine_reference: Santiago 3:5; cf. Santiago 3:6
- issue: Lectura de ἡλίκον πῦρ / ἡλίκην ὕλην
  english_pob_reading: The main text follows the sense of a small cause producing a large effect, while acknowledging the alternative exclamatory reading in a footnote.
  chosen_spanish_reading: Se mantiene la lectura de un fuego pequeño que enciende un bosque grande, y se deja constancia de la alternativa exclamativa en nota.
  alternative_spanish_readings:
  - Mira qué gran fuego enciende cuán grande bosque
  - Mira qué fuego tan grande enciende tan grande bosque
  rationale: La evidencia del contexto inmediato favorece el contraste entre causa pequeña y efecto amplio. La nota conserva la alternativa posible sin borrar la dificultad textual/retórica del griego.
  doctrine_reference: Santiago 3:5; nota textual/retórica de la POB inglesa
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios respecto del pase anterior; esta versión española sigue de cerca el texto griego y el audit trail inglés, manteniendo la misma resolución interpretativa principal y la misma alternativa retórica en nota.
  spanish_consistency_notes:
  - Se usa «lengua» para γλῶσσα en sentido corporal/metafórico, no «habla», para preservar la imagen original.
  - Se mantiene «miembro pequeño» para μέλος, coherente con el lenguaje corporal de Santiago.
  - Se traduce αὐχεῖ con «se jacta» para conservar la fuerza de la autoglorificación.
  - Se elige «bosque» para ὕλη siguiendo el sentido contextual más natural en español, con nota de alternativas léxicas.
  - Se evita «SEÑOR» u otra convención reverencial porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
