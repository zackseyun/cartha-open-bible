translation:
  language: es
  text: Esta sabiduría no desciende de arriba[a], sino que es terrenal, no espiritual, y demoníaca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «natural»; el adjetivo griego puede designar lo que pertenece meramente a la vida natural, en contraste con lo que es espiritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη ἡ σοφία
  english_pob_choice: This wisdom
  chosen_spanish: Esta sabiduría
  alternatives_spanish:
  - Esta clase de sabiduría
  - Tal sabiduría
  lexicon: BDAG
  rationale: El demostrativo con el artículo y el sustantivo apunta a la sabiduría ya descrita en el contexto. «Esta sabiduría» conserva la referencia directa sin añadir una paráfrasis interpretativa excesiva.
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - del cielo
  - de lo alto
  lexicon: BDAG
  rationale: La expresión básica es espacial y también puede resonar teológicamente con el origen divino. «De arriba» mantiene esa precisión y evita reemplazarla por una interpretación más explícita como «del cielo».
- source_word: κατερχομένη
  english_pob_choice: coming down
  chosen_spanish: desciende
  alternatives_spanish:
  - va descendiendo
  - baja
  lexicon: BDAG
  rationale: El participio presente se expresa naturalmente en español con un verbo finito que comunica el movimiento desde arriba. «Desciende» preserva la imagen verbal sin sonar forzado.
- source_word: ἐπίγειος
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - terrestre
  - mundana
  lexicon: BDAG
  rationale: El adjetivo contrasta con «de arriba» y denota lo que pertenece a la tierra. «Terrenal» conserva ese contraste de manera natural en español y evita cargar la palabra con una connotación moral añadida que «mundana» sí tendría.
- source_word: ψυχική
  english_pob_choice: unspiritual
  chosen_spanish: natural
  alternatives_spanish:
  - no espiritual
  - anímica
  lexicon: BDAG
  rationale: El término puede señalar lo perteneciente a la vida meramente natural, en contraste con lo espiritual. «Natural» mantiene esa tensión lexical sin resolverla demasiado, y la nota aclara que también puede entenderse como «no espiritual».
- source_word: δαιμονιώδης
  english_pob_choice: demonic
  chosen_spanish: demoníaca
  alternatives_spanish:
  - demonial
  - de demonios
  lexicon: BDAG
  rationale: El adjetivo denota lo caracterizado por demonios. «Demoníaca» es la forma española directa y clara, y conserva la fuerza negativa del original.
theological_decisions:
- issue: Valor de ψυχική dentro de la triple evaluación de la sabiduría falsa
  english_pob_reading: Rendered as 'unspiritual' to reflect contrast with what comes from above and, by implication in James, from God rather than the Spirit-less merely natural realm.
  chosen_spanish_reading: Traducido como «natural», con nota de que puede entenderse también como «no espiritual».
  alternative_spanish_readings:
  - no espiritual
  - sensual
  rationale: En español, «natural» puede sonar más abierto y menos técnico que «unspiritual», pero todavía preserva la oposición a lo que viene «de arriba». La nota mantiene la alternativa «no espiritual» para no borrar la tensión semántica del término griego.
  doctrine_reference: Translation philosophy §§1, 5, 6; preservar la tensión teológica en vez de resolverla cuando la ambigüedad es genuina.
translation_notes:
  revision_awareness: La lectura inglesa más reciente mantuvo sin cambios la solución textual; la única observación relevante fue la ligera tensión lexical de ψυχική, que en español también requiere una decisión explicativa. No se reportaron revisiones textuales o cambios de edición que afecten este versículo.
  spanish_consistency_notes:
  - Se mantuvo «de arriba» para ἄνωθεν, siguiendo el valor espacial primario y su resonancia teológica.
  - Se usó «terrenal» para ἐπίγειος y «demoníaca» para δαιμονιώδης, conservando la triple gradación negativa del griego.
  - «Natural» en ψυχική evita un calco opaco, pero la nota preserva la alternativa «no espiritual» para la lectura teológica negativa indicada por el contexto.
