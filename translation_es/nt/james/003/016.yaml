translation:
  language: es
  text: Porque donde hay celos[a] y ambición egoísta, allí hay desorden y toda práctica vil[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'envidia' para 'celos'. El término griego también puede significar 'celo', pero aquí el contexto es claramente negativo.
    reason: lexical_alternative
  - marker: b
    text: O 'toda cosa/acción mala'. Literalmente, 'toda cosa vil'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - dondequiera que
  lexicon: BDAG
  rationale: Expresa la relación locativa general sin añadir fuerza distributiva que el griego no exige. 'Donde' mantiene bien la estructura proverbial 'donde... allí...'.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Conserva la conexión explicativa con el contexto inmediato. 'Porque' es natural en español y mantiene el valor causal/explicativo sin sobrecargarlo.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celo
  lexicon: BDAG
  rationale: En este contexto el término es claramente negativo, según 3:14-15. 'Celos' comunica bien la pasión posesiva o competitiva; 'celo' podría sonar positivo en español y 'envidia' es posible, pero menos directo para el paralelo vicioso del pasaje.
- source_word: ἐριθεία
  english_pob_choice: selfish ambition
  chosen_spanish: ambición egoísta
  alternatives_spanish:
  - rivalidad egoísta
  - afán faccioso
  - egoísmo ambicioso
  lexicon: BDAG
  rationale: Recupera el sentido de auto-ascenso competitivo o sectario. 'Ambición egoísta' es natural y transparente en español, y preserva la motivación torcida que el contexto denuncia.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: 'Correlaciona con ''donde'' y mantiene el paralelismo sentencioso del griego: ''donde... allí...''.'
- source_word: ἀκαταστασία
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - confusión
  - intranquilidad
  - alboroto
  lexicon: BDAG
  rationale: El sustantivo apunta a perturbación comunitaria y falta de orden, no sólo a confusión mental. 'Desorden' es el equivalente español más directo y amplio.
- source_word: πᾶν
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: BDAG
  rationale: Con πρᾶγμα singular, en español suena más natural 'toda práctica' que 'cada práctica', y conserva la idea de totalidad.
- source_word: φαῦλον
  english_pob_choice: vile
  chosen_spanish: vil
  alternatives_spanish:
  - malo
  - perverso
  - malvado
  lexicon: BDAG
  rationale: '''Vil'' reproduce con fuerza la valoración moral fuerte del término, similar al inglés POB. Es breve, formal y se ajusta a la cadencia de la frase.'
- source_word: πρᾶγμα
  english_pob_choice: practice
  chosen_spanish: práctica
  alternatives_spanish:
  - cosa
  - hecho
  - acto
  lexicon: BDAG
  rationale: Aunque literalmente puede ser 'cosa' o 'asunto', el contexto de conductas viciosas favorece una traducción dinámica controlada. 'Práctica' comunica conducta habitual o concreta sin vaciar el matiz moral.
theological_decisions:
- issue: Sentido negativo de ζῆλος en el contexto de la sabiduría terrenal
  english_pob_reading: The Greek term can also mean 'zeal,' but here the context is clearly negative.
  chosen_spanish_reading: El término se entiende negativamente como 'celos', no como 'celo' positivo.
  alternative_spanish_readings:
  - '''celo'' en sentido neutro o positivo'
  - '''envidia'' como vice más específico'
  rationale: El contexto inmediato habla de celos amargos y ambición egoísta (3:14-15). Traducirlo positivamente oscurecería el argumento de Santiago. 'Celos' conserva la carga viciosa sin imponer más de lo que el texto exige.
  doctrine_reference: Santiago 3:14-16; coherencia contextual y primacía del sentido léxico en el contexto inmediato.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail en inglés: conserva la estructura proverbial ''donde... allí...'', mantiene el valor negativo de ζῆλος por el contexto inmediato, y refleja πᾶν φαῦλον πρᾶγμα con una opción española natural pero auditables mediante nota.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y no aplica terminología divina en este versículo.
  - Se eligió 'celos' para ζῆλος siguiendo la lectura negativa documentada; 'celo' se deja como alternativa nota.
  - '''Desorden'' mantiene el matiz comunitario de ἀκαταστασία sin reducirlo a confusión mental.'
  - '''Práctica vil'' conserva el paralelismo moral de πᾶν φαῦλον πρᾶγμα y evita suavizar φαῦλον en ''malo'' o ''intrascendente''.'
