translation:
  language: es
  text: De la misma boca salen bendición y maldición. Hermanos míos[a], estas cosas no deben ser así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hermanos y hermanas míos»; el griego dice «hermanos», pero en este contexto Santiago probablemente se dirige a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ αὐτοῦ στόματος
  english_pob_choice: From the same mouth
  chosen_spanish: De una misma boca
  alternatives_spanish:
  - De la misma boca
  - De la propia boca
  lexicon: BDAG
  rationale: La expresión griega indica origen o procedencia; en español, "de una misma boca" conserva la imagen de un solo origen para palabras opuestas y suena natural sin perder el sentido espacial/source del texto.
- source_word: ἐξέρχεται
  english_pob_choice: come
  chosen_spanish: salen
  alternatives_spanish:
  - salen fuera
  - proceden
  lexicon: BDAG
  rationale: Aunque el verbo griego está en singular, el sujeto coordinado es doble; en español el plural "salen" refleja adecuadamente que bendición y maldición son las dos cosas que brotan de esa misma boca.
- source_word: εὐλογία
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - alabanza
  - bendición pronunciada
  lexicon: BDAG
  rationale: En este contexto de habla, el sustantivo se refiere a una bendición expresada con la boca; "bendición" es la equivalencia más directa y mantiene el contraste con "maldición".
- source_word: κατάρα
  english_pob_choice: cursing
  chosen_spanish: maldición
  alternatives_spanish:
  - maldecir
  - maldición pronunciada
  lexicon: BDAG
  rationale: El español común expresa bien el sustantivo con "maldición". Aunque el inglés POB opta por el matiz verbal de "cursing", en español el sustantivo conserva con claridad la idea de hablar mal/impetrar mal.
- source_word: οὐ χρή
  english_pob_choice: ought not
  chosen_spanish: no deben
  alternatives_spanish:
  - no conviene
  - no es correcto
  lexicon: BDAG
  rationale: χρή expresa lo que es debido o apropiado. "No deben" comunica de forma natural la impropiedad moral que Santiago señala, sin volver la frase pesada o demasiado literal.
- source_word: ἀδελφοί μου
  english_pob_choice: My brothers
  chosen_spanish: Hermanos míos
  alternatives_spanish:
  - Hermanos y hermanas míos
  - Hermanos míos y hermanas mías
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego en el texto principal, como hace el POB inglés, y se mantiene el tono fraternal de la exhortación. El posible sentido inclusivo se documenta en una nota.
- source_word: ταῦτα οὕτως γίνεσθαι
  english_pob_choice: these things ought not to be so
  chosen_spanish: estas cosas no deben ser así
  alternatives_spanish:
  - esto no debe suceder así
  - las cosas no deberían ser de este modo
  lexicon: BDAG
  rationale: La frase griega concluye con una valoración de impropiedad sobre "estas cosas" y "así". La versión española conserva ambos elementos con una estructura natural y no paraphrasea más allá del alcance del texto.
theological_decisions:
- issue: Alcance de ἀδελφοί μου como vocativo fraternal en una comunidad mixta
  english_pob_reading: My brothers
  chosen_spanish_reading: Hermanos míos
  alternative_spanish_readings:
  - Hermanos y hermanas míos
  - Hermanos míos y hermanas mías
  rationale: El griego usa el plural masculino ἀδελφοί; el texto principal respeta esa forma fuente y la dirección comunitaria del pasaje. Dado que en el contexto James probablemente se dirige a toda la comunidad creyente, la posible inclusión de mujeres se preserva en nota, no en la línea principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El paquete fuente y el audit trail inglés coinciden en una lectura estable: imagen de una sola boca, dos emisiones contrapuestas, exhortación de impropiedad con χρή y vocativo fraternal masculino plural. No se registran revisiones aplicadas; la redacción española sigue esa lectura sin introducir cambios textuales.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico actual, claro y digno, evitando arcaísmos innecesarios.
  - 'Se preservó la tensión lexical de εὐλογία/κατάρα con sustantivos españoles paralelos: "bendición" / "maldición".'
  - Se optó por "no deben" para χρή por naturalidad y fidelidad funcional.
  - El vocativo "Hermanos míos" conserva la forma fuente y remite la posible inclusión comunitaria a la nota.
  - La puntuación reproduce dos miembros breves y una conclusión exhortativa final, como en el griego.
