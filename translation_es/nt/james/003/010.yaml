    issue: «De una misma boca» debilita la referencia definida de ἐκ τοῦ αὐτοῦ στόματος.
    rationale: El griego usa artículo + αὐτοῦ para 'la misma boca', es decir, la misma fuente identificable; en español «de la misma boca» es más fiel y más natural que la formulación indefinida «de una misma boca».
  revised_spanish_text: De la misma boca salen bendición y maldición. Hermanos míos[a], estas cosas no deben ser así.
  revised_footnotes:
