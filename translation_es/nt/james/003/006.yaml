translation:
  language: es
  text: Y la lengua es fuego, un mundo de injusticia. La lengua está puesta entre nuestros miembros, la que mancha[a] todo el cuerpo y enciende el curso de la vida[b], y es encendida por la Gehena[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contamina todo el cuerpo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la rueda de la vida» o «el ciclo de la vida» para τὸν τροχὸν τῆς γενέσεως.'
    reason: lexical_alternative
  - marker: c
    text: Gehena es el término griego; tradicionalmente se traduce «infierno».
    reason: alternative_reading
lexical_decisions:
- source_word: γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua (metonimia de la palabra)
  - habla
  lexicon: BDAG
  rationale: En español, 'lengua' conserva la metáfora corporal concreta del griego y permite la extensión metonímica hacia el habla sin perder la imagen física del órgano.
- source_word: πῦρ
  english_pob_choice: a fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  lexicon: BDAG
  rationale: El predicado nominal anarthro del griego se transmite naturalmente con 'fuego'; añadir 'un' sería posible, pero en español el sustantivo simple mantiene la fuerza metafórica con mayor naturalidad.
- source_word: κόσμος τῆς ἀδικίας
  english_pob_choice: a world of unrighteousness
  chosen_spanish: un mundo de injusticia
  alternatives_spanish:
  - un mundo de maldad
  - un mundo de iniquidad
  - el mundo de injusticia
  lexicon: BDAG
  rationale: '''Mundo de injusticia'' reproduce la imagen idiomática y conserva el genitivo descriptivo. ''Injusticia'' mantiene el campo moral de ἀδικία sin imponer una traducción eclesiástica más cargada que el griego.'
- source_word: καθίσταται
  english_pob_choice: is set
  chosen_spanish: se coloca
  alternatives_spanish:
  - está puesto
  - se pone
  - está situado
  lexicon: BDAG
  rationale: El verbo expresa ubicación/estado de la lengua entre los miembros; 'se coloca' comunica esa disposición sin volver demasiado técnico 'se establece' ni demasiado rígido 'es puesto'.
- source_word: ἐν τοῖς μέλεσιν ἡμῶν
  english_pob_choice: among our members
  chosen_spanish: entre nuestros miembros
  alternatives_spanish:
  - entre nuestros miembros corporales
  - entre las partes de nuestro cuerpo
  lexicon: BDAG
  rationale: '''Entre nuestros miembros'' mantiene la correspondencia anatómica y el tono bíblico sobrio. ''Miembros'' ya deja ver la referencia al cuerpo sin añadir explicación innecesaria.'
- source_word: σπιλοῦσα
  english_pob_choice: staining
  chosen_spanish: la que mancha
  alternatives_spanish:
  - la que contamina
  - la que ensucia
  - la que defila
  lexicon: BDAG
  rationale: El participio tiene un valor de contaminación moral y visual; 'mancha' es idiomático en español y conserva la imagen de ensuciar/contaminar sin perder la fuerza ética.
- source_word: ὅλον τὸ σῶμα
  english_pob_choice: the whole body
  chosen_spanish: todo el cuerpo
  alternatives_spanish:
  - el cuerpo entero
  - todo el organismo
  lexicon: BDAG
  rationale: '''Todo el cuerpo'' es la forma más clara y literal en español, y preserva el alcance totalizante de ὅλον.'
- source_word: φλογίζουσα
  english_pob_choice: setting on fire
  chosen_spanish: enciende
  alternatives_spanish:
  - prende fuego a
  - inflama
  - va incendiando
  lexicon: BDAG
  rationale: 'El participio se vierte con un verbo simple y vivo en español para mantener el paralelismo con el fuego: ''enciende'' conserva la acción destructiva de manera directa.'
- source_word: τὸν τροχὸν τῆς γενέσεως
  english_pob_choice: the course of life
  chosen_spanish: el curso de la vida
  alternatives_spanish:
  - la rueda de la vida
  - el ciclo de la vida
  - el curso del existir
  lexicon: BDAG
  rationale: La revisión inglesa optó por un giro más natural que 'wheel of birth'. En español, 'curso de la vida' comunica la idea de desarrollo/recorrido vital sin forzar una imagen de 'rueda' que hoy puede sonar más oscura que esclarecedora.
- source_word: φλογιζομένη
  english_pob_choice: being set on fire
  chosen_spanish: es encendida
  alternatives_spanish:
  - está siendo encendida
  - es inflamda
  - queda encendida
  lexicon: BDAG
  rationale: La pasiva se conserva en español para mostrar que la lengua recibe una acción externa. 'Es encendida' mantiene el vínculo con 'enciende' y con la cadena de fuego del versículo.
- source_word: ὑπὸ τῆς γεέννης
  english_pob_choice: by Gehenna
  chosen_spanish: por la Gehena
  alternatives_spanish:
  - por el Gehenna
  - por el infierno
  lexicon: BDAG
  rationale: Se retiene el término técnico 'Gehena' para preservar la precisión histórica y teológica del griego. No se sustituye por 'infierno' para no aplanar el término en una equivalencia doctrinal posterior.
theological_decisions:
- issue: Rendering of γέεννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: la Gehena
  alternative_spanish_readings:
  - el infierno
  rationale: El griego usa γέεννα, término específico que no coincide exactamente con el español 'infierno'. Mantener 'Gehena' conserva la tensión textual y evita importar asociaciones doctrinales posteriores no explicitadas aquí.
  doctrine_reference: Principio de primacía del original y preservación de la precisión conceptual; cf. observación POB sobre evitar aplanar γέεννα.
- issue: Metaphor of ὅλον τὸ σῶμα and σπιλοῦσα
  english_pob_reading: staining the whole body
  chosen_spanish_reading: la que mancha todo el cuerpo
  alternative_spanish_readings:
  - la que defila todo el cuerpo
  - la que contamina todo el cuerpo
  rationale: '''Mancha'' reproduce la imagen de contaminación moral sin endurecer el texto con un tecnicismo innecesario. La ambigüedad entre suciedad física y mancha moral queda visible, como en el griego.'
  doctrine_reference: Lectura ética y antropológica del lenguaje como fuerza corruptora dentro de la comunidad humana.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta la revisión inglesa que prefirió 'course of life' frente a 'wheel of birth'. En español se optó por 'curso de la vida' por naturalidad y por fidelidad al giro revisado, manteniendo 'Gehena' para γέεννα y conservando el paralelismo de acción del fuego a lo largo del versículo.
  spanish_consistency_notes:
  - Se usa 'lengua' para γλῶσσα de forma consistente con el valor metonímico corporal.
  - Se evita 'SEÑOR' o 'infierno' donde el griego ofrece términos más precisos; se preserva 'Gehena'.
  - '''Justicia/injusticia'' se mantiene en el campo moral del griego ἀδικία sin sustituirlo por formulaciones más interpretativas.'
  - La estructura del versículo conserva el encadenamiento de participios y acciones de fuego, aunque con sintaxis española más fluida.
