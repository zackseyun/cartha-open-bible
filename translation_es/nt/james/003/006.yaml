source:
  edition: SBLGNT
  text: καὶ ἡ γλῶσσα πῦρ, ὁ κόσμος τῆς ⸀ἀδικίας ἡ γλῶσσα καθίσταται ἐν τοῖς μέλεσιν ἡμῶν, ἡ σπιλοῦσα ὅλον τὸ σῶμα καὶ φλογίζουσα τὸν τροχὸν τῆς γενέσεως καὶ φλογιζομένη ὑπὸ τῆς γεέννης.
base_translation:
  language: en
  yaml_path: translation/nt/james/003/006.yaml
  text: And the tongue is a fire[a]. The tongue is set among our members as a world of unrighteousness, staining the whole body and setting on fire the course of life[c][b], and being set on fire by Gehenna.
  footnotes:
  - marker: a
    text: Or 'defiling the whole body.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the course of life' or 'the cycle of life' for 'the wheel of birth.'
    reason: lexical_alternative
  - marker: c
    text: Gehenna is the Greek term; traditionally rendered 'hell.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
