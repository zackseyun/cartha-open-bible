revisions:
- from: Y la lengua es fuego[a], un mundo de injusticia. La lengua se coloca entre nuestros miembros, la que mancha todo el cuerpo y enciende el curso de la vida[b], y es encendida por la Gehena[c].
  to: Y la lengua es fuego, un mundo de injusticia. La lengua está puesta entre nuestros miembros, la que mancha[a] todo el cuerpo y enciende el curso de la vida[b], y es encendida por la Gehena[c].
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al participio σπιλοῦσα, se reemplaza «se coloca» por «está puesta» para reflejar mejor καθίσταται, y se alisa ligeramente la sintaxis sin apartarse del original ni de las decisiones léxicas y teológicas documentadas por POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del griego: mantiene la metáfora concreta de «la lengua», la imagen de fuego, «un mundo de injusticia», la contaminación de «todo el cuerpo», el incendio del curso/ciclo vital y la referencia precisa a «Gehena». Sin embargo, hay dos desajustes importantes con la estructura y la auditoría POB: (1) el marcador [a] está mal anclado, porque la nota inglesa corresponde a σπιλοῦσα («manchando/contaminando»), no a «fuego»; (2) «se coloca» suena demasiado dinámico/volitivo para καθίσταται, donde conviene una formulación de estado/posición como «está puesta» o «queda puesta».'
  spanish_quality_summary: El español es legible y digno, pero puede afinarse para mayor naturalidad bíblica y mejor seguimiento sintáctico del original. «Y la lengua es fuego» funciona. «La lengua se coloca entre nuestros miembros» es menos natural que «La lengua está puesta entre nuestros miembros». También conviene integrar mejor «un mundo de injusticia» en aposición. El resto es claro. Las notas necesitan corrección de anclaje y orden.
  glossary_alignment: 'La terminología está mayormente alineada con el proyecto: γλῶσσα -> «lengua» está bien; ἀδικία -> «injusticia» es aceptable aunque «injusticia/iniquidad» siguen siendo alternativas; γέεννα -> «Gehena» preserva correctamente la decisión teológica del POB; σπιλοῦσα -> «mancha» refleja bien la imagen. No hay conflicto con las preferencias troncales del glosario.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «fuego», pero su contenido corresponde a σπιλοῦσα («mancha/contamina»).
    rationale: El English POB preserva como alternativa «defiling the whole body» para el participio σπιλοῦσα, no para πῦρ. En español, la nota debe ir donde aparece «mancha todo el cuerpo», no en «fuego».
  - severity: medium
    issue: «Se coloca» no es la mejor representación de καθίσταται en este contexto.
    rationale: El verbo describe la posición/condición de la lengua entre los miembros del cuerpo, no una acción reflexiva o voluntaria. «Está puesta» o «queda puesta» preserva mejor el matiz y suena más natural en español bíblico moderno.
  - severity: low
    issue: La puntuación y organización de las aposiciones pueden mejorarse.
    rationale: El griego acumula descripciones de «la lengua». En español, «La lengua es fuego; es un mundo de injusticia, puesta entre nuestros miembros...» o una formulación equivalente mejora la claridad sin perder la fuerza metafórica.
  revised_spanish_text: Y la lengua es fuego, un mundo de injusticia. La lengua está puesta entre nuestros miembros, la que mancha[a] todo el cuerpo y enciende el curso de la vida[b], y es encendida por la Gehena[c].
  revised_footnotes:
  - marker: a
    text: 'O: «contamina todo el cuerpo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la rueda de la vida» o «el ciclo de la vida» para τὸν τροχὸν τῆς γενέσεως.'
    reason: lexical_alternative
  - marker: c
    text: Gehena es el término griego; tradicionalmente se traduce «infierno».
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda al participio σπιλοῦσα, se reemplaza «se coloca» por «está puesta» para reflejar mejor καθίσταται, y se alisa ligeramente la sintaxis sin apartarse del original ni de las decisiones léxicas y teológicas documentadas por POB.
