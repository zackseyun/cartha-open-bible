translation:
  language: es
  text: Pero si tienen celos amargos[a] y ambición egoísta[b] en sus corazones[c], no se jacten ni mientan[d] contra la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «celo amargo» o «envidia amarga» para «celos amargos».
    reason: lexical_alternative
  - marker: b
    text: O «rivalidad» o «partidarismo» para «ambición egoísta».
    reason: lexical_alternative
  - marker: c
    text: O «en su corazón».
    reason: previous_rendering
  - marker: d
    text: O «mientan en oposición a la verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῆλον πικρὸν
  english_pob_choice: bitter jealousy
  chosen_spanish: celos amargos
  alternatives_spanish:
  - celos amargos y envidiosos
  - celos amargos / envidia amarga
  lexicon: BDAG
  rationale: ζῆλος puede referirse a celo, celos o envidia según el contexto. Aquí, unido a ἐριθείαν y en sentido negativo, se trata de una pasión rival y destructiva. 'Celos amargos' mantiene el adjetivo πικρόν y comunica el matiz hostil sin fijarlo innecesariamente en una sola equivalente tradicional.
- source_word: ἐριθείαν
  english_pob_choice: selfish ambition
  chosen_spanish: ambición egoísta
  alternatives_spanish:
  - rivalidad
  - partidarismo
  - ambición facciosa
  lexicon: BDAG
  rationale: ἐριθεία denota autoafirmación interesada, rivalidad partidista o afán de promoverse a sí mismo. 'Ambición egoísta' conserva el impulso interior de autoexaltación y su efecto divisivo, de modo claro y natural en español.
- source_word: ἐν τῇ καρδίᾳ ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - en vuestro corazón
  lexicon: BDAG
  rationale: El griego usa singular distributivo con plural de segunda persona. En español, el singular funciona bien como genérico en este contexto y evita una frase menos natural. 'Su' mantiene el valor colectivo dirigido a la audiencia, mientras 'corazón' conserva la localización interior del motivo.
- source_word: μὴ κατακαυχᾶσθε
  english_pob_choice: do not boast
  chosen_spanish: no se jacten
  alternatives_spanish:
  - no se gloríen
  - no se alaben
  lexicon: BDAG
  rationale: κατακαυχάομαι implica jactarse o gloriarse con tono de superioridad. 'No se jacten' es un equivalente claro y sobrio que preserva la advertencia contra la autoexaltación provocada por los celos y la ambición.
- source_word: ψεύδεσθε κατὰ τῆς ἀληθείας
  english_pob_choice: lie against the truth
  chosen_spanish: ni mientan contra la verdad
  alternatives_spanish:
  - ni mientan contra la verdad
  - ni sean falsos frente a la verdad
  - ni mientan en oposición a la verdad
  lexicon: BDAG
  rationale: ψεύδομαι significa mentir, y κατά con genitivo expresa oposición. 'Mentir contra la verdad' reproduce la fuerza adversativa del griego mejor que una paráfrasis suave, manteniendo la tensión retórica de James.
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Y si
  lexicon: BDAG
  rationale: δέ introduce contraste con la sabiduría descrita antes. 'Pero si' es la manera más natural de marcar esa oposición en español.
theological_decisions:
- issue: Alcance de 'la verdad'
  english_pob_reading: Rendered generically as 'the truth' without specifying a doctrinal system or merely subjective sincerity.
  chosen_spanish_reading: La verdad se mantiene en sentido general, sin estrecharla a una fórmula doctrinal ni reducirla a simple honestidad subjetiva.
  alternative_spanish_readings:
  - la verdad del evangelio
  - la verdad del camino sabio
  - la sinceridad de las palabras
  rationale: ἀλήθεια aquí debe seguir siendo suficientemente amplia para abarcar la verdad de Dios frente al autoengaño de la jactancia. Mantenerla genérica evita introducir contenido no explicitado por el versículo y preserva la tensión teológica.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La base inglesa pasó por revisiones menores de claridad en 'in your hearts' y quedó sin cambios posteriores. La presente versión española sigue el texto griego y el expediente inglés, pero adapta la construcción distributiva a un español natural con 'en su corazón'.
  spanish_consistency_notes:
  - Se mantiene 'verdad' sin artículos añadidos ni aclaraciones doctrinales implícitas.
  - Se evita 'Cristo/Mesías' u otra terminología ajena al versículo.
  - '''Celos'' y ''ambición egoísta'' conservan el tono negativo y relacional del pasaje sin suavizarlo.'
  - El singular 'corazón' funciona distributivamente para la audiencia plural y es idiomático en español bíblico contemporáneo.
