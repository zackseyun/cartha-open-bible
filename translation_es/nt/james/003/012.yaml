review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca la línea del English POB: pregunta retórica de imposibilidad, paralelos agrícolas correctos, y clausula final entendida como elipsis relacionada con agua salada/agua dulce. Sin embargo, la nota [b] mezcla dos posibilidades (''agua salada'' o ''fuente/manantial salado'') de forma algo imprecisa respecto al audit trail inglés, que presenta como alternativa de lectura la imagen de ''fuente/manantial salado'' para toda la cláusula final, no solo para el adjetivo aislado.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Hermanos míos'', ''higuera'', ''vid'', ''higos'' y ''agua dulce'' funcionan bien. La frase principal es plenamente legible. El ajuste necesario es menor: conviene afinar las notas para que distingan mejor entre alternativa léxica y lectura alternativa contextual, y para que [c] explique que ''dulce'' se entiende idiomáticamente como ''dulce/fresca'' en contraste con agua salada.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas principales son adecuadas: ἀδελφοί μου -> ''Hermanos míos'' con alternativa inclusiva en nota; συκῆ -> ''higuera''; ἄμπελος -> ''vid''; γλυκύς en contexto hídrico -> ''dulce'' es aceptable en español, especialmente en la expresión estable ''agua dulce''.'
  issues:
  - severity: medium
    issue: La nota [b] no representa con precisión la alternativa documentada en el English POB.
    rationale: El POB inglés no solo dice que ἁλυκόν pueda significar 'agua salada' o 'fuente/manantial salado'; señala que la cláusula final entera puede entenderse, a la luz del v. 11, como 'Tampoco una fuente salada puede producir agua dulce'. La nota española debe reflejar esa lectura alternativa completa para preservar el razonamiento auditado.
  - severity: low
    issue: La nota [c] puede expresar mejor el matiz léxico de γλυκύς.
    rationale: Decir 'aquí el sentido natural ... es agua dulce' es correcto, pero sería más fiel al expediente indicar que el griego dice literalmente 'dulce' y que, en este contraste, la idea es agua dulce/fresca.
  revised_spanish_text: Hermanos míos[a], ¿puede una higuera producir aceitunas, o una vid higos? Tampoco el agua salada[b] puede producir agua dulce[c].
  revised_footnotes:
  - marker: a
    text: O «Hermanos y hermanas míos». El griego usa un plural masculino que puede dirigirse a un grupo mixto.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es elíptica en griego y también puede entenderse, a la luz de la imagen del versículo anterior, como «Tampoco una fuente salada puede producir agua dulce».
    reason: alternative_reading
  - marker: c
    text: Lit. «dulce»; en este contraste con el agua salada, el sentido es «agua dulce» o «agua fresca».
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse. Se revisan solo las notas para alinearlas con mayor precisión al audit trail inglés: la alternativa de [b] debe abarcar la cláusula completa con la imagen de la fuente/manantial, y [c] debe explicar mejor el valor literal e idiomático de γλυκύς.'
