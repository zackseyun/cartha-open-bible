base_translation:
  language: en
  yaml_path: translation/nt/james/003/012.yaml
  text: My brothers[a], can a fig tree produce olives[c][b], or a grapevine figs? Neither can salt water produce fresh water.
  footnotes:
  - marker: a
    text: Or 'My brothers and sisters.' The Greek says 'brothers,' a masculine plural form that can address a mixed group.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sweet water'; in this context the sense is 'fresh water' in contrast to salt water.
    reason: lexical_alternative
  - marker: c
    text: 'The final clause is elliptical in Greek and may also be understood in light of the previous verse''s spring imagery: ''Nor can a salt spring produce fresh water.'''
    reason: alternative_reading
