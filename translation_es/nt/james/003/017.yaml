translation:
  language: es
  text: Pero la sabiduría de arriba es, primero, pura; luego, pacífica, gentil, dispuesta a escuchar, llena de misericordia y de buenos frutos, imparcial[a], sincera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin parcialidad»; el adjetivo griego ἀδιάκριτος también puede entenderse como «indivisa» o «sin incertidumbre/duda».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνωθεν
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - del cielo
  lexicon: BDAG
  rationale: Mantiene la imagen espacial/metafórica de procedencia superior sin especificar más de lo que el griego exige. En español, «de arriba» comunica bien el contraste con la sabiduría terrenal del contexto inmediato.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría divina
  lexicon: BDAG
  rationale: Es el equivalente natural y exacto del sustantivo griego en este catálogo de cualidades. No se añade «divina» porque el contexto ya la define como procedente de arriba.
- source_word: πρῶτον μὲν
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - primero que todo
  lexicon: BDAG
  rationale: Expresa el orden de la lista de manera natural en español y conserva la secuencia enumerativa del original.
- source_word: ἁγνή
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - casta
  - sin mancha
  - limpia
  lexicon: BDAG
  rationale: «Pura» es la correspondencia más clara y directa para la cualidad moral de la sabiduría de arriba. Conserva la amplitud semántica de integridad/limpieza moral sin restringirla innecesariamente.
- source_word: εἰρηνική
  english_pob_choice: peaceable
  chosen_spanish: pacífica
  alternatives_spanish:
  - pacificadora
  - amante de la paz
  lexicon: BDAG
  rationale: En español, «pacífica» describe una disposición inclinada a la paz y funciona con naturalidad dentro de la serie adjetival.
- source_word: ἐπιεικής
  english_pob_choice: gentle
  chosen_spanish: amable
  alternatives_spanish:
  - afable
  - benigna
  - considerada
  lexicon: BDAG
  rationale: Este término griego puede incluir gentileza, mansedumbre y consideración. «Amable» mantiene un tono humano y accesible; aunque no agota todos los matices, encaja bien con la lista de virtudes y evita un calco rígido.
- source_word: εὐπειθής
  english_pob_choice: open to reason
  chosen_spanish: dócil
  alternatives_spanish:
  - enseñable
  - dispuesta a escuchar
  - receptiva a la razón
  lexicon: BDAG
  rationale: El adjetivo sugiere ser persuadible, receptivo y no terco. «Dócil» comunica esa disposición a dejarse guiar o convencer por lo correcto; en este contexto ético resulta más breve y natural que una perífrasis.
- source_word: μεστὴ ἐλέους
  english_pob_choice: full of mercy
  chosen_spanish: llena de misericordia
  alternatives_spanish:
  - colmada de misericordia
  - llena de compasión
  lexicon: BDAG
  rationale: Reproduce de forma directa la idea de abundancia expresada por μεστή con el genitivo ἐλέους. «Misericordia» conserva el valor bíblico del término y resulta consistente con el registro eclesial.
- source_word: καρπῶν ἀγαθῶν
  english_pob_choice: good fruits
  chosen_spanish: buenos frutos
  alternatives_spanish:
  - frutos buenos
  - buen fruto
  - buenas obras
  lexicon: BDAG
  rationale: El plural preserva la imagen de resultados visibles y concretos del carácter sabio. «Buenos frutos» refleja el giro del griego sin convertir la metáfora en interpretación.
- source_word: ἀδιάκριτος
  english_pob_choice: impartial
  chosen_spanish: imparcial
  alternatives_spanish:
  - sin parcialidad
  - sin vacilación
  - sin duda
  - indivisa
  lexicon: BDAG
  rationale: En el flujo ético del pasaje, «imparcial» comunica bien la idea de no mostrar favoritismo. Se preservan alternativas porque el griego también puede sugerir ausencia de división o de duda, según el contexto.
- source_word: ἀνυπόκριτος
  english_pob_choice: sincere
  chosen_spanish: sincera
  alternatives_spanish:
  - sin hipocresía
  - genuina
  - sin fingimiento
  lexicon: BDAG
  rationale: Expresa la ausencia de simulación o máscara moral. «Sincera» es natural en español y conserva el sentido de autenticidad del adjetivo griego.
theological_decisions:
- issue: Valor de ἀδιάκριτος en la lista de cualidades
  english_pob_reading: impartial
  chosen_spanish_reading: imparcial
  alternative_spanish_readings:
  - sin parcialidad
  - sin vacilación
  - indivisa
  rationale: El contexto de Santiago favorece la idea de ausencia de favoritismo, en línea con su preocupación por la acepción de personas. Aun así, el término griego admite otras posibilidades semánticas, por lo que se conserva la tensión textual en las alternativas.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Relación entre ἄνωθεν y el trasfondo divino
  english_pob_reading: from above
  chosen_spanish_reading: de arriba
  alternative_spanish_readings:
  - del cielo
  rationale: «De arriba» mantiene la metáfora sin volverla más explícita de lo que el texto griego hace. Dado el contraste previo con la sabiduría terrenal, la procedencia superior queda clara sin necesidad de sustituirla por una glosa interpretativa.
  doctrine_reference: Translation philosophy §2, Keep metaphor unless source compels clarification
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada en inglés y no requiere revisión adicional según el control más reciente; se mantiene la equivalencia óptima con una sola nota léxica para ἀδιάκριτος.
  spanish_consistency_notes:
  - Se usa «de arriba» para ἄνωθεν, en armonía con el valor metafórico del pasaje y con el uso preferente del proyecto para el origen divino implícito.
  - Se conserva la enumeración adjetival breve del griego con puntuación natural en español.
  - «Misericordia» se mantiene como término bíblico estable en lugar de reemplazarlo por «compasión», para conservar consistencia terminológica.
  - La nota de ἀδιάκριτος queda anclada en el texto con [a] para reflejar la alternativa léxica preservada en el audit trail.
