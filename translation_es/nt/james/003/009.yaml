translation:
  language: es
  text: Con ella bendecimos a Yahvé[a] y Padre, y con ella maldecimos a seres humanos[b] que han sido hechos según la semejanza de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé y Padre»; la expresión puede entenderse en aposición como «Yahvé, que es Padre», o como una designación doble de Dios. El griego dice «κύριον» («Señor»), aquí entendido como título divino.
    reason: alternative_reading
  - marker: b
    text: O «personas»; el griego usa un término masculino plural, pero el sentido aquí es la humanidad en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - por ella
  - en ella
  lexicon: BDAG
  rationale: El contexto inmediato se refiere a la lengua; en español, el instrumento se expresa naturalmente con «con ella». Mantiene la relación instrumental sin sonar forzado con «en ella».
- source_word: εὐλογοῦμεν
  english_pob_choice: we bless
  chosen_spanish: bendecimos
  alternatives_spanish:
  - alabamos
  - decimos bien de
  lexicon: BDAG
  rationale: «Bendecimos» conserva el campo bíblico de bendición y funciona con el objeto divino. «Alabamos» sería más interpretativo y menos preciso para la conexión léxica.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título reverente y natural en español. Aquí funciona como designación divina, no como simple «maestro».
- source_word: καὶ πατέρα
  english_pob_choice: and Father
  chosen_spanish: y Padre
  alternatives_spanish:
  - y el Padre
  - es decir, el Padre
  lexicon: BDAG
  rationale: La coordinación se conserva sin añadir una glosa interpretativa. «Padre» en mayúscula y sin artículo refleja la construcción breve del griego y preserva la posible fuerza apposicional.
- source_word: καταρώμεθα
  english_pob_choice: we curse
  chosen_spanish: maldecimos
  alternatives_spanish:
  - maldedecimos
  - echamos maldiciones sobre
  lexicon: BDAG
  rationale: «Maldecimos» es la equivalencia directa y natural en español. Evita una perífrasis más pesada y conserva el contraste con «bendecimos».
- source_word: ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - seres humanos
  - hombres
  lexicon: BDAG
  rationale: El referente es genérico y humano; «personas» comunica inclusión sin restringir a varones. «Seres humanos» es posible, pero menos ágil aquí.
- source_word: καθ’ ὁμοίωσιν θεοῦ
  english_pob_choice: according to the likeness of God
  chosen_spanish: según la semejanza de Dios
  alternatives_spanish:
  - a semejanza de Dios
  - conforme a la semejanza de Dios
  lexicon: BDAG
  rationale: «Según» reproduce bien el matiz formal de la preposición y deja intacta la relación con el lenguaje de creación. «Semejanza» mantiene el paralelismo semántico con el texto griego.
- source_word: γεγονότας
  english_pob_choice: have been made
  chosen_spanish: han sido hechas
  alternatives_spanish:
  - han llegado a ser
  - han sido creadas
  lexicon: BDAG
  rationale: La pasiva española expresa el resultado y puede sugerir la agencia creadora implícita sin forzarla. «Han llegado a ser» debilitaría el eco de creación; «han sido creadas» sería más explícito de lo que el griego dice.
theological_decisions:
- issue: Relación de «Señor y Padre»
  english_pob_reading: the Lord and Father
  chosen_spanish_reading: el Señor y Padre
  alternative_spanish_readings:
  - el Señor, y Padre
  - el Señor, que es Padre
  - el Señor y el Padre
  rationale: Se conserva la forma breve y la ambigüedad controlada del griego, sin resolverla de antemano. Esto permite leerlo como designación conjunta o apposicional, tal como admite el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Uso de «personas» para ἀνθρώπους
  english_pob_reading: people
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - hombres
  - seres humanos
  rationale: El versículo habla de la humanidad en general, creada a imagen de Dios. «Personas» evita un masculino genérico innecesario y conserva el alcance universal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Eco de creación en «han sido hechas según la semejanza de Dios»
  english_pob_reading: have been made according to the likeness of God
  chosen_spanish_reading: han sido hechas según la semejanza de Dios
  alternative_spanish_readings:
  - fueron hechas conforme a la semejanza de Dios
  - han sido creadas a semejanza de Dios
  rationale: La pasiva compuesta mantiene el estado resultante y el vínculo conceptual con la creación humana a imagen de Dios. Se evita intensificar a «creadas», porque el griego enfatiza el hecho de haber sido hechas/constituidas, no formula aquí el verbo de creación de modo explícito.
  doctrine_reference: Génesis 1:26–27; DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran acuerdo alto y no requieren revisión sustantiva; la principal tensión es la relación de «κύριον καὶ πατέρα», preservada en español con una forma breve y una nota opcional. También se conserva la referencia genérica a la humanidad con una opción léxica inclusiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece יהוה; aquí no aparece, por lo que corresponde «Señor».
  - Se mantiene «bendecimos/maldecimos» para conservar el paralelismo léxico del versículo.
  - La puntuación respeta una sola cláusula coordinada en español, con la segunda parte en paralelo directo a la primera.
  - La nota sobre «Señor y Padre» debe anclarse en la frase exacta «el Señor» para no sobrecargar el texto principal.
