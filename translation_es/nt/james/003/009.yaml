revisions:
- from: Con ella bendecimos al Señor[a] y Padre, y con ella maldecimos a personas[b] que han sido hechas según la semejanza de Dios.
  to: Con ella bendecimos a Yahvé[a] y Padre, y con ella maldecimos a seres humanos[b] que han sido hechos según la semejanza de Dios.
