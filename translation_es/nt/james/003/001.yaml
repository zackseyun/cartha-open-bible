translation:
  language: es
  text: No muchos de ustedes deben llegar a ser maestros, mis hermanos[a], sabiendo que recibiremos un juicio mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hermanos'' aquí probablemente se dirige a toda la comunidad, incluyendo a las hermanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ πολλοὶ
  english_pob_choice: Not many of you should
  chosen_spanish: No muchos de ustedes deben
  alternatives_spanish:
  - No muchos de ustedes deberían
  - No muchos de ustedes deben llegar a ser
  lexicon: BDAG
  rationale: La combinación de μή con el imperativo presente γίνεσθε expresa una prohibición/exhortación. En español, 'No muchos de ustedes deben' comunica con naturalidad esa restricción sin volverla una orden mecánica. Se conserva la dirección al grupo con 'de ustedes', como en el audit trail inglés.
- source_word: διδάσκαλοι
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - maestros y maestras
  - instructores
  lexicon: BDAG
  rationale: διδάσκαλοι denota a quienes enseñan. 'Maestros' es el equivalente natural y digno en español para este contexto eclesial. Se evita 'instructores' por sonar menos idiomático y más técnico.
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: llegar a ser
  alternatives_spanish:
  - volverse
  - ser
  lexicon: BDAG
  rationale: γίνομαι aquí apunta al ingreso o adopción del rol, no solo a una identidad estática. 'Llegar a ser' expresa bien ese proceso en español y mantiene la advertencia contra asumir la función de maestro.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - queridos hermanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego como 'mis hermanos', siguiendo la decisión de precisión de género en el texto principal. Como en el audit trail inglés, el posible alcance inclusivo se deja implícito y no se neutraliza en el cuerpo principal.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque saben
  - ya que saben
  lexicon: BDAG
  rationale: El participio funciona como base de la exhortación. 'Sabiendo' preserva la relación participial sin añadir causalidad más fuerte de la que exige el griego.
- source_word: μεῖζον
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - más severo
  lexicon: BDAG
  rationale: μεῖζον es comparativo de μέγας. En español, 'mayor' reproduce la comparación de manera directa y sobria. Se evita 'severo' porque eso estrecharía el sentido hacia la severidad del castigo, mientras que el griego solo habla de una medida mayor de κρίμα.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: BDAG
  rationale: κρίμα puede abarcar juicio, veredicto o condena. 'Juicio' conserva el alcance amplio y la tensión teológica del texto sin especificar más de lo que el griego dice. 'Condena' sería demasiado cerrado.
- source_word: λημψόμεθα
  english_pob_choice: we will receive
  chosen_spanish: recibiremos
  alternatives_spanish:
  - vamos a recibir
  - incurriremos en
  lexicon: BDAG
  rationale: La forma futura media de λαμβάνω se vierte naturalmente como 'recibiremos'. Se conserva la primera persona plural, que incluye al hablante con los demás, como en el inglés POB.
theological_decisions:
- issue: Alcance de ἀδελφοί μου en una comunidad mixta
  english_pob_reading: Render as 'my brothers' in the main text, with inclusive sense noted in a footnote.
  chosen_spanish_reading: Mantener 'mis hermanos' en el texto principal y anotar que probablemente incluye a toda la comunidad.
  alternative_spanish_readings:
  - mis hermanos y hermanas
  rationale: Se conserva el masculino plural del original en el cuerpo del texto para no aplanar la forma gramatical. Como el uso puede abarcar a toda la iglesia, la posible inclusión se explica en nota en vez de sustituir la forma del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Fuerza de κρίμα en la advertencia a los maestros
  english_pob_reading: Render as 'judgment' rather than 'condemnation.'
  chosen_spanish_reading: Renderizar como 'juicio' y no como 'condena'.
  alternative_spanish_readings:
  - condena
  - sentencia
  rationale: El versículo advierte de una responsabilidad mayor, pero el sustantivo por sí mismo no obliga a una condenación final. 'Juicio' conserva la amplitud semántica y mantiene la tensión doctrinal sin especificar más de lo que afirma el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'greater judgment' a una forma más cercana a μεῖζον κρίμα, sin cambiar la lectura teológica básica. Esta versión española refleja esa cercanía lexical con 'juicio mayor', manteniendo la cautela exegética sobre κρίμα y la participación inclusiva implícita de 'hermanos'.
  spanish_consistency_notes:
  - Se usó 'maestros' para διδάσκαλοι, coherente con el valor general de enseñanza sin introducir un oficio eclesiástico técnico no explicitado por el griego.
  - Se mantuvo 'juicio' para κρίμα y no 'condena', preservando el matiz amplio del sustantivo.
  - Se eligió 'mayor' para μεῖζον por correspondencia directa con el comparativo griego.
  - La nota a pie de página conserva la tensión entre la forma masculina del vocativo y su probable alcance comunitario inclusivo.
