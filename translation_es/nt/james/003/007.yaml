translation:
  language: es
  text: Pues toda clase de fieras y aves, de reptiles y criaturas marinas, se doma y ha sido domada por la humanidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la naturaleza humana» o «por la humanidad». La frase griega τῇ φύσει τῇ ἀνθρωπίνῃ puede entenderse colectivamente, refiriéndose a la humanidad, o más abstractamente, al ámbito o naturaleza humana; el texto principal adopta el sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ... φύσις
  english_pob_choice: every kind
  chosen_spanish: toda clase de
  alternatives_spanish:
  - todo género de
  - toda especie de
  lexicon: BDAG
  rationale: En este catálogo zoológico, φύσις no apunta a “naturaleza” sino a categoría o clase. En español, “toda clase de” comunica mejor el valor distributivo de πᾶσα y evita la lectura filosófica de “naturaleza”.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento de lo anterior; “Porque” conserva esa conexión causal/explicativa de manera natural en español.
- source_word: θηρίων
  english_pob_choice: beast
  chosen_spanish: bestias
  alternatives_spanish:
  - animales salvajes
  - fieras
  lexicon: BDAG
  rationale: La POB inglesa opta por “beast” para reflejar más directamente θηρίων. “Bestias” mantiene esa fuerza léxica en español, aunque suene más marcado que “animales”, y por eso se usa dentro de un catálogo contrastivo.
- source_word: πετεινῶν
  english_pob_choice: bird
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves del cielo
  lexicon: BDAG
  rationale: El término abarca aves o criaturas aladas; “aves” es la forma más sobria y amplia en español, adecuada al registro del texto.
- source_word: ἑρπετῶν
  english_pob_choice: reptile
  chosen_spanish: reptiles
  alternatives_spanish:
  - seres que se arrastran
  - bichos rastreros
  lexicon: BDAG
  rationale: Como en la traducción inglesa, se adopta la categoría moderna “reptiles”, que resulta clara y conserva el paralelismo zoológico del pasaje.
- source_word: ἐναλίων
  english_pob_choice: sea creature
  chosen_spanish: criaturas marinas
  alternatives_spanish:
  - seres del mar
  - animales marinos
  lexicon: BDAG
  rationale: El término señala lo que está en el mar. “Criaturas marinas” es idiomático y suficientemente amplio para abarcar el campo semántico de ἐναλίων.
- source_word: δαμάζεται
  english_pob_choice: is being tamed
  chosen_spanish: se doma
  alternatives_spanish:
  - está siendo domado
  - es domado
  lexicon: BDAG
  rationale: El presente pasivo expresa un hecho general o habitual. En español, “se doma” conserva esa generalidad y suena más natural que una perífrasis más pesada, sin perder el valor de proceso.
- source_word: δεδάμασται
  english_pob_choice: has been tamed
  chosen_spanish: ha sido domada
  alternatives_spanish:
  - está domada
  - ha sido sometida
  lexicon: BDAG
  rationale: El perfecto pasivo presenta un estado resultante de haber sido domado. “Ha sido domada” mantiene esa idea y distingue el segundo verbo del primero, como hace el griego.
- source_word: τῇ φύσει τῇ ἀνθρωπίνῃ
  english_pob_choice: by humankind
  chosen_spanish: por la humanidad
  alternatives_spanish:
  - por la raza humana
  - por el ser humano
  - por la naturaleza humana
  lexicon: BDAG
  rationale: 'Sigo la lectura colectiva del audit trail: el agente es la humanidad en conjunto, no “naturaleza humana” en sentido abstracto. “Por la humanidad” es claro, breve y refleja bien τῇ φύσει τῇ ἀνθρωπίνῃ como sujeto colectivo.'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje con alta concordancia respecto del audit trail inglés: preserva la distinción entre el proceso continuo de domar (δαμάζεται) y el estado resultante (δεδάμασται), así como la lectura colectiva de τῇ φύσει τῇ ἀνθρωπίνῃ. Se optó por equivalentes españoles naturales sin borrar la fuerza zoológica del catálogo ni la tensión entre categoría animal y agente humano.'
  spanish_consistency_notes:
  - Se mantiene “bestias” para θηρία por coherencia con la decisión inglesa de retener la fuerza directa del término.
  - “Por la humanidad” evita introducir “naturaleza humana” como lectura principal, pero conserva la alternativa conceptual implícita en el original.
  - Se usa “se doma” para el presente pasivo general, mientras “ha sido domada” conserva el perfecto resultativo.
  - El registro es formal y publicable, sin caer en calcos innecesarios ni en lenguaje eclesiástico tradicional no motivado por el griego.
