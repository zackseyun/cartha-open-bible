  text: πᾶσα γὰρ φύσις θηρίων τε καὶ πετεινῶν ἑρπετῶν τε καὶ ἐναλίων δαμάζεται καὶ δεδάμασται τῇ φύσει τῇ ἀνθρωπίνῃ·
base_translation:
  language: en
  yaml_path: translation/nt/james/003/007.yaml
  text: For every kind of beast and bird[a], of reptile and sea creature, is being tamed and has been tamed by humankind.
  footnotes:
