revisions:
- from: Y el fruto de justicia se siembra en paz por los que hacen paz[a][b].
  to: Y el fruto de justicia se siembra en paz por los que procuran la paz[a][b].
  rationale: Se mantiene la fidelidad al griego y al audit trail, pero se reemplaza el calco «hacer paz» por «procurar la paz», que comunica con claridad la idea de quienes promueven o realizan la paz. Esto conserva la fuerza verbal del original mejor que un sustantivo como «pacificadores» y suena natural en español contemporáneo de registro bíblico.
