  glossary_alignment: «Justicia» para δικαιοσύνη está alineado con las pautas del proyecto y con la nota alternativa «rectitud / justicia». No hay términos de glosario mayor en conflicto. El ajuste principal es estilístico-lexical en la expresión de ποιέω + εἰρήνην.
