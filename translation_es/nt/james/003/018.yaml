translation:
  language: es
  text: Y el fruto de justicia se siembra en paz por los que procuran la paz[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fruto de la justicia». El término griego puede abarcar matices morales y también relacionales o legales.
    reason: lexical_alternative
  - marker: b
    text: O «para los que procuran la paz». El dativo griego puede entenderse de otra manera, aunque «por los que procuran la paz» encaja mejor con el verbo pasivo.
    reason: alternative_reading
lexical_decisions:
- source_word: καρπὸς
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - cosecha
  - producción
  lexicon: BDAG
  rationale: ‘Fruto’ preserva la metáfora agrícola y el singular del griego, igual que la decisión inglesa de mantener ‘fruit’ en vez de ‘harvest’.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace suave, no como oposición fuerte; ‘Y’ reproduce la continuidad del argumento anterior.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En español, ‘justicia’ conserva la amplitud moral y relacional que la nota inglesa atribuye al término. Se evita ‘justicia’ como mera categoría judicial estrecha, pero se mantiene por ser la opción principal del proyecto para δικαιοσύνη.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - de manera pacífica
  lexicon: BDAG
  rationale: ‘En paz’ es el equivalente natural y mantiene la imagen de esfera o modo de la siembra. ‘Con paz’ sonaría más explicativo que el griego.
- source_word: σπείρεται
  english_pob_choice: is sown
  chosen_spanish: se siembra
  alternatives_spanish:
  - es sembrado
  - está siendo sembrado
  lexicon: BDAG
  rationale: El presente pasivo se expresa de forma idiomática en español con la pasiva refleja ‘se siembra’, que conserva la voz pasiva sin endurecer la frase.
- source_word: τοῖς ποιοῦσιν εἰρήνην
  english_pob_choice: by those who make peace
  chosen_spanish: por los que hacen paz
  alternatives_spanish:
  - por los pacificadores
  - para los que hacen paz
  lexicon: BDAG
  rationale: ‘Por los que hacen paz’ refleja la lectura agentiva preferida por el audit trail y mantiene la construcción verbal ποιέω + εἰρήνην. ‘Hacer paz’ evita sustituir el verbo por un sustantivo más libre como ‘pacificadores’.
theological_decisions:
- issue: Sentido de ‘fruto de justicia’
  english_pob_reading: An ethical result or yield characterized by righteousness, flowing from heavenly wisdom and peaceable conduct.
  chosen_spanish_reading: Un fruto caracterizado por la justicia, es decir, un resultado ético producido y acompañado por la paz.
  alternative_spanish_readings:
  - una cosecha que consiste en justicia
  - un fruto que produce justicia
  rationale: 'Se conserva la tensión genitiva sin resolverla en exceso: el griego admite un fruto que pertenece a la justicia o que la expresa. ‘Fruto de justicia’ permite ambas posibilidades y sigue la cautela del texto inglés.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de cerrarla innecesariamente.'
- issue: Valor del dativo en τοῖς ποιοῦσιν εἰρήνην
  english_pob_reading: ‘by those who make peace’ best fits the passive verb here, though ‘for those who make peace’ remains possible.
  chosen_spanish_reading: ‘por los que hacen paz’ como sentido principal, dejando abierta la posibilidad de una relación dativa menos explícita.
  alternative_spanish_readings:
  - para los que hacen paz
  - a favor de los que hacen paz
  rationale: La pasiva ‘se siembra’ favorece una lectura agentiva con por. Aun así, se conserva la ambigüedad del dativo mediante una nota, porque el griego podría entenderse de otra manera.
  doctrine_reference: Translation philosophy §3; mantener la ambigüedad donde el griego no fuerza una sola lectura.
translation_notes:
  revision_awareness: Sin cambios respecto del último pase revisado; la formulación mantiene el acuerdo alto con el texto griego y con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo ‘justicia’ como término principal para δικαιοσύνη, coherente con el proyecto, y se preservó en nota la alternativa ‘justicia’ en sentido lexical amplio frente a ‘righteousness’.
  - Se optó por la pasiva refleja ‘se siembra’ para un español natural, sin perder la voz pasiva del griego.
  - Se conservó la imagen de ‘fruto’ y la estructura breve del versículo, evitando ampliaciones interpretativas.
