translation:
  language: es
  text: Porque todos tropezamos de muchas maneras. Si alguno no tropieza en lo que dice[a], este es un hombre maduro[b][c], capaz también de refrenar todo el cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en palabra», es decir, en el hablar o en lo que dice.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «perfecto». El griego τέλειος puede significar «perfecto», «completo» o «maduro»; aquí probablemente se refiere a madurez moral más que a ausencia absoluta de pecado.'
    reason: lexical_alternative
  - marker: c
    text: El griego dice «hombre» (ἀνήρ), usado aquí con fuerza representativa en una afirmación general.
    reason: cultural_note
lexical_decisions:
- source_word: πολλὰ
  english_pob_choice: in many ways
  chosen_spanish: en muchas cosas
  alternatives_spanish:
  - de muchas maneras
  - en muchos aspectos
  lexicon: BDAG
  rationale: El acusativo neutro plural funciona adverbialmente con πταίομεν; en español, "en muchas cosas" conserva la amplitud de las fallas sin volverlo demasiado abstracto. "De muchas maneras" también es posible, pero suena menos ligado a la idea de tropezar en distintos ámbitos.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o base de la afirmación previa. "Porque" comunica bien la fuerza explicativa en español y mantiene el vínculo discursivo sin sobretraducir.
- source_word: πταίομεν / πταίει
  english_pob_choice: stumble
  chosen_spanish: tropezamos / tropieza
  alternatives_spanish:
  - caemos
  - fallamos
  - pecamos
  lexicon: BDAG
  rationale: '"Tropezar" preserva la imagen literal y metafórica del verbo griego, igual que en inglés POB "stumble". Evita reducir el sentido a un mero "pecar" o "fallar" y conserva la continuidad conceptual con la metáfora corporal del pasaje.'
- source_word: ἅπαντες
  english_pob_choice: we all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - todos y cada uno
  lexicon: BDAG
  rationale: La inclusión universal queda clara en español con "todos"; el sujeto ya está implícito en el verbo de primera persona plural. Es conciso y natural.
- source_word: ἐν λόγῳ
  english_pob_choice: in word
  chosen_spanish: en la palabra
  alternatives_spanish:
  - en lo que dice
  - en el hablar
  - en la palabra dicha
  lexicon: BDAG
  rationale: Sigo la decisión de conservar la expresión compacta de λόγος. "En la palabra" mantiene el carácter breve y amplio de la construcción, aunque en nota se aclara que se refiere al hablar o a lo que uno dice.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - esa persona
  - él
  lexicon: BDAG
  rationale: El demostrativo enfatiza al individuo hipotético. En español, "este" conserva esa deixis mejor que un simple pronombre personal.
- source_word: τέλειος
  english_pob_choice: mature
  chosen_spanish: maduro
  alternatives_spanish:
  - perfecto
  - completo
  - íntegro
  lexicon: BDAG
  rationale: En Santiago, τέλειος suele tener sentido de plenitud o madurez moral, no de impecabilidad absoluta. "Maduro" comunica esa idea de carácter formado sin borrar la tensión teológica con el hecho de que todos tropiezan.
- source_word: ἀνήρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: BDAG
  rationale: El griego usa ἀνήρ de forma masculina, y el POB lo conserva con fuerza representativa. "Hombre" mantiene la forma de fuente y su valor proverbial general, mientras el contexto de "si alguno" evita una lectura restrictiva.
- source_word: δυνατὸς
  english_pob_choice: able
  chosen_spanish: capaz
  alternatives_spanish:
  - apto
  - con poder para
  lexicon: BDAG
  rationale: '"Capaz" expresa adecuadamente la habilidad resultante de la madurez y suena natural en español contemporáneo.'
- source_word: χαλιναγωγῆσαι
  english_pob_choice: to bridle
  chosen_spanish: refrenar
  alternatives_spanish:
  - domar
  - frenar
  - poner freno a
  lexicon: BDAG
  rationale: Aunque el verbo griego alude literalmente a conducir con freno o brida, en español "refrenar" comunica control y disciplina sin perder la metáfora de gobierno del cuerpo. Evita la torpeza de una traducción demasiado mecánica como "bridar".
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - e incluso
  - además
  lexicon: BDAG
  rationale: Marca adición simple. "También" reproduce el avance lógico hacia la capacidad de gobernar todo el cuerpo.
- source_word: ὅλον τὸ σῶμα
  english_pob_choice: the whole body
  chosen_spanish: todo el cuerpo
  alternatives_spanish:
  - el cuerpo entero
  - todo su cuerpo
  lexicon: BDAG
  rationale: El griego no expresa un posesivo explícito; "todo el cuerpo" es fiel y natural en español. En el contexto, refiere a la persona entera bajo autocontrol, pero no conviene añadir pronombre que el texto no da.
theological_decisions:
- issue: Sentido de τέλειος en contexto moral
  english_pob_reading: mature rather than absolutely perfect/sinless
  chosen_spanish_reading: maduro, no absolutamente perfecto ni sin pecado
  alternative_spanish_readings:
  - perfecto
  - completo
  - íntegro
  rationale: Santiago contrapesa la idea de madurez con la confesión de que todos tropezamos. "Maduro" evita sugerir impecabilidad moral y conserva la tensión entre crecimiento real y limitación humana.
  doctrine_reference: Translation philosophy §3, §6
- issue: Uso de ἀνήρ con fuerza representativa
  english_pob_reading: man with generic force
  chosen_spanish_reading: hombre como forma masculina representativa en una afirmación general
  alternative_spanish_readings:
  - persona
  - varón
  rationale: La fuente griega es masculina, y la tradición de la POB procura no ocultar ese dato cuando tiene valor textual. El condicional general "si alguno" asegura que el alcance sigue siendo universal.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue el estado más reciente del expediente, que no requiere cambios; la decisión de mantener una equivalencia óptima conserva la metáfora de tropezar y la oposición entre el hablar y el control del cuerpo, sin añadir glosas al cuerpo del versículo.
  spanish_consistency_notes:
  - Se conserva la terminología preferida del proyecto para el verbo πταίω con "tropezar".
  - Se mantiene "maduro" para τέλειος, como opción que evita implicar impecabilidad sin borrar el matiz ético.
  - Se respeta la fuerza representativa de ἀνήρ con "hombre", aclarada en nota.
  - La expresión "en la palabra" se mantiene en el texto y se explica en nota para que no se pierda su compactación griega.
  - No se añade posesivo en "todo el cuerpo", siguiendo la ausencia de pronombre explícito en el griego.
