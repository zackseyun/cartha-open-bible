base_translation:
  language: en
  yaml_path: translation/nt/james/003/002.yaml
  text: For we all stumble in many ways[a]. If anyone does not stumble in word, this one is a mature man[c][b], able also to bridle the whole body.
  footnotes:
  - marker: a
    text: Or 'perfect man.' The Greek τέλειος can mean 'perfect,' 'complete,' or 'mature'; here it likely refers to moral maturity rather than absolute sinlessness.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in word,' that is, in speech or in what he says.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'man' (ἀνήρ), used here with representative force in a general statement.
    reason: cultural_note
