    rationale: El borrador afirma que debe preservarse la tensión gramatical en el texto principal, pero el English POB ya resolvió explícitamente que esa tensión se preserve en nota y no en la línea principal. La revisión debe alinearse con ese criterio documentado.
  revised_spanish_text: Honra a tu padre y a tu madre[a], y ama a tu prójimo como a ti mismo.
