translation:
  language: es
  text: Honra a tu padre y a tu madre[a], y ama a tu prójimo como a ti mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Honra a tu padre y a tu madre, y amarás a tu prójimo como a ti mismo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Honra
  - Da honor a
  - Respeta
  lexicon: τιμάω
  rationale: El verbo griego exige más que una actitud interna; expresa dar el debido honor, en eco del mandamiento. «Honra» conserva la fuerza normativa y el tono bíblico natural en español.
- source_word: τὸν πατέρα
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre
  - a tu padre
  lexicon: πατήρ
  rationale: Aunque el griego tiene artículo, el contexto del mandamiento en español requiere el posesivo explícito para reflejar la dirección personal del precepto. «A tu padre» es la forma natural y fiel.
- source_word: τὴν μητέρα
  english_pob_choice: mother
  chosen_spanish: y a tu madre
  alternatives_spanish:
  - y a tu madre
  - y madre
  lexicon: μήτηρ
  rationale: Se mantiene la coordinación del mandamiento y el posesivo implícito de la formulación bíblica. En español, repetir «tu» sería posible, pero «a tu padre y a tu madre» suena más natural y conserva el paralelismo.
- source_word: Ἀγαπήσεις
  english_pob_choice: love
  chosen_spanish: amarás
  alternatives_spanish:
  - amarás
  - amar
  - tú amarás
  lexicon: ἀγαπάω
  rationale: El futuro indicativo griego funciona como forma de mandamiento citada de la Torá. En español, «amarás» preserva mejor esa forma formal que un imperativo simple, y mantiene la tensión gramatical documentada en la fuente.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu prójimo
  - a tu vecino
  - a tu semejante
  lexicon: πλησίον
  rationale: En este contexto ético, πλησίον corresponde al prójimo del mandamiento de Levítico 19:18. «Prójimo» es el equivalente más preciso y eclesialmente comprensible en español.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a ti mismo
  - como tú mismo
  lexicon: σεαυτόν
  rationale: La comparación es breve e idiomática en griego. «Como a ti mismo» preserva el sentido sin añadir explicación y suena natural en español bíblico moderno.
theological_decisions:
- issue: 'Forma verbal mixta: imperativo y futuro indicativo en una cita de mandamiento'
  english_pob_reading: Use English imperatives ('Honor ... and love ...') rather than mixed imperative/future forms in the main text, with a note preserving the more formal 'you shall love.'
  chosen_spanish_reading: Conservar el imperativo «Honra» y el futuro «amarás» en el texto principal.
  alternative_spanish_readings:
  - Honra ... y ama ...
  - Honra ... y amarás ...
  rationale: El griego combina un imperativo con un futuro indicativo al citar lenguaje de mandamiento. En español, mantener «amarás» preserva la tensión formal del original y evita nivelar la diferencia gramatical que la fuente documenta. Por eso la traducción no resuelve la tensión en una forma uniforme.
  doctrine_reference: Principio de equivalencia óptima; preservar tensiones gramaticales significativas del texto fuente.
translation_notes:
  revision_awareness: El contexto auditado en inglés indica alta concordancia y ningún cambio reciente en la decisión principal. Se conserva en español la tensión gramatical observada en el griego (imperativo + futuro) y se adapta de forma natural la fórmula del mandamiento.
  spanish_consistency_notes:
  - Se usa «Honra» para τιμάω, manteniendo el valor normativo del mandamiento.
  - Se prefiere «prójimo» para πλησίον por su correspondencia estable con el mandamiento de Levítico 19:18.
  - La nota conserva la alternativa más formal con «amarás», alineada con la observación auditada del inglés.
  - El texto evita «SEÑOR» u otras sustituciones no presentes; no hay términos divinos en este versículo.
