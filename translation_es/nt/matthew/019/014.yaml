translation:
  language: es
  text: 'Pero Jesús dijo: «Dejen que los niños vengan a mí, y no se lo impidan, porque el reino de los cielos es de personas como estas[a][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «porque de tales es el reino de los cielos».'
    reason: lexical_alternative
  - marker: b
    text: «Personas como estas» puede referirse no solo a los niños presentes, sino también a personas de esa clase o condición.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄφετε
  english_pob_choice: Let
  chosen_spanish: Dejen que
  alternatives_spanish:
  - Permitan que
  - Dejen
  lexicon: ἀφίημι
  rationale: El imperativo aoristo aquí funciona como una autorización o permiso. «Dejen que» expresa con naturalidad esa fuerza en español y conserva el carácter directo de la orden de Jesús.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los niños pequeños
  - los pequeños
  lexicon: παιδίον
  rationale: παιδία puede referirse a niños, a menudo pequeños. «Los niños» es amplio, claro y no añade una diminución más fuerte de la que exige el término griego.
- source_word: μὴ κωλύετε
  english_pob_choice: do not hinder
  chosen_spanish: no se lo impidan
  alternatives_spanish:
  - no los estorben
  - no los impidan
  lexicon: κωλύω
  rationale: κωλύω significa impedir, estorbar o vedar. En español, «no se lo impidan» comunica bien la idea de obstaculizar que ellos vengan, con un complemento natural en la construcción con infinitivo.
- source_word: αὐτὰ ἐλθεῖν πρός με
  english_pob_choice: them from coming to me
  chosen_spanish: a venir a mí
  alternatives_spanish:
  - de venir a mí
  - para venir a mí
  lexicon: ἔρχομαι
  rationale: La construcción con κωλύω + infinitivo se expresa en español de forma natural con «impedir a venir». Aunque la formulación resulte algo más compacta, conserva la dirección del movimiento hacia Jesús (πρός με).
- source_word: τῶν γὰρ τοιούτων
  english_pob_choice: for ... to such as these
  chosen_spanish: de los que son como estos
  alternatives_spanish:
  - porque de los tales
  - porque de personas como estas
  lexicon: τοιοῦτος
  rationale: τοιούτων no señala solo a los niños presentes, sino a personas de esa clase o condición. «De los que son como estos» preserva esa referencia representativa sin reducirla únicamente a los niños ni resolverla interpretativamente.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino celestial
  lexicon: βασιλεία
  rationale: Mateo usa su expresión característica. «El reino de los cielos» es la forma española establecida y fiel al uso del evangelio, sin sustituirla por una paráfrasis menos precisa.
- source_word: ἐστὶν
  english_pob_choice: belongs
  chosen_spanish: es
  alternatives_spanish:
  - pertenece
  - corresponde
  lexicon: εἰμί
  rationale: Aunque el inglés POB optó por «belongs to» para explicitar la relación, el griego dice literalmente «es». En español, «es» conserva esa fuerza y permite mantener la tensión de la construcción genitiva, que queda reflejada en la nota.
theological_decisions:
- issue: 'Alcance de τοιούτων: niños presentes o personas de su misma clase'
  english_pob_reading: Render τοιούτων as 'such as these,' preserving both the immediate reference to children and the broader representative force.
  chosen_spanish_reading: «de los que son como estos» mantiene tanto la referencia inmediata a los niños presentes como la fuerza representativa más amplia.
  alternative_spanish_readings:
  - «de estos niños»
  - «de los que son como niños»
  rationale: El griego sugiere una referencia que va más allá de los individuos presentes, pero no define explícitamente la cualidad en vista. La traducción elegida conserva esa tensión sin cerrarla en una interpretación más estrecha o más explicativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación entre βασιλεία y el genitivo τῶν οὐρανῶν
  english_pob_reading: '''belongs to such as these'' instead of a literal ''of such is the kingdom of heaven.'''
  chosen_spanish_reading: «es el reino de los cielos» mantiene la construcción más cercana al griego y evita sobrerresolver la relación semántica.
  alternative_spanish_readings:
  - «pertenece a los que son como estos»
  - «es de los que son como estos»
  rationale: El texto griego permite entender una relación de pertenencia o pertenencia caracterizadora, pero literalmente dice que el reino «es» de tal clase. En español, mantener «es» conserva la sobriedad del original y deja la explicación en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el audit trail inglés. Se mantuvo la tensión del genitivo en τῶν τοιούτων y la frase característica mateana «el reino de los cielos». No se adoptó una paráfrasis más interpretativa para el alcance de τοιούτων; en su lugar, la nota preserva la alternativa literal y la lectura representativa.
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς.
  - Se usó «reino de los cielos» como equivalente establecido de ἡ βασιλεία τῶν οὐρανῶν.
  - Se mantuvo «niños» para παιδία, sin imponer una lectura más estrecha de «niños pequeños».
  - Se conservó la distinción entre la orden de permitir y el impedimento de venir a Jesús.
  - La nota a recupera la alternativa literal del griego; la nota b preserva la lectura representativa documentada en el audit trail.
