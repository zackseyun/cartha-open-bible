revisions:
- from: 'Pero Jesús dijo: «Dejen que los niños[vayan], y no se lo impidan a venir a mí[a], porque de los que son como estos es el reino de los cielos[b]».'
  to: 'Pero Jesús dijo: «Dejen que los niños vengan a mí, y no se lo impidan, porque el reino de los cielos es de personas como estas[a][b]».'
  rationale: La revisión corrige la sintaxis española para reflejar con naturalidad Ἄφετε… μὴ κωλύετε αὐτὰ ἐλθεῖν πρός με, elimina la inserción impropia «[vayan]», y reubica las notas donde corresponden semánticamente. «Dejen que los niños vengan a mí, y no se lo impidan» transmite bien el mandato doble. «El reino de los cielos es de personas como estas» mantiene la fuerza representativa de τοιούτων y conserva una cercanía razonable al griego, mientras la nota literal preserva «de tales es».
  reviewer_model: gpt-5.4
