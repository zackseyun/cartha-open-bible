  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: λέγουσιν αὐτῷ → «Ellos le dijeron», Τί οὖν → «¿Por qué, entonces...?», ἐνετείλατο → «mandó», δοῦναι βιβλίον ἀποστασίου → «dar un certificado de divorcio». También conserva correctamente que Moisés es presentado por los interlocutores como quien «mandó», sin anticipar la corrección de Jesús en el v. 8. Sin embargo, «despedirla» para ἀπολῦσαι αὐτήν suena en español moderno principalmente a despedir a una empleada, y debilita el matiz matrimonial/legal de esta discusión. El sentido contextual de divorcio debe mantenerse mejor en español.'
  spanish_quality_summary: El texto es claro y legible, pero «despedirla» resulta poco natural y potencialmente ambiguo en contexto matrimonial. «Repudiarla» suena más idiomático y bíblicamente adecuado en español eclesial, preservando a la vez el valor de «send away» sin reducirlo mecánicamente a «divorciarla». La puntuación y el registro general son buenos.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión clave es léxica-contextual: para ἀπολύω en contexto de esposa, «repudiarla» alinea mejor con la explicación inglesa («send her away» con función de divorcio) que «despedirla».'
