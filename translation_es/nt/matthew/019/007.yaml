  rationale: Se reemplaza «despedirla» por «repudiarla» para expresar con mayor naturalidad e idoneidad contextual el acto de apartar a la esposa en un marco de divorcio. Se conserva una nota con la alternativa «divorciarla» y se reubica el marcador al término relevante.
