translation:
  language: es
  text: 'Ellos le dijeron: «¿Por qué, entonces, mandó Moisés dar un certificado de divorcio y repudiarla[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y divorciarla». El verbo griego puede significar «despedir» o «enviar lejos» y, en este contexto, funciona como término para el divorcio.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Le dicen
  - Le dijeron
  lexicon: BDAG
  rationale: Se mantiene el valor narrativo natural en español con pasado perfecto simple. El pronombre de objeto indirecto 'le' conserva el destinatario del discurso sin añadir nada al griego.
- source_word: Τί οὖν
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces?
  alternatives_spanish:
  - ¿Qué, entonces?
  - ¿Por qué entonces?
  lexicon: BDAG
  rationale: En este contexto interrogativo de objeción, 'por qué' expresa mejor el cuestionamiento de fondo que un literal 'qué'. Se conserva 'entonces' para el vínculo argumentativo.
- source_word: ἐνετείλατο
  english_pob_choice: command
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato
  lexicon: BDAG
  rationale: '''Mandó'' comunica con naturalidad la fuerza de un mandato en español. Se evita una formulación demasiado solemne o redundante, sin debilitar el sentido de orden explícita del verbo.'
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - dar la instrucción de
  lexicon: BDAG
  rationale: Infinitivo simple y directo que reproduce la relación complementaria con ἐνετείλατο sin sobreexplicar.
- source_word: βιβλίον ἀποστασίου
  english_pob_choice: a certificate of divorce
  chosen_spanish: un certificado de divorcio
  alternatives_spanish:
  - un acta de divorcio
  - una carta de divorcio
  lexicon: BDAG
  rationale: Se conserva el valor de documento legal escrito. 'Certificado de divorcio' es claro en español moderno y mantiene el carácter formal del sustantivo compuesto.
- source_word: ἀποστασίου
  english_pob_choice: of divorce
  chosen_spanish: de divorcio
  alternatives_spanish:
  - de separación
  lexicon: BDAG
  rationale: El genitivo especifica el tipo de documento. 'Divorcio' refleja mejor el uso legal del pasaje que un sentido vago de separación.
- source_word: ἀπολῦσαι
  english_pob_choice: to send her away
  chosen_spanish: despedirla
  alternatives_spanish:
  - repudiarla
  - enviarla lejos
  - divorciarla
  lexicon: BDAG
  rationale: '''Despedirla'' reproduce el matiz idiomático de ἀπολύω como acto de despedir a una esposa, con posible efecto de divorcio. Se evita ''divorciarla'' porque en español suena menos cercano al verbo griego y puede introducir una abstracción legal no explícita aquí.'
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la mujer
  lexicon: BDAG
  rationale: El acusativo femenino singular se vierte con el pronombre átono directo natural en español, manteniendo la referencia a la esposa implícita en el contexto.
theological_decisions:
- issue: Si la frase debe anticipar la corrección de Jesús en el versículo siguiente, suavizando la forma de la pregunta de los fariseos
  english_pob_reading: Retain 'command' in the main text
  chosen_spanish_reading: Mantener una formulación que preserve el mandato en la pregunta, sin convertirlo en permiso implícito
  alternative_spanish_readings:
  - ¿Por qué entonces permitió Moisés...?
  - ¿Por qué entonces dejó Moisés...?
  rationale: El griego presenta explícitamente ἐνετείλατο, 'mandó'. No conviene armonizar prematuramente con la explicación de Jesús en el versículo siguiente. La traducción debe conservar el marco argumentativo de los interlocutores tal como está formulado.
  doctrine_reference: Principio de fidelidad al texto fuente; distinción entre la pregunta de los fariseos y la aclaración de Jesús en Mt 19:8
translation_notes:
  revision_awareness: Se siguió el ajuste del texto inglés revisado al omitir cualquier pronombre añadido como 'nosotros' que no aparece en el griego. También se preservó la distinción entre el documento legal ('certificado de divorcio') y el verbo idiomático ('despedirla') sin fusionarlos en una sola paráfrasis.
  spanish_consistency_notes:
  - Se usó 'Moisés' y no un equivalente indirecto, porque el sujeto explícito del griego debe permanecer visible.
  - '''Divorcio'' se mantiene como término legal central; no se reemplazó por ''separación'' para no debilitar la referencia a Deuteronomio 24.'
  - La puntuación de diálogo sigue el uso español estándar con comillas angulares.
  - El pie de nota se ancla en 'le dijo[a]' para reflejar la alternativa lexical relevante de ἀπολῦσαι.
