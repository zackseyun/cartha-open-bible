lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa griega se reproduce con un giro natural en español. «Y sucedió» conserva el valor de transición sin recurrir a un arcaísmo como «aconteció».},{
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, manteniendo el orden narrativo y la referencia geográfica sin cambios doctrinales o textuales.
  spanish_consistency_notes:
  - Se usó «Jesús» como nombre propio establecido.
  - Se mantuvo «Judea» como topónimo y «Jordán» con artículo singular implícito en la construcción preposicional.
  - «Región de Judea» refleja el sentido geográfico de τὰ ὅρια sin forzar una idea estricta de límites administrativos.
