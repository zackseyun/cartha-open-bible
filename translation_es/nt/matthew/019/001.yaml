revisions:
- from: Y sucedió que, cuando Jesús hubo terminado estas palabras[a], se apartó de Galilea y fue a la región de Judea, al otro lado del Jordán.
  to: Y sucedió que, cuando Jesús hubo terminado estas palabras, partió de Galilea y llegó a la región de Judea, más allá[a] del Jordán.
  rationale: Se reubica la nota al pie para anclarla a «más allá del Jordán», que es donde pertenece la alternativa léxica documentada. Además, se ajusta «se apartó» a «partió» para reflejar mejor μετῆρεν como salida geográfica, y «fue» a «llegó» para conservar con mayor precisión ἦλθεν εἰς.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:14:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: fórmula narrativa, finalización del discurso, salida de Galilea y llegada a la región de Judea más allá del Jordán. Sin embargo, la nota al pie está anclada en «estas palabras», pero la alternativa léxica documentada corresponde a πέραν τοῦ Ἰορδάνου, no a τοὺς λόγους τούτους.'
  spanish_quality_summary: El español es claro y digno. «Y sucedió que» y «hubo terminado» funcionan bien. «Se apartó de Galilea» es comprensible, pero «partió de Galilea» o «salió de Galilea» refleja mejor μετῆρεν como movimiento geográfico sin sugerir distanciamiento personal. «Fue a la región» es aceptable, aunque «llegó a la región» preserva mejor ἦλθεν εἰς.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Los topónimos «Galilea», «Judea» y «Jordán» están bien. La principal corrección es de precisión léxica y colocación de la nota, no de terminología doctrinal.
  issues:
  - severity: high
    issue: La nota al pie está colocada en la frase equivocada.
    rationale: La nota «O «al otro lado del Jordán»» corresponde a πέραν τοῦ Ἰορδάνου («más allá/del otro lado del Jordán»), pero en el borrador el marcador [a] está puesto después de «estas palabras», creando una relación semántica incorrecta.
  - severity: medium
    issue: «Se apartó de Galilea» no es la mejor opción para μετῆρεν.
    rationale: Aunque puede sugerir salida, en español suele sonar a alejarse o apartarse de algo/alguien. En un contexto de desplazamiento narrativo, «partió de Galilea» o «salió de Galilea» es más natural y fiel.
  - severity: low
    issue: «Fue a la región de Judea» suaviza ἦλθεν εἰς.
    rationale: El griego expresa llegada/entrada. «Llegó a la región de Judea» o «vino a la región» preserva mejor el matiz de movimiento hacia e ingreso en la zona.
  revised_spanish_text: Y sucedió que, cuando Jesús hubo terminado estas palabras, partió de Galilea y llegó a la región de Judea, más allá[a] del Jordán.
  revised_footnotes:
  - marker: a
    text: O «al otro lado del Jordán».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie para anclarla a «más allá del Jordán», que es donde pertenece la alternativa léxica documentada. Además, se ajusta «se apartó» a «partió» para reflejar mejor μετῆρεν como salida geográfica, y «fue» a «llegó» para conservar con mayor precisión ἦλθεν εἰς.
