translation:
  language: es
  text: 'De nuevo les digo: es más fácil que un camello[a][b] pase por el ojo de una aguja que un hombre rico entre en el reino de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «por el ojo de una aguja».
    reason: lexical_alternative
  - marker: b
    text: Algunos han sugerido «cuerda» en lugar de «camello», pero el texto griego aquí dice «camello».
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν δὲ
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Otra vez les digo
  lexicon: BDAG
  rationale: πάλιν expresa repetición; en español, «Otra vez» comunica con naturalidad la reanudación del dicho. δέ funciona como conector leve y no exige un equivalente separado en la frase principal.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: La fórmula directa de discurso se transmite mejor con «les digo», manteniendo el contacto personal y el presente enunciativo sin volverlo más solemne de lo que el griego pide.
- source_word: εὐκοπώτερόν ἐστιν
  english_pob_choice: it is easier
  chosen_spanish: más fácil es
  alternatives_spanish:
  - es más fácil
  - resulta más fácil
  lexicon: BDAG
  rationale: El comparativo idiomático se puede traducir de forma natural como «más fácil es»; conserva el sentido de comparación marcada por el griego.
- source_word: κάμηλον
  english_pob_choice: a camel
  chosen_spanish: un camello
  alternatives_spanish:
  - un camello
  - una cuerda
  lexicon: BDAG
  rationale: El texto griego atestiguado dice κάμηλον, «camello». Debe preservarse la imagen hiperbólica fuerte, sin rebajarla a «cuerda».
- source_word: διὰ τρυπήματος ῥαφίδος
  english_pob_choice: through the eye of a needle
  chosen_spanish: por el ojo de una aguja
  alternatives_spanish:
  - a través del ojo de una aguja
  - por el orificio de una aguja
  lexicon: BDAG
  rationale: La construcción genitiva designa la abertura de una aguja de coser. En español, «el ojo de una aguja» es la forma idiomática clara y fiel.
- source_word: εἰσελθεῖν
  english_pob_choice: to go through
  chosen_spanish: pase
  alternatives_spanish:
  - entre
  - cruce
  lexicon: BDAG
  rationale: En la imagen del camello y la aguja, el infinitivo apunta al movimiento de pasar por la abertura; «pase» suena natural en el español de la comparación.
- source_word: πλούσιον
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - una persona rica
  lexicon: BDAG
  rationale: El adjetivo sustantivado masculino singular se conserva como «un rico», que mantiene la forma gramatical y la fuerza representativa del dicho.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: to enter into the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - al reino de Dios
  - dentro del reino de Dios
  lexicon: BDAG
  rationale: En español, con «entrar» suele sonar más natural «entrar en». El sentido final de llegada al ámbito del reino queda claro sin forzar un calco de «entrar en» dentro de la cláusula comparativa.
theological_decisions:
- issue: Interpretación de la imagen del camello y la aguja
  english_pob_reading: A deliberate hyperbolic comparison expressing extreme human impossibility apart from God, without allegorizing the image into a specific gate or technical metaphor.
  chosen_spanish_reading: Una comparación hiperbólica deliberada que expresa la imposibilidad humana extrema, sin convertir la imagen en una alegoría de una puerta estrecha ni en otra metáfora técnica.
  alternative_spanish_readings:
  - Referencia a una supuesta 'puerta de la aguja' en Jerusalén
  - Lectura de 'cuerda' en lugar de 'camello' para suavizar la hipérbole
  rationale: El griego presenta sin rodeos la imagen extrema. La traducción debe conservar esa tensión teológica y retórica, evitando explicarla en exceso o suavizarla.
  doctrine_reference: Preservar la tensión teológica; primacía del original frente a la tradición interpretativa.
translation_notes:
  revision_awareness: El texto se mantiene alineado con el pasaje griego atestiguado y con la decisión auditada de conservar el hiperbolismo de κάμηλον. No hubo revisiones aplicadas en el último pase.
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» de forma consistente con βασιλεία τοῦ θεοῦ.
  - Se conserva la imagen fuerte de «camello» y «ojo de una aguja» sin suavizarla.
  - El orden de la oración busca ser publicable en español sin perder la comparación de dificultad del original.
