translation:
  language: es
  text: 'Y uno se acercó y le dijo: «Maestro, ¿qué cosa buena[a] debo hacer para tener vida eterna?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «qué buena obra»; el griego τί ἀγαθόν permite tanto «cosa buena» como, por implicación con «hacer», «obra buena».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva la fuerza discursiva de la partícula de transición y el llamado de atención de ἰδοὺ sin volverlo más explicativo de lo que permite el griego.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un hombre
  - alguien
  lexicon: BDAG
  rationale: El texto griego dice literalmente «uno»; mantenerlo evita introducir «hombre» o precisar la identidad del personaje antes de tiempo.
- source_word: προσελθὼν
  english_pob_choice: came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino acercándose
  - llegó
  lexicon: BDAG
  rationale: Expresa el movimiento previo al habla de manera natural en español y conserva la secuencia temporal del participio aoristo.
- source_word: αὐτῷ εἶπεν
  english_pob_choice: to him said
  chosen_spanish: a él y le dijo
  alternatives_spanish:
  - le dijo
  - le habló
  lexicon: BDAG
  rationale: En español se reorganiza para fluidez; se conserva el destinatario explícito del discurso sin alterar el sentido.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro de enseñanza
  - Profesor
  lexicon: BDAG
  rationale: «Maestro» comunica bien el título de trato y es la opción más natural y reverente en español contemporáneo para διδάσκαλος.
- source_word: τί ἀγαθὸν
  english_pob_choice: what good thing
  chosen_spanish: qué cosa buena
  alternatives_spanish:
  - qué bien
  - qué buena cosa
  lexicon: BDAG
  rationale: Mantiene el valor abierto de τί ἀγαθόν como una cosa o acción buena; «cosa buena» evita cerrar prematuramente a «obra» o «deed».
- source_word: ποιήσω
  english_pob_choice: must I do
  chosen_spanish: debo hacer
  alternatives_spanish:
  - tengo que hacer
  - deberé hacer
  lexicon: BDAG
  rationale: La pregunta deliberativa se expresa de modo natural con «debo hacer», que conserva la fuerza práctica de la consulta sin añadir una lectura doctrinal.
- source_word: ἵνα σχῶ
  english_pob_choice: that I may have
  chosen_spanish: para tener
  alternatives_spanish:
  - a fin de tener
  - para que tenga
  lexicon: BDAG
  rationale: En español, el propósito se formula con claridad y naturalidad mediante infinitivo; se mantiene la relación final de ἵνα con σχῶ sin sobrecargar la frase.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida perpetua
  lexicon: BDAG
  rationale: La expresión estable «vida eterna» es fiel, transparente y ampliamente inteligible, preservando el valor escatológico de ζωὴν αἰώνιον.
theological_decisions:
- issue: Alcance de εἷς en la identificación del interlocutor
  english_pob_reading: one
  chosen_spanish_reading: uno
  alternative_spanish_readings:
  - un hombre
  - un joven rico
  rationale: Se conserva la indefinición del griego y no se importan detalles de paralelos o contexto posterior al enunciado de este versículo.
  doctrine_reference: Translation philosophy §1 (primacía del original)
- issue: Relación entre «qué cosa buena» y el verbo «hacer»
  english_pob_reading: what good thing must I do
  chosen_spanish_reading: qué cosa buena debo hacer
  alternative_spanish_readings:
  - qué buena obra debo hacer
  - qué bien debo hacer
  rationale: La redacción conserva la tensión léxica del griego entre un objeto/acción buena y el verbo hacer, sin resolverla prematuramente en «obra» ni en una categoría moral más estrecha.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y léxica)
- issue: Finalidad de ἵνα σχῶ y su relación con la vida eterna
  english_pob_reading: that I may have eternal life
  chosen_spanish_reading: para tener vida eterna
  alternative_spanish_readings:
  - a fin de tener vida eterna
  - para que yo tenga vida eterna
  rationale: Se conserva el sentido de propósito del griego con una construcción natural en español, sin introducir una noción de mérito o causalidad que el texto no explicita.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el packet griego y la solución auditada en inglés, pero ajusta la sintaxis al español para que suene natural: «Y he aquí» para καὶ ἰδού, «uno» para εἷς, «se acercó» para προσελθών, y «para tener vida eterna» para ἵνα σχῶ ζωὴν αἰώνιον. Se preserva deliberadamente la ambigüedad de τί ἀγαθόν con una nota alternativa, en línea con la nota inglesa sobre «good thing»/«good deed».'
  spanish_consistency_notes:
  - Se usa «vida eterna» como equivalente estable de ζωὴν αἰώνιον.
  - Se mantiene «Maestro» para διδάσκαλε por transparencia y naturalidad en español.
  - No se introduce «Cristo», «Señor» ni una identificación adicional del interlocutor.
  - La puntuación y el uso de comillas siguen norma tipográfica española.
