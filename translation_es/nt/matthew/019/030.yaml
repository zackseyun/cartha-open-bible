translation:
  language: es
  text: Pero muchos que son primeros serán últimos[a], y los últimos, primeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Pero muchos primeros serán últimos, y últimos primeros». El griego es notablemente breve y proverbial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchos otros
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivamente para un grupo amplio e indefinido. «Muchos» es la equivalencia natural y concisa en español, sin precisar más de lo que el griego expresa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro o contraste suave respecto al contexto anterior. «Pero» conserva mejor ese matiz adversativo en español que «Y».
- source_word: ἔσονται
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - van a ser
  - estarán
  lexicon: BDAG
  rationale: El futuro de εἰμί se traduce de forma directa y natural con «serán». Mantiene el valor predictivo sin añadir matices aspectuales innecesarios.
- source_word: πρῶτοι
  english_pob_choice: first
  chosen_spanish: primeros
  alternatives_spanish:
  - los primeros
  - de primero
  lexicon: BDAG
  rationale: Aquí πρῶτος expresa rango o estatus, no secuencia temporal. «Primeros» conserva la oposición proverbial con «últimos».
- source_word: ἔσχατοι
  english_pob_choice: last
  chosen_spanish: últimos
  alternatives_spanish:
  - de últimos
  - los últimos
  lexicon: BDAG
  rationale: ἔσχατος contrasta con πρῶτος en orden o posición. «Últimos» reproduce bien la antítesis directa y la forma proverbial.
- source_word: πρῶτοι ἔσχατοι
  english_pob_choice: who are first will be last
  chosen_spanish: que son primeros serán últimos
  alternatives_spanish:
  - los primeros serán últimos
  - los que son primeros serán últimos
  lexicon: BDAG
  rationale: El griego omite el relativo explícito, pero en español conviene explicitarlo para fluidez sin alterar el sentido. Se conserva la tensión proverbial y la asimetría del original.
- source_word: καὶ ἔσχατοι πρῶτοι
  english_pob_choice: and the last first
  chosen_spanish: y los últimos, primeros
  alternatives_spanish:
  - y los últimos serán primeros
  - y los últimos, los primeros
  lexicon: BDAG
  rationale: El segundo miembro también omite el verbo. «Y los últimos, primeros» preserva la concisión sentenciosa del griego, mientras que una versión con «serán» sería una suavización válida pero menos tersa.
theological_decisions:
- issue: Alcance de la inversión de estatus
  english_pob_reading: A general statement about reversal of status/order is preserved without specifying whether the reversal concerns salvation, reward, social standing, or eschatological rank.
  chosen_spanish_reading: Se conserva como una sentencia general sobre la inversión de posición u orden, sin concretarla como salvación, recompensa o rango escatológico.
  alternative_spanish_readings:
  - Una referencia específica a la entrada en el reino
  - Una referencia específica a recompensas entre discípulos
  - Una referencia a la inversión social en general
  rationale: El verso formula un proverbio breve y no define por sí mismo el alcance exacto de la inversión. La traducción debe mantener abierta esa tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios aplicados y la concordancia general del texto fuente se mantiene alta. La redacción española conserva la brevedad proverbial del griego y la equivalencia ya auditada en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «primeros/últimos» en vez de «primero/último» para concordar con el plural griego.
  - Se evitó introducir verbos en el segundo hemistiquio, preservando la tersura del paralelismo.
  - Se usó «Pero» para reflejar el contraste leve de δέ.
  - No se añadió determinación doctrinal no presente en el verso.
