translation:
  language: es
  text: 'Respondió[b][a]: «¿No han leído que el que los creó desde el principio los hizo varón y hembra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No leyeron…?»'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el que creó»; alternativamente, «el Creador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: He answered
  chosen_spanish: Él respondió
  alternatives_spanish:
  - Respondió
  - Y respondió
  lexicon: BDAG
  rationale: La combinación participio + verbo finito funciona como una fórmula semítica; en español se naturaliza bien con un simple «respondió» sin duplicar innecesariamente el verbo «decir». Se añade el pronombre explícito por claridad narrativa y fluidez.
- source_word: Οὐκ ἀνέγνωτε
  english_pob_choice: Have you not read
  chosen_spanish: ¿No han leído?
  alternatives_spanish:
  - ¿No leyeron?
  - ¿No han leído ustedes?
  lexicon: BDAG
  rationale: La pregunta conserva el tono de reproche apelando a una lectura que sigue disponible en la Escritura. El presente compuesto («han leído») comunica mejor en español esa referencia vigente que un pretérito simple.
- source_word: ὁ κτίσας
  english_pob_choice: the one who created
  chosen_spanish: el que los creó
  alternatives_spanish:
  - el Creador
  - el que creó
  lexicon: BDAG
  rationale: La forma articular del participio se vierte de manera transparente con «el que creó». Se omite la repetición explícita de «ellos» porque el objeto directo se recupera naturalmente por contexto y el español suena más fluido con el clítico «los».
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - al principio
  lexicon: BDAG
  rationale: «Desde el principio» reproduce bien el valor temporal y la alusión creacional de la frase. Se evita colocarla antes de «el que creó» para no desviar la relación sintáctica, que en griego modifica al acto de crear.
- source_word: ἄρσεν καὶ θῆλυ
  english_pob_choice: male and female
  chosen_spanish: varón y hembra
  alternatives_spanish:
  - macho y hembra
  - masculino y femenino
  - hombre y mujer
  lexicon: BDAG
  rationale: Se conserva la dicción creacional más cercana al griego. «Varón y hembra» mantiene la correspondencia léxica y el paralelismo del texto; «hombre y mujer» sonaría más interpretativo y menos pegado al lenguaje de Génesis citado por Jesús.
- source_word: ἐποίησεν αὐτούς
  english_pob_choice: made them
  chosen_spanish: los hizo
  alternatives_spanish:
  - los creó
  - los formó
  lexicon: BDAG
  rationale: Se distingue de κτίσας para no repetir el verbo de crear. «Hizo» preserva la relación verbal del griego y, en español, mantiene el eco de Génesis sin sobreespecificar.
theological_decisions:
- issue: Relación entre la cita de Jesús y el lenguaje creacional de Génesis 1:27
  english_pob_reading: Retain the creational pair 'male and female' in the main text without paraphrase.
  chosen_spanish_reading: Mantener «varón y hembra» en el texto principal, sin paraphrasearlo como «hombre y mujer» ni como una formulación explicativa.
  alternative_spanish_readings:
  - hombre y mujer
  - varón y mujer
  - macho y hembra
  rationale: El dicho de Jesús apela directamente al lenguaje de la creación. «Varón y hembra» conserva mejor el paralelo verbal con el griego y la alusión bíblica, sin introducir una interpretación adicional sobre roles o antropología que el versículo no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Referencia implícita al Creador mediante el participio articular ὁ κτίσας
  english_pob_reading: Greek “the one who created”; alternatively, “the Creator.”
  chosen_spanish_reading: «el que los creó» en el texto principal, sin convertirlo en título («el Creador»)
  alternative_spanish_readings:
  - el Creador
  - el que creó
  rationale: El participio articular es descriptivo antes que titular. Mantener la construcción relativa conserva la tensión documental entre forma y sentido; «el Creador» sería posible, pero introduce una nominalización más interpretativa que la del griego.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: colocar «desde el principio» con «el que creó» para reflejar la sintaxis griega, y conservar la referencia creacional directa con «varón y hembra». También se evita la traducción mecánica desde el inglés cuando el español requiere una formulación más natural.'
  spanish_consistency_notes:
  - Se mantiene «Dios» y no aplica aquí el término divino «Yahvé» porque el versículo no lo contiene.
  - Se preserva el contraste verbal entre «creó» y «hizo» para reflejar κτίσας / ἐποίησεν.
  - Se usa «varón y hembra» como equivalente directo del par ἄρσεν καὶ θῆλυ, siguiendo la tensión léxica del griego.
