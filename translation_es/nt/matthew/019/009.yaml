base_translation:
  language: en
  yaml_path: translation/nt/matthew/019/009.yaml
  text: But I tell you that whoever divorces his wife[a], except for sexual immorality, and marries another, commits adultery[b]; and whoever marries a divorced woman commits adultery.
  footnotes:
  - marker: a
    text: Or 'except on the ground of sexual immorality.' The Greek phrase may also be rendered more narrowly as 'except for fornication' or interpreted by some as 'except for sexual unfaithfulness.'
    reason: lexical_alternative
  - marker: b
    text: 'Some manuscripts omit: ''and whoever marries a divorced woman commits adultery.'''
    reason: textual_variant
