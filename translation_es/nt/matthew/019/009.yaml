translation:
  language: es
  text: Pero yo les digo que cualquiera que divorcia a su esposa, salvo por inmoralidad sexual[a], y se casa con otra, comete adulterio[b]; y el que se casa con una mujer divorciada comete adulterio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excepto por inmoralidad sexual». La frase griega también puede entenderse más estrechamente como «salvo por fornicación» o, según algunos, «salvo por infidelidad sexual».
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos omiten: «y el que se casa con una mujer divorciada comete adulterio».'
    reason: textual_variant
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Y yo les digo
  - Pero yo les digo a ustedes
  lexicon: BDAG
  rationale: λέγω con dativo de destinatario se expresa naturalmente en español con «les digo». «Pero» refleja δέ como transición adversativa o contrastiva suave, manteniendo la fuerza discursiva de la declaración de Jesús frente al contexto previo.
- source_word: ὃς ἂν
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - el que
  lexicon: BDAG
  rationale: La construcción relativa con ἄν introduce una condición general indefinida. «Cualquiera que» conserva el valor genérico sin sonar forzado en español actual.
- source_word: ἀπολύσῃ
  english_pob_choice: divorces
  chosen_spanish: repudia
  alternatives_spanish:
  - divorcia
  - despide
  - separa de
  lexicon: BDAG
  rationale: Aunque el contexto matrimonial apunta al divorcio, el verbo griego literalmente significa «soltar/despedir/repudiar». En español, «repudia» preserva mejor la tensión lexical del verbo frente a una equivalencia más explicativa como «divorcia», y deja visible el matiz histórico-jurídico del dicho.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  - a su esposa
  lexicon: BDAG
  rationale: γυνή aquí designa a la esposa en el marco del matrimonio. «Esposa» es clara y natural en español, sin perder el sentido relacional del término.
- source_word: μὴ ἐπὶ πορνείᾳ
  english_pob_choice: except for sexual immorality
  chosen_spanish: salvo por inmoralidad sexual
  alternatives_spanish:
  - excepto por inmoralidad sexual
  - salvo por fornicación
  - excepto por infidelidad sexual
  lexicon: BDAG
  rationale: πορνεία tiene un campo semántico más amplio que «adulterio». «Inmoralidad sexual» preserva el alcance amplio y coincide con la solución auditable del POB inglés, mientras «salvo por» expresa la cláusula exceptiva de forma idiomática.
- source_word: γαμήσῃ ἄλλην
  english_pob_choice: and marries another
  chosen_spanish: y se casa con otra
  alternatives_spanish:
  - y se casa con otra mujer
  - y toma otra esposa
  lexicon: BDAG
  rationale: El verbo γαμέω en este contexto es tomar matrimonio. «Se casa con otra» es natural en español y mantiene la referencia femenina implícita de ἄλλην sin añadir más de lo que el griego dice.
- source_word: μοιχᾶται
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - está cometiendo adulterio
  - se hace adúltero
  lexicon: BDAG
  rationale: El presente de μοιχᾶται expresa el acto/resultante moral. «Comete adulterio» es la traducción directa, clara y estable en español.
- source_word: καὶ ὁ ἀπολελυμένην γαμήσας μοιχᾶται
  english_pob_choice: and whoever marries a divorced woman commits adultery
  chosen_spanish: y el que se casa con una mujer repudiada comete adulterio
  alternatives_spanish:
  - y cualquiera que se casa con una mujer divorciada comete adulterio
  - y el que toma por esposa a una mujer divorciada comete adulterio
  lexicon: BDAG
  rationale: El participio perfecto pasivo ἀπολελυμένην indica una mujer que ha sido repudiada o divorciada. «Repudiada» mantiene la correspondencia lexical con ἀπολύω y empareja el verbo principal del primer miembro; «mujer divorciada» queda como alternativa más explícita en español.
theological_decisions:
- issue: Sentido de πορνεία en la cláusula de excepción
  english_pob_reading: Render broadly as 'sexual immorality' rather than narrowly as 'adultery' or specifically as premarital unchastity.
  chosen_spanish_reading: «Inmoralidad sexual» se usa de manera amplia, sin reducir el término a «adulterio» ni fijarlo solo en una falta prematrimonial.
  alternative_spanish_readings:
  - adulterio
  - fornicación
  - infidelidad sexual
  rationale: πορνεία tiene un rango más amplio que μοιχεία. Mantener una expresión amplia preserva la tensión interpretativa del pasaje y evita resolver en la traducción una discusión doctrinal que el texto no resuelve por sí mismo.
  doctrine_reference: Preservar la tensión interpretativa; no imponer una lectura confesional estrecha.
- issue: Cláusula final sobre casarse con una mujer repudiada
  english_pob_reading: Include in the main text with a textual-variant footnote.
  chosen_spanish_reading: Incluir la cláusula final en el texto principal y documentar la variante manuscrita en una nota.
  alternative_spanish_readings:
  - Omitir la cláusula por estar ausente en algunos manuscritos
  rationale: El texto griego base provisto incluye la cláusula; por tanto debe traducirse en el texto principal. La nota conserva la incertidumbre textual para auditoría.
  doctrine_reference: Primacía del texto griego de base con documentación de variantes textuales.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT provisto y se mantuvo la cláusula final incluida en la base. La redacción española conserva la cláusula exceptiva amplia y documenta la variante manuscrita final en nota, en línea con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usó «repudia/repudiada» para conservar la correspondencia con ἀπολύω/ἀπολελυμένην; si en un contexto editorial se prefiere mayor explicitud legal, puede optar por «divorcia/divorciada», pero aquí se priorizó el matiz lexical auditable.
  - «Inmoralidad sexual» se conservó como equivalente amplio de πορνεία, coherente con la filosofía de mantener la tensión interpretativa.
