    issue: «Les dice» pluraliza el objeto indirecto de λέγει αὐτῷ
    rationale: El texto griego tiene αὐτῷ en singular. Aunque el contexto involucra un diálogo público, aquí la referencia inmediata es al interlocutor singular. «Le dice» preserva mejor la evidencia fuente y evita introducir un plural no marcado.
