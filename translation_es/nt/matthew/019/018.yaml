translation:
  language: es
  text: 'Le dice: «¿Cuáles?» Y Jesús dijo: «No matarás, no cometerás adulterio, no robarás, no darás falso testimonio».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει αὐτῷ
  english_pob_choice: He says to him
  chosen_spanish: Les dice
  alternatives_spanish:
  - Le dice
  lexicon: BDAG
  rationale: El presente histórico se conserva con «dice» para dar viveza narrativa. Aunque el singular del griego apunta a un interlocutor concreto, el español puede expresarlo de forma natural con «les» si el pasaje se entiende como la formulación dirigida al joven en el marco del diálogo; sin embargo, para mayor fidelidad inmediata al singular del texto, también se reconoce «Le dice» como alternativa.
- source_word: Ποίας
  english_pob_choice: Which ones?
  chosen_spanish: ¿Cuáles?
  alternatives_spanish:
  - ¿Cuáles mandamientos?
  - ¿Qué cosas?
  lexicon: BDAG
  rationale: La forma griega femenina plural remite a los mandamientos ya mencionados; en español «¿Cuáles?» reproduce bien la elipsis sin añadir material inexistente. Es breve y natural.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν
  english_pob_choice: And Jesus said
  chosen_spanish: Y Jesús dijo
  alternatives_spanish:
  - Pero Jesús dijo
  - Jesús dijo
  lexicon: BDAG
  rationale: δέ aquí une la respuesta sin un contraste fuerte; «Y» mantiene la conexión narrativa. «Dijo» conserva el aoristo narrativo con registro sobrio.
- source_word: Οὐ φονεύσεις
  english_pob_choice: You shall not murder
  chosen_spanish: No matarás
  alternatives_spanish:
  - No asesinarás
  - No cometerás homicidio
  lexicon: BDAG
  rationale: φονεύω apunta a matar con intención homicida, pero en español la formulación bíblica tradicional y comprensible es «No matarás». Esta opción conserva el tono decálogo, aunque pierde algo de la precisión de «murder»; se documenta la tensión léxica.
- source_word: Οὐ μοιχεύσεις
  english_pob_choice: you shall not commit adultery
  chosen_spanish: no cometerás adulterio
  alternatives_spanish:
  - no adulterarás
  lexicon: BDAG
  rationale: Traducción directa y natural de μοιχεύω; mantiene el registro legal del mandamiento.
- source_word: Οὐ κλέψεις
  english_pob_choice: you shall not steal
  chosen_spanish: no robarás
  alternatives_spanish:
  - no hurtarás
  lexicon: BDAG
  rationale: «Robar» es el equivalente moderno más claro y fiel para κλέπτω en este contexto.
- source_word: Οὐ ψευδομαρτυρήσεις
  english_pob_choice: you shall not bear false witness
  chosen_spanish: no darás falso testimonio
  alternatives_spanish:
  - no testificarás falsamente
  lexicon: BDAG
  rationale: «Dar falso testimonio» preserva el matiz jurídico-testimonial del verbo griego y su eco del Decálogo; es una equivalencia más precisa que una simple idea general de mentir.
theological_decisions:
- issue: Forma decalogal de las prohibiciones
  english_pob_reading: Use traditional covenant-command form 'You shall not ...'
  chosen_spanish_reading: 'Usar la forma tradicional de mandamiento: «No ...rás»'
  alternative_spanish_readings:
  - «No ...» en imperativo directo
  - «No habrás de ...»
  rationale: El futuro prohibitivo español («No matarás») conserva el registro bíblico y la conexión intertextual con los Diez Mandamientos, como la POB inglesa preserva con «You shall not».
  doctrine_reference: Éxodo 20; Deuteronomio 5; traducción con primacía del texto original y registro bíblico reconocible
translation_notes:
  revision_awareness: El contexto inglés mostró una revisión que eliminó el artículo introductorio artificial ('The:') antes de la lista. En español no se necesita un equivalente añadido. También se evitó trasladar mecánicamente el presente histórico inglés al español de modo forzado; se conservó con naturalidad mediante «dice/dijo» sin calco innecesario.
  spanish_consistency_notes:
  - Se mantuvo la secuencia breve y directa del griego, sin expandir la lista de mandamientos.
  - Se prefirió una forma decalogal tradicional en español para conservar el eco bíblico.
  - No se añadió puntuación explicativa dentro de la cita para no sobreinterpretar el artículo neutro griego.
  - Se evitó mezclar «matar» y «asesinar» dentro del mismo registro, optando por una sola solución coherente para el mandamiento.
