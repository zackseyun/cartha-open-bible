translation:
  language: es
  text: 'Jesús le dijo[a]: «Si quieres ser perfecto, ve, vende tus bienes y da a los pobres; tendrás tesoro en los cielos; luego ven y sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «completo» o «maduro»; el término griego puede abarcar «perfecto», «completo» o «maduro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le dijo
  lexicon: BDAG
  rationale: El verbo narrativo de habla se expresa de manera natural con «dijo»; el dativo αὐτῷ se integra como «le» para conservar el destinatario del discurso sin sobrecargar la frase.
- source_word: τέλειος
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  lexicon: BDAG
  rationale: Aunque el audit trail inglés debatió entre «complete» y luego volvió a «perfect», en español «perfecto» mantiene la correspondencia lexical más directa con τέλειος. Se conserva así la tensión entre plenitud/entereza y la lectura tradicional, sin introducir una paráfrasis excesiva.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: BDAG
  rationale: Imperativo de partida; «ve» es breve, idiomático y fiel al valor exhortativo.
- source_word: πώλησόν
  english_pob_choice: sell
  chosen_spanish: vende
  alternatives_spanish:
  - venda
  lexicon: BDAG
  rationale: Imperativo directo de vender; «vende» reproduce de modo claro la orden.
- source_word: τὰ ὑπάρχοντα
  english_pob_choice: your possessions
  chosen_spanish: tus bienes
  alternatives_spanish:
  - tus posesiones
  - lo que tienes
  lexicon: BDAG
  rationale: La expresión participial alude a las posesiones materiales. «Tus bienes» suena natural en español y conserva el sentido patrimonial sin perder fuerza.
- source_word: δὸς πτωχοῖς
  english_pob_choice: give to the poor
  chosen_spanish: da a los pobres
  alternatives_spanish:
  - dá a los necesitados
  - entrega a los pobres
  lexicon: BDAG
  rationale: πτωχοῖς funciona sustantivamente como «los pobres»; la preposición «a» mantiene el destino del don y evita una construcción forzada.
- source_word: ἕξεις
  english_pob_choice: you will have
  chosen_spanish: tendrás
  alternatives_spanish:
  - habrás de tener
  - poseerás
  lexicon: BDAG
  rationale: El futuro simple de ἔχω se expresa con «tendrás», la forma más natural y directa en español.
- source_word: θησαυρὸν ἐν οὐρανοῖς
  english_pob_choice: treasure in heaven
  chosen_spanish: tesoro en los cielos
  alternatives_spanish:
  - tesoro en el cielo
  - tesoro celestial
  lexicon: BDAG
  rationale: Se conserva el plural griego οὐρανοῖς como «los cielos», porque el texto fuente no usa singular. Esto mantiene el matiz lexical y evita nivelarlo prematuramente a un uso idiomático singular.
- source_word: δεῦρο
  english_pob_choice: then come
  chosen_spanish: luego ven
  alternatives_spanish:
  - ven ahora
  - ven
  lexicon: BDAG
  rationale: El adverbio deíctico de convocatoria se vierte con «luego» para reflejar la secuencia tras las órdenes previas y con «ven» para conservar el llamado directo.
- source_word: ἀκολούθει μοι
  english_pob_choice: follow me
  chosen_spanish: sígueme
  alternatives_spanish:
  - ven conmigo
  - continúa siguiéndome
  lexicon: BDAG
  rationale: La expresión discipular estándar se mantiene con «sígueme», la equivalencia más estable y clara en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de τέλειος en el llamado a la obediencia discipular
  english_pob_reading: The English audit trail preserves the tension between 'complete' and 'perfect' and finally returns to 'perfect' for closer lexical accuracy, while noting that the context can imply wholeheartedness rather than sinless perfection.
  chosen_spanish_reading: Se traduce «perfecto», pero sin explicar el término como impecabilidad moral; en el contexto, la exigencia apunta a una entrega íntegra y sin reservas.
  alternative_spanish_readings:
  - completo
  - maduro
  rationale: «Perfecto» es la correspondencia más cercana a τέλειος. Para no borrar la tensión documentada, la nota alternativa reconoce que el término puede abarcar idea de plenitud o madurez, aunque el texto principal conserve la lectura tradicional.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés auditado pasó de «complete» a «perfect» en una revisión posterior por mayor exactitud léxica respecto de τέλειος. La versión española adopta «perfecto» en el texto principal y conserva en nota la alternativa semántica de plenitud/completud/madurez.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento directo de Jesús con segunda persona singular en los imperativos: «ve», «vende», «da», «ven», «sígueme».'
  - Se conserva «los cielos» para reflejar el plural griego οὐρανοῖς y no nivelarlo al singular idiomático sin nota.
  - «Tus bienes» se usa como equivalente natural de τὰ ὑπάρχοντα, con valor patrimonial y material.
  - La nota de τέλειος evita borrar la tensión lexical entre perfección, plenitud y madurez.
