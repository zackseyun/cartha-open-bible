review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue fielmente la estructura y el sentido del griego: imperativos secuenciales («ve, vende…, da…, ven, sígueme»), futuro de promesa («tendrás»), y el llamado discipular. «Perfecto» refleja adecuadamente τέλειος según la decisión final auditada en inglés. «Tesoro en los cielos» preserva legítimamente el plural οὐρανοῖς. El único desajuste relevante está en la nota al pie: el texto principal ya dice «perfecto», por lo que una nota que empieza «O “perfecto”» no funciona como alternativa real y no preserva correctamente la intención del audit trail inglés.'
  spanish_quality_summary: El español es claro, natural y digno. La frase fluye bien y evita calcos torpes. «Tus bienes» es buena opción contextual. La puntuación con punto y coma antes de «luego ven y sígueme» es aceptable, aunque no necesaria. La única reparación necesaria es la redacción de la nota para que presente alternativas verdaderas y no repita el término del texto principal.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Jesús», «perfecto», «bienes», «los pobres», «tesoro en los cielos», «sígueme» están bien alineados. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, carne, gracia, etc. La decisión de mantener «perfecto» con nota explicativa es coherente con el razonamiento léxico-teológico documentado.'
  issues:
  - severity: medium
    issue: 'La nota al pie está mal formulada: dice «O “perfecto”» cuando el texto principal ya usa «perfecto».'
    rationale: Una nota de alternativa debe ofrecer una lectura distinta o una explicación semántica útil. Tal como está, no añade información y no refleja bien la nota inglesa, que preserva «perfect» como alternativa cuando el texto base inglés había usado otra opción. En español, con «perfecto» en el cuerpo, la nota debe presentar «completo» y/o «maduro» como alternativas.
  revised_spanish_text: 'Jesús le dijo[a]: «Si quieres ser perfecto, ve, vende tus bienes y da a los pobres; tendrás tesoro en los cielos; luego ven y sígueme».'
  revised_footnotes:
  - marker: a
    text: O «completo» o «maduro»; el término griego puede abarcar «perfecto», «completo» o «maduro».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que presente alternativas reales a «perfecto» y se elimina la conjunción inicial antes de «tendrás» por estilo español más limpio sin cambiar el sentido. El resto del texto se mantiene porque es fiel al griego y al audit trail.
