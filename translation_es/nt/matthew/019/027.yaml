revisions:
- from: 'Entonces Pedro, respondiendo, le dijo: «He aquí, nosotros hemos dejado todo y te hemos seguido; ¿qué habrá, pues, para nosotros?»'
  to: 'Entonces Pedro le respondió: «He aquí, nosotros hemos dejado todo y te hemos seguido; ¿qué habrá, pues, para nosotros?»'
  rationale: 'Se reemplaza «Pedro, respondiendo, le dijo» por «Pedro le respondió» para reflejar de manera idiomática y fiel la construcción ἀποκριθεὶς ... εἶπεν, manteniendo el dativo αὐτῷ con «le». No se requieren otros cambios: el resto del versículo preserva bien el sentido fuente, el registro formal y la ambigüedad teológica documentada.'
  reviewer_model: gpt-5.4
