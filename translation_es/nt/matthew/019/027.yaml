translation:
  language: es
  text: 'Entonces Pedro le respondió: «He aquí, nosotros hemos dejado todo y te hemos seguido; ¿qué habrá, pues, para nosotros?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta la respuesta de Pedro de manera temporal y natural en español, con un registro digno y claro.
- source_word: ἀποκριθεὶς ... εἶπεν
  english_pob_choice: answered
  chosen_spanish: respondiendo, le dijo
  alternatives_spanish:
  - respondió y le dijo
  - contestó y le dijo
  lexicon: BDAG
  rationale: La construcción participial se conserva de forma idiomática en español sin duplicar innecesariamente el verbo de habla, manteniendo el tono narrativo formal.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se expresa de forma natural con pronombre indirecto en español.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: BDAG
  rationale: Se conserva la fuerza deíctica y formal del marcador discursivo sin modernizarlo en exceso; 'He aquí' es una correspondencia tradicional y clara en español bíblico.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito mantiene el énfasis del griego en el sujeto, aunque en español podría omitirse; aquí se conserva por fidelidad retórica.
- source_word: ἀφήκαμεν
  english_pob_choice: have left
  chosen_spanish: hemos dejado
  alternatives_spanish:
  - dejamos
  - hemos abandonado
  lexicon: BDAG
  rationale: El perfecto español expresa adecuadamente una acción decisiva con efecto vigente en el contexto del diálogo.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo que teníamos
  - todas las cosas
  lexicon: BDAG
  rationale: En esta construcción, 'todo' comunica de manera breve y natural el alcance total de πάντα sin perder fuerza semántica.
- source_word: ἠκολουθήσαμέν σοι
  english_pob_choice: followed you
  chosen_spanish: te hemos seguido
  alternatives_spanish:
  - te seguimos
  - te seguimos y te acompañamos
  lexicon: BDAG
  rationale: Se preserva el sentido de discipulado continuo con el perfecto español y el objeto de segunda persona.
- source_word: τί ἄρα ἔσται ἡμῖν;
  english_pob_choice: What then will there be for us?
  chosen_spanish: ¿qué habrá, pues, para nosotros?
  alternatives_spanish:
  - ¿qué tendremos, pues?
  - ¿qué será, pues, de nosotros?
  lexicon: BDAG
  rationale: '''Habrá'' conserva la apertura semántica de ἔσται ἡμῖν sin reducirla solo a posesión; ''pues'' reproduce el inferencial ἄρα. Se mantiene la ambigüedad sobre recompensa, herencia o destino.'
theological_decisions:
- issue: Ambigüedad de la pregunta de Pedro sobre recompensa o futuro
  english_pob_reading: What then will there be for us?
  chosen_spanish_reading: ¿qué habrá, pues, para nosotros?
  alternative_spanish_readings:
  - ¿qué tendremos, pues?
  - ¿qué será, pues, de nosotros?
  rationale: La redacción conserva la apertura del griego y no decide si la preocupación es posesión, recompensa o destino. Así se preserva la tensión teológica documentada en el texto fuente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'Look' a 'Behold' para reflejar con mayor formalidad Ἰδοὺ. En español se reflejó directamente esa preferencia con 'He aquí', manteniendo el registro elevado y la función discursiva del marcador.
  spanish_consistency_notes:
  - Se mantiene 'nosotros' explícito para reflejar el énfasis del griego.
  - Se usa 'he aquí' como equivalente formal de Ἰδοὺ, coherente con el ajuste revisado del audit trail inglés.
  - '''todo'' se eligió por naturalidad y amplitud semántica, sin concretar innecesariamente el objeto de la renuncia.'
  - La pregunta final se dejó abierta para no estrechar el sentido del original.
