review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la secuencia temporal, la declaración de haber dejado todo y seguido a Jesús, y la pregunta final abierta sobre lo que les tocará. También conserva adecuadamente la ambigüedad teológica de τί ἄρα ἔσται ἡμῖν. Sin embargo, la combinación «Pedro, respondiendo, le dijo» suena poco natural en español y no sigue la propia justificación léxica, que afirma evitar duplicación innecesaria. La construcción griega ἀποκριθεὶς ... εἶπεν se representa mejor en español como «respondió» o «respondió y le dijo»; aquí basta «respondió».'
  spanish_quality_summary: El registro general es digno y legible, y «He aquí» funciona bien para Ἰδοὺ en este contexto formal. «Nosotros hemos dejado todo» preserva el énfasis de ἡμεῖς, aunque es algo marcado; sigue siendo aceptable. El principal problema de calidad es la frase «Pedro, respondiendo, le dijo», que resulta torpe y calcada. La revisión propuesta mejora naturalidad y fluidez sin perder formalidad ni precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección «He aquí» para Ἰδοὺ y «¿qué habrá, pues, para nosotros?» para τί ἄρα ἔσται ἡμῖν concuerda con la filosofía documentada de preservar registro formal y apertura semántica.
  issues:
  - severity: medium
    issue: Construcción «Pedro, respondiendo, le dijo» poco idiomática
    rationale: Aunque ἀποκριθεὶς es participio, en español esta reproducción suena forzada. La fórmula narrativa natural y fiel es «Pedro respondió»; además evita una duplicación de verbos de habla que la auditoría inglesa explícitamente intentó suavizar.
  - severity: low
    issue: Tensión entre decisión léxica y texto final
    rationale: La nota léxica afirma que la construcción participial se conserva «sin duplicar innecesariamente el verbo de habla», pero el texto sí duplica con «respondiendo, le dijo». Conviene alinear texto y justificación.
  revised_spanish_text: 'Entonces Pedro le respondió: «He aquí, nosotros hemos dejado todo y te hemos seguido; ¿qué habrá, pues, para nosotros?»'
  revision_rationale: 'Se reemplaza «Pedro, respondiendo, le dijo» por «Pedro le respondió» para reflejar de manera idiomática y fiel la construcción ἀποκριθεὶς ... εἶπεν, manteniendo el dativo αὐτῷ con «le». No se requieren otros cambios: el resto del versículo preserva bien el sentido fuente, el registro formal y la ambigüedad teológica documentada.'
