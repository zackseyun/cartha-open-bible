base_translation:
  language: en
  yaml_path: translation/nt/matthew/019/022.yaml
  text: But when the young man heard this word[a], he went away grieving[c][b], for he had many possessions.
  footnotes:
  - marker: a
    text: Or 'this statement.' Greek 'the word' here refers to Jesus' preceding saying.
    reason: lexical_alternative
  - marker: b
    text: Or 'sorrowful.' The Greek participle describes his departing in a state of grief.
    reason: lexical_alternative
  - marker: c
    text: 'Traditionally ''great possessions.'' The Greek more literally emphasizes quantity: ''many possessions.'''
    reason: lexical_alternative
