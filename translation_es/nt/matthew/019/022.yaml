translation:
  language: es
  text: Pero cuando el joven oyó esta palabra[a], se fue entristecido[b], porque tenía muchas posesiones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta declaración». El griego «la palabra» aquí se refiere al dicho previo de Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «apenado». El participio griego describe que se fue en un estado de tristeza.
    reason: lexical_alternative
  - marker: c
    text: 'Tradicionalmente «grandes posesiones». El griego enfatiza más literalmente la cantidad: «muchas posesiones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when ... heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - después de oír
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo se expresa temporalmente en español con una subordinada natural. «Cuando oyó» preserva la secuencia narrativa sin forzar una construcción más pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce aquí un giro narrativo con matiz contrastivo ante la reacción del joven. «Pero» comunica bien ese cambio en español.
- source_word: νεανίσκος
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven hombre
  lexicon: BDAG
  rationale: El sustantivo designa a un joven varón. «Joven» es natural y fiel; «ruler» no se añade porque no está en este versículo griego.
- source_word: τὸν λόγον
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - esta declaración
  - este dicho
  - este mensaje
  lexicon: BDAG
  rationale: λόγος aquí remite a la palabra que Jesús acababa de decir. «Palabra» mantiene la proximidad al griego y funciona bien en español; el demostrativo «esta» refleja el contexto inmediato.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se retiró
  - partió
  lexicon: BDAG
  rationale: El verbo de salida se expresa de manera idiomática y concisa en español. «Se fue» conserva el sentido narrativo de alejamiento.
- source_word: λυπούμενος
  english_pob_choice: grieving
  chosen_spanish: entristecido
  alternatives_spanish:
  - afligido
  - apenado
  - lloroso
  lexicon: BDAG
  rationale: El participio presente indica un estado acompañante al irse. «Entristecido» comunica ese estado de dolor de forma clara y natural en español, sin perder la fuerza afectiva.
- source_word: ἦν γὰρ ἔχων
  english_pob_choice: for he had
  chosen_spanish: porque tenía
  alternatives_spanish:
  - pues poseía
  - porque poseía
  lexicon: BDAG
  rationale: La construcción perifrástica imperfecta expresa una condición continua. En español se reduce naturalmente a «tenía» sin perder el sentido de posesión sostenida.
- source_word: κτήματα πολλά
  english_pob_choice: many possessions
  chosen_spanish: muchas posesiones
  alternatives_spanish:
  - grandes posesiones
  - mucho patrimonio
  - muchos bienes
  lexicon: BDAG
  rationale: κτήματα se refiere a bienes/posesiones; πολλά enfatiza cantidad. «Muchas posesiones» refleja con más fidelidad la cuantificación del griego que «grandes posesiones».
theological_decisions:
- issue: Si añadir la identificación de «ruler» desde los paralelos sinópticos
  english_pob_reading: Translate νεανίσκος only as 'young man' and do not import 'ruler.'
  chosen_spanish_reading: Traducir solo «joven», sin añadir «gobernante» ni equivalente.
  alternative_spanish_readings:
  - joven gobernante
  - joven rico
  - muchacho gobernante
  rationale: El griego de Mateo 19:22 no contiene esa identificación. Para respetar la primacía del texto fuente, la traducción no armoniza con otros evangelios ni amplía el dato narrativo.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
- issue: Valor semántico de λόγος en este contexto
  english_pob_reading: '''this word'' with note ''Or this statement.'''
  chosen_spanish_reading: «esta palabra» con nota de alternativa («esta declaración»).
  alternative_spanish_readings:
  - esta declaración
  - este dicho
  - este mensaje
  rationale: La frase griega puede referirse al dicho de Jesús o a su declaración. «Palabra» es una traducción cercana y sobria; se preserva la alternativa semántica en nota para no borrar la tensión lexical.
  doctrine_reference: Translation philosophy §2 (auditable lexical decisions)
- issue: Matiz de λυπούμενος
  english_pob_reading: '''grieving'' with note ''Or sorrowful.'''
  chosen_spanish_reading: «entristecido» con nota de alternativa («apenado», «afligido»).
  alternative_spanish_readings:
  - apenado
  - afligido
  - sorprendido
  rationale: El participio describe el estado emocional al irse. «Entristecido» expresa bien el estado continuo y es idiomático en español; la nota conserva la posibilidad de un matiz más cercano a 'sorrowful'.
  doctrine_reference: Translation philosophy §2 (auditable lexical decisions)
translation_notes:
  revision_awareness: No se requirieron revisiones respecto al último pase del texto fuente en inglés; la presente redacción sigue el audit trail aprobado y conserva las decisiones léxicas y teológicas relevantes sin armonización indebida.
  spanish_consistency_notes:
  - Se mantuvo «joven» para νεανίσκος, evitando importar «gobernante» de textos paralelos.
  - Se usó «Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino.
  - «posesiones» traduce κτήματα de manera amplia y publicable en español, manteniendo el énfasis cuantitativo de πολλά.
  - La puntuación sigue el flujo narrativo del griego con una frase principal y una cláusula causal final.
