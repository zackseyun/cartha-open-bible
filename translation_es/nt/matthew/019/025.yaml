review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido del griego: circunstancia temporal previa (''Al oír esto''), sujeto explícito (''los discípulos''), reacción intensa, e inferencia en la pregunta final. Sin embargo, ''se asombraron muchísimo'' suena algo coloquial para el registro bíblico buscado, y ''ser salvado'' es menos idiomático que ''salvarse'' en esta pregunta general sobre salvación.'
  spanish_quality_summary: El texto es claro y fiel, pero conviene elevar ligeramente el registro y mejorar la naturalidad. 'Muy asombrados' o 'sumamente asombrados' encaja mejor que 'muchísimo'. Además, en español bíblico-natural '¿quién puede salvarse?' suena más fluido y mantiene el sentido teológico sin pérdida relevante.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'discípulos' y 'salvarse' concuerdan con el uso esperado. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, etc.
  issues:
  - severity: medium
    issue: Registro de 'muchísimo'
    rationale: Aunque comunica bien σφόδρα, 'muchísimo' suena más conversacional que digno en este contexto narrativo. 'Muy' o 'sumamente' mantiene la intensidad con mejor tono eclesial-legible.
  - severity: medium
    issue: Naturalidad de 'puede ser salvado'
    rationale: Es gramatical, pero en español la formulación impersonal/general de esta pregunta se expresa más naturalmente como '¿quién puede salvarse?'. Esto preserva el sentido de σωθῆναι en contexto salvífico sin introducir ambigüedad relevante.
  revised_spanish_text: 'Al oír esto, los discípulos se asombraron mucho y dijeron: «Entonces, ¿quién puede salvarse?»'
  revision_rationale: Se ajusta el registro de σφόδρα a un español más digno y natural ('mucho' en vez de 'muchísimo') y se reemplaza 'ser salvado' por 'salvarse', que en esta construcción interrogativa general suena más idiomático en español y conserva el sentido teológico de σωθῆναι.
