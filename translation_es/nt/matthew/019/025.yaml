- from: 'Al oír esto, los discípulos se asombraron muchísimo y dijeron: «Entonces, ¿quién puede ser salvado?»'
  to: 'Al oír esto, los discípulos se asombraron mucho y dijeron: «Entonces, ¿quién puede salvarse?»'
  rationale: Se ajusta el registro de σφόδρα a un español más digno y natural ('mucho' en vez de 'muchísimo') y se reemplaza 'ser salvado' por 'salvarse', que en esta construcción interrogativa general suena más idiomático en español y conserva el sentido teológico de σωθῆναι.
