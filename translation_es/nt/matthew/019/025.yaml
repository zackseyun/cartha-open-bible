translation:
  language: es
  text: 'Al oír esto, los discípulos se asombraron mucho y dijeron: «Entonces, ¿quién puede salvarse?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: When [they] heard this
  chosen_spanish: Al oír esto
  alternatives_spanish:
  - Cuando oyeron esto
  - Después de oír esto
  lexicon: BDAG
  rationale: El participio aoristo introduce una circunstancia previa a la reacción principal. En español, una construcción temporal breve con infinitivo mantiene la relación temporal y evita una frase pesada; 'esto' recoge el referente implícito del dicho anterior.
- source_word: δὲ
  english_pob_choice: '[implicit connective]'
  chosen_spanish: '[conectivo implícito]'
  alternatives_spanish:
  - pero
  - y
  - ahora
  lexicon: BDAG
  rationale: δέ añade continuación con leve transición. En español, el inicio temporal 'Al oír esto' ya cumple esa función, por lo que no hace falta explicitar un conector adicional.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  - los aprendices
  lexicon: BDAG
  rationale: Es el equivalente natural y preciso en el contexto de los Evangelios para los seguidores de Jesús.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were ... astonished
  chosen_spanish: se asombraron
  alternatives_spanish:
  - quedaron asombrados
  - se maravillaron
  - quedaron estupefactos
  lexicon: BDAG
  rationale: El imperfecto expresa reacción en curso; en español, 'se asombraron' comunica el impacto sin sonar rebuscado. La idea de intensidad se integra en el adverbio siguiente.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - en gran manera
  - grandemente
  - excesivamente
  lexicon: BDAG
  rationale: σφόδρα intensifica fuertemente el asombro. 'Muchísimo' es natural, claro y conserva la fuerza del original con un registro digno.
- source_word: λέγοντες
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - diciendo
  lexicon: BDAG
  rationale: El participio de discurso acompañante se vierte mejor como verbo finito en español narrativo.
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿qué persona?
  lexicon: BDAG
  rationale: Interrogativo personal directo e idiomático en español.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: Entonces
  alternatives_spanish:
  - así que
  - pues entonces
  lexicon: BDAG
  rationale: Marca inferencia y consecuencia a partir de la declaración previa de Jesús; 'Entonces' comunica bien ese paso lógico con naturalidad.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: El verbo expresa capacidad; 'puede' es la forma verbal más directa en español.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvado
  alternatives_spanish:
  - ser rescatado
  - ser librado
  lexicon: BDAG
  rationale: Se conserva el valor salvífico del pasivo infinitivo. 'Ser salvado' mantiene el peso teológico y la pasividad del sujeto, sin reemplazarlo por una explicación menos precisa.
theological_decisions:
- issue: Alcance de σωθῆναι en la pregunta de los discípulos
  english_pob_reading: be saved
  chosen_spanish_reading: ser salvado
  alternative_spanish_readings:
  - ser rescatado
  - ser librado
  rationale: En este contexto, la pregunta apunta a la salvación en sentido pleno, no solo a una liberación temporal. 'Ser salvado' conserva ese alcance teológico y la voz pasiva del griego.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión más reciente del POB en inglés no cambió la redacción: se mantuvo la lectura estable de la escena y del valor de σωθῆναι. No se detectaron variantes textuales relevantes en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene 'discípulos' como término estándar del POB para μαθηταί.
  - Se evita 'Señor' o cualquier sustitución no motivada porque este versículo no contiene el nombre divino ni κύριος aplicado a Yahvé.
  - '''Salvado'' se conserva para reflejar la decisión auditada sobre σωθῆναι; no se reduce a ''rescatado'' para no atenuar el peso soteriológico.'
  - El registro busca ser claro y eclesialmente legible en español neutro, sin arcaísmos innecesarios.
